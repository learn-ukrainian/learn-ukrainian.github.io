content_outline:
- points:
  - 'Провокація: Як колишній соціал-демократ і шанувальник європейської культури став творцем безкомпромісної, авторитарної
    ідеології «інтегрального націоналізму»?'
  - '[!biography] Постать, що одночасно надихала на боротьбу за незалежність і викликала звинувачення у спорідненості з європейським
    фашизмом.'
  section: 'Розминка: Парадокс Донцова'
  words: 400
- points:
  - 'Дебат 1 (Історичний): Полеміка всередині українського руху. Донцов vs. Липинський, Драгоманов. Чи був його «волюнтаризм»
    єдиним шляхом до державності, чи зрадою демократичних ідеалів?'
  - 'Дебат 2 (Сучасний): Спадщина Донцова сьогодні. Чи є він пророком української державності, чи його ідеологія є небезпечним
    реліктом, несумісним із сучасною європейською Україною?'
  - '[!epistemic-humility] Визнання, що обидві сторони полеміки мали раціональні аргументи у своєму історичному контексті.'
  - '[!decolonization] Аналіз того, як радянська пропаганда таврувала будь-який націоналізм як «фашизм», а постать Донцова
    використовувала як головне опудало.'
  section: 'Конфліктна карта: Геній чи демон?'
  words: 900
- points:
  - 'Південноукраїнське коріння: народження в Мелітополі, у родині, що походила з козацької старшини.'
  - 'Юнацький соціалізм та арешти: участь в Українській соціал-демократичній робітничій партії, розчарування в марксизмі.'
  - 'Європейські студії: навчання у Відні та Львові, знайомство з європейською філософією (Ніцше, Сорель, Бергсон), що сформувало
    його ідею «волі до життя».'
  - 'Ідейний злам: публікація статті «Модерне москвофільство» (1913) як остаточний розрив з ідеями федералізму та соціалізму.'
  section: 'Формування: Від соціаліста до націоналіста (1883-1913)'
  words: 1000
- points:
  - '«Націоналізм» (1926): публікація головної праці, що кодифікувала доктрину інтегрального націоналізму — аморалізм, фанатизм,
    воля, агресія.'
  - 'Редактор «Літературно-наукового вісника»: перетворення журналу на головний рупор «чинного націоналізму».'
  - 'Вплив на покоління: формування «празької школи» поетів (Олена Теліга, Олег Ольжич) та ідеологічне виховання членів ОУН.'
  - 'Первинне джерело: аналіз уривків з його публіцистики — стиль, риторика, ключові метафори («апостоли», «орден»).'
  section: 'Діяльність: Архітектор ідеології (1913-1939)'
  words: 1300
- points:
  - '[!anti-hagiography] Критика доктрини: звинувачення в авторитаризмі, елітизмі, відкиданні демократії та гуманізму. Чи
    виправдовує мета засоби?'
  - '[!myth-buster] Міф про «український фашизм». Порівняльний аналіз ідеології Донцова з італійським фашизмом та німецьким
    нацизмом: що спільного, а що принципово відрізняється (расовий компонент, ставлення до держави).'
  - 'Ставлення до нацистської Німеччини: аналіз його позиції напередодні та під час Другої світової війни — складні компроміси
    та неоднозначні оцінки.'
  - 'Трагедія учнів: як його ідеї на практиці реалізовували члени ОУН? Чи несе ідеолог відповідальність за дії своїх послідовників?'
  section: 'Тінь: Ціна волюнтаризму'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на парадокс Донцова, використовуючи аргументи з модуля.'
  - 'Актуальність ідей: чому ідеї Донцова знову стають популярними під час повномасштабної війни? Які аспекти його доктрини
    резонують із сьогоденням, а які є небезпечними?'
  - '[!decolonization] Переоцінка спадщини Донцова в незалежній Україні — від повного замовчування до апологетики. Пошук збалансованої
    оцінки.'
  - 'Підсумкове питання: Чи може сучасна демократична Україна інтегрувати спадщину Донцова, чи має остаточно її відкинути?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Дмитро Донцов, інтегральний націоналізм, волюнтаризм, полеміка з опонентами, суперечлива спадщина, контекст європейського
  націоналізму XX ст.
