content_outline:
- points:
  - >-
    [!biography] Знайомство із Зиновієм Коваликом (о. Зеноном): редемпторист, місіонер
    і священномученик Української Греко-Католицької Церкви.
  - >-
    Проблемне питання: як душпастирська діяльність стала загрозою для радянського
    тоталітарного режиму під час окупації Львова?
  section: Розминка
  words: 400
- points:
  - >-
    Формування та покликання: народження в селі Івачів Горішній на Тернопільщині.
    Вступ до згромадження редемптористів та чернечі обіти (1926).
  - >-
    Священничі свячення (1932) та початок місійної роботи. За сторінкою чину
    (вторинна інституційна транскрипція, не оригінал образка), на пам'ятному
    образкові першої Літургії в рідному селі (4 вересня 1932) написано:
    «О Ісусе, прийми мене зі св. Жертвою Твого св. Тіла й Крови. Прийми її
    за св. Церков, за моє Згромадження та мою Вітчизну».
  - >-
    Активна душпастирська діяльність у 1930-х роках: проповідництво та
    місії серед вірян Галичини та Волині.
  section: 'Формування: Покликання та місіонерство'
  words: 1000
- points:
  - >-
    [!decolonization] Окупація Львова: пастирська праця за радянського режиму.
    За сторінкою чину (вторинна інституційна транскрипція повідомленої
    відповіді), коли його попереджали про небезпеку, мав лише одну відповідь:
    «Якщо буде така Божа воля, то я радо прийму й смерть, але як проповідник
    не буду ніколи кривити душею».
  - >-
    Механізм репресій: арешт у грудні 1940 року у Львові. Сторінка чину подає
    підставу арешту як «за проповіді» під час дев'ятниці — це формулювання
    чину, не текст обвинувачення. Місце ув'язнення подає одним формулюванням:
    «на вул. Замарстинівській (так звані “Бригідки”)».
  - >-
    Тюремне служіння: душпастирська опіка над співкамерниками, спільні молитви
    та підтримка морального духу ув'язнених.
  section: 'Діяльність: Місійне проповідництво'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Загибель під час відступу радянських військ: масові
    розстріли у львівських тюрмах наприкінці червня 1941 року.
  - >-
    [!epistemic-humility] Розбіжності в джерелах: світський академічний
    довідник ЕСУ та сторінка чину обидва подають розп'яття на стіні тюремного
    коридору як спосіб загибелі; ватиканський акт беатифікації
    подає лише роки життя (1903-1941), без деталей загибелі.
  - >-
    Беатифікація як церковний акт: проголошення блаженним Папою Іваном Павлом II
    під час візиту в Україну (2001).
  section: 'Тінь: Мучеництво та пам''ять'
  words: 1600
- points:
  - >-
    Вшанування пам'яті: видання біографічних досліджень про о. Зенона Ковалика.
  - >-
    Сучасне значення: о. Зенон Ковалик як символ стійкості греко-католицького
    духовенства перед обличчям тоталітарного знищення.
  section: 'Підсумок: Збережена віра та пам''ять'
  words: 1000
focus: >-
