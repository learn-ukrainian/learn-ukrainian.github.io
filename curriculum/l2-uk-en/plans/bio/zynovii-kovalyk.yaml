content_outline:
- points:
  - >-
    [!biography] Знайомство із Зиновієм Коваликом (о. Зеноном): редемпторист, місіонер
    і священномученик Української Греко-Католицької Церкви.
  - >-
    Проблемне питання: як душпастирська діяльність стала загрозою для радянського
    тоталітарного режиму під час окупації Львова?
  section: Розминка
  words: 400
- points:
  - >-
    Формування та покликання: народження в селі Івачів Горішній на Тернопільщині.
    Вступ до згромадження редемптористів та чернечі обіти (1926).
  - >-
    Священничі свячення (1932) та початок місійної роботи. Девіз з молитовної
    картки першої Літургії: "О Ісусе! Прийми мене".
  - >-
    Активна душпастирська діяльність у 1930-х роках: проповідництво та
    місії серед вірян Галичини та Волині.
  section: 'Формування: Покликання та місіонерство'
  words: 1000
- points:
  - >-
    [!decolonization] Окупація Львова: пастирська праця під пильним наглядом
    радянських органів безпеки. Відмова припинити публічні проповіді.
  - >-
    Механізм репресій: арешт у грудні 1940 року у Львові. Ув'язнення в тюрмі
    на Замарстинівській (тюрма №2) або в "Бригідках".
  - >-
    Тюремне служіння: душпастирська опіка над співкамерниками, спільні молитви
    та підтримка морального духу ув'язнених. "Якщо така воля Божа, я радо прийму і смерть."
  section: 'Діяльність: Місійне проповідництво'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Загибель під час відступу радянських військ: масові
    розстріли у львівських тюрмах наприкінці червня 1941 року.
  - >-
    [!epistemic-humility] Розбіжності в джерелах: ватиканська хронологія фіксує
    загибель у в'язниці; церковна пам'ять зберігає свідчення про розп'яття,
    проте тіло не було знайдено.
  - >-
    Беатифікація як церковний акт: проголошення блаженним Папою Іваном Павлом II
    під час візиту в Україну (2001).
  section: 'Тінь: Мучеництво та пам''ять'
  words: 1600
- points:
  - >-
    Вшанування пам'яті: видання біографічних досліджень ("Якщо така воля Божа, я радо прийму і смерть").
  - >-
    Сучасне значення: о. Зенон Ковалик як символ стійкості греко-католицького
    духовенства перед обличчям тоталітарного знищення.
  section: 'Підсумок: Збережена віра та пам''ять'
  words: 1000
focus: >-
