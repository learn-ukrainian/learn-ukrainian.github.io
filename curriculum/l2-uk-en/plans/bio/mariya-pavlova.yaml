objectives:
- Критично аналізувати життєвий шлях Марії Павлової в контексті наукових, соціальних та політичних викликів її епохи
- Розрізняти позиції в історичних дебатах щодо її спадщини (феміністична ікона, жертва системи, імперська вчена)
- Застосовувати концепцію "анти-агіографії" для виявлення моральних компромісів та "тіньових" аспектів біографії вченого
- Формулювати аргументовану позицію щодо місця Марії Павлової в українській науковій історії
