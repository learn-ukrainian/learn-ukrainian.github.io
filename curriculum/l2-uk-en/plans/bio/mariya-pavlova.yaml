content_outline:
- points:
  - 'Парадокс: Як дівчина з Києва, якій було заборонено вступати до університету в Російській імперії, стала професором і
    світилом палеонтології?'
  - '[!biography] Марія Павлова — ім''я, яке гриміло в наукових колах Парижа та Москви, але сьогодні майже невідоме в Україні.
    Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була Павлова "винятком, що підтверджує правило"? Боротьба з системною мізогінією в науці XIX ст. vs історія
    особистого таланту та наполегливості.'
  - 'Дебат 2: "Російська" вчена з України? Як імперія привласнювала таланти. Дискусія про національну ідентичність вченої,
    що народилася в Києві, здобула визнання в Парижі, а кар''єру зробила в Москві.'
  - '[!epistemic-humility] Оцінки її кар''єри коливаються від "колаборації з режимом" (робота в АН СРСР) до "прикладу наукового
    подвижництва всупереч усьому".'
  - '[!decolonization] Аналіз того, як біографія Павлової була "відредагована" в радянській історіографії, щоб підкреслити
    її "загальноросійський" внесок, замовчуючи українське походження.'
  section: 'Конфліктна карта: Жінка в науці та імперський контекст'
  words: 900
- points:
  - 'Київська гімназистка: інтелектуальне середовище та зародження інтересу до природничих наук.'
  - 'Освітня еміграція: усвідомлений вибір Парижа як єдиного шляху до вищої освіти для жінки з Російської імперії.'
  - 'Навчання в Сорбонні: робота з провідним палеонтологом Альбером Годрі та формування наукового світогляду.'
  - 'Шлюб та партнерство: союз з геологом Олексієм Павловим як приклад наукової родини, що ламала стереотипи.'
  section: 'Формування: Від Києва до Сорбонни (1854-1886)'
  words: 1000
- points:
  - 'Переїзд до Москви: виклик інтеграції в закрите академічне середовище Московського університету.'
  - 'Теорія еволюції коней та хоботних: монографії, що стали класикою світової палеонтології та принесли їй міжнародне визнання.'
  - 'Створення палеонтологічного музею: титанічна праця по організації колекції, що стала однією з найкращих у світі.'
  - 'Первинні джерела: аналіз фрагментів її наукових праць, листування з європейськими колегами.'
  section: 'Діяльність: Еволюція ссавців та створення московської школи (1886-1920)'
  words: 1300
- points:
  - '[!anti-hagiography] Почесний член АН СРСР: що означав цей статус? Привілей чи вимушений компроміс з тоталітарним режимом
    задля порятунку науки?'
  - 'Робота в умовах ідеологічного тиску: чи доводилося їй "коригувати" свої лекції та публікації відповідно до марксистської
    доктрини?'
  - '[!myth-buster] Міф про "безхмарне" визнання в СРСР. Аналіз протоколів та документів епохи, що свідчать про постійний
    нагляд та ризик репресій.'
  - 'Критика з боку сучасників: закиди у "відірваності від пролетарської науки" та "буржуазному космополітизмі".'
  section: 'Тінь: Ціна виживання — наука та радянська влада (1920-1938)'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання про парадокс кар''єри Павлової.'
  - 'Оцінка спадщини: що важливіше — її конкретні наукові відкриття чи сам факт її прориву як жінки-вченої?'
  - '[!decolonization] "Повернення" імені в Україну: як і чому сучасна українська наука має перевідкрити для себе Марію Павлову.'
  - 'Сучасна релевантність: її життя як кейс для дискусії про роль жінки в науці, про стосунки вченого та влади, про національну
    ідентичність в глобалізованому світі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Марія Павлова: перша жінка-палеонтолог світового рівня з України, її шлях від Києва до Сорбонни та Москви, наукові
  прориви в теорії еволюції та ціна виживання елітного вченого в Російській та Радянській імперіях.'
