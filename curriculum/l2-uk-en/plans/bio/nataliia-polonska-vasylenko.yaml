content_outline:
- points:
  - 'Парадокс: як одна жінка, працюючи під тиском двох тоталітарних режимів та в еміграції, змогла написати фундаментальну
    «Історію України», що визначила напрямок для цілих поколінь?'
  - '[!biography] Вступ до постаті Наталії Полонської-Василенко як однієї з найвидатніших історикинь України ХХ століття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Київська школа vs радянська марксистська історіографія. Полонська-Василенко як спадкоємиця традиції Грушевського
    проти офіційної доктрини, що заперечувала окремішність української історії.'
  - 'Дебат 2: Історія для діаспори vs історія в УРСР. Як еміграція дозволила зберегти незацензуровану науку, але водночас
    створила ризик відриву від "живої" України. Чи була її праця "голосом з минулого" чи активним інструментом боротьби?'
  - '[!epistemic-humility] Визнання складності її становища: звинувачення в «буржуазному націоналізмі» з боку СРСР та необхідність
    доводити академічну легітимність на Заході.'
  - '[!decolonization] Її праця як акт деколонізації — повернення суб''єктності українській історії, відкидання імперських
    та радянських наративів.'
  section: 'Конфліктна карта: Історіографія під тиском'
  words: 900
- points:
  - Народження в Харкові в інтелігентній родині, що визначило її майбутні інтереси.
  - Навчання в Петербурзі та Києві, де вона потрапила під вплив київської історичної школи.
  - Формування як історика-медієвіста, закладення основ її методології.
  - Ранні праці та перші наукові успіхи в дореволюційний період.
  section: 'Формування: Київська школа та становлення (1884-1917)'
  words: 1000
- points:
  - Робота в новоствореній Українській Академії Наук (УАН) — період розквіту та надій.
  - Фундаментальні дослідження історії Запорозької Січі та заселення Південної України, що стали класичними.
  - Наукова діяльність в умовах сталінського терору та репресій проти українських істориків у 1930-х.
  - Як їй вдалося вижити і продовжувати працювати, коли її колег заарештовували та розстрілювали.
  section: 'Діяльність: Створення української історії (1917-1943)'
  words: 1300
- points:
  - '[!anti-hagiography] Важкий вибір: виїзд з України під час німецької окупації. Це було порятунком чи формою колаборації
    в очах радянської пропаганди? Розбір звинувачень та реальних обставин.'
  - Життя в таборах для переміщених осіб у Німеччині — продовження наукової роботи в екстремальних умовах.
  - '[!myth-buster] Розвінчання радянського міфу про «зрадницю». Полонська-Василенко не співпрацювала з нацистами, а рятувала
    себе та українську науку від знищення радянською владою.'
  - Інтелектуальна ізоляція та боротьба за визнання на Заході, де українська історія часто розглядалася як частина російської.
  section: 'Тінь: Ціна еміграції та виживання (1943-1973)'
  words: 900
- points:
  - 'Повернення до розминки: Як саме Полонській-Василенко вдалося здійснити свій науковий подвиг? Відповідь з урахуванням
    її методології, стійкості та ролі еміграції.'
  - '[!decolonization] Її двотомна «Історія України» як «інтелектуальна зброя» в холодній війні та основа для відродження
    історичної пам''яті після 1991 року.'
  - Оцінка її методологічного внеску та впливу на сучасних українських істориків.
  - Чому її постать є символом незламності української науки?
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Nataliia Polonska-Vasylenko, her creation of the definitive two-volume "History of Ukraine" amidst two
  totalitarianisms, the conflict between Kyiv and Soviet historical schools, and the intellectual price of emigration.
level: BIO
module: bio-087
objectives:
- Критично аналізувати життя та наукову спадщину Наталії Полонської-Василенко в контексті двох тоталітарних режимів.
- Оцінювати її внесок у формування української національної історіографії та її роль у збереженні історичної пам'яті.
- Порівнювати методологічні підходи київської історичної школи та радянської історіографії.
- Формулювати аргументовану позицію щодо впливу еміграції на наукову діяльність.
