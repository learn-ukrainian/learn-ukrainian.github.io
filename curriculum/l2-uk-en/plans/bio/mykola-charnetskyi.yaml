objectives:
- Аналізувати пастирську та місіонерську діяльність Миколая Чарнецького на Волині та Поліссі.
- Розуміти механізми радянського кримінального переслідування діячів УГКЦ за фальшивим звинуваченням "агентів
  Ватикану".
- Досліджувати умови таборового досвіду єпископа та його вплив на підпільну церкву.
- Оцінювати значення церковного акту беатифікації для збереження історичної пам'яті про мучеників.
