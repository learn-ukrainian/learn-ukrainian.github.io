content_outline:
- points:
  - '[!biography] Знайомство з Миколаєм Чарнецьким: єпископ УГКЦ, редемпторист, місіонер і сповідник віри,
    що пережив роки радянських таборів.'
  - 'Провокаційне питання: чому тоталітарний режим сприймав католицького пастиря як особисту політичну
    загрозу?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 1884 року в селянській родині (Семаківці), навчання в Римі, здобуття
    докторату з догматичного богослов''я.'
  - 'Пастирське становлення: професор і духівник Станіславівської семінарії, вступ до новіціату чину редемптористів
    1919 року у Збоїськах біля Львова.'
  section: 'Формування: Шлях редемпториста'
  words: 1000
- points:
  - 'Місія: апостольський візитатор для греко-католиків — джерела розходяться і в даті, і в території.
    ЕСУ датує призначення 1926 роком і подає Волинь та Підляшшя; синодальна довідка пов''язує титул із
    єпископським призначенням 2 лютого 1931 року й подає Волинь і Полісся; офіційна життєписна нота
    Апостольської столиці незалежно дає змішану атрибуцію (1926 рік, Волинь і Полісся), а перелік
    беатифікацій Апостольської столиці окремо називає його екзархом Волині й Підляшшя; подавати всі
    формулювання з атрибуцією джерела, без голосування більшості. Єпископська хіротонія в Римі 1931 року.'
  - 'Служіння в умовах війни: діяльність у період радянської та німецької окупацій 1939–1945 років, підтримка
    інституційного життя УГКЦ.'
  section: 'Діяльність: Апостольський візитатор'
  words: 1200
- points:
  - 'Арешт у межах масового ув''язнення єпископату УГКЦ: синодальна довідка датує його 11 квітня 1945
    року, близько 23-ї години; ЕСУ називає ту саму дату 11 квітня 1945 року.'
  - '[!anti-hagiography] Механізм репресій: тюрма на Лонцького, цілодобові допити й катування, слідство
    в Києві протягом близько року, вирок за категорією "агент Ватикану".'
  - 'Табори: строк джерела подають розбіжно — синодальна довідка пише про десять років таборів посиленого
    режиму, ЕСУ про шість; заслання до Маріїнська разом зі Сліпим, близько тридцяти змінених тюрем і
    таборів, останні роки у тюремному шпиталі в Мордовії.'
  section: 'Тінь: Переслідування та табори'
  words: 1600
- points:
  - 'Звільнення 1956 року й повернення до Львова того ж року. Таємні свячення для катакомбної церкви:
    висвятив понад десять священників, точна повна кількість невідома. Смерть 2 квітня 1959 року у Львові.'
  - '[!epistemic-humility] Підсумок: беатифікація 27 червня 2001 року у Львові за офіційним переліком
    Апостольської столиці — конфесійно-правовий статус, а не підтвердження кожного біографічного твердження;
    свідчення про чуда біля могили документують культ, а не медичний факт.'
  section: 'Підсумок: Свідоцтво віри'
  words: 1000
