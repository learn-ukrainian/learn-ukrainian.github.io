content_outline:
- points:
  - '[!biography] Знайомство з Миколаєм Чарнецьким: єпископ УГКЦ, редемпторист, місіонер і сповідник віри, що пережив роки радянських таборів.'
  - 'Провокаційне питання: чому тоталітарний режим сприймав католицького пастиря як особисту політичну загрозу?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 1884 року в селянській родині (Семаківці), навчання в Римі, здобуття докторату з догматичного богослов''я.'
  - 'Пастирське становлення: професор і духівник Станіславівської семінарії, вступ до новіціату чину редемптористів 1919 року у Збоїськах біля Львова.'
  section: 'Формування: Шлях редемпториста'
  words: 1000
- points:
  - 'Місія: призначення 1926 року Апостольським візитатором для греко-католиків Волині та Полісся. Єпископська хіротонія в Римі 1931 року.'
  - 'Служіння в умовах війни: діяльність у період радянської та німецької окупацій 1939–1945 років, підтримка інституційного життя УГКЦ.'
  section: 'Діяльність: Апостольський візитатор'
  words: 1200
- points:
  - 'Арешт: затримання НКВС 11 квітня (джерела розходяться між 1944 та 1945 роками) у межах загального радянського наступу на УГКЦ.'
  - '[!anti-hagiography] Механізм репресій: ув''язнення у тюрмі на Лонцького, переведення до Києва. Суд та звинувачення як "агента Ватикану".'
  - 'Табори: засудження до суворого режиму таборів у Сибіру (відбував строки за різними вироками). Тривалі допити, тортури та етапи.'
  section: 'Тінь: Переслідування та табори'
  words: 1600
- points:
  - 'Звільнення: вихід на волю 1956 року через стан здоров''я. Таємна пастирська присутність у Львові до смерті 2 квітня 1959 року.'
  - '[!epistemic-humility] Підсумок: збереження пам''яті про владику в підпільній церкві. Церковний акт — беатифікація як мученика Папою Іваном Павлом II у 2001 році.'
  section: 'Підсумок: Свідоцтво віри'
  words: 1000
focus: Миколай Чарнецький як єпископ УГКЦ, місіонер і сповідник віри, його переслідування НКВС та свідоцтво у радянських таборах.
