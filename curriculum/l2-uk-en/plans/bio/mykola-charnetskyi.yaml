content_outline:
- points:
  - '[!biography] Знайомство з Миколаєм Чарнецьким: єпископ УГКЦ, редемпторист, місіонер і сповідник віри,
    що пережив роки радянських таборів.'
  - 'Провокаційне питання: чому тоталітарний режим сприймав католицького пастиря як особисту політичну
    загрозу?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 1884 року в селянській родині (Семаківці), навчання в Римі, здобуття
    докторату з догматичного богослов''я.'
  - 'Пастирське становлення: професор і духівник Станіславівської семінарії, вступ до новіціату чину редемптористів
    1919 року у Збоїськах біля Львова.'
  section: 'Формування: Шлях редемпториста'
  words: 1000
- points:
  - 'Місія: апостольський візитатор для греко-католиків Волині та Полісся — ЕСУ датує призначення 1926
    роком, ВУЕ пов''язує титул із єпископським призначенням 2 лютого 1931 року; подавати обидві атрибуції.
    Єпископська хіротонія в Римі 1931 року.'
  - 'Служіння в умовах війни: діяльність у період радянської та німецької окупацій 1939–1945 років, підтримка
    інституційного життя УГКЦ.'
  section: 'Діяльність: Апостольський візитатор'
  words: 1200
- points:
  - 'Арешт у межах масового ув''язнення єпископату УГКЦ разом зі Сліпим і Хомишиним: ЕСУ називає 11 квітня
    1945 року, ВУЕ — ніч проти 12 квітня 1945 року; це та сама операція, різниця в рахуванні нічної години.'
  - '[!anti-hagiography] Механізм репресій: тюрма на Лонцького, цілодобові допити й катування, близько
    півтора року у львівській та київській тюрмах, вирок за категорією "агент Ватикану".'
  - 'Табори: строк джерела подають розбіжно — ВУЕ пише про десять років таборів посиленого режиму, ЕСУ
    про шість; заслання до Маріїнська разом зі Сліпим, близько тридцяти змінених тюрем і таборів, останні
    роки у тюремному шпиталі в Мордовії.'
  section: 'Тінь: Переслідування та табори'
  words: 1600
- points:
  - 'Звільнення 1956 року й повернення до Львова в липні того ж року. Таємні свячення для катакомбної
    церкви: точна кількість невідома, КДБ дізналося про тринадцятьох. Смерть 2 квітня 1959 року у Львові.'
  - '[!epistemic-humility] Підсумок: беатифікація 27 червня 2001 року у Львові за офіційним переліком
    Апостольської столиці — конфесійно-правовий статус, а не підтвердження кожного біографічного твердження;
    свідчення про чуда біля могили документують культ, а не медичний факт.'
  section: 'Підсумок: Свідоцтво віри'
  words: 1000
