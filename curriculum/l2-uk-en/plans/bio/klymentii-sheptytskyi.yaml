content_outline:
- points:
  - >-
    [!biography] Климентій Шептицький (світське ім'я Казимир Марія; 1869, Прилбичі):
    доктор права (Краків, Мюнхен, Париж); молодший брат митрополита Андрея Шептицького.
  - >-
    Провокаційне питання: як австрійський парламентар і аристократ обрав чернечий
    послух і став мішенню радянської каральної системи?
  section: Розминка
  words: 400
- points:
  - >-
    Публічна та політична діяльність (1900–1907) під світським іменем; вступ у
    чернече життя (1911); перший монаший постриг (1913, за УГКЦ). Священиче
    рукоположення: 1913 (ЕІУ) / 1915 (УГКЦ); ієромонах 1915 (ЕІУ) — обидві
    версії рукоположення записано, жодної не обрано.
  - >-
    Керівництво студитськими монастирями у Львові та Уневі (1917–1926); робота над
    Студитським типіконом з Андреєм (1937, подання до Конгрегації східних церков).
  - >-
    [!decolonization] 1939 — очолював Український Католицький Інститут Церковного
    З'єдинення ім. Митрополита Рутського (за довідкою УГКЦ); греко-католицький
    екзарх у Росії.
  section: 'Формування: Право, парламент і студитський шлях'
  words: 1000
- points:
  - >-
    *Посліднє слово* (1940): підготовка монахів до переслідувань (назва й мета в
    джерелах УГКЦ; повний текст у цьому модулі не цитується).
  - >-
    [!anti-hagiography] Участь у мережі Шептицьких з порятунку євреїв (1941–1944);
    визнання «Праведником народів світу» за свідченням ЕІУ (S1/ЕІУ, 1996) —
    запис Яд Вашем не читано й не адоптовано; без стирання
    польсько-аристократичного контексту родини.
  - >-
    Після арештів ієрархії 1945 року — фактичне керівництво за церковною
    довідкою: зустрічі з духовенством, заклики не приймати примусовий перехід у
    російське православ'я.

  - >-
    Листи до Ватикану / Риму як матеріал обвинувачення — дві адоптовані
    формулювання, жодного органу не обрано: [S2] листи до кард. Тіссерана та
    о. Королевського «перехопило МГБ»; [S3] формальна причина арешту — листи
    архімандрита до Риму про переслідування УГКЦ, «які перехопило НКВС».
  section: 'Діяльність: Студити, типікон і порятунок євреїв'
  words: 1200
- points:
  - >-
    Арешт в Унівській лаврі (5 червня 1947) — дата збігається в [S1] [S2] [S3];
    вирок — 8 років (ЕІУ: 28 лютого 1948, особлива нарада МДБ УРСР [S1]; УГКЦ:
    березень 1948 [S2] — розбіжність місяця збережено, жодної дати не обрано);
    переведення Львів → Київ → Москва → Володимир.
  - >-
    [!decolonization] Допит / слідство (вторинна цитата з біографії УГКЦ 2020
    [S2], не архівний протокол; [S2] подає контекст внутрішньої в'язниці УМГБ):
    відповідь слідчим — «З висуненими звинуваченнями я не погоджуюся»;
    зафіксоване висловлювання «Для мене тюремна камера — це монаша келія» —
    [!epistemic-humility] також вторинна цитата з біографії УГКЦ 2020, не
    стенографічний протокол суду.
  - >-
    Смерть у Володимирському централі (1 травня 1951); таємне поховання біля мура
    тюрми; місце поховання залишається невідомим / не віднайденим у наявних
    джерелах.
  section: 'Тінь: Арешт і Володимирський централ'
  words: 1600
- points:
  - >-
    Збереження студитської традиції та монаших настанов; УГКЦ зазначає, що повний
    масштаб внеску ще потребує дослідження.
  - >-
    Беатифікація як акт Католицької церкви (2001) і визнання «Праведником
    народів світу» за свідченням ЕІУ (S1/ЕІУ, 1996; запис Яд Вашем не читано) —
    без перетворення на єдиний «помічник брата».
  - >-
    Сучасне значення: юрист, монах, рятівник, в'язень — чотири шари однієї біографії.
  section: 'Підсумок: Праведник, архімандрит і мученик'
  words: 1000
focus: >-
  Климентій Шептицький як архімандрит студитів, рятівник євреїв та жертва радянської
  каральної системи. Дослідження його інституційної роботи, переходу від політики до
  чернецтва, політичних звинувачень, перехоплених листів, позасудового вироку
  особливої наради та реабілітації.
