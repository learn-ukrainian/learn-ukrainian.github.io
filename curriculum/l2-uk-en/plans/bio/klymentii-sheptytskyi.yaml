content_outline:
- points:
  - >-
    [!biography] Климентій Шептицький (світське ім'я Казимир Марія; 1869, Прилбичі):
    доктор права (Краків, Мюнхен, Париж); молодший брат митрополита Андрея Шептицького.
  - >-
    Провокаційне питання: як австрійський парламентар і аристократ обрав чернечий
    послух і став мішенню радянської каральної системи?
  section: Розминка
  words: 400
- points:
  - >-
    Публічна та політична діяльність (1900–1907) під світським іменем; вхід у студитів
    (1911–1913), священиче рукоположення (1915).
  - >-
    Керівництво студитськими монастирями у Львові та Уневі (1917–1926); робота над
    Студитським типіконом з Андреєм (1937, подання до Конгрегації східних церков).
  - >-
    [!decolonization] 1939 — голова Українського католицького інституту церковного
    союзу імені митрополита Руського; греко-католицький екзарх у Росії.
  section: 'Формування: Право, парламент і студитський шлях'
  words: 1000
- points:
  - >-
    *Посліднє слово* (1940): підготовка монахів до переслідувань (назва й мета в
    джерелах УГКЦ; повний текст у цьому модулі не цитується).
  - >-
    [!anti-hagiography] Участь у мережі Шептицьких з порятунку євреїв (1941–1944);
    визнання Яд Вашем «Праведником народів світу» — без стирання польсько-аристократичного
    контексту родини.
  - >-
    Після арештів ієрархії 1945 року — фактичне утримання частини структури церкви,
    зустрічі з духовенством, заклики не приймати примусовий перехід у російське
    православ'я.
  - >-
    Листи до Ватикану (картинал Тіссеран, о. Королевський): перехоплені й використані
    як доказ у справі — не нейтральний «зв'язок», а режимний доказ «антирадянської діяльності».
  section: 'Діяльність: Студити, типікон і порятунок євреїв'
  words: 1200
- points:
  - >-
    Арешт МГБ в Унівській лаврі (5 червня 1947); вирок (березень 1948) — 8 років;
    переведення Львів → Київ → Москва → Владімір.
  - >-
    [!decolonization] Справа 74978 ФП (Центральний секторальний архів СБУ): відповідь
    слідчим — «З висуненими звинуваченнями я не погоджуюся»; зафіксоване висловлювання
    «Для мене тюремна камера — це монаша келія» — [!epistemic-humility] усне свідчення
    в біографії УГКЦ, не стенографічний протокол суду.
  - >-
    Смерть у Владімірському централі (1 травня 1951); таємне поховання біля мура
    тюрми; могила не знайдена в наявних джерелах.
  section: 'Тінь: Справа 74978 ФП та Владімірський централ'
  words: 1600
- points:
  - >-
    Збереження студитської традиції, монашських настанов і листування (зокрема до
    брата Станіслава); УГКЦ зазначає, що повний масштаб внеску ще потребує дослідження.
  - >-
    Беатифікація як акт Католицької церкви (2001) і визнання Яд Вашем — без перетворення
    на єдиний «помічник брата».
  - >-
    Сучасне значення: юрист, монах, рятівник, в'язень — чотири шари однієї біографії.
  section: 'Підсумок: Праведник, архімандрит і мученик'
  words: 1000
focus: >-
  Климентій Шептицький як архімандрит студитів, рятівник євреїв та жертва радянської
  каральної системи. Дослідження його інституційної роботи, переходу від політики до
  чернецтва та механізмів фабрикації його кримінальної справи.
