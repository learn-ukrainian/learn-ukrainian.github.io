content_outline:
- points:
  - >-
    [!biography] Життя Климентія Шептицького (Казимира Марії): доктор права,
    австрійський парламентар, який обрав шлях монаха-студита.
  - >-
    Вступ до теми: як європейська освіта та аристократичне походження
    трансформувалися у чернечий послух та духовне лідерство.
  section: Розминка
  words: 400
- points:
  - >-
    Чернечий вибір: вступ до студитів (1911), священиче рукоположення та керівництво
    монастирями (Унівська лавра). Співпраця з братом Андреєм над "Типіконом".
  - >-
    Праведник народів світу: участь у мережі Шептицьких з порятунку євреїв під час
    німецької окупації. Переховування дітей у монастирях.
  - >-
    [!anti-hagiography] Климентій був не просто "помічником брата", але й
    окремим інституційним розбудовником і фактичним лідером частини церкви після 1945 року.
  section: 'Діяльність: Студитський устав та рятування євреїв'
  words: 1200
- points:
  - >-
    Переслідування після 1945 року: протидія ліквідації УГКЦ, відмова від переходу
    в російське православ'я та звітування Ватикану про переслідування.
  - >-
    [!decolonization] Арешт МГБ в Унівській лаврі (1947). Фабрикація справи
    "74978 ФП": листи до Ватикану як доказ "антирадянської діяльності".
  - >-
    [!epistemic-humility] Смерть у Владімірському централі (1 травня 1951). Таємне
    поховання та втрата точного місця могили. Свідчення про його стійкість: "Для мене
    тюремна камера - це монаша келія" (задокументоване усне свідчення).
  section: 'Тінь: Арешт, МГБ та Владімірський централ'
  words: 1600
- points:
  - >-
    Спадщина архімандрита: збереження студитської традиції та опубліковане
    листування (з братом Станіславом та родиною).
  - >-
    Офіційне визнання: беатифікація Католицькою церквою (2001) та визнання
    Яд Вашем Праведником народів світу.
  section: 'Підсумок: Праведник і мученик'
  words: 800
focus: >-
