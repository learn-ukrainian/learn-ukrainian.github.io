objectives:
- >-
  Аналізувати мотив яничарства у «Мальвах» як художню мову асиміляції,
  відступництва і втрати пам'яті.
- >-
  Пояснювати публікаційну історію «Журавлиного крику» як джерело для розуміння
  радянського контролю над історичною прозою.
- >-
  Розрізняти документовані форми тиску на Іваничука і неприпустимі вигадки про
  арешт, табір чи названу справу.
- >-
  Оцінювати зв'язок між історичними романами Іваничука, редакторською роботою,
  «Просвітою» і політичною участю доби незалежності.
