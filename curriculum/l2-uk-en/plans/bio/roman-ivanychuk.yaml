content_outline:
- points:
  - >-
    [!biography] Роман Іваничук: історичний романіст, редактор львівського журналу
    «Жовтень» / «Дзвін», професор і громадський діяч доби відновлення незалежності.
  - >-
    Провокаційне питання: чому роман про яничарів, полон, матір і дітей міг
    становити небезпеку для пізньорадянської культурної системи?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 27 травня 1929 року в Трачі на Косівщині, учительська родина,
    коломийська школа і перехід від геології до української філології у
    Львівському університеті.
  - >-
    1949 року його вигнали з університету в ідеологічній справі: джерела подають
    відмову від комсомольської покори, вишиваний одяг на свята і звинувачення в
    «антирадянській діяльності» або в ролі «прихованого ворога народу».
  - >-
    [!epistemic-humility] Цей епізод треба читати як документований ранній контакт
    із радянським ідеологічним наглядом, але не перетворювати його на вигадану
    табірну чи арештантську біографію.
  section: 'Формування: Університетська справа і школа ідеологічного тиску'
  words: 1000
- points:
  - >-
    «Мальви» / «Яничари» (1968): родинна історія полону, упізнавання і
    відступництва, у якій яничарство стає образом втрати самоідентичності.
  - >-
    Офіційна критика різко відкинула роман, а Іваничук надовго втратив нормальні
    можливості друку. Саме тут історична проза працює як алегорія асиміляції,
    зради, пам'яті й імперського виховання.
  - >-
    «Журавлиний крик»: роман про зруйнування Запорозької Січі й трагедію Петра
    Калнишевського, написаний 1968 року і надрукований лише 1988 року. Двадцять
    років затримки роблять історію публікації частиною змісту.
  - >-
    «Вода з каменю», «Четвертий вимір», «Манускрипт з вулиці Руської» і
    «Шрами на скалі» показують ширший метод: оживити «білі плями» української
    історії через сцену, голос, місто, документ і моральний вибір.
  section: 'Діяльність: Історичний роман як алегорія пам''яті'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Іваничук не був поза радянськими інституціями: він
    працював у журналі, друкувався, отримував премії і вів редакційну роботу.
    Саме тому його біографія складніша за схему «підпільний митець проти держави».
  - >-
    З іншого боку, офіційна критика, публікаційне блокування і відкладені книжки
    показують, що історична пам'ять не була нейтральною темою. Минуле ставало
    способом говорити про сучасну залежність.
  - >-
    [!myth-buster] Не треба вигадувати справу КДБ, арешт чи табір. Джерела дають
    інший механізм тиску: університетське покарання, ідеологічну критику,
    обмеження друку і затриману публікацію.
  - >-
    Титульна двоїстість «Мальви» / «Яничари» відкриває окрему дискусію: нейтральна
    квіткова назва приховує травматичну тему, тоді як друга назва робить
    політичну метафору очевидною.
  section: 'Тінь: Офіційна критика, затримані книжки і межі історичного роману'
  words: 1500
- points:
  - >-
    Від 1988 року Іваничук очолював львівську організацію Товариства української
    мови / «Просвіти», допомагав відновлювати видавництво «Червона калина», а
    1990-1994 року був народним депутатом України.
  - >-
    [!decolonization] Його незалежницька громадська робота виростає з тієї самої
    логіки, що й романи: повернення мови, видавництва, історичних імен і права
    говорити про українську державність без імперського фільтра.
  - >-
    Смерть 17 вересня 2016 року у Львові не закрила дискусію про нього: Іваничук
    лишається прикладом письменника, який працював усередині системи, розширював
    межі дозволеного й після 1991 року перейшов до відкритої інституційної дії.
  section: 'Підсумок: Від роману про минуле до громадської дії'
  words: 1000
focus: >-
  Роман Іваничук як автор історичних романів про асиміляцію, зруйновану Січ,
  галицьке відродження і «білі плями» пам'яті. Семінар розглядає його
  університетське покарання, офіційну критику «Мальв», затримку «Журавлиного
  крику» і незалежницьку громадську працю без вигаданого мученицького сюжету.
