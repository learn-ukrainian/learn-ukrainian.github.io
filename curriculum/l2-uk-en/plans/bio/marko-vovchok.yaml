content_outline:
- points:
  - 'Парадокс: як російська дворянка Марія Вілінська стала Марко Вовчок — символом українського селянства та авторкою, якою
    захоплювався Шевченко?'
  - '[!biography] Порушення очікувань: замість стандартної біографії — дослідження феномену культурного переходу та його наслідків.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була вона єдиним автором «Народних оповідань»? Роль чоловіка Опанаса Марковича та звинувачення у плагіаті
    в пізнішій кар''єрі.'
  - 'Дебат 2: «Наша» чи «їхня»? Сприйняття Вовчок в українському національному русі (Шевченко) vs в російській імперській
    критиці. Як її ідентичність інтерпретують сьогодні?'
  - '[!epistemic-humility] Визнання браку остаточних доказів щодо деяких звинувачень та існування різних наукових шкіл, що
    по-різному оцінюють її спадщину.'
  - '[!decolonization] Аналіз того, як імперський наратив намагався «привласнити» або маргіналізувати Вовчок після її вибору
    на користь української літератури.'
  section: 'Конфліктна карта: Авторство та ідентичність'
  words: 900
- points:
  - 'Соціальний контекст: виховання в російській дворянській родині в Орловській губернії. Який світ її сформував?'
  - Освіта в Харкові та знайомство з українською інтелігенцією.
  - 'Поворотний момент: шлюб з етнографом Опанасом Марковичем, переїзд в Україну та занурення в мову, фольклор і життя простого
    народу.'
  - 'Від спостерігача до учасника: свідомий вибір вивчити мову та почати збирати етнографічні матеріали.'
  section: 'Формування: Шлях до України (1833-1857)'
  words: 1000
- points:
  - 'Народження феномену: публікація «Народних оповідань» (1857) та миттєвий успіх. Чому цей твір став подією?'
  - 'Тематичне ядро: кріпацтво, трагічна доля жінки, соціальна несправедливість, розказані від першої особи.'
  - 'Резонанс: захоплені відгуки Тараса Шевченка («доня моя») та Івана Тургенєва, який перекладав її твори російською.'
  - 'Європейський період: життя в Парижі, знайомство з європейськими літераторами, переклади її творів французькою та німецькою.'
  section: 'Діяльність: «Народні оповідання» та європейське визнання (1857-1878)'
  words: 1300
- points:
  - '[!anti-hagiography] Звинувачення у плагіаті перекладів, які серйозно підірвали її репутацію в пізній період творчості.'
  - Повернення до Російської імперії та перехід переважно на російську мову. Чому вона зробила такий вибір?
  - '[!myth-buster] Корекція міфу про «ідеальну українську патріотку»: аналіз її складних фінансових та особистих обставин,
    що впливали на її творчі рішення.'
  - 'Оцінка критиків: як сучасники пояснювали її творчу кризу та відхід від української тематики.'
  section: 'Тінь: Літературні скандали та російський вибір (1878-1907)'
  words: 900
- points:
  - 'Повернення до парадоксу: з новим розумінням контексту, студент формулює відповідь — ким була Марко Вовчок?'
  - 'Місце в каноні: незважаючи на скандали та суперечності, чому вона залишається ключовою фігурою української літератури
    XIX століття?'
  - 'Феміністична перспектива: Вовчок як попередниця українського фемінізму, яка першою зробила жінку центральною постаттю
    своїх творів.'
  - '[!decolonization] Спадщина Вовчок як приклад успішної культурної асиміляції «в інший бік» — з імперської культури в колонізовану,
    що є унікальним явищем.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The paradoxical identity of Marko Vovchok (Maria Vilinska) — a Russian noblewoman who became a foundational voice in
  Ukrainian literature, the controversies around her authorship, and her role as a proto-feminist figure.
level: BIO
module: bio-042
objectives:
- Аналізувати парадокс ідентичності Марко Вовчок як російської дворянки, що стала голосом українського селянства
- Критично оцінювати історичні дебати щодо авторства її творів та її культурної приналежності
- Пояснювати зв'язок між її біографією та ключовими темами її творчості (кріпацтво, жіноча доля)
- Формулювати власну аргументовану позицію щодо місця Марко Вовчок в українському літературному каноні
