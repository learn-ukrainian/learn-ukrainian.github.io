content_outline:
- points:
  - 'Парадокс: як 70-річний полковник, щойно звільнений із царської в''язниці, стає останнім обраним гетьманом і символом
    стабілізації?'
  - '[!biography] Данило Апостол — ставленик імперії чи останній захисник автономії Гетьманщини?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Рішительні пункти» — це дипломатична перемога, що зберегла автономію, чи юридична фіксація поразки післямазепинської
    епохи?'
  - 'Дебат 2: Радянська історіографія vs сучасний погляд. Чи був Апостол «слухняним адміністратором» імперії, чи ефективним
    державним менеджером, що діяв у єдиному можливому коридорі?'
  - '[!epistemic-humility] Оцінки сучасників: від звинувачень у зраді ідеалів Мазепи до похвали за відновлення порядку.'
  - '[!decolonization] Аналіз «Рішительних пунктів» як інструменту імперського контролю, замаскованого під «даровані» права.'
  section: 'Конфліктна карта: Прагматизм чи капітуляція?'
  words: 900
- points:
  - 'Соціальний та історичний контекст: Гетьманщина після Полтавської битви, Перша Малоросійська колегія та епоха «безгетьманства».'
  - '45 років на посаді Миргородського полковника: формування адміністративного та військового досвіду.'
  - 'Участь у Північній війні та арешт: як ув''язнення в Петропавлівській фортеці вплинуло на його світогляд та подальшу стратегію.'
  section: 'Формування: Полковник, воїн, в''язень'
  words: 1000
- points:
  - '«Генеральне слідство про маєтності»: масштабна ревізія та повернення земель у державне користування як основа фінансової
    реформи.'
  - 'Судова реформа: ініціація створення кодексу «Права, за якими судиться малоросійський народ» — спроба уніфікації українського
    права.'
  - 'Економічне відродження: реформа казначейства, впорядкування торгівлі, стабілізація фінансової системи.'
  - 'Повернення запорожців та заснування Нової (Підпільненської) Січі: відновлення військового потенціалу та складний компроміс.'
  section: 'Діяльність: Будівничий інституцій'
  words: 1300
- points:
  - '[!anti-hagiography] Влада Апостола походила не від козацької ради, а від царського указу. Це був фундаментальний розрив
    із традицією гетьманської виборності.'
  - 'Втрата контролю над Києвом: підпорядкування міста напряму генерал-губернатору було важким ударом по автономії.'
  - '[!myth-buster] «Золота осінь» Гетьманщини? Стабільність та економічне зростання робили Україну ціннішим і легше керованим
    активом для імперії, прискорюючи її інтеграцію.'
  - 'Ціна компромісу: чи не була його тактика «малих справ» формою повільної капітуляції, що лише відтермінувала, але не запобігла
    ліквідації Гетьманщини?'
  section: 'Тінь: Ціна стабілізації'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь — Апостол був прагматиком, що врятував, що міг, чи колаборантом,
    що керував занепадом?'
  - 'Спадщина як інституційного будівничого: його реформи пережили його, ставши фундаментом для функціонування Гетьманщини
    до її остаточної ліквідації.'
  - Сорочинська Преображенська церква як символ культурного відродження та особистої побожності гетьмана.
  - '[!decolonization] Апостол — останній гетьман, що проводив відносно самостійну внутрішню політику. Його смерть відкрила
    шлях до остаточної інкорпорації України в Російську імперію.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Biography of Danylo Apostol, focusing on his reforms ("Reshytelni punkty", judicial and economic reforms), the compromises
  made with the Russian Empire, and the anti-hagiographical view of his legacy as a pragmatic stabilizer versus a manager
  of decline.
level: BIO
module: bio-028
objectives:
- Оцінити реформаторську діяльність Данила Апостола в економічній, судовій та адміністративній сферах
- Проаналізувати правовий статус Гетьманщини за «Рішительними пунктами» як інструмент компромісу та імперського контролю
- Дослідити економічне та культурне відродження Гетьманщини у 1727–1734 рр.
- Критично аналізувати компроміси та моральні неоднозначності в діяльності історичних постатей на прикладі Данила Апостола
