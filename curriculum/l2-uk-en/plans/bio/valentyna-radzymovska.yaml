content_outline:
- points:
  - 'Парадокс: Валентина Радзимовська — вчена зі світовим ім''ям, що відкрила нові шляхи в біохімії, але для власної держави
    вона виявилася «ворогом», якого треба знищити. Як людина, що присвятила життя вивченню життя, стала жертвою машини смерті?'
  - '[!biography] Коротка цитата з її наукової праці про біохімічні процеси, а поруч — уривок з протоколу допиту НКВС, де
    вона «зізнається» в антирадянській діяльності.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Природа «злочину». Радянська версія (терористка, націоналістка) vs історична реальність (сфабрикована справа
    в рамках планового знищення української інтелігенції). Аналіз риторики звинувачень.'
  - 'Дебат 2: Інтерпретація спадщини. Радянське забуття vs пострадянська віктимізація vs сучасна оцінка як символу втрачених
    можливостей української науки. [!decolonization] Чому важливо розглядати її не просто як «жертву сталінізму», а як ціль
    spezifisch антиукраїнської політики?'
  - '[!epistemic-humility] Визнання складності доступу до повних архівів та наявність «сірих зон» в біографіях, що пройшли
    через радянські жорна.'
  section: 'Конфліктна карта: Злочин і спадщина'
  words: 900
- points:
  - Соціальне та історичне тло: світ, в якому вона росла, обмеження для жінок в науці в Російській імперії.
  - Освіта та ранні впливи: ключові вчителі та поворотні моменти, що визначили її шлях до біохімії.
  - Наукове середовище 1920-х: короткий розквіт науки в УСРР в період українізації, створення наукових шкіл, атмосфера надій.
  section: 'Формування: Шлях до науки всупереч епосі'
  words: 1000
- points:
  - Основні напрямки досліджень Радзимовської: біохімія м''язового скорочення, фізіологія дитячого віку. Її місце в світовому
      науковому контексті.
  - 'Першоджерела: аналіз фрагментів її наукових публікацій. Яку мову вона використовувала? Які проблеми вирішувала?'
  - Внесок у створення української наукової термінології.
  - Організаційна діяльність: заснування кафедр, робота в ВУАН.
  section: 'Діяльність: Піонерка української біохімії'
  words: 1300
- points:
  - '[!anti-hagiography] Деконструкція образу «пасивної жертви». Радзимовська та її колеги до останнього продовжували працювати,
    усвідомлюючи ризики. Це була свідома позиція, а не наївність.'
  - '[!myth-buster] Розвінчання міфу про «окремі перегини на місцях». Справа Радзимовської як частина централізованої кампанії
    Великого терору.'
  - Хроніка репресій: арешт, сфабриковані звинувачення, конвеєр допитів, табір. Як працювала система ГУЛАГу зсередини.
  - Ціна, яку заплатили інші: доля її родини, аспірантів та колег.
  section: 'Тінь: Механізм знищення'
  words: 900
- points:
  - Повернення до парадоксу з розминки: що історія Радзимовської говорить нам про стосунки між наукою та владою в тоталітарних
      режимах?
  - '[!decolonization] Оцінка втрат: не просто вбивство однієї людини, а цілеспрямоване обезголовлення цілого покоління українських
    вчених та руйнування наукових шкіл.'
  - Процес реабілітації та меморіалізації. Чому відновлення її імені зайняло десятиліття?
  - Сучасна релевантність: як історія Радзимовської перегукується з сучасними спробами Росії знищити українську ідентичність
      та культуру.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life, scientific achievements, and tragic fate of biochemist Valentyna Radzymovska as a case study of the destruction
  of the Ukrainian scientific elite during the Great Terror.
level: BIO
module: bio-088
objectives:
- Аналізувати життя та трагічну долю Валентини Радзимовської як приклад знищення наукової еліти
- Оцінювати внесок вченої в українську та світову біохімію в контексті 1920-30-х років
- Простежувати механізми сталінського терору проти інтелігенції на прикладі сфабрикованої справи
- Формулювати аргументовану позицію щодо суперечливих інтерпретацій її «злочину» та спадщини
