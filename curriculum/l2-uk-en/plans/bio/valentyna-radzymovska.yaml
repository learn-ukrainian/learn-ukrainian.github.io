content_outline:
- points:
  - >-
    [!biography] Знайомство з Валентиною Радзимовською: фізіологиня й біохімікиня,
    засновниця української школи фізіологів, докторка наук, яка вивчала життя
    клітини й фізіологію дитини.
  - >-
    Провокаційне питання: як вчена, що пройшла крізь сфабриковану справу СВУ,
    усе ж не була страчена — а дожила свого віку у вигнанні, за океаном?
  - >-
    [!myth-buster] Застереження проти попередньої фальсифікації: вона НЕ була
    «жертвою машини смерті» й НЕ мала по батькові «Павлівна». Її заарештували
    1929 року, але звільнили 1930-го; страчено було її брата, не її.
  section: Розминка
  words: 400
- points:
  - >-
    Полтавське коріння: хутір Тарнавщина на Лубенщині, родина громадського діяча
    Василя Яновського й письменниці Любові Яновської. Домашня школа, гімназія з
    відзнакою, природничі жіночі курси в Петербурзі.
  - >-
    Шлях лікарки: Київські вищі жіночі курси, медичне відділення; 1913 року —
    ступінь лікаря з відзнакою, одна з близько шістдесяти жінок-медикинь тодішнього Києва.
  - >-
    Доба Української революції: рада Українського жіночого союзу (1917), головування
    в Київській міській українській раді (1918) — наука й національна громадська
    дія в одному житті.
  - >-
    [!decolonization] Наука як національний вибір: Радзимовська досліджує українських
    дітей і будує українську наукову школу — саме таку національно вкорінену науку
    радянська система згодом каратиме.
  section: 'Формування: Наука як національний вибір'
  words: 1000
- points:
  - >-
    Докторський прорив 1924 року: дисертація про вплив концентрації іонів водню (pH)
    на життя клітин поза організмом; результати друкують у The Journal of Physiology
    та Biochemische Zeitschrift. Звідси — професура у Київському інституті народної освіти.
  - >-
    [!biography] Жива деталь першоджерела: у дисертації Радзимовська згадує понад
    п'ятдесят серій дослідів і понад 1200 чашок з культивованими клітинами; чашок
    бракувало — і вона робила їх власноруч із денець звичайних пляшок, шліфуючи краї.
  - >-
    Українська школа фізіологів і біохіміків: монографія «Діти часів революції.
    Фізичний розвиток дітей України» (1923), дослідження біохімії туберкульозу,
    дитячої фізіології; близько 70 праць, членкиня НТШ та УВАН.
  - >-
    Наукова мова: ранні статті виходять і російською («Врачебное дело»), і німецькою —
    мовами тодішньої науки; українські ж праці й мюнхенський підручник засвідчують її
    національний науковий вибір.
  section: 'Діяльність: Українська школа фізіологів'
  words: 1200
- points:
  - >-
    [!myth-buster] Головне виправлення: 14 вересня 1929 року Радзимовську
    заарештовують у сфабрикованій справі «Спілки визволення України»; вона
    проводить близько семи місяців у слідчій камері й 29 березня 1930 року її
    звільняють. Її НЕ розстріляли і НЕ заслали в табір.
  - >-
    Переслідування після звільнення: її не допускають до кафедри «з політичних
    мотивів», ліквідовують її науково-дослідну кафедру педології, а 1940 року НКВС
    знову піднімає її стару слідчу справу.
  - >-
    [!anti-hagiography] Терор у родині: 1937 року заарештовано її брата Василя
    Яновського; 25 березня 1938 року його розстріляно за рішенням Особливої наради
    НКВС. Саме цю чужу долю стара версія плану помилково приписала самій Валентині.
  - >-
    [!epistemic-humility] Сірі зони: праця в установах під німецькою окупацією
    (1941–44) як переміщеної особи в розпачливих умовах; обмежений доступ до
    архівів. Семінар тримає чесну міру — без вибілювання і без очорнювання.
  section: 'Тінь: Сфабрикована справа, а не розстріл'
  words: 1600
- points:
  - >-
    Повернення до розминки: чому точна дуга «арешт → звільнення → переслідування →
    вигнання» важливіша за ефектну, але вигадану «страту»? Студент формулює відповідь.
  - >-
    Вигнання і наука: Братислава, Мюнхен (професура, двотомний підручник
    «Фізіологія людини та свійських тварин»), а з 1950 року — США, де вона живе в
    родині сина й помирає 1953 року.
  - >-
    [!decolonization] Повернення імені: 2024 року Київ перейменовує вулицю на честь
    Валентини Радзимовської; її спадщину повертають з еміграційного забуття в
    українську наукову традицію.
  - >-
    Сучасне відлуння: чому історія науки потребує точності джерел, а не зручних
    легенд; як режими стирають імена, а демократія їх повертає.
  section: 'Підсумок: Вигнання і повернення імені'
  words: 1000
focus: >-
  The life and legacy of physiologist-biochemist Valentyna Vasylivna Radzymovska,
  founder of a Ukrainian school of physiologists — focusing on the HONEST arc of
  persecution (the fabricated 1929 SVU arrest and 1930 release), professional
  blacklisting, her brother's execution, and her emigration and natural death in the
  USA in 1953. NOT a fabricated execution and NOT the wrong patronymic "Павлівна".
level: BIO
module: bio-110
objectives:
- >-
  Аналізувати внесок Валентини Радзимовської в українську фізіологію та біохімію
  (біохімія клітини, дитяча фізіологія, туберкульоз) і роль її наукової школи.
- >-
  Реконструювати реальну дугу її долі — арешт у справі СВУ, звільнення,
  переслідування, вигнання, смерть за кордоном — на основі перевірених джерел.
- >-
  Спростовувати вигадану версію про «страту» та хибне по батькові, відрізняючи
  задокументований факт від драматизованої легенди.
- >-
  Оцінювати, як радянська система переслідувала національно вкорінену науку і як
  сучасна Україна повертає стерті імена.
