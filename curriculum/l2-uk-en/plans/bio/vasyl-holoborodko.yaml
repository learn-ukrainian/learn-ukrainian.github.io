objectives:
- Розрізняти табірні репресії та культурно-професійне придушення на прикладі Голобородька.
- Аналізувати міфопоетичну лірику й ранній «анімістичний» світ поезії (ЕСУ).
- Оцінити роль самвидаву та розповсюдження *Інтернаціоналізм чи русифікація?* у його біографії.
- Розуміти регіональну українську ідентичність Луганщини без російськоцентричного спрощення.
