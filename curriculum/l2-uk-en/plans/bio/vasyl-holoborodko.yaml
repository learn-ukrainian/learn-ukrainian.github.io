content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Івановичем Голобородьком: поет покоління Київської школи,
    автор міфопоетичної лірики, постать, яку радянська система зробила майже невидимою в офіційному
    друці на два десятиліття.
  - >-
    Провокаційне питання: чи може держава знищити поета, не ув'язнюючи його — лише закривши
    двері навчання й друку?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 7 квітня 1945 року в селі Адріанопіль (Перевальський район, Луганщина); вступ
    до Київського університету 1964 року; переведення 1965 року в Донецький педагогічний інститут.
  - >-
    Спроба вступити до Московського літературного інституту (1967) — творчий конкурс пройдено,
    але до іспитів не допущено; служба у військово-будівельних частинах на Далекому Сході (1968–1970).
  - >-
    [!decolonization] Виключення на початку 1967 року за «дії, несумісні...» — за розповсюдження
    І. Дзюби *Інтернаціоналізм чи русифікація?*; механізм пов'язує літературну спільноту, самвидав
    і інституційне покарання.
  section: 'Формування: Київська школа та ціна самвидаву'
  words: 1000
- points:
  - >-
    *Летюче віконце* (1970, Smoloskyp, Baltimore) — перша збірка, опублікована поза межами
    Радянського Союзу; рання поезія з «світом давніх анімістичних уявлень» (ЕСУ).
  - >-
    Повернення до українського друку: *Зелен день* (1988), *Ікар на метеликових крилах* (1990),
    *Калина об Різдві* (1992); Шевченківська премія 1994 року за дві останні збірки.
  - >-
    Міфопоетика: фольклорні образи, анімістична уява, асоціативна логіка — не декоративний
    «фольклоризм», а глибинна поетична мова.
  section: 'Діяльність: Міфопоетика та «Летюче віконце»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Репресія Голобородька — переважно культурна й професійна, не табірна;
    не перебільшувати ув'язнення там, де досьє фіксує блокаду друку й виключення з навчання.
  - >-
    1969–1986 — відсутність офіційного друку в Україні; поет з Луганщини зроблений майже
    невидимим у радянському літературному просторі.
  - >-
    Точний наказ про виключення чи справа КДБ: у джерелах не знайдено — не вигадувати номерів
    документів.
  - >-
    2014 — переміщення через російську агресію/війну на сході (за даними Вікіпедії).
  section: 'Тінь: Виключення з навчання та заборона друку'
  words: 1600
- points:
  - >-
    «Мене підстрелили на злеті...» (інтерв'ю *Української літературної газети*, 2015) — метафора
    зламаної траєкторії без перетворення на табірну біографію.
  - >-
    [!myth-buster] Спрощення «поет, виключений за Дзюбу» не повинно затуляти власну поетику —
    міфопоетичний світ ранніх і пізніх збірок.
  - >-
    Живий автор (дата смерті в джерелах не зафіксована); сучасне значення як голос української
    поезії з Луганщини.
  section: 'Підсумок: Культурна цензура та повернення до друку'
  words: 1000
focus: >-
  Василь Голобородько — поет Київської школи, чия радянська «репресія» полягала у виключенні
  з навчання, блокаді друку й вимушеній еміграції текстів. Аналіз міфопоетики, *Летючого віконця*
  та культурного механізму примусу без ув'язнення.
