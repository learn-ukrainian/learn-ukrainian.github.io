content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Івановичем Голобородьком: поет покоління Київської школи,
    автор міфопоетичної лірики, постать, яку радянська система зробила майже невидимою в офіційному
    друці на два десятиліття.
  - >-
    Провокаційне питання: чи може держава знищити поета, не ув'язнюючи його — лише закривши
    двері навчання й друку?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 7 квітня 1945 року в селі Андріанопіль на Луганщині; навчання в Київському
    університеті 1964–1965 років і Донецькому педагогічному інституті 1966–1967 років.
  - >-
    [!decolonization] Виключення 1967 року за читання самвидавівської літератури; ЕСУ пов'язує
    цю підставу з інформацією секретаря Донецького обкому КПУ до ЦК КПУ від 30 січня 1967 року.
  section: 'Формування: Київська школа та ціна самвидаву'
  words: 1000
- points:
  - >-
    *Летюче віконце* (1970, «Смолоскип», Балтимор) — перша збірка, опублікована поза межами
    Радянського Союзу; ЕСУ описує ранню поезію через світ прадавніх анімістичних уявлень.
  - >-
    Повернення до українського друку: *Зелен день* (1988), *Ікар на метеликових крилах* (1990),
    *Калина об Різдві* (1992); Шевченківська премія 1994 року за дві останні збірки.
  - >-
    Міфопоетика: фольклорні образи, анімістична уява, асоціативна логіка — не декоративний
    «фольклоризм», а глибинна поетична мова.
  section: 'Діяльність: Міфопоетика та «Летюче віконце»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Репресія Голобородька — переважно культурна й професійна, не табірна;
    не перебільшувати ув'язнення там, де досьє фіксує блокаду друку й виключення з навчання.
  - >-
    Після закордонного видання «Летючого віконця» шлях до друку був майже на двадцять років
    закритий; точний суцільний діапазон не реконструювати без окремого джерела.
  - >-
    Точний наказ про виключення чи справа КДБ: у джерелах не знайдено — не вигадувати номерів
    документів.
  section: 'Тінь: Виключення з навчання та заборона друку'
  words: 1600
- points:
  - >-
    Заголовок інтерв'ю «Мене підстрелили на злеті» є назвою редакційної публікації; без локатора
    в тексті його не подавати як дослівну авторську репліку.
  - >-
    [!myth-buster] Спрощення «виключений поет» не повинно затуляти власну поетику —
    міфопоетичний світ ранніх і пізніх збірок.
  - >-
    У зареєстрованих джерелах немає дати смерті; не робити з цього ширших тверджень про теперішнє
    місце проживання, стан здоров'я або поточні ролі живого автора.
  section: 'Підсумок: Культурна цензура та повернення до друку'
  words: 1000
focus: >-
  Василь Голобородько — поет Київської школи, чия радянська «репресія» полягала у виключенні
  з навчання, блокаді друку й закордонному виданні ранньої книжки. Аналіз міфопоетики, *Летючого віконця*
  та культурного механізму примусу без ув'язнення.
