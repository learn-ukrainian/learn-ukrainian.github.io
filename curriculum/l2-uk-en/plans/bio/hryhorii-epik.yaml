content_outline:
- points:
  - >-
    [!biography] Знайомство з Григорієм Даниловичем Епіком: прозаїк, сатирист і
    учасник літературного середовища 1920-х, чия біографія ускладнює прості ярлики.
  - >-
    Провокаційне питання: як людина з партійним стажем (з 1919 року) і творами
    на радянські теми опинилася в когорті Розстріляного відродження?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 17 січня 1901 року в Кам'янці; робота на залізниці та на заводі;
    вступ до Комуністичної партії 1919 року.
  - >-
    Літературне середовище ВАПЛІТЕ — мережа, яку режим пізніше перекодував у «загрозу».
  - >-
    [!decolonization] Епік показує, що сталінський терор дисциплінував українську культурну агенцію — незалежно від офіційних партійних ярликів.
  section: 'Формування: Від залізниці до радянської прози'
  words: 1000
- points:
  - >-
    Ранній доробок: *Червона кобза* (1923), *На зломі* (1926); *Без ґрунту* (1928); *Непія* (1930); *Том сатири* (1930).
  - >-
    Сатира та соціальна діагностика — завдання відокремити сатиру від прямого схвалення офіційної ідеології.
  - >-
    [!anti-hagiography] Частина творів відповідає радянським літературним вимогам — це не скасовує факт розстрілу 1937 року.
  section: 'Діяльність: Сатира та романи 1920-х'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт 5 грудня 1934 року у сфабрикованій справі «контрреволюційної боротьбистської організації».
  - >-
    Вирок: 27–28 березня 1935 року на сесії Військової колегії Верховного Суду СРСР у Києві — 10 років таборів.
  - >-
    Друга фаза терору: ув'язнення в системі Соловків; рішення особливої трійки УНКВД
    Ленінградської області 9 жовтня 1937 року; розстріл 3 листопада 1937 року в
    Сандармоху, Карелія.
  - >-
    [!epistemic-humility] Відкинути застарілі радянські дати смерти («1942»). Листи з Соловків — первинне свідчення під тиском, не літературна проза.
  section: 'Тінь: Справа «боротбистів» та розстріл у Сандармоху'
  words: 1600
- points:
  - >-
    Доля спадщини: опубліковані романи збереглися; листи з Соловків — окремий голос під табірним тиском.
  - >-
    Сучасне значення: Епік як приклад сталінського терору проти українських культурних діячів-комуністів.
  - >-
    Кінцеве питання: як поєднати партійний стаж, сатиру та розстріл без санітизації чи демонізації?
  section: 'Підсумок: Комуніст, якого знищила та сама система'
  words: 1000
focus: >-
  Григорій Епік як прозаїк-сатирист усередині радянських інституцій і жертва сфабрикованої «боротьбистської» справи; аналіз двофазного механізму репресій.
level: BIO
