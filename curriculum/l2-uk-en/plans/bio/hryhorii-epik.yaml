objectives:
- Аналізувати прозовий доробок Епіка — сатиру та радянський регістр.
- Пояснювати, чому партійний стаж не захистив письменника від сталінського терору.
- Досліджувати двофазний механізм репресій — 10 років таборів (1935) та розстріл у Сандармоху (1937).
- Критично оцінювати спрощення біографії до «радянського письменника» або «невинної жертви».
