content_outline:
- points:
  - 'Провокація: Як одна з перших та найвідоміших жінок-лікарів Одеси могла бути майже повністю викреслена з історії на 70
    років?'
  - '[!biography] Коротка довідка без дат: Берта Рапопорт — лікарка, що лікувала бідних, і феміністка, що боролася за права
    жінок в медицині.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ким вона була в першу чергу — лікаркою чи громадською діячкою? Чи не заважала її політична активність медичній
    практиці, чи навпаки — вони були нероздільні?'
  - 'Дебат 2: Радянська vs сучасна інтерпретація. Чому радянська влада «забула» про неї (єврейка, феміністка, інтелектуалка),
    а сучасна Україна знову відкриває її для себе?'
  - '[!decolonization] Розгляд її спадщини поза російсько-імперською та радянською оптикою, повернення її в контекст українського
    жіночого руху.'
  - '[!epistemic-humility] Визнання, що її фемінізм, можливо, був елітарним і не завжди відповідав інтересам робітниць.'
  section: 'Конфліктна карта: Лікарка, феміністка чи «буржуазна» активістка?'
  words: 900
- points:
  - 'Контекст: становище єврейської жінки в Одесі в Російській імперії 1860-х — подвійна дискримінація.'
  - Прагнення до освіти як бунт проти патріархальних норм та державних обмежень ("процентна норма").
  - Навчання в Цюріху (Швейцарія) — центрі європейської еміграції та жіночої освіти. Яке середовище її сформувало?
  - Здобуття медичного диплома — не просто документ, а символ перемоги над системою.
  section: 'Формування: Освіта всупереч заборонам'
  words: 1000
- points:
  - 'Повернення до Одеси: медична практика, спеціалізація в акушерстві та гінекології, допомога бідним.'
  - Організація курсів для сестер милосердя, боротьба за відкриття Жіночого медичного інституту.
  - 'Публіцистична діяльність: статті про медичну етику, гігієну, необхідність жіночої освіти.'
  - '[!biography] Співпраця та конфлікти з іншими діячками жіночого руху, такими як Софія Русова та Наталія Кобринська.'
  section: 'Діяльність: Народна лікарка та лідерка жіночого руху'
  words: 1300
- points:
  - '[!anti-hagiography] Аналіз її приватної практики. Чи завжди її послуги були доступні для найбідніших, чи вона більше
    орієнтувалася на заможних клієнток?'
  - 'Критика її діяльності з боку соціалістичних рухів: чи був її фемінізм «буржуазним», відірваним від проблем робітничого
    класу?'
  - '[!myth-buster] Розвінчання міфу про «безкорисливу святу». Вона була професіоналом, яка заробляла на життя своєю працею.
    Якими були її стосунки з грошима?'
  - Професійні невдачі, медичні помилки, складні випадки — спроба побачити живу людину за образом успішної лікарки.
  section: 'Тінь: Ціна успіху та «буржуазний» фемінізм'
  words: 900
- points:
  - 'Повернення до розминки: Чому її забули і чому згадали? Студент формулює відповідь, використовуючи знання про радянську
    політику пам''яті та сучасні процеси деколонізації.'
  - 'Внесок у розвиток жіночої медицини в Україні: що змінилося завдяки їй та її послідовницям?'
  - 'Роль у феміністичному русі: наскільки її ідеї актуальні сьогодні?'
  - '[!decolonization] Берта Рапопорт як символ повернення забутих імен української історії, що не вписувалися в радянський
    канон.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and legacy of Berta Rapoport, one of Ukraine's first female doctors, focusing on her struggle for women's
  rights in medicine and the complexities of her legacy.
level: BIO
module: bio-107
objectives:
- Аналізувати життя та спадщину Берти Рапопорт крізь призму її медичної та громадської діяльності
- Критично оцінювати її внесок, враховуючи як досягнення, так і можливі суперечності («тіньовий» бік)
- Простежувати боротьбу жінок за право на освіту та професію в Російській імперії наприкінці XIX ст.
- Пояснювати причини «забуття» та «повернення» історичних постатей в залежності від політичного контексту
pedagogy: CBI
