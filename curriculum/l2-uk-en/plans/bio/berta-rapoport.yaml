content_outline:
- points:
  - >-
    [!biography] Знайомство з Бертою Рапопорт: одеситка, одна з перших жінок —
    капітанів далекого плавання в СРСР і на Чорному морі, про яку лондонська
    газета написала «Перша у світі жінка-моряк».
  - >-
    Провокаційне питання: як усесвітньо відому морячку, чиє ім'я знали від Одеси
    до Лондона, могли майже на сім десятиліть викреслити з офіційної пам'яті?
  - >-
    [!myth-buster] Застереження проти попередньої фальсифікації: вона НЕ була
    лікаркою і НЕ мала по батькові «Ісаківна». Семінар працює з перевіреною
    постаттю — Берта Яківна Рапопорт, капітанка далекого плавання.
  section: Розминка
  words: 400
- points:
  - >-
    Єврейська родина в Одесі початку XX століття: батько-тесля Яків Григорович,
    мати Рашель Аронівна. Середовище портового міста, де море було поруч, а фах
    моряка вважався суто чоловічим.
  - >-
    Освітній прорив: 1928 року Берта закінчує школу і вступає до Одеського
    морського технікуму на відділення судноводіння — всупереч стереотипу «жінкам
    у морі не місце». 1931 року отримує диплом штурмана далекого плавання.
  - >-
    [!decolonization] Повернення постаті в український та одеський контекст: не
    «радянське досягнення взагалі», а конкретна єврейсько-українська жінка, яка
    зламала гендерний бар'єр у власному місті.
  - >-
    [!epistemic-humility] Межі джерел: рік народження подають і як 1914, і як
    1911 (картка 1944 року); назву першого пароплава фіксують по-різному. Семінар
    показує, як визнавати такі розбіжності, а не згладжувати їх.
  section: 'Формування: Море замість заборон'
  words: 1000
- points:
  - >-
    Кар'єрна драбина в Чорноморському пароплавстві з 1932 року: від четвертого
    помічника на пароплаві «Батумрада» до другого помічника на «Катаямі», а з
    лютого 1936 року — старший помічник капітана (старпом).
  - >-
    Світове визнання: коли «Катаяма» пришвартувалася в Лондоні, місцева газета
    вийшла із заголовком «Перша у світі жінка-моряк». Аналіз того, як гендерний
    виняток перетворюється на медійну сенсацію.
  - >-
    [!biography] Іспанський полон 1938 року: «Катаяму» захоплено під час
    громадянської війни в Іспанії; Берта з екіпажем провела близько восьми
    місяців у фашистському таборі. Епізод, який згодом обернеться проти неї.
  - >-
    Вершина фаху: 1941 року — старпом на пасажирському теплоході «Молдавія», а в
    листопаді 1941-го її направляють у Каспійське морське пароплавство і
    призначають капітанкою теплохода «Туркменістан».
  section: 'Діяльність: Від штурманки до капітанки'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Складна правда замість ікони: Рапопорт чесно служила
    радянському торговому й воєнному флоту під час Другої світової війни (медаль
    1946 року). Семінар не робить із неї ані бездоганної святої, ані антирадянської
    дисидентки.
  - >-
    Механізм усунення: після війни її прибирають із капітанського містка на
    берегові посади. Одне з джерел прямо називає звільнення «за національною
    ознакою» — тобто через єврейство, у роки державної антисемітської кампанії.
  - >-
    [!myth-buster] Покарання за полон: 1962 року її висувають на звання
    «Почесний працівник морського флоту», але відмовляють — колишню бранку
    фашистського табору радянська система вважала політично підозрілою.
  - >-
    [!epistemic-humility] Природа репресії: тут немає ні арешту, ні вироку, ні
    розстрілу. Є інше — фахова маргіналізація й поступове стирання імені з
    офіційної пам'яті. Назвати це точно — частина наукової чесності.
  section: 'Тінь: Радянська підозра та антисемітизм'
  words: 1600
- points:
  - >-
    Повернення до розминки: чому її забули і чому згадали? Студент формулює
    відповідь, спираючись на радянську політику пам'яті, державний антисемітизм і
    сучасні процеси деколонізації.
  - >-
    Повернення імені: меморіальний барельєф у порту Одеси (2006), документальні
    фільми, проєкти з жіночої та локальної історії, що відновлюють її постать.
  - >-
    [!decolonization] Берта Рапопорт як символ повернення забутих імен —
    першопрохідниці, чию спадщину радянський наратив привласнив або стер, а
    незалежна Україна повертає у власний пантеон.
  - >-
    Сучасне відлуння: жінки в традиційно «чоловічих» професіях сьогодні; чому
    важливо вести історію постаті від джерел, а не від зручної легенди.
  section: 'Підсумок: Повернення імені'
  words: 1000
focus: >-
  The life and legacy of Berta Yakivna Rapoport, one of the first women sea-captains
  in the USSR and on the Black Sea, focusing on her breaking of the gender barrier in
  navigation, her wartime command of the m/v Turkmenistan, and the honest mechanism
  of her post-war marginalization (Soviet antisemitism and suspicion of former
  captives) and memorial erasure — NOT a fabricated career as a doctor.
level: BIO
module: bio-129
objectives:
- >-
  Аналізувати життя та спадщину Берти Рапопорт як піонерки судноводіння крізь
  призму гендерного бар'єру в морському фаху.
- >-
  Реконструювати її кар'єрний шлях від штурманки до капітанки теплохода
  «Туркменістан» на основі перевірених джерел, відділяючи факти від легенди.
- >-
  Пояснювати механізм повоєнного усунення та забуття постаті (радянський
  антисемітизм, підозра до колишніх бранців) без перебільшення його до «терору».
- >-
  Оцінювати причини «забуття» і «повернення» історичних постатей залежно від
  політичного контексту та політики пам'яті.
pedagogy: CBI
