content_outline:
- points:
  - 'Парадокс: як людина, яку радянська система намагалася стерти з історії, стала моральним камертоном для незалежної України?'
  - '[!biography] Мирослав Маринович — один із засновників Української Гельсінської групи, в''язень сумління, публіцист і діяч Українського католицького університету.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Радянський період): «Небезпечний антирадянський елемент» (позиція КДБ) vs «Борець за права людини» (позиція дисидентів та Amnesty International). Як система конструювала образ ворога?'
  - 'Дебат 2 (Сучасність): Чи може глибоко віруюча людина (греко-католик) бути моральним авторитетом для всієї, дедалі більш секулярної, нації? Дискусія про роль релігії в публічному просторі.'
  - '[!epistemic-humility] Визнання, що для радянської влади, яка боролася за виживання, діяльність УГГ справді становила екзистенційну загрозу.'
  - '[!decolonization] Розвінчання радянського наративу про дисидентів як «купку відщепенців, проплачених Заходом».'
  section: 'Конфліктна карта: Злочинець чи правозахисник?'
  words: 900
- points:
  - 'Соціальний та історичний контекст: повоєнна радянська Україна, атмосфера подвійного мислення.'
  - 'Родинне виховання у Дрогобичі: вплив сім''ї, що зберегла національну пам''ять.'
  - 'Навчання у Львові, перші контакти з інакодумцями: інтелектуальне пробудження та усвідомлення брехливості системи.'
  - 'Формативний досвід: що перетворило успішного радянського студента на дисидента, готового ризикувати усім.'
  section: 'Формування: Від Дрогобича до інакодумства'
  words: 1000
- points:
  - 'Створення УГГ у 1976 році: відповідь на підписання СРСР Гельсінських угод. Головний принцип: «Вимагати від влади дотримуватися власних законів».'
  - 'Роль Мариновича як секретаря-засновника: документування порушень прав людини, написання меморандумів, звернення до світової громадськості.'
  - 'Первинне свідчення: аналіз авторизованого інтерв''ю Мариновича про участь в УГГ. Якою мовою він ретроспективно описує рішення, ризик і відповідальність?'
  section: 'Діяльність: Заснування Української Гельсінської групи'
  words: 1300
- points:
  - '[!anti-hagiography] Арешт 1977 року та вирок: 7 років таборів суворого режиму і 5 років заслання; фактичну тривалість не можна прирівнювати до повного строку без хронологічної перевірки.'
  - 'Табірний досвід: щоденна боротьба за виживання та збереження людської гідності. Духовне зростання через страждання.'
  - '[!myth-buster] Дисидентство — це не романтична пригода. Це важка, виснажлива праця, що руйнувала сім''ї та здоров''я. Розгляд особистої ціни, яку заплатив Маринович та його близькі.'
  - 'Критика зсередини: чи були стратегії дисидентів єдиними? Короткий огляд дебатів про тактику всередині правозахисного руху.'
  section: 'Тінь: Ціна совісті'
  words: 900
- points:
  - 'Повернення до розминки: Як Маринович ретроспективно пов''язує табірний досвід зі своєю пізнішою публічною та інституційною працею?'
  - '[!decolonization] Маринович як приклад деколонізації свідомості: відмова грати за правилами імперії та наполягання на власній суб''єктності.'
  - 'Пізніша роль: публіцист, релігієзнавець і діяч УКУ; оцінка його сучасних позицій потребує окремих прямих текстів.'
  - 'Фінальне питання: Які уроки з життя Мирослава Мариновича є найважливішими для України, що воює за своє існування сьогодні?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: 'Biography of Myroslav Marynovych: dissident movement, Ukrainian Helsinki Group, Gulag experience, role as a modern moral authority and public intellectual.'
level: BIO
module: bio-170
objectives:
- Аналізувати життя та діяльність Мирослава Мариновича в контексті радянської та пострадянської історії України
- Критично оцінювати протилежні наративи (радянський vs правозахисний) щодо дисидентського руху
- Пояснювати унікальну роль Української Гельсінської групи як форми ненасильницького опору
- Формулювати аргументовану позицію щодо значення морального авторитету в суспільстві, що переживає кризу
