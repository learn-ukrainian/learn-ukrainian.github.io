content_outline:
- points:
  - 'Провокація: чи не є вибір книжок для нових дорослих читачів політичним актом, коли держава вирішує, якою мовою й за якими текстами можна вчити?'
  - '[!biography] Знайомство з педагогинею й організаторкою: дівчина, якій відмовляли у формальній освіті, стала засновницею жіночої недільної школи, що працювала близько п''ятдесяти років.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (громадянська освіта): Алчевська будувала інституцію дорослої грамотності — доброволиці-вчительки, розклад, бібліотеки, бібліографічний метод, а не просто «любов до просвіти».'
  - 'Позиція 2 (деколонізаційна): рамка — українська громадська освіта під імперською цензурою, Харківська громада, жіноча освіта й пам''ять про Шевченка, а не «російська педагогіка».'
  - '[!decolonization] Приватний бюст Шевченка у харківському саду Алчевських (1899/1900) показує, як приватний простір обходив заборони на публічні пам''ятники; «перший в Україні» — з позначкою джерела.'
  - '[!epistemic-humility] Найбільший ризик — сплутати матір Христину Данилівну (1841-1920) з донькою-поетесою Христею Олексіївною (1882-1931); їхні твори, дати й політику не змішуємо.'
  section: 'Конфліктна карта: Приватна доброчинність чи громадянська освіта?'
  words: 900
- points:
  - 'Походження: народжена 1841 року в Борзні; батько Данило Журавльов — учитель; оповідь про батькову протидію жіночій освіті та її самоосвіту подаємо з позначкою джерела.'
  - 'Псевдонім і публічне слово: у 1860-х листування з герценівським «Колоколом» пов''язують із псевдонімом «Українка»; жінка входить у публічний друк.'
  - 'Харків: 1862 року шлюб з Олексієм Алчевським — банкіром і меценатом — і переїзд до Харкова; це партнерство й ресурсна мережа, а не привід робити її біографію похідною.'
  - '[!decolonization] Валуєвський циркуляр і Емський указ — ширший контекст того, чому офіційні матеріали й назви часто мусили виходити російською.'
  section: 'Формування: Борзна, самоосвіта й «Українка»'
  words: 1000
- points:
  - 'Заснування й визнання: неформальна школа з 1862 року, офіційне визнання 1870-го — ліцензії, інспектори, навчальна програма й правова мова імперії.'
  - 'Масштаб (з позначкою джерела): понад 100 доброволиць-учительок, спеціально збудований коштом Алчевської будинок (1896), тисячі неписьменних, яких навчила школа.'
  - 'Метод: «Що читати народові?» (три томи, 1884-1906) з понад тисячею анотацій та «Книга дорослих» (три томи, 1899-1917) перетворили вибір і придатність текстів для нових читачів на бібліографічний метод.'
  - 'Село й розрив: Олексіївська школа (1879) на маєтку Алчевських, де згодом учителював Борис Грінченко, пов''язує міську працю з сільською школою й суперечкою про мову навчання.'
  section: 'Діяльність: Харківська жіноча недільна школа й метод читання'
  words: 1300
- points:
  - '[!anti-hagiography] Школа спиралася на приватне багатство, меценатство й працю доброволиць — це робило її можливою, але й патерналістським народно-просвітницьким проєктом, а не низовою селянською самоорганізацією.'
  - 'Мовний компроміс: офіційна програма діяла під наглядом інспекторів, тож частина матеріалів і назв була російськомовною; це стратегічний компроміс, а не доказ антиукраїнської ідентичності.'
  - '[!myth-buster] Розрив із Грінченком — реальна суперечка стратегій: він обстоював українськомовне навчання, вона — збереження відкритих шкіл під наглядом; не робимо Грінченка єдиним «справжнім українцем», а Алчевську — єдиною компромісницею.'
  - 'Межа доброчинності: питаємо, що приватна доброчинність може й чого не може розв''язати, коли держава контролює мову, програму й інспекцію; школа закрилася близько 1919 року, Алчевська померла 1920-го.'
  section: 'Тінь: Ціна патронату й мовний компроміс'
  words: 900
- points:
  - 'Повернення до розминки: чому «Що читати народові?» — це метод і політика, а не просто добірка книжок?'
  - 'Жінки будують інституції: біографію Алчевської читаємо поряд із Софією Русовою, Наталією Кобринською й Оленою Пчілкою як історію жіночого інституційного будівництва.'
  - '[!epistemic-humility] Числа (17 000 учнів, 100 доброволиць, 50 000 карбованців, 40 видань) корисні, але подаємо їх із позначкою джерела, бо різні статті рахують періоди й заклади по-різному.'
  - 'Карта: Борзна, Харків, Олексіївка — компактний маршрут від Чернігівщини до Слобожанщини; смерть матері 1920 року не плутаємо зі смертю доньки 1931-го.'
  section: 'Дискусія та підсумок: Список книжок як політика'
  words: 700
focus: Khrystyna Alchevska (1841-1920) taught as a Ukrainian adult-education organizer, bibliographer, and founder of the Kharkiv women's Sunday school, so that choosing books for new readers reads as a political and pedagogical act under imperial censorship; the Russian-language titles of her manuals are read as an imperial print constraint rather than an identity, the Hrinchenko rift is kept as a real strategic dispute inside Ukrainian education rather than a morality play, and the elite private patronage that made the school possible is held visible as anti-hagiography beside the achievement.
