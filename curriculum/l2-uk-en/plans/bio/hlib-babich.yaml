      - Розрізнення первісної збірки 2021 року та доповненого видання 2024 року.
      - Атрибуція відомостей про службу, громадську організацію та загибель конкретним публікаторам.
      - Відмова від непідтверджених кількісних оцінок, обставин загибелі та цитат із пісень.
