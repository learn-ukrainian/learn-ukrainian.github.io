content_outline:
- points:
  - >-
    [!biography] Знайомство з Глібом Бабичем (позивний "Лєнтяй"): український поет,
    автор пісень, громадський діяч та ветеран шести бойових ротацій у складі 10-ї ОГШБр.
  - >-
    Вступне питання: як військовий досвід трансформує мову поезії та чому окопна
    лірика стає голосом цілого покоління?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та ранні роки: народження в Миколаєві у родині інженера та лікарки.
    Захоплення музикою та поезією з юності.
  - >-
    Реакція на агресію 2014 року: добровільний вступ до лав Збройних Сил України.
    П'ять років служби, шість ротацій на передовій.
  - >-
    Світоглядний злам: переосмислення ідентичності. Аналіз слів поета про роки війни
    як "найбільш щирі й чесні та осмислені роки" життя.
  section: 'Формування: Шлях до зброї та слова'
  words: 1000
- points:
  - >-
    Творча спадщина: понад 500 віршів та пісень. Співпраця з гуртом Kozak System.
  - >-
    Гімн "Едельвейсів": створення пісні "Подай зброю" (2018), яка стала неофіційним
    гімном 10-ї гірсько-штурмової бригади.
  - >-
    Сакралізація втрат: пісня "Мольфар" як глибокий реквієм за загиблими українськими
    воїнами.
  - >-
    Збірка "Вірші та пісні" (2021): фіксація мовного переходу та окопних реалій
    через двомовність ранніх творів та остаточний перехід на українську.
  section: 'Діяльність: Від "Подай зброю" до "Віршів та пісень"'
  words: 1300
- points:
  - >-
    Цивільна активність: створення громадської організації "Брати по зброї" після
    демобілізації, підтримка ветеранського руху.
  - >-
    Повномасштабне вторгнення (2022): повернення до активної боротьби, служба у Силах
    територіальної оборони та підтримка рідної бригади.
  - >-
    [!anti-hagiography] Війна без прикрас: загибель (28 липня 2022 року) поблизу міста
    Ізюм на Харківщині внаслідок підриву автомобіля на російській протитанковій міні.
  - >-
    Безпосередній наслідок: фізичне знищення видатного сучасного українського мілітарного
    поета російською військовою машиною.
  section: 'Тінь: Бої на Харківщині та загибель'
  words: 1500
- points:
  - >-
    Стилістика окопної поезії: поєднання армійського сленгу, темного мілітарного
    прагматизму та високих сакральних образів.
  - >-
    Посмертне видання: двомовна збірка "Камуфляжна мадонна" (2024), що закріпила
    місце Бабича в каноні сучасної військової літератури.
  - >-
    Сучасне значення: поезія Бабича як інструмент пам'яті та формування сучасної
    української ідентичності.
  section: 'Підсумок: Поезія, що тримає стрій'
  words: 1000
