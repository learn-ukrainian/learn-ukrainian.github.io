  - Легітимація державності
  words: 700
- section: Галицька митрополія
  points:
  - Переїзд Київського митрополита до Володимира-на-Клязьмі (1299)
  - Переговори з Константинополем
  - Заснування Галицької митрополії (1303)
  - Церковна незалежність від півночі
  words: 700
- section: Зовнішня політика та кінець правління
  points:
  - Відносини з Золотою Ордою
  - Данницька залежність при Тохті
  - Три шлюби та династичні зв'язки
  - Смерть та криза престолонаслідування
  words: 700
- section: Підсумок — Завершення королівської епохи
  points:
  - Сини Андрій та Лев II — останні Романовичі
  - Загибель династії (1323)
  - Спадщина королівської традиції
  words: 800
