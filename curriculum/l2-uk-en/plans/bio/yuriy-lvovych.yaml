objectives:
- Аналізувати значення королівського титулу 'Rex Russiae' в контексті легітимації влади.
- Оцінювати роль створення Галицької митрополії для утвердження церковної та державної незалежності.
- Засвоїти лексику, пов''язану із середньовічною державністю, церковною організацією та дипломатією.
- Критично аналізувати суперечливі аспекти правління Юрія І, зокрема його стосунки з Ордою та династичну кризу.
