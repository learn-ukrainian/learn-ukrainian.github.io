content_outline:
- points:
  - 'Провокація: Як можна бути суверенним "Королем Русі" і водночас платити данину Орді? Парадокс правління Юрія І.'
  - 'Артефакт: Печатка з написом "Georgius Dei gratia Rex Russiae" — символ амбіцій чи політичний блеф?'
  - '[!biography] Юрій І — онук першого короля Русі Данила, але його спадщина набагато складніша, ніж просто продовження династії.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Сучасники): Чи визнавали сусіди (Польща, Угорщина, Литва) королівський титул Юрія рівним своєму? Аналіз династичних
    шлюбів та дипломатичних листів як індикатор статусу.'
  - 'Дебат 2 (Історіографія): Російська та радянська історіографія применшувала значення Королівства Русі, щоб представити
    Москву єдиним спадкоємцем Києва. Як сучасна українська наука повертає цю спадщину?'
  - '[!epistemic-humility] Титул "Rex Russiae" був одночасно і претензією на спадщину всієї Русі, і спробою інтегруватися
    в католицьку Європу, залишаючись православним правителем.'
  - '[!decolonization] Розгляд Юрія І не як "малоросійського князя", а як самостійного європейського монарха, що боровся за
    державність.'
  section: 'Конфліктна карта: Король чи Князь?'
  words: 900
- points:
  - 'Династійний контекст: народження в родині Лева Даниловича та угорської принцеси Констанції. Виховання в тіні великого
    діда — короля Данила.'
  - 'Ранній досвід: князювання в Белзі (1264-1301) як школа управління та дипломатії в умовах постійної загрози.'
  - 'Соціально-політичне тло: роздроблена Русь після монгольської навали, зростання могутності сусідів та постійна загроза
    з боку Золотої Орди.'
  - 'Переломний момент: смерть батька Лева у 1301 році та необхідність об''єднати Галичину та Волинь під своєю владою.'
  section: 'Формування: Син Лева, Онук Данила'
  words: 1000
- points:
  - 'Державотворення: Успішне об''єднання Галичини та Волині, укріплення Львова як столиці, економічна політика (запрошення
    німецьких колоністів).'
  - 'Коронація та легітимація: Прийняття титулу "Король Русі" (бл. 1303) як свідоме продовження справи Данила Галицького та
    протиставлення північно-східним князівствам.'
  - 'Дипломатичний тріумф: Заснування Галицької митрополії (1303) у відповідь на переїзд київського митрополита на північ.
    Утвердження церковної незалежності від Володимира-на-Клязьмі.'
  - 'Первинні джерела: аналіз текстів грамот та опис королівської печатки Юрія І.'
  section: 'Діяльність: Об''єднання та Церковна Незалежність'
  words: 1300
- points:
  - '[!anti-hagiography] Данницька залежність: Юрій І не був "борцем з Ордою". Він був прагматичним данником хана Тохти, що
    купував мир і стабільність ціною золота та визнання зверхності.'
  - 'Компроміси: Запрошення іноземних колоністів для розвитку економіки, що могло викликати напругу з місцевою знаттю.'
  - 'Людський вимір династичних шлюбів: три шлюби як інструменти зовнішньої політики. Якою була доля його дружин та дітей
    у цих політичних іграх?'
  - '[!myth-buster] Міф про повну незалежність. "Королівство Русі" за Юрія — це історія не стільки про військову могутність,
    скільки про мистецтво дипломатичного виживання між католицьким Заходом та монгольським Сходом.'
  - Фатальний прорахунок? Нездатність забезпечити стабільне престолонаслідування. Загибель обох його синів у 1323 році обірвала
    династію Романовичів.
  section: 'Тінь: Ціна виживання'
  words: 900
- points:
  - 'Повернення до розминки: Як тепер ми можемо оцінити парадокс "короля-данника"? Це була ознака слабкості чи вершина прагматичної
    політики, що забезпечила "золоту осінь" Королівства Русі?'
  - 'Тривка спадщина: Королівський титул та Галицька митрополія як два стовпи, що на століття вперед заклали ідею української
    державності та її європейської ідентичності.'
  - '[!decolonization] Спадщина Юрія І як аргумент проти російської монополії на історію Київської Русі.'
  - 'Кінець епохи: Трагічна загибель його синів Андрія та Лева II і занепад королівства як нагадування про крихкість державності
    в епоху імперій.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Юрій I Львович як творець держави та заручник геополітики: аналіз його королівського титулу, заснування Галицької
  митрополії та вимушених компромісів з Ордою.'
