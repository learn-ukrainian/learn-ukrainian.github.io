objectives:
- Аналізувати феномен «бойчукізму» як унікальної школи українського монументального мистецтва.
- Критично оцінювати стосунки митця з тоталітарною владою на прикладі долі Михайла Бойчука.
- Розрізняти поняття «формалізм», «націоналізм» та «соцреалізм» у контексті радянської культурної політики 1930-х років.
- Формулювати аргументовану позицію щодо спадщини митця, твори якого були майже повністю знищені.
