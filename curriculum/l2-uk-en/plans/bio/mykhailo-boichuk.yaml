content_outline:
- points:
  - 'Провокація: Михайло Бойчук мріяв створити «великий стиль» для нової України, що сягав корінням Візантії. Його розстріляли
    за «буржуазний націоналізм». Як мистецтво, що прагнуло бути колективним та народним, стало смертельно небезпечним для
    художника?'
  - '[!biography] Показ однієї з небагатьох вцілілих фотографій фресок Бойчука — без коментаря, щоб студент відчув втрату.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Бойчукізм» — це архаїзація чи авангард? Дискусії 1920-х років між послідовниками Бойчука та конструктивістами/футуристами
    про роль мистецтва в новому суспільстві.'
  - 'Дебат 2: Радянська критика звинувачувала Бойчука у «формалізмі» та «націоналізмі». Сучасні дослідники бачать у цьому
    спробу знищити самобутню українську художню школу, що не вписувалася в рамки соцреалізму.'
  - '[!epistemic-humility] Чи був бойчукізм справді «пролетарським» мистецтвом, чи радше інтелектуальною конструкцією, що
    використовувала народні мотиви?'
  - '[!decolonization] Радянська історіографія викреслила бойчукізм з історії мистецтва, представивши його як «ворожий» епізод.
    Повернення Бойчука в український канон — це акт культурної деколонізації.'
  section: 'Конфліктна карта: Мистецтво для мас чи формалізм?'
  words: 900
- points:
  - 'Європейський контекст: навчання у Кракові, Мюнхені та Парижі. Вплив символізму, Поля Серюзьє та ідей групи «Набі».'
  - Відкриття Візантії та італійського Проторенесансу (Джотто) як джерела для нового монументального мистецтва.
  - 'Формулювання основних принципів у паризькій майстерні: синтез мистецтв, площинність, ритм, колективна творчість.'
  - Повернення в Україну з готовою концепцією «великого стилю», заснованого на національній традиції, але зверненого у майбутнє.
  section: 'Формування: Від Галичини до Парижа'
  words: 1000
- points:
  - Заснування Української академії мистецтв у 1917 році та створення майстерні монументального живопису.
  - '«Бойчукісти» як школа-комуна: колективна праця над фресками, спільний побут, єдиний стиль. Імена учнів: Іван Падалка,
    Василь Седляр, Софія Налепинська-Бойчук.'
  - 'Найважливіші реалізовані проєкти (всі знищені): розписи Луцьких казарм у Києві (1919), санаторію на Хаджибейському лимані
    (1928), Червонозаводського театру в Харкові (1933-1935).'
  - 'Стилістичні особливості: гармонія, ритмічність композицій, використання темперно-клейової техніки, звернення до образів
    селянського життя та української історії.'
  section: 'Діяльність: Народження «бойчукізму»'
  words: 1300
- points:
  - '[!anti-hagiography] Чи не була ідея колективної творчості, де індивідуальність художника розчиняється в «школі», небезпечно
    близькою до тоталітарної ідеї придушення особистості? '
  - 'Компроміси з владою: Бойчук та його учні виконували ідеологічні замовлення, намагаючись наповнити їх власним змістом.
    Чи була ця стратегія виправданою?'
  - '[!myth-buster] Міф про Бойчука як «націоналіста». Насправді, його звинуватили у створенні «контрреволюційної організації»
    з метою відірвати Україну від СРСР. Його мистецтво було лише приводом.'
  - 'Трагедія учнів: Бойчука стратили разом із його найталановитішими учнями. Знищення школи було таким же цілеспрямованим,
    як і знищення фресок.'
  section: 'Тінь: Ціна «великого стилю»'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати відповідь — чому мистецтво Бойчука, що прагнуло гармонії та слугувало
    колективу, було сприйняте тоталітарною системою як екзистенційна загроза.'
  - 'Спадщина через відсутність: оскільки майже всі роботи знищені, спадщина Бойчука — це легенда, ідея, школа, що існує в
    архівах, спогадах та небагатьох ескізах. Це «мистецтво-привид».'
  - '[!decolonization] Сучасне значення бойчукізму — це символ знищеного, але непереможеного українського модернізму. Його
    історія є аргументом проти «спільної культурної спадщини» з Росією.'
  - 'Вплив на наступні покоління: від шістдесятників до сучасних українських митців, які шукають у бойчукізмі джерело національної
    ідентичності в мистецтві.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Михайло Бойчук, творець школи «бойчукізму», його спроба створити український «великий стиль», конфлікт із тоталітарною
  системою та трагічне знищення в добу Розстріляного відродження.
