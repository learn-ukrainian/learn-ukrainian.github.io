objectives:
- >-
  Аналізувати життя Івана Кандиби як юриста-правозахисника, що обернув фах проти режиму —
  від справи УРСС до Української Гельсінської групи.
- >-
  Досліджувати механізм радянських репресій: два строки (близько 25 років),
  адміністративний нагляд, карцер та умову публічного зречення.
- >-
  Розрізняти правозахисну спадщину УГГ і пізнішу партійну політику Кандиби, застосовуючи
  принципи анти-агіографії.
- >-
  Оцінювати «Звернення до Комісії прав людини при ООН» (1969) як стратегію апеляції до
  міжнародного права проти імперських репресій.
