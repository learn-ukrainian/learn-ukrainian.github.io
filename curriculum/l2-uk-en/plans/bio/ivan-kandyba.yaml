content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Кандибою: юрист і правозахисник, співзасновник
    Української Гельсінської групи (1976), що віддав таборам близько двадцяти п''яти
    років за два строки.
  - >-
    Провокаційне питання: як юрист із радянською освітою обернув фах проти режиму — і
    чому народна пам''ять згадує лише «співзасновника УГГ», стираючи ранішу справу УРСС?
  - >-
    [!epistemic-humility] Дослівних першоособових цитат Кандиби в доступних джерелах не
    засвідчено; його голос зберігся через співавторські документи спротиву — читаємо
    документи, а не вигаданий внутрішній монолог.
  section: Розминка
  words: 400
- points:
  - >-
    Витоки: народження 1930 року в селі Стульно на Холмщині; родину примусово переселено
    до УРСР 1945 року в межах польсько-радянських обмінів населенням.
  - >-
    Юридичний фах: випускник юридичного факультету Львівського університету (1953);
    робота нотаріусом, народним суддею та адвокатом у Глинянах до 1961 року.
  - >-
    [!decolonization] Депортацію 1945 року варто читати як частину імперської інженерії
    населення, а не «природну» міграцію; вона сформувала життєвий старт Кандиби.
  - >-
    Перехід: юридична освіта стане інструментом, який він згодом оберне проти самого режиму.
  section: 'Формування: Юрист із депортованої родини'
  words: 1000
- points:
  - >-
    Справа УРСС: підтримка підпільної Української робітничо-селянської спілки Левка
    Лук''яненка, поширення газети «Наше слово» та програми; серед сімох заарештованих
    1961 року, вирок — п''ятнадцять років таборів суворого режиму (Мордовія, Пермщина,
    Володимирська в''язниця).
  - >-
    Апеляція до світу: 1969 року — співавторство «Звернення до Комісії прав людини при
    ООН» (разом із Лук''яненком і Михайлом Горинем) про геноцид політв''язнів; стратегія
    звернення до міжнародних правозахисних інституцій.
  - >-
    Українська Гельсінська група: 1976 року — співзаснування УГГ, листування з в''язнями,
    контакти з Московською Гельсінською групою.
  - >-
    [!decolonization] Поворот дисидентів до мови міжнародного права (права людини,
    геноцид, політв''язень) як деколоніальна стратегія проти імперських репресій.
  section: 'Діяльність: УРСС, звернення до ООН і Українська Гельсінська група'
  words: 1200
- points:
  - >-
    Тиск після звільнення: звільнення в січні 1976 року, відмова в реєстрації у Львові,
    адміністративний нагляд у Пустомитах, праця кочегаром і майстром із ремонту техніки.
  - >-
    Умова зречення: КДБ пропонував львівську реєстрацію та фахову роботу в обмін на
    публічне зречення — Кандиба відмовився.
  - >-
    Другий строк: повторний арешт 1981 року, ярлик «особливо небезпечний рецидивіст»,
    десять років особливого режиму та п''ять років заслання; 65 днів у карцері (ШІЗО)
    1988 року; звільнення лише після голодування й публічної вимоги президента США
    Рональда Рейгана; помилування 5 вересня, звільнення 9 вересня 1988 року.
  - >-
    [!anti-hagiography] Після 1991 року Кандиба очолив об''єднання «Державна Самостійність
    України» й легалізовану ОУН в Україні; сучасна наука відрізняє його правозахисну
    спадщину УГГ від пізнішої партійної політики — назвати обидва пласти, не відбілюючи жодного.
  - >-
    [!myth-buster] Народна пам''ять зводить його до «співзасновника УГГ», ховаючи справу
    УРСС і повні ~25 років; російські наративи зливають увесь український спротив із
    «бандерівським екстремізмом», але його шлях почався з юридичного, міжнародно-правового
    аргументу, а не з насильства.
  section: 'Тінь: Два строки, відмова від зречення і політика після 1991 року'
  words: 1600
- points:
  - >-
    Слово як зброя: заснування та редагування партійної газети «Нескорена нація» — сама
    назва кодує дисидентську етику, де найменування несе політичний сенс.
  - >-
    Кінець шляху: смерть 8 листопада 2002 року у Львові, поховання на Личаківському цвинтарі.
  - >-
    [!decolonization] Спадщина Кандиби — стратегія юриста обертати власну правову мову
    режиму (права людини, міжнародне право) проти нього самого.
  - >-
    Сучасне значення: традиція гельсінських звернень як правова й моральна граматика
    сьогоднішнього спротиву України російській агресії — читати документи й тримати складність.
  section: 'Підсумок: Нескорена нація'
  words: 1000
focus: >-
  Іван Кандиба — юрист і правозахисник, співзасновник Української Гельсінської групи;
  життя від депортованої родини й справи УРСС через два табірні строки до відмови від
  публічного зречення, прочитане крізь документи спротиву й анти-агіографію.
