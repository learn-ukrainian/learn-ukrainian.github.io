content_outline:
- points:
  - >-
    [!biography] Знайомство з Петром Миколаїовичем Федуном ("Полтавою"): ключовий ідеолог
    і публіцист ОУН та УПА, член Головного осередку пропаганди. Народився 24 лютого
    1919 року в Шнірові біля Бродів.
  - >-
    Провокаційне питання: як пояснити діяльність збройного підпілля власному суспільству та
    світові через друковане слово в умовах тоталітарної окупації?
  section: Розминка
  words: 400
- points:
  - >-
    Псевдоніми Полтава, Север, Волянський — "Полтава" є nom de guerre, а не географічною
    прив'язкою.
  - >-
    Ранні підпільні політичні тексти 1943 року та вхід до провідного осередку пропаганди
    ОУН/УПА.
  - >-
    [!epistemic-humility] Зв'язок із середовищем Української Головної Визвольної Ради —
    Федун діяв у політичному, а не лише бойовому полі підпілля.
  section: 'Формування: Від ОУН до Головного осередку пропаганди'
  words: 1000
- points:
  - >-
    Ідеологічна еволюція руху: тексти Федуна "Хто такі бандерівці і за що вони борються"
    (1948) — спроба публічного самопояснення УПА після зіткнення з радянським
    колоніалізмом та нацистською окупацією.
  - >-
    [!decolonization] Федун як теоретик: формулювання антиімперіалістичного опору
    ("Колоніяльна господарська політика большевицьких імперіялістів в Україні", 1945).
    Радянська система аналізується як новітній імперіалізм.
  - >-
    Програмні тексти: "Елементи революційності українського націоналізму" (1946),
    "Концепція Самостійної України" (1946–1947), "Ідея Української Самостійної
    Соборної Держави".
  - >-
    [!anti-hagiography] Самопрезентація — не вирок історії. Зміщення мови ОУН/УПА у текстах
    Полтави до соціально орієнтованого антиколоніалізму не скасовує більш ранньої
    авторитарної історії ОУН та складних збройних конфліктів із цивільними.
  section: 'Діяльність: Відповідаючи на питання "хто такі бандерівці?"'
  words: 1200
- points:
  - >-
    [!myth-buster] Спростування російського міфу про ірраціональний "бандитизм" ОУН/УПА:
    праці Полтави доводять системний інтелектуальний опір з розгорнутою
    соціально-економічною програмою — але це самопрезентація, а не незалежний суд.
  - >-
    Смерть в оточенні: 23 грудня 1951 року Федун загинув у підпільному бункері під час
    збройної операції МДБ на заході України.
  - >-
    Знищення радянськими органами інтелектуальної мережі УПА як частина боротьби СРСР
    за монополію на інформацію.
  - >-
    [!epistemic-humility] Тексти Федуна належать до того ж поля ОУН-Б/УПА, чий запис
    включає волинські трагедії та Голокост-контекст; самопояснення не замінює
    незалежної оцінки.
  section: 'Тінь: Загибель у криївці та пам''ять'
  words: 1600
- points:
  - >-
    Підпільна публіцистика як зброя: творення концепції "Української Самостійної
    Соборної Держави" через друковане слово.
  - >-
    Підсумок: Петро Федун-Полтава як творець антиколоніальної концепції опору, тексти
    якого стали ідеологічним фундаментом пізнішого визвольного руху.
  - >-
    Сучасне значення: порівняння самопрезентації Федуна з незалежною історичною наукою —
    деколонізована педагогіка, що не приймає жоден наратив без перевірки.
  section: 'Підсумок: Ідеолог опору та автор концепції УПА'
  words: 1000
focus: >-
  Петро Федун-Полтава як провідний ідеолог ОУН/УПА, що сформулював
  антиколоніальну та антиімперську програму українського підпілля у своїх
  публіцистичних працях, і загинув у боротьбі з МДБ.
