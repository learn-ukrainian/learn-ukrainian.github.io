objectives:
- Розпізнавати псевдоніми Петра Федуна та не змішувати їх з окремими авторами.
- Відрізняти організаційний ранг, редакторську функцію, авторський текст і документований наказ.
- Аналізувати названі твори за точними локаторами академічного видання.
- Пояснювати радянський розшук і смерть, не замовчуючи суперечливої ідеології та цивільного контексту.
