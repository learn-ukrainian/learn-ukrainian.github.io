content_outline:
- points:
  - >-
    [!biography] Знайомство з Петром Федуном ("Полтавою"): ключовий ідеолог і публіцист
    ОУН та УПА, член Головного осередку пропаганди. Народився 24 лютого 1919 року.
  - >-
    Провокаційне питання: як пояснити діяльність збройного підпілля власному суспільству та
    світові через друковане слово в умовах тоталітарної окупації?
  section: Розминка
  words: 400
- points:
  - >-
    Ідеологічна еволюція руху: тексти Федуна ("Хто такі бандерівці і за що вони борються", 1948)
    є спробою публічного самопояснення УПА після безпосереднього зіткнення з радянським
    колоніалізмом та нацистською окупацією.
  - >-
    [!decolonization] Федун як теоретик: формулювання антиімперіалістичного опору ("Колоніяльна
    господарська політика большевицьких імперіялістів в Україні", 1945). Радянська система
    аналізується як новітній імперіалізм.
  - >-
    [!epistemic-humility] Самопрезентація — не вирок історії. Зміщення мови ОУН/УПА у текстах
    Полтави до соціально орієнтованого антиколоніалізму є важливим, але воно не скасовує
    більш ранньої авторитарної історії ОУН та складних збройних конфліктів із цивільними.
  section: 'Діяльність: Відповідаючи на питання "хто такі бандерівці?"'
  words: 1600
- points:
  - >-
    [!anti-hagiography] Чому тексти Федуна читають сьогодні: вони є історичним джерелом того,
    як підпілля хотіло бачити себе та свою соціальну програму. Не варто сприймати їх як
    нейтральну констатацію всіх дій руху.
  - >-
    [!myth-buster] Спростування російського міфу про ірраціональний "бандитизм" ОУН/УПА: праці
    Полтави доводять системний інтелектуальний опір з розгорнутою соціально-економічною програмою.
  - >-
    Роль підпільної публіцистики: творення концепції "Української Самостійної Соборної Держави".
  section: 'Контекст: Слова як зброя'
  words: 1000
- points:
  - >-
    Смерть в оточенні: 23 грудня 1951 року Федун загинув у підпільному бункері під час
    збройної операції МДБ на заході України.
  - >-
    Знищення радянськими органами інтелектуальної мережі УПА як частина боротьби СРСР
    за монополію на інформацію.
  - >-
    Підсумок: Петро Федун-Полтава як творець антиколоніальної концепції опору, тексти якого
    стали ідеологічним фундаментом пізнішого визвольного руху.
  section: 'Тінь: Загибель у криївці та пам''ять'
  words: 1000
focus: >-
