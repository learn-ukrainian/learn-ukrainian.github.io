- word: псевдонім
  definition: вигадане ім'я, яким автор або підпільник замінює справжнє
  pos: ч.
- word: політвиховник
  definition: відповідальний за політичне навчання й виховання у військовій структурі
  pos: ч.
- word: референтура
  definition: підрозділ організації, відповідальний за окремий напрям роботи
  pos: ж.
- word: пропаганда
  definition: систематичне поширення ідей для формування політичних поглядів і поведінки
  pos: ж.
- word: локатор
  definition: точне місце документа або твердження у виданні чи архівній справі
  pos: ч.
- word: атрибуція
  definition: встановлення автора або відповідального суб'єкта тексту чи дії
  pos: ж.
- word: криївка
  definition: приховане підземне або замасковане приміщення підпілля
  pos: ж.
- word: спецпідрозділ
  definition: спеціально організована частина силового органу для окремих операцій
  pos: ч.
- word: цивільна шкода
  definition: загибель, поранення або інше насильство щодо некомбатантів
  pos: ж.
- word: агіографія
  definition: некритичне ідеалізоване зображення історичної постаті
  pos: ж.
