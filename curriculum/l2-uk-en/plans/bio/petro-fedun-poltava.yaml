content_outline:
- points:
  - >-
    [!decolonization] Петро Федун діяв у підпіллі, що протистояло радянському
    поверненню, але антиімперський контекст не перетворює його ідеологічні тексти
    на нейтральну історіографію.
  - >-
    [!biography] Петро Федун, псевдонім Петро Полтава; інші зафіксовані ЕСУ
    псевдоніми подаються як імена конспірації, а не різні особи.
  section: 'Вступ: людина, псевдоніми й архівна атрибуція'
  words: 600
- points:
  - Народження 23 лютого 1919 року в Шнирові, освіта та медичні студії.
  - Мобілізація до Червоної армії, радянсько-фінська війна, німецький полон 1941 року.
  - >-
    Повернення до Львова й ОУН описується без вигаданої безперервної військової кар'єри.
  section: 'Освіта, Червона армія і німецький полон'
  words: 800
- points:
  - Юнацтво ОУН, журнал «Юнак», школа кадрів, політвиховні відділи УПА.
  - Референтура пропаганди Центрального проводу ОУН(б) та Бюро інформації УГВР.
  - >-
    [!anti-hagiography] Висока організаційна посада є предметом відповідальності,
    але не дає права приписати Федунові кожен наказ, злочин або текст ОУН і УПА.
  section: 'Організаційні посади й авторство'
  words: 1000
- points:
  - >-
    «Елементи революційности українського націоналізму» атрибутовано Петрові
    Федуну-«Полтаві» в архівній картці; передрук у томі 24 «Літопису УПА»
    локалізовано на сторінках 441–463.
  - >-
    Назви інших творів у ЕСУ використовуються як бібліографічні орієнтири,
    але без перевіреного видання й сторінки модуль не цитує їх і не призначає
    їхні слова конкретній вправі.
  - >-
    Авторські твердження аналізуються як програма й пропаганда; пізніша редакторська
    примітка не видається за слово Федуна.
  section: 'Тексти з точними назвами й локаторами'
  words: 1100
- points:
  - >-
    Авторитарна спадщина міжвоєнної ОУН, воєнна програмна еволюція та мова
    «організованої демократії» зіставляються без ретроспективного виправдання.
  - >-
    Масове вбивство польських цивільних і єврейський досвід німецької окупації
    входять до контексту ОУН—УПА; персональну причетність Федуна встановлює лише
    документ із точним локатором, якого прийнятий набір не містить.
  - Пізніше вшанування не замінює аналізу ідей та організаційних функцій.
  section: 'Ідеологія, цивільна шкода і межі висновку'
  words: 1000
- points:
  - Розшук радянськими органами державної безпеки у 1944–1951 роках.
  - >-
    За ЕСУ Федун застрелився після збройного опору в оточеній спецпідрозділом МДБ
    криївці; смерть сталася 23 грудня 1951 року поблизу Вишнева.
  - >-
    [!myth-buster] Смерть не робить усі його тексти демократичними й не дозволяє
    радянській криміналізації стерти їхній політичний зміст.
  section: 'Розшук МДБ і смерть 23 грудня 1951 року'
  words: 700
