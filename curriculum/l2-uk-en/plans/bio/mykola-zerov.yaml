content_outline:
- points:
  - >-
    [!biography] Знайомство з Миколою Зеровим: поет-неокласик, майстер сонета,
    перекладач античної поезії, літературознавець і лідер київських неокласиків.
  - >-
    Провокаційне питання: чому радянська влада вбачала смертельну загрозу в сонетах
    про класичну красу та в перекладах Вергілія й Горація?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта класициста: Перша київська гімназія та історико-філологічний факультет
    Київського університету; викладання «давніх мов» у Златополі (1914—1917) і
    латини в Києві.
  - >-
    Редактор бібліографічного журналу «Книгарь» та входження в елітарне коло
    української культури; перші антології — «Антологія римської поезії» та «Нова
    українська поезія» (1920).
  - >-
    [!decolonization] Програма «до джерел»: органічне введення української літератури
    в європейський та античний контекст через власний переклад, а не через імперське
    посередництво.
  section: 'Формування: антична школа та європейський вектор'
  words: 1000
- points:
  - >-
    «Камена» (1924) — єдина прижиттєва збірка оригінальної лірики Зерова; сонет
    «Pro domo» як стислий маніфест неокласики: «Класична пластика, і контур строгий,
    і логіки залізна течія».
  - >-
    Зеров-критик: 1925 рік — вершина його літературно-критичної праці; у літературній
    дискусії 1925—1928 років він став на бік Миколи Хвильового, обстоюючи європейський
    вектор і здорову конкуренцію проти «гурткового протекціонізму».
  - >-
    Естетика опору: демонстративна відмова від «червоно-революційної» фразеології та
    культ строгої форми як акт інтелектуальної незалежності, що його влада не прощала.
  - >-
    [!myth-buster] Міф про «культ чистого мистецтва»: Максим Рильський (1965)
    наголошував, що неокласики ніколи не проголошували такого гасла — їх єднала
    «любов до слова, до строгої форми, до великої спадщини світової літератури».
  section: 'Діяльність: неокласика, «Камена» і дискусія'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Зеров не був політичним змовником, але радянська машина
    знищувала його саме за інтелектуальну незалежність та європейський вектор, а не
    за реальну «терористичну» діяльність.
  - >-
    Механізм терору: директива червневого пленуму ЦК КП(б)У 1926 року проти
    неокласиків; вимушене «свідчення» на процесі СВУ (1930); звільнення з університету
    (1934); смерть десятилітнього сина та переїзд до Москви.
  - >-
    Арешт у ніч проти 28 квітня 1935 року на станції Пушкіно; слідча справа
    № 0019-1936, у якій «групу Зерова» штучно склали з шести осіб; єдиними «доказами»
    стали дві книжки, а вирок — 10 років таборів із конфіскацією майна.
  - >-
    [!epistemic-humility] [!myth-buster] Соловки, повторний вирок «трійки» НКВС від
    9 жовтня 1937 року й розстріл у Сандармосі 3 листопада 1937; доля рукопису
    перекладу «Енеїди» Вергілія (втрачено чи знищено) лишається відкритим питанням —
    документальні факти варто відділяти від таборової легенди.
  section: 'Тінь: справа № 0019-1936 і Сандармох'
  words: 1600
- points:
  - >-
    Знищена спадщина: втрата багаторічного рукопису Вергілієвої «Енеїди» та заборона
    імені на десятиліття; збереження доробку молодшим братом Михайлом Орестом у
    діаспорі (посмертні «Sonnetarium», 1948; «Corollarium», Мюнхен, 1958).
  - >-
    Повернення: посмертна реабілітація 1958 року «за відсутністю складу злочину»,
    перше повне видання «Творів» в Україні (1990), вшанування на державному рівні
    (130-річчя від дня народження, 2020).
  - >-
    [!decolonization] Як сучасна Україна «повертає» собі Зерова, очищаючи його образ
    від радянського ярлика «буржуазного націоналіста» та від спрощеного міфу про
    «аполітичного естета у вежі зі слонової кістки».
  section: 'Підсумок: утрачена «Енеїда» і повернення'
  words: 1000
focus: >-
  Микола Зеров — лідер київських неокласиків, поет, перекладач античної поезії та
  літературознавець, жертва Розстріляного відродження. Аналіз його естетичної програми
  «до джерел», майстерності сонета та механізму радянського терору, що завершився
  розстрілом в урочищі Сандармох 1937 року.
