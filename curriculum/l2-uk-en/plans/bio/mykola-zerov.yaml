objectives:
- Аналізувати внесок Миколи Зерова в українську поезію, перекладознавство та літературну критику.
- >-
  Розуміти естетику київської неокласики (строга форма, європейський та античний
  вектор) через сонет «Pro domo» і програму «до джерел».
- >-
  Досліджувати механізм радянського терору на прикладі сфабрикованої справи
  № 0019-1936 та розстрілу в Сандармосі.
- >-
  Відрізняти історичні факти від міфів та радянських ідеологічних ярликів у образі
  «аполітичного естета».
