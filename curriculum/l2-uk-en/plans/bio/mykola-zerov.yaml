objectives:
- Аналізувати творчість Миколи Куліша в контексті політичних та культурних процесів 1920-30-х років
- Розрізняти ідеологічні маніпуляції та об'єктивні факти у біографії митця
- Пояснювати унікальність творчого тандему Куліша та Курбаса для українського театру
- Формулювати власну позицію щодо трагедії Розстріляного відродження на прикладі долі Миколи Куліша
