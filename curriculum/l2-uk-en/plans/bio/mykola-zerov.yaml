content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: Як автор найвідомішої української комедії про мову ("Мина Мазайло") став однією з найтрагічніших постатей в
    українській літературі?'
  - 'Провокація: Чи була сатира Куліша на радянську дійсність актом творчої сміливості, чи фатальною помилкою, що прискорила
    його загибель?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1: За життя Куліша звинувачували і в "націоналізмі", і в недостатній "пролетарськості". Як його п''єси одночасно
    дратували ідеологів з обох таборів?'
  - 'Дебат 2: Радянська пропаганда таврувала його як "буржуазного націоналіста". Сучасна Україна бачить у ньому генія і мученика.
    Де проходить межа між образом, створеним пропагандою, та реальною, складною фігурою митця?'
  - '[!epistemic-humility] Оцінки творчості Куліша кардинально змінювались залежно від політичної кон''юнктури — від офіційного
    визнання до повного забуття і подальшої реабілітації.'
  section: 'Конфліктна карта: Національний драматург чи "ворог народу"?'
  words: 900
- points:
  - 'Освіта та світогляд: як сільський хлопець, що навчався в Одеській школі прапорщиків та воював в армії УНР, перетворився
    на провідного модерністського драматурга?'
  - 'Вплив оточення: роль Юрія Яновського, Миколи Хвильового та інших членів ВАПЛІТЕ у формуванні Куліша.'
  - Переїзд до Харкова, тодішньої столиці УСРР, як вирішальний крок до входження в епіцентр літературного життя.
  section: 'Формування: Від Херсонських степів до харківського авангарду'
  words: 1000
- points:
  - 'Творчий тандем Куліш-Курбас: як співпраця драматурга та режисера-новатора змінила українську сцену.'
  - 'Аналіз ключових п''єс: "97", "Народний Малахій", "Патетична соната" та, звісно, "Мина Мазайло". Чому ці твори були революційними
    для свого часу?'
  - 'Використання першоджерел: фрагменти з п''єс, щоденників та листів Куліша для розуміння його творчого методу.'
  section: 'Діяльність: "Березіль", Курбас і народження нового театру'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Спроби Куліша писати "ідеологічно правильні" твори: чи був це щирий пошук "нового пролетарського
    мистецтва", чи вимушений компроміс із режимом, що ставав все більш репресивним?'
  - Розкол у ВАПЛІТЕ, цькування у пресі, заборона п'єс — хроніка знищення митця.
  - '[!myth-buster] Арешт Куліша був не раптовим. Це був фінал довготривалої кампанії з розгрому українського культурного
    відродження.'
  - 'Трагічна розв''язка: арешт, звинувачення в тероризмі, Соловки та масовий розстріл в урочищі Сандармох 3 листопада 1937
    року разом із Лесем Курбасом.'
  section: 'Тінь: Компроміс, розчарування і Сандармох'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: що дає нам знання про долю Куліша для глибшого розуміння його комедій?'
  - Спадщина Куліша — це не лише його п'єси, але й сама його біографія як уособлення долі цілого покоління українських митців,
    знищених тоталітарним режимом.
  - '[!decolonization] Як сучасна українська культура "повертає" собі Куліша, очищуючи його образ від радянських та пост-радянських
    міфів?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Микола Куліш, провідний драматург Розстріляного відродження. Аналіз його п'єс, що поєднували модерністські техніки
  з глибоким дослідженням української ідентичності та абсурдності радянської реальності, зокрема сатири "Мина Мазайло". Творчий
  тандем із Лесем Курбасом у театрі "Березіль" та трагічна загибель обох в один день.
