focus: >-
  Лев Ребет у міжвоєнній ОУН, Українському державному правлінні 1941 року,
  нацистському ув'язненні, повоєнній науці та еміграційній політиці; убивство
  агентом КҐБ відокремлюється від оцінки його ідеології.
level: BIO
module: bio-305
objectives:
- Відрізняти особисті праці Ребета від програм ОУН, фракційних рішень і урядових ролей.
- Пояснювати хронологію нацистського арешту, концтабору та повоєнної діяльності.
- Атрибутувати суперечливі оцінки польській, єврейській та українській історіографії.
- Відтворювати доказовий ланцюг убивства КҐБ без героїчного чи радянського згладжування.
