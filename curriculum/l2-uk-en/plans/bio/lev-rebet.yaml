content_outline:
- points:
  - >-
    [!biography] Знайомство з Левом Романовичем Ребетом: правник, публіцист, провідний
    діяч ОУН. Народився 3 березня 1912 року у Стрию.
  - >-
    Провокаційне питання: чому радянські спецслужби витратили стільки ресурсів на знищення
    теоретика та журналіста, який діяв у Мюнхені?
  section: Розминка
  words: 400
- points:
  - >-
    [!epistemic-humility] Рання діяльність: участь у підпіллі ОУН та в Українському
    Державному Правлінні 1941 року. Його ранній запис залишається в контексті
    контроверсійної політики ОУН-Б.
  - >-
    Ув'язнення нацистами після акту 30 червня 1941 року, що засвідчує його політичну
    суб'єктність, а не пасивну роль.
  - >-
    [!decolonization] Російські наративи зводять Ребета до "фашистського емігранта" для
    виправдання радянського насильства; деколонізований підхід називає вбивство державним
    терором, не стираючи раннього контексту ОУН.
  section: 'Формування: ОУН та Українське Державне Правління'
  words: 1000
- points:
  - >-
    Діяльність в еміграції: еволюція до середовища ОУН-закордонна (ОУН-з), яке відкинуло
    авторитаризм та шукало більш плюралістичних форм націоналізму.
  - >-
    [!decolonization] Інтелектуальна праця: видання теоретичних робіт "Держава і нація"
    та "Теорія нації", які радянське керівництво розглядало як серйозну ідеологічну загрозу.
  - >-
    Журналістська робота в "Suchasna Ukraina", "Chas" та "Ukrainska Trybuna" — КДБ
    трактувало ці видання як ідеологічні, а не лише журналістські.
  - >-
    [!anti-hagiography] Демократична мова Ребета в еміграції не стирає його ранньої участі в
    радикальному підпіллі, але показує ідеологічну різноманітність і розколи в емігрантському
    середовищі, спростовуючи міф про монолітний "фашистський" рух.
  section: 'Діяльність: Від підпілля до демократичного націоналізму'
  words: 1200
- points:
  - >-
    [!myth-buster] Вбивство КДБ: 12 жовтня 1957 року в Мюнхені Ребет був убитий радянським
    агентом Богданом Сташинським за допомогою отруйного пристрою. Це не була природна смерть.
  - >-
    Міжнародне значення: судовий процес над Сташинським (Карлсруе, 1962) став ключовим
    доказом екстериторіального державного терору СРСР проти українських політичних опонентів.
  - >-
    Бюлетень Міжнародної комісії юристів (ICJ Bulletin no. 15, 1963) фіксує, що
    Сташинський убив Ребета в 1957 році та Бандеру в 1959 році за наказом радянських
    керівників.
  - >-
    [!epistemic-humility] Ранній контекст ОУН 1941 року та перспективи Голокосту залишаються
    релевантним тлом; Ребет не був центральною фігурою волинських подій, але належав
    до того ж ідеологічного поля.
  section: 'Тінь: Вбивство рукою КДБ'
  words: 1600
- points:
  - >-
    Ідеологічна різноманітність: розколи між лінією Бандери та ОУН-з як доказ того, що
    емігрантський націоналізм не був монолітним.
  - >-
    Пам'ять: Ребет як теоретик демократичного націоналізму та жертва системи, яка
    боялася вільної української думки.
  - >-
    Сучасне значення: вбивство Ребета як один із найчіткіших прикладів радянського
    екстериторіального терору проти українських інтелектуалів у еміграції.
  section: 'Підсумок: Ідеологія нації та отрута КДБ'
  words: 1000
