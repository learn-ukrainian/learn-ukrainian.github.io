content_outline:
- points:
  - >-
    [!biography] Знайомство з Левом Ребетом: правник, публіцист, провідний діяч ОУН.
    Народився 3 березня 1912 року у Стрию.
  - >-
    Провокаційне питання: чому радянські спецслужби витратили стільки ресурсів на знищення
    теоретика та журналіста, який діяв у Мюнхені?
  section: Розминка
  words: 400
- points:
  - >-
    [!epistemic-humility] Рання діяльність: участь у підпіллі ОУН та в Українському Державному Правлінні
    1941 року. Його ранній запис залишається в контексті контроверсійної політики ОУН-Б.
  - >-
    Ув'язнення нацистами після акту 30 червня 1941 року, що засвідчує його політичну суб'єктність.
  - >-
    Діяльність в еміграції: еволюція до середовища ОУН-закордонна (ОУН-з), яке відкинуло
    авторитаризм та шукало більш плюралістичних форм націоналізму.
  section: 'Діяльність: Від підпілля до демократичного націоналізму'
  words: 1200
- points:
  - >-
    [!decolonization] Інтелектуальна праця: видання теоретичних робіт ("Держава і нація",
    "Теорія нації"), які радянське керівництво розглядало як серйозну ідеологічну загрозу.
  - >-
    [!anti-hagiography] Демократична мова Ребета в еміграції не стирає його ранньої участі в
    радикальному підпіллі, але показує ідеологічну різноманітність і розколи в емігрантському
    середовищі, спростовуючи міф про монолітний "фашистський" рух.
  - >-
    Аналіз журналістської роботи Ребета та його ролі як редактора екзильних видань.
  section: 'Контекст: Ідеологія та екзильна публіцистика'
  words: 1000
- points:
  - >-
    [!myth-buster] Вбивство КДБ: 12 жовтня 1957 року в Мюнхені Ребет був убитий радянським
    агентом Богданом Сташинським за допомогою отруйного пристрою. Це не була природна смерть.
  - >-
    Міжнародне значення: судовий процес над Сташинським (Карлсруе, 1962) став ключовим
    доказом екстериторіального державного терору СРСР проти українських політичних опонентів.
  - >-
    Підсумок: пам'ять про Лева Ребета як про теоретика демократичного націоналізму та
    жертву системи, яка боялася вільної української думки.
  section: 'Тінь: Вбивство рукою КДБ'
  words: 1400
