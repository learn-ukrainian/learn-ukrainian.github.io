vocabulary_hints:
- word: крайова екзекутива
  definition: територіальний керівний орган ОУН у міжвоєнний період
  pos: ж.
- word: фракція
  definition: окрема група всередині політичної організації
  pos: ж.
- word: державне правління
  definition: назва уряду, проголошеного у Львові 1941 року
  pos: с.
- word: концтабір
  definition: місце масового примусового ув'язнення, створене репресивним режимом
  pos: ч.
- word: еміграційна політика
  definition: політична діяльність поза територією батьківщини
  pos: ж.
- word: державне право
  definition: галузь права про організацію та діяльність держави
  pos: с.
- word: спецоперація
  definition: таємно спланована операція спеціальної служби
  pos: ж.
- word: агент
  definition: особа, яка приховано виконує доручення спеціальної служби
  pos: ч.
- word: атрибуція
  definition: встановлення автора, джерела або відповідального суб'єкта твердження чи дії
  pos: ж.
- word: агіографія
  definition: некритичне ідеалізоване зображення історичної постаті
  pos: ж.
