content_outline:
- points:
  - >-
    [!decolonization] Лев Ребет діяв після поразки української державності та за
    польської, нацистської й радянської експансії; цей контекст не робить усі його
    політичні вибори автоматично демократичними.
  - >-
    [!biography] Правник, діяч ОУН, урядовець 1941 року, нацистський в'язень,
    післявоєнний науковець і політик у вигнанні.
  section: 'Вступ: право, організація і вигнання'
  words: 600
- points:
  - Стрий, правничі студії, УВО та рання участь в ОУН.
  - Керівництво Крайовою екзекутивою ОУН і польські арешти 1930-х років.
  - >-
    [!anti-hagiography] Організаційна належність не підміняє доказу особистого
    наказу; водночас керівна посада не може бути стерта з біографії.
  section: 'Міжвоєнна діяльність і відповідальність посади'
  words: 900
- points:
  - Розкол ОУН 1940 року та належність Ребета до бандерівського крила.
  - >-
    Заступник голови Українського державного правління після Акта 30 червня 1941
    року; урядова роль описується окремо від програми ОУН і від особистих текстів.
  - >-
    [!epistemic-humility] Антисемітські й авторитарні елементи тодішнього
    націоналістичного середовища не замовчуються, але конкретну дію Ребета не
    приписують без документа.
  section: '1941 рік і нацистське ув''язнення'
  words: 1100
- points:
  - >-
    Арешт гестапо у вересні 1941 року; ЕІУ стисло подає Аушвіц до 1944 року,
    а архівний профіль СЗРУ — понад рік у в'язниці Монтелюпіх, потім Аушвіц
    і згадує альтернативну версію про Оранієнбург. Розбіжність не згладжується.
  - >-
    Нацистське ув'язнення не скасовує аналізу ідеології, а попередня роль в ОУН
    не дозволяє називати ув'язненого нацистським агентом без доказів.
  - Післявоєнна праця в Українському вільному університеті та публіцистика.
  section: 'Від концтабору до університету в Мюнхені'
  words: 900
- points:
  - Розходження із Закордонними частинами ОУН і формування ОУН за кордоном.
  - Праці про націю, державу, демократію та право як авторські позиції Ребета.
  - >-
    Польські й єврейські перспективи на ОУН розглядаються як самостійні частини
    історіографії; вони не оголошуються радянською пропагандою і не переносяться
    механічно на індивідуальну дію.
  section: 'Повоєнна політика, наука і суперечки'
  words: 900
- points:
  - >-
    12 жовтня 1957 року агент КҐБ Богдан Сташинський убив Ребета в Мюнхені
    спеціальним засобом з отруйною речовиною; архівна публікація СЗРУ описує
    збирання інформації та попередній план викрадення.
  - >-
    [!myth-buster] КДБівське вбивство є документованим злочином державної
    спецслужби, але не доводить безпомилковості поглядів жертви.
  - Пізніше перепоховання й українська політика пам'яті відділяються від доказів убивства.
  section: 'Убивство 1957 року та документована відповідальність'
  words: 800
