objectives:
- Прослідкувати біографію Світличної від Донбасу до діаспорного редагування без зведення до «сестри Івана».
- Розуміти механізми тиску — арешт, ст. 62, табір, тиск на дитину, «паразитизм», позбавлення громадянства.
- Фіксувати конфлікт джерел щодо року народження (1936 vs 1939) як епістемічну практику, не здогад.
- Побудувати навчальну «ролеву карту» передачі інформації без вигаданих неопублікованих ланцюгів.
