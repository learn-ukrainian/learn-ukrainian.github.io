content_outline:
- points:
  - >-
    [!biography] Знайомство з Надією Світличною: донбаська вчителька, шістдесятниця,
    самвидавна діячка, політв'язень, редакторка й радіожурналістка — а не лише
    «сестра Івана Світличного».
  - >-
    Провокаційне питання: чому передрук, перенесення й редагування документів
    радянська держава карала як політичний злочин?
  - >-
    [!decolonization] Дисидентство не було суто західноукраїнським явищем: Світлична
    походила зі Старобільщини на Луганщині.
  section: Розминка
  words: 400
- points:
  - >-
    Народження 8 листопада 1936 року в Половинкиному (Старобільський район,
    Луганщина). Закінчення українського відділення Харківського університету (1958)
    та праця в школах і бібліотеках Донбасу.
  - >-
    Переїзд до Києва 1963 року; Клуб творчої молоді; зближення з Аллою Горською та
    колом шістдесятників.
  - >-
    8 листопада 1967 року разом з Іваном Світличним, Іваном Дзюбою та Ліною
    Костенко підписала лист-протест до Петра Шелеста проти процесу над Чорноволом.
  - >-
    [!decolonization] Україномовне дисидентство Донбасу спростовує міф, нібито
    культурний спротив належав лише Галичині.
  section: 'Формування: Від Донбасу до київського самвидаву'
  words: 1000
- points:
  - >-
    Поширення самвидаву та збереження пам'яті про Аллу Горську після її вбивства.
  - >-
    Підготовка й редагування текстів: «Палімпсести» Василя Стуса, «У мене — тільки
    слово» та «Доброокий» Івана Світличного.
  - >-
    З 1980 року — редагування «Вісника репресій в Україні» в закордонному
    представництві Української Гельсінської групи; 1983–1994 — українська служба
    «Радіо Свобода».
  - >-
    [!anti-hagiography] Інформаційна праця як спротив: передрук, перенесення,
    редагування, мовлення й архівування були політичними діями, а не «допоміжним»
    тлом.
  section: 'Діяльність: Інформаційна праця як спротив'
  words: 1200
- points:
  - >-
    Допити після січневих арештів 1972 року, вилучення текстів і листування; арешт
    18 травня 1972 року.
  - >-
    23–24 травня 1973 року Київський обласний суд засудив її за статтею 62 частина 1
    до чотирьох років таборів суворого режиму; ув'язнення в Барашевому (Мордовія).
  - >-
    [!myth-buster] Ґендерний примус: слідчі КДБ використовували її малолітнього сина
    як важіль тиску — назвати механізм (батьківську відповідальність обернули на
    зброю), не перетворюючи його на сенсацію.
  - >-
    Табірний спротив: протести й голодування серед жінок-політв'язнів; звільнення в
    травні 1976 року, відмова в прописці та праці, погрози за статтею про
    «дармоїдство».
  - >-
    [!epistemic-humility] Восени 1976 року — відмова від радянського громадянства
    («Нижче моєї гідности...»); виїзд до Рима 12 жовтня 1978 року, прибуття до США 8
    листопада 1978 року. Точний номер архівної справи не знайдено — про це сказано
    прямо.
  section: 'Тінь: Арешт, табір і відмова від громадянства'
  words: 1600
- points:
  - >-
    Період у США не був відступом: «Вісник репресій в Україні» та «Радіо Свобода»
    перетворювали розрізнені повідомлення на тривкий документ репресій; простежте
    ланцюг документа (свідок → кур'єр → редактор → радіомовник → архіваріус).
  - >-
    [!myth-buster] [!epistemic-humility] Суперечність джерел щодо року народження:
    ЕСУ та українська сторінка ХПГ подають 1936, англомовна сторінка ХПГ — 1939;
    суперечність фіксують і зважують, а не «вгадують».
  - >-
    Визнання: Шевченківська премія, премія імені Василя Стуса, посмертно — орден «За
    мужність»; померла 8 серпня 2006 року в США, похована в Києві.
  - >-
    Сучасне значення: донбаська українська культурна діячка, будівнича інституцій
    пам'яті, що з'єднала Україну й діаспору.
  section: 'Підсумок: Архів пам''яті між Україною і діаспорою'
  words: 1000
focus: >-
  Надія Світлична як шістдесятниця, політв'язень і редакторка «Вісника репресій в
  Україні»: аналіз інформаційної праці дисидентства, жіночого досвіду ув'язнення та
  збереження української пам'яті між Україною і діаспорою.
