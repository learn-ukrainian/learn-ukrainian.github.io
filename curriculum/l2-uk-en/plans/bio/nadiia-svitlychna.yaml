content_outline:
- points:
  - >-
    [!biography] Знайомство з Надією Світличною: шістдесятниця, правозахисниця, політв'язенька,
    редактор *Вісника репресій в Україні*, закордонне представництво УГГ.
  - >-
    Провокаційне питання: чому вчителька української мови з Донбасу стала мішенню системи
    за друк, перенос і збереження фактів про репресії?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 8 листопада 1936 року (Половинкине, Старобільський район, Луганщина; ESU
    і KHPG українською — 1936; англомовна сторінка KHPG дає 1939 — зафіксувати конфлікт
    джерел, не вгадувати).
  - >-
    Закінчення філфаку Харківського університету (1958); робота в донбаських школах і
    бібліотеках; переїзд до Києва 1963; Клуб творчої молоді, дружба з Аллою Горською.
  - >-
    [!decolonization] Донбасько-київська траєкторія — україномовний спротив не лише «західний»;
    маргіналізація української мови в Донбасі як контекст її свідомого вибору української ідентичності.
  section: 'Формування: Донбас, Харків і Київ'
  words: 1000
- points:
  - >-
    Лист протесту 8 листопада 1967 до Петра Шелеста щодо суду над В'ячеславом Чорновілом
    (разом з Іваном Світличним, Іваном Дзюбою, Ліною Костенко).
  - >-
    Самвидав, допити 1972 року; арешт 18 травня 1972; вирок 23–24 травня 1973 — 4 роки
    таборів за ч. 1 ст. 62; табір у Барашеві, голодування.
  - >-
    *Вісник репресій в Україні* (з 1980); Радіо Свобода (1983–1994); підготовка текстів
    Василя Стуса, Івана Світличного та інших — інформаційна праця як політичний вчинок.
  section: 'Діяльність: Самвидав, *Вісник репресій* і Радіо Свобода'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Слідчі використовували двохрічного сина як важіль тиску перед
    арештом — гендерний механізм примусу, не фонова драма.
  - >-
    Після звільнення (травень 1976) — відмова в реєстрації, загроза справою за «паразитизм»;
    відмова від радянського громадянства (осінь 1976); виїзд до Риму (12 жовтня 1978),
    США (8 листопада 1978).
  - >-
    [!epistemic-humility] Точний номер архівної справи — не знайдено; «ланцюжок документів»
    у завданні — ролі (свідок, редактор, радіомовець), не реконструкція неопублікованого ланцюга.
  section: 'Тінь: Арешт, табір і тиск на сина'
  words: 1600
- points:
  - >-
    Смерть 8 серпня 2006 року в США; поховання в Києві; Шевченківська премія, премія
    ім. Василя Стуса, посмертно — Орден «За мужність».
  - >-
    Пам'ять про Аллу Горську після вбивства; зв'язок із братом Іваном — як редакторська
    та меморіальна праця, не як заміна власного голосу.
  - >-
    [!myth-buster] Еміграція — не «вихід з боротьби», а перетворення розрізнених звітів
    на стійкий запис репресій і радіоампліфікацію.
  section: 'Підсумок: Вісник, голос і гідність'
  words: 1000
focus: >-
  Надія Світлична — донбасько-київська культурна діячка, політв'язенька, редактор і
  радіомовець. Аналіз інформаційної праці, табору, відмови від громадянства та *Вісника
  репресій*.
