objectives:
- >-
  Аналізувати інформаційну працю дисидентства — самвидав, редагування,
  радіомовлення й архівування — як форму політичного спротиву.
- >-
  Розуміти механізми радянських репресій проти жінки-дисидентки на прикладі арешту
  1972 року та чотирьох років таборів суворого режиму.
- >-
  Досліджувати, як Надія Світлична зберігала українську культурну пам'ять, готуючи
  до друку твори Василя Стуса та Івана Світличного.
- >-
  Оцінювати межі прямого джерела й не відтворювати неперевірені цитати або
  похідні біографічні варіанти.
