content_outline:
- points:
  - 'Парадокс: чому поет, чия лірика була абсолютно позбавлена політичних маніфестів
    і гасел, став мішенню радянського терору?'
  - '[!biography] Знайомство: Володимир Свідзінський — тихий лірик, майстер "внутрішньої
    еміграції", чиє життя трагічно обірвалося у вогні під час евакуації НКВС.'
  - 'Провокаційне питання: чи може послідовна відмова служити режиму (навіть через тиху,
    пейзажну лірику) розглядатися як форма свідомого опору?'
  section: Розминка
  words: 400
- points:
  - 'Дебати 1 (Естетичний та політичний): Соціалістичний реалізм вимагав оптимізму та
    партійності. Як цьому протистояла тиха, наповнена символізмом і міфом лірика Свідзінського?'
  - '[!decolonization] Відмова від агітації: Свідзінський не писав "на замовлення".
    Його мовчання та відмова оспівувати "радянські досягнення" розцінювалися системою як
    ворожий акт і саботаж.'
  - 'Цькування після виходу збірки "Вересень" (1927): звинувачення в "ідеалізмі", "пасивності"
    та "буржуазному" світогляді. Як критика ламала тих, хто хотів залишатися "поза політикою".'
  section: 'Конфліктна карта: Естетичний опір системі'
  words: 900
- points:
  - 'Походження: народження в родині священника на Поділлі (сучасна Вінницька область),
    навчання в Тиврівському духовному училищі, духовній семінарії в Кам''янці-Подільському
    та Київському комерційному інституті.'
  - 'Професійний шлях: робота земським статистиком, згодом у видавництвах та архівах
    Кам''янця-Подільського (у період української державності), переїзд до Харкова.'
  - 'Перші кроки в літературі: публікація в "Українській хаті" (1912), вихід першої збірки
    "Ліричні поезії" (1922). Формування унікального стилю: поєднання фольклорно-міфічних
    мотивів, символізму та спостереження за природою.'
  section: 'Формування: Від земського статистика до "Вересня"'
  words: 1000
- points:
  - '1930-ті роки: "Внутрішня еміграція". Втративши можливість друкувати власні вірші,
    Свідзінський знаходить порятунок у перекладах світової класики (Гесіод, Езоп, Овідій,
    Аристофан) та "Слова про похід Ігорів".'
  - '[!epistemic-humility] Складність оцінки: чи можна назвати його позицію простою "пасивністю"?
    Дослідники наголошують на тому, що його перекладацька та архівна праця була свідомим
    кроком для збереження української мови та культури.'
  - 'Вихід збірки "Поезії" (1940) у Львові за підтримки друзів. Вірш "Передмова до казки"
    (1938) як зразок його незалежної візуальної лірики ("Пухнаті лапки, віяла, колосся").
    Ця збірка стала каталізатором репресій.'
  section: 'Діяльність: Внутрішня еміграція та збереження себе'
  words: 1300
- points:
  - 'Механізм репресії: арешт органами НКВС у Харкові (вересень 1941) за сфабрикованим
    звинуваченням в "антирадянській агітації". Слідча справа № 72569.'
  - '[!anti-hagiography] Абсурдність слідства: відсутність реальних доносів, звинувачення
    базувалися на колишній роботі в українських державних установах Кам''янця-Подільського
    та голослівних підозрах в "очікуванні
    німців".'
  - 'Трагедія під час евакуації: 18 жовтня 1941 року, хутір Бутирки (тоді Курська область).
    Замість евакуації конвой НКВС загнав в''язнів до покинутої господарської будівлі та спалив їх
    живцем. Вірш "Я глухіше, сумніше горю" як страшне пророцтво.'
  - 'Радянська дезінформація: тривале приховування правди через офіційну версію про те,
    що поета вбила "німецька бомба". Розвінчання міфу лише після відкриття архівів.'
  section: 'Тінь: Загибель у вогні та знищення правди'
  words: 900
- points:
  - 'Порятунок спадщини: зусилля Олекси Веретенченка, який вивіз за кордон авторизований
    машинопис, та доньки поета, яка зберігала рукописи в Україні.'
  - 'Повернення із забуття: вихід збірки "Медобір" у Мюнхені (1975) та першого повного
    двотомного видання "Творів" у Києві (2004).'
  - 'Місце в каноні: реабілітація (1964 рік, через відсутність складу злочину) та остаточне
    визнання Свідзінського одним із найглибших і найтрагічніших ліриків українського
    ХХ століття.'
  section: 'Дискусія та підсумок: Повернення "Медобору"'
  words: 700
focus: 'Володимир Свідзінський: його тиха, незалежна лірика, що не корилася радянським вимогам,
  феномен "внутрішньої еміграції", та трагічна смерть від рук НКВС під час масового
  знищення в''язнів у 1941 році.'
