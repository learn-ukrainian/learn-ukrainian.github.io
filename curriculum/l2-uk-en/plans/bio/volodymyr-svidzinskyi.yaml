objectives:
- Аналізувати життєвий і творчий шлях Володимира Свідзінського як представника "внутрішньої
  еміграції" та "тихої лірики".
- Пояснювати причини, через які принципово аполітична поезія ставала мішенню для
  тоталітарної радянської машини.
- Критично досліджувати механізм репресій НКВС та радянські практики фальсифікації причин
  загибелі політв'язнів на прикладі міфу про "німецьку бомбу".
- Оцінювати особливості його поетичної мови та значення посмертно виданої збірки "Медобір"
  для української літературної традиції.
