content_outline:
- points:
  - 'Парадокс: Як людина, що знала понад 60 мов і була визнана науковим світом, могла померти в радянському засланні з тавром «ворога народу»?'
  - 'Вступний факт: Агатангел Кримський, один із засновників Української академії наук, до кінця життя офіційно вважався «безпартійним» і навіть отримав орден від радянської влади незадовго до арешту.'
  - '[!biography] Представлення центральної фігури через ключовий конфлікт її долі.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вчений для світу чи для України? Дискусія про пріоритети Кримського — чи не була його глобальна орієнталістика «розкішшю» в той час, коли українська наука потребувала негайної розбудови?'
  - 'Дебат 2: Радянська «реабілітація» vs Деколоніальна оптика. Як радянська влада намагалася привласнити спадщину Кримського, зображуючи його «лояльним вченим», і як сучасна Україна бачить у ньому символ знищеного інтелектуального потенціалу.'
  - '[!epistemic-humility] Визнання, що в 1920-х роках вибір між «національним» і «світовим» не був очевидним для вчених, які прагнули інтегрувати Україну в глобальний контекст.'
  - '[!decolonization] Розвінчання радянського міфу про «буржуазний націоналізм» як єдину причину репресій, показ системного нищення української еліти.'
  section: 'Конфліктна карта: Спадщина під перехресним вогнем'
  words: 900
- points:
  - 'Соціальний та історичний контекст: зростання в родині з білоруським татарським корінням, що визначило його інтерес до Сходу.'
  - 'Феноменальні здібності: ранній прояв таланту до мов, самостійне вивчення десятків мов ще в гімназії.'
  - 'Освітня траєкторія: навчання в Колегії Павла Ґалагана, Київському та Московському університетах — шлях до світової науки.'
  - 'Формативний досвід: наукові відрядження до Сирії та Лівану, занурення в арабський світ, що визначило його як сходознавця.'
  section: 'Формування: Від Володимира-Волинського до світової орієнталістики'
  words: 1000
- points:
  - 'Науковий доробок як сходознавця: праці з арабістики, тюркології, іраністики, що принесли йому європейське визнання.'
  - 'Перекладацька спадщина: переклади Корану, перської та арабської поезії українською мовою — створення мосту між культурами.'
  - 'Організатор науки: ключова роль у заснуванні Української академії наук у 1918 році, перший директор Інституту української наукової мови.'
  - 'Лексикографічна праця: робота над словниками, термінологією — закладення підвалин сучасної української наукової мови.'
  section: 'Діяльність: Фундатор української академічної науки'
  words: 1300
- points:
  - '[!anti-hagiography] Аналіз вимушених компромісів: чи міг Кримський, працюючи в радянських установах, залишатись повністю незалежним? Чи була його «аполітичність» свідомим вибором чи необхідністю виживання?'
  - 'Трагедія Інституту мовознавства: як інститут, очолюваний Кримським, став об''єктом репресій, а його колеги були арештовані.'
  - 'Арешт і загибель: звинувачення в «антирадянській націоналістичній діяльності», арешт у липні 1941, етапування до Казахстану та смерть у тюремній лікарні.'
  - '[!myth-buster] Розвінчання міфу, що Кримський був «просто вченим», далеким від політики. Його робота з утвердження української мови була глибоко політичним актом, що й стало причиною його знищення.'
  section: 'Тінь: Ціна знання в тоталітарній державі'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь на парадокс долі Кримського, використовуючи знання з модуля.'
  - '[!decolonization] Кримський як символ «розстріляного відродження» — уособлення втрачених можливостей України через радянський терор.'
  - 'Реабілітація та вшанування пам''яті: як і чому ім''я Кримського повернулося в українську науку та культуру.'
  - 'Сучасне значення: чому постать Кримського є актуальною сьогодні в контексті боротьби України за свою суб''єктність та ідентичність?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and tragic fate of Ahatanhel Krymskyi, a phenomenal polyglot (60+ languages), co-founder of the Ukrainian Academy of Sciences, and world-renowned Orientalist, whose career embodies the triumph and destruction of Ukrainian science in the 20th century.
