content_outline:
- points:
  - 'Парадокс: наступник Хмельницького, що розірвав із Москвою. Чому найближчий соратник гетьмана обрав курс на 180 градусів
    протилежний?'
  - 'Провокація: Гадяцька унія — геніальний проєкт «Великого князівства Руського» чи фатальна помилка, що розпочала громадянську
    війну (Руїну)?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Сучасники): Для частини козацтва та духовенства Виговський — зрадник православ''я, що продався «ляхам». Для
    іншої — рятівник державності від поглинання Москвою.'
  - 'Дебат 2 (Історіографія): [!decolonization] Радянська історіографія таврувала Виговського як «польського запроданця».
    Сучасна українська наука реабілітує його як європейського політика, що намагався врятувати суверенітет.'
  - '[!epistemic-humility] Обидві сторони внутрішнього конфлікту мали свої аргументи. Спроба зрозуміти логіку опозиції, а
    не лише демонізувати її.'
  section: 'Конфліктна карта: Герой чи зрадник?'
  words: 900
- points:
  - 'Походження та освіта: православний шляхтич, вихованець Києво-Могилянської колегії. Як це сформувало його світогляд?'
  - 'Від полону до довіри: шлях від полоненого в армії Хмельницького до генерального писаря — «правої руки» гетьмана.'
  - 'Архітектор зовнішньої політики: роль Виговського як голови козацької дипломатії за часів Хмельницького.'
  - 'Обрання гетьманом 1657 р.: боротьба за владу після смерті Богдана, компроміс, що виявився тимчасовим.'
  section: 'Формування: Шлях до булави'
  words: 1000
- points:
  - 'Ідея Великого князівства Руського: аналіз змісту Гадяцької угоди 1658 р. — третя рівноправна частина Речі Посполитої.'
  - 'Дипломатичний фронт: важкі переговори зі шведами, поляками та кримськими татарами для створення антимосковської коаліції.'
  - 'Військовий тріумф: Конотопська битва 1659 р. — розгром елітної московської армії. Тактична перемога, що не стала стратегічною.'
  - '[!biography] Ключові фігури: Юрій Немирич (ідеолог унії), кримський хан Мехмед IV Ґерай (союзник під Конотопом).'
  section: 'Діяльність: Гадяцька унія та Конотопська перемога'
  words: 1300
- points:
  - '[!anti-hagiography] Початок Руїни: Гадяцька унія не об''єднала, а розколола Гетьманщину. Повстання Пушкаря та Барабаша
    як вияв народного неприйняття «польського курсу».'
  - 'Внутрішній терор: жорстоке придушення опозиції, що лише посилило розкол і ненависть.'
  - '[!myth-buster] Падіння гетьмана: Виговського скинула не Москва, а внутрішня опозиція. Він втратив легітимність в очах
    значної частини козацтва.'
  - 'Трагічний фінал: розстріляний поляками 1664 р. за звинуваченням у новій зраді. Іронія долі: загибель від рук тих, з ким
    уклав союз.'
  section: 'Тінь: Ціна угоди'
  words: 900
- points:
  - 'Повернення до розминки: чи був у Гадяцької унії шанс на успіх? Студенти формулюють аргументи «за» і «проти».'
  - '[!decolonization] Реабілітація образу: як і чому постать Виговського повертається в український пантеон героїв.'
  - 'Уроки для сучасності: ідея федералізму, пошук геополітичних союзів та проблема внутрішньої єдності — як досвід Виговського
    резонує із сучасними викликами України.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Ivan Vyhovskyi as a complex figure: his shift from Khmelnytsky''s pro-Moscow course, the creation of the Hadiach Union,
  the victory at Konotop, the ensuing civil war (the Ruin), and his tragic death. Focus on the historiographical debate surrounding
  his legacy.'
