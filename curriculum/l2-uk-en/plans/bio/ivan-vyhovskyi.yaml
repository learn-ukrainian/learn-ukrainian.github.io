objectives:
- Аналізувати Гадяцьку унію як альтернативну модель української державності в ранньомодерній Європі
- Оцінювати постать Виговського з урахуванням різних історіографічних підходів (радянського, сучасного українського)
- Критично аналізувати причини та наслідки громадянського конфлікту (Руїни), що почався за гетьманства Виговського
- 'Формулювати аргументовану позицію щодо трагічної дилеми Виговського: союз із Польщею проти Москви'
