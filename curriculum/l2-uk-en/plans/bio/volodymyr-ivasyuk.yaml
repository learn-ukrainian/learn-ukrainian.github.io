objectives:
- Аналізувати життя і творчість Володимира Івасюка в контексті культурного опору в УРСР
- Критично оцінювати різні версії його смерті, розрізняючи факти, інтерпретації та радянську пропаганду
- Пояснювати феномен популярності «Червоної рути» як прояву національного відродження
- Характеризувати новаторство Івасюка у створенні сучасної української естради
