content_outline:
- points:
  - 'Парадокс: Як пісня, написана 21-річним студентом-медиком, стала неофіційним гімном цілої нації, а її автора знайшли повішеним
    у лісі через 10 років?'
  - '[!biography] Володимир Івасюк — не просто композитор, а символ покоління, що прагнуло повернути українській пісні її
    автентичність в епоху тотальної русифікації.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Версія смерті): Самогубство чи вбивство? Офіційна радянська версія (депресія, психічний розлад) vs громадська
    думка та нові докази (інсценування, сліди боротьби, тиск КДБ).'
  - 'Дебат 2 (Творча спадщина): Ікона опору чи радянська естрада? Як Івасюка намагалися «привласнити» — з одного боку, як
    лояльного радянського митця, з іншого — як «буржуазного націоналіста».'
  - '[!epistemic-humility] Визнання, що остаточних доказів вбивства немає, але сукупність фактів робить офіційну версію вкрай
    непереконливою.'
  - '[!decolonization] Розвінчання радянського наративу про «щасливе» життя митців та демонстрація методів КДБ проти культурних
    діячів.'
  section: 'Конфліктна карта: Смерть у Брюховицькому лісі'
  words: 900
- points:
  - 'Буковинське коріння: народження в Кіцмані в родині вчителів, атмосфера поваги до української культури.'
  - 'Ранній талант і перші кроки: музична школа, створення ансамблю «Буковинка», перші композиторські спроби в 15 років.'
  - 'Непростий шлях до медицини: виключення з медінституту за «політичну незрілість» (справа з пам''ятником Леніну), робота
    на заводі, вступ до Львівського медінституту.'
  - 'Подвійне життя: поєднання навчання на медика з інтенсивною композиторською діяльністю — що мотивувало цей вибір?'
  section: 'Формування: Від Буковинського вундеркінда до студента-медика'
  words: 1000
- points:
  - 'Народження легенди: створення «Червоної рути» та «Водограю» (1968-1970) — синтез гуцульського фольклору та сучасної поп-музики.'
  - 'Всесоюзний тріумф: перемога на фестивалі «Пісня-71», виконання Софією Ротару, шалена популярність в СРСР і за кордоном.'
  - 'Новаторство: Івасюк як творець нової якості української естради — сучасне аранжування, глибока лірика, відхід від радянського
    «шароварного» образу.'
  - 'Творча спадщина: понад 100 пісень («Два перстені», «Я піду в далекі гори»), інструментальна музика, музика до вистав.'
  section: 'Діяльність: Феномен «Червоної рути» та нова українська естрада'
  words: 1300
- points:
  - '[!anti-hagiography] Популярність як тягар: Івасюка змушували писати російською, вимагали «правильних» ідеологічних пісень,
    постійно викликали на «бесіди» в КДБ.'
  - 'Психологічний тиск: стеження, прослуховування телефону, заборона виїзду за кордон, звинувачення у націоналізмі.'
  - '[!myth-buster] Івасюк не був дисидентом у класичному розумінні. Він намагався працювати в рамках системи, але сама його
    проукраїнська творчість стала викликом для неї.'
  - 'Фатальний дзвінок: останній день життя, дзвінок з невідомого номера, після якого він зник. Що це було — пастка чи збіг?'
  section: 'Тінь: Під прицілом КДБ'
  words: 900
- points:
  - 'Повернення до розминки: Чому пісня стала небезпечною? Студент формулює відповідь: Івасюк довів, що українська культура
    може бути сучасною, популярною і самобутньою, що підривало ідею «злиття націй» в єдиний радянський народ.'
  - 'Івасюк як культурний маркер: «свій» для поколінь, символ незнищенності української ідентичності.'
  - '[!decolonization] Спадщина Івасюка — це деколонізація української естради, її повернення до національного коріння після
    десятиліть русифікації.'
  - 'Сучасне значення: фестиваль «Червона рута» як інституція пам''яті, переспіви пісень сучасними артистами, Івасюк у пантеоні
    національних героїв.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
