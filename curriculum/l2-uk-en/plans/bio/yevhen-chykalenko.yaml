content_outline:
- points:
  - '[!biography] Провокація: Як людина, що фінансувала увесь український рух початку ХХ ст. — від газети "Рада" до гонорарів
    письменників, — могла померти в бідності й бути практично забутою на десятиліття?'
  - Коротка цитата з його щоденника про "любов до України до глибини власної кишені" — без пояснення, хто це сказав.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Меценат vs Ідеолог. Чи був Чикаленко лише "гаманцем" руху, як вважали деякі радикали, чи його прагматизм і фокус
    на культурній інфраструктурі були власною, не менш важливою ідеологією?'
  - 'Дебат 2: Раціональний капіталіст vs Національний герой. Радянська історіографія таврувала його як "куркуля", що фінансував
    "буржуазний націоналізм". Пострадянська — іноді ідеалізує. Де правда?'
  - '[!epistemic-humility] Позиція сучасників (напр. Грушевського, Винниченка) щодо ролі Чикаленка була складною і змінювалася
    з часом.'
  - '[!decolonization] Розгляд ролі Чикаленка — це виклик як радянській пропаганді, так і романтичному наративу "боротьби
    духу", що ігнорує економічну основу будь-якого спротиву.'
  section: 'Конфліктна карта: Гроші чи Ідеї?'
  words: 900
- points:
  - 'Походження: виходець із заможньої родини на Полтавщині, але з глибоким зв''язком із селом та землею.'
  - 'Освіта та вплив народництва: парадокс "багатого народника". Як ідеї служіння народу поєднувалися з успішним капіталістичним
    господарюванням?'
  - 'Агроном-інноватор: економічна незалежність як фундамент. Його успішне господарство було не просто джерелом грошей, а
    філософією раціонального модернізаторства, яку він потім переніс на всю Україну.'
  section: 'Формування: Від землевласника до патріота'
  words: 1000
- points:
  - 'Видавець: фінансування та фактичне управління щоденною газетою "Рада" — першим подібним українським проєктом.'
  - 'Спонсор талантів: підтримка Коцюбинського, Винниченка та інших. Він не просто давав гроші, а створював "ринок" для української
    літератури.'
  - 'Організатор: роль у "Товаристві українських поступовців" (ТУП), співпраця та конфлікти з Грушевським, участь у подіях
    1917 року.'
  - 'Первинні джерела: аналіз листів та фінансових звітів, що показують масштаби його внесків.'
  section: 'Діяльність: Створення культурної інфраструктури'
  words: 1300
- points:
  - '[!anti-hagiography] "Легко любити Україну до глибини душі, а ви спробуйте до глибини кишені". Чи не була ця знаменита
    фраза також виразом розчарування в ідеалістах, які радо брали гроші, але критикували його "буржуазність"?'
  - 'Конфлікти з радикалами: його прагматизм і небажання фінансувати "авантюри" викликали звинувачення у поміркованості та
    браку революційного духу.'
  - '[!myth-buster] Міф про "безкорисливого мецената". Чикаленко був інвестором. Він очікував на "прибуток" — розбудову нації.
    Аналіз його щоденників показує, як він засмучувався, коли "інвестиції" не давали результату.'
  - 'Особиста трагедія: еміграція, втрата всього майна, бідність. Людина, яка була фінансовим центром нації, померла у злиднях,
    розчарована в результатах своєї праці.'
  section: 'Тінь: Ціна прагматизму'
  words: 900
- points:
  - 'Повернення до розминки: чому роль Чикаленка виявилася такою "незручною" для пізніших наративів? Студент формулює відповідь.'
  - 'Його спадщина — це не пам''ятники, а інституції: преса, видавництва, професійні письменники. Модель, яка актуальна сьогодні
    як ніколи.'
  - '[!decolonization] Відмова від "культу бідності". Чикаленко легітимізував багатство та підприємництво як інструменти національного
    визволення, що йде всупереч із лівими та народницькими ідеологемами.'
  - 'Зв''язок із сучасністю: роль великого бізнесу в сучасній війні. Чи є сьогоднішні олігархи-меценати спадкоємцями Чикаленка?
    В чому схожість і в чому різниця?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Євген Чикаленко як модель прагматичного меценатства, конфлікт між "грошима" та "ідеями" в українському національному
  русі, його недооцінена роль та трагічна особиста доля.
