content_outline:
- points:
  - >-
    [!biography] Знайомство з Валер'яном Підмогильним: прозаїк-інтелектуаліст,
    майстер психологічного аналізу й один з найкращих українських перекладачів
    французької літератури, чиє ім'я на десятиліття було викреслене з літератури.
  - >-
    Провокаційне питання: чому держава, що проголошувала «розквіт» культури,
    знищила автора першого українського роману про місто — і кому був небезпечний
    письменник, який писав не про класову боротьбу, а про самотність людини?
  section: Розминка
  words: 400
- points:
  - >-
    Дитинство і навчання: народження 1901 року в селі Чаплі на Катеринославщині
    (нині Дніпро) у бідній родині; навчання в Першому катеринославському реальному
    училищі та на факультетах університету, не закінчених через матеріальну скруту.
  - >-
    Ранній шлях: перші пригодницькі оповідання під псевдонімом «Лорд Лістер»;
    збірка «Твори. Том 1» (1920); вплив Петра Єфремова, Дмитра Яворницького та
    духовного наставника у відчутті слова — Михайла Коцюбинського.
  - >-
    Переїзд до Києва (1921): праця бібліографом, викладачем і редактором журналу
    «Життя й революція»; входження до «Аспису» й заснування об'єднання «Ланка»
    (1924), з 1926 року — «МАРС», київське побратимство з Косинкою та Плужником.
  - >-
    [!decolonization] Європейський вектор: Підмогильний свідомо вписував українську
    прозу у світовий контекст — перекладав Бальзака, Мопассана, Анатоля Франса,
    Дідро, а з Плужником уклав словник «Фразеологія ділової мови» (1926),
    розбудовуючи українську літературну мову замість наслідування імперських зразків.
  section: 'Формування: Від катеринославських степів до київської «Ланки»'
  words: 1000
- points:
  - >-
    Роман «Місто» (1928): перший український урбаністичний роман; історія селянського
    юнака Степана Радченка, що «завойовує» Київ; перенесення акценту з традиційної
    сільської теми на місто, психіку героїв і філософські питання буття.
  - >-
    Первинне джерело: рядок «Що більше Степан свою кімнату встатковував, то чужішою
    вона йому була» — образ відчуження й духовної порожнечі за зовнішнім успіхом.
  - >-
    Роман «Невеличка драма» (1930): зразок інтелектуальної та екзистенціальної прози.
    Авторська передмова: «У цьому романі я писав про міщанство… вартим громадської
    уваги задля своєї небезпечності». Підмогильний разом з В. Домонтовичем —
    зачинатель українського інтелектуального роману.
  - >-
    [!decolonization] Підмогильний-перекладач: його переклади французької класики
    досі вважають неперевершеними — доказ того, що українська мова здатна передати
    найскладнішу європейську прозу без посередництва імперської мови.
  section: 'Діяльність: «Місто» й народження українського урбаністичного роману'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Підмогильний не був ні підпільником, ні політичним змовником
    — він був письменником і перекладачем. Система знищила його за інтелектуальну
    незалежність і відмову зводити людину до класової функції, а не за реальну провину.
  - >-
    Механізм терору: арешт 8 грудня 1934 року в Харкові; звинувачення в «участі в
    терористичній організації». На допитах Підмогильний відповідав слідчим:
    «Винним себе не визнаю».
  - >-
    Сфабрикована справа: 11 січня 1935 року в протоколі з'являється вирване
    «зізнання» про належність до «групи письменників-націоналістів»; Інститут історії
    України каталогізує її як «Контрреволюційної боротьбистської організації» справу
    1935 року. Виїзна сесія Військової колегії Верховного Суду СРСР 27–28 березня
    1935 року без свідків і адвокатів засудила його до 10 років та конфіскації майна
    й відправила до Соловецького табору.
  - >-
    [!myth-buster] [!epistemic-humility] Справжню дату смерті десятиліттями приховували
    (формула «десять років без права листування»). Лише після 1991 року й виявлення
    поховання в Сандармосі 1997 року встановлено: 3 листопада 1937 року рішенням
    особливої трійки УНКВС Ленінградської області Підмогильного розстріляно разом
    із
    «соловецьким етапом» (понад 1100 в'язнів, серед них Зеров, Куліш, Курбас). У
    таборі він до останнього писав роман «Осінь 1929» — рукопис знищено.
  section: 'Тінь: Справа 1935 року та Сандармох'
  words: 1600
- points:
  - >-
    Повернення до розминки: чому письменник без політичної програми став мішенню?
    Студент формулює відповідь, спираючись на знання про тоталітарний контроль над
    культурою та страх режиму перед автономною думкою.
  - >-
    Доля спадщини: посмертна реабілітація 4 серпня 1956 року; перше повернення творів
    до читача аж 1989 року; знищені табірні рукописи й обірвані багатотомні переклади
    як міра втрати.
  - >-
    [!decolonization] Сучасне значення: Підмогильний — доказ, що українська проза
    1920-х була повноцінною європейською літературою; сучасні російські наративи,
    які
    «розчиняють» розстріляне відродження в «радянській» культурі, прямо заперечуються
    його біографією та текстами.
  - >-
    Жива релевантність: «Місто» та «Невеличка драма» сьогодні перевидають і вивчають;
    постать Підмогильного — частина пам'яті про Сандармох і про ціну, яку Україна
    заплатила за власну модерну культуру.
  section: 'Підсумок: Повернення «Міста»'
  words: 1000
focus: >-
  Валер'ян Підмогильний як творець першого українського урбаністичного роману «Місто»,
  зачинатель інтелектуальної прози й видатний перекладач французької літератури, жертва
  «соловецького етапу» в Сандармосі. Аналіз його прози, концепції відчуження та механізмів
  сталінських репресій.
level: BIO
module: bio-137
objectives:
- >-
  Аналізувати внесок Валер'яна Підмогильного в українську прозу — становлення
  урбаністичного та інтелектуального роману («Місто», «Невеличка драма»).
- >-
  Пояснювати роль Підмогильного як перекладача французької літератури та співавтора
  словника «Фразеологія ділової мови» у розбудові української літературної мови.
- >-
  Досліджувати механізм сталінських репресій на прикладі сфабрикованої «справи 1935
  року»
  та «соловецького етапу» в урочищі Сандармох.
- >-
  Критично оцінювати інтерпретації постаті Підмогильного — від радянського ярлика
  «попутника» до сучасного прочитання як автономного європейського модерніста.
