objectives:
- Аналізувати зв'язок драматургії Миколи Куліша з політичним контекстом «українізації» та подальших репресій
- Критично оцінювати сатиричне зображення мовно-культурної асиміляції та комплексу малоросійства у п'єсі «Мина Мазайло»
- Порівнювати творчий тандем і трагічні долі Миколи Куліша та Леся Курбаса
- Пояснювати місце і значення Куліша в рамках феномену Розстріляного відродження
