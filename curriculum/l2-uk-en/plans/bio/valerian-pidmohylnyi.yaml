content_outline:
- points:
  - 'Парадокс: Як п''єса про зміну прізвища («Мина Мазайло») могла стати найнебезпечнішим твором українського театру, що призвів
    до арешту та розстрілу її автора?'
  - '[!biography] Куліш — не просто драматург, а ключова фігура культурного опору, чия зброя — слово, а театр — поле бою.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був Куліш ідейним комуністом, що розчарувався, чи прихованим націоналістом, що використовував радянський
    дискурс для просування української ідеї? Порівняння ранніх п''єс (революційна патетика) з пізніми (сатира на режим).'
  - 'Дебат 2: Радянське «присвоєння» Куліша (як «співця революції, що припустився помилок») vs сучасна деколоніальна оптика
    (як символа опору лінгвоциду).'
  - '[!epistemic-humility] Його стосунки з партією були складними: він вірив у соціальну справедливість, але не міг миритися
    з нищенням української ідентичності.'
  - '[!decolonization] Творчість Куліша є яскравим прикладом боротьби проти малоросійства та русифікації в умовах тоталітарного
    тиску.'
  section: 'Конфліктна карта: Пролетарський письменник чи націонал-ухильник?'
  words: 900
- points:
  - 'Соціальне походження та освіта: як сільський хлопець з Херсонщини став інтелектуальним лідером столичної богеми.'
  - 'Досвід Першої світової війни та революції: формування антивоєнного світогляду та інтересу до долі «маленької людини».'
  - 'Робота інспектором Наросвіти: занурення в реалії політики «українізації» — матеріал для майбутніх п''єс.'
  - 'Переїзд до Харкова: входження в літературне середовище ВАПЛІТЕ, знайомство з Хвильовим та Курбасом.'
  section: 'Формування: Від херсонських степів до харківського авангарду'
  words: 1000
- points:
  - 'Тандем з Лесем Курбасом: синергія геніального драматурга та геніального режисера, що створила новий український модерний
    театр.'
  - 'П''єса «Народний Малахій»: трагікомедія про українського мрійника, що шукає «голубу даль» соціалізму, але стикається
    з радянським абсурдом.'
  - 'Сатирична комедія «Мина Мазайло»: блискучий аналіз комплексу малоросійства та мовно-культурної мімікрії в умовах русифікації.'
  - 'Первинне джерело: фрагменти з п''єси «Мина Мазайло», що демонструють мовну полеміку персонажів.'
  section: 'Діяльність: Театр «Березіль» і мовна шизофренія'
  words: 1300
- points:
  - '[!anti-hagiography] Рання творчість Куліша містила елементи революційного романтизму та віри в комуністичні ідеали. Чи
    не був він співучасником системи, яка його знищила?'
  - Конфлікт з частиною національної інтелігенції, яка звинувачувала його в «недостатньому» патріотизмі та заграванні з владою.
  - '[!myth-buster] Міф про те, що Куліш був дисидентом з самого початку. Його шлях — це болісна еволюція від ідейного комуніста
    до критика режиму.'
  - 'Арешт і допити: звинувачення в участі в «терористичній організації». Як система ламала людей — фізично та морально.'
  section: 'Тінь: Ціна компромісу та ілюзій'
  words: 900
- points:
  - 'Повернення до розминки: чому п''єса про прізвище стала вироком? Студент формулює відповідь, спираючись на знання про
    лінгвоцид та тоталітарний контроль.'
  - 'Трагічна доля: розстріл в один день з Лесем Курбасом, Валер''яном Підмогильним та іншими діячами в урочищі Сандармох
    — символ знищення цілого покоління.'
  - '[!decolonization] Спадщина Куліша — це не лише тексти п''єс, а й потужне щеплення від мовно-культурного пристосуванства,
    актуальне й сьогодні.'
  - 'Сучасна релевантність: постановки п''єс Куліша в сучасних театрах як спосіб осмислити історію та сьогодення.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykola Kulish's modernist plays, the satire "Myna Mazailo", his collaboration with Les Kurbas, and his tragic execution
  during the Executed Renaissance.
