content_outline:
- points:
  - '[!biography] Знайомство з Анатолем Петрицьким (1895–1964): художник-авангардист і реформатор сценографії,
    якого мистецтвознавець Дмитро Горбачов назвав «генієм українського авангарду».'
  - 'Провокаційний парадокс: як митець, чию галерею портретів сучасників знищила влада, врешті став народним
    художником СРСР із двома Сталінськими преміями? Виживання чи капітуляція?'
  section: Розминка
  words: 400
- points:
  - 'Київ, родина залізничника: навчання в Київському художньому училищі (1912–1917) у Федора Кричевського,
    приватні уроки Василя Кричевського, студія Олександра Мурашка та декоративна майстерня Олександри
    Екстер.'
  - 'Дебют у театрі (1916) і головний художник «Молодого театру» Леся Курбаса (1917–1919). Курбас: «Художник
    в українському театрі з’явився тоді, коли в „Молодий театр“ прийшов Анатоль Петрицький».'
  - '[!decolonization] Український авангард як рівноправний учасник європейського модернізму, а не провінція:
    альбом «Театральні строї Петрицького» (1929) мав у бібліотеці Пікассо, картину «Інваліди» відзначили
    на Венеційській бієнале 1930 року; співзасновник футуристичної «Нової генерації» (1927) разом із Ґео
    Шкурупієм і Вадимом Меллером.'
  section: 'Формування: Київська школа, Курбас і європейський авангард'
  words: 1000
- points:
  - 'Сценографія як «формальна революція»: понад 500 театральних робіт, конструктивно-експресивна манера,
    синтез авангарду й української народної орнаментики в театральних строях.'
  - '«Портрети сучасників» — амбітна «стопортретна» галерея діячів української культури 1920-х: Хвильовий,
    Курбас, Семенко, Гнат Юра, Іван Дніпровський, Іван Сенченко. Метод художника: «Якого чорта ви сидите
    як істукан?! …не заважайте мені бачити, який ви є в натурі».'
  - '1932 рік: виставка портретів у Харківському будинку літератури ім. В. Блакитного й підготовка альбому
    у видавництві «Рух» — візуальний літопис цілого покоління напередодні його знищення.'
  section: 'Діяльність: Сценограф і стопортретна галерея'
  words: 1200
- points:
  - '[!anti-hagiography] Петрицький не був ані мучеником, ані дисидентом: його не заарештували й не розстріляли.
    Механізм репресій тут інший — знищення творів, цькування за «формалізм» і примусова кооптація митця,
    чий талант був вигідний режимові.'
  - 'Знищена галерея: з понад сотні портретів уціліло не більше десятка — бо портретовані стали «ворогами
    народу» (Курбас розстріляний у Сандармосі 1937, Семенко розстріляний 1937, Хвильовий — самогубство
    під тиском 1933). Альбом так і не надрукували; розкішний альбом «Театральні строї» (1929) заборонили
    та знищили.'
  - 'Граматика виживання: захищаючи Пікассо, Петрицький змушений додати ідеологічне застереження — «велика
    майстерність, але майстерність і світогляд не нашого класу». Картину «Інваліди» вдома відправили до
    «спецфонду».'
  - '[!myth-buster] Перевірка міфу «художник тихо зберіг авангард усередині театру»: вступ до ВКП(б) 1943
    року, дві Сталінські премії (1949 — «Макар Діброва», 1951 — «Калиновий гай»), орден Леніна — задокументовані
    компроміси, а не таємний спротив.'
  - '[!epistemic-humility] Як судити виживання за тоталітаризму? Режим знищив головну справу його життя,
    а потім нагородив його; ми не маємо його приватного свідчення про те, як він це пережив. Уникаймо
    і агіографії, і поспішного засудження.'
  section: 'Тінь: Формалізм, знищена галерея і ціна виживання'
  words: 1600
- points:
  - 'Що вціліло: понад 500 театральних проєктів у Музеї театрального, музичного та кіномистецтва України,
    картина «Півонії», жменя портретів; посмертні альбоми (1968, 1991) і повернене ім’я авангардиста.'
  - '[!decolonization] Знищена «стопортретна» галерея як свідоме стирання української культурної відлиги
    — візуальне Розстріляне відродження; порожні рамки самі стали доказом того, що знищила радянсько-російська
    імперська репресія.'
  - 'Сучасна релевантність: перечитування виживання, кооптації та ціни мистецтва під імперією; протидія
    привласненню українського авангарду як «російського» чи «радянського».'
  section: 'Підсумок: Уцілілий і галерея, якої немає'
  words: 1000
focus: Анатоль Петрицький як геній українського театрального авангарду й майстер «стопортретної» галереї,
  чия творчість стала мішенню антиформалістичної кампанії. Аналіз сценографії, знищення «Портретів сучасників»
  і складної етики виживання митця в тоталітарній державі.
level: BIO
module: bio-125
objectives:
- Аналізувати внесок Анатоля Петрицького в український театральний авангард і сценографію 1910–1920-х
  років.
- Пояснювати механізм нищення культури через знищення «стопортретної» галереї та антиформалістичну кампанію
  1930-х.
- Критично оцінювати виживання митця через кооптацію режимом — партквиток, Сталінські премії, соцреалізм
  — без агіографії та без спрощеного засудження.
- Досліджувати знищену портретну галерею як візуальний літопис Розстріляного відродження та об’єкт відновленої
  національної пам’яті.
