content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: Як комедія про мову («Мина Мазайло») могла стати смертним вироком для її автора?'
  - 'Провокаційне питання: Чи можна вважати сатиру на мовні комплекси злочином проти держави?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1 (за життя): Куліш — радянський сатирик, що викриває міщанство, чи український інтелектуал, що ставить під сумнів
    саму суть «українізації»?'
  - 'Дебат 2 (після смерті): Як радянська пропаганда перетворила драматурга на «буржуазного націоналіста» для виправдання
    репресій, і як сучасна Україна бачить його як мученика за національну ідею.'
  - '[!epistemic-humility] Оцінки п''єс Куліша були діаметрально протилежними — від захоплення до звинувачень в ідеологічній
    диверсії. Чи існує «правильна» інтерпретація?'
  section: 'Конфліктна карта: Сатирик, націоналіст чи «ворог народу»?'
  words: 900
- points:
  - 'Соціальний контекст: дитинство в умовах імперської політики русифікації.'
  - 'Освіта та світогляд: як шкільний учитель та офіцер царської армії став провідним радянським драматургом?'
  - 'Переїзд до Харкова: входження в коло літературної еліти, знайомство з Хвильовим та Курбасом, початок роботи для театру.'
  section: 'Формування: Від херсонських степів до харківського авангарду'
  words: 1000
- points:
  - 'Аналіз «Мини Мазайла»: сатира на міщанське бажання «покращити» своє прізвище як метафора національного самозречення.'
  - 'Творчий тандем: легендарна співпраця з режисером-реформатором Лесем Курбасом у театрі «Березіль».'
  - 'Інші твори: «Народний Малахій», «Патетична соната» — експерименти з формою та філософські пошуки.'
  section: 'Діяльність: Театр абсурду і сатири — «Мина Мазайло» та «Березіль»'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - 'Критика та цькування: як вистави Куліша стали «антирадянськими», а він сам — «ворогом народу».'
  - 'Арешт та допити: звинувачення в участі у «терористичній організації» та сфабрикований судовий процес.'
  - 'Трагічний фінал: розстріл 3 листопада 1937 року в урочищі Сандармох разом з Лесем Курбасом та сотнями інших представників
    української інтелігенції.'
  - '[!anti-hagiography] Куліш не був дисидентом у сучасному розумінні; він намагався творити в рамках радянської системи,
    доки система не знищила його.'
  section: 'Тінь: Злам, арешт і Сандармох'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: студент формулює відповідь, чому комедія стала трагедією в умовах тоталітарного режиму.'
  - 'Спадщина Куліша: чи є він лише жертвою сталінського терору, чи його творчість залишається актуальною сьогодні?'
  - '[!decolonization] Переоцінка ролі Куліша — від «ворога народу» в СРСР до одного з символів «Розстріляного відродження»
    в незалежній Україні.'
  - 'Сучасна релевантність: як п''єси Куліша про мовну політику та національну ідентичність резонують із сьогоденням?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykola Kulish's plays (Myna Mazailo), linguistic satire, partnership with Les Kurbas, role in the Executed Renaissance,
  tragic fate at Sandarmokh
level: BIO
module: bio-103
objectives:
- Аналізувати сатиру Миколи Куліша як форму художнього дослідження та культурного спротиву.
- Пояснювати складний зв'язок між творчістю драматурга та політикою «українізації» 1920-х років.
- Характеризувати унікальність творчого тандему Куліша та Курбаса та їхній вплив на розвиток українського театру.
- Критично оцінювати причини та наслідки трагічної долі Миколи Куліша в контексті сталінських репресій.
pedagogy: CBI
