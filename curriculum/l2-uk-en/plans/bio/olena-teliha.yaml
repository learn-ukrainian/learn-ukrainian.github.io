content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: Олена Теліга — одна з найвідоміших жінок-мучениць українського націоналізму, але її свідома хода на смерть
    у Бабин Яр була актом не покори, а найвищого спротиву.'
  - 'Провокація: Чи може вірш бути зброєю? Теліга відповіла на це питання власним життям.'
  - Символ поєднання поезії та чину, трагічна доля в окупованому Києві.
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1: Мисткиня vs Активістка. У празькому середовищі сперечалися, чи не шкодить політична ангажованість її поетичному
    таланту. Чи була вона насамперед поеткою, яка стала націоналісткою, чи націоналісткою, що використовувала поезію?'
  - 'Дебат 2: Спадщина. Для одних вона — ікона націоналістичного руху, приклад самопожертви. Для інших — трагічна фігура,
    чий талант і життя були поглинуті ідеологією. Як її образ використовується сьогодні?'
  - '[!epistemic-humility] Немає єдиної відповіді на те, де в ній закінчувалася поетка і починалася діячка ОУН. Її власні
    тексти дають аргументи обом сторонам.'
  - '[!decolonization] Радянська пропаганда повністю замовчувала її, а коли не могла — таврувала як «буржуазну націоналістку»
    та «пособницю фашистів». Деконструкція цих наративів є ключовою.'
  section: 'Конфліктна карта: Поетка чи націоналістка?'
  words: 900
- points:
  - Аристократичне походження в родині інженера, професора КПІ. Російськомовне дитинство і свідомий перехід на українську
    в підлітковому віці.
  - Еміграція після революції як травма і поштовх до кристалізації ідентичності.
  - Життя в Чехословаччині, навчання в Українському вільному університеті в Празі — інтелектуальному центрі еміграції.
  - Формування поетичного голосу в колі «Празької школи», де поєднувались європейський модернізм та український вольовий націоналізм.
  section: 'Формування: Від Іллінців до Праги'
  words: 1000
- points:
  - 'Основні теми творчості: воля, боротьба, кохання як партнерство рівних, вибір, жертва. Відмова від сентиментальності та
    «жіночої» лірики.'
  - Есеїстика як теоретичне обґрунтування ролі митця в національній боротьбі. Мистецтво не може бути аполітичним, коли нація
    під загрозою.
  - Ключова збірка «Душа на сторожі» — поетичний маніфест діяльного націоналізму.
  - Вплив «Празької школи» (Євген Маланюк, Юрій Дараган) і водночас вироблення власного, жіночого погляду на ці теми.
  section: 'Діяльність: Поезія вогню та чину'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Рішення повернутися до Києва було прийняте в рамках похідної групи ОУН (м). Це була свідома співпраця
    з нацистами проти СРСР, базована на наївному сподіванні, що німці дозволять створити незалежну Україну.'
  - Конфлікти всередині націоналістичного руху, зокрема між мельниківцями (до яких належала Теліга) та бандерівцями, часто
    були жорстокими та безпринципними.
  - Ігнорування реальності нацистської ідеології. Теліга та її соратники вірили у «визвольну місію» Вермахту, не розуміючи,
    що для нацистів вони були лише тимчасовими інструментами і "унтерменшами".
  - '[!myth-buster] Міф про «героїчну непокору» нацистам з першого дня є спрощенням. Був короткий період (осінь 1941) легальної
    діяльності (Спілка письменників, журнал «Літаври»), який закінчився, коли нацистам більше не потрібна була українська
    підтримка.'
  section: 'Тінь: Ціна ідеалізму'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - Арешт гестапо та розстріл у Бабиному Яру в лютому 1942 року. Свідома відмова від втечі.
  - 'Легенда про напис на стіні камери: «Тут сиділа і звідси йде на смерть Олена Теліга».'
  - 'Повернення до розминки: її смерть перетворила її поезію на беззаперечний чин, знявши внутрішній конфлікт її життя.'
  - Спадщина Теліги — це не лише її вірші, а й приклад екзистенційного вибору, де ціна слова дорівнює ціні життя. Як її спадщина
    використовується в сучасній російсько-українській війні?
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Olena Teliha as a case study in the tension between art and political action, examining her evolution from
  an émigré poet to a nationalist martyr in Nazi-occupied Kyiv.
level: BIO
module: bio-118
objectives:
- Аналізувати життя та творчість Олени Теліги в контексті ідеологічної боротьби 1930-40-х років
- Критично оцінювати складні відносини між мистецтвом та політичною дією, використовуючи біографію Теліги як приклад
- Деконструювати радянські та сучасні пропагандистські наративи навколо українського націоналізму міжвоєнного періоду
- Формулювати власну аргументовану позицію щодо моральних та екзистенційних виборів, які поставали перед українською інтелігенцією
  в XX столітті
