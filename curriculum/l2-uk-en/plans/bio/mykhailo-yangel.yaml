content_outline:
- points:
  - 'Парадокс: Михайло Янгель створив ракетний щит СРСР, але його головним конкурентом і опонентом був інший українець — Сергій
    Корольов. Чиєю ідеологією керується сучасна космонавтика?'
  - '[!biography] Янгель як архітектор ракетної потуги, що визначила обличчя Холодної війни.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Корольов vs Янгель. Кріогенне паливо проти компонентів, що довго зберігаються. Два бачення, дві школи, жорстка
    конкуренція за ресурси та вплив. Це була творча конкуренція чи руйнівний конфлікт?'
  - 'Дебат 2: Спадщина Янгеля — оборонний щит чи засіб першого удару? Ракети Р-36М «Сатана» як інструмент ядерного шантажу
    та гарант «взаємного гарантованого знищення».'
  - '[!epistemic-humility] Оцінки ролі Янгеля коливаються від «генія оборони» до «архітектора апокаліпсису».'
  - '[!decolonization] Як радянська пропаганда використовувала образ Янгеля, українця з сибірським корінням, для створення
    міфу про «братню дружбу народів» у підкоренні космосу.'
  section: 'Конфліктна карта: Ракетний щит чи каральний меч?'
  words: 900
- points:
  - 'Сибірське заслання та українське коріння: родина з Чернігівщини, депортована до Іркутської губернії.'
  - Навчання в Москві, захоплення авіацією та перехід у нову, таємну галузь — ракетобудування.
  - Призначення головним конструктором КБ «Південне» (1954) — початок епохи Янгеля в Дніпрі.
  - Формування унікальної інженерної школи, заснованої на прагматизмі, надійності та автоматизації.
  section: 'Формування: Шлях із Сибіру в Дніпро'
  words: 1000
- points:
  - 'Створення революційних бойових ракетних комплексів на компонентах палива, що довго зберігаються: Р-12, Р-16, Р-36.'
  - Принцип «ампулізації» — ракети, готові до старту роками, що змінило баланс сил у світі.
  - 'Конверсія бойових ракет у мирні носії: «Космос», «Циклон», «Зеніт». Як зброя ставала інструментом науки.'
  - Перетворення Дніпра на закрите «ракетне місто», центр космічних технологій СРСР та інтелектуальну столицю України.
  section: 'Діяльність: Школа Янгеля і ракетна столиця'
  words: 1300
- points:
  - '[!anti-hagiography] 24 жовтня 1960 року, Байконур. Вибух ракети Р-16 на стартовому майданчику. Загибель десятків людей,
    включно з маршалом Неделиним. Янгель дивом вижив, відійшовши покурити.'
  - 'Аналіз причин трагедії: тиск з боку керівництва, порушення протоколів безпеки, змагання з Корольовим. Особиста відповідальність
    головного конструктора.'
  - '[!myth-buster] Радянська пропаганда десятиліттями приховувала катастрофу. Це не «нещасний випадок», а системний провал,
    що виявив темний бік космічних перегонів.'
  - Людська ціна гонки озброєнь, яку живили розробки Янгеля.
  section: 'Тінь: Ціна прогресу та Неделинська катастрофа'
  words: 900
- points:
  - Повернення до початкового парадоксу: чия школа — Корольова чи Янгеля — перемогла в історії?
  - 'Спадщина для України: КБ «Південне» та «Південмаш» після розпаду СРСР. Боротьба за виживання, міжнародні проєкти (Sea
    Launch, Antares) та роль у сучасній обороноздатності.'
  - '[!decolonization] Янгель як символ інтелектуальної могутності та технологічної агентності України, яку радянська, а тепер
    і російська історіографія намагається привласнити або знецінити.'
  - Як спадщина Янгеля впливає на сучасне покоління українських інженерів?
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Mykhailo Yangel as a complex figure: the rivalry with Korolev, the dual nature of his creations (shield vs. sword),
  the Nedelin catastrophe, and his enduring legacy in Dnipro.'
level: BIO
module: bio-125
objectives:
- Критично аналізувати внесок Михайла Янгеля, розглядаючи його як у контексті науково-технічного прогресу, так і в контексті
  гонки озброєнь.
- Порівнювати інженерні школи Янгеля та Корольова, ідентифікуючи їхні ключові відмінності та філософію.
- Формулювати аргументовану позицію щодо моральної відповідальності вченого за використання його розробок.
- Розпізнавати та деконструювати радянські та російські наративи про український внесок у освоєння космосу.
