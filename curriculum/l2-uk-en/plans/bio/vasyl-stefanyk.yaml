content_outline:
- points:
  - 'Провокація: Як міг «найсильніший новеліст», за словами Франка, замовкнути на тридцять років на вершині своєї слави?'
  - Фрагмент новели «Камінний хрест» — як селянин прощається зі своїм полем, ніби з живою істотою. Що змушує людину так говорити?
  - '[!biography] Миттєве знайомство з ключовою дилемою життя Стефаника.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Письменницький обов''язок vs громадський обов''язок. Чи було його депутатство у Віденському парламенті
    зрадою літератури, чи вищою формою служіння народу?'
  - 'Дебат 2 (у спадщині): Радянська критика бачила в ньому лише «співця знедоленого селянства», ігноруючи європейський модернізм.
    Сучасна — повертає його в контекст світового експресіонізму.'
  - '[!epistemic-humility] Причини мовчання достеменно невідомі. Версії: психологічна травма від війни, творча криза, свідомий
    вибір на користь політики. Правда може бути в комбінації всіх трьох.'
  - '[!decolonization] Стефаник — не просто «селянський письменник», а складний європейський модерніст, який використав селянську
    тему для вирішення екзистенційних питань.'
  section: 'Конфліктна карта: Прокляття мовчання'
  words: 900
- points:
  - 'Народження в Русові на Покутті, в заможній селянській родині. Парадокс: писав про бідних, будучи багатим.'
  - 'Соціальний і культурний контекст: трагізм селянського буття, щоденна боротьба за землю, еміграція як єдиний вихід.'
  - 'Освіта в Коломиї та Дрогобичі: перші зіткнення з соціальною несправедливістю та польським шовінізмом.'
  - 'Формативні впливи: народна культура Покуття, усна традиція, щоденні драми односельчан.'
  section: 'Формування: Покутський космос (1871-1890)'
  words: 1000
- points:
  - Навчання на медичному факультеті в Кракові, яке він так і не закінчив, обравши літературу замість медицини.
  - Знайомство з Франком, який визнав його «найбільшою силою» в малій прозі, та польськими модерністами.
  - 'Вибуховий дебют: збірки «Синя книжечка», «Камінний хрест», що принесли миттєву славу.'
  - 'Художній метод: граничний лаконізм, психологізм, використання покутського діалекту як літературної мови, експресіоністичне
    зображення людських страждань.'
  section: 'Діяльність: Поетика болю (1890-1900)'
  words: 1300
- points:
  - '[!anti-hagiography] Політична кар''єра як втеча від літератури. Чи було його депутатство в парламенті ефективним? Чи
    не більшу користь він приніс би як письменник?'
  - 'Тридцять років «мовчання» — не абсолютна тиша, а період, коли громадська діяльність затьмарила літературну. Дослідження
    причин: втома, розчарування, світоглядна криза.'
  - '[!myth-buster] Міф про «повне мовчання». Стефаник продовжував писати, але мало і несистематично. Це була не смерть таланту,
    а його болісна трансформація.'
  - 'Проблема багатства: як син заможного селянина, він сам був частиною тієї еліти, яку іноді критикував. Цей внутрішній
    конфлікт — одна з можливих причин його психологічної драми.'
  section: 'Тінь: Ціна мовчання (1900-1936)'
  words: 900
- points:
  - 'Повернення до розминки: Чому Стефаник мовчав? Студент формулює власну відповідь, використовуючи аргументи з модуля.'
  - 'Спадщина: Стефаник як творець української психологічної новели, його вплив на наступні покоління (Стельмах, Тютюнник).'
  - '[!decolonization] Переосмислення образу: від «співця горя народного» до екзистенціаліста світового рівня, який говорив
    про універсальні людські трагедії через український матеріал.'
  - 'Сучасне значення: в епоху надлишку слів, чого нас вчить радикальний лаконізм і чесність Стефаника?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Василь Стефаник: майстер експресіоністичної новели, покутський геній, поетика болю та феномен 30-річного літературного
  мовчання.'
