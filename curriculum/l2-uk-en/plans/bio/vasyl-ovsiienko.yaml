content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Овсієнком: дисидент, розповсюджувач самвидаву, політв'язень та літописець правозахисного руху.
  - >-
    Провокаційне питання: як людина, яку система намагалася змусити замовкнути, стала головним архіваріусом пам'яті про інших політв'язнів?
  section: Розминка
  words: 400
- points:
  - >-
    Навчання на філологічному факультеті Київського університету (1967–1972) та знайомство з ідеями шістдесятників.
  - >-
    [!decolonization] Розповсюдження праці І. Дзюби "Інтернаціоналізм чи русифікація?" та співпраця з Василем Лісовим і Євгеном Пронюком над "Українським вісником".
  - >-
    Арешт навесні 1973 року за статтею 62 (антирадянська агітація та пропаганда) і перший вирок: чотири роки таборів суворого режиму.
  section: 'Формування: Від студента до самвидаву'
  words: 1000
- points:
  - >-
    [!myth-buster] Звільнення у 1977 році не означало свободи: тиск КДБ, вимога публічного покаяння та постійний нагляд.
  - >-
    Членство в Українській Гельсінській групі (УГГ) та нові сфабриковані кримінальні справи у 1979 і 1981 роках за опір системі.
  - >-
    Вирок 1981 року (Житомирський суд): десять років таборів особливого режиму та п'ять років заслання за відмову співпрацювати.
  section: 'Тінь: Механізм репресій та багаторазові арешти'
  words: 1200
- points:
  - >-
    Звільнення у 1988 році (помилування) та участь у роботі координаційної ради Української Гельсінської спілки.
  - >-
    [!decolonization] Овсієнко як співорганізатор історичного перепоховання Василя Стуса, Олекси Тихого та Юрія Литвина у листопаді 1989 року — ключовий момент відновлення пам'яті.
  - >-
    Багаторічна робота в Харківській правозахисній групі (ХПГ), запис інтерв'ю та створення архіву спогадів політв'язнів.
  - >-
    Проєкт усього життя — книга нарисів і спогадів "Світло людей", як акт документального протистояння тоталітарному забуттю.
  section: 'Діяльність: Перепоховання та "Світло людей"'
  words: 1600
- points:
  - >-
    Аналіз цитати: "То гідність народу складається з гідностей кожного з нас...".
  - >-
    Значення діяльності Овсієнка: як система, що криміналізувала самвидав, сама створила умови, за яких колишні в'язні збирали пам'ять по крихтах.
  - >-
    Овсієнко як живий міст між поколінням шістдесятників і сучасною незалежною Україною (до смерті у 2023 році).
  section: 'Підсумок: Гідність народу'
  words: 1000
focus: >-
