content_outline:
- points:
  - >-
    [!biography] Знайомство з Володимиром Рибаком (1971–2014): депутат міської ради Горлівки,
    місцевий проукраїнський активіст.
  - >-
    Провокаційне питання: чому захист державного прапора у власному місті став актом
    смертельної небезпеки під час початку російської агресії на Донеччині?
  section: Розминка
  words: 400
- points:
  - >-
    Робота в місцевому самоврядуванні: депутатська діяльність у Горлівці як опозиційного
    політика від "Батьківщини".
  - >-
    Квітень 2014 року: російська збройна агресія на Донеччині. Рибак як активний учасник
    місцевого мітингу "За єдину Україну".
  - >-
    [!decolonization] Дія Рибака спростовує російський міф про "зовнішню" проукраїнську
    позицію: він діяв у своєму рідному місті як місцевий обраний представник.
  section: 'Формування: Місцеве самоврядування і громадська діяльність'
  words: 1000
- points:
  - >-
    17 квітня 2014 року: спроба Рибака зняти прапор так званої "ДНР" і повернути
    український державний прапор на будівлю міськради Горлівки.
  - >-
    Як ця публічна акція громадянського спротиву зробила його мішенню для
    проросійських збройних формувань.
  - >-
    Перші свідчення та повідомлення про викрадення від дружини Олени Рибак
    ("Вони сказали, що вашого чоловіка викрали").
  section: 'Діяльність: Прапор і спротив у квітні 2014-го'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Деконструкція російської пропаганди: викрадення не було
    випадковістю чи наслідком "хаосу", а цілеспрямованим терором проти українських діячів.
  - >-
    Механізм терору: викрадення, катування і вбивство проросійськими бойовиками
    угруповання Бєзлєра/Гіркіна.
  - >-
    Знайдення тіла 22 квітня поблизу Слов'янська та перехоплені СБУ аудіозаписи
    як доказова база російської збройної агресії.
  section: 'Тінь: Викрадення і катування'
  words: 1600
- points:
  - >-
    Визнання: Указ Президента України №94/2015 про присвоєння звання Герой України.
  - >-
    Свідчення вдови та збереження пам'яті: меморіальні дошки і роль його історії в
    розумінні раннього етапу окупації Донеччини.
  - >-
    Сучасне значення: Володимир Рибак як один з перших задокументованих мучеників
    періоду окупації Донбасу.
  section: 'Підсумок: Збереження пам''яті та "Герой України"'
  words: 1000
focus: >-
  Володимир Рибак як місцевий обраний представник та активіст Горлівки, його акт громадянського
  спротиву з українським прапором і цілеспрямоване вбивство проросійськими бойовиками навесні 2014 року.
level: BIO
module: bio-289
objectives:
- >-
  Аналізувати історію Володимира Рибака як приклад місцевого українського громадянського
  спротиву під час російського захоплення Донеччини у 2014 році.
- Розуміти механізми терору і викрадень як частину стратегії встановлення окупаційної влади.
- Досліджувати доказову базу (свідчення родини, матеріали СБУ) щодо злочинів проросійських збройних угруповань.
- Оцінювати роль символів (зокрема українського державного прапора) у протистоянні агресору.
