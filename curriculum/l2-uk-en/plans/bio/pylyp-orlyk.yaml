content_outline:
- points:
  - 'Провокація: Пилип Орлик — автор першої в Європі конституції чи гетьман-вигнанець, чий проєкт так і не було реалізовано?
    Парадокс документа, що випередив свій час, але не мав сили.'
  - '[!biography] Знайомство з Пилипом Орликом через його підпис під «Пактами і Конституціями» — документ, що став його головним
    здобутком і трагедією.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Легітимність Орлика. Чи було обрання гетьмана в еміграції (Бендери, 1710) законним актом, чи актом відчаю групи
    вигнанців, на противагу гетьману Скоропадському, що мав владу в Україні?'
  - 'Дебат 2: «Перша європейська конституція» vs «Символічний документ». Радянська історіографія ігнорувала або применшувала
    значення документа. Сучасна українська — іноді перебільшує його реальний вплив. Де правда?'
  - '[!epistemic-humility] Оцінка демократичності: чи були «Пакти» справжнім обмеженням влади, чи лише способом здобути підтримку
    козацької старшини в боротьбі за владу?'
  - '[!decolonization] Конституція як акт розриву з московською моделлю самодержавства і декларація європейського вибору України
    ще у XVIII столітті.'
  section: 'Конфліктна карта: Конституція — символ чи реальний інструмент?'
  words: 900
- points:
  - 'Походження та освіта: шляхетське коріння, Києво-Могилянська академія — кузня еліт того часу.'
  - 'Кар''єра в гетьманській канцелярії: шлях від простого канцеляриста до Генерального писаря — найближчої довіреної особи
    гетьмана Івана Мазепи.'
  - 'Формативний досвід: що означало бути правою рукою Мазепи в часи найбільшої могутності й під час підготовки до повстання
    проти Москви?'
  - 'Вибір вірності: момент істини 1708 року — чому Орлик, на відміну від багатьох, залишився з Мазепою до кінця?'
  section: 'Формування: Від канцеляриста до соратника Мазепи'
  words: 1000
- points:
  - 'Обрання гетьманом: смерть Мазепи в Бендерах і обрання Орлика його наступником. Ухвалення «Пактів і Конституцій прав і
    вольностей Війська Запорозького».'
  - 'Аналіз Конституції: структура, обмеження влади гетьмана, створення Генеральної ради, гарантії прав старшини, міщан і
    (обмежено) селян.'
  - 'Первинне джерело: розбір ключових статей Конституції — про незалежність від Москви, про православну віру, про соціальні
    гарантії.'
  - 'Дипломатична боротьба: Прутський похід 1711 року, створення антимосковських коаліцій, десятиліття мандрів європейськими
    дворами (Швеція, Німеччина, Франція, Османська імперія) у пошуках підтримки.'
  section: 'Діяльність: Гетьман у вигнанні та його Конституція'
  words: 1300
- points:
  - '[!anti-hagiography] Провал Прутського походу 1711 року — військова поразка, що перекреслила надії на швидке повернення
    в Україну.'
  - 'Дипломатична поразка: попри 30 років зусиль, Орлику так і не вдалося створити стійку коаліцію і повернути гетьманську
    владу. Його ідеї не знайшли реальної військової та політичної підтримки.'
  - 'Особиста трагедія: життя у вигнанні, бідність, постійні переїзди, розлука з родиною, смерть у чужій землі (Молдова).'
  - '[!myth-buster] Міф про «забутого гетьмана». Орлик не був забутий — він був небезпечний для імперії навіть після смерті.
    Його ім''я і його Конституція були символом спротиву, тому їх активно намагалися стерти з пам''яті.'
  section: 'Тінь: Ціна боротьби'
  words: 900
- points:
  - 'Повернення до розминки: тож чим є Конституція 1710 року — реальним документом чи утопічною візією? Студент формулює відповідь,
    спираючись на знання про її зміст і трагічну долю її автора.'
  - 'Спадщина: Орлик заклав ідею конституціоналізму та парламентаризму в українську політичну думку. Його Конституція стала
    символом державницької традиції, на яку посилалися наступні покоління борців за незалежність.'
  - '[!decolonization] Місце Орлика в українській історії — не просто гетьман-невдаха, а перший політичний емігрант, що перетворив
    військову поразку на ідеологічну перемогу, сформулювавши ідею правової, соборної України.'
  - 'Сучасне значення: чому Конституцію Пилипа Орлика згадують у преамбулі сучасної Конституції України? Зв''язок ідей XVIII
    століття із сьогоденням.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Пилип Орлик, Конституція 1710 року, перша політична еміграція, боротьба за легітимність, ідея обмеження гетьманської
  влади
