content_outline:
- points:
  - 'Провокація: Іван Гонта — мученик і народний герой пісень чи офіцер панської міліції, чиє перейдення відкрило шлях до різанини в Умані? Як людина з апарату, що обороняв Умань, стала одним із проводирів повстання проти нього?'
  - '[!biography] Старший сотник уманського надвірного війська Потоцького, що перейшов до гайдамаків, був проголошений уманським полковником — і після тортур страчений польським судом.'
  - '[!anti-hagiography] Модуль не зводить Гонту ні до чистого мученика, ні до самого лише «карателя»: Уманська різанина — центральний факт його історії.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (перспективи): для повстанців і пізнішої народної пам''яті — герой, що перейшов до своїх; для польської влади — зрадник присяги, якого належить жорстоко покарати; для жертв Умані — учасник масового вбивства.'
  - 'Дебат 2 (пам''ять проти запису): народні пісні й Шевченків «Гонта в Умані» роблять мученика й батька-символ; ЕІУ/IEU фіксують перейдення, різанину, проголошення полковником, арешт і страту.'
  - '[!decolonization] Російські війська не «відновили лад»: за IEU донський полк полковника Гурєва обманом переконав повстанців у підтримці, а тоді захопив близько 900 осіб.'
  - '[!epistemic-humility] Рік і місце народження невідомі (IEU пов''язує з Розсішками); дати Умані подаються за старим (9-10 червня) і новим (21 червня) стилем — це календарна різниця, а не хаос джерел.'
  section: 'Конфліктна карта: мученик, зрадник чи каратель?'
  words: 900
- points:
  - 'Соціальне становище: за ЕІУ Гонта — не простий розбійник, а людина з чималим господарством у Розсішках, авторитетом серед підлеглих козаків і становищем у шляхетському середовищі.'
  - 'Служба: за IEU від 1757 року — в уманському надвірному війську київського воєводи Потоцького; його перейдення прийшло зсередини апарату, що обороняв Умань.'
  - 'Магнатський лад: надвірне військо й уманська фортеця показують, як магнатська влада мілітаризувалася локально; це точніше, ніж «вільний селянин-повстанець».'
  - 'Конфесійно-політичне тло: ті самі православно-унійно-католицькі, барсько-конфедератські й імперські динаміки, що й у Залізняка; історію Гонти не можна відривати від кризи пограниччя.'
  section: 'Формування: сотник надвірного війська'
  words: 1000
- points:
  - 'Початок червня 1768 року: переговори із Залізняком під Уманню — вирішальний військово-політичний поворот.'
  - 'Перейдення: Гонта перевів не лише себе, а довірені уманські надвірні загони до повстанців, змінивши баланс перед штурмом.'
  - 'Штурм Умані: за ЕІУ — 9-10 червня, за IEU — 21 червня 1768 року (старий/новий стиль).'
  - '[!anti-hagiography] Уманська різанина: спільні сили захопили місто й учинили масове вбивство польської шляхти, євреїв, римо-католиків та уніатів. Джерела (ЕІУ, IEU, єврейська пам''ять) вимагають називати це прямо; Гонта не подається лише в рамці «уманський сотник-герой».'
  - 'Після Умані: Гонту проголосили уманським полковником; він став одним із найближчих сподвижників Залізняка й допомагав поширювати повстання.'
  section: 'Діяльність: Умань 1768 — перейдення й різанина'
  words: 1300
- points:
  - 'Російський обман і захоплення: за IEU полковник Гурєв запросив повстанців на бенкет і захопив близько 900 осіб; за ЕІУ російські регулярні війська заарештували Гонту 26 червня (ст. ст.).'
  - 'Юрисдикція й кара: як польсько-литовського підданого Гонту видали польській стороні; його кілька днів катували й стратили 14 липня 1768 року в Сербах (нині Гонтівка) за вироком шляхетського суду.'
  - '[!anti-hagiography] Деталь про прибиття частин тіла в 14 містечках джерельно підтверджена, але надзвичайно жорстока — уживати ощадливо й із чутливістю до рівня; це показ державно-шляхетської відплати, а не лише «мучеництво».'
  - '[!myth-buster] Сюжет про вбивство власних синів із Шевченкових «Гайдамаків» — літературна легенда; без окремого джерела не подавати як документальну історію. Не перетворювати маєткову оренду на колективну єврейську провину й не зводити всіх поляків до «гнобителів».'
  section: 'Тінь: обман, тортури й страта'
  words: 900
- points:
  - 'Повернення до розминки: мученик, зрадник чи каратель — чи постать лишається складнішою за будь-який один ярлик?'
  - 'Порівняння із Залізняком: Залізняк — запорозький організатор; Гонта — уманський сотник, чиє перейдення відкрило місто. Парне вивчення не дає одній постаті поглинути роль іншої.'
  - '[!decolonization] Рецепція (Шевченко, пісні Максимовича, монументи, шкільні перекази) часто робить Гонту чистим мучеником; тримати її в окремій рамці пам''яті, відділеній від документованих дій.'
  section: 'Дискусія та підсумок: перейдення, різанина й пам''ять'
  words: 700
focus: 'Ivan Gonta as the Uman household-militia sotnyk whose defection to Zalizniak''s haidamaks opened the city: the magnate service he turned against, the storming of Uman inseparable from the massacre of its Polish, Jewish, Roman Catholic and Uniate residents, the Russian deception and seizure of the rebels, and his torture and execution under Polish-Lithuanian justice, held apart from the Shevchenko martyr-and-father legend.'
level: BIO
module: bio-337
objectives:
- Пояснювати Івана Гонту як старшого сотника уманського надвірного війська Потоцького, чиє перейдення на бік повстання відкрило Умань, — конкретніше, ніж «спалахнуло повстання».
- 'Тримати разом «здобуття Умані» та Уманську трагедію: прямо називати масове вбивство польських, єврейських, римо-католицьких та унійних мешканців; для Гонти це не опційний, а центральний факт.'
- 'Порівнювати долі проводирів за юрисдикцією: Залізняка як російського підданого покарала імперська влада, Гонту як польсько-литовського підданого видали польській стороні й після тортур стратили.'
- 'Відділяти документальний запис від рецепції: Шевченків «Гонта в Умані» та народні пісні — це моральна уява й пам''ять, а не біографія.'
