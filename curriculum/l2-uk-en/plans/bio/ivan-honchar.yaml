content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Гончаром: скульптор, живописець і творець
    наймасштабнішого приватного музею української етнографії.
  - >-
    Провокаційне питання: чому радянська влада, яка офіційно пропагувала "народну творчість",
    встановила стеження КДБ за домом, де зберігалися вишиванки та кераміка?
  section: Розминка
  words: 400
- points:
  - >-
    Формування та мистецька робота: графіка під час війни ("Дорогами війни"),
    живопис ("Мукачівський монастир"), скульптурні портрети Леся Курбаса та Богдана Хмельницького.
  - >-
    Скульптурний портрет Леся Курбаса (1987) та Богдана Хмельницького (1983) — мистецька пам'ять поза репресіями.
  - >-
    "Це стало другою моєю професією" — з щоденника про краєзнавчу діяльність; збирання як дисциплінована праця.
  section: 'Формування: Мистецтво війни та портрети'
  words: 1000
- points:
  - >-
    [!decolonization] Збирання українського світу: створення приватного хатнього музею
    у 1959 році. Праця над 18-томним історико-етнографічним альбомом "Україна та українці".
  - >-
    Концепція музею: Гончар демонстрував українську народну культуру не як примітивний
    декор, а як повноцінний, естетично досконалий національний всесвіт,
    відкидаючи імперську маргіналізацію.
  - >-
    Любові до поетичної душі Матері-України" — адреса до відвідувачів музею як
    емоційна педагогіка, а не лише колекціонування.
  section: 'Діяльність: Приватний музей як інституція опору'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Механізм репресій: відсутність відкритого судового вироку,
    але багаторічне стеження КДБ. Дім на Новонаводницькій як "Ноїв ковчег", відвідування
    якого загрожувало переслідуваннями на роботі чи навчанні.
  - >-
    Ідеологічний тиск: радянська влада відмовлялася надавати колекції державний статус,
    намагаючись ізолювати її в маргінальному приватному просторі.
  - >-
    [!epistemic-humility] Хоча офіційна історія музею свідчить про невсипне око КДБ,
    точні номери справ та документи про стеження потребують подальшої архівної публікації.
  - >-
    [!myth-buster] Ризик падав не лише на Гончара, а й на відвідувачів — вхід
    до дому значав зустріч з нерадянською картиною української безперервності.
  section: 'Тінь: Нагляд КДБ та неофіційне придушення'
  words: 1600
- points:
  - >-
    Вплив на шістдесятників: хата Гончара як місце зустрічі дисидентів, митців та студентів;
    простір вільного спілкування в тоталітарній системі.
  - >-
    Створення Національного центру народної культури "Музей Івана Гончара" у 1993 році
    як інституційна перемога.
  - >-
    Підсумкове значення: збереження матеріального доказу безперервності української нації.
  section: 'Підсумок: Ковчег української пам''яті'
  words: 1000
focus: >-
  Іван Гончар як скульптор, колекціонер і творець приватного музею народної культури.
  Аналіз його хатнього музею як простору антирадянського опору, впливу на шістдесятників
  та м'яких механізмів репресій КДБ проти незалежної етнографії.
level: BIO
module: bio-315
objectives:
- Аналізувати роль Івана Гончара у збереженні та документуванні української матеріальної культури.
- Розуміти функцію хатнього музею Гончара як центру формування національної ідентичності в епоху шістдесятників.
- Досліджувати механізми неофіційного радянського тиску (стеження КДБ, ізоляція) на культурних діячів.
- Оцінювати вплив альбому "Україна та українці" на фіксацію історичної пам'яті.
