content_outline:
- points:
  - 'Парадокс: Як дочка корифея українського театру, що виросла в центрі національного відродження, могла стати «ворогом народу» і загинути безвісно в радянському таборі?'
  - 'Провокаційне питання: Чи була її трагедія особистою, чи це неминуча доля українського інтелігента в Російській імперії, а згодом — СРСР?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (літературний): Людмила Старицька — лише «дочка свого батька» чи самобутня драматургиня? Порівняльний аналіз її історичних драм з театром Михайла Старицького.'
  - 'Дебат 2 (політичний): Жертва чи співучасниця? Радянська пропаганда зобразила її як активну «контрреволюціонерку». Сучасна історіографія — як безневинну жертву. Де правда між цими двома полюсами?'
  - '[!epistemic-humility] Аналіз протоколів допитів СВУ, де підписано «зізнання». Як оцінювати ці документи, отримані під тиском?'
  - '[!decolonization] Процес СВУ як інструмент колоніальної політики — знищення старої, дореволюційної української інтелігенції, щоб замінити її новою, радянською.'
  section: 'Конфліктна карта: Спадкоємиця чи самостійна мисткиня?'
  words: 900
- points:
  - 'Родина Старицьких-Лисенків: два роди, що стали віссю українського культурного життя кінця ХІХ ст.'
  - 'Освіта: неформальна, але елітна. Домашнє оточення з класиків літератури та театру як головний «університет».'
  - 'Ранній талант: перші поезії та переклади як доказ непересічних здібностей у родині геніїв.'
  section: 'Формування: Виховання в серці української культури (1868-1890)'
  words: 1000
- points:
  - Історичні драми («Гетьман Дорошенко», «Оборона Буші») як спроба створити національний героїчний епос для сцени.
  - 'Робота в «Київській старовині»: внесок у наукову та культурну розбудову.'
  - 'Підтримка УНР: активна участь у культурному житті революційної України (1917-1920).'
  - Співпраця з Лесем Курбасом та іншими театральними діячами вже в радянський час.
  section: 'Діяльність: На сцені та в літературі (1890-1929)'
  words: 1300
- points:
  - '[!anti-hagiography] Трагедія «зізнання»: Аналіз сфабрикованих протоколів, де Старицька-Черняхівська «визнає» свою вину. Чому інтелектуали ламалися під тиском НКВС?'
  - 'Ціна спротиву: її поведінка на суді, де вона намагалася захистити інших, попри підписані зізнання.'
  - '[!myth-buster] СВУ не була реальною організацією. Це був привід для Сталіна знищити українську інтелігенцію. Старицька-Черняхівська була символічною ціллю.'
  - 'Чоловік Олександр Черняхівський: їхня спільна доля як приклад знищення цілих родин українських еліт.'
  section: 'Тінь: Протоколи допитів СВУ (1929-1930)'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь про неминучість/випадковість її долі.'
  - 'Спадщина: Посмертна реабілітація та повернення творів — чи є це перемогою над системою, що її знищила?'
  - '[!decolonization] Пам''ять про СВУ сьогодні: як історія репресій проти інтелігенції допомагає зрозуміти сучасну російську агресію?'
  section: 'Дискусія та підсумок: Спадщина крізь табірний попіл'
  words: 700
focus: 'The life of Liudmyla Starytska-Cherniakhivska as a prism for the Ukrainian intelligentsia''s fate: cultural flourishing, revolutionary hopes, and destruction by the Soviet regime in the SVU affair.'
level: BIO
module: bio-089
objectives:
- Аналізувати життя та творчість Людмили Старицької-Черняхівської як приклад долі української інтелігенції ХХ століття
- Критично оцінювати джерела радянської доби, зокрема матеріали сфабрикованих політичних процесів на кшталт СВУ
- Розрізняти радянські пропагандистські наративи та сучасні деколоніальні інтерпретації української історії
- Формулювати аргументовану позицію щодо зв'язку між культурним розвитком та політичними репресіями
