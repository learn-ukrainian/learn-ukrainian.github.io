objectives:
- Аналізувати юридичні та політичні форми опору української еліти імперському тиску в першій чверті XVIII ст.
- Розрізняти історичну постать Павла Полуботка та його міфологічний образ, включно з легендою про "золото Полуботка"
- Критично оцінювати переваги та недоліки стратегії непоступливого опору авторитарній владі
- Пояснювати роль Малоросійської колегії як інструменту ліквідації української автономії
