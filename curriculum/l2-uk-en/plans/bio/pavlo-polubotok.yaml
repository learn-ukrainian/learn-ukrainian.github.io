content_outline:
- points:
  - 'Парадокс: Павло Полуботок — один із найбагатших магнатів Європи, що помер у казематі, захищаючи не багатство, а право.
    Як символ юридичного опору перетворився на міфічного месника з незліченними скарбами?'
  - '[!biography] Знайомство з ключовою дилемою: що важливіше — зберегти формальні права чи вижити, пішовши на компроміс з
    тиранією?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Полуботок — принциповий захисник "прав і вольностей" Гетьманщини чи впертий олігарх, що не зрозумів
    нової реальності петровського абсолютизму і привів старшину до катастрофи?'
  - 'Дебат 2 (після смерті): Легенда про "золото Полуботка" — це народна мрія про справедливість і відплату чи інструмент
    політичних маніпуляцій, від гетьмана Апостола до урядів УНР та СРСР?'
  - '[!epistemic-humility] Позиція імперських істориків (Соловйов): "мазепинець", що заважав "прогресивним" реформам. Позиція
    народницька (Костомаров): мученик за народ. Де правда?'
  - '[!decolonization] Розвінчання міфу про "добровільне" входження в імперію. Справа Полуботка — це фіксація моменту, коли
    юридичний діалог перетворюється на силове придушення.'
  section: 'Конфліктна карта: Законник чи бунтар?'
  words: 900
- points:
  - 'Походження та освіта: як син переяславського полковника став одним з найбагатших і найосвіченіших людей свого часу.'
  - 'Стрімка кар''єра та накопичення капіталу: чи був Полуботок типовим представником свого класу, що дбав передусім про особисті
    інтереси?'
  - 'Конфлікт з Мазепою: ранній досвід політичної поразки. Чому він навчився і як це вплинуло на його майбутні дії?'
  - 'Поворотний момент: призначення наказним гетьманом у 1722 році. Усвідомлення повноти відповідальності в момент найбільшої
    загрози.'
  section: 'Формування: Шлях магната і полковника'
  words: 1000
- points:
  - Малоросійська колегія як інструмент ліквідації автономії. Аналіз указу Петра І про її створення.
  - 'Коломацькі чолобитні: не бунт, а апеляція до закону. Розбір ключових юридичних аргументів старшини проти дій Колегії.'
  - 'Діяльність Полуботка на посаді: судові реформи, спроби протидіяти економічному визиску, підтримка церкви та культури.'
  - 'Фатальний виклик до Петербурга: свідома поїздка назустріч арешту. Чому він не втік і не здався?'
  section: 'Діяльність: Коломацькі чолобитні та опір Колегії'
  words: 1300
- points:
  - '[!anti-hagiography] Стратегія Полуботка провалилася. Його арешт і смерть призвели до посилення імперського контролю і
    скасування гетьманства. Чи не була його непоступливість красивим, але катастрофічним жестом?'
  - Захист "прав" чи інтересів олігархії? Наскільки "народними" були інтереси, які відстоювала козацька старшина, включно
    з Полуботком?
  - '[!myth-buster] Міф про промову до Петра І. Хоча знамениті слова ("скоро предстану перед Ним...") є пізнішою легендою,
    вони точно передають суть конфлікту. Аналіз того, як міф може бути правдивішим за факт.'
  - 'Джерела багатства: чи завжди методи накопичення капіталу Полуботка були бездоганними? Погляд на нього як на жорсткого
    економічного гравця.'
  section: 'Тінь: Ціна непоступливості'
  words: 900
- points:
  - 'Повернення до розминки: то що ж таке "золото Полуботка"? Студент формулює відповідь: це не матеріальний скарб, а символ
    невідплатної кривди та надії на історичну справедливість.'
  - Спадщина Полуботка — це не його золото, а його приклад. Приклад того, що в діалозі з імперією настає момент, коли юридичні
    аргументи вичерпуються і залишається тільки моральний вибір.
  - '[!decolonization] Полуботок — фігура, що руйнує російський наратив про "братні народи". Його доля — це демонстрація того,
    як імперія завжди поводилася з тими, хто намагався говорити з нею на рівних.'
  - 'Сучасне значення: коли і як сьогодні згадують Полуботка? Його ім''я як аргумент у дискусіях про верховенство права та
    опір авторитаризму.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Павло Полуботок, опір імперській політиці Петра І, Малоросійська колегія, Коломацькі чолобитні, легенда про золото
