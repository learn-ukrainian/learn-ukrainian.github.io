content_outline:
- points:
  - >-
    [!biography] Михайло Стельмах: прозаїк, поет, драматург, фольклорист,
    академік і автор, у якому сільська пам'ять, офіційний радянський статус і
    цензурні обмеження не розходяться по зручних полицях.
  - >-
    Провокаційне питання: чи можна читати письменника з державними нагородами
    як носія української мовної пам'яті, не виправдовуючи і не спрощуючи
    систему, в якій він працював?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 24 травня 1912 року в Дяківцях на Поділлі. Подвійна дата 11
    (24) травня в джерелах є календарним записом, а не двома різними
    біографіями.
  - >-
    Він закінчив Вінницький педагогічний інститут, учителював у селах, почав
    друкувати поезію, пройшов війну і після 1945 року працював в академічній
    установі фольклору та етнографії.
  - >-
    [!decolonization] Фольклор і сільська мова в Стельмаха не є "етнографічним
    декором". Вони зберігають український словник праці, родини, звичаю, болю і
    гідності всередині системи, яка вимагала ідеологічно контрольованої мови.
  section: 'Формування: Поділля, учителювання, війна і фольклор'
  words: 1000
- points:
  - >-
    Поезії воєнних і повоєнних років, прозові цикли `Березовий сік`, `Велика
    рідня`, `Кров людська - не водиця`, `Хліб і сіль`, `Правда і кривда`,
    `Дума про тебе`, `Чотири броди` і драматургія формують великий корпус про
    село, пам'ять і моральний вибір.
  - >-
    `Гуси-лебеді летять` і `Щедрий вечір` є найкращим входом для учнів: дитяча
    перспектива, бідність, родина, школа, природа, свято і сенсорна мова
    відкривають Стельмаха без негайного політичного спрощення.
  - >-
    `Чотири броди`, відзначені Шевченківською премією 1980 року, важливі для
    питання, як у пізньорадянському тексті можна торкатися голоду 1933 року,
    колективізації, війни і післявоєнного насильства.
  section: 'Діяльність: Село, дитяча пам''ять і велика проза'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Стельмах не є біографією арешту, ГУЛАГу, заслання,
    підпільної мережі чи формального дисидентства. Він був академіком,
    лауреатом, депутатом і офіційно визнаним письменником.
  - >-
    Водночас джерела прямо говорять про партійну політику, цензурний тиск і
    спотворення пізнього роману. Офіційне визнання не скасовує контроль над
    темами голоду, колективізації, УПА, війни і села.
  - >-
    [!epistemic-humility] Твердження про те, як саме Стельмах писав про
    Голодомор або ОУН-УПА, потребують текстової і наукової перевірки. У
    плані можна назвати джерельний ризик, але не вигадувати підпільної участі
    чи прямого протистояння без доказів.
  - >-
    Парадокс Стельмаха — це не формула "зрадник" або "прихований герой".
    Семінар вчить бачити, як мова, пам'ять і компроміс співіснують у
    літературному полі тоталітарної держави.
  section: 'Тінь: Офіційне визнання, цензура і невигадана складність'
  words: 1600
- points:
  - >-
    Підсумок повертає до `Щедрого вечора`: побутова деталь, колядний час,
    голодна пам'ять і дитячий погляд можуть бути складнішими, ніж готова
    ідеологічна етикетка.
  - >-
    [!myth-buster] Не слід викидати Стельмаха з курсу через радянські нагороди
    і не слід відбілювати його офіційну позицію. Корисне читання починається
    там, де студент може назвати обидві сторони доказово.
  - >-
    Сучасне значення Стельмаха — у питанні, як українська сільська лексика,
    фольклор і дитяча пам'ять виживали в літературі, що мусила говорити мовою
    дозволеного.
  section: 'Підсумок: Мова села всередині дозволеного канону'
  words: 900
focus: >-
  Михайло Стельмах як радянсько-український прозаїк, поет, драматург,
  фольклорист і академік, чия біографія потребує складного читання: сільська
  пам'ять, дитяча проза, фольклорна мова, державні нагороди, академічний статус
  і цензурні обмеження існують разом. Семінар не вигадує дисидентської справи,
  але й не ховає партійно-цензурний тиск.
level: BIO
module: bio-401
objectives:
- >-
  Аналізувати Стельмаха через дитячу пам'ять, село, фольклор, сенсорну мову і
  прозу про моральний вибір.
- >-
  Пояснювати парадокс офіційного радянського визнання і цензурного тиску без
  моральних скорочень.
- >-
  Розрізняти підтверджені факти про академічний статус, нагороди і цензуру від
  непідтверджених легенд про підпілля або арешт.
- >-
  Критично оцінювати місце дозволеної радянською владою української літератури
  в сучасному каноні.
