objectives:
- Аналізувати внесок Дмитра Яворницького у дослідження історії Запорозької Січі та української етнографії.
- Досліджувати роль Катеринославського музею у збереженні національної пам'яті.
- Оцінювати механізми радянського ідеологічного терору на прикладі кампанії проти історика у 1933 році.
- Розуміти значення документації Дніпровських порогів для збереження історичної географії України.
