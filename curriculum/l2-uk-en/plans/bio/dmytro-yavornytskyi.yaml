content_outline:
- points:
  - >-
    [!biography] Знайомство з Дмитром Яворницьким: видатний історик, археолог,
    етнограф, лексикограф, академік ВУАН та розбудовник музеїв.
  - >-
    Провокаційне питання: чому дослідження історії козацтва стало мішенню для
    звинувачень у буржуазному націоналізмі у 1930-х роках?
  section: Розминка
  words: 400
- points:
  - 'Освіта та формування: народження у Сонцівці (Харківська губернія). Навчання у Харківському університеті.'
  - >-
    Дослідження козацтва: "Історія запорозьких козаків" (1892-1897),
    "Запорожье в остатках старины и преданиях народа" (1888). Робота в умовах
    Російської імперії.
  section: 'Формування: Дослідник Запорожжя'
  words: 1000
- points:
  - >-
    [!decolonization] Розбудова Катеринославського (Дніпровського) історичного
    музею з 1902 року: перетворення колекції на центр української пам'яті.
  - >-
    Етнографічна та лексикографічна праця: словник української мови (1920),
    документація Дніпровських порогів (1928) перед будівництвом ДніпроГЕСу.
  section: 'Діяльність: Музейник і дослідник'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Механізм терору: репресії через ідеологічний тиск та
    позбавлення засобів до існування. 31 серпня 1933 року звільнений з посади
    директора музею наказом В. Затонського.
  - >-
    [!epistemic-humility] Звинувачення в "українському буржуазному
    націоналізмі". Позбавлення пенсії, нагляд ДПУ (точний номер справи
    невідомий). Музей оголошено осередком контрреволюційної пропаганди.
  - Смерть 5 серпня 1940 року у Дніпропетровську. Знищення не через табори, а через відсторонення від справи життя.
  section: 'Тінь: Звільнення та ідеологічний терор'
  words: 1600
- points:
  - 'Доля наукової спадщини: збереження музейних колекцій та фундаментальної "Історії запорозьких козаків".'
  - 'Сучасне значення: Яворницький як символ збереження української національної пам''яті та академічної гідності.'
  section: 'Підсумок: Пам''ять про історика'
  words: 1000
focus: >-
  Дмитро Яворницький як фундатор вивчення історії Запорозького козацтва,
  розбудовник історичного музею та жертва радянського ідеологічного терору
  1930-х років.
