- Пояснювати Квітку як українського етномузиколога, правника й будівничого ВУАН, а не лише як «чоловіка Лесі Українки».
- 'Розкривати за формулою «зібрав 6000 пісень» метод: виконавець, польовий запис, нотація, видання, архів, порівняння.'
- Тримати радянські ярлики («буржуазні націоналісти») як мову режиму, а не як аналітичні категорії, і не вигадувати номера справи.
- Читати московський період як приборкане виживання після репресій, а не як добровільну асиміляцію чи просте мучеництво.
- Називати мережу запису (Леся Українка, Квітка, Сластьон, Колесса, виконавці), не приписуючи всього одній особі.
