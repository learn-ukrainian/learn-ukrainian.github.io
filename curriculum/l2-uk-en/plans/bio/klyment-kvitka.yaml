content_outline:
- points:
  - 'Провокація: чому і «чоловік Лесі Українки», і «зібрав шість тисяч пісень» однаково сплощують Квітку, ховаючи правника, методолога й будівничого інституцій?'
  - '[!biography] Знайомство з постаттю музичного етнографа й правника: засновник Кабінету музичної етнографії ВУАН (1922), автор програм дослідження народних співців, репресований радянською владою вчений із розколотим між Москвою та Києвом архівом.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (співпраця): шлюб і спільна музична пам''ять із Лесею Українкою реальні, а «Народні мелодії. З голосу Лесі Українки» — важливий спільний джерельний архів.'
  - 'Позиція 2 (самостійність): Квітка мав окрему правничу, польову, методологічну й інституційну працю, яку не можна звести до ролі чоловіка відомої письменниці.'
  - '[!decolonization] Ярлик «радянський музикознавець» як єдина рамка стирає українську ВУАНівську й київську основу; російщені форми імені тримаємо лише як пошукові псевдоніми.'
  - '[!epistemic-humility] Гендерне сплощення діє в обидва боки: не робимо Квітку й «справжнім розумом» за пізніми творами Лесі Українки — точна рамка це співпраця, спільна музична пам''ять і незалежна наукова праця кожного.'
  section: 'Конфліктна карта: «Чоловік Лесі» чи самостійний учений?'
  words: 900
- points:
  - 'Походження й освіта: народився 4 лютого 1880 року в селі Хмелів на Роменщині (нині Сумщина); батько рано помер, зростав у родині Карпових у Києві; навчався в київській музичній школі (1895-1896) і закінчив юридичний факультет Університету святого Володимира 1902 року.'
  - 'Від права до музики: працював у судовому відомстві в Тифлісі, Києві, Криму, на Кавказі й у Чигирині; 1907 року одружився з Ларисою Косач — Лесею Українкою.'
  - 'Ранні праці: україномовні популяризаційні розвідки про конституційні права й вибори (1906) та програмна стаття «Новітня музична етнографія» (1912), що заявила орієнтацію на польовий метод.'
  - '[!epistemic-humility] Застереження про місце народження: сучасна розвідка (Демиденко) відзначає невизначеність щодо Хмелева й Басівки та парафіяльної реєстрації — це матеріал для просунутої біографії, а не підстава змінювати метадані локації.'
  section: 'Формування: Хмелів, право й перехід до музики'
  words: 1000
- points:
  - '«Народні мелодії. З голосу Лесі Українки» (1917-1918): записав і впорядкував Квітка; НБУВ описує повне зібрання як 225 пісень, записаних між 1899 і 1913 роками, — родинний музичний архів Косачів-Квіток.'
  - 'Інституційна праця: у ВУАН від 1920 року, засновник і керівник Кабінету музичної етнографії (1921/1922-1933); «Українські народні мелодії» (1922) — велика збірка на 743 пісні й мелодії, з яких 685 зібрав і транскрибував сам Квітка.'
  - 'Метод, а не «збирання»: «Професіональні народні співці і музиканти на Україні» (1924) з програмою досліду їхньої діяльності й побуту, студії 1925-1928 років про перші тоноряди, віддих у співах і побут лірників, «Фольклористична спадщина Миколи Лисенка» (1930).'
  - '[!anti-hagiography] Формула «зібрав шість тисяч пісень» ховає метод: виконавець, польовий запис, нотація, видання, архів, порівняльний аналіз; заслугу запису тримаємо мережевою (Леся Українка, Квітка, Сластьон, Колесса, виконавці), а не приписуємо одній особі.'
  section: 'Діяльність: Від фонографа до архіву'
  words: 1300
- points:
  - 'Механізм тиску: радянський нагляд, арешти, вимушене професійне переміщення з Києва до Москви, поселення в Казахстані й тривала затримка публікації українського етномузикологічного корпусу.'
  - 'Хронологія: за ЕСУ під час процесу «Спілки визволення України» Квітка був під наглядом НКВС; 1933 року — перший арешт (близько півтора місяця), на початку 1934 року — другий арешт у так званій «справі славістів», ув''язнення в Карлагу й дострокове звільнення 1936 року; у 1935-1937 роках — на поселенні в Казахстані.'
  - '[!decolonization] Радянську мову звинувачень («буржуазні націоналісти») подаємо як наклепову категорію режиму, а не як аналітичний термін; уживаємо формулювання «радянські органи безпеки / апарат НКВС-НКВД», не вигадуючи номера справи, тексту звинувачення чи документа про реабілітацію.'
  - '[!anti-hagiography] Після 1930 року за життя вийшло лише дві короткі статті, а вагома публікація відновилася посмертно (Москва, 1971-1973; Київ, 1985-1986); московську консерваторську працю викладаємо як приборкане виживання після репресій, а не як добровільну асиміляцію чи просте мучеництво. Квітка помер 19 вересня 1953 року в Москві, похований на Ваганьковському цвинтарі.'
  section: 'Тінь: Нагляд, Карлаг і переміщення до Москви'
  words: 900
- points:
  - 'Повернення до розминки: Квітку найкраще вчити через слова методу й джерельний ланцюг — виконавець, слуховий чи фонографічний запис, нотація, видання, архів, наукова інтерпретація, — а не через декоративну «народну пам''ять».'
  - 'Розколотий архів: спадщина Квітки поділена між Москвою й Києвом; це матеріальний слід репресії й переміщення, а не нейтральна географія кар''єри.'
  - '[!decolonization] Стосунки з Лесею Українкою включаємо як співпрацю, але не як рамку ідентичності; ВУАНівську основу тримаємо видимою під московським пізнім періодом.'
  - '[!epistemic-humility] Репресію називаємо конкретно (нагляд, арешт, Карлаг, поселення), але специфіку справи лишаємо неверифікованою, доки не знайдено архівного джерела.'
  section: 'Дискусія та підсумок: Метод проти стереотипу «збирача»'
  words: 700
focus: 'Klyment Kvitka (1880-1953) as a Ukrainian ethnomusicologist, legal scholar and All-Ukrainian Academy of Sciences institution-builder whose fieldwork, notation and comparative method built a Ukrainian musical-ethnography archive: the marriage to Lesia Ukrainka included as collaboration and shared musical memory but refused as the identity frame, the ''6,000 songs'' shorthand opened into method (performer, field recording, notation, edition, archive, comparison), the VUAN Cabinet of Musical Ethnography (1922-1933) and the ''Ukrainian Folk Melodies'' corpus foregrounded, Soviet surveillance during the SVU affair, the 1933 and 1934 arrests, KarLag and 1935-1937 Kazakhstan settlement named specifically while refusing fabricated case numbers or charge texts, Soviet ''bourgeois nationalist'' labels quoted as regime language, and the Moscow late career taught as constrained survival after repression rather than voluntary assimilation.'
