content_outline:
- points:
  - 'Парадокс: Як голос, що звучить як тисячолітня архаїка, став одним з найвпізнаваніших символів української культури ХХ
    століття, співпрацюючи навіть з поп-артистами?'
  - 'Провокація: Чи може виконавець, що отримав найвищі нагороди від радянської влади, бути істинним виразником національної
    душі?'
  - '[!biography] Представлення Ніни Матвієнко не як ікони, а як складної постаті на перетині епох.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Етномузикологічний): Матвієнківський стиль — це автентичний спів "з народу" чи витончена професійна стилізація,
    відшліфована в академічній студії хору ім. Верьовки?'
  - 'Дебат 2 (Культурологічний): Співпраця з ТНМК та Monatik — це геніальний спосіб осучаснити традицію для нових поколінь
    чи комерціалізація та зрада автентики?'
  - '[!epistemic-humility] Позиція пуристів (збереження в первозданному вигляді) vs позиція модернізаторів (традиція жива,
    лише коли розвивається).'
  - '[!decolonization] Розгляд хору ім. Верьовки не лише як мистецького колективу, а і як інструменту радянської культурної
    політики "професіоналізації" народного мистецтва.'
  section: 'Конфліктна карта: Автентичність чи стилізація?'
  words: 900
- points:
  - 'Соціальний контекст: важке повоєнне дитинство, інтернат як єдиний шлях до освіти для дитини з багатодітної бідної сім''ї.'
  - 'Внутрішній конфлікт: мрія про спів і реальність роботи на заводі "Хіммаш".'
  - 'Поворотний момент: вступ до студії хору ім. Верьовки — як вроджений талант зустрівся із системою професійної музичної
    освіти.'
  - 'Ранні впливи: хто і що формувало її унікальну манеру до того, як вона стала зіркою.'
  section: 'Формування: Від інтернату до великої сцени'
  words: 1000
- points:
  - 'Солістка хору ім. Верьовки (1968-1991): як вона стала "обличчям" і голосом головного фольклорного колективу УРСР.'
  - 'Гастролі світом: Матвієнко як культурний дипломат, що представляла Україну (в радянській інтерпретації) за кордоном.'
  - 'Кіно і театр: створення образу української жінки-матері в теле-виставах "Маруся Чурай", "Катерина Білокур".'
  - 'Аналіз репертуару: народні пісні, колискові, веснянки — як добиралися твори і що залишалося поза кадром.'
  section: 'Діяльність: Голос епохи'
  words: 1300
- points:
  - '[!anti-hagiography] Парадокс радянського визнання: отримання звання Народної артистки та Героя України від системи, яка
    пригнічувала українську культуру. Які компроміси були необхідні?'
  - 'Критика з боку діаспори та національно-свідомих кіл: звинувачення у "служінні режиму".'
  - 'Творчі обмеження: чи не стала вона заручницею власного образу "Берегині", що заважало їй експериментувати в інших жанрах?'
  - '[!myth-buster] Розвінчання міфу про безконфліктний шлях до слави. Аналіз її інтерв''ю, де вона говорить про труднощі
    та тиск.'
  section: 'Тінь: Ціна визнання'
  words: 900
- points:
  - 'Повернення до розминки: то ким була Ніна Матвієнко — автентичним голосом землі чи блискучим продуктом культурної системи?'
  - 'Оцінка спадщини: що важливіше — її унікальний тембр і збережені пісні, чи її роль як символу стійкості української ідентичності
    в несприятливу епоху?'
  - '[!decolonization] Переоцінка її постаті після 2014 року. Як її громадянська позиція в останні роки життя вплинула на
    сприйняття всієї її кар''єри?'
  - Смерть у 2023 році як символічне прощання з цілою епохою української культури.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Biography of Nina Matviyenko, analyzing her role as a symbol of Ukrainian authenticity within and after the Soviet
  system, the debate between folk purism and modernization, and her complex legacy.
level: BIO
module: bio-147
objectives:
- Критично аналізувати феномен Ніни Матвієнко в контексті радянської та пострадянської культурної політики, уникаючи агіографічних
  оцінок
- Розрізняти поняття "автентичний фольклор" і "професійна стилізація" на прикладі її творчості
- Оцінювати роль митця як символу національної ідентичності та аналізувати пов'язані з цим компроміси
- Формулювати аргументовану позицію щодо діалектики збереження та модернізації культурної спадщини
