objectives:
- Критично аналізувати внесок Наталії Кобринської в український фемінізм, розрізняючи її успіхи та невдачі.
- Визначати ключові ідеологічні дебати всередині жіночого руху в Галичині наприкінці XIX ст.
- Пояснювати зв'язок між літературною творчістю та громадською діяльністю Кобринської як інструментів суспільних змін.
- Формулювати аргументовану позицію щодо актуальності спадщини Кобринської для сучасної України.
