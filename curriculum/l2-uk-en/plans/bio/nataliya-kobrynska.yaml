content_outline:
- points:
  - 'Провокація: Наталія Кобринська — «піонерка фемінізму», що спиралася на підтримку чоловіків-інтелектуалів (Франко) і діяла
    в консервативній системі (батько-священик). Чи була вона революціонеркою, чи реформаторкою, що грала за правилами патріархату?'
  - '[!biography] Парадокс її становища: вдова священика з доброї родини, що стала голосом радикальних для свого часу ідей.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кобринська vs Пчілка. Боротьба за «Перший вінок». Поміркована, «просвітницька» позиція Кобринської проти більш
    національно-радикальної позиції Пчілки. Чия стратегія була ефективнішою?'
  - 'Дебат 2: «Буржуазний» фемінізм vs реальність селянки. Чиї інтереси представляв рух Кобринської — освіченої еліти чи всього
    жіноцтва? Радянська критика та її відлуння в сучасних дискусіях.'
  - '[!epistemic-humility] Визнання, що в першій хвилі фемінізму не було єдності, а були різні фракції з різними цілями.'
  - '[!decolonization] Відновлення імені Кобринської після радянського замовчування як «буржуазної націоналістки».'
  section: 'Конфліктна карта: Чий фемінізм?'
  words: 900
- points:
  - 'Світ Галичини середини XIX ст.: роль священицьких родин як осередків української інтелігенції.'
  - 'Батько, Іван Озаркевич, як головний вчитель: заохочення до самоосвіти всупереч суспільним нормам.'
  - 'Домашня освіта: доступ до європейської літератури (Дж.С. Мілль, Бокль), формування критичного погляду.'
  - 'Формативна травма: заборона на подальшу освіту. Усвідомлення системних обмежень для жінок.'
  section: 'Формування: Дочка свого батька (1855-1875)'
  words: 1000
- points:
  - Організація та видання альманаху «Перший вінок» (1887) — перший в Європі жіночий альманах, створений жінками для жінок.
  - 'Співпраця та конфлікт з Іваном Франком: його роль як редактора та критика, спроби «пом’якшити» радикалізм Кобринської.'
  - Заснування «Товариства руських жінок» (1884) — перша легальна жіноча організація в Галичині.
  - 'Літературна творчість як продовження активізму: оповідання «Задля шматка хліба», «Дух часу» — ілюстрації до її феміністичних
    тез.'
  section: 'Діяльність: «Перший вінок» як зброя (1884-1893)'
  words: 1300
- points:
  - '[!anti-hagiography] Розрив із консервативним середовищем: її ідеї часто були незрозумілими навіть для жінок, яких вона
    прагнула «визволити».'
  - 'Особиста трагедія: рання смерть чоловіка, відсутність дітей, фінансова скрута. Ціна, яку вона заплатила за свою незалежність.'
  - '[!myth-buster] Кобринська не була «соціалісткою». Її фемінізм був ліберальним і зосередженим на освіті та економічній
    незалежності, а не на класовій боротьбі, що викликало критику з боку соціалістичних кіл.'
  - 'Критика з боку Франка: він звинувачував її оповідання в надмірній «тенденційності» та браку художньої цінності. Чи була
    вона кращою активісткою, ніж письменницею?'
  section: 'Тінь: Самотність реформаторки'
  words: 900
- points:
  - 'Повернення до розминки: тож революціонерка чи реформаторка? Студент формулює відповідь, спираючись на знання про її методи
    та результати.'
  - 'Її головна спадщина: створення прецеденту. Вона довела, що жіночий рух в Україні можливий. Вона створила перші інституції
    та першу платформу для жіночого голосу.'
  - '[!decolonization] Кобринська стверджувала, що національне визволення неможливе без визволення жінки — ідея, яку радянська
    ідеологія намагалася стерти.'
  - 'Сучасна актуальність: наскільки ідеї Кобринської про економічну незалежність та освіту актуальні для сучасного українського
    фемінізму?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Наталія Кобринська як засновниця організованого жіночого руху, ідеологічна вага альманаху «Перший вінок», конфлікти
  всередині руху та суперечлива спадщина «першої феміністки»
