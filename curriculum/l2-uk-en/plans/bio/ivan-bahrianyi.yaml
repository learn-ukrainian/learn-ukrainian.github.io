content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Багряним: письменник, політичний емігрант,
    в'язень ГПУ/НКВС і автор романів про втечу, табір та людську гідність.
  - >-
    Відразу розрізнити ім'я: Іван Павлович Лозов'яга як канонічне прізвище,
    Лозов'ягін як радянська русифікаційна форма, Іван Багряний як літературний
    псевдонім.
  - >-
    Провокаційне питання: чому пригодницький роман про втечу міг бути для
    радянської системи політично небезпечним текстом?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 19 вересня / 2 жовтня 1906 року: ЕСУ подає Охтирку, ЕІУ —
    Куземин; розбіжність назвати, не зводячи її до однієї неперевіреної версії.
  - >-
    Засаднича травма 1920 року: більшовики вбили 92-річного діда і дядька,
    учасника Української революції, у родинному саду.
  - >-
    Навчання у Київському художньому інституті 1926-1930 років без завершення
    диплому через брак коштів і ворожість адміністрації.
  - >-
    Вступ до селянської письменницької спілки "Плуг", а потім до опозиційної
    групи МАРС поруч із Підмогильним, Плужником, Антоненком-Давидовичем,
    Косинкою та Осьмачкою.
  - >-
    [!decolonization] Показати МАРС не як "антирадянський гурток" у мові слідства,
    а як українське літературне середовище, на яке держава наклала ярлик
    контрреволюції.
  section: 'Формування: Охтирка, МАРС і ранній спротив'
  words: 1000
- points:
  - >-
    Ранні тексти: "До меж заказаних" і "Ave Maria" 1929 року, "Скелька" 1930
    року як історичний роман у віршах про сільське повстання проти московського
    монастиря.
  - >-
    "Тигролови": текст 1944/1946 років, спершу "Звіролови", що перетворює
    досвід втечі з радянської неволі на український пригодницький роман.
  - >-
    "Чому я не хочу вертатись до СРСР?" 1946 року як памфлет проти примусової
    репатріації та як політична мова післявоєнної ДіПі-еміграції.
  - >-
    "Сад Гетсиманський" 1950 року як роман про єжовський терор і машину
    тюрем НКВС; зіставити з документованою біографією без підміни роману
    архівом.
  - >-
    Пізні твори: "Огненне коло", "Маруся Богуславка" як "Буйний вітер" і
    посмертна "Людина біжить над прірвою".
  - >-
    [!anti-hagiography] Не зводити автора лише до "Тигроловів": у плані важливі
    табірний досвід, політична публіцистика, еміграційне лідерство і втрати
    ранніх рукописів.
  section: 'Діяльність: Від Скельки до Саду Гетсиманського'
  words: 1200
- points:
  - >-
    Перший арешт 16 квітня 1932 року в Харкові за звинуваченням у
    "контрреволюційній агітації" в літературних творах.
  - >-
    Одинадцять місяців у харківській внутрішній тюрмі; ЕІУ подає вирок на п'ять
    років таборів і заслання на Далекий Схід.
  - >-
    Повторний арешт менш ніж через рік після повернення з заслання; не додавати
    табірну назву, маршрут або строк без окремої архівної опори.
  - >-
    Повторне слідство наприкінці 1930-х років і звільнення 1940 року через тяжку
    хворобу легень, як це подає ЕІУ.
  - >-
    Воєнний період: ЕІУ фіксує редакторську працю в «Голосі Охтирщини», виїзд
    до Галичини 1943 року та участь у створенні УГВР; не приписувати йому
    непідтверджені ролі в пропаганді або авторство програмних документів.
  section: 'Тінь: арешти, заслання і повторне слідство'
  words: 1600
- points:
  - >-
    Що було втрачено: ранній "Ґутенберг", частини сатиричної епопеї "Комета" і
    власноруч спалений рукопис роману "Люба".
  - >-
    Що вижило: "Тигролови" і "Сад Гетсиманський" як романи, написані з досвіду
    табору, втечі та політичної неволі.
  - >-
    Смерть 25 серпня 1963 року; чесно позначити розбіжність джерел щодо місця:
    ЕСУ подає Новий Ульм, IEU — Санкт-Блазієн, а поховання в Новому Ульмі
    підтверджує ЕСУ.
  - >-
    Нобелівська кампанія 1963 року, розпочата чиказьким осередком ОДУМ, була
    перервана його раптовою смертю; Шевченківська премія 1992 року посмертно
    повернула визнання "Саду Гетсиманському" і "Тигроловам".
  section: 'Підсумок: Неповернення як політичний заповіт'
  words: 1000
focus: >-
  Іван Багряний як письменник МАРС, в'язень ГПУ/НКВС, автор "Тигроловів" і
  "Саду Гетсиманського", політичний голос ДіПі-еміграції та свідок радянського
  табірного механізму.
level: BIO
module: bio-223
objectives:
- >-
  Аналізувати життєвий шлях Івана Багряного від Охтирки й МАРС до таборів,
  еміграції та політичної публіцистики.
- >-
  Пояснювати документований механізм репресій 1932-1940 років через арешти,
  вироки, табори, тортури і відмову підписати сфабрикований висновок.
- >-
  Пов'язувати "Тигролови", "Сад Гетсиманський" і памфлет "Чому я не хочу
  вертатись до СРСР?" із досвідом ГУЛАГу та примусової репатріації.
- >-
  Критично розрізняти літературний образ втечі, політичну легенду еміграції та
  перевірені факти слідчих справ.
