content_outline:
- points:
  - >-
    [!biography] Знайомство з Валентином Морозом: історик, есеїст, політв'язень та
    один із найрадикальніших голосів українського дисидентського руху.
  - >-
    Провокаційне питання: чому радянська влада визнала його есеї настільки небезпечними,
    що ізолювала його у Владимирській тюрмі та таборах особливого режиму?
  section: Розминка
  words: 400
- points:
  - >-
    Навчання у Львівському університеті (до 1958) та викладацька робота на Волині й
    Івано-Франківщині.
  - >-
    Перший арешт у вересні 1965 року та засудження на 4 роки таборів.
  - >-
    [!decolonization] Під час першого ув'язнення у квітні 1967 року написав
    самвидавний твір "Репортаж із заповідника імені Берія"; 1968 року текст
    надрукувала мюнхенська "Сучасність".
  section: 'Формування: Від учителя до політв''язня'
  words: 1000
- points:
  - >-
    Написання гострих націоналістичних есеїв після звільнення (1969-1970): "Мойсей і Датан"
    (про національну суб'єктивність), "Серед снігів" (про моральну відповідальність еліти) та
    "Хроніка опору" (про руйнування культурної спадщини).
  - >-
    Аналіз радикальної риторики Мороза через атрибутовані перекази ЕСУ і КХПГ;
    без точного видання дослівні фрази не використовують.
  - >-
    Другий арешт 1 червня 1970 року за написання цих есеїв за статтею 62 КК УРСР. Суворий вирок:
    6 років тюрми, 3 роки таборів особливого режиму і 5 років заслання.
  section: 'Діяльність: Інтелектуальний виклик та друга справа'
  words: 1200
- points:
  - >-
    Масштабна кампанія захисту: відкриті листи Оксани Мешко, Василя Стуса, Івана Дзюби,
    В'ячеслава Чорновола та інших діячів на підтримку Мороза.
  - >-
    [!anti-hagiography] Суперечливість постаті: КХПГ повідомляє про конфлікт з іншими
    політв'язнями 1977 року та серйозні закиди щодо міжнаціональної ворожнечі й антисемітизму;
    ці твердження лишаються атрибутованими музейному профілю.
  - >-
    [!epistemic-humility] Відокремлення факту жорстоких радянських репресій від згоди чи
    незгоди з його політичними поглядами у середовищі самих дисидентів.
  - >-
    Перебування у Владимирській тюрмі, тривалі голодування та обмін політв'язнями
    у 1979 році.
  section: 'Тінь: Реакція на вирок та внутрішні конфлікти'
  words: 1600
- points:
  - >-
    Аналіз зміни ролей Мороза: історик і викладач, табірний есеїст, еміграційний
    публіцист і професор після повернення до України.
  - >-
    Повернення в Україну після 1991 року, викладацька діяльність у Львові та три книжки
    праці «Україна у двадцятому столітті», видані у 2005, 2012 і 2016 роках.
  - >-
    Мороз як символ жорсткого протистояння системі та складності дисидентського руху без
    спрощень і романтизації.
  section: 'Підсумок: Репресія, полеміка і відповідальна пам''ять'
  words: 1000
