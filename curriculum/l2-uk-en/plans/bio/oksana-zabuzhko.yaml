content_outline:
- points:
  - 'Парадокс: Як роман про особисту травму («Польові дослідження») став національним бестселером і змінив українську літературу
    назавжди?'
  - '[!biography] Оксана Забужко — найвпливовіша українська письменниця та публічна інтелектуалка покоління Незалежності.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Польові дослідження» — це маніфест звільнення української жінки чи егоїстичний текст, що руйнує традиційні
    цінності? Позиції феміністичної критики та консервативних опонентів.'
  - 'Дебат 2: Забужко — «голос нації» чи елітарна інтелектуалка, відірвана від народу? Аналіз її рецепції в академічних колах,
    серед широкого читача та в політичному дискурсі.'
  - '[!epistemic-humility] Визнання легітимності різних прочитань її творчості, від захоплення до гострого неприйняття.'
  section: 'Конфліктна карта: Ікона фемінізму чи руйнівниця традицій?'
  words: 900
- points:
  - 'Сім''я інтелігентів-«шістдесятників»: батько — філолог-дисидент, дослідник творчості Лесі Українки.'
  - Атмосфера інтелектуального спротиву в радянському Києві як ключовий фактор формування особистості.
  - Навчання на філософському факультеті Київського університету — закладення основ для майбутньої есеїстики.
  - Рання поезія як пошук власного голосу в межах і поза межами радянського літературного канону.
  section: 'Формування: Дисидентське дитинство та філософська юність'
  words: 1000
- points:
  - '«Польові дослідження з українського сексу» (1996): літературний вибух, що ввів в український дискурс теми постколоніальної
    травми, жіночої тілесності та національної ідентичності.'
  - '«Музей покинутих секретів» (2009): епічна спроба переписати історію УПА та українського ХХ століття поза радянськими
    та сучасними міфами.'
  - 'Есеїстика («Notre Dame d''Ukraine»): інтелектуальна генеалогія української культури через постать Лесі Українки.'
  - '[!decolonization] Ключова теза Забужко: українська культура не «молодша сестра» російської, а самостійна європейська
    традиція, яку століттями пригнічували.'
  section: 'Діяльність: Література як деколонізація свідомості'
  words: 1300
- points:
  - '[!anti-hagiography] Аналіз гострого, безкомпромісного стилю публічних виступів Забужко, який часто призводить до конфліктів.'
  - 'Критика з боку опонентів: чи не перетворюється її інтелектуальна позиція на «моралізаторство» та «проповідування»?'
  - 'Дебати навколо її історичних інтерпретацій: чи завжди її сміливі тези підкріплені фактами? Приклади суперечливих заяв.'
  - '[!myth-buster] Розвінчання міфу про Забужко як «просто письменницю» — вона свідомо конструює себе як публічного філософа,
    що бере на себе відповідальність за стан суспільства.'
  section: 'Тінь: Полемічність та звинувачення в елітарності'
  words: 900
- points:
  - 'Повернення до розминки: чому особиста історія в «Польових дослідженнях» виявилася настільки важливою для всієї нації?'
  - 'Значення Забужко для сучасної України: роль інтелектуала під час Революції Гідності та повномасштабного вторгнення.'
  - 'Вплив на молодше покоління письменників та мислителів: чи вдалося їй створити власну «школу»?'
  - '[!decolonization] Забужко як один із ключових архітекторів сучасного українського постколоніального дискурсу, чиї ідеї
    стали частиною національної самосвідомості.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: The life and work of Oksana Zabuzhko, focusing on her role as a public intellectual, the post-colonial and feminist
  themes in her novels, and the controversies surrounding her public persona.
level: BIO
