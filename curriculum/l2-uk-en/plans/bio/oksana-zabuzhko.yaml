objectives:
- Критично аналізувати роль Оксани Забужко як публічної інтелектуалки та її вплив на український постколоніальний дискурс
- Оцінювати ключові теми та ідеї її головних творів ("Польові дослідження", "Музей покинутих секретів")
- Формулювати аргументовану позицію щодо суперечливих аспектів її творчості та громадської діяльності
- Розрізняти різні інтерпретації її спадщини — від феміністичної ікони до руйнівниці традицій
