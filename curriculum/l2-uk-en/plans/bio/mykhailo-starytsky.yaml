objectives:
- Аналізувати життя та спадщину Михайла Старицького як засновника українського професійного театру.
- Критично оцінювати роль театру як інструменту збереження та розвитку української культури в умовах імперської цензури.
- Простежувати зв'язки Старицького з ключовими діячами та організаціями українського культурного руху (Лисенко, Косачі, Стара
  Громада).
- Розрізняти факти біографії та агіографічні міфи, застосовуючи критичний підхід до історичних постатей.
