content_outline:
- points:
  - 'Парадокс: Як одна людина змогла створити національний професійний театр в імперії, яка щойно офіційно заборонила мову
    цього театру Емським указом?'
  - '[!biography] Михайло Старицький — шляхтич, що продав маєтки, аби фінансувати справу, яку вважав головною — українську
    сцену.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Старицький vs Кропивницький. Хто був справжнім лідером «театру корифеїв»? Блискучий організатор та антрепренер
    проти геніального актора та режисера — конфлікт амбіцій, що рухав прогрес.'
  - 'Дебат 2: «Етнографічний театр» чи національне мистецтво? Як російська критика намагалася звести театр Старицького до
    сільських розваг, і як радянська історіографія приховувала його державницький потенціал.'
  - '[!epistemic-humility] Визнання, що Старицький мусив іти на компроміси, ставлячи побутові комедії, аби «протягнути» на
    сцену історичні драми.'
  - '[!decolonization] Театр Старицького — це свідомий акт деколонізації, перетворення «малоросійського» фольклору на високе
    національне мистецтво.'
  section: 'Конфліктна карта: Митець чи Менеджер?'
  words: 900
- points:
  - 'Родинне коло: Лисенки та Косачі. Як оточення сформувало майбутнього культурного діяча? Двоюрідний брат Олени Пчілки та
    Миколи Лисенка.'
  - 'Від Полтави до Харкова: навчання, захоплення Шевченком, перші літературні спроби та усвідомлення себе українцем.'
  - 'Київська Стара Громада: участь у таємному товаристві, що ставило за мету збереження та розвиток української культури.
    Це не просто гурток, а "тіньовий уряд" українства.'
  section: 'Формування: Шляхтич із серцем Громадівця (1840-1870-ті)'
  words: 1000
- points:
  - Створення першої професійної трупи — «Театру корифеїв». Союз і розрив із Кропивницьким.
  - 'Антреприза в умовах заборони: як театр став єдиною легальною формою українського публічного життя після Емського указу.'
  - 'Драматург за необхідністю: Старицький пише п''єси («Не судилось», «За двома зайцями»), історичні романи та перекладає
    Шекспіра, бо новому театру потрібен репертуар.'
  - 'Гастролі імперією: від Варшави до Тифліса. Український театр доводить своє існування, збираючи повні зали та дратуючи
    цензуру.'
  section: 'Діяльність: Театр як зброя (1882-1895)'
  words: 1300
- points:
  - '[!anti-hagiography] Старицький не був бездоганним. Конфлікти з акторами, звинувачення в авторитаризмі та фінансових махінаціях
    (хоча насправді він фінансував театр з власної кишені).'
  - 'Компроміси з цензурою: аби театр існував, доводилося йти на поступки, змінювати фінали п''єс, уникати гострих політичних
    тем. Чи не занадто велика ціна?'
  - '[!myth-buster] Міф про «бідного митця». Старицький був заможним поміщиком і свідомо вклав увесь свій капітал у театр,
    померши у злиднях. Це не трагедія, а свідомий вибір.'
  - 'Людський вимір: виснаження, борги, зради. Листи Старицького розкривають не "корифея", а втомлену людину, що несе на собі
    тягар відповідальності за всю національну культуру.'
  section: 'Тінь: Ціна успіху'
  words: 900
- points:
  - 'Повернення до розминки: Отже, як йому це вдалося? Студент має сформулювати відповідь, використовуючи поняття «культурний
    спротив», «антреприза», «націєтворення».'
  - '[!decolonization] Старицький перетворив українців з об''єкта етнографічних досліджень на суб''єкт власної історії на
    сцені. Це був удар по імперському наративу про «неісторичність» нації.'
  - 'Спадщина: Він залишив не просто п''єси, а діючу модель культурної інституції, яка здатна виживати та перемагати в умовах
    окупації. Його донька Людмила Старицька-Черняхівська продовжила цю боротьбу.'
  - 'Сучасне значення: Чи є сьогоднішні культурні проєкти, що фінансуються бізнесом, продовженням справи Старицького? Дискусія
    про роль меценатства в культурі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Роль Михайла Старицького як архітектора українського професійного театру в умовах Емського указу, його співпраця зі
  Старою Громадою та створення національного репертуару як форми культурного опору.
