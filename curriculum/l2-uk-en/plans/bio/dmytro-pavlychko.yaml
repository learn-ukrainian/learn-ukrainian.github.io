content_outline:
- points:
  - 'Парадокс: Як автор найпопулярнішої ліричної пісні України «Два кольори», символу любові до матері, став однією з найрадикальніших
    і найсуперечливіших фігур української політики кінця XX століття?'
  - '[!biography] Подано два уривки: один з раннього вірша, що прославляє Леніна, інший — з полум’яної промови про незалежність.
    Студенти мають вгадати, чи належать вони одній людині.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський конформіст vs прихований патріот. Одні бачать його як частину радянської номенклатури, що писала
    ідеологічні вірші заради кар’єри. Інші — як майстра, що використовував систему для збереження української культури (через
    переклади).'
  - 'Дебат 2: "Національний пророк" vs "радикальний політик". Як його спадщину ділять сьогодні? Ліричний поет, чиї пісні співає
    вся країна, чи безкомпромісний політик, чиї заклики до люстрації та гострі заяви багатьох відштовхували?'
  - '[!epistemic-humility] Немає простої відповіді. Оцінка Павличка залежить від того, який період його життя і яку сферу
    діяльності вважати головною — поезію, переклад, чи політику.'
  section: 'Конфліктна карта: Поет системи чи батько незалежності?'
  words: 900
- points:
  - 'Повоєнне дитинство на Івано-Франківщині: світ, де стикалися радянська влада, підпілля УПА та пам''ять про Польщу. Як
    цей трикутник вплинув на його світогляд?'
  - 'Навчання у Львівському університеті: інтелектуальний центр, що ще пам''ятав європейську традицію, але вже був під тиском
    радянської ідеології.'
  - 'Перші вірші: спроби знайти свій голос у жорстких рамках соцреалізму. Аналіз ранніх, маловідомих творів.'
  section: 'Формування: Сталь і ніжність (1929-1953)'
  words: 1000
- points:
  - 'Феномен «Двох кольорів» (1965): як вірш про вишиту сорочку став другим національним гімном. Аналіз символіки та причин
    всенародної любові.'
  - 'Перекладацька майстерня: Шекспір, Лорка, Пессоа. Переклад як форма "внутрішньої еміграції" та спосіб збагатити українську
    мову в умовах русифікації.'
  - 'Творчість у межах "шістдесятництва": чи був Павличко справжнім шістдесятником, чи лише використовував "відлигу" для власних
    цілей?'
  - '[!decolonization] Через переклади світової класики Павличко стверджував спроможність української мови говорити на будь-які
    теми, кидаючи виклик імперському наративу про її "вторинність".'
  section: 'Діяльність: Два кольори — Поезія як пісня і переклад як порятунок (1953-1990)'
  words: 1300
- points:
  - '[!anti-hagiography] "Любов і ненависть" — не лише назва збірки, а й формула життя. Аналіз його од Леніну та Компартії,
    написаних у 1950-60-х. Це був щирий захват чи цинічний розрахунок?'
  - Роль в апараті Спілки письменників УРСР. Участь у засудженні "націоналістичних" колег. Документи та свідчення.
  - '[!myth-buster] Павличко — не лише лірик. Його політичні заяви (наприклад, про "жидівську мафію" чи заклики до повної
    люстрації) показують інший, радикальний бік його особистості, який не вписується в образ автора "Двох кольорів".'
  - 'Критика з боку дисидентів (напр. Івана Дзюби): звинувачення у конформізмі та відсутності солідарності з репресованими.'
  section: 'Тінь: Ціна компромісу (1950-ті – 2000-ні)'
  words: 900
- points:
  - 'Повернення до розминки: тож хто такий Дмитро Павличко? Студент має сформулювати комплексну відповідь, уникаючи чорно-білих
    оцінок.'
  - Спадщина Павличка — це його вірші, що стали піснями, чи Акт про незалежність, який він допоміг написати? Чи можна відокремити
    одне від іншого?
  - 'Його життя як дзеркало української історії XX століття: від вимушеного радянського патріотизму до побудови власної держави.'
  - '[!decolonization] Його перехід від служіння імперії до її руйнування — чи є це типовою моделлю для національного інтелектуала
    в колонії, що виборює свободу?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Аналіз суперечливої постаті Дмитра Павличка: його шлях від радянського поета до співавтора Акту незалежності, конфлікт
  між творчістю та політикою, феномен пісні "Два кольори".'
