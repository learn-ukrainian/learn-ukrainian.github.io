content_outline:
- points:
  - 'Провокація: як економіст і кооперативний організатор, якому імперія заборонила вчителювати, став генеральним секретарем земельних справ, міністром фінансів і головою уряду УНР? І чому «прем''єр» тут — історична посада воєнного часу, а не сучасний голова Кабінету Міністрів?'
  - '[!biography] Знайомство з постаттю, чия біографія — про економічну державність: кооперацію, землю, гроші й кредит як інфраструктуру суверенітету.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (економічна державність): Мартос показує, що суверенітет будували не лише армією — земельний закон, продовольство, гроші, кредитні спілки, «Дніпросоюз» і «Українбанк» були інфраструктурою держави.'
  - 'Позиція 2 (антиагіографічна): його уряд не зумів виконати свою програму під військовим, фіскальним, коаліційним і УНР-ЗУНР тиском; «невдалий прем''єр» — надто проста рамка.'
  - '[!decolonization] Кооперацію читаємо не як «стартап» чи «бізнес», а як членське самоврядування — кредит, споживання, розподіл, освіту й національну економічну мережу.'
  - '[!epistemic-humility] Дати й місця різняться: народження — 20 травня (1 червня) 1879, Градизьк; хронологія серпня 1919 року (голова уряду / міністр фінансів, дата зречення) подається з джерельними позначками.'
  section: 'Конфліктна карта: Прем''єр без сталої держави?'
  words: 900
- points:
  - 'Походження й освіта: 20 травня (1 червня) 1879 року, Градизьк (Кременчуцький повіт, Полтавщина), зі старшинсько-козацького роду; Лубенська гімназія (1897) і математичний факультет Харківського університету (1908).'
  - 'Студентська політика й заборона вчителювати: таємна українська студентська громада, співпраця з РУП, згодом УСДРП, арешти; політична активність коштувала йому права викладати.'
  - 'Кооперативний шлях: праця в кооперативних і земських структурах Волині, Кубані та Полтавщини до 1917 року зробила з відстороненого вчителя практичного організатора кредиту, розподілу й кооперативної освіти.'
  section: 'Формування: Від забороненого вчителя до кооператора'
  words: 1000
- points:
  - '1917 рік: діяч Центральної Ради та Малої Ради від УСДРП, керівник Селянської спілки й генеральний секретар земельних справ у першому Генеральному секретаріаті; співавтор земельного законодавства (авторство подаємо як спільне, не одноосібне).'
  - 'Доба Гетьманату: кооперативна розбудова — Центральний український кооперативний комітет, «Дніпросоюз», «Українбанк» і кооперативна освіта в Києві.'
  - 'Уряд Директорії: міністр продовольчих справ, міністр фінансів і голова Ради народних міністрів УНР (за ЕІУ — 9 квітня — 27 серпня 1919 року); продовольство й фінанси стали питанням виживання держави.'
  - 'Гроші як суверенітет: причетність до закону про самостійність української валюти пов''язує Мартоса з гривнею — теж політико-економічною інфраструктурою, а не лише сучасним словом для цін.'
  section: 'Діяльність: Земля, продовольство і фінанси УНР'
  words: 1300
- points:
  - '[!anti-hagiography] Його уряд 12 квітня 1919 року проголосив програму (спиратися на власні сили, забезпечити армію, домагатися практичного об''єднання західних і східних земель), але під тиском фронтів, фіску й коаліції не зумів стабілізувати УНР — поразка під структурним тиском є частиною уроку.'
  - '[!myth-buster] УІНП називає Мартоса одним із «батьків» гривні; обережна мова — важливий у фінансовій і валютній політиці, а не одноосібний творець грошей чи земельної реформи.'
  - '[!epistemic-humility] Конфлікт уряду Мартоса із керівництвом ЗУНР подаємо як воєнно-інституційну напругу державної інтеграції, а не як особисту сварку чи антигалицьке упередження.'
  - 'Партійну складність (соціалізм УСДРП, кооперативна економіка й державні фінанси) не спрощуємо до суперечності: це радше українська демократично-соціалістична та кооперативна традиція.'
  section: 'Тінь: Уряд, що не встояв'
  words: 900
- points:
  - 'Повернення до розминки: чому «прем''єр» УНР 1919 року — це історична посада воєнного часу, яку не варто механічно ототожнювати з післярадянським Кабінетом Міністрів?'
  - 'Кооперація й економічні школи еміграції: Українська господарська академія в Подєбрадах і Українська вища школа економіки в Мюнхені показують, чому вигнанські інституції важили для інженерів, економістів і адміністраторів.'
  - '[!decolonization] Радянський наратив міг відкидати фінанси й кооперацію УНР як «буржуазно-націоналістичні»; корисна класна рамка — інституції під неможливими обмеженнями, а не чиста поразка чи чистий героїзм.'
  - 'Джерела: мемуарно-аналітичні праці Мартоса («Гроші української держави», «Оскілко й Болбочан», «Визвольний здвиг України») читаємо як свідчення з контекстом; 1977 року він помер у Нью-Джерсі й похований у Бавнд-Бруку.'
  section: 'Дискусія та підсумок: Економіка як суверенітет'
  words: 700
focus: Borys Martos (1879-1977) as an economist, cooperative organizer, and UNR statesman who served as General Secretary of Land Affairs, Minister of Finance, and head of the Council of People's Ministers in 1919, taught so that cooperation, land law, food supply, and currency read as sovereignty infrastructure rather than mere economics; the April-August 1919 government is held as institutions under impossible constraints, the hryvnia and land-reform roles are framed as shared not sole authorship, the ZUNR-UNR tension as wartime institutional strain, and the Podebrady/Munich emigration schools as continuity of Ukrainian public life.
