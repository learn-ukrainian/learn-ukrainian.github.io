objectives:
- Аналізувати парадокси у творчості Квітки-Основ'яненка, зокрема поєднання сентименталізму та сатири
- Критично оцінювати його роль як «батька української прози», розрізняючи внесок у форму та ідеологічний зміст
- Пояснювати, як ідеалізація селянства у його творах стала «тінню» його спадщини та викликом для наступних поколінь реалістів
- Формулювати аргументовану позицію в полеміці щодо місця Квітки в українському літературному каноні
