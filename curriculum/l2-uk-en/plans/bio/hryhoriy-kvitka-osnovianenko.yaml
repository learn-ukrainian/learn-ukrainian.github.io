content_outline:
- points:
  - 'Провокація: Як людина, що утвердила українську прозу, могла одночасно писати сентиментальні «слізливі» повісті та їдку
    сатиру? І чому «батько української прози» починав свою кар''єру російською мовою?'
  - '[!biography] Григорій Квітка-Основ''яненко — засновник української художньої прози, але його творчість сповнена парадоксів.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи можна «мужицькою» мовою написати щось «і ніжне, і благородне»? Полеміка Квітки з російськими скептиками щодо
    літературного статусу української мови.'
  - 'Дебат 2: Ким був Квітка — «народним письменником», що оспівував селянство, чи дворянином, що ідеалізував його з патерналістської
    позиції? Радянська критика vs діаспорні інтерпретації.'
  - '[!epistemic-humility] Визнання, що обидві сторони полеміки мали свої аргументи, а спадщина Квітки досі викликає суперечки.'
  - '[!decolonization] Боротьба Квітки за мову як акт культурного супротиву в умовах Російської імперії.'
  section: 'Конфліктна карта: Народний чи панський письменник?'
  words: 900
- points:
  - 'Слобожанщина як культурний котел: життя між Російською імперією та козацьким минулим, що сформувало подвійну ідентичність.'
  - 'Військова служба і відставка: розчарування в імперській кар''єрі та пошук нового шляху.'
  - 'Літературний дебют російською: спроби знайти себе в чужій мовній стихії та панівній літературній традиції.'
  - 'Поворотний момент: вплив «Енеїди» Котляревського як доказ життєздатності та багатства української мови, що надихнув на
    зміну творчого вектора.'
  section: 'Формування: Від російськомовного дворянина до «Грицька Основ''яненка»'
  words: 1000
- points:
  - '«Маруся» (1834) як маніфест українського сентименталізму: доказ, що українською мовою можна глибоко й зворушливо говорити
    про кохання, страждання і смерть.'
  - '«Конотопська відьма» (1833) як анти-Маруся: їдка сатира на козацьку старшину, викриття невігластва, забобонів та соціальних
    вад.'
  - 'Драматургія та театр: Квітка як директор Харківського театру, що заклав основи національного театрального мистецтва.'
  - 'Порівняння двох стилів: аналіз мовних засобів, гумору та ідеалізації в його сентиментальних і сатиричних творах.'
  section: 'Діяльність: Сентименталізм і сатира — Створення двох канонів'
  words: 1300
- points:
  - 'Ціна сентименталізму: «Маруся» створила нереалістичний, «солодкавий» образ українського селянства, який на десятиліття
    став літературним кліше.'
  - '[!anti-hagiography] Квітка — не реаліст у сучасному розумінні. Його етнографізм — це погляд дворянина-романтика на «простий
    народ», а не об''єктивне відображення соціальної дійсності.'
  - '[!myth-buster] Міф про «батька реалізму»: Квітка заклав основи прози, але справжній критичний реалізм (Нечуй-Левицький,
    Панас Мирний) виник пізніше, часто всупереч сентиментальній традиції Квітки.'
  - Безпечна сатира? Його критика спрямована на минуле (козацька старшина), а не на сучасні йому вади імперського суспільства,
    що робило її менш небезпечною для влади.
  section: 'Тінь: Ідеалізація як пастка'
  words: 900
- points:
  - 'Повернення до розминки: Як уживаються сентименталіст і сатирик в одній особі? Студенти формулюють відповідь, використовуючи
    знання про його подвійну мету: довести багатство мови і критикувати суспільні вади.'
  - 'Спадщина: Квітка безперечно дав українській літературі прозу, але його ідеалізовані моделі довелося долати наступним
    поколінням письменників-реалістів.'
  - '[!decolonization] Аналіз, як, захищаючи мову, Квітка водночас міг творити а-політичний, «безпечний» образ України, що
    частково відповідав імперському погляду на «малоросів» як на наївний, сентиментальний народ.'
  - '«Батько української прози» — титул заслужений, але з важливим уточненням: він батько форми, а не завжди змісту. Його
    спадщина — це запрошення до дискусії.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Kvitka-Osnovianenko's role as founder of Ukrainian prose, the tension between his sentimental and satirical works ('Marusia'
  vs 'Konotopska Vidma'), his defense of the Ukrainian language, and his complex legacy as both an idealizer and a critic
  of his society.
