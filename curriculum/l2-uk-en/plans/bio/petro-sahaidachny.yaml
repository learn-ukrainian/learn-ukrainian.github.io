- section: Історичний контекст
  points:
  - Доба героїчних морських походів
  - Тридцятилітня війна в Європі
  - Занепад православ'я після унії
  words: 1000
- section: Внесок та Спадщина
  points:
  - Реформа війська (дисципліна, мушкети)
  - '"Військо Запорозьке" вступає до Київського братства'
  - Київ знову стає культурним центром (Могилянка)
  words: 1000
- section: Порівняльний аналіз
  points:
  - Сагайдачний vs. Наливайко (лояльність vs бунт)
