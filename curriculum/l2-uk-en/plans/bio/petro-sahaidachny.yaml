content_outline:
- points:
  - 'Парадокс: Сагайдачний врятував Річ Посполиту під Хотином, але чи врятував він Україну? Суперечність у діях гетьмана, що служив
    короні, аби збудувати націю.'
  - '[!biography] Знайомство з постаттю, яка перетворила козацьку вольницю на регулярне військо та змусила короля Польщі рахуватися
    з "Військом Запорозьким".'
  section: Розминка
  words: 400
- points:
  - 'Дискусія 1: Прагматичний лояліст vs полум''яний бунтар. Порівняння стратегій Сагайдачного та Северина Наливайка. Чому Сагайдачний
    обрав шлях компромісу з Річчю Посполитою, а не відкритого повстання?'
  - 'Дискусія 2: Слуга короля чи батько нації? Радянська історіографія таврувала його як "польського найманця". Сучасна українська
    — канонізує як "державника".'
  - '[!epistemic-humility] Як одна й та сама людина могла очолити похід на Москву (1618) на службі королю і відновити православну
    ієрархію (1620) всупереч волі того ж короля?'
  - '[!decolonization] Розвінчання імперського наративу про "спільну боротьбу" та аналіз дій Сагайдачного через призму українських,
    а не польських чи російських інтересів.'
  section: 'Конфліктна карта: Лояліст чи державотворець?'
  words: 900
- points:
  - Походження зі шляхетського роду з-під Самбора та його вплив на світогляд.
  - 'Освіта в Острозькій академії: інтелектуальний котел, де Сагайдачний засвоїв ідеї гуманізму, риторику та мистецтво полеміки.'
  - 'Історичний контекст: занепад православ''я після Берестейської унії, доба героїчних морських походів як єдиний спосіб
    соціального ліфту, початок Тридцятилітньої війни в Європі.'
  section: 'Формування: Шляхтич з Острозької академії'
  words: 1000
- points:
  - 'Реформа війська: введення залізної дисципліни та переозброєння козаків мушкетами, що перетворило їх на одну з найкращих
    піхот Європи.'
  - 'Морські походи: зухвалі рейди на Кафу, Трапезунд, Синоп і передмістя Стамбула. Визволення тисяч невільників та підрив
    османської могутності на Чорному морі.'
  - 'Відновлення православної ієрархії (1620): Сагайдачний і Військо Запорозьке сприяли висвяченню нових єпископів патріархом
    Феофаном і забезпечили цій справі політичну та військову підтримку.'
  - 'Хотинська битва (1621): командування 40-тисячним козацьким військом, яке стало вирішальною силою у зупинці османської
    експансії в Центральну Європу.'
  section: 'Діяльність: Меч, Хрест і Мушкет'
  words: 1300
- points:
  - '[!anti-hagiography] Похід на Москву 1618 року. Аналіз цієї суперечливої кампанії, де козаки воювали як союзники Речі
    Посполитої проти Московського царства. Що це було: зрада православних чи виконання союзницького обов''язку?'
  - 'Критика сучасників: як сприймали дії Сагайдачного в самій Україні, зокрема, церковні ієрархи?'
  - '[!myth-buster] Деконструкція образу "безгрішного" гетьмана. Сагайдачний був політиком своєї епохи, для якого мета (посилення
    Козацької держави) виправдовувала дуже неоднозначні засоби.'
  - 'Ціна компромісу: яких поступок вимагала від козаків служба короні і як це вплинуло на майбутні повстання?'
  section: 'Тінь: Похід на Москву та ціна компромісу'
  words: 900
- points:
  - 'Повернення до парадоксу: як Сагайдачному вдалося, служачи одній імперії та воюючи з іншою, закласти фундамент для власної
    держави?'
  - 'Спадщина: Сагайдачний залишив по собі не просто спогади про перемоги, а реформоване військо, відновлену Церкву та ідею
    козацтва як політичного суб''єкта.'
  - Смерть від рани в Києві та заповіт на користь Київського братства — символічне завершення шляху воїна, який став
    меценатом.
  - '[!decolonization] Чому постать Сагайдачного досі є полем битви для історичних наративів, і чому його повернення в український
    пантеон є актом культурної деокупації.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Sahaidachny's transformation of Cossackdom, military reforms, naval victories, restoration of the Orthodox
  hierarchy, and the complex legacy of his service to the Polish Crown.
