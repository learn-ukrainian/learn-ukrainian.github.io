  - Найвидатніший гетьман до Хмельницького
  - Перетворення козацтва на регулярне військо
  - Союз меча (козаків) і хреста (церкви)
  words: 1000
- section: Життєпис
  points:
  - Походження (шляхтич з Самбора)
  - Освіта в Острозькій академії (М14)
  - Морські походи на Кафу, Синоп, Варну (звільнення невільників)
  - Похід на Москву (1618)
  - Відновлення православної ієрархії (1620)
  - Хотинська битва (1621) — порятунок Європи
  - Смерть від рани у Києві
