content_outline:
- points:
  - 'Провокація: полковник, що підписував угоди з Річчю Посполитою, дістав від корони шляхетство, воював проти Дорошенка, а потім віддав булаву й закінчив під московським арештом. Імперська пам''ять підшиває його під ярлик «польський ставленик». Що цей ярлик показує, а що ховає?'
  - '[!biography] Знайомство з постаттю, чий життєпис бідний на особисті деталі: починаємо не з вигаданої сцени народження, а з певного — уряду уманського полковника й задокументованих угод.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: воєнно-дипломатична легенда — антидорошенківська коаліція, поразка під Стеблевом, битва під Батогом, спільні з коронними військами кампанії на Правобережжі.'
  - 'Позиція 2: політичний актор острозького курсу — гетьман, що визнанням і допомогою Речі Посполитої намагався втримати обмежену козацьку автономію проти османського курсу Дорошенка.'
  - '[!decolonization] Імперське спрощення робить Ханенка «польським ставлеником», а Дорошенка «турецьким зрадником» — і перетворює Правобережжя на сцену, де діють лише зовнішні гравці. Націоналістичне читання натомість робить його «провісником єдності». Обидва згладжують складнішу картину.'
  - '[!epistemic-humility] Народження — початок 1620-х років, місце непевне; смерть — 1680 рік, місце й обставини теж непевні. Дати урядів у ЕІУ, IEU й публікації Мицика різняться. Починаємо з задокументованих урядів, а не з удаваної точності.'
  section: 'Конфліктна карта: Польський ставленик чи політичний актор Руїни'
  words: 900
- points:
  - 'Походження: з козацько-старшинського роду Ханенків; місце народження непевне — не відкриваємо модуль вигаданою «сценою народження».'
  - 'Уманський полк: брав участь у кампаніях полку за доби Національної революції середини XVII століття (полк засновано 1648 року); уманський полковник у 1650-1660-х роках із джерелочутливими перервами.'
  - 'Рання Руїна: підтримав Юрія Хмельницького, підписав Переяславські статті 1659 року та Чуднівсько-Слободищенську угоду 1660 року, а того ж 1660 року був наказним гетьманом на південно-східному пограниччі.'
  - 'Статусні маркери: 1661 року дістав шляхетство від коронної влади, 1663 року — уряд наказного полковника в правобережному уряді Павла Тетері; це маркери статусу й союзу, а не осердя оповіді.'
  - '[!epistemic-humility] Межі уманського полковництва подають по-різному (1656-1669; 1656-1660 і 1664-1669; 1655-1669) — навчаємо тяглості уманської бази, а не точних років.'
  section: 'Формування: Уманський полковник у добу Руїни'
  words: 1000
- points:
  - '1668-1669: пристав до антидорошенківської запорозької опозиції навколо Петра Суховія й кримськотатарської підтримки, а після поразки Суховія став головною визнаною Річчю Посполитою альтернативою.'
  - 'Липень/осінь 1669: рада під Уманню обрала його гетьманом лише від частини Правобережжя — це претендентська, часткова булава, а не усталений уряд.'
  - '29 жовтня 1669: зазнав поразки від Дорошенка під Стеблевом; це унеможливило швидку антидорошенківську консолідацію й підштовхнуло до сильнішої опори на Річ Посполиту.'
  - 'Острозька угода 12(2) вересня 1670 року: визнання й військова допомога в обмін на присягу короні, звужену територію й автономію лише для козацького стану; ЕІУ зазначає збереження статусу Києво-Могилянської колегії. Це — головний документ модуля.'
  - '18(8) липня 1672: Батозька (Батіг-Четвертинівка) битва — українсько-татарсько-османські сили Дорошенка розбили коронні та ханенківські війська над Південним Бугом.'
  - '1672: Бучацький мир зробив його становище нестерпним і змусив залишити Україну; навесні 1673 року він повернувся, але 11 вересня його малий загін розбито під Києвом.'
  section: 'Діяльність: Претендентська булава, Острозька угода й Батіг'
  words: 1300
- points:
  - '[!anti-hagiography] Острозька угода не була чистою програмою визволення: вона приймала умови, що допускали унію й повернення шляхетського землеволодіння. Соціальну ціну для правобережних громад — походи, облоги, набіги — не можна стирати переліком гетьманських титулів.'
  - 17 березня 1674 року на генеральній раді під Лисянкою Ханенко поступився булавою лівобережному гетьманові Іванові Самойловичу й перейшов на Лівобережжя; IEU подає цей перехід як обмін на маєтності.
  - '[!myth-buster] 1677 року його заарештовано за звинуваченням у відновленні зв''язків із коронною владою; цар наказав Самойловичу ув''язнити його в Батурині. Тримаємо мову звинувачення як звинувачення, а не як доведений факт: після 1674 року він не просто «пішов на спокій».'
  - 'Контраст із Дорошенком: не використовуємо образи «турка» й «татарина» як екзотичний ярлик зради — і острозький курс, і османський протекторат Дорошенка стискали більші держави й внутрішні козацькі поділи.'
  section: 'Тінь: Ціна острозької стратегії'
  words: 900
- points:
  - 'Повернення до розминки: яку саме автономію Ханенко намагався зберегти й що острозька стратегія змусила його віддати?'
  - 'Пам''ять і джерела: зберігся тонкий, але важливий документальний слід — уманське полковництво, короткі дипломатичні тексти, умови угоди, польськомовні підписи, поразки й арешти. Ярлик «ставленик» ховає козацько-правову риторику, запорозьку орієнтацію, полковий електорат і московський примус після 1674 року.'
  - 'Запорозька орієнтація: не робимо Івана Сірка чистим патріотичним взірцем, а Ханенка — лише скомпрометованим політиком; обидва діяли в тому самому розколотому пограничному полі.'
  - '[!decolonization] Навіщо відділяти джерельний факт, політичний ярлик і пізнішу пам''ять — і що це дає учневі. Пізніше відродження Уманського полку за Мазепи (1704) — інституційне відлуння, а не частина біографії Ханенка.'
  section: 'Дискусія та підсумок: «Ставленик», пам''ять і джерела'
  words: 700
focus: Mykhailo Khanenko as a Ruin-era Right-Bank claimant hetman — the Uman-regiment base, the anti-Doroshenko coalition around Sukhovii, the contested 1669 election, the Stebliv defeat, the autonomy-limiting Ostroh Agreement of 1670, the 1672 Batih defeat and Buchach displacement, the 1674 surrender of the mace to Samoilovych, the 1677 arrest and Baturyn imprisonment order, and the 'Polish puppet' label that both explains and flattens him.
