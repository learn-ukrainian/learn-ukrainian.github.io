content_outline:
- points:
  - >-
    [!biography] Знайомство з Вірою Вовк (документована форма — Селянська Віра Остапівна; 1926–2022):
    поетка, прозаїкиня, перекладачка й літературознавиця з окремою багатомовною траєкторією.
  - >-
    Провокаційне питання: чому радянська система вбачала небезпеку не лише в поезії вдома,
    а й у тому, щоб українська література звучала світом як самостійна національна традиція?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 2 січня 1926 року в Бориславі (нині Львівська область); навчання в Кутах у 1935–1938 роках. Дочка лікаря Остапа Селянського (офіційне прізвище — Селянська).
    Освіта в еміграції: навчання в Тюбінгені у 1945–1949 роках, переїзд до Бразилії 1949 року,
    докторський іспит у Ріо-де-Жанейро 1952 року та праця в кількох університетських установах.
    [!decolonization] В інтерв'ю Віра Вовк пов'язувала виїзд родини 1939 року з радянською загрозою;
    це первинне свідчення, а не знайдений наказ про депортацію чи арешт.
    Війна в Німеччині; 13 лютого 1945 року батько, доктор Остап Селянський, загинув під час бомбардування Дрездена, де родина перебувала в останні місяці війни. Еміграція до Бразилії 1949 року.
  section: 'Формування: Від Борислава до Ріо-де-Жанейро'
  words: 1000
- points:
  - >-
    Поетичний доробок охоплює ранню «Юність», бібліографічно точну «Мандалю», а також «Сьому печать»
    і «Ромен-зілля», відзначені разом із перекладами Шевченківською премією 2008 року.
    Переклад з української, португальської та німецької мов був окремою тривалою практикою;
    неперевірені сумарні числа книжок, п'єс і перекладів не використовуються.
    Джерела пов'язують Віру Вовк із Нью-Йоркською групою, але групова назва не визначає її поетики
    й не стирає бразильського та германістичного контекстів.
  section: 'Діяльність: Поетка, перекладачка, культурне посередництво'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Поезію, переклад, прозу й університетську працю розглядають як різні практики,
    не проголошуючи одну з них найбільшою за неперевіреною арифметикою.
    Механізм тиску описано як вимушений виїзд у контексті радянської окупації, підтверджений
    авторським свідченням і архівною хронологією, але без вигаданої кримінальної справи.
    Нелокалізовані поетичні цитати вилучено; тексти цитують лише за назвою твору, виданням і сторінкою.
  section: 'Тінь: Радянська загроза та неможливість вільної творчості'
  words: 1600
- points:
  - >-
    Повернення спадщини після 1991 року; Національна премія України імені Тараса Шевченка (2008) за «Сьому печать», «Ромен-зілля» та португальські переклади української літератури.
    Смерть 16 липня 2022 року в Ріо-де-Жанейро, у віці 96 років — одна з останніх живих постатей еміграційного модернізму.
    Сучасне значення: модель деколонізованої літературної дипломатії — українська культура через глобальний південний вектор, а не лише через російцентричні канали сприйняття.
  section: 'Підсумок: Спадщина між Бразилією та Україною'
  words: 1000
focus: >-
