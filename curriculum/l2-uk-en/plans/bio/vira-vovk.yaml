content_outline:
- points:
  - >-
    [!biography] Знайомство з Вірою Вовк (Віра-Лідія-Катерина Остапівна Селянська; 1926–2022): поетка, прозаїк,
    драматург і перекладачка, що поєднала модернізм, магічний реалізм і бразильську діаспору.
  - >-
    Провокаційне питання: чому радянська система вбачала небезпеку не лише в поезії вдома,
    а й у тому, щоб українська література звучала світом як самостійна національна традиція?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 2 січня 1926 року в Бориславі (Дрогобицький повіт, тоді Польща; нині Львівська область); дитинство частково в гуцульському місті Кути. Дочка лікаря Остапа Селянського (офіційне прізвище — Селянська).
    Освіта в еміграції: германістика, музикознавство та славістика в Тюбінгені; докторський ступінь; професорка німецької літератури в Ріо-де-Жанейро (1967–1996).
    [!decolonization] 1939 року, під радянською окупацією Західної України, батько отримав попередження від радянського офіцера про страту або депортацію до Сибіру; родина втекла на захід переповненим вантажним потягом.
    Війна в Німеччині; 13 лютого 1945 року батько, доктор Остап Селянський, загинув під час бомбардування міста, де родина перебувала в останні місяці війни. Еміграція до Бразилії наприкінці 1949 року.
  section: 'Формування: Від Борислава до Ріо-де-Жанейро'
  words: 1000
- points:
  - >-
    Поетичний доробок: збірки «Юність», «Зоря провідна», «Елегії», «Чорні акації», «Меандри», «Мандала», «Жіночі маски», «Сьома печать», «Ромен-зілля» — модерністична лірика з музичністю, магічним реалізмом і середньовічною іконографією.
    Проза (близько десяти творів) і одинадцять п’єс; внесок у діаспорну сучасну українську літературу як авторка.
    Перекладацький канон: приблизно 53 книги перекладів (14 українською, 39 з української португальською та іншими мовами); дві португальські антології української літератури (1959, 1977).
    Членство в УВАН, НТШ (Нью-Йорк), НСПУ та еміграційному товариству «Слово»; приєднання до Нью-Йоркської групи у 1959 році.
  section: 'Діяльність: Поетка, перекладчка, міст між культурами'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Популярна пам'ять зосереджується на поезії, але 39 томів перекладів можуть бути найбільшим історичним внеском — не зводити постать до однієї ролі.
    Механізм тиску: радянська окупація 1939 року змусила родину покинути Батьківщчину; вільна модерністична поезія в УРСР була неможлива.
    [!epistemic-humility] Дебат про належність до Нью-Йоркської групи: офіційні джерела фіксують членство з 1959 року, але сама авторка наголошувала на латиноамериканський вектор.
    Цитати з лірики: «я несу хліб у згортках шат / для голодних»; «Я не знаю, чия рука колише / цю сіть, до спочинку розп'яту.».
  section: 'Тінь: Радянська загроза та неможливість вільної творчості'
  words: 1600
- points:
  - >-
    Повернення спадщини після 1991 року; Національна премія України імені Тараса Шевченка (2008) за «Сьому печать», «Ромен-зілля» та португальські переклади української літератури.
    Смерть 16 липня 2022 року в Ріо-де-Жанейро, у віці 96 років — одна з останніх живих постатей еміграційного модернізму.
    Сучасне значення: модель деколонізованої літературної дипломатії — українська культура через глобальний південний вектор, а не лише через російцентричні канали сприйняття.
  section: 'Підсумок: Спадщина між Бразилією та Україною'
  words: 1000
