objectives:
- Аналізувати поетичний та перекладацький доробок Віри Вовк у контексті діаспорного модернізму.
- Розуміти механізм радянського тиску, що змусив родину до вигнання та неможливості вільної творчості в УРСР.
- Досліджувати баланс між поезією, прозою, драматургією та перекладом у її спадщині.
- Оцінити внесок португальських антологій української літератури як інструмент деколонізованої презентації.
