content_outline:
- points:
  - 'Провокація: Як дослідження шляхти змінило звичну схему української ранньомодерної історії після 1991 року?'
  - 'Парадокс: Як латина, мертва мова, виявилася ключем до розуміння живої історії України?'
  - '[!biography] Представлення Наталі Яковенко як впливової дослідниці ранньомодерної України; оцінка масштабу впливу потребує незалежної історіографічної рецепції.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Народницька історіографія (Антонович, Грушевський) vs «школа Яковенко». Історія селянських мас та козацтва як єдиний стрижень нації проти історії політичної еліти (шляхти) як держави-творця.'
  - 'Дебат 2: Наративна історія vs джерелознавство. Історія як великий, зв''язний міф нації проти історії як науки, що базується на критичному аналізі первинних документів (актових книг, листів, гербовників).'
  - '[!epistemic-humility] Позиція Яковенко не в тому, що народ не важливий, а в тому, що без аналізу еліти, яка приймала рішення та формувала інституції, історія перетворюється на соціологію чи фольклор.'
  section: 'Конфліктна карта: Еліта проти народу чи історик проти міфу?'
  words: 900
- points:
  - 'Освіта на класичній філології у Львові: глибоке знання латини та грецької як фундамент.'
  - 'Робота в Центральному державному історичному архіві у Києві: щоденний контакт з актовими книгами XVI-XVII ст.'
  - 'Перехід від філолога до історика: усвідомлення, що без розуміння палеографії та джерелознавства неможливо адекватно читати документи.'
  - 'Формативний досвід: виявлення розриву між офіційною радянською історіографією та реальною картиною життя, задокументованою в архівах.'
  section: 'Формування: Класична філологія та архівний гарт'
  words: 1000
- points:
  - 'Книга «Українська шляхта з кінця XIV до середини XVII століття»: деконструкція образу «ворога-ляха» і показ шляхти як багатоетнічного, багатоконфесійного політичного народу, що творив українську ідентичність.'
  - 'Вплив антропологічного підходу: фокус на історії ментальності, уявлень, цінностей, «колективної біографії».'
  - 'Книги «Паралельний світ» та «Дзеркала ідентичності»: історія як аналіз текстів, що відображають світогляд епохи. Поняття «топосу» та «етосу».'
  - '[!decolonization] Розрив із радянською та російсько-імперською схемами, де історія України — це лише історія селянських повстань. Інтеграція української історії в європейський контекст Речі Посполитої.'
  section: 'Діяльність: Повернення шляхти та методологічна революція'
  words: 1300
- points:
  - '[!anti-hagiography] Критика «школи Яковенко» за «елітаризм» та нібито нехтування історією селянства, що становило 90% населення.'
  - 'Звинувачення в надмірній складності: її метод вимагає знання латини, палеографії, що робить її «історією для істориків», а не для широкого загалу.'
  - 'Полеміка щодо козацтва: чи не применшує її підхід державницьку роль Запорізької Січі на користь шляхетської Речі Посполитої?'
  - '[!myth-buster] Міф про те, що Яковенко «скасувала» козацтво. Насправді вона лише показала, що значна частина козацької старшини мала шляхетське походження і мислила в категоріях шляхетської культури.'
  section: 'Тінь: Ціна елітарного повороту'
  words: 900
- points:
  - 'Повернення до розминки: Як поєднати козацький міф зі шляхетською реальністю? Студент має сформулювати власну позицію, спираючись на матеріал модуля.'
  - Викладання й кафедральна праця в НаУКМА як важлива частина інституційної спадщини; повна історія установи потребує голосів інших учасників.
  - 'Підручник «Нарис історії України»: приклад того, як академічну, складну історію можна викласти доступно, але без спрощень.'
  - 'Сучасна релевантність: її метод допомагає аналізувати складні зв''язки українських земель із Руссю, Великим князівством Литовським і Річчю Посполитою без імперського привласнення та національного анахронізму.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Наталя Яковенко, деконструкція народницької історіографії, повернення шляхти, джерелознавство, київська школа істориків, Річ Посполита
