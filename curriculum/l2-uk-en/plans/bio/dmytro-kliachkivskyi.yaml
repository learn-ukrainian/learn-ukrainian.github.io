content_outline:
- points:
  - >-
    [!biography] Знайомство з Дмитром Клячківським (нар. 1911, м. Збараж; ЕСУ
    уточнює 04.11.1911): діяч ОУН, організатор і перший командир УПА, відомий під
    псевдонімом Клим Савур.
  - >-
    [!epistemic-humility] Ім'я — саме по собі розбіжність: ЕІУ подає «КЛЯЧКІВСЬКИЙ
    Роман-Дмитро» (без по батькові), ЕСУ — «Клячківський Дмитро-Роман Семенович».
    Slug і назва модуля вживають усталену форму «Дмитро Клячківський»; порядок
    складників імені НЕ стверджувати як єдино правильний.
  - >-
    [!epistemic-humility] Дата й місце смерті НЕ встановлені однозначно — див.
    секцію про радянську операцію. Не подавати діапазон «1911–1945» як усталений.
  - >-
    Провокаційне питання: як вивчати військового командира, коли самі довідники
    розходяться в його імені, даті смерті й навіть у тому, яким тереном він
    провадив, — і жодне перевірене джерело не називає його автором волинського
    рішення?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта в Галичині та формування світогляду, раннє приєднання до українського
    націоналістичного руху (ОУН).
  - >-
    Німецько-радянська війна: перехід до збройної боротьби, формування перших
    відділів УПА на Волині та Поліссі.
  - >-
    Клячківський стає одним із ключових командирів УПА-Північ, що діяла на Волині.
  section: 'Формування: Від ОУН до УПА-Північ'
  words: 1000
- points:
  - >-
    Волинь 1943 року — що документовано в перевірених джерелах: навесні 1943 року
    рішення про вигнання з Волині місцевих поляків ухвалив **Крайовий провід ОУН(б)
    на Волині**, тобто ОРГАН; 11–13 липня 1943 року стався загальний виступ — загони
    УПА майже одночасно атакували понад 100 польських поселень. Суб'єктом рішення в
    джерелі є орган, а не особа.
  - >-
    Числа — тільки з атрибуцією сторони, що рахувала: за польськими підрахунками з
    польського боку загинуло щонайменше 35 тис. осіб (переважно цивільна сільська
    людність), з них 18 тис. — із встановленими прізвищами; з українського боку — до
    кількох тисяч; в Україні подібних підрахунків не проводилося. За оцінками
    І. Патриляка, жертвами ширшого конфлікту 1942–1944 стали 13–16 тис. українців і
    38–39 тис. поляків. НІКОЛИ не подавати ці числа без назви сторони.
  - >-
    [!epistemic-humility] МЕЖА АВТОРСТВА (головне для цієї секції). Жодне з
    перевірених цим проходом джерел не подає тексту наказу, не цитує його й не
    називає Клячківського автором рішення: стаття про нього в ЕІУ не згадує ні
    наказу, ні антипольської акції взагалі; стаття про нього в ЕСУ — так само;
    стаття «Волинська трагедія 1943 р.» атрибутує рішення Крайовому проводу як
    органу й прізвища не називає. Тому «наказ Клима Савура» НЕ цитувати й
    авторства НЕ приписувати — авторство лишається невизначеним. Це не заперечення
    насильства: насильство й числа стверджуються прямо, невизначене — саме авторство.
  - >-
    Неприпустимість заперечення польських страждань: визнання трагедії є основою
    чесного історичного діалогу та деколонізованої історії. Невстановлене авторство
    рішення не применшує ні події, ні жертв.
  section: 'Діяльність: Волинь 1943 року'
  words: 1200
- points:
  - >-
    Повернення радянської влади: відновлення протистояння УПА з радянськими силами безпеки.
  - >-
    Радянська контрповстанська операція: масштабні заходи НКВС/НКДБ проти УПА-Північ.
  - >-
    [!epistemic-humility] Загибель — РОЗБІЖНІСТЬ, яку показати, а не усунути: ЕІУ
    подає 12.11.1944, у бою з військами НКВС біля Орлівських хуторів Клеванського
    (нині у складі Рівненського) району; ЕСУ — 12.02.1945, поблизу с. Суськ
    Костопільського району. Різниця — три місяці й інший район. Спільне для обох:
    бій з військами НКВС; Рівненщина. Дату й місце смерті НЕ стверджувати; жодне
    перевірене джерело не подає формулювання «12 лютого 1945 поблизу Оржева» —
    не вживати його.
  - >-
    Важливість деколонізованої термінології: відмова від радянського тавра "бандитизм"
    та використання нейтральних термінів ("повстанці", "радянські сили безпеки").
  section: 'Тінь: Радянська контрповстанська операція'
  words: 1600
- points:
  - >-
    [!myth-buster] Російська пропаганда: використання трагедії Волині для делегітимізації
    сучасної України та створення образу держави, що нібито сповідує ненависть.
  - >-
    Чесна історія проти пропаганди: російським маніпуляціям слід протиставляти не
    наївну героїзацію чи замовчування, а складну картину, де УПА одночасно
    протистояла радянському та німецькому режимам і була причетна до цивільного насильства.
  - >-
    Сучасне осмислення постаті Клячківського: необхідність відмови як від
    однозначного прославлення, так і від радянської демонізації.
  section: 'Підсумок: Складна історія та пропаганда'
  words: 1000
focus: >-
  Дмитро Клячківський (Клим Савур) як організатор і перший командир УПА, згодом
  командувач УПА-Північ, та об'єкт тривалих історичних дискусій. Аналіз його командної
  ролі; волинське насильство 1943 року й атрибутовані числа стверджуються прямо, тоді як
  авторство рішення лишається невизначеним, бо жодне перевірене джерело не подає
  письмового наказу й не називає його автором. Три розбіжності довідників (ім'я, дата й
  місце смерті, терен провідництва) показані, а не усунені.
level: BIO
module: bio-302
objectives:
- Аналізувати роль Дмитра Клячківського як організатора і командира УПА, згодом командувача УПА-Північ.
- >-
  Досліджувати волинське насильство 1943 року так, як його подають джерела: рішення
  атрибутоване Крайовому проводу ОУН(б) на Волині як органу, числа — стороні, що їх
  рахувала, а авторство рішення лишається невизначеним за браком документа.
- >-
  Розрізняти доведене (напади, атрибутовані числа) і недоведене (авторство наказу),
  не підмінюючи одне одним у жодному напрямі.
- >-
  Розуміти історичні обставини загибелі Клячківського внаслідок радянської
  контрповстанської операції, утримуючи розбіжність джерел щодо її дати й місця.
- >-
  Оцінювати складні аспекти історичної пам'яті, уникаючи як заперечення фактів,
  так і російської пропагандистської риторики.
