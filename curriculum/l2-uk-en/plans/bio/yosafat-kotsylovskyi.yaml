objectives:
- Досліджувати роль Йосафата Коциловського у розбудові інституцій Перемишльської єпархії (семінарія, преса, товариства).
- Аналізувати співпрацю польських і радянських спецслужб у механізмі ліквідації УГКЦ на прикордонних територіях.
- Розуміти значення канонічного підпорядкування Апостольському престолу як форми опору тиску Московського патріархату.
- Оцінювати наслідки насильницьких депортацій для структури греко-католицької церкви.
