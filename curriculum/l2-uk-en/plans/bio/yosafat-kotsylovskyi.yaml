content_outline:
- points:
  - >-
    [!biography] Знайомство з Йосафатом Коциловським: єпископ Перемишльський,
    василіянин, який розбудовував церковні інституції та став жертвою
    узгоджених дій польських і радянських спецслужб.
  - 'Провокаційне питання: чому тоталітарні держави намагалися змусити єпископів добровільно зректися своїх єпархій?'
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження 1876 року (Пакошівка на Лемківщині) в
    родині з активною громадською та священичою традицією. Навчання в Римі,
    здобуття докторатів з філософії та богослов'я.
  - 'Чернечий шлях: вступ до василіянського новіціату (1911), діяльність в еміграційній семінарії в Кромержижі.'
  section: 'Формування: Шлях василіянина'
  words: 1000
- points:
  - 'Єпископство: хіротонія та інтронізація в Перемишлі 1917 року. Участь в Українській Національній Раді ЗУНР.'
  - >-
    Інституційна розбудова: відновлення семінарії в Перемишлі (1921), активні
    канонічні візитації парафій, заснування дієцезіальної преси (зокрема
    "Український Бескид") та Інституту Католицької Акції (1931).
  - >-
    [!decolonization] Захист пастви: у роки Другої світової війни переховував
    євреїв та протистояв німецькому тиску. Відмова добровільно залишити
    Перемишль під час примусового переселення українців.
  section: 'Діяльність: Розбудова єпархії'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Координація спецслужб: арешт польською поліцією у
    вересні 1945 року, утримання в Ряшеві. У січні 1946 року польська безпека
    передала єпископа органам НКВС.
  - >-
    Другий арешт: після тимчасового звільнення — повторний арешт за відмову
    покинути свій престол і добровільно приєднатися до Російської православної
    церкви.
  - >-
    Тиск: радянський тиск з метою змусити Коциловського визнати владу
    Московського патріарха. Його заява про вірність Папі Римському перед
    неминучим арештом.
  section: 'Тінь: Переслідування та знищення'
  words: 1600
- points:
  - >-
    Смерть у неволі: загибель 17 листопада 1947 року (джерела зазначають
    таборовий шпиталь "Чапаєвка" під Києвом або київську в'язницю).
  - >-
    [!epistemic-humility] Підсумок: жорстоке руйнування інституційної мережі
    Перемишльської єпархії, проте збереження пам'яті. Церковний акт —
    беатифікація Папою Іваном Павлом II у 2001 році.
  section: 'Підсумок: Вірність Апостольському престолу'
  words: 1000
focus: >-
  Йосафат Коциловський як єпископ Перемишльський, розбудовник семінарії та
  жертва польських та радянських спецслужб під час ліквідації УГКЦ.
