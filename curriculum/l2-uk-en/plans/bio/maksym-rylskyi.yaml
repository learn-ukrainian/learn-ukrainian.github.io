content_outline:
- points:
  - >-
    [!biography] Знайомство з Максимом Рильським: поет і неокласик, перекладач і
    академік, народжений 7 (19) березня 1895 року в Києві та померлий 24 липня
    1964 року в Києві природною смертю від раку.
  - >-
    Провокаційне питання: чому радянська влада одночасно давала йому високі
    звання і тримала під наглядом як людину з "націоналістичним минулим"?
  section: Розминка
  words: 400
- points:
  - >-
    Родинна подвійність: батько Тадей Рильський був етнографом і економістом,
    сином польського шляхтича і княжни Трубецької; мати Меланія Чуприна походила
    з українського селянства.
  - >-
    Освіта в Києві: приватна гімназія Науменка, медичний та історико-філологічний
    факультети університету Святого Володимира, Український народний університет
    у 1915-1918 роках без завершення через революцію.
  - >-
    Ранній дебют: збірка "На білих островах" 1910 року вийшла, коли авторові було
    п'ятнадцять років; "Під осінніми зорями" 1918 року дала голос раннього
    модернізму.
  - >-
    Формування неокласика: Рильський поєднав європейську літературну пам'ять,
    селянську українську мовну основу і дисципліну віршової форми.
  section: 'Формування: Київ, родина і школа форми'
  words: 1000
- points:
  - >-
    "Синя далечінь" 1922 року утвердила його неокласичний голос: строга форма,
    культурні алюзії, сонети й октави без декларативної партійності.
  - >-
    Переклад "Пана Тадеуша" Адама Міцкевича 1927 року в досьє подано як вершину
    української перекладацької школи й доказ того, що переклад міг зберігати
    високу мову.
  - >-
    Збірки "Гомін і відгомін" та "Де сходяться дороги" 1929 року позначають
    вершину й завершення його вільного неокласичного періоду.
  - >-
    [!decolonization] Переклади Міцкевича, Шекспіра й Пушкіна треба читати не як
    підпорядкування іншій культурі, а як працю з розбудови української літературної
    мови під умовами цензури.
  - >-
    Пізня лірика "Троянди й виноград" 1957 року та "Голосіївська осінь" 1964 року
    повертає філософську, осінню інтонацію після десятиліть примусу.
  section: 'Діяльність: Неокласична форма, переклад і пізня лірика'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт, допити, звільнення, пізні офіційні ролі й нова
    ідеологічна кампанія 1947 року показують несталу позицію «офіційного» поета;
    не називаємо психологічну або моральну «ціну» без прямого доказу.
  - >-
    19 березня 1931 року, у день, коли йому виповнилося 36 років, ДПУ
    заарештувало Рильського як провідного неокласика і звинуватило в участі у
    сфабрикованій контрреволюційній організації та керівництві "військовою гілкою".
  - >-
    П'ять місяців у Лук'янівській в'язниці: ЕІУ описує допити, залякування,
    шантаж і примус до самообмови; неперевірену оповідь про проведення вулицями
    урок не повторює.
  - >-
    Архівна постанова засвідчує звільнення 19 серпня 1931 року. ЕІУ пов'язує
    наступні декларації та «Знак терезів» 1932 року з вимушеним зламом, але урок
    не перетворює книжку на буквальну плату за життя.
  - >-
    Порівняння з долями неокласиків потребує точності: Микола Зеров, Павло
    Филипович і Михайло Драй-Хмара стали жертвами репресій, тоді як Юрій Клен
    емігрував. Їхні рішення не використовуємо як моральну шкалу для Рильського.
  - >-
    Після Другої світової війни контроль не зник: архівна виставка показує
    документи кампанії 1947 року. Назву оперативної справи й імена, не підтверджені
    прямим архівним локатором у пакеті, вилучено.
  - >-
    30 вересня 1947 року газета «Радянська Україна» надрукувала статтю Ф. Єневича
    про Рильського. Архів подає підготовчі матеріали, стенограми та відповідь
    поета; урок називає документ і дату без відтворення ідеологічних цитат.
  - >-
    [!epistemic-humility] Офіційні титули, депутатство і академічний статус не
    скасовували страху; вони були частиною тієї самої системи контролю.
  section: 'Тінь: Арешт, документи справи і кампанія 1947 року'
  words: 1600
- points:
  - >-
    Пізню підтримку української мови та молодших авторів розглядаємо за ЕІУ без
    морального порівняння з Тичиною. Анекдоти про передачі й точні суми допомоги,
    для яких немає прямого локатора, до уроку не включаємо.
  - >-
    Центральна дискусія: як поєднати документовані примус і публічні ролі з
    перекладацькою, мовознавчою та інституційною працею, не виправдовуючи
    офіційних текстів і не вдаючись до читання приватних мотивів.
  - >-
    [!myth-buster] Радянський образ поета, який "визнав помилки", і російське
    привласнення його як "друга російської культури" однаково стирають факт
    арешту, нагляду і вбивства його найближчого кола.
  - >-
    Підсумкове питання: як говорити про вимушені оди Сталіну поруч із тихою
    допомогою переслідуваним, не виправдовуючи примус і не створюючи ікону без
    тріщин?
  section: 'Підсумок: Мистецтво рівноваги без ідеалізації'
  words: 1000
focus: >-
  Максим Рильський як неокласик, перекладач і радянський лауреат під державним
  контролем. Семінар розглядає арешт 1931 року, «Знак терезів», архівні документи
  кампанії 1947 року та пізню працю для української культури.
