- Аналізувати неокласичну поетику Рильського через форму, переклад і ранні збірки 1910-1929 років.
- Пояснювати арешт 19 березня 1931 року, Лук'янівську в'язницю і "Знак терезів" як механізм примусової лояльності.
- Досліджувати архівні документи арешту та кампанії 1947 року як прояв контролю над офіційним лауреатом.
- Дискутувати про "мистецтво рівноваги" між капітуляцією, виживанням, перекладом і допомогою переслідуваним.
