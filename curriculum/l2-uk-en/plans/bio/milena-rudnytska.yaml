content_outline:
- points:
  - 'Парадокс: Як одна жінка стала міжнародним голосом нації без держави, використовуючи лише інструменти демократії проти
    режимів, що прагнули її знищити?'
  - 'Провокація: Чи могла її відданість парламентським методам бути не силою, а слабкістю в боротьбі з Пацифікацією?'
  - '[!biography] Представлення Мілени Рудницької як першої жінки-посла від українців у польському Сеймі та лідерки найбільшої
    жіночої організації Європи.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пріоритети Рудницької. Чи була вона в першу чергу феміністкою, що використовувала національний рух, чи націоналісткою,
    для якої фемінізм був інструментом мобілізації?'
  - 'Дебат 2: «Буржуазний» фемінізм vs. «пролетарський інтернаціоналізм». Як радянська пропаганда атакувала Рудницьку та Союз
    українок, протиставляючи їх «справжнім» інтересам трудящих жінок.'
  - '[!epistemic-humility] Позиція УНДО (поміркована) vs позиція ОУН (радикальна) щодо її парламентської діяльності.'
  - '[!decolonization] Рудницька на трибуні Ліги Націй — спроба використати міжнародне право проти колоніальної політики Польщі
    та радянських злочинів.'
  section: 'Конфліктна карта: Феміністка чи націоналістка?'
  words: 900
- points:
  - 'Освіта у Віденському університеті: вплив європейського модернізму та суфражистського руху.'
  - 'Галичина початку XX століття: соціальний та історичний контекст, що сформував її світогляд.'
  - 'Поворотний момент: повернення до Львова та вибір шляху громадської активістки замість академічної кар''єри.'
  - 'Ранні впливи: родина, освіта та перші кроки в жіночому русі, що заклали фундамент її майбутньої діяльності.'
  section: 'Формування: Відень-Львів, народження інтелектуалки'
  words: 1000
- points:
  - 'Парламентська робота (1928-1935): виступи проти Пацифікації, боротьба за українську мову в школах, захист прав політичних
    в''язнів.'
  - 'Лідерство в Союзі українок: перетворення організації на потужну структуру з економічними, освітніми та культурними програмами.'
  - 'Міжнародна дипломатія: представлення українського питання на європейських конгресах, петиції до Ліги Націй.'
  - 'Її власні слова: аналіз фрагментів промов у Сеймі та статей з журналу «Жінка», що демонструють її риторику та аргументацію.'
  section: 'Діяльність: Два фронти боротьби — Сейм і Союз Українок'
  words: 1300
- points:
  - '[!anti-hagiography] Критика з боку радикальних націоналістів (ОУН): чи не була її віра в закон і міжнародне право наївною
    перед обличчям брутальної сили?'
  - 'Провал у Лізі Націй: незважаючи на титанічні зусилля, її звернення щодо Голодомору та Пацифікації були фактично проігноровані
    міжнародною спільнотою.'
  - '[!myth-buster] Міф про всеохопний фемінізм: чи не був Союз українок організацією переважно для освічених міських жінок,
    відірваною від проблем селянської більшості?'
  - 'Особисті жертви: ціна, яку вона та її родина заплатили за її політичну діяльність — арешти, еміграція, розлука з сином.'
  section: 'Тінь: Ціна поміркованості та елітарності'
  words: 900
- points:
  - 'Повернення до розминки: студент, маючи нові знання, формулює відповідь — чи була стратегія Рудницької ефективною?'
  - 'Спадщина: вплив на кілька поколінь українських феміністок. Перевидання її праць після 1991 року та її місце в сучасному
    пантеоні.'
  - '[!decolonization] Рудницька як символ українського європейського вибору та інтелектуального спротиву імперським наративам.'
  - 'Сучасна релевантність: як досвід Рудницької (боротьба на дипломатичному фронті, документування злочинів) резонує із сьогоденням
    України.'
  section: 'Дискусія та підсумок: Спадщина незламної дипломатки'
  words: 700
focus: 'Мілена Рудницька: поєднання фемінізму та націоналізму, парламентська боротьба в польському Сеймі, лідерство в Союзі
  українок, протистояння радянській та польській політиці.'
