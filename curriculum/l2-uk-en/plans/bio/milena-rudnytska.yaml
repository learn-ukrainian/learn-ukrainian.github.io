objectives:
- Критично аналізувати взаємозв'язок між фемінізмом та націоналізмом в українському контексті
- Оцінювати ефективність парламентських методів боротьби в умовах авторитарного тиску
- Розрізняти історичний образ особи та його пізніші інтерпретації (радянські, діаспорні, сучасні)
- Формулювати аргументовану позицію щодо спадщини Мілени Рудницької та її актуальності для сьогодення
