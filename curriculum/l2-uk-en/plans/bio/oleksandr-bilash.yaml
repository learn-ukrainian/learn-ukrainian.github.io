content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Провокація: Як людина, якій у 15 років сказали, що вона «не має музичного слуху», стала Народним артистом і автором пісні, якої боялося КДБ?'
  - '[!biography] Олександр Білаш — не «радянський пісняр-успіх», а композитор, який вибудував український пісенний канон усередині радянської системи й водночас під її наглядом.'
  section: Розминка
  words: 400
- annotations:
  - '[!decolonization]'
  - '[!epistemic-humility]'
  points:
  - 'Дебат 1: Народний артист СРСР чи автор «бандерівського гімну»? Як одна постать поєднала державні відзнаки з піснею, у якій КДБ вбачало символіку ОУН.'
  - 'Дебат 2: Радянська vs. сучасна інтерпретація. СРСР підносив Білаша як лояльного лауреата; сучасний погляд бачить у його пісенності тяглість української національної культури під русифікацією.'
  - '[!epistemic-humility] Доку́ментованого арешту чи ув''язнення Білаша немає — епізод із КДБ зберігся лише як спогад Дмитра Павличка. Не вигадуймо мучеництва там, де було співіснування і нагляд.'
  - '[!decolonization] Червоний і чорний у «Двох кольорах»: вишивкова символіка (любов і журба) проти прочитання КДБ як кольорів прапора ОУН.'
  section: 'Конфліктна карта: Лауреат чи «бандерівський гімн»?'
  words: 900
- points:
  - 'Походження: село Градизьк на Полтавщині, музична сільська родина — мати-співачка, батько-самоук на багатьох інструментах.'
  - 'Відмова і впертість: 1946 року Полтавське музичне училище не прийняло його «через відсутність музичного слуху». Київська вечірня музична школа, навчання в братів Майбородів, підробітки на станції та в ресторанах.'
  - 'Фахова освіта: Житомирське музичне училище ім. В. С. Косенка (1948–1952), Київська консерваторія (1957), клас композиції М. Вілінського.'
  - 'Формативний контекст: українська народнопісенна традиція як свідома основа стилю, а не «фольклорна екзотика».'
  section: 'Формування: Від Градизька до консерваторії'
  words: 1000
- points:
  - 'Пісенний канон: «Два кольори» (сл. Д. Павличко, 1964), «Ясени» (сл. М. Ткач, 1963), «Лелеченьки» з музики до фільму «Сон» про Шевченка — народження сучасної української ліричної пісні.'
  - 'Співавторство як метод: тривала праця з поетами Д. Павличком, М. Ткачем, А. Малишком; близько 500 пісень.'
  - 'Велика форма: опера «Гайдамаки» (за поемою Тараса Шевченка, 1965), монооперна та ораторіальна творчість, музика до близько 30 кінофільмів.'
  - 'Інституційна вага: багаторічне керівництво Київською організацією Спілки композиторів — як це поєднувалося з творчістю?'
  section: 'Діяльність: Пісенний канон і велика форма'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Сходинки радянських відзнак: премія ім. М. Островського (1967), премія Ленінського комсомолу (1968), Народний артист СРСР (1990). Це частина запису, а не незручна примітка.'
  - 'Замовлення системи: симфонічна поема «Павло Корчагін», опера «Прапороносці», оперета «Дзвони Росії» — твори на радянські теми поряд із національною пісенністю.'
  - '[!myth-buster] Міф про «чистого народного пісняра поза політикою». Білаш був і впливовим функціонером Спілки композиторів — обидві ролі правдиві.'
  - 'Епізод із КДБ навколо «Двох кольорів»: пісню підозрювали як «бандерівський гімн»; влада водночас відзначала автора. Нагляд і коо́птація, а не репресія.'
  section: 'Тінь: Між системою і піснею'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: то чому пісні боялися? Студент формулює відповідь з аргументами модуля.'
  - 'Пісня переживає режим: «Два кольори» як пісня національної пам''яті після 2014 року (виконання гуртом «Кому Вниз», 2015).'
  - '[!decolonization] Спадщина Білаша — українська пісенність як тяглість ідентичності під русифікацією, а не «радянський музичний продукт».'
  - 'Сучасне значення: чому мелодія, написана 1964 року, знову звучить як національне висловлювання.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Oleksandr Bilash as a complex Soviet-era figure: builder of a Ukrainian lyric song-canon (Два кольори, Ясени, opera Гайдамаки) who held the full Soviet honours ladder and chaired the composers'' union, yet whose most beloved song was suspected by the KGB of being an OUN anthem — co-optation and surveillance, not a clean Soviet success story.'
