content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Вхід через голос самого Білаша та саморобну гармошку: як слух із
          родинного середовища перетворився на фахову композиторську працю.
      - >-
          [!biography] Олександр Білаш - український композитор і поет, який
          поєднав народнопісенний слух, професійну композицію та уважність до
          поетичного слова.
      - >-
          Музична родина в Градизьку: мати-співачка, батько-самоук, рання
          слухова і пісенна пам'ять Полтавщини.
      - >-
          Відмова в Полтавському музичному училищі через брак початкової освіти
          й характеристику про «відсутність музичного слуху»; подальше навчання
          показати як працю, а не як легенду про миттєвий тріумф.
      - >-
          Фахова освіта: Житомирське музичне училище ім. В. С. Косенка,
          Київська консерваторія, клас композиції М. Вілінського.
    section: 'Формування: Градизьк, слух і освіта'
    words: 500
  - points:
      - >-
          Кероване читання і слухання: «Два кольори» (сл. Д. Павличка, 1964),
          «Ясени» (сл. М. Ткача, 1963), «Лелеченьки» з музики до фільму «Сон».
      - >-
          Співавторство як ремесло: зіставити поетичний образ, синтаксичну
          фразу, словесний наголос, мелодію, дикцію та виконавське рішення.
      - >-
          Короткий первинний голос Білаша «Я перш за все поет...» як привід
          дослідити його роботу між звуком і словом, а не як готовий вирок.
      - >-
          [!decolonization] Показати конкретно, як український поетичний текст
          і мелодика діяли в масовому репертуарі; не замінювати аналіз словом
          «деколонізація».
    section: 'Між словом і мелодією: три пісні'
    words: 900
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          Велика форма: опера «Гайдамаки» за Тарасом Шевченком, моноопери,
          симфонічна та кіномузика як доказ ширшого жанрового діапазону.
      - >-
          [!anti-hagiography] Радянські відзнаки, посади й тематичні твори
          назвати прямо, але стисло; розрізнити факт кар'єри та оцінку музики.
      - >-
          [!myth-buster] Не вигадувати персонального переслідування Білаша.
          Спогад Д. Павличка про «Два кольори» лишається обмеженим матеріалом
          про рецепцію однієї пісні.
      - >-
          Навчальна дія: зіставити енциклопедичний перелік жанрів із двома
          обраними творами й сформулювати, що губиться за ярликом «пісняр».
    section: 'За межами пісенного хіта: велика форма й інституції'
    words: 400
  - points:
      - >-
          Сучасний запис використати як матеріал, а не як доказ наперед заданої
          тези: слухач порівнює темп, дикцію, аранжування й емоційний регістр.
      - >-
          Концерт Суспільне Культура до 95-річчя Білаша дає документований
          приклад рецепції; не приписувати всій Україні єдиного способу слухання.
      - >-
          Підсумкова робота просунутого рівня: аргумент із маркерами поступки, джерельної
          певності й оцінки; висновок має спиратися на конкретний запис або
          текст, а не повторювати формулу курсу.
    section: 'Сучасне слухання: виконання, рецепція, аргумент'
    words: 400
focus: >-
  Oleksandr Bilash as a Ukrainian composer and poet working between word and
  melody: guided analysis of three songs, one large-form work, primary voice,
  documented institutional context, and a contemporary performance.
level: BIO
module: bio-374
objectives:
  - >-
      Аналізувати життя і творчість Олександра Білаша в контексті української
      пісенності й професійної музики на основі конкретних творів і джерел
  - >-
      Пояснювати, як народнопісенна традиція, поетичне слово і професійна
      композиція формували пісенний канон Білаша
  - >-
      Порівнювати два виконання за темпом, дикцією, аранжуванням, наголосом і
      способом передавання поетичного образу
  - >-
      Формулювати розгорнутий аргумент, розрізняючи факт, джерельну певність,
      інтерпретацію та власну оцінку
