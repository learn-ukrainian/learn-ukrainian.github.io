content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому мелодії Білаша - «Два кольори», «Ясени»,
          «Лелеченьки» - досі звучать як українська культурна пам'ять?
      - >-
          [!biography] Олександр Білаш - композитор українського пісенного
          канону, чия творчість поєднала народнопісенну традицію, професійну
          композицію і поетичне слово.
      - >-
          Музична родина в Градизьку: мати-співачка, батько-самоук, рання
          слухова і пісенна пам'ять Полтавщини.
      - >-
          Відмова і впертість: історія про невступ до Полтавського музичного
          училища через «відсутність музичного слуху» як педагогічний вступ, а
          не життєва легенда.
      - >-
          Фахова освіта: Житомирське музичне училище ім. В. С. Косенка,
          Київська консерваторія, клас композиції М. Вілінського.
    section: 'Формування: Від Градизька до консерваторії'
    words: 1000
  - points:
      - >-
          Пісенний канон: «Два кольори» (сл. Д. Павличка, 1964), «Ясени»
          (сл. М. Ткача, 1963), «Лелеченьки» з музики до фільму «Сон» про
          Шевченка.
      - >-
          Співавторство як метод: тривала праця з Д. Павличком, М. Ткачем,
          А. Малишком та іншими поетами; близько 500 пісень.
      - >-
          Велика форма: опера «Гайдамаки» за Тарасом Шевченком, моноопера,
          ораторіальна і симфонічна музика, музика до кіно.
      - >-
          [!decolonization] Не зводити Білаша до «радянського композитора»:
          головний навчальний фокус - українська мова, мелодика і тяглість
          пісенної культури.
    section: 'Діяльність: Пісенний канон і велика форма'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          [!anti-hagiography] Радянські відзнаки й посади називати прямо:
          премії, звання, керівництво Київською організацією Спілки
          композиторів. Це контекст доби, а не центр модуля.
      - >-
          Поруч із національною пісенністю існували й радянсько-тематичні
          твори: «Павло Корчагін», «Прапороносці», «Дзвони Росії». Не
          приховувати, але й не робити з цього ярлик.
      - >-
          [!myth-buster] Білаш не був дисидентським мучеником чи персонажем
          безпекового сюжету. Не вигадувати репресій і не навішувати таку
          рамку на біографію.
      - >-
          Спогад Д. Павличка про підозру навколо «Двох кольорів» можна
          використати лише як короткий контекст рецепції пісні; це не доказ
          репресії проти Білаша і не центр розділу.
    section: 'Контекст: Радянська доба без ярликів'
    words: 1000
  - points:
      - >-
          Після 1991 року Білаш лишається частиною українського публічного
          репертуару: виконання, ювілеї, пам'ять про пісні, що пережили
          політичну систему.
      - >-
          Сучасний приклад рецепції: концерт Суспільне Культура до 95-річчя
          Олександра Білаша, оприлюднений 2026-06-28 під час повномасштабної
          війни.
      - >-
          Порівняти «Два кольори» з пісенною пам'яттю Володимира Івасюка: як
          лірична пісня може виконувати націєтворчу культурну роботу без
          прямого політичного гасла.
    section: "Сучасна пам'ять: Пісні, які звучать у воєнній Україні"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: чому важливо читати складність радянської доби,
          але не давати їй поглинути український зміст творчості Білаша.
      - >-
          Аргументована відповідь: що саме робить Білаша важливим для
          українців - мелодія, мова, співпраця з поетами, публічна пам'ять,
          інституційна вага.
      - >-
          Фінальне письмо: Білаш як приклад культурної тяглості, а не як
          привід для сенсаційної безпекової рамки.
    section: "Дискусія та підсумок: Українська пісенна пам'ять"
    words: 800
focus: >-
  Oleksandr Bilash as a Ukrainian song-canon composer: author of enduring
  lyric songs («Два кольори», «Ясени», «Лелеченьки»), creator of large-form
  works including opera «Гайдамаки», and Soviet-era cultural institution figure
  whose legacy is best taught through Ukrainian language, melody, memory, and
  modern reception.
