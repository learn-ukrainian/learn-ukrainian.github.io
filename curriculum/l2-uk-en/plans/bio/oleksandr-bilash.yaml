objectives:
  - >-
      Аналізувати життя і творчість Олександра Білаша в контексті української
      пісенності, мови й культурної пам'яті, уникаючи агіографії
  - >-
      Пояснювати, як народнопісенна традиція, поетичне слово і професійна
      композиція формували пісенний канон Білаша
  - >-
      Пояснювати рецепційну дугу пісень Білаша: від радянської естради до
      сучасної української культурної пам'яті
  - >-
      Формулювати аргументовану позицію щодо ролі митця, який творив
      українську культуру всередині радянських інституцій
