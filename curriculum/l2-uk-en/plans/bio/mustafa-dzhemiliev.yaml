content_outline:
- points:
  - >-
    [!biography] Знайомство з Мустафою Джемілєвим: лідер кримськотатарського народу,
    багаторічний політв'язень радянських таборів, Герой України (живий діяч).
  - >-
    Проблемне питання: як людина, засуджена до 15 років таборів, змогла
    стати голосом свого народу на міжнародній арені?
  section: Розминка
  words: 400
- points:
  - >-
    Травма депортації: виселення родини з Криму у 1944 році (Сюргюнлік)
    ще в дитячому віці як визначальний фактор біографії.
  - >-
    Рання правозахисна діяльність: участь у підпільному "Союзі кримськотатарської молоді"
    в Узбекистані (1959).
  - >-
    Початок репресій: виключення з інституту за публікацію матеріалів з історії
    кримських татар, перший арешт і засудження (1966).
  section: 'Формування: Дитина депортації'
  words: 1000
- points:
  - >-
    [!decolonization] Інтелектуальний опір: збір свідчень про злочини радянської
    влади проти кримськотатарського народу. Збереження пам'яті: "І про це потрібно пам'ятати".
  - >-
    Дисидентська діяльність: співпраця з правозахисним рухом у СРСР, захист
    права кримських татар на повернення на батьківщину.
  - >-
    Тріумф повернення: довгоочікуване повернення до Криму (1989). Обрання
    головою Меджлісу кримськотатарського народу (1991).
  section: 'Діяльність: Боротьба за повернення і права народу'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Механізм репресій: неодноразові арешти, сфабриковані справи
    за "наклеп на радянський лад" та відмову служити в радянській армії.
  - >-
    Найдовше голодування: 303-денне голодування у в'язниці як безпрецедентний акт
    опору, що привернув увагу світової спільноти.
  - >-
    Нова окупація: спротив російській анексії Криму у 2014 році. Чітка позиція:
    "Україна неподільна".
  - >-
    Заборона на в'їзд: російська окупаційна влада знову заборонила Джемілєву
    перебувати на Батьківщині, повторюючи радянські методи вигнання.
  section: 'Тінь: Радянські табори та голодування'
  words: 1600
- points:
  - >-
    Парламентська та міжнародна праця: діяльність як народного депутата України
    та представника інтересів народу у світі.
  - >-
    Державне визнання: присвоєння звання Героя України (2023).
  - >-
    Сучасне значення: Мустафа Джемілєв як живий символ непохитності та права
    на самовизначення кримських татар.
  section: 'Підсумок: Голос нескореного Криму'
  words: 1000
focus: >-
  Мустафа Джемілєв як архітектор кримськотатарського національного руху, його
  боротьба проти радянської каральної системи та лідерство в умовах
  сучасної російської окупації Криму.
