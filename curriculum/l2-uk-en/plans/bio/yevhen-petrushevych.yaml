content_outline:
- points:
  - 'Провокація: як парламентський адвокат і депутат австрійського Райхсрату став «диктатором» ЗУНР? Слово «диктатор» тут — не фашистський ярлик ХХ століття, а надзвичайна конституційна посада воєнного часу. Чому державі, яка воювала за саме своє існування, знадобилася така влада?'
  - '[!biography] Знайомство з постаттю, чия біографія — не «герой чи невдаха», а державницька стратегія галицького правника в добу краху імперій.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (президент-легаліст): від 18 жовтня 1918 року Петрушевич — президент Української Національної Ради, цивільно-політичний голова ЗУНР, що спирався на самовизначення й представницьку легітимність українських земель Австро-Угорщини.'
  - 'Позиція 2 (надзвичайна влада): 9 червня 1919 року УНРада надала йому повноваження «диктатора» ЗУНР під час кризи польсько-української війни — це ставить перед студентом питання про легітимність: воєнна надзвичайність, конституційна імпровізація чи авторитарний дрейф?'
  - '[!decolonization] Українську «Західноукраїнську Народну Республіку» варто зіставити із зовнішніми рамками — «Східна Галичина», «Małopolska Wschodnia», радянський ярлик «буржуазного націоналізму»; кожна назва несе політику пам''яті.'
  - '[!epistemic-humility] Частина дат (терміни в Галицькому сеймі, зміна назви на Західну область УНР після Акта Злуки) різниться в джерелах — подаємо послідовність із джерельними позначками, а не один сплощений факт.'
  section: 'Конфліктна карта: Президент чи диктатор?'
  words: 900
- points:
  - 'Походження: за ЕСУ й ЕІУ — 3 червня 1863 року, Буськ (нині Львівщина), у священничій родині; Львівська академічна гімназія та правничий факультет Львівського університету.'
  - 'Громадська й правнича праця: адвокатура в Сокалі та Сколе, участь у «Просвіті», кооперативному, кредитному й читальняному русі Галичини — школа інституційної, а не повстанської політики.'
  - 'Парламентарій: депутат австрійського парламенту (Райхсрату) у 1907–1918 роках і діяч Галицького сейму; його політика поєднувала українське представництво, мовні права та розбудову інституцій в умовах нерівної Габсбурзької Галичини.'
  section: 'Формування: Галицький правник у Габсбурзькій імперії'
  words: 1000
- points:
  - '18 жовтня 1918 року українські представники у Львові утворили Українську Національну Раду й обрали Петрушевича її президентом; 1 листопада 1918 року Листопадовий чин зробив український державний проєкт у Львові конкретним.'
  - 'ЗУНР як держава, а не епізод: Рада й Державний секретаріат будували правові, адміністративні, освітні, військові й дипломатичні структури, воюючи водночас за територію.'
  - '22 січня 1919 року Акт Злуки символічно й правно поєднав ЗУНР і УНР, але армію, дипломатію й територіальні пріоритети залишив розділеними.'
  - 'Дипломатія еміграційного уряду 1919–1923 років: Париж, Женева, Ліга Націй, меморандуми й делегації; 1 листопада 1918 — травень 1919 воєнна поразка перетворила державність на правовий аргумент про визнання.'
  section: 'Діяльність: УНРада, Акт Злуки й диктатура ЗУНР'
  words: 1300
- points:
  - '[!anti-hagiography] Надзвичайні повноваження 1919 року постали з військового краху й централізації влади після Чортківської офензиви та відступу УГА — це залишає відкритим питання про межу між воєнною надзвичайністю та авторитарним дрейфом.'
  - 'Конфлікт із Петлюрою не зводиться до особистого суперництва: Петрушевич читав готовність Директорії проміняти претензії на Галичину на польський союз проти більшовицької Росії як зраду галицьких інтересів — обидва аргументи можна реконструювати без карикатури.'
  - '[!epistemic-humility] Пізніші контакти чи тактичні надії Петрушевича щодо Радянської України у 1920-х подаємо як розпач еміграції та антипольську стратегію, а не як перехід до більшовизму.'
  - 'Березень 1923 року: рішення Ради амбасадорів Антанти про польський суверенітет над Східною Галичиною закрило практичне міжнародне вікно для еміграційного уряду; далі — берлінське вигнання й смерть 29 серпня 1940 року.'
  section: 'Тінь: Надзвичайна влада і поразка дипломатії'
  words: 900
- points:
  - 'Повернення до розминки: чи може збереження правового титулу втраченої держави після воєнної поразки стати політично контрпродуктивним — і чи це знецінює саму спробу?'
  - 'Петрушевич як коректив до суто святкових наративів соборності: публічний Акт Злуки важив, але практична інституційна єдність залишалася крихкою.'
  - '[!decolonization] Тривкий імперсько-радянський хід — списати ЗУНР як «сепаратизм» чи «буржуазний націоналізм»; деколонізаційне читання повертає ЗУНР статус держави з правом, армією та дипломатією.'
  - 'Пам''ять: перепоховання Петрушевича у Львові 2002 року — це сучасна пам''яттєва дія, а не джерело для подій 1918–1919 років; тримаємо історичну складність і меморіальний жест окремо.'
  section: 'Дискусія та підсумок: Спадщина втраченої держави'
  words: 700
focus: Yevhen Petrushevych (1863-1940) as the parliamentary lawyer who became president of the Ukrainian National Rada and wartime 'dictator' of ZUNR, taught so that the extraordinary June 1919 office is read as a constitutional emergency role rather than a modern totalitarian label; the ZUNR state project, the Act of Zluky, the conflict with Petliura over the Warsaw alliance and Galicia, the League of Nations diplomacy, the March 1923 Council of Ambassadors defeat, and the Soviet erasure of Western Ukrainian statehood, held together as agency and defeat rather than a clean icon.
