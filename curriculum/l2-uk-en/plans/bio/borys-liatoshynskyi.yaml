content_outline:
- points:
  - 'Парадокс: Як батько українського музичного модернізму, звинувачений у «формалізмі», не лише вижив у сталінські часи,
    а й став одним із найвпливовіших композиторів СРСР? Чи була це геніальна адаптація, чи трагічний компроміс?'
  - '[!biography] Борис Лятошинський (1895-1968) — найвидатніший український симфоніст XX століття, чия музика стала полем
    битви між авангардом і диктатурою.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Модерніст чи адаптований соцреаліст? Радянська критика таврувала його як «формаліста», західна — іноді дорікала
    за поступки режиму. Де правда?'
  - 'Дебат 2: Зрадник ідеалів чи рятівник культури? Чи були його вимушені «патріотичні» твори та редакції власних симфоній
    ціною, яку він заплатив, щоб зберегти українську композиторську школу?'
  - '[!epistemic-humility] Оцінки творчості Лятошинського коливаються від «генія, що зламався» до «мудреця, що переграв систему».
    Однозначної відповіді не існує.'
  - '[!decolonization] Розгляд Третьої симфонії як акту культурного спротиву — її заборона та подальша переробка як приклад
    колоніальної політики СРСР у мистецтві.'
  section: 'Конфліктна карта: Митець і система'
  words: 900
- points:
  - 'Соціальний та історичний контекст: музичний світ Києва на зламі імперій, вплив Скрябіна, знайомство з європейським модернізмом
    (Шенберг, Берг).'
  - Освіта в Київській консерваторії у Рейнгольда Глієра — класична основа, на якій виріс експериментатор.
  - 'Формативні впливи: український мелос, європейський експресіонізм та захоплення творчістю Ріхарда Вагнера.'
  - 'Перші твори: Квартети, Перша симфонія — маніфестація зрілого, унікального стилю ще до 30 років.'
  section: 'Формування: Від Житомира до європейського авангарду'
  words: 1000
- points:
  - Опера «Золотий обруч» (1929) — вершина українського модернізму, звинувачена у «вагнеріанстві» та «західництві».
  - Третя симфонія (1951-1954) — трагічний епос про війну, заборонений за «песимізм». Фінал, де «мир перемагає війну», був
    дописаний під тиском, але музика говорить сама за себе.
  - П'ята симфонія «Слов'янська» (1961) — приклад пізнього стилю, де композитор знаходить баланс між особистим висловлюванням
    та офіційними рамками.
  - 'Педагогічна діяльність: Лятошинський як засновник композиторської школи. Його учні — Сильвестров, Грабовський, Станкович
    — стали обличчям українського авангарду наступного покоління.'
  section: 'Діяльність: Створення української симфонії'
  words: 1300
- points:
  - '[!anti-hagiography] Лятошинський не був дисидентом у прямому сенсі. Він писав кантати до ювілеїв, отримував сталінські
    премії та йшов на болісні компроміси, переписуючи власні твори.'
  - 'Аналіз вимушених змін у Третій симфонії: порівняння авторської та «виправленої» версій як свідчення тиску системи.'
  - 'Критика «формалізму» 1948 року: як персональне звинувачення ледь не знищило кар''єру композитора і змусило його до публічного
    «каяття».'
  - '[!myth-buster] Міф про «чисте мистецтво» vs реальність виживання. Тінь Лятошинського — це не темні риси характеру, а
    тінь тоталітарної держави, що падала на кожного митця.'
  section: 'Тінь: Компроміси та «формалізм»'
  words: 900
- points:
  - 'Повернення до розминки: тож хто він, Лятошинський — пристосуванець чи далекоглядний стратег? Студент формулює відповідь,
    спираючись на факти з модуля.'
  - '[!decolonization] Спадщина Лятошинського сьогодні — це повернення його музики в оригінальних авторських версіях, очищених
    від радянської цензури.'
  - 'Вплив на українську музику: чому його називають «батьком» української симфонії та як його школа визначила розвиток музики
    на десятиліття вперед.'
  - 'Сучасне значення: як музика Лятошинського, що говорить про трагедію війни та опір злу, резонує із сьогоденням України?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Борис Лятошинський: творчість між європейським модернізмом та соцреалізмом, роль у заснуванні української композиторської
  школи, дилема митця в тоталітарній державі.'
