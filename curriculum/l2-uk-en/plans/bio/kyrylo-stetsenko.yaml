objectives:
- Пояснювати, як ролі композитора, диригента, учителя, критика, видавця та священника зіткнулися в короткому житті Стеценка, будуючи українські інституції
- 'Розрізняти механізм тиску: імперське вигнання 1907 року й раннєрадянський розлад хорових структур проти вигаданої страти'
- Позначати розбіжності підрахунків творів і причину смерті (повідомлюваний тиф) як джерелозалежні, а не згладжені
- Утримувати автокефальний церковно-музичний контекст із межами джерел, не розсуджуючи пізніші канонічні суперечки
