content_outline:
- points:
  - 'Провокація: як в одному короткому житті вмістилися священник, театральний капельмейстер, редактор народної пісні й автор дитячих опер?'
  - '[!biography] Знайомство з композитором, диригентом, педагогом, критиком, видавцем і священником: народжений 1882 року в Квітках (нині Черкащина), помер 1922 року у Веприку (повідомлюваний тиф); син іконописця, формація в колі Лисенка.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (одна роль): популярна пам''ять обирає або «церковного композитора», або «супутника» історії «Щедрика» й Леонтовича.'
  - 'Позиція 2 (деколонізаційна): усі ролі зіткнулися — композитор, хормейстер, учитель, критик, видавець-організатор, священник і музичний діяч УАПЦ; його освітня, сакральна, видавнича, театральна й капельна праця має самостійну цінність.'
  - '[!decolonization] Російсько-церковні імперські наративи трактують українську автокефалію як нелегітимний «сепаратизм»; подаємо перевірні факти й не розсуджуємо пізніші канонічні суперечки.'
  - '[!epistemic-humility] Підрахунки творів розходяться (хори — близько 90 чи понад 100; солоспіви — близько 40-50; літургії — дві чи три) — беремо джерелозалежні числа, а не згладжене одне.'
  section: 'Конфліктна карта: Священник, композитор чи будівничий інституцій?'
  words: 900
- points:
  - 'Родина й спів: син Григорія Стеценка, іконописця-народного маляра; рання поміченість у хорі Михайлівського Золотоверхого монастиря; 1899 року долучився до хору Миколи Лисенка.'
  - 'Освіта: Київська духовна семінарія (1903), музична школа Російського музичного товариства (1904), Музично-драматична школа Миколи Лисенка (1904-1907).'
  - 'Композиція: уроки в Григорія Любомирського; лінія Лисенкової національної школи як основа його стилю.'
  - Формація поєднала народну пісню, церковний спів, професійну композицію й музичну педагогіку.
  section: 'Формування: Лисенкова школа й церковно-музична основа'
  words: 1000
- points:
  - 'Школа й репертуар: збірник «Луна» (1906) з обробками Лисенка, Леонтовича, Кошиця й Стеценка; музика до «Сватання на Гончарівці» (1909); дитячі опери «Лисичка, Котик і Півник» та «Івасик-Телесик» (1911); «Шкільний співаник» (1917-1918).'
  - 'Театр і революційна доба: музика до «Гайдамаків» за Шевченком (1919) — пряме перехрестя з постановкою Леся Курбаса.'
  - 'Капели: Перша й Друга мандрівні хорові капели Дніпросоюзу (1920), Друга з Павлом Тичиною як другим диригентом; організація Української республіканської капели з Олександром Кошицем.'
  - 'Українська церковна музика: участь у соборі й церковно-музичній праці УАПЦ (1921); солоспіви, кантати та сакральні цикли (літургії, «Всенічна», «Панахида») — сакральний корпус довго лишався розпорошеним аж до пізніших видань.'
  section: 'Діяльність: Школа, капела й українська церковна музика'
  words: 1300
- points:
  - '[!anti-hagiography] Він не лише церковний композитор і не лише націоналіст-мученик: 1907 року його вислали з Києва за участь у революційній діяльності; використання української народної пісні в школі вело до переслідувань за «націоналізм», обшуків і призначення до церковно-вчительської школи на Донбасі (за IEU — арешт/заслання 1907-1910 років).'
  - 'Раннєрадянський тиск: під більшовицькою консолідацією хорові структури, які він розбудовував, розладнувалися, і він відступив до парафіяльної праці у Веприку, продовжуючи організовувати хори та церковну музику.'
  - '[!epistemic-humility] «Помер від тифу, доглядаючи хворих» — це широко повторювана традиція, а не медичний запис; пишемо «повідомлюваний тиф»; особистої радянської кримінальної справи чи наказу про страту не знайдено.'
  - Джерела називають працю в музичних структурах УНР, всеукраїнських музичних комітетах і ранньорадянських культурних контекстах — доба була адміністративно нестабільна; кожну посаду датуємо й позначаємо джерелом.
  section: 'Тінь: Вигнання, тиф і межі мучеництва'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює, як освіта, сакральна музика, видавництво, театр і капельна праця зіткнулися, а не склали рівний кар''єрний щабель.'
  - 'Грамотність щодо ярликів: розрізняємо міністерство освіти УНР, всеукраїнські музичні комітети й ранньорадянський Дніпросоюз замість однієї безперервної «міністерської» кар''єри.'
  - '[!decolonization] Церковна музика УАПЦ — це українськомовна культурна праця, а не аргумент для пізніших деномінаційних полемік.'
  - 'Порівняння: з Миколою Леонтовичем — колега-диригент Дніпросоюзу; з Миколою Лисенком — учитель і модель; Стеценко не примітка до «Щедрика».'
  section: 'Дискусія та підсумок: Ролі, що зіткнулися'
  words: 700
focus: Kyrylo Stetsenko (1882-1922) taught as a Ukrainian composer, conductor, teacher, critic, publisher, and priest whose colliding roles built Ukrainian-language musical, educational, and ecclesiastical institutions under imperial and early-Soviet pressure; the mechanism is repeated pressure on institution-building (the 1907 expulsion from Kyiv, disruption of choral structures) and a short life cut off by a reported typhus death rather than an invented execution; source-count discrepancies stay source-qualified, the UAOC context is stated with limits, and he is kept independent of the Leontovych and Shchedryk story.
level: BIO
