objectives:
- Аналізувати портрети, обкладинки, графіку і кераміку Жука як взаємопов’язані форми культурної пам’яті.
- Пояснювати роль Жука в Українській академії мистецтв, чернігівському літературному колі та одеській педагогіці.
- Точно називати арешт ДПУ 1931 року без додавання непідтвердженої НКВД або КГБ рамки.
- Оцінювати, як радянський естетичний тиск і пізніша музейно-бібліотечна робота змінюють видимість митця.
