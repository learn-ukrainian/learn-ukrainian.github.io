content_outline:
- points:
  - >-
    [!biography] Михайло Жук: художник, графік, педагог, письменник, кераміст
    і один із засновників Української академії мистецтв.
  - >-
    Провокаційне питання: що стається з культурною пам’яттю, коли портрети
    письменників, обкладинки дитячих книжок і керамічні майстерні належать
    одному життю, але канон довго бачить лише уламки?
  section: Розминка
  words: 400
- points:
  - >-
    Каховка, Київська рисувальна школа, московська школа і Краківська академія:
    Жук здобуває професійну техніку в різних центрах, але не втрачає
    української культурної орієнтації.
  - >-
    Чернігівський період 1905-1916 років: викладання, коло Коцюбинських,
    Лисенка, Вороного, Тичини і ранні літературні публікації.
  - >-
    [!epistemic-humility] Рік народження 1882 або 1883 і дата смерті 7 або
    8 червня 1964 року мають джерельні розбіжності; модуль називає
    невизначеність замість удаваної точності.
  section: 'Формування: Каховка, школи і чернігівські мережі'
  words: 1000
- points:
  - >-
    Українська академія мистецтв 1917 року: Жук поруч із Нарбутом, Бойчуком,
    Мурашком, Кричевськими та іншими співзасновниками будує українську вищу
    мистецьку інституцію в час війни й революції.
  - >-
    Портретна галерея письменників і художників: Тичина, Курбас, Леся Українка,
    Лисенко, Сковорода, Зеров, Хвильовий та інші стають не тільки моделями, а
    й візуальним архівом культури.
  - >-
    Графіка і книжка: літографія, офорт, ксилографія, екслібрис, обкладинка,
    дитяча книжка і символістська декоративність навчають учнів бачити текст
    як матеріальний об’єкт.
  - >-
    Одеса після 1925 року: майстерні графіки й кераміки, викладання, пізні
    керамічні форми і довга педагогічна лінія, яка пережила зміну статусів.
  section: 'Діяльність: Портрети, книжки, Академія і кераміка'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Жук не був лише безконфліктним універсальним митцем:
    модерністська, символістська й декоративна мова стала вразливою в
    радянських естетичних умовах 1930-х років.
  - >-
    Досьє фіксує арешт Державним політичним управлінням УСРР у лютому 1931
    року, піврічне ув’язнення, звільнення і поновлення; саме цю установу і
    хронологію треба називати точно.
  - >-
    [!myth-buster] Не перетворюємо цей факт на розпливчасту НКВД або КГБ
    історію: джерела підтримують ДПУ-епізод, естетичний тиск і часткове
    витіснення з історії мистецтва.
  - >-
    Поворот до кераміки в пізні 1930-ті можна читати як виживання, професійну
    адаптацію і продовження декоративної культури, але не як доказ повної
    внутрішньої капітуляції.
  section: 'Тінь: Арешт ДПУ, естетичний тиск і часткове забуття'
  words: 1600
- points:
  - >-
    Учні порівнюють портрет і книжкову обкладинку: як лінія, орнамент, погляд
    і шрифт творять культурну пам’ять і кому ця пам’ять дає видимість.
  - >-
    Жук поєднує українську академічну інституцію, літературний модернізм,
    дитячу книжку, Одесу і керамічне ремесло; біографія руйнує вузькі
    дисциплінарні полиці.
  - >-
    Сучасне значення: повернення Жука через виставки, бібліотеки й одеські
    дослідження показує, як український модернізм відновлюється після
    тривалого часткового забуття.
  section: 'Підсумок: Портрет як архів культури'
  words: 1000
