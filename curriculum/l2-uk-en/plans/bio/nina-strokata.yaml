content_outline:
- points:
  - >-
    [!biography] Знайомство з Ніною Антонівною Строкатою-Караванською: мікробіологиня,
    імунологиня, українська правозахисниця, політв'язень і засновниця Української
    Гельсінської групи.
  - >-
    Верифіковані дати: народилася 1926-01-31 в Одесі; померла 1998-08-02 у Denton,
    Texas, USA.
  - >-
    Провокаційне питання: чому радянська держава боялася науковиці, яка захищала
    чоловіка, підписувала документи і говорила мовою прав?
  section: Розминка
  words: 400
- points:
  - >-
    Одеський медичний інститут, випуск 1947 року; робота лікаркою, викладачкою
    мікробіології та дослідницею в одеських медичних інститутах.
  - >-
    Підготовка кандидатської дисертації і фаховий шлях у мікробіології, епідеміології
    та імунології; репресія перервала наукову кар'єру, а не лише приватне життя.
  - >-
    Шлюб зі Святославом Караванським і публічний захист після його повторного
    ув'язнення 1965 року, попри інституційний тиск зректися чоловіка.
  - >-
    [!decolonization] Одеський контекст не є маргінальним: біографія Строкатої показує
    південну Україну як важливий простір українського правозахисного руху.
  section: 'Формування: Одеса, мікробіологія і відповідальність'
  words: 1000
- points:
  - >-
    Публічний комітет на захист Ніни Строкатої, створений у Львові 1971-12-21 під
    проводом Василя Стуса, як рання відкрита акція солідарності.
  - >-
    Після звільнення наприкінці 1975 року: заборона повернення в Україну,
    адміністративний нагляд у Тарусі, відмова від радянського громадянства.
  - >-
    Підписання Декларації та Меморандуму №1 Української Гельсінської групи
    1976-11-09; пізніша робота в закордонному представництві УГГ після еміграції
    до США 1979 року.
  - >-
    Публікації про політично переслідуваних українських жінок, зокрема *Ukrainian
    Women in Soviet Union: Documental Persecution* і *A Family Torn Apart*.
  - >-
    [!anti-hagiography] Не зводити Строкату до родинного зв'язку: джерела показують
    самостійну науковицю, правозахисницю, авторку і організаторку.
  section: 'Діяльність: Захист, УГГ і голос українських жінок'
  words: 1200
- points:
  - >-
    У травні 1971 року її звільнили через активний протест проти арешту і вироку
    Караванському; пізніше вона викладала мікробіологію в Нальчику.
  - >-
    Арешт 1971-12-06 у справі Олексія Притики, Олекси Різниченка і Ніни Строкатої;
    ЕСУ подає радянську кваліфікацію як антирадянську агітацію та пропаганду.
  - >-
    Вирок 1972-05-19: чотири роки таборів суворого режиму; відбування в Барашево,
    Мордовія, участь у голодуваннях з іншими жінками-політв'язнями.
  - >-
    [!myth-buster] Не відтворювати неперевірений перелік матеріалів судової справи:
    у строгому пакеті засвідчено дату арешту, осіб, кваліфікацію, вирок і строк,
    але не повний корпус доказів.
  - >-
    [!epistemic-humility] Точний архівний номер одеської справи в досьє не знайдено;
    урок називає підтверджені дати, осіб і механізми, не додаючи вигаданих реквізитів.
  section: 'Тінь: Одеська справа, табір і заборона повернення'
  words: 1600
- points:
  - >-
    Останні вісім місяців строку вона провела в тюремній лікарні через рак; тілесна
    вразливість не скасувала її правового голосу.
  - >-
    Урок не відтворює неперевіреної судової промови: він аналізує документовані
    звинувачення, вирок, табір і наступний правозахисний вибір Строкатої.
  - >-
    Пам'ять про Строкату має поєднувати наукову біографію, захист Караванського,
    одеську справу, табір, УГГ і публікації про переслідуваних українських жінок.
  - >-
    Підсумкове питання: як змінюється карта дисидентського руху, коли в центрі
    опиняється жінка-науковиця з Одеси?
  section: 'Підсумок: Науковиця, право і пам''ять'
  words: 1000
focus: >-
  Ніна Строката як мікробіологиня, правозахисниця і засновниця Української
  Гельсінської групи. Семінар простежує одеський науковий шлях, захист Святослава
  Караванського, справу 1971-1972 років, табір і пізнішу працю для документування
  переслідування українських жінок.
level: BIO
