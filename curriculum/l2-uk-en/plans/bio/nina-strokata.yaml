objectives:
- Прослідкувати біографію Строкатої як науковця та правозахисниці з півдня України.
- Розуміти механізми репресій — звільнення, кримінальна справа, табір, заборона повернення.
- Аналізувати судову мову про права та радянську ст. 62 без прийняття обвинувачення як факту.
- Порівнювати роль Строкатої в УГГ і «інформаційному конвеєрі» з Надією Світличною.
