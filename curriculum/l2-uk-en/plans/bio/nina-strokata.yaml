content_outline:
- points:
  - >-
    [!biography] Знайомство з Ніною Строкатою-Караванською: мікробіолог, імунолог,
    правозахисниця, політв'язенька, засновниця Української Гельсінської групи.
  - >-
    Провокаційне питання: чому держава звільнила лікаря за протест проти арешту чоловіка,
    а потім засудила її за листи та самвидав?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 31 січня 1926 року в Одесі; закінчення Одеського медичного інституту (1947);
    робота лікарем, викладачкою мікробіології, підготовка кандидатської дисертації.
  - >-
    Шлюб із Святославом Караванським, колишнім політв'язнем; публічний захист чоловіка
    після його повторного ув'язнення 1965 року попри тиск установи.
  - >-
    [!decolonization] Південна Україна (Одеса, Нальчик) у правозахисному русі — не лише
    київсько-львівський «літературний» образ дисидентства.
  section: 'Формування: Одеса, наука та захист Караванського'
  words: 1000
- points:
  - >-
    Звільнення в травні 1971 року за активний протест; викладання мікробіології в Нальчику;
    Публічний комітет захисту Ніни Строкатої (Львів, 21 грудня 1971, на чолі з Василем Стусом).
  - >-
    Публікації *Ukrainian Women in Soviet Union: Documental Persecution* (Балтимор, 1980)
    та *A Family Torn Apart* (Торонто, 1981); підписання Декларації та Меморандуму № 1 УГГ
    (9 листопада 1976).
  - >-
    Закордонне представництво УГГ після еміграції до США (1979); відмова від радянського
    громадянства та адміннагляд у Тарусі.
  section: 'Діяльність: Мікробіологія, захист чоловіка та УГГ'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт 6 грудня 1971 року в справі з Олексієм Притикою та Олексою
    Різниківим; засудження 19 травня 1972 року до 4 років таборів суворого режиму за
    «антирадянську агітацію та пропаганду» (ст. 62) — мова обвинувачення.
  - >-
    Табір у Барашеві (Мордовія), голодування з іншими політв'язеньками; останні вісім
    місяців строку в табірній лікарні через рак.
  - >-
    [!epistemic-humility] Докази слідства: листи, самвидав, тексти Валентина Мороза,
    *Український вісник*, вірші Миколи Холодного; точний номер архівної справи — не знайдено.
  section: 'Тінь: Суд в Одесі, табір і голодування'
  words: 1600
- points:
  - >-
    Смерть 2 серпня 1998 року в Дентоні (Техас, США); після звільнення (1975) заборона
    повернення в Україну — подвійний вигнання: табір і географічне відчуження.
  - >-
    Судовий аргумент про неконституційність ст. 62 — зв'язок формальних прав із радянською
    кримінальною практикою.
  - >-
    [!myth-buster] Не зводити постать до однієї сімейної ролі: назвати наукову кар'єру,
    комітет захисту, УГГ і публікації про переслідування українських жінок.
  section: 'Підсумок: Право, наука та пам''ять про жінок'
  words: 1000
