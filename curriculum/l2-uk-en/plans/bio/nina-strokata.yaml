objectives:
- >-
  Пояснювати, як наукова кар'єра Строкатої в Одесі пов'язана з її правозахисною
  позицією, а не відокремлена від неї.
- >-
  Аналізувати механізми тиску: звільнення, арешт, стаття 62, табір, заборона
  повернення в Україну й адміністративний нагляд.
- >-
  Розуміти значення Публічного комітету на захист Ніни Строкатої та засновницького
  підпису в Українській Гельсінській групі.
- >-
  Оцінювати жіночу й південноукраїнську перспективу в історії дисидентського руху
  без редукції Строкатої до сімейної ролі.
