objectives:
- Критично оцінювати роль Анни Ярославни у зміцненні міжнародного авторитету Русі, відділяючи історичні факти від пізніших
  міфів
- Аналізувати та порівнювати культурний та політичний контекст Київської Русі та Франції XI століття
- Деконструювати російський імперський міф про «русскую княжну», аргументовано доводячи її українську ідентичність
- Аналізувати складні та суперечливі аспекти біографії (другий шлюб), уникаючи агіографічного зображення
