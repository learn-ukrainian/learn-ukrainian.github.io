content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: Як сталося, що в XI столітті, коли більшість європейських монархів були неписьменними, саме княжна з «варварської»
    Русі, як її бачили деякі хроністи, залишила по собі зразки підписів латиною та кирилицею?'
  - 'Провокація: Чи справді Анна привезла до Франції славнозвісне Реймське Євангеліє, на якому присягали майбутні королі,
    чи це лише гарна легенда?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1: Історична Анна vs Легендарна Анна. Що ми знаємо з джерел про її реальний вплив при дворі, а що було додумано
    романтичними істориками XIX ст. (наприклад, легенда про Реймське Євангеліє)?'
  - 'Дебат 2: Українська спадщина vs Російська апропріація. Чому російська пропаганда називає її «русская княжна Анна», ігноруючи
    її київське походження та зв''язок з династією Рюриковичів, що правили саме з Києва?'
  - '[!epistemic-humility] Аналіз листів Папи Миколая II до Анни: чи були вони стандартною дипломатичною ввічливістю, чи свідченням
    її реального політичного авторитету?'
  section: 'Конфліктна карта: Королева чи заручниця міфів?'
  words: 900
- points:
  - 'Освіта при дворі Ярослава Мудрого, «тестя Європи»: що означало бути однією з найосвіченіших принцес свого часу?'
  - 'Київ XI століття: культурний і політичний центр, що значно перевершував тогочасний Париж. Софійський собор, бібліотеки,
    школи.'
  - 'Дипломатична місія: чому французький король Генріх I шукав дружину так далеко, і що це говорить про міжнародний престиж
    династії Ярослава?'
  - 'Подорож через всю Європу: логістика та небезпеки шляху, що демонстрував масштаби тогочасного світу.'
  section: 'Формування: Київська принцеса для європейського престолу'
  words: 1000
- points:
  - 'Анна як королева-консорт: її підписи на державних документах (Anna Regina) — свідчення її статусу та участі в управлінні.'
  - 'Культурний вплив на французький двір: чи принесла вона з собою київські звичаї та традиції?'
  - 'Регентство при малолітньому синові Філіппові I: як Анна де-факто керувала Францією, і чому її регентство було успішним?'
  - 'Заснування абатства Святого Вікентія в Санлісі: акт благочестя чи політичний хід для зміцнення свого становища?'
  section: 'Діяльність: Королева, регентка, фундаторка'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Другий шлюб з графом Раулем де Крепі-і-Валуа, ворогом її покійного чоловіка. Чому цей вчинок був
    настільки скандальним, що призвів до їхнього відлучення від церкви?'
  - 'Мотивація Анни: кохання, політичний розрахунок чи спроба зберегти владу після завершення регентства? Аналіз різних версій.'
  - '[!myth-buster] Деконструкція міфу про «сумну долю» Анни. Її другий шлюб, хоч і скандальний, був її власним вибором, що
    демонструє її незалежний характер, а не покірність долі.'
  - 'Зникнення зі сторінок історії: після смерті Рауля Анна повертається до двору сина, але її вплив значно зменшується. Ціна,
    яку вона заплатила за особисте щастя.'
  section: 'Тінь: Скандальний шлюб та його наслідки'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: що сучасна наука може сказати про письменність Анни та її зв''язок з Реймським Євангелієм?'
  - '[!decolonization] Анна Ярославна як символ тяглості української державності та її глибоких історичних зв''язків з Європою,
    що прямо суперечить російським імперським наративам.'
  - 'Образ Анни в сучасній культурі: від пам''ятників до історичних романів. Як її постать використовується сьогодні для утвердження
    національної ідентичності?'
  - 'Підсумок: Анна — не просто «руська княжна», а впливова європейська правителька XI століття, що уособлює культурний міст
    між Києвом та Парижем.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Біографія Анни Ярославни: її роль як культурного мосту між Руссю та Європою, аналіз міфу про Реймське Євангеліє, її
  регентство та скандальний другий шлюб. Деконструкція російського імперського міфу про «русскую княжну».'
