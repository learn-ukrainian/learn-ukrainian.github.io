content_outline:
- points:
  - 'Провокація: коли письменник служить у війську, чи стає кожен його текст «фронтовим», чи література має право опиратися біографічному ярлику?'
  - '[!biography] Артем Чех — український письменник, сценарист і військовослужбовець, чия проза поєднує 1990-ті, пам''ять, російсько-українську війну й боротьбу за цивільне «я».'
  - '[!epistemic-humility] Це живий автор і військовий: поточний статус служби, поранення, події й публікації потрібно перевіряти джерельно й без оперативних деталей.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: служба в 2015-2016 роках і після повномасштабного вторгнення дає Чехові особливу точність у прозі про військову буденність, страх і втрату цивільної оболонки.'
  - 'Позиція 2: якщо читати автора тільки через форму «ветеран-письменник», можна звести літературу до посвідчення досвіду й не побачити стиль, гумор, пам''ять і вигадку.'
  - '[!decolonization] Центральний тиск — російська агресія проти України та пострадянська спадщина, а не нейтральний «конфлікт» чи ностальгія за 1990-ми.'
  - '[!epistemic-humility] Розділяємо документальну прозу, автофікшн, роман дорослішання, історичну пригоду, перекладну рецепцію й приватні деталі.'
  section: 'Конфліктна карта: Ветеран-письменник чи письменник у війську?'
  words: 900
- points:
  - 'Черкаси, освіта в Києві, ранні роботи поза фахом і літературний дебют «Цього ви не знайдете в Яндексі» як старт покоління, що входило в незалежну культуру через іронію й міську прозу.'
  - 'Пострадянські 1990-ті в майбутній прозі Чеха: дитинство, район, нестабільність, дорослі поруч із травмами радянсько-афганської війни.'
  - 'Письменницький шлях до війни: численні прозові й нонфікшн книжки, журналістика, сценарна робота, участь у літературних фестивалях.'
  - 'Війна 2014 року як злам біографії й письма: служба стає не декоративною темою, а досвідом, який змінює оптику, лексику й ритм прози.'
  section: 'Формування: Черкаси, 1990-ті й перший досвід письма'
  words: 1000
- points:
  - '«Точка нуль» / «Absolute Zero»: документальна й есеїстична проза про фронтову буденність без героїчного пафосу; побут, тіло, страх і мова як матеріал свідчення.'
  - '«Район "Д"»: пам''ять місця, автофікшн і Черкаси як спосіб говорити про район, покоління й пострадянське дорослішання.'
  - '«Хто ти такий?» / «Rock, Paper, Grenade»: роман про дитинство, Фелікса, радянсько-афганську травму й те, як насильство попередньої імперської війни входить у незалежну Україну.'
  - '«Пісня відкритого шляху» й «Гра в перевдягання»: розширення діапазону від історичної пригоди до нової воєнної прози про солдатське й цивільне «я».'
  section: 'Діяльність: Фронтова проза, район і пам''ять покоління'
  words: 1300
- points:
  - '[!anti-hagiography] Не перетворюємо службу, контузію або повернення до війська на героїчний плакат; це джерельно обмежені факти й складний досвід, а не прикраса біографії.'
  - 'Тексти Чеха можуть містити грубу військову, тілесну й розмовну лексику; педагогіка має маркувати чутливість, але не стерилізувати стиль.'
  - 'Поточний статус служби й нові книжки після 2025 року не прогнозуємо; жива біографія потребує оновлення перед публікацією.'
  - 'Зв''язок з Іриною Цілик важливий для «Я і Фелікс» і сценарію, але не має замінювати аналіз його власних книжок і публічного письма.'
  section: 'Тінь: Служба, травма й небезпека героїчного плаката'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює, коли біографія допомагає читати Чеха, а коли починає закривати текст.'
  - '[!decolonization] Чех показує війну й 1990-ті з української перспективи: без нейтральної мови «конфлікту», без ностальгії за імперськими уламками й без вилучення цивільного голосу.'
  - 'Порівняння: з Іриною Цілик — адаптація й кіно; з Сергієм Жаданом — регіон, війна й публічна роль; з Володимиром Вакуленком — письменник і насильство війни.'
  - 'Фінальна вправа: скласти карту жанрів Чеха й для кожного жанру вказати, яку правду він може дати, а яку не має права обіцяти.'
  section: 'Дискусія та підсумок: Як читати автора на війні'
  words: 700
focus: Артем Чех як живий український письменник, сценарист і військовослужбовець, чиї завершені прозові тексти про фронтову службу, пам'ять 1990-х, пострадянську травму та цивільно-військову ідентичність потрібно читати без героїчного спрощення, операційних деталей і зведення літератури до біографії.
