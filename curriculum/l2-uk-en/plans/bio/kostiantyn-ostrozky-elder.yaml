content_outline:
- points:
  - 'Провокація: Як найвідданіший захисник православ''я став найвищим воєначальником католицького королівства? Парадокс Костянтина
    Острозького.'
  - '[!biography] Острозький — переможець у десятках битв, але його найбільшою перемогою могла бути та, яку він здобув без
    зброї — збереження ідентичності свого народу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Острозький — представник регулярної армії та шляхетської держави vs. козацтво як нова нерегулярна сила. Чи був
    він модернізатором, чи гальмом для національного руху?'
  - 'Дебат 2: Чия перемога під Оршею? Литовський тріумф, де русини були лише солдатами, чи спільна перемога народів Східної
    Європи проти московської експансії?'
  - '[!decolonization] Радянська історіографія малювала його як «польського пана» і «зрадника». Сучасний український погляд
    бачить у ньому оборонця Русі та європейського вибору.'
  - '[!epistemic-humility] Визнання, що Острозький одночасно служив інтересам Великого князівства Литовського та захищав культурно-релігійні
    права русинів.'
  section: 'Конфліктна карта: Герой шляхти чи ворог народу?'
  words: 900
- points:
  - Походження та виховання в родині Острозьких — одного з найвпливовіших родів Русі.
  - 'Історичний контекст: Велике князівство Литовське як мультикультурна держава під постійним тиском Москви та Кримського
    ханства.'
  - 'Становище православних русинів у католицькій державі: між лояльністю до корони та вірністю вірі батьків.'
  - 'Рання військова кар''єра: перші битви з татарами як школа лідерства та тактики.'
  section: 'Формування: Син волинського князя у світі династичних війн'
  words: 1000
- points:
  - 'Битва під Оршею (1514): блискучий приклад тактичного генія Острозького, що зупинив московську навалу на десятиліття.'
  - 'Військовий реформатор: використання комбінованих тактик (артилерія, кіннота, піхота) та створення ефективної армії.'
  - 'Меценатство та захист православ''я: фундатор церков, монастирів та шкіл. Його діяльність як фундамент для культурного
    піднесення наступного покоління (Острозька академія).'
  - 'Великий гетьман Литовський: 33 перемоги, що зробили його легендою за життя та найвпливовішою фігурою в князівстві.'
  section: 'Діяльність: Перемога під Оршею та розбудова Православної Церкви'
  words: 1300
- points:
  - '[!anti-hagiography] Полон у Москві (1500-1507): чи була його втеча результатом таємної угоди? Які компроміси він мусив
    укласти?'
  - 'Боротьба з козацтвом та народними рухами: Острозький як захисник шляхетського ладу проти «свавільних» елементів. Чи діяв
    він проти інтересів власного народу?'
  - 'Моральна дилема: служба католицькому монарху, який обмежував права православних. Чи була це прагматична політика, чи
    зрада ідеалів?'
  - '[!myth-buster] Острозький не був «безгрішним лицарем». Він був жорстким і прагматичним політиком епохи, який використовував
    усі засоби для досягнення своїх цілей.'
  section: 'Тінь: Ціна влади та компроміси'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на парадокс Острозького, використовуючи знання з модуля.'
  - 'Спадщина для двох народів: як Острозького пам''ятають в Україні та Литві? Герой, символ, спільна історія.'
  - 'Династичний злет роду Острозьких: як Костянтин заклав фундамент для культурної та політичної величі свого сина Василя-Костянтина.'
  - '[!decolonization] Оцінка спадщини Острозького як символу європейської ідентичності України, що століттями протистояла
    московському експансіонізму.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Князь Костянтин Острозький: православний магнат, великий гетьман литовський, переможець під Оршею, захисник Церкви
  та суперечлива фігура української історії.'
