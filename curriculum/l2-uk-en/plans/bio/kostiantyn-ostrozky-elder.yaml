objectives:
- Аналізувати значення битви під Оршею в контексті протистояння з Москвою
- Оцінювати роль Костянтина Острозького як мецената та захисника Православної Церкви
- Критично розглядати його постать, враховуючи конфлікти зі козацтвом та компроміси з владою
- Формулювати аргументовану позицію щодо місця Острозького в українській та європейській історії
