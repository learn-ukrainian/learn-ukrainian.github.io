content_outline:
- points:
  - >-
    [!biography] Знайомство з Михайлом Омеляновичем Яловим: перший президент ВАПЛІТЕ,
    сатиричний прозаїк і літературний організатор, чий арешт став сигналом ескалації
    проти Розстріляного відродження.
  - >-
    Провокаційне питання: чому радянська влада знищила не лише тексти, а й саму
    інституцію літературної автономії?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та ранній шлях: навчання в Київському комерційному інституті, участь
    у революційній політиці, перехід до літературної організаційної діяльності.
  - >-
    Народження 5 червня 1895 року в селі Дар-Надежда (Костянтиноградський повіт,
    Полтавська губернія; нині Харківська область).
  - >-
    [!decolonization] Яловий — не «виняток» біля Хвильового, а самостійний автор
    та інституційний будівничий. Псевдонім Юліан Шпол і *Золоті лисенята* — частина
    його власного літературного обличчя.
  section: 'Формування: Від комерційного інституту до ВАПЛІТЕ'
  words: 1000
- points:
  - >-
    Ранні твори: *Треба розжувати* (1920) — публіцистичний регістр; *Верхи* (1923) —
    перехід від поезії до прози.
  - >-
    Президентство у ВАПЛІТЕ (1925): літературна організація як інституція смаку,
    видавництва, дебатів і професійної солідарності — саме це зробило Ялового
    мішенню режиму.
  - >-
    Сатирична проза: *Катіна любов* (1928) — іронія над модами та мовою епохи НЕПу;
    *Золоті лисенята* (1928/1929, під псевдонімом Юліан Шпол) — найвідоміший
    прозовий твір.
  - >-
    Механізм «організації як доказу злочину»: як NKVD/GPU перекодувало літературну
    мережу на зразок ВАПЛІТЕ у вигадану «Українську військову організацію».
  section: 'Діяльність: ВАПЛІТЕ та сатирична проза'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт 11 травня 1933 року — не «фоновий епізод», а культурно-політичний
    сигнал. Самогубство Миколи Хвильового 13 травня 1933 року відбулося через два дні
    після арешту Ялового; пам'ять часто зводить його лише до цієї трагедії — це
    недостатньо.
  - >-
    Сфабрикована справа: «Українська військова організація» — радянська поліцейська
    конструкція, а не реальна організація. Вирок 29 вересня 1933 року — 10 років таборів.
  - >-
    Друга фаза терору: ув'язнення в системі Соловків; рішення особливої трійки УНКВД
    Ленінградської області 9 жовтня 1937 року; розстріл 3 листопада 1937 року в
    Сандармоху, Карелія.
  - >-
    [!epistemic-humility] Не повторювати вторинні ярлики на кшталт «шпигун» чи «заговор
    проти Постишова» як установлену істину — лише як варіант радянського звинувачення.
  section: 'Тінь: Справа УВО та розстріл у Сандармоху'
  words: 1600
- points:
  - >-
    Доля спадщини: опублікована проза збереглася лише частково в розрізнених виданнях;
    організаторська роль часто пам'ятається краще за власні тексти — ризик перетворення
    на «виноску» до Хвильового.
  - >-
    Сучасне значення: Яловий як приклад того, що літературна асоціація в тоталітарній
    системі — сама по собі доказ «злочину» для NKVD.
  - >-
    Кінцеве питання: як відновити Ялового як автора *Золотих лисенят* і президента
    ВАПЛІТЕ, не зводячи його біографію до одного арешту?
  section: 'Підсумок: Інституція, яку знищили як змову'
  words: 1000
focus: >-
  Михайло Яловий як перший президент ВАПЛІТЕ, автор сатиричної прози (Юліан Шпол)
  та жертва сфабрикованої справи «УВО»; аналіз механізму, коли літературна організація
  стає «військовою змовою».
