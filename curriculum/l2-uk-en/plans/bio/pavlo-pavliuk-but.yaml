content_outline:
- points:
  - 'Провокація: Павлюк пережив те покарання 1635 року, від якого загинув Сулима, — і за два роки очолив власне повстання. Чому той самий примус знову й знову породжував виступ?'
  - '[!biography] Знайомство з постаттю, чия біографія показує, як після Кодака конфлікт переріс із однієї фортеці в загальну кризу реєстру й статусу.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: реєстр як порядок. Для корони й реєстрових козаків список означав платню, привілей і законне визнання служби.'
  - 'Позиція 2: реєстр як примусовий кордон. Він відділяв визнаних козаків від тих, кого виписали або ніколи не внесли, — і саме цю межу атакувало повстання.'
  - '[!decolonization] Імперський ярлик «розбою», радянське «антифеодальне» кліше й патріотичний образ «народного месника» однаково згладжують суть — боротьбу за визнання й статус.'
  - '[!epistemic-humility] Особистий запис Павлюка тонкий; багато знаємо через Грушевського та документи його супротивників — тож розрізняємо «джерело каже» й «так було насправді».'
  section: 'Конфліктна карта: Реєстр як лінія розколу'
  words: 900
- points:
  - 'Походження джерельно тонке: раннє життя невідоме, тож не відкриваємо модуль вигаданою чигиринською сценою.'
  - Ранні походи проти османських і татарських сил; на початку 1637 року він вів кілька тисяч козаків на боці кримського хана Інаєт-Ґірея проти османського ставленика.
  - '[!decolonization] Ця кримська кампанія ускладнює однобічну «антипольську» біографію: його пограничний світ включав і кримську, і османську політику.'
  - '1635 рік: участь у повстанні Сулими, захоплення разом із ним і відправлення до Варшави — але, на відміну від Сулими, він пережив шар покарання.'
  section: 'Формування: Від морського козака до вождя повстання'
  words: 1000
- points:
  - 'Обрання: у травні 1637 року на Базавлуцькій Січі Павла Бута обрали козацьким гетьманом; універсали кликали до руху за козацькі права й вольності, з антикатолицькими й антиунійними гаслами.'
  - 'Конфлікт із реєстровими: арешт старших реєстровців під Савою Кононовичем у Переяславі, поширення виступу після Черкас, здобуття Корсуня — це внутрішньокозацький конфлікт під тиском реєстру.'
  - 'Кумейки, 16 (6) грудня 1637 року: вирішальна поразка. Повстанці не дістали дієвої зовнішньої підтримки й не змогли зосередити сили; табір із возів зламали, втрати були великі.'
  - 'Боровиця: після Кумейок рештки відійшли, оточені й без підтримки капітулювали; гарантію Адама Киселя порушили, а Павлюка видали й повезли до Варшави.'
  section: 'Діяльність: Корсунь, Кумейки, Боровиця'
  words: 1300
- points:
  - '[!anti-hagiography] Повстанський бік не лише мобілізувався проти примусу, а й арештовував та страчував супротивників серед реєстрових — насильство не можна стирати.'
  - '[!myth-buster] Реєстрові старші (як Кононович) — не позачасова категорія «зрадників»: їхній вибір належав примусовому ладу реєстру, платні й служби.'
  - Порушена обіцянка Киселя — це не сентиментальна «зрада», а проблема примусової політики й джерельної суперечності; подаємо з покликанням.
  - '[!myth-buster] Точну дату й спосіб страти подаємо з атрибуцією: ЕІУ говорить про четвертування на початку 1638 року, IEU дає 19 квітня 1638 року.'
  section: 'Тінь: Насильство, зламана обіцянка і четвертування'
  words: 900
- points:
  - 'Повернення до розминки: після поразки прийшла ординація 1638 року, що обмежила виборність, суд і рух козаків — примус не зник, а посилився.'
  - Підпис Богдана Хмельницького під боровицькою декларацією як військового писаря — цінний зв'язок, але не доказ прямого «плану» від Павлюка до пізніших перемог.
  - 'Цикл тривав: за Павлюком прийшли Острянин, Гуня і Скидан 1638 року — це та сама пружина тиску, а не окремі анекдоти.'
  - '[!decolonization] Чому пам''ять спрощує Павлюка до месника чи розбійника — і що повертає джерельне читання його короткого, напруженого повстання.'
  section: 'Дискусія та підсумок: Ординація і пам''ять'
  words: 700
focus: The 1637 uprising of Pavlo Pavliuk (But), the narrow register that split Cossack society, the defeat at Kumeyky and the capitulation at Borovytsia, the violated guarantee and Warsaw execution, and the coercive 1638 ordinance that followed.
level: BIO
module: bio-029
objectives:
- Пояснювати, як вузький реєстр перетворював військову службу, статус і правове визнання на конфлікт
- Аналізувати поразку під Кумейками як воєнну подію, а не лише передмову до мучеництва
- Критично розрізняти джерельні факти, ворожі ярлики й пізнішу пам'ять про Павлюка
