content_outline:
- points:
  - 'Провокація: Як актор, що зіграв у найвідомішому українському радянському фільмі, став символом національного спротиву,
    якого система боялася і врешті знищила?'
  - 'Парадокс: "Тіні забутих предків" принесли СРСР світову славу, але його творців та зірок звинуватили в "націоналізмі".'
  - '[!biography] Знайомство з Іваном Миколайчуком — обличчям українського поетичного кіно.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Миколайчук — геніальний актор однієї ролі (Іван Палійчук) чи самобутній режисер, чий потенціал знищила система?
    Порівняння його акторських та режисерських робіт.'
  - 'Дебат 2: Інтерпретація спадщини. Радянська пропаганда намагалася представити його як "правильного українця" (лояльного
    до системи). Посмертно він став іконою дисидентського руху. Де правда?'
  - '[!epistemic-humility] Чи був його "націоналізм" свідомою політичною позицією, чи лише органічним виявом його глибокого
    зв''язку з народною культурою, який система сприймала як загрозу?'
  - '[!decolonization] Розвінчання міфу про "дружбу народів" на прикладі українського кіно, де будь-який яскравий національний
    прояв таврувався як "буржуазний націоналізм".'
  section: 'Конфліктна карта: Ікона чи жертва?'
  words: 900
- points:
  - 'Світ дитинства: село Чортория на Буковині, де народні традиції, музика та міфологія були частиною повсякденного життя.'
  - 'Родина як джерело натхнення: вплив матері, народні пісні, що сформували його музичний слух і світовідчуття.'
  - 'Освіта: Чернівецьке музичне училище та театральна студія, потім — кінофакультет у Києві. Пошук власного голосу між театром
    і кіно.'
  - 'Формативний досвід: як глибоке знання фольклору та органічна "народність" виділяли його серед інших акторів радянської
    школи.'
  section: 'Формування: Буковинське коріння'
  words: 1000
- points:
  - 'Прорив: роль Івана Палійчука в "Тінях забутих предків" (1965). Співпраця з Параджановим та Іллєнком, що змінила світовий
    кінематограф.'
  - 'Міжнародний тріумф і його ціна: фільм отримує десятки нагород, але стає "чорною міткою" для його творців.'
  - 'Акторський діапазон: від ролей у "Сні", "Гадюці", "Білому птасі з чорною ознакою" до комедійних образів, що демонструють
    його універсальність.'
  - 'Режисерський дебют: "Вавилон XX" (1979) — філософська притча, квінтесенція стилю поетичного кіно, де він був сценаристом,
    режисером, композитором і актором.'
  section: 'Діяльність: Від "Тіней" до "Вавилона XX"'
  words: 1300
- points:
  - '[!anti-hagiography] "Золотий хлопчик" українського кіно зіткнувся із заздрістю та нерозумінням колег, які вважали його
    успіх випадковим.'
  - 'Ідеологічний тиск: після арешту Параджанова та хвилі репресій 1972 року Миколайчук потрапляє під негласну заборону на
    професію за "націоналізм".'
  - '[!myth-buster] Це була не офіційна заборона, а "задушення": йому не давали головних ролей, сценарії роками лежали без
    руху, знімальна група "Вавилона XX" була під постійним наглядом КДБ.'
  - 'Особиста трагедія: незіграні ролі (зокрема, мрія про роль Тараса Бульби), незняті фільми. Десятиліття творчого простою,
    що підірвало його здоров''я.'
  section: 'Тінь: Задушення таланту'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь на питання, як слава і трагедія поєдналися в долі Миколайчука.'
  - 'Митець і система: чи можливий "чистий" митець в тоталітарній державі? Історія Миколайчука як приклад неминучого конфлікту.'
  - '[!decolonization] Феномен Миколайчука — це утвердження української ідентичності всупереч колоніальній політиці асиміляції
    та створення образу "радянської людини".'
  - 'Його спадщина сьогодні: Миколайчук як архетип українського митця — талановитого, вкоріненого в землю, але знищеного імперією.
    Його передчасна смерть у 46 років стала символом втрачених можливостей цілого покоління.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Ivan Mykolaichuk as a cultural icon and complex figure: the paradox of being a Soviet-era star and a national symbol,
  his key works ("Shadows of Forgotten Ancestors", "Babylon XX"), the tragedy of his talent suppressed by censorship, and
  the conflicting interpretations of his legacy.'
