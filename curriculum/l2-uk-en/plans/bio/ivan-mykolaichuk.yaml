content_outline:
- points:
  - 'Провокація: Як актор, сценарист і режисер став символом українського кіно, якщо культурна адміністрація роками обмежувала його професійну працю?'
  - 'Парадокс: міжнародне визнання «Тіней забутих предків» не захистило українське поетичне кіно від пізнішого ідеологічного тиску.'
  - '[!biography] Знайомство з Іваном Миколайчуком — обличчям українського поетичного кіно.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Миколайчук — передусім актор чи багатофункціональний автор? Порівняння підтверджених акторських, сценарних, музичних і режисерських робіт.'
  - 'Дебат 2: Чим відрізняється документоване професійне витіснення від пізнішої канонічної легенди про «знищеного генія»?'
  - '[!epistemic-humility] Джерельний пакет не встановлює політичної самоідентифікації Миколайчука й не дозволяє приписувати йому роль дисидента.'
  - '[!decolonization] Аналіз радянської фольклоризації: український матеріал міг подаватися як безпечна етнографія, тоді як модерна авторська кіномова зазнавала контролю.'
  section: 'Конфліктна карта: Ікона чи жертва?'
  words: 900
- points:
  - 'Світ дитинства: село Чортория на Буковині, де народні традиції, музика та міфологія були частиною повсякденного життя.'
  - 'Родина як джерело натхнення: вплив матері, народні пісні, що сформували його музичний слух і світовідчуття.'
  - 'Освіта: Чернівецьке музичне училище та театральна студія, потім — кінофакультет у Києві. Пошук власного голосу між театром і кіно.'
  - 'Формативний досвід: як глибоке знання фольклору та органічна "народність" виділяли його серед інших акторів радянської школи.'
  section: 'Формування: Буковинське коріння'
  words: 1000
- points:
  - 'Прорив: роль Івана Палійчука в "Тінях забутих предків" (1965). Співпраця з Параджановим та Іллєнком, що змінила світовий кінематограф.'
  - 'Міжнародний тріумф і його ціна: фільм отримує десятки нагород, але стає "чорною міткою" для його творців.'
  - 'Акторський діапазон: від ролей у "Сні", "Гадюці", "Білому птасі з чорною ознакою" до комедійних образів, що демонструють його універсальність.'
  - 'Режисерський дебют: "Вавилон XX" (1979) — філософська притча, квінтесенція стилю поетичного кіно, де він був сценаристом, режисером, композитором і актором.'
  section: 'Діяльність: Від "Тіней" до "Вавилона XX"'
  words: 1300
- points:
  - '[!anti-hagiography] "Золотий хлопчик" українського кіно зіткнувся із заздрістю та нерозумінням колег, які вважали його успіх випадковим.'
  - 'Ідеологічний тиск: енциклопедична біографія фіксує період, коли Миколайчука не затверджували на ролі й не давали реалізувати частину режисерських задумів.'
  - '[!myth-buster] Це не доводить існування одного формального наказу: «заборона на професію» описує сукупність відмов, зупинених проєктів та обмеженого прокату.'
  - 'Особиста трагедія: незіграні ролі (зокрема, мрія про роль Тараса Бульби), незняті фільми. Десятиліття творчого простою, що підірвало його здоров''я.'
  section: 'Тінь: Задушення таланту'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь на питання, як слава і трагедія поєдналися в долі Миколайчука.'
  - 'Митець і система: чи можливий "чистий" митець в тоталітарній державі? Історія Миколайчука як приклад неминучого конфлікту.'
  - '[!decolonization] Феномен Миколайчука — це утвердження української ідентичності всупереч колоніальній політиці асиміляції та створення образу "радянської людини".'
  - 'Його спадщина сьогодні: Миколайчук як багатофункціональний митець, чию кар''єру обмежувала радянська культурна адміністрація; пакет не виводить із цього медичної причини смерті.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Ivan Mykolaichuk as a cultural icon and complex figure: the paradox of being a Soviet-era star and a national symbol, his key works ("Shadows of Forgotten Ancestors", "Babylon XX"), the tragedy of his talent suppressed by censorship, and the conflicting interpretations of his legacy.'
