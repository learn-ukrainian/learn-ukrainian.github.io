content_outline:
- points:
  - >-
    Провокація: Як дитина, депортована з Галичини до Сибіру в 1947 році,
    стала одним із найвпливовіших українських композиторів, чия «Мелодія»
    знає вся країна, а оперу на вірші Франка поставили в незалежній Україні?
  - >-
    [!biography] Мирослав Михайлович Скорик (1938-2020) — український
    композитор, педагог, диригент і музикознавець, чия творчість поєднує
    галицьку/львівську школу, гуцульський неофольклоризм, кіномузику та
    модерне концертне мистецтво.
  section: Розминка
  words: 400
- points:
  - >-
    Дебат 1: «Офіційний радянський композитор» vs «будівничий української
    музичної ідентичності». Скорик обіймав офіційні посади, отримував
    радянські та українські нагороди. Чи це компроміс із системою, чи
    стратегія збереження та передачі національної музичної традиції?
  - >-
    Дебат 2: Чи можна звести Скорика до «Мелодії» та «Тіней забутих
    предків»? Або ж за цими іконічними творами стоїть масштабніша
    композиторська та педагогічна робота: концерти, каприси, опера «Мойсей»,
    кантата «Гамалія», десятиліття викладання?
  - >-
    [!decolonization] Скорика не слід зводити до «радянського композитора»
    або трактувати московське навчання у Кабалевського як головний фактор
    його формування. Галицьке коріння, Львівська консерваторія, навчання
    у Людкевича та Сольтиса — ось основа його музичної ідентичності.
  - >-
    [!epistemic-humility] Скорик не був ані дисидентом, ані просто
    «офіційним» композитором. Складність його позиції — в тому, як
    українська музична ідіома працювала всередині та поза радянськими
    інституціями.
  section: 'Конфліктна карта: Між Галичиною та офіційною культурою'
  words: 900
- points:
  - >-
    Родинне середовище: галицька українська інтелігенція; Соломія
    Крушельницька як родичка — перша, хто розпізнав його музичний дар.
  - >-
    Дитяча травма: 1947 рік — родину Скориків репресовано за політичними
    мотивами та заслано до Сибіру. Повернення до Львова лише у 1955 році
    після смерті Сталіна.
  - >-
    Львівська консерваторія (1955-1960): навчання в Адама Сольтиса,
    Станіслава Людкевича та Романа Симовича — галицька основа, на якій
    виріс модерний композитор.
  - >-
    Аспірантура в Московській консерваторії у Дмитра Кабалевського —
    академічне шліфування, яке не витіснило українську музичну ідентичність.
  section: 'Формування: Від Львова через Сибір до консерваторії'
  words: 1000
- points:
  - >-
    «Гуцульський триптих» (1965) та музика до фільму Параджанова «Тіні
    забутих предків» — зустріч гуцульського звукосвіту, літературного
    джерела Коцюбинського та візуального мистецтва кінорежисера.
  - >-
    «Мелодія» з фільму «Високий перевал» — один із найвпізнаваніших творів
    української культурної пам'яті. Мелодія несе пам'ять за межі того,
    що могло сказати радянське кіно.
  - >-
    «Мойсей» (2001) на текст Івана Франка та кантата «Гамалія» (2003)
    на слова Тараса Шевченка — мости між сучасною музикою та класичною
    українською літературою.
  - >-
    Педагогічна діяльність: Львівська та Київська консерваторії,
    Національна музична академія. Учні — Іван Карабиць і Євген Станкович
    — стали обличчям наступного покоління української музики.
  section: 'Діяльність: Від гуцульського звуку до національної опери'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Скорик не був підпільним борцем. Він обіймав
    офіційні посади, працював у радянських і пострадянських інституціях,
    отримував державні нагороди. Ці факти — частина біографії, а не
    підстава для моральної дискваліфікації.
  - >-
    Дитяче заслання як переривання, а не як сюжет усього життя: родинна
    репресія 1947 року — контекст, але не головний наратив. Скорик
    повернувся, здобув освіту, створив школу і став публічною фігурою.
  - >-
    Ризик абсорбції: спроби трактувати Скорика як переважно «радянського»
    або вторинного щодо московського навчання — колоніальна рамка, що
    стирає львівську/галицьку та київську українську інституційну історію.
  - >-
    [!myth-buster] Скорик — це не лише «Мелодія». Звуження до одного
    хіта заслоняє масштаб: концерти, каприси, опери, педагогіку та
    інституційне будівництво.
  section: 'Тінь: Офіційна кар''єра та ризик спрощення'
  words: 900
- points:
  - >-
    Повернення до розминки: студент тепер може аргументовано пояснити,
    як депортована дитина з Галичини стала центральною постаттю
    української музики, не зводячи це ні до тріумфу, ні до жертви.
  - >-
    [!decolonization] Спадщина Скорика сьогодні — це повернення
    авторських версій його музики, вільних від радянського контексту,
    та продовження його педагогічної лінії через учнів.
  - >-
    Вплив на українську музику: чому його називають містком між
    Людкевичем і сучасним українським авангардом.
  - >-
    Сучасне значення: «Мелодія» як акустичний символ культурної пам'яті
    та національної ідентичності України.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: >-
  Мирослав Скорик як ключова постать української модерної музики: гуцульський
  неофольклоризм, кіномузика до «Тіней забутих предків», «Мелодія» як
  символ культурної пам'яті, опера «Мойсей» на текст Франка, педагогічна
  лінія Людкевич — Скорик — Карабиць — Станкович.
level: BIO
