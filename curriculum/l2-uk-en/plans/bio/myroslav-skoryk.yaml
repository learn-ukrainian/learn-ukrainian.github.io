objectives:
- >-
  Аналізувати життя та спадщину Мирослава Скорика як центральної постаті
  української модерної концертної музики XX-XXI ст.
- >-
  Оцінювати його внесок у формування галицько-київської композиторської
  школи та педагогічну лінію передачі від Людкевича до Станковича й Карабиця.
- >-
  Простежувати зв'язок між гуцульським неофольклоризмом, кіномузикою та
  публічною культурною пам'яттю на прикладі «Тіней забутих предків» і «Мелодії».
- >-
  Критично аналізувати дилему офіційної кар'єри та української музичної
  ідентичності в радянських і пострадянських інституціях.
