content_outline:
- points:
  - 'Парадокс: Як одна людина могла очолювати церкву при семи режимах — від Австро-Угорщини до СРСР — і залишитися моральним
    авторитетом?'
  - 'Провокаційне питання: Чи міг рятівник тисяч євреїв вітати прихід німецької армії? Вступ до центрального конфлікту біографії.'
  - '[!biography] Митрополит Андрей Шептицький — постать, що не вписується у чорно-білі рамки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Прижиттєвий): Ставлення до нацистської Німеччини. Лист-привітання Вермахту (1941) vs. пастирський лист "Не вбий"
    (1942). Надія на визволення від СРСР vs. швидке розчарування.'
  - 'Дебат 2 (Посмертний): Боротьба за спадщину. Радянська пропаганда ("фашистський поплічник") vs. українська агіографія
    ("безгрішний святий") vs. ізраїльська дилема (чому Яд Вашем так довго не визнавав його Праведником?).'
  - '[!epistemic-humility] Визнання, що обидві сторони дебату мають аргументи. Немає простої відповіді, лише складні історичні
    контексти.'
  - '[!decolonization] Розвінчання радянських і російських наративів, створених для дискредитації УГКЦ та українського національного
    руху.'
  section: 'Конфліктна карта: Святий, колаборант чи прагматик?'
  words: 900
- points:
  - Походження: польсько-австрійський аристократичний рід Шептицьких, що сягає XVII ст.
  - 'Особистий вибір: відмова від кар''єри в австрійській армії, перехід з римо-католицизму у греко-католицизм, що було шоком
    для родини.'
  - 'Освіта та постриг: навчання в європейських університетах, вступ до монастиря, швидке кар''єрне зростання і обрання митрополитом
    у 35 років (1901).'
  - Формативні впливи: західне богослов'я, український національний рух в Галичині, ідея екуменізму.
  section: 'Формування: Від графа Романа до брата Андрея'
  words: 1000
- points:
  - 'Розбудова УГКЦ: перетворення церкви на потужну національну інституцію з розгалуженою системою освіти, соціального служіння,
    кооперативів.'
  - 'Культурний меценат: заснування Національного музею у Львові (1905), збереження тисяч українських ікон та артефактів.'
  - 'Освітній центр: заснування Львівської богословської академії (1928) — предтечі Українського Католицького Університету.'
  - 'Первинні джерела: аналіз фрагментів з пастирських листів Шептицького про освіту, культуру, національну ідентичність.'
  section: 'Діяльність: Будівничий українського Сіону'
  words: 1300
- points:
  - '[!anti-hagiography] Аналіз найскладніших рішень. Чому початкове привітання німецької армії було помилкою, навіть якщо
    її можна пояснити жахами першої радянської окупації.'
  - 'Конфлікт з ОУН: Шептицький публічно засуджував політичний тероризм та екстремізм у листі "Не вбий", що викликало гнів
    частини націоналістів.'
  - 'Критика з боку єврейських дослідників: чи не був митрополит занадто обережним у публічних протестах проти Голокосту,
    навіть таємно рятуючи сотні людей?'
  - '[!myth-buster] Міф про "благословення дивізії СС Галичина". Шептицький не благословляв дивізію, а надав своїх капеланів,
    щоб зберегти пастирський вплив на молодь та уникнути її повної нацифікації.'
  section: 'Тінь: Ціна компромісу'
  words: 900
- points:
  - Повернення до розминки: маючи повну картину, студент формулює відповідь — як Шептицькому вдалося пройти через бурі XX
      століття.
  - 'Спадщина 1 (Духовна): Беатифікація (2015) та роль у сучасному житті УГКЦ. Шептицький як символ морального лідерства.'
  - 'Спадщина 2 (Національна): Його інституції (Національний музей, УКУ) існують досі. Його модель "будівництва нації" актуальна.'
  - '[!decolonization] Шептицький як антитеза "русскому миру" — приклад європейського, гуманістичного, національного і водночас
    вселенського християнства.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
