- Оцінювати роль Шептицького як будівничого національних інституцій (УГКЦ, Національний музей, ЛБА).
- Пояснювати складні моральні та політичні рішення митрополита в контексті екстремальних умов XX століття.
- Формулювати власну аргументовану позицію щодо історичних дебатів навколо постаті Шептицького.
