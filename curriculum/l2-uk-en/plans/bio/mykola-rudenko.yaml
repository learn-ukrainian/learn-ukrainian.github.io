content_outline:
- points:
  - >-
    [!biography] Знайомство з Руденком Миколою Даниловичем: поет, філософ економії, учасник Другої
    світової війни, організатор і перший голова Української Громадської групи
    сприяння виконанню Гельсінкських угод (9 листопада 1976).
  - >-
    Провокаційне питання: як людина, що колись писала вірші вождю, стала символом прав людини
    в Україні?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 19 грудня 1920 року в селі Юр’ївка (Луганщина); батько-шахтар
    загинув у шахті 1927 року; дитинство — розкуркулення, колективізація,
    Голодомор.
  - >-
    Філологічний факультет Київського університету (1939, мобілізація через два місяці); поранення
    біля Ленінграда 4 жовтня 1941, блокада.
  - >-
    [!decolonization] Власне визнання: «Довго я залишався дуже партійним… був вірним сталінцем» —
    документований розрив після ХХ з’їзду КПРС, не спрощення до «народився дисидентом».
  section: 'Формування: Від сталінця до філолога'
  words: 1000
- points:
  - >-
    *Економічні монологи* з’явилися в самвидаві 1975 року; *Енерґія проґресу*
    викладає фізичну економію, а перевірене книжкове видання датоване 1998 роком.
  - >-
    Поема *Хрест* (1976) осмислює Голодомор; роман *Орлова балка*, датований
    джерелом 1970-ми роками, відзначено Шевченківською премією 1993 року.
  - >-
    Оголошення про створення Української Громадської групи сприяння виконанню
    Гельсінкських угод 9 листопада 1976 року; Руденко — перший голова; звання
    Героя України присвоєно 19 листопада 2000 року.
  section: 'Діяльність: Самвидав, поезія та засновник УГГ'
  words: 1200
- points:
  - >-
    Виключення з КПРС (1974) і Союзу письменників (1975); перший арешт 18 квітня 1975 (амністія
    як ветеран); повторний арешт 5 лютого 1977 у Києві.
  - >-
    Суд 23 червня — 1 липня 1977 у Дружківці (спільний процес «Руденко — Тихий»); ст. 62 КК УРСР;
    вирок: 7 років таборів суворого режиму + 5 років заслання.
  - >-
    [!anti-hagiography] Під час обшуку 23–24 грудня 1976 КДБ «знайшло» 39 підкинутих доларів США;
    наказ Головліту (1978) — зняття з обігу усіх 17 його назв.
  - >-
    Табори ЖХ-385/19 і ЖХ-385/3 (Мордовія), потім ВС-389/36 (Кучино, Пермщина); дружина Раїса
    Руденко — арешт 15 серпня 1981 року, 5 років; заслання в с. Майма на Алтаї; звільнення грудня 1987,
    конфіскована квартира в Києві.
  - >-
    [!epistemic-humility] Музейна довідка фіксує покарання за участь у страйках,
    зривання табірної нашивки й відмову від роботи; не переносити на Руденка
    епізоди, яких прийняті сторінки не містять.
  section: 'Тінь: Суд у Дружківці, табори та заслання'
  words: 1600
- points:
  - >-
    Смерть 1 квітня 2004 року в Києві; поховання на Байковому кладовищі.
  - >-
    *Найбільше диво — життя. Спогади* (1998); републікації поезії, спогадів, філософських праць після 1991.
  - >-
    [!decolonization] [!myth-buster] Руденко в інтерв’ю наголошує, що українська
    група була самостійною, а не філією московської; це авторське свідчення про
    організаційну суб’єктність, а не доказ мотивів усіх учасників руху.
  section: 'Підсумок: Реабілітація пам’яті правозахисника'
  words: 1000
focus: >-
  Микола Руденко — від «вірного сталінця» до організатора Української
  Громадської групи сприяння виконанню Гельсінкських угод. Аналіз
  самвидаву, філософської економії, судового процесу 1977 року, таборів і заслання з документальними
  деталями досьє.
level: BIO
module: bio-256
objectives:
- >-
  Прослідкувати біографічну дугу Руденка — від сталінської лояльності до правозахисництва — без
  агіографії чи демонізації.
- >-
  Розуміти механізми радянських репресій: підкинуті долари, ст. 62,
  Головліт, табори, заслання.
- Аналізувати первинні тексти — самозвіт про вірність сталінському режиму і мову вироку 1977 року — як джерела епохи.
- Оцінити роль Руденка як засновника УГГ у контексті шістдесятників і гельсінкського руху.
