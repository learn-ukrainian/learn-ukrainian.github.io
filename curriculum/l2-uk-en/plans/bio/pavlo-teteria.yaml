content_outline:
- points:
  - 'Провокація: освічений дипломат, що працював над трьома різними «мовами» врегулювання — Переяслав 1654, Гадяч 1658, Чуднів 1660, — а зрештою залишив край, забравши з собою гетьманські клейноди й державний архів. Компроміс чи колаборація?'
  - '[!biography] Знайомство з постаттю, чия біографія зшиває канцелярію, дипломатію, полкову службу й правобережну громадянську війну в один складний вузол.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Тетеря — досвідчений переговорник, що намагався зробити союз із Річчю Посполитою шляхом до реуніфікації козацької держави після поразок Руїни.'
  - 'Позиція 2: він же — примусовий правитель, чия соціальна політика (реституція шляхетського землеволодіння) спровокувала повстання, а придушення обернулося масовими стратами й спустошенням.'
  - '[!decolonization] Імперське спрощення — зробити Тетерю доказом, що «українська політика потребувала зовнішнього керування»; націоналістична стенограма — «лише колаборант». Обидва зчитування надто легкі: у нього була реальна аґентність у полі, де сусідні сили використовували визнання, посади, релігію й землю.'
  - '[!epistemic-humility] Рік народження невідомий; місце спірне (Переяслав в IEU / волинський шляхетський рід Моржковських в ЕІУ); смерть — близько 1670–1671 рр., Стамбул/Едірне. Точних дат і сцен не вигадуємо.'
  section: 'Конфліктна карта: Здібний дипломат чи колаборант?'
  words: 900
- points:
  - 'Походження й освіта: волинський шляхетський рід Моржковських (герб Радван); навчання в уніатській школі під Мінськом і в Київській колегії — звідси його правнича й дипломатична підготовка.'
  - 'Канцелярський досвід: служба у ґродському/міському суді на Волині (Луцьк або Володимир — джерельно спірно), потім військовий писар Переяславського полку від 1649 року й переяславський полковник у 1653–1658 роках.'
  - 'Дипломат: за ЕІУ, один з учасників переговорів навколо Переяславсько-московської угоди 1654 року, Гадяцького договору 1658 року та Чуднівського врегулювання 1660 року — але ратифікований текст часто звужував українські вимоги.'
  - 'Родинні зв''язки: перший шлюб із сестрою Виговського, а 1660 року — з дочкою Богдана Хмельницького; це вписує Тетерю у старшинські мережі споріднення.'
  section: 'Формування: Від волинської канцелярії до булави'
  words: 1000
- points:
  - '1662–1663: генеральний писар в уряді Юрія Хмельницького, а після його зречення — головний правобережний наступник; 1663 року обраний правобережним гетьманом на чигиринській раді й визнав владу короля Яна ІІ Казимира.'
  - 'Паволоцьке повстання (травень–червень 1663 р.): виступ проти його політики, пов''язаний із відновленням шляхетського землеволодіння та зловживаннями орендарів; повстання придушили, а провідників стратили після тортур.'
  - 'Похід на Лівобережжя (кінець 1663 — початок 1664 р.): підтримка коронного походу заради об''єднання обох берегів під своєю владою; кампанія провалилася й живила глибший правобережний спротив.'
  - 'Насильство кампанії: у Білоцерківській битві (березень 1664 р.) повстанців розбили коронні війська, загони Тетері й кримські сили; ЕІУ фіксує страту близько 1500 полонених і смертний вирок Виговському після допиту, а в Ставищанській обороні (липень–жовтень 1664 р.) — облогу, різанину й спустошення міста.'
  section: 'Діяльність: Правобережне гетьманство 1663–1665 років'
  words: 1300
- points:
  - '[!anti-hagiography] Біла Церква, Ставище, масові страти та ясир належать до біографії: це коаліція командування, репресій і громадянської війни, а не лише «зовнішні сили».'
  - '[!myth-buster] Церковно-майнове патронство (членство у львівському Успенському братстві 1667 р., монастирські надання 1669 р.) не «відмиває» біографії — але й повстання не доводить, що кожен церковний акт був цинічним. Тримаємо обидва шари.'
  - '[!epistemic-humility] IEU пов''язує Тетерю зі стратами Виговського й Богуна; точну особисту відповідальність формулюємо обережно, бо вона джерельно чутлива й потребує звірки з листуванням і судовими записами.'
  - 'Червень 1665 року: після поразки від повстанців Тетеря зрікся булави й виїхав до Варшави, забравши гетьманські клейноди й ключові документи архіву. Це державно-інституційна втрата, а не лише драматична особиста втеча.'
  section: 'Тінь: Повстання, репресії та архів'
  words: 900
- points:
  - 'Повернення до розминки: яких цілей прагнув Тетеря, які союзники робили ці цілі можливими — і якою ціною для правобережних громад обернувся його вибір?'
  - '[!epistemic-humility] Вигнання й смерть джерельно чутливі: баніція, рух через Молдавію в османські землі, за ЕІУ — отруєння в Стамбулі у квітні 1671 року, за IEU — близько 1670 року в Едірне. Сцену смерті не інсценізуємо як усталений факт.'
  - Термін «баніція» пояснюємо як правовий вирок про вигнання, а не просто «еміграцію».
  - '[!decolonization] Чому пізніша пам''ять (історичні пісні, думи, хроніки, шкільна проза, портрети) перетворює компромісних гетьманів Руїни на моральну стенограму — і що дає повернення Тетері як прикладу невдалого компромісу під неможливим тиском.'
  section: 'Дискусія та підсумок: Невдалий компроміс під час Руїни'
  words: 700
focus: Pavlo Teteria as an educated diplomat and starshyna negotiator who worked on the 1654, 1658 and 1660 settlements, became Commonwealth-aligned Right-Bank hetman (1663-1665), launched a failed campaign to reunite both banks, and met the Pavoloch and 1664-1665 Right-Bank uprisings with repression at Bila Tserkva and Stavyshche before fleeing to Warsaw with the hetman regalia and archive and dying in Ottoman exile — a case that resists both the imperial 'Ukraine needed outside management' frame and the flat 'collaborator' label.
