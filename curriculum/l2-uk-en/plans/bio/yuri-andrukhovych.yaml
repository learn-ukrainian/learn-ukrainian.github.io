content_outline:
- points:
  - 'Парадокс: Як enfant terrible української літератури, що руйнував канони, став одним із найвідоміших її представників
    у Європі?'
  - '[!biography] Коротка цитата Андруховича, що ілюструє його провокаційний стиль, без згадки автора.'
  - 'Питання до студента: Чи може руйнування бути творчим актом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Бу-Ба-Бу — це мистецький прорив чи інфантильний епатаж? Позиція захисту (постмодерна гра як єдина можлива відповідь
    на маразм пізнього СРСР) vs позиція критики (відволікання від серйозних національних тем).'
  - 'Дебат 2: Публічний інтелектуал — моральний авторитет чи вільний провокатор? Його резонансні есеї та заяви, що викликали
    суспільні дискусії та звинувачення у "недостатньому патріотизмі".'
  - '[!epistemic-humility] Розгляд легітимності обох точок зору: потреба в мистецькій свободі vs відповідальність інтелектуала
    під час історичних викликів.'
  - '[!decolonization] Як карнавальна естетика стала інструментом звільнення від імперського культурного домінування та радянської
    серйозності.'
  section: 'Конфліктна карта: Гравець чи громадянин?'
  words: 900
- points:
  - 'Галичина як простір міфів: вплив мультикультурного Івано-Франківська (Станіслава) на формування ідентичності.'
  - 'Від підліткового бунтарства до армійської служби: перші вірші та усвідомлення задушливості радянської системи.'
  - 'Львівський період: навчання та формування як "нерадянської" людини в середовищі міської богеми.'
  - Що зробило його таким, яким він є? Пошук коренів "анти-імперського" мислення в особистій біографії.
  section: 'Формування: Станіславський феномен'
  words: 1000
- points:
  - 'Феномен Бу-Ба-Бу (1985): перформанси, епатаж та карнавал як свідома стратегія демонтажу соцреалізму.'
  - 'Рання проза ("Рекреації", "Московіада", "Перверзія"): як прощалися з імперією та шукали українську ідентичність у новому
    європейському контексті.'
  - 'Первинні джерела: аналіз уривків з романів, що показують еволюцію стилю — від гротеску до екзистенційної прози.'
  - 'Європейське визнання: переклади, нагороди та роль Андруховича у представленні сучасної України світові.'
  section: 'Діяльність: Від карнавалу до канону'
  words: 1300
- points:
  - '[!anti-hagiography] Аналіз контроверсійних заяв та есеїв, що викликали гострі суспільні дебати (напр., про "дві України").'
  - 'Звинувачення в космополітизмі та недостатній "народності": чи доречна постмодерна іронія в часи національного відродження
    та війни?'
  - 'Межа між мистецькою провокацією та громадянською відповідальністю: де вона проходить для Андруховича?'
  - '[!myth-buster] Розвінчання міфу про "антиукраїнськість". Показ того, як критика "шароварщини" є формою боротьби за складнішу,
    сучаснішу українську ідентичність.'
  section: 'Тінь: Ціна епатажу'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на парадокс "руйнівника-творця".'
  - '[!decolonization] Оцінка ролі Андруховича у звільненні української літератури від постколоніальних комплексів та радянської
    спадщини.'
  - 'Вплив на наступні покоління: як Андрухович змінив уявлення про те, що означає бути українським письменником.'
  - 'Його значення сьогодні: голос України в Європі та постійне нагадування про необхідність критичного мислення.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
