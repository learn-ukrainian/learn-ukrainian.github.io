content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Тимоновичем Литвином: поет, прозаїк, журналіст,
    публіцист, член Української Гельсінської групи, політв'язень.
  - >-
    Провокаційне питання: чому система конфісковувала більшість табірних рукописів і
    все одно будувала справи на неопублікованих текстах?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 26 листопада 1934 року в селі Ксаверівка (Васильківський район, Київщина);
    родина сільських учителів; батько загинув від поранень 1944 року; переїзд з матір'ю
    до Барахт.
  - >-
    Сфабриковане засудження 1953 року після конфлікту з керівництвом колгоспу;
    наступні арешти й вироки розглядати окремо за хронологією ЕСУ, не зливаючи
    різні радянські обвинувачення в одне.
  - >-
    [!decolonization] Радянські звинувачення у «наклепі» — документ переслідування, не
    опис мотивів автора.
  section: 'Формування: Сільський учительський спадок і перші суди'
  words: 1000
- points:
  - >-
    Вступ до Української Гельсінської групи в червні 1978 року за пропозицією Оксани
    Мешко (КХПГ).
  - >-
    *Правозахисний рух в Україні, його засади і перспективи* (1979) — ЕСУ називає
    працю фундаментальною для УГГ за оцінкою Петра Григоренка; без точного видання
    дослівні формули не відтворюються.
  - >-
    Твори в табірному контексті: *Поема про проліски*, *Безумець*, *Трагічна галерея*,
    *Якщо Бога нема — все дозволено*; назви збережених і втрачених праць не
    підмінюють доступу до їхнього тексту.
  section: 'Діяльність: Поезія, есе про правозахисний рух і самвидав'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Частина написаних у в'язниці й таборах творів не збереглася
    або залишилася в режимних архівах; відомі назви не замінюють доступу до тексту.
  - >-
    23 серпня 1984 року Литвина виявили пораненим у камері Кучинського табору;
    він помер 5 вересня в лікарні міста Чусового. Перепохований у Києві
    19 листопада 1989 року.
  - >-
    [!epistemic-humility] Точні номери архівних справ і первинний локатор цитат
    у прийнятому джерельному пакеті відсутні; прогалини не заповнюють переказами.
  section: 'Тінь: Рукописи, поранення в Кучино і смерть у Чусовому'
  words: 1600
- points:
  - >-
    Розмежування правозахисної, публіцистичної та поетичної праці без приписування
    самовизначень, для яких немає первинного локатора.
  - >-
    Групування з Тихим, Марченком, Стусом у пам'яті про 1984 рік — зберегти при цьому
    авторський і теоретичний внесок.
  - >-
    [!myth-buster] Агіографічна рамка мученика не повинна стирати поезію, прозу й
    правозахисну теорію.
  section: 'Підсумок: Правозахисник, а не лише «жертва 1984»'
  words: 1000
focus: >-
  Юрій Литвин — поет, прозаїк і правозахисник, член УГГ, політв'язень, який помер у
  таборі особливого режиму 1984 року. Аналіз самвидавних текстів, конфіскації рукописів
  і способів читати правозахисну позицію без неперевірених цитат.
level: BIO
module: bio-269
objectives:
- Прослідкувати біографію Литвина — від сільського дитинства до УГГ — без прийняття радянських категорій «наклепу».
- Розуміти механізм репресій через неопубліковані рукописи та конфіскацію табірних творів.
- Аналізувати джерельний статус праці *Правозахисний рух в Україні* та відмовлятися від цитат без точного видання.
- Оцінити місце Литвина серед постатей, які загинули в неволі 1984 року, без зведення до мучеництва.
