content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Тимоновичем Литвином: поет, прозаїк, журналіст,
    публіцист, член Української Гельсінської групи, політв'язень.
  - >-
    Провокаційне питання: чому система конфісковувала більшість табірних рукописів і
    все одно будувала справи на неопублікованих текстах?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 26 листопада 1934 року в селі Ксаверівка (Васильківський район, Київщина);
    родина сільських учителів; батько загинув від поранень 1944 року; переїзд з матір'ю
    до Барахт.
  - >-
    Сфабриковане засудження 1953 року після протесту проти місцевої влади; за літературною
    енциклопедією — ще чотири ув'язнення за «наклеп на радянський лад» (радянська категорія,
    не аналітична).
  - >-
    [!decolonization] Радянські звинувачення у «наклепі» — документ переслідування, не
    опис мотивів автора.
  section: 'Формування: Сільський учительський спадок і перші суди'
  words: 1000
- points:
  - >-
    Вступ до Української Гельсінської групи в червні 1978 року за пропозицією Оксани
    Мешко (KHPG).
  - >-
    *Правозахисний рух в Україні, його засади і перспективи* (1979) — опубліковано
    за кордоном, трансльовано Радіо Свобода; «Свободолюбство, демократизм...» як теорія
    української демократичної традиції.
  - >-
    Твори в табірному контексті: *Поема про проліски*, *Безумець*, *Трагічна галерея*,
    *Якщо Бога нема — все дозволено*; *Ялинка* (1983, незавершена) — «Сонце без Ялинки
    не приносить щастя...»
  section: 'Діяльність: Поезія, есе про правозахисний рух і самвидав'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Більшість творів, написаних у в'язниці й таборах, конфісковано
    КДБ (літературна енциклопедія).
  - >-
    Смерть 5 вересня 1984 року в Кучино (Пермщина); перепоховання в Києві 19 листопада
    1989 року.
  - >-
    [!epistemic-humility] Точні номери архівних справ у джерелах не знайдено; цитати
    через Wikiquote/Radio Liberty потребують верифікації повного тексту в Phase 2.
  section: 'Тінь: Конфіскація рукописів, табір і смерть у Кучино'
  words: 1600
- points:
  - >-
    «Я не політик, я правозахисник...» — самовизначення (Wikiquote); контраст партійної
    політики й захисту прав.
  - >-
    Групування з Тихим, Марченком, Стусом у пам'яті про 1984 рік — зберегти при цьому
    авторський і теоретичний внесок.
  - >-
    [!myth-buster] Агіографічна рамка мученика не повинна стирати поезію, прозу й
    правозахисну теорію.
  section: 'Підсумок: Правозахисник, а не лише «жертва 1984»'
  words: 1000
focus: >-
  Юрій Литвин — поет, прозаїк і правозахисник, член УГГ, політв'язень, який загинув у
  таборі особливого режиму 1984 року. Аналіз самвидавних текстів, конфіскації рукописів
  і самовизначення «правозахисник, а не політик».
