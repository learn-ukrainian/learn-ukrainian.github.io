objectives:
- Прослідкувати біографію Литвина — від сільського дитинства до УГГ — без прийняття радянських категорій «наклепу».
- Розуміти механізм репресій через неопубліковані рукописи та конфіскацію табірних творів.
- Аналізувати первинні цитати з *Правозахисний рух в Україні* та самовизначення «правозахисник».
- Оцінити місце Литвина серед постатей, які загинули в неволі 1984 року, без зведення до мучеництва.
