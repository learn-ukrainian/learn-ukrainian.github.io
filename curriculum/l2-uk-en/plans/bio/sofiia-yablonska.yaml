content_outline:
- points:
  - >-
    [!biography] Софія Яблонська: галицька письменниця, фотографка,
    кінорепортерка, мандрівниця, журналістка й архітекторка, яка писала про
    світ українською мовою.
  - >-
    Провокаційне питання: коли бездержавна українка дивиться на колоніальні
    суспільства через камеру і текст, чи стає вона туристкою, свідком,
    співрозмовницею чи критикинею імперського погляду?
  section: Розминка
  words: 400
- points:
  - >-
    Германів, воєнне дитяче переміщення 1915-1921 років, повернення до Галичини
    і львівська освіта: рання біографія вже містить кордони, мови і несталість.
  - >-
    Париж 1927 року: акторські й модельні спроби, кінематографічне середовище,
    перший марокканський маршрут і перехід від мрії про сцену до камери,
    письма та подорожі.
  - >-
    [!epistemic-humility] Джерела по-різному подають дату повернення до Франції
    після азійського періоду; модуль не робить із цієї різниці сюжетної
    сенсації.
  section: 'Формування: Германів, війна, Львів і Париж'
  words: 1000
- points:
  - >-
    `Чар Марока`, `З країни рижу та опію`, `Далекі обрії`: подорожні книги як
    українська модерна проза, репортаж, маршрут і школа точного спостереження.
  - >-
    Камера як метод: фото, кіноматеріали, рукописи і листування показують, що
    Яблонська не лише "відвідувала далекі краї", а створювала архів бачення.
  - >-
    Галицька жіноча преса, листування з українською еміграцією і контакти з
    Винниченками: її подорожі вбудовані у мережі української модерної публіки.
  - >-
    Пізня Франція і острів Нуармутьє: проєктування вілл, родина, архітектурна
    праця і продовження самотворення поза вузькою роллю письменниці.
  section: 'Діяльність: Камера, тревелог і українська мова світу'
  words: 1200
- points:
  - >-
    [!decolonization] Антиколоніальне читання має спиратися на конкретні
    фрази, кадри і сцени, а не на сучасну похвалу: українська бездержавність
    може загострювати чутливість до чужої нерівності, але не автоматично
    гарантує безпомилковий погляд.
  - >-
    Радянська окупація Галичини 1939 року перервала можливість нормального
    повернення; джерела про смерть батька й сімейну травму подаються як
    чутливі вторинні свідчення, не як поліційна справа.
  - >-
    [!myth-buster] Не вигадуємо НКВД, МГБ чи КГБ-історію Яблонської: головні
    механізми тиску тут — війна, кордони, бездержавність, гендерна мобільність,
    архівна втрата видимості і права на матеріали.
  - >-
    Сучасні виставки, фонд, родинні права і проєкт `ТЕУРА` показують, що
    повернення авторки до українського канону залежить від етики архіву та
    дозволів, а не лише від захоплення її біографією.
  section: 'Тінь: Бездержавність, кордони і колоніальний погляд'
  words: 1600
- points:
  - >-
    Учні будують карту маршруту і поруч ставлять запитання: хто говорить, кого
    фотографують, кого не названо, які слова перетворюють подорож на свідчення.
  - >-
    Яблонська руйнує стереотип "провінційної" української культури: вона пише
    світ українською, але її українськість не потребує закритого кордону.
  - >-
    Сучасне значення: її повернення через архіви, видання й виставки вчить
    бачити українську модерність як мобільну, жіночу, фотографічну і
    відповідальну перед зображеними людьми.
  section: 'Підсумок: Подорож як відповідальність'
  words: 1000
focus: >-
