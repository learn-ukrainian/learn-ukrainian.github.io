content_outline:
- points:
  - 'Парадокс: Як людина, народжена рабом (кріпаком), якій цар особисто заборонив писати й малювати, стала найвпливовішим
    голосом нації та її духовним батьком?'
  - '[!biography] Шевченко — не просто поет. Це культурний код, через який українці осмислюють свою історію, ідентичність
    та боротьбу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сприйняття за життя. Для імперії — небезпечний бунтівник. Для частини української еліти — маргінальний радикал.
    Як сучасники оцінювали його реальний вплив?'
  - 'Дебат 2: Боротьба за спадщину. Радянська версія — «революціонер-демократ», предтеча комунізму. Націоналістична — безгрішний
    іконописний святий. Деколонізаційна — антиімперський мислитель. Хто і чому "привласнює" Шевченка?'
  - '[!epistemic-humility] Чи можна сьогодні прочитати Шевченка, минаючи ці шари інтерпретацій? Визнання того, що кожен "новий"
    Шевченко — це відповідь на запити своєї епохи.'
  section: 'Конфліктна карта: Пророк чи Пам''ятник?'
  words: 900
- points:
  - 'Соціальний контекст: Світ українського кріпацтва першої половини XIX ст. — безправ''я, злидні, відсутність перспектив.'
  - 'Особиста траєкторія: Сирітство, поневіряння та виявлення унікального таланту до малювання як єдиний шанс на порятунок.'
  - 'Поворотний момент: Історія викупу з кріпацтва. Роль Карла Брюллова, Василя Жуковського та української громади в Петербурзі.
    Це було милосердя чи розрахунок?'
  - 'Академія мистецтв: Інтелектуальне середовище, яке сформувало Шевченка-романтика та європейського інтелектуала.'
  section: 'Формування: Шлях із кріпацтва'
  words: 1000
- points:
  - 'Вибух 1840 року: Вихід першого «Кобзаря» і його шоковий ефект. Чому збірка віршів кріпацькою мовою стала подією епохального
    значення?'
  - 'Літературна революція: Утвердження української мови як повноцінної мови високої літератури, а не лише побутового спілкування.'
  - 'Ключові твори періоду: Аналіз «Катерини», «Гайдамаків», «Сну». Шевченко закладає основи національного наративу: трагічна
    історія, антиімперський протест, ідея відплати.'
  - 'Первинні джерела: Аналіз фрагментів ранніх творів, що демонструють новаторство та розрив із попередньою традицією.'
  section: 'Діяльність: «Кобзар» як національна біблія'
  words: 1300
- points:
  - '[!anti-hagiography] Кирило-Мефодіївське братство: не лише гурток ідеалістів, а й група з політичними амбіціями, що жорстоко
    прорахувалася. Роль Шевченка в цьому.'
  - 'Царський вирок: «Під найсуворіший нагляд, із забороною писати й малювати». Не просто покарання, а свідома спроба духовної
    кастрації митця. Психологічний аналіз травми заслання.'
  - 'Людський вимір трагедії: Алкоголізм, напади відчаю, невдалі спроби одружитися, конфлікти з оточенням. Шевченко-людина,
    а не бронзовий ідол.'
  - '[!myth-buster] Міф про «народного святого». Деконструкція образу безгрішного мученика. Його складний характер, особисті
    недоліки та помилки як невід''ємна частина біографії.'
  section: 'Тінь: Десять років мовчання та зламана доля'
  words: 900
- points:
  - 'Повернення до розминки: Маючи повну картину, студент формулює власну відповідь на питання про феномен Шевченка.'
  - '«Заповіт» і перепоховання: Смерть як початок безсмертя. Як останні роки життя та смерть перетворили поета на національного
    пророка?'
  - '[!decolonization] Шевченко сьогодні: Як його тексти про імперію, колоніалізм та боротьбу за волю читаються в контексті
    сучасної російсько-української війни?'
  - 'Кінець епохи пам''ятників: Чи потрібен нам сьогодні Шевченко-символ, чи настав час для Шевченка — живого співрозмовника?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Тарас Шевченко: комплексний аналіз біографії, деконструкція радянських та імперських міфів, та оцінка його ролі як
  антиколоніального голосу.'
