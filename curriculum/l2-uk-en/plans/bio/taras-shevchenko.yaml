objectives:
- Критично аналізувати біографію Шевченка, розрізняючи факти, агіографію та анти-агіографію
- Деконструювати імперські та радянські міфи про Шевченка та визначати їхню мету
- Пояснювати роль «Кобзаря» у формуванні сучасної української мови та національної ідентичності
- Формулювати власну аргументовану позицію щодо актуальності спадщини Шевченка в контексті деколонізації та сучасної війни
