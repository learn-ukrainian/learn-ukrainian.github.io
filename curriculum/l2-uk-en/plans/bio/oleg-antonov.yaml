content_outline:
- points:
  - 'Парадокс: Олег Антонов — росіянин за походженням, що народився під Москвою. Як ця людина стала одним із найпотужніших
    символів української інженерної школи та національної гордості?'
  - '[!biography] Коротка довідка без дат: конструктор, що мріяв про планери, а збудував найбільші у світі транспортні літаки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Київ vs Москва. Чи був переїзд КБ до Києва лише адміністративним рішенням, чи свідомим вибором, що заклав основи
    для конкуренції з московськими авіаційними гігантами (Туполєв, Іллюшин)?'
  - 'Дебат 2: Радянський геній vs український патріот. Як спадщина Антонова переосмислюється в незалежній Україні? Чи можна
    відокремити його роботу на радянський ВПК від його внеску в українську науку?'
  - '[!epistemic-humility] Радянська історіографія представляла його як "радянського конструктора". Сучасна українська — як
    "українського". Де проходить межа між фактом та інтерпретацією?'
  - '[!decolonization] Розгляд "конкуренції" з іншими КБ не як змагання інженерів, а як боротьбу центру (Москви) проти спроб
    периферії (Києва) здобути технологічну суб''єктність.'
  section: 'Конфліктна карта: Конструктор імперії чи творець українських крил?'
  words: 900
- points:
  - 'Ранні роки: захоплення авіацією, конструювання перших планерів у юності, формування інженерного мислення.'
  - 'Соціальний та історичний контекст: світ після Першої світової, індустріалізація, авіаційний бум 1920-30-х років.'
  - 'Переломний момент: створення конструкторського бюро в Новосибірську та стратегічне рішення про переїзд до Києва у 1952
    році — втеча від прямого контролю Москви.'
  - 'Філософія конструктора, що народилася з планеризму: краса, надійність, ефективність як єдине ціле.'
  section: 'Формування: Від планерів до перших КБ'
  words: 1000
- points:
  - 'Перший великий успіх у Києві: легендарний Ан-2 "кукурудзяник" — літак, що завоював світ своєю простотою та надійністю.'
  - 'Епоха гігантів: розробка унікальних важких транспортних літаків Ан-22 "Антей" та Ан-124 "Руслан", що встановили світові
    рекорди вантажопідйомності.'
  - 'Первинні джерела: аналіз цитат та мемуарів Антонова про його підхід до конструювання, вимоги до команди, бачення майбутнього
    авіації.'
  - 'Розбудова авіаційної інфраструктури в Україні: Антонов не просто будував літаки, він створював екосистему — наукові інститути,
    заводи, випробувальні центри.'
  section: 'Діяльність: Народження київської школи літакобудування'
  words: 1300
- points:
  - '[!anti-hagiography] Робота на радянську військову машину: літаки "Ан" були не лише мирними трудівниками, а й інструментом
    радянської геополітики. Моральні компроміси конструктора.'
  - 'Невдачі та закриті проєкти: які ідеї Антонова не були реалізовані через тиск партійного керівництва чи поразки у конкурентній
    боротьбі?'
  - '[!myth-buster] Антонов не був ані дисидентом, ані вірним комуністом. Він був прагматиком, що маневрував у складній системі
    задля досягнення своєї мети. Розвінчання міфу про "ідеального радянського інженера".'
  - 'Критика сучасників: які претензії висували до Антонова його опоненти з інших КБ і наскільки вони були обґрунтованими?'
  section: 'Тінь: Ціна неба в радянській системі'
  words: 900
- points:
  - 'Повернення до парадоксу: після аналізу його життя та компромісів, студент формулює власну відповідь на питання, чому
    Антонов став українським символом.'
  - '[!decolonization] Спадщина сьогодні: ДП "Антонов" як стратегічне підприємство України. Символізм "Мрії" — її створення
    як тріумф, її знищення Росією як акт варварства, і обіцянка відбудови як символ незламності.'
  - 'Сучасна рефлексія: як літаки "Ан" використовуються в міжнародних гуманітарних місіях, підтверджуючи гуманістичний аспект
    філософії їх творця.'
  - 'Небо стає ближчим: вплив Антонова на формування науково-технічної еліти України та його роль як прикладу інтелектуального
    патріотизму.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Biography of Oleh Antonov, founder of the Antonov Design Bureau, and the conflict between his role in the Soviet military-industrial
  complex and his legacy as a Ukrainian national symbol.
