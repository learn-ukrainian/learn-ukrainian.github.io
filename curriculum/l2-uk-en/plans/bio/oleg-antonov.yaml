- Аналізувати біографію Олега Антонова через призму конфлікту між радянською системою та українською ідентичністю
- Критично оцінювати внесок Антонова, розрізняючи його технічні досягнення та моральні компроміси, на які він ішов
- Розрізняти агіографічний міф про конструктора та реальну людину з її успіхами та невдачами
- Формулювати аргументовану позицію щодо ролі технічної інтелігенції в умовах тоталітарного режиму
