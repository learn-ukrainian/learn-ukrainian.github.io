objectives:
- Пояснювати псевдонім і біографічний маршрут Ірчана від Галичини до Праги, Канади, Харкова, Соловків і Сандармоху.
- Аналізувати "Родину щіткарів" як джерело робітничого театру, сценічної практики й історичного правопису.
- Розрізняти лівий або прогресивний досвід Ірчана та радянське сфабриковане обвинувачення проти нього.
- Точно називати репресивний ланцюг: арешт 28 грудня 1933 року, 10-річний вирок, Соловки, трійка, Сандармох 3 листопада 1937 року.
