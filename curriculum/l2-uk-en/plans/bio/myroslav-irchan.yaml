content_outline:
- points:
  - >-
    [!biography] Мирослав Ірчан — псевдонім Андрія Дмитровича Баб'юка, народженого 14 липня
    1897 року в П'ядиках Коломийського повіту в Галичині.
  - >-
    Початковий парадокс: автор працював у лівих і прогресивних українських середовищах за
    кордоном, добровільно повернувся до радянської України, а потім був знищений радянським
    терором як підозрілий "контрреволюційний" діяч.
  - >-
    Провокаційне питання: як транснаціональна українська біографія могла бути перетворена
    органами безпеки на доказ небезпеки?
  section: Розминка
  words: 400
- points:
  - >-
    Освітня основа: випускник львівської учительської семінарії, Ірчан входить у літературу
    з галицьким досвідом, педагогічною мовою і воєнним тлом.
  - >-
    Рух між середовищами: воєнні формації, Прага, Канада, редагування українських лівих і
    прогресивних періодичних видань за кордоном.
  - >-
    [!decolonization] Канада не є "додатком" до біографії: вона формує діаспорну, робітничу
    й організаційну лексику, без якої повернення до Харкова втрачає політичний і культурний сенс.
  - >-
    Методичний акцент: учні працюють із картою Галичина — Прага — Канада — Харків — Соловки —
    Сандармох, щоб побачити українську літературу поза вузькою мапою УСРР.
  section: "Формування: Галичина, Прага, Канада"
  words: 1000
- points:
  - >-
    Ранні та середні твори: "Сміх Нірвани" 1918 року, "Бунтар" 1922 року, "Карпатська ніч"
    1924 року, "В бур'янах" 1925 року й інші тексти показують не лише радянський, а й
    галицько-еміграційний досвід.
  - >-
    "Родина щіткарів" 1925 року як ключ до робітничого театру: передмова і сценічні нотатки
    говорять про завдання драмгуртків, сцену, глядача, смак і соціальну освіту.
  - >-
    Історичний правопис у перевірених сторінках видання слід зберігати й коментувати, а не
    автоматично модернізувати; близьке читання починається лише після сторінкової верифікації.
  - >-
    Харківський контекст: після повернення Ірчан очолював літературну організацію "Західна
    Україна"; "Плацдарм" 1933 року пов'язаний із харківським і курбасівським театральним
    оточенням.
  section: "Діяльність: Робітничий театр і Західна Україна"
  words: 1200
- points:
  - >-
    [!anti-hagiography] Ірчана не треба описувати як простого антирадянського чужинця:
    документована біографія показує ліві, прогресивні, діаспорні й радянсько-українські етапи.
  - >-
    Механізм репресії: арешт 28 грудня 1933 року після інструктажу в ЦК КП(б)У,
    сфабриковане націоналістичне або контрреволюційне обвинувачення, вирок до 10 років таборів.
  - >-
    Соловецьке ув'язнення було етапом, а не фіналом: у 1937 році спеціальна трійка УНКВС у
    Ленінградській області ухвалила смертний вирок.
  - >-
    [!epistemic-humility] Старі формули "помер на Соловках" треба уточнювати: сучасні
    українські джерела подають Сандармох біля Медвеж'єгорська і 3 листопада 1937 року як
    місце й дату розстрілу.
  - >-
    [!myth-buster] Радянське збереження Ірчана як "прогресивного" письменника може
    приховувати державне вбивство; навчальний текст має тримати обидва факти разом.
  section: "Тінь: Повернення, арешт, Соловки, Сандармох"
  words: 1600
- points:
  - >-
    Що вижило: п'єси, прозові тексти, скани і канадський український слід, які дозволяють
    читати Ірчана не лише через смерть, а через практику театру й організації.
  - >-
    Педагогічне значення: сценічні нотатки "Родини щіткарів" дають студентам другої мови практичний
    регістр інструкції, сцени, глядача і соціальної місії.
  - >-
    Підсумкове питання: як розповідати про автора, чия українська модерність проходить через
    Галичину, Прагу, Канаду, Харків, Соловки й Сандармох, не стискаючи її до одного політичного
    ярлика?
  section: "Підсумок: Транснаціональна українська модерність"
  words: 1000
focus: >-
  Мирослав Ірчан як транснаціональний український письменник і театральний організатор, чий
  шлях через Галичину, Прагу, Канаду та Харків був радянською владою перекодований у підставу
  для репресії, Соловків і розстрілу в Сандармосі.
