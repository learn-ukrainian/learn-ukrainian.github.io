- Критично оцінювати подвійну роль Окуневської як лікарки та громадської активістки в контексті емансипаційного руху XIX століття
- Розрізняти історичний контекст та сучасні інтерпретації її спадщини, уникаючи міфологізації
- Формулювати аргументовану позицію щодо викликів, з якими стикалися перші жінки в науці, на прикладі її кар'єри
