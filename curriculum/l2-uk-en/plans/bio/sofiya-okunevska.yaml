content_outline:
- points:
  - 'Парадокс: У світі, де жінці було відмовлено в доступі до освіти, як Софії Окуневській вдалося стати однією з перших лікарок
    в імперії? Чи була це історія тріумфу, чи трагедія боротьби?'
  - 'Провокація: Окуневську називають "першопрохідницею". Але що, якщо її історія — це не стільки про успіх, скільки про величезну
    ціну, яку вона заплатила за право бути першою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Професійна ідентичність. Ким Окуневська була більше — лікаркою, що практикує, чи символом жіночого руху? Як
    її сучасники (і вона сама) бачили її основну місію?'
  - 'Дебат 2: Інтерпретація спадщини. Чи є її медична практика її головним внеском, чи все ж таки важливіша її роль у боротьбі
    за емансипацію та право жінок на освіту, що відкрило шлях для тисяч інших?'
  - '[!epistemic-humility] Ми не можемо однозначно розділити ці дві ролі. Її медична практика сама по собі була політичним
    актом, а її активізм базувався на її професійному авторитеті.'
  - '[!decolonization] Розгляд її діяльності в контексті Австро-Угорської імперії та маргіналізації українства. Її боротьба
    була подвійною: як жінки і як українки.'
  section: 'Конфліктна карта: Лікарка чи активістка?'
  words: 900
- points:
  - 'Соціальний контекст: Галичина XIX ст., сім''я священика, жорсткі обмеження для жінок в освіті та професіях.'
  - 'Ранні впливи: Батько Атанасій Окуневський, який підтримував її прагнення, та культурне середовище "будителів".'
  - 'Поворотний момент: Відмова у вступі до гімназії та університетів Галичини як каталізатор рішення шукати освіту за кордоном.'
  - 'Вибір медицини: Не просто професія, а "покликання" і спосіб служити громаді, особливо жінкам, позбавленим кваліфікованої
    допомоги.'
  section: 'Формування: "Нехай з неї буде хоч кравчиня"'
  words: 1000
- points:
  - 'Навчання в Цюриху: Успіхи та труднощі в одному з небагатьох університетів, відкритих для жінок. Академічна конкуренція
    та соціальна ізоляція.'
  - 'Науковий внесок: Дисертація про анемію — внесок у медичну науку, що доводив її компетентність.'
  - 'Відкриття практики у Львові: Боротьба з упередженнями пацієнтів-чоловіків та медичного істеблішменту. Створення першого
    гінекологічного відділення.'
  - 'Практична діяльність: Фокус на лікуванні жінок та дітей, безкоштовна допомога бідним, запровадження нових методів лікування.'
  section: 'Діяльність: Перший жіночий диплом в Австро-Угорщині'
  words: 1300
- points:
  - '[!anti-hagiography] Постійна боротьба виснажувала. Окуневська стикалася не лише із зовнішнім тиском, а й з особистими
    кризами та, можливо, професійним вигоранням.'
  - 'Особисті жертви: Чи не завадила її кар''єра та громадська діяльність особистому життю? Шлюб, материнство та професія
    — постійний конфлікт для жінок тієї епохи.'
  - 'Професійна ізоляція: Будучи першою, вона не мала мережі колег-жінок для підтримки. Її критикували чоловіки, а жінки не
    завжди довіряли.'
  - '[!myth-buster] Міф про "тріумфальний шлях". Її кар''єра — це не безперервний злет, а синусоїда успіхів і невдач, визнання
    та розчарувань.'
  section: 'Тінь: Ціна першості'
  words: 900
- points:
  - 'Повернення до розминки: Студент формулює відповідь: історія Окуневської — це і тріумф волі, і трагедія боротьби, де ціна
    успіху була надзвичайно високою.'
  - 'Оцінка спадщини: Її головний внесок — не лише врятовані життя, а й зруйнований бар''єр. Вона довела, що жінка може бути
    висококласним лікарем.'
  - 'Вплив на жіночий рух: Окуневська стала рольовою моделлю. Її приклад надихнув покоління жінок боротися за свої права.'
  - '[!decolonization] Її історія — це частина українського національного проєкту: довести спроможність нації творити власну
    інтелектуальну еліту, включно з жінками.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
