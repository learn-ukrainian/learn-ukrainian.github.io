objectives:
- Аналізувати життя та творчість Алли Горської в контексті доби «відлиги» та руху шістдесятників.
- Критично оцінювати різні версії її трагічної загибелі, відділяючи факти від припущень.
- Інтерпретувати її монументальні твори як акти культурного спротиву радянській системі.
- Формулювати аргументовану позицію щодо ролі митця в тоталітарному суспільстві.
