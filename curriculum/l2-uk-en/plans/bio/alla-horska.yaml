content_outline:
- points:
  - 'Провокація: Чому радянська влада боялася художниці та її вітражів більше, ніж політичних промов? Парадокс Алли Горської
    — мисткині, чиї роботи стали небезпечнішими за зброю.'
  - '[!biography] Короткий опис знищеного вітража в КДУ 1964 року як вихідна точка для розмови.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Горська — мисткиня чи дисидентка? Чи була її політична активність природним продовженням її мистецтва, чи вимушеним
    кроком у відповідь на репресії?'
  - 'Дебат 2: Загибель — побутове вбивство чи спецоперація КДБ? Радянська офіційна версія проти свідчень друзів та посмертних
    досліджень.'
  - '[!epistemic-humility] Розгляд аргументів обох сторін щодо її смерті, визнання відсутності остаточних доказів, але аналіз
    непрямих свідчень та політичного контексту.'
  - '[!decolonization] Як радянська пропаганда намагалася маргіналізувати Горську, звівши її діяльність до «буржуазного націоналізму»
    та особистих конфліктів.'
  section: 'Конфліктна карта: Мистецтво vs Політика'
  words: 900
- points:
  - Народження в інтелігентній родині, вплив батька — директора Ялтинської кіностудії.
  - Навчання в Київському художньому інституті в добу «відлиги» — пошук власної мови всупереч канонам соцреалізму.
  - 'Ранні впливи: український авангард 1920-х, мексиканські монументалісти, народне мистецтво.'
  - 'Формативний досвід: участь у Клубі творчої молоді «Сучасник» як центр кристалізації покоління шістдесятників.'
  section: 'Формування: Від соцреалізму до авангарду'
  words: 1000
- points:
  - Створення монументальних робіт (мозаїки, вітражі) в Києві, Донецьку, Маріуполі — спроба повернути мистецтво в публічний
    простір.
  - 'Співпраця з іншими художниками-шістдесятниками: Віктором Зарецьким, Опанасом Заливахою, Галиною Зубченко.'
  - Історія знищеного вітража «Шевченко. Мати» (1964) як акт культурного опору та поворотний момент у її біографії.
  - 'Правозахисна діяльність: підписання листів протесту, допомога родинам політв''язнів, фіксація злочинів режиму.'
  section: 'Діяльність: Монументальний спротив'
  words: 1300
- points:
  - '[!anti-hagiography] Горська — не ікона, а жива людина. Розгляд її складних стосунків з чоловіком, внутрішніх сумнівів,
    періодів творчої кризи.'
  - 'Тиск системи: виключення зі Спілки художників, постійний нагляд КДБ, провокації та шантаж.'
  - 'Ціна, яку платили близькі: як її боротьба вплинула на родину та друзів.'
  - '[!myth-buster] Розвінчання міфу про «богемне» життя шістдесятників. Реальність постійної загрози, фінансових труднощів
    та професійної ізоляції.'
  section: 'Тінь: Ціна непокори'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому мистецтво Горської було небезпечним для тоталітарного режиму.'
  - 'Спадщина Горської сьогодні: відродження інтересу до монументального мистецтва, її роль як феміністичної ікони та символу
    незламності.'
  - '[!decolonization] Як сучасна Україна переосмислює спадщину шістдесятників, очищуючи її від радянських та російських інтерпретацій.'
  - Її вплив на сучасне українське мистецтво та активізм.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Алла Горська — художниця-монументалістка, дисидентка, одна з ключових фігур шістдесятництва, чия трагічна загибель
  і художня спадщина стали символом опору радянському режиму.
