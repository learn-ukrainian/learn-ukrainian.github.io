objectives:
- >-
  Аналізувати Шевчукову прозу через дім, бароко, психологізм, притчу і пам'ять,
  не зводячи її до одного жанрового ярлика.
- >-
  Пояснювати механізм пізньорадянського тиску: публікаційне блокування,
  офіційну критику, братів арешт, контакти з ув'язненими і згадку про КДБ.
- >-
  Розрізняти засвідчену біографічну небезпеку і неприпустиму вигадку про
  власний арешт чи табірний строк Шевчука.
- >-
  Оцінювати відновлення давньоукраїнської літератури як деколонізаційну працю
  з довгою текстовою тяглістю.
