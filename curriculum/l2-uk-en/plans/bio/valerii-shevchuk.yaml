content_outline:
- points:
  - >-
    [!biography] Валерій Шевчук: прозаїк, драматург, перекладач, дослідник
    давньої української літератури й один із головних майстрів психологічної та
    бароково-готичної прози другої половини двадцятого століття.
  - >-
    Провокаційне питання: чи може мовчання в друці бути не поразкою, а
    перетворенням енергії в архів, старі тексти і прозу, яку система не вміла
    легко класифікувати?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 20 серпня 1939 року в Житомирі. Технічна школа, робота на
    бетонному заводі, історико-філософська освіта в Київському університеті,
    армійська служба біля Мурманська і ранні редакційно-музейні роботи.
  - >-
    Шевчук належав до кола шістдесятників, але його шлях не збігається з
    публічною трибуною поетів. Його поле — проза внутрішнього морального аналізу,
    старі книги, літописи, бароко і психологічна напруга.
  - >-
    [!decolonization] Інтерес до давньоукраїнської літератури не був нейтральним
    хобі. Він повертав українській культурі довгу текстову тяглість, яку
    імперські та радянські схеми часто зводили до периферії чужої історії.
  section: 'Формування: Житомир, історична освіта і покоління шістдесятників'
  words: 1000
- points:
  - >-
    Ранні збірки «Серед тижня», «Набережна, 12», «Вечір святої осені» показали
    психологічну прозу, що шукала незвичайні моральні стани в буденному житті.
  - >-
    «Панна сотниківна», написана 1968 року і надрукована лише на початку
    1980-х у складі «Дому на горі», дає чистий приклад затриманої історико-
    фантастичної прози.
  - >-
    «Дім на горі» (1983): дім, оповідь, жінки, чоловіки, повернення і химерна
    атмосфера створюють модель пам'яті як простору, де минуле не лежить мертвим,
    а говорить через притчу.
  - >-
    «Три листки за вікном» (1986) і праця з бароковими текстами розкривають
    Шевчука як автора, що поєднує роман, літопис, стилізацію, метафікцію і
    моральну історіографію.
  section: 'Діяльність: Дім, бароко і проза внутрішньої пам''яті'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Валерій Шевчук не був засудженим табірним дисидентом.
    Його старшого брата Анатолія заарештували 1965 року, а сам Валерій підтримував
    контакти з ув'язненими дисидентами, що створювало для нього реальний ризик.
  - >-
    Після хвилі репресій кінця 1960-х і 1972 року він майже не друкувався в
    1970-х. Джерела описують заборону друку, офіційну критику «мікроаналізу» і
    період письма «для себе».
  - >-
    [!epistemic-humility] Є джерельно засвідчена згадка про меморандум КДБ 1971
    року щодо запланованої книжки і перекладу літописів. Це не дає права
    вигадувати арешт, вирок чи табірний строк Валерія Шевчука.
  - >-
    Внутрішня еміграція в його випадку не означала бездіяльність: архів, переклад
    Сковороди, Вишенського, Величка і барокових антологій стали способом тримати
    відкритим старий український текстовий світ.
  section: 'Тінь: Братів арешт, КДБ і внутрішня еміграція'
  words: 1500
- points:
  - >-
    1988 року Шевчук отримав Шевченківську премію за «Три листки за вікном»,
    а після відновлення незалежності продовжив прозову, перекладацьку і
    дослідницьку працю.
  - >-
    [!myth-buster] Його складність не треба ховати. Частина читачів сприймає
    Шевчукову прозу як елітарну, архаїзовану і важку; саме це може стати
    навчальним питанням про межу між культурним відновленням і доступністю.
  - >-
    Смерть 6 травня 2025 року в Києві змушує оновити старі довідки, де він ще
    фігурує як живий автор. Підсумок семінару: Шевчук зробив архів не складом
    минулого, а джерелом модерної української прози.
  section: 'Підсумок: Давній текст як сучасна сила'
  words: 1000
focus: >-
  Валерій Шевчук як прозаїк шістдесятницького покоління, дослідник і перекладач
  давньої української літератури, який пережив публікаційне блокування,
  родинний тиск і нагляд, але не був арештованим табірним дисидентом. Семінар
  читає «Дім на горі», «Три листки за вікном» і бароковий архів як форму
  культурної пам'яті.
