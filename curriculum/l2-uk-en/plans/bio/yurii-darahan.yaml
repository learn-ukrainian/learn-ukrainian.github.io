content_outline:
- points:
  - '[!biography] Знайомство з Юрієм Дараганом: старшина Армії УНР і поет-засновник Празької школи, автор єдиної прижиттєвої книжки, який помер у 32 роки.'
  - 'Провокаційне питання: як одна тоненька збірка, «Сагайдак», змогла започаткувати цілу літературну школу?'
  section: Розминка
  words: 400
- points:
  - 'Походження: народження 16 березня 1894 року в Єлисаветграді; мати — грузинка, батько-українець, інженер, помер за три місяці до народження сина, і осиротіла родина переїхала до Тифліса.'
  - 'Шлях вояка: незакінчене Тираспольське реальне училище; служба молодшим офіцером російської армії в Першій світовій війні, поранення; після Лютневої революції 1917 року — перехід до військ УНР (командир кулеметної сотні житомирської, згодом кам''янецької шкіл).'
  - 'Полон: у 1920 році, після поразки визвольних змагань, інтернування в польських таборах Ланьцут, Вадовиці, Каліш і Щипйорно.'
  - '[!decolonization] У каліському таборі разом із Євгеном Маланюком — земляком-єлисаветградцем — Дараган видає гектографований журнал «Веселка» (1922–1923), зародок Празької школи.'
  section: 'Формування: Від Тифліса до табору в Каліші'
  words: 1000
- points:
  - 'Шлях до української мови: перший вірш Дараган друкує російською у 14 років, 1908 року; у листі до Микити Шаповала він пояснює, чому «син грузинки» обрав українську: «Я завжди зостанусь… українцем».'
  - 'Засновницька книжка: поема «Мазепа» (1924) про добу Полтавської битви 1709 року; збірка «Сагайдак» (Прага, 1925) — єдина прижиттєва книжка й засновницька збірка Празької школи.'
  - 'Вояцько-міфологічний ключ: образ сагайдака (козацького сагайдака) й «дикого поля» задає войовничо-поганську тональність школи; поезія «Дажбог» виводить дохристиянського бога-сонце, що проганяє зиму.'
  - 'Поетика: неоромантично-символічний стиль із фольклорно-думним і погансько-міфологічним забарвленням, під впливом Олександра Олеся й Грицька Чупринки; переклади чеського романтика Карела Гінека Махи.'
  section: 'Діяльність: «Сагайдак» — заспів пражан'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм загибелі: поразка УНР призвела до інтернування, а голодне й холодне табірне життя спричинило тяжку хворобу — сухоти легень і горла.'
  - 'Парадокс табору: ті самі табори, що інкубували нову поезію, інкубували й хворобу, яка вбила поета.'
  - 'Рання смерть: 17 березня 1926 року Дараган помирає в санаторії «На Плеше» в Плешові під Прагою у 32 роки; похований на Ольшанському цвинтарі; передсмертний вірш — «Прозорість» (1926).'
  - '[!epistemic-humility] Дискусійне питання: чи слід читати «Сагайдак» як справжнє заснування Празької школи, чи лише як її передвістя — відокремлюємо засвідчений вплив від пізнішої міфологізації.'
  section: 'Тінь: Табір, що породив поезію і вбив поета'
  words: 1600
- points:
  - 'Доля книжки: «Сагайдак» уцілів і був перевиданий 1965 року та (як «Срібні сурми») 2003 року; засновницьку роль понесли далі Маланюк і Лятуринська.'
  - 'Пам''ять побратимів: збірка Оксани Лятуринської «Княжа емаль» (1941) присвячена пам''яті Дарагана; в УРСР поет залишався недрукованим до пізньорадянського повернення діаспори.'
  - 'Сучасне значення: син грузинки, який свідомо обрав українську, — міст між Кавказом і Україною та спростування кровного розуміння нації.'
  section: 'Підсумок: Заспів, що пережив поета'
  words: 1000
focus: 'Юрій Дараган — поет-засновник Празької школи, який заплатив за програну війну власним життям: старшина Армії УНР, що в польських таборах захворів на сухоти й помер у Празі у 32 роки. Аналіз єдиної прижиттєвої збірки «Сагайдак» (1925) як заспіву цілої літературної школи та вояцько-міфологічного ключа пражан.'
