objectives:
- Простежити життєвий шлях Юрія Дарагана — від грузинсько-українського дитинства й служби в Армії УНР до польського інтернування та ранньої смерті від сухот у Празі.
- Пояснювати засновницьку роль збірки «Сагайдак» (1925) для Празької школи та її вояцько-міфологічний, неоромантичний ключ.
- Аналізувати образи сагайдака, «дикого поля» й бога Дажбога як звернення пражан до княжо-руської та дохристиянської ідентичності.
- Критично оцінювати механізм знищення поета — від поразки визвольних змагань і табірних сухот до шістдесятилітнього радянського стирання.
