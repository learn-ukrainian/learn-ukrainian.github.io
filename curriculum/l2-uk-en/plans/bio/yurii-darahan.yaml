objectives:
- Відтворювати підтверджену військову хронологію без змішування суперечливих відомостей про частини.
- Розрізняти інтернування, переїзд до Чехословаччини, навчання й літературні зв’язки.
- Аналізувати «Сагайдак» за точним празьким виданням 1925 року.
- Пояснювати значення Дарагана для празького поетичного середовища без перенесення на нього чужих біографій.
content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Юрій Юрійович Дараган народився 16 березня 1894 року в Єлисаветграді й помер 17 березня 1926 року.'
  - '[!epistemic-humility] Джерела розходяться в точній військовій деталізації; навчальний план не поєднує несумісні версії.'
- section: 'Військова служба та інтернування'
  words: 1000
  points:
  - Служба під час Першої світової війни й участь у війську Української Народної Республіки.
  - Підтверджені табори інтернованих — Ланцут, Вадовиці й Каліш.
  - Таборовий статус не слід перетворювати на недоведену причинну історію хвороби.
- section: '«Веселка», еміграція і навчання'
  words: 1200
  points:
  - Співпраця з Євгеном Маланюком у каліському журналі й товаристві «Веселка».
  - Переїзд до Чехословаччини та навчання в Українському вищому педагогічному інституті.
  - Участь у літературному середовищі не означає тотожної біографії всіх «пражан».
- section: '«Сагайдак»: точне видання й критичне читання'
  words: 1600
  points:
  - Празьке видання 1925 року є єдиною прижиттєвою збіркою автора й окремим документом читання.
  - '[!anti-hagiography] Значення збірки обговорюємо через форму, мотиви й рецепцію, а не через міф про «засновника всього».'
  - Цитати допускаються лише з точним локатором у скані; неперевірений лист до Микити Шаповала не використовується.
- section: 'Підсумок: індивідуальна біографія в ширшому середовищі'
  words: 1000
  points:
  - Військовий досвід, інтернування, еміграція й поетична праця взаємопов’язані, але не взаємозамінні.
  - Деколонізаційне читання повертає українську військову й літературну суб’єктність без замовчування грузинського та імперського прикордонного контекстів.
