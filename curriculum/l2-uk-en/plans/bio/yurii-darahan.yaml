title: 'Юрій Дараган: військова хронологія й «Сагайдак»'
subtitle: Поет Армії УНР у таборовому та празькому середовищах
cefr_min: C1
word_target: 5200
pedagogy: CBI
focus: >-
  Юрій Юрійович Дараган як військовик Армії УНР і автор єдиної прижиттєвої
  збірки «Сагайдак»; військова служба, інтернування, еміграція та літературна
  діяльність розглядаються окремо й лише в межах прямого доказу.
