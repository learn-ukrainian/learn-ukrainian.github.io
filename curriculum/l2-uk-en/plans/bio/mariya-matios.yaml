content_outline:
- points:
  - 'Провокативне питання: Як можна мовчанням розповісти про травму цілого народу? Парадокс Марії Матіос та її найвідомішої
    героїні — німої Дарусі.'
  - 'Літературна загадка: що спільного між гуцульською говіркою, радянськими депортаціями та Шевченківською премією?'
  - '[!biography] Марія Матіос — одна з найвідоміших і водночас найбільш суперечливих постатей сучасної української літератури.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Матіос — «регіональна» письменниця чи загальнонаціональна? Критики сперечаються, чи її буковинська автентичність
    є силою, чи обмеженням.'
  - 'Дебат 2: Письменниця vs політик. Як її парламентська діяльність вплинула на її творчість і репутацію? Чи може автор моральних
    романів брати участь у прагматичній політиці?'
  - '[!epistemic-humility] Одні вважають її політичну кар''єру зрадою літератури, інші — необхідним обов''язком громадянки.'
  - '[!decolonization] Творчість Матіос повертає в український дискурс забуті сторінки історії Буковини, витіснені радянською
    пропагандою.'
  section: 'Конфліктна карта: Голос регіону чи совість нації?'
  words: 900
- points:
  - 'Світ дитинства: гуцульське село Ростоки, родинні історії, місцевий фольклор як перша літературна школа.'
  - 'Соціальний контекст: життя на Буковині в радянський час, тінь колективної пам''яті про депортації та репресії.'
  - 'Чернівецький університет: філологічна освіта, яка дала системні знання, але водночас змушувала долати ідеологічні рамки.'
  - 'Рання творчість: від журналістських спроб до перших поетичних збірок — пошук власного голосу.'
  section: 'Формування: Буковинське коріння та радянське тло'
  words: 1000
- points:
  - 'Феномен «Солодкої Дарусі» (2004): роман, що став культурною подією і приніс авторці Шевченківську премію.'
  - 'Аналіз твору: історія однієї німої жінки як метафора історичної травми українців, що втратили голос.'
  - 'Буковинський діалект як повноцінна літературна мова: легалізація регіонального мовлення у «високій» літературі.'
  - 'Інші ключові твори: «Майже ніколи не навпаки», «Нація» — розвиток теми родинної саги та історичної справедливості.'
  section: 'Діяльність: «Солодка Даруся» як національна терапія'
  words: 1300
- points:
  - '[!anti-hagiography] Політична кар''єра Матіос (депутатка від партій УДАР та БПП) викликала гостру критику і розчарування
    в частини її читачів.'
  - 'Моральний компроміс: чи можна поєднувати роль «совісті нації» з участю в політичних іграх та голосуваннями, які йшли
    врозріз із очікуваннями суспільства?'
  - '[!myth-buster] Міф про «письменника-пророка» vs реальність. Матіос-політик виявилася прагматиком, що зруйнувало ідеалізований
    образ, створений її книгами.'
  - 'Ціна вибору: як публічна політика вплинула на її пізню творчість та сприйняття її постаті в культурному полі.'
  section: 'Тінь: Письменниця у Верховній Раді'
  words: 900
- points:
  - 'Повернення до розминки: Як Матіос вдалося перетворити мовчання про травму на потужний національний наратив?'
  - 'Оцінка внеску: Матіос легітимізувала тему історичної пам''яті та регіональної ідентичності в сучасній літературі.'
  - 'Сучасна актуальність: її твори залишаються інструментом для пропрацювання колективних травм, особливо в контексті нової
    війни.'
  - '[!decolonization] Вона показала, як через глибоко локальну історію можна розповісти універсальну історію поневолення
    та спротиву.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Biography of Mariya Matios, Bukovynian identity, historical trauma in "Sweet Darusya", family memory, and the role
  of regional dialect in literature.
level: BIO
module: bio-156
objectives:
- Аналізувати, як Марія Матіос використовує буковинську ідентичність та історичну травму для створення загальнонаціонального
  наративу
- Критично оцінювати взаємозв'язок між літературною творчістю та політичною діяльністю письменниці
- Розрізняти поняття «регіональної» та «національної» літератури на прикладі творчості Матіос
- Формулювати аргументовану позицію щодо ролі митця в суспільстві, що переживає історичні випробування
