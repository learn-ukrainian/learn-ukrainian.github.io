content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Косачем: письменник із родини Косачів,
    небіж Лесі Українки, МУРівський модерніст і одна з найсуперечливіших постатей
    української еміграції.
  - >-
    Провокаційне питання: як читати автора, який був ув'язнений польською владою
    за українську підпільну діяльність, а пізніше редагував прорадянський журнал
    у США?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: народження 5 (18) грудня 1908 року в селі Колодяжному на Волині,
    у родинному просторі, пов'язаному з Лесею Українкою та Оленою Пчілкою.
  - >-
    Освіта: закінчення Львівської академічної гімназії 1927 року, студії права
    у Варшавському університеті з 1928 року і пізніше навчання в Паризькому
    університеті.
  - >-
    Польська репресія: арешт у лютому 1931 року за належність до підпільної
    української націоналістичної організації; ув'язнення в Любліні; вирок
    5 листопада 1932 року за зв'язки з Українською військовою організацією.
  - >-
    [!decolonization] Цей етап треба називати точно: це тиск судово-поліційного
    апарату Другої Речі Посполитої, а не радянська чи російська репресія.
  section: 'Формування: Колодяжне, Львів і польська в''язниця'
  words: 1000
- points:
  - >-
    Історична проза 1930-х і 1940-х: "Сонце сходить в Чигирині", "Черлень",
    "Рубікон Хмельницького", "Еней і життя інших" і "День гніву" як простір
    історичної, міфологічної та модерністської уяви.
  - >-
    Вимушений відхід на Захід: під час радянської реокупації 1943-1944 років
    Косач, уже позначений попередньою націоналістичною діяльністю, рушив до
    Німеччини й жив у таборах переміщених осіб.
  - >-
    МУР 1945 року: співзасновник Мистецького українського руху разом з Іваном
    Багряним, Віктором Домонтовичем, Юрієм Шерехом та іншими.
  - >-
    Модерністська тема вигнання: "Еней і життя інших" як текст про вирваність
    із ґрунту, європейські алюзії і не сентиментальний образ України в еміграції.
  section: 'Діяльність: Історична проза, МУР і вигнання'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Косач не вкладається в просту героїчну схему: МУРівський
    модерніст і автор значущих текстів згодом став фігурою, яку українсько-
    американська громада бойкотувала.
  - >-
    Документований поворот: у 1959-1963 роках він редагував прорадянський
    нью-йоркський журнал "За синім океаном", відомий різкими антиемігрантськими
    атаками; ЕСУ подає тривалість журналу як 1959-1964 роки.
  - >-
    Контакти з радянською Україною: офіційні відвідини 1964, 1973, 1980 і
    1986 років; друк у радянській пресі під важкою цензурою радянських редакторів.
  - >-
    [!myth-buster] Важливе розмежування: він не є окупаційним нацистським
    колаборантом; спірна співпраця стосується холодновоєнного прорадянського
    журналізму в США.
  - >-
    [!epistemic-humility] Сучасна наука не зводить цей поворот до простого слова
    "зрада"; вона вимагає бачити і справжній МУРівський доробок, і справжню
    прорадянську публіцистику.
  section: 'Тінь: Прорадянський поворот і межі відповідальності'
  words: 1600
- points:
  - >-
    Пізній доробок: "Сузір'я Лебедя" 1983 року і "Володарка Понтиди" 1987 року
    як частина складної пізньої рецепції, включно з радянським друком і цензурою.
  - >-
    Родинна тінь і канон: статус небожа Лесі Українки не може автоматично
    канонізувати Косача, але й не дає підстав викреслити його МУРівський внесок.
  - >-
    Завершення шляху: смерть 11 січня 1990 року в Пассеїку, Нью-Джерсі; IEU
    подає 10 січня як варіант, але досьє бере 11 січня за ЕСУ.
  - >-
    Підсумкове питання: як будувати відповідальну пам'ять про автора, у якого
    документована жертва міжвоєнного тиску співіснує з документованим
    прорадянським вибором?
  section: 'Підсумок: Як читати суперечливу спадщину'
  words: 1000
focus: >-
  Юрій Косач як небіж Лесі Українки, письменник МУРівського модернізму,
  в'язень міжвоєнної польської держави, вимушений емігрант і пізніший
  прорадянський публіцист, чию спадщину треба читати без глорифікації,
  викреслення і підміни фактів.
level: BIO
module: bio-236
objectives:
- Аналізувати ранній шлях Юрія Косача через родину Косачів, навчання і польське ув'язнення 1931-1932 років.
- Пояснювати значення МУРу та тексту "Еней і життя інших" для українського модернізму у вигнанні.
- >-
  Розрізняти його вимушену еміграцію перед радянською реокупацією і пізніший
  прорадянський публіцистичний поворот.
- >-
  Дискутувати про відповідальне читання суперечливої спадщини без радянських,
  еміграційних або родинно-канонічних спрощень.
