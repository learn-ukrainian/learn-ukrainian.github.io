content_outline:
- points:
  - >-
    [!biography] Знайомство з Августином Івановичем Волошиним: греко-католицький священник,
    педагог, президент Карпатської України. Народився 17 березня 1874 року у Келечині
    на Закарпатті.
  - >-
    Провокаційне питання: як автор шкільних підручників став президентом держави,
    що проіснувала один день, і чому він становив загрозу для радянських спецслужб у 1945 році?
  section: Розминка
  words: 400
- points:
  - >-
    Педагогічна діяльність: Волошин як автор "Азбуки" (1904), "Практичної граматики
    малоруської мови" (1907) та підручників з математики, логіки, фізики.
  - >-
    [!decolonization] Осмислення термінів "русин" та "українець" у закарпатському контексті.
    Освітня праця Волошина доводить українську орієнтацію регіону всупереч російсько-імперським
    міфам, не стираючи місцевих дебатів про ідентичність.
  - >-
    Педагогічні праці "Педагогічна психологія" (1920) та "Про шкільне право будучої
    української держави" (1942) — освіта як основа державотворення.
  section: 'Формування: Педагогічна школа та мовна праця'
  words: 1000
- points:
  - >-
    Державне будівництво: проголошення Карпатської України в Хусті 15 березня 1939 року
    в умовах розпаду Чехословаччини та агресії Угорщини.
  - >-
    Волошин як голова автономного уряду та президент короткоживучої держави, що виросла
    з місцевих інституцій та обраного Сейму.
  - >-
    [!epistemic-humility] Геополітична пастка: Карпатська Україна постала в неймовірно
    складних умовах — розпад Чехословаччини, тиск нацистської Німеччини, угорська інтервенція.
    Це не робить Волошина німецьким маріонеткою, але й не робить державу вільною від
    авторитарної надзвичайної політики.
  - >-
    [!myth-buster] Спростування російської пропаганди, яка зображує Карпатську Україну як
    штучний німецький проєкт. Це був результат місцевих інституцій та боротьби за мовні права.
  section: 'Діяльність: Педагог та президент Карпатської України'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт у Празі 1 травня 1945 року: радянська контррозвідка (СМЕРШ)
    заарештувала старшого педагога, який не був військовим командиром.
  - >-
    Транспортування до московської в'язниці та загибель у липні 1945 року (IEU/ЕСУ
    наводять 19 липня; деякі меморіальні джерела — 11 липня — розбіжність потребує
    архівної перевірки).
  - >-
    Механізм репресій: знищення символу української державності в Центральній Європі
    після Другої світової війни, а не боротьба зі збройним підпіллям.
  - >-
    [!epistemic-humility] Регіональний контекст: єврейська та угорська меншини Закарпаття
    постраждали від угорської окупації та Голокосту; біографія Волошина не поглинає
    всю цю історію, але модуль не може подавати Карпатську Україну як етнічно просту.
  section: 'Тінь: Арешт СМЕРШем та загибель у Москві'
  words: 1600
- points:
  - >-
    Педагогічна спадщина: підручники Волошина як доказ того, що він був насамперед
    освітянином, а не лише одноденним президентом.
  - >-
    Сучасне значення: Волошин як символ українського державного будівництва на Закарпатті
    та мученик радянської репресивної машини.
  - >-
    Пам'ять: вшанування як педагога, священника та президента в українській історіографії
    з урахуванням складної геополітики 1938–1939 років.
  section: 'Підсумок: Педагог, президент, жертва імперії'
  words: 1000
focus: >-
  Августин Волошин як педагог, державотворець та президент Карпатської України.
  Аналіз його освітньої діяльності, складної геополітики 1939 року та знищення
  радянськими спецслужбами.
