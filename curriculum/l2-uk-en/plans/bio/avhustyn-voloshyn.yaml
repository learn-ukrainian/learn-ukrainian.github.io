focus: >-
  Августин Волошин як педагог, церковний і політичний діяч у чехословацькому,
  карпато-українському, угорському та радянському контекстах; точна хронологія
  1938–1945 років без державницької агіографії й імперської криміналізації.
level: BIO
module: bio-304
objectives:
- Розрізняти освітню, церковну й політичну діяльність Августина Волошина.
- Відтворювати послідовність автономії, рішення Сойму, угорського вторгнення та окупації.
- Порівнювати академічні джерела, відкрито позначаючи розбіжність дати радянського арешту.
- Аналізувати радянське переслідування й сучасну пам'ять без агіографії та імперських кліше.
