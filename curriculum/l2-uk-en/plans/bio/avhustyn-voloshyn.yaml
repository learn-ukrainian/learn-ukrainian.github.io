vocabulary_hints:
- word: автономія
  definition: право території самостійно вирішувати частину внутрішніх справ у межах держави
  pos: ж.
- word: сойм
  definition: назва представницького законодавчого органу Карпатської України
  pos: ч.
- word: окупація
  definition: тимчасове встановлення воєнною силою контролю над чужою територією
  pos: ж.
- word: державотворення
  definition: процес створення та розвитку державних інституцій
  pos: с.
- word: учительська семінарія
  definition: навчальний заклад для підготовки вчителів
  pos: ж.
- word: видавнича справа
  definition: організація підготовки та поширення друкованих видань
  pos: ж.
- word: надзвичайна політика
  definition: рішення влади за умов кризи, війни або розпаду державного порядку
  pos: ж.
- word: розбіжність джерел
  definition: ситуація, коли авторитетні джерела подають різні відомості
  pos: ж.
- word: політика пам'яті
  definition: суспільні й державні способи тлумачення та вшанування минулого
  pos: ж.
- word: агіографія
  definition: некритичне ідеалізоване зображення історичної постаті
  pos: ж.
