content_outline:
- points:
  - >-
    [!biography] Знайомство з Августином Волошиним: греко-католицький священник, педагог,
    президент Карпатської України. Народився 17 березня 1874 року на Закарпатті.
  - >-
    Провокаційне питання: як автор шкільних підручників став президентом держави,
    що проіснувала один день, і чому він становив загрозу для радянських спецслужб у 1945 році?
  section: Розминка
  words: 400
- points:
  - >-
    Педагогічна діяльність: Волошин як автор граматик ("Практична граматика малоруської мови", 1907)
    та підручників, який захищав живу народну мову та українську єдність.
  - >-
    [!decolonization] Осмислення термінів "русин" та "українець" у закарпатському контексті.
    Освітня праця Волошина доводить українську орієнтацію регіону всупереч російсько-імперським міфам.
  - >-
    Державне будівництво: проголошення Карпатської України в Хусті 15 березня 1939 року в умовах
    розпаду Чехословаччини та агресії Угорщини.
  section: 'Діяльність: Педагог та президент Карпатської України'
  words: 1200
- points:
  - >-
    [!epistemic-humility] Геополітична пастка: Карпатська Україна постала в неймовірно складних умовах.
    Українська історіографія цінує цей акт державотворення, але необхідно пам'ятати про
    загрози авторитаризму та тиск нацистської Німеччини в той час.
  - >-
    [!myth-buster] Спростування російської пропаганди, яка зображує Карпатську Україну як
    штучний німецький проєкт. Це був результат місцевих інституцій та боротьби за мовні права.
  - >-
    Трагедія регіону: складні відносини з угорською та єврейською меншинами в контексті війни
    й Голокосту.
  section: 'Контекст: Держава на тлі краху Європи'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт у Празі: 1 травня 1945 року радянська контррозвідка (СМЕРШ) заарештувала
    старшого педагога, який не був військовим командиром.
  - >-
    Смерть: загинув у липні 1945 року в радянській в'язниці в Москві (дата уточнюється: 11 чи 19 липня).
  - >-
    Сучасне значення: Волошин як символ українського державного будівництва на Закарпатті
    та мученик радянської репресивної машини.
  section: 'Тінь: Арешт СМЕРШем та загибель у Москві'
  words: 1200
