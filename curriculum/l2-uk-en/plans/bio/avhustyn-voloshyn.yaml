content_outline:
- points:
  - >-
    [!biography] Августин Волошин як греко-католицький священник, педагог,
    редактор і політик Закарпаття, а не лише президент Карпатської України.
  - >-
    [!decolonization] Закарпаття між угорською спадщиною, Чехословаччиною та
    українським національним рухом; регіональні назви не зводяться до російської
    імперської схеми й не стирають місцевої багатоманітності.
  section: 'Вступ: педагог, священник і політик'
  words: 600
- points:
  - Навчання, священницьке служіння та робота в Ужгородській учительській семінарії.
  - Підручники, преса й товариства як інституції українського культурного розвитку.
  - >-
    Мовна діяльність у середовищі історичних руських, русинських та українських
    самоназв без ретроактивного спрощення.
  section: 'Освіта і видавнича праця'
  words: 900
- points:
  - Депутатська і партійна діяльність у Чехословаччині та прочехословацька орієнтація.
  - Призначення прем'єр-міністром автономного уряду 26 жовтня 1938 року.
  - >-
    [!anti-hagiography] Зосередження політичного поля й надзвичайні рішення 1938–1939
    років розглядаються як предмет критики, а не як доказ безпомилковості лідера.
  section: 'Політика в Чехословаччині та автономний уряд'
  words: 1000
- points:
  - >-
    Сойм 15 березня 1939 року, проголошення незалежності та обрання Волошина
    президентом у момент остаточного розпаду Чехо-Словаччини.
  - Угорське військове вторгнення й окупація; виїзд Волошина через Румунію.
  - >-
    [!epistemic-humility] Формула «одноденна держава» не підміняє послідовність
    автономії, рішення Сойму, бойових дій і встановлення окупаційної адміністрації.
  section: 'Хронологія: від автономії до угорської окупації'
  words: 1100
- points:
  - Прага, Український вільний університет і науково-педагогічна робота під час війни.
  - >-
    Відсутність у прийнятому наборі джерел підстав перетворювати весь воєнний період
    на героїчну паузу або приписувати Волошину недокументовані контакти й накази.
  - >-
    Монографія Інституту історії розрізняє перше затримання, обшук і звільнення
    11 травня та остаточний арешт 15 травня 1945 року; ЕСУ подає 12 травня,
    тому модуль називає розбіжність і не вигадує її розв'язання.
  - >-
    Дозвіл уряду німецьким мешканцям створити націонал-соціалістичну партію
    відділяється від пізнішої авторської оцінки зовнішньополітичної орієнтації Волошина.
  section: 'Еміграція, воєнний час і межі доказу'
  words: 800
- points:
  - Радянський арешт у Празі, перевезення до Москви, ув'язнення та смерть 19 липня 1945 року.
  - >-
    [!decolonization] Радянська формула «ворожої діяльності» не приймається як
    нейтральний опис; водночас медичні й слідчі подробиці не домислюються.
  - >-
    [!myth-buster] Посмертне державне вшанування є джерелом політики пам'яті, а не
    доказом кожного біографічного твердження.
  section: 'Радянський арешт і смерть у Москві'
  words: 800
