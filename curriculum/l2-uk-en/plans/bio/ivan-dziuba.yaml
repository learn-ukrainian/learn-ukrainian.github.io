content_outline:
- points:
  - 'Провокація: як головний ідеологічний текст українського опору ХХ століття був побудований на цитатах Леніна?'
  - 'Розгляд парадоксу: звинувачення радянської системи її ж мовою — у чому була геніальність і небезпека цього методу?'
  - '[!biography] Представлення Івана Дзюби як людини, що наважилася кинути інтелектуальний виклик системі.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Моральна дилема Дзюби — «покаяння» 1973 року. Це була тактична поступка, що дозволила вижити і працювати далі,
    чи зрада ідеалів, на відміну від позиції Стуса, який обрав табір?'
  - 'Дебат 2: Спадщина Дзюби. Чи був «Інтернаціоналізм...» вершиною його діяльності, а решта життя — довгою тінню компромісу?
    Чи його подальша робота як міністра і академіка була не менш важливою?'
  - '[!epistemic-humility] Визнання складності морального вибору в умовах тоталітарної системи — відсутність легких відповідей.'
  - '[!decolonization] Текст Дзюби як перший системний аналіз колоніальної політики СРСР щодо України, зроблений зсередини
    системи.'
  section: 'Конфліктна карта: Тактика інтелектуала vs етика дисидента'
  words: 900
- points:
  - Народження у Миколаївці на Донеччині (1931) та дитинство, опалене війною і повоєнним голодом — формування соціальної чутливості.
  - 'Робітнича юність та навчання в Донецьку: як промисловий край виховав гуманітарія.'
  - Аспірантура в Києві, Інститут літератури — входження в столичне інтелектуальне середовище, знайомство з майбутніми шістдесятниками
    (Світличний, Стус, Сверстюк).
  section: 'Формування: Шлях із Донбасу'
  words: 1000
- points:
  - Виступ у Бабиному Яру (1966) — публічний акт громадянської мужності, що став прологом до розриву з системою.
  - Написання трактату за три тижні у відповідь на арешти української інтелігенції 1965 року.
  - 'Аргументація «від протилежного»: використання ленінських цитат про право націй на самовизначення для критики реальної
    радянської політики.'
  - Поширення у самвидаві, міжнародний резонанс, переклади — текст стає голосом українського спротиву на Заході.
  section: 'Діяльність: «Інтернаціоналізм чи русифікація?»'
  words: 1300
- points:
  - '[!anti-hagiography] Арешт (1972) і 18 місяців у слідчому ізоляторі КДБ. Тиск, хвороба, вибір між табором і «каяттям».'
  - Публікація «заяви» з визнанням «помилок» — акт, який багато хто з побратимів (насамперед, Василь Стус) не зміг йому пробачити.
  - '[!myth-buster] Поширений міф, що Дзюба «зламався». Реальність складніша: він обрав шлях виживання, щоб продовжити роботу,
    але заплатив за це високу моральну ціну.'
  - 'Дилема: чи мав він право на такий вибір, коли інші обирали смерть у таборах? Це центральне питання його «тіні».'
  section: 'Тінь: Вимушене покаяння'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь — у чому полягала унікальність стратегії Дзюби і які ризики вона несла.'
  - Від «в’язня сумління» до міністра культури незалежної України (1992-1994) — осмислення цього парадоксального шляху.
  - '[!decolonization] Спадщина Дзюби — це не лише текст, а й модель інтелектуального спротиву, що доводить: зброєю може бути
    не тільки багнет, а й точна цитата.'
  - 'Актуальність «Інтернаціоналізму...» в умовах сучасної російсько-української війни: як змінились форми русифікації і чи
    працюють аргументи Дзюби сьогодні?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
