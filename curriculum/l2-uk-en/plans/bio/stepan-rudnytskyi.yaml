content_outline:
- points:
  - >-
    [!biography] Знайомство зі Степаном Рудницьким: видатний географ,
    картограф, етнограф, академік ВУАН, фундатор української політичної та
    фізичної географії.
  - >-
    Провокаційне питання: чому радянська влада вбачала смертельну загрозу в
    географічних картах та наукових дослідженнях території?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та формування: народження у Перемишлі (Австро-Угорщина). Робота в
    різних імперських та державних контекстах.
  - >-
    Науковий внесок: "Коротка географія України" (1910, 1914), "Україна край і
    нарід" (1916). Розвиток географічної термінології ("Начерк географічної
    термінології", 1908).
  section: 'Формування: Фундатор української географії'
  words: 1000
- points:
  - >-
    [!decolonization] Географія як засіб державотворення: аналіз простору
    України. "Огляд національної території України" (1923), де Москва
    розглядається як несумісна з українською незалежністю.
  - >-
    Політична картографія: просторове обґрунтування української нації.
    Педагогічний підхід у книзі "Україна — наш рідний край" (1921).
  section: 'Діяльність: Картографія та політична географія'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Механізм терору: арешт у березні 1933 року. Херсонська
    обласна бібліотека подає 23 березня, ЕСУ — 21 березня; розбіжність
    показуємо, а не приховуємо. Звинувачення були сфабриковані.
  - >-
    [!epistemic-humility] Засудження у вересні 1933 року до 5 років таборів;
    ЕСУ подає 23 вересня. Конкретного номера архівної справи не встановлено.
  - >-
    [!myth-buster] Смертний вирок 9 жовтня 1937 року (ЕСУ); розстріляний
    3 листопада 1937 року в урочищі Сандармох (Карелія) — так подають і УІНП,
    і ЕСУ. Давніша версія про смерть на Соловках не підтверджується.
  section: 'Тінь: Сандармох та знищення'
  words: 1600
- points:
  - >-
    Доля наукової спадщини: збереження географічних праць та карт, попри
    руйнування інституційної школи Рудницького в УСРР.
  - 'Сучасне значення: Степан Рудницький як основоположник розуміння України як самостійного геополітичного суб''єкта.'
  section: 'Підсумок: Пам''ять про картографа нації'
  words: 1000
focus: >-
  Степан Рудницький як основоположник української фізичної та політичної
  географії, картограф національної території та жертва радянського терору в
  урочищі Сандармох.
