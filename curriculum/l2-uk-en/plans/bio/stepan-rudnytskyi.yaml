content_outline:
- points:
  - >-
    [!biography] Знайомство зі Степаном Рудницьким: географ, геолог, картограф,
    етнограф і громадський діяч за визначенням ЕСУ; доктор філософії (1901),
    професор (1904), дійсний член НТШ (1901), академік ВУАН (1929); засновник і
    директор Українського науково-дослідного інституту географії і картографії
    в Харкові від 1927 року.
  - >-
    Відкрите питання: що саме перевірені джерела документують про обвинувачення
    проти географа — і чого вони не пояснюють? Мотиву держави сторінки не
    подають; вони подають формули обвинувачення.
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та формування: народження у Перемишлі (Австро-Угорщина). Робота в
    різних імперських та державних контекстах.
  - >-
    Науковий внесок за переліком праць ЕСУ: "Начерк географічної термінології"
    (Л., 1908) і "Коротка географія України" (К., 1910, ч. 1 «Фізична
    географія»; Л., 1914, ч. 2 «Антропогеографія»).
  section: 'Формування: Фундатор української географії'
  words: 1000
- points:
  - >-
    [!decolonization] Україна як самостійний предмет географічного опису: ЕСУ
    подає, що Рудницький заклав наукові основи української географічної та
    картографічної наук, окреслив українську національну територію й розкрив
    географічне місце України в Європі та світі.
  - >-
    [!epistemic-humility] Праці за переліком ЕСУ: "Начерк географічної
    термінології" (Л., 1908), "Коротка географія України" (К., 1910, ч. 1;
    Л., 1914, ч. 2), "Україна — наш рідний край" (Л., 1917; 1920), "Огляд
    національної території України" (Берлін, 1923). Зміст останньої ЕСУ не
    переказує — назву подаємо без інтерпретації й не приписуємо їй тез, яких
    перевірені джерела не наводять.
  section: 'Діяльність: Картографія та політична географія'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Механізм терору: арешт у березні 1933 року. Херсонська
    обласна бібліотека подає 23 березня, ЕСУ — 21 березня; розбіжність
    показуємо, а не приховуємо. Формули «контрреволюційна організація»,
    «шкідництво», «шпигунство» подаємо як мову обвинувачення; вирок скасувала
    реабілітація 1965 року (ЕСУ).
  - >-
    [!epistemic-humility] Засудження у вересні 1933 року до 5 років таборів;
    ЕСУ подає 23 вересня. Конкретного номера архівної справи не встановлено.
  - >-
    [!epistemic-humility] Смертний вирок 9 жовтня 1937 року (ЕСУ); розстріляний
    3 листопада 1937 року в урочищі Сандармох (Карелія) — так подають і УІНП,
    і ЕСУ. Соловки в записі ЕСУ є місцем ув'язнення, а не смерті; Херсонська
    бібліотека місця страти не називає й подає могилу як невідому. Вирок і
    виконання — різні дати.
  section: 'Тінь: Сандармох та знищення'
  words: 1600
- points:
  - >-
    [!epistemic-humility] Доля наукової спадщини: ЕСУ фіксує, що рукописи двох
    книг, написаних у неволі, не збереглися. Долі інших працівників інституту
    ухвалені джерела не подають — тож про них модуль не твердить нічого.
  - >-
    [!anti-hagiography] Праця й пам'ять — різні рівні твердження: перелік праць
    і посад описує зроблене, а формула «основоположник географії України» подана
    в рекомендованій літературі ЕСУ як пізніша оцінка ролі. Обидва рівні
    потрібні, але їх не змішуємо.
  section: 'Підсумок: Пам''ять про картографа нації'
  words: 1000
focus: >-
  Степан Рудницький як основоположник української фізичної та політичної
  географії, картограф національної території та жертва радянського терору в
  урочищі Сандармох.
level: BIO
module: bio-309
objectives:
- Аналізувати науковий внесок Степана Рудницького у розвиток української географії та картографії.
- >-
  Аналізувати те, що ЕСУ приписує Рудницькому в політичній географії України,
  і відрізняти це від пізніших оцінок його ролі.
- >-
  Оцінювати механізм радянського терору на прикладі обвинувачень проти вченого,
  його страти в Сандармосі та реабілітації 1965 року, яка вирок скасувала.
- >-
  Відрізняти те, що ухвалені джерела документують про арешт, вирок і страту,
  від того, чого вони не подають.
