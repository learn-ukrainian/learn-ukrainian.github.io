content_outline:
- points:
  - '[!biography] Знайомство зі Степаном Рудницьким: видатний географ, картограф, етнограф, академік ВУАН, фундатор української політичної та фізичної географії.'
  - 'Провокаційне питання: чому радянська влада вбачала смертельну загрозу в географічних картах та наукових дослідженнях території?'
  section: Розминка
  words: 400
- points:
  - 'Освіта та формування: народження у Перемишлі (Австро-Угорщина). Робота в різних імперських та державних контекстах.'
  - 'Науковий внесок: "Коротка географія України" (1910, 1914), "Україна край і нарід" (1916). Розвиток географічної термінології ("Начерк географічної термінології", 1908).'
  section: 'Формування: Фундатор української географії'
  words: 1000
- points:
  - '[!decolonization] Географія як засіб державотворення: аналіз простору України. "Огляд національної території України" (1923), де Москва розглядається як несумісна з українською незалежністю.'
  - 'Політична картографія: просторове обґрунтування української нації. Педагогічний підхід у книзі "Україна — наш рідний край" (1921).'
  section: 'Діяльність: Картографія та політична географія'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм терору: арешт 23 березня 1933 року. Сфабриковані звинувачення в участі в "Українській Військовій Організації" та шпигунстві.'
  - '[!epistemic-humility] Засудження 23 вересня 1933 року до 5 років таборів (Свірлаг, Білбалтлаг). Відсутність конкретного номера справи.'
  - '[!myth-buster] Страта: рішення спеціальної трійки УНКВС Ленінградської області. Розстріляний 3 листопада 1937 року в урочищі Сандармох (Карелія). Спростування старого міфу про смерть на Соловках.'
  section: 'Тінь: Сандармох та знищення'
  words: 1600
- points:
  - 'Доля наукової спадщини: збереження географічних праць та карт, попри руйнування інституційної школи Рудницького в УСРР.'
  - 'Сучасне значення: Степан Рудницький як основоположник розуміння України як самостійного геополітичного суб''єкта.'
  section: 'Підсумок: Пам''ять про картографа нації'
  words: 1000
focus: Степан Рудницький як основоположник української фізичної та політичної географії, картограф національної території та жертва радянського терору в урочищі Сандармох.
level: BIO
module: bio-309
objectives:
- Аналізувати науковий внесок Степана Рудницького у розвиток української географії та картографії.
- Досліджувати значення його політичної географії для обґрунтування української державності.
- Оцінювати механізми радянського терору на прикладі сфабрикованих звинувачень проти вченого та його страти в Сандармосі.
- Розуміти вплив знищення географічної школи на розвиток науки в радянській Україні.
