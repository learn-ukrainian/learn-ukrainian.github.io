content_outline:
- points:
  - >-
    [!biography] Всеволод Нестайко: класик української дитячої літератури, автор
    «Тореадорів з Васюківки», «Країни Сонячних Зайчиків», «Лісової школи» і
    численних шкільних та пригодницьких повістей.
  - >-
    Провокаційне питання: як письменник, у якого дитинство забрали репресія,
    голод і війна, створив для українських дітей світ сміху, витівок, дружби і
    моральної відповідальності?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 30 січня 1930 року в Бердичеві. Батько Зіновій Нестайко, пов'язаний
    з Українськими січовими стрільцями та Українською галицькою армією, був
    заарештований радянською владою 1933 року як «ворог народу» і загинув після
    репресії.
  - >-
    Мати з сином утекли від голоду до Києва. Дитинство Нестайка проходило під
    знаком батькової відсутності, страху, голоду, воєнного Києва й утрачених
    шкільних років.
  - >-
    [!epistemic-humility] Це родинна травма і радянське насильство проти батька,
    а не документована справа проти самого майбутнього письменника. Не можна
    додавати вигадані допити, самвидав чи заборону Нестайка.
  section: 'Формування: Репресований батько, голод і воєнне дитинство'
  words: 1000
- points:
  - >-
    Після філології в Київському університеті Нестайко працював у «Барвінку»,
    «Молоді» і з 1956 до 1987 року очолював редакцію для молодших школярів у
    видавництві «Веселка».
  - >-
    «В Країні Сонячних Зайчиків» (1959) відкриває лінію світла, гри і етичної
    фантазії. Це не втеча від життя, а спосіб берегти дитячу психіку, не
    заперечуючи, що в житті є втрати і страх.
  - >-
    «Тореадори з Васюківки» виросли з частин 1960-х років і стали трилогією про
    Яву, Павлушу, сором, дружбу, вигадку, село і відповідальність. Міжнародне
    визнання 1979 року засвідчило силу української дитячої пригоди.
  - >-
    «Дивовижні пригоди в лісовій школі», шкільні повісті, детективи, п'єси,
    радіобайки і журнальна робота показують Нестайка як інституційного творця
    українського дитячого читання.
  section: 'Діяльність: Дитяча суб''єктність, гумор і українська пригода'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Нестайко десятиліттями працював у радянських офіційних
    дитячих установах і видавництвах. Його не треба перетворювати на підпільного
    автора або дисидента.
  - >-
    Радянське дитяче видавництво мало свої очікування: «правильні» діти,
    ідеологічні шари, шкільна мораль, редакційні обмеження. У таких умовах
    Нестайко робив головними самих дітей, їхню мову, гру, сором, ризик і вибір.
  - >-
    Після 1991 року він перевидавав радянські тексти в нових авторських редакціях
    і знімав ідеологічні нашарування, зокрема у «Тореадорах з Васюківки»,
    «Одиниці з обманом» і «П'ятірці з хвостиком».
  - >-
    [!myth-buster] Не кожна комічна сцена в Нестайка є прямим антирадянським
    жестом. Деколонізаційний зміст точніше бачити в українській мові, сільській
    конкретиці, дитячій суб'єктності і праві автора переглянути старі видання.
  section: 'Тінь: Радянське дитяче видавництво і авторські редакції після 1991 року'
  words: 1500
- points:
  - >-
    Смерть 16 серпня 2014 року в Києві не перервала читацького життя його творів:
    «Тореадори» увійшли до шкільного канону, а герої Нестайка лишилися мовою
    дитячої дружби для кількох поколінь.
  - >-
    [!decolonization] Українська дитяча література тут не додаток до «серйозної»
    культури. Вона тримає мову, гумор, моральний словник і право дитини бути
    дієвою особою у власній історії.
  - >-
    Підсумкове питання: як учити Нестайка так, щоб не перетворити його на
    ностальгійну листівку, а побачити травму, працю видавця, пізні редакції і
    складну етику радості?
  section: 'Підсумок: Канон радості після втраченого дитинства'
  words: 1000
focus: >-
  Всеволод Нестайко як класик української дитячої літератури, який проніс через
  родинну репресію, голод і війну етику радості, дружби, гумору і дитячої
  суб'єктності. Семінар аналізує «Тореадорів з Васюківки», «Сонячних Зайчиків»,
  радянські видавничі рамки і авторські редакції після 1991 року.
level: BIO
module: bio-396
objectives:
- >-
  Пояснювати, як репресія батька, голод і воєнне дитинство формують людський
  контекст Нестайкової літератури радості.
- >-
  Аналізувати дитячу суб'єктність, гумор, дружбу і моральну відповідальність у
  «Тореадорах з Васюківки» та інших творах.
- >-
  Розрізняти офіційну радянську дитячу видавничу систему і пізніше авторське
  зняття ідеологічних нашарувань.
- >-
  Оцінювати українську дитячу літературу як простір мови, пам'яті й
  деколонізаційної тяглості без перебільшення підпільного статусу автора.
