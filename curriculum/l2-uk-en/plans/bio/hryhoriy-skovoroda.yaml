content_outline:
- points:
  - 'Парадокс: «Світ ловив мене, та не спіймав». Як людина, що все життя була в русі — від імператорського двору до європейських
    університетів — могла стверджувати, що світ її не спіймав? У чому полягала її свобода?'
  - '[!biography] Провокаційне питання: чи був Сковорода просто диваком-аскетом, чи його мандрівка була свідомою формою протесту
    проти імперської системи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Український Сократ» vs європейський філософ. Чи був Сковорода лише місцевим мудрецем, що повторював античні
    ідеї, чи він був оригінальним мислителем у контексті європейського бароко та Просвітництва?'
  - 'Дебат 2: Радянська vs пострадянська інтерпретація. Як СРСР намагався «привласнити» Сковороду, зобразивши його «народним
    філософом» та атеїстом? Як сучасна Україна перетворила його на національний символ (500 грн) та ікону духовної стійкості
    (на тлі знищення музею в 2022)?'
  - '[!epistemic-humility] Визнання різних «облич» Сковороди: для одних він — християнський містик, для інших — предтеча екзистенціалізму,
    для третіх — символ нонконформізму.'
  - '[!decolonization] Сковорода як відповідь на імперський тиск: його відмова від кар’єри — це не просто особистий вибір,
    а політичний жест в умовах ліквідації української автономії.'
  section: 'Конфліктна карта: Святий, філософ чи бунтар?'
  words: 900
- points:
  - 'Освітня траєкторія: Києво-Могилянська академія як інтелектуальна основа. Що дала йому найкраща освітня інституція тогочасної
    України?'
  - 'Досвід при імперському дворі: робота в придворній капелі в Петербурзі. Чому він покинув блискучу кар''єру заради невизначеності?'
  - 'Велика подорож: Угорщина, Австрія, Словаччина, можливо, Німеччина та Італія. Які ідеї він привіз із собою? Як це змінило
    його світогляд порівняно з тими, хто залишився в імперії?'
  - 'Формування відрази до "невидимих кліток": перші конфлікти в Переяславському та Харківському колегіумах як провісники
    майбутньої мандрівної філософії.'
  section: 'Формування: Від Могилянки до європейських університетів'
  words: 1000
- points:
  - 'Ключові ідеї: аналіз вчення про «три світи» та «дві натури», концепції «нерівної всім рівності» та, найголовніше, «сродної
    праці» — праці за покликанням.'
  - 'Первинні джерела: читання та аналіз фрагментів з «Розмови п''яти подорожніх про істинне щастя в житті» та «Алфавіту,
    чи Букваря світу».'
  - 'Літературна творчість як філософський інструмент: байки зі збірки «Байки Харківські» та пісні з «Саду божественних пісень».
    Як він використовував літературні жанри для поширення своїх ідей?'
  - 'Педагогіка Сковороди: чому його методи викладання (діалоги, прогулянки) були революційними для того часу і призводили
    до звільнень?'
  section: 'Діяльність: Філософія серця і "сродна праця"'
  words: 1300
- points:
  - '[!anti-hagiography] Невдачі та конфлікти: Сковороду двічі звільняли з посади викладача. Чи була причина лише в його новаторських
    методах, чи також у складному характері та небажанні йти на компроміси?'
  - '[!myth-buster] Міф про «бідного аскета». Сковорода не був жебраком, він жив у маєтках своїх друзів-шляхтичів. Чи не є
    його «втеча від світу» формою елітарного ескапізму, доступного лише завдяки протекції багатих покровителів?'
  - 'Стратегія неучасті: в часи, коли Україна втрачала останні залишки автономії, а селянство потрапляло в рабство, Сковорода
    проповідував індивідуальне самовдосконалення. Чи не була його філософія аполітичною і, можливо, недостатньою відповіддю
    на виклики часу?'
  - Чому він не друкував свої твори? Це була свідома позиція, страх перед цензурою чи нездатність знайти спільну мову з видавцями?
  section: 'Тінь: Втеча від світу чи неспроможність його змінити?'
  words: 900
- points:
  - 'Повернення до парадоксу: «Світ ловив мене, та не спіймав». Маючи nuanced understanding, студенти дають відповідь: Сковорода
    втік не від фізичного світу, а від його системи цінностей — кар''єризму, марнославства, влади.'
  - 'Кордоцентризм: як філософія серця Сковороди вплинула на всю подальшу українську думку (Куліш, Юркевич, Чижевський).'
  - '[!decolonization] Сковорода як зброя: знищення російською ракетою його музею в 2022 році перетворило філософа на символ
    незламності українського духу. Як мертвий філософ продовжує воювати проти імперії?'
  - 'Актуальність сьогодні: чи є ідея «сродної праці» розкішшю в сучасному світі, чи, навпаки, — необхідною умовою для психічного
    здоров''я та щастя?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Сковорода як символ духовної свободи, філософія серця, вчення про "сродну працю", та його роль як інтелектуального
  опонента імперії
