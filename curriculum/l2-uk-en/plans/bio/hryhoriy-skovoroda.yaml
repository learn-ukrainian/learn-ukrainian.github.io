slug: hryhoriy-skovoroda
version: '2.0'
title: 'Григорій Сковорода: Мандрівний філософ'
content_outline:
- section: Вступ — Український Сократ
  points:
  - Сковорода як символ духовної свободи
  - Філософія серця та її актуальність
  - Образ мандрівного вчителя
- section: Життєпис
  points:
  - Дитинство та навчання в Києво-Могилянській академії
  - Перебування в придворній капелі в Петербурзі
  - Подорож країнами Європи
  - Педагогічна діяльність у Переяславі та Харкові
  - Відмова від світської та церковної кар'єри
  - Роки мандрів
- section: Історичний контекст
  points:
  - Українське Просвітництво
  - Ліквідація автономії (Січ, кріпацтво)
- section: Внесок
  points:
  - Вчення про "сродну працю"
  - Три світи та дві природи
  - Літературна спадщина (байки, пісні)
- section: Останні роки
  points:
  - Життя на Слобожанщині
  - Передчуття смерті та легенда про могилу
  - Епітафія: Світ ловив мене, та не спіймав
- section: Спадщина
  points:
  - Вплив на український кордоцентризм
  - Символ ідентичності (500 гривень)
  - Знищення музею у Сковородинівці 2022 р.
- section: Підсумок
  points:
  - Сковорода як пророк внутрішньої незалежності
