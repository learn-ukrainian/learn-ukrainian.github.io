objectives:
- Критично аналізувати філософську систему Сковороди, зокрема вчення про "сродну працю" та "нерівну рівність"
- Порівнювати різні інтерпретації постаті Сковороди (радянську, національну, сучасну), виявляючи їх ідеологічне підґрунтя
- Оцінювати стратегію інтелектуального спротиву імперії через нонконформізм та відмову від участі
- Дослідити новаторство Сковороди в літературних жанрах (філософська байка, пісня-романс)
- Формулювати аргументовану позицію щодо "тіньових" аспектів біографії філософа, уникаючи агіографії
