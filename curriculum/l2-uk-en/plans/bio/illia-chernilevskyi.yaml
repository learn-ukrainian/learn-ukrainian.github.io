content_outline:
- points:
  - 'Провокація: Ілля Чернілевський прожив лише 22 роки, але його творчість порівнюють із класиками «Розстріляного відродження».
    Як поет і музикант стає воїном, і як його смерть перетворює його на символ цілого покоління?'
  - '[!biography] Короткий огляд постаті — митець, воїн, філософ.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи коректно називати нове покоління митців, що загинули на війні, «Розстріляним відродженням 2.0»? Аргументи
    «за» (історична паралель геноциду) та «проти» (унікальність контекстів 1930-х та 2020-х).'
  - 'Дебат 2: Як пам’ятати Чернілевського — як поета, воїна, музиканта чи мученика? Чи не применшує одна іпостась іншу?'
  - '[!epistemic-humility] Визнання, що єдиної «правильної» інтерпретації немає; спадщина Іллі є полем напруги між мистецтвом,
    війною та національною пам''яттю.'
  - '[!decolonization] Розгляд обох «відроджень» як етапів єдиного процесу деколонізації — боротьби за українську суб''єктність
    проти імперського тиску.'
  section: 'Конфліктна карта: Тяглість чи новий виток?'
  words: 900
- points:
  - 'Родина та оточення: зростання у творчій, патріотичній сім''ї. Вплив батька, режисера та поета.'
  - 'Рання творчість: перші вірші, захоплення музикою, інтерес до історії та філософії.'
  - 'Поворотний момент: Революція Гідності 2014 року та її вплив на світогляд підлітка.'
  - 'Освіта: навчання в КНУ ім. Карпенка-Карого, формування як митця та інтелектуала.'
  section: 'Формування: Народження воїна-поета'
  words: 1000
- points:
  - Аналіз ключових поезій та пісень до повномасштабного вторгнення.
  - 'Рішення піти на фронт у 2022 році: мотивація, щоденники, рефлексії.'
  - 'Творчість на війні: як досвід бойових дій трансформував його поезію та музику.'
  - 'Первинні джерела: цитати з листів, віршів, інтерв''ю, що розкривають його внутрішній світ.'
  section: 'Діяльність: Творчість як зброя'
  words: 1300
- points:
  - '[!anti-hagiography] Відмова від створення ікони. Ілля як жива людина з сумнівами, страхами та втомою.'
  - 'Внутрішній конфлікт: боротьба між покликанням творити та обов''язком захищати.'
  - Тінь — це не написані вірші, не зіграні концерти, не прожите життя. Трагедія втраченого потенціалу для культури.
  - '[!myth-buster] Розвінчання міфів про «романтику війни». Показ жорстокої реальності через його власні тексти.'
  section: 'Тінь: Ціна вибору'
  words: 900
- points:
  - 'Повернення до розминки: як смерть Іллі Чернілевського перетворила його на символ?'
  - '[!decolonization] Його життя і смерть як акт культурного та національного самоствердження, що прямо заперечує імперську
    спробу знищення української ідентичності.'
  - 'Спадщина для культури: вплив на сучасну українську поезію та музику.'
  - 'Спадщина для покоління: Ілля як уособлення долі «покоління Z», що взяло на себе відповідальність за країну.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Життя, творчість та спадщина Іллі Чернілевського як представника молодого покоління українських митців, загиблих під
  час повномасштабного вторгнення; тяглість російських репресій проти української культури.
