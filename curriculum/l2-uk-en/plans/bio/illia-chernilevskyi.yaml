content_outline:
- points:
  - 'Джерельне питання: як описати поета, музиканта й перекладача Іллю Чернілевського без хибного віку, поколіннєвого ярлика й психологічної реконструкції?'
  - Моніторинг Українського ПЕН і репортаж Суспільного про книжку підтримують різні частини біографії.
  - '[!biography] Професійні ролі, дата й місце загибелі та посмертна книжка за прямими джерелами.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: чому вік 30 років спростовує попереднє твердження про 22-річного представника покоління Z?'
  - 'Дебат 2: що моніторинг втрат може підтвердити, а що потребує окремої біографічної документації?'
  - '[!epistemic-humility] Не приписувати рішенням Чернілевського внутрішньої «трансформації», якщо джерело лише фіксує дію.'
  - '[!decolonization] Професійну роботу в українському дубляжі розглядають як конкретну культурну практику, а не як абстрактний «мовний фронт».'
  section: 'Конфліктна карта: Біографічний факт і поколіннєвий ярлик'
  words: 900
- points:
  - Ілля Чернілевський — поет, музикант і перекладач пісень за моніторингом ПЕН.
  - Понад десять років перекладав пісні для українського дубляжу фільмів та анімації названих студій.
  - Рання збірка «Розділимо простір» і подальша книжка «Я птах між тенет» потребують окремого читання текстів для літературного аналізу.
  - Сімейний зв'язок зі Станіславом Чернілевським подається лише як біографічний факт, не як пояснення таланту.
  section: 'Формування: Поезія, музика і переклад для дубляжу'
  words: 1000
- points:
  - Добровільне долучення до оборони України в межах формулювання моніторингу ПЕН.
  - Загибель 7 травня 2022 року біля села Кам'янка на Донеччині внаслідок мінометного обстрілу за ПЕН.
  - Вік 30 років є прямим полем моніторингу й виключає стару планову цифру 22.
  - Суспільне описує презентацію посмертної книжки 2024 року й називає військову службу та обставини загибелі.
  section: 'Діяльність: Перекладацька праця, служба і посмертне видання'
  words: 1300
- points:
  - '[!anti-hagiography] Добровільна служба й загибель не визначають художню якість текстів; потрібен аналіз законного видання.'
  - '[!myth-buster] Чернілевський не є представником покоління Z за перевіреним віком, а аналогія з Розстріляним відродженням не є фактом біографії.'
  - Не перетворювати роботу з російськомовними або україномовними текстами на психологічний сюжет без прямого висловлювання.
  - Відсутність відкрито ліцензованого портрета означає text-only fallback; новинні й родинні фото не копіюються.
  section: 'Межі джерел: Творчість, мова і військова служба'
  words: 900
- points:
  - Таблиця «професійна роль — дата — джерело — що лишається невідомим».
  - Порівняння інституційного моніторингу втрат із репортажем про пізнішу культурну подію.
  - '[!decolonization] Український дубляж розглядається через працю конкретного перекладача, не через російську мову як центр оповіді.'
  - Висновок про перевірну біографію без ярлика покоління й без неатрибутованих цитат.
  section: 'Дискусія та підсумок: Точність проти символічного шаблону'
  words: 700
focus: Джерельно обмежений аналіз поетичної, музичної, перекладацької та військової біографії Іллі Чернілевського з виправленням хибного віку й поколіннєвого ярлика.
