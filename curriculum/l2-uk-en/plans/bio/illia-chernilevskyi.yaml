objectives:
- Побудувати атрибутовану хронологію поетичної, музичної, перекладацької та військової праці Іллі Чернілевського.
- Виправити хибне твердження про 22 роки й покоління Z за прямим полем моніторингу Українського ПЕН.
- Розрізняти моніторинг втрат, культурний репортаж, меморіальну оцінку й літературний аналіз.
- Формулювати висновки без психологічної реконструкції, історичної тотожності та неперевірених цитат.
