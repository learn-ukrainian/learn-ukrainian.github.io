content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Падалкою: український художник-монументаліст,
    графік, ілюстратор, педагог; один із найяскравіших бойчукістів Розстріляного
    відродження.
  - >-
    Провокаційне питання: чому радянська влада вбачала загрозу в муралах, дитячих
    книжках і гравюрах до «Слова о полку Ігоревім»?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження у селі Жорноклови (Полтавщина; у джерелах
    розходяться дати 1894-10-27 та 1894-11-15 — [!epistemic-humility] зафіксувати
    розбіжність, не зводити її до однієї «канонічної»).
  - >-
    Навчання в Миргородській художньо-промисловій школі (Опанас Сластіон), Київському
    художньому училищі та Українській державній академії мистецтв у майстерні
    Михайла Бойчука та Василя Кричевського.
  - >-
    [!decolonization] Формування як майстра національної форми: не копія європейського
    авангарду, а синтез монументального мистецтва, книжкової графіки та педагогіки.
  section: 'Формування: Від Миргорода до академії Бойчука'
  words: 1000
- points:
  - >-
    Колективні мурали: розписи Луцьких казарм у Києві (1919, знищені 1922),
    фреска «Відпочинок» у Червонозаводському українському драматичному театрі в
    Харкові (1933–1935).
  - >-
    Книжкова графіка: ілюстрації до «Барвінка», серія гравюр до «Слова о полку
    Ігоревім» (1928), оформлення «Мистецтва Слобожанщини», ілюстрації до Дідро
    та Кеведо.
  - >-
    Живопис і гравюра: «Яблуко» (1926), «Наступ червоної кінноти» (1927), серія
    ДніпроГЕС (1928).
  - >-
    Педагогіка та полеміка: захист плюралізму в АРМУ — «АРМУ не є організація
    якогось одного напряму майстрів» (*Червоний шлях*, 1926); [!anti-hagiography]
    самоіронія в інтерв'ю 1929: «На жаль, я був поганим учнем Бойчука».
  section: 'Діяльність: Від муралів до книжкової графіки'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Падалка не був «другорядним» бойчукістом: IEU і музейні
    джерела показують самостійного майстра графіки, дизайну книг і монументаліста.
  - >-
    Механізм терору: перший із бойчукістів, арештований у вересні 1936 (29.09.1936
    за музейним датуванням); звинувачення за ст. 54-8 і 54-11 КК УРСР у «націонал-
    фашистській українській організації» — [!decolonization] мова радянського
    слідства, не прийнятний опис.
  - >-
    Суд і страта: Військова колегія Верховного суду СРСР 13 липня 1937 засудила
    до вищої міри покарання; розстріляний того ж дня в Києві.
  - >-
    Знищення спадщини: конфіскація картин, знищення особистого архіву, зруйновані
    мурали; дружина Марія Паско згодом арештована й заслана на Колиму. Архів:
    HDA SBU Харків, справа 014860 (листи 6, 20, 220–222 у *Реабілітовані історією*).
  section: 'Тінь: Арешт, суд і знищення спадщини'
  words: 1600
- points:
  - >-
    Реабілітація 1958 року та поступове повернення імені в національну пам'ять.
  - >-
    Врятована спадщина: гравюри, ілюстрації до «Слова», окремі відбитки — доказ
    знищеного, але не повністю стертого модернізму.
  - >-
    Сучасне значення: Падалка як символ того, як тоталітарна система атакувала
    цілу візуальну школу, а не лише «формалістів».
  section: 'Підсумок: Врятовані гравюри'
  words: 1000
focus: >-
  Іван Падалка як провідний представник бойчукізму, майстер монументального
  мистецтва та графіки, чиє життя і творчість були знищені радянською
  тоталітарною машиною у 1937 році.
