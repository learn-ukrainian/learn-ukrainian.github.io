content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Падалкою: український художник-монументаліст,
    графік, ілюстратор, педагог; Херсонська бібліотека подає його як «яскравого
    представника бойчукізму» — це оцінка джерела, і подаємо її як оцінку.
  - >-
    Відкрите питання: що перевірені джерела документують про арешт, вирок і
    знищення творів — і де закінчується документ, а починається пояснення?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження 15 листопада 1894 року в селі Жорнокльови
    Золотоніського повіту на Полтавщині (сучасна Черкащина), у багатодітній
    родині хлібороба — цю дату незалежно подають обидва ухвалені джерела.
  - >-
    Навчання за музейною сторінкою: церковнопарафіяльна, потім дворічна
    «міністерська» школа; за клопотанням місцевого дворянина — стипендія на
    Миргородську художньо-промислову школу імені М. Гоголя, де викладав Опанас
    Сластіон; 1913 року — Київське художнє училище (Федір Кричевський); 1917
    року — Українська академія мистецтв у майстерні Михайла Бойчука.
  - >-
    [!decolonization] Формування як майстра національної форми: не копія європейського
    авангарду, а синтез монументального мистецтва, книжкової графіки та педагогіки.
  section: 'Формування: Від Миргорода до академії Бойчука'
  words: 1000
- points:
  - >-
    Колективні мурали за музейною сторінкою: розписи Луцьких казарм у Києві
    (1919) та Червонозаводського театру в Харкові (1933–1935).
    [!epistemic-humility] Назв окремих фресок, складу бригади й дат знищення
    казарм ухвалені джерела не подають — тож ані назви фрески, ані року
    руйнування не додаємо.
  - >-
    Книжкова графіка за музейною сторінкою: ілюстрації до першого номера
    дитячого журналу «Барвінок» (1919, разом із Тимком Бойчуком, молодшим
    братом М. Бойчука); суперобкладинка, фронтиспіс, заставка й кінцівка до
    другого тому «Вибраних творів» Дені Дідро (Харків, 1933); ілюстрація до
    першої частини, заставки й кінцівки до роману Франсіско де Кеведо
    Вільєгаса (Київ, 1934). Сторінка називає й коло авторів, чиї обкладинки він
    оформлював: І. Нечуй-Левицький, І. Котляревський, І. Франко, В. Вражливий,
    Ю. Смолич, М. Йогансен, О. Досвітній. Інших книжкових циклів ухвалені
    джерела не називають — не додаємо.
  - >-
    [!epistemic-humility] Живопис і гравюра: датованих назв станкових творів
    ухвалений набір **не подає жодної** — тож модуль не перелічує й не датує
    жодної. Датована назва без локатора не стає фактом від повторення. Замість
    переліку подаємо те, що музейна сторінка справді засвідчує: у лютому 1915
    року на учнівській виставці Падалка показав 13 робіт — 7 ілюстрацій до
    казок, 3 ілюстрації до поеми «Катерина» Тараса Шевченка, ескіз килима й
    2 етюди.
  - >-
    Педагогіка: викладання керамічного малювання в Миргородському, потім
    Межигірському художньо-керамічному технікумі; 1925–1934 роки — графічна
    майстерня Харківського художньо-промислового інституту, звідки вийшли
    Б. Бланк, М. Фрадкін, О. Довгаль, М. Котляревська, І. Хотинок та інші;
    1934–1936 — професор живопису Київського художнього інституту (музейна
    сторінка). [!epistemic-humility] Дослівних цитат Падалки ухвалений набір не
    містить — тож модуль не подає жодної.
  section: 'Діяльність: Від муралів до книжкової графіки'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Живу людину показують незручні деталі, а не епітети:
    музейна сторінка пише, що Падалка «мав бунтівну вдачу», став ініціатором
    учнівських виступів проти адміністрації закладу й окремих викладачів — і
    саме це називає причиною відрахування з миргородської школи.
    [!epistemic-humility] Це єдина версія, яку подає ухвалений набір; інших
    пояснень до неї не додаємо й року відрахування не називаємо, бо сторінка
    його не подає.
  - >-
    Механізм терору за музейною сторінкою: 29 вересня 1936 року художника
    заарештували. [!epistemic-humility] Ані статей кримінального кодексу, ані
    формули обвинувачення, ані номера архівної справи ухвалені джерела не
    подають — тож модуль їх не наводить і не переказує. Сторінка формулює
    ширший контекст так: «самобутній і яскравий талант Івана Падалки не
    вписувався в канони радянського мистецтва» — [!decolonization] це оцінка
    установи, і подаємо її як оцінку, а не як встановлений мотив держави.
  - >-
    Страта: розстріляний 13 липня 1937 року в київській тюрмі НКВД разом із
    М. Бойчуком та В. Седляром (музейна сторінка); ту саму дату смерті подає й
    ВУЕ. [!epistemic-humility] Судового органу, який ухвалив вирок, ухвалені
    джерела не називають — тож ані «військової колегії», ані дати вироку
    окремо від дати страти модуль не твердить.
  - >-
    Знищення спадщини за музейною сторінкою: картини конфіскували, особистий
    архів знищили. Через кілька днів після розстрілу заарештували дружину
    Марію Пасько за «шпигунство та недонесення на чоловіка» й вислали на
    Колиму, а 14-річного сина віддали в дитячий будинок; відбувши 21 рік
    заслання, вона повернулася в Україну, але сина знайти так і не змогла.
  section: 'Тінь: Арешт, суд і знищення спадщини'
  words: 1600
- points:
  - >-
    [!epistemic-humility] Реабілітації ухвалені джерела не датують: музейна
    сторінка про неї не пише взагалі, ВУЕ подає лише дати життя. Тож року
    реабілітації модуль не називає — прогалину визнаємо, а не заповнюємо
    числом із неперевіреної довідки.
  - >-
    Врятована спадщина за музейною сторінкою: у рідкісному фонді Херсонської
    бібліотеки збереглися дві книги з ілюстраціями Падалки — другий том
    «Вибраних творів» Дені Дідро (Харків, 1933) і роман Франсіско де Кеведо
    Вільєгаса (Київ, 1934). Це доказ знищеного, але не повністю стертого
    модернізму. [!epistemic-humility] Переліку не добудовуємо: подаємо лише те,
    що сторінка справді називає.
  - >-
    [!epistemic-humility] Сучасне значення: музейна сторінка фіксує, що поряд
    із Падалкою того самого дня страчено Бойчука й Седляра, тобто репресія
    зачепила коло школи, а не лише одну особу. Це те, що документують джерела;
    ширші узагальнення про «символ» лишаємо поза межами модуля.
  section: 'Підсумок: Врятовані гравюри'
  words: 1000
focus: >-
  Іван Падалка як провідний представник бойчукізму, майстер монументального
  мистецтва та графіки, чиє життя і творчість були знищені радянською
  тоталітарною машиною у 1937 році.
