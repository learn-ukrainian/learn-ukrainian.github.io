content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Падалкою: український художник-монументаліст,
    графік, педагог, яскравий представник школи бойчукістів.
  - >-
    Освіта: навчання у Миргородській художньо-промисловій школі (учитель Опанас
    Сластіон), Київському художньому училищі та Українській державній академії
    мистецтв (майстерня Михайла Бойчука).
  section: Розминка
  words: 400
- points:
  - >-
    Участь у ключових колективних монументальних проєктах: розписи Луцьких
    казарм у Києві (1919) та Червонозаводського театру в Харкові (1933–1935).
  - >-
    Робота в галузі книжкової графіки: ілюстрації до дитячих видань, серія
    гравюр до "Слова о полку Ігоревім", оформлення "Кобзаря" та класики.
  - >-
    Педагогічна діяльність і захист плюралізму: відстоювання ідеї, що АРМУ
    не є організацією лише одного напряму, спротив уніфікації мистецтва.
  section: 'Діяльність: Від муралів до книжкової графіки'
  words: 1000
- points:
  - >-
    [!anti-hagiography] Падалка був не просто "одним із бойчукістів", а й
    самостійним майстром (графіка, дизайн книг, дереворит), який захищав
    розвиток національної форми.
  - >-
    Механізм репресій: арешт у вересні 1936 року за сфабрикованим звинуваченням
    в участі у "націонал-фашистській українській організації" (мови радянських
    слідчих справ).
  - >-
    Знищення митця та спадщини: Військова колегія Верховного суду СРСР засудила
    художника до страти, розстріляний 13 липня 1937 року в Києві.
  - >-
    [!decolonization] Фізичне знищення картини, конфіскація творів, руйнування фресок
    і заслання дружини як системний терор проти цілої візуальної школи.
  section: 'Тінь: Знищення бойчукізму'
  words: 1200
- points:
  - >-
    Повернення спадщини: реабілітація 1958 року та поступове відновлення
    пам'яті про художника.
  - >-
    Іван Падалка як символ знищеного українського модернізму, чиє мистецтво
    продовжує жити у врятованих відбитках та ілюстраціях.
  section: 'Підсумок: Врятовані гравюри'
  words: 800
focus: >-
  Іван Падалка як провідний представник бойчукізму, майстер монументального
  мистецтва та графіки, чиє життя і творчість були знищені радянською
  тоталітарною машиною у 1937 році.
