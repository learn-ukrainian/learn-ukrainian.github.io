objectives:
- Розуміти місце Івана Падалки в українському мистецтві як художника, графіка та педагога.
- Аналізувати особливості методу бойчукістів на прикладі його творчості.
- Досліджувати механізм радянських репресій проти української візуальної культури.
- Оцінювати втрату муралів, архіву та колекцій як системне культурне знищення.
- >-
  Відрізняти те, що ухвалені джерела документують про арешт, страту й долю
  родини, від того, чого вони не подають — зокрема дати реабілітації та
  формули обвинувачення.
