content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Падалкою: український художник-монументаліст,
    графік, ілюстратор, педагог; Херсонська бібліотека подає його як «яскравого
    представника бойчукізму» — це оцінка джерела, і подаємо її як оцінку.
  - >-
    Відкрите питання: що перевірені джерела документують про арешт, вирок і
    знищення творів — і де закінчується документ, а починається пояснення?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження у селі Жорнокльови (Полтавщина; у джерелах
    розходяться дати 1894-10-27 та 1894-11-15 — [!epistemic-humility] зафіксувати
    розбіжність, не зводити її до однієї «канонічної»).
  - >-
    Навчання в Миргородській художньо-промисловій школі (Опанас Сластіон),
    Київському художньому училищі (Федір Кричевський) та Українській академії
    мистецтв у майстерні Михайла Бойчука.
  - >-
    [!decolonization] Формування як майстра національної форми: не копія європейського
    авангарду, а синтез монументального мистецтва, книжкової графіки та педагогіки.
  section: 'Формування: Від Миргорода до академії Бойчука'
  words: 1000
- points:
  - >-
    Колективні мурали за музейною сторінкою: розписи Луцьких казарм у Києві
    (1919) та Червонозаводського театру в Харкові (1933–1935). Нарис Соколюк
    датує харківський епізод і називає склад: 1933 року Падалка працював над
    фресковими розписами Червонозаводського театру разом із М. Бойчуком,
    В. Седляром і О. Павленко (с. 146). [!epistemic-humility] Назв окремих
    фресок і дат знищення казарм ухвалені джерела не подають — тож ані назви
    фрески, ані року руйнування не додаємо.
  - >-
    Книжкова графіка: ілюстрації до першого номера дитячого журналу «Барвінок»
    (1919, разом із Тимком Бойчуком — нарис Соколюк, с. 142); обкладинка книжки
    Стефана Таранушенка «Мистецтво Слобожанщини» (1928, там само, с. 145);
    суперобкладинка, фронтиспіс, заставка й кінцівка до другого тому «Вибраних
    творів» Дені Дідро (Харків, 1933) та ілюстрації до роману Франсіско де
    Кеведо (музейна сторінка). Інших книжкових циклів ухвалені джерела не
    називають — не додаємо.
  - >-
    [!epistemic-humility] Живопис і гравюра: датованих назв станкових творів
    ухвалений набір подає лише два, і саме ними обмежуємося — датована назва
    без локатора не стає фактом від повторення. Перший: за нарисом Соколюк,
    відомий твір «Несуть товариша» спершу виконано 1927 року як літографію, а
    на виставці в Стокгольмі 1930 року його демонстрували як малюнок графітним
    олівцем (с. 144) — одна річ у різних техніках, тобто метод, а не лише
    назва. Другий: том відтворює гравюру Падалки «Будинок Держпромисловості»
    1927 року з покликанням на журнал «Ударник держапарату» 1932 року (с. 84).
  - >-
    Педагогіка та полеміка: захист плюралізму в АРМУ — «АРМУ не є організація
    якогось одного напряму майстрів» (*Червоний шлях*, 1926, № 2 (35), с. 177,
    178; цит. за нарисом Соколюк, с. 142). Це єдина цитата Падалки з повним
    первинним локатором; інших дослівних цитат модуль не подає.
  section: 'Діяльність: Від муралів до книжкової графіки'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Живу людину показують незручні деталі, а не епітети:
    нарис Соколюк розрізняє три версії відрахування з миргородської школи 1912
    року — офіційну (буцімто атеїзм), пояснення самого Падалки (виступи проти
    адміністрації, шкільний страйк) і родинний спогад сестри. Три версії мають
    різний доказовий статус і не зводяться до однієї.
  - >-
    Механізм терору: перший із бойчукістів, арештований у вересні 1936 (обидва
    джерела датують 29 вересня 1936); звинувачення за статтями 54-8 і 54-11
    КК УСРР як члена «націонал-фашистської української організації» —
    [!decolonization] мова радянського слідства, не прийнятний опис. Реєстрова
    стаття подає саме «КК УСРР» (Українська Соціалістична Радянська
    Республіка — назва до 1937 року), а не «КК УРСР»; назву кодексу подаємо за
    документом.
  - >-
    Суд і страта: Військова колегія Верховного суду СРСР 13 липня 1937 засудила
    до вищої міри покарання; розстріляний того ж дня в Києві.
  - >-
    Знищення спадщини за музейною сторінкою: картини конфіскували, особистий
    архів знищили. Через кілька днів після розстрілу заарештували дружину
    Марію Пасько за «шпигунство та недонесення на чоловіка» й вислали на
    Колиму, а 14-річного сина віддали в дитячий будинок; відбувши 21 рік
    заслання, вона повернулася в Україну, але сина знайти так і не змогла.
  - >-
    [!epistemic-humility] Архівний локатор стосується арешту, вироку й страти, а
    не долі спадщини: нарис Соколюк покликається на ГДА СБ України, Харків,
    спр. 014860, арк. 6, 20, 220, 221, 222 (с. 147) саме там, де подає, що
    Падалка був першим із бойчукістів, заарештованим у вересні 1936 року за
    сфабрикованими матеріалами, засудженим 13 липня 1937 року й розстріляним
    того ж дня. На інші твердження цей локатор не переносимо.
  section: 'Тінь: Арешт, суд і знищення спадщини'
  words: 1600
- points:
  - >-
    Реабілітація 1958 року та поступове повернення імені в національну пам'ять.
  - >-
    Врятована спадщина: гравюри, книжкові оформлення й окремі відбитки, які том
    відтворює, — доказ знищеного, але не повністю стертого модернізму.
    [!epistemic-humility] Конкретні назви подаємо лише ті, що мають локатор
    (див. розділ «Діяльність»), і не добудовуємо переліку.
  - >-
    [!epistemic-humility] Сучасне значення: том «Реабілітовані історією» фіксує,
    що поряд із Падалкою страчено Бойчука й Седляра, тобто репресія зачепила
    коло школи, а не лише одну особу. Це те, що документують джерела; ширші
    узагальнення про «символ» лишаємо поза межами модуля.
  section: 'Підсумок: Врятовані гравюри'
  words: 1000
focus: >-
  Іван Падалка як провідний представник бойчукізму, майстер монументального
  мистецтва та графіки, чиє життя і творчість були знищені радянською
  тоталітарною машиною у 1937 році.
