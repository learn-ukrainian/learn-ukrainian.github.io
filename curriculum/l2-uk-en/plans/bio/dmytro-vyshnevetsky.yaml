content_outline:
- points:
  - 'Парадокс: Як аристократ і князь Дмитро Вишневецький, що служив литовським і московським монархам, став безсмертним символом
    козацької вольниці — легендарним Байдою?'
  - '[!biography] Представлення центральної фігури через суперечність між його соціальним статусом та культурним міфом.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історичний Дмитро Вишневецький vs. фольклорний Байда. Де закінчується факт і починається народна ідеалізація
    в "Пісні про Байду"?'
  - 'Дебат 2: Патріот чи прагматичний кондотьєр? Аналіз його служби різним правителям — Великому князівству Литовському та
    Московському царству. Чи була це зрада, чи типова стратегія виживання для фронтиру?'
  - '[!epistemic-humility] Оцінки Вишневецького коливаються від "першого гетьмана" (романтична історіографія) до "політичного
    авантюриста" (критичний аналіз).'
  - '[!decolonization] Розгляд його дій поза російською імперською та радянською парадигмами, які часто зображували козацьких
    лідерів або "зрадниками", або "бандитами".'
  section: 'Конфліктна карта: Герой чи авантюрист?'
  words: 900
- points:
  - Походження з могутнього роду Вишневецьких — що означало бути князем на українському фронтирі в XVI столітті.
  - 'Дике Поле як соціальний і геополітичний простір: постійна загроза з боку Кримського ханства та Османської імперії.'
  - 'Формативний досвід: ранні військові походи та усвідомлення потреби в організованій обороні.'
  section: 'Формування: Аристократ на Дикому Полі'
  words: 1000
- points:
  - Будівництво фортеці на острові Мала Хортиця (1556) — першого прототипу Запорозької Січі.
  - Організація козацьких військ для походів на татарські та турецькі володіння (Очаків, Іслам-Кермен).
  - Створення військово-політичного центру, незалежного від королівської влади, що стало моделлю для майбутнього козацтва.
  - 'Використання первинних джерел: листи Вишневецького до польського короля та звіти османських чиновників про його напади.'
  section: 'Діяльність: Заснування Січі та боротьба з Ордою'
  words: 1300
- points:
  - '[!anti-hagiography] Перехід на службу до московського царя Івана Грозного — вчинок, який часто замовчується в патріотичних
    наративах. Аналіз мотивів: прагматизм, образа на польського короля чи помилка?'
  - 'Провальний молдовський похід (1563): зрада союзників і потрапляння в полон.'
  - '[!myth-buster] Критичний погляд на його стратегічні здібності. Порівняння авантюрного стилю Вишневецького з більш державницьким
    підходом пізніших гетьманів, як-от Сагайдачний.'
  - 'Ціна його дій: як його авантюри впливали на мирне населення та міжнародні відносини.'
  section: 'Тінь: Служба Москві та фатальний похід'
  words: 900
- points:
  - 'Повернення до парадоксу з розминки: чому саме Вишневецький, а не інший, більш "ідеальний" герой, став уособленням козацької
    незламності?'
  - 'Спадщина 1 (матеріальна): заснування Січі як моделі організації козацтва.'
  - 'Спадщина 2 (символічна): перетворення на Байду, міф про страту в Стамбулі та його значення для формування національної
    ідентичності.'
  - '[!decolonization] "Пісня про Байду" як культурний код опору імперіям, що резонує донині.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Біографія Дмитра Вишневецького (Байди), засновника першої Січі. Аналіз його історичної ролі проти фольклорного образу,
  його невдач та моральних неоднозначностей, а також його спадщини як символу козацького опору.
level: BIO
module: bio-015
objectives:
- Критично аналізувати різницю між історичною постаттю Дмитра Вишневецького та його фольклорним образом Байди.
- Пояснювати геополітичний контекст українського фронтиру XVI століття та роль Вишневецького в ньому.
- Оцінювати неоднозначні аспекти біографії героя, такі як служба іноземним монархам та авантюрні військові кампанії.
- Формулювати аргументовану позицію щодо спадщини Вишневецького як засновника першої Січі та символу національного опору.
