content_outline:
- points:
  - 'Провокація: Як одна людина могла бути міністром світської республіки, очільником церкви в екзилі та автором канонічного
    перекладу Біблії? Життя Івана Огієнка — це історія поєднання, здавалося б, непоєднуваних ролей.'
  - 'Цитата без контексту (з його праці): "Рідна мова — це основа, на якій тільки й можна збудувати і храм, і школу, і цілу
    державу". Студент має припустити, хто це сказав — політик, священик чи вчений?'
  - '[!biography] Представлення Івана Огієнка (митрополита Іларіона) як однієї з ключових постатей українського ХХ століття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Мова): Пуризм vs Прагматизм. Огієнко виступав за "очищення" мови від русизмів та полонізмів, створюючи єдиний
    стандарт. Його опоненти (напр., Агатангел Кримський) вважали такий підхід штучним і відірваним від живої мови. Чи був
    його правопис прогресом, чи догмою?'
  - 'Дебат 2 (Церква): Автокефалія vs Канонічність. Для радянської пропаганди Огієнко — "націоналістичний розкольник". Для
    частини еміграції — духовний лідер. Яким було його місце в складному світі православних юрисдикцій? [!epistemic-humility]
    — визнання складності міжцерковних відносин.'
  - '[!decolonization] Боротьба за автокефалію і переклад Біблії як акти деколонізації українського духовного життя від імперського
    контролю Москви.'
  section: 'Конфліктна карта: Мова і Церква'
  words: 900
- points:
  - 'Світ, у якому він народився (Брусилів, 1882): Російська імперія, русифікація, обмежені можливості для української освіти.'
  - 'Шлях до знань: сирітство, навчання в Острозькій гімназії та Київському університеті. Як соціальне походження вплинуло
    на його світогляд?'
  - 'Поворотний момент: занурення в історію української мови та культури. Робота під керівництвом Володимира Перетца. Формування
    національної свідомості всупереч імперському тиску.'
  section: 'Формування: Від сироти до вченого'
  words: 1000
- points:
  - 'Державник: міністр освіти та міністр віросповідань в уряді УНР. Його роль у заснуванні Кам''янець-Подільського університету
    та політиці українізації.'
  - 'Мовознавець: праця "Історія української літературної мови". Створення "Правописного словника", що став основою для харківського
    правопису 1928 року. Його внесок у кодифікацію мови.'
  - 'Перекладач: справа всього життя — повний переклад Біблії. 40 років праці. Особливості перекладу — орієнтація на живу
    народну мову, лексичні знахідки. Чим його переклад відрізнявся від попередніх (Куліш, Нечуй-Левицький)?'
  section: 'Діяльність: Кодифікація і Переклад'
  words: 1300
- points:
  - '[!anti-hagiography] Його мовний пуризм критикували за надмірну архаїзацію та відрив від деяких діалектів. Чи не була
    його "очищена" мова дещо штучною конструкцією?'
  - 'Політичні невдачі: уряд УНР, у якому він працював, зазнав поразки. Яка його частка відповідальності як політика за втрату
    державності?'
  - '[!myth-buster] Міф про "безконфліктного лідера". Внутрішні конфлікти в УАПЦ в діаспорі. Його стосунки з іншими еміграційними
    діячами були складними та не завжди конструктивними.'
  - 'Компроміси еміграції: життя в міжвоєнній Польщі вимагало складних політичних маневрів. Як він балансував між інтересами
    української громади та лояльністю до польської держави?'
  section: 'Тінь: Ціна принциповості'
  words: 900
- points:
  - 'Повернення до розминки: як поєднувалися ролі політика, церковника та вченого? Студент формулює відповідь, спираючись
    на знання про його життя.'
  - 'Спадщина: Біблія Огієнка — загальновизнаний стандарт. Його правопис — досі предмет гострих дискусій. Чому одна частина
    його спадщини стала каноном, а інша — ні?'
  - '[!decolonization] Оцінка його внеску в розрив з "русским миром" у мові та релігії. Наскільки його ідеї актуальні для
    сучасної України, що проходить новий етап деколонізації?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Ivan Ohienko, examining his complex roles as a linguist who codified modern Ukrainian, a statesman in the
  UNR government, and the head of the Ukrainian Autocephalous Orthodox Church who completed the first full Bible translation
  into modern Ukrainian.
level: BIO
module: bio-082
objectives:
- 'Аналізувати життя та діяльність Івана Огієнка як єдність трьох іпостасей: вченого, церковного діяча та політика'
- Критично оцінювати його внесок у кодифікацію української мови, розглядаючи аргументи "за" і "проти" його підходу
- Пояснювати історичне та культурне значення першого повного перекладу Біблії сучасною українською мовою
- Формулювати аргументовану позицію щодо суперечливих аспектів його спадщини (т.зв. "тіні")
