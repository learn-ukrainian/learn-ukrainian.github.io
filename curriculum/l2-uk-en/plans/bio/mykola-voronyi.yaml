content_outline:
- points:
  - >-
    [!biography] Знайомство з Миколою Кіндратовичем Вороним: поет-символіст, театральний
    критик і організатор, що об'єднував український модернізм із європейською літературною
    розмовою.
  - >-
    Провокаційне питання: чому радянська влада знищила поета, чия лірика здавалася
    «чистою естетикою», а не політичним маніфестом?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та ранній шлях: навчання в харківській та ростовській реальних школах,
    відсторонення за політичну діяльність, робота з українськими театральними колами.
  - >-
    Європейський вектор: еміграційні роки, дружба з польськими письменниками, повернення
    в радянську Україну 1926 року — викладання та літературна діяльність, що не
    захистила від репресій.
  - >-
    [!decolonization] Вороний десятиліттями доводив, що українська література належить
    до європейського модернізму, а не є «епігоном» російської культури. Народження
    в Ростові-на-Дону не скасовує української літературної приналежності.
  section: 'Формування: Від реальної школи до європейського модернізму'
  words: 1000
- points:
  - >-
    Поетичний доробок: *Євшан-зілля* (1899) як алегорія повернення до рідної пам'яті;
    *Ліричні поезії* (1911); канонічний символістський текст «Блакитна Панна» (1912);
    збірка *В сяйві мрій* (1913).
  - >-
    Театральний вимір: *Театр і драма* (1913), *Драматична примадонна* (1924) —
    Вороний як історик і критик українського театру, пов'язаний із Марією Заньковецька.
  - >-
    Громадянський голос: *За Україну!* (1921, Варшава) — патріотична лірика після
    Української революції; *Пензлем і пером* (1923) — есеїстика та літературна полеміка,
    зокрема дискусія з Іваном Франком про сучасний український альманах.
  - >-
    Естетика як мост: символізм, музичність звуку, алегорична історична пам'ять —
    чому «естетична» етикетка не знімає політичного значення його знищення.
  section: 'Діяльність: Від символізму до театру'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Вороний не був класичним політичним активістом, але радянська
    машина знищила його як символічний міст між українським театром, символізмом і
    європейською літературною розмовою.
  - >-
    Механізм терору: перший арешт у 1934 році; заслання до Воронежа на три роки з
    забороною перебування в Києві; повторний арешт у Глинянах.
  - >-
    Сфабриковане звинувачення: особлива трійка УНКВД Одеської області 29 квітня 1938
    року винесла смертний вирок; формулювання звинувачення — «компрометація заходів
    партії та уряду» (радянська поліцейська мова, не факт).
  - >-
    [!epistemic-humility] Розстріл 7 червня 1938 року в Одесі. Не повторювати
    вторинні ярлики на кшталт «польський шпигун» як установлену істину — лише як
    варіант радянського звинувачення.
  - >-
    Сімейна трагедія: син Марко Вороний також став жертвою радянського терору —
    знищення двох поколінь української літературної родини.
  section: 'Тінь: Особлива трійка та розстріл в Одесі'
  words: 1600
- points:
  - >-
    Доля спадщини: поетичні та театрально-критичні твори збереглися в друкованих
    виданнях, але радянська презентація спотворювала біографію та приховувала розстріл.
  - >-
    Сучасне значення: Вороний як поєднання символістської естетики, театральної
    культури та громадянської лірики — постать, яку не можна звести лише до *Євшан-зілля*
    чи *Блакитної Панни*.
  - >-
    Кінцеве питання: як інтегрувати Вороного в наратив Розстріляного відродження,
    не втративши його європейського модерністського виміру?
  section: 'Підсумок: Міст між модернізмом і пам''яттю'
  words: 1000
