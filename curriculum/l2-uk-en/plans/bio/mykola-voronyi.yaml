objectives:
- >-
  Аналізувати творчий шлях Миколи Вороного — від *Євшан-зілля* до театральної
  критики та громадянської лірики *За Україну!*
- Розуміти його роль у включенні української літератури в європейський модерністський контекст.
- Досліджувати механізми радянського терору — арешт, заслання, особлива трійка, розстріл 1938 року.
- Оцінювати, чому «естетична» етикетка не знімає політичного значення знищення символіста-модерніста.
