objectives:
- Аналізувати ключові етапи життя та наукової кар''єри Юрія Шевельова в контексті історії XX століття.
- Пояснювати суть та значення теорії безперервності української мови та її деколоніальний ефект.
- Критично оцінювати суперечливі аспекти біографії Шевельова, розрізняючи історичні факти від політичних маніпуляцій.
- Порівнювати дві іпостасі вченого: мовознавця Шевельова та літературного критика Шереха.
