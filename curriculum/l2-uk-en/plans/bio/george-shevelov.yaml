content_outline:
- points:
  - 'Парадокс: як людина, що покинула Україну назавжди, стала її найвпливовішим захисником на світовій арені, довівши безперервність
    української мови?'
  - '[!biography] Знайомство з двома іпостасями: Юрій Шевельов, мовознавець, та Юрій Шерех, безкомпромісний літературний критик.'
  - 'Провокаційне питання: чи міг один науковий твір, написаний в еміграції, змінити хід лінгвістичної війни, що тривала століттями?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Науковий): Теорія безперервності Шевельова vs імперська концепція «спільної колиски». Чому доведення окремішності
    української мови з праслов''янських часів було вибуховим для радянської та російської науки?'
  - 'Дебат 2 (Політичний): Звинувачення у колабораціонізмі під час Другої світової війни. Як КДБ та його наступники використовували
    цей наратив для дискредитації Шевельова та його праць на Заході та в Україні.'
  - '[!epistemic-humility] Визнання складності періоду німецької окупації Харкова. Аналіз аргументів обох сторін без таврування,
    але з чітким розрізненням між історичними фактами та політичною маніпуляцією.'
  section: 'Конфліктна карта: Бої за спадщину Шевельова'
  words: 900
- points:
  - 'Ранні роки: інтелектуальне середовище Харкова 1920-х, навчання у Олександра Білецького, початок наукової кар''єри.'
  - 'Випробування війною: окупація, еміграція, табори для переміщених осіб у Німеччині — досвід, що загартував характер.'
  - 'Інтеграція в західну славістику: викладання у Лунді, Гарварді та, зрештою, Колумбійському університеті, де він створив
    власну наукову школу.'
  section: 'Формування: Від Харкова до Гарварда'
  words: 1000
- points:
  - 'Magnum Opus: "Історична фонологія української мови" (1979) — кульмінація десятиліть досліджень, що науково спростувала
    міф про походження української мови від давньоруської.'
  - 'Ключові аргументи: аналіз 23 фонологічних рис, що доводять прямий розвиток української мови з праслов''янської.'
  - '[!decolonization] Ця праця — не просто лінгвістика, а політичний акт деколонізації, що повернув українській мові її власну
    історію.'
  - 'Інші праці: дослідження старослов''янської, порівняльне мовознавство, та гостра літературна критика під псевдонімом Юрій
    Шерех.'
  section: 'Діяльність: Велика праця та науковий доробок'
  words: 1300
- points:
  - '[!anti-hagiography] Шевельов не був "добрим дідусем". Як критик Юрій Шерех, він був гострим, іноді жорстоким, і нажив
    собі багато ворогів в еміграційних колах своєю безкомпромісністю.'
  - '[!myth-buster] Розбір звинувачень у колабораціонізмі. Що є фактом (робота у міській управі), а що — домислом та радянською
    пропагандою (звинувачення у співпраці з гестапо)?'
  - 'Особисті конфлікти: аналіз його полеміки з іншими видатними діячами діаспори, що показує складність характеру та небажання
    йти на компроміси, навіть із союзниками.'
  section: 'Тінь: Ціна безкомпромісності'
  words: 900
- points:
  - 'Повернення до парадоксу: чому саме в еміграції Шевельов зміг зробити те, що було неможливо в Україні?'
  - 'Спадщина в незалежній Україні: посмертне визнання, Шевченківська премія, але й спроби знову дискредитувати його ім''я
    (історія з меморіальною дошкою в Харкові).'
  - '[!decolonization] Вплив Шевельова на сучасну українську лінгвістику — як його праці стали фундаментом для нового покоління
    мовознавців, вільних від імперських догм.'
  - 'Кінцеве питання: Ким є Шевельов для України сьогодні — символом наукового спротиву, складною історичною постаттю чи обома
    одночасно?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Юрій Шевельов (Шерех): його magnum opus "Історична фонологія української мови", теорія безперервності, роль у світовій
  славістиці та гострі дебати навколо його спадщини.'
