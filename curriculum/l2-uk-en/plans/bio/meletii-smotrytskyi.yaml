content_outline:
- points:
  - 'Парадокс: як людина, що створила граматику для всього православного світу, стала в очах колишніх одновірців його головним
    зрадником?'
  - 'Провокація: Смотрицький кодифікував мову, якою православні захищалися від католицизму, а потім сам перейшов на бік опонентів.
    Чи була це зрада ідеалів, чи їхня еволюція?'
  - '[!biography]'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Синхронний): Полеміка за життя Смотрицького. Його твори "Тренос" (захист православ''я) vs "Апологія" (обґрунтування
    унії). Як сучасники реагували на цю зміну?'
  - 'Дебат 2 (Діахронний): Привласнення спадщини. Російська імперія (Ломоносов) взяла граматику Смотрицького за основу, але
    "забула" про його українське походження та роль у київській інтелектуальній традиції.'
  - '[!epistemic-humility] Чи був перехід Смотрицького в унію неминучим наслідком його гуманістичних пошуків, чи політичною
    помилкою та особистою трагедією?'
  - '[!decolonization] Вивчення Смотрицького як повернення Україні інтелектуального спадку, який Росія вважала виключно своїм.'
  section: 'Конфліктна карта: Захисник православ''я чи апологет унії?'
  words: 900
- points:
  - Острозька академія як колиска ідей. Вплив князя Острозького та середовища полемістів.
  - 'Освіта в єзуїтських колегіумах та протестантських університетах Німеччини: синтез західного раціоналізму та православної
    духовності.'
  - 'Повернення в Україну: викладацька діяльність у Віленському братстві, формування як інтелектуального лідера.'
  section: 'Формування: Від Острога до європейських університетів'
  words: 1000
- points:
  - 'Стан церковнослов''янської мови на початку XVII ст.: хаос, відсутність норм, що робило її вразливою в полеміці з латиною.'
  - 'Революційність "Граматики": перша повна кодифікація мови, встановлення орфографічних та морфологічних норм. Створення
    системи відмінків та дієвідмін.'
  - 'Структура праці: від орфографії до синтаксису. Смотрицький як творець першої граматичної термінології.'
  - 'Вплив на місці: "Граматика" як головний підручник у братських школах та основа для подальших мовних студій.'
  section: 'Діяльність: "Граматика словенська" 1619 року'
  words: 1300
- points:
  - 'Подорож на Схід (1623-1624): розчарування у стані грецького православ''я та пошук "третього шляху".'
  - 'Таємний перехід в унію: внутрішній конфлікт між обов''язком перед православною ієрархією та власними переконаннями про
    можливість єдності церков.'
  - '[!anti-hagiography] "Апологія" — це не просто богословський трактат, а спроба виправдати свій вчинок, що багато хто вважав
    зрадою. Аналіз аргументів Смотрицького та реакції опонентів.'
  - '[!myth-buster] Міф про те, що Смотрицький "продався" за посаду. Його трагедія — в щирому бажанні примирити непримиренне,
    що призвело до відкинення обома сторонами.'
  section: 'Тінь: Ціна компромісу'
  words: 900
- points:
  - 'Повернення до парадоксу: чи можна відокремити "Граматику" від її автора? Як його особиста трагедія впливає на оцінку
    його внеску?'
  - 'Спадщина для України: Смотрицький як символ інтелектуальної складності українського бароко, постать, що не вписується
    у прості наративи.'
  - 'Спадщина для слов''янського світу: як "Граматика" стала фундаментом для розвитку літературних мов, зокрема російської,
    і чому це важливо з точки зору деколонізації.'
  - '[!decolonization] Сучасна переоцінка: Смотрицький не як "предтеча російської граматики", а як самостійний український
    мислитель європейського масштабу.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Meletii Smotrytskyi as a codifier of Church Slavonic, a central figure in the post-Berestian Union polemics, and the
  tragic intellectual split between his Orthodox identity and Uniate conversion. His grammar's impact on the Slavic world
  and its appropriation by Russia.
level: BIO
module: bio-019
objectives:
- Критично оцінювати внесок Мелетія Смотрицького у кодифікацію церковнослов'янської мови в контексті релігійної полеміки XVII
  століття.
- Аналізувати причини та наслідки особистої та інтелектуальної трагедії Смотрицького — його переходу від православ'я до унії.
- Дослідити вплив "Граматики" на розвиток східнослов'янських мов, зокрема в рамках деколоніальної оптики (привласнення спадщини
  Росією).
- Формулювати аргументовану позицію щодо ролі Смотрицького як постаті на зламі культур, епох та ідентичностей.
