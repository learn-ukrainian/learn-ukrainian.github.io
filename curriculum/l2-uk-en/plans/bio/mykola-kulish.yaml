content_outline:
- points:
  - 'Провокація: Як драматург, що написав найгострішу сатиру на русифікацію («Мина Мазайло»), міг до останнього вірити в «комунізм
    з людським обличчям»?'
  - 'Цитата без контексту: «Краще бути зґвалтованою, аніж українізованою». Що це — анекдот, реальна фраза чи геніальна сатира?'
  - '[!biography] Представлення центральної постаті — Миколи Куліша, генія та жертви своєї епохи.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Чи є п''єси Куліша справжнім пролетарським мистецтвом? Ортодоксальні критики звинувачували його в
    «буржуазному націоналізмі» та формалізмі. Прихильники (Курбас, Хвильовий) бачили в ньому творця нового українського театру.'
  - 'Дебат 2 (після смерті): Як оцінювати його спадщину? Радянська влада намагалася або замовчати Куліша, або представити
    його як «помилкового» митця. Сучасна Україна бачить його як пророка та ключову фігуру культурного спротиву.'
  - '[!epistemic-humility] Чи був Куліш свідомим антирадянщиком, чи лояльним комуністом, чия творчість виявилася несумісною
    з системою? Історики досі сперечаються.'
  - '[!decolonization] Трагедія Куліша як приклад знищення Росією/СРСР цілого покоління української інтелігенції, щоб придушити
    національну ідентичність.'
  section: 'Конфліктна карта: Модерніст чи зрадник пролетаріату?'
  words: 900
- points:
  - 'Світ дитинства: Чаплинка, степ як джерело образів для майбутніх п''єс («Комуна в степах»).'
  - 'Перша світова війна та визвольні змагання: військовий досвід, що сформував антивоєнний пафос «Патетичної сонати».'
  - Переїзд до Харкова, столиці радянської України, та входження до літературного кола ВАПЛІТЕ.
  - 'Творчий тандем: знайомство з Лесем Курбасом і початок роботи в театрі «Березіль» — народження найпотужнішого дуету в
    історії українського театру.'
  section: 'Формування: Від степів Херсонщини до Харкова'
  words: 1000
- points:
  - 'Ранні п''єси: «97» і «Комуна в степах» — спроба осмислити трагедію голоду та утопію комунізму.'
  - 'Вершина творчості: «Народний Малахій», «Мина Мазайло», «Патетична соната» — поєднання експресіонізму, сатири та глибокого
    психологізму.'
  - '«Мина Мазайло» (1929): аналіз п''єси як енциклопедії українського мовного питання, сатири на міщанство та політику русифікації.'
  - 'Стилістичні інновації: використання елементів абсурду, гротеску, поєднання трагічного та комічного.'
  section: 'Діяльність: Створення модерної української драми'
  words: 1300
- points:
  - '[!anti-hagiography] Куліш не був дисидентом із самого початку. Він вірив у можливість реформувати систему, в ідеали революції,
    і ця віра була його трагічною помилкою.'
  - 'Конфлікт із владою: як його п''єси, особливо «Патетична соната», були заборонені, а самого автора почали цькувати в пресі.'
  - '[!myth-buster] Міф про те, що всіх митців «Розстріляного відродження» арештували одночасно. Це був поступовий, спланований
    процес, і Куліш був однією з останніх великих мішеней.'
  - Арешт (1934), Соловки, останній твір «Маклена Граса». Фатальна дружба з Курбасом — обох заарештували та розстріляли в
    один день.
  section: 'Тінь: Трагедія «останнього оптиміста»'
  words: 900
- points:
  - 'Повернення до розминки: чому сатира Куліша настільки актуальна сьогодні? Аналіз п''єс у контексті сучасних мовних та
    культурних воєн.'
  - 'Загибель і безсмертя: розстріл у Сандармосі (3 листопада 1937) як спроба вбити українську культуру. Посмертна реабілітація
    та повернення п''єс на сцену.'
  - '[!decolonization] Значення Куліша сьогодні — не просто як драматурга, а як символу незнищенності українського духу та
    інтелектуального спротиву тоталітаризму.'
  - 'Сучасні постановки: як сьогоднішні театри інтерпретують Куліша?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Mykola Kulish, Ukraine's greatest 20th-century playwright, focusing on his modernist experiments
  with Les Kurbas, the satire of Russification in "Myna Mazailo", and his tragic fate as a central figure of the Executed
  Renaissance.
level: BIO
module: bio
objectives:
- Аналізувати творчість Миколи Куліша в контексті модерністських течій та політики українізації.
- Критично оцінювати складні стосунки митця з радянською владою.
- Інтерпретувати сатиричні прийоми в п'єсі «Мина Мазайло» як форму культурного спротиву.
- Формулювати аргументовану позицію щодо трагедії «Розстріляного відродження» на прикладі долі Куліша.
