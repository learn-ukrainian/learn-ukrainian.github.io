content_outline:
- points:
  - 'Парадокс: Як поет, озброєний лише словом, може становити більшу загрозу для тоталітарної імперії, ніж армія? Життя Стуса
    — це відповідь.'
  - Стус як символ незламності духу — але якою ціною дається така незламність і хто її платить?
  - '[!biography] Коротка довідка: поет, політв''язень, один із найактивніших представників українського культурного руху
    шістдесятників.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стус — поет чи політик? Чи був його спротив естетичним вибором митця, що не міг творити в умовах брехні, чи
    свідомою політичною боротьбою за державність?'
  - 'Дебат 2: Канонізація Стуса — мученик чи борець? Як радянська пропаганда намагалася його маргіналізувати, і як сучасна
    Україна осмислює його спадщину — як трагедію жертви чи як перемогу духу?'
  - '[!epistemic-humility] Позиції в дисидентському середовищі різнилися: одні вважали безкомпромісність Стуса єдиним гідним
    шляхом, інші — тактично невиправданою.'
  - '[!decolonization] Розвінчання радянського наративу про «націоналістів» та «кримінальників», показ дисидентського руху
    як інтелектуального спротиву імперії.'
  section: 'Конфліктна карта: Поет, політик чи мученик?'
  words: 900
- points:
  - Сільське походження (1938, Рахнівка) та повоєнне дитинство на Донбасі — формування ідентичності на зросійщеній, але українській
    землі.
  - Навчання в Донецькому університеті, перші поетичні спроби, глибоке вивчення світової літератури — інтелектуальний фундамент.
  - Переїзд до Києва, аспірантура в Інституті літератури — входження в коло київських шістдесятників, що змінило все.
  - 'Формативні впливи: філософія екзистенціалізму, поезія Рільке, світогляд родини.'
  section: 'Формування: Від Рахнівки до Києва'
  words: 1000
- points:
  - 'Участь у русі шістдесятників: від літературних вечорів до відкритого протесту проти арештів інтелігенції у кінотеатрі
    «Україна» (1965).'
  - Перший арешт та заборона публікуватися — початок довгої дороги таборів. Відлучення від літературного процесу.
  - Другий арешт (1972) та роки в мордовських таборах. Створення збірки «Палімпсести» — вершини творчості за ґратами.
  - Стус як правозахисник, член Української Гельсінської групи. Захист прав інших в'язнів.
  section: 'Діяльність: Поезія і спротив за ґратами'
  words: 1300
- points:
  - '[!anti-hagiography] Безкомпромісність Стуса мала величезну ціну не тільки для нього, але й для його родини — зокрема,
    сина Дмитра, який ріс без батька.'
  - Конфлікти з іншими дисидентами. Негнучкість Стуса іноді заважала тактичним альянсам у таборах і на волі.
  - 'Ізоляція: чи не була його «вертикаль духу» формою самоізоляції від світу, що вимагав компромісів для виживання?'
  - '[!myth-buster] Міф про те, що Стус був «засуджений адвокатом». Адвокат Медведчук був призначений державою, але вирок
    був вирішений наперед. Фокус на системі, а не на одній фігурі.'
  section: 'Тінь: Ціна безкомпромісності'
  words: 900
- points:
  - Обставини смерті в таборі Перм-36 (1985) — вбивство чи трагічна випадковість? Аналіз версій.
  - Перепоховання в Києві (1989) як символ кінця радянської епохи та повернення національної пам'яті.
  - '[!decolonization] Стус як приклад для сучасників у війні з Росією. Його «вертикальне стояння» як метафора стійкості всієї
    нації.'
  - 'Повернення до розминки: поет виявився небезпечнішим за армію, бо його слово пережило імперію і продовжує надихати на
    боротьбу.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life, dissident activity, and poetic legacy of Vasyl Stus, focusing on his role as a symbol of unbroken spirit
  against the Soviet regime, his 'spiritual vertical', and the price of moral choice.
level: BIO
module: bio-143
objectives:
- Критично аналізувати життя та спадщину Василя Стуса, розрізняючи біографічний факт та агіографічний міф
- Оцінювати його поезію як форму екзистенційного та політичного спротиву тоталітарній системі
- Формулювати аргументовану позицію щодо ціни та цінності морального вибору в умовах несвободи
- Розрізняти різні інтерпретації постаті Стуса (поет, політик, мученик, борець) та розуміти їхнє ідеологічне підґрунтя
