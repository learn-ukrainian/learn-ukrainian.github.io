content_outline:
- points:
  - 'Парадокс: Як поет, озброєний лише словом, може становити більшу загрозу для тоталітарної імперії, ніж армія? Життя Стуса — це відповідь.'
  - Стус як символ незламності духу — але якою ціною дається така незламність і хто її платить?
  - '[!biography] Коротка довідка: поет, політв''язень, один із найактивніших представників українського культурного руху шістдесятників.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стус — поет чи політик? Чи був його спротив естетичним вибором митця, що не міг творити в умовах брехні, чи свідомою політичною боротьбою за державність?'
  - 'Дебат 2: Канонізація Стуса — мученик чи борець? Як радянська пропаганда намагалася його маргіналізувати, і як сучасна Україна осмислює його спадщину — як трагедію жертви чи як перемогу духу?'
  - '[!epistemic-humility] Позиції в дисидентському середовищі різнилися: одні вважали безкомпромісність Стуса єдиним гідним шляхом, інші — тактично невиправданою.'
  - '[!decolonization] Розвінчання радянського наративу про «націоналістів» та «кримінальників», показ дисидентського руху як інтелектуального спротиву імперії.'
  section: 'Конфліктна карта: Поет, політик чи мученик?'
  words: 900
- points:
  - Сільське походження (1938, Рахнівка) та повоєнне дитинство на Донбасі — формування ідентичності на зросійщеній, але українській землі.
  - Навчання в педагогічному інституті у Сталіно (нині Донецьк), перші поетичні спроби та вивчення світової літератури — інтелектуальний фундамент.
  - Переїзд до Києва, аспірантура в Інституті літератури — входження в коло київських шістдесятників, що змінило все.
  - 'Формативні впливи: філософія екзистенціалізму, поезія Рільке, світогляд родини.'
  section: 'Формування: Від Рахнівки до Києва'
  words: 1000
- points:
  - 'Участь у русі шістдесятників: від літературних вечорів до відкритого протесту проти арештів інтелігенції у кінотеатрі «Україна» (1965).'
  - Перший арешт 1972 року, вирок, мордовські табори та подальше заслання на Колимі — примусове відлучення від нормального літературного процесу.
  - Другий арешт 1980 року, тяжчий вирок і табір особливого режиму на Уралі; рукописна доля «Палімпсестів» як окрема тема джерельної перевірки.
  - Стус як правозахисник і член Української Гельсінської групи; конкретні епізоди захисту інших в'язнів потребують окремих документів.
  section: 'Діяльність: Поезія і спротив за ґратами'
  words: 1300
- points:
  - '[!anti-hagiography] Безкомпромісність Стуса мала величезну ціну не тільки для нього, але й для його родини — зокрема, сина Дмитра, який ріс без батька.'
  - Різні стратегії дисидентського середовища не слід приписувати конкретним людям без прямого джерела; пакет фіксує лише ціну вибору для Стуса та родини.
  - 'Ізоляція: як багаторічні табори, заслання й цензура листування обмежували звичайні людські зв''язки?'
  - '[!myth-buster] Судовий вирок був інструментом радянської репресивної системи; роль окремих учасників процесу потребує окремого документального пакета.'
  section: 'Тінь: Ціна безкомпромісності'
  words: 900
- points:
  - 'Смерть у таборі ВС-389/36-1 у вересні 1985 року: пакет підтверджує репресивний контекст, але не встановлює остаточного фізичного механізму смерті.'
  - Перепоховання в Києві (1989) як символ кінця радянської епохи та повернення національної пам'яті.
  - '[!decolonization] Стус як приклад для сучасників у війні з Росією. Його «вертикальне стояння» як метафора стійкості всієї нації.'
  - 'Повернення до розминки: поет виявився небезпечнішим за армію, бо його слово пережило імперію і продовжує надихати на боротьбу.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life, dissident activity, and poetic legacy of Vasyl Stus, focusing on his role as a symbol of unbroken spirit against the Soviet regime, his 'spiritual vertical', and the price of moral choice.
level: BIO
module: bio-165
objectives:
- Критично аналізувати життя та спадщину Василя Стуса, розрізняючи біографічний факт та агіографічний міф
- Оцінювати його поезію як форму екзистенційного та політичного спротиву тоталітарній системі
- Формулювати аргументовану позицію щодо ціни та цінності морального вибору в умовах несвободи
- Розрізняти різні інтерпретації постаті Стуса (поет, політик, мученик, борець) та розуміти їхнє ідеологічне підґрунтя
