content_outline:
- points:
  - 'Парадокс: Як лінгвіст ХІХ століття, що писав переважно російською мовою, став іконою української філології та інтелектуальним
    батьком-засновником цілої наукової традиції?'
  - 'Провокація: Чи може теорія мови бути формою політичного спротиву? Розглядаємо Потебню не як філолога, а як "філософа
    мови" в умовах імперського тиску.'
  - '[!biography] Потебня — "український Гумбольдт", але що це означає насправді?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вірний підданий чи прихований дисидент? Його праці друкувалися в імперських виданнях, але його теорії підривали
    офіційну доктрину про "єдиний руський народ". Як сучасники (російські та українські) читали його між рядків?'
  - 'Дебат 2: Привласнення спадщини. Як радянська наука перетворила Потебню, захисника самобутності мов, на "прогресивного
    російського вченого"?'
  - '[!decolonization] Розбираємо, як імперія та СРСР "редагували" біографію Потебні, замовчуючи його працю над українською
    мовою та фольклором.'
  - '[!epistemic-humility] Аргументи Потебні проти мовної асиміляції були суто науковими. Чи можна вважати його діячем національного
    руху, чи він залишався лише "кабінетним ученим"?'
  section: 'Конфліктна карта: Свій серед чужих, чужий серед своїх?'
  words: 900
- points:
  - 'Соціальне походження: нащадок козацької старшини з Полтавщини. Як родинна пам''ять вплинула на його світогляд?'
  - 'Освітня траєкторія: Харківський університет — інтелектуальний котел, де український романтизм зустрівся з німецьким ідеалізмом
    (Кант, Гегель, Гумбольдт).'
  - 'Формативний досвід: що змусило молодого вченого зацікавитися не просто мовою, а зв''язком між мовою та мисленням?'
  - 'Поворотний момент: від класичної філології до створення власної "психологічної" лінгвістики.'
  section: 'Формування: Від козацького роду до німецької філософії'
  words: 1000
- points:
  - 'Magnum Opus: "Думка і мова" (1862) — аналіз праці, що випередила свій час і заклала основи когнітивної лінгвістики.'
  - 'Ключова концепція: теорія "внутрішньої форми слова". Як мова не просто називає, а й творить реальність для її носія.'
  - 'Заснування Харківської філологічної школи: Потебня як організатор науки. Його учні та їхній внесок у вивчення української
    діалектології, фольклору та етнографії.'
  - '"З нотаток про російську граматику": порівняльний аналіз української та російської мов, який доводив їхню рівноцінність
    та окремішність, що було сміливим кроком після Емського указу.'
  section: 'Діяльність: Думка, мова та наукова школа'
  words: 1300
- points:
  - '[!anti-hagiography] Чому Потебня, палкий захисник української мови, написав свої основні праці російською? Аналіз причин:
    цензура, академічні вимоги, бажання вести діалог на імперському рівні.'
  - 'Ціна компромісу: чи не сприяло те, що він писав російською, подальшому привласненню його спадщини російською наукою?'
  - 'Критика сучасників: деякі українські діячі (напр. Драгоманов) критикували його "відірваність від життя" та надмірний
    академізм. Наскільки справедливі ці закиди?'
  - '[!myth-buster] Потебня не був політичним діячем у сучасному розумінні. Його боротьба була суто інтелектуальною. Розвінчуємо
    міф про "революціонера в науці".'
  section: 'Тінь: Мова імперії, думка народу?'
  words: 900
- points:
  - 'Повернення до розминки: тож як учений, що писав російською, став символом української науки? Формулюємо відповідь, спираючись
    на знання про його теорії та контекст епохи.'
  - 'Спадщина: Інститут мовознавства його імені в Києві, вплив на наступні покоління (від Агатангела Кримського до Юрія Шевельова).'
  - 'Актуальність сьогодні: як ідеї Потебні про зв''язок мови та національної ідентичності резонують у сучасній Україні, що
    бореться за свою суб''єктність?'
  - '[!decolonization] Підсумок: Потебня — це не просто "батько мовознавства", а приклад того, як інтелектуальна праця може
    стати потужною зброєю у боротьбі за існування нації.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Oleksandr Potebnya's life, the connection between thought and language, the theory of the inner form of the word, the
  Kharkiv philological school, and his intellectual defense of the Ukrainian language against imperial pressure.
level: BIO
module: bio-043
objectives:
- Критично аналізувати наукову спадщину Олександра Потебні в контексті імперської політики та українського національного відродження.
- Пояснювати ключові концепції його лінгвістичної теорії (внутрішня форма слова, зв'язок мови та мислення).
- Оцінювати внесок Потебні та його Харківської філологічної школи в розвиток української науки.
- Формулювати аргументовану позицію щодо неоднозначності постаті Потебні як вченого, що працював в умовах імперії.
