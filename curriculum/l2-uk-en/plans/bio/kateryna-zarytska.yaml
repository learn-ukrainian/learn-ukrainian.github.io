- word: зв'язкова
  definition: учасниця підпілля, яка передає повідомлення та підтримує таємні контакти
  pos: ж.
- word: підпілля
  definition: нелегальна організаційна діяльність за умов переслідування
  pos: с.
- word: вирок
  definition: рішення суду про винуватість і покарання
  pos: ч.
- word: політв'язень
  definition: людина, ув'язнена з політичних мотивів
  pos: ч.
- word: некролог
  definition: повідомлення про смерть із короткою характеристикою померлої особи
  pos: ч.
- word: первинний документ
  definition: матеріал, створений учасниками або установами в час досліджуваних подій
  pos: ч.
- word: цивільна шкода
  definition: загибель, поранення або інше насильство щодо некомбатантів
  pos: ж.
- word: атрибуція
  definition: встановлення автора, джерела або відповідального суб'єкта дії
  pos: ж.
- word: агіографія
  definition: некритичне ідеалізоване зображення історичної постаті
  pos: ж.
