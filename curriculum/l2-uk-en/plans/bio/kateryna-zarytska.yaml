content_outline:
- points:
  - >-
    [!biography] Знайомство з Катериною Миронівною Зарицькою: організаторка підпілля,
    очільниця Українського Червоного Хреста (УЧХ) при УПА, авторка політичних текстів.
    Народилася 5 листопада 1914 року в Коломиї.
  - >-
    Провокаційне питання: як жінка, що керувала гуманітарною мережею, стала авторкою
    теоретичних антиімперських праць і провела понад 25 років у тюрмах?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та родина: донька математика Мирона Зарицького, студентка Львівської політехніки,
    дружина Михайла Сороки — але її роль не зводиться до сімейних зв'язків.
  - >-
    Діяльність в ОУН: арешт польською владою 8 листопада 1934 року у справі, пов'язаній
    з політичним насильством ОУН у міжвоєнній Польщі.
  - >-
    [!epistemic-humility] Польське переслідування 1934 року пов'язує Зарицьку з контекстом
    міжвоєнного політичного насильства ОУН; вона не була командиром на Волині, але
    організаційний контекст залишається релевантним.
  section: 'Формування: Від Львівської політехніки до підпілля ОУН'
  words: 1000
- points:
  - >-
    Керівництво УЧХ всередині УПА: гуманітарна мережа, що діяла в збройному підпіллі
    (не тотожна міжнародній нейтральній організації).
  - >-
    Політична публіцистика 1946 року: "Шляхи російського імперіалізму", "Большевики
    і національне питання", "Науковість діалектичного матеріалізму" — ідеологічна
    критика радянської системи.
  - >-
    [!decolonization] Аналіз ідеологічної критики СРСР Зарицькою. Вона протистояла системі
    як інтелектуалка, що аналізувала радянську систему через призму антиімперіалізму.
  - >-
    [!anti-hagiography] Уникання зайвого очищення її образу: вона була ідеологічно свідомою
    лідеркою радикальної організації, а не просто сестрою милосердя поза політикою.
  section: 'Діяльність: Український Червоний Хрест та ОУН'
  words: 1200
- points:
  - >-
    [!myth-buster] Протидія російській пропаганді, яка маргіналізує жінок у підпіллі або
    називає їх виключно "посібницями банд". Зарицька мала політичну суб'єктність.
  - >-
    Ув'язнення та терор: арешт радянськими органами 1940 року, потім повторний арешт
    МДБ у 1947 році з вироком до 25 років.
  - >-
    Географія покарання: відбувала термін у Верхньоуральській та Володимирській тюрмах,
    а також у Мордовських таборах Росії — тюремна система за межами України.
  - >-
    Звільнення 1968 року з обмеженнями проживання до 1972 року; смерть у Львові
    29 серпня 1986 року після десятиліть репресій.
  section: 'Тінь: 25 років у радянських тюрмах'
  words: 1600
- points:
  - >-
    Жіноче лідерство: Зарицька як приклад політичної суб'єктності жінок у підпіллі —
    ні маскулінізація через чоловічих командирів, ні санітизація через гуманітарну роль.
  - >-
    Сучасне значення: символ жіночого лідерства у визвольних змаганнях і незламності
    перед довготривалою машиною радянського ГУЛАГу та тюремного терору.
  - >-
    [!epistemic-humility] Пам'ять про Зарицьку потребує балансу між визнанням її агентності
    та збереженням контексту контроверсійного руху ОУН/УПА.
  section: 'Підсумок: Підпілля, ідеологія та Володимирський централ'
  words: 1000
