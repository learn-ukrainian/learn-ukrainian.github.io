focus: >-
  Катерина Зарицька як учасниця ОУН, референтка підпільного Українського Червоного
  Хреста, зв'язкова й політв'язень; конкретні ролі, арешти, вироки та пізнє життя
  без заміни біографії організаційною міфологією.
level: BIO
module: bio-306
objectives:
- Розрізняти членство в ОУН, працю в Українському Червоному Хресті, пропаганді та зв'язку.
- Відтворювати дати двох радянських арештів, вироку, ув'язнення і звільнення.
- Пояснювати, що первинний лист і політичний текст засвідчують авторський голос, але не всю біографічну хронологію.
- Аналізувати гендер, підпілля й політику пам'яті без агіографії та імперської криміналізації.
