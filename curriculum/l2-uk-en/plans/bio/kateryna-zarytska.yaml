content_outline:
- points:
  - >-
    [!biography] Знайомство з Катериною Зарицькою: організаторка підпілля, очільниця Українського
    Червоного Хреста (УЧХ) при УПА, авторка політичних текстів. Народилася 5 листопада
    1914 року в Коломиї.
  - >-
    Провокаційне питання: як жінка, що керувала гуманітарною мережею, стала авторкою теоретичних
    антиімперських праць і провела понад 25 років у тюрмах?
  section: Розминка
  words: 400
- points:
  - >-
    Діяльність в ОУН: арешт польською владою (1934), активна участь у розбудові підпільної
    мережі. Відмова від зведення її ролі лише до "допоміжної" сімейної функції (донька
    математика Мирона Зарицького, дружина Михайла Сороки).
  - >-
    [!epistemic-humility] Гуманітарна і політична праця: керівництво УЧХ всередині УПА. Зарицька
    діяла всередині збройного націоналістичного підпілля, історія якого містить багато
    контроверсій та збройних конфліктів із цивільним населенням інших національностей.
  - >-
    Політична публіцистика: авторка праць "Шляхи російського імперіалізму", "Большевики
    і національне питання" (1946).
  section: 'Діяльність: Український Червоний Хрест та ОУН'
  words: 1400
- points:
  - >-
    [!decolonization] Аналіз ідеологічної критики СРСР Зарицькою. Вона протистояла системі
    як інтелектуалка, що аналізувала радянську систему через призму антиімперіалізму.
  - >-
    [!myth-buster] Протидія російській пропаганді, яка маргіналізує жінок у підпіллі або
    називає їх виключно "посібницями банд". Зарицька мала політичну суб'єктність.
  - >-
    [!anti-hagiography] Уникання зайвого очищення її образу: вона була ідеологічно свідомою
    лідеркою радикальної організації, а не просто сестрою милосердя поза політикою.
  section: 'Контекст: Жінка-ідеолог в умовах збройної боротьби'
  words: 1000
- points:
  - >-
    Ув'язнення та терор: арешти радянськими органами (1940, потім 1947). Вирок МДБ до 25 років.
  - >-
    Географія покарання: відбувала термін у Верхньоуральській та Володимирській тюрмах, а також
    у Мордовських таборах Росії.
  - >-
    Сучасне значення: Зарицька як символ жіночого лідерства у визвольних змаганнях і незламності
    перед довготривалою машиною радянського ГУЛАГу та тюремного терору (померла у Львові в 1986 році).
  section: 'Тінь: 25 років у радянських тюрмах'
  words: 1200
