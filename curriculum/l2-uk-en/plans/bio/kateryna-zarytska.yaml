content_outline:
- points:
  - >-
    [!decolonization] Катерина Зарицька діяла за польського переслідування,
    нацистської окупації та радянського повернення; імперські ярлики не замінюють
    опису її конкретних ролей.
  - >-
    [!biography] Членство в ОУН, підпільний Український Червоний Хрест,
    пропагандистська праця, зв'язкова діяльність і тривале ув'язнення розглядаються окремо.
  section: 'Вступ: біографія замість організаційної легенди'
  words: 600
- points:
  - Народження 3 листопада 1914 року в Коломиї за оновленою ЕСУ.
  - Навчання, «Юнацтво» ОУН, бойово-розвідувальна п'ятірка й арешт 1934 року.
  - >-
    [!anti-hagiography] Причетність у формулюванні польського обвинувачення
    подається як обвинувачення та вирок, а не перетворюється на невизначене «переслідування».
  section: 'Міжвоєнна ОУН, арешт і польські суди'
  words: 900
- points:
  - Арешт НКВС 22 березня 1940 року, народження сина у в'язниці та вихід 28 червня 1941 року.
  - >-
    Родинні обставини пояснюють ціну репресії, але не використовуються як доказ
    політичної правоти будь-якої організації.
  - Відновлення підпільної діяльності в умовах нацистської окупації.
  section: 'Перший радянський арешт і війна'
  words: 800
- points:
  - Референтка підпільного Українського Червоного Хреста від 1943 року.
  - Особиста зв'язкова Романа Шухевича від 1945 року й робота в осередку пропаганди.
  - >-
    Конкретні функції не дозволяють автоматично приписувати Зарицькій кожне
    рішення ОУН або УПА; керівна й зв'язкова відповідальність також не замовчується.
  section: 'Український Червоний Хрест, пропаганда і зв''язок'
  words: 1100
- points:
  - >-
    21 вересня 1947 року — арешт; 20 листопада 1948 року — вирок на двадцять
    п'ять років за ЕСУ.
  - Верхньоуральська та Владимирська в'язниці, Мордовія, звільнення 21 вересня 1972 року.
  - >-
    Лист до сина від 26 серпня 1952 року читається в академічному виданні за
    сторінками 254–257; родинний голос не підміняє судової та табірної хронології.
  section: 'Арешт 1947 року, вирок і двадцять п''ять років неволі'
  words: 1100
- points:
  - Життя у Волочиську після звільнення, смерть там 29 серпня 1986 року та поховання у Львові.
  - >-
    Польські та єврейські перспективи на ОУН і УПА не оголошуються чужою
    пропагандою; індивідуальну причетність до цивільної шкоди встановлюють лише документом.
  - >-
    [!myth-buster] Пізніше вшанування й нагородний наратив є політикою пам'яті,
    а не заміною архівної атрибуції.
  section: 'Пізнє життя, смерть і суперечки пам''яті'
  words: 700
