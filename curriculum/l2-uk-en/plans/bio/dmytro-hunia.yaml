content_outline:
- points:
  - 'Провокація: людина без відомого року народження й без відомого року смерті очолила останню оборону війни 1638 року — і зникла в степу. Що робити історикові з такими прогалинами?'
  - '[!biography] Знайомство з постаттю, чия біографія вчить читати джерела там, де певності найменше.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Старець як героїчна остання твердиня, де все вирішувало військове вміння.'
  - 'Позиція 2: долю табору вирішили блокада, постачання й переговори, а не сама лише мужність.'
  - '[!decolonization] Ворожий щоденник Окольського (у передачі Лукомського й Величка) — це свідчення, а не нейтральна оповідь; його риторику читаємо як позицію сторони.'
  - '[!epistemic-humility] Ми не знаємо ні народження, ні смерті, ні всіх мотивів Гуні — тож уникаємо і сцени героїчної загибелі, і сцени боягузливої втечі.'
  section: 'Конфліктна карта: Оборона, логістика й переговори'
  words: 900
- points:
  - 'Раннє життя джерельно тонке: невідоме походження, без певної родинної сцени.'
  - '1637 рік: участь у повстанні Павлюка. Після розгрому під Кумейками, коли Павлюк і Скидан залишили зламаний табір, саме Гуня вивів рештки вночі до Боровиці.'
  - '[!anti-hagiography] Ця деталь учить неодноосібної історії: перемоги й поразки належать радам і командам, а не одному «рятівникові».'
  - 'Січ і оборона: після Кумейок і Боровиці Гуню обрали гетьманом на Січі; на початку 1638 року його козаки розбили каральний загін ротмістра К. Мелецького, що йшов на Базавлуцьку Січ.'
  section: 'Формування: Той, хто вивів рештки з-під Кумейок'
  words: 1000
- points:
  - 'Березень 1638 року: Гуня приєднався до війська Острянина й командував загоном, що захоплював головні дніпровські переправи (Кременчук, Пилявець, Чигирин-Діброва).'
  - 'Перехід проводу: під Жовнином Острянин відійшов із частиною сил, а рештки обрали гетьманом Гуню — саме звідси він стає відповідальним за фінальну оборону.'
  - 'Старець: укріплений табір при гирлі Сули, на старому дніпровському рукаві, понад місяць відбивав переважні сили (22 (12) червня - 6 серпня (27 липня) 1638 року).'
  - 'Військова географія й облога: вода, плавні, переправи й постачання визначали бій; нападники зрозуміли, що вирішить блокада й перехоплення підмоги.'
  section: 'Діяльність: Від переправ до табору над Старцем'
  words: 1300
- points:
  - '[!anti-hagiography] Брак припасів схилив табір до згоди; Гуня й Філоненко відійшли ще перед капітуляцією. Це порятунок, командна відповідальність чи ворожа рамка? — джерельна проблема, не готовий присуд.'
  - '[!myth-buster] Старець — старий рукав і затока при гирлі Сули, значною мірою затоплені Кременчуцьким водосховищем; тож «мапу битви» не можна подавати без джерельних осторог.'
  - Реєстрові козаки в ролі перехоплення — служилий стан під примусом, а не позачасові «зрадники».
  - 'Доля після втечі: у серпні малий загін Гуні прорвався до Запорожжя; навесні 1640 року він водив запорожців і донців проти Туреччини — але пізніша доля лишається невідомою, і вигадувати їй кінець не можна.'
  section: 'Тінь: Відхід перед капітуляцією'
  words: 900
- points:
  - 'Повернення до розминки: як тримати біографію чесною там, де немає ні дати народження, ні дати смерті?'
  - 'Правовий підсумок: ординація 1638 року й режим Микитинської Січі звузили рух і визнання козаків після поразки циклу.'
  - Чому джерельна пам'ять робить відхід Гуні то зрадою, то тріумфом — і чому чесніше визнати невизначеність.
  - '[!decolonization] Оборона над Старцем як поєднання вміння, меж постачання, переговорів і виживання, а не як проста легенда про «останнього оборонця».'
  section: 'Дискусія та підсумок: Пам''ять і невідома доля'
  words: 700
focus: Dmytro Hunia across the 1637-1638 Cossack war — from leading the Kumeyky remnants to the month-long fortified defense at the Starets, the blockade and negotiation, his departure before the capitulation, and a life that both begins and ends in documentary uncertainty.
