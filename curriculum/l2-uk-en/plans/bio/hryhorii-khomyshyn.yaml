content_outline:
- points:
  - >-
    [!biography] Григорій Хомишин (1867, Гадинківці): від селянської родини через
    Тернопільську гімназію (1888) і Львівську духовну освіту до доктора теології після
    Відня (1899).
  - >-
    Провокаційне питання: чому радянська влада знищувала єпископа, який чотири
    десятиліття будував семінарії, школи й пресу, а не лише «агента Ватикану»?
  section: Розминка
  words: 400
- points:
  - >-
    Ректор Львівської семінарії (1902–1904) за призначенням митрополита Андрея
    Шептицького; єпископське освячення у 1904 році в соборі святого Юра.
  - >-
    Станиславівська єпархія: відкриття семінарії (1907), фінансова підтримка шкіл,
    сиротинців і монастирських установ.
  - >-
    [!decolonization] Громадсько-релігійні ініціативи: Українська католицька організація,
    згодом Українське національне відродження; товариство *Скала* (1935) проти
    комуністичної загрози — у міжвоєнному контексті Другої Польської Республіки.
  section: 'Формування: Семінарія, єпархія та громадська організація'
  words: 1000
- points:
  - >-
    Католицька преса: *Нова Зоря* (1926), *Правда* (1927); адреса 1931 року про пресу
    («вона фактично має владу над людським мисленням»).
  - >-
    *Українська проблема* (1932): морально-теологічна аргументація («коли впровадимо
    Боже царство в наші душі») замість світської партійної мови.
  - >-
    [!anti-hagiography] Складна прикордонна фігура: українсько-польські та церковні
    суперечки (латинізація, радикальний націоналізм) не зводяться до простого символу
    мученика.
  - >-
    *Вісник Станиславівської єпархії* (1934): захист релігійного читання й преси як
    пастирського інструменту.
  section: 'Діяльність: Преса та «Українська проблема»'
  words: 1200
- points:
  - >-
    [!decolonization] Перший арешт (1939); масовий арешт ієрархії УГКЦ (квітень 1945).
    Звинувачення в «антирадянській агітації», «агенті Ватикану» та «відокремленні
    українців від російського народу» — радянська криміналізуюча лексика, не
    нейтральний опис.
  - >-
    Кримінальна справа №35826 (т. 1, архів СБУ, Київ): 36 протоколів допитів;
    статті 54-1a і 54-11 КК УРСР; мова обвинувачення в ідіомі слідчого, не Хомишина.
  - >-
    [!epistemic-humility] Переведення до лікарні внутрішньої тюрми НКВС (21 грудня
    1945), смерть на Лук'янівській (28 грудня 1945 за УГКЦ). Ватикан подає 17 січня
    1947 — розбіжність дат зазначаємо явно, не «узгоджуємо» мовчки.
  section: 'Тінь: Справа №35826 та Лук''янівська тюрма'
  words: 1600
- points:
  - >-
    Доля єпархіальних установ після псевдособору 1946 року; збереження пастирських
    листів, мемуарів і архівного резюме справи.
  - >-
    Беатифікація як акт Католицької церкви (2001, візит Папи Івана Павла II): визнання
    мучеництва без перетворення складної міжвоєнної біографії на єдиний наратив.
  - >-
    Сучасне значення: єпископ як приклад дієцезійної розбудови, пресової стратегії
    та механізму знищення ієрархії УГКЦ.
  section: 'Підсумок: Пам''ять про єпископа-розбудовника'
  words: 1000
focus: >-
  Григорій Хомишин як єпископ Станиславівський, будівничий дієцезії та жертва радянського
  терору. Аналіз католицької преси, пастирського листа «Українська проблема» та
  механізмів справи №35826.
