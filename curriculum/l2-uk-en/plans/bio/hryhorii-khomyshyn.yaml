content_outline:
- points:
  - >-
    [!biography] Життєвий шлях Григорія Хомишина: від селянської родини до доктора теології
    та єпископа Станиславівського. Висвячений Андреєм Шептицьким у 1904 році.
  - >-
    Вступ до проблематики: міжвоєнна діяльність єпископа, розбудова дієцезії та
    його суспільно-релігійна позиція.
  section: Розминка
  words: 400
- points:
  - >-
    Освітня та суспільна праця: навчання у Відні, підтримка Станиславівської семінарії,
    розбудова шкіл та сиротинців.
  - >-
    Католицька акція та преса: заснування газет "Нова Зоря" (1926) і "Правда" (1927).
    Розуміння медіа як інструменту впливу ("вона фактично має владу над людським мисленням").
  - >-
    [!decolonization] Розбір пастирського листа "Українська проблема" (1932): протидія
    як польському тиску, так і радикальному націоналізму через призму морального авторитету.
  section: 'Діяльність: Від семінарії до католицької преси'
  words: 1000
- points:
  - >-
    [!anti-hagiography] Єпископ Хомишин був складною фігурою, чиї погляди на українсько-польські
    відносини та радикальні рухи викликали дискусії, проте радянська влада знищувала
    його саме за духовний авторитет.
  - >-
    Механізм репресій: арешт у 1945 році (кримінальна справа №35826), звинувачення в
    "антирадянській агітації" та як "агента Ватикану" — використання радянської
    криміналізуючої лексики.
  - >-
    [!epistemic-humility] Смерть у тюремній лікарні в Києві. Розбіжність у датах
    смерті: УГКЦ вказує 28 грудня 1945 року, тоді як Ватикан подає 17 січня 1947 року.
  section: 'Тінь: Арешт та мученицька смерть'
  words: 1600
- points:
  - >-
    Знищення єпархіальних інституцій після псевдособору 1946 року. Збереження
    пастирських листів та громадської пам'яті.
  - >-
    Беатифікація як акт Церкви у 2001 році: офіційне визнання мучеництва під час
    візиту Папи Івана Павла II до України.
  section: 'Підсумок: Збереження спадщини та пам''яті'
  words: 1000
focus: >-
  Григорій Хомишин як єпископ Станиславівський, суспільний діяч та жертва радянського терору.
  Аналіз його підходу до католицької преси, пастирської діяльності та механізмів його
  репресування радянськими спецслужбами.
