content_outline:
- points:
  - >-
    [!biography] Григорій Хомишин (1867, Гадинківці): від селянської родини через
    Тернопільську гімназію (1888) і Львівську духовну освіту до доктора теології після
    Відня (1899).
  - >-
    Провокаційне питання: чому радянська влада знищувала єпископа, який чотири
    десятиліття будував семінарії, школи й пресу, а не лише «агента Ватикану»?
  section: Розминка
  words: 400
- points:
  - >-
    Ректор Львівської семінарії (1902–1904) за призначенням митрополита Андрея
    Шептицького; єпископське освячення у 1904 році в соборі святого Юра.
  - >-
    Станиславівська єпархія: відкриття семінарії (1907), фінансова підтримка шкіл,
    сиротинців і монастирських установ.
  - >-
    [!decolonization] Громадсько-релігійні ініціативи: Українська католицька організація
    (1927), 1931 року перейменована на товариство «Українська Народна Обнова» — саме
    ця назва точна; радянські документи помилково пишуть «Національна». Товариство
    *Скала* (1935) проти комуністичної загрози — у міжвоєнному контексті Другої
    Польської Республіки.
  section: 'Формування: Семінарія, єпархія та громадська організація'
  words: 1000
- points:
  - >-
    Католицька преса: *Нова Зоря* (1926), *Правда* (1927). Радянська постанова про арешт
    називала «Нову Зорю» органом «Української Народної Обнови», що нібито закликав народ
    лояльно ставитися до польської влади — тобто держава ставила за провину те, за що
    Хомишина критикували націоналісти.
  - >-
    *Українська проблєма* (1932; назва в правописі оригіналу, академічна форма —
    «Українська проблема»): морально-теологічна аргументація («коли впровадимо Боже
    царство в наші душі») замість світської партійної мови. Цитата доводить авторську
    тезу, а не її правильність.
  - >-
    [!anti-hagiography] Складна прикордонна фігура: українсько-польські та церковні
    суперечки (латинізація, радикальний націоналізм) не зводяться до простого символу
    мученика.
  - >-
    *Вісник Станиславівської єпархії* (1934): захист релігійного читання й преси як
    пастирського інструменту.
  section: 'Діяльність: Преса та «Українська проблема»'
  words: 1200
- points:
  - >-
    [!decolonization] Перший арешт (1939); масовий арешт ієрархії УГКЦ (квітень 1945).
    Звинувачення в «антирадянській агітації», «агенті Ватикану» та «відокремленні
    українців від російського народу» — радянська криміналізуюча лексика, не
    нейтральний опис.
  - >-
    Кримінальна справа № 35826 (т. 1, 390 сторінок, Архів СБУ, Київ): 36 протоколів
    допитів — 28 удень, один уночі, решта ввечері; тривалість від 2 год. 20 хв. до
    37 год. 20 хв.; останній протокол 11 вересня 1945 року; допити провадив капітан
    держбезпеки Дубок. Ордер № 634 від 11 квітня 1945 року. Мова обвинувачення — в
    ідіомі слідчого, не Хомишина.
  - >-
    [!epistemic-humility] Переведення до лікарні Лук'янівської в'язниці 21 грудня
    1945 року; акт лікаря Фридберга фіксує смерть «при явищах наростаючої
    серцевої слабкості, від старечої дряхлості і елементарної дистрофії» —
    цитувати формулу документа дослівно. Дата смерті розходиться в джерелах:
    архівна публікація та синодальна довідка подають 28 грудня 1945 року,
    академічна стаття — 17 грудня 1945 року (з покликанням на Реєнта);
    розбіжність зазначаємо явно, а не вирішуємо більшістю. Розбіжність дати
    арешту зазначаємо явно так само: архівна публікація — ніч на 12 квітня 1945
    року, життєписна довідка — 15 квітня.
  section: 'Тінь: Арешт 1945 року та Лук''янівська в''язниця'
  words: 1600
- points:
  - >-
    Доля єпархіальних установ після псевдособору 1946 року; збереження пастирських
    листів, мемуарів і архівного резюме справи.
  - >-
    Беатифікація як акт Католицької церкви (2001, візит Папи Івана Павла II): визнання
    мучеництва без перетворення складної міжвоєнної біографії на єдиний наратив.
  - >-
    Сучасне значення: єпископ як приклад дієцезійної розбудови, пресової стратегії
    та механізму знищення ієрархії УГКЦ.
  section: 'Підсумок: Пам''ять про єпископа-розбудовника'
  words: 1000
focus: >-
