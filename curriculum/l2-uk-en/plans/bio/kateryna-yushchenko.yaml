content_outline:
- points:
  - 'Парадокс: Перша у світі високорівнева мова програмування була створена не в США, а в Києві, жінкою-математиком. Чому
    її ім''я не стоїть поруч з Грейс Гоппер?'
  - '[!biography] Катерина Ющенко — піонерка кібернетики, чия робота на десятиліття випередила західні аналоги, але залишилася
    за "залізною завісою".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ющенко — автор "мови програмування" чи просто "адресної мови"? Дискусія про термінологію та критерії "високорівневості"
    у 1950-х.'
  - 'Дебат 2: Чому її не знають на Заході? Аргумент "залізної завіси" та відсутності публікацій англійською vs аргумент паралельного,
    але несумісного шляху розвитку радянської кібернетики.'
  - '[!epistemic-humility] Визнання, що історія технологій пишеться переможцями "холодної війни". Оцінка внеску Ющенко вимагає
    деконструкції західноцентричного погляду на історію ІТ.'
  - '[!decolonization] Розгляд спадщини Ющенко як частини української наукової школи, а не лише "радянської".'
  section: 'Конфліктна карта: Забутий геній чи дитя свого часу?'
  words: 900
- points:
  - Дитинство в Чигирині, інтелігентна родина, вплив батька-історика.
  - Навчання в Самаркандському університеті під час Другої світової війни та евакуації — вибір математики як "мови істини".
  - Переїзд до Львова, аспірантура в Інституті математики АН УРСР — робота над теорією ймовірностей та її прикладними задачами.
  - 'Соціальний контекст: як війна, репресії та повоєнна відбудова сформували покоління вчених, для яких наука була формою
    ескапізму та служіння.'
  section: 'Формування: Шлях до математики через бурі ХХ століття'
  words: 1000
- points:
  - Робота з першими ЕОМ в СРСР — МЭСМ та "Київ". Програмування в машинних кодах як "пекельна праця".
  - 'Ключова ідея Ющенко: непряма адресація та покажчики (pointers) як спосіб абстрагуватися від фізичного розташування даних
    у пам''яті — революція 1955 року.'
  - 'Адресна мова: її структура, оператори, ідеологія. Чому вона була зручнішою для програмістів, ніж машинні коди?'
  - Вплив на команду Глушкова та розвиток Інституту кібернетики. Адресна мова стала стандартом для всіх ЕОМ серії "Київ" та
    "Урал".
  section: 'Діяльність: Народження адресної мови'
  words: 1300
- points:
  - '[!anti-hagiography] Адресна мова, попри свою революційність, не мала компілятора в сучасному розумінні і була жорстко
    прив''язана до архітектури конкретних машин, що обмежило її поширення.'
  - 'Проблема визнання: чому патент на покажчики отримали американці через 20 років? Роль секретності, відсутності міжнародних
    контактів та мовного бар''єру.'
  - '[!myth-buster] Міф про те, що радянська наука була повністю ізольованою. Контакти були, але вибіркові. Проблема була
    в асиметричному обміні інформацією — Захід не читав російською та українською.'
  - 'Жінка-вчений у патріархальному світі радянської академії: труднощі, з якими стикалася Ющенко, попри формальну "рівність".'
  section: 'Тінь: Залізна завіса та "холодна війна" в науці'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому Ющенко не стала "українською Грейс Гоппер" на світовій арені.'
  - 'Оцінка спадщини: чи є Адресна мова "тупиковою гілкою" еволюції, чи її ідеї були реалізовані в інших мовах (ALGOL, C)
    незалежно?'
  - 'Сучасне вшанування: Ющенко як символ для жінок в українському ІТ та як приклад деколонізації історії науки.'
  - '[!decolonization] Відновлення її імені — це не просто акт історичної справедливості, а й повернення Україні її власної
    наукової суб''єктності.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Kateryna Yushchenko, creator of the Address Language (the world's first high-level programming
  language), and the reasons for her relative obscurity in the West.
level: BIO
module: bio-132
objectives:
- Критично аналізувати життя та спадщину Катерини Ющенко як піонерки кібернетики
- Оцінювати внесок Адресної мови в історію програмування, враховуючи контекст "холодної війни"
- Пояснювати причини "забуття" українських вчених на світовій арені та важливість деколонізації історії науки
- Формулювати аргументовану позицію щодо ролі жінок у розвитку української науки та технологій
