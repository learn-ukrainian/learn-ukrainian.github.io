content_outline:
- points:
  - 'Парадокс: Як лікар і поет-символіст став автором радикальної геополітичної доктрини, що передбачала «розподіл Росії»
    за 70 років до її реального обговорення?'
  - 'Провокація: Чи може людина, що пише про «раси» та «кров», бути адекватним стратегом для сучасної громадянської нації?'
  - '[!biography] Юрій Липа — поет, лікар, ідеолог українського морського домінування.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чорноморська доктрина — це оборонна стратегія для виживання України чи проєкт української міні-імперії від Балкан
    до Кавказу?'
  - 'Дебат 2: «Розподіл Росії» — це пророче передбачення неминучого колапсу імперії чи небезпечна ідея, що штовхає Україну
    на шлях агресивної зовнішньої політики?'
  - '[!epistemic-humility] Позиція опонентів: Помірковані критики вказували на нереалістичність та авантюрність планів Липи.
    Радянська пропаганда таврувала його як «фашистського ідеолога».'
  - '[!decolonization] Липа першим намагався повністю деколонізувати українську геополітичну думку, відірвавши її від євразійської
    (російської) парадигми і повернувши до моря.'
  section: 'Конфліктна карта: Пророк чи імперіаліст?'
  words: 900
- points:
  - Народження в Одесі в родині Івана Липи — одного з засновників «Братства Тарасівців». Спадкоємність державницької ідеї.
  - 'Формативний вплив Одеси: портове місто, «вікно в світ», перехрестя культур, що сформувало антитезу до сухопутної, консервативної
    Росії.'
  - 'Поразка УНР та еміграція до Польщі: особиста травма, що стала рушієм для пошуку причин поразки і шляхів майбутньої перемоги.'
  section: 'Формування: Одеський простір та спадщина батька (1900-1920)'
  words: 1000
- points:
  - '«Призначення України» — головна геополітична праця. Аналіз трьох «регіонів» української душі: скіфського (Степ), скандинавського
    (Ліс) і фракійського (Море).'
  - 'Чорноморська доктрина: Україна як морська держава, лідер Чорноморсько-Балтійської осі, що контролює торгівлю та геополітику
    регіону.'
  - 'Поєднання професій: як практика лікаря (діагноз, лікування) вплинула на його геополітичний метод (аналіз «хвороб» держав,
    пропозиція «рецептів»).'
  - 'Літературна діяльність: поетичні збірки, що створювали міф про сильну, героїчну Україну, доповнюючи раціональні геополітичні
    конструкції.'
  section: 'Діяльність: «Призначення України» та Чорноморська доктрина (1920-1939)'
  words: 1300
- points:
  - '[!anti-hagiography] Антропологічні та «расові» теорії Липи: його праці містять сьогодні неприйнятні концепції про «українську
    расу», що є об''єктом критики та відкидаються сучасною наукою.'
  - 'Зв''язки з ОУН та Дмитром Донцовим: наскільки ідеї Липи були близькі до інтегрального націоналізму, і де він з ним полемізував?'
  - '[!myth-buster] Липа не був кабінетним ученим. Під час Другої світової війни він був активним учасником Руху Опору, лікарем
    УПА на Яворівщині.'
  - 'Загибель від рук НКВС: трагічний кінець як підтвердження небезпеки його ідей для радянської імперії. Він заплатив життям
    за свої переконання.'
  section: 'Тінь: Ціна пророцтва та расова теорія (1939-1944)'
  words: 900
- points:
  - 'Повернення до парадоксу: чи дав модуль відповідь, як поет-символіст став геополітичним стратегом?'
  - 'Актуальність ідей Липи сьогодні: наскільки його доктрина актуальна в контексті сучасної війни, блокади портів та боротьби
    за домінування у Чорному морі?'
  - '[!decolonization] Юрій Липа — ключова фігура для розуміння деколонізації Півдня України. Його праці дають інтелектуальну
    зброю проти російського наративу про «ісконно русскій Юг».'
  - 'Підсумок: Липа залишається суперечливою, але надзвичайно важливою фігурою — не як бездоганний пророк, а як мислитель,
    що змусив українців мріяти про море та глобальну стратегію.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Yurii Lypa, focusing on his Black Sea Doctrine, the controversial aspects of his geopolitical
  thought, and the tension between his roles as poet, doctor, and nationalist ideologue.
