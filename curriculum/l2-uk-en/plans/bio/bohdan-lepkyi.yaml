content_outline:
- points:
  - >-
    [!biography] Богдан Лепкий: галицький поет, прозаїк, літературознавець,
    перекладач, художник, краківський професор і культурний посередник між
    українським та польським просторами.
  - >-
    Провокаційне питання: коли пісня про журавлів стає народною пам’яттю, а
    історичний роман повертає Мазепу з імперського тавра, де межа між
    реституцією і новою легендою?
  section: Розминка
  words: 400
- points:
  - >-
    Кривенький, Бережани, Відень, Львів і Краків: син священника з Галичини
    входить у багатомовне освітнє середовище і поступово стає професійним
    літератором та викладачем.
  - >-
    Родина Лепких, брат Левко, мистецькі зацікавлення, учителювання і ранні
    літературні контакти показують культуру як сімейну, шкільну і громадську
    працю.
  - >-
    [!epistemic-humility] Інституційні джерела дають 4 листопада 1872 року,
    тоді як популярна пам’ять іноді називає 9 листопада; учні вчаться бачити
    різницю між джерелом і комеморацією.
  section: 'Формування: Бережани, Львів і краківська дорога'
  words: 1000
- points:
  - >-
    `Чуєш, брате мій` / `Журавлі`: текст Богдана і музика Левка Лепкого
    перетворюють образ відльоту, чужини і смерті на пісенну форму спільної
    пам’яті.
  - >-
    Мазепинський цикл: `Мотря`, `Не вбивай`, `Батурин`, `Полтава` та інші
    частини повертають гетьманський світ як політичний і моральний простір,
    а не додаток до імперської легенди про зраду.
  - >-
    Краківський дім і Ягеллонський університет: Лепкий як професор, редактор,
    історик літератури, перекладач і медіатор української культури в польських
    колах.
  - >-
    Перша світова війна і табори Вецляр та Раштат: культурно-освітня робота з
    українськими військовополоненими показує літературу як інструмент
    самоорганізації в умовах примусу.
  section: 'Діяльність: Пісня, Мазепа, професор і культурний посередник'
  words: 1200
- points:
  - >-
    [!decolonization] Мазепинська проза протидіє російському імперському
    тавруванню Мазепи, але це не означає безкритичного культу: треба питати,
    що роман відновлює, що драматизує і що пом’якшує.
  - >-
    Сенаторство 1938-1939 років у Польщі слід читати як представництво
    галицьких українців у складній меншиновій ситуації, а не як просту
    асиміляцію.
  - >-
    [!myth-buster] Не вигадуємо НКВД, МГБ чи КГБ-справу: досьє підтримує інші
    механізми тиску — війну, переміщення, таборову освіту, міжвоєнну
    меншиновість і окупаційну бідність.
  - >-
    Після німецької окупації Польщі 1939 року Лепкий утратив сталу працю і жив
    у скруті, продовжуючи літературну роботу; це потребує джерельної обережності
    без героїзації й без непідтверджених звинувачень.
  section: 'Тінь: Вигнання, табори полонених і окупаційна бідність'
  words: 1600
- points:
  - >-
    Учні порівнюють пісенний образ журавлів і прозову сцену з Мазепинського
    циклу: як різні жанри переносять пам’ять через кордони.
  - >-
    Лепкий поєднує Бережани, Краків, табори полонених, сенатське
    представництво, художню практику і видавничу працю; його біографія показує
    культуру як мережу витривалості.
  - >-
    Сучасне значення: критичне повернення Лепкого дає українським учням мову
    для пісні, історичної прози, імперського міфу і складної польсько-української
    культурної близькості.
  section: 'Підсумок: Переносна пам’ять пісні і роману'
  words: 1000
