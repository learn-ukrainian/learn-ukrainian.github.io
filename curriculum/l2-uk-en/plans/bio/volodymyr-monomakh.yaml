content_outline:
- points:
  - 'Парадокс: Володимир Мономах увійшов в історію як "останній великий самодержець" Києва, але чи міг він насправді зупинити
    розпад, чи лише відтермінував неминуче?'
  - '[!biography] Його запросили на київський престол в обхід законів престолонаслідування після народного повстання. Чому
    кияни так його хотіли?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Легітимність влади. Мономах прийшов до влади в Києві на вимогу народного віче. Чи був він легітимним правителем,
    чи популістом, що використав соціальне невдоволення для захоплення престолу?'
  - 'Дебат 2: "Шапка Мономаха". Як візантійський подарунок став політичним міфом Московського царства для обґрунтування спадкоємності
    від Русі? Історична реальність проти імперської пропаганди.'
  - '[!epistemic-humility] Літописи зображують його як ідеального князя, але чи можемо ми довіряти джерелам, написаним під
    його контролем або його нащадками?'
  - '[!decolonization] Розвінчання міфу про "Шапку Мономаха" як інструмент боротьби з російськими претензіями на історичну
    спадщину Русі.'
  section: 'Конфліктна карта: Князь-миротворець чи князь-популіст?'
  words: 900
- points:
  - Походження та виховання: син візантійської принцеси, онук Ярослава Мудрого. Що означало бути "напівгреком" у тогочасному
      світі?
  - 'Любецький з''їзд 1097 року: ініціатор ідеї "каждый да держит отчину свою". Спроба зупинити братовбивчі війни — і її провал.'
  - Довгий шлях до Києва: князювання в Чернігові та Переяславі. Роки боротьби з половцями та іншими князями.
  section: 'Формування: Шлях до київського престолу'
  words: 1000
- points:
  - 'Боротьба з половцями: організація успішних спільних походів руських князів. Перенесення війни на територію ворога.'
  - '"Статут" Володимира Мономаха: реформа законодавства як відповідь на київське повстання 1113 року. Обмеження лихварства
    та захист збіднілих.'
  - '"Повчання дітям": унікальний зразок світської літератури. Аналіз тексту як політичного та етичного заповіту.'
  - Зміцнення династичних зв'язків з європейськими дворами. Русь як частина європейської політичної системи.
  section: 'Діяльність: Законодавець і полководець'
  words: 1300
- points:
  - '[!anti-hagiography] До того, як стати "об''єднувачем", Мономах був активним учасником удільних воєн. Його "Повчання"
    — це заповіт синам не повторювати його власних помилок і жорстокості.'
  - Придушення повстань та участь у міжусобицях. Шлях до єдності був вимощений кров'ю, в тому числі руською.
  - '[!myth-buster] Мономах не "створив" єдність, а тимчасово відновив її силою авторитету та військовою міццю. Після його
    смерті процес розпаду відновився з новою силою.'
  - Обмеженість його реформ. "Статут" пом'якшив соціальну напругу, але не усунув її причин. Феодальна система залишалася незмінною.
  section: 'Тінь: Ціна єдності'
  words: 900
- points:
  - 'Повернення до розминки: чи був Мономах рятівником Русі, чи її останнім успішним "кризовим менеджером"?'
  - Образ Мономаха в літописах та пізнішій історіографії. Як створювався ідеал "доброго князя"?
  - '[!decolonization] Переосмислення спадщини Мономаха в українській історії — не як предтечі Москви, а як одного з ключових
    діячів саме київського періоду української державності.'
  - 'Сучасне значення: чому фігура сильного, освіченого лідера, що об''єднує країну перед лицем зовнішньої загрози, залишається
    актуальною для України?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Volodymyr Monomakh's reign as the last great unifier of Kyivan Rus', his "Povchannia" (Instruction), the fight against
  the Cumans, and the myth of the Monomakh's Cap.
level: BIO
