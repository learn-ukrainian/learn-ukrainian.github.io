objectives:
- Критично аналізувати літописні джерела, відрізняючи історичний факт від ідеологічної інтерпретації
- Оцінювати політичну стратегію Мономаха в контексті боротьби з половецькою загрозою та удільною роздробленістю
- Аналізувати "Повчання дітям" як унікальний етичний та політичний документ епохи
- Розвінчувати російські імперські міфи, зокрема міф про "Шапку Мономаха", та утверджувати українську ідентичність Русі
