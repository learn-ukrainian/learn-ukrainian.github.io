content_outline:
- points:
  - 'Провокація: Як одна людина могла очолювати головну наукову установу країни 58 років — крізь брежнєвський застій, розпад
    СРСР та буремні 90-ті — і залишитися символом науки, а не бюрократії?'
  - '[!biography] Борис Патон — не просто наступник свого батька, а феномен, що пережив власну епоху, перетворивши зварювання
    з ремесла на космічну технологію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Патон як радянський функціонер. Чи був він конформістом, що йшов на будь-які компроміси з КПРС заради збереження
    інституту, чи майстром подвійної гри, що використовував систему для захисту української науки від Москви?'
  - 'Дебат 2: Патон після 1991 року. Чи перетворився він на гальмо реформ, уособлення «геронтократії» в НАН, чи його консерватизм
    був єдиним способом врятувати академію від повного розвалу в часи економічного хаосу?'
  - '[!epistemic-humility] Оцінки його діяльності кардинально різняться: від звинувачень у стагнації до визнання його єдиним
    можливим рятівником науки.'
  section: 'Конфліктна карта: Радянський апаратник чи український державник?'
  words: 900
- points:
  - 'Сім''я та оточення: як зростання в родині Євгена Патона, творця київських мостів, визначило долю Бориса.'
  - Освіта в КПІ та початок кар'єри в Інституті електрозварювання — не просто династична спадкоємність, а свідомий вибір.
  - 'Формативний досвід: Друга світова війна, евакуація, робота на оборонну промисловість — уроки виживання для науки в екстремальних
    умовах.'
  section: 'Формування: В тіні батька-гіганта'
  words: 1000
- points:
  - 'Технологічний прорив: електрошлакове зварювання, що змінило світову металургію та важке машинобудування.'
  - '[!myth-buster] "Вулкан" — зварювання у відкритому космосі (1969). Не просто технічний трюк, а ключова технологія для
    будівництва космічних станцій.'
  - 'Медична революція: зварювання живих тканин. Як ідея, що здавалася науковою фантастикою, стала буденністю в українській
    хірургії.'
  - Керівництво Інститутом електрозварювання (з 1953) та НАН (з 1962) як інструмент для реалізації масштабних науково-технічних
    проєктів.
  section: 'Діяльність: Від космосу до операційної'
  words: 1300
- points:
  - '[!anti-hagiography] Компроміси з радянською владою: співпраця з військово-промисловим комплексом, участь у політичній
    системі як депутат. Якою була моральна ціна збереження наукових шкіл?'
  - 'Кадрова політика: чи не призвело багаторічне керівництво до застою, кумівства та блокування кар''єри для молодих вчених?'
  - 'Критика після 1991: звинувачення в повільності реформ, неспроможності адаптувати НАН до ринкових умов та масовий "відтік
    мізків" у 90-х.'
  - 'Закритість академії: наскільки НАН за Патона була ізольована від суспільства та глобального наукового простору?'
  section: 'Тінь: Ціна стабільності'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання про феномен Патона, використовуючи аргументи з усього
    модуля.'
  - 'Спадщина: понад 400 патентів, унікальні технології, збережена структура НАН. Але й законсервована пострадянська модель
    науки.'
  - '[!decolonization] Патон як символ переходу від УРСР до України. Його постать показує, наскільки глибоко радянське коріння
    проросло в українській еліті та як важко було його позбутися.'
  - 'Сучасна релевантність: чи можливий сьогодні лідер такого масштабу в українській науці? Дискусія про роль держави в підтримці
    фундаментальних досліджень.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Біографія Бориса Патона через призму його 58-річного президентства в НАН України, новаторських робіт зі зварювання
  (в космосі та медицині) та складних компромісів для збереження науки в радянську та пострадянську епохи. [!anti-hagiography]
  [!decolonization] [!biography]
