- Критично аналізувати спадщину Бориса Патона, зважаючи на позитивні та негативні аспекти його 58-річного керівництва
- Оцінювати внесок Патона в світову науку (зварювання в космосі, медицині) в контексті його компромісів із радянською системою
- 'Формулювати обґрунтовану позицію щодо дебату: чи був Патон консерватором, що гальмував реформи, чи стратегом, що зберіг
  науковий потенціал України'
- Розрізняти агіографічні та критичні погляди на діяльність видатних науковців радянської доби
