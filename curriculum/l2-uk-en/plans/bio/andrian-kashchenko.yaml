content_outline:
- points:
  - >-
    [!biography] Знайомство з Адріаном / Андріаном Кащенком: залізничним службовцем,
    діячем катеринославської «Просвіти», видавцем і автором популярної історичної
    прози про Запорожжя.
  - >-
    Провокаційне питання: що важливіше для культури після довгого мовного
    придушення — бездоганна історіографія чи доступна книжка, яка повертає
    читачеві уяву про Січ?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 1 жовтня 1858 року на Веселому хуторі в Катеринославській губернії;
    джерела подають також старостильну дату 19 вересня. Родина, військова освіта
    і служба, а згодом праця в залізничних установах Катеринослава, Пермі,
    Петербурга і Туапсе.
  - >-
    [!decolonization] Його письменницька видимість стала можливою лише після
    послаблення імперських обмежень на український друк після 1905 року. Тому
    старт популярного автора треба читати як наслідок зламаної мовної заборони,
    а не як запізнілу приватну амбіцію.
  - >-
    Катеринославська «Просвіта»: бібліотека, народний хор, Шевченкові вечори,
    лекції, публічна освіта. Кащенко будував інфраструктуру пам'яті там, де
    українська історія мала стати читаною для широкої громади.
  section: 'Формування: Залізниця, «Просвіта» і право на українську книжку'
  words: 1000
- points:
  - >-
    «Над Кодацьким порогом» як вхід у його метод: історична повість не просто
    відтворює минуле, а виховує читача через конфлікт вірності, розбрату,
    зради й потреби спільної дії.
  - >-
    «Оповідання про славне Військо Запорозьке низове» як головна праця
    популяризатора: історію Війська Запорозького подано у формі, придатній для
    народного читання, а не для вузької академічної аудиторії.
  - >-
    «Зруйноване гніздо», «З Дніпра на Дунай», «На руїнах Січі» та інші твори
    переводять скасування Запорожжя з абстрактної дати в емоційну історію
    вигнання, втрати дому й пошуку тяглості.
  - >-
    [!anti-hagiography] Його сила не тотожна високому модерністському стилю чи
    безпомилковій історичній точності. Важливо бачити романтизацію, спрощення і
    дидактизм, але також розуміти, чому саме така проза працювала для читачів,
    позбавлених нормального доступу до українського минулого.
  section: 'Діяльність: Популярна історична проза і козацька пам''ять'
  words: 1300
- points:
  - >-
    1917 року Кащенко заснував у Катеринославі власне українське видавництво й
    перевидав значну частину своїх творів. Наприкінці 1918 року видавництво
    згоріло, а письменник пережив удар; це був удар по особистому культурному
    проєкту, а не лише по майну.
  - >-
    Матеріальна вразливість: восени 1917 року він звертався до Центральної Ради
    по пенсію і дістав відмову. Цей епізод показує, як праця для національної
    пам'яті не гарантувала соціального захисту навіть у момент політичного
    піднесення.
  - >-
    [!myth-buster] Немає підстав вигадувати для Кащенка справу ЧК чи табірну
    біографію. Засвідчений механізм тиску інший: імперські обмеження українського
    друку, знищення видавничої інфраструктури, радянське вилучення книжок із
    бібліотек від 1933 року і заборона творів у радянській Україні.
  - >-
    [!epistemic-humility] Джерела прямо фіксують, що особистий архів і листування
    не знайдені, а могила не збереглася. Це треба подавати як документовану втрату
    пам'яті, а не як привід для сентиментальних домислів.
  section: 'Тінь: Романтизація, пожежа видавництва і радянське вилучення'
  words: 1500
- points:
  - >-
    Після смерті 29 березня 1921 року в Катеринославі його книжки не зникли
    повністю: міжвоєнна Галичина, еміграційні видання і пізніші перевидання
    підтримували альтернативну траєкторію пам'яті.
  - >-
    [!decolonization] Повернення Кащенка після 1991 року показує, що українська
    історична пам'ять відновлюється не лише через академічні монографії, а й через
    популярні тексти, які вчать читача бачити Січ не як імперський фольклор, а як
    власний історичний простір.
  - >-
    Підсумкове питання: як викладати Кащенка так, щоб не повторювати наївний
    культ козацької слави, але й не знецінювати працю людини, яка дала широкому
    читачеві доступну українську історичну оповідь?
  section: 'Підсумок: Повернення популярної пам''яті'
  words: 1000
focus: >-
  Адріан / Андріан Кащенко як діяч «Просвіти», видавець і популяризатор
  козацької історичної прози. Семінар аналізує, як його книжки будували
  українську пам'ять після імперських мовних обмежень, де вони романтизували
  минуле і як радянське вилучення з бібліотек стало формою культурної репресії.
