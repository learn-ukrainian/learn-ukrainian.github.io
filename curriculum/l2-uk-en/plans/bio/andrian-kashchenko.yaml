objectives:
- >-
  Пояснювати, як імперські обмеження українського друку і діяльність «Просвіти»
  сформували громадську функцію творів Кащенка.
- >-
  Аналізувати популярну історичну прозу про Запорожжя як інструмент пам'яті,
  відрізняючи художню романтизацію від документальної історії.
- >-
  Реконструювати засвідчений механізм тиску: пожежу видавництва, радянське
  вилучення книжок, втрату архіву й могили без вигаданих кримінальних справ.
- >-
  Формулювати антиагіографічну оцінку Кащенка: обмежена історична точність і
  водночас важлива громадська робота для українського читача.
