  - меценат (patron)
  - бароко (baroque)
  - анафема (anathema)
  - зрада (treason - in Russian narrative)
  - автономія (autonomy)
  - союз (alliance)
  - вигнання (exile)
  - універсал (decree)
  - резиденція (residence)
  recommended:
  - клейноди (regalia)
  - старшина (officer class)
  - гетьманщина (Hetmanate)
  - протекторат (protectorate)
  - капітуляція (capitulation)
