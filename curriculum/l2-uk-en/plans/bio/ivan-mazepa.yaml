objectives:
- Аналізувати життя та діяльність Івана Мазепи, уникаючи агіографічних або принизливих стереотипів
- Пояснювати причини та наслідки його союзу зі Швецією, розглядаючи це як складний політичний вибір
- Характеризувати явище «мазепинського бароко» як результат його культурного меценатства
- Критично порівнювати образ Мазепи в українській, російській та європейській історіографії та культурі
