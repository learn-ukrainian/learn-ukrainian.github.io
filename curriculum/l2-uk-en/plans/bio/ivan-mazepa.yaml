content_outline:
- points:
  - 'Провокація: Мазепу проклинала російська церква як зрадника і водночас оспівували європейські романтики як героя. Як одна
    людина може викликати настільки протилежні оцінки?'
  - '[!biography] Парадокс: він був найближчим соратником Петра І понад 20 років, а потім став його головним ворогом. Що змусило
    його зробити цей вибір?'
  - 'Замість біографічної довідки: цитата з листа Мазепи, де він скаржиться на утиски Москви, — без вказівки автора.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Оцінки сучасників. Для козацької старшини, що пішла за ним, — захисник вольностей. Для промосковської частини
    — клятвопорушник. Аналіз універсалів Мазепи vs маніфестів Петра І.'
  - 'Дебат 2: Історіографічна війна. Російська імперська та радянська історіографія — образ зрадника. Українська народницька,
    державницька і сучасна — символ боротьби за незалежність.'
  - '[!epistemic-humility] Визнання складності: чи був його вибір прагматичною помилкою, запізнілою реакцією чи єдиним можливим
    кроком для збереження Гетьманщини?'
  - '[!decolonization] Аналіз анафеми як інструменту політичної боротьби, а не суто релігійного акту. Розвінчання міфу про
    «споконвічне прагнення до єдності з Росією».'
  section: 'Конфліктна карта: Герой чи зрадник?'
  words: 900
- points:
  - 'Походження та освіта: шляхетський рід, Києво-Могилянська академія, єзуїтський колегіум у Варшаві, служба при дворі польського
    короля.'
  - 'Кар''єрний злет: від придворного до козацького старшини. Які навички, здобуті в Європі, допомогли йому в козацькому середовищі?'
  - 'Обрання гетьманом у 1687 році: контекст Коломацьких статей, які ще більше обмежували автономію. Мазепа приходить до влади
    в умовах її ослаблення.'
  section: 'Формування: Шлях до гетьманства'
  words: 1000
- points:
  - 'Внутрішня політика: стабілізація Гетьманщини, зміцнення гетьманської влади, об''єднання Правобережної та Лівобережної
    України.'
  - 'Культурний розквіт: феномен «мазепинського бароко». Меценатство, будівництво церков, розвиток освіти та друкарства.'
  - 'Зовнішня політика до 1708 року: вірний союзник Петра І у війнах з Османською імперією та Швецією. Азовські походи.'
  - 'Первинне джерело: уривки з універсалів Мазепи про заснування колегіумів та будівництво храмів.'
  section: 'Діяльність: Будівничий держави'
  words: 1300
- points:
  - '[!anti-hagiography] Посилення соціального визиску селян та козаків за часів його правління. Конфлікти з Запорізькою Січчю
    (Кость Гордієнко).'
  - 'Північна війна: тягар для України. Козаки змушені воювати далеко від дому, а їхні землі залишаються беззахисними.'
  - 'Переговори з Карлом XII: таємна дипломатія. Чи всі старшини знали про його плани? Моральна неоднозначність подвійних
    зобов''язань.'
  - '[!myth-buster] Розвінчання міфу про те, що Мазепа «продався» шведам за гроші. Аналіз його реальних мотивів — загроза
    повного поглинання Гетьманщини.'
  - 'Наслідки вибору: руйнування Батурина, Полтавська катастрофа, втеча до Бендер. Ціна поразки була жахливою.'
  section: 'Тінь: Ціна союзу'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання про «зраду» та «героїзм», використовуючи аргументи
    з модуля.'
  - 'Образ Мазепи в мистецтві: Байрон, Гюго, Пушкін, Словацький. Як європейський романтизм створив міф про Мазепу?'
  - '[!decolonization] Реабілітація в незалежній Україні: Мазепа на банкноті 10 гривень, пам''ятники. Чому його постать стала
    настільки важливою для сучасної ідентичності?'
  - 'Уроки історії Мазепи: трагедія вибору між поганим і дуже поганим. Актуальність його досвіду для розуміння сучасної боротьби
    України за незалежність.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Іван Мазепа: гетьман, меценат, політик. Аналіз його вибору 1708 року, мазепинське бароко, та конфліктна спадщина в
  українській та російській історіографії.'
