objectives:
- Визначати, яким формам зовнішнього контролю Богун опирався і де його вибір формувала фракційна війна
- Аналізувати Берестечко, Вінницю й Монастирище за джерелами, не перетворюючи їх на легенду
- Відрізняти джерельні факти, фольклор і пізнішу націєтворчу пам'ять про Богуна
