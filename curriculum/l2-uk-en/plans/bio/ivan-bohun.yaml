content_outline:
- points:
  - 'Провокація: командир, що відмовився присягати цареві, воював із Річчю Посполитою, підтримав, а потім поборов Виговського, — і якого пізніша пам''ять зробила бездоганною воїнською іконою. Що ця ікона показує, а що ховає?'
  - '[!biography] Знайомство з постаттю, чия біографія опирається одному ярликові зовнішньої орієнтації.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: воєнна легенда — Вінниця, Монастирище, Берестечко; Богун передусім блискучий тактик.'
  - 'Позиція 2: політичний актор усередині козацької держави, що розпадалася, — Переяслав, Гадяч, доба Руїни, фракційна війна.'
  - '[!decolonization] Імперське спрощення робить із нього то корисного пограничного бійця, то «бунтівника-розбійника»; націоналістичне — «бездоганного пророка незалежності». Обидва згладжують складнішу картину.'
  - '[!epistemic-humility] Народження непевне, промови приписані. Починаємо не з легенди, а з певного: уряд полковника й задокументовані кампанії.'
  section: 'Конфліктна карта: Воїн-ікона чи політичний актор'
  words: 900
- points:
  - 'Походження: ймовірно з української дрібної шляхти; місце й точна дата народження непевні — не відкриваємо модуль вигаданою «сценою народження».'
  - 'Рання війна: 1648 року бився на Брацлавщині й відзначився в Пилявецькій кампанії; 1649 року згаданий у контексті Зборівського договору серед старшини.'
  - 'Уряд: кальницький (вінницький) полковник у першій половині 1650-х років — саме полковий світ, а не легенди про народження, надійно закорінює його біографію.'
  - '[!epistemic-humility] Форми «Федорович» та «Теодорович» і дата «близько 1618» побутують у пізніших зведеннях — подаємо їх як джерелочутливі варіанти, а не як тверді факти.'
  section: 'Формування: Полковник Кальницького полку'
  words: 1000
- points:
  - 'Вінниця, 1-10 березня 1651 року: оборона проти сил Мартина Калиновського — оборонні роботи, маневр із «пасткою на кризі», вилазка, поранення в голову й вплив на брацлавську кампанію.'
  - 'Берестечко, 28 червня - 10 липня 1651 року: після відходу Іслам-Ґірея III й затримання Хмельницького наказними командирами були Джалалій, Гладкий і Богун; під його проводом готували переправи через Пляшівку.'
  - 'Монастирище, 10-11 квітня 1653 року: Богун зосередив сили, щоб затримати наступ Стефана Чарнецького до приходу Хмельницького; удар кінноти з прихованого виходу спричинив відступ нападників.'
  - 'Переяслав, 1654 рік: Богун виступив проти московської орієнтації й відмовився присягати цареві — сильна джерельна позиція, але не привід вигадувати його промови й мотиви.'
  section: 'Діяльність: Вінниця, Берестечко, Монастирище'
  words: 1300
- points:
  - '[!anti-hagiography] Берестецький відступ був не лише вправним, а й кривавим і хаотичним; формула «військо врятовано» не має стирати втрат і розладу командування.'
  - 'Фракційна війна: 1658 року Богун спершу підтримав Виговського проти опозиції, а потім відкинув Гадяцьку угоду й повстав проти нього — «вірність» і «незалежність» у добу Руїни не прості категорії.'
  - '[!myth-buster] Богуна стратили в лютому 1664 року за підозрою у зв''язках із лівобережними й московськими силами; тримаємо мову звинувачення як звинувачення, а не як доведений факт.'
  - Кримський союз під Берестечком часто описують мовою «зради» — натомість пояснюємо геополітичні інтереси ханства, а не етнізуємо провину.
  section: 'Тінь: Руїна, фракції й страта за підозрою'
  words: 900
- points:
  - 'Повернення до розминки: яким саме залежностям він опирався й де вибір формувала фракційна війна?'
  - 'Пам''ять: історична дума «Іван Богун» і образотворча традиція зробили його тривким символом; це повернення протистоїть забуттю, але може творити й агіографію.'
  - Ув'язнення в Марієнбурзі (1662) і звільнення 1663 року заради кампанії показують, що навіть супротивники цінували його військову вагу.
  - '[!decolonization] Чому важливо відділяти джерельний факт, фольклор, портретну традицію й шкільну прозу — і що дає таке розрізнення учневі.'
  section: 'Дискусія та підсумок: Дума й пам''ять'
  words: 700
focus: Ivan Bohun as a Khmelnytsky-era colonel and Ruin-era political actor — the Vinnytsia and Monastyryshche defenses, the acting command at Berestechko, his refusal of the Pereiaslav oath, his shifting stance toward Vyhovskyi and Hadiach, imprisonment and 1664 execution, and the heroic memory that both recovers and distorts him.
