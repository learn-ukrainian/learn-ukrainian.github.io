content_outline:
- points:
  - >-
    [!biography] Знайомство з Леонідом Мосендзем: офіцер Армії УНР, хімік-нафтохімік і письменник
    Празької школи, якого Дмитро Донцов назвав «одним із найкращих, якщо не найкращим, наших
    новелістів».
  - >-
    Провокаційне питання: як людина, що захищала докторську дисертацію з нафтопереробки,
    писала поеми про розсипання сузір'їв і незавершений роман про Івана Хрестителя?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження 20 серпня 1897 року в Могиліві-Подільському; смерть батька,
    коли Леоніду було сім; педагогічне училище у Вінниці (1915).
  - >-
    Перша світова війна: служба в російській армії на румунському фронті; **4 березня 1919**
    вступ до Дієвої армії УНР офіцером; 26 жовтня 1919 — евакуація з висипним тифом.
  - >-
    Еміграція: після поразки визвольних змагань — від Ценстохови (1922) до Чехословаччини;
    Українська господарська академія в Подєбрадах (1928), докторська дисертація з нафтопереробки (1931).
  - >-
    [!decolonization] Примусова еміграція — наслідок більшовицького завоювання УНР, а не «втеча
    на Захід»; у Подєбрадах — коло Празької школи й вісниківства навколо *Вісника* Донцова.
  section: 'Формування: Від армії УНР до Подєбрад'
  words: 1000
- points:
  - >-
    Наука й література паралельно: асистентство в академії; викладання в Закарпатті (Свалява,
    1937–1938); після окупації — Братислава, Інсбрук (1945), співпраця з Юрієм Кленом.
  - >-
    Ключові твори: *Штайн — ідея і характер* (1935); *Відплата* (1939); *Вічний корабель* (1940);
    *Зодіяк* (1941, Прага); *Канітферштан* (1945); *Дияволічні параболи* (1947, з Кленом як
    **Порфирій Горотак**); *Волинський рік* (1948).
  - >-
    Аналіз «Зодіяка»: рядок про розсипання «так знаних нам, так довідомих знаків» і фінал —
    «І тільки Діва ясними очима / космічний Хаос буде оглядати!» — історіософія вісниківства,
    міф, віра, стоїчне витримування.
  - >-
    Незавершений *Останній пророк* (постумно, Торонто, 1960) — роман про Івана Хрестителя;
    новели *Людина покірна* (1951, Вінніпеґ).
  section: 'Діяльність: «Зодіяк» і паралель науки з літератури'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Мосендз — не лише «поет-вісниківець»: подвійна кар'єра хіміка й письменника
    робить його одним із найменш відомих великих фігур Празької школи; радянське стирання —
    стирання цілого ідеологічно-літературного пласту.
  - >-
    Механізм тиску: служба в армії УНР → вимушена еміграція після поразки; війна, тиф, нестачі
    вигнання → туберкульоз; **14 жовтня 1948** — смерть у Блоне (Швейцарія), поховання там же.
  - >-
    Знищення в СРСР: твори непридатні для друку; відновлення спадщини — зусилля діаспори
    (постумне видання роману, збереження новел і поезії).
  - >-
    [!epistemic-humility] Співавторство з Кленом під маскою Порфирія Горотака — і літературний жарт
    (пародія на Григорія Многогрішного Багряного), і свідчення інтелектуального кола вигнанців.
  section: 'Тінь: Вимушена еміграція та смерть у вигнанні'
  words: 1600
- points:
  - >-
    Спадщина в діаспорі: збереження й редагування текстів емігрантами; повернення імені в
    пізньорадянську та незалежну Україну.
  - >-
    Сучасне значення: «лицар святого Грааля» (Набитович) — трагічний ідеалізм, готична поезія,
    моральний героїзм новели; Празька школа без Мосендза — неповна.
  - >-
    Кінцеве питання: як відновити в пам'яті постать, яку радянська система стерла двічі — як
    офіцера УНР і як майстра прози?
  section: 'Підсумок: Лицар Празької школи'
  words: 1000
focus: >-
  Леонід Мосендз як офіцер УНР, хімік-емігрант і один із найкращих новелістів Празької школи:
  вісниківство, історіософія *Зодіяка*, примусова еміграція та смерть від туберкульозу у вигнанні.
