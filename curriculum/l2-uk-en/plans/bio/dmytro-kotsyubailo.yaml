- focus: 'Есе-рефлексія про Тінь (антиагіографічний аналіз) (Дмитро «Да Вінчі» Коцюбайло: Символ покоління добровольців)'
  placement: workbook
  type: essay-response
cefr_min: C1
connects_to:
