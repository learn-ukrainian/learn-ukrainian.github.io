- andriy-pilshchykov
content_outline:
- points:
  - 'Провокація: як юнак з позивним «Да Вінчі», що мріяв про мистецтво, став наймолодшим Героєм України та уособленням сучасної лицарської традиції?'
  - '[!biography] Коцюбайло — не просто солдат, а символ покоління, що обрало війну, аби захистити свободу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Статус добровольчого руху (2014-2022). Від напівлегальних загонів самооборони, яким не довіряв Генштаб, до еліти ЗСУ. Шлях «Да Вінчі» як уособлення цієї трансформації.'
  - 'Дебат 2: Боротьба за спадщину. Образ «Да Вінчі» в українській пам''яті (герой, символ) vs. спроби російської пропаганди демонізувати добровольців як «неонацистів».'
  - '[!epistemic-humility] Визнання складнощів інтеграції добробатів у регулярну армію — це не було безконфліктним процесом.'
  - '[!decolonization] Розвінчання російського наративу про «громадянську війну», де добровольці — «карателі».'
  section: 'Конфліктна карта: Доброволець чи державник?'
  words: 900
- points:
  - Дитинство на Прикарпатті та художня освіта, що подарувала йому позивний і сформувала погляд на світ.
  - 'Революція Гідності як ключовий досвід: 18-річний Коцюбайло на Майдані, загартування характеру та усвідомлення особистої відповідальності за долю країни.'
  - >-
    Соціальний та історичний контекст: атмосфера національного піднесення та екзистенційної загрози, що змусила тисячі молодих людей взяти до рук зброю.
  section: 'Формування: Покоління Майдану'
  words: 1000
- points:
  - Шлях від перших боїв у 2014 році до створення одного з найбоєздатніших підрозділів — 1-ї ОШР «Вовки Да Вінчі».
  - 'Новаторські підходи до ведення бою та управління підрозділом: гнучкість, ініціатива, технологічність.'
  - 'Отримання звання Героя України (2021): перше присвоєння найвищої нагороди активному добровольцю, що стало визнанням усього добровольчого руху.'
  - Коцюбайло як міст між армією та громадянським суспільством, моральний авторитет для мільйонів.
  section: 'Діяльність: Командир нової армії'
  words: 1300
- points:
  - '[!anti-hagiography] За образом непереможного героя — людина, яка з 18 років не знала іншого життя, окрім війни. Тінь — це відсутність юності та мирної професії.'
  - 'Психологічний тягар командування: відповідальність за життя побратимів, необхідність приймати рішення, що ведуть до смерті.'
  - '[!myth-buster] Коцюбайло не був «суперменом». Він отримував поранення, переживав втрати, стикався з бюрократією. Його сила — у здатності повертатися в бій після всього.'
  - Ціна, яку заплатило його покоління — найкращі роки, здоров''я та життя — за існування України.
  section: 'Тінь: Ціна героїзму'
  words: 900
- points:
  - 'Повернення до розминки: постать «Да Вінчі» доводить, що в епоху екзистенційної загрози найбільшими митцями стають ті, хто творить саму історію.'
  - Спадщина — це не лише назви вулиць. Це його підрозділ «Вовки Да Вінчі», який продовжує боротьбу, і тисячі послідовників в армії та суспільстві.
  - 'Сучасне значення: «Да Вінчі» як рольова модель — приклад жертовності, лідерства та непохитної віри в перемогу. Як його спадщина впливає на українську ідентичність сьогодні?'
  - '[!decolonization] Його життя і смерть — остаточна відповідь на питання про те, чи готові українці боротися за свою державу.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Dmytro Kotsiubailo ("Da Vinci") as a symbol of the volunteer generation, the evolution of the Ukrainian army, and the human cost of heroism in the Russo-Ukrainian War.
level: BIO
module: bio-196
objectives:
- Критично аналізувати роль особистості в історії на прикладі Дмитра Коцюбайла та добровольчого руху
- Розрізняти український державний наратив про героїзм та спроби його дискредитації ворожою пропагандою
- Формулювати аргументовану позицію щодо «тіньового боку» та ціни героїзму у сучасній війні
- Застосовувати спеціалізовану військову та суспільно-політичну лексику для обговорення складних тем
