objectives:
- Критично аналізувати роль особистості в історії на прикладі Дмитра Коцюбайла та добровольчого руху
- Розрізняти український державний наратив про героїзм та спроби його дискредитації ворожою пропагандою
- Формулювати аргументовану позицію щодо «тіньового боку» та ціни героїзму у сучасній війні
- Застосовувати спеціалізовану військову та суспільно-політичну лексику для обговорення складних тем
