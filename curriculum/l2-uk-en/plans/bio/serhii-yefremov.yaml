content_outline:
- points:
  - 'Провокація: як літературний критик — не поет і не романіст — визначає національний канон раніше за офіційну шкільну програму? Через публіцистику, видавництво, редагування й адміністрування.'
  - '[!biography] Знайомство з критиком, публіцистом і громадським діячем: співзасновник «Віку», заступник голови Центральної Ради, віце-президент ВУАН і головний підсудний сфабрикованого процесу 1930 року.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (будівничий канону): сила Єфремова — не у власній белетристиці, а в публіцистиці, історії літератури, видавництві, редагуванні та інституційному адмініструванні.'
  - 'Позиція 2 (деколонізаційна): рамка — українська публічна культура, політична організація, державотворення Центральної Ради, розбудова ВУАН і радянські антиукраїнські репресії, а не «російський лібералізм».'
  - '[!decolonization] «СВУ» треба розкривати: сфабрикована справа «Спілки визволення України» 1929-1930 років — це показовий процес, а не доведена підпільна організація; і її не можна плутати із «Союзом визволення України» 1914 року.'
  - '[!epistemic-humility] Ім''я-слід «Єфремов / Efremov / Охріменко» та дрейф місця й дати смерті (Володимир чи Ярославль; 31 березня 1939) — це метадані під тиском, які позначаємо, а не подаємо як єдиний факт.'
  section: 'Конфліктна карта: Критик як будівничий канону чи «голова СВУ»?'
  words: 900
- points:
  - 'Освіта й друк: Пальчик 1876 року, Київська духовна семінарія (1891-1896), правничий факультет Університету св. Володимира (1901); співзасновник видавництва «Вік».'
  - 'Публіцистика: праця в «Киевской старине», «Громадській думці», «Раді», «Новій раді» та «Літературно-науковому вістнику» вводила українську літературу до ширшого читача й обстоювала українське публічне слово під цензурою.'
  - 'Політичний шлях: Загальна українська безпартійна демократична організація, українські демократичні й радикальні партії, Товариство українських поступовців — поміркований федералістсько-автономістський струмінь, а не сталий партійний ярлик.'
  - 'Імперське поліціювання: арешти жандармерією за публіцистичну й політичну діяльність — місток між літературною критикою й політичною репресією ще до 1917 року.'
  section: 'Формування: «Вік», публіцистика й поміркована політика'
  words: 1000
- points:
  - '1911 рік: «Історія українського письменства» — найповніший виклад його історико-літературного методу; центральний джерельний якір для BIO й LIT.'
  - 'Канон у дії: монографії про Марка Вовчка, Шевченка, Франка, Коцюбинського, Нечуя-Левицького, Карпенка-Карого й Панаса Мирного показують, як критик визначає програму раніше за офіційну.'
  - '1917 рік: один з ініціаторів Центральної Ради, заступник голови, член Малої Ради та генеральний секретар міжнаціональних справ у першому уряді; голова Української партії соціалістів-федералістів.'
  - '1919-1928 роки: праця в УАН/ВУАН, віце-президент (1922-1928), історико-філологічне адміністрування; «Щоденники 1923-1929» — свідчення про радянізацію української культури.'
  section: 'Діяльність: Історія письменства, Центральна Рада й ВУАН'
  words: 1300
- points:
  - '[!anti-hagiography] Народницький, антимодерністський метод Єфремова та його суспільно-службові критерії не стираємо: саме тому він корисний як точка суперечки з Кобилянською, Лесею Українкою, Хвильовим, Семенком і Зеровим.'
  - 'Адміністративне удушення: 1928 року його витіснили з академічних посад після тривалого партійного тиску — це прелюдія до кримінальної справи, а не окремий науковий спір.'
  - 'Показовий процес: арешт 1929 року, інсценований процес 9 березня — 19 квітня 1930 року, десятки головних підсудних, смертний вирок, замінений ув''язненням, і смерть у в''язниці 1939 року.'
  - '[!epistemic-humility] Реабілітація 1989 року підтверджує відсутність складу злочину, але не відновлює знищених життів та інституцій; пишемо «сфабрикована справа», а не «член СВУ».'
  section: 'Тінь: Метод, адміністративне удушення й показовий процес'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Єфремов — будівничим канону чи «головою СВУ» з обвинувального акта? Студент формулює, що канон він будував, а «голову СВУ» сконструювала пропаганда.'
  - 'Грамотність щодо показових процесів: розрізняємо мову обвинувачення, вимушені свідчення, пропагандивну виставу, вирок і пізнішу реабілітацію.'
  - '[!decolonization] Пастка абревіатури: «СВУ» може означати організацію 1914 року або сфабриковану справу 1930 року — розкриваємо скорочення, перш ніж тлумачити.'
  - 'Порівняння: з Миколою Зеровим — щодо суперечки про метод і пізніших репресій; з Людмилою Старицькою-Черняхівською — щодо кола жертв показового процесу.'
  section: 'Дискусія та підсумок: Канон, докази й реабілітація'
  words: 700
focus: Serhii Yefremov (1876-1939) taught as a Ukrainian literary historian, publicist, publisher, Central Rada deputy head, and VUAN vice-president, so that a national canon reads as edited, argued, printed, and defended rather than simply inherited, and that same public authority is shown to make him a target; the fabricated 1930 Union for the Liberation of Ukraine case is kept as a show trial rather than a proven organization, the 1930 case is disambiguated from the 1914 wartime organization, and his narodnyk anti-modernist limits are kept visible as anti-hagiography beside the repression arc.
