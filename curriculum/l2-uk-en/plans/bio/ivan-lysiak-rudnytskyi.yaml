content_outline:
- points:
  - 'Провокація: як історик без кафедри на батьківщині визначає, як читають українську історію — через есе, поняття й наукові інституції в еміграції?'
  - '[!biography] Знайомство з істориком суспільно-політичної думки: народжений у Відні 1919 року, помер в Едмонтоні 1984 року, син Мілени Рудницької, співзасновник Канадського інституту українських студій (КІУС).'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (метод): його сила — понятійні пари (історична/неісторична нація, держава/народ, Схід/Захід, історія/міф) і джерелочутлива порівняльна аргументація, а не готові гасла.'
  - 'Позиція 2 (деколонізаційна): його тиск — це еміграція після радянського приходу 1939 року та невизнання української історії окремим полем у частині північноамериканської академії; українську історію не лише нехтували — її інтерпретаційну рамку поліціювали.'
  - '[!decolonization] «Діаспора» — не одна ідеологія: КІУС, УВАН, НТШ і північноамериканські історичні кафедри — це різні арени з різними дискусіями й фінансуванням.'
  - '[!epistemic-humility] Варіативність імені (Rudnytsky / Rudnytskyi / Lysiak Rudnytsky) і його дебат з Оглоблиним про «колоніальний статус» — це контестований аналітичний словник, а не заперечення імперського панування.'
  section: 'Конфліктна карта: Метод чи «холодновоєнний антирадянський»?'
  words: 900
- points:
  - 'Родина й середовище: батько Павло Лисяк, мати Мілена Рудницька (парламентарка й феміністка), рід Смаль-Стоцьких і Рудницьких; Академічна гімназія Львова.'
  - 'Освіта: Львівський університет (1937-1939); розрив 1939 року після радянського приходу — виїзд до Берліна; Празький університет, докторат 1945 року про Драгоманова; Женева; Колумбійський університет.'
  - 'Академічні посади: Вісконсин, Ла-Саль-коледж, Американський університет, а з 1971 року — Альбертський університет; співзасновник КІУС і його заступник директора (1976-1980).'
  - 'Механізм тиску не прихований: невизнання поля гальмувало його кар''єру — тиск інституційний та епістемний, а не особистий.'
  section: 'Формування: Відень, розрив 1939-го й академічна еміграція'
  words: 1000
- points:
  - 'Драгоманов і політична теорія: симпозіум-видання про Драгоманова (1952) та есе «Драгоманов як політичний теоретик» — переробка празької дисертації.'
  - 'Модель модерної історії: «Роль України в модерній історії» (1963) з моделлю тяглості/розриву та «Україна між Сходом і Заходом» (1966) як компактна типологія європейського розташування України.'
  - 'Українські збірки й державницька думка: «Між історією і політикою» (Мюнхен, 1973); видання листування Назарука з Липинським (1976); «Rethinking Ukrainian History» (1981); вступ «Переяслав: історія і міф» (1982).'
  - 'Посмертні зібрання: «Essays in Modern Ukrainian History» (КІУС, Едмонтон, 1987, за редакцією Петра Л. Рудницького); «Історичні есе» (1994); «Щоденники» (2019, за редакцією Грицака й Сисина).'
  section: 'Діяльність: Історичні есе та політична думка'
  words: 1300
- points:
  - '[!anti-hagiography] Він не мученик: його просуванню заважало невизнання поля, а не в''язниця; відмовляємося від простих ярликів — ранні консервативні зацікавлення, пізніший ліберальний нейтралітет, антитоталітарний антинаціоналізм і вибіркова співпраця не зводяться до одного слова.'
  - 'Переяславська рамка: його критика цілить у радянську/російську догму «возз''єднання» й у використання історії для вимивання української суб''єктності, а не заперечує складність 1654 року.'
  - '[!epistemic-humility] Головні зібрання — посмертні, редаговані й почасти перекладені з англійської; розрізняємо оригінальний український текст, переклад з англійської та відновлений з машинопису, і не подаємо кожен український уривок як неопосередковану цитату.'
  - 'Метадані під тиском: розбіжність щодо імпринту (КІУС проти гарвардських каталожних записів) позначаємо, а не згладжуємо.'
  section: 'Тінь: Посмертне редагування й політичні ярлики'
  words: 900
- points:
  - 'Повернення до розминки: то він будував поле чи мав «табірну» геополітичну ідентичність? Студент формулює, що він зробив українську історію легітимним предметом, а не обрав сторону в холодній війні.'
  - 'Грамотність щодо історіографії: розрізняємо історичний аргумент і пропаганду на прикладі Переяславського міфу («втиснуто у виготовлену форму»).'
  - '[!decolonization] «Історична/неісторична нація» — понятійний інструмент повернення української суб''єктності, а не вирок про «вищі» й «нижчі» народи.'
  - 'Порівняння: з Липинським — щодо державницької думки; з Міленою Рудницькою — щодо родини й інтелектуального середовища.'
  section: 'Дискусія та підсумок: Читати ідеї як історію'
  words: 700
focus: Ivan Lysiak-Rudnytskyi (1919-1984) taught as a Ukrainian historian of socio-political thought in exile who made Ukrainian history legible as an independent field rather than a branch of Russian or Soviet studies; his pressure mechanism is kept honest as the 1939 exile, North American non-recognition of Ukrainian history, and Soviet policing of interpretive frames rather than an invented arrest; his conceptual method (historical and non-historical nations, state and people, East and West, history and myth, Pereiaslav) is foregrounded over Cold-War shorthand, and the posthumous, partly translated editions are flagged for source-language care.
