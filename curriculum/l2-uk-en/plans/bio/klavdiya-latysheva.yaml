content_outline:
- points:
  - 'Парадокс: Як одна з провідних математикинь України, що працювала над складними диференціальними рівняннями, стала водночас
    однією з перших жінок-пілотів? Чи були ці дві пристрасті в конфлікті, чи вони доповнювали одна одну?'
  - 'Провокаційне питання: Що було складніше в 1920-х — розв''язати нелінійне рівняння чи для жінки піднятися в небо за штурвалом
    літака?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Професійний скепсис. Чи сприймали Латишеву як серйозну вчену, попри її «несерйозне» авіаційне хобі? Чи, навпаки,
    авіатори бачили в ній лише «професорку», яка бавиться польотами?'
  - 'Дебат 2: Спотворення спадщини. Як радянська ідеологія формувала її образ? Чи наголошували на «радянській жінці, що долає
    бар''єри», замовчуючи її дореволюційне коріння та інтелектуальну автономію?'
  - '[!epistemic-humility] Оцінка її внеску ускладнена браком особистих щоденників; ми здебільшого бачимо її через призму
    офіційних звітів та спогадів колег.'
  - '[!decolonization] Розгляд її кар''єри поза радянським міфом про «звільнену жінку», фокусуючись на її особистій мотивації
    та унікальних для України обставинах.'
  section: 'Конфліктна карта: Вчена чи авіаторка?'
  words: 900
- points:
  - 'Соціальний контекст: народження в Кременчуці в родині інтелігенції, що визначило доступ до освіти.'
  - 'Освітня траєкторія: від гімназії до Вищих жіночих курсів, де проявився її математичний талант.'
  - 'Формативний досвід: навчання в середовищі, де жіноча освіта була радше винятком, ніж правилом, що загартувало її характер.'
  - 'Інтелектуальні впливи: знайомство з київською математичною школою, що визначило її наукові інтереси в галузі диференціальних
    рівнянь.'
  section: 'Формування: Шлях до диференціальних рівнянь (1897-1920)'
  words: 1000
- points:
  - 'Математичний прорив: її фундаментальні праці з теорії диференціальних рівнянь, що принесли їй визнання та докторський
    ступінь.'
  - 'Академічна кар''єра: робота в Київському університеті, де вона пройшла шлях до професорки й завідувачки кафедри.'
  - 'Підкорення неба: захоплення авіацією, навчання в льотній школі всупереч суспільним стереотипам.'
  - 'Подвійне життя: як вона поєднувала викладання та наукові дослідження з тренувальними польотами та участю в авіаційних
    заходах.'
  section: 'Діяльність: Між кафедрою та небом (1920-1940)'
  words: 1300
- points:
  - '[!anti-hagiography] Ціна успіху: чи не сповільнила її авіаційна пристрасть темпи наукової роботи? Які проєкти могли залишитись
    нереалізованими?'
  - 'Політичні компроміси: життя та робота в умовах сталінського терору 1930-х. Які ідеологічні поступки були необхідні для
    виживання та продовження кар''єри в науці?'
  - 'Людський вимір: виклики, з якими вона стикалася як жінка в абсолютно чоловічому середовищі авіаторів та академіків —
    від упереджень до практичних труднощів.'
  - '[!myth-buster] Руйнування міфу про «легкий успіх». Її досягнення — це не результат «радянського дива», а наслідок титанічної
    праці та подолання системного опору.'
  section: 'Тінь: Ціна двох покликань'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь на питання про конфлікт чи синергію двох покликань
    Латишевої.'
  - 'Оцінка внеску: що виявилося тривалішим — її математичні формули, які й досі вивчають фахівці, чи її символічна роль як
    піонерки, що надихнула покоління жінок?'
  - 'Сучасне значення: чому історія Латишевої є актуальною сьогодні в контексті дискусій про жінок у STEM та необхідність
    мультидисциплінарності?'
  - '[!decolonization] Латишева як українська вчена, чия спадщина була частково апропрійована загальнорадянським наративом.
    Повернення її імені в пантеон української науки.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Klavdiya Latysheva's dual career as a pioneering mathematician and one of Ukraine's first female pilots, exploring
  the tension between her two passions and her legacy as a woman in male-dominated fields.
level: BIO
module: bio-108
objectives:
- Критично аналізувати життєвий шлях Клавдії Латишевої, розглядаючи напругу між її науковою та авіаційною кар'єрами.
- Оцінювати її внесок у математику та її символічне значення як піонерки в контексті суспільних упереджень XX століття.
- Виявляти елементи радянської пропаганди та анти-агіографічні аспекти в біографії видатної особистості.
- Формулювати аргументовану позицію щодо актуальності спадщини Латишевої для сучасних дискусій про жінок у науці та технологіях.
