content_outline:
- points:
  - >-
    [!biography] Знайомство з Клавдією Латишевою: математикиня, перша в Україні
    жінка, яка захистила дисертацію з фізико-математичних наук, професорка й
    деканеса Київського університету, чиє ім'я носить метод Фробеніуса–Латишевої.
  - >-
    Провокаційне питання: як жінка, яку власна стать не пускала навіть до
    університету, дійшла до світового методу — і чому її ім'я несе тінь знищеної
    математичної школи?
  - >-
    [!myth-buster] Застереження проти попередньої фальсифікації: вона НЕ була
    льотчицею і НЕ народилася в Кременчуці. Семінар працює з перевіреною
    постаттю — київська математикиня Клавдія Яківна Латишева.
  section: Розминка
  words: 400
- points:
  - >-
    Київ 1897 року, родина військовослужбовця. Друга жіноча гімназія (1916).
    Шлях у науку для жінки початку XX століття — крізь зачинені двері: до
    університету жінок не приймали.
  - >-
    Обхідний маршрут освіти: 1921 року Латишева закінчує фізико-математичний
    відділ Київських вищих педагогічних жіночих курсів — типовий для жінок спосіб
    здобути вищу математичну освіту в обхід заборон.
  - >-
    Входження в київську математичну школу: викладання в Київському університеті
    з 1920-х, формування інтересу до аналітичної теорії диференціальних рівнянь.
  - >-
    [!decolonization] Повернення постаті в український контекст: не «радянська
    наука взагалі», а конкретна київська вчена в конкретній національній науковій
    традиції, яку згодом розмиє загальносоюзний наратив.
  section: 'Формування: Математика крізь зачинені двері'
  words: 1000
- points:
  - >-
    Прорив 1936 року: Латишева стає першою в Україні жінкою, яка захищає
    кандидатську дисертацію з фізико-математичних наук — про наближене
    розв'язування лінійних диференціальних рівнянь з особливостями в коефіцієнтах.
  - >-
    Співпраця з Михайлом Кравчуком: спільна доповідь в Інституті математики
    (1936), бібліографія до його монографії про спосіб моментів. Латишева — у
    серці живої київської математичної школи.
  - >-
    [!biography] Метод Фробеніуса–Латишевої: побудова нормальних розв'язків
    лінійних диференціальних рівнянь з поліноміальними коефіцієнтами поблизу
    особливої точки. Семінар точно описує суть, а не повторює спрощення джерел.
  - >-
    Вершина кар'єри: докторська дисертація і професорське звання (1952), деканеса
    механіко-математичного факультету (1952–54), завідувачка кафедри
    диференціальних рівнянь (1953–56); підручники, перша всеукраїнська олімпіада.
  section: 'Діяльність: Метод Фробеніуса–Латишевої'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Складна правда замість ікони: Латишева — вшанована
    радянська академікиня (орден Леніна, 1954). Семінар не робить із неї ні
    бездоганної героїні, ні антирадянської дисидентки.
  - >-
    Гендерний бар'єр як механізм: попри роботу з 1920-х, вона здобуває
    професорське звання лише 1952 року — у 55 років. Розрив між здібностями й
    формальним визнанням — це і є тиха форма утиску.
  - >-
    [!myth-buster] Тінь терору поруч: її найближчого колегу Михайла Кравчука
    1938 року заарештовує НКВС; 1942 року він гине в таборі на Колимі, тавро
    «ворог народу». Латишева працює в школі, чиє українське ядро знищено.
  - >-
    [!epistemic-humility] Природа утиску: тут немає ні арешту, ні вироку для самої
    Латишевої — вигадувати їх означало б повторити брехню старого плану. Є інше:
    гендерний бар'єр і виживання всередині знекровленої терором науки.
  section: 'Тінь: Орден Леніна і зруйнована школа'
  words: 1600
- points:
  - >-
    Повернення до розминки: як поєднати світовий метод, орден Леніна і знищену
    школу в одному житті? Студент формулює відповідь, спираючись на гендерний
    контекст і політику пам'яті.
  - >-
    Повернення імені: проєкти з жіночої історії науки (зокрема «Наука — це вона»,
    2021) повертають Латишеву в пантеон українських учених і до молодих жінок у
    STEM.
  - >-
    [!decolonization] Латишева як українська математикиня, чию спадщину
    загальнорадянський наратив частково привласнив; незалежна Україна повертає
    її ім'я у власну наукову традицію.
  - >-
    Сучасне відлуння: жінки в математиці й STEM сьогодні; чому важливо вести
    історію постаті від джерел і дисертацій, а не від зручної вигаданої легенди.
  section: 'Підсумок: Повернення математикині'
  words: 1000
focus: >-
  The life and legacy of mathematician Klavdiya Yakivna Latysheva — the first woman in
  Ukraine to defend a physico-mathematical dissertation, professor and dean at Kyiv
  University, namesake of the Frobenius–Latysheva method — focusing on the gendered
  barriers she crossed and the honest shadow of the terror-decimated Kyiv mathematical
  school around her, NOT a fabricated career as an aviator.
level: BIO
module: bio-130
objectives:
- >-
  Аналізувати внесок Клавдії Латишевої в аналітичну теорію диференціальних
  рівнянь, зокрема метод Фробеніуса–Латишевої, точно описуючи його суть.
- >-
  Реконструювати її шлях від вищих жіночих курсів до професури й деканства на
  основі перевірених джерел, відділяючи факти від вигаданої «авіаційної» легенди.
- >-
  Пояснювати подвійний механізм утиску — гендерний бар'єр у науці та виживання
  всередині знищеної терором київської математичної школи — без вигадування
  персональних репресій.
- >-
  Оцінювати, як радянський і гендерний контексти впливали на визнання та пам'ять
  про жінку-вчену, і як сучасна Україна повертає її ім'я.
