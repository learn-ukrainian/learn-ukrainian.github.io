content_outline:
- points:
  - 'Парадокс: як звичайний чорний квадрат на білому полотні став однією з найвпливовіших картин XX століття і «нулем» мистецтва?'
  - 'Провокація: Його називають «російським художником», але він народився в Києві, провів дитинство в українському селі,
    а в його роботах дослідники знаходять відгуки українського народного мистецтва. Хто ж такий Казимир Малевич?'
  - '[!biography] Представлення ключової фігури через суперечність.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Мистецький): Супрематизм — це вершина мистецтва чи його глухий кут? Одні бачили в «Чорному квадраті» геніальне
    прозріння і вихід у новий вимір, інші — кінець живопису та шарлатанство.'
  - 'Дебат 2 (Національний): Російська імперська нарація привласнила Малевича, називаючи його «великим російським художником».
    Українське мистецтвознавство доводить, що його світогляд і художня мова сформувалися саме в Україні.'
  - '[!decolonization] Розвінчання міфу про «російськість» Малевича як приклад культурної апропріації.'
  - '[!epistemic-humility] Визнання, що ідентичність Малевича була складною (етнічний поляк, народжений в Україні, що став
    зіркою в імперському центрі) і не зводиться до простих визначень.'
  section: 'Конфліктна карта: Геній чи шарлатан? Українець чи росіянин?'
  words: 900
- points:
  - Народження в Києві в польській родині. Світ дитинства на Поділлі, Харківщині, Чернігівщині.
  - '«Я ріс серед українського села»: вплив народної культури, яскравих кольорів вишивок, розпису печей та хат на візуальне
    мислення майбутнього художника.'
  - 'Формальні пошуки: від імпресіонізму до символізму та примітивізму. Робота в київському художньому середовищі.'
  - Переїзд до Москви, входження в кола авангардистів. Кубофутуризм як останній крок перед власним відкриттям.
  section: 'Формування: Київ, село, авангард'
  words: 1000
- points:
  - Створення опери «Перемога над Сонцем» (1913) — народження супрематичних ідей у сценографії.
  - 'Маніфест 0,10 (1915): презентація «Чорного квадрата», «Чорного хреста» та «Чорного кола» як трьох стовпів нової системи.'
  - 'Теорія супрематизму: звільнення мистецтва від предметності, вихід до «чистої форми», домінування кольору та геометрії.'
  - '«Біле на білому» (1918): вершина безпредметності, де матерія живопису майже зникає.'
  section: 'Діяльність: Від кубофутуризму до супрематизму'
  words: 1300
- points:
  - '[!anti-hagiography] Малевич-педагог: створення УНОВІСу (Утвердители нового искусства) у Вітебську. Диктаторський стиль
    керівництва, вимога до учнів слідувати його системі, конфлікт з Ель Лисицьким.'
  - 'Крах утопії: чи був супрематизм життєздатною системою? Критика, що він зайшов у глухий кут і не міг далі розвиватися.'
  - '[!myth-buster] Загадкове повернення до фігуративності в пізній період. Це був компроміс із радянською владою чи новий
    етап творчості? Аналіз «другого селянського циклу».'
  - 'Відносини з радянською владою: від спроб співпраці до арешту (1930) та повної ізоляції. Митець, що не вписався в рамки
    соцреалізму.'
  section: 'Тінь: Деспот УНОВІСу та кінець утопії'
  words: 900
- points:
  - 'Повернення до розминки: чому «Чорний квадрат» — це не просто чорна фарба на полотні? Відповідь з урахуванням концепції
    «нуля форм» і культурного контексту.'
  - 'Спадщина Малевича: вплив на світовий дизайн, архітектуру (Заха Хадід) та мінімалізм.'
  - '[!decolonization] Боротьба за спадщину сьогодні: як Україна повертає собі ім''я художника і як цьому протистоїть Росія.
    Чому важливо називати Малевича українським художником.'
  - 'Сучасне значення: Малевич як символ радикального розриву з традицією та сміливості творити абсолютно нове.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Казимир Малевич: супрематизм, український авангард, дебати про ідентичність, конфлікт із соцреалізмом. Принцип анти-агіографії.'
