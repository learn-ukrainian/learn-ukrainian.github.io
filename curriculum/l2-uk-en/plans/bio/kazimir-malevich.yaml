objectives:
- Аналізувати творчий шлях Малевича як серію розривів та криз, а не лінійний розвиток.
- Критично оцінювати супрематизм як мистецьку утопію, її сильні сторони та внутрішні суперечності.
- Аргументувати позицію в дебаті про національну ідентичність Малевича, використовуючи докази з його біографії та творчості.
- Пояснювати, як і чому радянська система спочатку використовувала, а потім відкинула авангардне мистецтво.
