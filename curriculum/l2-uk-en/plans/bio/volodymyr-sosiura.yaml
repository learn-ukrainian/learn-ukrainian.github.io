content_outline:
- points:
  - >-
    [!biography] Знайомство з Володимиром Сосюрою: лірик із українського Донбасу,
    народжений 25 грудня 1897 / 6 січня 1898 року на станції Дебальцеве і померлий
    8 січня 1965 року в Києві від серцевої хвороби.
  - >-
    Провокаційне питання: як поет, що отримував радянські премії, став мішенню
    кампанії за твір «Любіть Україну!»?
  section: Розминка
  words: 400
- points:
  - >-
    Дитинство у Верхньому, або Третій Роті, тепер у межах Лисичанська: з
    одинадцяти років Сосюра працював чорноробом, тому його рання біографія має
    робітничий досвід, а не літературний салон.
  - >-
    Революційний вузол: у 1918 році він приєднався до робітничого повстання
    проти кайзерівських військ, потім став вояком армії Української Народної
    Республіки, а в 1920 році вступив до Червоної армії в Одесі.
  - >-
    [!epistemic-humility] Дата народження подається в джерелах як старий і новий
    стиль; у сучасному викладі використовуємо 6 січня 1898 року, зберігаючи
    25 грудня 1897 року як дату за старим стилем.
  - >-
    Прийняті джерела називають ранню втрачену книжку «Пісні крові» й датують її
    1918 роком. НБУВ окремо й точно каталогізує видання «Поезії» 1921 року.
  section: 'Формування: Донбас, революція і два військові досвіди'
  words: 1000
- points:
  - >-
    ЕСУ пов'язує поему «Червона зима» з 1921 роком, а однойменну збірку — з 1922
    роком. Розмежування твору і книжки зберігаємо в усіх завданнях.
  - >-
    Сосюра в різний час належав до Пролеткульту, «Плугу», «Гарту», ВАПЛІТЕ і
    ВУСПП; цей перелік показує мінливе інституційне поле, а не однакову відданість.
  - >-
    ЕСУ описує поетику Сосюри через романсовий ліризм, музичність, колір і сильне
    особистісне переживання; ліричний голос не є буквальним протоколом біографії.
  - >-
    ЕСУ датує поему «Махно» приблизно 1924 роком і прямо зазначає, що текст не
    зберігся; фрагментів, точного тексту чи складу не реконструюємо.
  - >-
    [!decolonization] "Любіть Україну!" 1944 року треба читати як пряму українську
    патріотичну адресу воєнного часу, а не як нейтральний радянський патріотизм.
  - >-
    Перекладацька праця Сосюри з російськими, білоруськими, башкирськими,
    вірменськими, болгарськими й угорськими поетами є багатомовною культурною
    роботою, а не доказом другорядності українського центру його поезії.
  section: 'Діяльність: Лірика, революція і внутрішній поділ'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Сосюра не був ані суто лояльним радянським поетом, ані
    тільки переслідуваним патріотом: ЕСУ фіксує кон'юнктурно-декларативні тексти,
    премії, звинувачення в націоналізмі й нову загрозу арешту 1951 року.
  - >-
    1944 рік: "Любіть Україну!" було написано і надруковано під час війни; у
    пізніших радянських виданнях текст редагували й ідеологічно контролювали.
  - >-
    ЦДАМЛМ датує арешт дружини Марії 1949 роком і повідомляє про її заслання до
    Казахстану; прийнятий набір не підтримує варіанта 1950 року.
  - >-
    2 липня 1951 року газета «Правда» опублікувала російськомовну статтю
    «Об идеологических извращениях в литературе»; УІНП передає її українську
    назву як «Про ідеологічні перекручування в літературі».
  - >-
    ЕСУ фіксує, що після цієї кампанії Сосюрі знову загрожував арешт. Загрозу
    зіставляємо зі Сталінською премією 1948 року як документовані сусідні факти,
    не додаючи непідтвердженої оцінки професійної шкоди.
  - >-
    Документована суперечність полягає в сусідстві державної нагороди 1948 року,
    кампанії 1951 року, звинувачення в націоналізмі та загрози арешту. Мотиви
    державних діячів пояснюємо лише там, де їх прямо підтримують джерела.
  - >-
    Архівна перспектива: ЦДАМЛМ України зберігає особовий фонд Сосюри №44, що
    налічує 1395 одиниць зберігання.
  section: 'Тінь: "Любіть Україну!" і кампанія 1951 року'
  words: 1600
- points:
  - >-
    Пізні книжки «Солов'їні далі» 1957 року й «Близька далина» 1960 року та
    поема «Розстріляне безсмертя» 1960 року належать до різних жанрових форм;
    їх не об'єднуємо під неточною назвою «книжки».
  - >-
    Посмертна "Третя Рота" 1988 року робить автобіографічний конфлікт видимішим
    і допомагає говорити про Донбас, УНР, Червону армію та радянську цензуру
    без спрощення.
  - >-
    [!myth-buster] Російськоцентричне читання не має стирати українську адресу
    твору. Водночас урок доводить тиск через задокументовані звинувачення,
    редагування і загрозу арешту, а не через непідтверджене читання намірів.
  - >-
    Підсумкове питання: як навчати ліричної простоти Сосюри так, щоб не втратити
    складність його політичного роздвоєння і родинної травми?
  section: 'Підсумок: Любов до України без спрощення'
  words: 1000
focus: >-
  Володимир Сосюра як лірик українського Донбасу, учасник суперечливих
  революційних траєкторій і автор "Любіть Україну!", атакований у 1951 році за
  український патріотизм. Семінар тримає разом радянські нагороди, цензуру,
  родинну репресію і внутрішній поділ.
