content_outline:
- points:
  - >-
    [!biography] Знайомство з Володимиром Сосюрою: лірик із українського Донбасу,
    народжений 25 грудня 1897 / 6 січня 1898 року біля Дебальцевого і померлий
    8 січня 1965 року в Києві від серцевої хвороби.
  - >-
    Провокаційне питання: як поет, що отримував радянські премії, став мішенню
    кампанії за рядок "Любіть Україну, як сонце любіть"?
  section: Розминка
  words: 400
- points:
  - >-
    Дитинство у Верхньому, або Третій Роті, тепер у межах Лисичанська: з
    одинадцяти років Сосюра працював наймитом, тому його рання біографія має
    робітничий досвід, а не літературний салон.
  - >-
    Революційний вузол: у 1918 році він приєднався до робітничого повстання
    проти гетьманської влади, потім став вояком армії Української Народної
    Республіки, а в 1920 році вступив до Червоної армії в Одесі.
  - >-
    [!epistemic-humility] Дата народження подається в джерелах як старий і новий
    стиль; у сучасному викладі використовуємо 6 січня 1898 року, зберігаючи
    25 грудня 1897 року як дату за старим стилем.
  - >-
    Рання втрачена книжка "Пісні крови" 1918/1919 року показує, що частина
    воєнного старту Сосюри не збереглася; перша відома книжка "Поезії" вийшла
    1921 року.
  section: 'Формування: Донбас, революція і два військові досвіди'
  words: 1000
- points:
  - >-
    "Червона зима" 1922 року зробила його відомим як революційного поета, але
    вже в цій славі важливо бачити напругу між ідеологією та українською
    автобіографією.
  - >-
    Збірки "Місто" й "Осінні зорі" 1924 року розширюють регістр Сосюри від
    революційної теми до урбаністичної та інтимної лірики.
  - >-
    "Два Володьки" 1930 року дає ключ до внутрішнього роздвоєння: революційна
    лояльність, український обов'язок, страх і потреба вижити не зводяться до
    одного політичного ярлика.
  - >-
    "Серце" 1931 року було заборонене відразу після виходу; досьє також фіксує
    втрату поеми "Махно", від якої лишилися лише сліди.
  - >-
    [!decolonization] "Любіть Україну!" 1944 року треба читати як пряму українську
    патріотичну адресу воєнного часу, а не як нейтральний радянський патріотизм.
  - >-
    Перекладацька праця Сосюри з російськими, білоруськими, башкирськими,
    вірменськими, болгарськими й угорськими поетами є багатомовною культурною
    роботою, а не доказом другорядності українського центру його поезії.
  section: 'Діяльність: Лірика, революція і внутрішній поділ'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Сосюра не був ані суто лояльним радянським поетом, ані
    тільки переслідуваним патріотом: він писав конформні тексти, отримував премії
    і водночас був небезпечним для системи через українську любов.
  - >-
    1944 рік: "Любіть Україну!" було написано і надруковано під час війни; у
    пізніших радянських виданнях текст редагували й ідеологічно контролювали.
  - >-
    1950 рік: дружину Марію було репресовано, а підготовка збірки "Колос викинув
    ячмінь" відбувалася вже в атмосфері родинної небезпеки.
  - >-
    2 липня 1951 року: газета "Правда" опублікувала статтю, відому в українських
    переказах як "Проти ідеологічних перекручень у літературі", і звинуватила
    "Любіть Україну!" в націоналізмі.
  - >-
    Досьє фіксує, що після цієї кампанії Сосюрі знову загрожував арешт; професійна
    шкода була особливо сильною, бо удар прийшов після Сталінської премії 1948
    року.
  - >-
    Механізм тиску полягав у суперечності: система могла нагородити поета за
    радянську лояльність і відразу оголосити небезпечним саму любов до України,
    якщо вона не підпорядковувалася імперській ієрархії.
  - >-
    Архівна перспектива: його матеріали зберігаються у ЦДАМЛМ України, фонд №44,
    та в Інституті літератури імені Тараса Шевченка, фонд №139.
  section: 'Тінь: "Любіть Україну!" і кампанія 1951 року'
  words: 1600
- points:
  - >-
    Пізні книжки "Солов'їні далі" 1957 року, "Близька далина" 1960 року і
    "Розстріляне безсмертя" 1960 року показують повернення пам'яті та тиск
    заборонених тем у пізньому доробку.
  - >-
    Посмертна "Третя Рота" 1988 року робить автобіографічний конфлікт видимішим
    і допомагає говорити про Донбас, УНР, Червону армію та радянську цензуру
    без спрощення.
  - >-
    [!myth-buster] Російськоцентричне читання зводить "Любіть Україну!" до
    радянського патріотизму; деколонізоване читання показує, що мішенню була
    саме українська прив'язаність без московського посередника.
  - >-
    Підсумкове питання: як навчати ліричної простоти Сосюри так, щоб не втратити
    складність його політичного роздвоєння і родинної травми?
  section: 'Підсумок: Любов до України без спрощення'
  words: 1000
focus: >-
  Володимир Сосюра як лірик українського Донбасу, учасник суперечливих
  революційних траєкторій і автор "Любіть Україну!", атакований у 1951 році за
  український патріотизм. Семінар тримає разом радянські нагороди, цензуру,
  родинну репресію і внутрішній поділ.
