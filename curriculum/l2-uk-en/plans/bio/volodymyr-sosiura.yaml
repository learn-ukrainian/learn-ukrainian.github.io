objectives:
- Аналізувати ранню біографію Сосюри через Донбас, працю з одинадцяти років, армію УНР і Червону армію.
- Розрізняти бібліографічні й жанрові ідентичності «Поезій» та «Червоної зими».
- Досліджувати кампанію 2 липня 1951 року проти "Любіть Україну!" як механізм цензури й загрози арешту.
- Оцінювати пізню пам'ять про Сосюру без редукції до радянського лауреата або безгрішного мученика.
