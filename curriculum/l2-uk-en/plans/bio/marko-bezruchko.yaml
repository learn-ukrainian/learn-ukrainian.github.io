content_outline:
- points:
  - 'Провокація: серпень 1920 року, 6-та Січова стрілецька дивізія тримає Замостя проти 1-ї Кінної армії Будьонного. Пізніша пам''ять називає це «Дивом на Віслі» й навіть «порятунком Європи». Що тут — операційний факт, а що — фраза політики пам''яті?'
  - '[!biography] Знайомство з постаттю штабного офіцера, чия біографія — про розбудову армії й штабну працю, а не про батальну харизму.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (українська аґентність): Безручко — не польський допоміжний командир, а генерал-хорунжий Армії УНР з українськими воєнними цілями; 1920 року він командував українськими формуваннями в межах польсько-українського союзу проти більшовицької Росії.'
  - 'Позиція 2 (антиагіографічна): фразу «врятував Європу» подаємо як комеморативну мову, а не як нейтральний одно­причинний військовий аналіз; тримаємо операційний факт і меморіальну фразу окремо.'
  - '[!decolonization] Парадокс союзу: у 1918–1919 роках польські й українські сили воювали за Галичину, а 1920 року — разом проти більшовиків; це не «братерство», а мінлива реальполітика.'
  - '[!epistemic-humility] Рік народження різниться: ЕСУ/ЕІУ/УІНП дають 1883, старіша англомовна стаття IEU — 1886; у навчальному тексті беремо 1883 й називаємо розбіжність.'
  section: 'Конфліктна карта: «Врятував Європу» чи штабний фахівець?'
  words: 900
- points:
  - 'Походження й вишкіл: 31 жовтня 1883 року, Великий Токмак (нині Токмак, Запорізька область); Одеська піхотна юнкерська школа (1908) та Академія Генерального штабу (1914) — саме тому Безручко постає як організатор і штабіст, а не лише польовий командир.'
  - 'Імперська служба й українізація: у Першу світову війну — офіцер російської імператорської армії; від 1917 року — участь в українізації фронтових частин і переведення фахового досвіду на українську державну службу.'
  - '1918–1919 роки: штабна праця в Генеральному штабі Армії УНР, потім начальник штабу формувань, зокрема Корпусу Січових стрільців — тяглість січово-стрілецьких кадрів у державному війську.'
  section: 'Формування: Від імперського штабу до Армії УНР'
  words: 1000
- points:
  - '1920 рік: від 8 лютого Безручко очолив 1-шу дивізію, від 21 березня перейменовану на 6-ту Січову дивізію; після Варшавської угоди Пілсудського–Петлюри вона стала однією з перших, що ввійшли до Києва в травні 1920 року.'
  - 'Серпень 1920 року — оборона Замостя проти 1-ї Кінної армії Будьонного під час ширшої Варшавської битви; операційний контекст беремо за джерелами ІПН/Gov.pl і уникаємо непідтверджених співвідношень сил.'
  - 'Штабна робота, а не харизма: Безручко вчить, що розбудова армії тримається на штабі, кадрах, логістиці й формуванні дивізій; у вересні–листопаді 1920 року він командував Середньою групою Армії УНР.'
  - 'Після кампанії — військово-урядова праця у Варшаві та керівництво Українським воєнно-історичним товариством (1931–1935), що зберігало військову пам''ять після поразки.'
  section: 'Діяльність: 6-та Січова дивізія й оборона Замостя'
  words: 1300
- points:
  - '[!anti-hagiography] Дисциплінованого командира можна вшановувати без висновку, що союз 1920 року розв''язав українську державність або що всяка польська політика щодо українців була дружньою.'
  - '[!myth-buster] «Диво на Віслі» й «порятунок Європи» — це джерелознавчі фрази: хто, коли й задля якої політики пам''яті їх уживає? У класі вони живуть у завданні на аналіз джерел, а не в голосі оповідача.'
  - 'Ризька реальполітика: після битви прийшло інтернування. Варшавська угода й воєнна конвенція створили союзну рамку, але польсько-радянські переговори згодом полишили українську армію ізольованою в польських таборах (Александрів-Куявський, Каліш, Щипйорно).'
  - '[!epistemic-humility] Пізніші симпатії до ОУН і погляди доби Другої світової війни згадуємо обережно, з датами й джерелами; цей модуль зосереджений на командуванні в Армії УНР та воєнно-історичній праці на еміграції.'
  section: 'Тінь: Союз, Рига й інтернування'
  words: 900
- points:
  - 'Повернення до розминки: чому оборону Замостя треба вчити як конкретну операцію 6-ї Січової дивізії, а не як гасло «порятунку Європи»?'
  - 'Радянське стирання: польсько-союзний генерал УНР, що воював проти Червоної армії, не вписувався в радянський наратив «законної революційної перемоги» чи «братньої» українсько-російської історії.'
  - '[!decolonization] Присвоєння 2022 року почесного імені генерал-хорунжого Марка Безручка 110-й окремій механізованій бригаді — це сучасна пам''ять доби російської агресії; вона не «дописує» факти 1920 року, а показує тяглість антиімперської військової пам''яті.'
  - 'Першоджерела Безручка (тексти про Січових стрільців у збірнику «За Державність») читаємо як авторське свідчення, а не як всезнаюче оповідання; точну назву статті слід звірити перед класним використанням.'
  section: 'Дискусія та підсумок: Пам''ять про командира'
  words: 700
focus: Marko Bezruchko (1883-1944) as a General Staff officer and general-khorunzhyi of the UNR Army who commanded the 6th Sich Rifle Division in the 1920 defense of Zamość, taught so that army-building and staff work, not battlefield charisma, carry the biography; the 1920 Polish-Ukrainian alliance is held against the earlier war over Galicia and the later Riga settlement and internment, the 'Miracle on the Vistula / saved Europe' phrases are treated as source-criticism rather than narrator voice, and the 2022 brigade naming is modern memory that must not backfill 1920 facts.
