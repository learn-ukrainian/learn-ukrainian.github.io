content_outline:
- points:
  - >-
    [!biography] Знайомство з Ігорем Костецьким: письменник, драматург, перекладач,
    теоретик МУРу й видавець, який узяв літературне ім'я від материного прізвища.
  - >-
    Провокаційне питання: як людина з російським батьком і частково російськомовним
    раннім середовищем свідомо обрала українську літературу й зробила цей вибір
    антиімперським жестом?
  section: Розминка
  words: 400
- points:
  - >-
    Походження і ранні місця: народження 14 травня 1913 року в Києві; життя родини
    у Вінниці 1919-1924 років на дідовій садибі, пізніше переосмисленій у назві
    видавництва "На горі".
  - >-
    Освітня й театральна траєкторія: київський водно-транспортний технікум,
    Ленінградська театральна школа 1933-1935 років, Державний інститут мистецтва
    в Москві та праця актором і культурним інструктором на Уралі.
  - >-
    [!decolonization] Вибір українства близько 1938-1941 років: не етнічна формула,
    а свідома самоідентифікація з українською культурою, яку радянська система
    витісняла й маргіналізувала.
  section: 'Формування: Київ, театр і вибір українства'
  words: 1000
- points:
  - >-
    МУР 1945-1949 років: Костецький як один із провідних теоретиків і співтворців
    післявоєнного середовища разом із Віктором Петровим, Юрієм Косачем і Юрієм
    Шерехом.
  - >-
    Рання проза і драматургія: "Оповідання про переможців" / "Тобі належить цілий
    світ" 1946 року, п'єса "Спокуси несвятого Антона", "Близнята ще зустрінуться",
    "Дійство про велику людину" та "Там, де початок чуда".
  - >-
    Естетична позиція: експресіоністична, сюрреалістична, дадаїстична і
    протоабсурдистська манера як український модернізм у європейському масштабі,
    а не як наслідування імперського центру.
  - >-
    Теоретична напруга МУРу: національна місія, органічність і водночас захист
    естетичної свободи та універсальних тем як простору української літератури.
  section: 'Діяльність: МУР і європейський модернізм у вигнанні'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Костецький мав складну воєнну біографію: мобілізація до
    Червоної армії 1941 року, оточення частини, перебування на окупованій
    українській території, викладання у Вінницькому фармацевтичному інституті
    та редагування газети "Вінницькі вісті".
  - >-
    Конкретний механізм примусу: восени 1942 року його вивезли до Німеччини на
    примусову працю; після 1945 року він залишився переміщеною особою.
  - >-
    Перешкода поверненню: радянська реокупація України 1943-1944 років зробила
    повернення неможливим для українського модерніста-емігранта, чия формально
    радикальна українська творчість була неприйнятна для радянської культурної
    політики.
  - >-
    [!epistemic-humility] У цій біографії немає одного архівного кримінального
    файла як головного документа; доказова база складається з еміграційного
    запису, факту депортації на працю, післявоєнного статусу переміщеної особи
    та непублікабельності його творів в УРСР.
  section: 'Тінь: Примусова праця та неможливе повернення'
  words: 1600
- points:
  - >-
    Видавництво "На горі": створене у Штутгарті 1955 року разом з Елізабет
    Котмаєр і протягом приблизно чверті століття спрямоване на українські
    видання та переклади світової класики.
  - >-
    Перекладацький масштаб: українські версії Еліота, "Ромео і Джульєтти",
    сонетів Шекспіра, Лорки, Паунда, Штефана Ґеорґе й Верлена як розширення
    української модерної лексики.
  - >-
    Складна рецепція: його часто зводили до перекладача або теоретика МУРу, хоча
    досьє наголошує на ньому як на одному з найоригінальніших авангардних
    драматургів українського модернізму.
  - >-
    Завершення шляху: смерть 14 червня 1983 року в селі Швайкгайм поблизу
    Штутгарта, Західна Німеччина, і повернення його спадщини в український
    читацький простір уже після незалежності.
  section: 'Підсумок: "На горі" і повернення модерніста'
  words: 1000
focus: >-
  Ігор Костецький як український модерніст, який свідомо обрав українську
  ідентичність, пережив примусову працю й неповернення до радянської України,
  а в еміграції створив простір для МУРу, експериментальної драматургії та
  українських перекладів світового модернізму.
