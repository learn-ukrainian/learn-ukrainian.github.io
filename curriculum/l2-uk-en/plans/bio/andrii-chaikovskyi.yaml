content_outline:
- points:
  - 'Парадокс: як адвокат, що досконало знав австрійські закони, став головним ідеологом козацької вольниці та речником антиколоніального
    бунту в літературі?'
  - '[!biography] Чайковський — символ галицької інтелігенції, яка перетворювала культурну роботу на державну справу, а юридичну
    практику — на захист цілого народу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Народовець vs Москвофіли. Боротьба Чайковського проти москвофільства в Бережанах як мікрокосм ідеологічної війни
    в Галичині.'
  - 'Дебат 2: Ідеалізація vs Історія. Чи була його козацька проза («За сестрою», «Сагайдачний») ефективним інструментом деколонізації,
    чи романтичною ідеалізацією, що спрощувала минуле?'
  - '[!epistemic-humility] Сучасники критикували його за надмірну ідеалізацію, але визнавали мобілізаційний ефект його творів
    для молоді.'
  - '[!decolonization] Його свідомий вибір писати про Козаччину був прямою відповіддю на імперські наративи (польський та
    російський) і спробою повернути українцям власну героїку.'
  section: 'Конфліктна карта: ''Свій серед чужих'' чи ''чужий серед своїх''?'
  words: 900
- points:
  - Народження в родині дрібного шляхтича, рання втрата батьків — формування характеру через випробування.
  - Бабуся в селі Гординя та польський буквар — перший контакт із грамотою в умовах полонізації.
  - 'Самбірська гімназія: знайомство з «Кобзарем» Шевченка як національне пробудження.'
  - 'Львівський університет: підпільне товариство «Студентська громада» та культурна робота в «Просвіті» — поєднання юриспруденції
    та національної справи.'
  section: 'Формування: Від польського букваря до «Кобзаря»'
  words: 1000
- points:
  - '«Літературний бакциль»: дружба з Іваном Франком як поворотний момент, що спонукав адвоката стати письменником.'
  - Боснійсько-герцоговинський похід в австрійській армії та мемуари «Спомини з-перед десяти літ» — перший літературний успіх.
  - Історичні повісті «За сестрою», «Сагайдачний», «Козацька помста» — створення національного міфу про козацтво як альтернативи
    імперській історії.
  - «Полковник Михайло Кричевський» — складний образ шляхтича, що перейшов на бік українців під час Хмельниччини, дослідження
    проблеми вибору та ідентичності.
  - 'Європейський вимір: Чайковський як есперантист, спроба вписати українську справу в ширший контекст.'
  section: 'Діяльність: Козацька слава як деколонізація'
  words: 1300
- points:
  - '[!anti-hagiography] Російська окупація Галичини 1914 року: арешт за «українофільство» та ув''язнення у львівській в''язниці
    «Бригідки» — ціна за патріотизм.'
  - 'Державотворча робота як повітовий комісар ЗУНР у Самборі: спроба побудувати справедливу державу на тлі війни та хаосу.'
  - '«Чорні рядки»: глибока зневіра та біль від зради лідерів ЗУНР, що контрастувала з жертовністю простих січових стрільців.'
  - '[!myth-buster] Крах ЗУНР — це не лише поразка на полі бою, а й глибока особиста та ідеологічна криза для її творців,
    включно з Чайковським.'
  - Втеча під румунським «постолом» до Коломиї — принизливий фінал великої державницької мрії.
  section: 'Тінь: Арешт, зневіра та крах ЗУНР'
  words: 900
- points:
  - 'Повернення до парадоксу: як поєднувались адвокат-законник і співець козацької вольниці? Відповідь студента з опорою на
    матеріал модуля.'
  - '[!decolonization] Трагічна іронія долі: син Богдан, натхненний батьковою прозою, був закатований комуністами у 1941 році
    в тій самій в''язниці «Бригідки», де сидів його батько.'
  - Спадщина Чайковського — це не лише його твори, а й сама модель інтелігента-державника, актуальна для України сьогодні.
  - 'Пам''ять: визнання на державному рівні, вулиці та пам''ятники як елемент сучасної політики пам''яті.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Andrii Chaikovskyi — lawyer, writer, and state-builder of the West Ukrainian People's Republic (ZUNR), his decolonizing
  Cossack prose, and the tragic intersection of his life with the major conflicts of the early 20th century.
