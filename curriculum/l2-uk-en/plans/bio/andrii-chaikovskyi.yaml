objectives:
- Критично аналізувати роль Андрія Чайковського у галицькому національному русі та державотворчих процесах ЗУНР.
- Досліджувати взаємозв''язок між юридичною практикою, літературною творчістю та політичною діяльністю як формами національного
  служіння.
- Оцінювати деколонізаційний потенціал та ідеологічні обмеження його історичної прози про Козаччину.
- Формулювати аргументовану позицію щодо трагедії української еліти в умовах імперського тиску та внутрішніх конфліктів.
