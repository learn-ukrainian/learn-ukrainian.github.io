content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому запис мелодій кобзарів на фонограф був порятунком
          цілої усної традиції?
      - >-
          [!biography] Філарет Колесса - фольклорист, музикознавець і
          композитор, засновник українського етнографічного музикознавства.
      - >-
          Освіта: Відень (лекції з гармонії Антона Брукнера), Львівський
          університет, докторат з філології 1918 року.
      - >-
          Родина вчених: брати Олександр та Іван Колесси, син - композитор
          Микола Колесса; вплив старшого брата Івана на фольклорні зацікавлення.
    section: 'Формування: Від Стрия до Відня і Львова'
    words: 1000
  - points:
      - >-
          «Мелодії українських народних дум» (1910, 1913): фонографічні записи
          кобзарсько-лірницького репертуару після експедиції 1908 року.
      - >-
          Експедиція з Опанасом Сластьоном, Лесею Українкою і Климентом Квіткою
          на Наддніпрянщину; порятунок думової традиції.
      - >-
          Метод: вивчати пісню разом з мелодією; «Ритміка українських народних
          пісень», «Українська усна словесність» (1938) - перший підручник.
      - >-
          [!decolonization] Доказ унікальності української усної словесності
          проти заперечення окремішності - навчальний центр модуля.
    section: 'Діяльність: Думи, мелодія і метод'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          Чесна рамка останніх років: після радянської анексії 1939 року Колессу
          кооптували в радянські інституції - депутатство, музей, інститут АН УРСР.
      - >-
          [!anti-hagiography] Не подавати радянські посади як історію успіху і
          не вигадувати репресій; рамка - творчість під ідеологічним обмеженням.
      - >-
          [!myth-buster] Поширене твердження про масовий розстріл кобзарів на
          з'їзді 1930-х не має надійного документального підтвердження - не
          подавати як доведений факт.
    section: 'Контекст: Радянська кооптація без вигаданих репресій'
    words: 1000
  - points:
      - >-
          Спадщина: фонографічні записи дум і фольклорний корпус - основа
          української етномузикології; рукописна «Історія української етнографії».
      - >-
          Сучасна пам'ять: кафедра української фольклористики ім. Колесси,
          премія НАН України ім. Колесси, вулиці, музей-кімната.
      - >-
          Чому збереження думової традиції важливе для української культурної
          памʼяті.
    section: "Сучасна пам'ять: Засновник етномузикології"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як фонографічний запис і науковий метод
          зберегли українську думову традицію для майбутніх поколінь.
      - >-
          Аргументована відповідь: що робить Колессу важливим - записи дум,
          метод, підручник чи композиторська праця.
      - >-
          Фінальне письмо: Колесса як приклад збереження усної традиції через науку.
    section: "Дискусія та підсумок: Порятунок усної традиції"
    words: 800
focus: >-
  Filaret Kolessa as the founder of Ukrainian ethnographic musicology:
  phonograph recorder of the kobzar-lirnyk duma repertoire, author of the first
  Ukrainian folklore textbook, and composer, taught through the rescue of the
  duma tradition and an honest frame of Soviet co-optation in his final years
  without inventing repression.
