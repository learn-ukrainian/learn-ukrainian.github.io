objectives:
  - >-
      Аналізувати життя і працю Філарета Колесси в контексті українського
      етнографічного музикознавства, уникаючи агіографії
  - >-
      Пояснювати значення фонографічних записів дум і методу спільного аналізу
      тексту й мелодії
  - >-
      Чесно описувати радянську кооптацію вченого в останні роки без вигаданих
      репресій і без історії успіху
  - >-
      Формулювати аргументовану позицію щодо ролі Колесси у збереженні думової
      традиції
