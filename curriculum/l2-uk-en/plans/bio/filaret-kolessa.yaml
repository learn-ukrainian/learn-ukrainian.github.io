objectives:
- Пояснювати Колессу як українського етномузиколога й фольклориста, а не як самотнього «засновника».
- Читати Полтавську фонографічну експедицію 1908 року як мережеву дію Лесі Українки, Квітки, Сластьона, кобзарів і лірників, а не як заслугу однієї людини.
- Тримати «українсько-руський», «Галицька Лемківщина», «Підкарпатська Русь» як історичні джерельні назви, а не як голос учителя.
- Позначати гіпотезу про зв'язок думового речитативу й голосіння як часткову, а не як закриту історію походження.
- Читати радянські посади й нагороди пізньої доби як приборкану тяглість і легітимаційне використання, а не як нейтральний успіх.
