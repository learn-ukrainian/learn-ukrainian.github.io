content_outline:
- points:
  - 'Провокація: чому «засновник української етномузикології» — це корисне скорочення, яке водночас ховає цілу мережу дослідників, виконавців та інституцій?'
  - '[!biography] Знайомство з постаттю етномузиколога й фольклориста: транскриптор дум, аналітик пісенної ритміки, дійсний член НТШ від 1909 року, академік ВУАН від 1929 року, професор Львівського університету від 1939 року.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (першопрохідець): Колесса дав українській фольклористиці ритмічний і формальний аналіз пісні та наукову нотацію дум — це реальний внесок, що заслуговує метафори «засновник».'
  - 'Позиція 2 (мережа): за цим стоять раніша музично-фольклорна праця Лисенка, Франко й Гнатюк у НТШ, Роздольський і Людкевич, Леся Українка й Квітка, Сластьон і самі виконавці — кобзарі й лірники.'
  - '[!decolonization] Історичні назви «українсько-руський», «Галицька Лемківщина», «Підкарпатська Русь» тримаємо як джерельні заголовки праць, а не як голос учителя про українську ідентичність чи регіон.'
  - '[!epistemic-humility] Гіпотезу про зв''язок думового речитативу з похоронним голосінням Колесса обстоював, але ЕСУ застерігає, що прийняти її можна лише почасти, бо зміст і функція різняться, — це відкрита гіпотеза, а не закрита історія походження.'
  section: 'Конфліктна карта: Самотній засновник чи мережа?'
  words: 900
- points:
  - 'Походження й освіта: народився 17 липня 1871 року в селі Татарське (нині Піщани) Стрийського повіту в родині священника; брат Олександра Колесси, батько композитора Миколи Колесси.'
  - 'Європейська школа: закінчив Стрийську гімназію 1891 року, навчався у віденській богословській семінарії в 1891-1892 роках, слухав гармонію в Антона Брукнера у Відні, закінчив філософський факультет Львівського університету 1896 року, а докторат зі славістики здобув у Віденському університеті 1918 року.'
  - 'Рання праця під опікою Франка: етнографічна монографія «Людові вірування на Підгірʼю в селі Ходовичах» (1898) вийшла з передмовою Івана Франка; ранні хорові й пісенні обробки заклали музичну основу.'
  - '[!biography] «Ритміка українських народних пісень» (завершена 1905 року, видана в Києві 1907 року за підтримки Франка) стала стрижневою працею про ритм і форму української пісні.'
  section: 'Формування: Стрий, Відень і Львів'
  words: 1000
- points:
  - 'Регіон і форма: понад п''ятдесят транскрипцій інструментальної музики й пісень із гуцульського матеріалу для «Гуцульщини» Володимира Шухевича (1902-1904); «Огляд українсько-руської народної поезії» (1905) важливий для викладання української культурної єдності через імперський кордон — заголовок тримаємо джерельно.'
  - '[!anti-hagiography] Полтавська фонографічна експедиція (1908) і «Мелодії українських народних дум» (НТШ, 1910 і 1913) — не подвиг однієї людини: проєкт спирався на ініціативу й фінансування Лесі Українки, участь Климента Квітки, записи Опанаса Сластьона та мистецтво названих кобзарів і лірників.'
  - 'Класифікація й генеза: «Гаївки» (1909, з Гнатюком і Роздольським) — 180 мелодій, класифікованих за складочисловою й строфічною будовою; «Українські народні думи» й «Про генезу українських народних дум» (1920-1921) — центральні для теорії жанру.'
  - 'Музичні діалекти й синтез: праця над лемківськими, підкарпатськими й поліськими репертуарами (Полісся — з Казімєжем Мошинським, 1932) та «Українська усна словесність» (1938) — 643-сторінковий просвітянський синтез української усної літератури; пізні студії про Шевченка, Франка й Лесю Українку (1939-1946).'
  section: 'Діяльність: Фонограф, дума й музичний діалект'
  words: 1300
- points:
  - 'Механізм тиску — не мучеництво й не справа спецслужб, а інституційний: український учений будував фольклорну, музикознавчу й музейну інфраструктуру крізь габсбурзьку Галичину, міжвоєнну польську владу, радянську окупацію Західної України, нацистську окупацію й повернення радянської влади.'
  - 'Кооптація після 1939 року: радянська влада інкорпорувала західноукраїнські культурні установи й використовувала помітних галицьких учених для легітимності; 1939 року Колесса став професором і завідувачем катедри у Львівському університеті, а від 1940 року очолив львівські академічні фольклорно-етнографічні структури й етнографічний музей.'
  - '[!decolonization] Виданий 1945 року збірник «Фольклор Вітчизняної війни» з червоноармійським, партизанським і сталіноцентричним матеріалом (за УІНП) — це офіційне радянське використання фольклору, що стоїть поруч із давнішим українським науковим доробком, якого до нього не звести.'
  - '[!anti-hagiography] Радянські посади й нагороди реальні, але неповні: пізню кар''єру викладаємо як приборкану тяглість і кооптацію, а не як нейтральний радянський успіх чи вигадане дисидентство. Колесса помер 3 березня 1947 року у Львові, похований на Личаківському цвинтарі.'
  section: 'Тінь: Радянська легітимація й приборкана тяглість'
  words: 900
- points:
  - 'Повернення до розминки: урок вибудовуємо як джерельний ланцюг — виконання, фонограф, нотна транскрипція, друк, архів, клас, — щоб показати, як усна дума стає науковим текстом.'
  - '[!epistemic-humility] Джерельна дисципліна: не переносимо у модуль зручний рядок пісні, думи чи цитований народний текст, доки детермінований інструмент не підтвердить точний текст, виконавця й видання.'
  - '[!decolonization] Мережева заслуга: Полтавську експедицію не перетворюємо на міф самотнього вченого — визнаємо Лесю Українку, Квітку, Сластьона, виконавців та інституції.'
  - 'Відкрита гіпотеза: зв''язок думи й голосіння лишається науковим припущенням із межами, а не остаточною відповіддю про походження жанру.'
  section: 'Дискусія та підсумок: Від виконання до нотації, архіву й класу'
  words: 700
focus: 'Filaret Kolessa (1871-1947) as a Ukrainian ethnomusicologist, folklorist and Shevchenko Scientific Society scholar who transcribed dumy, analyzed folk-song rhythmics and synthesized Ukrainian oral literature across Habsburg Galicia, interwar Polish rule and successive Soviet and Nazi occupations: the ''founder of Ukrainian ethnomusicology'' shorthand opened into a network (Lysenko, Franko, Hnatiuk, Rozdolskyi, Liudkevych, Lesia Ukrainka, Kvitka, Slastion, and the kobzars and lirnyks), the 1908 Poltava phonograph expedition read as a collective act rather than a lone-scholar myth, historical titles like ''ukrainsko-ruskyi'', ''Halytska Lemkivshchyna'' and ''Pidkarpatska Rus'' kept source-bound, the dumy-lament genesis marked as a partial hypothesis with limits, and the post-1939 Soviet posts and the 1945 Folklore of the Patriotic War collection taught as co-optation and constrained continuity rather than neutral success or fabricated dissidence.'
