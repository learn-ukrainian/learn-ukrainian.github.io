content_outline:
- points:
  - >-
    Парадокс: як поет, який епатажно "палив Кобзаря", став
    ключовим будівничим українського модернізму?
  - >-
    [!biography] Знайомство з Семенком: засновник українського футуризму,
    який вивів українську літературу на урбаністичний та космополітичний рівень.
  - >-
    Провокаційне питання: чи була епатажність авангарду деколоніальною
    стратегією проти провінціалізації української культури?
  section: Розминка
  words: 400
- points:
  - >-
    Дебати 1: Радикальний розрив чи нове творення?
    Чому український футуризм потребував руйнування старих ідолів.
  - >-
    Радянська реакція: згортання експерименту та звинувачення культурних
    діячів у "фашизмі" й "тероризмі".
  - >-
    [!decolonization] Розгляд "Кверофутуризму" (1914) не як наслідування
    російських зразків, а як самостійного проєкту європейського авангарду
    на українському ґрунті.
  section: 'Конфліктна карта: Інтелектуальна війна за модернізм'
  words: 900
- points:
  - >-
    Початок шляху: від символістських "Прелюдів" (1913) до сміливого
    "Дерзання". Вплив життя у місті та нових технологій.
  - >-
    Створення футуризму: маніфест "Кверофутуризм" як заклик до пошуку
    (quærere). Відмова від статичності та провінційності.
  - >-
    Роль П'єро: маски та ліричний герой у циклах "П'єро кохає"
    та збірці "Арії трьох П'єро" (1929).
  - >-
    Цитата для аналізу: "Я буду великим скрипником і поїду в Японію."
    (Космополітичний горизонт, а не імперський центр).
  section: 'Формування: Від романтизму до кверофутуризму'
  words: 1000
- points:
  - >-
    Інституційна розбудова: Семенко як організатор літературного процесу.
    Видання "Альманаху трьох" (1920) та інших авангардних журналів.
  - >-
    Мовотворення: пошук нової лексики. Цитата: "я сонцекров люблю і в крові сонце."
    (Спроба передати динаміку нової епохи).
  - >-
    Еволюція стилю: від революційної патетики ("В революцію", 1925)
    до тиску утилітарності ("Тов. Сонце", 1931).
  - >-
    Протистояння: український літературний проєкт Семенка був незалежним
    від Москви, що стало небезпечним в умовах сталінізації.
  section: 'Діяльність: Розбудова інфраструктури футуризму'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Складний образ: Семенка часто зводять до хулігана,
    який "спалив Кобзаря". Проте його метою було не знищення Шевченка,
    а боротьба з його культовим, завмерлим сприйняттям.
  - >-
    Радянський терор: арешт 26 квітня 1937 року. Фабрикація справи про
    належність до "Української фашистської націоналістичної
    терористичної організації".
  - >-
    Смерть: вирок 23 жовтня та розстріл 24 жовтня 1937 року в Києві.
    Ймовірне місце поховання — Биківня. Знищення архівів та стирання пам'яті.
  - >-
    [!epistemic-humility] Радянська історіографія маргіналізувала його як
    "формаліста", позбавляючи українську культуру власного авангарду.
  section: 'Тінь: Фабрикація справи та знищення'
  words: 900
- points:
  - >-
    Повернення спадщини: зусилля діаспори та сучасних дослідників
    задля відновлення текстів, які фізично знищувалися в СРСР.
  - >-
    Вплив: сучасне прочитання Семенка засвідчує, що українська література
    мала потужний міський, експериментальний вимір.
  - >-
    Кінцеве питання: як ми маємо викладати історію літератури, коли її
    найяскравіші представники були фізично ліквідовані системою?
  section: 'Дискусія та підсумок: Спадщина Розстріляного відродження'
  words: 700
