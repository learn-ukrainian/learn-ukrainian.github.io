content_outline:
- points:
  - >-
    [!biography] Знайомство з Данилом Шумуком: правозахисник, мемуарист і один із
    найдовше ув''язнених українських політв''язнів, що пройшов через польські,
    нацистські й радянські табори.
  - >-
    Провокаційне питання: як читати життя, що пройшло крізь комуністичний юнацький
    активізм, підпілля ОУН, ГУЛАГ і правозахисні мережі УГГ, не зводячи його до
    одного ідеологічного ярлика?
  - >-
    [!epistemic-humility] Робоче правило семінару перед будь-яким твердженням про
    його політичну ідентичність: який режим? яке звинувачення? яке джерело?
  section: Розминка
  words: 400
- points:
  - >-
    Витоки: народження 28 грудня 1914 року в Боремщині на Волині, селянсько-робітниче
    соціалістичне середовище та організація 1932 року підпільного повітового комітету
    комуністичної молоді.
  - >-
    Між державами: арешт польською поліцією 19 січня 1934 року та восьмирічний вирок,
    звільнення за амністією в травні 1939 року; мобілізація до Червоної армії 1941 року,
    німецький полон на Полтавщині та втеча в листопаді 1941 року.
  - >-
    Підпілля ОУН: від 1943 року — ідеологічний і пропагандистський вишкіл, призначення
    інструктором пропаганди (за хронологією ЕСУ).
  - >-
    [!decolonization] Біографію слід читати як українське життя, сформоване
    конкуренцією імперій — польським поділом, нацистською окупацією та радянським
    режимом, — а не як ілюстрацію однієї ідеології.
  section: 'Формування: Життя між трьома окупаціями'
  words: 1000
- points:
  - >-
    Смертний вирок і каторга: арешт органами НКВС 22 лютого 1945 року, заміна страти
    на двадцять років каторжних робіт, ув''язнення в Норильську.
  - >-
    Табірний спротив: організація мережі взаємодопомоги в таборі №3, яку ЕСУ пов''язує
    з Норильським повстанням 1953 року та скасуванням каторжного режиму — в''язні як
    організатори, а не лише жертви.
  - >-
    [!epistemic-humility] Суперлатив «найдовше ув''язнений» узгоджується з сукупним
    багаторежимним досвідом, але порівняльної таблиці-рейтингу не знайдено в джерелах —
    цю заяву слід прямо позначати як неперевірену.
  - >-
    Мемуар як свідчення: «Пережите й передумане» (видання Детройт і Київ, переклади) —
    першоособова реконструкція, написана після років примусу, яку варто звіряти з
    енциклопедичною хронологією.
  section: 'Діяльність: Норильськ і мемуар «Пережите й передумане»'
  words: 1200
- points:
  - >-
    Повторні арешти: звільнення 1956 року, новий арешт 1957 року й десятирічний вирок
    1958 року; звільнення 1967 року та зустрічі з дисидентами в Києві й Львові.
  - >-
    Останній строк: арешт 12 січня 1972 року, вирок 7 липня 1972 року — десять років
    таборів особливого режиму та п''ять років заслання; членство в Українській
    Гельсінській групі в місцях ув''язнення (за профілем Покровської адміністрації).
  - >-
    [!anti-hagiography] Шумук не був бездоганною іконою: його шлях проходив через
    комуністичний юнацький активізм і воєнну діяльність в ОУН. Сенс не в тому, щоб
    згладити суперечності, а в тому, щоб навчитися бачити, як переглядають переконання.
  - >-
    [!myth-buster] Окремий розбір таборових легенд: вимагати джерело для кожного
    епізоду й відрізняти документ від мемуарної традиції.
  - >-
    Механізм тиску через режими: польська в''язниця, нацистський полон, НКВС/КДБ,
    каторга, табори особливого режиму, заслання та умови примусової еміграції.
  section: 'Тінь: Багаторежимне ув''язнення та складність ідеології'
  words: 1600
- points:
  - >-
    Вихід і повернення: після завершення заслання 1987 року західна адвокатура й
    канадські родинні зв''язки уможливили виїзд до Канади; повернення в Україну 2002 року.
  - >-
    Кінець шляху: смерть 21 травня 2004 року в Покровську (Донеччина), перепоховання у
    Львові 2024 року та посмертний орден «За мужність» (за ЕСУ).
  - >-
    [!decolonization] Мемуар як деколоніальне джерело й школа джерелознавства: він
    показує політв''язнів як організаторів спротиву, а не пасивних страдників.
  - >-
    Сучасне значення: біографія Шумука — взірцевий випадок для джерельної грамотності
    просунутих студентів, де неперевірене твердження лишається явно позначеним.
  section: 'Підсумок: Пам''ять про нескореного в''язня'
  words: 1000
focus: >-
  Данило Шумук як один із найдовше ув''язнених українських політв''язнів — життя крізь
  польські, нацистські й радянські табори, табірний спротив у Норильську, мемуар
  «Пережите й передумане» та джерелознавче читання багаторежимного досвіду репресій.
level: BIO
module: bio-258
objectives:
- >-
  Аналізувати життя Данила Шумука як багаторежимний досвід ув'язнення (польські,
  нацистські, радянські табори), уникаючи єдиного ідеологічного ярлика.
- >-
  Досліджувати механізми репресій кількох режимів через хронологію арештів, вироків і
  заслань від 1934 до 1987 року.
- >-
  Оцінювати мемуар «Пережите й передумане» як історичне джерело, порівнюючи першоособову
  реконструкцію з енциклопедичною хронологією.
- >-
  Застосовувати джерелознавчу обережність до неперевірених тверджень, явно позначаючи
  заяву «найдовший політв'язень» як таку, що не має підтвердженого порівняльного рейтингу.
