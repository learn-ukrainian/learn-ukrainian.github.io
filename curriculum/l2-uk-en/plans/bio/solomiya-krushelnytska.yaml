content_outline:
- points:
  - 'Парадокс: Як співачка з віддаленого куточка Австро-Угорщини стала рятівницею найвідомішого італійського композитора,
    а закінчила свої дні в радянській безвісті?'
  - '[!biography] Соломія Крушельницька — визнана однією з п''яти найвидатніших оперних зірок світу на початку XX століття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Повернення до Львова у 1939 році — це свідомий патріотичний вибір чи трагічна помилка, що коштувала їй кар''єри,
    свободи та майна?'
  - 'Дебат 2: Радянська міфологія vs. сучасна українська історіографія. Як СРСР намагався представити її «народною артисткою»,
    замовчуючи її світову славу та європейську ідентичність.'
  - '[!epistemic-humility] Чи можна однозначно оцінити її рішення, не знаючи всіх мотивів та не передбачаючи радянської окупації?'
  - '[!decolonization] Викриття радянської пропаганди, що применшувала її статус світової зірки, щоб вписати в рамки «локальної»
    культури.'
  section: 'Конфліктна карта: Зірка чи патріотка?'
  words: 900
- points:
  - 'Середовище: донька священика, оточення української інтелігенції Галичини.'
  - 'Освіта: Львівська консерваторія як трамплін, та вирішальне навчання техніці бельканто в Італії.'
  - 'Переломний момент: перші успіхи на італійських сценах, що довели її потенціал вийти за межі регіональної зірки.'
  - 'Формування унікального голосу: лірико-драматичне сопрано, здатне виконувати найрізноманітніший репертуар — від Вагнера
    до Верді.'
  section: 'Формування: Від галицької сцени до італійського бельканто'
  words: 1000
- points:
  - 'Легендарний виступ: як Крушельницька врятувала провалену прем''єру опери «Мадам Баттерфляй» Пуччіні в 1904 році, перетворивши
    її на світовий хіт.'
  - 'Вершина слави: контракти з найпрестижнішими театрами світу — Ла Скала, Паризька опера, Віденська опера.'
  - 'Первинні джерела: аналіз відгуків критиків та листів Пуччіні, що свідчать про її унікальний талант та акторську майстерність.'
  - 'Репертуарна політика: свідоме включення творів українських композиторів у свої міжнародні концерти.'
  section: 'Діяльність: Тріумф «Мадам Баттерфляй» та світове визнання'
  words: 1300
- points:
  - '[!anti-hagiography] Повернення до Львова у 1939 році, хоч і подавалось радянською пропагандою як щасливе возз''єднання
    з батьківщиною, стало для неї пасткою.'
  - 'Втрата всього: націоналізація її італійської вілли та банківських рахунків, неможливість виїхати за кордон.'
  - 'Тиск режиму: вимушена співпраця, викладання у консерваторії за новими ідеологічними лекалами, життя під постійним наглядом.'
  - '[!myth-buster] Розвінчання міфу про «щасливу радянську старість». Реалії життя світової зірки в комунальній квартирі
    та її боротьба за збереження власної гідності.'
  section: 'Тінь: Ціна повернення'
  words: 900
- points:
  - 'Повернення до розминки: студент тепер може сформулювати власну відповідь на питання про парадокс її долі.'
  - 'Оцінка спадщини: Крушельницька — це не просто оперна діва, а символ культурного потенціалу України на світовій арені.'
  - '[!decolonization] Її історія як аргумент проти російського наративу про «вторинність» української культури.'
  - 'Сучасна релевантність: Як її постать використовується сьогодні для культурної дипломатії України?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Життя та кар'єра Соломії Крушельницької, її легендарний порятунок опери Пуччіні «Мадам Баттерфляй», тінь її повернення
  до окупованого радянцями Львова та складна спадщина світової зірки й національного символу.
level: BIO
module: bio-074
objectives:
- Аналізувати біографію Соломії Крушельницької через призму анти-агіографії, розглядаючи її успіхи та трагічні компроміси
- Оцінювати ключові дебати навколо її спадщини, зокрема радянські спроби маніпуляції її образом
- Пояснювати історичний контекст її тріумфу з оперою «Мадам Баттерфляй» та її значення для світової музичної культури
- Критично аналізувати рішення про повернення до Львова та його фатальні наслідки в контексті її кар'єри та особистого життя
