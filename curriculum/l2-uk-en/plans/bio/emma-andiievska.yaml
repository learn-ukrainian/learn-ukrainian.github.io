content_outline:
- points:
  - '[!biography] Знайомство з Еммою Андієвською (нар. 1931): поетка, прозаїкиня й малярка, яка
    має окрему позицію щодо своєї належності до Нью-Йоркської групи.'
  - 'Провокаційне питання: як поетка, народжена в радянському Сталіно, якій удома перешкоджали
    говорити українською, зробила її центральною мовою власного модерністського письма?'
  - '[!myth-buster] Повідомлення УВУ від 17 березня 2026 року називає Андієвську
    ювіляркою напередодні 95-річчя й зазначає, що вона не зможе бути присутньою
    на анонсованому вечорі; це підтверджує життєвий статус на дату публікації.'
  section: Розминка
  words: 400
- points:
  - Народження 19 березня 1931 року в Сталіно (колишня Юзівка), нині Донецьк, в Українській СРР
    під радянською владою.
  - '[!anti-hagiography] Українські джерела пов''язують загибель батька з радянськими органами,
    але розходяться щодо року й обставин. Без архівного документа не слід називати точну установу,
    дату чи мотив без атрибуції.'
  - 1943 року мати виїхала з дітьми з радянської України; подальша європейська траєкторія привела
    родину до Мюнхена. Кожен проміжний пункт потребує окремого джерела.
  - 'Освіта в еміграції: закінчила Український вільний університет (УВУ) в Мюнхені (1957); від
    1961 року базувалася в Мюнхені, жила також у Нью-Йорку та Франції.'
  section: 'Формування: Донецьк, родинна втрата та вимушений виїзд'
  words: 1000
- points:
  - 'Дебютна збірка «Поезії» вийшла 1951 року. Довідки пов''язують Андієвську з Нью-Йоркською
    групою, однак у прямому інтерв''ю вона заперечує формальне членство; цю розбіжність не можна
    замінювати точною, але неперевіреною датою вступу.'
  - '[!decolonization] Попри російськомовне родинне середовище Андієвська свідомо зробила українську
    основною мовою літературної творчості. Це підтверджує її пряме інтерв''ю, але не виправдовує
    абсолютів про виняткову одномовність.'
  - 'Фірмова риса — авторські неологізми-новотвори: складні слова, яких немає в словнику, бо вона
    їх викувала. Це не помилки й не русизми, а творче словотворення; матеріал ідеальний для вивчення
    словотвору.'
  - '[!decolonization] Третя категорія — харківський правопис 1928 року (скрипниківка), яким активно
    послуговувалася діаспора й форми якого засвідчено в книжках Андієвської. Історичну норму не маркують як помилку, русизм чи неологізм.'
  - 'Строга форма проти ірраціонального змісту: сонет як контейнер для сюрреальних образів. Збірки:
    «Народження ідола» (1958), «Риба і розмір» (1961), «Наука про землю» (1975),
    «Межиріччя. Сонети» (1998).'
  section: 'Діяльність: Сюрреалізм, неологізми та сонет'
  words: 1200
- points:
  - '[!anti-hagiography] Гноблення тут має політичний і мовно-культурний виміри, однак суперечливі
    відомості про загибель батька подають тільки з атрибуцією, а не як архівно встановлений факт.'
  - 'Русифікація вдома: мати забороняла малій Еммі говорити українською, трактуючи російську як
    мову вищого статусу — домашнє відлуння імперської мовної ієрархії.'
  - 'Радянська видавнича система нормативно обмежувала модерністичний експеримент; конкретну історію
    публікації кожного твору перевіряють окремо, без контрфактичного абсолюту про весь доробок.'
  - '[!epistemic-humility] Донецьке походження й свідомий вибір української мови спростовують
    імперське уявлення про Донбас як природно російський простір; біографію не використовують
    замість аналізу конкретних історичних процесів.'
  section: 'Тінь: Мовна нерівність і межі модерністської поетики'
  words: 1600
- points:
  - '[!anti-hagiography] Спрощення, якого слід уникати: зведення Андієвської до типової представниці
    групи стирає її окрему позицію щодо членства, донецьке походження та самостійну мистецьку практику.'
  - Родинна втрата й вимушений виїзд не зводять творчість Андієвської до травматичного документа.
    Після 1991 року її книжки ширше входили в український обіг, а 2018 року авторку відзначено
    Шевченківською премією.
  - 'Кінцеве питання: як неологізми Андієвської вчать розрізняти творче словотворення й відхилення
    від норми — і як знання скрипниківки запобігає помилковому ярликуванню історичної правописної форми як
    «неправильної» української.'
  section: 'Підсумок: Поетка Донецька та Шевченківська премія'
  words: 1000
focus: Емма Андієвська як поетка й малярка із сюрреалістичною образністю, народжена в радянському
  Сталіно (нині Донецьк). Аналіз її свідомого вибору української мови, поетики неологізмів-новотворів та сонета як
  строгої форми для ірраціонального змісту.
level: BIO
module: bio-240
objectives:
- Аналізувати життєвий шлях Емми Андієвської від зрусифікованого Сталіно (нині Донецьк) до сюрреалістки
  Нью-Йоркської групи в еміграції.
- Пояснювати її свідомий вибір української літературної мови на підставі прямого інтерв'ю, не
  стираючи знання інших мов і не перетворюючи Донбас на імперську периферію.
- 'Критично розрізняти три категорії в текстах Андієвської: авторський неологізм-новотвір, форму харківського
  правопису 1928 року (скрипниківку) та справжню мовну помилку чи русизм.'
- Досліджувати, чому радянський соцреалізм унеможливлював її сюрреалістичну, сонетну поезію, і
  як її біографія спростовує російські претензії на Донбас.
