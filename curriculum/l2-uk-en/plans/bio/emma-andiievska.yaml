objectives:
- Аналізувати життєвий шлях Емми Андієвської від зрусифікованого Сталіно (нині Донецьк) до сюрреалістки
  Нью-Йоркської групи в еміграції.
- Пояснювати її свідомий вибір української мови як «мови моєї душі» всупереч домашній русифікації
  — як акт деколонізації власної ідентичності.
- Критично оцінювати її поетику неологізмів-новотворів і відрізняти творче словотворення від мовної
  помилки чи русизму за допомогою знання кодифікованої норми.
- Досліджувати, чому радянський соцреалізм унеможливлював її сюрреалістичну, сонетну поезію, і
  як її біографія спростовує російські претензії на Донбас.
