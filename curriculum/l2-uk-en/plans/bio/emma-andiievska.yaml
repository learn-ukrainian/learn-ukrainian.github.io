content_outline:
- points:
  - '[!biography] Знайомство з Еммою Андієвською (нар. 1931): поетка й малярка-сюрреалістка Нью-Йоркської
    групи, авторка тисяч віршів і полотен.'
  - 'Провокаційне питання: як поетка, народжена в зрусифікованому Сталіно, чию рідну мову забороняли
    вдома, стала однією з найукраїнськіших голосів XX століття?'
  - '[!myth-buster] Спростування хибної дати: Андієвська жива — відсвяткувала 95-річчя 19 березня
    2026 року; жодне авторитетне джерело не подає дати смерті.'
  section: Розминка
  words: 400
- points:
  - Народження 19 березня 1931 року в Сталіно (колишня Юзівка), нині Донецьк, в Українській СРР
    під радянською владою.
  - '[!anti-hagiography] Батька, хіміка-винахідника Івана Андієвського, 1941 року розстріляли
    радянські органи держбезпеки (НКВС) — за однією з версій, щоб його винаходи не дісталися німцям
    при відступі.'
  - Щоб урятувати дітей, мати втекла з родиною з радянської України 1943 року (Еммі було дванадцять);
    шлях проліг через табір для переміщених осіб у Міттенвальді (1949) до Мюнхена.
  - 'Освіта в еміграції: закінчила Український вільний університет (УВУ) в Мюнхені (1957); від
    1961 року базувалася в Мюнхені, жила також у Нью-Йорку та Франції.'
  section: 'Формування: Донецьк, розстріляний батько та втеча'
  words: 1000
- points:
  - 'Дебютна збірка «Поезії» (Ной-Ульм, 1951); входження до Нью-Йоркської групи 1957 року. Поетика
    сюрреалізму: «вірші-сни», химерний бестіарій, спільний для її малярства й поезії.'
  - '[!decolonization] Мовний знак спротиву: попри домашню русифікацію Андієвська свідомо обрала
    українську й назвала її «мовою моєї душі», пишучи нею понад дев''ять десятиліть.'
  - 'Фірмова риса — авторські неологізми-новотвори: складні слова, яких немає в словнику, бо вона
    їх викувала. Це не помилки й не русизми, а творче словотворення; матеріал ідеальний для вивчення
    словотвору.'
  - 'Строга форма проти ірраціонального змісту: сонет як контейнер для сюрреальних образів. Збірки:
    «Народження ідола» (1958), «Риба і розмір» (1961) з літературною містифікацією вигаданих поетів,
    «Наука про землю» (1975), «Межиріччя. Сонети» (1998).'
  section: 'Діяльність: Сюрреалізм, неологізми та сонет'
  words: 1200
- points:
  - '[!anti-hagiography] Гноблення тут має два шари — і обидва названо точно, без евфемізмів:
    фізичне (розстріл батька 1941 року) і мовно-культурне.'
  - 'Русифікація вдома: мати забороняла малій Еммі говорити українською, трактуючи російську як
    мову вищого статусу — домашнє відлуння імперської мовної ієрархії.'
  - 'Заборона поетики: її сюрреалістичний, неологізмами насичений вірш був категорично непублікований
    за соцреалізму; цілий доробок міг існувати лише в діаспорі.'
  - '[!epistemic-humility] Сучасний контекст: російські наративи оголошують Донецьк «російським».
    Андієвська — народжена в Сталіно, із розстріляним радянцями батьком, довічна україномовна
    авторка — пряме спростування цих претензій; її біографію активно залучають до української
    культурної оборони Донбасу.'
  section: 'Тінь: Русифікація вдома та заборонена поетика'
  words: 1600
- points:
  - '[!anti-hagiography] Спрощення, якого слід уникати: зведення Андієвської до «сюрреалістки
    групи» стирає її донецьке коріння й свідомий, біографічно вистражданий вибір української мови.'
  - Те, що батькове життя й науковий архів забрала система, — втрачене; але один із найбільших
    модерністських доробків XX століття вцілів, бо постав поза досяжністю режиму. Після 1991 року
    творчість повернулася в Україну, а 2018 року авторку відзначено Шевченківською премією.
  - 'Кінцеве питання: як неологізми Андієвської вчать розрізняти творче словотворення й відхилення
    від норми — і чому це питання треба розв''язувати зі знанням кодифікованої норми, а не ярликом
    «неправильної» української.'
  section: 'Підсумок: Поетка Донецька та Шевченківська премія'
  words: 1000
focus: Емма Андієвська як сюрреалістка Нью-Йоркської групи, поетка й малярка, народжена в зрусифікованому
  Сталіно (нині Донецьк), чий батько був розстріляний радянськими органами 1941 року. Аналіз її
  свідомого вибору української як «мови моєї душі», поетики неологізмів-новотворів та сонета як
  строгої форми для ірраціонального змісту.
