content_outline:
- points:
  - 'Провокація: як зробити українську мову публічною, коли школи, книжки й навіть правнича освіта під підозрою — і чому «Молитва за Україну» лише двері до ширшої біографії громадівця?'
  - '[!biography] Знайомство з постаттю письменника, педагога, правника й видавця: діяч Полтавської та Київської громад, ініціатор Товариства ім. Шевченка й НТШ, засновник видавництва «Вік», автор слів «Боже великий, єдиний» / «Молитва за Україну».'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (інституційна вага): історичний слід Кониського — школи, громади, правнича адвокатура, видавництво «Вік», НТШ і Шевченкова біографія, а не лише список поезій.'
  - 'Позиція 2 (соборницька праця, не одноосібність): Кониський був ключовим ініціатором Товариства ім. Шевченка (1873) і його перетворення на НТШ (1892-1893), але поряд — Антонович, галицькі науковці, видавці й донори.'
  - '[!decolonization] Механізм тиску — імперське обмеження української освіти й друку: недільні школи, «Українські прописи», арифметика й читанки були не благодійністю, а інфраструктурою, яку цензура й поліція брали на підозру.'
  - '[!epistemic-humility] Дату смерті тримаємо як 12 грудня 1900 року (ЕІУ/ЕСУ; IEU дає 11 грудня); перетворення НТШ — «1892-1893» (адоптація статуту 13 березня 1892, затвердження 16 листопада 1892; ЕСУ-біографія — 1893).'
  section: 'Конфліктна карта: Автор гімну чи будівничий інституцій?'
  words: 900
- points:
  - 'Походження й освіта: 18 серпня 1836 року, хутір Переходівка (нині Чернігівщина); з 1854 року служба в нижчих канцеляріях Полтавської кримінальної палати, екстерном склав іспити на кандидата права й після реформи 1861 року боронив інтереси звільнених селян.'
  - 'Громада й школи: член Полтавської та Київської громад, організатор недільних і вечірніх шкіл, публічних бібліотек і товариств грамотності; за УІНП, особисто викладав історію в п''ятьох полтавських недільних школах.'
  - '[!decolonization] Освітнє видавництво «Українські прописи» (1862), «Арихметика, або Щотниця» (1863) і шкільні читанки читаємо як громадянську інфраструктуру, а правничий буквар для селян був заблокований цензурою — знання українською вважали небезпечним.'
  section: 'Формування: Полтавська громада, право й недільні школи'
  words: 1000
- points:
  - 'Заслання й повернення: у січні 1863 року арешт за підозрою в антиурядовій діяльності й позасудове заслання до Вологди, потім Тотьми; від 1866 року — знову в Україні (зокрема Катеринослав) під гласним наглядом поліції, з 1872 року — у Києві.'
  - 'Галичина як обхід: зв''язки з галицькими часописами й Товариством ім. Шевченка — крос-імперська стратегія; «Луна» (1881), співвидана з Лукою Ільницьким, — перше українське видання в підросійській Україні після Емського указу.'
  - '«Вік» (1895) і НТШ (1892-1893): київське видавництво «Вік» пов''язало Кониського з молодшим поколінням (Доманицький, Єфремов, Лотоцький та інші); перетворення Товариства ім. Шевченка на наукову інституцію — головний інституційний слід.'
  - '«Тарас Шевченко-Грушівський: Хроніка його життя»: том 1 — Львів, 1898, том 2 — посмертно 1901; фундаментальна біографія-хроніка, зібрана з мемуарів, рукописів, листів і документів.'
  - '[!decolonization] «Молитва за Україну» / «Боже великий, єдиний» (1885): слова Кониського, музика Миколи Лисенка, пізніша обробка Олександра Кошиця — духовний гімн, а не державний; шари слів, музики й обробки тримаємо окремо.'
  section: 'Діяльність: «Луна», «Вік», НТШ і Шевченкова біографія'
  words: 1300
- points:
  - '[!anti-hagiography] Частина прози Кониського відверто дидактична й програмна — це історично промовисто, а не автоматично «слабко» чи «сильно» естетично; громадянську вагу не перетворюємо на суцільну похвалу.'
  - 'Межі біографії Шевченка: «Хроніка» фундаментальна й джерельно багата, але відбиває методи кінця XIX століття й національно-педагогічну програму автора; уживати поряд із пізнішими критичними виданнями.'
  - '[!epistemic-humility] Гімн-застереження: «Боже великий, єдиний» / «Молитва за Україну» називаємо духовним гімном, а не державним; не приписуємо йому статусу «Ще не вмерла України».'
  - '[!decolonization] Радянське забуття: від кінця 1920-х до 1980-х творів Кониського заборонено, а його таврували як націоналіста; це окремий шар тиску, який не сплощує імперського тиску XIX століття в радянську політику.'
  section: 'Тінь: Дидактика, межі Шевченкової біографії й радянське забуття'
  words: 900
- points:
  - 'Повернення до розминки: чому базова грамотність, право й видавництво — це громадянська інфраструктура, а не другорядність поряд із гімном?'
  - 'Крос-імперська мережа: Полтава, Катеринослав і Київ разом зі Львовом, Галичиною й Буковиною показують, як українське публічне життя рухалося навколо цензурних кордонів.'
  - '[!anti-hagiography] Кониський важливий у розбудові НТШ і «Віку», але не діяв сам: поряд Антонович, Барвінський і галицькі науковці; НТШ він не заснував одноосібно.'
  - '[!decolonization] Джерельна історія «Молитви за Україну» відділяє слова Кониського, музику Лисенка й обробку Кошиця; порівняння з долею Чубинського показує спільну добу громадівської праці, заслання й пісенних джерел.'
  section: 'Дискусія та підсумок: Інституції по обидва боки кордону'
  words: 700
focus: 'Oleksandr Konyskyi (1836-1900) as a Ukrainian civic organizer, educator, lawyer, publisher, Shevchenko biographer and initiator of the Shevchenko Society/NTSh who turned Ukrainian civic work into schools, books, legal self-defense, cross-imperial Galician partnerships and scholarly institutions under Russian restriction: the 1863 extra-judicial exile to Vologda and Totma named as an administrative tool, Galicia read as a workaround rather than free space, the ''Molytva za Ukrainu'' hymn kept as one anchor (not the state anthem, words by Konyskyi and music by Lysenko), the ''Taras Shevchenko-Hrushivskyi'' chronicle treated as foundational-but-datable source work, and Soviet suppression named without flattening imperial pressure into it.'
level: BIO
module: bio-356
objectives:
- Пояснювати Кониського як громадського організатора, педагога, правника й видавця, а не лише «автора «Молитви за Україну»».
- 'Тримати «Товариство ім. Шевченка» й НТШ як інституцію, а не оздобу: Кониський був ініціатором заснування (1873) і наукового перетворення (1892-1893), але не єдиним засновником.'
- 'Називати механізм тиску конкретно: позасудове заслання 1863 року до Вологди й Тотьми, нагляд поліції, цензура шкільних і правничих текстів, а згодом радянське забуття.'
- Читати Галичину як обхід імперських обмежень, а не як вільний простір; «Луна» (1881) — перше українське видання в підросійській Україні після Емського указу.
- Тримати «Молитву за Україну» як духовний гімн (слова Кониського, музика Лисенка), а не державний гімн, і не сплощувати різні джерельні шари.
