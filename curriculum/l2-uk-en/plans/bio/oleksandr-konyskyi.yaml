content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому людину, що написала «Молитву за Україну», заслали без
          суду, а її рукописи назавжди зникли під час обшуку?
      - >-
          [!biography] Олександр Кониський - письменник, видавець, педагог і
          громадський діяч, фундатор Наукового товариства ім. Шевченка і автор
          «Молитви за Україну».
      - >-
          Походження і освіта: давній чернігівський рід, дитинство в Ніжині,
          початок друку 1858 року, недільні школи і підручники.
      - >-
          Громадська праця: київська Громада, обстоювання української мови в
          школах, теорія «малих діл».
    section: 'Формування: Чернігівщина, Громада і недільні школи'
    words: 1000
  - points:
      - >-
          Інституційна спадщина: співзасновник Літературного товариства ім.
          Шевченка (1873), ініціатор його перетворення на НТШ.
      - >-
          Видавництво «Вік» у Києві: понад 100 українських книжок за 15 років;
          редагування перших «Записок НТШ».
      - >-
          Двотомна біографія Шевченка «Тарас Шевченко-Грушівський: Хроніка його
          життя» (1898-1901) - перша ґрунтовна, високо оцінена Франком.
      - >-
          [!decolonization] Не зводити Кониського лише до автора гімну:
          навчальний фокус - розбудова української наукової і видавничої
          інфраструктури.
    section: 'Діяльність: НТШ, «Вік» і біографія Шевченка'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
    points:
      - >-
          Механізм тиску називати прямо: заслання до Вологди 1863 року без
          слідства і суду за звинуваченням у «малоросійській пропаганді».
      - >-
          Обшук 1871 року: російська поліція забрала і назавжди втратила роман,
          поеми, близько 20 тисяч слів для словника і збірку прислів'їв.
      - >-
          [!anti-hagiography] Радянська заборона творів від кінця 1920-х і
          ярлик «націоналіст»; часткова реабілітація лише у 1980-х.
    section: 'Контекст: Заслання, конфіскація і радянська заборона'
    words: 1000
  - points:
      - >-
          «Молитва за Україну» в українській культурній пам'яті: духовно-
          громадянський гімн на музику Миколи Лисенка.
      - >-
          Сучасна пам'ять: вулиці в багатьох містах, збереження спадщини в
          Інституті літератури і Національній бібліотеці, пам'ятна дошка в Боярці.
      - >-
          Чому важливо памʼятати фундатора НТШ, а не лише рядок гімну.
    section: "Сучасна пам'ять: Гімн, наука і вшанування"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як громадянська і видавнича праця під імперським
          тиском заклала українську наукову інституцію.
      - >-
          Аргументована відповідь: що робить Кониського важливим - гімн,
          біографія Шевченка, НТШ, «Вік» чи стійкість у репресіях.
      - >-
          Фінальне письмо: Кониський як приклад інституційної розбудови всупереч
          забороні.
    section: "Дискусія та підсумок: Інституція всупереч репресіям"
    words: 800
focus: >-
  Oleksandr Konyskyi as writer, publisher, and civic organiser: founder of the
  Наукове товариство ім. Шевченка and the «Вік» publishing house, author of the
  first major Shevchenko biography and of «Молитва за Україну», twice repressed
  by the Russian Empire and later banned by the Soviet state, taught through
  institution-building and resistance.
level: BIO
module: bio-334
objectives:
  - >-
      Аналізувати життя і працю Олександра Кониського в контексті української
      науки, видавництва і громадянського руху, уникаючи агіографії
  - >-
      Пояснювати роль Кониського у заснуванні НТШ, видавництва «Вік» і
      написанні першої біографії Шевченка
  - >-
      Пояснювати механізм репресій: заслання 1863 року, конфіскація рукописів
      1871 року і радянська заборона
  - >-
      Формулювати аргументовану позицію щодо ролі Кониського як будівничого
      української інституції
