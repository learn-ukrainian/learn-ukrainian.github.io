content_outline:
- points:
  - 'Парадокс: Як голос однієї людини — Миколи Погрібного — став абсолютним еталоном для цілої нації? І що відбувається, коли
    цей еталон починають вважати застарілим?'
  - 'Провокація: Чи може боротьба за "чистоту мови" зашкодити її живому розвитку?'
  - '[!biography] Микола Погрібний (1931-2003) — легендарний диктор Українського радіо, чия вимова на десятиліття визначила
    норми українського ефіру.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була діяльність Погрібного необхідним захистом мови в умовах русифікації, чи надмірним пуризмом, що віддаляв
    ефірну мову від народної?'
  - 'Дебат 2: Чи є "еталон Погрібного" актуальним сьогодні, в епоху децентралізованих медіа та визнання цінності регіональних
    діалектів? Чи це — релікт радянської централізації?'
  - '[!epistemic-humility] Позиція 1: Погрібний — рятівник, що зберіг високий стандарт мови. Позиція 2: Погрібний — творець
    штучної, "кабінетної" мови.'
  - '[!decolonization] Діяльність Погрібного як форма тихого опору мовній політиці СРСР — утвердження високого, окремого від
    російського, стандарту української мови.'
  section: 'Конфліктна карта: Охоронець чи пурист?'
  words: 900
- points:
  - Походження з Полтавщини — регіону, який вважається колискою української літературної мови.
  - Навчання в Київському університеті та формування мовної свідомості.
  - 'Прихід на Українське радіо у 1950-х: історичний та політичний контекст "відлиги".'
  - 'Ранні роки роботи: як молодий диктор став центральною фігурою головного рупора країни.'
  section: 'Формування: Народження голосу'
  words: 1000
- points:
  - 'Робота диктором: не просто читання новин, а створення звукового образу епохи.'
  - 'Редакторська робота: практична боротьба з русизмами, суржиком та канцеляризмами в прямому ефірі.'
  - 'Створення "орфоепічної школи": розробка методичних посібників, консультації з мовознавцями (О. Пономарів), навчання поколінь
    дикторів.'
  - 'Первинні джерела: аналіз фрагментів записів Погрібного — інтонація, наголоси, дикція.'
  section: 'Діяльність: Еталон українського ефіру'
  words: 1300
- points:
  - '[!anti-hagiography] Критика пуризму: чи не призвела боротьба за "чистоту" до збіднення мови, вилучення живих, хоч і "неправильних"
    елементів?'
  - 'Маргіналізація діалектів: як єдиний києво-полтавський стандарт вплинув на сприйняття інших регіональних вимов?'
  - '[!myth-buster] Міф про "безпомилковість": аналіз випадків, коли норми, які відстоював Погрібний, згодом змінилися.'
  - 'Людський фактор: спогади колег про Погрібного як вимогливого, а іноді й жорсткого редактора. Якою ціною досягався ідеал?'
  section: 'Тінь: Ціна еталону'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Погрібний — охоронцем скарбу чи його тюремником? Студент формулює власну відповідь.'
  - 'Спадщина в незалежній Україні: як досвід Погрібного був (і не був) використаний після 1991 року.'
  - '[!decolonization] Погрібний як символ мовного суверенітету. Його спадщина — це доказ того, що українська мова мала свій
    високий стандарт навіть в умовах радянського тиску.'
  - 'Сучасна актуальність: чи потрібен Україні новий "колективний Погрібний" в епоху фейків та інформаційних війн?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Mykola Pohribnyi, his role in establishing the standard for Ukrainian broadcast pronunciation, the debate
  around linguistic purism, and his legacy in post-Soviet Ukraine.
level: BIO
module: bio-133
objectives:
- Аналізувати життя та спадщину Миколи Погрібного, враховуючи конфліктні інтерпретації його ролі.
- Оцінювати внесок Погрібного у формування еталону українського радіомовлення як інструменту деколонізації.
- Критично розглядати концепцію "мовної норми" та її еволюцію від радянських часів до сьогодення на прикладі "школи Погрібного".
- Формулювати власну позицію щодо актуальності єдиного орфоепічного стандарту в сучасному українському медіапросторі.
