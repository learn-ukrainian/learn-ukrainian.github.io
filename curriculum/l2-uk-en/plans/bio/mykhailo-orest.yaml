content_outline:
- points:
  - >-
    [!biography] Знайомство з Михайлом Орестом: поет-неокласик, перекладач,
    молодший брат Миколи Зерова і редактор спадщини розстріляного неокласичного
    кола.
  - >-
    Провокаційне питання: як оцінити автора, чия власна поезія довго стояла в
    тіні брата, але саме його редакторська праця допомогла врятувати братову
    спадщину?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: народження 14 (27) листопада 1901 року в Зінькові, тоді
    Полтавська губернія; син Костянтина Іракійовича Зерова і Марії Яківни
    Яресько.
  - >-
    Родинний контекст: брат Миколи Зерова, провідного київського неокласика,
    літературознавця і перекладача, розстріляного НКВС 1937 року; також брат
    ботаніка-академіка Дмитра Зерова і Костянтина Зерова.
  - >-
    Освіта: Кролевецька і Зіньківська гімназії, Київський інститут народної
    освіти 1924-1928 років; формування в орбіті українського неокласицизму.
  - >-
    [!decolonization] Псевдонім "Михайло Орест" не приховує українську
    ідентичність Зерових; досьє прямо застерігає від російсько-імперських
    форм і від спроб розмити українськість родини.
  section: 'Формування: Зіньків, КІНО і тінь Зерова'
  words: 1000
- points:
  - >-
    Власна поезія: "Луни літ" 1944 року, "Душа і доля" 1946 року, "Держава
    слова" 1952 року, "Гість і господа" 1952 року і посмертні "Пізні вруна"
    1965 року.
  - >-
    Поетика лісу і слова: строга форма, неокласична стриманість, піднесена
    природна лексика, мотив "магії слів" і ліс як сакральний образ тривалості
    після катастрофи.
  - >-
    Перекладацька праця: Штефан Ґеорґе, Райнер Марія Рільке, Гуґо фон
    Гофмансталь, Макс Даутендай, німецька й французька поезія у збірках 1950-х
    років.
  - >-
    Відновлення спадщини Миколи Зерова: "Sonnetarium" 1948 року, "Catalepton"
    1952 року, "Corollarium" 1958 року, підготовка поезій Павла Филиповича
    і редакторська робота над "Безсмертними" 1963 року.
  section: 'Діяльність: Держава слова і неокласична спадкоємність'
  words: 1200
- points:
  - >-
    Перший арешт: улітку 1929 року в Києві; дев'ять місяців у Лук'янівській
    в'язниці, де слідчі тиснули на нього, щоб отримати свідчення проти Миколи
    Зерова.
  - >-
    Другий арешт: ніч 9-10 червня 1938 року, обвинувачення в "антирадянській
    агітації", конфіскація рукописів і перекладів, вирок до виправно-трудових
    таборів.
  - >-
    [!myth-buster] Фраза "антирадянська агітація" є радянським обвинуваченням,
    а не описом провини; драматичні популярні перекази про катування й порятунок
    досьє позначає як попередні та одно-джерельні.
  - >-
    Вимушена еміграція: після перебування у Вінниці під час німецького вторгнення
    і у Львові до 1944 року Орест утік на Захід перед радянською реокупацією,
    а не "звільненням", бо вже мав досвід арештів НКВС і втрату брата.
  - >-
    Втрата й реконструкція: рукописи 1938 року були вилучені й переважно
    втрачені; пізніше він відновлював частину поезій з пам'яті.
  section: 'Тінь: Арешти НКВС, табори і втрачені рукописи'
  words: 1600
- points:
  - >-
    Інституційна праця: 1957 року разом із Володимиром Державином заснував
    Інститут літератури при Українському вільному університеті в Мюнхені, який
    згодом назвали іменем Михайла Ореста.
  - >-
    Смерть і повернення: помер 12 березня 1963 року в Аугсбурзі від серцевого
    нападу; 29 червня 1994 року перепохований у Києві.
  - >-
    Рецепційна проблема: чи є він самостійним поетом або передусім охоронцем
    Зерової спадщини; досьє вимагає бачити обидва виміри.
  - >-
    Підсумкове питання: як архівна, перекладацька й редакторська робота
    перетворюється на культурний захист після розстрілу покоління?
  section: 'Підсумок: Архівіст розстріляного неокласицизму'
  words: 1000
focus: >-
  Михайло Орест як поет неокласичної спадкоємності, перекладач німецької та
  французької поезії, двічі арештований НКВС брат Миколи Зерова і редактор,
  який у вигнанні відновлював власні втрачені тексти та спадщину розстріляного
  неокласичного кола.
