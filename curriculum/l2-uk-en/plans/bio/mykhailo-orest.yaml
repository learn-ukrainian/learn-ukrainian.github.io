objectives:
- Аналізувати Михайла Ореста як самостійного поета і як редактора спадщини Миколи Зерова.
- Пояснювати два арешти НКВС, конфіскацію рукописів і вимушену еміграцію перед радянською реокупацією.
- Розуміти його перекладацьку працю й неокласичну поетику лісу, форми і "магії слів".
- Оцінювати редакторське збереження "Sonnetarium", "Catalepton", "Corollarium" і "Безсмертних" як деколоніальну пам'ять.
