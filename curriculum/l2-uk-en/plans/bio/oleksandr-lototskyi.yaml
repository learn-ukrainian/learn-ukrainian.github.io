- 'Аналізувати автокефалію як правову й дипломатичну працю: закон 1 січня 1919 року та місію до Царгорода, а не лише декларацію'
- Утримувати антиагіографію: центральність постаті разом із тим, що місія 1919 року не здобула негайного визнання й що церкву будував не він один
- Розрізняти церковну вокабулу (автокефалія, автономія, собор, Вселенський патріархат) і не змішувати закон 1919 року з пізнішими подіями
