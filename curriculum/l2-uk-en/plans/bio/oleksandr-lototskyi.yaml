content_outline:
- points:
  - 'Провокація: як людина, що зробила фахову канцелярську й контрольну кар''єру всередині ворожої імперської системи, стала будівничим української держави й дипломатом церковної незалежності? Адміністративна грамотність — теж інструмент державотворення.'
  - '[!biography] Знайомство з постаттю письменника, публіциста, знавця церковного права й дипломата: генеральний писар, державний контролер УНР, міністр віросповідань і посланник до Царгорода.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (цивільний державотворець): Лотоцький показує, що державну спроможність будували не лише збройним командуванням, а й діловодством, контролем, фінансами й правом.'
  - 'Позиція 2 (деколонізаційна): автокефалія — це не гасло, а правова, канонічна й дипломатична праця, що кидала виклик московським церковним претензіям; закон 1 січня 1919 року пов''язав церковне самоврядування з державністю.'
  - '[!decolonization] Публікаційну працю (видавництво «Вік», оборона українського друку від імперської цензури) читаємо як інфраструктуру нації, а не як «російську ліберальну реформу».'
  - '[!epistemic-humility] Романізацію імені (проєктне «Oleksandr Lototskyi», джерельне «Oleksander Lototsky») і стиль дати народження (9(21) березня 1870) подаємо з позначками, а не як єдиний факт.'
  section: 'Конфліктна карта: Канцелярист чи будівничий держави?'
  words: 900
- points:
  - 'Походження й освіта: 9(21) березня 1870 року, Брониця (нині Вінниччина), у священничій родині; подільська, тифліська та київська духовна освіта, кандидат богослов''я Київської духовної академії (1896).'
  - 'Публікаційна й громадська формація: співзасновник видавництва «Вік» (1894), участь у наукових, періодичних і петербурзьких громадських мережах; за УІНП — оборона українського друку від цензури.'
  - 'Імперська державна служба: праця в державному контролі в Києві та Санкт-Петербурзі, де він здобув адміністративний досвід, підтримуючи українські думські клуби, пресу й культурні інституції.'
  section: 'Формування: Видавець, урядовець і знавець церковного права'
  words: 1000
- points:
  - '1917 рік: голова Української національної ради в Петрограді, діяч Центральної Ради, генеральний писар / генеральний секретар у Генеральному секретаріаті — місток між українськими мережами імперської столиці й київськими інституціями.'
  - '1918 рік: державний контролер УНР навесні (небойова модель державності — бюджети, аудит, підзвітність) і міністр віросповідань за Української Держави восени.'
  - 'Автокефалія: за ЕСУ, Лотоцький ініціював закон Директорії від 1 січня 1919 року про верховну владу в Українській автокефальній православній церкві.'
  - '1919–1920 роки: голова дипломатичної місії УНР у Царгороді (Стамбулі), що домагалася визнання української автокефалії Вселенським патріархатом.'
  section: 'Діяльність: Державний контроль, автокефалія й місія до Царгорода'
  words: 1300
- points:
  - '[!anti-hagiography] Місія 1919 року не здобула негайного патріаршого визнання — поразка під тиском не робить постать менш центральною, але й не дає перетворити її на історію тріумфу.'
  - '[!epistemic-humility] Церковну вокабулу розрізняємо: автокефалія, автономія, собор, Вселенський патріархат, московські претензії; не змішуємо закон 1919 року з пізнішими подіями церковної незалежності.'
  - 'Царгородський контекст: Вселенський патріархат діяв під тиском грецько-турецького конфлікту й повоєнної нестабільності — це пояснює, чому переговори стрягли, а не «зрада» чи «невдача особи».'
  - '[!decolonization] Празьку та варшавську наукову працю (Український вільний університет, Український науковий інститут у Варшаві) подаємо як інституційну тяглість, а не як пасивну «загробну» еміграцію.'
  section: 'Тінь: Місія, що не здобула визнання'
  words: 900
- points:
  - 'Повернення до розминки: чому адміністративну вправність (діловодство, контроль, право) варто вчити як реальну державну спроможність, а не як «канцелярську» другорядність?'
  - 'Автокефалія як право й дипломатія: пара «закон 1 січня 1919 року + місія до Царгорода» показує, що церковна незалежність потребувала документів, урядів і міжнародного визнання, а не лише декларації.'
  - '[!anti-hagiography] Лотоцький важливий у державній церковній політиці, але Українська автокефальна православна церква не була створена ним одноосібно; поряд — Василь Липківський, Іван Огієнко, Володимир Чехівський.'
  - 'Пам''ять і джерела: мемуари «Сторінки минулого» та праця «В Царгороді» — це свідчення з контекстом, а не всезнаюче оповідання; 1971 року Лотоцького перепоховали в Бавнд-Бруку (Нью-Джерсі).'
  section: 'Дискусія та підсумок: Держава, церква й еміграція'
  words: 700
focus: Oleksandr Lototskyi (1870-1939) as a civic-administrative state-builder, canon-law scholar, and diplomat whose skill in publishing, state control, and church law drove Ukrainian institution-building, taught so that administrative capacity is read as statehood rather than clerical detail; the 1 January 1919 autocephaly law and the 1919-1920 Constantinople mission are held together as law-plus-diplomacy, the mission's failure to win immediate recognition is kept visible as anti-hagiography, and the Prague/Warsaw emigration work is treated as institutional continuity, not passive exile.
