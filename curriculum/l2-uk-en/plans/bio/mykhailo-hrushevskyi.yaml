content_outline:
- points:
  - 'Провокація: Як «батько нації» та творець її історії міг повернутися до Радянської України, де ця історія систематично
    нищилась? Це був зважений компроміс, трагічна помилка чи державна зрада?'
  - '[!biography] Михайло Грушевський — постать, що досі викликає запеклі суперечки, попри місце на 50-гривневій банкноті.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Схема Грушевського — це об''єктивна наука чи політичний наратив? Противники звинувачували його в штучному «виокремленні»
    української історії від «общерусской».'
  - 'Дебат 2: Політична наївність чи далекоглядний прагматизм? Його ідеї федералізму з демократичною Росією зазнали краху.
    Чи був він надто великим ідеалістом для своєї епохи?'
  - '[!epistemic-humility] Оцінки його політичної діяльності коливаються від «батька-засновника» до «професора, що втратив
    державу».'
  - '[!decolonization] Його праці стали головною зброєю проти російської імперської концепції «триєдиного народу», довівши
    безперервність української традиції від Київської Русі.'
  section: 'Конфліктна карта: Історик vs Політик'
  words: 900
- points:
  - Народження в Холмі, на кордоні світів, що визначило його чутливість до національного питання.
  - Навчання в Київському університеті під керівництвом Володимира Антоновича, ключової постаті українського руху в Російській
    імперії.
  - 'Переїзд до австрійського Львова як поворотний момент: тут він перетворює Наукове товариство ім. Шевченка на неофіційну
    українську академію наук.'
  - Формування концепції окремішності української історії як противаги і польським, і російським імперським наративам.
  section: 'Формування: Від Холма до Львова'
  words: 1000
- points:
  - «Історія України-Руси» — головна праця життя, десятитомний magnum opus, що надав українцям їхню власну історію.
  - Лютнева революція 1917 року кидає Грушевського з кабінету вченого в епіцентр політики. Його обирають головою Центральної
    Ради.
  - 'Чотири Універсали: еволюція від вимоги автономії у складі федеративної Росії до проголошення повної незалежності УНР.'
  - Грушевський як символ і голос української революції, що головує над створенням першої сучасної української держави.
  section: 'Діяльність: Створення нації на папері та в реальності'
  words: 1300
- points:
  - '[!anti-hagiography] Захоплення соціалістичними ідеями та догматичне дотримання принципу федералізму завадили своєчасному
    створенню боєздатної армії.'
  - '[!myth-buster] Грушевський не був «президентом» у сучасному розумінні; він був головою парламенту. Міф про президентство
    — це спроба ретроспективно надати йому більшої ваги.'
  - Рішення повернутися в Радянську Україну в 1924 році. Чи вірив він у «українізацію», чи це була спроба врятувати наукову
    спадщину ціною компромісу з режимом?
  - 'Трагічний фінал: робота в ВУАН під постійним наглядом, репресії проти учнів та родини, загадкова смерть у Кисловодську.'
  section: 'Тінь: Федералізм, компроміси та повернення'
  words: 900
- points:
  - 'Повернення до розминки: то був компроміс, помилка чи зрада? Студент має сформулювати власну відповідь.'
  - 'Спадщина історика перемогла спадщину політика: його схема історії є каноном, а його політичний проект (УНР) зазнав поразки.'
  - '[!decolonization] Незважаючи на особисту трагедію, його інтелектуальна праця заклала підвалини, на яких Україна відновила
    незалежність у 1991 році.'
  - Грушевський на банкноті — це пам'ять про велич і трагедію вченого, який взяв на себе відповідальність за долю нації в
    переломний момент.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Hrushevskyi's transformation from scholar to statesman, the tension between his federalist ideals and the demand for
  independence, and the tragic ambiguity of his return to Soviet Ukraine
level: BIO
module: bio-065
objectives:
- Критично оцінювати роль Михайла Грушевського як історика та як політика, розрізняючи ці дві іпостасі
- Аналізувати ключові ідеї (схема історії, федералізм) та їхній вплив на долю України
- Пояснювати причини та наслідки трагічного рішення Грушевського про повернення до Радянської України
- Формулювати аргументовану позицію щодо складних моральних та політичних виборів історичних діячів
