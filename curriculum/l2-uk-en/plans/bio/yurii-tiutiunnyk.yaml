content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Тютюнником: генерал-хорунжий Армії УНР, один з ключових
    організаторів повстанських операцій під час Української революції. Народився 20 квітня
    1891 року на Черкащині.
  - >-
    Провокаційне питання: як військовий лідер, який воював проти більшовиків, опинився у
    радянському пропагандистському кіно в ролі самого себе?
  section: Розминка
  words: 400
- points:
  - >-
    Участь в Армії УНР: від формування революційних підрозділів до командування в
    Зимових походах. Тютюнник як символ збройної антибільшовицької боротьби.
  - >-
    Організація повстанського штабу та спроби підняти масове повстання в Україні.
  - >-
    [!decolonization] Осмислення терміну "отаман" та військових звань УНР без радянських
    стереотипів про "бандитизм". Тютюнник діяв як регулярний військовий діяч Української держави.
  section: 'Діяльність: Зимові походи та повстанський штаб'
  words: 1000
- points:
  - >-
    Механізм репресій через обман: спецоперація ДПУ (ЧК/ДПУ), яка виманила Тютюнника
    з еміграції до підрадянської України у 1923 році.
  - >-
    [!myth-buster] Участь у радянському пропагандистському фільмі "П.К.П." (Пілсудський купив
    Петлюру, 1926) розглядається як наслідок примусу та контролю ДПУ, а не вільний перехід на
    бік більшовиків.
  - >-
    Аналіз радянської тактики: використання авторитету колишніх ворогів для деморалізації
    визвольного руху перед їхнім остаточним фізичним знищенням.
  section: 'Тінь: Фільм "П.К.П." та розстріл'
  words: 1600
- points:
  - >-
    [!anti-hagiography] Тютюнник є складною постаттю. Спрощена героїзація ігнорує роки
    під радянським контролем, а радянська версія про "розкаяння" ігнорує репресивний тиск.
  - >-
    [!epistemic-humility] Завершення шляху: після періоду використання в пропаганді Тютюнника
    розстріляли у Москві 20 жовтня 1930 року. Пам'ятаємо про обережність щодо
    документів і спогадів, створених ним у цей радянський період.
  - >-
    Сучасне значення: Тютюнник як уособлення трагедії української революційної еліти,
    зламаної чекістськими методами.
  section: 'Підсумок: Трагедія генерала УНР'
  words: 1000
