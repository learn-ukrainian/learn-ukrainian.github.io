objectives:
- Розуміти роль Юрія Тютюнника як генерала-хорунжого Армії УНР та організатора повстанського руху.
- Аналізувати механізми радянських спецслужб щодо повернення емігрантів на прикладі операції ГПУ/ОГПУ.
- >-
  Досліджувати, як радянська служба використовувала постать після арешту, спираючись
  на формули джерела («на замовлення», «використати у своїх цілях») і не додаючи
  недоведених тверджень про форми тиску, роки виходу фільмів чи мотиви.
- >-
  Утримувати неусунену розбіжність довідників щодо місця народження (Звенигородський
  р-н за ЕІУ / Глухівський повіт Чернігівської губернії за IEU), не обираючи версії
  й не виводячи регіон народження з місця пізнішої діяльності: писати «село Будище»
  без регіональної прив'язки.
- Оцінювати складність біографії Тютюнника без спрощеної героїзації чи радянської демонізації.
