content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Йосиповичем Тютюнником: генерал-хорунжий Армії УНР,
    один з ключових організаторів повстанських операцій під час Української революції.
    Народився 20 квітня 1891 року в селі Будище.
  - >-
    [!epistemic-humility] Регіональна прив'язка Будища НЕ встановлена: ЕІУ локалізує
    його як «нині село Звенигородського р-ну Київ. обл.», IEU подає «Budyshcha,
    Hlukhiv county, Chernihiv gubernia» — це різні регіони. Формулювання ЕІУ теж
    проблемне, бо Звенигородський район належить до Черкаської області. НЕ писати
    «Будище на Черкащині» й не обирати жодної версії: подавати обидві як приклад
    джерелознавчої обережності.
  - >-
    Провокаційне питання: як військовий лідер, який воював проти більшовиків, опинився у
    радянському кіно в ролі самого себе?
  section: Розминка
  words: 400
- points:
  - >-
    Шлях у революційні формування: служба в підрозділах, що змінювалися під час
    українсько-радянської війни, і перехід до Армії УНР.
  - >-
    Військове звання генерал-хорунжий та роль у формуванні регулярних структур
    української держави, а не "отаманського бандитизму".
  - >-
    [!decolonization] Осмислення термінів "отаман", "повстанський штаб" та "Армія УНР"
    без радянських стереотипів про "бандитизм". Тютюнник діяв як регулярний військовий
    діяч Української держави.
  section: 'Формування: Від революційних формувань до Армії УНР'
  words: 1000
- points:
  - >-
    Перший і другий Зимові походи: Тютюнник як організатор антибільшовицьких операцій
    та символ збройної боротьби за незалежність.
  - >-
    Організація повстанського штабу та спроби підняти масове повстання в Україні після
    еміграції керівництва УНР.
  - >-
    [!epistemic-humility] Польський контекст: союз УНР з Польщею та Другий Зимовий похід
    пов'язані з міжвоєнною прикордонною політикою; це не означає, що український рух був
    "куплений" іноземцями — такий наратив є радянською пропагандою.
  - >-
    Оперативні тексти та мемуари про Зимові походи як джерела для розуміння
    революційної військової хронології.
  section: 'Діяльність: Зимові походи та повстанський штаб'
  words: 1200
- points:
  - >-
    Механізм репресій через обман: спецоперація ГПУ/ОГПУ, яка виманила Тютюнника
    з еміграції до підрадянської України у 1923 році.
  - >-
    Радянський період за ЕІУ — мовою джерела: після арешту служба «на своє замовлення»
    отримала від нього опис пережитого й прагнула «використати у своїх цілях». Текст
    «З поляками проти Вкраїни» (Харків, 1924) створено після арешту — не подавати як
    вільну авторську позицію. Ключове слово — «замовлення».
  - >-
    [!epistemic-humility] Кіно: за ЕІУ Тютюнник — співавтор літературного сценарію
    фільму «Звенигора» і як актор грав у фільмі «ПКП». Років виходу обох фільмів цим
    проходом НЕ отримано — дати (зокрема «1926») НЕ стверджувати. Назву «ПКП» не
    подавати як його висловлювання: це радянський артефакт, а не його слова.
  - >-
    [!epistemic-humility] МЕЖА ДОКАЗУ щодо примусу: ЕІУ фіксує замовлення й намір
    використати, але документа, який описував би конкретні форми тиску, цим проходом
    НЕ отримано. Тому формулювати так, як дає джерело («на замовлення», «використати
    у своїх цілях»), і НЕ додавати непідтверджених тверджень про примус, катування,
    погрози чи мотиви — ні щодо фільму, ні щодо текстів.
  - >-
    [!anti-hagiography] Період 1923–1929 під радянським контролем ускладнює біографію
    в обидва боки: спрощена героїзація оминає тексти, створені на замовлення служби,
    а радянська версія про «розкаяння» спирається саме на них. «Звенигора» ж належить
    до української кінокласики — це ускладнює просту схему «пропагандистська стрічка»
    і варте показу, а не оминання.
  - >-
    Завершення шляху: розстріл у Москві 20 жовтня 1930 року органами радянської
    держбезпеки.
  section: 'Тінь: Тексти на замовлення, кіно та розстріл'
  words: 1600
- points:
  - >-
    [!epistemic-humility] Медійна грамотність: порівняння оперативного джерела про
    Зимовий похід, радянського фільму-артефакту та енциклопедичного підсумку — хто
    контролював умови створення кожного тексту?
  - >-
    Розмежування від письменника Григора Тютюнника: спільне прізвище не означає
    спільного історичного контексту.
  - >-
    Сучасне значення: Тютюнник як уособлення трагедії української революційної еліти,
    зламаної чекістськими методами, без спрощеної міфології чи радянської демонізації.
  section: 'Підсумок: Трагедія генерала УНР'
  words: 1000
focus: >-
  Юрій Тютюнник як генерал-хорунжий Армії УНР, організатор Зимових походів і жертва
  операції ДПУ 1923 року та розстрілу 1930-го. Аналіз його шляху й того, як служба
  «на своє замовлення» отримала від нього тексти після арешту — мовою джерела, без
  недоведених тверджень про форми тиску, дати фільмів чи мотиви.
