content_outline:
- points:
  - >-
    [!biography] Знайомство з Миколою Костомаровим: історик, письменник, фольклорист і
    громадський мислитель, чия українська програма пов'язана з Кирило-Мефодіївським
    братством.
  - >-
    Провокаційне питання: чому імперія відповіла фортецею і засланням не на один
    літературний текст, а на політичну уяву — на ідею вільної української республіки?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та становлення: навчання в Харківському університеті; праця історика,
    письменника й фольклориста, що поєднувала наукове дослідження з художньою творчістю.
  - >-
    Кирило-Мефодіївське братство та його програма: вільна українська республіка у
    федерації слов'янських народів із центром у Києві, загальне виборче право, свобода
    совісті, освіта рідною мовою та скасування кріпацтва.
  - >-
    [!decolonization] Братство було не романтичним літературним гуртком, а носієм
    конкретної політичної програми; саме тому імперія сприйняла українську політичну
    уяву як загрозу безпеці.
  section: 'Формування: Харків і Кирило-Мефодіївське братство'
  words: 1000
- points:
  - >-
    Рання творчість під іменем Єремія Галка: драма "Сава Чалий" (1838), збірка
    "Українські балади" (1839) та драма "Переяславська ніч" (1841).
  - >-
    "Книги битія українського народу" (1846): біблійно-пророчий маніфест братства;
    рядок "Не хочем царя, хочемо бути вільні і рівні" дає стислий вхід в антисамодержавну
    лексику.
  - >-
    Етична мова рівності: "Хто хоче бути першим, повинен бути всім слугою" — маніфест
    перекладає політичну рівність у біблійний етичний синтаксис.
  - >-
    Історичний доробок: "Богдан Хмельницький" (1859), "Руїна" (1879–1880), "Мазепа"
    (1882) та "Мазепинці" (1884) — велике осмислення української історії.
  section: 'Діяльність: Історик, письменник і автор маніфесту'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Репресія була спрямована на політично-культурну програму, а не
    на один текст; для курсу важливо відрізняти засвідчену джерелами кару від пізнішого міфу.
  - >-
    Механізм репресії: арешт у березні 1847 року після викриття братства; близько року
    ув'язнення в Петропавлівській фортеці; потім заслання до Саратова.
  - >-
    Обмеження після заслання: російська імперська влада через політично-поліційний
    апарат обмежила наукову й видавничу діяльність Костомарова.
  - >-
    [!epistemic-humility] Джерела підтверджують арешт, ув'язнення у фортеці, заслання
    та обмеження, але не дають ні названого судового вироку, ні номера архівної справи —
    тож цих деталей ми не вигадуємо.
  section: 'Тінь: Арешт 1847 року та Петропавлівська фортеця'
  words: 1600
- points:
  - >-
    Що збереглося: організаційно братство було зламане, але історичні та літературні
    праці Костомарова вціліли, зокрема пізніші видання "Книг битія українського народу".
  - >-
    [!myth-buster] "Дві руські народності" (1861): пряма первинна праця проти імперського
    та радянського стирання різниці між українським і російським історичним розвитком;
    дев'ятнадцятивічні вживання слова "руський" потребують історичного пояснення.
  - >-
    Дискусійні питання: авторство й текстова форма "Книг битія" іноді обговорюються поряд
    із впливом Тараса Шевченка, але джерела засвідчують авторство Костомарова.
  - >-
    Кінцеве питання: як учити федералістську програму братства з центром у Києві в її
    історичному контексті 1840-х, не підмінюючи її модерним лібералізмом.
  section: 'Підсумок: Дві руські народності проти імперського стирання'
  words: 1000
focus: >-
