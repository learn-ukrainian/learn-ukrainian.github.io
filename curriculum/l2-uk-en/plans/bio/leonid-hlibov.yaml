content_outline:
- points:
  - >-
    [!biography] Знайомство з Леонідом Глібовим (псевдонім Дідусь Кенир): поет,
    байкар, журналіст, учитель, редактор і громадський діяч Полтавщини та
    Чернігівщини.
  - >-
    Провокаційне питання: чому в пам'яті лишився «дитячий байкар», хоча
    джерела фіксують його як редактора газети під поліцейським тиском?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 5 березня 1827 року (21 лютого за старим стилем) у Веселому
    Подолі на Полтавщині; смерть 10 листопада 1893 року (29 жовтня за старим
    стилем) в Чернігові.
  - >-
    Освіта та громадська діяльність: викладання географії в чернігівській
    гімназії; редагування *Черниговский листок* з 1861 року.
  - >-
    Ранні лірико-пісенні тексти, зокрема «Журба» / «Стоїть гора високая»
    (1859).
  section: 'Формування: Вчитель, редактор, лірик'
  words: 1000
- points:
  - >-
    Байки: «Вовк та Ягня», «Вовк і Кіт», «Вовк і Вівчарі», «Ведмідь-пасічник»,
    «Громада», «Муха і Бджола» / «Бджола і Мухи» — езопівська алегорія з
    стислим моральним висновком.
  - >-
    Лірика та пісні: «Вечір», «Скажіть мені правду, добрі люди», «Летить голуб
    понад морем»; «Журба» — ліричний ритм народної пісні («До тебе, люба
    річенько»).
  - >-
    У «Бджола і Мухи» — патріотичний злам «Я рідну Україну» в алегоричній формі.
  - >-
    Доступний синтаксис не означає політичної порожнечі: байка як жанр, який
    дозволяв говорити під цензурою.
  section: 'Діяльність: Байки та «Журба»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] У досьє немає номера поліцейської справи про арешт —
    репресія проявилася через цензуру, зняття з посад і нагляд, а не через
    задокументоване ув'язнення.
  - >-
    1863 рік: зняття з посади редактора *Черниговский листок* після
    публікації «політично підозрілих» матеріалів і нібито зв'язків із
    «Земля і воля»; поліцейський нагляд і вимушене переселення до Ніжина.
  - >-
    Ширший контекст: **Валуєвський циркуляр 1863 року** — іменований імперський
    документ, що звужував україномовний друк, школи та публічне слово в той
    самий період.
  - >-
    [!decolonization] Спрощення «провінційного дитячого письменника» прибирає
    контекст українського друку під тиском; газета та цензура — частина
    біографії на рівні з байками.
  - >-
    [!epistemic-humility] Точний наказ про звільнення чи нагляд не знайдено;
    формулювати механізм як цензуру, професійне покарання та нагляд.
  section: 'Тінь: Цензура 1863 року та *Черниговский листок*'
  words: 1600
- points:
  - >-
    Що збереглося: байки та «Журба» увійшли в шкільну й народну культуру; повний
    адміністративний запис газетного закриття в досьє не знайдено.
  - >-
    Зв'язок із історичним модулем про Валуєвський/Ems Ukaz та літературним
    модулем про Глібова.
  - >-
    Сучасне значення: Глібов як автор, чия «проста» мова приховувала досвід
    публічного інтелектуала під імперською цензурою.
  section: 'Підсумок: Байкар під наглядом'
  words: 1000
focus: >-
  Леонід Глібов як байкар і редактор *Черниговский листок*, чия діяльність
  1861–1863 років зазнала цензурного та професійного покарання в контексті
  Валуєвського циркуляра 1863 року — без задокументованого арешту в наявних
  джерелах.
level: BIO
module: bio-220
objectives:
- >-
  Аналізувати байки та лірику Глібова, зокрема «Журба» (1859) та алегоричні
  тексти з патріотичним змістом.
- >-
  Пояснювати роль *Черниговский листок* (1861–1863) і причини зняття редактора
  з посади в 1863 році.
- >-
  Пов'язувати особисту долю автора з Валуєвським циркуляром 1863 року як
  іменованим імперським документом.
- >-
  Відрізняти задокументоване цензурне покарання від непідтверджених тверджень
  про арешт або номер поліцейської справи.
