content_outline:
- points:
  - >-
    [!biography] Олесь Бердник: український фантаст, автор космічно-духовної
    прози, учасник Української Гельсінської групи і людина двох радянських
    кримінальних справ.
  - >-
    Провокаційне питання: як читати автора, для якого космос, нація, свобода і
    містична утопія були не окремими темами, а одним способом говорити про
    несвободу?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 27 листопада 1926 року у Вавиловому, дитинство біля Києва і
    пам'ять про Голодомор формують ранній досвід катастрофи, яку пізніше не
    можна звести до декоративного тла фантастики.
  - >-
    Війна, поранення, демобілізація і навчання в театральній студії при театрі
    імені Івана Франка пояснюють його потяг до сценічної, пророчої, піднесеної
    мови.
  - >-
    24 жовтня 1949 року Бердника заарештували після виступу в атмосфері
    анти-"космополітичної" кампанії. 23 квітня 1950 року він отримав 10 років
    ув'язнення, 5 років заслання і 3 роки поразки в правах за антирадянську
    агітацію.
  - >-
    [!epistemic-humility] Джерела розходяться в датах документного народження і
    звільнення; базовий курс бере 1926 рік за ЕСУ і деталізовану репресивну
    хронологію за архівом правозахисного руху.
  section: 'Формування: Голодомор, війна, театр і перший вирок'
  words: 1100
- points:
  - >-
    Після помилування Бердник став одним із центральних авторів української
    фантастики: `Поза часом і простором`, `Шляхи титанів`, `Стріла часу`,
    `Серце Всесвіту`, `Діти Безмежжя`, `Подвиг Вайвасвати`, `Хто ти?` і
    `Чаша Амріти` розгорнули космічну уяву українською мовою.
  - >-
    `Зоряний корсар` поєднує антиімперську алегорію, духовний пошук, утопію,
    неологізми і риторику визволення. Біографічний модуль має підтримувати
    зв'язок із LIT-FANTASTIKA, а не переказувати весь роман.
  - >-
    [!decolonization] Бердника не слід подавати як "радянського фантаста" з
    українською приміткою. Його центральний конфлікт — право української мови,
    пам'яті і правозахисного руху мислити майбутнє поза імперською рамкою.
  section: 'Діяльність: Українська фантастика, космізм і Зоряний корсар'
  words: 1200
- points:
  - >-
    У квітні 1972 року обшук у квартирі Руденка, вилучення машинок і Дзюбиного
    `Інтернаціоналізму чи русифікації?` привели до голодування Бердника і
    Валентини Сокоринської-Бердник. Після цього рекламу виступів зупинили, а
    тексти перестали виходити.
  - >-
    Наказ 13 серпня 1976 року вилучив книжки Бердника з бібліотек і книжкової
    торгівлі. Того ж року він став співзасновником Української Гельсінської
    групи, підписував документи і передавав матеріали за кордон.
  - >-
    6 березня 1979 року його знову заарештували. У грудні 1979 року суд у
    Кагарлику засудив його до 6 років спецтаборів і 3 років заслання; він
    перебував у пермських таборах і був помилуваний 14 березня 1984 року.
  - >-
    [!anti-hagiography] Заява 17 травня 1984 року в `Літературній Україні`, де
    Бердник зрікався Гельсінського руху і називав колишніх соратників, є
    документованою травмою пам'яті. Її не можна стерти, але й не можна читати
    без контексту табору, тиску і помилування.
  section: 'Тінь: Заборона книжок, УГГ і болюча заява 1984 року'
  words: 1600
- points:
  - >-
    Після звільнення Бердник створював ноосферні й духовно-політичні проєкти,
    Українську Духовну Республіку, публічні собори і навіть пробував увійти в
    президентську політику 1991 року.
  - >-
    [!myth-buster] Пізню містичну лексику не слід висміювати як дивину і не
    слід викладати як істину. Вона є частиною рецепції автора, який шукав мову
    для свободи, майбутнього і національного воскресіння.
  - >-
    Підсумок семінару: Бердник важливий саме тому, що не вкладається в одну
    чисту рамку — фантаст, правозахисник, в'язень, автор утопій, людина
    компромісу під тиском і контроверсійний творець пізніх духовних проєктів.
  section: 'Підсумок: Космічна уява після табору'
  words: 900
focus: >-
  Олесь Бердник як український фантаст і діяч Української Гельсінської групи,
  чия біографія поєднує Голодоморну пам'ять, театральну риторику, два радянські
  вироки, заборону книжок, `Зоряного корсара`, спецтабір, помилування і
  контроверсійну заяву 1984 року. Семінар тримає антиімперську фантастику й
  правозахист разом із критичною увагою до містицизму і пізніх публічних
  поворотів.
level: BIO
