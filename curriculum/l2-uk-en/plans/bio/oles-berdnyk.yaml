objectives:
- >-
  Пояснювати репресивну хронологію Бердника через перший вирок, книжкову
  заборону, УГГ, другий вирок і пермські табори.
- >-
  Аналізувати українську фантастику Бердника як космічно-духовну і політичну
  мову, а не як периферію радянської фантастики.
- >-
  Критично розглядати заяву 1984 року без замовчування, морального спрощення
  або виривання з табірного контексту.
- >-
  Розрізняти деколонізаційну уяву, правозахисну дію, езотеричну лексику і
  пізню політичну рецепцію.
