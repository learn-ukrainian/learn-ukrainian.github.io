content_outline:
- points:
  - 'Парадокс: як учений, який після 1921 року не міг повернутися жити в радянській Україні, став одним із тих, хто найпереконливіше вписав українську літературу й філософію в європейську історію ідей?'
  - 'Вступний факт: Дмитро Чижевський народився в Олександрії 23 березня / 4 квітня 1894 року, пройшов шлях від студента математики в Петербурзі до професора Гарварду й Гайдельберга, але його український корпус у СРСР був заборонений або замовчуваний.'
  - '[!biography] Представлення центральної фігури через конфлікт між вигнанням, світовою славістикою та поверненням українській культурі власної історичної рамки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Український учений чи "космополітичний" славіст? Як поєднати його працю в німецькому, чеському, американському й українському академічних середовищах із тим, що понад 200 позицій його доробку присвячено україністиці?'
  - 'Дебат 2: Чижевський vs радянська історіографія. Для радянської науки українське бароко часто було "реакційним" або периферійним явищем; для Чижевського - великим європейським стилем, без якого неможливо зрозуміти Сковороду й давню українську літературу.'
  - 'Дебат 3: Політична біографія без прикрашання. Він був меншовиком у Центральній Раді й голосував проти IV Універсалу; це потрібно читати як складний міжнародницький вибір доби революції, а не як доказ "неукраїнськості".'
  - '[!epistemic-humility] Моделювання джерельної дисципліни: арешт Київською ЧК у серпні 1920 року та сім місяців у харківській в''язниці мають сильне джерельне підтвердження; точна дата переходу кордону 13 травня 1921 року й деталь про загрозу розстрілу потребують обережного формулювання.'
  - '[!decolonization] Розрив із імперською "спільною колискою": показати, як його історія стилів витягала українську культуру з російськоцентричної схеми та повертала їй європейський контекст.'
  section: 'Конфліктна карта: Учений між Україною, Європою та імперськими рамками'
  words: 900
- points:
  - 'Родинне й освітнє тло: Олександрія, навчання в Петербурзькому університеті в 1911-1913 роках, перехід до Київського університету, філософія та слов''янська філологія як нова траєкторія.'
  - 'Самоусвідомлення: згадка про те, що в петербурзький період він "став українцем", перейшовши в листуванні й спілкуванні на українську; обговорити, чому національна ідентичність у ранньому XX столітті була процесом вибору, а не автоматичною біографічною даністю.'
  - 'Київ революційної доби: участь у Центральній Раді як меншовика, викладання після університету, конфлікт із більшовицьким режимом, що завершився арештом і вимушеною еміграцією.'
  - 'Європейське формування: студії й контакти з німецькою філософією, зокрема феноменологією та екзистенційною думкою; обережно показати, що імена Гуссерля, Гайдеггера й Ясперса є контекстом навчання, а не простим списком "учителів".'
  section: 'Формування: Від Олександрії та Києва до європейської філософії'
  words: 1000
- points:
  - 'Празький і німецький періоди: Український педагогічний інститут, Український Вільний Університет, Галле, Марбург і подальша праця в західній славістиці як інституційна база для науки без радянської цензури.'
  - 'Українська філософія як самостійне поле: "Філософія на Україні", "Нариси з історії філософії на Україні" та "Філософія Г. С. Сковороди" - спроба описати українську філософську традицію не як примітку до російської чи польської історії, а як окремий предмет.'
  - 'Українське бароко: праці 1941-1944 років і пізніші тексти про бароко як поворот у медієвістиці; бароко стає не "занепадом", а універсальним європейським стилем, у якому українська література має власну вагу.'
  - 'Історія стилів: "Історія української літератури (від початків до доби реалізму)" 1956 року та схема епох від монументального й орнаментального стилів до бароко, класицизму, романтизму й реалізму; студенти аналізують переваги й межі такої періодизації.'
  - 'Світова славістика: порівняльні праці зі слов''янських літератур, Гарвардський і Гайдельберзький періоди, знахідка рукописів Яна Амоса Коменського в Галле як приклад його ролі не лише в україністиці, а й у ширшій європейській гуманітаристиці.'
  - '[!decolonization] У центрі діяльності - не "провінційне доведення цінності України", а нормалізація України як повноправної частини європейської інтелектуальної історії.'
  section: 'Діяльність: Історія стилів, Сковорода і повернення українського бароко'
  words: 1300
- points:
  - '[!anti-hagiography] Чижевський не є зручним національним святим: його меншовицька позиція, дистанція від політичного націоналізму, контакти з різними славістичними середовищами й пізній космополітизм створювали напругу і в українській діаспорі.'
  - '[!myth-buster] Розбір радянського ярлика "буржуазний націоналізм": що саме в його концепції української літератури й філософії загрожувало радянській схемі історії, і чому заборона книжок була інструментом колоніального контролю над знанням.'
  - 'Методологічні сліпі плями: акцент на елітарній книжній культурі, "історії ідей" і "національному характері"; дискусія з критикою Грабовича про те, чи не конструює історик той об''єкт, який нібито тільки описує.'
  - 'Еміграційна перспектива: свобода від цензури дала йому змогу писати те, що було неможливо в УРСР, але водночас віддалила від радянської повсякденності та соціальної історії українських читачів усередині країни.'
  - '[!epistemic-humility] Вправа з NPOV: студенти мають сформулювати одночасно внесок і межі його методу без радянського таврування й без безкритичного вшанування.'
  section: 'Тінь: Ціна вигнання, методологічні межі та боротьба за пам''ять'
  words: 900
- points:
  - 'Повернення до розминки: чому саме вигнання створило умови для наукового повернення України до Європи, і чому це повернення залишалося неповним без пострадянського перевидання та переосмислення його праць в Україні?'
  - 'Після 1991 року: републікації "Нарисів", "Історії української літератури", "Українського літературного бароко" та філософських творів як не просто архівне повернення, а відновлення перерваної дисципліни.'
  - 'Інституційна пам''ять: премія імені Д. І. Чижевського НАН України, бібліотека в Кропивницькому, меморіалізація в Олександрії та академічні студії як різні способи повернення імені з радянського замовчування.'
  - '[!decolonization] Сучасне значення: Чижевський потрібен не для того, щоб "довести" українську європейськість, а щоб навчити бачити українську культуру як суб''єкта, що сам описує свої епохи, стилі й філософські питання.'
  - 'Кінцеве питання: ким є Чижевський для українського гуманітарного знання сьогодні - засновником, полемічним опонентом, джерелом методологічних ризиків чи всіма трьома одночасно?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Dmytro Chyzhevskyi as an emigre Ukrainian and European intellectual historian whose work on Skovoroda, Ukrainian philosophy, and literary baroque challenged Soviet erasure and Russocentric narratives while remaining methodologically debatable.
level: BIO
module: bio-222
objectives:
- Критично аналізувати життя Дмитра Чижевського в контексті Української революції, більшовицького переслідування, еміграції та західної славістики
- Пояснювати його внесок у становлення історії української філософії, сковородознавства та концепції українського літературного бароко
- Розрізняти радянські, діаспорні та сучасні деколоніальні інтерпретації його спадщини
- Формулювати аргументовану позицію щодо сили й обмежень його "історії стилів" та методу історії ідей
