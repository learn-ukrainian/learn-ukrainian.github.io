content_outline:
- points:
  - 'Парадокс: як колишній член РСДРП-меншовик, що голосував проти незалежності УНР, став одним із найважливіших
    будівничих української гуманітаристики в еміграції?'
  - '[!biography] Знайомство з Чижевським: філософ, славіст, який "став українцем" у студентські роки
    і вписав українську культуру в європейський контекст.'
  - 'Провокаційне питання: чи можна вважати його суто академічну "Історію української літератури" актом
    інтелектуального спротиву?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Науково-політичний): Бароко як загальноєвропейський стиль проти радянського міфу про "спільну
    колиску". Чому ігнорування Чижевським російського контексту 17-18 століть ламало імперський наратив?'
  - 'Радянська реакція: таврування бароко як "реакційного" і "декадентського" стилю, повна заборона праць
    Чижевського в УРСР та викреслення його імені.'
  - '[!decolonization] Розгляд "історії стилів" Чижевського (романіка, готика, ренесанс, бароко, класицизм,
    романтизм, реалізм) як механізму повернення української літератури до загальноєвропейської системи
    координат.'
  section: 'Конфліктна карта: Інтелектуальна війна за бароко'
  words: 900
- points:
  - 'Початок шляху: освіта в Петербурзі (де він свідомо "став українцем") та Києві; вплив видатних філософів-сучасників
    (Лосський, пізніше Гуссерль, Ясперс, Гайдеггер в еміграції).'
  - 'Політична діяльність: членство в РСДРП (меншовиків) та робота в Центральній (Малій) Раді, де він
    керувався інтернаціональними, а не націоналістичними переконаннями.'
  - 'Переслідування: арешт київською ЧК у серпні 1920 року, ув''язнення в Харкові, реальна загроза розстрілу
    та нелегальний перехід польсько-радянського кордону в травні 1921 року.'
  section: 'Формування: Від Центральної Ради до вільного світу'
  words: 1000
- points:
  - 'Сковородинознавство: монографія "Філософія Г. С. Сковороди" (1933) та концепція "філософії серця"
    (кордоцентризму). Центральна теза: "Життя є філософія і філософія є життя."'
  - 'Відкриття європейського масштабу: робота з рукописом Яна Амоса Коменського (Pansophia)
    в архівах Галле, що принесла йому світове визнання.'
  - 'Інституційна розбудова: викладання у Празі, Галле, Марбурзі, а також у Гарвардському і Гайдельберзькому
    університетах. Пізніше його ім''я було закріплене в Гарварді через кафедру української літератури
    імені Дмитра Чижевського.'
  - 'Фундаментальні праці: "Нариси з історії філософії на Україні", "Український літературний барок",
    та magnum opus — "Історія української літератури", яка розглядає історію літератури як зміну стилів.'
  section: 'Діяльність: Від Сковороди до Гарварда'
  words: 1300
- points:
  - '[!anti-hagiography] Академічна відстороненість: Чижевського часто описують як "самотнього філософа",
    далекого від політичного націоналізму діаспори. Чи була це принципова позиція науковця, чи політична
    наївність?'
  - 'Голосування 1918 року: чесний аналіз його голосу проти Четвертого Універсалу як меншовика-інтернаціоналіста.
    [!epistemic-humility] Не ховати складні факти минулого заради створення ідеалізованого портрету.'
  - 'Методологічні дискусії: критика (зокрема Джорджа Грабовича) концепту "національного характеру" в
    літературі. Чи існує він об''єктивно, чи конструюється істориком?'
  - 'Елітарність фокусу: зосередження Чижевського на "високому" книжному бароко та ігнорування "низової",
    народної культури.'
  section: 'Тінь: Самотній філософ та критика методу'
  words: 900
- points:
  - 'Повернення спадщини: перевидання праць в незалежній Україні (наприклад, "Українське літературне бароко"
    у 2003 році).'
  - 'Вплив: як концепції Чижевського досі безпосередньо формують наше розуміння Сковороди та літературної
    епохи бароко.'
  - 'Кінцеве питання: як інтегрувати таку складну, політично неоднозначну (меншовик), але науково епохальну
    (засновник українського барокознавства) постать у сучасний національний пантеон?'
  section: 'Дискусія та підсумок: Спадщина в сучасній Україні'
  words: 700
focus: 'Дмитро Чижевський: його концепція українського бароко, філософія кордоцентризму Сковороди, історія
  стилів як інструмент деколонізації літератури, та складний шлях від меншовика до провідного славіста
