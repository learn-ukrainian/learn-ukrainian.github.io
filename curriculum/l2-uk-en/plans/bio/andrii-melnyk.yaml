content_outline:
- points:
  - >-
    [!biography] Знайомство з Андрієм Мельником (1890–1964): український військовий і
    політичний діяч, полковник армії УНР, лідер ОУН(м) (мельниківців).
  - >-
    Провокаційне питання: чому історія часто зводить ОУН до "бандерівців", стираючи
    складну внутрішню структуру руху та роль старшого покоління ветеранів Визвольних змагань?
  section: Розминка
  words: 400
- points:
  - >-
    Початок шляху: навчання, доброволець Легіону Українських Січових Стрільців,
    російський полон під час Першої світової війни.
  - >-
    Військовий досвід: полковник армії УНР, участь у Визвольних змаганнях 1917–1921 років.
  - >-
    Міжвоєнний період: співзасновник УВО разом з Євгеном Коновальцем, польське
    ув'язнення (1924–1928), робота управителем лісів митрополита Андрея Шептицького.
  - >-
    Обрання Мельника головою Проводу українських націоналістів після вбивства Коновальця.
  section: 'Формування: Від УНР до УВО'
  words: 1000
- points:
  - >-
    Римський Збір ОУН (1939): затвердження статусу "Вождя" для Мельника, що
    віддзеркалювало авторитарний дух епохи.
  - >-
    Розкол ОУН (1940): конфлікт між старшим поколінням (Мельник) та радикальною
    західноукраїнською молоддю (Бандера) щодо тактики та стратегії.
  - >-
    [!epistemic-humility] Розмежування: ОУН(м) та ОУН(б) мали різні структури, кадри
    та діяли незалежно одна від одної. Тому дії однієї фракції не можна автоматично
    приписувати іншій.
  section: 'Діяльність: Провідник ОУН та розкол'
  words: 1200
- points:
  - >-
    Ідеологічний вимір: ОУН(м) стояла на позиціях інтегрального націоналізму та мала
    авторитарну модель керівництва, що є предметом критичного аналізу в сучасній науці
    (дослідження Гімки, Рудлінга).
  - >-
    Друга світова війна: спроби ОУН(м) створити легальні структури в умовах німецької
    окупації та подальший конфлікт із нацистською адміністрацією.
  - >-
    Нацистські репресії: арешт Мельника німецькою владою (початок 1944) та ув'язнення
    в концтаборі Заксенгаузен, звільнення наприкінці 1944 року.
  - >-
    [!myth-buster] Російська дезінформація: зведення всіх учасників ОУН до "фашистів",
    ігноруючи як їхнє протистояння з Німеччиною, так і складну історію УНР та розколу
    націоналістичного руху.
  section: 'Тінь: Авторитаризм, війна та концтабір'
  words: 1600
- points:
  - >-
    Еміграція: діяльність Мельника в екзилі (Люксембург), консолідація уенерівських
    та оунівських сил, спроби об'єднання української діаспори.
  - >-
    Підсумок: Мельник як уособлення консервативного військово-політичного крила
    націоналістичного руху, що пройшов шлях від УНР до еміграції в умовах
    Холодної війни.
  section: 'Підсумок: Складна історична пам''ять'
  words: 1000
focus: >-
  Андрій Мельник як лідер ОУН(м), ветеран армії УНР та ключова фігура українського
  консервативного націоналізму. Аналіз його військового досвіду, причин розколу ОУН,
  авторитарної ідеології та нацистського ув'язнення.
