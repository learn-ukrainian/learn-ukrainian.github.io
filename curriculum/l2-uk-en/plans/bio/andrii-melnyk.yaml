objectives:
- Аналізувати біографію Андрія Мельника від служби в армії УНР до лідерства в ОУН(м).
- Розуміти ідеологічні та поколіннєві причини розколу ОУН на мельниківське та бандерівське крила.
- Досліджувати авторитарний характер ідеології ОУН(м) та її спроби діяти в умовах Другої світової війни.
- Оцінювати досвід Мельника як в'язня нацистського концтабору та діяча еміграції.
