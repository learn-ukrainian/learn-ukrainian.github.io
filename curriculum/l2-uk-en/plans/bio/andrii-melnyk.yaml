content_outline:
- points:
  - >-
    [!biography] Знайомство з Андрієм Мельником (1890–1964): український військовий і
    політичний діяч, полковник армії УНР, лідер ОУН(м) (мельниківців).
  - >-
    Провокаційне питання: чому історія часто зводить ОУН до "бандерівців", стираючи
    складну внутрішню структуру руху та роль старшого покоління ветеранів Визвольних змагань?
  section: Розминка
  words: 400
- points:
  - >-
    Початок шляху: навчання, доброволець Легіону Українських Січових Стрільців,
    російський полон під час Першої світової війни.
  - >-
    Військовий досвід: полковник армії УНР, участь у Визвольних змаганнях 1917–1921 років.
  - >-
    Міжвоєнний період: співзасновник УВО разом з Євгеном Коновальцем, польське
    ув'язнення (1924–1928), робота управителем лісів митрополита Андрея Шептицького.
  - >-
    Обрання Мельника головою Проводу українських націоналістів після вбивства Коновальця.
  section: 'Формування: Від УНР до УВО'
  words: 1000
- points:
  - >-
    Голова ПУН: після загибелі Коновальця Мельник став головою Проводу українських
    націоналістів; 1939 року затверджений на цій посаді 2-м Великим збором
    українських націоналістів у Римі (ЕСУ уточнює: обраний у жовтні 1938,
    затверджений у серпні 1939). [!epistemic-humility] Формулювань про статус
    «Вождя» жодне з двох перевірених джерел не подає — не стверджувати.
  - >-
    Розкол ОУН (1940): предметом суперечки, за ЕІУ, були персональний склад ПУН,
    підозри щодо Я. Барановського й О. Сеника-Грибовського у співпраці з польською
    поліцією, поповнення Проводу західняками та питання, чи пов'язувати боротьбу з
    воєнними планами Німеччини. Вимоги сприйнято як ультиматум і відкинуто. Це
    політичний конфлікт із названими пунктами, а не різниця темпераментів.
  - >-
    [!epistemic-humility] Джерело опису розколу — стаття про Бандеру, тобто виклад
    з боку опонента. Не подавати його як нейтральний переказ обох сторін; для
    мельниківської версії потрібне окреме джерело.
  - >-
    [!epistemic-humility] Розмежування: ОУН(м) та ОУН(б) мали різні структури, кадри
    та діяли незалежно одна від одної. Тому дії однієї фракції не можна автоматично
    приписувати іншій.
  section: 'Діяльність: Провідник ОУН та розкол'
  words: 1200
- points:
  - >-
    [!epistemic-humility] Ідеологічний профіль ОУН(м): жодне з двох перевірених
    джерел (ЕІУ, ЕСУ) не характеризує ОУН(м) як інтегрально-націоналістичну чи
    авторитарну — форми «інтегральн-» та «авторитар-» у них не трапляються.
    Тому таких тверджень НЕ робити й не спирати їх на прізвища дослідників без
    точного запису видання. Це прогалина, яку має закрити окремий прохід із
    фаховою літературою.
  - >-
    Становище Мельника до арешту — те, що джерело таки подає, і чого попередній
    прохід не показав. ЕСУ прямо фіксує: «Від кінця 1941 перебував у Берліні під
    наглядом та без права вільного переїзду». Це пряме свідчення саме про період
    ДО арешту: від кінця 1941 року він — у Берліні, під наглядом німецької влади
    й без права вільно пересуватися. Подавати з назвою джерела (за ЕСУ).
  - >-
    [!epistemic-humility] Межа цього свідчення в обидва боки. Воно НЕ дає повної
    картини стосунків ОУН(м) із німецькою владою — ні «спроб створити легальні
    структури», ні «конфлікту з адміністрацією» джерела не подають, і добудовувати
    їх не можна. Але й писати, що про доарештний період доказів немає, тепер НЕ
    можна: цей доказ є, і він показує людину під наглядом, а не поза стосунками.
  - >-
    [!epistemic-humility] Нацистський арешт — РОЗБІЖНІСТЬ, яку показати, а не усунути:
    ЕІУ подає «з 1941 перебував під нім. арештом, з 1944 утримувався в концтаборі
    Заксенгаузен»; ЕСУ — «на початку 1944 заарештований і увʼязнений у концтаборі
    Заксенгаузен, наприкінці того ж року звільнений». Різниця — три роки. Дату
    арешту НЕ стверджувати. Спільне для обох джерел — лише сам факт ув'язнення в
    Заксенгаузені, і не більше.
  - >-
    [!epistemic-humility] Звільнення: НЕ спільна теза. Звільнення наприкінці 1944
    року подає ТІЛЬКИ ЕСУ («наприкінці того ж року звільнений»); стаття ЕІУ про
    звільнення не каже нічого — ні дати, ні факту (перевірено вилученням тексту
    статті, 2026-07-17). Тому формулювання «обидва джерела сходяться на звільненні
    наприкінці 1944 року» — ХИБНЕ, і його не вживати. Писати тільки з атрибуцією:
    «за ЕСУ, наприкінці 1944 року звільнений», зазначивши, що ЕІУ цього не подає.
  - >-
    [!myth-buster] Російська дезінформація: зведення всіх учасників ОУН до "фашистів".
    Протиставляти цьому загальну тезу про "протистояння ОУН(м) з Німеччиною" НЕ можна —
    джерела пакета її не подають. Вживати лише конкретні рядки про самого Мельника:
    від кінця 1941 року він перебував у Берліні "під наглядом та без права вільного
    переїзду" (ЕСУ), а згодом був ув'язнений у концтаборі Заксенгаузен (ЕІУ, ЕСУ).
    Ширших висновків про ОУН(м) із цих рядків не робити.
  section: 'Тінь: Війна, концтабір та межі доказу'
  words: 1600
- points:
  - >-
    Еміграція: від 1945 року Мельник жив у Люксембурзі; 1948 року виступив
    ініціатором створення Української національної ради, яка, за формулюванням ЕІУ,
    "об'єднала представників різних політ. партій і рухів"; 1957 року ініціював
    початок роботи зі створення Світового конгресу вільних українців (ЕІУ).
  - >-
    Підсумок: шлях Мельника від Армії УНР до повоєнної еміграції — послідовність
    посад і подій, які подають джерела. Узагальнювальної характеристики його течії
    (як "консервативної", "поміркованої" чи будь-якої іншої) джерела не дають —
    і план її не будує.
  section: 'Підсумок: Складна історична пам''ять'
  words: 1000
focus: >-
  Андрій Мельник як начальник штабу Армії УНР, співзасновник УВО та голова ПУН/ОУН(м).
  Аналіз його військового шляху, названих джерелом пунктів розколу ОУН і нацистського
  ув'язнення — з відкритим показом двох розбіжностей українських енциклопедій (рік
  німецького арешту; місто смерті) замість вибору зручнішої версії.
level: BIO
module: bio-301
objectives:
- Аналізувати біографію Андрія Мельника від служби в Армії УНР до лідерства в ОУН(м).
- >-
  Розуміти названі джерелом пункти розколу ОУН (склад ПУН, підозри у співпраці з
  польською поліцією, прив'язка боротьби до воєнних планів Німеччини), враховуючи,
  що опис походить з боку опонента.
- >-
  Працювати з неусуненою розбіжністю двох академічних довідників щодо року
  німецького арешту та міста смерті: фіксувати обидві версії й формулювати, що саме
  можна стверджувати, а що ні.
- >-
  Оцінювати досвід Мельника як в'язня нацистського концтабору, розрізняючи, що це
  доводить (щодо періоду ув'язнення) і чого не доводить (щодо попереднього етапу,
  про який ЕСУ подає окреме свідчення: від кінця 1941 року — Берлін, нагляд,
  заборона вільного переїзду).
