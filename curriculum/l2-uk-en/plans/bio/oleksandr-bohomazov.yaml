content_outline:
- points:
  - 'Провокація: Як «український Пікассо», лідер європейського авангарду, міг зникнути з історії мистецтва на 50 років? Парадокс
    Олександра Богомазова — генія, якого радянська система намагалася стерти.'
  - '[!biography] Показ роботи «Пилярі» без підпису — запрошення до студента вгадати автора, епоху та стиль.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Богомазов — учень чи конкурент італійських футуристів? Його трактат «Живопис та елементи» (1914) — оригінальна
    теорія чи відповідь на європейські маніфести?'
  - 'Дебат 2: Богомазов — національний український художник чи представник «загальноросійського авангарду»? [!decolonization]
    Боротьба за спадщину художника між українською та російською історіографіями.'
  - '[!epistemic-humility] Аналіз аргументів обох сторін у дебаті про унікальність українського футуризму порівняно із західними
    течіями.'
  section: 'Конфліктна карта: Своє чи запозичене?'
  words: 900
- points:
  - 'Соціальний контекст: син бухгалтера з Херсонщини, що кидає виклик академічному мистецтву.'
  - 'Київське художнє училище: знайомство з Архипенком, Екстер, Ларіоновим. Початок експериментів.'
  - 'Московський період: участь у виставках авангарду, діалог із російськими футуристами.'
  - 'Поїздка до Фінляндії (1911): ключовий досвід, що привів до народження ідеї трактату та кристалізації власного стилю.'
  section: 'Формування: Від Ямполя до Фінляндії'
  words: 1000
- points:
  - 'Повернення до Києва (1914): створення найвідоміших робіт — «Потяг», «Пилярі», «Трамвай».'
  - 'Трактат «Живопис та елементи»: аналіз чотирьох елементів (крапка, лінія, форма, колір) та їх взаємодії у «русі» та «ритмі».
    Текст випередив ідеї Кандинського.'
  - 'Педагогічна діяльність: викладання в Київському художньому інституті, спроба реформувати мистецьку освіту.'
  - 'Первинне джерело: цитати з трактату, що пояснюють динаміку його картин.'
  section: 'Діяльність: Київський розквіт і «Живопис та елементи»'
  words: 1300
- points:
  - '[!anti-hagiography] Творчість в умовах постійної матеріальної скрути. Богомазов змушений був працювати креслярем, щоб
    утримувати родину.'
  - 'Боротьба з туберкульозом: хвороба, що повільно забирала сили, але не зупинила творчий процес.'
  - 'Ідеологічний тиск 1920-х: згортання НЕПу, початок боротьби з «формалізмом». Його мистецтво ставало небезпечним.'
  - '[!myth-buster] Міф про «вільного художника». Навіть у період розквіту Богомазов був змушений шукати компроміси між творчістю
    та виживанням.'
  section: 'Тінь: Хвороба, злидні та початок забуття'
  words: 900
- points:
  - 'Повернення до розминки: чому Богомазов був забутий? Відповідь студента з урахуванням хвороби, ранньої смерті та цілеспрямованої
    політики радянської влади по стиранню пам''яті.'
  - 'Відкриття кінця XX століття: як мистецтвознавці (Дмитро Горбачов) повернули ім''я художника Україні та світу.'
  - '[!decolonization] Сучасне значення Богомазова як символу української культури, яку неможливо знищити.'
  - 'Його місце сьогодні: на аукціонах Sotheby''s, у колекціях MoMA, та в серці українського авангарду.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Oleksandr Bohomazov's journey as the "Ukrainian Picasso", his theory of spectralism, the tragic erasure by the Soviet
  regime, and his triumphant return to the world art scene.
level: BIO
module: bio-081
objectives:
- Аналізувати парадокс творчої долі Богомазова — від лідера авангарду до забутого генія, стертого радянською системою
- Пояснювати ключові ідеї трактату «Живопис та елементи» та їхній зв'язок із практикою художника
- Формулювати аргументовану позицію в дебаті про місце Богомазова в українському та світовому авангарді
- Критично оцінювати причини та наслідки «повернення» спадщини художника наприкінці XX століття
