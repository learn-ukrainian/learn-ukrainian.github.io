content_outline:
- points:
  - 'Провокація: Як міг найвідоміший радянський педагог, лауреат державних премій, бути одночасно звинувачений у "буржуазному
    гуманізмі" та ідеологічних відхиленнях? Парадокс Сухомлинського.'
  - '[!biography] Представлення Василя Сухомлинського як центральної фігури української педагогіки XX століття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Критика з боку партійних ідеологів за "абстрактний гуманізм" та відхід від класового виховання vs.
    величезна підтримка з боку вчителів та батьків, що бачили в ньому захисника дитинства.'
  - 'Дебат 2 (у спадщині): Радянська спроба "канонізувати" безпечну версію Сухомлинського, ігноруючи його критику авторитаризму
    vs. Пост-радянське переосмислення його як символу гуманістичного опору тоталітарній системі.'
  - '[!epistemic-humility] Чи був Сухомлинський свідомим реформатором, що намагався змінити систему зсередини, чи його філософія
    була fundamentally несумісною з радянською ідеологією, і конфлікт був неминучим?'
  - '[!decolonization] Розгляд того, як російська та радянська педагогіка намагалися привласнити Сухомлинського, замовчуючи
    його українську ідентичність та глибокий зв''язок з українською культурою та природою.'
  section: 'Конфліктна карта: Педагог-новатор чи абстрактний гуманіст?'
  words: 900
- points:
  - 'Народження на Кіровоградщині (1918) в селянській родині: вплив українського села та природи на його світогляд.'
  - 'Рання педагогічна кар''єра та освіта: що сформувало його як вчителя до війни.'
  - 'Друга світова війна: участь у боях, тяжке поранення під Ржевом, втрата пальців руки. Як цей досвід жорстокості вплинув
    на його прагнення захистити дитинство.'
  - 'Повернення до школи з війни: не як герой-переможець, а як людина, що бачила найгірше і вирішила присвятити життя створенню
    кращого.'
  section: 'Формування: Шлях до серця дитини'
  words: 1000
- points:
  - Призначення директором сільської школи в Павлиші (1948) і перетворення її на унікальну освітню лабораторію протягом 22
    років.
  - 'Ключові принципи "педагогіки серця": виховання через красу, природу, казку, музику. Уроки мислення серед природи.'
  - 'Концепція "Школи радості" для найменших: навчання без примусу, оцінок та страху.'
  - 'Критика авторитаризму: відмова від сліпого підкорення та муштри на користь розвитку особистості, емоційного інтелекту
    та критичного мислення.'
  section: 'Діяльність: Павлиська "Школа радості"'
  words: 1300
- points:
  - '[!anti-hagiography] Чи не була "Школа радості", ізольована в селі, формою ескапізму, що готувала дітей до ідеального
    світу, а не до жорстоких реалій радянської системи?'
  - 'Компроміси та мовчання: Сухомлинський ніколи відкрито не виступав проти радянської влади. Розгляд меж, за які він не
    міг або не хотів виходити.'
  - 'Конфлікт із системою: детальний розгляд звинувачень в "абстрактному гуманізмі", "християнських мотивах" та ідеологічній
    "безхребетності" з боку партійних органів.'
  - '[!myth-buster] Поширений міф зображує Сухомлинського як дисидента. Це не так. Він був членом партії і намагався діяти
    в рамках системи. Його "тінь" — це трагедія геніального гуманіста, змушеного працювати в нелюдських умовах.'
  section: 'Тінь: Ціна гуманізму в тоталітарній системі'
  words: 900
- points:
  - 'Повернення до розминки: Отже, Сухомлинський — продукт системи чи її прихований критик? Студент формулює відповідь, використовуючи
    знання про його конфлікти та компроміси.'
  - 'Спадщина: Рання смерть (1970) як результат постійного тиску. Як його ідеї, заборонені за життя, були перевидані після
    незалежності й вплинули на світову педагогіку (особливо в Китаї та Німеччині).'
  - 'Сухомлинський сьогодні: чому його ідеї про емоційний розвиток, екологічне виховання та повагу до дитини є ще більш актуальними
    в епоху цифрових технологій та війни.'
  - '[!decolonization] Важливість повернення Сухомлинського в український та світовий контекст як українського, а не "радянського"
    мислителя.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Vasyl Sukhomlynskyi, focusing on his humanist "pedagogy of the heart", the experimental Pavlysh
  school, and his complex relationship with the Soviet educational system.
level: BIO
module: bio-131
objectives:
- Критично аналізувати парадокс Василя Сухомлинського — офіційно визнаного радянського педагога, звинуваченого в "абстрактному
  гуманізмі"
- Пояснювати ключові принципи "педагогіки серця" та експерименту в Павлиській школі
- Оцінювати сильні сторони та можливі "тіньові" аспекти (компроміси, обмеження) його діяльності в умовах тоталітарної системи
- Формулювати аргументовану позицію щодо актуальності спадщини Сухомлинського для сучасної української та світової освіти
