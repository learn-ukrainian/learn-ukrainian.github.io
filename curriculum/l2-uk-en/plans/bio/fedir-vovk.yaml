content_outline:
- points:
  - 'Провокація: чому «учений, що довів окремішність українців» — це водночас забагато й неточно, а стійке твердження вужче: Вовк зробив українську етнографію, фольклор, археологію й антропологічні дані видимими в європейських наукових інституціях тоді, коли імперська політика вважала українську культуру похідною, регіональною чи підозрілою?'
  - '[!biography] Знайомство з постаттю етнографа, антрополога, археолога, фольклориста й громадівця: член Наукового товариства імені Шевченка від 1899 року, голова його Етнографічної комісії від 1906 року, член Українського наукового товариства в Києві від 1908 року, доктор Сорбонни, вигнанець 1879-1905 років.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (українська агенда): у київському громадівському середовищі Вовк працював із Володимиром Антоновичем, Павлом Чубинським і Михайлом Драгомановим, допомагав друкувати нецензуровані закордонні видання Шевченка й інституціалізувати українське етнографічне збирання — наука як українська громадянська інфраструктура.'
  - 'Позиція 2 (імперсько-європейська рамка): він публікувався українською, російською та французькою в інституційних мовах, доступних ученому під імперією й на вигнанні, і працював у школі фізичної антропології, чиї типологічні категорії сьогодні непридатні як істина оповідача.'
  - '[!decolonization] Імперські назви, російськомовні публікації й форму «Волков» тримаємо як джерельний контекст і пошуковий псевдонім, а не як приналежність Вовка до російської науки; учнівська канонічна форма — Федір (Хведір) Вовк.'
  - '[!epistemic-humility] Премія Годара, медаль Брока й орден Почесного легіону — свідчення наукового визнання в нерівних інституціях, а не легітимація імперської чи європейської влади над українською культурою.'
  section: 'Конфліктна карта: Імперська наука чи українська самоорганізація?'
  words: 900
- points:
  - 'Походження й освіта: 17 березня 1847 року (новий стиль), село Крячківка на Полтавщині; Ніжинська гімназія, Новоросійський університет в Одесі й Університет святого Володимира в Києві, який він закінчив 1871 року, увійшовши в громадівське коло.'
  - 'Шевченкове слово поза цензурою: у 1876-1878 роках Вовк брав участь у нецензурованих закордонних виданнях «Кобзаря» й пов''язаній видавничій праці громадівських мереж — легальна на позір культурна робота, яку імперські кола вважали політично підозрілою.'
  - '[!anti-hagiography] Покарання й вигнання: за ЕІУ громадівців звинувачували в сепаратизмі, а Вовк зазнав переслідування за спробу перевезти в Україну підпільний друкарський верстат; від 1879 до 1905 року він жив у вигнанні, здебільшого в Парижі.'
  - 'Париж і Сорбонна: у 1900-1905 роках він захистив у Сорбонні дисертацію «Variations squelettiques du pied...» — її назву подаємо як історичне свідчення фахової мови доби, а не як сучасну рамку.'
  section: 'Формування: Громада, Шевченкове слово й вигнання'
  words: 1000
- points:
  - 'Етнографічні праці як безпечніший вхід: «Rites et usages nuptiaux en Ukraine» / «Шлюбний ритуал та обряди на Україні» (1891-1892) і «Le traîneau dans les rites funéraires de l''Ukraine» (1895) читають культуру як пов''язані практики, а не як декоративну дрібницю.'
  - 'Інституційна праця: член НТШ від 1899 року й голова його Етнографічної комісії від 1906 року, член Українського наукового товариства в Києві від 1908 року; археологія — перше дослідження верхньопалеолітичної Мізинської стоянки 1908 року за ЕІУ й ЕСУ.'
  - '[!decolonization] Фізико-антропологічні синтези («Антропологічні особливості українського народу», 1916, у збірнику «Украинский народ в его прошлом и настоящем») викладаємо лише як історію науки з чіткою дистанцією до застарілої таксономії: Вовк уживав знаряддя своєї дисципліни, щоб заперечити імперське заперечення української окремішності, але самі знаряддя нині потребують критики.'
  - '[!epistemic-humility] Архів вижив: Науковий архів Інституту археології НАН України обчислює особистий фонд Хведора Вовка в 5104 одиниці й робить це збереження видимим через «Цифрове сховище пам''яті».'
  section: 'Діяльність: Обряд, стоянка й архів'
  words: 1300
- points:
  - 'Механізм тиску: імперська цензура, поліційний нагляд, вимушена еміграція, професійне витіснення з України й пізніше радянське викривлення пам''яті.'
  - 'Виштовхування й повернення під наглядом: за УІНП дозвіл на повернення 1906 року все одно забороняв Вовкові проживати в Україні; українську науку терпіли як регіональний фольклор доти, доки вона не ставала доказом живого народу з мовою, територією, інституціями й міжнародною видимістю.'
  - '[!decolonization] Радянське маркування його антропології «буржуазним націоналізмом» — це свідчення радянської рамки, а не нейтральна оцінка; за КНУ його ім''я в тоталітарну добу фактично вилучали з публічної історії.'
  - '[!anti-hagiography] Це не мучеництво-через-страту: Вовк помер 29 червня 1918 року в Жлобині, дорогою з Петрограда до України; дату смерті подаємо із застереженням (ІЕУ дає 30 червня, а онлайн-рядок ЕІУ конфліктує з обома). Приховані «непристойні» колекції (за працею Марії Маєрчик та Олени Боряк) — матеріал лише для просунутої джерельної етики з попередженнями.'
  section: 'Тінь: Імперія виштовхує, потім поглинає'
  words: 900
- points:
  - 'Повернення до розминки: чому обряд, стоянка й архів — це не декоративний фольклор, а доказ того, що українське життя мало мову, територію й наукову інфраструктуру?'
  - 'Три шари для читання Вовка: спостережена практика, класифікаційна мова доби й політичне використання науки — розділяти їх, а не змішувати в одне «довів».'
  - '[!anti-hagiography] Найбезпечніша позиція — антиагіографічна: Вовк був українським будівничим інституцій і вченим європейського рівня, але водночас працював через імперські установи й застарілі наукові категорії; дошка зберігає обидва факти.'
  - '[!decolonization] Краще питання, ніж «чи довів»: навіщо колонізованим народам узагалі потрібні були емпіричні архіви — і що це каже про імперське заперечення їхньої окремішності?'
  section: 'Дискусія та підсумок: Навіщо колонізованим народам емпіричні архіви?'
  words: 700
focus: 'Fedir Vovk (1847-1918) as a Ukrainian ethnographer, anthropologist, archaeologist and folklorist who made Ukrainian ethnographic, folklore and physical-anthropology data visible in European scholarly institutions while Russian imperial policy treated Ukrainian culture as derivative, regional or suspect: the stable claim kept narrow (visibility, not a proven racial thesis), the Hromada milieu and uncensored Shevchenko editions read as civic infrastructure, imperial titles, publication languages and awards kept source-labeled rather than treated as ownership, the physical-anthropology works taught only as history of science with explicit distance from outdated taxonomy, exile 1879-1905 and the 1906 residence ban named as knowledge control, and the 29 June 1918 death date carried with an explicit source caveat.'
level: BIO
module: bio-357
objectives:
- Пояснювати Вовка як українського етнографа, антрополога, археолога й фольклориста, а не як «російського вченого» чи автора однієї расової тези.
- Читати його фізичну антропологію як історію науки з критичною дистанцією до застарілих категорій, а не як нейтральну істину оповідача.
- Тримати імперські інституційні назви, публікаційні мови й нагороди як джерельний контекст, а не як власність над ученим.
- 'Називати механізм тиску конкретно: цензура, поліційний нагляд, вигнання 1879-1905 років, дозвіл 1906 року із забороною жити в Україні, пізніша радянська дискредитація.'
- 'Розділяти три шари його праці: спостережена практика, класифікаційна мова доби й політичне використання науки.'
