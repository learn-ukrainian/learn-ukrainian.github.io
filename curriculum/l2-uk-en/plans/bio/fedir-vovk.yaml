content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому провідний український учений мусив будувати свою
          кар'єру в Парижі, а не в Києві?
      - >-
          [!biography] Федір Вовк - антрополог, етнограф і археолог, автор
          першої науково обґрунтованої концепції українців як окремого
          слов'янського народу.
      - >-
          Природнича освіта: Одеса і Київ, хімія, анатомія, антропологія;
          членство в Київській громаді разом з Драгомановим і Чубинським.
      - >-
          Паризька школа: навчання у Брока, Топінара, Мортільє; перетворення
          вигнання на європейську наукову перевагу.
    section: 'Формування: Від Громади до паризької школи'
    words: 1000
  - points:
      - >-
          Світове визнання: «Шлюбний ритуал та обряди на Україні» (1891-1892),
          видані в Болгарії і Парижі; метод порівняльної етнографії.
      - >-
          Синтез: «Антропологічні особливості українського народу» (1916) -
          доказ окремішності українців як слов'янського народу.
      - >-
          Археологія: один з перших дослідників палеолітичної Мізинської
          стоянки; редагування «Матеріалів до етнології» НТШ.
      - >-
          [!decolonization] Вовк спростовував російську тезу про Україну як
          «південно-західну Росію»; це навчальний центр модуля.
    section: 'Діяльність: Окремішність українців перед європейською наукою'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          Механізм тиску називати прямо: через переслідування 1879 року Вовк
          мусив надовго виїхати за кордон, у Швейцарію і Францію (1879-1905).
      - >-
          [!myth-buster] Застереження: фізико-антропологічні дані Вовка не
          можна сприймати некритично - мала вибірка, прилади доби, расова
          типологія школи; пізніші вчені їх перевершили.
      - >-
          [!anti-hagiography] «Криптадії» - етнографія сексуальності - чутлива
          частина спадщини, перевидана 2018 року; подавати обережно і науково.
    section: 'Контекст: Вимушена еміграція і межі методу'
    words: 1000
  - points:
      - >-
          Повернення додому: на заклик уряду УНР Вовк вирушив з Петербурга в
          Україну, але раптово помер у дорозі 1918 року в Жлобині.
      - >-
          Сучасна пам'ять: вулиці у Львові, Полтаві, Кривому Розі; Центр
          палеоетнологічних досліджень ім. Вовка; оцифрування фонду 2023 року.
      - >-
          Чому важлива саме деколонізаційна теза Вовка для сучасної України.
    section: "Сучасна пам'ять: Учений, що повертався додому"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як наукова праця в еміграції підняла українську
          етнографію і археологію до європейського рівня.
      - >-
          Аргументована відповідь: що робить Вовка важливим - метод, теза про
          окремішність, археологія чи стійкість ученого у вигнанні.
      - >-
          Фінальне письмо: Вовк як приклад української науки, що відповідала
          імперському запереченню нації.
    section: "Дискусія та підсумок: Наука проти імперського заперечення"
    words: 800
focus: >-
  Fedir Vovk as the founder of scientific Ukrainian anthropology and ethnography:
  author of the first grounded concept of Ukrainians as a distinct Slavic people,
  forced into long emigration by Russian-imperial persecution, taught through the
  decolonial refutation of imperial denial while honestly naming the dated limits
  of his physical-anthropology method.
level: BIO
module: bio-335
objectives:
  - >-
      Аналізувати життя і працю Федора Вовка в контексті української
      антропології, етнографії і деколонізаційної науки, уникаючи агіографії
  - >-
      Пояснювати, як порівняльний метод Вовка довів окремішність українського
      народу європейській науці
  - >-
      Пояснювати механізм вимушеної еміграції 1879 року як імперського тиску на
      українську науку
  - >-
      Критично оцінювати межі фізико-антропологічного методу Вовка, не
      перетворюючи його на расову істину
