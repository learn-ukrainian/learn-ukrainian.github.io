content_outline:
- points:
  - 'Провокація: Северин Наливайко — народний месник, що карав панів, чи жорстокий ватажок, що вбивав невинних? Як одна людина
    стала і святим для одних, і демоном для інших?'
  - '[!biography] Його ім''я стало символом першого великого козацького повстання, що сколихнуло Річ Посполиту.'
  section: Розминка
  words: 400
- points:
  - 'Дискусія 1: Погляд сучасників. Для польської шляхти — «злий розбійник», що підлягає знищенню. Для українських селян і міщан
    — «захисник православної віри», що несе справедливість.'
  - 'Дискусія 2: Історіографічна війна. Радянська історіографія применшувала його роль, аби не створювати національних героїв.
    Сучасна українська — бачить у ньому предтечу державності. Російська — ігнорує.'
  - '[!decolonization] Аналіз польських джерел (хроніки) проти українських (народні думи, пізніші твори) — два паралельні
    наративи про одну й ту ж подію.'
  - '[!epistemic-humility] Брак особистих джерел від самого Наливайка змушує істориків робити висновки на основі свідчень
    його ворогів або прихильників. Де правда?'
  section: 'Конфліктна карта: Герой чи бандит?'
  words: 900
- points:
  - 'Походження та рання служба: військовий досвід у приватній армії князя Костянтина Острозького.'
  - 'Найманець у Молдові: участь у походах проти турків як спосіб вивчити військове мистецтво та здобути авторитет.'
  - 'Історичний контекст: криза Речі Посполитої, посилення соціального тиску та конфесійне напруження наприкінці XVI століття.
    Берестейська унія 1596 року не була причиною повстання, яке почалося 1594 року.'
  - 'Особистий мотив: легенда про вбивство батька шляхтичем — чи був бунт також актом особистої помсти?'
  section: 'Формування: Шлях від найманця до повстанця'
  words: 1000
- points:
  - 'Масштаб повстання: від Брацлавщини до Могильова (сучасна Білорусь). Захоплення міст, створення власної адміністрації.'
  - 'Військове мистецтво: широке використання тактики рухомого табору з возів — класична козацька тактика, доведена до досконалості.'
  - 'Організація повстанського руху: захоплення міст, збір загонів і контроль над частиною територій — без приписування
    повстанцям недоведеної конфесійної програми.'
  - '[!decolonization] Повстання як перша спроба козацтва виступити самостійною політичною силою, а не просто служити королю
    чи магнатам.'
  section: 'Діяльність: Повстання 1594-1596 років'
  words: 1300
- points:
  - '[!anti-hagiography] Жорстокість повстанців: погроми шляхетських маєтків, вбивства католицьких священиків та євреїв-орендарів.
    Чи виправдовує мета засоби?'
  - 'Внутрішній конфлікт: боротьба за лідерство з гетьманом Матвієм Шаулою та Григорієм Лободою, що ослабило повстанський
    табір.'
  - 'Солоницька трагедія: поразка в битві, двотижнева облога табору, голод і хвороби. Видача Наливайка полякам в обмін на
    порятунок — акт зради чи відчаю?'
  - '[!myth-buster] Розвінчання міфу про страту в мідному бику. Реконструкція справжньої, не менш жорстокої, страти у Варшаві,
    що мала залякати інших.'
  section: 'Тінь: Жорстокість і трагедія'
  words: 900
- points:
  - 'Повернення до розминки: чи можна дати однозначну відповідь на питання «герой чи бандит»?'
  - 'Символічна спадщина: Наливайко як архетип борця за свободу в українській культурі (Тарас Шевченко, пізніші письменники).'
  - 'Порівняння з Хмельницьким: чому повстання Наливайка зазнало поразки, а Хмельниччина через 50 років — перемогла? Аналіз
    помилок та історичних умов.'
  - 'Сучасне значення: як постать Наливайка використовується сьогодні для обґрунтування історичного права українців на спротив.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The 1594-1596 uprising led by Severyn Nalyvaiko, his transition from mercenary to rebel leader, the Solonytsia
  tragedy, and his contested legacy as a national hero versus a brutal bandit.
level: BIO
module: bio-020
objectives:
- Аналізувати причини, перебіг та наслідки першого великого козацького повстання в Речі Посполитій
- Давати критичну оцінку постаті Северина Наливайка, розрізняючи історичні факти, міфи та ідеологічні інтерпретації
- Пояснювати роль повстання Наливайка у формуванні козацтва як політичної сили та його вплив на подальшу історію України
