content_outline:
  - points:
      - >-
          Провокація: як композитор із села Ялта на Донеччині став одним із
          ключових організаторів сучасного українського музичного життя —
          автором творів і водночас будівничим фестивалів, ансамблів та
          педагогічної школи?
      - >-
          [!biography] Іван Федорович Карабиць (1945-2002) — український
          композитор, педагог і музично-громадський діяч, учень
          Лятошинського і Скорика, засновник тривких інституційних форматів
          незалежної української концертної музики.
      - >-
          Навчальне запитання: чи може спадщина композитора складатися не
          лише з партитур, а й зі сцен, фестивалів, учнів і репертуарних
          можливостей для інших?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебати 1: Карабиць як модерніст-композитор чи як організатор
          музичного життя? Модуль показує, що ці ролі не конкурують:
          інституції були способом дати музиці простір звучання.
      - >-
          Дебати 2: пізньорадянська успішність — компроміс чи тяглість
          української школи? Праця в офіційних структурах, премії та
          посади називаються, але не стирають українського змісту творів.
      - >-
          [!decolonization] Не зводити Карабиця до "радянського композитора".
          Донеччина, Київ, тексти Сковороди, Франка, Тичини й Олійника,
          лінія Лятошинський — Скорик і "Київ Музик Фест" мають бути в центрі.
      - >-
          [!epistemic-humility] Досьє не підтверджує персональної
          безпекової справи, арешту чи заборони. Модуль говорить про
          інституційну рамку і культурну працю, не вигадуючи мучеництва.
    section: 'Конфліктна карта: Модернізм, Донеччина і інституція'
    words: 900
  - points:
      - >-
          Народження 17 січня 1945 року в селі Ялта Донецької області:
          важлива географія для розмови про українську культуру Донбасу
          без анахронічних спрощень і без російського поглинання регіону.
      - >-
          Київська консерваторія: навчання в середовищі Бориса
          Лятошинського і Мирослава Скорика, диплом 1971 року і
          аспірантура у Скорика до 1975 року.
      - >-
          Ранні інституції: ансамбль пісні і танцю Київського військового
          округу та офіційні музичні структури як реальний контекст
          пізньорадянського композитора.
      - >-
          Формативна естетика: український фольклор, дума, протяжна пісня,
          знаменний розспів, барокова хорова пам'ять, джаз, європейський
          модернізм і школа Лятошинського-Скорика.
    section: 'Формування: Донецька Ялта і київська композиторська школа'
    words: 1000
  - points:
      - >-
          Великі твори: "Сад божественних пісень" на тексти Сковороди,
          симфонія "П'ять пісень про Україну", ораторія "Заклинання вогню",
          опера-ораторія "Київські фрески" і концерт "Голосіння".
      - >-
          Тексти як пам'ять: Сковорода, Франко, Тичина і Олійник у творах
          Карабиця створюють міст між українською літературою, філософією
          і сучасною концертною мовою.
      - >-
          Інституційне будівництво: "Київ Музик Фест", "Київська камерата" і
          конкурсна інфраструктура доводять, що композитор може формувати
          не лише твори, а й умови для звучання сучасної музики.
      - >-
          Педагогічна передача: викладання в Київській консерваторії /
          Національній музичній академії, учні і вплив на покоління
          пострадянських українських композиторів.
    section: 'Діяльність: Партитура, фестиваль і школа'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Карабиць працював у радянських і
          пострадянських інституціях, мав офіційні ролі й нагороди. Це
          контекст біографії, не підстава для автоматичного осуду чи
          героїзації.
      - >-
          [!myth-buster] Сучасна музика не означає відрив від української
          традиції. У Карабиця модерні техніки співіснують із фольклорною,
          бароковою, літературною і хоровою пам'яттю.
      - >-
          Донеччина не повинна зникати за київською кар'єрою. Регіональне
          походження і твори, пов'язані з Донбасом, допомагають говорити
          про українську культурну присутність сходу.
      - >-
          Не додавати неперевірених етнічних або родинних деталей: досьє
          позначає деякі публічні твердження як кандидатні, але не робить
          їх основою плану без Tier 1/Tier 2 підтвердження.
    section: 'Тінь: Офіційна рамка і ризик спрощення модернізму'
    words: 900
  - points:
      - >-
          Повернення до розминки: студент пояснює, чому Карабиць важливий
          не тільки як автор партитур, а і як організатор сцен, фестивалів,
          ансамблів і педагогічної передачі.
      - >-
          Порівняння зі Скориком і Станковичем: три постаті показують
          безперервність української композиторської школи від пізнього СРСР
          до незалежності.
      - >-
          Деколонізаційний висновок: українська сучасна концертна музика
          не є периферією імперського центру; вона має власні регіони,
          тексти, школи, інституції і пам'ять.
    section: 'Дискусія та підсумок: Композитор як будівничий простору звучання'
    words: 700
focus: >-
  Іван Карабиць як український композитор і інституційний будівничий:
  донеччанин, учень Лятошинського і Скорика, автор вокально-симфонічних і
  оркестрових творів на українські тексти, педагог, організатор "Київ Музик
  Фест" і "Київська камерата", приклад модерної української музики без
  редукції до радянської рамки.
