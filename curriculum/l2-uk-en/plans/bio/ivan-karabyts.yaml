objectives:
  - >-
      Аналізувати Івана Карабиця як композитора, педагога та інституційного
      діяча сучасної української концертної музики
  - >-
      Пояснювати зв'язок між Донеччиною, київською школою Лятошинського-
      Скорика, українськими літературними текстами і модерними техніками
  - >-
      Критично оцінювати радянську і пострадянську інституційну рамку без
      вигаданого репресивного або суто офіційного сюжету
  - >-
      Формулювати деколонізаційне прочитання українського модернізму як
      власної композиторської традиції, а не периферії імперського центру
