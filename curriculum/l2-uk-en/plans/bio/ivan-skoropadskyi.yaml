content_outline:
- points:
  - 'Провокація: гетьман, обраний під прямим тиском Петра I за кілька днів після зруйнування Батурина; що просив підтвердити козацькі «права і вольності» — а чиє військо віддали під російське командування; що опікувався Києво-Могилянською академією — і за чийого правління обмежили друк, а в останній рік у його ж столиці постала Малоросійська колегія. Імперська пам''ять робить його доказом, що «розсудлива» козацька верхівка прийняла інкорпорацію. Що цей ярлик показує, а що ховає?'
  - '[!biography] Знайомство з постаттю: починаємо із задокументованих урядів (стародубський полковник, генеральний осавул, лівобережний гетьман), а не з вигаданого дитинства; походження роду джерелочутливе.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: примушений гетьман і обмежений оборонець інституцій — обраний під царським тиском після Батурина, він клопотав через Решетилівські статті, видавав універсали, опікувався академією й намагався зберегти гетьманську процедуру.'
  - 'Позиція 2: слухняне знаряддя й старшина-набувач маєтків — гетьман слухняної лівобережної структури, з військовою роллю під Полтавою, залежністю від Петрового визнання, накопиченням маєтків і межами власного спротиву.'
  - '[!decolonization] Імперська пам''ять робить його доказом, що «розсудлива» верхівка прийняла інкорпорацію; героїчне спрощення — рятівником автономії. Обидві рамки ховають післяполтавську втрату поля дії й обмежену суб''єктність, яку він усе ж виявляв усередині цієї втрати.'
  - '[!epistemic-humility] Походження роду джерелочутливе (Гуржій застерігає і проти «чужоземного шляхетського імпорту», і проти «простої місцевої старшинської лінії»); могилянська освіта — довідкова традиція; глухівське обрання було водночас старшинською процедурою й примусом.'
  section: 'Конфліктна карта: Слухняний намісник чи гетьман зі звуженим полем дії'
  words: 900
- points:
  - 'Походження: народився 1646 року в уманськопов''язаному роді Скоропадських; пізніші претензії на шляхетство джерелочутливі — не відкриваємо модуль вигаданою «сценою дитинства».'
  - '1674 рік: після османсько-татарського зруйнування Умані він із братом Василем перейшов на службу до Лівобережної Гетьманщини.'
  - 'Канцелярсько-дипломатична кар''єра: військова канцелярія за Самойловича (1675-1676), чернігівський полковий писар (1681-1694), генеральний бунчужний (1698), другий генеральний осавул (1701); місії до Москви, Криму, Польщі й на Січ — досвідчений урядовець, а не привнесене призначення.'
  - '1687-1689: пережив падіння Самойловича (як військова невдача, старшинські інтереси й московське втручання могли скинути гетьмана) і дістав універсали Мазепи на маєтності (1687, 1690) — його зв''язок із Мазепою був адміністративний і патронатний, а не вигаданий 1708 року.'
  - '1706 рік: призначений стародубським полковником — одне з найважливіших північних командувань, коли Північна війна пересувалася через регіон.'
  section: 'Формування: Від уманського роду до стародубського полковника'
  words: 1000
- points:
  - 'Жовтень-листопад 1708 року: розрив Мазепи з Петром I, зруйнування Батурина й терор проти підозрюваних прибічників Мазепи лишили Стародуб і Глухів у примусовому полі — поведінку Скоропадського тут читаємо джерелочутливо: він не був ані вільний від тиску, ані без суб''єктності.'
  - '6(17) листопада 1708 року: обраний і поставлений на старшинській раді в Глухові; Павло Полуботок фігурує як альтернативний кандидат, але воля Петра допомогла вирішити наслідок — «обраний» і «нав''язаний під примусом» належать обидва.'
  - '1709 рік: разом із козацькими силами воював на боці Петра в Полтавській кампанії; його вірні загони брали участь у відрізанні можливого шведського відступу до Дніпра — це військовий факт і примусово-політичний контекст, а не простий моральний присуд.'
  - '17(28) липня 1709 року: подав 14-пунктні Решетилівські («Просительні») статті з проханням підтвердити «прав, вольностей і порядків військових» та практичні гарантії; відповідь Петра підтвердила частину формул у принципі, але зберегла російське командування, залоги й фіскальний контроль — це документальний спротив у полі, що звужувалося, а не успішне відновлення.'
  - '1710 рік: формальне затвердження його гетьманства відклали, доки Петро не перевірив вірність і не закріпив післяполтавське поле.'
  - 'Меценатство: тривала підтримка Києво-Могилянської академії (Ядлівка 1714, Мотовилівка 1720) і універсал 1717 року на захист жінки, чий син був у османському полоні — це ниті патронату й соціального захисту, а не доказ широкої соціальної політики.'
  section: 'Діяльність: Глухівське обрання, Полтава й Решетилівські статті'
  words: 1300
- points:
  - '[!anti-hagiography] Меценатство й маєткова політика разом: той самий уряд, що клопотав про автономію, накопичував власність і діяв усередині старшинської маєткової політики; оборона старшинських прав не означала широкого полегшення для народу; маєтковий вплив Анастасії Маркович належить сюди лише із джерельними засторогами, а не як плітка.'
  - 'Резидентський нагляд: упродовж 1710-х козацьке військо було під російським командуванням, артилерію й ресурси вилучали, російські війська розквартировували коштом місцевих, вищі уряди підлягали царському затвердженню, а столиця стояла в Глухові під російським резидентом — це нагляд і примус, а не нейтральна порада.'
  - 'Культурна інкорпорація: обмеження друку 1720 року й тиск на Києво-Могилянську академію стягнули культурний вимір його останніх років.'
  - '[!myth-buster] 27 травня 1722 року Петро I заснував у Глухові Малоросійську колегію для нагляду за гетьманом і старшиною, а по смерті Скоропадського вона узурпувала важливі повноваження — тримаємо «Малоросійську колегію» як імперську наглядову інституцію під аналізом, а не як нейтральну модернізацію.'
  section: 'Тінь: Резидентський нагляд, маєтки й Малоросійська колегія'
  words: 900
- points:
  - 'Повернення до розминки: які вибори були його власними, які нав''язало післяполтавське середовище, а які захищали інституції лише тимчасово?'
  - 'Наступність: він помер 3(14) липня 1722 року в Глухові (похований у Гамаліївці); його смерть відкрила кризу наказного гетьманства й колегії, що прямо веде до ув''язнення Павла Полуботка й контрольованого відновлення Данила Апостола — не відриваємо його від цієї послідовності.'
  - 'Парний шлях: Орлик обрав вигнансько-конституційний шлях, тоді як Скоропадський лишився на обмеженому лівобережному — це урок про розбіжні стратегії виживання після Полтави.'
  - '[!decolonization] Відділяймо джерельно засвідченого обмеженого урядовця від спрощень «слухняний намісник» і «рятівник автономії»; тримаймо разом примус і обмежену суб''єктність.'
  section: 'Дискусія та підсумок: Порожнє поле дії, наступність і пам''ять'
  words: 700
focus: Ivan Skoropadskyi as the constrained Left-Bank hetman after Mazepa and Poltava (1708-1722) — the Uman origin and Left-Bank move, the chancery-diplomatic career to Starodub colonel, the coerced Hlukhiv election of 1708, the military role at Poltava, the Reshetylivka petition that preserved rights language without reversing Peter's policy, the resident oversight and troop quartering, the estate and academy patronage, and the 1722 Little Russian Collegium that hollowed the hetman office in his own capital.
