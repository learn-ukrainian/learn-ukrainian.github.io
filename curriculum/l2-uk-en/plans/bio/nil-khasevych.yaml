content_outline:
- points:
  - >-
    [!biography] Знайомство з Нілом Хасевичем: видатний український графік,
    майстер деревориту та екслібриса, що став головним художником УПА.
  - >-
    Особистий шлях: втрата ноги в юності, навчання у Варшавській академії
    мистецтв, міжнародне визнання у 1930-х роках.
  section: Розминка
  words: 400
- points:
  - >-
    Мистецтво як комунікація: використання графіки для передачі політичних
    смислів у масових масштабах ("20 років боротьби ОУН").
  - >-
    Доробок у підпіллі: створення понад 150 повстанських дереворитів,
    дизайн бофонів, печаток та військових відзнак УПА.
  - >-
    [!epistemic-humility] Сила візуального свідчення: здатність графіки перетинати
    кордони і робити радянські репресії видимими для міжнародної спільноти.
  section: 'Діяльність: Графічна зброя УПА'
  words: 1000
- points:
  - >-
    [!anti-hagiography] Оцінка спадщини в повному контексті: Хасевич як талановитий
    митець і пропагандист збройного підпілля ОУН та УПА.
  - >-
    Полювання спецслужб: радянська держбезпека бачила у його роботах серйозну
    інформаційну загрозу режиму.
  - >-
    Загибель: 4 березня 1952 року Ніл Хасевич загинув у бою з оперативною групою
    МДБ СРСР поблизу села Сухівці на Рівненщині.
  - >-
    [!decolonization] Розвінчання радянського міфу про УПА як про "бандитів" через
    призму високопрофесійної візуальної культури опору.
  section: 'Тінь: Полювання МДБ на художника'
  words: 1200
- points:
  - >-
    Значення сьогодні: Хасевич як символ незламної сили духу та творець 
    візуального міфу УПА.
  - >-
    Збереження пам'яті через видані посмертно альбоми графіки та екслібрисів.
  section: 'Підсумок: Мистецтво, що не здається'
  words: 800
