content_outline:
- points:
  - >-
    [!biography] Знайомство з Нілом Хасевичем: український графік, майстер деревориту
    та екслібриса; псевдоніми підпілля (Бей-Зот, 333, Левко та ін.).
  - >-
    Провокаційне питання: чому радянська держбезпека полювала на художника з різцем
    так само ретельно, як на командирів?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 25 листопада 1905 у Волині; втрата ноги в юності — [!anti-hagiography]
    не зводити інвалідність до сентименту, а до агентності: технічна мова, яку
    вважали операційно небезпечною.
  - >-
    Навчання у Варшаві; міжнародне визнання на виставці деревориту (1937); альбоми
    екслібрисів (1939, Варшава та Філадельфія).
  - >-
    [!decolonization] Перехід у підпілля: графіка як відтворювана «зброя» — листівки,
    сатиричні журнали, печатки, відзнаки; радянський наратив «бандитської агітації»
    не замінює аналізу мистецтва.
  section: 'Формування: Варшава, екслібрис і міжнародне визнання'
  words: 1000
- points:
  - >-
    Понад 150 повстанських дереворитів; дизайн бофонів, печаток, військових відзнак
    УПА; гравюра «20 років боротьби ОУН» (1949 за підручниковим датуванням).
  - >-
    Візуальна інфраструктура опору: друк перетинає кордони, робить репресії видимими;
    [!epistemic-humility] повні листи з цитатою «Я не можу битися зброєю» — перевірити
    первинне джерело перед дослівним цитуванням у вправах.
  - >-
    [!anti-hagiography] Хасевич — і талановитий митець, і пропагандист збройного
    підпілля ОУН/УПА; обидва ярлики необхідні для NPOV.
  - >-
    Три рівні читання гравюри: формальний дизайн, підпільна комунікація, політичний
    міф — що зображення випускає за кадром (Волинь, Голокост, примус)?
  section: 'Діяльність: Графічна зброя УПА'
  words: 1200
- points:
  - >-
    Радянський страх перед образом: МДБ бачило в графіці інформаційну загрозу режиму,
    не «естетику».
  - >-
    Загибель 4 березня 1952 у бою з оперативною групою МДБ СРСР поблизу Сухівців
    (Рівненщина); [!decolonization] не «бандит», а ліквідований митець опору.
  - >-
    [!myth-buster] Розвінчування радянського міфу про «злочинну агітацію» без
    нейтралізації політичного насилля УПА — модуль має поєднуватися з hist-upa
    та istorio-volyn-pamiat-i-travma.
  - >-
    Доступність і мова: уникати мови жалю; акцент на відтворюваних засобах боротьби
    з радянським стиранням.
  section: 'Тінь: Полювання МДБ на художника'
  words: 1600
- points:
  - >-
    Посмертні альбоми графіки та екслібрисів; місце в пам'яті УПА й українського
    мистецтва.
  - >-
    Сучасне читання: майстер деревориту, убитий спецслужбою; урок про силу візуального
    свідчення й про межі пропагандистського кадру.
  - >-
    [!epistemic-humility] Оперативний документ на дію 1952 року в досьє не відновлено —
    не вигадувати номер справи.
  section: 'Підсумок: Мистецтво, що не здається'
  words: 1000
focus: >-
  Ніл Хасевич як творець візуального образу Української повстанської армії,
  майстер-графік, що загинув у протистоянні з радянськими спецслужбами,
  залишивши потужну мистецьку спадщину в повному політичному контексті.
