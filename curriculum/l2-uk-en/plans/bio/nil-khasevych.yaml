objectives:
- Розуміти місце Ніла Хасевича в історії українського мистецтва та підпільного руху.
- Аналізувати візуальні елементи його гравюр як форму політичної комунікації.
- Досліджувати механізм радянського переслідування митців, чия «зброя» була графічною.
- Тримати баланс між визнанням мистецької майстерності та критикою пропаганди збройного підпілля.
