content_outline:
- points:
  - >-
    [!biography] Знайомство з Нілом Хасевичем: український графік, майстер
    деревориту та екслібриса. ЕСУ подає перелік псевдонімів і криптонімів
    прямим текстом: Бей-Зот, 333, Левко, Рибалка, Старий, Джміль, КВ-37, З-14,
    85-10 — це метадані підпільної праці, які наводимо з атрибуцією до ЕСУ.
  - >-
    Відкрите питання: що саме ухвалені джерела документують про пошук і
    оточення криївки 1952 року — і де закінчується документ, а починається
    реконструкція?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 25 листопада 1905 у Волині; втрата ноги в юності — [!anti-hagiography]
    не зводити інвалідність до сентименту, а до агентності: технічна мова, яку
    вважали операційно небезпечною.
  - >-
    Навчання у Варшаві; міжнародне визнання на виставці деревориту (1937); альбоми
    екслібрисів (1939, Варшава та Філадельфія).
  - >-
    [!decolonization] Перехід у підпілля: графіка як відтворювана «зброя» — листівки,
    сатиричні журнали, печатки, відзнаки; радянський наратив «бандитської агітації»
    не замінює аналізу мистецтва.
  section: 'Формування: Варшава, екслібрис і міжнародне визнання'
  words: 1000
- points:
  - >-
    Понад 150 повстанських дереворитів (ЕСУ; НІБУ подає «близько 150» — порядок
    величини узгоджений, точного числа не стверджуємо); дизайн бофонів, печаток,
    бланків і проєктів військових відзнак УПА. Найвідоміші дереворити за
    переліком ЕСУ: «До зброї», «За Українську Самостійну Соборну Державу»,
    «Ми стали волі на сторожі», «Воля народам, воля людині».
  - >-
    [!epistemic-humility] Візуальна інфраструктура опору: ЕСУ подає, що Хасевич
    керував понад 20 підпільними друкарнями, написав підручник з графіки й
    заснував школу різьбярів у підпіллі. Дослівних цитат Хасевича з точним
    первинним локатором ухвалені джерела не подають — тож модуль не цитує його
    прямою мовою й не будує вправ на неатрибутованих фразах.
  - >-
    [!anti-hagiography] Хасевич — і талановитий митець, і пропагандист збройного
    підпілля ОУН/УПА; обидва ярлики необхідні для NPOV.
  - >-
    Три рівні читання гравюри: формальний дизайн, підпільна комунікація, політичний
    міф — що зображення випускає за кадром (Волинь, Голокост, примус)?
  section: 'Діяльність: Графічна зброя УПА'
  words: 1200
- points:
  - >-
    [!epistemic-humility] Мотивів і наказів радянської держбезпеки ухвалені
    джерела не подають. НІБУ описує конкретний задокументований хід: у
    захопленому бункері знайшли зашифровані документи, шифровка вказала адресу,
    хутір оточили. Це те, що подає джерело; про те, що «МДБ бачило в графіці
    загрозу», сторінки не пишуть, і ми цього не стверджуємо.
  - >-
    Загибель 4 березня 1952 року поблизу Сухівців (Рівненський район,
    Рівненщина): ЕСУ формулює «загинув у бою із оперативною групою міністерства
    державної безпеки СРСР», УІНП — перестрілка з підрозділами МДБ, місце
    поховання невідоме. [!decolonization] Радянський ярлик «бандит» називаємо
    ярликом слідства й пропаганди — і не замінюємо його зустрічним гаслом:
    Хасевич був графіком і членом підпілля ОУН, і обидві ролі подаємо за
    джерелами, без героїчної бінарності.
  - >-
    [!myth-buster] Розвінчування радянського міфу про «злочинну агітацію» без
    нейтралізації політичного насилля УПА — модуль має поєднуватися з hist-upa
    та istorio-volyn-pamiat-i-travma.
  - >-
    Доступність і мова: уникати мови жалю; акцент на відтворюваних засобах боротьби
    з радянським стиранням.
  section: 'Тінь: Криївка під Сухівцями, 1952'
  words: 1600
- points:
  - >-
    Посмертні альбоми графіки та екслібрисів; місце в пам'яті УПА й українського
    мистецтва.
  - >-
    Сучасне читання: майстер деревориту, убитий спецслужбою; урок про силу візуального
    свідчення й про межі пропагандистського кадру.
  - >-
    [!epistemic-humility] Оперативний документ на дію 1952 року в досьє не відновлено —
    не вигадувати номер справи.
  section: 'Підсумок: Мистецтво, що не здається'
  words: 1000
focus: >-
