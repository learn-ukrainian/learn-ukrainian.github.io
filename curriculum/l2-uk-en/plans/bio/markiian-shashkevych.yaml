objectives:
  - >-
      Аналізувати життя і працю Маркіяна Шашкевича в контексті
      західноукраїнського національного відродження, уникаючи агіографії
  - >-
      Пояснювати роль «Руської трійці» і «Русалки Дністрової» у становленні
      нової української літератури Галичини
  - >-
      Пояснювати механізм габсбурзько-галицької цензури і «азбучну війну» як
      боротьбу за мовну суверенність
  - >-
      Формулювати аргументовану позицію щодо ролі Шашкевича як будителя
      національної свідомості
