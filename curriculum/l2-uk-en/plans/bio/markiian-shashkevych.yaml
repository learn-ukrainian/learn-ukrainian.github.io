content_outline:
- points:
  - 'Провокація: як троє галицьких семінаристів однією тоненькою книжкою народною мовою кинули виклик припущенню, що освічені русини мають писати церковно-книжною, польською чи латинізованою мовою?'
  - '[!biography] Знайомство з постаттю священника, поета й перекладача: організатор «Руської трійці», укладач альманаху «Русалка Дністровая» (Буда, 1836/1837), автор полеміки проти латинізації українського письма.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (жива народна мова): Шашкевичева праця — не лише «романтичний націоналізм», а виклик церковно-книжним, польським і мішаним формам; він обстоював народну мову, фонетичний правопис, гражданку й проповідь для народу.'
  - 'Позиція 2 (не міф одного тексту): «Русалка Дністровая» центральна, але поряд — фольклорні збірки, абеткова полеміка «Азбука і abecadlo» (1835), переклади й читанка для дітей (видана посмертно 1850 року).'
  - '[!decolonization] «Русь», «руський», «русин» у цьому матеріалі — галицько-українське самоназвання; не модернізуємо їх у «російське» й не стираємо, а вчимо семантичний зсув відкрито.'
  - '[!epistemic-humility] Дату друку альманаху тримаємо як «1836/1837»: IEU датує друк груднем 1836, а титул і публічна пам''ять — 1837 роком.'
  section: 'Конфліктна карта: Один альманах чи ціла програма?'
  words: 900
- points:
  - 'Походження й освіта: 6 листопада 1811 року, Підлисся; греко-католицька священницька родина; навчання в Золочеві, Львові й Бережанах, а тоді у Львівському університеті / греко-католицькій духовній семінарії (випуск 1838 року).'
  - '«Руська трійця»: разом з Іваном Вагилевичем і Яковом Головацьким Шашкевич творив осередок галицького народного відродження; рукописні збірки «Син Русі» (1833) і «Зоря» (1834) не вийшли друком через цензуру.'
  - '[!decolonization] Семінарські мережі й сільські парафії читаємо як культурну інфраструктуру перед 1848 роком, а не як периферію; програма спиралася на живу розмовну основу проти вченої мішаної мови.'
  section: 'Формування: Семінарія, Львів і «Руська трійця»'
  words: 1000
- points:
  - '«Русалка Дністровая» (Буда, 1836/1837): альманах «Руської трійці», надрукований у Буді, а не у Львові, щоб оминути місцеву цензуру; фольклор, поезія та передмова з фонетичним правописом.'
  - 'Абеткова політика: брошура «Азбука і abecadlo» (1835) проти латинізації українського письма — ключове джерело галицького мовного питання про кирилицю проти латинки.'
  - 'Поезія й переклади: «Веснівка», «Погоня» та інші лірично-історичні поезії; один із ранніх перекладачів «Слова о полку Ігоревім» українською, перекладав із сербської, чеської, польської, грецької, латини й німецької.'
  - '[!decolonization] Гасло правопису «пиши як чуєш, а читай як видиш» подаємо як історичну орфографію та аргумент про народну мову, а не як взірець сьогоднішнього письма; учні порівнюють старий і сучасний запис.'
  - 'Читанка й проповідь: «Читанка для малих дітей» (видана посмертно 1850 року Головацьким) і проповіді народною мовою показують ширшу програму, ніж один альманах.'
  section: 'Діяльність: «Русалка Дністровая», абетка й переклади'
  words: 1300
- points:
  - '[!anti-hagiography] Механізм тиску — не арешт чи заслання, а цензура й конфіскація: за IEU 800 з 1000 примірників «Русалки Дністрової» конфісковано, а галицьку заборону пов''язують із цензором Венедиктом Левицьким; заборона тривала до 1848 року.'
  - 'Матеріальна вразливість: останні роки Шашкевича позначені бідністю й сухотами — це вразливість сільського греко-католицького священника й культурного організатора, а не вигадана тюрма чи заслання.'
  - '[!decolonization] «Не галицьке русофільство»: несучасні узагальнення сплощують добу в русофільські категорії; тут визначальне — Шашкевичева українська народномовна програма, а не пізніша політична русофільська орієнтація.'
  - '[!epistemic-humility] Старописьмові уривки («Судило нам ся послїдним бути», німецький підзаголовок «Ruthenische Volks-Lieder») подаємо як текст-свідок із застереженням, а не як сучасний взірець правопису.'
  section: 'Тінь: Цензура, бідність і сухоти'
  words: 900
- points:
  - 'Повернення до розминки: чому народна мова, фонетичний правопис і абеткова полеміка — це інфраструктура мовної спільноти, а не лише романтичний жест?'
  - 'Ширша програма: фольклор, граматично-словникова праця, проповіді, переклади й читанка показують, що «Русалка Дністровая» не робить усієї історичної роботи сама.'
  - '[!anti-hagiography] Шашкевич — один організатор із трьох; поряд Вагилевич і Головацький, а перепоховання на Личакові (1893) і монументи належать до окремої рамки пам''яті.'
  - '[!decolonization] Панславістський романтичний контекст тримаємо поза російсько-імперською рамкою; «Руська трійця» бачила русинів Галичини, Буковини й Закарпаття частиною одного українського народу.'
  section: 'Дискусія та підсумок: Мова, пам''ять і переховання'
  words: 700
focus: 'Markiian Shashkevych (1811-1843) as a Greek-Catholic priest, poet, translator and organizer of the Ruthenian Triad who drove the Galician shift from church-bookish and Latinized forms toward a living Ukrainian vernacular, phonetic Cyrillic, sermons, folklore collection and schoolbooks: ''Rusalka Dnistrovaia'' (1836/1837) taught as central but not the whole biography, the pressure mechanism kept specific (Habsburg censorship and confiscation, seminary limits, poverty and tuberculosis) with no invented arrest or martyrdom, and ''Rus''/''ruskyi''/''rusyn'' explained as Galician Ruthenian/Ukrainian self-description rather than ''Russian'', with the Pan-Slav Romantic context kept out of an imperial frame.'
level: BIO
module: bio-355
objectives:
- Пояснювати Шашкевича як священника, поета, перекладача й організатора «Руської трійці», що вів Галичину до живої української народної мови й фонетичного правопису.
- 'Тримати «Русалку Дністровую» центральною, але не єдиною: фольклор, абеткова політика, проповіді, переклади й читанка — ширша мовна програма.'
- 'Називати механізм тиску конкретно: габсбурзька цензура й конфіскація, семінарські обмеження, бідність і сухоти — без вигаданого арешту чи мучеництва.'
- Пояснювати «Русь» / «руський» / «русин» як галицько-українське самоназвання XIX століття, а не як «російське», і не стирати цих слів.
- Тримати романтично-панславістський контекст поза російсько-імперською рамкою; «Руська трійця» вважала галицьких, буковинських і закарпатських русинів частиною одного українського народу.
