content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому першу українську книжку Галичини довелося друкувати
          в Угорщині, а не вдома?
      - >-
          [!biography] Маркіян Шашкевич - галицький «будитель», священник,
          поет і організатор «Руської трійці», зачинатель нової української
          літератури в Галичині.
      - >-
          Походження і освіта: родина греко-католицького священника, навчання
          у Львові, духовна семінарія, самоосвіта в Оссолінеумі.
      - >-
          Перша промова українською мовою в семінарії (1836) і боротьба за
          право церковної проповіді рідною мовою.
    section: 'Формування: Підлисся, Львів і семінарія'
    words: 1000
  - points:
      - >-
          «Руська трійця»: Шашкевич, Іван Вагилевич, Яків Головацький; гурток
          національно свідомої молоді і програма народної мови в письменстві.
      - >-
          «Русалка Дністровая» (1837): перший український фольклорно-літературний
          альманах Галичини, надрукований у Буді.
      - >-
          «Азбука і абецадло» (1836) і «азбучна війна»: захист кирилиці проти
          проєкту латинки для української мови.
      - >-
          [!decolonization] «Руська мова» доби Шашкевича - це українська
          народна мова, а не російська; розрізнити терміни для студентів.
    section: 'Діяльність: «Руська трійця» і нова література'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
    points:
      - >-
          Механізм тиску називати прямо: габсбурзька цензура заборонила «Зорю»
          (1834), а «Русалку Дністровую» (1837) конфіскували - вціліло близько
          сотні примірників.
      - >-
          Коротке і важке життя: виключення з семінарії, розрив з батьком,
          бідність, рання смерть від туберкульозу 1843 року - без агіографії.
      - >-
          [!anti-hagiography] Окремо: під час російської окупації Львова в
          Першу світову та за радянської влади нищили меморіальні таблиці
          Шашкевича - імперський і радянський напад на пам'ять.
    section: 'Контекст: Цензура, бідність і рання смерть'
    words: 1000
  - points:
      - >-
          Посмертна слава «будителя»: перепоховання 1893 року на Личаківському
          цвинтарі, пам'ятники, музеї, шкільні хрестоматії.
      - >-
          «Веснівка» в українській культурній пам'яті: романтична лірика, що
          стала народною піснею (музика А. Кос-Анатольського).
      - >-
          Чому Шашкевича називають галицьким відповідником Шевченка як
          національного пророка.
    section: "Сучасна пам'ять: Будитель Галичини"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як мовна суверенність (кирилиця, народна мова,
          друковане слово) стала основою національного пробудження.
      - >-
          Аргументована відповідь: що робить Шашкевича важливим - поезія,
          альманах, захист абетки чи організація руху.
      - >-
          Фінальне письмо: Шашкевич як приклад культурної дії під цензурою.
    section: "Дискусія та підсумок: Мова як суверенність"
    words: 800
focus: >-
  Markiian Shashkevych as the leader of the «Руська трійця» and founder of the
  new Ukrainian literature in Galicia: initiator of «Русалка Дністровая» (1837),
  defender of the Cyrillic alphabet, and "будитель" of the West Ukrainian
  national awakening under Habsburg-Galician censorship, taught through language
  sovereignty and vernacular literature.
