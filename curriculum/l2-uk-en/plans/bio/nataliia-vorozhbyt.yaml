objectives:
- Аналізувати внесок Наталії Ворожбит у сучасну українську драму, документальний театр і воєнне кіно
- Пояснювати етичні ризики роботи зі свідченням, травмою, сексуальним насильством і вимушеним переселенням
- Розрізняти біографічну мовну історію, джерельну романізацію і learner-facing українську ідентичність постаті
- Оцінювати «Погані дороги» та інші твори як складні форми свідчення без героїзації й без травматичного видовища
