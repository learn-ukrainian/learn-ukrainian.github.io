content_outline:
- points:
  - 'Провокація: коли свідчення про війну звучить зі сцени, воно стає ближчим до правди чи небезпечніше наближається до видовища?'
  - '[!biography] Наталія Ворожбит — українська драматургиня, сценаристка, режисерка й кураторка, яка стала однією з ключових постатей сучасної української драми та воєнного кіно.'
  - '[!epistemic-humility] Це жива авторка: поточні проєкти, місця проживання, постановки й нагороди потрібно перевіряти на момент побудови модуля.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: документальний театр Ворожбит дає мову тим, кого часто не чують, і робить Голодомор, Майдан, Донбас та вимушене переселення видимими в українській і світовій культурі.'
  - 'Позиція 2: сцена й екран можуть перетворити травму, сексуальне насильство й страх на естетичний продукт для глядача.'
  - '[!decolonization] Московське навчання й російськомовні етапи біографії не є центром інтерпретації; фокус — українська драматургія, російська агресія й українська агентність.'
  - '[!epistemic-humility] Мову твору, дату постановки, театральний контекст і воєнний момент не можна змішувати в одну оцінку авторки.'
  section: 'Конфліктна карта: Свідчення на сцені чи експлуатація травми?'
  words: 900
- points:
  - 'Київське походження, літературна освіта в Москві й повернення до Києва після 2004 року як кар''єрна хронологія, а не російськоцентрична ієрархія.'
  - 'Формування в середовищі «нової драми», де документальність, жива мова, соціальний конфлікт і вербатім стають інструментами театру.'
  - 'Topical Play Week, Театр переселенця, Playwrights Theatre і Class Act як приклади інституційної розбудови, а не лише особистих текстів.'
  - 'Мова як історично змінна практика: не робимо з російської мови автоматичного маркера лояльності чи культурної власності.'
  section: 'Формування: Нова драма, Київ і документальна форма'
  words: 1000
- points:
  - '«Зерносховище» / «The Grain Store»: Голодомор у театрі як пам''ять про голод, зерно, державне насильство й право української історії звучати поза радянськими рамками.'
  - '«Maidan Diaries» і Театр переселенця: документальний театр як робота зі свідченням, громадянським тілом і кризою довіри.'
  - '«Погані дороги»: війна в Донбасі, сіра зона, гендероване насильство, страх і моральна небезпека дороги як простору без простих відповідей.'
  - 'Сценарна робота: «Кіборги», «Дике поле», «Спіймати Кайдаша» й «Зелені коридори» показують перехід між війною, літературною адаптацією, телебаченням і повномасштабним переселенням.'
  section: 'Діяльність: Голодомор, Майдан, Донбас і дороги свідчення'
  words: 1300
- points:
  - '[!anti-hagiography] Ворожбит не треба викладати як автоматичну «голос війни»: її тексти ставлять незручні питання про владу автора, глядача й сцени над чужим болем.'
  - 'Сексуальне насильство, страх і переміщення потребують попередження про зміст і відповідальної педагогіки; не просимо студентів «зіграти травму» як вправу.'
  - 'Шевченківська премія 2022 року стосується сценічної постановки «Погані дороги» й була командною; не подаємо її як одноосібну нагороду за фільм.'
  - 'Різні романізації і професійне ім''я Natalka/Nataliia/Natalya мають лишатися пошуковими примітками, а не причиною плутанини в learner-facing тексті.'
  section: 'Тінь: Мова, травма й відповідальність драматургині'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює три умови, за яких свідчення на сцені не стає експлуатацією.'
  - '[!decolonization] Ворожбит важлива тим, що український театр і кіно говорять про Голодомор, Майдан, Донбас і вторгнення власною формою, а не як додаток до чужої регіональної рамки.'
  - 'Порівняння: з Іриною Цілик — камера й документальна етика; з Сергієм Жаданом — Донбас, мова й адаптація; з історією Голодомору — пам''ять і театральна форма.'
  - 'Фінальна вправа: скласти етичну пам''ятку для аналізу сцени з воєнної драми без травматичного видовища.'
  section: 'Дискусія та підсумок: Як сцена відповідає за свідчення'
  words: 700
focus: Наталія Ворожбит як жива українська драматургиня, сценаристка, режисерка й організаторка поля, чиї документальний театр і воєнне кіно працюють із пам'яттю про Голодомор, свідченнями Майдану, Донбасом, переміщенням і російською агресією, потребуючи обережного трактування мовної історії, сценічної травми та командної атрибуції нагород.
