- Аналізувати жіночий рух і міжнародні конгреси як політичну інфраструктуру української репрезентації, а не як доброчинність
- 'Утримувати антиагіографію: розрізняти програмні гасла й те, що реально вдалося здійснити під час війни, цензури та еміграції'
