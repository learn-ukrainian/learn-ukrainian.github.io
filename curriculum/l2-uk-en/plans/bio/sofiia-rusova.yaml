content_outline:
- points:
  - 'Провокація: як дошкільне виховання — на перший погляд «мала історія» — стає національною політикою, коли держава контролює, якою мовою можна вчити дітей?'
  - '[!biography] Знайомство з педагогинею, редакторкою й громадською діячкою: від першого дитячого садка в Києві до департаменту освіти УНР і празької еміграції.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (педагогиня-державотворець): Русова будувала українську освіту як інституцію — садки, недільні школи, бібліотеки, учительські спілки, департамент міністерства, а не лише як «жінку в політиці».'
  - 'Позиція 2 (деколонізаційна): рамка — українська національна освіта, мережі Старої громади, Українська революція, освітня політика УНР та жіноча міжнародна адвокатура, а не загальна «російська ліберальна педагогіка».'
  - '[!decolonization] Заклик до українськомовної школи належить до того самого поля, що й державотворення; це політичний проєкт, а не нейтральна методика.'
  - '[!epistemic-humility] Шведсько-французьке походження роду Ліндфорсів — родинний факт, а не пояснювальний ключ до її української громадянсько-політичної ідентичності; кількість обшуків і арештів подаємо з позначкою джерела.'
  section: 'Конфліктна карта: Дитячий садок — «мала історія» чи національна політика?'
  words: 900
- points:
  - 'Походження й освіта: народжена 1856 року в Олешні на Чернігівщині у багатомовній родині Ліндфорсів; випускниця київської гімназії.'
  - 'Перший садок: на початку 1870-х разом із сестрою Марією відкрила один із перших дитячих садків у Києві — українськомовний і дитиноцентричний.'
  - 'Мережі: шлюб з Олександром Русовим (1874) увів її в коло Старої громади й етнографічно-статистичної праці, але вона не «додаток» до чоловіка.'
  - 'Цензура й рух: підготовка нецензурованого «Кобзаря» в Празі (1876) з Федором Вовком, мандрівна громадська праця (Чернігівщина, Одеса, Херсон, Харків, Полтава), повторні обшуки й арешти, редагування педагогічного журналу «Світло» (1910-1914).'
  section: 'Формування: Ліндфорс, Стара громада й перші садки'
  words: 1000
- points:
  - '1917 рік: обрана до Української Центральної Ради на Всеукраїнському національному конгресі — від громадської праці до державної освітньої політики.'
  - 'Департамент освіти: засновниця й керівниця департаменту дошкільної та позашкільної / позашкільно-дорослої освіти при Генеральному секретаріаті / міністерстві освіти (серпень 1917 — березень 1919): підручники, бібліотеки, «Просвіти», підготовка вчителів.'
  - 'Кам''янець-Подільський (1919-1920): викладання педагогіки в добу пізнього державотворення після Києва; одна з організаторок Всеукраїнської учительської спілки.'
  - 'Жіночий рух як дипломатія: перша голова Національної ради українських жінок, міжнародні конгреси (Рим, Париж, Копенгаген, Гренобль); еміграція 1922 року, з 1923-го — Прага, викладання в українському вищому педагогічному інституті імені Драгоманова (1924-1939).'
  section: 'Діяльність: Центральна Рада, дошкільна освіта й жіночий рух'
  words: 1300
- points:
  - '[!anti-hagiography] Програма Русової була широка й нерідко ідеалістична; модуль має питати, як національна й соціальна освіта та політична репрезентація працювали під час війни, цензури й еміграції, а не вважати кожне гасло вже здійсненим.'
  - '[!epistemic-humility] Жіночі організації не можна зливати в одну: Національна рада українських жінок, Союз українок і Всесвітній союз українок — різні структури.'
  - 'Гетьманський контекст: адміністративна праця в освітньому відомстві доби Гетьманату не є доказом ідеологічної згоди з усією політикою Гетьманату — це нестабільне державотворення 1917-1919 років.'
  - '[!decolonization] 1933 року за її ініціативою Союз українок у Чехословаччині створив тимчасовий комітет допомоги голодним в Україні — документована еміграційна відповідь на голод, а не повне досьє Голодомору.'
  section: 'Тінь: Програма, війна та еміграція'
  words: 900
- points:
  - 'Повернення до розминки: чому дошкільне виховання варто вчити як реальну національну політику, а не як «дрібну» культурну справу?'
  - 'Освітня драбина: садок, недільні школи, доросле читання, бібліотеки, учительські спілки, департамент, університетське викладання й еміграційний інститут — послідовність, а не окремі епізоди.'
  - '[!anti-hagiography] Русова центральна, але українську освіту будувала не вона одна; поряд — Христина Алчевська, Борис Грінченко, Наталія Кобринська, Мілена Рудницька.'
  - 'Пам''ять і джерела: мемуари «Мої спомини» (1937) — свідчення з контекстом, а не всезнаюче оповідання; смерть у Празі 1940 року читаємо як тяглість текстів та інституцій, а не як «зникнення».'
  section: 'Дискусія та підсумок: Освітня драбина й пам''ять'
  words: 700
focus: Sofiia Rusova (1856-1940) taught as a Ukrainian pedagogue, editor, Central Rada member, education-ministry organizer of preschool and out-of-school education, first president of the National Council of Ukrainian Women, and Prague exile professor, so that a kindergarten reads as national politics when the language of school is state-controlled; her Swedish-French Lindfors background is a family fact rather than the key to her chosen Ukrainian civic project, her women's-movement work is read as political infrastructure rather than charity, and her expansive national-education program is kept anti-hagiographic against the war, censorship, and exile it met.
