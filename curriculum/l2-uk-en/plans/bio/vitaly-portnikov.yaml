objectives:
- Аналізувати ключові етапи життя та кар'єри Віталія Портникова в контексті новітньої історії України
- Критично оцінювати його внесок у формування українського медіапростору та громадської думки
- Дискутувати про дилему «аналітик vs активіст» та роль журналіста під час війни
- Розрізняти фактичний аналіз, публіцистику та риторичні прийоми в текстах на політичну тематику
