objectives:
- Побудувати джерельно атрибутовану хронологію освіти й медіакар'єри Віталія Портникова.
- Розрізняти біографічний факт, авторську інтерпретацію, прогноз і репутаційну оцінку.
- Порівняти жанрові межі інституційного профілю, політичного коментаря та дискусійної програми.
- Перевіряти конкретний аргумент або прогноз за датою, доказами, формулюванням і визначеним часовим горизонтом.
