content_outline:
- points:
  - 'Джерельне питання: що інституційний профіль може довести про кар''єру журналіста, а які оцінки його впливу потребують незалежного дослідження?'
  - '[!biography] Відокремлення біографічної хронології від репутаційних ярликів на кшталт «пророк» або «Кассандра».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: де в конкретному матеріалі закінчується повідомлення перевірних фактів і починається авторська інтерпретація?'
  - 'Дебат 2: як жанр колонки, телевізійної дискусії або аналітичної програми змінює очікування щодо нейтральності й авторської позиції?'
  - '[!epistemic-humility] Оцінювати окремий аргумент і його докази, а не приписувати авторові мотиви або незмінну політичну роль.'
  section: 'Конфліктна карта: Аналітик чи активіст?'
  words: 900
- points:
  - Народження у Києві 1967 року й освіта, зафіксовані в профілях Радіо Свобода та Шевченківського комітету.
  - Робота парламентським кореспондентом і початок співпраці з Радіо Свобода на початку 1990-х років.
  - Як профілі установ добирають біографічні відомості відповідно до власної місії та аудиторії.
  section: 'Формування: Київ, освіта і початок кар''єри'
  words: 1000
- points:
  - 'Кар''єрна траєкторія: кореспондентська робота, колонки, програми Радіо Свобода та телевізійний «Політклуб».'
  - Відмінність між інституційно підтвердженою посадою, тематичною спеціалізацією й оцінкою якості аналізу.
  - 'Як читати політичний коментар: теза, доказ, припущення, прогноз, риторичне підсилення та часовий контекст.'
  - Публічний інтелектуал як робоче поняття, а не автоматичний знак авторитетності кожного вислову.
  section: 'Діяльність: Медіакар''єра та політичний коментар'
  words: 1300
- points:
  - '[!anti-hagiography] Не називати стиль категоричним або безпомилковим без репрезентативної вибірки матеріалів і чітких критеріїв.'
  - Перевірка прогнозу потребує первісної дати, точного формулювання, визначеного строку та зіставлення з результатом.
  - Інституційні нагородні сторінки можуть містити оцінну мову; її слід атрибутувати установі, а не подавати як незалежний факт.
  - '[!myth-buster] Відмова від циркулюючих афоризмів і персональних цитат без прямого URL, випуску або іншого точного локатора.'
  section: 'Межі джерел: Репутація, оцінка й перевірка прогнозів'
  words: 900
- points:
  - Повернення до розминки з таблицею «факт — джерело — жанр — межа доказу».
  - '[!decolonization] Аналізувати Україну як самостійний політичний суб''єкт, не зводячи її до реакції на російські події.'
  - Порівняння того, як одна тема оформлюється в авторському профілі, колонці й дискусійній програмі.
  - Професійний висновок про прозору атрибуцію, датування прогнозів і відокремлення аналізу від репутації автора.
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Джерельно дисциплінований аналіз кар'єри Віталія Портникова та меж між фактом, політичним коментарем, прогнозом і репутаційною оцінкою.
