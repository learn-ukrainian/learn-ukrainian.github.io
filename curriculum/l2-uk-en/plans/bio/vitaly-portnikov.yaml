content_outline:
- points:
  - 'Парадокс: Для одних — найгостріший аналітик країни, для інших — заангажований публіцист. Як Віталій Портников утримує
    статус ключового політичного коментатора України понад 30 років?'
  - '[!biography] Провокаційне питання: Чи може журналіст, що робить точні, але похмурі прогнози про війну, залишатися популярним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Внутрішній): Обов''язок журналіста vs місія громадянина. Де проходить межа між об''єктивним аналізом та необхідною
    в умовах війни громадянською позицією?'
  - 'Дебат 2 (Зовнішній): Сприйняття аудиторією. Як діяльність Портникова оцінюють різні групи: прихильники, критики в Україні,
    західна аудиторія та російська пропаганда?'
  - '[!epistemic-humility] Визнання, що в умовах інформаційної війни "чиста об''єктивність" може бути недосяжним ідеалом,
    а звинувачення в заангажованості є неминучими.'
  section: 'Конфліктна карта: Аналітик чи активіст?'
  words: 900
- points:
  - 'Народження в Києві (1967) та зростання в атмосфері пізнього СРСР: соціальний та історичний контекст, що сформував погляди.'
  - Освіта на факультеті журналістики та перші кроки в професії на тлі розпаду імперії.
  - Формативні впливи та поворотні моменти, що визначили його траєкторію як аналітика, що спеціалізується на пострадянському
    просторі.
  section: 'Формування: Дитина радянського Києва'
  words: 1000
- points:
  - 'Кар''єра в провідних українських та міжнародних виданнях: від "Радіо Свобода" до Espreso.TV.'
  - 'Ключова експертиза: глибокий аналіз політичних процесів в Росії та країнах СНД, що зробило його унікальним голосом в
    українському медіапросторі.'
  - 'Кассандра української журналістики: ранні та точні прогнози щодо російської агресії, ролі під час Майдану та повномасштабної
    війни.'
  - 'Публічний інтелектуал: роль у поясненні України світові та формуванні наративів під час війни.'
  section: 'Діяльність: Хронікер пострадянського колапсу'
  words: 1300
- points:
  - '[!anti-hagiography] Критика стилю: аналіз звинувачень у надмірній категоричності, риторичній гостроті та переході від
    аналітики до публіцистики.'
  - 'Професійна деформація: як тягар похмурих, хоч і точних, прогнозів впливає на методологію аналітика та його взаємодію
    з аудиторією?'
  - 'Зворотний бік впливу: чи не стає потужний голос аналітика інструментом у політичній боротьбі, навіть проти його волі?'
  - '[!myth-buster] Розвінчання міфу про "непогрішність". Аналіз випадків, коли прогнози не справдились або були суперечливими,
    та як це вплинуло на його репутацію.'
  section: 'Тінь: Ціна прогнозу'
  words: 900
- points:
  - 'Повернення до розминки: Маючи повну картину, студент формулює власну відповідь на питання про джерела впливу Портникова.'
  - '[!decolonization] Оцінка внеску у деколонізацію українського інформаційного простору та протидію російським наративам.'
  - 'Сучасне значення: Як Портников впливає на дискурс під час повномасштабної війни? Яка його роль у консолідації суспільства
    та комунікації з західними партнерами?'
  - 'Спадщина для професії: Які уроки з кар''єри Портникова може винести нове покоління українських журналістів та аналітиків?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Vitaly Portnikov as a key analyst of the post-Soviet space, his role in shaping public opinion, the dilemma of journalist
  vs. activist, and a critical look at the price of being a political Cassandra.
