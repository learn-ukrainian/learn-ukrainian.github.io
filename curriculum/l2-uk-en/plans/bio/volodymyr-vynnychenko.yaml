content_outline:
- points:
  - >-
    [!biography] Знайомство з Володимиром Кириловичем Винниченком: письменник,
    драматург, політичний діяч, перший голова уряду УНР і перший голова
    Директорії.
  - >-
    Провокаційне питання: чому радянській системі було потрібно стерти саме
    людину, яка писала універсали, декларації та законодавчі проєкти УНР?
  - >-
    [!epistemic-humility] Позначити розбіжності довідників: ЕІУ подає
    28(16).07.1880–06.03.1951, ЕСУ — 16(28).07.1880–05.03.1951, а IEU —
    27 липня 1880 року та 6 березня 1951 року.
  section: Розминка
  words: 400
- points:
  - >-
    Розбіжність щодо місця народження: ЕІУ називає Веселий Кут
    Єлисаветградського повіту, ЕСУ — Єлисаветград; початок правничих студій
    у Київському університеті 1900 року.
  - >-
    Виключення з університету 1902 року за революційну діяльність і незавершена
    освіта як частина ранньої політичної біографії.
  - >-
    Участь у Революційній українській партії, виконавчому комітеті УСДРП та
    редагуванні партійного органу "Боротьба".
  - >-
    [!decolonization] Винниченко як автор державних документів УНР: показати
    Українську революцію як державотворення, а не як епізод "громадянської
    війни" в імперському наративі.
  section: 'Формування: Соціаліст, модерніст, автор Універсалів'
  words: 1000
- points:
  - >-
    Літературний дебют оповіданням "Краса і сила" 1902 року та похвала Івана
    Франка як вхід у модерну українську прозу.
  - >-
    Драматургія і проза 1906-1917 років: "Чесність з собою", "Дисгармонія",
    "Брехня", "Базар", "Чорна Пантера і Білий Ведмідь" та "Записки кирпатого
    Мефістофеля".
  - >-
    Політична пам'ять революції: "Відродження нації" 1920 року як мемуарна
    історія Української революції, написана учасником і критиком власного
    табору.
  - >-
    Пізня творчість еміграції: "Сонячна машина" 1928 року як перший український
    утопічний або науково-фантастичний роман, "Заповіт борцям за визволення"
    1949 року і багатотомний "Щоденник".
  - >-
    [!anti-hagiography] Не зводити постать ані до "першого прем'єра", ані до
    "контроверсійного модерніста": політична і літературна лінії пояснюють одна
    одну.
  section: 'Діяльність: Література, держава і чесність з собою'
  words: 1200
- points:
  - >-
    Поразка УНР і вимушений виїзд до Відня 1919 року як початок першої хвилі
    політичної еміграції.
  - >-
    Повернення в Москву наприкінці травня 1920 року і переговори з колом
    Леніна: Троцьким, Каменєвим, Зінов'євим та Раковським.
  - >-
    Пропозиція посади наркома закордонних справ України й відмова включити
    Винниченка до Політбюро ЦК КП(б)У, яка, за ЕСУ, обмежувала його можливість
    реально впливати на політику.
  - >-
    Незгода більшовицького керівництва з його ключовою вимогою — статусом
    України як незалежної соборної держави.
  - >-
    Завершення переговорів і повернення за кордон; власну формулу про
    «українську одежу» більшовизму подати як позицію Винниченка, а не як
    нейтральний висновок автора уроку.
  - >-
    Пізніша рецепція його текстів і потреба окремо доводити конкретний механізм
    радянського обмеження доступу, а не замінювати доказ загальною формулою.
  - >-
    [!epistemic-humility] Окремо назвати складні теми: його соціалістичні
    переконання, можливу наївність щодо більшовизму 1919-1920 років і
    серйозність теми погромів 1919 року в історії УНР.
  section: 'Тінь: 1920 рік, переговори й еміграція'
  words: 1600
- points:
  - >-
    Збереження рукописів, "Щоденника" і пізніх романів у діаспорі та на маєтку
    "Закуток" у Мужені.
  - >-
    Смерть у Мужені в березні 1951 року: подати одноденну розбіжність між ЕСУ
    (5 березня) та ЕІУ/IEU (6 березня), не додаючи непідтверджену причину.
  - >-
    Повернення спадщини після 1991 року як відновлення політичної і літературної
    пам'яті, перерваної радянською забороною.
  - >-
    Робота з цитатами: "Заповіт борцям за визволення" як первинне джерело
    деколоніального аналізу, а афоризм про українську історію - лише з чесним
    позначенням дискусійної атрибуції.
  section: 'Підсумок: Повернення забороненого архіву'
  words: 1000
focus: >-
  Володимир Винниченко як письменник-модерніст, перший голова уряду УНР,
  автор державних документів Української революції та емігрант, якого радянська
  система стерла через його політичну й літературну вагу.
level: BIO
module: bio-222
objectives:
- >-
  Аналізувати подвійну роль Винниченка як модерного письменника і державного
  діяча Української революції.
- >-
  Пояснювати механізм вимушеної еміграції, заблокованого повернення 1920 року
  та радянського стирання його імені.
- >-
  Критично оцінювати складні питання його соціалістичних переконань, ставлення
  до більшовизму і політичної відповідальності УНР.
- >-
  Пов'язувати твори "Відродження нації", "Сонячна машина", "Заповіт борцям за
  визволення" і "Щоденник" із проблемою повернення забороненого архіву.
