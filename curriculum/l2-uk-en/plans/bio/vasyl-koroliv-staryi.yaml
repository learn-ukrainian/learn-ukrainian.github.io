pedagogy: CBI
focus: >-
  Василь Королів-Старий як літературне ім’я Василя Костянтиновича Короліва;
  його видавнича, громадська, дипломатична й письменницька праця в Україні та
  еміграції, прочитана без змішування непевних біографічних подробиць.
