content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Костьовичем Королівим, який писав як
    Василь Королів-Старий: дитячий письменник, мемуарист, видавець, ветеринар,
    діяч УНР і емігрант.
  - >-
    Провокаційне питання: чому автор лагідних казок про "нечисту силу" був
    політично неприйнятним для радянського канону?
  - >-
    [!epistemic-humility] Одразу позначити розбіжність джерел: сучасні джерела
    подають 4 (16) лютого 1879 року в Ладані, а англомовна енциклопедія дає
    17 лютого 1879 року в Диканьці.
  section: Розминка
  words: 400
- points:
  - >-
    Походження із родини священника, Полтавська духовна семінарія і дозвіл на
    навчання у світському закладі.
  - >-
    Закінчення Харківського ветеринарного інституту 1902 року і професійна
    праця ветеринаром як менш відома частина біографії.
  - >-
    Відкриття 1911 року в Києві першої в Україні козячої ферми "Зааненталь" як
    приклад практичної модернізаційної діяльності.
  - >-
    Псевдоніми Василь Старий, В. Диканський, Подорожний та інші: пояснити
    письменницьку множинність без русифікованих форм.
  - >-
    [!decolonization] Показати Короліва-Старого не як "малого дитячого автора",
    а як діяча, що поєднав професійну модерність, видавничу роботу і
    державницьке середовище УНР.
  section: 'Формування: Семінарист, ветеринар, видавець'
  words: 1000
- points:
  - >-
    7 березня 1917 року Королів-Старий був обраний до Української Центральної
    Ради від Товариства українських поступовців, тобто належав до засновників
    революційного парламенту.
  - >-
    1919 року його відправили з дипломатичною місією УНР до Праги; після
    поразки республіки він залишився там як політичний емігрант.
  - >-
    Празький і подєбрадський контекст: викладання в Українській господарській
    академії в Подєбрадах, підтримка видавничої справи і життя в реальній
    нужді.
  - >-
    Книжки для дітей і молоді: "Чмелик" 1920 року як еміграційна алегорія
    мандрів і туги за Україною, "Нечиста сила" 1923 року як переосмислення
    української демонології.
  - >-
    Петлюрівська пам'ять: брошура "Український народний герой Симон Петлюра" 1919
    року і спогад "З моїх споминів про Петлюру" 1930 року.
  - >-
    "Згадки про мою смерть", завершені 9 листопада 1941 року і видані посмертно
    1942 року, як мемуарне осмислення поразки визвольних змагань 1917-1921 років.
  section: 'Діяльність: Центральна Рада, Прага і Нечиста сила'
  words: 1200
- points:
  - >-
    Імперський епізод: 1906 року його заарештували й ув'язнили за організацію
    селянської спілки, після звільнення він залишався під поліційним наглядом.
  - >-
    Радянське стирання було визначене не казками, а політичною біографією:
    засновник Центральної Ради, дипломат УНР і близький друг та перший біограф
    Симона Петлюри не міг бути названий у радянській Україні.
  - >-
    Прага і борги товариства "Час": у злиднях він і Наталена Королева віддавали
    зароблене за українські видання в Чехії, щоб не осоромити українського імені.
  - >-
    Іконопис і церковні розписи на Закарпатті, зокрема в базиліанській церкві
    в Імстичеві, як спосіб заробітку в еміграційній нужді.
  - >-
    [!anti-hagiography] Уникати солодкої казкової рамки: його "лагідна" проза
    співіснує з політичною поразкою, боргами, бідністю і досвідом вигнання.
  - >-
    Смерть 11 грудня 1941 року в Мельнику біля Праги від серцевого нападу після
    повернення з Праги, де він передав видавцеві останній рукопис.
  - >-
    Поховання з Наталеною Королевою на міському цвинтарі святого Вацлава в
    Мельнику як частина українсько-чеської мапи пам'яті.
  section: 'Тінь: Імперський арешт, еміграційна бідність і радянське стирання'
  words: 1600
- points:
  - >-
    Що вижило: "Чмелик" і "Нечиста сила" в діаспорі та після 1991 року, а також
    мемуари "Згадки про мою смерть".
  - >-
    Що було стерте: політичний зміст біографії, зв'язок із Центральною Радою,
    Петлюрою і першою хвилею еміграції.
  - >-
    "Хуха-Моховинка" як місток до нижчих рівнів читання: доступна мова не
    скасовує високого політичного контексту автора.
  - >-
    Тривале повернення: тритомні "Твори" 2012 року в Києві як академічне
    відновлення спадщини після радянського замовчування.
  section: 'Підсумок: Дитяча казка як повернення імені'
  words: 1000
