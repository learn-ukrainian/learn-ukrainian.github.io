persona:
  role: Модератор джерелознавчого семінару про українське книговидання та еміграційну пам’ять.
  voice: Intellectual Historian
objectives:
- Розрізняти юридичне ім’я Василь Костянтинович Королів і літературне ім’я Василь Королів-Старий.
- Пояснювати видавничу працю в Києві, участь в Українській Центральній Раді та дипломатичну місію УНР.
- Зіставляти суперечливі відомості про місце народження, не перетворюючи одну версію на безумовний факт.
- Аналізувати мемуарний текст як первинне джерело з власною авторською перспективою.
content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Літературне ім’я і юридичне ім’я позначають одну особу, але виконують різні функції в джерелах.'
  - '[!epistemic-humility] ЕСУ подає Диканьку та окремо фіксує версію про Ладан; навчальний текст зберігає цю розбіжність.'
- section: 'Формування: освіта, фах і українська книжка'
  words: 1000
  points:
  - Духовна семінарія, Харківський ветеринарний інститут і перехід до журналістики та видавничої роботи.
  - Видавництво «Час» і журнал «Книгарь» як інституції українського культурного простору.
  - Псевдонім не підмінює юридичного імені й не дає підстав вигадувати окрему біографію.
- section: 'Діяльність: Центральна Рада, місія УНР і праця в еміграції'
  words: 1200
  points:
  - Участь в Українській Центральній Раді та виїзд 1919 року в складі дипломатичної місії УНР до Праги.
  - Викладання в українській господарській академії в Подєбрадах, переклади, проза й книжки для молоді.
  - Мемуари про власний досвід і про Симона Петлюру читаються як окремі документальні свідчення.
- section: 'Критичне читання: суперечності й межі доказу'
  words: 1600
  points:
  - '[!anti-hagiography] Біографію не зводимо ані до казок, ані до політичної служби: обидва напрями підтверджуються окремо.'
  - Розбіжність щодо місця народження не усуваємо редакторським припущенням.
  - Не відтворюємо неперевірені сцени смерті, арешту чи побутові легенди без прямого джерела.
- section: 'Підсумок: автор, інституції та збережений текст'
  words: 1000
  points:
  - «Згадки про мою смерть» і спогади про Петлюру дають змогу зіставити авторську пам’ять з енциклопедичною хронологією.
  - Деколонізаційне читання повертає суб’єктність українському видавцеві й дипломатові, не підмінюючи перевірку фактів героїзацією.
