objectives:
- >-
  Аналізувати Короліва-Старого як письменника, ветеринара, видавця і діяча УНР,
  не зводячи його до автора дитячих казок.
- >-
  Пояснювати механізм імперського арешту 1906 року, вимушеної еміграції 1919
  року та радянського стирання засновника Центральної Ради.
- >-
  Пов'язувати "Чмелика", "Нечисту силу", тексти про Петлюру і "Згадки про мою
  смерть" із досвідом першої хвилі еміграції.
- >-
  Критично читати доступну казкову мову як частину ширшої деколоніальної
  пам'яті, а не як втечу від політики.
