content_outline:
- points:
  - 'Провокація: як центральна постать організованого низового козацтва — командир антиосманських походів, що з Овруча контролював Київщину, — опинилася заарештованою й страченою власним обложеним табором за підозрою у зраді? І чому пам''ять стискає його до «обережного поміркованого» поряд із Наливайком?'
  - '[!biography] Представлення Лободи через розрив між його реальним масштабом і Наливайкоцентричною пам''яттю.'
  section: Розминка
  words: 400
- points:
  - 'Перша інтерпретація: Грушевський робить Лободу «центральною фіґурою» організованого козацького боку до самої смерті в таборі — проти Наливайкоцентричної пам''яті, що зводить його до підозрілого поміркованого.'
  - 'Друга інтерпретація: «відбудова козацької сили» (власна позиція Лободи за ЕІУ) — проти того, що волость переживала як постій, оподаткування, «козацький присуд» і покозачення. Обидва шари треба тримати разом.'
  - '[!epistemic-humility] Рік народження невідомий; місяць смерті різниться — ЕІУ подає червень 1596, IEU — травень; ярлики «реєстровий» і «низовий» походять із різних джерельних шарів.'
  - '[!decolonization] У молдовських походах ЕІУ називає козаків «самостійним суб''єктом» міжнародних відносин — це військово-дипломатична суб''єктність у коаліції, а не аналогія модерної держави; жодних вічних етнічних союзів чи ворожнеч.'
  section: 'Конфліктна карта: Центральна постать чи Наливайкова тінь?'
  words: 900
- points:
  - 'Кінець 1593 — перша певна згадка: похід проти Оргеєва в Молдові; рання біографія джерельно тонка, тож дитинства й точної дати народження не вигадуємо.'
  - Березень–квітень 1594 — командування козацьким загоном у поході на Акерман (Білгород-Дністровський).
  - Осінь 1594 — один із командирів козацького війська (Лобода, Наливайко, Оришовський, до 12 000), що зайняло Молдову, включно з Яссами, і схилило молдовського володаря до антиосманської коаліції; лютий–травень 1595 — бої на нижньому Дунаї та Дністрі в контексті Священної ліги.
  section: 'Формування: Низовий провідник і молдовські походи'
  words: 1000
- points:
  - 'Осінь 1595 — зима 1596: військо Лободи, оцінюване у 8000–10000 козаків, фактично контролювало Київщину й південь сучасної Білорусі, зі штаб-квартирою в Овручі; поряд — Матвій Шаула та інші полковники.'
  - 'Волосний примус: постій козаків ліг важким тягарем на шляхетські маєтки, місцева влада була паралізована, прискорилися втечі селян і покозачення, у містах і селах з''явився козацький присуд, а податки збиралися для Війська Запорозького.'
  - 'Як сам Лобода розумів цю присутність: за ЕІУ, він не вважав дії 1595–1596 непокорою владі, а способом відбудувати козацьку силу, і документи свідчать про готовність до примирення з урядом.'
  - '[!epistemic-humility] Джерельні анкери: «козац. присуд» (ЕІУ — про козацьку юрисдикцію на волості) і «самостійний суб''єкт» (ЕІУ — про козацьку суб''єктність у молдовському циклі). Учні бачать, що конфлікт стосувався юрисдикції й статусу, а не лише руху війська.'
  - Весна 1596 — Лобода бився проти карального війська Речі Посполитої під Білою Церквою й водночас тримав відкритими канали переговорів.
  section: 'Діяльність: Овруцька зона контролю (1595–1596)'
  words: 1300
- points:
  - 'Відступ до Лубен: повстанський табір із возів (вагенбург) і земляних укріплень над Солоницею, 6000–12000 людей, зокрема жінки й діти; блокада, голод і брак води.'
  - '[!anti-hagiography] Таємні переговори джерельно підтверджені, але «зрада» — це табірне звинувачення, а не доведена провина; козаки заарештували Лободу в таборі за підозрою й невдовзі стратили (IEU приписує це прихильникам Наливайка) ще до бомбардування й капітуляції 5–6 червня.'
  - '[!myth-buster] Лобода загинув усередині козацького табору під час кризи, а не від рук карателів Речі Посполитої, і ще до пізнішого пост-капітуляційного насильства; після нього провід перебирає Кремпський — це не окрема біографія, а зміна командування.'
  section: 'Тінь: Солониця — облога, підозра, внутрішня страта'
  words: 900
- points:
  - 'Сильне питання замість «зрадник чи герой»: як озброєна служба стала юрисдикцією і чому переговори стали підозрілими всередині обложеного табору?'
  - 'Спадщина: Солониця показує водночас козацьку солідарність і козацький внутрішній конфлікт; постать Лободи слід тримати відмінною від Наливайка, з власною спільнотою й вибором.'
  - 'Джерельна невизначеність як урок: агентні дієслова (очолив, командував, контролював, вів переговори) поряд із дієсловами обережності (джерело називає, приписує, підозрювали, не доведено) — і жодного модерно-національного спрощення.'
  section: 'Дискусія та підсумок: Як служба стала юрисдикцією'
  words: 700
focus: Біографія Григорія Лободи — центральної постаті організованого низового козацтва 1594–1596 років, командира молдовських антиосманських походів і господаря овруцької зони, якого власний обложений табір під Солоницею заарештував і стратив за підозрою у зраді.
level: BIO
module: bio-021
objectives:
- Відновлювати Лободу як самостійного співпровідника козацького циклу 1594–1596 років, а не лише «поміркований додаток» до Наливайка.
- 'Пояснювати, як озброєна прикордонна служба перетворилася на юрисдикцію: постій, оподаткування й козацький присуд на волості з овруцької бази.'
- Аналізувати молдовські антиосманські походи як коаліційну прикордонну війну з козацькою суб'єктністю, а не як просту національну чи етнічну лінію.
- Розбирати внутрішньотабірну страту під Солоницею як подію кризи й підозри, а не як доказ провини Лободи.
