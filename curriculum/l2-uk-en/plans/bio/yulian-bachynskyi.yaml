content_outline:
- points:
  - 'Парадокс: як людина, що першою науково обґрунтувала потребу повної незалежності України, могла бути забутою майже на
    століття?'
  - '[!biography] "Україна irredenta" (1895) — книга, що з''явилася "занадто рано", але визначила майбутнє.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Соціалістичний інтернаціоналізм vs національне визволення. Полеміка Бачинського з українськими марксистами та
    польськими соціал-демократами, які бачили націоналізм як «буржуазну ідеологію».'
  - 'Дебат 2: Радянська історіографія vs діаспорна. [!decolonization] Радянська влада таврувала його як «буржуазного націоналіста»,
    ігноруючи соціалістичні погляди. Діаспора іноді ігнорувала його соціалізм, роблячи його суто національним героєм.'
  - '[!epistemic-humility] Бачинський намагався поєднати те, що його сучасникам здавалося непоєднуваним, що призвело до його
    ідейної самотності.'
  section: 'Конфліктна карта: Соціаліст чи Націоналіст?'
  words: 900
- points:
  - Народження в Галичині (1870) в родині священника — контекст "Austro-Slavism".
  - Освіта у Львові та Відні — формування в мультикультурному середовищі Австро-Угорщини.
  - Вплив Драгоманова та європейських соціалістичних ідей — пошук «третього шляху» між імперіями.
  section: 'Формування: Галицький інтелектуал на зламі століть'
  words: 1000
- points:
  - 'Головна праця: аналіз економічних, політичних та культурних аргументів на користь повної державної незалежності.'
  - 'Ключова теза: незалежність є не просто бажанням, а неминучим результатом економічного розвитку та глобальних процесів
    деколонізації.'
  - 'Рецепція та критика: як твір сприйняли сучасники-соціалісти та націоналісти.'
  - Політична та журналістська діяльність — спроба перетворити теорію на політичну програму для Русько-української радикальної
    партії.
  section: 'Діяльність: Праця життя: "Україна irredenta"'
  words: 1300
- points:
  - '[!anti-hagiography] Політична непрактичність: чому блискучий теоретик не став успішним політиком? Аналіз його невдач
    у партійній політиці.'
  - 'Ідейна самотність: його синтез був незрозумілим і для націоналістів, і для соціалістів свого часу.'
  - 'Трагедія еміграції: життя і смерть на чужині, відірваність від українського політичного процесу та смерть у радянському
    концтаборі.'
  - '[!myth-buster] Міф про «одного пророка». Бачинський був першим, але не єдиним. Його ідеї розвивалися в гострій полеміці
    з Міхновським, Липинським та Донцовим.'
  section: 'Тінь: Ціна пророцтва'
  words: 900
- points:
  - 'Повернення до парадоксу: чому ідеї Бачинського перемогли, а сам він залишився в тіні?'
  - 'Спадщина: Бачинський та незалежність 1991 року — наскільки його економічні аргументи столітньої давності залишаються
    актуальними?'
  - '[!decolonization] Розгляд його праці як акту інтелектуальної деколонізації, що обґрунтовує право на існування окремо
    від імперських центрів (Росії та Польщі).'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Yulian Bachynskyi, author of "Ukraina Irredenta" (1895), the first modern political argument for Ukrainian independence.
  His synthesis of socialism and national self-determination, its subsequent neglect, and long-term impact.
level: BIO
module: bio-070
objectives:
- Аналізувати життя та спадщину Юліана Бачинського, першого теоретика української незалежності
- Критично оцінювати його головну працю «Україна irredenta» в історичному контексті
- Простежити унікальність його синтезу соціалістичних та національних ідей та причини його «забуття»
- Формулювати аргументовану позицію щодо ролі «пророків» та «ідей, що випереджають час» у національному русі
pedagogy: CBI
persona:
  role: Модератор дискусії, що ставить під сумнів усталені наративи і вимагає доказів. Чому саме Бачинський, а не хтось інший?
    Де його слабкі місця?
  voice: Critical-Historian
