content_outline:
- points:
  - 'Провокація: від ботаніка до культового письменника. Чи може науковець, що вивчає рослини, стати голосом покоління? Парадокс
    Тараса Прохаська.'
  - '[!biography] Вступ до постаті без дат та формальностей — через його унікальний стиль та філософію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Станіславівський феномен" — це реальна літературна школа, об''єднана спільною філософією, чи вдалий маркетинговий
    міф для групи талановитих індивідуалістів?'
  - 'Дебат 2: Прохасько — "локальний" письменник, глибоко вкорінений у галицький простір, чи універсальний філософ, що використовує
    Карпати як метафору для роздумів про буття?'
  - '[!epistemic-humility] Критики звинувачують "станіславівців" у герметичності та відірваності; прихильники бачать у цьому
    опір глобалізації та повернення до справжнього.'
  - '[!decolonization] Чи є свідомий вибір "малої батьківщини" формою опору культурній централізації та імперському уніфікуванню?'
  section: 'Конфліктна карта: {Регіоналізм чи універсалізм?}'
  words: 900
- points:
  - Івано-Франківськ та Карпати як простір, що формує світогляд — не просто місце, а дійова особа в текстах Прохаська.
  - 'Освіта біолога: як науковий метод спостереження, класифікації та уваги до деталей перейшов у літературну творчість.'
  - 'Формативні впливи: від природознавства та філософії екзистенціалізму до андеграундної культури пізнього СРСР.'
  section: 'Формування: {Від гербарію до рукопису}'
  words: 1000
- points:
  - 'Роман "НепрОсті": аналіз альтернативної історії Карпат, теми пам''яті, ідентичності та пошуку "свого" місця у світі.'
  - 'Есеїстика як основний жанр: філософія споглядання, "вкорінена феноменологія", ідея "топографії" як способу пізнання.'
  - 'Мова Прохаська: повільний, медитативний ритм, точність описів, уникнення "великих" тем на користь "малих" істин повсякденного
    буття.'
  section: 'Діяльність: {«НепрОсті» та медитативна проза}'
  words: 1300
- points:
  - '[!anti-hagiography] Чи не є "медитативна проза" та філософія споглядання формою ескапізму? Критика за "аполітичність"
    у часи, що вимагали чіткої громадянської позиції.'
  - '[!myth-buster] Міф про "письменника-відлюдника". Прохасько як активний учасник культурного процесу, куратор, публічна
    фігура — аналіз його ролі в "Станіславівському феномені".'
  - 'Проблема герметичності: чи не є "станіславівський феномен" надто зосередженим на собі, що призводить до відрізаності
    від решти України? Ціна глорифікації "локального".'
  section: 'Тінь: {Ціна споглядання}'
  words: 900
- points:
  - 'Повернення до розминки: як науковий погляд збагачує художню прозу? Студент формулює аргументовану відповідь на основі
    матеріалів модуля.'
  - 'Прохасько як "терапевт" для пост-радянської душі: чому його проза про спокій, вкоріненість та споглядання виявилась такою
    затребуваною в 1990-х та 2000-х?'
  - '[!decolonization] Значення Прохаська у створенні сучасної української регіональної ідентичності, вільної від імперських
    та радянських наративів.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: 'Тарас Прохасько: біографія як спосіб бачення, станіславівський феномен, зв''язок ботаніки та літератури, медитативна
  проза, роман "НепрОсті"'
