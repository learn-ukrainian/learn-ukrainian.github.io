content_outline:
- points:
  - >-
    [!biography] Знайомство з Миколою Садовським (Тобілевичем): актор, режисер,
    антрепренер, перекладач і організатор першого стаціонарного українського театру в Києві.
  - >-
    Провокаційне питання: що важливіше для національної культури під цензурою —
    геніальна роль на сцені чи будівництво інституції, яка може працювати щодня?
  section: Розминка
  words: 400
- points:
  - >-
    Родина Тобілевичів як театральна мережа: брат Івана Карпенка-Карого,
    Панаса Саксаганського і Марії Садовської-Барілотті; сценічне ім'я як публічна
    мистецька ідентичність.
  - >-
    Освіта, військова служба і аматорський театр у Бендерах: зустріч із Марією
    Заньковецькою та перехід від імперської біографії до української сцени.
  - >-
    [!epistemic-humility] Дата народження в джерелах конфліктна; у модулі
    тримаємо стабільне формулювання: 1856, Кам'яно-Костувате, тепер Миколаївська область.
  section: 'Формування: Тобілевич, солдат, актор'
  words: 1000
- points:
  - >-
    Робота в трупах Кропивницького і Старицького, власні антрепризи та об'єднання
    з братами Тобілевичами: корифейська сцена як школа менеджменту, акторства й виживання.
  - >-
    1906-1907: театр Садовського і Заньковецької переходить від гастролей до
    Києва та Троїцького народного дому, стаючи першою стаціонарною українською сценою.
  - >-
    Репертуарна модернізація: українська класика, нова драма, переклади Гоголя,
    Островського, Чехова, Словацького, європейські та єврейські драматурги українською.
  - >-
    [!decolonization] Стаціонарний театр був доказом, що українська мова є не
    домашнім чи "провінційним" кодом, а мовою міської публічної інституції.
  section: 'Діяльність: Від мандрівної трупи до стаціонарного театру'
  words: 1200
- points:
  - >-
    Російська імперська цензура після Емського указу: дозволи губернаторів,
    репертуарні обмеження, змішані вечори й адміністративна мова, яка не визнавала
    українську сцену самодостатньою.
  - >-
    [!anti-hagiography] Успіх Садовського не був чистою перемогою: постійна сцена
    існувала через компроміси з дозволами, залами, касою і цензурою.
  - >-
    Пізній радянський фінал: після повернення до радянської України він працював
    актором, режисером і в кіно, але власного театру вже не мав; це інституційне
    звуження, не вигадана поліційна справа.
  - >-
    [!myth-buster] Не зводимо його до "народного актора" чи партнера Заньковецької:
    центральний сюжет — організатор українського театру як міської установи.
  section: 'Тінь: Компроміси дозволів, репертуару і пізнього повернення'
  words: 1600
- points:
  - >-
    Мемуари `Мої театральні згадки: 1881-1917` як майбутній первинний матеріал
    для читання про трупу, цензуру і місію служіння рідному мистецтву.
  - >-
    Спадщина першої постійної української сцени: від корифеїв до Курбаса, від
    етнографічного реалізму до модерної театральної інституції.
  - >-
    Сучасне значення: Садовський учить бачити культуру не лише як талант, а як
    систему людей, приміщень, дозволів, перекладів, репертуару і щоденної праці.
  section: 'Підсумок: Театр як українська інституція'
  words: 1000
