objectives:
- Аналізувати поезію та наукову діяльність Филиповича в контексті українського неокласицизму
- Розуміти ключові позиції та наслідки літературної дискусії 1920-х років
- Критично порівнювати радянську та сучасну інтерпретацію творчості неокласиків
- Формулювати аргументовану позицію щодо ролі митця та мистецтва в тоталітарному суспільстві
