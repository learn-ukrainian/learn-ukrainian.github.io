content_outline:
- points:
  - 'Провокація: Як поет, що проповідував «чисте мистецтво» та відстороненість від політики, став смертельним ворогом тоталітарного
    режиму?'
  - '[!biography] Коротка довідка про «гроно п''ятірне» неокласиків та їхнє кредо: орієнтація на класичну європейську традицію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Чисте мистецтво» vs «Пролетарська культура». Дискусія між неокласиками та організаціями типу ВАПЛІТЕ у 1920-х.
    Це була суперечка про естетику чи прихована політична боротьба?'
  - 'Дебат 2: Радянська інтерпретація vs Сучасна переоцінка. Филипович як «буржуазний націоналіст» у радянській критиці vs
    Филипович як захисник української європейської ідентичності в сучасній науці.'
  - '[!epistemic-humility] Визнання того, що позиція неокласиків здавалася елітарною та відірваною від соціальних потреб для
    багатьох їхніх сучасників.'
  - '[!decolonization] Розгляд неокласицизму як спроби деколонізувати українську культуру від російського «народництва» та
    провінціалізму, інтегрувавши її в ширший європейський контекст.'
  section: 'Конфліктна карта: Мистецтво проти ідеології'
  words: 900
- points:
  - Дитинство на Київщині, навчання на історико-філологічному факультеті Київського університету у Володимира Перетца.
  - Рання творчість під впливом символізму (збірка «Земля і вітер»).
  - Перехід до неокласицизму: пошук ясності, гармонії та інтелектуальної дисципліни як відповідь на хаос революційної доби.
  - Становлення як поважного вченого-літературознавця, професора Київського інституту народної освіти.
  section: 'Формування: Від символізму до класики'
  words: 1000
- points:
  - Аналіз ключової збірки «Простір» (1925): мотиви стоїцизму, культурної пам'яті, діалог із класичною спадщиною.
  - Филипович як центральна постать у групі неокласиків: його роль у теоретичних дискусіях та літературному житті.
  - Наукова праця: дослідження творчості Шевченка, Франка, російської літератури. Подвійність ідентичності поета та вченого.
  - Використання першоджерел: уривки з листів та щоденників Филиповича, що розкривають його погляди.
  section: 'Діяльність: Поет, учений, полеміст'
  words: 1300
- points:
  - '[!anti-hagiography] Критика неокласиків сучасниками: звинувачення в «елітизмі», відірваності від народу, ігноруванні
    соціальних проблем. Наскільки ця критика була справедливою?'
  - Мовчазний компроміс? Розгляд того, як поети намагалися вижити в умовах зростаючого ідеологічного тиску, і де проходила
    межа їхнього компромісу.
  - '[!myth-buster] Розвінчання міфу про повну аполітичність неокласиків. Їхній вибір культурної орієнтації був глибоко політичним
    актом в умовах СРСР.'
  - 'Трагічна іронія: естетична позиція, спрямована на уникнення політики, була інтерпретована режимом як найнебезпечніша
    форма політичного спротиву.'
  section: 'Тінь: Ціна елітизму'
  words: 900
- points:
  - 'Повернення до розминки: чому «чисте мистецтво» виявилося несумісним із тоталітаризмом? Студент формулює відповідь на
    основі матеріалу модуля.'
  - '[!decolonization] Спадщина Филиповича та неокласиків як символ неперервності європейської ідентичності української культури,
    всупереч спробам її ізоляції та русифікації.'
  - 'Місце Филиповича у каноні «Розстріляного відродження»: не лише як жертви, але як активного творця модерної української
    культури.'
  - 'Сучасна актуальність: що досвід неокласиків може сказати нам сьогодні про стосунки митця, влади та суспільства під час
    екзистенційних загроз?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Pavlo Fylypovych as a core figure of the Neoclassicist movement: his dual identity as a poet of stoic harmony and
  a meticulous literary scholar, and his tragic fate as part of the Executed Renaissance.'
level: BIO
