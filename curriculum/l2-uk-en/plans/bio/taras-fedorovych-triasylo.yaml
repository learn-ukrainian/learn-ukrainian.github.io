content_outline:
- points:
  - 'Провокація: чому ми звемо його «Трясилом», коли найраніші документи надійніше підтримують «Тараса Федоровича» — і чому вживане ім''я походить радше з Історії Русів і Шевченкової «Тарасової ночі», ніж із записів 1630 року?'
  - '[!biography] Представлення постаті через розрив між документальним іменем і романтичним іменем пам''яті.'
  section: Розминка
  words: 400
- points:
  - 'Перша інтерпретація: походження. ЕІУ припускає або хрещене татарське коріння (пов''язане з іменем «мурза Гасан»), або овруцьке шляхетство; стаття про повстання описує провідника з чигиринської козацької родини. Походження треба подавати як нерозв''язане, а не як усталену етнічну історію.'
  - 'Друга інтерпретація: одноосібний герой-переможець — проти провідника, що очолив відкриту фазу, але втратив контроль над Переяславською угодою (влада перейшла до компромісних старшин, реєстровим гетьманом став Тиміш Орендаренко).'
  - '[!epistemic-humility] Дати народження й смерті невідомі (не 1639); ім''я «Трясило» з''являється пізно; ототожнення з Тарасом Чорним не доведене.'
  - '[!decolonization] Центр — Трубіж, Альта, Базавлук, Переяслав; Москва тут пізніший прикордонний учасник, а не центр історії; радянське «антифеодальне» — це пізніша рамка, а не пояснення.'
  section: 'Конфліктна карта: Хто такий Тарас Федорович — і чому змінилося ім''я?'
  words: 900
- points:
  - 'Тиск на реєстр після Куруківської угоди: Річ Посполита потребувала козацької служби, але обмежувала визнаний статус, привілеї й платню.'
  - Після польсько-шведської війни 1626–1629 років неоплачені коронні війська стали на постій у Київському воєводстві й Задніпров'ї, де було багато козаків і ще не закріпачених селян; насильство над громадами живило вибух.
  - 1629 — Федорович очолив (разом із Григорієм Чорним) невдалий кримський похід, пов'язаний із претендентом на ханський престол; козацьке військо зазнало важких втрат під Перекопом.
  section: 'Формування: Гетьман нереєстрових козаків'
  words: 1000
- points:
  - Березень 1630 — близько 10 000 нереєстрових козаків рушили з Базавлуцької Січі на Черкаси, відкривши повстання; англомовна енциклопедія IEU підсумовує перемоги його сил під Корсунем і Переяславом.
  - 'Універсали: Федорович кликав тих, хто був козаком, і тих, хто хоче ним бути, «вольностей козацьких заживати» й боронити православну віру (за Щербаком). Точне формулювання брати лише з перевіреного видання.'
  - Григорій Чорний, реєстровий провідник, пов'язаний із компромісом і звинуваченнями в унійній присязі (за традицією Львівського літопису), був схоплений і страчений козаками — це джерельно заряджений внутрішній конфлікт, а не чиста справедливість.
  - '[!epistemic-humility] Джерельні анкери: універсальна фраза «вольностей козацьких заживали» (за Щербаком) і зачин Львівського літопису «ходил за Дніпр козаков зносити» (партійна мова про похід Конєцпольського). Додатковий шар — реляційні листи Конєцпольського, опубліковані Ковальцем (2014). Учні розрізняють документ і риторику.'
  - Травень 1630 — Переяславський табір і майже тритижневе протистояння; серед епізодів — славнозвісний нічний наскок на «золоту роту» («Тарасова ніч»), що поставив військо Конєцпольського під тиск.
  section: 'Діяльність: Повстання 1630 і Переяславський табір'
  words: 1300
- points:
  - '29 травня (ст. ст.) / 8 червня (н. ст.) 1630 — Переяславська угода: козацький бік визнав провину, але відмовився видати Федоровича; куруківська рамка лишилася, і угода не дала максимальної програми повстанців.'
  - '[!anti-hagiography] Федорович відступив із непоступливими запорожцями й був усунений від практичного проводу; реєстровим гетьманом став Орендаренко.'
  - 'Пізніша прикордонна кар''єра: 1631 морський похід; 1632 Корсунська рада як чигиринський реєстровий полковник; 1634–1636 козацький загін у польсько-московській війні, здача булави в Каневі (січень 1635), сусідство з повстанням Сулими, 1636 перехід із групою козаків до Московської держави й пропозиція служби — цього не стираємо, але й не робимо з нього «московського агента».'
  - '[!myth-buster] Розрізняти хронікарський звіт, воєнну реконструкцію й Шевченкову поему; «Тарасова ніч» — це героїзована романтична нарація, а не буквальний літопис 1630 року.'
  section: 'Тінь: Переяславська угода і втрата лідерства'
  words: 900
- points:
  - 'Питання замість «герой чи бандит»: які саме тиски зробили нереєстровий козацький статус політичною проблемою, і як пізніша пам''ять змінила ім''я та значення провідника?'
  - 'Спадщина події: повстання змусило переговори в Переяславі й зробило видимою проблему нереєстрового козацтва, навіть коли угода не дала повстанцям широкої перемоги.'
  - 'Пізніша пам''ять, а не біографія: Шевченкова «Тарасова ніч» (1830-ті), поема Чубинського (1863) з іменем Тараса Трясила й німий фільм ВУФКУ «Тарас Трясило» (1926) — усе це пам''ять, яку треба відрізняти від джерел XVII століття.'
  section: 'Дискусія та підсумок: Реєстр, примус і пам''ять'
  words: 700
focus: Біографія Тараса Федоровича — виборного гетьмана нереєстрового козацтва, провідника повстання 1630 року й Переяславського табору; урок про реєстровий тиск, конфесійну риторику універсалів і про те, як пізніша романтична пам'ять (Історія Русів, Шевченко) перейменувала документального Федоровича на «Трясила».
level: BIO
module: bio-027
objectives:
- Пояснювати, чому документально надійніше «Тарас Федорович», а звичне «Трясило» — це пізніше ім'я пам'яті з Історії Русів і Шевченкової «Тарасової ночі».
- 'Аналізувати причини повстання 1630 року: реєстровий тиск після Куруківської угоди, постій неоплачених коронних військ і насильство над козацько-селянськими громадами.'
- Розрізняти провід відкритої фази повстання й Переяславську угоду, у якій владу перебрали компромісні старшини (гетьманом реєстру став Орендаренко).
- Відділяти хронікарське свідчення, воєнну реконструкцію та Шевченкову поему як три різні шари, не плутаючи пам'ять із біографією.
