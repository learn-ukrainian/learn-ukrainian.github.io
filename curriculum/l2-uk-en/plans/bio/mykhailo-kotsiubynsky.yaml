- Аналізувати життя та творчість Михайла Коцюбинського як ключової фігури українського модернізму
- Критично оцінювати взаємодію соціальної відповідальності та модерністського оновлення форми у творчості письменника
- Розрізняти документовані факти біографії, текстові спостереження та пізніші моделі рецепції
- Застосовувати інструменти психологічного та стилістичного аналізу до прози Коцюбинського
