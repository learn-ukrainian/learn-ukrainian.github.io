content_outline:
- points:
  - 'Парадокс: як один письменник міг бути водночас і «Сонцепоклонником», і автором похмурої соціальної драми «Fata Morgana»? Що ховається за цим протиріччям?'
  - '[!biography] Коцюбинський поєднав соціально-психологічну проблематику з модерністським оновленням форми. Як читати цю еволюцію без хибної формули «народник або естет»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: суспільна відповідальність і свобода художньої форми. Зіставити «Fata Morgana» та фінал «Intermezzo» й перевірити, чи справді модернізм означав відмову від громадянської тематики.'
  - 'Дебат 2: рецепція і канон. Порівняти, як різні критичні традиції наголошували соціальну або модерністську грань творчості, не приписуючи жодній із них монополії на «справжнього» Коцюбинського.'
  - '[!epistemic-humility] Відокремлювати документовані факти, текстові спостереження й пізніші інтерпретації. Не приписувати Єфремову, Вороному чи іншим критикам оцінок без прямої цитати та бібліографічного покликання.'
  - '[!decolonization] Повернення Коцюбинського до українського й ширшого європейського модерністського контексту не повинно стирати його громадської діяльності, української суб’єктності та соціальної проблематики прози.'
  section: 'Конфліктна карта: Народник чи естет?'
  words: 900
- points:
  - 'Подільська природа як перше джерело творчості: дитинство у Вінниці, навчання в Шаргороді.'
  - 'Громадівський рух та народництво: робота вчителем, етнографічні студії, ідеалістичне бажання служити народу.'
  - 'Кримський та молдовський періоди: зустріч з іншими культурами, відточування пейзажного психологізму, перші проби пера.'
  - Формування чутливості до «настрою» і «моменту» — народження майбутнього імпресіоніста.
  section: 'Формування: Від Поділля до Криму'
  words: 1000
- points:
  - 'Переїзд до Чернігова: період літературної зрілості та створення шедеврів.'
  - '«Fata Morgana»: соціальна трагедія села, подана через призму імпресіоністичного сприйняття. Земля як містична сила.'
  - '«Тіні забутих предків»: вершина поетичної прози. Синтез фольклору, міфології та модерністської техніки.'
  - 'Європейський контекст: подорожі, читання та модерністські техніки. Розрізняти документовані контакти, типологічні паралелі й доведений прямий вплив.'
  section: 'Діяльність: Чернігівська симфонія'
  words: 1300
- points:
  - '[!anti-hagiography] Листи до Олександри Аплаксіної документують тривалі близькі стосунки поза шлюбом. Аналізувати їх без сенсаційності й без домислів про почуття Віри Коцюбинської.'
  - 'Перевірка тези про «відрив від народу»: які тексти підтверджують або спростовують її, і де закінчується джерело та починається пізніша інтерпретація?'
  - '[!myth-buster] Зустрічі з Максимом Горьким на Капрі документовані, але сам факт знайомства не доводить ані творчої залежності, ані спроб «приручити» українську літературу.'
  - 'Компроміси та хвороба: робота в статистичному бюро, постійна фінансова скрута та боротьба з туберкульозом, що впливали на творчість.'
  section: 'Тінь: Ціна модернізму'
  words: 900
- points:
  - 'Повернення до розминки: тож хто він, Коцюбинський — «Сонцепоклонник» чи трагічна фігура? Відповідь студента з опорою на матеріал модуля.'
  - 'Кінематографічна спадщина: «Тіні забутих предків» Параджанова як окремий культурний феномен. Чи не затьмарив фільм першоджерело?'
  - '[!decolonization] Коцюбинського не слід зводити ні до «співця селянства», ні до «чистого естета»: його психологічна проза поєднує український матеріал, соціальну увагу та модерністське оновлення форми.'
  - 'Актуальність: його техніка «настроєвої прози» та пейзажного психологізму — як вона вплинула на сучасних українських письменників?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Біографія Михайла Коцюбинського, імпресіонізм, модернізм, соціально-психологічна проза та суперечлива рецепція його спадщини.
