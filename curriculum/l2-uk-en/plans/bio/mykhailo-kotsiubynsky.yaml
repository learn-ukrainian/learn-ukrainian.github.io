content_outline:
- points:
  - 'Парадокс: як один письменник міг бути водночас і «Сонцепоклонником», і автором похмурої соціальної драми «Fata Morgana»?
    Що ховається за цим протиріччям?'
  - '[!biography] Коцюбинський — один із «трьох великих» українського модернізму, але на відміну від Франка та Лесі Українки,
    він обрав шлях чистого мистецтва. Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Служіння народу vs. Служіння красі. Ранній Коцюбинський — просвітянин-народник, що працює «для селян». Зрілий
    Коцюбинський — європейський естет, що пише «для вічності». Чи була це зрада ідеалів?'
  - 'Дебат 2: Радянська канонізація vs. реальність. Як радянська влада перетворила витонченого імпресіоніста на «революційного
    демократа», замовчуючи його європейськість та дружбу з Горьким?'
  - '[!epistemic-humility] Сучасники (Єфремов) критикували Коцюбинського за «відрив від народу». Модерністи (Вороний) бачили
    в цьому його найбільшу заслугу. Обидві позиції мали свою логіку.'
  - '[!decolonization] Вилучення Коцюбинського з-під радянського міфу — це повернення його в європейський контекст, де він
    вів діалог з Метерлінком і Гамсуном, а не лише з Горьким.'
  section: 'Конфліктна карта: Народник чи естет?'
  words: 900
- points:
  - 'Подільська природа як перше джерело творчості: дитинство у Вінниці, навчання в Шаргороді.'
  - 'Громадівський рух та народництво: робота вчителем, етнографічні студії, ідеалістичне бажання служити народу.'
  - 'Кримський та молдовський періоди: зустріч з іншими культурами, відточування пейзажного психологізму, перші проби пера.'
  - Формування чутливості до «настрою» і «моменту» — народження майбутнього імпресіоніста.
  section: 'Формування: Від Поділля до Криму'
  words: 1000
- points:
  - 'Переїзд до Чернігова: період літературної зрілості та створення шедеврів.'
  - '«Fata Morgana»: соціальна трагедія села, подана через призму імпресіоністичного сприйняття. Земля як містична сила.'
  - '«Тіні забутих предків»: вершина поетичної прози. Синтез фольклору, міфології та модерністської техніки.'
  - 'Європейський контекст: подорожі на Капрі, знайомство з європейськими митцями, відчуття себе частиною великої європейської
    культури.'
  section: 'Діяльність: Чернігівська симфонія'
  words: 1300
- points:
  - '[!anti-hagiography] Любовний трикутник: болісні стосунки з дружиною Вірою та коханою Олександрою Аплаксіною. Особиста
    драма, що кидає тінь на образ «Сонцепоклонника».'
  - 'Ціна естетизму: чи не був його «відрив від народу» формою ескапізму від гострих соціальних проблем?'
  - '[!myth-buster] Дружба з Горьким: не просто творчий обмін, а складні стосунки з представником імперської культури, що
    намагався «приручити» українську літературу.'
  - 'Компроміси та хвороба: робота в статистичному бюро, постійна фінансова скрута та боротьба з туберкульозом, що впливали
    на творчість.'
  section: 'Тінь: Ціна модернізму'
  words: 900
- points:
  - 'Повернення до розминки: тож хто він, Коцюбинський — «Сонцепоклонник» чи трагічна фігура? Відповідь студента з опорою
    на матеріал модуля.'
  - 'Кінематографічна спадщина: «Тіні забутих предків» Параджанова як окремий культурний феномен. Чи не затьмарив фільм першоджерело?'
  - '[!decolonization] Коцюбинський сьогодні — не «співець селянства», а засновник модерної психологічної прози, що вивів
    українську літературу на європейський рівень.'
  - 'Актуальність: його техніка «настроєвої прози» та пейзажного психологізму — як вона вплинула на сучасних українських письменників?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykhailo Kotsiubynskyi's biography, impressionism, modernism, the conflict between narodnik duty and aestheticism,
  and his complex legacy.
level: BIO
module: bio-061
objectives:
- Аналізувати життя та творчість Михайла Коцюбинського як ключової фігури українського модернізму
- Критично оцінювати конфлікт між соціальним обов''язком (народництво) та естетичним служінням (модернізм) у творчості письменника
- Розрізняти реальну біографію Коцюбинського та його радянський канонізований образ
- Застосовувати інструменти психологічного та стилістичного аналізу до прози Коцюбинського
