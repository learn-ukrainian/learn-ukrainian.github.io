content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Знайомство з Миколою Вінграновським: поет, прозаїк, актор, сценарист і кінорежисер, лауреат Шевченківської премії, кінематографіст школи Довженка.'
  - 'Провокаційне питання: чому постать зводять або до «радянського кінематографа», або до «табірного дисидента» — і чому обидва ярлики спотворюють джерела?'
- section: 'Формування: Театр, ВГІК і літературний дебют'
  words: 1000
  points:
  - Народження 7 листопада 1936 р. в Богополі (тепер Первомайськ); театральний інститут 1955 р., ВГІК під Олександром Довженком, закінчення 1961 р.
  - Головна роль у «Повість полум'яних літ»; літературний дебют 1957–1958 рр.; добірка в «Літературній газеті» 7 квітня 1961 р.
  - '[!decolonization] Поезія, кіно лінії Довженка й політика відлиги — без зведення до «офіційного радянського митця».'
- section: 'Діяльність: Поезія, проза й кіно'
  words: 1200
  points:
  - «Атомні прелюди» (1962), «Сто поезій» (1967), «Поезії» (1971), «На срібнім березі» (1978), «Київ» (1982) та інші збірки з досьє.
  - Проза «Первінка», «Сіроманець», «Літо на Десні», «Северин Наливайко»; кіно на студії імені Довженка, документальні цикли про Чигирин, Батурин, Галич.
  - 'Естетика «свободи у формі»: національний простір-час і моральний зміст замість прямого маніфесту — інтерпретація ЕСУ.'
- section: 'Тінь: Цензура без ув''язнення'
  words: 1600
  points:
  - '[!anti-hagiography] У досьє не знайдено арештів, табірного вироку чи справи КДБ — документований спектр тиску, не табір.'
  - 'Цензура «Сто поезій»: у друкованій збірці дев''яносто дев''ять поем замість обіцяних ста.'
  - Сценарій «Світ без війни» (1960) не знятий; ЕСУ не пояснює причину — не стверджувати цензуру без джерела.
  - '[!epistemic-humility] [!myth-buster] Режим дисциплінував культуру і ув''язненням, і фільтрами публікації — механізми різні, не взаємозамінні.'
- section: 'Підсумок: Ярлик, цензура, спадщина'
  words: 1000
  points:
  - «Немає шістдесятників, сімдесятників...» — розрізнення самоопису митця й історіографічної категорії руху.
  - Смерть 26 травня 2004 р. в Києві; поховання на Байковому кладовищі; нагороди ЕСУ (Шевченківська премія, премія фонду Антоновичів).
  - '[!decolonization] Спадщина без радянської героїзації й без помилкового табірного міфу.'
  - Зв'язки з модулями поезії, прози та історії шістдесятництва — читати разом, не зводити до одного наративу.
focus: Микола Вінграновський як поет, прозаїк і кінематографіст шістдесятницького покоління без табірної біографії. Аналіз цензури «Сто поезій», естетики «свободи у формі» та напруги між історіографічним ярликом і авторською відмовою від поколінних ящиків.
