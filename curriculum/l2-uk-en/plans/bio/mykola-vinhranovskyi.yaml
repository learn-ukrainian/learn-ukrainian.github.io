content_outline:
- section: Розминка
  words: 400
  points:
  - >-
    [!biography] Знайомство з Миколою Вінграновським: поет, прозаїк, актор, сценарист і кінорежисер,
    лауреат Шевченківської премії, кінематографіст школи Довженка.
  - >-
    Провокаційне питання: чому постать зводять або до «радянського кінематографа», або до «табірного
    дисидента» — і чому обидва ярлики спотворюють джерела?
- section: 'Формування: Театр, ВГІК і літературний дебют'
  words: 1000
  points:
  - >-
    Народження 7 листопада 1936 р. в Богополі (тепер Первомайськ); театральний інститут 1955 р.,
    ВГІК під Олександром Довженком, закінчення 1961 р.
  - >-
    Головна роль у «Повісті полум'яних літ»; літературний дебют 1957–1958 рр.; добірка в
    «Літературній газеті» 7 квітня 1961 р.
  - '[!decolonization] Поезія, кіно лінії Довженка й політика відлиги — без зведення до «офіційного радянського митця».'
- section: 'Діяльність: Поезія, проза й кіно'
  words: 1200
  points:
  - >-
    «Атомні прелюди» (1962), «Сто поезій» (1967), «Поезії» (1971), «На срібнім березі» (1978),
    «Київ» (1982) та інші збірки з досьє.
  - >-
    Проза «Первінка», «Сіроманець», «Літо на Десні», «Северин Наливайко»; кіно на студії імені
    Довженка, документальні фільми про Чигирин, Батурин, Галич.
  - >-
    Інтерпретація ЕСУ: національний часопростір, пошук нової естетики й моральні смисли ранньої
    поезії; не перетворювати критичний опис на дослівну авторську формулу.
- section: 'Тінь: Межі джерел про культурний тиск'
  words: 1600
  points:
  - >-
    [!anti-hagiography] У досьє не встановлено арешту, табірного вироку, заслання чи членства в
    Українській Гельсінській групі; не переносити на митця чужу репресивну біографію.
  - >-
    Сценарій «Світ без війни» (1960) не був екранізований, але ЕСУ не пояснює причини; відсутність
    причини в джерелі не можна заповнювати твердженням про цензуру.
  - >-
    [!epistemic-humility] [!myth-buster] Режим дисциплінував культуру і ув'язненням, і фільтрами
    публікації — механізми різні, не взаємозамінні.
- section: 'Підсумок: Творчі ролі, категорії та спадщина'
  words: 1000
  points:
  - >-
    «Шістдесятник» — історіографічна категорія для культурного середовища, а не заміна власного
    імені чи доказ однакового досвіду переслідування.
  - >-
    Смерть 26 травня 2004 р. в Києві; нагороди, зафіксовані ЕСУ: Шевченківська премія та премія
    фонду Антоновичів.
  - '[!decolonization] Спадщина без радянської героїзації й без помилкового табірного міфу.'
  - Зв'язки з модулями поезії, прози та історії шістдесятництва — читати разом, не зводити до одного наративу.
focus: >-
  Микола Вінграновський як поет, прозаїк, кіноактор і режисер шістдесятницького покоління.
  Окремі траєкторії літератури й кіно, естетичне новаторство та джерельна межа між встановленим
  фактом, критичною інтерпретацією і непідтвердженим припущенням.
level: BIO
module: bio-260
objectives:
- Розрізняти встановлений біографічний факт, інтерпретацію ЕСУ та припущення без джерела.
- Аналізувати поєднання поезії, прози та кіно школи Довженка в одній біографії шістдесятника.
- Пояснювати, чому незнятий сценарій без установленої причини не є доказом конкретної цензурної дії.
- Критично оцінювати категорію «шістдесятник», не приписуючи всім діячам однакової біографії.
