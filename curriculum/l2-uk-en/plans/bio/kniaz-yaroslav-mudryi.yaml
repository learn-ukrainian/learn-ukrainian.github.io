content_outline:
- points:
  - 'Парадокс: Як князь, що прийшов до влади через жорстоку усобицю з братами (і пізніше увʼязнив Судислава, ЕІУ
    1036 — не «осліплення»), увійшов в історію як «Мудрий»?'
  - '[!biography] Провокативне питання, що ставить під сумнів усталений образ Ярослава як філософа на троні.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Боротьба зі Святополком Окаянним. Ярослав — месник за братів чи холодний прагматик, що скористався
    ситуацією для захоплення влади?'
  - 'Дебат 2: Привласнення спадщини. Як російська та радянська історіографія конструювали міф про «русского князя
    Ярослава», ігноруючи його центральну роль у становленні саме київської, української державності.'
  - '[!epistemic-humility] Літописи, написані пізніше, зображують Ярослава як ідеального християнського правителя,
    але скандинавські саги — як жорстокого конунга Яріцлейва.'
  - '[!decolonization] Розвінчання імперського наративу про «спільну колиску трьох братніх народів» через постать
    Ярослава.'
  section: 'Конфліктна карта: Святий, мудрець чи вбивця брата?'
  words: 900
- points:
  - 'Ростов, Новгород, і бунт проти батька Володимира: ранні роки та формування характеру в умовах постійної загрози.'
  - 'Усобиця 1015-1019 рр.: не просто боротьба за владу, а кривава драма, що визначила долю Русі. Роль варягів у
    становленні Ярослава.'
  - 'Переломний момент: битва на Альті та остаточна перемога над Святополком.'
  section: 'Формування: Шлях від кульгавого вигнанця до київського столу'
  words: 1000
- points:
  - '«Руська правда» / «Правда Ярослава»: традиція повʼязує з іменем Ярослава найдавнішу частину кодексу (ЕІУ; ЕУ-II
    описує редакції/списки). Це не сучасна «етнічна власність» і не однобічний «цивілізаторський вектор» з Києва;
    аналізувати як середньовічне право з переходом від кровної помсти до «віри» (штрафу) там, де джерела це дозволяють
    — без вигаданих дослівних статей без критичного видання.'
  - 'Культурний вибух: Софійський собор, Золоті ворота, заснування бібліотеки та скрипторію. Київ як «другий Константинополь».'
  - 'Церковна політика: призначення першого руського митрополита Іларіона — крок до незалежності від Візантії.'
  - 'Династична дипломатія: «тесть Європи». Шлюби Анни, Єлизавети та Анастасії з королями Франції, Норвегії та Угорщини.
    Русь як інтегральна частина європейської політики.'
  section: 'Діяльність: «Руська правда» та золотий вік Києва'
  words: 1300
- points:
  - '[!anti-hagiography] 1036 р. (ЕІУ): Ярослав схопив і увʼязнив брата Судислава Володимировича — факт, який не
    вписується в агіографічний образ «Мудрого». Твердження про «осліплення» не підтримане ЕІУ; не подавати його
    як факт.'
  - Жорстоке придушення повстань у Суздалі. Методи консолідації влади були далекі від гуманізму.
  - Поразка походу на Візантію 1043 року — провал, що демонструє межі його могутності.
  - '[!myth-buster] Міф про «тихе, мирне правління» після 1019 року. Насправді це був час постійної боротьби з печенігами,
    внутрішніми змовами та зовнішніми загрозами.'
  section: 'Тінь: Ціна влади та «Окаянні дні»'
  words: 900
- points:
  - 'Повернення до розминки: чи був Ярослав «Мудрим»? Студент формулює власну відповідь, зважуючи його досягнення
    та злочини.'
  - «Заповіт Ярослава» — спроба уникнути усобиць чи закладена бомба уповільненої дії, що призвела до роздробленості?
  - '[!decolonization] Спадщина Ярослава сьогодні: Софія Київська як памʼятка київського центру Русі й сучасний
    символ спротиву імперському привласненню — розрізняти середньовічний факт і сучасну рецепцію.'
  - 'Кінцева оцінка: Ярослав — не святий і не філософ, а київський правитель свого часу з правовою, будівельною
    й династичною політикою; «європейськість» — у мережі шлюбів і контактів, а не в модерній етнічній формулі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Yaroslav the Wise as lawgiver, builder, and diplomat; a critical examination of the "Ruska Pravda", the Golden
  Age of Kyiv, and the anti-hagiographical realities of his rise to power and contested legacy.
level: BIO
module: bio-004
objectives:
- Аналізувати «Руську правду» як ключову правову пам''ятку, що змінила соціальні відносини на Русі
- Критично оцінювати спадщину Ярослава, розрізняючи історичний факт, агіографію та пізніші ідеологічні міфи (включно
  з російськими імперськими)
- Порівнювати зовнішню політику Ярослава (династичну дипломатію) з аналогічними практиками в середньовічній Європі
- Формулювати збалансовану оцінку постаті Ярослава, інтегруючи його досягнення та морально неоднозначні вчинки
