objectives:
- Аналізувати «Руську правду» як ключову правову пам''ятку, що змінила соціальні відносини на Русі
- Критично оцінювати спадщину Ярослава, розрізняючи історичний факт, агіографію та пізніші ідеологічні міфи (включно з російськими
  імперськими)
- Порівнювати зовнішню політику Ярослава (династичну дипломатію) з аналогічними практиками в середньовічній Європі
- Формулювати збалансовану оцінку постаті Ярослава, інтегруючи його досягнення та морально неоднозначні вчинки
