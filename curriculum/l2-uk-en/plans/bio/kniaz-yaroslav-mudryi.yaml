content_outline:
- points:
  - 'Парадокс: Як князь, що прийшов до влади через жорстоку громадянську війну та осліплення родичів, увійшов в історію як
    «Мудрий»?'
  - '[!biography] Провокативне питання, що ставить під сумнів усталений образ Ярослава як філософа на троні.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Боротьба зі Святополком Окаянним. Ярослав — месник за братів чи холодний прагматик, що скористався ситуацією
    для захоплення влади?'
  - 'Дебат 2: Привласнення спадщини. Як російська та радянська історіографія конструювали міф про «русского князя Ярослава»,
    ігноруючи його центральну роль у становленні саме київської, української державності.'
  - '[!epistemic-humility] Літописи, написані пізніше, зображують Ярослава як ідеального християнського правителя, але скандинавські
    саги — як жорстокого конунга Яріцлейва.'
  - '[!decolonization] Розвінчання імперського наративу про «спільну колиску трьох братніх народів» через постать Ярослава.'
  section: 'Конфліктна карта: Святий, мудрець чи вбивця брата?'
  words: 900
- points:
  - 'Ростов, Новгород, і бунт проти батька Володимира: ранні роки та формування характеру в умовах постійної загрози.'
  - 'Усобиця 1015-1019 рр.: не просто боротьба за владу, а кривава драма, що визначила долю Русі. Роль варягів у становленні
    Ярослава.'
  - 'Переломний момент: битва на Альті та остаточна перемога над Святополком.'
  section: 'Формування: Шлях від кульгавого вигнанця до київського столу'
  words: 1000
- points:
  - «Руська правда» як перший кодифікований збірник законів. Відмова від кровної помсти на користь «віри» (штрафу) — цивілізаційний
    зсув.
  - 'Культурний вибух: Софійський собор, Золоті ворота, заснування бібліотеки та скрипторію. Київ як «другий Константинополь».'
  - 'Церковна політика: призначення першого руського митрополита Іларіона — крок до незалежності від Візантії.'
  - 'Династична дипломатія: «тесть Європи». Шлюби Анни, Єлизавети та Анастасії з королями Франції, Норвегії та Угорщини. Русь
    як інтегральна частина європейської політики.'
  section: 'Діяльність: «Руська правда» та золотий вік Києва'
  words: 1300
- points:
  - '[!anti-hagiography] Осліплення брата Судислава та ув''язнення його на 24 роки — факт, який не вписується в образ «Мудрого»
    і який замовчують агіографи.'
  - Жорстоке придушення повстань у Суздалі. Методи консолідації влади були далекі від гуманізму.
  - Поразка походу на Візантію 1043 року — провал, що демонструє межі його могутності.
  - '[!myth-buster] Міф про «тихе, мирне правління» після 1019 року. Насправді це був час постійної боротьби з печенігами,
    внутрішніми змовами та зовнішніми загрозами.'
  section: 'Тінь: Ціна влади та «Окаянні дні»'
  words: 900
- points:
  - 'Повернення до розминки: чи був Ярослав «Мудрим»? Студент формулює власну відповідь, зважуючи його досягнення та злочини.'
  - «Заповіт Ярослава» — спроба уникнути усобиць чи закладена бомба уповільненої дії, що призвела до роздробленості?
  - '[!decolonization] Спадщина Ярослава сьогодні: чому Софійський собор є символом незламності української державності, і
    чому Росія намагається вкрасти цей символ.'
  - 'Кінцева оцінка: Ярослав — не святий і не філософ, а видатний державний діяч свого часу, який заклав правові та культурні
    підвалини європейської України.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Yaroslav the Wise as lawgiver, builder, and diplomat; a critical examination of the "Ruska Pravda", the Golden Age
  of Kyiv, and the anti-hagiographical realities of his rise to power and contested legacy.
level: BIO
