content_outline:
- points:
  - >-
    [!biography] Знайомство з Данилом Щербаківським: український мистецтвознавець,
    етнограф, археолог та відданий музейний працівник.
  - >-
    Освіта та початок шляху: вивчення історії та філології в Київському університеті,
    формування інтересу до збереження української матеріальної культури.
  section: Розминка
  words: 400
- points:
  - >-
    Масштаб досліджень: вивчення церковних старожитностей, килимів, портретів,
    кераміки та дерев'яної архітектури.
  - >-
    Розбудова музейного фонду: невтомна праця у Київському художньо-промисловому
    і науковому музеї, збір та систематизація артефактів.
  - >-
    [!decolonization] Публічний захист спадщини: стаття "Культурні цінності в небезпеці!"
    (1926) як акт опору проти руйнування національного мистецтва в ранній
    радянський період.
  section: 'Діяльність: Музеї та етнографічні експедиції'
  words: 1000
- points:
  - >-
    [!anti-hagiography] Знищення через бюрократію: радянський механізм репресій
    проти культурних діячів діяв не лише через арешти, але й через постійне 
    цькування, доноси та адміністративний тиск.
  - >-
    Інституційне переслідування: створення нестерпних умов для роботи в музеї,
    ідеологічні атаки на українське мистецтвознавство.
  - >-
    Трагічний фінал: самогубство 6 червня 1927 року (втопився у Дніпрі) як
    наслідок жорстокого цькування та неможливості захистити справу свого життя.
  - >-
    [!epistemic-humility] Точні деталі доносів і останніх днів залишаються частково
    схованими в архівах, але загальний механізм тиску чітко задокументований.
  section: 'Тінь: Цькування та трагічний протест'
  words: 1200
- points:
  - >-
    Спадщина дослідника: каталоги, колекції та зібрані артефакти стали фундаментом
    сучасного Національного художнього музею України.
  - >-
    Пам'ять про Щербаківського як попередження про крихкість культурних цінностей
    і потребу їх постійного захисту.
  section: 'Підсумок: Збережені цінності'
  words: 800
focus: >-
  Данило Щербаківський як фундатор українського музейництва та охорони пам'яток,
  що став жертвою радянського інституційного цькування і трагічно пішов із життя
  у 1927 році.
