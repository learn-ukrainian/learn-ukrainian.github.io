content_outline:
- points:
  - >-
    [!biography] Знайомство з Данилом Щербаківським: український мистецтвознавець,
    етнограф, археолог, музейний куратор; брат Вадима Щербаківського.
  - >-
    Провокаційне питання: чому режим, який ще не розстрілював масово «боярів
    культури» 1927 року, уже міг знищити дослідника через музей і донос?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 17(29).12.1877 у Шпичинцях; історія та філологія в Київському
    університеті; формування інтересу до матеріальної культури.
  - >-
    Музейні посади: Умань, Київський художньо-промисловий і науковий музей,
    Київський археологічний інститут, Українське наукове товариство.
  - >-
    [!decolonization] Національна програма мистецтвознавства: не «провінційна
    етнографія», а систематизація церковного мистецтва, килимів, портретів,
    дерев'яної архітектури.
  section: 'Формування: Університет і музейна школа'
  words: 1000
- points:
  - >-
    Польові дослідження та збирання: килими Полтавщини (1906), «Буковинські і
    галицькі церкви, надгробні й придорожні хрести...» (1912), дерев'яна архітектура
    (1913), збереження під час війни в Галичині та Буковині.
  - >-
    1920-ті: портрет, народне мистецтво, кераміка, вишивка, церковні старожитності;
    розбудова музейного фонду.
  - >-
    Публічний акт опору: стаття «Культурні цінності в небезпеці!» (1926) — логіка
    екстреного захисту спадщини в ранньорадянському періоді.
  - >-
    [!anti-hagiography] Розділяти тип об'єкта, ритуальне використання й національну
    інтерпретацію — уникати одноконфесійного наративу (православ'я, греко-католицтво,
    польський, єврейський контексти).
  section: 'Діяльність: Музеї, експедиції та «Культурні цінності в небезпеці!»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Репресія без вироку: задокументовані цькування й доноси,
    а не вигаданий судовий процес; [!epistemic-humility] точний ланцюг доносів і
    останніх днів — прогалина в архівах, не драматизувати сцени.
  - >-
    Механізм: бюрократичне утискання музейної автономії, ідеологічні атаки на
    українське мистецтвознавство; тиск робить наукову працю нестерпною.
  - >-
    Самогубство 6 червня 1927 (втоплення в Дніпрі) після цькування — причинно
    пов'язаний фінал у ЕСУ та енциклопедичних джерелах; формулювання записки
    «Залишити музей... не маю сили» — обережно, архівний образ не відновлено.
  - >-
    [!myth-buster] Терор — не лише розстріл: інституційне переслідування знищує
    школу збереження так само, як знищує живописця.
  section: 'Тінь: Цькування, доноси та трагічний фінал'
  words: 1600
- points:
  - >-
    Спадщина: каталоги, колекції, публікації — фундамент Національного художнього
    музею України та подальшого мистецтвознавства.
  - >-
    Пам'ять як попередження: крихкість культурних цінностей і потреба постійного
    захисту (зв'язок із сучасною пам'яткоохороною).
  - >-
    Урок для decolonized NPOV: російськоцентричні наративи знецінюють українську
    музейну науку; Щербаківський — доказ національної програми збереження.
  section: 'Підсумок: Збережені цінності'
  words: 1000
focus: >-
  Данило Щербаківський як фундатор українського музейництва та охорони пам'яток,
  що став жертвою радянського інституційного цькування і трагічно пішов із життя
  у 1927 році.
