content_outline:
- points:
  - >-
    [!biography] Віра Агеєва: літературознавиця, критикиня, професорка
    Києво-Могилянської академії, феміністична інтерпретаторка і публічна
    деколоніальна читачка українського канону.
  - >-
    Провокаційне питання: чи може біографія критикині бути не менш важливою за
    біографію письменника, якщо саме критика змінює те, кого культура здатна
    прочитати?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 30 липня 1958 року в Бахмачі на Чернігівщині. Київський
    університет, докторська з філології, робота в Інституті літератури,
    редакційна праця в `Слові і часі` і професорство в НаУКМА створюють шлях
    науковиці й інституційної будівничої, а не лише медійної коментаторки.
  - >-
    Пізньорадянська гуманітаристика задавала межі того, які тексти можна було
    читати і якими методами. Після 1991 року відкриття заборонених творів і
    нових інтерпретацій стало для Агеєвої не додатком, а головним полем праці.
  - >-
    [!epistemic-humility] Агеєва жива. Поточні посади, видавничі профілі,
    редакційні ролі і публічні інтерв'ю треба перевіряти на дату створення
    модуля, а не переписувати з рекламних сторінок без часу.
  section: 'Формування: Бахмач, університет і пізньорадянська філологія'
  words: 900
- points:
  - >-
    Шевченківська премія 1996 року за колективну `Історію української
    літератури XX століття` важлива антипростою: Агеєва не тільки критикує
    канон, вона бере участь у виробництві навчального канону.
  - >-
    Праці про Лесю Українку, жіночий простір українського модернізму,
    Домонтовича, Рильського, Бажана, київських модерністів і культурну пам'ять
    показують метод: знайомий текст читається так, ніби його ще не читали.
  - >-
    [!decolonization] Деколонізація в Агеєвої — це не заміна однієї таблиці
    імен іншою. Це перевірка імперських і патріархальних рамок, через які
    українські тексти ставали другорядними, "жіночими", провінційними або
    несучасними.
  - >-
    Феміністична інтерпретація не є біографічним ярликом. Це метод, який
    питає, хто говорить, чий досвід вважають універсальним і чому жіноче письмо
    часто входило в канон через виправдання.
  section: 'Діяльність: Перечитування модернізму, жінок і канону'
  words: 1200
- points:
  - >-
    `За лаштунками імперії`, `Марсіани на Хрещатику`, `Проти культурної
    амнезії` і публічні лекції після 2014 та 2022 років переводять академічну
    працю в простір пам'яті, війни, міста, імперської культури і публічної
    есеїстики.
  - >-
    Її читання Лесі Українки як антиколоніальної авторки, а також праця з
    Рильським, Бажаном і Домонтовичем показують, що деколонізація не обмежується
    прямою політичною публіцистикою: вона змінює питання до форми, стилю і
    архіву.
  - >-
    [!myth-buster] Публічні інтерв'ю про російську культуру, Пушкіна, війну і
    пам'ять слід датувати і подавати як позиції конкретного часу, а не як
    бездоказову формулу про всю літературу чи всіх читачів.
  section: 'Діяльність: Публічна пам''ять і деколоніальна есеїстика'
  words: 900
- points:
  - >-
    [!anti-hagiography] Агеєва не є біографією арешту, заслання, табору або
    персональної справи КДБ. Механізм тиску тут інший: академічні норми,
    патріархальне канонотворення, пострадянська інерція і російська імперська
    культурна ієрархія.
  - >-
    Її авторитет теж потребує критики. Канон, який переглядають, не зникає:
    він перебудовується. Семінар питає, які нові центри, сліпі зони і жанрові
    пріоритети може створити будь-яка ревізія.
  - >-
    Комерційні видавничі сторінки і медійні інтерв'ю корисні для списків
    нових книжок та публічної мови, але базові факти тримаємо на ЕСУ, КНПУ,
    НаУКМА, KMHJ і репозитаріях.
  section: 'Тінь: Авторитет критикині, живі полеміки і нові виключення'
  words: 1100
- points:
  - >-
    Підсумок повертає до питання, чому критикиня заслуговує на біографічний модуль:
    вона змінює не тільки список авторів, а й правила читання, доказу і
    культурної пам'яті.
  - >-
    Порівняння з Оксаною Забужко, Лесею Українкою, Максимом Рильським, Миколою
    Бажаном і Домонтовичем показує Агеєву як вузол між літературною історією,
    феміністичною критикою і деколоніальним публічним словом.
  - >-
    [!decolonization] Фінальний висновок: деколоніальне читання не звільняє
    студента від доказу. Воно вимагає точнішого доказу, бо бореться саме з
    успадкованими способами бачити Україну чужими очима.
  section: 'Підсумок: Критика як культурна дія'
  words: 700
focus: >-
  Віра Агеєва як жива літературознавиця, професорка, феміністична критикиня і
  деколоніальна публічна інтелектуалка, яка перечитує український канон через
  модернізм, жіноче письмо, Лесю Українку, Домонтовича, Рильського, Бажана,
  імперську пам'ять і культурну амнезію. Семінар розглядає канон як місце
  тиску й відповідальності, не вигадуючи особистої тюремної біографії.
level: BIO
