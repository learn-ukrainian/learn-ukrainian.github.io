objectives:
- >-
  Пояснювати Агеєву як критикиню і творчиню канону, чия біографічна важливість
  полягає в методі перечитування.
- >-
  Аналізувати феміністичну і деколоніальну критику як роботу з доказом,
  архівом, пам'яттю і літературною формою.
- >-
  Розрізняти академічну біографію, публічну есеїстику, медійні інтерв'ю і
  поточні ролі живої постаті.
- >-
  Критично оцінювати авторитет ревізійного канону і можливість нових виключень
  після перегляду старих рамок.
