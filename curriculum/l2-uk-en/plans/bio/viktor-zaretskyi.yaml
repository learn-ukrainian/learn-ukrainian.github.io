content_outline:
- points:
  - >-
    [!biography] Знайомство з Віктором Зарецьким: живописець, графік, педагог
    і ключова фігура українського монументального мистецтва другої половини ХХ століття.
  - >-
    Провокаційне питання: чому пошук національного коріння у візуальному мистецтві
    викликав спротив радянської ідеологічної машини?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта: закінчення Київського художнього інституту в майстерні Сергія Григор'єва.
    Ранні роботи індустріальної тематики ("Шахтарі. Зміна", 1955).
  - >-
    Відкриття фольклору та декоративності: вплив поїздок та спостережень ("Вибирання льону").
    Перехід від соціалістичного реалізму до модерної орнаментики та сецесії.
  - >-
    Педагогічна система "Роздуми біля полотна": значення академічної школи як основи
    для вільного вираження емоцій та пристрасті.
  section: 'Формування: Від академізму до модернізму'
  words: 1000
- points:
  - >-
    Громадська позиція: лідерство у Клубі творчої молоді "Сучасник" (з 1963)
    та солідарність із дисидентським рухом.
  - >-
    Підпис під "Листом 139-ти" (1965) на захист заарештованих українських інтелектуалів,
    зокрема разом із дружиною Аллою Горською.
  - >-
    [!decolonization] Розкриття механізму тиску: закриття "Сучасника" після ідеологічних
    кампаній та звуження публічного простору для неконформістів.
  section: 'Шістдесятництво та ідеологічний тиск'
  words: 1200
- points:
  - >-
    [!myth-buster] Зарецький не мав задокументованого кримінального арешту, але зазнавав
    систематичного професійного тиску та нагляду в середовищі КДБ.
  - >-
    Вбивство Алли Горської (1970) як контекст залякування та ізоляції: створення атмосфери
    терору навколо митця.
  - >-
    Мистецтво як пам'ять: портрети Василя Стуса (1971, 1990) та їхнє значення у
    збереженні облич дисидентського опору.
  section: 'Тінь: Ізоляція та збереження пам''яті'
  words: 1600
- points:
  - >-
    Пізній період творчості: створення знакових полотен ("Косівський гончар", "Наталка",
    "Дерево (Витоки мистецтва)", "Золотий череп. Дзвони Чорнобиля").
  - >-
    [!anti-hagiography] Подолання стереотипів: сприйняття Зарецького не лише як
    "українського Клімта" чи "чоловіка Алли Горської", а як самостійного митця і педагога.
  - >-
    Сучасне значення: відновлення спадщини художника після 1991 року та посмертне
    присудження Шевченківської премії.
  section: 'Підсумок: Спадщина та подолання стереотипів'
  words: 1000
focus: >-
  Віктор Зарецький як видатний український живописець і педагог-новатор, учасник
  руху шістдесятників. Аналіз його еволюції від академізму до модернізму в умовах
  радянського ідеологічного тиску.
