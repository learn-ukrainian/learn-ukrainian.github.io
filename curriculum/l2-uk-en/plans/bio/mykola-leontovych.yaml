content_outline:
- points:
  - 'Парадокс: як одна з найвідоміших різдвяних мелодій у світі, «Carol of the Bells», насправді є українським «Щедриком»
    — новорічною піснею, а її автора вбив радянський агент, після чого СРСР десятиліттями приховував і злочин, і походження
    твору?'
  - '[!biography] Микола Леонтович: геній хорової мініатюри, жертва політичного терору, чия музика стала символом української
    культури, часто безіменним.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Леонтович — композитор чи аранжувальник? Музикознавці сперечаються, чи є його обробки народних пісень (особливо
    «Щедрик») самостійними композиціями, чи лише талановитим гармонізуванням фольклору.'
  - 'Дебат 2: «Щедрик» vs “Carol of the Bells” — культурна асиміляція чи вдала адаптація? [!decolonization] Дискусія про те,
    чи змінив Пітер Вільговський не лише текст, а й дух твору, перетворивши язичницьку щедрівку на різдвяний гімн і надовго
    «відірвавши» пісню від її українського коріння.'
  - '[!epistemic-humility] Позиція 1: Вільговський популяризував українську мелодію у світі. Позиція 2: Він створив комерційний
    продукт, який затьмарив і автора, і оригінальний контекст.'
  section: 'Конфліктна карта: Народний геній чи присвоєний бренд?'
  words: 900
- points:
  - 'Син сільського священника з Поділля: занурення в народну музику та церковний спів з дитинства. Вплив батька, який керував
    хором семінаристів.'
  - 'Кам''янець-Подільська духовна семінарія як музична школа: освоєння теорії музики, гармонії та поліфонії.'
  - 'Вчительська праця на Донбасі та Поділлі: створення хорів, збирання фольклорних зразків — понад 500 пісень, що стали основою
    для майбутніх шедеврів.'
  - 'Переїзд до Києва та навчання у Болеслава Яворського: знайомство з новітніми музичними теоріями, що вплинули на його композиторський
    стиль.'
  section: 'Формування: Від подільського дяка до майстра хорової мініатюри'
  words: 1000
- points:
  - 'П''ять редакцій «Щедрика» (1901–1919): довгий шлях від простої обробки до геніальної чотиринотної поліфонічної композиції,
    де кожен голос імітує спів птахів.'
  - Прем'єра «Щедрика» хором Київського університету під керівництвом Олександра Кошиця у 1916 році — тріумф, що поклав початок
    світовому визнанню.
  - 'Турне Української Республіканської Капели (1919-1924): «Щедрик» підкорює Європу та Америку, стаючи інструментом культурної
    дипломатії молодої держави УНР.'
  - 'Інші хорові шедеври: «Дударик», «Піють півні», «Козака несуть» — вершини української хорової мініатюри, де Леонтович
    поєднав фольклор із досконалою європейською технікою.'
  section: 'Діяльність: Анатомія «Щедрика» та вершини творчості'
  words: 1300
- points:
  - '[!anti-hagiography] Трагічна загибель: 23 січня 1921 року Леонтовича застрелив агент ВЧК Афанасій Грищенко, який напросився
    на ночівлю до будинку композитора.'
  - '[!myth-buster] Десятиліття радянської брехні: офіційна пропаганда стверджувала, що композитора вбили «петлюрівці» або
    «звичайні бандити». Правда про вбивство чекістом стала відома лише в 1990-х роках після відкриття архівів.'
  - 'Політичний вимір злочину: вбивство Леонтовича було частиною цілеспрямованого знищення української інтелігенції, що не
    вписувалась у радянську ідеологію.'
  - 'Спроба присвоєння спадщини: радянська влада, вбивши композитора, намагалася представити його творчість як частину «радянської»
    культури, замовчуючи його зв''язки з УНР та трагічну долю.'
  section: 'Тінь: Вбивство та радянська амнезія'
  words: 900
- points:
  - 'Повернення до парадоксу: студент тепер може пояснити, як політичний терор і культурна асиміляція призвели до того, що
    всесвітньо відомий твір надовго втратив зв''язок зі своїм автором та батьківщиною.'
  - '[!decolonization] Сучасна боротьба за ідентичність «Щедрика»: акції #Shchedryk, флешмоби та дослідження, що повертають
    пісні її українське ім''я та розповідають світові правду про долю Леонтовича.'
  - 'Леонтович як символ: його музика — це доказ багатства української культури, а його доля — свідчення злочинів радянського
    режиму проти цієї культури.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykola Leontovych's life, the global success of "Shchedryk" (Carol of the Bells), his murder by a Soviet agent, and
  the subsequent Soviet campaign to erase the Ukrainian identity of the song and its creator.
