objectives:
- Пояснювати рух Лук'яна Кобилиці як боротьбу буковинських гуцульських громад за права на ліси, пасовища й самоврядування проти дідичів у Габсбурзькій монархії.
- 'Пов''язувати сільські скарги з парламентською політикою 1848 року: вибори до австрійського Рейхстагу, автономія Буковини, розподіл землі без викупу для дідичів.'
- Розрізняти джерельний запис (арешти, збройні загони, поліцейський нагляд) і фольклорний образ «народного героя» та «короля гуцулів».
- Коректно позначати джерельну невизначеність (рік народження 1803/1812, місце народження, легенди про смерть) замість вигаданої однозначності.
