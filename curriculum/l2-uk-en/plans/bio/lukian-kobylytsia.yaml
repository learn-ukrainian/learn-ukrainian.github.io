content_outline:
- points:
  - 'Провокація: Лук''ян Кобилиця — «король гуцулів» із легенд чи виборний селянський депутат австрійського парламенту? Як пастух-вівчар опинився і на трибуні Рейхстагу, і під поліцейським наглядом?'
  - '[!biography] Буковинський гуцул, який вів громади за права на ліси й пасовища — і дійшов від сільської петиції до Віденського парламенту 1848 року.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): для дідичів і австрійської адміністрації — небезпечний бунтівник, якого арештовують і тримають під наглядом; для громад — обранець, що обстоює їхні права на ліс, пасовище й самоврядування.'
  - 'Дебат 2 (рамки пам''яті): народна легенда й поема Федьковича роблять «народного героя»; радянська історіографія — «антифеодального борця»; джерела фіксують петиції, вибори, збройні загони й поліцейський нагляд.'
  - '[!decolonization] Осердя — габсбурзька Буковина: дідичі, домінії, панщина, ліси й пасовища, Рейхстаг, а не пізніші імперські чи модерні національні категорії.'
  - '[!epistemic-humility] Рік народження джерельно розходиться (ЕІУ — 1812; IEU/OBL — бл. 1803); місце народження має варіанти (Путила-Сторонець, Сторонець-Путилів, Красний Діл). Позначати джерело, а не вигадувати одну «правильну» версію.'
  section: 'Конфліктна карта: селянський депутат чи бунтівний «король гуцулів»?'
  words: 900
- points:
  - 'Гуцульський селянський світ: залежність від дідичів, панщина, обмеження на користування лісами й пасовищами, які пани трактували як власність маєтку.'
  - 1839 — селяни обирають Кобилицю уповноваженим; він організовує петиції до буковинської, галицької та віденської влади.
  - 1842-1844 — конфліктний цикл (за архівом ДАЧО — відмова віддавати овець як повинність, слідства); Кобилицю ув'язнюють у 1842-1844 роках, ще один арешт 1847 року.
  - '1843-1844 — виступ 22 сільських громад після заборон на ліс: громади усувають панську адміністрацію, переобирають старших, відмовляються від повинностей, прагнуть статусу державних селян і шкіл.'
  section: 'Формування: громада, ліс і петиція'
  words: 1000
- points:
  - 'Політичне відкриття 1848 року: політизація селян, вибори до Рейхстагу, невирішені питання про викуп для дідичів і права громад на ліси й пасовища.'
  - 'Депутат парламенту: Кобилицю обирають до австрійського Рейхстагу; він обстоює автономію Буковини, приєднання до Галичини й розподіл землі без викупу для дідичів.'
  - 1848-1849 — гуцульські ради, збройні гуцульські загони, поширення руху Буковиною й на Галичину; за ЕІУ найбільша фаза — весна 1849 року.
  - '[!decolonization] Автономію Буковини й приєднання до Галичини вчити як габсбурзьку політику 1848 року, а не як готову модерну національну програму.'
  - 'Багатоетнічна пересторога: у буковинській політиці була й румунська провідна верства; подавати це як регіональну політику, а не етнічну ворожнечу.'
  section: 'Діяльність: 1848 рік — Рейхстаг і збройний рух'
  words: 1300
- points:
  - 'Розгром: у травні 1849 року австрійські війська придушили повстання; це не тріумфальний фінал, а поразка збройного руху.'
  - 'Арешт і кінець: у квітні 1850 року Кобилицю заарештовано в Жаб''ї, 1851 року звільнено, заборонено повертатися на Гуцульщину й тримали під поліцейським наглядом у Солці, де він і помер 24 жовтня 1851 року.'
  - '[!myth-buster] Публічні перекази інколи додають тортури й отруєння; без сильного джерела тримати ці твердження поза фактичною хронологією й позначати як легенду.'
  - '[!anti-hagiography] Збройний тиск, невдачі й внутрішні межі руху — частина запису; «народний герой» не має стирати поразку та складність.'
  section: 'Тінь: придушення, нагляд і легенда'
  words: 900
- points:
  - 'Повернення до розминки: чи був Кобилиця радше селянським політиком, чи бунтівним ватажком — і чому пам''ять обрала образ «короля гуцулів»?'
  - 'Спадщина: рух зробив видимою проблему прав громад на ліси й пасовища та політизацію селянства; поема Федьковича й пісні закріпили постать у пам''яті.'
  - '[!epistemic-humility] Порівняння з Довбушем: та сама Гуцульщина, але інший інструмент опору — не опришківський загін, а громада, петиція й парламент.'
  section: 'Дискусія та підсумок: права, парламент і пам''ять'
  words: 700
focus: 'Lukian Kobylytsia as a Bukovynian Hutsul peasant leader and 1848 Austrian Reichstag deputy: forest and pasture rights, corvee, community self-government and regional autonomy under Habsburg rule, kept distinct from his folk-hero afterlife, with source-labeled uncertainty about his dates, birthplace and death.'
