content_outline:
- points:
  - 'Парадокс: Як «свій хлопець» з телевізора, що співав легковажні пісні, перетворився на головного правдоруба країни, чиї
    прогнози про війну та корупцію стали пророчими?'
  - '[!biography] Провокаційне питання: чи був Кузьма просто цинічним шоуменом, що вдало грав роль «голосу народу», чи справжнім
    моральним авторитетом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова. Суржик Кузьми — це свідомий художній прийом, що наблизив його до народу і легітимізував живу мову, чи
    це «засмічення» ефіру та поганий приклад для молоді?'
  - 'Дебат 2: Позиція. Громадянська активність Кузьми — це щирий патріотизм і відповідальність митця, чи вдалий маркетинг
    та популізм, що експлуатував суспільне невдоволення?'
  - '[!epistemic-humility] Оцінки його творчості коливаються від «генія простоти» до «невибагливого примітивізму».'
  - '[!decolonization] Кузьма кинув виклик києвоцентричному, академічному уявленню про «правильну» українську культуру, показавши
    силу регіональної ідентичності та «нефільтрованої» мови.'
  section: 'Конфліктна карта: Суржик і правда'
  words: 900
- points:
  - 'Галицький контекст 90-х: Самбір та Новояворівськ як середовище, де формувався його світогляд — суміш західного впливу
    та пострадянської реальності.'
  - 'Ранній «Скрябін» (1989): Еволюція від синті-попу та нью-вейву під впливом Depeche Mode до потужного поп-року. Як зміна
    музики відображала дорослішання країни?'
  - 'Переїзд до Києва: Культурний шок і початок трансформації з андеграундного музиканта на зірку шоу-бізнесу.'
  section: 'Формування: Від Новояворівська до всієї країни'
  words: 1000
- points:
  - 'Телевізійна кар''єра: Проєкти «Шанс» і «Шейканемо» зробили його обличчя відомим кожній родині. Аналіз його образу ведучого
    — іронічного, простого, прямолінійного.'
  - 'Літературний феномен: Книги «Я, "Побєда" і Берлін» та «Я, Паштєт і Армія» стали культовими. Чому його автобіографічна
    проза, написана простою мовою, мала більший успіх, ніж твори багатьох професійних письменників?'
  - 'Продюсерська діяльність: Кузьма як «хрещений батько» для молодих гуртів (DZIDZIO, «Пающіє труси»).'
  section: 'Діяльність: Шоумен, письменник, продюсер'
  words: 1300
- points:
  - '[!anti-hagiography] Тур «Молодь — проти! Молодь — за!» на підтримку Януковича (2004). Найбільший компроміс Кузьми, за
    який він згодом виправдовувався. Аналіз його мотивів: гроші, наївність чи цинічний розрахунок?'
  - 'Сарказм як захист: Чи не переходила його фірмова іронія та «стьоб» у тотальний цинізм, що знецінював усе — від політики
    до гламуру?'
  - '[!myth-buster] Міф про «простого хлопця». Кузьма був успішним бізнесменом, власником студії та продюсером. Його образ
    — це поєднання щирості та продуманого брендингу.'
  - 'Критика з боку колег: звинувачення у «продажності» та роботі на олігархічних телеканалах.'
  section: 'Тінь: Компроміси та цинізм'
  words: 900
- points:
  - 'Повернення до розминки: Феномен Кузьми полягає в тому, що він єдиний в українському шоу-бізнесі зміг монетизувати щирість
    і перетворити її на потужний соціальний капітал.'
  - 'Громадянська позиція (2014-2015): Його волонтерство для АТО, різкі пісні («Руїна», «Лист до президентів») та інтерв''ю
    про війну перетворили його з поп-ідола на моральний орієнтир.'
  - 'Загибель і «народна канонізація»: Трагічна аварія 2 лютого 2015 року спричинила всенародний шок. Чому його смерть була
    сприйнята як особиста втрата мільйонами? Посмертне звання Героя України (2020).'
  - 'Актуальність сьогодні: Чому під час повномасштабного вторгнення його пісні та цитати звучать гостріше, ніж будь-коли?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Андрій Кузьменко (Кузьма) — феномен української культури, що пройшов шлях від синті-попу до гострої соціальної критики,
  ставши моральним авторитетом для мільйонів.
