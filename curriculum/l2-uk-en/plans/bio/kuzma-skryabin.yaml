content_outline:
- points:
  - 'Джерельне питання: як відрізнити документовану творчу кар''єру Андрія Кузьменка від посмертного образу «голосу народу»?'
  - '[!biography] Порівняння енциклопедичної довідки з датованим спогадом співзасновника гурту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: як аналізувати розмовну й змішану лексику в пісні без ярликів «чиста» або «зіпсована» мова?'
  - 'Дебат 2: які джерела потрібні, щоб оцінювати громадянські вчинки публічної особи, а не вгадувати щирість чи маркетинговий намір?'
  - '[!epistemic-humility] Рецепція потребує репрезентативних відгуків; одна похвала або одна критика не описує всю аудиторію.'
  - '[!decolonization] Регіональне походження й розмовне мовлення розглядати як контекст творчості, а не як відхилення від київської норми.'
  section: 'Конфліктна карта: Суржик і правда'
  words: 900
- points:
  - Народження у Самборі, освіта та початок музичної діяльності за енциклопедичною довідкою.
  - Заснування гурту «Скрябін» 1989 року й участь у фестивалі «Червона рута» 1991 року.
  - Спогад Ростислава Домішевського як усне свідчення учасника подій, яке потребує атрибуції й не замінює повної історії гурту.
  section: 'Формування: Від Новояворівська до всієї країни'
  words: 1000
- points:
  - Телевізійні проєкти й радійна робота, перелічені в ЕСУ, як окрема частина медійної кар'єри.
  - Альбоми гурту й книжка «Я, Побєда і Берлін» як бібліографічно підтверджені складники доробку.
  - Як не перетворювати перелік робіт на твердження про «культовість», масову популярність або вплив без окремих даних.
  section: 'Діяльність: Шоумен, письменник, продюсер'
  words: 1300
- points:
  - '[!anti-hagiography] Політичні кампанії, комерційні рішення й пізніші пояснення можна розглядати лише за прямими датованими джерелами.'
  - Іронія та сарказм аналізуються в конкретному тексті, а не як діагноз характеру автора.
  - '[!myth-buster] Медіаобраз «простого хлопця» не доводить ані повної спонтанності, ані продуманого брендингу.'
  - Відмова від неперевірених звинувачень, мотивів і циркулюючих цитат у catalog-source пакеті.
  section: 'Межі джерел: Оцінки, мотиви й публічний образ'
  words: 900
- points:
  - Повернення до розминки з двома паралельними лініями — перевірна кар'єра та пізніша пам'ять про виконавця.
  - Датовані повідомлення про допомогу військовим і посмертні відзнаки слід атрибутувати конкретним джерелам.
  - Загибель у дорожній аварії 2 лютого 2015 року за ЕСУ без конспірологічних припущень про причину.
  - Аналіз пам'яті та рецепції потребує окремого корпусу, а не добірки популярних дописів або афоризмів.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Джерельно обмежений аналіз музичної, телевізійної й літературної кар'єри Андрія Кузьменка та відмінності між біографією, спогадом і посмертною рецепцією.
level: BIO
module: bio-184
objectives:
- Побудувати перевірну хронологію музичної, телевізійної й літературної кар'єри Андрія Кузьменка.
- Розрізняти енциклопедичну довідку, ретроспективний спогад учасника та посмертну рецепцію.
- Аналізувати розмовну й змішану лексику лише в законно доступному конкретному тексті, без мовних ярликів.
- Оцінювати твердження про популярність, громадянські вчинки й публічний образ за датованим і репрезентативним корпусом.
