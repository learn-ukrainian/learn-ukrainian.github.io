objectives:
- Аналізувати культурний феномен Андрія Кузьменка, пояснюючи причини його популярності
- Оцінювати використання ним мовних засобів (суржик, іронія, стьоб) як частину художнього стилю
- Дискутувати про громадянську відповідальність митця в умовах політичної кризи та війни
- Формулювати власну позицію щодо моральних компромісів публічної особи
