  - Переїзд до Києва (1904)
  - Вибір України як батьківщини
  words: 850
- section: Мостобудівник
  points:
  - Проектування мостів через Дніпро
  - Інновації в конструкції мостів
  - Підготовка українських інженерів
  - Київський політехнічний інститут
  words: 850
- section: Революція зварювання
  points:
  - Заснування Інституту електрозварювання (1934)
  - Автоматичне зварювання
  - Застосування у танкобудуванні (WWII)
  - Підвищення продуктивності в 10 разів
  words: 850
- section: Післявоєнні досягнення
  points:
  - Відбудова зруйнованих мостів
