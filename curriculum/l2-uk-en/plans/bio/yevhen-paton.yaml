content_outline:
- points:
  - 'Парадокс: Як інженер, народжений у Ніцці, вихований в Російській імперії та обласканий радянською владою, став незаперечним
    символом Києва та батьком сучасної української інженерної школи?'
  - 'Провокаційне питання: Чиї мости він будував — імперські чи українські?'
  - '[!biography] Постать Євгена Патона — не просто інженера, а й засновника династії, що визначила обличчя української науки
    на століття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Лояльний підданий імперії vs Прагматичний технократ. Патон служив царю, потім СРСР. Чи був це свідомий
    вибір, чи просто спроба реалізувати свої амбіції в єдино можливих умовах?'
  - 'Дебат 2 (спадок): Радянський міф про «великого радянського вченого» vs Сучасна українська оцінка. Як пропаганда СРСР
    приховувала його дворянське походження і створювала образ ідеального радянського інженера?'
  - '[!epistemic-humility] Визнання, що його мотивація не була чорно-білою. Він міг одночасно бути лояльним до системи і щиро
    працювати на розвиток землі, яку вважав своєю.'
  - '[!decolonization] Розвінчання радянського наративу, який представляв Патона як продукт суто російської/радянської інженерної
    школи, ігноруючи його внесок саме в українську інфраструктуру та науку.'
  section: 'Конфліктна карта: Слуга імперії чи будівничий України?'
  words: 900
- points:
  - 'Аристократичне походження: народження в родині російського консула в Ніцці (1870), світ, далекий від заводів і мостів.'
  - 'Освіта: Дрезденський політехнічний інститут та Петербурзький інститут інженерів шляхів сполучення — найкраща інженерна
    школа Європи та Імперії.'
  - 'Вибір Києва: Чому у 1904 році успішний інженер переїжджає з імперської столиці до Києва? Викладання в Політехнічному
    інституті як початок «українізації» Патона.'
  - 'Формативний досвід: робота над першими київськими мостами, усвідомлення інфраструктурних проблем та можливостей регіону.'
  section: 'Формування: Шлях із Ніцци до Києва'
  words: 1000
- points:
  - 'Мостобудування: від проектування перших мостів на початку століття до відбудови зруйнованих війною переправ.'
  - 'Заснування Інституту електрозварювання (1934): створення унікального наукового центру в Києві, який швидко став світовим
    лідером.'
  - 'Технологічний прорив: розробка методу автоматичного швидкісного зварювання під флюсом, що вдесятеро підвищило продуктивність.'
  - 'Внесок у перемогу в WWII: технологія Патона дозволила налагодити масове виробництво танків Т-34. Його зварні шви зробили
    броню міцнішою.'
  - 'Апогей кар''єри: суцільнозварний міст через Дніпро (1953), названий на його честь — вершина його інженерної думки.'
  section: 'Діяльність: Революція зварювання та мостів'
  words: 1300
- points:
  - '[!anti-hagiography] Робота на військову машину: його технології зробили радянські танки ефективнішими, що означає і ефективнішими
    знаряддями вбивства та придушення повстань.'
  - 'Моральні компроміси: процвітання в епоху сталінських репресій. Чи міг він не знати про Голодомор та розстріли, створюючи
    промислову міць СРСР?'
  - '[!myth-buster] Міф про «народного інженера». Патон був прагматичним аристократом, який успішно інтегрувався в тоталітарну
    систему заради своїх наукових цілей.'
  - 'Використання примусової праці: до будівництва мосту Патона залучали німецьких військовополонених. Це замовчуваний аспект
    «великого будівництва».'
  - 'Співпраця з владою: отримання найвищих державних нагород (Герой Соцпраці, ордени Леніна) в обмін на повну лояльність
    режиму.'
  section: 'Тінь: Ціна прогресу'
  words: 900
- points:
  - 'Повернення до парадоксу: Патон — приклад того, як людина може служити імперії, але її праця стає фундаментом для нації,
    що бореться за незалежність від цієї ж імперії.'
  - 'Спадщина в металі: Інститут електрозварювання та Міст Патона — фізичне втілення його генія, що служить Україні донині.'
  - 'Династія Патонів: син Борис, який очолив інститут після батька і продовжив його справу, перетворивши «справу Патонів»
    на унікальне явище в світовій науці.'
  - '[!decolonization] Переоцінка спадщини: як сьогодні Україні ставитися до діячів, що були інтегровані в імперську систему,
    але водночас зробили неоціненний внесок у її розбудову?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
