  - Робота до останнього дня життя
  words: 850
- section: Спадщина двох поколінь
  points:
  - Смерть 1953 року
  - Син Борис — продовжувач справи
  - Інститут Патона — світовий лідер
  - Міст Патона — пам'ятка Києва
  words: 750
