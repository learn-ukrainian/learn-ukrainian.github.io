content_outline:
- points:
  - 'Парадокс: Як перша жінка-лауреатка Шевченківської премії, авторка найбільшого роману в жіночій прозі, змогла вижити під
    чотирма окупаційними режимами (Австро-Угорщина, Польща, нацисти, совіти), не втративши свого «дикого», вільного духу?'
  - 'Провокація: Її псевдонім означає «дика», але вона стала депутаткою Верховної Ради УРСР. Де пролягала межа між боротьбою
    та конформізмом?'
  - '[!biography] Вільде — центральна постать галицької літератури ХХ століття, яка поєднала європейський психологізм із національною
    ідентичністю.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Особистий вибір): Шлюб із полковником КДБ — це був цинічний компроміс заради виживання, акт самопожертви для
    захисту синів чи складний людський вибір у неможливих обставинах?'
  - 'Дебат 2 (Літературна спадщина): Вільде — це передусім авторка «європейської» психологічної прози (як казав Рудницький)
    чи фундаторка української феміністичної традиції, що документувала жіночий досвід виживання?'
  - '[!epistemic-humility] Оцінки її компромісів варіюються від звинувачень у колабораціонізмі до визнання її стратегії єдино
    можливою для порятунку себе та родини.'
  - '[!decolonization] Радянська критика намагалася «приручити» Вільде, представляючи її як лояльну громадянку, ігноруючи
    її зв''язки з ОУН, дисидентами та національною інтелігенцією.'
  section: 'Конфліктна карта: Жінка, письменниця, громадянка'
  words: 900
- points:
  - 'Національна родина: батько — письменник, брати — в УВО та дивізії «Галичина». Світ, де українська ідея була основою виховання.'
  - 'Втрачений дім: румунська окупація Буковини, переїзд, відчуття вигнання, що визначило її подальшу долю.'
  - 'Гімназія та Пласт: формування характеру, перші літературні спроби під впливом неоромантизму.'
  - 'Львівський університет і пацифікація: політичне пробудження через брутальність польської окупаційної влади, вимушене
    покидання навчання, що стало поштовхом до самостійної кар''єри.'
  section: 'Формування: Буковина, Станиславів, Львів'
  words: 1000
- points:
  - '«Метелики на шпильках»: літературна сенсація 1930-х. Проза про дорослішання дівчат, яка принесла їй перше визнання та
    премію ім. Франка.'
  - 'Дружба з Богданом-Ігорем Антоничем: інтелектуальний діалог, який допоміг сформувати її унікальний стиль.'
  - 'Робота над «Сестрами Річинськими»: чверть століття праці над епічним полотном, що стало панорамою життя Галичини першої
    половини ХХ століття.'
  - 'Шевченківська премія 1965: офіційне визнання, що стало тріумфом не лише для неї, а й для всієї «репресованої» галицької
    літератури.'
  section: 'Діяльність: Народження «Сестер Річинських»'
  words: 1300
- points:
  - '[!anti-hagiography] Посада спецкореспондентки «Правды Украины» та депутатство. Чи можна було писати правду в радянській
    пресі та представляти тоталітарну владу?'
  - 'Гоніння за «націоналізм» (1949-1951): радянська система спочатку використала її, а потім намагалася знищити.'
  - '[!myth-buster] Міф про «тихе» життя у Львові. Вільде постійно балансувала на межі, використовуючи свій статус для захисту
    інших (справа Богдана Гориня), але йдучи на болючі компроміси.'
  - 'Особисті трагедії: чоловік, розстріляний нацистами за участь в ОУН; доля синів, що несли тягар її слави та її компромісів.'
  section: 'Тінь: Ціна виживання'
  words: 900
- points:
  - 'Повернення до розминки: тож як «дика» Вільде вижила? Через компроміси, внутрішню еміграцію, чи її «дикість» і була формою
    опору?'
  - '«Нанашка шістдесятників»: її львівський салон став острівцем свободи, де молоді дисиденти (Дзюба, Драч, Горинь) знаходили
    підтримку.'
  - '[!decolonization] Вільде повернула Галичину в український літературний канон, створивши епос світового рівня про регіон,
    чию історію Російська імперія та СРСР намагалися стерти.'
  - 'Сучасне значення: чому сьогодні її романи про жіночий вибір, моральні дилеми та національну гідність читаються гостріше,
    ніж будь-коли?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
