- Досліджувати стратегії виживання та моральні дилеми галицької інтелігенції під чотирма окупаційними режимами
- Оцінювати внесок Вільде у розвиток української психологічної та феміністичної прози
- Розрізняти поняття конформізму, компромісу та опору в контексті тоталітарного суспільства
