content_outline:
- points:
  - 'Парадокс: Як "великий оповідач" і найточніший хронікер українського села, що описав кожну деталь побуту, помер самотнім
    від голоду у місті під час революції? Чому творець безсмертних комічних персонажів мав таку трагічну долю?'
  - 'Провокація: Чи була його "мовна революція" — поверненням до народних джерел чи створенням штучного бар''єру для розвитку
    єдиної літературної норми?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мовна війна. Полеміка Нечуя-Левицького з Борисом Грінченком. Позиція Нечуя: мова має базуватися на "чистому"
    народному джерелі центральної України. Позиція Грінченка: потрібна соборна мова, що синтезує діалекти. [!epistemic-humility]'
  - 'Дебат 2: Радянська vs. сучасна інтерпретація. Радянське літературознавство зображувало його як "прогресивного реаліста-демократа",
    критика кріпацтва. Сучасний погляд: Нечуй як етнограф, що зберіг "код нації" і чинив мовний опір русифікації. [!decolonization]'
  - 'Питання: Чи не зашкодив його мовний пуризм справі загальнонаціональної єдності?'
  section: 'Конфліктна карта: Мова і спадщина'
  words: 900
- points:
  - 'Світ дитинства: народження в родині священика на Київщині (1838) — занурення в народну культуру, мову, вірування змалку.'
  - 'Освіта: Київська духовна академія — парадокс системи, що мала русифікувати, але для деяких ставала місцем пробудження
    національної свідомості.'
  - 'Ідейний вплив: захоплення "Кобзарем" Шевченка та ідеями народництва. Вибір служити не церкві, а народу через літературу.'
  - 'Перші кроки: таємне написання перших творів, що показували справжнє, неідеалізоване селянське життя.'
  section: 'Формування: Священицький син і народник'
  words: 1000
- points:
  - 'Учительська кар''єра: викладання в різних куточках імперії як форма "включеного спостереження" за життям різних верств
    — від селян до інтелігенції.'
  - 'Шедевр: "Кайдашева сім''я" (1878) — родинний конфлікт як мікромодель суспільних чвар. "Війна за грушу" як безсмертний
    символ дріб''язковості, що руйнує велике. Аналіз образів Кайдашихи, Мотрі, Омелька.'
  - 'Соціальна критика: "Микола Джеря" — тема кріпацтва, втечі та перших паростків індустріалізації. Образ "нового українського
    героя", що шукає свободи.'
  - 'Візуальний стиль: Нечуй як "живописець словом". Його унікальна здатність створювати яскраві, майже кінематографічні образи
    за допомогою деталей.'
  section: 'Діяльність: Дзеркало українського життя'
  words: 1300
- points:
  - '[!anti-hagiography] Непоступливість у мовній полеміці з Грінченком перетворила його з революціонера на консерватора,
    що гальмував вироблення єдиної норми. Його позиція частково ізолювала його від молодшого покоління письменників.'
  - '[!myth-buster] Міф про "простого народного письменника". Нечуй був високоосвіченою людиною, інтелектуалом, чия "простота"
    була результатом свідомого естетичного вибору та етнографічної програми.'
  - 'Трагедія останніх років: самотність, бідність, неприйняття нової, більшовицької, реальності. Смерть від голоду в притулку
    (1918) як страшний епілог до життя людини, що оспівувала багатство української землі.'
  - 'Критика: деякі критики закидали йому надмірну зосередженість на "сільському побуті" та дрібних чварах, ігнорування великих
    політичних та історичних процесів.'
  section: 'Тінь: Мовний консерватизм та ізоляція'
  words: 900
- points:
  - 'Повернення до розминки: Чому творець "Кайдашевої сім''ї" помер у злиднях? Відповідь лежить у його непоступливості, вірності
    своїм ідеалам, які стали несумісними з новою епохою.'
  - 'Спадщина: Нечуй-Левицький заклав основи українського реалізму. Він ввів у літературу живу народну мову, створив галерею
    безсмертних типів і показав, що українська література може бути цікавою, глибокою і смішною водночас.'
  - '[!decolonization] Його твори — це акт культурного суверенітету. Вони доводили, що українська мова є самодостатньою для
    будь-якого жанру, а українське життя — варте уваги великої літератури.'
  - 'Сучасна актуальність: "Кайдашева сім''я" залишається найпопулярнішою українською класикою, бо "війна за грушу" — це вічна
    проблема українського суспільства: нездатність об''єднатися перед обличчям спільної загрози через внутрішні чвари.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Ivan Nechuy-Levytskyi, focusing on his role as a founder of Ukrainian realism, his unique ethnographic
  and visual style, his "linguistic revolution," and the tragic paradoxes of his life and legacy.
level: BIO
module: bio-044
objectives:
- Аналізувати життєвий шлях і творчість Івана Нечуя-Левицького як засновника українського реалізму
- Оцінювати його внесок у формування української літературної мови, розуміючи суть полеміки з Грінченком
- Критично осмислювати складність постаті письменника, розглядаючи його як досягнення, так і "тіньові" сторони (консерватизм,
  трагічна доля)
- Пояснювати неперехідну актуальність "Кайдашевої сім'ї" як діагнозу певних суспільних проблем
