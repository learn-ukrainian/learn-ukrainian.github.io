level: BIO
module: bio-322
objectives:
- Аналізувати роль Василя Величковського у збереженні інституційної спадкоємності УГКЦ в умовах підпілля.
- 'Досліджувати методи роботи радянських каральних органів: від смертних вироків до криміналізації релігійної
  літератури.'
- Розуміти концепцію "місцеблюстителя" та значення таємних свячень для катакомбної церкви.
- Оцінювати вплив двох ув'язнень і депортації на фізичний стан та духовну спадщину єпископа.
