content_outline:
- points:
  - '[!biography] Знайомство з Василем Величковським: єпископ підпільної УГКЦ, редемпторист, що пройшов через два радянські вироки та депортацію.'
  - 'Провокаційне питання: як церква здатна зберігати інституційну спадкоємність, коли всі її ієрархи ув''язнені або знищені?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 1903 року в Станіславові в священничій родині, навчання в семінарії у Львові.'
  - 'Чернечий шлях: вступ до редемптористів, складання обітів 1925 року та священичі свячення. Активна місіонерська діяльність та служіння ігуменом Тернопільського монастиря (1942).'
  section: 'Формування: Шлях місіонера'
  words: 1000
- points:
  - 'Катакомбна Церква: після повернення з Воркути (1955) активне підпільне душпастирство у Львові, приватні літургії та семінарська формація.'
  - '[!decolonization] Інституційна тяглість: таємна єпископська хіротонія в Москві 1963 року митрополитом Йосифом Сліпим. Призначення Величковського місцеблюстителем для УГКЦ в Україні.'
  - 'Розбудова мережі: свячення нових підпільних єпископів (зокрема Володимира Стернюка у 1964 році) та священиків.'
  section: 'Діяльність: Місцеблюститель у підпіллі'
  words: 1200
- points:
  - '[!anti-hagiography] Перший вирок: арешт НКВС 1945 року, тиск з метою переходу в православ''я, відмова. Смертний вирок, замінений на 10 років таборів Воркути.'
  - 'Другий вирок: арешти та обшуки 1968-1969 років. Суд за "антисовєтську пропаганду" (через релігійну брошуру та прослуховування радіо Ватикану), 3 роки суворого режиму.'
  - 'Депортація: після відбуття строку у 1972 році радянська влада депортувала єпископа з СРСР. Фізичне виснаження тюрмами.'
  section: 'Тінь: Арешти та вироки'
  words: 1600
- points:
  - 'Смерть у вигнанні: смерть 30 червня 1973 року у Вінніпезі (Канада) внаслідок тюремних тортур і хвороб.'
  - '[!epistemic-humility] Підсумок: збереження структури катакомбної церкви. Церковний акт — беатифікація в групі українських новомучеників 2001 року.'
  section: 'Підсумок: Незламна тяглість'
  words: 1000
focus: Василь Величковський як єпископ підпільної УГКЦ, його місіонерська діяльність, репресії та депортація з СРСР після двох ув'язнень.
level: BIO
module: bio-300
objectives:
- Аналізувати роль Василя Величковського у збереженні інституційної спадкоємності УГКЦ в умовах підпілля.
- 'Досліджувати методи роботи радянських каральних органів: від смертних вироків до криміналізації релігійної літератури.'
- Розуміти концепцію "місцеблюстителя" та значення таємних свячень для катакомбної церкви.
- Оцінювати вплив двох ув'язнень і депортації на фізичний стан та духовну спадщину єпископа.
