content_outline:
- points:
  - '[!biography] Знайомство з Василем Величковським: єпископ підпільної УГКЦ, редемпторист, що пройшов
    через два радянські вироки та депортацію.'
  - 'Провокаційне питання: як церква здатна зберігати інституційну спадкоємність, коли всі її ієрархи
    ув''язнені або знищені?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 1903 року в Станіславові в священничій родині, навчання в семінарії
    у Львові.'
  - 'Чернечий шлях: вступ до редемптористів, складання обітів 1925 року та священичі свячення. Активна
    місіонерська діяльність та служіння ігуменом Тернопільського монастиря (1942).'
  section: 'Формування: Шлях місіонера'
  words: 1000
- points:
  - 'Катакомбна Церква: після повернення з Воркути (1955) активне підпільне душпастирство у Львові, приватні
    літургії та семінарська формація.'
  - '[!decolonization] Інституційна тяглість: таємна єпископська хіротонія в Москві 1963 року митрополитом
    Йосифом Сліпим. Призначення Величковського місцеблюстителем для УГКЦ в Україні.'
  - 'Розбудова мережі: понад сорок таємно висвячених священників і кілька ієрархів, з-поміж них єпископ-помічник
    Володимир Стернюк з правом наступництва — синодальна довідка датує це свячення 2 липня 1964 року, ВУЕ
    факт підтверджує без дати; загальна кількість достеменно невідома. Таємні семінарії у Львові й Тернополі.
    Навесні 1967 року в Загребі Сліпий, Германюк, Букатько й Сегеда офіційно завершили хіротонію.'
  section: 'Діяльність: Місцеблюститель у підпіллі'
  words: 1200
- points:
  - '[!anti-hagiography] Перший вирок: арешт НКВС 1945 року, тиск з метою переходу в православ''я, відмова.
    Смертний вирок, замінений на 10 років таборів Воркути.'
  - 'Другий вирок: арешт у січні 1969 року за "порушення закону про відокремлення церкви від держави"
    та "розповсюдження наклепів на радянський державний і суспільний устрій"; серед пунктів звинувачення
    — укладена 1966 року книга "Історія чудотворної ікони Божої Матері Неустанної Помочі" та слухання
    ватиканського радіо. Після восьми місяців слідства — 3 роки; Комунарськ (тепер Алчевськ), де ВУЕ
    називає в''язницю або психлікарню суворого режиму, а Синод — табори.'
  - 'Депортація в січні 1972 року (Синод датує 27 січня): Загреб, Рим, зустріч із Павлом VI, від червня
    1972 року Канада на запрошення митрополита Максима Германюка.'
  section: 'Тінь: Арешти та вироки'
  words: 1600
- points:
  - 'Смерть у вигнанні 30 червня 1973 року у Вінніпезі. Причинність подавати за джерелами: задокументовано
    фізичні й психічні тортури та медичні експерименти під час другого ув''язнення; твердження про отруєння
    ВУЕ подає як "одну з версій", а Синод — як свідчення брата Василя Стеця. Не перетворювати версію на
    медичний висновок.'
  - '[!epistemic-humility] Підсумок: збереження структури катакомбної церкви через право наступництва.
    Беатифікація 27 червня 2001 року у Львові за офіційним переліком Апостольської столиці — конфесійно-правовий
    статус, а не підтвердження кожного біографічного твердження.'
  section: 'Підсумок: Незламна тяглість'
  words: 1000
