content_outline:
- points:
  - 'Провокація: чому школи, підготовка вчителів, підручники й термінологія — це державотворення, а не «культурна дрібниця»? І як перший міністр освіти УНР загинув від замаху менш ніж за рік праці?'
  - '[!biography] Знайомство з педагогом, літературознавцем і перекладачем: діяч «Плеяди», генеральний секретар і міністр освіти доби Української революції.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (освіта як суверенітет): Стешенко будував українську школу як інституцію — учительські спілки, підручники, правопис, термінологію й місцеве шкільне врядування, а не як другорядну справу.'
  - 'Позиція 2 (деколонізаційна): рамка — українська публічна культура, державотворення Української революції та українськомовна школа, а не «російська реформа освіти» чи «російська громадянська війна».'
  - '[!decolonization] Українізацію школи вчимо як розбудову українськомовної публічної спроможності разом із гарантією права меншин на національний розвиток, а не як примусову однорідність.'
  - '[!epistemic-humility] Дрейф дат народження (24 червня 1873; ЕІУ подає 24 липня, МЕУ — 24 червня 1874) і смерті (30 липня 1918 проти 1 серпня в МЕУ) позначаємо; російськомовні назви праць — це видавничий контекст, а не ідентичність.'
  section: 'Конфліктна карта: Шкільна реформа — «культурна дрібниця» чи суверенітет?'
  words: 900
- points:
  - 'Освіта й «Плеяда»: Полтавська класична гімназія, історико-філологічний факультет Університету св. Володимира (1896); студентська літературна праця, переклади (Овідієві «Метаморфози» 1893 року як Іван Сердешний, згодом Шиллер, Байрон, Беранже).'
  - 'Політична формація: 1896 року співзасновник української соціал-демократичної групи з Лесею Українкою й Михайлом Коцюбинським — українська політична й друкарська мережа, а не лише історія шкільної реформи.'
  - '1897 рік: після студентських протестів — арешт, тюрма, вигнання з Києва й заборона вчителювати («вовчий білет»); повернення до комерційних шкіл можливе почасти тому, що вони підлягали Міністерству фінансів, а не освіти.'
  - 'Літературознавство: праця про Котляревського (1898, відзнака Петербурзької академії), «Історія української драми» (1908) і «Про українську літературну мову» (1912) — місток до LIT і мовної стандартизації.'
  section: 'Формування: Плеяда, тюрма й літературознавство'
  words: 1000
- points:
  - 'Війна й біженці: у 1915-1917 роках очолював Тетянівську гімназію для галицьких дітей-біженців, вивезених до Києва під час російської окупації Галичини — воєнний анкер імперського насильства.'
  - '1917 рік: очолив Товариство шкільної освіти, увійшов до Центральної Ради, з червня став генеральним секретарем освіти, а на початку 1918 року — міністром народної освіти.'
  - 'Політика-текст: циркуляр Стешенка вимагав українознавчих предметів у всіх школах, позакласного вивчення української літератури й історії, бібліотек української книжки, українських шкільних вистав, національних учнівських спілок та історичних екскурсій.'
  - 'Децентралізація: закон Центральної Ради скасував шкільні округи як централізованих бюрократичних посередників між освітнім секретаріатом і місцевим самоврядуванням; серед засновників Української державної академії мистецтв (1917).'
  section: 'Діяльність: Товариство шкільної освіти й українізація школи'
  words: 1300
- points:
  - '[!anti-hagiography] Освітня програма була основоположною, але здійснилася лише частково через брак учителів, війну й крихкість держави; частина задумів (як-от селянські гімназії) лишилася нереалізованою.'
  - 'Замах: 30 липня 1918 року Стешенка вбито в Полтаві; українські джерела приписують вбивство місцевій більшовицькій організації Зіньківського повіту, але операційні деталі лишаємо з позначкою джерела.'
  - '[!epistemic-humility] Пізніший тиск на родину (арешти Оксани Стешенко й Людмили Старицької-Черняхівської 1941 року) — це контекст радянського ставлення й слід пам''яті, а не самодостатній доказ кожної деталі вбивства 1918 року.'
  - 'Мартирологію вживаємо ощадливо: похорон і поховання на Байковому кладовищі закривають біографію, але політичний механізм лишаємо фактичним, а не патетичним.'
  section: 'Тінь: Незавершена програма й убивство в Полтаві'
  words: 900
- points:
  - 'Повернення до розминки: чому шкільну реформу варто вчити як суверенітет, а не як «культурну дрібницю»?'
  - 'Джерелознавча вправа: порівняти формулювання «вбитий невідомими», «вбивство замовила місцева більшовицька організація» й пізніше радянське слово — тримати окремо механізм, тип доказу й статус джерела.'
  - '[!decolonization] Українізація без карикатури: право меншин на національний розвиток — частина програми Стешенка, а не поступка.'
  - 'Кластер Центральної Ради: поряд зі Стешенком — Грушевський, Винниченко, Єфремов, Русова й Туган-Барановський, що показує, як освіта, фінанси й публіцистика перетиналися в 1917 році.'
  section: 'Дискусія та підсумок: Освіта, докази й пам''ять'
  words: 700
focus: Ivan Steshenko (1873-1918) taught as a Ukrainian pedagogue, literary scholar, translator, and first General Secretary / Minister of Education of the UNR state-building moment, so that schools, teacher training, textbooks, terminology, and local school governance read as sovereignty rather than secondary cultural work; the Russian-language titles of his scholarship are read as an imperial publishing context, school Ukrainization is taught as building Ukrainian-language capacity while guaranteeing minorities' rights, and his July 1918 assassination is kept concrete while its perpetrator chain stays source-labeled.
