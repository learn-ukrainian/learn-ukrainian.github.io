content_outline:
- points:
  - 'Провокація: «Сонце Руїни» — державотворець, чий пошук третьої гарантії проти поділу України обернувся спустошенням його ж Правобережжя. Яку проблему він розв''язував — і чому розв''язок знищив підтримку, якої він потребував?'
  - '[!biography] Знайомство з постаттю, чия біографія — не «герой чи зрадник», а державницька стратегія за катастрофічних умов після Андрусова.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (деколонізаційна): після того як Москва й Річ Посполита показали, що українську державність можна поділити без згоди українців, Дорошенко шукав альтернативний протекторат з умовами, що мали зберегти автономію, виборне гетьманство й територіальну єдність.'
  - 'Позиція 2 (антиагіографічна): ця стратегія стала нероздільною з османсько-кримським спустошенням, посиленням страху православних громад і зростанням нестабільності його влади.'
  - '[!decolonization] Імперський/радянський хід — звести Дорошенка до «турецького васала» чи «антихристиянського зрадника». Деколонізаційне читання починається з іншого питання: які альтернативи лишалися після Андрусова?'
  - '[!epistemic-humility] Народження — 1627, Чигирин; смерть — 9/19 листопада 1698 року в Яропольчому/Яропольці (не в самій Москві); хронологія обрання різниться (серпень 1665 / жовтень 1665 наказний / січень 1666). Подаємо послідовність, а не один сплощений факт.'
  section: 'Конфліктна карта: Державотворець чи «турецький васал»?'
  words: 900
- points:
  - 'Походження: онук гетьмана Михайла Дорошенка, син Дорофія; імовірно навчався в Києво-Могилянській колегії, знав латину й польську.'
  - 'Рання служба: у русі Богдана Хмельницького з кінця 1640-х, гарматний писар Чигиринського полку; прилуцький полковник 1657–1659 років, підтримав Виговського й підписав Гадяцький договір.'
  - 'Доба Руїни: 1660 року причетний до Слободищенсько-Чуднівського врегулювання; у 1663–1665 роках — генеральний осавул при Тетері, потім черкаський полковник.'
  - 'Піднесення: 1665–1666 роки — правобережне гетьманство; відновив міру адміністративного ладу на Правобережжі й розбудував власну військову спроможність, зокрема наймані сердюцькі полки; перемога над польськими силами під Браїловом 1666 року.'
  section: 'Формування: Від чигиринського писаря до булави'
  words: 1000
- points:
  - 'Андрусівське перемир''я 1667 року зробило об''єднавчу програму нагальною: якщо Москва й Варшава можуть ділити Україну, потрібна інша архітектура безпеки.'
  - 8 червня 1668 року, після лівобережного повстання й загибелі Брюховецького, Дорошенка проголосили гетьманом усієї України — вершина його проєкту соборності, хоча ця єдність швидко виявилася нестійкою.
  - Корсунська рада (10–12 березня 1669 р.) схвалила османський союз/протекторат; султан проголосив його 1 травня 1669 року. Джерельний анкер умови — вимога, щоб Порта не укладала угод із Польщею чи Москвою «без відомості і згоди нашого Гетьмана» (за Чухлібом; verify_quote не запускали — звіряти видання).
  - 'Бучацький мир 1672 року: Поділля відійшло до Османської імперії, а козацьку Україну під Дорошенком визнали на протекторатних умовах — але спустошення кампанії підважило його легітимність (перемога під Батогом 1672 року передувала османському походу на Кам''янець-Подільський).'
  section: 'Діяльність: Проєкт соборності і османський протекторат'
  words: 1300
- points:
  - '[!anti-hagiography] Османсько-кримська інтервенція допомагала йому військово й водночас спустошувала Правобережжя, посилювала страх православних громад і робила його правління дедалі менш стійким.'
  - '[!myth-buster] «Турецький васал» як ідентичність — це полемічний ярлик, а не факт; але й ціна османського повороту реальна. Дорошенко придушував опонентів і спирався на наймані та союзні формування, так і не згуртувавши старшину, рядове козацтво й простолюд навколо незалежності.'
  - 'Дорошенко проти Сірка — це конфлікт політичних моделей під неможливим тиском, а не «чистий патріот проти зрадника»: запорозька опозиція Сірка була важлива й водночас дестабілізувала централізаційний проєкт.'
  - 'Вересень 1676 року: Дорошенко здав Чигирин і булаву Самойловичу/Ромодановському — його державницький проєкт завалився.'
  section: 'Тінь: Ціна протекторату'
  words: 900
- points:
  - 'Повернення до розминки: чому переговорний протекторат як розв''язок знищив підтримку, якої Дорошенко потребував удома?'
  - '[!epistemic-humility] Московське заслання не було «закатуванням до смерті»: затримання, потім в''ятське воєводство й маєток у Яропольчому. Це не робить капітуляцію безболісною — показує, як імперська інкорпорація поєднувала примус, керування престижем і усунення з української політики.'
  - Образ «Сонце Руїни» (зокрема через драму Василя Пачовського) сильний, але може затінити практичну поразку — тримаємо трагедію й аґентність разом.
  - '[!decolonization] Тривкий наклеп — що будь-який український пошук немосковського заступництва дорівнює зраді; випадок Дорошенка показує, як імперії перетворюють союзну стратегію меншої держави на моральний злочин. (Не плутати гетьмана з істориком Дмитром Дорошенком.)'
  section: 'Дискусія та підсумок: Сонце Руїни в пам''яті'
  words: 700
focus: Petro Doroshenko as a Right-Bank hetman (1665-1676) whose reunification project responded to the 1667 Andrusovo partition by seeking an Ottoman protectorate as third-power statecraft rather than as the 'Turkish vassal' smear; the Korsun council of 1669, the Buchach peace of 1672, the devastation of the Right Bank, his 1676 surrender and Moscow exile, and how the tragic 'Sun of the Ruin' memory must hold state-building and catastrophic cost together.
