objectives:
- Пояснювати, як Андрусівський поділ 1667 року зробив об'єднавчий проєкт Дорошенка нагальним і штовхнув його до пошуку третьої гарантії
- Аналізувати османський протекторат 1669 року як переговорну державницьку стратегію з умовами автономії, а не як ідентичнісний смисл «султанського васала»
- 'Утримувати разом трагедію й аґентність: державотворення й водночас спустошення Правобережжя, релігійний страх та втрату підтримки'
- Розрізняти ранньомодерні поняття «протекторат», «васалітет», «союз» і «підданство» замість накидання сучасних категорій суверенітету
