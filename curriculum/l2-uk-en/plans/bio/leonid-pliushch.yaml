content_outline:
- points:
  - >-
    [!biography] Знайомство з Леонідом Плющем: математик, дослідник кібернетики, учасник
    Ініціативної групи, політв'язень, мемуарист і літературний критик.
  - >-
    Провокаційне питання: чому радянська система спочатку звільнила з роботи, а потім
    перетворила на «невменяємого» людину, яка збирала факти про порушення прав?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 26 квітня 1939 року в Нарині (Киргизька РСР); через дитячу хворобу сім'я
    переїхала до Одеси; навчання математики в Одесі та Києві.
  - >-
    Закінчення механіко-математичного факультету Київського університету (1962); робота
    в Інституті кібернетики АН УРСР до звільнення в липні 1968 року.
  - >-
    [!decolonization] Траєкторія від соціалістично-демократичних сподівань до антикомунізму —
    зберегти рух ідеологій, а не спрощувати постать до одного ярлика.
  section: 'Формування: Математика, Одеса та кібернетика'
  words: 1000
- points:
  - >-
    Самвидавні статті (1966–1971) про радянську ідеологію, національні питання та порушення
    прав; передача матеріалів до *Хроники текущих событий* і *Українського вісника*.
  - >-
    Участь в Ініціативній групі (з травня 1969); звернення 1971 року до V Міжнародного
    конгресу психіатрів проти каральної психіатрії.
  - >-
    Мемуари *На карнавалі історії* / *У карнавалі історії: Свідчення*; літературна критика
    *Екзод Тараса Шевченка*; закордонне представництво Української Гельсінської групи (1977).
  section: 'Діяльність: Самвидав, Ініціативна група та мемуари'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Звільнення з роботи (липень 1968), обшуки, арешт 15 січня 1972 року;
    обвинувачення за ч. I ст. 62 КК УРСР («антирадянська агітація та пропаганда») —
    мова обвинувачення, не аналітичний опис мотивів.
  - >-
    Рішення Київського обласного суду про «невменяємість» (1973); направлення 5 липня 1973
    року до Дніпропетровської спеціальної психіатричної лікарні; діагноз «млявотічна
    шизофренія» — лише радянський політично-форензичний ярлик.
  - >-
    [!epistemic-humility] Міжнародна кампанія на захист Плюща; після виселення з СРСР
    (січень 1976) західні психіатри, за KHPG, визнали його здоровим — без повторення
    діагнозу як медичної істини.
  section: 'Тінь: Каральна психіатрія та спецлікарня'
  words: 1600
- points:
  - >-
    Смерть 4 червня 2015 року в Бесседжі (Франція); наукова кар'єра зруйнована, але мемуари
    та критика збереглися в діаспорі та українських виданнях.
  - >-
    Міст між українськими, московськими, кримськотатарськими та єврейськими мережами прав
    людини — не зводити контакти до «центру в Москві».
  - >-
    [!myth-buster] Пам'ять про Плюща не повинна затирати роль культурного медіатора та
    літературного критика на користь лише образу «психіатричної жертви».
  section: 'Підсумок: Свідчення на карнавалі історії'
  words: 1000
focus: >-
  Леонід Плющ — математик і правозахисник, жертва каральної психіатрії, мемуарист і
  закордонний представник УГГ. Аналіз самвидаву, Ініціативної групи та міжнародної кампанії
  проти радянської психіатричної системи.
