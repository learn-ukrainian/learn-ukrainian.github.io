objectives:
- Прослідкувати біографію Плюща від кібернетики до правозахисництва без спрощення ідеологічного руху.
- Розуміти механізм каральної психіатрії через датовану хронологію суду, спецлікарні та виселення.
- Відрізняти радянський діагноз «млявотічна шизофренія» від медичного твердження та не повторювати його як факт.
- Оцінити роль Плюща як свідка, медіатора між мережами прав і автора мемуарів та літературної критики.
