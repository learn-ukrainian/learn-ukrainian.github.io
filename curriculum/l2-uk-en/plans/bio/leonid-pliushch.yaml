content_outline:
- points:
  - >-
    [!biography] Знайомство з Леонідом Івановичем Плющем: математик, працівник
    Інституту кібернетики АН УРСР, автор самвидавних текстів, правозахисник і
    майбутній закордонний представник Української Гельсінської групи.
  - >-
    Верифіковані дати як запобіжник проти фабрикації: народився 1939-04-26, Naryn
    (Kyrgyz SSR); помер 2015-06-04, Bessèges, France.
  - >-
    Провокаційне питання: чому держава, яка боялася відкритого слова, використала
    судово-психіатричний апарат проти людини з математичною та правозахисною мовою?
  section: Розминка
  words: 400
- points:
  - >-
    Дитяча хвороба і переїзд родини до Одеси; математична освіта в Одесі та Києві,
    випуск механіко-математичного факультету Київського університету 1962 року.
  - >-
    Робота в Інституті кібернетики Академії наук УРСР до звільнення в липні 1968
    року; розрив наукової кар'єри як частина репресивного тиску, а не приватна
    біографічна дрібниця.
  - >-
    [!decolonization] Перехід від математичної праці до документування порушень прав
    людини показує український правозахисний рух не як "периферійний" додаток до
    московських мереж, а як власну інфраструктуру свідчення.
  - >-
    Ідейна еволюція: джерела застерігають не спрощувати Плюща ретроспективно, бо він
    пройшов шлях від соціалістично-демократичних надій до антикомуністичної позиції.
  section: 'Формування: Математика, Одеса і Київ'
  words: 1000
- points:
  - >-
    Самвидавні статті 1966-1971 років про радянську ідеологію, національні питання
    та порушення прав людини; передавання інформації до "Хроники текущих событий" і
    "Українського вісника".
  - >-
    Участь в Ініціативній групі з травня 1969 року та підписання листів, зокрема
    звернення 1971 року до Міжнародного конгресу психіатрів проти каральної психіатрії.
  - >-
    [!anti-hagiography] Плющ не був лише символом страждання: джерела показують його
    як посередника між українськими, кримськотатарськими, єврейськими та західними
    правозахисними контактами.
  - >-
    Після примусового вигнання з СРСР: закордонна представницька роль для Української
    Гельсінської групи 1977 року та дальша культурна критика.
  section: 'Діяльність: Самвидав, права людини і українські мережі'
  words: 1200
- points:
  - >-
    Послідовність механізму: звільнення 1968 року, обшуки, арешт 1972-01-15,
    кримінальне звинувачення за ч. I ст. 62 КК УРСР про "антирадянську агітацію і
    пропаганду".
  - >-
    Київський обласний суд у 1973 році визнав його "неосудним"; 1973-07-05 Плюща
    відправили до Дніпропетровської спеціальної психіатричної лікарні.
  - >-
    [!myth-buster] Діагноз "млявотічна шизофренія" треба подавати тільки як
    радянський судово-політичний ярлик, не як медичний факт; західні психіатри після
    вигнання вважали його здоровим.
  - >-
    [!epistemic-humility] Повний номер справи в досьє не знайдено; тому урок називає
    перевірені документи — статтю 62, суд, спецпсихлікарню, міжнародну кампанію — і не
    вигадує архівних реквізитів.
  - >-
    Міжнародна кампанія на захист Плюща допомогла показати світові радянське
    зловживання психіатрією як інструмент придушення інакодумства.
  section: 'Тінь: Стаття 62 і каральна психіатрія'
  words: 1600
- points:
  - >-
    Мемуар *У карнавалі історії: Свідчення* як текст пам'яті: авторська позиція
    "свідка і учасника" допомагає вивчати репресії без перетворення біографії на
    легенду.
  - >-
    Літературно-критичні праці про Шевченка і Хвильового показують, що після вигнання
    Плющ залишався культурним інтерпретатором, а не лише колишнім в'язнем.
  - >-
    Підсумкова рамка: каральна психіатрія була державною технологією примусу, а
    свідчення Плюща — частиною українського архіву прав людини.
  - >-
    Завершальне питання для семінару: як говорити про травму так, щоб не повторювати
    радянські ярлики і водночас не стирати складну інтелектуальну біографію?
  section: 'Підсумок: Свідчення після вигнання'
  words: 1000
focus: >-
  Леонід Плющ як математик, самвидавний автор і правозахисник, чия справа демонструє
  радянську каральну психіатрію, статтю 62 та міжнародну оборону українських
  інакодумців. Семінар відділяє документовану хронологію від радянського медичного
  ярлика.
level: BIO
module: bio-270
objectives:
- >-
  Пояснювати життєву траєкторію Плюща від математичної освіти і роботи в Інституті
  кібернетики до самвидаву та правозахисних мереж.
- >-
  Аналізувати механізм репресій: звільнення, арешт, стаття 62, судове рішення і
  Дніпропетровська спеціальна психіатрична лікарня.
- >-
  Розрізняти радянський психіатричний ярлик і документований факт, не повторюючи
  репресивну мову як нейтральну медичну істину.
- >-
  Оцінювати значення мемуарного свідчення та закордонної роботи Плюща для історії
  українського правозахисного руху.
