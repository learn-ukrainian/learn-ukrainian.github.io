content_outline:
- points:
  - >-
    [!biography] Знайомство з Євгеном Плужником (1898–1936): поет «тихої скорботи»,
    прозаїк і перекладач зі Східної Слобожанщини, один із чільних голосів київської
    «Ланки» доби Розстріляного відродження.
  - >-
    Провокаційне питання: чому радянська влада знищила поета, що писав стриману
    філософську лірику про рівновагу, тишу й людську гідність, а не політичні гасла?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: народився 26 (14) грудня 1898 року в слободі Кантемирівка на Східній
    Слобожанщині (Воронежчина) — історично українській етнічній території; батько був
    вихідцем із Полтавщини.
  - >-
    Родина, підточена спадковими сухотами: із восьми дітей вижило двоє, і туберкульоз
    згодом забере самого поета. Гімназійні роки з частими переїздами (Воронеж, Богучар,
    Ростов, Бердянськ).
  - >-
    [!decolonization] Свідомий мовний вибір: вірші Плужник починав писати російською,
    але, переїхавши 1921 року до Києва, перейшов на українську — мовний перехід як акт
    культурного самовизначення (першодрук у журналі «Глобус» під псевдонімом Кантемирянин).
  - >-
    Київ і літературне середовище: навчання в Музично-драматичному інституті імені Миколи
    Лисенка, участь у «Аспису», «Ланці» та МАРСі; коло Валер'яна Підмогильного, Григорія
    Косинки, Тодося Осьмачки, Бориса Антоненка-Давидовича.
  section: 'Формування: Зі Слобожанщини до київської «Ланки»'
  words: 1000
- points:
  - >-
    Дебют «Дні» (1926): стримана, майже аскетична лірика про криваву пореволюційну добу;
    ліро-драматичні поеми «Галілей» і «Канів», де дія перенесена у внутрішній світ
    ліричного героя.
  - >-
    [!decolonization] Свідок без пафосу: Плужник не оспівував революцію, а фіксував ціну
    насильства й людську самотність — естетична позиція, несумісна з вимогою режиму
    «оспівувати» нову владу.
  - >-
    Філософія рівноваги: збірка «Рання осінь» (1927) із мотивами гармонії, споглядання та
    «творчого спокою» природи; вітаїстичне (життєствердне) світовідчуття пізньої лірики.
  - >-
    Багатогранність митця: роман «Недуга» (1928, невдовзі вилучений), п'єси «Професор
    Сухораб» і «У дворі на передмісті» (1929), співукладання з В. Підмогильним словника
    «Фразеологія ділової мови», переклади світової прози.
  section: 'Діяльність: Поет тихої скорботи'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Плужник не був ні підпільником, ні політичним діячем — система
    знищила його за саму незалежність мистецького голосу, а не за реальну «провину».
  - >-
    Механізм терору: арешт 4 грудня 1934 року органами НКВС у хвилі репресій проти
    української інтелігенції після вбивства Кірова (1 грудня 1934), використаного як привід
    для «розкриття» терористичних змов.
  - >-
    Сфабрикована справа: звинувачення в участі в «націоналістичній терористичній
    організації»; у березні 1935 року виїзна сесія Військової колегії Верховного суду СРСР
    засудила Плужника разом із М. Кулішем, В. Підмогильним, Г. Епіком та іншими до розстрілу.
  - >-
    [!myth-buster] Заміна розстрілу на десять років таборів не була помилуванням: хворого
    на туберкульоз поета етапували на Соловки, де він помер 2 лютого 1936 року в табірній
    лікарні; могила не збереглася. [!epistemic-humility] Окремі джерела подають дату
    31 січня 1936 — у дослідженні переважає 2 лютого (за ЕІУ та УІНП).
  section: 'Тінь: Кіровська хвиля терору та Соловки'
  words: 1600
- points:
  - >-
    Доля доробку: збірка «Рівновага» (завершена 1933) не могла вийти в СРСР — з'явилася за
    кордоном, а в Україні лише 1966 року; роман «Недуга» вилучили з обігу; віршована п'єса
    «Змова в Києві» побачила світ аж 1989 року.
  - >-
    Збереження пам'яті: дружина Галина Коваленко зберегла рукописи й написала спогади про
    поета; реабілітація 1956 року — Верховний Суд скасував вирок «за відсутністю складу злочину».
  - >-
    [!decolonization] Сучасне значення: Плужник як доказ, що тихий, неполітичний голос
    високої культури був для імперії так само нестерпним, як і відкритий спротив; його
    «рівновага над прірвою» — модель збереженої людської гідності.
  section: 'Підсумок: Рівновага над прірвою'
  words: 1000
focus: >-
  Євген Плужник як поет «тихої скорботи» доби Розстріляного відродження: аналіз його
  імпресіоністичної лірики, свідомого вибору української мови та механізму сталінського
  терору — від кіровської хвилі арештів 1934 року до смерті ув'язненим на Соловках.
level: BIO
module: bio-133
objectives:
- >-
  Аналізувати поетику Євгена Плужника — імпресіоністичну стриманість, філософський ліризм
  та вітаїстичні мотиви збірок «Дні», «Рання осінь» і «Рівновага».
- >-
  Простежувати, як уродженець Східної Слобожанщини свідомо обрав українську мову й став
  одним із чільних голосів київської «Ланки» та МАРСу.
- >-
  Досліджувати механізм сталінського терору: кіровську хвилю арештів 1934 року, сфабриковану
  справу, заміну розстрілу на ув'язнення та смерть на Соловках.
- >-
  Оцінювати, як доробок Плужника зберігся й повернувся (зусилля дружини, видання в діаспорі,
  реабілітація 1956 року) попри спробу його знищення.
