content_outline:
- points:
  - 'Парадокс: Як сталося, що головний твір найвидатнішого українського драматурга ХХ століття — про персонажа, який відчайдушно
    прагне стати росіянином?'
  - '[!biography] Провокаційне питання: чи Мина Мазайло — карикатура, чи трагічне дзеркало, в яке українцям досі страшно дивитися?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Куліш — «пролетарський» чи «націоналістичний» письменник? Його п''єси ставив державний театр, але вони підривали
    радянські ідеологеми.'
  - 'Дебат 2: Радянська цензура проти Куліша. Як п''єси, що пройшли цензуру, перетворювали автора на «ворога народу»? Чи була
    це свідома гра з вогнем?'
  - '[!epistemic-humility] Дискусії 1920-х: чи його сатира допомагала, чи шкодила політиці українізації?'
  - '[!decolonization] Розвінчання міфу про «братні народи»: п''єси Куліша показують глибинну несумісність українського та
    російського імперського світоглядів.'
  section: 'Конфліктна карта: Драматург між українізацією та терором'
  words: 900
- points:
  - 'Соціальний контекст: як син бідного селянина з Таврії став центральною фігурою столичної інтелігенції?'
  - 'Освіта та ранні впливи: самоосвіта, вчителювання, досвід Першої світової війни — що сформувало його погляд на людину
    та суспільство.'
  - 'Переїзд до Харкова: входження в коло митців «Розстріляного відродження» та початок роботи в театрі.'
  section: 'Формування: Від херсонського степу до харківського авангарду'
  words: 1000
- points:
  - 'Творчий тандем з Лесем Курбасом: театр «Березіль» як лабораторія нового українського мистецтва. Експеримент і пошук.'
  - 'Трилогія шедеврів: «Народний Малахій» (трагікомедія про радянські ілюзії), «Мина Мазайло» (сатира на мовне питання),
    «Патетична соната» (експресіоністична драма про революцію).'
  - 'Первинні джерела: аналіз фрагментів п''єс, що демонструють новаторську мову, абсурдизм та глибокий психологізм.'
  - 'Роль у ВАПЛІТЕ: участь у літературній дискусії 1925–1928 років під гаслом «Геть від Москви!».'
  section: 'Діяльність: Створення модерної української драми'
  words: 1300
- points:
  - '[!anti-hagiography] Чи були компроміси з радянською владою? Пошук «ідеологічно правильних» тем після перших хвиль критики.'
  - 'Критики Куліша: за що його звинувачували колеги-письменники та партійні функціонери? Аналіз звинувачень у «буржуазному
    націоналізмі».'
  - '[!myth-buster] Руйнування міфу про «одностайний осуд»: як деякі діячі намагалися захистити Куліша, а інші долучилися
    до його цькування.'
  - 'Особиста трагедія: арешт, допити, табір. Як система зламала драматурга фізично, але не змогла знищити його тексти?'
  section: 'Тінь: Компроміс, цькування та розплата'
  words: 900
- points:
  - 'Повернення до розминки: Чому «Мина Мазайло» залишається найпопулярнішою п''єсою Куліша і найактуальнішою для сучасної
    України?'
  - '[!decolonization] Переоцінка спадщини: Куліш як символ незнищенності української культури, що відроджується після кожної
    спроби її знищити.'
  - 'Сучасна релевантність: як п''єси Куліша допомагають зрозуміти сучасну російсько-українську війну та боротьбу за культурну
    ідентичність.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Mykola Kulish: modernist drama, the politics of language in "Myna Mazailo", collaboration with Les Kurbas, and his
  role in the Executed Renaissance.'
