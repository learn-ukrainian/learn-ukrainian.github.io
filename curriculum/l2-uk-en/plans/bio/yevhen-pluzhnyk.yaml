objectives:
- Критично аналізувати п'єси Миколи Куліша в контексті політики українізації та початку сталінських репресій
- Пояснювати творчий та особистісний зв'язок між Кулішем та Лесем Курбасом
- Формулювати аргументовану позицію щодо місця Куліша у феномені Розстріляного відродження
- Розрізняти сатиру, гротеск та абсурд як ключові художні методи драматурга
