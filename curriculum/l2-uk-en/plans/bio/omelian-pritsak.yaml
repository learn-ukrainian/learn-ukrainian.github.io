content_outline:
- points:
  - >-
    [!biography] Знайомство з Омеляном Пріцаком (1919–2006): тюрколог, історик та архітектор українських студій у Гарварді.
    Провокаційне питання: чому світовий тюрколог святив свою кар'єру будування українських кафедр у еміграції?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 7 квітня 1919 року у селі Лука (Самбірщина); навчання в Тернополі та Львові (1936–1940); аспірантура під Агатангелем Кримським у Києві.
    [!decolonization] Кримського заарештовано НКВС у липні 1941 року; загинув у в'язниці в Кустанаї 25 січня 1942 року.
    Докторська дисертація з Готтінгена (1948); еміграція до США (1961), без повернення життя до СРСР.
  section: 'Формування: Від Луки до Готтінгена'
  words: 1000
- points:
  - >-
    Заснування Гарвардського інституту дослідження українських студій (ГАУС) у 1973 році; директорство 1973–1989.
    Журнал «Гарвардські українознавчі студії» (1977); монографія «Походження Русі» (1981, 2003).
    Заснування інституту східносхідних студій імені А. Ю. Кримського НАН України (1991).
  section: 'Діяльність: ГАУС, «Гарвардські українознавчі студії» та «Походження Русі»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Термін «гарвардське диво» корисний з фандрайзингом, але не зводить постать до одноособи героя.
    [!epistemic-humility] Дебати про приймання «Походження Русі» не замаскують внеску в побудову українських кафедр.
    Цитата (атрибуована меморіальна мова): «Усе, що я робив, — я робив для України.».
  section: 'Тінь: Витіснення поля та «гарвардське диво»'
  words: 1600
- points:
  - >-
    Смерть 29 травня 2006 року у Бостоні; поховання на Байковому кладовищі у Києві.
    Меморіальна бібліотека Омеляна Пріцака у НауКМА (з 2007 року).
    Сучасне значення: модель відновлення дисципліни, яку радянська влада знищила.
  section: 'Підсумок: Повернення спадщини'
  words: 1000
focus: >-
  Омелян Пріцак — тюрколог та архітектор українських студій у Гарварді. Аналіз витіснення після знищення Кримського, «гарвардського дива» та повернення імені вчителя у 1991 році.
