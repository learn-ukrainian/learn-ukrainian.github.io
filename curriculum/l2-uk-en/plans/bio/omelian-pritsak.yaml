content_outline:
- points:
  - >-
    [!biography] Знайомство з Омеляном Пріцаком (1919–2006): тюрколог, історик та архітектор українських студій у Гарварді.
    Провокаційне питання: чому світовий тюрколог присвятив значну частину кар'єри розбудові українських кафедр у діаспорі?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 7 квітня 1919 року у селі Лука (Самбірщина); навчання в Тернополі та Львові (1936–1940); аспірантура під Агатангелем Кримським у Києві.
    [!decolonization] Кримський уособлював традицію українського сходознавства, яку Пріцак пізніше допоміг інституційно відновити.
    Докторська дисертація з Готтінгена (1948); еміграція до США (1961), без повернення життя до СРСР.
  section: 'Формування: Від Луки до Готтінгена'
  words: 1000
- points:
  - >-
    Заснування Українського наукового інституту Гарвардського університету у 1973 році; джерела
    датують завершення директорства Пріцака 1989 або 1990 роком.
    Журнал «Гарвардські українознавчі студії» (1977); англомовний том The Origin of Rus' (1981)
    та українське видання «Походження Русі» — том 1 (1997) і том 2 (2003).
    Заснування Інституту сходознавства імені А. Ю. Кримського НАН України (1991); директорство
    у 1991–1998 роках і статус почесного директора від 1999 року.
  section: 'Діяльність: ГАУС, «Гарвардські українознавчі студії» та «Походження Русі»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Термін «гарвардське диво» корисний з фандрайзингом, але не зводить постать до одноособи героя.
    [!epistemic-humility] Дебати про сприйняття «Походження Русі» не мають затуляти внеску в розбудову українських кафедр.
    Неперевірену меморіальну цитату вилучено; інституційну програму аналізують за авторськими текстами 1973 і 1991 років.
  section: 'Тінь: Інституційна тяглість та «гарвардське диво»'
  words: 1600
- points:
  - >-
    Смерть 29 травня 2006 року у Бостоні; поховання у Києві без неперевіреної кладовищної конкретизації.
    Матеріальну спадщину описують лише в межах, які підтверджує поточний джерельний набір.
    Сучасне значення: модель інституційного відновлення українського сходознавства.
  section: 'Підсумок: Повернення спадщини'
  words: 1000
focus: >-
  Омелян Пріцак — тюрколог та архітектор українських студій у Гарварді. Аналіз інтелектуальної наступності від школи Кримського до «гарвардського дива» та повернення імені вчителя у 1991 році.
level: BIO
module: bio-243
objectives:
- Аналізувати внесок Пріцака у створення Українського наукового інституту Гарвардського університету та його наукового видання.
- Розуміти зв'язок між науковою школою Кримського та побудовою українських студій за кордоном.
- Досліджувати деколонізований погляд на походження Русі як багатомовну й багатоетнічну історичну проблему.
- Оцінити критику терміну «гарвардське диво» без героїзації фандрайзингу.
