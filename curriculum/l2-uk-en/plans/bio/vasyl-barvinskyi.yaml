content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Барвінським: композитор, піаніст, музикознавець
    та ключовий організатор українського музичного життя.
  - >-
    Провокаційне питання: чому радянська система вважала за необхідне не лише ув'язнити
    композитора, але й фізично спалити його ноти?
  section: Розминка
  words: 400
- points:
  - >-
    Сім'я та освіта: син Олександра та Євгенії Барвінських, брат Богдана та Олександра;
    навчання фортепіано у Львові та композиції в Празі.
  - >-
    Професійне становлення: композитор, піаніст, музикознавець, критик, педагог і
    організатор українського музичного життя. Ступінь доктора мистецтвознавства (1940)
    та почесного доктора Українського вільного університету в Празі (1938).
  - >-
    [!decolonization] Створення фахової бази: директорство музичного інституту у Львові,
    формування нових стандартів української професійної музичної освіти на тлі
    австро-угорської, польської та радянської політики.
  section: 'Формування: Львів, Прага та інституційна база'
  words: 1000
- points:
  - >-
    [!decolonization] Розвиток українського камерно-інструментального жанру:
    інтеграція імпресіоністичних рис у циклі "8 прелюдій" (1908), симфонічні твори
    ("Українська рапсодія", 1911), фортепіанне трио (1911), струнний квартет (1912),
    фортепіанний секстет (1915).
  - >-
    Різноманітність доробку: віолончельна соната (1926), другий струнний квартет (1935),
    фортепіанний концерт (1937), аранжування колядок і народних пісень, музична критика,
    педагогічні мініатюри.
  - >-
    "світлі моменти з нашої історії музики" — історичний оптимізм Барвінського після
    повторних культурних втрат як свідчення його музикознавчої перспективи.
  section: 'Діяльність: Від прелюдій до фортепіанного концерту'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешт 29 січня 1948 року як частина повоєнної сталінської
    кампанії проти українських культурних інституцій Західної України.
  - >-
    Десятирічне заслання разом із дружиною Наталією Пулюй-Барвінською до мордовських
    таборів. Повернення до Львова у 1958 році.
  - >-
    [!epistemic-humility] Точний номер справи та механізм вилучення партитур потребують
    подальших архівних розвідок. Радянський апарат знищив значну частину його рукописів,
    намагаючись стерти не лише біографію, але й інституційну пам'ять.
  - >-
    [!myth-buster] Знищення нот — не лише біографічна трагедія: втрачено репертуар,
    педагогіку та інституційну пам'ять. Копія фортепіанного концерту, знайдена в
    Аргентині у 1993 році, показує неможливість повного знищення культури.
  section: 'Тінь: Арешт, заслання та знищення партитур'
  words: 1600
- points:
  - >-
    Повернення до Львова: праця над відновленням втрачених творів по пам'яті та з
    копій. Відродження фортепіанного квінтету (1953–1963).
  - >-
    Лист 1963 року ("щоб не думали, що я перестав цікавитися школою"): свідчення
    інституційної відповідальності до останніх днів життя.
  - >-
    Сучасне значення: Барвінський як організатор, педагог і композитор — не лише
    "митець, чиї рукописи спалили". Відбудова музичної пам'яті через учнів і діаспору.
  section: 'Підсумок: Відбудова музичної пам''яті'
  words: 1000
focus: >-
  Василь Барвінський як організатор української професійної музичної освіти,
  композитор і жертва сталінського терору. Аналіз радянської стратегії знищення
  його музичних рукописів та тривалого процесу відновлення спадщини.
