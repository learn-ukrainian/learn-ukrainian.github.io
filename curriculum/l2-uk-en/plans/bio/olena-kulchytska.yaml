content_outline:
- points:
  - >-
    [!biography] Олена Кульчицька: графік, живописиця, майстриня декоративно-ужиткового
    мистецтва, етнографка, педагогиня і громадська діячка.
  - >-
    Провокаційне питання: коли художниця малює народний одяг, церкви, книжки й
    воєнні страждання, вона прикрашає культуру чи створює архів нації?
  section: Розминка
  words: 400
- points:
  - >-
    Бережани, Львів, Відень і європейська школа мистецтв та промислового дизайну:
    професійна жінка-художниця в Галичині між імперіями й мовами.
  - >-
    Перемишльський педагогічний період: майже три десятиліття викладання,
    музейна ініціатива `Стривігор`, робота з українськими книжками й публічною культурою.
  - >-
    [!decolonization] Західноукраїнський контекст не є периферією "великої" історії:
    Кульчицька формує українську візуальну пам'ять під Габсбургами, Польщею, війною і СРСР.
  section: 'Формування: Від Бережан і Відня до Перемишля'
  words: 1000
- points:
  - >-
    Графічні техніки: дереворит, лінорит, офорт, акватинта, екслібрис; учні
    вчаться називати матеріал і техніку, а не лише тему зображення.
  - >-
    Книжкова ілюстрація: Франко, `Лис Микита`, `Мойсей`, `Слово о полку Ігоревім`,
    дитячі видання `Нашим найменшим` як поєднання педагогіки, літератури й образу.
  - >-
    Етнографічний візуальний архів: народний одяг, архітектура, Гуцульщина,
    серії про письменників і регіони; це знання, не декоративна "фольклорність".
  - >-
    Прикладне мистецтво: килими, емаль, інтер'єр, меблі; за потреби розрізняти
    дизайн Олени та виконання окремих килимів її сестрою Ольгою.
  section: 'Діяльність: Графіка, книжка і етнографічний архів'
  words: 1200
- points:
  - >-
    Перша світова війна й 1919 рік: українська публічна робота в Перемишлі
    спричиняє тиск польської адміністрації, включно з інтернуванням у таборі.
  - >-
    Радянський Львів: спроби ділити квартиру, депутатська позиція, петиції за
    репресованих і захист культурних інституцій; посада не дорівнює простій лояльності.
  - >-
    [!anti-hagiography] Не робимо з неї ні "святу жертву", ні "радянську пропагандистку":
    джерела показують складне виживання і легальні канали допомоги в обмеженій системі.
  - >-
    [!myth-buster] Немає підтвердженої NKVD/MGB/KGB-справи в досьє; сучасний
    перемишльський конфлікт довкола дошки показує, як пам'ять може спрощувати біографію.
  section: "Тінь: Інтернування, радянська посада і спірна пам'ять"
  words: 1600
- points:
  - >-
    Дар понад 3,000 робіт Національному музею у Львові й меморіальна квартира
    як форма матеріального збереження української візуальної культури.
  - >-
    Війна, етнографія і книжка: Кульчицька дає учням словник для лінії, техніки,
    регіону, депортації, інтернування, музею та архіву.
  - >-
    Сучасне значення: її спадщина допомагає бачити жіночу професійну мистецьку
    працю не як додаток, а як центральну частину українського модерного канону.
  section: 'Підсумок: Мистецтво як переносний архів'
  words: 1000
focus: >-
  Олена Кульчицька як українська графікиня, педагогиня, етнографка і творчиня
  візуального архіву західноукраїнської культури; аналіз книжки, графічної техніки,
  народної архітектури, воєнної пам'яті та складної публічної ролі під кількома режимами.
