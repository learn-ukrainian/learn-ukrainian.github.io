content_outline:
- points:
  - 'Парадокс: Як сталося, що кошовий, за якого Січ досягла небаченого економічного розквіту, став тим, хто без бою віддав
    її на знищення імперії?'
  - '[!biography] Петро Калнишевський — останній кошовий отаман Запорозької Січі, який прожив 112 років, з яких 25 провів
    в одиночному ув''язненні.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мудрий господар vs наївний політик. Чи була політика економічного розвитку Калнишевського найкращою стратегією,
    чи вона лише приспала пильність козацтва перед обличчям імперської загрози?'
  - 'Дебат 2: Зрада чи порятунок? Рішення Калнишевського здати Січ без бою. Одні вважають це спробою уникнути кровопролиття,
    інші — зрадою козацьких ідеалів.'
  - '[!epistemic-humility] Історики досі сперечаються, чи існувала реальна можливість збройного опору в 1775 році, чи будь-який
    спротив був приречений на поразку.'
  - '[!decolonization] Розгляд ліквідації Січі не як ізольованої події, а як фінального акту довготривалої політики Російської
    імперії з поглинання української автономії.'
  section: 'Конфліктна карта: Мудрець чи жертва обставин?'
  words: 900
- points:
  - 'Походження та рання кар''єра: від простого козака до військового писаря, що свідчило про його грамотність та адміністративні
    здібності.'
  - 'Обрання кошовим у 1762 і 1765 роках: контекст обрання, боротьба партій всередині Січі, його ключові обіцянки.'
  - Формування характеру в умовах постійної загрози з боку імперії, Кримського ханства та внутрішніх суперечок.
  section: 'Формування: Шлях до булави'
  words: 1000
- points:
  - 'Економічний бум: заохочення фермерства (зимівники), торгівлі та ремесел, що перетворило Січ на процвітаючу економічну
    одиницю.'
  - 'Адміністратор та дипломат: спроби відстояти козацькі землі та права шляхом петицій та переговорів з імперським урядом.'
  - 'Меценат та будівничий: фінансування будівництва церков та шкіл, підтримка української культури та православ''я.'
  - 'Первинні джерела: аналіз листів Калнишевського до імператриці Катерини II — що можна прочитати між рядками його "вірнопідданої"
    риторики?'
  section: 'Діяльність: Золота осінь Запоріжжя'
  words: 1300
- points:
  - '[!anti-hagiography] Деконструкція образу "святого мученика": аналіз рішення Калнишевського не чинити опір військам генерала
    Текелі. Чи були альтернативи? Яку ціну було заплачено за "мирну" ліквідацію?'
  - 'Зречення клейнодів: символічний акт, що ознаменував кінець козацької епохи. Розгляд цього вчинку не як героїчного, а
    як трагічного і неоднозначного.'
  - '[!myth-buster] Спростування міфу про те, що козаки були одностайні у бажанні воювати. Існувала потужна "старшина", яка
    мала що втрачати і схилялася до компромісу з імперією.'
  - 'Особиста відповідальність лідера: наскільки Калнишевський особисто відповідальний за неготовність Січі до російського
    наступу?'
  section: 'Тінь: Безкровна капітуляція 1775 року'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Калнишевський — успішним менеджером, що програв свою "корпорацію", чи трагічною фігурою,
    розчавленою історією?'
  - '[!decolonization] 25 років ув''язнення на Соловках як метафора долі України в імперії. Його довге життя стало німим докором
    катам.'
  - 'Від в''язня до святого: аналіз процесу канонізації Калнишевського. Як і чому колишній в''язень Російської імперії став
    святим православної церкви?'
  - 'Сучасне значення: Калнишевський як символ незламності духу та опору асиміляції, актуальний у контексті сучасної російсько-української
    війни.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Petro Kalnyshevskyy, the liquidation of the Zaporozhian Sich, 25 years of solitary confinement in the Solovetsky Monastery,
  and his symbolic role as a martyr for Ukrainian autonomy.
