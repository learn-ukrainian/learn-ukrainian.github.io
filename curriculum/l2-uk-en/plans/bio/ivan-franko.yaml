content_outline:
- points:
  - 'Провокація: Франка називають «титаном праці» за 6000 творів. Але чи не поховала ця титанічна праця під собою живу людину з її драмами, сумнівами та помилками?'
  - '[!biography] Постать, що стала бронзовим пам''ятником. Чи можливо побачити за ним реальну людину?'
  section: Розминка
  words: 400
- points:
  - 'Дебати 1: Франко-радикал і Франко-прагматик. Ранні соціалістичні пошуки, арешти, розходження з польськими соціалістами — і пізніша критика марксизму та перехід на позиції національної демократії.'
  - 'Дебати 2: Франко радянський і Франко український. Як радянська пропаганда намагалася «привласнити» Франка, роблячи з нього «революціонера-демократа» і замовчуючи його національну програму та працю «Що таке поступ?».'
  - '[!epistemic-humility] Позиції Франка еволюціонували. Визнати, що в різні періоди він міг щиро дотримуватися поглядів, які пізніше критикував.'
  - '[!decolonization] Виокремлення образу Франка з-під радянських нашарувань і повернення його до історії формування модерної української політичної нації.'
  section: 'Конфліктна карта: Соціаліст чи Націоналіст?'
  words: 900
- points:
  - 'Соціальний ліфт: син коваля, що завдяки таланту та праці увійшов до інтелектуальної еліти Галичини. Вплив батька.'
  - 'Дрогобицька гімназія та Львівський університет: формування інтелектуального світогляду. Вплив Драгоманова.'
  - 'Рання громадська діяльність: участь у «Громадському другові», перші арешти як поворотний пункт у біографії.'
  - 'Контекст епохи: від Австрійської імперії часу народження Франка до Галичини у складі Австро-Угорщини після 1867 року — простір українського політичного та культурного життя.'
  section: 'Формування: Від сільської кузні до львівських салонів'
  words: 1000
- points:
  - 'Літературна спадщина: Поезія («Зів''яле листя»), проза («Захар Беркут», «Перехресні стежки»), драматургія («Украдене щастя»), дитяча література («Лис Микита»).'
  - 'Наукова діяльність: Докторат у Відні, праці з історії та теорії літератури, етнографії, мовознавства.'
  - 'Журналістика та видавництво: Засновник і редактор численних журналів («Житє і слово», «Світ»), що формували громадську думку.'
  - 'Перекладацька робота: Познайомив українців зі світовою класикою — від Шекспіра до Гете.'
  - 'Нобелівська номінація 1916 року: офіційно зафіксоване висунення та смерть Франка до завершення конкурсного процесу.'
  section: 'Діяльність: Титан праці'
  words: 1300
- points:
  - '[!anti-hagiography] Політичні поразки: Франко безуспішно балотувався 1895, 1897 і 1898 року до австрійського парламенту та Галицького крайового сейму; ЕІУ пов’язує ці невдачі з виборчими маніпуляціями владних структур і політичних противників.'
  - 'Особиста трагедія: складний шлюб з Ольгою Хоружинською, її психічна хвороба, самотність в останні роки.'
  - 'Конфлікти з сучасниками: гострі полеміки з консерваторами, клерикалами та навіть частиною народовців. Франко часто був «людиною проти всіх».'
  - 'Фізичні страждання: виснажлива хвороба, яка в останні роки життя паралізувала його руки, але не змогла зупинити творчу працю.'
  - '[!myth-buster] Міф про «вічного революціонера». Франко був складним і часто суперечливим мислителем, а не плакатним борцем.'
  section: 'Тінь: Ціна титанізму'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Франко — титаном, що збудував націю, чи трагічною фігурою, розчавленою власною працею та епохою?'
  - '[!decolonization] Оцінка спадщини Франка поза радянською парадигмою. Його роль у формуванні модерної української ідентичності та політичної нації.'
  - '«Вічний каменяр»: аналіз метафори. Що саме «лупав» Франко? Чи можна вважати його «Мойсея» заповітом для українського народу?'
  - 'Актуальність сьогодні: які ідеї Франка (про поступ, національну ідею, критичне мислення) є найважливішими для України XXI століття?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Життя, творчість і складна спадщина Івана Франка поза агіографічним образом «Каменяра» — від соціалістичних пошуків до національно-демократичної позиції, від великого доробку до політичних поразок і особистих випробувань.
level: BIO
module: bio-076
objectives:
- Аналізувати ключові етапи життя та творчості Івана Франка, виходячи за межі агіографічного образу «Каменяра»
- Критично оцінювати внесок Франка в українську культуру, розглядаючи його в контексті ідеологічних дебатів епохи — соціалізму й націоналізму
- Визначати та аналізувати «тіньові» аспекти біографії Франка: політичні невдачі, особисті трагедії та складні стосунки з сучасниками
- Формулювати власну аргументовану позицію щодо спадщини Франка та його актуальності в XXI столітті
