content_outline:
- points:
  - 'Провокація: Франка називають «титаном праці» за 6000 творів. Але чи не поховала ця титанічна праця під собою живу людину
    з її драмами, сумнівами та помилками?'
  - '[!biography] Постать, що стала бронзовим пам''ятником. Чи можливо побачити за ним реальну людину?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Франко-радикал vs Франко-прагматик. Ранній запал до соціалізму та марксизму, арешти, розрив із польськими соціалістами
    — і пізніше розчарування в марксизмі та перехід на позиції національної демократії.'
  - 'Дебат 2: Франко радянський vs Франко український. Як радянська пропаганда намагалася «привласнити» Франка, роблячи з
    нього «революціонера-демократа» і замовчуючи його національну програму та працю «Що таке поступ?».'
  - '[!epistemic-humility] Позиції Франка еволюціонували. Визнати, що в різні періоди він міг щиро дотримуватися поглядів,
    які пізніше критикував.'
  - '[!decolonization] Виокремлення образу Франка з-під радянських нашарувань та повернення його до пантеону українських державотворців.'
  section: 'Конфліктна карта: Соціаліст чи Націоналіст?'
  words: 900
- points:
  - 'Соціальний ліфт: син коваля, що завдяки таланту та праці увійшов до інтелектуальної еліти Галичини. Вплив батька.'
  - 'Дрогобицька гімназія та Львівський університет: формування інтелектуального світогляду. Вплив Драгоманова.'
  - 'Рання громадська діяльність: участь у «Громадському другові», перші арешти як поворотний пункт у біографії.'
  - 'Контекст епохи: Галичина під владою Австро-Угорщини — «лабораторія» для українського політичного та культурного життя.'
  section: 'Формування: Від сільської кузні до львівських салонів'
  words: 1000
- points:
  - 'Літературна спадщина: Поезія («Зів''яле листя»), проза («Захар Беркут», «Перехресні стежки»), драматургія («Украдене
    щастя»), дитяча література («Лис Микита»).'
  - 'Наукова діяльність: Докторат у Відні, праці з історії та теорії літератури, етнографії, мовознавства.'
  - 'Журналістика та видавництво: Засновник і редактор численних журналів («Житє і слово», «Світ»), що формували громадську
    думку.'
  - 'Перекладацька робота: Познайомив українців зі світовою класикою — від Шекспіра до Гете.'
  - 'Нобелівська номінація: визнання європейського масштабу, яке обірвалося через смерть.'
  section: 'Діяльність: Титан праці'
  words: 1300
- points:
  - '[!anti-hagiography] Політичні поразки: Франко неодноразово і безуспішно намагався стати послом до австрійського парламенту
    та галицького сейму. Суспільство не було готове прийняти його як політика.'
  - 'Особиста трагедія: складний шлюб з Ольгою Хоружинською, її психічна хвороба, самотність в останні роки.'
  - 'Конфлікти з сучасниками: гострі полеміки з консерваторами, клерикалами та навіть частиною народовців. Франко часто був
    «людиною проти всіх».'
  - 'Фізичні страждання: виснажлива хвороба, яка в останні роки життя паралізувала його руки, але не змогла зупинити творчу
    працю.'
  - '[!myth-buster] Міф про «вічного революціонера». Франко був складним і часто суперечливим мислителем, а не плакатним борцем.'
  section: 'Тінь: Ціна титанізму'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Франко — титаном, що збудував націю, чи трагічною фігурою, розчавленою власною працею
    та епохою?'
  - '[!decolonization] Оцінка спадщини Франка поза радянською парадигмою. Його роль у формуванні модерної української ідентичності
    та політичної нації.'
  - '«Вічний каменяр»: аналіз метафори. Що саме «лупав» Франко? Чи можна вважати його «Мойсея» заповітом для українського
    народу?'
  - 'Актуальність сьогодні: які ідеї Франка (про поступ, національну ідею, критичне мислення) є найважливішими для України
    XXI століття?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life, work, and complex legacy of Ivan Franko, moving beyond the hagiographic image of "Каменяр" (The Stonemason)
  to explore his socialist and nationalist phases, immense literary output, political failures, and personal tragedies.
level: BIO
module: bio-054
objectives:
- Аналізувати ключові етапи життя та творчості Івана Франка, виходячи за межі агіографічного образу «Каменяра»
- Критично оцінювати внесок Франка в українську культуру, розглядаючи його в контексті ідеологічних дебатів епохи (соціалізм
  vs націоналізм)
- Визначати та аналізувати «тіньові» аспекти біографії Франка: політичні невдачі, особисті трагедії та складні стосунки з
    сучасниками
- Формулювати власну аргументовану позицію щодо спадщини Франка та його актуальності в XXI столітті
