content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Провокація: Як одна жінка могла бути водночас безжальною язичницькою месницею, яка спалила ціле місто, і першою християнською
    святою Русі? У цьому парадоксі — ключ до розуміння Ольги.'
  - Етимологія імені Helga — «свята», «священна» у варязькій традиції, що задає подвійний код її образу.
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1 (Походження): Звідки Ольга? Радянський міф про «псковську селянку» vs. болгарська гіпотеза про знатне походження
    з Пліски. Як її походження впливає на оцінку її шлюбу та статусу?'
  - 'Дебат 2 (Спадщина): Чия свята? Апропріація образу Ольги російською імперською та церковною традицією («Святая равноапостольная
    княгиня Российская») vs. її роль як фундаторки саме української державності.'
  - '[!epistemic-humility] Літопис — не історичний документ, а агіографічний твір з політичним порядком денним. Ми аналізуємо
    не стільки «реальну» Ольгу, скільки її сконструйований образ.'
  section: 'Конфліктна карта: Свята чи тиранка?'
  words: 900
- points:
  - 'Походження та шлюб з Ігорем: дискусійність дати 903 р., вікова диспропорція та політичний розрахунок союзу.'
  - 'Світ середини X ст.: Русь як конгломерат племен, що платять данину, без єдиної системи та кордонів. Криза системи «полюддя».'
  - 'Трагедія 945 р.: вбивство Ігоря древлянами як закономірний результат хижацької системи збору данини.'
  - 'Регентство при малолітньому Святославі: унікальний статус жінки-автократора у варязькій правовій традиції. Вона не просто
    «зберігає трон», а править як повноцінний монарх.'
  section: 'Формування: Від Helgi до Ольги'
  words: 1000
- points:
  - Податкова реформа — серце її правління. Заміна грабіжницького полюддя на цивілізовану систему.
  - '«Устави» та «уроки»: встановлення фіксованого розміру податку. Це революція, що перетворює племінний союз на державу.'
  - '«Погости» та «становища»: створення мережі адміністративно-фіскальних центрів. Вперше з''являється територіальна структура
    влади.'
  - 'Встановлення перших державних кордонів: поїздки на північ (Мста, Луга) та маркування території. Русь перестає бути аморфною
    «зоною впливу».'
  section: 'Діяльність: Народження держави'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Аналіз чотирьох етапів помсти древлянам з «Повісті минулих літ» не як історичного факту, а як ритуального
    утвердження влади.'
  - 'Перша помста (закопування живцем) і друга (спалення в лазні): символізм землі та вогню, ритуальне поховання.'
  - 'Третя помста (тризна): кривавий бенкет як демонстрація військової сили та вірності язичницьким традиціям.'
  - 'Четверта помста (спалення Іскоростеня): легенда про птахів як апофеоз хитрості та жорстокості. Вона не просто карає,
    вона знищує ворога тотально.'
  - '[!myth-buster] Ця розповідь — не доказ її «кровожерливості», а агіографічний прийом, що показує, яку безодню язичництва
    вона мала подолати, щоб прийти до християнства.'
  section: 'Тінь: Чотири помсти'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Дипломатична місія до Константинополя (957 р.): прийом у імператора Костянтина Багрянородного. Легенда про те, як вона
    «перехитрила царя» — фольклорний мотив чи реальна політична гра?'
  - 'Прийняття християнства: особистий вибір чи політичний розрахунок? Ім''я Олена — зв''язок з імперією. Місія до імператора
    Оттона I (959 р.) як спроба балансувати між Сходом і Заходом.'
  - '[!decolonization] Канонізація та образ «рівноапостольної» — як Росія використовувала її постать для легітимізації власної
    імперської ідеї «Третього Риму».'
  - 'Повернення до розминки: помста і святість — це не суперечність, а етапи еволюції правительки, яка перетворила особисту
    трагедію на фундамент держави.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Knyahynia Olha's administrative reforms, diplomacy with Byzantium, conversion to Christianity, and the complex legacy
  of a ruthless avenger who became a saint.
