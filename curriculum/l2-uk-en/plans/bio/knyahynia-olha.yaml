title: 'Княгиня Ольга: Дипломатія та реформи'
focus: biography
pedagogy: seminar
phase: BIO
word_target: 5000
objectives:
- Проаналізувати адміністративні реформи Ольги
- Оцінити дипломатичні успіхи у відносинах з Візантією
- Дослідити причини та наслідки прийняття християнства
sources:
