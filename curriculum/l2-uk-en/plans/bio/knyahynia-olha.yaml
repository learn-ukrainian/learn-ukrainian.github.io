objectives:
- Аналізувати адміністративні реформи Ольги як основу державності
- Оцінювати її дипломатичні маневри між Візантією та Західною Європою
- Досліджувати причини та наслідки її хрещення для майбутнього Русі
- Критично аналізувати образ Ольги, протиставляючи літописну легенду про помсту та агіографічний образ святої
