content_outline:
- section: Вступ — Мудра володарка Києва
  points:
  - Ольга як символ державної мудрості — етимологія імені (Helga — «свята», «священна»)
  - Поєднання язичницької сили та християнського вибору — трансформація від жорстокої помсти до дипломатії
  - Роль у зміцненні внутрішнього ладу — перехід від конгломерату племен до структурованої держави
  words: 700
- section: Життєпис
  points:
  - Походження (легенди про Псков та болгарське коріння) — [!myth-buster] гіпотеза про Пліску (Болгарія) vs радянський міф
    про «селянське» походження
  - Шлюб з Ігорем — дискусійність дати 903 р. та вікова диспропорція
  - 'Трагедія 945 р. та помста древлянам — 4 етапи помсти як ритуальне ствердження влади; include quote: «І посікли їх п''ять
    тисяч...»'
  - Регентство при Святославі — статус жінки-правительки у варязькій традиції ([!culture] hook)
  words: 700
- section: Історичний контекст
  points:
  - Стан Русі в середині X ст. — криза системи «полюддя» та необхідність централізації
  - Стосунки з Візантією та Священною Римською імперією — балансування між Сходом і Заходом
  words: 700
- section: Внесок
  points:
  - Податкова реформа (устави, уроки, погости) — [!context] «погост» як адміністративний центр, а не цвинтар
  - Встановлення перших державних кордонів — поїздка на Північ (Мста, Луга) та маркування території (ловища)
  words: 700
- section: Останні роки
  points:
  - Дипломатична місія до Константинополя 957 р. — опис прийому за «De Ceremoniis» Костянтина Багрянородного
  - Прийняття християнства — особистий вибір (ім'я Олена) та легенда про «перехитрила царя»
  - Смерть та канонізація — християнське поховання без тризни
  - Західний вектор — [!history-bite] місія 959 р. до Оттона I як спроба інтеграції в Європу
  words: 700
- section: Спадщина
  points:
  - Ольга як «передвісниця» Хрещення Русі — метафора «Зоря перед сонцем» (ПМЛ)
  - Образ у літописах та мистецтві — [!decolonization] «Свята Русі», а не Росії (спростування московської апропріації)
  - Археологія — «Град Ольги» у Вишгороді
  words: 700
- section: Підсумок
  points:
  - Ольга як архітекторка регулярної держави — заміна грабіжницького полюддя на податкову систему
  words: 800
vocabulary_hints:
  required:
  - регент (regent) — унікальний статус Ольги як повноправної правительки (автократора)
  - погост (pohost - administrative center) — адміністративний центр збору данини, не цвинтар (decolonization note)
  - урок (urok - fixed tax) — фіксований розмір данини на противагу полюддю
  recommended:
  - тризна (tryzna - funeral feast) — частина ритуальної помсти деревлянам
  - полюддя (poluddia - gathering tribute) — криза екстенсивної системи збору ресурсів
  - становище (stanovyshche - camp/outpost) — маркування княжої території
  - автократор (autokrator - autocrat/ruler) — титул, яким Ольга фактично володіла
activity_hints:
