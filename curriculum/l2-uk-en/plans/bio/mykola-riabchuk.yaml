content_outline:
- points:
  - 'Провокація: що робити з картою, яка допомагає щось побачити, але може перетворитися на пастку для мислення?'
  - '[!biography] Микола Рябчук — український есеїст, критик, перекладач і політолог, який дав мову для розмови про постколоніальну Україну, імперське знання й право України називати себе.'
  - '[!epistemic-humility] Це план про живого автора: посади, публічні есеї й політичні вислови потрібно датувати й перевіряти на джерелі.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Рябчук допоміг назвати імперські й радянські рамки, у яких Україну бачили як «нізвідки», «малоросійську» або вічно проміжну.'
  - 'Позиція 2: його сильні схеми, зокрема «дві України», можуть бути використані як застигла географія стереотипів, якщо не читати авторське застереження.'
  - '[!decolonization] Деколонізація тут означає не заміну одного міфу іншим, а вихід України з позиції об''єкта чужого опису до позиції суб''єкта власної мови.'
  - '[!epistemic-humility] Авторська формула про те, що модель може водночас пояснювати й затемнювати, має бути в центрі семінару.'
  section: 'Конфліктна карта: Деколонізатор мови чи автор небезпечних схем?'
  words: 900
- points:
  - 'Луцьк, навчання у Львові, несанкціонована літературна діяльність і виключення з Львівської політехніки як тиск пізньорадянської культурної системи.'
  - 'Самвидав, редакторська праця, переклад і літературна критика як школа мислення до того, як Рябчук став міжнародно видимим політичним есеїстом.'
  - 'Пізньорадянський досвід цензури й неформальної культури формує його увагу до мови влади, дозволених назв і того, хто має право говорити.'
  - 'Від літературного середовища до «Критики», ПЕН і міжнародних дискусій: інституції як простір українського інтелектуального голосу.'
  section: 'Формування: Самвидав, критика й право на слово'
  words: 1000
- points:
  - '«Від Малоросії до України» й «Postcolonial Syndrome» як аналіз внутрішньої колонізованості, мовної ієрархії та імперських назв.'
  - '«Two Ukraines» і «Ukraine: One State, Two Countries?» як впливові, але контестовані спроби описати амбівалентність, регіональні відмінності й політичну маніпуляцію.'
  - '«Mapping a "Nowhere Nation"» як приклад того, як Захід і Росія нормалізували імперські уявлення про Україну.'
  - '«Лексикон націоналіста та інші есеї» як пізній якір: слово «націоналіст» між радянським тавром, постколоніальним відновленням і воєнною обороною.'
  section: 'Діяльність: Від «Малоросії» до постколоніального словника'
  words: 1300
- points:
  - '[!anti-hagiography] Рябчук не є автором універсального ключа до України: його рамки треба питати, що вони відкривають, що спрощують і кому можуть служити.'
  - 'Модель «двох Україн» не можна викладати як поділ на «добрий Захід» і «поганий Схід»; після 2014 і 2022 років особливо важливо бачити громадянську консолідацію й локальну різноманітність.'
  - 'Термін «націоналізм» потребує розрізнення: громадянська самосуб''єктивація, етнічна винятковість, радянське тавро й російська пропаганда — не одне й те саме.'
  - 'Полемічний стиль живого інтелектуала читаємо з датою й жанром: есе, інтерв''ю, академічний текст і політичний коментар мають різну вагу.'
  section: 'Тінь: «Дві України», полеміка й живий публічний інтелектуал'
  words: 900
- points:
  - 'Повернення до розминки: студент пояснює, як користуватися картою Рябчука, не приймаючи її за саму територію.'
  - '[!decolonization] Його головний внесок у курс — навчити бачити імперське знання як механізм влади й переписувати Україну з позиції української суб''єктності.'
  - 'Порівняння: з Володимиром Єрмоленком — Україна як виробниця понять; з Оксаною Забужко — постколоніальна травма; з Ларисою Масенко — мова й політика.'
  - 'Фінальна вправа: взяти три зовнішні кліше про Україну й переформулювати їх так, щоб українці були не об''єктом, а дієвцями.'
  section: 'Дискусія та підсумок: Україна як суб''єкт власного опису'
  words: 700
focus: Микола Рябчук як живий український есеїст і публічний інтелектуал, чия постколоніальна мова виявляє імперське знання та інтеріоризовані малоросійські рамки, тоді як впливову модель «двох Україн» потрібно подавати як дискусійну, датовану й потенційно стереотипотворчу.
