- Критично оцінювати модель «двох Україн» як інструмент, що може і пояснювати, і спрощувати
- Розрізняти есеїстику, політичний коментар, літературну критику й академічну інтерпретацію
- Формулювати деколонізаційні твердження без регіональних стереотипів і без перенесення воєнних висновків на давніші тексти
