objectives:
- Розрізняти успадковане колективне покарання (як син Романа Шухевича) і власний свідомий дисидентський
  вибір Юрія Шухевича.
- 'Аналізувати радянські механізми переслідування: покарання родини, розлука через дитячий будинок, повторні
  вироки, заборона жити в Україні, табори, заслання.'
- Застосовувати епістемічну обережність до спірних даних — формули «майже 40 років у неволі» та дати арешту
  1972 року.
- Оцінювати співвідношення радянського дисидентського життєпису і пізнішої громадсько-політичної діяльності
  в незалежній Україні.
