content_outline:
- points:
  - '[!biography] Знайомство з Юрієм Шухевичем — українським інакодумцем і політв''язнем, що, за оцінкою
    Харківської правозахисної групи, провів «майже 40 років у неволі».'
  - 'Провокаційне питання: що означає карати дитину за особу її батька? Перше покарання Юрій дістав підлітком
    — як син розшукуваного провідника.'
  - '[!epistemic-humility] Розмежування від початку: він — постать Блоку Е (дисидентство і правозахист),
    а не військова постать ОУН/УПА; його шлях треба читати окремо від біографії батька.'
  section: Розминка
  words: 400
- points:
  - Народження 28 березня 1933 року на Львівщині (село Огладів); син Романа Шухевича, командира УПА —
    цей факт згадуємо лише для пояснення радянської логіки покарання родини.
  - '[!decolonization] Радянська логіка колективного покарання: 1945 року заарештовано матір і бабусю
    як членів родини Романа Шухевича, а Юрія з п''ятирічною сестрою віддано спершу до дитячого будинку
    в Чорнобилі, а потім у Сталіно (Донецьк).'
  - 1948 року, повернувшись на Донбас, щоб забрати сестру, п'ятнадцятирічний Юрій заарештований і згодом
    засуджений на десять років за «зв'язок із підпіллям».
  - 'Смерть батька 5 березня 1950 року: за свідченням ХПГ, Юрія привезли з ув''язнення впізнати тіло —
    він бачив батька востаннє.'
  section: 'Формування: Покараний як син'
  words: 1000
- points:
  - Звільнення 1956 року і повернення до відбуття строку після протесту прокурора СРСР; 1958 року — новий
    десятирічний вирок за «антирадянську агітацію і пропаганду», відбутий у мордовських таборах.
  - '[!decolonization] Заборона жити в Україні: звільнений 1968 року без права п''ять років мешкати в
    Україні, оселився в Нальчику й працював електриком; там зблизився з шістдесятниками і деякий час жив
    у помешканні Ніни Строкатої.'
  - Новий арешт 1972 року; звинувачення зосередилося на незакінченій статті «Роздуми вголос» про перспективи
    українського національно-визвольного руху.
  - 'Вирок як «особливо небезпечному рецидивісту»: десять років таборів особливого режиму і п''ять років
    заслання; після листа до ООН — додатковий вирок 1973 року (десять років в''язниці та п''ять років
    заслання).'
  - '[!epistemic-humility] У лютому 1979 року його оголошено членом Української Гельсінської групи серед
    в''язнів і засланців; згодом він казав, що це не було узгоджено з ним заздалегідь.'
  section: 'Діяльність: Власний шлях інакодумця'
  words: 1200
- points:
  - '[!anti-hagiography] Не легенда, а задокументований ланцюг репресій: покарання як члена родини, розлука
    через дитячий будинок, повторні вироки, заборона жити в Україні, табори особливого режиму, в''язниця,
    заслання, тиск до співпраці чи каяття та шкода здоров''ю.'
  - '[!epistemic-humility] Формула «майже 40 років у неволі» належить ХПГ; методику підрахунку саме «40
    років» за категоріями джерело не виявлено — вживати це число лише з посиланням на ХПГ і відрізняти
    від вужчих підрахунків таборових років.'
  - '[!epistemic-humility] Дата арешту 1972 року різниться: ХПГ подає 14 лютого і зазначає, що інші джерела
    дають 26 березня — приклад чесної невизначеності, коли факт арешту й вироку надійний, а точна дата
    в цьому наборі джерел нерозв''язана.'
  - '[!myth-buster] Відокремити сина від батька: Юрія не можна розчиняти в постаті Романа Шухевича чи
    у воєнній історії УПА — радянська держава карала його за приналежність до родини, а пізніше — за власну
    дисидентську діяльність.'
  - 'В''язниця як примусовий інтелектуальний простір: за свідченням ХПГ, він навчався від ув''язнених
    професорів, філософів, письменників, науковців та інженерів.'
  section: 'Тінь: Майже сорок років у неволі'
  words: 1600
- points:
  - 'Спадщина, а не серцевина його дисидентського життєпису: у незалежній Україні Юрій Шухевич став народним
    депутатом VIII скликання (27 листопада 2014 — 29 серпня 2019), обраним за списком Радикальної партії;
    заступник голови комітету у справах ветеранів та осіб з інвалідністю.'
  - '[!decolonization] Партійні афіліації періоду незалежності варто вивчати як пізнішу громадсько-політичну
    діяльність, а не як ядро біографії Блоку Е, що стосується радянських репресій.'
  - Смерть 22 листопада 2022 року в Мюнхені.
  - '[!myth-buster] Сучасне значення: біографія Юрія Шухевича вчить розрізняти успадковане колективне
    покарання і свідомий політичний вибір — і не підміняти одне одним.'
  - '[!epistemic-humility] Відкриті питання: повний текст і архівне місцезнаходження «Роздумів вголос»
    — джерело не виявлено (копія дісталася Львова і була втрачена), тож пряме цитування неможливе.'
  section: 'Підсумок: Дисидент у незалежній Україні'
  words: 1000
focus: Юрій Шухевич як інакодумець і довголітній політв'язень Блоку Е; радянська логіка покарання родини,
  повторні ув'язнення та заслання, відокремлення задокументованого факту від легенди й від воєнної історії
  батька.
