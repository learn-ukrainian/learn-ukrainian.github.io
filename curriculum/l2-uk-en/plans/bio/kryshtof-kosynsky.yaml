objectives:
- Пояснювати, як особиста земельна кривда Косинського (маєток Рокитне) сплелася з ширшим тиском на козацькі права та розширенням магнатського землеволодіння.
- 'Аналізувати перебіг повстання 1591–1593 років: захоплення документів у Білій Церкві, присягу Косинському як гетьману в містах, поразку під П''яткою та смерть під Черкасами.'
- Розрізняти джерельні ярлики (сваволя, розбій, рицарство) і показувати, хто і навіщо їх застосовує.
- Оцінювати повстання без спрощень «бандит чи патріот», формулюючи натомість питання про те, коли військова спільнота починає діяти як політичне тіло.
