content_outline:
- points:
  - 'Провокація: як підляський дрібний шляхтич і козацький старшина, якому Річ Посполита за службу дала маєток Рокитне, очолив перше велике збройне козацьке повстання проти цієї ж держави — і як пізніша пам''ять по черзі робила з нього то «бандита», то «класового борця», то «модерного націоналіста»?'
  - '[!biography] Представлення постаті через розрив між особистою кривдою та політичним масштабом повстання.'
  section: Розминка
  words: 400
- points:
  - 'Перша інтерпретація: точні формулювання джерел. ЕІУ називає це першим збройним козацьким виступом проти державної влади Речі Посполитої; IEU — першим масштабним повстанням українського селянства й козаків. Обидві рамки треба брати саме так, як їх подає джерело.'
  - 'Друга інтерпретація: особиста кривда чи козацька політика? Земельний конфлікт довкола Рокитного був реальним спусковим гачком, але ширший тиск на козацькі права, невиплачена служба й розширення магнатського землеволодіння дали повстанню масову опору (читання Щербака про козацьку автономію).'
  - '[!epistemic-humility] Рік народження невідомий (не 1545, як подають нижчі джерела); шляхетське походження й козацьке командування — обидва істинні, жодного не можна стерти; обставини смерті лишаються джерельно обережними.'
  - '[!decolonization] Острозькі й Вишневецькі — це місцева магнатська влада, а не етнічна моральна п''єса; слово «сваволя» — це звинувачувальна мова влади й еліт, а не нейтральний ярлик оповідача.'
  section: 'Конфліктна карта: Розбійник, скривджений чи політичний лідер?'
  words: 900
- points:
  - Походження з дрібношляхетського середовища Підляшшя; 1586 — перша певна згадка як козацького старшини на Запорожжі.
  - Весна 1590 — за дорученням Сигізмунда III Вази організував козаків для оборони Поділля від османської та кримської загрози; як винагороду отримав маєток Рокитне.
  - '1590–1591 — конфлікт за надані землі: ЕІУ називає князя Януша Острозького тим, хто привласнив дані Косинському маєтності; пізніші наративи додають Олександра Вишневецького. Особиста кривда стала мобілізувальною для козаків, чиї плата й статус теж були непевні.'
  section: 'Формування: Підляський шляхтич і козацький старшина'
  words: 1000
- points:
  - Кінець 1591 — захоплення майнових документів у Білій Церкві відкриває збройну фазу; рух охопив значну частину Київщини й частини Поділля та Брацлавщини.
  - 'Присяга на місцях: у Білій Церкві, Переяславі, Богуславі, Корсуні (ймовірно й у Черкасах та Каневі) люди присягали Косинському як козацькому гетьману. Щербак читає це як поширення січової юрисдикції на осілу волость — приватна кривда стала претензією на те, хто командує, судить, оподатковує й захищає.'
  - Осінь 1592 — лист Косинського до Сигізмунда III (за Щербаком — про непідпорядкування Війська Запорозького прикордонним старостам і воєводам). Факсиміле зберігається у Шведському державному архіві; точне формулювання перевірити перед цитуванням.
  - '[!epistemic-humility] Джерельні анкери: капітуляційний лист з-під П''ятки («пана Косинського за гетьмана мати не будемо»), поданий у додатку Ярмошика за виданням Listy Stanisława Żółkiewskiego та АЮЗР. Учні працюють із текстом поразки, а не з пізнішою героїчною історією.'
  section: 'Діяльність: Повстання 1591–1593 років'
  words: 1300
- points:
  - 'Лютий 1593 — поразка під П''яткою від зібраного Острозькими війська; умови капітуляції: усунення Косинського з гетьманства й зобов''язання не нападати на маєтки князів та їхніх союзників.'
  - Травень 1593 — Косинського вбито під Черкасами під час нової кампанії; спосіб смерті джерела передають по-різному, тож його треба лишати обережним.
  - '[!anti-hagiography] Руйнівні набіги й захоплення документів були реальними; водночас за Косинським стояла службово-козацька спільнота з непевними платою й статусом. Треба бачити обидва шари.'
  - '[!myth-buster] Повстання не закінчилося з П''яткою: у серпні 1593 козаки змусили Вишневецького, а в жовтні — київську владу визнати традиційні козацькі права.'
  section: 'Тінь: Поразка під П''яткою, смерть під Черкасами і спрощення пам''яті'
  words: 900
- points:
  - 'Головне питання замість «злочинець чи патріот»: коли військова прикордонна спільнота починає діяти як політичне тіло, що претендує на владу, суд і податок?'
  - 'Наливайкове сусідство: повстання Наливайка належить до наступної фази того ж козацького воєнного циклу кінця XVI ст. — порівнювати, щоб показати ескалацію й патерни пам''яті, а не зливати постаті.'
  - 'Пізніше автономне прочитання (Щербак) допустиме, але з джерельним застереженням: це не модерна націоналістична програма, і хронологічну відстань треба зберігати.'
  section: 'Дискусія та підсумок: Коли спільнота стає політичним тілом'
  words: 700
focus: Біографія Криштофа Косинського — підляського шляхтича й козацького старшини, чия особиста земельна кривда переросла в перше велике збройне козацьке повстання 1591–1593 років проти держави Речі Посполитої та магнатської влади.
level: BIO
