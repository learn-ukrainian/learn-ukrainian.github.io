objectives:
- >-
  Аналізувати культурний і мистецтвознавчий спротив львівських шістдесятників на
  прикладі Богдана Гориня.
- >-
  Розуміти механізм звинувачення в «антирадянській діяльності» та хвилю політичних
  процесів 1965 року проти української інтелігенції.
- >-
  Досліджувати родинний вимір репресій на прикладі братів Богдана і Михайла Горинів.
- >-
  Оцінювати, як «м'яка» репресія (заборона на фах, нагляд) продовжувала
  переслідування після звільнення.
