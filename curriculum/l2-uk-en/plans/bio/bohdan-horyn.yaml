content_outline:
- points:
  - >-
    [!biography] Знайомство з Богданом Горинем: мистецтвознавець і літературний
    критик, шістдесятник, політв'язень, згодом народний депутат і автор
    документальної прози про дисидентський рух.
  - >-
    Провокаційне питання: чому художня критика й культурна організація ставали
    підставою для арешту?
  - >-
    [!decolonization] Львівські шістдесятники: культура як простір національного
    самоствердження.
  section: Розминка
  words: 400
- points:
  - >-
    Народження 10 лютого 1936 року в селі Кнісело (Жидачівщина, Львівщина, тоді
    Польща); брат Михайла й Миколи Горинів.
  - >-
    Закінчив Львівський університет (1959); працював у Львівському будинку народної
    творчості, викладав, був науковцем Львівського музею українського мистецтва.
  - >-
    Заступник голови львівського Клубу творчої молоді «Пролісок»; організовував і
    поширював самвидав.
  - >-
    [!decolonization] Мистецтвознавство як національна праця: захист українського
    мистецтва й культури був формою спротиву.
  section: 'Формування: Мистецтвознавець серед львівських шістдесятників'
  words: 1000
- points:
  - >-
    Грудень 1944 року: спроба НКВС депортувати вагітну матір із двома синами в
    напрямку Ходорова до Сибіру; родина врятувалася — репресії проти родини почалися
    ще до його арешту.
  - >-
    1965 рік: арешт у першій хвилі проти української інтелігенції; за даними ЕСУ — три
    роки ув'язнення за «антирадянську діяльність».
  - >-
    Ув'язнення в таборі № 11 у Явасі (Мордовія), де він зустрів Левка Лук'яненка,
    Опанаса Заливаху, Івана Геля, Івана Кандибу та Михайла Сороку.
  - >-
    [!anti-hagiography] Після звільнення — заборона на фах: навіть працюючи у
    Львівській картинній галереї, він не міг опублікувати жодної своєї
    мистецтвознавчої статті.
  section: 'Діяльність: Перші політичні процеси 1960-х'
  words: 1200
- points:
  - >-
    Механізм: арешт → звинувачення в «антирадянській діяльності» → табір суворого
    режиму в Мордовії — назвати «антирадянську діяльність» як радянське
    звинувачення, а не нейтральний ярлик.
  - >-
    [!decolonization] Хвиля процесів 1965 року, спрямована проти львівської мережі
    шістдесятників, що організовувала лекції, зв'язки з київськими письменниками й
    самвидав.
  - >-
    Родинний вимір: ув'язнено й Михайла Гориня — репресії спрямовані на цілу родину
    Горинів, а не лише на окрему особу (Богдан уникнув арешту в січневій хвилі 1972
    року).
  - >-
    [!epistemic-humility] «М'яка» репресія післятабірного періоду: нагляд, заборона
    на публікації й витіснення з інтелектуальної праці — переслідування, що тривало
    за мурами в'язниці.
  - >-
    [!myth-buster] Радянські юридичні формули («антирадянська діяльність») — це мова
    обвинувачення, а не опис реальних дій; за нею стояла культурна організація,
    самвидав і правозахист.
  section: 'Тінь: «Антирадянська діяльність» і родина під ударом'
  words: 1600
- points:
  - >-
    [!myth-buster] Пізній період подавати лише за датованими працями й посадами;
    відсутність дати смерті в джерельному пакеті не є доказом актуального
    життєвого статусу.
  - >-
    Засновник Української Гельсінської спілки та співавтор її «Декларації принципів»
    (1988); організатор установчого з'їзду Руху (1989); народний депутат України
    (1990–1998).
  - >-
    Автор документальної та мистецтвознавчої прози: «Опанас Заливаха. Вибір шляху»
    (1994), тритомне «Не тільки про себе» (2006–2010), «Святослав Гординський на тлі
    доби» (Шевченківська премія, 2019).
  - >-
    Простежити шлях від політв'язня до автора документальної прози незалежної
    України без приписування неперевіреного афоризму.
  section: 'Підсумок: Свідок, що пережив систему'
  words: 1000
focus: >-
  Богдан Горинь як мистецтвознавець, літературний критик і політв'язень, що пережив
  радянську систему й дожив до незалежності: аналіз культурного спротиву, механізму
  звинувачення в «антирадянській діяльності» та родинного виміру репресій родини
  Горинів.
