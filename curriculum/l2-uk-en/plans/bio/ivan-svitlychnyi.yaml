  Розуміти механізми радянських репресій: «Справа Добоша», ст. 62,
  обшук 1972, табори, заслання.
- >-
  Розрізняти назву перевіреного видання «Серце для куль і для рим» і
  неперевірені рядки, що поширюються без видання та локатора.
- Оцінити роль квартири на Уманській як приватного інституту культури в мережі шістдесятників.
