content_outline:
- points:
  - >-
    [!biography] Знайомство зі Світличним Іваном Олексійовичем: літературознавець, поет, перекладач,
    правозахисник, брат Надії Світличної.
  - >-
    Провокаційне питання: як людина без великого друкованого корпусу могла стати моральним
    авторитетом шістдесятників?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 20 вересня 1929 року в Половинкиному (Луганщина); закінчив філологічний факультет
    Харківського університету (1952).
  - >-
    Робота в «Радянському літературознавстві», Інституті літератури, відділі словників Інституту
    мовознавства; рання критика в «Вітчизні», «Дніпрі».
  - >-
    [!decolonization] Східноукраїнське походження, київські кола, львівські мережі — це міст
    між регіонами, а не «розкол» української культури.
  section: 'Формування: Схід, Харків і літературознавство'
  words: 1000
- points:
  - >-
    Критика спрощень соцреалізму; підтримка Івана Дзюби, Василя Стуса, київсько-львівської мережі
    шістдесятників.
  - >-
    Переклади з чеської, словацької, французької; «Слово о полку Ігоревім»; квартира на вул. Уманській
    як вузол самвидаву та магнітні записи Василя Симоненка, Стуса та інших.
  - >-
    Збірка «Серце для куль і для рим» (1991); вірші табору й заслання, частина — на Заході до
    реабілітації.
  section: 'Діяльність: Критик, перекладач і вузол самвидаву'
  words: 1200
- points:
  - >-
    Звільнення й перший арешт 1965 року (близько восьми місяців); другий арешт у січневому
    розгромі 1972 року; обшук 12 січня 1972 — вилучено самвидав, книги, друкарку, радіоприймач,
    магнітні стрічки.
  - >-
    «Справа Добоша» як формальний привід; суд 27–29 квітня 1973 року; ст. 62 ч. 1 КК УРСР —
    «антирадянська агітація і пропаганда»; вирок: 7 років таборів суворого режиму + 5 років
    заслання.
  - >-
    Табори ВС-389/35 і ВС-389/36 (Перм); колективні протести, 56-денне голодування, покарання
    в ШІЗО/ПКТ; хвороба Боткіна (січень 1978) через нестерильний шприц у таборовій лікарні.
  - >-
    [!anti-hagiography] Заслання в Усть-Кан (Горно-Алтай), відправлення 7 травня 1978,
    прибуття 27 червня; інсульт у серпні 1981 на Алтаї — за свідченням Надії Світличної, як творча
    особа знищений саме тоді.
  - >-
    [!epistemic-humility] Повернення до Києва важко хворим після інсультів у заслання; смерть
    25 жовтня 1992 року в Києві. Мітки «антирадянської націоналістичної діяльності» цитувати
    лише як мову обвинувачення.
  section: 'Тінь: Справа Добоша, табори та знищення здоров''я'
  words: 1600
- points:
  - >-
    Вплив перевищує друкований корпус: міст між Києвом і Львовом, розповсюджувач самвидаву,
    учасник таборового опору, приватна культурна установа на Уманській.
  - >-
    Після 1991: «Серце для куль і для рим», «У мене — тільки слово» (1994), «З живучого племені
    Дон Кіхотів» (2008, з Надією Світличною).
  - >-
    [!decolonization] [!myth-buster] Не зводити до «доброокого» чи лише до арешту 1972 року;
    не приписувати насильства — документи фіксують літературне поширення, записи й самвидав.
  section: 'Підсумок: Серце для куль і для рим'
  words: 1000
focus: >-
