objectives:
- >-
  Відокремити біографічні факти Світличного (освіта, переклади, дати) від спрощень популярної
  пам''яті («доброокий», лише жертва).
- Розуміти механізми радянських репресій: «Справа Добоша», ст. 62, обшук 1972, табори, заслання.
- Аналізувати поетичні рядки «Я — теж Вітчизна» та «Серце — мішень для куль і для рим» як етичний
  патріотизм без гасла.
- Оцінити роль квартири на Уманській як приватного інституту культури в мережі шістдесятників.
