content_outline:
- points:
  - >-
    [!biography] Знайомство зі Світличним Іваном Олексійовичем: літературознавець, поет, перекладач,
    правозахисник, брат Надії Світличної.
  - >-
    Провокаційне питання: як людина без великого друкованого корпусу могла стати моральним
    авторитетом шістдесятників?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 20 вересня 1929 року в Половинкиному (Луганщина); 1947 року
    вступив на факультет української філології Харківського університету,
    закінчив його з відзнакою, а 1952 року вступив до аспірантури Інституту літератури.
  - >-
    1955 року очолював відділ критики журналу «Дніпро»; у 1957–1963 роках
    працював в Інституті літератури, згодом — в Інституті філософії та
    Українському товаристві охорони природи.
  - >-
    [!decolonization] Східноукраїнське походження, київські кола, львівські мережі — це міст
    між регіонами, а не «розкол» української культури.
  section: 'Формування: Схід, Харків і літературознавство'
  words: 1000
- points:
  - >-
    Критика спрощень соцреалізму; підтримка Івана Дзюби, Василя Стуса, київсько-львівської мережі
    шістдесятників.
  - >-
    Переклади з французької, чеської, польської, сербсько-хорватської й турецької;
    квартира на вул. Уманській як осередок самвидаву та магнітних записів Василя
    Симоненка, Василя Стуса та інших.
  - >-
    Збірка «Серце для куль і для рим» (1990); вірші табору й заслання, частина — на Заході до
    реабілітації.
  section: 'Діяльність: Критик, перекладач і вузол самвидаву'
  words: 1200
- points:
  - >-
    Звільнення й перший арешт 1965 року (близько восьми місяців); другий арешт у січневому
    розгромі 1972 року; обшук 12 січня 1972 — вилучено самвидав, книги,
    друкарську машинку, радіоприймач,
    магнітні стрічки.
  - >-
    «Справа Добоша» як формальний привід; суд 27–29 квітня 1973 року; ст. 62 ч. 1 КК УРСР —
    «антирадянська агітація і пропаганда»; вирок: 7 років таборів суворого режиму + 5 років
    заслання.
  - >-
    Табори ВС-389/35 і ВС-389/36 (Перм); колективні протести, 56-денне голодування,
    покарання в ШІЗО/ПКТ; музейна довідка ХПГ повідомляє, що в січні 1978 року
    в таборовій лікарні брудним шприцом занесли хворобу Боткіна.
  - >-
    [!anti-hagiography] Заслання в Усть-Кан (Горно-Алтай), відправлення 7 травня
    1978, прибуття 27 червня; дружина Леоніда Світлична згодом написала, що як
    творча людина він загинув у серпні 1981 року в засланні на Алтаї.
  - >-
    У таборі й на засланні 1978–1981 років Світличний переклав «Слово про
    Ігореву січ»; не переносити цю працю до доарештованої хронології.
  - >-
    [!epistemic-humility] Повернення до Києва важко хворим після інсульту в засланні; смерть
    25 жовтня 1992 року в Києві. Мітки «антирадянської націоналістичної діяльності» цитувати
    лише як мову обвинувачення.
  section: 'Тінь: Справа Добоша, табори та знищення здоров’я'
  words: 1600
- points:
  - >-
    Вплив перевищує друкований корпус: міст між Києвом і Львовом, розповсюджувач самвидаву,
    учасник таборового опору, приватна культурна установа на Уманській.
  - >-
    Повернення текстів до читача: «Серце для куль і для рим» (1990), «У мене —
    тільки слово» (1994) та «З живучого племені Дон Кіхотів» (2008), де Надію
    Світличну вказано співавторкою, а Михайлину Коцюбинську й Олексія Неживого
    — упорядниками, за бібліографією музейної довідки ХПГ.
  - >-
    [!decolonization] [!myth-buster] Не зводити до «доброокого» чи лише до арешту 1972 року;
    не приписувати насильства — документи фіксують літературне поширення, записи й самвидав.
  section: 'Підсумок: Серце для куль і для рим'
  words: 1000
