content_outline:
- points:
  - 'Провокація: Як одна людина за десятиліття перетворила український театр з етнографічного музею на епіцентр європейського авангарду — і заплатила за це життям?'
  - '[!biography] Лесь Курбас: режисер, актор, теоретик, що мислив не п''єсами, а цілими епохами.'
  - 'Загадка: Чому його театр «Березіль» одночасно отримував міжнародне визнання і нищівну критику від радянської влади?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Курбас проти Театру корифеїв. Це був розвиток традиції чи її руйнування? Позиція 1: Курбас зневажив народний театр, нав''язуючи незрозумілі західні форми. Позиція 2: Курбас вивів український театр зі стану провінційності на світовий рівень.'
  - 'Дебат 2: Радянська інтерпретація vs. сучасна. Позиція 1 (радянська): Курбас — "буржуазний націоналіст", що відірвався від народу. Позиція 2 (сучасна): Курбас — жертва сталінського терору, символ "Розстріляного відродження".'
  - '[!epistemic-humility] Чи був Курбас "радянським митцем"? Його ранні роботи шукали точки дотику з революцією, але його філософія завжди була глибоко українською та європейською.'
  - '[!decolonization] Радянська влада знищила Курбаса, але потім намагалася привласнити його спадщину, представивши його як "помилкового" радянського експериментатора, а не як носія незалежної української культури.'
  section: 'Конфліктна карта: Реформатор чи "націоналіст"?'
  words: 900
- points:
  - 'Народження у Самборі в акторській родині: театр як доля і спадковість.'
  - 'Навчання у Віденському та Львівському університетах: занурення в європейську філософію, психологію та театральний модернізм.'
  - Вплив Фройда, експресіонізму та символізму на формування унікального режисерського бачення.
  - 'Перші театральні експерименти у Львові та Гуцульському театрі: пошук нового сценічного синтезу слова, руху та музики.'
  section: 'Формування: Від Відня до Києва'
  words: 1000
- points:
  - 'Заснування «Молодого театру» в Києві (1916): маніфест проти етнографізму та побутовізму.'
  - 'Створення театру-студії «Березіль» у Харкові: лабораторія нового українського театру.'
  - 'Революційні постановки: «Газ», «Джіммі Гіггінз», «Народний Малахій» — синтез конструктивізму, експресіонізму та глибокого психологізму.'
  - Театральна система «перетворення» та виховання «актора-філософа» — актор не грає, а "є" на сцені, мислить і створює образ.
  section: 'Діяльність: Театри "Молодий" і "Березіль"'
  words: 1300
- points:
  - '[!anti-hagiography] Конфлікт навколо вистави «Народний Малахій» за п''єсою Миколи Куліша. Курбас проти Хвильового — зіткнення двох титанів щодо шляхів розвитку української культури.'
  - Чи був театр Курбаса занадто елітарним та відірваним від масового глядача? Критика з боку опонентів.
  - Компроміси з радянською владою на ранньому етапі. Спроба знайти місце для авангардного мистецтва в тоталітарній системі — і неминучість поразки.
  - '[!myth-buster] Курбас не був просто "жертвою". Він був активним бійцем на культурному фронті, який свідомо йшов на ризик, захищаючи право українського мистецтва на самовизначення.'
  section: 'Тінь: Конфлікт з Хвильовим та ціна авангарду'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому революція Курбаса була приречена в умовах сталінізму.'
  - '[!decolonization] Реабілітація Курбаса в СРСР була частковою — його повертали в пантеон, але як "радянського" митця, замовчуючи антиколоніальний вимір його творчості.'
  - Спадщина Курбаса в кіно (Параджанов), театрі (Жолдак, сучасні режисери) та культурі. Його ідеї виявилися живішими за його вбивць.
  - 'Сучасна актуальність: чому сьогоднішній український театр знову звертається до ідей Курбаса в пошуках нової ідентичності?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Лесь Курбас як найвпливовіший український режисер XX століття, його театральна революція від етнографізму до авангарду, та його трагічна доля в умовах тоталітаризму
