- Оцінювати новаторські ідеї Курбаса (система «перетворення», філософія «актора-філософа») у контексті європейського модернізму
- Критично аналізувати конфлікт між театром корифеїв та авангардом Курбаса, а також суперечливі інтерпретації його постаті
- Простежувати трагічну долю митця в умовах тоталітарного режиму та аналізувати його спадщину в сучасному українському мистецтві
