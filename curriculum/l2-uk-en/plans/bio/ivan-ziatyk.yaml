content_outline:
- points:
  - >-
    [!biography] Життя Івана Зятика: народження у селі Одрехова, шлях єромонаха-редемпториста
    та викладача догматичного богослов'я.
  - >-
    Вступ до теми: як інтелектуальна та пастирська праця стала мішенню радянської
    системи після ліквідації ієрархії.
  section: Розминка
  words: 400
- points:
  - >-
    Освітня та адміністративна праця: професор у семінарії в Голоску (1937),
    настоятель монастирів у Тернополі та Збоїськах.
  - >-
    [!anti-hagiography] Іван Зятик не був лише "жертвою", він був адміністратором
    та вчителем, на якому трималася освіта редемптористів.
  - >-
    Відповідальність лідера: отримання повноважень протоігумена (вікарія) після
    депортації бельгійського настоятеля Йосифа де Вохта у 1948 році.
  section: 'Діяльність: Від викладача до протоігумена'
  words: 1000
- points:
  - >-
    Концентрація редемптористів у Голоску та Уневі. Зростання тиску МДБ з вимогою
    відмовитися від католицтва на користь контрольованого державою православ'я.
  - >-
    [!decolonization] Арешт (січень 1950) та вирок. Використання статей 54-1'а і 54-10 —
    звинувачення в "антирадянській агітації". Свідчення очевидців про відмову Зятика: "Ні! Цього я не зроблю".
  - >-
    [!epistemic-humility] Заслання до Озерлагу. Розбіжність між радянськими медичними
    документами (міокардит, цироз) та свідченнями про жорстоке побиття і залишення на
    морозі. Смерть 17 травня 1952 року в тюремній лікарні.
  section: 'Тінь: Арешт, допити та Озерлаг'
  words: 1600
- points:
  - >-
    Пам'ять редемптористів: збереження свідчень про його мучеництво попри
    відсутність архівних текстів самого Зятика з табору.
  - >-
    Визнання: беатифікація як акт Церкви під час візиту Папи Івана Павла II до Львова (2001).
  section: 'Підсумок: Професор, що став мучеником'
  words: 1000
