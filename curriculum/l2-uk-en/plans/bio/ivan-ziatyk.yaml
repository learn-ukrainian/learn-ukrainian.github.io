content_outline:
- points:
  - >-
    [!biography] Іван Зятик (1899, Одрехово біля Сянка, нині Польща): редемпторист,
    професор догматичного богослов'я та Писання.
  - >-
    Провокаційне питання: чому радянська система переслідувала викладача семінарії,
    а не лише «політичного діяча»?
  section: Розминка
  words: 400
- points:
  - >-
    Новиціат (1935); монастир Матері Божої Неустанної Допомоги в Станиславові (1936);
    професор у семінарії в Голоску (1937).
  - >-
    Настоятель монастирів Успіння в Тернополі (1941–1944) і Неустанної Допомоги в
    Збоїщах (1944–1946), де діяла гімназія-ювенат.
  - >-
    [!decolonization] Географія: село в Галичії Австро-Угорщини; сучасні кордони
    пояснюємо явно, без проекції сучасних ідентичностей на 1899 рік.
  section: 'Формування: Новиціат, семінарія та настоятельство'
  words: 1000
- points:
  - >-
    Весна 1946: концентрація редемптористів у Голоску під наглядом; переведення в
    Унів (17 жовтня 1948); регулярні перевірки, тиск відмовитися від покликання.
  - >-
    [!anti-hagiography] Після депортації бельгійського настоятеля Йосифа де Вохта
    (1948) — повноваження вікарія/протоігумена: адміністратор і вчитель, не лише
    «жертва системи».
  - >-
    Арешт (5 січня 1950); ордер МДБ (20 січня 1950); вирок у Києві (21 листопада
    1951) — 10 років; призначений табір — Озерлаг №7 (Братськ, Іркутська область).
  section: 'Діяльність: Професор і протоігумен'
  words: 1200
- points:
  - >-
    [!decolonization] Статті 20-54-1'a і 54-10 ч. 2 КК УРСР: «сприяння учасникам
    антирадянської націоналістичної організації» та «антирадянська агітація» —
    цитуємо як обвинувачення, не як факт.
  - >-
    Свідчення Ярослава Юрчака (УГКЦ): відмова підписати перехід у православ'я — «Ні!
    Цього я не зроблю»; під загрозою родичів — «Божа воля»; [!epistemic-humility]
    записане мовлення свідка, не автограф Зятика.
  - >-
    Побиття, обливання водою, мороз; смерть у тюремній лікарні Озерлагу (17 травня
    1952). Радянська медична формула (міокардит, цироз тощо) — частина справи, не
    виправдання насильства.
  section: 'Тінь: Арешт, Озерлаг і тюремна лікарня'
  words: 1600
- points:
  - >-
    Пам'ять чину редемптористів і процес беатифікації; власні письма Зятика в
    наявних джерелах цього досьє не знайдені.
  - >-
    Беатифікація як акт Католицької церкви (27 червня 2001, Львів, Папа Іван Павло II).
  - >-
    Сучасне значення: інтелектуальне й адміністративне лідерство УГКЦ у підпіллі
    та механізм табірного знищення.
  section: 'Підсумок: Професор, що став мучеником'
  words: 1000
focus: >-
  Іван Зятик як викладач-редемпторист, протоігумен та жертва сталінського ГУЛАГу.
  Дослідження його лідерства після ліквідації легальних структур церкви та
  механізмів табірного знищення через призму радянських кримінальних справ.
