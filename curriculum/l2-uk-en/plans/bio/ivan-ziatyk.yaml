objectives:
- Розуміти внесок Івана Зятика в богословську освіту та керівництво чином редемптористів.
- Аналізувати стратегію радянської влади зі знищення та концентрації чернечих згромаджень.
- Досліджувати радянський механізм репресій через порівняння табірних медичних документів та свідчень очевидців.
- Оцінювати стійкість церковних лідерів перед вимогою примусового переходу під контроль держави.
