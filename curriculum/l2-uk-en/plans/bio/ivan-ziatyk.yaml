content_outline:
- points:
  - >-
    [!biography] Іван Зятик (1899, Одрехово біля Сянка, нині Польща): редемпторист,
    професор догматичного богослов'я та Писання.
  - >-
    Провокаційне питання: чому радянська система переслідувала викладача семінарії,
    а не лише «політичного діяча»?
  section: Розминка
  words: 400
- points:
  - >-
    Новиціат (1935); монастир Матері Божої Неустанної Помочі в Станиславові (1936);
    професор у семінарії в Голоску (1937).
  - >-
    Настоятель монастирів Успіння в Тернополі (1941–1944) і Матері Божої Неустанної Помочі в
    Збоїщах (1944–1946), де діяла гімназія-ювенат.
  - >-
    [!decolonization] Географія: село в Галичії Австро-Угорщини; сучасні кордони
    пояснюємо явно, без проекції сучасних ідентичностей на 1899 рік.
  section: 'Формування: Новиціат, семінарія та настоятельство'
  words: 1000
- points:
  - >-
    Весна 1946: концентрація редемптористів у Голоску під наглядом; переведення в
    Унів (17 жовтня 1948); регулярні перевірки, тиск відмовитися від покликання.
  - >-
    [!anti-hagiography] Після депортації настоятеля Йосифа де Вохта:
    [S1]/[S2] датують переведення з Голоска до Унева 17 жовтня 1948 і
    далі лише «невдовзі» депортували де Вохта (на [S1]/[S2] — депортація
    до Бельгії, без заяви про національність); [S5] (ЕСУ) окремо датує
    депортацію де Вохта 1948 роком. Два окремі атрибутовані кроки в спільній
    церковній біографії [S1]/[S2] (дублікат/передрук, не незалежні свідки):
    [S1] — Сліпий призначив чотирьох вікаріїв (серед них де Вохт); окремо —
    від'їжджаючи, де Вохт передав повноваження / наступництво; [S2] — де Вохт
    передав повноваження Зятику; [S5] — Зятик отримав повноваження після
    депортації де Вохта. Не автоматичне правило «іноземець → місцевий»;
    адміністратор і вчитель, не лише «жертва системи».
  - >-
    Арешт (5 січня 1950); ордер МДБ (20 січня 1950); вирок у Києві (21 листопада
    1951) — 10 років; місце ув'язнення — Озерлаг. [S1]/[S2] передають формулювання
    «виправно-трудова колонія Озерний Лагер № 7 МВД м. Братська Іркутської області»
    лише як атрибутоване вторинне церковне формулювання, не як повну інституційну
    класифікацію й не як незалежно перевірену точну локацію; пакет не зводить
    Озерлаг до однієї колонії чи однієї точки.
  section: 'Діяльність: Професор і протоігумен'
  words: 1200
- points:
  - >-
    [!decolonization] Статті 20-54-1'а і 54-10 ч. 2 КК УРСР: «сприяння учасникам
    антирадянської націоналістичної організації» та «антирадянська агітація» —
    цитуємо як обвинувачення, не як факт; листування й матеріальна допомога в
    джерелі — теж твердження обвинувачення, без категоричної «невинності».
  - >-
    Свідчення Ярослава Юрчака (УГКЦ, вторинний церковний переказ на [S1]): одна
    відмова підписати перехід у православ'я — «Ні! Цього я не зроблю»; під
    загрозою родичів — «Божа воля»; [!epistemic-humility] записане мовлення
    свідка, не автограф Зятика і не загальне правило згоди.
  - >-
    Побиття, обливання водою, мороз (церковне свідчення). Два окремі твердження
    [S1]/[S2], не зливати в «тюремну лікарню Озерлагу» як незалежно
    перевірену локацію: (а) атрибутоване вторинне церковне формулювання про
    місце ув'язнення — «виправно-трудова колонія Озерний Лагер № 7 МВД
    м. Братська…»; (б) смерть у тюремній лікарні 17 травня 1952 [S1]. П'ять
    діагнозів медичної формули (міокардит, артеріосклероз, цироз, плеврит,
    кахексія) — нейтрально як вторинна церковна транскрипція заявленої
    офіційної причини («Згідно з документами МВД СССР»), без дискредитації чи
    судово-медичної оцінки; тортури — окрема атрибуція.
  section: 'Тінь: Арешт, Озерлаг і тюремна лікарня'
  words: 1600
- points:
  - >-
    Пам'ять чину редемптористів і процес беатифікації; зіставлення церковного
    та академічного біографічних наративів.
  - >-
    Беатифікація як акт Католицької церкви (27 червня 2001, Львів, Папа Іван Павло II).
  - >-
    Сучасне значення: інтелектуальне й адміністративне лідерство УГКЦ у підпіллі;
    ув'язнення з двома окремо атрибутованими рівнями — вторинна церковна
    транскрипція заявленої офіційної медичної причини та церковне свідчення про
    катування — без узагальненого причинного «механізму» знищення.
  section: 'Підсумок: Професор, що став мучеником'
  words: 1000
focus: >-
  Іван Зятик як викладач-редемпторист, протоігумен та в'язень із атрибутованим
  місцем ув'язнення (Озерлаг; [S1]/[S2] — вторинне церковне формулювання про
  виправно-трудову колонію, без узагальненої інституційної «системи»).
  Дослідження його лідерства після передачі повноважень і депортації настоятеля та
  ув'язнення через два окремо атрибутовані рівні: вторинну церковну транскрипцію
  заявленої офіційної медичної причини та церковне свідчення про катування —
  без узагальненої «стратегії ліквідації» чи причинного «механізму» знищення.
