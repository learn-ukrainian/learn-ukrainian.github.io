objectives:
- Розуміти внесок Івана Зятика в богословську освіту та керівництво чином редемптористів.
- >-
  Аналізувати джерельно обмежені заяви про концентрацію редемптористів і тиск
  (1946; Голоско → Унів 17 жовтня 1948) без узагальненої «стратегії знищення
  згромаджень».
- >-
  Досліджувати ув'язнення Зятика, тримаючи нарізно два атрибутовані рівні:
  вторинну церковну транскрипцію заявленої офіційної медичної причини та
  церковне свідчення про катування — без злиття в загальний причинний механізм.
- >-
  Оцінювати одну атрибутовану сцену відмови підписати перехід (Юрчак на [S1])
  і окремо атрибутовані свідчення тиску — без загальної «вимоги переходу під
  контроль держави».
