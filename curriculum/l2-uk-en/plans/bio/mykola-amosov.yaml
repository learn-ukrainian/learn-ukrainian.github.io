content_outline:
- points:
  - 'Парадокс Амосова: як елітний кардіохірург, що працював з найскладнішою технікою, став пророком простих істин — присідань
    та обмежень в їжі, які мали мільйонні наклади?'
  - '[!biography] Амосов — один з небагатьох науковців, чиє ім''я стало справжнім брендом, символом надії для мільйонів і
    водночас об''єктом для суперечок.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хірург vs Філософ. Чи була його популярна філософія здоров''я логічним продовженням наукової роботи, чи, навпаки,
    її спрощенням, що дратувало академічних колег?'
  - 'Дебат 2: Радянська людина vs Індивідуаліст. Як його ідеї про особисту відповідальність за здоров''я вписувались у колективістську
    ідеологію СРСР, де здоров''я громадян було "державною справою"?'
  - '[!epistemic-humility] Одні бачили в його книгах геніальну профілактичну медицину, інші — небезпечну самодіяльність та
    звинувачення жертви (victim blaming) в умовах недосконалої системи охорони здоров''я.'
  section: 'Конфліктна карта: Науковець чи популяризатор?'
  words: 900
- points:
  - 'Походження та освіта: народжений в Росії, Амосов здобув інженерну та медичну освіту, що визначило його унікальний "кібернетичний"
    погляд на організм.'
  - 'Випробування війною: тисячі операцій у польових шпиталях під час Другої світової війни сформували його як хірурга, що
    цінує надійність, ефективність та сміливість рішень.'
  - 'Відточування майстерності: досвід роботи з величезною кількістю травм в умовах обмежених ресурсів навчив його мислити
    системно і шукати нетривіальні рішення.'
  section: 'Формування: Польовий хірург'
  words: 1000
- points:
  - 'Переїзд до Києва: Амосов очолив клініку, яка під його керівництвом перетворилася на провідний світовий центр — Національний
    інститут серцево-судинної хірургії.'
  - 'Інженер на службі медицини: розробка та впровадження перших в СРСР апаратів штучного кровообігу та створення штучних
    клапанів серця.'
  - 'Науковий прорив: піонерські дослідження в галузі медичної кібернетики та застосування штучного інтелекту для діагностики
    серцевих захворювань.'
  section: 'Діяльність: Створення київської школи кардіохірургії'
  words: 1300
- points:
  - '[!anti-hagiography] Жорсткість системи: чи не була його "система обмежень та навантажень" занадто ригідною та придатною
    лише для людей з його власною залізною волею?'
  - '[!myth-buster] Останній експеримент: його спроба побороти старість за допомогою екстремальних фізичних навантажень. Це
    був науковий подвиг чи трагічна ілюзія вченого, який відмовився прийняти власну смертність?'
  - 'Кібернетичний редукціонізм: критики вказували, що, розглядаючи людину як складну машину, Амосов ігнорував психологічні
    та духовні аспекти здоров''я.'
  - 'Авторитарний стиль: якою ціною досягався успіх в його інституті? Легенди про його вимогливість та безкомпромісність ходять
    і досі.'
  section: 'Тінь: Експеримент над собою'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Амосов — технократом-хірургом чи гуманістом-філософом? Студент формулює власну відповідь,
    спираючись на факти з модуля.'
  - '[!decolonization] Амосов, росіянин за походженням, став одним із символів української науки та Києва. Як відбулася ця
    трансформація і що вона говорить про українську ідентичність?'
  - 'Дві спадщини: з одного боку — інститут його імені, тисячі врятованих життів і всесвітньо відома хірургічна школа. З іншого
    — його книги та ідеї, що стали частиною масової культури здоров''я.'
  - 'Амосов у XXI столітті: наскільки його поради актуальні в епоху біохакінгу, генетичних тестів та персоналізованої медицини?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The dual legacy of Mykola Amosov as a pioneer cardiac surgeon and a public health philosopher, exploring his innovations
  in medicine, his cybernetic approach to the human body, and his bestselling wellness system.
level: BIO
module: bio-127
objectives:
- Критично аналізувати подвійну спадщину Миколи Амосова як кардіохірурга-новатора та як філософа здорового способу життя
- Оцінювати внесок Амосова в розвиток медицини в контексті радянської науки та його унікальний "кібернетичний" підхід
- Розрізняти наукові досягнення та популяризаторську діяльність, аналізуючи їх взаємовплив
- Формулювати власну позицію щодо суперечливих аспектів його біографії, зокрема ідеї особистої відповідальності та експериментів
  над собою
