content_outline:
- points:
  - >-
    [!biography] Знайомство з Веніаміном Кушніром: живописець, педагог, активний учасник
    правозахисного руху та руху шістдесятників.
  - >-
    Провокаційне питання: як досліджувати історичні та шевченківські мотиви, не оголошуючи
    кожну назву картини політичним протестом без аналізу самого твору?
  section: Розминка
  words: 400
- points:
  - >-
    Народився 7 січня 1926 року в селі Купин за ЕСУ; Бібліотека українського
    мистецтва подає село Рудка, тому розбіжність місця народження лишається
    відкритою.
  - >-
    Освіта: навчання у Львівському інституті прикладного та декоративного мистецтва
    (викладачі Й. Бокшай, І. Гуторов, Р. Сельський). Переїзд до Києва у 1956 році.
  - >-
    ЕСУ називає станковий живопис і монументально-декоративне мистецтво паралельними
    основними галузями творчості; прийняті джерела не визначають жодного названого
    твору як конкретну монументальну роботу.
  - >-
    Звернення до історичних та фольклорних мотивів: "Б. Хмельницький із військом",
    "Дума про О. Довбуша", "Плотогони", "Кобза".
  - >-
    [!decolonization] Народні джерела належать до сучасної української мистецької мови;
    їхню можливу опозиційність встановлюють за твором, а не проголошують за назвою.
  section: 'Формування: Історія та фольклор у живописі'
  words: 1000
- points:
  - >-
    Громадська діяльність: організатор та голова художньої секції Клубу творчої
    молоді "Сучасник" у Києві.
  - >-
    Правозахисний рух: активне поширення та розмноження забороненого самвидаву.
  - >-
    Громадянська позиція в мистецтві: алюзії на шевченківські тексти у назвах полотен
    ("Апостол Правди", "Та не однаково мені...").
  section: 'Діяльність: Клуб «Сучасник» і самвидав'
  words: 1200
- points:
  - >-
    [!myth-buster] Художник не був ув'язнений, але зазнав жорсткого ідеологічного
    цькування, переслідувань і професійної маргіналізації з боку влади.
  - >-
    Розкриття підтвердженого механізму тиску 1970-х: ЕСУ фіксує цькування й
    переслідування, а Бібліотека українського мистецтва — пильний контроль та
    тривале усамітнення; конкретних наказів про закриття виставок джерела не подають.
  - >-
    «Скерцо. Зґвалтована Україна» (1979): жорстка назва є перевіреним фактом,
    але візуальний зміст і авторський задум не відновлюють без репродукції та каталогу.
  section: 'Тінь: Цькування та творча ізоляція'
  words: 1600
- points:
  - >-
    Збереження спадщини: ЕСУ фіксує посмертні виставки та музейні зібрання, але
    ці дані не доводять повноти каталогу й не дають прав на репродукції.
  - >-
    Веніамін Кушнір помер 19 червня 1992 року в Києві (ЕСУ).
  - >-
    [!anti-hagiography] Уникнення спрощень: Кушнір — не допоміжне ім'я
    шістдесятництва, а самостійний художник і громадський діяч.
  - >-
    Сучасне осмислення ролі митця: як відрізняти живописний доробок, участь у клубі
    та поширення самвидаву, не зливаючи їх у єдину декларацію.
  section: 'Підсумок: Повернення із забуття'
  words: 1000
