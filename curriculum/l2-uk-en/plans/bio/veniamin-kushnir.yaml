content_outline:
- points:
  - >-
    [!biography] Знайомство з Веніаміном Кушніром: живописець, педагог, активний учасник
    правозахисного руху та руху шістдесятників.
  - >-
    Провокаційне питання: як історичний живопис та цитування Тараса Шевченка стали
    викликом офіційній радянській ідеології?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта: навчання у Львівському інституті прикладного та декоративного мистецтва
    (викладачі Й. Бокшай, І. Гуторов, Р. Сельський). Переїзд до Києва у 1956 році.
  - >-
    Звернення до історичних та фольклорних мотивів: "Б. Хмельницький із військом",
    "Дума про О. Довбуша", "Плотогони", "Кобза".
  - >-
    [!decolonization] Використання народних джерел не як етнографічної декорації,
    а як способу протистояння русифікованій радянській уніформності.
  section: 'Формування: Історія та фольклор у живописі'
  words: 1000
- points:
  - >-
    Громадська діяльність: організатор та голова художньої секції Клубу творчої
    молоді "Сучасник" у Києві.
  - >-
    Правозахисний рух: активне поширення та розмноження забороненого самвидаву.
  - >-
    Громадянська позиція в мистецтві: алюзії на шевченківські тексти у назвах полотен
    ("Апостол Правди", "Та не однаково мені...").
  section: 'Діяльність: Від монументалізму до самвидаву'
  words: 1200
- points:
  - >-
    [!myth-buster] Художник не був ув'язнений, але зазнав жорсткого ідеологічного
    цькування, переслідувань і професійної маргіналізації з боку влади.
  - >-
    Розкриття механізму репресій 1970-х: закриття виставок, витіснення з публічного
    культурного простору, тривала ізоляція.
  - >-
    Радикалізація візуальної мови під тиском: створення відверто політичного полотна
    "Скерцо. Зґвалтована Україна" (1979).
  section: 'Тінь: Цькування та творча ізоляція'
  words: 1600
- points:
  - >-
    Збереження спадщини: картини вижили завдяки родині та пізнішим посмертним виставкам.
  - >-
    [!anti-hagiography] Уникнення спрощень: Кушнір — це не лише допоміжне ім'я
    шістдесятництва, а самостійний потужний художник і громадський діяч.
  - >-
    Сучасне осмислення ролі митця: як живопис доповнював правозахисний опір в Україні.
  section: 'Підсумок: Повернення із забуття'
  words: 1000
