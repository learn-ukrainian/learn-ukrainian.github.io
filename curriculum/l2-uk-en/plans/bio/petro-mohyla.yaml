content_outline:
- points:
  - 'Парадокс: Як Петро Могила, використовуючи "католицькі" латинські інструменти, зміг не лише захистити, а й модернізувати
    українське Православ''я?'
  - Він був аристократом, що не знав української мови до зрілого віку, але став архітектором української ідентичності на століття
    вперед.
  - '[!biography] Постать Могили — ключ до розуміння українського бароко та інтелектуального опору Речі Посполитій.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники Могили): Чи не є його реформи "троянським конем" католицизму? Критика з боку консервативних православних
    кіл (Ісая Копинський) проти аргументів про необхідність "воювати з ворогом його ж зброєю".'
  - 'Дебат 2 (сучасна історіографія): Могила — "батько української нації" чи "агент вестернізації", що віддалив українську
    церкву від східних коренів? Російська імперська версія приписувала його заслуги Москві, сучасна українська — бачить у
    ньому творця окремої інтелектуальної традиції.'
  - '[!epistemic-humility] Оцінка Могили залежить від оптики: для одних він — рятівник, для інших — реформатор, що зайшов
    занадто далеко. Обидві позиції мають свої аргументи.'
  - '[!decolonization] Розгляд Могили поза російською парадигмою "возз''єднання" — як творця незалежного київського інтелектуального
    центру.'
  section: 'Конфліктна карта: Латинізація чи модернізація?'
  words: 900
- points:
  - 'Походження та освіта: син молдовського господаря, вихований у Речі Посполитій, освіта в європейських університетах. Як
    цей досвід сформував його світогляд?'
  - 'Військова кар''єра: участь у Хотинській битві 1621 року. Чому воїн вирішив стати ченцем?'
  - 'Обрання архімандритом Лаври: боротьба за владу, консолідація ресурсів та підготовка до великих реформ.'
  - 'Історичний контекст: православна церква після Берестейської унії — в стані глибокої кризи, без еліти та освітніх інституцій.
    Могила побачив не загрозу, а можливість.'
  section: 'Формування: Від молдовського княжича до київського митрополита'
  words: 1000
- points:
  - 'Заснування Києво-Могилянського колегіуму (1632): створення першого православного вищого навчального закладу за єзуїтським
    зразком. Навчання латиною, риторика, філософія.'
  - 'Видання "Требника" (1646): кодифікація богослужбових текстів, очищення від помилок та встановлення єдиного стандарту.
    Це була не просто книга, а інструмент уніфікації церкви.'
  - 'Створення "Православного сповідання віри": відповідь на протестантські та католицькі доктрини. Формулювання основ православного
    богослов''я, яке визнали всі східні патріархи.'
  - 'Реставрація святинь: відбудова Святої Софії та Десятинної церкви як символ відновлення величі Києва та його церкви.'
  section: 'Діяльність: Освіта як зброя'
  words: 1300
- points:
  - '[!anti-hagiography] Могила був жорстким і безкомпромісним адміністратором. Усунення опонентів, як-от Ісая Копинський,
    було швидким і не завжди канонічним.'
  - 'Богословські компроміси: у боротьбі з протестантизмом Могила запозичив багато католицьких теологічних концепцій (напр.,
    чистилище), що викликало звинувачення в "крипто-католицизмі".'
  - '[!myth-buster] Міф про "народного" митрополита. Могила був аристократом, що діяв згори донизу. Його реформи були елітарними
    і не завжди знаходили підтримку серед простого духовенства та вірян.'
  - Створення "вченої дружини" навколо себе призвело до інтелектуального розколу в церкві між "могилянцями" та "традиціоналістами".
  section: 'Тінь: Ціна модернізації'
  words: 900
- points:
  - 'Повернення до розминки: Студент формулює відповідь на парадокс Могили, використовуючи знання про його методи, цілі та
    компроміси.'
  - Спадщина Могили — це не просто Академія. Це створення інтелектуальної еліти, здатної на рівних вести діалог з Європою
    та протистояти Москві. Ця еліта сформувала українську державність часів Хмельниччини.
  - '[!decolonization] Академія стала "інкубатором" української еліти, яка протягом століть зберігала національну ідентичність
    в умовах бездержавності.'
  - 'Сучасне значення: Києво-Могилянська академія, відроджена 1991 року, стала символом повернення України до європейської
    освітньої та інтелектуальної традиції, закладеної Могилою.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and legacy of Petro Mohyla, focusing on his modernization of the Orthodox Church through Western educational
  models, the founding of the Kyiv-Mohyla Collegium, and the resulting cultural and theological controversies.
level: BIO
module: bio-022
objectives:
- Критично аналізувати освітню реформу Петра Могили як стратегію модернізації православної церкви
- Оцінювати аргументи "за" і "проти" латинізації української культури в XVII столітті
- Дослідити вплив Києво-Могилянської академії на формування української еліти та її роль у збереженні ідентичності
- Розрізняти агіографічний та критичний підходи до біографії історичного діяча
