objectives:
- Проаналізувати освітню реформу Петра Могили
- Оцінити стратегію модернізації православної церкви
- Дослідити вплив Академії на формування української еліти
content_outline:
- section: Вступ — Архітектор українського бароко
  points:
  - Могила як символ просвітництва
  - Реформування православної церкви
  - Інтелектуальний опір католицькій експансії
  words: 700
- section: Життєпис
  points:
  - Походження (молдовський княжич)
  - Освіта в Європі
  - Військова кар'єра та Хотинська битва 1621 р.
  - Обрання архімандритом Лаври
  words: 700
- section: Історичний контекст
  points:
  - Контрреформація в Європі
  - Релігійна боротьба в Речі Посполитій
  - Стан православної церкви до Могили
  words: 700
- section: Внесок
  points:
  - Заснування Києво-Могилянського колегіуму 1632 р.
  - Требник та Православне сповідання віри
  words: 700
- section: Останні роки
  points:
  - Реставрація святинь (Свята Софія, Десятинна церква)
  - Вплив на розвиток барокової культури
  - Смерть і заповіт
  words: 700
- section: Спадщина
  points:
  - Київська вченість як інтелектуальний бренд
  - Значення для української освіти
  words: 700
- section: Підсумок
  points:
  - Могила як "батько" українського інтелекту
  words: 800
