content_outline:
- points:
  - 'Парадокс: Як людина, що присвятила життя розбудові правових інститутів, могла творити закони для держави, яка постійно
    зникала?'
  - Микола Василенко — архітектор української юриспруденції, чиї найважливіші проєкти — Конституція УНР та Академія Наук —
    були реалізовані в умовах тотальної політичної нестабільності.
  - '[!biography] Провокаційне питання: чи може право існувати без держави?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Служба в уряді Гетьманату Павла Скоропадського. Це був прагматичний крок для розбудови українських інституцій
    (зокрема, Академії Наук) під німецьким протекторатом, чи форма колабораціонізму з окупаційною владою, що зрадила ідеали
    УНР?'
  - 'Дебат 2: Праця в ВУАН у 1920-х роках. Це була спроба зберегти острівець української науки та культури в радянській системі,
    чи неминучий компроміс, що легітимізував режим, який згодом знищив і саму академію, і її засновників?'
  - '[!epistemic-humility] Оцінки сучасників різнилися: одні бачили в ньому опортуніста, інші — патріота, що використовував
    будь-яку можливість для праці на користь України.'
  - '[!decolonization] Радянська історіографія таврувала його як «буржуазного націоналіста», ігноруючи його внесок у правову
    науку і намагаючись стерти пам''ять про державницькі проєкти 1918 року.'
  section: 'Конфліктна карта: Державник чи колаборант?'
  words: 900
- points:
  - 'Народження в зросійщеній чиновницькій родині на Полтавщині: шлях до української ідентичності через науку.'
  - 'Київський університет Святого Володимира: як вивчення історії Литовсько-Руської держави та права Гетьманщини перетворило
    молодого вченого на українського патріота.'
  - 'Формативний досвід: усвідомлення, що українці мають власну тисячолітню правову традицію, яку імперія століттями намагалася
    знищити.'
  - 'Ранні наукові роботи як політичний акт: доведення історичної тяглості та окремішності українського права.'
  section: 'Формування: Історик права в імперії без права'
  words: 1000
- points:
  - 'Професорська та громадська діяльність до 1917 року: Василенко як центральна фігура української інтелігенції Києва.'
  - 'Революційний 1918 рік: призначення міністром освіти в уряді Скоропадського. Реформа освітньої системи, українізація шкіл
    та університетів.'
  - 'Magnum Opus: Заснування Української академії наук (УАН, пізніше ВУАН) разом з Вернадським та іншими вченими. Створення
    наукового центру, незалежного від Москви.'
  - 'Падіння Гетьманату: крах державних сподівань та відставка, але Академія продовжує існувати.'
  section: 'Діяльність: Архітектор інституцій'
  words: 1300
- points:
  - '[!anti-hagiography] Робота в ВУАН у 1920-х роках вимагала постійних компромісів із радянською владою. Чи можна було зберегти
    наукову доброчесність в умовах ідеологічного тиску?'
  - Арешти та звинувачення у «контрреволюційній діяльності». Справа «Спілки визволення України» (СВУ) як інструмент терору
    проти старої інтелігенції.
  - Домашній арешт, позбавлення посад, фактична заборона на наукову працю. Трагедія вченого, відрізаного від його творіння
    — Академії.
  - '[!myth-buster] Міф про те, що «аполітичні» вчені могли спокійно працювати в СРСР у 1920-30-ті роки. Доля Василенка доводить,
    що нейтралітет був неможливий, і система знищувала навіть лояльних.'
  section: 'Тінь: Компроміс і репресії'
  words: 900
- points:
  - 'Повернення до розминки: спадщина Василенка — це не лише писані ним закони, а сама ідея тяглості української правової
    культури.'
  - '[!decolonization] Посмертна реабілітація в СРСР була частковою і замовчувала його роль як державного діяча УНР та Гетьманату.
    Повне повернення його імені стало можливим лише після 1991 року.'
  - 'Спадщина сьогодні: заснована ним Академія Наук існує досі. Його праці з історії права стали фундаментом для сучасної
    української юриспруденції.'
  - 'Фінальне питання: чи є трагедія Василенка — доля будь-якого інтелектуала, що намагається будувати інституції під час
    революцій та воєн?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Mykola Vasylenko: a legal historian who became Minister of Education in the Hetmanate, co-founded the Ukrainian Academy
  of Sciences, and navigated the treacherous political landscape of the early Soviet period, ultimately facing repression.'
