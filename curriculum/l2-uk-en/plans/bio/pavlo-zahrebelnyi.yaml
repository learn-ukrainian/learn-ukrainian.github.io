content_outline:
- points:
  - >-
    [!biography] Павло Загребельний: романіст, редактор, сценарист і керівник
    письменницьких інституцій, який дав масовому читачеві Київську Русь,
    Софію Київську, Роксолану і Богдана Хмельницького як живі сюжетні світи.
  - >-
    Провокаційне питання: як людина, що пережила війну, полон і підозру до
    колишніх військовополонених, згодом стала впливовим інсайдером радянського
    літературного поля?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 25 серпня 1924 року в Солошиному на Полтавщині. Після школи
    1941 року добровільно пішов на фронт, був поранений, повернувся до війська,
    знову був поранений 1942 року і до 1945 року перебував у німецькому полоні
    та таборах.
  - >-
    [!epistemic-humility] Джерела розходяться в деталях: одна енциклопедична
    стаття формулює ширше про німецькі й радянські концтабори, тоді як УІНП
    наголошує, що сталінських таборів він уникнув, але довго ніс стигму
    колишнього військовополоненого. У семінарі треба чітко відділяти певне від
    спірного.
  - >-
    Після війни — філологія в Дніпропетровському університеті, журналістика,
    редакторська робота у «Вітчизні» та «Літературній Україні». Досвід
    підозри і редакційної влади пізніше зійдуться в його складній публічній ролі.
  section: 'Формування: Фронт, полон і післявоєнна підозра'
  words: 1000
- points:
  - >-
    «Диво» (1968) відкриває великий історичний поворот: Софія Київська поєднує
    одинадцяте століття, воєнний час і сучасність, а питання мистецтва стає
    питанням влади, пам'яті й людської гідності.
  - >-
    Києворуський цикл — «Первоміст», «Смерть у Києві», «Євпраксія» — виводить
    українського читача до княжої історії без російсько-імперського присвоєння
    Києва як «передмови» до Москви.
  - >-
    «Роксолана» (1980) потребує обережного читання: не тріумфальна казка про
    «українку, що перемогла імперію», а роман про полон, гендерну владу, двір,
    виживання, міфотворення і джерельні обмеження.
  - >-
    «Я, Богдан» (1983) — монолог-сповідь про Хмельницького. Його треба читати
    поруч із критикою радянської теми «возз'єднання народів», яка тиснула на
    інтерпретацію історії.
  section: 'Діяльність: Софія, Роксолана і Богдан як масова історична уява'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Загребельний був не лише автором історичних романів, а й
    головним редактором, секретарем і першим секретарем Спілки письменників,
    головою Шевченківського комітету та депутатом радянських представницьких
    органів.
  - >-
    Інституційна позиція означала компроміси: частина творів входила в офіційні
    рамки, а «Я, Богдан» не можна відділити від ідеологічного тиску на тему
    українсько-московських зв'язків.
  - >-
    Водночас джерела фіксують його підтримку шістдесятників: за спогадом Івана
    Драча, Загребельний давав роботу і сторінку молодим авторам, які вже
    відчували тиск системи.
  - >-
    [!myth-buster] Не слід робити з нього ані підпільного дисидента, ані
    плаского апаратника. Його біографія вчить бачити, як офіційна культура могла
    водночас обмежувати, давати ресурси і створювати простір для часткового
    розширення української пам'яті.
  section: 'Тінь: Інституційна влада, компроміс і радянські рамки'
  words: 1500
- points:
  - >-
    Після 1991 року він писав пізню прозу й публіцистику, а його історичні
    романи продовжили працювати як масові входи до київської, княжої,
    козацької та османсько-української тематики.
  - >-
    [!decolonization] Перейменування київської вулиці на честь Загребельного
    2022 року показує сучасну політику пам'яті: постать складного радянського
    інсайдера може ставати частиною дерусифікації, але це не скасовує потреби
    читати його компроміси.
  - >-
    Смерть 3 лютого 2009 року в Києві і поховання на Байковому кладовищі
    завершують біографію, але не закривають головної навчальної задачі: тримати
    разом воєнну травму, інституційну владу, художню силу і політичні обмеження.
  section: 'Підсумок: Складний канон і пам''ять після дерусифікації'
  words: 1000
focus: >-
  Павло Загребельний як автор великих історичних романів і водночас діяч
  радянських літературних інституцій. Семінар аналізує його фронтовий і
  полонений досвід, післявоєнну стигму, «Диво», «Роксолану», «Я, Богдан»,
  підтримку молодших письменників і межі компромісу всередині офіційної культури.
