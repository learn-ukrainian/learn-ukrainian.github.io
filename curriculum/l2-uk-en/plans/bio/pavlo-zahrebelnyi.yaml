objectives:
- >-
  Пояснювати, як воєнний досвід, полон і післявоєнна підозра впливають на
  розуміння біографії Загребельного.
- >-
  Аналізувати «Диво», «Роксолану» і «Я, Богдан» як історичні романи, що
  водночас відкривали українську пам'ять і працювали в радянських рамках.
- >-
  Критично оцінювати інституційну роль Загребельного без спрощення до образу
  дисидента або апаратника.
- >-
  Розрізняти певні й спірні джерельні твердження про полон, табори та
  післявоєнний тиск.
