content_outline:
- points:
  - >-
    [!biography] Знайомство з Олексою Воропаєм (1913–1989): етнограф і свідок голодомору.
    Провокаційне питання: чи може звичай бути основою нації без держави?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 9 листопада 1913 року в Одесі; ЕСУ засвідчує смерть матері під
    час Голодомору, але перевірений пакет не уточнює назви села.
  - >-
    [!decolonization] Досвід дільничного агронома на Вінниччині та свідчення про
    Голодомор; переміщення на Захід 1944 року подається без вигаданої мотивації.
  - >-
    Еміграція до Великобританії (1948).
  section: 'Формування: Одеса і Голодомор'
  words: 1000
- points:
  - >-
    «Звичаї нашого народу», том 1 (1958) і том 2 (1966), — етнографічний нарис
    про календарні та родинні практики. Прийнятий каталог підтверджує для першого
    тому Мюнхен, Українське Видавництво, 1958 рік і обсяг 309 сторінок, але не
    містить локатора вступного матеріалу.
  - >-
    ЕСУ датує «В дев'ятім крузі» 1952 роком, а британська біографічна довідка
    фіксує лондонське видання 1953 року; джерельну розбіжність зберігаємо.
  - >-
    ЕСУ окремо подає псевдоніми Олексій Іванович та Олекса Степовий; вони не
    замінюють канонічного імені Олекса Воропай.
  section: 'Діяльність: Звичаї нашого народу'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Нарис слід читати як авторський добір і систематизацію,
    а не як повний або позачасовий опис усіх українців. Значення збереження
    матеріалу не скасовує потреби перевіряти походження кожного прикладу.
  - >-
    ЕСУ засвідчує смерть матері Воропая під час Голодомору, а британська
    біографія пов'язує його досвід на Вінниччині з книжкою «В дев'ятім крузі»;
    точного села прийняті джерела не називають.
  - >-
    [!epistemic-humility] Прийняті джерела називають 9 листопада 1913 року;
    неприкріплені варіанти дати до уроку не додаємо.
  section: 'Тінь: Голодомор і межі свідчення'
  words: 1600
- points:
  - >-
    Смерть 20 липня 1989 року в Лідсі; поховання у Ведербі.
  - >-
    Приблизно 10 перевидань «Звичаїв» у незалежній Україні (1991–2013).
  - >-
    Свідчення про Голодомор як акт пам'яті про загибель матері під час голоду.
  section: 'Підсумок: Пам''ять в еміграції'
  words: 1000
focus: >-
