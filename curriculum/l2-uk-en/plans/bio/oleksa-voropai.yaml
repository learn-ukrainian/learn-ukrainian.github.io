content_outline:
- points:
  - >-
    [!biography] Знайомство з Олексою Воропаєм (1913–1989): етнограф і свідок голодомору.
    Провокаційне питання: чи може звичай бути основою нації без держави?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 9 листопада 1913 року у Одесі; мати загинула від голодомору 1933 року у селі Надлак, Херсонщина.
    [!decolonization] Свідок голодомору як дільничний агроном у Вінницькій області; відмова повернутися до СРСР.
    Еміграція до Великобританії (1948).
  section: 'Формування: Одеса і Голодомор'
  words: 1000
- points:
  - >-
    Звичаї нашого народу, т. 1 (1958) і т. 2 (1966) — календар народних обрядів.
    Цитата (переднє слово): «Звичай, а також мова — це ті найміцніші елементи, що об'єднують окремих людей в один народ, в одну націю.».
    В дев'ятім крузі (1953) — свідочення голодомору; розширене англомовне видання 1983 року у Гарвардському інституті.
  section: 'Діяльність: Звичаї нашого народу'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Книгу критикують як компіляцію, але вона зберегла календар, що режим знищував.
    Цитата: «Хто його знає, чи не є саме ця близькість звичаїв тим цементуючим матеріялом, що перемагає своєю міццю всі інші сили, які працюють на руйнування єдности нашого народу.».
    [!epistemic-humility] Варіант дати народження (9 листопада проти 10 жовтня) потребує перевірки за ВУЕ.
  section: 'Тінь: Голодомор і заборона етнографії'
  words: 1600
- points:
  - >-
    Смерть 20 липня 1989 року біля Лідса (Ветербі).
    Приблизно 10 перевидань Звичаї у незалежній Україні (1991–2013).
    Свідочення голодомору як акт пам'яті про загибель матері від голодомору.
  section: 'Підсумок: Пам''ять у еміграції'
  words: 1000
