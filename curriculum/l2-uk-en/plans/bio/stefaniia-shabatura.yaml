content_outline:
- section: Розминка
  words: 400
  points:
  - >-
    [!biography] Стефанія Шабатура (1938–2014): художниця декоративно-ужиткового мистецтва,
    політв'язенька, учасниця культурного середовища Львова і членкиня УГГ.
  - >-
    Як розділити професійну мистецьку практику, публічну солідарність і радянське переслідування,
    не оголошуючи кожен гобелен політичною декларацією?
- section: 'Формування: Львів і «Пролісок»'
  words: 1000
  points:
  - >-
    Народження 5 листопада 1938 року у селі Іване-Золоте; художнє училище 1961 року і Львівський
    інститут прикладного та декоративного мистецтва 1967 року.
  - >-
    Гобелени, виставкова присутність і членство у Спілці художників як окрема професійна лінія,
    яку не можна пояснювати лише майбутнім арештом.
  - >-
    Клуб творчої молоді «Пролісок» та інтерв'ю 2008 року: особиста пам'ять доповнює, але не
    замінює музейної хронології й мистецького каталогу.
- section: 'Діяльність: Самвидав і захист Мороза'
  words: 1200
  points:
  - >-
    Поширення самвидаву і публічний виступ 1970 року на захист Валентина Мороза з вимогою
    допустити громадськість на суд.
  - >-
    Арешт 12 січня 1972 року; серед інкримінованого — машинописні твори Василя Стуса, Миколи
    Холодного й Валентина Мороза, авторство яких не належить Шабатурі.
  - >-
    [!epistemic-humility] Доступна музейна сторінка не публікує номера архівної справи; такий номер
    не реконструювати.
- section: 'Тінь: Табір і заборона малювати'
  words: 1600
  points:
  - >-
    Вирок 12–13 липня 1972 року за частиною першою статті 62 КК УРСР: п'ять років таборів
    суворого режиму і три роки заслання; жіночий табір ЖХ-385/3-4 у Барашевому.
  - >-
    1974 року представник львівського КДБ привіз матеріали для малювання; наприкінці 1975 року
    Шабатурі оголосили акт про спалення 150 вилучених малюнків.
  - >-
    [!anti-hagiography] У 1976 році мисткиня відповіла відмовою від роботи й голодуванням; карцер
    і ПКТ були адміністративними засобами покарання за протест.
  - >-
    [!myth-buster] Джерело називає число 150, але не дає повного каталогу назв, сюжетів і технік;
    не реконструювати знищені роботи.
- section: 'Підсумок: Повернення'
  words: 1000
  points:
  - >-
    Після заслання Шабатура повернулася до Львова 1979 року; пізніша діяльність у «Меморіалі»,
    Народному русі, відродженні УГКЦ і Львівській міській раді.
  - '[!decolonization] Мисткиня й організаторка з власною професійною траєкторією, не лише жертва.'
focus: >-
  Стефанія Шабатура як професійна художниця, політв'язенька й членкиня УГГ. Мистецька освіта,
  самвидав, арешт 1972 року, контроль над правом малювати, знищення робіт і пізніша громадська праця.
aliases:
