content_outline:
- points:
  - '[!biography] Провокативне питання: Як можна створити скульптуру з порожнечі? Парадокс "вгнутих" та "негативних" форм
    Олександра Архипенка, що назавжди змінив тривимірне мистецтво.'
  - Уявіть фігуру, де найважливішим є не те, що є, а те, чого немає. Саме цю ідею Архипенко запропонував світові у 1912 році.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Український патріот чи космополіт? Дискусія навколо національної ідентичності митця, що творив у Парижі, Берліні
    та Нью-Йорку, але завжди підкреслював своє українське походження.'
  - 'Дебат 2: Радянська критика ("буржуазний формаліст") vs західне визнання ("революціонер форми"). Як політика впливала
    на рецепцію його мистецтва.'
  - '[!epistemic-humility] Визнання складності: Архипенко підтримував зв''язки з Україною, але його мистецтво належить світовому
    авангарду, виходячи за межі національних шкіл.'
  - '[!decolonization] Розвінчання радянського наративу, що таврував усе новаторське мистецтво як "вороже народу" та викреслював
    імена світового значення з української культури.'
  section: 'Конфліктна карта: Чий він художник?'
  words: 900
- points:
  - Народження в родині інженера-винахідника, що з дитинства заохочував до експериментів.
  - Навчання в Київській художній школі та розчарування в академізмі, що змусило шукати власні шляхи.
  - Вплив українського народного мистецтва (писанки, кераміка) та скіфських "кам'яних баб" на пластичне мислення.
  - Переїзд до Парижа (1908) — епіцентру мистецької революції. Інтеграція в коло Пікассо, Модільяні, Леже.
  section: 'Формування: Київ, Москва, Париж: У пошуках нової форми'
  words: 1000
- points:
  - Паризький період: винахід "скульптоживопису" — поліхромних рельєфів, що поєднують колір і форму.
  - Перше в історії мистецтва використання порожнечі як виражального елемента композиції ('Жінка, що йде', 1912).
  - Берлінський та американський періоди: експерименти з новими матеріалами (скло, метал, целулоїд) та технологіями.
  - Заснування власних шкіл у Європі та США; винахід "Архипентури" — рухомих механізмів, що створюють зображення.
  section: 'Діяльність: Революція у трьох вимірах'
  words: 1300
- points:
  - '[!anti-hagiography] Конфлікти та розрив із кубістами: чи був Архипенко командним гравцем? Його індивідуалізм та небажання
    приєднуватися до угруповань.'
  - Комерціалізація мистецтва в США: напруга між творчим пошуком та ринковим попитом, що змушувала до компромісів.
  - '[!myth-buster] Міф про "легкий успіх" на Заході: роки боротьби за визнання та фінансову стабільність, втрата робіт у
    нацистській Німеччині, де його мистецтво таврували як "дегенеративне".'
  - Трагедія нерозуміння на батьківщині, де його ім'я було під забороною протягом десятиліть.
  section: 'Тінь: Ціна авангарду'
  words: 900
- points:
  - 'Повернення до розминки: як порожнеча, введена Архипенком, стала одним з головних інструментів скульптури XX століття?'
  - Вплив Архипенка на Генрі Мура, Альберто Джакометті, Костянтина Бранкузі та інші ключові фігури модернізму.
  - '[!decolonization] Повернення імені Архипенка в український культурний канон після десятиліть радянського замовчування
    та спроб "приватизації" російською культурою.'
  - 'Сучасна релевантність: чому ідеї Архипенка про синтез мистецтв, динаміку та інтерактивність актуальні в епоху цифрових
    медіа?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
