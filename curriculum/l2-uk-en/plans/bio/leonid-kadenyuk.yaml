objectives:
- Критично аналізувати біографію Леоніда Каденюка, розрізняючи радянський та український періоди його кар'єри
- Оцінювати значення місії STS-87 як наукової події та політичного символу, використовуючи поняття "конфліктна карта"
- Застосовувати принципи анти-агіографії для виявлення "тіньових" аспектів біографії (професійні невдачі, компроміси)
- Формулювати аргументовану позицію щодо спадщини Каденюка в контексті деколонізації української науки та суспільства
