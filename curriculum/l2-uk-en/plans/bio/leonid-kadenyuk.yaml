content_outline:
- points:
  - 'Парадокс: Каденюк — герой України, але більшу частину кар''єри він був радянським офіцером. Як одна людина може втілювати
    і колоніальну систему, і звільнення від неї?'
  - '[!biography] Його політ тривав лише 15 діб, але підготовка до нього зайняла понад 20 років. Що залишається за кадром
    офіційних біографій?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський космонавт vs український патріот. Він був продуктом радянської системи, відібраним за її критеріями.
    Наскільки щирим було його українство під час служби в СРСР, а наскільки — кон''юнктурою після 1991 року?'
  - 'Дебат 2: Науковець vs Символ. Чи був його політ реальним науковим проривом для України, чи переважно політичним жестом,
    символічним актом утвердження державності?'
  - '[!epistemic-humility] Оцінки його постаті коливаються від "національного героя" до "радянського полковника, якому пощастило
    опинитися в потрібний час у потрібному місці".'
  - '[!decolonization] Розгляд його біографії як приклад "подвійної свідомості" української еліти пізньорадянського періоду.'
  section: 'Конфліктна карта: Герой радянський чи український?'
  words: 900
- points:
  - Дитинство на Буковині: як сільський хлопець, що народився за Сталіна, зміг мріяти про космос?
  - 'Формативний досвід: Чернігівське вище військове авіаційне училище — інкубатор радянських пілотів. Тиск ідеології та мрія
    про політ.'
  - Соціальний і історичний контекст: світ "Холодної війни" та космічних перегонів, де астронавти були солдатами та ідеологічними
      зразками.
  - 'Переломний момент: відбір до загону космонавтів у 1976 році. Початок довгого шляху всередині системи.'
  section: 'Формування: Від буковинських полів до зірок'
  words: 1000
- points:
  - '20 років очікування: Каденюк у радянській космічній програмі. Підготовка до польотів на "Бурані", які так і не відбулися.'
  - 'Політ на шатлі «Колумбія» (1997): наукові експерименти з ботаніки та їхнє значення.'
  - 'Символічний вимір: український прапор та гімн на орбіті. Первинні джерела: уривки зі щоденника Каденюка під час польоту.'
  - 'Контекст: співпраця з NASA як політичний жест. Що цей політ означав для України у 1990-ті?'
  section: 'Діяльність: Місія STS-87 — 15 діб, що змінили історію'
  words: 1300
- points:
  - '[!anti-hagiography] "Втрачене десятиліття": після розпаду СРСР Каденюк був не потрібен ні Росії, ні Україні. Роки простою
    та невизначеності — ціна розвалу імперії для її елітних кадрів.'
  - 'Компроміси: щоб потрапити в космос, потрібно було бути зразковим радянським офіцером. Які моральні та ідеологічні компроміси
    були необхідні?'
  - '[!myth-buster] Міф про "безхмарну кар''єру". Реальна історія сповнена розчарувань, очікування та професійних поразок,
    перш ніж стався тріумфальний політ.'
  - 'Трагічна тінь: Каденюк літав на шатлі "Колумбія". У 2003 році цей самий шатл згорів під час входу в атмосферу. Як усвідомлення
    цього факту змінює наше сприйняття його "безпечного" польоту?'
  section: 'Тінь: Втрачене десятиліття та тінь «Колумбії»'
  words: 900
- points:
  - Повернення до розминки: то ким був Каденюк — радянським офіцером чи українським героєм? Студент має сформулювати власну,
      аргументовану позицію.
  - '[!decolonization] Каденюк як символ переходу: він уособлює складний шлях, який пройшла Україна — від частини імперії
    до незалежної держави. Його біографія — це історія можливостей і втрат на цьому шляху.'
  - 'Сучасна релевантність: чому сьогодні, під час війни, важливо пам''ятати про першого космонавта? Як його спадщина використовується
    (чи не використовується) для мотивації нового покоління?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Anti-hagiography of Leonid Kadenyuk: the conflict between his Soviet training and Ukrainian identity, the "lost decade"
  in his career, and the complex legacy of the Columbia STS-87 mission.'
level: BIO
