content_outline:
- points:
  - >-
    [!biography] Знайомство з Олександром Ковінькою — полтавським гумористом у
    традиції Остапа Вишні, ветераном Української революції, що пережив 21 рік
    ГУЛАГу й зберіг свій літературний хист.
  - >-
    Провокаційне питання: як поєднати теплий, усміхнений гумор його книжок із
    двадцятьма одним роком каторги на золотих копальнях Магадану?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 13 січня 1900 р. в селі Плоске на Полтавщині в родині
    селянина-бідняка; з дванадцяти років наймитував; 1917 р. склав екстерном
    іспити за чотири класи гімназії.
  - >-
    [!decolonization] Під час Української революції воював у повстанському
    загоні, потім у війську Української Народної Республіки; потрапляв у полон до
    денікінців; був у таборі для інтернованих біля Познані; належав до партії
    боротьбистів. Саме служба в УНР і боротьбизм стали «плямами», які НКВС
    використав 1934 р.
  - >-
    Зміна прізвища Ковінько на Ковінька задля питомо українського народного
    звучання. Дебют — збірка гумористично-сатиричних повістей «Індивідуальна
    техніка» (1929, Харків); далі — «Колективом подолаємо» (1930, Полтава).
  section: 'Формування: Полтавське коріння й Українська революція (1900–1920-ті)'
  words: 1000
- points:
  - >-
    Стиль: народно-діалектний полтавський гумор, лагідна іронія, «некваплива
    оповідь»; наскрізна персона наївного, дещо незграбного, але дуже
    спостережливого сільського оповідача.
  - >-
    [!epistemic-humility] Аналіз цитати з гуморески «Хатнє виховання» — ситуативна
    іронія та сатира на патріархальне лицемірство; лексика доступна (A2/B1),
    культурний гумор — багатий матеріал для дискусії.
  - >-
    Мова: навмисні фонетичні перекручення задля комізму («оптека»), здрібнілі
    форми та фразеологізми; полтавські регіоналізми.
  - >-
    [!decolonization] Спорідненість із сатиричною традицією Остапа Вишні; рання
    творчість 1920-х була вилучена з бібліотек після арешту.
  section: 'Діяльність: Полтавський гумор і «некваплива оповідь»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Перший арешт 6 жовтня 1934 р. (НКВС); 28 березня 1935 р.
    виїзна сесія Військової колегії Верховного суду СРСР засудила його у справі
    вигаданої «Контрреволюційної боротьбистської організації». Перебував у
    київській Лук'янівській в'язниці разом з іншими полтавськими інтелектуалами.
  - >-
    Заслання до Магадана (система Дальбуду на Колимі); упродовж дванадцяти років
    працював вибійником, бурильником і гірничим майстром на золотих копальнях.
  - >-
    Формальне звільнення 1947 р. без права повернутися в Україну — висланий до
    Якутії. 1950 р. — повторний арешт (МДБ) і повернення в табори поблизу
    Магадана.
  - >-
    [!myth-buster] Реабілітований 4 липня 1956 р. «за відсутністю складу
    злочину». Режим украв 21 рік — найпродуктивніший вік письменника (від 34 до
    56 років).
  section: 'Тінь: 21 рік ГУЛАГу (1934–1956)'
  words: 1600
- points:
  - >-
    Повернення до Полтави 1956 р.; іронічна автобіографічна повість «Як мене
    купали й сповивали» (1957, журнал «Прапор») та понад 30 книг після
    реабілітації («Кутя з медом», 1960; «Чарівні місця на Ворсклі», 1968).
  - >-
    [!decolonization] Цитата: «Гумор допоміг мені пережити двадцять один рік
    Магадану» — гумор як психологічний щит проти тоталітарного знищення.
  - >-
    [!anti-hagiography] Радянська санітизація пам'яті 1970–80-х: нагороди (премія
    імені Остапа Вишні, орден «Знак Пошани»), образ «веселого дідуся з Полтави»
    та евфемізм «перерва у творчості», що приховує травму Дальбуду.
  - >-
    Смерть 25 липня 1985 р. в Полтаві. Відновлення правди про ветерана УНР і
    боротьбиста, якого режим намагався стерти й перетворити на безпечну
    карикатуру.
  section: 'Підсумок: Тріумфальне повернення й гумор як щит (1956–1985)'
  words: 1000
focus: >-
  Олександр Ковінька як полтавський гуморист у традиції Остапа Вишні, ветеран
  Української революції та архетип «табірника-повернення», що пережив 21 рік
  ГУЛАГу. Аналіз його «некваплива оповідь»-стилю, механізму репресій (справа
  боротьбистів, Дальбуд) і гумору як стратегії виживання.
level: BIO
module: bio-254
objectives:
- >-
  Аналізувати внесок Олександра Ковіньки в українську гумористику та його
  «некваплива оповідь»-стиль у традиції Остапа Вишні.
- >-
  Пояснювати механізм репресій на прикладі справи боротьбистів, двох арештів
  (1934 і 1950) та системи Дальбуду на Колимі.
- Критично оцінювати радянську санітизацію його образу як «веселого дідуся» і евфемізм «перерва у творчості».
- Розуміти гумор як гідну стратегію психологічного виживання та форму внутрішньої еміграції.
