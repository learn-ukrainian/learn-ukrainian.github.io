content_outline:
- points:
  - >-
    [!biography] Знайомство з Олександром Ковінькою — полтавським
    письменником-гумористом, автором короткої гуморески, чию літературну працю
    перервали арешти, табір і примусова відсутність в Україні.
  - >-
    Провокаційне питання: як поєднати аналіз гуморески з точною репресивною
    хронологією, не додаючи неперевіреної арифметики або авторських реплік?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 14 (1) січня 1900 року в селі Плоске на Полтавщині; справжнє
    прізвище Ковінько; закінчення земського двокласного училища [S1].
  - >-
    [!decolonization] Участь у воєнних діях 1918–1920 років, німецький полон і
    польський концтабір як зафіксована ЕСУ рання хронологія без приписування
    конкретної армії або партійної належності.
  - >-
    Навчання в Полтавському інституті народної освіти у 1926–1928 роках;
    перша названа ЕСУ збірка гуморесок і сатиричних повістей «Індивідуальна
    техніка» 1929 року.
  section: 'Формування: Полтавське коріння й Українська революція (1900–1920-ті)'
  words: 1000
- points:
  - >-
    ЕСУ характеризує оповідну манеру Ковіньки як безпосередню й просту та
    пов'язує коротку гумореску з традицією дотепного усного народного мовлення.
  - >-
    [!epistemic-humility] Жодної репліки з гуморески не подано без точного
    видання та сторінки. Жанровий аналіз спирається на характеристику ЕСУ.
  - >-
    Тематика, яку фіксує ЕСУ: господарювання в старому й новітньому селі,
    виховання дітей, побут і бюрократизм.
  - >-
    [!decolonization] Полтавське мовне й літературне середовище слід розглядати
    як самостійну українську регіональну традицію, а не як периферійний варіант
    загальнорадянської сатири.
  section: 'Діяльність: Полтавський гумор і «некваплива оповідь»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Перший арешт 6 жовтня 1934 р. (НКВС); 28 березня 1935 р.
    його засудили до десяти років таборів за звинуваченням у належності до
    контрреволюційної боротьбистської організації. Формула обвинувачення не є
    підтвердженням реальної організації.
  - >-
    Покарання Ковінька відбував у Магадані. Прийняті джерела не потребують
    додавання неперевіреної тривалості окремої роботи або переліку професій.
  - >-
    1947 року його звільнили без права повернення в Україну; він жив у Якутії.
    Архівна довідка уточнює трирічне перебування там. 1950 року письменника
    заарештували вдруге.
  - >-
    [!myth-buster] 1956 року Ковіньку реабілітували, після чого він повернувся
    в Україну. Хронологію слід подавати через дати двох арештів, вироку,
    звільнення без права повернення й реабілітації, а не через сумнівний підсумок.
  section: 'Тінь: Два арешти, табір і заборона повернення (1934–1956)'
  words: 1600
- points:
  - >-
    Повернення до Полтави 1956 р.; іронічна автобіографічна повість «Як мене
    купали й сповивали» 1957 року названа в архівній біографічній довідці;
    ЕСУ фіксує пізні збірки «Кутя з медом», «Коти й котячі хвости», «Попав
    пальцем в небо», «І таке буває…» та «Як воно засівалося».
  - >-
    [!decolonization] Повернення до українського книжкового поля після
    реабілітації не компенсує державного насильства, але є окремим культурним
    фактом, підтвердженим бібліографією.
  - >-
    [!anti-hagiography] Архівний фонд ЦДАМЛМ має 17 одиниць зберігання за
    1960–1981 роки. Архівна сторінка описує біографію та фонд, а не доставляє
    повний текст книжки 1957 року.
  - >-
    Смерть 25 липня 1985 року в Полтаві; меморіальна дошка на будинку, де
    мешкав письменник, установлена 1992 року [S1]. Публічна пам'ять має тримати
    разом літературну форму й документоване переслідування.
  section: 'Підсумок: Повернення до літературної праці (1956–1985)'
  words: 1000
focus: >-
  Олександр Ковінька як полтавський письменник-гуморист, автор короткої
  гуморески й двічі заарештований митець. Аналіз його оповідної манери,
  репресивної хронології 1934–1956 років, повернення та пізньої бібліографії.
level: BIO
module: bio-254
objectives:
- >-
  Аналізувати внесок Олександра Ковіньки в українську гумористику та його
  коротку гумореску, засновану на дотепному усному народному мовленні.
- >-
  Пояснювати механізм репресій через обвинувачувальну формулу, два арешти
  (1934 і 1950), табір, звільнення без права повернення та реабілітацію.
- Критично відрізняти хронологію ЕСУ, архівну біографічну довідку та бібліотечний запис.
- Розуміти повернення до літературної праці без вигадування психологічного мотиву окремого твору.
