slug: mustafa-dzhemilev
version: '2.0'
title: 'Мустафа Джемілєв: Голос народу, що повертається'
content_outline:
- section: Вступ — Народжений у рік Сюрґюнлюку
  points:
  - Мустафа Джемілєв — лідер кримськотатарського народу та герой України
  - Народження у листопаді 1943 року в Криму
  - Сюрґюнлюк 18 травня 1944 року — перший «досвід» Росії для 6-місячного немовляти
  - Кримські татари як найдавніша жертва російського колоніалізму в цьому курсі
- section: Узбецьке дитинство — Формування ідентичності в засланні
  points:
  - Зростання у Бекабаді (Узбекистан) серед спільноти вигнанців
  - Збереження кримськотатарської мови, культури та пам'яті про Крим
  - Указ Хрущова 1967 року, який не скасував депортацію для кримських татар
  - Як несправедливість формує дисидента
- section: Дисидентський шлях I — Шість арештів
  points:
  - Перший арешт 1966 року — антирадянська література
  - Повторні арешти 1969, 1974 — систематичне переслідування
  - Арифметика спротиву — 15 років таборів за 25 років боротьби
  - Членство в Українській Гельсінській групі (1978) разом зі Стусом та Лук'яненком
- section: 303 дні голодування — Найдовший протест
  points:
  - Голодування 1975–1976 років — 303 дні без їжі
  - Примусове годування та фізичні тортури
  - Міжнародна солідарність — Сахаров, Amnesty International, Рейган
  - '"Ми або житимемо на своїй землі, або помремо" — кредо незламності'
- section: Повернення до Криму — Будівник нації
  points:
  - 1989 рік — повернення стає можливим у добу Горбачова
  - Організація масового повернення 280 000 кримських татар
  - Заснування та головування Меджлісу (1991–2013)
  - Будівництво громадянських інституцій у незалежній Україні
- section: 2014 — Повне коло
  points:
  - Анексія Криму — déjà vu Сюрґюнлюку 1944 року
  - Заборона на в'їзд до Криму — відторгнений від батьківщини вдруге
  - Викрадення сина Хайрі проросійськими силами
  - Народний депутат Верховної Ради — боротьба з Києва
- section: Деколонізаційна перспектива
  points:
  - Кримськотатарська ідентичність та українська — не суперечність, а синтез
  - Джемілєв як аргумент проти «багатонаціонального» виправдання Росії
  - Безперервна нитка від 1944 до 2014 — одна колоніальна логіка
  - Чому кримськотатарська перспектива збагачує деколонізаційний наратив курсу
- section: Підсумок — Герой України
  points:
  - Звання Героя України (2021, указ Зеленського)
  - Спадщина незламності — що означає не зломитися
  - Голос, якого не можна заглушити
vocabulary_hints:
  required:
  - Сюрґюнлюк (Sürgünlük — the 1944 deportation of Crimean Tatars)
  - Меджліс (Mejlis — Crimean Tatar representative assembly)
  - кримськотатарський народ (Crimean Tatar people)
  - депортація (deportation)
  - голодування (hunger strike)
  - дисидент (dissident)
  - правозахисник (human rights defender)
  - незламність (unbreakability)
  - окупація (occupation)
  - повернення (return)
  recommended:
  - вигнання (exile)
  - самовизначення (self-determination)
  - суб'єктність (subjecthood/agency)
  - колоніалізм (colonialism)
  - примусове годування (force-feeding)
