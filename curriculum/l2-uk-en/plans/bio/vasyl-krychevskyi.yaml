content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Кричевським: архітектор, графік, живописець
    та творець візуального образу Української Народної Республіки.
  - >-
    Провокаційне питання: як одна людина змогла закласти фундамент архітектурного модерну
    і одночасно намалювати державний герб нації?
  section: Розминка
  words: 400
- points:
  - >-
    Формування: навчання у Харківському залізничному училищі (1889), практика з
    харківськими архітекторами та самоосвіта.
  - >-
    [!decolonization] Будинок Полтавського губернського земства (1903–1908) як маніфест
    українського архітектурного стилю — інтеграція модерну, бароко та народного орнаменту,
    відкидання російсько-імперської забудови.
  - >-
    Державна графіка: створення Великого і Малого державних гербів УНР (Тризуб),
    печаток та грошових купюр у 1918 році. Візуалізація української державності.
  section: 'Діяльність: Архітектура, графіка, Тризуб'
  words: 1200
- points:
  - >-
    Робота в радянській Україні: оформлення фільмів ("Звенигора", "Тарас Шевченко"),
    проектування музею Шевченка в Каневі.
  - >-
    [!anti-hagiography] Кричевський не був заарештований особисто, не існує задокументованої
    "кримінальної справи". Механізмом репресій була атмосфера: його ім'я асоціювалося
    з візуальною самостійністю УНР, що робило перебування в СРСР політично неможливим.
  - >-
    [!epistemic-humility] 1944 рік: виїзд на еміграцію (Австрія, Франція, Венесуела).
    Радянська система пізніше приховувала його авторство або таврувала як емігранта.
  - >-
    Born: ESU gives 1872-12-29 Old Style / 1873-01-10 New Style, with another variant 1872-12-31 / 1873-01-12 | Ворожба, Лебединський повіт, Харківська губернія | Russian Empire. IEU uses 1873-01-12. This dossier preserves the discrepancy.
  - >-
    Died: 1952-11-15 | Caracas, Venezuela | reburied 1975 in Bound Brook, New Jersey, United States. Sources: ESU "Кричевський Василь Григорович"; IEU "Krychevsky, Vasyl H."
  section: 'Тінь: Неможливість життя в системі та еміграція'
  words: 1600
- points:
  - >-
    Теоретична спадщина: стаття "Розуміння українського стилю" (1914) — стиль як
    історична тяглість, а не просто фольклорний декор.
  - >-
    Творча династія Кричевських та її вплив на українське мистецтво ХХ століття.
  - >-
    Сучасне значення: Кричевський як ключова постать візуальної ідентичності України,
    чиї роботи (герб, орнаменти) існують у щоденному вжитку українців.
  section: 'Підсумок: Візуальна мова нації'
  words: 1000
focus: >-
  Василь Кричевський як засновник українського архітектурного модерну та творець
  державної графіки УНР. Аналіз його ролі у формуванні візуальної ідентичності України
  та вимушеної еміграції через несумісність його доробку із радянською системою.
