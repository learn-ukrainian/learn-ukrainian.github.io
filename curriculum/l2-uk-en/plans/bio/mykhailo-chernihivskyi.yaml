content_outline:
- points:
  - 'Парадокс: Михайло Чернігівський — один з найшанованіших святих Русі, але його мучеництво було і політичним прорахунком,
    і династичним проєктом. Де закінчується віра і починається політика?'
  - '[!biography] Представлення ключової фігури та центрального конфлікту його життя.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вчинок в Орді — це свідоме мучеництво за віру чи політична помилка, що призвела до загибелі? Позиція агіографії
    vs. реконструкція політичних мотивів.'
  - 'Дебат 2: Канонізація — це народне визнання чи політичний проєкт Ольговичів? Боротьба за статус «головного» святого-князя
    в пантеоні Русі.'
  - '[!epistemic-humility] Джерела (літописи та житія) написані з певною метою; ми реконструюємо, а не знаємо напевно.'
  - '[!decolonization] Розгляд культу святого як інструменту в міжкнязівській боротьбі, що руйнує монолітний образ «єдиної
    Русі».'
  section: 'Конфліктна карта: Святий чи Політик?'
  words: 900
- points:
  - 'Походження: династія Ольговичів, їхня репутація та претензії на Київ.'
  - 'Історичний контекст: Русь напередодні монгольської навали, роздробленість та князівські усобиці.'
  - 'Формативний досвід: битва на Калці (1223) як перше зіткнення з монгольською загрозою.'
  - 'Дипломатичні зусилля: подорож до Угорщини у пошуках союзу проти Орди — спроба об''єднати Європу.'
  section: 'Формування: Князь у світі, що зникає'
  words: 1000
- points:
  - 'Повернення на понівечену батьківщину: управління Черніговом та Києвом в умовах монгольського панування.'
  - 'Подорож до Орди (1246): ультиматум Батия та вимога пройти язичницькі ритуали як акт політичного підкорення.'
  - 'Рішення та аргументація: відмова Михайла та його боярина Федора, обґрунтована християнськими законами.'
  - 'Дія як кульмінація: свідомий вибір, що ставить релігійну ідентичність вище за політичне виживання.'
  section: 'Діяльність: Останній опір Ольговичів'
  words: 1300
- points:
  - '[!anti-hagiography] Політична історія Ольговичів: аналіз їхньої ролі в усобицях XII-XIII ст. — чи був Михайло лише жертвою,
    чи також і учасником кривавої боротьби за владу?'
  - 'Ціна непокори: смерть князя та його супутників залишила Чернігівське князівство без лідера, зробивши його ще більш вразливим.'
  - 'Людський вимір: що означав цей вибір для його родини, бояр та земель? Чи виправдана «свята» смерть, якщо вона прирікає
    твій народ на страждання?'
  - '[!myth-buster] Міф про безгрішного святого vs. реальність середньовічного правителя, для якого війна, інтриги та насилля
    були буденністю.'
  section: 'Тінь: Ціна святості'
  words: 900
- points:
  - 'Повернення до розминки: спираючись на отримані знання, студент формулює власну відповідь на питання, ким був Михайло
    — святим чи політиком.'
  - 'Спадщина мучеництва: як культ святого Михайла використовувався для легітимізації влади, формування ідентичності та як
    символ опору в різні епохи.'
  - 'Резонанс у християнському світі: свідчення Плано Карпіні та вплив події на уявлення Заходу про Орду.'
  - '[!decolonization] Переосмислення спадщини: від радянського замовчування до сучасного використання образу в національному
    наративі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykhailo Chernihivskyi's martyrdom as a political and religious act, the anti-hagiographical critique of his sainthood,
  and the conflicting interpretations of his legacy as a saint vs. a failed ruler.
level: BIO
module: bio-009
objectives:
- Критично аналізувати політичні та релігійні мотиви, що призвели до мучеництва Михайла Чернігівського
- Оцінювати вплив канонізації Михайла на формування політичного та релігійного етосу Русі
- Порівнювати агіографічні джерела («Сказання про вбивство в Орді») зі свідченнями західних хроністів (Плано Карпіні)
- Розрізняти історичний факт, агіографічну інтерпретацію та політичний міф у біографії середньовічного правителя
