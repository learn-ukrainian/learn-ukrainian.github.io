title: 'Михайло Чернігівський: Князь-мученик'
content_outline:
- section: Вступ — Вибір між життям і вірою
  points:
  - Михайло як символ духовного опору Орді
  - Значення його мучеництва для ідентичності
  - Формування етосу "страстотерпців"
- section: 'Життєпис: Князь у часи випробувань'
  points:
  - Династія Ольговичів та боротьба за Київ
  - Битва на Калці 1223 р.
  - Подорож до Європи у пошуках союзників
  - Повернення на понівечену батьківщину
- section: 'Внесок: Подорож до Орди як духовний подвиг'
  points:
  - Виклик до ставки хана Батия 1246 р.
  - Відмова від язичницьких ритуалів
  - Аргументація князя та боярина Федора
- section: 'Останні роки: Мученицька смерть'
  points:
  - Деталі страти в Орді
  - Свідчення Плано Карпіні
  - Резонанс у християнському світі
- section: 'Спадщина: Святий Михайло'
  points:
  - Канонізація та перенесення мощів
  - Іконографія та культ святого в Україні
  - Михайлівський Золотоверхий монастир
- section: Підсумок — Віра вища за життя
  points:
  - Моральна перемога над загарбником
  - Уроки для сучасного спротиву
