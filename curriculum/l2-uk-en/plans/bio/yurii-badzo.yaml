  points:
  - '[!biography] Бадзьо (1936–2018).'
  - Чому 1400-сторінковий манускрипт небезпечний?
- section: 'Формування: Ужгород і наука'
  words: 1000
  points:
  - Народження 1936 р.; Ужгородський університет (1958).
  - '[!decolonization] Відкритий лист 1971 р. до збору письменників.'
- section: 'Діяльність: «Право жити»'
  words: 1200
  points:
  - 1965 — протест на прем'єрі «Тіні забутих предків».
  - 1972–1979 — манускрипт «Право жити».
  - '[!epistemic-humility] Для читання використовуйте перевірені зовнішні біографічні сторінки; повний текст праці не хостується в курсі.'
- section: 'Тінь: Арешт і вигнання'
  words: 1600
  points:
  - '[!anti-hagiography] 23 квітня 1979 — арешт; 7 років + 5 років вигнання.'
  - Конфіскація манускрипту; тиск на родину.
  - '[!myth-buster] Номер справи КДБ не знайдено.'
- section: 'Підсумок: Видання 1996 р.'
  words: 1000
  points:
  - Звільнення 1988 р.; видання 1996 р.
  - '[!decolonization] Міст від Дзюби до ширшої теорії права жити.'
