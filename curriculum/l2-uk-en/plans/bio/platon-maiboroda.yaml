content_outline:
  - points:
      - >-
          Провокація: чому композитора, який створив одну з найвідоміших
          українських мелодій XX століття, не можна зводити до одного
          пісенного символу?
      - >-
          [!biography] Платон Іларіонович Майборода (1918-1989) —
          український композитор, педагог і фольклорист, чия мелодика
          поєднала професійну школу Ревуцького, фольклорне слухання і
          масову українську пісенну пам'ять.
      - >-
          Центральне запитання: як пісня, створена в радянській публічній
          культурі, може зберігати українську мову, інтонацію, місце і
          родинну пам'ять?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебати 1: "Пісня про рушник" як вершина чи пастка пам'яті?
          Вона відкриває доступ до Майбороди, але може закрити масштаб
          інших пісень, фільмової музики, фольклорної підготовки і
          композиторського ремесла.
      - >-
          Дебати 2: офіційний радянський композитор чи український
          пісняр-професіонал? Нагороди, спілки й державні медіа треба
          називати, але вони не пояснюють, чому пісні лишилися в
          українській пам'яті.
      - >-
          [!decolonization] Не подавати українську пісню як безликий
          продукт "радянської естради". У центрі — українська мова,
          мелодична традиція, Полтавщина, Київ, співпраця з Малишком і
          композиторська школа.
      - >-
          [!epistemic-humility] Досьє не документує персональної
          репресивної справи Майбороди. Сімейна травма, війна, полон і
          інтернування подаються лише в межах перевірених джерел.
    section: 'Конфліктна карта: Пісня між масовістю і пам''яттю'
    words: 900
  - points:
      - >-
          Пелехівщина і музична родина: молодший брат композитора Георгія
          Майбороди, ранній переїзд до Києва і родинний досвід сталінського
          насильства, який не слід перетворювати на недоведений сюжет про
          самого композитора.
      - >-
          Київська консерваторія: навчання у Левка Ревуцького, фольклорні
          студії у Дмитра Ревуцького, експедиції на Полтавщину і в Східну
          Галичину як школа уважного слухання.
      - >-
          Друга світова війна: мобілізація, полон, втеча, інтернування і
          фронтовий фінал разом із братом. Цей досвід пояснює розриви
          біографії без надмірної драматизації.
      - >-
          Післявоєнна педагогічна і композиторська праця: викладання,
          професійне становлення, входження у систему музичних інституцій,
          де українська пісня могла лунати масово, але не вільно від
          політичних очікувань.
    section: 'Формування: Фольклорне слухання і післявоєнна школа'
    words: 1000
  - points:
      - >-
          Співпраця з Андрієм Малишком від 1948 року: десятки спільних
          пісень, що поєднали поетичну образність матері, дороги, школи,
          Києва і трав із плавною кантиленою.
      - >-
          Пісенний канон: "Київський вальс", "Білі каштани", "Пісня про
          вчительку", "Ми підем, де трави похилі", "Колискова", "Моя
          стежина" і "Пісня про рушник".
      - >-
          Фільм, радіо, платівка і концерт: пісні Майбороди жили не лише
          на нотному папері. Вони циркулювали через радянську медійну
          інфраструктуру, яку модуль аналізує як канал і фільтр водночас.
      - >-
          Ширший доробок: вокально-симфонічні твори, музика до кіно і театру,
          понад сто пісень, перша Шевченківська премія для композитора за
          "Вибрані пісні" у 1962 році.
    section: 'Діяльність: Кантилена, кіно і спільна пісенна мова'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Майборода працював у державних музичних
          структурах, отримував радянські відзнаки і був частиною офіційної
          системи. Це не приховується і не стає єдиним поясненням його
          творчості.
      - >-
          [!myth-buster] "Пісня про рушник" не є просто природною народною
          піснею без автора. Це професійний композиторський твір на слова
          Малишка, який став народно впізнаваним через виконання і повторення.
      - >-
          Родинна репресія і воєнний досвід: називати обережно, без
          додавання агентств, справ чи мотивів, яких не дають джерела.
      - >-
          Ризик сентименталізації: материнський, шкільний і київський образи
          не мають бути лише "теплими". Вони також показують, як українська
          мова й місцевість утримувалися в масовій пісні.
    section: 'Тінь: Офіційна культура і авторство популярної пісні'
    words: 900
  - points:
      - >-
          Повернення до розминки: студент пояснює, чому мелодія Майбороди
          потребує біографічного, фольклорного і медійного аналізу, а не
          тільки емоційного впізнавання.
      - >-
          Порівняння з Малишком і Білашем: український пісенний канон
          твориться через співпрацю поета, композитора, виконавця,
          інституції і слухача.
      - >-
          Деколонізаційний підсумок: Майборода — не додаток до радянської
          масової культури, а композитор, через якого українська мелодична
          традиція входила в публічну пам'ять.
    section: 'Дискусія та підсумок: Мелодія як культурна інфраструктура'
    words: 700
focus: >-
  Платон Майборода як український композитор пісенного канону: фольклорне
  слухання, школа Ревуцького, співпраця з Андрієм Малишком, "Пісня про
  рушник", "Київський вальс" і "Моя стежина", а також напруга між офіційною
  радянською культурою та українською мовною і мелодичною пам'яттю.
