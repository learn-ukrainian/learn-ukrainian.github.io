objectives:
  - >-
      Аналізувати Платона Майбороду як професійного композитора української
      пісенної пам'яті, а не лише автора одного популярного твору
  - >-
      Пояснювати роль фольклорного слухання, школи Ревуцького і співпраці з
      Андрієм Малишком у формуванні його мелодичної мови
  - >-
      Критично розрізняти радянську інституційну рамку, сімейно-воєнний
      контекст і недоведені репресивні сюжети
  - >-
      Формулювати деколонізаційне прочитання української масової пісні як
      простору мови, місця і пам'яті
