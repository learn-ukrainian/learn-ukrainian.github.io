content_outline:
  - section: Від упізнавання до авторства
    words: 300
    points:
      - >-
          Вхід через конкретне джерельне завдання: розрізнити поетичне
          авторство Андрія Малишка, музику Платона Майбороди та атрибутовану
          музикознавчу тезу Валентини Кузик.
      - >-
          [!biography] Платон Іларіонович Майборода (1918–1989) —
          український композитор і музично-громадський діяч, чию пісенну
          спадщину треба аналізувати через твори, джерела й записи.
      - >-
          Центральне запитання: які спостережувані композиторські рішення
          перетворюють поетичний рядок на вокальну фразу?
  - section: 'Дві дати арешту: як читати суперечність'
    words: 450
    points:
      - >-
          НСКУ пов'язує арешт батька з від'їздом Платона до Києва влітку
          1936 року; стаття Запорізької обласної універсальної наукової
          бібліотеки, що переказує архівну справу, називає 9 березня
          1938 року.
      - >-
          Обидва повідомлення подати з атрибуцією; не обирати дату без
          додаткового архівного розв'язання.
      - >-
          Сімейне сталінське насильство не перетворювати на недокументовану
          персональну справу композитора і не називати мотивів, яких не
          встановлюють джерела.
  - section: 'Школа формування: Ревуцькі, експедиції, війна'
    words: 650
    points:
      - >-
          Левко Ревуцький: рекомендація до музичного училища й подальший
          клас композиції; Дмитро Ревуцький: заняття з українського фольклору.
      - >-
          1939 року Майборода збирав на Полтавщині народні пісні на слова
          Тараса Шевченка; 1940 року записував гуцульський фольклор у
          Східній Галичині та спілкувався з Філаретом Колессою.
      - >-
          Воєнна послідовність за ЕСУ: народне ополчення в червні 1941 року,
          полон, утеча 1942 року, інтернування в Катовіце 1943 року,
          приєднання до 1-го Українського фронту після звільнення міста,
          завершення війни в Німеччині.
      - >-
          Післявоєнний шлях: керівництво військовим ансамблем у Відні 1945
          року, завершення консерваторії 1947 року, викладання теоретичних
          дисциплін у Києві.
  - section: 'Понад 22 спільні твори: Майборода і Малишко'
    words: 700
    points:
      - >-
          Від 1948 року — співпраця з Андрієм Малишком; ЕСУ визначає
          кількість спільних творів як «понад 22», тому округлення до
          вигаданого числа неприпустиме.
      - >-
          Розподіл авторства: Малишко створював слова, Майборода — музику;
          початкові слова «Рідна мати моя» належать поетові.
      - >-
          Обмежений перевірений каталог: «Київський вальс», «Білі каштани», «Пісня про
          вчительку», «Ми підем, де трави похилі», «Колискова», «Пісня про
          козацькі могили», «Моя стежина», «Пісня про рушник».
      - >-
          Навчальна дія: зіставити функцію назви/образу, вокальну фразу й
          доказ із джерела, не приписуючи партитурі не встановленого
          прямим аналізом.
  - section: 'Лабораторія одного опису: як музикознавиця пояснює мелодію'
    words: 700
    points:
      - >-
          Офіційна Бібліотека Шевченківського комітету відтворює фрагмент
          передмови Валентини Кузик до видання «Я прийду до тебе з піснею…
          Вибрані вокальні твори» («Музична Україна», 2008).
      - >-
          Розібрати тези про повторювані ланки-речення, кантиленне начало,
          варіантний розвиток поспівки й названі приклади, відокремлюючи
          атрибутований опис від прямого аналізу партитури.
      - >-
          Зіставити нижні межі «понад 100» і «понад 200» пісень без
          усереднення; за відсутності спільної методики лишити кількісну
          розбіжність відкритою.
  - section: 'Поза піснею: сцена, кіно, великі форми'
    words: 350
    points:
      - >-
          Понад 100 пісень, вокально-симфонічні твори «Дума про Дніпро» і
          «Тополя», музика до театру та кіно як перевірений жанровий діапазон.
      - >-
          Фільмові приклади: «Літа молодії», «Долина синіх скель»,
          «Кров людська — не водиця», «Абітурієнтка»; ЕСУ називає 13 фільмів
          кіностудії імені Олександра Довженка.
      - >-
          Не робити з переліку автоматичної оцінки якості: він доводить
          діапазон, а не однакову вагу всіх творів.
  - section: 'Премія, спілки, архів: що доводить статус'
    words: 200
    points:
      - >-
          ЦДАМЛМ називає Майбороду першим композитором — лауреатом
          Шевченківської премії (1962, за «Вибрані пісні»).
      - >-
          Членство в правліннях Спілки композиторів України та СРСР,
          державні відзнаки й особовий фонд № 855 подати як факти статусу
          та збереження документів, а не як доказ мотивів або лояльності.
focus: >-
  Платон Майборода як композитор української пісні: школа Левка й Дмитра
  Ревуцьких, фольклорні експедиції, точна воєнна хронологія, понад 22
  спільні твори з Андрієм Малишком, аналіз передмови Валентини Кузик та
  перевірений жанровий і інституційний контекст.
level: BIO
module: bio-372
objectives:
  - >-
      Реконструювати освітню, фольклористичну й воєнну хронологію Майбороди,
      розрізняючи узгоджені факти та суперечність двох джерел
  - >-
      Пояснювати різні ролі поета, композитора й виконавця на матеріалі
      співпраці Майбороди з Андрієм Малишком
  - >-
      Аналізувати один ідентифікований музикознавчий текст за термінами,
      обсягом твердження, прикладами й межею прямої перевірки
  - >-
      Формулювати розгорнутий аргумент просунутого рівня про пісенний
      і жанровий доробок, чітко відділяючи джерельний факт, атрибутовану
      музикознавчу тезу та інтерпретацію
