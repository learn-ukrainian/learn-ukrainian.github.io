content_outline:
- points:
  - 'Провокація: полковник, що відбудовував спустошені правобережні міста й очолив широке повстання, — а потім побачив свої здобуті міста вписаними в московсько-варшавський договір як «фортеці до повернення», був заарештований гетьманом, засланий до Тобольська — і повернувся народним героєм та персонажем Шевченкової поеми. Якого Палія пам''ятають пісні, а якого фіксує договірний архів?'
  - '[!biography] Знайомство з постаттю: починаємо з задокументованих урядів (фастівський, білоцерківський полковник) і приблизного народження (близько 1640-х у Борзні), а не з вигаданого дитинства чи точної дати смерті.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: фронтирно-воєнна легенда — обережно засвідчений віденський похід 1683 року, служба на фронті Священної ліги й здобуття міст 1702 року; Палій як блискучий пограничний командир.'
  - 'Позиція 2: політичний актор правобережного відновлення в системі міждержавного примусу — реколонізація, відновлення полків (Фастівського, а потім Білоцерківського), повстання 1702-1704 років і те, як Нарвський договір переписав його здобутки на договірну власність.'
  - '[!decolonization] Річпосполитська й імперська мова робить його «проблемою-бунтом»; радянський спадок — «класовим повстанням»; патріотична пам''ять — «чистим месником»; проросійська пам''ять обертає повернення із заслання на доказ природної лояльності. Усі ці рамки згладжують.'
  - '[!epistemic-humility] Народження — близько 1640-х у Борзні, смерть — після 24 січня 1710 року; прізвисько Палій при родовому прізвищі Гурко; віденський похід — «за деякими джерелами»; освіта — лише «можливо» в Києво-Могилянській колегії. Починаємо з задокументованих урядів.'
  section: 'Конфліктна карта: Фронтирний герой чи актор у пастці договорів'
  words: 900
- points:
  - 'Походження: Борзна, міщанська родина Гурків; народження приблизне (близько 1640-х) — не відкриваємо модуль вигаданою «сценою дитинства»; можливо, навчався в Києво-Могилянській колегії.'
  - 'Рання служба: реєстровий козак Ніжинського полку; певний час служив у війську Петра Дорошенка; від кінця 1670-х перебував на Чортомлицькій Січі, де дістав прізвисько Палій — тож біографія не починається з Фастова.'
  - '1683-1686: відгукнувся на річпосполитські заклики до найму; влітку 1683 року повів запорозький загін до Відня (за деякими джерелами) й діяв на фронті Священної ліги проти османів — це обережно засвідчене раннє військове резюме, а не єдина причина його ваги.'
  - '1684-1685: дістав привілей сформувати охотницький кінний полк у Київщині; осів навколо Фастова й став фактичним правителем білоцерківського краю.'
  - 'Мережа, а не самотній герой: правобережне відновлення полків разом з Абазином, Самусем, Іскрою та іншими; почав реколонізацію спустошених війною земель.'
  section: 'Формування: Від Борзни через Січ до Фастова'
  words: 1000
- points:
  - 'Обмежена протекторна політика: упродовж 1680-1690-х він неодноразово просив московських правителів прийняти Правобережжя під їхню владу й пересилав Мазепі відомості та листи — це тактика в стисненому міжнародному порядку, а не сучасна лояльність; від початку він не був простим супротивником Мазепи.'
  - '1689-1690: напав на Немирів, був захоплений і ув''язнений річпосполитськими силами, а після втручання корони звільнений — це раніше ув''язнення перед пізнішим засланням.'
  - '1699 рік — тригер: сейм наказав силою ліквідувати всі правобережні козацькі полки, а козацьку адміністрацію формально скасували — інституційний поштовх до ескалації.'
  - 'Початок березня 1702 року: рада у Фастові публічно відкинула протекцію польської корони й проголосила Правобережжя «вільною козацькою областю», заявивши вірність Петрові I та Мазепі — це джерельна мова й політична тактика, а не доказ простої імперської лояльності.'
  - 'Повстання 1702-1704 років (із Самусем, «друга Хмельниччина»): охопило Київщину, Брацлавщину, Поділля, Волинь; перемога під Бердичевом 26 жовтня 1702 року та відвоювання Вінниці, Немирова, Бару й інших міст — але воно не здобуло лівобережної та російської підтримки й було придушене 1703 року з жорстокими карами.'
  - '1702 рік: відновив Білоцерківський полк і зробив Білу Церкву штаб-квартирою всього правобережного козацтва.'
  section: 'Діяльність: Реколонізація, повстання 1702-1704 і Білоцерківський полк'
  words: 1300
- points:
  - '[!anti-hagiography] Соціальний, козацько-становий, релігійний, поселенський, воєнний і дипломатичний виміри повстання важать усі водночас; сама лише «класова війна» — надто пласко, а здобуття міст супроводжувалося реальним насильством і завершилося брутальним придушенням 1703 року.'
  - 'Нарвський договір 1704 року: пункт 4 зробив здобуті Палієм міста й фортеці предметом міждержавного примусу — Москва й Варшава знехтували автономними інтересами козацького врядування, а виконавцем призначили Мазепу. Це примус, а не просто тло дипломатії.'
  - '[!myth-buster] Арешт і заслання: за те, що не скорився вимозі Петра, і через контакти з прошведськими магнатами, Мазепа наприкінці липня 1704 року з московського схвалення наказав його заарештувати; тримали в Батурині до червня 1705 року, далі — Москва, а за наказом від 21 серпня 1705 року відправили до Тобольська — це найпряміший імперський примус у його історії.'
  - 'Тобольського заслання не можна відбілювати пізнішим поверненням: дати наказів про заслання й статті договору — задокументований примус; процедурні деталі звіряти за виданнями джерел перед класним переказом.'
  section: 'Тінь: Нарвський договір, арешт і Тобольськ'
  words: 900
- points:
  - 'Повернення до розминки: як правобережне козацьке відновлення стало конфліктом між місцевою автономією, соціальним тиском, державотворенням Мазепи, річпосполитським примусом і московською договірною політикою?'
  - 'Повернення, а не стирання: він лишався в засланні до весни 1708 року й був повернений наказом від 28 листопада 1708 року (на прохання київського полковника Антіна Танського) серед зміненої політичної ситуації 1708 року; узяв участь у Полтавській кампанії 1709 року й знову очолив Білоцерківський полк; помер після 24 січня 1710 року, похований у Межигірському монастирі.'
  - 'Пам''ять: народні пісні, легенди, Шевченкова поема «Чернець» і «Палій» Боровиковського зберігають його ім''я, але можуть сплощувати політику до сюжету про героя-месника; музейні речі (срібна булава, шабля, Євангеліє) несуть питання походження.'
  - '[!decolonization] Відділяймо джерельно засвідченого полковника від фольклорно-літературної ікони та спрощень «оборонець Європи» чи «проросійський герой»; тримаймо разом поселення, повстання, меценатство, дипломатію, заслання й пам''ять.'
  section: 'Дискусія та підсумок: Повернення, пам''ять і Шевченків «Чернець»'
  words: 700
focus: Semen Palii (Hurko) as a Right-Bank Cossack restorer — the Borzna origin and Sich nickname, the cautiously-sourced 1683 frontier service, the Fastiv and Bila Tserkva power base, the recolonization of war-devastated lands, the constrained protector appeals to Moscow, the 1702-1704 uprising with Samus and the town captures, the Narva Treaty that reframed his towns as fortresses to be returned, the 1704 arrest and Tobolsk exile, the 1708 return and Poltava-era renewed command, and the folk-literary memory that both preserves and flattens him.
