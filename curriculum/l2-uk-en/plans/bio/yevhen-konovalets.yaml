content_outline:
- points:
  - 'Парадокс: Як військова поразка армії УНР стала поштовхом для створення найефективнішої підпільної організації України
    ХХ століття?'
  - 'Провокація: Коновалець — людина, що програла війну за державу, але виграла боротьбу за її ідею. Що важливіше?'
  - '[!biography] Представлення Євгена Коновальця не як ікони, а як стратега, що діяв у неможливих умовах.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Прагматичний командир армії УНР vs безкомпромісний лідер підпілля УВО. Чи була трансформація методів
    боротьби вимушеною еволюцією чи зрадою ідеалів державництва?'
  - 'Дебат 2 (після смерті): Радянська пропаганда (терорист, фашист) vs сучасний державний наратив (батько-засновник ЗСУ)
    vs бачення ОУН (вождь нації). Де закінчується історія і починається політика?'
  - '[!decolonization] Аналіз російської та радянської дезінформації про Коновальця та ОУН як інструменту боротьби з українською
    державністю.'
  - '[!epistemic-humility] Визнання того, що навіть у націоналістичному таборі не було єдності щодо методів Коновальця, що
    призвело до розколу після його смерті.'
  section: 'Конфліктна карта: Герой-державник чи творець радикального руху?'
  words: 900
- points:
  - 'Контекст: Австро-Угорська Галичина, освіта на юридичному факультеті Львівського університету — формування почуття обов’язку
    перед нацією.'
  - 'Переломний момент: Перша світова війна, російський полон, де з уламків імперських армій він формує боєздатну українську
    частину — Січових Стрільців.'
  - 'Уроки поразок: Бої за Київ, падіння УНР. Досвід, що переконав Коновальця в необхідності постійної, організованої сили,
    незалежної від політичної кон''юнктури.'
  section: 'Формування: Від галицького інтелігента до командира'
  words: 1000
- points:
  - 'Головне досягнення: Створення Української Військової Організації (УВО), а згодом Організації Українських Націоналістів
    (ОУН) — мережевої структури, що поєднувала розвідку, політику та збройну боротьбу.'
  - 'Ідеологія: Формування доктрини інтегрального націоналізму (у співпраці з ідеологами), принцип "перманентної революції".'
  - 'Стратегія: Перехід від відкритих боїв до підпільної боротьби: саботаж, диверсії, атентати як спосіб утримати українське
    питання на порядку денному.'
  - 'Дипломатія в екзилі: Пошук союзників (Литва, Німеччина, Італія), налагодження фінансування, створення мережі представництв
    по всьому світу.'
  section: 'Діяльність: УВО та ОУН — Архітектура підпільної держави'
  words: 1300
- points:
  - '[!anti-hagiography] Принцип "вождизму" та єдиноначальності в ОУН. Це була необхідна умова для виживання підпілля чи небезпечний
    крок до авторитаризму?'
  - 'Моральна неоднозначність: Виправдання терору як політичного інструменту. Атентат проти Перацького — аналіз причин та
    наслідків.'
  - 'Внутрішні конфлікти: Напруженість між старшим поколінням (помірковані) та "крайовиками" (радикальна молодь). Чи зміг
    Коновалець запобігти майбутньому розколу ОУН?'
  - '[!myth-buster] Руйнування міфу про ОУН як монолітну структуру. Внутрішні ідеологічні дебати та боротьба за вплив, які
    Коновалець мусив постійно долати.'
  section: 'Тінь: Ціна боротьби'
  words: 900
- points:
  - 'Повернення до парадоксу: Студент формулює відповідь, як Коновальцю вдалося перетворити військову поразку на політичний
    проєкт, що пережив свого творця.'
  - 'Спадщина: Загибель від рук агента НКВД перетворила Коновальця на мученика та символ. ОУН, яку він створив, стала ключовим
    гравцем у Другій світовій війні та повоєнному опорі (УПА).'
  - 'Сучасне значення: Чому постать Коновальця та символіка ОУН знову актуалізувалися під час російсько-української війни
    з 2014 року?'
  - '[!decolonization] Спростування сучасних російських пропагандистських наративів, що напряму походять від радянських звинувачень
    проти Коновальця.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The evolution of Yevhen Konovalets from a military commander of the UNR Army to the founder and leader of the clandestine
  Organization of Ukrainian Nationalists (OUN), focusing on his transformation of military defeat into a long-term political
  and armed struggle.
level: BIO
module: bio-095
objectives:
- Аналізувати перетворення Коновальця з військового командира на політичного лідера підпільного руху.
- Критично оцінювати ідеологію та методи ОУН, включаючи їхні суперечливі аспекти та моральні дилеми.
- Простежити еволюцію українського визвольного руху в міжвоєнний період від армії до підпільної організації.
- Формулювати аргументовану позицію щодо історичної ролі Коновальця, спираючись на аналіз його досягнень та компромісів.
