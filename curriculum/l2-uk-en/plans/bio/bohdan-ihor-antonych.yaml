content_outline:
- points:
  - 'Провокація: Антонича називають "поетом космічного організму" і "співучим лемком". Але як в одній людині поєднався архаїчний
    пантеїзм, європейський модернізм та гостра полеміка щодо його національної ідентичності?'
  - '[!biography] Парадокс: поет, що оспівував природу і космос, став культовою фігурою для андеграунду та поетів-дисидентів
    через десятиліття після своєї смерті.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Ідентичність): Чи був Антонич "справжнім" українцем? Полеміка 1930-х років, де йому закидали "лемківський сепаратизм"
    та брак національної свідомості. Його відповідь: "Я — українець".'
  - 'Дебат 2 (Рецепція): Чи був Антонич "аполітичним" поетом? Радянське літературознавство намагалося представити його як
    "співця природи", ігноруючи філософську глибину та модерністські пошуки. Націоналістична критика дорікала за відсутність
    патріотичної лірики.'
  - '[!epistemic-humility] Обидві сторони використовували постать поета для власних ідеологічних цілей, часто спрощуючи його
    складний світогляд.'
  - '[!decolonization] Повернення лемківського голосу: розгляд Антонича як представника субетносу, чия культура була маргіналізована
    і в Польщі, і в СРСР.'
  section: 'Конфліктна карта: Лемко, українець чи космополіт?'
  words: 900
- points:
  - 'Лемківщина як міфологічний простір: народження в Новиці, сільське дитинство, природа та язичницькі вірування як першоджерело
    його поетичного світу.'
  - 'Гімназія у Сяноку: перші вірші, знайомство з польською та світовою літературою.'
  - 'Львівський університет (1928-1933): філософський факультет, входження в літературне середовище, публікації у журналах,
    вихід першої збірки "Привітання життя".'
  - 'Формування унікальної ідентичності: усвідомлення себе українцем, не відмовляючись від лемківського коріння.'
  section: 'Формування: Від Новиці до Львова'
  words: 1000
- points:
  - 'Творчий злет 1930-х: збірки "Три перстені", "Книга Лева", "Зелена Євангелія", "Ротації".'
  - 'Філософія вітаїзму та біокосмізму: природа як живий організм, храм, де людина є лише частиною всесвітнього кругообігу
    речовин.'
  - 'Поетичне новаторство: синтез авангардних течій (сюрреалізм, імажизм) з фольклорними мотивами. Архітектоніка та музичність
    вірша.'
  - 'Вершина творчості: "Зелена Євангелія" як цілісний філософський та поетичний маніфест, що утверджує єдність усього сущого.'
  section: 'Діяльність: Архітектор Зеленої Євангелії'
  words: 1300
- points:
  - '[!anti-hagiography] Антонич свідомо дистанціювався від політичної боротьби та ідеологічних дискусій, що вирували у міжвоєнному
    Львові. Для багатьох сучасників це виглядало як втеча від реальності у "вежу зі слонової кістки".'
  - Критика з боку націоналістичного табору (Дмитро Донцов та його послідовники), які вимагали від літератури служіння нації
    та боротьбі. Чи мав митець право бути "над сутичкою" в такий час?
  - '[!myth-buster] Міф про "безконфліктного генія". Полеміка щодо ідентичності була болісною для Антонича і змушувала його
    публічно захищатися, що руйнує образ "чистого лірика".'
  - 'Трагедія незавершеності: рання смерть у 28 років обірвала його творчу еволюцію. Чи не є його філософія блискучим, але
    все ж незавершеним проєктом?'
  section: 'Тінь: Ціна аполітичності'
  words: 900
- points:
  - 'Повернення до розминки: Як саме Антонич поєднав архаїку і модернізм? Студент формулює відповідь, спираючись на аналіз
    його біографії та творчості.'
  - 'Посмертна слава: "друге народження" поета у 1960-х роках, його вплив на покоління шістдесятників (Стус, Калинець) та
    сучасних поетів (Андрухович).'
  - '[!decolonization] Антонич як символ культурного спротиву: його "аполітична" поезія стала формою ескапізму і внутрішньої
    свободи в умовах тоталітарних режимів.'
  - 'Сучасне значення: культ Антонича в сучасній культурі (музика, фестивалі). Чи не загрожує ця популярність новим спрощенням
    і міфологізацією його постаті?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Anti-hagiography of Antonych: exploring the conflict between his Lemko identity and Ukrainian national consciousness,
  the tension between his apolitical vitalism and the era''s political demands, and his posthumous mythologization.'
