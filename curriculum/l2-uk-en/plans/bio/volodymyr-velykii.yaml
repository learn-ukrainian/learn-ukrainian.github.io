content_outline:
- points:
  - 'Парадокс: Як «вовк став ягням»? Володимир, що прийшов до влади через зраду, вбивство брата і сексуальне насильство, входить
    в історію як святий, хреститель і «Красне Сонечко» фольклору. Де закінчується реальний політик і починається літописний
    міф?'
  - '[!biography] Ця історія — не про ікону, а про людину, чия трансформація (або її майстерна імітація) змінила хід історії
    Східної Європи на тисячу років.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мотиви хрещення. Чи був це духовний прорив, як описує «Повість минулих літ»? Чи холоднокровний геополітичний
    розрахунок для отримання візантійської принцеси в дружини та входження до «клубу» світових лідерів?'
  - 'Дебат 2: Чия спадщина? [!decolonization] Боротьба за Володимира між Україною та Росією. Чому пам''ятник князю, що правив
    у Києві за 150 років до заснування Москви, стоїть під Кремлем? Аналіз російського імперського міфу про «спільну колиску».'
  - '[!epistemic-humility] Джерела про Володимира написані десятиліття або й століття після його смерті монахами, що мали
    на меті ідеалізувати хрестителя, а не документувати факти. Ми бачимо не фотографію, а ретельно відредаговану ікону.'
  section: 'Конфліктна карта: Святий розрахунок чи цинічна політика?'
  words: 900
- points:
  - Статус «робичича» (сина рабині) як головний двигун амбіцій. Соціальний аутсайдер, що мусив доводити своє право на владу
    не народженням, а мечем.
  - 'Новгородський період та варязьке оточення: перша школа управління, де цінували не походження, а силу, хитрість та вірність
    дружини.'
  - 'Кривава усобиця з братами: втеча до Скандинавії, збір найманого війська, захоплення Полоцька (трагедія Рогнеди) та штурм
    Києва. Це не війна за державу, а вендета, де всі засоби дозволені.'
  section: 'Формування: Шлях ''робичича'' до київського столу'
  words: 1000
- points:
  - 'Хрещення Русі 988 року як акт централізації та культурної революції: введення єдиної ідеології, писемності, кам''яної
    архітектури.'
  - 'Державне будівництво: карбування власної монети (златники та срібники) з тризубом як акту суверенітету; будівництво «Змієвих
    валів» — грандіозної оборонної системи проти кочовиків.'
  - Заснування Десятинної церкви як духовного, культурного та фінансового центру держави. Створення перших шкіл для «навчання
    книжного» — примусова підготовка нової еліти.
  section: 'Діяльність: Архітектор імперії'
  words: 1300
- points:
  - '[!anti-hagiography] Язичницька реформа і людські жертвоприношення. Спроба створити єдиний пантеон на чолі з Перуном провалилася,
    її апогеєм стало вбивство варягів-християн — свідчення ідеологічної кризи та жорстокості.'
  - 'Трагедія Рогнеди: зґвалтування полоцької княжни на очах її батьків, вбивство її родини — брутальна демонстрація сили,
    яку літописці намагалися виправдати, але яка є беззаперечним воєнним злочином.'
  - '[!myth-buster] «Добровільне» хрещення. Літопис прямо говорить про ультиматум Володимира киянам: «хто не з’явиться завтра
    на ріці... мені той противником буде». Це була насильницька модернізація, проведена залізною рукою.'
  section: 'Тінь: Ціна цивілізації'
  words: 900
- points:
  - 'Повернення до парадоксу: Володимир не «став ягням», а лише змінив інструменти влади — від язичницького меча до християнського
    хреста та закону. Його «милосердя» (бенкети, скасування смертної кари) — це також була політика, спрямована на зміцнення
    авторитету.'
  - '[!decolonization] Спадщина Володимира — це не Росія, а Україна. Його держава — Київська Русь. Його символ — Тризуб —
    герб сучасної України. Його цивілізаційний вибір — європейський — є основою української ідентичності.'
  - Володимир Великий — це урок про те, що великі держави часто будуються аморальними методами, а цивілізаційні стрибки оплачуються
    високою ціною. Його спадщина — це не свята легенда, а складна історія про владу, віру та насильство.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'The anti-hagiographic biography of Volodymyr the Great: his brutal path to power, the pragmatic choice of civilization,
  his state-building achievements, and the complex legacy of a figure who was both a violent despot and a nation-building
  saint.'
