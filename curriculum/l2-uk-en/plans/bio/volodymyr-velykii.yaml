objectives:
- Аналізувати геополітичне та культурне значення хрещення Русі
- Оцінювати державотворчі реформи Володимира (адміністративні, фінансові, військові) та їх ціну
- Критично оцінювати постать Володимира, розрізняючи ідеалізований образ у літописах та реальну історичну особу
  з її суперечностями
- 'Дискутувати про спадщину Володимира: тризуб як речовий і пізніше рецепційний символ; спростування російських
  імперських міфів без модерної телеології'
