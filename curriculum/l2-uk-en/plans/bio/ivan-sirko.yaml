content_outline:
- points:
  - 'Парадокс: для татар він був Урус-Шайтан, для козаків — «батько». Як одна людина могла викликати і містичний жах, і синівську
    любов?'
  - Чому найвідоміший лист, нібито написаний Сірком, є насправді пізнішою фальсифікацією, а його реальні листи — набагато
    складніші й цікавіші?
  - '[!biography] Постать, що досі викликає суперечки: хто такий Іван Сірко?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Характерник vs Раціональний полководець. Чи були у Сірка надприродні здібності, як стверджує фольклор, чи його
    непереможність — результат геніальної тактики та розвідки?'
  - 'Дебат 2: Захисник України vs Автономний воєначальник. Чиї інтереси відстоював Сірко: української держави (Гетьманщини),
    лише Запорозької Січі, чи власні?'
  - '[!epistemic-humility] Оцінки Сірка його сучасниками (гетьманами, польськими та московськими посадовцями) кардинально
    різняться, і кожна сторона мала свої причини.'
  - '[!decolonization] Образ Сірка в російській історіографії (зокрема, через картину Рєпіна) — спроба «привласнити» козацьку
    звитягу та представити її як лояльну до Москви силу.'
  section: 'Конфліктна карта: Святий, Демон чи Політик?'
  words: 900
- points:
  - 'Походження та ранні роки: що ми знаємо і чого не знаємо про молодість Сірка. Таємниця його народження як частина легенди.'
  - 'Історичний контекст: Січ в епоху Руїни — «острів» козацької волі між трьома імперіями (Річ Посполита, Московія, Османська
    імперія).'
  - 'Шлях до отаманства: як Сірко здобув авторитет серед козаків, які цінували лише особисту хоробрість і військові успіхи.'
  - Чому його обирали кошовим більше десяти разів — унікальний випадок довіри у вкрай нестабільний час.
  section: 'Формування: Шлях до Булави'
  words: 1000
- points:
  - 'Тактика Сірка: блискавичні рейди в Крим як превентивні удари. Не оборона, а напад як найкращий захист.'
  - 'Звільнення невільників: військова, економічна та ідеологічна мета походів. Тисячі врятованих життів як головний результат.'
  - 'Сірко як гравець на політичній арені Руїни: союзи та конфлікти з Дорошенком, Самойловичем, московськими воєводами.'
  - Запорожжя як автономний центр сили, що не підкорявся повністю жодному гетьману.
  section: 'Діяльність: Майстер Рейдової Війни'
  words: 1300
- points:
  - '[!anti-hagiography] Сірко був не лише визволителем, але й жорстоким воїном. Масове знищення татарського населення, включно
    з жінками та дітьми, під час кримських походів.'
  - 'Політичний опортунізм: заслання до Сибіру за наказом царя за підтримку бунтівників, і тріумфальне повернення, коли він
    знову знадобився Москві.'
  - '[!myth-buster] Легендарний «лист турецькому султану» є фольклорним твором. Реальна дипломатія Сірка була набагато прагматичнішою
    та обережнішою.'
  - 'Критика сучасників: деякі гетьмани вважали Сірка неконтрольованим і шкідливим для централізованої держави, «отаманом
    розбійників».'
  section: 'Тінь: Жорстокість та Політичні Ігри'
  words: 900
- points:
  - 'Повернення до розминки: чи можна примирити образ «батька» і «демона» в одній людині? Що ми бачимо тепер?'
  - 'Спадщина Сірка: символ незламності духу та козацької волі, чи приклад того, як видатний талант може служити суперечливим
    цілям?'
  - 'Оборона Чигирина 1677–1678 рр. як лебедина пісня: останній великий подвиг, де Сірко виступив захисником усієї Гетьманщини.'
  - '[!decolonization] Переосмислення спадщини: від образу на картині Рєпіна до символу опору українського Степу будь-яким
    загарбникам.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The biography of Ivan Sirko, examining the tension between the historical figure and the mythologized "kharakternyk",
  his military tactics during the Ruin, his complex political maneuvering, and his ambiguous legacy.
level: BIO
module: bio-025
objectives:
- Критично аналізувати різницю між міфологічним образом Івана Сірка (характерник) та історичною постаттю (полководець, політик)
- Оцінювати військові стратегії Сірка (рейдова війна) в контексті епохи Руїни
- Формулювати аргументовану позицію щодо ролі Запорозької Січі як автономного центру сили
- Розпізнавати та деконструювати імперські наративи в зображенні української історії
