  - самоосвіта (self-education)
  - Буковина (Bukovyna)
  - новела (novella)
  - «нова жінка» (new woman)
  - патріархат (patriarchy)
  - психологізм (psychologism)
  recommended:
  - Ніцше (Nietzsche)
  - німецький романтизм (German Romanticism)
  - селянський епос (peasant epic)
  - листування (correspondence)
  - символізм (symbolism)
