- Аналізувати, як німецькомовне виховання та знайомство з європейською філософією вплинули на формування світогляду Кобилянської
- Критично оцінювати її спадщину, розрізняючи феміністичні ідеї, модерністську естетику та різні ідеологічні інтерпретації
- Пояснювати відмінність її психологічної прози від традиційної народницької літератури
- Формулювати аргументовану позицію щодо актуальності ідей Кобилянської в сучасному українському суспільстві
