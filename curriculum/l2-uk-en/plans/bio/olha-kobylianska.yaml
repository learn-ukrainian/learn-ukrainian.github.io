content_outline:
- points:
  - 'Провокація: Як німецькомовна донька австрійського урядовця, вихована на Гете і Шиллері, стала «гірською орлицею» української
    літератури та іконою фемінізму?'
  - 'Фрагмент без контексту: «Я не була ніколи селянкою, не жила їх життям, — отже, не бачила ані кривди, ані радощів». Хто
    і чому міг сказати це про авторку «Землі»?'
  - '[!biography]'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Надто німецька». Критика з боку сучасників-народовців (і навіть Франка) за її «відрив від народу», захоплення
    Ніцше та фокус на психології індивіда, а не на соціальних проблемах села.'
  - 'Дебат 2: «Приручення» феміністки. Як радянське літературознавство намагалося «де-фемінізувати» Кобилянську, представляючи
    її як «співачку селянської долі» і замовчуючи її європейськість та ідеї емансипації.'
  - '[!epistemic-humility] Визнання складності: Кобилянська — це і глибокий психологізм, і гостра соціальна критика. Її спадщина
    є полем боротьби для різних ідеологічних інтерпретацій.'
  - '[!decolonization]'
  section: 'Конфліктна карта: Європейська інтелектуалка чи народна письменниця?'
  words: 900
- points:
  - Народження в Гура-Гуморі (Південна Буковина) — мультикультурний котел Австро-Угорщини.
  - Німецькомовне виховання як стандарт для тогочасної еліти. Українська — мова «домашня», а потім — свідомий інтелектуальний
    вибір.
  - 'Самоосвіта через європейську літературу та філософію: Дарвін, Спенсер, і особливо Ніцше — як це сформувало її бунтарський
    дух «надлюдини».'
  - 'Поворотний пункт: знайомство з Софією Окуневською та входження в українське коло в Чернівцях. Боротьба за право бути
    українською письменницею.'
  section: 'Формування: Від німецької культури до української ідентичності'
  words: 1000
- points:
  - 'Маніфести «нової жінки»: повісті «Людина» та «Царівна» як психологічні портрети жінок, що прагнуть інтелектуальної та
    духовної свободи, а не просто шлюбу.'
  - Вершина творчості — «Земля». НЕ просто «селянський епос». Це модерністська трагедія про владу землі над людиною, розкрита
    через символізм та глибокий психологізм.
  - '«В неділю рано зілля копала»: блискуче використання фольклорних мотивів для дослідження вічних тем любові, зради та фатуму.'
  - 'Первинні джерела: аналіз її щоденників та листування з Лесею Українкою, Осипом Маковеєм для розуміння її творчої лабораторії.'
  section: 'Діяльність: Створення модерної української прози'
  words: 1300
- points:
  - '[!anti-hagiography] Елітарність її ранніх героїнь. Чи були ідеї «аристократизму духу» та ніцшеанської «надлюдини» зрозумілими
    та близькими загалу? Чи не було в цьому зверхності до «простих людей»?'
  - 'Особисті невдачі та компроміси: складні стосунки з Осипом Маковеєм. Як особиста драма впливала на її творчість, зокрема
    на зображення чоловіків?'
  - '[!myth-buster] Руйнування міфу про «самотню орлицю». Кобилянська була в центрі культурного життя, але її нонконформізм
    і високі вимоги часто призводили до конфліктів та розчарувань.'
  - Трагедія «Землі» як вирок? Чи не є це також свідченням її власного песимізму щодо можливості змін у патріархальному суспільстві,
    незважаючи на всі маніфести?
  section: 'Тінь: Ціна емансипації та ніцшеанства'
  words: 900
- points:
  - 'Повернення до розминки: Отже, як саме німецькомовна інтелектуалка перетворилася на стовп української літератури? Студент
    формулює відповідь, спираючись на знання про її свідомий вибір та синтез культур.'
  - 'Спадщина в умовах окупацій: творчість під час Першої світової та в період румунської анексії Буковини. Її роль як морального
    авторитету та символу незламності українського духу.'
  - '[!decolonization] Як її спадщину використовували різні режими — від австрійського до радянського — і як відбувається
    її «повернення» в сучасну українську культуру.'
  - 'Сучасна актуальність: чому її психологічна проза та ідеї самореалізації жінки звучать сьогодні гостріше й актуальніше,
    ніж сто років тому?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Olha Kobylianska's transformation from a German-speaking upbringing to a pioneer of Ukrainian modernism and feminism,
  her key psychological works ("Zemlya", "Tsarivna"), and the anti-hagiographical view of her Nietzschean influences and elite
  intellectualism.
