content_outline:
- points:
  - 'Парадокс: Пантелеймон Куліш стояв у трійці "Шевченко-Куліш-Костомаров", але сьогодні його знають значно менше. Чому творець
    українського правопису та перекладач Шекспіра і Біблії опинився в тіні?'
  - '[!biography] Куліш як "гаряча голова" українського романтизму: його характер був таким же елементом творення культури,
    як і його твори.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Куліш vs Шевченко і "молода громада". Чи був його "хуторянський" шлях єдиною вірною стратегією для
    України? Протистояння двох візій майбутнього.'
  - 'Дебат 2 (у спадщині): "Куліш нам чужий" (Донцов) vs "двигач і європейщик" (Зеров). Як оцінювати його загравання з російським
    імперіалізмом та консерватизм наприкінці життя?'
  - '[!epistemic-humility] Постать Куліша неможливо оцінити однозначно. Його внесок і його помилки настільки переплетені,
    що будь-яка оцінка буде неповною без визнання цих суперечностей.'
  - '[!decolonization] Радянська історіографія викреслювала Куліша як "буржуазного націоналіста", а російська імперська —
    як "мазепинця". Розгляд його фігури — це акт деколонізації української думки.'
  section: 'Конфліктна карта: Творець чи руйнівник?'
  words: 900
- points:
  - Дитинство на хуторі на Чернігівщині як джерело його філософії та ідеалізації "старосвітчини".
  - Освіта в Новгород-Сіверській гімназії та Київському університеті: формування інтелектуала.
  - Подорожі Європою та їх вплив: Куліш побачив, як працюють європейські нації, і захотів створити такий же механізм для України.
  - Участь у Кирило-Мефодіївському братстві та арешт: політичне хрещення, що визначило його подальшу обережність і водночас
      нонконформізм.
  section: 'Формування: Шлях від хутора до європейських столиць'
  words: 1000
- points:
  - '"Кулішівка": створення першого фонетичного правопису, що став основою сучасної української орфографії. Мовна революція.'
  - Перекладацька титанічна праця: переклад Шекспіра та Біблії, що доводило спроможність української мови обслуговувати найвищі
      сфери культури.
  - Видавнича діяльність: видання "Кобзаря" Шевченка, заснування журналу "Основа". Куліш як культурний продюсер.
  - 'Автор "Чорної ради": перший історичний роман українською мовою, що заклав канон української прози.'
  section: 'Діяльність: Архітектор модерної мови та культури'
  words: 1300
- points:
  - '[!anti-hagiography] Ідеалізація хутора як реакція на модернізацію: Куліш боявся, що "прогрес" знищить душу нації, і часом
    доходив до заперечення реальності.'
  - Конфліктність і зарозумілість: численні розриви з друзями (Шевченком, Костомаровим, молодою громадою) через нетерпимість
      до інших поглядів.
  - '[!myth-buster] Міф про "просвіченого європейця": наприкінці життя погляди Куліша ставали дедалі консервативнішими, він
    зневірився в українському народові та шукав компромісів з імперією.'
  - Ціна перекладів: звинувачення у "псуванні" мови, надмірному пуризмі та відриві від народного мовлення.
  section: 'Тінь: Хуторянський консерватизм та розрив із друзями'
  words: 900
- points:
  - Повернення до розминки: чому Куліш "програв" Шевченкові в народній пам'яті? Студент формулює відповідь, зважаючи на його
      складний характер і консервативні ідеї.
  - '[!decolonization] Внесок Куліша — це створення "високої" культури (література, наука, філософія) українською мовою як
    альтернативи російській імперській. Він будував культурний суверенітет.'
  - Сучасна актуальність: дебати навколо нового правопису, пошук балансу між пуризмом і народною мовою, дискусія про "європейський
      вибір" — усе це варіації тем, які першим підняв Куліш.
  - Його спадщина — це не пам'ятник, а вічна полеміка про те, якою має бути Україна.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'The paradox of Panteleimon Kulish: a Europeanizer who preached rural conservatism, an architect of the Ukrainian language
  who feuded with its greatest figures, and a nation-builder whose legacy is a source of constant debate.'
level: BIO
module: bio-040
objectives:
- Критично оцінювати роль Куліша як "архітектора" сучасної української культури, враховуючи його внесок і суперечливі рішення.
- Аналізувати філософію "хуторянства" як одночасно консервативну та модернізаторську стратегію для України XIX століття.
- Розуміти історичний вплив "кулішівки" та перекладацької діяльності Куліша на формування української національної ідентичності.
- Формулювати аргументовану позицію в дебатах про спадщину Куліша, використовуючи докази з його біографії та творчості.
