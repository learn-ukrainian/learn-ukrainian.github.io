content_outline:
- points:
  - 'Провокація: як написати біографію людини, про існування якої немає надійного документа, але чий образ століттями живе в українській пісні, літературі та міській пам''яті?'
  - '[!biography] Цей модуль досліджує не встановлений життєпис, а біографію культурної легенди: як ім''я Марусі Чурай пов''язали з пісенною традицією, Полтавою та жіночим голосом.'
  - '[!epistemic-humility] Дати 1625–1653, батько Гордій Чурай, кохання до Гриця, суд, смертний вирок і помилування Хмельницького належать до переказу та літературних реконструкцій, а не до доведеної біографії.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: відсутність документа не стирає української культурної пам''яті; Чурай функціонує як важливий образ піснетворки, Полтави та жіночого авторства.'
  - 'Позиція 2: культурна значущість не перетворює переказ на факт; категорична біографія привласнює народній традиції вигаданого індивідуального автора й приховує роботу поколінь виконавців.'
  - '[!epistemic-humility] У кожному твердженні позначаємо режим доказу: документовано, за легендою, традиційно приписують, літературно переосмислено або сучасно вшановано.'
  - '[!decolonization] Українську усну традицію не оголошуємо похідною від російського романтизму; водночас російсько-імперські тексти не приймаємо як нейтральні свідчення про XVII століття.'
  section: 'Конфліктна карта: Історична особа чи культурна легенда?'
  words: 900
- points:
  - 'Сильна нижня межа знання: ім''я Чурай пов''язане з Полтавою та корпусом популярних українських пісень у пізнішій традиції, але сучасного Марусі рукопису, запису судової справи або надійного прижиттєвого свідчення не встановлено.'
  - 'Пісенні атрибуції формулюємо тільки як традицію: «Ой не ходи, Грицю», «Віють вітри» та інші назви не стають документовано авторськими творами через повторення в довідниках.'
  - 'Фольклорний твір живе у варіантах і виконавській передачі; пошук єдиного автора може бути пізнішою культурною потребою, а не властивістю самого усного побутування.'
  - 'Полтавський локус важливий як простір пам''яті: місто вшановує Чурай у назвах, пам''ятнику й культурних подіях, але ці об''єкти свідчать про рецепцію, не про зовнішність чи точну біографію.'
  section: 'Формування: Усна традиція, Полтава й приписувані пісні'
  words: 1000
- points:
  - 'У XIX столітті романтична література кодифікувала докладний сюжет про піснетворку, кохання, отруєння, суд і помилування. Переповідаємо його як історію текстів, а не як архівну хроніку.'
  - 'Російський імперський ярлик із назви повісті 1839 року подаємо лише як цитований об''єкт критики: він зменшував Україну до «малоросійської» провінції та вписував український жіночий голос у чужу класифікацію.'
  - 'Не стверджуємо, що імперський автор «створив» українську пісенну традицію. Коректніше: його текст допоміг закріпити одну персоналізовану версію легенди й претендував на історичність без достатньої доказової бази.'
  - 'Українські автори — від Боровиковського, Старицького й Кобилянської до Ліни Костенко — по-різному переосмислювали сюжет. Кожен художній твір є рецепцією, а не заміною джерела.'
  section: 'Діяльність образу: Як література створювала життєпис'
  words: 1300
- points:
  - '[!anti-hagiography] Псевдодокументальний універсал про помилування та докладний судовий сюжет не можна цитувати як акт канцелярії Хмельницького без перевіреного архівного оригіналу.'
  - 'Радянська популяризація розширювала образ зрадженої пісенної героїні до офіційної патріотичної авторки, а Гриця могла перетворювати на ідеологічного ворога. Це пропагандистська рецепція, не XVII століття.'
  - 'Зворотна небезпека — відповісти на імперську брехню бездоказовою національною біографією. Деколонізація тут означає повернути українській традиції суб''єктність і водночас чесно назвати межі знання.'
  - 'Популярні сторінки можуть спершу переказувати легенду докладно, а лише потім повідомляти, що документів немає. Учень має бачити цю риторичну пастку й перевіряти статус кожного абзацу.'
  section: 'Тінь: Імперська й радянська переробка легенди'
  words: 900
- points:
  - 'Ліна Костенко у 1979 році опублікувала окремий авторський історичний роман у віршах «Маруся Чурай». Його героїня не є документальним доказом існування історичної Чурай.'
  - 'Роман, театральні постановки, українська марка 2000 року й полтавський пам''ятник 2006 року показують, як легенда стала мовою культурної пам''яті.'
  - 'Повернення до розминки: біографія легенди може бути точнішою за вигаданий життєпис, бо пояснює, хто, коли й навіщо надавав образові нових рис.'
  - 'Фінальна вправа: створити таблицю «твердження — режим доказу — джерело — безпечне формулювання» і не залишити жодної категоричної атрибуції без доказу.'
  section: 'Дискусія та підсумок: Від пісенної традиції до Ліни Костенко'
  words: 700
focus: Маруся Чурай як напівлегендарна українська піснетворка й культурний образ, чий документально не встановлений життєпис потрібно відділяти від традиційних пісенних атрибуцій, російсько-імперської та радянської переробки, української літературної рецепції й сучасної полтавської пам'яті.
