content_outline:
- points:
  - 'Провокація: Бортнянський — творець "російського" класичного стилю, але чи міг він з''явитися без української музичної
    традиції? Парадокс композитора, що став символом імперії, яка намагалася знищити його власну культуру.'
  - '[!biography] Його називали "російським Моцартом", але народився і здобув початкову освіту він у Глухові — столиці українського
    гетьманату.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Прижиттєва слава. Як його сприймали сучасники в Європі ("італійський маестро") та в Російській імперії ("наш
    Орфей")? Чи піднімалося питання його українського походження?'
  - 'Дебат 2: Посмертне привласнення. Радянська та російська музикологія представляла його як "великого російського композитора".
    Сучасна українська наука повертає його в контекст української культури та колоніальних студій.'
  - '[!epistemic-humility] Оцінки його ролі коливаються від "жертви імперії" до "свідомого колаборанта". Де правда?'
  - '[!decolonization] Аналіз музики Бортнянського як інструменту "м''якої сили" імперії та русифікації церковного співу.'
  section: 'Конфліктна карта: Українець чи імперець?'
  words: 900
- points:
  - Глухів як "музична академія" Гетьманщини. Вплив українського партесного співу та народної мелодики.
  - '"Полювання за голосами": як імперія систематично забирала найкращі українські таланти до Придворної співацької капели
    в Петербурзі.'
  - Навчання в Італії у Бальдассаре Галуппі, одного з найвидатніших композиторів епохи. Успіх його опер "Креонт" та "Алкід"
    на італійській сцені.
  - Повернення до Петербурга не як провінціал, а як європейський митець.
  section: 'Формування: Від Глухова до Венеції'
  words: 1000
- points:
  - Призначення директором Придворної співацької капели — найвища музична посада в імперії, яку він обіймав майже 30 років.
  - 'Реформа церковного співу: встановлення "Бортнянського стандарту" — єдиного стилю співу, що забороняв стару українську
    традицію і був обов''язковим по всій імперії.'
  - Створення жанру духовного хорового концерту — циклічного твору a cappella, що став вершиною його творчості ("Не отвержи
    мене во время старости").
  - 'Світська музика: опери для придворного театру ("Сокіл", "Син-суперник"), інструментальні твори, романси.'
  section: 'Діяльність: Маестро імператорської капели'
  words: 1300
- points:
  - '[!anti-hagiography] Служба імперії, яка в той самий час ліквідувала залишки української автономії (скасування Гетьманщини,
    знищення Запорізької Січі).'
  - Отримавши посаду директора капели, він добився монополії на видання духовної музики, фактично заборонивши друкувати твори
    конкурентів, зокрема Максима Березовського.
  - '[!myth-buster] Міф про "порятунок" української музики. Його реформа уніфікувала церковний спів за західноєвропейським
    зразком, витісняючи та маргіналізуючи автентичні українські розспіви.'
  - Майже повна відсутність українських національних мотивів у творчості — це свідомий вибір, художній принцип "високого класицизму"
    чи результат самоцензури?
  section: 'Тінь: Ціна успіху'
  words: 900
- points:
  - 'Повернення до розминки: Отже, Бортнянський — жертва імперії чи її співтворець? Студент формулює власну аргументовану
    позицію.'
  - '[!decolonization] Його спадщина — це не лише геніальна музика, а й складна історія про талант, компроміс та культурне
    привласнення. Чому важливо повернути його ім''я в пантеон української культури?'
  - 'Сучасне значення: як сьогодні виконувати музику Бортнянського, усвідомлюючи всю складність його біографії? Дискусія про
    "деколонізацію" класичної музики.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Dmytro Bortnyanskyy as a case study of cultural appropriation, the role of Ukrainian talent in the Russian
  Empire, and the creation of an "imperial classical" style.
level: BIO
module: bio-035
objectives:
- Аналізувати життя та спадщину Дмитра Бортнянського в контексті культурного привласнення імперією
- Розрізняти українські та італійські впливи на творчість композитора
- Оцінювати роль Бортнянського у реформуванні церковної музики та наслідки цієї реформи для української традиції
- Формулювати аргументовану позицію щодо "тіньових" аспектів кар'єри митця в умовах імперії
