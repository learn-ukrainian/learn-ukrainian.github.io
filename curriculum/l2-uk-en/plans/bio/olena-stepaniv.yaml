module: bio-099
objectives:
- Аналізувати життєвий шлях Олени Степанів, виходячи за межі агіографічного образу, згідно з принципом анти-агіографії
- Критично оцінювати її роль як у визвольних змаганнях, так і в науці, враховуючи історичний контекст та гендерні стереотипи
  епохи
- Простежити, як радянська система намагалася стерти її спадщину, та як її постать була переосмислена в незалежній Україні
  в рамках деколонізації
- Формулювати аргументовану позицію в дебатах про її спадщину, розрізняючи історичні факти, ідеологічні інтерпретації та сучасні
  проєкції
