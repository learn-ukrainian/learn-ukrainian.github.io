content_outline:
- points:
  - 'Парадокс: У 1914 році, коли жінкам у більшості країн Європи відмовляли у виборчому праві, українка Олена Степанів отримала
    офіцерське звання та срібну медаль за хоробрість. Як це стало можливим у патріархальному світі, і чому її історія — не
    просто успіх?'
  - '[!biography] Представлення Олени Степанів не як ікони, а як складної постаті, чий життєвий шлях руйнує стереотипи про
    "жіночу долю".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Реакція сучасників. Для командування УСС — цінний боєць та приклад для наслідування. Для суспільства — сенсація,
    що порушувала традиційні гендерні ролі. Чи була вона прийнята як рівна серед чоловіків-офіцерів?'
  - 'Дебат 2: Боротьба за спадщину. Радянська пропаганда — "буржуазна націоналістка", її ім''я викреслено з історії. Сучасний
    дискурс — ікона фемінізму vs. символ національно-визвольної боротьби. Чи не спрощують обидві позиції її реальну біографію?'
  - '[!epistemic-humility] Аналіз мемуарів та преси того часу, що показують спектр думок — від захоплення до скепсису.'
  - '[!decolonization] Як радянська історіографія спочатку замовчувала, а потім маргіналізувала постаті УСС, особливо жінок,
    щоб створити міф про "єдиний радянський народ".'
  section: 'Конфліктна карта: Символ фемінізму чи військовий виняток?'
  words: 900
- points:
  - 'Соціальний контекст: Львів кінця XIX ст. — "маленький Відень", центр українського національного відродження в Австро-Угорщині.'
  - 'Освіта: Навчання у Львівському університеті на філософському факультеті. Як вища освіта сформувала її світогляд та амбіції.'
  - 'Громадська діяльність: Членство в товариствах «Сокіл» та «Пласт». Це була не просто розвага, а парамілітарна та патріотична
    підготовка, що стала фундаментом для майбутньої військової кар''єри.'
  - 'Формативний досвід: Рішення вступити до лав Січових Стрільців як свідомий вибір, а не випадковість — кульмінація її довоєнного
    життя.'
  section: 'Формування: Донька Галичини (1892-1914)'
  words: 1000
- points:
  - 'Бойовий шлях: Участь у ключових битвах Першої світової на боці УСС, зокрема в Карпатах (г. Маківка). Бойове хрещення,
    поранення, отримання офіцерського звання хорунжої.'
  - 'Первинні джерела: Аналіз її власних спогадів "Нариси з часів Світової Війни", де вона описує не героїзм, а побут, страх
    та щоденну рутину війни.'
  - 'Полон та повернення: Російський полон (1915-1917) як досвід, що перевірив її на міцність. Служба в Українській Галицькій
    Армії (УГА) під час визвольних змагань 1918-1921 рр.'
  - 'Перехід до науки: Після поразки визвольних змагань — вимушена зміна діяльності. Захист докторської дисертації з географії
    у Відні, викладання, наукова робота. Демонстрація інтелектуальної, а не лише військової доблесті.'
  section: 'Діяльність: Від гори Маківка до наукової кафедри (1914-1939)'
  words: 1300
- points:
  - '[!anti-hagiography] Життя Степанів — не суцільний тріумф. Це історія про втрати. Поразка УНР та УГА була її особистою
    трагедією.'
  - 'Радянські репресії: Арешт НКВС у 1949 році. Звинувачення в "антирадянській діяльності". 10 років таборів у Мордовії.
    Це не "епізод", а центральна подія її пізнього життя, що показує долю багатьох представників її покоління.'
  - '[!myth-buster] Міф про "щасливе повернення". Після звільнення їй було заборонено займатися науковою діяльністю та проживати
    у Львові. Це було повільне "стирання" особистості системою.'
  - 'Особиста ціна: Шлюб із полковником УГА Романом Дашкевичем, народження сина. Як її громадська та військова діяльність,
    а потім і репресії, вплинули на сім''ю? Трагедія матері, розлученої з сином.'
  section: 'Тінь: Ціна вибору (1939-1963)'
  words: 900
- points:
  - 'Повернення до розминки: Маючи повну картину, студент може пояснити парадокс її кар''єри — поєднання унікальних обставин
    (піднесення українського руху) та виняткових особистих якостей.'
  - 'Оцінка спадщини: Внесок у військову історію, жіночий рух та українську географію. Її життя демонструє нерозривний зв''язок
    між національною боротьбою та інтелектуальним розвитком.'
  - '[!decolonization] Її постать як потужний контраргумент російській пропаганді про "неіснування" української нації та армії
    до 1991 року.'
  - 'Сучасне значення: Чому Олена Степанів є рольовою моделлю для сучасних захисниць України? Що її досвід говорить про стійкість
    та ціну боротьби за свободу?'
  section: 'Дискусія та підсумок: Спадщина першої офіцерки'
  words: 700
focus: 'Olena Stepaniv as a case study in anti-hagiography: the first female Ukrainian officer, her combat experience in WWI,
  subsequent scientific career, and eventual persecution by the Soviet regime. Explores the conflict between her role as a
  national hero, a feminist symbol, and the harsh realities of her life.'
