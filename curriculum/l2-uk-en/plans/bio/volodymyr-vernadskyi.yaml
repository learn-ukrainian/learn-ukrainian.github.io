objectives:
- Аналізувати концепцію ноосфери та її відмінність від біосфери, застосовуючи ці поняття до сучасних проблем
- Оцінювати складну роль Вернадського у заснуванні Української академії наук в контексті його роботи в Російській імперії
  та СРСР
- Дискутувати про етичні компроміси вченого в умовах тоталітарного режиму на основі біографії Вернадського
- Формулювати аргументовану позицію щодо суперечливих аспектів спадщини Вернадського, уникаючи агіографії чи засудження
