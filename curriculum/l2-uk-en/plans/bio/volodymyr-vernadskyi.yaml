content_outline:
- points:
  - 'Парадокс Вернадського: Як засновник Української академії наук і патріот міг повернутися до СРСР і працювати на радянську
    систему, що знищила українську незалежність?'
  - '[!biography] Коротка цитата з його щоденника про Україну, подана без коментаря, щоб заінтригувати студента.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Національна ідентичність. Вернадський — український патріот (козацьке коріння, засновник УАН) чи російський
    ліберальний інтелектуал, продукт імперії?'
  - 'Дебат 2: Радянська vs. українська апропріація спадщини. Як СРСР "деукраїнізував" Вернадського, і як сучасна Україна перетворила
    його на національний символ (1000 грн)?'
  - '[!epistemic-humility] Визнання, що його світогляд був складним, глобальним і не вписувався в прості національні рамки,
    що робить його постать предметом суперечок.'
  section: 'Конфліктна карта: Патріот, імперець чи "людина планети"?'
  words: 900
- points:
  - 'Формування ідентичності: козацьке походження, аристократичне російське виховання, європейська освіта — три світи, що
    сформували його.'
  - 'Інтелектуальний контекст: стан світової науки на поч. XX ст., перехід від вузької спеціалізації до системного мислення.'
  - 'Політичний контекст: робота в Російській імперії, участь у боротьбі за українську державність (1917–1921) та заснування
    УАН як політичний та науковий акт.'
  section: 'Формування: Від козацького роду до планетарного мислителя'
  words: 1000
- points:
  - 'Наукова революція: вчення про біосферу як глобальну живу систему, що об''єднує геологію, біологію та хімію.'
  - 'Філософський прорив: концепція ноосфери — "сфери розуму" — як нового етапу еволюції Землі, керованого людською думкою.'
  - 'Фундаментальні дослідження: внесок у геохімію та радіогеологію, що заклали основи атомного проєкту.'
  - 'Державотворення: роль у заснуванні та керівництві Українською академією наук (1918) — інституційний фундамент української
    науки.'
  section: 'Діяльність: Ноосфера та Академія'
  words: 1300
- points:
  - '[!anti-hagiography] Повернення до СРСР у 1926 році — свідомий вибір роботи в умовах диктатури. Мовчання під час сталінських
    репресій та Голодомору.'
  - 'Ціна прогресу: його дослідження з радіогеології стали основою для радянського атомного проєкту. Чи усвідомлював він наслідки?'
  - '[!myth-buster] Розвінчання міфу про "аполітичного вченого". Його щоденники показують глибоке розуміння політичних процесів,
    що робить його мовчання ще більш складним питанням.'
  - 'Критика сучасників: як українська еміграція та колеги-вчені ставилися до його повернення та роботи на радянську владу?'
  section: 'Тінь: Наука та компроміс з тоталітаризмом'
  words: 900
- points:
  - 'Повернення до розминки: аналіз парадоксу Вернадського з урахуванням його прагнення реалізувати масштабні наукові проєкти,
    які були неможливі без ресурсів великої держави.'
  - '[!decolonization] Переоцінка спадщини: від радянського "великого російського вченого" до українського мислителя світового
    масштабу.'
  - 'Сучасна актуальність: вчення про біосферу та ноосферу в епоху глобальних екологічних криз — пророцтво чи науковий прогноз?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
