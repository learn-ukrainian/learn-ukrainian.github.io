content_outline:
- points:
  - >-
    [!biography] Знайомство з Павлом Тичиною: поет народився 23 січня 1891 року
    в Пісках на Чернігівщині й помер 16 вересня 1967 року в Києві.
  - >-
    Провокаційне питання: як автор «Соняшних кларнетів» став автором і посадовцем,
    чию пізнішу працю радянські інституції використовували в офіційній культурі?
  section: Розминка
  words: 400
- points:
  - >-
    Родинний і освітній контекст: батько Григорій Тичинін був сільським псаломщиком
    і неоплачуваним учителем; мати Марія Савицька виховувала велику родину з
    дванадцятьма дітьми.
  - >-
    Шлях навчання: земська початкова школа в Пісках від 1897 року, Чернігівське
    духовне училище, Чернігівська духовна семінарія та економічний факультет
    Київського комерційного інституту в 1913-1917 роках.
  - >-
    Рання читацька пам'ять: учителька Серафима Морачевська дала хлопцеві "Байки"
    Леоніда Глібова і "Під землею" Бориса Грінченка; ці книжки відкрили українське
    слово поза імперською школою.
  - >-
    Дебют 1912 року: "Ви знаєте, як липа шелестить" з'явився в
    "Літературно-науковому віснику" завдяки Михайлові Грушевському після того,
    як Михайло Коцюбинський переслав рукопис.
  section: 'Формування: Піски, Чернігів і перша музика слова'
  words: 1000
- points:
  - >-
    "Соняшні кларнети" 1918 року, видані 1919 року, як підстава музичної
    поетики раннього Тичини: поєднання українського символізму, експресіонізму
    та синестезії.
  - >-
    Ранні книжки "Плуг", "Замість сонетів і октав" та "В космічному оркестрі"
    показують, що Тичина шукав модерну мову для революційної доби до прямого
    партійного диктату.
  - >-
    [!decolonization] Поему «Прометей» слід читати в контексті ранніх пошуків
    Тичини, не приписуючи їй неперевіреної першості серед антитоталітарних творів
    і не перетворюючи пізнішу траєкторію автора на наперед визначений вирок.
  - >-
    "Вітер з України" 1924 року, присвячений Миколі Хвильовому, фіксує близькість
    до модерністського кола ВАПЛІТЕ до остаточного згортання свободи.
  - >-
    Незавершена поема у формі симфонії "Сковорода", над якою Тичина працював
    понад двадцять років, дає матеріал для питання про пізнє повернення
    мистецького сумління.
  section: 'Діяльність: Музична поетика, модернізм і ранній спротив'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Тичина не був розстріляний чи засланий, але його біографія
    містить документовані епізоди тиску, офіційні посади й ідеологічно узгоджені
    видання. Ці різні факти не зводимо до однієї психологічної формули.
  - >-
    Весна 1923 року: ДПУ заарештувало брата Євгена, регента церковного хору в
    Новій Басані, і змусило Тичину підписати письмову гарантію, що брат не виїде
    без дозволу ДПУ.
  - >-
    1927-1928 роки: участь у ВАПЛІТЕ поруч із Хвильовим, Кулішем, Рильським,
    Йогансеном, Любченком і Бажаном; напад на твір "Чистила мати картоплю" із
    звинуваченням у "буржуазному націоналізмі".
  - >-
    Еміграційна критика траєкторії Тичини існувала, але урок не відтворює
    приписуваних Олександрові Олесю рядків без точного видання і локатора.
  - >-
    Збірки початку 1930-х років розглядаються як зміна публічного письма; її не
    зводимо до однієї психологічної причини й не повторюємо оцінних формул без
    точного джерела.
  - >-
    21 листопада 1933 року твір «Партія веде» надруковано в газеті «Правда»;
    НБУВ окремо каталогізує однойменну книжку 1935 року. Дати документа і видання
    не змішуємо та не виводимо з них єдиного пояснення авторської мотивації.
  - >-
    Подальша абсорбція: переїзд до Києва в 1934 році, життя в Роліті, керівництво
    Інститутом літератури АН УРСР, Сталінська премія 1941 року, посада народного
    комісара освіти, вступ до ВКП(б) у 1944 році та текст гімну УРСР.
  - >-
    [!epistemic-humility] Перевірений пакет не розв'язує суперечливих тверджень
    про ставлення Тичини до шістдесятників, тому урок їх не подає як факт.
  section: 'Тінь: Документований примус і офіційні посади'
  words: 1600
- points:
  - >-
    Центральна суперечка: як оцінювати публічні тексти й посади, коли документи
    засвідчують тиск, але не дають прямого доступу до кожного приватного мотиву?
  - >-
    Особовий фонд Тичини в ЦДАМЛМ налічує рукописи, листування, біографічні та
    службові матеріали. Архівний склад дає змогу перевіряти публічну траєкторію,
    але сам по собі не встановлює внутрішніх мотивів поета.
  - >-
    [!myth-buster] Привласнення Тичини російською пропагандою або ностальгією
    за СРСР як "радянського" поета треба відкидати, не перетворюючи його
    натомість на безгрішного мученика.
  - >-
    Підсумкове завдання: читати ранній музичний модернізм, пізню службову поезію
    і щоденникову та критичну традицію як одну складну біографію примусу.
  section: 'Підсумок: Між раннім модернізмом і офіційним статусом'
  words: 1000
focus: >-
  Павло Тичина як поет музичного модернізму, учасник кола ВАПЛІТЕ і приклад радянської
  інституційної кооптації. Семінар зіставляє ранню художню свободу,
  тиск 1923-1933 років і пізню роль офіційного лауреата без спрощення до
  зради чи мучеництва.
level: BIO
module: bio-247
objectives:
- Аналізувати ранню поетику Тичини через музичність, синестезію та модерністське коло 1910-1920-х років.
- >-
  Пояснювати механізм радянського тиску від арешту Євгена Тичини у 1923 році
  до публікації "Партія веде" 21 листопада 1933 року.
- Критично порівнювати "Соняшні кларнети", "Прометей", "Чернігів" і "Партія веде" як етапи однієї трагічної біографії.
- Оцінювати документовані факти без глорифікації Тичини й без виправдання радянського примусу.
