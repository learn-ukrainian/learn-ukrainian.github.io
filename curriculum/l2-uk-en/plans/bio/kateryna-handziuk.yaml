content_outline:
- points:
  - 'Парадокс: Як трагічна загибель однієї активістки, що стала кульмінацією безкарності, перетворилася на найпотужніший каталізатор
    боротьби з корупцією в сучасній Україні?'
  - '[!biography] Катерина Гандзюк — символ, який виник не завдяки, а всупереч системі, яку вона намагалася змінити.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ким була Гандзюк за життя? Для одних — принципова чиновниця, що боролася з корупцією зсередини міської ради.
    Для опонентів — радикальна «вулична» активістка, що руйнувала місцеві еліти.'
  - 'Дебат 2: Як використовується її ім''я після смерті? Символ громадського руху за справедливість («Хто замовив Катю Гандзюк?»)
    vs політичний інструмент у боротьбі за владу.'
  - '[!epistemic-humility] Оцінки її діяльності за життя були полярними, що відображало глибокий конфлікт між старими регіональними
    «феодальними» структурами та новим громадянським суспільством.'
  section: 'Конфліктна карта: Героїня чи радикал? Боротьба за спадщину'
  words: 900
- points:
  - Дитинство та освіта в Херсоні: зростання в середовищі, де формувалися нові пострадянські еліти.
  - Рання політична діяльність: від участі в Помаранчевій революції до роботи в місцевих органах влади.
  - 'Формативний досвід: усвідомлення того, що корупція в регіонах — це не просто злочини, а цілісна система, що контролює
    правоохоронні органи, медіа та бізнес.'
  - 'Переломний момент: перехід від політичної діяльності до відкритого громадського активізму як єдиного способу протистояти
    системі.'
  section: 'Формування: Шлях до активізму'
  words: 1000
- points:
  - 'Головне досягнення: створення прецеденту, коли вбивство активіста не вдалося «зам''яти».'
  - 'Акція «Хто замовив Катю Гандзюк?»: перетворення особистої трагедії на всеукраїнський рух, що вимагав реформи правоохоронних
    органів.'
  - 'Вплив на міжнародну спільноту: справа Гандзюк привернула увагу до системної проблеми нападів на активістів в Україні.'
  - '[!decolonization] Боротьба Гандзюк проти місцевих кланів — це форма деколонізації, звільнення від пострадянських практик
    «феодалізму» та безкарності.'
  section: 'Діяльність: Пробудження суспільства'
  words: 1300
- points:
  - 'Напад 31 липня 2018 року: не випадковість, а закономірний наслідок багаторічної бездіяльності та корумпованості правоохоронної
    системи.'
  - '[!anti-hagiography] Трагедія Гандзюк — це історія провалу держави, яка не змогла захистити свою громадянку від тих, хто
    мав би бути під її контролем.'
  - 'Хід розслідування: саботаж, тиск, спроби вивести з-під удару замовників. Справа оголила глибоку кризу довіри до судів
    та прокуратури.'
  - '[!myth-buster] Міф про те, що Революція Гідності миттєво очистила систему. Справа Гандзюк довела, що старі схеми та зв''язки
    збереглися, особливо на регіональному рівні.'
  section: 'Тінь: Ціна правди: Безкарність і система'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь на парадокс, використовуючи знання про системну корупцію
    та силу громадянського суспільства.'
  - 'Спадщина як прецедент: після справи Гандзюк суспільство та журналісти почали значно прискіпливіше стежити за нападами
    на активістів.'
  - 'Спадщина як мережа: ініціатива «Хто замовив Катю Гандзюк?» породила нову генерацію активістів та правозахисних організацій.'
  - 'Сучасна релевантність: чи змінилася система через 8 років? Обговорення сучасних кейсів та рівня безкарності в Україні.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Kateryna Handziuk's biography as a case study of anti-corruption activism in post-Maidan Ukraine, the systemic impunity
  for attacks on activists, and the civil society movement sparked by her murder.
level: BIO
module: bio-169
objectives:
- Аналізувати справу Катерини Гандзюк як приклад системної кризи правоохоронних органів та інституту безкарності в Україні.
- Розрізняти офіційні версії слідства та висновки незалежних журналістських розслідувань.
- Критично оцінювати роль громадянського суспільства як механізму контролю за владою.
- Формулювати аргументовану позицію щодо довгострокового впливу справи Гандзюк на політичну культуру та правосвідомість в
  Україні.
