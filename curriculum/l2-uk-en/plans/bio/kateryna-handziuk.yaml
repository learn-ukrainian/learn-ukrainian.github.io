content_outline:
- points:
  - 'Джерельне питання: як розповісти про Катерину Гандзюк, не зводячи її життя до нападу й не перетворюючи судове повідомлення на остаточний вирок?'
  - Біографічна ретроспектива 2018 року й судове оновлення 2025 року мають різні часові горизонти.
  - '[!biography] Освіта, громадська та місцева політична діяльність за прямими матеріалами.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: як громадська діяльність у Херсоні описана через конкретні посади, організації й дати?'
  - 'Дебат 2: чим відрізняються напад, обвинувачення, вирок першої інстанції, апеляція та виконання покарання?'
  - '[!epistemic-humility] Не встановлювати замовника, мотив або остаточну винуватість понад чинний процесуальний статус.'
  - '[!decolonization] Херсонська громадянська суб''єктність розглядається конкретно, а не як периферійний додаток до київської політики.'
  section: 'Конфліктна карта: Активізм, напад і правовий статус'
  words: 900
- points:
  - Народження 17 червня 1985 року в Херсоні та три освітні траєкторії за «Українською правдою».
  - Участь у Помаранчевій революції, робота в громадських організаціях і співзаснування агенції «МОСТ» як датовані факти.
  - Участь у Революції Гідності в Херсоні, допомога переселенцям і робота у сфері місцевого самоврядування.
  - Політичні посади називати точно, не перетворюючи партійну належність на повний опис поглядів.
  section: 'Формування: Херсонська громадська й політична діяльність'
  words: 1000
- points:
  - Напад 31 липня 2018 року та смерть 4 листопада 2018 року подаються без графічних подробиць.
  - Матеріал 2018 року є ранньою ретроспективою; його правові формулювання не оновлюються автоматично.
  - Датований матеріал Суспільного 17 червня 2025 року описує спогади родини й тодішній стан апеляційного розгляду.
  - Кожне ім'я в судовому контексті супроводжується точним статусом і датою.
  section: 'Діяльність і справа: Від місцевої політики до судового процесу'
  words: 1300
- points:
  - '[!anti-hagiography] Громадянська відвага не робить кожне політичне рішення безпомилковим; оцінюють конкретні дії та джерела.'
  - '[!myth-buster] Формула «всі винні відомі» не замінює судової процедури й не дозволяє призначати відповідальність без доказу.'
  - Вирок першої інстанції та його апеляційний перегляд не можна зливати в один безчасовий факт.
  - Фото акції пам'яті 2019 року не є портретом Гандзюк; підпис має точно називати подію.
  section: 'Межі джерел: Версія, вирок і апеляція'
  words: 900
- points:
  - Таблиця «подія — автор повідомлення — дата — процесуальний статус — що лишається відкритим».
  - Порівняння біографічного добору 2018 року з оновленням Суспільного 2025 року.
  - '[!decolonization] Локальна політика Херсона подається як простір українського громадянського життя з власними діячами й конфліктами.'
  - Висновок про пам'ять і правову відповідальність без сенсаційності та припущень про мотив.
  section: 'Дискусія та підсумок: Пам''ять і незавершене правове питання'
  words: 700
focus: Джерельно дисциплінований аналіз громадської діяльності Катерини Гандзюк, нападу на неї та датованого стану судової справи.
level: BIO
module: bio-191
objectives:
- Побудувати атрибутовану хронологію освіти, громадської діяльності й роботи Катерини Гандзюк у місцевому самоврядуванні.
- Розрізняти напад, підозру, обвинувачення, вирок першої інстанції, апеляцію та виконання покарання.
- Порівняти біографічну ретроспективу 2018 року з датованим судовим оновленням Суспільного 2025 року.
- Формулювати висновки про громадянську пам'ять без приписування мотивів і без порушення презумпції невинуватості.
