content_outline:
- points:
  - >-
    [!biography] Геннадій Афанасьєв — кримський громадський активіст, фотограф,
    колишній політичний в'язень Кремля, а згодом — український військовий (позивний "Тор"),
    який загинув за Україну.
  - >-
    Його шлях уособлює безперервну боротьбу: від мирного спротиву окупації Криму
    до загибелі зі зброєю в руках на Луганщині у 2022 році.
  section: Розминка
  words: 400
- points:
  - >-
    Події 2014 року: окупація Криму та участь Афанасьєва у проукраїнських акціях
    у Сімферополі. Роль активістів, які не були кримськими татарами, у загальному спротиві.
  - >-
    Арешт у травні 2014 року ФСБ. Включення його до сфабрикованої справи так званої
    "групи кримських терористів" (разом із Олегом Сенцовим та Олександром Кольченком).
  - >-
    [!decolonization] Звинувачення у "тероризмі" були інструментом Росії для
    криміналізації будь-якої української ідентичності та незгоди в Криму.
  section: 'Початок окупації та сфабрикована справа'
  words: 1000
- points:
  - >-
    Механізм примусу: жорстокі тортури, через які ФСБ вибивала свідчення проти інших
    фігурантів справи.
  - >-
    Переломний момент: публічна відмова від вибитих свідчень у залі ростовського суду
    в 2015 році. Афанасьєв, перебуваючи в руках ворога, заявив, що дав свідчення під тиском.
  - >-
    [!myth-buster] Цей вчинок зруйнував архітектуру звинувачення "справи Сенцова" і
    показав світові, як саме створювалися "докази" у російських судах.
  section: 'Тінь: "Справа Сенцова" та відмова від свідчень'
  words: 1600
- points:
  - >-
    Звільнення (обмін) у червні 2016 року. Афанасьєв не зупиняється: "Зараз я хочу
    вступити у боротьбу, щоб звільнити ще 29 політичних в'язнів."
  - >-
    Вихід мемуарів "Піднятися після падіння". Аналіз концепту російської в'язниці
    як мікросвіту з власними законами знищення людської гідності.
  - >-
    Повномасштабне вторгнення 2022 року: Афанасьєв приєднується до Київської
    територіальної оборони, а потім вирушає на східний фронт.
  section: 'Діяльність: Від бранця до адвоката в''язнів та воїна'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Загибель у грудні 2022 року під Білогорівкою (Луганська область).
    Його смерть є фактом втрати, а не просто "героїчною розв'язкою".
  - >-
    Присвоєння звання Герой України (2025) як фіксація його внеску на державному рівні.
  - >-
    Підсумок: Геннадій Афанасьєв довів, що свідчення, дані під тортурами, можна
    скасувати силою волі, і що боротьба політв'язня продовжується навіть після звільнення.
  section: 'Підсумок: Піднятися після падіння'
  words: 1000
focus: >-
  Геннадій Афанасьєв як символ громадянської мужності: кримський активіст, який зруйнував
  "справу Сенцова" у російському суді, захисник політв'язнів і військовий, що віддав
  життя за Україну.
