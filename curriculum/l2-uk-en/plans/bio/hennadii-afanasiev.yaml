  - >-
    [!biography] Знайомство з Геннадієм Афанасьєвим: кримський громадський активіст,
    фотограф, фігурант сфабрикованої справи та колишній політичний бранець.
  - >-
    Провокаційне питання: чому окупаційній владі необхідна ілюзія "терористичних
    груп" для придушення мирного громадянського спротиву?
  section: Розминка
  words: 400
- points:
  - >-
    Крим навесні 2014 року: участь Афанасьєва у проукраїнських акціях протесту.
    Громадська активність як форма захисту ідентичності.
  - >-
    [!decolonization] Спротив окупації: руйнування міфу про "безкровне"
    та "одностайне" приєднання півострова. Роль місцевих активістів у
    документуванні російської агресії.
  section: 'Діяльність: Громадський спротив у Криму'
  words: 1000
- points:
  - >-
    Арешт у травні 2014 року: конструювання російською ФСБ справи так званої
    "групи Сенцова". Використання тортур для отримання фальшивих зізнань.
  - >-
    [!anti-hagiography] Механіка примусу: як тортури створюють ілюзію
    доказової бази. Примус Афанасьєва до свідчень проти Олега Сенцова та
    Олександра Кольченка.
  - >-
    Судовий процес 2015 року: історична відмова Афанасьєва від попередніх
    свідчень. Публічна заява про тортури як зрив сценарію окупаційного суду.
  section: 'Суд: Публічна відмова від вибитих свідчень'
  words: 1600
- points:
  - >-
    Звільнення: кампанія підтримки та повернення до України у 2016 році.
  - >-
    [!epistemic-humility] Адвокація: трансформація колишнього в'язня у
    правозахисника. Боротьба за звільнення інших українських політв'язнів
