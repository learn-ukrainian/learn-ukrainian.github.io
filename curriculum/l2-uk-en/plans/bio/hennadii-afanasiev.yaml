objectives:
- Аналізувати кримський громадський спротив на початку російської окупації 2014 року.
- Досліджувати механізми російських політичних репресій та фабрикації кримінальних справ.
- Оцінювати акт мужності — відмову від примусових свідчень в суді як форму боротьби.
- Розуміти шлях Геннадія Афанасьєва від політв'язня та адвоката до воїна, який віддав життя за Україну.
