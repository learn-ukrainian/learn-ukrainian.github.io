content_outline:
- points:
  - >-
    [!biography] Знайомство з Геннадієм Афанасьєвим: кримський громадський активіст,
    колишній політичний в'язень Кремля, військовослужбовець ЗСУ (Герой України посмертно).
  - >-
    Провокаційне питання: як одна людина може зруйнувати архітектуру сфабрикованої
    судової справи прямо в залі засідань?
  section: Розминка
  words: 400
- points:
  - >-
    Громадянський опір в Криму 2014 року: проукраїнський активізм після російської
    окупації півострова.
  - >-
    Арешт 9 травня 2014 року: залучення до так званої "справи Сенцова-Кольченка" —
    спроби окупаційної влади криміналізувати український спротив через міф про "тероризм".
  - >-
    [!epistemic-humility] Жорстокі тортури: примус до неправдивих свідчень проти
    інших активістів як інструмент створення пропагандистського наративу ФСБ.
  section: 'Сфабрикована справа: Випробування тортурами'
  words: 1000
- points:
  - >-
    Суд у Ростові 2015 року: переломний момент, коли Афанасьєв відмовився від свідчень
    проти Олега Сенцова та Олександра Кольченка.
  - >-
    Публічна заява про те, що всі докази були вибиті під тортурами. Цей крок вимагав
    надзвичайної мужності, адже він залишався в руках російських спецслужб.
  - >-
    [!myth-buster] Руйнування звинувачення: як одна заява продемонструвала світові
    сфабрикованість російського правосуддя.
  section: 'Відмова від зізнань: Спротив у залі суду'
  words: 1200
- points:
  - >-
    Звільнення 2016 року під час обміну: повернення в Україну та початок нової
    боротьби за інших бранців Кремля.
  - >-
    Адвокаційна робота: промови, публікації (меморіальна назва "Піднятися після падіння" закріпилася посмертно),
    боротьба за визволення ув'язнених українців.
  - >-
    Повномасштабне вторгнення 2022 року: приєднання до лав Територіальної оборони
    Києва, а згодом — участь у боях на сході України під позивним "Тор".
  section: 'Після звільнення: Адвокація та захист країни'
  words: 1600
- points:
  - >-
    Загибель у бою: 18 грудня 2022 року Геннадій Афанасьєв був убитий під час
    виконання бойового завдання біля Білогорівки на Луганщині.
  - >-
    Вшанування: посмертне присвоєння звання Героя України (Указ №741/2025). Пам'ять про
    Афанасьєва як символ незламності кримського опору та найвищої самопожертви.
  section: 'Підсумок: Шлях Героя України'
  words: 1000
focus: >-
  Геннадій Афанасьєв як символ кримського опору російській окупації. Аналіз його
  громадянської мужності у руйнуванні сфабрикованої справи ФСБ, боротьби за політв'язнів
  та військової самопожертви під час повномасштабної війни.
