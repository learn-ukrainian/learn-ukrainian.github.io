objectives:
- Аналізувати тріумф і трагедію Петра Болбочана, відділяючи військового генія від політичного діяча
- Критично оцінювати стратегічне значення Кримського походу 1918 року та його далекосяжні політичні наслідки
- Пояснювати причини та суть конфлікту між Болбочаном та Директорією, що призвів до його арешту та страти
- Формулювати аргументовану позицію щодо справедливості вироку та місця Болбочана в пантеоні українських героїв
