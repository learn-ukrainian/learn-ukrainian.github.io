content_outline:
- points:
  - 'Парадокс: Як один із найталановитіших полководців УНР, герой легендарного Кримського походу, міг бути засуджений до розстрілу
    власним урядом лише через рік після свого тріумфу?'
  - '[!biography] Представлення Петра Болбочана не як ікони, а як складної фігури на перетині військового обов''язку та політичних
    інтриг.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була страта Болбочана політичною розправою? Позиція Директорії (загроза заколоту, невиконання наказів) vs
    позиція прихильників Болбочана (позбулися популярного конкурента).'
  - 'Дебат 2: Переосмислення спадщини. Радянська історіографія (повне замовчування) vs сучасна українська (героїзація та реабілітація).
    Чи не втрачаємо ми за цим складність ситуації?'
  - '[!epistemic-humility] Визнання, що в умовах хаосу громадянської війни не існувало простих рішень. Дії Болбочана можна
    інтерпретувати і як самоправство, і як спробу врятувати армію.'
  - '[!decolonization] Розгляд справи Болбочана як внутрішнього українського конфлікту, а не як результату дій зовнішніх ворогів,
    що ускладнює чорно-білий наратив.'
  section: 'Конфліктна карта: Герой чи загроза для держави?'
  words: 900
- points:
  - 'Соціальне походження: виходець із Бессарабії в Російській імперії. Як це вплинуло на його світогляд?'
  - 'Військова кар''єра в царській армії: від юнкерського училища до фронтів Першої світової. Набутий досвід та розчарування.'
  - 'Переломний момент: Українська революція 1917 року. Участь у формуванні перших національних частин, свідомий вибір на
    користь УНР.'
  - Формування Запорізького корпусу — створення боєздатної одиниці з нуля в умовах розвалу старої армії.
  section: 'Формування: Шлях від імперського офіцера до українського полководця'
  words: 1000
- points:
  - 'Стратегічний контекст: чому Крим був критично важливим для УНР? (Чорноморський флот, геополітичний контроль).'
  - 'Блискавична операція: аналіз військової тактики. Швидкість, дисципліна та рішучість як ключові фактори успіху.'
  - Взяття Сімферополя та Севастополя. Підняття українських прапорів над півостровом.
  - 'Первинні джерела: уривки з наказів Болбочана, спогадів учасників походу, що демонструють його стиль командування.'
  section: 'Діяльність: Легендарний Кримський похід 1918 року'
  words: 1300
- points:
  - '[!anti-hagiography] Болбочан не був лише "солдатом". Аналіз його політичних поглядів — схильність до більш авторитарних
    методів управління, ніж у соціалістичних лідерів УНР.'
  - 'Конфлікт із вищим керівництвом: чи були звинувачення у зраді та спробі державного перевороту повністю безпідставними?
    Розгляд доказів, представлених на суді.'
  - 'Ціна успіху: популярність Болбочана в армії як загроза для політиків Директорії (Петлюри, Винниченка).'
  - '[!myth-buster] Спростування міфу про те, що Болбочан був аполітичним. Він активно втручався в політику, що і стало однією
    з причин його трагедії.'
  section: 'Тінь: Політичні амбіції та конфлікт із Директорією'
  words: 900
- points:
  - 'Повернення до головного питання: так чому ж розстріляли героя? Синтез військових, політичних та особистісних факторів.'
  - 'Спадщина Болбочана: символ військового таланту, втрачених можливостей та трагічних внутрішніх чвар Української революції.'
  - '[!decolonization] Сучасне значення: постать Болбочана та його Кримський похід активно використовуються в сучасній українській
    ідентичності та дискурсі про повернення Криму.'
  - 'Оцінка реабілітації: чи є вона повним відновленням справедливості, чи ідеалізацією складної історичної постаті?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'The paradox of Petro Bolbochan: a brilliant military commander who led the legendary 1918 Crimean campaign, only to
  be executed by his own government. Examines the conflict between military duty and political intrigue during the Ukrainian
  War of Independence.'
level: BIO
