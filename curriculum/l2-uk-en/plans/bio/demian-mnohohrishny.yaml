- Аналізувати Глухівські статті 1669 року за джерелами — і як відступ від Московських статей 1665 року, і як обмежене врегулювання під наглядом
- Відрізняти джерельний факт, звинувачення у зраді й пізнішу пам'ять про засланого гетьмана
