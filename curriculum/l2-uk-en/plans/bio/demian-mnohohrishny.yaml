content_outline:
- points:
  - 'Провокація: полковник, що повстав проти московських порядків, а потім підписав із Москвою нові статті; гетьман, який просив повернути засланих до Сибіру українців — і сам скінчив у сибірському засланні. Імперська пам''ять робить його дрібним урядовцем, покараним за непослух. Що цей ярлик показує, а що ховає?'
  - '[!biography] Знайомство з постаттю з небагатим на особисті деталі життєписом: починаємо не з вигаданої сцени народження, а з певного — уряду чернігівського полковника й Глухівських статей.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: обмежений перемовник — учасник антимосковського повстання 1668 року, наказний гетьман з волі Дорошенка, який під тиском виторгував у Глухові повернення мови «прав і вільностей».'
  - 'Позиція 2: твердий володар — гетьман, що зосереджував владу й будував родинно-клієнтарне коло; ця концентрація підживила старшинську змову, якою скористалася імперія.'
  - '[!decolonization] Імперська пам''ять робить його дрібним урядовцем, покараним за зраду; героїчне спрощення — бездоганним мучеником автономії. Обидва згладжують обмеженого володаря з реальною суб''єктністю й реальними примусовими звичками.'
  - '[!epistemic-humility] Рік народження (1621 / близько 1630 / 1631) і смерть (після 1701 / 1703) подають по-різному; коропське походження певніше за точний рік. Різняться й форми імені (Гнатович / Ігнатович / Демко). Починаємо з певного.'
  section: 'Конфліктна карта: Московський ставленик чи гетьман під наглядом'
  words: 900
- points:
  - 'Походження: з околиць Коропа, ймовірно з незнатної родини; рік народження непевний — не відкриваємо модуль вигаданою «сценою народження».'
  - '[!epistemic-humility] Раннє служіння джерелочутливе: ЕІУ застерігає, що згаданий у документах «осавул Демко» міг бути іншою особою. Не робимо ранню дипломатичну службу твердим фактом без звіряння видань.'
  - '1664 рік: під час сіверської кампанії маєтки братів Многогрішних опинилися під загрозою, бо ті схилилися до царського боку — зручний випадок показати, як перепліталися власність, вірність і пограничні війни.'
  - 'Травень 1665 року: став чернігівським полковником після невдалої кампанії; це дало йому потужну лівобережну полкову базу перед кризою 1668 року.'
  - '[!epistemic-humility] Межі уряду подають по-різному (ЕІУ: травень 1665-1668; IEU: 1665-1669) — навчаємо переходу, а не однієї дати.'
  section: 'Формування: Від коропського походження до чернігівського полковника'
  words: 1000
- points:
  - '1668 рік: Лівобережне повстання проти Московських статей 1665 року (податки, залоги, Андрусівський поділ); Многогрішний пристав до антимосковського повороту, підтримав Дорошенка й став генеральним осавулом.'
  - 'Червень 1668 року: коли Дорошенко відійшов на Правобережжя, він призначив Многогрішного наказним (сіверським) гетьманом на Лівобережжі — між загальноукраїнськими планами й поверненням російського війська.'
  - 'Вересень-жовтень 1668 року: після того, як російські війська повернули Чернігів, і під тиском старшини та духовенства він почав переговори з Москвою — це вимушені перемовини, а не чиста зміна вірності.'
  - 'Грудень 1668 - березень 1669: рада в Новгороді-Сіверському обрала його сіверським гетьманом, а 13(3) березня 1669 року Глухівська рада затвердила його повним гетьманом Лівобережної України в присутності царського представника.'
  - 'Глухівські статті 16 березня 1669 року: скасували найгірше з Московських статей 1665 року, зменшили кількість і роль воєвод, зберегли мову «прав і вільностей», але заборонили самостійну зовнішню політику й лишили залоги в ключових містах. Це — головний документ модуля.'
  - '1669-1671: зміцнював владу, послаблював місцевих прибічників Дорошенка, підтримував православні й освітні установи — і клопотав про повернення засланих до Сибіру українців (гірка іронія його власної долі).'
  section: 'Діяльність: Повстання 1668 року, Глухівські статті й гетьманство'
  words: 1300
- points:
  - '[!anti-hagiography] Концентрація влади й родинне клієнтарство: 1671 року він призначив брата Василя наказним гетьманом, що посилило старшинську опозицію. Старшина не була пасивною жертвою — вона боронила власну владу й інтереси.'
  - 'Батуринська змова початку березня 1672 року: провідна старшина (Петро Забіла, Іван Самойлович, Іван Домонтович, Костянтин Мокрієвич) разом із російськими військовими заарештувала його в Батурині в ніч на 12-13 березня.'
  - '[!myth-buster] 22 березня 1672 року цар схвалив дії змовників ще до початку слідства — примусовий механізм тут видно наочно; тримаємо «зраду» як звинувачення, а не як доведений факт.'
  - Його з братом Василем відвезли до Москви, допитували й, за свідченнями ЕІУ та IEU, катували; смертний вирок останньої миті замінили на довічне сибірське заслання з родиною. Процедурні деталі звіряти за виданнями джерел перед класним переказом.
  section: 'Тінь: Родинна булава, змова й заслання'
  words: 900
- points:
  - 'Повернення до розминки: які вибори боронили гетьманські інституції, які загрожували місцевим опонентам, а які примусові знаряддя перетворили фракційний конфлікт на депортацію?'
  - 'Наслідок: Конотопські статті 17(27) червня 1672 року супроводжували обрання Самойловича, доповнили Глухівські статті й ще звузили автономію на користь старшини.'
  - 'Сибірський період: не зводимо його ні до чистої жертовності, ні до вірної служби — це заборонений повертатися український політичний вигнанець, якого водночас використовували в імперському пограничному командуванні (фактичний воєвода Селенгінська 1691-1694); 1696 року прийняв постриг, остання прижиттєва згадка — після 1701 року.'
  - '[!decolonization] Козацький літопис та «Історія русів» повертають призабуту постать, але ризикують мучеництвом-агіографією. Відділяймо джерельний факт, звинувачення й пізнішу рамку.'
  section: 'Дискусія та підсумок: Заслання, служба й пам''ять'
  words: 700
focus: Demian Mnohohrishny as a Ruin-era Left-Bank hetman — the Korop origin, the Chernihiv colonelcy, the 1668 anti-Moscow uprising and Doroshenko appointment, the constrained negotiation that produced the Hlukhiv Articles of 1669, the concentration of power and family clientage, the 1672 Baturyn coup engineered by starshyna and Russian military, the torture and death sentence commuted to Siberian deportation, the later Selenginsk frontier service, and the memory that recovers him while risking martyr hagiography.
