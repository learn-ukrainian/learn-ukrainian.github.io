content_outline:
- points:
  - 'Парадокс: Як адвокат, людина закону та інтелектуальної праці, став творцем наймасовішого в Галичині спортивно-військового
    руху? Чому саме фізична культура стала для нього ключем до національного відродження?'
  - '[!biography] Вступ до постаті через несподіваний факт, що руйнує стереотип про «батька-засновника».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Січ» — українська інновація чи вдала адаптація чеського «Сокола»? Дискусія про оригінальність ідеї та національну
    специфіку руху.'
  - 'Дебат 2: Невинна гімнастика чи прихована армія? Полеміка в галицькому сеймі та австрійській пресі щодо справжніх цілей
    «Січей». Позиції поляків, австрійської влади та самих українців.'
  - '[!epistemic-humility] Розгляд аргументів усіх сторін, демонстрація того, як одна й та сама організація може сприйматися
    діаметрально протилежно.'
  section: 'Конфліктна карта: Спорт, політика чи армія?'
  words: 900
- points:
  - 'Соціальний контекст: Покуття кінця XIX ст., життя українських селян під владою Австро-Угорщини. Чому молодий Трильовський
    обрав шлях захисту народу?'
  - 'Освіта у Відні: як столичне юридичне середовище та європейські ідеї вплинули на формування його патріотичних поглядів.'
  - 'Перші кроки: початок юридичної кар''єри та перші зіткнення з правовою беззахисністю селянства як поштовх до громадської
    діяльності.'
  section: 'Формування: Віденський юрист із покутським серцем'
  words: 1000
- points:
  - 'Заснування першої «Січі» у Заваллі (1900): від ідеї до втілення. Як одна маленька громада стала моделлю для всієї Галичини
    та Буковини.'
  - '«Січ» як система: не лише спорт, а й культурна, освітня та кооперативна робота. Створення паралельного українського суспільства.'
  - 'Адвокат народу: поєднання громадської та професійної діяльності. Як справи в судах по захисту селян перетворювались на
    політичні акції.'
  - 'Політик у сеймі: використання парламентської трибуни для боротьби за права українців та легалізації січового руху.'
  section: 'Діяльність: Нація як єдиний організм'
  words: 1300
- points:
  - '[!anti-hagiography] Січовий рух загострив українсько-польські стосунки в Галичині. Аналіз звинувачень у надмірній радикалізації
    та провокуванні конфліктів.'
  - 'Легіон УСС: чи було перетворення спортивного руху на бойову одиницю в австрійській армії тріумфом, чи трагедією? Свідомий
    вибір чи неминучий наслідок мілітаризації молоді?'
  - '[!myth-buster] Критика ідеалізованого образу «Січі». Внутрішні конфлікти, фінансові проблеми та опір консервативних кіл
    українського суспільства.'
  - 'Еміграція: життя засновника в Празі після поразки визвольних змагань. Втрата впливу чи продовження боротьби в нових умовах?'
  section: 'Тінь: Ціна збройного патріотизму'
  words: 900
- points:
  - 'Повернення до парадоксу з розминки: студент формулює відповідь, як адвокат зміг створити армію, поєднавши правовий захист
    з фізичним вихованням.'
  - 'Довготривалий вплив: як «Січ» вплинула на сучасні спортивні та патріотичні організації в Україні (Пласт, СУМ).'
  - '[!decolonization] «Січ» як інструмент деколонізації свідомості: виховання почуття власної гідності та сили в умовах бездержавності.'
  - 'Спадщина Трильовського: творець інституцій, що пережили свого засновника та стали фундаментом для подальшої боротьби
    за незалежність.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Кирило Трильовський та його рух «Січ» як інструмент націєтворення, зв'язок між спортивно-гімнастичним рухом та парамілітарною
  підготовкою, роль Трильовського як адвоката селян та політичного діяча в Галичині.
level: BIO
module: bio-060
objectives:
- Критично аналізувати життя та спадщину Кирила Трильовського, виходячи за рамки образу «Батька Січі»
- Оцінювати внесок руху «Січ» у формування національної свідомості, враховуючи як досягнення, так і суспільні конфлікти, які
  він провокував
- Простежувати зв'язок між юридичною, політичною та громадською діяльністю Трильовського, пояснюючи, як одна посилювала іншу
- Формулювати аргументовану позицію щодо ролі парамілітарних організацій у національно-визвольних рухах
pedagogy: CBI
