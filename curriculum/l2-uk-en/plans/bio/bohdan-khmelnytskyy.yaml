content_outline:
- points:
  - 'Провокація: Хмельницький — творець незалежної держави чи агент, що запустив процес її поглинання Москвою? Як одна людина
    може бути водночас символом суб''єктності та фігурою, що її обмежує?'
  - '[!biography] Поєднання якостей полководця, дипломата та адміністратора в одній особі — унікальне явище для Східної Європи
    XVII ст.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): Переяславська рада — це тимчасовий військовий союз рівних чи присяга на вірність іноземному монарху?
    Позиції козацької старшини, духовенства та простого козацтва.'
  - 'Дебат 2 (історіографія): Хмельницький як «об''єднувач братніх народів» (російська/радянська версія) vs Хмельницький як
    творець незалежної держави, що шукав тимчасового союзника (українська версія).'
  - '[!decolonization] Розвінчання міфу про «віковічне прагнення» українців до союзу з Москвою. Переяслав як вимушений тактичний
    крок в умовах війни на кілька фронтів.'
  - '[!epistemic-humility] Аналіз Переяславських статей: що було підписано, а що було домальовано пізнішими інтерпретаціями?
    Визнання того, що ми не знаємо всіх деталей угоди.'
  section: 'Конфліктна карта: Вибір Хмельницького — зрада чи порятунок?'
  words: 900
- points:
  - 'Походження та освіта: шляхетський син, єзуїтський колегіум, знання мов і військової справи — нетиповий старт для майбутнього
    вождя народного повстання.'
  - '«Чигиринська трагедія» (справа Чаплинського): особиста кривда як каталізатор всенародної війни. Перехід від приватного
    до суспільного.'
  - 'Історичний контекст: криза Речі Посполитої, «золота доба» козацтва, назрівання соціального та релігійного конфлікту.'
  - 'Перші перемоги (Жовті Води, Корсунь, Пилявці): як вони перетворили локальний бунт на повномасштабну Визвольну війну.'
  section: 'Формування: Від Чигирина до Жовтих Вод'
  words: 1000
- points:
  - 'Будівництво держави в умовах війни: створення Генеральної військової канцелярії, фінансової та судової систем.'
  - 'Військова реформа: перетворення селянських загонів на регулярну армію з чіткою структурою (полк-сотня).'
  - 'Дипломатія на три фронти: маневри між Варшавою, Стамбулом та Москвою. Пошук міжнародного визнання козацької суб''єктності.'
  - 'Гетьманські універсали як першоджерело: аналіз мови та змісту документів, що заклали основи української державності.'
  section: 'Діяльність: Народження Гетьманщини'
  words: 1300
- points:
  - '[!anti-hagiography] Жорстокість Визвольної війни: єврейські погроми, масові страти полонених, випалена земля. Хмельницький
    як лідер руху, що мав і темний бік.'
  - 'Союз із Кримським ханством: тактична необхідність, що призвела до руйнівних набігів та взяття ясиру з українських земель.'
  - 'Переяславська рада 1654 р.: аналіз наслідків. Поступове обмеження козацьких вольностей, втручання Москви у внутрішні
    справи, початок «Руїни».'
  - '[!myth-buster] Хмельницький не «помер, прагнучи союзу з Москвою». Останні роки його життя — це відчайдушні спроби знайти
    нових союзників (Швеція, Трансільванія) для противаги московським впливам.'
  section: 'Тінь: Ціна Переяслава та кривава спадщина'
  words: 900
- points:
  - 'Повернення до розминки: тож ким був Хмельницький — далекоглядним державником чи авантюристом, що не прорахував наслідків?
    Студент формулює відповідь з аргументами.'
  - 'Спадщина Хмельницького: створення моделі козацької держави, яка стала основою для майбутніх визвольних змагань, але водночас
    і закладення підвалин для майбутнього поглинання України Російською імперією.'
  - '[!decolonization] Образ Хмельницького сьогодні: від радянського ордена його імені до сучасного переосмислення як трагічної
    фігури в українській історії.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The paradox of Bohdan Khmelnytsky as a state-builder who secured alliances that ultimately threatened Ukrainian sovereignty.
  Analysis of the Cossack Hetmanate's creation, the Pereiaslav Agreement, and the conflicting historical interpretations of
  Khmelnytsky's legacy.
level: BIO
module: bio-021
objectives:
- Аналізувати стратегію та інституційні основи державотворення Богдана Хмельницького
- Критично оцінювати дипломатичні маневри Гетьманщини в трикутнику Річ Посполита – Московське царство – Османська імперія
- Формулювати аргументовану позицію щодо причин та наслідків Переяславської угоди 1654 року, розрізняючи історичний контекст
  та пізніші ідеологічні інтерпретації
- Пояснювати, як постать Хмельницького використовувалася в імперській російській та радянській пропаганді, та протиставляти
  цьому сучасний український деколонізований погляд
