content_outline:
- points:
  - >-
    [!biography] Знайомство з Дмитром Фальківським (справжнє прізвище Левчук) —
    «співцем Полісся», неосимволістом і представником Розстріляного відродження,
    якого розстріляли в Києві в грудні 1934 року.
  - >-
    Провокаційне питання: як людина, що сама замолоду служила в каральних органах
    ЧК, стала жертвою тієї самої тоталітарної машини — і що це відкриває про
    природу радянського терору?
  section: Розминка
  words: 400
- points:
  - >-
    Витоки: народження 1898 року в селі Великі Лепеси на Західному Поліссі
    (Берестейщина, нині Кобринщина в Білорусі); сільська школа і Берестейська
    гімназія, навчання в якій обірвала Перша світова війна.
  - >-
    [!decolonization] Берестейщина як українсько-поліський порубіжний край: чому
    Дмитро Левчук обрав українську мову й українську літературу, попри пізніший
    поділ пам'яті про нього між культурами — з належною обережністю щодо тези про
    «сина двох народів».
  - >-
    [!anti-hagiography] Темний початок: участь у більшовицькому підпіллі та служба
    1920–1923 років у Червоній армії й органах ЧК на території сучасної Білорусі;
    зміна прізвища Левчук на Фальківський у Києві (1923) — почасти зі страху помсти
    за причетність до насильства.
  section: 'Формування: Берестейщина, Полісся і шлях через ЧК'
  words: 1000
- points:
  - >-
    Літературний дебют 1924 року в журналах «Червоний шлях», «Життя й революція»,
    «Всесвіт», «Глобус»; промовистий ранній вірш «Чекіст» (1924) як слід пережитого
    минулого.
  - >-
    Належність до «Ланки» (засн. 1924), що 1926 року перейменована на МАРС —
    «Майстерню революційного слова» (поряд із В. Підмогильним, Г. Косинкою,
    Є. Плужником, Б. Антоненком-Давидовичем).
  - >-
    Чотири прижиттєві збірки поезій: «Чабан» (1925), «Обрії» (1927), «На пожарищі»
    (1928) і «Полісся» (1931); хрестоматійний вірш «Очерет мені був за колиску» зі
    збірки «Обрії».
  - >-
    [!decolonization] Поетична афірмація поліського краю — болота, очерету, говору —
    як самодостатнього українського світу: «Я оддав-би за неї одразу і Тибет, і
    Урал, і Кавказ».
  - >-
    Кіно і проза: секретар журналу «Кіно» (ВУФКУ) у 1927–1933 роках, кіносценарій
    «Греблю прорвано» (1928); темні антиромантичні вірші про братовбивство
    громадянської війни («Зійшлись обоє на багнетах»).
  section: 'Діяльність: Співець Полісся та неосимволіст'
  words: 1200
- points:
  - >-
    Спусковий гачок: убивство С. Кірова 1 грудня 1934 року в Ленінграді стало
    приводом до нової хвилі квазісудового терору проти української творчої
    інтелігенції.
  - >-
    Механізм: арешт; виїзна сесія Військової колегії Верховного суду СРСР
    (головував В. Ульріх); вирок до страти 14 грудня 1934 року; звинувачення в
    «тероризмі» — без жодного доведеного зв'язку з убивством Кірова.
  - >-
    «Група 28»: Фальківського страчено в Києві 16 грудня 1934 року разом із
    Григорієм Косинкою, Олексою Влизьком, Костем Буревієм, Іваном Крушельницьким та
    іншими — показова, превентивна розправа над цілим колом митців.
  - >-
    [!anti-hagiography] Фальківський не був дисидентом: колись він сам служив тій
    самій системі. Засудження радянсько-російського імперського терору не вимагає
    його канонізації — він був і виконавцем, і жертвою цієї машини.
  - >-
    [!myth-buster] [!epistemic-humility] Відділення фактів від легенди: розбіжності
    джерел (дата страти 16 проти поодинокого 17 грудня; межа «раннього» і «пізнього»
    поета) та брак документів про останні дні вимагають обережності.
  section: 'Тінь: Грудень 1934 і «терор Кірова»'
  words: 1600
- points:
  - >-
    Знищене і врятоване: втрата рукописів і родинних слідів; порятунок спадщини
    діаспорою — «Ранені дні» (Пряшів, 1969, упоряд. М. Неврлий) — та київські
    «Поезії» (1989).
  - >-
    Посмертна реабілітація наприкінці 1950-х років (грудень 1957) і подвійне життя
    вірша «Очерет мені був за колиску», що став народною піснею Полісся та Волині.
  - >-
    [!decolonization] Повернення «прикордонного» українця Берестейщини в українську
    культурну пам'ять; державна пам'ятна дата — 120 років від дня народження
    (3 листопада 2018).
  - >-
    [!epistemic-humility] Чесна пам'ять: тримати разом обидві правди — мистецьку
    вартість лірики і морально складне минуле, не спрощуючи постать ні до
    «невинного співця», ні до «ката».
  section: 'Підсумок: Очерет за колиску'
  words: 1000
focus: >-
  Дмитро Фальківський як «співець Полісся», неосимволіст і жертва сталінського
  терору грудня 1934 року. Аналіз його поліської лірики, морально складного
  чекістського минулого, механізму репресій проти «групи 28» української
  інтелігенції та посмертного повернення спадщини.
level: BIO
module: bio-132
objectives:
- >-
  Аналізувати творчий шлях Дмитра Фальківського як «співця Полісся» і неосимволіста
  в колі угруповань «Ланка»/МАРС.
- >-
  Розкривати деколоніальне значення утвердження поліського краю, говору та
  ідентичності Берестейщини в його ліриці.
- >-
  Досліджувати механізм сталінського терору грудня 1934 року на прикладі страти
  «групи 28» української творчої інтелігенції.
- >-
  Критично оцінювати моральну складність постаті, яка служила каральним органам ЧК
  і сама стала жертвою тієї самої системи.
