content_outline:
- points:
  - 'Парадокс: як автор п''єси «Мина Мазайло» — найгострішої сатири на русифікацію та мовне пристосуванство — сам був відданим
    комуністом, що вірив у можливість «українського» радянського проєкту?'
  - '[!biography] Микола Куліш — творець модерної української драми, чиї п''єси визначили обличчя театру 1920-х, а доля стала
    символом Розстріляного відродження.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Сучасники): Полеміка навколо п''єс Куліша. «Народний Малахій» — це антирадянська пропаганда чи критика міщанства?
    «Мина Мазайло» — «націоналістична» чи «інтернаціональна» п''єса? Позиції ВАПЛІТЕ проти пролетарських письменників.'
  - 'Дебат 2 (Спадщина): Радянське забуття vs збереження в діаспорі. Пострадянська реабілітація — Куліш як «націонал-комуніст»
    (Скрипниківський шлях) чи як прихований дисидент? Його віра в комунізм — трагічна помилка чи єдина можлива стратегія виживання
    української культури в СРСР?'
  - '[!epistemic-humility] Визнання складності його позиції, що не зводиться до простої дихотомії «колаборант/герой».'
  - '[!decolonization] Розгляд його творчості як спроби деколонізувати українську свідомість у межах радянської системи.'
  section: 'Конфліктна карта: Комуніст чи націоналіст?'
  words: 900
- points:
  - Дитинство в Чаплинці, сирітство, навчання в Олешківській школі — світ, що формував його соціальну чутливість.
  - Перша світова війна та служба в армії — досвід, що ліг в основу «Патетичної сонати».
  - Захоплення ідеями революції, вступ до Комуністичної партії, робота в органах народної освіти — віра в можливість побудови
    нового справедливого суспільства.
  section: 'Формування: Від Херсонських степів до Червоної армії'
  words: 1000
- points:
  - 'Творчий тандем із Лесем Курбасом у театрі «Березіль»: Куліш-драматург та Курбас-режисер як рушійна сила театральної реформи.'
  - 'Аналіз ключових п''єс: «97» (трагедія Голоду), «Народний Малахій» (критика утопічної свідомості), «Мина Мазайло» (геніальна
    сатира на мовно-культурну ситуацію в УСРР).'
  - 'Новаторство Куліша: поєднання трагічного і комічного, гротеск, експресіонізм, відмова від реалістичного побутописання.'
  - Використання фрагментів із п'єс для ілюстрації його стилю.
  section: 'Діяльність: Народження українського модерного театру'
  words: 1300
- points:
  - '[!anti-hagiography] Політична наївність Куліша: його віра в те, що радянська система може бути реформована і служити
    українським національним інтересам, виявилася трагічною помилкою.'
  - 'Внутрішні конфлікти: як переконаний комуніст, він не міг не бачити репресій та злочинів режиму. Його п''єси — це спроба
    діалогу з владою, яка не хотіла слухати.'
  - '[!myth-buster] Куліш не був дисидентом у сучасному розумінні. Він був частиною радянського істеблішменту і до останнього
    сподівався на «правильний» комунізм, що й зробило його падіння таким стрімким та болючим.'
  - Ціна, яку він заплатив: арешт, звинувачення у «буржуазному націоналізмі», розстріл в урочищі Сандармох. Його доля як уособлення
      долі всього його покоління.
  section: 'Тінь: Ілюзії та компроміси «націонал-комунізму»'
  words: 900
- points:
  - 'Повернення до розминки: чи можна бути одночасно комуністом і українським патріотом? Відповідь на це питання через призму
    трагічної долі Куліша.'
  - 'Спадщина: Куліш-драматург виявився набагато довговічнішим за Куліша-комуніста. Його п''єси, особливо «Мина Мазайло»,
    є актуальними й сьогодні.'
  - '[!decolonization] Як творчість Куліша допомагає зрозуміти сучасні процеси деколонізації та боротьби за українську ідентичність.'
  - Його ім''я стало символом незнищенності українського духу, а його роботи — доказом того, що мистецтво може бути потужнішою
    зброєю, ніж будь-яка ідеологія.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
