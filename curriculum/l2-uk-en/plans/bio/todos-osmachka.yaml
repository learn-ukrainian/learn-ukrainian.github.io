content_outline:
- points:
  - >-
    [!biography] Знайомство з Теодосієм Степановичем Осьмачкою, відомим як
    Тодось Осьмачка: поет, прозаїк, перекладач і емігрант, зламаний роками
    переслідування.
  - >-
    Провокаційне питання: як говорити про психіатричний досвід Осьмачки так,
    щоб не повторити радянське перетворення політичної жертви на "клінічний
    випадок"?
  - >-
    Позначити високий регістр теми: це не "біографія дивака", а історія
    українського автора, проти якого працювали ДПУ, НКВС і система каральної
    психіатрії.
  section: Розминка
  words: 400
- points:
  - >-
    Народження 3 (15) травня 1895 року в селі Куцівка, Черкаський повіт,
    Київська губернія, у родині самоука-ветеринара Степана Осьмачки.
  - >-
    Самостійне фінансування вищої освіти і завершення Київського інституту
    народної освіти 1925 року.
  - >-
    Участь в АСПИС, пов'язаній з Миколою Зеровим, а потім у Ланці / МАРС разом
    із найближчим другом Григорієм Косинкою, Підмогильним, Плужником та
    Антоненком-Давидовичем.
  - >-
    Перекладацька праця: "Макбет" Шекспіра 1930 року і переклади Вайлда як
    доказ включення української літератури в ширший європейський культурний
    обіг.
  - >-
    [!decolonization] Пояснити МАРС і АСПИС як українські модерні літературні
    середовища, а не як об'єкти радянського кримінального словника.
  section: 'Формування: Село, КІНО, АСПИС і МАРС'
  words: 1000
- points:
  - >-
    Дебют "Круча" 1922 року і оцінка Сергія Єфремова, який бачив в Осьмачці одну
    з найнадійніших сил нового покоління.
  - >-
    "Скитські вогні" 1925 року як гімн українському степові та "Клекіт" 1929
    року як остання збірка, надрукована в радянській Україні.
  - >-
    Поезія "Деспотам" у "Клекоті": аналіз фрагментів про народ, годований
    "у казармах на заріз", як антидеспотичного і деколоніального тексту.
  - >-
    Еміграційний період: "Сучасникам" 1943 року у Львові, "Старший боярин" 1946
    року, поема "Поет" 1947 року, "Китиці часу" 1953 року і "Із-під світу" 1954
    року.
  - >-
    "Ротонда душогубців" 1956 року як художнє повернення до досвіду
    психіатричного ув'язнення через образ Івана Бруса.
  - >-
    Мова і стиль: експресіоністична та символістська образність, епічна дума,
    сільська й степова лексика, біблійні та космічні масштаби.
  section: 'Діяльність: Поезія, проза і голос під терором'
  words: 1200
- points:
  - >-
    Передісторія: мобілізація до російської імперської армії 1916 року і
    військово-польовий суд за поему "Думи солдата", перерваний революцією.
  - >-
    Лист 1932 року до наркома Миколи Скрипника і всеукраїнського оргкомітету
    радянських письменників із проханням дозволити виїзд до Галичини або Канади.
  - >-
    У листі Осьмачка прямо заявив, що радянська влада не дає свободи думки і
    ставить розвиток української культури в залежність від Росії.
  - >-
    5 лютого 1933 року ДПУ провела обшук у селі Івахнівці, заарештувала
    Осьмачку і доправила через Чемерівці до Кам'янця-Подільського.
  - >-
    Спроби перейти польський кордон на тлі убивства друзів із МАРС; арешт,
    конвой до Свердловська, втеча, повторна спроба і в'язниця за звинуваченням
    у шпигунстві.
  - >-
    Очікуючи розстрілу, Осьмачка обрав стратегію опору "слабкістю" і симулював
    божевілля; далі були психіатрична лікарня в Києві, повторні арешти і
    Бутирська в'язниця в Москві.
  - >-
    Після звільнень він жив підпільно у друзів, копицях сіна та віддалених
    господарствах до німецької окупації.
  - >-
    Вимушена еміграція: 1942 року він дістався Львова з незавершеним "Поетом",
    наприкінці 1944 року виїхав на Захід, працював у середовищі МУР, потім жив
    у США та Канаді.
  - >-
    6 липня 1961 року в Мюнхені він упав від нервового паралічу; 7 вересня
    1962 року помер у психіатричній лікарні Пілґрім-Стейт біля Нью-Йорка.
  section: 'Тінь: ДПУ, кордон, Бутирка і каральна психіатрія'
  words: 1600
- points:
  - >-
    Що пережило терор: передвоєнні збірки, "Дума про Зінька Самгородського" у
    складі "Сучасникам", "Із-під світу" і три еміграційні повісті.
  - >-
    [!anti-hagiography] Не перетворювати Осьмачку на безпомилкового мученика:
    важливо говорити про страх, травму, стратегію симуляції і реальний психічний
    злам без сенсаційності.
  - >-
    [!epistemic-humility] Пізня нестабільність не має простого пояснення:
    досьє прямо вимагає не розв'язувати межу між реальною хворобою, удаваним
    божевіллям і наслідками переслідування.
  - >-
    Підсумкове питання: як читати Осьмачку як одного з найоригінальніших голосів
    української поезії, не стираючи політичне насильство, що ламало його життя?
  section: 'Підсумок: Як не повторити радянську патологізацію'
  words: 1000
focus: >-
  Тодось Осьмачка як поет МАРС, перекладач, емігрант і рання жертва радянської
  каральної психіатрії; читання його творів через ДПУ/НКВС, Голодоморний досвід,
  МУР і небезпеку повторної патологізації.
level: BIO
