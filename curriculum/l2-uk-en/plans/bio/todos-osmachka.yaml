objectives:
- >-
  Аналізувати біографію Тодося Осьмачки від Куцівки, КІНО, АСПИС і МАРС до
  еміграційного МУР та американського фіналу.
- >-
  Пояснювати механізм радянського переслідування: лист 1932 року, арешт
  5 лютого 1933 року, кордон, звинувачення у шпигунстві, Бутирка і психіатрія.
- >-
  Пов'язувати поезію "Деспотам", "Старшого боярина", "Поета", "Із-під світу" і
  "Ротонду душогубців" із документованим досвідом терору.
- >-
  Критично відкидати радянську і популярну патологізацію, зберігаючи
  фактологічну обережність щодо травми та хвороби.
