content_outline:
- points:
  - 'Парадокс: Чому глава Української православної церкви в розпал війни відмовився присягнути на вірність православному московському
    царю?'
  - '[!biography] Представлення Сильвестра Косіва не як святого, а як політичного гравця у рясі.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): Косів — «польський агент» (вихованець Замойської академії) чи український патріот, що захищав православ''я
    від католицизму?'
  - 'Дебат 2 (історіографія): Косів — феодал-реакціонер, що гальмував «возз''єднання» (радянська версія) чи далекоглядний
    державник, що бачив у Москві загрозу, не меншу за Польщу (сучасна українська версія)?'
  - '[!epistemic-humility] Дипломатичні листи Косіва показують його спроби одночасно запевнити у лояльності і гетьмана, і
    польського короля, і константинопольського патріарха.'
  - '[!decolonization] Розгляд Переяславської угоди не як «возз''єднання», а як військового союзу, в якому Косів та київське
    духовенство побачили загрозу своїй автономії.'
  section: 'Конфліктна карта: Чия людина митрополит?'
  words: 900
- points:
  - Походження, освіта в Замойській академії та Львові — формування в середовищі католицької полемічної культури.
  - Співпраця з Петром Могилою в Києво-Братській колегії, участь у реформі православної освіти.
  - Косів як наступник Могили: обрання митрополитом у 1647 році напередодні найбільшого повстання.
  - Інтелектуальне середовище Лаври — центр українського православ'я, що змагалося з Римом і Москвою.
  section: 'Формування: Від учня Могили до глави Церкви'
  words: 1000
- points:
  - 'Освітня діяльність: перетворення Києво-Братської колегії на Києво-Могилянську академію, створення інтелектуальної еліти.'
  - 'Літературна праця: "Патерикон" — не просто збірка житій святих, а ідеологічний маніфест тяглості київської церковної
    традиції від часів Русі.'
  - Церква під час Хмельниччини: спроби Косіва захистити церковне майно та ієрархію від козацької сваволі та воєнних руйнувань.
  - Ідеолог "київського християнства" — самобутньої версії православ'я, відмінної і від польського католицизму, і від московського
    православ'я.
  section: 'Діяльність: Будівництво Церкви під час Руїни'
  words: 1300
- points:
  - '[!anti-hagiography] Відмова Косіва присягнути царю — це був захист української державності чи корпоративних інтересів
    Церкви та її маєтків?'
  - Дипломатичне балансування між гетьманом, королем і царем виглядало як нерішучість і призвело до втрати довіри з усіх боків.
  - Чи не було його вперте обстоювання константинопольської юрисдикції стратегічною помилкою, що ізолювала українську церкву
    в момент, коли їй потрібні були сильні союзники?
  - '[!myth-buster] Міф про повну підтримку духовенством Хмельницького. Косів та вища ієрархія боялися повстання і до останнього
    намагалися домовитись із Річчю Посполитою.'
  section: 'Тінь: Ціна нейтралітету'
  words: 900
- points:
  - 'Повернення до розминки: Студент формулює власну відповідь на питання про мотиви Косіва, спираючись на матеріал модуля.'
  - 'Спадщина Косіва: з одного боку, він зберіг інтелектуальну та духовну автономію Церкви. З іншого, його політика не змогла
    запобігти її поглинанню Московським патріархатом через 30 років.'
  - '[!decolonization] Косів як символ спротиву культурній асиміляції. Його боротьба за юрисдикцію сьогодні розглядається
    як прообраз боротьби за автокефалію українського православ''я.'
  - Сучасна актуальність: наскільки досвід Косіва є релевантним для сучасних релігійних діячів в Україні, що намагаються зберегти
      незалежність в умовах війни та політичного тиску?
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The role of Sylvestr Kosiv during the Khmelnytsky Uprising, his preservation of church autonomy, the writing of the
  Paterikon, and his refusal to swear allegiance to the Moscow Tsar.
level: BIO
module: bio-023
objectives:
- Критично оцінювати роль Сильвестра Косіва у збереженні автономії Української православної церкви в умовах Хмельниччини
- Аналізувати "Патерикон" як літературний твір та політичний маніфест, що утверджував тяглість київської духовної традиції
- Формулювати обґрунтовану позицію щодо мотивів відмови Косіва та київського духовенства від присяги московському царю
- Розрізняти радянську та сучасну українську інтерпретації постаті митрополита та його дій
