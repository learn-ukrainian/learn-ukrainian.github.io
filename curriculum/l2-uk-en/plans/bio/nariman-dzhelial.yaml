content_outline:
- points:
  - >-
    [!biography] Знайомство з Наріманом Джелялом: кримськотатарський політик,
    заступник голови Меджлісу, колишній політв'язень російського режиму (живий діяч).
  - >-
    Проблемне питання: чому залишатися публічним діячем в окупованому Криму — це акт усвідомленої мужності?
  section: Розминка
  words: 400
- points:
  - >-
    Покоління повернення: народження в місцях депортації (Узбецька РСР, 1980) та
    освіта в незалежній Україні. Вивчення політології та економіки.
  - >-
    Медійна діяльність: робота журналістом і телеведучим у кримськотатарських медіа.
  - >-
    Становлення в Меджлісі: робота в національних представницьких структурах кримських татар.
  section: 'Формування: Журналіст і політолог'
  words: 1000
- points:
  - >-
    Опір в окупації: після 2014 року Наріман Джелял обрав шлях не емігрувати,
    а залишитися найвищим представником Меджлісу в окупованому Криму.
  - >-
    Публічна позиція: відкрита правозахисна діяльність, інтерв'ю, підтримка родин інших політв'язнів.
  - >-
    [!decolonization] Кримська платформа (2021): участь у міжнародному саміті як
    публічний виклик російським колоніальним претензіям на півострів.
  - >-
    Листи з-за ґрат: продовження боротьби словом навіть з ув'язнення:
    "Народе мій, ти маєш сили вистояти..."
  section: 'Діяльність: Голос Меджлісу в окупації'
  words: 1200
- points:
  - >-
    Механізм репресій: арешт російськими силовиками (ФСБ) невдовзі після
    саміту Кримської платформи (вересень 2021).
  - >-
    Сфабрикована справа: звинувачення у нібито "диверсії" на газопроводі,
    які правозахисники визнали політично вмотивованими. Справа Асана та Азіза Ахтемових.
  - >-
    Вирок окупаційного суду: незаконне засудження у 2022 році до 17 років
    колонії суворого режиму. Використання кримінального правосуддя для ізоляції лідера.
  - >-
    [!epistemic-humility] Звільнення: обмін полоненими та визволення Нарімана Джеляла (червень 2024),
    заява про пережите: "Найважче було пережити цю несправедливість і приниження".
  section: 'Тінь: Окупаційний суд і статус заручника'
  words: 1600
- points:
