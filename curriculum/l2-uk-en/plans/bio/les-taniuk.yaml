content_outline:
- points:
  - >-
    [!biography] Знайомство з Лесем Танюком: театральний і кінорежисер, перекладач, організатор
    київського Клубу творчої молоді (КТМ), громадський діяч.
  - >-
    Провокаційне питання: як театральні постановки та літературні вечори перетворилися на
    інфраструктуру опору тоталітарній системі?
  section: Розминка
  words: 400
- points:
  - >-
    [!epistemic-humility] Суперечності щодо місця народження: Київ чи село Жукин Вишгородського району.
    Ранні роки родини в таборі в Німеччині та життя в Луцьку.
  - >-
    Навчання в Київському інституті ім. Карпенка-Карого (курс Мар'яна Крушельницького) та випуск у 1963 році.
  - >-
    Участь у становленні Клубу творчої молоді на межі 1959–1960 років і подальше президентство
    Танюка у КТМ. Перетворення клубу на центр об'єднання української інтелігенції.
  section: 'Формування: Від театру до Клубу творчої молоді'
  words: 1000
- points:
  - >-
    Культурна робота КТМ: вечори Лесі Українки, Франка, Шевченка, обговорення заборонених митців
    Розстріляного відродження (Курбаса, Куліша).
  - >-
    Створення авторської студії в клубі, постановки п'єс Б. Брехта та І. Драча.
  - >-
    Робота комісії КТМ (за участю Танюка, А. Горської, В. Симоненка) у 1962 році з розслідування місць
    масових поховань жертв сталінських репресій у Биківні та збір матеріалів про розстріляних на Соловках.
  section: 'Діяльність: Вечори пам''яті та Биківня'
  words: 1200
- points:
  - >-
    [!myth-buster] Репресивний механізм щодо Танюка не включав кримінального вироку за ст. 62 чи таборів,
    але базувався на системному адміністративному та професійному тиску.
  - >-
    Ідеологічні атаки на клуб за його антитоталітарний і протестний дух, які
    призвели до закриття КТМ у 1964 році.
  - >-
    Вимушений від'їзд Танюка до Москви через переслідування київської влади
    (працював у московських театрах з 1965 по 1986 рік).
  - >-
    [!decolonization] Московський період був не творчим вибором імперського центру, а наслідком витіснення з
    України та неможливості працювати на батьківщині.
  section: 'Тінь: Адміністративний тиск та вимушена міграція'
  words: 1600
- points:
  - >-
    Повернення в Україну: з 1992 року очолював Спілку театральних діячів України.
  - >-
    Робота в незалежній Україні: народний депутат кількох скликань, керівництво комітетами з питань культури
    та духовності (до смерті у 2016 році).
  - >-
    Значення Танюка: дисидентство як організація простору, захист національної пам'яті та формування
    інфраструктури для шістдесятників.
  section: 'Підсумок: Повернення та державне будівництво'
  words: 1000
focus: >-
  Лесь Танюк як фундатор Клубу творчої молоді, творець інфраструктури для українських шістдесятників
  та організатор роботи зі збереження національної культурної пам'яті.
level: BIO
module: bio-284
objectives:
- >-
  Розуміти роль Клубу творчої молоді (КТМ) як платформи для формування покоління шістдесятників.
- >-
  Аналізувати адміністративні механізми тиску радянської влади на культурних діячів, які не
  закінчувалися арештами.
- >-
  Досліджувати значення ініціатив Танюка зі збереження пам'яті про Розстріляне відродження та жертв Биківні.
- >-
  Оцінювати вплив театральних постановок та літературних вечорів на відновлення української ідентичності
  в 1960-х роках.
