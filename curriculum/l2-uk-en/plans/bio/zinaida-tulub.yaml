objectives:
- >-
  Аналізувати внесок Зінаїди Тулуб в українську історичну прозу на прикладі
  історичного роману «Людолови».
- Пояснювати механізм двох хвиль репресій (арешт 1937 р. і «повторні репресії» 1950 р.) на прикладі її біографії.
- Розрізняти бібліографічну історію видання, художній сюжет і підтверджену біографічну хронологію.
- >-
  Розуміти самостійне опанування української мови в умовах імперської
  освітньої нерівності без вигадування прямої причини репресії.
