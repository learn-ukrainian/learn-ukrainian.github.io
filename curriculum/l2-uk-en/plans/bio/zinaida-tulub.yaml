objectives:
- >-
  Аналізувати внесок Зінаїди Тулуб в українську історичну прозу на прикладі
  епопеї «Людолови».
- Пояснювати механізм двох хвиль репресій (арешт 1937 р. і «повторні репресії» 1950 р.) на прикладі її біографії.
- Критично оцінювати цензурну переробку «Людоловів» 1958 р. як артефакт вимушеної самоцензури.
- Розуміти свідомий вибір української мови та ідентичності як причину звинувачень у «буржуазному націоналізмі».
