content_outline:
- points:
  - >-
    [!biography] Знайомство із Зінаїдою Тулуб — історичною романісткою, авторкою
    епопеї «Людолови», що свідомо перейшла з російської на українську й заплатила
    за це дев'ятнадцятьма роками ГУЛАГу та заслання.
  - >-
    Провокаційне питання: чому назва роману про кримських работорговців XVII ст.
    стала гіркою пророчою метафорою долі самої авторки?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 16 (28) листопада 1890 р. в Києві у родині старої української
    інтелігенції. Батько — юрист і російськомовний поет; дід Олександр Тулуб —
    історик, член Кирило-Мефодіївського братства, особистий друг Тараса Шевченка.
  - >-
    Освіта: 1913 р. — історико-філологічний факультет Вищих жіночих курсів у
    Києві. Виховання в російськомовному культурному середовищі імперського Києва.
  - >-
    [!decolonization] Свідомий, обдуманий перехід до писання українською мовою в
    1920-х роках попри російськомовне оточення. Рання творчість: переклад частини
    «Старшої Едди» (1911) та повість «На роздоріжжі» (1916).
  section: 'Формування: Київська інтелігенція та вибір української мови (1890–1920-ті)'
  words: 1000
- points:
  - >-
    «Людолови» — магнум опус письменниці: панорама України початку XVII ст. за
    гетьмана Петра Сагайдачного. Том 1 (1934) і том 2 (1937), виданий перед самим
    арештом.
  - >-
    [!epistemic-humility] Аналіз цитати «Мова наша — то наша душа, і поки вона
    живе в пісні та слові, доти й народ не подоланий» — особливо промовистої з
    вуст авторки, що свідомо обрала українську мову.
  - >-
    Стиль: кінематографічна, панорамна побудова світу; багатий шар історичної
    лексики XVII ст. (гетьман, сотник, осавул) та тюркських запозичень (ясир, бей).
  - >-
    [!myth-buster] Перероблене двотомне видання «Людоловів» (1958): під
    повоєнною цензурою посилено риторику «класової боротьби» та «дружби народів»
    — текст як скалічений артефакт вимушеної самоцензури зламаної людини.
  section: 'Діяльність: Епопея «Людолови» (1934–1937)'
  words: 1200
- points:
  - >-
    [!anti-hagiography] 4 липня 1937: арешт у Києві на піку «єжовщини». Справу
    сфабрикував лейтенант держбезпеки Хват: звинувачення в «контрреволюційній
    організації «Виборчий центр»» та в «буржуазному націоналізмі» «Людоловів».
  - >-
    5 вересня 1937: Військова колегія Верховного суду СРСР — 10 років
    ув'язнення, 5 років позбавлення прав і конфіскація майна. Ярославська тюрма,
    а з літа 1939 р. — смертоносний Севвостлаг на Колимі. Свідчення Євгенії
    Гінзбург про стан Тулуб під час етапу.
  - >-
    Звільнена 4 липня 1947 р. з повністю зруйнованим здоров'ям (інвалід);
    заслана до Джамбульської області Казахської РСР, де працювала шкільною
    бібліотекаркою.
  - >-
    10 лютого 1950: хвиля «повторних репресій» — Особлива нарада при МДБ СРСР,
    протокол № 5, справа № 954024, звинувачення в «антирадянській
    есеро-меншовицькій організації» та довічне заслання в Кокчетавську область.
  section: 'Тінь: 19 років ГУЛАГу й заслання (1937–1956)'
  words: 1600
- points:
  - >-
    23 червня 1956: Військова колегія скасувала вироки 1937 і 1950 рр. «за
    відсутністю складу злочину»; письменниця повернулася до Києва.
  - >-
    [!decolonization] Останній роман «В степу безкраїм за Уралом» (1964) про
    заслання Тараса Шевченка в Оренбурзькому краї: власний східний досвід
    заслання поглибив психологічний портрет засланого поета.
  - >-
    Смерть 26 вересня 1964 р. в Ірпені (Київська область) від наслідків
    зруйнованого в ГУЛАГу здоров'я; похована на Байковому кладовищі в Києві.
    Дев'ятнадцять років неволі при незламному творчому дусі.
  - >-
    Спротив радянському евфемізму «перерва у творчості», що приховує
    дев'ятнадцять років репресій, і російському привласненню Тулуб як
    російськомовної мемуаристки попри її свідомий вибір української ідентичності.
  section: 'Підсумок: Повернення й незламність (1956–1964)'
  words: 1000
focus: >-
  Зінаїда Тулуб як історична романістка, авторка епопеї «Людолови» та одна з
  небагатьох жінок української історичної прози, що свідомо обрала українську
  мову. Аналіз її творчості, двох хвиль репресій (1937 і 1950) і дев'ятнадцяти
  років ГУЛАГу та заслання як архетипу «табірниці-повернення».
