content_outline:
- points:
  - >-
    [!biography] Знайомство із Зінаїдою Тулуб — історичною романісткою, авторкою
    історичного роману «Людолови», яка самотужки опанувала українську мову й пережила
    ув'язнення, Колиму та заслання в Казахстані.
  - >-
    Провокаційне питання: як говорити про репресію авторки на підставі
    біографічних джерел, чітко відокремлюючи їх від назви й сюжету роману?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 28 листопада 1890 р. в Києві. УІНП описує зросійщену родину,
    яка походила від запорозьких старшин і жила в російськомовному побуті;
    дід Олександр Тулуб належав до Кирило-Мефодіївського братства [S3].
  - >-
    Освіта: S1 подає Ольгинську гімназію у 1904–1909 роках і Вищі жіночі
    курси у 1909–1917 роках, а S3 стверджує, що обидва заклади Тулуб закінчила
    1909 року. План зберігає цю розбіжність відкритою.
  - >-
    [!decolonization] Українську мову в імперській освіті не викладали; Тулуб
    опанувала її самотужки. УІНП передає батькове спрямування письма «на користь
    Росії», що точно називає нерівний імперський контекст мовного вибору.
  section: 'Формування: Зросійщене середовище й самостійне опанування української (1890–1920-ті)'
  words: 1000
- points:
  - >-
    Верстку «Людоловів», готову до друку 1933 року, розсипали в харківському
    видавництві. Російськомовний варіант вийшов у Москві взимку 1934–1935
    років і майже одночасно — видання в Україні [S1].
  - >-
    [!epistemic-humility] НБУВ ідентифікує першу книгу «Людоловів» у томі 1
    (1991) тритомного видання 1991–1992 років, підготовлену Мирославою Гнатюк.
    План не відтворює романних реплік без сторінкового локатора.
  - >-
    Історичний роман як художня реконструкція минулого: персонажі й образи
    можуть бути предметом літературного аналізу, але не доводять подій життя
    авторки.
  - >-
    [!myth-buster] Запис тому 1 за 1991 рік не засвідчує сам собою завершений
    тритомник: зареєстрований комплект датовано 1991–1992 роками. Історію
    інших редакцій не слід будувати без окремого текстологічного джерела з
    точним виданням і локаторами.
  section: 'Діяльність: Історичний роман «Людолови» (1934–1937)'
  words: 1200
- points:
  - >-
    [!anti-hagiography] 4 липня 1937 року Тулуб заарештували за звинуваченням
    у належності до неіснуючої контрреволюційної організації [S1].
  - >-
    Десятирічне ув'язнення в Ярославській тюрмі та на Колимі; УІНП уточнює,
    що на Колимі вона перебувала від 1939 року.
  - >-
    1947 року Тулуб вислали до Джамбульського району Алма-Атинської області,
    де вона працювала шкільною бібліотекаркою.
  - >-
    10 лютого 1950 року винесли новий вирок про безстрокове заслання до села
    Чкалово Кокчетавської області Казахської РСР [S3].
  section: 'Тінь: 19 років ГУЛАГу й заслання (1937–1956)'
  words: 1600
- points:
  - >-
    23 червня 1956 року вирок скасували; після цього письменниця оселилася в
    Києві й остаточно редагувала «Людолови» [S1].
  - >-
    [!decolonization] Роман «В степу безкраїм за Уралом» 1964 року присвячений
    засланню Тараса Шевченка. Біографічний досвід авторки й художній твір слід
    зіставляти, але не ототожнювати без текстологічного доказу.
  - >-
    Смерть 26 вересня 1964 року в Ірпені; поховання на Байковому кладовищі в
    Києві [S3]. Джерела називають тривалість репресивного розриву, але не
    потребують декоративної медичної причинності.
  - >-
    Спротив радянському евфемізму «перерва у творчості», що приховує
    дев'ятнадцять років репресій; окремо — джерельно підтверджена мовна
    траєкторія від ранніх російськомовних творів до самостійного опанування
    української та подальшої української літературної праці [S1, S3].
  section: 'Підсумок: Повернення, пізня праця і спадщина (1956–1964)'
  words: 1000
focus: >-
  Зінаїда Тулуб як історична романістка й авторка історичного роману
  «Людолови», яка самотужки опанувала українську мову. Аналіз її творчості,
  двох хвиль репресій (1937 і 1950) і дев'ятнадцяти
  років ГУЛАГу та заслання як архетипу «табірниці-повернення».
level: BIO
