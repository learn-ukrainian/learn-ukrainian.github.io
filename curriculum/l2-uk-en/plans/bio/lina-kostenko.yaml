content_outline:
- points:
  - 'Провокація: як поет може стати найвпливовішим, коли він мовчить? Парадокс Ліни Костенко в тому, що її 20-річне мовчання
    стало гучнішою заявою, ніж будь-яка опублікована збірка.'
  - '[!biography] Представлення центрального конфлікту: чи була ця тиша силою, чи трагедією для літератури?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мовчання — це спротив чи втеча? Позиція 1: Єдиний гідний вибір в умовах цензури, збереження внутрішньої свободи.
    Позиція 2: Трагічна втрата для культури, самообмеження, що позбавило читачів нових творів на два десятиліття.'
  - 'Дебат 2: "Совість нації" — це дар чи прокляття? Позиція 1: Костенко — моральний орієнтир, що зберіг систему цінностей.
    Позиція 2: Цей статус дегуманізує митця, перетворюючи живу людину на пам''ятник, і створює нереалістичні очікування.'
  - '[!epistemic-humility] Визнання, що немає єдиної відповіді на питання про її мовчання; це був складний особистий і громадянський
    вибір.'
  - '[!anti-hagiography] Проблематизація статусу "ікони" — аналіз того, як цей образ обмежує розуміння складності особистості.'
  section: 'Конфліктна карта: Ціна мовчання та тягар авторитету'
  words: 900
- points:
  - 'Контекст: Київ та Москва під час хрущовської «відлиги» — атмосфера надій та інтелектуального бродіння.'
  - 'Оточення: вхід у коло шістдесятників. Це не просто друзі (Стус, Симоненко, Драч), а ціле інтелектуальне середовище, що
    формувало світогляд.'
  - 'Ранній успіх і перші конфлікти: як збірки «Проміння землі» та «Вітрила» створили репутацію, що зробила її подальшу конфронтацію
    з радянською системою неминучою.'
  - Освіта в Літінституті в Москві — розширення горизонтів і водночас перші зіткнення з імперським шовінізмом.
  section: 'Формування: Дівчина з покоління шістдесятників'
  words: 1000
- points:
  - 'Феномен «Марусі Чурай» (1979): чому історичний роман у віршах став культурною подією всесоюзного масштабу? Черги за книгою
    як форма тихого спротиву.'
  - 'Аналіз твору: теми історичної пам''яті, вибору митця, зради та вірності — як алегорія на сучасність.'
  - 'Поетика Костенко: поєднання класичної форми (сонети, октави) з гострою сучасністю проблематики. «Сад нетанучих скульптур».'
  - 'Мова як зброя: афористичність поезії Костенко. Як її рядки («І щось в душі таке болить, що це і є, напевно, Україна»)
    стали частиною національного коду.'
  section: 'Діяльність: «Маруся Чурай» і повернення голосу'
  words: 1300
- points:
  - '[!anti-hagiography] Затворництво та мовчання в часи незалежності. Чи є відсторонення від публічності ефективною формою
    критики, чи це відмова від відповідальності за публічний дискурс?'
  - '[!myth-buster] Критичне сприйняття «Записок українського самашедшого». Чому цей твір, на відміну від поезії, викликав
    неоднозначні відгуки? Аналіз критики, що вказувала на публіцистичність та дидактичність твору.'
  - 'Класицизм як обмеження? Дискусія в літературних колах 90-х: чи не стала досконала класична форма Костенко перешкодою
    для розвитку нових, авангардних течій в українській поезії?'
  - 'Ціна бути символом: як статус «живого класика» впливає на сприйняття нових творів і чи ускладнює він діалог із молодшими
    поколіннями?'
  section: 'Тінь: Ціна принциповості та межі ікони'
  words: 900
- points:
  - 'Повернення до розминки: студент, озброєний знаннями, формулює власну відповідь на питання про парадокс мовчання.'
  - 'Значення сьогодні: роль Костенко після 2014 та 2022 років. Як її поезія та громадянська позиція (чи її відсутність у
    публічному просторі) резонують в умовах повномасштабної війни?'
  - '[!decolonization] Костенко як приклад послідовного антиколоніального мислення впродовж усього життя, на відміну від багатьох
    її сучасників, що йшли на компроміси.'
  - 'Кінцеве питання: Чи потрібні нації «совісті» та «моральні авторитети», чи це пережиток епохи без інституцій? Обговорення
    ролі митця в сучасному демократичному суспільстві.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: The paradox of silence as resistance, the burden of being the "conscience of the nation", and the literary phenomenon
  of "Marusya Churay". An anti-hagiographic look at a living icon.
level: BIO
module: bio-138
objectives:
- Аналізувати феномен «творчого мовчання» як форми громадянського спротиву та його роль у формуванні морального авторитету.
- Критично оцінювати статус «совісті нації» та його вплив на творчість і публічний образ митця.
- Розрізняти позитивні та негативні аспекти іконізації митця на прикладі Ліни Костенко.
- Формулювати аргументовану позицію щодо суперечливих аспектів біографії та творчості поетеси.
