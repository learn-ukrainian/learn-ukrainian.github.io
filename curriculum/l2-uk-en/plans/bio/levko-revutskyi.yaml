content_outline:
  - points:
      - >-
          Парадокс: Як композитор, якого Чека ледь не розстріляла у 1919 році,
          став головою Спілки композиторів УРСР та лауреатом Сталінських
          премій? Чи це геніальна стратегія виживання, чи трагічний компроміс?
      - >-
          [!biography] Левко Ревуцький (1889–1977) — композитор, піаніст,
          педагог, редактор і обробник народних пісень, який забезпечив
          передачу лисенківської композиторської традиції через радянську
          інституційну систему.
      - >-
          Провокація: чи можна бути «хранителем» національної музичної школи,
          отримуючи нагороди від режиму, який переслідував цю саму школу?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебат 1: Ревуцький — радянський лауреат чи замаскований носій
          національної школи? Інституційні нагороди і посади проти української
          мелодики та фольклорної основи його музики.
      - >-
          Дебат 2: Чи була його пізня зосередженість на педагогіці, редагуванні
          та обробках свідомим відступом від власної композиторської амбіції під
          тиском офіційної критики?
      - >-
          [!epistemic-humility] Оцінки Ревуцького коливаються від «геніального
          продовжувача Лисенка» до «людини, що зламалася після критики 1934
          року і більше не ризикувала». Обидві позиції спрощують.
      - >-
          [!decolonization] Друга симфонія як маніфест українського
          симфонізму — твір, що з'єднує народну мелодику з європейським
          модерним оркестровим мисленням і протистоїть «провінціалізації»
          української музики.
    section: 'Конфліктна карта: Між нагородами та наглядом'
    words: 900
  - points:
      - >-
          Іржавець і Полтавщина: родинне середовище, брат-музикознавець Дмитро
          Ревуцький, фольклорне коріння.
      - >-
          Освіта в Києві: школа Лисенка, Київська консерваторія (клас
          Рейнгольда Глієра), юридичний факультет Київського університету
          (закінчив 1916). Подвійна освіта як ознака покоління.
      - >-
          Формативні впливи: лисенківська традиція, український мелос,
          європейський романтизм і модернізм. Ревуцький як місток між
          народнопісенним слухом та академічною формою.
      - >-
          Арешт Чекою влітку 1919 року — ледь уникнув розстрілу. Цей факт
          важливий як біографічний контекст, але не повинен ставати центром
          модуля за відсутності архівного досьє.
    section: 'Формування: Від Іржавця до Київської консерваторії'
    words: 1000
  - points:
      - >-
          Друга симфонія (1927, редакції 1940 і 1970) — центральний
          український симфонічний твір, що поєднує народну мелодику з
          оркестровим модернізмом.
      - >-
          Фортепіанний концерт фа мажор — визначний український концерт,
          що приніс Шевченківську премію (1966), але зазнав нищівної офіційної
          критики в 1934 році.
      - >-
          Обробки народних пісень: понад 120 обробок, цикли «Козацькі пісні»,
          «Сонечко», «Галицькі пісні» — педагогічний міст до фольклорної
          мелодики, діалекту і регіональної культури.
      - >-
          Кантата-поема «Хустина» на слова Шевченка, хорові та вокальні твори,
          редакції опери Лисенка «Тарас Бульба» з Лятошинським — роль
          зберігача та передавача спадщини.
      - >-
          Педагогічна діяльність: учитель Платона і Георгія Майбород, Германа
          Жуковського, Леоніда Грабовського, Віталія Кирейка та ін. Ревуцький
          як шарнір між лисенківською традицією і повоєнною українською
          композицією.
    section: 'Діяльність: Симфоніст, педагог, хранитель'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Ревуцький не був дисидентом. Він очолював Спілку
          композиторів України (1944–1948), отримував Сталінські премії,
          працював в офіційних інституціях. Ці факти треба називати прямо.
      - >-
          Офіційна критика Фортепіанного концерту (1934) — публічне
          звинувачення, що фактично зупинило вільний творчий розвиток і
          перенаправило енергію на редагування, педагогіку та обробки.
      - >-
          Нагляд «спецорганів»: ЕІУ документує, що Ревуцький та його брат
          фігурували як «буржуазні націоналісти» в справах репресованих
          українських діячів до 1941 року. Це інституційний сигнал, не
          дозвіл будувати конспірологічний сюжет.
      - >-
          [!myth-buster] Міф «чистого академізму»: радянські нагороди не
          означають лояльність, а переорієнтація на педагогіку — не обов'язково
          «зламаність». Це стратегія передачі: через учнів і редакції спадщина
          жила далі.
    section: 'Тінь: Нагороди, нагляд і мовчання'
    words: 900
  - points:
      - >-
          Повернення до розминки: отже, ким був Ревуцький — лауреатом системи
          чи стратегом, що зберіг українську музичну школу всередині радянських
          інституцій?
      - >-
          [!decolonization] Спадщина Ревуцького — це не нагороди і посади, а
          педагогічна лінія: від Лисенка через Ревуцького до братів Майбород,
          Грабовського і далі. Ця лінія — основа української професійної
          композиції.
      - >-
          Сучасне значення: як обробки Ревуцького, його симфонія і
          фортепіанний концерт повертаються в репертуар — очищені від
          радянського інтерпретаційного шару?
      - >-
          Фінальна дискусія: що важливіше для спадщини композитора — його
          власні твори чи його учні?
    section: 'Дискусія та підсумок: Спадщина'
    words: 700
focus: >-
  Levko Revutskyi as a Lysenko-line composer, teacher, folk-song processor,
  and editor whose career preserved Ukrainian national-school continuity
  inside Soviet institutions; the tension between institutional co-optation,
  surveillance, and cultural transmission through pedagogy.
