objectives:
  - >-
      Аналізувати життя та спадщину Левка Ревуцького як ключової фігури
      української національної композиторської школи XX століття
  - >-
      Оцінювати роль Ревуцького як педагога і хранителя лисенківської традиції,
      що забезпечив передачу спадщини наступним поколінням
  - >-
      Простежувати взаємозв'язок між фольклорною основою, академічною формою
      та інституційним контекстом у творчості композитора
  - >-
      Критично аналізувати дилему митця, який отримував радянські нагороди
      й перебував під наглядом «спецорганів» одночасно
