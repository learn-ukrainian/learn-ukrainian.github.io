content_outline:
- points:
  - >-
    [!biography] Знайомство з Оксаною Лятуринською: поетка, скульпторка й живописиця Празької
    школи, активістка Союзу українок; Маланюк у передмові до *Княжої емалі* порівняв її з
    Ольгою чи Ярославною.
  - >-
    Провокаційне питання: як людина, що відлила бюсти Шевченка, Масарика, Петлюри й Коновальця,
    писала вірші майже «рунічною» стислістю про печерні малюнки та мамутів?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: **1 лютого 1902**, хутір Ліски (тепер с. Хоми, Тернопільська область); батько —
    офіцер прикордонної охорони; мати — німецького походження; шість братів і сестер.
  - >-
    [!epistemic-humility] Розбіжність джерел: інфобокс Вікіпедії помилково вказує Збаразький повіт
    (Австро-Угорщина); тіло статті й ЕІУ дають Кременецький повіт, Волинська губернія — опираємося
    на останнє, не «згладжуємо» помилку.
  - >-
    Освіта: приватна українська гімназія в Кременці (альманах *Юнацтво* редагував Улас Самчук);
    Карлів університет (філософія), Українська студія пластичного мистецтва, чеське художньо-промислове
    училище в Празі.
  - >-
    Втеча від примусового шлюбу (~20 років): через брата Івана в Німеччину; **1924** — Прага без
    дозволу на проживання; назавжди розірваний зв'язок із батьківщиною (лише дві відвідини).
  section: 'Формування: Від Волині до Прази'
  words: 1000
- points:
  - >-
    Скульптура: монумент загиблим воякам УГА в Пардубіцях (1932); бюсти Шевченка, Масарика,
    Петлюри, Коновальця — монументальна чуйність, що відлунює в поезії.
  - >-
    Поезія: *Гусла* (1938) — стисла, архаїчна, міфічна; *Княжа емаль* (1941, Прага) — присвячена
    пам'яті **Юрія Дарагана**; цикл *Веселка* у другому виданні (1956).
  - >-
    Аналіз «Печерних рисунків»: «Тут муж ішов на силу вражу. / Сурмив тут мамут…» — глибоке
    минуле як притулок від сучасності, що знищило родину.
  - >-
    *Материнки* (1946), *Бедрик* (дитяча поезія), постумно *Ягілка* (1971), *Зібрані твори*
    (Торонто, 1983).
  section: 'Діяльність: «Княжа емаль» і скульптура'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Лятуринська — не «другорядна» пражська поетка: її стирають подвійно —
    як митчиню й як свідка родинної катастрофи за СРСР.
  - >-
    Механізм тиску на родину після окупації Західної України (1939): брат **Федір** — арешт за
    «антирадянську пропаганду», **Печорлаг**, **розстріл**; племінниця **Наталя** — тортури в
    тюрмі Кременця; сестра **Марія** з трьома доньками — **депортація на Північний Казахстан**
    (кінець 1939), **смерть від голоду**; дівчат врятували казахи.
  - >-
    Власний лист до Самчука: «Духом я вже давно не в Празі — вию вовчицею на згарищі Лятуринщини» —
    тіло в еміграції, дух на згарищі рідного дому.
  - >-
    [!decolonization] Не «загальна репресія», а названі дії НКВД і депортаційного апарату; не
    «радянський голод» замість конкретної долі сестри.
  section: 'Тінь: НКВД і знищення родини на Волині'
  words: 1600
- points:
  - >-
    Власна доля: **13 червня 1970** — смерть у Міннеаполісі (прогресивна глухота); урна на
    кладовищі Св. Андрія (Нью-Джерсі) — **надгробок обличчям до могили Євгена Маланюка**.
  - >-
    Втрати війни: частина творів загинула в Другій світовій; збереглися пражські видання й
    діаспорне *Зібрані твори*.
  - >-
    Сучасне значення: поезія й скульптура як один «лапідарний» стиль; відновлення пам'яті про
    родину й про придушену митчиню.
  section: 'Підсумок: Вовчиця на згарищі Лятуринщини'
  words: 1000
