content_outline:
- points:
  - 'Провокація: Як актриса, яку Лев Толстой називав геніальною і якій пропонували головні ролі в імператорських театрах,
    могла відмовитись від усього заради напівзабороненої провінційної сцени?'
  - '[!biography] Коротка довідка: Марія Заньковецька (Адасовська), 1854-1934, ікона українського театру XIX ст.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Природний талант» vs «професійна школа». Частина критиків бачила в ній «самородок», що грає інтуїтивно. Інші
    вказували на її освіту та свідому роботу над роллю.'
  - 'Дебат 2: Український патріотизм vs імперська кар''єра. Її відмова грати в Петербурзі — це свідомий політичний акт чи
    страх втратити свій унікальний «народний» стиль у жорстких рамках імперської сцени?'
  - '[!decolonization] Радянська історіографія представляла її як «народну артистку», що близька до «простого люду», замовчуючи
    її роботу в період УНР та зв''язки з національною інтелігенцією.'
  - '[!epistemic-humility] Важко відокремити реальну людину від міфу, створеного навколо неї ще за життя.'
  section: 'Конфліктна карта: Символ нації чи регіональна актриса?'
  words: 900
- points:
  - 'Сім''я та походження: донька збіднілого дворянина з села Заньки. Сценічне ім''я як данина малій батьківщині.'
  - 'Освіта та перші кроки: пансіон у Чернігові, перші аматорські вистави, захоплення українською народною піснею.'
  - 'Формативні впливи: світ українського села, народні обряди та культура як джерело її унікального сценічного реалізму.'
  - 'Вибір шляху: рішення пов''язати життя з українським театром всупереч волі родини та суспільним упередженням.'
  section: 'Формування: Від Марії Адасовської до Заньковецької'
  words: 1000
- points:
  - 'Створення канону: робота з Марком Кропивницьким, Михайлом Старицьким, Миколою Садовським — творцями першого професійного
    українського театру.'
  - 'Знакові ролі: Наталка («Наталка Полтавка»), Галя («Назар Стодоля»), Олена («Глитай, або ж Павук»). Заньковецька не грала,
    а «жила» на сцені.'
  - 'Гастролі та визнання: шалений успіх у Петербурзі та Москві. Рецензії, що відзначали її «психологічну глибину» та «природність»
    гри, протиставляючи її академізму імператорської сцени.'
  - 'Стиль: поєднання етнографічної точності, психологічного реалізму та трагедійного пафосу.'
  section: 'Діяльність: Зірка Театру корифеїв'
  words: 1300
- points:
  - '[!anti-hagiography] Головний акт «самопожертви» — відмова від контракту з імператорським Александринським театром. Це
    не лише патріотизм, а й кінець кар''єрних перспектив, фінансової стабільності та доступу до світового репертуару.'
  - 'Професійні обмеження: український театр під цензурою (Емський указ 1876 р.) був змушений ставити переважно побутові драми
    та комедії. Трагедійний талант Заньковецької не міг розкритись повною мірою.'
  - 'Особиста ціна: нестабільне життя мандрівної актриси, фінансові труднощі, залежність від антрепренерів.'
  - '[!myth-buster] Міф про безперервний тріумф. Її кар''єра — це історія злетів і падінь, розпаду театральних труп, періодів
    забуття та боротьби за існування української сцени.'
  section: 'Тінь: Ціна вірності'
  words: 900
- points:
  - 'Повернення до розминки: тепер студент може аргументовано пояснити, чому Заньковецька зробила свій вибір і яку ціну за
    нього заплатила.'
  - 'Спадщина: Заньковецька — не просто видатна актриса. Вона — співтворець модерної української ідентичності, яка утвердила
    статус української мови та культури на театральній сцені імперії.'
  - '[!decolonization] Її постать як символ культурного суверенітету. Надання її імені театру у Львові (колишній театр Скарбека)
    — акт символічного повернення українцям культурного простору.'
  - 'Сучасна релевантність: чи можливий сьогодні такий свідомий вибір — відмова від глобальної кар''єри заради національного
    мистецтва?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
