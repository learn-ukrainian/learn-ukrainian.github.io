objectives:
- Аналізувати життєвий шлях Богдана Бойчука від примусового вивезення остарбайтером до співзасновника
  Нью-Йоркської групи в еміграції.
- Пояснювати естетику «розбитої логіки» та урбаністичного екзистенціалізму Бойчука й роль антології
  «Координати» (1969) у збереженні поезії Заходу.
- Критично оцінювати радянське таврування діаспорного модернізму як «буржуазного націоналізму»
  — той самий присуд, що знищив Розстріляне відродження.
- Досліджувати повернення Бойчука в Київ після 1991 року як спростування тези про «зраду» батьківщини
  емігрантами.
