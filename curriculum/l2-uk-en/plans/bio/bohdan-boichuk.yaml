persona:
  role: Модератор семінару про діаспорний модернізм, інституції й первинні свідчення автора.
  voice: Intellectual Historian
objectives:
- Відтворювати хронологію примусового вивезення, табору переміщених осіб та еміграції без припущень про мотиви неповернення.
- Пояснювати розвиток неформального кола, назву Нью-Йоркської групи 1958 року й початок «Нових поезій» 1959 року.
- Аналізувати «Час болю» за точним виданням і зіставляти його з усним свідченням автора.
- Зберігати невирішену розбіжність щодо місця смерті й уникати спрощеної схеми одноразового «повернення».
content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Богдан Миколайович Бойчук народився 11 жовтня 1927 року в Бертниках і помер 10 лютого 2017 року.'
  - '[!epistemic-humility] ЕСУ називає місцем смерті Нью-Йорк, а Енциклопедія України — Київ; план не обирає версію голосуванням.'
- section: 'Примусове вивезення, табір і США'
  words: 1000
  points:
  - Нацистське примусове вивезення 1944 року та повоєнне життя в таборі переміщених осіб в Ашаффенбурзі.
  - Еміграція до США 1949 року, Ґлен-Спей, освіта в Нью-Йорку та праця поза літературою.
  - Не приписуємо авторові недокументованого рішення про неповернення через конкретну радянську загрозу.
- section: 'Нью-Йоркська група та видавничі інституції'
  words: 1200
  points:
  - Неформальне коло сформувалося в середині 1950-х; назву застосовували від 1958 року, а «Нові поезії» почали виходити 1959 року.
  - Бойчук і Юрій Тарнавський були ініціаторами, але склад і приєднання інших авторів мали власні дати.
  - «Координати», «Сучасність» і «Світо-вид» розглядаються як різні редакторські та видавничі проєкти.
- section: 'Поезія, інтерв’ю та межі цитування'
  words: 1600
  points:
  - «Час болю» читається за нью-йоркським виданням 1957 року, а не за переказом його тем.
  - '[!anti-hagiography] Естетичні позиції автора не перетворюємо на одне гасло; попередній план містив неточний переказ вислову.'
  - Інтерв’ю BookForum є первинним усним свідченням, але не ліцензією на відтворення тексту чи фотографій.
- section: 'Підсумок: багатомісна діаспорна біографія'
  words: 1000
  points:
  - Пізні зв’язки з Києвом і Ґлен-Спеєм утворюють багатомісну траєкторію, а не просту історію остаточного повернення.
  - Деколонізаційне читання визнає українську агентність автора й водночас називає нацистський примус, післявоєнне переміщення та інституційну працю в діаспорі.
