content_outline:
- points:
  - '[!biography] Знайомство з Богданом Бойчуком (1927–2017): поет, драматург, інженер-електрик
    і співзасновник Нью-Йоркської групи україномовних модерністів.'
  - 'Провокаційне питання: чому ціла течія вільної української поезії могла існувати лише за тисячі
    кілометрів від України — у Нью-Йорку, а не в Києві чи Харкові?'
  - 'Бойчук як місток між світами: емігрант, який після 1991 року повернувся до Києва й видавав
    там журнал «Світо-вид».'
  section: Розминка
  words: 400
- points:
  - Народження 11 жовтня 1927 року в селі Бертники на Тернопільщині (нині Чортківський район Тернопільської
    області).
  - Підлітком вивезений на примусову працю до Німеччини як остарбайтер; від 1944 року жив у таборі
    для переміщених осіб в Ашаффенбурзі, де закінчив середню школу.
  - '[!decolonization] Витіснення спричинене радянською реокупацією Західної України 1944 року:
    повернення означало репресії проти репатрійованих остарбайтерів, тож Бойчук відмовився вертатися
    до СРСР.'
  - 1949 року емігрував до США, оселився поблизу Нью-Йорка (Глен-Спей); 1957 року закінчив нью-йоркський
    коледж і все життя працював інженером-електриком. Дебютна збірка «Час болю» (1957) постала
    після трьох років у туберкульозному санаторії.
  section: 'Формування: Від остарбайтера до Нью-Йорка'
  words: 1000
- points:
  - 1958 року — співзаснування Нью-Йоркської групи; від 1959 року Бойчук — співзасновник і співредактор
    щорічника «Нові поезії».
  - '[!decolonization] «Координати: антологія сучасної української поезії на Заході» (1969, 2
    томи), укладена разом із Богданом Рубчаком, — фундаментальна антологія поезії української
    еміграції.'
  - 'Естетика: високий модерністський верлібр, урбанізм, екзистенціалізм і навмисно «розбита логіка»
    синтаксису. Серед визнаних впливів — Сартр, Камю, Кафка, Лорка, Неруда.'
  - 'Афоризм Бойчука як кредо групи: «Кожна нова генерація приходить, щоб творчо заперечити попередню».
    Інші збірки: «Земля була пустошня» (1959), «Спомини любови» (1963), «Мандрівка тіл» (1967),
    «Дві драми» (1968) з п''єсою «Голод — 1933». 1961–1973 років — літературний редактор журналу
    «Сучасність» у Мюнхені.'
  section: 'Діяльність: Нью-Йоркська група та «Координати»'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм гноблення тут — не арешт, а витіснення й заборона: радянська
    машина фізично нічого з доробку Бойчука не знищила, бо він був поза її досяжністю.'
  - 'Парадокс збереження: саме тому, що Бойчук писав у вигнанні, постав цілий пласт вільної української
    модерністської поезії, який не міг бути ні написаним, ні надрукованим в УРСР.'
  - 'Радянський присуд: будь-який модернізм поза соцреалізмом таврували як «буржуазний націоналізм»
    — той самий ярлик, яким у 1920–30-х роках знищили Розстріляне відродження. Нью-Йоркська група
    свідомо продовжувала цю обірвану лінію.'
  - '[!epistemic-humility] [!myth-buster] Чесність із складними фактами: джерела розходяться щодо
    місця смерті (10 лютого 2017 року) — українська преса й IEU називають Київ, ЕСУ — Нью-Йорк;
    подаємо Київ як краще засвідчену версію, не приховуючи розбіжності. П''єса «Голод — 1933»
    прямо називає Голодомор.'
  section: 'Тінь: Заборонена естетика та «буржуазний націоналізм»'
  words: 1600
- points:
  - '[!anti-hagiography] Бойчук — не «законсервований» емігрант, а місток: після 1991 року його
    творчість повернулася в Україну разом із ним самим.'
  - '1990–1999 років — співзасновник і співредактор (з Марією Ревакович) київського літературного
    журналу «Світо-вид»; пізня київська проза: «Дві жінки Альберта» (2002), «Спомини в біографії»
    (2003), збірка «Київські екслібриси» (2006).'
  - 'Сучасне значення: повернення Бойчука спростовує карикатуру про «емігрантів, що покинули Україну»,
    а доробок Нью-Йоркської групи став одним із чинників деколонізації культури після 1991 року.'
  section: 'Підсумок: Повернення в Київ'
  words: 1000
focus: Богдан Бойчук як співзасновник Нью-Йоркської групи, поет-модерніст, драматург та інженер,
  чия вільна україномовна поезія могла постати лише поза досяжністю радянської цензури. Аналіз
  його естетики «розбитої логіки», ролі антології «Координати» та повернення в Київ після 1991
  року як містка між діаспорою та незалежною Україною.
