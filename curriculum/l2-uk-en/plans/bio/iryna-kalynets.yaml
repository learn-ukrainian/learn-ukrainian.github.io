content_outline:
- points:
  - >-
    [!biography] Знайомство з Іриною Онуфріївною Калинець, також Стасів-Калинець:
    поетка, педагогиня, політв'язень, редакторка *Євшан-зілля*, освітня діячка і
    професорка Львівського університету.
  - >-
    Верифіковані дати: народилася 1940-12-06 у Львові; померла 2012-07-31 у Львові.
  - >-
    Провокаційне питання: чому радянське слідство викликало школярів як свідків проти
    вчительки української літератури?
  section: Розминка
  words: 400
- points:
  - >-
    Народження у Львові в умовах радянської окупації після анексії 1939 року; навчання
    у Львівському університеті, який вона закінчила 1964 року.
  - >-
    Праця вчителькою, методисткою і бібліотекаркою; пізніше — професорська та освітня
    діяльність у Львівському університеті після відновлення незалежності України.
  - >-
    Подружжя з Ігорем Калинцем і материнство Звенислави Калинець; дев'ять років
    родинної розлуки через ув'язнення і заслання не можна подавати як другорядну
    примітку.
  - >-
    [!decolonization] Її шкільна й культурна праця пов'язувала українську історію,
    релігійну пам'ять та мову в умовах радянської русифікації й антирелігійного тиску.
  section: 'Формування: Львів, школа і культурна пам''ять'
  words: 1000
- points:
  - >-
    Ранні й рукописні тексти: "Дика троянда" 1959 року, *Лісовий Никифор*,
    *Дорога вигнання*, *Оранта* та інші збірки, частина яких дійшла до пізніших
    видань.
  - >-
    Підписання протестів 1970 року і грудня 1971 року, участь у колективних листах,
    голодуваннях, великодніх протестах та зверненнях до ООН і правозахисних органів.
  - >-
    Після повернення — співзаснування і редагування *Євшан-зілля* з Ігорем Калинцем
    у 1987-1989 роках, а також дитяча проза і культурологічні студії.
  - >-
    [!anti-hagiography] Джерела прямо застерігають від редукції "дружина Ігоря
    Калинця": вона була самостійною авторкою, організаторкою, політв'язнем,
    освітньою реформаторкою і професоркою.
  - >-
    Релігійні образи, плачові форми і історичні шари від Київської Русі до
    дисидентської сучасності формують її окремий поетичний і педагогічний голос.
  section: 'Діяльність: Поезія, самвидав і освітня праця'
  words: 1200
- points:
  - >-
    Звільнення 1970 року, КДБ-стеження і арешт у Львові 1972-01-12; суд у липні
    1972 року за ст. 62 ч. 1 КК УРСР.
  - >-
    Слідство викликало приблизно сотню учнів, але лише двоє чи троє дали свідчення
    проти неї; обвинувачення згадувало вірші, присвячені В'ячеславу Чорноволу,
    тексти Валентина Мороза і розмови про незалежну Україну.
  - >-
    Суд не довів участі в групі Чорновола чи в нецензурованому "Українському
    віснику", але все одно присудив 6 років таборів суворого режиму і 3 роки заслання.
  - >-
    Жіноча політична зона ЖХ-385/3-4 у Барашево: поруч зі Стефанією Шабатурою,
    Надією Світличною та іншими; колективні листи, голодування, великодні протести.
  - >-
    [!myth-buster] Радянське звинувачення в "антирадянській агітації" не описує
    злочину; воно показує, як імперська система криміналізувала українську історію,
    релігійну пам'ять і педагогічну чесність.
  section: 'Тінь: Учні як свідки, табір Барашево і заслання'
  words: 1600
- points:
  - >-
    [!epistemic-humility] Досьє не перетворює родинне минуле з УГКЦ та ОУН на іншу
    воєнну тему; у цьому модулі йдеться про документований культурний і правозахисний
    спротив Ірини Калинець.
  - >-
    Публікації *Поезії* (New York, 1991) і *Шлюб із полином* (Львів, 1995) повернули
    частину рукописної спадщини, створеної до, під час і після ув'язнення.
  - >-
    Після 1990 року її освітня й публічна праця не є додатком до табірної біографії,
    а другим великим етапом відповідальності за українську культуру.
  - >-
    Завершальне питання: як говорити про родинну розлуку, жіночий табірний досвід і
    поезію так, щоб не створити ані радянської карикатури, ані безтілесної ікони?
  section: 'Підсумок: Повернення рукописів і школа пам''яті'
  words: 1000
focus: >-
  Ірина Калинець як поетка, педагогиня, політв'язень і освітня діячка, чия біографія
  поєднує львівську культурну пам'ять, радянську криміналізацію шкільного й
  релігійного голосу, жіночий табірний спротив та пострадянське повернення рукописів.
level: BIO
module: bio-273
objectives:
- >-
  Пояснювати самостійну біографію Ірини Калинець як авторки, педагогині й
  правозахисниці, не редукуючи її до родинного зв'язку з Ігорем Калинцем.
- >-
  Аналізувати механізм справи 1972 року: КДБ, учні як свідки, стаття 62, жіночий
  табір Барашево і заслання в Читинській області.
- >-
  Розпізнавати релігійні, історичні й поетичні шари її письма як частину української
  культурної резистенції.
- >-
  Оцінювати посттабірне повернення рукописів і освітню працю як другий етап її
  культурної відповідальності.
