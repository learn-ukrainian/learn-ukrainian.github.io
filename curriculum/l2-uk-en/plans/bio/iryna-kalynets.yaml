content_outline:
- points:
  - >-
    [!biography] Знайомство з Іриною Калинець (Стасів-Калинець): поетеса, педагог,
    політв'язенька, співзасновниця *Євшан-зілля*, професорка, депутатка.
  - >-
    Провокаційне питання: чому суд засудив вчительку, коли лише двоє-троє зі ста учнів
    дали показання проти неї?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 6 грудня 1940 року у Львові; закінчення Львівського університету (1964);
    робота вчителькою, методисткою, бібліотекаркою; дебют «Дика троянда» (1959).
  - >-
    Рукописні збірки *Лісовий Никифор* (1965), *Дорога вигнання*, *Оранта*; підписання
    протестів 1970 та грудня 1971 року.
  - >-
    [!decolonization] Подвійна свідомість у радянській школі та родинна греко-католицька (УГКЦ)
    релігійна пам'ять — джерело її національної ідентичності й поетичного спротиву.
  section: 'Формування: Львів, школа та рукописна поезія'
  words: 1000
- points:
  - >-
    Арешт у Львові 12 січня 1972 року; суд у липні 1972 зі Стефанією Шабатурою за ч. 1
    ст. 62; вирок — 6 років таборів і 3 роки заслання.
  - >-
    Табір ЖХ-385/3-4 у Барашеві (Мордовія) разом із Надією Світличною та іншими;
    колективні листи, голодування, протести на Великдень, звернення до ООН.
  - >-
    Співредагування *Євшан-зілля* (1987–1989) з Ігором; збірки *Поезії* (Нью-Йорк, 1991),
    *Шлюб із полином* (Львів, 1995); дитяча проза та культурологічні студії 1990-х.
  section: 'Діяльність: Поезія, педагогіка та *Євшан-зілля*'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Слідство викликало учнів як свідків; обвинувачення — читання
    віршів на честь В'ячеслава Чорновіла, роздача творів Валентина Мороза, розмови
    про незалежну Україну — мова КДБ, не доказ злочину.
  - >-
    Заслання в Читинській області; рукописи *Крізь камінь*, *Тирсою в полі*, *Остання
    з плакальниць* — поезія ув'язнення та вигнання.
  - >-
    [!epistemic-humility] Смерть 31 липня 2012 року у Львові; точний номер архівної справи
    в досьє не знайдено.
  section: 'Тінь: Суд, учні-свідки та табір ЖХ-385'
  words: 1600
- points:
  - >-
    Розлука з донькою Звениславою протягом дев'яти років — особиста ціна без компромісу
    з агіографією «героїні».
  - >-
    Після 1990 — освітня реформа, професура, депутатський досвід (ESU); друга фаза життя,
    не додаток до табору.
  - >-
    [!myth-buster] Не зводити до «дружини Ігора»: назвати власні збірки, табірний досвід
    жінок-політв'язеньок і редакторську роботу.
  section: 'Підсумок: Оранта, вигнання та повернення голосу'
  words: 1000
focus: >-
  Ірина Калинець — поетеса, педагог і політв'язенька, чия справа показує криміналізацію
  української школи та жіночий табірний спротив. Аналіз рукописів, суду, Мордовії та
  *Євшан-зілля*.
