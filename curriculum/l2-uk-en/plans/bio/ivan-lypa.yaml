content_outline:
- points:
  - 'Провокація: Як людина, що дала клятву Гіппократа, стає ідеологом таємного товариства, мета якого — повалення імперії?'
  - '[!biography] Іван Липа: лікар, чий діагноз був політичним, а рецептом — державна незалежність.'
  section: 'Розминка: Парадокс лікаря-революціонера'
  words: 400
- points:
  - 'Дебат 1: Професійна етика vs національний обов''язок. Чи міг Липа залишатись об''єктивним лікарем, будучи підпільним
    революціонером? Як це сприймали сучасники?'
  - 'Дебат 2: Спадщина тарасівців. Наївні ідеалісти, що зазнали поразки, чи необхідний перший крок до політичного націоналізму
    ХХ століття?'
  - '[!epistemic-humility] Оцінки коливаються від «гуртка мрійників» до «першої свідомої самостійницької організації».'
  section: 'Конфліктна карта: Лікар чи ідеолог?'
  words: 900
- points:
  - Народження на Полтавщині в родині з козацьким корінням.
  - Навчання на медичному факультеті в Харкові — центрі українського студентського руху.
  - 'Еволюція світогляду: від культурного просвітництва (народництва) до політичного самостійництва.'
  - 'Формативні впливи: знайомство з провідними діячами українства, перші літературні спроби як інструмент боротьби.'
  section: 'Формування: Полтавський корінь, харківський гарт'
  words: 1000
- points:
  - 'Заснування Братства тарасівців у 1891 році: ідеологічні засади («Символ віри»), структура, члени.'
  - 'Діяльність братства: поширення ідей, спроби створення мережі, культурна робота.'
  - Лікарська практика як прикриття та джерело для розуміння соціальних проблем.
  - Літературна та публіцистична творчість як другий фронт боротьби за українську свідомість.
  section: 'Діяльність: Два фронти — перо і стетоскоп'
  words: 1300
- points:
  - '[!anti-hagiography] Стратегічна поразка: швидкий розгром Братства тарасівців царською охранкою засвідчив його слабкість
    та ізольованість.'
  - '[!myth-buster] Це не був масовий рух. Тарасівці — невелика, здебільшого інтелігентська, група, що не мала широкої підтримки
    в суспільстві.'
  - 'Особиста трагедія: арешт, заслання, участь у поразці УНР, еміграція та смерть далеко від незалежної України, якій він
    присвятив життя.'
  - 'Професійні компроміси: поєднання лікарської практики з підпільною діяльністю створювало постійні ризики для нього та
    його пацієнтів.'
  section: 'Тінь: Ціна самостійності'
  words: 900
- points:
  - 'Повернення до парадоксу: Ким був Іван Липа насамперед — лікарем, що лікував людей, чи ідеологом, що намагався вилікувати
    націю?'
  - '[!decolonization] Переоцінка спадщини: від радянського тавра «буржуазний націоналіст» до постаті одного з ключових ідеологів
    української державності.'
  - 'Спадкоємність ідей: як діяльність Липи та тарасівців вплинула на наступні покоління борців за незалежність, зокрема на
    його сина Юрія Липу.'
  - 'Сучасна актуальність: чи можна вважати Липу символом української інтелігенції, що бере на себе відповідальність за долю
    держави?'
  section: 'Дискусія та підсумок: Спадщина пророка'
  words: 700
focus: The biography of Ivan Lypa, analyzing the inherent conflict between his roles as a doctor sworn to heal, a writer,
  and a revolutionary ideologue. Examines the formation and failure of the Brotherhood of Tarasivtsi and Lypa's complex legacy
  as a prophet of Ukrainian independence.
level: BIO
module: bio-063
objectives:
- Аналізувати ідеологію та діяльність Братства тарасівців, визначаючи його місце в українському національному русі.
- Критично оцінювати внутрішній конфлікт Івана Липи між професійним обов'язком лікаря та місією політичного діяча.
- Пояснювати причини поразки тарасівців та особистої трагедії Липи в контексті історичних умов кінця XIX – початку XX ст.
- Формулювати власну позицію щодо спадщини Івана Липи, розрізняючи історичну постать та її символічне значення.
