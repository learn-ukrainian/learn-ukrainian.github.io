content_outline:
- points:
  - 'Провокація: Максим Залізняк — визволитель Правобережжя чи ватажок повстання, що закінчилося масовим
    убивством мешканців Умані? Чому одну подію звуть і «здобуттям Умані», і «Уманською трагедією»?'
  - '[!biography] Запорожець і гайдамацький ватажок, якого повстанці проголосили гетьманом, а російська
    імперія заслала на нерчинську каторгу.'
  - '[!anti-hagiography] Модуль не подає ні чистого героя-визволителя, ні лише «різуна»: Уманська різанина
    — центральний факт, а не примітка.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (пам''ять громад): для православної правобережної бідноти — повстання проти визиску й релігійного
    тиску; для польської шляхти, єврейських, римо-католицьких та унійних громад Умані — катастрофа й масове
    вбивство.'
  - 'Дебат 2 (історіографія): радянське «антифеодальне класове» прочитання проти агіографічного «національного
    месника» проти сучасної історіографії (Барбара Скіннер), що наголошує на релігійному пограниччі й
    попереджає: самі лише національні та класові категорії не пояснюють насильства, зокрема й проти українців.'
  - '[!decolonization] Російські війська й «Золота грамота» — політичні актори, що спершу живили кризу
    ілюзією імперської підтримки, а потім придушили повстання; це не нейтральні визволителі.'
  - '[!epistemic-humility] Дати народження й смерті непевні (бл. 1740 — смерть невідома, ймовірно на засланні);
    число жертв Умані джерельно спірне — уникати беззастережних «20 000».'
  section: 'Конфліктна карта: визволитель чи різанина? Умань між «здобуттям» і трагедією'
  words: 900
- points:
  - 'Походження: народжений бл. 1740 року в Медведівці (тепер Черкащина) у селянській родині; після смерті
    батька — Тимошівський курінь Нової Січі.'
  - 'Січовий шлях: наймитом у зимівниках, у рибних і соляних промислах; до 1762 року — підпушкарій (помічник
    артилериста) на Січі.'
  - Повернення 1767 року в рідні краї; тло — кріпацтво, магнатська влада, релігійний тиск на православних.
  - '[!decolonization] Барська конфедерація 1768 року різко загострила ситуацію; вступ російського війська
    проти конфедератів створив серед частини православних ілюзію очікуваної імперської підтримки.'
  section: 'Формування: від наймита до гайдамацького ватажка'
  words: 1000
- points:
  - 'Організація в Холодному Яру / Мотронинському монастирі наприкінці травня — на початку червня 1768
    року: найкращий анкер місця-пам''яті.'
  - 'Похід: швидке захоплення чи контроль правобережних містечок — Медведівка, Жаботин, Сміла, Черкаси,
    Корсунь, Канів, Богуслав, Лисянка.'
  - 'Умань: сильно укріплений торговий центр; місто взяте 20-21 червня 1768 року після того, як уманська
    міліція Гонти перейшла на бік повстання.'
  - '[!anti-hagiography] Уманське насильство: масове вбивство єврейських, польських, римо-католицьких
    та унійних мешканців і біженців. Це центральний доказ, а не переможний епізод без жертв. Єврейська
    й польська пам''ять (Encyclopaedia Judaica, Jewish Encyclopedia) зберігає Умань як різанину/погром;
    старі числа й полемічну мову подавати з контекстом.'
  - 'Спроба ладу: Залізняк намагався відновити господарське життя й козацькі органи влади, був проголошений
    гетьманом — але це не виправдовує насильства, а стоїть поряд із ним.'
  section: 'Діяльність: Коліївщина 1768 — від Холодного Яру до Умані'
  words: 1300
- points:
  - '[!myth-buster] «Золота грамота» Катерини II — чутка й фальшивка, а не легітимний мандат на визволення;
    вчити як імперську дезінформацію й політичне непорозуміння.'
  - '[!anti-hagiography] Відповідальність без спрощення: Залізняк і Гонта разом очолили силу, що взяла
    Умань, але конкретні накази, чутки, місцеві переходи й динаміка різанини різняться за джерелами —
    уникати як монопричинної провини, так і виправдання.'
  - 'Придушення й покарання: російський корпус генерала Кречетникова придушив рух і заарештував Залізняка
    та Гонту (26 червня ст. ст. / 7 липня н. ст.; за IEU — 8 липня 1768 року). Як російського підданого
    Залізняка засудили до довічної каторги в нерчинських копальнях, де він, імовірно, і помер.'
  - 'Пересторога проти дрейфу: не перетворювати маєткову оренду з єврейськими управителями й шинкарями
    на колективну єврейську провину; не зводити всіх поляків і католиків до «гнобителів». Насильство проти
    цивільних називати прямо.'
  section: 'Тінь: «Золота грамота», різанина й імперська каторга'
  words: 900
- points:
  - 'Повернення до розминки: чи можна дати однозначну відповідь «визволитель чи різанина», чи подія лишається
    трагічно двоїстою?'
  - 'Літературна рецепція: Шевченкові «Гайдамаки», «Холодний Яр», «Невольник» і роман Мушкетика «Гайдамаки»
    — це пам''ять і моральна уява, а не нейтральна хроніка; вчити як рецепцію, а не як джерело подій.'
  - '[!decolonization] Місця-пам''яті (Холодний Яр, Мотронинський монастир, Умань, Нерчинськ) вибудовують
    дугу від локального повстання до імперського заслання; шкільні тріумфальні перекази, що стирають Умань,
    не є фактичним авторитетом.'
  section: 'Дискусія та підсумок: повстання, різанина й пам''ять'
  words: 700
focus: 'Maksym Zalizniak as central leader of the 1768 Koliivshchyna: the Right-Bank social, confessional
  and geopolitical pressures behind the rising, the capture of Uman inseparable from the massacre of its
  Jewish, Polish, Roman Catholic and Uniate residents, the "Golden Charter" imperial manipulation, and
  the Russian suppression that exiled him, taught with explicit victim memory and refusal of both Soviet
  class-war and hagiographic national-avenger flattening.'
level: BIO
module: bio-336
objectives:
- >-
  Пояснювати причини Коліївщини як поєднання соціального (кріпацтво,
  магнатська влада), релігійного (православно-унійно-католицьке пограниччя)
  та геополітичного (Барська конфедерація, імперська маніпуляція) тиску, а не
  спонтанної етнічної ненависті.
- 'Тримати разом «здобуття Умані» та Уманську трагедію: прямо називати масове вбивство польських, єврейських,
  римо-католицьких та унійних мешканців і біженців, не подаючи Умань лише як переможний епізод.'
- Аналізувати «Золоту грамоту» як імперську дезінформацію й політичну ілюзію, а російське придушення повстання
  — як доказ, що імперія не була визволителем.
- Розрізняти історичний запис і літературну рецепцію (Шевченкові «Гайдамаки»), не використовуючи поему
  як буквальне джерело подій; уникати як радянського «класового», так і агіографічного «національного
  месника» спрощень.
