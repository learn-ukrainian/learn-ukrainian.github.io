objectives:
  - >-
      Аналізувати життя і працю Георгія Нарбута в контексті української
      візуальної державності й графіки, уникаючи агіографії
  - >-
      Пояснювати, як гроші, марки, печатка і абетка створювали видиму українську
      державність
  - >-
      Чесно описувати ранню смерть від тифу і радянську маргіналізацію його
      державної символіки без вигаданих особистих репресій
  - >-
      Формулювати аргументовану позицію щодо ролі Нарбута як творця української
      графічної школи
