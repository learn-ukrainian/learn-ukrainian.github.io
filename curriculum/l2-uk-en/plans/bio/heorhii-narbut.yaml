content_outline:
- points:
  - >-
    [!biography] Георгій Нарбут: графік, ілюстратор, книжковий художник,
    майстер геральдики, професор і ректор Української академії мистецтв.
  - >-
    Провокаційне питання: коли держава народжується у війні, хто створює її
    видимість — політики, війська чи художник, який малює гроші, печатки й літери?
  section: Розминка
  words: 400
- points:
  - >-
    Нарбутівка, Глухів, козацько-старшинська пам'ять і гімназійна самоосвіта:
    родинна спадщина як матеріал для майбутньої мови орнаменту й герба.
  - >-
    Петербурзьке навчання, коло Білібіна й Добужинського, школа Званцевої,
    Мюнхенський досвід: імперський центр як місце професійної техніки, не
    культурної власності над митцем.
  - >-
    [!decolonization] Нарбут не "російський графік із українськими мотивами":
    його повернення до Києва 1917 року перетворює стиль на інструмент української державності.
  section: 'Формування: Від Нарбутівки до Києва через Петербург'
  words: 1000
- points:
  - >-
    1917-1920: державні папери, гроші, марки, печатки, військова й дипломатична
    документація Української Народної Республіки та Української Держави.
  - >-
    Перша українська державна банкнота 100 карбованців: Нарбут уводить тризуб
    у дизайн грошового знака, роблячи символ масово видимим.
  - >-
    `Українська абетка` і нарбутівський шрифт: барокова традиція, орнамент і
    літера як місток між мовним навчанням і візуальною культурою.
  - >-
    Українська академія мистецтв: співорганізатор, професор графіки, ректор у
    період, коли сама інституція переживала війну, зміну режимів і матеріальну несталість.
  section: 'Діяльність: Банкнота, шрифт, академія'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Не перетворюємо Нарбута на одноосібного "автора герба":
    він ключовий для тризуба на банкноті й геральдичних комісій, але офіційна
    історія емблеми включає Василя Кричевського та державні рішення.
  - >-
    Дизайн під загрозою: його графіка працювала для українських інституцій, які
    розпадалися, евакуювалися або переходили під тиск більшовицьких і білогвардійських сил.
  - >-
    [!myth-buster] Смерть у Києві 1920 року — тиф у воєнній нестабільності, не
    розстріл і не поліційна справа; трагедія тут у хворобі, війні та крихкості інституцій.
  - >-
    [!epistemic-humility] Імена Георгій, Юрій, Єгор у джерелах пояснюють
    багатомовну документацію; канонічне ім'я модуля — Георгій Нарбут.
  section: 'Тінь: Дизайн під загрозою державності'
  words: 1600
- points:
  - >-
    Об'єктне читання: банкнота, марка чи літера як джерело — що бачимо, які
    символи повторюються, які історичні стилі оживають, яку державу вони уявляють.
  - >-
    Нарбут як учитель української візуальної грамотності: учні вчаться описувати
    герб, шрифт, печатку, композицію, орнамент і державність українською.
  - >-
    Сучасне значення: протидія радянському чи російському привласненню через
    точне називання його київського державотворчого періоду.
  section: 'Підсумок: Графіка як мова держави'
  words: 1000
focus: >-
