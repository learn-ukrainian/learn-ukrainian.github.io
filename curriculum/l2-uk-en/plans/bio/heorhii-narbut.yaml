content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому перші українські гроші, марки й державну печатку
          намалювала одна людина - і чому це було державотворенням?
      - >-
          [!biography] Георгій Нарбут - художник-графік, автор перших українських
          державних знаків і ректор Української академії мистецтв.
      - >-
          Походження і освіта: Глухівщина, самоосвіта, Петербург, навчання у
          Білібіна й Добужинського, Мюнхен, обʼєднання «Світ мистецтва».
      - >-
          Знавець української старовини: герби, геральдика козацької старшини;
          самопідпис «мазепинець полку Чернігівського».
    section: 'Формування: Від Глухова до петербурзької графіки'
    words: 1000
  - points:
      - >-
          Українська візуальна державність: марки УНР (30, 40, 50 шагів),
          банкноти, грамоти, проєкти Державного Герба і Печатки.
      - >-
          Мала Державна печатка (затверджена 1918 року): козак з пищалем і
          володимирський тризуб - державний символ України.
      - >-
          «Українська абетка» (1917): неперевершений зразок української
          каліграфії і шрифтового мистецтва.
      - >-
          [!decolonization] Нарбут створив українські державні знаки, а не
          «російську графіку»: це навчальний центр модуля.
    section: 'Діяльність: Гроші, печатка і абетка'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          [!myth-buster] Чесна рамка: Нарбута не репресували - він помер від
          тифу 1920 року в 34 роки; не вигадувати особистих репресій.
      - >-
          Радянська небезпека символів: тризуб і гроші УНР стали політично
          небезпечними, а сенс символіки Нарбута маргіналізували.
      - >-
          [!anti-hagiography] Литовсько-шляхетське походження роду - нюанс, а не
          суперечність українській самоідентифікації художника.
    section: 'Контекст: Рання смерть і небезпека символів'
    words: 1000
  - points:
      - >-
          Школа Нарбута: разом з В. Кричевським і бойчукістами започаткував
          українську графічну школу 1920-1930-х років.
      - >-
          Сучасна пам'ять: марки України за малюнками Нарбута (1992), вулиці,
          монета, астероїд; повернення державної символіки після 1991 року.
      - >-
          Чому візуальна державність Нарбута важлива для сучасної України.
    section: "Сучасна пам'ять: Творець державних знаків"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як графіка - гроші, марки, печатка, абетка -
          створює видиму державність нації.
      - >-
          Аргументована відповідь: що робить Нарбута важливим - державні знаки,
          абетка, академія чи синтез української графіки.
      - >-
          Фінальне письмо: Нарбут як приклад візуального державотворення.
    section: "Дискусія та підсумок: Графіка як державність"
    words: 800
focus: >-
  Heorhii Narbut as the maker of Ukrainian visual statehood: designer of the
  first UNR banknotes, stamps, and state seal, creator of the «Українська абетка»,
  and co-founder and rector of the Ukrainian Academy of Arts, taught through the
  graphic creation of statehood with a HIST-aligned 1917-1920 frame and an honest
  note that he died of typhus rather than repression.
level: BIO
