content_outline:
- points:
  - 'Провокація: в українській пам''яті Сомко — гідний, шляхетний суперник, що програв Чорну раду. Але чи була його політична програма такою чистою, якою її зробила література?'
  - '[!biography] Знайомство з постаттю на перетині трьох мов: козацько-літописної, канцелярсько-політичної та літературної пам''яті Куліша. Уже тут ставимо питання: хто, коли й навіщо зробив Сомка символом?'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Сомко мав виразнішу за багатьох суперників автономну програму — вимагав виведення воєвод і обмеження московського фіскального втручання, тобто боронив «права і вольності» Гетьманщини.'
  - 'Позиція 2: водночас він репрезентував заможні козацько-старшинські інтереси, намагався посилити гетьманську владу над полковниками й з осторогою ставився до запорозької участі — це не робить його демократом на тлі Брюховецького.'
  - '[!decolonization] Царська сторона тут не нейтральний арбітр: московське визнання стало правом вето, а військова присутність Гагіна прямо формувала перебіг ради. Імперське спрощення — подати Москву як розсудливого посередника над «безладним» українським полем.'
  - '[!epistemic-humility] Рік народження Сомка невідомий; за спорідненістю він швагер Богдана Хмельницького й дядько Юрія, а не «тесть» (як подає IEU). Вигаданих передсмертних слів чи сцен страти не додаємо.'
  section: 'Конфліктна карта: Законник-мученик чи елітний претендент?'
  words: 900
- points:
  - 'Походження: із заможної переяславської міщанської родини; наприкінці 1647 року переховував молодших дітей Богдана Хмельницького, коли той пішов на Січ.'
  - 'Служба: переяславський сотник 1654 року, згодом наказний полковник і полковник переяславський у послідовності 1659–1662 років; опозиція до Виговського після усунення Юрія Хмельницького.'
  - 'Наказне гетьманство: у другій половині 1660 року, коли Юрій Хмельницький пішов у волинський похід, Сомко керував Лівобережжям і відкинув Слободищенсько-Чуднівський поворот до Речі Посполитої.'
  - 'Консолідація: узимку 1660–1661 років воював із правобережними, коронними й кримськими силами й згуртував навколо себе кілька лівобережних полків.'
  section: 'Формування: Від переяславського сотника до наказного гетьмана'
  words: 1000
- points:
  - 'Бикова елекція (квітень 1661 р.) під Ніжином: лівобережні представники підтримали Сомка, але Василь Золотаренко, ніжинський протопоп Методій (Филимонович) і московська політика визнання заблокували стабільне затвердження.'
  - 'Оборона й фронт: у жовтні–грудні 1661 року Сомко боронив Переяслав від правобережного й кримського тиску; влітку 1662-го разом із російськими військами відкинув правобережні сили Юрія Хмельницького за Дніпро.'
  - Козелецька рада (квітень 1662 р.) проголосила його повним гетьманом Лівобережної України — але Москва відмовила у визнанні, бо не було офіційного царського представника, а надійність Сомка викликала сумніви.
  - '[!epistemic-humility] Джерельна вимога Сомка «з Гадяча і з інших міст воєвод вивести» (за розбором Горобця) — найчистіший короткий документ-анкер його автономної програми; але підставове видання «Актів» слід звірити перед класним цитуванням.'
  section: 'Діяльність: Боротьба за легітимність'
  words: 1300
- points:
  - '[!anti-hagiography] У сторони Сомка були реальні елітні «сліпі плями»: це не історія «доброї еліти проти поганого натовпу». Соціальні кривди поспільства й запорозькі політичні претензії були справжні.'
  - '[!myth-buster] Брюховецький не «безчасний демагог»: він грав на дійсному антистаршинському обуренні. Протиставлення «продажний популіст проти чистого державника» — надто охайне для цієї події.'
  - Чорна рада під Ніжином (27–28 червня 1663 р. н. ст. / 17–18 червня ст. ст.) відбулася під царською інструкцією й військовою присутністю; після поразки Сомка заарештували під владою Гагіна, ув'язнили разом із Золотаренком і засудили військовим судом за звинуваченнями у зраді.
  - 18/28 вересня 1663 року Сомка стратили в Борзні; частину прибічників заслали або підпорядкували новому ладові. Факт — арешт, суд і страта; романтичних сцен не додаємо.
  section: 'Тінь: Чорна рада і страта'
  words: 900
- points:
  - 'Повернення до розминки: у чому різниця між місцевою елекцією, старшинською підтримкою, генеральною радою та імперським визнанням — і чому Козелець «обрав», а Москва «не визнала»?'
  - '[!decolonization] «Чорна рада» Куліша (1857) незамінна для пам''яті, але вона перетворює політичну причинність на драму характерів — це літературний спогад, а не реконструкція подій 1663 року.'
  - Літопис Самовидця називає Чорну раду «новим лихом» — це моральний присуд хроніста, а не нейтральний репортаж; читаємо його як джерело з власною оптикою.
  - '[!myth-buster] Чому і російський наратив (Сомко як «невдалий сепаратист» або доказ «природного» московського арбітражу), і українська канонізація (бездоганний мученик) однаково спрощують постать.'
  section: 'Дискусія та підсумок: Сомко Куліша і Сомко джерел'
  words: 700
focus: 'Yakym Somko as a contested Ruin-era figure: the acting hetman of Left-Bank Ukraine (1660-1663) who defended an autonomy programme against Moscow''s voivodes and fiscal interference, lost the 1663 Nizhyn Black Council to Ivan Briukhovetskyi in a process shaped by tsarist instruction and military presence, and was executed at Borzna; and how Kulish''s novel Chorna rada made his memory cleaner than his elite-centred politics actually were.'
