objectives:
- Пояснювати автономну програму Сомка (виведення воєвод, обмеження московського фіскального втручання) та її елітні межі
- Аналізувати Чорну раду 1663 року як процес, сформований царською інструкцією, військовою присутністю Гагіна й соціальною напругою, а не «вільне волевиявлення народу»
- Розрізняти місцеву елекцію, старшинську підтримку, генеральну раду й імперське визнання як різні джерела легітимності
- Критично читати літературну пам'ять Куліша, не плутаючи «Чорну раду» з реконструкцією подій 1663 року
