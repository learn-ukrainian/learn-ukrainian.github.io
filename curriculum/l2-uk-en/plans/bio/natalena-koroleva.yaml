content_outline:
- points:
  - >-
    [!biography] Наталена Королева: письменниця, мистецтвознавиця,
    археологиня і діаспорна авторка, яка свідомо увійшла в українську
    літературу після європейської, французькомовної та київської підготовки.
  - >-
    Провокаційне питання: якщо українськість може бути вибором мови, пам'яті і
    праці, що тоді стається з міфом про літературу як справу крові й
    народження?
  section: Розминка
  words: 400
- points:
  - >-
    Проєктний базовий життєпис бере 3 березня 1888 року, монастир Сан-Педро-де-
    Карденья біля Бургоса в Іспанії, за ЕСУ та ЕІУ, але ранні десятиліття її
    життя мають складну документну історію.
  - >-
    Освіта у Франції, Київський інститут шляхетних дівчат, музичні уроки,
    театральні курси, археологія і мистецтвознавство створили авторку, для якої
    українська історична проза була європейським і християнським полем, а не
    вузькою провінційною темою.
  - >-
    Перехід до української мови після 1919 року пов'язаний із порадою Василя
    Короліва-Старого, але модуль не має зводити її авторство до ролі дружини:
    вона вчилася, перекладала, писала і послідовно будувала власну позицію.
  - >-
    [!decolonization] Королева важлива як приклад української літератури, яка
    не просить імперського дозволу на "чисте походження": належність постає з
    мовного вибору, еміграційної праці і культурної солідарності.
  section: 'Формування: Європейська освіта, Київ і вибір української мови'
  words: 1200
- points:
  - >-
    Перші французькі публікації, робота в Червоному Хресті під час Першої
    світової, зв'язок із дипломатичною місією УНР у Чехословаччині і життя в
    еміграції створили не тюремний, а вигнанський механізм тиску.
  - >-
    `Легенди старокиївські`, `Во дні они`, `Предок`, `Сон тіні`, `Quid est
    veritas?`, `Без коріння`, `Подорожній` і переклад `Наслідування Христа`
    показують широку історичну уяву: античність, раннє християнство,
    середньовіччя, Київ і моральну історіософію.
  - >-
    `Легенди старокиївські` треба пов'язати з існуючим LIT-HIST-FIC модулем:
    BIO пояснює, як біографія, вигнання, католицько-європейська оптика і
    археологічна уява ведуть до цього твору.
  section: 'Діяльність: Легенди, християнська Європа і діаспорна історична проза'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Не слід рекламувати Королеву як "іспанську графиню, що
    стала українкою" і зупинятися на екзотиці. Саме цей гачок часто затуляє
    працю мови, форми, архіву і самоконструювання.
  - >-
    Її автобіографічні тексти й пізні перекази не завжди збігаються з
    документами. Досьє попереджає про Волинь / Луцьк у документному сліді,
    варіанти імені, можливе самостворення родоводу і завищені твердження про
    освіту чи мандри.
  - >-
    Радянська Україна майже не могла прийняти авторку з УНР-зв'язками,
    еміграційним життям, католицькими й середземноморськими темами. Це
    стирання не дорівнює арешту, суду чи ГУЛАГу.
  - >-
    [!epistemic-humility] Будь-яку яскраву деталь раннього життя треба
    позначати як джерельно сильну або слабку. Учні мають бачити, як біографія
    може бути і джерелом, і літературною конструкцією.
  section: 'Тінь: Автобіографія, міфотворення і радянське стирання'
  words: 1500
- points:
  - >-
    Після 1991 року повернення `Предка`, `Легенд старокиївських` та
    автобіографічної прози стало поверненням цілої гілки діаспорної історичної
    уяви.
  - >-
    [!myth-buster] Європейський і католицький погляд Королевої на Київ не
    скасовує православних, візантійських, єврейських, степових і місцевих
    контекстів. Він додає перспективу, а не замінює історію.
  - >-
    Підсумок: Королева вчить говорити про українську літературу як про
    вибрану практику мови, архіву, вигнання і відповідальності перед минулим.
  section: 'Підсумок: Вибрана належність і повернення з еміграції'
  words: 900
focus: >-
  Наталена Королева як діаспорна авторка історичної прози, яка свідомо обрала
  українську мову і літературу, поєднавши європейську освіту, київський досвід,
  УНР-еміграцію, `Легенди старокиївські`, католицько-християнську уяву і
  пострадянське повернення. Семінар тримає джерельну обережність щодо ранньої
  біографії, не вигадує арешту і не перетворює авторку на екзотичну легенду.
