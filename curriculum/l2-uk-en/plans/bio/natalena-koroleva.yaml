objectives:
- >-
  Пояснювати Королеву як приклад української літературної належності через
  вибір мови, еміграційну працю і культурну солідарність.
- >-
  Аналізувати `Легенди старокиївські` та іншу історичну прозу як європейсько-
  українське поле з продуктивними межами.
- >-
  Розрізняти вигнання, архівну крихкість і радянське стирання від вигаданого
  арешту чи тюремної біографії.
- >-
  Критично оцінювати автобіографічне самоконструювання, ранньобіографічні
  суперечності і небезпеку екзотизації.
