      - Читання двох авторських текстів Левіна як первинних джерел про Іловайськ.
      - Відділення колегіальних спогадів про роботу від доказів щодо обставин загибелі.
      - Точна атрибуція попередньої інформації прокуратури та висновків Репортерів без кордонів.
