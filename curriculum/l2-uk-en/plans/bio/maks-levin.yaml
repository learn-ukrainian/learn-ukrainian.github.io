objectives:
- >-
  Оцінювати роль Макса Левіна та його фотопроєктів (зокрема AFTERILOVAISK) у
  документуванні російської агресії проти України з 2014 року.
- Розуміти гуманістичну функцію журналістики у воєнний час, зосереджену на людських долях.
- Аналізувати механізм цілеспрямованих страт цивільних та журналістів російською армією на основі розслідування RSF.
- Обговорювати концепцію фотодокументалістики як доказової бази воєнних злочинів.
