content_outline:
- points:
  - >-
    [!biography] Знайомство з Максом Левіним (1981–2022): український фотожурналіст-документаліст,
    співавтор проєкту AFTERILOVAISK.
  - >-
    Провокаційне питання: чи може об'єктив камери захистити фотографа від воєнних
    злочинів армії, яка прагне знищити свідків?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та початок кар'єри: навчання в Київському політехнічному інституті. Робота
    для українських та міжнародних медіа (LB.ua, Reuters, BBC, AP).
  - >-
    Гуманістичний підхід до журналістики: зосередженість на людських історіях та
    наслідках конфлікту для мирного населення ("Війна — це продовження історій людей").
  - >-
    [!decolonization] Відмова від знеособленої подачі воєнних дій: фокус на
    ідентичності та досвіді українців у протистоянні збройній агресії.
  section: 'Формування: Гуманізм у фотожурналістиці'
  words: 1000
- points:
  - >-
    Проєкт AFTERILOVAISK (з 2014 року): хроніка Іловайської трагедії. Документування
    боїв, інтерв'ю з військовими та спроба опрацювання національної травми.
  - >-
    Повномасштабне вторгнення 2022 року: проєкт "Chronicles of the Russian invasion
    of Ukraine 2022". Фіксація перших тижнів оборони Київщини.
  - >-
    Пошук втраченого дрона як спроба зберегти докази дій російської армії поблизу
    Мощуна та Гути-Межигірської.
  section: 'Діяльність: Від Іловайська до повномасштабного вторгнення'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Спростування міфу про "випадкову смерть під перехресним вогнем".
    Левін був цілеспрямовано страчений.
  - >-
    Механізм воєнного злочину: зникнення 13 березня 2022 року разом з Олексієм
    Чернишовим. Перехоплення російськими військовими.
  - >-
    Розслідування "Репортерів без кордонів" (RSF): докази допиту, катувань та страти
    Левіна (постріли зблизька) і спалення тіла його супровідника.
  section: 'Тінь: Вбивство в Гуті-Межигірській'
  words: 1600
- points:
  - >-
    Спадщина Макса Левіна: його останні фотографії стали візуальними доказами та
    були представлені в європейських парламентах.
  - >-
    Значення роботи документаліста: "фото, яке зупинить війну" як нездійснена,
    але фундаментальна мета журналістики.
  - >-
    Місце Макса Левіна у пам'яті про українських культурних діячів і медійників,
    убитих Росією.
  section: 'Підсумок: Документалістика як пам''ять і доказ'
  words: 1000
focus: >-
  Макс Левін як видатний український фотодокументаліст, його гуманістичний фокус на досвіді людей
  під час війни та його цілеспрямована страта російськими військовими на Київщині навесні 2022 року.
level: BIO
