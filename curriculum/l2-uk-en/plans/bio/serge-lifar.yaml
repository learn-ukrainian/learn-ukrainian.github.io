content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: Як “Бог танцю”, що врятував французький балет від занепаду, міг бути звинувачений у співпраці з нацистами і
    ледь не втратив усе?'
  - 'Провокація: Лифар до кінця життя називав себе українцем, але чи не є його спадщина також частиною російської та французької
    культури? Де його місце?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1: Звинувачення у колабораціонізмі одразу після війни. Лифар стверджував, що рятував Оперу та її артистів. Його
    критики — що він надто комфортно почувався з окупаційною владою.'
  - 'Дебат 2: Сучасна переоцінка. Чи можна відокремити мистецький внесок від політичних та етичних компромісів? Позиція французьких
    істориків vs української діаспори.'
  - '[!epistemic-humility] Немає простої відповіді. Документи свідчать і про зустрічі з німецькими офіцерами, і про порятунок
    єврейських танцівників.'
  section: 'Конфліктна карта: Геній та колаборація'
  words: 900
- points:
  - Народження в Києві в родині чиновника. Вплив українського культурного середовища початку XX століття.
  - 'Випадковий початок: від гри на піаніно до одержимості балетом у студії Броніслави Ніжинської.'
  - 'Революція та громадянська війна як каталізатор: руйнування старого світу і відчайдушне бажання втечі у світ мистецтва.'
  - Еміграція як єдиний шанс на кар'єру, розрив з родиною та батьківщиною.
  section: 'Формування: Київська молодість'
  words: 1000
- points:
  - 'Стрімкий злет у “Російських сезонах” Дягілєва: від учня до світової зірки за кілька років.'
  - 'Смерть Дягілєва як криза і можливість: Лифар очолює балет Паризької опери у 24 роки.'
  - 'Реформатор: створення неокласичного стилю, повернення чоловічого танцю на центральне місце.'
  - 'Хореографічна спадщина: понад 200 балетів, які змінили обличчя французького балету назавжди (напр., “Ікар”).'
  section: 'Діяльність: Революція на сцені Паризької опери'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Рішення залишитись у Парижі в 1940. Чому він не поїхав, як багато інших?'
  - Керування Оперою під німецьким контролем. Гастролі в Німеччині. Зустрічі з Гітлером та Геббельсом — що відомо з документів?
  - 'Ціна виживання: Лифар зберіг трупу, але заплямував репутацію. Чи був вибір?'
  - '[!myth-buster] Міф про повне виправдання. Лифаря було усунуто з посади, і хоча він повернувся, тінь звинувачень залишилась
    до кінця життя.'
  section: 'Тінь: Під окупацією'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: студент має сформулювати власну позицію щодо Лифаря, враховуючи складність його біографії.'
  - 'Три життя Сержа Лифаря: українське коріння, російська школа, французька слава. Як ці ідентичності співіснували?'
  - 'Пам''ять в Україні: від замовчування в радянські часи до повернення імені та встановлення пам''ятника.'
  - '[!decolonization] Чому радянська та російська історіографія намагалися привласнити Лифаря, і чому важливо наголошувати
    на його київському походженні?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of ballet revolutionary Serge Lifar, focusing on his journey from Kyiv to Paris, his radical impact on 20th-century
  dance, and the irresolvable controversy surrounding his actions during the Nazi occupation of Paris.
