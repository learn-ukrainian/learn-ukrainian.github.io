objectives:
- Критично аналізувати подвійність образу Симоненка — офіційного журналіста та «самвидавного» поета
- Пояснювати, як радянська пропаганда та національний рух по-різному інтерпретували спадщину поета
- Оцінювати моральні компроміси, на які йшли митці в умовах тоталітарного режиму
- Формулювати аргументовану позицію щодо феномену ранньої смерті митця як фактору канонізації в українській культурі
