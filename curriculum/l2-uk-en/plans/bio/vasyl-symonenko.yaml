content_outline:
- points:
  - 'Парадокс «ніжного бунтаря»: як в одній людині поєднався автор інтимної лірики ("Україно, ти моя молитва") та гострої
    громадянської поезії, що стала гімном національного пробудження?'
  - 'Символ, що не встиг постаріти: трагічна коротка доля (1935-1963) як ключ до розуміння його міфу.'
  - '[!biography] Представлення Василя Симоненка як ключової фігури покоління шістдесятників.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Офіційний журналіст vs «Самвидавний» поет. Як Симоненко балансував між роботою в радянських газетах
    та написанням «в шухляду» опозиційних віршів?'
  - 'Дебат 2 (після смерті): Привласнення спадщини. Радянська спроба канонізувати Симоненка як «лояльного комсомольця» проти
    його піднесення в діаспорі та незалежній Україні як мученика.'
  - '[!decolonization] Розвінчання радянського міфу про «український буржуазний націоналізм» та місце Симоненка в ньому.'
  - '[!epistemic-humility] Визнання складності оцінки творчості в умовах тоталітаризму — де закінчується компроміс і починається
    колаборація?'
  section: 'Конфліктна карта: Радянський поет vs Національний мученик'
  words: 900
- points:
  - 'Полтавське коріння: народження в селі Біївці, сирітське повоєнне дитинство та його вплив на теми справедливості у творчості.'
  - 'Ранній літературний хист: як сільський хлопець став одним з найосвіченіших поетів свого покоління.'
  - 'Київський університет: навчання на факультеті журналістики, перші публікації та входження в коло київських шістдесятників.'
  - 'Формування поетичного голосу: від наслідування класиків до пошуку власної унікальної інтонації.'
  section: 'Формування: Від Біївців до Києва'
  words: 1000
- points:
  - 'Журналістська робота на Черкащині: публіцистика як форма легального спротиву та спосіб говорити про проблеми суспільства.'
  - '«Тиша і грім»: аналіз єдиної прижиттєвої збірки. Поєднання інтимної лірики («Лебеді материнства») та громадянської поезії.'
  - '«Казки для сина Лесика»: спроба говорити про добро і зло в алегоричній формі, оминаючи цензуру.'
  - 'Цензура та заборона публікацій: як радянська система намагалася змусити поета замовкнути.'
  section: 'Діяльність: Тиша і грім'
  words: 1300
- points:
  - '[!anti-hagiography] Поза іконою: аналіз компромісів, на які Симоненко йшов як радянський журналіст. Чи можливо було вижити
    і творити інакше?'
  - 'Загадкове побиття: обставини нападу на поета з боку «міліції» на станції ім. Шевченка. Це була випадковість чи спланована
    акція КДБ?'
  - '[!myth-buster] Розвінчання міфу про «тиху» смерть. Швидкоплинна хвороба і смерть у 28 років як прямий наслідок побиття.'
  - 'Критика сучасників: чи всі шістдесятники бачили в Симоненку безкомпромісного борця?'
  section: 'Тінь: Ціна компромісу і загадка смерті'
  words: 900
- points:
  - 'Повернення до розминки: чому саме «ніжний бунтар» став символом, а не хтось інший?'
  - 'Феномен ранньої смерті митця: чому молоді поети стають національними іконами?'
  - 'Порівняльний аналіз: Симоненко vs Стус — два шляхи спротиву, дві різні долі, два різні міфи.'
  - '[!decolonization] Канонізація в незалежній Україні: як Симоненко з поета перетворився на обов''язкову фігуру шкільної
    програми, і що було втрачено при цьому?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Vasyl Symonenko, the paradox of the "tender rebel", his dual role as a lyricist and civic poet, and his
  canonization as a symbol of the Shistdesiatnyky.
