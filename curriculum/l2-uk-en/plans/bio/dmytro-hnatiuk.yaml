      Аналізувати Дмитра Гнатюка як виконавця, режисера і культурного
      інституційного діяча української оперної та пісенної сцени
  - >-
      Пояснювати зв'язок між оперними ролями, фонодокументами, публічною
      піснею і культурною пам'яттю
  - >-
      Критично розрізняти офіційний статус митця, документований
      прикордонний контекст і недоведені репресивні сюжети
  - >-
      Формулювати українськоцентричну рамку для постаті, яку колоніальні
      оптики часто зводять до "радянського" виконавця
