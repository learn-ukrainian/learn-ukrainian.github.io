content_outline:
  - points:
      - >-
          Провокація: як співак з буковинського села став баритоном
          Національної опери, виконавцем українських оперних ролей і голосом
          пісень, які багато слухачів сприймають як частину родинної пам'яті?
      - >-
          [!biography] Дмитро Михайлович Гнатюк (1925-2016) — український
          баритон, оперний співак, режисер, педагог і публічний діяч, чий
          доробок поєднує сцену, запис, народну пісню і культурні інституції.
      - >-
          Навчальна рамка: виконавець не просто "озвучує" твори. Він формує
          дикцію, пам'ять, репертуар і спосіб, у який культура чує саму себе.
    section: Розминка
    words: 400
  - points:
      - >-
          Дебати 1: Гнатюк як оперний артист чи як співак пісенного канону?
          Його біографія вимагає тримати разом ролі в операх Лисенка й
          Гулака-Артемовського та записи "Двох кольорів", "Києве мій" і
          народних пісень.
      - >-
          Дебати 2: державні звання, посади і парламентська роль — це лише
          офіційність чи також інструменти підтримки української культурної
          інфраструктури в пізньорадянський і незалежний час?
      - >-
          [!decolonization] Не зводити Гнатюка до "радянського співака".
          Українська опера, Лисенко, Гулак-Артемовський, Буковина, київська
          сцена і україномовна дикція є центральними для модуля.
      - >-
          [!epistemic-humility] Досьє не підтверджує персональної репресивної
          справи проти Гнатюка. Родинні та прикордонні обставини подаються
          обережно, без додавання недоведеної безпекової рамки.
    section: 'Конфліктна карта: Голос між сценою і державою'
    words: 900
  - points:
      - >-
          Буковинський початок: народження 28 березня 1925 року в місцевості,
          яку джерела подають як Мамаївці або Старосілля в теперішньому
          Чернівецькому регіоні, тоді під румунською владою.
      - >-
          Селянська родина, воєнне переміщення і післявоєнний шлях до Києва:
          біографія Гнатюка показує не прямий маршрут до сцени, а поколіннєвий
          досвід кордонів, війни і радянської перебудови культурної освіти.
      - >-
          Київська консерваторія: клас Івана Паторжинського, формування
          вокальної техніки, оперної дикції і репертуарної дисципліни.
      - >-
          Театральна освіта і режисура: пізніше навчання в Київському
          театральному інституті пояснює, чому Гнатюк став не лише солістом,
          а й постановником та головним режисером оперної сцени.
    section: 'Формування: Буковина, Київ і школа голосу'
    words: 1000
  - points:
      - >-
          Оперні ролі українського канону: Остап, Микола й Еней у творах
          Миколи Лисенка, Султан у "Запорожці за Дунаєм", а також широкий
          міжнародний репертуар від Верді й Бізе до Чайковського.
      - >-
          Національна опера як довга біографія: від соліста з 1951 року до
          режисера, постановника і головного режисера. Модуль розглядає
          театр як місце передачі культурної пам'яті, не лише кар'єрну
          установу.
      - >-
          Записаний голос: архівні фонодокументи і платівки з народними
          піснями та публічним пісенним каноном дозволяють говорити про
          Гнатюка як про артиста, чия спадщина існує у виконанні.
      - >-
          Громадська роль після 1991 року: депутатство 1998-2002 років і
          участь у парламентському комітеті культури й духовності — привід
          говорити про межу між мистецтвом, інституцією і культурною політикою.
    section: 'Діяльність: Опера, фонодокумент і культурна інституція'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Офіційні звання, радянські та українські
          нагороди, керівні посади і депутатська діяльність мають бути в
          портреті. Але вони не замінюють аналізу голосу, репертуару і
          української сцени.
      - >-
          [!myth-buster] Гнатюка часто звужують до кількох пісень. Такий
          підхід стирає оперну режисуру, педагогіку, понад два десятки
          постановок і українські ролі в театральному каноні.
      - >-
          Прикордонна пам'ять Буковини: відмінності в назвах місця
          народження не треба приховувати. Вони допомагають говорити про
          історичні кордони без російсько-імперського спрощення.
      - >-
          Сімейні й воєнні травми не перетворюються на персональну справу
          без документів. Урок навчає точності, а не драматичної вигадки.
    section: 'Тінь: Публічний статус і ризик редукції'
    words: 900
  - points:
      - >-
          Повернення до розминки: студент пояснює, як виконавець може бути
          автором культурної пам'яті через вибір репертуару, дикцію, сцену,
          записи і педагогічну передачу.
      - >-
          Порівняння з Солов'яненком: баритон і тенор як дві моделі
          української оперної присутності у світовому та внутрішньому
          репертуарі.
      - >-
          Деколонізаційний висновок: замість ярлика "радянський артист" —
          аналіз української опери, пісні, архівного запису і пострадянської
          інституційної роботи.
    section: 'Дискусія та підсумок: Виконавець як пам''ять'
    words: 700
focus: >-
  Дмитро Гнатюк як український баритон, оперний режисер і носій пісенного
  канону: Буковинське походження, Київська консерваторія, Національна опера,
  ролі в Лисенка й Гулака-Артемовського, архівні записи українських пісень і
  публічна культурна роль після 1991 року.
