content_outline:
- points:
  - 'Провокація: славетне прізвище не змогло замінити інституцій, консенсусу й військової спроможності. Чому син Богдана зазнав поразки там, де саме ім''я обіцяло так багато?'
  - '[!biography] Знайомство з постаттю, чия біографія — це не «невдалий син», а рентген зламаного механізму спадкоємства: молодий спадкоємець ніс символічну легітимність, але не мав тривкої влади над розколотою елітою.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (джерельні присуди): сучасники й пізніші автори наголошують на молодості, недосвідченості та хворобі (ЕІУ називає хронічну недугу й епілепсію) — звідси образ нездатного правителя.'
  - 'Позиція 2 (структурна): чотири сусідні сили — Москва, Річ Посполита, Крим і Порта — навчилися використовувати ім''я Хмельницького як інструмент власних воєн; провал був системним, а не лише особистим.'
  - '[!decolonization] Імперське спрощення — подати Москву як необхідного «наводителя ладу» після нездатного українського спадкоємця. Ми тримаємо всі шари видимими: спадкова легітимність, примус і власні згубні рішення Юрія.'
  - '[!epistemic-humility] Народження — 1640 або 1641, Суботів/Чигирин; смерть спірна (1681 або 1685). Хворобу використовуємо, щоб пояснити сумніви сучасників, а не як повне пояснення Руїни й не як моральний діагноз.'
  section: 'Конфліктна карта: Слабкий син чи жертва зламаного механізму спадкоємства?'
  words: 900
- points:
  - Молодший син Богдана Хмельницького й Ганни Сомко; після загибелі Тимоша 1653 року став династичним осередком батькових планів спадкоємства.
  - 'Освіта: домашнє навчання й час у Києво-Могилянській колегії; за ЕІУ, знав церковнослов''янську, польську, латину й грецьку.'
  - 'Квітень 1657 року: рада за волею Богдана визначила Юрія наступником, але під опікою й військовою тутелею старших полковників.'
  - 'Серпень 1657 року: після смерті Богдана козацька рада обрала Івана Виговського, а не залишила державне командування підліткові-спадкоємцеві — перша ознака того, що ім''я не дорівнює владі.'
  section: 'Формування: Тягар імені'
  words: 1000
- points:
  - 'Переяславські статті (27/17 жовтня 1659 р.) накинуто під військовим тиском Трубецького: український проєкт відкинули, а «старі» й «нові» статті різко звузили суверенітет — це не вільне поновлення 1654 року.'
  - '1660 рік: участь у невдалому московсько-козацькому поході проти Речі Посполитої; поразка під Чудновом змусила до угоди зі стороною Речі Посполитої.'
  - Слободищенсько-Чуднівський трактат (17/27 жовтня 1660 р.) скасував Переяславські статті й формально відновив зв'язок із Річчю Посполитою, але лівобережні полки Сомка й Золотаренка та запорожці Брюховецького відкинули угоду — початок розколу берегів.
  - '1661–1663: спроби відновити владу над Лівобережжям провалилися (важка поразка від Сомка й Ромодановського, згубний кримський союз і ясир під Каневом); наприкінці 1662 — на початку 1663 року Юрій склав булаву, гетьманом став Тетеря, а сам він прийняв чернецтво як Гедеон.'
  section: 'Діяльність: Між Москвою, Варшавою і Портою'
  words: 1300
- points:
  - '[!anti-hagiography] Чернецтво не було «духовним щасливим кінцем»: це був політичний вихід із невдалого правління, за яким ішли примусові повернення у фракційну й імперську політику.'
  - '1677–1681: після падіння Дорошенка Порта звільнила й піднесла Юрія для Чигиринських походів, сподіваючись, що його ім''я приваблюватиме українську підтримку; з''явилися титули на кшталт «князь України», «князь Сарматії».'
  - 'Немирівське правління (1678–1681) над частинами Київщини, Черкащини й Вінниччини під османською військовою підтримкою було примусовим: Юрій збирав податки, судив і жорстоко придушував опозицію.'
  - '[!myth-buster] «Османська маріонетка» — надто плаский ярлик без контексту титулу й примусу; хвороба — не повне пояснення; кримський союз і ясир називаємо як конкретну військову систему Руїни, а не «природу» союзника.'
  section: 'Тінь: Немирівський період і насильство'
  words: 900
- points:
  - 'Повернення до розминки: які інституції зруйнувалися навколо Юрія, які сили його використали — і де він усе одно робив згубний власний вибір?'
  - '[!epistemic-humility] Дата й обставини смерті лишаються спірними: страта в Кам''янці-Подільському, вивезення до Стамбула чи пізніший монастирський кінець; подаємо як «усунений 1681-го; смерть/страта традиційно 1681 або 1685».'
  - Титули «князь України» та «князь Сарматії» вивчаємо як контестовані пропагандистські формули за османської військової підтримки, а не як стабільні державні титули.
  - '[!decolonization] Чому і російсько-імперська пам''ять (Юрій як доказ «української нездатності без Москви»), і українська популярна пам''ять (лише трагічний контраст до Богдана) однаково спрощують біографію.'
  section: 'Дискусія та підсумок: Спадкоємство і пам''ять'
  words: 700
focus: 'Yurii Khmelnytskyi as a case of a failed succession mechanism after Bohdan Khmelnytskyi: inherited legitimacy without durable command, the coerced 1659 Pereiaslav Articles, the 1660 Slobodyshche/Chudniv turn and the Left-Bank split, monastic withdrawal as monk Gedeon, the Ottoman-backed Right-Bank episode of 1677-1681 with its coercive Nemyriv rule, and the contested 1681/1685 death traditions — taught without the flat labels ''weak son'' or ''puppet''.'
