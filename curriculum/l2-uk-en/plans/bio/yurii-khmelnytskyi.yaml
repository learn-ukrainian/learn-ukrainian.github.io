objectives:
- Пояснювати, чому спадкова легітимність без інституцій, консенсусу й військової спроможності не втримала Гетьманщину після 1657 року
- Аналізувати Переяславські статті 1659 та Слободищенсько-Чуднівський трактат 1660 як примусові/вимушені договори, а не вільні поновлення 1654 року
- Розрізняти династичне призначення, елекційне визнання й фактичну владу як окремі речі в козацькій політичній культурі
- Практикувати джерелочутливу мову замість вироків-ярликів, тримаючи разом реальну легітимність, примус і власну аґентність Юрія
