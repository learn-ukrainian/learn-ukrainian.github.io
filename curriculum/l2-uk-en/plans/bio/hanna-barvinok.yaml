content_outline:
- points:
  - 'Провокація: Ганну Барвінок часто згадують лише як «дружину Куліша». Але як письменниця-етнографка, що дала голос селянській
    жінці, могла творити в тіні такої домінантної постаті? Чи була вона партнеркою, чи лише помічницею?'
  - '[!biography] Коротке представлення двох ідентичностей: Олександра Білозерська (шляхетна панянка, освічена) та Ганна Барвінок
    (літературне ім''я, голос народу).'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Сучасники): Чи була її творчість самодостатньою? Одні критики бачили в ній лише реалізаторку ідей чоловіка,
    продовжувачку його «народницького» проєкту. Інші (Шевченко) цінували її за автентичність.'
  - 'Дебат 2 (Феміністична критика vs літературознавство): Чи є вона «першою феміністкою» в українській прозі, чи її цінність
    передусім етнографічна? [!epistemic-humility] Визнання, що її твори можна читати і як документ епохи, і як акт жіночої
    емансипації.'
  - '[!decolonization] Радянське літературознавство зводило її до «співачки селянської долі», ігноруючи екзистенційну та жіночу
    проблематику її творів, а також її шляхетне походження.'
  section: 'Конфліктна карта: Партнерка чи тінь Куліша?'
  words: 900
- points:
  - 'Світ дитинства: хутір Мотронівка, родина Білозерських. Вплив матері, народних пісень та обрядів, що стали основою її
    етнографічної праці.'
  - 'Освіта та інтелектуальне коло: доступ до бібліотек, спілкування з братом Василем Білозерським — одним із засновників
    Кирило-Мефодіївського братства.'
  - 'Переломний момент: знайомство з Пантелеймоном Кулішем. Інтелектуальний та емоційний спалах, що визначив її подальшу долю.'
  section: 'Формування: Шлях Олександри Білозерської'
  words: 1000
- points:
  - Народження псевдоніма «Ганна Барвінок» як спроба створити автономний літературний простір.
  - 'Основна тема творчості: трагічна доля жінки-селянки, родинні конфлікти, соціальна несправедливість. Її героїні — не ідеалізовані
    «селянки», а живі жінки зі складними характерами.'
  - 'Етнографічна праця: збірка «Оповідання з народних уст», титанічна робота із запису фольклору, що перевищувала за обсягом
    її власну художню прозу.'
  - 'Спільна праця з Кулішем: роль у підготовці його праць, листування як інтелектуальний діалог.'
  section: 'Діяльність: Голос селянської України'
  words: 1300
- points:
  - '[!anti-hagiography] Подружнє життя з Кулішем: не ідилія, а драма. Його складний характер, зради, її довге терпіння. Арешт
    у справі Кирило-Мефодіївського братства — як це вплинуло на її творчість та особисте життя.'
  - 'Творчі обмеження: чи не завадив її фокус на етнографізмі та «народній темі» розвинутися як авторці ширшого діапазону?
    Чи не було це формою самоцензури?'
  - '[!myth-buster] Міф про «тиху помічницю». Листування свідчить про гострі суперечки, інтелектуальну рівність та її значний
    вплив на Куліша, а не лише його на неї.'
  - 'Втрати: історія зі знищенням українського перекладу Біблії, над яким вона працювала разом з Кулішем — символ трагедії
    її покоління.'
  section: 'Тінь: Ціна компромісу'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь — ким була Ганна Барвінок, спираючись на матеріал модуля.'
  - 'Внесок: піонерка «жіночої прози» в Україні. Зафіксувала унікальний етнографічний матеріал, що міг зникнути.'
  - '[!decolonization] Переоцінка спадщини: важливість її постаті для сучасної феміністичної критики. Відхід від радянської
    та патріархальної оптики, що бачила в ній лише «дружину» або «народницю».'
  - 'Сучасна актуальність: її твори дозволяють зрозуміти витоки багатьох гендерних стереотипів та соціальних проблем, що існують
    в Україні досі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Hanna Barvinok's dual identity as an ethnographer and pioneer of women's literature, the complex creative partnership
  with Panteleimon Kulish, and the feminist reappraisal of her legacy beyond being 'Kulish's wife'.
level: BIO
module: bio-041
objectives:
- Аналізувати життя та спадщину Ганни Барвінок, відокремлюючи її власні досягнення від постаті її чоловіка
- Оцінювати внесок Ганни Барвінок в українську етнографію та становлення жіночої літератури
- Критично розглядати її творчість у контексті феміністичної критики та деколоніальних студій
- Формулювати аргументовану позицію щодо проблеми «жінка-митець у тіні великого чоловіка» на прикладі подружжя Кулішів
