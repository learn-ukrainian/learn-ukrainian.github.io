objectives:
- Аналізувати творчість Миколи Куліша в контексті модернізму та політики українізації
- Пояснювати зв'язок між мистецьким експериментом у театрі «Березіль» та радянськими репресіями
- Критично оцінювати сатиру Куліша як діагноз суспільних проблем того часу та сьогодення
- Формулювати аргументовану позицію щодо трагедії митця в умовах тоталітарного режиму
