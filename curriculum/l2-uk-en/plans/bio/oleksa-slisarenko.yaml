content_outline:
- points:
  - >-
    [!biography] Знайомство з Олексою Слісаренком (справжнє прізвище Снісар): поет-символіст,
    що став панфутуристом, а тоді — майстром гостросюжетної прози; представник Розстріляного
    відродження, розстріляний в урочищі Сандармох.
  - >-
    Провокаційне питання: як людина, що 1930 року сама стояла громадським обвинувачем на
    показовому процесі, за кілька років опинилася на лаві підсудних тієї самої системи — і
    була страчена?
  section: Розминка
  words: 400
- points:
  - >-
    Слобожанське коріння: народження на хуторі Канівцевому (нині с. Шипувате на Харківщині)
    в родині лимаря; сільськогосподарська освіта та праця агрономом із 1912 року.
  - >-
    Перша світова війна й перелом: шлях від рядового до офіцера артилерії; 1918 року
    самовільне залишення фронту й переїзд до Києва.
  - >-
    [!decolonization] Входження в український модернізм на власних засадах: символістські
    угруповання «Біла Студія» і «Музагет» (1919), перша збірка «На березі Кастальському»
    (1919) у видавництві «Сяйво».
  - >-
    [!myth-buster] Псевдонім «Слісаренко»: відокремлення факту (справжнє прізвище — Снісар)
    від народного переказу, нібито глухуватий священник при хрещенні помилково записав прізвище
    як «Слісар».
  section: 'Формування: Від слобожанського хутора до символізму'
  words: 1000
- points:
  - >-
    Авангардний поворот: участь у футуристичних об'єднаннях «Комкосмос» (1921), Аспанфут
    (1921) і Комункульт (1924—1925); збірка «Поеми» (1923) з обкладинкою Миколи Бажана;
    підсумкова лірика «Байда» (1928).
  - >-
    Від футуризму до Спілки пролетарських письменників «Гарт» (1925) і ВАПЛІТЕ (1925—1928), а
    по «самоліквідації» ВАПЛІТЕ — «Техно-мистецька група А» (1929) разом із Майком Йогансеном.
  - >-
    Винахід української пригодницької прози: понад 20 книг гостросюжетних оповідань і романів
    («Чорний ангел», «Зламаний гвинт», «Хлібна ріка»), писаних за зразком англійської й
    американської новели; герої — «маленькі» люди у вирі революції.
  - >-
    [!decolonization] Полеміка з Максимом Горьким (1926—1927): у відповідь на зневажливе
    означення української мови як «говірки» Слісаренко дав різку відсіч великодержавному
    шовінізмові — епізод, що згодом став пунктом звинувачення.
  - >-
    Гра з авторством: 1931 року під псевдонімом Омелько Буц Слісаренко видає містифікаційну
    «Посмертну збірку творів».
  section: 'Діяльність: Футурист, прозаїк і опонент шовінізму'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Незручний факт: у березні—квітні 1930 року Слісаренко був одним із
    громадських обвинувачів на сфабрикованому процесі «Спілки визволення України» — тобто
    певний час служив репресивній машині, поряд із Панасом Любченком.
  - >-
    Поворот машини проти нього: арешт 29 квітня 1934 року в будинку письменників «Слово»;
    звинувачення в участі у контрреволюційній терористичній організації; майже рік вибивання
    зізнань, від яких він згодом відмовився.
  - >-
    Вирок і Соловки: військовий трибунал у Києві засудив його до 10 років (джерела розходяться
    щодо дати — 19 березня чи квітень 1935); ув'язнення в Соловецькому таборі особливого
    призначення, штрафний ізолятор на 3 місяці 1936 року.
  - >-
    [!myth-buster] [!epistemic-humility] Кінець: у жовтні 1937 року «трійка» УНКВС по
    Ленінградській області ухвалила найвищу кару; 3 листопада 1937 року Слісаренка розстріляли
    в Сандармосі у складі Соловецького етапу (1111 страчених, із них 134 «українські
    націоналісти» того дня). Відділяємо задокументовані факти від романтизованого мартирологу
    й чесно фіксуємо розбіжності в датах.
  section: 'Тінь: Обвинувач, який став обвинуваченим'
  words: 1600
- points:
  - >-
    Десятиліття мовчання й повернення імені: посмертна реабілітація 19 вересня 1957 року;
    перевидання творів (1965, 1990); виявлення місця розстрілів у Сандармосі дослідником Юрієм
    Дмітрієвим (1997).
  - >-
    [!decolonization] Сучасна актуальність: теза Горького про українську мову як «наречие» —
    пряма попередниця сьогоднішніх імперських заперечень окремішності української мови;
    відповідь Слісаренка звучить як заповіт мовної гідності.
  - >-
    Повернення до розминки: студент формулює відповідь на питання, як поєднати в одній долі
    обвинувача й жертву, не спрощуючи постаті; вшанування пам'яті (2024 року в Дергачах вулицю
    перейменовано на честь Олекси Слісаренка).
  section: 'Підсумок: Сандармох і повернення імені'
  words: 1000
focus: >-
  Олекса Слісаренко як представник Розстріляного відродження: еволюція від символізму через
  панфутуризм до авантюрно-пригодницької прози, полеміка з Максимом Горьким на захист
  української мови, моральна складність постаті (громадський обвинувач СВУ — згодом жертва
  терору) та механізм репресій Соловецького етапу й розстрілів у Сандармосі.
level: BIO
module: bio-115
objectives:
- Аналізувати творчу еволюцію Слісаренка від символізму через панфутуризм до авантюрно-пригодницької прози.
- >-
  Пояснювати конфлікт довкола статусу української мови в полеміці з Максимом Горьким як вияв
  великодержавного шовінізму.
- >-
  Критично оцінювати моральну складність постаті, що була і громадським обвинувачем (процес
  СВУ), і жертвою терору.
- Досліджувати механізм репресій Соловецького етапу та розстрілів в урочищі Сандармох.
