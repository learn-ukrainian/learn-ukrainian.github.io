content_outline:
- points:
  - '[!biography] Як людина, що написала найблискучішу комедію про українську мову («Мина Мазайло»), стала головною мішенню
    для режиму, який нібито підтримував національні культури?'
  - 'Парадокс Куліша: чим точніше він діагностував хвороби суспільства, тим неминучішою ставала його власна загибель.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Куліш — «попутник», що намагався реформувати систему зсередини, чи прихований дисидент? Порівняння
    його ранніх п''єс на радянську тематику з гострою сатирою «Мини Мазайла».'
  - 'Дебат 2 (посмертно): Радянська критика таврувала його як «буржуазного націоналіста». Сучасна Україна канонізувала як
    національного мученика. Де між цими двома крайнощами знаходиться реальна людина?'
  - '[!epistemic-humility] Чи можна вважати його п''єсу «Патетична соната» одночасно і апологією, і критикою революції?'
  - '[!decolonization] Викреслення Куліша з історії театру було інструментом колоніальної політики — доказом того, що в України
    нібито ніколи не було «справжньої» драматургії.'
  section: 'Конфліктна карта: Творець чи попутник?'
  words: 900
- points:
  - 'Соціальне походження: як син селянина з Херсонщини став центральною фігурою урбаністичної, модерної культури Харкова
    — тодішньої столиці України.'
  - 'Освіта та світогляд: шлях від сільського вчителя та офіцера царської армії до більшовика, а потім — до глибокого критика
    радянської системи.'
  - 'Формативні впливи: роль служби в армії, участь у революційних подіях, робота в системі народної освіти — як цей досвід
    відбився у його п''єсах.'
  section: 'Формування: Від херсонських степів до харківського авангарду'
  words: 1000
- points:
  - 'Тандем із Лесем Курбасом: найважливіша співпраця в історії українського театру XX століття. Куліш — текст, Курбас — сцена.
    Як вони доповнювали та змінювали один одного.'
  - 'Трилогія «діагнозів»: «Народний Малахій» (критика утопічної свідомості), «Мина Мазайло» (сатира на мовну асиміляцію),
    «Патетична соната» (трагедія національно-визвольних змагань).'
  - 'Первинне джерело: аналіз фрагментів п''єси «Мина Мазайло». Як Куліш використовує мову, гумор та гротеск для дослідження
    комплексу меншовартості.'
  - 'Новаторство: відмова від реалізму, поєднання експресіонізму, символізму та українського вертепу.'
  section: 'Діяльність: Театр «Березіль» і діагноз суспільству'
  words: 1300
- points:
  - '[!anti-hagiography] Ціна успіху: чи йшов Куліш на компроміси з совістю та владою, щоб його п''єси ставилися на сцені?
    Аналіз його менш відомих, «прохідних» творів.'
  - 'Злам: арешт його друга Миколи Хвильового та самогубство останнього. Як ця подія вплинула на Куліша і прискорила його
    падіння.'
  - '[!myth-buster] Міф про «незламного генія». Документи свідчать про психологічний тиск, розпач та спроби Куліша «покаятися»
    перед партією після розгромної критики.'
  - 'Трагедія «Маклени Ґраси»: остання п''єса, написана в передчутті арешту. Чи є вона його творчим заповітом і пророцтвом
    власної долі?'
  section: 'Тінь: Компроміс, цензура та самознищення'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь на питання, чому сатира на мовні комплекси стала смертним вироком
    для драматурга.'
  - '[!decolonization] Спадщина Куліша — це не лише п''єси, а й сама модель національного митця, який ставить перед суспільством
    незручні питання. Чому його творчість знову стала надзвичайно актуальною після 2014 року?'
  - 'Сучасні постановки: як сьогоднішній український театр інтерпретує Куліша? Чи вдається йому передати не лише сатиру, а
    й трагізм його творів?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykola Kulish's modernist dramaturgy, his satirical critique of Soviet reality in plays like 'Myna Mazailo', his collaboration
  with Les Kurbas, and his tragic fate as a leading figure of the Executed Renaissance.
