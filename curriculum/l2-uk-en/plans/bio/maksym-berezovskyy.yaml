content_outline:
- points:
  - '[!biography] Провокація: Як композитор, якого Болонська академія назвала генієм на рівні з Моцартом, міг померти у злиднях
    та забутті в Російській імперії? Це центральний парадокс долі Максима Березовського.'
  - 'Вступний факт: Березовський — автор першої української опери "Демофонт", партитуру якої шукали понад 200 років.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Обставини смерті. Офіційна версія — гарячка. Поширена версія — самогубство через цькування та нереалізованість.
    Що кажуть джерела, а що є пізнішим домислом?'
  - 'Дебат 2: "Російський" чи український композитор? Аналіз того, як імперська та радянська історіографія систематично затирали
    українське походження митця, представляючи його як "малоросійського" діяча російської культури.'
  - '[!epistemic-humility] Документальних свідчень про останні роки життя вкрай мало, що залишає простір для різних інтерпретацій
    його трагедії.'
  - '[!decolonization] Розвінчання міфу про "благодійність" імперії, яка нібито давала українцям шанс. Доля Березовського
    — хрестоматійний приклад "скляної стелі" для українських талантів.'
  section: 'Конфліктна карта: Імперія проти таланту'
  words: 900
- points:
  - Глухів — гетьманська столиця як культурний центр. Роль Глухівської співацької школи, першої професійної музичної установи
    в Східній Європі.
  - 'Переїзд до Петербурга: співак у придворній капелі. Конкуренція з італійськими музикантами, перші композиторські спроби
    в імперському центрі.'
  - Навчання в Болонській філармонічній академії у славетного Падре Мартіні. Успішне складання іспиту, що зробило його членом
    елітного клубу європейських композиторів.
  section: 'Формування: Від Глухова до Болоньї'
  words: 1000
- points:
  - 'Тріумф опери "Демофонт" у Ліворно (1773). Аналіз стилю: синтез італійської опери-серіа та української мелодики.'
  - 'Створення хорового концерту "Не отвержи мене во время старості" — вершини духовної музики українського бароко. Аналіз
    твору: відхід від барокової пишності до класицистичної строгості та психологізму.'
  - Порівняння Березовського з його сучасниками — Моцартом та італійськими майстрами. Його місце в європейському музичному
    контексті XVIII століття.
  section: 'Діяльність: Європейське визнання'
  words: 1300
- points:
  - '[!anti-hagiography] Повернення в Петербург з великими сподіваннями та повний провал. Чому імперії не був потрібен український
    геній, що досяг європейського визнання?'
  - Професійні конфлікти, інтриги при дворі, фінансова скрута. Його призначення на скромну посаду капельмейстера, що було
    приниженням для академіка.
  - '[!myth-buster] Розвінчання міфу про "меланхолію" та "слабкий характер". Аналіз обставин як систематичного професійного
    та психологічного тиску з боку імперської культурної машини.'
  - 'Ціна успіху: чи не був його від''їзд до Італії помилкою, що відірвала його від рідного ґрунту і зробила чужим і вдома,
    і за кордоном?'
  section: 'Тінь: Трагедія повернення'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання про трагедію Березовського, використовуючи поняття
    колоніалізму та культурної апропріації.'
  - '[!decolonization] Спадщина Березовського як символ "втраченого покоління" української інтелігенції XVIII ст., чиї досягнення
    були привласнені імперією.'
  - Відкриття творчості у XX столітті. Роль українських музикознавців у поверненні його імені та музики.
  - 'Сучасне значення: Чому історія Березовського є актуальним уроком про важливість власних культурних інституцій та небезпеку
    "братніх" обіймів імперії?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Maksym Berezovskyy, his European recognition with the opera "Demofonte", the tragedy of his return to the
  Russian Empire, and his legacy as a symbol of appropriated Ukrainian talent.
level: BIO
