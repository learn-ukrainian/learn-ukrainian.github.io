objectives:
- Аналізувати трагічну долю Максима Березовського як приклад імперського привласнення та пригнічення українського таланту
- Пояснювати роль Глухівської музичної школи та італійського періоду у формуванні унікального стилю композитора
- Критично оцінювати різні версії щодо обставин смерті митця, розрізняючи факти та пізніші міфи
- Формулювати аргументовану позицію щодо місця Березовського в українській та європейській музичній історії
