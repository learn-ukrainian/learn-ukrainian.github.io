content_outline:
- points:
  - >-
    [!biography] Знайомство зі Святославом Караванським: одесит, мовознавець,
    перекладач і лексикограф, один із найдовше ув'язнених українських політв'язнів
    (31 рік за даними ХПГ).
  - >-
    Провокаційне питання: чому укладання словника рим стало для радянської системи
    політичною загрозою?
  - >-
    [!decolonization] Лексикографія як деколонізація: повернення витісненого
    українського слова в науковий і повсякденний ужиток.
  section: Розминка
  words: 400
- points:
  - >-
    Народження 24 грудня 1920 року в Одесі, у родині інженера; писав зі шкільних
    років. Вступ до Одеського індустріального інституту (1938) та на зовнішнє
    відділення Інституту іноземних мов (1939).
  - >-
    1954 рік: початок праці над «Словником українських рим» у часи ув'язнення
    (близько 60 000 римованих пар) — лексикографія, народжена в таборі.
  - >-
    [!decolonization] Робота зі словом як історичне дослідження: від одного спірного
    терміна до більшої історії колоніального тиску на українську наукову й побутову
    лексику.
  section: 'Формування: Одеса, мова і початок словникарства'
  words: 1000
- points:
  - >-
    «Про одну політичну помилку» (1965) — самвидавний текст про русифікацію, після
    якого відбулися обшук і арешт.
  - >-
    Лексикографічна спадщина, що пережила десятиліття: «Практичний словник синонімів
    української мови» (1993), «Словник рим української мови» (2004), «Російсько-
    український словник складної лексики», «Секрети української мови».
  - >-
    [!anti-hagiography] Тримати словники в центрі: «31 рік ув'язнення» не повинен
    заступати мовознавчу працю.
  - >-
    Цитата «Після погрому українства 30-х років...» із праці «Пошук українського
    слова або Боротьба за національне "я"» — термінологія несе колоніальну історію.
  section: 'Діяльність: Словники як зброя проти русифікації'
  words: 1200
- points:
  - >-
    Арешт у липні 1944 року після нелегального повернення до Одеси; 7 лютого 1945
    року військовий трибунал Одеського військового округу засудив його до 25 років
    (статті 54-1б і 54-11) — звинувачення (зрада і участь у контрреволюційній
    організації) названі як радянські звинувачення.
  - >-
    [!myth-buster] Воєнна біографія, пов'язана з ОУН: це не військовий дослідницький
    нарис, і модуль не розв'язує організаційної історії воєнних років поза
    хронологією — документований факт відокремлено від пізніших рамок.
  - >-
    Звільнення 19 грудня 1960 року; обшук 4 вересня 1965 року й арешт 13 листопада
    1965 року — без нового суду: держава «реставрувала» невідбуті 8 років 7 місяців
    старого вироку.
  - >-
    [!decolonization] Окремий механізм: радянські репресії повторно використали
    старий вирок як інструмент проти пізнішого мовного активізму (на відміну від
    переслідувань за статтею 62). 1969 рік — додаткове табірне покарання; еміграція
    1979 року.
  - >-
    [!epistemic-humility] Точний номер архівної справи не знайдено в джерелах — про
    це сказано прямо, без вигадки.
  section: 'Тінь: Військовий трибунал і «реставрований» вирок'
  words: 1600
- points:
  - >-
    Еміграція 1979 року до США; лексикографічна праця тривала; помер 17 грудня 2016
    року в Балтиморі.
  - >-
    Цитата «Гібридна війна — це не бліцкриґ.» — логіка тривалості російської агресії;
    робота зі словником як історичне дослідження для рівнів C1/C2.
  - >-
    [!epistemic-humility] Свідчення про Катинь, зібрані в ув'язненні: польські
    історичні зв'язки потребують окремої джерельної роботи перед класним викладом.
  - >-
    Сучасне значення: лексикограф, який обернув словник на акт національної
    самооборони — «Боротьба за національне "я"».
  section: 'Підсумок: Слово як національне «я»'
  words: 1000
focus: >-
  Святослав Караванський як мовознавець, перекладач і лексикограф, один із найдовше
  ув'язнених українських політв'язнів: аналіз лексикографії як форми деколонізації
  та механізму радянських репресій, що «реставрував» старий вирок проти мовного
  активізму.
level: BIO
module: bio-275
objectives:
- >-
  Аналізувати лексикографічну працю Караванського — словники рим, синонімів і
  складної лексики — як форму деколонізації української мови.
- >-
  Розуміти, як радянська система повторно використала невідбутий старий вирок як
  інструмент проти пізнішого мовного активізму.
- >-
  Досліджувати зв'язок між термінологією та колоніальною історією на прикладі праці
  «Пошук українського слова».
- >-
  Оцінювати джерельні прогалини (точний номер архівної справи не знайдено) як межу
  достовірного знання.
