content_outline:
- points:
  - 'Парадокс: Любомир Гузар — людина, що ніколи не жила в радянській Україні — став її моральним компасом після розпаду СРСР.
    Як вигнанець зміг об''єднати націю?'
  - '[!biography] Коротка довідка, що руйнує стереотип: не просто священник, а доктор богослов''я, що повернувся в Україну
    у віці 60 років.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Роль церкви у світській державі. Чи були виступи Гузара на Майдані та в групі "Першого грудня" моральним обов''язком
    чи політичним втручанням? Позиції: "церква має бути поза політикою" vs "церква не може мовчати, коли йдеться про справедливість".'
  - 'Дебат 2: Перенесення осідку УГКЦ до Києва. Це було відновлення історичної справедливості чи експансія на "канонічну територію"
    православних церков? [!epistemic-humility] Позиції УГКЦ, УПЦ МП, та світських аналітиків.'
  - '[!decolonization] Гузар як символ повернення України в європейський релігійний та інтелектуальний простір.'
  section: 'Конфліктна карта: Моральний авторитет vs Політичний гравець'
  words: 900
- points:
  - 'Еміграція родини у 1944 році: світ, який було втрачено. Соціальний та історичний контекст.'
  - 'Життя в США: від пластуна до семінариста. Формативні досвіди, що визначили його погляд на свободу та відповідальність.'
  - 'Студії в Римі та знайомство з Йосифом Сліпим: інтелектуальне та духовне становлення в центрі католицького світу.'
  - 'Погляд "ззовні": як життя на Заході сформувало його розуміння проблем України.'
  section: 'Формування: Шлях вигнанця та формування в діаспорі'
  words: 1000
- points:
  - 'Повернення додому: відродження УГКЦ в незалежній Україні як інституції та як спільноти.'
  - 'Будівництво Патріаршого собору в Києві: не просто будівля, а маніфестація повернення УГКЦ на національну сцену.'
  - 'Мудрість простоти: стиль спілкування Гузара. Аналіз його інтерв''ю, аудіокниг ("Дорога до себе"), та публічних виступів.'
  - 'Вміння говорити про складне просто: розбір ключових ідей — "Бути Людиною", гідність, служіння.'
  section: 'Діяльність: Відродження Церкви та мудрість комунікації'
  words: 1300
- points:
  - '[!anti-hagiography] "Блаженніший" — не означає "безпомилковий". Які рішення Гузара викликали критику і чому?'
  - 'Екуменічний діалог: для одних — шлях до єдності християн, для інших — зрада "чистоти віри". Критика з боку консервативних
    кіл.'
  - '[!myth-buster] Міф про "тихого інтелектуала". Гузар був рішучим адміністратором. Аналіз жорстких рішень, які доводилось
    приймати (кадрові зміни, фінансові питання).'
  - 'Проблема наступництва: чи зміг Гузар підготувати церкву до життя після себе? Дискусії, що виникли після його відходу
    з поста глави УГКЦ.'
  section: 'Тінь: Ціна єдності та суперечки навколо спадку'
  words: 900
- points:
  - 'Повернення до розминки: Як вигнанець об''єднав націю? Студент формулює відповідь, спираючись на знання про його біографію,
    діяльність та комунікаційний стиль.'
  - 'Заповіт любові та єдності: аналіз ініціативи "Першого грудня" як спроби створити платформу для моральних авторитетів
    нації.'
  - '"Блаженніший Любомир" у пам''яті народу: як його образ трансформується після смерті? Відділення реальної постаті від
    міфу.'
  - '[!decolonization] Спадщина Гузара як приклад побудови української ідентичності, що базується на європейських цінностях,
    а не на протиставленні "ворогу".'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Biography of Lyubomyr Huzar: spiritual leadership, the concept of "being human", the role of the church in a secular
  state, and the anti-hagiographic view of his legacy.'
