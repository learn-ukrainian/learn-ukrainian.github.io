objectives:
- Аналізувати роль Любомира Гузара як духовного лідера та морального авторитету в незалежній Україні
- Критично оцінювати концепцію "бути людиною" в його вченні та її вплив на суспільство
- Дискутувати про роль та межі впливу церкви в сучасній світській державі на українському прикладі
- Формулювати власну позицію щодо суперечливих аспектів його діяльності (екуменізм, перенесення осідку)
