content_outline:
- points:
  - >-
    [!biography] Антін Владиславович Крушельницький: письменник, учитель, редактор, громадський
    діяч і колишній міністр освіти Західноукраїнської Народної Республіки, народжений 4 серпня
    1878 року в Ланьцуті в Галичині.
  - >-
    Початковий парадокс: літній галицький інтелектуал і родинний патріарх переїхав із родиною
    до радянської України як до простору культурної праці, а радянська держава перекодувала
    ці мережі як "терор" і підпілля.
  - >-
    Провокаційне питання: як не звести біографію Крушельницького до фінальної репресії, але
    водночас точно назвати Харків, Соловки й Сандармох?
  section: Розминка
  words: 400
- points:
  - >-
    Галицька основа: Ланьцут, австро-угорський контекст, педагогічна й громадська робота,
    редакторство і публічна роль у передрадянському українському житті.
  - >-
    Політична й освітня відповідальність: участь у державному досвіді ЗУНР як міністр освіти
    пояснює, чому радянська справа проти нього влучала не лише в приватну особу, а в
    інституційну пам'ять.
  - >-
    [!decolonization] Західноукраїнський досвід не є периферійним щодо української культури:
    він є одним із центрів, який Крушельницький приніс у радянську Україну.
  - >-
    Переїзд до радянської України треба читати без зверхності заднім числом: джерела дозволяють
    говорити про очікування культурної праці, сімейну стратегію і складний політичний вибір,
    але не про просту "наївність".
  section: "Формування: Галицький педагог, редактор і міністр ЗУНР"
  words: 1000
- points:
  - >-
    Ранні й середні твори: "Пролетарі" 1899 року, "Світла і тіні" 1900 року, "Серце" 1901 року,
    "Артистичні душі" 1902 року та "Гомін Галицької землі" 1918-1919 років показують довгу
    допресійну літературну траєкторію.
  - >-
    Проза 1920-х: "Буденний хліб", "Як пригорне земля", "Як промовить земля", "Ірена Оленська",
    "Дужим помахом крил" і "Перемога" задають соціальний, родинний і громадянський регістр.
  - >-
    Лист 20 жовтня 1926 року з фразою "кулями люди хочуть чи доходити своїх прав" читається як
    громадянський голос, занепокоєний насильством і політичною ескалацією.
  - >-
    Лист до Марії 24 жовтня 1926 року з фразою "молитися за Собінського" потребує обережного
    коментаря до польсько-єврейсько-української складності галицького публічного життя.
  section: "Діяльність: Проза, листи і громадянський голос"
  words: 1200
- points:
  - >-
    [!anti-hagiography] Родинна трагедія не має заміняти документи: треба назвати дати,
    інституції, звинувачення і твори, а вже потім говорити про знищення культурної родини.
  - >-
    Механізм репресії: арешт 6 листопада 1934 року в Харкові, радянське обвинувачення в
    участі або керівництві українським націоналістичним чи ОУН-типу підпіллям і "терористичній"
    діяльності.
  - >-
    Вирок: 28 березня 1935 року виїзна сесія Військової колегії Верховного суду СРСР засудила
    Крушельницького до 10 років таборів.
  - >-
    [!epistemic-humility] Формула має бути двоступеневою: Соловецьке ув'язнення, потім
    рішення спеціальної трійки 1937 року і розстріл 3 листопада 1937 року в Сандармосі біля
    Медвеж'єгорська.
  - >-
    Родинний вимір: справа криміналізувала не лише письменника, а й дім, синів, родичів,
    учнів і колег, тобто середовище, яке могло зберігати й тлумачити його архів.
  section: "Тінь: Харківський арешт, родина, Соловки, Сандармох"
  words: 1600
- points:
  - >-
    Що вижило: проза, публіцистика, листи й переклади в українських та діаспорних матеріалах,
    але без тієї родинної та інтелектуальної екосистеми, яку радянський терор знищив.
  - >-
    Навчальний підсумок: Крушельницький допомагає говорити про "рух до небезпеки" без
    осуду заднім числом, бо джерела показують реальні очікування культурної праці в радянській Україні.
  - >-
    Кінцеве питання: як включити такого автора до сучасної пам'яті не як абстрактного мученика,
    а як галицького педагога, письменника, редактора, міністра ЗУНР і жертву конкретного
    радянського репресивного ланцюга?
  section: "Підсумок: Культурна родина без сентиментального скорочення"
  words: 1000
focus: >-
  Антін Крушельницький як галицький педагог, письменник, редактор і колишній міністр освіти
  ЗУНР, чий переїзд до радянської України завершився сфабрикованою справою, Соловками,
  Сандармохом і руйнуванням культурної родини.
