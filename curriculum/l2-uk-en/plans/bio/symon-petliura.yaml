objectives:
- Аналізувати життя та спадщину Симона Петлюри як ключової та суперечливої постаті Української революції
- Критично оцінювати роль Петлюри у процесах державотворення та його відповідальність за успіхи та поразки УНР
- Розрізняти історичні факти, радянську пропаганду та сучасні інтерпретації в оцінках діяльності Петлюри
- Формулювати обґрунтовану позицію щодо найгостріших дискусій навколо постаті Петлюри (погроми, Варшавський договір)
