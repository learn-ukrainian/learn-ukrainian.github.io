content_outline:
- points:
  - 'Парадокс: Судовий процес у Парижі 1927 року, де судили не вбивцю, а його жертву. Як так сталося, що вирок убивці перетворився
    на вирок репутації Симона Петлюри?'
  - '[!biography] Як скромний журналіст і бухгалтер став Головним Отаманом, військовим диктатором, і, зрештою, уособленням
    цілої епохи — Української революції?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Відповідальність за єврейські погроми. Чи був Петлюра їхнім організатором (радянська версія), пасивним спостерігачем
    у хаосі війни, чи лідером, що намагався, але не зміг зупинити насильство?'
  - 'Дебат 2: Варшавський договір 1920 року. Це була зрада національних інтересів (відмова від Галичини на користь Польщі)
    чи єдиний можливий спосіб врятувати УНР від остаточного знищення більшовиками?'
  - '[!epistemic-humility] Оцінки договору варіюються від «геніального тактичного ходу» до «національної ганьби». Обидві сторони
    мають сильні аргументи.'
  - '[!decolonization] Розгляд обох дебатів крізь призму гібридної війни та радянських інформаційних операцій, спрямованих
    на дискредитацію українського визвольного руху.'
  section: 'Конфліктна карта: Зрадник чи рятівник?'
  words: 900
- points:
  - 'Полтавське коріння: нащадок козацького роду, що зростав в атмосфері українського культурного відродження.'
  - 'Духовна семінарія як осередок вільнодумства: виключення за участь у національному русі як поворотний момент.'
  - 'Роки пошуків: журналістика, РУП, вплив Драгоманова, робота в різних містах імперії — формування світогляду майбутнього
    лідера.'
  section: 'Формування: Від семінариста до революціонера'
  words: 1000
- points:
  - 'Зірка революції: стрімкий злет від Генерального секретаря військових справ до голови Директорії УНР.'
  - 'Державотворення в умовах тотальної війни: розбудова армії, запровадження національної валюти, дипломатичні зусилля на
    тлі боротьби на три фронти — проти більшовиків, білогвардійців та анархії.'
  - 'Аналіз першоджерел: промови та накази Петлюри, що свідчать про його бачення держави та спроби втримати контроль над ситуацією.'
  section: 'Діяльність: Головний Отаман у вогні'
  words: 1300
- points:
  - '[!anti-hagiography] Погроми як найтемніша сторінка епохи. Критичний аналіз відповідальності — персональної та політичної.
    Чому накази про припинення насильства не діяли? Що ще можна було зробити?'
  - 'Військові та політичні прорахунки: конфлікти з іншими українськими лідерами, неспроможність об''єднати всі сили, втрата
    територій та, зрештою, поразка визвольних змагань.'
  - '[!myth-buster] Деконструкція радянського образу «кривавого ката» та спрощеного націоналістичного образу «святого мученика».
    Петлюра як трагічна фігура, що опинилася перед вибором без правильних рішень.'
  section: 'Тінь: Погроми, поразки та ціна влади'
  words: 900
- points:
  - 'Повернення до розминки: озброївшись знаннями, студент аналізує Паризький процес. Чи був він справедливим? Яку роль у
    ньому відіграла радянська агентура?'
  - 'Петлюра як символ: чому саме його постать, а не Грушевського чи Скоропадського, стала уособленням боротьби за незалежність
    України у ХХ столітті?'
  - '[!decolonization] Сучасна «петлюріада»: як образ Головного Отамана використовується в сучасній політиці та культурі,
    і як Україна переосмислює його спадщину, очищуючи її від імперських та радянських нашарувань.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Симон Петлюра як суперечлива постать: від соціаліста-журналіста до Головного Отамана, символ боротьби за незалежність
  та об''єкт звинувачень у погромах. Аналіз його ролі у Варшавському договорі та трагічної загибелі в Парижі.'
level: BIO
