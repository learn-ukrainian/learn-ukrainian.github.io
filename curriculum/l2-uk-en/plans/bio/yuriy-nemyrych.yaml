content_outline:
- points:
  - 'Парадокс: Юрій Немирич — найосвіченіший українець свого часу, що навчався в Оксфорді. Чому він приєднався до козацького
    повстання, яке нищило його власний клас?'
  - Його проект, Гадяцький договір, міг змінити хід історії, створивши третю силу між Московією та Річчю Посполитою. Чому
    він залишився лише на папері?
  - '[!biography]'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Немирич в очах сучасників. Для польської шляхти — зрадник, що перейшов на бік "хлопів". Для козацької голоти
    — підозрілий "лядський" пан.'
  - 'Дебат 2: Інтерпретація спадщини. Радянська історіографія — "класовий ворог". Сучасна українська — "батько-засновник європейського
    вибору України".'
  - '[!epistemic-humility] Оцінка Гадяцького договору: чи був він реальною можливістю, чи утопією, приреченою на провал через
    непримиренні інтереси сторін?'
  - '[!decolonization] Протиставлення Немирича (європейський вектор, федералізм) Богдану Хмельницькому (автократія, союз з
    Московією) як двох моделей розвитку України.'
  section: 'Конфліктна карта: Зрадник чи візіонер?'
  words: 900
- points:
  - 'Рід Немиричів: українська магнатерія на службі Речі Посполитої. Багатство, вплив і аріанство — релігія "інтелектуальної
    еліти".'
  - 'Grand Tour XVII століття: навчання в Лейдені, Оксфорді, Парижі. Немирич як частина європейської "республіки вчених".'
  - 'Релігійні метання: від аріанства, що проповідувало раціоналізм, до переходу в православ''я. Політичний розрахунок чи
    духовний пошук?'
  - Що він бачив у Європі? Ідеї федералізму (Нідерланди), парламентаризму (Англія), які він намагався прищепити на українському
    ґрунті.
  section: 'Формування: Космополіт з українським корінням'
  words: 1000
- points:
  - 'Перехід на бік Хмельницького (1657): розрив зі своїм класом. Мотиви: прагматизм чи ідеологічне прозріння?'
  - 'Канцлер при Виговському: Немирич стає головним ідеологом та дипломатом Гетьманщини.'
  - 'Гадяцька унія (1658): "magnum opus" Немирича. Аналіз ключових пунктів: створення Великого Князівства Руського, власна
    армія, фінанси, суд.'
  - Промова Немирича на сеймі — блискучий зразок парламентської риторики та спроба переконати шляхту в необхідності союзу
    з козаками.
  section: 'Діяльність: Велике Князівство Руське: проект держави'
  words: 1300
- points:
  - '[!anti-hagiography] "Пророк", що не мав підтримки. Його ідеї були незрозумілі ані шляхті, ані козацькій масі, яка прагнула
    "вольностей", а не держави.'
  - 'Ціна компромісу: чи не був Гадяцький договір зрадою ідеалів Хмельниччини? Повернення шляхти, відновлення повинностей
    — що це означало для простого козака?'
  - 'Конотопська битва: перемога, що не призвела до миру, а лише поглибила громадянську війну ("Руїну").'
  - '[!myth-buster] Загибель Немирича: не в бою, а вбитий місцевими селянами чи козаками. Символічна смерть "пана" від рук
    тих, кому він намагався збудувати державу.'
  section: 'Тінь: Трагедія утопіста'
  words: 900
- points:
  - 'Повернення до розминки: чому проект "європейця" Немирича провалився? Студент формулює відповідь, враховуючи контекст
    Руїни.'
  - 'Спадщина ідей: Гадяцький договір як альтернативна історія України. Ідеї Немирича про федералізм були забуті на століття,
    але відродилися в УНР і сучасній Україні.'
  - '[!decolonization] Немирич vs Переяславська рада. Його спадщина — це інтелектуальне заперечення "неминучості" союзу з
    Москвою.'
  - 'Актуальність Немирича: чи є Україна 2020-х років реалізацією його мрії про місце в Європі?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Юрій Немирич, Гадяцька унія, проект Великого Князівства Руського, конфлікт між козацькою та шляхетською ідентичністю,
  європейський інтелектуал в Україні XVII ст.
