content_outline:
- points:
  - 'Провокація: Олекса Довбуш — «шляхетний месник» гуцульських легенд чи ватажок збройного загону, що грабував, палив і вбивав? Чому Карпати досі носять його ім''я в назвах скель і печер?'
  - '[!biography] Син бідного коморника з Печеніжина, який на кілька років став найвідомішим опришком Карпат — і фольклорним героєм на століття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): для панів, орендарів, купців і коронного війська — небезпечний розбійник, якого переслідують збройно; для частини гірської бідноти — захисник проти визиску.'
  - 'Дебат 2 (рецепція проти запису): IEU коротко вживає порівняння з Робіном Гудом; ЕІУ фіксує рейди, фізичне насильство, підпали й захоплення майна; Local History прямо застерігає проти «архівно доведеної революційної/антифеодальної програми».'
  - '[!decolonization] Осердя історії — карпатський/волоський пастуший світ, слабшання місцевих прав, безправ''я та криза Речі Посполитої, а не пізніші імперські поліцейські категорії.'
  - '[!epistemic-humility] Немає особистих джерел Довбуша як авторського життєпису; більшість деталей — слідчі/хронікальні записи й пізніші перекази. «Магічні» обставини смерті — фольклор, а не хроніка.'
  section: 'Конфліктна карта: шляхетний месник чи розбійник?'
  words: 900
- points:
  - 'Походження: бідна родина коморника в Печеніжині на Покутті; безземелля й залежність як тло руху.'
  - '1738-1739 — рання діяльність разом із братом Іваном; згодом брати посварилися й розійшлися (ЕІУ — від весни 1739 окремо; стаття «Опришки» — Іван відійшов на Зх. Прикарпаття).'
  - 'Соціальний тиск: панська, рентна та лихварська зверхність; переслідування опришків коронним гетьманом Юзефом Потоцьким і полковником Пшелуським.'
  - Від 1740 — база в Чорногорі, гора Стіг біля пограниччя Галичини, Молдавії та Угорщини; мобільність гірського загону.
  section: 'Формування: опришок із Печеніжина'
  words: 1000
- points:
  - 'Географія рейдів: Прикарпаття, Закарпаття, Буковина; у 1744-1745 роках — напади в районах Дрогобича, Турки, Солотвина, Надвірної, Рогатина.'
  - 'Богородчанська фортеця: здобуття фортеці — один із найвідоміших епізодів Довбушевого циклу (ЕІУ).'
  - 'Соціальна мішень і жертви: пани, орендарі, лихварі, купці; за Local History рейди зачіпали польські, єврейські, вірменські та руські-українські громади. Учити структуру влади, а не етнічну провину.'
  - '[!decolonization] Опришківство як спроба гірської спільноти відповісти на визиск, а не програма модерного політика; спрощене «антифеодальне» прочитання Local History прямо ускладнює.'
  section: 'Діяльність: загін у Карпатах, 1740-1745'
  words: 1300
- points:
  - '[!anti-hagiography] Джерела прямо фіксують фізичне насильство, підпали й захоплення грошей та майна; романтичний образ це стирає. Багатоетнічні жертви — не фон, а факт.'
  - '[!myth-buster] Мотиви невразливості (лише особлива куля здатна вбити) і сокири, що розколює скелю, — це фольклор і пам''ять місця, а не біографія.'
  - 'Загибель — джерельна напруга: ЕІУ біо дає 24.08.1745 у Космачі від руки С. Дзвінчука; ЕІУ «Опришки» — смертельне поранення 23.08.1745; Local History — ніч 23–24.08, поранення в плече, втеча товаришів, смерть від кровотечі; IEU — «betrayed by a fellow opryshok». Романтичну «зраду коханої» подавати як переказ.'
  - 'Пересторога щодо кіно й школи: фільм «Довбуш» (2023) і шкільні перекази підсилюють супергеройську рамку; використовувати як рецепцію після джерельної перевірки, а не як біографію.'
  section: 'Тінь: насильство, переслідування й смерть у Космачі'
  words: 900
- points:
  - 'Повернення до розминки: чому запис і легенда так розходяться — і що це каже про те, як гори «пам''ятають» опір?'
  - 'Спадщина в пам''яті: Скелі Довбуша, печери, перекази й пісні — усна пам''ять, що пережила самого опришка; теза модуля лишається «історичний опришок із великим фольклорним життям».'
  - '[!epistemic-humility] Порівняння з Кармалюком і Залізняком: різні епохи й регіони, спільна проблема — як відрізнити соціальний опір від його героїзованого образу.'
  section: 'Дискусія та підсумок: опришок і легенда'
  words: 700
focus: 'Oleksa Dovbush as a 1730s-1740s Carpathian opryshok leader: the Commonwealth-borderland social pressures behind the movement, his raids and their multiethnic victims, his death at Kosmach, and his vast Hutsul folkloric afterlife, taught with a firm line between the source record and legend rather than a clean Robin Hood myth.'
level: BIO
module: bio-334
objectives:
- Пояснювати опришківство як карпатський соціальний рух опору проти панів, орендарів і лихварів, а не як абстрактне «розбійництво».
- 'Розрізняти документальний запис (ЕІУ/IEU: рейди, насильство, підпали, військове переслідування) і фольклорний образ «шляхетного месника».'
- Критично оцінювати ярлик «карпатського Робіна Гуда», враховуючи, що напади зачіпали багатоетнічні громади (польські, єврейські, вірменські, руські-українські).
- Відділяти пізнішу гуцульську легенду (сокира, що розколює скелю; Скелі Довбуша; фільм 2023 року) від того, що фіксують історичні джерела.
pedagogy: CBI
persona:
  role: Історик-антиагіограф, що тримає разом опришківське насильство, народну симпатію й пізнішу гуцульську легенду, не даючи чистого «шляхетного розбійника».
  voice: Anti-Hagiographer
