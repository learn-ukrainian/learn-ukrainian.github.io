content_outline:
- points:
  - >-
    [!biography] Знайомство з Софією Налепинською-Бойчук: художниця-графік польського
    походження, пов'язана з українським мистецьким середовищем, дереворитниця і професорка,
    одна з ключових постатей школи бойчукістів.
  - >-
    Провокаційне питання: чому радянська влада вбачала "націоналістичну терористичну
    організацію" у школі художників, що творили монументальні розписи й дереворити?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 30 липня 1884 року в Лодзі (тоді Російська імперія, нині Польща) у
    польській родині; навчання в європейських мистецьких центрах і формування як
    графіка широкого кругозору.
  - >-
    Польське походження, європейське навчання й робота в українському мистецькому середовищі
    потребують читання за перевіреними біографічними та музейними джерелами, а не за
    неперевіреним листовим фрагментом.
  - >-
    [!decolonization] Шлюб із Михайлом Бойчуком і входження в школу бойчукістів —
    синтез візантійської, народної та модерної монументальної традицій; опанування
    дереворитства як дисциплінованої графічної мови.
  - >-
    Викладання й професорство: Налепинська-Бойчук не була "дружиною майстра", а
    самостійною авторкою та педагогинею всередині колективного стилю.
  section: 'Формування: Від Лодзі до європейської графіки'
  words: 1000
- points:
  - >-
    Графічний доробок 1920-х: портрет-дереворит "В. Еллан-Блакитний", "Фабзаєць" та
    шевченківська тема "Мені тринадцятий минало...".
  - >-
    Соціально-документальні композиції: "Молотьба", "Студентка", "Дівчата з книжкою",
    "Робітфаківки" — теми праці, освіти й нової жінки-студентки.
  - >-
    1930-ті роки та пряме звернення до соціальної біди й репресій: "Голодні діти",
    "Перед наступом білих", "Пацифікація Західної України".
  - >-
    Естетика опору: дисциплінований контур, соціальні типи, монументальне спрощення;
    авторський внесок окремої художниці всередині спільного стилю бойчукістів.
  section: 'Діяльність: Дереворит як мова'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Налепинська-Бойчук не була політичною діячкою; радянська
    машина знищувала її за належність до мистецької школи, оголошеної ворожою.
  - >-
    Механізм терору: арешт органами НКВС 12 червня 1937 року в межах бойчукістської
    справи; звинувачення в участі в "антирадянській націоналістичній терористичній
    організації" та у співпраці з іноземною розвідкою.
  - >-
    Швидкість розправи: смертний вирок 6 грудня 1937 року й розстріл у Києві 11 грудня
    1937 року — окремо названі дати показують швидкість убивчого механізму після
    місяців слідства.
  - >-
    [!epistemic-humility] Її загибель — в одному ряду з убивствами Михайла Бойчука,
    Івана Падалки та Василя Седляра; мета терору — культурна ліквідація: не просто
    знищити художників, а зробити стиль і школу політично злочинними.
  - >-
    УІНП повідомляє, що на допитах вона називалася українкою; це не скасовує польського
    походження, а точний вислів не відтворюють без прямої архівної транскрипції.
  section: 'Тінь: Бойчукістська справа та розстріл'
  words: 1600
- points:
  - >-
    Що знищено й що збереглося: багато монументальних бойчукістських творів фізично
    знищено, замальовано або втрачено; графіка збереглася в музейних колекціях,
    зокрема у Львівській національній галереї мистецтв.
  - >-
    [!myth-buster] Проти спрощення "дружина Бойчука": повернути в центр її власний
    дереворит, викладання та документовану мистецьку біографію.
  - >-
    Польсько-українське формування як цінність, а не привід для вилучення: біографію
    треба читати водночас і як польське походження, і як зв'язок з українським мистецьким
    середовищем та працею.
  - >-
    Кінцеве питання: як учити художницю, чиї головні твори візуальні — спершу читати
    лінію, композицію, тему, техніку, дату й колекцію, а вже потім хроніку арешту.
  section: 'Підсумок: Що пережило вогонь'
  words: 1000
focus: >-
  Софія Налепинська-Бойчук як самостійна художниця-графік і дереворитниця школи
  бойчукістів, польсько-українське формування її мистецтва та механізм культурної
  ліквідації, що привів до її розстрілу в бойчукістській справі 1937 року.
level: BIO
module: bio-214
objectives:
- >-
  Аналізувати графічну мову Софії Налепинської-Бойчук (дереворит, соціально-документальна
  композиція) як самостійний внесок усередині колективного стилю бойчукістів.
- >-
  Пояснювати польсько-українське формування художниці без вилучення жодної з його частин,
  спираючись на її записане самовизначення.
- >-
  Досліджувати механізм радянського терору проти школи бойчукістів як культурну ліквідацію,
  а не покарання за реальний злочин.
- >-
  Оцінювати, як читати біографію художниці через візуальні твори та музейні об'єкти, а не
  лише через текстові джерела.
