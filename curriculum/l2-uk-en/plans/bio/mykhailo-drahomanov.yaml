content_outline:
- points:
  - 'Парадокс: Як політичний вигнанець, змушений покинути Україну через Емський указ, зміг стати «інтелектуальним батьком»
    цілого покоління, яке розбудовувало українську культуру зсередини?'
  - Драгоманов — постать, яку одночасно вважали «недостатньо націоналістом» і «небезпечним сепаратистом».
  - '[!biography] Знайомство з ключовою дилемою Драгоманова: вірність європейським соціалістичним ідеалам vs служіння національній
    справі.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Київський період. Конфлікт Драгоманова з російською імперською владою. Його громадівська діяльність як «українофільство»
    чи як загроза імперії?'
  - 'Дебат 2: Еміграція. Полеміка Драгоманова з галицькими «народовцями». Його ідеї федералізму та соціалізму проти ідеї соборної
    національної держави. Чи був його космополітизм зрадою національних інтересів?'
  - '[!epistemic-humility] Розгляд позицій обох сторін: адміністрації університету, яка його звільнила, та молодих громадівців,
    які його підтримували. Позиції Франка, який пройшов шлях від учня до критика Драгоманова.'
  - '[!decolonization] Ідеї Драгоманова як спроба вирвати Україну з-під російського деспотизму та інтегрувати її в європейський
    контекст не як провінцію, а як рівноправного члена федерації.'
  section: 'Конфліктна карта: Імперія vs Федерація, Націоналізм vs Соціалізм'
  words: 900
- points:
  - 'Походження з дворянської родини з декабристськими зв''язками: атмосфера вільнодумства з дитинства.'
  - 'Навчання в Київському університеті св. Володимира: формування під впливом залишків Кирило-Мефодіївського братства та
    європейської філософії.'
  - Перехід від захоплення етнографією та фольклором до політичного аналізу. Як збирання народних пісень привело до ідеї політичної
    реформи?
  section: 'Формування: Від Гадяча до Києва (1841-1864)'
  words: 1000
- points:
  - 'Академічна кар''єра в Київському університеті: спроба реформувати вищу освіту зсередини та її провал.'
  - 'Емський указ як поворотний момент: вимушена еміграція та початок нового етапу боротьби.'
  - 'Видання журналу «Громада» в Женеві: створення першого вільного українського політичного медіа.'
  - 'Вплив на Франка, Лесю Українку та інших: Драгоманов як «заочний університет» для молодої української інтелігенції.'
  section: 'Діяльність: Кафедра, «Громада», Женева (1864-1895)'
  words: 1300
- points:
  - '[!anti-hagiography] Критика Драгомановим «хуторянства» та його розрив з частиною українського руху. Чи не недооцінив
    він силу національного сентименту?'
  - 'Полеміка з Франком: звинувачення у догматизмі та відірваності від реалій підросійської України.'
  - 'Провал ідеї федералізму в тогочасному контексті: чи була його програма реалістичною, чи утопічною мрією?'
  - '[!myth-buster] Драгоманов не був «ворогом незалежності». Він вважав її недосяжною в XIX ст. і пропонував федералізм як
    єдиний прагматичний шлях. Але чи не став цей прагматизм перешкодою для більш радикальних візій?'
  section: 'Тінь: Ціна космополітизму'
  words: 900
- points:
  - 'Повернення до розминки: як ідеї «женевського відлюдника» визначили вектор розвитку України у XX столітті?'
  - 'Спадщина Драгоманова: його концепції лягли в основу програм багатьох українських партій початку XX ст. Його ідеї про
    євроінтеграцію стали мейнстрімом через 100 років.'
  - '[!decolonization] Драгоманов заклав інтелектуальну основу для розриву з «русским миром» та повернення України до «європейської
    родини».'
  - 'Сучасна актуальність: наскільки ідеї Драгоманова про федералізм, децентралізацію та роль освіти є релевантними для сучасної
    України?'
  section: 'Дискусія та підсумок: Спадщина (1895-)'
  words: 700
focus: 'Mykhailo Drahomanov: political thinker, federalist, publicist, and mentor to a generation of Ukrainian intellectuals,
  including Ivan Franko and Lesya Ukrainka.'
level: BIO
module: bio-047
objectives:
- Критично аналізувати ідеї федералізму та соціалізму Драгоманова в контексті імперських та національних рухів XIX ст.
- Пояснювати причини та наслідки конфлікту Драгоманова з російською владою та частиною українського національного руху.
- Оцінювати вплив Драгоманова на розвиток української політичної думки та його роль як наставника для покоління Франка та
  Лесі Українки.
- Формулювати власну позицію щодо актуальності спадщини Драгоманова для сучасної України.
