content_outline:
- points:
  - 'Парадокс: Як письменник, що отримав Сталінську премію, став символом інтелектуального спротиву та автором забороненого
    роману?'
  - '[!biography] Олесь Гончар — одна з найсуперечливіших постатей в українській літературі XX століття.'
  - 'Питання для роздумів: чи можна бути частиною системи і водночас їй протистояти?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Офіційний радянський письменник чи прихований дисидент? Сучасники сперечалися, чи був його шлях свідомою стратегією
    виживання, чи опортунізмом, що переріс у каяття.'
  - 'Дебат 2: «Приручений» класик чи радикальний мислитель? Пострадянська система намагалася нейтралізувати гостроту «Собору»,
    перетворивши Гончара на безпечну фігуру для шкільної програми.'
  - '[!epistemic-humility] Оцінки коливаються від «конформіст» до «совість нації». Правда, ймовірно, знаходиться у складній
    взаємодії цих ролей.'
  - '[!decolonization] Гончара використовувала радянська пропаганда для створення образу «успішного українського письменника».
    Аналіз його творчості вимагає відділення його від цього імперського наративу.'
  section: 'Конфліктна карта: Система vs. Сумління'
  words: 900
- points:
  - Народження на Полтавщині у вирі революції та голоду.
  - Раннє сирітство та виховання у бабусі, що заклало основи народної моралі.
  - Навчання у Харкові 1930-х — у центрі наслідків Голодомору та репресій проти інтелігенції.
  - Формативний вплив викладачів та літературного середовища, перші спроби письма.
  section: 'Формування: Від Сухої Балки до Харкова'
  words: 1000
- points:
  - Ідея збереження козацького собору як метафори збереження української душі та історії.
  - «Собор» (1968) як перший в радянській літературі екологічний маніфест і твір-протест проти руйнування культурної спадщини.
  - Миттєва заборона роману, розгорнута кампанія цькування та вилучення з бібліотек.
  - Феномен «самвидаву»: як заборонений твір став культовим серед шістдесятників і поширювався у рукописних копіях.
  - 'Роль Гончара як голови Спілки письменників: використання офіційної посади для захисту молодих авторів та культурних проектів.'
  section: 'Діяльність: «Собор» як роман-вибух'
  words: 1300
- points:
  - '[!anti-hagiography] Шлях до «Собору» почався з компромісу. Роман «Прапороносці» про Другу світову війну приніс Гончару
    славу, три Сталінські премії та статус офіційного письменника.'
  - Аналіз «Прапороносців» як твору, що відповідав канонам соцреалізму, хоч і з гуманістичними нотами.
  - Критика з боку еміграції та дисидентів, які бачили в ранньому Гончарі талановитого прислужника режиму.
  - '[!myth-buster] Міф про «непохибного дисидента» не відповідає дійсності. Гончар був складною фігурою, що еволюціонувала,
    а його біографія — це історія повільного і болісного прозріння.'
  - Внутрішній конфлікт: як слава, здобута завдяки системі, пізніше дала йому платформу для боротьби з цією ж системою.
  section: 'Тінь: Ціна компромісу та «Прапороносці»'
  words: 900
- points:
  - Повернення до початкового парадоксу: чи дав нам аналіз біографії відповідь на питання, як лауреат премій став бунтарем?
  - '[!decolonization] Спадщина Гончара — це урок про те, як національна ідея може визрівати навіть у межах імперської системи.'
  - 'Актуальність «Собору» сьогодні: екологічні проблеми, боротьба за культурну ідентичність та захист історичної пам''яті
    в умовах війни.'
  - Гончар як символ «дипломатії опору» — чи можлива така стратегія сьогодні?
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The paradoxical career of Oles Honchar, from Stalin Prize winner to dissident author of the banned novel 'Sobor', and
  his role as a defender of Ukrainian culture within the Soviet system.
level: BIO
module: bio-130
objectives:
- Аналізувати життя та спадщину Олеся Гончара як комплексного письменника між системою та сумлінням
- Оцінювати культурне та історичне значення роману «Собор» як символу спротиву
- Простежити еволюцію митця від офіційного радянського автора до захисника української ідентичності
- Критично осмислювати поняття компромісу та опору в умовах тоталітарного режиму
