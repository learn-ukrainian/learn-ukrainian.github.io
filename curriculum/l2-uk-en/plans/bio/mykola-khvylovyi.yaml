content_outline:
- points:
  - 'Парадокс Хвильового: як палкий комуніст і учасник революції став автором гасла «Геть від Москви!» і символом інтелектуального
    опору радянській імперії?'
  - '[!biography] Микола Хвильовий (Фітільов) — центральна фігура Розстріляного відродження, чиє життя і смерть стали політичним
    маніфестом.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (1925-1928): Полеміка Хвильового з офіційною лінією партії. Його ідея «азійського ренесансу» (орієнтація на Схід
    у пошуку нового мистецтва) проти вульгарного «пролеткульту», а «психологічної Європи» — проти рабського копіювання Москви.'
  - 'Дебат 2 (після смерті): Радянська пропаганда таврує Хвильового як «фашиста» і «націоналіста». Сучасна Росія використовує
    його як приклад «невдячного українського сепаратизму». Деколоніальна оптика бачить у ньому пророка, що передбачив неминучість
    розриву з імперією.'
  - '[!epistemic-humility] Чи був Хвильовий справді «націоналістом»? Аналіз його текстів показує складнішу картину: він був
    націонал-комуністом, який вірив у можливість українського комунізму, незалежного від Москви.'
  - '[!decolonization] Гасло «Геть від Москви!» — це не географічний, а культурний імператив: позбутися комплексу меншовартості
    та творити власну, самодостатню культуру.'
  section: 'Конфліктна карта: Європа чи Москва?'
  words: 900
- points:
  - 'Соціальне походження: син вчителя з Харківщини. Раннє захоплення ідеями революції.'
  - 'Досвід Першої світової та Громадянської воєн: що перетворило юнака на переконаного більшовика і члена КП(б)У.'
  - 'Романтичний ідеалізм раннього періоду: віра в те, що революція принесе Україні національне і соціальне визволення.'
  - 'Входження в літературу: перші поетичні спроби, організація літературних гуртків. Чому література стала для нього полем
    битви?'
  section: 'Формування: Народження бунтаря (1893-1921)'
  words: 1000
- points:
  - 'Літературний тріумф: збірки «Сині етюди» та «Осінь», роман «Вальдшнепи». Новаторська імпресіоністична проза, що порвала
    з народницькою традицією.'
  - 'Організатор і лідер: створення та ідеологічне керівництво ВАПЛІТЕ (Вільної Академії Пролетарської Літератури), найвпливовішої
    літературної організації 1920-х.'
  - 'Ідеологічний маніфест: серія памфлетів «Камо грядеши?», «Думки проти течії», де було сформульовано гасло «Геть від Москви!»
    та концепцію орієнтації на «психологічну Європу».'
  - 'Первинні джерела: аналіз уривків з його публіцистики, де він доводить, що українська культура мусить перестати бути епігоном
    російської.'
  section: 'Діяльність: Азійський ренесанс і ВАПЛІТЕ (1921-1928)'
  words: 1300
- points:
  - '[!anti-hagiography] Ранній фанатизм: роль Хвильового як чекіста, його участь у «червоному терорі». Як поєднувалась віра
    в гуманізм і участь у репресіях?'
  - 'Трагедія ідеаліста: усвідомлення того, що революція, якій він служив, перетворюється на тоталітарну диктатуру, що нищить
    українську культуру.'
  - 'Злам і компроміс: тиск з боку партії, цькування, що призвели до «покаянного» листа, де він зрікався своїх поглядів. Чи
    був це тактичний хід чи реальна поразка?'
  - '[!myth-buster] Міф про те, що Хвильовий був «завжди проти» комунізму. Правда в тому, що він був комуністом, який намагався
    реформувати систему зсередини і зазнав поразки.'
  section: 'Тінь: Ілюзії та примусове каяття (1928-1933)'
  words: 900
- points:
  - 'Повернення до розминки: як і чому комуніст Хвильовий став ворогом імперії? Студент формулює відповідь, спираючись на
    знання про його ідейну еволюцію та конфлікт з режимом.'
  - 'Самогубство як останній памфлет: постріл 13 травня 1933 року як реакція на початок Голодомору та арешти інтелігенції.
    Передсмертний лист: «Хай живе комунізм!» — що він означав?'
  - '[!decolonization] Спадщина: заборона творів на десятиліття, реабілітація в 1980-х. Чому Хвильовий і його ідеї залишаються
    небезпечними для імперії навіть через 100 років?'
  - 'Сучасне значення: як Хвильовий надихає сучасну Україну в її боротьбі за остаточний розрив з російським світом.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Mykola Khvylovyi's ideological evolution from fervent communist to a proponent of "psychological Europe", his role
  in the 1925-28 Literary Discussion, the "Away from Moscow!" slogan, and his suicide as a political act against totalitarianism.
