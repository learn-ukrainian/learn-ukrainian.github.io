content_outline:
- points:
  - >-
    [!biography] Знайомство з Теодором Ромжею: єпископ Мукачівської греко-католицької
    єпархії, мученик та символ опору насильницькій радянізації.
  - >-
    Проблемне питання: чому єпископ Закарпаття став мішенню для найвищого керівництва
    радянських спецслужб?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження у багатодітній родині залізничника у Великому Бичкові.
    Навчання у Хусті та Римі.
  - >-
    Священничі свячення в Римі (1936) та пастирська праця в селах Березово й Нижній Бистрий.
  - >-
    Академічна діяльність: викладання філософії в Ужгородській семінарії з 1939 року.
    Єпископська хіротонія в Ужгороді (1944).
  section: 'Формування: Від Риму до Мукачева'
  words: 1000
- points:
  - >-
    Діяльність під тиском: пастирські візитації в умовах радянського наступу та
    повоєнної окупації Закарпаття.
  - >-
    Опір асиміляції: протидія планам радянської влади примусово перевести греко-католиків
    у підпорядкування Російської православної церкви.
  - >-
    [!decolonization] Відкидання радянського конструкту "возз'єднання" церков.
    Позиція Ромжі щодо соціальних пріоритетів: "Пора би, врешті, покінчити зі
    старою, дряхлою традицією".
  - >-
    Єпископське гасло: "Полюблю Тя, Господи, кріпосте моя" як духовний якір.
  section: 'Діяльність: Пастирська опіка Закарпаття'
  words: 1200
- points:
  - >-
    Механізм репресій: планування вбивства через неможливість сфабрикувати
    переконливе кримінальне звинувачення.
  - >-
    Спецоперація держбезпеки: інсценована автомобільна аварія під час
    пастирської поїздки (жовтень 1947).
  - >-
    Вбивство у лікарні: цілеспрямоване отруєння в мукачівській лікарні агентами держбезпеки.
  - >-
    [!epistemic-humility] Проблема датування: фіксація смерті 1 листопада за
    московським часом та традиція вшанування 31 жовтня за місцевим часом.
  section: 'Тінь: Замах і вбивство'
  words: 1600
- points:
  - >-
    Наслідки: знищення Мукачівської єпархії як легальної структури та її перехід у підпілля (1949).
  - >-
    Пам'ять: беатифікація Теодора Ромжі як мученика (2001). Церковний акт Папи Івана Павла II.
  - >-
    Сучасне значення: символ незламності та закарпатського церковного опору.
  section: 'Підсумок: Незламна кріпость Закарпаття'
