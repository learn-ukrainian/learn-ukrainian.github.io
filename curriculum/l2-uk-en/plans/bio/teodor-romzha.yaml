content_outline:
- points:
  - >-
    [!biography] Знайомство з Теодором Ромжею: єпископ Мукачівської греко-католицької
    єпархії, мученик та символ опору насильницькій радянізації.
  - >-
    Проблемне питання: як церковна довідка, академічна енциклопедія,
    ватиканський виклад і цитований мемуар по-різному атрибутують замах та
    вбивство єпископа?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та освіта: народження у багатодітній родині залізничника у Великому Бичкові.
    Навчання у Хусті та Римі.
  - >-
    Священничі свячення в Римі (1936) та пастирська праця в селах Березово й Нижній Бистрий.
  - >-
    Академічна діяльність: викладання філософії в Ужгородській семінарії з 1939 року.
    Єпископська хіротонія в Ужгороді (1944).
  section: 'Формування: Від Риму до Мукачева'
  words: 1000
- points:
  - >-
    Діяльність під тиском: пастирські візитації в умовах радянського наступу та
    повоєнної окупації Закарпаття.
  - >-
    Опір асиміляції: протидія планам радянської влади примусово перевести греко-католиків
    у підпорядкування Російської православної церкви.
  - >-
    [!decolonization] Відкидання радянського конструкту "возз'єднання" церков.
    За церковною довідкою (вторинна транскрипція листа до ректора Русікуму,
    не оригінал листа): "Пора би, врешті, покінчити зі старою, дряхлою
    традицією".
  - >-
    Єпископське гасло за церковною довідкою (вторинна транскрипція на [S1];
    первинного документа з гаслом в адоптованому наборі немає): "Полюблю Тя,
    Господи, кріпосте моя".
  section: 'Діяльність: Пастирська опіка Закарпаття'
  words: 1200
- points:
  - >-
    За церковною довідкою [S1], святкування Успіння Пресвятої Богородиці
    (83 тисячі прочан) стало «краплею, що переповнила чашу терпіння НКВС»;
    це джерельна кваліфікація, а не висновок курсу.
  - >-
    Замах 27 жовтня 1947 року: церковна довідка називає його заздалегідь
    спланованим НКВС, а ватиканський виклад — спробою радянської сторони
    вбити Ромжу; обидва формулювання зберігаються з атрибуцією.
  - >-
    Отруєння в лікарні: церковна довідка й ватиканський виклад подають сам
    факт; ампулу кураре та медсестру-агента називає лише мемуар Судоплатова,
    цитований церковною довідкою, а не архівна справа.
  - >-
    [!epistemic-humility] Проблема датування: [S1] подає отруєння 31 жовтня
    й пояснює дату смерті 1 листопада московським часом; [S3] подає смерть,
    а [S5] — отруєння 1 листопада. Конфлікт не згладжується.
  section: 'Тінь: Замах і вбивство'
  words: 1600
- points:
  - >-
    Наслідки: знищення Мукачівської єпархії як легальної структури та її перехід у підпілля (1949).
  - >-
    Пам'ять: беатифікація Теодора Ромжі як мученика (2001). Церковний акт Папи Івана Павла II.
  - >-
    Сучасне значення: символ незламності та закарпатського церковного опору.
  section: 'Підсумок: Незламна кріпость Закарпаття'
  words: 1000
focus: >-
  Теодор Ромжа як єпископ Мукачівської єпархії перед її примусовою ліквідацією,
