content_outline:
- points:
  - 'Провокація: як одна людина сторіччям тримала галицьку музичну школу — від австрійського Ярослава до радянського Львова?'
  - '[!biography] Знайомство з галицьким композитором, музикознавцем, фольклористом і педагогом: народжений 1879 року в Ярославі (Австро-Угорщина/Галичина), помер 1979 року у Львові (більшість українських джерел — 10 вересня; IEU — 12 вересня), похований на Личаківському цвинтарі.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (радянський лауреат): популярна рамка — довголіття, Шевченківська премія (1964) та монументальний «Кавказ».'
  - 'Позиція 2 (деколонізаційна): галицька українська професіоналізація й тяглість — лінія Лисенка, музикознавство НТШ, Вищий музичний інститут імені Лисенка, хорові товариства («Боян»), фольклорне редагування й учнівська лінія.'
  - '[!decolonization] Колоніальний ризик — це абсорбційна рамка: трактувати Людкевича як радянського композитора, чиї нагороди важливіші за його галицьку громадсько-музичну працю.'
  - '[!epistemic-humility] Проти нього не знайдено справи спецслужб — не вигадуємо історію мученика; розбіжність дати смерті зберігаємо в нотатках.'
  section: 'Конфліктна карта: Радянський лауреат чи галицький будівничий?'
  words: 900
- points:
  - Перша вчителька — мати, яка навчалася в Михайла Вербицького; філософський факультет Львівського університету (1901) з українською й класичною філологією.
  - 'Віденське навчання: студії в Александра Цемлінського, Германа Ґреденера й Ґвідо Адлера; докторат із музикознавства (1908).'
  - 'Фольклористична основа: розшифрував і зредагував понад 1500 пісень, записаних Осипом Роздольським на фонограф, для «Галицько-руських народних мелодій» (1906-1907).'
  - Це робить його містком між польовим збиранням, нотацією, музичною педагогікою та композиторським національним стилем.
  section: 'Формування: Ярослав, Відень і музикознавча основа'
  words: 1000
- points:
  - 'Шевченкові якорі: симфонія-кантата «Кавказ» (1902-1913) і кантата «Заповіт» (1934; редакція 1955), за яку він отримав Шевченківську державну премію (1964).'
  - 'Франкові якорі: «Вічний революціонер» (1898), симфонічні поеми «Каменярі» й «Мойсей», «Конкістадори».'
  - 'Інституції: Союз українських професійних музик, Музикознавча комісія НТШ, Вищий музичний інститут імені Лисенка / Львівська консерваторія, де він був професором.'
  - 'Учнівська лінія: серед названих у джерелах учнів — Мирослав Скорик, Стефанія Павлишин-Гриця, Леся Корній, Богдана Фільц.'
  section: 'Діяльність: Кавказ, Заповіт і галицькі інституції'
  words: 1300
- points:
  - '[!anti-hagiography] Це не репресивно-первинна біографія й не проста радянська відзнака: під час Першої світової його мобілізували до австрійської армії, і він провів близько чотирьох років у російському полоні.'
  - 'Захист колеги: 1941 року його заарештувало й потім звільнило гестапо; 1948 року він відмовився засудити Василя Барвінського після його радянського арешту; 1963 року підписав лист Брежнєву з проханням про звільнення й реабілітацію Барвінського.'
  - '[!epistemic-humility] Номера гестапівської, полонової чи НКВД/КДБ справи не знайдено; найнадійніше джерело для гестапо-арешту та хронології захисту Барвінського — ЕІУ.'
  - Радянські нагороди й посади видимі, але вони можуть згладити національно-культурну тяглість, яку він зберігав.
  section: 'Тінь: Полон, гестапо й захист Барвінського'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює, що це історія інституційної та громадсько-музичної тяглості під зміною влади, а не історія однієї влади.'
  - 'Текст і музика: у «Кавказі» й «Заповіті» звучить антиімперська Шевченкова пам''ять, але слова — Шевченкові, а не Людкевича; у «Вічному революціонері» слова Франкові.'
  - '[!decolonization] Галицька професіоналізація як українська дієвість: освіта, наука, хорові товариства й національно-культурне служіння разом.'
  - 'Порівняння: з Миколою Лисенком — щодо національної музичної школи; з Василем Барвінським — щодо колеги під радянською репресією.'
  section: 'Дискусія та підсумок: Тяглість під зміною влади'
  words: 700
focus: Stanislav Liudkevych (1879-1979) taught as a Galician Ukrainian composer, musicologist, folklorist, and civic music educator who built professional Ukrainian musical institutions in Lviv and sustained them across Austrian, Polish, Nazi, and Soviet rule; the frame is institutional and civic continuity rather than Soviet honoree or invented dissident martyr; the verified pressures (First World War Russian captivity, the 1941 Gestapo arrest and release, and the defense of Vasyl Barvinskyi) are kept honest with no fabricated NKVD case, and the death-date discrepancy (10 vs 12 September 1979) stays visible.
