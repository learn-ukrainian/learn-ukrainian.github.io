content_outline:
- points:
  - 'Парадокс: Мільйони американців щодня чули її голос у рекламі McDonald''s "You deserve a break today", але не знали ні
    її імені, ні її справжньої пристрасті — української пісні. Як анонімний голос корпоративної Америки став душею української
    діаспори?'
  - '[!biography] Провокаційне питання: Чи може комерційний успіх в одній культурі стати ключем до збереження іншої?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Її українські альбоми — це модернізація народної пісні чи її комерціалізація? Порівняння її гладких,
    професійних аранжувань із сирим звучанням автентичних народних хорів. Чи була вона "справжньою" народною співачкою?'
  - 'Дебат 2 (після смерті): Квітка Цісик — символ культурного опору та збереження ідентичності, чи історія успішної асиміляції
    української емігрантки в американське суспільство?'
  - '[!epistemic-humility] Визнання, що її "голлівудське" звучання зробило українську музику доступною для ширшої аудиторії,
    водночас викликаючи критику з боку пуристів.'
  - '[!decolonization] Її робота як акт культурної дипломатії в часи Холодної війни, що представляла українську культуру окремо
    від радянської.'
  section: 'Конфліктна карта: Автентичність чи асиміляція?'
  words: 900
- points:
  - Народження в таборі для переміщених осіб у Німеччині та раннє дитинство в українській громаді Нью-Йорка — світ Пласту,
    української школи та церкви.
  - 'Музична освіта: від скрипки у 5 років за наполяганням батька-скрипаля до оперного співу в Mannes School of Music. Як
    класична освіта сформувала її унікальний підхід до народної пісні.'
  - 'Перші кроки: як молода співачка з українським прізвищем намагалася пробитися на американську музичну сцену 1970-х.'
  section: 'Формування: Юність у двох світах'
  words: 1000
- points:
  - 'Комерційний успіх: Квітка стає однією з найзатребуваніших сесійних співачок Нью-Йорка. Голос Ford, McDonald''s, Coca-Cola.
    Робота з Квінсі Джонсом та іншими зірками. Це фінансувало її українську мрію.'
  - 'Українська душа: Історія створення двох альбомів — «Kvitka: Songs of Ukraine» (1980) та «Two Colors» (1989). Це був її
    особистий, сімейний проєкт, профінансований з власних коштів.'
  - Унікальні аранжування, створені її чоловіком Джеком Кортнером, — поєднання українського мелосу з джазовими та поп-гармоніями,
    що було і революційним, і суперечливим.
  section: 'Діяльність: Два голоси Квітки'
  words: 1300
- points:
  - '[!anti-hagiography] Квітка не була простою народною співачкою. Вона була високопрофесійною, дорогою комерційною вокалісткою,
    чия кар''єра була побудована на жорстких законах музичного бізнесу, а не лише на любові до мистецтва.'
  - '[!myth-buster] Міф про "невизнання" в США. Її українські альбоми не стали мейнстрімом, але й не мали такої мети. Це був
    нішевий продукт для конкретної аудиторії. Її "невдача" на масовому ринку — це реальність для будь-якої неангломовної музики
    в Америці.'
  - Моральні компроміси? Чи доводилося їй приховувати своє походження для кар'єри? Обговорення тиску на асиміляцію в американському
    шоу-бізнесі того часу.
  - 'Трагедія хвороби: боротьба з раком грудей, яка обірвала її кар''єру на піку та завадила записати третій, можливо, джазовий
    альбом.'
  section: 'Тінь: Ціна успіху та приховані реалії'
  words: 900
- points:
  - 'Повернення до розминки: Як голос, що продавав гамбургери, зміг стати символом національної ідентичності для мільйонів
    українців?'
  - 'Спадщина для діаспори: її альбоми стали "саундтреком" для кількох поколінь українських американців, допомагаючи їм зберегти
    зв''язок з культурою предків.'
  - 'Спадщина для України: феномен популярності Цісик в незалежній Україні. Як її "інший" погляд на українську пісню вплинув
    на сучасних музикантів.'
  - '[!decolonization] Квітка Цісик як символ "іншої" України — глобальної, успішної, сучасної, яка існувала поза межами радянського
    простору.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and legacy of Kvitka Cisyk, exploring her dual identity as a major American commercial singer and a passionate
  icon of Ukrainian music, and analyzing the impact of her two Ukrainian albums on diaspora identity and cultural preservation.
level: BIO
module: bio-153
objectives:
- Аналізувати життя та спадщину Квітки Цісик, її роль як голосу української діаспори
- Оцінювати внесок її двох українських альбомів у збереження та модернізацію української пісенної традиції
- Простежити, як її кар'єра в американській комерційній музиці вплинула на її українську творчість
- Критично аналізувати поняття "автентичності" у творчості митців діаспори
