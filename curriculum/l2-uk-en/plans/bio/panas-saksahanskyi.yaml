content_outline:
- points:
  - >-
    [!biography] Панас Саксаганський (Тобілевич): актор, режисер, драматург,
    перекладач, педагог і один із корифеїв українського професійного театру.
  - >-
    Провокаційне питання: чому історія театру потребує не лише "великих ролей",
    а й опису того, як актор працює над роллю перед виходом на сцену?
  section: Розминка
  words: 400
- points:
  - >-
    Родина Тобілевичів як неформальна академія української сцени: Карпенко-Карий,
    Садовський, Саксаганський і Марія Садовська-Барілотті в одній культурній мережі.
  - >-
    [!epistemic-humility] Дата народження має джерельні розбіжності; стабільний
    факт для учнів: 1859, Кам'яно-Костувате, тепер Миколаївська область.
  - >-
    Початок у трупах Старицького, Кропивницького і Садовського: школа корифеїв
    як простір дисципліни, гастролей, комічної точності й психологічного реалізму.
  section: 'Формування: Тобілевичівська сцена і корифейська школа'
  words: 1000
- points:
  - >-
    Власна трупа і довга організаційна праця: Саксаганський не лише виконував
    ролі, а керував репертуаром, акторською підготовкою і публічною присутністю театру.
  - >-
    Акторський метод: реалістично-психологічна гра, міміка, жест, пластика,
    комічна точність і попередня робота над роллю як предмет свідомої техніки.
  - >-
    Сигнатурні ролі: Копач у `Сто тисяч`, Голохвастий у `За двома зайцями`,
    Карась у `Запорожці за Дунаєм`, ролі з `Наталки Полтавки`.
  - >-
    Народний театр у Києві та пізні книжки `Моя праця над роллю`, `По шляху життя`,
    `Із минулого українського театру`: актор стає теоретиком власної професії.
  section: 'Діяльність: Роль, жест і школа актора'
  words: 1200
- points:
  - >-
    [!decolonization] Українська сцена працювала в імперському полі цензури,
    дозволів і репертуарних обмежень; історичні назви з `малоросійський` мають
    читатися як адміністративна мова імперії, не як наша нейтральна категорія.
  - >-
    [!anti-hagiography] Саксаганського легко звести до комічних побутових ролей,
    але це стирає його психологічну техніку, переклади Шиллера, Шекспіра й Гуцкова
    та роботу з європейським репертуаром українською.
  - >-
    Радянські звання й пізнє визнання — факт біографії, але не центр інтерпретації:
    головне питання модуля — як формувалася українська акторська школа під тиском.
  - >-
    [!myth-buster] "Побутовий театр" не означає провінційність: побутова деталь
    могла бути інструментом точної психології, мови, жесту і публічного самопізнання.
  section: 'Тінь: Побутовий ярлик і імперська рамка сцени'
  words: 1600
- points:
  - >-
    Повернення до питання методу: акторська професія стає видимою через словник
    ролі, міміки, жесту, амплуа, репетиції й дисципліни ансамблю.
  - >-
    Саксаганський у ланцюгу від корифеїв до театральної освіти XX століття:
    пам'ять про сцену переходить у книжки, педагогіку й інституції.
  - >-
    Сучасне значення: його біографія допомагає говорити про театр як працю,
    а не тільки натхнення, і про українську мову як мову професійної сцени.
  section: "Підсумок: Акторська техніка як культурна пам'ять"
  words: 1000
focus: >-
