content_outline:
- points:
  - 'Парадокс: Як історик, що критикує національні міфи, став одним з найвпливовіших голосів нації під час війни за існування?'
  - 'Провокація: Грицак стверджує, що історія не вчителька життя, а лише наглядачка. Якщо так, то навіщо вона потрібна?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Об''єктивність чи громадянська позиція? Чи може історик залишатись "над сутичкою", коли його країна воює?'
  - 'Дебат 2: Деконструкція міфів — інтелектуальна чесність чи "національна зрада"? Звинувачення у "ревізіонізмі" з боку націоналістичного
    табору.'
  - '[!epistemic-humility] Позиція Грицака: історик має говорити неприємну правду, навіть якщо вона підриває комфортні наративи.'
  - 'Глобальний контекст: українські дебати про історію як частина ширшої світової дискусії про "війни пам''яті".'
  section: 'Конфліктна карта: Обов''язок історика'
  words: 900
- points:
  - Народження у Львові (1960) — місті зі складною, багатошаровою пам'яттю.
  - 'Інтелектуальне середовище: вплив львівської гуманітарної традиції, семінари, самвидав у пізньорадянський час.'
  - 'Освіта та становлення: від Львівського університету до міжнародних стажувань. Як західна історіографія вплинула на його
    підхід.'
  - Формування світогляду в епоху "кінця історії" та розпаду СРСР.
  section: 'Формування: Львівський старт'
  words: 1000
- points:
  - 'Академічний внесок: дослідження української модернізації, біографія Івана Франка як magnum opus.'
  - 'Публічна історія: перехід від суто академічних текстів до колонок, лекцій, та виступів для широкої аудиторії.'
  - 'Інституційна розбудова: роль у створенні та розвитку Українського католицького університету (УКУ) як моделі нової освіти.'
  - Концепція "глобальної історії України" — спроба вирвати українське минуле з провінційності та російськоцентричних схем.
  section: 'Діяльність: Від кафедри до публічної площі'
  words: 1300
- points:
  - '[!anti-hagiography] Критика з боку колег: звинувачення у надмірному спрощенні, публіцистичності та відході від академічних
    стандартів.'
  - '[!myth-buster] Деконструкція власних поглядів: як повномасштабне вторгнення 2022 року змусило Грицака переосмислити свої
    довоєнні концепції, зокрема щодо "неминучості" розпаду Росії.'
  - 'Моральна неоднозначність: чи завжди критика національних міфів була доречною і чи не послаблювала вона суспільство перед
    обличчям зовнішньої загрози?'
  - 'Провал прогнозу: аналіз, чому деякі з його прогнозів щодо розвитку України та Росії не справдилися і що це говорить про
    межі історичного аналізу.'
  section: 'Тінь: Ціна ревізіонізму'
  words: 900
- points:
  - 'Повернення до парадоксу: як саме критика міфів допомогла сформувати стійкіший наратив для нації у стані війни?'
  - 'Значення для сучасності: Грицак як приклад "публічного інтелектуала" — роль, яку він виконує, та ризики, пов''язані з
    нею.'
  - '[!decolonization] Внесок у деколонізацію української історичної свідомості — відділення її від радянських та російсько-імперських
    наративів.'
  - 'Сучасна роль: аналіз його виступів та текстів під час повномасштабної війни. Як змінилася його риторика та головні меседжі?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Ярослав Грицак як публічний інтелектуал. Дебати про роль історика, критика національних міфів, та переосмислення минулого
  в контексті європейської історії та сучасної війни.
level: BIO
module: bio-158
objectives:
- Критично аналізувати роль та відповідальність публічного інтелектуала в суспільстві, що трансформується.
- Розрізняти поняття академічної та публічної історії, розуміти їхні цілі та методи.
- Формулювати власну позицію в дебатах про історичну пам'ять, національні міфи та об'єктивність історика.
- Застосовувати концептуальний апарат Грицака (модернізація, подолання минулого) для аналізу сучасних українських процесів.
