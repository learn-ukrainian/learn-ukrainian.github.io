content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Лавріненком (1905–1987): літературний критик і укладач антології.
    Провокаційне питання: чи може антологія відновити пам'ять про Розстріляне відродження?
  section: 'Розминка'
  words: 400
- points:
  - >-
    Народження 3 травня 1905 року; членство у «Плузі»; випуск Харківського ІНО
    1930 року.
  - >-
    Після ув'язнень і табору Лавріненко повернувся до літературно-критичної
    праці; еміграція до США відбулася 1950 року.
  section: 'Формування: Харків і Норильськ'
  words: 1000
- points:
  - >-
    Антологія 1959 року постала в контексті паризької «Культури» й поєднала
    поезію, прозу, драму та есеїстику з упорядницькими матеріалами.
  - >-
    Метод добору аналізується за структурою видання, рубрикацією та
    біографічними рамками, а не через цитату без точного сторінкового локатора.
  section: 'Діяльність: Антологія «Розстріляне відродження»'
  words: 1200
- points:
  - >-
    [!decolonization] Перший арешт наприкінці 1933 року здійснило ДПУ УСРР;
    Лавріненка звільнили в лютому 1934 року з обмеженням пересування. Другий
    арешт відбувся в січні 1935 року; 1936 року його засудили до п'яти років
    таборів, а 1939 року звільнили.
  - >-
    [!anti-hagiography] Назву «Розстріляне відродження» запропонував Єжи
    Ґедройць; упорядницька праця Лавріненка не робить його автором назви.
  - >-
    [!epistemic-humility] НІБУ датує дострокове звільнення 15 травня 1939 року,
    а ЕСУ подає ширшу формулу «влітку 1939»; джерельну розбіжність зберігаємо,
    не оголошуючи одну форму виправленням іншої.
  section: 'Тінь: Арешт і антологія'
  words: 1600
- points:
  - >-
    Смерть 14 грудня 1987 року у Нью-Йорку.
    Антологія як акт відновлення пам'яті про Розстріляне відродження.
  section: 'Підсумок: Назва покоління'
  words: 1000
focus: >-
  Юрій Лавріненко — жертва репресій і укладач антології «Розстріляне відродження».
level: BIO
module: bio-245
objectives:
- Аналізувати антологію «Розстріляне відродження».
- Розуміти механізм репресій проти покоління.
- Досліджувати роль Єжи Ґедройця у виборі назви антології.
- Оцінювати, як добір, структура й упорядницькі матеріали формують рамку антології.
