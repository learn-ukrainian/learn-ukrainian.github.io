content_outline:
- points:
  - 'Провокація: що відбувається з культурою, коли критикиня каже, що Франко — не кам''яний символ, а жива суперечлива модерна постать?'
  - '[!biography] Тамара Гундорова — українська літературознавиця, критикиня й публічна інтелектуалка, чия праця змінює мову розмови про модернізм, Чорнобиль, кітч, гендер і постколоніальну травму.'
  - '[!epistemic-humility] Це план про живу дослідницю: теперішні посади, міжнародні афіліації та нагороди потрібно перевіряти на момент побудови модуля.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Гундорова відкриває українську літературу як модерну, європейську й теоретично складну традицію, а не етнографічний додаток до імперських схем.'
  - 'Позиція 2: сильна теоретична рамка може ставати новою ортодоксією, якщо студенти повторюють терміни замість читати самі тексти.'
  - '[!decolonization] Її праця важлива не тому, що просто заперечує російський центр, а тому, що змушує бачити Україну як виробницю власних понять: модернізму, травми, кітчу, транзитності.'
  - '[!epistemic-humility] Розрізняємо постколоніальне, деколоніальне й феміністичне читання; не зводимо їх до одного гасла.'
  section: 'Конфліктна карта: Теоретикиня канону чи творчиня нового канону?'
  words: 900
- points:
  - 'Полтавське походження, навчання в Київському університеті й академічна кар''єра в українському літературознавстві пізнього СРСР та незалежної України.'
  - 'Пізньорадянський контекст: обмежений доступ до альтернативної теорії, цензуровані канони й інституційна інерція, у якій формувалась її дослідницька мова.'
  - 'Переорієнтація канону: ранній український модернізм, Ольга Кобилянська, Леся Українка й Іван Франко як простір не монументів, а конфліктів, тілесності, гендеру й стилю.'
  - 'Міжнародний контекст: Гарвард, Принстон, Торонто, Вільний український університет та інші майданчики як канали української суб''єктності, а не лише зовнішнього визнання.'
  section: 'Формування: Академічна школа після радянської тиші'
  words: 1000
- points:
  - '«ПроЯвлення слова» як ключ до раннього українського модернізму: культура не наздоганяє імперський центр, а розробляє власну модерність.'
  - '«Femina melancholica» й феміністична критика: гендер не додаткова тема, а спосіб побачити, як працюють канон, тіло, меланхолія й культурна влада.'
  - '«Франко - не Каменяр»: демонтуючи монумент, критикиня не знищує канон, а повертає класика до суперечностей і складності.'
  - '«Післячорнобильська бібліотека» та «Транзитна культура»: Чорнобиль, постмодерн, кітч і постколоніальна травма як мова для опису культури після тоталітаризму.'
  section: 'Діяльність: Модернізм, Чорнобиль і мова деколонізації'
  words: 1300
- points:
  - '[!anti-hagiography] Не перетворюємо Гундорову на остаточну інстанцію: її теоретичні моделі треба перевіряти на текстах, історичних контекстах і альтернативних прочитаннях.'
  - 'Ризик західнотеоретичної залежності: Саїд, Співак, постмодернізм і травматичні студії допомагають, але українська критика не є лише імпортом готових понять.'
  - 'Публічні інтерв''ю після 2014 і 2022 років читаємо як датовані інтелектуальні втручання, а не як нейтральну енциклопедію.'
  - '[!myth-buster] Міф про «абстрактну теоретикиню» спрощує її внесок: її метод змінює практичні питання курсу — кого читаємо, які назви вживаємо, чию травму бачимо.'
  section: 'Тінь: Межі теорії, живі ролі й небезпека нової ортодоксії'
  words: 900
- points:
  - 'Повернення до розминки: студент пояснює, чому фраза «Франко - не Каменяр» є не нападом на Франка, а вправою з відповідального читання канону.'
  - '[!decolonization] Гундорова показує деколонізацію як повільну працю з мовою, жанром, пам''яттю, інституціями й теорією, а не як просту заміну одного центру іншим.'
  - 'Порівняння: з Вірою Агєєвою — канон і фемінізм; з Оксаною Забужко — публічна інтелектуальна полеміка; з Оксаною Кісь — гендер і джерельна справедливість.'
  - 'Фінальна вправа: сформулювати одну сильну й одну проблемну сторону кожної рамки — постколоніальної, феміністичної, чорнобильської, кітчевої.'
  section: 'Дискусія та підсумок: Як критика змінює карту культури'
  words: 700
focus: Тамара Гундорова як жива українська літературознавиця й публічна інтелектуалка, чия праця про модернізм, Чорнобиль, кітч, гендер і постколоніальну травму допомагає деколонізувати канон і водночас потребує джерельних застережень, перевірки меж теорії та антиагіографічного обговорення.
