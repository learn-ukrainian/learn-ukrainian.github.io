content_outline:
- points:
  - >-
    [!biography] Федір Кричевський: живописець, педагог, брат Василя
    Кричевського, один із засновників і перший ректор Української академії мистецтв.
  - >-
    Провокаційне питання: як автор модерністського триптиха `Життя` опинився
    після війни без статусу, житла і свободи повернутися до нормальної праці?
  section: Розминка
  words: 400
- points:
  - >-
    Лебедин, Ворожба, Міжріч і ранній досвід рисунку, моделювання та народної
    матеріальної культури; родина Кричевських як візуальна династія.
  - >-
    Московська школа живопису, скульптури й архітектури, Петербурзька академія,
    `Наречена` 1910 року і європейська подорож як професійний старт.
  - >-
    [!epistemic-humility] Дата народження має джерельну розбіжність: основний
    навчальний варіант 22 травня 1879, але ЕСУ фіксує альтернативу 1880 року.
  section: 'Формування: Від Лебедина до академічного визнання'
  words: 1000
- points:
  - >-
    Директор Київського художнього училища і засновник Української академії
    мистецтв 1917 року: Кричевський як педагог та адміністратор української художньої школи.
  - >-
    `Життя` (1925-1927): триптих `Любов`, `Родина`, `Повернення` як центральний
    об'єкт для аналізу монументальності, ритму, костюму, війни й родинної пам'яті.
  - >-
    Венеційська бієнале 1928 року і міжнародне визнання: український модернізм
    входить у європейський контекст не як провінційна імітація.
  - >-
    Учні й школа: Петрицький, Яблонська та інші; викладання в Києві й Харкові,
    портрети, шевченківська `Катерина`, темпера і монументальна композиція.
  section: 'Діяльність: Академія, триптих і монументальна школа'
  words: 1200
- points:
  - >-
    [!anti-hagiography] У 1930-х радянська система звужувала творчу свободу:
    соцреалізм, "вульгарний соціологізм" і замовлення на колективізовані сюжети
    не скасовують його майстерності, але показують тиск на художника.
  - >-
    Війна і поствоєнна підозра: переміщення на захід, арешт СМЕРШ після
    Кенігсберга, повторний київський арешт, допити, хвороба і звільнення без відновлення становища.
  - >-
    Ірпінь під контролем спецслужб: втрата звань, житла, київського середовища
    і нормальної підтримки; голод і виснаження як фінальний механізм тиску.
  - >-
    [!myth-buster] Не вигадуємо номер справи чи формальну реабілітацію: досьє
    має ЕІУ/IEU-опору для арешту й контролю, але не архівний документ судової справи.
  section: 'Тінь: СМЕРШ, втрата статусу і голодний Ірпінь'
  words: 1600
- points:
  - >-
    Об'єктне читання `Життя`: спершу описати панелі, пози, порожній простір,
    костюм і колір, а вже потім переходити до біографічної інтерпретації.
  - >-
    Кричевський як міст між УНР-академією, українізацією, модернізмом і
    повоєнним радянським контролем; його біографія не вкладається в один ярлик.
  - >-
    Сучасне значення: повернення Кричевського як першого ректора й автора
    `Життя` протидіє радянському зведенню митця до пізніх ідеологічних робіт.
  section: 'Підсумок: Життя, що пережило контроль'
  words: 1000
focus: >-
