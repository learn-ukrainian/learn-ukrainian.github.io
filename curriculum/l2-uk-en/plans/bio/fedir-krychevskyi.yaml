objectives:
- Аналізувати `Життя` як центральний твір українського модернізму через композицію, триптих і монументальність.
- Пояснювати роль Федора Кричевського в Українській академії мистецтв і педагогічній традиції.
- Критично описувати радянський тиск, СМЕРШ-арешт і пізній контроль без вигаданих архівних деталей.
- Оцінювати компромісні соцреалістичні роботи в контексті примусу, не зводячи до них усю біографію.
