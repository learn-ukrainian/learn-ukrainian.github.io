content_outline:
- points:
  - 'Парадокс: Як художниця-самоук із села Болотня, яку радянська влада вважала безпечною «народною» мисткинею, стала одним
    із найпотужніших символів українського опору російській агресії у XXI столітті?'
  - 'Провокація: Пабло Пікассо захоплювався її роботами. Чи справді її мистецтво «наївне», чи це складний візуальний код,
    який ми тільки вчимося читати?'
  - '[!biography]'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Наївне мистецтво» vs «професійний примітивізм». Чи була Примаченко просто талановитою селянкою (радянська версія),
    чи свідомо розробила унікальну художню систему, що лише імітувала наївність?'
  - 'Дебат 2: Привласнення спадщини. Радянський Союз бачив у ній безпечний, етнографічний сувенір. Сучасна Україна — символ
    нескореності та національної ідентичності. Як один і той самий художник може слугувати таким різним ідеологіям?'
  - '[!epistemic-humility] Визнання, що термін "наївне мистецтво" сам по собі є проблематичним конструктом мистецтвознавців,
    а не самовизначенням художниці.'
  - '[!decolonization] Розвінчання радянського міфу про «аполітичність» народної творчості.'
  section: 'Конфліктна карта: Народна ікона чи професійний митець?'
  words: 900
- points:
  - 'Дитинство та поліомієліт: як фізична недуга та ізоляція стали каталізатором для створення фантастичного внутрішнього
    світу.'
  - 'Перші кроки: від малюнків на піску до вишивки та розпису печі. Мати як перша вчителька та носійка традиції.'
  - 'Формативний досвід: Неможливість жити "як усі" змусила її створити власний всесвіт, де вона була всемогутньою.'
  - 'Самонавчання не як недолік, а як перевага: свобода від академічних канонів дозволила зберегти унікальне бачення.'
  section: 'Формування: Біль, колір і самотність у Болотні'
  words: 1000
- points:
  - 'Київські майстерні (1936): перехід від локального до професійного визнання. Роль Тетяни Флору у "відкритті" таланту.'
  - 'Міжнародний тріумф: золота медаль на Всесвітній виставці в Парижі 1937 року. Її роботи бачить світ, але вона — ні.'
  - 'Розквіт творчості (1960-1980-ті): створення фірмових "диво-звірів", квіткових та сюжетних циклів. Аналіз ключових образів
    та їх символіки.'
  - 'Антивоєнна серія: «Атомна війна, будь проклята!». Потужне політичне висловлювання мовою алегорії. Пікассо: «Я схиляюся
    перед цим дивом».'
  section: 'Діяльність: Від Парижа до антивоєнних циклів'
  words: 1300
- points:
  - '[!anti-hagiography] Як система використовувала її: Примаченко як "вітрина" успішної національної політики СРСР, за якою
    ховалися репресії та русифікація.'
  - 'Трагедія особистого життя: загибель коханого на війні, виховання сина-одинака. Як ця темрява просочується у найяскравіші
    роботи?'
  - 'Моральні компроміси: чи можна було творити в радянській системі, не йдучи на компроміси? Розгляд її "офіційних" робіт
    на замовлення.'
  - '[!myth-buster] Міф про "безтурботну бабусю з квіточками". Примаченко була складною особистістю, яка гостро відчувала
    несправедливість і творила потужні, тривожні образи.'
  section: 'Тінь: Ціна слави та радянський глянець'
  words: 900
- points:
  - 'Повернення до розминки: Чому саме Примаченко? Студент формулює відповідь, чому її мистецтво виявилося таким резонансним
    у XXI столітті.'
  - 'Знищений музей в Іванкові (2022): акт вандалізму, що перетворив її на світовий символ українського культурного спротиву.'
  - '[!decolonization] Її спадщина як інструмент деколонізації свідомості — повернення до автентичних, глибинних кодів української
    культури.'
  - 'Сучасне значення: Примаченко сьогодні — це не просто художниця, а маркер національної ідентичності та доказ життєздатності
    української культури.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Марія Примаченко: від "наївної" художниці до світового символу українського спротиву. Аналіз її унікального стилю,
  антивоєнних мотивів та спадщини, що пережила вогонь.'
