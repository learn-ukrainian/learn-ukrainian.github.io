objectives:
- Аналізувати життєвий шлях та творчу спадщину Марії Примаченко в історичному та культурному контекстах
- Критично оцінювати її внесок, розрізняючи поняття «наївного мистецтва» та «професійного примітивізму»
- Простежити, як її мистецтво було інструменталізовано радянською пропагандою та як воно перетворилося на символ українського
  культурного спротиву
- Формулювати аргументовану позицію щодо ролі митця в умовах ідеологічного тиску та війни
