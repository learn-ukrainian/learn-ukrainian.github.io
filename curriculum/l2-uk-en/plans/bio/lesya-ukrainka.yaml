objectives:
- Аналізувати еволюцію творчості Лесі Українки від лірики до драматургії світового рівня
- Оцінювати антиколоніальний та феміністичний дискурси в її головних драматичних поемах
- Дискутувати про вплив її фізичної боротьби на її творчу незламність
- Критично розрізняти канонічний образ мисткині та її реальну біографію
