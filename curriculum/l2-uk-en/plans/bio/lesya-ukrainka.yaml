content_outline:
- points:
  - '[!biography] Парадокс Лесі Українки: як тендітна, прикута до ліжка жінка стала найпотужнішим інтелектуальним воїном української
    літератури, чий «чоловічий» розум і сила духу лякали імперію?'
  - 'Провокація: Чи справді ми знаємо Лесю, чи лише її відредагований радянською пропагандою образ «доньки Прометея»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська канонізація vs сучасні прочитання. Образ безстатевої «святої», борчині за народне щастя, проти образу
    модерної європейської інтелектуалки, феміністки та індивідуалістки.'
  - 'Дебат 2: Тіло і дух. Як хвороба та фізичні страждання вплинули на її творчість — як на джерело сили чи як на трагічне
    обмеження? Дискусія про «патографію» митця.'
  - '[!epistemic-humility] Визнання, що повний образ Лесі Українки лежить на перетині цих інтерпретацій, і жодна з них не
    є вичерпною.'
  - '[!decolonization] Як радянська система «привласнила» Лесю, зробивши її інтернаціоналісткою і приглушивши її антиімперський
    та національний голос.'
  section: 'Конфліктна карта: Ікона чи жива людина?'
  words: 900
- points:
  - 'Родина як інтелектуальний інкубатор: мати Олена Пчілка — письменниця і видавчиня; батько Петро Косач — юрист і меценат.'
  - 'Духовний наставник: дядько Михайло Драгоманов, європейський соціаліст та ідеолог українського руху, який формував її
    політичні та філософські погляди через листування.'
  - 'Освіта вдома: замість гімназії — сувора програма, яка включала 10 іноземних мов, історію, філософію. Це створило унікальну,
    нетипову для жінки того часу ерудицію.'
  - 'Ранній талант і перші кроки: від дитячих віршів до серйозних перекладів світової класики (Гайне, Гомер).'
  section: 'Формування: Світ Косачів-Драгоманових'
  words: 1000
- points:
  - 'Перехід від лірики до драми: усвідомлення, що драматична поема дає змогу вести філософський діалог та ставити гострі
    суспільні питання.'
  - 'Антиколоніальний дискурс: твори «Кассандра», «Вавилонський полон», «Оргія» як алегорії української ситуації в Російській
    імперії. Боротьба поневоленої нації за власну ідентичність.'
  - 'Феміністичний бунт: створення сильних, трагічних жіночих образів (Кассандра, Мавка, Міріам), які кидають виклик патріархальному
    світу і борються за право на власний вибір.'
  - 'Вершина творчості — «Лісова пісня»: драма-феєрія як синтез фольклору, символізму та неоромантизму. Конфлікт між світом
    природи (свобода) і світом людей (обмеження).'
  section: 'Діяльність: Народження драматургії'
  words: 1300
- points:
  - '[!anti-hagiography] Постійний фізичний біль: туберкульоз кісток, який супроводжував її з 13 років. Це не просто «хвороба»,
    а щоденна реальність болю, операцій, виснажливого лікування.'
  - 'Трагедія Сергія Мержинського: любов до вмираючого друга, біля ліжка якого за одну ніч вона пише драму «Одержима». Самопожертва
    на межі самознищення.'
  - '[!myth-buster] Леся Українка не була абстрактною «музою». Вона була живою жінкою зі складним особистим життям, фінансовими
    труднощами, моментами відчаю, про які свідчать її приватні листи.'
  - 'Критика сучасників: не всі сприймали її «занадто інтелектуальну» і «нежіночу» творчість. Звинувачення у відриві від народу.'
  section: 'Тінь: Ціна незламності'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь на парадокс її життя, використовуючи знання про її
    боротьбу, ідеї та контекст.'
  - 'Оцінка спадщини: Леся Українка не просто поетеса, а творець української інтелектуальної драми, яка вивела українську
    літературу на європейський рівень.'
  - '[!decolonization] Деконструкція образу: чому важливо бачити в ній не бронзову ікону, а складну, живу особистість, щоб
    по-справжньому зрозуміти її внесок?'
  - 'Актуальність сьогодні: як її ідеї про колоніалізм, свободу особистості та роль митця резонують у сучасній Україні, що
    веде війну за незалежність.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Lesya Ukrainka's transformation from poet to world-class dramatist, the anti-colonial and feminist discourses in her
  work, and the concept of creative indomitability in the face of physical suffering and imperial oppression.
