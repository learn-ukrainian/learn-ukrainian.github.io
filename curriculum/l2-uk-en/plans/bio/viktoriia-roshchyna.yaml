  Журналістська праця Вікторії Рощиної, її первинне свідчення про неволю
  2022 року та джерельно обмежена хронологія затримання 2023 року, переміщень,
  повідомлення про смерть, репатріації, ідентифікації й подальших розслідувань.
content_outline:
  - section: Хронологія повідомлень і межі встановленого
    words: 5200
    points:
      - Відокремлення авторського свідчення 2022 року від пізніших реконструкцій.
      - Послідовність російського підтвердження утримання, повідомлення про смерть, повернення тіла й ідентифікації.
      - Відмова від непідтвердженої безпосередньої причини смерті або остаточно встановленої повної траєкторії неволі.
word_target: 5200
