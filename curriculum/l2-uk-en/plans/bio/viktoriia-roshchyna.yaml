objectives:
- >-
  Аналізувати репортажі Вікторії Рощиної як важливе джерело свідчень про життя
  та спротив на окупованих Росією територіях.
- Розуміти феномен "примусового зникнення" (enforced disappearance) та його використання як зброї терору.
- Досліджувати методи російської окупаційної та пенітенціарної системи у переслідуванні медійників та цивільних.
- Оцінювати роль міжнародних правозахисних організацій та незалежних ЗМІ у встановленні правди про долі полонених.
