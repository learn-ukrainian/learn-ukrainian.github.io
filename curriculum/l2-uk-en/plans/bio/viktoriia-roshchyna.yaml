content_outline:
- points:
  - >-
    [!biography] Знайомство з Вікторією Рощиною (1996–2024): українська фронтова
    журналістка, авторка розслідувань про окупацію.
  - >-
    Провокаційне питання: чому російська окупаційна система найбільше боїться тих,
    хто фіксує імена цивільних і маршрути евакуації?
  section: Розминка
  words: 400
- points:
  - >-
    Професійний шлях: робота з Hromadske, "Українською правдою", "Радіо Свобода".
    Спеціалізація на фронтових репортажах та темі окупованих територій.
  - >-
    [!decolonization] Протидія російській цензурі через фіксацію правди: репортажі з
    Харківщини під обстрілами та дослідження життя на окупованих землях Запоріжжя.
  - >-
    Міжнародне визнання: лауреатка премії "Мужність у журналістиці" від IWMF.
  section: 'Формування: Фронтова і розслідувальна журналістика'
  words: 1000
- points:
  - >-
    Березень 2022 року: перше затримання ФСБ та військовими РФ під час поїздки до Маріуполя.
  - >-
    Текст "Тиждень у полоні окупантів": свідоцтво Вікторії про методи тиску, допитів
    та спроби змусити її записати пропагандистське відео ("Я наголосила, що нічого не буду вигадувати").
  - >-
    Ризик як усвідомлений вибір: повернення до репортажів з окупованих територій
    після звільнення. Серпень 2023 року — поїздка, з якої журналістка не повернулася.
  section: 'Діяльність: Журналістика на окупованих територіях'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Вікторія не "загинула на війні", її було цілеспрямовано схоплено,
    катовано і вбито в системі російських в'язниць.
  - >-
    Механізм примусового зникнення: мовчання влади РФ, етапні переведення, перебування
    в Таганрозі та СІЗО-3 в Кізелі (Пермський край).
  - >-
    Розслідування: матеріали українських (Слідство.Інфо, Суспільне) та міжнародних
    (RSF, Human Rights Watch) журналістів і правозахисників щодо умов її утримання.
  - >-
    [!epistemic-humility] Точна медична причина смерті 19 вересня 2024 року залишається
    невстановленою через російське приховування доказів, але провина тюремної системи є беззаперечною.
  section: 'Тінь: Викрадення, СІЗО та загибель'
  words: 1600
- points:
  - >-
    Спадщина Вікторії Рощиної: її тексти як джерело свідчень про злочини російської
    окупації (фільтрація, евакуація, терор цивільних).
  - >-
    Етичний вимір розслідування смерті: складність і необхідність встановлення
    правди, коли документація контролюється агресором.
  - >-
    Рощина як символ ціни свободи преси та загрози для журналістів під російською окупацією.
  section: 'Підсумок: Ціна документації правди'
  words: 1000
focus: >-
  Вікторія Рощина як фронтова журналістка, яка цілеспрямовано документувала життя на окупованих
  територіях, її примусове зникнення та трагічна загибель у російському полоні внаслідок катувань.
level: BIO
