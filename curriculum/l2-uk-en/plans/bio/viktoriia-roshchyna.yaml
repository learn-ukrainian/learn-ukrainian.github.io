objectives:
  - Будувати хронологію за датами публікацій і називати орган, редакцію або свідка кожного твердження.
  - Розрізняти репатріацію, попереднє зіставлення ДНК, остаточну ідентифікацію та встановлення причини смерті.
  - Не перетворювати прокурорську підозру або журналістську реконструкцію на вирок.
