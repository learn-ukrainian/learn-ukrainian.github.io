content_outline:
- points:
  - 'Провокація: Як письменник-народник, що присвятив життя «живій мові» простого люду, створив найсуворіший інструмент її
    фіксації — академічний словник? Чи не вбиває кодифікація ту саму мову, яку прагне зберегти?'
  - '[!biography] Борис Грінченко — центральна фігура українського культурного відродження, чия праця визначила вектор розвитку
    літературної мови на століття вперед.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): Грінченко — дескриптивіст чи прескриптивіст? Він просто фіксував мову, як вона є, чи нав''язував
    один «правильний» варіант (наддніпрянський), ігноруючи галицькі та інші діалекти?'
  - 'Дебат 2 (спадщина): Радянська критика бачила в ньому «буржуазного націоналіста», чия праця була «ідеологічно шкідливою».
    Сучасна українська історіографія — «батька нації», що заклав основи мовної незалежності.'
  - '[!epistemic-humility] Визнання, що обидві ролі — і фіксатора, і стандартизатора — були неминучими. Його вибір діалектної
    основи був і науковим, і політичним рішенням.'
  - '[!decolonization] «Словник української мови» як акт культурного суверенітету в умовах політики русифікації. Це була не
    просто книга, а політична декларація.'
  section: 'Конфліктна карта: Словник — дзеркало чи закон?'
  words: 900
- points:
  - Ранні роки на Харківщині та раннє захоплення «мужицькою» мовою, що йшло всупереч дворянському вихованню.
  - Вчителювання в сільських школах як головний формативний досвід. Безпосередній контакт з народною мовою та гостра потреба
    в навчальних матеріалах.
  - Створення перших підручників та «народних» книжок українською — практична відповідь на освітню кризу.
  - Постійні конфлікти з царською адміністрацією через «мазепинську» діяльність, що лише зміцнили його переконання в необхідності
    системної праці.
  section: 'Формування: Народний просвітитель'
  words: 1000
- points:
  - 'Історія створення словника: від ідеї до чотирьох томів. Робота, що тривала десятиліттями.'
  - 'Методологія: збір матеріалів з фольклору, літератури, живого мовлення. Роль дружини Марії Загірної та інших співробітників.'
  - 'Структура словника: 68 000 реєстрових слів, тлумачення, приклади, етимологія. Масштаб, безпрецедентний для того часу.'
  - 'Літературна творчість (оповідання, драми) як лабораторія для словникарської праці: Грінченко-письменник збирав матеріал
    для Грінченка-лексикографа.'
  section: 'Діяльність: Opus Magnum — Словник української мови'
  words: 1300
- points:
  - '[!anti-hagiography] Акт кодифікації — це акт влади. Включаючи одні слова та діалекти, Грінченко неминуче виключав інші,
    маргіналізуючи їх. «Галицьке питання» в його словнику.'
  - 'Особиста трагедія: надлюдська праця над словником підірвала здоров''я і, за свідченнями, призвела до відчуження в родині.
    Ціна, яку заплатили його близькі за цей magnum opus.'
  - '[!myth-buster] Міф про «всеохопний» словник. Він був вибірковим, відображав ідеологічні та естетичні погляди свого автора,
    зокрема його народницькі ідеали.'
  - Компроміси з видавцями та цензурою. Що не увійшло до словника і чому? Які слова вважалися «непристойними» або «політично
    небезпечними»?
  section: 'Тінь: Ціна кодифікації'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Грінченко — народником чи академістом? Студент має сформулювати відповідь, що Грінченко
    був трагічною фігурою, яка намагалася примирити ці дві несумісні ролі.'
  - 'Спадщина словника: він став фундаментом для подальшої української лексикографії, але водночас і «золотою кліткою», авторитет
    якої було важко оскаржити.'
  - '[!decolonization] Як «Словник Грінченка» став інструментом опору в радянські часи і залишається ним сьогодні в боротьбі
    з русизмами та мовними покручами.'
  - 'Його спадщина сьогодні — не лише в словнику, а й у питанні, яке він поставив: як зберегти багатство мови, не вбивши її
    живої душі стандартизами?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Borys Hrinchenko, focusing on his dual role as a populist writer and the lexicographer who created
  the first complete Ukrainian dictionary, exploring the tension between describing folk language and codifying a literary
  standard.
level: BIO
module: bio-056
objectives:
- Аналізувати парадокс Грінченка як письменника-народника та елітарного кодифікатора мови
- Оцінювати значення «Словника української мови» як інструменту стандартизації та водночас як джерела мовних конфліктів
- Визначати «тіньові» аспекти лексикографічної роботи: виключення діалектів, особисті жертви, політичні компроміси
- Формулювати аргументовану позицію щодо ролі історичних словників у цифрову епоху
