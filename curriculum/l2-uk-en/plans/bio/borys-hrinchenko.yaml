content_outline:
- points:
  - 'Провокація: Як письменник-народник, що присвятив життя «живій мові» простого люду, створив найсуворіший інструмент її фіксації — академічний словник? Чи не вбиває кодифікація ту саму мову, яку прагне зберегти?'
  - '[!biography] Борис Грінченко — письменник, педагог, лексикограф і громадський діяч, який упорядкував із додатком власних матеріалів чотиритомний «Словарь української мови».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): Грінченко фіксував живу мову й водночас впливав на літературну норму. Як поєдналися ці ролі в перекладному українсько-російському словнику?'
  - 'Дебат 2 (мовна дискусія): у 1891 році він заперечував надмірне проникнення західноукраїнських елементів, але згодом пом''якшив позицію. Як читати цю зміну без міфу про «ігнорування діалектів»?'
  - '[!epistemic-humility] Словник охоплював літературну мову, фольклор і більшість українських діалектів, але нерівномірність опрацювання говорів та обмеження реєстру залишалися предметом критики.'
  - '[!decolonization] Розглядати словник як інституційну працю української громади за імперських мовних обмежень, не приписуючи виданню недокументованої політичної програми.'
  section: 'Конфліктна карта: Словник — дзеркало чи закон?'
  words: 900
- points:
  - Ранні роки на Харківщині та раннє захоплення «мужицькою» мовою, що йшло всупереч дворянському вихованню.
  - Вчителювання в сільських школах як головний формативний досвід. Безпосередній контакт з народною мовою та гостра потреба в навчальних матеріалах.
  - Створення перших підручників та «народних» книжок українською — практична відповідь на освітню кризу.
  - Арешт 1879 року за поширення забороненої літератури, виключення з реального училища та подальша праця в умовах імперських обмежень українського друку й освіти.
  section: 'Формування: Народний просвітитель'
  words: 1000
- points:
  - >-
    Історія створення словника: матеріали збирали від 1861 року; у 1902 році
    їх передали Грінченкові, який разом із Марією Загірньою виконав основну
    редакторську роботу; чотири томи вийшли у 1907–1909 роках.
  - 'Методологія: збір матеріалів з фольклору, літератури, живого мовлення. Роль дружини Марії Загірної та інших співробітників.'
  - 'Структура словника: близько 68 000 українських реєстрових слів із російськими відповідниками або, рідше, описовими поясненнями; більшість значень має українські ілюстративні приклади, широко подано фразеологію.'
  - 'Джерельна база: матеріали редакції «Киевской старины», художня література, фольклор, попередні словники та власні діалектні й етнографічні записи Грінченка.'
  section: 'Діяльність: Opus Magnum — Словник української мови'
  words: 1300
- points:
  - '[!anti-hagiography] Словник не був ані одноосібним винаходом, ані повним описом мови: Грінченко редагував багаторічний колективний доробок і суттєво доповнив його власними матеріалами.'
  - 'Документовані межі: нерівномірне опрацювання говорів, неповне використання частини джерел, слабке представлення науково-технічної та іншомовної лексики.'
  - '[!myth-buster] Розрізнення двох тверджень: словник мав великий вплив на літературну мову й правопис, але не «завершив» формування норми та не усунув подальших лексикографічних потреб.'
  - 'Людська ціна без вигадки про родинне відчуження: напружена праця відбувалася на тлі туберкульозу, а смерть доньки Насті 1908 року й онука 1909 року різко погіршила стан Грінченка.'
  section: 'Тінь: Ціна кодифікації'
  words: 900
- points:
  - 'Повернення до розминки: як у Грінченкові співіснували народний учитель, письменник, громадський організатор і редактор великої лексикографічної праці?'
  - 'Спадщина словника: найповніше українське лексикографічне зібрання свого типу на початку ХХ століття, важливе для історії мови, але обмежене джерельною базою й добою створення.'
  - '[!decolonization] Порівняння первинного твердження Грінченка про самостійність української літератури з імперськими мовними обмеженнями та пізнішими радянськими ідеологічними оцінками.'
  - 'Сучасне питання: як користуватися історичним словником як джерелом, не перетворюючи його на незмінний кодекс сучасної норми?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life and work of Borys Hrinchenko, focusing on his dual role as a populist writer and the lexicographer who created the first complete Ukrainian dictionary, exploring the tension between describing folk language and codifying a literary standard.
level: BIO
module: bio-078
objectives:
- Аналізувати парадокс Грінченка як письменника-народника та елітарного кодифікатора мови
- Оцінювати значення «Словника української мови» як інструменту стандартизації та водночас як джерела мовних конфліктів
- Визначати «тіньові» аспекти лексикографічної роботи: виключення діалектів, особисті жертви, політичні компроміси
- Формулювати аргументовану позицію щодо ролі історичних словників у цифрову епоху
pedagogy: CBI
