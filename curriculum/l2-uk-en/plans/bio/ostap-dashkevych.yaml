objectives:
- Відрізняти історично засвідченого черкаського й канівського старосту від пізнішого міфу про «першого козацького гетьмана» та засновника Січі.
- 'Пояснювати геополітику українського прикордоння Великого князівства Литовського на початку XVI ст.: Дике Поле, Кримське ханство, османський тиск і хронічне безгрошів''я центру.'
- Оцінювати неоднозначні дії Дашковича — тимчасову службу Москві, участь у походах з кримськотатарськими союзниками, місцевий примус над міщанами — без модерних ярликів зради.
- 'Читати ранньомодерні джерела критично: розрізняти те, що засвідчують документи, що додала пізніша традиція, і що може стверджувати відповідальний підручник.'
