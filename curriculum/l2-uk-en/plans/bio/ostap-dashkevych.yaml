content_outline:
- points:
  - 'Парадокс: як литовський прикордонний урядник, що служив Великому князівству Литовському, побував на московській службі й вів кримську дипломатію, став у пам''яті «першим козацьким гетьманом» і «засновником Січі» — хоча джерела не стверджують ні того, ні того?'
  - '[!biography] Представлення постаті через розрив між документально засвідченим старостою та пізнішим козацьким міфом.'
  section: Розминка
  words: 400
- points:
  - 'Перша інтерпретація: «перший гетьман» і «засновник Січі» романтичної історіографії XIX ст. — проти обережних енциклопедій: ЕІУ наголошує, що стосунки Дашковича з козаками були неофіційними, а сам він — насамперед військова й державна постать литовської доби; IEU прямо каже, що першим гетьманом його вважають традиційно, але помилково.'
  - 'Друга інтерпретація: оборонець, ватажок набігів чи знаряддя державного примусу? Дашкович боронив Черкаси й Канів, спрямовував козацькі загони, ходив у походи проти московських земель у союзі з кримцями і водночас застосовував примусову урядову владу над містянами.'
  - '[!epistemic-humility] Рік народження невідомий (IEU подає близько 1455, ЕІУ — невідомо); власних текстів Дашковича не збереглося; навіть форма прізвища відкрита — джерелознавчо точніше «Дашкович», а звичне «Дашкевич» іде від пізнішої традиції.'
  - '[!decolonization] Розгляд його дій поза російською імперською та радянською рамкою «зрадник або бандит»; центр ваги — Черкаси, Канів і низ Дніпра, а не королівський двір.'
  section: 'Конфліктна карта: Засновник Січі чи прикордонний урядник?'
  words: 900
- points:
  - Походження з землевласницько-боярського середовища Київщини та Овруцького краю у Великому князівстві Литовському — що означало служити на південному кордоні на початку XVI століття.
  - 'Дике Поле як соціальний і геополітичний простір: постійна загроза з боку Кримського ханства та османського прикордоння, степові шляхи, дніпровські переправи та хронічне безгрошів''я центру.'
  - 1501 — похід як крем'янецько-кричевський урядник проти московських сил під Мстиславлем; 1503–1507 — перехід на московську службу після конфлікту й полону, причетність до повстання Глинських і повернення на литовський бік близько 1507. Це рання ранньомодерна службова політика, а не модерна зрада.
  section: 'Формування: Урядник на південному прикордонні'
  words: 1000
- points:
  - 1510 — намісництво в Каневі; 1514 — черкаське й канівське староство стає його головною публічною роллю за ЕІУ й IEU.
  - 'Прикордонні кампанії: 1515 похід з козацькими й кримськотатарськими загонами, 1521 і 1523 (Іслам-Кермен на низу Дніпра), 1527 бій під Ольшаницею, 1532 оборона Черкас від походу хана Сагіб-Ґерая — приклади нестійких союзів і фронтирної війни.'
  - 1524 — рання державна нарада про утримання козаків на Дніпрі для прикордонної служби («тисяча або дві людей наших козаков»), що не дала сталого інституту, бо фінансування не пішло за рішенням.
  - 1533 — Дашкович подає на Пйотрковському сеймі проєкт залоги й укріплень на низу Дніпра; його схвалюють у принципі, але не фінансують.
  - '[!epistemic-humility] Джерельна база — не особисті тексти, а державне листування, посольські звіти й хроніки: Acta Tomiciana, матеріали Литовської метрики, характеристика Герберштайна «весьма искусный въ военном деле», оповідь Бєльського. Так учні бачать, що біографію тут реконструюють із чужих документів.'
  section: 'Діяльність: Черкаси й Канів — оборона, козаки й дипломатія'
  words: 1300
- points:
  - '[!anti-hagiography] Тимчасова служба московському володареві й участь у справі Глинських, які часто замовчують патріотичні наративи; мотиви — прагматизм і службова політика фронтиру, а не національне навернення.'
  - '[!myth-buster] Розвінчання міфу «першого гетьмана» і «засновника Січі»: перша документально засвідчена Запорозька Січ належить до Томаківської рамки 1570-х, а не до проєкту Дашковича 1533 року; історіографія XIX ст. перебільшила роль прикордонних урядників як «перших гетьманів».'
  - 'Місцевий примус: податки, судова влада й тиск на черкаських і канівських міщан — прикордонний оборонець міг бути й жорстким урядником. Ця неоднозначність руйнує агіографію.'
  section: 'Тінь: Служба Москві, місцевий примус і міф про «першого гетьмана»'
  words: 900
- points:
  - 'Безпечне підсумкове речення: Остафій Дашкович був черкаським і канівським старостою, який використовував і підтримував ранні козацькі загони на південному прикордонні, але не був засновником Січі чи доведено першим гетьманом у пізнішому інституційному сенсі.'
  - 'Спадщина 1: проєкт 1533 року як рання державна ідея козацької прикордонної служби, що випередила свій час.'
  - 'Спадщина 2: як обережне джерелознавство демонтує простий міф про засновника й показує, що «козак» на початку XVI ст. був ще рухливим прикордонним статусом і практикою, а не сталим станом чи січовою ідентичністю.'
  section: 'Дискусія та підсумок: Що дозволяють сказати джерела'
  words: 700
focus: 'Біографія черкаського й канівського старости Остафія Дашковича на прикордонні початку XVI ст.: відділення документально засвідченого урядника від пізнішого міфу про «першого козацького гетьмана» та «засновника Січі».'
