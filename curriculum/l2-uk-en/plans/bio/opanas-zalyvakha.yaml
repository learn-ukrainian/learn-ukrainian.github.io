- section: 'Формування: Косів і Ленінград'
  words: 1000
  points:
  - Практика в Косові 1957 р.
  - '[!decolonization] Культурний поворот до української ідентичності.'
  - Переїзд до України 1961 р.
- section: 'Діяльність: Вітраж «Шевченко. Мати»'
  words: 1200
  points:
  - Виставку 1962 р. закрито (КХПГ).
  - Вітраж 1964 р. знищено (УІНП).
  - '[!epistemic-humility] Джерело підтверджує знищення, не реконструкцію.'
- section: 'Тінь: Арешт 1965 року'
  words: 1600
  points:
  - '[!anti-hagiography] Звинувачення у мистецькій позиції.'
  - Вирок — 5 років таборів (ЕСУ).
  - '[!myth-buster] Номер справи не знайдено.'
- section: 'Підсумок: Спадщина'
  words: 1000
  points:
  - Повернення 1970 р.
  - '[!decolonization] Мистецтво як свідчення, що режим знищував.'
