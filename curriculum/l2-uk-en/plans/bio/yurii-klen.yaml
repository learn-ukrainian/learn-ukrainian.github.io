content_outline:
- points:
  - '[!biography] Знайомство з Юрієм Кленом (Освальдом Бургардтом): етнічний німець, який обрав українську мову, перекладач європейського масштабу й один із п''яти київських неокласиків.'
  - 'Провокаційне питання: як поет німецького походження став свідком-елегіком знищення української культури, що його не зачепив терор лише завдяки можливості емігрувати?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 4 жовтня 1891 року в Сербинівцях на Поділлі в родині німецьких колоністів; золота медаль Першої київської гімназії; з 1911 року — романо-германська філологія в Київському університеті.'
  - 'Перша репресія: під час Першої світової війни імперська влада депортує Бургардта як німця до Архангельської губернії; до Києва він повертається лише 1918 року.'
  - '«Ґроно п''ятірне»: належність до кола неокласиків разом із Миколою Зеровим, Михайлом Драй-Хмарою, Павлом Филиповичем і Максимом Рильським; спільне з Зеровим викладання в баришівській школі.'
  - '[!decolonization] Перекладацька праця як спротив: переклад «Гамлета» виходить у радянській Україні «без імені перекладача» — взірець механізму стирання.'
  section: 'Формування: Німецький колоніст, що обрав українську'
  words: 1000
- points:
  - 'Вихід із пастки: у 1931 році Клен, скориставшись німецьким походженням, виїздить із радянської України — шляхом, закритим для його народжених в Україні друзів; з 1934 року — лектор у Мюнстері, 1936 року захищає німецьку докторську працю.'
  - 'Поетичне свідчення: поема «Прокляті роки» (Львів, 1937) — звинувачення сталінському знищенню культури; незавершена епопея «Попіл імперій» (1943–1947) — вершинний твір про терор і нелюдяність Другої світової війни.'
  - 'Синтез традицій: збірка «Каравели» (Прага, 1943) поєднує київський неокласицизм із «поезією чину» пражан; мемуари «Спогади про неоклясиків» (1947) — першоджерело про коло Зерова.'
  - 'Перекладач і містифікатор: переклади Шекспіра, Рільке, Ґеорге, Байрона, Шеллі; разом із Леонідом Мосендзом під спільним псевдонімом Порфирій Горотак — пародійні «Дияволічні параболи» (1947).'
  section: 'Діяльність: «Каравели» та свідчення неокласика'
  words: 1200
- points:
  - '[!anti-hagiography] Знищення, якого Клен уник і яке засвідчив: Миколу Зерова розстріляно в Сандармосі 3 листопада 1937 року, Павла Филиповича розстріляно 1937 року, Михайло Драй-Хмара загинув у колимських таборах 1939 року.'
  - 'Документ у вірші: у «Проклятих роках» Клен називає поіменно розстріляних письменників — Григорія Косинку та Олексу Влизька (обох страчено 1934 року), перетворюючи поему на свідчення.'
  - 'Образ приреченого Києва: «олив''яні оси» над містом і «жорстокі та безхлібні» роки сплавляють терор і Голодомор в один осінній образ високого неокласичного карбу.'
  - '[!epistemic-humility] Чесний погляд на складність: службу Клена перекладачем у вермахті (1941–1943) подаємо відкрито, не приховуючи й не використовуючи її для знецінення його антисталінського свідчення.'
  section: 'Тінь: Знищення «ґрона п''ятірного»'
  words: 1600
- points:
  - 'Порятунок спадщини: архів зберегла дружина Зінаїда, вивезла до Канади й видала там; зібрані «Твори» вийшли в діаспорі (НТШ, Нью-Йорк; Торонто).'
  - 'Повернення: в УРСР Клен залишався недрукованим до 1990 року, коли «Прокляті роки» з''явилися в журналі «Вітчизна».'
  - 'Пам''ять: смерть 30 жовтня 1947 року в Авґсбурзі від хвороби в добу таборів для переміщених осіб; син Вольфрам Бургардт разом із Євгеном Маланюком упорядкував зібрання творів. Клен — взірець добровільної національної належності.'
  section: 'Підсумок: Архів, врятований дружиною'
  words: 1000
focus: 'Юрій Клен (Освальд Бургардт) — неокласик, що врятувався: етнічний німець, який обрав українську мову, єдиний із «ґрона п''ятірного», кому вдалося емігрувати, і свідок-елегік знищення власної літературної когорти. Аналіз поем «Прокляті роки» та «Попіл імперій» як документального свідчення проти сталінського терору.'
