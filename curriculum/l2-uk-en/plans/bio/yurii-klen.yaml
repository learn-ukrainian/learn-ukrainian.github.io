objectives:
- Розрізняти літературне ім’я Юрій Клен і документоване ім’я Освальд-Екхард Бурґгардт.
- Пояснювати київський неокласичний контекст без перетворення групи на однорідну біографію.
- Порівнювати архівно підкріплену дату народження з розбіжною енциклопедичною датою.
- Аналізувати «Прокляті роки» та «Спогади про неоклясиків» як різні жанри пам’яті.
content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Юрій Клен — псевдонім; архівно підкріплене дослідження відтворює ім’я Освальд Екхард Бурґгардт.'
  - '[!epistemic-humility] Архівно підкріплене дослідження та ЕСУ дають 4 жовтня 1891 року, а ЕІУ — 6 жовтня; різницю не приховуємо.'
  - '[!epistemic-humility] Дослідження подає Сербинівці на Поділлі, ЕСУ — Сербинівку Жмеринського району, а ЕІУ — Сербанівку Хмільницького району; ці форми не зливаємо мовчки.'
- section: 'Київська освіта й неокласичне коло'
  words: 1000
  points:
  - Філологічна освіта, викладання, переклади та участь у київському літературному житті.
  - Арешт 1921 року й звільнення після клопотання Володимира Короленка подаємо без вигаданих подробиць.
  - Неокласики були колом авторів зі спільними естетичними контактами, а не установою з єдиною програмою.
- section: 'Еміграція, праця й книжки'
  words: 1200
  points:
  - Виїзд до Німеччини 1931 року та викладацька й літературна робота за межами радянської України.
  - «Прокляті роки», «Каравели» й «Попіл імперій» розглядаються в точній видавничій хронології.
  - «Спогади про неоклясиків» є мемуарним свідченням учасника, а не нейтральним протоколом.
- section: 'Критичне читання і межі певності'
  words: 1600
  points:
  - '[!anti-hagiography] Багатомовне походження й німецьке юридичне ім’я не заперечують свідомої праці в українській культурі.'
  - Не переносимо на автора неперевірених службових ролей воєнного часу й не цитуємо поезію без точного локатора.
  - Зіставляємо поетичне осмислення насильства з документованою долею репресованих неокласиків.
- section: 'Підсумок: ім’я, вибір мови й культурна пам’ять'
  words: 1000
  points:
  - Літературне ім’я позначає авторську присутність в українській традиції, але не стирає юридичної ідентичності.
  - Деколонізаційне читання не змушує обирати одну національну етикетку замість документованої багатомовності та української агентності.
