objectives:
- Простежити шлях Освальда Бургардта — від німецької колоністської родини й депортації часів Першої світової війни до еміграції 1931 року й діаспорної творчості як Юрія Клена.
- Пояснювати належність Клена до київського «ґрона п'ятірного» неокласиків і синтез неокласицизму з «поезією чину» Празької школи у збірці «Каравели».
- Аналізувати поеми «Прокляті роки» (1937) та «Попіл імперій» як свідчення про знищення української культури в роки сталінського терору.
- Чесно розглядати складні факти біографії (служба перекладачем у вермахті 1941–1943) і не використовувати їх для знецінення антисталінського свідчення поета.
