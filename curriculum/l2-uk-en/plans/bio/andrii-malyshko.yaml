content_outline:
  - points:
      - >-
          Провокація: як поет із Обухова, вбудований у радянські літературні
          інституції, став автором текстів, які українці впізнають як
          домашню, материнську і дорожню пісенну пам'ять?
      - >-
          [!biography] Андрій Самійлович Малишко (1912-1970) — український
          поет, перекладач, критик, редактор і громадський діяч, чия
          найтривкіша рецепція пов'язана з українською піснею та
          співпрацею з Платоном Майбородою.
      - >-
          Навчальне запитання: що змінюється, коли ми читаємо Малишка не як
          безконфліктного "радянського класика", а як автора українського
          ліричного канону всередині контрольованої культурної системи?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебати 1: "Пісня про рушник" як національна пам'ять чи
          сентиментальний шкільний штамп? Студенти розрізняють живий
          культурний символ і пізнішу канонізацію, яка може зробити твір
          надто гладким.
      - >-
          Дебати 2: офіційні посади, Сталінські премії, депутатська
          діяльність і редакторська робота — це доказ повної лояльності
          системі чи умова праці українського автора в радянській
          інституційній рамці?
      - >-
          [!decolonization] Малишка не слід поглинати загальним ярликом
          "радянська культура". Українська мова, народнопісенна поетика,
          образи матері, дороги, Києва і села мають бути центром
          інтерпретації.
      - >-
          [!epistemic-humility] Досьє не підтверджує персональної справи
          НКВД/КДБ, арешту чи заслання Малишка. Модуль говорить про
          ідеологічне обмеження і кооптацію, а не вигадує мученицький сюжет.
    section: 'Конфліктна карта: Пісенна пам''ять у радянській рамці'
    words: 900
  - points:
      - >-
          Обухівське походження: велика родина, ремісниче середовище,
          рання школа, Київський медичний технікум і Київський інститут
          народної освіти як шлях до літературної і журналістської праці.
      - >-
          Ранні 1930-ті: учителювання, служба в армії, журналістика,
          перші публікації і збірки. Важливо не романтизувати добу:
          становлення поета відбувалося під тиском сталінської культурної
          політики.
      - >-
          Війна і фронтова література: цикли та збірки воєнних років,
          зокрема українська емоційна оптика "Україно моя!", яку архівні
          джерела виокремлюють як важливу літературну подію.
      - >-
          Формативні ресурси стилю: фольклорна образність, розмовна інтонація,
          повтор, паралелізм, пряме звертання, дорога і материнський образ
          як міст між приватним і національним.
    section: 'Формування: Обухів, Київ і воєнна лірика'
    words: 1000
  - points:
      - >-
          Співпраця з Платоном Майбородою: понад тридцять пісень, серед них
          "Київський вальс", "Пісня про рушник", "Вчителько моя",
          "Стежина", "Ми підем, де трави похилі" і "Білі каштани".
      - >-
          Пісня як форма пам'яті: поетичний текст у поєднанні з мелодією
          виходив за межі книжки, кіно, радіо і концерту, стаючи способом
          повторювати українські образи в публічному просторі.
      - >-
          Не лише пісні: збірки, літературна критика, переклади, редакторська
          робота в "Дніпрі", тексти для музично-драматичних форм і участь у
          публічному літературному житті.
      - >-
          1960-ті як складний фінал: радянські відзнаки й посади співіснували
          з жестами солідарності з українськими інтелектуалами, зокрема
          протестом проти політичних арештів у травні 1966 року.
    section: 'Діяльність: Поезія, що переходить у голос'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Радянські нагороди, редакторські ролі,
          депутатська діяльність і офіційний статус треба називати прямо.
          Вони не скасовують української цінності поезії, але не можуть бути
          стерті з біографії.
      - >-
          [!myth-buster] Малишко не був підпільним дисидентом у джерелах,
          доступних для цього плану. Перетворення його на таємного мученика
          було б такою самою помилкою, як і редукція до "радянського
          лауреата".
      - >-
          Шкільна сентименталізація: образ матері й рушника може затулити
          питання про мову, інституції, воєнний досвід, офіційну риторику
          ранніх текстів і пізню громадянську напругу.
      - >-
          Авторське право: модуль не цитує довгі фрагменти пісень; замість
          цього використовує назви, контекст і короткі впізнавані сигнали
          лише там, де це педагогічно необхідно.
    section: 'Тінь: Офіційність, сентименталізація і межі доказу'
    words: 900
  - points:
      - >-
          Повернення до розминки: студент формулює, як українська пісенна
          пам'ять могла виникати всередині інституцій, які одночасно давали
          сцени і встановлювали ідеологічні межі.
      - >-
          Порівняння з Майбородою і Білашем: текст, мелодія і виконання
          творять не "фон" біографії, а окрему культурну інфраструктуру
          пам'яті.
      - >-
          Деколонізаційний висновок: читати Малишка означає не відмовлятися
          від складності радянської доби, а не дозволяти цій добі поглинути
          українську мову, мелодику і рецепцію його творів.
    section: 'Дискусія та підсумок: Складність без редукції'
    words: 700
focus: >-
  Андрій Малишко як український поет пісенної пам'яті: Обухів і Київ,
  воєнна лірика, співпраця з Платоном Майбородою, "Пісня про рушник" і
  "Стежина", а також напруга між офіційною радянською кар'єрою, українською
  мовною тяглістю і пізнішою національною рецепцією.
