content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          На конкретних прикладах із ЕСУ та спеціального дослідження розрізнити факт, атрибутовану
          джерельну оцінку, інтерпретацію та власне оцінювання.
      - >-
          [!biography] Андрій Самійлович Малишко — український поет,
          перекладач і літературний критик, чия біографія поєднує освіту,
          учителювання, журналістику, фронтову кореспонденцію, редакторську
          працю, пісенну співтворчість і офіційні громадські ролі.
    section: 'Як читати біографію: чотири типи тверджень'
    words: 150
  - points:
      - >-
          Обухів, навчання в медичній профшколі та Київському інституті
          народної освіти, випуск 1932 року й учителювання в Овручі.
      - >-
          Служба в Червоній армії 1934–1935 років; журналістська робота після
          демобілізації у виданнях, названих ЕСУ.
      - >-
          Перші публікації й книжки подати як хронологію, не вигадуючи мотивів,
          психології чи приватних сцен.
    section: 'Обухів, освіта, школа, армія, редакція'
    words: 450
  - annotations:
      - '[!epistemic-humility]'
    points:
      - >-
          Робота військовим кореспондентом у фронтових газетах і воєнні
          збірки як документований контекст зміни поетичного голосу.
      - >-
          Розрізнити 1941 рік написання циклу «Україно моя!» і 1942 рік,
          яким ЕСУ датує твір/публікацію; не перетворювати різницю на сенсацію.
      - >-
          [!epistemic-humility] Літературну оцінку ЕСУ про напругу між
          соцреалістичною риторикою та народнопісенною етикою подавати як
          атрибутовану критичну тезу, яку студент перевіряє за ознаками форми.
    section: 'Війна і «Україно моя!»'
    words: 550
  - points:
      - >-
          Близько ста ліричних віршів покладено на музику; з Платоном
          Майбородою створено понад тридцять пісень — обидва числа лишаються
          приблизними відповідно до формулювання ЕСУ.
      - >-
          Назвати перевірені пісні, але не замінювати аналіз переліком;
          простежити пряме звертання, повтор, паралелізм, синтаксичну межу й
          народнопісенну інтонацію.
      - >-
          «Пісню про рушник» пов'язати з фільмом «Літа молодії» 1959 року за
          атрибутованою архівною довідкою; повний текст не відтворювати.
      - >-
          Короткий звірений початок «Пісні про рушник»: пряме звертання,
          порядок слів, синтаксична межа й композиційна схема без довгого
          відтворення захищеного тексту або неперевірених відомостей про запис.
    section: 'Слово переходить у пісню'
    words: 700
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          [!anti-hagiography] Відповідальне редагування журналу «Дніпро»
          1944–1947 років, робота в Агентстві преси «Новини», Сталінські
          премії, Шевченківська премія, Державна премія СРСР і депутатство
          назвати прямо, але не трактувати як автоматичну естетичну оцінку.
      - >-
          Депутатську діяльність 1950–1967 років пояснити за сучасним
          спеціальним дослідженням: обрання до Київської обласної ради 17
          грудня 1950 року, депутатство у Верховній Раді УРСР — від 1951 року;
          не ототожнювати її з нинішньою парламентською практикою.
      - >-
          Назву спеціальної статті з діапазоном 1951–1967 років зіставити з
          датою обрання до обласної ради в її основному тексті; пояснити, чому
          заголовок джерела не можна мовчки переписувати під власну хронологію.
      - >-
          [!myth-buster] Архівний опис підтверджує існування фонду й обсяг
          каталогізованих матеріалів, але не зміст документа, якого студент
          не прочитав.
    section: 'Посади, премії та депутатство'
    words: 550
  - points:
      - >-
          Побудувати доказовий портрет, у якому хронологія, літературна форма,
          короткий текстовий фрагмент та інституційні факти мають різні доказові ролі.
      - >-
          Підсумковий аргумент містить джерельну атрибуцію, маркер поступки,
          альтернативне пояснення й чітко названий ступінь певності.
      - >-
          Не приписувати всім аудиторіям однакової реакції на пісні й не робити
          радянські відзнаки або одну офіційну роль єдиним ключем до творчості.
    section: 'Доказовий портрет: що можемо стверджувати'
    words: 400
focus: >-
  Андрій Малишко як український поет, чий документований шлях від Обухова,
  школи, армії та фронтової преси веде до воєнної лірики, співпраці з
  Платоном Майбородою, редакторської й депутатської роботи та доказового
  зіставлення джерел різних типів.
