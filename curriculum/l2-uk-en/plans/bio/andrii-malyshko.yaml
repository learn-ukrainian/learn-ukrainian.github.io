  - >-
      Аналізувати повтор, паралелізм, пряме звертання, синтаксичну межу й
      народнопісенну інтонацію без довгого цитування захищених текстів
  - >-
      Пояснювати масштаб і межі співпраці Малишка з Платоном Майбородою та
      спостерігати взаємодію слова, голосу й супроводу в конкретному записі
  - >-
      Формулювати доказовий аргумент просунутого рівня про офіційні ролі й культурну
      тривалість, позначаючи атрибуцію, поступку та ступінь певності
