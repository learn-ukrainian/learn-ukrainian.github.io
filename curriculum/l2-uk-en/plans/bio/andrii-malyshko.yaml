objectives:
  - >-
      Аналізувати біографію Андрія Малишка як приклад української літературної
      і пісенної праці всередині радянських інституцій
  - >-
      Пояснювати, як співпраця Малишка з Платоном Майбородою створила
      тривкий український пісенний канон
  - >-
      Розрізняти документовану інституційну складність і недоведені
      мученицькі або суто лоялістські спрощення
  - >-
      Формулювати деколонізаційне прочитання Малишка, яке висуває на перший
      план українську мову, фольклорну поетику і культурну пам'ять
