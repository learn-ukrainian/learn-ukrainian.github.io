objectives:
- Критично аналізувати суперечливі джерела, що стосуються життя та смерті Ольги Басараб
- Розрізняти історичну постать та її іконізований образ у національній пам'яті
- Пояснювати роль жінок в українському підпільному русі міжвоєнного періоду
- Формулювати аргументовану позицію щодо ціни та наслідків підпільної боротьби
