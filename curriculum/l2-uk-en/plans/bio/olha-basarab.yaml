content_outline:
- points:
  - 'Парадокс: польська влада офіційно заявила про її самогубство, але для українців вона стала символом незламності та мучеництва.
    Як одна смерть могла породити дві настільки протилежні версії?'
  - '[!biography] Ольга Басараб — розвідниця УВО, чия загибель у польській в''язниці перетворила її на ікону національно-визвольного
    руху.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Обставини загибелі. Польська офіційна версія («самогубство через повішення») проти української версії (смерть
    внаслідок тортур). Аналіз доказів та судово-медичних розбіжностей.'
  - 'Дебат 2: Іконізація vs. реальність. Як і чому український визвольний рух перетворив Басараб на святу мученицю? Чи не
    затьмарив цей культ її реальну діяльність як професійної розвідниці?'
  - '[!epistemic-humility] Визнання, що повна правда про останні години її життя, ймовірно, ніколи не буде відома, що залишає
    простір для інтерпретацій.'
  - '[!decolonization] Випадок Басараб як приклад використання колоніальною адміністрацією юридичних та медійних інструментів
    для приховання політичного насильства.'
  section: 'Конфліктна карта: Смерть, що стала зброєю'
  words: 900
- points:
  - Народження у родині священника, освіта у Львові та Відні — формування в середовищі галицької інтелігенції.
  - Музична освіта та участь у культурному житті як частина соціального становлення.
  - Шлюб з Дмитром Басарабом та входження в політично активне середовище.
  - Контекст: Львів на зламі століть — центр українського культурного та політичного відродження в Австро-Угорщині.
  section: 'Формування: Львівська інтелігентка'
  words: 1000
- points:
  - 'Перша світова війна як поворотний момент: благодійна діяльність для УСС, допомога пораненим та військовополоненим.'
  - Формування перших конспіративних контактів та мереж під прикриттям гуманітарної роботи.
  - Вступ до Української Військової Організації (УВО) та початок професійної розвідницької кар''єри.
  - Організація розвідувальної мережі у Львові, координація зв'язку між місцевим підпіллям та закордонним центром УВО в Берліні
    та Відні.
  section: 'Діяльність: Від благодійності до розвідки'
  words: 1300
- points:
  - 'Фатальний провал: викриття та арешт польською таємною поліцією у лютому 1924 року.'
  - 'Жорстокі допити: свідчення про тортури, що застосовувалися для отримання інформації про мережу УВО.'
  - '[!anti-hagiography] Відмова видати товаришів — це не лише героїчний акт, а й професійний кодекс розвідника. Що відбувається,
    коли цей кодекс доводиться захищати ціною життя?'
  - '[!myth-buster] Офіційна версія про «самогубство» була спробою польської влади уникнути відповідальності та дискредитувати
    підпілля. Розбір невідповідностей цієї версії.'
  - 'Ціна боротьби: загибель Басараб як приклад того, яку високу ціну платили учасники підпільного руху.'
  section: 'Тінь: Остання справа і смерть'
  words: 900
- points:
  - Повернення до розминки: чому версія про мученицьку смерть виявилася сильнішою за офіційну версію про самогубство?
  - 'Аналіз феномену «культу Ольги Басараб»: як її образ використовувався в ідеологічній боротьбі та національному вихованні.'
  - '[!decolonization] Спадщина Басараб як символ опору асиміляції та колоніальному гніту в міжвоєнній Польщі.'
  - 'Сучасне значення: як постать Ольги Басараб сприймається сьогодні? Героїня, жертва, професіонал — чи всі ці ролі поєднуються
    в її образі?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Olha Basarab as a symbol of the Ukrainian underground, the conflict between historical fact and hagiography, and the
  brutal realities of intelligence work in the interwar period.
