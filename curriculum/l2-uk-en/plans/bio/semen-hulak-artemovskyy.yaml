content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: як зірка імператорської сцени та улюбленець петербурзької публіки став автором головного національного міфу
    в українській опері?'
  - 'Провокаційне питання: чи був "Запорожець за Дунаєм" актом українського патріотизму, чи екзотичною виставою для російської
    столиці?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1 (Сучасники): Чи був Гулак-Артемовський "справжнім українцем"? Дискусії між українською інтелігенцією про митця,
    що все життя працював на імперську культуру, але зберіг українську ідентичність.'
  - 'Дебат 2 (Нащадки): Як радянська ідеологія "присвоїла" "Запорожця", трактуючи його як приклад "дружби народів" і применшуючи
    національний елемент. Сучасна деколоніальна переоцінка опери.'
  - '[!epistemic-humility] Визнання складності мотивації митця в умовах імперії. Уникнення чорно-білих оцінок "зрадник/герой".'
  section: 'Конфліктна карта: Патріот чи конформіст?'
  words: 900
- points:
  - Походження та ранні роки в Городищі. Вплив української народної музики та кобзарства на майбутнього композитора.
  - 'Навчання у Києві та щасливий випадок: як унікальний голос юнака почув Михайло Глінка, що змінило його долю.'
  - Переїзд до Петербурга, навчання в Італії. Перетворення юнака з провінції на європейського оперного співака.
  section: 'Формування: Від Городища до Петербурга'
  words: 1000
- points:
  - Блискуча кар'єра соліста імператорських театрів. Виконання провідних партій у російських та європейських операх.
  - 'Робота над "Запорожцем за Дунаєм": написання лібрето та музики. Використання українських народних мелодій та ритмів.'
  - Прем'єра 1863 року в Маріїнському театрі. Успіх у публіки та неоднозначна реакція критики. Опера як культурна подія та
    політичний жест в умовах Валуєвського циркуляру.
  - 'Первинні джерела: аналіз фрагментів лібрето та музичних тем, що розкривають національний характер твору.'
  section: 'Діяльність: Імперський баритон та національна опера'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Критичний аналіз творчого доробку: чому після грандіозного успіху "Запорожця" Гулак-Артемовський
    більше не написав жодного великого українського твору?'
  - 'Версії та гіпотези: творча криза, політичний тиск після Валуєвського циркуляру, задоволення статусом успішного виконавця,
    брак амбіцій?'
  - '[!myth-buster] Розвінчання міфу про Гулака-Артемовського як послідовного "національного композитора". Його творчість
    — це складний випадок митця, що балансує між імперським центром та національною ідентичністю.'
  - 'Ціна успіху: чи не була його кар''єра в імперії формою компромісу, що обмежила його потенціал як українського композитора?'
  section: 'Тінь: Чому лише одна опера?'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: студент формулює власну відповідь на парадокс митця, використовуючи знання з модуля.'
  - '"Запорожець за Дунаєм" як "культурна зброя": як опера стала символом національного відродження та інструментом збереження
    ідентичності.'
  - 'Вплив на наступні покоління: Лисенко, український театр корифеїв. Гулак-Артемовський як засновник традиції.'
  - '[!decolonization] Сучасні постановки опери: очищення від радянських нашарувань та нові інтерпретації в контексті незалежної
    України.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Семен Гулак-Артемовський як культурний феномен: успішний імперський співак, що створив фундаментальний твір української
  національної опери "Запорожець за Дунаєм", його подвійна ідентичність, та політичний контекст прем''єри 1863 року.'
