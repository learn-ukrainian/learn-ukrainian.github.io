objectives:
- Критично аналізувати постать Семена Гулака-Артемовського в контексті його подвійної ідентичності як імперського артиста
  та українського патріота.
- Оцінювати культурно-історичне значення опери "Запорожець за Дунаєм" як фундаменту українського національного музичного театру.
- Дискутувати про роль і межі компромісу для митця, що творить в умовах колоніальної залежності.
- Формулювати аргументовану позицію щодо спадщини митця, розрізняючи історичні факти, національний міф та радянські інтерпретації.
