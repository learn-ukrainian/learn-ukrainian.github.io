objectives:
- >-
  Аналізувати громадянську лірику Павла Грабовського (зокрема вірш "Швачка") як соціальне
  звинувачення, а не сентиментальну поезію.
- >-
  Пояснювати перекладацький проєкт Грабовського та роль галицьких видань як простору для
  забороненої в Російській імперії української літератури.
- >-
  Реконструювати послідовність імперського заслання — виключення, нагляд, ув'язнення,
  адміністративне заслання, повторний арешт — на основі джерел, без вигаданих номерів справ.
- >-
  Оцінювати спротив імперському спрощенню Грабовського до "російського народника" через
  його український мовний літературний проєкт.
