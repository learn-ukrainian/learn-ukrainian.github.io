content_outline:
- points:
  - >-
    [!biography] Знайомство з Павлом Грабовським: поет-громадянин, перекладач і
    політичний засланець, чию творчість сформували роки ув'язнення та сибірського
    заслання.
  - >-
    Провокаційне питання: чому російська імперська держава бачила загрозу в поезії про
    швачку, працю й неволю — і чому ця поезія друкувалася не в імперії, а в Галичині?
  section: Розминка
  words: 400
- points:
  - >-
    Походження й освіта: народження 11 вересня 1864 року (за новим стилем) у селі
    Пушкарне (нині Грабовське, Сумщина) у родині сільського псаломщика; навчання в
    Охтирській бурсі, а з 1879 року — у Харківській духовній семінарії.
  - >-
    Семінарські роки та входження в народницькі кола: у 1882 році Грабовського
    виключили з Харківської духовної семінарії за зв'язки з народницьким гуртком
    "Чорний переділ" і відправили в Пушкарне під поліційний нагляд.
  - >-
    [!decolonization] 1886 рік — арешт за революційну агітацію, зв'язки з тим самим
    колом і поширення забороненої літератури; формування поета саме як учасника
    антиімперського руху, а не "загубленого таланту".
  section: 'Формування: Семінарист серед народників'
  words: 1000
- points:
  - >-
    Поетичні збірки: "Пролїсок" (Львів, 1894) із програмовим віршем "Швачка"; "З
    Півночі" (1896), "Доля" (1897) та "Кобза" (1898) — корпус, написаний здебільшого
    в неволі.
  - >-
    Перекладацький проєкт: "З чужого поля" (Львів, 1895) і "Песни України" (1898) —
    введення світової та української поезії в український читацький обіг попри
    імперські обмеження.
  - >-
    Громадянська лірика як метод: пряме звертання, заклична інтонація, соціальна
    деталь і зменшувальні форми, що звучать не сентиментально, а звинувачувально —
    "Рученьки терпнуть, злипають ся віченьки".
  - >-
    Антилицемірний регістр: рядок "Не тобі молюсь я, боже" із збірки "З чужого поля"
    показує критику фальші без потреби в повному складному читанні.
  section: 'Діяльність: Поезія і переклад із заслання'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Заслання Грабовського — не одна суцільна кара, а послідовність
    механізмів: виключення, нагляд, ув'язнення, адміністративне заслання, повторний
    арешт і примусове поселення.
  - >-
    1888 рік: п'ятирічне адміністративне заслання до Балаганського округу Іркутської
    губернії, здійснене російською імперською адміністрацією.
  - >-
    1889 рік: підписання протесту "Російському урядові" після розправи над
    політичними засланцями в Якутську; новий арешт і близько трьох із половиною років
    Іркутської в'язниці.
  - >-
    [!epistemic-humility] Дальший маршрут неволі — Вілюйськ, Якутськ і нарешті
    Тобольськ, де поет помер 12 грудня 1902 року (за новим стилем). Конкретного номера
    архівної справи джерела не подають, тож його не вигадуємо.
  section: 'Тінь: Заслання, протест і Тобольськ'
  words: 1600
- points:
  - >-
    Що збереглося: поезія, переклади й листування Грабовського вціліли завдяки
    галицьким виданням і пізнішим зібраним виданням; персональних поліційних
    ідентифікаторів справи для цього дослідження не знайдено.
  - >-
    [!myth-buster] Проти імперського спрощення "російський народник": Грабовський вів
    український мовний літературний проєкт, і саме його заборона в імперії пояснює
    галицьку видавничу екологію.
  - >-
    Галичина як видавничий простір: обмеження на українську мову в Російській імперії
    робили імперську публікацію майже неможливою — це факт видавничої екології, а не
    твердження, що твори створила Галичина.
  - >-
    Кінцеве питання: як інтегрувати Грабовського в національний канон і як поета, і як
    перекладача, і як політичного засланця — поряд із громадянською лірикою Лесі
    Українки та Івана Франка.
  section: "Підсумок: Голос неволі в українській пам'яті"
  words: 1000
focus: >-
