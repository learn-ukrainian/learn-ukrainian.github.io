content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Баркою (Очеретом): поет, романіст, перекладач, кандидат
    філологічних наук з Данте; свідок Голодомору й автор найважливішого роману про геноцид
    *Жовтий князь*.
  - >-
    Провокаційне питання: як людина, що пережила штучний голод і примусову працю в Берліні,
    написала епос *Свідок для сонця шестикрилих* про примирення людини з Творцем?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: **16 липня 1908**, с. Солониця (Полтавщина); бідна селянська родина; Лубенський
    педтехнікум; філфак Краснодарського педінституту на Кубані (український історичний регіон
    під русифікацією).
  - >-
    Наука: дисертація з *Божественної комедії* Данте; кандидат філологічних наук (1940) — джерела
    розходяться щодо місця захисту (Краснодар / Москва), не згладжуємо.
  - >-
    Ранні збірки в СРСР: *Шляхи* (1930, Харків), *Цехи* (1932) — останній друк до вигнання.
  - >-
    [!decolonization] Кубанські роки: загрози суду й заслання за «контрреволюційний» релігійний
    зміст музейної роботи — називати радянську мітку міткою, не «правдою».
  section: 'Формування: Від Полтавщини до вигнання'
  words: 1000
- points:
  - >-
    Голодомор **1932–1933**: особисте свідчення молодого вчителя; десятиліття збору матеріалів
    (з 1933), спогади брата-вижившого.
  - >-
    Війна: поранення 1942; **1943** — депортація нацистськими властями до Берліня як **остарбайтер**;
    після падіння Берліна — табір переміщених осіб у Аугсбурзі; еміграція в США (**1950**).
  - >-
    Емігрантські збірки: *Апостоли* (1946) — «Земля, з дитинства рідна! Як її старим покинути…»;
    *Білий світ* (1947); *Рай* (1953); *Океан* (1959); *Об'явлення* (1963, Рим).
  - >-
    *Жовтий князь*: перший том 1962, повне видання 1963 (Сучасність); заголовок — алюзія до
    Одкровення 6:8 (кінь чалий / «жовтий князь») — не портрет Сталіна, а метафізичне зло системи.
  - >-
    Пізні твори: *Свідок для сонця шестикрилих* (1981); переклад *Короля Ліра* (1969); французьке
    *Le Prince jaune* (Gallimard, 1981).
  section: 'Діяльність: Від «Апостолів» до «Жовтого князя»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Барка — не лише «романіст Голодомору»: поет, кобзарознавець (*Правда
    Кобзаря*), перекладач Біблії, релігійний модерніст, що прийняв дияконські обітниці (~50 років).
  - >-
    Шари тиску: (1) геноцид Голодомору; (2) радянські загрози за «контрреволюційність»; (3) примусова
    праця в Берліні; (4) незворотний розрив із дружиною та сином у СРСР — «півстоліття вигнання від сина».
  - >-
    Псевдоніми: **Василь Барка** і **Іван Вершина** — щоб не підставляти родичів, що лишилися в СРСР.
  - >-
    Стертя в СРСР: ім'я «неособа», книги заборонені; виживання лише в діаспорі (Нью-Йорк, Мюнхен, Рим).
    **11 квітня 2003** — смерть у Ґлен-Спей (США), поховання в українському пантеоні Південного
    Баунд-Бруку (Нью-Джерсі).
  - >-
    [!epistemic-humility] Використовувати «Голодомор», не «радянський голод»; не романтизувати
    остарбайтерство — названий механізм нацистської депортації.
  section: 'Тінь: Голодомор, остарбайтер і вічне розлучення'
  words: 1600
- points:
  - >-
    Повернення спадщини: перевидання в незалежній Україні; суперечка 2011 року навколо виключення
    *Жовтого князя* зі шкільної програми — пам'ять досі політична.
  - >-
    Зв'язок із МУР: активність у Німеччині; контекст післявоєнної української літератури діаспори.
  - >-
    Сучасне значення: свідок геноциду, який зберіг «людське почування» навіть у апокаліптичній прозі.
  section: 'Підсумок: Жовтий князь як свідчення'
  words: 1000
focus: >-
  Василь Барка як свідок Голодомору, остарбайтер і автор *Жовтого князя*: шари радянського
