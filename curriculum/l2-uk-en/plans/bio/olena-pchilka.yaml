content_outline:
- points:
  - 'Парадокс: Олену Пчілку називають "матір’ю українського модернізму", але в масовій свідомості вона — передусім "мати Лесі
    Українки". Чия тінь більша: її власна чи доньчина?'
  - '[!biography] Вона була не просто матір''ю, а наставницею, видавцем і цензором для своєї геніальної доньки — стосунки,
    сповнені любові та конфліктів.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пчілка як консервативна матріархиня vs Пчілка як радикальна феміністка. Її підтримка патріархальних родинних
    цінностей у побуті суперечила її ж боротьбі за емансипацію жінок у публічній сфері.'
  - 'Дебат 2: "Пчілка-інкубатор для Лесі" — радянська та пострадянська спроба знецінити її власну діяльність, звівши все до
    материнської функції. [!decolonization] Цей наратив приховував її гострий націоналізм та антиімперську позицію.'
  - '[!epistemic-humility] Близькі друзі відзначали її складний, безкомпромісний характер, тоді як публіцистика створювала
    образ ідеальної "народної просвітительки". Де правда?'
  section: 'Конфліктна карта: Мати генія чи самостійна мислителька?'
  words: 900
- points:
  - Народження Ольги Драгоманової в родині, де цінували інтелект та українську ідею.
  - Вплив брата Михайла Драгоманова — європейська освіченість, соціалістичні ідеї та жорсткі інтелектуальні стандарти, які
    вона засвоїла на все життя.
  - 'Формування національної свідомості: від типової "панночки" до свідомої українки, що обирає "хлопоманський" шлюб і служіння
    народу.'
  - Освіта в Інституті шляхетних дівчат у Києві — звідки вона винесла як знання мов, так і огиду до імперської системи.
  section: 'Формування: Гадяцьке гніздо Драгоманових (1849-1868)'
  words: 1000
- points:
  - Видавництво "Перший вінок" (1887) з Наталею Кобринською — перша в Україні феміністична антологія, що стала маніфестом
    жіночого руху.
  - 'Етнографічні експедиції: Пчілка не просто збирала орнаменти, а створювала наукову систему українського народного мистецтва,
    рятуючи його від "общерусского" знецінення.'
  - 'Дитяча література: створення першого україномовного журналу для дітей "Рідний край" як інструмент виховання національно
    свідомого покоління.'
  - 'Перекладацька діяльність: Гоголь, Пушкін, Андерсен — вона доводила, що українська мова здатна передати світову класику
    не гірше за російську.'
  section: 'Діяльність: Культурний фронт (1868-1905)'
  words: 1300
- points:
  - '[!anti-hagiography] Її гострий язик і безкомпромісність створювали конфлікти. Вона публічно сварилася з Іваном Франком
    та іншими ключовими діячами, шкодячи спільній справі.'
  - 'Надмірний контроль над Лесею: Пчілка редагувала її твори, контролювала особисте життя і часом придушувала її волю, що
    призводило до глибоких особистих драм.'
  - '[!myth-buster] Міф про "ідеальні стосунки" матері та доньки. Їхнє листування — це історія любові, але й боротьби двох
    сильних особистостей за право на власний голос.'
  - 'Консерватизм: незважаючи на феміністичні погляди, Пчілка була дуже консервативною в соціальних питаннях, що часом робило
    її союзницею старих порядків, а не модерністкою.'
  section: 'Тінь: Ціна безкомпромісності'
  words: 900
- points:
  - 'Повернення до розминки: чи вдалося Пчілці вийти з тіні доньки? Студент має сформулювати відповідь, спираючись на багатогранність
    її діяльності.'
  - '[!decolonization] Радянська влада переслідувала її до самої смерті у 1930 році, намагаючись стерти пам''ять про неї як
    про ідеолога українського націоналізму.'
  - 'Останні роки: робота над спадщиною Лесі Українки. Чи було це спробою зберегти пам''ять, чи останнім актом материнського
    контролю над доньчиним генієм?'
  - 'Сучасне значення: Пчілка є символом жінки, яка всупереч усьому — патріархальному суспільству, імперському тиску, особистим
    трагедіям — будувала українську націю.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Olena Pchilka as a foundational figure of Ukrainian modernism, feminism, and ethnography, examining the tension between
  her own monumental contributions and her legacy as the mother of Lesia Ukrainka.
level: BIO
module: bio-050
objectives:
- Критично оцінювати спадщину Олени Пчілки, розрізняючи її власні досягнення та роль у житті Лесі Українки
- Аналізувати внесок Пчілки у розвиток українського фемізму, етнографії та дитячої літератури
- Виявляти та деконструювати радянські та пострадянські міфи про її постать
- Формулювати аргументовану позицію щодо складних і суперечливих аспектів її біографії
