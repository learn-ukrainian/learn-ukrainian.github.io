objectives:
- Аналізувати фрагменти «Повісті временних літ» як першоджерело, розрізняючи факт та інтерпретацію
- Критично оцінювати різні історіографічні теорії щодо авторства та редакцій літопису
- Розуміти інтелектуальний та духовний контекст Києво-Печерської Лаври XI-XII ст. як центру книжності
- Формулювати обґрунтовану позицію щодо ролі літописця в середньовічному суспільстві, враховуючи фактор політичного патронажу
