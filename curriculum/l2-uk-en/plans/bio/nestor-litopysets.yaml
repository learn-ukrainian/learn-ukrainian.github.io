content_outline:
- points:
  - 'Парадокс: Нестор — «батько історії» чи «редактор» на службі у князя? Розглядаємо міф про одного автора, що написав історію
    для всіх.'
  - '[!biography] Вступ до постаті, що є одночасно символом і найбільшою загадкою української історичної науки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проблема авторства «Повісті временних літ». Теорія єдиного автора (Нестора) vs гіпотеза компіляції (робота кількох
    літописців під різними редакціями).'
  - 'Дебат 2: Політичне замовлення. Чийого голосом говорить літопис? Аналіз впливу князівських патронів (Святополк vs Мономах)
    на висвітлення подій.'
  - '[!epistemic-humility] Визнання, що ми не маємо остаточних доказів — лише текстологічні гіпотези та інтерпретації. Історична
    наука як детектив.'
  - '[!decolonization] Як російська та радянська історіографія використовували «Повість» для створення міфу про «спільну колиску»,
    і як сучасна українська наука це спростовує.'
  section: 'Конфліктна карта: ''Автор чи компілятор?'''
  words: 900
- points:
  - Інтелектуальне середовище Києво-Печерської Лаври XI ст. — центр книжності та перекладів.
  - Вплив Феодосія Печерського та монастирського уставу на світогляд молодого Нестора.
  - Освіта: доступ до візантійських хронік, болгарських джерел та античної спадщини.
  - Послух як формування дисципліни думки та праці, необхідної для літописця.
  section: 'Формування: ''Книжник у Печерській Лаврі'''
  words: 1000
- points:
  - Аналіз структури та жанрів «Повісті»: від біблійних генеалогій до воєнних повістей та житій.
  - Нестор як агіограф: «Житіє Бориса і Гліба» та «Житіє Феодосія Печерського» — канони жанру.
  - Методологія історика XI століття: робота з джерелами, усна історія, хронологічні розрахунки та провіденціалізм.
  - Мова літопису: синтез церковнослов'янської та живої давньоруської мови.
  section: 'Діяльність: ''«Повість временних літ» як magnum opus'''
  words: 1300
- points:
  - '[!anti-hagiography] Що Нестор НЕ написав? Аналіз «сліпих зон» у літописі — подій, замовчуваних через політичну кон''юнктуру
    (напр., роль Святополка у вбивстві братів).'
  - '[!myth-buster] Руйнування міфу про літописця як об''єктивного спостерігача. Нестор — активний учасник ідеологічної боротьби
    свого часу.'
  - Критика джерел Нестора: як він інтерпретує (або вигадує) події для створення цілісного, але ідеологічно забарвленого наративу.
  - Ціна патронажу: як залежність від князя-замовника впливала на вибір та трактування фактів.
  section: 'Тінь: ''Політичні лакуни та князівська цензура'''
  words: 900
- points:
  - Повернення до розминки: студент формулює власну відповідь на питання про роль Нестора — автора, компілятора чи символу.
  - Канонізація Нестора: як та чому церква зробила його святим?
  - «Повість» як ДНК української культури: вплив на подальшу літературу, мову та національну ідентичність.
  - '[!decolonization] Сучасне значення: День української писемності та мови і роль Нестора у формуванні образу України як
    спадкоємиці Русі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Nestor as a historian and literary figure, the controversy of authorship of the Primary Chronicle, political context
  of 11th-12th century Kyivan Rus, anti-hagiographical analysis of his work.
level: BIO
