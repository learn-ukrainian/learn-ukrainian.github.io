content_outline:
- points:
  - 'Провокація: Чи може один роман, написаний у XXI столітті, змінити уявлення нації про її власну історію столітньої давнини?
    Феномен «Чорного Ворона».'
  - '[!biography] Василь Шкляр як культурне явище: від журналіста до автора найпопулярнішого роману десятиліття.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Письменник як історик. Чи є твори Шкляра достовірним джерелом про повстанський рух, чи це лише белетристика,
    що використовує історичні декорації?'
  - 'Дебат 2: Відповідальність митця. Чи має автор право на «дописування» історії заради драматичного ефекту, і де межа між
    популяризацією та маніпуляцією?'
  - '[!epistemic-humility] Позиція критиків: звинувачення в однобокості та ідеалізації повстанців. Позиція прихильників: Шкляр
    повернув українцям забуту сторінку героїзму.'
  section: 'Конфліктна карта: Історична правда vs. художня вигадка'
  words: 900
- points:
  - 'Народження в серці України: дитинство в Черкаській області (1951) та формування в радянському контексті.'
  - 'Освіта та кар''єрні кроки: від філологічного факультету до роботи в пресі та політичної журналістики.'
  - 'Ранні жанрові експерименти: перші прозові твори, пошук власного голосу та стилю, що передували історичній прозі.'
  section: 'Формування: Від журналіста до письменника'
  words: 1000
- points:
  - '«Чорний Ворон»: історія створення роману про повстанців Холодного Яру, що став культурним вибухом.'
  - 'Тема антирадянського спротиву як центральна у творчості: дослідження боротьби з більшовиками.'
  - '«Залишенець» та продовження циклу: як Шкляр розвиває тему національно-визвольних змагань у наступних творах.'
  - '[!decolonization] Повернення забутих героїв: роль Шкляра у популяризації історії Холодноярської республіки та спростуванні
    радянських міфів про «бандитів».'
  section: 'Діяльність: Створення історичного епосу'
  words: 1300
- points:
  - '[!anti-hagiography] Баланс між документальністю та белетристикою: де автор жертвує фактами заради сюжету? Аналіз конкретних
    епізодів.'
  - 'Критика з боку професійних істориків: закиди у надмірній героїзації, відсутності півтонів та створенні нового, «правильного»
    міфу замість старого, радянського.'
  - '[!myth-buster] Чи справді Шкляр «відкрив» Холодний Яр? Розвінчання міфу про те, що до нього ця тема була абсолютно невідомою,
    та аналіз його унікального внеску — популяризації.'
  section: 'Тінь: Ціна популярності та звинувачення в однобокості'
  words: 900
- points:
  - 'Повернення до розминки: яку роль відіграє бестселер Шкляра у формуванні сучасної національної пам''яті?'
  - 'Екранізації, адаптації та громадська позиція: вплив письменника виходить за межі літератури.'
  - 'Місце в сучасній літературі: Шкляр — творець якісної масової літератури чи автор, що формує національний канон?'
  - '[!decolonization] Оцінка внеску: наскільки Шкляру вдалося деколонізувати свідомість масового читача щодо періоду Визвольних
    змагань?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: The life and work of Vasyl Shklar, focusing on the "Chornyi Voron" phenomenon, the role of the writer in shaping historical
  memory, and the debate between historical truth and fiction.
level: BIO
module: bio-151
objectives:
- Критично аналізувати феномен «Чорного Ворона» як культурне явище, що впливає на національну пам'ять
- Розрізняти поняття історичної правди та художньої вигадки у творчості Василя Шкляра
- Оцінювати внесок письменника в популяризацію антирадянського спротиву та пов'язані з цим ризики (ідеалізація, спрощення)
- Формулювати власну позицію щодо ролі митця у формуванні історичного наративу нації
pedagogy: CBI
