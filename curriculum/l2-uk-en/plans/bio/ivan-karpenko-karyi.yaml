objectives:
- >-
  Аналізувати соціальну сатиру Карпенка-Карого ("Мартин Боруля", "Сто тисяч", "Хазяїн")
  через точну станову, бюрократичну й фінансову лексику.
- >-
  Пояснювати український театр корифеїв як піднаглядний національний публічний простір,
  сформований імперськими обмеженнями на українськомовний театр.
- >-
  Реконструювати механізм репресії проти Тобілевича (звільнення зі служби, заслання до
  Новочеркаська, таємне стеження) без вигаданих номерів справ.
- >-
  Оцінювати, чому згладжування станового регістру до "простої сільської говірки" стирає
  політичний зміст його сатири.
