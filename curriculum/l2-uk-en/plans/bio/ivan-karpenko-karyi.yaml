content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Карпенком-Карим (справжнє ім'я — Іван Карпович
    Тобілевич): центральний драматург і актор українського театру корифеїв.
  - >-
    Провокаційне питання: чому імперська держава стежила за драматургом і висилала його
    — і чому статус, документи та мова на сцені були політично зарядженими?
  section: Розминка
  words: 400
- points:
  - >-
    Походження й родина: народження 29 вересня 1845 року (за новим стилем) поблизу
    Єлисаветграда (Херсонська губернія); член театральної родини Тобілевичів, брат
    Миколи Садовського, Панаса Саксаганського та Марії Садовської-Барілотті.
  - >-
    Від служби до сцени: робота на цивільній службі передувала становленню Тобілевича
    як драматурга й актора; саме псевдонім "Карпенко-Карий" позначає його професійне
    переродження.
  - >-
    [!decolonization] Український театр корифеїв як національний публічний простір:
    сценічні умови формувалися імперськими обмеженнями на українськомовний театр і
    прямим поліційним наглядом за особою драматурга.
  section: 'Формування: Родина Тобілевичів і театр корифеїв'
  words: 1000
- points:
  - >-
    Соціальна сатира статусу: комедія "Мартин Боруля" (видання НТШ) — рядок "Виходить:
    я — не бидло" робить станове прагнення й образливу лексику відчутними в короткій формі.
  - >-
    Комічний крах фантазії про статус: фрагмент "Тисяча рублів згоріла" згортає
    самооману героя без потреби читати повний акт із першого разу.
  - >-
    Критика накопичення: комедії "Сто тисяч" і "Хазяїн" — вершина сатири на гроші,
    оренду та сільський капіталізм, із точною становою й фінансовою лексикою.
  - >-
    Широта драматургії: "Бурлака", "Бондарівна", "Безталанна", "Наймичка", історична
    трагедія "Сава Чалий", а також "Суєта" та "Житейське море".
  section: 'Діяльність: Драматургія від Мартина Борулі до Хазяїна'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Репресія перервала кар'єру саме на перетині театру, української
    публічної культури й антиімперського товариського життя.
  - >-
    Механізм: 1883 року Тобілевича звільнили зі служби й розпочали слідство
    після того, як він надав притулок Софії Русовій, що перебувала під гласним
    наглядом поліції.
  - >-
    Заслання й нагляд: 1884 року — трирічне заслання до Новочеркаська під
    гласним наглядом; після арештів в українофільському гуртку Єлисаветграда
    його продовжили до грудня 1888 року, а відтоді до 1895 року був негласний
    нагляд і заборона жити в обох столицях та Санкт-Петербурзькій губернії.
  - >-
    [!epistemic-humility] Джерела (ЕІУ та ЕСУ) дають звільнення, заслання й пізніше
    стеження, але не подають ні звинувачувального акта, ні номера справи — тож архівних
    реквізитів ми не вигадуємо.
  section: 'Тінь: Звільнення зі служби, заслання та поліційний нагляд'
  words: 1600
- points:
  - >-
    Що збереглося: п'єси вціліли й стали канонічними; конкретного посилання на поліційну
    справу для цього дослідження не знайдено, тож механізм описано без вигаданих номерів документів.
  - >-
    [!myth-buster] Проти спрощення "проста сільська говірка": діалог Карпенка-Карого
    працює через точну станову, бюрократичну й фінансову лексику — дворянство, чин,
    оренда, гроші, папери; згладжування цього регістру стирає сатиру.
  - >-
    Смерть і визнання: драматург помер 15 вересня 1907 року (за новим стилем) у Берліні;
    його доробок лишився основою українського театру.
  - >-
    Кінцеве питання: як інтегрувати Карпенка-Карого і як реалістичного соціального
    критика, і як будівничого національного театру, поряд із Марком Кропивницьким та
    Марією Заньковецькою.
  section: 'Підсумок: Сцена як національний публічний простір'
  words: 1000
focus: >-
  Іван Карпенко-Карий (Іван Тобілевич) як центральний драматург театру корифеїв:
  соціальна сатира статусу й капіталу в його комедіях, точний становий регістр сцени та
  механізм імперського звільнення, заслання й поліційного нагляду, що супроводжував
  українську театральну культуру.
