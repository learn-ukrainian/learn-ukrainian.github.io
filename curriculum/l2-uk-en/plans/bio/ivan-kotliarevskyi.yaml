content_outline:
- points:
  - 'Парадокс: Як офіцер російської армії, що написав пародію на Вергілія, став "батьком" сучасної української літератури?
    Чи була «Енеїда» свідомим актом культурного будівництва чи простою розвагою?'
  - '[!biography] Іван Котляревський — полтавець, дворянин, військовий, чиновник, що мимоволі запустив процес формування нової
    української нації.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Котляревський як вірний слуга імперії. Його військова кар’єра, участь у російсько-турецькій війні, робота в
    колоніальній адміністрації. Чи це суперечить його ролі в українській культурі?'
  - 'Дебат 2: «Енеїда» — висока література чи "малоросійський" бурлеск? Суперечки навколо статусу твору. Одні бачили в ній
    народження мови, інші — її вульгаризацію.'
  - '[!epistemic-humility] Немає простої відповіді. Він був продуктом своєї епохи — українського дворянства, інтегрованого
    в імперські структури, але ностальгуючого за козацькою автономією.'
  - '[!decolonization] Радянська критика применшувала національне значення Котляревського, зображуючи його "прогресивним діячем,
    що єднав братні народи". Сучасна наука бачить у ньому засновника культурного опору.'
  section: 'Конфліктна карта: Патріот імперії чи батько нації?'
  words: 900
- points:
  - 'Полтавське коріння: народження в сім''ї канцеляриста — середовище, де цінували освіту і українську старовину.'
  - 'Освіта: Полтавська духовна семінарія, де він здобув знання латини, риторики та класичної літератури, що стало основою
    для пародіювання Вергілія.'
  - 'Служба в канцеляріях: перше зіткнення з бюрократичною машиною імперії.'
  - 'Військова служба: участь у російсько-турецькій війні. Не просто дати, а досвід, що сформував його погляд на "простого
    чоловіка" і дав матеріал для образів козаків в «Енеїді».'
  section: 'Формування: Від семінариста до майора (1769-1808)'
  words: 1000
- points:
  - 'Літературна революція «Енеїди»: не просто переклад, а травестія, що перенесла античних героїв в український козацький
    контекст. Використання живої народної мови як літературної — розрив із церковнослов’янською традицією.'
  - '«Наталка Полтавка» та «Москаль-чарівник»: створення перших класичних п''єс українською мовою. Заснування нового українського
    театру.'
  - 'Громадська діяльність: директор Полтавського театру, участь у масонській ложі «Любов до істини», меценатство — спроби
    створити український культурний простір у Полтаві.'
  - 'Мовний зсув: Котляревський довів, що українською мовою можна писати на будь-які теми, від епічної поеми до опери, утвердивши
    її статус.'
  section: 'Діяльність: «Енеїда» та народження українського театру (1798-1838)'
  words: 1300
- points:
  - '[!anti-hagiography] Вірний офіцер імперії: Котляревський не був дисидентом. Він брав участь у війнах імперії і дослужився
    до чину капітана. Чи усвідомлював він, що служить системі, яка нищить українську автономію?'
  - '[!myth-buster] Стереотип "веселого малороса": Чи не закріпив бурлескний стиль «Енеїди» імперський стереотип про українців
    як про простих, смішних і нездатних до "високої" культури? Цей стереотип потім активно використовувала російська пропаганда.'
  - 'Компроміси з владою: його робота директором "Будинку для виховання дітей бідних дворян" — це була просвітницька діяльність
    чи спосіб інтеграції української еліти в імперську систему?'
  - 'Відсутність політичної програми: на відміну від Шевченка, Котляревський не закликав до політичної незалежності. Його
    "українськість" була культурною, а не політичною. Чи це було обмеженням чи єдиною можливою стратегією виживання?'
  section: 'Тінь: Ціна сміху та служби'
  words: 900
- points:
  - 'Повернення до розминки: Як офіцер імперії став "батьком нації"? Студент має сформулювати відповідь, враховуючи «тіньові»
    аспекти його біографії.'
  - 'Спадщина: Котляревський залишив не політичний заповіт, а мову. Він дав наступним поколінням інструмент — живу, кодифіковану
    літературну мову, здатну виражати національну ідентичність.'
  - '[!decolonization] Переоцінка спадщини: відхід від радянського наративу про "дружбу народів" і розуміння Котляревського
    як фігури, що розпочала процес культурної емансипації від імперського центру.'
  - 'Котляревський сьогодні: його твори — це жива класика чи музейний експонат? Як вони звучать в контексті сучасної російсько-української
    війни?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'The paradox of Ivan Kotliarevskyi: an imperial officer who founded modern Ukrainian literature, the anti-hagiographic
  view of his legacy, and the revolutionary impact of "Eneida".'
level: BIO
module: bio-036
objectives:
- Аналізувати біографію Івана Котляревського через призму анти-агіографії, розглядаючи його як в контексті служіння імперії,
  так і в ролі засновника нової української літератури.
- Критично оцінювати значення «Енеїди», розрізняючи її роль як основи літературної мови та потенційне закріплення стереотипу
  "малоросійства".
- Порівнювати різні інтерпретації постаті Котляревського (романтичну, радянську, деколоніальну) та формулювати власну аргументовану
  позицію.
- Застосовувати поняття "травестія", "бурлеск", "класицизм" для аналізу творів Котляревського та його місця в європейському
  літературному процесі.
