content_outline:
- points:
  - 'Провокація: чи можна будувати українську націю через чужі парламенти, сейми й шкільні ради — і яку ціну заплатив Барвінський за стратегію порозуміння з польською більшістю?'
  - '[!biography] Знайомство з постаттю історика, педагога, політика й видавця: голова НТШ (1893-1897), посол до австрійського парламенту й галицького сейму, секретар освіти й віросповідань уряду ЗУНР (1918-1919).'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (органічна праця): Барвінський розширював українську школу, науку й пресу через реальні конституційні можливості — читанки, «Руська історична бібліотека», перетворення НТШ на серйозну наукову інституцію.'
  - 'Позиція 2 (ціна компромісу): стратегія «нової ери» (1890-1894) принесла деякі шкільно-культурні здобутки, але зазнала політичної поразки й підважила його популярність серед багатьох галицьких українців.'
  - '[!decolonization] Габсбурзьку Галичину подаємо як обмежену арену під польським крайовим домінуванням та імперськими інтересами, а не як «імператор дав українцям права».'
  - '[!epistemic-humility] Дату народження тримаємо як робочу — 8 червня 1847 року (ЕСУ, IEU), із приміткою про 6 червня 1847 року за ЕІУ.'
  section: 'Конфліктна карта: Органічна праця чи зрада?'
  words: 900
- points:
  - 'Походження й освіта: с. Шляхтинці (нині Тернопільщина), греко-католицька священницька родина; Тернопільська гімназія та філософський факультет Львівського університету — історія, література, славістика.'
  - 'Педагогічна формація: «Руска читанка» для вищих класів гімназії (1870-1871) робила Шевченка й інших доступними в школі та готувала перехід до фонетичного правопису.'
  - '[!decolonization] Зв''язки з наддніпрянськими діячами (Антонович, Кониський, «Громади») читаємо як спромогу галицького ґрунту вести українську інституційну працю, яку обмежувала Російська імперія, — а не як твердження, що «Галичина була вільна».'
  section: 'Формування: Греко-католицька інтелігенція й галицька школа'
  words: 1000
- points:
  - '«Руська історична бібліотека» (1886-1904): за IEU — 24 томи, редаговані й видані Барвінським за участі Олександра Кониського й за планувальної допомоги Володимира Антоновича; мета — зробити історію «власністю всієї руської суспільності».'
  - 'НТШ (1893-1897): головування під час перетворення Товариства на серйозну наукову інституцію; редагування перших томів «Записок НТШ».'
  - 'Парламент і школа: посол австрійської Державної ради (1891-1907) і галицького сейму, член крайової шкільної ради, довічний член Палати панів (1917) — арени дії, але не суверенні українські інституції.'
  - '[!decolonization] Барвінський обстоював українську шкільну мову й фонетичний правопис проти русофільських течій; старі «руські» ярлики пояснюємо як історичне українське самоназвання в Галичині, а не як російську ідентичність.'
  - 'ЗУНР (1918-1919): секретар освіти й віросповідань — місток до шкільно-мовної політики та державотворення, а не батальна хроніка.'
  section: 'Діяльність: Читанки, «Руська історична бібліотека» й НТШ'
  words: 1300
- points:
  - '[!anti-hagiography] «Нова ера» — польсько-українське порозуміння 1890-х років — центральна тінь біографії: вона не була ні простою зрадою, ні чистою мудрістю, а програла політично й коштувала Барвінському довіри багатьох галицьких українців.'
  - '[!epistemic-humility] Критику опозиційних українських кіл не називаємо «репресією»: це контестована політична стратегія всередині колонізованого бездержавного суспільства.'
  - Механізм обмеження — не арешт чи заслання, а відсутність української державної влади й потреба виторговувати школу, мову й науку в чужих інституціях; після передачі Східної Галичини Польщі (1923) Барвінський відійшов від активної політики.
  - '[!decolonization] Християнсько-соціальну течію й газету «Руслан» подаємо як один із українських політичних варіантів, а не як «клерикальну реакцію» чи «російську ліберальну реформу».'
  section: 'Тінь: «Нова ера» без визнання'
  words: 900
- points:
  - 'Повернення до розминки: як оцінювати «органічну працю» й компроміс, коли немає власної держави, а школа та наука залежать від чужих парламентів?'
  - 'Спадщина як інституції: читанки, «Руська історична бібліотека», зростання НТШ, «Спомини з мого життя» (1912-1913) — джерела західноукраїнської політичної історії.'
  - '[!anti-hagiography] Барвінського часто затінюють Грушевський в історії НТШ і син Василь Барвінський у музичній пам''яті; парне вивчення показує інституційну тяглість без перетворення Олександра на виноску.'
  - '[!decolonization] «Руська історична бібліотека» й гасло про «власність усієї руської суспільності» — галицько-українська, а не російська рамка; пояснюємо семантику «руськості» відкрито.'
  section: 'Дискусія та підсумок: Інституції, компроміс і пам''ять'
  words: 700
focus: 'Oleksandr Barvinskyi (1847-1926) as a Galician Ukrainian institution-builder who used Habsburg constitutional and Galician school structures to widen Ukrainian education, scholarship, publishing and parliamentary representation: the readers, the ''Ruska istorychna biblioteka'', the chairing of the Shevchenko Scientific Society and the ZUNR education secretariat taught as organic work in a stateless society, with the ''nova era'' Polish-Ukrainian compromise kept as the central contested strategy (neither betrayal nor enlightened moderation), Habsburg Galicia framed as a constrained arena rather than an imperial gift, and ''ruskyi''/''ukrainsko-ruskyi'' explained as Galician Ukrainian self-naming, not Russian.'
