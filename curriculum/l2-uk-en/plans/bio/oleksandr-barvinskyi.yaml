objectives:
- Пояснювати Барвінського як будівничого української освіти, науки й преси, що діяв через габсбурзькі конституційні та галицькі шкільні структури, а не як «лоялістичну оздобу Відня».
- 'Тримати «нову еру» як центральну контроверзу: високоставкову стратегію в бездержавному суспільстві, а не «просту зраду» чи «освічену поміркованість».'
- Читати габсбурзьку Галичину як обмежену політично-інституційну арену, а не як «дар імператора».
- Пояснювати «руський» / «українсько-руський» як історичне галицько-українське самоназвання, а не як «російське».
- Показувати греко-католицьке інтелігентське походження як доступ до мереж, без агіографії духовенства й без карикатури «клерикальної реакції».
