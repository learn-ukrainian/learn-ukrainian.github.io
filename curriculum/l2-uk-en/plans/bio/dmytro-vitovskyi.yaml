content_outline:
- points:
  - 'Провокація: у ніч на 1 листопада 1918 року українські вояки в кілька годин зайняли адміністративні, військові й комунальні об''єкти Львова. За приписуваним УІНП гаслом «Буде армія — буде державність» стоїть питання: чому західноукраїнські військові організатори пов''язували державність саме з армією?'
  - '[!biography] Знайомство з постаттю правника-військового: сотник Українських січових стрільців, організатор Листопадового чину, перший командант українських сил у Львові й державний секретар військових справ ЗУНР.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (практичне державотворення): Вітовський — операційний планувальник Листопадового чину, який зробив претензію Української Національної Ради на українські землі Австро-Угорщини конкретною ще до консолідації польських інституцій у Львові.'
  - 'Позиція 2 (антиагіографічна): його важливість не потребує твердження, що він «створив ЗУНР» чи одноосібно здійснив листопадову дію; вона спиралася на рішення УНРади, склад залоги, січові мережі та австрійський крах.'
  - '[!decolonization] Українську пам''ять про «Листопадовий чин» (варіант — «Листопадовий зрив») зіставляємо з польською рамкою «оборони Львова», не приймаючи жодної як нейтральний голос оповідача.'
  - '[!epistemic-humility] Дата загибелі різниться: ЕСУ/ЕІУ дають 4 серпня 1919, Гай-Нижник обґрунтовує 2 серпня, старіша стаття IEU — 8 липня; у низькоконтекстному тексті беремо «1887–1919» й називаємо розбіжність.'
  section: 'Конфліктна карта: Одна ніч і ціла держава?'
  words: 900
- points:
  - 'Походження й освіта: 8 листопада 1887 року, Медуха (нині Івано-Франківщина); гімназія в Станиславові, право у Львівському університеті, виключення 1910 року після українських студентських протестів, завершення студій у Кракові.'
  - 'Громадсько-політична школа: від 1911 року — правнича праця в Станиславові, Українська радикальна партія, «Січ», «Просвіта», парамілітарне й освітнє організування.'
  - 'Перша світова війна й УСС: командир сотні та куреня Українських січових стрільців; згодом — культурно-освітня праця УСС на Волині (Ковель, 1916–1917), де армійська служба означала й школу та мовну політику.'
  section: 'Формування: Правник, стрілець і організатор'
  words: 1000
- points:
  - 'Жовтень–листопад 1918 року: за ЕСУ, від 29 жовтня Вітовський очолив Український військовий генеральний комітет і підготував збройну дію 1 листопада у Львові.'
  - 'Листопадовий чин 1 листопада 1918 року: українські вояки зайняли адміністративні, комунальні й військові об''єкти — Вітовський постає як практична державотворча постать, а не лише символічний промовець.'
  - 'Командування й уряд: перший командант українських сил у Львові 1–5 листопада 1918 року, від 9 листопада — державний секретар військових справ ЗУНР; хронологію рангу (підвищення до полковника) подаємо з джерельними позначками.'
  - 'Весна 1919 року — участь у західноукраїнській делегації / військове дорадництво на Паризькій мирній конференції, де він обстоював українські права проти польської окупації західноукраїнських земель.'
  section: 'Діяльність: Листопадовий чин і військове секретарство'
  words: 1300
- points:
  - '[!anti-hagiography] Командування у Львові було коротким і змінювалося під час листопадових боїв; не варто натякати на тривале керівництво всіма пізнішими кампаніями УГА.'
  - '[!myth-buster] Міфологію УСС (чиста героїчна фольклорність) урівноважуємо тим, що Січові стрільці були також школою друку, дисципліни, освіти й політичної ідеології, а не лише батальним епосом.'
  - 'Австрійська служба доби Першої світової війни — це габсбурзька українська мобілізація й пізніший державний перехід, а не суперечність українській ідентичності.'
  - '[!epistemic-humility] Загибель в авіакатастрофі поблизу Ратібора (нині Рацибуж, Польща) під час повернення в Україну — випадок перерваного державотворчого лідерства; точний день (2 чи 4 серпня 1919) належить до джерельного порівняння.'
  section: 'Тінь: Коротке командування й перервана дипломатія'
  words: 900
- points:
  - 'Повернення до розминки: чому саме приписуване гасло «Буде армія — буде державність» варто читати як джерелознавче запрошення до дискусії, а не як готову істину?'
  - 'Правник-солдат як тип: освіта й військова роль Вітовського показують діячів Української революції як розбудовників інституцій, а не лише збройних командирів.'
  - '[!decolonization] Конфлікт за Львів і Східну Галичину розкладаємо на державні претензії, міську демографію, збройні молодіжні формування, військове командування й цивільну небезпеку — а не на «етнічну долю».'
  - 'Пам''ять: перепоховання Вітовського на Личаківському цвинтарі 2002 року — це меморіальна дія, а не джерело для подій 1918 року; тримаємо історію та вшанування окремо.'
  section: 'Дискусія та підсумок: Держава через армію'
  words: 700
focus: Dmytro Vitovskyi (1887-1919) as the Ukrainian Sich Riflemen officer who organized the November 1918 Lviv action, briefly commanded Ukrainian forces in Lviv, and served as ZUNR State Secretary of Military Affairs, taught so that the November action is a concrete state-formation sequence rather than a single-person origin story; the lawyer-soldier profile, the competing Ukrainian 'November Action' and Polish 'defense of Lwow' memories, the Paris delegation, and the disputed 1919 air-crash death are held as agency, brevity of command, and source-critical uncertainty rather than heroic folklore.
