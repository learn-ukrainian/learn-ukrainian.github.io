content_outline:
- points:
  - '[!biography] Знайомство з Михайлом Кравчуком: видатний математик, професор Київського політехнічного інституту, академік ВУАН.'
  - 'Провокаційне питання: чому радянська влада вбачала загрозу у вченому-математику та його науковій діяльності?'
  section: Розминка
  words: 400
- points:
  - 'Освіта та науковий шлях: навчання та праця в умовах Російської імперії та радянської України. [!epistemic-humility] Розбіжності в датах народження у різних джерелах (12 жовтня чи 27 вересня 1892 року).'
  - 'Науковий внесок: роботи з алгебри та диференціальних рівнянь, авторство "многочленів Кравчука", які отримали світове визнання.'
  section: 'Формування: Математика світового рівня'
  words: 1000
- points:
  - '[!decolonization] Розвиток української науки: Кравчук як один із творців української математичної термінології. Використання термінів "многочлен", "рівняння", "визначник".'
  - 'Педагогічна діяльність: написання підручників українською мовою. Аналіз праці "Застосування способу моментів до розв''язання лінійних диференціальних та інтегральних рівнянь" (1932).'
  section: 'Діяльність: Формування математичної термінології'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм терору: арешт 21 лютого 1938 року НКВС. Сфабриковані політичні звинувачення у "буржуазному націоналізмі" та шпигунстві (розглядаємо як репресивну лексику, а не факт).'
  - '[!epistemic-humility] Засудження 23 вересня 1938 року до 20 років ув''язнення. Відсутність точного номера архівної справи.'
  - Смерть 9 березня 1942 року в системі таборів Колими. Знищення вченого як удар по українській науковій школі.
  section: 'Тінь: Арешт та знищення'
  words: 1600
- points:
  - 'Доля наукової спадщини: багато праць збереглося, зокрема підручники та дослідження многочленів.'
  - 'Сучасне значення: Михайло Кравчук як символ втраченого потенціалу української науки через сталінський терор.'
  section: 'Підсумок: Пам''ять про науковця'
  words: 1000
focus: Михайло Кравчук як видатний український математик, співавтор вітчизняної наукової термінології та жертва радянського терору. Аналіз його внеску у світову науку та механізмів репресій НКВС.
level: BIO
module: bio-286
objectives:
- Аналізувати науковий внесок Михайла Кравчука у світову математику та створення української наукової термінології.
- Досліджувати механізми радянського терору на прикладі справи Кравчука та знищення інтелектуальної еліти.
- Розуміти значення термінів "многочлен", "рівняння" та їх місце у розвитку української STEM-освіти.
- Оцінювати вплив репресій на розвиток української математичної школи.
