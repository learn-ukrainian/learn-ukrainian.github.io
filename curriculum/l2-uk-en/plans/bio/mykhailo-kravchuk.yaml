content_outline:
- points:
  - >-
    [!biography] Михайло Кравчук як математик, педагог, академік і творець
    української наукової термінології; репресія є частиною біографії, але не
    заміною змісту його науки.
  - >-
    [!decolonization] Українські наукові інституції 1917–1930-х років показані
    як середовище власного розвитку, а не провінційний додаток до Москви.
  section: 'Вступ: наука до репресії'
  words: 600
- points:
  - >-
    ЕІУ подає 12 жовтня (30 вересня за старим стилем) 1892 року;
    ЕСУ подає 9 жовтня (27 вересня). Конфлікт спирається лише на ці дві
    прийняті енциклопедії. Без метричного запису модуль не зливає дати.
  - Човниця, Луцька гімназія та Університет святого Володимира в Києві.
  - Учителювання в українських гімназіях і праця в Українському народному університеті.
  section: 'Освіта й розбіжність дати народження'
  words: 800
- points:
  - Університетська, політехнічна та академічна кар'єра; обрання до ВУАН 1929 року.
  - >-
    Праця в правописно-термінологічній комісії та розвиток української математичної мови.
  - >-
    [!anti-hagiography] Кількість праць, коло учнів і міжнародні контакти подаються
    лише за названим джерелом, без легенд про одноосібне створення комп'ютера.
  section: 'Інституції, викладання та математична термінологія'
  words: 1000
- points:
  - Многочлени, моменти та метод моментів у контексті алгебри, аналізу й статистики.
  - >-
    Точна публікація 1932 року «Застосування способу моментів до розв'язання
    лінійних диференціяльних та інтегральних рівнань. Випуск І» читається за
    титульною сторінкою, а не за неточними метаданими сховища.
  - Історичний правопис наукового тексту пояснюється, але не модернізується в назві документа.
  section: 'Наукові результати та українська математична мова'
  words: 1100
- points:
  - 21 лютого 1938 року — арешт; 23 вересня — вирок на двадцять років ув'язнення.
  - Етапування 1939 року до Колими, табірна праця, смерть 9 березня 1942 року.
  - >-
    [!decolonization] Звинувачення в націоналізмі та шпигунстві називаються
    механізмом сталінського терору, а не нейтральним правопорушенням.
  section: 'Арешт, вирок, Колима і смерть'
  words: 1100
- points:
  - Місце поховання залишається невідомим; причина смерті не драматизується понад джерела.
  - >-
    Перегляд і закриття справи 1956 року через відсутність складу злочину
    відрізняються від поновлення в складі Академії 20 березня 1992 року.
  - >-
    [!myth-buster] Слова на пам'ятнику, згадки ЮНЕСКО чи популярні сюжети про
    винахід комп'ютера не замінюють первинної публікації та судової хронології.
  section: 'Реабілітація, академічне поновлення і пам''ять'
  words: 600
focus: >-
  Михайло Кравчук як математик, викладач і діяч українських наукових інституцій;
  точна публікаційна та репресивна хронологія, відкрита розбіжність дати народження
  й відмова від радянського евфемізму та мученицьких домислів.
level: BIO
module: bio-308
objectives:
- Пояснювати математичну, педагогічну й термінологічну працю Михайла Кравчука.
- Читати точну ідентичність української математичної публікації за титульною сторінкою.
- Відтворювати арешт, вирок, етапування, смерть і реабілітацію без вигаданих причинних деталей.
- Порівнювати конфліктні авторитетні дати й розрізняти судову реабілітацію та академічне поновлення.
