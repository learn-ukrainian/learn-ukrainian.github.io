vocabulary_hints:
- word: многочлен
  definition: алгебраїчний вираз із сумою степенів змінної та коефіцієнтами
  pos: ч.
- word: метод моментів
  definition: математичний спосіб наближеного розв'язання та оцінювання через моменти
  pos: ч.
- word: математична термінологія
  definition: система фахових назв і понять, уживаних у математиці
  pos: ж.
- word: академік
  definition: дійсний член академії наук
  pos: ч.
- word: етапування
  definition: примусове перевезення ув'язненої особи між тюрмами або до табору
  pos: с.
- word: Колима
  definition: регіон радянської системи примусових таборів на Далекому Сході
  pos: ж.
- word: реабілітація
  definition: офіційне скасування незаконного засудження та відновлення доброго імені
  pos: ж.
- word: поновлення
  definition: повернення раніше втраченого членства, статусу або права
  pos: с.
- word: розбіжність джерел
  definition: ситуація, коли авторитетні джерела подають різні відомості
  pos: ж.
- word: меморіалізація
  definition: суспільне увічнення пам'яті про людину або подію
  pos: ж.
