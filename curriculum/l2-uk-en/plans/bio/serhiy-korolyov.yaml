objectives:
- Аналізувати життя Сергія Корольова як приклад трагічної долі української інтелігенції в СРСР.
- Критично оцінювати суперечливі інтерпретації його спадщини в російському та українському дискурсах.
- Розрізняти факти біографії від агіографічних або пропагандистських наративів.
- Формулювати власну позицію щодо моральних дилем, з якими стикався Корольов, та його місця в українській історії.
