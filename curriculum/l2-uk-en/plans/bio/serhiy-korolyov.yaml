content_outline:
- points:
  - 'Парадокс: Як жертва сталінського ГУЛАГу, засуджена за «український націоналізм», стала таємним генієм, що вивела Радянський
    Союз у космос?'
  - Корольов був настільки засекречений, що його справжнє ім'я не згадувалося в пресі. Його знали лише як «Головний конструктор».
    Хто ховався за цією маскою?
  - '[!biography] Представлення центральної фігури через ключовий конфлікт її життя.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Внутрішній конфлікт. Чи був Корольов лояльним радянським патріотом, який подолав особисту трагедію, чи цинічним
    прагматиком, який уклав угоду з дияволом, щоб реалізувати свою мрію?'
  - 'Дебат 2: Війна за спадщину. Росія позиціонує його як «великого російського вченого». Україна повертає його в національний
    пантеон як символ вкраденої та відвойованої ідентичності.'
  - '[!decolonization] Аналіз російської практики «привласнення» українських геніїв та стирання їхньої національної ідентичності.'
  - '[!epistemic-humility] Розгляд складності ідентичності в умовах імперії, де освіта та кар''єра часто вимагали русифікації.'
  section: 'Конфліктна карта: Творець імперії чи її жертва?'
  words: 900
- points:
  - Народження в Житомирі в українській родині. Мати, Марія Москаленко, та вітчим, Григорій Баланін, були вчителями, спілкувалися
    українською.
  - Дитинство та юність в Україні (Ніжин, Київ) в часи Української революції та раннього СРСР — формування характеру на тлі
    історичних зламів.
  - Освіта в Київському політехнічному інституті, гурток планеризму. Захоплення небом як втеча від суворої реальності.
  - Ранній вплив Юрія Кондратюка (Олександра Шаргея) — ще одного українського генія космосу, чия праця надихнула Корольова.
  section: 'Формування: Житомир-Ніжин-Київ'
  words: 1000
- points:
  - Створення Групи вивчення реактивного руху (ГВРР/ГІРД) — ентузіазм 20-х, віра в технологічний прорив.
  - Лідерство в Ракетному науково-дослідному інституті. Перші успішні запуски радянських ракет.
  - 'Тріумфи космічної ери: перша міжконтинентальна балістична ракета Р-7 (1957), перший супутник (1957), перший політ людини
    в космос (1961).'
  - 'Роль «Головного конструктора»: абсолютний авторитет, колосальна відповідальність, постійний тиск з боку військових та
    Політбюро.'
  section: 'Діяльність: Від ГІРД до Гагаріна'
  words: 1300
- points:
  - '[!anti-hagiography] Арешт у 1938 році за сфабрикованим звинуваченням у «троцькістській, шкідницькій, антирадянській діяльності»
    та «українському націоналізмі».'
  - Допити, тортури, вибите зізнання. Вирок — 10 років таборів. Подорож на Колиму, де він ледь не загинув.
  - Переведення в «шарашку» — тюремне КБ, де ув'язнені інженери працювали на оборонну промисловість. Робота під керівництвом
    іншого в'язня, Туполєва.
  - '[!myth-buster] Міф про «мудрого Сталіна», який «врятував» інженерів. Реабілітація відбулася лише після його смерті. Здоров''я
    Корольова було назавжди підірване, що призвело до ранньої смерті.'
  - 'Ціна успіху: моральні компроміси, робота на режим, що його знищував, втрачені роки та здоров''я.'
  section: 'Тінь: Арешт, ГУЛАГ, "шарашка"'
  words: 900
- points:
  - 'Повернення до розминки: Як тепер ми можемо відповісти на парадокс Корольова? Ким він був — продуктом системи чи її жертвою,
    що перемогла?'
  - '[!decolonization] Спадщина Корольова як поле битви. Музей космонавтики в Житомирі — акт деколонізації культурного простору.'
  - Його історія — це не лише про космос, а й про стійкість людського духу та про трагедію української інтелігенції в XX столітті.
  - 'Сучасне значення: Корольов як символ українського інтелектуального потенціалу, який Росія століттями намагалася або знищити,
    або привласнити.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Serhiy Korolyov: the paradox of a Gulag victim becoming the architect of the Soviet space program, and the modern-day
  reclamation of his Ukrainian identity from Russian historical narratives.'
