content_outline:
- points:
  - 'Парадокс: Чому поет, що стояв в одному ряду з Франком та Лесею Українкою на з''їзді 1903 року і створив канонічні переклади
    світової класики, сьогодні є однією з найбільш недооцінених постатей свого покоління?'
  - '[!biography] Самійленко як «мовний архітектор» — що означає цей титул і проти чого він боровся?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що є головним внеском Самійленка — його оригінальна (часто сатирична) поезія чи його монументальна перекладацька
    праця? Погляди сучасників vs. оцінка нащадків.'
  - 'Дебат 2: Переклад — це мистецтво чи політичний акт? Позиція «просвітників» (збагачення культури) vs. позиція «спро-тивників»
    (прямий виклик імперським заборонам, що доводив життєздатність мови).'
  - '[!epistemic-humility] Оцінки його сатири варіювалися від захоплення її дотепністю до звинувачень у «дрібнотем''ї» на
    тлі великих соціальних драм.'
  - '[!decolonization] Розгляд перекладацької діяльності як свідомої деколонізаційної практики, спрямованої проти асиміляційних
    політик Російської імперії.'
  section: 'Конфліктна карта: Поет чи перекладач?'
  words: 900
- points:
  - 'Полтавський контекст: народження в Сорочинцях (батьківщина Гоголя — іронічний старт для борця з русифікацією), навчання
    в Полтавській гімназії, вплив традицій Шевченка.'
  - 'Київський період: фізико-математичний факультет, участь у літературних гуртках, знайомство з Лесею Українкою та "Плеядою",
    що сформувало його як митця європейської орієнтації.'
  - 'Соціальне походження: син поміщика та кріпачки — як цей внутрішній конфлікт міг вплинути на його світогляд та творчість?'
  section: 'Формування: Від гоголівської Полтавщини до київських гуртків'
  words: 1000
- points:
  - 'Перекладацький подвиг: робота над Гомером, Данте, Мольєром, Байроном. Аналіз принципів перекладу Самійленка — точність
    vs. художність, створення нових слів та форм.'
  - 'Доказ спроможності: кожен переклад був аргументом проти Валуєвського циркуляру та Емського указу, демонструючи, що українська
    мова здатна передати найскладніші концепти світової літератури.'
  - 'Сатира проти імперії: гумор як єдина дозволена зброя в умовах тотальної цензури. Огляд ключових сатиричних творів, їхні
    мішені (бюрократія, русифікація, псевдопатріотизм) та прихований політичний підтекст.'
  - Журналістська робота в газеті «Рада» та інша публіцистична діяльність.
  section: 'Діяльність: Мова як зброя — переклад і сатира'
  words: 1300
- points:
  - '[!anti-hagiography] Чому оригінальна творчість Самійленка не досягла рівня Франка чи Лесі Українки? Це свідома жертва
    на користь «чорнової» перекладацької роботи чи об''єтивна мистецька межа?'
  - '[!myth-buster] Міф про «тихого інтелігента». Псевдонім «Сивенький» та репутація гумориста могли завадити сприймати його
    як серйозного політичного діяча, хоча його діяльність була послідовним опором.'
  - 'Ціна спеціалізації: чи не завадила його репутація сатирика та перекладача визнанню його ліричної поезії?'
  - 'Останні роки: діяльність в УНР, бідність та забуття в Боярці. Трагічний фінал як символ долі багатьох українських інтелігентів
    тієї доби.'
  section: 'Тінь: В тіні гігантів і компромісів'
  words: 900
- points:
  - 'Повернення до парадоксу: Студент формулює відповідь на питання, чому Самійленко залишився «недооціненим», використовуючи
    аргументи з усього модуля.'
  - 'Спадщина як «мовний архітектор»: внесок Самійленка у формування сучасної літературної мови, термінології та стилістики.
    Його переклади стали школою для наступних поколінь.'
  - '[!decolonization] Самійленко як приклад свідомого мовного вибору та тихого, але впертого культурного спротиву. Його життя
    доводить, що боротьба за мову — це і є боротьба за існування нації.'
  - 'Сучасна релевантність: роль перекладу в сучасній Україні. Чи є переклад досі політичним актом?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
