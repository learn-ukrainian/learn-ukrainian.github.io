content_outline:
- points:
  - 'Провокація: якщо сім''я під обстрілами сама знімає фільм про себе, хто є автором свідчення — режисерка, герої, камера чи монтаж?'
  - '[!biography] Ірина Цілик — українська кінорежисерка, письменниця й сценаристка, чия робота поєднує документальну етику, воєнне свідчення, літературу й кіно.'
  - '[!epistemic-humility] Це жива мисткиня: актуальні проєкти, членства, нагороди й статуси фільмів потрібно перевіряти на момент побудови модуля.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: «Земля блакитна, ніби апельсин» уникає пасивної віктимізації, бо показує сім''ю як співтворців образу, пам''яті й виживання.'
  - 'Позиція 2: будь-яка камера в зоні війни створює ризик естетизації травми, фестивального погляду й нерівної влади між режисеркою, героями та глядачем.'
  - '[!decolonization] Російська війна названа як насильство проти України; фокус лишається на українській агентності й формі свідчення, а не на «пострадянському конфлікті».'
  - '[!epistemic-humility] Не переносимо одну тезу про документальну чесність на всю творчість без джерела; кожен фільм і виступ має власний жанр і дату.'
  section: 'Конфліктна карта: Документалістка війни чи режисерка співтворення?'
  words: 900
- points:
  - 'Київське походження, освіта в університеті театру, кіно і телебачення імені Карпенка-Карого та рання робота між літературою, сценарієм і коротким метром.'
  - 'Письменницька лінія: поезія, проза й дитячі книжки як важлива частина її голосу, а не лише біографічний фон для кіно.'
  - 'Пострадянська українська кіноінфраструктура: обмежені ресурси, фестивальна видимість і потреба вибудовувати власну мову сучасного українського кіно.'
  - 'Рух до документального свідчення: від ранніх робіт до участі в проєктах про війну й жінок у війську.'
  section: 'Формування: Література, кіношкола й пошук форми'
  words: 1000
- points:
  - '«Невидимий батальйон» як контекст жіночої участі у війні та перехід до документальної розмови про військо, гендер і видимість.'
  - '«Земля блакитна, ніби апельсин»: прифронтова сім''я, яка знімає власний фільм, стає прикладом співтворення, а не лише об''єктом чужого погляду.'
  - 'Sundance і Шевченківська премія важливі як маркери рецепції, але українська цінність фільму не залежить тільки від міжнародної нагороди.'
  - '«Я і Фелікс» / «Rock Paper Grenade» як ігровий дебют, адаптація роману Артема Чеха й розмова про 1990-ті, пам''ять, радянсько-афганську травму та дорослішання.'
  section: 'Діяльність: Документальне кіно, адаптація і воєнна пам''ять'
  words: 1300
- points:
  - '[!anti-hagiography] Фестивальні призи не роблять фільм етично бездоганним; семінар має питати, хто контролює кадр, монтаж, контекст і право на вразливість.'
  - 'Мовна реальність прифронтових територій не має ставати русоцентричною рамкою; її пояснюємо через lived context, війну й українську суб''єктність.'
  - 'Родинні зв''язки з Артемом Чехом доречні для «Я і Фелікс», але не мають замінювати аналіз власної режисерської і письменницької роботи Цілик.'
  - 'Поточні проєкти, зокрема анімаційно-документальні задуми про повномасштабне вторгнення, не подаємо як завершені без свіжого джерела.'
  section: 'Тінь: Камера, травма й межі публічного свідчення'
  words: 900
- points:
  - 'Повернення до розминки: студент розподіляє дієслова «знімає», «свідчить», «монтує», «грає себе», «пам''ятає» між режисеркою, героями й глядачем.'
  - '[!decolonization] Цілик важлива для курсу тим, що показує українців не лише як постраждалих від війни, а як творців форми, пам''яті й міжнародної мови свідчення.'
  - 'Порівняння: з Наталією Ворожбит — документальний театр і воєнна драматургія; з Артемом Чехом — прозова пам''ять і адаптація; з Олегом Сенцовим — кіно й політичний тиск.'
  - 'Фінальна вправа: написати короткий етичний протокол для перегляду воєнного документального фільму без експлуатації травми.'
  section: 'Дискусія та підсумок: Хто тримає камеру'
  words: 700
focus: Iryna Tsilyk taught as a living Ukrainian filmmaker, writer, and screenwriter whose documentary and fiction work centers wartime witness, agency, camera ethics, and literary-cinematic adaptation without reducing Ukrainian subjects to passive victims or foreign-festival discovery.
