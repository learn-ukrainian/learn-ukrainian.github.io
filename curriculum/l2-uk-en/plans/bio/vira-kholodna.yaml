content_outline:
- points:
  - 'Парадокс: Як донька полтавського вчителя за три роки стала «королевою екрану» імперії, що розвалювалася, і чому її раптова
    смерть у 25 років досі породжує теорії змови?'
  - '[!biography] Віра Холодна — перша справжня кінозірка, чия слава затьмарювала імператорську родину, а фільми ставали національною
    подією.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська актриса чи російська зірка? Боротьба за культурну належність Холодної. Полтавське походження vs.
    московська кар''єра та мова її фільмів.'
  - 'Дебат 2: «Іспанка» чи вбивство? Аналіз версій смерті — від офіційного медичного висновку до конспірологічних теорій про
    отруєння французькими шпигунами чи більшовиками.'
  - '[!decolonization] Привласнення образу Холодної російською та радянською культурою як інструмент стирання її українського
    коріння.'
  - '[!epistemic-humility] Визнання, що більшість «доказів» у версіях про вбивство є непрямими свідченнями та чутками, а не
    документальними фактами.'
  section: 'Конфліктна карта: Зірка на розломі імперій'
  words: 900
- points:
  - 'Полтавське коріння: народження в родині вчителя, інтелігентне середовище, ранній інтерес до мистецтва.'
  - 'Переїзд до Москви: втрата батька, навчання в гімназії, захоплення балетом та театром.'
  - 'Формативні впливи: світ декадансу, поезія Срібного віку, перші кінематографічні враження — що сформувало її унікальну
    меланхолійну естетику.'
  - 'Шлях до кіно: випадковість чи закономірність? Від участі в аматорських виставах до першої епізодичної ролі, яка змінила
    все.'
  section: 'Формування: Від Полтави до Москви'
  words: 1000
- points:
  - 'Створення екранного образу: «салонна мелодрама» та образ жінки-жертви, що страждає мовчки. Співпраця з режисерами Євгеном
    Бауером та Петром Чардиніним.'
  - 'Феномен популярності: як фільми «Мовчи, смутку, мовчи» та «Життя за життя» перетворили її на об''єкт масового поклоніння.'
  - 'Мистецтво німого кіно: новаторська акторська гра, заснована на мікроемоціях, виразності погляду та пластиці рухів. Як
    вона «говорила» без слів.'
  - 'Вплив на кінематограф: Холодна довела, що актор, а не лише сюжет, може бути головною рушійною силою фільму, заклавши
    основи системи кінозірок.'
  section: 'Діяльність: Королева екрану'
  words: 1300
- points:
  - '[!anti-hagiography] Ескапізм як мистецтво: її героїні страждали від кохання в розкішних декораціях, поки країна гинула
    у вогні Першої світової війни та революції. Чи була її творчість втечею від реальності?'
  - 'Образ як в''язниця: чи стала Холодна заручницею свого екранного амплуа трагічної красуні? Нереалізовані мрії про комедійні
    та драматичні ролі.'
  - '[!myth-buster] Легенда про шпигунку: чутки про зв''язки з французькою контррозвідкою в Одесі. Аналіз джерел цих звинувачень
    та їхня роль у трагічній долі.'
  - 'Загадкові стосунки: складні особисті зв''язки та фінансові залежності, що супроводжували її кар''єру, — ціна, яку довелося
    платити за славу.'
  section: 'Тінь: Ціна слави і війна'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання про феномен Холодної та причини її міфологізації.'
  - 'Спадщина: Холодна залишила не лише фільми, а й модель поведінки кінозірки. Як її образ трансформувався в культурній пам''яті?'
  - '[!decolonization] Відвоювання спадщини: роль Віри Холодної в сучасній українській культурі як символу повернення «вкрадених»
    імен.'
  - 'Вічна актуальність: чому її історія — це не просто розповідь про німе кіно, а драма про талант, славу, війну та крихкість
    життя?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Vira Kholodna: The paradox of a Ukrainian-born star in the imperial cinema, her meteoric rise, artistic innovations
  in silent film, and the enduring mystery of her death.'
level: BIO
module: bio-101
objectives:
- Критично аналізувати феномен Віри Холодної, розрізняючи історичні факти, культурні міфи та імперські наративи.
- Пояснювати специфіку акторської майстерності в німому кіно на прикладі творчості Холодної.
- Формулювати обґрунтовану позицію щодо суперечливих аспектів біографії актриси (культурна ідентичність, причина смерті).
- Дискутувати про роль митця та мистецтва під час соціальних і політичних катаклізмів.
pedagogy: CBI
persona:
