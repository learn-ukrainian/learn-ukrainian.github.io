content_outline:
- points:
  - 'Провокація: Як могла ціла Церква, що існувала 600 років, юридично зникнути за одну ніч? І як одна людина, всупереч волі
    короля та закону, повернула її до життя?'
  - '[!biography] Розгляд парадоксу 1596-1620 років як вступ до ролі Йова Борецького.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Берестейська унія — це возз''єднання церков чи вороже поглинання? Позиція Риму та Речі Посполитої vs позиція
    православних братств та шляхти.'
  - 'Дебат 2: Відновлення ієрархії 1620 року — це акт духовного відродження чи політичний бунт? Легітимність дій патріарха
    Феофана vs звинувачення у державній зраді.'
  - '[!epistemic-humility] Визнання, що обидві сторони мали свої канонічні та політичні аргументи, і конфлікт не був просто
    боротьбою "добра зі злом".'
  - '[!decolonization] Аналіз, як Річ Посполита використовувала релігію як інструмент полонізації та контролю над українськими
    землями.'
  section: 'Конфліктна карта: Унія чи розкол?'
  words: 900
- points:
  - 'Освітній шлях: Львівська братська школа, Краківська академія. Чому освіта була ключовим полем боротьби?'
  - 'Ректорство у Львові та Києві: Борецький як організатор освіти, що формувала нову православну еліту.'
  - 'Соціальний та історичний контекст: світ після Реформації, зростання ролі братств як осередків громадянського суспільства.'
  - 'Переломний момент: як вчений-гуманіст став лідером національно-релігійного опору?'
  section: 'Формування: Від ректора до патріота'
  words: 1000
- points:
  - Прибуття єрусалимського патріарха Феофана до України — дипломатична гра та таємні домовленості з козаками.
  - 'Підготовка до висвячення: конспірація, роль Петра Сагайдачного та козацького війська у захисті патріарха.'
  - 'Хроніка подій: нічне висвячення єпископів та Йова Борецького на митрополита в умовах повної таємності.'
  - 'Політичні наслідки: легалізація ієрархії де-факто, але не де-юре. Реакція короля Сигізмунда III, оголошення Борецького
    та єпископів зрадниками.'
  section: 'Діяльність: Таємне висвячення 1620 року'
  words: 1300
- points:
  - '[!anti-hagiography] Борецький — не лише духовний лідер, а й жорсткий політик. Чи не зробила його безкомпромісна позиція
    неможливим будь-який діалог з уніатами?'
  - 'Союз із козацтвом: чи не була це "угода з дияволом"? Церква отримала захист, але стала залежною від військової сили та
    її політичних амбіцій.'
  - 'Ескалація конфлікту: дії Борецького різко підвищили ставки, перетворивши релігійну полеміку на відкритий політичний конфлікт,
    що став одним з детонаторів Хмельниччини.'
  - '[!myth-buster] Спростування міфу про суто "духовний" характер опору. Це була боротьба за владу, землю та вплив, загорнута
    в релігійну риторику.'
  section: 'Тінь: Ціна спротиву'
  words: 900
- points:
  - 'Повернення до розминки: студент, маючи повну картину, пояснює механізм "зникнення" та "відродження" православної ієрархії.'
  - 'Оцінка спадщини: Борецький зберіг українське православ''я від асиміляції, але ціною глибокого розколу суспільства та
    ескалації напруги.'
  - '[!decolonization] Значення 1620 року як акту утвердження суб''єктності України, її здатності діяти всупереч волі імперського
    центру.'
  - 'Сучасна релевантність: як приклад Борецького використовується в сучасних дискусіях про автокефалію та роль церкви в державі?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The 1620 restoration of the Orthodox hierarchy by Iov Boretskyi, the role of brotherhoods, and the religious-political
  struggle after the Union of Brest.
level: BIO
module: bio-017
objectives:
- Критично оцінювати роль Йова Борецького у відновленні православної ієрархії, враховуючи політичні та релігійні мотиви
- Аналізувати братський рух як форму громадянського опору та його зв'язок із козацтвом
- Розрізняти ключові аргументи православної та уніатської сторін у полемічній літературі початку XVII ст.
- Формулювати власну позицію щодо спадщини Борецького, визнаючи як його досягнення, так і 'тіньові' аспекти його діяльності
