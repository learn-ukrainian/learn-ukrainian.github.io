content_outline:
- points:
  - 'Провокація: Нестор Махно — селянський анархіст, що будував вільні ради, чи «бандит» радянських наративів — чи водночас лідер руху, здатного бути й учасницьким, і примусовим? Чому одне слово «махновщина» означає протилежне в різних джерелах?'
  - '[!biography] Бідний селянський син із Гуляйполя, в''язень царської тюрми, командир повстанської армії — і зрештою вбогий емігрант, що помер у Парижі 1934 року.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники й табори): для частини селян — захисник землі й самоврядування; для більшовиків — небезпечний конкурент, а згодом «бандит»; для білих — ворог; жертви насильства доби бачили ще інше.'
  - 'Дебат 2 (пам''ять): радянські наративи роблять «махновщину» синонімом бандитизму й хаосу; анархістська контрпам''ять — лібертарним героїзмом. Обидві рамки сплощують сільську історію.'
  - '[!decolonization] Осердя — Гуляйполе, селянське самоврядування, земельні комітети, Революційна повстанська армія України; Махно не «персонаж російської громадянської війни», а українська сільська агентність.'
  - '[!epistemic-humility] Титул «Батько Махно» й прізвище-варіант «Міхненко» — це маркер пам''яті й родинна форма, а не привід міфологізувати харизму чи вигадати другу ідентичність.'
  section: 'Конфліктна карта: анархіст, «бандит» чи складна воєнна постать?'
  words: 900
- points:
  - 'Походження: бідна велика селянська родина в Гуляйполі; рання смерть батька, наймитування, від 1903 року — праця на ливарні Кернера.'
  - '1905-1917: політизація під впливом подій 1905 року, анархістські гуртки, арешт, вирок і роки тюрми до амністії 1917 року.'
  - '1917: після Лютневої революції повернення в Гуляйполе, участь у радах, селянських комітетах, перерозподілі землі й революційній самоорганізації.'
  - '[!decolonization] Рух виростає із сільського перерозподілу землі й збройної самооборони після імперського краху, а не лише з абстрактної ідеології.'
  section: 'Формування: Гуляйполе, тюрма й анархізм'
  words: 1000
- points:
  - 'Антиокупаційне повстання 1918 року: партизанська війна проти німецько-австрійських окупантів і відновлення панських маєтків за гетьманату після Берестейського миру.'
  - 'Багатофронтова громадянська війна: за міжнародними довідниками — бої з більшовиками, білими й українськими національними силами; рух як мінлива, а не стала сторона.'
  - 'Військова культура: мобільна тактика, дисципліновані добровольчі частини, кіннота й тачанки — вояцьке нововведення, а не сама лише фольклорна картинка.'
  - '[!anti-hagiography] Ідейне ядро й примус водночас: махновські «вільні ради» й локальна участь співіснували з реквізиціями, воєнним насильством і вразливістю до міфотворення. Це і є центральне семінарське питання.'
  - 'Конфлікт із більшовиками був не лише тактичним: відданість місцевому селянському контролю й вільним радам зіштовхувалася з партійно-державною централізацією й дисципліною Червоної армії.'
  section: 'Діяльність: повстанська армія й вільні ради, 1918-1921'
  words: 1300
- points:
  - '[!anti-hagiography] Погромна катастрофа: за YIVO та дослідженнями (Бемпорад/Quest) 1918-1921 роки в Україні — час масового антиєврейського насильства багатьох збройних сил. Цю катастрофу не можна стирати.'
  - 'Докази й обережність: Махнові тексти 1927 року («До євреїв усіх країн», «Махновщина й антисемітизм») заперечують організовану погромну політику й вимагають доказів; це первинна самозахисна полеміка, а не остаточне виправдання. Так само широка катастрофа не дає підстав приписувати недоведену командну відповідальність.'
  - '[!decolonization] Російські/радянські наративи «бандитизму» й «відновлення ладу» — це полемічна оптика; але критика радянської демонізації не має ставати некритичним лібертарним міфом.'
  - 'Пам''ять цивільних: менонітські та інші місцеві свідчення (Паттерсон) конкурують з анархістськими мемуарами; жоден архів пам''яті не єдиний.'
  section: 'Тінь: погроми, звинувачення й межі виправдань'
  words: 900
- points:
  - 'Повернення до розминки: чи може рух бути водночас антидержавним, учасницьким — і примусовим та насильницьким? Це і є теза семінару.'
  - 'Порівняння: пара з матеріалами про Петлюру показує, чому «хто чинив погроми?» — серйозне історичне питання про докази й командну відповідальність, а не пропагандистське гасло; порівняння із Залізняком нагадує, як контрольована територія й насильство співіснують у пам''яті про повстання.'
  - '[!epistemic-humility] Модерна інтернет-романтизація (прапори, гасла, «реставровані» портрети) не постачає фактів; вигнання, паризька смерть і полеміка закривають біографію як перехід від сільського командира до вбогого емігранта.'
  section: 'Дискусія та підсумок: держава, насильство й пам''ять'
  words: 700
focus: 'Nestor Makhno as leader of the 1918-1921 peasant anarchist insurgency around Huliaipole: land war, free soviets and mobile warfare against occupation, Whites and Bolshevik centralization, read with statehood and civil-war alliances kept distinct, the pogrom-era catastrophe and Makhno''s own anti-pogrom texts held in tension, and neither Soviet "bandit" demonization nor libertarian hagiography allowed to settle the record.'
level: BIO
module: bio-338
objectives:
- Пояснювати махновський рух як селянське повстання довкола перерозподілу землі, самоврядування й збройної самооборони після імперського краху, а не лише як абстрактну ідеологію чи «бандитизм».
- 'Простежувати мінливі союзи й розриви громадянської війни: опір німецько-австрійській окупації та гетьманату, змінні стосунки з більшовиками, боротьбу з білими й напругу з УНР/Директорією — не зводячи всіх супротивників в один табір.'
- Відрізняти документовану погромну катастрофу 1918-1921 років, звинувачення проти махновців, антипогромні тексти самого Махна (1927) і пізнішу історіографію — не використовуючи ні радянську демонізацію, ні лібертарну агіографію як готову відповідь.
- Розрізняти політичну доктрину (анархізм, вільні ради), рух (махновщина) і полемічний ярлик; показувати, що «анархія» як «хаос» — це полемічне, а не нейтральне вживання.
