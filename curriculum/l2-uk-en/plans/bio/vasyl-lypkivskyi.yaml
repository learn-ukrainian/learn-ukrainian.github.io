focus: Василь Липківський як творець і перший митрополит відродженої Української автокефальної православної
  церкви (УАПЦ), його пастирська діяльність та знищення НКВС під час радянського терору.
level: BIO
module: bio-320
objectives:
- Досліджувати роль Василя Липківського у відродженні Української автокефальної православної церкви (УАПЦ)
  1921 року.
- Розуміти історичне та культурне значення першого українськомовного богослужіння.
- 'Аналізувати механізми радянського тиску на церкву: ліквідація УАПЦ та репресії проти духівництва.'
- Оцінювати деколоніальний характер руху за автокефалію, розрізняючи рішення собору 1921 року та особисту
  роль митрополита.
