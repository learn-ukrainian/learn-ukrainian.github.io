content_outline:
- points:
  - '[!biography] Знайомство з Василем Липківським: перший митрополит відродженої УАПЦ, богослов, перекладач
    та провідник українського православ''я.'
  - 'Провокаційне питання: чому відновлення української літургії та автокефалії радянська влада розцінила
    як загрозу та "антирадянську агітацію"?'
  section: Розминка
  words: 400
- points:
  - 'Освіта та діяльність: походження зі старовинного священницького роду, навчання у Київській духовній
    академії. Звільнення з викладання 1905 року через ліберальні погляди та "українофільство".'
  - '[!decolonization] Вихід з-під російського імперського впливу: участь у Братстві Воскресіння Христа
    та перше українськомовне богослужіння 1919 року у Микільському соборі Києва як пастирський злам.'
  section: 'Формування: Шлях до автокефалії'
  words: 1000
- points:
  - 'Творення УАПЦ: собор у жовтні 1921 року в Софії Київській, проголошення автокефалії та обрання Липківського
    митрополитом Київським і всієї України.'
  - 'Пастирська праця: переклади богословських і літургійних текстів українською мовою. Аналіз його концепції
    "Не нову церкву для нашого народу ми утворюємо" як відновлення питомої традиції.'
  section: 'Діяльність: Творення УАПЦ'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм радянського тиску: Липківський зазнавав поліцейського нагляду, арештів
    та звільнень. Примусове усунення від митрополичого служіння під тиском держави у 1927 році.'
  - 'Дві стадії знищення: 1929 року влада оголосила УАПЦ "однією з ланок антирадянського підпілля" і розпустила
    її, а надзвичайний собор у січні 1930 року ліквідував церкву остаточно.'
  - 'Останній арешт 22 жовтня 1937 року. Вирок особливої трійки при Київському управлінні НКВД за "антирадянську
    агітацію у великих розмірах"; розстріл 27 листопада 1937 року в Києві. Місце поховання джерела подають
    розбіжно: припущення про Биківню проти прямого твердження про невідоме місце.'
  section: 'Тінь: Переслідування та знищення'
  words: 1600
- points:
  - '[!epistemic-humility] Доля спадщини: фізичне знищення інституційної структури УАПЦ, проте збереження
    рукопису "Історії Української Православної Церкви" (переданого на Захід) та пам''яті про митрополита.'
  - 'Церковний акт: канонізація УАПЦ 1997 року як визнання його мучеництва. Сучасне значення фігури Липківського
    як символу духовної стійкості.'
  section: 'Підсумок: Пам''ять про митрополита'
  words: 1000
