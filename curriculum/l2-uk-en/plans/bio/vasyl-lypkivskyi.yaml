content_outline:
- points:
  - '[!biography] Знайомство з Василем Липківським: перший митрополит відродженої УАПЦ, богослов, перекладач та провідник українського православ''я.'
  - 'Провокаційне питання: чому відновлення української літургії та автокефалії радянська влада розцінила як загрозу та "антирадянську агітацію"?'
  section: Розминка
  words: 400
- points:
  - 'Освіта та діяльність: походження зі старовинного священницького роду, навчання у Київській духовній академії. Звільнення з викладання 1905 року через ліберальні погляди та "українофільство".'
  - '[!decolonization] Вихід з-під російського імперського впливу: участь у Братстві Воскресіння Христа та перше українськомовне богослужіння 1919 року у Микільському соборі Києва як пастирський злам.'
  section: 'Формування: Шлях до автокефалії'
  words: 1000
- points:
  - 'Творення УАПЦ: собор у жовтні 1921 року в Софії Київській, проголошення автокефалії та обрання Липківського митрополитом Київським і всієї України.'
  - 'Пастирська праця: переклади богословських і літургійних текстів українською мовою. Аналіз його концепції "Не нову церкву для нашого народу ми утворюємо" як відновлення питомої традиції.'
  section: 'Діяльність: Творення УАПЦ'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм радянського тиску: Липківський зазнавав поліцейського нагляду, арештів та звільнень. Примусове усунення від митрополичого служіння під тиском держави у 1927 році.'
  - Ліквідація УАПЦ 1929 року як етап системного знищення українського незалежного духівництва. Церкву таврували як антирадянське підпілля.
  - 'Останній арешт 22 жовтня 1937 року. Вирок: розстріл особливою трійкою НКВС за звинуваченням в "антирадянській агітації". Страта 27 листопада 1937 року в Києві (імовірне місце поховання — Биківня).'
  section: 'Тінь: Переслідування та знищення'
  words: 1600
- points:
  - '[!epistemic-humility] Доля спадщини: фізичне знищення інституційної структури УАПЦ, проте збереження рукопису "Історії Української Православної Церкви" (переданого на Захід) та пам''яті про митрополита.'
  - 'Церковний акт: канонізація УАПЦ 1997 року як визнання його мучеництва. Сучасне значення фігури Липківського як символу духовної стійкості.'
  section: 'Підсумок: Пам''ять про митрополита'
  words: 1000
focus: Василь Липківський як творець і перший митрополит відродженої Української автокефальної православної церкви (УАПЦ), його пастирська діяльність та знищення НКВС під час радянського терору.
level: BIO
module: bio-320
objectives:
- Досліджувати роль Василя Липківського у відродженні Української автокефальної православної церкви (УАПЦ) 1921 року.
- Розуміти історичне та культурне значення першого українськомовного богослужіння.
- 'Аналізувати механізми радянського тиску на церкву: ліквідація УАПЦ та репресії проти духівництва.'
- Оцінювати деколоніальний характер руху за автокефалію та прагнення "вискочити з-під московської церковної влади".
