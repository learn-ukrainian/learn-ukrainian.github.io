content_outline:
- points:
  - 'Парадокс: людина, яку засудили до смертної кари за спробу вивести Україну з СРСР, через 30 років стала автором документу,
    що це зробив. Як це стало можливим?'
  - '[!biography] Лук''яненко — юрист, що кинув виклик імперії, використовуючи її ж закони.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Юридичний): Чи була програма УРСС державною зрадою, чи законним прагненням до самовизначення, гарантованого
    конституцією СРСР? Позиція КДБ vs логіка Лук''яненка.'
  - 'Дебат 2 (Історичний): Лук''яненко — ідеаліст-одинак чи прагматичний лідер, що втілив вікові прагнення нації? Його роль
    у порівнянні з іншими дисидентами та національними рухами.'
  - '[!epistemic-humility] Оцінки його ролі після 1991 року розходяться: від "батька нації" до "дисидента, не готового до
    реальної політики".'
  - '[!decolonization] Лук''яненко свідомо відкинув шлях збройної боротьби УПА, запропонувавши легальний, "парламентський"
    шлях до незалежності.'
  section: 'Конфліктна карта: Право проти сили'
  words: 900
- points:
  - Селянське походження на Чернігівщині та його вплив на світогляд.
  - Навчання на юридичному факультеті Московського університету — парадоксальне місце для народження українського дисидента.
  - Поворотний момент: усвідомлення колоніального становища України та формування ідеї мирного спротиву.
  - Початок кар'єри адвоката як інструмент для майбутньої боротьби.
  section: 'Формування: Від радянського студента до українського націоналіста'
  words: 1000
- points:
  - 'Текст №1: Програма Української робітничо-селянської спілки (1959). Створення підпільної організації, що ставила за мету
    мирний вихід України з СРСР.'
  - Арешт, суд 1961 року: смертний вирок як реакція системи на юридичний виклик.
  - '27 років ув''язнення та заслання: перетворення на одного з лідерів дисидентського руху, співзасновник Української Гельсінської
    групи.'
  - 'Текст №2: Акт проголошення незалежності України (1991). Тріумфальне повернення та написання ключового документу новітньої
    історії.'
  section: 'Діяльність: Два головні тексти життя'
  words: 1300
- points:
  - '[!anti-hagiography] Чи не була ідея "мирного виходу" з СРСР у 1960-х наївною утопією, що призвела до десятиліть ув''язнень
    для нього та його соратників?'
  - Політична кар''єра після 1991: критики зазначали, що його безкомпромісність, яка була силою в дисидентстві, стала слабкістю
      в державній політиці.
  - '[!myth-buster] Лук''яненко не був "самотнім героєм". Він діяв у широкому контексті дисидентського руху, де були різні
    погляди на стратегію і тактику.'
  - Особиста ціна боротьби: 27 років, втрачених для вільного життя. Чи виправдала мета такі жертви?
  section: 'Тінь: Ціна ідеалізму'
  words: 900
- points:
  - 'Повернення до розминки: Лук''яненко довів, що ідея, підкріплена правом, може виявитися сильнішою за тоталітарну репресивну
    машину.'
  - '[!decolonization] Його спадщина — це утвердження ідеї неперервності української державності та перехід боротьби в легальне,
    правове поле.'
  - Сучасне значення: Акт незалежності, написаний Лук'яненком, є юридичною та моральною основою сьогоднішнього спротиву України
      російській агресії.
  - Його життя як приклад того, що одна людина може змінити хід історії, не вдаючись до насилля.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Levko Lukyanenko, focusing on his journey from a political prisoner sentenced to death for advocating peaceful
  secession to becoming the author of Ukraine's Act of Independence.
