objectives:
- Аналізувати життя та спадщину Левка Лук'яненка в контексті боротьби за незалежність України.
- Критично оцінювати стратегію мирного, юридичного опору тоталітарному режиму.
- Розрізняти історичну постать та її сучасні інтерпретації, застосовуючи принципи анти-агіографії.
- Пояснювати юридичне та історичне значення Акту проголошення незалежності України.
