objectives:
- Аналізувати роль Оксани Мешко у заснуванні та діяльності Української Гельсінської групи.
- Досліджувати механізми радянських репресій — Гулаг, каральну психіатрію та заслання — на прикладі її
  біографії.
- Розрізняти документований факт і романтизований образ «козацької матері», застосовуючи принципи анти-агіографії.
- Оцінювати значення правозахисного руху і свідчення (мемуар «Між смертю і життям») для української історичної
  пам'яті.
