content_outline:
- points:
  - '[!biography] Знайомство з Оксаною Мешко — хімік за фахом, що стала фактичною головою Української
    Гельсінської групи в період масових арештів КДБ наприкінці 1970-х років. У народній пам''яті — «козацька
    матір».'
  - 'Провокаційне питання: як жінка, чию родину знищив ранній радянський терор, у віці за сімдесят очолила
    відкритий правозахисний спротив імперії?'
  section: Розминка
  words: 400
- points:
  - Народження 1905 року в містечку Старі Санжари над Ворсклою (нині Полтавський район Полтавської області)
    у козацькій родині; здобуття хімічної освіти в Інституті народної освіти в Дніпрі (1931).
  - '[!decolonization] Рання радянська трагедія родини: у грудні 1920 року комуністи розстріляли її батька,
    узятого заручником через хлібну розкладку; невдовзі вбили сімнадцятирічного брата, члена «Просвіти».'
  - Перший арешт 19 лютого 1947 року в Києві за сфабрикованим звинуваченням і десять років виправно-трудових
    таборів (Ухта, Комі АРСР, 1947–1954).
  - '[!epistemic-humility] Документальні різночитання: реєстрові джерела подають по батькові як Яківна
    (канонічне) та Омелянівна, а дату народження — як 30 або 20 січня 1905 року. Це документальні варіанти,
    а не суперечка про особу.'
  section: 'Формування: Полтавське коріння та перша хвиля терору'
  words: 1000
- points:
  - 'Заснування Української Гельсінської групи (1976): Мешко — членкиня-засновниця, що відстоювала Гельсінські
    угоди як інструмент захисту прав людини в УРСР.'
  - '[!anti-hagiography] Не публічна політикиня, а літня жінка, яка свідомо стала фактичною головою групи
    саме тоді, коли органи держбезпеки (КДБ) заарештовували її товаришів одного за одним наприкінці 1970-х
    років.'
  - 'Документ «Ляментація» (1979), співавторство з Ніною Строкатою та Іриною Сеник: викриття сфабрикованих
    справ і державного терору проти правозахисного руху.'
  - Мати дисидента-шістдесятника Олеся Сергієнка; родина як частина спротиву, а не лише його жертва.
  - Цитата з «Ляментації» про «ескалацію державного терору і наклепів проти учасників правозахисного руху
    в Україні» як зразок мови опору (державний терор, наклеп, правозахисний рух).
  section: 'Діяльність: Українська Гельсінська група та «Ляментація»'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм терору не зупинявся на ув''язненні: проти фактичної голови УГГ держава
    застосувала каральну психіатрію.'
  - Повторний арешт 14 жовтня 1980 року; примусова «судово-психіатрична» експертиза в київській лікарні
    імені Павлова, де її утримували близько двох з половиною місяців 1980 року.
  - 'Вирок у січні 1981 року: шість місяців ув''язнення та п''ять років заслання; майже сімдесятишестирічну
    жінку відправили в Аян на узбережжі Охотського моря (Хабаровський край).'
  - '[!decolonization] Назвати механізм прямо: органи держбезпеки (КДБ) і суд УРСР переслідували її за
    «антирадянську агітацію і пропаганду» — це формулювання репресій, а не провина.'
  - '[!myth-buster] Епітет «козацька матір» здатний романтизувати її образ і затулити конкретні жорстокості
    — каральну психіатрію та далекосхідне заслання у поважному віці.'
  section: 'Тінь: Гулаг, каральна психіатрія та заслання'
  words: 1600
- points:
  - Повернення із заслання наприкінці 1985 року; 1990 року значною мірою її зусиллями створено Український
    комітет «Гельсінкі-90».
  - 'Свідчення, що вціліло: мемуар «Між смертю і життям» (Нью-Йорк, 1981 / Київ, 1991) та книга свідчень
    «Свідчу» (1996).'
  - Смерть 2 січня 1991 року в Києві; похована на Байковому кладовищі.
  - '[!decolonization] Сучасне значення: задокументована історія її родини спростовує російські наративи,
    що применшують ранній радянський терор; Мешко — місток між поколіннями правозахисного руху.'
  section: 'Підсумок: «Козацька матір» — пам''ять і міф'
  words: 1000
focus: Оксана Мешко як членкиня-засновниця і фактична голова Української Гельсінської групи; аналіз радянського
  механізму репресій — Гулагу, каральної психіатрії та заслання — і ролі правозахисного руху в обороні
  людської гідності.
