content_outline:
- points:
  - 'Парадокс: Як один пілот, що не був генералом, зміг змінити стратегію повітряної війни та стати найефективнішим лобістом
    F-16 для України?'
  - 'Позивний «Juice» як місток між Україною та Заходом: символ льотчика, що вільно говорить англійською та мислить західними
    стандартами.'
  - '[!biography] Пільщиков як символ модернізації Повітряних сил ЗСУ — поєднання бойової майстерності та дипломатичного хисту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Публічна адвокація vs. тиха дипломатія. Чи була медійна кампанія Juice ефективнішою за закриті переговори генералів
    у просуванні F-16?'
  - 'Дебат 2: Міф про «Привида Києва». Це була корисна для морального духу легенда чи шкідлива дезінформація, що відволікала
    від реальних потреб авіації, про які говорив Juice?'
  - '[!epistemic-humility] Оцінка ефективності різних стратегій впливу: що насправді переконало західних партнерів надати
    літаки — емоційні інтерв''ю чи розрахунки штабів?'
  section: 'Конфліктна карта: Голос пілота vs. Система'
  words: 900
- points:
  - 'Дитинство у Харкові та мрія про небо: як оточення та родина вплинули на вибір професії.'
  - 'Навчання в ХНУПС ім. Кожедуба: здобуття базових навичок у рамках пострадянської системи підготовки.'
  - 'Переломний момент: участь у навчаннях «Чисте небо» (2018) — перше знайомство із західними стандартами та філософією ведення
    бою.'
  - 'Криза та повернення: короткий період в «Укроборонпромі» та свідоме повернення в авіацію напередодні повномасштабного
    вторгнення.'
  section: 'Формування: Шлях до кабіни винищувача'
  words: 1000
- points:
  - 'Бої за Київ: перші тижні вторгнення, роль тактичної авіації у захисті столиці.'
  - 'Народження медійної кампанії: як Juice став голосом українських пілотів для західної аудиторії.'
  - '«Дипломатія винищувачів»: поїздки до США, виступи у Конгресі, спілкування з ключовими міжнародними медіа (CNN, BBC, Fox
    News).'
  - 'Формування «коаліції винищувачів»: аналіз впливу публічної діяльності Пільщикова на політичні рішення західних урядів.'
  section: 'Діяльність: Адвокація F-16 та дипломатія винищувачів'
  words: 1300
- points:
  - '[!anti-hagiography] Внутрішній конфлікт: опір змінам усередині Повітряних Сил. Juice боровся не лише з ворожими літаками,
    а й з бюрократією та застарілими радянськими підходами.'
  - 'Тягар відповідальності: психологічний тиск та особиста ціна, яку Пільщиков платив за роль «обличчя авіації».'
  - '[!myth-buster] Juice не був «Привидом Києва». Він сам розвінчував цей міф, намагаючись донести, що успіх у небі — це
    результат командної роботи, а не подвигів одинака.'
  - 'Обставини авіакатастрофи на Житомирщині: трагедія як наслідок інтенсивної бойової підготовки та ризиків, що є буденністю
    для пілотів.'
  section: 'Тінь: Ціна змін та вага символу'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь, як одному пілоту вдалося стати каталізатором стратегічних змін.'
  - '[!decolonization] Спадщина Juice — це не лише майбутні F-16, а й ментальний злам: остаточний відхід від радянської та
    перехід до західної військової культури в авіації.'
  - Прибуття F-16 в Україну як пряме втілення мрії та праці Пільщикова. Його спадщина — це нові професійні стандарти, за якими
    житимуть наступні покоління пілотів.
  - 'Вшанування пам''яті: як суспільство та держава осмислюють роль Juice після його загибелі.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
