content_outline:
- points:
  - >-
    [!biography] Знайомство з Олексою Івановичем Тихим: вчитель фізики, математики й української
    мови, автор самвидаву, співзасновник Української Гельсінської групи, політв'язень.
  - >-
    Провокаційне питання: чому радянська система переслідувала вчителя з Донбасу за те, що він
    вимагав звичайних мовних і громадянських прав?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 27 січня 1927 року на хуторі Їжівка (Костянтинівський район, Донеччина); селянське
    походження; навчання в Запорізькому сільськогосподарському інституті, Дніпропетровському
    інституті інженерів транспорту, філософському факультеті Московського університету.
  - >-
    Робота вчителем; пізніше — фізична праця після заборони викладати через політичні переслідування.
  - >-
    [!decolonization] Перший арешт 1948 року за критику єдиного офіційного кандидата — рання
    ознака опору радянській номінальній «демократії».
  section: 'Формування: Від вчителя до мовного правозахисника'
  words: 1000
- points:
  - >-
    Есе *Думки про рідний донецький край* (1972) порушує питання історичної пам'яті, мовних прав і
    місця Донеччини в Україні; дослівні цитати можливі лише після встановлення видання й локатора.
  - >-
    Рукопис *Мова-народ* / *The Language of a People. The People* (1976) — конфіскований під
    час обшуку 15 червня 1976 року.
  - >-
    Підписи під Декларацією та Меморандумом №1 Української Гельсінської групи (1976); співзаснування
    УГГ як моніторинг прав людини після Гельсінських угод.
  section: 'Діяльність: Мова, самвидав і засновник УГГ'
  words: 1200
- points:
  - >-
    Арешт 15 лютого 1957 року за лист протесту проти вторгнення Варшавського Договору в Угорщину
    та критику радянської школи; вирок 18 травня 1958 року — 7 років таборів суворого режиму
    і 5 років позбавлення прав (ст. 54-10 КК УРСР, Сталінський обласний суд).
  - >-
    Повторний арешт 5 лютого 1977 року; вирок 21 липня 1977 року — 10 років табору особливого
    режиму і 5 років заслання; спільний процес «Руденко — Тихий» у Дружківці; звинувачення за
    ст. 62 ч. 2 і підкинуту рушницю (за даними Вікіпедії).
  - >-
    Відбування покарання в мордовських таборах, Владимирській в'язниці, таборі особливого режиму
    ВС-389/36-1 (Кучино, Пермщина).
  - >-
    [!anti-hagiography] [!epistemic-humility] Смерть 6 травня 1984 року в лікарні табору (Перм);
    точний номер архівної справи в джерелах не знайдено — не вигадувати.
  section: 'Тінь: Табори, процес у Дружківці та смерть у неволі'
  words: 1600
- points:
  - >-
    [!myth-buster] Російські наративи подають мовний активізм у Донбасі як «штучний»; тексти
    Тихого локалізують боротьбу за мову всередині регіону.
  - >-
    Варіанти імені Олекса/Олексій у джерелах — зафіксувати без нав'язування однієї форми.
  - >-
    Посмертні видання та пам'ять про правозахисника мови; зв'язок із загальним руслом дисидентського
    руху 1970–1980-х.
  section: 'Підсумок: Мовні права Донбасу та ціна правди'
  words: 1000
focus: >-
  Олекса Тихий — вчитель і правозахисник мови з Донбасу, співзасновник УГГ, політв'язень, який
  загинув у радянському таборі. Аналіз самвидавних текстів, механізмів репресій і деколонізаційного
  контексту мовних прав у регіоні.
