content_outline:
- points:
  - >-
    [!biography] Знайомство з Олексою Івановичем Тихим: вчитель фізики, математики й української
    мови, автор самвидаву, співзасновник Української Гельсінської групи, політв'язень.
  - >-
    Провокаційне питання: чому радянська система переслідувала вчителя з Донбасу за те, що він
    вимагав звичайних мовних і громадянських прав?
  section: Розминка
  words: 400
- points:
  - >-
    Місце народження 27 січня 1927 року джерела пишуть по-різному: ЕСУ — хутір Іжевка, KHPG —
    хутір Їжівка; обидва локалізують його в Костянтинівському районі Донеччини. Навчання в
    Запорізькому сільськогосподарському інституті, Дніпропетровському інституті інженерів
    транспорту, філософському факультеті Московського університету.
  - >-
    Робота вчителем; пізніше — фізична праця після заборони викладати через політичні переслідування.
  - >-
    [!decolonization] Перший арешт 1948 року за критику єдиного офіційного кандидата — рання
    ознака опору радянській номінальній «демократії».
  section: 'Формування: Від вчителя до мовного правозахисника'
  words: 1000
- points:
  - >-
    Есе *Думки про рідний донецький край* порушує питання історичної пам'яті, мовних прав і
    місця Донеччини в Україні; дослівні цитати можливі лише після встановлення видання й локатора.
  - >-
    ЕСУ й KHPG незалежно називають укладену працю *Мова народу. Народ*. Бібліографія KHPG
    додатково фіксує видання *Мова — народ. Висловлювання про мову та її значення в житті
    народу* (Київ: «Смолоскип», 2007, 416 с.); без сторінкового локатора його не цитувати дослівно.
  - >-
    Співзаснування Української Гельсінської групи в листопаді 1976 року; обидва джерела окремо
    називають документ «Історична доля України. Лист українських політв'язнів. Спроба узагальнення»,
    написаний Тихим із Романюком улітку 1978 року (ЕСУ: Володимиром; KHPG: о. Василем).
  section: 'Діяльність: Мова, самвидав і засновник УГГ'
  words: 1200
- points:
  - >-
    Арешт 15 січня 1957 року за лист протесту проти окупації Угорщини військами країн Варшавського
    договору. Обидва джерела підтверджують вирок 18 травня 1958 року — сім років таборів суворого
    режиму; лише KHPG називає Сталінський обласний суд і статтю 54-10 КК УРСР.
  - >-
    ЕСУ підтверджує повторний арешт 5 лютого 1977 року й вирок 1 липня — десять років таборів
    особливого режиму і п'ять років заслання — без назви суду. KHPG датує процес 23 червня —
    1 липня в Дружківці та пов'язує обвинувачення зі статтями 62 ч. 2 і 222 КК УРСР —
    звинуваченням у «незаконному зберіганні зброї»; суду не називає жодне з двох джерел.
  - >-
    Перевірені KHPG точки маршруту: після першого вироку — ЖХ-385/11; після другого — ЖХ-385/1
    у Сосновці й табір особливого режиму ВС-389/36-1 у Кучино на Пермщині; тричі — тюремна
    лікарня ВС-389/35 (ст. Всехсвятська). Протестні голодування засвідчують обидва джерела.
  - >-
    [!anti-hagiography] [!epistemic-humility] Смерть 6 травня 1984 року в тюремній лікарні Пермі;
    точний номер архівної справи в джерелах не знайдено — не вигадувати.
  section: 'Тінь: Вироки, табори та смерть у неволі'
  words: 1600
- points:
  - >-
    [!myth-buster] Російські наративи подають мовний активізм у Донбасі як «штучний»; тексти
    Тихого локалізують боротьбу за мову всередині регіону.
  - >-
    Варіанти імені Олекса/Олексій у джерелах — зафіксувати без нав'язування однієї форми.
  - >-
    Посмертні видання та пам'ять про правозахисника мови; зв'язок із загальним руслом дисидентського
    руху 1970–1980-х.
  section: 'Підсумок: Мовні права Донбасу та ціна правди'
  words: 1000
focus: >-
  Олекса Тихий — вчитель і правозахисник мови з Донбасу, співзасновник УГГ, політв'язень, який
  помер у тюремній лікарні Пермі в системі радянського ув'язнення. Аналіз бібліографічно
  встановлених текстів, механізмів репресій і деколонізаційного контексту мовних прав у регіоні.
