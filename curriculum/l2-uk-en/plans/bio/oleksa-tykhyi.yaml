objectives:
- >-
  Прослідкувати біографію Тихого — від вчителя до співзасновника УГГ — з опорою лише на
  верифіковані факти досьє.
- Розуміти механізми радянських репресій: арешти 1957 і 1977 років, табори, процес у Дружківці.
- Аналізувати аргументацію *Думок про рідний донецький край* лише за текстом з точним виданням і локатором.
- Оцінити роль Тихого в деколонізаційній рамці: мовні права Донбасу всередині української історії.
