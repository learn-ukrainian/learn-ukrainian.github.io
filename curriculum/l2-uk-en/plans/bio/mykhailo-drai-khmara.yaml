content_outline:
- points:
  - >-
    [!biography] Знайомство з Михайлом Драй-Хмарою: поет-неокласик, перекладач,
    поліглот та літературознавець, що обрав шлях високого модернізму.
  - >-
    Провокаційне питання: чому радянська влада вбачала смертельну загрозу в поезії про
    класичну красу та в наукових дослідженнях форми?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та європейський вектор: навчання в Колегії Павла Ґалаґана, Київському та
    Петроградському університетах. Орієнтація на слов'янську філологію (українська,
    білоруська, сербська мови).
  - >-
    Початок 1920-х: викладання у Кам'янець-Подільському університеті та робота у ВУАН.
    Роль Драй-Хмари у формуванні української наукової термінології.
  - >-
    [!decolonization] Органічне введення української культури в європейський контекст
    через переклади Данте ("Божественна комедія") та фінської "Калевали", які
    здебільшого були знищені або лишилися неопублікованими.
  section: 'Формування: Європейський вектор та мовознавство'
  words: 1000
- points:
  - >-
    Науковий внесок: монографія "Леся Українка: життя й творчість" (1926) —
    закріплення Лесі Українки в модерному критичному просторі.
  - >-
    Єдина прижиттєва збірка поезій "Проростень" (1926). Аналіз рядка "Люблю слова
    ще повнодзвонні" як авторського неологізму і захисту глибинної української
    лексичної пам'яті.
  - >-
    Маніфест київських неокласиків: сонет "Лебеді" (1928) та метафора "ґроно
    п'ятірне нездоланих співців!", що стала символом групи.
  - >-
    Естетика опору: як сонетна форма та відмова від "пролетарського" мистецтва
    стали актом інтелектуального спротиву.
  section: 'Діяльність: Від "Проростеня" до "ґрона п''ятірного"'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Драй-Хмара не був політичним активістом, але радянська машина
    знищувала його саме за інтелектуальну незалежність та відмову обслуговувати
    партійну лінію.
  - >-
    Механізм терору: перший арешт у лютому 1933 року (звільнений за браком доказів).
    Другий арешт у вересні 1935 року (Справа №101).
  - >-
    Сфабриковані звинувачення: Особлива нарада НКВС засудила поета як "учасника
    контрреволюційної терористичної організації" до 5 років таборів на Колимі.
  - >-
    [!epistemic-humility] [!myth-buster] Смерть у системі Північно-Східних таборів
    (19 січня 1939). Розбір таборового міфу про те, як поет нібито врятував іншого
    в'язня ціною власного життя — відділення документальних фактів від мемуарної традиції.
  section: 'Тінь: Справа №101 та знищення'
  words: 1600
- points:
  - >-
    Доля родини та архіву: покарання дружини Ніни та доньки Оксани, знищення
    рукописів і перекладів ("націоналістичної літератури").
  - >-
    Повернення спадщини: видання за кордоном (Нью-Йорк, 1964) та реабілітація в Україні (1989).
  - >-
    Сучасне значення: Драй-Хмара як символ незламної гідності високої культури та
    трагедії Розстріляного відродження.
  section: 'Підсумок: Пам''ять про нездоланого співця'
  words: 1000
focus: >-
  Михайло Драй-Хмара як ключова фігура українського неокласицизму, науковець-поліглот і
  жертва радянського терору. Аналіз його внеску у філологію, концепції "ґрона п'ятірного"
  та механізмів репресій.
level: BIO
module: bio-205
objectives:
- >-
  Аналізувати внесок Михайла Драй-Хмари в українську літературу, перекладознавство
  та формування наукової термінології.
- Розуміти естетичну концепцію українського неокласицизму через сонет "Лебеді" та метафору "ґроно п'ятірне".
- Досліджувати механізми радянського терору на прикладі сфабрикованої справи №101 та знищення інтелектуальної еліти.
- Оцінювати вплив втрати рукописів і перекладів Драй-Хмари на розвиток української культури.
