content_outline:
- points:
  - 'Провокація: Як одна людина могла бути і гетьманом, і зрадником, і королем, і євреєм-молочником? Богдан Ступка — актор, що втілив усі обличчя України, чи геній, що жив поза національними рамками?'
  - '[!biography] Авторизоване інтерв''ю про внутрішній конфлікт персонажа як вхід до розмови про акторський метод; неперевірені цитати й репліки ролей не приписуються Ступці.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Національний пророк vs Універсальний митець. Чи не применшував статус Ступки як світової зірки його "ярлик" головного актора України? Його ролі (Хмельницький, Мазепа) як інструмент деколонізації.'
  - 'Дебат 2: Міністр-ідеаліст чи політичний наївець? Коротка каденція Ступки в уряді — спроба врятувати культуру чи фатальна помилка, що оголила розрив між мистецтвом і політикою?'
  - '[!epistemic-humility] Оцінки його міністерства варіюються від "втраченого шансу" до "єдиного чесного голосу в корумпованій системі".'
  - '[!decolonization] Як Ступка через ролі повертав українцям їхню історію, викривлену радянським та імперським кіно.'
  section: 'Конфліктна карта: Актор і Влада'
  words: 900
- points:
  - 'Театр Заньковецької як творча колиска: не просто навчання, а входження в традицію.'
  - 'Робота з режисером Сергієм Данченком: формування унікального стилю, що поєднує глибокий психологізм та гостру іронію.'
  - 'Ранні ролі, що натякали на майбутній масштаб: пошук себе між трагедією та комедією.'
  - 'Соціальний контекст: львівська інтелігенція 1960-70х — середовище, що живило нонконформізм і мистецьку сміливість.'
  section: 'Формування: Львівська школа'
  words: 1000
- points:
  - Переїзд до Києва (1978) і початок епохи в Театрі Франка. "Украдене щастя" як маніфест нового акторського покоління.
  - 'Роль життя: Тев''є-Тевель у виставі "Тев''є-Тевель". Понад 350 вистав — це вже не гра, а проживання долі.'
  - Кінодебют у "Білому птасі з чорною ознакою" — миттєве визнання і початок великої екранної кар'єри.
  - 'Галерея історичних постатей: Богдан Хмельницький, Іван Мазепа. Робота з Єжи Гоффманом ("Вогнем і мечем") і вихід на міжнародну арену.'
  section: 'Діяльність: На двох сценах — Франка та Світовий екран'
  words: 1300
- points:
  - '[!anti-hagiography] Невдале міністерство: ідеалістичні мрії ("зробити українську культуру модною") розбилися об бюрократію та політичні інтриги. Розчарування і відхід з посади.'
  - '[!myth-buster] Ступка — не завжди "правильний" патріот. Його готовність грати Чингісхана чи співпрацювати з російськими режисерами викликала гострі дебати. Чи зрадив він національну ідею заради мистецтва?'
  - 'Критика з боку колег: звинувачення в авторитаризмі на посаді художнього керівника Театру Франка.'
  - 'Людські слабкості: чи завжди "генію" можна пробачити те, що не пробачають звичайній людині?'
  section: 'Тінь: Ціна таланту'
  words: 900
- points:
  - 'Повернення до розминки: то ким був Ступка? Студент формулює відповідь, використовуючи матеріал модуля.'
  - 'Спадщина як художнього керівника: чи залишився Театр Франка "театром Ступки" після його смерті?'
  - 'Спадщина в кіно: відповідальність актора за історичні образи, які він створює. Чи "його" Хмельницький став "справжнім" для мільйонів?'
  - '[!decolonization] Роль Ступки в утвердженні української культурної ідентичності після розпаду СРСР. Чи може мистецтво об''єднати націю?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Biography of Bohdan Stupka, analyzing his dual role as a national symbol and world-class actor, his impact on Ukrainian theater and cinema, and the complexities of his legacy including his political tenure.
