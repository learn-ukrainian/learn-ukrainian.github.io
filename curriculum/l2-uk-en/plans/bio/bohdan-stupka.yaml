objectives:
- Аналізувати акторський метод Богдана Ступки, розрізняючи його сценічні та кінематографічні прийоми
- Оцінювати його вплив на розвиток українського театру як актора та художнього керівника
- Дискутувати про роль митця у владі та суспільстві на прикладі його каденції як міністра культури
- Аргументувати власну позицію щодо суперечливих аспектів його біографії та творчого шляху
