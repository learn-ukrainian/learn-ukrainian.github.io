content_outline:
- points:
  - >-
    [!biography] Знайомство з Ґео Шкурупієм: поет, прозаїк і кіносценарист, що сам
    проголосив себе "Королем футуропрерій"; одне з облич українського футуризму
    1920-х і жертва Розстріляного відродження.
  - >-
    Провокаційне питання: чому держава, яка голосно оспівувала "нове" й "революційне"
    мистецтво, зрештою знищила найгучніших авангардистів, що славили майбутнє?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 1903 року в Тягині (Бендери) на Бессарабщині, дитинство на Поділлі;
    син залізничника і вчительки. Друга київська гімназія (1920), рік на медичному
    факультеті, навчання в Інституті зовнішніх зносин.
  - >-
    Дебют 1920 року в альманасі "Гроно"; захоплення авангардом, теоретичні статті
    про
    футуризм, входження до київського "Комкосмосу" та Аспанфуту Михайля Семенка.
  - >-
    [!decolonization] Український авангард як проєкт "європеїзації" культури власними
    силами, а не через імперський центр. Промовиста деталь: сама літера ґ у підписі
    "Ґео" — її скасував радянський правопис 1933 року й повернули лише 1990-го, тож
    орфографія імені несе слід репресій.
  section: 'Формування: Від медицини до футуризму'
  words: 1000
- points:
  - >-
    Перші збірки "Психетози" (1922) і "Барабан" (1923): футуристична поетика, гасло
    "Король футуропрерій" на обкладинці. Аналіз лірики "Барабан печалі" — за барабанним
    боєм ховається інтимний голос.
  - >-
    Панфутуризм Михайля Семенка: теорія руйнування старого мистецтва задля народження
    нового. Швидка еволюція Шкурупія від футуристичної бравади до неоромантизму
    (збірка "Жарини слів", 1925).
  - >-
    Проза і кіно: гостросюжетні оповідання "Переможець дракона" (1925), експериментальний
    роман "Двері в день" (1929), роман "Жанна-батальйонерка" (1930); кіносценарії
    та
    редакторська праця на кінофабриках.
  - >-
    Редактор київської філії "Нової генерації" та альманаху "Авангард" (1930), де
    вперше
    надруковано кіносценарій "Земля" Олександра Довженка — Шкурупій як вузол модерної
    української культури.
  section: 'Діяльність: Король футуропрерій'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Шкурупій не був підпільником — його знищили за саму належність
    до незалежної мистецької генерації. Водночас він не "тихо загинув": у суді він
    активно й аргументовано боронився.
  - >-
    Механізм терору: арешт у Києві 3 грудня 1934 року, у хвилі репресій після вбивства
    Кірова; сфабриковане звинувачення в "київській терористичній організації ОУН"
    ("Об'єднання українських націоналістів").
  - >-
    Голос жертви: дві сесії військового трибуналу та письмова скарга 15 січня 1935
    року
    на фальсифікацію показань під моральним тиском. Попри це — вирок 27 квітня 1935
    року:
    10 років виправно-трудових таборів, потім трирічне позбавлення політичних прав
    і
    конфіскація майна. Покарання відбував на Соловках.
  - >-
    Розплата для родини: дружину Варвару Базас віднесли до категорії "ЖИР" (дружина
    зрадника батьківщини) і разом із сином виселили з Києва як родину "ворога народу".
  - >-
    [!myth-buster] Не Сандармох: перший соловецький етап розстріляли в Карелії в
    жовтні–листопаді 1937 року, але справу Шкурупія "особлива трійка" переглянула
    25 листопада, і розстріляли його пізніше — 8 грудня 1937 року.
  - >-
    [!epistemic-humility] Джерела різняться щодо точного місця страти (Ленінград чи
    Ленінградська область). Там, де доказ тонкий, чесніше визнати межу знання, ніж
    домальовувати деталі.
  section: 'Тінь: Арешт, Соловки, розстріл'
  words: 1600
- points:
  - >-
    Стирання і повернення: книги вилучено, ім'я викреслено на два десятиліття. Посмертна
    реабілітація 1957 року тим самим режимом, що вбив, — радше інструмент, ніж справедливість.
  - >-
    [!decolonization] Шкурупій як частина Розстріляного відродження: знищення авангарду
    було не випадковістю, а системним нищенням української модерної культури.
  - >-
    Сучасне повернення: видання "Вибраних творів" (Смолоскип, 2013) та дослідження
    Ярини Цимбал повертають "короля футуропрерій" читачеві. Чому його експерименти
    знову на часі?
  section: 'Підсумок: Повернення короля'
  words: 1000
focus: >-
  Ґео Шкурупій як "король футуропрерій" — провідний поет і прозаїк українського
  футуризму, кіносценарист і жертва радянського терору. Аналіз його авангардної естетики,
  ролі в "Новій генерації" та механізму репресій, що знищив ціле покоління.
level: BIO
module: bio-138
objectives:
- >-
  Аналізувати внесок Ґео Шкурупія в український футуризм, панфутуризм та експериментальну
  прозу 1920-х років.
- Розуміти естетику авангарду через образ "короля футуропрерій", збірку
  "Барабан" та неологізми поета.
- >-
  Досліджувати механізм радянського терору на прикладі сфабрикованої справи про "київську
  терористичну організацію ОУН", Соловків і розстрілу 1937 року.
- >-
  Відрізняти задокументовані факти від табірних та мемуарних легенд і критично оцінювати
  посмертну реабілітацію як інструмент режиму.
