content_outline:
- points:
  - 'Парадокс: Найвідоміша п’єса Миколи Куліша, «Мина Мазайло», — це комедія про відмову від української мови. Як твір, що
    висміює мовне ренегатство, став символом українізації 1920-х і залишається актуальним сьогодні?'
  - '[!biography] Куліш як центральна фігура українського театру 20-го століття, новатор, чия доля нерозривно пов’язана з
    долею його покоління.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Авангард vs. Соцреалізм. Куліш і Курбас створювали елітарний, європейський, модерністський театр
    («Березіль»), що йшов урозріз з ідеологічними вимогами партії на «пролетарське» і «зрозуміле» мистецтво. Їх звинувачували
    у «формалізмі» та «відриві від народу».'
  - 'Дебат 2 (спадок): Радянська міфологія vs. Деколонізована історія. Спочатку повне забуття, потім часткова «реабілітація»
    Куліша як «талановитого, але ідейно заплутаного» драматурга, з повним ігноруванням антитоталітарного пафосу його творів.
    Сучасна оптика бачить у ньому пророка, що показав абсурдність радянської дійсності.'
  - '[!epistemic-humility] Чи був можливий інший шлях для українських митців, окрім трагічного вибору між компромісом і загибеллю?'
  section: 'Конфліктна карта: Модерніст проти системи'
  words: 900
- points:
  - 'Соціальний і історичний контекст: дитинство в українському степу, освіта в Одеській гімназії, участь у Першій світовій
    війні — світ, що стрімко змінювався і породжував нові ідеї.'
  - 'Від шкільного інспектора до драматурга: як досвід роботи в системі освіти надав Кулішу унікальний матеріал для аналізу
    суспільних процесів та абсурдності радянської бюрократії.'
  - 'Поворотний момент: переїзд до Харкова, тодішньої столиці УСРР, і входження до літературного об’єднання ВАПЛІТЕ — епіцентру
    українського модернізму.'
  section: 'Формування: Херсонський інтелігент'
  words: 1000
- points:
  - 'Творчий тандем: Куліш (драматург) і Лесь Курбас (режисер). Їхня співпраця в театрі «Березіль» — це вершина українського
    театрального авангарду. Аналіз ключових спільних вистав: «Народний Малахій», «Патетична соната».'
  - '«Мина Мазайло»: сатирична комедія про філологічний міщанство та мовну політику «українізації». Використання фрагментів
    п’єси для аналізу мовних ідеологій та характерів.'
  - 'Стилістичне новаторство: поєднання експресіонізму, символізму та гротеску для зображення трагікомічності радянської реальності.'
  section: 'Діяльність: Народження модерної української драми'
  words: 1300
- points:
  - '[!anti-hagiography] Трагедія Куліша — це не лише вбивство митця тоталітарною машиною, а й трагедія ілюзій цілого покоління,
    яке повірило в можливість створення національної культури в рамках радянської імперії.'
  - 'Компроміси та критика: чи були у Куліша твори, написані в угоду режиму? Як його критикували сучасники (не лише партійні
    функціонери, а й інші митці)?'
  - '[!myth-buster] Міф про «гармонійну українізацію». П’єси Куліша показують, що цей процес був сповнений внутрішніх конфліктів,
    опору та абсурду, а не був простою державною політикою.'
  - 'Ціна мистецтва: арешт у 1934 році, звинувачення в «українському буржуазному націоналізмі», Соловки, і, нарешті, розстріл
    в урочищі Сандармох 3 листопада 1937 року разом з Лесем Курбасом.'
  section: 'Тінь: Ілюзія радянського модернізму'
  words: 900
- points:
  - 'Повернення до парадоксу: Чому сатира на мовне питання, написана 100 років тому, виявилася пророчою і залишається гостро
    актуальною в сучасній Україні?'
  - '[!decolonization] Куліш як символ Розстріляного відродження. Його спадщина — це не лише тексти п’єс, а й потужне попередження
    про природу тоталітаризму та небезпеку культурної асиміляції.'
  - 'Сучасне значення: Як сьогодні ставлять п’єси Куліша? Які сенси знаходять у них сучасні режисери та глядачі? Обговорення
    ролі театру під час війни.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
