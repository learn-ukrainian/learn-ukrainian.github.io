content_outline:
- points:
  - 'Провокація: син рядового козака, що піднявся через місце брата при дворі Єлизавети до графа, президента академії й — відновленим — останнього гетьмана; що реформував гетьманські суди й відроджував Батурин — і що 1760 року обмежив перехід селян; чия чолобитна 1763 року про спадкове гетьманство дала Катерині II привід скасувати уряд 1764 року. Імперська пам''ять робить його вірним придворним вельможею, що прийняв компенсацію. Що цей ярлик показує, а що ховає?'
  - '[!biography] Знайомство з постаттю: починаємо із задокументованих урядів (граф, президент академії, гетьман) і зазначаємо, що відновлення 1750 року було придворним вибором, а не вільним народним відновленням; народження — 1728 рік (1724-й як менш певний варіант).'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: серйозний пізньогетьманський реформатор — судова реформа, освітньо-університетські проєкти, відродження Батурина, впорядкування торгівлі; він боронив і осучаснював частину гетьманських інституцій.'
  - 'Позиція 2: кооптований імперський аристократ — відновлення 1750 року спиралося на двір Єлизавети й патронат брата Олексія; він був графом імперії, сенатором і президентом академії, 1760 року обмежив перехід селян і прийняв компенсацію після 1764 року.'
  - '[!decolonization] Імперська пам''ять зводить його до вірного придворного вельможі, що прийняв компенсацію; націоналістична — до трагічного останнього оборонця автономії. Обидві рамки згладжують: його уряд і реформи важили, його соціальна програма привілеювала старшину, а скасування не було нейтральною модернізацією.'
  - '[!epistemic-humility] Народження — 1728 рік (1724-й — менш певний варіант); президентство в академії тривало від середини 1740-х до 1765 року; глухівське обрання 1750 року було водночас старшинською церемонією й придворним вибором за урядовою вказівкою.'
  section: 'Конфліктна карта: Придворний вельможа чи серйозний реформатор'
  words: 900
- points:
  - 'Походження: народився 1728 року в Лемешах у козацькому за походженням роді Розумів-Розумовських; батько був рядовим козаком — піднесення роду обернуло козацьку лінію на імперську графську мережу.'
  - 'Придворна кооптація: 1742 року привезений до імперського двору під опікою брата Олексія (фаворита Єлизавети Петрівни); європейська освіта в Німеччині, Франції та Італії (1743-1745) — суттєвий розрив зі старшим козацьким військово-політичним вишколом.'
  - 'Придворні уряди: граф Російської імперії від 1744 року; президент Петербурзької академії наук від середини 1740-х — це статус і придворні мережі, а не доказ, що він був передусім ученим-адміністратором.'
  - 'Відновлення 1750 року: у Глухові (16 січня / 22 лютого 1750 року) імперський представник прибув з інструкціями, і формальне обрання відновило гетьманський уряд після міжгетьманства 1734-1750 років — церемонія важила, але кандидата обрав двір Єлизавети.'
  - '1751 рік: прибув до Глухова з радником Григорієм Тепловим; це гетьманство, у якому реальна автономія була часткова й умовна.'
  section: 'Формування: Від Лемешів через двір до глухівської булави'
  words: 1000
- points:
  - '1750-1752: за Єлизавети гетьманські справи на короткий час дістали більше зовнішньодержавної символіки — Київ і Запорожжя прив''язали до його влади, нагляд перейшов від Сенату до Колегії закордонних справ, і він домагався указу 1752 року проти закріпачення українців.'
  - '1754-1756: імперський відкат — обмеження на самостійне призначення полковників, закордонне листування, фінанси, мита й адміністративний нагляд звузили відновлене гетьманство.'
  - '1760-1763: судова реформа — реорганізація Генерального військового суду, створення земських, підкоморських і ґродських судів, поділ на 20 повітів і часткове відокремлення судових функцій від виконавчих канцелярій.'
  - '1761-1763: економічні й культурні проєкти — намагався зміцнити Батурин як гетьманську резиденцію, висував університетські проєкти в Києві та Батурині, впорядковував ґуральництво й торгівлю.'
  - '1763 рік: глухівські чолобитні просили поліпшення вищої освіти й відновлення «прав, вольностей і привілеїв» зі спадковим гетьманством для роду Розумовських — це водночас реформаційна стратегія й політично вибухове династичне прохання.'
  - 'Рамка: старшина подавала реформу як відновлення прав, а не як прохання про доброзичливе провінційне управління.'
  section: 'Діяльність: Судова реформа, Батурин і глухівські чолобитні'
  words: 1300
- points:
  - '[!anti-hagiography] Реформа й станові привілеї разом: обмеження переходу селян 1760 року прискорило кріпацтво, а судова реформа спиралася на станово-шляхетські моделі — осучаснення не означало демократизації для селян чи нижчого козацтва.'
  - 'Династичне прохання як пастка: спадкове гетьманство чолобитні 1763 року можна читати і як спробу стабілізувати автономію через династію, і як старшинсько-шляхетський проєкт, і як привід, потрібний Катерині II — не зводимо його ні до чистого конституційного осучаснення, ні до простого особистого честолюбства.'
  - '[!myth-buster] 10(21) листопада 1764 року Катерина II примусила скласти булаву — маніфест із назвою «об увольнении от гетманского правления» ховає примус за адміністративним «звільненням»; не подаємо зречення ні як вільне й добровільне, ні як забаганку однієї правительки: важать і ширша централізаторська логіка, і Друга Малоросійська колегія.'
  - 'Компенсація: його винагородили чином генерал-фельдмаршала, пенсією й маєтками — це кооптаційна угода, а не нейтральний спокій на старість.'
  section: 'Тінь: Селянська неволя, спадкова булава й скасування гетьманства'
  words: 900
- points:
  - 'Повернення до розминки: які його дії зміцнювали гетьманські інституції, які зміцнювали старшинський стан, а які полегшували імперське поглинання?'
  - 'Інкорпорація: Друга Малоросійська колегія перебрала повноваження гетьмана й Генеральної військової канцелярії, а Генеральний опис 1765-1769 років (Румянцевський опис) переписав людність, землю й податки — поглинання, виставлене як адміністративне впорядкування («обрусєніє»).'
  - 'Пам''ять і Батурин: він жив аристократом і повернувся до Батурина, де палац — зведений уже після скасування уряду — став пізнім місцем пам''яті; підписуємо палац із його хронологією.'
  - '[!decolonization] Відділяймо джерельно засвідченого реформатора-й-аристократа від спрощень «вірний російський державець» і «трагічний останній оборонець автономії»; тримаймо разом інституційну реформу, старшинський привілей і примусове скасування. Не нормалізуємо «Малоросію» поза аналізом імперської термінології.'
  section: 'Дискусія та підсумок: Друга колегія, «обрусєніє» й пам''ять про «останнього гетьмана»'
  words: 700
focus: Kyrylo Rozumovskyi as the last hetman of the Left-Bank Hetmanate (1750-1764) — the rank-and-file Cossack origin transformed by court patronage, the European education and imperial offices, the court-selected 1750 Hlukhiv restoration, the judicial reform and Baturyn revival, the 1760 peasant-mobility restriction, the 1763 hereditary-hetmancy petition that gave Catherine II her pretext, the 1764 abolition and Second Little Russian Collegium, and the co-optation-and-incorporation mechanism that both his office and his compensation illustrate.
