- Аналізувати механізм кооптації й скасування за джерелами (глухівські чолобитні, судова реформа, маніфест 1764 року, Друга колегія), не зводячи Розумовського ні до вірного вельможі, ні до трагічного оборонця автономії
- Відрізняти джерельний факт, імперську правову мову «звільнення» та пізнішу пам'ять про «останнього гетьмана»
