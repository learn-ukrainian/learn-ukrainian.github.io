content_outline:
- points:
  - 'Провокація: Галина Пагутяк — відлюдниця, що мешкає у світі духів, чи гострий публіцист, що не боїться говорити правду?
    Як одна людина поєднує містику і безкомпромісну реальність?'
  - '[!biography] Короткий, але яскравий фрагмент з її есе, де вона коментує сучасну подію — без згадки, що це авторка готичних
    романів.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Химерний реалізм» — це втеча від реальності чи її глибинне дослідження через метафору? Позиція 1: Пагутяк ігнорує
    соціальні проблеми, занурюючись у фантазії. Позиція 2: Її містика — це єдиний спосіб говорити про травми, які неможливо
    описати реалістично.'
  - 'Дебат 2: Пагутяк — «жіноча проза» чи універсальний філософ? Позиція 1: Її творчість є частиною жіночого канону, зосереджена
    на жіночому досвіді. Позиція 2: Гендерна оптика обмежує розуміння її філософських та екзистенційних тем, які є універсальними.'
  - '[!epistemic-humility] Критики досі не можуть дійти згоди, до якої «полиці» віднести її творчість, що свідчить про її
    унікальність.'
  section: 'Конфліктна карта: Література чи втеча?'
  words: 900
- points:
  - 'Дитинство в Карпатах: як ландшафт, фольклор та ізоляція сформували її світогляд і стали джерелом її міфології.'
  - 'Навчання у Львівському університеті в радянський час: інтелектуальний опір, читання «забороненої» літератури, формування
    нонконформістської позиції.'
  - Перші літературні спроби та їхня зустріч з радянською цензурою. Необхідність створювати «внутрішній світ» як прихисток.
  section: 'Формування: Карпатське коріння та радянська дійсність'
  words: 1000
- points:
  - 'Ранній період: Книжка «Діти» (1982) — як у реалістичній прозі вже проростали зерна майбутньої містики.'
  - 'Зрілий період: Романи «Слуга з Добромиля» та «Урізька готика» як вершина її стилю. Аналіз ключових елементів: поєднання
    історії, магії, готичної атмосфери.'
  - 'Есеїстика: Пагутяк як гострий публіцист. Розгляд її блогів та колонок як іншого, не менш важливого, виміру її творчості.'
  section: 'Діяльність: Створення Урізької готики'
  words: 1300
- points:
  - '[!anti-hagiography] Конфлікти з літературним істеблішментом: звинувачення в «елітарності», «нечитабельності» та відірваності
    від народу.'
  - 'Свідома ізоляція: як добровільне самітництво вплинуло на її репутацію та просування її творів? Чи не є це також формою
    «втечі»?'
  - '[!myth-buster] Міф про «аполітичність». Розвінчання ідеї, що Пагутяк завжди була поза політикою, на прикладі її гострих
    реакцій на ключові події в історії України.'
  - 'Критика з боку реалістів: аналіз аргументів опонентів, які вважали її стиль надто ускладненим і віддаленим від потреб
    читача.'
  section: 'Тінь: Ціна іншості'
  words: 900
- points:
  - 'Повернення до розминки: тож хто така Галина Пагутяк? Студент має сформулювати власну складну, неоднозначну відповідь.'
  - 'Вплив на молодих письменників: хто з сучасних авторів продовжує її традицію «химерного реалізму»?'
  - '[!decolonization] Пагутяк як архітекторка унікального українського міфу, вільного від імперських наративів. Її Карпати
    — це не екзотика, а метафізичний центр України.'
  - 'Місце в сучасній літературі: чи потрібні «химерні» письменники в час війни? Обговорення ролі містичної та філософської
    прози в епоху екзистенційних загроз.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Halyna Pahutyak's life and work through the lens of anti-hagiography, focusing on her unique "chimerical realism",
  philosophical depth, and the debates surrounding her literary legacy.
