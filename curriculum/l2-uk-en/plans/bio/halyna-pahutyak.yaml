objectives:
- Критично аналізувати творчий шлях Галини Пагутяк, застосовуючи принцип анти-агіографії.
- Визначати та пояснювати ключові риси «химерного реалізму» на прикладі її текстів.
- Оцінювати внесок письменниці в розвиток української літератури та її місце в сучасному каноні.
- Формулювати аргументовану позицію щодо дебатів, які точаться навколо творчості та постаті Галини Пагутяк.
