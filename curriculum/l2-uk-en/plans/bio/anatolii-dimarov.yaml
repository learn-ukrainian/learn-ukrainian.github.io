content_outline:
- points:
  - 'Парадокс: Анатолій Дімаров був живим свідком усіх катастроф XX століття — від розкуркулення до Голодомору та Другої світової
    — але його найгучнішим публічним актом стала відмова від ордена у віці 90 років.'
  - '[!biography] Щоб вижити, він був змушений змінити прізвище: так Андроник Гарасюта, син «куркуля», став письменником Анатолієм
    Дімаровим.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський лауреат vs. «письменник у шухляді». Як поєднувались офіційне визнання (Шевченківська премія за «Біль
    і гнів») і тотальна цензура, що вирізала третину його ключових романів-епопей?'
  - 'Дебат 2: Деколонізація спадщини. Чи є Дімаров «радянським письменником» чи «антирадянським»? Його повна публікація в
    незалежній Україні протиставляється спробам представити його як частину «великої радянської літератури».'
  - '[!epistemic-humility] Дімаров був членом Спілки письменників і працював у системі, але водночас вів тиху боротьбу за
    кожен рядок, зберігаючи заборонені рукописи десятиліттями.'
  - '[!decolonization] Відновлення повних текстів його романів після 1991 року стало актом культурної реституції — поверненням
    вкраденої історії та правди.'
  section: 'Конфліктна карта: Цензура та правда'
  words: 900
- points:
  - Народження на хуторі Гараськи на Полтавщині у заможній родині, оголошеній «куркулями».
  - 'Дитяча травма: розкуркулення батька, нічна втеча шестирічного Анатолія з матір''ю та братом.'
  - 'Голодомор 1932-1933: виживання на млинцях з цвіту акації, смерть майже всіх дітей у селі.'
  - 'Війна та партизанський рух: важкі поранення, інвалідність у молодому віці.'
  - 'Поворотний момент: пробудження національної свідомості на Волині, де він усвідомив себе українцем.'
  section: 'Формування: Втеча від долі куркуля'
  words: 1000
- points:
  - 'Створення двох монументальних епопей: «І будуть люди» (про Полтавщину 1920-х) та «Біль і гнів» (про Другу світову війну).'
  - Задум показати історію України «не так, як веліли», через долі звичайних людей.
  - 'Боротьба з цензурою: з обох романів було видалено цілі розділи та сюжетні лінії, що спотворювало авторський задум.'
  - 'Вершина офіційного визнання: Шевченківська премія 1981 року, присуджена за понівечений цензурою другий том «Болю і гніву».'
  section: 'Діяльність: Епопея, порізана цензором'
  words: 1300
- points:
  - '[!anti-hagiography] Створення роману «Чорний ворон» («В тіні Сталіна») про колимського в''язня — акт творчої мужності,
    але й прихованого спротиву, а не відкритого дисидентства.'
  - Рукопис отримав схвальні відгуки, був набраний у журналі «Вітчизна», але в останній момент заборонений і «розсипаний».
  - 'Двадцять років у «шухляді»: роман таємно зберігався, поки не був вперше надрукований англійською в Австралії (1989),
    і лише потім в Україні.'
  - '[!myth-buster] Це руйнує міф про те, що всі чесні письменники були або в таборах, або в еміграції. Дімаров уособлює «третій
    шлях» — внутрішній спротив та збереження правди для майбутніх поколінь.'
  section: 'Тінь: Роман, що пролежав у шухляді 20 років'
  words: 900
- points:
  - 'Повернення до розминки: відмова від ордена Януковича у 2012 році («не можу прийняти з рук людей, які штовхають мою Україну
    у прірву») — це не спонтанний жест, а логічне завершення життєвого шляху, заснованого на моральній позиції.'
  - '[!decolonization] Спадщина Дімарова — це не лише його книги, а й сам факт повернення повних текстів читачеві. Це доказ
    того, як імперія намагалася стерти пам''ять, але зазнала поразки.'
  - Його автобіографія «Прожити й розповісти» стала документом епохи та свідченням про ціну, яку платили українські митці
    за право на правду.
  - Сьогодні Дімаров — частина проєкту «Незламні», символ стійкості української ідентичності.
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
