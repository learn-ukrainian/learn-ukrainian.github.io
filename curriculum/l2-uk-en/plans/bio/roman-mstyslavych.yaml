content_outline:
- points:
  - 'Провокація: Галицько-Волинський літопис називає Романа Мстиславича «самодержцем усієї Русі». Як міг один князь отримати
    такий титул в епоху тотальної роздробленості, і чому його держава розпалася одразу по його смерті?'
  - '[!biography] Роман Мстиславич — одна з найважливіших, але й найсуперечливіших фігур українського середньовіччя, попередник
    короля Данила.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Оцінка методів Романа. Для одних (автор літопису) — він «каратель злих бояр» і захисник Русі. Для інших (польські
    хроніки, боярська опозиція) — він жорстокий узурпатор, що не гребував насильством.'
  - 'Дебат 2: Спадщина Романа. Радянська історіографія бачила в ньому «прогресивного об''єднувача земель» проти бояр-феодалів.
    Сучасні історики (Михайло Грушевський, Наталя Яковенко) бачать його як типового монарха свого часу, що діяв у логіці династичних
    війн, а не національного об''єднання.'
  - '[!epistemic-humility] Літопис, що прославляє Романа, був написаний при дворі його сина Данила. Чи можемо ми йому повністю
    довіряти?'
  - '[!decolonization] Російська імперська історіографія применшувала значення Галицько-Волинської держави, представляючи
    її як периферію, тоді як для України це був центр державності після занепаду Києва.'
  section: 'Конфліктна карта: Жорстокий тиран чи мудрий державник?'
  words: 900
- points:
  - 'Походження: син Великого князя Київського Мстислава Ізяславича, праправнук Володимира Мономаха.'
  - 'Княжіння в Новгороді (1168-1170): перший досвід самостійного правління, вигнання через конфлікт з Андрієм Боголюбським.'
  - 'Успадкування Волині (1170): отримання власного князівства та початок довгої боротьби за його розширення.'
  - 'Соціально-політичний контекст: епоха «усобиць», коли князі боролися за уділи, а старі центри, як Київ, втрачали вплив.'
  section: 'Формування: Шлях до волинського престолу'
  words: 1000
- points:
  - 'Боротьба за Галич: перша невдала спроба (1188) і остаточне об''єднання з Волинню (1199) після смерті Володимира Ярославича.'
  - 'Політика централізації: придушення могутньої галицької боярської опозиції, яка звикла контролювати князів.'
  - '«Добрий порядок» у землі: літописна розповідь про те, як Роман «викорінив» бояр-крамольників, порівнюючи це з тим, як
    пасічник доглядає за вуликом.'
  - 'Захоплення Києва (1202): демонстрація сили та проголошення себе Великим князем, закріплення титулу «самодержця».'
  - 'Зовнішня політика: успішні походи на половців, втручання у справи Польщі та Угорщини, контакти з Візантією та папою Інокентієм
    III.'
  section: 'Діяльність: Створення Галицько-Волинської держави'
  words: 1300
- points:
  - '[!anti-hagiography] Літописна жорстокість: розповіді про закопування бояр живцем, тортури та вигнання. Чи була така жорстокість
    виправдана потребами держави?'
  - 'Розорення Києва: захоплення «матері городів руських» супроводжувалося насильством, що підривало його статус.'
  - 'Фатальна самовпевненість: загибель у битві під Завихостом (1205) через недооцінку противника. Роман, втрутившись у польську
    усобицю, потрапив у засідку з невеликим загоном.'
  - '[!myth-buster] Міф про пропозицію корони від Папи: хоча контакти були, більшість істориків вважають розповідь про пропозицію
    корони пізнішою легендою, створеною для легітимізації його сина Данила.'
  - 'Крихкість держави: створена силою, держава Романа розпалася одразу після його смерті, що свідчить про відсутність сталих
    інституцій.'
  section: 'Тінь: Ціна самодержавства'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати, чому титул «самодержця» був одночасно і реальним відображенням влади
    Романа, і крихким досягненням, що не пережило свого творця.'
  - 'Значення для нащадків: Роман створив модель об''єднаної держави, яку через 40 років відновить його син Данило, але вже
    на нових засадах.'
  - '[!decolonization] Роман Мстиславич — символ української державності, що розвивалася незалежно від північно-східних князівств
    (майбутньої Московії).'
  - 'Сучасна актуальність: дебати про «сильну руку» та централізацію влади в Україні часто апелюють до історичних прикладів.
    Роман — один із них.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
