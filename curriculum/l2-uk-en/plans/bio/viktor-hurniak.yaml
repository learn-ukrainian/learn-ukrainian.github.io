content_outline:
- points:
  - >-
    [!biography] Знайомство з Віктором Гурняком (позивний "Олігарх", пластовий псевдонім "Гарт"):
    український фотокореспондент, пластун, волонтер та боєць батальйону "Айдар".
  - >-
    Вступне питання: як об'єктив камери перетворюється на зброю, коли країна стикається
    з прихованою агресією?
  section: Розминка
  words: 400
- points:
  - >-
    Формування ідентичності: вступ до "Пласту" в 14 років, роль організації у вихованні
    відповідальності та лідерства. Робота прессекретарем.
  - >-
    Створення фотоагентства LUFA та перші кроки у професійній журналістиці.
  - >-
    Родина та цінності: шлюб, народження доньки Юстини, свідомий вибір громадської
    активності як основи для майбутнього країни.
  section: 'Формування: Пласт та громадянська позиція'
  words: 900
- points:
  - >-
    Документування Революції Гідності: робота для Reuters, UNIAN та INSIDER. Фіксація
    насильства, надії та людської реальності на Майдані.
  - >-
    [!decolonization] Метафора внутрішніх змін: аналіз заклику "вбити в собі 'януковича'"
    як вимоги подолати радянський патерналізм і корупцію.
  - >-
    Ризикована журналістика: проникнення в окупований Крим (весна 2014) для фіксації
    початкових етапів російського військового захоплення півострова.
  - >-
    Геополітичне передбачення: усвідомлення Гурняком того, що російська "політика
    загарбування" не зупиниться на Кримі, і загроза є всеохопною.
  section: 'Діяльність: Євромайдан та окупація Криму'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Гурняк не був професійним військовим; він був документалістом
    і волонтером, який взяв до рук зброю через екзистенційну загрозу державі.
  - >-
    Служба в батальйоні "Айдар": забезпечення підрозділу, робота медиком-добровольцем
    та водієм на передовій.
  - >-
    [!myth-buster] Жовтень 2014: хаос і брак броньованої медичної техніки під час боїв
    за 32-й блокпост на Бахмутській трасі поблизу Смілого (Луганщина).
  - >-
    Загибель (19 жовтня 2014): смертельне поранення від російського мінометного обстрілу
    під час спроби евакуації поранених побратимів на цивільному позашляховику.
  section: 'Тінь: Бої за 32-й блокпост та загибель'
  words: 1600
- points:
  - >-
    Збереження спадщини: відновлення фотокамер та архіву Гурняка. Посмертні виставки
    "Від Майдану до війни" (Український ПЕН, Європарламент).
  - >-
    Офіційне визнання: посмертне нагородження орденом "За мужність" III ступеня (2014) та
    званням Героя України (2021).
  - >-
    Символічне значення: Віктор Гурняк як уособлення покоління, що пожертвувало
    собою заради фіксації правди та захисту незалежності.
  section: 'Підсумок: Об''єктив правди'
  words: 1000
