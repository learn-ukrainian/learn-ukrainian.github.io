content_outline:
- points:
  - >-
    [!biography] Іван Малкович: поет, редактор, упорядник, перекладач і
    засновник видавництва `А-БА-БА-ГА-ЛА-МА-ГА`, через якого українська дитяча
    книжка після 1991 року стала простором високої якості, дизайну і довіри.
  - >-
    Провокаційне питання: чи може маленька літера, дитяча абетка і папір доброї
    якості виконувати культурну роботу, яку гучні маніфести часто не виконують?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 10 травня 1961 року в Нижньому Березові на Івано-Франківщині.
    Музична освіта, карпатський світ, філологія Київського університету і
    редакторська праця створили поета з дуже уважним слухом до слова.
  - >-
    Ранні збірки `Білий камінь`, `Ключ`, `Вірші`, `Із янголом на плечі`
    показують покоління вісімдесятників, яке часто обирало не декларацію, а
    точний образ, молитву, баладність, вертепність і тиху відповідальність.
  - >-
    [!decolonization] Образ `крихітної свічечки букви "ї"` треба читати як
    мовну оборону без плакатності. Українська літера тут не символ у музеї, а
    те, що дитина має навчитися берегти в щоденному письмі.
  section: 'Формування: Карпати, філологія і тиха свічка літери'
  words: 1000
- points:
  - >-
    У 1992 році Малкович заснував у Києві `А-БА-БА-ГА-ЛА-МА-ГУ`. Досьє фіксує
    20 квітня 1992 року як точну дату за сайтом видавництва; у базовому модулі
    достатньо говорити про 1992 рік із джерельним уточненням.
  - >-
    `Українська абетка`, `Улюблені вірші`, `100 казок`, `Снігова королева`,
    дитячі Євангелія і український `Гаррі Поттер` показують видавця як
    культурного дизайнера: ілюстрація, переклад, папір, право, тираж і смак
    стають частиною мовної політики.
  - >-
    Поетична збірка `Подорожник з новими віршами`, відзначена Шевченківською
    премією 2017 року, не дозволяє звести Малковича лише до підприємця або
    менеджера дитячої книжки.
  - >-
    [!epistemic-humility] Сучасні інтерв'ю корисні для голосу і пам'яті
    читачів, але тверді факти про видавництво, премії і бібліографію тримаємо
    на ЕСУ, Шевченківському комітеті, галузевих і бібліотечних джерелах.
  section: 'Діяльність: А-БА-БА-ГА-ЛА-МА-ГА і книжкова інфраструктура'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Малкович не є біографією арешту, табору, вироку чи
    підпільної дисидентської мережі. Потрібно назвати пізньорадянський мовний
    тиск і пострадянську книжкову нестачу, але не вигадувати поліційну справу.
  - >-
    Комерційний успіх не дорівнює автоматичній культурній вартості. Семінар
    питає, кого включають красиві й часто недешеві книжки, кого вони можуть
    оминати і як ринок взаємодіє з культурною місією.
  - >-
    Канонізація живого автора потребує стриманості: Малкович активний, має
    публічні позиції і суперечки, тому модуль спирається на завершені книжки,
    засновану інституцію і перевірені нагороди, а не на прогноз майбутньої ролі.
  - >-
    [!myth-buster] `А-БА-БА-ГА-ЛА-МА-ГА` не "створила українськість" сама по
    собі. Вона стала сильним елементом ширшого поля: родини, школи, бібліотеки,
    перекладачі, ілюстратори, книгарні і читачі.
  section: 'Тінь: Канонізація живого автора, ринок і межі красивої книжки'
  words: 1500
- points:
  - >-
    Підсумок повертає студентів до літери "ї": українська культурна
    суб'єктність може починатися з мінімального знака, якщо за ним стоять
    ритм, пам'ять, редакторська праця і матеріальна якість книжки.
  - >-
    Порівняння з Володимиром Рутківським і дитячою поезією допомагає побачити
    постнезалежну дитячу книжку не як "легкий" жанр, а як місце формування
    читача, мови і довіри.
  - >-
    [!decolonization] Деколонізаційний висновок не в тому, що кожна українська
    книжка добра, а в тому, що український читач отримує право на якість,
    красу, складність і власні культурні образи без імперського посередника.
  section: 'Підсумок: Маленька літера і велика інституція'
  words: 1000
focus: >-
  Іван Малкович як поет і будівничий постнезалежної української дитячої книжки:
  від камерної мовної поетики літери "ї" до `А-БА-БА-ГА-ЛА-МА-ГИ`, дизайну,
  перекладу, книжкового ринку і Шевченківської премії. Семінар тримає разом
  мовний тиск, інституційну працю, живу канонізацію і антиагіографічну
  обережність без вигаданої справи переслідування.
