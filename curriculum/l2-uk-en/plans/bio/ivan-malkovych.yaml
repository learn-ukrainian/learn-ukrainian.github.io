objectives:
- >-
  Аналізувати Малковича як поета і видавця, не підмінюючи одну роль іншою.
- >-
  Пояснювати, як дитяча книжка, дизайн, переклад і редактура працюють як
  культурна інфраструктура після 1991 року.
- >-
  Розрізняти пізньорадянський мовний тиск і неприпустиму вигадку про арешт,
  табір або формальну дисидентську справу.
- >-
  Критично оцінювати живу канонізацію, ринок якісних книжок і межі історії
  культурного успіху.
