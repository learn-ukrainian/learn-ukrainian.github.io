content_outline:
- points:
  - '[!biography] Знайомство з Богданом Рубчаком (1935–2018): поет-модерніст і водночас провідний
    літературознавець української діаспори.'
  - 'Провокаційне питання: що означає бути одночасно автором віршів і критиком, який канонізує
    власне коло, — і чому таку вільну науку не можна було вести в УРСР?'
  - 'Рубчак як подвійна постать: первинний текст (поет) і вторинний авторитет (вчений) на тему
    того самого українського модернізму.'
  section: Розминка
  words: 400
- points:
  - Народження 6 березня 1935 року в Калуші (Галичина, тоді Польща; нині Івано-Франківська область).
  - '[!decolonization] Витіснення спричинене наступом радянського фронту: 1943 року родина виїхала
    з Галичини до Німеччини, де помер батько; повернення до радянської України означало б репресії.'
  - Від 1948 року родина — у США. Докторат із порівняльного літературознавства Ратґерського університету
    (1977).
  - 'Академічна кар''єра: викладання в Ратґерському університеті від 1968 року, потім професура
    в Іллінойському університеті в Чикаго (1973/74–2005) — інституційний простір для вільної української
    науки.'
  section: 'Формування: Калуш, втеча 1943 року та США'
  words: 1000
- points:
  - 'Поетичний доробок: дебютна «Камінний сад» (1956), «Промениста зрада» (1960), «Дівчині без
    країни» (1963), «Особиста Кліо» (1967), «Крило Ікарове» (1983, розширене київське видання
    1991 року).'
  - '[!decolonization] «Координати: антологія сучасної української поезії на Заході» (1969, 2
    томи), укладена з Богданом Бойчуком: Рубчак написав біографічно-критичні нариси — фундаментальний
    критичний апарат поезії діаспори.'
  - 'Поетика: контрольована метафорика, міфологічне й історичне обрамлення (Кліо, Ікар, Марена),
    подвоєний пейзаж вигнанця. Цитата з вірша «Камінь»: «Камінь не має вікон, / він не має очей.
    / Нашим безкровним віком / тиша його тече».'
  - Понад сотня статей і есеїв про український модернізм і неокласиків; збірка критики «Міти метаморфоз,
    або Пошуки доброго світу». Рубчак — одна з найерудованіших постатей діаспорної україністики
    й первинний науковий авторитет періоду.
  section: 'Діяльність: «Координати» та літературознавство'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм гноблення — не арешт, а витіснення й подвійна неможливість:
    і поезії, і науки Рубчака.'
  - 'Перший шар: як поет, він писав модерністський вірш поза соцреалізмом, непублікований в УРСР.'
  - 'Другий шар: як учений, він вільно досліджував український модернізм — неокласиків і авангард
    1920–30-х, — той самий, що його радянська держава розстріляла, а потім заборонила про нього
    писати. Професура в Чикаго дала чесній українській науці простір, неможливий в УРСР.'
  - '[!epistemic-humility] Чесність із фактами всупереч спрощенням: Рубчак народився в Калуші
    (а не у Львові, як подають деякі стислі довідки), помер 23 вересня 2018 року в Бунтоні (Нью-Джерсі);
    докторат — Ратґерський університет, професура — Іллінойський університет у Чикаго.'
  section: 'Тінь: Подвійна заборона — поезія і вільна наука'
  words: 1600
- points:
  - '[!anti-hagiography] Спрощення, якого слід уникати: пам''ять зберігає або поета, або вченого
    — тоді як саме поєднання двох іпостасей і є суттю Рубчака.'
  - Як первинний поетичний доробок, так і корпус незалежного літературознавства вціліли, бо постали
    поза досяжністю режиму, і повернулися в Україну після 1991 року; його критика залишається
    цитованим джерелом про модернізм.
  - 'Сучасне значення: порівняльно-літературна школа Рубчака вписує український модернізм у західний
    контекст, не підпорядковуючи його, — модель деколонізованої, відкритої україністики.'
  section: 'Підсумок: Спадщина критика і повернення'
  words: 1000
focus: 'Богдан Рубчак як рідкісне поєднання поета й літературознавця Нью-Йоркської групи: водночас
  первинний текст (модерніст-лірик) і вторинний авторитет (критик українського модернізму). Аналіз
  його контрольованої метафорики, антології «Координати» з критичним апаратом та подвійної заборони
  — на вільну поезію й на вільну науку — в УРСР.'
level: BIO
module: bio-241
objectives:
- Аналізувати шлях Богдана Рубчака від витіснення з Галичини 1943 року до поета й професора-літературознавця
  в США.
- Пояснювати поєднання в одній постаті первинного тексту (поезія) і вторинного авторитету (критика)
  та роль антології «Координати» (1969).
- Критично оцінювати подвійну радянську заборону — на модерністську поезію й на вільне літературознавство
  про знищене Розстріляне відродження.
- Досліджувати порівняльно-літературну школу Рубчака як модель деколонізованої української науки, відкритої до світу.
