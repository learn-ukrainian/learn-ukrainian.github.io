content_outline:
- points:
  - 'Парадокс: Гнат Хоткевич — «людина-оркестр», ренесансна постать, що намагалася осучаснити традицію. Чому саме такий універсальний
    талант став мішенню для тоталітарної системи?'
  - '[!biography] Його називали письменником, бандуристом, композитором, етнографом, режисером. Але ким він був насправді
    — і чому його спадщина настільки важлива сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хоткевич — хранитель чи реформатор кобзарства? Одні бачили в ньому того, хто рятує автентичну традицію. Інші
    — що він «професіоналізував» і тим самим змінив народне мистецтво, створивши «академічну» бандуру.'
  - 'Дебат 2: Радянська амнезія vs. деколонізація. Радянська влада спочатку використовувала його талант, а потім знищила,
    викресливши з історії. Як сьогодні ми повертаємо його ім''я, і з якими спотвореннями його образу доводиться боротися?'
  - '[!epistemic-humility] Чи можна було врятувати кобзарство без його систематизації? Дискусія про ціну збереження культури.'
  - '[!decolonization] Знищення Хоткевича та кобзарів — це не просто репресії, а цілеспрямована політика викорінення носіїв
    національної пам''яті, яких імперія не могла контролювати.'
  section: 'Конфліктна карта: Традиціоналіст чи модерніст?'
  words: 900
- points:
  - 'Харківська молодість: син бідної родини, технічна освіта і неймовірна самоосвітня пристрасть, що привела до захоплення
    бандурою.'
  - 'Поворотний момент: участь у революції 1905 року, політичне переслідування та втеча до Галичини, що на той час була під
    Австро-Угорщиною.'
  - 'Гуцульщина як друга батьківщина: втеча перетворилася на плідний період етнографічних досліджень, заснування унікального
    гуцульського театру та написання прози про життя горян.'
  - 'Формування світогляду: на перетині індустріального Харкова, революційної політики та архаїчного світу Карпат.'
  section: 'Формування: Від Харкова до Карпат'
  words: 1000
- points:
  - 'Бандура як місія: створення першого в історії «Підручника гри на бандурі», що перетворив народний інструмент на академічний.'
  - 'Організатор та популяризатор: заснування перших бандурних ансамблів, що концертували по всій Україні та за її межами,
    роблячи бандуру символом національного духу.'
  - 'Літературна спадщина: повість «Камінна душа» — глибоке занурення в гуцульський міфосвіт, що стоїть в одному ряду з «Тінями
    забутих предків» Коцюбинського.'
  - 'Театральний новатор: не лише драматургія, а й режисерська робота, створення першого в Україні робітничого театру.'
  section: 'Діяльність: Відродження кобзарства та гуцульська проза'
  words: 1300
- points:
  - '[!anti-hagiography] Політична наївність? Повернення до Радянської України після років еміграції — чи було це фатальною
    помилкою, заснованою на вірі у можливість служити своєму народові за будь-якого режиму?'
  - 'Конфлікт із системою: його спроби відродити кобзарство в індустріальну добу йшли врозріз із радянською політикою «злиття
    націй» та знищення всього самобутнього.'
  - 'Критика сучасників: чи всі сприймали його новаторство? Консервативні кобзарі могли вважати його «академізм» зрадою традиції.'
  - '[!myth-buster] Міф про «радянського патріота» Хоткевича. Його арешт і розстріл у 1938 році не були випадковістю, а логічним
    завершенням боротьби системи з генієм, який не вписувався в її рамки.'
  section: 'Тінь: Ціна універсальності'
  words: 900
- points:
  - 'Повернення до розминки: Чому «людина-оркестр» була приречена? Тому що кожен його «інструмент» — література, музика, театр,
    історія — грав українську мелодію, яку імперія хотіла заглушити.'
  - '[!decolonization] Спадщина Хоткевича — це не лише його твори. Це сама модель українського інтелігента: європейськи освіченого,
    глибоко вкоріненого в народну традицію і готового пожертвувати всім заради свого народу.'
  - Його реабілітація в 1956 році була формальною. Справжня реабілітація — це повернення його праць, музики та ідей у сучасний
    культурний простір, що триває й досі.
  - 'Хоткевич у контексті Розстріляного відродження: його доля є символом долі цілого покоління, знищеного за те, що воно
    було українським.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
