content_outline:
- points:
  - >-
    [!biography] Знайомство з Гуцалом Євгеном Пилиповичем: український
    письменник, чиї ранні книжки з'явилися в 1960-х роках; автор ліричних
    оповідань, дитячих книжок і пізніших антиімперських есе.
  - >-
    Провокаційне питання: чому радянська система могла «приймати» українську сільську прозу
    і водночас приручувати її в рамку «радянського письменника»?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 14 січня 1937 року в Старому Животові (нині Новоживотів, Вінниччина); освіта в
    Ніжинському педагогічному інституті (1959).
  - >-
    Рання кар''єра: регіональна журналістика, «Літературна Україна», видавництво «Радянський
    письменник».
  - >-
    [!decolonization] Назва видавництва «Радянський письменник» фіксує установу
    доби, але не визначає культурної ідентичності українського автора.
  section: 'Формування: Ніжин і сільська пам''ять'
  words: 1000
- points:
  - >-
    Перші збірки: *Зелена радість конвалій* (1961), *Люди серед людей* (1962), *Яблука з осіннього
    саду* (1964), *Хустина шовку зеленого* (1966).
  - >-
    Дитяча проза: *У лелечому селі* (1969); окремо простежити понад 200
    ліричних оповідань у доробку.
  - >-
    Сільська етика: *Дівчата на виданні* (1971), *Шкільний хліб* (1973) — стриманий моральний
    стиль села без партійних гасел.
  - >-
    *Позичений чоловік* (1982) — комічно-фольклорний роман; понад 200 ліричних оповідань загалом.
  section: 'Діяльність: Лірична проза від конвалій до дитячих книжок'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Гуцало не був ув''язненим дисидентом — персональний КДБ/цензурний файл
    у досьє не знайдено; не вигадувати арешт.
  - >-
    Механізм тиску: цензура, ідеологічне оформлення, вимога вписати українську прозу в категорії
    «радянської» літератури (1960-ті — 1980-ті, особливо після дисциплінування шістдесятників).
  - >-
    Що збереглося: понад 200 оповідань і багато прозових творів у друку; що пошкоджено — інтерпретативна
    рамка радянської критики.
  - >-
    [!epistemic-humility] [!myth-buster] Смерть 14 липня 1995 року в Києві (за ЕСУ; не плутати з
    нестабільною датою 4 липня з випадкових веб-джерел). *Ментальність орди* (1990-ті) — антиімперський
    поворот есе, не «аполітична» дитяча проза.
  section: 'Тінь: Радянське табло без ув''язнення'
  words: 1600
- points:
  - >-
    Як коротка шкільна формула звужує автора, тоді як ЕСУ показує поезію,
    новелістику, повісті, романи, публіцистику й есеїстику.
  - >-
    Зв''язок із шістдесятниками: ранні книжки й професійна праця припали на
    1960-ті, але хронологічна близькість не доводить формального членства чи
    однакової долі репресій.
  - >-
    Сучасне читання: сільська пам''ять, екологічна етика, антиімперські есе як видимість
    української мовної безперервності всередині радянської системи.
  section: 'Підсумок: Від ліричної прози до «Ментальності орди»'
  words: 1000
focus: >-
  Євген Гуцало як український письменник, чиї ранні книжки вийшли в 1960-х:
  лірична сільська проза, дитяча література та пізні антиімперські есе. Аналіз
  радянської інституційної рамки без вигаданого ув'язнення чи формального
  членства в русі.
level: BIO
module: bio-255
objectives:
- >-
  Розрізняти біографічні факти Гуцала (освіта, бібліографія, дати) від спрощень шкільного канону
  та радянських ярликів.
- Аналізувати, як лірична сільська проза зберігала українську мовну пам''ять у рамках радянського видавництва.
- >-
  Пояснити радянське інституційне та ідеологічне оформлення без приписування
  непідтвердженого арешту або конкретного акту цензури.
- >-
  Порівняти ліричну прозу, яку ЕСУ характеризує через дію персонажів і моральну
  колізію, з пізнішою публіцистикою «Ментальність орди».
