content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому художника, що підніс українське мистецтво до
          європейського рівня, застрелили в потилицю біля власного дому?
      - >-
          [!biography] Олександр Мурашко - живописець, педагог і громадський
          діяч, співзасновник Української академії мистецтв.
      - >-
          Походження і освіта: київське дитинство, оповіді бабусі про козацтво,
          школа дядька Миколи Мурашка, майстерня Іллі Рєпіна в Петербурзі.
      - >-
          Європа 1901-1903: Париж і Мюнхен, Веласкес у Луврі, імпресіонізм і
          модерн; формування власної колористики.
    section: 'Формування: Від Києва до школи Рєпіна і Європи'
    words: 1000
  - points:
      - >-
          Світове визнання: «Карусель» (1906) - золота медаль на Мюнхенській
          міжнародній виставці, придбана музеєм Будапешта.
      - >-
          Європейські виставки: персональна виставка в Берліні, Кельні,
          Дюссельдорфі (1909), участь у мюнхенському «Сецесіоні».
      - >-
          Українська академія мистецтв (1917): Мурашко - один з організаторів,
          поряд з Нарбутом, Кричевським, Бойчуком, Маневичем.
      - >-
          [!decolonization] Мурашко підніс українське мистецтво з провінційного
          до європейського рівня: це навчальний центр модуля.
    section: 'Діяльність: «Карусель», Європа і Академія'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
      - '[!myth-buster]'
    points:
      - >-
          Документований факт: Мурашка вбили пострілом у потилицю червневої ночі
          1919 року біля дому на Лукʼянівці у 43 роки.
      - >-
          [!myth-buster] Мотив - суперечливий: преса писала про пограбування
          бандитами; ймовірніша версія - політичне вбивство під час чекістських
          «чисток» інтелігенції, але це не доведено.
      - >-
          [!anti-hagiography] Тримати разом документоване вбивство і
          непідтверджений мотив - джерельна обережність, а не мартирологія.
    section: 'Контекст: Убивство 1919 року і суперечка про мотив'
    words: 1000
  - points:
      - >-
          Посмертна виставка 1922 року (Федір Ернст зібрав понад 70 робіт) -
          гідне завершення творчого шляху.
      - >-
          Сучасна пам'ять: твори в музеях України й Європи, державне відзначення
          140-річчя (2015), ювілейна монета НБУ.
      - >-
          Чому європейський рівень Мурашка важливий для української культурної
          памʼяті.
    section: "Сучасна пам'ять: Колорист європейського рівня"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як живопис Мурашка вивів українське мистецтво у
          світовий художній процес.
      - >-
          Аргументована відповідь: що робить Мурашка важливим - колористика,
          «Карусель», Академія чи трагічно обірване життя.
      - >-
          Фінальне письмо: Мурашко як приклад української мистецької модерності.
    section: "Дискусія та підсумок: Українське мистецтво у світі"
    words: 800
focus: >-
  Oleksandr Murashko as a European-level Ukrainian painter and co-founder of the
  Ukrainian Academy of Arts: creator of the gold-medal «Карусель», bridge of
  Ukrainian art into the world art process, and victim of a documented 1919
  assassination of disputed motive, taught through his colourism and an honest,
  source-cautious treatment of his death.
level: BIO
module: bio-361
objectives:
  - >-
      Аналізувати життя і творчість Олександра Мурашка в контексті української
      мистецької модерності, уникаючи агіографії
  - >-
      Пояснювати, як «Карусель» і Українська академія мистецтв піднесли
      українське мистецтво до європейського рівня
  - >-
      Чесно і джерельно описувати вбивство 1919 року та суперечку про його мотив
      без вигаданого вироку
  - >-
      Формулювати аргументовану позицію щодо ролі Мурашка як співзасновника
      української художньої інституції
