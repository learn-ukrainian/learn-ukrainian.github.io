content_outline:
- points:
  - >-
    [!biography] Олександр Мурашко: київський живописець, портретист, педагог,
    засновник студії та співзасновник Української академії мистецтв.
  - >-
    Провокаційне питання: що станеться з культурою, коли художник, який будує
    школу й академію, гине в місті, де щойно народжувалися нові інституції?
  section: Розминка
  words: 400
- points:
  - >-
    Київське дитинство і раннє прізвище Крачковський; іконописна майстерня вітчима,
    Київська рисувальна школа Миколи Мурашка і перехід від ремесла до модерного живопису.
  - >-
    Академія мистецтв у Петербурзі й майстерня Іллі Рєпіна: сильний малюнок,
    історичний сюжет `Похорон кошового`, право на європейську подорож.
  - >-
    [!decolonization] Петербурзька підготовка — частина професійної біографії,
    але зріла вага Мурашка пов'язана з Києвом, українською модерною школою і Академією.
  section: 'Формування: Іконописна майстерня, Київ і академічна школа'
  words: 1000
- points:
  - >-
    Мюнхен, Париж і європейські виставкові маршрути: колір, пленер, імпресіоністична
    світлотінь, модерн і Сецесія без втрати київського центру тяжіння.
  - >-
    Психологічний портрет і жанровий живопис: `Карусель`, `Дівчина в червоному
    капелюсі`, `Праля`, `Селянська родина`, `Жінка з квітами` як об'єкти для
    опису кольору, погляду, пози й настрою.
  - >-
    Київська студія 1913 року і робота в Українській академії мистецтв 1917-1919:
    художник як учитель, організатор і частина державотворчої культурної мережі.
  - >-
    NAMU-рамка `Кольорові модуляції`: від стриманого раннього колориту до
    рожево-золотих, синіх і фіолетових інтенсивностей українського модернізму.
  section: 'Діяльність: Колір, портрет і київська школа'
  words: 1200
- points:
  - >-
    [!epistemic-humility] Смерть 14 червня 1919 року має джерельну розбіжність:
    ЕІУ пише про невідомого вбивцю, ЕСУ — про постріл нічного патруля ВЧК.
    Модуль фіксує обидві версії, не посилюючи доказ понад джерела.
  - >-
    Політичне насильство революційного Києва: патрулі, зміни влади, війна й
    крихкість інституцій, у яких працювали митці Української академії.
  - >-
    [!anti-hagiography] Не перетворюємо біографію на детектив смерті: головний
    доробок — колір, портрет, педагогіка, студія й Академія; смерть показує вразливість цієї роботи.
  - >-
    [!myth-buster] Мурашко не "Петербурзький учень Рєпіна, що випадково жив у
    Києві": європейський досвід і київське інституційне будівництво пояснюють одне одного.
  section: 'Тінь: Убивство 1919 року і джерельна обережність'
  words: 1600
- points:
  - >-
    Візуальна грамотність для учнів: називати світлотінь, контражур, колорит,
    мазок, силуетність і психологізм через конкретне спостереження картини.
  - >-
    Мурашко в мережі Нарбута, Кричевських і Бойчука: нова Академія мистецтв як
    український простір навчання, а не декоративний додаток до політичної історії.
  - >-
    Сучасне значення: повернення Мурашка в український модерністський канон
    чинить опір імперському й радянському розмиванню київської художньої школи.
  section: "Підсумок: Колір як інституційна пам'ять"
  words: 1000
focus: >-
