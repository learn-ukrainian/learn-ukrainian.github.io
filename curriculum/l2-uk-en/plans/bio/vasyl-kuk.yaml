content_outline:
- points:
  - 'Провокаційне питання: Як останній Головнокомандувач УПА, символ незламності, став автором "покаянного листа", який КДБ
    десятиліттями використовувало у своїй пропаганді?'
  - '[!biography] Знайомство з постаттю: Василь Кук — людина, яка очолила повстанську армію у найважчий період після смерті
    Романа Шухевича і вела боротьбу до 1954 року.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Відкритий лист" 1960 року як акт капітуляції. Позиція радянської пропаганди та частини української еміграції,
    що розцінила лист як зраду ідеї збройної боротьби.'
  - 'Дебат 2: "Відкритий лист" як тактичний хід. Позиція сучасних українських істориків та самого Кука, який стверджував,
    що це була єдина можливість вийти з в''язниці, зберегти життя і передати зашифровані сигнали на волю.'
  - '[!epistemic-humility] Ми не можемо знати достеменно, що відбувалося в душі Кука. Аналізувати можна лише текст листа та
    історичний контекст, визнаючи наявність "сірих зон".'
  - '[!decolonization] Радянська версія "розкаяння націоналіста" протиставляється українській версії про лідера опору, що
    використовує всі доступні методи, включно з інтелектуальними диверсіями, для боротьби з тоталітарною системою.'
  section: 'Конфліктна карта: Ціна виживання — зрада чи стратегія?'
  words: 900
- points:
  - 'Золочівська гімназія та Люблінський університет: середовище, де формувався світогляд майбутнього лідера ОУН. Вплив ідей
    Дмитра Донцова.'
  - 'Від пластуна до підпільника: ранні роки в ОУН, організаторська робота на Холмщині та Підляшші. Перші арешти та досвід
    конспірації.'
  - 'Акт 30 червня 1941 року: участь Кука у проголошенні відновлення Української держави та подальша боротьба з нацистською
    окупацією. Формування ідеї боротьби на два фронти.'
  section: 'Формування: Гарт революціонера'
  words: 1000
- points:
  - Створення та командування УПА-Південь. Організація повстанських рейдів, розбудова підпільної мережі в умовах тотальної
    війни.
  - Керівник Головного штабу пропаганди. Роль друкованого слова у визвольній боротьбі. Створення підпільних друкарень та поширення
    антирадянської літератури.
  - 'Останній Головнокомандувач (1950-1954): прийняття командування після загибелі Шухевича. Зміна тактики УПА — перехід до
    глибокої конспірації та боротьба в умовах повної ізоляції.'
  section: 'Діяльність: На чолі підпільної армії'
  words: 1300
- points:
  - 'Арешт 1954 року: деталі спецоперації КДБ. Чому "невловимий" командир, який 17 років провів у підпіллі, потрапив у пастку?'
  - '[!anti-hagiography] Шість років у в''язницях КДБ без суду та вироку. Психологічний тиск, допити, шантаж, імітація розстрілу.
    Розбір арсеналу методів, що мали на меті зламати командира.'
  - '[!myth-buster] Детальний розбір тексту "Відкритого листа". Чи є він капітуляцією, як стверджувала пропаганда, чи хитро
    зашифрованим маніфестом? Аналіз фраз про "новий шлях" та "здобутки радянської влади".'
  - 'Наслідки компромісу: критика з боку частини еміграції, використання імені Кука радянською пропагандою. Ціна, яку довелося
    заплатити за життя та свободу.'
  section: 'Тінь: Операція "Беркут" та "Відкритий лист"'
  words: 900
- points:
  - 'Повернення до розминки: Чи був "лист" Кука зрадою? Студент формулює власну аргументовану позицію, спираючись на матеріал
    модуля.'
  - 'Життя після "помилування": об''єкт "Борсук" під цілодобовим наглядом КДБ. Робота в Центральному державному історичному
    архіві як спосіб продовжити боротьбу за історичну пам''ять.'
  - '[!decolonization] Спадщина Кука як останнього командира: він символізує кінець етапу збройного опору і початок етапу
    інтелектуального. Його життя — це метафора еволюції українського визвольного руху в ХХ столітті.'
  - 'Значення для сучасної України: Кук помер 2007 року, встигнувши побачити незалежну Україну і надати свідчення історикам.
    Його постать — міст між поколіннями борців.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
