content_outline:
- points:
  - >-
    [!biography] Знайомство з Ігором Калинцем: поет-необарок, архівіст, політв'язень,
    редактор *Євшан-зілля*, лауреат Шевченківської премії.
  - >-
    Провокаційне питання: чому система знищила набір *Екскурсії* ще до першого суду
    і все одно засудила поета за вірші, надруковані в Брюсселі та Нью-Йорку?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 9 липня 1939 року в Ходорові (тепер Стрийський район, Львівщина); навчання
    у Львівському університеті; робота в Львівському обласному архіві до арешту.
  - >-
    Шлюб з Іриною Калинець; нагляд КДБ з 1965 року; перший планований збір *Екскурсії*
    (1963) — знищення набору з «ідеологічних причин».
  - >-
    [!decolonization] Західноукраїнська пам'ять, що стала загальнонаціональним і діаспорним
    текстом через Брюссель, Мюнхен, Нью-Йорк і Львів — без російського центру наративу.
  section: 'Формування: Львів, архів і знищений «Екскурсії»'
  words: 1000
- points:
  - >-
    *Вогонь Купала* (1966, Київ) — вилучення/конфіскація після видання; *Поезії з України*
    (Брюссель, 1970), *Підсумовуючи мовчання* (Мюнхен, 1971, присвята Валентину Морозу),
    *Коронування опудала* (Нью-Йорк, 1972).
  - >-
    Арешт 11 серпня 1972 року; засудження за ч. 1 ст. 62 КК УРСР; експертиза п'яти збірок,
    замовлена КДБ; табори Перм-35 і Перм-36 (Кучино); голодування та табірні хроніки.
  - >-
    Після звільнення — *Пробуджена муза* і *Невольнича муза* (1991), *Тринадцять аналогій*
    (1992, Шевченківська премія), дитяча книга *Дурні казки* (1998).
  section: 'Діяльність: Поезія, самвидав і закордонні видання'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Вирок: 6 років таборів суворого режиму та 3 роки заслання; заслання
    в Читинській області — примусова праця в колгоспних умовах разом з Іриною.
  - >-
    Радянське обвинувачення в «антирадянській агітації та пропаганді» — лише мова
    переслідування, не опис творчості.
  - >-
    [!epistemic-humility] Смерть 28 червня 2025 року у Львові — датована за ESU та KHPG
    2025; табірний спогад про 22 січня як День Злуки потребує контексту, не романтизації.
  section: 'Тінь: Стаття 62, табори Пермі та заслання'
  words: 1600
- points:
  - >-
    Редагування *Євшан-зілля* (1987–1989) з Іриною; поезія як «вчинок» — не зводити
    до ярлика «поет-політв'язень» без аналізу форми.
  - >-
    Зв'язок із Василем Стусом, Валентином Морозом, мережою шістдесятників і самвидавом.
  - >-
    [!myth-buster] Не приймати радянську формулу «небезпечної західної публікації» як
    доказ злочину — це механізм криміналізації культури.
  section: 'Підсумок: Пробуджена та невольнича муза'
  words: 1000
focus: >-
