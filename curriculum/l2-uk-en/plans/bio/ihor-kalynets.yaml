content_outline:
- points:
  - >-
    [!biography] Знайомство з Ігорем Мироновичем Калинцем: поет-шістдесятник,
    архівіст, самвидавний автор, політв'язень, редактор *Євшан-зілля* і дитячий
    письменник.
  - >-
    Верифіковані дати: народився 1939-07-09 у Ходорові, Львівська область; помер
    2025-06-28 у Львові, 85 років.
  - >-
    Провокаційне питання: чому радянський суд перетворював поетичні збірки, видані
    на Заході, на кримінальні докази?
  section: Розминка
  words: 400
- points:
  - >-
    Народження в Ходорові в західноукраїнському контексті; навчання у Львівському
    університеті та робота в Львівському обласному архіві до арешту.
  - >-
    Подружжя Ігоря та Ірини Калинців як окремі, але пов'язані біографії: спільний
    простір культури, стеження КДБ з 1965 року і подальша сімейна травма.
  - >-
    У 1963 році набір першої планованої збірки *Екскурсії* було розсипано з
    "ідеологічних причин"; збірку *Вогонь Купала* 1966 року вилучили після виходу.
  - >-
    [!decolonization] Західноукраїнська культурна пам'ять у Калинця не є локальним
    фольклором для прикраси, а національною мовою спротиву радянському стиранню.
  section: 'Формування: Ходорів, Львів і архівна пам''ять'
  words: 1000
- points:
  - >-
    Західні видання *Поезії з України* (Brussels, 1970), *Підсумовуючи мовчання*
    (Munich, 1971) і *Коронування опудала* (New York, 1972) зберегли корпус, який
    радянська система намагалася витіснити.
  - >-
    КДБ-замовлена літературна експертиза п'яти збірок і публікація за кордоном стали
    частиною обвинувачення; поезію трактували як "антирадянську" дію.
  - >-
    У таборах Калинець брав участь у заявах, листах, голодуваннях і табірних
    хроніках; пам'ятний епізод 22 січня в джерелі пов'язаний із Днем Злуки і Свободи.
  - >-
    Після звільнення поетична "муза" значною мірою замовкла, але він став редактором
    *Євшан-зілля* і писав для дітей, зокрема *Дурні казки*.
  - >-
    [!anti-hagiography] "Поет-політв'язень" — правдиве, але замале означення:
    біографія включає архів, самвидав, табірний спротив, редакторство і дитячу прозу.
  section: 'Діяльність: Поезія, самвидав і табірний опір'
  words: 1200
- points:
  - >-
    Арешт Ірини Калинець у січні 1972 року став частиною ширшого удару по
    шістдесятницьких мережах; Ігоря Калинця заарештували 1972-08-11.
  - >-
    Вирок за ст. 62 ч. 1 КК УРСР: 6 років таборів суворого режиму і 3 роки заслання;
    обвинувачення називало поезію й контакти з "ненадійними" людьми політичним злочином.
  - >-
    Табірний маршрут: Пермський табір №35 біля Всехсвятської, потім табір №36 у
    Кучино; пізніше заслання в Читинській області, де Ігор та Ірина працювали в
    колгоспних умовах.
  - >-
    [!myth-buster] Складна метафорична поезія не означала втечі від відповідальності:
    саме її культурна адресованість була криміналізована радянською державою.
  - >-
    [!epistemic-humility] Через смерть 2025 року старші довідники можуть бути
    застарілими щодо життєвого статусу; для дати смерті урок спирається на оновлені
    ESU і KHPG, як зазначено в досьє.
  section: 'Тінь: Арешт, табори Перм-35 і Кучино'
  words: 1600
- points:
  - >-
    Зібраний корпус 1991 року — *Пробуджена муза* і *Невольнича муза* — дозволяє
    розрізняти доарештну поетичну енергію і табірно-невольничий пласт.
  - >-
    Шевченківська премія за *Тринадцять аналогій* у 1992 році позначає повернення
    Калинця в український публічний канон після десятиліть заборон.
  - >-
    Пам'ять про Ігоря Калинця потребує подвійного читання: формальна складність
    необарокової лірики і документований механізм радянського покарання за культурну
    незалежність.
  - >-
    Завершальне питання: як навчати поезії Калинця так, щоб табірна біографія не
    затулила естетичну складність, а естетика не стерла політичну ціну?
  section: 'Підсумок: Пробуджена і невольнича муза'
  words: 1000
focus: >-
  Ігор Калинець як необароковий поет, самвидавний автор і політв'язень, чия поезія
  була криміналізована радянською державою. Семінар поєднує формальну складність
  лірики, справу за статтею 62, табори Перм-35 і Кучино, заслання та пізнє повернення
  в український канон.
level: BIO
