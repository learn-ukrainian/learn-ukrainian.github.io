objectives:
- >-
  Розкривати біографію Ігоря Калинця через поетичну працю, архівний фах, самвидав і
  табірний спротив.
- >-
  Пояснювати, як КДБ і радянський суд перетворили публікації за кордоном та
  літературну експертизу на кримінальні докази.
- >-
  Аналізувати поєднання естетичної складності, фольклорно-ритуальної образності та
  національної адресованості в його поезії.
- >-
  Оцінювати пізню пам'ять про Калинця з урахуванням підтвердженої смерті 2025-06-28,
  не користуючись застарілими твердженнями про життєвий статус.
