content_outline:
  - points:
      - >-
          Провокація: Як композитор із Коломиї, що пройшов через Австро-Угорщину,
          Польщу, нацистську окупацію та СРСР, зберіг у піснях і балетах
          галицький образний світ — Довбуш, Франко, Карпати?
      - >-
          [!biography] Анатолій Кос-Анатольський (1909–1983) — львівський
          композитор, пісняр і сценічний автор, чия творчість перенесла
          галицьку пісенну та літературну пам'ять у радянську публічну
          культуру.
      - >-
          Ключове запитання: чи був він «голосом Галичини», що зберіг
          автентичність, чи адаптованим радянським композитором, що
          стилізував регіональну екзотику?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебат 1: Кос-Анатольський — справжній галицький голос чи
          «радянський фольклорист», що перетворив регіональний колорит
          на дозволену форму «народності»?
      - >-
          Дебат 2: Його листи на захист Барвінського та пам'ятника Лисенку —
          це акт культурної оборони чи зручний жест від людини з офіційними
          посадами?
      - >-
          [!epistemic-humility] Жодне з тверджень не має архівного підтвердження
          на рівні безпекової справи. Оцінки його ролі варіюються від
          «інституційного захисника» до «офіційного функціонера».
      - >-
          [!decolonization] Балет «Хустка Довбуша» як перенесення карпатського
          народного героя на радянську сцену: збереження чи стерилізація
          повстанського образу?
    section: 'Конфліктна карта: Галичина на радянській сцені'
    words: 900
  - points:
      - >-
          Коломия — австрійська Галичина: музичне середовище, культурні
          товариства, багатомовність і багатоконфесійність.
      - >-
          Освіта у Львові: юридичний факультет Львівського університету,
          фортепіано у Тараса Шухевича, теорія у Стефанії Лобачевської,
          композиція у Стефана Барбаґа. Подвійна (юридична та музична) освіта
          як ознака галицької інтелігенції. [!epistemic-humility] ЕСУ подає
          завершення юридичної освіти 1931 року, ЕІУ — 1937; до перевірки
          університетської справи тримаємо розбіжність видимою.
      - >-
          Перехід через режими: від Польщі до нацистської окупації та
          радянського Львова — як змінювався інституційний контекст, але
          залишалися пісня та сцена.
      - >-
          Формативні впливи: Франко-центрична літературна пісенність,
          карпатська образність, львівська музична академічна традиція.
    section: 'Формування: Від Коломиї до радянського Львова'
    words: 1000
  - points:
      - >-
          Сценічна музика: балети «Хустка Довбуша» (1950/51), «Сойчине крило»
          (1956, за новелою Франка), «Орися» (1964/67); опера
          «Назустріч сонцю» / «Заграва» (1957/59); оперета «Весняні грози»
          (1960).
      - >-
          Вокальний і пісенний репертуар: романси, хорові твори, обробки
          народних пісень, покладання текстів Франка, Шевченка, Лесі Українки,
          Сосюри, Павличка, Братуня. Шевченківська премія 1980 за збірку
          «Вокальні твори».
      - >-
          Галицька публічна пісенна пам'ять: «Ой ти, дівчино, з горіха зерня»
          (на текст Франка) як зразок перетворення літературного вірша
          на загальновизнану пісню.
      - >-
          Інституційна адвокація: ЕІУ документує листи Кос-Анатольського
          до партійних і радянських органів на захист Василя Барвінського,
          за встановлення пам'ятника Лисенку в Києві, на оборону
          української культури. Це не дисидентство, але й не мовчання.
    section: 'Діяльність: Пісня, сцена, інституція'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Кос-Анатольський працював у радянських
          музичних інституціях, отримував державні нагороди, мав офіційні
          посади. Це факти доби, а не привід для ярлика «радянський
          функціонер».
      - >-
          Поруч із галицькою пісенністю існували й тематичні замовлення
          радянської доби. Не приховувати, але й не зводити до них
          портрет композитора.
      - >-
          [!myth-buster] Не вигадувати безпекового переслідування
          Кос-Анатольського: жодне джерело 1-го або 2-го рівня не документує
          арешту чи кримінальної справи проти нього. Інституційна адвокація —
          це не дисидентство.
      - >-
          Інтерпретаційна пастка: радянські видання двомовних партитур
          і пропагандистських замовлень можуть спотворити сприйняття
          українськомовного ядра його творчості.
    section: 'Тінь: Радянський контекст без ярликів'
    words: 900
  - points:
      - >-
          Повернення до розминки: отже, Кос-Анатольський — «голос Галичини»
          чи адаптований радянський композитор? Студент формулює власну
          аргументовану позицію.
      - >-
          [!decolonization] Його спадщина — це міст від Франка і Довбуша
          до радянської та пострадянської культурної пам'яті Львова.
          Повернення «Сойчиного крила» на сцену (2023) — приклад живої
          рецепції.
      - >-
          Сучасне значення: як читати галицьку пісню та балет
          Кос-Анатольського в контексті деколонізації — відновити
          українські та франківські смисли, що їх радянська рамка
          маргіналізувала.
    section: 'Дискусія та підсумок: Спадщина'
    words: 700
focus: >-
  Anatolii Kos-Anatolskyi as a Galician composer who carried Franko-centered
  literary song, Carpathian stage imagery, and institutional advocacy for
  Ukrainian culture through Soviet Lviv; the tension between regional
  authenticity, Soviet accommodation, and cultural defense.
