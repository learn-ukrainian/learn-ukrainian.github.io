module: bio-370
objectives:
  - >-
      Аналізувати життя та спадщину Анатолія Кос-Анатольського як
      галицького композитора, що працював у радянських інституціях
  - >-
      Оцінювати роль його вокальної та сценічної творчості у збереженні
      галицької пісенної пам'яті та франківської літературної традиції
  - >-
      Простежувати зміну інституційного контексту (Австрія — Польща — СРСР)
      та її вплив на творчу практику
  - >-
      Критично аналізувати межу між інституційною адвокацією та офіційним
      функціонуванням на прикладі його листів та публічної діяльності
