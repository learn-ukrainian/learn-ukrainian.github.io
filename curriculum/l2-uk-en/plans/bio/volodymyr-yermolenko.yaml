content_outline:
- points:
  - 'Провокація: як філософ Вальтера Беньяміна та європейських ідей став тим, хто пояснює Україну світові під дроновою війною?'
  - '[!biography] Знайомство з живим філософом, есеїстом і публічним інтелектуалом: президент Українського ПЕН (обраний 2022 року, переобраний 24 січня 2025 року), головний редактор UkraineWorld, доцент кафедри філософії НаУКМА.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (український мислитель): його ядро — українська філософська есеїстика («Плинні ідеології», «Ерос і Психея»), наукова стаття в «Києво-Могилянському гуманітарному журналі», премія Шевельова (2018).'
  - 'Позиція 2 (деколонізаційна): його об''єкт — імперське знання, пропаганда й дезінформація; Україна як виробниця інтелектуальних категорій, а не додаток до російських студій (проєкт «Ukraine and the Borders of Europe»).'
  - '[!decolonization] Воєнна критика російської імперської культури — це датована, аргументована позиція, а не готове гасло про «всю російську культуру».'
  - '[!epistemic-humility] Жива постать: формулювання ролей у джерелах різняться (президент/директор/доцент/голова правління) — кожне твердження позначаємо часом і джерелом; беремо лише те, що автор оприлюднив сам.'
  section: 'Конфліктна карта: Український мислитель чи «Ukraine explainer»?'
  words: 900
- points:
  - 'Освіта: НаУКМА (2002), Центральноєвропейський університет у Будапешті (2003), докторська в EHESS у Парижі (2011).'
  - 'Філософ-есеїст: «Оповідач і філософ: Вальтер Беньямін та його час» (2011) закладає лінію оповіді, пам''яті та європейського модерну.'
  - 'Есе й проза: «Далекі близькі. Есеї з філософії та літератури» (2015) — європейські літературно-філософські портрети; роман «Ловець океану: Історія Одіссея» (2017) про міф, провину, повернення й пам''ять.'
  - 'Переклад ідей: стипендія IWM «Ukraine and the Borders of Europe» вивчає європейські уявлення про Україну й українські уявлення про Європу.'
  section: 'Формування: Філософія, есеїстика й переклад ідей'
  words: 1000
- points:
  - 'Ідеї та політична мова: «Плинні ідеології. Ідеї та політика в Європі ХІХ-ХХ століть» (2018, премія Шевельова) — ключовий якір про ідеологію, метафору й тоталітарну мову.'
  - 'Інформаційна війна: проєкти «Voice of the war: Veteran Stories» та «Words and Wars: Ukraine Facing Kremlin Propaganda» (2017) — свідчення й аналіз пропаганди.'
  - 'Публічні розмови: подкасти «Explaining Ukraine», «Kult» і «Thinking in Dark Times» роблять його пояснювачем України та європейської думки (права на епізоди перевіряти).'
  - 'Культура й війна: «Ерос і Психея: кохання і культура в Європі» (2023) пов''язує європейські наративи з українськими темами; «Life on the Edge» (2025, з Тетяною Огарковою); «Стіни життя» (Український ПЕН, 2026) — воєнне цивільне есе; стаття про палінгенетичний елемент української культури (2025).'
  section: 'Діяльність: Плинні ідеології, PEN і воєнна публіцистика'
  words: 1300
- points:
  - '[!anti-hagiography] Розрізняємо завершені праці, теперішню воєнну публіцистику, інституційні ролі та контестовану рецепцію; його проза швидко переходить від інтимної воєнної сцени до абстрактної моральної лексики — спершу риштуємо жанр і дату.'
  - 'Межі узагальнення: не перетворюємо есе 2022 чи 2026 року на позачасову «позицію Єрмоленка» чи прогноз про його майбутню національну роль.'
  - '[!epistemic-humility] Нагороди понад премію Шевельова (2018) й Премію Могили (2021) перевіряємо в організатора; воєнні й родинні деталі беремо лише опубліковані автором, без оперативних подробиць.'
  - 'Англомовна видимість: UkraineWorld і міжнародні медіа роблять його видимим для неукраїнської авдиторії — але це не має витісняти його українські книжки й український інтелектуальний контекст.'
  section: 'Тінь: Жива постать, воєнна риторика й межі узагальнення'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює, що імперське насильство йде в парі з боротьбою за право називати Україну — хто описує її досвід.'
  - 'Джерельні якорі: «свобода — це життя» та «Правило двох стін» зі «Стін життя» беремо лише звіреними з джерелом за пунктуацією й типографікою.'
  - '[!decolonization] Деколонізація як дискусія про переклад, канон і воєнну етику, а не як згортання «всієї російської культури» в одну формулу.'
  - 'Порівняння: з Ларисою Масенко — щодо мовної політики; з Миколою Рябчуком — щодо постколоніальної України.'
  section: 'Дискусія та підсумок: Хто називає Україну'
  words: 700
