objectives:
- Пояснювати Гнатюка як ученого, редактора, організатора польової праці й будівничого НТШ, а не як «збирача фольклору» взагалі.
- Читати паспортизацію текстів (місце, час, збирач, інформатор, варіанти) як етику джерела, що не дає зникнути ні збирачеві, ні виконавцеві.
- Тримати «Угорську Русь», «українсько-руський» і членство в Петербурзькій академії як історичні джерельні позначки, а не як російську ідентичність.
- 'Називати тиск конкретно: арешт угорською поліцією, хвороба, цензурний контекст, воєнні втрати архіву — без вигаданого мучеництва.'
- Пояснювати діалект (лемківський, бойківський, гуцульський, бачвансько-банатський) як задокументоване українське мовне свідчення, а не як помилку.
