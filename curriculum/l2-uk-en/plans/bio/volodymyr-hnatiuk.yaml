content_outline:
- points:
  - 'Провокація: чому «фольклорист» — це замало для Гнатюка, і чому урок краще починати не з романтичної сільської сцени, а від секретарського столу НТШ, де збирання ставало українською науковою системою?'
  - '[!biography] Знайомство з постаттю вченого, редактора й організатора: генеральний секретар Наукового товариства імені Шевченка від кінця 1890-х років до смерті, співзасновник Етнографічної комісії разом з Іваном Франком, редактор двадцяти двох томів «Етнографічного збірника» й організатор кореспондентської мережі майже з восьмисот збирачів.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (українська агенда): Львів і НТШ дали Гнатюкові платформу, недоступну багатьом ученим під Російською імперією, і українські дослідники використали галицький правовий отвір, щоб збудувати установу академічного типу.'
  - 'Позиція 2 (неоднорідність влади): це не робить габсбурзьке, польське чи угорське середовище нейтральним — угорська поліція заарештувала Гнатюка під час останньої експедиції, а його протест «І ми в Європі» указував на національний, економічний і соціальний гніт закарпатських українців.'
  - '[!decolonization] Історичні назви «Угорська Русь», «українсько-руський», «русини» тримаємо як центральноєвропейське українсько-руське самоназивання доби, а не як російську ідентичність; членство в Петербурзькій академії від 1902 року — джерельний факт визнання, а не рамка ідентичності.'
  - '[!epistemic-humility] Джерела різняться в датах посад (секретар від 1898 чи 1901 року; голова Етнографічної комісії 1913 чи 1916 року) — уживаємо мову ролей, а не точні офісні дати, якщо урок не про внутрішню хронологію НТШ.'
  section: 'Конфліктна карта: Габсбурзький правовий простір чи українська агенда?'
  words: 900
- points:
  - 'Походження й освіта: народився 9 травня 1871 року у Велесневі Бучацького повіту (нині Тернопільщина) у родині сільського дяка; навчався в бучацькій і станиславівській гімназіях, потім у Львівському університеті в 1894-1898 роках.'
  - 'Мережа Франка-Грушевського: в університеті Гнатюк зустрів Івана Франка, Михайла Грушевського й Олександра Колессу; ЕСУ зазначає, що методичні поради щодо запису дав йому Федір Вовк, а рання праця йшла через Франкове «Житє і слово».'
  - 'Громадська праця: 1898 року як голова «Академічної громади» Гнатюк допоміг організувати відзначення 25-річчя літературної діяльності Франка, що вивело письменника з матеріальної скрути й започаткувало фонд допомоги нужденним авторам.'
  - '[!biography] Разом з Франком того ж 1898 року він заснував Етнографічну комісію НТШ — головну інституційну платформу систематичної української фольклорно-етнографічної публікації в Галичині.'
  section: 'Формування: Велеснів, Львів і мережа Франка-Грушевського'
  words: 1000
- points:
  - 'Експедиції як контактні зони: у 1895-1903 роках Гнатюк їздив на Закарпаття, Пряшівщину, до українців і русинів Бачки, Банату, Сербії, Хорватії, Румунії та Угорщини; [!decolonization] маршрути картографуємо як українські контактні зони через державні кордони, а не як екзотичні периферії.'
  - '[!anti-hagiography] Паспортизація текстів як етика джерела: місце, час, збирач, інформатор, біографії ключових інформаторів і покликання на варіанти в інших виданнях — цей апарат не дає безликому «народ каже» стерти ні збирача, ні виконавця.'
  - 'Видавнича й редакторська праця: 22 томи «Етнографічного збірника», «Матеріали до українсько-руської етнології», «Коломийки» (1905-1907), «Гаївки» (1909, з Філаретом Колессою та Осипом Роздольським), співредагування «Записок НТШ» і «Літературно-наукового вістника».'
  - '«Українсько-руська видавнича спілка»: як один із засновників і директор Гнатюк підготував понад сто сорок книжок, зокрема твори, заборонені в царській Росії; діалектологія — праця над лемківськими, бойківськими, гуцульськими й бачванськими говірками та рукописний словник закарпатських говірок на понад 30 000 слів.'
  section: 'Діяльність: Паспортизація, експедиції й видавнича спілка'
  words: 1300
- points:
  - 'Механізм тиску — не одна історія арешту, а шар за шаром: українська наука потребувала легального інституційного укриття під імперіями, тимчасом як польова праця й видавництво Гнатюка оголювали межі цих імперських рамок.'
  - 'Поліція й хвороба: угорська поліція заарештувала його під час останньої експедиції, а хвороба початку 1900-х років (астма, туберкульоз) перевела його від здебільшого прямого збирання до організованого кореспондентського збирання.'
  - 'Цензура й війна: галицькі видавничі маршрути мали вагу саме тому, що багато українських текстів не могли вільно циркулювати в царській Росії; значну частину його фольклорних записів було втрачено під час Першої світової війни.'
  - '[!anti-hagiography] Без роздування мучеництва: Гнатюка не стратили й не заслали в моделі Чубинського чи Вовка — задокументований механізм — це поліційне втручання в польову працю, хвороба, обмежений доступ, цензурний контекст, воєнні втрати й потреба будувати українські інституції всередині нерівних структур.'
  section: 'Тінь: Поліція, хвороба, цензура й війна'
  words: 900
- points:
  - 'Повернення до розминки: хто говорить у «народній» пісні — учні мають запитати, хто записав текст, від кого, де, коли, за яких умов і як порівнювали варіанти.'
  - 'Інформатори як люди: оскільки Гнатюк подавав біографії ключових інформаторів, урок учить, що виконавці, оповідачі й кореспонденти — не сировина, а учасники всередині владних відносин.'
  - '[!decolonization] Діалект як свідчення, а не помилка: лемківські, бойківські, гуцульські, закарпатські й бачвансько-банатські форми — задокументоване українське мовне свідчення, яке не варто мовчки модернізувати.'
  - '[!epistemic-humility] Академік ВУАН від 1924 року; помер 6 жовтня 1926 року у Львові, похований на Личаківському цвинтарі поблизу Франка; підрахунки зібраного різняться за джерелами — називаємо рамку, а не змішуємо числа.'
  section: 'Дискусія та підсумок: Хто говорить у «народній» пісні?'
  words: 700
focus: 'Volodymyr Hnatiuk (1871-1926) as a Ukrainian scholar, editor, fieldwork organizer and Shevchenko Scientific Society institution-builder who turned folklore collection into a Ukrainian scholarly system — programs, passportization metadata, an ~800-collector correspondence network, and serial publication in the Ethnographic Miscellany — connecting Ukrainian and Rusyn communities across Galicia, Transcarpathia, the Presov region, Backa and Banat under Habsburg, Hungarian, Polish and Russian-imperial pressure: the Galician legal space read as an opening Ukrainian scholars used rather than a neutral imperial gift, imperial and state labels like Uhorska Rus and Petersburg Academy membership kept source-labeled, informants and collectors named rather than erased behind ''the people say'', dialect treated as documented Ukrainian evidence, and the pressure mechanism (police arrest, illness, censorship context, WWI archive loss) named without martyr inflation.'
