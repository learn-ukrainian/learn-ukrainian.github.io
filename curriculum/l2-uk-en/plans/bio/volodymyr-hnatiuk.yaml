content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому запис народної пісні в гірському селі був і наукою, і
          захистом української національної ідентичності?
      - >-
          [!biography] Володимир Гнатюк - етнограф і фольклорист, багаторічний
          секретар НТШ і організатор української фольклористичної мережі.
      - >-
          Освіта: василіянські гімназії Бучача і Станіслава, славістика у
          Львівському університеті, навчання у Грушевського й О. Колесси.
      - >-
          Рання втрата матеріалів: збірки народних пісень, надіслані до
          ворожих видань, пропали - перший досвід ворожого гейткіпінгу.
    section: 'Формування: Від Велеснева до НТШ'
    words: 1000
  - points:
      - >-
          Інституційна спадщина: секретар НТШ (1899-1926), голова Етнографічної
          комісії, редактор близько 60 томів етнографічних видань.
      - >-
          Польова праця: «Етнографічні матеріали з Угорської Русі» (6 т.),
          понад 1500 записаних текстів, «Коломийки», «Колядки і щедрівки».
      - >-
          Текстологічна культура: точність запису, атрибуція, філологічна
          критика фольклорного тексту - українська наука європейського рівня.
      - >-
          [!decolonization] Документація лемків, закарпатців і бачванських
          русинів як українців - відповідь на асиміляційне заперечення.
    section: 'Діяльність: Фольклористична мережа НТШ'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
    points:
      - >-
          Механізм тиску називати точно: не арешт, а заперечення української
          ідентичності - москвофільське, угорське і словацьке.
      - >-
          Полемічні праці-відповіді: «Словаки чи русини» (1901), «Чи
          закарпатські українці автохтони?» (1922).
      - >-
          [!anti-hagiography] Не зводити Гнатюка до «великого збирача»:
          навчальний фокус - інституція і аргумент автохтонності.
    section: 'Контекст: Асиміляція і аргумент автохтонності'
    words: 1000
  - points:
      - >-
          Сучасна пам'ять: Тернопільський педагогічний університет, музей у
          Велесневі, вулиці, обласна премія імені Гнатюка (2005).
      - >-
          Збереження спадщини: автографи в Інституті мистецтвознавства,
          фольклористики та етнології ім. Рильського й Інституті літератури.
      - >-
          Чому фольклористична інфраструктура Гнатюка важлива для української
          культурної памʼяті.
    section: "Сучасна пам'ять: Золотий фонд фольклористики"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як точний польовий запис і наукова інституція
          захищали українську ідентичність на її окраїнах.
      - >-
          Аргументована відповідь: що робить Гнатюка важливим - збирання,
          текстологія, інституція чи аргумент автохтонності.
      - >-
          Фінальне письмо: Гнатюк як приклад науки на службі національної памʼяті.
    section: "Дискусія та підсумок: Запис як захист ідентичності"
    words: 800
focus: >-
  Volodymyr Hnatiuk as the central organiser of NTSh ethnography: long-serving
  academic secretary, editor of some 60 ethnographic volumes, and field recorder
  of Lemko, Hutsul, and Transcarpathian folklore, taught through the
  infrastructure of Ukrainian folkloristics and the documented argument for the
  Ukrainian identity of the people at the western and southern edges of the
  ethnographic territory.
level: BIO
module: bio-336
objectives:
  - >-
      Аналізувати життя і працю Володимира Гнатюка в контексті української
      фольклористики та інституційної розбудови, уникаючи агіографії
  - >-
      Пояснювати роль НТШ і польового запису у становленні української
      фольклористики європейського рівня
  - >-
      Пояснювати, як документація лемків і закарпатців відповідала на
      асиміляційне заперечення української ідентичності
  - >-
      Формулювати аргументовану позицію щодо ролі Гнатюка як будівничого
      фольклористичної інфраструктури
