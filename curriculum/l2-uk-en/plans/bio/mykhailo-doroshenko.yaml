content_outline:
- points:
  - 'Провокація: як одне слово «реєстр» може водночас означати привілей, платню, правовий статус, службу — і соціальне виключення? Дорошенко захищав козацькі права й православ''я, підписав обмежувальну Куруківську угоду, виконував її проти запорожців, а потім загинув у Криму, воюючи за кримського хана.'
  - '[!biography] Представлення постаті через суперечність між визнанням і контролем усередині одного статусу.'
  section: Розминка
  words: 400
- points:
  - 'Перша інтерпретація: Куруків як успіх (реєстр 6000, шість полків — Корсунський, Черкаський, Білоцерківський, Чигиринський, Канівський і Переяславський) — проти Куруків як поразка (заборона зовнішніх зносин, заборона походів на османські володіння, повернення виключених козаків під панську владу).'
  - 'Друга інтерпретація: поміркований перемовник (за коментарем до Грушевського; 1627 — прохання пом''якшити умови) — проти примусового виконавця (IEU: очолив реєстрових проти запорожців, що не прийняли угоди).'
  - '[!epistemic-humility] Дати уряду: певне реєстрове гетьманство 1625–1628 проти нестійких ранніх виборів 1623–1624; місце смерті — Альма/Бахчисарай (ЕІУ) проти Кафи (IEU).'
  - '[!decolonization] Козацько-кримські відносини як союз, суперництво, взаємодопомога й набіги, а не вічна ворожнеча; не зводити його дії до «передмови до Москви».'
  section: 'Конфліктна карта: Захисник прав чи виконавець обмежень?'
  words: 900
- points:
  - 'Кінець 1610-х — Дорошенко в козацькому проводі покоління Петра Конашевича-Сагайдачного; перше засвідчення обережне: IEU подає 1616 як полковника, коментар до Грушевського — джерельні згадки з 1618.'
  - 1618 — участь у поході на Московську державу; 1621 — Хотинська війна, де за собеськівською характеристикою його цінували в козацьких лавах за хоробрість і водночас вважали прийнятним у колах Речі Посполитої.
  - 'Належність до реєстрової верхівки, захист козацьких прав і привілеїв та православ''я — але без модернізації в пізнішу національну ідеологію: рамка тут — стан, конфесія, служба й прикордонна автономія.'
  section: 'Формування: Покоління Сагайдачного'
  words: 1000
- points:
  - '24 грудня 1624 — запорозько-кримський договір на дніпровському острові: збережений присяжний лист адресований гетьману М. Дорошенку, осавулам і всьому Війську Запорозькому, з умовами взаємного ненападу й військової допомоги.'
  - 'Межі договору: його підписав калга-султан Шагін-Ґерей, а не хан, тож він мав обмежену юридичну силу й не забезпечив кримської допомоги під час повстання Жмайла 1625 року.'
  - '1625 — Дорошенко-полковник бере участь у повстанні Марка Жмайла й того ж року стає старшим/гетьманом; 5 листопада (26 жовтня) 1625 — Куруківська угода біля озера Куруків (Ведмежі Лози): реєстр 6000, платня, вибір старшого з ханським підтвердженням, заборона зовнішніх зносин і походів проти османів, повернення виключених козаків.'
  - '[!epistemic-humility] Джерельні анкери: договірна лексика «кривд», «шкод» і «зла» (ЕІУ — про взаємні зобов''язання 1624 року) та «заборонялося вступати в зносини з іноз. д-вами» (ЕІУ — про куруківське обмеження дипломатії). Учні бачать, як визнання статусу приходило з приборканням автономії.'
  - Осінь 1626 — перемога козацьких сил під проводом Дорошенка над кримським загоном під Білою Церквою; ширший огляд подає це як спільну операцію з військовим командуванням Речі Посполитої.
  section: 'Діяльність: Куруків, реєстр і кримська дипломатія'
  words: 1300
- points:
  - '[!anti-hagiography] Дорошенко виконував Куруків проти виключених і запорозьких козаків — визнання приходило разом із примусом; це не проста історія оборонця вольностей.'
  - Весна 1628 — похід у Крим на підтримку Мегмед-Ґерея III та Шагін-Ґерея проти підтримуваного османами Джанібек-Ґерея й ногайського тиску; козаки рухалися укріпленим табором і за шість днів дійшли до Альми.
  - '31 травня 1628 — Дорошенко загинув у бою на Альмі під час прориву до Бахчисарая; це кращий навчальний фінал, ніж «набіг»: він поліг, виконуючи прикордонне союзне зобов''язання в кримсько-османському полі.'
  - '[!myth-buster] Не «козацький пірат» і не лише «дід Петра Дорошенка»; його треба відрізняти й від історика Дмитра Дорошенка. Життєвого портрета не збереглося — сучасна іконографія уявна й постала після 1991 року.'
  section: 'Тінь: Виконання обмежень і смерть за хана (1628)'
  words: 900
- points:
  - 'Питання замість «герой чи колаборант»: що Куруків зберіг і кого виключив? І чому похід 1628 року руйнує просту історію вічної козацько-кримської ворожнечі?'
  - 'Спадщина 1: реєстр і шість полків як визнана структура — і водночас джерело тиску, що живив пізніші повстання (зокрема Федоровича 1630 року).'
  - 'Спадщина 2: родинна лінія до Петра Дорошенка реальна й корисна, але біографія Михайла вчить ранньої реєстрової політики й кримської дипломатії, а не є передмовою до Руїни.'
  section: 'Дискусія та підсумок: Що Куруків зберіг і кого виключив'
  words: 700
focus: Біографія Михайла Дорошенка — реєстрового гетьмана 1625–1628 років, підписанта Куруківської угоди й учасника запорозько-кримської дипломатії, що загинув у Криму, воюючи за хана; урок про подвійне лезо реєстру (визнання й контроль) і про козацько-кримські відносини поза стереотипом вічної ворожнечі.
level: BIO
module: bio-026
objectives:
- Пояснювати, як одне слово — «реєстр» — водночас означало привілей, платню, правовий статус, військову службу й соціальне виключення.
- 'Аналізувати Куруківську угоду 1625 року як визнання та контроль: 6000 реєстру й шість полків проти заборони зовнішньої політики й повернення виключених козаків під панів.'
- Розбирати запорозько-кримський договір 1624 року й похід 1628 року як прикордонну дипломатію, а не як просту лінію вічної козацько-кримської ворожнечі.
- Тримати біографію Михайла окремою від Петра Дорошенка (онука) й Дмитра Дорошенка (історика), не зводячи його до сімейної передмови.
