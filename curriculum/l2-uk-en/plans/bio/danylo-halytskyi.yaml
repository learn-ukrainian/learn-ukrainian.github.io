objectives:
- Критично аналізувати зовнішню політику Данила як складне балансування між Заходом та Сходом
- Оцінювати історичне значення коронації та створення Королівства Русі як альтернативного центру об'єднання руських земель
- Порівнювати стратегії виживання Данила та Олександра Невського в контексті деколонізації української історії
- Формулювати аргументовану позицію щодо ціни та наслідків історичних компромісів
