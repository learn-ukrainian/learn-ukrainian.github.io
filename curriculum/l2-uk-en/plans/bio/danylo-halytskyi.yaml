content_outline:
- points:
  - 'Провокативний парадокс: єдиний король в історії Русі, коронований Папою, але водночас змушений визнати зверхність монгольського
    хана. Герой чи трагічна фігура компромісу?'
  - '[!biography] Данило Романович — князь, що пройшов шлях від вигнанця до об''єднувача земель і творця королівства.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Боярська опозиція vs. князівська влада. Внутрішня боротьба за модель держави — олігархічна республіка чи централізована
    монархія європейського зразка.'
  - 'Дебат 2: Данило vs. Олександр Невський. [!decolonization] Совєтська ідеологема «покірного князя» (Невський) проти української
    парадигми «опору до кінця» (Данило).'
  - '[!epistemic-humility] Обидва правителі шукали стратегії виживання для своїх народів. Історики досі сперечаються, чия
    стратегія була більш ефективною в довгостроковій перспективі.'
  section: 'Конфліктна карта: Захід чи Схід?'
  words: 900
- points:
  - 'Дитинство у вигнанні: постійна загроза та боротьба за батьківську спадщину як школа виживання.'
  - 'Уроки європейських дворів: перебування в Угорщині та Польщі, знайомство з західною політичною культурою.'
  - 'Братерський тандем з Васильком: унікальний приклад співправління та взаємної лояльності в історії Русі.'
  - 'Битва під Ярославом (1245): вирішальна перемога, що поклала край сорокарічній війні за галицький престол.'
  section: 'Формування: Князь-вигнанець'
  words: 1000
- points:
  - 'Коронація в Дорогочині (1253): прийняття титулу "Rex Russiae" та остаточне закріплення західного вектору розвитку.'
  - 'Велике будівництво: заснування та розбудова міст (Холм, Львів), що стали новими адміністративними та культурними центрами.'
  - 'Економічна потуга: контроль над соляними шляхами як джерело багатства та економічної незалежності держави.'
  - 'Культурна спадщина: створення Галицько-Волинського літопису — перлини світської історіографії.'
  section: 'Діяльність: Королівство Русі'
  words: 1300
- points:
  - '[!anti-hagiography] Візит до Орди (1245): "гірше лиха честь татарська". Принизливий, але необхідний компроміс для збереження
    держави.'
  - 'Трагедія Бурундая: неспроможність протистояти монгольській навалі та руйнування власних фортець на вимогу хана.'
  - '[!myth-buster] Міф про "негайну" допомогу Заходу. Коронація була авансом, а не нагородою, і реального хрестового походу
    проти монголів не відбулося.'
  - 'Дилема Данила: неможливість вести війну на два фронти — проти Орди на сході та проти боярської опозиції і сусідів на
    заході.'
  section: 'Тінь: Ціна корони'
  words: 900
- points:
  - 'Повернення до розминки: як співіснували корона від Папи і ярлик від Хана? Студент формулює власну оцінку постаті Данила.'
  - '[!decolonization] Значення титулу Rex Russiae: претензія на спадщину всієї Київської Русі, що кидала виклик майбутнім
    претензіям Москви.'
  - 'Спадкоємність: Галицько-Волинська держава як міст між Київською Руссю та майбутньою українською державністю (ВКЛ, Гетьманщина).'
  - 'Уроки для сучасності: важливість стійкості державних інституцій та ціна європейського вибору в умовах агресії зі Сходу.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
