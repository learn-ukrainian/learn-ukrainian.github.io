objectives:
- Аналізувати феномен Романа Ратушного як символу нового покоління українських державників, що виросло з громадянського суспільства
- Пояснювати зв'язок між локальним громадянським активізмом та національною обороноздатністю країни
- Критично оцінювати спадщину Ратушного, враховуючи як його досягнення, так і неоднозначні аспекти його боротьби
- Формулювати власну аргументовану позицію щодо ролі та методів громадянського спротиву в сучасній Україні
