content_outline:
- points:
  - 'Провокація: Як боротьба за локальний київський парк стала школою державотворення, а її лідер — символом для цілого покоління?'
  - '[!biography] Роман Ратушний — не просто активіст, а втілення трансформації українського суспільства від пасивного спостерігача
    до суб''єктного гравця.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Герой-захисник зелених зон чи радикал, що перешкоджає розвитку міста? Позиції громади Протасового
    Яру vs. забудовників та міської влади.'
  - 'Дебат 2 (спадок): Чи був Ратушний лише локальним активістом, чи його діяльність — це приклад нового типу політичного
    лідерства, що виростає "знизу"?'
  - '[!epistemic-humility] Визнання, що для забудовників та корумпованих чиновників Ратушний був перешкодою, а його методи
    — загрозою для їхньої моделі "вирішення питань".'
  - '[!decolonization] Боротьба за Протасів Яр як деколонізація міського простору — повернення контролю громаді від пострадянських
    еліт та їхніх схем.'
  section: 'Конфліктна карта: Активіст чи державник?'
  words: 900
- points:
  - Інтелектуальне середовище: виховання в родині журналістів та дисидентів як фундамент цінностей.
  - Політичне хрещення: побиття студентів на Майдані 30 листопада 2013 року як точка неповернення.
  - Загартування в боротьбі: справа Стерненка, протести, досвід політичних переслідувань як формування стійкості до тиску
      системи.
  - Протасів Яр: перехід від участі у всеукраїнських рухах до відповідальності за свій конкретний простір.
  section: 'Формування: Від Майдану до Протасового'
  words: 1000
- points:
  - 'Інституціоналізація протесту: створення ГО «Захистимо Протасів Яр» — перехід від стихійних акцій до системної юридичної
    та медійної боротьби.'
  - 'Філософія дії: формулювання поняття громадянської суб''єктності не як теоретичної концепції, а як практичного інструменту
    захисту своїх прав.'
  - Юридичні перемоги: скасування дозволів на забудову та повернення статусу зеленої зони — прецедент, коли громада перемогла
      систему.
  - 'Внесок в деколонізацію: демонтаж радянської моделі «пасивного населення», яке очікує рішень "зверху".'
  section: 'Діяльність: Суб''єктність як дія'
  words: 1300
- points:
  - '[!anti-hagiography] Радикалізація методів: чи завжди дії Ратушного та активістів були в межах закону? Конфлікти з поліцією,
    звинувачення в хуліганстві — де межа між протестом і правопорушенням?'
  - '[!myth-buster] Міф про «простого хлопця»: Ратушний був складним, часом різким та безкомпромісним лідером, що могло відштовхувати
    потенційних союзників.'
  - 'Політичні альянси: участь у справі Стерненка та зв''язки з правими рухами — чи не було це токсичним для ширшої підтримки
    його екологічних ініціатив?'
  - 'Особиста ціна: постійний стрес, погрози, судові справи — вигорання та ризики, які не видно за фасадом успішного активізму.'
  section: 'Тінь: Ціна спротиву'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь, як локальна боротьба Ратушного стала загальнонаціональним символом.'
  - 'Від активіста до воїна: служба в розвідці 93-ї бригади «Холодний Яр», бої за Тростянець та Ізюм, загибель у бою — як
    логічне продовження його боротьби за суб''єктність України.'
  - 'Матеріальна спадщина: створення ландшафтного заказника «Протасів Яр» та щорічний фестиваль як живий меморіал.'
  - 'Нематеріальна спадщина: Ратушний як надихаючий образ для покоління «суб''єктних» українців, які готові брати на себе
    відповідальність за країну.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Роман Ратушний, громадянський активізм, Протасів Яр, перетворення громадянина на воїна, спадщина громадянської суб'єктності
