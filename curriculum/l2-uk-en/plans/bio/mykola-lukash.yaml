content_outline:
- points:
  - 'Провокація: чому «Моцарт українського перекладу» — це корисне скорочення лише разом із розбором методу, а не замість нього?'
  - '[!biography] Знайомство з постаттю перекладача й лексикографа: автор українських «Фауста», «Декамерона», «Пані Боварі» й «Дон Кіхота», завідувач відділу поезії журналу «Всесвіт», виключений зі Спілки письменників 1973 року за оборону Івана Дзюби.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (мовний суверенітет): переклади Лукаша на практиці доводили, що українська може нести Ґетеву метафізику, соціальні регістри Боккаччо й іронію Сервантеса, не проходячи через російську.'
  - 'Позиція 2 (перекладацький надмір): частина критиків непокоїлася надмірним одомашненням і перекладацьким свавіллям — не кожен лексичний вибір є свідомим дисидентством, багато з них — розв''язання питань жанру, ритму й семантики.'
  - '[!decolonization] Атака 1970-х років на діалектні слова як «політично підозрілі» (за оглядом перекладної літератури в ІЕУ) показує, чому «лукашизми» — це мовний суверенітет, а не декоративна ексцентрика.'
  - '[!epistemic-humility] Скорочення «Моцарт» тримаємо в парі зі скрупульозністю до методу: творче розширення, архаїзм, діалект і неологізм могли робити переклад новою українською літературною подією, але й вимагають критичного погляду.'
  section: 'Конфліктна карта: Мовний суверенітет чи перекладацький надмір?'
  words: 900
- points:
  - 'Походження й освіта: народився 19 грудня 1919 року в Кролевці (нині Сумщина) у вчительській родині й, за КНУ, легко засвоював мови змалку; навчався в Київському університеті (1937-1941), доки війна перервала освіту.'
  - 'Друга світова й фах: учасник війни; закінчив Харківський педагогічний інститут іноземних мов 1947 року; викладав англійську, німецьку й французьку у харківських вишах у 1947-1953 роках.'
  - '«Всесвіт» і Спілка: у 1958-1960 роках очолював відділ поезії журналу «Всесвіт»; член Спілки письменників України від 1956 року до виключення 1973 року й знову від 1987 року.'
  - '[!biography] Уже в цей період окреслюється його метод — рух між високим літературним, фольклорним, комічним, філософським і розмовним регістрами української мови.'
  section: 'Формування: Кролевець, мови й «Всесвіт»'
  words: 1000
- points:
  - 'Стрижневі переклади: «Фауст» Ґете (1955, перевидання 1969, 1981, 2001), «Пані Боварі» Флобера (1955), поезії Бернса з Василем Мисиком (1959, 1965), п''єси Лопе де Веги (1962), «Декамерон» Боккаччо (1964) — за оглядом ІЕУ, культурна віха під тиском русифікації.'
  - 'Європейський діапазон: «Трагедія людини» Мадача (1967), лірика Верлена з Максимом Рильським і Григорієм Кочуром (1968), «Лірика» Лорки (1969), «Поезії» Аполлінера (1984, затримані після репресивної хвилі 1970-х), «Дон Кіхот» Сервантеса (завершений після смерті Лукаша Анатолієм Перепадею, 1995).'
  - '[!anti-hagiography] Метод, а не дивацтво: за ІЕУ Лукаш відроджував слова XVII-XVIII століть і вводив неологізми в сучасну українську літературну мову; не зводимо кожен вибір до свідомого дисидентства — це також розв''язання жанрових, ритмічних і семантичних задач.'
  - '[!decolonization] Рамка мовного суверенітету: переклади Лукаша аргументували, що українська здатна бути повноцінною європейською літературною мовою без посередництва російської.'
  section: 'Діяльність: Фауст, Декамерон і межі української мови'
  words: 1300
- points:
  - 'Механізм тиску — адміністративний і культурний, а не кримінальний: 23 березня 1973 року Лукаш написав лист до голови Президії Верховної Ради, голови Верховного Суду й прокурора УРСР після суду над Іваном Дзюбою (12-16 березня 1973 року), прохаючи дозволити йому відбути призначене Дзюбі покарання (архівна справа № 457).'
  - 'Проведення Спілки: 24 квітня, 23 травня (де на вимогу зректися листа він відповів «Не відмовляюся») і 12 червня 1973 року — одностайне виключення; на Президії щодо праці Дзюби «Інтернаціоналізм чи русифікація?» Лукаш сказав, що «не бачить у ній нічого націоналістичного».'
  - '[!decolonization] Ярлики «антирадянський» і «націоналістичний» звучать у протоколах 1973 року як інституційні звинувачення — цитуємо їх лише як радянські категорії й відкидаємо як нейтральні описи.'
  - '[!anti-hagiography] Це не ув''язнення: блокування публікацій майже на все десятиліття 1970-х, нагляд і фактичний домашній арешт, погроза каральною психіатрією, часткове повернення до друку 1979 року й формальне поновлення в травні 1987 року — тому формула «Лукаша ув''язнили» була б хибною; після смерті зібрані ним матеріали до фразеологічного, синонімічного та інших словників було знищено. Лукаш помер 29 серпня 1988 року в Києві.'
  section: 'Тінь: Лист за Дзюбу й відлучення від професії'
  words: 900
- points:
  - 'Повернення до розминки: чому переклад був політично небезпечний — офіційна ввічливість листа робить моральну відмову гострішою, а не м''якшою.'
  - '[!decolonization] Радянська система трактувала переклад, словник і стильовий діапазон як загрозу саме тоді, коли українська починала функціонувати як повноцінна європейська літературна мова.'
  - 'Визнання після мовчання: Літературна премія імені Максима Рильського (1988), премія імені Миколи Зерова (1993) і заснована «Всесвітом» перекладацька премія імені Миколи Лукаша (1989) — відзнаки, що прийшли переважно посмертно.'
  - '[!anti-hagiography] Урок тримаємо як задокументовану моральну дію з практичною ціною, а не як просту історію успіху чи поразки: лист оголив ворожість режиму до принципових українських інтелектуалів.'
  section: 'Дискусія та підсумок: Чому переклад був політично небезпечний?'
  words: 700
focus: 'Mykola Lukash (1919-1988) as a Ukrainian translator and lexicographic mind whose register-shifting work expanded the expressive range of Ukrainian under Russification pressure: his Faust, Decameron, Madame Bovary and Don Quixote read as a practical argument that Ukrainian could carry world literature without passing through Russian, ''Lukashisms'' (archaism, dialect, neologism, revived 17th-18th-century words) framed as linguistic sovereignty rather than decorative eccentricity while still granting the craft and the over-domestication debate, his 23 March 1973 letter offering to serve Ivan Dziuba''s sentence named as the moral act that triggered administrative (not criminal) repression, the Writers'' Union expulsion of 12 June 1973 and the publication blockade of the 1970s named precisely, Soviet charges like ''nationalist'' quoted only as institutional categories and rejected, and the false claim that Lukash was imprisoned explicitly corrected.'
level: BIO
module: bio-361
objectives:
- Пояснювати Лукаша як українського перекладача й лексикографа, що розширював виражальні можливості української мови під тиском русифікації.
- Читати «лукашизми» (архаїзми, діалектизми, неологізми, зміну регістрів) як мовний суверенітет, а не як декоративну ексцентрику — і водночас як перекладацьке ремесло.
- 'Точно називати механізм 1973 року: адміністративне відлучення від професії, а не кримінальний вирок; не писати «Лукаша ув''язнили».'
- Тримати радянські звинувачення («антирадянський», «націоналістичний») як інституційні категорії, які він відкинув, а не як нейтральні описи.
- 'Розділяти перекладацьку майстерність і свідому дію: не зводити кожен лексичний вибір до дисидентства.'
