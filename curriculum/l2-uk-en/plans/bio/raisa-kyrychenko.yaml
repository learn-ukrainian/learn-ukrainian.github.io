objectives:
  - >-
      Аналізувати Раїсу Кириченко як виконавицю, що поєднала полтавську
      локальну пам'ять, професійну сцену і український пісенний канон
  - >-
      Розрізняти автентичний фольклор, професійну стилізацію і естрадно-
      фольклорну пісенну практику
  - >-
      Критично оцінювати радянські та пострадянські інституційні рамки її
      кар'єри без агіографії і без вигаданого переслідування
  - >-
      Формулювати деколонізаційне прочитання регіональної української пісні
      як носія мови, дому і національної пам'яті
