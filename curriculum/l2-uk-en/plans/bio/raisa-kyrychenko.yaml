content_outline:
  - annotations:
      - '[!biography]'
      - '[!epistemic-humility]'
    points:
      - >-
          Почати з жанрів джерел: енциклопедична стаття, сторінка премії,
          правовий акт і локальний репортаж відповідають на різні запитання.
      - >-
          [!biography] У звичайному викладі використовувати ім'я Раїса
          Кириченко; форми Панасівна й Опанасівна показати лише в таблиці з
          точною атрибуцією.
      - >-
          [!epistemic-humility] Зберегти конфлікт між записами про 1943/1944
          рік, 14 жовтня/14 листопада та Корещину/Землянки; не вигадувати
          розв'язання без актового запису.
      - >-
          Зафіксувати дівоче прізвище Корж, дату смерті й поховання як
          перевірні факти, а не як початок мелодраматичного сюжету.
    section: 'Три біографічні записи — одна постать'
    words: 600
  - annotations:
      - '[!anti-hagiography]'
    points:
      - >-
          Побудувати професійний маршрут від самодіяльного й заводського хору
          через «Веселку», «Льонок», Херсон, Черкаський народний хор,
          «Росаву» та Полтавську філармонію до «Чураївни».
      - >-
          Показати розбіжності років між ЕСУ, ЕІУ та Комітетом премії в
          компактній таблиці замість удавано безпомилкової хронології.
      - >-
          Пояснити практику хорового співу, філармонійної роботи, ансамблевої
          взаємодії, хорового диригування й викладання співу.
      - >-
          [!anti-hagiography] Назвати державні сцени, гастрольні канали,
          радянські звання й репертуарні рамки без вигаданої справи спецслужб,
          дисидентської біографії або прихованих мотивів.
    section: 'Професійний маршрут: хор, філармонія, освіта'
    words: 800
  - annotations:
      - '[!decolonization]'
    points:
      - >-
          Виходити з перевірного означення мецо-сопрано, але всі висновки про
          тембр, регістр, дикцію, фразування, дихання й словесний наголос
          прив'язувати до конкретної фонограми й часової позначки.
      - >-
          Порівняти дві версії «Маминої вишні»: музичний фільм «Автограф» з
          «Росавою» та концерт 25 березня 2001 року з гуртом «Краяни».
      - >-
          Дослідити аранжування, ансамблевий баланс, мікрофон, сценічний жест,
          монтаж і простір кадру; дозволити кілька доказових інтерпретацій.
      - >-
          [!decolonization] На матеріалі «Ой гарна я, гарна» розрізнити
          українську народну пісню, професійне виконання і постановний
          сільський образ; не називати запис неоформленою автентикою.
    section: 'Голос у роботі: три записи, дві пісенні моделі'
    words: 1100
  - annotations:
      - '[!myth-buster]'
    points:
      - >-
          Розрізнити репертуар, публічний сценічний образ і політичну позицію:
          назва «Я козачка твоя» не доводить переконань співачки.
      - >-
          Назвати Шевченківську премію 1986 року, звання Героя України 2003
          року й коротку формулу указу як факти визнання, а не готову оцінку
          кожного виконання.
      - >-
          [!myth-buster] Зберегти розбіжність у датуванні альбому «Ой гарна я,
          гарна» (1990 у Комітету, 1992 в ЕСУ) й не замінювати джерельну
          роботу одним гладким каталогом.
      - >-
          Використати полтавське вшанування 2024 року й репортаж про
          музей-садибу 2025 року як датовані приклади рецепції; не приписувати
          всій країні однакового ставлення.
    section: 'Публічний образ, визнання й локальна пам''ять'
    words: 700
focus: >-
  Раїса Кириченко як українська мецо-сопрано й педагогиня: джерельно прозора
  біографія, професійний маршрут через хори, філармонії та ансамблі,
  порівняльне слухання конкретних записів, Полтавщина і датована рецепція без
  вигаданої дисидентської історії чи політичних висновків із пісенних назв.
