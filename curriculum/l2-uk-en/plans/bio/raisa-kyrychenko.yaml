content_outline:
  - points:
      - >-
          Провокація: як співачка з Полтавщини, що пройшла через аматорські
          хори, фабричну працю, філармонії та професійні ансамблі, стала
          символом української пісенної спадщини?
      - >-
          [!biography] Раїса Кириченко (1943-2005) — українська співачка,
          мецо-сопрано, педагогиня і публічна виконавиця, чия постать
          поєднує Полтавщину, фольклорну стилізацію, естрадну сцену і
          національну пісенну пам'ять.
      - >-
          Навчальне запитання: де межа між "народним голосом" і
          професійною сценою, яка формує образ народу через репертуар,
          костюм, ансамбль і запис?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебати 1: автентичність чи професійна стилізація? Кириченко
          походила з сільського й аматорського співу, але її публічна
          кар'єра була філармонійною, ансамблевою і сценічно опрацьованою.
      - >-
          Дебати 2: радянські звання і сцени — компроміс, контроль чи
          канал для української пісні? Модуль не приховує офіційних титулів,
          але аналізує, чому саме український репертуар пережив систему.
      - >-
          [!decolonization] Не подавати українську народну пісню як
          декоративну "етнографію" радянської сцени. У центрі — мова,
          Полтавщина, жіночий голос, дім, село і пострадянська національна
          рецепція.
      - >-
          [!epistemic-humility] Патронімік і дата/місце народження мають
          джерельні розбіжності. У плані використовується Раїса Кириченко
          як дисплейне ім'я, а варіанти фіксуються як предмет джерельної
          грамотності.
    section: 'Конфліктна карта: Народна пісня на професійній сцені'
    words: 900
  - points:
      - >-
          Полтавський початок: Корещина, Землянки і родина Коржів у джерелах
          показують локальну пам'ять, де пісня пов'язана з домом, селом,
          родом і конкретною землею.
      - >-
          Ранні сцени: аматорський спів, фабричний хор, Полтавська
          філармонія і ансамбль "Веселка" як шлях від локального голосу до
          професійної траєкторії.
      - >-
          Регіональні інституції: Житомирський "Льонок", Херсонська
          філармонія, Черкаський народний хор, "Росава" і повернення до
          Полтави як карта української пісенної мережі.
      - >-
          Освіта і педагогіка: Харківський інститут мистецтв, хорове
          диригування і викладання співу в Полтавському музичному училищі
          імені Миколи Лисенка.
    section: 'Формування: Полтавщина, хор і філармонійна школа'
    words: 1000
  - points:
      - >-
          Репертуар родини й дому: "Біла хата", "Мамина вишня", "Пісня про
          хліб", "Синові", "Явір і яворина", "Два кольори" і "Стоять
          тополі" як матеріал для аналізу образів хати, матері, села і
          дерева.
      - >-
          Образ "Я козачка твоя, Україно": публічна формула не як простий
          лозунг, а як сценічна ідентичність, яка поєднує жіночий голос,
          козацький символічний ресурс і державну пам'ять.
      - >-
          Ансамблі "Росава" і "Чураївна": професійна робота з народною
          інтонацією, костюмом, хором і солісткою як інструментами
          впізнаваності.
      - >-
          Після 1991 року: указ про присвоєння звання Героя України
          2003 року, музей-садиба "Мамина вишня" і Полтавська локальна
          пам'ять показують, як державне визнання і місцева опіка
          взаємодіють.
    section: 'Діяльність: Пісенний образ дому і України'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Кириченко не була поза системою: її кар'єра
          проходила через державні хори, філармонії, ансамблі, звання,
          гастролі й офіційні записи. Це рамка, не звинувачення і не
          виправдання.
      - >-
          [!myth-buster] "Народність" не означає неоформлену автентику.
          Сценічна народна пісня має режисуру, добір репертуару, костюм,
          мікрофон, аранжування і політику дозволеного.
      - >-
          Джерельні розбіжності: патронімік Панасівна / Опанасівна та
          варіанти народження не треба замітати. Вони стають вправою з
          поваги до джерел і локальної пам'яті.
      - >-
          Хвороба і публічна підтримка згадуються обережно. Модуль не
          перетворює біографію на мелодраму, а зберігає фокус на голосі,
          репертуарі, інституціях і пам'яті.
    section: 'Тінь: Сценічна народність і джерельні розбіжності'
    words: 900
  - points:
      - >-
          Повернення до розминки: студент пояснює, як регіональний голос
          стає національним не через "природність", а через репертуар,
          сцену, медіа і повторення.
      - >-
          Порівняння з Ніною Матвієнко: дві моделі професійної народної
          сцени — архаїчний тембр і полтавська естрадно-фольклорна пісенність.
      - >-
          Деколонізаційний висновок: українська народна пісня в радянських
          інституціях не була лише прикрасою; вона могла нести мову,
          регіональну пам'ять і образ України.
    section: 'Дискусія та підсумок: Регіональний голос як національна пам''ять'
    words: 700
focus: >-
  Раїса Кириченко як українська співачка Полтавщини: аматорський і
  філармонійний шлях, професійна народно-естрадна сцена, "Мамина вишня",
  "Я козачка твоя, Україно", музейна і державна пам'ять, а також складність
  радянських інституцій без вигаданого репресивного сюжету.
