content_outline:
- points:
  - 'Джерельне питання: як описати поетичну, фотографічну, ветеранську й військову працю Максима Кривцова, не перетворюючи загибель на критерій мистецької якості?'
  - Повідомлення ПЕН 8 січня 2024 року й репортаж Суспільного про презентацію книжки мають різні функції.
  - '[!biography] Народження, участь у Революції Гідності, служба, цивільна праця й книжка за прямими джерелами.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: як окремо читати ролі добровольця 2014 року, працівника ветеранських організацій і військовослужбовця після 2022 року?'
  - 'Дебат 2: що доводить включення книжки до списку ПЕН і чого воно не доводить про весь корпус текстів?'
  - '[!epistemic-humility] Не реконструювати бойовий досвід, психологічний стан або мотиви служби з поетичного образу.'
  - '[!decolonization] Українська культурна й громадянська діяльність подається як власна дія, а не лише реакція на російське насильство.'
  section: 'Конфліктна карта: Поет, ветеранський працівник і військовослужбовець'
  words: 900
- points:
  - Народження 22 січня 1990 року в Рівному за Українським ПЕН.
  - Участь у Революції Гідності й добровільне долучення до війська 2014 року без непідтверджених деталей підрозділів.
  - Робота в центрі реабілітації та реадаптації учасників АТО й ООС та у Veteran Hub.
  - Публікації в антологіях і пісня на слова Кривцова як перевірний бібліографічний контекст.
  section: 'Формування: Громадянська, ветеранська і творча праця'
  words: 1000
- points:
  - Повернення до війська після початку повномасштабного вторгнення за ПЕН.
  - Вихід збірки «Вірші з бійниці» наприкінці 2023 року й включення до переліку ПЕН.
  - Загибель 7 січня 2024 року подається у перевірному мінімумі без графічних подробиць.
  - Репортаж Суспільного про презентацію без автора аналізується як пізніша рецепція книжки.
  section: 'Діяльність: Військова служба, книжка і фотографія'
  words: 1300
- points:
  - '[!anti-hagiography] Служба й загибель не звільняють від аналізу конкретного вірша, композиції та редакційного контексту.'
  - '[!myth-buster] Формула «Розстріляне відродження 2.0» не є нейтральною періодизацією і не входить до фактологічного каркаса.'
  - Особисті цитати з некролога не переносяться до плану без локатора, мінімального обсягу й правової перевірки.
  - Відсутність перевіреного відкрито ліцензованого портрета означає текстовий формат, а не дозвіл копіювати фото з соцмереж.
  section: 'Межі джерел: Біографія і літературна оцінка'
  words: 900
- points:
  - Таблиця «роль — дата — пряме джерело — оцінка — межа».
  - Порівняння первісного повідомлення ПЕН із репортажем про пізнішу презентацію.
  - '[!decolonization] Пам''ять про загиблого автора не стирає його цивільну працю з ветеранами й дітьми.'
  - Висновок про багаторольову біографію без прогнозу канонічного статусу книжки.
  section: 'Дискусія та підсумок: Читати працю, а не символ'
  words: 700
focus: Джерельно обмежений аналіз поетичної, фотографічної, ветеранської та військової праці Максима Кривцова і рецепції його першої збірки.
