objectives:
- Критично аналізувати життя та творчість Максима Кривцова як феномен культури воєнного часу.
- Визначати та пояснювати тяглість російських геноцидних практик проти української інтелігенції на прикладі XX та XXI століть.
- Застосовувати методику повільного читання для аналізу поезії верлібром.
- Формулювати власну аргументовану позицію в дискусії про ціну культурного спротиву та роль митця на війні.
