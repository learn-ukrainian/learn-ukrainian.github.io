content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Провокація: Максим Кривцов мріяв видати книгу, в якій не буде слова «війна». Чому ж він увійшов в історію як один з найпронизливіших
    голосів саме воєнної поезії свого покоління?'
  - Цитування кількох рядків з його вірша без вказівки авторства — що відчуває ліричний герой?
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1: Ким був «Далі» в першу чергу — воїном, що пише вірші, чи поетом, змушеним взяти до рук зброю? Як військовий
    досвід трансформував його поетику?'
  - 'Дебат 2: Чи є загибель Кривцова та інших митців прямим продовженням політики Розстріляного відродження? Аналіз тяглості
    російських геноцидних практик проти української інтелігенції.'
  - '[!epistemic-humility] Позиції в дискусії: від «трагічної випадковості війни» до «цілеспрямованого знищення культурного
    генофонду».'
  section: 'Конфліктна карта: Голос покоління чи жертва історії?'
  words: 900
- points:
  - 'Дитинство та юність: що формувало світогляд майбутнього поета до 2014 року.'
  - 'Революція Гідності та перша фаза війни (АТО/ООС): перший бойовий досвід і перші воєнні тексти.'
  - 'Життя між ротаціями: спроби адаптуватися до мирного життя, робота в Центрі реабілітації та реадаптації ветеранів.'
  - 'Повномасштабне вторгнення: свідоме повернення на фронт як остаточний вибір.'
  section: 'Формування: Шлях до окопу'
  words: 1000
- points:
  - 'Аналіз ключових тем та образів у збірці «Вірші з бійниці»: життя і смерть на нулі, любов і ніжність як форма спротиву,
    природа як єдиний прихисток.'
  - 'Поетика Кривцова: верлібр, розмовна інтонація, метафори, що народжуються з військового побуту.'
  - '«Далі» як прозаїк: аналіз уривків з недописаного роману — спроба зафіксувати реальність за межами поетичної мови.'
  - 'Первинні джерела: читання та аналіз його найвідоміших віршів («Він переїхав в жовте поле», «Я поверну собі своє життя»
    тощо).'
  section: 'Діяльність: Поезія з бійниці'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Відмова від романтизації смерті: Кривцов не «бронзовий пам''ятник», а жива людина, яка не хотіла
    помирати. Його загибель — це не подвиг, а трагедія і злочин Росії.'
  - 'Психологічна ціна війни: вигорання, ПТСР, втрата побратимів — теми, що присутні в його текстах.'
  - '«Прокляття поетів»: чому українська культура змушена платити таку високу ціну за своє існування? Дискусія про відповідальність
    суспільства.'
  - '[!myth-buster] Розвінчання міфу про «натхненну» творчість на війні. Це не натхнення, а спроба не збожеволіти, задокументувати
    та пережити травму.'
  section: 'Тінь: Ціна спротиву'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: Чому поет, який прагнув миру, став символом війни? Студент формулює відповідь, спираючись на
    знання з модуля.'
  - 'Тяглість та суб’єктність: як творчість Кривцова утверджує українську суб’єктність всупереч століттям російського колоніального
    тиску.'
  - '«Розстріляне відродження 2.0»: Максим Кривцов як частина нового мартирологу українських митців. Його спадщина — це звинувачення,
    заповіт і виклик для майбутніх поколінь.'
  - '[!decolonization] Творчість Кривцова як акт деколонізації — повернення власного голосу та права говорити про війну від
    першої особи, а не як об''єкт в чужих наративах.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Життя, творчість і загибель Максима Кривцова («Далі») як символ покоління війни. Аналіз його поезії як форми спротиву
  та історичного свідчення. Паралелі з Розстріляним відродженням 1930-х років.
