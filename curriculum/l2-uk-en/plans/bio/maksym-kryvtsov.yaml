objectives:
- Побудувати атрибутовану хронологію громадянської, ветеранської, творчої й військової праці Максима Кривцова.
- Розрізняти біографічний факт, меморіальне свідчення, інституційний список і літературну оцінку.
- Аналізувати відомості про книжку й презентацію без перенесення некрологічної мови в оцінку поезії.
- Формулювати висновки про пам'ять без історичної тотожності з Розстріляним відродженням і без неперевірених цитат.
