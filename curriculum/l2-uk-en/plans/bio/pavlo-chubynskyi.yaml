content_outline:
- points:
  - 'Провокація: чому «автор гімну» — це замало для Чубинського, і як пісня, етнографія, статистика й звичаєве право складаються в одну працю над українським самопізнанням під імперським тиском?'
  - '[!biography] Знайомство з постаттю етнографа, статистика й громадівця: діяч Київської громади, керівник етнографічно-статистичної експедиції, організатор Південно-Західного відділу Російського географічного товариства й автор слів «Ще не вмерла України...».'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (українська агенда): Київська громада, недільні школи, збирання пісень, звичаїв, статистики й перепис міста робили українське життя видимим як мову, територію й соціальну практику.'
  - 'Позиція 2 (подвійна рамка): за Котенком, експедиція служила імперським «державним завданням» і пореформеній депольонізації — і водночас Чубинський зі старогромадівцями вивчав та картографував український національний простір.'
  - '[!decolonization] Імперські титули «Западно-Русский край», «Юго-Западный отдел», «Малороссия» тримаємо в лапках як джерельну мову, а не як сучасну географію.'
  - '[!epistemic-humility] Нагороди (золота медаль РГТ 1873, паризьке відзначення 1875, Уваровська премія 1879) — свідчення наукового визнання в нерівних інституціях, а не легітимація імперської влади над українською культурою.'
  section: 'Конфліктна карта: Імперська комісія чи українська агенда?'
  words: 900
- points:
  - 'Походження й освіта: 27 січня 1839 року, хутір поблизу Борисполя (нині Чубинське); Друга київська гімназія та юридичний факультет Санкт-Петербурзького університету (1861); дописував до «Основи» під псевдонімом «Павлусь».'
  - 'Київська громада й хлопомани: недільні школи, популярна освіта, фольклорна праця й «ходіння в народ» — це легальна культурна робота, яку імперські кола вважали політично підозрілою.'
  - '[!anti-hagiography] Заслання як утримання й видобуток: 1862 року арешт і заслання під нагляд до Пінеги, потім Архангельська; там він вів статистичну й газетну роботу — покарання за українську діяльність і водночас продовження емпіричного методу.'
  section: 'Формування: Громада, «Основа» й північне заслання'
  words: 1000
- points:
  - 'Етнографічно-статистична експедиція (від 1869): збір фольклору, діалектів, звичаїв, обрядів, правових практик і статистики — колективна польова праця з учителями, студентами й духовенством, а не міф самотнього збирача.'
  - '«Труди этнографическо-статистической экспедиции...» (1872-1878): сім томів / девʼять книг — одне з головних джерельних зібрань української народної культури; імперську назву подаємо як бібліографію із застереженням.'
  - 'Південно-Західний відділ РГТ (1873-1876) і одноденний перепис Києва (2 березня 1874 року): формально імперська учена установа, укомплектована здебільшого членами Київської громади; статистика як громадянська праця й українська міська очевидність.'
  - '[!decolonization] Джерельна історія гімну: вірш «Ще не вмерла України...» (1862), публікація без підпису в львівській «Меті» (1863) з тимчасовим приписуванням Шевченкові, музика Вербицького, статус державного гімну (1992) і закон про слова (2003) — окремі етапи, а не одна подія.'
  - '[!epistemic-humility] «Браття» й інша лексика належать до історичного/офіційного тексту; пояснюємо як джерельну мову, не стираючи участі жінок у громадянській історії.'
  section: 'Діяльність: Експедиція, «Труди», перепис і гімн'
  words: 1300
- points:
  - '[!anti-hagiography] 1875 року донос Юзефовича й міністерський меморандум про «шкідливу діяльність» київського відділу стали кроками до Емського указу: закриття відділу, приборкання громади й обмеження проживання.'
  - 'Емський указ як контроль над знанням: тут це не лише заборона друку, а удар по інституційних місцях, де українська мова, фольклор, статистика й освіта ставали доказом народу й території.'
  - 'Наслідки для особи: за ЕІУ Чубинському й Драгоманову заборонили жити в Україні, Москві та Петербурзі під негласним наглядом; після клопотань 1876 року він виїхав до Петербурга на службу в Міністерстві шляхів — не «вільний кар''єрний вибір», а після примусу.'
  - '[!decolonization] Деколонізаційна рамка не стирає імперські папери — вона показує, як ці категорії працювали, а тоді як українські діячі використовували обмежені простори.'
  section: 'Тінь: Емський указ і контроль над знанням'
  words: 900
- points:
  - 'Повернення до розминки: чому етнографія, статистика й звичаєве право — це не декоративний фольклор, а доказ того, що українське життя мало мову, територію й соціальну практику?'
  - 'Дрейф авторства: тимчасове приписування вірша Шевченкові через безпідписну публікацію в «Меті» — компактний урок джерелознавства про верстку, репутацію й пам''ять.'
  - '[!anti-hagiography] «Труди» не писала одна людина: Чубинський організовував, редагував і формував мережевий корпус із багатьма дописувачами й пізнішими редакторами.'
  - '[!decolonization] Пара Чубинський-Драгоманов показує, що Емський режим атакував книжки, проживання, університети, газети й учені товариства разом.'
  section: 'Дискусія та підсумок: Пісня, наука й територія'
  words: 700
focus: 'Pavlo Chubynskyi (1839-1884) as a Ukrainian ethnographer, statistician, legal-custom researcher and Kyiv Hromada organizer who made Ukrainian language, custom, territory, song and social life legible through collective research under Russian-imperial pressure: the 1862 poem that became the anthem taught as one result within a wider life, the ethnographic-statistical expedition read through Kotenko''s double frame (imperial depolonization project AND Ukrainian national-space project), imperial titles and awards kept source-labeled rather than treated as neutral authority, the 1863 arrest, Ems Ukase and closure of the South-Western Branch named as knowledge control, and the anthem''s poem/publication/setting/law stages held apart.'
level: BIO
module: bio-354
objectives:
- Пояснювати Чубинського як етнографа, статистика, дослідника звичаєвого права й громадівця, а не лише «автора гімну».
- 'Читати етнографічно-статистичну експедицію за подвійною рамкою Котенка: імперський депольонізаційний проєкт І водночас українська праця над національним простором.'
- Тримати імперські назви й нагороди як джерельну мову, а не як нейтральний авторитет над українською культурою.
- 'Називати політичний тиск конкретно: арешт і північне заслання 1862 року, нагляд, доноси 1875 року, Емський указ і закриття Південно-Західного відділу.'
- 'Розділяти етапи джерельної історії гімну: вірш 1862 року, публікація в «Меті» 1863 року, музика Вербицького, статус державного гімну 1992 року й закон 2003 року.'
