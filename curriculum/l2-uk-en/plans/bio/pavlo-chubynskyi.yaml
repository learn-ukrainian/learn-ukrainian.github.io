objectives:
  - >-
      Аналізувати життя і працю Павла Чубинського в контексті української
      етнографії, громадянського руху і національної символіки, уникаючи
      агіографії
  - >-
      Пояснювати, як етнографічно-статистична експедиція і текст гімну формували
      українську культурну основу
  - >-
      Пояснювати механізм імперського тиску: заслання 1863 року і Емський указ
      1876 року
  - >-
      Формулювати аргументовану позицію щодо ролі Чубинського як будівничого
      української культурної інфраструктури
