content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому людина, чий вірш став гімном, прожила життя під
          імперським наглядом і двічі у вигнанні?
      - >-
          [!biography] Павло Чубинський - етнограф, фольклорист і громадський
          діяч, автор тексту українського гімну і фундатор найбільшого корпусу
          української народної культури XIX століття.
      - >-
          Походження і освіта: Бориспіль, Друга київська гімназія, юридичний
          факультет у Петербурзі, журнал «Основа» і знайомство з Шевченком,
          Костомаровим, Кулішем.
      - >-
          Стара громада і хлопоманство: входження в київське українофільське
          середовище як громадянський, а не лише науковий вибір.
    section: 'Формування: Від Борисполя до петербурзької громади'
    words: 1000
  - points:
      - >-
          Текст гімну: «Ще не вмерла Україна» (1862) - громадянська поезія, що
          стала національним символом; музика Михайла Вербицького.
      - >-
          Етнографічно-статистична експедиція 1869-1871 і семитомні «Праці»:
          легенди, казки, обрядові й побутові пісні, звичаєве право.
      - >-
          Карта українських наріч (1871, разом з К. Михальчуком) як наукове
          ствердження української мовної території.
      - >-
          [!decolonization] Не зводити Чубинського лише до «автора гімну»:
          навчальний фокус - розбудова української культурної інфраструктури.
    section: 'Діяльність: Гімн і корпус народної культури'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
    points:
      - >-
          Механізм тиску називати прямо: заслання до Архангельської губернії
          1863 року за наказом шефа жандармів, сім років вигнання.
      - >-
          Емський указ 1876 року і повторне вислання з України, заборона
          проживати в українських і столичних губерніях.
      - >-
          [!anti-hagiography] Імперія використовувала не вязницю, а
          адміністративне вигнання і примус таланту - північні статистичні
          обстеження як вкрадена праця колонізованого фахівця.
    section: 'Контекст: Заслання, Емський указ і механізм імперського тиску'
    words: 1000
  - points:
      - >-
          Текстологія гімну: різниця між первісним віршем і стандартизованим
          текстом Закону 2003 року; що саме входить до державного гімну.
      - >-
          Сучасна пам'ять: вулиці, пам'ятники, ювілейна монета НБУ 2009 року,
          премія імені Чубинського.
      - >-
          Чому важливо памʼятати фундатора української етнографії, а не лише
          рядок гімну.
    section: "Сучасна пам'ять: Гімн, наука і вшанування"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як громадянська культура XIX століття під
          імперським тиском заклала українську національну символіку.
      - >-
          Аргументована відповідь: що робить Чубинського важливим - текст
          гімну, етнографічний корпус, громадська праця чи стійкість у вигнанні.
      - >-
          Фінальне письмо: Чубинський як приклад розбудови культури всупереч
          забороні.
    section: "Дискусія та підсумок: Культура всупереч забороні"
    words: 800
focus: >-
  Pavlo Chubynskyi as ethnographer, civic organiser, and author of the
  Ukrainian anthem text: builder of the foundational nineteenth-century corpus
  of Ukrainian folk culture, twice exiled by the Russian Empire, taught through
  language, civic infrastructure, and resistance to imperial suppression.
