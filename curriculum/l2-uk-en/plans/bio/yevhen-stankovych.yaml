content_outline:
- points:
  - >-
    Вхід через чотири масштаби слухання: ритуальна сцена, камерний ансамбль,
    великий оркестр і поминальна вокально-симфонічна форма.
  - >-
    Відмова від єдиного ярлика: назва «автор “Коли цвіте папороть”» є
    корисним входом, але не замінює жанрового й історичного діапазону.
  section: Слухати масштаб, а не ярлик
  words: 350
- points:
  - >-
    Народження 19 вересня 1942 року у Сваляві; Закарпаття воєнної доби як
    перевірений історичний контекст, а не готове психологічне пояснення стилю.
  - >-
    Ужгородська віолончель, Львів і Адам Сольтис, Київ і навчання у Бориса
    Лятошинського та Мирослава Скорика; розбіжні межі років подано відкрито.
  - >-
    Редакторська праця після випуску 1970 року, викладання від 1988 року,
    уже здійснені ролі у Спілці композиторів та офіційні відзнаки.
  section: Свалява — Ужгород — Львів — Київ
  words: 700
- points:
  - >-
    «Коли цвіте папороть» як взаємодія купальської обрядовості, хору,
    оркестру, сценічної дії та перетворених гоголівських мотивів.
  - >-
    Підготовлена наприкінці 1970-х публічна постановка не відбулася через
    ідеологічне блокування; без недоведеного наказу, телефонного дзвінка чи
    персональної справи композитора.
  - >-
    Цілісна сценічна версія Львівської опери 2017 року та точне слухання
    запису театру на відтинку 03:00–06:00.
  section: Сцена, ритуал і зірвана прем’єра
  words: 750
- points:
  - >-
    Камерна симфонія № 3 для флейти й дванадцяти струнних: регістр,
    артикуляція, фактура, динаміка та роль сольного інструмента.
  - >-
    Симфонія № 2 «Драматична» у записі другої редакції 2023 року: масштаб,
    звукова щільність, ритмічний рух і динамічна траєкторія.
  - >-
    Порівняльний протокол від спостереження до локальної інтерпретації без
    приписування незмінних емоцій творові або всім слухачам.
  section: 'Симфонічна лабораторія: камера й великий оркестр'
  words: 850
- points:
  - >-
    «Каддиш-реквієм “Бабин Яр”» 1991 року на текст Дмитра Павличка:
    конкретний єврейський поминальний термін, пам'ять про жертв Голокосту й
    перевірена концертна рецепція.
  - >-
    «Панахида за померлими з голоду» 1992 року: склад виконавців, мовчання,
    тембр і динаміка як предмет аналізу в точному записі 01:00–04:30.
  - >-
    Етична межа між музичним спостереженням, історичним контекстом і
    універсалізацією чужого досвіду.
  section: 'Музика пам’яті: Бабин Яр і Голодомор'
  words: 800
- points:
  - >-
    «Я стверджуюсь», балет і фільм про княгиню Ольгу, хорові та сценічні
    твори як різні способи роботи з літературою, історією й образом.
  - >-
    «Слово о полку Ігоревім» як звернення до середньовічної пам'ятки Русі з
    глибокою українською рецепцією, а не до російської виключної власності.
  - >-
    Підсумкова теза про перетворення матеріалу перевіряється трьома творами,
    двома слухацькими доказами та чіткою межею певності.
  section: 'Текст, театр, кіно: способи перетворення'
  words: 550
focus: >-
  Євген Станкович як український композитор кількох масштабів: від камерної
  симфонічної лабораторії до ритуальної сцени й музики пам'яті; біографія,
  точне слухання та джерельна атрибуція працюють як єдиний доказовий метод.
level: BIO
module: bio-377
objectives:
- >-
  Відтворювати перевірену освітню й професійну хронологію Євгена Станковича,
  позначаючи розбіжні межі років як варіанти джерел.
- >-
  Порівнювати камерний і великий симфонічний масштаб за регістром,
  артикуляцією, фактурою, ритмічним рухом і динамікою у точних записах.
- >-
  Аналізувати сценічну історію «Коли цвіте папороть», відокремлюючи
  підтверджене ідеологічне блокування від недоведених персональних сюжетів.
- >-
  Формулювати етичний аргумент про твори пам'яті, поєднуючи музичне
  спостереження, історичний контекст і межу певності.
