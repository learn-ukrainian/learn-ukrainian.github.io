objectives:
- >-
  Аналізувати творчий шлях Євгена Станковича як ключової постаті сучасного
  українського симфонізму та сценічної музики.
- >-
  Оцінювати значення фольк-опери «Коли цвіте папороть» в контексті
  неофольклоризму, купальського ритуалу та радянської цензури постановки.
- >-
  Простежувати педагогічну лінію Лятошинський — Скорик — Станкович як
  три покоління української композиторської школи.
- >-
  Критично аналізувати роль музики пам'яті («Бабин Яр», «Панахида»,
  «Каддиш») у національній культурній свідомості.
