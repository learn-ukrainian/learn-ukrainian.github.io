content_outline:
- points:
  - >-
    Провокація: Як композитор, народжений у Закарпатті під час угорської
    окупації, створив фольк-оперу, яку заборонили ставити за радянських
    часів, і став одним із найплідніших симфоністів незалежної України?
  - >-
    [!biography] Євген Федорович Станкович (нар. 1942) — український
    композитор, педагог, інституційний діяч, автор симфоній, опер,
    камерної та вокально-симфонічної музики, музики пам'яті.
  section: Розминка
  words: 400
- points:
  - >-
    Дебат 1: «Радянський лауреат» vs «будівничий українського
    музичного мислення»? Станкович отримував радянські нагороди,
    обіймав офіційні посади — але його творчість глибоко вкорінена в
    українському фольклорі, ритуалі та національній пам'яті.
  - >-
    Дебат 2: Чи можна звести його до «Коли цвіте папороть»? Ця
    фольк-опера — найвідоміший твір, але за нею стоять камерні
    симфонії, «Бабин Яр», «Панахида за померлими з голоду»,
    «Я стверджуюсь» на слова Тичини.
  - >-
    [!decolonization] Станкович — не «радянський композитор». Його
    українська інституційна, фольклорна та меморіальна робота не
    повинна зводитися до «продукту радянської культури».
  - >-
    [!epistemic-humility] Станкович — жива постать. Модуль
    використовує лише завершені твори та підтверджені ролі; не
    передбачає майбутню рецепцію, стан здоров'я чи поточні позиції.
  section: 'Конфліктна карта: Масштаб за лаштунками одного шедевра'
  words: 900
- points:
  - >-
    Народження та раннє середовище: Свалява, Закарпаття, 1942 —
    угорська окупація; ранні студії віолончелі в Ужгороді.
  - >-
    Львівське навчання (Адам Сольтис) та Київська консерваторія:
    композиція у Бориса Лятошинського та Мирослава Скорика — пряме
    продовження української композиторської лінії.
  - >-
    Формативні впливи: закарпатський та карпатський фольклор,
    церковний спів, купальський ритуал, європейський модернізм.
  - >-
    Редакційна робота в «Музичній Україні» та багаторічне
    викладання в Київській консерваторії / Національній музичній
    академії України.
  section: 'Формування: Від Закарпаття до Київської школи'
  words: 1000
- points:
  - >-
    «Коли цвіте папороть» — фольк-опера, що з'єднує
    неофольклоризм, купальський ритуал, гоголівську трансформацію
    та радянську цензуру постановки. Довгий шлях від написання до
    сценічної прем'єри як приклад культурно-інституційного тиску.
  - >-
    Музика пам'яті: «Бабин Яр», «Чорна елегія», «Панахида за
    померлими з голоду», «Каддиш» — твори, що вимагають єврейської
    та голодоморної контекстуальної уваги.
  - >-
    Симфонія № 3 «Я стверджуюсь» на слова Павла Тичини (Шевченківська
    премія) та «Слово о полку Ігоревім» — масштабні вокально-симфонічні
    полотна, що поєднують модерну техніку з літературною традицією.
  - >-
    Камерні симфонії, балети, хорова та кіномузика — ширина жанрового
    охоплення, що виходить далеко за межі одного сценічного твору.
  section: 'Діяльність: Від фольк-опери до симфоній пам''яті'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Станкович працював у радянських інституціях,
    обіймав офіційні посади, отримував нагороди. Ці факти — контекст,
    не ідентичність. Модуль не повинен ані приховувати їх, ані
    зводити до них всю біографію.
  - >-
    Цензура/постановка «Коли цвіте папороть»: джерела описують
    складну, затриману або заблоковану сценічну історію за радянських
    часів. Це рамка культурної політики, а не доказ персональної
    кримінальної справи.
  - >-
    [!myth-buster] Спрощення «Коли цвіте папороть = Гоголь = російська
    література» — небезпечне. Твір працює з купальським ритуалом,
    українською народною традицією, а гоголівський мотив є
    трансформованим джерелом, не маркером належності до російської культури.
  - >-
    Ризик «радянських нагород»: перелік нагород і посад може заслонити
    музику. Модуль тримає обидва виміри видимими: інституційний контекст
    і музичну субстанцію.
  section: 'Тінь: Інституційна рамка та ризик спрощення'
  words: 900
- points:
  - >-
    Повернення до розминки: студент тепер може аргументовано пояснити
    масштаб творчості Станковича — від фольк-опери через камерні
    симфонії до музики пам'яті.
  - >-
    Сучасний етап: Станкович — живий міст від пізньорадянської
    української концертної музики до пострадянської інституційної
    безперервності.
  - >-
    Педагогічна лінія: Лятошинський — Скорик — Станкович як три
    покоління українського симфонізму.
  - >-
    Актуальне значення: як музика пам'яті — «Бабин Яр», «Панахида
    за померлими з голоду» — резонує в контексті сучасної України?
  section: 'Дискусія та підсумок: Сучасний етап'
  words: 700
focus: >-
  Євген Станкович як живий класик українського симфонізму: від закарпатського
  фольклору через фольк-оперу «Коли цвіте папороть» до симфоній пам'яті
  («Бабин Яр», «Панахида за померлими з голоду»), педагогічна лінія
  Лятошинський — Скорик — Станкович, та інституційна безперервність
  української концертної музики.
