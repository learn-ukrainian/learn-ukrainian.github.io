content_outline:
- points:
  - 'Провокація: Його називали «батьком українського театру». Але чи міг один чоловік бути водночас засновником, режисером,
    драматургом, композитором і провідним актором, не ставши диктатором для власної трупи?'
  - '[!biography] Марко Кропивницький — людина, що була синонімом цілого театру. Як це можливо в умовах імперії, що заперечувала
    існування твого народу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Етнографічний реалізм — це мистецтво чи документація? Критики звинувачували театр Кропивницького у надмірній
    «шароварщині» та фольклорності. Прихильники бачили в цьому єдиний спосіб зберегти національну ідентичність.'
  - 'Дебат 2: Театр одного генія чи колективний успіх? Роль Михайла Старицького, братів Тобілевичів та Марії Заньковецької.
    Чи був Кропивницький лише «першим серед рівних», чи він свідомо применшував роль своїх соратників?'
  - '[!epistemic-humility] Ми ніколи не дізнаємось, що відбувалось за лаштунками. Ми можемо аналізувати лише мемуари, сповнені
    особистих симпатій та образ.'
  - '[!decolonization] Створення професійного українського театру було політичним актом. Це була відповідь на Емський указ
    і спроба довести, що українська мова та культура є живими та самодостатніми.'
  section: 'Конфліктна карта: ''Народник'' чи ''Професіонал''?'
  words: 900
- points:
  - 'Соціальний контекст: Херсонщина середини XIX ст., кріпацтво, культурна русифікація.'
  - 'Єлисаветградська гімназія: перші театральні враження та усвідомлення вторинності української культури в імперській системі.'
  - Аматорські трупи як форма культурного спротиву. Боротьба за право ставити вистави українською в умовах Емського указу.
  - 'Ключовий поворот: перехід від аматорства до ідеї створення професійної трупи як єдиного способу вижити та перемогти.'
  section: 'Формування: Від аматора до бунтівника'
  words: 1000
- points:
  - '1882 рік: Заснування першої професійної української трупи. Постановка «Наталки Полтавки» як маніфест.'
  - 'Кропивницький як тотальний театральний діяч: драматург («Дай серцю волю...», «Глитай, або ж Павук»), режисер, актор,
    композитор, педагог.'
  - 'Створення «національної театральної школи»: виховання плеяди зірок (Заньковецька, Садовський, Саксаганський).'
  - 'Гастролі імперією: тріумф у Петербурзі та Москві. Український театр доводить свою життєздатність і мистецьку вартість.'
  section: 'Діяльність: Театр як інституція'
  words: 1300
- points:
  - '[!anti-hagiography] Кропивницький був авторитарним лідером. Його слово було законом. Це призводило до конфліктів, розколів
    трупи та особистих трагедій.'
  - 'Ціна успіху: виснажливі графіки гастролей, фінансові проблеми, особисті жертви акторів заради спільної справи.'
  - Обмеженість методу? Чи не став етнографічний реалізм, який був революційним у 1880-х, гальмом для розвитку театру у 1900-х?
    Підготовка до появи Леся Курбаса.
  - '[!myth-buster] Міф про «дружню родину корифеїв». Це був колектив амбітних митців, де вирували пристрасті, конкуренція
    та заздрість. Кропивницький мусив бути не лише «батьком», а й «залізною рукою».'
  section: 'Тінь: Диктатура таланту'
  words: 900
- points:
  - 'Повернення до розминки: Чи була диктатура Кропивницького необхідним злом для створення театру в колоніальних умовах?'
  - '[!decolonization] Спадщина Кропивницького — це не лише п''єси та створена ним трупа. Це доказ того, що українська культура
    може створювати складні інституції та перемагати, попри тиск імперії.'
  - 'Його вплив на XX століття: з одного боку, він створив фундамент, на якому стояв театр XX століття. З іншого — саме проти
    його «реалістичного» театру повстали авангардисти 1920-х.'
  - 'Кропивницький сьогодні: символ національного відродження чи приклад авторитарного менеджера в мистецтві?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The dual role of Marko Kropyvnytskyi as both the foundational father and authoritarian patriarch of Ukrainian professional
  theatre, the conflict between his ethnographic realism and the development of high art, and his complex legacy forged under
  imperial censorship.
