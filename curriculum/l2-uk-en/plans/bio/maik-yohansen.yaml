content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Парадокс: Як комедія про мову та прізвища — "Мина Мазайло" — могла стати одним з доказів у справі, що завершилася розстрілом
    автора?'
  - 'Провокація: Чи був Куліш "націоналістом", як його таврувала радянська влада, чи комуністом, який розчарувався в системі?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1 (Прижиттєвий): "Пролетарський письменник" vs "попутник". Дискусії навколо його п''єс у 1920-х. Одні бачили в
    ньому співця революції, інші — прихованого критика режиму.'
  - 'Дебат 2 (Посмертний): Радянська vs сучасна інтерпретація. Спроби СРСР представити його "помилковим" комуністом. Сучасний
    погляд на Куліша як на ключову фігуру культурного опору та модернізатора української драматургії.'
  - '[!epistemic-humility] Визнання, що Куліш був складною фігурою, яка поєднувала комуністичні переконання з глибоким українським
    патріотизмом, що й призвело до його внутрішнього та зовнішнього конфлікту.'
  section: 'Конфліктна карта: Художник чи ідеолог?'
  words: 900
- points:
  - 'Соціальне походження та освіта: шлях від сина наймитів до інспектора народної освіти.'
  - 'Перша світова війна та революція як формуючий досвід: як бої та політичний хаос вплинули на його світогляд.'
  - Переїзд до Харкова, столиці радянської України, та входження в літературне середовище ВАПЛІТЕ — епіцентр мистецьких дискусій.
  section: 'Формування: Від херсонських степів до Харкова'
  words: 1000
- points:
  - 'Аналіз ключових п''єс: "97", "Народний Малахій", "Патетична соната". Еволюція від реалізму до експресіонізму та абсурду.'
  - '"Мина Мазайло" як вершина сатири: аналіз п''єси, що висміювала мовне пристосуванство та комплекс малоросійства.'
  - 'Співпраця з Лесем Курбасом: синергія драматурга та режисера, що створила авангардний український театр і стала однією
    з причин їхньої спільної загибелі.'
  section: 'Діяльність: Тандем з Курбасом і театр "Березіль"'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] Членство в Комуністичній партії: аналіз ідеологічних компромісів, на які йшов драматург, та його
    спроб поєднати служіння мистецтву та партії.'
  - 'Фатальні ілюзії: чи вірив Куліш у можливість "українізувати" комунізм? Його розчарування під час Голодомору та початок
    відкритого конфлікту з владою.'
  - '[!myth-buster] Куліш не був дисидентом із самого початку. Він був частиною системи, яка його знищила. Його трагедія —
    це трагедія віри в ідеали, що виявилися обманом.'
  section: 'Тінь: Компроміси та фатальні ілюзії'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: студент формулює відповідь, чому комедія "Мина Мазайло" була такою небезпечною для тоталітарного
    режиму.'
  - 'Оцінка спадщини: Куліш — не просто жертва терору, а засновник модерної української драматургії. Його вплив на наступні
    покоління письменників.'
  - '[!decolonization] Значення Куліша сьогодні: як його тексти допомагають зрозуміти природу колоніальної політики та боротьбу
    за культурну ідентичність у сучасній Україні.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Микола Куліш, видатний український драматург XX ст. Модерністські п'єси, що поєднували сатиру на радянську дійсність
  ("Мина Мазайло") з глибоким аналізом української ідентичності. Творчий тандем з режисером Лесем Курбасом. Розстріляний в
  урочищі Сандармох.
