objectives:
- >-
  Аналізувати внесок Майка Йогансена в українську прозу (пригодницький і «химерний» жанр,
  метапроза «Подорожі ученого доктора Леонардо…»), поезію, переклад і мовознавство.
- Пояснювати механізм радянського терору на прикладі фабрикованої справи 1937 року та страти письменника, уникаючи спрощених оцінок.
- >-
  Критично оцінювати радянські рубрики на кшталт «пролетарський письменник» і відділяти
  документовані факти від авторської самоміфологізації Йогансена.
- Формулювати аргументовану позицію щодо того, чому незалежне, аполітичне мистецтво сприймалося тоталітарною владою як загроза.
