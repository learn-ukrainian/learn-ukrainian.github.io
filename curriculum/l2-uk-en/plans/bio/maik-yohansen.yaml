objectives:
- Аналізувати ключові п''єси Миколи Куліша в контексті літературних дискусій 1920-х років
- Критично оцінювати складні стосунки митця з радянською владою, уникаючи спрощених оцінок "жертва-кат"
- Пояснювати унікальність творчого тандему Куліша та Курбаса та його значення для українського театру
- Формулювати аргументовану позицію щодо ролі мови та культури в національному самозбереженні на прикладі творчості Куліша
