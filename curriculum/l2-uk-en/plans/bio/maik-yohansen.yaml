content_outline:
- points:
  - >-
    [!biography] Знайомство з Майком Йогансеном: поет, прозаїк-експериментатор,
    перекладач і мовознавець, співзасновник ВАПЛІТЕ й Техно-мистецької групи «А»,
    майстер пригодницької та «химерної» прози й автор «Подорожі ученого доктора Леонардо…».
  - >-
    Провокація: чому тоталітарна система розстріляла письменника, який відверто уникав
    політичних гасел і проголошував незалежність мистецтва від будь-яких «естетичних регламентацій»?
  section: Розминка
  words: 400
- points:
  - >-
    Класична освіта: Третя харківська чоловіча гімназія (старогрецька, латина) та
    історико-філологічний факультет Харківського університету (1917) зі спеціалізацією
    на латині; згодом — студії мовознавства в Леоніда Булаховського та Олекси Синявського.
  - >-
    [!decolonization] Мовний вибір як акт самовизначення: син учителя німецької, який
    спершу писав німецькою та російською, після 1918 року свідомо переходить на українську
    мову письма («поклав різку лінію у світогляді і пристав до марксівського»).
  - >-
    Мовознавець-практик: стаття «Пристосування латиниці до потреб української мови» (1923),
    участь у виробленні українського правопису 1928 року та укладання словників — праця над
    розбудовою української мовної норми.
  section: 'Формування: Класична гімназія, латина і поворот до української мови'
  words: 1000
- points:
  - >-
    Від «Гарту» до ВАПЛІТЕ: співзасновник Спілки пролетарських письменників «Гарт» (1923)
    та Вільної академії пролетарської літератури (ВАПЛІТЕ, 1925) разом із Миколою Хвильовим
    і колегами; після саморозпуску — Техно-мистецька група «А» (1928–1931), «Універсальний
    журнал» та ідея альманаху «Літературний ярмарок».
  - >-
    Пригодницька й експериментальна проза: «Подорож ученого доктора Леонардо…» (друк 1928,
    окреме вид. 1930) як метапроза, де ландшафт стає справжнім героєм, а персонажі — свідомо
    «картонними»; теорія прози «Як будується оповідання» (1928); містифікація як фірмовий прийом.
  - >-
    Поет і перекладач: збірки від «Д'горі» (1921) до «Ясену» (1930); переклади Шекспіра
    («Отелло», 1927), По, Шиллера, Кіплінга; співавтор сценарію фільму Довженка «Звенигора»
    (1927) та ревю «Алло на хвилі 477» (1929) для «Березоля» Леся Курбаса.
  - >-
    [!myth-buster] Радянська рубрика «пролетарський письменник» приховує суть: Йогансен був
    принциповим противником естетичних регламентацій і обстоював мистецьку свободу, а не
    обслуговував партійну лінію.
  section: 'Діяльність: ВАПЛІТЕ, Техно-мистецька група «А» і пригодницька проза'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Йогансен не був підпільним борцем — він був талановитим, демонстративно
    вільним митцем, якого система знищила саме за інтелектуальну незалежність і небажання
    обслуговувати ідеологію.
  - >-
    Механізм терору: арешт у Харкові (18 серпня 1937 за ЕСУ та Вікіпедією; Локальна історія
    подає 11 серпня), імовірно в письменницькому будинку «Слово»; слідство в Києві,
    утримання в Лук'янівській в'язниці.
  - >-
    Фабрикована справа: обвинувачення за статтею 54 Кримінального кодексу УСРР — участь в
    «антирадянській націоналістичній терористичній організації» нібито з 1932 року, вербування
    людей і підготовка терактів проти керівників партії та уряду — без жодних доказів.
  - >-
    Гідність під примусом: на допиті Йогансен не зрікся поглядів і прямо захищав Остапа Вишню
    («ніякий не терорист»), назвавши арешти письменників ознакою «розгубленості й безсилля»
    влади.
  - >-
    [!epistemic-humility] [!myth-buster] Вирок Військової Колегії Верховного Суду СРСР (26 жовтня
    1937) — розстріл із конфіскацією майна; страчений 27 жовтня 1937 у Києві, тіло таємно поховане
    в Биківнянському лісі, а «могила» на Лук'янівському цвинтарі — символічна. Розбіжності джерел
    (дата арешту) та авторську самоміфологізацію фіксуємо відкрито, не згладжуючи.
  section: 'Тінь: Будинок «Слово», фабрикована справа і розстріл'
  words: 1600
- points:
  - >-
    Доля родини й архіву: дружина та син Гай емігрували до Німеччини (1945); твори письменника
    на десятиліття вилучено з обігу, а ім'я викреслено з офіційної літератури.
  - >-
    [!decolonization] Повернення спадщини: посмертна реабілітація 1958 року, перевидання
    («Поезії», 1989; «Вибрані твори», 2009), вшанування на державному рівні до 120-річчя,
    перейменування вулиць у Харкові, Києві та Одесі на честь Майка Йогансена.
  - >-
    [!epistemic-humility] Сучасне значення: Йогансен як піонер української метапрози й
    пригодницького жанру та одна з ключових постатей Розстріляного відродження — митець, чию
    повноту дослідники відкривають і досі.
  - >-
    Повернення до розминки: студент формулює відповідь, чому вільне, аполітичне й іронічне
    мистецтво сприймалося тоталітарною владою як смертельна загроза.
  section: 'Підсумок: Биківня, реабілітація і повернення Майка Йогансена'
  words: 1000
focus: >-
  Майк Йогансен — поет, прозаїк-експериментатор, перекладач і мовознавець, співзасновник
  ВАПЛІТЕ й Техно-мистецької групи «А», майстер пригодницької та «химерної» прози й автор
  «Подорожі ученого доктора Леонардо…». Жертва Розстріляного відродження, розстріляний НКВС
  1937 року за фабрикованою справою. Аналіз його мистецької незалежності, мовознавчих проєктів
  і механізму репресій.
