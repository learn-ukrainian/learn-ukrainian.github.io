content_outline:
- points:
  - 'Провокація: Роман Шухевич — терорист, колаборант чи національний герой? Як одна людина може викликати настільки протилежні
    оцінки через 70 років після смерті?'
  - '[!biography] Постать, що досі розділяє українське суспільство та є об''єктом міжнародних суперечок.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Командир батальйону «Нахтігаль». Чи був Шухевич відповідальним за Львівський погром 1941 року? Аналіз документів,
    свідчень та історичних інтерпретацій.'
  - 'Дебат 2: Волинська трагедія. Якою була роль Шухевича та УПА в українсько-польському конфлікті? Позиція українських та
    польських істориків.'
  - '[!epistemic-humility] Розгляд звинувачень з боку радянської пропаганди, польської історіографії та єврейських організацій
    — та відповіді на них з боку українських дослідників.'
  - '[!decolonization] Як радянська та сучасна російська пропаганда використовує ці складні сторінки для дискредитації українського
    визвольного руху.'
  section: 'Конфліктна карта: Трибунал історії'
  words: 900
- points:
  - Народження у Львові в родині інтелігентів (1907), вплив діда-етнографа та дядька-офіцера УГА.
  - 'Гімназійні роки: «Пласт», спорт, музика. Формування дисципліни та організаторських здібностей.'
  - 'Радикалізація: вступ до УВО, а потім до ОУН. Участь в антипольських акціях, ув''язнення.'
  - 'Формативний досвід: що перетворило талановитого юнака на професійного революціонера?'
  section: 'Формування: Шлях до ОУН'
  words: 1000
- points:
  - Командування батальйоном «Нахтігаль» та швидке розчарування в німцях. Арешт і перехід у підпілля.
  - Створення УПА (1943) як єдиної збройної сили. Обрання Головним командиром.
  - 'Військова стратегія: боротьба на два фронти — проти нацистів та СРСР. Організація масштабної партизанської війни.'
  - Створення Української Головної Визвольної Ради (УГВР) — спроба збудувати підпільну державу.
  section: 'Діяльність: Командир армії без держави'
  words: 1300
- points:
  - '[!anti-hagiography] Співпраця з Абвером напередодні 1941 року: прагматичний союз чи фатальна помилка? Аналіз мотивів
    та наслідків.'
  - 'Жорсткі методи боротьби: чистки в лавах ОУН, накази про антипольські акції, ставлення до цивільного населення. Чи виправдовує
    мета засоби?'
  - '[!myth-buster] Шухевич не був ані «фашистським посіпакою», ані «безгрішним лицарем». Він був лідером у часи тотальної
    війни, що приймав важкі та неоднозначні рішення.'
  - 'Особиста трагедія: родина як заручники режиму. Дружина в ГУЛАГу, діти в спецпритулку. Ціна, яку Шухевич заплатив особисто.'
  section: 'Тінь: Ціна боротьби'
  words: 900
- points:
  - 'Повернення до розминки: чому постать Шухевича настільки полярна? Студент формулює відповідь, використовуючи знання з
    модуля.'
  - Символ незламності vs символ злочинів. Аналіз аргументів обох сторін у сучасній Україні, Польщі, Ізраїлі та Росії.
  - Героїчна загибель у бою (1950) як фінальний акт легенди. Як смерть перетворила командира на міф?
  - '[!decolonization] Спроби присвоєння звання Героя України: чому цей процес виявився таким складним і чи потрібні сучасній
    Україні герої з настільки складним минулим?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Роман Шухевич: суперечлива постать лідера збройного опору, його стратегія, моральні дилеми та спадщина'
level: BIO
module: bio-120
objectives:
- Критично аналізувати біографію Романа Шухевича, розрізняючи історичні факти, пропагандистські міфи та суперечливі інтерпретації.
- Пояснювати причини та наслідки ключових рішень Шухевича, зокрема співпраці з німцями та боротьби на два фронти.
- Формулювати аргументовану позицію щодо найбільш контроверсійних аспектів діяльності УПА під його командуванням (Волинська
  трагедія, анти-єврейські акції).
- Оцінювати спадщину Шухевича в контексті сучасної української політики пам'яті та міжнародних відносин.
