objectives:
- Критично аналізувати поєднання наукової, поетичної та політичної діяльності Олега Ольжича, уникаючи агіографічних оцінок.
- Дослідити археологічні досягнення Ольжича як інструмент культурного опору та доведення тяглості української цивілізації.
- Оцінювати моральний вибір інтелектуала між безпекою та обов''язком у контексті визвольної боротьби.
- Формулювати аргументовану позицію щодо спадщини Ольжича та його місця в пантеоні українських національних героїв.
