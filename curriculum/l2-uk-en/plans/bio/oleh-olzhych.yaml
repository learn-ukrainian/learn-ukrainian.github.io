content_outline:
- points:
  - 'Парадокс: Олег Ольжич — вчений зі світовим ім''ям, що мав зв''язки з Гарвардом. Чому він обрав не безпечну академічну
    кар''єру, а долю підпільника і смерть у нацистському концтаборі?'
  - '[!biography] Його псевдонім "Ольжич" походить від імені княгині Ольги — натяк на державницьку традицію, якій він присвятив
    життя.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ким був Ольжич передусім — археологом, якого політика відірвала від науки, чи революціонером, для якого наука
    була лише однією з форм боротьби за Україну?'
  - 'Дебат 2: Роль Ольжича в розколі ОУН. Чому він залишився з "поміркованим" Мельником, але зберіг повагу "радикального"
    крила Бандери? Чи був можливий компроміс?'
  - '[!epistemic-humility] Радянська історіографія таврувала його як "буржуазного націоналіста". Пост-радянська — часто творить
    ікону мученика. Де між цими крайнощами реальна людина?'
  - '[!decolonization] Ольжич використовував археологію, щоб довести тяглість української цивілізації, прямо заперечуючи російський
    імперський міф про "спільну колиску".'
  section: 'Конфліктна карта: Вчений чи Революціонер?'
  words: 900
- points:
  - Син поета Олександра Олеся — спадковість та тягар відомого прізвища.
  - Еміграція, розлука з батьком, дорослішання в інтелектуальному середовищі Праги — центру української політичної думки.
  - Карлів університет та Український вільний університет — формування наукового світогляду.
  - Членство в "Пласті" — перші кроки в організованому націоналістичному русі.
  section: 'Формування: Житомир, Київ, Прага'
  words: 1000
- points:
  - 'Археологія як місія: дисертація про неолітичну кераміку, дослідження Трипільської культури, співпраця з Гарвардом — доказ
    прадавньої історії України.'
  - 'Поезія як етичний кодекс: збірки "Рінь" та "Вежі" — стоїчна лірика, культ честі, обов''язку та жертовності. Вплив "Празької
    школи", але унікальний аскетичний голос.'
  - 'Політична організація: вступ до ОУН, керівництво культурно-освітньою референтурою, спроба створення Української Національної
    Ради в Києві 1941 року.'
  section: 'Діяльність: Наука, поезія та обов''язок'
  words: 1300
- points:
  - '[!anti-hagiography] Ольжич — не просто жертва нацистів, а активний учасник авторитарної націоналістичної організації.
    Яку ціну платили інші за рішення, ухвалені ОУН?'
  - 'Розкол ОУН: залишаючись з Мельником, чи не став Ольжич співвідповідальним за подальше братовбивче протистояння з бандерівцями?'
  - '[!myth-buster] Міф про "єдиний фронт" українських націоналістів. Діяльність Ольжича показує глибокі ідеологічні та особистісні
    конфлікти всередині руху.'
  - Підпільна боротьба в умовах окупації — моральні компроміси, неминучість насильства та важкі рішення, що визначали долю
    тисяч.
  section: 'Тінь: Ціна вибору в ОУН'
  words: 900
- points:
  - 'Повернення до розминки: Маючи уявлення про контекст, студент дає власну відповідь — чому вчений обрав шлях воїна?'
  - 'Загибель у Заксенгаузені: відмова від співпраці з гестапо як останній акт стоїчного вибору, вірність своїм ідеалам до
    кінця.'
  - 'Спадщина сьогодні: від символічної могили до назв вулиць. Як пам''ять про Ольжича використовується в сучасній Україні?
    Чи є це вшанування чесним до складності його постаті?'
  - '[!decolonization] Ольжич як символ інтелектуального опору, який заперечує образ "селянської" нації і доводить європейський
    вимір української культури.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'The life of Oleh Olzhych: a unique synthesis of a world-class archaeologist, a stoic poet, and a key figure in the
  Ukrainian nationalist underground, culminating in his martyrdom.'
