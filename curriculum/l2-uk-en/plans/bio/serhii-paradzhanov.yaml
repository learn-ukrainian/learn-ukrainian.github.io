content_outline:
- points:
  - >-
    [!biography] Знайомство з Сергієм Йосиповичем Параджановим: кінорежисер, майстер поетичного
    кіно, колажист; народжений у Тбілісі в вірменській родині, художньо центральний для
    українського поетичного кіно.
  - >-
    Провокаційне питання: як режисер, що зняв гуцульську «Тіні забутих предків», опинився
    в таборі за «кримінальними» статтями?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 9 січня 1924 року в Тбілісі (Грузинська РСР); при народженні — Саркіс
    Параджанян (ЕСУ); навчання у ВГІКу в майстерні Ігоря Савченка.
  - >-
    Робота в Києві; формування як постаті українського поетичного кіно.
  - >-
    [!decolonization] Багатокультурна ідентичність: вірменин за походженням, грузинське
    місце народження, український кінематографічний прорив — без монополізації однією
    «власністю».
  section: 'Формування: ВГІК, Київ і багатомовна ідентичність'
  words: 1000
- points:
  - >-
    *Українська рапсодія* (1961); *Тіні забутих предків* (створено 1964 року,
    київська прем'єра — 1965) за М. Коцюбинським —
    у співпраці з І. Чендеєм, Ю. Іллєнком, І. Миколайчуком; гуцульський
    говір і фольклор у центрі сучасного кінематографу.
  - >-
    *Колір гранату* (1968, вірменське кіно) — міжнародне визнання; *Легенда про Сурамську
    фортецю* (1984), *Ашик-Керіб* (1988) — після звільнення; Шевченківська національна
    премія посмертно (1991).
  section: 'Діяльність: «Тіні забутих предків» і поетичне кіно'
  words: 1200
- points:
  - >-
    Посилений тиск у другій половині 1960-х; арешт у Києві в грудні 1973 року; вирок —
    5 років; звільнення 1977 року після міжнародного тиску.
  - >-
    [!anti-hagiography] Звинувачення за сексуальні/«порнографічні» статті — назвати
    як механізм примусу, не як ідентичність митця; уникати сенсаціоналізму в класі.
  - >-
    [!epistemic-humility] Точний номер судової справи в джерелах не знайдено; Україна
    пізніше трактувала переслідування як політично мотивоване (реабілітаційні кроки
    2023–2024 — цитувати з датою, якщо використовувати).
  section: 'Тінь: Арешт, табір і «справа Параджанова»'
  words: 1600
- points:
  - >-
    Смерть 20 липня 1990 року в Єревані (Вірменська РСР) — не в таборі й через багато
    років після звільнення; точну медичну причину пакет не встановлює.
  - >-
    Реабілітація Національною комісією: УІНП повідомив 2024 року, що після аналізу
    кримінальної справи й архівних документів комісія встановила політичний мотив
    переслідування та засудження.
  - >-
    [!myth-buster] Спрощення до одного фільму або до «кримінального режисера» стирає
    колажну, малювальну та перформативну спадщину.
  section: 'Підсумок: Поетичне кіно, табір і пам''ять без монополізації'
  words: 1000
focus: >-
  Сергій Параджанов — багатокультурний кінорежисер, чия українська вершина *Тіні забутих
  предків* зробила гуцульську культуру частиною світового кіно, а радянське переслідування
  — через кримінальні звинувачення — частиною механізму культурного примусу.
