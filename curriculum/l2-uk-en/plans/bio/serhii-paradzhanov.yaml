objectives:
- Описати багатошарову ідентичність Параджанова без культурної монополізації чи російського привласнення.
- Аналізувати *Тіні забутих предків* як вузол українського поетичного кіно.
- Розуміти механізм радянських репресій через «кримінальні» справи проти неформатних митців.
- Оцінити таборову та посмертну спадщину — колажі, малюнки, пізні фільми — без сенсаціоналізму.
