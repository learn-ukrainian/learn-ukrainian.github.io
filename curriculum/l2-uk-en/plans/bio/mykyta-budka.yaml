objectives:
- Розуміти роль Микити Будки в організації українського релігійного життя в Канаді.
- Аналізувати труднощі, з якими стикалися церковні діячі в умовах політичних криз (лист 1914 року).
- Досліджувати радянську політику ліквідації УГКЦ та створення "ініціативної групи" під контролем НКВС.
- Оцінювати спадщину та значення беатифікації для історичної пам'яті українців.
