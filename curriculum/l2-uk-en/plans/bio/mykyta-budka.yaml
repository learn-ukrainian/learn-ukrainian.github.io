content_outline:
- points:
  - >-
    [!biography] Життя Микити Будки: від навчання у Львові та Інсбруку до рукоположення
    Андреєм Шептицьким і статусу першого українського греко-католицького єпископа в Канаді.
  - >-
    Вступ до теми: роль інституційної церкви для емігрантів та небезпеки, що
    чекали на ієрархію після повернення в Україну.
  section: Розминка
  words: 400
- points:
  - >-
    Канадський період (з 1912): заснування парафій, шкіл, сиротинців та видань
    ("Емігрант") для підтримки української громади.
  - >-
    [!myth-buster] Пастирський лист 1914 року та заклик підтримати "old Fatherland" (Австро-Угорщину).
    Складність політичної позиції в умовах інтернування та імперської війни, а не проста особиста помилка.
  - >-
    Повернення до Львова (1928): адміністративна робота в Галичині, відновлення
    Зарваниці та діяльність в умовах загострення політичної ситуації.
  section: 'Діяльність: Від Галичини до Канади'
  words: 1000
- points:
  - >-
    [!decolonization] Радянська атака на УГКЦ: ліквідаційна кампанія, створення
    контрольованої НКВС "ініціативної групи" та псевдособор 1946 року.
  - >-
    Арешт 11 квітня 1945 року: звинувачення у викладанні в підпільній семінарії та
    відмова розірвати єдність з Римом. Вирок — 8 років каторжних робіт.
  - >-
    [!epistemic-humility] Заслання до Карлагу: важка праця, хвороби та смерть
    (жовтень або вересень 1949 року у Караганді). Точне місце поховання не знайдено.
  section: 'Тінь: Арешт, каторжні роботи та смерть'
  words: 1600
- points:
  - >-
    Інституційна спадщина: канадські парафії та школи, які вижили завдяки закладеному фундаменту.
  - >-
    Беатифікація як акт Церкви у 2001 році: визнання Папою Іваном Павлом II
    його мучеництва за віру.
  section: 'Підсумок: Канадський будівничий і в''язень Карлагу'
