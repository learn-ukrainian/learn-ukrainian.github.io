content_outline:
- points:
  - >-
    [!biography] Микита Будка (1877, Добромірка): право у Львові, богословія у Львові
    та Інсбруку; рукоположення Андреєм Шептицьким (1905); брат Дмитро Будка.
  - >-
    Провокаційне питання: як людина, що заклала парафії й школи в Канаді, стала
    мішенню НКВС після повернення до Львова?
  section: Розминка
  words: 400
- points:
  - >-
    Галицька гілка товариства святого Рафаїла (1907): допомога емігрантам; засновник
    і редактор *Емігранта* (1910–1912).
  - >-
    Собор українських католицьких священиків у Канаді (1913); перше рукоположення
    українського греко-католицького єпископа в Канаді (1912), резиденція у Вінніпезі.
  - >-
    [!decolonization] Інституційна спадщина: парафії, церкви, школи, сиротинці, бурси
    та видання — не лише «діаспорна адміністрація», а мережа виживання громади.
  section: 'Формування: Галичина, еміграція та товариство Рафаїла'
  words: 1000
- points:
  - >-
    Канадський період: пастирські листи до емігрантів. Канадське академічне видання
    датує послання 27 липня 1914 року із закликом стати на захист Австро-Угорщини та
    його відкликання 6 серпня 1914 року; ЕСУ узагальнює це як «політичну настанову»
    щодо британсько-канадських військових інтересів. [!myth-buster] Подавати обидва
    формулювання: політична небезпека в умовах світової війни та інтернування, а не
    спрощена «особиста помилка».
  - >-
    Повернення до Європи (1927/1928): допоміжний єпископ, адміністратор у Львові;
    робота навколо відновлення Зарваниці (1928–1945).
  - >-
    [!anti-hagiography] «Перший єпископ у Канаді» не повинен затіняти подальше
    мучеництво; навпаки, «мученик» не повинен стерти канадську інституційну працю.
  section: 'Діяльність: Канадський єпископат та «Емігрант»'
  words: 1200
- points:
  - >-
    [!decolonization] Ліквідаційна кампанія проти УГКЦ: арешти ієрархії (11 квітня
    1945), НКВС-контрольована «ініціативна група», псевдособор 1946 року — примусове
    «возз'єднання» як радянська примусова лексика.
  - >-
    Арешт у Львові 11 квітня 1945 року; під час слідства — київська в'язниця разом із
    митрополитом Йосифом Сліпим; суд 29 травня — 3 червня 1946 року разом зі Сліпим і
    Чарнецьким. Строк подавати з атрибуцією: ЕСУ, Синод і канадське видання — вісім
    років каторжної праці; ЕІУ — п'ять років із конфіскацією майна (поодиноке
    свідчення).
  - >-
    [!epistemic-humility] Карлаг біля Караганди. Дату смерті подавати з атрибуцією:
    1 жовтня 1949 року за ЕСУ, Синодом і канадським виданням; 6 жовтня 1949 року за
    ЕІУ. Причину «від серцевого нападу» Синод бере в лапки — це формула табірного
    запису, не медичний висновок. Місце поховання невідоме, хоч відомо, що воно було
    на одному з цвинтарів Карлагу біля села Каражар.
  section: 'Тінь: Арешт, Карлаг та смерть у неволі'
  words: 1600
- points:
  - >-
    Вижила канадська мережа парафій і шкіл, закладена Будкою; тіло/могила не
    відновлені для публічного поховання.
  - >-
    Беатифікація як акт Католицької церкви (2001): серед 25 супутників блаженного
    Миколи Чарнецького; визнання мучеництва за віру, не державний наратив.
  - >-
    Сучасне значення: міст між галицькою еміграцією, інституційною церквою та
    знищенням УГКЦ у 1945–1949 роках.
  section: 'Підсумок: Канадський будівничий і в''язень Карлагу'
  words: 1000
focus: >-
