objectives:
- Оцінити науковий внесок Юрія Кондратюка в розвиток світової космонавтики
- Проаналізувати причини та наслідки його життя під чужим ім'ям в умовах тоталітарного режиму
- Пояснити, чому його ідеї були визнані на Заході, але значною мірою проігноровані в СРСР
- Критично аналізувати концепцію «трагічної долі» українського генія в імперському контексті
