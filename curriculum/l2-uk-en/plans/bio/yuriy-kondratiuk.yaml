content_outline:
- points:
  - 'Провокація: Людина, що розрахувала політ на Місяць для NASA, все життя переховувалася під чужим ім''ям і померла в безвісті
    як простий радянський механік. Як це можливо?'
  - '[!biography] Юрій Кондратюк, він же Олександр Шаргей — одна з найтрагічніших і найзагадковіших постатей в історії світової
    науки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Зміна імені — це геніальний хід для виживання в терорі, чи трагічна втрата ідентичності та самозрада?'
  - 'Дебат 2: Визнання на Заході vs. забуття в СРСР. Чому NASA використало ідеї Кондратюка, а радянська система, яка його
    породила, виявилася сліпою до його генія?'
  - '[!decolonization] Розрив між «Кондратюком» (радянським інженером) і «Шаргеєм» (українським інтелігентом) як метафора
    колоніального розщеплення особистості.'
  - '[!epistemic-humility] Ми не можемо знати достеменно мотивів Шаргея. Чи був у нього вибір? Чи міг він вчинити інакше?'
  section: 'Конфліктна карта: Шаргей vs. Кондратюк: виживання ціною імені'
  words: 900
- points:
  - 'Олександр Шаргей: походження, гімназія в Полтаві, мрії про космос на тлі соціальних катаклізмів.'
  - 'Формативний досвід: Перша світова, революція, Громадянська війна — як вижити, коли історія тебе перемелює?'
  - 'Рішення 1921 року: стати Юрієм Кондратюком. Контекст «білого терору» та «червоного терору».'
  - 'Історичний фон: стан науки та інженерії в ранньому СРСР — ентузіазм і репресії.'
  section: 'Формування: Народження генія в епоху катастроф'
  words: 1000
- points:
  - Рукопис «Завоювання міжпланетних просторів» (1929) — революційні ідеї, написані «в стіл».
  - '«Траса Кондратюка»: розрахунок траєкторії польоту на Місяць з поверненням — LOR (Lunar Orbit Rendezvous).'
  - '«Мастодонт»: будівництво гігантського елеватора в Сибіру без жодного цвяха — паралельний прояв інженерного генія.'
  - 'Порівняння з Ціолковським та іншими піонерами космонавтики: у чому унікальність підходу Кондратюка?'
  section: 'Діяльність: «Завоювання міжпланетних просторів» та «Мастодонт»'
  words: 1300
- points:
  - '[!anti-hagiography] Життя в постійному страху викриття. Ціна, яку він платив щодня за своє рішення.'
  - Арешт та робота в «шарашці» — використання таланту в'язня для потреб держави.
  - Проєктування вітрових електростанцій у Криму — блискуча, але «непрофільна» робота, що відволікала від космосу.
  - '[!myth-buster] Міф про «радянську підтримку науки». Кейс Кондратюка доводить протилежне: система не помічала, ігнорувала
    або нищила унікальні таланти.'
  - Загадкова загибель на фронті в 1942 році — трагічний і символічний кінець життя, повного таємниць.
  section: 'Тінь: Життя під чужим ім''ям'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому архітектор місячної місії помер у безвісті.'
  - 'Парадокс спадщини: Джон Хуболт (NASA) «відкриває» ідеї Кондратюка і переконує керівництво програми «Аполлон».'
  - 'Пам''ять: музей у Полтаві, пам''ятник на Місяці (кратер Кондратюка), але чи достатньо цього?'
  - '[!decolonization] Кондратюк як символ трагічної долі українського генія, чий потенціал був або присвоєний, або знищений
    імперією.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Юрій Кондратюк (Олександр Шаргей): піонер космонавтики, розробник «траси Кондратюка», трагічна доля вченого в тоталітарній
  системі.'
