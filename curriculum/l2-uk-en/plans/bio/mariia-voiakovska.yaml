content_outline:
- points:
  - '[!biography] Знайомство з Марією Вояківською-Грушевською: перекладачка, освітянка, співзасновниця і перша голова товариства «Українська захоронка», дописувачка «Літературно-наукового вістника» — і лише потім дружина Михайла Грушевського.'
  - 'Провокація: чому жінку, яка переклала українською Ібсенову «Нору» й заснувала мережу дитячих захоронок, історична пам''ять звела до підпису «дружина Грушевського»?'
  - '[!myth-buster] Розвінчання вихідного міфу: Марія народилася не у Відні, а в галицькому селі Підгайчики; її дівоче прізвище пишеться через літеру «і» — Вояківська (а не через «о»).'
  section: Розминка
  words: 400
- points:
  - 'Народження 8 листопада 1868 року в селі Підгайчики у Східній Галичині (Королівство Галичини та Володимирії, Австро-Угорщина) — у родині греко-католицького священика Сильвестра Вояківського.'
  - 'Шкільні роки в галицьких містах (Тернопіль, Підгайці, Станиславів, Краків) та закінчення учительської семінарії у Львові 1887 року; учителювання в містечку Скала.'
  - 'Від 1893 року — у Львові: знайомство з Михайлом Грушевським, спів у хорі товариства «Боян», листування із Соломією Крушельницькою; вінчання у травні 1896 року в Скалі.'
  - '[!decolonization] Галицький, а не «віденський» ґрунт її поглядів: «Клуб русинок», «Кружок українських дівчат», Українсько-руське педагогічне товариство — осередки українського жіночого руху, а не австрійські салони.'
  section: 'Формування: Галицьке коріння та учительська семінарія'
  words: 1000
- points:
  - 'Перекладацька праця: українські версії Ібсенової «Нори, або Хатки ляльки» (1908), Ґетевих «Страждань молодого Вертера» (1912), Мопассанового «Горля» (1902), оповідань Чехова («Змора», «Каштанка»). Вибір саме «Нори» — свідомий феміністичний жест.'
  - '1900 рік: співзаснування разом із Наталією Кобринською товариства «Руська / Українська захоронка» та обрання Марії його першою головою — мережа дитячих садків-захоронок для галицьких родин.'
  - 'Співпраця з Науковим товариством імені Шевченка та дописи на мистецькі теми в «Літературно-науковому вістнику»; 1917 року — обрання до Української Центральної Ради від громадських організацій Києва, скарбнича комітету Українського національного театру.'
  - '[!epistemic-humility] Чесна межа джерел: власної оригінальної прози Марія лишила небагато — її голос звучить передусім у перекладах і листах. У листі 1920 року вона сама писала, що Швейцарія ще й досі не дала жінкам виборчого права, а молода українська держава «усунула всі ріжниці в правах між своїми громадянами».'
  section: 'Діяльність: Перекладачка, захоронка та Центральна Рада'
  words: 1200
- points:
  - 'Перше заслання — імперське: у лютому 1915 року Михайла Грушевського вислано до Симбірська, і Марія з 14-річною донькою Катериною поїхала за ним.'
  - 'Еміграція 1919–1924 років (Прага, Париж, Женева, Відень) і праця в президії Національної ради українських жінок: тут Відень постає як прихисток вигнанки, а не місце народження — пряме спростування фабрикації.'
  - '[!anti-hagiography] Фатальне повернення до радянського Києва навесні 1924 року: наївна віра в можливість культурної праці чи трагічний прорахунок? Смерть чоловіка 1934 року в Кисловодську, причину якої досі дискутують історики.'
  - 'Механізм терору: 10 липня 1938 року НКВС заарештував доньку Катерину, засуджену за сфабрикованою справою; за документами вона загинула 30 березня 1943 року в Темлазі. Марія писала прохання про перегляд справи в різні інстанції, навіть до Сталіна, — безрезультатно.'
  - '[!myth-buster] Жодної «спокійної старості вдови академіка»: зубожіння, підселення чужих мешканців у кабінет Грушевського, брутальне пограбування напередодні смерті 19 вересня 1948 року.'
  section: 'Тінь: Еміграція, повернення та репресії'
  words: 1600
- points:
  - 'Повернення до розминки: маючи повну й достовірну картину, студент відповідає — чому постать Марії Вояківської так довго лишалася в тіні й у чому її справжнє значення?'
  - '[!decolonization] Відновлення її імені (і правильного його написання — Вояківська) як акт історичної справедливості: українська історія не лише через чоловічі постаті.'
  - 'Спадщина: перекладачка, яка вводила європейську драму в українську культуру; засновниця «захоронки»; громадська діячка — самостійна праця, а не додаток до біографії чоловіка.'
  - 'Сучасний погляд: чи змінилося сприйняття «дружин видатних діячів» і як слова Марії про рівні права громадян звучать сьогодні?'
  section: 'Підсумок: Повернення імені'
  words: 1000
focus: 'Життя Марії Вояківської-Грушевської — галицької (а не «віденської») перекладачки, освітянки та співзасновниці мережі дитячих захоронок: відновлення її самостійної інтелектуальної та феміністичної праці поза тропом «дружини великого чоловіка», а також знищення її родини радянськими репресіями.'
level: BIO
module: bio-090
objectives:
- Розрізняти достовірну біографію Марії Вояківської (галицьке походження, учительська семінарія у Львові) від сфабрикованого «віденського» міфу
- Аналізувати її самостійний внесок — переклади європейської драми українською, заснування «Української захоронки», громадську працю — поза роллю «дружини Грушевського»
- Простежити механізм репресій проти її родини: імперське заслання, еміграцію, арешт і загибель доньки Катерини
- Оцінити, як відновлення її імені та власного голосу (зокрема слів про виборче право жінок) є актом деколонізації історичної пам'яті
