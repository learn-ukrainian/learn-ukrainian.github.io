content_outline:
- points:
  - 'Провокація: Марія Вояковська-Грушевська — перша леді Української Народної Республіки, перекладачка, освітянка, феміністка.
    Чому ж в історії вона найчастіше фігурує лише як «дружина Михайла Грушевського»?'
  - '[!biography] Парадокс її спадщини: чи може інтелектуальна праця жінки бути видимою, коли вона стоїть поруч із «батьком
    нації»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Характер шлюбу з Грушевським. Чи було це партнерство рівних інтелектуалів, як стверджували одні, чи вона свідомо
    присвятила себе служінню генію чоловіка, залишаючись у його тіні, як того вимагали суспільні норми?'
  - 'Дебат 2: Оцінка її фемінізму. Був це радикальний рух за політичні права чи радше «просвітницький» фемінізм, сфокусований
    на освіті та культурній праці для жінок свого класу?'
  - '[!epistemic-humility] Сучасники залишили діаметрально протилежні свідчення: від захоплення її розумом та незалежністю
    до описів її як ідеальної «господині дому» для професора.'
  - '[!decolonization] Радянська історіографія майже повністю стерла її постать, залишивши лише функцію «дружини буржуазного
    націоналіста». Сучасна наука намагається реконструювати її реальний внесок.'
  section: 'Конфліктна карта: Партнерка чи помічниця?'
  words: 900
- points:
  - 'Космополітичне виховання: народження у Відні в родині галицьких емігрантів, освіта в австрійських гімназіях.'
  - 'Інтелектуальне середовище: знайомство з ідеями європейського суфражизму та фемінізму ще до переїзду до Галичини.'
  - 'Львів як центр тяжіння: участь у перших українських жіночих організаціях, організація освітніх курсів для дівчат.'
  - 'Формування поглядів: відмова від традиційної ролі жінки, прагнення до фінансової та інтелектуальної незалежності.'
  section: 'Формування: Віденський фемінізм та львівські салони'
  words: 1000
- points:
  - 'Наукове товариство імені Шевченка: не просто дружина голови, а активна перекладачка, редакторка та організаторка.'
  - 'Перекладацька робота: переклади європейських наукових праць українською, що формували інтелектуальний ландшафт того часу.'
  - 'Київський період (1917-1918): підтримка Української Центральної Ради, роль «першої леді» у неформальному спілкуванні
    з іноземними дипломатами.'
  - 'Освітня діяльність: заснування та опіка над освітніми закладами для жінок та дітей у Києві.'
  section: 'Діяльність: Інтелектуальна праця в НТШ та розбудова держави'
  words: 1300
- points:
  - '[!anti-hagiography] Фатальне рішення: повернення до Радянської України у 1924 році. Наївна віра в можливість культурної
    праці чи трагічний прорахунок, що призвів до знищення родини?'
  - 'Ізоляція та нагляд: життя під постійним тиском НКВС, втрата соціального статусу, поступове згортання будь-якої громадської
    діяльності.'
  - 'Особиста трагедія: смерть чоловіка за підозрілих обставин (1934), арешт та заслання єдиної доньки Катерини, повна самотність.'
  - '[!myth-buster] Міф про «спокійну старість» академіка. Реальність була сповнена страху, репресій та поступового знищення
    всього, що вони будували.'
  section: 'Тінь: Ціна повернення'
  words: 900
- points:
  - 'Повернення до розминки: Маючи повну картину, студент формулює відповідь — чому постать Марії Вояковської виявилася настільки
    прихованою і в чому її справжнє значення?'
  - 'Незакінчена емансипація: її життя як дзеркало долі української інтелігенції та жіночого руху XX століття — від неймовірного
    злету до жорстокого знищення.'
  - '[!decolonization] Повернення її імені — це акт відновлення історичної справедливості, що показує українську історію не
    лише через чоловічі постаті.'
  - 'Сучасний погляд: чи змінилося щось у сприйнятті «дружин видатних діячів» сьогодні?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Mariia Voiakovska-Hrushevska, moving beyond the "wife of a great man" trope to reveal her independent work
  as a feminist, educator, and translator, her intellectual partnership with Mykhailo Hrushevskyi, and the tragic consequences
  of their return to Soviet Ukraine.
level: BIO
module: bio-068
objectives:
- Аналізувати інтелектуальне партнерство Марії та Михайла Грушевських не як додаток до біографії чоловіка, а як самостійний
  феномен
- Простежити еволюцію феміністичних поглядів Вояковської від європейських ідей до практичної реалізації в Галичині та Наддніпрянщині
- Критично оцінити рішення про повернення до Радянської України, аналізуючи його причини та трагічні наслідки
- Визначити конкретний внесок Вояковської в діяльність Наукового товариства імені Шевченка та український жіночий рух
