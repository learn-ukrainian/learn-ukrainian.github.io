content_outline:
- points:
  - >-
    [!biography] Знайомство з Іриною Цибух (1998–2024): медіатренерка, журналістка
    "Суспільного", бойова медикиня батальйону "Госпітальєри" (позивний "Чека").
  - >-
    Провокаційне питання: як пов'язані документування правди в медіа та збереження
    життів на фронті під час повномасштабного вторгнення?
  section: Розминка
  words: 400
- points:
  - >-
    Формування: участь у молодіжних ініціативах та волонтерському русі з 2014 року.
    Ротації з "Госпітальєрами".
  - >-
    Журналістська та проєктна робота у філіях "Суспільного" (2017-2024).
    Створення регіональних історій і медіаосвіта.
  - >-
    [!decolonization] Усвідомлення пам'яті як громадянської дії: боротьба
    за український інформаційний простір як передумова незалежності.
  section: 'Формування: Медіаосвіта та волонтерство'
  words: 1000
- points:
  - >-
    Повномасштабне вторгнення: повернення Ірини Цибух до безпосередньої медичної
    евакуації на фронті як усвідомлений вибір.
  - >-
    Громадська позиція: розуміння збереження життів і пам'яті про загиблих як єдиного
    процесу ("хвилина мовчання").
  - >-
    Визнання: Указ Президента України (2023) про нагородження орденом "За заслуги"
    ІІІ ступеня за професійну та громадську діяльність.
  - >-
    Думки про цінності в інтерв'ю 2024 року: "Свобода — це найбільша цінність".
  section: 'Діяльність: Суспільне та Госпітальєри'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Запобігання перетворенню реальної людини на абстрактний
    символ. Важливість розуміння її загибелі як наслідку конкретних дій армії РФ
    на Харківщині 29 травня 2024 року.
  - >-
    Посмертний лист (написаний у квітні 2023 року): унікальний документ громадянської
    зрілості, емоційної дисципліни і турботи про суспільство.
  - >-
    Заповідь: "Будьте гідними подвигів наших героїв, не журіться, будьте сміливими!".
    Трансформація скорботи у відповідальність.
  section: 'Тінь: Загибель на Харківському напрямку та культура пам''яті'
  words: 1600
- points:
  - >-
    Прощання та громадський резонанс: похорон у Києві та Львові, організований за
    детальними інструкціями самої Ірини з акцентом на українську традицію.
  - >-
    Спадщина Ірини Цибух: модель сучасної української громадянської мови,
    яка поєднує медійну, просвітницьку та захисну ролі.
  - >-
    Значення збереження індивідуальної пам'яті та формування нових ритуалів вшанування.
  section: 'Підсумок: Відповідальність живих'
  words: 1000
focus: >-
  Ірина Цибух як уособлення сучасної української громадянської відповідальності: поєднання роботи
  в медіа з обов'язком бойового медика, та її роль у формуванні культури пам'яті про війну.
