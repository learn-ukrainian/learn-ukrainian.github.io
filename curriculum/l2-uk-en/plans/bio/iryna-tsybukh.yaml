subtitle: Public Media Work, Authored Texts, Hospitallers Service, and Source-Exact Awards
focus: >-
  Праця Ірини Цибух у Суспільному, її авторські й співавторські тексти,
  волонтерство та медична служба у «Госпітальєрах», державні нагороди і
  датоване повідомлення про загибель 29 травня 2024 року.
content_outline:
  - section: Професійна праця, авторські документи і точна хронологія служби
    words: 5200
    points:
      - Розмежування роботи в Суспільному, просвітницьких проєктів і медичної служби.
      - Перша ротація у 2020 році як кваліфікований власний спогад, а не початок усіх попередніх поїздок.
      - Окреме читання указів, інтерв'ю, співавторського посібника і родинно оприлюдненого листа.
word_target: 5200
cefr_min: C1
pedagogy: CBI
objectives:
  - Відрізняти трудову біографію, особисте інтерв'ю, родинну публікацію й державний указ.
  - Не змішувати службу в «Госпітальєрах» зі згаданими у листі військовими підрозділами.
  - Точно називати нагороду, дату, формулювання указу та межі посмертного повідомлення.
