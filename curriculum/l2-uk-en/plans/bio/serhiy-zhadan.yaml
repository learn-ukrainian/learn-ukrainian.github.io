objectives:
- Аналізувати творчий шлях Сергія Жадана від поета-андеграунду до ключової культурної фігури нації.
- Критично оцінювати взаємозв'язок між літературною творчістю, музичною діяльністю та громадським активізмом письменника.
- Простежити еволюцію тем Донбасу та ідентичності в його ключових творах.
- Формулювати аргументовану позицію щодо ролі та відповідальності митця під час війни.
