content_outline:
- points:
  - 'Парадокс: Як поет-панк, голос харківського андеграунду 90-х, перетворився на моральний авторитет нації та номінанта на
    Нобелівську премію миру?'
  - 'Провокативне питання: Чи може один митець бути одночасно голосом покоління, рок-зіркою, волонтером і символом незламності
    міста?'
  - '[!biography] Коротке інтро до Жадана як феномена, а не просто письменника.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (внутрішньоукраїнський): Жадан-митець vs Жадан-громадянин. Чи не заважає його громадський активізм сприйняттю
    його як суто літературного явища? Чи вони нероздільні?'
  - 'Дебат 2 (зовнішній): Сприйняття на Заході. Його бачать як універсального письменника чи як "екзотичного поета війни"?
    Ризик спрощення та інструменталізації.'
  - '[!epistemic-humility] Визнання складності оцінки живої легенди, чия творчість та роль продовжують еволюціонувати в реальному
    часі.'
  - '[!decolonization] Як Жадан протидіє західним спробам "зрозуміти" Україну через спрощені рамки, пропонуючи натомість складний,
    автентичний наратив.'
  section: 'Конфліктна карта: Митець, активіст чи національний символ?'
  words: 900
- points:
  - 'Соціальний контекст: дитинство та юність у радянському Донбасі, відчуття "кінця імперії" та розпаду звичного світу.'
  - 'Інтелектуальний контекст: переїзд до Харкова, філологічна освіта, знайомство з українським та світовим авангардом.'
  - 'Літературна група «Червона Фіра»: бунт проти офіціозу, поетичний панк, епатаж як форма опору пострадянській дійсності.'
  - 'Перші збірки та романи («Депеш Мод»): фіксація голосу "втраченого" покоління 90-х, теми розчарування, пошуку ідентичності,
    свободи.'
  section: 'Формування: Старобільськ—Харків: народження голосу (1974-2000-ні)'
  words: 1000
- points:
  - '«Ворошиловград» (2010): роман-пророцтво про повернення і захист "свого". Переосмислення теми Донбасу не як депресивного
    регіону, а як місця сили та боротьби.'
  - '«Інтернат» (2017): кристалізація теми війни. Шлях простого вчителя через "сіру зону" як метафора вибору та відповідальності
    кожного українця.'
  - 'Музика як продовження поезії: гурт «Жадан і Собаки» як спосіб донести свої ідеї до ширшої аудиторії, поєднання високої
    поезії та стадіонного року.'
  - 'Гуманітарна діяльність: заснування фонду, волонтерство з 2014 року, перетворення на культурного дипломата та організатора
    допомоги.'
  section: 'Діяльність: Трилогія ідентичності та голос Харкова (2000-ні-2022)'
  words: 1300
- points:
  - '[!anti-hagiography] Феномен "жаданізму": ризик перетворення живої людини на бронзовий пам''ятник самому собі. Чи не стає
    "бренд Жадан" більшим за самого митця?'
  - 'Критика ранньої творчості: звинувачення в надмірній епатажності, ненормативній лексиці. Чи була це органічна поетика,
    чи лише засіб привернути увагу?'
  - '[!myth-buster] Міф про те, що Жадан "завжди був політичним". Простеження еволюції від аполітичного панка до глибоко заангажованого
    громадянина. Це не було миттєвою зміною.'
  - 'Тягар ролі "голосу нації": як постійна публічність, очікування суспільства та необхідність коментувати кожну подію впливають
    на творчість?'
  section: 'Тінь: Ціна публічності та "жаданізм"'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь на питання, як панк-поет став моральним авторитетом,
    використовуючи знання з модуля.'
  - 'Повномасштабне вторгнення: рішення залишитися в Харкові під обстрілами. Поезія та есеї як щоденник війни, що фіксує історію
    в реальному часі.'
  - '[!decolonization] Жадан як голос деколонізованої української культури, що говорить зі світом на рівних, а не як жертва.'
  - 'Значення сьогодні: Жадан — це не просто письменник, а культурний інститут, що поєднує літературу, музику, волонтерство
    та дипломатію для захисту та промоції України.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: The evolution of Serhiy Zhadan from a punk poet of the 90s underground to a Nobel Prize nominee and a key cultural
  figure of Ukrainian resistance, exploring the interplay between his art, activism, and connection to Donbas and Kharkiv.
level: BIO
