content_outline:
- points:
  - 'Джерельне питання: що енциклопедична довідка, профіль Українського ПЕН і сторінка премії доводять про різні ролі Сергія Жадана?'
  - 'Чому формули «голос покоління» або «моральний авторитет» є оцінками рецепції, а не біографічними фактами?'
  - '[!biography] Хронологія освіти, письма й громадської діяльності без перетворення живого автора на символ.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: як розрізняти літературний аналіз, біографію автора та оцінку його громадської діяльності?'
  - 'Дебат 2: що в міжнародній нагородній заяві є перевірним фактом, а що — ціннісним судженням журі?'
  - '[!epistemic-humility] Для живої особи кожне твердження про поточну роль потребує дати й повторної перевірки.'
  - '[!decolonization] Не подавати схід України як однорідну «російськомовну периферію» й не стирати окремі історії Старобільська та Харкова.'
  section: 'Конфліктна карта: Митець, активіст чи національний символ?'
  words: 900
- points:
  - Народження у Старобільську 1974 року й освіта в Харківському педагогічному університеті за ЕСУ та профілем ПЕН.
  - Дисертація про Михайля Семенка й робота з українським футуризмом як документований академічний контекст.
  - «Червона Фіра» у профілі ПЕН як факт літературної самоорганізації, а не готове пояснення всієї поетики.
  - Ранні збірки та проза за бібліографією ЕСУ без неперевірених узагальнень про ціле покоління.
  section: 'Формування: Старобільськ, Харків, освіта й ранні публікації'
  words: 1000
- points:
  - Для аналізу конкретного роману потрібен текст законного видання; біографічні профілі не замінюють літературної першооснови.
  - Музична діяльність і переклади розглядаються як окремі практики, а не як автоматичне «продовження» поезії.
  - Профіль ПЕН фіксує волонтерство, заснування фонду 2017 року та проєкт «Схід читає».
  - Сторінка Премії миру 2022 року показує міжнародну інституційну рецепцію й мову журі, яку треба атрибутувати.
  section: 'Діяльність: Література, музика, переклади й громадські проєкти'
  words: 1300
- points:
  - '[!anti-hagiography] Відмова від перетворення нагород, перекладів і волонтерства на доказ безпомилковості автора.'
  - Критика поетики потребує названого твору, видання й аргументу; ярлик «епатаж» не замінює аналізу.
  - '[!myth-buster] Не конструювати психологічну еволюцію від «аполітичного» до «політичного» без датованого корпусу висловлювань.'
  - Поточні військові або громадські ролі не переносяться назад на ранні твори й не оновлюються без нового джерела.
  section: 'Межі джерел: Публічність, оцінки й поточні ролі'
  words: 900
- points:
  - Повернення до розминки з окремими колонками для біографічного факту, авторського твору та інституційної оцінки.
  - Датовані профілі ПЕН і Премії миру як джерела про гуманітарну діяльність у визначених часових межах.
  - '[!decolonization] Українськомовне письмо зі сходу України розглядати як центральну частину української культури, а не як виняток із чужої норми.'
  - Значення творчості й рецепцію формулювати через конкретні твори, переклади, проєкти та нагородні рішення.
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Джерельно обмежений аналіз літературної, перекладацької та громадської діяльності Сергія Жадана, а також інституційної рецепції його творчості.
level: BIO
module: bio-186
objectives:
- Побудувати джерельно атрибутовану хронологію освіти, письма, музики, перекладів і громадських проєктів Сергія Жадана.
- Розрізняти біографічну довідку, конкретний художній твір та оцінну мову нагородної інституції.
- Аналізувати теми східної України й ідентичності лише в названому законно доступному творі, без регіональних узагальнень.
- Перевіряти поточні громадські або військові ролі за датованим джерелом і не переносити їх на ранні твори.
