content_outline:
- points:
  - 'Провокація: як дослідниця гідронімії Південного Бугу стала тією, хто називає русифікацію системою, а не «природним зближенням мов»?'
  - '[!biography] Знайомство з живою мовознавицею: соціолінгвістка, ономастка й публічна інтелектуалка — професорка НаУКМА, провідна наукова співробітниця Інституту української мови НАН України.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (розбудова науки): сила Масенко — у побудові української соціолінгвістики: параметри мовної ситуації, комунікативна й демографічна потужність, школа соціолінгвістики (8 кандидатських і 2 докторські).'
  - 'Позиція 2 (деколонізаційна): її головний об''єкт — радянська/імперська мовна політика, що штучно звужувала функції української мови та інтерферувала в її структуру для зближення з російською; русифікація — це державна політика, а не нейтральне тло.'
  - '[!decolonization] Розрізняємо три речі: державну імперську політику, міський комунікативний тиск і пропаганду — і не переносимо цей аналіз на окремих російськомовних українців як особисту провину.'
  - '[!epistemic-humility] Жива постать: теперішні посади й публічні позиції треба перевіряти на час побудови модуля; місце народження (Саратовська область, воєнний контекст) подаємо як сімейно-біографічний факт, а не рамку ідентичності.'
  section: 'Конфліктна карта: Соціолінгвістка чи «мовна конфліктологиня»?'
  words: 900
- points:
  - 'Освіта: філологічний факультет Київського університету (1964); кандидатська про гідронімію басейну Південного Бугу (1972); докторська «Українська мова в соціолінгвістичному аспекті» (2005).'
  - 'Ономастична й лексикографічна основа: «Словник гідронімів України» (співукладачка), «Українські імена і прізвища» — соціолінгвістика виросла з філологічної, лексичної та ономастичної праці.'
  - 'Інституції: Інститут мовознавства АН УРСР (1964-1991); Інститут української мови НАН України з 1991-го; НаУКМА з 2001-го, завідувачка кафедри української мови (2001-2010), далі професорка.'
  - 'Визнання подаємо як інституційне поле-будівництво, а не як розмите слово про престиж: премії Бориса Грінченка, Василя Стуса, Петра Могили та інші.'
  section: 'Формування: Від гідронімії до соціолінгвістики'
  words: 1000
- points:
  - 'Мова й політика: «Мова і політика» (1999) та «Мова і суспільство: постколоніальний вимір» (2004) — ранні незалежницькі якорі, що пов''язують мовний вибір, інституції, постколоніальну ієрархію та ідентичність.'
  - 'Документація лінгвоциду: «Українська мова у ХХ сторіччі: історія лінгвоциду» (2005) — це проєкт документів і матеріалів, а не лише полеміка; вчимо його як доказову базу мовної політики.'
  - 'Метод: «Нариси з соціолінгвістики» (2010) роблять її методобудівницею — параметри мовної ситуації, домени освіти/медіа/держави, міжпоколіннєва передача, установки, регіональне порівняння.'
  - 'Суржик і тоталітаризм: «Суржик: між мовою і язиком» — вивчення мішаного мовлення під тиском ієрархії; «Мова радянського тоталітаризму» (2017) аналізує обман, терор і ворогопокладання в радянському дискурсі; редагування текстів Шевельова як місток до деколонізаційної історії мови.'
  section: 'Діяльність: Мова і політика, лінгвоцид, суржик'
  words: 1300
- points:
  - '[!anti-hagiography] Її поняття (лінгвоцид, мовний конфлікт, мовна стійкість) — потужні навчальні якорі, але це аргументи в контестованих соціолінгвістичних і політичних контекстах, а не безсумнівні описи.'
  - 'Пастка стигми: у класі суржик легко перетворюється на особисту провину мовця — розділяємо біографію мовця й структурну історію престижу, школи, міграції та примусу.'
  - '[!epistemic-humility] «Мовний конфлікт» — це політико-соціолінгвістичний аргумент, датований статтею 2018 року; його не можна спрощувати ні до ворожості проти російськомовних, ні до заперечення прав меншин.'
  - 'Хронологія: не переносимо воєнну лексику 2022 року назад у соціолінгвістичні опитування 1990-2000-х, якщо саме джерело цього не робить.'
  section: 'Тінь: Стигма суржику й межі полемічної рамки'
  words: 900
- points:
  - 'Повернення до розминки: чи описує Масенко «конфлікт» між громадянами, чи документує інженерію статусу мови? Студент формулює, що її об''єкт — політика й престиж, а не окремий мовець.'
  - '[!decolonization] Суржик як структурна історія престижу, школи, міграції та коерцивної політики, а не як привід принижувати чи ранжувати учнів за «чистотою».'
  - 'Метод трьох рівнів: студент бере твердження й розкладає його на індивідуальну поведінку, міський/інституційний тиск і державну імперську політику, а тоді питає, який рівень документує конкретне джерело Масенко.'
  - 'Порівняння: з Юрієм Шевельовим — щодо деколонізаційної історії української мови; з модулями мовної політики — щодо законодавства й державної мови.'
  section: 'Дискусія та підсумок: Три рівні мовної поведінки'
  words: 700
focus: Larysa Masenko (b. 1942) taught as a living Ukrainian sociolinguist, onomastician, and public intellectual who documents Soviet and Russian imperial language policy — Russification, linguocide, surzhyk, communicative power, language stability — as structural pressure rather than as individual speaker failure; her language-conflict frame is kept as a dated, contested policy argument rather than hostility toward Russian-speaking citizens, and her present-tense institutional roles are flagged as needing recheck at module build time.
