content_outline:
- points:
  - >-
    [!biography] Знайомство з Докією Гуменною: письменниця документальної пам'яті,
    родинної хроніки, окупаційного Києва та діаспорного самовидання.
  - >-
    Провокаційне питання: чому радянська літературна машина так жорстко атакувала
    авторку, яка описувала село, звичаї, колективізацію і щоденне життя без
    партійних прикрас?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: народження 23 лютого за старим стилем / 10 березня 1904 року в
    Жашкові, тоді Київська губернія, у селянській родині Кузьми Гуменного й
    Дарії Кравченко.
  - >-
    Освіта і ранній голос: двокласна сільська школа, педагогічна школа у Ставищі,
    літературний факультет Київського інституту народної освіти у 1920-х роках,
    перші публікації у шкільному журналі "Золоте руно".
  - >-
    Документальна оптика: ранній нарис "У степу" 1924 року і цикл "Листи з
    степової України" 1928 року як уважне спостереження за селом у добу
    радянської перебудови життя.
  section: 'Формування: Жашків, КІНО і документальна школа'
  words: 1000
- points:
  - >-
    Головна вісь доробку: "Діти Чумацького Шляху" 1948-1951 років як
    роман-хроніка української родини через революцію, голод і терор.
  - >-
    Київський вимір: "Хрещатий Яр (Київ 1941-43)" 1956 року як роман-хроніка
    окупованого Києва, написана в еміграції.
  - >-
    Міфопоетичний та археологічний напрям: "Велике цабе" 1952 року і "Золотий
    плуг" 1968 року, де до документальної прози додаються трипільські,
    доісторичні й міфологічні мотиви.
  - >-
    Автобіографічна пам'ять: "Дар Евдотеї" 1990 року, рукописна основа якого
    зберігається в архівній збірці Українського історико-освітнього центру.
  section: 'Діяльність: Село, Київ і археологічна пам''ять'
  words: 1200
- points:
  - >-
    [!decolonization] Перша стадія тиску: радянська літературна преса засудила
    її документальні сільські тексти, "Листи з степової України" не дозволили
    видати окремою книжкою, а авторку виключили з письменницьких структур.
  - >-
    Конкретні радянські ярлики: у 1929-1931 роках різко атакували "Кампанію",
    "Ех, Кубань, ти Кубань хліборобная" і "Стрілка коливається"; ЕІУ фіксує
    звинувачення в "антирадянській діяльності", "куркульстві" та "хвильовізмі".
  - >-
    1939 рік: оповідання, назване в джерелах "Вірус" або "Вірс", було атаковане
    в "Радянській літературі" як твір "наклепниці на радянську дійсність".
  - >-
    Друга стадія: у 1943 році Гуменна пішки залишила Київ до Львова, а під час
    радянської реокупації 1943-1944 років рушила далі на Захід, жила в таборах
    переміщених осіб 1945-1949 років і 1950 року оселилася в Нью-Йорку.
  - >-
    [!anti-hagiography] Її не треба зводити до жертви цензури: за кордоном вона
    відбудувала великий корпус прози, але часто друкувалася власним коштом і
    залишалася дещо осторонь чоловічого МУРівського канону.
  section: 'Тінь: Радянське цькування і вимушена еміграція'
  words: 1600
- points:
  - >-
    Еміграційна продуктивність: близько двадцяти книжок, серед них видання,
    що повернули українському читачеві сільську, жіночу, міфологічну й
    окупаційну перспективи.
  - >-
    Рецепційний виклик: її часто спрощують до "письменниці, забороненої за
    куркульські симпатії", хоча досьє показує документальну чесність, феміністичну
    чутливість і міфологічні пошуки.
  - >-
    Завершення шляху: смерть 4 квітня 1996 року в Нью-Йорку і поховання на
    українському православному цвинтарі в Саут-Баунд-Бруку, Нью-Джерсі.
  - >-
    Підсумкове питання: як читати Гуменну сьогодні, не повторюючи радянських
    ярликів і не затираючи її діаспорної самотності?
  section: 'Підсумок: Діаспорна проза і повернення голосу'
  words: 1000
focus: >-
  Докія Гуменна як письменниця документальної правди про українське село,
  радянське цькування, вимушений відхід на Захід і діаспорну працю пам'яті,
  що поєднала родинну хроніку, окупаційний Київ, феміністичний погляд і
  археологічно-міфологічну уяву.
level: BIO
module: bio-235
objectives:
- Пояснювати, як документальна проза Гуменної про село стала мішенню радянської критики й цензури.
- Розрізняти радянські звинувачувальні ярлики та реальний зміст її творів і біографії.
- Аналізувати перехід від радянського замовчування до вимушеної еміграції й самовидання в діаспорі.
- Оцінювати місце "Дітей Чумацького Шляху", "Хрещатого Яру" і "Дару Евдотеї" у пам'яті про ХХ століття.
