content_outline:
- points:
  - >-
    Провокація: Устим Кармалюк — «народний месник», що карав панів, чи ватажок, чиї загони нападали й на корчми та
    заможних селян? Чому одну людину пісня зробила легендою, а імперський суд — «розбійником»?
  - >-
    [!biography] Кріпак, народжений невільним 1787 року на Поділлі, який чотири рази тікав із сибірської каторги,
    повертаючись пішки за тисячі верст.
  section: Розминка
  words: 400
- points:
  - >-
    Дебат 1 (сучасники): для подільських панів та імперської поліції — «розбійник» під судом; для скривджених селян —
    захисник, що карав кривдників. Два несумісні описи однієї постаті.
  - >-
    Дебат 2 (історіографія): IEU наголошує на перерозподілі відібраного бідноті; ЕІУ фіксує й напади на маєтки, корчми
    та заможних селян. Це джерельна напруга, а не готовий висновок.
  - >-
    [!decolonization] Осердя історії — подільське кріпацтво, поміщицька економіка та російська імперська машина покарань
    (рекрут, батіг, Сибір), а не «кримінальна хроніка».
  - >-
    [!epistemic-humility] Немає особистих джерел від самого Кармалюка; біографію реконструюють із судових справ ворогів
    і з пізнішого фольклору. Точну дату народження виводять із метрики хрещення — тому обережно «народився 1787 року».
  section: 'Конфліктна карта: народний месник чи розбійник?'
  words: 900
- points:
  - >-
    Кріпацьке походження: народжений у родині кріпаків у Головчинцях (Летичівський повіт, Поділля); залежність від
    поміщика визначала все життя.
  - >-
    1812 — поміщик Пігловський віддає Кармалюка в рекрути; це примус, а не вибір кар'єри. Утеча з війська й перші загони
    з таких самих утікачів-дезертирів.
  - >-
    Історичний контекст: за IEU — репресивна й водночас прибуткова стадія кріпацтва в Російській імперії; Поділля як
    прикордоння примусу.
  - >-
    1814 (за IEU) — арешт, вирок у Кам'янці-Подільському (500 ударів крізь шпіцрутени), відправлення до Криму й нова
    втеча. Початок циклу «покарання — втеча»; деталі 1814 тримати з атрибуцією IEU.
  section: 'Формування: від кріпака до втікача'
  words: 1000
- points:
  - >-
    Географія опору: найінтенсивніша діяльність у Літинському й Летичівському повітах; рейди також на Балту, Вінницю,
    Могилів, Проскурів і частково Бессарабію; на піку (за IEU) — Київщина й Волинь.
  - >-
    Масштаб — два різні числа: ЕІУ фіксує понад 1000 нападів загонів і «бл. 20 тис. осіб» у слідстві Галузинецької
    комісії (1833–39); IEU — близько 1000 нападів і «до 20 000 селян» у русі 1830–1835. Не зливати «слідство» з
    «учасники».
  - >-
    Соціальний склад загонів: кріпаки, військові дезертири, дрібна шляхта й міські євреї; зв'язки Кармалюка з
    подільськими містечками. Це джерельна соціальна історія, а не етнічний ярлик.
  - >-
    [!epistemic-humility] Сибірський цикл «чотири рази засуджений до каторги й щоразу втікав» — компактна формула, що
    вимагає обережності щодо точних маршрутів і чисел.
  - >-
    Джерельний анкер: пара ЕІУ (напади на маєтки, корчми, заможних селян) та IEU (перерозподіл бідноті) — учні
    розрізняють запис і його інтерпретацію.
  section: 'Діяльність: повстанський рух 1814-1835'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Рейди означали й насильство: напади не лише на маєтки панів, а й на корчми та заможних селян.
    Ідеалізований образ «месника» стирає цю частину запису.
  - >-
    [!myth-buster] Магічні легенди (невразливість до куль, чарівний ґудзик) — це фольклор, а не історія; подавати їх
    лише з ярликом «переказ».
  - >-
    Загибель: у ніч проти 22/10 жовтня 1835 року Кармалюка вбито із засідки шляхтичем Ф. Рудковським у Шляхових
    Коричинцях; поховано в Летичеві. Ім'я вбивці й правопис лишати джерельно позначеними (ЕІУ: Рудковський; IEU:
    Rutkowski).
  - >-
    Етнічна пересторога: згадка про дрібну шляхту та євреїв у загонах — соціальна історія; не можна перетворювати її на
    колективну провину чи романтизувати кримінальні мережі.
  section: 'Тінь: насильство, легенда й засідка'
  words: 900
- points:
  - 'Повернення до розминки: чи можна дати однозначну відповідь «месник чи розбійник», чи постать лишається складною?'
  - >-
    Спадщина в пам'яті: «За Сибіром сонце сходить» показує, як пісня від першої особи перетворює контроверсійну постать
    на народну пам'ять — і що вона зберігає, а що спрощує.
  - >-
    [!decolonization] Радянська рамка «антифеодального борця» й імперський ярлик «розбійника» — це дві ідеологічні
    оптики; сучасне прочитання тримає разом кріпацтво, опір, насильство й фольклорну рецепцію.
  section: 'Дискусія та підсумок: пісня і запис'
  words: 700
focus: >-
  The life of Ustym Karmaliuk as a Podilia serf, forced recruit and repeat Siberian-katorga escapee inside Russian
  imperial serfdom, and how folk song and the "Ukrainian Robin Hood" label turned a contested record of raids into
  durable folk memory that must be kept distinct from the documentary history.
level: BIO
module: bio-333
objectives:
- >-
  Реконструювати життєвий шлях Устима Кармалюка як подільського кріпака-втікача в системі кріпацтва, рекрутчини та
  імперського покарання, а не як безтілесний символ.
- >-
  Розрізняти документальний історичний запис (ЕІУ, IEU) і фольклорний образ «народного месника», зокрема історичну пісню
  «За Сибіром сонце сходить».
- >-
  Критично оцінювати ярлик «українського Робіна Гуда», показуючи, що джерела фіксують напади не лише на панські маєтки,
  а й на корчми та заможних селян.
- >-
  Пояснювати, чому магічні легенди (невразливість до куль, чарівний ґудзик) належать до фольклору, а не до біографічної
  хроніки.
