content_outline:
- points:
  - >-
    [!biography] Знайомство з Панасом Мирним (Рудченко Панас Якович): реаліст, драматург,
    публіцист, що десятиліттями поєднував імперську чиновничу службу з українським
    літературним життям під псевдонімом.
  - >-
    Провокаційне питання: чому імперія не потребувала окремого арештового досьє, щоб
    стримати його прозу — і чи означає це відсутність репресій?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 13 травня 1849 року в Миргороді на Полтавщині; смерть 28 січня 1920
    року в Полтаві.
  - >-
    Брат Іван Білик — співавтор роману *Хіба ревуть воли, як ясла повні?*; уроки
    про твір мають називати обох авторів.
  - >-
    Ранні твори: *Лихий попутав* (1872), *П'яниця* (1874), *Лихі люди* (1875) —
    формування реалістичного стилю в умовах імперського контролю над українським друком.
  section: 'Формування: Чиновник і псевдонім'
  words: 1000
- points:
  - >-
    Головний роман *Хіба ревуть воли, як ясла повні?* — написаний у 1870-х, перше
    видання в Женеві 1880 року, бо імперська цензура блокувала нормальний україномовний
    друк.
  - >-
    Інші прозові та драматичні роботи: *Повія* (1883), *Лимерівна* (1883), *Перемудрив*
    (1884), *Морозенко* (1885), *Лови* (1887).
  - >-
    Реалістична мова: ідіоми, соціальна панорама, психологічна оповідь; лексика
    `ясла`, `воли`, `громада`, `чиновник`, `повія`, `правда`, `кривда`.
  - >-
    Публіцистика «Про мову» (лютий 1901): мова як «найбільше і найдорожче добро» —
    зв'язок прози з боротьбою за українське слово.
  - >-
    *Дума про військо Ігореве* — робота зі старою епічною традицією («Хоч би ти,
    соловейку»).
  section: 'Діяльність: Романи правди та співавторство'
  words: 1200
- points:
  - >-
    [!anti-hagiography] У досьє немає підтвердженого особистого арештового дела —
    тиск імперії проявлявся через цензуру та зміщення видавництва, а не через
    уявний «мученицький» процес.
  - >-
    Іменований документ: **Емський указ** від 30 травня 1876 року (18 травня за
    старим стилем) — заборона друку й ввозу українських книг, україномовних
    публічних виступів і читань.
  - >-
    Механізм: імперська цензурна адміністрація за Олександра II; українська проза
    йшла через псевдоніми, друк у Галичині або за кордоном, відкладені видання.
  - >-
    [!decolonization] Популярна спрощенка зводить Мирного лише до «реаліста села»;
    хронологія публікацій показує, що його твори — частина історії прав на українську
    мову в Російській імперії.
  - >-
    [!epistemic-humility] Різниця між датою написання й датою друку — предмет
    сучасної наукової дискусії; не подавати затримку як «повільність автора» без
    цензурного контексту.
  section: 'Тінь: Емський указ і зміщене видавництво'
  words: 1600
- points:
  - >-
    Що збереглося: головні романи й оповідання; що спотворено — хронологія публікацій
    під тиском цензури; особисте поліцейське досьє не знайдено в джерелах.
  - >-
    Зв'язок із наявними модулями: історія Валуєвського/Ems Ukaz, літературні уроки
    про *Хіба ревуть воли…* та вступ до Мирного.
  - >-
    Сучасне значення: Мирний як реаліст, чия проза одночасно документує село й
    імперське стримування українського друку.
  section: 'Підсумок: Проза під цензурою'
  words: 1000
focus: >-
  Панас Мирний як реаліст і співавтор *Хіба ревуть воли, як ясла повні?*, чия
  творчість формувалася під іменованим тиском Емського указу 1876 року та
  механізмом зміщеного видавництва, а не задокументованого особистого арешту.
level: BIO
module: bio-218
objectives:
- >-
  Аналізувати реалістичну спадщину Панаса Мирного та роль співавторства з Іваном
  Біликом у романі *Хіба ревуть воли, як ясла повні?*
- >-
  Пояснювати механізм імперської цензури через Емський указ 1876 року та
  зміщення публікацій (зокрема женевське видання 1880 року).
- >-
  Відрізняти документований тиск цензури від непідтверджених у досьє тверджень
  про особистий арешт чи заслання.
- >-
  Оцінювати публіцистику «Про мову» як частину боротьби за українське слово, а
  не лише як літературний додаток до прози.
