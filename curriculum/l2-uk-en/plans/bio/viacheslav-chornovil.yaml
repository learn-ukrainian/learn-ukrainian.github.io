content_outline:
- points:
  - 'Парадокс Чорновола: Як людина, яку радянська система десятиліттями намагалася зламати, стала головним претендентом на
    те, щоб очолити українську державу?'
  - '[!biography] Чому його трагічна загибель в автокатастрофі досі вважається незагоєною раною і точкою неповернення для
    сучасної України?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ефективність Чорновола. Чи був він успішнішим як безкомпромісний журналіст-дисидент, що документував злочини
    режиму, чи як прагматичний політик, що намагався об''єднати опозицію і будувати державу?'
  - 'Дебат 2: Таємниця смерті. Офіційна версія (нещасний випадок) проти конспірологічної (політичне вбивство). Як різні політичні
    сили використовували цю трагедію у своїх інтересах?'
  - '[!epistemic-humility] Визнання складності: не існує простих відповідей щодо його поразки на виборах 1991 року або розколу
    в Русі. Це були складні процеси з багатьма факторами.'
  - '[!decolonization] Радянська пропаганда намагалася зобразити Чорновола та інших дисидентів як «злочинців» та «агентів
    Заходу». Розвінчуємо цю імперську брехню.'
  section: 'Конфліктна карта: Дисидент чи політик?'
  words: 900
- points:
  - 'Світ дитинства: повоєнні Єрки, родина вчителів, вплив діда-шевченкознавця.'
  - 'Освіта та журналістські початки: Київський університет, робота на телебаченні, перші конфлікти з комсомольським та партійним
    керівництвом.'
  - 'Формативний досвід: що перетворило молодого амбітного журналіста на бунтаря, готового пожертвувати кар''єрою та свободою
    заради правди?'
  section: 'Формування: Черкащина та формування характеру'
  words: 1000
- points:
  - 'Ключовий акт спротиву: створення «Лиха з розуму» — збірки документів про репресії проти шістдесятників, що стала вироком
    для самого Чорновола.'
  - 'Табірний університет: роки ув''язнення, знайомство з іншими політв''язнями, участь в акціях протесту, непохитна позиція.'
  - 'Правозахисний рух: Чорновіл як один із засновників та лідерів Української Гельсінської групи — головного осередку опору
    в 1970-80-х.'
  - 'Народний Рух України та політика: від лідера масового антикомуністичного руху до кандидата в президенти 1991 року. Роль
    у проголошенні Незалежності.'
  section: 'Діяльність: Самвидав, табори і Рух'
  words: 1300
- points:
  - '[!anti-hagiography] Поразка на виборах 1991 року. Чому Чорновіл програв Леоніду Кравчуку? Аналіз стратегічних помилок
    кампанії та неготовності частини суспільства до радикальних змін.'
  - 'Розкол у Народному Русі: Чорновіл як лідер не зміг запобігти внутрішнім конфліктам та розпаду єдиного демократичного
    фронту. Якою була його роль та відповідальність у цьому процесі?'
  - '[!myth-buster] Міф про «втрачений рай»: ідеалістичне уявлення, що перемога Чорновола в 1991 році миттєво перетворила
    б Україну на успішну європейську державу. Деконструкція цього міфу та аналіз реальних викликів, що стояли перед країною.'
  - 'Особиста ціна боротьби: як постійні арешти, ув''язнення та переслідування вплинули на його родину та особисте життя?'
  section: 'Тінь: Ціна незламності'
  words: 900
- points:
  - 'Повернення до розминки: Маючи повну картину, студент відповідає на питання — ким був Чорновіл: ідеалістом, що програв,
    чи візіонером, чия місія ще не завершена?'
  - 'Спадщина як моральний орієнтир: Чорновіл встановив планку політичної та людської порядності, до якої українське суспільство
    звертається досі.'
  - '[!decolonization] Його постать як символ нерозривності української визвольної боротьби — від УПА до дисидентів та до
    сучасної війни за незалежність.'
  - 'Актуальність сьогодні: Чому принципи Чорновола — незламність, жертовність, пріоритет національних інтересів — є критично
    важливими для України в умовах екзистенційної війни.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Viacheslav Chornovil, from journalist to dissident and political prisoner, his leadership in the Helsinki
  Group and Rukh, the 1991 presidential campaign, and the enduring mystery of his death.
level: BIO
module: bio-142
objectives:
- Аналізувати ключові етапи життя та діяльності В'ячеслава Чорновола, від журналістики до політики
- Розрізняти та критично оцінювати інтерпретації його постаті як безкомпромісного дисидента та прагматичного політика
- Формулювати аргументовану позицію щодо причин та наслідків його поразки на виборах 1991 року
- Критично аналізувати різні версії його загибелі, відділяючи факти від політичних маніпуляцій
