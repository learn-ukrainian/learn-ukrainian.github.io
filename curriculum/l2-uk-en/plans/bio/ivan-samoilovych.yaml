content_outline:
- points:
  - 'Провокація: гетьман, що заперечував угоди, які узаконювали поділ України (Бахчисарай, Вічний мир), — і водночас організував Великий згін, що спорожнив і зруйнував правобережні поселення; що жертвував на церкви — і за чийого правління Київську митрополію підпорядкували Москві. Імперська пам''ять робить його то вірним московським урядовцем, то приреченим деспотом. Що ці ярлики показують, а що ховають?'
  - '[!biography] Знайомство з постаттю: починаємо не з вигаданого року народження (він невідомий), а з певного — задокументованих урядів генерального судді й лівобережного гетьмана.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: консолідатор і супротивник поділу — стабілізував Лівобережжя після Руїни, опирався угодам, що робили українську територію предметом торгу, і претендував на владу «обох боків Дніпра».'
  - 'Позиція 2: примусовий, родинно-центрований володар — Великий згін із переселенням і руйнуванням поселень, авторитарна й спадкова модель влади, залежність від московського війська, втрата церковної автономії за його правління.'
  - '[!decolonization] Імперське спрощення робить його вірним московським управителем або природно усуненим деспотом; націоналістичне — бездоганним оборонцем автономії. Обидва згладжують обмеженого володаря, чиї інституційне виживання й примус були реальними водночас.'
  - '[!epistemic-humility] Рік народження невідомий (часто відносять до 1630-х, але це не факт рівня ЕІУ); по батькові Самійлович не тотожне прізвищу Самойлович. Починаємо з задокументованих урядів і дат угод.'
  section: 'Конфліктна карта: Московський клієнт чи будівничий Гетьманщини'
  words: 900
- points:
  - 'Походження: Ходорків, у родині священника; рік народження невідомий — не відкриваємо модуль вигаданою «сценою народження».'
  - 'Освіта й рання кар''єра: навчався в Київській колегії; був писарем Красноколядинської сотні Чернігівського полку, сотником Веприцької сотні Гадяцького полку, обіймав уряди в полтавському й чернігівському полкових світах — це реальна адміністративна кар''єра, а не привнесене призначення.'
  - 'Уряди перед булавою: чернігівський полковник наприкінці 1660-х років; генеральний суддя за Дем''яна Многогрішного в 1669-1672 роках.'
  - '1672 рік: узяв участь у політичному усуненні Многогрішного й був обраний гетьманом під Конотопом (Козача Діброва) 27(17) червня.'
  - 'Конотопські статті 1672 року: доповнили попередні московсько-гетьманські домовленості, обмежили гетьманську владу на користь старшини й звузили автономію — це рамка його приходу до влади.'
  section: 'Формування: Від ходорківського попівського роду до генерального судді'
  words: 1000
- points:
  - '1672-1674: консолідував Лівобережжя після Руїни й прагнув об''єднати обидва береги Дніпра під своєю владою.'
  - '1674 рік: правобережна кампанія Самойловича й Ромодановського вдарила по Дорошенкові, здобула кілька міст, але не взяла Чигирина; Переяславська рада визнала його «гетьманом обох боків Дніпра» частиною правобережної старшини — це оспорювана претензія, а не стабільний контроль.'
  - '1675-1676: розв''язка з Дорошенком лишалася оспорюваною османськими, кримськими, московськими, річпосполитськими, запорозькими й правобережними силами; вересневе 1676 року зречення Дорошенка на користь Самойловича й Ромодановського стало вирішальним.'
  - '1677 рік: Чигирин обороняли від османського штурму козацькі й російські війська; сили Самойловича діяли разом із Ромодановським.'
  - '1678 рік: друга чигиринська кампанія завершилася зруйнуванням і залишенням Чигирина; для правобережних мешканців наслідком стало спустошення — відповідальність розподілена між османською стратегією, московським командуванням, козацькою обороною й набігами Сірка.'
  - '1680-ті: сприяв відбудові лівобережної економіки, торгівлі, культури, храмобудуванню й консолідації старшини.'
  section: 'Діяльність: Консолідація, Правобережжя й чигиринські війни'
  words: 1300
- points:
  - '[!anti-hagiography] Великий згін 1678-1679 років: Самойлович організував примусове переселення правобережних людей на Лівобережжя й руйнування поселень, щоб позбавити супротивників опертя — це стратегічний намір і примусові методи водночас; не пом''якшуємо його до добровільного переселення.'
  - 'Родинно-центрована влада: він прагнув авторитарної й спадкової моделі, роздаючи уряди й маєтки синам. Конотопські статті обмежили гетьманську владу на користь старшини, а згодом провідні старшини допомогли його усунути — вони були політичними акторами з маєтковими інтересами, а не лише жертвами.'
  - '[!myth-buster] Церковне меценатство й церковна втрата разом: він жертвував на храми й монастирі, а проте саме за його правління 1686 року Київську митрополію підпорядкували Московському патріархатові; водночас він заперечував Вічний мир (1686) і Бахчисарайський мир (1681), що узаконювали поділ. Тримаємо меценатство й інституційну втрату разом.'
  - '1687 рік: у першому кримському поході він вів близько 50 000 козаків разом із військом Голіцина; після провалу постачання й відступу російські командувачі та козацька старшина поклали провину на нього й звинуватили в «таємних зв''язках з татарами» — це політично вигідне звинувачення після невдачі, а не встановлений факт.'
  section: 'Тінь: Великий згін, родинна влада й церковна втрата'
  words: 900
- points:
  - 'Повернення до розминки: які вибори зберігали гетьманські інституції, які шкодили громадам, а які тиски робили обидва твердження правдивими водночас?'
  - 'Коломак, липень 1687 року: заарештований у таборі, скинутий, відправлений до Москви, а далі в сибірське заслання; вузька старшинська рада обрала Мазепу за підтримки Голіцина. Його падіння показує, як старшинські інтереси й московське втручання сходилися, коли гетьман ставав уразливим. Помер у Тобольську 1690 року.'
  - 'Мазепа: увійшов до служби Самойловича після того, як Сірко захопив його й передав; піднявся до генерального осавула. Його наступність — це політика протекції, служби й спадкоємства влади, а не історія одної зради.'
  - '[!decolonization] Вшанування в Ходоркові й Батурині повертає призабутого гетьмана, але може сповзати в героїчне згладжування. Відділяймо інституційне виживання від примусу, а звинувачення — від доведеного факту.'
  section: 'Дискусія та підсумок: Коломак, заслання й пам''ять'
  words: 700
focus: Ivan Samoilovych as the Left-Bank hetman who consolidated the Hetmanate after the Ruin (1672-1687) — the Khodorkiv priest-family origin, the administrative career to general judge, the Konotop accession, the 1674 Right-Bank campaign and 'hetman of both banks' claim, the Chyhyryn wars, the coercive Great Expulsion of 1678-1679, the authoritarian family-centered rule, the 1686 church subordination and anti-partition stance, the 1687 Crimean-campaign scapegoating, and the Kolomak arrest and Siberian exile.
