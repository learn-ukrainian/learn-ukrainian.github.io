objectives:
- Критично аналізувати зв'язок між правами людини, правосуддям та глобальною безпекою на прикладі діяльності Олександри Матвійчук
- Розрізняти та пояснювати ключові правові концепції: воєнний злочин, злочин агресії, безкарність, спеціальний трибунал
- Аргументовано дискутувати щодо ролі громадянського суспільства у документуванні злочинів та протидії державній агресії
- Сформулювати власну позицію щодо етичних дилем, що постають перед правозахисниками під час війни
