content_outline:
- points:
  - 'Парадокс: Як юристка, що документує звірства війни, стає лауреаткою Нобелівської премії МИРУ? Історія Олександри Матвійчук
    та її премії 2022 року руйнує просте уявлення, що мир — це лише відсутність бойових дій.'
  - 'Провокація: "Ми маємо утвердити мир, що базується на справедливості". Що означає ця теза, коли ворог не визнає жодних
    правил?'
  - '[!biography] Представлення Олександри Матвійчук не як ікони, а як головної дійової особи в глобальній драмі про право
    та безправ''я.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи не є скрупульозне документування злочинів «розкішшю» під час екзистенційної війни? Позиція Матвійчук: правосуддя
    — це зброя, що позбавляє ворога легітимності та запобігає безкарності.'
  - 'Дебат 2: Міжнародний чи національний суд? Дискусія про роль МКС, Спеціального трибуналу та української судової системи.
    Чи здатні зовнішні інституції зрозуміти український контекст?'
  - '[!epistemic-humility] Визнання, що обидві позиції в дебатах мають рацію: потреба в негайній військовій відповіді є абсолютною,
    але ігнорування правової складової призводить до циклів насильства.'
  - '[!decolonization] Виклик наративу, що "справжнє" правосуддя може бути лише в Гаазі. Матвійчук наполягає на суб''єктності
    України у встановленні справедливості.'
  section: 'Конфліктна карта: Правосуддя зараз чи після перемоги?'
  words: 900
- points:
  - 'Ранні роки: від юридичного факультету до заснування "Центру громадянських свобод" (ЦГС) у 2007 році.'
  - 'Точка неповернення: Революція Гідності. Створення «Євромайдан SOS» як відповідь на насильство держави. Модель горизонтальної
    солідарності волонтерів.'
  - 'Перші битви: кампанія #SaveSentsov та боротьба за звільнення політв''язнів Криму. Формування методології роботи з політично
    вмотивованими справами.'
  - 'Формативний досвід: усвідомлення, що право не працює автоматично — за нього потрібно боротися, часто всупереч державним
    інституціям.'
  section: 'Формування: Народження правозахисниці на Майдані'
  words: 1000
- points:
  - 'Документування з 2014 року: розробка методології збору свідчень про воєнні злочини в Криму та на Донбасі. Робота, яку
    роками ігнорував світ.'
  - 'Повномасштабне вторгнення: ініціатива «Трибунал для Путіна» (TJP). Масштабування роботи ЦГС для документування десятків
    тисяч епізодів звірств.'
  - 'Співпраця з міжнародними інстанціями: передача доказів до Міжнародного кримінального суду, робота з Радою ООН з прав
    людини.'
  - 'Адвокація Спеціального трибуналу: юридичні та політичні виклики у створенні механізму для притягнення до відповідальності
    за злочин агресії.'
  section: 'Діяльність: Архітектура справедливості'
  words: 1300
- points:
  - '[!anti-hagiography] Трагічний факт: вісім років документування злочинів (2014-2022) не змогли запобігти повномасштабному
    вторгненню. Чи була ставка на міжнародне право наївною перед обличчям беззаконної агресії?'
  - 'Етичні дилеми: як документувати злочини, не перетворюючи людське горе на "дані"? Критика, що правозахисники можуть "об''єктивувати"
    страждання.'
  - '[!myth-buster] Міф: Нобелівська премія — це щасливий фінал. Реальність: це інструмент, що дав голос, але не зупинив ракети.
    Матвійчук сама наголошує на відповідальності, а не на славі.'
  - 'Невидима ціна: емоційне вигорання, загрози безпеці та постійне перебування в епіцентрі людського болю. Що залишається
    за лаштунками публічних виступів.'
  section: 'Тінь: Межі впливу та ціна правозахисту'
  words: 900
- points:
  - 'Повернення до парадоксу: Матвійчук перекодує поняття "мир". Мир — це не відсутність війни, а присутність справедливості
    та гідності. Безкарність — це інша назва війни.'
  - 'Дипломатія цінностей: Матвійчук як втілення ідеї, що права людини — це не "м''яка сила", а основа глобальної безпеки.
    Її аргумент: "права людини важливіші за нафту і газ".'
  - '[!decolonization] Голос України, що говорить зі світом мовою універсальних цінностей, вимагаючи не допомоги, а дотримання
    спільних правил.'
  - 'Сучасна роль: як її голос впливає на рішення міжнародних партнерів? Чи дослухається світ до її закликів про необхідність
    зброї для захисту людей?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Oleksandra Matviichuk, the Center for Civil Liberties, documenting war crimes, the 2022 Nobel Peace Prize, and the
  tension between justice and peace during wartime.
