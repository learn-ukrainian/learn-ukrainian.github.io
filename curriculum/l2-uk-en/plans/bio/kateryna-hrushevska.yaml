content_outline:
- points:
  - >-
    [!biography] Знайомство з Катериною Грушевською: видатна етносоціологиня,
    фольклористка, редакторка та єдина донька Михайла Грушевського.
  - >-
    Провокаційне питання: як тоталітарна система знищувала українську
    гуманітаристику через переслідування цілих наукових родин?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та формування: домашня освіта, знання європейських мов (польська,
    німецька, англійська, французька). Навчання у Женевському університеті.
  - >-
    Науковий шлях: праця в Українському соціологічному інституті, співробітниця
    ВУАН. Дослідження з примітивної культури Африки та Америки ("З примітивної
    культури", 1924).
  section: 'Формування: Європейський вектор етносоціології'
  words: 1000
- points:
  - >-
    [!decolonization] Масштабний корпус "Українські народні думи" (1927, 1931):
    збереження та наукова фіксація українського усного епосу. Самостійна роль
    Катерини як науковиці, а не лише доньки.
  - >-
    Редакторська праця: журнал "Первісне громадянство і його пережитки на
    Україні" (1926-1930) як майданчик для антропологічних студій.
  section: 'Діяльність: Дослідниця народних дум'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Механізм терору: арешт НКВС після розгрому історичної
    школи Грушевського. Звинувачення в участі в "антирадянській націоналістичній
    організації".
  - >-
    [!epistemic-humility] Вирок Військового трибуналу Київського особливого
    військового округу (15-16 квітня 1939 року) — 8 років ув'язнення.
    Відсутність точного номера справи.
  - >-
    Смерть 30 березня 1943 року в Магаданській області (РРФСР). Руйнування
    архіву родини та переривання фольклорних студій.
  section: 'Тінь: Арешт та заслання'
  words: 1600
- points:
  - >-
    Доля наукової спадщини: збереження томів "Українських народних дум" як
    фундаментального джерела для сучасних дослідників.
  - 'Сучасне значення: повернення самостійного голосу Катерини Грушевської в історію української науки.'
  section: 'Підсумок: Пам''ять про науковицю'
  words: 1000
focus: >-
  Катерина Грушевська як видатна етносоціологиня, фундаторка академічного
  видання українських народних дум та жертва сталінського ГУЛАГу. Аналіз її
  самостійного наукового внеску та репресій проти наукових родин.
