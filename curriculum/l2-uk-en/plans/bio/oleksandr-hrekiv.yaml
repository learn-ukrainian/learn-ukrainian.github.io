content_outline:
- points:
  - 'Парадокс: Олександр Греків був одним з найдосвідченіших генералів УНР, професіоналом, що знав, як будувати армію. Чому
    ж армія, яку він очолював, зазнала поразки?'
  - '[!biography] Ця людина — продукт двох світів: офіцер Російської імператорської армії та генерал, що присягнув на вірність
    незалежній Україні. Його трагедія — це трагедія всієї визвольної боротьби.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Військовий професіоналізм vs. політична реальність. Чи був Греків надто «правильним» генералом для хаотичної,
    партизанської по суті війни? Конфлікт з політичним керівництвом (Винниченко, Петлюра) — хто мав рацію?'
  - 'Дебат 2: «Малорос» на службі республіки чи свідомий українець? Як російський генерал став патріотом УНР, і наскільки
    глибокою була його трансформація? Критика з боку націоналістичних кіл.'
  - '[!epistemic-humility] Оцінки Грекова коливаються від «рятівника армії» до «однієї з причин поразки». Джерела — його власні
    мемуари, спогади його опонентів та накази по армії — малюють суперечливу картину.'
  - '[!decolonization] Радянська історіографія зображала його як «контрреволюціонера», російська імперська — як «зрадника».
    Українська діаспорна — як героя. Де правда?'
  section: 'Конфліктна карта: Генерал імперії чи архітектор нації?'
  words: 900
- points:
  - 'Служба в російській армії: участь у російсько-японській та Першій світовій війнах. Досвід, що сформував його як професіонала.'
  - 'Київ 1917-го: як українізація військових частин перетворила кадрового офіцера на учасника національного руху.'
  - 'Поворотний момент: усвідомлення, що без власної армії держава приречена. Вибір на користь УНР як єдиної альтернативи
    хаосу та більшовизму.'
  section: 'Формування: Від царського офіцера до українського патріота'
  words: 1000
- points:
  - 'Командувач Армії УНР: призначення в найкритичніший момент — коли армія фактично розпалася.'
  - 'Реорганізація та дисципліна: як Греків намагався перетворити повстанські загони на регулярне військо за зразком європейських
    армій.'
  - 'Зимовий похід: командування однією з найгероїчніших операцій в історії українського війська. Успіх тактичний, але стратегічна
    поразка.'
  - 'Бої за Київ: успіхи та невдачі в боротьбі з більшовиками та білогвардійцями.'
  section: 'Діяльність: Бої за незалежність та розбудова армії'
  words: 1300
- points:
  - '[!anti-hagiography] Греків не виграв війну. Аналіз причин: об''єктивні (брак зброї, тиф, відсутність підтримки Антанти)
    та суб''єктивні (його власні прорахунки, нерозуміння психології добровольців).'
  - 'Конфлікти з отаманами: чому професійний генерал не міг знайти спільну мову з популярними, але недисциплінованими командирами
    повстанців?'
  - '[!myth-buster] Міф про «єдину армію». Греків командував конгломератом частин, кожна з яких мала власного отамана і власні
    політичні погляди. Це не армія, а збройний народ, який він так і не зміг приборкати.'
  - 'Критика сучасників: за що його звинувачували Петлюра, Винниченко та інші діячі УНР? Чи були ці звинувачення справедливими?'
  section: 'Тінь: Ціна поразки та межі командування'
  words: 900
- points:
  - 'Повернення до розминки: то чому ж професіонал програв? Студент формулює відповідь, зважуючи військові, політичні та соціальні
    фактори.'
  - 'Спадщина в еміграції: мемуари та військово-історичні праці Грекова. Спроба осмислити причини поразки та дати уроки майбутнім
    поколінням.'
  - '[!decolonization] Його праці — це відповідь на російську пропаганду та спроба створити українську військову доктрину.
    Наскільки це йому вдалося?'
  - 'Актуальність сьогодні: які уроки з досвіду Грекова та Армії УНР є важливими для сучасних Збройних Сил України?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Oleksandr Hrekiv: a professional tsarist general who became a key architect of the UNR Army. The module explores the
  paradox of a competent commander presiding over a strategic defeat, analyzing the conflict between professional military
  doctrine and revolutionary chaos.'
