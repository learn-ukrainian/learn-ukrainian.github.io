content_outline:
- points:
  - 'Парадокс: Як людина, що першою опублікувала рентгенівські знімки, перекладала Біблію та листувалася з Теслою, залишилася
    в тіні Нобелівської премії за «своє» відкриття?'
  - '[!biography] Представлення Івана Пулюя не як ікони, а як складної фігури на перетині науки, віри та національного обов''язку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пулюй vs Рентген — війна пріоритетів. Пулюй мав «лампу», що генерувала промені, і перші знімки. Рентген — систематичне
    дослідження та блискавичну публікацію. Чи це «вкрадене відкриття» чи історія про те, що в науці важливіше — першим побачити
    чи першим пояснити?'
  - 'Дебат 2: Національний герой vs примітка в історії. Чому в українській традиції Пулюй — геній, обділений славою, а в західній
    історії фізики — часто лише згадка? [!decolonization] Розбір того, як науковий канон (і Нобелівський комітет) віддавав
    перевагу представникам «великих» націй та наукових шкіл.'
  - '[!epistemic-humility] Визнання, що обидва вчені зробили ключові кроки, але комунікаційна стратегія та інституційна підтримка
    Рентгена виявилися вирішальними.'
  section: 'Конфліктна карта: Пріоритет чи визнання?'
  words: 900
- points:
  - 'Тернопільщина XIX ст.: середовище, що сформувало Пулюя — поєднання глибокої релігійності та прагнення до освіти.'
  - 'Відень та Прага: інтелектуальний шлях від духовної семінарії до провідних фізичних лабораторій Європи. Його вчителі та
    співпраця з європейськими вченими.'
  - 'Формування подвійної ідентичності: як поєднувалися ролі фізика-експериментатора та активіста української громади в Австро-Угорщині.'
  section: 'Формування: Від семінарії до європейських лабораторій'
  words: 1000
- points:
  - '«Лампа Пулюя»: що це за пристрій і чому він став «золотим стандартом» для експериментів з катодними променями за 15 років
    до відкриття Рентгена.'
  - 'Наукові праці з електротехніки: внесок Пулюя, що виходить за межі X-променів. Його дослідження в Празькій політехніці.'
  - 'Переклад Біблії: монументальна праця життя, здійснена разом з Кулішем та Нечуєм-Левицьким. Не хобі, а паралельний науковий
    проект, що вимагав філологічної точності та глибокої відданості.'
  section: 'Діяльність: Лампа Пулюя та українська Біблія'
  words: 1300
- points:
  - '[!anti-hagiography] Чому Пулюй програв «гонку за Нобелем»? Аналіз його наукових публікацій: чи усвідомлював він повне
    значення свого відкриття? Чи нехтував комунікацією, зосередившись на технічному вдосконаленні лампи?'
  - 'Характер та амбіції: чи була його громадська діяльність та український патріотизм фактором, що відволікав від наукової
    конкуренції? Чи був він одинаком, якому бракувало інституційної підтримки?'
  - '[!myth-buster] Руйнування міфу про «злого генія» Рентгена, який нібито вкрав відкриття. Історія складніша: це розповідь
    про паралельні дослідження, наукову етику та важливість не лише зробити відкриття, а й переконати в ньому світ.'
  section: 'Тінь: Ціна пріоритету та наукова комунікація'
  words: 900
- points:
  - 'Повернення до розминки: студент має сформулювати власну відповідь — чому Пулюй, попри все, не отримав світового визнання,
    на яке заслуговував?'
  - 'Подвійна спадщина: Пулюй як символ інтелектуальної потуги нації, що доводить давню приналежність України до європейської
    наукової цивілізації.'
  - '[!decolonization] Його постать сьогодні — це інструмент культурної дипломатії та спростування імперських наративів про
    «вторинність» української науки та культури.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Ivan Puliui's pioneering work on X-rays, his complex relationship with the discovery's official history, his role in
  translating the Bible into Ukrainian, and the anti-hagiographic view of a scientist-patriot.
