title: 'Іван Пулюй: Першовідкривач X-променів'
content_outline:
- section: Вступ — Світовий геній української науки
  points:
  - Пулюй як піонер сучасної фізики
  - Відкриття X-променів (раніше Рентгена)
  - Поєднання науки та національної справи
- section: Життєпис
  points:
  - Походження та духовна освіта (Тернопільщина)
  - Навчання у Віденському університеті
  - Співпраця з провідними вченими Європи
  - Академічна кар'єра у Празі
- section: Історичний контекст
  points:
  - Золота доба європейської фізики
  - Стан української еміграції в Австро-Угорщині
- section: Внесок
  points:
  - '"Лампа Пулюя" та її значення'
  - Наукові праці з електротехніки та фізики
- section: Останні роки
  points:
  - Громадська діяльність (захист української мови)
  - Переклад Біблії українською мовою
  - Смерть та поховання у Празі
- section: Спадщина
  points:
  - Питання пріоритету у відкритті променів
  - Вшанування в Україні та світі
- section: Підсумок
  points:
  - Пулюй як символ інтелектуальної потуги нації
