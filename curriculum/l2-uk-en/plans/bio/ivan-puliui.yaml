objectives:
- Критично оцінювати внесок Пулюя в контексті відкриття X-променів та дебату про пріоритет
- Аналізувати подвійну ідентичність Пулюя як науковця світового рівня та українського патріота-просвітителя
- Реконструювати хронологію та науковий контекст відкриття X-променів, порівнюючи підходи Пулюя та Рентгена
- Застосовувати анти-агіографічний підхід до аналізу біографії, виявляючи людські фактори за науковими досягненнями
