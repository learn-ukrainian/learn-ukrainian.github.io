content_outline:
- points:
  - 'Провокація: як одне життя вмістило дипломатію УНР, надії українізації, Колиму й уманський самвидав — і чому відмова стати інформаторкою ДПУ є дією, а не пасивністю?'
  - '[!biography] Знайомство з публічною інтелектуалкою: дипломатична працівниця УНР, докторка філософії Віденського університету, політв''язень радянських таборів і мемуаристка з Умані.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (українська агентність): Суровцова — державна службовиця, журналістка, перекладачка, міжнародна організаторка, ув''язнена, мемуаристка й архівістка, а не лише «жертва» чи «джерело Солженіцина».'
  - 'Позиція 2 (деколонізаційна): Петроград, Відень, Харків, Архангельськ, Колима й Умань вписані в українську інтелектуальну й політичну біографію; її не наративізуємо як «росіянку» за навчання в Петрограді чи шлюб на засланні.'
  - '[!decolonization] «Шпигунку» вживаємо лише як сфабриковану обвинувальну мову, а не як факт наратора; націонал-комуністичний вибір 1925 року подаємо історично, а не як просту моральну поразку.'
  - '[!epistemic-humility] Дрейф дати народження (17 чи 18 березня 1896) і титулів (дипломатична працівниця / службовиця МЗС, а не посол) позначаємо; хронологію ув''язнень і звільнень подаємо як етапи, а не як суцільне ув''язнення 1928-1957 років.'
  section: 'Конфліктна карта: «Джерело Солженіцина» чи українська публічна інтелектуалка?'
  words: 900
- points:
  - 'Освіта: народжена 1896 року в Києві, з 1905 року родина в Умані; Фундуклеївська та уманська гімназії, з 1913 року — Вищі жіночі (Бестужевські) курси в Петрограді, незавершені через революцію; українські підпільні студентські гуртки.'
  - '1917-1918 роки: повернення в Україну, праця активісткою Селянської спілки, журналісткою й у секретаріаті МЗС УНР; наприкінці 1918 року — участь у дипломатичній місії Директорії.'
  - 'Відень (1919-1925): секретарка інформаційного бюро місії, докторка філософії Віденського університету (дисертація про Богдана Хмельницького й ідею української державності).'
  - 'Жіночі мережі: діяльність у Міжнародній жіночій лізі миру і свободи, робота комітету допомоги голодним і турне «Потяга миру» США й Канадою 1924 року (з позначкою джерела).'
  section: 'Формування: Умань, Відень і жіночі мережі'
  words: 1000
- points:
  - 'Повернення (1925): 19 квітня 1925 року повернулася до СРСР і працювала в Харкові — у РАТАУ, наркоматі закордонних справ УСРР, Головліті та в науковому середовищі Дмитра Багалія; це приваба й небезпека українізації 1920-х.'
  - 'Відмова як поворотний момент: 1926 року харківське ДПУ пропонувало їй стати секретною співробітницею; після відмови її заарештували 29 листопада 1927 року.'
  - 'Сфабрикована справа: 28 вересня 1928 року засуджено за звинуваченням у шпигунстві на п''ять років; «шпигунку» вживаємо лише як обвинувальну мову, а не факт.'
  - 'Репресивний ланцюг: 1932 року заслання до Архангельська, повторні арешти 1936 і 1950 років, загалом 29 років у тюрмах, таборах і на засланні, зокрема Колима й Сеймчан; на засланні — шлюб із Д. Олицьким (розстріляний 1937 року), що пояснює архівну форму прізвища.'
  section: 'Діяльність: Українізація, відмова ДПУ й репресії'
  words: 1300
- points:
  - '[!anti-hagiography] Реабілітація 1957 року й повернення в Умань не зробили її політично невидимою: обшук 1972 року, постійний нагляд КДБ і повторні обшуки 1972, 1977, 1979 та 1981 років із спробами закрити салон і вилучити мемуари.'
  - 'Архів як самозахист: передавання мемуарів і паперів до фондів (фонд 284 у НБУВ, фонд 302 у ЦДАМЛМ) у 1960-1970-х роках — це стратегія виживання пам''яті під наглядом; архівотворення вчимо як політичну дію.'
  - '[!epistemic-humility] Ланцюг звільнень треба узгоджувати: звільнення влітку 1942 року із забороною повертатися в Україну, третє ув''язнення 1950 року й дозвіл повернутися 1957 року — це шари, а не одна дата.'
  - '[!decolonization] Застереження щодо Солженіцина: він відвідав її й використовував її свідчення, але це джерельний слід, а не осердя її значення; не робимо українку приміткою до російського автора.'
  section: 'Тінь: Сфабрикована справа, нагляд і архів як самозахист'
  words: 900
- points:
  - 'Повернення до розминки: чому канцелярську й дипломатичну працю варто вчити як державотворення, а відмову інформувати — як політичну дію?'
  - 'Жінки в революціях: пару з Міленою Рудницькою та Софією Русовою читаємо як жіночу політичну працю, а не як декоративне «жінки теж допомагали».'
  - 'Умань як вузол пам''яті: її дім пов''язав Софіївку, місцевий музей, письменників, колишніх в''язнів і дисидентів — противага київоцентричній географії дисидентства.'
  - 'Мемуари як доказ: «Спогади» (1996; розширене двотомне видання «Комори» 2025 року) вчимо як свідчення, а не всезнаюче оповідання; будь-який уривок звіряємо з виданням і цитуємо з позначкою сторінки; смерть в Умані 1985 року.'
  section: 'Дискусія та підсумок: Умань як вузол пам''яті'
  words: 700
focus: Nadiia Surovtsova (1896-1985) taught as a Ukrainian public intellectual, diplomatic-information worker, international women's-network participant, national-communist returnee, Soviet political prisoner, memoirist, and Uman cultural node, so that one life connects Ukrainian Revolution diplomacy, 1920s Ukrainization hope, Stalinist coercion, and the 1960s-1970s dissident network; her refusal to become a GPU informant is read as action rather than passive victimhood, the espionage charge stays fabricated-accusation language, and she is centred as a Ukrainian memoirist rather than a footnote to a Russian author.
