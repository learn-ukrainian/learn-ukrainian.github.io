objectives:
- Показувати, як одне життя пов'язує дипломатію Української революції, надії українізації 1920-х, сталінський примус і дисидентську мережу 1960-1970-х років
- Вчити відмову стати секретним співробітником ДПУ як дію та етичний вибір, а не як пасивну віктимність
- Використовувати мову «сфабрикованого обвинувачення» щодо звинувачення в шпигунстві, а не повторювати «шпигунка» як факт наратора
- Центрувати Суровцову як українську мемуаристку й архівістку, а не як примітку до російського автора, і поводитися з табірними матеріалами як з доказом, а не видовищем
