content_outline:
- points:
  - >-
    [!biography] Юрій Щербак: лікар-епідеміолог, письменник, документаліст
    Чорнобиля, екологічний політик, дипломат, публічний інтелектуал і лауреат
    Шевченківської премії 2026 року.
  - >-
    Провокаційне питання: що змінюється, коли катастрофу описує не тільки
    письменник, а й лікар, який розуміє інфекцію, ризик, свідчення і державну
    брехню?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 12 жовтня 1934 року в Києві. Українські інституційні джерела
    підтримують цю дату; англомовні варіанти з 23 жовтня треба сприймати як
    шум, доки немає сильнішого первинного доказу.
  - >-
    Київський медичний інститут, робота в інституті епідеміології та інфекційних
    хвороб, кандидатська і докторська дисертації про особливо небезпечні
    інфекції створили дисципліну доказу, що потім перейшла в документальну
    прозу.
  - >-
    Ранні повісті й романи `Як на війні`, `Бар'єр несумісності`, `Маленька
    футбольна команда`, `Причини і наслідки`, кіносценарії і документалістика
    показують автора, який заходить у літературу через медичне і соціальне
    спостереження.
  section: 'Формування: Лікар, епідеміолог і письменник факту'
  words: 900
- points:
  - >-
    `Чорнобиль` виник у вікні гласності, але не в умовах повної свободи слова.
    Щербак працював із поїздками в зону, інтерв'ю пожежників, медиків,
    чиновників, журналістів і свідків.
  - >-
    Документальна повість важлива не лише темою катастрофи, а методом: монтаж
    голосів, медична уважність, бюрократична мова, моральний суд і питання
    відповідальності держави.
  - >-
    [!decolonization] Чорнобиль у Щербака руйнує радянський міф компетентної
    імперської держави. Екологічна правда стає частиною українського
    державотворення і права суспільства знати.
  - >-
    Екологічний рух `Зелений світ`, Зелена партія, депутатська робота,
    комісія з розслідування причин Чорнобиля і міністерська посада після
    незалежності переводять свідчення в політичну дію.
  section: 'Діяльність: Чорнобиль, екологія і перехід від свідчення до політики'
  words: 1300
- points:
  - >-
    Після 1991 року Щербак був міністром охорони навколишнього середовища,
    учасником безпекових інституцій і послом України в Ізраїлі, США, Мексиці
    та Канаді.
  - >-
    Пізні книжки `Час смертохристів`, `Час Великої Гри`, `Час тирана`,
    `Україна в епоху війномиру`, `Мертва пам'ять. Голоси і крики`,
    `Вбити імперію зла`, `Третя світова війна України`, `Рашизм. Звір із
    безодні` треба читати як політичну антиутопію, публіцистику і попередження,
    а не як нейтральний підручник міжнародних відносин.
  - >-
    [!epistemic-humility] Щербак живий. Його актуальні позиції щодо війни,
    Криму, Росії, НАТО і пам'яті потрібно датувати й перевіряти на момент
    побудови модуля; не можна робити з інтерв'ю 2022 чи 2026 року позачасову
    формулу.
  section: 'Діяльність: Дипломатія і пізня антиімперська проза'
  words: 900
- points:
  - >-
    [!anti-hagiography] Щербак не був радянським в'язнем, засланцем або
    засудженим дисидентом. Його механізм тиску — інформаційний контроль,
    екологічна правда, публічна політика і пізні контроверсійні оцінки.
  - >-
    Перехід з опозиційної екологічної мобілізації до міністерської й
    дипломатичної влади потребує окремого питання: як відповідальність
    змінюється, коли свідок стає державним діячем?
  - >-
    [!myth-buster] Не зводимо Щербака до "автора про Чорнобиль". Медична
    наука, документалістика, зелений рух, дипломатія і політична проза
    утворюють одну траєкторію роботи з небезпекою і пам'яттю.
  section: 'Тінь: Жива постать, державна влада і межі політичної прози'
  words: 1000
- points:
  - >-
    Підсумок повертає до питання довіри: Чорнобиль показав, що держава, яка
    приховує факт, руйнує не лише здоров'я, а й політичну легітимність.
  - >-
    Шевченківська премія 2026 року за `Мертва пам'ять. Голоси і крики`
    підкреслює пізню актуальність теми пам'яті, але не скасовує потреби
    джерельно перевіряти живу рецепцію.
  - >-
    Семінар завершується формулою: лікарський доказ, документальне свідчення,
    екологічна політика і дипломатична мова можуть бути різними відповідями на
    одну імперську проблему — хто контролює правду про Україну.
  section: 'Підсумок: Доказ, пам''ять і право знати'
  words: 700
focus: >-
  Юрій Щербак як живий письменник, лікар-епідеміолог, автор документальної
  прози про Чорнобиль, екологічний політик, дипломат і пізній автор
  антиімперської політичної прози. Семінар читає його через доказ, свідчення,
  інформаційний контроль, державну відповідальність і джерельну обережність без
  вигаданої тюремної біографії.
level: BIO
