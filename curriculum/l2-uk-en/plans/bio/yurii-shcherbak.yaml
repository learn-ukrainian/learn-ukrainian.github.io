objectives:
- >-
  Пояснювати зв'язок між медичною підготовкою Щербака, документальною прозою,
  Чорнобильським свідченням і екологічною політикою.
- >-
  Аналізувати `Чорнобиль` як текст гласності, свідчення і критики радянського
  інформаційного контролю.
- >-
  Розрізняти опозиційну екологічну мобілізацію, державну владу, дипломатію і
  пізню політичну прозу як різні ролі однієї живої постаті.
- >-
  Датувати й джерельно перевіряти сучасні публічні позиції Щербака, не
  перетворюючи їх на позачасову доктрину.
