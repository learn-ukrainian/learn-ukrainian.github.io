content_outline:
- points:
  - >-
    [!biography] Знайомство з Михайлом Горинем: галицький шістдесятник, психолог за
    фахом, учасник Гельсінського руху й двічі ув'язнений політв'язень.
  - >-
    Провокаційне питання: чому радянська держава вважала організатора й документ
    небезпечнішими за зброю?
  - >-
    [!decolonization] Львівські шістдесятники й галицька традиція національного
    спротиву.
  section: Розминка
  words: 400
- points:
  - >-
    Народження 17 червня 1930 року в селі Кнісело (Жидачівщина, Львівщина, тоді
    Польща); галицька селянська родина; у грудні 1944 року родину намагалися
    депортувати.
  - >-
    Закінчив Львівський університет (1954); працював учителем і шкільним інспектором,
    згодом — промисловим психологом на львівському заводі автонавантажувачів.
  - >-
    Початок 1960-х: одна з центральних постатей львівських шістдесятників; організація
    поширення самвидаву та виданої за кордоном політичної літератури.
  - >-
    [!decolonization] Радше організатор і мислитель, ніж письменник: внесок дисидента
    — у побудові мереж і правозахисній документації.
  section: 'Формування: Психолог і львівський шістдесятник'
  words: 1000
- points:
  - >-
    Перший арешт 1965 року; вирок 1966 року — 6 років таборів суворого режиму;
    мордовські табори.
  - >-
    1967 року, вже в ув'язненні, засуджений ще на 3 роки Володимирської в'язниці за
    «пропаганду» й поширення самвидаву серед в'язнів (ЕСУ).
  - >-
    Після звільнення (кінець 1970-х) підтримував Українську Гельсінську групу,
    видаючи її нелегальний «Бюлетень», і свідомо обрав «другий ешелон» замість
    публічного членства («Я піду в другому ешелоні»).
  - >-
    [!anti-hagiography] Організація й документація як осердя внеску — назвати
    інституційну працю, а не лише особистий героїзм.
  section: 'Діяльність: Гельсінський рух і табірний спротив'
  words: 1200
- points:
  - >-
    Радянські юридичні ярлики — «антирадянська діяльність», «особливо небезпечний» —
    це мова обвинувачення, а не опис дій; механізм: арешт → табір → додаткове
    ув'язнення → повторний арешт.
  - >-
    Повторний арешт 3 грудня 1981 року; вирок 1982 року — 10 років таборів і 5 років
    заслання; справа трималася на підкинутих КДБ фальшивих документах (нібито текст
    «Соціальні дослідження механізму русифікації на Україні»).
  - >-
    [!myth-buster] Сфабрикованість другої справи: за даними УІНП і Суспільного, справа
    1981–1982 років не мала доказів і спиралася на підкинуті матеріали, щоб показати
    «триваючу антирадянську діяльність».
  - >-
    Протест голодуванням: на десятий день Горинь дістав інфаркт, але все одно отримав
    10 років суворого режиму і 5 років заслання; ув'язнення в Кучино, де в 1981–1985
    роках загинули кілька українських політв'язнів.
  - >-
    Свідчення «А тому, що вмирають тільки українці» — слова Гориня начальникові табору
    Кучино Долматову після смертей Тихого, Литвина, Марченка і Стуса.
  section: 'Тінь: Сфабрикована друга справа і Кучино'
  words: 1600
- points:
  - >-
    Звільнення 1987 року через тяжке погіршення здоров'я; реабілітація 1990 року.
  - >-
    Співорганізатор Української Гельсінської спілки та Робочої групи захисту
    українських політв'язнів; учасник «ланцюга Злуки» 1990 року.
  - >-
    Народний депутат першого скликання; участь у проголошенні незалежності України
    1991 року.
  - >-
    [!epistemic-humility] Родинний вимір репресій: брат Богдан Горинь також був
    ув'язнений — рідкісна пара братів у русі; Михайло Горинь помер 13 січня 2013 року
    у Львові.
  section: 'Підсумок: Від в''язня до будівничого незалежності'
  words: 1000
focus: >-
  Михайло Горинь як психолог, учасник Гельсінського руху й двічі ув'язнений
  політв'язень: аналіз дисидентської організації, механізму сфабрикованої другої
  справи 1981–1982 років та родинного виміру репресій родини Горинів.
level: BIO
module: bio-276
objectives:
- >-
  Аналізувати роль Михайла Гориня в Гельсінському русі — від «Бюлетеня» Української
  Гельсінської групи до співорганізації Української Гельсінської спілки.
- >-
  Розуміти механізм радянських репресій — арешт, табір суворого режиму, додаткове
  ув'язнення у в'язниці та повторний арешт зі сфабрикованими доказами.
- >-
  Досліджувати, як КДБ підкидало фальшиві документи, щоб імітувати «антирадянську
  діяльність» у справі 1981–1982 років.
- >-
  Оцінювати родинний вимір репресій на прикладі братів Михайла і Богдана Горинів.
