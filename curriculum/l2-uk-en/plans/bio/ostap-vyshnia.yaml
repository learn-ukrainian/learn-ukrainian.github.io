content_outline:
- points:
  - >-
    [!biography] Знайомство з Остапом Вишнею (Павлом Михайловичем Губенком) —
    найпопулярнішим українським гумористом 1920-х, «королем накладів» і творцем
    жанру «усмішки».
  - >-
    Провокаційне питання: чому сатирика, що смішив мільйони, режим спершу
    засудив до розстрілу, а потім примусив писати пропаганду проти власного
    народу?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 13 листопада 1889 р. на хуторі Чечва біля Груня (Полтавська
    губернія, нині Сумська область) у великій селянській родині. Закінчення
    Київської військово-фельдшерської школи (1907) та праця медичним фельдшером.
  - >-
    [!decolonization] Служба офіцером в Армії Української Народної Республіки
    (1918–1919) — керівником медично-санітарної управи Міністерства шляхів. У
    1919–1921 рр. — полон у більшовиків як «петлюрівця» та ув'язнення ЧК у
    Харкові. Саме цей факт згодом став прихованим виправданням репресій.
  - >-
    Дебют — фейлетон «Демократичні реформи Денікіна» (1919) під псевдонімом
    П. Грунський. Перехід від медицини до журналістики та стрімке зростання
    популярності на початку 1920-х.
  section: 'Формування: Від фельдшера до короля сміху (1889–1920-ті)'
  words: 1000
- points:
  - >-
    Винахід жанру: Вишня свідомо замінив іншомовне «фейлетон» питомим українським
    словом «усмішка». Збірка «Вишневі усмішки кримські» (1925) та програмний твір
    «Моя автобіографія» (1927).
  - >-
    [!epistemic-humility] Аналіз цитати з «Моєї автобіографії»: абсурдна гіпербола
    й народна говірка висміюють бюрократичну форму стандартної радянської
    автобіографії.
  - >-
    Мова й стиль: майстер розмовної ідіоматики, діалектизмів і синонімічних
    рядів. Русизми та канцелярит він уживав лише як об'єкт сатиричного глузування.
  - >-
    [!anti-hagiography] Ціна доби: брат письменника Василь Чечвіянський, також
    гуморист, був розстріляний НКВС у 1937 році.
  section: 'Діяльність: Винахід жанру «усмішки» (1920-ті)'
  words: 1200
- points:
  - >-
    1930: ідеологічна підготовка арешту — стаття Олексія Полторацького «Що таке
    Остап Вишня» таврує його «фашистом» і «контрреволюціонером».
  - >-
    26 грудня 1933: арешт НКВС у Харкові під час пост-голодоморної чистки
    української інтелігенції. Звинувачення — «контрреволюційна терористична
    діяльність» зі сфабрикованим замахом на Павла Постишева.
  - >-
    Вирок: 23 лютого 1934 — розстріл, замінений 3 березня 1934 р. на 10 років
    таборів. Покарання відбував в Ухтпечлазі (Комі АРСР), частково табірним
    фельдшером і журналістом табірної газети; табірний щоденник «Чиб'ю»
    (1934–1935, опубл. 1989).
  - >-
    [!myth-buster] 1943: раптове звільнення не з милосердя — режим потребував
    його популярного голосу проти УПА. Примусовий памфлет «Самостійна дірка»
    (1945–1946) став ціною, яку він заплатив за життя і безпеку родини.
  section: 'Тінь: Арешт, вирок, ГУЛАГ (1930–1943)'
  words: 1600
- points:
  - >-
    Повернення до Києва під жорстким ідеологічним контролем: «Зенітка» (1944) —
    перший твір після ГУЛАГу. Втеча в політично безпечну природну тематику —
    пізній шедевр «Мисливські усмішки» (1956).
  - >-
    [!decolonization] Цитата зі щоденника «Думи мої, думи мої...»: «Треба було
    сміятися, бо інакше я б плакав» — ключ до психологічного механізму виживання
    митця за тоталітаризму.
  - >-
    Смерть 28 вересня 1956 р. в Києві. Місце в пантеоні Розстріляного
    відродження: він вижив фізично, але режим украв десять років життя і зламав
    його психічне здоров'я.
  - >-
    Спротив сучасній російській дезінформації, що привласнює Вишню як
    «радянського сатирика», стираючи його минуле старшини УНР, ув'язнення ЧК
    1919 р. та десять років ГУЛАГу.
  section: 'Підсумок: Усмішка крізь сльози (1943–1956)'
  words: 1000
focus: >-
  Остап Вишня як творець жанру української «усмішки», «король накладів» 1920-х і
  жертва сталінського терору. Аналіз його гумору, механізму репресій
  (сфабрикований замах на Постишева, 10 років Ухтпечлагу) та примусу повоєнних
  років як архетипу «табірника-повернення».
level: BIO
module: bio-251
objectives:
- >-
  Аналізувати внесок Остапа Вишні в українську гумористику та винахід жанру
  «усмішки» як питомо української форми сатири.
- >-
  Пояснювати механізм сталінських репресій на прикладі сфабрикованого замаху
  на Постишева, заміни розстрілу таборами та десяти років Ухтпечлагу.
- Критично оцінювати повоєнний примус (памфлет «Самостійна дірка») як ціну виживання, а не як ідеологічне «прозріння».
- Розпізнавати гумор як стратегію психологічного виживання митця за тоталітаризму.
