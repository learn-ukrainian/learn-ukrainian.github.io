content_outline:
- points:
  - >-
    [!biography] Знайомство з Остапом Вишнею (Павлом Михайловичем Губенком) —
    надзвичайно популярним українським гумористом у 1920-х і творцем жанру
    «усмішки».
  - >-
    Провокаційне питання: як поєднати розстрільний вирок, майже десятирічне
    ув'язнення Вишні та замовний характер частини його повоєнних памфлетів?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 13 листопада 1889 р. на хуторі Чечва біля Груня (Полтавська
    губернія, нині Сумська область). Закінчення
    Київської військово-фельдшерської школи (1907) та праця медичним фельдшером.
  - >-
    [!decolonization] У справі слідчі поставили Губенкові за провину працю в
    Міністерстві шляхів при уряді Гетьмана та УНР [S2]. Формулу слідства
    подано як його твердження, а не як незалежно доведену посаду.
  - >-
    1921 року Павла Губенка вперше заарештували у справі ЦК Української партії
    соціалістів-революціонерів; після вироку до трьох років концтабору його
    звільнили за клопотанням Василя Еллана-Блакитного [S2].
  - >-
    Друкуватися під псевдонімом П. Грунський він почав 1919 року в українській
    пресі Кам'янця-Подільського, а від 1921 року працював як Остап Вишня в
    харківській періодиці [S1].
  section: 'Формування: Від фельдшера до популярного гумориста (1889–1920-ті)'
  words: 1000
- points:
  - >-
    Започаткований Остапом Вишнею жанр «усмішки»; бібліотечний запис 1924 року
    як точка для перевірки конкретної збірки.
  - >-
    [!epistemic-humility] НБУВ установлює автора, назву, місце видання,
    видавця, рік і обсяг «Літературних усмішок», але не дає сторінкового
    локатора для цитування окремої фрази в плані.
  - >-
    ЕСУ фіксує його працю з проблемами сільського життя, українською мовою й
    культурою, критикою російського великодержавного шовінізму та різними
    формами гумористичного шаржу.
  - >-
    [!anti-hagiography] Упродовж 1923–1928 років вийшли 23 книжки Вишні у 42
    виданнях. Окремо ЕСУ зазначає, що загальний наклад його творів поступався
    лише накладові творів Тараса Шевченка [S1]. Така популярність не робила
    сатиру політично безпечною: ЕСУ фіксує офіційне цькування наприкінці
    1920-х і на початку 1930-х років.
  section: 'Діяльність: Винахід жанру «усмішки» (1920-ті)'
  words: 1200
- points:
  - >-
    Наприкінці 1920-х і на початку 1930-х офіційна критика називала Вишню
    контрреволюціонером і фашистом; ці слова треба читати як мову цькування,
    а не як нейтральний опис [S1].
  - >-
    26 грудня 1933 року співробітники ДПУ УСРР провели трус і заарештували
    Павла Губенка в Харкові за особистим розпорядженням голови ДПУ УСРР
    Всеволода Балицького [S2]. Звинувачення — «контрреволюційна терористична
    діяльність» зі сфабрикованим замахом на Павла Постишева.
  - >-
    23 лютого 1934 року колегія ОДПУ засудила Вишню до розстрілу; 3 березня
    вирок замінили на 10 років таборів [S2]. ЕСУ локалізує ув'язнення на
    Півночі, у Комі АРСР, а архівна публікація фіксує майже десятирічний
    фактично відбутий строк.
  - >-
    [!myth-buster] 25 вересня 1943 року строк знизили до фактично відбутого, а
    8 жовтня письменник вийшов на волю [S2]. Джерела не дозволяють назвати
    конкретний памфлет умовою цього рішення.
  section: 'Тінь: Арешт, вирок, ГУЛАГ (1930–1943)'
  words: 1600
- points:
  - >-
    Повернення до Києва під жорстким ідеологічним контролем: ЕСУ датує
    «Зенітку» 1947 роком. Джерело окремо характеризує цикл «Мисливські усмішки»
    як тексти про українську природу й людське спілкування з нею.
  - >-
    [!decolonization] Справу 44228, сфабриковану терористичну конструкцію та
    тривалий правовий наслідок вироку слід ставити в центр біографії без
    приписування авторові безлокаторних щоденникових слів.
  - >-
    9 червня 1955 року Вишня попросив переглянути справу; 25 жовтня військовий
    трибунал її припинив, а 28 жовтня рішення оголосили письменникові [S2].
  - >-
    Смерть 28 вересня 1956 року в Києві. Українська пам'ять тримає разом
    мовну й жанрову працю, державне переслідування та замовний характер частини
    повоєнних памфлетів, який прямо називає ЕСУ.
  section: 'Підсумок: Усмішка крізь сльози (1943–1956)'
  words: 1000
focus: >-
  Остап Вишня як творець жанру української «усмішки», надзвичайно популярний
  гуморист 1920-х і жертва сталінського терору. Аналіз його гумору, механізму
  репресій (сфабрикований замах на Постишева, смертний вирок, замінений
  десятьма роками таборів) та офіційних обмежень повоєнного письма.
level: BIO
module: bio-251
objectives:
- >-
  Аналізувати внесок Остапа Вишні в українську гумористику та винахід жанру
  «усмішки» як питомо української форми сатири.
- >-
  Пояснювати механізм сталінських репресій на прикладі сфабрикованого замаху
  на Постишева, заміни розстрілу таборами та майже десятирічного ув'язнення.
- >-
  Критично оцінювати замовний характер частини повоєнних памфлетів без
  вигадування конкретного завдання або психологічного мотиву.
- Розрізняти підтверджені джерелами факти, мову сфабрикованого обвинувачення та неперевірені психологічні пояснення.
