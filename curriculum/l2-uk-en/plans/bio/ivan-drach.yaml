content_outline:
- points:
  - >-
    [!biography] Знайомство з Драчем Іваном Федоровичем: поет шістдесятників, сценарист,
    літературний критик, громадський діяч.
  - >-
    Провокаційне питання: як поет і кіносценарист міг залишатися в системі й водночас
    потрапляти під партійний тиск?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 17 жовтня 1936 року в Теліжинцях (Київщина); після школи — учитель, комсомольська
    робота, армія; філологія в Київському університеті; «Літературна газета»; Вищі сценарні
    курси в Москві.
  - >-
    Дебют «Соняшник» (1962); ранні збірки «Протуберанці серця» (1965), «Балади буднів» (1966).
  - >-
    [!decolonization] Не зводити до «успішного радянського поета» — джерела фіксують інновацію,
    тиск, компроміс і широкий жанровий діапазон.
  section: 'Формування: Теліжинці, університет і «Літературна газета»'
  words: 1000
- points:
  - >-
    Поезія: «Корінь і крона» (1974, Шевченківська премія), «Київське небо» (1976), «Шабля і
    хустина» (1981), «Теліжинці» (1985), «Храм сонця» (1988).
  - >-
    Сценарій «Криниця для спраглих» (1965): режисер Юрій Іллєнко; знято 1965, різко
    розкритиковано, не показано глядачам до пізнього радянського періоду.
  - >-
    Літературна критика «Духовний меч» (1983); довга поема «Чорнобильська мадонна» (1988) —
    перевірити видання на Phase 2.
  - >-
    [!decolonization] Українське поетичне кіно — не «регіональний радянський колір», а чутливий
    до форми й політики одночасно.
  section: 'Діяльність: Поезія, кіно і «Криниця для спраглих»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Драч не був ув''язненим — не вигадувати табір чи судовий процес; механізм
    — цензура, партійна критика, тиск після контактів із дисидентами.
  - >-
    Особливо 1965–1966: атмосфера протесту навколо «Тіней забутих предків»; різка критика й
    стоп-кадр «Криниці для спраглих»; примусове публічне «каяття» після дисидентських контактів.
  - >-
    Стенограма засідання художньої ради кіностудії ім. Довженка 29 січня 1966 (eKMAIR) —
    документ обговорення сценарію.
  - >-
    [!epistemic-humility] Не робити з Драча ні чистого дисидента-героя, ні простого колаборанта:
    зафіксована рамка — інновація, тиск, компроміс, повернення до громадянської політики.
  section: 'Тінь: Цензура й примусове «каяття» без ув''язнення'
  words: 1600
- points:
  - >-
    Смерть 19 червня 2018 року в Києві; похований у рідному селищі (ЕСУ).
  - >-
    Спадщина: поезія, сценарії, есеїстика; «Криниця для спраглих» відновлена у пізньому
    радянському періоді; тиск пошкодив простір українського поетичного кіно.
  - >-
    [!decolonization] [!myth-buster] Не редукувати до «соняшника» або до політики Руху; не видаляти
    примусове «каяття», але не сплощувати кар''єру до одного епізоду.
  section: 'Підсумок: Від «Соняшника» до громадянської ролі'
  words: 1000
focus: >-
  Іван Драч — поет, сценарист і громадський діяч. Аналіз цензури, стоп-кадру «Криниці для спраглих»
  та примусового «каяття» без вигаданого арешту.
level: BIO
