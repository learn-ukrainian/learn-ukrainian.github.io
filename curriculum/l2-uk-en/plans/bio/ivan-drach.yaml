objectives:
- >-
  Відокремити біографічні факти Драча (освіта, бібліографія, дати) від спрощень «соняшник»
  або партийної політики.
- Аналізувати поетичну метафору та сценарій «Криниці для спраглих» як українське поетичне кіно.
- Пояснити механізм непрямого тиску — цензура, критика ЦК, примусове «каяття» — без арешту.
- Оцінити складність кар''єри: інновація, тиск, компроміс і національно-демократична політика.
