content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Седляром: український живописець, графік,
    мистецтвознавець, педагог із кола бойчукістів; директор Межигірського
    художньо-керамічного технікуму від 1923 року.
  - >-
    Відкрите питання: що перевірені сторінки документують про арешт, вирок і
    знищення творів — і в якому місці джерело переходить від документа до
    власного пояснення?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта: Київське художнє училище (1915–1919), Українська державна академія
    мистецтв (1919–1922) у майстерні Михайла Бойчука; подорожі та спільна праця
    з Бойчуком.
  - >-
    Педагогіка та інституції: керівництво Межигірським мистецько-керамічним
    технікумом, викладання в Київському державному художньому інституті.
  - >-
    [!decolonization] Європейський вимір: серія «Європа» після подорожей — не
    «провінційність», а свідоме введення українського мистецтва в транснаціональний
    контекст (Bauhaus, Захід).
  section: 'Формування: Майстерня Бойчука та європейський вектор'
  words: 1000
- points:
  - >-
    Монументальна практика: мурали Луцьких казарм (1919, знищені 1922), аудиторії
    Інституту пластичних мистецтв (1924, знищені 1934), Межигірський технікум,
    фрески Червонозаводського театру (1933–1935, згодом зруйновані).
  - >-
    Живопис: «У школі лікнепу» (1924–1925), «Портрет Оксани Павленко» (1926),
    «Страта в Межигір'ї» (1927), «Біля трактора» (1931).
  - >-
    [!epistemic-humility] Книжкова графіка: цикл ілюстрацій до «Кобзаря».
    Херсонська сторінка наводить лист Седляра до Оксани Павленко від 2 вересня
    1929 року, де він сам подає обсяг роботи: «50 великих ілюстрацій та 26 —
    малих і обгортка». Подаємо саме ці категорії; джерело їх не підсумовує, тож
    і ми не називаємо загального числа. Перше видання — 1931, друге — 1933 з
    кольоровими ілюстраціями; 1938 року «Кобзар» вилучили з бібліотек і спалили.
  - >-
    Мистецтвознавча проза: «Занепад сучасного буржуазного мистецтва на Заході»
    (1934) — [!myth-buster] сакральна лексика в радянському журналі як ризикована
    мова, не «офіційний» соцреалізм.
  section: 'Діяльність: Кобзар, фрески та серія «Європа»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Седляра не зводимо ні до «другого Бойчука», ні до
    символу: реєстрова стаття тому «Реабілітовані історією» подає його
    секретарем оргкомітету Спілки художників УСРР, тобто на посаді всередині
    радянської мистецької системи, поки та сама система його не вбила.
    [!epistemic-humility] Точного судового файла в досьє не відновлено — номера
    справи не вигадуємо.
  - >-
    Тиск 1930-х: критика серії «Європа» за «формалізм»; ідеологічні атаки на
    бойчукізм як «націоналістичне» мистецтво.
  - >-
    Арешт 26 листопада 1936; звинувачення в «терористичній діяльності» — мова
    радянського слідства, не прийнятний опис.
  - >-
    Страта 13 липня 1937 у Києві разом із Бойчуком і Падалкою; знищення більшості
    картин, фресок, заборона й знищення ілюстрованого «Кобзаря» — подвійний механізм:
    фізичне вбивство + культурне стирання школи.
  section: 'Тінь: Арешт, страта та культурне стирання'
  words: 1600
- points:
  - >-
    Врятована спадщина: портрети, «У школі лікнепу», окремі ілюстрації «Кобзаря».
  - >-
    [!epistemic-humility] Реабілітація: Херсонська сторінка подає, що «минуло
    якихось двадцять років» після 1937-го й Верховний Суд СРСР ухвалив рішення
    про реабілітацію — року вона не називає, і ми його не добудовуємо. Це інша
    подія, ніж 1980-ті: тоді, за тією ж сторінкою, відкрилася правда про
    розправи 1937–1941 років, а творчість Седляра «до кінця 80-х років фактично
    замовчувалась». Реабілітація й припинення замовчування — два різні факти.
  - >-
    [!epistemic-humility] Сучасне значення: Херсонська сторінка подає, що
    ілюстрації до творів Шевченка фігурували у справі Седляра, і додає: «на
    думку професора Горбачова, можна стверджувати, що митець розстріляний за
    “Кобзар”». Це названа думка названого мистецтвознавця — подаємо її з
    атрибуцією як інтерпретацію, а не як встановлену причину вироку.
  section: 'Підсумок: Врятована майстерність'
  words: 1000
focus: >-
  Василь Седляр як видатний майстер бойчукізму, чия монументальна та
  графічна спадщина була цілеспрямовано знищена під час Великого терору
  1937 року.
