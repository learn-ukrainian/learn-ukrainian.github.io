content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Седляром: український живописець, графік,
    мистецтвознавець, педагог із кола бойчукістів; директор Межигірського
    художньо-керамічного технікуму від 1923 року.
  - >-
    Відкрите питання: що перевірені сторінки документують про арешт, вирок і
    знищення творів — і в якому місці джерело переходить від документа до
    власного пояснення?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта за Херсонською сторінкою: початкова освіта в місцевій чотирирічній
    школі; з 1915 до 1919 — Київська художня школа (саме «школа», як подає
    джерело, а не «училище»); по її закінченні — Українська державна академія
    мистецтв у майстерні Михайла Бойчука. [!epistemic-humility] Років навчання
    в академії сторінка не подає — не датуємо цей етап.
  - >-
    Педагогіка та інституції: керівництво Межигірським мистецько-керамічним
    технікумом, викладання в Київському державному художньому інституті.
  - >-
    [!epistemic-humility] Закордонна поїздка 1926–1927 років, яку організував
    Народний комісаріат освіти: разом із М. Бойчуком і А. Тараном Седляр
    побував у школах Чехословаччини, Німеччини та Франції; у Франції відвідав
    завод порцеляни в Севрі та мануфактуру гобеленів, у Німеччині — Баухаус, і,
    за Херсонською сторінкою, намагався перенести в Межигір'я досвід передових
    шкіл. Жодної мистецької серії за наслідками цієї поїздки ухвалені джерела
    не називають — тож модуль не приписує їй ані назви, ані складу, ані тези.
  - >-
    [!decolonization] Ту саму поїздку Херсонська сторінка називає однією з
    формальних підстав для арешту й обвинувачення у шпигунстві та участі в
    контрреволюційній організації. Це те, що подає джерело, і воно сильніше за
    будь-яку оцінку від себе: фахове навчання за кордоном держава згодом
    перекваліфікувала в доказ провини. [!anti-hagiography] Телеологічних формул
    про «свідоме введення українського мистецтва в транснаціональний контекст»
    не вживаємо: джерела фіксують маршрут і наслідок, а не намір митця.
  section: 'Формування: Майстерня Бойчука та європейський вектор'
  words: 1000
- points:
  - >-
    [!epistemic-humility] Монументальна практика за Херсонською сторінкою:
    колективні розписи Луцьких військових казарм, Червонозаводського театру в
    Харкові та Селянського санаторію імені ВУЦВК під Одесою; сторінка
    підсумовує прямо — «жодна з робіт не вціліла». Дат цих розписів вона не
    подає, тож і ми їх не додаємо. Один епізод датує том «Реабілітовані
    історією»: 1933 року Падалка разом із М. Бойчуком, В. Седляром і
    О. Павленко працював над фресковими розписами в Харківському
    Червонозаводському театрі (с. 146). Інших дат розписів і інших об'єктів
    ухвалений набір не подає — не додаємо ні років створення, ні років
    знищення, ні закладів, яких джерела не називають.
  - >-
    [!epistemic-humility] Датованих назв окремих картин ухвалені джерела не
    подають — тож модуль не перелічує жодної й не датує жодної. Замість
    переліку подаємо те, що джерело справді засвідчує: Херсонська сторінка
    пише, що Седляр створив понад 1000 робіт, що всі його монументальні твори
    в Києві, Харкові й Одесі знищені, а лишилися недосконалі фоторепродукції та
    невелика колекція станкового живопису й малюнка в Національному художньому
    музеї України. Назву й дату конкретної картини можна ввести лише після
    прямої перевірки за названою сторінкою джерела.
  - >-
    [!epistemic-humility] Книжкова графіка: цикл ілюстрацій до «Кобзаря».
    Херсонська сторінка наводить лист Седляра до Оксани Павленко від 2 вересня
    1929 року, де він сам подає обсяг роботи: «50 великих ілюстрацій та 26 —
    малих і обгортка». Подаємо саме ці категорії; джерело їх не підсумовує, тож
    і ми не називаємо загального числа. Перше видання — 1931, друге — 1933 з
    кольоровими ілюстраціями; 1938 року «Кобзар» вилучили з бібліотек і спалили.
  - >-
    Мистецтвознавча проза: «Занепад сучасного буржуазного мистецтва на Заході»
    (1934) — [!myth-buster] сакральна лексика в радянському журналі як ризикована
    мова, не «офіційний» соцреалізм.
  section: 'Діяльність: Кобзар, фрески та мистецтвознавча проза'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Седляра не зводимо ні до «другого Бойчука», ні до
    символу: реєстрова стаття тому «Реабілітовані історією» подає його
    секретарем оргкомітету Спілки художників УСРР, тобто на посаді всередині
    радянської мистецької системи, поки та сама система його не вбила.
    [!epistemic-humility] Точного судового файла в досьє не відновлено — номера
    справи не вигадуємо.
  - >-
    Тиск 1930-х за Херсонською сторінкою: 1930 року Комісія в справі
    реорганізації системи й мережі мистецьких закладів в УРСР усунула
    позапартійного Седляра від керівництва Межигірським технікумом; партії не
    подобалося «занурення» у народну тематику, і пошуки поступово заміняв
    єдиний стиль. [!epistemic-humility] Ярлика «формалізм» щодо якогось
    конкретного твору чи серії ухвалені джерела не наводять — тож ідеологічні
    атаки описуємо як тиск на бойчукізм загалом, не прив'язуючи їх до названої
    роботи.
  - >-
    Арешт 26 листопада 1936; звинувачення в «терористичній діяльності» — мова
    радянського слідства, не прийнятний опис.
  - >-
    Страта 13 липня 1937 у Києві разом із Бойчуком і Падалкою; знищення більшості
    картин, фресок, заборона й знищення ілюстрованого «Кобзаря» — подвійний механізм:
    фізичне вбивство + культурне стирання школи.
  section: 'Тінь: Арешт, страта та культурне стирання'
  words: 1600
- points:
  - >-
    Врятована спадщина за Херсонською сторінкою: недосконалі фоторепродукції
    знищеного, невелика колекція станкового живопису й малюнка в Національному
    художньому музеї України та ілюстрації «Кобзаря», які 2009 року перевидало
    видавництво «Дух і літера».
  - >-
    [!epistemic-humility] Реабілітація — два джерела різної зернистості, і
    подаємо обидва окремо. Херсонська сторінка каже лише, що «минуло якихось
    двадцять років» після 1937-го й Верховний Суд СРСР ухвалив рішення про
    реабілітацію: року вона не називає, і наближення джерела ми не «уточнюємо».
    Реєстрова стаття тому «Реабілітовані історією» подає точну дату:
    «Реабілітований 1 лютого 1958 р.» (с. 534–535). Наближення й точна дата не
    суперечать одне одному — вони просто різної точності, і саме тому кожну
    треба назвати за її джерелом.
  - >-
    [!epistemic-humility] 1980-ті — інша подія, ніж реабілітація: тоді, за
    Херсонською сторінкою, відкрилася правда про розправи 1937–1941 років,
    зокрема про розстріли в Биківнянському лісі, а творчість Седляра «до кінця
    80-х років фактично замовчувалась». Судова реабілітація (1 лютого 1958) і
    припинення замовчування (кінець 1980-х) — два різні факти, розділені майже
    трьома десятиліттями.
  - >-
    [!epistemic-humility] Сучасне значення: Херсонська сторінка подає, що
    ілюстрації до творів Шевченка фігурували у справі Седляра, і додає: «на
    думку професора Горбачова, можна стверджувати, що митець розстріляний за
    “Кобзар”». Це названа думка названого мистецтвознавця — подаємо її з
    атрибуцією як інтерпретацію, а не як встановлену причину вироку.
  section: 'Підсумок: Врятована майстерність'
  words: 1000
