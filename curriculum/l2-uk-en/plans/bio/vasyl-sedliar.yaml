content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Седляром: український живописець, графік,
    мистецтвознавець, педагог і один із найяскравіших представників школи Бойчука.
  - >-
    Освіта: навчання у Київському художньому училищі та Українській державній
    академії мистецтв. Спільна робота і подорожі з Михайлом Бойчуком.
  section: Розминка
  words: 400
- points:
  - >-
    Лідерство та педагогіка: керівництво Межигірським мистецько-керамічним
    технікумом та викладання у Київському художньому інституті.
  - >-
    Монументальна практика: участь у розписах Луцьких казарм (1919),
    аудиторій Інституту пластичних мистецтв (1924) та Червонозаводського
    театру в Харкові (1933–1935).
  - >-
    Книжкова графіка: створення 75 ілюстрацій до "Кобзаря" (1931), що стало
    вершиною його художньої майстерності.
  section: 'Діяльність: Європейський вимір та ілюстрування Кобзаря'
  words: 1000
- points:
  - >-
    [!anti-hagiography] Трагедія знищення: серія картин "Європа" зазнала критики
    за формалізм. Арешт митця 26 листопада 1936 року.
  - >-
    Радянські звинувачення: Седляру інкримінували "терористичну діяльність", що
    стало типовим вироком для ліквідації української культури.
  - >-
    Страта: розстріляний 13 липня 1937 року в Києві разом з Бойчуком та Падалкою.
  - >-
    [!decolonization] Тотальне стирання пам'яті: знищення більшості картин,
    фресок, заборона та знищення накладу ілюстрованого "Кобзаря".
  section: 'Тінь: Фізичне та культурне знищення'
  words: 1200
- points:
  - >-
    Збережена спадщина: портрети ("Портрет Оксани Павленко"), картини ("У школі
    лікнепу") та врятовані примірники "Кобзаря".
  - >-
    Відродження: реабілітація 1958 року та повернення імені митця до пантеону
    національної пам'яті.
  section: 'Підсумок: Врятована майстерність'
  words: 800
focus: >-
