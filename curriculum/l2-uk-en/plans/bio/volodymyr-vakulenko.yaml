objectives:
- Дослідити життя та творчий шлях Володимира Вакуленка в контексті сучасної української літератури
- Проаналізувати його "Щоденник окупації" як історичне свідчення та літературний текст
- Критично осмислити історичну тяглість російських репресій проти української інтелігенції на прикладі долі Вакуленка
- Сформулювати власну позицію щодо ролі та відповідальності митця під час війни та геноциду
