content_outline:
- points:
  - 'Парадокс: Дитячий письменник, автор світлих віршів, стає ворогом №1 для окупаційної армії. Чому його щоденник виявився
    небезпечнішим за зброю?'
  - 'Питання до студента: Чи може слово бути причиною для вбивства? Наведіть історичні приклади.'
  - '[!biography] Коротке представлення Вакуленка як частини харківського літсередовища, друга Жадана, а не лише як жертви.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що було головним актом спротиву Вакуленка? Ведення щоденника (фіксація злочину) чи його порятунок (закопування
    в саду)? Дискусія про намір та дію.'
  - 'Дебат 2: Вакуленко — це продовження Розстріляного Відродження чи якісно новий випадок? Порівняння сталінських репресій
    (знищення за ідеологію) та путінських (знищення за сам факт української ідентичності).'
  - '[!epistemic-humility] Визнання, що ми не знаємо точних мотивів окупантів, лише можемо аналізувати патерни їхньої поведінки.'
  - '[!decolonization] Аналіз вбивства Вакуленка як акту геноциду культури, а не просто воєнного злочину.'
  section: 'Конфліктна карта: Спротив письменника'
  words: 900
- points:
  - 'Контекст: Харківська літературна сцена 2000-х, вплив Сергія Жадана та андеграундної культури.'
  - 'Творча еволюція: від панк-витівок до написання дитячих книг. Чому цей перехід був важливим для самого Вакуленка?'
  - 'Аналіз ранніх творів: пошук власного голосу, експерименти з формою.'
  - 'Соціальна позиція: активна участь у Революції Гідності, волонтерство. Як громадянська позиція впливала на творчість.'
  section: 'Формування: Шлях до дитячої літератури'
  words: 1000
- points:
  - 'Читання ключових фрагментів щоденника: опис побуту, психологічний стан, фіксація переміщень та злочинів російських військ.'
  - 'Мова як інструмент фіксації: аналіз лексики щоденника — побутові деталі, суржик окупантів, власні рефлексії.'
  - 'Щоденник як історичне джерело: що ми дізнаємося про перші тижні окупації Ізюма, чого не знайти в офіційних звітах?'
  - 'Текст як свідчення: порівняння щоденника Вакуленка з іншими окупаційними щоденниками (Анна Франк, Таня Савічева).'
  section: 'Діяльність: Щоденник окупації'
  words: 1300
- points:
  - '[!anti-hagiography] Вакуленко не був «воїном світла». Він був звичайною людиною, що опинилась в нелюдських обставинах,
    відчувала страх, розпач, але робила свою справу.'
  - 'Трагедія письменника: чи могла його творчість, його культура, врятувати його від смерті? Дискусія про межі впливу мистецтва.'
  - '[!myth-buster] Розвінчання міфу, що «культура поза політикою». Вбивство Вакуленка доводить, що для імперії культура є
    ціллю №1.'
  - 'Ціна свідчення: Вакуленко заплатив життям за те, щоб його щоденник був прочитаний. Чи варта була ця жертва?'
  section: 'Тінь: Безсилля культури'
  words: 900
- points:
  - 'Повернення до розминки: Чому щоденник виявився небезпечнішим за зброю? Студент формулює відповідь, спираючись на матеріали
    модуля.'
  - 'Спадщина Вакуленка: це його дитячі книги чи його останній щоденник? Як ми маємо його пам’ятати?'
  - '[!decolonization] Щоденник Вакуленка як доказ у міжнародних судах. Юридичний вимір спадщини.'
  - 'Майбутнє: як говорити про війну з дітьми, використовуючи спадщину дитячого письменника, вбитого на цій війні?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Володимир Вакуленко: дитячий письменник, убитий за ведення окупаційного щоденника. Аналіз тексту щоденника, тяглість
  репресій та роль митця під час геноциду.'
