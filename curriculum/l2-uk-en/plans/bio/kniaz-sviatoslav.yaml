content_outline:
- points:
  - 'Парадокс: Як князь, що майже не жив у Києві, став символом воїнської честі й київської військової традиції
    (без модерної «державницької телеології»)?'
  - '[!biography] Опис зовнішності князя візантійським хроністом Левом Дияконом (оселедець, сережка, біла сорочка)
    — архетип воїна, що випереджає свій час.'
  - 'Провокативне питання: чи був Святослав геніальним стратегом, чи авантюристом, чиї дії поставили під загрозу
    власну державу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Завойовник vs. Державний діяч. Чи була його експансія просто грабунком у варязькому стилі, чи продуманою
    стратегією розбудови імперії?'
  - '[!epistemic-humility] Аргумент «за»: знищення Хазарії та тиск на Візантію вивели Русь на глобальну арену. Аргумент
    «проти»: він майже не займався внутрішніми справами, залишаючи це Ользі та синам.'
  - 'Дебат 2: Український герой vs. імперський символ. Як постать язичницького князя-воїна була апропрійована російською
    імперською та радянською ідеологією?'
  - '[!decolonization] Повернення Святослава в український пантеон. Його образ як патрона ССО ЗСУ — це відновлення
    історичної справедливості чи створення нового міфу?'
  section: 'Конфліктна карта: Творець чи руйнівник?'
  words: 900
- points:
  - 'Дитинство, позначене трагедією: вбивство батька, Ігоря, древлянами як перший урок про необхідність сили.'
  - 'Виховання варязькими воєводами Асмудом та Свенельдом: характер, що формувався не в палатах, а у військових
    таборах.'
  - 'Перший бій у 4 роки (похід на древлян, 946 р.): символічний жест — «Князь уже почав, потягніте, дружино, за
    князем» — що заклав модель його лідерства.'
  - 'Світоглядний вибір: рішуча відмова хреститися попри вмовляння матері — «Дружина моя сміятиметься з цього».
    Пріоритет військової лояльності над релігією.'
  section: 'Формування: Виховання вовченяти'
  words: 1000
- points:
  - 'Східний похід (964-965): не просто набіг, а блискуча стратегічна операція. Звільнення в''ятичів та обхід степу
    через ліси.'
  - 'Крах Хазарського каганату: падіння Ітіля, Саркела (Біла Вежа) та Семендера. Завоювання торговельних шляхів
    — із насильством і геополітичними наслідками, без романтизації «санітарної» війни.'
  - 'Балканські кампанії: проект перенесення столиці до Переяславця на Дунаї — «Тут сходяться блага... бо то є середина
    землі моєї».'
  - 'Війна з Візантією: битва під Аркадіополем та героїчна облога Доростола (971). Зіткнення молодої держави з надпотужною
    імперією, що визначило майбутнє Русі.'
  section: 'Діяльність: Злам Сходу та мрія про Дунай'
  words: 1300
- points:
  - '[!anti-hagiography] Головний наслідок знищення Хазарії: відкриття кордону для степових орд. Перемога на Сході
    створила смертельну загрозу з Півдня (печеніги).'
  - '[!myth-buster] Загибель на дніпрових порогах (весна 972, ЕІУ: поразка від печенізького хана Курі). ЕІУ не підтверджує
    «таємного візантійського посольства» чи «виснаженої пораненої сили» як доведених подробиць — їх не подавати
    як факт. Легенда про чашу з черепа — літописний/історіографічний мотив.'
  - 'Легенда про чашу з черепа князя, зроблена ханом Курею: моторошне визнання доблесті ворога та символ марності
    завоювань — «Чужого шукаючи, своє втратив».'
  - 'Провал як державного менеджера: постійна відсутність у столиці, ігнорування внутрішніх потреб, залишення управління
    на матір та синів. Його походи виснажували ресурси Русі.'
  section: 'Тінь: Ціна перемоги'
  words: 900
- points:
  - 'Повернення до розминки: Святослав — спалах, що освітив шлях імперії, чи пожежа, що ледь не спалила власний
    дім? Студент формулює відповідь.'
  - 'Парадокс спадщини: князь-язичник, що не займався державою, заклав фундамент для майбутньої християнської імперії
    свого сина Володимира.'
  - 'Адміністративна реформа: призначення синів намісниками (Ярополк, Олег, Володимир) — крок, що, з одного боку,
    зміцнив вертикаль, а з іншого — заклав основу для майбутніх міжусобиць.'
  - '[!decolonization] Святослав сьогодні: популярне гасло «Іду на ви!» — пізня модернізація; у ПВЛ (Махновець)
    формула ближча до «Хочу на ви іти». Не приписувати князеві виключний «метропольний» протонаціональний статус
    Києва-Чернігова-Переяслава; завоювання — з насильством і наслідками (печенізька загроза після Хазарії).'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Sviatoslav Ihorovych: geopolitical strategy, destruction of Khazaria, conflict with Byzantium, and the anti-hagiographic
  legacy of a warrior-prince.'
level: BIO
module: bio-002
objectives:
- Аналізувати геополітичну стратегію Святослава Ігоровича, розрізняючи її причини та наслідки
- Оцінювати вплив знищення Хазарського каганату на історію Східної Європи
- Володіти біографічною та військовою лексикою на рівні С1 для обговорення історії Русі
- Порівнювати та протиставляти стилі лідерства та державні підходи Ольги та Святослава
