- Розуміти історичні умови та механізми переслідування Бандери польською, німецькою та радянською владами.
- Досліджувати складні аспекти діяльності ОУН(б) та розрізняти історичні факти від російської дезінформації.
- Оцінювати вплив пам'яті про Бандеру на сучасну українську та міжнародну політику.
