content_outline:
- points:
  - >-
    [!biography] Знайомство зі Степаном Бандерою (1909–1959): український політичний діяч,
    ідеолог українського націоналістичного руху ХХ століття, голова Проводу ОУН(б).
  - >-
    Провокаційне питання: чому про цю постать сперечаються не через брак фактів, а
    через те, що майже кожен факт негайно втягується в чужу суперечку? Три
    розмежування модуля: особа vs організація; період керівництва vs період
    ув'язнення; подія vs пізніша пам'ять про неї.
  section: Розминка
  words: 400
- points:
  - >-
    Народження в Галичині у родині греко-католицького священника, навчання в Стрийській
    гімназії та на агрономічному відділенні Львівської політехніки.
  - >-
    Приєднання до УВО (1927) та ОУН (1929). З 1933 року — крайовий провідник ОУН
    на західноукраїнських землях.
  - >-
    Радикалізація руху: перехід від експропріацій до індивідуального терору проти
    представників польської адміністрації та симпатиків СРСР (вбивство Б. Пєрацького).
  - >-
    Два окремі провадження, а не одне: Варшавський процес (18 листопада 1935 —
    13 січня 1936) і Львівський процес (25 травня — 26 червня 1936) [ЕІУ].
    Засудження до страти, заміненої на довічне ув'язнення. Звільнення в
    середині вересня 1939 року в умовах безвладдя в Польщі.
  section: 'Формування: Радикалізація та ОУН'
  words: 1000
- points:
  - >-
    Розкол ОУН та створення ОУН(б): формування більш радикального крила під проводом Бандери,
    яке вимагало рішучих дій у боротьбі за незалежність.
  - >-
    Акт відновлення Української Держави (30 червня 1941 року, Львів): спроба
    самостійного проголошення держави в умовах німецько-радянської війни.
  - >-
    Відмова німецької влади визнати Акт. Арешт Бандери та Ярослава Стецька німецькими
    органами безпеки.
  - >-
    Контакти з керівництвом Абверу (документовані ЕІУ), внаслідок яких сформовано
    три похідні групи ОУН та батальйони «Нахтігаль» і «Роланд». Це передує арештові
    й належить до окремого питання.
  - >-
    Ув'язнення в концентраційному таборі Заксенгаузен (з 1942 року, спецблок
    «Целленбау», до осені 1944). [!epistemic-humility] Хронологічна межа: ув'язнення
    з вересня 1941 року стосується періоду ПІСЛЯ арешту й не є відповіддю на питання
    про попередній етап (контакти з Абвером, похідні групи). Воно спростовує тезу про
    «слухняну маріонетку» на той момент — і не більше.
  section: 'Діяльність: Розкол ОУН та Акт 30 червня'
  words: 1200
- points:
  - >-
    Еміграція: керівництво Закордонними частинами ОУН після війни (Мюнхен).
    Написання праць, як-от "Перспективи української революції".
  - >-
    [!epistemic-humility] Відповідальність: волинське рішення 1943 року ЕІУ
    атрибутує Крайовому проводу ОУН(б) на Волині як органу, а не особисто Бандері.
    Водночас ЕІУ фіксує, що він «певний час підтримував контакти з членами проводу
    ОУН(б), впливаючи на політику, тактику й діяльність оунівських орг-цій в
    окупованій Україні». Обидві крайні тези хибні — розрізняти рівні, а не обирати зручний.
  - >-
    Опір демократизації руху (за ЕІУ): Бандера і його оточення «не сприйняли переходу
    ОУН від тоталітарних орг. форм до демократ. засад діяльності», «заперечували
    обмеження повноважень провідника» і не погоджувалися зі змінами
    політично-ідеологічних засад, ухваленими на 3-му зборі ОУН.
  - >-
    Виключність репрезентації (за ЕІУ): наполягав, що право репрезентувати
    український народ мають лише ті політичні сили, які ведуть безкомпромісну
    революційно-визвольну боротьбу; через це очолювані ним ЗЧ ОУН 1950 року
    вийшли зі складу Української національної ради.
  - >-
    Радянський терор в екзилі: вбивство Бандери (15 жовтня 1959 року) агентом КДБ
    Богданом Сташинським за допомогою отрути (зафіксовано на процесі в ФРН).
  section: 'Тінь: Повоєнні роки та вбивство'
  words: 1600
- points:
  - >-
    [!myth-buster] Похідне «бандерівець»: перевірені цим проходом джерела про Бандеру
    його НЕ розглядають (у статті ЕІУ форма «бандерівц-» не трапляється жодного разу).
    Тому НЕ стверджувати нічого про це похідне — ні його сучасного значення, ні обсягу
    вжитку, ні того, як і до кого його застосовують. Для будь-якого такого твердження
    потрібне окреме джерело саме про вжиток слова, якого цей прохід не має. Єдиний
    коректний хід тут — назвати межу знання, а не заповнити її.
  - >-
    Політика пам'яті — рівно те, що подає документ: Указ Президента України
    № 46/2010 від 20 січня 2010 року про присвоєння звання Героя України існує
    й доступний. Сторінку читати повністю: вона подає і примітку «Додатково див.
    Постанову Донецького окружного адміністративного суду N 2а-1219/10/0570 від
    02.04.2010», і рядок поточної редакції — «Редакція від 02.04.2010, підстава -
    v0570805-10», тобто підставою чинної редакції названо саме цю постанову суду.
    Статусу втрати чинності сторінка не показує. Скасування указу НЕ стверджувати —
    але й НЕ казати, що сторінка подає «лише примітку».
  - >-
    [!epistemic-humility] Джерелознавча вправа замість оцінки: прочитати обидва рядки
    сторінки — примітку про постанову суду й рядок підстави чинної редакції — і
    сформулювати, що кожен із них доводить, а що ні: «додатково див. постанову суду»
    не дорівнює «скасовано судом», але й «підстава - v0570805-10» не є декоративною
    деталлю. Окремо: чому число про сучасне ставлення без назви опитування, вибірки
    й дати не є доказом.
  section: 'Підсумок: Складна спадщина та міфи'
  words: 1000
focus: >-
  Степан Бандера як ключова фігура українського націоналізму, лідер ОУН(б) та об'єкт тривалих
  політичних дискусій. Аналіз його діяльності, контактів з Абвером, ув'язнення в Заксенгаузені,
  вбивства КДБ, засвідченого джерелом опору демократизації ОУН, а також складних питань
  участі ОУН(б) у подіях Другої світової війни — з розрізненням особи й органу.
