objectives:
- Аналізувати політичну діяльність Степана Бандери в контексті українського націоналістичного руху.
- Розуміти історичні умови та механізми переслідування Бандери польською, німецькою та радянською владами.
- >-
  Досліджувати засвідчений ЕІУ опір Бандери та його оточення переходові ОУН від
  тоталітарних організаційних форм до демократичних засад, зокрема заперечення
  обмеження повноважень провідника та вимогу виключного права репрезентації.
- >-
  Розрізняти рівні відповідальності (особа vs орган) і хронологічні межі
  (до арешту vs період ув'язнення), не використовуючи ув'язнення як відповідь на
  питання про попередній етап.
- >-
  Читати указ № 46/2010 як документ політики пам'яті: відрізняти те, що сторінка
  справді подає (примітку про постанову суду й рядок підстави чинної редакції),
  від тверджень про його статус, яких вона не робить.
