content_outline:
- points:
  - >-
    [!biography] Знайомство зі Степаном Бандерою (1909–1959): український політичний діяч,
    ідеолог українського націоналістичного руху ХХ століття, голова Проводу ОУН(б).
  - >-
    Провокаційне питання: чому історична постать, яка більшість Другої світової війни
    провела в нацистському концтаборі, стала головним об'єктом російської дезінформації?
  section: Розминка
  words: 400
- points:
  - >-
    Народження в Галичині у родині греко-католицького священника, навчання в Стрийській
    гімназії та на агрономічному відділенні Львівської політехніки.
  - >-
    Приєднання до УВО (1927) та ОУН (1929). З 1933 року — крайовий провідник ОУН
    на західноукраїнських землях.
  - >-
    Радикалізація руху: перехід від експропріацій до індивідуального терору проти
    представників польської адміністрації та симпатиків СРСР (вбивство Б. Пєрацького).
  - >-
    Варшавський та Львівський процеси (1936), засудження до страти, заміненої на довічне
    ув'язнення. Звільнення на початку Другої світової війни.
  section: 'Формування: Радикалізація та ОУН'
  words: 1000
- points:
  - >-
    Розкол ОУН та створення ОУН(б): формування більш радикального крила під проводом Бандери,
    яке вимагало рішучих дій у боротьбі за незалежність.
  - >-
    Акт відновлення Української Держави (30 червня 1941 року, Львів): спроба
    самостійного проголошення держави в умовах німецько-радянської війни.
  - >-
    Відмова німецької влади визнати Акт. Арешт Бандери та Ярослава Стецька німецькими
    органами безпеки.
  - >-
    Ув'язнення в концентраційному таборі Заксенгаузен (до 1944 року), що спростовує
    радянський міф про статус "німецької маріонетки", але не знімає питань до
    ідеології руху.
  section: 'Діяльність: Розкол ОУН та Акт 30 червня'
  words: 1200
- points:
  - >-
    Еміграція: керівництво Закордонними частинами ОУН після війни (Мюнхен).
    Написання праць, як-от "Перспективи української революції".
  - >-
    [!epistemic-humility] Відповідальність та історіографія: дискусія щодо особистого
    контролю Бандери над діями УПА в 1941–1944 роках з огляду на його перебування в ув'язненні.
  - >-
    Однак ОУН(б) залишалася його фракцією; ідеологія, кадри та антипольські дії (Волинь)
    не можуть бути повністю відділені від його лінії проводу (праці Гімки, Мотики, Снайдера).
  - >-
    Радянський терор в екзилі: вбивство Бандери (15 жовтня 1959 року) агентом КДБ
    Богданом Сташинським за допомогою отрути (зафіксовано на процесі в ФРН).
  section: 'Тінь: Повоєнні роки та вбивство'
  words: 1600
- points:
  - >-
    [!myth-buster] Російська дезінформація: використання слова "бандерівець" як
    універсального ярлика для всіх прихильників української державності з метою
    делегітимізації українського спротиву.
  - >-
    Сучасне сприйняття: Указ Президента Ющенка 2010 року про присвоєння звання
    Героя України (згодом скасований судом) як точка спалаху політики пам'яті.
  - >-
    Трансформація образу: соціологічні дані 2022 року демонструють зростання позитивного
    ставлення до Бандери як символу антирадянського та антиімперського спротиву, а не
    як підтримку інтегрального націоналізму 1930-х.
  section: 'Підсумок: Складна спадщина та міфи'
  words: 1000
focus: >-
  Степан Бандера як ключова фігура українського націоналізму, лідер ОУН(б) та об'єкт тривалих
  політичних дискусій. Аналіз його діяльності, ув'язнення в Заксенгаузені, вбивства КДБ,
  а також складних питань участі ОУН(б) у подіях Другої світової війни.
