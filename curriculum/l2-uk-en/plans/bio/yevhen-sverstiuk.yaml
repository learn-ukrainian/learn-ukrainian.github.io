content_outline:
- points:
  - 'Парадокс: Як філософ і літературний критик, а не політик чи воїн, став моральним компасом для цілої нації в найтемніші
    часи?'
  - Його зброєю було слово, а полем бою — сумління. Що робить таку зброю сильнішою за танки?
  - '[!biography]'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська влада бачила в ньому «буржуазного націоналіста». Західні правозахисники — «борця за права людини».
    Сам Сверстюк наполягав на захисті «елементарної порядності». Чи були ці позиції сумісними?'
  - 'Дебат 2: Чи був його спротив політичним? Одні кажуть, що ухиляння від політики було формою деколонізації. Інші — що будь-який
    спротив у тоталітарній державі є політичним апріорі.'
  - '[!epistemic-humility] Визнання, що його спадщина інтерпретується по-різному: як християнська, як національна, як ліберально-демократична.'
  - '[!decolonization] Протиставлення радянської спроби звести його до «антирадянщини» та українського розуміння його як творця
    «духовної вертикалі нації».'
  section: 'Конфліктна карта: Борець за націю чи за людину?'
  words: 900
- points:
  - Народження на Волині — регіоні з сильною традицією опору. Як це сформувало його характер?
  - Селянська родина як джерело «здорового глузду» та моральних абсолютів.
  - 'Навчання у Львові та Києві: контраст між західноукраїнською інтелектуальною традицією та радянською столицею.'
  - 'Формування філософського світогляду: від психології до екзистенціалізму та християнської етики.'
  section: 'Формування: Коріння волинської стійкості'
  words: 1000
- points:
  - «Собор у риштованні» — аналітичний подвиг. Захист роману Олеся Гончара як маніфест проти русифікації та духовного занепаду.
  - 'Лідерство у правозахисному русі: неформальний центр, до якого тягнулися Чорновіл, Стус, Дзюба.'
  - 'Самвидав як головний інструмент: поширення есеїв, критики, філософських роздумів в умовах тотальної цензури.'
  - 'Ключові тексти цього періоду: аналіз його ідей про «малі світи», «блудних синів» та «духовну вертикаль».'
  section: 'Діяльність: Інтелектуальне лідерство шістдесятників'
  words: 1300
- points:
  - '[!anti-hagiography] Ціна, яку заплатила його родина за його непоступливість. Екзистенційна дилема між особистим обов''язком
    та громадським служінням.'
  - 'Межі впливу: Чи міг «моральний авторитет» реально змінити систему, чи його роль була лише у збереженні гідності для небагатьох?'
  - 'Критика з боку радикальніших дисидентів: чи не був його підхід «занадто інтелігентським» та відірваним від народу?'
  - '[!myth-buster] Сверстюк не був політиком і не прагнув влади. Розвінчання міфу про «дисидентів, що рвалися до влади» на
    його прикладі.'
  section: 'Тінь: Ціна морального абсолютизму'
  words: 900
- points:
  - 'Повернення до парадоксу розминки: студент тепер може пояснити, як слово стає зброєю, а совість — силою.'
  - 'Його діяльність у незалежній Україні: журнал «Наша віра», роль морального голосу під час Помаранчевої революції та Революції
    Гідності.'
  - 'Деколонізація моральних орієнтирів: Сверстюк як доказ того, що Україна має власні, не імпортовані, джерела моральної
    сили.'
  - '[!decolonization] Чи є його спадщина повністю засвоєною? Дискусія про роль інтелектуалів та моральних авторитетів у сучасному
    українському суспільстві.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Yevhen Sverstiuk as a moral authority, the role of philosophy and Christian ethics in the Sixtiers dissident movement,
  and the concept of conscience in times of oppression.
