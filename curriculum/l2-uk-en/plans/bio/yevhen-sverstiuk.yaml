objectives:
- Аналізувати життя та спадщину Євгена Сверстюка як втілення морального авторитету
- Оцінювати роль філософської думки та християнської етики в ненасильницькому опорі тоталітаризму
- Простежити траєкторію від інтелектуала до дисидента та морального компаса нації
- Критично осмислювати поняття «совісті», «гідності» та «непоступливості» в контексті національно-визвольної боротьби
