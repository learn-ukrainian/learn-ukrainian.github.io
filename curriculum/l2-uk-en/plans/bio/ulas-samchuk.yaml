content_outline:
- points:
  - >-
    [!biography] Улас Самчук: волинський письменник, журналіст, публіцист,
    організатор МУРу, діяч діаспори і автор прози про Україну, яку він
    більшу частину життя не міг мати як безпечний дім.
  - >-
    Провокаційне питання: як читати автора `Марії` і `Волині`, якщо його
    біографія одночасно містить Голодоморне свідчення, окупаційну пресу,
    політичні зв’язки, табори переміщених осіб і канадське вигнання?
  section: Розминка
  words: 400
- points:
  - >-
    Дермань, Кременець, польське військо, Вроцлав і Український вільний
    університет у Празі: молодий Самчук формується між Волинню, міжвоєнними
    кордонами і європейською освітою без завершеного університетського ступеня.
  - >-
    Мовна й політична мобільність: польська, чеська, німецька, французька та
    інші мови в його біографії є ресурсом письменника в еміграції, а не знаком
    відмови від українськості.
  - >-
    [!epistemic-humility] Дату народження подаємо як 20 лютого 1905 року з
    усвідомленням старого і нового стилю; повітові назви в джерелах також
    можуть різнитися.
  section: 'Формування: Волинь, Прага і кордони молодості'
  words: 1000
- points:
  - >-
    `Волинь` як романна хроніка простору, селянського життя, самоосвіти і
    питання, де молода українська людина бачить Україну у світі.
  - >-
    `Марія` 1934 року: інституційні джерела описують її як перший український
    художній твір про насильницьку колективізацію і Голодомор; формулу
    "перший" подаємо з атрибуцією.
  - >-
    Карпатська Україна, угорське ув’язнення у таборі Варюлапош, повернення з
    похідною групою ОУН(м), редакторство `Волині` в Рівному і подальший відхід
    на Захід як вузли воєнної біографії.
  - >-
    МУР, табори переміщених осіб, Канада, `Слово`, комітет пам’ятника
    Шевченкові і культурні структури УНР в екзилі: література стає
    інституційною роботою діаспори.
  section: 'Діяльність: Волинь, Марія, МУР і діаспорні інституції'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Самчук не може бути лише "літописцем Волині" або
    "українським Гомером": такі рецепційні формули приховують складність
    політичних зв’язків, воєнної журналістики і морального контексту.
  - >-
    Окупаційна легальна преса під нацистською владою мусила діяти в межах
    риторики Третього Райху, зокрема антиєврейської; модуль має називати цю
    проблему прямо і перевіряти тексти, а не виправдовувати або спрощувати.
  - >-
    [!myth-buster] Не вигадуємо радянський арешт НКВД, МГБ чи КГБ: тискова
    історія Самчука — це вигнання, цензура, окупаційні обмеження, табори Ді-Пі,
    радянське замовчування і неможливість повернення.
  - >-
    Нобелівська риторика потребує обережності: джерела говорять про висунення
    кандидатури, але це не те саме, що перевірений офіційний короткий список.
  section: 'Тінь: Окупаційна преса, організаційні зв’язки і неможливе повернення'
  words: 1600
- points:
  - >-
    Учні зіставляють `Марію`, МУР і газетний контекст: як письменник називає
    страждання, як організовує середовище і які питання залишаються
    неприємними для пам’яті.
  - >-
    Самчук дає мову для Волині, Голодомору, Карпатської України, таборів
    переміщених осіб і канадської діаспори; ця широта потребує точної
    хронології й моральної дисципліни.
  - >-
    Сучасне значення: повернення Самчука після радянського замовчування має
    бути не культом, а зрілим читанням автора, чия проза і біографія одночасно
    потрібні й незручні.
  section: 'Підсумок: Свідчення без культу'
  words: 1000
focus: >-
