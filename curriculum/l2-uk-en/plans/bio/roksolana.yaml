content_outline:
- points:
  - 'Парадокс: як рабиня з Рутенії змогла стати найвпливовішою жінкою в історії Османської імперії, порушивши вікові традиції
    ісламського двору?'
  - 'Проблема джерел: чи можемо ми відділити історичну Хюррем Султан від легендарної Роксолани, створеної європейськими послами
    та пізнішими міфами?'
  - '[!biography] Представлення ключових фігур: Сулейман Пишний, Хюррем Султан (Роксолана), і контекст "золотого віку" Османської
    імперії.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (сучасники): Для європейських дипломатів — хитра інтриганка, що околдувала султана. Для османських еліт — порушниця
    традицій, що просувала своїх синів. Чи були ці оцінки об''єктивними?'
  - 'Дебат 2 (пам''ять): Для Туреччини — могутня Хасекі, але й причина "псування" династії. Для України — національна героїня,
    що не забула свою батьківщину. Як сучасні серіали (Величне століття) формують її образ?'
  - '[!epistemic-humility] Визнання, що наші знання базуються на упереджених звітах її політичних суперників та заздрісників.
    Її власний голос майже не зберігся.'
  - '[!decolonization] Розгляд Роксолани не як екзотичної фігури з гарему, а як активного політичного гравця на європейській
    арені.'
  section: 'Конфліктна карта: Жертва, Маніпулятор чи Політик?'
  words: 900
- points:
  - 'Світ, з якого вона прийшла: Рогатин, русинська шляхта, постійна загроза татарських набігів.'
  - 'Травма полону: викрадення, ринок рабів у Кафі, довгий шлях до Стамбула. Які риси характеру формує такий досвід?'
  - 'Виживання в гаремі: жорстока конкуренція, ієрархія, вивчення мов, ісламу та придворного етикету як інструменти для виживання.'
  - 'Перетворення: як невідома рабиня стає "Хюррем" ("Веселою"), привертаючи увагу наймогутнішого монарха світу.'
  section: 'Формування: Від Насті Лісовської до Хюррем'
  words: 1000
- points:
  - 'Революція в гаремі: від простої наложниці до улюбленої фаворитки (Хасекі), а потім — до законної дружини. Безпрецедентний
    крок, що зламав 200-річну традицію.'
  - 'Народження спадкоємців та утвердження влади: як материнство стало її головним політичним капіталом.'
  - 'Роксолана як радниця: Сулейман довіряв їй у державних справах, вона стала його головним політичним партнером.'
  - 'Міжнародна дипломатія: аналіз її листів до польського короля Сигізмунда II Августа та інших монархів.'
  section: 'Діяльність: Створення «Жіночого Султанату»'
  words: 1300
- points:
  - '[!anti-hagiography] Центральна моральна дилема: її роль у страті Ібрагіма-паші (найближчого друга султана) та шехзаде
    Мустафи (талановитого спадкоємця престолу).'
  - 'Інтриги та альянси: як вона будувала свою фракцію при дворі, усуваючи суперників і просуваючи своїх людей (напр., Рустема-пашу).'
  - '[!myth-buster] Чи справді вона була єдиною винуватицею смерті Мустафи? Аналіз ролі самого Сулеймана та політичної боротьби
    в імперії.'
  - 'Оцінка критиків: чи були її дії продиктовані лише материнським інстинктом захисту своїх синів, чи ненаситною жагою до
    влади?'
  section: 'Тінь: Ціна влади'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання, ким була Роксолана, використовуючи докази з модуля.'
  - 'Архітектурна спадщина: її благодійні комплекси (вакфи) в Стамбулі, Єрусалимі, Мецці — як інструмент м''якої сили та увічнення
    пам''яті.'
  - '[!decolonization] Переоцінка її "українськості": чи зберегла вона зв''язок із батьківщиною, чи повністю асимілювалася
    в османську еліту?'
  - 'Довготривалий вплив: Роксолана започаткувала "Жіночий султанат" — період, коли жінки гарему мали величезний політичний
    вплив, що тривав понад століття.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Biography of Roksolana, the phenomenon of the "Women's Sultanate", 16th-century diplomacy and epistolary style, social
  mobility in the Ottoman Empire, and the complex interplay of power, intrigue, and legacy.
level: BIO
module: bio-014
objectives:
- Критично аналізувати біографію Роксолани, розрізняючи історичні факти та міфологічні нашарування.
- Дослідити феномен 'Жіночого султанату' та роль жінок в османській політиці.
- Інтерпретувати дії історичної особи в контексті її епохи, уникаючи сучасних упереджень.
- Аналізувати дипломатичну лексику та епістолярний стиль XVI століття на прикладі листів Роксолани.
