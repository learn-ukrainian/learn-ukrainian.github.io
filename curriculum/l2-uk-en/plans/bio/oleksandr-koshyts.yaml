content_outline:
- points:
  - >-
    [!biography] Знайомство з Олександром Кошицем: видатний хоровий диригент,
    композитор, етнограф та культурний дипломат часів УНР.
  - >-
    Провокаційне питання: як один хоровий колектив міг замінити собою ціле
    міністерство закордонних справ у доведенні існування української нації?
  section: Розминка
  words: 400
- points:
  - >-
    Сім'я та освіта: з священицької родини; навчання в Богуславській духовній школі,
    Київській духовній семінарії та Київській духовній академії; музична освіта в
    школі Миколи Лисенка.
  - >-
    Ранній період: збирання хорової фольклорної спадщини на Кубані (1903–1905),
    аранжування народних пісень для хорового виконання.
  - >-
    [!decolonization] Театральний етап: керування хором у театрі Миколи Садовського
    (1912–1916) — професійне поєднання сценічного мистецтва, етнографії та хорової традиції.
  section: 'Формування: Богословська освіта та театральний період'
  words: 1000
- points:
  - >-
    [!decolonization] Закон УНР від 24 січня 1919 року: створення Української
    Республіканської Капели для демонстрації європейському світу української культури
    як незалежної від російської.
  - >-
    "показувати світу надзвичайну красу нашої пісні" — культурно-дипломатичний
    сенс місії Капели з мемуарів *З піснею через світ*.
  - >-
    Тріумф "Щедрика": виконання твору Миколи Леонтовича за кордоном під керівництвом
    Кошиця, світове турне 1919–1920 як форма боротьби за суб'єктність.
  - >-
    [!anti-hagiography] Розділення джерел: закон УНР показує державний намір, мемуари —
    внутрішній досвід, рецензії — сприйняття в різних європейських контекстах.
  section: 'Діяльність: Від театру до Української Республіканської Капели'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Поразка Української Революції означала неможливість безпечного
    повернення до Києва. Капела опинилася у стані вимушеної політичної еміграції.
  - >-
    Радянська влада не порушувала публічної "кримінальної справи", але повністю
    стерла спадщину УНР: українська хорова музика в СРСР була зведена до "регіонального фольклору".
  - >-
    [!epistemic-humility] Складнощі турне: рецепція в європейському та американському
    расовому й колоніальному контексті потребує критичного дослідження без зайвого тріумфалізму.
  - >-
    Діаспорний етап: п'ять літургій і близько 100 духовних творів (1930–1938),
    смерть у Вінніпезі, Канада, 1944 року — без можливості повернутися на Батьківщину.
  section: 'Тінь: Вимушена еміграція та радянське стирання'
  words: 1600
- points:
  - >-
    Мемуаристика як сховище пам'яті: "З піснею через світ" (1952) — збереження історії
    про державну дипломатію УНР, яку не могли видати в УРСР.
  - >-
    Духовна музика в діаспорі: написання літургій та збереження української церковної
    традиції.
  - >-
    Підсумкове значення Кошиця: людина, чий голос презентував Україну світові у
    найкритичніший історичний момент.
  section: 'Підсумок: З піснею через світ'
  words: 1000
focus: >-
  Олександр Кошиць як архітектор культурної дипломатії УНР, керівник Української
  Республіканської Капели та символ вимушеної еміграції. Аналіз його ролі у світовому
  визнанні української хорової музики на тлі радянського стирання спадщини УНР.
