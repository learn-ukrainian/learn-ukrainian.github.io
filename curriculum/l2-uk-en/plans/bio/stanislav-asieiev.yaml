  - >-
    [!biography] Знайомство зі Станіславом Асєєвим: український письменник та
    журналіст з Донецька, автор репортажів з окупованого міста.
  - >-
    Провокаційне питання: чому робота журналіста всередині окупованої території
    становить найбільшу загрозу для окупаційної влади?
  section: Розминка
  words: 400
- points:
  - >-
    Життя в окупації: рішення Асєєва залишитися в Донецьку після 2014 року.
    Написання репортажів під псевдонімом Станіслав Васін для українських видань.
  - >-
    [!decolonization] Фіксація реальності: документування рутини, страху та
    обмежень свободи слова. Асєєв як місцевий свідок, що пояснює окупацію
    зсередини, руйнуючи стереотипи про Донбас.
  section: 'Діяльність: Репортажі з окупованого міста'
  words: 1000
- points:
  - >-
    Механізм репресій: викрадення журналіста у 2017 році. Утримання в підвалах
    МГБ та переведення до таємної катівні "Ізоляція" на вулиці Світлий Шлях.
  - >-
    Сфабриковані звинувачення та примус: тортури як інструмент створення
    так званих доказів та фальшивих зізнань для окупаційного суду.
  - >-
    [!anti-hagiography] Виживання через пам'ять: запам'ятовування тексту
    майбутньої книги під час ув'язнення як форма інтелектуального опору.
  section: 'Полон: Сфабрикована справа та виживання'
  words: 1400
- points:
  - >-
    Звільнення: обмін у грудні 2019 року та перехід від статусу зниклого
