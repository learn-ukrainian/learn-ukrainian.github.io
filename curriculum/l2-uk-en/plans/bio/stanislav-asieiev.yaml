content_outline:
- points:
  - >-
    [!biography] Станіслав Асєєв — український письменник та журналіст із Донецька, член PEN Ukraine.
    Автор книг "В ізоляції" та "Світлий шлях".
  - >-
    На відміну від погляду ззовні, Асєєв документував життя в окупації зсередини, залишаючись
    у своєму рідному місті, поки не став мішенню російських спецслужб.
  section: Розминка
  words: 400
- points:
  - >-
    Життя в Донецьку до та після 2014 року: філософська освіта, робота та свідомий вибір
    залишитися після початку російської окупації.
  - >-
    Репортажі під псевдонімом "Станіслав Васін" для українських медіа: фіксація побуту,
    страху, компромісів та руйнування громадянського суспільства.
  - >-
    [!decolonization] Розвінчання стереотипів про Донбас: Асєєв є голосом місцевого
    українського спротиву, а не пасивним спостерігачем чи аутсайдером.
  section: 'Діяльність: Репортажі з окупованого Донецька'
  words: 1000
- points:
  - >-
    Викрадення у травні-червні 2017 року окупаційною владою (так званим "МГБ ДНР").
    Перетворення на бранця таємної катівні.
  - >-
    [!myth-buster] "Ізоляція" (колишній мистецький фонд на вулиці Світлий Шлях) як секретна
    тюрма. Це не просто місце утримання, а індикатор усього окупаційного режиму.
  - >-
    Механізм примусу: тортури, вибивання зізнань та сфабрикований "вирок" окупаційного
    суду на 15 років. 962 дні полону до звільнення у грудні 2019 року.
  section: 'Тінь "Ізоляції": Механізм терору'
  words: 1600
- points:
  - >-
    Аналіз роботи пам'яті: виживання через запам'ятовування та подальшу реконструкцію
    тексту, що став книгою "Світлий шлях: історія одного концтабору".
  - >-
    Відмова від емоційного видовища: документальний, філософський регістр тексту.
    Тортури описані без сенсаційності, щоб зосередити увагу на відповідальності злочинців.
  - >-
    Перехід від свідка до правозахисника: міжнародні виступи про українських політв'язнів,
    сприяння ідентифікації катів.
  section: 'Творчість у полоні та після звільнення'
  words: 1200
- points:
  - >-
    Здобуття Шевченківської премії (за "В ізоляції"). Значення перекладу "The Torture Camp
    on Paradise Street" для англомовного світу.
  - >-
    [!anti-hagiography] Асєєв повертається до війська у 2024 році — продовження боротьби
    не лише словом, а й зі зброєю.
  - >-
    Підсумок: тексти Асєєва є фундаментальним архівом російських злочинів і доказом
    того, як письмо стає формою правосуддя.
  section: 'Підсумок: Свідчення як форма помсти'
  words: 1000
