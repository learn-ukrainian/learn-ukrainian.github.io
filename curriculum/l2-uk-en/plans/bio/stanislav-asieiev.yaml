  - >-
    Провокаційне питання: чому журналістська робота зсередини окупованої території стала
    найнебезпечнішим актом громадянського спротиву?
  section: Розминка
  words: 400
- points:
  - >-
    Робота під псевдонімом Станіслав Васін: документування життя окупованого Донецька з
    2015 до 2017 року для українських медіа.
  - >-
    [!decolonization] Розвіювання стереотипів: Асєєв показує Донецьк не як абстрактну
    "проросійську" територію, а як українське місто під жорстокою окупацією.
  - >-
    Фіксація рутини, компромісів, страху та обмежень свободи слова як перші докази
    окупаційного режиму.
  section: 'Репортажі: Життя під окупацією'
  words: 1000
- points:
  - >-
    Викрадення у травні-червні 2017 року: як спостереження перетворилося на докази,
    а журналіст став мішенню російських окупаційних спецслужб.
  - >-
    Утримання в "Ізоляції" — колишньому мистецькому фонді, перетвореному на катівню
