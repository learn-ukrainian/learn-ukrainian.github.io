subtitle: A Journalist and Writer Documenting Occupation, Captivity, and Return
focus: >-
  Журналістська й письменницька праця Станіслава Асєєва, його свідчення про
  незаконне ув'язнення в окупованому Донецьку, звільнення 2019 року та
  датовані повідомлення про військову службу і поранення у 2024 році.
content_outline:
  - section: Джерела, жанри й межі тверджень
    words: 5200
    points:
      - Відрізнення профілю, авторського інтерв'ю, видавничого опису та судового повідомлення.
      - Атрибуція відомостей про полон, катування, звільнення, службу й поранення конкретним джерелам.
      - Читання свідчення без перетворення особистої пам'яті на необмежене узагальнення.
