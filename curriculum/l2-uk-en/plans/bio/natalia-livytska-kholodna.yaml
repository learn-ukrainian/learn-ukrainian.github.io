objectives:
- Простежити життєвий шлях Наталі Лівицької-Холодної через Тарнув, Подєбради, Варшаву, табори для переміщених осіб у Німеччині, США й Канаду.
- Аналізувати її інтимну «камерну» лірику, цикл «Червоне й чорне» та роль у варшавській літературній групі «Танк».
- Відрізняти перевірений досвід еміграції та діаспорної інфраструктури від непідтверджених тверджень про персональну радянську заборону.
- Критично оцінювати рецепційні ярлики, починаючи з її власних текстів, видань і перекладацької праці.
