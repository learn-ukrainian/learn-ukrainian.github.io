content_outline:
- points:
  - '[!biography] Знайомство з Наталею Лівицькою-Холодною: поетка, перекладачка, громадська діячка й учасниця празького та варшавського літературних середовищ, яка прожила 102 роки.'
  - 'Провокаційне питання: як поєднати інтимну лірику, еміграційний досвід і громадську працю, не підміняючи їх однією легендою?'
  section: Розминка
  words: 400
- points:
  - 'Походження: народження 15 червня 1902 року в Гельмязеві, нині Золотоніського району Черкаської області; дочка Андрія та Марії, сестра Миколи Лівицьких, дружина Петра Холодного.'
  - 'Освіта: від 1920 року еміграція через Тарнув; від 1922 року Подєбради, завершення Карлового університету в Празі та переїзд до Варшави 1927 року.'
  - '[!decolonization] Еміграцію простежити через названі в ЕСУ міста, навчання і видання, не приписуючи кожному переїзду непідтверджений особистий мотив.'
  section: 'Формування: Донька УНР у вигнанні'
  words: 1000
- points:
  - 'Празьке коло: у Празі Лівицька-Холодна близька до кола Празької школи (зокрема до Юрія Дарагана й Євгена Маланюка).'
  - 'Група «Танк»: у Варшаві вона — співзасновниця літературно-мистецького об’єднання «Танк» 1929 року.'
  - 'Лірика: збірки «Вогонь і попіл» (Варшава, 1934) і «Сім літер» (1937); ЕСУ описує сильний тематичний вплив французького символізму, романтичну образність, традиційну символіку й тугу за рідним краєм.'
  - 'Зрілість: «Шлях велетня» (1955) про Тараса Шевченка, «Поезії старі і нові» (1986), переклади з французької та італійської, а також спогади про поетів празького й варшавського середовищ.'
  section: 'Діяльність: «Червоне й чорне» та група «Танк»'
  words: 1200
- points:
  - '[!anti-hagiography] Під час Другої світової війни Лівицька-Холодна перебувала в таборах для переміщених осіб у Німеччині; від 1950 року жила у США, згодом у Канаді.'
  - 'Громадська праця: у США була членкинею управи Союзу українок Америки; еміграційна культура трималася на книжках, часописах і таких інституціях.'
  - '[!epistemic-humility] Позначити межу доказів: використані джерела не встановлюють формальної радянської заборони саме для неї чи «подвійну анафему» її лірики; не вигадувати такий механізм.'
  - '[!myth-buster] Порівняння з іншою поеткою подати як критичну формулу з автором і контекстом, а не як російський відповідник; «Червоне й чорне» не перетворювати на пізніше політичне гасло.'
  section: 'Тінь: війна, переміщення і діаспорні інституції'
  words: 1600
- points:
  - 'Доля спадщини: «Поезії старі і нові» вийшли в Нью-Йорку 1986 року; аналізувати історію доступу до текстів за конкретними виданнями й бібліографією.'
  - 'Лівицька-Холодна прожила 102 роки й померла 26 березня 2005 року в Торонто; не надавати їй непідтверджений титул «останнього» голосу школи.'
  - 'Сучасне значення: читати її як самостійну українську авторку через поезію, переклад, спогади й громадську працю в діаспорі.'
  section: 'Підсумок: Еміграційна спадщина без легенди'
  words: 1000
focus: >-
  Наталя Лівицька-Холодна як поетка, перекладачка й громадська діячка празького
  та варшавського середовищ: її лірика, група «Танк», досвід переміщення під
  час війни та діаспорні інституції без вигаданих механізмів цензури.
