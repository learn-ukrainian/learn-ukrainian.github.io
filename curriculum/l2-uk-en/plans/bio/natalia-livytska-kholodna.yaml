content_outline:
- points:
  - '[!biography] Знайомство з Наталею Лівицькою-Холодною: поетка, перекладачка, «остання з великого покоління» Празької школи й донька керівництва УНР у вигнанні, яка прожила 102 роки.'
  - 'Провокаційне питання: чому інтимна любовна лірика доньки президента була подвійно неприйнятною для радянської літератури?'
  section: Розминка
  words: 400
- points:
  - 'Походження: народження 15 червня 1902 року на хуторі Гельмязів на Полтавщині (нині Черкащина) у родині Андрія Лівицького — державного діяча УНР і згодом президента уряду УНР у вигнанні.'
  - 'Родина в політиці: брат Микола Лівицький також згодом очолив державу УНР у вигнанні; чоловік — художник Петро Холодний (молодший), син Петра Холодного-старшого, міністра освіти УНР та іконописця; донька Леоніда.'
  - 'Освіта: матура в Подєбрадах (1923), навчання в Карловому університеті в Празі та згодом філологія у Варшавському університеті.'
  - '[!decolonization] Після визвольних змагань 1917–1922 років родина опиняється в еміграції в Чехословаччині; 1927 року Наталя переїздить до Варшави.'
  section: 'Формування: Донька УНР у вигнанні'
  words: 1000
- points:
  - 'Празьке коло: у Празі Лівицька-Холодна близька до кола Празької школи (зокрема до Юрія Дарагана й Євгена Маланюка).'
  - 'Група «Танк»: у Варшаві вона — співорганізаторка літературної групи «Танк» разом із Юрієм Липою, Оленою Телігою та Юрієм Косачем.'
  - 'Лірика пристрасті: збірка «Вогонь і попіл» (Варшава, 1934) містить уславлений еротичний цикл «Червоне й чорне»; далі — «Сім літер» (1937); інтимна «камерна» лірика французько-символічного карбу з образом фатальної жінки.'
  - 'Зрілість і патріотика: пізніша творчість — «Шлях велетня» (1955) про Тараса Шевченка, оповідання «Я бачив Симона Петлюру» та «Розповідь про Крути» (1956); переклади Бодлера, Валері й Піранделло.'
  section: 'Діяльність: «Червоне й чорне» та група «Танк»'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм стирання: народжена в керівництві УНР, Лівицька-Холодна пішла у вигнання разом із втраченою державою й була під забороною в радянській Україні саме через те, ким вона була.'
  - 'Ім''я ворожої держави: прізвище Лівицьких було іменем суперницької української держави, яку СРСР найбільше потребував стерти; смертельну серйозність цієї ворожнечі засвідчує вбивство Симона Петлюри 1926 року — голови УНР, якого в екзилі заступив її батько.'
  - 'Подвійна анафема: її лірика була неприйнятною і формально (французько-символічна, «декадентська»), і біографічно (донька президента); вигнання пролягло через Чехословаччину, Польщу, Німеччину (Оффенбах, Майнц-Кастель, Еттлінген) і з 1950 року — США.'
  - '[!epistemic-humility] [!myth-buster] Ярлик «української Ахматової», що його дав Маланюк, — спорідненість мотиву, а не російський відповідник; «Червоне й чорне» читаємо як стендалівсько-символічну барву, а не як пізніше політичне гасло.'
  section: 'Тінь: Стерта донька суперницької держави'
  words: 1600
- points:
  - 'Доля спадщини: три збірки та проза вціліли в діаспорі й зібрані в книжці «Поезії старі і нові» (Нью-Йорк, 1986); в УРСР авторка залишалася недрукованою до самого кінця радянської доби.'
  - 'Найдовше життя школи: Лівицька-Холодна прожила 102 роки — найдовговічніший голос Празької школи й живий міст від УНР до незалежної України; померла 28 квітня 2005 року в Торонто.'
  - 'Сучасне значення: повернення поетки відновлює еміграційно-державну лінію, яку СРСР намагався стерти.'
  section: 'Підсумок: Жива ланка від УНР до незалежності'
  words: 1000
focus: Наталя Лівицька-Холодна — «остання з великого покоління» Празької школи, донька й сестра президентів УНР у вигнанні. Аналіз її інтимної «червоно-чорної» лірики та групи «Танк», а також механізму радянського стирання родини суперницької української держави — поетки, яка прожила 102 роки живим мостом від УНР до незалежності.
level: BIO
module: bio-229
objectives:
- Простежити життєвий шлях Наталі Лівицької-Холодної — від родини керівництва УНР у вигнанні до 102-річного життя в діаспорі через Чехословаччину, Польщу, Німеччину, США й Канаду.
- Аналізувати її інтимну «камерну» лірику, цикл «Червоне й чорне» та роль у варшавській літературній групі «Танк».
- Пояснювати механізм радянського стирання доньки президента УНР у вигнанні — і формально (символізм як «декаданс»), і біографічно.
- Критично оцінювати ярлик «української Ахматової» як спорідненість мотиву, а не російський відповідник, та повертати її власний голос.
