content_outline:
- points:
  - >-
    [!biography] Знайомство з Олександром Олесем (Кандиба Олександр Іванович):
    поет-символіст, драматург, автор дитячої та історичної лірики, батько
    Олега Ольжича.
  - >-
    Провокаційне питання: як поет, що співав «відродження країни» (1907), опинився в 25-річній еміграції, стертий з радянських підручників?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 5 грудня 1878 року (23 листопада за старим стилем) у Білопіллі
    на Сумщині; освіта в Харківському ветеринарному інституті, робота
    ветеринаром у земстві.
  - >-
    Дебют *З журбою радість обнялась* (1907) — миттєве визнання символістського
    покоління; ранній мотив «Яка краса: відродження країни!»
  - >-
    Поезія «О слово рідне! Орле скутий!..» (1906) — мова як «скутий орел»,
    антирусифікаційний підтекст.
  section: 'Формування: Ветеринар, символіст, голос відродження'
  words: 1000
- points:
  - >-
    Збірки *Поезії* (1909, 1917, 1931), *Твори* (1910); драматичні етюди *По дорозі в Казку*, *Над Дніпром* (1911).
  - >-
    1917 — ейфорія Української революції; 1919 — вимушена еміграція після
    більшовицького знищення УНР: спочатку Будапешт, потім Відень.
  - >-
    У Відні — журнал «На переломі», очолення Союзу українських журналістів і письменників на чужині.
  - >-
    З 1924 — Прага як база; *Чужиною* (1919), *Княжа Україна* (1921–1922),
    *Минуле України в піснях* (1930, Прага); сатирична думка Павлові Тичині
    (1928): «І ти продався їм, Тичино…».
  - >-
    Композитори Микола Лисенко, Кирило Стеценко та Яків Степовий покладали на
    музику лірики Олеся — вони увійшли в народний співочий репертуар.
  section: 'Діяльність: Від «З журбою радість обнялась» до «Чужиною»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Головний механізм репресії — не арешт, а вимушена еміграція 1919 року та радянське стирання імені з антологій, шкільних читанок і літературної історії до пізньорадянського потепління і повного повернення після 1991.
  - >-
    Більшовицька / радянська цензура (контроль типу Головліт): національного поета викресли з кола читачів власної нації.
  - >-
    Другий удар тоталітаризму: син Олег Ольжич — арешт гестапо, катування, смерть у Заксенгаузені 10 червня 1944; серцева недостатність поета в окупованій Празі 22 липня 1944, поховання на Ольшанському цвинтарі.
  - >-
    [!decolonization] Подавання еміграції як «особистого вибору» повторює радянське стирання; називати наслідком більшовицького знищення УНР.
  - >-
    [!epistemic-humility] Суперечка 2017 про перепоховання — питання пам'яті; VERIFY before prose use; не вирішена біографічна тема.
  section: 'Тінь: Радянське стирання та подвійний тоталітаризм'
  words: 1600
- points:
  - >-
    Що збереглася: символістський корпус до еміграції через діаспорні перевидання (Відень, Прага); що знищено — присутність у радянській Україні до повернення.
  - >-
    Зв'язок з bio-oleh-olzhych, bio-symon-petliura, lit-oles-oleksandr-liryka.
  - >-
    Сучасне значення: Олесь як поет «легкої» символістської мелодії та свідок першої хвилі еміграції, стиснутого між двома тоталітаризмами.
  section: 'Підсумок: Голос, стертий і повернений'
  words: 1000
focus: >-
  Олександр Олесь як символіст першої хвилі емігрантів: вимушена еміграція 1919 після знищення УНР, радянське стирання імені в УРСР, празька еміграція і сімейна трагедія 1944 року — між більшовицьким стиранням і згибеллю сина гестапо.
level: BIO
module: bio-221
objectives:
- >-
  Аналізувати символістську лірику Олеся, зокрема «Яка краса: відродження країни!» та «О слово рідне! Орле скутий!..»
- >-
  Пояснювати механізм вимушеної еміграції 1919 року як наслідок більшовицького знищення УНР, а не «нейтрального» особистого рішення.
- >-
  Досліджувати радянське стирання емігрантської традиції з канону до повного повернення після 1991 року.
- >-
  Оцінювати подвійний удар тоталітаризму 1944 року — згибель Олега Ольжича гестапо та смерть поета в окупованій Празі.
