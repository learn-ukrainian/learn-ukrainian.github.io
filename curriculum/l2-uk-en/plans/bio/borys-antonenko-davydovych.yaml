- section: Розминка
  words: 400
  points:
  - '[!biography] Антоненко-Давидович (1899–1984).'
  - Чому його зводять лише до «Як ми говоримо»?
- section: 'Формування: Проза 1920-х'
  words: 1000
  points:
  - «Смерть» (1928), «Землею українською» (1930).
  - '[!decolonization] «зоологічний націоналізм» — лише радянське звинувачення.'
- section: 'Діяльність: «Як ми говоримо»'
  words: 1200
  points:
  - «Боротьба за чистоту й високу мовну культуру...»
  - «Двері відчиняються водієм» — калька.
  - '[!epistemic-humility] Радянські ярлики — доказ репресій.'
- section: 'Тінь: Табір і заслання'
  words: 1600
  points:
  - '[!anti-hagiography] Арешт 1935 р.; повторне заслання 1951 р.'
  - Чорний список 1970 р.
  - '[!myth-buster] Номер справи не знайдено.'
- section: 'Підсумок: Спадщина'
  words: 1000
  points:
  - «Сибірські новели» (1989).
  - '[!decolonization] Мова як громадянська практика.'
