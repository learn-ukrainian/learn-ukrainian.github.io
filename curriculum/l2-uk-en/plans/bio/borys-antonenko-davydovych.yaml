objectives:
- Аналізувати повість «Смерть» як художній твір, не використовуючи її замість біографічного документа.
- Пояснювати послідовність арешту, двох вироків, довічного заслання, реабілітації й пізньої ізоляції.
- Відрізняти назву й дату мовної праці від неперевіреної дослівної цитати.
- Розпізнавати радянські звинувачення як мову переслідування, а не нейтральну аналітичну лексику.
