content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Борис Антоненко-Давидович (1899–1984): прозаїк, публіцист, перекладач і мовознавець.'
  - Чому повість «Смерть», мовна праця й табірна біографія потребують різних типів джерел?
- section: 'Формування: Проза 1920-х'
  words: 1000
  points:
  - Повість «Смерть» (1928) і репортажна книжка «Землею українською» (1930) в літературному полі МАРСу.
  - '[!decolonization] Формула «зоологічний націоналізм» належить мові радянського переслідування.'
- section: 'Діяльність: Повернення до письма й мовна праця'
  words: 1200
  points:
  - Реабілітація 1956 року, повернення до Києва 1957 року та поновлення літературної праці.
  - >-
    ЕСУ фіксує назву й 1970 рік праці «Як ми говоримо», але пакет не містить повного тексту зі
    стабільним локатором; дослівних висловів авторові не приписувати.
  - >-
    [!epistemic-humility] Енциклопедія, бібліографічний запис і художній твір відповідають на різні
    питання та не замінюють одне одного.
- section: 'Тінь: Табір і заслання'
  words: 1600
  points:
  - >-
    [!anti-hagiography] Арешт 1935 року і десятирічний табірний вирок; 1937 року — додаткові
    десять років неволі та п'ять років обмеження прав.
  - >-
    1951 року — довічне заслання без суду; від 1970 року — припинення друку й згадок у пресі,
    а не непідтверджений формальний «чорний список».
  - '[!myth-buster] Номер справи не встановлено; вирок 1935 року становив десять років таборів.'
- section: 'Підсумок: Спадщина'
  words: 1000
  points:
  - «Сибірські новели» (1989) як посмертне повернення табірної теми до друку.
  - '[!decolonization] Проза й мовна культура як різні частини авторської спадщини.'
focus: >-
  Борис Антоненко-Давидович — прозаїк, публіцист і дослідник культури української мови;
  фабриковані радянські справи, заслання та пізня мовна праця.
