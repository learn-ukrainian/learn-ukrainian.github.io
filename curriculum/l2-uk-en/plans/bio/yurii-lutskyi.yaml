content_outline:
- points:
  - 'Провокація: як ветеран британської армії, що викладав у Торонто, склав англомовну карту знищення української літератури 1920-1930-х років?'
  - '[!biography] Знайомство з літературознавцем, перекладачем, упорядником і будівничим інституцій: народжений 1919 року в Янчині (нині Іванівка), помер у Торонто 2001 року; в англомовному світі — George S. N. Luckyj.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (будівничий): його роль — упорядник, бібліограф і редактор: перший редактор «Canadian Slavonic Papers», англомовний редактор «Encyclopedia of Ukraine», співзасновницька праця в КІУС, десятки перекладів і видань.'
  - 'Позиція 2 (деколонізаційна): він оскаржував західну звичку читати українську літературу через русистику/радянологію; наукова об''єктивність була методом надання символічного капіталу, а не відстороненням.'
  - '[!decolonization] «Діаспора» — не ностальгія й не одна ідеологія: Берлін, Британія, Колумбія/УВАН, Саскачеван, Торонто, КІУС і мережі публікацій в Україні після 1991-го — це різні інституційні арени.'
  - '[!epistemic-humility] Ім''я: в англомовних працях він George S. N. Luckyj, а в проєкті — Юрій Луцький; дату смерті джерела подають по-різному (22 чи 29 листопада 2001 року) — розбіжність зберігаємо.'
  section: 'Конфліктна карта: «Голос діаспори» чи архітектор україністики?'
  words: 900
- points:
  - 'Родина: батько Остап Луцький (поет «Молодої музи», кооперативний і політичний діяч), рід Смаль-Стоцьких; мати Ірена Смаль-Стоцька.'
  - 'Розрив 1937-1939: Академічна гімназія Львова (1937), Берлінський університет (1937-1939), виїзд із Берліна перед війною за порадою батька — це рішення втримало його поза радянсько-окупованою Західною Україною.'
  - 'Родинна трагедія: за встановлення радянської влади батька Остапа заарештував НКВД (2 жовтня 1939 року), і він загинув в ув''язненні під Котласом (8 жовтня 1941 року) — це конкретне радянське насильство, що зробило еміграцію Юрія родинною історією.'
  - 'Британія й США: Бірмінгемський університет (BA 1942, MA 1943), служба в британській армії, докторат Колумбійського університету (1953).'
  section: 'Формування: Розрив 1937-1939 і родинна трагедія'
  words: 1000
- points:
  - 'Основа: «A Modern Ukrainian Grammar» (1949, зі Ярославом Рудницьким) і докторська, що стала «Literary Politics in the Soviet Ukraine, 1917-1934» (1956; перегляд 1990; український переклад 2000) — мапа політичного розгрому літературного життя.'
  - 'Повернення архіву: переклад «Stories from the Ukraine» Миколи Хвильового (1960), джерельні проєкти ВАПЛІТЕ («Ваплітянський збірник»), що повертали читачам модерністський архів 1920-х.'
  - 'Гоголь і Шевченко: «Between Gogol and Shevchenko» (1971; український переклад «Між Гоголем і Шевченком»); переклади Підмогильного, Куліша, Сверстюка, Коцюбинського; «Shevchenko and the Critics» (1980).'
  - 'Пізні праці: «Keeping a Record» (1987), «Самі про себе» (1989), «Towards an Intellectual History of Ukraine» (1996) та мемуарно-щоденникові видання «На перехресті» (1999), «На сторожі» (2000), «Роки сподівань і втрат» (2004).'
  section: 'Діяльність: Переклад, ВАПЛІТЕ й літературна політика'
  words: 1300
- points:
  - '[!anti-hagiography] Пам''ять лише про «перекладача» применшує його як упорядника, бібліографа, редактора й архітектора англомовної україністики; його наполягання на західній об''єктивності можна хибно прочитати як відстороненість від України.'
  - 'Гоголь/Гоголь: «Between Gogol and Shevchenko» і пізніша праця про Гоголя — це не просте «повернути Гоголя як українця», а культурна дилема входження українця в російський імперський літературний простір поряд із неминучою суб''єктністю Шевченка.'
  - '[!epistemic-humility] Багато сканів — лише зображення; довгих дослівних цитат не беремо без звірки з виданням, а дату смерті треба підтвердити архівом чи некрологом.'
  - 'Русоцентричне середовище: він оскаржував західну звичку підходити до українського письма через російські студії — але цю структуру називаємо без карикатури на всіх колег-славістів.'
  section: 'Тінь: Об''єктивність, Гоголь/Гоголь і межі пам''яті'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює, що Луцький захищав українську культуру не гаслами, а строгою науковою працею («не вузьколобою пропагандою, а справжньою науковою роботою» — джерельний слід через Одрехівську, 2024).'
  - 'Розрізнення: відділяємо радянську редукцію української літератури від патріотичного спрощення — обидва спотворюють.'
  - '[!decolonization] Українська література як повноцінна європейська література, а не відгалуження русистики; переклад і бібліографія як аргумент.'
  - 'Порівняння: з Юрієм Шевельовим — щодо еміграційної науки; з Іваном Лисяком-Рудницьким — щодо інтелектуальної історії й діаспорних інституцій.'
  section: 'Дискусія та підсумок: Наукова праця замість пропаганди'
  words: 700
focus: Yurii Lutskyi, known in English as George S. N. Luckyj (1919-2001), taught as a diaspora literary scholar, translator, editor, and institution-builder who made Ukrainian literature legible to English readers as a full European literature rather than a branch of Russian or Soviet studies; his pressure mechanism is exile and non-return plus the NKVD destruction of his family (father Ostap Lutskyi arrested 1939, died 1941) rather than a direct arrest of himself; the Gogol/Hohol problem is kept as an imperial literary-choice dilemma, the source-date discrepancy (22 vs 29 November 2001) stays visible, and his role is kept larger than translator.
level: BIO
module: bio-365
objectives:
- Пояснювати, як Луцький зробив українську літературу читомою англійською мовою як повноцінну європейську, а не відгалуження російських студій
- 'Розрізняти механізм тиску: невимушене неповернення й знищення родини НКВД (батько Остап Луцький), а не прямий арешт самого Юрія'
- Аналізувати проблему «Гоголь/Гоголь» як імперську літературну дилему вибору, а не етнічну суперечку про власність письменника
- 'Утримувати роль ширшою за «перекладач»: упорядник, бібліограф, редактор і будівничий інституцій україністики'
