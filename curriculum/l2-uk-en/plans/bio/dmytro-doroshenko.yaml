content_outline:
- points:
  - 'Провокація: як людина, що заснувала Центральну Раду й будувала дипломатію Української Держави, стала головним істориком української державності вже на еміграції — і чому її синтез дійшов до читачів у самій Україні лише через десятиліття?'
  - '[!biography] Знайомство з постаттю історика, публіциста й дипломата: співзасновник Центральної Ради, міністр закордонних справ Української Держави за Скоропадського (травень-листопад 1918 року), професор і перший президент УВАН.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (державницька школа): за IEU Дорошенко — перший, хто написав огляд української історії з погляду державності й національної еліти; ЕСУ називає його засновником і провідним представником державницької школи.'
  - 'Позиція 2 (тяглість, не заміна): державницьку школу подаємо поряд із народницькою — ЕСУ зазначає, що Дорошенко визнавав здобутки народницьких істориків, тож читаємо його разом із Грушевським, а не проти нього.'
  - '[!decolonization] Радянський ярлик «буржуазний націоналіст» уживаємо лише як механізм нападу й забуття, а не як опис; натомість називаємо конкретні архівні, інституційні й політичні факти.'
  - '[!epistemic-humility] Дату народження (27 березня / 8 квітня 1882 року) і рік переходу на еміграцію (ЕІУ: «від 1920»; IEU: 1919) подаємо як розбіжність джерел, а не як єдиний факт.'
  section: 'Конфліктна карта: Народник чи державник?'
  words: 900
- points:
  - 'Походження й освіта: 27 березня / 8 квітня 1882 року, Вільно (нині Вільнюс); з бічної гілки козацько-старшинського роду Дорошенків; навчання у Варшавському й Петербурзькому університетах, закінчив історико-філологічний факультет Київського університету 1909 року.'
  - 'Громадсько-пресова формація: голова Української студентської громади в Петербурзі (1903), праця в «Раді», «Дніпрових хвилях», «Літературно-науковому вістнику», Українському науковому товаристві, «Просвіті» та Катеринославській архівній комісії.'
  - '[!decolonization] Дореволюційну пресу й громадські мережі читаємо як інфраструктуру нації під імперським обмеженням, а не як «регіональну» культурну діяльність.'
  section: 'Формування: Громада, преса й Київський університет'
  words: 1000
- points:
  - '1917 рік: один із засновників Центральної Ради, її заступник голови 4-10 березня; комісар Тимчасового уряду для Галичини й Буковини; чернігівський губернський комісар.'
  - '1918 рік: міністр закордонних справ Української Держави за Скоропадського — за ЕСУ, будував центральну структуру міністерства, готував організаційно-правові акти для дипломатичних і консульських установ, домагався ратифікації Берестейського миру та українських етнічних територій.'
  - '[!anti-hagiography] Гетьманат залежав від німецької військової сили й був оскаржений соціалістичними та республіканськими українськими діячами; чесна формула — «державотворець у межах компромісного воєнного Гетьманату», а не «рятівник» чи «колаборант».'
  - 'Розрив із Центральною Радою: за ЕСУ й ЕІУ конфлікт 1917 року навколо того, чи залучати заможні верстви й стару адміністрацію до державотворення, — це стратегічна суперечка про спроможність держави, а не «антидемократизм».'
  - 'Відставка: Дорошенко пішов у відставку через маніфест Скоропадського про федерацію з небільшовицькою Росією — «федераліст» тут не є синонімом лояльності до Росії.'
  section: 'Діяльність: Центральна Рада, Гетьманат і дипломатія'
  words: 1300
- points:
  - '[!anti-hagiography] Механізм тиску — не страта й не ув''язнення, а крах української державності, вимушена еміграція й виключення з радянської України; за IEU він емігрував і не повернувся.'
  - 'Матеріальна втрата: за передмовою видання Інституту історії (2002), покидаючи Прагу 1945 року, він знову мусив залишити книжки, архіви, нотатки й рукописи — це наукова, а не побутова втрата.'
  - '[!decolonization] Празьку, берлінську, варшавську й вінніпезьку працю (УВУ, Український науковий інститут у Берліні, перше президентство в УВАН) читаємо як інституційну тяглість, а не як пасивну «загробну» еміграцію.'
  - '[!epistemic-humility] Англійський переклад «History of the Ukraine» уживає застаріле «the Ukraine» та давні транслітерації — це історичне джерело, а не взірець сучасної мови.'
  section: 'Тінь: Втрата держави, еміграція й архів'
  words: 900
- points:
  - 'Повернення до розминки: чому державницьку історіографію варто вчити як тяглість української думки, а не як просту заміну народницької школи?'
  - 'Головні праці як пам''ять: «Огляд української історіографії» (1923), «Мої спомини про недавнє-минуле», «Нарис історії України» та «Історія України. 1917-1923 рр.» — свідчення з контекстом; сам Дорошенко застерігав, що не претендує на вичерпне змалювання подій.'
  - '[!anti-hagiography] Центральність постаті не робить її одноосібним творцем; поряд — Грушевський, Липинський, Полонська-Василенко, Василенко.'
  - '[!decolonization] Імена-омоніми: Дмитра Дорошенка не змішуємо з гетьманами Петром і Михайлом Дорошенками та Петром Яковичем Дорошенком; прізвище — джерело плутанини в BIO/HIST.'
  section: 'Дискусія та підсумок: Держава, історіографія й пам''ять'
  words: 700
focus: 'Dmytro Doroshenko (1882-1951) as a statehood-school historian and practical diplomat: the Hromada and press formation before 1917, his Central Rada founding role and the Ukrainian State foreign ministry under Skoropadskyi held as ''state-builder within a compromised wartime Hetmanate'' rather than collaborator or savior, the statehood-versus-populist school debate kept beside Hrushevskyi, forced emigration and archive loss taught as the concrete pressure mechanism instead of execution, and the diaspora institutions (UVU, UVAN) read as institutional continuity, with the Petro/Mykhailo/Petro Yakovych Doroshenko name-collisions flagged and Soviet ''bourgeois nationalist'' labels shown only as attack.'
level: BIO
module: bio-351
objectives:
- Пояснювати Дорошенка як історика державницької школи й дипломата, чия громадсько-пресова формація до 1917 року передувала службі в Центральній Раді та Українській Державі.
- Тримати міністерство закордонних справ Української Держави як «державотворення в межах залежного воєнного Гетьманату», а не як «колаборацію» чи «однозначний порятунок».
- Розрізняти державницьку й народницьку історіографічні школи, ставлячи Дорошенка поряд із Грушевським, а не замість нього.
- 'Називати механізм тиску конкретно: втрата державності, вимушена еміграція, виключення з радянської України й утрата частини архіву — а не страта чи ув''язнення.'
- Відділяти Дмитра Дорошенка від гетьманів Петра й Михайла Дорошенків та Петра Яковича Дорошенка.
