      і автора державницької історії України
  - >-
      Пояснювати механізм довічного вигнання і радянського викреслення його праць
      до 1991 року
  - >-
      Чесно описувати гетьманську політичну лінію Дорошенка як справжню
      внутрішньоукраїнську дискусію доби
