content_outline:
  - annotations:
      - '[!biography]'
    points:
      - >-
          Провокація: чому міністр закордонних справ української держави помер у
          вигнанні в Мюнхені, а його книги повернулися в Україну лише 1992 року?
      - >-
          [!biography] Дмитро Дорошенко - історик, дипломат і державний діяч,
          міністр закордонних справ Української Держави і автор першого наукового
          огляду історії України як розвитку державності.
      - >-
          Походження: козацько-старшинський рід Глухівщини, з якого вийшли два
          гетьмани; навчання у Варшаві, Петербурзі, Києві, львівські курси
          Грушевського і Франка.
      - >-
          Ранній шлях: «Просвіта» на Катеринославщині, українська преса,
          громадська і політична праця до 1917 року.
    section: 'Формування: Рід, освіта і громадська праця'
    words: 1000
  - points:
      - >-
          Українська революція: член Центральної Ради, крайовий комісар
          Галичини й Буковини, губернський комісар Чернігівщини.
      - >-
          Дипломатія Української Держави: міністр закордонних справ 1918 року,
          відкриття представництв, ратифікація Берестейського миру.
      - >-
          Історик державності: «Нарис історії України» (1932-1933), «Історія
          України 1917-1923», «Огляд української історіографії».
      - >-
          [!decolonization] Дорошенко довів, що українська державність - не
          вигадка: це навчальний центр модуля проти імперського заперечення.
    section: 'Діяльність: Дипломатія і історія державності'
    words: 1300
  - annotations:
      - '[!anti-hagiography]'
    points:
      - >-
          Механізм репресії памʼяті: більшовицьке завоювання зробило Україну
          непридатною для життя; вигнання 1919 року - довічне.
      - >-
          Радянське викреслення: ярлик і заборона праць; «Нарис історії України»
          перевидано в Києві лише 1992 року.
      - >-
          [!anti-hagiography] Чесно про політику: гетьманська лінія і Союз
          хліборобів-державників з Липинським; розходження з Грушевським -
          справжня внутрішньоукраїнська дискусія, а не агіографія.
    section: 'Контекст: Вигнання, радянське викреслення і політика'
    words: 1000
  - points:
      - >-
          Наукова інституція в еміграції: Український вільний університет,
          Український науковий інститут у Берліні, Українська вільна академія наук.
      - >-
          Сучасна пам'ять: повернення праць після 1991 року, вулиці в Чернігові,
          Снігурівці, сквер в Одесі, меморіальна таблиця в Дніпрі.
      - >-
          Чому історія державності Дорошенка важлива для сучасної України.
    section: "Сучасна пам'ять: Повернення історика додому"
    words: 900
  - points:
      - >-
          Підсумкова дискусія: як дипломатія і історична наука разом обстоювали
          реальність української державності.
      - >-
          Аргументована відповідь: що робить Дорошенка важливим - дипломатія,
          історія державності, інституції еміграції чи стійкість у вигнанні.
      - >-
          Фінальне письмо: Дорошенко як приклад української державницької
          історіографії проти імперського заперечення.
    section: "Дискусія та підсумок: Державність як предмет історії"
    words: 800
focus: >-
  Dmytro Doroshenko as historian and diplomat of Ukrainian statehood: foreign
  minister of the 1918 Ukrainian State, founder of Prosvita in Katerynoslav,
  author of the first scholarly survey of Ukraine as the development of statehood,
  driven into lifelong emigration and banned in the USSR until 1991, taught with
  honest treatment of his hetmanite politics and a required HIST-alignment of the
  1917-1921 frame.
