- Критично розрізняти джерельні факти, ворожі ярлики й пізнішу імперську пам'ять про «дружбу» з Москвою
- Формулювати джерелочутливі судження про число загиблих, подаючи діапазони з покликанням на джерело, а не один шкільний факт
