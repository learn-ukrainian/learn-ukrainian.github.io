content_outline:
- points:
  - 'Провокація: досвідчений полковник, що допомагав будувати Гетьманщину за Хмельницького, за кілька років допоміг відкрити її першу громадянську війну. Як та сама людина опинилася по обидва боки — розбудови й розколу?'
  - '[!biography] Знайомство з постаттю, чия біографія — це не особиста сварка двох гетьманів, а історія полтавського полку, старшинських кривд і московського важеля на Лівобережжі.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (опозиція): для Пушкаря і його прибічників виступ проти Виговського — це відповідь на економічну блокаду Запорожжя, на «польський курс» після Гадяча й на кривди рядового козацтва та лівобережних громад.'
  - 'Позиція 2 (гетьманський уряд): для Виговського це заколот, що підважив легітимну владу, розколов Військо Запорозьке й відчинив двері московській інтервенції.'
  - '[!decolonization] Ключ не в тому, «хто правий», а в механізмі: Москва перетворила українську внутрішню незгоду на важіль проти самостійного курсу Виговського. Аналізуємо конфлікт через українські інтереси, а не через імперський ярлик «бунту» чи пізніший міф про «дружбу».'
  - '[!epistemic-humility] Особистих джерел від самого Пушкаря не збереглося; навіть рік його народження невідомий. Ми знаємо його через ЕІУ, IEU та реконструкцію Грушевського — тож поширену нижчоджерельну версію 1598/Овруч не подаємо як факт.'
  section: 'Конфліктна карта: Оборонець прав чи призвідця громадянської війни?'
  words: 900
- points:
  - 'Походження джерельно тонке: ЕІУ веде його від земянського роду Пушкарів-Ресинських на Любеччині (Сіверщина) й припускає раннє прилучення до козацтва — про особистий злам говоримо обережно.'
  - Улітку 1648 року очолив новостворений полтавський полк — лівобережну військово-адміністративну одиницю з центром у Полтаві. Це робить його біографію дослідженням регіональної влади, а не лише особистого суперництва.
  - 'Служба за Хмельницького: участь у битвах кінця 1640-х — початку 1650-х; за ЕІУ, під Берестечком тимчасово виконував обов''язки наказного гетьмана. Подаємо це як кризову функцію, а не сталу гетьманську владу.'
  - 'Дипломатія і фронт: у грудні 1653 року — у посольстві до Іслам-Ґірея III, у січні 1654-го — на переговорах із Бутурліним; у 1654–1655 роках керував обороною Брацлава й відзначився в Охматівській битві.'
  section: 'Формування: Полтавський полковник і старшина'
  words: 1000
- points:
  - 'Розворот 1657 року: після смерті Богдана Хмельницького Пушкар підтримав кандидатуру Виговського на елекції, а вже наприкінці року перейшов у табір опозиції — це і є той злам, що не дає малювати «вічно антивиговську» біографію.'
  - 'Коаліція й соціальна база: разом із кошовим Яковом Барабашем Пушкар спирався на полтавське, лубенське й миргородське полкове середовище та на частину зубожілого поспільства; водночас це рух зі старшинським і січовим проводом, а не проста «класова війна».'
  - 'Московський чинник: опозиція вела інтенсивні контакти з царським урядом, який давав їй моральну й політичну підтримку, щоб не дати Виговському самостійного курсу. Це інтервенція й важіль — але не доказ, що кожен прибічник був платним агентом.'
  - 'Ескалація і фінал: у лютому 1658 року Пушкар розбив під Полтавою загін Івана Богуна; наприкінці травня — початку червня Виговський із вірними полками та ордою Карач-бея завдав опозиції поразки в боях під Полтавою, де Пушкар і загинув 11 (1) червня 1658 року.'
  section: 'Діяльність: Повстання Пушкаря і Барабаша 1658 року'
  words: 1300
- points:
  - '[!anti-hagiography] Повстання й придушення обернулися масовим спустошенням і захопленням людей у ясир. Це не «чисте визволення» — примус, козацьку дію й насильство з обох боків треба показувати разом.'
  - '[!myth-buster] «Московський ставленик» — надто плаский ярлик: Пушкар мав реальну полтавську базу й місцеві кривди. Але й «оборонець прав» — надто чистий: його виступ пришвидшив громадянську війну, що зруйнувала молоду Гетьманщину.'
  - 'Число загиблих подаємо як діапазон із покликанням: IEU — 8–15 тисяч убитих і зруйнована Полтава; ЕІУ про громадянські війни — близько 15 тисяч убитих у бою й 7 тисяч страчених полонених; стаття про Виговського дає ширшу рамку «понад 50 тисяч». Один точний «шкільний» факт тут неможливий.'
  - 'Роль кримсько-татарського війська Карач-бея була військово вирішальною і згубною для цивільних. Її не приховуємо задля «чистого» пропольського чи промосковського наративу — але й не етнізуємо: називаємо військову роль і шкоду, а не «природу» союзника.'
  section: 'Тінь: Насильство, Москва і число загиблих'
  words: 900
- points:
  - 'Повернення до розминки: чому регіональна влада й народна мобілізація не перетворилися на тривкий політичний результат, а живили спіраль Руїни? Порівнюємо з Наливайком і з пізнішими фазами громадянських воєн.'
  - '[!epistemic-humility] Сучасна полтавська пам''ять переписується: стару імперську табличку про «дружбу» з Росією замінюють на нову. Це матеріал з історії пам''яті, а не джерело про факти XVII століття.'
  - Панно Сергія Васильківського про вибори Пушкаря полковником — це пізніший візуальний спогад (близько 1901 р.), а не прижиттєвий портрет; підписуємо його саме так.
  - '[!decolonization] Чому і імперський ярлик «розбою/бунту», і радянська «класова боротьба», і зустрічна націоналістична «зрада» однаково спрощують постать — і що дає повернення Пушкаря крізь джерела як досвідченого командира, регіонального патрона й жертви громадянської війни.'
  section: 'Дискусія та підсумок: Пам''ять про Пушкаря'
  words: 700
focus: 'Martyn Pushkar as a complex Ruin-era figure: the founding colonel of the Poltava regiment and a Khmelnytsky-era commander who first backed Ivan Vyhovskyi and then led the 1658 Pushkar-Barabash uprising against him; how Moscow used Ukrainian division as leverage, how Vyhovskyi answered with a Sich blockade and a Crimean-Tatar alliance, and how the civil-war violence and its casualty figures resist a single classroom number or a single moral label.'
