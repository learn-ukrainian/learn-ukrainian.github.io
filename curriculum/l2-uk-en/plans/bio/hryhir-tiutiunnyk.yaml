content_outline:
- points:
  - >-
    [!biography] Знайомство з Тютюнником Григором (Григіром) Михайловичем: прозаїк шістдесятників,
    майстер новели, дитячий письменник, перекладач.
  - >-
    Провокаційне питання: як сільська психологічна проза без партійних гасел могла викликати
    ворожу офіційну критику?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 5 грудня 1931 року в с. Шилівка (Полтавщина); батька Михайла
    Тютюнника репресували як «ворога народу», і він не повернувся з таборів;
    Григір — єдинокровний брат письменника Григорія Тютюнника.
  - >-
    Закінчив Харківський університет (1962); S1 називає перше опубліковане
    1961 року оповідання «В сутінки», а S3 на с. 4 — «В сутінках» і вказує
    журнал «Крестьянка» та російську мову публікації.
  - >-
    [!decolonization] В окремій цитованій у S3 авторській згадці Тютюнник каже,
    що переклав свої «Сумерки»; ця згадка не перейменовує оповідання, а
    подальший вибір української мови не є підставою вигадувати ув’язнення чи
    спрощувати шлях автора.
  section: 'Формування: Шилівка, репресія батька і Харків'
  words: 1000
- points:
  - >-
    Перша книжка оповідань «Зав’язь» (1966); бібліографія також реєструє
    «Батьківські пороги» (1972), кілька видань «Климка», «Облогу», «Степову
    казку» та вибрані твори.
  - >-
    S1 датує премію імені Лесі Українки за дві повісті 1980 роком, тоді як S3
    на с. 5 називає 1979 рік і збірник «Вогник далеко в степу»; план фіксує
    розбіжність і не обирає один рік без додаткового джерела.
  - >-
    Бібліотечна довідка повідомляє, що сам Тютюнник в одному з інтерв’ю
    сформулював доброту, самовідданість і милосердя як провідну тему; план
    чесно переказує атрибуцію, не відтворюючи повної цитати без першоджерела.
  - >-
    [!decolonization] Проза сільської травми, самотності й голоду без соцреалістичного тріумфу —
    моральний реалізм, а не «песимізм без ідеї».
  section: 'Діяльність: Новелістика від «Зав’язі» до «Батьківських порогів»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешту самого Григора Тютюнника у досьє не зафіксовано — не вигадувати
    КДБ-справу чи судовий процес.
  - >-
    Бібліотечна довідка говорить про атмосферу чиновницького диктату над
    літературою, але не називає окремої рецензії, заборони, справи чи психологічного мотиву.
  - >-
    Для твердження про цензуру конкретного твору потрібне окреме архівне або
    академічне джерело; загальний контекст не замінює такого доказу.
  - >-
    [!epistemic-humility] [!myth-buster] Прийнята біографічна довідка повідомляє
    про березень 1980 року, а S3 на с. 5 уточнює 6 березня і повідомляє, що
    автор вкоротив собі віку. Джерела не називають місця й не доводять мотиву
    або причинного зв’язку між чиновницьким тиском і смертю.
  section: 'Тінь: Інституційний тиск і межі причинності'
  words: 1600
- points:
  - >-
    Посмертна Державна премія України імені Тараса Шевченка (1989) та пізні
    бібліографічно зареєстровані вибрані твори.
  - >-
    Сучасне читання: точність новельної деталі й увага до доброти,
    самовідданості та милосердя, а не лише ярлик «сумної сільської прози».
  - >-
    Зіставлення з іншими прозаїками 1960-х потребує окремих джерел про кожного
    автора; хронологічна близькість не доводить особистого зв’язку чи однакової долі репресій.
  section: 'Підсумок: Новела почуття і посмертний канон'
  words: 1000
focus: >-
  Григір Тютюнник — майстер психологічної новели. Аналіз бібліографії,
  чиновницького диктату над літературою та меж причинності без вигаданого
  арешту, місця смерті чи мотиву; дату й обставину смерті, варіанти назви
  першого оповідання та мовну траєкторію подано за прийнятими джерелами.
level: BIO
module: bio-258
objectives:
- >-
  Відокремити біографічні факти Тютюнника (Шилівка, репресія батька,
  бібліографія) від спрощень «сумного сільського письменника».
- Аналізувати новелістику як моральний реалізм, що не вкладався в соцреалізм.
- >-
  Пояснити різницю між загальною атмосферою чиновницького диктату й доказом
  цензури конкретного твору без вигаданого КДБ-файлу.
- >-
  Розмежувати зафіксовані S3 дату й обставину смерті та не доведені джерелами
  мотив або причинний зв’язок із інституційним тиском.
