content_outline:
- points:
  - >-
    [!biography] Знайомство з Тютюнником Григором (Григіром) Михайловичем: прозаїк шістдесятників,
    майстер новели, дитячий письменник, перекладач.
  - >-
    Провокаційне питання: як сільська психологічна проза без партійних гасел могла викликати
    ворожу офіційну критику?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 5 грудня 1931 року в с. Шилівка (Полтавщина); батько Михайло Тютюнник арештований
    вночі 29–30 листопада 1937 року, реабілітований посмертно 1958 року; молодший брат письменника
    Григорія Тютюнника.
  - >-
    Закінчив Харківський університет (1962); перша публікація «В сумерки» (1961) російською,
    згодом — перехід на українську.
  - >-
    [!decolonization] Травма батьківського аресту й перехід мовою — документований шлях
    деколонізації без вигаданого власного ув''язнення автора.
  section: 'Формування: Шилівка, батьківський арест і Харків'
  words: 1000
- points:
  - >-
    Збірки: «Зав''язь» (1966), «Деревій» (1969), «Облога» (1969), «Батьківські пороги» (1972),
    «Крайнебо» (1975), «Коріння» (1978).
  - >-
    Новели «Климко» (1976; премія ім. Лесі Українки 1980), «Вогник далеко в степу» (1979);
    дитячі книжки «Ласочка» (1970), «Степова казка» (1973).
  - >-
    «Три зозулі з поклоном» (1976) — написано, але не надруковано за життя автора; присвята
    «Любові всевишній присвячується» — поза радянською ідеологічною «темою».
  - >-
    [!decolonization] Проза сільської травми, самотності й голоду без соцреалістичного тріумфу —
    моральний реалізм, а не «песимізм без ідеї».
  section: 'Діяльність: Новелістика від «Зав''язі» до «Коріння»'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Арешту самого Григора Тютюнника у досьє не зафіксовано — не вигадувати
    КДБ-справу чи судовий процес.
  - >-
    Механізм тиску: ворожа офіційна критика, небажання друкувати твори, психологічний тиск
    1970-х; IEU пов''язує самогубство з ворожістю критики.
  - >-
    «Три зозулі з поклоном» — неопублікована за життя; інші тексти друкувалися неохоче й
    піддавались різкій критиці.
  - >-
    [!epistemic-humility] [!myth-buster] Смерть 6 березня 1980 року в Києві (Вікіпедія, підручники)
    або 7 березня (IEU) — розбіжність одного дня, не приховувати. Самогубство описане в IEU
    і Вікіпедії; конкретну КДБ-кампанію не стверджувати без джерела.
  section: 'Тінь: Цензура без арешту — тиск, непублікація, самогубство'
  words: 1600
- points:
  - >-
    Постумні «Твори» у двох томах (1985); Шевченківська премія (1989); «Вибрані твори» (1981).
  - >-
    Сучасне читання: точність новельної деталі, робота над почуттям («Ніколи не працював над
    темою»), а не лише «сумна сільська проза».
  - >-
    Зв''язок із шістдесятниками-прозаїками: Гуцало, Шевчук; спільний контекст відлиги й
    дисциплінування без приписування однакової долі репресій.
  section: 'Підсумок: «Три зозулі з поклоном» і постумний канон'
  words: 1000
focus: >-
