objectives:
- >-
  Відокремити біографічні факти Тютюнника (Шилівка, батьківський арест, бібліографія) від
  спрощень «сумного сільського письменника».
- Аналізувати новелістику як моральний реалізм, що не вкладався в соцреалізм.
- Пояснити механізм непрямого тиску — цензура, критика, непублікація — без вигаданого КДБ-файлу.
- Оцінити «Три зозулі з поклоном» як текст поза радянською «темою» і постumне відновлення канону.
