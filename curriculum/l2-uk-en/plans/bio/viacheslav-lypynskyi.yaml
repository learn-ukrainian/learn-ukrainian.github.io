objectives:
- Аналізувати ідеологічну еволюцію В'ячеслава Липинського від польського шляхтича до українського консервативного мислителя
- Критично оцінювати концепції "класократії" та "територіального патріотизму" в контексті української історії та сучасності
- Порівнювати консервативний (державницький) та народницький підходи до державотворення на прикладі полеміки Липинського з
  опонентами
- Формулювати аргументовану позицію щодо ролі еліт та ідеології у розбудові стійкої держави
