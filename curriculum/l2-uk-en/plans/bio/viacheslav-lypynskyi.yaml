content_outline:
- points:
  - 'Парадокс: Як польський шляхтич став ідеологом української державності, відкинувши "народництво" — домінуючу течію свого
    часу?'
  - 'Провокація: Липинський стверджував, що для держави потрібна сильна еліта, а не "воля народу". Чи актуальна ця думка для
    України сьогодні?'
  - '[!biography] Представлення В. Липинського як найоригінальнішого, але й найсуперечливішого українського мислителя XX ст.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (за життя): Липинський проти Грушевського. Консервативна "класократія" (влада еліти) проти народницької демократії
    (влада мас). Хто мав рацію в умовах революції?'
  - 'Дебат 2 (спадщина): Радянська пропаганда таврувала його як "реакціонера" та "поміщика". Сучасні націоналісти іноді ідеалізують,
    ігноруючи його критику "галасливого патріотизму".'
  - '[!epistemic-humility] Визнання, що його ідеї про "територіальний патріотизм" (де нація — це всі жителі землі, незалежно
    від походження) були занадто прогресивними для свого часу і не були повністю сприйняті жодною стороною.'
  - '[!decolonization] Липинський активно боровся проти "москвофільства" і вбачав у російському імперіалізмі головну загрозу,
    але його модель держави була європейською (аристократичною), а не суто українською (козацькою).'
  section: 'Конфліктна карта: Аристократ чи патріот?'
  words: 900
- points:
  - 'Походження та виховання: народження у спольщеній шляхетській родині на Волині (1882); вплив польської культури та католицизму.'
  - 'Освіта та інтелектуальний злам: навчання в Києві, Женеві, Кракові. Відкриття для себе української історії та усвідомлення
    себе українцем.'
  - 'Історик як ідеолог: ранні праці, присвячені козаччині та ролі шляхти в історії України. Переосмислення історії не як
    боротьби народу, а як процесу державотворення.'
  - 'Особистий вибір: свідома зміна ідентичності та "навернення" в українство як політичний та етичний акт.'
  section: 'Формування: Шлях від шляхтича до українця'
  words: 1000
- points:
  - 'Гетьманат Павла Скоропадського (1918): Липинський як один з ідеологів та посол Української Держави у Відні.'
  - 'Концепція класократії: обґрунтування монархічної, станової держави, де провідну роль відіграє "хліборобська" (земельна)
    аристократія.'
  - 'Головна праця "Листи до братів-хліборобів": синтез його політичної філософії, критика демократії, соціалізму та народництва.'
  - 'Практичний провал: чому його ідеї не здобули широкої підтримки і Гетьманат зазнав поразки?'
  section: 'Діяльність: Теорія і практика державотворення'
  words: 1300
- points:
  - '[!anti-hagiography] Зневага до "простонароддя" та інтелігенції. Липинський вважав маси пасивним матеріалом, а інтелігенцію
    — безвідповідальними демагогами.'
  - 'Авторитарні тенденції: його модель "органічної держави" залишала мало місця для демократичних свобод та індивідуальних
    прав.'
  - 'Ідейна ізоляція: гостра полеміка і розрив стосунків з більшістю українських політичних діячів, включаючи колишніх соратників.'
  - '[!myth-buster] Липинський не був "фашистом", як стверджувала радянська пропаганда. Але його ідеї про сильну владу та
    еліту були співзвучні певним консервативно-авторитарним рухам у Європі 1920-30-х років.'
  section: 'Тінь: Ціна елітизму'
  words: 900
- points:
  - 'Повернення до розминки: Як польський аристократ зміг запропонувати одну з найглибших моделей української державності?'
  - 'Оцінка спадщини: Липинський залишив не стільки практичний план, скільки інтелектуальну традицію — український консерватизм.'
  - '[!decolonization] Його ідеї про "європейськість" України та необхідність сильної, відповідальної еліти є гостро актуальними
    в контексті протистояння російській "орді" та популізму.'
  - 'Сучасна релевантність: дебати про роль еліт, сильної держави та "якість" громадянства в сучасній Україні — пряме продовження
    дискусій, розпочатих Липинським.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Lypynskyi's ideological evolution from Polish noble to Ukrainian statehood theorist, his concepts of "classocracy"
  and "territorial patriotism", and the conflict between conservatism and populism in the Ukrainian Revolution.
level: BIO
