content_outline:
- points:
  - 'Джерельне питання: як поєднати наукову, літературну, громадську й військову біографії Юрія Дадака, не пояснюючи одну роль іншою?'
  - ЕСУ як датована енциклопедична стаття 2025 року та Суспільне як повідомлення 2022 року мають різні завдання.
  - '[!biography] Ім''я Юрій Дадак, псевдонім Юрій Руф, дати життя й фахи за прямими джерелами.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: що доводить перелік наукових посад і праць, а чого він не доводить про особисті мотиви?'
  - 'Дебат 2: як меморіальна мова змінює добір фактів про загиблу людину?'
  - '[!epistemic-humility] Не приписувати Руфу поглядів, мотивів або психологічної трансформації без прямого локованого джерела.'
  - '[!decolonization] Російське вторгнення й місце загибелі названі прямо; українська суб''єктність не зводиться до героїчного архетипу.'
  section: 'Конфліктна карта: Біографія, пам''ять і оцінка'
  words: 900
- points:
  - Народження 26 вересня 1980 року в Бережанах та освіта в Українському лісотехнічному університеті за ЕСУ.
  - Кандидатський ступінь 2008 року й робота в Національному лісотехнічному університеті як перевірна професійна хронологія.
  - Псевдонім Юрій Руф і названі ЕСУ книжки без неперевірених цитат або жанрових узагальнень.
  - Громадська діяльність у межах того, що прямо перелічує енциклопедична стаття.
  section: 'Формування: Освіта, наука і літературний псевдонім'
  words: 1000
- points:
  - Вступ до Збройних сил після 24 лютого 2022 року за ЕСУ; конкретна роль і підрозділ подаються лише з атрибуцією джерела.
  - Загибель 1 квітня 2022 року поблизу Попасної від мінометного обстрілу за ЕСУ.
  - Повідомлення Суспільного про прощання як датоване новинне джерело, а не повна біографія.
  - Для аналізу поезії потрібні законно доступні твори; біографічні профілі не підтримують оцінку стилю кожного тексту.
  section: 'Діяльність: Наукова праця, поезія і служба'
  words: 1300
- points:
  - '[!anti-hagiography] Військова служба й посмертна нагорода не встановлюють літературної якості та не роблять кожне висловлювання безпомилковим.'
  - '[!myth-buster] Руф не є автоматичним продовженням Розстріляного відродження; таке порівняння потребує окремого історичного корпусу.'
  - Точний портрет із Вікісховища підтверджує особу, автора й ліцензію, але не біографічні твердження.
  - Не вживати ярликів про політичну ідеологію або ставлення до насильства без прямого джерела й контексту.
  section: 'Межі джерел: Творчість і військова служба'
  words: 900
- points:
  - Повернення до розминки з таблицею «твердження — джерело — дата — жанр — межа».
  - Порівняння того, як ЕСУ й Суспільне формують різні, але сумісні хронологічні фрагменти.
  - '[!decolonization] Називати російського агресора там, де це підтримано, не перетворюючи біографію на бездоказове гасло.'
  - Формулювання висновку про багаторольову біографію без прогнозу її майбутньої рецепції.
  section: 'Дискусія та підсумок: Що підтримує джерело'
  words: 700
focus: Джерельно обмежений аналіз наукової, літературної, громадської та військової біографії Юрія Дадака, відомого під псевдонімом Юрій Руф.
