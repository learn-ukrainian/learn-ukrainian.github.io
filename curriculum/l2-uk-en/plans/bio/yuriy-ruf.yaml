objectives:
- Побудувати атрибутовану хронологію освіти, наукової праці, літературної діяльності й військової служби Юрія Дадака.
- Розрізняти енциклопедичний профіль, датоване новинне повідомлення та меморіальну оцінку.
- Перевіряти твердження про роль, підрозділ і обставини загибелі за прямим джерелом, не приписуючи мотивів.
- Формулювати висновки про спадщину без ототожнення з іншими історичними поколіннями та без непідтверджених цитат.
