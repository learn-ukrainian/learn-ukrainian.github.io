content_outline:
- points:
  - 'Парадокс: Як людина, що створює бренди одягу та пише вірші, стає безкомпромісним ідеологом і солдатом? Юрій Руф жив цим
    парадоксом.'
  - 'Провокація: Чи може поет вбивати? І чи може солдат писати вірші? Питання, яке Руф вирішив для себе, і яке Україна вирішує
    сьогодні.'
  - '[!biography] Коротка довідка про Юрія Руфа — поет, видавець, засновник бренду, воїн. Загинув у бою під Попасною у 2022.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Руф — поет чи воїн? Одні бачать у ньому насамперед мілітарного ідеолога, що використовував поезію як зброю.
    Інші — митця, якого трагічні обставини змусили взяти до рук автомат.'
  - 'Дебат 2: Чи є доля Руфа прямим продовженням долі Розстріляного Відродження? Аргументи «за»: свідома війна Росії проти
    української субʼєктності. Аргументи «проти»: різні історичні контексти, відмінність тоталітарного терору 30-х від сучасної
    геноцидної війни.'
  - '[!decolonization] Розгляд феномену «страчених відроджень» як свідомої політики російського імперіалізму протягом століть.'
  - '[!epistemic-humility] Визнання, що мотивації та спадщина Руфа можуть інтерпретуватися по-різному, залежно від оптики
    (цивільної, військової, націоналістичної).'
  section: 'Конфліктна карта: Спадкоємність боротьби'
  words: 900
- points:
  - '«Звичайний хлопець» зі Львова: родина, освіта в НУ «Львівська політехніка». Відсутність «дисидентського» бекграунду.'
  - 'Переломний момент: Помаранчева революція, Революція Гідності. Як вуличний активізм перетворився на зрілу ідеологічну
    позицію.'
  - 'Формування світогляду через самоосвіту: читання класиків українського націоналізму, історичної літератури. Створення
    власної «ідеологічної фортеці».'
  - 'Роль у навколофутбольному русі: як середовище фанатів стало плавильним котлом для патріотичної молоді у 2000-х.'
  section: 'Формування: {Народження націоналіста}'
  words: 1000
- points:
  - 'Поезія як інструмент: аналіз ключових збірок («Багряна лірика», «Час Революції, час Війни»). Тематика, стиль, агресивна
    й безкомпромісна мова.'
  - 'Видавництво «Голос крові»: створення платформи для мілітарної та націоналістичної літератури. Руф як культурний продюсер.'
  - 'Бренд одягу «Ґердан»: перетворення ідеології на естетику. Комерціалізація націоналістичної символіки як спосіб її популяризації.'
  - 'Військовий шлях: від добровольця у 2014-му до солдата 24-ї ОМБр у 2022-му. Еволюція від «партизана» до професійного військового.'
  section: 'Діяльність: {Слово і сталь}'
  words: 1300
- points:
  - '[!anti-hagiography] Руф — не «котик». Його світогляд був жорстким і нетерпимим до «ліберальних слабкостей». Чи була ця
    безкомпромісність єдиним можливим шляхом, чи вона обмежувала його вплив?'
  - 'Ціна, яку платить інтелектуал на війні: втрата нюансів, необхідність ділити світ на «чорне і біле», «свій-чужий».'
  - 'Критика з боку ліберальних кіл: звинувачення в ультраправих поглядах, естетизації насильства. Наскільки ці звинувачення
    справедливі?'
  - '[!myth-buster] Руф — не просто «загиблий поет». Він був свідомим ідеологом війни за національне існування. Ігнорувати
    цю частину його спадщини — значить не розуміти його.'
  section: 'Тінь: {Ціна безкомпромісності}'
  words: 900
- points:
  - 'Повернення до розминки: Руф — це трагічний виняток чи новий архетип українського інтелектуала у XXI столітті?'
  - 'Спадщина Руфа: що важливіше — його вірші, його вчинки чи його смерть? Як його постать використовується сьогодні в пропаганді
    та контрпропаганді.'
  - '[!decolonization] Руф як символ остаточного розриву з постколоніальною парадигмою «жертви». Україна — не жертва, а воїн,
    що бореться.'
  - 'Майбутнє «покоління Руфа»: чи стане інтелектуальна безкомпромісність новою нормою для української еліти?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Юрій Руф (Юрій Дадак) як символ нового покоління українських інтелектуалів-воїнів, зв'язок із Розстріляним Відродженням,
