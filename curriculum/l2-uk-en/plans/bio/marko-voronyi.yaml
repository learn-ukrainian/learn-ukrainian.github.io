objectives:
- Відрізняти власний творчий профіль Марка Вороного від біографічної рамки "син Миколи Вороного".
- Аналізувати контраст між дитячими книжками 1930 року та релігійно-символічною дорослою лірикою.
- Пояснювати репресивний ланцюг від київського арешту 1935 року до розстрілу в Сандармосі 3 листопада 1937 року.
- Оцінювати сімейний і поколіннєвий вимір радянського терору без вигаданого розширення корпусу.
