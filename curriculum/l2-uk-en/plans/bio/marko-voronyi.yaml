content_outline:
- points:
  - >-
    [!biography] Марко Миколайович Вороний: поет, автор дитячих книжок і дорослої символічної
    лірики, народжений 18 березня 1904 року в Чернігові; у джерелах також зберігається
    старостильна дата 5 березня.
  - >-
    Початковий парадокс: він був сином Миколи Вороного, але не має бути зведений до родинної
    примітки; його власний голос видно в дитячому друці й релігійно-символічних рядках.
  - >-
    Провокаційне питання: як радянський терор знищував не тільки окремих авторів, а й
    міжпоколінну тяглість української літературної родини?
  section: Розминка
  words: 400
- points:
  - >-
    Родинний контекст: Марко жив у літературній мережі як син Миколи Вороного, але навчальний
    портрет має починатися з його власного імені, псевдоніма Антіох і його текстів.
  - >-
    Два регістри: дитячі та юнацькі книжки поруч із дорослою лірикою, де з'являються релігійні
    й символічні образи.
  - >-
    [!decolonization] Відновлення імені Марка не означає штучного збільшення корпусу; воно
    означає відмову від радянського та пізнішого стирання, яке залишає тільки прізвище батька
    або місце в списку Сандармоху.
  - >-
    Метод читання: учні відділяють біографічну рамку від текстових свідчень і ставлять питання,
    що саме можна довести на підставі музейних та енциклопедичних джерел.
  section: "Формування: Літературна родина і власне ім'я"
  words: 1000
- points:
  - >-
    Дитячий друк 1930 року: "Трюки в кіні", "Червоні краватки", "Будівники", "Коники",
    "Носоріг" і "Ставок" показують конкретну, ритмічну й дитячу лексику ранньорадянського
    книжкового середовища.
  - >-
    Доросла лірика 1920-х: цикл із назвами "Молитва", "Церква", "Янголи" та "Різдвяна елегія"
    відкриває релігійно-символічний вимір, який не зводиться до дитячої літератури.
  - >-
    Доросла релігійно-символічна лірика потребує повільного семінарського читання лише за
    прямо перевіреним текстом; музейна транскрипція не є заміною первинного видання.
  - >-
    Назва «Отчизна» фіксується в музейному матеріалі, але її текст не стає об'єктом близького
    читання, доки не буде перевірено первинне видання або сторінку рукопису.
  section: "Діяльність: Дитячі книжки та релігійно-символічна лірика"
  words: 1200
- points:
  - >-
    [!anti-hagiography] Невеликий корпус не треба компенсувати вигаданими творами або
    перебільшенням; його достатньо читати як документований голос молодого автора у знищеній
    літературній лінії.
  - >-
    Механізм репресії: арешт у Києві 19 березня 1935 року, близько десяти місяців у
    Лук'янівській в'язниці, закритий трибунал Київського військового округу 1-4 лютого
    1936 року.
  - >-
    Вирок 1936 року до 8 років виправно-трудових таборів не означав виживання: після
    Соловецького ув'язнення спеціальна трійка УНКВС у Ленінградській області ухвалила
    смертне рішення 9 жовтня 1937 року.
  - >-
    Страта 3 листопада 1937 року в Сандармосі біля Медвеж'єгорська показує, як табірний
    термін міг бути перетворений на масове вбивство.
  - >-
    Родинний вимір: батько Микола Вороний також був репресований і розстріляний у 1938 році,
    тому біографія Марка читається як частина ширшого руйнування літературної тяглості.
  section: "Тінь: Лук'янівка, Соловки, Сандармох"
  words: 1600
- points:
  - >-
    Що вижило: дитячі книжки, бібліотечні записи та музейні матеріали, які дозволяють не
    перетворювати автора на безіменний пункт списку.
  - >-
    Педагогічна пропорційність: план не має вигадувати "великого" корпусу, але має пояснити,
    чому коротке життя і менша кількість текстів не скасовують історичної ваги.
  - >-
    Підсумкове питання: як поєднати родинний контекст, власний авторський голос і механізм
    Сандармоху без того, щоб один із цих вимірів поглинув інші?
  section: "Підсумок: Покоління, родина і стирання"
  words: 1000
focus: >-
  Марко Вороний як окремий автор дитячих книжок і релігійно-символічної лірики, чию біографію
  треба читати поруч із родинною тяглістю Вороних та точним механізмом Соловки-Сандармох.
