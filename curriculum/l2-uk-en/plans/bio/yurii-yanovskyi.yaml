content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Яновським: прозаїк і сценарний працівник
    Одеської кіностудії, народжений 14 (27) серпня 1902 року на хуторі Маєрове,
    тепер село Нечаївка, і померлий 25 лютого 1954 року в Києві.
  - >-
    Провокаційне питання: як автор модерної формули "Культура нації" був змушений
    пошкодити власну "Живу воду" до післясмертного роману "Мир"?
  section: Розминка
  words: 400
- points:
  - >-
    Походження, яке доводилося приховувати: Яновський народився в заможній
    землевласницькій родині, а в радянських анкетах мусив називати себе вихідцем
    із родини службовця.
  - >-
    Освіта й перші середовища: Єлисаветградське реальне училище, Київський
    політехнічний інститут у 1922-1923 роках, праця в Одесі поруч із Олександром
    Довженком.
  - >-
    Псевдонім Георгій Ней належить ранньому етапу роботи в кіно; він важливий
    для розуміння монтажності, морської образності й кінематографічної динаміки
    прози.
  - >-
    Перші книжки "Мамутові бивні" 1925 року і "Кров землі" 1927 року вводять
    романтичну новелу, але справжнім модерністським піком стає "Майстер корабля"
    1928 року.
  section: 'Формування: Маєрове, кіно і прихована біографія'
  words: 1000
- points:
  - >-
    "Майстер корабля" 1928 року створює космополітичну морську оптику українського
    модернізму; образ нареченої як "культури нації" дає ключ до його ранньої
    естетики.
  - >-
    "Чотири шаблі" 1930 року були засуджені за "націоналістичний романтизм" і
    "отаманщину"; саме цей удар відкриває перший перелом у його біографії.
  - >-
    "Вершники" 1935 року формально погоджуються з соціалістичним реалізмом,
    проголошуючи неминучість більшовицької перемоги, але зберігають неоромантичну
    трагедію братовбивства.
  - >-
    [!decolonization] Новелу "Подвійне коло" треба читати в контексті Української
    революції 1918-1921 років, а не лише як радянську схему громадянської війни.
  - >-
    Повоєнна "Жива вода" 1947 року показувала біологічну і духовну стійкість
    українського народу після війни, тому стала мішенню другої хвилі ламання.
  section: 'Діяльність: Корабель, степ і новелістична форма'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Яновський вижив після першого удару завдяки ідеологічній
    поступці у "Вершниках", але ця поступка не означала внутрішньої свободи чи
    довіри з боку влади.
  - >-
    1930 рік: офіційна критика засудила "Чотири шаблі" за "націоналістичний
    романтизм" і "отаманщину", а роман було заборонено на тлі зростання репресій
    проти кола ВАПЛІТЕ.
  - >-
    Серпень 1947 року: після публікації "Живої води" в журналі "Дніпро" Лазар
    Каганович особисто атакував Яновського на пленумі Спілки письменників,
    звинувативши в "буржуазному націоналізмі", "аполітизмі" та "біологічному
    підході".
  - >-
    Центральний комітет КП(б)У видав нищівну постанову; окремий книжковий наклад
    "Живої води" приблизно у 20000 примірників було знищено.
  - >-
    Яновського звільнили з посади головного редактора журналу "Вітчизна", колишньої
    "Української літератури"; він опинився в ізоляції й бідності, продавав власну
    бібліотеку та речі.
  - >-
    Публічний лист каяття в "Літературній газеті" був частиною примусу, а не
    вільним авторським поясненням.
  - >-
    У фінальні хворі роки він зробив понад 200 ідеологічних поступок, вилучав
    "шкідливі подробиці" і додавав партійну риторику, щоб перетворити "Живу воду"
    на післясмертний "Мир" 1956 року.
  - >-
    Сталінська премія 1949 року за "Київські оповідання" завершила механізм
    батога й пряника: після знищення головного твору система винагородила безпечний
    текст.
  section: 'Тінь: Від "Чотирьох шабель" до знищення "Живої води"'
  words: 1600
- points:
  - >-
    Центральна дискусія: чи є "Вершники" прихованим спротивом через езопову мову,
    чи остаточною поразкою перед соціалістичним реалізмом?
  - >-
    Володимир Панченко назвав цю ситуацію "блискучою поразкою": цензура отримала
    більшовицьку переможну формулу, але текст залишив трагедію роду і степу.
  - >-
    [!myth-buster] Перетворення "Живої води" на "Мир" не можна описувати як
    звичайну редакцію; досьє наполягає на насильницькому пошкодженні авторського
    задуму.
  - >-
    Підсумкове питання: як читати Яновського після радянської шкільної канонізації
    "Вершників", не стираючи ні його майстерності, ні зламу 1930 і 1947 років?
  section: 'Підсумок: Блискуча поразка і пошкоджений роман'
  words: 1000
focus: >-
  Юрій Яновський як неоромантик українського модернізму, прозаїк кіноепохи і
  жертва двох хвиль радянської цензури: заборони "Чотирьох шабель" 1930 року та
  знищення "Живої води" після атаки Кагановича 1947 року.
level: BIO
module: bio-250
objectives:
- >-
  Аналізувати ранню біографію Яновського через Маєрове, приховане
  землевласницьке походження і працю на Одеській кіностудії.
- >-
  Пояснювати художню роль "Майстра корабля", "Чотирьох шабель" і "Вершників"
  у траєкторії українського неоромантизму.
- >-
  Досліджувати атаку Кагановича 1947 року, постанову ЦК КП(б)У, знищення
  накладу "Живої води" і понад 200 поступок у "Мирі".
- Дискутувати про "блискучу поразку" без радянської канонізації та без ідеалізації вимушених поступок.
