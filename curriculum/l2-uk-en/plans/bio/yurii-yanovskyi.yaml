content_outline:
- points:
  - >-
    [!biography] Знайомство з Юрієм Яновським: прозаїк і художній редактор
    Одеської кінофабрики, народжений 27 (14) серпня 1902 року на хуторі Маєрове,
    тепер село Нечаївка, і померлий 25 лютого 1954 року в Києві.
  - >-
    Провокаційне питання: як документувати державне втручання в літературу, не
    домислюючи накладів, приватних мотивів або ефектних реплік, яких немає в
    прийнятих джерелах?
  section: Розминка
  words: 400
- points:
  - >-
    Хутір Маєрове, нині село Нечаївка, як документоване місце народження;
    окремо — переїзд родини до Єлизаветграда 1917 року та навчання в реальному
    училищі.
  - >-
    Освіта й перші середовища: Єлизаветградське реальне училище, Київський
    політехнічний інститут у 1922–1924 роках, праця в Одесі поруч із Олександром
    Довженком.
  - >-
    ЕІУ фіксує псевдоніми Григорій Ней і Юрій Юрченко. Псевдонім слід
    установлювати як форму підпису, а не використовувати як доказ авторського
    наміру.
  - >-
    Перший вірш «Море» 1922 року, кореспондентська праця від 1924 року,
    участь у ВАПЛІТЕ в 1925–1928 роках і робота художнім редактором Одеської
    кінофабрики в 1926–1927 роках як перевірена рання хронологія.
  section: 'Формування: Маєрове, освіта й кіно'
  words: 1000
- points:
  - >-
    НБУВ подає «Майстер корабля», «Чотири шаблі» та «Вершники» як склад другого
    тому п'ятитомного видання 1982–1983 років; сам том 2 датовано 1983 роком.
    Цей каталог установлює склад тому, але не замінює першодруків і
    текстологічного аналізу.
  - >-
    Роман «Чотири шаблі» 1930 року зазнав різкої критики як твір
    націоналістичного романтизму; ЕІУ пов'язує його з подіями в Україні
    1917–1921 років і спогадами Юрія Тютюнника.
  - >-
    [!decolonization] «Вершники» змогли вийти в УСРР 1935 року лише після того,
    як перекладені російською уривки були оприлюднені та спеціально обговорені
    в Москві. Це документований інституційний фільтр, а не припущення про мотив.
  - >-
    Українська революція 1917–1921 років як ширша історична рамка для читання
    романів, без перетворення художнього сюжету на точну схему подій.
  - >-
    Роман «Жива вода» надрукував журнал «Дніпро» 1947 року; ЕІУ пов'язує
    партійну критику з показом важкої повоєнної дійсності.
  section: 'Діяльність: Корабель, степ і новелістична форма'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Джерело документує критику й інституційні наслідки, але
    не дає підстав пояснювати виживання письменника одним твором або читати його
    приватний стан із пізнішої канонізації.
  - >-
    Критика «Чотирьох шабель» як націоналістичного романтизму вплинула і на
    оцінку «Вершників»; московське обговорення перекладених уривків передувало
    українському виданню 1935 року.
  - >-
    1947 року ЦК КП(б)У ухвалив постанову «Про журнал «Вітчизна»». Яновського
    звільнили з посади головного редактора в контексті офіційних закидів у
    націоналізмі, міщансько-обивательських поглядах, аполітичності та друці
    помилкових і порочних творів.
  - >-
    Пленум Спілки письменників України за участю Лазаря Кагановича засудив
    «Живу воду» як ідейно хибний, націоналістичний і наклепницький роман.
  - >-
    [!epistemic-humility] Прийняте джерело не подає окремого накладу книги й не
    наводить ефектної репліки Кагановича; ці деталі не переносяться до семінару.
  - >-
    ЕІУ фіксує моральний і матеріальний тиск та критику інших творів, не
    приписуючи авторові недокументованих публічних слів.
  - >-
    За порадами «товаришів» Яновський зробив до 200 виправлень; після смерті
    автора твір надрукували під назвою «Мир». Джерело не подає переліку кожної
    зміни, тому семінар не домислює їхнього змісту.
  - >-
    Сталінська премія 1949 року за «Київські оповідання» як задокументована
    відзнака, яку слід розглядати поруч із попередньою критикою, а не як доказ
    приватного примирення автора із системою.
  section: 'Тінь: Від критики «Чотирьох шабель» до редакції «Миру»'
  words: 1600
- points:
  - >-
    Центральна дискусія: як аналізувати «Вершників» після документованого
    московського фільтра, не проголошуючи наперед ані прихованого спротиву, ані
    остаточної капітуляції?
  - >-
    Порівняння ролей джерел: ЕІУ встановлює біографічну та цензурну хронологію,
    а НБУВ — ідентичність пізнішого тому. Жодне з них не замінює аналізу
    конкретної редакції художнього тексту.
  - >-
    [!myth-buster] Зміну назви «Жива вода» на «Мир» і до 200 виправлень слід
    читати в документованому контексті постанови, звільнення й пленумного осуду,
    не приписуючи джерелу невідомого змісту кожної правки.
  - >-
    Підсумкове питання: як читати Яновського після радянської шкільної канонізації
    "Вершників", не стираючи ні його майстерності, ні зламу 1930 і 1947 років?
  section: 'Підсумок: Блискуча поразка і пошкоджений роман'
  words: 1000
focus: >-
  Юрій Яновський як неоромантик українського модернізму, прозаїк кіноепохи і
  об'єкт радянського інституційного контролю: критика «Чотирьох шабель»,
  московський фільтр для «Вершників», постанова 1947 року проти «Вітчизни» та
  до 200 виправлень перед посмертною публікацією «Миру».
