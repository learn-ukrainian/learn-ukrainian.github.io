objectives:
- >-
  Аналізувати ранню біографію Яновського через Маєрове, навчання в
  Єлизаветградському реальному училищі та працю на Одеській кінофабриці.
- >-
  Пояснювати художню роль "Майстра корабля", "Чотирьох шабель" і "Вершників"
  у траєкторії українського неоромантизму.
- >-
  Досліджувати постанову ЦК КП(б)У, пленумний осуд за участю Кагановича,
  звільнення з редакційної посади та до 200 виправлень у творі, посмертно
  надрукованому як «Мир».
- Дискутувати про межі інтерпретації без радянської канонізації та без приписування непідтверджених мотивів.
