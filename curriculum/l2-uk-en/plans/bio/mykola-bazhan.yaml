content_outline:
- points:
  - >-
    [!biography] Знайомство з Миколою Бажаном — блискучим поетом-конструктивістом
    і експресіоністом 1920-х, що став академіком, державним діячем і будівничим
    української культури зсередини радянської системи.
  - >-
    Провокаційне питання: чи можна водночас бути зламаним терором поетом,
    завербованим інформатором НКВС — і людиною, яка рятувала українську культуру
    через енциклопедію та реабілітації репресованих?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 26 вересня (9 жовтня) 1904 р. в Кам'янці-Подільському; юність в
    Умані; навчання в кооперативних закладах Умані та Києва.
  - >-
    [!decolonization] Шлях від футуризму до експресіонізму й конструктивізму;
    належність до літературного середовища ВАПЛІТЕ та дружба з Юрієм Яновським.
  - >-
    Дебютна збірка «Сімнадцятий патруль» (1926) та складна експресіоністична
    поема «Гетто в Умані» (1928) — глибоко українське історичне коріння його
    ранньої творчості.
  section: 'Формування: Авангард 1920-х (1904–1920-ті)'
  words: 1000
- points:
  - >-
    «Будівлі» (1929) — вершина українського конструктивізму й експресіонізму:
    «сконструйоване», «архітектурне» слово та барокова пишність фрази.
  - >-
    [!epistemic-humility] Аналіз фрагмента з «Будівель» («Звучить колона, як
    гобоя звук, / Звучить собор камінним Dies irae») — музична синестезія та
    важка історична вага образу.
  - >-
    «Гофманова ніч» (1929) і історична поема «Сліпці» (1931), яку вважають
    творчим зенітом поета.
  - >-
    Стиль: майстер «важкого», скульптурного українського слова — архітектурна
    термінологія, неологізми, щільні алітерації.
  section: 'Діяльність: «Будівлі» та зеніт модернізму (1929–1931)'
  words: 1200
- points:
  - >-
    [!anti-hagiography] 1935: НКВС відкриває «справу № 1377» про належність до
    вигаданої «Української військової організації» (разом із Яновським і
    Рильським); до серпня 1935 р. у справі з'являється формула про «встановлене»
    членство в терористичній організації — формальна підстава для розстрілу.
  - >-
    Березень 1936: під тиском справи-формуляра № 2055 НКВС вербує Бажана
    інформатором під псевдонімом «Петро Уманський». Дослідники ЦДВР наголошують:
    він співпрацював неохоче, зривав зустрічі й писав ухильні доноси,
    намагаючись захистити Олександра Довженка та Агатангела Кримського.
  - >-
    1938: на піку Великого терору поет щоночі очікував арешту й часто ночував
    поза домом, аби уникнути «чорного ворона».
  - >-
    [!myth-buster] 31 січня 1939: несподіване нагородження орденом Леніна —
    «капітуляція», що зняла загрозу фізичного знищення й перевела поета в
    радянський істеблішмент. Маркером ідеологічної здачі стала ода «Товариш
    стоїть в зореноснім Кремлі» (1932).
  section: 'Тінь: Покара славою (1935–1939)'
  words: 1600
- points:
  - >-
    Поглинання режимом: заступник голови Ради Міністрів УРСР (1943–1949), депутат
    Верховної Ради, член ЦК КПУ; лауреат радянських державних премій.
  - >-
    [!decolonization] Використання набутого імунітету для збереження української
    культури: керівництво 17-томною Українською радянською енциклопедією та
    ініціювання реабілітації репресованих письменників (Куліш,
    Антоненко-Давидович та ін.) під час «відлиги» 1956 р.
  - >-
    Пізній філософський період: переклади (зокрема «Витязь у тигровій шкурі»
    Шоти Руставелі, поезія Рільке) та поема «Нічні роздуми старого майстра»
    (1976). Смерть 23 листопада 1983 р. в Києві з природних причин.
  - >-
    Складна спадщина: спротив і радянській хвалі-монументу «вірного академіка»,
    і російському привласненню, що ігнорує глибоко українське коріння «Сліпців»
    та «Гетто в Умані».
  section: 'Підсумок: Культура зсередини системи (1940-ті–1983)'
  words: 1000
focus: >-
  Микола Бажан як поет-конструктивіст і експресіоніст, зламаний терором через
  механізм «покари славою», та водночас державний діяч, що захищав українську
  культуру зсередини системи. Аналіз його модернізму, примусу (справа № 1377,
  вербування, орден Леніна) і складних моральних дилем виживання.
