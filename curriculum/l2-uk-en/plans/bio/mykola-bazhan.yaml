objectives:
- >-
  Аналізувати ранній модернізм Бажана (конструктивізм, експресіонізм) на
  прикладі збірки «Будівлі» та поеми «Сліпці».
- Пояснювати механізм «покари славою» через справу № 1377, вербування інформатором та орден Леніна 1939 р.
- Критично оцінювати компроміси митця за сталінізму без однозначної глорифікації чи засудження.
- Розуміти роль Бажана у збереженні української культури (енциклопедія, реабілітації) зсередини репресивної системи.
