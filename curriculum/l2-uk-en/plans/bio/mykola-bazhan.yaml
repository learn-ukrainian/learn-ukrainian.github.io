content_outline:
- points:
  - >-
    [!biography] Знайомство з Миколою Бажаном — блискучим поетом-конструктивістом
    і експресіоністом 1920-х, що став академіком, державним діячем і будівничим
    української культури зсередини радянської системи.
  - >-
    Провокаційне питання: як тримати разом ранній авангард, офіційні радянські
    посади, цензурні обмеження та конкретну працю з культурною пам'яттю, не
    вигадуючи архівних справ або таємних мотивів?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 26 вересня (9 жовтня) 1904 року в Кам'янці-Подільському;
    навчання в Київському інституті зовнішніх відносин у 1923–1925 роках.
  - >-
    [!decolonization] Шлях від футуризму до експресіонізму й неоромантизму;
    український авангард як самостійне культурне поле, а не периферія
    загальнорадянського мистецтва.
  - >-
    «17-ий патруль» 1926 року, «Різьблена тінь» 1927 року й «Будівлі» 1929
    року як джерельно підтверджена послідовність ранніх книжок.
  section: 'Формування: Авангард 1920-х (1904–1920-ті)'
  words: 1000
- points:
  - >-
    «Будівлі» 1929 року й сформований інтенсивно-пластичний, насичений стиль з
    ознаками необароко та прагненням до синтезу мистецтв [S1].
  - >-
    [!epistemic-humility] Каталог «Вибраних поезій» 1940 року встановлює склад
    видання, зокрема «Будівлі», але план не відтворює поетичних рядків без
    сторінкового локатора.
  - >-
    «Гофманова ніч» 1929 року і публікація першої частини «Сліпців» 1933 року;
    дальше друкування «Сліпців» заборонили, а автора таврували як націоналіста.
  - >-
    Стиль: майстер «важкого», скульптурного українського слова — архітектурна
    термінологія, неологізми, щільні алітерації.
  section: 'Діяльність: «Будівлі», «Гофманова ніч» і «Сліпці» (1929–1933)'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Після заборони дальшої публікації «Сліпців» ЕСУ фіксує
    злам у творчості й перехід до офіційного соціалістичного реалізму з
    сакралізацією комуністичних лідерів і радянської дійсності.
  - >-
    Високі державні та письменницькі посади: заступник Голови Ради Міністрів
    УРСР у 1943–1948 роках, голова Спілки письменників України у 1953–1959
    роках, головний редактор УРЕ у 1958–1983 роках.
  - >-
    [!myth-buster] Посада й відзнака не є доказом приватного мотиву. Прийнятий
    набір обмежує план перевіреною видавничою та посадовою хронологією без
    додавання тяжких біографічних звинувачень з інших матеріалів.
  - >-
    Поему «Дебора» після публікації у «Вітчизні» 1968 року заборонили
    передруковувати. Пізній офіційний статус не усував меж державного контролю
    над друком.
  section: 'Тінь: Заборона, офіційний стиль і межі друку'
  words: 1600
- points:
  - >-
    Документована посадова хронологія: заступник Голови Ради Міністрів УРСР
    у 1943–1948 роках, голова СПУ у 1953–1959 роках і головний редактор УРЕ
    у 1958–1983 роках.
  - >-
    [!decolonization] У межах офіційної ідеології Бажан домагався дозволу на
    статті УРЕ про проскрибованих українських діячів культури — Олександра
    Архипенка, Івана Падалку та братів Бойчуків [S1].
  - >-
    Пізній період: повернення до української тематики, переклади творів
    Гельдерліна, Норвіда, Рільке та Руставелі, «Нічні роздуми старого майстра»
    1976 року. Смерть 23 листопада 1983 року в Києві.
  - >-
    Складна спадщина: спротив і радянській монументалізації «вірного академіка»,
    і російському привласненню, що ігнорує українську мову раннього авангарду,
    «Сліпців» та пізню працю з культурною пам'яттю.
  section: 'Підсумок: Культура зсередини системи (1940-ті–1983)'
  words: 1000
