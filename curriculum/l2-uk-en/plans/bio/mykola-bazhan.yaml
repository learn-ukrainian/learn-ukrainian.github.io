objectives:
- >-
  Аналізувати ранній модернізм Бажана на прикладі джерельних характеристик
  «Будівель» і хронології «Сліпців» 1933 року.
- Пояснювати зв'язок між забороною друку, переходом до офіційної поетики та пізнішими інституційними ролями.
- Критично оцінювати посади й відзнаки без приписування приватних мотивів або непідтверджених архівних обставин.
- Розуміти конкретну працю Бажана в УРЕ щодо статей про проскрибованих українських митців у межах офіційної ідеології.
