content_outline:
- points:
  - 'Провокація: під Говтвою Острянин переграв коронне військо, а за кілька тижнів кампанія розсипалася. Чому виграна битва не виграє війни?'
  - '[!biography] Знайомство з постаттю, чиє повстання 1638 року стало останнім великим козацьким виступом перед Хмельниччиною.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Говтва як доказ козацького військового вміння — терен, шанці, обхід, артилерія.'
  - 'Позиція 2: правовий і воєнний лад 1638 року означав, що навіть перемога не давала тривкого статусу; сила системи переважила успіх одного бою.'
  - '[!decolonization] Ворожий щоденник Окольського і прокозацький літопис Величка — два різні джерельні шари про ті самі події; читаємо їх як позиції, а не як прозорий факт.'
  - '[!epistemic-humility] Мова про «втечу» Острянина під Жовнином — це джерельний словник, а не моральний присуд; відхід був задокументованим зламом лідерства, а не зрадою за визначенням.'
  section: 'Конфліктна карта: Перемога, що не втрималася'
  words: 900
- points:
  - 'Перший певний шар: 1633 року Острянин згаданий як полковник реєстрових козаків у польсько-московській війні 1632-1634 років — це не історія довічного нереєстрового вигнанця.'
  - 'Осінь 1637 року: організація повстанських загонів на Полтавщині після поразки Павлюка — післяпоразкова мобілізація, а не повтор біографії Павлюка.'
  - 'Реєстр як примус: після 1637 року козацьке самоврядування звужували, тож вибір між реєстровою службою і повстанням був вибором під тиском.'
  - '[!epistemic-humility] Місце народження (Остер за IEU) і варіанти імені (Стефан-Криштоф у величкових універсалах) подаємо як джерельні проблеми, а не як тверді факти.'
  section: 'Формування: Реєстровий полковник, що став повстанцем'
  words: 1000
- points:
  - 'Обрання й універсали: навесні 1638 року Острянина обрали гетьманом нереєстрових козаків; перед виходом на волость він розіслав універсали із закликом до боротьби.'
  - 'Початок кампанії: разом зі Скиданом і Гунею повстанці здобули Кременчук, Хорол, Говтву й інші лівобережні містечка.'
  - 'Говтва, 5-6 травня 1638 року: перемога. Повстанці використали природні й насипані укріплення, обхідний маневр і артилерію та змусили Станіслава Потоцького відійти до Лубен.'
  - 'Лубни й Жовнин: після невдалого бою під Лубнами Острянин відступив до Жовнина й поставив укріплений табір над Сулою, чекаючи підмоги з Київщини.'
  section: 'Діяльність: Говтва, Лубни, Жовнин'
  words: 1300
- points:
  - '[!anti-hagiography] У бою 30-31 травня Острянин із частиною козаків залишив табір, перейшов Сулу й рушив на Слобідську Україну; рештки очолив уже Дмитро Гуня. Відхід можна читати як порятунок і як залишення — обидва прочитання джерельні.'
  - '[!myth-buster] Заснування Чугуєва Острянином — сильна пам''ять Слобожанщини, але деталі дозволу, чисел і хронології потребують московсько-прикордонних джерел.'
  - Реєстрові козаки, кинуті проти повстанців, — не позачасові «зрадники»; це служилий стан під примусом, платнею і комісарським контролем.
  - Смерть 1641 року від рук колишніх прихильників біля Чугуєва подаємо як безпечний підсумок, без вигаданої сцени та мотиву.
  section: 'Тінь: Відхід під Жовнином і Слобідська Україна'
  words: 900
- points:
  - 'Повернення до розминки: чому тактичний успіх не переріс у політичний результат — порівнюємо з пізнішою Хмельниччиною.'
  - 'Правовий підсумок: ординація 1638 року поставила над реєстром комісара замість гетьмана, запровадила паспорти на рух до Запорожжя й гарнізонну службу.'
  - 'Слобідський слід: близько тисячі переселенців осіли біля Чугуєва — це маркер міграції, а не проста легенда заснування.'
  - '[!decolonization] Чому регіональна й патріотична пам''ять роблять із Острянина то простого визволителя, то невдаху — і що дає уважне читання джерел.'
  section: 'Дискусія та підсумок: Остання велика передхмельниччина'
  words: 700
focus: The 1638 uprising of Yakiv Ostrianyn, his path from registered colonel to hetman of the unregistered Cossacks, the tactical victory at Hovtva set against the strategic collapse at Zhovnyn, the departure to Slobidska Ukraine and Chuhuiv, and the coercive 1638 ordinance.
