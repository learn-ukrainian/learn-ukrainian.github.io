content_outline:
- points:
  - 'Джерельне питання: як відокремити біографію режисера від інституційного образу лауреата правозахисної премії та датованого військового статусу?'
  - 'Відмова від анонімних або циркулюючих цитат: кожне особисте висловлювання потребує прямого джерела й локатора.'
  - '[!biography] Хронологія кіно, затримання, ув''язнення, звільнення та пізнішого інтерв''ю без перетворення особи на символ.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: чим відрізняються російське обвинувачення, вирок військового суду та оцінка Amnesty International, процитована Європарламентом?'
  - 'Дебат 2: як нагородна інституція конструює правозахисну рамку і які факти вона прямо підтримує?'
  - '[!decolonization] Називати російську окупацію Криму й суб''єкта державного переслідування, не узагальнюючи всіх кримчан через одну постать.'
  - '[!epistemic-humility] Не встановлювати юридичні факти, мотиви або допустимість дій понад те, що прямо подають джерела.'
  section: 'Конфліктна карта: Обвинувачення, вирок і оцінка процесу'
  words: 900
- points:
  - Народження в Сімферополі 1976 року, економічна освіта й початок кінокар'єри за профілем Шевченківського комітету.
  - Фільм «Гамер» і початок роботи над «Носорогом» як документовані етапи, без психологічного тлумачення сюжетів.
  - Діяльність під час російської окупації Криму в описі української інституції, жанр якої треба враховувати.
  - Затримання 2014 року й двадцятирічний вирок 2015 року; оцінку процесу як несправедливого атрибутувати Amnesty через Європарламент.
  section: 'Формування: Від кримського кіновиробництва до російського ув''язнення'
  words: 1000
- points:
  - Для тематичного аналізу фільмів і книжок потрібен законний текст або перегляд; біографічні профілі не підтримують твердження про «пророцтво».
  - Європарламент фіксує голодування від середини травня до 6 жовтня 2018 року й називає причину його припинення.
  - Премія Сахарова 2018 року та звільнення 7 вересня 2019 року за датованою сторінкою Європарламенту.
  - Інтерв'ю Укрінформу 6 липня 2024 року як первинне висловлювання про війну, мобілізацію й комунікацію з суспільством.
  section: 'Діяльність: Кіно, протест і публічні виступи'
  words: 1300
- points:
  - '[!anti-hagiography] Нагорода й досвід ув''язнення не доводять правильності кожного пізнішого політичного або військового судження.'
  - Військовий статус у матеріалі Укрінформу є датованим фактом 2024 року, а не безстроковою характеристикою.
  - '[!myth-buster] Історію кримського спротиву не зводити до одного відомого учасника; цей пакет не оцінює весь рух.'
  - Не виводити психологічні наслідки бойового досвіду без прямого й етично придатного джерела.
  section: 'Межі джерел: Нагородна рецепція й датований військовий статус'
  words: 900
- points:
  - Повернення до розминки з часовою лінією та позначенням жанру кожного джерела.
  - '[!decolonization] Не трактувати російськомовність кримчанина як недостатню українськість або як етап, який треба «подолати».'
  - Порівняння інституційної мови Європарламенту з прямою аргументацією в інтерв'ю Укрінформу.
  - Не прогнозувати майбутню політичну роль Сенцова або розвиток подій у Криму без джерел.
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Джерельно обмежений аналіз кінокар'єри Олега Сенцова, російського переслідування, інституційної правозахисної рецепції та його військового статусу станом на датоване інтерв'ю 2024 року.
level: BIO
module: bio-188
objectives:
- Побудувати атрибутовану хронологію кінокар'єри, затримання, ув'язнення, звільнення та військової служби Олега Сенцова станом на інтерв'ю 2024 року.
- Розрізняти російське обвинувачення, вирок військового суду, оцінку процесу Amnesty International та нагородне рішення Європарламенту.
- Порівняти межі нагородного профілю, сторінки Премії Сахарова й датованого інтерв'ю без висновків про мотиви або внутрішні конфлікти.
- Формулювати висновки про роль митця під час війни лише за датованими прямими твердженнями й точно названим статусом.
pedagogy: CBI
