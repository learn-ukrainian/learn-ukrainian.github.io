content_outline:
- points:
  - 'Провокація: Як режисер, що знімає кіно про бандитів 90-х, перетворюється на моральний авторитет нації та штурмовика ЗСУ?
    Парадокс Олега Сенцова.'
  - 'Цитата без автора: «Якщо нас усіх ув''язнять, хто ж тоді буде боротися?» — запросити студентів вгадати, хто і в якій
    ситуації міг це сказати.'
  - '[!biography] Сенцов як символ незламності та глобальної адвокації прав людини.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Внутрішньоукраїнський): Сенцов — митець чи політик? Дискусія про те, чи може художник залишатися поза політикою
    під час війни, і про право митця бути моральним авторитетом.'
  - 'Дебат 2 (Міжнародний): «Терорист» (версія Кремля) vs «В''язень сумління» (версія Amnesty International). Як один і той
    самий вчинок — спротив окупації — отримує діаметрально протилежні юридичні та етичні оцінки?'
  - '[!decolonization] Аналіз російської пропаганди: як створювався образ «кримського терориста» для дискредитації українського
    спротиву в Криму.'
  - '[!epistemic-humility] Визнання складності: чи всі методи спротиву є прийнятними? Де проходить межа, яку міжнародне право
    визначає як «збройний опір»?'
  section: 'Конфліктна карта: Терорист чи в''язень сумління?'
  words: 900
- points:
  - 'Кримське коріння: дитинство та навчання в Сімферополі, формування проукраїнської позиції в русифікованому середовищі.'
  - 'Перші кроки в кіно: фільм «Гамер» як спроба осмислити пострадянську реальність, в якій він ріс.'
  - 'Поворотний момент: участь у Євромайдані та активний спротив анексії Криму у 2014 році — свідомий вибір, що змінив усе.'
  - 'Арешт, тортури, сфабрикований процес: перетворення на політв''язня №1 та символ для тисяч інших.'
  section: 'Формування: Від кримських знімальних майданчиків до сибірських бараків'
  words: 1000
- points:
  - 'Кіно до в''язниці: «Гамер» і «Носоріг» — аналіз тем насильства, вибору та спокути, які виявилися пророчими.'
  - 'Література в неволі: збірки «Маркетер», «Жизня» — як тюремний досвід перетворився на екзистенційну прозу. Чи є це продовженням
    табірної літератури?'
  - 'Голодування 2018 року: 145 днів на межі життя і смерті. Аналіз цього вчинку не як самогубства, а як політичного інструменту
    та найвищої форми мистецького перформансу.'
  - 'Кіно після звільнення: «Реал» — унікальний приклад, коли режисер фіксує війну не збоку, а зсередини, будучи її безпосереднім
    учасником.'
  section: 'Діяльність: Творчість як форма опору'
  words: 1300
- points:
  - '[!anti-hagiography] Безкомпромісність як вада: чи не заважає жорстка позиція Сенцова будувати діалог і чи не відштовхує
    вона потенційних союзників?'
  - «Воїн-інтелектуал» чи солдат, що втратив професію? Дискусія про те, чи є служба в ЗСУ для митця найвищим проявом патріотизму,
    чи трагедією для культури, що втрачає голос.
  - '[!myth-buster] Сенцов — не «один у полі воїн». Розгляд його ролі в контексті широкого руху спротиву в Криму, щоб уникнути
    міфу про єдиного героя.'
  - 'Моральна ціна війни: як участь у штурмових діях та бачення смерті впливають на гуманістичні ідеали, які він відстоював
    у в''язниці?'
  section: 'Тінь: Ціна незламності'
  words: 900
- points:
  - 'Повернення до розминки: хто такий Олег Сенцов сьогодні — режисер, воїн, політик, символ? Студент формулює власну відповідь.'
  - '[!decolonization] Сенцов як живий приклад деколонізації свідомості: від російськомовного кримчанина до україноцентричного
    воїна-інтелектуала.'
  - 'Його голос у світі: аналіз виступів у Європарламенті. Чому його слова про зброю звучать переконливіше, ніж слова багатьох
    політиків?'
  - 'Майбутнє: яку роль Сенцов може відіграти у деокупованому Криму? Чи є його досвід універсальним для примирення та реінтеграції?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Анти-агіографічний аналіз трансформації Олега Сенцова від режисера до політв'язня та воїна ЗСУ, досліджуючи моральну
  ціну незламності та конфліктні інтерпретації його постаті.
