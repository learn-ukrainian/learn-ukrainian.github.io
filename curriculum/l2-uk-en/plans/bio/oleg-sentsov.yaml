objectives:
- Критично аналізувати трансформацію особистості в екстремальних умовах (від режисера до воїна).
- Розрізняти та деконструювати пропагандистські та гуманістичні наративи на прикладі справи Сенцова.
- Застосовувати концепцію «анти-агіографії» для аналізу біографії, виявляючи внутрішні конфлікти та моральні неоднозначності.
- Формулювати аргументовану позицію щодо ролі митця під час війни та етичних дилем, що з цим пов'язані.
