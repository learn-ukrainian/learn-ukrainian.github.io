content_outline:
- points:
  - >-
    [!biography] Знайомство з Олександром Мацієвським: боєць 119-ї бригади
    територіальної оборони, який став символом незламності та гідності.
  - >-
    Провокаційне питання: як два слова, вимовлені беззбройною людиною під примусом,
    можуть стати вироком для виконавців і свідченням для світу?
  section: Розминка
  words: 400
- points:
  - >-
    Походження та життя: народження у Кишиневі (Молдова), переїзд родини до Ніжина.
    Робота за цивільними спеціальностями.
  - >-
    Початок повномасштабного вторгнення: добровільний вступ до територіальної оборони
    після 24 лютого 2022 року (163-й батальйон).
  - >-
    [!anti-hagiography] Важливість контексту: Мацієвський — це не просто образ
    із відео, а реальна людина зі своєю географією (Молдова — Ніжин), родиною та шляхом солдата.
  section: 'Формування: Цивільне життя і територіальна оборона'
  words: 1000
- points:
  - >-
    Останній бій: бойове зіткнення 30 грудня 2022 року поблизу Соледара на Донеччині;
    зникнення безвісти разом із чотирма побратимами.
  - >-
    Родинне свідчення: остання телефонна розмова з матір'ю ("Мамо, я ніколи не здамся
    у полон") як приватна обіцянка, що передувала публічному вчинку.
  - >-
    Поява відео у березні 2023 року: запис страти військовополоненого російськими
    військовими після слів "Слава Україні!".
  section: 'Діяльність: Соледар та останній бій'
  words: 1200
- points:
  - >-
    Механізм воєнного злочину: страта беззбройного полоненого як грубе порушення
    міжнародного гуманітарного права.
  - >-
    [!epistemic-humility] Шлях до істини: первинна невизначеність щодо особи на відео
    та подальша верифікація (впізнання родиною, підтвердження підрозділом, робота СБУ).
  - >-
    [!myth-buster] Протидія російській пропаганді: спростування спроб дезінформації
    та знецінення візуального доказу через офіційні процедури підтвердження особи.
  section: 'Тінь: Страта і свідчення'
  words: 1600
- points:
  - >-
    Державне визнання: указ Президента про присвоєння звання Героя України (2023).
  - >-
    Пам'ять: мурали, перейменування вулиць, пам'ятники, визнання з боку Молдови.
  - >-
    Етика пам'ятання: необхідність говорити про юридичну та моральну суть злочину,
    уникаючи демонстрації сцен насилля як видовища.
  section: 'Підсумок: Свідчення гідності'
  words: 1000
