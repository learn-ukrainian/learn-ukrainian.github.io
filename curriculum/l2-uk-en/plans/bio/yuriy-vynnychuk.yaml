content_outline:
- points:
  - 'Провокація: Юрій Винничук — літописець чи містифікатор Львова? Як вигадування історії може бути способом її збереження?'
  - '[!biography] Факт чи фікція? Студентам пропонується короткий фрагмент тексту з «Легенд Львова» — вони мають вгадати,
    чи ця історія є справжньою, чи вигаданою Винничуком.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Етика містифікації. Чи є гра Винничука з історичними фактами невинним художнім прийомом, чи це небезпечна маніпуляція
    пам''яттю, особливо в країні, що бореться за свою історію?'
  - 'Дебат 2: Сприйняття автора. Винничук — це андеграундний дисидент, що боровся з системою, чи постмодерний естет, що грався
    у власне задоволення? Як змінилося його сприйняття від радянських часів до комерційного успіху?'
  - '[!epistemic-humility] Позиція 1: Винничук — деконструктор імперських міфів, що використовує іронію для звільнення історії.
    Позиція 2: Його ігри з минулим розмивають правду і можуть бути використані ворожою пропагандою.'
  - '[!decolonization] Як Винничук «повертає» Львову його мультикультурну, дорадянську історію, яка була витіснена уніфікованою
    радянською історіографією.'
  section: 'Конфліктна карта: Між фактом та фікцією'
  words: 900
- points:
  - Народження у Львові (1952) — світ дитинства у повоєнному місті, повному привидів минулого та відлуння багатокультурної
    історії.
  - 'Формуючі впливи: родинні історії, атмосфера старих вуличок, «батярська» культура як форма мовчазного спротиву радянській
    уніфікації.'
  - 'Рання творчість в умовах цензури: перші літературні спроби, участь в андеграундних колах, поширення творів через самвидав.'
  section: 'Формування: Львівський хлопчик в радянській імперії'
  words: 1000
- points:
  - 'Літературний проект «Легенди Львова»: аналіз того, як створений автором корпус псевдоісторичних текстів сам став частиною
    сучасної міської міфології.'
  - 'Вершина творчості — роман «Танґо смерті». Аналіз ключових тем: Голокост, складні українсько-польсько-єврейські стосунки,
    механізми пам''яті та забуття.'
  - Винничук як «колекціонер» міських історій та архіваріус повсякденності. Використання первинних джерел — їхня інтерпретація
    та трансформація в художній текст.
  section: 'Діяльність: Створення львівського міфу'
  words: 1300
- points:
  - '[!anti-hagiography] Звинувачення в ескапізмі: чи не є ностальгія за ідеалізованим минулим (Австро-Угорщина, міжвоєнна
    Польща) втечею від складних проблем сучасності?'
  - Конфлікти з консервативною частиною суспільства через «надмірну» еротичність та використання грубої мови в деяких творах.
  - '[!myth-buster] Спростування міфу про «аполітичність» Винничука. Аналіз його гострої публіцистики та чіткої громадської
    позиції, особливо після 2014 року.'
  - 'Питання відповідальності: чи усвідомлював автор, що його містифікації будуть сприйняті як реальні факти, і які наслідки
    це може мати?'
  section: 'Тінь: Ціна гри'
  words: 900
- points:
  - 'Повернення до розминки: То хто такий Винничук — казкар чи історик? Студент формулює власну аргументовану відповідь, спираючись
    на матеріал модуля.'
  - '[!decolonization] Оцінка ролі Винничука у відновленні історичної пам''яті та створенні популярного українського наративу
    про Львів, що протистоїть імперським поглядам.'
  - Сучасні проекти, громадська діяльність та вплив на молоде покоління українських письменників.
  - 'Значення для української культури: Винничук як той, хто навчив українців «гратися» зі своєю історією, не втрачаючи до
    неї поваги, а також іронічно ставитися до самих себе.'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Yuriy Vynnychuk's biography, his role as a master of literary mystification, his connection to Lviv, and the interplay
  between fact and fiction in his work, particularly 'Tango of Death'
level: BIO
