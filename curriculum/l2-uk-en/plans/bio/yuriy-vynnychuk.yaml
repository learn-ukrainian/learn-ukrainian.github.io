objectives:
- Аналізувати творчість Юрія Винничука як феномен українського постмодернізму
- Критично оцінювати роль літературної містифікації у конструюванні історичної пам'яті
- Визначати ключові риси художнього світу Винничука, зокрема образу Львова
- Формулювати власну позицію щодо етичних аспектів гри з історичними фактами в літературі
