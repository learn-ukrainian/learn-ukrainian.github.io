content_outline:
- points:
  - 'Парадокс: як найбагатший магнат Речі Посполитої, інтегрований у політичну систему католицької держави, став головним
    оборонцем православ''я та руської ідентичності?'
  - '[!biography] Представлення фігури як «некоронованого короля Русі» — не монарха, а найвпливовішого гравця.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Освітня модель Острозького (православний гуманізм) vs модель єзуїтів (контрреформаційна полеміка). Це була конкуренція
    за душі чи за вплив?'
  - 'Дебат 2: Радянська історіографія (Острозький як «класовий ворог», феодал-експлуататор) vs сучасний національний наратив
    (Острозький як «батько нації», просвітник). Де правда?'
  - '[!epistemic-humility] Визнання, що Острозький міг бути і тим, і іншим одночасно: щиро віруючим меценатом і жорстким політиком,
    що захищав свої статки та владу.'
  section: 'Конфліктна карта: Захисник віри чи прагматичний олігарх?'
  words: 900
- points:
  - 'Походження: син Костянтина Івановича Острозького, переможця під Оршею. Спадщина військової слави роду.'
  - 'Історичний контекст: Люблінська унія (1569) і перехід Волині під польську корону. Реформація та Контрреформація як глобальні
    виклики.'
  - 'Криза православ''я: занепад освіти, втрата елітою своєї ідентичності. Острозький усвідомлює, що без культурного фундаменту
    православ''я приречене.'
  section: 'Формування: Спадкоємець «некоронованих королів»'
  words: 1000
- points:
  - 'Острозька академія (1576): перший вищий навчальний заклад у Східній Європі. Синтез греко-візантійської та західноєвропейської
    латинської традицій.'
  - 'Острозька друкарня та Біблія (1581): видання першого повного друкованого тексту Біблії церковнослов''янською мовою. Канонізація
    мови та тексту, що став стандартом на століття.'
  - 'Інтелектуальний гурток: Іван Федоров, Герасим Смотрицький, Іов Борецький. Острозький як меценат, що зібрав найкращі уми
    для реалізації свого проєкту.'
  - 'Політична діяльність: воєвода київський, маршалок волинський. Використання політичної влади для захисту православних.'
  section: 'Діяльність: Культурне державотворення — Острог як «Волинські Афіни»'
  words: 1300
- points:
  - '[!anti-hagiography] Джерело багатства: Острозький був найбільшим олігархом своєї доби. Його статки базувалися на жорсткій
    експлуатації тисяч українських селян. Його просвітництво не було демократичним.'
  - 'Політичні компроміси: як сенатор Речі Посполитої, він мусив іти на поступки, що іноді суперечили інтересам Русі, для
    збереження власного статусу.'
  - '[!myth-buster] Найбільша поразка: обидва його сини, Януш та Костянтин, перейшли в католицизм. Людина, що присвятила життя
    обороні православ''я, не змогла зберегти в ньому власних дітей. Це трагедія, що ставить під сумнів успішність його життєвої
    місії.'
  section: 'Тінь: Ціна могутності та особиста трагедія'
  words: 900
- points:
  - 'Повернення до парадоксу: чи була його діяльність успішною? Навіть якщо його рід згас у католицизмі, створені ним інституції
    (Академія, Біблія) пережили його і стали фундаментом для наступних поколінь (Могилянська академія).'
  - '[!decolonization] Спадщина Острозького стала полем битви для різних наративів. Російська імперія намагалася привласнити
    його як «захисника православ''я», ігноруючи його руську (українську) ідентичність.'
  - 'Сучасне значення: Острозький є символом стратегії «м''якої сили» — розбудови держави через культуру та освіту. Наскільки
    цей урок актуальний для України сьогодні?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Kostiantyn-Vasyl Ostrozky — richest magnate of the Commonwealth, "uncrowned king of Rus", patron of Ostroh Academy
  & Bible. Focus on his 'state-building by culture' strategy, the paradox of his immense wealth vs. defense of Orthodoxy,
  and the lasting legacy of his educational projects.
level: BIO
module: bio-016
objectives:
- Аналізувати роль Костянтина-Василя Острозького як політичного діяча та культурного мецената.
- Пояснювати історичний контекст, що зумовив появу Острозької академії та Острозької Біблії.
- Критично оцінювати спадщину Острозького, враховуючи як його досягнення, так і його невдачі та моральні компроміси.
- Розрізняти та аналізувати різні історіографічні інтерпретації постаті Острозького (радянську, національну, сучасну критичну).
