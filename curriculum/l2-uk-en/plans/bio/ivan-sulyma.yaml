content_outline:
  - points:
      - 'Провокація: одна людина за ніч зруйнувала нову королівську фортецю — і за
        кілька місяців втратила все. Чому зруйнувати Кодак було можливо, а втримати
        владу — ні?'
      - '[!biography] Знайомство з постаттю, чиє ім''я стало символом опору примусовій
        інфраструктурі Речі Посполитої на дніпровському пограниччі.'
    section: Розминка
    words: 400
  - points:
      - 'Позиція 1: погляд Речі Посполитої. Кодак — засіб порядку, а напад на нього
        — «свавілля» й «бунт», що підлягає покаранню.'
      - 'Позиція 2: козацький погляд. Фортеця перерізала звичний шлях між Січчю та
        волостю, тож її знищення поставало як відновлення свободи руху.'
      - '[!decolonization] Кодак — не просто місце битви, а механізм: він мав зробити
        козацьку рухливість «видимою» й керованою. Аналізуємо подію через українські
        інтереси, а не через імперський ярлик «розбою».'
      - '[!epistemic-humility] Особистих джерел від самого Сулими не збереглося. Ми
        знаємо його через свідчення ворогів і пізніших прихильників — тож кожен «факт»
        потребує питання: хто це записав і навіщо?'
    section: 'Конфліктна карта: Інфраструктура контролю чи народний спротив?'
    words: 900
  - points:
      - 'Походження: дрібний шляхтич із Чернігівщини, що довго служив управителем
        маєтків магнатських родів під Борисполем — не стихійний народний месник, а
        людина пограничної служби.'
      - 'Перехід у козацьке життя: ЕІУ пояснює його магнатським утиском, але точний
        особистий злам і мотиви лишаються джерельно тонкими — про це говоримо обережно.'
      - 'Запорозька кар''єра: обрання кошовим отаманом, перша згадка як козацького
        гетьмана 1628 року; участь у походах проти османських і татарських сил на
        чорноморському пограниччі.'
      - '[!epistemic-humility] Переказ про папську медаль (через Радзивілла й Щербака)
        звучить привабливо, але його немає в базовій статті ЕІУ — тримаємо як джерелочутливу
        традицію, не як шкільний факт.'
    section: 'Формування: Від управителя маєтку до кошового'
    words: 1000
  - points:
      - 'Навіщо Кодак: улітку 1635 року фортецю збудували на правому березі Дніпра,
        щоб ізолювати Січ від підвладних Речі Посполитій земель; інженером був Боплан,
        залогою з близько 200 найманців командував Жан Маріон.'
      - 'Здобуття: у ніч на 11-12 серпня 1635 року (за ЕІУ) козаки під проводом Сулими
        взяли Кодак і знищили залогу; точну дату варто подавати з покликанням на джерело.'
      - 'Після Кодака: рух угору Дніпром до Кременчука й Крилова, розсилання універсалів
        із закликом до людності; ширші плани Ковалець реконструює обережно, бо джерел
        мало.'
      - 'Придушення: комісари Адам Кисіль і Лукаш Жолкевський зібрали проти повстанців
        реєстрових козаків; після оборони на дніпровському острові реєстровці схопили
        Сулиму й видали владі.'
    section: 'Діяльність: Кодак і повстання 1635 року'
    words: 1300
  - points:
      - '[!anti-hagiography] Залогу Кодака знищили. Це не «чисте визволення»: примус
        інфраструктури й повстанське насильство треба показувати разом, а не вибирати
        зручну половину.'
      - '[!myth-buster] Реєстрові козаки — не позачасові «зрадники». Вони діяли всередині
        примусового ладу реєстру, платні й служби, і комісари використали їх проти
        нереєстрових.'
      - Джерельна мова про «зраду» й видачу яскрава, але це словник Львівського
        літопису, а не нейтральний присуд оповідача.
      - '[!myth-buster] Страта у Варшаві стала мартирологічною пам''яттю; водночас
        число страчених, деталі кари й «медаль у труні» потребують звірки джерельних
        видань.'
    section: 'Тінь: Насильство, реєстр і страта'
    words: 900
  - points:
      - 'Повернення до розминки: чому руйнування фортеці не перетворилося на тривку
        владу? Порівнюємо з Наливайком і пізнішою перемогою Хмельниччини.'
      - 'Спадщина: рід Сулими став козацько-старшинською лінією (Sulimovskii arkhiv),
        але це не доказ, що повстання 1635 року було проєктом еліти.'
      - 'Літературна пам''ять: повість Андріана Кащенка «Над Кодацьким порогом» (1913)
        зробила Сулиму популярним героєм історичної фікції — це пізніший переказ,
        а не документальна біографія.'
      - '[!decolonization] Чому і імперський «розбій», і радянська «класова боротьба»,
        і патріотична канонізація однаково спрощують постать — і що дає повернення
        Сулими крізь джерела.'
    section: 'Дискусія та підсумок: Пам''ять про Кодак'
    words: 700
focus: The 1635 uprising of Ivan Sulyma against the Kodak fortress, the register
  and infrastructure that tried to control Cossack movement and status, his
  execution in Warsaw, and a contested memory suspended between Commonwealth
  "disorder", martyr legend, and later historical fiction.
