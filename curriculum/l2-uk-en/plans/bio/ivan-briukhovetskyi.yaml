content_outline:
- points:
  - 'Провокація: він здобув владу на антиелітній риториці й московській підтримці, а потім підписав статті, що звузили суверенітет Гетьманщини майже до козацького станового самоврядування. Як популізм став інкорпорацією?'
  - '[!biography] Знайомство з постаттю, чия біографія — це не мораліте про «поганий натовп», а історія про те, як імперія використала внутрішній конфлікт, соціальну кривду й мову протекції.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: Брюховецький промовляв до справжнього обурення проти елітного збагачення й старшинського панування — серед січовиків, рядового козацтва, міщан і бідніших верств.'
  - 'Позиція 2: він же використав ці кривди, щоб здобути владу під московським патронатом; результатом стала не народна суверенність, а поглиблена залежність.'
  - '[!decolonization] Чорна рада 1663 року відбулася під царською інструкцією й за військової присутності Москви — ЕІУ наголошує, що результат елекції був фактично наперед сформований московським рішенням. Імперське спрощення — «розсудливі українці обрали Москву».'
  - '[!epistemic-humility] Народження — близько 1623 року, місце непевне (Диканьку не подаємо як факт); дату Московських статей (11/22 жовтня 1665 р.) не змішуємо між календарями. Головна педагогічна небезпека — теза «народ спричинив Руїну».'
  section: 'Конфліктна карта: Народний гетьман чи демагог?'
  words: 900
- points:
  - '1650-ті: служба при дворі Богдана Хмельницького як старшого слуги; був причетний до опіки над Юрієм Хмельницьким і виконував дипломатичні доручення.'
  - 'Місії: 1656 року — до Трансильванії заради союзу; 1658 року — до Варшави за дорученням Виговського. Це показує його як досвідченого політичного агента, а не випадкового висуванця.'
  - 'Січова політика 1659–1661 років: перехід у середовище Запорожжя, антигетьманська агітація й здобуття авторитету кошового; точні титули й дати різняться за джерелами (IEU: отаман 1661–1663; ЕІУ: кошовий отаман з осені 1659, кошовий гетьман з 1661).'
  - '1661–1663: розбудова кампанії за лівобережну булаву через московські контакти, антистаршинську риторику й підтримку запорозьких і нижчостанових середовищ.'
  section: 'Формування: Від січовика до булави'
  words: 1000
- points:
  - 'Чорна рада під Ніжином (27–28 червня 1663 р. н. ст. / 17–18 червня ст. ст.): обрання лівобережним гетьманом у процесі, сформованому московською підтримкою й соціальним конфліктом.'
  - Батуринські статті 1663 року підтвердили попередню протекторатну рамку й додали зобов'язань (утримання російських військ) — попередник суворішого врегулювання 1665 року.
  - 'Усунення суперників: 1663 року страчено Якима Сомка й Василя Золотаренка; це консолідувало владу, але поглибило кризу легітимності.'
  - 'Московські статті (11/22 жовтня 1665 р.) — найвагоміша інституційна поступка: обмеження зовнішніх зносин, розширення московських гарнізонів і воєвод, перенаправлення податків із некозаків до царської скарбниці, наближення київського церковного питання до Москви; того ж року Брюховецький дістав боярський титул, землі й шлюб із родиною Долгоруких.'
  section: 'Діяльність: Чорна рада і Московські статті'
  words: 1300
- points:
  - '[!anti-hagiography] Не приховуємо його страт, примусу, опортунізму й відповідальності за поступки 1665 року. Особисте піднесення (боярство, шлюб) зробило його ототожнення з московською владою політично вибуховим удома.'
  - '[!myth-buster] «Народ спричинив Руїну» — саме та небезпечна стенограма, якої уникаємо: масова участь була маніпульована, але умови для маніпуляції створили елітний провал та іноземна інтервенція.'
  - Джерельний анкер — клаузула Московських статей «без государския воли до чужих окрестных земель» (гетьман не мав слати послів до сусідів без волі царя). Це адміністративний документ поза літературним корпусом (verify_quote повертає 0.0), тож звіряємо джерельне видання перед цитуванням.
  - 'Розрив 1668 року не був «чистим патріотичним наверненням»: це відповідь на крах власної влади, народний гнів проти Московських статей, Андрусівський поділ і страх, що Москва торгуватиметься з Дорошенком за Лівобережжя. Це не робить антимосковське повстання беззмістовним.'
  section: 'Тінь: Інкорпорація і крах'
  words: 900
- points:
  - 'Повернення до розминки: які кривди були реальні — і як їх конвертували в результат, що ослабив автономію Гетьманщини?'
  - 'Червень 1668 року: під час зближення з військом Дорошенка та на спільній раді лівобережні козаки відкинули й убили Брюховецького; Дорошенко наказав поховати тіло в Гадячі з гетьманськими почестями. Наміру не переоцінюємо без прямого читання джерела.'
  - '[!epistemic-humility] Андрусівське перемир''я 1667 року поділило українські землі між Москвою та Річчю Посполитою без української згоди — контекст, що зробив позицію Брюховецького нестерпною.'
  - '[!decolonization] Чому і російський наратив («розсудливі українці обрали Москву»), і однослівне «зрадник» однаково спрощують запис; а «Чорна рада» Куліша надміру моралізує «чернь».'
  section: 'Дискусія та підсумок: Хто винен у Руїні?'
  words: 700
focus: Ivan Briukhovetskyi as a figure who combined Sich legitimacy, anti-starshyna populism and Moscow support to win the 1663 Black Council under tsarist instruction, eliminated his rivals Somko and Zolotarenko, signed the 1665 Moscow Articles that narrowed Hetmanate sovereignty, was rewarded with a boyar title and a Dolgoruky marriage, and then broke with Moscow in 1668 before being killed by Left-Bank Cossacks — a case for teaching how populism, real grievance and imperial leverage can overlap without the 'the people caused the Ruin' shortcut.
