module: bio-040
objectives:
- Пояснювати, як соціальна кривда проти старшинських привілеїв була конвертована в політичний результат, що звузив автономію Гетьманщини
- Аналізувати Московські статті 1665 року як механізм інкорпорації (гарнізони, воєводи, фіскальні й церковні клаузули), а не лише особисту моральну поразку
- Розрізняти аґентність Брюховецького й московський тиск, не приховуючи ні його опортунізму, ні нерівних умов
- Практикувати обережну причинну мову («сприяв», «уможливив», «використав», «пришвидшив»), уникаючи стенограми «народ винен»
