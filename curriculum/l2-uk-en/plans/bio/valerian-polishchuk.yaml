content_outline:
- points:
  - >-
    [!biography] Знайомство з Валер'яном Львовичем Поліщуком: поет, прозаїк, критик і організатор групи «Авангард»,
    чий авангардний регістр намагає на техніку та космос.
  - >-
    Провокаційне питання: чи можна звести поета-конструктора лише до «жертви Сандармоху», не втрачаючи його модерністський вимір?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 1 жовтня 1897 року у селі Більче (Волинська губернія; нині Рівненська область).
  - >-
    Навчання в Катеринославі та Петрограді/Кам'янець-Подільському контексті; революційна журналістика та організаційна діяльність.
  - >-
    [!decolonization] Поліщук доказує, що українська модерність могла описувати радіо, метал, електрику і вугілля українською мовою — а не була «епігоном» російської культури.
  section: 'Формування: Від Волині до авангарду'
  words: 1000
- points:
  - >-
    Збірки: *Соняшна міть* (1920), *Вибухи сили* (1921), *Книга повстань* (1922), *Радіо в житах* (1923),
    *Геніяльні кристали* (1927), *Металевий тембр* (1927), *Електричні заграви* (1929).
  - >-
    Конструктивізм та індустріальна лексика — завдання відділити програмні рядки від ліричної щільності та модерністської новизни.
  - >-
    [!anti-hagiography] Деякі твори можуть здаватися програмними — це не причина зводити автора лише до слоганів чи жертви терору.
  section: 'Діяльність: Конструктивізм та індустріальна лірика'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Обшук квартири 5 грудня 1934 року; затримання з 6 грудня. Сфабриковане звинувачення в контрреволюційній справі — поліцейська мова, не факт.
  - >-
    Закритий суд у Києві 27–28 березня 1935 року — 10 років таборів.
  - >-
    Друга фаза терору: ув'язнення в системі Соловків; рішення особливої трійки УНКВД
    Ленінградської області 9 жовтня 1937 року; розстріл 3 листопада 1937 року в
    Сандармоху, Карелія.
  - >-
    [!epistemic-humility] Фальшивий сертифікат про смерть 17 березня 1942 року від «перитоніту» — артефакт радянського приховання, а не біографічна дата.
  section: 'Тінь: Сфабрикована справа та розстріл у Сандармоху'
  words: 1600
- points:
  - >-
    Доля спадщини: поезія та проза збереглися у бібліотечних записах; архів групи «Авангард» важко відновити окремо.
  - >-
    Сучасне значення: Поліщук як поєднання конструктивізму, індустріальної лірики та механізму приховання після розстрілу.
  - >-
    Кінцеве питання: як відновити конструктора без мокри чи без зведення до «жертви Сандармоху»?
  section: 'Підсумок: Конструктор, якого знищив режим'
  words: 1000
focus: >-
  Валер'ян Поліщук як поет-конструктор групи «Авангард» і жертва сфабрикованої контрреволюційної справи; аналіз двофазного механізму репресій та фальшивого сертифіката про смерть.
