content_outline:
- points:
  - 'Парадокс: Як художниця-самоук із бідної селянської родини, що малювала саморобними пензлями, змогла вразити Пабло Пікассо
    і стати іконою українського мистецтва?'
  - '[!biography] Це не просто історія про талант, а про одержимість творчістю всупереч усьому — родині, системі, злидням.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Наївне мистецтво vs Професійний живопис. Чи була Білокур «примітивною» народною майстринею, чи унікальним майстром,
    який просто не мав формальної освіти? Позиції мистецтвознавців.'
  - 'Дебат 2: Радянський міф vs Реальне життя. СРСР створив образ щасливої «художниці з народу», ікону «народного таланту».
    Як цей образ контрастував з її реальним життям в ізоляції, бідності та конфліктах з родиною?'
  - '[!epistemic-humility] Визнання її «народною художницею» було і допомогою, і кліткою, що обмежувала сприйняття її творчості.'
  - '[!decolonization] Переоцінка спадщини Білокур поза радянським наративом: від символу «дружби народів» до уособлення незламного
    українського духу.'
  section: 'Конфліктна карта: Геній чи народна іграшка?'
  words: 900
- points:
  - 'Світ, в якому вона росла: село Богданівка на Полтавщині, патріархальний уклад, де мистецтво вважалося «панською забаганкою».'
  - 'Ранні поворотні моменти: відсутність шкільної освіти, перші спроби малювати вугіллям на шматках тканини.'
  - 'Конфлікт з родиною: опір батьків, які вбачали в її захопленні загрозу «нормальному» життю та шлюбу.'
  - 'Формування унікальної риси: ізоляція від мистецького світу змусила її створити власну техніку, мову та філософію мистецтва.'
  section: 'Формування: Боротьба за право творити (1900-1920-ті)'
  words: 1000
- points:
  - 'Саморобні інструменти: як вона створювала пензлі з котячої шерсті та фарби з рослин і глини, перетворюючи обмеження на
    унікальний стиль.'
  - 'Квіти як головні герої: її композиції — не просто натюрморти, а складні портрети квітів, кожна зі своїм «обличчям» і
    характером.'
  - 'Прорив: відчайдушний лист до співачки Оксани Петрусенко, який зрештою привів до її «відкриття» світом.'
  - 'Визнання та виставки: як самоук з села отримала звання Народної художниці України та виставлялася в Парижі.'
  - 'Легенда про Пікассо: знаменита фраза «Якби у нас була художниця такого рівня майстерності, ми змусили б заговорити про
    неї весь світ» — аналіз міфу та його значення.'
  section: 'Діяльність: Квітковий космос (1920-1950-ті)'
  words: 1300
- points:
  - '[!anti-hagiography] Одержимість мистецтвом як трагедія: офіційне визнання не змінило її побуту. Вона продовжувала жити
    в бідності, страждала від хвороби матері та нерозуміння оточення.'
  - 'Психологічна ціна: глибока самотність, відсутність сім''ї та друзів, періоди відчаю, коли вона знищувала свої роботи.'
  - '[!myth-buster] Міф про «щасливу народну художницю» руйнується її листами, сповненими болю та скарг на злидні й самотність.'
  - 'Критика з боку системи: попри визнання, її звинувачували у «формалізмі» та «відірваності від народу», бо вона малювала
    квіти, а не трактористів.'
  section: 'Тінь: Ціна геніальності (1950-1961)'
  words: 900
- points:
  - 'Повернення до парадокса: як їй це вдалося? Студент формулює відповідь, використовуючи поняття одержимості, внутрішньої
    свободи та унікального бачення.'
  - 'Спадщина: Білокур не просто «наївна» художниця, а одна з ключових постатей українського модернізму, що стояла в одному
    ряду з європейськими майстрами, навіть не знаючи про їхнє існування.'
  - '[!decolonization] Сьогодні її творчість є символом культурного опору — доказ того, що українська культура є глибокою,
    самодостатньою і не потребує зовнішнього визнання для підтвердження своєї величі.'
  - 'Сучасне значення: Катерина Білокур як феміністична ікона — жінка, що всупереч патріархальному суспільству обрала творчий
    шлях і перемогла.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Kateryna Bilokur, analyzing the conflict between her status as a folk artist and a master painter, the
  Soviet myth vs. her reality of poverty, and the immense personal cost of her genius.
level: BIO
module: bio-113
objectives:
- Критично аналізувати життя та спадщину Катерини Білокур, розрізняючи радянський міф та історичну реальність
- Оцінювати її внесок в українське мистецтво в контексті європейського модернізму та наївного мистецтва
- Формулювати аргументовану позицію щодо психологічної та соціальної ціни геніальності на прикладі її долі
- Застосовувати мистецтвознавчу лексику для аналізу її творчого методу та художнього стилю
