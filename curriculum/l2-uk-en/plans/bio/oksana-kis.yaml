objectives:
- Пояснювати, як праці Оксани Кісь змінюють джерельну базу й питання української історії через гендер, усну історію та антропологію
- Аналізувати «вижити значить перемогти» як складний аргумент про агентність, а не як гасло без болю й неоднозначності
- Розрізняти наукову методологію, феміністичну публічну позицію та сучасну адміністративну роль дослідниці
- Формулювати деколонізацію студій ҐУЛАҐу як проблему епістемологічної справедливості
