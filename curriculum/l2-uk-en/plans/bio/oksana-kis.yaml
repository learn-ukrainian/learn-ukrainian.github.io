content_outline:
- points:
  - 'Провокація: якщо жінка в таборі виживає, піклується, свідчить і зберігає мову, чи це «приватне життя» чи історичний опір?'
  - '[!biography] Оксана Кісь — українська історикиня й антропологиня, яка зробила жіночий досвід не додатком до історії, а способом змінити самі питання до джерел.'
  - '[!epistemic-humility] Це жива дослідниця й адміністраторка науки: теперішні посади та повноваження потрібно перевіряти на момент побудови модуля.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1: праці Кісь повертають жінок у статус історичних дієвиць і показують, що архів, тіло, пам''ять, материнство й взаємна підтримка є джерелами історії.'
  - 'Позиція 2: існує ризик перетворити будь-яке виживання на героїчний сюжет і втратити біль, моральну неоднозначність та межі агентності.'
  - '[!decolonization] Її студії ҐУЛАҐу не беруть російський чоловічий дисидентський канон за норму; вони питають, як українські жінки свідчили, діяли й зберігали суб''єктність.'
  - '[!epistemic-humility] Розділяємо наукову методологію, феміністичну публічну позицію й державну дослідницьку адміністрацію; це пов''язані, але не тотожні ролі.'
  section: 'Конфліктна карта: Жіноча історія як додаток чи зміна правил історії?'
  words: 900
- points:
  - 'Львівське академічне формування, історична освіта, психологічна підготовка й етнологія як основа для гендерної антропології.'
  - 'Інститут народознавства НАН України, Українська асоціація дослідниць жіночої історії та усноісторичні ініціативи як інфраструктура поля, а не лише особиста кар''єра.'
  - 'Патріархальний архів: жінки часто з''являлися як жертви, символи або додаток до чоловічої політики; Кісь змінює граматику питання — хто діє і чий документ рахується.'
  - 'Рання праця про жінку в традиційній українській культурі як база для розмови про тіло, працю, сім''ю, норми й модерні зміни.'
  section: 'Формування: Антропологія, архів і феміністичний метод'
  words: 1000
- points:
  - '«Українки в ГУЛАГу: вижити значить перемогти» як центральний текст про щоденну стійкість, тіло, віру, мову, дружбу, материнство й національну ідентичність у таборі.'
  - 'Англомовне видання «Survival as Victory» розширює доступ до українського жіночого досвіду, але міжнародна видимість не є єдиним мірилом цінності праці.'
  - 'Стаття про жіночий досвід Голодомору ставить питання материнства, моральної неоднозначності й виживання без сентименталізації.'
  - '«Як деколонізувати студії ҐУЛАҐу?» вводить поняття епістемологічної справедливості: чиї свідчення формують знання про табори, імперію й Україну.'
  section: 'Діяльність: ҐУЛАҐ, Голодомор і поле жіночої історії'
  words: 1300
- points:
  - '[!anti-hagiography] Фраза «вижити значить перемогти» не має ставати плакатом; її треба тримати поруч із голодом, тілесністю, страхом, утратою й моральною неоднозначністю.'
  - 'Методологічний ризик: жіночий досвід не можна романтизувати як автоматично чистіший або правдивіший; його потрібно читати через джерело, жанр, пам''ять і мовчання.'
  - 'Адміністративна роль у Національному фонді досліджень України від 2025 року не має витісняти її попередній науковий доробок і не дає підстав прогнозувати майбутні політики.'
  - '[!myth-buster] Міф про «жіночу тему» як вузьку спеціалізацію руйнується: у Кісь гендер змінює питання про владу, архів, насильство, опір і пам''ять.'
  section: 'Тінь: «Вижити значить перемогти» без тріумфалізму'
  words: 900
- points:
  - 'Повернення до розминки: студент пояснює, коли виживання стає формою історичної дії, а коли така формула може звучати небезпечно.'
  - '[!decolonization] Кісь показує деколонізацію як відновлення джерельної справедливості: не тільки «про Україну», а українськими свідченнями, українськими питаннями й українською методологією.'
  - 'Порівняння: з Тамарою Гундоровою — гендер і канон; з Миколою Рябчуком — постколоніальна мова; з історією Голодомору — пам''ять, свідчення й відповідальність.'
  - 'Фінальна вправа: переписати три речення з об''єктної позиції в суб''єктну — не «жінки постраждали», а «жінки свідчили, діяли, зберігали, пам''ятали».'
  section: 'Дискусія та підсумок: Хто є суб''єктом історії'
  words: 700
focus: Оксана Кісь як жива українська феміністична історикиня й антропологиня, чия праця про жіночу історію, свідчення ҐУЛАҐу, пам'ять про Голодомор, усну історію та епістемологічну справедливість деколонізує радянсько-російськоцентричну історіографію й потребує обережного анти-тріумфалістського трактування виживання.
