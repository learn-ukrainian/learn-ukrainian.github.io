content_outline:
- points:
  - >-
    [!biography] Іван Труш: галицький живописець, пейзажист, портретист,
    критик, редактор, організатор виставок і творець видимої мережі
    української культури.
  - >-
    Провокаційне питання: якщо художник малює сонце, сосни й портрети друзів,
    чи може він одночасно будувати інституції, які тримають культуру без
    власної держави?
  section: Розминка
  words: 400
- points:
  - >-
    Висоцько, Бережанська гімназійна орбіта, Краківська академія, Відень і
    Мюнхен: професійна освіта Труша формується в багатомовному просторі
    Центральної Європи.
  - >-
    [!epistemic-humility] Дати народження і смерті мають джерельні розбіжності:
    учні бачать, чому біографічна точність іноді означає чесне називання
    різних свідчень.
  - >-
    [!decolonization] Габсбурзький, польський і український контексти треба
    розрізняти: Труш не "польський львівський художник з українськими темами",
    а український культурний працівник у недержавному просторі.
  section: 'Формування: Висоцько, Краків і львівський центр тяжіння'
  words: 1000
- points:
  - >-
    Пленер, колір і світло: Труш як пейзажист, якого називали поетом сонця,
    але якого потрібно читати через конкретний мазок, тон, етюд і композицію,
    а не сентиментальну формулу.
  - >-
    Портретна галерея української культури: Франко, Леся Українка, Стефаник,
    Драгоманов, Грушевський, Лисенко та інші постають як мережа облич,
    родинних і громадських зв’язків.
  - >-
    Товариства, періодика, лекції і перша всеукраїнська мистецька виставка у
    Львові 1905 року: Труш працює не тільки пензлем, а й критикою,
    редакторством та організацією.
  - >-
    Мандрівні маршрути — Київ, Крим, Італія, Єгипет, Палестина,
    Гуцульщина, Наддніпрянщина — показують, як український художник
    привласнює поглядом простір без імперського права називати його чужим.
  section: 'Діяльність: Портретна мережа, пленер і виставкові інституції'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Труш не був тільки тихим пейзажистом: після Першої
    світової війни він поступово відходив від публічної й літературно-критичної
    активності через несприятливі творчі умови та інерцію середовища.
  - >-
    Пізній факт членства у радянській спілці художників 1940 року не є ні
    доказом внутрішньої лояльності, ні приводом для звинувачення без джерел;
    це ознака нової інституційної рамки після радянської анексії.
  - >-
    [!myth-buster] Не додаємо НКВД, МГБ чи КГБ-справу: досьє підтримує іншу
    історію тиску — бездержавні культурні структури, воєнні руйнування і
    пізні музейні переформатування.
  - >-
    Вілла-майстерня на вулиці Труша була пошкоджена під час Другої світової
    війни, відбудована родиною і стала музейним простором; матеріальна пам’ять
    тут тримається на стінах, саду і сімейній опіці.
  section: 'Тінь: Несприятливі умови, пізня радянська рамка і пошкоджена вілла'
  words: 1600
- points:
  - >-
    Учні повертаються до одного портрета і одного пейзажу: що говорить обличчя,
    що говорить світло, і як ці два жанри разом формують українську культурну
    видимість.
  - >-
    Труш пов’язує мистецьку критику, видавництво, музейну комісію, поховання
    Франка і віллу-музей; його біографія розширює поняття "художник".
  - >-
    Сучасне значення: уважне читання Труша повертає Галичину як активний
    центр українського модерного мистецтва, а не як мальовничу периферію.
  section: 'Підсумок: Світло як мережа пам’яті'
  words: 1000
focus: >-
