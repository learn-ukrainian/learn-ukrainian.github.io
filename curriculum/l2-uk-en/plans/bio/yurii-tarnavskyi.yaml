objectives:
- Аналізувати шлях Юрія Тарнавського від воєнного витіснення з Галичини до теоретика-новатора
  Нью-Йоркської групи в США.
- 'Пояснювати концепцію «депоетизованого» вірша: метонімію замість метафори, плаский антиліричний
  синтаксис і майже обчислювальний зв''язок слова й значення.'
- Критично оцінювати неможливість такого авангарду в УРСР, де соцреалізм не допускав ані формального
  експерименту, ані екзистенціалістських джерел.
- Досліджувати двомовність Тарнавського (україномовна поезія та англомовна проза) як вияв транснаціонального
  авангарду, а не «зради» мови.
