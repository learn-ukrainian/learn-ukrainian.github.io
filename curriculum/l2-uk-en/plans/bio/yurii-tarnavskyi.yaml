- 'Пояснювати концепцію «депоетизованого» вірша: метонімію замість метафори, плаский неліричний
  синтаксис і майже обчислювальний зв''язок слова й значення.'
- Критично оцінювати неможливість такого авангарду в УРСР, де соцреалізм не допускав ані формального
  експерименту, ані екзистенціалістських джерел.
- Досліджувати змінну україномовну й англомовну практику Тарнавського як вияв транснаціонального
  авангарду без хибного поділу за жанрами.
