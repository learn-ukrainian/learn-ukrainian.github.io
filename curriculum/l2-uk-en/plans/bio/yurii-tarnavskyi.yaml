content_outline:
- points:
  - '[!biography] Знайомство з Юрієм Тарнавським (1934–2025): поет, прозаїк і теоретик, найрадикальніший
    новатор Нью-Йоркської групи.'
  - 'Провокаційне питання: чи може вірш свідомо відмовитися від «поетичності» — і чому така відмова
    була немислима в радянській літературі?'
  - 'Тарнавський як парадокс: інженер і мовознавець, який будував «депоетизований» вірш на майже
    обчислювальній точності слова.'
  section: Розминка
  words: 400
- points:
  - Народився 3 лютого 1934 року; енциклопедія подає Турку як офіційне місце народження, тоді як
    сам Тарнавський згадував польське село Dylągówka біля Ряшева і пояснював різницю пізнішою реєстрацією.
  - '[!decolonization] Війна витіснила родину з краю; після перебування в Австрії Тарнавський жив
    у таборі для переміщених осіб у Ной-Ульмі. Джерела не дають підстав зводити складну траєкторію
    до однієї неперевіреної причини.'
  - 1952 року родина переїхала до США, де сформувалися інженерна, мовознавча й літературна траєкторії автора.
  - 'Освіта поєднала точні й гуманітарні науки: диплом інженера-електрика (1956) та докторат з
    мовознавства Нью-Йоркського університету (1982); кар''єра в IBM пов''язувала його поетику
    з ранньою комп''ютерною лінгвістикою.'
  section: 'Формування: Війна, табори ДіПі та Нью-Йорк'
  words: 1000
- points:
  - Дебют — збірка «Життя в місті» (1956), урбаністична й екзистенціалістська; від 1959 року Тарнавський
    — співзасновник і редактор періодичного видання «Нові поезії».
  - '[!decolonization] Програмна збірка «Поезії про ніщо і інші поезії на цю саму тему» (1970)
    — маніфест «депоетизованого» вірша: очищення мови від оздоби до граничної семантичної та синтаксичної
    прямоти.'
  - 'Поетика: послаблення декоративної метафорики, увага до синтаксису, речової конкретності й
    дистанційованого ліричного голосу. Конкретні рядки аналізують лише за доступним виданням із
    точним сторінковим локатором.'
  - 'Інші збірки: «Пополудні в Покіпсі» (1960), «Ідеалізована біографія» (1964), «Без Еспанії»
    (1969). Англомовна проза — романи «Менінгіт» (1978) і «Три блондинки і смерть» (1993).'
  section: 'Діяльність: «Поезії про ніщо» та антитрадиція'
  words: 1200
- points:
  - '[!anti-hagiography] Механізм гноблення — не арешт, а витіснення й неможливість: радикальний
    експеримент Тарнавського був непублікований і політично небезпечний у межах УРСР.'
  - 'Антитеза соцреалізму: радянський апарат не допускав ані формального експерименту, ані екзистенціалістських
    (Сартр, Камю) чи сюрреалістських джерел, на які спиралася група.'
  - Радянський присуд таврував би такий формалізм як декадентське «буржуазне» наслідування Заходу,
    нібито «чуже народові», — саме цю рамку викриває деколоніальне прочитання Нью-Йоркської групи.
  - '[!epistemic-humility] Суспільне повідомило, що письменник помер 14 жовтня 2025 року, посилаючись
    на допис його дружини; точного місця смерті джерело не називає.'
  section: 'Тінь: Неможливість авангарду в УРСР'
  words: 1600
- points:
  - '[!anti-hagiography] Спрощення, якого слід уникати: зведення Тарнавського до «українського
    емігранта-поета» стирає його англомовну прозу й транснаціональний авангард.'
  - Експериментальний україномовний доробок постав у діаспорному видавничому середовищі поза
    радянською системою; у 1993–1996 роках Тарнавський викладав українську літературу в
    Колумбійському університеті, а його твори входили до нового обігу в Україні.
  - 'Сучасне значення: поєднання поезії, прози й комп''ютерної лінгвістики робить Тарнавського
    моделлю відкритого, несамоізольованого українського авангарду.'
  section: 'Підсумок: Двомовний авангардист і повернення'
  words: 1000
focus: Юрій Тарнавський як теоретик і радикальний новатор Нью-Йоркської групи, автор «депоетизованого»
  вірша з граничною семантичною прямотою. Аналіз його метонімічної поетики, екзистенціалістських
  джерел, двомовної (україно-англійської) авангардної прози та неможливості такого експерименту
  в межах радянського соцреалізму.
