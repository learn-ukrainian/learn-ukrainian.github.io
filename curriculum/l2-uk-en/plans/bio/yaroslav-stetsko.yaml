content_outline:
- points:
  - >-
    [!biography] Знайомство з Ярославом Стецьком (1912–1986): ідеолог ОУН, голова
    Українського державного правління (1941), багаторічний лідер Антибільшовицького
    блоку народів.
  - >-
    Провокаційне питання: чому біографія, стиснута до одного дня — 30 червня 1941
    року, — викривлює людину, яка прожила після нього ще сорок п'ять років, з них
    три в Заксенгаузені й сорок на чолі АБН?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта: Тернопільська українська гімназія; навчання на правничому та
    філософському факультетах Яґеллонського (Краків) і Львівського університетів
    (ЕСУ подає 1929–34; ЕІУ — без років). Член УВО та ОУН від 1929 року.
  - >-
    Ідеологічна лінія кар'єри, як її подає джерело: окружний провідник ОУН
    Тернополя (1930), ідеологічний і вишкільний референт Проводу Юнацтва ОУН ЗУЗ
    (1931), від 1932 — член Крайової екзекутиви й ідеологічний референт ОУН.
    Редактор перших підпільних видань: «Бюлетень КЕ ОУН на ЗУЗ», «Юнак», «Юнацтво».
  - >-
    [!epistemic-humility] Праць Стецька міжвоєнного періоду цим проходом не звірено
    з page-stable виданням — жодної назви й року не стверджувати. Перевірений
    перелік його праць починається від повоєнних видань (див. досьє §3).
  - >-
    [!epistemic-humility] Польське ув'язнення — розбіжність довідників, яку показати,
    а не усунути: ЕІУ подає стисло «політв'язень польських тюрем (1934—37)»; ЕСУ
    докладніше — арешт 1934 зі звільненням за браком доказів, вирок на 5 років на
    Львівському процесі 1936, виїзд за кордон після амністії 1937.
  - >-
    Розкол ОУН: співорганізатор Революційного Проводу ОУН(б), заступник голови
    Проводу ОУН(б) (1940), учасник 2-го Великого збору ОУН(б) (квітень 1941).
  section: 'Формування: Ідеологія та підпілля'
  words: 1000
- points:
  - >-
    Початок німецько-радянської війни. Акт відновлення Української Держави (Львів,
    30 червня 1941 року): проголошення Стецьком держави та створення УДП.
  - >-
    Обставини проголошення, як їх подає джерело: вранці 30 червня 1941 року похідна
    група Стецька увійшла до Львова разом із передовими частинами Вермахту й
    батальйоном «Нахтігаль»; збори вдалося провести саме тому, що німецької
    цивільної адміністрації в місті ще не було. Обидва речення читати разом —
    вибір лише одного дає неправду.
  - >-
    [!epistemic-humility] Текст Акта цим проходом НЕ отримано в публікації з
    локаторами. Тому жодних цитат із нього не наводити — зокрема формулювань про
    співдію з Німеччиною — доки не звірено конкретне видання зі сторінками.
    Відсутність цитати тут чесніша за правдоподібну.
  - >-
    Наслідки: німецька влада не визнала Акт. Стецько був заарештований і
    ув'язнений у концтаборі Заксенгаузен (1941–1944) саме за відмову відкликати Акт —
    причину названо в джерелі прямо.
  - >-
    [!epistemic-humility] Значення і його межа: ув'язнення за відмову відкликати
    Акт спростовує тезу про «слухняну маріонетку» щодо цього епізоду. Воно НЕ є
    відповіддю на питання про попередній етап — вхід до Львова разом із Вермахтом
    йому передував. Дві різні тези потребують двох різних доказів.
  section: 'Діяльність: Акт 30 червня та ув''язнення'
  words: 1200
- points:
  - >-
    [!epistemic-humility] МЕЖА ДОКАЗУ (головне для цієї секції). Цим проходом
    звірено ЛИШЕ бібліографічний запис репозиторію KNAW, і він доводить рівно одне:
    існує рецензована стаття K. Berkhoff і M. Carynnyk із назвою «The Organization
    of Ukrainian Nationalists and its Attitude toward Germans and Jews: Iaroslav
    Stetsko's 1941 Zhyttiepys» (Harvard Ukrainian Studies, 23(3-4), 1999, с. 149–184,
    «Article › Scientific › peer-review»). Запис не має ні анотації, ні викладу
    висновків, тому це доказ ІДЕНТИЧНОСТІ праці — і нічого більше.
  - >-
    [!epistemic-humility] Що з цього НЕ можна робити (пряма заборона цього проходу).
    Назва — це назва, а не результат дослідження. НЕ стверджувати, що предметом
    статті є «антисемітські мотиви»: у назві стоїть «attitude toward Germans and
    Jews», слів «antisemitic»/«antisemitism» у записі немає взагалі, а що саме стаття
    встановила — із запису невідомо. Перетворити фрагмент назви на висновок означає
    приписати авторам твердження, якого ми не читали. Висновків не переказувати, цитат
    із «Життєпису» не наводити, питання не закривати в жодний бік.
  - >-
    Що МОЖНА стверджувати про ідеологічний профіль із джерел цього проходу: ЕІУ
    називає Стецька ідеологом ОУН, ідеологічним референтом Крайової екзекутиви від
    1932 року — це означення джерела про роль і посаду. Воно НЕ дорівнює переліку
    його поглядів. Характеристики його ідеології (чи ідеології руху) жодне адоптоване
    джерело цього проходу не дає, тому вона тут не формулюється — ні як теза, ні як
    заперечення.
  - >-
    [!myth-buster] Російська дезінформація: зведення всієї української історії до
    "нацистської колаборації". Викриття пропаганди можливе не через заперечення
    фактів і не через їх домислювання: вхід похідної групи до Львова разом із
    частинами Вермахту документовано, ув'язнення за відмову відкликати Акт
    документовано, а про ставлення Стецька до євреїв жодне адоптоване джерело цього
    проходу не подає ні тверджень, ні заперечень. Пропаганді протистоїть точна межа
    доказу, а не зустрічна теза.
  section: 'Тінь: Контроверсійні тексти та ідеологія'
  words: 1600
- points:
  - >-
    Повоєнний період: еміграція до Мюнхена та розбудова Антибільшовицького блоку
    народів (АБН) як міжнародного антикомуністичного фронту під час Холодної війни.
  - >-
    Інституційні факти АБН за ЕІУ: угода з Китайською антикомуністичною лігою; місія
    АБН у Тайпеї (1957–60); сприяння заснуванню Світової антикомуністичної ліги в
    Токіо (1970) і членство в її Екзекутиві; ініціювання Європейської ради свободи
    (Почесна президія, 1968–74). Після 1945 року Стецько — насамперед функціонер
    глобальної антикомуністичної мережі, а не «людина 30 червня».
  - >-
    [!epistemic-humility] Про будь-яку пізню «зміну риторики» джерел цим проходом НЕ
    отримано — теза не формулюється в жодному напрямі. Для неї потрібне читання його
    повоєнних текстів із локаторами; це робота окремого проходу.
  - >-
    [!epistemic-humility] Прямих радянських репресій щодо Стецька джерела цього
    проходу не фіксують: він помер у Мюнхені 1986 року. Не переносити на нього
    сюжет Бандери чи Ребета — це різні біографії.
  section: 'Підсумок: Холодна війна та Антибільшовицький блок'
  words: 1000
focus: >-
  Ярослав Стецько як ідеолог ОУН, голова УДП 1941 року та президент АБН упродовж сорока
  років. Аналіз обставин і наслідків проголошення Акта, нацистського ув'язнення за
  відмову його відкликати, повоєнного лідерства — і окремо робота з межею доказу:
  бібліографічний запис рецензованої статті доводить, що така праця існує, і не
  доводить нічого про її висновки.
level: BIO
module: bio-300
objectives:
- Аналізувати роль Ярослава Стецька як ідеолога ОУН, голови УДП і президента АБН.
- Розуміти історичні обставини проголошення Акта 30 червня 1941 року та його наслідки.
- >-
  Розрізняти рівні твердження: означення джерела про роль особи («ідеолог ОУН») і
  невстановлені твердження про його особисті погляди та висловлювання — не змішуючи
  їх і не добудовуючи других із перших.
- >-
  Практикувати роботу з межею доказу: відрізняти, що доводить бібліографічний запис
  рецензованої статті (її існування й ідентичність), від того, чого він не доводить
  (її висновків), і не закривати відкрите питання в жодний бік.
- Оцінювати роль Стецька як лідера Антибільшовицького блоку народів у повоєнний час.
