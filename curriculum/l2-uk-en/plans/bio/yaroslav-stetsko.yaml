content_outline:
- points:
  - >-
    [!biography] Знайомство з Ярославом Стецьком (1912–1986): ідеолог ОУН, голова
    Українського державного правління (1941), багаторічний лідер Антибільшовицького
    блоку народів.
  - >-
    Провокаційне питання: як одна і та ж людина могла проголосити відновлення
    незалежності, потрапити в нацистський концтабір і водночас стати об'єктом
    критики за антисемітські погляди?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта (Краків, Львів) та залучення до українського націоналістичного
    підпілля у 1930-х роках.
  - >-
    Формування ідеологічних засад ОУН: Стецько як один із головних теоретиків
    радикального крила. Праця "Без національної революції немає соціяльної" (1938).
  - >-
    Польське ув'язнення (1936–1937) за підпільну діяльність.
  - >-
    Розкол ОУН: Стецько стає одним із лідерів ОУН(б) (бандерівців), що стояла на
    позиціях більш безкомпромісної боротьби.
  section: 'Формування: Ідеологія та підпілля'
  words: 1000
- points:
  - >-
    Початок німецько-радянської війни. Акт відновлення Української Держави (Львів,
    30 червня 1941 року): проголошення Стецьком держави та створення УДП.
  - >-
    Політичний парадокс Акта: декларація незалежності супроводжувалася обіцянкою
    "тісно співдіяти з Націонал-Соціалістичною Велико-Німеччиною".
  - >-
    Наслідки: німецька влада не визнала Акт. Стецько був заарештований і
    ув'язнений у концтаборі Заксенгаузен (до 1944 року).
  - >-
    Значення: ув'язнення доводить, що ОУН(б) не була "слухняною маріонеткою" і мала
    власну державницьку мету, за яку зазнала нацистських репресій.
  section: 'Діяльність: Акт 30 червня та ув''язнення'
  words: 1200
- points:
  - >-
    [!epistemic-humility] Складна спадщина: життєпис 1941 року та ідеологічні
    тексти Стецька містять виразні антисемітські твердження (аналіз Беркгофа/Царинника, Гімки).
  - >-
    Ідеологія інтегрального націоналізму 1930-х мала авторитарний та виключний характер,
    що не можна ігнорувати або приховувати в сучасній освіті.
  - >-
    [!myth-buster] Російська дезінформація: зведення всієї української історії до "нацистської
    колаборації". Викриття пропаганди можливе не через заперечення фактів, а через
    детальне розрізнення тактичної співпраці, антисемітизму та подальшої боротьби УПА.
  section: 'Тінь: Контроверсійні тексти та ідеологія'
  words: 1600
- points:
  - >-
    Повоєнний період: еміграція до Мюнхена та розбудова Антибільшовицького блоку
    народів (АБН) як міжнародного антикомуністичного фронту під час Холодної війни.
  - >-
    Зміна риторики: перехід від авторитарних концепцій до демократичної термінології
    у зверненнях до західних союзників.
  - >-
    Тривале протистояння: радянські органи безпеки вели постійну агентурну та
    інформаційну війну проти Стецька як символу антирадянської боротьби в екзилі.
  section: 'Підсумок: Холодна війна та Антибільшовицький блок'
  words: 1000
focus: >-
  Ярослав Стецько як ключовий ідеолог ОУН(б), автор Акта 30 червня 1941 року та об'єкт
  складних дискусій. Аналіз його політичних поглядів, нацистського ув'язнення, повоєнного
  лідерства, а також визнання контроверсійних антисемітських текстів.
