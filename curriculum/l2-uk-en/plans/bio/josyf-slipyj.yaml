content_outline:
- points:
  - 'Парадокс: Як 18 років ув’язнення в ГУЛАГу, покликані знищити Йосифа Сліпого, перетворили його на найвпливовішого українського
    релігійного діяча XX століття?'
  - 'Провокативне питання: Чи був Сліпий більшою загрозою для СРСР у таборі чи для Ватикану — на волі?'
  - '[!biography] Знайомство з ключовою фігурою, що поєднала мучеництво та політичну боротьбу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Візіонер чи розкольник? Конфлікт із Ватиканом щодо патріархату — боротьба за гідність церкви чи порушення канонічного
    права?'
  - 'Дебат 2: Національний герой чи релігійний діяч? Радянська пропаганда таврувала його як «націоналіста», діаспора бачила
    в ньому політичного лідера, а Церква — майбутнього святого. Де правда?'
  - '[!epistemic-humility] Позиція Ватикану (острах екуменічного діалогу з православ''ям) vs позиція Сліпого (УГКЦ — найбільша
    Східна Католицька Церква, що заслуговує на визнання).'
  - '[!decolonization] Радянська спроба ліквідації УГКЦ і творення міфу про «колаборанта» Сліпого — класичний приклад імперської
    політики пам''яті.'
  section: 'Конфліктна карта: Святий чи бунтівник?'
  words: 900
- points:
  - 'Народження в Австро-Угорській імперії: контекст зростання національної свідомості в Галичині.'
  - 'Інтелектуальне становлення: навчання в Інсбруку та Римі, знайомство із західною теологією.'
  - 'Ректор Львівської богословської академії: розбудова інтелектуального центру українського греко-католицизму.'
  - 'Наступник Шептицького: як митрополит Андрей готував свого спадкоємця до служіння в умовах світової війни та бездержавності.'
  section: 'Формування: Від галицького села до Риму'
  words: 1000
- points:
  - 'Сповідництво віри: арешт 1945 року та категорична відмова «возз''єднатися» з РПЦ як визначальний акт опору.'
  - '18 років у таборах: не пасивне страждання, а активне духовне лідерство в умовах ГУЛАГу.'
  - 'Звільнення як політична гра: роль Папи Івана XXIII та президента Кеннеді у визволенні Сліпого.'
  - 'Будівничий у вигнанні: об''єднання розрізненої української діаспори та заснування Українського Католицького Університету
    в Римі як центру науки і віри.'
  section: 'Діяльність: Незламність у ГУЛАГу та розбудова Церкви у вигнанні'
  words: 1300
- points:
  - '[!anti-hagiography] Конфлікт із Ватиканом не був однозначним. Непоступливість Сліпого, хоч і принципова, ізолювала його
    та ускладнювала становище УГКЦ.'
  - 'Авторитарний стиль: критика з боку частини діаспори та єпископату, що вважали його методи занадто жорсткими.'
  - '[!myth-buster] Міф про одностайну підтримку. Існували альтернативні погляди на стратегію розвитку Церкви, які патріарх
    не завжди толерував.'
  - 'Самопроголошення патріархом: героїчний акт утвердження гідності чи момент гордині, що зашкодив офіційному визнанню?'
  section: 'Тінь: Ціна непоступливості'
  words: 900
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання, як ув''язнення зробило Сліпого глобальною фігурою.'
  - 'Аналіз "Заповіту": ключові духовні та національні ідеї, залишені нащадкам.'
  - 'Перепоховання в Україні 1992 року: Сліпий як символ повернення і національного відродження.'
  - '[!decolonization] Спадщина Сліпого сьогодні: від процесу беатифікації до його ролі як морального авторитета в сучасній
    Україні, що бореться за свою ідентичність.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'The complex legacy of Josyf Slipyj: 18 years in the Gulag, leadership of the UGCC in diaspora, the conflict with the
  Vatican over the patriarchate, and his role as a symbol of spiritual resistance and national memory.'
level: BIO
module: bio-096
objectives:
- Аналізувати життя Йосифа Сліпого через призму анти-агіографії, розглядаючи його сильні сторони та суперечливі рішення.
- Критично оцінювати конфлікт між Йосифом Сліпим та Ватиканом щодо статусу патріархату.
- Пояснювати роль і спадщину Сліпого як символу опору радянському режиму та консолідації української діаспори.
- Розрізняти історичні факти та міфологізацію в біографії ключових постатей української історії XX століття.
