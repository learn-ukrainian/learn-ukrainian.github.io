content_outline:
- points:
  - 'Джерельне питання: як поєднати літературну кар''єру Вікторії Амеліної, документування воєнних злочинів і обставини смерті без телеології?'
  - Профіль членкині ПЕН і меморіальне повідомлення 2 липня 2023 року мають різні жанрові функції.
  - '[!biography] Дати, освіта, книжки й професійні ролі в межах двох прямих джерел.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: чи можна назвати зміну професійного фокусу «перетворенням», якщо джерело лише фіксує нову роботу?'
  - 'Дебат 2: як близькість авторів меморіального повідомлення до Амеліної впливає на тон і добір фактів?'
  - '[!epistemic-humility] Не реконструювати внутрішні мотиви, страх або передчуття без прямого локованого висловлювання.'
  - "[!decolonization] Російський ракетний удар названо прямо; українську культуру не подано лише як об'єкт імперського насильства."
  section: 'Конфліктна карта: Письменниця, документаторка, меморіальний образ'
  words: 900
- points:
  - Народження 1 січня 1986 року у Львові, шкільний період у Канаді й повернення до України за ПЕН.
  - Магістерський ступінь у Львівській політехніці та робота в технологічних компаніях до 2015 року.
  - Дебютний роман 2014 року, дитячі книжки й «Дім для Дома» як перевірна бібліографічна хронологія.
  - Нью-Йоркський літературний фестиваль 2021 року як названа ініціатива, без приписування всьому регіону одного голосу.
  section: 'Формування: Від технологічної освіти до літературної праці'
  words: 1000
- points:
  - Приєднання до Truth Hounds у 2022 році та документування на деокупованих територіях за меморіальним повідомленням ПЕН.
  - Знахідка щоденника Володимира Вакуленка в Капитолівці як конкретна подія, а не символічна легенда.
  - Поранення 27 червня 2023 року в Краматорську й смерть 1 липня в Дніпрі подаються точно й без натуралістичних деталей.
  - Правову кваліфікацію удару атрибутувати спільній заяві ПЕН і Truth Hounds, а не подавати як судовий вирок.
  section: 'Діяльність: Література, документування і адвокація'
  words: 1300
- points:
  - '[!anti-hagiography] Премії та меморіальна близькість не доводять художньої якості кожного твору чи безпомилковості кожної позиції.'
  - '[!myth-buster] Формулу «нове Розстріляне відродження» не використовувати як встановлену історичну тотожність.'
  - Біографічні профілі не замінюють читання романів, поезії або документальної книжки.
  - Посмертні видання й нагороди потребують окремого датованого джерела, якщо їх включають до майбутнього модуля.
  section: 'Межі джерел: Твір, свідчення й посмертна рецепція'
  words: 900
- points:
  - Таблиця «факт біографії — інституційна оцінка — правова кваліфікація — меморіальна мова».
  - Порівняння нейтральнішого профілю членкині з колективним повідомленням про смерть.
  - '[!decolonization] Амеліна постає авторкою й організаторкою з власними проєктами, а не лише жертвою російського удару.'
  - Висновок про різні види культурної праці без вигаданого причинного ланцюга між ними.
  section: 'Дискусія та підсумок: Праця, джерело і пам''ять'
  words: 700
focus: Джерельно обмежений аналіз літературної кар'єри Вікторії Амеліної, її документаторської й адвокаційної праці та обставин смерті.
level: BIO
module: bio-192
objectives:
- Побудувати атрибутовану хронологію освіти, технологічної роботи, книжок і культурних ініціатив Вікторії Амеліної.
- Розрізняти профіль членкині ПЕН, меморіальне повідомлення, інституційну оцінку й правову кваліфікацію.
- Описувати документаторську працю й обставини смерті без реконструкції мотивів та без натуралістичних подробиць.
- Формулювати висновки про спадщину без автоматичного ототожнення з Розстріляним відродженням і без неперевірених цитат.
