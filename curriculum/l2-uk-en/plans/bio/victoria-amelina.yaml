objectives:
- Аналізувати трансформацію Вікторії Амеліної від романістки до дослідниці воєнних злочинів в контексті повномасштабного вторгнення
- Критично оцінювати концепцію "Нового розстріляного відродження" як інструмент деколоніального аналізу
- Формулювати аргументовану позицію щодо моральної дилеми українського митця в умовах геноцидної війни
- Простежити тяглість методів російського імперіалізму в знищенні української культури від XX до XXI століття
