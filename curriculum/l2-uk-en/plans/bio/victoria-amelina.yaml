content_outline:
- points:
  - 'Провокація: Авторка ліричної прози гине, документуючи жорстокі воєнні злочини. Як і чому письменниця, що створила світлий
    «Дім для Дома», стала мішенню у війні, яку вона намагалася задокументувати для трибуналу?'
  - '[!biography] Коротка довідка про те, ким була Амеліна ДО 24 лютого 2022 року — успішна романістка, інтелектуалка, культурна
    діячка.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Як ми маємо пам''ятати Амеліну? Як письменницю, чиє життя трагічно обірвалося, чи як правозахисницю, що свідомо
    зробила небезпечний вибір? Напруга між її літературною ідентичністю та її останньою місією.'
  - 'Дебат 2: "Нове Розстріляне Відродження" — наскільки коректною є ця паралель? Чи це дієвий інструмент для пояснення геноциду,
    чи він затіняє унікальні аспекти сучасної війни?'
  - '[!decolonization] Як російська пропаганда намагається стерти цю історичну тяглість, представляючи кожен випадок як випадковість,
    а не як системне знищення культури.'
  - '[!epistemic-humility] Визнання, що навіть в українському середовищі існують різні погляди на те, чи має митець право
    ризикувати життям заради свідчення.'
  section: 'Конфліктна карта: Свідок чи митець?'
  words: 900
- points:
  - Рання кар'єра в IT, що дала фінансову незалежність для творчості — нетиповий шлях для українського письменника.
  - Літературний дебют та швидке визнання. Аналіз її ранніх творів — пошук тем справедливості та пам'яті.
  - Діяльність як культурної менеджерки — заснування літературного фестивалю у Нью-Йорку на Донеччині. Формування бачення
    культури як інструменту соціальних змін та опору.
  section: 'Формування: Шлях до "Дому для Дома"'
  words: 1000
- points:
  - 'Літературний доробок: аналіз ключових творів, зокрема роману «Дім для Дома». Теми пам''яті, родинної історії, пошуку
    ідентичності на тлі великих історичних травм.'
  - 'Правозахисна робота: приєднання до Truth Hounds після повномасштабного вторгнення. Зміна фокусу з метафоричної справедливості
    в літературі на буквальну, юридичну справедливість.'
  - Формулювання концепції "Нового Розстріляного Відродження" — не просто фраза, а цілісна аналітична рамка для розуміння
    війни як геноциду культури. Пошук щоденника вбитого письменника Володимира Вакуленка.
  section: 'Діяльність: Фіксація злочину і слова'
  words: 1300
- points:
  - '[!anti-hagiography] Розгляд незручного питання: чи не зрадила Амеліна своєму покликанню письменниці, обравши шлях документалістки?
    Дискусія про те, чи не втратила українська література майбутні великі романи заради одного свідчення.'
  - 'Моральна дилема: аналіз вибору Амеліної не як героїчного акту, а як трагічної необхідності, нав''язаної геноцидною війною.
    Ціна, яку платить культура, коли її творці змушені ставати солдатами або свідками.'
  - '[!myth-buster] Спростування міфу про "пасивну жертву". Амеліна була активною діячкою, що зробила свідомий вибір. Її смерть
    — це не "трагічна випадковість", а прямий наслідок цього вибору та цілеспрямованого удару ворога.'
  section: 'Тінь: Ціна свідчення'
  words: 900
- points:
  - 'Повернення до вихідного парадоксу: письменниця-свідок. Студенти, маючи повний контекст, формулюють власну відповідь:
    її свідчення стало її останнім, найважливішим текстом.'
  - '[!decolonization] Спадщина Амеліної — це не лише її книги, а й сама рамка "Нового Розстріляного Відродження", яка тепер
    є ключовою для розуміння війни на Заході.'
  - Її загибель разом із колумбійськими письменниками, яких вона супроводжувала, вивела українську трагедію на глобальний
    рівень, зробивши її зрозумілою для іншого континенту.
  - 'Сучасне значення: Амеліна як символ покоління, яке було змушене відкласти свої мрії, щоб захистити саме право на існування
    своєї культури.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
