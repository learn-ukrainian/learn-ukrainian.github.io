content_outline:
- points:
  - 'Парадокс: Як історик, що починав кар''єру в радянській системі, став провідним голосом деколонізованої історії України на Заході?'
  - '[!biography] Сергій Плохій — директор Українського наукового інституту Гарвардського університету, автор світових бестселерів про історію Східної Європи.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Еволюція чи розрив? Чи є дослідницький шлях Плохія від радянської дисертації про козацтво до гарвардських праць поступовою еволюцією, чи різким розривом з попередньою методологією?'
  - 'Дебат 2: Популяризатор чи фундаментальний історик? Критики зазначають, що написання широких синтетичних праць для масового ринку неминуче веде до спрощень. Прихильники стверджують, що це єдина можливість донести український наратив до мільйонів.'
  - '[!epistemic-humility] Визнання, що роль "публічного інтелектуала" вимагає балансу між академічною глибиною та доступністю, і цей баланс завжди є предметом дискусій.'
  - '[!decolonization] Плохій свідомо працює на західну аудиторію, щоб витіснити з її свідомості російські імперські наративи про Україну.'
  section: 'Конфліктна карта: Між академією та масовим ринком'
  words: 900
- points:
  - Народження в Горькому (нині Нижній Новгород), дитинство та освіта в Запоріжжі й Дніпрі — формування в середовищі пізнього СРСР.
  - Навчання в Дніпропетровському університеті. Вибір теми дисертації про козацтво — дозволена, але водночас "національна" тема в радянській історіографії.
  - 'Академічна кар''єра в УРСР: від аспіранта до професора Київського університету. Робота в умовах ідеологічного контролю.'
  - Інтелектуальний клімат "перебудови" та розпаду СРСР як каталізатор для переоцінки історичних парадигм.
  section: 'Формування: Від Запоріжжя до Києва'
  words: 1000
- points:
  - 'Початок роботи в Альбертському університеті 1991 року та подальша інтеграція в західну академічну систему.'
  - Запрошення до Гарварду (2007) та очолення Українського наукового інституту (HURI) з 2013 року. Перетворення HURI на ключовий світовий центр україністики.
  - 'Ключові праці: "Брама Європи", "Остання імперія", "Чорнобиль", "Ядерне безумство" — книги, що стали бестселерами та сформували розуміння України у мільйонів читачів.'
  - 'Вплив на світову політику: праці Плохія цитують провідні політики та аналітики, його експертиза стає основою для рішень.'
  section: 'Діяльність: Гарвардська вахта'
  words: 1300
- points:
  - '[!anti-hagiography] Критика з боку вузьких спеціалістів: чи не жертвує Плохій глибиною заради широкого охоплення? Деякі історики вказують на незначні неточності або надмірні узагальнення в його працях.'
  - 'Фокус на "великих наративах": чи не залишаються поза увагою мікроісторія, історія повсякденності, "голоси знизу" в його роботах?'
  - '[!myth-buster] Міф про те, що Плохій "відкрив" історію України для Заходу. Він стоїть на плечах гігантів (Грушевський, Лисяк-Рудницький, Шевельов), але на відміну від них, зробив цю історію доступною для масового читача.'
  - 'Неминучий компроміс: чи не адаптує Плохій українську історію під очікування та понятійний апарат західного читача, "спрощуючи" її?'
  section: 'Тінь: Ціна популярності'
  words: 900
- points:
  - 'Повернення до розминки: Плохій — це продукт радянської системи чи її заперечення? Студент формулює відповідь: він є і тим, і іншим, і саме це поєднання досвідів дало йому унікальну оптику.'
  - 'Плохій як інтелектуальний посол: його роль у поясненні російської агресії та українського спротиву з 2014 року.'
  - '[!decolonization] Головне значення Плохія — він успішно забрав у Росії монополію на розповідь про східнослов''янську історію в глобальному масштабі.'
  - 'Сучасна релевантність: Як праці Плохія допомагають зрозуміти не тільки минуле, а й сьогодення та майбутнє України?'
  section: 'Дискусія та підсумок: Значення'
  words: 700
focus: Serhii Plokhy as a global public intellectual, the transition from Soviet to Western historiography, and the art of writing national history for a global audience.
