objectives:
- Аналізувати еволюцію історика від радянської до західної академічної парадигми
- Критично оцінювати переваги та недоліки "популярної історії" для широкої аудиторії
- Розрізняти імперський та деколоніальний підходи до написання історії України
- Формулювати аргументовану позицію щодо ролі публічного інтелектуала у воєнний час
