content_outline:
- points:
  - 'Парадокс: Кость Гордієнко — найпослідовніший ворог Москви серед усіх кошових, але його дії призвели до знищення Січі,
    яку він присягав захищати. Чи була його непоступливість єдиним шляхом до свободи, чи фатальною помилкою?'
  - '[!biography] Уривок з промови Гордієнка до Карла XII — студент має визначити, хто і в якому контексті міг сказати такі
    слова.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Внутрішній): Гордієнко vs Сірко. Стратегія безкомпромісного антимосковського союзу (Гордієнко) проти гнучкої,
    багатовекторної політики (Сірко). Чия тактика була більш ефективною для збереження запорозьких вольностей?'
  - 'Дебат 2 (Зовнішній): Національний герой vs «зрадник». Українська історіографія бачить у ньому символ республіканського
    духу. Російська імперська та радянська — сепаратиста і маріонетку іноземних держав. [!decolonization]'
  - '[!epistemic-humility] Оцінка союзу з Карлом XII: державницький акт чи політична авантюра, що поставила на карту існування
    Січі?'
  section: 'Конфліктна карта: Герой чи авантюрист?'
  words: 900
- points:
  - Походження та освіта в Києво-Могилянській академії — формування ідеологічних засад.
  - 'Сходження на Січі: від простого козака до кошового отамана (обраний 12 разів).'
  - 'Рання діяльність: боротьба проти будівництва московських фортець на землях Війська Запорозького, захист козацьких промислів
    та територій.'
  - 'Світ, у якому він жив: Запоріжжя як степова республіка на межі імперій (Річ Посполита, Московське царство, Османська
    імперія).'
  section: 'Формування: Шлях до Булави'
  words: 1000
- points:
  - 'Історичне рішення: перехід на бік Мазепи та Карла XII у 1709 році. Промова Гордієнка як маніфест запорозької незалежності.'
  - Участь у Полтавській битві та її наслідки для Запорозької Січі.
  - 'Конституція 1710 року: Гордієнко як співавтор і представник Запорожжя. Аналіз «Запорозьких статей», що гарантували республіканський
    устрій та незалежність Січі від Гетьманщини.'
  - 'Дипломатія у вигнанні: спроби створити антимосковську коаліцію з Османською імперією та Кримським ханством.'
  section: 'Діяльність: Республіканець проти Імперії'
  words: 1300
- points:
  - '[!anti-hagiography] Руйнування Чортомлицької Січі у 1709 році — прямий наслідок політичного вибору Гордієнка. Тисячі
    загиблих, втрата скарбниці та клейнодів.'
  - 'Життя у вигнанні: заснування Олешківської та Кам’янської Січей на землях Кримського ханства. Це було виживання, а не
    перемога. Залежність від хана, обмеження суверенітету.'
  - '[!myth-buster] Гордієнко не був «характерником». Міфологізація образу в народній пам''яті приховує реальні політичні
    прорахунки та високу ціну його рішень для Війська Запорозького.'
  - 'Критика сучасників: не всі козаки підтримували союз зі шведами. Існувала опозиція, що вважала його політику надто ризикованою.'
  section: 'Тінь: Ціна Непоступливості'
  words: 900
- points:
  - 'Повернення до розминки: студент, маючи повну картину, формулює власну оцінку дій Гордієнка.'
  - Могила Гордієнка в Кам'янці-Дніпровській як національна святиня і символ неперервності боротьби.
  - 'Спадщина Гордієнка — це не успіх, а ідея: ідея козацького республіканізму та права на збройний опір тиранії. Чому його
    приклад став таким важливим для наступних поколінь?'
  - '[!decolonization] Як постать Гордієнка використовується в сучасній Україні для утвердження національної ідентичності,
    що базується на опорі імперіалізму.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Kost Hordiyenko's role as the last independent Koshovyi Otaman, his alliance with Mazepa against Peter I, the destruction
  of the Chortomlyk Sich, the co-authorship of the 1710 Constitution, and his legacy as an icon of anti-imperial resistance.
level: BIO
module: bio-029
objectives:
- Аналізувати причини та наслідки союзу кошового отамана Костя Гордієнка з гетьманом Іваном Мазепою та шведським королем Карлом
  XII.
- Критично оцінювати роль Гордієнка у створенні Конституції 1710 року як гаранта прав Запорозької Січі.
- Порівнювати різні історіографічні оцінки постаті Гордієнка, розрізняючи національні та імперські наративи.
- Формулювати збалансовану позицію щодо спадщини Гордієнка, враховуючи як його досягнення, так і політичні прорахунки.
