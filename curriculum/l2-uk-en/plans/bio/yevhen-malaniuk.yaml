objectives:
- Відтворювати військову, таборову, освітню та еміграційну хронології як окремі послідовності.
- Пояснювати співпрацю Маланюка й Дарагана у журналі «Веселка», не ототожнюючи їхні біографії.
- Аналізувати перші збірки за точними виданнями, не використовуючи неперевірених афоризмів.
- Розглядати поняття державності в доробку автора як предмет текстового аналізу, а не готове гасло.
content_outline:
- section: Розминка
  words: 400
  points:
  - '[!biography] Євген Филимонович Маланюк — поет, критик, есеїст і старшина Армії УНР.'
  - '[!epistemic-humility] Джерела по-різному переводять дату народження зі старого стилю; розбіжність фіксуємо, а не маскуємо.'
- section: 'Військова хронологія та інтернування'
  words: 1000
  points:
  - Освіта у військовій школі, служба під час Першої світової війни та участь у визвольних змаганнях.
  - Служба в Армії УНР і табори інтернованих у Польщі подаються окремо від літературних об’єднань.
  - У Каліші Маланюк, Дараган та інші співпрацювали з журналом і товариством «Веселка».
- section: 'Еміграція, освіта та літературні середовища'
  words: 1200
  points:
  - Навчання в Українській господарській академії в Подєбрадах і перші поетичні збірки.
  - Варшавське коло «Танка» та публікації у «Вістнику» не підмінюють празький або таборовий етап.
  - Післявоєнний німецький період, участь у Мистецькому українському русі та переїзд до США 1948 року.
- section: 'Твори та критичне читання'
  words: 1600
  points:
  - «Стилет і стилос» та «Гербарій» читаються за точними бібліографічними записами НБУВ.
  - '[!anti-hagiography] Громадянську поезію не зводимо до прізвиська чи одного неперевіреного вислову.'
  - Поетичні образи, есеїстику та політичні оцінки автора розрізняємо за жанром і часом написання.
- section: 'Підсумок: особиста траєкторія в мережі еміграції'
  words: 1000
  points:
  - Маланюк взаємодіяв з Дараганом, Липою, Мистецьким українським рухом і діаспорними установами, але мав власну хронологію.
  - Деколонізаційне читання повертає українську державницьку перспективу без перетворення поета на безпомилковий символ.
