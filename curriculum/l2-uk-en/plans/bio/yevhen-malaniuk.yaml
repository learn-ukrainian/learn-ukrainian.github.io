objectives:
- Простежити життєвий шлях Євгена Маланюка від штабного старшини Армії УНР і польського інтернування до подвійної еміграції та осідку у США.
- Аналізувати естетику «поезії чину» через дилему «стилет чи стилос» і рядок «Як в нації вождів нема, тоді вожді її — поети».
- Пояснювати поняття малоросійства як діагноз колоніальної свідомості, що його Маланюк сформулював в однойменному есеї (1959).
- Критично оцінювати радянський наклеп про «український фашизм» (1926) як пропагандистський ярлик, а не опис, та механізм стирання поета в УРСР.
