content_outline:
- points:
  - '[!biography] Знайомство з Євгеном Маланюком: штабний старшина Армії УНР, інженер-гідротехнік і поет, якого називали «Імператором залізних строф».'
  - 'Провокаційне питання: чому поезія офіцера розбитої армії стала совістю цілої нації, а радянська влада вбачала в ній смертельну загрозу?'
  section: Розминка
  words: 400
- points:
  - 'Походження та освіта: народження 1 лютого 1897 року в Новоархангельську на Херсонщині; навчання в Єлисаветградському земському реальному училищі та Першій київській військовій школі.'
  - 'Шлях вояка: вступ до визвольних змагань у 1917 році; служба ад''ютантом командувача Наддніпрянської армії генерала Василя Тютюнника, який помер від тифу на руках Маланюка.'
  - 'Полон і табори: у грудні 1919 року — польський полон; інтернування 1920 року в таборах Стшалково, Щипйорно та Каліш.'
  - '[!decolonization] У каліському таборі разом із Юрієм Дараганом, Миколою Чирським і Максимом Гривою Маланюк видає гектографований журнал «Веселка» (1922–1923) — зародок Празької школи; згодом — навчання на інженера-гідротехніка в Подєбрадах.'
  section: 'Формування: Від армії УНР до табору в Каліші'
  words: 1000
- points:
  - 'Дебют: збірка «Стилет і стилос» (Подєбради, 1925) — програма поета-державника; далі «Гербарій» (Гамбург, 1926), «Земля й залізо» (Париж, 1930), «Земна мадонна» (Львів, 1934), «Перстень Полікрата» (Львів, 1939).'
  - 'Естетика «поезії чину»: дилема «стилет чи стилос» — мистецтво як зброя проти мистецтва як краси — і рядок «Як в нації вождів нема, тоді вожді її — поети» як кредо емігрантської ідеї про культуру замість втраченої держави.'
  - 'Історіософія: висока «залізна» громадянська лірика, символізм і неокласична алюзійність; образ України як «Степової Еллади» та «Чорної Еллади».'
  - 'Мислитель культури: есеїстика «Книги спостережень» (Торонто, 1962, 1966) і «Нариси з історії нашої культури» (1954) поряд із вишуканою любовною лірикою під суворою поверхнею.'
  section: 'Діяльність: «Стилет і стилос» та поезія чину'
  words: 1200
- points:
  - '[!anti-hagiography] Маланюк не був лише «поетом залізних строф»: під мілітарною поверхнею — витончений лірик і культуролог; радянська машина переслідувала саме його інтелектуальну незалежність.'
  - 'Механізм наклепу: після «Посланія» (1926), що відлунювало гасло Хвильового «Геть від Москви!», політичний апарат УСРР звинуватив Маланюка в «українському фашизмі» й доручив відповідь Володимирові Сосюрі, який згодом про це шкодував.'
  - '[!epistemic-humility] Ярлик «український фашизм» подаємо лише як названий радянський наклеп, спрямований на старшину-емігранта, а не як опис його поглядів.'
  - 'Друга еміграція: у 1944 році Маланюк тікає до Німеччини від НКВС, який на той час уже вбив його найближчого друга Юрія Липу; з червня 1949 року — у США; в Україні його ім''я стерте до кінця життя.'
  section: 'Тінь: Радянський наклеп і друга еміграція'
  words: 1600
- points:
  - 'Діагноз колоніальної свідомості: есей «Малоросійство» (1959) точно називає ту меншовартісну ментальність, яку плекав режим.'
  - 'Доля спадщини: усе написане вціліло в діаспорі (Подєбради, Париж, Філадельфія, Нью-Йорк, Мюнхен); читача вдома повернено лише після 1991 року.'
  - 'Пам''ять: смерть 16 лютого 1968 року в Нью-Йорку; похований у Саут-Баунд-Бруку, де його могила обернена до могили Оксани Лятуринської. Маланюк — символ незламної гідності еміграційної культури.'
  section: 'Підсумок: «Малоросійство» та повернення читача'
  words: 1000
focus: Євген Маланюк як центральний поет Празької школи, штабний старшина Армії УНР і совість політичної еміграції. Аналіз його історіософської «поезії чину», поняття малоросійства та механізму радянського переслідування — від наклепу про «український фашизм» до другої вимушеної еміграції.
