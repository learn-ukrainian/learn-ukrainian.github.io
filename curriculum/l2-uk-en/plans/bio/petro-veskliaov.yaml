- Аналізувати культурний феномен "Діда Панаса" в контексті радянської України
- Оцінювати роль української мови та національної ідентичності на радянському телебаченні
- Дискутувати про мистецтво сторітелінгу та його вплив на дитячу аудиторію
- Розрізняти історичні факти та міфи в біографії публічної особи
