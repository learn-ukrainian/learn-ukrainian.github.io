content_outline:
- points:
  - 'Провокація: Як звичайний телеведучий дитячої програми став символом української ідентичності в епоху тотальної русифікації?
    І чому його досі пам''ятають?'
  - '[!biography] Петро Вескляров (Дід Панас) — легенда українського телебачення, ведучий програми "Вечірня казка" (1962-1988).'
  - 'Парадокс: символ затишку і рідної мови для мільйонів, але помер у самотності та бідності.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Дід Панас — свідомий "культурний дисидент" чи просто професійний актор, що сумлінно виконував свою роботу в
    заданих рамках?'
  - 'Дебат 2: Легенди про "нецензурну лексику" в прямому ефірі ("Отака хуйня, малята") — реальний протест проти системи чи
    міська легенда, що відображає бажання людей бачити в ньому бунтаря?'
  - '[!epistemic-humility] Аналіз свідчень колег та істориків ТБ: одні кажуть, що це міф; інші, що такі випадки були, але
    їх замовчували.'
  - '[!decolonization] Феномен україномовної програми в зросійщеному Києві як форма пасивного опору та збереження національного
    коду.'
  section: 'Конфліктна карта: Між народною любов''ю та радянською цензурою'
  words: 900
- points:
  - Походження з Черкащини, справжнє прізвище Вескляр — не Панас.
  - 'До-телевізійна кар''єра: робота в театрах Луцька та Рівного, ролі характерного актора другого плану в кіно.'
  - 'Випадок, що змінив усе: термінова заміна першого ведучого "дідуся" на радіо, що відкрила шлях на телебачення (УТ-1).'
  - 'Створення образу: вишиванка, сиві вуса, тепла усмішка, м''який голос — свідомий вибір чи випадковість?'
  section: 'Формування: Від театральних підмостків до телеекрану'
  words: 1000
- points:
  - '"Добрий вечір вам, малята, любі хлопчики й дівчата!" — фраза, що стала культурним кодом для кількох поколінь.'
  - 'Мистецтво імпровізації: як Вескляров виходив за рамки сценарію, роблячи казку "живою" та непередбачуваною.'
  - 'Казка як інструмент передачі цінностей: аналіз тем, які він обирав, та як вони резонували з радянською дійсністю.'
  - 'Вплив на мову: для багатьох дітей у містах "Дід Панас" був єдиним джерелом живої, не "шкільної" української мови.'
  section: 'Діяльність: Феномен "Вечірньої казки"'
  words: 1300
- points:
  - '[!anti-hagiography] Конфлікти з керівництвом телебачення: Вескляров не був зручною фігурою, його свобода в кадрі дратувала
    чиновників.'
  - 'Раптове звільнення у 1988 році: офіційна версія vs реальні причини. Народна любов не захистила від системи.'
  - '[!myth-buster] Розвінчання міфу про "щасливу старість": останні роки життя провів у бідності та забутті, розчарований
    і нікому не потрібний.'
  - 'Трагедія людини, яка стала брендом: "Дід Панас" був потрібен усім, а Петро Вескляров — нікому.'
  section: 'Тінь: Звільнення, самотність і забуття'
  words: 900
- points:
  - 'Повернення до розминки: чому діти так беззастережно вірили Діду Панасу, і чому його образ виявився сильнішим за державну
    машину?'
  - 'Спадщина: "Дід Панас" як нематеріальна культурна спадщина. Чому його досі не вдалося ніким замінити?'
  - '[!decolonization] Обговорення: чи можливий був би такий феномен без радянського контексту? Чи це унікальний продукт епохи?'
  - 'Роль "живого" оповідача в цифрову епоху: чи потрібні сучасним дітям свої "діди панаси"?'
  section: 'Дискусія та підсумок: Спадщина казкаря нації'
  words: 700
focus: The cultural phenomenon of Petro Veskliaov (Did Panas), the role of the Ukrainian language on Soviet television, and
  the tension between his beloved public persona and his difficult personal fate.
