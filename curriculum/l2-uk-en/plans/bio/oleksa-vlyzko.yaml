content_outline:
- points:
  - >-
    [!biography] Знайомство з Олексою Федоровичем Влизьком: український поет, який народився
    17 лютого 1908 року в станційному поселенні Боровйонка Новгородської губернії та дуже рано
    увійшов в українське літературне життя.
  - >-
    Початковий парадокс: як письменник, який оглух після дитячої хвороби, створив ритмічно й
    візуально напружену поезію руху, моря, доків, подорожей і романтичних зламів?
  - >-
    Провокаційне питання: чому радянський терор зміг перетворити літературні зв'язки молодого
    автора на мову "терористичної" змови?
  section: Розминка
  words: 400
- points:
  - >-
    Дитяча глухота як факт біографії, а не сентиментальна рамка. Учні розрізняють етичну мову
    про інвалідність і спрощений сюжет "подолання".
  - >-
    Ранній старт: Влизько вступив у літературу дуже молодим і до двадцяти семи років опублікував
    значний корпус лірики, балад, подорожніх і морських текстів.
  - >-
    Перші книжки 1927 року: "За всіх скажу" та "Поезії" як публічний вихід автора, якого не слід
    зводити лише до майбутньої жертви.
  - >-
    [!decolonization] Український модернізм у цій біографії не обмежений селом, партійним гаслом
    або київсько-харківською груповою мапою; морські й подорожні тексти відкривають глобальний
    горизонт української поезії.
  section: "Формування: Глухота, молодість і вхід у літературу"
  words: 1000
- points:
  - >-
    Поетична множинність 1930 року: "Живу, працюю", "Книга балад", "Поїзди ідуть на Берлін"
    та "Рейс" показують не одну формулу, а рух між працею, баладою, подорожжю й морем.
  - >-
    Морський корпус: "Рейс" і "П'яний корабель: Морські вірші" дають можливість читати Влизька
    через доки, кораблі, напружені тіла й технічну лексику, а не лише через мартиролог.
  - >-
    Ліричний регістр: рядок "Це початок кінця, о, кохана" з "Живу, працюю" показує романтичну
    інтонацію, що співіснує з індустріальними та подорожніми образами.
  - >-
    Пізній передстрадний обрій: "Мій друг Дон-Жуан" 1934 року фіксує, що перед арештом автор
    залишався стилістично рухливим, а не завершеним "типом" радянської літератури.
  section: "Діяльність: Балади, рейси і морська модерність"
  words: 1200
- points:
  - >-
    [!anti-hagiography] Влизько не має бути лише образом невинної молодості: спочатку треба
    побачити його книжки, стилістичні регістри й літературну агентність, а вже потім говорити
    про знищення.
  - >-
    Механізм репресії: груднева хвиля після вбивства Кірова, арешт, сфабриковане обвинувачення
    в належності до ОУН та ролі емісара Євгена Коновальця, смертний вирок Військової колегії
    Верховного суду СРСР у Києві.
  - >-
    [!epistemic-humility] Датування смерті має бути подане чесно: архівно-музейні матеріали та
    IEU ведуть до 14 грудня 1934 року в Києві; заголовок ЕСУ дає 16 грудня 1934 року.
  - >-
    Прискорений терор: справа Влизька передує масовій сандармоській операції, але вже показує
    швидкий ланцюг "арешт — стисле обвинувачення — вирок — розстріл".
  - >-
    [!myth-buster] Формулу "емісар ОУН" треба читати як радянську поліційну мову, а не як
    встановлений факт біографії поета.
  section: "Тінь: Грудень 1934 і прискорений терор"
  words: 1600
- points:
  - >-
    Що вижило: книжки Влизька збереглися у сканах і перевиданнях, але кар'єра була обірвана
    до зрілого етапу, тому пам'ять часто говорить про "обіцянку" замість читати наявний корпус.
  - >-
    Навчальна рамка: вимагати принаймні один уривок не про розстріл, щоб учні спершу почули
    літературний голос, який радянська держава знищила.
  - >-
    Підсумкове питання: як поєднати повагу до жертви терору з точним аналізом поетики, не
    перетворюючи біографію на саму лише мартирологічну етикетку?
  section: "Підсумок: Пам'ять про кар'єру, а не тільки про обірвану молодість"
  words: 1000
focus: >-
  Олекса Влизько як молодий український поет морської, подорожньої й баладної модерності,
  чию вже значну літературну кар'єру перервала груднева хвиля радянського терору 1934 року.
