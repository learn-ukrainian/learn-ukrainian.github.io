objectives:
- Аналізувати життя та спадщину Миколи Лисенка, уникаючи агіографічних оцінок
- Критично оцінювати внесок Лисенка в створення національної музичної школи в контексті європейського романтизму та імперських
  утисків
- Простежити, як Лисенко балансував між ролями композитора, етнографа та громадського діяча, і як цей баланс вплинув на його
  творчість
- Формулювати аргументовану позицію щодо ролі митця в національно-визвольному русі
