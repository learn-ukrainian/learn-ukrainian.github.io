content_outline:
- annotations:
  - '[!biography]'
  points:
  - 'Провокація: Як одна людина може бути одночасно збирачем сільських пісень і творцем європейської опери? Микола Лисенко
    — геній, що поєднав непоєднуване, чи символ культурного розриву?'
  - 'Парадокс: Чому найвідоміший український композитор XIX ст. практично невідомий за межами України? Розгадка — в його непоступливих
    принципах.'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  - '[!decolonization]'
  points:
  - 'Дебат 1: Лисенко в очах сучасників. Для одних — "народник", що обмежує себе фольклором. Для інших — єдиний професіонал,
    здатний створити національну школу. Суперечки з російським імперським музичним товариством.'
  - 'Дебат 2: Радянська vs. сучасна інтерпретація. СРСР зображував Лисенка як "прогресивного демократа", применшуючи його
    роль у національному пробудженні. Сучасна наука бачить у ньому одного з ключових діячів антиколоніального спротиву.'
  - '[!epistemic-humility] Чи був його фокус на фольклорі свідомим вибором чи вимушеним кроком в умовах Емського указу, що
    забороняв українську мову в "серйозних" жанрах?'
  - '[!decolonization] Відмова Лисенка від пропозиції Чайковського поставити "Тараса Бульбу" в Петербурзі російською — це
    акт культурного самоствердження, а не "націоналістична обмеженість".'
  section: 'Конфліктна карта: Народник чи класик?'
  words: 900
- points:
  - 'Походження: козацько-старшинський рід, Полтавщина. Як середовище українського дворянства сформувало його ідентичність.'
  - 'Освіта: нетиповий шлях. Природничі науки в Київському університеті, а потім — Лейпцизька консерваторія. Як це поєднання
    вплинуло на його світогляд.'
  - 'Формативні впливи: знайомство з Тарасом Шевченком, захоплення етнографією, перші експедиції для запису народних пісень.'
  section: 'Формування: Шлях від Гриньок до Лейпцига'
  words: 1000
- points:
  - 'Оперна спадщина: "Тарас Бульба", "Наталка Полтавка", "Енеїда". Аналіз того, як Лисенко трансформував фольклорні сюжети
    в монументальні оперні полотна.'
  - 'Вокальна та хорова музика: "Музика до Кобзаря" — створення канону українського романсу. Хорові твори як основа репертуару
    національних хорів.'
  - 'Інструментальна творчість: від фортепіанних мініатюр до спроб створення симфонії. Чому інструментальні жанри займають
    менше місця в його спадщині?'
  section: 'Діяльність: Створення національного музичного канону'
  words: 1300
- annotations:
  - '[!anti-hagiography]'
  - '[!myth-buster]'
  points:
  - '[!anti-hagiography] "Інцидент з Чайковським": детальний розгляд відмови перекласти лібрето "Тараса Бульби". Це був тріумф
    принципу, але чи не став він поразкою для кар''єри?'
  - 'Боротьба з цензурою: Емський указ як постійний фактор, що обмежував творчість. Лисенко як "майстер обходу" заборон.'
  - 'Лідер мимоволі: тягар громадської діяльності. Організація хорів, "Київської музичної школи", участь у національних товариствах.
    Скільки музики не було написано через цю діяльність?'
  - '[!myth-buster] Міф про "простого народного композитора". Лисенко був високоосвіченою людиною, аристократом, що свідомо
    обрав "народний" шлях як політичну та мистецьку програму.'
  section: 'Тінь: Ціна непоступливості'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Повернення до розминки: то ким був Лисенко — збирачем фольклору чи творцем елітарного мистецтва? Відповідь студента з
    аргументами з модуля.'
  - 'Спадщина Лисенка — це не просто опери та пісні, а створена ним екосистема: музична освіта, виконавська традиція, стандарт
    мови в музиці.'
  - '[!decolonization] Лисенко деколонізував українську музику, довівши, що вона може існувати поза російським та польським
    культурними контекстами.'
  - 'Сучасне значення: Чому музика Лисенка, написана в XIX столітті, знову стала актуальною після 2014 та 2022 років?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Mykola Lysenko as a complex figure: European-trained composer vs. ethnographic populist, creator of a national musical
  canon vs. uncompromising cultural activist whose principles limited his international reach.'
