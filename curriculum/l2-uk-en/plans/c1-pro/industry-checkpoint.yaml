module: c1-pro-044
level: C1-PRO
sequence: 44
slug: industry-checkpoint
version: '2.0'
title: 'Контрольна точка: Галузева спеціалізація'
subtitle: Industry Checkpoint
focus: checkpoint
pedagogy: TTT
phase: C1-PRO.3
word_target: 4000
objectives:
- Учень демонструє володіння термінологією різних галузей
- Учень може аналізувати та готувати галузеву документацію
- Учень може комунікувати в міжкультурному професійному середовищі
- Учень може об'єктивно оцінити свої галузеві компетенції
content_outline:
- section: Огляд фази — Галузева спеціалізація
  points:
  - Ключові навички C1-PRO.3 (IT, фінанси, право, медицина, переклад)
  - Критерії оцінювання галузевої комунікації
  - Структура контрольної точки
  words: 650
- section: Оцінювання галузевої термінології
  points:
  - 'Завдання 1: Тест на знання термінології (IT, фінанси, право)'
  - 'Завдання 2: Тест на знання термінології (медицина, енергетика, агро)'
  - Критерії оцінки точності та доречності термінів
  words: 650
- section: Оцінювання документації
  points:
  - 'Завдання 3: Проаналізувати контракт та виявити ключові елементи'
  - 'Завдання 4: Оцінити якість технічної документації'
  - 'Завдання 5: Підготувати переклад фрагменту тексту'
  words: 650
- section: Оцінювання комунікації
  points:
  - 'Завдання 6: Провести міжкультурні переговори (рольова гра)'
  - 'Завдання 7: Презентувати галузевий проєкт'
  - Критерії оцінки професійної комунікації
  words: 650
- section: Самооцінка та рефлексія
  points:
  - Інструмент самооцінки галузевих компетенцій
  - Визначення сильних сторін та напрямків розвитку
  - План подальшого вдосконалення
  words: 650
- section: Підсумки та рекомендації
  points:
  - Загальна оцінка готовності до професійної діяльності
  - Перехід до фази кар'єрного розвитку
  words: 750
vocabulary_hints:
  required:
  - оцінювання компетенцій (competency assessment)
  - галузева термінологія (industry terminology)
  - професійна комунікація (professional communication)
  - критерії оцінки (assessment criteria)
  - самооцінка (self-assessment)
  - рефлексія (reflection)
  - компетентність (competence)
  - зворотний зв'язок (feedback)
  recommended:
  - рубрика оцінювання (assessment rubric)
  - портфоліо (portfolio)
  - демонстрація навичок (skills demonstration)
  - професійний розвиток (professional development)
  - сертифікація (certification)
  - атестація (attestation)
activity_hints:
- type: quiz
  focus: Перевірити знання галузевої термінології (всі сектори)
  items: 30
- type: document-analysis
  focus: Проаналізувати контракт та технічну документацію
  items: 2
- type: writing-task
  focus: Виконати переклад та підготувати документ
  items: 2
- type: role-play
  focus: Провести переговори та презентацію
  items: 2
- type: self-assessment
  focus: Заповнити інструмент самооцінки
  items: 1
connects_to:
- 'c1-pro-45 (Industry Integration)'
prerequisites:
