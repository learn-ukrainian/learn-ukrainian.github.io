persona:
  voice: Senior Specialist
  role: Галузевий аудитор
grammar:
- Конструкції для самооцінки (Я впевнено володію... / Мені потрібно вдосконалити... / Моєю сильною стороною є...)
- Конструкції для рефлексії (Під час виконання я зрозумів... / Найбільшим викликом було... / Я покращив...)
- Конструкції для планування (Надалі я планую... / Для вдосконалення потрібно... / Мій план дій включає...)
register: напівформальний
