module: c1-pro-043
level: C1-PRO
sequence: 43
slug: cross-cultural-communication
version: '2.0'
title: Міжкультурна комунікація
subtitle: Cross-Cultural Communication
focus: professional
pedagogy: ESP
phase: C1-PRO.3
word_target: 4000
objectives:
- Учень розуміє основні культурні виміри та їх вплив на комунікацію
- Учень може адаптувати свій комунікаційний стиль до різних культур
- Учень може ефективно вести переговори в міжкультурному середовищі
- Учень може уникати культурних непорозумінь у професійному контексті
content_outline:
- section: Розминка — Культурні виміри
  points:
  - Модель Гофстеде та її застосування
  - Україна в контексті культурних вимірів
  - Чому міжкультурна компетентність важлива для бізнесу
  words: 650
- section: Комунікаційні стилі
  points:
  - 'Висококонтекстні та низькоконтекстні культури: особливості'
  - Прямий та непрямий стиль комунікації
  - 'Ставлення до часу: монохронні та поліхронні культури'
  - Невербальна комунікація в різних культурах
  words: 650
- section: Адаптація комунікації
  points:
  - Робота з партнерами з різних регіонів (ЄС, США, Азія)
  - Уникнення культурних непорозумінь
  - Етикет ділових зустрічей та переговорів
  - Особливості комунікації з українськими партнерами для іноземців
  words: 650
- section: Міжкультурні переговори
  points:
  - Підготовка до переговорів з урахуванням культури
  - 'Стилі переговорів: конкурентний, колаборативний, компромісний'
  - Управління конфліктами в міжкультурному середовищі
  - Побудова довіри з партнерами з різних культур
  words: 650
- section: Зразки міжкультурної комунікації
  points:
  - Зразок електронного листа з урахуванням культурних особливостей
  - Приклади адаптації презентацій для різних аудиторій
  - Типові фрази для дипломатичної комунікації
  words: 650
- section: Практика — Міжкультурна комунікація
  points:
  - 'Завдання: Адаптувати презентацію для аудиторії з іншої культури'
  - 'Вимоги: культурна чутливість, адаптація стилю, етикет'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - культурний вимір (cultural dimension)
  - висококонтекстна культура (high-context culture)
  - низькоконтекстна культура (low-context culture)
  - міжкультурна компетентність (cross-cultural competence)
  - культурний інтелект (cultural intelligence)
  - етноцентризм (ethnocentrism)
  - культурна адаптація (cultural adaptation)
  - невербальна комунікація (non-verbal communication)
  recommended:
  - дистанція влади (power distance)
  - індивідуалізм/колективізм (individualism/collectivism)
  - уникнення невизначеності (uncertainty avoidance)
  - монохронна культура (monochronic culture)
  - поліхронна культура (polychronic culture)
  - збереження обличчя (saving face)
activity_hints:
- type: case-study
  focus: Проаналізувати ситуацію міжкультурного непорозуміння — запропонувати рішення
  items: 2
- type: writing-task
  focus: Адаптувати діловий лист для партнера з іншої культури
  items: 1
- type: fill-in
  focus: Вибрати культурно відповідні формулювання
  items: 10
- type: matching
  focus: З'єднати культурні виміри з країнами та їхніми характеристиками
  items: 8
- type: role-play
  focus: Провести переговори з партнером з іншої культури
  items: 1
connects_to:
- 'c1-pro-44 (Контрольна точка: Галузева спеціалізація)'
prerequisites:
- c1-pro-42 (Основи усного перекладу)
persona:
  voice: Senior Specialist
  role: Культурний аташе
grammar:
- Конструкції для порівняння культур (На відміну від... / У той час як у... / Порівняно з...)
- Конструкції для рекомендацій (Варто враховувати... / Рекомендується... / Доцільно...)
- Конструкції для застережень (Слід уникати... / Не прийнято... / Може бути сприйнято як...)
register: напівформальний
