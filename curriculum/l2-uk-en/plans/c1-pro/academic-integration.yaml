module: c1-pro-029
level: C1-PRO
sequence: 29
slug: academic-integration
version: '2.0'
title: 'Інтеграція: Наукова комунікація'
subtitle: Academic Integration
focus: professional
pedagogy: ESP
phase: C1-PRO.2
word_target: 4000
objectives:
- Учень може інтегрувати всі академічні навички в повному циклі публікації
- Учень може планувати дослідження від ідеї до публікації
- Учень може адаптувати наукові матеріали для різних форматів
- Учень може будувати академічне портфоліо та наукову репутацію
content_outline:
- section: Вступ — Комплексний академічний сценарій
  points:
  - 'Кейс: Ви — молодий науковець, що готує першу публікацію'
  - Чому інтеграція академічних навичок критична для успіху
  - Огляд академічного циклу від ідеї до публікації
  words: 650
- section: 'Етап 1: Від ідеї до дослідження'
  points:
  - Формулювання дослідницького питання та гіпотези
  - Огляд літератури та ідентифікація прогалини
  - Розробка методології
  - 'Зразок: Дослідницький план'
  words: 650
- section: 'Етап 2: Написання статті'
  points:
  - Написання розділів за структурою IMRAD
  - Інтеграція цитувань та оформлення бібліографії
  - Редагування та вичитування
  - 'Зразок: Чернетка наукової статті'
  words: 650
- section: 'Етап 3: Подання та рецензування'
  points:
  - Вибір журналу та підготовка submission package
  - Відповідь на рецензію та внесення правок
  - Комунікація з редактором
  - 'Зразок: Response letter'
  words: 650
- section: 'Етап 4: Конференційна комунікація'
  points:
  - Адаптація статті в тези та презентацію
  - Виступ на конференції та Q&A
  - Нетворкінг з колегами
  - 'Зразок: Конференційні матеріали'
  words: 650
- section: Підсумок — Академічне портфоліо
  points:
  - Збір усіх матеріалів у портфоліо
  - Планування наступних публікацій та досліджень
  words: 750
vocabulary_hints:
  required:
  - академічний цикл (academic cycle)
  - дослідницьке питання (research question)
  - submission package (пакет для подання)
  - портфоліо науковця (academic portfolio)
  - публікаційна активність (publication record)
  - наукова репутація (academic reputation)
  - індекс цитування (citation index)
  - h-index (h-індекс)
  recommended:
  - peer-reviewed journal (рецензований журнал)
  - open access (відкритий доступ)
  - preprint (препринт)
  - наукова мережа (academic network)
  - ResearchGate
  - ORCID
activity_hints:
- type: writing-task
  focus: Написати дослідницький план та огляд літератури
  items: 2
- type: writing-task
  focus: Написати чернетку статті за структурою IMRAD
  items: 1
- type: writing-task
  focus: Підготувати submission package та response letter
  items: 2
- type: role-play
  focus: Провести конференційну презентацію та відповісти на запитання
  items: 1
- type: document-analysis
  focus: Зібрати та оцінити академічне портфоліо
  items: 1
connects_to:
- 'c1-pro-30 (Academic Capstone)'
prerequisites:
- 'c1-pro-28 (Academic Checkpoint)'
persona:
  voice: Senior Specialist
  role: Голова наукової ради
grammar:
- Інтеграція всіх конструкцій академічного письма у зв'язний наратив
- Перехід між форматами (стаття → тези → презентація)
- Конструкції для планування (Перший етап передбачає... / На наступному етапі...)
register: науковий
