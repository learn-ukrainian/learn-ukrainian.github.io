module: c1-pro-045
level: C1-PRO
sequence: 45
slug: industry-integration
version: '2.0'
title: 'Інтеграція: Галузева практика'
subtitle: Industry Integration
focus: professional
pedagogy: ESP
phase: C1-PRO.3
word_target: 4000
objectives:
- Учень може інтегрувати знання з різних галузей у комплексних проєктах
- Учень може адаптувати комунікацію для різних професійних аудиторій
- Учень може готувати документацію для міжгалузевих проєктів
- Учень може вести переговори зі стейкхолдерами з різних галузей
content_outline:
- section: Розминка — Інтеграція галузевих знань
  points:
  - Зв'язки між різними галузями в реальному бізнесі
  - Міждисциплінарні проєкти та їх особливості
  - Трансферабельні навички професійної комунікації
  words: 650
- section: Міжгалузеві сценарії
  points:
  - 'Сценарій 1: IT-проєкт для фінансової установи'
  - 'Сценарій 2: Правовий супровід енергетичного проєкту'
  - 'Сценарій 3: Медичний стартап з інвестиційним раундом'
  - Комунікація зі стейкхолдерами з різних галузей
  words: 650
- section: Комплексна документація
  points:
  - Підготовка документів для міжгалузевого проєкту
  - Адаптація термінології для різних аудиторій
  - Узгодження документації між відділами
  - Управління версіями та погодження
  words: 650
- section: Міжгалузеві переговори
  points:
  - Переговори з учасниками з різних галузей
  - Пояснення технічних аспектів нефахівцям
  - Досягнення консенсусу в складних проєктах
  - Управління очікуваннями різних стейкхолдерів
  words: 650
- section: Зразки міжгалузевої комунікації
  points:
  - Зразок листа погодження між юридичним та IT-відділами
  - Приклад презентації для змішаної аудиторії
  - Шаблон протоколу міжгалузевої наради
  words: 650
- section: Практика — Міжгалузевий проєкт
  points:
  - 'Завдання: Підготувати документацію для міжгалузевого проєкту'
  - 'Вимоги: адаптація термінології, узгодження, комунікація'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - міжгалузевий проєкт (cross-industry project)
  - стейкхолдер (stakeholder)
  - трансферабельні навички (transferable skills)
  - узгодження документації (document alignment)
  - міждисциплінарний (interdisciplinary)
  - адаптація термінології (terminology adaptation)
  - погодження (approval)
  - консенсус (consensus)
  recommended:
  - синергія (synergy)
  - інтеграція систем (systems integration)
  - крос-функціональна команда (cross-functional team)
  - спільне бачення (shared vision)
  - координація (coordination)
  - комунікаційний місток (communication bridge)
activity_hints:
- type: case-study
  focus: Опрацювати міжгалузевий сценарій — підготувати рішення
  items: 2
- type: writing-task
  focus: Підготувати документацію для міжгалузевого проєкту
  items: 1
- type: role-play
  focus: Провести переговори з учасниками з різних галузей
  items: 1
- type: document-analysis
  focus: Проаналізувати документацію міжгалузевого проєкту
  items: 2
- type: fill-in
  focus: Адаптувати термінологію для різних аудиторій
  items: 10
connects_to:
- c1-pro-46 (Professional Portfolio)
prerequisites:
- 'c1-pro-44 (Industry Checkpoint)'
persona:
  voice: Senior Specialist
  role: Операційний директор (COO)
grammar:
- Конструкції для пояснення (Простіше кажучи... / Це означає, що... / Іншими словами...)
- Конструкції для узгодження (Пропоную узгодити... / Чи погоджуєтесь ви з... / Після погодження всіх сторін...)
- Конструкції для адаптації (З точки зору юриста... / Для IT-команди це означає... / Фінансовий аспект полягає в...)
register: напівформальний
