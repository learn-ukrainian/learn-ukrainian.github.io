module: c1-pro-047
level: C1-PRO
sequence: 47
slug: personal-branding
version: '2.0'
title: Особистий бренд
subtitle: Personal Branding
focus: professional
pedagogy: ESP
phase: C1-PRO.4
word_target: 4000
objectives:
- Учень може визначити та сформулювати свою унікальну ціннісну пропозицію
- Учень може створювати експертний контент українською мовою
- Учень може ефективно управляти своєю онлайн-присутністю
- Учень може будувати особистий бренд як стратегію кар'єрного розвитку
content_outline:
- section: Розминка — Особистий бренд професіонала
  points:
  - Що таке особистий бренд та чому він важливий
  - Різниця між репутацією та брендом
  - Особистий бренд українською мовою як стратегія
  words: 650
- section: Побудова бренду
  points:
  - Визначення унікальної ціннісної пропозиції (УЦП)
  - Цільова аудиторія та позиціонування
  - 'Ключові повідомлення: як говорити про себе'
  - Візуальна ідентичність професіонала
  words: 650
- section: Онлайн-присутність
  points:
  - LinkedIn-профіль українською
  - Професійні соціальні мережі в Україні
  - Контент-маркетинг для особистого бренду
  - Управління репутацією в інтернеті
  words: 650
- section: Експертний контент
  points:
  - Ведення професійного блогу
  - Виступи на конференціях та подкасти
  - Публікації в галузевих медіа
  - Участь у професійних спільнотах
  words: 650
- section: Зразки елементів особистого бренду
  points:
  - Зразок заголовку LinkedIn українською
  - Приклад біографії для виступу
  - Шаблон публікації для LinkedIn
  words: 650
- section: Практика — Особистий бренд
  points:
  - 'Завдання: Розробити стратегію особистого бренду'
  - 'Вимоги: УЦП, ключові повідомлення, контент-план'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - особистий бренд (personal brand)
  - ціннісна пропозиція (value proposition)
  - позиціонування (positioning)
  - цільова аудиторія (target audience)
  - онлайн-присутність (online presence)
  - репутація (reputation)
  - експертність (expertise)
  - контент-маркетинг (content marketing)
  recommended:
  - thought leadership (лідерство думок)
  - нетворкінг (networking)
  - впізнаваність (recognition)
  - автентичність (authenticity)
  - engagement (залученість)
  - особистий наратив (personal narrative)
activity_hints:
- type: writing-task
  focus: Написати заголовок та секцію «Про мене» для LinkedIn
  items: 1
- type: document-analysis
  focus: Проаналізувати LinkedIn-профілі успішних професіоналів
  items: 2
- type: fill-in
  focus: Сформулювати ключові повідомлення особистого бренду
  items: 8
- type: writing-task
  focus: Написати публікацію для LinkedIn на професійну тему
  items: 1
- type: case-study
  focus: Розробити контент-план для особистого бренду
  items: 1
connects_to:
- c1-pro-48 (Кар'єрний розвиток)
prerequisites:
- c1-pro-46 (Професійне портфоліо)
persona:
  voice: Senior Specialist
  role: Бренд-стратег
grammar:
- Конструкції для самопрезентації (Я спеціалізуюсь на... / Моя експертиза полягає в... / Допомагаю компаніям...)
- Конструкції для ціннісної пропозиції (Я допомагаю... досягати... через... / Мій унікальний підхід полягає в...)
- Конструкції для експертного контенту (На мою думку... / Зі свого досвіду можу сказати... / Ключовий висновок...)
register: напівформальний
