module: c1-pro-016
level: C1-PRO
sequence: 16
slug: academic-writing-structure
version: '2.0'
title: 'Наукове письмо: Структура'
subtitle: Academic Writing Structure
focus: professional
pedagogy: ESP
phase: C1-PRO.2
word_target: 4000
objectives:
- Учень розуміє структуру IMRAD та може застосовувати її для організації тексту
- Учень може формулювати чітку тезу та будувати аргументацію
- Учень може використовувати академічний регістр та хеджування
- Учень може писати вступ до наукової статті за міжнародними стандартами
content_outline:
- section: Розминка — Академічне письмо як жанр
  points:
  - Чим академічне письмо відрізняється від ділового
  - Міжнародні стандарти наукових публікацій
  - Українська наукова традиція та її особливості
  words: 650
- section: Структура IMRAD
  points:
  - 'Introduction: постановка проблеми та мета дослідження'
  - 'Methods: опис методології'
  - 'Results: представлення даних'
  - 'And Discussion: інтерпретація та висновки'
  - Коли використовувати IMRAD, коли інші структури
  words: 650
- section: Розвиток тези та аргументації
  points:
  - 'Формулювання тези: чітка, спірна, доказова'
  - Побудова аргументації — від загального до конкретного
  - Контраргументи та їх спростування
  - Логічні зв'язки між абзацами та розділами
  words: 650
- section: Академічний стиль та регістр
  points:
  - Безособові конструкції та пасивний стан
  - 'Хеджування: обережні формулювання для наукових тверджень'
  - Цитування та парафраз — як інтегрувати чужі думки
  - Типові помилки українських авторів в академічному стилі
  words: 650
- section: Зразок наукової статті
  points:
  - Структура статті з соціальних наук (IMRAD)
  - Аналіз вступу та формулювання мети
  - Типові фрази для переходів між розділами
  words: 650
- section: Практика — Написання вступу
  points:
  - 'Завдання: Написати вступ до наукової статті за структурою IMRAD'
  - 'Вимоги: постановка проблеми, огляд контексту, мета, теза'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - IMRAD (структура наукової статті)
  - теза (thesis)
  - аргументація (argumentation)
  - хеджування (hedging)
  - постановка проблеми (problem statement)
  - мета дослідження (research objective)
  - гіпотеза (hypothesis)
  - парафраз (paraphrase)
  recommended:
  - академічний регістр (academic register)
  - дискурсивні маркери (discourse markers)
  - логічна послідовність (logical sequence)
  - безособові конструкції (impersonal constructions)
  - наукова новизна (scientific novelty)
  - актуальність дослідження (research relevance)
activity_hints:
- type: document-analysis
  focus: Проаналізувати структуру наукової статті — визначити елементи IMRAD
  items: 2
- type: writing-task
  focus: Написати вступ до наукової статті з постановкою проблеми та метою
  items: 1
- type: fill-in
  focus: Вставити правильні дискурсивні маркери для переходів
  items: 10
- type: rewriting
  focus: Перефразувати неформальні твердження в академічному стилі
  items: 8
- type: matching
  focus: З'єднати елементи IMRAD з їхніми функціями
  items: 6
connects_to:
- c1-pro-17 (Огляд літератури)
prerequisites:
- 'c1-pro-15 (Підсумок: Виконавчий рівень)'
persona:
  voice: Senior Specialist
  role: Науковий редактор
grammar:
- Безособові конструкції (Було досліджено... / Встановлено, що...)
- Пасивний стан для об'єктивності (Дані були зібрані... / Метод був застосований...)
- Конструкції хеджування (Ймовірно... / Можна припустити, що... / Результати свідчать про...)
register: науковий
