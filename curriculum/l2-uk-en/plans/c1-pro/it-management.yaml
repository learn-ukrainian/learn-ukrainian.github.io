module: c1-pro-031
level: C1-PRO
sequence: 31
slug: it-management
version: '2.0'
title: ІТ-менеджмент
subtitle: IT Management
focus: professional
pedagogy: ESP
phase: C1-PRO.3
word_target: 4000
objectives:
- Учень може використовувати термінологію Agile та DevOps у професійному контексті
- Учень може готувати проєктну документацію для ІТ-проєктів
- Учень може комунікувати з технічними та нетехнічними стейкхолдерами
- Учень може проводити Agile-церемонії українською мовою
content_outline:
- section: Розминка — ІТ як стратегічна функція
  points:
  - Роль ІТ-менеджера в сучасній організації
  - 'Українська ІТ-індустрія: специфіка та можливості'
  - Баланс технічних та управлінських навичок
  words: 650
- section: Методології управління проєктами
  points:
  - 'Waterfall vs Agile: коли що застосовувати'
  - 'Scrum: ролі, артефакти, церемонії'
  - 'Kanban: візуалізація, WIP-ліміти, потік'
  - Масштабування Agile — SAFe, LeSS
  words: 650
- section: DevOps та операційна діяльність
  points:
  - 'DevOps культура: співпраця розробки та операцій'
  - 'CI/CD: безперервна інтеграція та доставка'
  - Моніторинг, логування, інцидент-менеджмент
  - SLA, SLO, SLI — як вимірювати надійність
  words: 650
- section: Управління ІТ-командою
  points:
  - 'Наймання: технічні інтерв''ю, оцінка soft skills'
  - 'Performance review: 1-on-1, OKR, зворотний зв''язок'
  - Розвиток команди — менторинг, технічний ріст
  - Віддалені та розподілені команди
  words: 650
- section: Зразки ІТ-документації
  points:
  - Зразок project charter для Agile-проєкту
  - Зразок sprint review звіту
  - Типові формулювання для технічної комунікації
  words: 650
- section: Практика — ІТ-менеджмент
  points:
  - 'Завдання: Підготувати kickoff presentation для нового проєкту'
  - 'Вимоги: scope, timeline, ролі, ризики'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - спринт (sprint)
  - беклог (backlog)
  - стендап (standup)
  - ретроспектива (retrospective)
  - реліз (release)
  - деплой (deployment)
  - інцидент (incident)
  - SLA (угода про рівень послуг)
  recommended:
  - product owner (власник продукту)
  - scrum master (скрам-майстер)
  - user story (користувацька історія)
  - velocity (швидкість команди)
  - burndown chart (діаграма згоряння)
  - code review (огляд коду)
activity_hints:
- type: document-analysis
  focus: Проаналізувати проєктну документацію — оцінити структуру та повноту
  items: 2
- type: writing-task
  focus: Написати kickoff presentation для ІТ-проєкту
  items: 1
- type: fill-in
  focus: Вставити правильну Agile-термінологію в контекст
  items: 10
- type: case-study
  focus: Обрати методологію для запропонованого проєкту та обґрунтувати вибір
  items: 1
- type: role-play
  focus: Провести sprint planning зустріч
  items: 1
connects_to:
- c1-pro-32 (ІТ-архітектура)
prerequisites:
- 'c1-pro-30 (Підсумок: Академічний рівень)'
persona:
  voice: Senior Specialist
  role: Технічний директор (CTO)
grammar:
- Технічні терміни та їхня адаптація в українській (деплоїти, комітити, мерджити)
- Імперативні конструкції для завдань (Потрібно реалізувати... / Необхідно протестувати...)
- Конструкції для оцінки часу (Орієнтовно займе... / За оцінкою команди...)
register: технічний
