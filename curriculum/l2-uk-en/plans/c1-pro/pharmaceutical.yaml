module: c1-pro-038
level: C1-PRO
sequence: 38
slug: pharmaceutical
version: '2.0'
title: Фармацевтика
subtitle: Pharmaceutical
focus: professional
pedagogy: ESP
phase: C1-PRO.3
word_target: 4000
objectives:
- Учень може використовувати фармацевтичну термінологію професійно
- Учень може готувати та аналізувати регуляторну документацію
- Учень може комунікувати з регуляторами та медичною спільнотою
- Учень розуміє процес розробки та реєстрації лікарських засобів
content_outline:
- section: Розминка — Фармацевтична галузь України
  points:
  - 'Структура ринку: виробництво, дистрибуція, роздріб'
  - Державне регулювання та Держлікслужба
  - Роль фармацевтичних компаній та аптек
  words: 650
- section: Розробка лікарських засобів
  points:
  - 'Етапи розробки: доклінічні та клінічні дослідження'
  - Реєстрація лікарських засобів в Україні
  - 'GMP (належна виробнича практика): вимоги та сертифікація'
  - Генерики та оригінальні препарати
  words: 650
- section: Регуляторна документація
  points:
  - Реєстраційне досьє та його структура
  - Інструкція для медичного застосування
  - Фармаконагляд та повідомлення про побічні реакції
  - Маркування та пакування
  words: 650
- section: Фармацевтична комунікація
  points:
  - Комунікація з регуляторами
  - 'Медичні представники: етичне просування'
  - Наукова комунікація в фармацевтиці
  - Комунікація під час відкликання препарату
  words: 650
- section: Зразки фармацевтичної документації
  points:
  - Зразок інструкції для медичного застосування
  - Зразок листа до регулятора
  - Типові фармацевтичні формулювання
  words: 650
- section: Практика — Фармацевтична документація
  points:
  - 'Завдання: Адаптувати інструкцію для медичного застосування'
  - 'Вимоги: структура, термінологія, читабельність'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - лікарський засіб (medicinal product)
  - реєстрація препарату (drug registration)
  - клінічні дослідження (clinical trials)
  - GMP (належна виробнича практика)
  - побічна реакція (adverse reaction)
  - фармаконагляд (pharmacovigilance)
  - інструкція для медичного застосування (package insert)
  - діюча речовина (active substance)
  recommended:
  - генерик (generic)
  - біоеквівалентність (bioequivalence)
  - доклінічні дослідження (preclinical studies)
  - реєстраційне посвідчення (marketing authorization)
  - серія препарату (batch)
  - термін придатності (expiry date)
activity_hints:
- type: document-analysis
  focus: Проаналізувати інструкцію для медичного застосування
  items: 2
- type: writing-task
  focus: Адаптувати інструкцію препарату для пацієнтів
  items: 1
- type: fill-in
  focus: Вставити правильну фармацевтичну термінологію
  items: 10
- type: matching
  focus: З'єднати етапи розробки препарату з їхнім описом
  items: 8
- type: case-study
  focus: Підготувати план комунікації при відкликанні препарату
  items: 1
connects_to:
- c1-pro-39 (Energy Sector)
prerequisites:
- c1-pro-37 (Healthcare Management)
persona:
  voice: Senior Specialist
  role: Керівник клінічних досліджень
grammar:
- Конструкції для інструкцій (Застосовувати по... / Протипоказаний при... / У разі появи...)
- Імперативні конструкції для вимог (Зберігати при температурі... / Не застосовувати після...)
- Конструкції для застережень (Слід з обережністю застосовувати... / Перед застосуванням проконсультуватися...)
register: офіційно-діловий
