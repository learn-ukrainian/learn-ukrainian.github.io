module: c1-pro-002
level: C1-PRO
sequence: 2
slug: stakeholder-communication
version: '2.0'
title: Комунікація зі стейкхолдерами
subtitle: Stakeholder Communication
focus: professional
pedagogy: ESP
phase: C1-PRO.1
word_target: 4000
objectives:
- Учень може аналізувати та класифікувати стейкхолдерів проєкту
- Учень може розробляти комунікаційний план для різних груп
- Учень може управляти очікуваннями через регулярні оновлення
- Учень може ефективно комунікувати зміни та ризики
content_outline:
- section: Розминка — Хто такі стейкхолдери
  points:
  - Визначення та класифікація стейкхолдерів (внутрішні, зовнішні, ключові)
  - Чому комунікація зі стейкхолдерами критична для успіху проєкту
  - Українська специфіка — формальні та неформальні впливові особи
  words: 650
- section: Аналіз стейкхолдерів
  points:
  - 'Матриця впливу/інтересу: хто потребує якої уваги'
  - 'Визначення потреб: що хоче знати кожна група'
  - 'Комунікаційні канали: формальні (звіти) vs неформальні (зустрічі)'
  - Частота та формат комунікації для різних груп
  words: 650
- section: Управління очікуваннями
  points:
  - Як встановлювати реалістичні очікування з самого початку
  - 'Регулярні оновлення: структура статус-репорту'
  - Як повідомляти про зміни обсягу, термінів, бюджету
  - Техніка «без сюрпризів» — попередження про ризики
  words: 650
- section: Складні комунікації зі стейкхолдерами
  points:
  - Конфлікт інтересів між групами стейкхолдерів
  - Невдоволений стейкхолдер — як відновити довіру
  - Політичні ситуації — як залишатися нейтральним
  - Ескалація vs самостійне вирішення
  words: 650
- section: Зразки стейкхолдер-комунікації
  points:
  - Зразок статус-репорту для різних аудиторій
  - Зразок листа про зміну термінів
  - Аналіз успішної та невдалої комунікації
  words: 650
- section: Практика — Комунікаційний план
  points:
  - 'Завдання: Розробити комунікаційний план для проєкту'
  - 'Вимоги: карта стейкхолдерів, формати, частота, ключові повідомлення'
  - Критерії оцінювання
  words: 750
vocabulary_hints:
  required:
  - стейкхолдер (stakeholder)
  - управління очікуваннями (expectation management)
  - статус-репорт (status report)
  - комунікаційний план (communication plan)
  - матриця впливу (influence matrix)
  - ключове повідомлення (key message)
  - ескалація (escalation)
  - ризик-комунікація (risk communication)
  recommended:
  - спонсор проєкту (project sponsor)
  - керівний комітет (steering committee)
  - зацікавлена сторона (interested party)
  - регулярне оновлення (regular update)
  - зміна обсягу (scope change)
  - канал комунікації (communication channel)
activity_hints:
- type: document-analysis
  focus: Проаналізувати статус-репорт — оцінити адаптацію для аудиторії
  items: 2
- type: writing-task
  focus: Написати лист про зміну термінів проєкту для різних стейкхолдерів
  items: 2
- type: case-study
  focus: Розробити комунікаційний план для проєкту
  items: 1
- type: fill-in
  focus: Заповнити матрицю стейкхолдерів для кейсу
  items: 8
- type: role-play
  focus: Провести зустріч із невдоволеним стейкхолдером
  items: 1
connects_to:
- c1-pro-03 (Презентації для ради)
prerequisites:
- c1-pro-01 (Виконавче листування)
persona:
  voice: Senior Specialist
  role: Директор із зв'язків з інвесторами
grammar:
- Конструкції для пом'якшення негативу (На жаль, ми змушені повідомити...)
- Конструкції причини та наслідку (У зв'язку з... ми пропонуємо...)
- Конструкції для пропозицій (Пропонуємо розглянути варіант...)
register: офіційно-діловий
