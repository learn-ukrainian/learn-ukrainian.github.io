level: A2
slug: a2-practice-exam
title: Тренувальний іспит
focus: review
pedagogy: review
word_target: 1500
objectives:
- Перевірити навички розуміння прочитаного тексту.
- Оцінити вміння будувати письмові висловлювання відповідно до завдання.
- Перевірити знання граматики та лексики через тестові завдання.
- Оцінити навички аудіювання та усного мовлення.
- Симулювати умови іспиту для визначення рівня готовності до А2.
content_outline:
- section: 'Частина 1: Читання'
  points:
  - Прочитати короткий адаптований текст (напр., оголошення, лист, опис).
  - Виконати завдання на розуміння: true/false або multiple choice.
- section: 'Частина 2: Письмо'
  points:
  - Написати коротке повідомлення (70-80 слів), наприклад, email другові про плани
    на відпустку.
  - Завдання перевіряє вміння логічно викладати думки та використовувати відповідну
    лексику і граматику.
- section: 'Частина 3: Використання мови (Граматика та Лексика)'
  points:
  - Тест у форматі multiple choice або fill-in-the-blanks.
  - Завдання на відмінки, види дієслів, ступені порівняння, займенники тощо.
  - Завдання на вибір правильного слова в контексті.
- section: 'Частина 4: Аудіювання'
  points:
  - Прослухати короткий діалог або монолог (напр., прогноз погоди, розмова в магазині).
  - Виконати завдання на розуміння почутого (true/false, multiple choice).
- section: 'Частина 5: Говоріння'
  points:
  - Розповідь про себе, свою сім'ю, роботу або хобі.
  - Опис картинки або фотографії.
  - Розігрування короткого діалогу за заданою ситуацією (напр., "у кав'ярні").
