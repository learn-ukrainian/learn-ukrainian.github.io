- Prepositions of place review
- Adjectives for home description
register: розмовний
immersion: 60-75% Ukrainian
phase: A2.5 [Vocabulary Expansion]
persona:
  voice: Encouraging Cultural Guide
  role: Professional Mover
word_target: 3000
