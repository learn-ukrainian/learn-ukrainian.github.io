module: a2-46
level: A2
sequence: 46
slug: home-and-furniture
version: '2.0'
title: Home and Furniture
subtitle: Where I Live
content_outline:
- section: Вступ
  points:
  - Types of housing — aligns with State Standard §3.2 (квартира, приватний будинок)
  - Home vocabulary introduction — use a 'Room Map' concept to group items logically
- section: Граматика
  points:
  - 'Rooms (кухня, вітальня, спальня) — note ''на кухні'' exception (English ''in'',
    Ukrainian ''on''); learner error: confusing prepositions'
  - 'Furniture (стіл, стілець, диван, ліжко) — cultural hook: superstition about sitting
    at the corner of a table (unmarried); learner error: ''у столі'' (inside) vs ''на
    столі'' (on)'
  - Appliances (холодильник, пральна машина) — builds on a2-45 (Food/Cooking)
  - 'Locative case for location — explicitly highlight consonant mutations [г]→[з],
    [к]→[ц], [х]→[с] (e.g., підлога -> на підлозі); learner error: forgetting mutations'
- section: Практика
  points:
  - 'Dialogues about homes — cultural hook: The Threshold (Поріг) taboo (shaking hands
    across it)'
  - 'Room descriptions — learner error: confusing Location (Locative) vs Direction
    (Accusative)'
- section: Корисні вирази
  points:
  - Useful home phrases — include invitation etiquette (crossing threshold)
- section: Підсумок
  points:
  - Summary of vocabulary
vocabulary_hints:
  required:
  - 'кімната (room) — learner error: confusion with ''місце'' (place); location vs
    direction'
  - кухня (kitchen) — на кухні (in the kitchen) [exception]
  - спальня (bedroom) — у спальні (in the bedroom)
  - вітальня (living room) — у вітальні (in the living room)
  - ванна (bathroom) — у ванній (in the bathroom)
  - меблі (furniture) — collective noun (singular); меблі для дому
  - стіл (table) — на столі (on the table), ставити стіл (to set the table), письмовий
    стіл (desk)
  - ліжко (bed) — у ліжку (in bed), двоспальне ліжко (double bed), стелити ліжко (to
    make the bed)
  recommended:
  - шафа (wardrobe) — у шафі (in the wardrobe/closet), книжкова шафа (bookcase), шафа-купе
    (sliding wardrobe)
  - диван (sofa) — на дивані (on the sofa), лежати на дивані (to lie on the sofa)
  - холодильник (refrigerator) — common appliance
  - пральна машина (washing machine) — essential appliance
  - квартира (apartment) — у квартирі (in the apartment)
  - 'будинок (house) — у будинку (in the house); cultural hook: Domovyk (spirit protecting
    the home)'
activity_hints:
- type: match-up
  focus: Rooms and furniture
  items: 30
- type: match-up
  focus: Match furniture to rooms
  items: 20
- type: fill-in
  focus: Complete home descriptions
  items: 15
- type: quiz
  focus: Describe your home
  items: 8
focus: vocabulary
pedagogy: PPP
prerequisites:
- a2-45 (Food and Cooking)
connects_to:
- a2-47 (Nature and Weather)
- a2-61 (Hotel Accommodation)
objectives:
- Learner can name rooms in a house
- Learner can describe furniture and appliances
- Learner can say where things are located
- Learner can describe their own home
grammar:
