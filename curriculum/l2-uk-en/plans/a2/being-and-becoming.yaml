module: a2-06
level: A2
sequence: 6
slug: being-and-becoming
version: '2.0'
title: Being and Becoming
subtitle: Professions and Instrumental Case
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - 'Concept of role vs identity — distinguish Present Tense Identity (Nom. - *Я лікар*)
    vs. Role/Function/Process (Instr. - *Я буду лікарем*) — focus: State Standard
    §4.2.2.5.1: ''Без прийменника: характеристика особи за професією чи статусом'''
  - Explicit English explanation of the logic behind 'Identity (Nom) vs Function (Instr)'
    to provide scaffolding for A2.1 learners as suggested in research notes
  - The 'Nominative Trap' warning — explain L1 interference where learners say *Він
    хоче бути лікар* instead of the correct Instrumental *лікарем* (English 'to be
    a doctor' influence)
- section: 'Презентація: Дієслова та відмінювання (Presentation: Verbs and Governing)'
  words: 700
  points:
  - '''бути'' + instrumental (Past/Future) — key high-frequency collocations: *був
    студентом*, *буде лікарем*; distinguish from Present Tense null-copula + Nominative'
  - '''стати/ставати'' + instrumental (Change of State) — teaching *хоче стати...*
    constructions; mention formal *програмувальник* vs. universally used *програміст*'
  - '''працювати'' + instrumental (Current Role) — explicit focus on the ''Work as''
    calque error: explain that *працює як менеджер* is incorrect and must be *працює
    менеджером*'
  - 'Introduction of primary profession vocabulary: *лікар*, *вчитель*, *інженер*,
    *програміст*, *журналіст*, *юрист* with their instrumental forms'
- section: 'Соціокультурний контекст: Фемінітиви та IT (Sociocultural Context: Femininitives
    and IT)'
  words: 600
  points:
  - 'The 2020 Grammar Reform: Official status of femininitives (*директорка*, *менеджерка*,
    *філологиня*) reflecting modern Ukrainian societal shifts towards gender equality'
  - 'IT Industry Prestige: Discussing Ukraine as a European IT hub; teaching the high-prestige
    *програміст* alongside the ubiquitous colloquialism *айтішник*'
  - 'Usage note: Consistent use of both masculine and feminine forms for all profession
    examples to reflect contemporary linguistic standards'
- section: Практика та запобігання помилкам (Practice and Error Prevention)
  words: 600
  points:
  - Transformation drills (Present Identity to Past/Future Role) focusing on the shift
    from Nominative to Instrumental case endings
  - 'Addressing Gender Mismatch: Drilling agreement between gendered person nouns
    and professions (e.g., correcting *Вона хороший лікар* to *Вона хороша лікарка*)'
  - 'Correction of translation calques: Exercises specifically designed to root out
    the use of ''як'' after the verb *працювати*'
- section: Діалоги та кар'єрні плани (Dialogues and Career Plans)
  words: 600
  points:
  - '''What do you do?'' conversations — modeling natural modern usage in IT and professional
    contexts (*працюю айтішником*, *став тестувальником*)'
  - 'Career history scenarios: Describing past roles (*був офіціантом*) and future
    aspirations (*мрію стати громадянкою України*) as per State Standard examples'
  - 'Synthesis activity: Learners describe their path of ''being and becoming'' using
    the full range of grammar and vocabulary introduced'
vocabulary_hints:
  required:
  - бути (to be) — був студентом, буде лікарем; Very High Frequency; Past/Future requires
    Instrumental
  - стати (to become) — стати спеціалістом, хоче стати...; High Frequency; perfective
    aspect
  - ставати (to be becoming) — ставати кращим; process of change; imperfective
  - 'працювати (to work) — працює менеджером, працювати вчителем; High Frequency;
    note: do not use ''як'' (calque)'
  - лікар / лікарка (doctor) — працювати лікарем; High Frequency; note femininitiv
    reform
  - вчитель / вчителька (teacher) — буде вчителем; High Frequency
  - 'програміст / програмістка (programmer) — працювати програмістом; High prestige;
    formal: програмувальник'
  - айтішник / айтішниця (IT professional) — став айтішником; High Frequency colloquial
  - інженер / інженерка (engineer) — працював інженером; Medium-High Frequency
  - журналіст / журналістка (journalist) — стати журналістом
  - юрист / юристка (lawyer) — працює юристкою
  recommended:
  - економіст / економістка (economist)
  - менеджер / менеджерка (manager) — common in modern business context
  - спеціаліст / спеціалістка (specialist) — стати хорошим спеціалістом
  - громадянин / громадянка (citizen) — мріє стати громадянкою України (State Standard
    example)
  - директор / директорка (director) — 2020 reform focus
