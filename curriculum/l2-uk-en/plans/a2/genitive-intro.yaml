- |-
  Understand and apply: quantity (багато, мало, кілька + Gen.). Noun classes: hard (студент→студента), soft (водій→водія), -ар (лікар→лікаря)...
content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - 'Context and motivation: why this topic matters at A2. Connect to prior knowledge from A2.1.'
- section: Граматика 1 (Grammar 1)
  words: 550
  points:
  - 'Genitive without preposition: немає + Gen. (немає часу, немає грошей)'
- section: Граматика 2 (Grammar 2)
  words: 550
  points:
  - |-
    quantity (багато, мало, кілька + Gen.). **Noun classes:** hard (студент→студента), soft (водій→водія), -ар (лікар→лікаря), mixed (викладач→викладача). Fem. -а (книга→книги), -ія (аудиторія→аудиторії). Neuter -о/-е/-тя (вікно→вікна, життя→життя).
- section: Практика (Practice)
  words: 400
  points:
  - 'Reading Practice: 8-10 Ukrainian sentences using the grammar taught in this module.'
  - Mini-dialogues applying the grammar in real situations.
- section: Підсумок (Summary)
  words: 200
  points:
  - Key patterns summary. Self-check questions.
