module: a2-037
level: A2
sequence: 37
slug: all-cases-practice
version: 1.0.4
title: Все разом
subtitle: Розширені діалоги з усіма сімома відмінками в однині та множині
focus: grammar
pedagogy: PPP
phase: 'A2.5 [Синтез відмінків та множина]'
word_target: 2000
objectives:
- Учень може розуміти розгорнутий діалог, де природно вживаються всі 7 відмінків як в однині, так і в множині, та визначати, який відмінок використано і чому.
- Учень може правильно утворювати форми всіх 7 відмінків при заповненні пропусків у діалозі або короткому тексті.
- Учень може самостійно виправляти помилки у відмінках, застосовуючи процес прийняття рішень щодо дієслова/прийменника з модуля модуль №31.
- Учень може підтримувати коротку розмову (8-10 реплік) на повсякденну тему, правильно використовуючи щонайменше 5 різних відмінків.
dialogue_situations:
- setting: 'Діалог 1: Організація вечірки-сюрпризу на день народження в ресторані (m) — дзвінок, замовлення торта (m), купівля подарунка (m) для подруги (f). Діалог 2: У лікарні (f) — опис симптомів лікарю (m). Діалог 3: Планування подорожі Україною — Львів, Одеса, Карпати.'
  speakers:
  - Різні мовці для кожного діалогу
  motivation: 'Усі відмінки в реальних ситуаціях: ресторан, лікарня, подорож'
content_outline:
- section: 'Діалог 1: Організовуємо день народження'
  words: 550
  points:
  - 'Розгорнутий діалог (12-15 реплік) між двома друзями, які планують вечірку до дня народження. Природно включає: називний (підмети — хто прийде?), родовий (немає торта, багато гостей), давальний (подарунок Олені, написати друзям), знахідний (купити торт, запросити друзів), орудний (з друзями, прикрасити кулями), місцевий (у кафе, на вечірці), кличний (Оксано! Андрію!).'
  - 'Після кожного розділу діалогу: вправа на визначення відмінків — учень позначає відмінок кожного виділеного іменника та пояснює його маркер.'
  - 'Культурна примітка: українські традиції святкування дня народження — іменинник пригощає гостей (не гості дарують вечірку, а іменинник частує).'
- section: 'Діалог 2: У лікарні'
  words: 550
  points:
  - 'Розгорнутий діалог між пацієнтом і лікарем. Використані відмінки: називний (Що вас турбує?), родовий (немає температури, біля лікарні), давальний (лікарю, пацієнтові), знахідний (приймати ліки, на огляд), орудний (з кашлем, за рецептом), місцевий (у лікарні, на прийомі), кличний (Лікарю! Пане докторе!).'
  - 'Лексика на тему тіла та здоров''я органічно інтегрована: голова, горло, температура, ліки, рецепт, здоров''я.'
  - 'Після діалогу: учень переписує вибрані речення, змінюючи однину на множину (один пацієнт → багато пацієнтів, одні ліки → вираження різної кількості).'
- section: 'Діалог 3: Подорож Україною'
  words: 550
  points:
  - 'Розгорнутий діалог між мандрівниками, які обговорюють подорож на авто. Відмінки: називний (Київ — гарне місто), родовий (з Києва, до Львова, багато визначних місць), давальний (друзям у Львові, нам треба), знахідний (відвідати Одесу, у четвер, через Умань), орудний (поїхати потягом, з подругою, милуватися Карпатами), місцевий (у Львові, по Хрещатику, у 2024 році), кличний (Тарасе! Друже!).'
  - 'Географічна лексика: міста, гори, річки, вулиці — усі вони відмінюються в багатьох відмінках протягом діалогу.'
  - 'Фрази для планування: Давай поїдемо... Може, спочатку... А потім можна...'
- section: 'Самоперевірка: Знайди помилку'
  words: 350
  points:
  - 'Короткі тексти (по 3-4 речення), що містять навмисні помилки у відмінках. Учень має знайти і виправити кожну помилку.'
  - 'Типи помилок: неправильний відмінок після прийменника, плутанина між істотами та неістотами у знахідному відмінку множини, неправильне закінчення родового відмінка множини, плутанина давального і місцевого відмінків.'
  - 'Підсумок: коротка довідка щодо всіх 7 відмінків з їхніми головними питальними словами, найпоширенішими прийменниками та типовими дієсловами-маркерами — "шпаргалка з відмінків", до якої учень може повертатися.'
- section: Підсумок
  words: 200
  points:
  - 'Повторення всіх 7 відмінків та їхніх маркерів (дієслів і прийменників) за допомогою шпаргалки, з особливою увагою до знахідного відмінка множини (істоти проти неістот) та закінчень родового відмінка множини.'
  - 'Самоперевірка: Проаналізуйте речення "Я їду до Львова з друзями" — визначте відмінок кожного іменника і правило, що його зумовлює. Як утворити кличний відмінок, звертаючись до лікаря чи друга (лікарю, Оксано)?'
  - 'Самоперевірка: Опишіть недавню подію (наприклад, вечірку на день народження чи подорож) у 4-5 реченнях, переконавшись, що ви природно використовуєте щонайменше 5 різних відмінків. Яка різниця між істотами та неістотами у знахідному відмінку множини?'
vocabulary_hints:
  required:
  - вечірка (party)
  - подарунок (gift, present)
  - лікар (doctor)
  - пацієнт (patient)
  - здоров'я (health)
  - ліки (medicine)
  - подорож (trip, journey)
  - потяг (train)
  - визначне місце (landmark, sight)
  - запрошувати (to invite)
  recommended:
  - рецепт (prescription, recipe)
  - температура (temperature)
  - Карпати (Carpathians)
  - милуватися (to admire)
  - частувати (to treat (with food))
activity_hints:
- type: fill-in
  focus: 'Заповнення пропусків у діалозі правильними формами — представлено всі 7 відмінків, як в однині, так і в множині'
  items: 8
- type: quiz
  focus: 'Визначення відмінка виділеного іменника та пояснення причини (дієслово чи прийменник-маркер)'
  items: 8
- type: match-up
  focus: 'Поєднання половин речень так, щоб форма відмінка в першій половині узгоджувалася з прийменником/дієсловом у другій'
  items: 8
- type: error-correction
  focus: 'Пошук та виправлення помилкових закінчень у всіх 7 відмінках (наприклад, *допомагаю сестру → сестрі, *багато студенти → студентів)'
  items: 6
references:
- title: Заболотний Grade 6, §§59-70
  notes: 'Повна парадигма відмінювання із вправами на комбінування всіх відмінків'
- title: Варзацька Grade 4, с. 38
  notes: 'Повна таблиця відмінювання — усі відмінки однини та множини пліч-о-пліч'
