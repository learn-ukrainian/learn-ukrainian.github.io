slug: all-cases-practice
title: Усе разом
level: A2
word_target: 2000
objectives:
- Integrate all 7 cases in both singular and plural forms within extended dialogues.
- Confidently switch between cases in a single conversation.
- Understand and respond to complex questions that require different cases in the
  answer.
- Use a wide range of prepositions and verbs that govern different cases.
- Tell a simple story or describe a past event using a variety of grammatical cases.
content_outline:
- section: 'Діалог 1: Планування подорожі'
  points:
  - Обговорення, куди поїхати (Знахідний), з ким (Орудний), коли (Родовий/Місцевий).
  - Запитання про ціни квитків (Родовий множини), про готелі (Місцевий).
  - 'Приклади фраз: ''Я хочу поїхати до Львова'', ''Скільки коштують квитки?'', ''Ми
    будемо жити в готелі біля центру''.'
- section: 'Діалог 2: Розмова по телефону з другом'
  points:
  - Розповідь про свій день (минулий час, різні відмінки).
  - Запрошення друга в гості (Знахідний) або в кіно (Знахідний).
  - Обговорення новин, фільмів, книг (Родовий, Місцевий).
  - 'Приклади фраз: ''Що ти робив учора?'', ''Ходімо в суботу в кафе?'', ''Я розповів
    батькам про тебе''.'
- section: 'Діалог 3: На прийомі в лікаря'
  points:
  - 'Опис симптомів: ''У мене болить голова'', ''Немає апетиту'' (Родовий).'
  - 'Відповіді на запитання лікаря: ''Що вас турбує?'', ''Як довго це триває?''.'
  - Обговорення лікування (Орудний), поради лікаря (Давальний).
  - 'Приклади фраз: ''Я вам раджу більше відпочивати'', ''Приймайте ці ліки тричі
    на день''.'
- section: 'Монолог: Розповідь про минулі вихідні'
  points:
  - 'Структура розповіді: де був, що робив, з ким зустрічався.'
  - Використання повного спектру відмінків для опису подій, людей та місць.
  - 'Приклад: ''Минулої суботи я з друзями поїхав за місто. Ми гуляли в лісі, насолоджувалися
    природою...'''
