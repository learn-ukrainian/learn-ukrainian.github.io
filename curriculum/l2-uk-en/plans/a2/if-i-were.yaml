module: a2-22
level: A2
sequence: 22
slug: if-i-were
version: '2.0'
title: If I Were
subtitle: The Conditional Mood
content_outline:
- section: Introduction / Вступ
  points:
  - Concept of the 'World of Dreams' — introduction to the conditional mood (Past
    Tense + б/би) aligned with State Standard §4.2.3.3
  - Difference between realization and imagination — establishing the core distinction
    between real conditions (якщо) and hypothetical/unreal conditions (якби)
- section: Presentation / Презентація
  points:
  - 'Formation: Past Tense + б/би — learner error: using ''би'' everywhere; rule:
    ''б'' after vowels (Я б...), ''би'' after consonants (Він би...)'
  - 'Comparison: Якщо (Real) vs Якби (Unreal) — essential visual table needed; learner
    error: using ''якщо'' for unreal conditions (e.g., ''Якщо я був королем...'' ->
    ''Якби я був королем...'')'
  - 'Structure Warning — learner error: forgetting to attach ''би'' to ''як'' (Як
    я був би -> Якби я був); ''якби'' is a single conjunction unit'
  - Polite requests (Мені б хотілося) — emphasize 'Я б хотів...' as a softer, more
    polite alternative to 'Я хочу' in service settings
  - 'Proverbial usage of conditions — cultural hook: ''Якби та аби, та виросли в роті
    гриби'' (If and maybe, then mushrooms would grow in the mouth)'
- section: Practice / Практика
  points:
  - Dreaming about the lottery/future — context for using collocations like 'виграти
    в лотерею', 'здійснити мрію'
  - Transformation drills (Real to Unreal) — focused practice on switching conjunctions
    and verb forms (Якщо я маю -> Якби я мав)
- section: Dialogues / Діалоги
  points:
  - Planning a dream vacation or career — integrating vocabulary 'планувати подорож',
    'мріяти про' into natural conversation
focus: grammar
pedagogy: PPP
objectives:
- Learner can form the conditional mood using the particle б/би
- Learner can distinguish between real (якщо) and unreal (якби) conditions
- Learner can express wishes and dreams
- Learner can make polite requests using the conditional
grammar:
- conditional mood formation (б/би)
- real condition (якщо)
- unreal condition (якби)
- polite requests (я б хотів)
module_type: grammar
