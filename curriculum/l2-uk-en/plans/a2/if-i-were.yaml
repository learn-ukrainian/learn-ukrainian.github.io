vocabulary_hints:
  required:
  - 'якби (if - unreal) — collocations: якби я був, якби ми мали; note: triggers conditional
    mood'
  - 'якщо (if - real) — collocations: якщо буде час, якщо хочете; note: triggers indicative
    mood (contrast with якби)'
  - 'хотіти (to want) — polite forms: я б хотів (I would like), хотілося б (one would
    like)'
  - 'мрія (dream) — collocations: здійснити мрію (to fulfill a dream), мріяти про
    (to dream about)'
  recommended:
  - 'виграти (to win) — collocations: виграти в лотерею, виграти приз'
  - 'подорож (trip/journey) — collocations: планувати подорож, вирушити в подорож'
