module: a2-22
level: A2
sequence: 22
slug: if-i-were
version: '2.0'
title: If I Were
subtitle: The Conditional Mood
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Concept of the 'World of Dreams' — introduction to the conditional mood (Past
    Tense + б/би) aligned with State Standard §4.2.3.3 and §4.4.2 requirements for
    hypothetical situations.
  - 'Semantic distinction: The Real World (якщо) vs. the World of Imagination (якби)
    — establishing the core distinction between potential real-world outcomes and
    pure fantasy.'
- section: Презентація граматики (Grammar Presentation)
  words: 800
  points:
  - 'Formation mechanics: Past Tense + particle б/би. Explicit rule for the phonological
    variation: ''б'' after vowels (Я б...) and ''би'' after consonants (Він би...)
    to correct the common error of using ''би'' everywhere.'
  - 'The ''Jakby'' Unit: Addressing the learner error of splitting the conjunction
    (e.g., correcting ''Як я був би...'' to the unified ''Якби я був...'').'
  - 'Visual Contrast Table: Real Condition (Якщо + Present/Future) vs Unreal Condition
    (Якби + Past). Emphasize that while English uses ''if'' for both, the Ukrainian
    conjunction choice determines the reality of the premise.'
- section: Культурний контекст (Cultural Context)
  words: 500
  points:
  - 'The ''Hrybi'' Proverb: ''Якби та аби, та виросли в роті гриби'' (If and maybe,
    then mushrooms would grow in the mouth). Explanation of its use to mock empty
    ''what ifs'' and passive dreaming.'
  - 'Lviv Coffeehouse Philosophy: A narrative exploration of dreams and hypothetical
    scenarios (''Я б хотів...''), utilizing the persona of an encouraging guide to
    introduce modal hedging markers.'
- section: Практика та аналіз помилок (Practice and Error Analysis)
  words: 700
  points:
  - 'Transformation drills: Converting real situations (якщо) into unreal ones (якби),
    focusing on the mandatory shift to Past Tense forms (e.g., ''Якщо я маю гроші...''
    -> ''Якби я мав гроші...'').'
  - 'Politeness Lab: Practicing ''Я б хотів...'' and ''Мені б хотілося'' as softer,
    more polite alternatives to ''Я хочу'' in service settings, connecting to the
    ''want-need'' prerequisite and social register.'
- section: Діалоги та застосування (Dialogues and Application)
  words: 500
  points:
  - 'Scenario: The Lottery Win. Integrating vocabulary ''виграти в лотерею'' and ''здійснити
    мрію'' into a conversation about hypothetical life changes and priorities.'
  - 'Planning a Dream Trip: Using ''планувати подорож'' and ''вирушити в подорож''
    to practice conditional questions (''Що б ти побачив, якби поїхав до Львова?'').'
focus: grammar
pedagogy: PPP
objectives:
- Learner can form the conditional mood using the particle б/би
- Learner can distinguish between real (якщо) and unreal (якби) conditions
- Learner can express wishes and dreams
- Learner can make polite requests using the conditional
grammar:
- conditional mood formation (б/би)
- real condition (якщо)
- unreal condition (якби)
- polite requests (я б хотів)
module_type: grammar
