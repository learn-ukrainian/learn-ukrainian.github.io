vocabulary_hints:
  required:
  - 'якби (if - unreal) — High frequency; triggers conditional mood (якби + past tense);
    collocations: якби я був, якби ми мали'
  - 'якщо (if - real) — Very high frequency; triggers indicative mood; collocations:
    якщо буде час, якщо хочете'
  - 'хотіти (to want) — Focus on polite forms: я б хотів (masc.), я б хотіла (fem.),
    хотілося б (impersonal)'
  - 'мрія (dream) — High frequency; collocations: здійснити мрію (to fulfill a dream),
    мріяти про (to dream about)'
  recommended:
  - 'виграти (to win) — Medium frequency; collocations: виграти в лотерею, виграти
    приз'
  - 'подорож (trip/journey) — High frequency; collocations: планувати подорож, вирушити
    в подорож'
word_target: 3000
