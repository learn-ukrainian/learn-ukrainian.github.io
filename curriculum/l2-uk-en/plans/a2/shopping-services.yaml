module: a2-53
level: A2
sequence: 53
slug: shopping-services
version: '2.0'
title: Shopping and Services
subtitle: Buying and Paying
content_outline:
- section: Вступ
  points:
  - Types of stores — distinguish between магазин (shop), супермаркет (supermarket),
    and ринок (market) — State Standard §3.9
  - 'Shopping culture — introduce Bessarabka Market as a cultural landmark (built
    1912 by Lazar Brodsky, Art Nouveau); mention the idiom ''Expensive as in Bessarabka'';
    note market etiquette: ''Чи є у вас свіже...?'' instead of ''Ти маєш...?'''
- section: Граматика
  points:
  - 'Store vocabulary (магазин, супермаркет, ринок) — collocations: йти в магазин
    (Accusative for motion); learner error: using Locative (в магазині) for direction'
  - 'Prices and paying (Скільки коштує?, платити) — distinguish Accusative for ''what''
    (купувати хліб) vs Instrumental for ''how'' (платити карткою/готівкою); learner
    error: платити картою -> платити карткою (Instrumental)'
  - 'Checkout vocabulary (каса, чек, здача) — collocations: потрібен чек, фіскальний
    чек'
  - Services (хімчистка, перукарня, ремонт) — introduce basic service vocabulary per
    State Standard §3.11; keep focus on shopping transaction flow
- section: Практика
  points:
  - 'Shopping dialogues — focus on natural queries: ''Чи є у вас...?'' instead of
    ''Ти маєш...?'' (learner error: direct translation); flow: Store -> Selection
    -> Price -> Payment'
  - Service requests — use basic service vocabulary
- section: Підсумок
  points:
  - Summary of vocabulary
vocabulary_hints:
  required:
  - 'магазин (store) — collocations: йти в магазин, продуктовий магазин (High Frequency)'
  - 'ціна (price) — collocations: висока ціна, яка ціна? (High Frequency)'
  - 'купувати (to buy) — collocations: купувати продукти, купувати одяг (High Frequency)'
  - 'платити (to pay) — collocations: платити карткою, платити готівкою; note: Instrumental
    case (High Frequency)'
  - гроші (money) — State Standard §3.9
  - 'картка (card) — collocations: банківська картка, платити карткою (High Frequency)'
  - 'готівка (cash) — collocations: платити готівкою, мати готівку (Medium Frequency)'
  - 'чек (receipt) — collocations: потрібен чек, фіскальний чек (Medium Frequency)'
  recommended:
  - 'знижка (discount) — collocations: знижка 50%, сезонні знижки (Medium Frequency)'
  - каса (checkout)
  - здача (change)
  - пакет (bag)
  - примірка (fitting room)
  - розмір (size)
activity_hints:
- type: match-up
  focus: Shopping vocabulary
  items: 30
- type: cloze
  focus: Store conversation
  items: 12
- type: fill-in
  focus: Complete shopping sentences
  items: 15
- type: cloze
  focus: Buy items at a store
  items: 8
focus: vocabulary
pedagogy: PPP
prerequisites:
- a2-52 (Education and Learning)
connects_to:
- a2-54 (Sports and Fitness)
- a2-63 (At the Bank)
objectives:
- Learner can buy items in a shop
- Learner can ask for price and pay
- Learner can use service vocabulary (checkout, receipt)
- Learner can describe payment methods
grammar:
- Payment verbs (платити, купувати, продавати)
- Accusative for prices and objects
- Instrumental for means (карткою, готівкою)
register: розмовний
immersion: 75-90% Ukrainian
phase: A2.5 [Vocabulary Expansion]
persona:
  voice: Encouraging Cultural Guide
  role: Bessarabka Market Vendor
