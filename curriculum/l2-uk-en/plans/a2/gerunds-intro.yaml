vocabulary_hints:
  required:
  - 'читаючи (while reading) — High frequency; gerund of читати (Conj I, -ючи)'
  - 'працюючи (while working) — High frequency; gerund of працювати (Conj I, -ючи)'
  - 'слухаючи (while listening) — High frequency; gerund of слухати (Conj I, -ючи)'
  - 'прочитавши (having read) — High frequency; past gerund of прочитати'
  - 'зробивши (having done) — High frequency; past gerund of зробити'
  - 'повернувшись (having returned) — High frequency; past gerund of повернутися (reflexive)'
  recommended:
  - 'дивлячись (while watching) — High frequency; gerund of дивитися (reflexive, -чись)'
  - 'сидячи (while sitting) — High frequency; gerund of сидіти (Conj II, -ачи)'
  - 'вийшовши (having gone out) — High frequency; past gerund of вийти (consonant stem)'
  - 'закінчивши (having finished) — High frequency; past gerund of закінчити'
