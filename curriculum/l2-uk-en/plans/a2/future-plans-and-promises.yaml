module: a2-14
level: A2
sequence: 14
slug: future-plans-and-promises
version: '2.0'
title: Future Plans and Promises
subtitle: Simple Future vs. Compound Future
content_outline:
- section: Introduction / Вступ
  points:
  - 'Future tense overview — State Standard §4.2.3.1 alignment: mastery of both compound
    (process) and simple (result) future forms'
  - 'Importance of commitment signals (Plans vs Promises) — cultural hook: «Обіцянка
    — цяцянка, а дурневі — радість» (A promise is a toy...); learner error: confusing
    process (planning) with result (promising)'
- section: Presentation / Презентація
  points:
  - 'Imperfective Future (Compound: буду + inf) — emphasizes process/duration; learner
    error: overuse of «буду» + infinitive for everything'
  - 'Perfective Future (Simple: conjugated) — emphasizes result/completion; learner
    error: aspect mismatch like «Я буду зробити» instead of «Я зроблю»'
  - 'Semantic differences and marker words — distinction: «Я буду читати» (I will
    be reading - process) vs «Я прочитаю» (I will read/finish reading - result)'
  - The power of results in future commitments — cultural value of «тримати слово»
    (keeping one's word); use of «Обіцяного три роки ждуть» for delayed fulfillment
- section: Practice / Практика
  points:
  - Plan vs Promise identification — contrast examples like «буду писати» (process)
    vs «напишу» (result)
  - Future formation drills — focus on correct conjugation of perfective verbs (e.g.,
    піду, зроблю)
- section: Dialogues / Діалоги
  points:
  - Weekend plans situational exchange — use high-frequency collocations like «піду
    в кіно», «зроблю все можливе»
vocabulary_hints:
  required:
  - зроблю (I will do/make) — зроблю все можливе, обов'язково зроблю
  - напишу (I will write) — напишу листа, напишу повідомлення
  - прочитаю (I will read) — прочитаю книгу до кінця (finish reading)
  - скажу (I will say) — скажу правду, скажу завтра
  - побачу (I will see) — побачу тебе завтра
  - почую (I will hear) — почую новини
  - візьму (I will take) — візьму участь, візьму трубку
  - дам (I will give) — дам слово (I will give my word)
  - піду (I will go) — піду в кіно, піду додому
  - прийду (I will come) — прийду вчасно
  - приїду (I will arrive) — приїду поїздом
  - почну (I will begin) — почну нове життя
  - закінчу (I will finish) — закінчу роботу
  - зрозумію (I will understand) — зрозумію тебе
  - буду (I will be/will + inf) — буду чекати, буду працювати, буду там
  recommended:
  - забуду (I will forget) — ніколи не забуду
  - запам'ятаю (I will remember) — запам'ятаю цей день
  - знайду (I will find) — знайду вихід
  - вийду (I will exit) — вийду на вулицю
  - увійду (I will enter) — увійду в історію
