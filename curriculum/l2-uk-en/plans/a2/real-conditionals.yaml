slug: real-conditionals
level: A2
word_target: 2000
title: 'Якщо... то...: Речення реальної умови'
description: Вчимося говорити про реальні умови та їхні наслідки.
focus: grammar
objectives:
- Формувати умовні речення з 'якщо' для розмови про реальні можливості.
- Правильно використовувати теперішній час в умовній частині ('if' clause) для позначення
  майбутньої дії.
- Розуміти та використовувати структуру 'якщо... то...' для наголосу.
- Розповідати про плани, що залежать від певних умов (погоди, часу).
- Давати поради, використовуючи умовні речення.
content_outline:
- section: 'Вступ: А що, якщо...?'
  points:
  - Обговорення можливих подій та їх наслідків.
  - Як ми виражаємо умову в рідній мові.
- section: 'Структура реальної умови: ''Якщо + Present, ... Future'''
  points:
  - 'Основна формула: ''Якщо погода буде добра, ми підемо в парк''.'
  - Чому ми використовуємо теперішній час для майбутньої умови (особливість).
  - 'Альтернатива: ''Якщо буде добра погода...'''
- section: 'Структура з наголосом: ''Якщо..., то...'''
  points:
  - Додавання 'то' для чіткого зв'язку між умовою та наслідком.
  - '''Якщо ти мені допоможеш, то я закінчу швидше''.'
  - Інтонаційне виділення.
- section: Умови в теперішньому часі
  points:
  - Загальні істини та звички.
  - '''Якщо йде дощ, я завжди беру парасольку''.'
  - 'Структура: ''Якщо + Present, ... Present''.'
- section: 'Синтез: Плануємо вихідні'
  points:
  - 'Практичне завдання: скласти план на вихідні, враховуючи різні можливі умови (погода,
    настрій, гроші).'
  - Обговорення планів у парах.
