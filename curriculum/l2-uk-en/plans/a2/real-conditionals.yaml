module: a2-051
level: A2
sequence: 51
slug: real-conditionals
version: 1.1.3
title: Якщо... то...
subtitle: Реальна умова — теперішній і майбутній час
focus: grammar
pedagogy: PPP
phase: 'A2.7 [Складні речення та умовні конструкції]'
word_target: 2000
objectives:
- Вміти утворювати умовні речення за допомогою «якщо» + теперішній або майбутній час для опису ймовірних або можливих ситуацій.
- Навчитися використовувати конструкцію «якщо... то...» для чіткого зв'язку між умовою та результатом.
- Розрізняти реальні умови («якщо» — А2) та нереальні/гіпотетичні умови («якби» — В1, тут не вивчається).
- Опанувати використання реальних умов у повсякденних ситуаціях (планування, поради, попередження, обіцянки).
dialogue_situations:
- setting: 'Планування городу — рішення "якщо/то" щодо посадки: Якщо буде сонце (n, sun), посадимо помідори (pl). Якщо не буде дощу (m, rain), доведеться полити ввечері. Якщо ти купиш насіння (n, seeds), я підготую грядку (f, garden bed).'
  speakers:
  - Подружжя (на дачі)
  motivation: '«Якщо» + майбутній час: сонце(n), дощ(m), насіння(n), грядка(f)'
content_outline:
- section: Якщо + теперішній/майбутній час
  words: 700
  points:
  - 'Вступ до реальних умов: «якщо» виражає умову, яка є можливою або ймовірною. Якщо буде гарна погода, ми підемо гуляти. Якщо ти хочеш, я допоможу.'
  - 'Час у реальних умовах: у частині з «якщо» використовується теперішній або майбутній час. У частині результату використовується майбутній час або наказовий спосіб. Немає спеціального способу дієслова — лише звичайні форми.'
  - 'Конструкція «якщо... то...»: «то» не є обов''язковим, але дуже поширене в українській мові. Воно позначає початок частини з результатом. Якщо дощитиме, то ми залишимося вдома.'
  - 'Розділові знаки: кома ставиться перед «якщо», коли воно стоїть у другій частині речення; кома ставиться після частини з «якщо», коли вона стоїть на початку.'
  - 'Чітке обмеження: цей модуль охоплює ТІЛЬКИ реальні умови з «якщо». Нереальні/гіпотетичні умови з «якби» належать до рівня B1 і тут НЕ вивчаються.'
- section: Умова в повсякденному житті
  words: 700
  points:
  - 'Планування та прийняття рішень: Якщо завтра буде вільний час, я піду в спортзал. Якщо у магазині є свіжий хліб, купи, будь ласка.'
  - 'Поради та рекомендації: Якщо болить голова, випий таблетку. Якщо хочеш вивчити мову, практикуй щодня.'
  - 'Попередження: Якщо не поспішиш, запізнишся. Якщо не візьмеш парасольку, змокнеш.'
  - 'Обіцянки та домовленості: Якщо ти допоможеш мені, я допоможу тобі. Якщо все буде добре, ми поїдемо у відпустку.'
  - 'Природні діалоги: двоє друзів планують вихідні, мама дає пораду дитині, колеги обговорюють дедлайн проєкту — усі використовують реальні умови.'
- section: Якщо чи якби? Тільки реальна умова
  words: 600
  points:
  - 'Попередній огляд відмінностей: «якщо» = реальна, можлива умова. «якщо буде дощ, ми залишимося вдома». «якби» = нереальна, гіпотетична умова. На рівні А2 студенти використовують лише «якщо».'
  - 'Тільки розпізнавання для «якби»: студенти можуть зустріти «якби» у піснях, прислів''ях або розмовах. Вони повинні розуміти, що це означає гіпотетичну умову, але ще не утворювати її самостійно. Якби я знав.'
  - 'Закріплення всіх типів складних речень з A2.7: причина (тому що, бо), допуст (хоча), мета (щоб), означальне (який, де), умова (якщо). Побудова абзаців, що використовують кілька типів.'
  - 'Самоперевірка: чи можу я пояснити чому (тому що), незважаючи на що (хоча), з якою метою (щоб), який саме (який) і за якої умови (якщо)?'
  - 'Інтонація умовних речень: частина з «якщо» має висхідну інтонацію (↗), що сигналізує про незавершеність умови та очікування результату. Головна частина (результат) має низхідну інтонацію (↘). Наприклад: Якщо буде сонце↗, ми підемо гуляти↘.'
- section: Підсумок
  words: 200
  points:
  - 'Реальні умовні речення виражають можливі ситуації за допомогою «якщо» + теперішній або майбутній час, часто супроводжуючись «то» в частині результату: Якщо ти хочеш, то я допоможу. Умова має висхідну інтонацію (↗), а результат — низхідну інтонацію (↘).'
  - 'Самоперевірка: Яка різниця між «якщо» та «якби»? Дайте 3 поради другу, використовуючи «якщо» (наприклад, "Якщо болить голова..."). Де ставиться кома, якщо частина з «якщо» знаходиться у другій половині речення?'
vocabulary_hints:
