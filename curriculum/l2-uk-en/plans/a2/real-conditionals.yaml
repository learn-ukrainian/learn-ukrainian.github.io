  - умова (condition)
  - результат (result, outcome)
  - реальний (real)
  - погода (weather)
  - допомогти (to help)
  - поспішити (to hurry)
  - вільний (free, available)
  - залишитися (to stay, to remain)
  - порада (advice)
  recommended:
  - якби (if — hypothetical, B1 preview)
  - змокнути (to get wet)
  - запізнитися (to be late)
  - парасолька (umbrella)
  - відпустка (vacation, holiday)
