module: a2-031
level: A2
sequence: 31
slug: checkpoint-instrumental
version: 1.0.3
title: 'Контрольна точка: Орудний відмінок'
subtitle: 'Перевірка знань: усі функції орудного відмінка'
focus: review
pedagogy: Review
phase: А2.4 [Орудний відмінок]
word_target: 1500
objectives:
- Здобувач може правильно утворювати закінчення орудного відмінка однини та множини для іменників усіх трьох родів у різних контекстах.
- Здобувач може правильно використовувати всі функції орудного відмінка (сумісність, інструмент/засіб, професія, просторові прийменники) у зв'язному мовленні.
- Здобувач може будувати повні іменникові словосполучення в орудному відмінку з узгодженням прикметників і займенників (з моїм новим другом, під великою ялинкою).
- Здобувач може синтезувати знання з орудного відмінка в короткому абзаці, описуючи свій розпорядок дня, професію та оточення.
dialogue_situations:
- setting: 'Опис ідеального пікніка — все в орудному відмінку: Поїхали автобусом (m). Гуляли з дітьми (pl). Їли бутерброди з ковбасою (f). Сиділи під деревом (n). Цей день був найкращим!'
  speakers:
  - Друзі (згадуючи)
  motivation: 'Все в орудному відмінку: автобусом, з дітьми, з ковбасою, під деревом'
content_outline:
- section: 'Частина 1: Розпізнавання та форми'
  words: 400
  points:
  - 'Вправа 1: Надається короткий текст про чийсь день. Здобувач повинен знайти всі іменники в орудному відмінку та визначити кожну функцію (інструмент, супутник, професія, просторова, часова).'
  - 'Вправа 2: Поставити іменники в дужках у правильну форму орудного відмінка — охоплює всі три роди, тверду та м''яку групи: (брат) → братом, (подруга) → подругою, (море) → морем.'
  - 'Вправа 3: Утворити форму орудного відмінка множини від заданих форм називного відмінка множини: (руки) → руками, (олівці) → олівцями, (діти) → дітьми.'
- section: 'Частина 2: Вибір та застосування'
  words: 500
  points:
  - 'Вправа 4: Вибрати правильний прийменник (з, над, під, перед, за, між) для доповнення речень із просторовим і часовим значенням.'
  - 'Вправа 5: Вирішити, чи використовувати орудний відмінок без прийменника, чи "з" + орудний відмінок — розрізнення інструмента та сумісності (писати ручкою vs. ходити з другом).'
  - 'Вправа 6: Множинний вибір — вибрати правильну форму словосполучення "прикметник + іменник" в орудному відмінку (з [гарний/гарним/гарною] [друг/другом/другові]).'
  - 'Вправа 7: Перетворити речення в називному відмінку на речення з "бути"/"стати" + орудний відмінок для позначення професій (Вона лікарка → Вона буде лікаркою).'
- section: 'Частина 3: Вільне вживання'
  words: 600
  points:
  - 'Вправа 8: Дати відповіді на відкриті запитання, що вимагають використання різних функцій орудного відмінка: Ким ти працюєш? Чим ти захоплюєшся? З ким ти живеш? Що знаходиться перед твоїм будинком?'
  - 'Вправа 9: Описати картинку із зображенням кухні — хто готує, які інструменти вони використовують, які інгредієнти лежать на столі, де розташовані предмети.'
  - 'Вправа 10: Письмове завдання (8-10 речень): "Опишіть свій типовий день. Розкажіть про свою професію, як ви добираєтесь на роботу, з ким ви обідаєте, і що ви готуєте на вечерю." Здобувач повинен використати принаймні 6 різних конструкцій з орудним відмінком.'
- section: Підсумок
  words: 200
  points:
  - 'Орудний відмінок виражає сумісність (з ким), інструмент/засіб (чим), професії (ким бути) та просторове розташування (під, над, перед, за, між).'
  - 'Самоперевірка: Яка різниця між використанням іменника без прийменника та з прийменником "з" в орудному відмінку (наприклад, писати ручкою vs. гуляти з другом)?'
  - 'Опишіть 3 речі у вашій кімнаті та їхнє просторове відношення одна до одної, використовуючи прийменники орудного відмінка (під, над, між) та узгодження прикметників.'
