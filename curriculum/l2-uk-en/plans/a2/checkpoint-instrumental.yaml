level: A2
module_id: 27
slug: checkpoint-instrumental
title: 'Контрольна точка: Орудний відмінок'
subtitle: 'Checkpoint: The Instrumental Case Review'
word_target: 1500
objectives:
- Систематизувати знання про всі функції орудного відмінка.
- Перевірити вміння правильно утворювати форми орудного відмінка іменників, прикметників
  та займенників.
- Оцінити здатність розрізняти та використовувати орудний відмінок у різних контекстах
  (супровід, засіб, професія, місце).
- Закріпити навички використання орудного відмінка в усному та письмовому мовленні.
content_outline:
- section: 'Підсумкова таблиця: Усі функції орудного відмінка'
  points:
  - Структурований огляд з питаннями, функціями, прикладами та наявністю/відсутністю
    прийменника.
  - 'Функція: Супровід. Питання: З ким? Прийменник: з/із/зі. Приклад: з другом.'
  - 'Функція: Атрибут. Питання: З чим? Прийменник: з. Приклад: кава з молоком.'
  - 'Функція: Засіб/Інструмент. Питання: Чим? Прийменник: немає. Приклад: писати ручкою.'
  - 'Функція: Професія/Статус. Питання: Ким? Прийменник: немає. Приклад: бути лікарем.'
  - 'Функція: Місце/Час. Питання: Де? Коли? Прийменник: над, під, за... Приклад: за
    будинком.'
- section: Комплексні тренувальні вправи
  points:
  - Вправи на вибір правильної форми слова в орудному відмінку.
  - Вправи на трансформацію речень.
  - Вправи на заповнення пропусків у тексті.
- section: Читання та аудіювання
  points:
  - Читання короткого оповідання, що містить різноманітні приклади вживання орудного
    відмінка.
  - Аудіювання діалогу та виконання завдань до нього.
- section: Письмове завдання
  points:
  - Написання невеликого твору на тему 'Мій ідеальний вихідний', використовуючи якомога
    більше конструкцій з орудним відмінком.
- section: Тест для самоперевірки
  points:
  - Набір питань з варіантами відповідей для фінальної перевірки знань.
vocabulary_hints:
  required:
  - Повторення ключового вокабуляру з модулів 21-26 (професії, їжа, інструменти, прийменники).
  - word (ранок)
  - word (день)
  - word (вечір)
  - word (вихідні)
  - word (подорожувати)
  - word (зустрічатися)
  recommended:
  - Повторення слів, що викликали труднощі в попередніх модулях.
  - Синоніми та антоніми до вивчених прикметників.
activity_hints:
- type: error_correction
  focus: Знайти та виправити помилки у реченнях з орудним відмінком.
  items: 15
- type: cloze_test
  focus: Заповнити пропуски в цілісному тексті, ставлячи слова в правильну форму орудного
    відмінка.
  items: 20
- type: reading_comprehension
  focus: Дати відповіді на питання до оповідання.
  items: 10
- type: writing_prompt
  focus: Написати емейл другу, де ви розповідаєте про свою нову роботу або нещодавню
    подорож.
  items: 1
- type: multiple_choice_quiz
  focus: Пройти фінальний тест для перевірки всіх аспектів теми 'Орудний відмінок'.
  items: 20
sequence: 27
