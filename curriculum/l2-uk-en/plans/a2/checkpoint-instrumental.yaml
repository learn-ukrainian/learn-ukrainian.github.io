module: a2-027
level: A2
sequence: 27
slug: checkpoint-instrumental
version: '1.0'
title: 'Контрольна точка: Орудний відмінок'
subtitle: 'Перевірка знань: усі функції орудного відмінка'
focus: review
pedagogy: Review
phase: A2.4 [Instrumental Case]
word_target: 1500
objectives:
  - Learner can accurately produce Instrumental singular and plural endings for 
    nouns of all three genders in varied contexts.
  - Learner can correctly use all Instrumental functions (accompaniment, 
    tool/means, profession, spatial prepositions) in connected discourse.
  - Learner can form complete noun phrases in Instrumental with adjective and 
    pronoun agreement (з моїм новим другом, під великою ялинкою).
  - Learner can synthesize Instrumental knowledge in a short paragraph 
    describing their daily routine, profession, and surroundings.
dialogue_situations:
  - setting: 'Describing a perfect picnic — everything with instrumental: Поїхали
      автобусом (m). Гуляли з дітьми (pl). Їли бутерброди з ковбасою (f). Сиділи під
      деревом (n). Цей день був найкращим!'
    speakers:
      - Друзі (згадуючи)
    motivation: 'All instrumental: автобусом, з дітьми, з ковбасою, під деревом'
content_outline:
  - section: 'Частина 1: Розпізнавання та форми (Part 1: Recognition and Forms)'
    words: 400
    points:
      - 'Exercise 1: A short text about someone''s day is provided. Learner must identify
        all nouns in the Instrumental case and label each function (tool, companion,
        profession, spatial, temporal).'
      - 'Exercise 2: Put nouns in parentheses into the correct Instrumental form —
        covers all three genders, hard and soft stems: (брат) → братом, (подруга)
        → подругою, (море) → морем.'
      - 'Exercise 3: Form Instrumental plural from given Nominative plurals: (руки)
        → руками, (олівці) → олівцями, (діти) → дітьми.'
  - section: 'Частина 2: Вибір та застосування (Part 2: Choice and Application)'
    words: 500
    points:
      - 'Exercise 4: Choose the correct preposition (з, над, під, перед, за, між)
        to complete spatial and temporal sentences.'
      - 'Exercise 5: Decide whether to use bare Instrumental or з + Instrumental —
        tool vs. accompaniment discrimination (писати ручкою vs. ходити з другом).'
      - 'Exercise 6: Multiple-choice — select the correct Instrumental form of adjective
        + noun phrases (з [гарний/гарним/гарною] [друг/другом/другові]).'
      - 'Exercise 7: Transform Nominative sentences into sentences using бути/стати
        + Instrumental for professions (Вона лікарка → Вона буде лікаркою).'
  - section: 'Частина 3: Вільне вживання (Part 3: Free Production)'
    words: 600
    points:
      - 'Exercise 8: Answer open-ended questions requiring various Instrumental functions:
        Ким ти працюєш? Чим ти захоплюєшся? З ким ти живеш? Що знаходиться перед твоїм
        будинком?'
      - 'Exercise 9: Describe a picture of a kitchen scene — who is cooking, what
        tools they use, what ingredients are on the table, where objects are located.'
      - 'Exercise 10: Writing prompt (8-10 sentences): "Опишіть свій типовий день.
        Розкажіть про свою професію, як ви добираєтесь на роботу, з ким ви обідаєте,
        і що ви готуєте на вечерю." Learner must use at least 6 different Instrumental
        constructions.'
vocabulary_hints:
  required:
    - орудний відмінок (instrumental case)
    - вправа (exercise)
    - контрольна точка (checkpoint)
    - завдання (task)
    - речення (sentence)
    - відповідь (answer)
    - текст (text)
    - перевірка (check, test)
  recommended:
    - правильний (correct)
    - словосполучення (phrase, word combination)
    - описати (to describe)
    - визначити (to identify, to determine)
activity_hints:
  - type: quiz
    focus: Mixed Instrumental case quiz covering all functions from M21-M26
    items: 8
  - type: fill-in
    focus: Sentence transformation — put noun phrases into Instrumental with 
      correct agreement
    items: 8
  - type: group-sort
    focus: Sort Instrumental sentences by function (tool, companion, profession,
      spatial, temporal)
    items: 8
  - error-correction
references:
  - title: Захарійчук Grade 4, с. 62-69
    notes: Full Instrumental case unit — endings, prepositions, exercises for 
      all genders
  - title: Заболотний Grade 5, §20-23
    notes: Instrumental case review exercises in broader declension context
  - title: Голуб Grade 6, с. 179
    notes: Pronoun declension tables for review of Instrumental pronoun forms
