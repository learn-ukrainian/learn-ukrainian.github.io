module: a2-10
level: A2
sequence: 10
slug: at-the-post-office-and-bank
version: '2.0'
title: At the Post Office and Bank
subtitle: Services and Money
content_outline:
- section: Introduction / Вступ
  points:
  - 'Practical services context — State Standard §3.11: covers core service contexts
    of Bank and Post Office; aligns with §4.2.2.4 (Accusative objects) and §4.2.1.3
    (Numerals)'
  - Importance of politeness — focus on requests (я б хотів/хотіла, будь ласка) and
    polite imperative
- section: Presentation / Презентація
  points:
  - 'Post Office terminology (лист, посилка, марка) — cultural hook: Ukrposhta wartime
    stamps as symbols of resistance and philately as patriotism'
  - 'Bank terminology (рахунок, картка, обмін) — learner error: ''рахунок'' (bill/account)
    vs ''счет'' (Russianism); cultural hook: Monobank/Privat24 digital ecosystem'
  - Polite service formulas (я хочу, мені потрібно) — emphasize 'я б хотів' for requests;
    align with State Standard functional requests
- section: Practice / Практика
  points:
  - 'Case analysis in service sentences — learner error: Direction (Accusative: іду
    на пошту) vs. Location (Locative: я на пошті); learner error: Accusative of Inanimate
    Nouns (відправити посилку, -а to -у)'
  - 'Service vocabulary matching — include numbers 100-1000 in context of money (UAH)
    and postal codes (indices); alignment: §4.2.1.3 Numerals'
- section: Dialogues / Діалоги
  points:
  - 'At the Post Office — focus: sending a letter/package using polite imperative
    and Accusative case'
  - 'At the Bank — focus: currency exchange and digital banking (Monobank context)'
vocabulary_hints:
  required:
  - пошта (post office) — на пошті, іти на пошту
  - банк (bank) — у банку, іти в банк
  - лист (letter) — писати листа, відправити листа (Accusative object)
  - посилка (package) — отримати посилку, вага посилки (Accusative inanimate feminine)
  - бандероль (parcel)
  - 'марка (stamp) — cultural hook: famous wartime stamps'
  - конверт (envelope)
  - адреса (address)
  - індекс (postal code) — use with numbers 100-1000
  - відправляти (to send)
  - отримувати (to receive)
  - гроші (money) — знімати гроші, міняти гроші
  - 'рахунок (account) — відкрити рахунок, стан рахунку; learner error: avoid ''счет'''
  - картка (card) — банківська картка, термін дії
  - готівка (cash) — платити готівкою, знімати готівку
  recommended:
  - валюта (currency) — курс валют, обмін валют
  - переказ (transfer)
  - знімати (to withdraw)
  - вкладати (to deposit)
  - обмінювати (to exchange)
