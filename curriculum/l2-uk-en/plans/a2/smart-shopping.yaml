vocabulary_hints:
  required:
  - ціна (price) — вигідна ціна, ціна зі знижкою, фіксована ціна
  - знижка (discount) — сезонна знижка, акційна ціна, надати знижку
  - решта (change) — дати решту, дрібна решта, правильна решта
  - чек (receipt) — касовий чек, зберігати чек, видати чек
  - кращий (better) — набагато кращий, найкраща якість, кращий варіант
  - дешевий (cheap) — дешевший за..., найбільш дешевий, найбільш дешевий товар
  recommended:
  - ринок (market) — базар, свій продавець
  - кошик (basket/cart) — додати в кошик (online shopping)
  - оформити (to process/checkout) — оформити замовлення
