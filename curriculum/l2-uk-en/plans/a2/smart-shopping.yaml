module: a2-24
level: A2
sequence: 24
slug: smart-shopping
version: '2.0'
title: Smart Shopping
subtitle: Comparisons and Choices
content_outline:
- section: Introduction / Вступ
  points:
  - 'The philosophy of a ''Bazar'' vs a ''Supermarket'' — cultural hook: bargaining
    is less about haggling and more about building rapport with a ''regular'' vendor
    (свій продавець); focus on polite conversation to secure ''friendly'' prices'
  - 'The value of comparison skills — freshness hierarchy: buying from ''grannies''
    (бабусі) is often perceived as superior to supermarket organic brands'
- section: Presentation / Презентація
  points:
  - '''Key vocabulary: Price, Discount, Change, Receipt'' — collocations: вигідна
    ціна, сезонна знижка, дати решту, зберігати чек, фіксована ціна, надати знижку,
    видати чек, правильна решта'
  - '''Comparison phrases: Який кращий? Цей дешевший.'' — learner error: avoid double
    comparison (e.g., *більш дешевший*) and phonetic stem mistakes (*дорожчий*, not
    *дорожший*); learner error: avoid using *як* instead of *ніж* or *за* + Accusative'
  - '''Negotiation logic: Чи можна дешевше?'''' — note: politeness is key to securing
    ''friendly'' prices in market contexts; contrast with ''магазин'' (standard fixed
    prices)'
  - '''Refusal etiquette: Я ще подумаю.'''
  - '''Digital Shopping: Кошик, оформити замовлення.'' — note: essential high-frequency
    terms for modern Ukraine; add term: доставка'
- section: Practice / Практика
  points:
  - 'Role-play scenario: Market bargaining — focus on building rapport and becoming
    a ''regular'' customer'
  - 'Price calculation exercises — cultural note: use traditional units like ''стакан''
    (glass) for berries or ''пучок'' (bunch) for herbs'
- section: Dialogues / Діалоги
  points:
  - 'Choosing clothes or electronics in a store — focus: use comparative forms primarily
    for price and quality decisions; incorporate collocations: ''кращий варіант'',
    ''найкраща якість'''
focus: vocabulary
pedagogy: PPP
objectives:
- Learner can compare products using comparative adjectives
- Learner can ask for recommendations and advice
- Learner can negotiate prices and ask for discounts
- Learner can express purchase decisions politely
grammar:
- comparison in context
- asking for advice
- negotiation phrases
- decision making
module_type: vocabulary
