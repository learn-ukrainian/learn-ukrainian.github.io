vocabulary_hints:
  required:
  - ціна (price) — вигідна ціна, ціна зі знижкою, фіксована ціна; high-frequency thematic
    term
  - знижка (discount) — сезонна знижка, акційна ціна, надати знижку; high-frequency
    thematic term
  - решта (change) — дати решту, правильна решта, дрібна решта; essential for practical
    transactions
  - чек (receipt) — касовий чек, видати чек, зберігати чек; high-frequency practical
    term
  - кращий (better) — набагато кращий, кращий варіант, найкраща якість; high-frequency
    irregular form
  - дешевий (cheap) — дешевший за..., найбільш дешевий товар; primary grammar anchor
    for comparisons
  recommended:
  - ринок (market) — базар, свій продавець; cultural marker for dynamic negotiation
  - кошик (basket/cart) — додати в кошик; essential for digital shopping register
  - оформити (to process/checkout) — оформити замовлення; essential for digital shopping
    register
  - доставка (delivery) — high-frequency term in modern Ukrainian infrastructure
  - стакан (glass) — traditional unit for measuring berries/seeds at markets
  - пучок (bunch) — traditional unit for measuring herbs/greens at markets
word_target: 3000
