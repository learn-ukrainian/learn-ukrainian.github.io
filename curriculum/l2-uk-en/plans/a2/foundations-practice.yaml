module: a2-007
level: A2
sequence: 7
slug: foundations-practice
version: 1.1.4
title: Перші кроки в А2
subtitle: Практикуємо видові пари та родовий відмінок у діалогах
focus: communication
pedagogy: TBL
phase: 'A2.1 [Основи та вступ до видів дієслова]'
word_target: 2000
objectives:
- Вміти брати участь у простому діалозі про планування діяльності, використовуючи недоконаний вид для планів і доконаний
  для результатів.
- Вміти розігрувати ситуацію в магазині, висловлюючи бажання, потреби та відсутність предметів за допомогою родового
  відмінка.
- Вміти описувати минулі події, правильно обираючи між недоконаним (опис процесу) та доконаним (констатація результату)
  видами.
- Розуміти та відповідати на запитання, що стосуються виду дієслова та родового відмінка.
dialogue_situations:
- setting: 'Сценарій 1: Планування новосілля — купуємо торт, напої, серветки. Скільки гостей? Десять. Сценарій 2: На київському
    фермерському ринку — купуємо мед, сир, ягоди. Скільки коштує кілограм меду?'
  speakers:
  - Друзі (friends)
  - Продавець (vendor)
  motivation: 'Родовий відмінок у реальному житті: лічба, ціни, відсутність'
content_outline:
- section: 'Сценарій 1: Плануємо вечірку'
  words: 600
  points:
  - Діалог між друзями, які планують вечірку. Акцент на майбутньому часі.
  - 'Недоконаний вид для обговорення того, що треба зробити: ''Ми будемо купувати напої'', ''Я буду готувати салат''.'
  - 'Використання родового відмінка з ''немає'': ''У нас немає музики!'' та зі словами на позначення кількості: ''Треба купити
    багато фруктів''.'
  - 'Доконаний вид для підтвердження виконаних завдань: ''Я вже приготувала салат'', ''Ми купили два торти''.'
- section: 'Сценарій 2: На ринку'
  words: 600
  points:
  - Діалог між покупцем і продавцем.
  - 'Покупець питає: ''Скільки коштує...?'''
  - 'Покупець використовує правило 1, 2-4, 5+ для замовлення: ''Дайте мені, будь ласка, один кілограм яблук, дві дині і п''ять
    лимонів''.'
  - 'Продавець використовує ''немає'': ''Вибачте, у мене немає лимонів''.'
  - 'Покупець використовує родовий відмінок заперечення: ''Я не бачу помідорів''.'
- section: 'Сценарій 3: Як пройшов твій день?'
  words: 800
  points:
  - Розмова про минулі події.
  - 'Недоконаний вид для опису фону або тривалої дії в минулому: ''Я вчора довго читав цікаву книгу''.'
  - 'Доконаний вид для послідовних, завершених дій: ''Спочатку я поснідав, потім пішов на роботу, а ввечері подивився фільм''.'
  - 'Протиставлення в одному реченні: ''Я писав листа, коли ти подзвонив''.'
  - 'Відповідь на питання ''Що ти робив?'' (недоконаний вид) проти ''Що ти зробив?'' (доконаний вид).'
- section: Підсумок
  words: 200
  points:
  - 'Вид дієслова розрізняє тривалий процес (недоконаний) і завершений результат (доконаний) як у минулому, так і в майбутньому
    часах. Перевірка: Яка різниця між ''Що ти робив?'' і ''Що ти зробив?''? Перекладіть: ''Я писав листа, коли ти подзвонив''.'
  - 'Родовий відмінок необхідний для вираження відсутності (''немає''), прямого заперечення (''не бачу'') та кількості (за
    правилом 1, 2-4, 5+). Перевірка: Як сказати ''У мене немає лимонів''? Опишіть купівлю 3 яблук і 5 помідорів на ринку.'
vocabulary_hints:
  required:
  - планувати / запланувати (to plan)
  - купувати / купити (to buy)
  - готувати / приготувати (to cook, prepare)
  - ринок (market)
  - коштувати (to cost)
  - кілограм (kilogram)
  - вечірка (party)
  - день (day)
  recommended:
  - сценарій (scenario)
  - діалог (dialogue)
  - обговорювати (to discuss)
  - замовляти / замовити (to order)
