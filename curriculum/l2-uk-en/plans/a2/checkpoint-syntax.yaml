slug: checkpoint-syntax
level: A2
word_target: 1500
title: 'Контрольна точка: Складні речення'
description: Перевіряємо, як ми засвоїли сполучники, підрядні речення та умови.
focus: review
objectives:
- Впевнено використовувати 'тому що', 'бо', 'хоча' для вираження причини та контрасту.
- Правильно вживати 'щоб' для вираження мети.
- Точно використовувати 'який', 'де', 'куди', 'звідки' в означальних реченнях.
- Будувати речення реальної умови з 'якщо'.
- Комбінувати вивчені структури в зв'язному тексті для опису планів та подій.
content_outline:
- section: 'Огляд 1: Причина, поступка, мета'
  points:
  - Вправи на вибір між 'тому що' / 'бо'.
  - Вправи на трансформацію речень з 'але' на 'хоча'.
  - Вправи на поєднання речень з 'щоб'.
- section: 'Огляд 2: Описи та непряма мова'
  points:
  - Вправи на вибір правильної форми 'який/яка/яке/які'.
  - Вправи на поєднання речень за допомогою 'де', 'куди'.
  - Вправи на перетворення прямої мови на непряму ('сказав, що...').
- section: 'Огляд 3: Реальні умови'
  points:
  - Вправи на завершення умовних речень.
  - 'Створення ланцюжків умовних речень: ''Якщо А, то Б. Якщо Б, то В...''.'
- section: Інтегрована практика
  points:
  - Змішані вправи на заповнення пропусків (всі сполучники).
  - Завдання на читання тексту з аналізом складних речень.
  - 'Творче завдання: написати коротку розповідь або лист.'
