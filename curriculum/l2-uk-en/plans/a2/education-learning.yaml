module: a2-52
level: A2
sequence: 52
slug: education-learning
version: '2.0'
title: Education and Learning
subtitle: School and University
content_outline:
- section: Вступ
  points:
  - 'Education system overview — cultural hook: Knowledge Day (Sept 1st) and ''First
    Bell'' traditions (students in vyshyvankas); State Standard §3.7 alignment'
  - 'School vs university — collocations: ходити до школи, вступати до університету'
- section: Граматика
  points:
  - 'School subjects (математика, історія, фізика) — collocations: улюблений предмет,
    профільний предмет'
  - 'Learning verbs (вчитися, вивчати) — learner error: confusion of transitive ''вивчати''
    (what?) vs intransitive ''вчитися'' (where/how?); distinct usage rules required'
  - 'Academic life (студент, лекція, семінар) — learner error: preposition mismatch
    (на лекції/на уроці vs в школі/в університеті)'
  - 'Grades and exams (оцінка, іспит, залік) — cultural hook: 12-point grading system
    (12 = exceptional); learner error: ''take an exam'' = складати, not брати'
- section: Практика
  points:
  - 'Dialogues about education — context: discussing grades (using 12-point scale)
    or preparing for exams'
  - Describe studies and exams — focus on correct verb usage (вчитися vs вивчати)
    and specific subjects
- section: Підсумок
  points:
  - Summary of vocabulary
vocabulary_hints:
  required:
  - 'школа (school) — collocations: ходити до школи, закінчити школу, середня школа,
    у школі'
  - 'університет (university) — collocations: вступати до університету, навчатися
    в університеті, державний університет'
  - 'вчитися (to study) — intransitive (process/location); collocations: вчитися в
    школі/університеті, вчитися старанно, вчитися на відмінно, вчитися все життя'
  - 'вивчати (to learn) — transitive (+ object); collocations: вивчати українську
    мову, вивчати історію, вивчати нові слова, детально вивчати'
  - 'предмет (subject) — collocations: шкільний предмет, улюблений предмет, профільний
    предмет'
  - 'іспит (exam) — collocations: складати іспит (take/attempt), скласти іспит (pass),
    провалити іспит (fail), випускний іспит'
  - 'оцінка (grade) — cultural context: 12-point scale (10-12 is high/excellent);
    collocations: гарна оцінка, висока оцінка, отримувати оцінки'
  - студент (student) — academic life context
  recommended:
  - викладач (lecturer) — university context
  - 'лекція (lecture) — usage: на лекції (preposition ''на'')'
  - залік (credit/test) — university context, distinct from 'іспит'
  - диплом (diploma) — graduation context
  - стипендія (scholarship) — financial aid context
  - курсова (course paper) — university project context
