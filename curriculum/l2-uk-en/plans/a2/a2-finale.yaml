slug: a2-finale
level: A2
title: Фінал А2
subtitle: A2 Finale
focus: review
word_target: 1500
objectives:
- Review and consolidate all major A2 grammar topics, including all 7 cases, verb
  aspect, and comparisons.
- Participate in an extended conversation about personal experiences, plans, and opinions.
- Narrate a simple story or describe a past event using both perfective and imperfective
  verbs.
- Complete a series of practical tasks, such as writing a short email, understanding
  public announcements, or giving directions.
- Demonstrate A2-level proficiency across listening, speaking, reading, and writing.
vocabulary_hints:
- uk: повторення
  en: review
- uk: досвід
  en: experience
- uk: плани на майбутнє
  en: plans for the future
- uk: розповідь
  en: a story / narration
- uk: оголошення
  en: an announcement
- uk: практичне завдання
  en: practical task
- uk: підсумок
  en: summary / conclusion
- uk: спілкування
  en: communication
activity_hints:
- type: comprehensive-test
  focus: A mixed-format test covering all key A2 grammar points (cases, aspects, motion
    verbs, comparisons).
  items: 25
- type: long-form-writing
  focus: Writing a 100-word text about a past vacation or plans for next summer.
  items: 1
- type: interview
  focus: A simulated oral interview where the learner answers a series of personal
    and opinion-based questions.
  items: 10
- type: listening-comprehension
  focus: Listening to a short public announcement (e.g., at a train station) and answering
    questions.
  items: 8
- type: role-play-scenario
  focus: A complex role-play, such as reporting a lost item or asking for detailed
    directions, integrating multiple skills.
  items: 1
sequence: 60
module: a2-060
version: '1.0'
phase: A2.8 [Refinement and Graduation]
references:
