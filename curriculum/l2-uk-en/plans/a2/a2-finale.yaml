module: a2-069
level: A2
sequence: 69
slug: a2-finale
version: 1.1.2
title: Фінал A2
subtitle: Підсумкове завдання — один день в українському місті
focus: review
pedagogy: Review
phase: 'A2.10 [Вдосконалення та випуск]'
word_target: 1500
objectives:
- Учень може підтримувати тривалу розмову українською мовою в різних повсякденних ситуаціях (у транспорті, магазині, ресторані, запитуючи дорогу).
- Учень може розповідати про події в минулому, описувати теперішнє та обговорювати плани на майбутнє, використовуючи всі граматичні структури А2 у зв'язному мовленні.
- Учень може виконувати практичні життєві завдання українською (замовити їжу, купити квитки, попросити про допомогу, описати проблему).
- Учень може продемонструвати компетентність рівня А2 через комплексне використання відмінків, видів дієслів, порівняння, складних речень та висловлення власних думок.
dialogue_situations:
- setting: 'Цілий день у Львові — ранок: прибуття на вокзал (m), поселення в готель (m, hotel). День: Площа Ринок (f, main square), кав''ярня (f), книгарня (f, bookshop). Вечір: зустріч з друзями, вечеря (f, dinner), обговорення планів на майбутнє.'
  speakers:
  - Турист
  - Різні мешканці Львова
  motivation: 'Повний фінал рівня А2: усі відмінки, види дієслів, часи під час одноденної подорожі'
content_outline:
- section: 'Ранок: прибуття та орієнтація'
  words: 400
  points:
  - 'Сценарій: учень прибуває до Львова потягом. Завдання: купити квиток на транспорт, запитати дорогу до готелю, зареєструватися в готелі (назвати ім''я, паспорт, запитати про номер).'
  - 'Діалоги, що поєднують: місцевий відмінок (у Львові, на вокзалі), знахідний (купити квиток), родовий (немає вільних кімнат), формальний наказовий спосіб (Покажіть, будь ласка, паспорт).'
  - 'Культурна примітка: як орієнтуватися в українському місті — маршрутка, трамвай, таксі, пішки.'
- section: 'День: ринок, кав''ярня, прогулянка'
  words: 400
  points:
  - 'На ринку: купівля продуктів, обговорення кількості та цін (узгодження числівників: два кілограми яблук, п''ять помідорів), порівняння товарів (Ці яблука солодші за ті).'
  - 'У кав''ярні: замовлення їжі та напоїв, обговорення вподобань (Я віддаю перевагу каві з молоком. А що ви порадите?), вирішення дрібної проблеми (Вибачте, я замовляв борщ, а не суп).'
  - 'Під час прогулянки: природний опис побаченого з використанням усіх відмінків, розпитування місцевих про визначні місця (Що це за будівля? Коли її збудували?).'
- section: 'Вечір: друзі, розмови, плани'
  words: 400
  points:
  - 'Зустріч з українськими друзями: обговорення свого дня з використанням минулого часу та видів дієслова (Сьогодні я побачив/побачила стільки цікавого!). Висловлення думок (На мою думку, Львів — найгарніше місто).'
  - 'Тривала розмова: обговорення улюблених місць, порівняння Львова з рідним містом, розмова про українські традиції (Я дізнався/дізналася про Івана Купала — це так цікаво!).'
  - 'Побудова планів на майбутнє: обговорення планів на завтра з використанням майбутнього часу та сполучників щоб/якщо (Якщо буде гарна погода, поїдемо у Карпати. Я хочу поїхати, щоб побачити гори).'
- section: 'Підсумок: від A2 до B1'
  words: 300
  points:
  - 'Рефлексія: що учень тепер вміє — підсумок усіх компетенцій рівня А2 через твердження "Я можу...". Зв''язок із дескрипторами навичок CEFR для рівня А2.'
  - 'Що зміниться на рівні B1: більше української мови в поясненнях (метамовний перехід завершено), довші тексти, складніша граматика (дієприкметники, складні аспекти виду, пасивний стан), багатший словниковий запас.'
  - 'Заохочення та святкування: завершення рівня А2 є важливим досягненням. Учень може справлятися з повсякденними ситуаціями в Україні. Вітаємо! Ви готові до рівня B1!'
vocabulary_hints:
  required:
  - прибуття (arrival)
  - вокзал (train station)
  - квиток (ticket)
  - ринок (market)
  - замовити (to order)
  - порадити (to recommend)
  - будівля (building)
  - враження (impression)
  - підсумок (summary)
  - вітаємо (congratulations)
  recommended:
  - маршрутка (minibus)
  - прогулянка (walk, stroll)
  - дізнатися (to find out, to learn)
  - готовий (ready)
