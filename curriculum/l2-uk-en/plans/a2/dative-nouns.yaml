level: A2
word_target: 2000
title: Студентові, сестрі
subtitle: Давальний відмінок іменників
slug: dative-nouns
focus: grammar
status: DRAFT
objectives:
- Навчитись утворювати форми давального відмінка для іменників чоловічого, жіночого
  та середнього роду в однині.
- Ознайомитись з паралельними закінченнями для іменників чоловічого роду (-ові/-еві/-єві
  та -у/-ю).
- Навчитись утворювати форми давального відмінка для іменників у множині (-ам/-ям).
- Правильно використовувати іменники в давальному відмінку як непрямий додаток у реченні.
content_outline:
- section: Іменники чоловічого роду
  points:
  - 'Закінчення -ові, -еві, -єві (переважно для істот): ''студентові'', ''вчителеві'',
    ''водієві''.'
  - 'Закінчення -у, -ю (для неістот, а також паралельно для істот): ''студенту'',
    ''телефону'', ''Києву''.'
  - 'Правило чергування г, к, х на з, ц, с перед закінченням -і (історична форма,
    рідко вживається): ''другу'' -> ''друзі''.'
- section: Іменники жіночого роду
  points:
  - 'Закінчення -і для іменників на -а, -я (після приголосного): ''сестрі'', ''подрузі'',
    ''землі''.'
  - 'Закінчення -ї для іменників на -ія: ''Марії'', ''історії''.'
- section: Іменники середнього роду
  points:
  - 'Закінчення -у, -ю (як у чоловічому роді): ''місту'', ''вікну'', ''морю''.'
- section: Множина
  points:
  - 'Закінчення -ам для іменників з твердою основою: ''студентам'', ''сестрам'', ''містам''.'
  - 'Закінчення -ям для іменників з м''якою основою: ''друзям'', ''вчителям'', ''морям''.'
vocabulary_hints:
  required:
  - студент (student)
  - сестра (sister)
  - друг (friend)
  - вчителька (teacher, f.)
  - місто (city)
  - море (sea)
  - батьки (parents)
  - діти (children)
  - подарувати (to give a gift)
  - показати (to show)
  - пояснити (to explain)
  - надіслати (to send)
  recommended:
  - директор (director)
  - лікар (doctor)
  - Київ (Kyiv)
  - Україна (Ukraine)
  - вікно (window)
  - сонце (sun)
  - книга (book)
activity_hints:
- type: table-completion
  focus: Заповнення таблиці формами давального відмінка для іменників різних родів.
  config:
    quantity: 20
    columns:
    - Називний
    - Давальний (однина)
    - Давальний (множина)
    rows:
    - друг
    - книга
    - місто
- type: fill-in-the-blanks
  focus: Вживання іменників у давальному відмінку в контексті речень.
  config:
    quantity: 15
    blanks:
    - Я дарую квіти ___. (мама)
    - Він допомагає ___. (друг)
- type: sentence-construction
  focus: Побудова речень з поданих слів з використанням давального відмінка.
  config:
    quantity: 12
    prompts:
    - я / дзвонити / брат
    - вона / купити / подарунок / сестра
- type: error-correction
  focus: Пошук та виправлення помилок у вживанні давального відмінка.
  config:
    quantity: 10
    sentences:
    - Я дякую друг за допомогу.
    - Вона пише лист мамі.
sequence: 16
