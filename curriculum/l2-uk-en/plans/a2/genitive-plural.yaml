level: A2
word_target: 2000
title: 'Родовий відмінок: Множина'
subtitle: 'Багато речей: нульове закінчення, -ів/-їв, -ей'
objectives:
- Утворювати родовий відмінок множини для іменників чоловічого роду (-ів, -їв).
- Утворювати родовий відмінок множини для іменників жіночого та середнього роду (нульове
  закінчення).
- Розпізнавати основні закономірності та винятки (напр., -ей).
- Правильно вживати родовий відмінок множини після числівників 5+.
- Правильно вживати родовий відмінок множини після слів 'багато', 'мало', 'кілька',
  'скільки'.
content_outline:
- section: 'Вступ: Коли ми використовуємо родовий відмінок множини?'
  points:
  - Пояснення вживання з числівниками 2-4 (називний відмінок множини) vs 5+ (родовий
    відмінок множини).
  - 'Слова-кількості: багато, мало, кілька, скільки.'
- section: 'Чоловічий рід: закінчення -ів, -їв'
  points:
  - 'Основне правило: 5 студентів, багато друзів, кілька комп''ютерів.'
  - 'Варіант -їв після голосного або й: 10 героїв, багато музеїв.'
- section: 'Жіночий та середній рід: нульове закінчення'
  points:
  - 'Основне правило: 5 книг, 10 сестер, багато машин.'
  - 'Іменники середнього роду: 6 вікон, кілька місць, багато морів.'
  - 'Вставні голосні ''о'', ''е'' для уникнення збігу приголосних: пісня -> пісень,
    думка -> думок.'
- section: Винятки та складні випадки
  points:
  - 'Невелика група іменників на -ей: миша -> мишей, стаття -> статей.'
  - 'Іменники, що мають лише множину: окуляри -> окулярів, гроші -> грошей.'
  - 'Форми ''чоловік'' і ''раз'': п''ять чоловік, багато разів.'
- section: Підсумок та практика з числами
  points:
  - Зведена таблиця закінчень.
  - Практика рахунку предметів.
vocabulary_hints:
  required:
  - 'багато: many, a lot'
  - 'мало: few, little'
  - 'кілька: a few, several'
  - 'скільки: how many'
  - 'п''ять: five'
  - 'десять: ten'
  - 'студент (студентів): student(s)'
  - 'книга (книг): book(s)'
  - 'рік (років): year(s)'
  - 'гривня (гривень): hryvnia(s)'
  - 'місце (місць): place(s)'
  - 'друг (друзів): friend(s)'
  recommended:
  - 'кілограм: kilogram'
  - 'літр: liter'
  - 'пляшка: bottle'
  - 'чашка: cup'
  - 'сотня: a hundred'
  - 'тисяча: a thousand'
  - 'проблема (проблем): problem(s)'
activity_hints:
- type: number-drill
  focus: Утворення словосполучень 'число + іменник' (5 книг, 12 студентів)
  items: 15
- type: quantity-phrases
  focus: Створення фраз зі словами 'багато', 'мало', 'кілька', 'скільки'
  items: 12
- type: fill-in-the-blanks
  focus: Вставка правильної форми родового відмінка множини в речення
  items: 12
- type: error-correction
  focus: Пошук та виправлення помилок у формах родового відмінка множини
  items: 10
