  - наліво (to the left)
  - повернути (to turn)
  - вулиця (street)
  - площа (square)
  - перехрестя (intersection)
  recommended:
  - міст (bridge)
  - світлофор (traffic light)
  - зупинка (stop)
  - орієнтир (landmark)
  - поруч (nearby)
  - навпроти (opposite)
