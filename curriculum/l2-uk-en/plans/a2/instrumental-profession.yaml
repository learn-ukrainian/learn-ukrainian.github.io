level: A2
module_id: 23
slug: instrumental-profession
title: Я буду вчителькою
subtitle: The Instrumental Case for Professions and Status
word_target: 2000
objectives:
- Навчитися вживати орудний відмінок для позначення професії, статусу або ролі з дієсловами
  'бути', 'стати', 'працювати'.
- 'Навчитися вживати орудний відмінок з дієсловами, що вимагають його: ''цікавитися'',
  ''захоплюватися'', ''займатися''.'
- Практикувати утворення орудного відмінка назв професій.
- Навчитися ставити питання 'Ким ти працюєш?' та відповідати на нього.
content_outline:
- section: 'Вступ: Ким ти є?'
  points:
  - Пояснення використання орудного відмінка для ідентифікації ролі або статусу людини.
  - 'Ключове питання: Ким?'
- section: Професія та статус з дієсловами 'бути', 'стати', 'працювати'
  points:
  - 'З дієсловом ''бути'': Він є лікарем. Вона була студенткою. Ми будемо інженерами.'
  - 'З дієсловом ''працювати'': Моя мама працює вчителькою.'
  - 'З дієсловом ''стати'' (to become): Я хочу стати програмістом.'
- section: Дієслова, що вимагають орудного відмінка
  points:
  - 'цікавитися + О.в. (to be interested in): Я цікавлюся історією.'
  - 'захоплюватися + О.в. (to admire, be keen on): Ми захоплюємося спортом.'
  - 'займатися + О.в. (to be engaged in): Вона займається музикою.'
- section: 'Практика: Розмови про роботу та хобі'
  points:
  - 'Діалог ''Знайомство'': питання та відповіді про професію.'
  - 'Розповідь про свою сім''ю: хто ким працює і чим цікавиться.'
