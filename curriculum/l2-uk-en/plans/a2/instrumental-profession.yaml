activity_hints:
- type: role_play
  focus: Симуляція розмови на вечірці, де люди знайомляться і розповідають про свою
    роботу та хобі.
  items: 1
- type: sentence_completion
  focus: Доповнити речення, використовуючи правильну форму орудного відмінка ('Мій
    друг працює...', 'Я цікавлюся...').
  items: 15
- type: matching
  focus: Поєднати людину з її професією або хобі.
  items: 12
- type: question_answer
  focus: Скласти питання до поданих відповідей (Він працює лікарем. -> Ким він працює?).
  items: 10
- type: writing_prompt
  focus: Написати короткий текст про свої кар'єрні плани або ідеальну роботу.
  items: 1
