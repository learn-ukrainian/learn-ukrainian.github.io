slug: numerals-and-cases
level: A2
title: Числа у всіх відмінках
subtitle: Numbers in All Cases
focus: grammar
word_target: 2000
objectives:
- Decline ordinal numerals (перший, другий) in all cases.
- Understand and use numeral-noun agreement for numbers 2, 3, 4 and 5+.
- Use numerals correctly in dates, telling time, and expressing age.
- Apply case endings to numerals in prepositional phrases.
- Practice reading and writing out large numbers in different cases.
vocabulary_hints:
- uk: числівник
  en: numeral
- uk: кількісний
  en: cardinal (numeral)
- uk: порядковий
  en: ordinal (numeral)
- uk: відмінок
  en: case
- uk: узгодження
  en: agreement
- uk: дата
  en: date
- uk: вік
  en: age
- uk: котра година?
  en: what time is it?
activity_hints:
- type: table-fill
  focus: Declining ordinal numerals (перший, третя, десяте) in a declension table.
  items: 12
- type: sentence-correction
  focus: Fixing errors in numeral-noun agreement in sentences.
  items: 15
- type: question-answer
  focus: Answering questions about dates and age, requiring numerals in the genitive
    or instrumental case.
  items: 12
- type: fill-in-the-blank
  focus: Writing out numerals in words to correctly complete sentences involving different
    cases.
  items: 12
- type: reading-comprehension
  focus: Reading a short text with many numbers and answering questions about the
    quantities.
  items: 8
sequence: 49
module: a2-049
version: '1.0'
phase: A2.8 [Refinement and Graduation]
