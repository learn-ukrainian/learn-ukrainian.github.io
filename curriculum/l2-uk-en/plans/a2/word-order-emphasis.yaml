  - title: Авраменко Grade 8, §6-7
    notes: Тема і рема, актуальне членування речення
  - title: 'ULP: Ukrainian Word Order'
    url: https://www.ukrainianlessons.com/word-order/
    notes: How Ukrainian word order differs from English
