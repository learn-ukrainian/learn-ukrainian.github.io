vocabulary_hints:
  required:
  - 'хай (let) — particle for 3rd person imperative; collocations: хай живе (long
    live), хай щастить (good luck)'
  - 'нехай (let) — particle for 3rd person imperative; interchangeable with хай; collocation:
    нехай буде (let it be)'
  - 'будьмо (cheers/let us be) — standard drinking toast; strict cultural usage; cultural
    hook: collective presence'
  - 'бажати (to wish) — takes Genitive case; collocations: бажаю щастя (I wish happiness),
    бажаю успіхів (I wish success)'
  - 'ходімо (let''s go) — 1st person plural imperative of йти/ходити; collocation:
    ходімо разом (let''s go together), ходімо в гості'
  recommended:
  - 'мріяти (to dream) — imperative: мрій/мрійте/нехай мріє; State Standard example'
  - 'казати (to say) — imperative: кажи/кажіть/нехай каже; State Standard example'
  - 'пити (to drink) — imperative: пий/пийте/нехай п''є; State Standard example'
