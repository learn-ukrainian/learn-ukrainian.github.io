module: a2-23
level: A2
sequence: 23
slug: complete-imperative
version: '2.0'
title: Complete Imperative
subtitle: Let It Be! (3rd Person)
content_outline:
- section: Introduction / Вступ
  points:
  - Concept of willpower in language
  - 'Why imperative is not always ''impolite'' — contrast with English ''Please''
    dependency; cultural note: wishes like «Нехай щастить!» function as social glue
    rather than commands — cultural hook: emphasizes shared hopes for success'
- section: Presentation / Презентація
  points:
  - 'Review of 2nd person (ти/ви) — content note: Scaffolding required, use English
    to explain the concept first'
  - 'The ''Let''s'' form (-мо suffix) — learner error: English speakers often try
    ''let''s + infinitive'' instead of the dedicated -мо/-імо suffix (e.g., *ходімо*
    not *давай ходити*)'
  - '3rd Person: хай / нехай (The indirect wish) — learner error: *нехай* is NOT the
    negative of *хай*, they are interchangeable particles for 3rd person; verb remains
    in present/future form (e.g., *хай він читає*)'
  - 'Formation nuances (soft vs hard stems) — include State Standard examples: *мріяти
    (мрій), казати (кажи), пити (пий)* — content note: ensure IPA stress marks for
    all verbs (мрі́й, кажи́, пий)'
  - 'Negative Imperatives (не) — content note: clarify position of *не* (e.g., *хай
    не читає*)'
- section: Practice / Практика
  points:
  - Instructions for a recipe (Борщ) — contrast 2nd person commands (*додайте*) with
    collective suggestions (*додаймо*)
  - 'Toast making ceremony — cultural hook: The ritual of «Будьмо!» as a call to collective
    presence; mention the 3rd toast tradition «за кохання/жінок» — cultural note:
    men traditionally stand for this toast'
- section: Dialogues / Діалоги
  points:
  - 'Kitchen dialogue or team coordination — use context to practice mixing ''Do this''
    (2nd person) with ''Let him do that'' (3rd person) and ''Let''s do this'' (1st
    person plural) — vocabulary hook: include *ходімо в гості* or *ходімо разом*'
focus: grammar
pedagogy: PPP
objectives:
- Learner can form 3rd person commands using хай/нехай
- Learner can make toasts and wishes
- Learner can relay indirect commands
- Learner can use the full range of imperative forms
