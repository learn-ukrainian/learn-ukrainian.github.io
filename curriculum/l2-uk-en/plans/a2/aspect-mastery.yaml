  - '[''взяти'', ''to take (perfective)'']'
  - '[''починати'', ''to begin (imperfective)'']'
  - '[''почати'', ''to begin (perfective)'']'
  - '[''закінчувати'', ''to finish (imperfective)'']'
  - '[''закінчити'', ''to finish (perfective)'']'
  - '[''забувати'', ''to forget (imperfective)'']'
  - '[''забути'', ''to forget (perfective)'']'
  - '[''знаходити'', ''to find (imperfective)'']'
  - '[''знайти'', ''to find (perfective)'']'
  recommended:
