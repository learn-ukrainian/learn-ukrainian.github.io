  items_count: 20
- type: fill_in_the_blanks
  focus: Заповнення пропусків у тексті правильною формою дієслова з пари.
  items_count: 15
- type: sentence_transformation
  focus: Перетворення речень з минулого недоконаного в минулий доконаний і навпаки.
