slug: aspect-mastery
level: A2
title: 30 важливих пар
focus: grammar
track: core
word_target: 2000
reference_word_count: 0
objectives:
- Розпізнавати та активно використовувати 30+ поширених видових пар дієслів.
- Ідентифікувати основні префікси, що утворюють доконаний вид (з-, по-, на-, про-,
  ви-).
- Розуміти типові зміни суфіксів та кореневих голосних при утворенні видових пар.
- 'Обирати правильний вид дієслова в залежності від контексту: повторюваність, завершеність,
  результат, заперечення.'
- Аналізувати, як префікси можуть змінювати значення дієслова.
content_outline:
- section: 'Розширення словника: Основні видові пари'
  points:
  - Презентація списку 30+ найуживаніших видових пар (давати/дати, брати/взяти, починати/почати
    тощо).
  - 'Групування пар за семантичними полями: спілкування, рух, їжа, навчання.'
  - Вправи на запам'ятовування пар.
- section: 'Магія префіксів: Як народжується доконаний вид'
  points:
  - 'Аналіз найпродуктивніших префіксів: з-/с- (робити/зробити), по- (обідати/пообідати),
    на- (писати/написати).'
  - Роль префіксів про- (читати/прочитати) та ви- (пити/випити) для позначення завершеності.
  - Пояснення, що префікс часто додає відтінок значення, а не тільки змінює вид.
- section: 'Внутрішні зміни: Суфікси та чергування'
  points:
  - 'Розгляд типових змін суфіксів: -а-/-я- → -и- (вирішувати/вирішити).'
  - Чергування -ува- → -у- (купувати/купити).
  - 'Чергування голосних у корені: допомагати/допомогти (о/і).'
  - Дієслова-винятки, які треба просто запам'ятати (брати/взяти, ловити/спіймати).
- section: 'Вид у дії: Контекст вирішує все'
  points:
  - 'Використання недоконаного виду в запереченнях: ''Я не читав цю книгу''.'
  - 'Використання недоконаного виду для опису одночасних дій: ''Поки я готувала, він
    дивився телевізор''.'
  - 'Використання доконаного виду для послідовних дій: ''Вона прийшла, зняла пальто
    і сіла за стіл''.'
  - Ситуативні задачі на вибір правильного виду.
- section: 'Тренування: Доведення до автоматизму'
  points:
  - Інтенсивні вправи на трансформацію речень з одного виду в інший.
  - Заповнення пропусків у текстах.
  - Створення власних історій, використовуючи вивчені пари.
