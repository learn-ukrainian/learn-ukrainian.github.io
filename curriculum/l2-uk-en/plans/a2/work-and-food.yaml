level: A2
module_id: 26
slug: work-and-food
title: Професії та їжа
subtitle: 'Communication: Professions and Cooking'
word_target: 2000
objectives:
- Активізувати вживання орудного відмінка в комунікативних ситуаціях на теми 'Робота'
  і 'Їжа'.
- Практикувати постановку питань та відповіді про професії та обов'язки.
- Практикувати обговорення їжі, інгредієнтів та способів приготування.
- Інтегрувати всі вивчені функції орудного відмінка (супровід, засіб, професія, прийменникові
  конструкції) в мовленні.
content_outline:
- section: 'Діалог на роботі: ''Ким ти працюєш?'''
  points:
  - Обговорення професій колег (Він працює менеджером, а вона – дизайнером).
  - Розмова про робочі інструменти (Я працюю комп'ютером і телефоном).
  - Планування зустрічі (зустріч з клієнтами).
- section: 'Діалог на кухні: ''Що на вечерю?'''
  points:
  - Обговорення страв (будемо їсти курку з овочами).
  - Розмова про процес готування (різати салат ножем).
  - Обговорення вподобань (я люблю каву з молоком, але без цукру).
- section: 'Читання: ''День з життя кухаря'''
  points:
  - Текст про робочий день шеф-кухаря, що містить багато прикладів орудного відмінка.
  - Він працює кухарем. Він готує ножем. Він спілкується з офіціантами. Він пишається
    своєю роботою.
- section: Інтегрована практика
  points:
  - Комунікативні сценарії, що вимагають використання різних функцій орудного відмінка.
  - 'Приклад: ''Розповісти про вечерю з колегою в новому ресторані''.'
vocabulary_hints:
  required:
  - word (професія)
  - word (фах)
  - word (кухар)
  - word (офіціант)
  - word (готувати)
  - word (їсти)
  - word (пити)
  - word (сніданок)
  - word (обід)
  - word (вечеря)
  - word (масло)
  - word (сир)
  recommended:
  - word (компанія)
  - word (офіс)
  - word (кухня)
  - word (ресторан)
  - word (рецепт)
  - word (інгредієнт)
  - word (смачний)
activity_hints:
- type: communicative_task
  focus: 'Спланувати вечірку: кого запросити (з ким?), що готувати (з чим?), якими
    приборами їсти (чим?).'
  items: 1
- type: role_play
  focus: Провести імпровізовану співбесіду на роботу.
  items: 1
- type: reading_comprehension
  focus: Дати відповіді на питання до тексту про шеф-кухаря.
  items: 10
- type: story_writing
  focus: Написати коротку розповідь про свій типовий робочий день або процес приготування
    улюбленої страви.
  items: 1
- type: dialogue_creation
  focus: 'Створити власний діалог на одну з тем: ''в офісі'' або ''в кафе''.'
  items: 1
