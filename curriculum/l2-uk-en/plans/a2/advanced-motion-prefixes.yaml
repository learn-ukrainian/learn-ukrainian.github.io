module: a2-37
level: A2
sequence: 37
slug: advanced-motion-prefixes
version: '2.0'
title: Advanced Motion Prefixes
subtitle: Crossing, Passing, and Approaching
content_outline:
- section: Introduction / Вступ
  points:
  - 'Beyond In and Out: The geometry of complex paths — introduce the ''GPS instructions''
    metaphor: root is the engine, prefix is the steering wheel'
  - Navigating the city like a local — focus on precise trajectories needed for 'City'
    theme (§3)
- section: Presentation / Презентація
  points:
  - 'The Bridge: Пере- (Across) vs Про- (Through) — visual: X -> Y vs -> | | ->; cultural
    hook: black cat crossing the path (перейти дорогу) superstition'
  - 'The Visit: За- (Stopping by) vs При- (Arriving) — cultural hook: the ''Returning''
    superstition (bad luck to return shortly after leaving); learner error: confusing
    ''coming'' (при-) vs ''going'' (пі-)'
  - 'The Reach: До- (Getting there) vs Під- (Approaching) — idiom: ''мені підходить''
    (it suits me); learner error: using ''підійти в'' instead of ''підійти до'''
  - 'The Circle: Об- (Around) — visual: O ->; context: bypassing obstacles or walking
    around a building'
  - 'Prepositional Harmony: Matching prefixes to cases — State Standard §4.2.2.4 alignment:
    В/У/НА for destination, but ДО for approach/reach'
  - 'The Logic of Distance: How prefixes signal proximity — distinguishing ''near''
    (під-) vs ''touch/arrival'' (до-)'
- section: Practice / Практика
  points:
  - Path visualization drills — use text-based diagrams to map prefixes to trajectories
  - 'Giving complex directions in Lviv/Kyiv — learner error: using perfective future
    ''буду прийти'' instead of ''прийду'''
- section: Dialogues / Діалоги
  points:
  - 'Travel stories: A journey through the mountains or a complex commute — integrate
    ''час пройшов'' (time passed) or ''сонце зайшло'' (sun set) for narrative flavor'
focus: grammar
pedagogy: PPP
objectives:
- Learner can describe crossing streets and spaces
- Learner can describe passing by or through places
- Learner can describe approaching an object
- Learner can describe reaching a destination
- Learner can describe "popping in" or stopping by
- Learner can describe moving around an obstacle
grammar:
- prefix пере- (crossing)
- prefix про- (passing/through)
- prefix під- (approaching)
- prefix до- (reaching)
- prefix за- (stopping by / behind)
- prefix об- (around)
- prefix при- (arriving)
module_type: grammar
