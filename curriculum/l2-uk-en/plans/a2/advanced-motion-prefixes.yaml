vocabulary_hints:
  required:
  - перейти / переходити (to cross) — перейти вулицю, перейти міст, перейти на українську
    (switch to Ukrainian)
  - пройти / проходити (to pass, walk distance) — пройти повз (pass by), пройти 5
    кілометрів, час пройшов (time passed)
  - 'підійти / підходити (to approach, suit) — підійти до карти, потяг підходить,
    мені це підходить (idiom: this suits me)'
  - дійти / доходити (to reach, get to) — як дійти до...?, дійти згоди (reach agreement)
  - зайти / заходити (to enter, stop by) — зайти в магазин (pop in), сонце зайшло
    (sun set), зайти до друга
  - обійти / обходити (to go around) — обійти навколо, обійти перешкоду
  - прийти / приходити (to arrive, come) — прийти додому, прийти вчасно
  recommended:
  - 'руки не доходять (idiom: never get around to it)'
  - чорний кіт перейшов дорогу (superstition phrase)
  - повернутися (to return) — contrast with 'зайти' in the superstition context
