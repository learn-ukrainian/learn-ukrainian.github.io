module: a2-12
level: A2
sequence: 12
slug: aspect-introduction
version: '2.0'
title: Aspect Introduction
subtitle: Process vs. Result
content_outline:
- section: Introduction / Вступ
  points:
  - 'Concept of aspect (Process vs Result) — cultural hook: Proverbial Wisdom ''Без
    труда нема плода'' emphasizes process leading to result'
  - 'Importance of verb pairs — aligns with State Standard §4.3.2: foundational competence
    for A2'
- section: Presentation / Презентація
  points:
  - 'Imperfective (недоконаний) vs Perfective (доконаний) — learner error: assuming
    English ''-ing'' always maps to imperfective; learner error: using perfective
    in present tense for ongoing action'
  - 'Common aspect pairs (Prefixation vs Suppletion) — content note: clearly categorize
    by formation: prefixation (писати/написати), suffix/stem change (купувати/купити),
    suppletion (говорити/сказати, брати/взяти)'
  - 'Time markers and context clues — learner error: confusion in negation between
    ''didn''t do'' (process/habit) and ''didn''t finish'' (result)'
- section: Practice / Практика
  points:
  - Process/Result identification
  - Aspect pair matching
- section: Dialogues / Діалоги
  points:
  - '"Did you finish?" situational exchange — cultural hook: The Borsch Ritual (cooking
    process vs. finished masterpiece); note: UNESCO recognized Ukrainian borscht cooking
    as intangible heritage in 2022'
vocabulary_hints:
  required:
  - читати/прочитати (to read)
  - писати/написати (to write) — писати лист, написати книгу, написати тест
  - робити/зробити (to do/make) — робити вправи, зробити домашнє завдання, робити
    помилку
  - говорити/сказати (to say/speak) — говорити правду, сказати слово, сказати комплімент
  - бачити/побачити (to see)
  - брати/взяти (to take)
  - давати/дати (to give)
  - їсти/з'їсти (to eat)
  - пити/випити (to drink) — пити каву, випити склянку води
  - вчити/вивчити (to learn)
  - купувати/купити (to buy) — купувати продукти, купити подарунок
  - продавати/продати (to sell)
  - вид (aspect)
  - недоконаний (imperfective)
  - доконаний (perfective)
  recommended:
  - процес (process)
  - результат (result)
  - тривалість (duration)
  - завершення (completion)
  - повторення (repetition)
