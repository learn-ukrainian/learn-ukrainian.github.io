module: a2-020
level: A2
sequence: 20
slug: reflexive-sebe
version: '2.0'
title: Reflexive Pronoun Sebe
subtitle: себе/собі/собою — Talking About Oneself
focus: grammar
pedagogy: TTT
phase: A2.2
word_target: 3000
objectives:
- Learner can decline себе across all available cases (Gen/Acc, Dat/Loc, Inst)
- Learner can choose between себе and reflexive -ся verbs appropriately
- Learner can recognise the colloquial собі intensifier in spoken and written Ukrainian
- Learner can distinguish between себе (action target) and свій (possession) in context
