module: a2-047
level: A2
sequence: 47
slug: because-and-although
version: 1.1.3
title: Тому що, бо, хоча
subtitle: Складне речення з причиною та допустом
focus: grammar
pedagogy: PPP
phase: А2.7 [Складні речення та умови]
word_target: 2000
objectives:
- Здобувач може з'єднати дві частини речення за допомогою "тому що" та "бо" для вираження причини.
- Здобувач може використовувати "хоча" для вираження допусту в складних реченнях.
- Здобувач може будувати складносурядні речення зі сполучниками "і", "та", "але" для розширення простих думок.
- Здобувач може розрізняти причину (з "бо" / "тому що") та допуст (з "хоча") у контексті.
dialogue_situations:
- setting: 'Два студенти сперечаються, чи йти на заняття — наводять причини: Я не піду, бо хворію. Але тобі треба, тому що завтра контрольна (f, test)! Хоча я втомився, я все одно піду.'
  speakers:
  - Студент 1
  - Студент 2
  motivation: 'Бо, тому що, хоча, але зі словами контрольна(f), лекція(f)'
content_outline:
- section: Чому? Тому що... / Бо...
  words: 700
  points:
  - 'Введення підрядних речень причини: запитання "Чому?" та відповіді "тому що..." і "бо...". Обидва означають причину, але відрізняються регістром — "бо" більш розмовне, "тому що" більш нейтральне або формальне.'
  - 'Порядок слів: "тому що" завжди стоїть на початку підрядної частини; "бо" може бути всередині речення або на початку другої частини. Правила пунктуації: кома перед сполучником.'
  - 'Побудова природних речень із повсякденного життя: Я не прийшов, тому що був зайнятий. Вона вивчає українську, бо хоче розуміти друзів.'
  - 'Практика трансформації: поєднання двох простих речень в одне складне за допомогою "тому що" або "бо".'
- section: Хоча...
  words: 600
  points:
  - 'Введення підрядних речень допусту з "хоча": вираження контрасту між очікуванням та реальністю. Хоча надворі холодно, ми пішли гуляти.'
  - 'Розрізнення "хоча" (допуст) та "але" (простий контраст): Хоча він втомився, він продовжив працювати vs. Він втомився, але продовжив працювати.'
  - 'Гнучкість позиції: частина з "хоча" може стояти першою або другою. Якщо вона перша, головна частина часто не має додаткового сполучника. Кома перед або після підрядної частини.'
  - 'Природні приклади: Хоча я вчу українську недовго, я вже розумію багато. Ми пішли на прогулянку, хоча йшов дощ.'
- section: 'Складносурядне речення: і, та, але'
  words: 700
  points:
  - 'Розширення сурядних сполучників рівня А1: "і"/"та", "але"/"проте"/"однак". Різниця між "і" та "та" — "та" є трохи більш формальним або використовується, щоб уникнути повторення "і".'
  - 'Побудова довших складносурядних речень: Я прийшов додому, і ми разом повечеряли. Сергій хотів піти в кіно, але не мав часу.'
  - 'Контраст: сурядний зв''язок ("і", "та", "але" — рівноправні частини) та підрядний зв''язок ("тому що", "бо", "хоча" — головна і підрядна частини). Як їх розрізняти.'
  - 'Правила пунктуації для складних речень: завжди кома перед "але", "проте", "однак"; кома перед "і" / "та" при поєднанні двох частин складного речення.'
  - 'Вправа на закріплення: переписати короткий абзац, використовуючи всі три типи (причина, допуст, сурядність) для створення природного зв''язного тексту.'
  - 'Інтонаційні моделі: у причинових реченнях головна частина має низхідний тон (↘), тоді як підрядна частина з "тому що" / "бо" має легкий висхідний тон (↗) перед нею. У допустових реченнях з "хоча", частина з "хоча" має висхідний тон (↗), щоб вказати на допуст, а потім головна частина має низхідний тон (↘) для вираження результату.'
- section: Підсумок
  words: 200
  points:
  - 'Виражайте причину за допомогою "тому що" (нейтрально) або "бо" (розмовно), а допуст за допомогою "хоча". Самоперевірка: Яка різниця між "бо" та "тому що"? З''єднайте "Надворі холодно" та "Ми йдемо гуляти", використовуючи "хоча".'
  - 'Будуйте складні речення з сурядними сполучниками "і", "та", "але", завжди ставлячи кому при з''єднанні двох повноцінних частин. Самоперевірка: Яка різниця між "хоча" та "але"? Напишіть речення про свій день, використовуючи "і" та "але".'
vocabulary_hints:
  required:
  - тому що (because)
  - бо (because — colloquial)
  - хоча (although, even though)
  - але (but)
  - проте (however, yet)
  - однак (however)
  - причина (reason, cause)
  - сполучник (conjunction)
  - складне речення (complex sentence)
  - тому (therefore, that is why)
  recommended:
  - допуст (concession)
  - зате (but then, on the other hand)
  - навпаки (on the contrary)
  - незважаючи на (despite)
