vocabulary_hints:
  required:
  - 'тому що (because) — High frequency, neutral; Collocation: ''Це сталося, тому
    що...'', ''Я запізнився, тому що...'''
  - 'бо (because/for) — Spoken/Casual; Collocation: ''Не йди туди, бо там холодно'',
    ''Я їм, бо голодний'''
  - 'через (because of/due to) — Preposition for negative/neutral causes; Collocation:
    ''Через погоду'', ''через помилку'''
  - 'завдяки (thanks to) — Preposition for positive causes; Collocation: ''Завдяки
    тобі'', ''завдяки підтримці'''
  - 'хоча (although) — Concession; Collocation: ''Хоча я втомився, я піду'', ''Хоча
    це дорого...'''
  - але (but) — Standard adversarial conjunction (State Standard §4.4.2)
  recommended:
  - 'оскільки (since/as) — Formal/Written; Collocation: ''Оскільки ви тут...'', ''Оскільки
    це важливо...'''
  - 'причина (reason) — Key noun for logic; idiomatic: ''без причини'' (folk wisdom)'
  - наслідок (consequence) — Useful for explaining results
word_target: 3000
