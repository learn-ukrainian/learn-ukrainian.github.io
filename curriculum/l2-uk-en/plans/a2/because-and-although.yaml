slug: because-and-although
level: A2
word_target: 2000
title: Тому що і хоча
description: Вчимося поєднувати речення за допомогою сполучників причини та поступки.
focus: grammar
objectives:
- Пояснювати причину дії, використовуючи 'тому що' та 'бо'.
- Виражати контраст або поступку, використовуючи 'хоча'.
- Поєднувати прості речення у складні за допомогою 'і', 'та', 'але'.
- Розрізняти 'тому що' (більш формально) та 'бо' (більш розмовно).
- Будувати довші, більш описові речення про повсякденне життя.
content_outline:
- section: 'Вступ: Навіщо потрібні складні речення?'
  points:
  - Що таке сполучники?
  - Як вони роблять мову багатшою.
- section: 'Сполучники причини: ''Тому що'' і ''бо'''
  points:
  - 'Структура речення: Головна частина + ''тому що''/''бо'' + підрядна частина.'
  - 'Різниця у вживанні: ''тому що'' у письмовій та формальній мові, ''бо'' у розмовній.'
  - 'Практичні приклади: Я втомився, бо багато працював.'
- section: 'Сполучник поступки: ''Хоча'''
  points:
  - 'Вираження контрасту: ''Хоча йде дощ, я йду гуляти''.'
  - Структура речення та інтонація.
  - Порівняння з 'але'.
- section: 'Поєднувальні сполучники: ''І, та, але'''
  points:
  - Короткий огляд уже відомих сполучників.
  - Поєднання однорідних ідей (і, та) та протилежних (але).
  - Розширення простих речень.
- section: 'Синтез: Будуємо довгі речення'
  points:
  - Комбінування різних сполучників в одному реченні.
  - Практичні вправи на поєднання кількох простих речень.
