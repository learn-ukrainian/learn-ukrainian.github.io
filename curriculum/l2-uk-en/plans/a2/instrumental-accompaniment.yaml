module: a2-024
level: A2
sequence: 24
slug: instrumental-accompaniment
version: 1.0.3
title: З другом
subtitle: Прийменники з/із/зі з орудним відмінком для супроводу та ознаки
focus: grammar
pedagogy: PPP
phase: A2.4 [Instrumental Case]
word_target: 2000
objectives:
- Учень може утворювати орудний відмінок однини іменників чоловічого, жіночого та середнього роду після прийменників з/із/зі.
- Учень вміє використовувати з + орудний відмінок для вираження супроводу (з другом, з сестрою, з дитиною).
- Учень може використовувати з + орудний відмінок для вираження ознаки або інгредієнта (чай з лимоном, хліб з маслом, кава з молоком).
- Учень вміє обирати правильний варіант (з/із/зі) залежно від фонетичного контексту.
dialogue_situations:
- setting: 'Планування пікніка — хто з ким іде і що бере з собою: Я іду з Олегом (m). Вона прийде з подругою (f, girlfriend). Візьмемо каву з молоком (n, milk). Бутерброди з шинкою (f, ham).'
  speakers:
  - Організатор пікніка
  - Друзі
  motivation: 'З + орудний відмінок: з Олегом, з подругою, з молоком, з шинкою'
content_outline:
- section: 'Орудний відмінок: Знайомство'
  words: 450
  points:
  - 'Ознайомлення з орудним відмінком, що відповідає на питання "Ким? Чим?" — сьомий український відмінок у нашому курсі.'
  - 'Його основне значення: "інструмент" або "супутник" дії. Сьогодні ми зосереджуємось на супроводі — робити щось З кимось або чимось.'
  - 'Короткий огляд усіх функцій орудного відмінка (супровід, інструмент, професія, простір) — вивчатимуться в модулях M21-M25.'
  - 'Зв''язок з уже вивченими відмінками (називний, знахідний, родовий, давальний) і як орудний відмінок доповнює картину зв''язків іменника.'
- section: 'Закінчення орудного відмінка однини'
  words: 600
  points:
  - 'Іменники чоловічого роду: -ом для твердої групи (другом, столом, братом), -ем для м''якої та мішаної груп (вчителем, ножем, товаришем), -єм для основ на [й] (чаєм, трамваєм).'
  - 'Іменники жіночого роду: -ою для твердої групи (сестрою, мамою, книгою), -ею для м''якої та мішаної груп (землею, душею), -єю для основ на [й] (мрією, надією).'
  - 'Іменники середнього роду: -ом для основ на -о (вікном, молоком, маслом), -ем/-ям для основ на -е/-я (морем, ім''ям).'
  - 'Чітка порівняльна таблиця з називним та орудним відмінками для кожного роду. Модель за підручниками Захарійчук 4 клас та Пономарьова 4 клас.'
- section: 'З/із/зі + орудний відмінок'
  words: 500
  points:
  - 'Прийменник з (with) + орудний відмінок виражає два значення: (1) супровід — Я гуляю з другом, Вона живе з батьками; (2) ознака — чай з лимоном, хліб з маслом, борщ зі сметаною.'
  - 'Фонетичні варіанти: з перед голосними та більшістю приголосних (з другом, з молоком), із перед збігом приголосних (із сестрою), зі перед словами, що починаються на з-, с-, ш- (зі мною, зі сметаною).'
  - 'Поширені словосполучення: каша з маслом, кава з молоком, піца з грибами, салат з овочами — описи їжі, які учні можуть використовувати одразу.'
  - 'Діалогічна практика в кафе, де друзі замовляють їжу та описують страви.'
- section: 'Практика: З ким? З чим?'
  words: 450
  points:
  - 'Практика відповідей на запитання: З ким ти живеш? — Я живу з мамою. З ким ти ходиш у кіно? — З другом. Чай з чим? — З лимоном.'
  - 'Діалог: двоє друзів зустрічаються в кафе, замовляють напої та закуски, описують, чого вони хочуть (Мені, будь ласка, каву з молоком. А мені чай з медом).'
  - 'Вправа на трансформацію з називного в орудний відмінок у контексті речень.'
  - 'Поширені вирази: розмовляти з кимось, зустрітися з другом, погодитися з думкою.'
- section: Підсумок
  words: 200
  points:
  - 'Закінчення орудного відмінка однини для супроводу та інгредієнтів: чоловічий/середній рід мають -ом для твердої групи (другом, маслом) та -ем/-єм для м''якої (вчителем, чаєм). Жіночий рід має -ою для твердої групи (сестрою) та -ею/-єю для м''якої (землею, мрією).'
  - 'Прийменник "з" адаптується до фонетики: використовуйте з зазвичай (з другом), із для збігу приголосних (із сестрою) та зі перед звуками з-, с-, ш- (зі сметаною). Самоперевірка: Як ви замовите "coffee with milk" та "tea with lemon"? (кава з молоком, чай з лимоном) Дайте відповідь на запитання: З ким ти живеш? Опишіть 3 комбінації їжі, використовуючи "з/із/зі". Коли саме потрібно використовувати "зі"?'
vocabulary_hints:
  required:
  - орудний відмінок (instrumental case)
  - з (with)
  - із (with — before consonant clusters)
  - зі (with — before з-, с-, ш-)
  - друг (friend (male))
  - подруга (friend (female))
  - лимон (lemon)
  - молоко (milk)
  - масло (butter)
  - мед (honey)
  - сметана (sour cream)
  recommended:
  - супутник (companion)
  - разом (together)
  - компанія (company, group of friends)
  - гриби (mushrooms)
