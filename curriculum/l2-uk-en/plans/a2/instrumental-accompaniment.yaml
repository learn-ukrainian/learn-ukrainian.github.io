activity_hints:
- type: cloze
  focus: Вибір правильного варіанта 'з', 'із', або 'зі'.
  items: 12
- type: matching
  focus: Поєднати іменник у називному відмінку з його формою в орудному відмінку.
  items: 12
- type: sentence_construction
  focus: Скласти речення, поєднуючи людей та їхні дії (Мама + говорити + подруга).
  items: 10
- type: dialogue_completion
  focus: Доповнити пропуски в діалозі в ресторані.
  items: 10
- type: image_prompt
  focus: Описати, що на зображенні, використовуючи 'з чим?' (чашка з кавою).
  items: 8
