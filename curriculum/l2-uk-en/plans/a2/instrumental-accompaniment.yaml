level: A2
module_id: 21
slug: instrumental-accompaniment
title: З другом
subtitle: The Instrumental Case for Accompaniment & Attributes
word_target: 2000
objectives:
- Навчитися вживати орудний відмінок з прийменниками 'з'/'із'/'зі' для вираження супроводу
  (з ким?).
- Навчитися вживати орудний відмінок з прийменником 'з' для опису атрибутів предмета
  (з чим?).
- 'Зрозуміти правила вживання варіантів прийменника: з, із, зі.'
- Практикувати утворення форм орудного відмінка іменників.
- Навчитися розрізняти питання 'з ким?' (людина) і 'з чим?' (предмет).
content_outline:
- section: 'Вступ: З ким чи з чим?'
  points:
  - 'Пояснення двох основних функцій: супровід (йти з другом) та атрибут (чай з лимоном).'
  - 'Ключові питання: З ким? З чим?'
- section: Творення орудного відмінка іменників
  points:
  - 'Закінчення чоловічого роду: -ом, -ем, -єм (з братом, з учителем).'
  - 'Закінчення жіночого роду: -ою, -ею, -єю (з сестрою, з кавою).'
  - 'Закінчення середнього роду: -ом, -ем, -єм (з молоком, з морем).'
  - 'Закінчення у множині: -ами, -ями (з друзями, з батьками).'
- section: 'Правила вживання: з, із, зі'
  points:
  - Основний варіант 'з'.
  - '''із'' вживається для уникнення збігу приголосних (із сином, із Львова).'
  - '''зі'' вживається перед групами приголосних, особливо якщо перша ''з'', ''с'',
    ''ш'' (зі мною, зі школи).'
- section: 'Практика: діалоги в кафе та на вулиці'
  points:
  - 'Діалог 1: Замовлення кави з молоком і чаю з лимоном.'
  - 'Діалог 2: Розмова по телефону про плани на вечір (піти в кіно з подругою).'
  - 'Короткі речення для практики: Я розмовляю з колегою. Це суп з овочами.'
