vocabulary_hints:
  required:
  - 'казати (to say/tell) — collocations: казати правду (tell the truth), він каже,
    що... (he says that...), так би мовити (so to speak)'
  - 'говорити (to speak/talk) — collocations: говорити українською (speak Ukrainian),
    говорити про... (talk about...), говорити з... (speak with...)'
  - 'питати (to ask) — collocations: питати дозволу (ask permission), питати дорогу
    (ask for directions)'
  - 'відповідати (to answer) — collocations: відповідати на питання (answer a question),
    відповідати за... (be responsible for...)'
  recommended:
  - 'плітки (gossip) — context: «на лавці» culture'
  - 'зіпсований телефон (broken telephone) — context: children''s game used for practice'
