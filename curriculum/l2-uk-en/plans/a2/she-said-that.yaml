immersion: 60-75% Ukrainian
phase: A2.2
persona:
  voice: Encouraging Cultural Guide
  role: Gossip Columnist
vocabulary_hints:
  required:
  - 'казати (to say/tell) — High frequency (Top 100); collocations: казати правду
    (tell the truth), він каже, що... (he says that...), так би мовити (so to speak)'
  - 'говорити (to speak/talk) — High frequency; collocations: говорити українською
    (speak Ukrainian), говорити про... (talk about...), говорити з... (speak with...)'
  - 'питати (to ask) — collocations: питати дозволу (ask permission), питати дорогу
    (ask for directions)'
  - 'відповідати (to answer) — collocations: відповідати на питання (answer a question),
    відповідати за... (be responsible for...)'
  recommended:
  - плітки (gossip) — noun; essential for «на лавці» (on the bench) cultural context
  - зіпсований телефон (broken telephone) — Ukrainian name for the whisper game; used
    for practicing information transmission
  - чи (whether/if) — conjunction; critical for reported questions, distinct from
    conditional 'якщо'
  - щоб (in order to/that) — conjunction; used for reporting commands and requests
word_target: 3000
