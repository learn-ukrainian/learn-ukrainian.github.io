module: a2-34
level: A2
sequence: 34
slug: health-basics
version: '2.0'
title: Health Basics
subtitle: Body Parts, Symptoms & Pain Expressions
content_outline:
- section: 'Вступ: Здоров’я — це скарб (Introduction: Health is a Treasure)'
  words: 400
  points:
  - 'Cultural hook: «У здоровому тілі — здоровий дух» (In a healthy body, a healthy
    spirit). Health as a primary smalltalk topic and the cultural norm of home visits
    (викликати лікаря додому) versus western clinic-only systems.'
  - 'Contextualizing the State Standard §3.12: Why mastery of ''самопочуття'' (well-being)
    is a foundational A2 competency for navigating daily life in Ukraine.'
- section: Частини тіла та анатомія (Body Parts and Anatomy)
  words: 600
  points:
  - 'Core vocabulary for physical assessment: голова, рука, нога, живіт, спина, горло.
    Focus on internal organs often mentioned in symptoms: серце (heart), шлунок (stomach),
    легені (lungs).'
  - 'Grammar focus: Irregular plurals and agreement patterns. Drills on the shift
    from singular ''око'' to plural ''очі'' and ''вухо'' to ''вуха'', including gender
    agreement with adjectives (червоне горло, сильний біль).'
  - 'Cultural idiom: «Від щирого серця» (From the bottom of the heart) to demonstrate
    the linguistic beauty of anatomical terms in non-medical contexts.'
- section: 'Конструкція «У мене болить»: Граматика болю (The ''It Hurts'' Construction)'
  words: 600
  points:
  - 'Primary grammar competency: У мене болить + Nominative (singular) vs. У мене
    болять + Nominative (plural). Learner error correction: Prevent ''Я болю'' or
    ''У мене болить ноги'' through repetitive matching drills.'
  - 'Standard vs. Archaic usage: Clarifying that the literary standard for physical
    pain is Genitive with preposition (У мене болить...), whereas the Dative ''Мені
    болить'' is reserved for emotional pain or poetic contexts (e.g., ''Мені болить
    за Україну'').'
  - 'Expressing physical states using the Dative Case (§4.2.2.3): ''Мені погано/добре/нудно''.
    Correction of the common error ''Я погано'' instead of the required impersonal
    Dative structure.'
- section: Симптоми, хвороби та народна медицина (Symptoms, Illnesses, and Folk Remedies)
  words: 600
  points:
  - 'Symptom vocabulary: температура (висока/низька), кашель (сухий/вологий), нежить
    (мати нежить), біль (гострий/тупий). Integration of ''міряти температуру'' (to
    take temperature).'
  - 'Linguistic distinction: хворіти (to be ill/sick with something) vs. боліти (to
    hurt/ache). Explicit drill for the construction ''хворіти на + Accusative'' (Я
    хворію на грип) to fix the error ''Я болю грип''.'
  - 'Cultural hook: Traditional Ukrainian remedies as the first line of defense—чай
    з малиною (raspberry tea) and the traditional (though fading) use of гірчичники
    (mustard plasters).'
- section: У поліклініці та аптеці (At the Clinic and Pharmacy)
  words: 500
  points:
  - 'Institutional mapping: The distinction between ''поліклініка'' (outpatient checkups)
    and ''лікарня'' (inpatient hospital). Introduction of modern terms like ''сімейний
    лікар'' (family doctor) and ''підписати декларацію''.'
  - 'Medical Imperatives (§4.2.3.2): Following doctor''s instructions using 2nd person
    plural forms—''Відкрийте рот'', ''Дихайте'', ''Не дихайте'', ''Пийте ці ліки''.'
  - 'Navigating the pharmacy (аптека): Common phrases for ''засоби від нежитю'' (cold
    medicine) and recognizing ''швидка допомога'' (ambulance) terminology.'
- section: 'Практика: Що трапилося? (Practice: What Happened?)'
  words: 300
  points:
  - 'Role-play: Calling a friend or the clinic to report an illness. Synthesis of
    ''Що з тобою?'' and answering with symptoms and ''У мене болить'' structures.'
  - 'Emergency production: ''Викличте швидку!'' (Call an ambulance!) and providing
    basic information about the patient''s state to a dispatcher.'
focus: vocabulary
pedagogy: PPP
objectives:
- Learner can name major body parts
- Learner can use the боліти construction correctly
- Learner can describe basic symptoms
- Learner can express physical states (Мені погано/добре)
grammar:
- body parts (gender, singular/plural)
- impersonal pain construction (у мене болить/болять)
- state expressions with Dative (Мені погано)
- хворий/боліти/хворіти distinction
module_type: vocabulary
sources:
- name: Ukrainian State Standard 2024 - Health and Hygiene
  url: https://mon.gov.ua/
  type: reference
  notes: Standards for describing physical conditions at A2
immersion: 60-75% Ukrainian
phase: A2.3
persona:
  voice: Encouraging Cultural Guide
  role: School Nurse
vocabulary_hints:
  required:
  - 'голова (head) — collocations: болить голова, головний біль, крутиться голова'
  - 'рука (arm/hand) — note: права/ліва рука, зламати руку'
  - 'нога (leg/foot) — collocations: болять ноги, зламати ногу'
  - 'живіт (stomach) — usage: болить живіт (stomach ache)'
  - 'горло (throat) — collocations: червоне горло, болить горло'
  - 'боліти (to hurt) — impersonal: у мене болить X (sg) / болять Y (pl); contrast
    with хворіти'
  - 'хворіти на (to be sick with) — usage: хворіти на грип/застуду; never ''я болю
    грип'''
  - 'температура (fever/temperature) — collocations: висока температура, міряти температуру'
  - 'кашель (cough) — collocations: сильний кашель, сухий кашель'
  - сімейний лікар (family doctor) — modern term for primary care provider in Ukraine
  - поліклініка (outpatient clinic) — high frequency; where you go for non-emergencies
  - 'аптека (pharmacy) — collocations: цілодобова аптека, купити в аптеці'
  recommended:
  - 'нежить (runny nose) — masculine; collocations: мати нежить, засоби від нежитю'
  - хворий (sick, adj.) — він хворий, хвора дитина
  - здоровий (healthy) — у здоровому тілі — здоровий дух
  - спина (back) — болить спина, біль у спині
  - зуб (tooth) — болить зуб, зубний біль
  - 'серце (heart) — idiom: від щирого серця (from the bottom of my heart)'
  - 'швидка допомога (ambulance) — collocations: викликати швидку, приїхала швидка'
  - 'погано (bad/unwell) — used with Dative: мені погано'
  - 'дихати (to breathe) — medical command: дихайте / не дихайте'
