module: a2-023
level: A2
sequence: 23
slug: checkpoint-dative
version: 1.1.4
title: Контрольна робота — давальний відмінок
subtitle: Перевірка засвоєння давального відмінка (М15-М19)
focus: review
pedagogy: Review
phase: А2.3 [Давальний відмінок]
word_target: 1500
objectives:
- Здобувач може утворювати всі форми займенників у давальному відмінку та використовувати їх у безособових конструкціях
  (повторення М15).
- Здобувач може утворювати закінчення давального відмінка для іменників усіх родів із правильним чергуванням приголосних
  (повторення М16).
- Здобувач може будувати повністю узгоджені словосполучення в давальному відмінку з прикметниками та присвійними
  займенниками (повторення М17).
- Здобувач може правильно використовувати дієслова, що керують давальним відмінком, конструкцію з "подобатися" та
  вираження віку в контексті (повторення М18).
dialogue_situations:
- setting: 'Таємний Санта в офісі — підбір подарунків для людей: Що подарувати Олексієві (m)? Книгу! А Наталці (f)? Шоколад!
    Новому колезі (m) — чашку. Шефу (m) — вино.'
  speakers:
  - Організатор
  - Колеги
  motivation: 'Закріплення давального відмінка: Олексієві, Наталці, колезі, шефу'
content_outline:
- section: 'Частина 1: Розпізнавання'
  words: 400
  points:
  - 'Визначення форм давального відмінка в контексті — розрізнення форм давального, родового, знахідного та місцевого відмінків.'
  - 'Розпізнавання безособових конструкцій з давальним відмінком (мені холодно) порівняно з реченнями з підметом у називному
    відмінку (я замерзла).'
  - 'Встановлення відповідності між формами займенників у давальному відмінку та їхніми відповідниками в називному відмінку.'
  - 'Визначення особи, що відчуває стан, у реченнях з "подобатися" (у давальному відмінку).'
- section: 'Частина 2: Вибір форми'
  words: 500
  points:
  - 'Вибір правильних закінчень іменників у давальному відмінку для всіх родів — чоловічий -ові/-у, жіночий -і з чергуванням,
    середній -у/-ю.'
  - 'Вибір правильних форм прикметників і присвійних займенників у давальному відмінку (-ому/-ій/-им).'
  - 'Вибір між давальним і знахідним відмінками залежно від дієслова (допомагати кому vs. бачити кого).'
  - 'Заповнення правильних форм у діалогах на пошті та у сфері обслуговування з М19.'
- section: 'Частина 3: Продукування'
  words: 400
  points:
  - 'Написання повних речень з використанням дієслів, що керують давальним відмінком, з правильними формами іменників/займенників.'
  - 'Побудова речень з "подобатися" з правильним узгодженням особи в давальному відмінку та підмета в називному.'
  - 'Вираження віку за допомогою конструкції з давальним відмінком та правильним узгодженням числівника.'
  - 'Написання короткої адреси або привітання з використанням повних іменникових фраз у давальному відмінку (присвійний займенник
    + прикметник + іменник).'
- section: Огляд помилок та порівняння відмінків
  words: 200
  points:
  - 'Типові помилки в давальному відмінку та як їх уникати — плутанина між -ому/-ій, забування про чергування приголосних,
    неправильний відмінок після дякувати/допомагати.'
  - 'Узагальнювальна порівняльна таблиця закінчень називного, родового та давального відмінків для іменників, прикметників
    і займенників.'
  - 'Чек-лист для самооцінки засвоєння давального відмінка.'
- section: Підсумок
  words: 200
  points:
  - 'Закінчення іменників у давальному відмінку залежать від роду та основи: іменники чоловічого роду мають закінчення -ові/-у
    (братові), жіночого роду — закінчення -і з чергуванням приголосних (подруга -> подрузі), а середнього роду — закінчення
    -у/-ю. Прикметники та присвійні займенники мають закінчення -ому/-ій/-им.'
  - 'Безособові конструкції та окремі дієслова вимагають давального відмінка: мені холодно. Пам''ятайте, що "дякувати" і "допомагати"
    керують давальним відмінком.'
  - 'Самоперевірка: Як сказати "I like this new book"? (Мені подобається ця нова книга). Назвіть свій вік за допомогою конструкції
    з давальним відмінком. Яка різниця в керуванні відмінками між дієсловами бачити та допомагати?'
vocabulary_hints:
  required:
  - давальний відмінок (dative case)
  - допомагати (to help)
  - дякувати (to thank)
  - подобатися (to be pleasing to, to like)
  - подарувати (to give as a gift)
  - надіслати (to send)
  - потрібно (necessary, needed)
  - холодно (cold (impersonal state))
  recommended:
  - закінчення (ending (grammar))
  - чергування (alternation (grammar))
  - узгодження (agreement (grammar))
activity_hints:
- type: quiz
  focus: 'Визначити форму давального відмінка серед варіантів (розпізнавання — матеріал Частини 1)'
  items: 10
- type: fill-in
  focus: 'Доповнити речення правильними закінченнями іменників/прикметників/займенників у давальному відмінку (матеріал Частини
    2)'
  items: 10
- type: match-up
  focus: 'З''єднати дієслова, що керують давальним відмінком, з правильними відмінковими формами та закінченнями речень'
  items: 10
- type: error-correction
  focus: 'Знайти та виправити граматичні помилки в реченнях, що охоплюють теми модуля'
  items: 10
