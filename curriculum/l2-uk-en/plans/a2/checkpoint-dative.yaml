level: A2
word_target: 1500
title: Контрольна точка
subtitle: Давальний відмінок. Огляд
slug: checkpoint-dative
focus: review
status: DRAFT
objectives:
- Систематизувати та закріпити знання про форми та функції давального відмінка.
- Перевірити вміння правильно відмінювати займенники, іменники та прикметники в давальному
  відмінку.
- Практикувати вживання дієслів, що вимагають давального відмінка.
- Оцінити власне розуміння теми та визначити, що потребує додаткової практики.
content_outline:
- section: 'Давальний відмінок: зведена таблиця'
  points:
  - Таблиця з закінченнями для іменників, прикметників та займенників (особових, присвійних,
    вказівних) в однині та множині.
- section: Ключові дієслова та конструкції
  points:
  - Список 10 найважливіших дієслів, що вимагають давального відмінка (допомагати,
    дякувати, дзвонити, радити, тощо).
  - 'Огляд безособових конструкцій: ''мені холодно'', ''тобі потрібно''.'
  - Нагадування про конструкцію для позначення віку.
- section: Типові помилки
  points:
  - Розрізнення закінчень -ові/-у для іменників чоловічого роду.
  - 'Правильне узгодження прикметників: ''моєму новому другу'', а не ''мій новий другу''.'
  - 'Вживання давального, а не знахідного відмінка: ''дякую (кому?) тобі'', а не ''дякую
    (кого?) тебе''.'
- section: 'Комунікативні ситуації: огляд'
  points:
  - Короткий список ключових фраз для прохання, подяки, надання поради в магазині,
    на пошті, на вулиці.
vocabulary_hints:
  required:
  - мені (to me)
  - другові/другу (to a friend)
  - сестрі (to a sister)
  - допомагати (to help)
  - дякувати (to thank)
  - дзвонити (to call)
  - потрібно (it is necessary)
  - подобається (to like)
  - новий (new)
  - мій (my)
  - цей (this)
  - лист (letter)
  recommended:
  - заважати (to disturb)
  - радити (to advise)
  - пояснювати (to explain)
  - вік (age)
  - гарний (good, beautiful)
  - великий (big)
  - наш (our)
  - посилка (parcel)
activity_hints:
- type: comprehensive-test
  focus: Комплексна перевірка знань про давальний відмінок.
  config:
    quantity: 25
    subtasks:
    - type: multiple-choice
      items: 10
    - type: fill-in-the-blanks
      items: 10
    - type: error-correction
      items: 5
- type: short-text-creation
  focus: Застосування знань у зв'язному мовленні.
  config:
    quantity: 1
    prompt: Напишіть короткий текст (5-7 речень) про свого найкращого друга або подругу.
      Розкажіть, скільки йому/їй років, що йому/їй подобається, як ви йому/їй допомагаєте
      і за що ви йому/їй дякуєте.
- type: translation-challenge
  focus: Переклад складних речень з англійської на українську.
  config:
    quantity: 10
    sentences:
    - Please explain this rule to the new students.
    - I promised my younger sister to call her today.
    - This loud music is bothering our old neighbors.
- type: review-checklist
  focus: Самооцінка знань та навичок.
  config:
    quantity: 10
    items:
    - Я можу назвати всі особові займенники в давальному відмінку.
    - Я знаю, коли вживати закінчення -ові, а коли -у для іменників чоловічого роду.
    - Я можу сказати, скільки років моїм друзям і родичам.
sequence: 20
