module: a2-027
level: A2
sequence: 27
slug: real-conditions
version: '3.0'
title: Real Conditions
subtitle: 'Якщо будете вільні — заходьте!'
focus: grammar
pedagogy: PPP
phase: A2.2
word_target: 2000
objectives:
- Learner can form real conditional sentences using якщо + present or future tense
- Learner can distinguish якщо (if — condition) from коли (when — time)
- Learner can make polite requests and invitations with якщо
- Learner can use якщо in practical everyday scenarios (shopping, planning, travel)
sources:
- name: Ukrainian State Standard 2024 - Complex Sentences
  url: https://mon.gov.ua/
  type: reference
  notes: '§4.4.2: complex sentences with якщо required at A2'
content_outline:
- section: 'Вступ: Плани та умови (Introduction: Plans and Conditions)'
  words: 300
  points:
  - 'Natural entry point: everyday planning requires conditions — "Якщо буде гарна погода, підемо на прогулянку";
    learners already use "if" constantly in English, now they need the Ukrainian structure.'
  - 'Core pattern: якщо + present/future in the condition clause, present/future/imperative in the result clause.
    No past tense, no subjunctive — this is about real possibilities.'
  - 'Preview of the якщо vs коли distinction: both can translate English "if/when" but they are NOT interchangeable.'
- section: 'Якщо + теперішній/майбутній час (Якщо + Present/Future)'
  words: 475
  points:
  - 'Pattern 1 — General truths and habits: якщо + present + present. "Якщо йде дощ, я беру парасольку" (If it rains,
    I take an umbrella). The condition is repeatable and the result is habitual.'
  - 'Pattern 2 — Future plans: якщо + future + future. "Якщо матиму час, подзвоню тобі" (If I have time, I will call you).
    Both clauses use future tense for planned possibilities.'
  - 'Pattern 3 — Condition + imperative: якщо + present/future + imperative. "Якщо побачиш Олену, передай привіт"
    (If you see Olena, say hello). Common in instructions and requests.'
  - 'Word order flexibility: "Якщо хочеш, можемо піти" = "Можемо піти, якщо хочеш" — the якщо-clause can come first
    or second. Comma always separates the clauses.'
  - 'Learner error: using якщо with past tense for hypotheticals (*Якщо я мав гроші...) — this is a B1 construction
    (conditional mood). At A2, якщо is only for real, possible conditions.'
- section: 'Якщо vs коли: Умова чи час? (Якщо vs Коли: Condition or Time?)'
  words: 350
  points:
  - 'The core distinction: якщо = the outcome is uncertain (maybe yes, maybe no); коли = the outcome is certain, only
    the timing is unknown.'
  - 'Contrastive pair: "Якщо прийде Марко, підемо в кіно" (IF Marko comes — uncertain) vs "Коли прийде Марко, підемо
    в кіно" (WHEN Marko comes — certain he will come).'
  - 'English trap: English "when" and "if" overlap in contexts like "When/if you finish, call me" — Ukrainian forces
    the speaker to commit: is it certain or not?'
  - 'Quick diagnostic: Can you replace it with "у випадку, якщо" (in case)? → use якщо. Can you replace it with
    "у той момент, коли" (at the moment when)? → use коли.'
- section: 'Ввічливі прохання з якщо (Polite Requests with Якщо)'
  words: 350
  points:
  - 'Softening with якщо: "Якщо можна, покажіть мені це" (If possible, show me this) — якщо можна is the universal
    Ukrainian politeness opener for requests in shops, offices, and service settings.'
  - 'Common polite patterns: "Якщо вас не важко..." (If it is not difficult for you...); "Якщо ви не проти..." (If you
    do not mind...); "Якщо маєте час..." (If you have time...).'
  - 'Register awareness: якщо можна is neutral; якщо ласка is warmer/informal; будь ласка remains the default "please"
    — these are complementary, not competing forms.'
  - 'Service scenario practice: at a cafe, at a shop, at a ticket office — using якщо to make requests sound natural
    rather than demanding.'
- section: 'Діалоги та застосування (Dialogues and Application)'
  words: 325
  points:
  - 'Scenario 1 — Planning a weekend: friends discussing options using якщо for uncertain weather, availability, and
    preferences. "Якщо не буде дощу, поїдемо на пікнік. Якщо буде холодно, підемо в музей."'
  - 'Scenario 2 — Shopping conditions: "Якщо є знижка, візьму дві" (If there is a discount, I will take two); "Якщо
    не підходить розмір, можна поміняти?" (If the size does not fit, can I exchange it?).'
  - 'Scenario 3 — Travel planning: "Якщо рейс затримають, зателефоную" (If the flight is delayed, I will call);
    connecting to A1 travel vocabulary.'
- section: Практика (Practice)
  words: 200
  points:
  - 'Sentence completion: finish 15 sentences starting with "Якщо..." using appropriate tense in the result clause.'
  - 'Якщо vs коли choice: 12 sentences where learner must choose the correct conjunction based on certainty of the
    condition.'
  - 'Polite request transformation: rewrite 8 direct requests ("Покажіть мені") as polite якщо-requests
    ("Якщо можна, покажіть мені").'
vocabulary_hints:
  required:
  - 'якщо (if) — Very high frequency conjunction; triggers real conditions; collocations: якщо можна, якщо хочеш,
    якщо буде час'
  - 'коли (when) — Very high frequency; contrast with якщо; collocations: коли прийдеш, коли будеш готовий'
  - 'можна (it is possible/allowed) — High frequency; collocations: якщо можна, чи можна'
  - 'тоді (then) — High frequency; used in result clause; collocations: тоді підемо, тоді зателефоную'
  recommended:
  - 'знижка (discount) — Medium frequency; collocations: є знижка, отримати знижку'
  - 'поміняти (to exchange) — Medium frequency; collocations: поміняти розмір, поміняти товар'
  - 'затримати (to delay) — Medium frequency; collocations: рейс затримали, затримати відповідь'
  - 'проти (against) — High frequency; collocations: я не проти, ви не проти'
persona:
  voice: Encouraging Cultural Guide
  role: Practical Planner
