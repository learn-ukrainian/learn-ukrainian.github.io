module: a2-17
level: A2
sequence: 17
slug: possessive-sviy
version: '2.0'
title: Possessive Sviy
subtitle: The Reflexive Possessive Pronoun
content_outline:
- section: Introduction / Вступ
  points:
  - 'Concept of reflexive possessive (one''s own) — State Standard alignment: essential
    for A2 thematic descriptions of family, home, and identity (Standard §3: 930)'
  - 'The problem of ambiguity in English — introduce with the classic ''Petro and
    Ivan'' scenario to show how ''his'' can be ambiguous but ''свій'' is specific
    — illustrative ambiguity: does he love HIS (own) mother or HIS (friend''s) mother?'
- section: Presentation / Презентація
  points:
  - 'The Basic Rule: Subject = Possessor — use a decision-tree approach (Mermaid flowchart)
    to visualize the logic'
  - 'Contrastive examples: Він любить свою vs його маму — learner error: distinguishing
    subject''s own vs someone else''s possession (Common Error: Він любить його маму
    implies someone else''s mother)'
  - Declension table across genders and cases — note that 'свій' declines exactly
    like 'мій', building confidence (reuse pattern)
  - '1st/2nd person usage (optionality) — learner error: redundancy (tautology) when
    using ''свій'' with body parts or close family where possession is implied (e.g.,
    ''Я мию свої руки'')'
- section: Practice / Практика
  points:
  - 'Choosing ''свій'' vs ''його/її'' in context — cultural hook: the binary concept
    of ''Свій — Чужий'' (One''s Own vs Stranger) as a fundamental worldview — using
    ''свій'' correctly signals integration into the ''inner circle'''
  - Translation drills — focus on resolving English ambiguities into precise Ukrainian
    forms (e.g., 'He took his book' -> 'Він взяв свою книгу')
- section: Dialogues / Діалоги
  points:
  - 'Whose car is it? — cultural hook: idiom «У чужий монастир зі своїм статутом не
    ходять» (Don''t bring your own rules to a stranger''s monastery)'
  - Family relationships — use high-frequency collocations like 'своя сім'я', 'свій
    дім'
  - Error correction drills — target the 'scandalous' error of confusing 'свою дружину'
    (own wife) with 'його дружину' (his friend's wife)
vocabulary_hints:
  required:
  - 'свій (one''s own - m) — collocations: свій час (one''s time), свій дім (one''s
    home), у свій час (in due time)'
  - 'своя (one''s own - f) — collocation: своя сім''я (one''s family)'
  - 'своє (one''s own - n) — collocation: своє життя (one''s life)'
  - 'свої (one''s own - pl) — collocation: свої люди (one''s own people/kin)'
  - 'власний (own/private) — collocation: власна думка (own opinion), власний бізнес,
    власні назви (proper names)'
  - 'особистий (personal) — collocation: особисте життя (private life), особисті речі'
  - 'чужий (someone else''s/stranger''s) — antonym to ''свій''; collocation: чужі
    гроші (other people''s money), за чужий рахунок (at someone else''s expense)'
  - його (his) — contrast with свій when subject is 3rd person singular masculine
  - її (her) — contrast with своя/свій
  - їхній (their) — contrast with свої/свій
  - мій (my) — declines like свій
  - твій (your) — declines like свій
  - наш (our)
  - ваш (your pl./formal)
  - 'ділитися (to share) — collocation: ділитися своїм досвідом (share one''s experience)'
  recommended:
  - власне (precisely/actually)
  - самостійно (independently/on one's own)
  - 'спільний (shared/common) — collocation: спільна мова (common language)'
  - належати (to belong)
  - володіти (to own/possess)
