content_outline:
- section: 'Вступ: Світ через займенник «свій» (Introduction: The World through ''Sviy'')'
  words: 325
  points:
  - 'Alignment with State Standard §3 (930): Essential for A2 competency in describing one''s own family (своя сім’я), home
    (свій дім), city (своє місто), and country (рідна країна).'
  - 'The ''Petro and Ivan'' Ambiguity: Contrast English ''his'' with Ukrainian specificity — analyze how ''Він любить його
    маму'' (his friend''s mother) differs drastically from ''Він любить свою маму'' (his own mother).'
  - 'Establishing the identity hook: using ''свій'' as the primary tool for defining one''s immediate personal environment
    and circle of belonging.'
- section: 'Презентація: Правило «Суб’єкт = Власник» (Presentation: The Subject = Possessor Rule)'
  words: 550
  points:
  - 'The Core Logic: Subject-Possessor agreement — use a Mermaid flowchart to visualize the decision-tree for choosing ''свій''
    vs ''його/її/їхній'' in the 3rd person.'
  - 'Declension Mastery: Detailed table showing that ''свій'' declines exactly like ''мій/твій'' (building on A1 patterns)
    across all genders and cases, focusing on consistency to build learner confidence.'
  - 'Agreement in Practice: Drill high-frequency collocations from research — ''свій час'' (m), ''своя сім''я'' (f), ''своє
    життя'' (n), ''свої люди'' (pl).'
  - '1st and 2nd Person Usage: Explain the optionality in ''Я люблю мою/свою маму'' while noting that ''свій'' is more common
    and sounds more natural in neutral speech.'
- section: 'Культурний код: Свій — Чужий (Cultural Code: Own vs Stranger)'
  words: 400
  points:
  - 'The Fundamental Binary: Exploring ''Свій — Чужий'' as a worldview — how using ''свій'' correctly signals cultural integration
    into the ''inner circle'' and distinguishes the community from ''the stranger'' (чужий).'
  - 'Idiomatic Wisdom: Deep dive into «У чужий монастир зі своїм статутом не ходять» (Don''t bring your rules to a stranger''s
    monastery) — analyzing the contrast between ''свій'' and ''чужий'' in context.'
  - 'Sociolinguistic register: How ''свої люди'' (one''s own kin/people) functions as a marker of trust and social capital
    in Ukrainian culture.'
- section: 'Аналіз помилок: Уникнення тавтології та неясності (Error Analysis: Avoiding Tautology and Ambiguity)'
  words: 400
  points:
  - 'The Redundancy Trap (Tautology): Address the learner error of ''Я мию свої руки'' — explain that in Ukrainian, possessives
    for body parts and close family are often omitted when the subject is the possessor.'
  - 'The ''Scandalous'' Error Drill: Direct focus on the common 3rd person mismatch — contrasting ''Він обійняв свою дружину''
    (own wife) vs ''Він обійняв його дружину'' (someone else''s wife) to highlight social consequences of grammar errors.'
  - 'Contrastive vocabulary: Distinguishing ''свій'' from ''власний'' (private/exclusive ownership) and ''особистий'' (personal/private
    life) with examples like ''власна думка'' vs ''своя думка''.'
- section: Практичне застосування та підсумок (Practical Application and Summary)
  words: 325
  points:
  - 'Standard-Aligned Production: Guided writing task describing family, home, and city using ''свій'' to meet §3 (930) benchmarks.'
  - 'Interactive Resolution: Translation drills resolving English ambiguities (''He took his book'') into precise Ukrainian
    forms using the ''Subject=Possessor'' rule.'
  - 'Final synthesis: Review of ''свій'' as a declension twin to ''мій'' and its role as the linguistic bridge to A2 thematic
    descriptions.'
vocabulary_hints:
  required:
  - 'свій (one''s own - m) — high frequency (Top 100); collocations: свій час (in due time), свій дім, свій шлях'
  - 'своя (one''s own - f) — collocation: своя сім''я (A2 Standard §3: 930), своя справа (one''s business/affair)'
  - 'своє (one''s own - n) — collocation: своє життя, своє місто, своє ім''я'
  - 'свої (one''s own - pl) — collocation: свої люди (kin/trusted circle), свої речі (own things)'
  - 'власний (own/private) — collocation: власний будинок (private house), власна думка (own opinion), власні назви (proper
    names)'
  - 'особистий (personal) — collocation: особисте життя (private life), особистий блог, особисті речі'
  - 'чужий (someone else''s/stranger''s) — antonym to ''свій''; collocations: чужа дитина, чужі гроші, чужа країна'
  - його (his) — used for possession when the possessor is NOT the subject
  - її (her) — used for possession when the possessor is NOT the subject
  - їхній (their) — contrast with 'свої' when referring to 3rd person possession
  - мій (my) — declines exactly like 'свій'; used interchangeably with 'свій' in 1st person
  - твій (your) — declines like 'свій'; used interchangeably with 'свій' in 2nd person
  - 'ділитися (to share) — collocation: ділитися своїми думками (share one''s thoughts), ділитися своїм досвідом'
  recommended:
  - власне (precisely/actually) — filler word and intensifier
  - самостійно (independently/on one's own) — related to personal agency
  - 'спільний (shared/common) — collocation: спільна мова (common language), спільна власність'
  - належати (to belong) — governing the dative case (кому?)
  - володіти (to own/possess) — governing the instrumental case (чим?)
