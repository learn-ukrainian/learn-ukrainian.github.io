module: a2-054
level: A2
sequence: 54
slug: comparison
version: 1.1.3
title: Більше, краще, найкраще
subtitle: Ступені порівняння прикметників та прислівників
focus: grammar
pedagogy: PPP
phase: A2.8 [Удосконалення та завершення]
word_target: 2000
objectives:
- Вміти утворювати вищий ступінь порівняння прикметників, використовуючи як просту (-ший), так і складену (більш) форми.
- Вміти утворювати найвищий ступінь порівняння за допомогою префікса най- (найсолодший) та складеної форми (найбільш солодкий).
- Правильно використовувати суплетивні форми ступенів порівняння (великий → більший, добрий → кращий, поганий → гірший, малий → менший).
- Вміти будувати конструкції зі словами «ніж» та «за» + знахідний відмінок для порівняння двох об'єктів.
dialogue_situations:
- setting: 'Вибір нового телефону — порівняння моделей у магазині: Цей телефон (m) більший, але дорожчий. Той дешевший, але менший. Який найкращий? Найкращий — той, що має найбільший екран.'
  speakers:
  - Покупець
  - Консультант
  motivation: 'Ступені порівняння: більший, дорожчий, найкращий зі словами телефон (m), екран (m)'
content_outline:
- section: Вищий ступінь порівняння
  words: 650
  points:
  - 'Проста форма: додаємо суфікси -ший/-іший до основи (солодкий → солодший, цікавий → цікавіший). Чергування приголосних: г→ж, к→ч, х→ш (дорогий → дорожчий).'
  - 'Складена форма: більш/менш + прикметник у початковій формі (більш солодкий, менш відомий). Коли варто надавати перевагу складеній формі перед простою.'
  - 'Конструкції для порівняння: ніж + називний відмінок (Київ більший, ніж Львів) та за + знахідний відмінок (Київ більший за Львів). Обидва варіанти правильні та взаємозамінні.'
  - 'Діалогічна практика: порівняння їжі, міст, пір року — що краще, більше, цікавіше?'
- section: Найвищий ступінь порівняння
  words: 500
  points:
  - 'Проста форма найвищого ступеня: додаємо префікс най- до форми вищого ступеня (найсолодший, найцікавіший, найдорожчий).'
  - 'Складена форма найвищого ступеня: найбільш/найменш + прикметник у початковій формі (найбільш популярний, найменш відомий).'
  - 'Використання в контексті: Яке місто найбільше в Україні? Хто найкращий футболіст? Яка пора року найгарніша?'
- section: 'Особливі форми: більший, кращий, гірший'
  words: 450
  points:
  - 'Суплетивні форми, які потрібно запам''ятати: великий → більший → найбільший, малий → менший → найменший, добрий → кращий → найкращий, поганий → гірший → найгірший, гарний → кращий/гарніший.'
  - 'Поширені форми вищого ступеня прислівників: добре → краще, погано → гірше, багато → більше, мало → менше.'
  - 'Типові помилки: *більш кращий (подвійне порівняння) — пояснення, чому це неправильно.'
- section: Порівняння у повсякденному житті
  words: 400
  points:
  - 'Діалог: двоє друзів обговорюють, куди краще поїхати у відпустку — порівняння цін, погоди, їжі, розваг.'
  - 'Практика читання: короткий текст із рейтингом українських міст за розміром, кількістю населення та красою.'
  - 'Корисні фрази: набагато кращий, трохи більший, значно цікавіший.'
- section: Підсумок
  words: 200
  points:
  - 'Ступені порівняння утворюються простою (солодший, найсолодший) або складеною (більш солодкий, найбільш солодкий) формою. Слід запам''ятати ключові винятки: добрий → кращий, поганий → гірший, великий → більший, малий → менший. Ніколи не можна змішувати просту і складену форми (наприклад, *більш кращий).'
  - "Самоперевірка: Як сказати «Київ більший за Львів» використовуючи як «ніж», так і «за»? Порівняйте 3 відомих вам міста, використовуючи прикметники вищого та найвищого ступенів порівняння. Які форми вищого та найвищого ступеня у слів «добрий» та «поганий»?"
vocabulary_hints:
  required:
  - порівняння (comparison)
  - більший (bigger)
  - менший (smaller)
  - кращий (better)
  - гірший (worse)
  - найкращий (the best)
  - найбільший (the biggest)
  - солодший (sweeter)
  - цікавіший (more interesting)
  - ніж (than)
  recommended:
  - набагато (much, significantly)
  - трохи (a little, slightly)
  - значно (considerably)
  - навпаки (on the contrary)
activity_hints:
- type: fill-in
  focus: Утворити вищий ступінь від початкової форми прикметника
  items: 8
- type: quiz
  focus: Обрати правильну суплетивну форму (більший, кращий, гірший)
  items: 8
- type: match-up
  focus: Зіставити прикметник із його формою найвищого ступеня
  items: 8
- type: true-false
  focus: Визначити правильні та неправильні конструкції порівняння
  items: 8
- type: error-correction
  focus: 'Знайти та виправити неправильні форми вищого і найвищого ступенів (наприклад, *більш кращий → кращий, *гарніший → кращий/гарніший)'
  items: 6
