vocabulary_hints:
  required:
  - 'щоб (in order to) — High frequency; collocations: «Я хочу, щоб...», «Він пішов,
    щоб...»'
  - 'для (for) — High frequency; usage with nouns only; collocations: «для тебе»,
    «для роботи», «для здоров''я»'
  - 'аби (so that / if only) — Medium frequency; informal; collocations: «аби тільки»,
    «аби не спізнитися»'
  - 'мета (goal / purpose) — Medium frequency; collocations: «моя мета», «з метою»
    (formal)'
