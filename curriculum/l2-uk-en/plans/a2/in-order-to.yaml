vocabulary_hints:
  required:
  - 'щоб (in order to) — High frequency (Top 100); used for purpose clauses; collocations:
    «Я хочу, щоб...», «Він пішов, щоб...», «Для того, щоб...»'
  - 'для (for) — High frequency (Top 50); usage strictly with nouns/pronouns in Genitive;
    collocations: «для тебе», «для роботи», «для здоров''я»'
  - 'аби (so that / if only) — Medium frequency; informal/spoken register; often implies
    ''just so that'' or ''if only''; collocation: «аби не спізнитися»'
  - 'мета (goal / purpose) — Medium frequency; used in planning; collocations: «моя
    мета», «з метою» (formal/official style)'
word_target: 3000
