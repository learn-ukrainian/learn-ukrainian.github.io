slug: in-order-to
version: '2.0'
title: In Order To
subtitle: Expressing Purpose with Щоб
content_outline:
- section: Introduction / Вступ
  points:
  - 'The logic of intentionality — State Standard §4.4.2: expressing purpose with
    «щоб»; example: «Ми вчимо українську мову, щоб розмовляти з друзями»'
  - 'Why ''Purpose'' requires a specific grammar bridge — Common Learner Error: Omitting
    the comma before «щоб» in purpose clauses'
- section: Presentation / Презентація
  points:
  - 'Same Subject Logic: Щоб + Infinitive — Common Learner Error: The «For To» Calque
    (using «для» + infinitive instead of «щоб», e.g., «Я йду для купити» vs «Я йду,
    щоб купити»)'
  - 'Different Subject Logic: Щоб + Past Tense (The Subjunctive twist) — Common Learner
    Error: Subject Mismatch (using infinitive when subject changes, e.g., «Я хочу
    тебе читати» vs «Я хочу, щоб ти читав»); Visual Logic: «Is the doer the same?»
    → NO (Past Tense)'
  - 'Formal Emphasis: Для того щоб — Register Check: Emphatic/Formal usage, builds
    to C1 Stylistics'
  - 'Gentle Purpose: Аби — Register Check: Informal/Spoken, implies «just so that»
    or «if only» (e.g., «аби не спізнитися»)'
  - 'Purpose with Nouns: Для + Genitive — Reinforces Genitive case usage (§4.2.2.2.2);
    distinction from «щоб» clauses'
  - 'Wishes as Commands: Щоб ти був здоровий! — Cultural Hook: The «Щоб» Toast Culture
    (e.g., «Щоб їлося і пилося, щоб хотілося і моглося!»)'
- section: Practice / Практика
  points:
  - Subject-shifting drills — Use a clear flowchart/decision tree logic
  - 'Planning an event with diverse goals — Cultural Hook: Proverb «На те коня кують,
    щоб не спотикався.» (illustrates planning)'
- section: Dialogues / Діалоги
  points:
  - 'Discussing career goals, travel plans, or helping a colleague — integrate high-frequency
    collocations: «Я хочу, щоб...», «Для того, щоб...»'
focus: grammar
pedagogy: PPP
objectives:
- Learner can express purpose using щоб + infinitive (same subject)
- Learner can express purpose using щоб + past tense (different subjects)
- Learner can distinguish between щоб and тому що
- Learner can use для того щоб for emphasis
grammar:
- щоб + infinitive
- щоб + past tense
- для того щоб
- purpose clauses
- complex sentences
