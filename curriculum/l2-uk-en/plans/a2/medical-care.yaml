module: a2-59
level: A2
sequence: 59
slug: medical-care
version: '2.0'
title: Medical Care
subtitle: Doctor Consultations, Diagnosis & Prescriptions
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - From symptoms to consultation — builds on a2-34 (body parts, боліти) and a2-55
    (wellness, healthcare system); aligns with State Standard §3.12 regarding health
    communication and expressing physical states.
  - 'Cultural hook: mandatory use of «бахіли» (blue plastic shoe covers) in clinics;
    entering a doctor''s office in street shoes is a serious social faux pas.'
  - The «декларація з лікарем» system — brief overview of the Ukrainian family doctor
    model.
- section: Запис до лікаря (Making an Appointment)
  words: 600
  points:
  - Booking procedures — «записатися на прийом» via phone or online; focus on Helsi.me
    as the primary national appointment platform.
  - Emergency vs. Routine — when to call «швидка допомогу» (103) versus «викликати
    лікаря додому» (calling a doctor home).
  - Register and etiquette — the necessity of formal register (Ви) when speaking to
    medical staff and receptionists.
- section: На прийомі у лікаря (At the Consultation)
  words: 1000
  points:
  - Doctor's opening questions — «Що вас турбує?», «Де болить?», «Як давно?»; drill
    the strictly formal «Ви» address.
  - Describing symptoms — focus on the standard A2 pattern «У мене болить [Nominative]»
    (e.g., голова, горло, живіт).
  - 'Learner error: drill the difference between English transitive ''I hurt my head''
    and Ukrainian intransitive «У мене болить голова»; correct the common error «Я
    болю голову».'
  - 'Physical examination commands — using medical imperatives: «дихайте / не дихайте»,
    «відкрийте рот», «покажіть язик».'
  - 'Expressing general states — using the Dative case for experiencers: «Мені погано»,
    «Мені краще» (ref: §4.2.2.3).'
  - Measurement and testing — «міряти температуру», «вимірювати тиск», «здати аналізи»
    (blood/urine tests).
- section: Діагноз та лікування (Diagnosis and Treatment)
  words: 600
  points:
  - 'Understanding the diagnosis — «поставити діагноз», «підтвердити діагноз»; vocabulary
    for common ailments: «застуда», «грип», «отруєння».'
  - 'False Friend ''Angina'' — explicit correction: «ангіна» = tonsillitis/strep throat,
    NOT a heart attack (серцевий напад).'
  - 'Prescriptions and dosage — «виписати рецепт», «приймати ліки»; learner error:
    «рецепт» (prescription) vs. «чек» (receipt/proof of payment).'
  - Usage instructions — frequency (двічі/тричі на день) and timing relative to meals
    (до/після їжі).
- section: Підсумок та народні засоби (Summary and Folk Remedies)
  words: 400
  points:
  - Sick leave procedures — «взяти лікарняний», «бути на лікарняному»; the bureaucratic
    importance of the sick leave certificate.
  - 'Cultural hook: «Народна медицина» — how Ukrainians treat minor colds at home
    first with tea with viburnum (калина), raspberry jam (малина), or honey.'
  - Narrative summary — a complete story from feeling the first symptoms and wearing
    «бахіли» to receiving a «рецепт» and recovering with tea.
focus: practical
pedagogy: PPP
prerequisites:
- a2-58 (Practical Warm-up)
connects_to:
- a2-60 (At the Pharmacy)
objectives:
- Learner can make a doctor's appointment
- Learner can describe symptoms to a doctor using formal register
- Learner can understand diagnosis and medical advice
- Learner can handle prescriptions and sick leave
grammar:
- formal medical register (Ви-form throughout)
- medical imperatives (дихайте, відкрийте)
- describing medical history (past tense + temporal markers)
- prescription language (приймати + frequency)
