module: a2-59
level: A2
sequence: 59
slug: medical-care
version: '2.0'
title: Medical Care
subtitle: Doctor Consultations, Diagnosis & Prescriptions
content_outline:
- section: Introduction / Вступ
  points:
  - 'From symptoms to consultation — builds on a2-34 (body parts, боліти) and a2-55
    (wellness, healthcare system); now: full doctor visit from start to finish'
  - 'Cultural hook: mandatory use of «бахіли» (shoe covers) in clinics; the
    «декларація з лікарем» system'
- section: Запис до лікаря
  points:
  - 'Making appointments — записатися до лікаря (online/phone), вибрати час прийому;
    cultural note: Helsi.me as the main appointment platform'
  - 'Calling a doctor home — викликати лікаря додому; when to call швидку допомогу;
    learner error: «ангіна» = tonsillitis (not heart attack!)'
- section: На прийомі у лікаря
  points:
  - 'Doctor''s questions — formal «Ви» strictly required; «Що вас турбує?», «Де
    болить?», «Як давно?»; learner error: using «ти» with a doctor'
  - 'Patient''s answers — describing medical history: «У мене алергія на...»,
    «Я приймаю ліки від...», «Це почалося вчора»'
  - 'Physical examination — дихайте/не дихайте, відкрийте рот, покажіть язик;
    standard ref: §4.2.3.2 imperative forms'
  - 'Measurement vocabulary — міряти температуру, вимірювати тиск, зважитися;
    collocations: нормальний тиск, підвищена температура'
- section: Діагноз і лікування
  points:
  - 'Understanding the diagnosis — діагноз, застуда, грип, ангіна, отруєння;
    collocations: поставити діагноз, підтвердити діагноз'
  - 'Prescriptions — виписати рецепт, приймати ліки; learner error: рецепт
    (prescription) ≠ чек (receipt); dosage: двічі/тричі на день, до/після їжі'
  - 'Sick leave — лікарняний (sick leave certificate), взяти лікарняний;
    cultural note: the bureaucratic process of getting лікарняний'
- section: Practice / Практика
  points:
  - Full consultation role-play — from greeting to diagnosis to prescription
  - 'Calling to make an appointment — phone dialogue with receptionist'
- section: Narrative / Розповідь
  points:
  - 'Story of a doctor visit — complete narrative from feeling sick to recovery;
    integrates all vocabulary from the module'
focus: practical
pedagogy: PPP
prerequisites:
- a2-58 (Practical Warm-up)
connects_to:
- a2-60 (At the Pharmacy)
objectives:
- Learner can make a doctor's appointment
- Learner can describe symptoms to a doctor using formal register
- Learner can understand diagnosis and medical advice
- Learner can handle prescriptions and sick leave
grammar:
- formal medical register (Ви-form throughout)
- medical imperatives (дихайте, відкрийте)
- describing medical history (past tense + temporal markers)
- prescription language (приймати + frequency)
module_type: practical
sources:
- name: Ukrainian State Standard 2024 - Health Communication
  url: https://mon.gov.ua/
  type: reference
  notes: Standards for medical consultation and formal health communication at A2
register: розмовний
immersion: 75-90% Ukrainian
phase: A2.6 [Practical]
persona:
  voice: Encouraging Cultural Guide
  role: Emergency Dispatcher
vocabulary_hints:
  required:
  - лікар (doctor) — сімейний лікар, записатися до лікаря, викликати лікаря
  - пацієнт (patient) — огляд пацієнта, скарги пацієнта, картка пацієнта
  - 'рецепт (prescription) — виписати рецепт, рецепт на ліки; learner error: ≠ чек
    (receipt)'
  - діагноз (diagnosis) — поставити діагноз, підтвердити діагноз
  - лікарняний (sick leave) — взяти лікарняний, бути на лікарняному
  - приймати (to take [medicine]) — приймати ліки двічі на день, до/після їжі
  - прийом (appointment/consultation) — час прийому, на прийомі у лікаря
  recommended:
  - алергія (allergy) — алергія на пилок, алергічна реакція
  - тиск (blood pressure) — вимірювати тиск, підвищений тиск
  - аналіз (test/analysis) — здати аналізи, аналіз крові
  - направлення (referral) — направлення до спеціаліста
  - застуда (cold) — застудитися, лікувати застуду
  - отруєння (poisoning) — харчове отруєння
