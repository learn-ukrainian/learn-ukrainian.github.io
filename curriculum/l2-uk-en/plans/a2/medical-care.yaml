vocabulary_hints:
  required:
  - лікар (doctor) — сімейний лікар, записатися до лікаря, викликати лікаря; High
    frequency
  - пацієнт (patient) — огляд пацієнта, скарги пацієнта, картка пацієнта; High frequency
  - 'боліти (to hurt) — Що у вас болить?, У мене болить голова; Note: intransitive
    usage'
  - температура (temperature/fever) — міряти температуру, висока температура, у мене
    температура; High frequency
  - 'рецепт (prescription) — виписати рецепт, рецепт на ліки; Learner error: ≠ чек
    (receipt); Medium frequency'
  - діагноз (diagnosis) — поставити діагноз, підтвердити діагноз; Medium frequency
  - лікарняний (sick leave certificate) — взяти лікарняний, бути на лікарняному; Essential
    for work context
  - приймати (to take [medicine]) — приймати ліки двічі на день, до/після їжі; High
    frequency collocations
  - прийом (appointment/consultation) — записатися на прийом, час прийому, на прийомі
    у лікаря
  recommended:
  - бахіли (shoe covers) — одягнути бахіли; Essential cultural hygiene requirement
  - тиск (blood pressure) — вимірювати тиск, високий/низький тиск; §3.12 State Standard
  - аналіз (test/analysis) — здати аналізи, аналіз крові, результати аналізів
  - направлення (referral) — направлення до спеціаліста, дати направлення
  - застуда (cold) — застудитися, лікувати застуду, симптоми застуди
  - отруєння (poisoning) — харчове отруєння, легке отруєння
  - алергія (allergy) — алергія на пилок, алергічна реакція, у мене алергія на...
  - 'ангіна (tonsillitis) — хворіти на ангіну; False friend alert: ≠ heart attack'
  - калина (viburnum) — чай з калиною; Cultural folk medicine reference
