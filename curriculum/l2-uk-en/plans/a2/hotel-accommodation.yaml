module: a2-064
level: A2
sequence: 64
slug: hotel-accommodation
version: '2.0'
title: Hotel Accommodation
subtitle: Checking In and Out
focus: practical
pedagogy: PPP
phase: A2.6 [Practical]
word_target: 3000
objectives:
- Learner can book a hotel room
- Learner can check in and check out
- Learner can ask for amenities
- Learner can resolve common hotel issues
content_outline:
- section: 'Вступ: Готелі в Україні (Introduction: Hotels in Ukraine)'
  words: 500
  points:
  - 'Introduction to accommodation types based on State Standard §3.2: «Дім, помешкання... резервування кімнати в готелі»'
  - 'Lexical distinction: Explain the learner error of using «кімната» (room in a house) vs the correct term «номер» (hotel
    room)'
  - 'Gender agreement drill: «Номер» is masculine; emphasize correct agreement «це гарний номер» vs incorrect «це гарна номер»'
  - Establishing the formal «Ви» address as the standard for all interactions with hotel staff and administration
- section: Бронювання та заселення (Booking and Check-in)
  words: 800
  points:
  - 'Booking process: Distinguish between «бронювати» (imperfective/process) and «забронювати» (perfective/result) with online
    booking examples'
  - 'Room types and collocations: «одномісний/двомісний номер», «номер люкс», and «ключ від номера»'
  - 'Cultural Hook (Passport Control): Explain that Ukrainian law strictly requires an original passport for *every* guest
    at check-in, not just a credit card'
  - 'Check-in procedure: Vocabulary for «заселення» (check-in), «час заселення» (check-in time), and «реєстрація» (registration)'
- section: Послуги та зручності (Amenities and Services)
  words: 700
  points:
  - 'Interrogative Syntax (§4.4.1.2): Practical application for asking questions such as «Сніданок включено?» (Is breakfast
    included?) and «Чи є Wi-Fi?»'
  - 'Grammar Drill (Location vs Direction): Correcting the learner error «Я в готель» (Accusative/Direction) vs the required
    «Я у готелі» (Locative/Location)'
  - 'Essential items: Collocations for requesting items like «рушник», «мило», «шампунь» and services like «прибирання»'
- section: Проблеми та розрахунок (Problems and Payment)
  words: 600
  points:
  - 'Resolving issues: Using the phrase «на стійці адміністратора» and «запитати адміністратора» to handle common complaints'
  - 'Cultural Hook (Tourist Tax): Explaining «туристичний збір» (tourist tax) as a municipal fee often added separately to
    the bill'
  - 'Check-out process: Vocabulary for «виселення» (check-out), «час виселення», and «оплатити рахунок» (pay the bill)'
- section: 'Практика: Проживання в готелі (Practice: Hotel Stay)'
  words: 400
  points:
  - 'Check-in simulation: Dialogue incorporating the formal passport request and clarification of the room number'
  - 'Problem-solving drill: Requesting amenities or resolving a minor issue while maintaining the formal «Ви» register'
  - Final review of interrogative patterns for hotel-specific inquiries
vocabulary_hints:
  required:
  - готель (ч) — у готелі (Locative), п'ятизірковий готель, забронювати готель; High frequency
  - 'номер (ч) — одномісний/двомісний номер, номер люкс, забронювати номер; note: masculine gender (гарний номер)'
  - бронювати (недок) / забронювати (док) — бронювати онлайн, забронювати номер; pair distinction (process vs completed)
  - заселення (с) — час заселення, пізнє заселення; registration process
  - виселення (с) — час виселення, до виселення; check-out process
  - ключ (ч) — ключ від номера; masculine noun
  - адміністратор (ч) — запитати адміністратора, на стійці адміністратора; receptionist
  - рахунок (ч) — оплатити рахунок, туристичний збір (tourist tax); bill and mandatory fees
  recommended:
  - одномісний (прикм) — одномісний номер; single room
  - двомісний (прикм) — двомісний номер; double room
  - сніданок (ч) — сніданок включено?; interrogative usage
  - рушник (ч) — попросити рушник; towel
  - прибирання (с) — замовити прибирання; cleaning service
  - кондиціонер (ч) — чи працює кондиціонер?; air conditioning
