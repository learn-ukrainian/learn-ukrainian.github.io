module: a2-066
level: A2
sequence: 66
slug: metalanguage-syntax-cases
version: '3.1'
title: "Синтаксис і відмінки"
subtitle: "Речення, його члени і словникова грамотність"
focus: syntax-cases
pedagogy: PPP
phase: "A2.9 [Metalanguage Bridge & Foundation]"
word_target: 2000  # A2.9 metalanguage bridge — aligned with 3 sibling plans at 2000 (user decision 2026-04-20). Minimum only; content may overshoot.
objectives:
  - "Learner can identify the граматична основа (підмет + присудок) of a Ukrainian
    sentence and name all five members of a sentence in Ukrainian"
  - "Learner can distinguish просте речення from складне речення and identify the
    types of зв'язок between parts of a складне речення (сполучниковий, безсполучниковий)"
  - "Learner can name all seven Ukrainian відмінки and their питання, and use this
    knowledge to parse dictionary entries and grammar explanations"
  - "Learner can analyze a словосполучення by identifying the головне слово and залежне
    слово and the type of зв'язок between them"
  - "Learner can read Ukrainian grammar reference materials (dictionary entries, textbook
    rules) that use syntactic and case terminology"
dialogue_situations:
  - setting: Ukrainian grammar tutoring session — the tutor explains sentence 
      structure using підмет (m, subject), присудок (m, predicate), додаток (m, 
      object), означення (n, attribute), обставина (f, adverbial). They parse a 
      newspaper sentence together.
    speakers:
      - Репетитор (tutor)
      - Студент-іноземець
    motivation: 'Syntax terminology: підмет, присудок, додаток; case names: називний,
      родовий, давальний'
content_outline:
  - section: "Що вивчають синтаксис і пунктуація?"
    words: 500
    points:
      - "Bridge introduction: learners already BUILD Ukrainian sentences from A1-A2.
        This module teaches them to NAME the structures they use. The shift: from
        'subject' to підмет, from 'object' to додаток, from 'complex sentence' to
        складне речення."
      - "Core definitions from Заболотний Grade 5 p.151: Синтаксис (від грец. syntaxis
        — побудова, поєднання) — це розділ мовознавства, що вивчає словосполучення
        і речення. Пунктуація (від лат. punctum — крапка) — це розділ мовознавства,
        що вивчає правила вживання розділових знаків. These two are inseparable: синтаксис
        is the structure, пунктуація is how we mark it in writing."
      - "Why this matters for B1: every grammar rule from Phase 2 onward is explained
        using syntactic terms. 'Додаток у родовому відмінку' requires knowing both
        додаток and родовий відмінок. Dictionary literacy also depends on case terminology."
  - section: "Словосполучення"
    words: 550
    points:
      - "From Заболотний Grade 5 p.151: Словосполучення — поєднання двох і більше
        слів, пов'язаних за змістом і граматично: осіннє небо, читати книжку, дуже
        швидко. Every словосполучення has a головне слово (main word) and a залежне
        слово (dependent word)."
      - "From Авраменко Grade 5 p.144: The залежне слово answers a question posed
        from the головне слово: небо (яке?) осіннє. читати (що?) книжку. швидко (як?)
        дуже. Direction of the arrow: головне → (питання?) → залежне."
      - "What is NOT a словосполучення: — підмет + присудок (це граматична основа,
        not a словосполучення). — слова з прийменником alone (на столі is part of
        a larger unit). This distinction matters for sentence analysis at B1+."
      - "Practice: learners extract словосполучення from sentences, mark головне/залежне
        слова, and write the question between them."
  - section: "Граматична основа: підмет і присудок"
    words: 650
    points:
      - "From Заболотний Grade 5 p.160: Підмет — головний член речення, що називає
        особу або предмет, про який ідеться в реченні. Відповідає на питання хто?
        що? Підмет найчастіше виражено іменником або займенником у називному відмінку.
        Підкреслюємо однією рискою: ______."
      - "From Голуб Grade 5 p.108: Присудок — головний член речення, що означає дію,
        стан чи ознаку підмета. Відповідає на питання що робить? який він є? хто він
        такий? Присудок найчастіше виражено дієсловом. Підкреслюємо двома рисками:
        ======."
      - "Special case — тире між підметом і присудком (Голуб Grade 5 p.108): If both
        підмет and присудок are іменники in називний відмінок, we put тире between
        them: Життя — це виклик. Знання — сила. Київ — столиця України."
      - "How to find the підмет (Заболотний Grade 5 p.160): Ask: ХТО чи ЩО виконує
        дію? Вітер хилить клени. (Хто хилить? — Вітер = підмет.) Клени хиляються від
        вітру. (Що хиляється? — Клени = підмет.) The same word can be підмет or додаток
        depending on its role."
  - section: "Другорядні члени речення"
    words: 700
    points:
      - "From Заболотний Grade 5 p.168: Додаток — другорядний член речення, який називає
        предмет і відповідає на питання будь-якого відмінка, крім називного: кого?
        чого? кому? чому? кого? що? ким? чим? на кому? на чому? Даруйте людям (кому?)
        радість (що?). Підкреслюємо пунктиром: - - - -."
      - "From Авраменко Grade 5 p.159: Означення — другорядний член речення, що вказує
        на ознаку предмета й відповідає на питання який? яка? яке? які? чий? чия?
        чиє? чиї? Наш (чий?) двір прикрашає лелече (яке?) гніздо. Підкреслюємо хвилястою
        лінією: ~~~~~~."
      - "From Заболотний Grade 5 p.174: Обставина — другорядний член речення, який
        називає спосіб дії або її місце, час, причину, мету. Відповідає на питання
        як? де? куди? звідки? коли? чому? навіщо? Улітку (коли?) гриби краще шукати
        в затінку (де?) дерев. Підкреслюємо пунктиром з крапкою: -.-.-.-."
      - "Summary table of all five sentence members with their questions, typical
        parts of speech, and underlining patterns. Practice: learners perform повний
        розбір речення — find граматична основа, then identify кожен другорядний член
        and its type."
  - section: "Складне речення"
    words: 550
    points:
      - "From Литвінова Grade 5 p.232: Просте речення has one граматична основа. Складне
        речення has two or more граматичні основи: Синіє ласкаве небо, і знов курличуть
        журавлі. (1-ша основа: небо синіє; 2-га: журавлі курличуть.)"
      - "Types of зв'язок (Заболотний Grade 5 p.197): Безсполучниковий — parts joined
        by інтонація only, no сполучник: На гнізда повернулися лелеки, птахів зігріла
        рідна сторона. Сполучниковий — parts joined by сполучники or сполучні слова:
        Весна зупинилась над кручею, і плачуть оселі."
      - "From Голуб Grade 5 p.132: Key сполучники that join parts of складне речення:
        і (й), та, але, проте, зате, однак — єднальні та протиставні. що, щоб, бо,
        тому що — підрядні. Сполучні слова: хто, що, який, чий, котрий, де, коли,
        як, куди. At B1 level: recognize these structures, name them. Phase 8 will
        teach their systematic classification."
      - "Punctuation rule preview: кома between parts of складне речення. This is
        the most common punctuation challenge for B1 learners."
  - section: "Відмінки: система і питання"
    words: 650
    points:
      - "The seven Ukrainian відмінки — the learner's toolkit for dictionary literacy:
        Називний (Н.в.) — хто? що? — the naming case (підмет). Родовий (Р.в.) — кого?
        чого? — possession, absence, partitive. Давальний (Д.в.) — кому? чому? — recipient,
        experiencer. Знахідний (Зн.в.) — кого? що? — direct object of action. Орудний
        (О.в.) — ким? чим? — instrument, accompaniment. Місцевий (М.в.) — на кому?
        на чому? — location (always with preposition). Кличний (Кл.в.) — used for
        direct address: Тарасе! Маріє! Друже!"
      - "Why відмінки matter for dictionary literacy: Ukrainian dictionaries and grammar
        references list forms by відмінок. A table that says 'Р.в. однини: -а/-я'
        is incomprehensible without knowing the system. Grammar rules like 'після
        дієслова вживаємо Зн.в.' require this vocabulary."
      - "Відмінкові питання as a diagnostic tool: To determine which відмінок a word
        is in, ask the question. Я бачу (кого? що?) книжку — Зн.в. Я цікавлюся (ким?
        чим?) книжкою — О.в. Я розповідаю (кому? чому?) другові — Д.в. Practice: learners
        determine the відмінок of highlighted words in sentences."
  - section: "Підсумок: ваш синтаксичний словник"
    words: 400
    points:
      - "Complete metalanguage glossary — all terms from this module collected: синтаксис,
        пунктуація, словосполучення, головне слово, залежне слово, речення, граматична
        основа, підмет, присудок, додаток, означення, обставина, другорядний член,
        просте речення, складне речення, сполучниковий зв'язок, безсполучниковий зв'язок,
        сполучник, сполучне слово, називний, родовий, давальний, знахідний, орудний,
        місцевий, кличний."
      - "Self-check in Ukrainian: Дайте відповіді на запитання: 1. Що таке граматична
        основа речення? 2. Назвіть три другорядні члени речення та їхні питання. 3.
        Чим просте речення відрізняється від складного? 4. Назвіть сім відмінків і
        їхні питання. 5. Визначте підмет, присудок і другорядні члени: Уранці діти
        радісно бігли до школи."
      - "Preview of next module: Минуле і теперішнє — full Ukrainian immersion review
        of verb tenses. The metalanguage bridge is complete: you now have the vocabulary
        to understand Ukrainian grammar explanations in Ukrainian."
vocabulary_hints:
  required:
    - "синтаксис (syntax — the study of sentence structure)"
    - "пунктуація (punctuation — rules for using punctuation marks)"
    - "словосполучення (word combination — two+ words linked by meaning and grammar)"
    - "підмет (subject — main sentence member naming who/what acts)"
    - "присудок (predicate — main sentence member naming the action/state)"
    - "додаток (object — secondary member answering indirect case questions)"
    - "означення (attribute — secondary member answering який? чий?)"
    - "обставина (adverbial — secondary member answering як? де? коли?)"
    - "складне речення (complex sentence — sentence with two+ grammatical cores)"
    - "просте речення (simple sentence — sentence with one grammatical core)"
    - "називний відмінок (nominative case — хто? що?)"
    - "родовий відмінок (genitive case — кого? чого?)"
    - "давальний відмінок (dative case — кому? чому?)"
    - "знахідний відмінок (accusative case — кого? що?)"
    - "орудний відмінок (instrumental case — ким? чим?)"
    - "місцевий відмінок (locative case — на кому? на чому?)"
  recommended:
    - "граматична основа (grammatical core — підмет + присудок together)"
    - "головне слово (main word — the governing word in a word combination)"
    - "залежне слово (dependent word — governed by the main word)"
    - "другорядний член (secondary member — додаток, означення, or обставина)"
    - "кличний відмінок (vocative case — used for direct address)"
    - "сполучник (conjunction — connects parts of a compound/complex sentence)"
    - "сполучне слово (connective word — pronoun/adverb linking clause parts)"
    - "безсполучниковий зв'язок (asyndetic connection — without a conjunction)"
    - "сполучниковий зв'язок (syndetic connection — with a conjunction)"
    - "розділовий знак (punctuation mark — кома, крапка, тире, etc.)"
activity_hints:
  - type: quiz
    focus: "Identify sentence members: підмет, присудок, додаток, означення, or обставина?"
    items: 8
  - type: match-up
    focus: "Match відмінки to their питання (Р.в. — кого? чого?, Д.в. — кому? чому?,
      etc.)"
    items: 7
  - type: fill-in
    focus: "Determine the відмінок of highlighted words in sentences by asking the
      right question"
    items: 8
  - type: group-sort
    focus: "Sort sentences into просте речення vs складне речення"
    items: 8
  - type: mark-the-words
    focus: "In a passage, mark the граматична основа (підмет + присудок) of each clause"
    items: 6
  - type: error-correction
    focus: "Find and fix punctuation errors in складні речення (missing or misplaced
      коми)"
    items: 6
