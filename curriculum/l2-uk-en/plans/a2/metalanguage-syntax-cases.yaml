module: a2-066
level: A2
sequence: 66
slug: metalanguage-syntax-cases
version: '3.1.2'
title: Синтаксис і відмінки
subtitle: Речення, його члени і словникова грамотність
focus: syntax-cases
pedagogy: PPP
phase: 'A2.9 [Метамова: місток та основи]'
word_target: 2000
objectives:
  - Студент вміє визначати граматичну основу (підмет + присудок) українського речення та називати всі п'ять членів речення українською мовою.
  - Студент вміє відрізняти просте речення від складного речення і визначати типи зв'язку між частинами складного речення (сполучниковий, безсполучниковий).
  - Студент вміє називати всі сім українських відмінків та їхні питання, а також використовувати ці знання для аналізу словникових статей і граматичних пояснень.
  - Студент вміє аналізувати словосполучення, визначаючи головне слово та залежне слово, а також тип зв'язку між ними.
  - Студент вміє читати українські граматичні довідкові матеріали (словникові статті, правила з підручників), які використовують синтаксичну та відмінкову термінологію.
dialogue_situations:
  - setting: 'Заняття з української граматики з репетитором — репетитор пояснює будову речення, використовуючи терміни: підмет, присудок, додаток, означення, обставина. Вони разом розбирають речення з газети.'
    speakers:
      - Репетитор
      - Студент-іноземець
    motivation: 'Синтаксична термінологія: підмет, присудок, додаток; назви відмінків: називний, родовий, давальний'
content_outline:
  - section: Що вивчають синтаксис і пунктуація?
    words: 500
    points:
      - "Вступ до метамови: студенти вже БУДУЮТЬ українські речення на рівнях A1-A2. Цей модуль навчає їх НАЗИВАТИ структури, які вони використовують. Перехід: від 'subject' до підмет, від 'object' до додаток, від 'complex sentence' до складне речення."
      - "Базові визначення (за Заболотним, 5 клас, с. 151): Синтаксис (від грец. syntaxis — побудова, поєднання) — це розділ мовознавства, що вивчає словосполучення і речення. Пунктуація (від лат. punctum — крапка) — це розділ мовознавства, що вивчає правила вживання розділових знаків. Ці два поняття нероздільні: синтаксис — це структура, а пунктуація — це те, як ми позначаємо її на письмі."
      - "Чому це важливо для рівня B1: кожне граматичне правило починаючи з 2-ї фази пояснюється з використанням синтаксичних термінів. Фраза 'Додаток у родовому відмінку' вимагає знання обох понять — і додатка, і родового відмінка. Словникова грамотність також залежить від термінології відмінків."
  - section: Словосполучення
    words: 550
    points:
      - "За Заболотним, 5 клас, с. 151: Словосполучення — поєднання двох і більше слів, пов'язаних за змістом і граматично: осіннє небо, читати книжку, дуже швидко. Кожне словосполучення має головне слово та залежне слово."
      - "За Авраменком, 5 клас, с. 144: Залежне слово відповідає на питання, поставлене від головного слова: небо (яке?) осіннє. читати (що?) книжку. швидко (як?) дуже. Напрямок стрілки: головне → (питання?) → залежне."
      - "Що НЕ є словосполученням: — підмет + присудок (це граматична основа). — слова з прийменником (на столі — це частина більшої структури). Ця відмінність важлива для аналізу речень на рівні B1 і вище."
      - "Практика: студенти виділяють словосполучення з речень, позначають головне/залежне слова та записують питання між ними."
  - section: 'Граматична основа: підмет і присудок'
    words: 650
    points:
      - "За Заболотним, 5 клас, с. 160: Підмет — головний член речення, що називає особу або предмет, про який ідеться в реченні. Відповідає на питання хто? що? Підмет найчастіше виражено іменником або займенником у називному відмінку. Підкреслюємо однією рискою: ______."
      - "За Голуб, 5 клас, с. 108: Присудок — головний член речення, що означає дію, стан чи ознаку підмета. Відповідає на питання що робить? який він є? хто він такий? Присудок найчастіше виражено дієсловом. Підкреслюємо двома рисками: ======."
      - "Особливий випадок — тире між підметом і присудком (Голуб, 5 клас, с. 108): Якщо і підмет, і присудок є іменниками в називному відмінку, між ними ставиться тире: Життя — це виклик. Знання — сила. Київ — столиця України."
      - "Як знайти підмет (Заболотний, 5 клас, с. 160): Запитайте: ХТО чи ЩО виконує дію? Вітер хилить клени. (Хто хилить? — Вітер = підмет.) Клени хиляються від вітру. (Що хиляється? — Клени = підмет.) Одне й те саме слово може бути підметом або додатком залежно від його ролі."
  - section: Другорядні члени речення
    words: 700
    points:
      - "За Заболотним, 5 клас, с. 168: Додаток — другорядний член речення, який називає предмет і відповідає на питання будь-якого відмінка, крім називного: кого? чого? кому? чому? кого? що? ким? чим? на кому? на чому? Даруйте людям (кому?) радість (що?). Підкреслюємо пунктиром: - - - -."
      - "За Авраменком, 5 клас, с. 159: Означення — другорядний член речення, що вказує на ознаку предмета й відповідає на питання який? яка? яке? які? чий? чия? чиє? чиї? Наш (чий?) двір прикрашає лелече (яке?) гніздо. Підкреслюємо хвилястою лінією: ~~~~~~."
      - "За Заболотним, 5 клас, с. 174: Обставина — другорядний член речення, який називає спосіб дії або її місце, час, причину, мету. Відповідає на питання як? де? куди? звідки? коли? чому? навіщо? Улітку (коли?) гриби краще шукати в затінку (де?) дерев. Підкреслюємо пунктиром з крапкою: -.-.-.-."
      - "Узагальнювальна таблиця всіх п'яти членів речення з їхніми питаннями, типовими частинами мови та способами підкреслення. Практика: студенти виконують повний розбір речення — знаходять граматичну основу, а потім визначають кожен другорядний член та його тип."
  - section: Складне речення
    words: 550
    points:
      - "За Литвіновою, 5 клас, с. 232: Просте речення має одну граматичну основу. Складне речення має дві або більше граматичних основ: Синіє ласкаве небо, і знов курличуть журавлі. (1-ша основа: небо синіє; 2-га: журавлі курличуть.)"
      - "Типи зв'язку (Заболотний, 5 клас, с. 197): Безсполучниковий — частини поєднані лише інтонацією, без сполучників: На гнізда повернулися лелеки, птахів зігріла рідна сторона. Сполучниковий — частини поєднані сполучниками або сполучними словами: Весна зупинилась над кручею, і плачуть оселі."
      - "За Голуб, 5 клас, с. 132: Основні сполучники, що з'єднують частини складного речення: і (й), та, але, проте, зате, однак — єднальні та протиставні. що, щоб, бо, тому що — підрядні. Сполучні слова: хто, що, який, чий, котрий, де, коли, як, куди. На рівні B1: розпізнавати ці структури, називати їх. На фазі 8 буде вивчатися їх систематична класифікація."
      - "Огляд правил пунктуації: кома між частинами складного речення. Це найпоширеніша пунктуаційна складність для студентів рівня B1."
  - section: 'Відмінки: система і питання'
    words: 650
    points:
      - "Сім українських відмінків — інструментарій студента для словникової грамотності: Називний (Н.в.) — хто? що? — базовий відмінок (підмет). Родовий (Р.в.) — кого? чого? — належність, відсутність, частина. Давальний (Д.в.) — кому? чому? — отримувач, той, хто відчуває. Знахідний (Зн.в.) — кого? що? — прямий об'єкт дії. Орудний (О.в.) — ким? чим? — інструмент, супровід. Місцевий (М.в.) — на кому? на чому? — місце (завжди з прийменником). Кличний (Кл.в.) — використовується для звертання: Тарасе! Маріє! Друже!"
      - "Чому відмінки важливі для словникової грамотності: українські словники та граматичні довідники подають форми за відмінками. Таблиця, у якій написано 'Р.в. однини: -а/-я', незрозуміла без знання системи. Граматичні правила на кшталт 'після дієслова вживаємо Зн.в.' вимагають цього словникового запасу."
      - "Відмінкові питання як діагностичний інструмент: Щоб визначити відмінок слова, поставте запитання. Я бачу (кого? що?) книжку — Зн.в. Я цікавлюся (ким? чим?) книжкою — О.в. Я розповідаю (кому? чому?) другові — Д.в. Практика: студенти визначають відмінок виділених слів у реченнях."
  - section: 'Підсумок: ваш синтаксичний словник'
    words: 400
    points:
      - "Повний словник метамови — усі терміни з цього модуля: синтаксис, пунктуація, словосполучення, головне слово, залежне слово, речення, граматична основа, підмет, присудок, додаток, означення, обставина, другорядний член, просте речення, складне речення, сполучниковий зв'язок, безсполучниковий зв'язок, сполучник, сполучне слово, називний, родовий, давальний, знахідний, орудний, місцевий, кличний."
      - "Самоперевірка українською мовою: Дайте відповіді на запитання: 1. Що таке граматична основа речення? 2. Назвіть три другорядні члени речення та їхні питання. 3. Чим просте речення відрізняється від складного? 4. Назвіть сім відмінків і їхні питання. 5. Визначте підмет, присудок і другорядні члени: Уранці діти радісно бігли до школи."
      - "Анонс наступного модуля: Минуле і теперішнє — повноцінне повторення часів дієслова методом занурення. Метамовний місток завершено: тепер ви володієте словниковим запасом, щоб розуміти пояснення української граматики українською мовою."
vocabulary_hints:
  required:
    - "синтаксис (syntax — the study of sentence structure)"
    - "пунктуація (punctuation — rules for using punctuation marks)"
    - "словосполучення (word combination — two+ words linked by meaning and grammar)"
    - "підмет (subject — main sentence member naming who/what acts)"
    - "присудок (predicate — main sentence member naming the action/state)"
    - "додаток (object — secondary member answering indirect case questions)"
    - "означення (attribute — secondary member answering який? чий?)"
    - "обставина (adverbial — secondary member answering як? де? коли?)"
    - "складне речення (complex sentence — sentence with two+ grammatical cores)"
    - "просте речення (simple sentence — sentence with one grammatical core)"
    - "називний відмінок (nominative case — хто? що?)"
    - "родовий відмінок (genitive case — кого? чого?)"
    - "давальний відмінок (dative case — кому? чому?)"
    - "знахідний відмінок (accusative case — кого? що?)"
    - "орудний відмінок (instrumental case — ким? чим?)"
    - "місцевий відмінок (locative case — на кому? на чому?)"
  recommended:
    - "граматична основа (grammatical core — підмет + присудок together)"
    - "головне слово (main word — the governing word in a word combination)"
    - "залежне слово (dependent word — governed by the main word)"
    - "другорядний член (secondary member — додаток, означення, or обставина)"
    - "кличний відмінок (vocative case — used for direct address)"
    - "сполучник (conjunction — connects parts of a compound/complex sentence)"
    - "сполучне слово (connective word — pronoun/adverb linking clause parts)"
    - "безсполучниковий зв'язок (asyndetic connection — without a conjunction)"
    - "сполучниковий зв'язок (syndetic connection — with a conjunction)"
    - "розділовий знак (punctuation mark — кома, крапка, тире, etc.)"
activity_hints:
  - type: quiz
    focus: 'Визначити члени речення: підмет, присудок, додаток, означення чи обставина?'
    items: 8
  - type: match-up
    focus: 'Зіставити відмінки з їхніми питаннями (Р.в. — кого? чого?, Д.в. — кому? чому? тощо)'
    items: 7
  - type: fill-in
    focus: 'Визначити відмінок виділених слів у реченнях, ставлячи правильне запитання'
    items: 8
  - type: group-sort
    focus: 'Розподілити речення на прості (просте речення) та складні (складне речення)'
    items: 8
  - type: mark-the-words
    focus: 'У тексті позначити граматичну основу (підмет + присудок) кожної частини речення'
    items: 6
  - type: error-correction
    focus: 'Знайти та виправити пунктуаційні помилки у складних реченнях (пропущені або зайві коми)'
    items: 6
