module: a2-010
level: A2
sequence: 10
slug: plural-adjective-declension
version: '2.0'
title: Plural Adjective Declension
subtitle: Adjective Agreement in Plural Across Cases
focus: grammar
pedagogy: TTT
phase: A2.1
word_target: 3000
objectives:
- Learner can form Nominative and Accusative plural adjectives for both hard and soft groups
- Learner can produce Genitive, Dative, Instrumental, and Locative plural adjective endings
- Learner can maintain noun-adjective agreement in plural across all 7 cases
- Learner understands that plural collapses gender distinctions into a single form per case
sources:
- name: Ukrainian State Standard 2024 - Adjective Morphology
  url: https://mon.gov.ua/
  type: reference
  notes: A2 adjective declension requirements
- name: Ukrainian Grammar Reference - Adjective Declension
  url: https://uk.wikipedia.org/wiki/Відмінювання_прикметників_в_українській_мові
  type: reference
  notes: Full plural declension tables for hard and soft groups
content_outline:
- section: 'Вступ: Один прикметник — багато форм (Introduction: One Adjective, Many Forms)'
  words: 350
  points:
  - 'The core challenge: adjectives must agree with their noun in case, so every plural case form of the noun demands a matching
    plural adjective ending — один великий будинок → великі будинки → великих будинків.'
  - 'Why this matters immediately: learners will be describing groups (нові студенти, старі будинки, маленькі діти) constantly;
    incorrect adjective agreement is a highly salient error in Ukrainian.'
  - 'Good news: adjective plural endings follow a predictable hard/soft split with very few exceptions — mastering the pattern
    unlocks all adjectives at once.'
- section: Називний та Знахідний множини (Nominative and Accusative Plural)
  words: 500
  points:
  - 'Nominative plural: hard-group adjectives take -і (великі, нові, старі); soft-group adjectives take -і as well (сині,
    ранні, середні) — both groups share -і in Ukrainian (unlike Russian -ые/-ие).'
  - 'Accusative plural inanimate: equals Nominative plural (бачу великі будинки, читаю нові книги); the safest and most frequent
    pattern.'
  - 'Accusative plural animate: equals Genitive plural (бачу нових студентів, люблю маленьких дітей) — the one context where
    Acc ≠ Nom in plural.'
  - 'Agreement drill: combine 8 adjectives × 3 noun genders in Nominative plural; then switch to Accusative identifying animate
    vs inanimate.'
- section: Родовий та Давальний множини (Genitive and Dative Plural)
  words: 600
  points:
  - 'Genitive plural: hard group → -их (великих, нових, старих); soft group → -іх (синіх, ранніх); used after кілька, багато,
    немає + plural noun.'
  - 'High-frequency collocations in Genitive plural: багато нових слів, немає старих книг, кілька маленьких дітей — drill
    with real contexts.'
  - 'Dative plural: hard group → -им (великим, новим, старим); soft group → -ім (синім, раннім); used with verbs like давати,
    говорити, допомагати + plural noun phrases.'
  - 'Contrastive table: singular Genitive (великого/великої/великого) vs plural Genitive (великих) — the plural collapses
    gender distinctions into one form.'
  - 'Common learner error: applying singular forms (великого, новій) where plural forms (великих, новим) are required.'
- section: Орудний та Місцевий множини (Instrumental and Locative Plural)
  words: 600
  points:
  - 'Instrumental plural: hard group → -ими (великими, новими, старими); soft group → -іми (синіми, ранніми); used with з,
    між, перед + noun phrases.'
  - 'Locative plural: hard group → -их (великих, нових, старих); soft group → -іх (синіх, ранніх); identical ending to Genitive
    plural but with preposition required (у великих містах, на нових вулицях).'
  - 'Memory hook: Genitive and Locative plural share the same adjective ending (-их/-іх), but Locative always has a preposition
    — use this to distinguish them.'
  - 'Real-world reading passage: a short description of a Ukrainian city using Locative plural (у великих будинках, в старих
    вулицях, у нових кварталах) for comprehension.'
  - 'Instrumental plural practice: з новими друзями, між старими деревами, перед маленькими дітьми — sentence building drill.'
- section: Повна зведена таблиця (Full Summary Table)
  words: 450
  points:
  - 'Complete adjective declension table: singular (m/f/n) + plural for all 7 cases, hard group (великий) and soft group (синій)
    side by side.'
  - 'Pattern recognition: in plural, gender distinctions disappear — one ending per case for all genders; highlight this simplification
    explicitly.'
  - 'Comparison with singular: singular has 3 gender columns per case; plural collapses to 1 column — plural is structurally
    simpler than singular.'
  - 'Мnemonic for plural endings: Nom/Acc-inan → -і; Gen/Loc → -их/-іх; Dat → -им/-ім; Inst → -ими/-іми; Acc-anim = Gen.'
- section: 'Практика: Опис і порівняння (Practice: Description and Comparison)'
  words: 500
  points:
  - 'Describe groups of people using all cases: нові студенти (Nom) → з новими студентами (Inst) → у нових студентів (Gen)
    → новим студентам (Dat).'
  - 'Reading comprehension: short text about different Ukrainian cities with plural adjective + noun phrases; learner identifies
    the case of each highlighted phrase.'
  - 'Production task: write 8 sentences describing a photo of a city/market/school using plural noun-adjective phrases in
    varied cases.'
  - 'Error correction drill: 10 sentences with incorrect adjective-plural agreements; learner identifies and corrects each.'
vocabulary_hints:
  required:
  - великий/великі/великих (big - m/pl-Nom/pl-Gen) — hard group paradigm adjective
  - новий/нові/нових (new - m/pl-Nom/pl-Gen) — high frequency, hard group
  - маленький/маленькі/маленьких (small - m/pl-Nom/pl-Gen) — hard group with alternation
  - гарний/гарні/гарних (beautiful/nice - m/pl-Nom/pl-Gen) — hard group
  - молодий/молоді/молодих (young - m/pl-Nom/pl-Gen) — hard group
  - синій/сині/синіх (blue - m/pl-Nom/pl-Gen) — soft group paradigm adjective
  - старий/старі/старих (old - m/pl-Nom/pl-Gen) — hard group, high frequency
  - різний/різні/різних (different/various - m/pl-Nom/pl-Gen) — high frequency
  recommended:
  - цікавий/цікаві/цікавих (interesting) — high frequency in descriptions
  - важкий/важкі/важких (difficult/heavy) — useful for academic contexts
  - відомий/відомі/відомих (famous/well-known) — cultural discussions
  - рідний/рідні/рідних (native/dear) — cultural and family contexts
  - іноземний/іноземні/іноземних (foreign) — learner-relevant adjective
activity_hints:
- type: fill-in
  focus: Supply the correct plural adjective ending (hard vs soft group, all cases)
  items: 20+
- type: match-up
  focus: Match noun-adjective phrase in one case to the same phrase in a different case
  items: 20+
- type: quiz
  focus: Select the correct plural adjective form from four options
  items: 15+
