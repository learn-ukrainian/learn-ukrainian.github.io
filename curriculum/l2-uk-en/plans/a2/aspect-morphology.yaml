module: a2-15
level: A2
sequence: 15
slug: aspect-morphology
version: '2.0'
title: Aspect Morphology
subtitle: Prefixes and Suffixes
content_outline:
- section: Introduction / Вступ
  points:
  - Concept of aspectual pairs as a family — use the 'aspectual pair as a family'
    concept to make prefixation feel less like a random addition and more like a relationship;
    include Visuals comparing 'Process' vs 'Result' icons
  - Morphological predictability — highlight that *по-* often means 'for a little
    while' or 'completion' and *з-* often means 'making/doing' to build intuition
- section: Presentation / Презентація
  points:
  - 'Prefixation (the primary method: про-, на-, з-, по-) — focus on standard pairs
    from State Standard: робити–зробити, писати–написати, ділити–поділити'
  - 'Suffixation (secondary imperfectives: -ва-, -ува-) — connect to ''Morning Rhythm''
    cultural hook: daily routines (умиватися, снідати) provide context for suffixal
    pairs'
  - Suppletive pairs (irregular roots)
  - Spelling rules for prefixes (з- vs с-) — explain the *з-* vs *с-* rule (перед
    к, п, т, ф, х) clearly as it is a high-frequency spelling error
- section: Practice / Практика
  points:
  - Pattern recognition drills — address Future Tense Mismatch learner error (e.g.,
    *Я буду написати* is incorrect)
  - Matching and transformation — address Process vs. Result Confusion learner error
    (читав vs прочитав)
- section: Dialogues / Діалоги
  points:
  - 'Dialogue on learning patterns — use a hospitality context: ''preparing'' (приготувати)
    a meal for a ''guest'' (гість) who just ''arrived'' (приїхав/прийшов); address
    Imperative Choice error (Читай vs Прочитай) to highlight politeness/urgency nuances'
vocabulary_hints:
  required:
  - відпочивати/відпочити (to rest) — відпочивати на морі, гарно відпочити
  - вставати/встати (to get up) — встати рано, вставати з ліжка (Morning Rhythm hook)
  - одягатися/одягнутися (to dress) — тепло одягнутися, одягатися на роботу
  - сідати/сісти (to sit down)
  - лягати/лягти (to lie down)
  - відкривати/відкрити (to open) — відкрити вікно, відкривати двері
  - закривати/закрити (to close)
  - вмикати/увімкнути (to turn on)
  - вимикати/вимкнути (to turn off)
  - починати/почати (to begin) — почати роботу, починати урок
  - закінчувати/закінчити (to finish)
  - отримувати/отримати (to receive)
  - посилати/послати (to send)
  - вибирати/вибрати (to choose)
  - вирішувати/вирішити (to decide) — вирішити проблему, вирішувати завдання
  recommended:
  - префікс (prefix)
  - суфікс (suffix)
  - корінь (root)
  - основа (stem)
  - утворення (formation)
