slug: sviy-and-sebe
level: A2
title: Свій та себе
subtitle: My Own, Myself
focus: grammar
word_target: 2000
objectives:
- Understand when to use the possessive pronoun 'свій' instead of 'мій', 'твій', etc.
- Correctly decline 'свій' according to the gender, number, and case of the noun it
  modifies.
- Understand the function of the reflexive pronoun 'себе'.
- Decline 'себе' in all cases (except nominative).
- Use 'свій' and 'себе' naturally in sentences to talk about ownership and actions
  directed at oneself.
vocabulary_hints:
- uk: присвійний займенник
  en: possessive pronoun
- uk: зворотний займенник
  en: reflexive pronoun
- uk: свій / своя / своє / свої
  en: one's own
- uk: себе
  en: oneself
- uk: собі
  en: to oneself
- uk: собою
  en: with oneself / by oneself
- uk: розповідати про себе
  en: to talk about oneself
- uk: пишатися собою
  en: to be proud of oneself
activity_hints:
- type: multiple-choice
  focus: Choosing between 'мій'/'твій' and 'свій' to correctly complete sentences.
  items: 15
- type: fill-in-the-blank
  focus: Filling in the correct form of 'свій' based on the noun's case, gender, and
    number.
  items: 15
- type: sentence-transformation
  focus: Rewriting sentences to correctly use the reflexive pronoun 'себе' in different
    cases.
  items: 12
- type: translation
  focus: Translating sentences from English to Ukrainian that require 'свій' or 'себе'.
  items: 10
- type: open-ended-question
  focus: Answering personal questions using 'свій' and 'себе' (e.g., 'What do you
    like about yourself?').
  items: 8
sequence: 50
module: a2-050
version: '1.0'
phase: A2.8 [Refinement and Graduation]
references:
- title: Заболотний Grade 6, §46-47
  notes: Зворотний та присвійний займенники
