module: a2-056
level: A2
sequence: 56
slug: sviy-and-sebe
version: 1.0.3
title: Своє та себе
subtitle: Присвійний займенник свій та зворотний займенник себе
focus: grammar
pedagogy: PPP
phase: 'A2.8 [Удосконалення та випуск]'
word_target: 2000
objectives:
- Вміти правильно використовувати «свій», щоб показати, що власник є підметом речення, та розрізняти його від мій/твій/його/її.
- Навчитися відмінювати «свій» у всіх відмінках, родах і числах (свого, своїй, своїм тощо).
- Вміти використовувати зворотний займенник «себе» у всіх відмінках (себе, собі, собою) та розуміти, що він не має форми називного відмінка.
- Опанувати використання поширених висловів зі словами «себе» та «свій» у природному українському мовленні.
dialogue_situations:
- setting: 'Сімейна суперечка про те, чиї це речі: Це мій светр (m)! Ні, він мій — я купив його собі сам! Вона взяла свою сумку (f), а не твою. Він дивиться на себе у дзеркало (n).'
  speakers:
  - Брат
  - Сестра
  - Мама (розводить руками)
  motivation: 'Свій проти мій/твій, себе: светр(m), сумка(f), дзеркало(n)'
content_outline:
- section: 'Свій: чий саме?'
  words: 600
  points:
  - 'Головне правило: «свій» замінює мій/твій/його, коли власник є підметом. Я читаю свою книгу (= мою власну книгу). Він читає свою книгу (= його власну книгу). Без «свій»: Він читає його книгу (= чиюсь іншу книгу).'
  - 'Чому це важливо: англійська використовує "his" для обох випадків. Українська їх розрізняє. Він любить свою дружину (його власну дружину) порівняно з Він любить його дружину (дружину іншого чоловіка).'
  - 'Коли НЕ використовувати «свій»: у 1-й та 2-й особі мій/твій також прийнятні (Я читаю мою/свою книгу — обидва варіанти правильні). У 3-й особі «свій» є необхідним для ясності.'
  - 'Практика: переписати речення, замінюючи мій/його на «свій» там, де це доречно.'
- section: Свій у відмінках
  words: 450
  points:
  - 'Таблиця відмінювання: «свій» слідує за зразком мій/твій. Чоловічий рід: свій, свого, своєму, свій/свого, своїм, своєму/своїм. Жіночий рід: своя, своєї, своїй, свою, своєю, своїй. Середній рід: своє, свого, своєму, своє, своїм, своєму/своїм. Множина: свої, своїх, своїм, свої/своїх, своїми, своїх.'
  - 'Практика з відмінками: Я горджуся своїм містом (Ор. в.). Він розповів про свою родину (Зн. в.). Вона допомагає своїй сестрі (Дав. в.).'
  - 'Поширені словосполучення: свій час, своя думка, своє місце, свої люди.'
- section: 'Себе: зворотний займенник'
  words: 550
  points:
  - '«Себе» не має форми називного відмінка — він не може бути підметом. Він посилається на підмет: Він бачить себе у дзеркалі.'
  - 'Відмінювання: Родовий/Знахідний: себе, Давальний/Місцевий: собі, Орудний: собою.'
  - 'Поширені вислови: почувати себе, вести себе, уявити собі, взяти собі, сам/сама по собі.'
  - 'Порівняння з дієсловами на -ся: милуватися = милувати себе. Зворотний суфікс -ся історично походить від «себе». Зв''язок із дієсловами, які вони вже знають (називатися, вчитися).'
- section: Свій та себе у мовленні
  words: 400
  points:
  - 'Діалог: друзі обговорюють свої звички та рутину, природно використовуючи «свій» і «себе» (Я завжди беру з собою парасольку. А ти? Я почуваю себе добре у своєму місті).'
  - 'Практика читання: короткий текст про людину, яка описує свою щоденну рутину, використовуючи «свій» і «себе» по всьому тексту.'
  - 'Типові помилки: *Він любить його дружину (неоднозначно без «свій»), *Я почуваю себе (відсутній прислівник — як?).'
- section: Підсумок
  words: 200
  points:
  - '«Свій» замінює присвійні займенники, коли власник є підметом, що є суттєвим у 3-й особі для уникнення неоднозначності. Самоперевірка: Яка різниця між «Він любить свою дружину» та «Він любить його дружину»?'
  - '«Свій» відмінюється точно так само, як мій і твій, у всіх відмінках, родах і числах. Самоперевірка: Які форми орудного та давального відмінків слова «свій» для іменника жіночого роду? Перекладіть: «Я горджуся своїм містом».'
  - '«Себе» — це зворотний займенник, що посилається на підмет і не має форми називного відмінка (себе, собі, собою). Самоперевірка: Як сказати "Я почуваюся добре" українською, використовуючи «себе»? Що означає фраза «взяти з собою»?'
vocabulary_hints:
  required:
  - свій (one's own)
  - себе (oneself, accusative/genitive)
  - собі (oneself, dative)
  - собою (oneself, instrumental)
  - почувати себе (to feel)
  - вести себе (to behave)
  - горджуся (I am proud)
  - уявити (to imagine)
  - дзеркало (mirror)
  - парасолька (umbrella)
  recommended:
  - власний (own, one's own)
  - самостійно (independently)
  - звичка (habit)
  - щоденний (daily)
