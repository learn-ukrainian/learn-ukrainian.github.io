module: a2-015
level: A2
sequence: 15
slug: shopping-and-health
version: '1.0'
title: На ринку та у лікаря
subtitle: Родовий відмінок у реальних ситуаціях — покупки та здоров'я
focus: communication
pedagogy: TBL
phase: A2.2 [Genitive Case Complete]
word_target: 2000
objectives:
  - Learner can request specific quantities of food items at a market using 
    Genitive (кілограм яблук, пів кіло сиру, пляшка води).
  - Learner can describe symptoms and health complaints using Genitive 
    constructions (немає температури, болить від холоду, ліки від кашлю).
  - Learner can participate in a natural shopping dialogue including asking 
    prices, quantities, and preferences.
  - Learner can participate in a basic doctor visit dialogue including 
    describing symptoms and understanding simple instructions.
dialogue_situations:
  - setting: 'At a Kyiv ринок (m, market) — buying produce: Дайте мені кілограм помідорів
      (m, tomatoes) і півкіло огірків (m, cucumbers). Then at the лікар (m, doctor):
      У мене болить горло (n, throat). Then at the аптека (f, pharmacy): Мені потрібні
      краплі (pl, drops).'
    speakers:
      - Покупець/Пацієнт
      - Продавець/Лікар/Фармацевт
    motivation: 'Three real situations: помідор(m), огірок(m), горло(n), краплі(pl)'
content_outline:
  - section: 'На ринку: скільки вам? (At the Market: How Much Do You Want?)'
    words: 750
    points:
      - 'Quantity + Genitive: кілограм яблук, пів кіло помідорів, літр молока, пляшка
        води, пачка масла, десяток яєць.'
      - 'Natural market dialogue: greeting the vendor, asking what is fresh today,
        requesting quantities, asking the price, paying. Based on real market interactions
        — vendor offers tastes, suggests alternatives.'
      - 'Genitive after measure words: склянка соку (a glass of juice), шматок хліба
        (a piece of bread), банка меду (a jar of honey). Practice with partitive Genitive.'
      - 'Price expressions: скільки коштує кілограм? по скільки? — дорого/дешево/нормально.'
      - 'Polite forms: Дайте, будь ласка... Чи є у вас...? Мені, будь ласка...'
  - section: 'У лікаря: що вас турбує? (At the Doctor: What Troubles You?)'
    words: 700
    points:
      - 'Doctor''s questions: Що вас турбує? Як давно? Чи є температура? Чи є алергія
        на ліки?'
      - 'Patient responses with Genitive: немає температури (no fever), немає апетиту
        (no appetite), немає сил (no energy). Also: болить від холоду (hurts from
        the cold), кашель від алергії (cough from allergy).'
      - 'Medicine and prescriptions: ліки від кашлю (cough medicine), краплі від нежиті
        (drops for a runny nose), таблетки від головного болю (headache pills). Genitive
        after від for ''against/for'' a condition.'
      - 'Natural dialogue: arriving, describing how you feel, doctor asking follow-up
        questions, receiving advice (пийте багато води, відпочивайте).'
  - section: 'В аптеці та повсякденне здоров''я (At the Pharmacy and Everyday Health)'
    words: 550
    points:
      - 'Pharmacy dialogue: asking for specific medicine, asking for advice (Що ви
        порадите від...?), understanding pharmacist recommendations.'
      - 'Health vocabulary with Genitive: для здоров''я (for health), без рецепта
        (without a prescription), після їжі (after a meal — for taking medicine).'
      - 'Everyday health phrases: дбати про здоров''я, багато води, мало цукру, без
        кофеїну. Connecting diet and health language with Genitive structures.'
      - 'Consolidation: both scenarios (market + health) use the same Genitive patterns
        — quantity (кілограм яблук / багато води), absence (немає / без), source/cause
        (від кашлю / з ринку).'
vocabulary_hints:
  required:
    - ринок (market)
    - кілограм (kilogram)
    - пляшка (bottle)
    - здоров'я (health)
    - температура (temperature, fever)
    - рецепт (prescription, recipe)
    - аптека (pharmacy)
    - ліки (medicine)
    - кашель (cough)
    - апетит (appetite)
  recommended:
    - помідор (tomato)
    - нежить (runny nose, cold)
    - алергія (allergy)
    - таблетка (pill, tablet)
    - шматок (piece)
activity_hints:
  - type: fill-in
    focus: Complete market dialogue lines with correct quantity + Genitive forms
    items: 8
  - type: quiz
    focus: Choose the correct Genitive phrase for health complaints and remedies
    items: 8
  - type: match-up
    focus: Match health problems to their remedies (ліки від..., краплі від...)
    items: 8
  - type: true-false
    focus: Judge whether shopping and health phrases use the Genitive correctly
    items: 8
references:
  - title: Заболотний Grade 5, §20-22
    notes: Родовий відмінок іменників у повсякденних контекстах
  - title: 'ULP: At the Market in Ukraine'
    url: https://www.ukrainianlessons.com/at-the-market/
    notes: Real market dialogues and vocabulary
