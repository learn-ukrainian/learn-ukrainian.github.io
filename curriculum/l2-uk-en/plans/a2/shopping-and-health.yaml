level: A2
word_target: 2000
title: У магазині та в лікаря
subtitle: Практичне застосування родового відмінка
objectives:
- Використовувати родовий відмінок для здійснення покупок (кілограм яблук, пляшка
  води).
- Використовувати родовий відмінок для розмови про здоров'я (немає температури, ліки
  від кашлю).
- Активно вживати конструкцію 'у мене немає...'.
- Розуміти та брати участь у простих діалогах у магазині, на ринку та в аптеці.
- Повторити та закріпити використання прийменників родового відмінка в реальних ситуаціях.
content_outline:
- section: 'Вступ: Родовий відмінок у повсякденному житті'
  points:
  - Огляд практичних ситуацій, де родовий відмінок є незамінним.
- section: 'На ринку та в магазині: Покупки'
  points:
  - 'Слова для вимірювання: кілограм, літр, пляшка, пакет, коробка.'
  - 'Діалог: ''Дайте, будь ласка, кілограм яблук і пляшку води''.'
  - Практика з різними продуктами та кількостями.
- section: 'В аптеці та в лікаря: Здоров''я'
  points:
  - 'Опис симптомів за допомогою конструкції ''У мене немає...'': немає апетиту, немає
    сил.'
  - 'Запит ліків: ''Дайте щось від головного болю / для горла''.'
  - Діалог з фармацевтом.
- section: Діалоги для практики
  points:
  - Комплексний діалог 'У супермаркеті'.
  - Комплексний діалог 'В аптеці'.
  - 'Рольова гра: один студент — покупець/пацієнт, інший — продавець/фармацевт.'
vocabulary_hints:
  required:
  - 'кілограм: kilogram'
  - 'літр: liter'
  - 'пляшка: bottle'
  - 'пакет: carton, bag'
  - 'яблуко (яблук): apple(s)'
  - 'вода (води): water'
  - 'молоко (молока): milk'
  - 'температура (немає температури): temperature (to have no fever)'
  - 'кашель (від кашлю): cough (for a cough)'
  - 'головний біль: headache'
  - 'здоров''я (для здоров''я): health (for health)'
  - 'ліки: medicine'
  recommended:
  - 'рецепт: prescription; recipe'
  - 'апетит: appetite'
  - 'сили: strength, energy'
  - 'сироп: syrup'
  - 'таблетка: pill'
  - 'ринок: market'
  - 'аптека: pharmacy'
  - 'черга: queue, line'
activity_hints:
- type: dialogue-completion
  focus: Заповнення пропусків у діалогах на тему покупок та здоров'я
  items: 10
- type: role-playing
  focus: Розігрування сценаріїв 'на ринку' та 'в аптеці' за поданими ролями
  items: 4
- type: list-making
  focus: Створення списку покупок, використовуючи правильні форми родового відмінка
  items: 8
- type: problem-solution
  focus: Поєднання проблеми зі здоров'ям та відповідних ліків (напр., головний біль
    -> таблетка від головного болю)
  items: 10
slug: shopping-and-health
