slug: metalanguage-words-and-cases
level: A2
title: Слова та відмінки
subtitle: Words and Cases
focus: bridge
word_target: 2000
objectives:
- Identify and name the main parts of speech in Ukrainian (іменник, прикметник, дієслово,
  займенник).
- Name all 7 Ukrainian cases and state their primary function/question.
- Understand the concepts of рід (gender), число (number), and відмінок (case).
- Recognize the grammatical terms for tenses (теперішній, минулий, майбутній час).
- Begin to use Ukrainian metalanguage to ask questions about grammar.
vocabulary_hints:
- uk: іменник
  en: noun
- uk: прикметник
  en: adjective
- uk: дієслово
  en: verb
- uk: займенник
  en: pronoun
- uk: називний, родовий, давальний, знахідний, орудний, місцевий, кличний
  en: nominative, genitive, dative, accusative, instrumental, locative, vocative
- uk: однина / множина
  en: singular / plural
- uk: чоловічий / жіночий / середній рід
  en: masculine / feminine / neuter gender
activity_hints:
- type: matching
  focus: Matching grammatical terms with their English equivalents.
  items: 15
- type: categorization
  focus: 'Sorting a list of words into categories: noun, adjective, verb.'
  items: 20
- type: question-matching
  focus: Matching each case with its primary question (e.g., Genitive -> кого? чого?).
  items: 14
- type: labeling
  focus: Identifying the gender, number, and case of a highlighted noun in a sentence.
  items: 12
- type: fill-in-the-blank
  focus: Completing simple grammar rules using the correct metalanguage.
  items: 10
sequence: 55
module: a2-055
version: '1.0'
phase: A2.8 [Refinement and Graduation]
