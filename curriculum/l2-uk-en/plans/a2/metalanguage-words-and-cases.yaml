content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - 'Why Ukrainian grammar terms matter: B1 uses 100% Ukrainian instruction.'
- section: Терміни (Terms)
  words: 800
  points:
  - |-
    **Metalanguage bridge 1:** Parts of speech (іменник, прикметник, дієслово, займенник, числівник, прислівник, прийменник, сполучник). Case names + question pairs. Gender/number terms. Method: re-label known concepts with Ukrainian terms using Grade 3-4 textbook excerpts.
- section: Практика (Practice)
  words: 500
  points:
  - 'Exercises using Ukrainian metalanguage: identify parts of speech, name cases, describe verb forms.'
- section: Словник (Dictionary Skills)
  words: 400
  points:
  - How to read dictionary entries using Ukrainian abbreviations and terms.
