title: Action Verb Prefixes
subtitle: Redoing, Finishing, and Opening
focus: grammar
pedagogy: PPP
phase: A2.3
word_target: 2000
objectives:
- Learner can express re-doing an action (rewriting, reading)
- Learner can express finishing an action
- Learner can describe opening and closing things
- Learner can modify action verbs to add nuance
- Learner can differentiate between 'start' and 'excess' meanings of prefixes
sources:
- name: Ukrainian State Standard 2024 - Verb Morphology
  url: https://mon.gov.ua/
  type: reference
  notes: Standards for non-motion verb prefixes and semantic transformation at A2
- name: Grammar of Ukrainian Language - Semantic Prefixes
  url: https://uk.wikipedia.org/wiki/Префікси_в_українській_мові
  type: reference
  notes: Functional analysis of Po-, Za-, Vy-, and Pere- in action stems
content_outline:
- section: 'Вступ: Логіка LEGO в українських дієсловах (Introduction: The LEGO logic of Ukrainian verbs)'
  words: 400
  points:
  - 'The ''Meaning Map'' concept: Moving from basic A1 stems (писати, читати, робити) to semantic transformation using prefixes
    as ''GPS coordinates'' for action.'
  - 'Why phrasal verbs don''t exist in Ukrainian: Explaining how prefixes replace English particles (write down, write over,
    write out) with internal morphological logic.'
  - 'Cultural Motivation: The ''Bread Respect'' (доїсти) — introducing the prefix до- through the lens of traditional reverence
    for food and historical scarcity trauma.'
- section: 'Презентація: Світ префіксів пере-, до- та по- (Presentation: The world of prefixes Pere-, Do-, and Po-)'
  words: 850
  points:
  - 'The Logic of Re- (Пере-): Distinguishing between ''doing again'' (переписати вправу) and ''copying'' (переписати текст)
    vs ''transferring'' (передати).'
  - 'The Logic of Completion (До-): Reaching the limit — following State Standard §4.3.2 for aspectual pairs (писати – написати
    vs дописати листа до кінця).'
  - 'The ''A Little'' Power (По-): Scaffolding the delimitative meaning (почитати трохи) vs the perfective marker; cautioning
    against confusing it with a simple start of action.'
  - 'Learner Error Focus: The Rewrite vs. Finish Trap — clarifying the overlap where English ''write more'' confuses переписати
    with дописати.'
- section: Відчинити чи відкрити? Битва за простір (To open or to reveal? The battle for space)
  words: 750
  points:
  - 'The ''Hinges Rule'': Rigorous distinction between opening physical barriers (відчинити двері, вікно, кватирку) and abstract
    ''opening'' (відкрити рахунок, очі, Америку).'
  - 'The ''Open'' Trap: Explicitly debunking the Surzhyk ''відкрити двері'' (incorrect) by highlighting the physical hinge
    logic vs the Russian interference pattern.'
  - 'The Closing Counterparts: Applying the same logic to зачинити (physical doors/windows) vs закрити (abstract themes, eyes,
    or sessions).'
  - 'The ''Za-'' Triple Trap: Managing the three faces of за- (Closing physical objects, Starting an action, and Excess/Shutting
    down a business).'
- section: 'Практика: Трансформація смислів (Practice: Transformation of meanings)'
  words: 600
  points:
  - 'Visualizing Grammar: Completing a ''Hinge vs. Abstract'' comparison table based on research frequency data (High-frequency
    collocations for office and home).'
  - 'Scenario Training: ''The Messy Office'' — drills on correcting errors (переписати), finishing tasks (дописати), and managing
    physical vs abstract openings (відчинити вікно vs відкрити файл).'
  - 'The ''Give'' Family Drill: Contextual practice distinguishing віддати (give back), передати (pass), and здати (hand in/surrender).'
- section: Діалоги та підсумок (Dialogues and Summary)
  words: 400
  points:
  - 'Writer vs. Editor Dialogue: A high-immersion conversation about deadlines, where the writer must decide whether to redo
    (переписати) or just finish (дописати) the chapter.'
  - 'Mastery Check: Identifying the ''Excess'' vs ''Start'' meanings in sentences using за-, and verifying the correct choice
    of ''Open'' for business vs windows.'
  - 'Final synthesis: Reviewing the aspectual logic mandated by State Standard §4.3.2 and the cultural significance of the
    prefix до-.'
vocabulary_hints:
  required:
  - відчинити (to open [physical]) — відчинити двері, вікно, кватирку, ворота; High Frequency (Specific)
  - відкрити (to open [abstract/general]) — відкрити рахунок, очі, бізнес, сезон, душу; Very High Frequency
  - зачинити (to close [physical]) — зачинити вікно, зачинити за собою двері; High Frequency
  - закрити (to close [abstract/general]) — закрити тему, закрити очі (на щось), закрити засідання, закрити бізнес; Very High
    Frequency
  - переписати (to rewrite/copy) — переписати вправу, переписати текст, переписати майно; Academic/Office register
  - дописати (to finish writing) — дописати речення, дописати листа, дописати до кінця; High Frequency
  recommended:
  - доїсти (to finish eating) — доїсти все з тарілки; reflects cultural reverence for food
  - почитати (to read for a while) — почитати книжку перед сном; delimitative usage
  - здати (to hand in/give back) — здати тест, здати здачу, здати в оренду
  - віддати (to give back/return) — віддати борг, віддати книжку в бібліотеку
persona:
  voice: Encouraging Cultural Guide
  role: Film Director
grammar:
- prefix пере- (re-doing)
- prefix до- (finishing)
- prefix від-/роз- (opening)
- prefix за- (closing/starting)
- prefix по- (little/start)
- prefix на- (accumulate)
