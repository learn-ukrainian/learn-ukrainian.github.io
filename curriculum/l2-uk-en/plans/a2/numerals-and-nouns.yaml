vocabulary_hints:
  required:
  - один / одна / одне (one) — один долар, одна година, одне вікно
  - 'два / дві (two) — два квитки, дві гривні, дві пляшки — learner error: gender
    agreement'
  - три (three) — три дні, три гривні — Zone 2 agreement
  - чотири (four) — чотири роки — Zone 2 agreement
  - п'ять (five) — п'ять гривень, п'ять доларів — Zone 3 agreement
  - десять (ten) — десять євро, десять хвилин — Zone 3 agreement
  - двадцять (twenty) — двадцять хвилин — Zone 3 agreement
  - 'гривня (hryvnia) — три гривні, п''ять гривень, десять гривень — Cultural note:
    Kyivan Rus currency'
  - долар (dollar) — один долар, три долари, п'ять доларів
  - євро (euro) — десять євро — Indeclinable noun
