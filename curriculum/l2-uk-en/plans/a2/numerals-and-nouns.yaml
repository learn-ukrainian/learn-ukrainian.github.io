module: a2-21
level: A2
sequence: 21
slug: numerals-and-nouns
version: '2.0'
title: Numerals and Nouns
subtitle: Counting Things Correctly
content_outline:
- section: Вступ (Introduction)
  words: 450
  points:
  - 'The concept of ''Zones'' in Ukrainian counting — introduction of the mental model:
    Zone 1 (1), Zone 2 (2-4), and Zone 3 (5-20) to replace the binary English singular/plural
    logic.'
  - 'State Standard §4.2.1.3 Alignment: Understanding the systemic requirements for
    designating quantity and measure in connection with cardinal numerals at the A2
    level.'
  - 'Cultural Hook: Kyivan Rus Currency — The ''Gryvnia'' (гривня) as a IX-XIII century
    unit of weight and currency, grounding modern counting drills in a millennium
    of history.'
- section: 'Презентація: Зони 1 та 2 (Presentation: Zones 1 and 2)'
  words: 750
  points:
  - 'Zone 1: The ''One'' Rule — Focus on mandatory gender agreement (один долар, одна
    година, одне вікно); specific drill to prevent the error of using masculine for
    feminine nouns (e.g., ''один гривня'').'
  - 'Zone 2: Two, Three, Four (The Nominative Plural Zone) — Explanation of why Ukrainian
    differs from Russian; L1 Interference Alert: Russian speakers often use Genitive
    Singular (*два стола*), but Ukrainian requires Nominative Plural (два столи).'
  - 'Cultural Hook: The Dual Legacy (Двоїна) — Explaining why numbers 2-4 trigger
    unique patterns; mention the specific stress ''traces'' left in modern Ukrainian
    (e.g., дві кни́ги vs дві книжкИ) that reflect the ancient dual number.'
  - 'Gendered ''Two'': Distinguishing between ''два'' (masc/neut) and ''дві'' (fem);
    correcting the common learner error of ''два пляшки'' to ''дві пляшки''.'
- section: 'Презентація: Зона 3 та Складні Числівники (Presentation: Zone 3 and Compound
    Numerals)'
  words: 750
  points:
  - 'Zone 3: Five to Twenty (The Genitive Plural Zone) — Establishing the pattern
    for п''ять, десять, двадцять (п''ять гривень, десять євро); focus on the phonetics
    of soft endings.'
  - 'The ''11-14'' Trap: Reinforcing that numerals 11-14 belong strictly to Zone 3
    (Genitive Plural) despite ending in digits 1-4; preventing the over-application
    of the ''Last Digit Rule''.'
  - 'Compound Numerals and the ''Last Digit'' Rule: Demonstrating that in numbers
    like 21, 34, or 55, only the final word determines the agreement zone (e.g., 21
    follows Zone 1 logic; 24 follows Zone 2).'
  - 'State Standard §4.2.2.2: Subject of Age — Using numerals to express age (Дідусеві
    вісімдесят років), focusing on the specific Genitive Plural forms required for
    ''years'' (років vs роки).'
- section: Практика на Ринку (Market Practice)
  words: 600
  points:
  - 'Market Context (Ринок): Immersion drills for natural repetition of counting currency
    and products (яблука, пляшки, кілограми) in a transactional setting.'
  - 'Currency Agreement: Drills comparing ''дві гривні'' (Zone 2) vs ''п''ять гривень''
    (Zone 3) and ''один долар'' vs ''три долари''.'
  - 'The ''Euro'' Exception: Introducing ''євро'' as an indeclinable noun that remains
    constant regardless of the numeral (одне євро, десять євро), providing a cognitive
    break from complex agreement rules.'
- section: Діалоги та Одушевленість (Dialogues and Animacy)
  words: 450
  points:
  - 'Animacy Distinction in Accusative: Introducing the shift for animate objects
    with numerals; ''Бачу два столи'' (inanimate = Nominative form) vs ''Бачу двох
    друзів'' (animate = Genitive-like form).'
  - 'Shopping Dialogues: Roleplay involving specific quantities, prices, and ages
    of products (e.g., ''Цьому вину п''ять років''), integrating all three zones.'
  - 'Summary: Recapping the ''Zone'' model as a tool for self-correction when moving
    from A2 building blocks to B1 complexity.'
