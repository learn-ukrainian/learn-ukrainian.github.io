slug: imperative-complete
level: A2
title: Хай читає!
focus: grammar
track: core
word_target: 2000
reference_word_count: 0
objectives:
- Утворювати та використовувати наказовий спосіб для 3-ї особи (хай/нехай + дієслово).
- Утворювати та використовувати наказовий спосіб для 1-ї особи множини (читаймо, ходімо).
- Поєднувати кличний відмінок з наказовим способом для створення прохань, запрошень
  та побажань.
- Розрізняти доконаний та недоконаний вид в наказовому способі.
- Правильно використовувати форми ввічливості в наказах та проханнях.
content_outline:
- section: 'Огляд наказового способу: Не тільки для ''ти'' і ''ви'''
  points:
  - Коротке повторення форм 2-ї особи (ти читай, ви читайте).
  - Введення ідеї, що накази та спонукання можуть стосуватися інших осіб ('нехай він...',
    'ходімо').
- section: 'Наказ для третьої особи: Хай і Нехай'
  points:
  - Пояснення використання часток 'хай' та 'нехай' (синоніми).
  - 'Формула: хай/нехай + дієслово у 3-й особі однини або множини теперішнього/майбутнього
    часу.'
  - 'Приклади: ''Хай він зайде'', ''Нехай вони зачекають'', ''Хай щастить!''.'
  - Використання для вираження побажань та дозволу.
- section: 'Спільна дія: Наказовий спосіб для 1-ї особи множини'
  points:
  - 'Формула утворення: інфінітив без -ти + закінчення -імо/-ймо.'
  - 'Приклади: ''читати'' -> ''читаймо'', ''робити'' -> ''робімо'', ''іти'' -> ''ходімо''.'
  - 'Використання для запрошення до спільної дії: ''Співаймо разом!'', ''Поговорімо
    про це''.'
  - 'Сучасна альтернатива з ''давай(те)'': ''Давайте поговоримо''.'
- section: Кличний відмінок і побажання
  points:
  - Коротке повторення утворення кличного відмінка (Олено, Андрію, друже).
  - 'Поєднання кличного відмінка з наказовим способом для звертання: ''Ірино, допоможи,
    будь ласка''.'
  - 'Створення побажань: ''Оленко, будь щасливою!'', ''Смачного!'', ''На здоров''я!''.'
- section: Вид дієслова та ввічливість у наказах
  points:
  - Різниця між 'роби' (роби це взагалі) і 'зроби' (зроби це зараз, як результат).
  - Недоконаний вид для порад, доконаний — для конкретних прохань.
  - Використання 'будь ласка' та форми на 'ви' для ввічливості.
vocabulary_hints:
  required:
  - '[''хай'', ''let (imperative particle)'']'
  - '[''нехай'', ''let (imperative particle)'']'
  - '[''-імо'', ''1st person plural imperative ending'']'
  - '[''-ймо'', ''1st person plural imperative ending (after vowel)'']'
  - '[''давай'', "let''s (informal)"]'
  - '[''давайте'', "let''s (formal/plural)"]'
  - '[''будь ласка'', ''please'']'
  - '[''смачного!'', ''bon appétit!'']'
  - '["на здоров''я!", "cheers! / you''re welcome (for food)"]'
  - '[''будь щасливий'', ''be happy (masculine)'']'
  - '[''будь щаслива'', ''be happy (feminine)'']'
  - '[''ходімо'', "let''s go (on foot)"]'
  recommended:
  - '[''співаймо'', "let''s sing"]'
  - '[''говорімо'', "let''s talk"]'
  - '[''починаймо'', "let''s begin"]'
  - '[''хай щастить'', ''good luck'']'
  - '[''нехай буде'', ''so be it, let it be'']'
  - '[''вибачте'', ''excuse me, sorry (formal)'']'
  - '[''пробач'', ''sorry (informal)'']'
activity_hints:
- type: sentence_transformation
  focus: Перетворення речень з розповідних на наказові для 1-ї та 3-ї особи.
  items_count: 15
- type: role_play
  focus: Створення діалогів, де персонажі запрошують один одного до дії або передають
    прохання.
  items_count: 5
- type: making_wishes
  focus: Написання коротких привітань та побажань до свят, використовуючи наказовий
    спосіб.
  items_count: 10
- type: fill_in_the_gaps
  focus: Заповнення пропусків у діалогах правильними формами наказового способу.
  items_count: 12
- type: imperative_drill
  focus: Швидке утворення всіх форм наказового способу від заданих дієслів.
  items_count: 10
