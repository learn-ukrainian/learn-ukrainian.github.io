module: a2-044
level: A2
sequence: 44
slug: imperative-complete
version: 1.0.3
title: Хай він прочитає!
subtitle: Наказовий спосіб для всіх осіб — хай/нехай, -мо, кличний + побажання
focus: grammar
pedagogy: PPP
phase: A2.6 [Aspect, Tenses, and Motion]
word_target: 2000
objectives:
- Учень може утворювати та використовувати наказовий спосіб третьої особи з хай/нехай + теперішній час (хай мріє, нехай прочитає, хай вони підуть) для непрямих наказів, побажань та дозволів.
- Учень вміє утворювати та використовувати наказовий спосіб першої особи множини на -мо (читаймо, ходімо, зробімо, давайте поїдемо) для групових запрошень і пропозицій.
- Учень може поєднувати кличний відмінок з наказовим способом та орудним відмінком для висловлення побажань (Оленко, будь щасливою! Друзі, будьте здоровими!).
- Учень вміє обирати правильний вид дієслова для наказового способу — недоконаний для загальних/повторюваних дій (читай щодня) порівняно з доконаним для конкретних/одноразових результатів (прочитай цю книгу).
dialogue_situations:
- setting: 'Кулінарний майстер-клас української кухні — шеф-кухар дає команди учням: Наріжте цибулю (f, onion)! Хай вода (f) закипить! Помішаймо разом! Нехай соус (m) настоїться!'
  speakers:
  - Шеф-кухар
  - Учасники класу
  motivation: 'Всі форми наказового способу: наріжте (2pl), хай закипить (3sg), помішаймо (1pl)'
content_outline:
- section: 'Хай і нехай: Наказ для третіх осіб'
  words: 550
  points:
  - 'Утворення: хай/нехай + теперішній час третьої особи (недоконаний) або форма майбутнього часу доконаного виду. Хай він читає (Let him read). Нехай вона прочитає (Let her read it through).'
  - 'Використання: дозвіл (Хай іде, я не проти — Let him go, I don''t mind), побажання (Хай щастить! — Good luck!), непрямий наказ (Нехай вони подзвонять — Have them call).'
  - 'Хай проти нехай: нехай є трохи більш формальним/книжним, хай — щоденне мовлення. Обидва правильні і взаємозамінні за значенням.'
  - 'Множина: Хай вони прийдуть. Нехай діти граються. Дієслово узгоджується з підметом в особі та числі, як зазвичай.'
  - 'Вибір виду: Хай пише (let him write — ongoing) проти Хай напише (let him write it — get it done).'
- section: 'Читаймо! Ходімо! Перша особа множини'
  words: 450
  points:
  - 'Утворення: основа дієслова + -мо. З наказового способу 2-ї особи однини: читай → читаймо (let''s read), ходи → ходімо (let''s go), зробі → зробімо (let''s do it), поїдь → поїдьмо (let''s go by vehicle).'
  - 'Альтернатива з давайте: давайте читати (let''s read), давайте поїдемо (let''s go). Давайте є м''якшим, більше схожим на пропозицію.'
  - 'Поширені форми на -мо у повсякденному житті: Ходімо! (Let''s go!), Починаймо! (Let''s start!), Зробімо це! (Let''s do it!), Поїдьмо! (Let''s drive!), Поговорімо (Let''s talk).'
  - 'Значення виду: Ходімо до парку (Let''s go — одна поїздка, також можливий відтінок доконаного виду через піді-мо) проти Читаймо щодня (Let''s read every day — недоконаний, звичний).'
- section: 'Кличний + наказовий + орудний: Побажання'
  words: 550
  points:
  - 'Потужна українська конструкція: кличний відмінок (звертання) + наказовий спосіб (команда/побажання) + орудний відмінок (ким/чим бути). Оленко, будь щасливою! (Olenko, be happy!) — кличний Оленко + наказовий будь + орудний щасливою.'
  - 'Більше прикладів: Друзі, будьте здоровими! (Friends, be healthy!). Мамо, будь спокійною! (Mom, be calm!). Діти, будьте уважними! (Children, be attentive!).'
  - 'Благословення та тости — жива українська традиція: Будьте здорові! Будь щаслива! Живи довго! Це не просто граматика — це культура.'
  - 'Повторення кличного відмінка для цієї моделі: Олена → Оленко, мама → мамо, друг → друже, друзі → друзі (Nom.Pl. = Voc.Pl. для більшості іменників), дитина → дитино.'
  - 'Розширені побажання: Хай тобі щастить! (May you have luck!). Нехай здійсняться всі мрії! (May all dreams come true!). Поєднання хай + 3-тя особа зі звертанням у кличному відмінку.'
- section: 'Вид дієслова в наказовому способі'
  words: 450
  points:
  - 'Недоконаний вид = загальна інструкція, повторювана дія або ввічливість: Читай більше! (Read more — general advice). Пишіть щодня! (Write every day — habitual). Сідайте, будь ласка (Please sit down — polite invitation).'
  - 'Доконаний вид = конкретна одноразова команда з очікуваним результатом: Прочитай цю статтю! (Read this article — and finish it). Напиши мені! (Write to me — do it). Закрий двері! (Close the door — now).'
  - 'Заперечні накази — зазвичай недоконаний вид: Не читай це! (Don''t read this). Не відкривайте вікно! (Don''t open the window). Використання доконаного виду в запереченні може звучати різко або як попередження: Не впади! (Don''t fall! — careful!).'
  - 'Підсумкова таблиця: загальна порада → недок., конкретне завдання → док., звична дія → недок., заперечення → зазвичай недок., термінове попередження → док.'
- section: Підсумок
  words: 200
  points:
  - 'Повторіть наказовий спосіб третьої особи з хай/нехай (хай він читає) та пропозиції від першої особи множини на -мо (читаймо). Самоперевірка: Як перекласти "Let him go" та "Let''s start!" українською?'
  - 'Побажання утворюються за допомогою кличного відмінка + наказового способу + орудного відмінка (Оленко, будь щасливою!). Самоперевірка: Зверніться до друга (друг) і побажайте йому бути здоровим (здоровий). Якою є форма кличного відмінка від слова "мама"?'
  - 'Вибір виду в наказовому способі: недоконаний для загальних порад, повторюваних дій або ввічливості (читай більше); доконаний для конкретних одноразових команд (прочитай це). Самоперевірка: Яка різниця між "Пишіть щодня" та "Напиши мені"? Чому заперечні команди зазвичай використовують недоконаний вид?'
vocabulary_hints:
  required:
  - хай (let — particle for 3rd person imperative)
  - нехай (let — formal variant)
  - наказовий спосіб (imperative mood)
  - побажання (wish, blessing)
  - кличний відмінок (Vocative case)
  - будь / будьте (be — imperative of бути)
  - щасливий / щасливою (happy / happy — Instr.f.)
  - здоровий / здоровими (healthy / healthy — Instr.pl.)
  - ходімо (let's go)
  - давайте (let's — suggestion particle)
  recommended:
  - спокійний (calm)
  - уважний (attentive)
  - живи (live — imperative)
  - здійснитися (to come true)
  - мрія (dream)
activity_hints:
- type: fill-in
  focus: 'Утворіть правильну форму наказового способу — 3-тя особа з хай/нехай або 1-ша особа множини на -мо — із заданих інфінітивів'
  items: 8
- type: quiz
  focus: 'Виберіть правильний вид (недоконаний чи доконаний) для наказового способу в різних ситуаціях (загальна порада проти конкретної команди)'
  items: 8
- type: match-up
  focus: 'З''єднайте комбінації кличного відмінка + наказового способу + орудного відмінка, щоб утворити правильні побажання (Оленко + будь + щасливою)'
  items: 8
- type: unjumble
  focus: 'Перевпорядкуйте слова, щоб утворити правильні речення в наказовому способі — команди, пропозиції на -мо та побажання з кличним + будь + орудний'
  items: 6
references:
- title: Заболотний Grade 6, §50-51
  notes: 'Наказовий спосіб дієслів — утворення для всіх осіб'
- title: Заболотний Grade 6
  notes: 'Кличний відмінок у поєднанні з наказовим способом'