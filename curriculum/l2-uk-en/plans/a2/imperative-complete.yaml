module: a2-044
level: A2
sequence: 44
slug: imperative-complete
version: '1.0'
title: Хай він прочитає!
subtitle: Наказовий спосіб для всіх осіб — хай/нехай, -мо, кличний + побажання
focus: grammar
pedagogy: PPP
phase: A2.6 [Aspect, Tenses, and Motion]
word_target: 2000
objectives:
  - Learner can form and use 3rd person imperatives with хай/нехай + present 
    tense (хай мріє, нехай прочитає, хай вони підуть) for indirect commands, 
    wishes, and permissions.
  - Learner can form and use 1st person plural imperatives with -мо (читаймо, 
    ходімо, зробімо, давайте поїдемо) for group invitations and suggestions.
  - Learner can combine the Vocative case with imperatives and Instrumental case
    to express wishes and blessings (Оленко, будь щасливою! Друзі, будьте 
    здоровими!).
  - Learner can choose the correct aspect for imperatives — imperfective for 
    general/repeated actions (читай щодня) vs. perfective for specific/one-time 
    results (прочитай цю книгу).
dialogue_situations:
  - setting: 'Ukrainian cooking class — the chef gives commands to students: Наріжте
      цибулю (f, onion)! Хай вода (f) закипить! Помішаймо разом! Нехай соус (m) настоїться!'
    speakers:
      - Шеф-кухар
      - Учасники класу
    motivation: 'All imperative forms: наріжте (2pl), хай закипить (3sg), помішаймо
      (1pl)'
content_outline:
  - section: 'Хай і нехай: Наказ для третіх осіб (3rd Person Imperatives)'
    words: 550
    points:
      - 'Formation: хай/нехай + 3rd person present tense (imperfective) or perfective
        present form (future meaning). Хай він читає (Let him read). Нехай вона прочитає
        (Let her read it through).'
      - 'Uses: permission (Хай іде, я не проти — Let him go, I don''t mind), wish
        (Хай щастить! — Good luck!), indirect command (Нехай вони подзвонять — Have
        them call).'
      - 'Хай vs. нехай: нехай is slightly more formal/literary, хай is everyday speech.
        Both are correct and interchangeable in meaning.'
      - 'Plural: Хай вони прийдуть. Нехай діти граються. The verb agrees with the
        subject in person and number as usual.'
      - 'Aspect choice: Хай пише (let him write — ongoing) vs. Хай напише (let him
        write it — get it done).'
  - section: 'Читаймо! Ходімо! Перша особа множини (1st Person Plural Imperatives)'
    words: 450
    points:
      - 'Formation: verb stem + -мо. From the 2nd person singular imperative: читай
        → читаймо (let''s read), ходи → ходімо (let''s go), зробі → зробімо (let''s
        do it), поїдь → поїдьмо (let''s go by vehicle).'
      - 'Alternative with давайте: давайте читати (let''s read), давайте поїдемо (let''s
        go). Давайте is softer, more of a suggestion.'
      - 'Common -мо forms in daily life: Ходімо! (Let''s go!), Починаймо! (Let''s
        start!), Зробімо це! (Let''s do it!), Поїдьмо! (Let''s drive!), Поговорімо
        (Let''s talk).'
      - 'Aspect matters: Ходімо до парку (Let''s go — one trip, perfective nuance
        via піді-мо is also possible) vs. Читаймо щодня (Let''s read every day — imperfective,
        habitual).'
  - section: 'Кличний + наказовий + орудний: Побажання (Vocative + Imperative + Instrumental:
      Wishes)'
    words: 550
    points:
      - 'The powerful Ukrainian construction: Vocative (address) + Imperative (command/wish)
        + Instrumental (what to be/become). Оленко, будь щасливою! (Olenko, be happy!)
        — Vocative Оленко + imperative будь + Instrumental щасливою.'
      - 'More examples: Друзі, будьте здоровими! (Friends, be healthy!). Мамо, будь
        спокійною! (Mom, be calm!). Діти, будьте уважними! (Children, be attentive!).'
      - 'Blessings and toasts — a living Ukrainian tradition: Будьте здорові! Будь
        щаслива! Живи довго! These are not just grammar — they are culture.'
      - 'Vocative review for this pattern: Олена → Оленко, мама → мамо, друг → друже,
        друзі → друзі (Nom.Pl. = Voc.Pl. for most nouns), дитина → дитино.'
      - 'Extended wishes: Хай тобі щастить! (May you have luck!). Нехай здійсняться
        всі мрії! (May all dreams come true!). Combining хай + 3rd person with Vocative
        address.'
  - section: Вид дієслова в наказовому способі (Aspect in Imperatives)
    words: 450
    points:
      - 'Imperfective imperative = general instruction, repeated action, or politeness:
        Читай більше! (Read more — general advice). Пишіть щодня! (Write every day
        — habitual). Сідайте, будь ласка (Please sit down — polite invitation).'
      - 'Perfective imperative = specific one-time command with expected result: Прочитай
        цю статтю! (Read this article — and finish it). Напиши мені! (Write to me
        — do it). Закрий двері! (Close the door — now).'
      - 'Negative imperatives — typically imperfective: Не читай це! (Don''t read
        this). Не відкривайте вікно! (Don''t open the window). Using perfective in
        negation can sound harsh or warning-like: Не впади! (Don''t fall! — careful!).'
      - 'Summary table: general advice → impf., specific task → pf., habitual → impf.,
        negative → usually impf., urgent warning → pf.'
vocabulary_hints:
  required:
    - хай (let — particle for 3rd person imperative)
    - нехай (let — formal variant)
    - наказовий спосіб (imperative mood)
    - побажання (wish, blessing)
    - кличний відмінок (Vocative case)
    - будь / будьте (be — imperative of бути)
    - щасливий / щасливою (happy / happy — Instr.f.)
    - здоровий / здоровими (healthy / healthy — Instr.pl.)
    - ходімо (let's go)
    - давайте (let's — suggestion particle)
  recommended:
    - спокійний (calm)
    - уважний (attentive)
    - живи (live — imperative)
    - здійснитися (to come true)
    - мрія (dream)
activity_hints:
  - type: fill-in
    focus: Form the correct imperative — 3rd person with хай/нехай or 1st plural
      with -мо — from given infinitives
    items: 8
  - type: quiz
    focus: Choose the correct aspect (imperfective or perfective) for 
      imperatives in various situations (general advice vs. specific command)
    items: 8
  - type: match-up
    focus: Match Vocative + imperative + Instrumental combinations to create 
      correct wishes (Оленко + будь + щасливою)
    items: 8
  - type: unjumble
    focus: Reorder words to form correct imperative sentences — commands, 
      suggestions with -мо, and wishes with Vocative + будь + Instrumental
    items: 6
references:
  - title: Заболотний Grade 6, §50-51
    notes: Наказовий спосіб дієслів — formation for all persons
  - title: Заболотний Grade 6
    notes: Кличний відмінок у поєднанні з наказовим способом
