vocabulary_hints:
  required:
  - зроблений (made/done) — зроблено в Україні, зроблена робота; High frequency, essential
    for branding and national identity
  - відкритий (open) — відкриті двері, відкритий урок; High frequency, used for general
    states of openness
  - зачинений (closed/shut) — зачинено на ремонт, магазин зачинено; High frequency,
    specific sign/register for shops and doors
  - написаний (written) — написаний лист, написано власноруч (written by hand); Medium
    frequency, common in formal/written registers
  - читаючи (while reading) — читаючи книгу, він усміхався; Model for present gerund;
    emphasizes simultaneous action
  - написавши (having written) — написавши лист, вона пішла; Model for past gerund;
    used for sequential actions
  recommended:
  - зайнятий (occupied/busy) — місце зайнято, я зайнятий; High frequency daily usage;
    essential for phone calls and social settings
  - зламаний (broken) — зламаний ліфт, телефон зламано; Medium frequency; useful for
    reporting technical issues
  - підготовлений (prepared) — підготовлений до іспиту, підготовлений звіт; High utility
    in academic and work contexts
  - працюючи (while working) — працюючи вдома, вона слухає музику; High utility for
    discussing modern work habits
  - повернувшись (having returned) — повернувшись додому; Essential for narrative
    sequencing and storytelling
  - забутий (forgotten) — забутий пароль, забуті речі; Common in travel and digital
    contexts
