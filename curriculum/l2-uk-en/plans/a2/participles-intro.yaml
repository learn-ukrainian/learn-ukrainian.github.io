vocabulary_hints:
  required:
  - 'зроблений (made/done) — зроблено в Україні, зроблена робота'
  - 'написаний (written) — написаний лист, написано від руки'
  - 'відкритий (open) — відкриті двері, магазин відкрито'
  - 'закритий (closed) — зачинено на ремонт, закритий простір'
  - 'читаючи (while reading) — читаючи книгу, він усміхався'
  - 'написавши (having written) — написавши лист, вона пішла'
  recommended:
  - 'зайнятий (occupied/busy) — місце зайнято, я зайнятий'
  - 'зламаний (broken) — зламаний телефон, ліфт зламано'
  - 'підготовлений (prepared) — підготовлений до іспиту'
  - 'працюючи (while working) — працюючи вдома, вона слухає музику'
  - 'повернувшись (having returned) — повернувшись додому'
  - 'забутий (forgotten) — забутий пароль, забуті речі'
