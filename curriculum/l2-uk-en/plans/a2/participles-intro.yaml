module: a2-70
level: A2
sequence: 70
slug: participles-intro
version: '2.0'
title: Introduction to Participles
subtitle: Past Passive Participles & Gerunds
content_outline:
- section: 'Вступ: Дієприкметники навколо нас (Introduction: Participles Around Us)'
  words: 450
  points:
  - 'Alignment with State Standard 2024: Scaffolding B1 morphological concepts (§4.2.3.1)
    through the lens of A2 adjectival declension (§4.2.1.2) for practical communication.'
  - 'Passive encounter in daily life: explaining why learners find participles in
    signs, labels, and instructions before they master the generative grammar.'
  - 'Functional goal: prioritizing the recognition of high-frequency ''adjectival''
    participles (open, closed, busy) over complex grammatical transformation.'
- section: Дієприкметники минулого часу (Past Passive Participles)
  words: 850
  points:
  - Formation patterns using -ний and -тий suffixes from perfective verb stems (зробити
    → зроблений, відкрити → відкритий).
  - 'Agreement rules: treating participles as adjectives in gender, number, and case
    (e.g., написаний лист, написана книга, написане слово).'
  - 'Learner error prevention: focusing on ''Agreement Mismatch'' (e.g., fixing «двері
    відкритий» to plural «двері відкриті») since participles behave exactly like adjectives.'
  - 'High-utility lexical set: practicing with essential daily words from research
    frequency data, including «зайнятий» (occupied), «зламаний» (broken), and «забутий»
    (forgotten).'
- section: Безособові форми на -но, -то (Impersonal Forms in -no, -to)
  words: 650
  points:
  - 'The predicative function of short forms in public signage and administrative
    style: «Магазин відкрито», «Вхід зачинено».'
  - 'National identity hook: Deep dive into the branding initiative «Зроблено в Україні»
    (Made in Ukraine) as a ubiquitous example of the -но form in marketing and economic
    patriotism.'
  - 'Nuance check: distinguishing between the general state «закритий» and the specific
    sign/action «зачинено» used for doors, shops, and institutions.'
- section: 'Дієприслівники: Одночасна та попередня дія (Gerunds: Simultaneous and
    Prior Actions)'
  words: 650
  points:
  - Formation of present gerunds (-ючи/-ачи) for simultaneous actions (працюючи —
    while working) and past gerunds (-вши/-ши) for completed actions (написавши —
    having written).
  - 'The Golden Rule of Gerunds: the subject of the gerund must match the subject
    of the main verb to avoid the ''Dangling Gerund'' error (e.g., correcting «Читаючи
    книгу, світло згасло»).'
  - 'Folk wisdom integration: using the proverb «Скінчивши діло — гуляй сміло» (Having
    finished the deed, play boldly) as a model for past gerund usage.'
- section: Помилки та Культурний контекст (Errors and Cultural Context)
  words: 400
  points:
  - 'The ''Active Participle Ban'': training learners to avoid Russian/English calques
    with -ючий (e.g., *читаючий хлопець*) in favor of relative clauses («хлопець,
    який читає»).'
  - 'Advanced declension in proverbs: analyzing «Дарованому коню в зуби не заглядають»
    to show how participles like «дарований» decline in the dative case.'
  - 'Review and Summary: consolidating the distinction between adjectives (як прикметник)
    and adverbial action descriptors (як прислівник).'
