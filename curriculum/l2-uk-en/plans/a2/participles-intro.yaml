module: a2-70
level: A2
sequence: 70
slug: participles-intro
version: '2.0'
title: Introduction to Participles
subtitle: Past Passive Participles & Gerunds
content_outline:
- section: Introduction / Вступ
  points:
  - 'Why participles matter — State Standard §4.2.3.1 requires дієприкметник and
    дієприслівник at A2; they appear in signs, instructions, and formal texts'
  - 'Passive in everyday life — зроблено в Україні (Made in Ukraine), відчинено/зачинено
    (open/closed); learners already encounter these forms passively'
- section: Дієприкметники минулого часу (Past Passive Participles)
  points:
  - 'Formation with -ний/-тий — зробити→зроблений, написати→написаний, відкрити→відкритий;
    pattern: perfective stem + suffix'
  - 'Agreement patterns — gender/number/case agreement like adjectives: зроблена
    робота, написаний лист, відкриті двері; learner error: forgetting agreement'
  - 'Short forms (predicative) — зроблено, написано, відкрито; used as predicates:
    «Лист написано», «Двері відкрито»; standard ref: §4.2.3.1'
  - 'Common participles in daily life — закритий/відкритий (closed/open),
    зайнятий/вільний (occupied/free), зламаний (broken), підготовлений (prepared)'
- section: Дієприслівники (Gerunds/Adverbial Participles)
  points:
  - 'Present gerunds with -ючи/-ачи — читаючи (while reading), працюючи (while
    working), йдучи (while walking); formation from imperfective verbs'
  - 'Past gerunds with -вши/-ши — написавши (having written), прочитавши (having
    read), повернувшись (having returned); formation from perfective verbs'
  - 'Usage in sentences — simultaneous action: «Читаючи книгу, він пив каву»;
    prior action: «Написавши лист, вона пішла»; learner error: dangling
    participles (subject must match)'
- section: Порівняння і практика
  points:
  - 'Participle vs gerund — дієприкметник describes a noun (як прикметник),
    дієприслівник describes an action (як прислівник); side-by-side comparison'
  - 'Recognition practice — identifying participles and gerunds in authentic texts
    (signs, instructions, news headlines)'
- section: Practice / Практика
  points:
  - Formation drills — convert verbs to participles and gerunds
  - 'Agreement practice — match participles to nouns in gender/number'
  - 'Sentence combination — join two sentences using gerunds'
- section: Dialogues / Діалоги
  points:
  - 'Reading signs and notices — «Зачинено на ремонт», «Підготовлений до відправки»'
  - 'Describing completed actions — using short participle forms in conversation'
focus: grammar
pedagogy: PPP
prerequisites:
- a2-69 (Online Services)
connects_to:
- a2-71 (A2 Final Exam)
objectives:
- Learner can recognize and form past passive participles (-ний/-тий)
- Learner can use short participle forms (зроблено, написано)
- Learner can form and use present gerunds (-ючи/-ачи)
- Learner can form and use past gerunds (-вши/-ши)
grammar:
- past passive participles (-ний/-тий forms)
- short predicative forms (-но/-то)
- present gerunds (-ючи/-ачи)
- past gerunds (-вши/-ши)
- agreement patterns for participles
