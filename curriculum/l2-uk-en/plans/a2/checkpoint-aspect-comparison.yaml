module: a2-030
level: A2
sequence: 30
slug: checkpoint-aspect-comparison
version: '2.0'
title: 'Checkpoint: Aspect, Comparison & Modality'
subtitle: Review of Modules 11-24
focus: checkpoint
pedagogy: TTT
phase: A2.2
word_target: 1500
objectives:
- Learner can integrate aspect, comparison, and mood in complex scenarios
- Learner can count objects and money with correct agreement
- Learner can use real conditions with якщо in practical scenarios
- Learner can distinguish between process and result across tenses
sources:
- name: Ukrainian State Standard 2024 - A2 Review
  url: https://mon.gov.ua/
  type: reference
  notes: Standards for integrating intermediate A2 skills
content_outline:
- section: 'Огляд та вступ: Карта навичок (Overview and Introduction: Skill Map)'
  words: 200
  points:
  - 'Consolidating the ''Quality and Time'' block: uniting Aspect, Comparison, Modality, and Numerals into a cohesive system
    based on M11-M24'
  - 'Visual map of skills: how process vs result, degrees of quality, and hypothetical moods interconnect to form complex
    A2 level communication'
  - 'Goal setting: bridging foundational A2 grammar to the complex narratives and integration required for the upcoming M26'
- section: 'Вид дієслова: Процес та результат (Verbal Aspect: Process and Result)'
  words: 275
  points:
  - 'Reinforcing the ''Present Tense Rule'' (State Standard §4.2.3.1): present is exclusively Imperfective. Learner error:
    using perfective for the immediate present (*Я зроблю зараз* instead of *Я роблю*)'
  - 'Aspect pair mastery (State Standard §4.3.2): deep review of robi/zrobiti and pisati/napisati with focus on completion
    vs duration'
  - 'Cultural Hook: Hospitality and Aspect. Using Imperfective for warm, open invitations (*Приходьте до нас!*) vs the bluntness
    of Perfective (*Прийдіть*) in social contexts'
- section: 'Ступені порівняння: Від якості до досконалості (Degrees of Comparison: From Quality to Perfection)'
  words: 275
  points:
  - 'Simple vs Compound Comparison (State Standard §4.3.1): drills on suffix forms (-іш/-ійш) vs analytical forms (більш/менш)'
  - 'The ''Double Comparative'' Trap: explicit correction of learner error *більш кращий*—you must choose either simple or
    compound, never both'
  - 'Irregular comparisons: master table for великий/більший, малий/менший, добрий/кращий, поганий/гірший'
  - 'Proverb integration: «Краще пізно, ніж ніколи» — analyzing why the comparative is used to soften apologies and social
    friction'
- section: Умови та узгодження числівників (Conditions and Numeral Agreement)
  words: 350
  points:
  - 'Real conditions review (State Standard §4.4.2): using якщо + present/future in practical planning scenarios; якщо vs коли
    distinction drill'
  - 'The 1-2-5 Rule (State Standard §4.2.1.3): addressing the Numeral Collision error where learners use Genitive Plural for
    everything. Drill: 2-4 Nominative Plural (*два столи*) vs 5+ Genitive Plural (*п''ять столів*)'
  - 'Synthesizing conditions and numbers: counting money and time in conditional scenarios (e.g., ''Якщо маєш 100 гривень...'')'
- section: Синтез та практичне завдання (Synthesis and Integration Challenge)
  words: 400
  points:
  - 'TTT Pedagogy: The Synthesis Dialogue. Learners analyze a complex conversation where a speaker chooses aspects, comparisons,
    and moods to negotiate a plan'
  - 'Aspect Transformation Marathon: rapid-fire switching of sentences from process-oriented to result-oriented contexts'
  - 'The Event Planning Challenge: combined task using all skills to plan a cultural event (dates, participant numbers, preferences,
    and hypothetical backup plans)'
vocabulary_hints:
  required:
  - 'робити / зробити (to do/make) — Top 10 Verb; collocations: робити вибір (to make a choice), зробити роботу (to get work
    done)'
  - 'добрий / кращий (good / better) — Top 5 Adjective; collocations: кращий друг (best friend), доброго ранку (good morning)'
  - 'один / одна / одне (one) — High frequency (State Standard §4.2.1.3); collocations: один раз (once), одна хвилина (one
    minute)'
  - 'писати / написати (to write) — High frequency aspect pair; collocations: писати лист (writing a letter), написати книгу
    (to write/finish a book)'
  - 'великий / більший (big / bigger) — Core suppletive comparative; collocation: більший за розміром (bigger in size)'
  recommended:
  - вчасно (on time) — critical marker for perfective aspect (result/completion)
  - пізно (late) — essential for the proverb «Краще пізно, ніж ніколи»
  - вибір (choice) — key noun for making comparisons and decisions
  - більш (more) — used for compound comparison; note the double comparative trap (never say *більш кращий*)
persona:
  voice: Encouraging Cultural Guide
  role: Language Exam Proctor
grammar:
- Aspect pairs review (process vs result)
- Degrees of comparison (Regular/Irregular)
- Real conditions with якщо (якщо vs коли)
- Imperative system (Direct/Indirect)
- Numeral-noun agreement (1-2-5 rule)
