vocabulary_hints:
  required:
  - 'робити / зробити (to do/make) — collocations: робити вибір (make a choice), зробити
    роботу (get work done)'
  - 'добрий / кращий (good / better) — collocations: доброго ранку (good morning),
    кращий друг (best friend)'
  - 'один / одна / одне (one) — collocations: один раз (once), одна хвилина (one minute)'
  - 'писати / написати (to write) — collocations: писати лист (writing a letter),
    написати книгу (write a book)'
  - 'великий / більший (big / bigger) — collocation: більший за розміром (bigger in
    size)'
  recommended:
  - 'вчасно (on time) — context: aspect nuances'
  - 'пізно (late) — context: «Краще пізно, ніж ніколи»'
  - 'вибір (choice) — context: making comparisons'
word_target: 3000
