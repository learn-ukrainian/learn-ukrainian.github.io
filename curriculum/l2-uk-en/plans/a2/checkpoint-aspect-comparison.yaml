module: a2-25
level: A2
sequence: 25
slug: checkpoint-aspect-comparison
version: '2.0'
title: 'Checkpoint: Aspect, Comparison & Modality'
subtitle: Review of Modules 11-24
content_outline:
- section: Огляд / Overview
  points:
  - Consolidating the 'Quality and Time' block — uniting Aspect, Comparison, Modality,
    and Numerals into a cohesive system
  - The map of skills from M11 to M24 — visualization of how isolated topics (process
    vs result, degrees, mood) interconnect
- section: 'Skill 1: Verbal Aspect (Вид дієслова: Процес та результат)'
  points:
  - 'Process vs Result distinction — reinforcing that Present tense is exclusively
    Imperfective (learner error: *Я зроблю зараз*)'
  - Aspect pair review — focus on common pairs like робити/зробити, писати/написати
    — aligned with State Standard §4.3.2
  - 'Cultural hook: Hospitality — using Imperfective for warm invitations (*Приходьте
    до нас!* vs *Прийдіть*)'
- section: 'Skill 2: Degrees of Comparison (Ступені порівняння)'
  points:
  - Comparative and superlative forms — Simple (-іш/-ійш) vs Compound (більш/менш)
    — aligned with State Standard §4.3.1
  - Irregular comparatives — visual table for великий/більший, малий/менший, добрий/кращий,
    поганий/гірший
  - 'Learner error: The ''Double Comparative'' Trap — avoiding *більш кращий* (redundancy)'
  - 'Proverb: «Краще пізно, ніж ніколи» — everyday usage of comparatives to soften
    situations'
- section: 'Skill 3: Modality (Умовний та наказовий способи)'
  points:
  - Conditional and imperative moods — distinct forms for requests vs hypothetical
    situations — aligned with State Standard §4.2.3.1
  - Real vs unreal conditions — bridging A2 'if' clauses to B1 standards (State Standard
    §4.4.3 preview)
- section: 'Skill 4: Numeral Agreement (Узгодження числівників)'
  points:
  - Zone 1-2-3 agreement rules — reviewing Nominative Plural (2, 3, 4) vs Genitive
    Plural (5+) — aligned with State Standard §4.2.1.3
  - 'Counting with nouns — learner error: using Genitive Plural for 2-4 because ''it
    is plural'' in English'
- section: Practice / Практика (The Mega-Review)
  points:
  - Aspect transformation — switching sentences from process to result
  - Comparison marathon — rapid-fire adjective graduation
  - Modality check — converting statements to polite requests or hypotheticals
  - Counting money — practical application of 1-2-5 rule with currency
- section: 'Dialogue / Діалог: Synthesis (Синтез навичок)'
  points:
  - 'Synthesizing all four skills in dialogue with analysis — TTT pedagogy: analyze
    choices made in a complex conversation'
- section: Integration Challenge / Інтеграційне завдання
  points:
  - Combined task using all skills — e.g., planning an event (dates, numbers, preferences,
    hypothetical backup plans)
focus: checkpoint
pedagogy: TTT
objectives:
- Learner can integrate aspect, comparison, and mood in complex scenarios
- Learner can count objects and money with correct agreement
- Learner can make polite requests and hypothetical dreams
- Learner can distinguish between process and result across tenses
grammar:
- Aspect pairs review (process vs result)
- Degrees of comparison (Regular/Irregular)
- Conditional mood (Real vs Unreal)
- Imperative system (Direct/Indirect)
- Numeral-noun agreement (1-2-5 rule)
module_type: checkpoint
