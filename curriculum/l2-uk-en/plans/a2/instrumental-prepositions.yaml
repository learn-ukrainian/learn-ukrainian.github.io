level: A2
module_id: 24
slug: instrumental-prepositions
title: Над, під, між
subtitle: The Instrumental Case with Spatial Prepositions
word_target: 2000
objectives:
- 'Навчитися вживати орудний відмінок з просторовими прийменниками: ''над'', ''під'',
  ''перед'', ''за'', ''між''.'
- Навчитися використовувати прийменник 'перед' для позначення часу.
- Практикувати утворення орудного відмінка іменників після цих прийменників.
- Навчитися описувати розташування предметів у просторі.
content_outline:
- section: 'Вступ: Де це?'
  points:
  - Пояснення ролі прийменників для опису точного місця розташування.
  - Огляд прийменників, що вимагають орудного відмінка.
- section: Просторові прийменники + Орудний відмінок
  points:
  - 'над + О.в. (above, over): лампа над столом.'
  - 'під + О.в. (under): кіт під стільцем.'
  - 'перед + О.в. (in front of): машина перед будинком.'
  - 'за + О.в. (behind): парк за школою.'
  - 'між + О.в. (between): магазин між банком і поштою (вимагає двох іменників).'
- section: Часове значення прийменника 'перед'
  points:
  - 'перед + О.в. (before): перед роботою, перед сном, перед обідом.'
  - Порівняння з 'до' + Родовий відмінок.
- section: 'Практика: Описуємо кімнату'
  points:
  - Читання тексту з описом кімнати.
  - Діалог про те, де знаходяться різні предмети в квартирі.
