module: a2-028
level: A2
sequence: 28
slug: instrumental-prepositions
version: 1.1.3
title: Над, під, між
subtitle: Просторові та часові прийменники з орудним відмінком
focus: grammar
pedagogy: PPP
phase: A2.4 [Instrumental Case]
word_target: 2000
objectives:
- Учень може використовувати просторові прийменники над, під, перед, за, між з орудним відмінком для опису розташування.
- Учень вміє використовувати перед + орудний відмінок для часового значення (перед обідом, перед заняттям).
- Учень може відповідати на питання Де?, використовуючи словосполучення "прийменник + орудний відмінок" для розташування.
- Учень вміє розрізняти за + орудний відмінок (behind) і за + знахідний відмінок (for/in favor of) у контексті.
dialogue_situations:
- setting: 'Вказівки всередині музею — просторові прийменники: Картина (f, painting) над каміном (m, fireplace). Скульптура (f) між вікнами (pl). Лавка (f, bench) під деревом (n, tree). Кафе за музеєм (m).'
  speakers:
  - Гід музею
  - Відвідувачі
  motivation: 'Над/під/між/за + орудний відмінок: камін→каміном, вікно→вікнами, дерево→деревом'
content_outline:
- section: 'Просторові прийменники: Де це?'
  words: 600
  points:
  - 'П''ять ключових просторових прийменників, які вимагають орудного відмінка: над (above/over), під (under/below), перед (in front of), за (behind/beyond), між (between).'
  - 'над + Ор.в.: Лампа висить над столом. Птах летить над містом. Хмари над горами.'
  - 'під + Ор.в.: Кіт сидить під столом. Книга лежить під ліжком. Підвал під будинком.'
  - 'перед + Ор.в.: Дерево росте перед будинком. Машина стоїть перед гаражем. Фонтан перед театром.'
  - 'за + Ор.в.: Сад за будинком. Ліс за річкою. Хтось стоїть за дверима.'
  - 'між + Ор.в.: Парк між школою і бібліотекою. Стілець між столом і стіною. Місто між горами.'
- section: 'Описуємо кімнату'
  words: 500
  points:
  - 'Практичне застосування: опис того, де знаходяться предмети в кімнаті — Картина висить над ліжком. Килим лежить під столом. Шафа стоїть між вікном і дверима.'
  - 'Модель запитання-відповіді: Де лампа? — Лампа над столом. Де кіт? — Під ліжком. Де ваза? — Між книгами.'
  - 'Діалог: Двоє сусідів по кімнаті розставляють меблі. Один запитує, куди покласти речі, інший дає вказівки, використовуючи прийменник + орудний відмінок.'
  - 'Накопичення словникового запасу для опису кімнати: стіна, підлога, стеля, кут, шафа, полиця, килим, картина.'
- section: 'Перед обідом, за розкладом: Часове значення'
  words: 450
  points:
  - 'перед + Ор.в. для "before" у часі: перед обідом (before lunch), перед уроком (before class), перед сном (before sleep), перед відпусткою (before vacation).'
  - 'за + Ор.в. для сталих часових виразів: за розкладом (according to schedule), за планом (according to plan).'
  - 'Контраст із просторовим значенням: перед будинком (in front of — просторове) проти перед обідом (before — часове). Однаковий відмінок, різне значення.'
  - 'Поширені вирази щоденного розпорядку: перед сніданком, перед роботою, перед заняттям.'
- section: 'Практика: Де? Коли?'
  words: 450
  points:
  - 'Вправа на опис картинки: подивіться на сцену та опишіть розташування, використовуючи над, під, перед, за, між.'
  - 'Вправа на щоденний розклад: Що ти робиш перед сніданком? Перед роботою? Перед сном?'
  - 'Контрастивні пари: за + орудний відмінок (behind — розташування) проти за + знахідний відмінок (for — мета). За будинком (behind the house) проти Дякую за допомогу (thank you for help).'
  - 'Міні-діалог: Опис району — де знаходиться магазин, де парк, що розташовано між будівлями.'
  - 'Знахідний проти орудного відмінка з під, над, між: розташування (де?) використовує орудний відмінок — Кіт сидить під столом. Напрямок/рух (куди?) використовує знахідний відмінок — Кіт заліз під стіл. Порівняйте: Лампа висить над столом (розташування, Ор.в.) проти Повісь лампу над стіл (напрямок, Зн.в.). Прийменник між дотримується тієї самої моделі, але знахідний відмінок є рідкісним у повсякденному мовленні.'
- section: Підсумок
  words: 200
  points:
  - 'Просторові прийменники (над, під, перед, за, між) використовують орудний відмінок для опису розташування (Де?): Кіт під столом, лампа над ліжком.'
  - 'Прийменник перед + орудний відмінок також використовується для часового "перед" (Коли?): перед обідом, перед сном, перед заняттям.'
  - 'Самоперевірка: Опишіть, де знаходяться 3 предмети у вашій кімнаті, використовуючи над, під, перед, за або між. У чому різниця між "Кіт сидить під столом" та "Кіт заліз під стіл"?'
vocabulary_hints:
  required:
  - над (above, over)
  - під (under, below)
  - перед (in front of; before (temporal))
  - за (behind; according to)
  - між (between)
  - стіл (table)
  - будинок (building, house)
  - ліжко (bed)
  - стіна (wall)
  - обід (lunch)
  recommended:
  - стеля (ceiling)
  - підлога (floor)
  - кут (corner)
  - розклад (schedule)
  - сон (sleep, dream)
