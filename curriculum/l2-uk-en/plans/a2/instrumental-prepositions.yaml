activity_hints:
- type: image_description
  focus: Описати, де знаходяться предмети на зображенні, використовуючи прийменники
    + орудний відмінок.
  items: 10
- type: cloze
  focus: Вставити правильний прийменник ('над', 'під', 'перед', 'за', 'між') у речення.
  items: 15
- type: sentence_correction
  focus: Виправити помилки у відмінках іменників після прийменників.
  items: 12
- type: listening_task
  focus: Прослухати опис кімнати і намалювати схему або відповісти на питання.
  items: 1
- type: question_answer
  focus: Дати відповідь на питання 'Де ...?', використовуючи вивчені конструкції.
  items: 10
