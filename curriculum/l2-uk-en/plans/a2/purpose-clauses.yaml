  items: 8
- type: quiz
  focus: 'Вибрати тому що або щоб для завершення речень — відрізнити причину від мети'
  items: 8
- type: match-up
  focus: 'Перетворити пряму мову на непряму — зіставити оригінальну цитату з її непрямою версією'
  items: 8
- type: unjumble
  focus: 'Розставити слова в правильному порядку, щоб утворити правильні підрядні речення мети з щоб (як з інфінітивом, так і з різними підметами)'
  items: 6
