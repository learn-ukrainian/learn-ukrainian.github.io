slug: purpose-clauses
level: A2
word_target: 2000
title: 'Щоб + інфінітив: Речення мети'
description: Вчимося виражати мету дії та передавати чужі слова.
focus: grammar
objectives:
- Виражати мету дії, використовуючи конструкцію 'щоб + інфінітив'.
- Правильно будувати та розуміти речення з підрядною частиною мети.
- Передавати чужі слова, використовуючи конструкцію 'Він сказав, що...'.
- Розрізняти пряму та непряму мову.
- Розповідати про свої плани та наміри.
content_outline:
- section: 'Вступ: Навіщо ти це робиш?'
  points:
  - 'Питання про мету: ''Навіщо?'', ''Для чого?''.'
  - Короткі відповіді та їх обмеження.
- section: 'Конструкція мети: ''Щоб + інфінітив'''
  points:
  - 'Структура: ''Я йду в магазин, щоб купити хліб''.'
  - 'Використання в різних контекстах: навчання, робота, хобі.'
  - 'Заперечна форма: ''щоб не...''.'
- section: 'Вступ до непрямої мови: ''Що він сказав?'''
  points:
  - Пряма мова (цитата) проти непрямої мови (переказ).
  - 'Ключові дієслова: сказати, думати, знати.'
  - Сполучник 'що' для приєднання підрядної частини.
- section: 'Структура непрямої мови: ''Сказати, що...'''
  points:
  - Як змінюються займенники (я -> він, ти -> я).
  - Узгодження часів (прості випадки).
  - 'Приклади: ''Він сказав: ''Я йду в кіно''.'' -> ''Він сказав, що він іде в кіно''.'
- section: 'Синтез: Розповідаємо історії'
  points:
  - Поєднання речень мети та непрямої мови в коротких розповідях.
  - 'Практика: переказ діалогу або короткої історії.'
