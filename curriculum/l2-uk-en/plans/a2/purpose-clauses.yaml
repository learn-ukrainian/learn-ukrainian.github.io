module: a2-048
level: A2
sequence: 48
slug: purpose-clauses
version: 1.0.3
title: Щоб зрозуміти...
subtitle: Підрядні речення мети та базова непряма мова
focus: grammar
pedagogy: PPP
phase: A2.7 [Складні речення та умовні конструкції]
word_target: 2000
objectives:
- Учень вміє будувати підрядні речення мети за допомогою щоб + інфінітив для вираження цілей та намірів.
- Учень вміє розрізняти конструкції щоб + інфінітив (однаковий підмет) та щоб + дієслово в минулому часі (різні підмети).
- Учень вміє передавати чужі слова, використовуючи він сказав, що... / вона сказала, що... з правильним порядком слів.
- Учень вміє використовувати конструкції мети та непрямої мови в повсякденних комунікативних ситуаціях (пояснення причин, передача повідомлень).
dialogue_situations:
- setting: 'Один із батьків пояснює дитині, навіщо щось робиться: Ми йдемо в магазин, щоб купити хліб (m). Вчителька сказала, що завтра екскурсія (f). Тато попросив, щоб ти прибрав кімнату (f).'
  speakers:
  - Мама
  - Дитина
  motivation: 'Щоб + інфінітив, що (непряма мова) з хліб (m), екскурсія (f)'
content_outline:
- section: 'Щоб + інфінітив: для чого?'
  words: 700
  points:
  - 'Знайомство з підрядними реченнями мети: питання Для чого? Навіщо? та відповідь щоб + інфінітив. Я вчу українську, щоб розуміти друзів.'
  - 'Правило однакового підмета: коли підмет обох частин речення однаковий, використовуйте щоб + інфінітив. Він прийшов, щоб допомогти. Ми поїхали в Київ, щоб побачити місто.'
  - 'Конструкція з різними підметами: коли підмети відрізняються, використовуйте щоб + дієслово в минулому часі (яке має вигляд минулого часу, але функціонує як умовний спосіб). Я зателефонував, щоб вона знала. Вчитель пояснив, щоб учні зрозуміли.'
  - 'Порівняння з тому що: тому що відповідає на питання Чому? (погляд назад на причину), щоб відповідає на питання Для чого? (погляд уперед на мету). Я вчу, бо хочу розуміти проти Я вчу, щоб розуміти.'
- section: 'Базова непряма мова: він сказав, що...'
  words: 700
  points:
  - 'Обсяг на рівні А2: базова непряма мова лише зі що та чи. Узгодження часів, конструкції з якби та складні перетворення — це рівень В1. Тут ми вивчаємо високочастотну модель передачі: він сказав, що...'
  - 'Введення непрямої мови за допомогою що: перетворення прямої мови на непряму. "Я прийду завтра" -> Він сказав, що прийде завтра.'
  - 'Дієслова для передачі слів: сказати, відповісти, пояснити, запитати, додати. Кожне з них приєднує що + підрядна частина. Вона пояснила, що не може прийти.'
  - 'Непрямі запитання з чи: "Ти будеш?" -> Він запитав, чи я буду. У непрямих запитаннях немає знака питання.'
  - 'Практичні ситуації передачі повідомлень: передати інформацію від друга, пояснити те, що вам хтось сказав, переказати телефонну розмову. Природний контекст, а не механічні вправи на перетворення.'
- section: Мета і повідомлення в житті
  words: 600
  points:
  - 'Поєднання мети та непрямої мови в реальних ситуаціях: Мама зателефонувала, щоб я купив хліб. Колега сказав, що зустріч перенесли.'
  - 'Написання коротких повідомлень та записок із використанням щоб та що: СМС, голосові повідомлення, записки на холодильнику. "Зателефонуй мамі, вона сказала, що чекає."'
  - 'Поширені розмовні конструкції: Мені сказали, що... / Я чув, що... / Вони попросили, щоб... — високочастотні рамки для повсякденного спілкування.'
  - 'Закріплення: розрізнення Чому? (тому що/бо з M42) від Для чого? (щоб) та Що сказали? (непряма мова зі що) — три різні використання підрядності.'
- section: Підсумок
  words: 200
  points:
  - 'Підрядні речення мети використовують "щоб + інфінітив" для однакового підмета (Я прийшов, щоб допомогти) та "щоб + дієслово в минулому часі" для різних підметів (Я зателефонував, щоб вона знала). Самоперевірка: Яка різниця між "тому що" та "щоб"? Поясніть, чому ви вивчаєте українську мову, використовуючи "щоб".'
  - 'Базова непряма мова використовує "що" для розповідних речень (Він сказав, що прийде) та "чи" для загальних запитань (Він запитав, чи я буду). Самоперевірка: Як передати речення "Я не можу прийти", якщо це сказала ваша подруга Анна? Передайте повідомлення від колеги, який сказав "Зустріч перенесли".'
vocabulary_hints:
  required:
  - щоб (in order to, so that)
  - мета (goal, purpose)
  - сказати (to say, to tell)
  - відповісти (to answer, to reply)
  - пояснити (to explain)
  - запитати (to ask)
  - повідомлення (message)
  - зрозуміти (to understand)
  - непряма мова (indirect/reported speech)
  - додати (to add)
  recommended:
  - навіщо (what for, why)
  - передати (to pass on, to relay)
  - попросити (to ask, to request)
  - пряма мова (direct speech)
