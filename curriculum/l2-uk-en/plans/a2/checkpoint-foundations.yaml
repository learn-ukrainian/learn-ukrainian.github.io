  - вправа (exercise)
  - перевірка (check, test)
  - контрольна точка (checkpoint)
  - завдання (task)
  - текст (text)
  - речення (sentence)
  - відповідь (answer)
  recommended:
  - правильний (correct)
  - варіант (option, variant)
  - обрати (to choose)
  - написати (to write)
