module: a2-008
level: A2
sequence: 8
slug: checkpoint-foundations
version: 1.1.3
title: 'Контрольна точка: Основи А2'
subtitle: 'Перевірка знань: вид дієслова та родовий відмінок'
focus: review
pedagogy: Review
phase: А2.1 [Основи та вступ до виду дієслова]
word_target: 1500
objectives:
- Здобувач може надійно розрізняти дієслова недоконаного та доконаного виду в заданому тексті.
- Здобувач може правильно утворювати закінчення родового відмінка однини та множини для іменників після слова "немає" та слів, що позначають кількість.
- Здобувач може вибрати відповідний вид (недоконаний або доконаний) для правильного доповнення речення на основі контексту.
- Здобувач може синтезувати нову граматику в короткому абзаці, описуючи плани або минулі події.
dialogue_situations:
- setting: 'Друзі навчаються разом перед заняттям з української мови — перевіряють одне одного за конспектами, один має труднощі з родовим відмінком множини, інший пояснює. Скільки у тебе братів? Двох братів... ні, два брати! Ох, я завжди плутаю.'
  speakers:
  - Олена (студентка)
  - Марко (студент)
  motivation: 'Природна ситуація навчання з однолітками — повторення родового відмінка та виду дієслова через дружню розмову, а не опитування'
content_outline:
- section: 'Частина 1: Вправи на розпізнавання'
  words: 400
  points:
  - 'Вправа 1: Надається короткий текст. Здобувач повинен виділити всі дієслова доконаного виду одним кольором, а всі дієслова недоконаного виду — іншим.'
  - 'Вправа 2: Список речень з іменником у дужках. Здобувач повинен переписати речення, поставивши іменник у правильну форму родового відмінка (наприклад, "У мене немає (брат)" -> "У мене немає брата").'
  - 'Вправа 3: З''єднати дієслова недоконаного виду з їхніми видовими парами доконаного виду.'
- section: 'Частина 2: Вправи на вибір'
  words: 500
  points:
  - 'Вправа 4: Речення з варіантами вибору, де здобувач повинен вибрати між доконаною та недоконаною формою дієслова (наприклад, "Вчора я (читав / прочитав) цю книгу три години").'
  - 'Вправа 5: Заповнення пропусків правильним словом на позначення кількості або числівником, забезпечуючи узгодження іменника (наприклад, "У класі ___ (5) студентів").'
- section: 'Частина 3: Практичне застосування'
  words: 600
  points:
  - 'Вправа 6: Дати відповіді на відкриті запитання, що вимагають родового відмінка або певного виду дієслова (наприклад, "Скільки у вас братів і сестер?", "Що ви зробили вчора?", "Коли у вас день народження?").'
  - 'Вправа 7: Коротке письмове завдання (5-7 речень). "Напишіть про свої плани на вихідні. Що ви будете робити? Що ви хочете зробити?".'
- section: Підсумок
  words: 200
  points:
  - 'Вибір виду дієслова базується на завершеності дії: недоконаний вид для процесу або тривалості (читав), доконаний вид для результату або завершеної дії (прочитав). Родовий відмінок потрібен для вираження відсутності (немає брата) та кількості (5 студентів).'
  - 'Самоперевірка: Яка різниця між "я робив" і "я зробив"? Опишіть 3 речі, яких у вас немає, використовуючи "у мене немає" і правильну форму родового відмінка. Які у вас плани на вихідні?'
vocabulary_hints:
