module: a2-26
level: A2
sequence: 26
slug: telling-stories
version: '2.0'
title: Telling Stories
subtitle: Sequencing Events in Narrative
content_outline:
- section: Introduction / Вступ
  points:
  - 'The power of sequence in daily life — §1.4.1.1.1: transition from listing events
    to cohesive narrative'
  - 'Why ''Robot Style'' fails in social situations — learner error: overuse of «і»
    (and) instead of sequencing words'
- section: Presentation / Презентація
  points:
  - '''Road signs of time: Спочатку, Потім, Нарешті'' — visual metaphor: «Timeline
    Road» or «Train» cars; learner error: «спочатку» (adverb) vs «з початку» (prep);
    word order note: time markers start the sentence'
  - '''Drama and Twists: Раптом, Несподівано'' — metaphor: «Plot Twist» button; collocation:
    «і раптом побачив...»'
  - '''Relative Time: Раніше, Недавно, Давно'''
  - '''Advanced Connectors: Тільки-но, Ледве'''
  - '''Registers: Fairytale vs Report vs Anecdote'' — cultural hook: The Village Storyteller
    (Казкар); opening formula: «Жили-були...»'
- section: Practice / Практика
  points:
  - Sequencing a chaotic morning
  - 'Anekdot completion drills — cultural hook: Ukrainian Laughter (Сміхова культура);
    timing of connectors is crucial for punchlines'
- section: Dialogues / Діалоги
  points:
  - Telling a fishing story or travel adventure
focus: vocabulary
pedagogy: PPP
objectives:
- Learner can sequence events using connectors
- Learner can tell a simple story with a beginning, middle, and end
- Learner can describe unexpected events
- Learner can use time markers to structure narrative
grammar:
- sequencing words (спочатку, потім, нарешті)
- time markers (раптом, одного разу)
- narrative tenses
- structuring a story
module_type: vocabulary
sources:
- name: Ukrainian State Standard 2024 - Narration
  url: https://mon.gov.ua/
  type: reference
  notes: Narrative and sequence requirements for A2
- name: Stylistics of Ukrainian Language - Narrative Flow
  url: https://uk.wikipedia.org/wiki/Оповідь
  type: reference
  notes: Logical connectors in Ukrainian prose
immersion: 60-75% Ukrainian
phase: A2.2
persona:
  voice: Encouraging Cultural Guide
  role: Village Storyteller
vocabulary_hints:
  required:
  - спочатку (at first) — спочатку я..., спочатку було...
  - потім (then/afterwards) — а потім, потім ми...
  - нарешті (finally) — нарешті прийшов, нарешті сталося
  - раптом (suddenly) — і раптом побачив, раптом почався
  - одного разу (once/one day) — одного разу влітку, одного разу я...
  - несподівано (unexpectedly) — несподівано з'явився, несподівано для всіх
  - казка (fairytale) — читати казку, народна казка
  - анекдот (joke/anecdote) — розповідати анекдот, смішний анекдот
word_target: 3000
