level: A2
word_target: 2000
title: На пошті
subtitle: Застосування давального відмінка в спілкуванні
slug: services-and-communication
focus: communication
status: DRAFT
objectives:
- Активізувати використання давального відмінка в типових комунікативних ситуаціях
  (на пошті, в магазині, на вулиці).
- Навчитись просити про допомогу, послугу або пораду, звертаючись до когось.
- Навчитись дякувати за послугу або допомогу.
- Практикувати використання безособових конструкцій ("мені потрібно...") для вираження
  потреб.
- Розуміти оголошення та інструкції, адресовані людям.
content_outline:
- section: 'Діалог: На пошті'
  points:
  - 'Лексика: лист, посилка, марка, конверт, адреса, отримувач, відправник.'
  - 'Ключові фрази: ''Допоможіть мені, будь ласка'', ''Я хочу надіслати лист (кому?)
    братові в Польщу'', ''Скільки це коштує?'', ''Дякую вам за допомогу''.'
  - Приклад діалогу між клієнтом та працівником пошти.
- section: 'Діалог: В магазині'
  points:
  - 'Ключові фрази для звернення до продавця: ''Покажіть мені, будь ласка...'', ''Порадьте
    мені, будь ласка...'', ''Чи можете ви мені допомогти?''.'
  - Приклад діалогу про вибір подарунка для друга.
- section: Вираження потреб та прохань
  points:
  - 'Використання конструкції ''Мені потрібно...'': ''Мені потрібна одна марка по
    Україні''.'
  - 'Прямі прохання з давальним відмінком: ''Дайте мені, будь ласка...'', ''Напишіть
    мені свій номер телефону''.'
- section: Публічні оголошення
  points:
  - Аналіз типових оголошень в транспорті або громадських місцях.
  - 'Приклади: ''Шановним пасажирам! Будь ласка, приготуйте квитки для контролю'',
    ''Відвідувачам музею заборонено фотографувати зі спалахом''.'
vocabulary_hints:
  required:
  - пошта (post office)
  - лист (letter)
  - посилка (parcel)
  - марка (stamp)
  - конверт (envelope)
  - адреса (address)
  - отримувач (recipient)
  - відправник (sender)
  - продавець (shop assistant)
  - клієнт (client, customer)
  - допомога (help)
  - послуга (service)
  recommended:
  - бланк (form)
  - підпис (signature)
  - заповнити (to fill in)
  - вага (weight)
  - вартість (cost)
  - каса (cash desk)
  - решта (change)
activity_hints:
- type: role-play-prompts
  focus: Відпрацювання діалогів у реалістичних ситуаціях.
  config:
    quantity: 5
    scenarios:
    - Ви на пошті. Вам потрібно відправити посилку бабусі в село.
    - Ви в магазині одягу. Попросіть продавця допомогти вам знайти ваш розмір.
    - Ви на вулиці. Запитайте перехожого, як пройти до найближчої аптеки.
- type: dialogue-ordering
  focus: Розуміння логіки та структури діалогу.
  config:
    quantity: 1
    scrambled_dialogue:
    - '- Дякую вам. Ось гроші.'
    - '- Добрий день! Дайте мені, будь ласка, два конверти по Україні.'
    - '- Ваша решта. - Дякую, до побачення!'
    - '- З вас 30 гривень.'
    - '- Добрий день! Будь ласка. Щось ще?'
- type: listening-comprehension
  focus: Розуміння на слух оголошень та інструкцій.
  config:
    quantity: 8
    audio_prompts:
    - Шановним пасажирам! Наступна зупинка - 'Університет'.
    - Водієві автобуса потрібен відпочинок.
    questions:
    - Кому адресовано це повідомлення?
    - Кому потрібен відпочинок?
- type: fill-in-the-blanks
  focus: Вживання правильних форм слів у контексті діалогів.
  config:
    quantity: 15
    context: A dialogue at a train station ticket office.
sequence: 19
module: a2-019
version: '1.0'
phase: A2.3 [Dative Case]
