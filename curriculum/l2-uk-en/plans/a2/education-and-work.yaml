slug: education-and-work
level: A2
word_target: 2000
title: Освіта та робота
description: Застосовуємо складні речення для розмов про навчання та кар'єру.
focus: communication
objectives:
- Розповідати про свою освіту та спеціальність.
- Описувати свою роботу та професійні обов'язки.
- Пояснювати, чому ви обрали свою професію, використовуючи складні речення.
- Обговорювати майбутні кар'єрні плани, використовуючи умовні речення та речення мети.
- Написати коротку біографічну довідку або професійне резюме.
content_outline:
- section: 'Освіта: ''Де ви вчилися?'''
  points:
  - 'Лексика: університет, інститут, коледж, факультет, спеціальність.'
  - Розповідь про свій освітній шлях.
  - 'Речення: ''Я вчився в університеті, який знаходиться в центрі міста''.'
- section: 'Робота: ''Ким ви працюєте?'''
  points:
  - 'Лексика: професія, посада, компанія, фірма, обов''язки.'
  - Опис свого робочого дня.
  - 'Речення: ''Я працюю інженером в компанії, що виробляє комп''ютери''.'
- section: 'Мотивація: ''Чому ви обрали цю професію?'''
  points:
  - Використання 'тому що' для пояснення причин.
  - Використання 'щоб' для пояснення мети.
  - 'Приклад: ''Я став лікарем, тому що хочу допомагати людям''.'
- section: 'Майбутні плани: ''Що ви робитимете?'''
  points:
  - Обговорення кар'єрних цілей.
  - 'Використання умовних речень: ''Якщо я добре працюватиму, то отримаю підвищення''.'
  - Формулювання планів на майбутнє.
- section: 'Синтез: Професійний профіль'
  points:
  - Поєднання всієї інформації в єдиний текст.
  - 'Практика: написання короткого профілю для LinkedIn або CV.'
