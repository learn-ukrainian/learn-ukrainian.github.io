level: A2
word_target: 2000
title: 'Родовий відмінок: Призначення та Розташування'
subtitle: Навіщо і де? Прийменники для, без, біля, навпроти, коло
objectives:
- Використовувати прийменник 'для' для вираження мети або призначення.
- Використовувати прийменник 'без' для вираження відсутності.
- Використовувати прийменники 'біля', 'навпроти', 'коло' для опису розташування.
- Правильно утворювати закінчення іменників у родовому відмінку після цих прийменників.
- Будувати речення, щоб описати, для кого/чого щось призначено і де воно знаходиться.
content_outline:
- section: 'Вступ: Прийменники мети та місця'
  points:
  - Знайомство з новою групою прийменників, що вимагають родового відмінка.
- section: 'Прийменник ''для'': Мета та призначення'
  points:
  - 'Вираження призначення: Це подарунок для тебе. Книга для читання.'
  - Конструкції з 'для' + інфінітив (у розмовній мові).
- section: 'Прийменник ''без'': Відсутність'
  points:
  - 'Вираження відсутності: кава без цукру, життя без музики.'
  - 'Антонімічні пари: з цукром / без цукру.'
- section: 'Прийменники місця: біля, навпроти, коло'
  points:
  - '''біля'': близькість (Я живу біля парку).'
  - '''навпроти'': через дорогу/простір (Аптека навпроти банку).'
  - '''коло'': синонім до ''біля'' (Сидіти коло вікна).'
  - Візуальні приклади з мапою міста.
- section: Підсумок та практика
  points:
  - Зведена таблиця прийменників та їх функцій.
  - 'Комбіновані речення: Я купив квіти для мами в магазині біля мого будинку.'
vocabulary_hints:
  required:
  - 'для: for'
  - 'без: without'
  - 'біля: near, by'
  - 'навпроти: opposite, across from'
  - 'коло: near, by'
  - 'цукор: sugar'
  - 'будинок: building, house'
  - 'парк: park'
  - 'вікно: window'
  - 'магазин: shop'
  recommended:
  - 'призначення: purpose'
  - 'відсутність: absence'
  - 'розташування: location'
  - 'аптека: pharmacy'
  - 'банк: bank'
  - 'театр: theater'
  - 'зупинка: bus stop'
activity_hints:
- type: fill-in-the-blanks
  focus: Вибір правильного прийменника (для, без, біля, навпроти, коло)
  items: 12
- type: sentence-transformation
  focus: Перетворення речень (напр., 'Я п'ю чай з лимоном' -> 'Я п'ю чай без лимона')
  items: 10
- type: map-description
  focus: Опис розташування об'єктів на карті, використовуючи 'біля', 'навпроти'
  items: 8
- type: question-answer
  focus: Відповіді на запитання 'Для кого/чого це?' та 'Де це?'
  items: 12
