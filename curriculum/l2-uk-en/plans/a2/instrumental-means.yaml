level: A2
module_id: 22
slug: instrumental-means
title: Писати ручкою, їхати автобусом
subtitle: The Instrumental Case for Tools and Means
word_target: 2000
objectives:
- Навчитися вживати орудний відмінок без прийменника для позначення інструмента або
  засобу дії (чим?).
- Навчитися вживати орудний відмінок для позначення виду транспорту.
- Практикувати утворення форм орудного відмінка для інструментів, знарядь праці та
  транспорту.
- Навчитися розрізняти орудний відмінок засобу (їхати автобусом) та орудний відмінок
  супроводу (їхати з другом).
content_outline:
- section: 'Вступ: Чим ти це робиш?'
  points:
  - Пояснення концепції 'засобу дії' – чим виконується дія.
  - 'Ключове питання: Чим?'
  - Відсутність прийменника в цій функції.
- section: Інструменти та знаряддя
  points:
  - Вживання з дієсловами 'писати', 'малювати', 'різати', 'їсти'.
  - 'Приклади: Я пишу ручкою. Він малює олівцями. Тато ріже хліб ножем. Ми їмо суп
    ложками.'
- section: Транспорт
  points:
  - Вживання з дієсловами руху 'їхати', 'летіти', 'пливти'.
  - 'Приклади: їхати автобусом, трамваєм, метро, поїздом.'
  - 'Приклади: летіти літаком; пливти човном.'
- section: 'Порівняння: Засіб чи Супровід?'
  points:
  - 'Аналіз речень: ''Я їду автобусом'' (Чим? - Засіб) vs. ''Я їду з другом'' (З ким?
    - Супровід).'
  - Практичні вправи на розрізнення цих двох функцій.
