activity_hints:
- type: image_matching
  focus: Поєднати зображення інструмента або транспорту з відповідним реченням.
  items: 12
- type: sentence_transformation
  focus: Перетворити речення з конструкцією 'за допомогою' на речення з орудним відмінком
    засобу.
  items: 10
- type: question_answer
  focus: Відповісти на питання 'Чим ти ...?', використовуючи орудний відмінок.
  items: 12
- type: cloze
  focus: Вибрати правильне слово в орудному відмінку для доповнення речення (засіб
    чи супровід).
  items: 12
- type: communicative_task
  focus: Розповісти, як ви зазвичай добираєтеся на роботу чи навчання.
  items: 1
