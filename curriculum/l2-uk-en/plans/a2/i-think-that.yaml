module: a2-29
level: A2
sequence: 29
slug: i-think-that
version: '2.0'
title: I Think That...
subtitle: Expressing Opinions
content_outline:
- section: Introduction / Вступ
  points:
  - Moving from facts to perspectives
  - 'The social importance of having an ''opinion'' — cultural hook: balance between
    sincerity (щирість) and politeness (ввічливість); disagreement is often emotional
    but prefaced with softeners'
- section: Presentation / Презентація
  points:
  - '''Thinking Verbs: Думати vs Вважати vs Здаватися'' — create contrast table: Думати
    (process) vs Вважати (opinion); learner error: using ''рахувати'' (to count) for
    opinion due to Russian influence (calque from Russian ''считать'')'
  - '''Degrees of Certainty: Безумовно, Напевно, Можливо'' — collocations: це можливо,
    цілком можливо; include ''Я впевнений(-а)'' / ''Я сумніваюся'' (State Standard
    §2)'
  - '''Introductory Phrases: На мою думку, З мого погляду'' — collocations: на думку
    експертів, на мою особисту думку'
  - '''Agreement/Disagreement: Я згоден/згодна (Gender sensitive)'' — learner error:
    mismatched gender agreement; cultural hook: soften disagreement with ''На жаль,
    я не згоден'' or ''Вибачте, але...'''
  - 'The mandatory comma before ''що'' — learner error: omission of comma (hard rule
    in Ukrainian unlike English ''that''); State Standard §4.4.2 requirement'
- section: Practice / Практика
  points:
  - Converting facts to opinions — distinguishing between 'Я думаю' (softer/uncertain)
    and 'Я вважаю' (firm stance)
  - Certainty ladder exercises — ordering phrases from 'Я впевнений' to 'Я сумніваюся'
  - Justification practice — elementary grounding of opinion (State Standard §2 requirement)
- section: Dialogues / Діалоги
  points:
  - Discussing a movie, travel plan, or work proposal — avoiding direct 'Ні' by using
    softeners like 'Мені здається, що це не зовсім так' or 'Вибачте, але...'
focus: vocabulary
pedagogy: PPP
objectives:
- Learner can express personal opinions clearly
- Learner can agree or disagree politely
- Learner can use introductory phrases to structure arguments
- Learner can discuss topics using 'я вважаю' and 'мені здається'
grammar:
- opinion phrases (я думаю, на мою думку)
- agreement/disagreement phrases
- filler words (можливо, напевно)
- justifying opinions
module_type: vocabulary
