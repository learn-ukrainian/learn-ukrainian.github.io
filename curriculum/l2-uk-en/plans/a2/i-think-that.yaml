vocabulary_hints:
  required:
  - думати (to think) — про майбутнє, довго думати, думати над проблемою (process)
  - 'вважати (to consider/believe) — що...; вважати правильним; вважати за потрібне
    (opinion); learner error: do not use ''рахувати'''
  - здаватися (to seem) — мені здається, що...; здається, дощ починається
  - згоден / згодна (agree) — я цілком згоден, я не згоден, я згодна з вами; note
    gender agreement
  recommended:
  - на думку (in the opinion of) — на мою думку, на думку експертів, на мою особисту
    думку
  - можливо (possible/perhaps) — це можливо, цілком можливо, можливо, що...
