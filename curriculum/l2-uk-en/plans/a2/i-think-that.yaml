vocabulary_hints:
  required:
  - думати (to think) — про майбутнє, довго думати, думати над проблемою; high frequency,
    denotes mental process
  - 'вважати (to consider/believe) — я вважає, що...; вважати правильним; вважати
    за потрібне; high frequency, denotes firm opinion; note: never use ''рахувати'''
  - здаватися (to seem) — мені здається, що...; здається, дощ починається; medium
    frequency, denotes impression or soft stance
  - згоден / згодна (agree) — я цілком згоден, я не згоден, я згодна з вами; requires
    gender agreement
  - що (that) — mandatory comma before this conjunction in complex sentences (State
    Standard §4.4.2)
  - впевнений / впевнена (sure/confident) — я впевнений(-а), що...; expressing high
    certainty (State Standard §2)
  recommended:
  - на думку (in the opinion of) — на мою думку, на думку експертів, на мою особисту
    думку; used as an introductory phrase
  - можливо (possible/perhaps) — це можливо, цілком можливо, можливо, що...; high
    frequency probability marker
  - напевно (probably) — medium certainty marker
  - сумніватися (to doubt) — я сумніваюся, що...; expressing uncertainty (State Standard
    §2)
  - вибачте, але (excuse me, but) — polite softener for disagreement
  - на жаль (unfortunately) — softener for refusal or disagreement
word_target: 3000
