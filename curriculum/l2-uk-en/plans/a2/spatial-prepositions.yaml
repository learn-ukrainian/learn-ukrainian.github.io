module: a2-07
level: A2
sequence: 7
slug: spatial-prepositions
version: '2.0'
title: Spatial Prepositions
subtitle: Location and Motion
content_outline:
- section: Introduction / Вступ
  points:
  - Key distinction in Ukrainian (куди? vs де?) — emphasize using a decision table
    or flowchart per research notes — aligns with State Standard §4.2.2.4.2 (Motion)
    and §4.2.2.5.2 (Location)
  - Pattern recognition strategies — aligns with State Standard §4.2.2.5.2 for expanded
    spatial relations
- section: Presentation / Презентація
  points:
  - 'в/у and на + Acc/Loc patterns — learner error: Static vs. Motion Confusion (e.g.,
    *Я йду в школі* vs. *Я йду в школу*); learner error: Misuse of *В* vs. *На* (*В
    вулиці* vs. *На вулиці*)'
  - 'Instrumental prepositions (під, за, над, перед, між) — cultural hook: The Stove
    (*Піч*) as the heart of the home (sleeping *на печі*, hiding *за піччю*) — note:
    *над* and *під* govern Instrumental for location'
  - 'Genitive prepositions (до, з, біля) — cultural hook: The Sacred Corner (*Покуття*)
    located opposite (*напроти*) the stove; learner error: Incorrect Case usage (e.g.,
    *Біля магазин* vs. *Біля магазину*)'
- section: Practice / Практика
  points:
  - Diagram labeling — e.g., 'Where is the cat?' logic for static positions — reinforce
    'де?' question word
  - 'Motion sequences — distinguishing destination vs. location — address learner
    error: using Locative for motion (e.g., *Я йду в школі*)'
- section: Dialogues / Діалоги
  points:
  - 'Asking for directions — using *до*, *напроти*, *біля* — context: identifying
    landmarks'
  - Describing a room — leveraging cultural context of a traditional *khata* layout
    — use *Піч* and *Покуття* as anchors
vocabulary_hints:
  required:
  - 'в/у (in/into) — Very High Freq; collocations: в Україні, в хаті, в кімнату'
  - 'на (on/onto) — Very High Freq; collocations: на столі, на вулиці, на гору'
  - 'під (under) — Medium Freq; collocations: під столом, під гору, під порогом'
  - 'над (above) — Medium Freq; collocations: над столом, над головою, над іконами'
  - 'перед (in front of) — Medium Freq; collocations: перед будинком, перед входом'
  - 'за (behind) — High Freq; collocations: за піччю (location), за річку (motion)'
  - 'між (between) — Medium Freq; collocations: між горами, між друзями'
  - 'до (to) — High Freq; collocations: до готелю, додому, до школи'
  - 'з/із (from) — High Freq; collocations: з Києва, зі столу, із хати'
  - 'напроти (opposite) — Low-Medium Freq; collocations: напроти університету, напроти
    входу'
  - 'біля (near) — Medium Freq; collocations: біля театру, біля вікна, біля хати'
  - коло (near)
  - поруч (nearby)
  - 'навколо (around) — note: ensure IPA for stressed vowels [наˈўкɔлɔ]'
  - вздовж (along)
  recommended:
  - всередині (inside)
  - ззовні (outside)
  - посеред (in the middle)
  - збоку (on the side)
  - поміж (among)
