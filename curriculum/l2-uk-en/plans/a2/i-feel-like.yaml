module: a2-30
level: A2
sequence: 30
slug: i-feel-like
version: '2.0'
title: I Feel Like...
subtitle: Physical and Emotional States
content_outline:
- section: –Т—Б—В—Г–њ (Introduction)
  words: 500
  points:
  - 'The difference between ''Who I am'' and ''How I feel'' вАФ explicit contrast table:
    ''–ѓ —Е–Њ–ї–Њ–і–љ–Є–є'' (I am a cold person) vs ''–Ь–µ–љ—Ц —Е–Њ–ї–Њ–і–љ–Њ'' (I feel cold); focus on
    fixing the Nominative subject error.'
  - 'Grammatical foundation: The Dative logic according to State Standard ¬І4.2.2.3
    for subjective states and impersonal constructions (–Ь–µ–љ—Ц –љ–µ —Б–њ–Є—В—М—Б—П, –Э–∞–Љ –≤–µ—Б–µ–ї–Њ).'
- section: –Я—А–µ–Ј–µ–љ—В–∞—Ж—Ц—П (Presentation)
  words: 900
  points:
  - 'Physical States: –ґ–∞—А–Ї–Њ, —Е–Њ–ї–Њ–і–љ–Њ, –±–Њ–ї—П—З–µ вАФ frequent adverbs; distinguish between
    personal traits and temporary states; warning on the sexual connotation of ''–ѓ
    –≥–∞—А—П—З–Є–є''.'
  - 'Emotional States: —Б—Г–Љ–љ–Њ, –≤–µ—Б–µ–ї–Њ, –љ—Г–і–љ–Њ вАФ high frequency list; collocations like
    ''–Љ–µ–љ—Ц —Б—В–∞–ї–Њ —Б—Г–Љ–љ–Њ'' to show transition of state.'
  - 'Psychological Reflexives: –ѓ —Е–≤–Є–ї—О—О—Б—П, —П –±–Њ—О—Б—П, —П —В—Ц—И—Г—Б—П вАФ contrast structure:
    ''—П –±–Њ—О—Б—П'' (Nominative subject) vs ''–Љ–µ–љ—Ц —Б—В—А–∞—И–љ–Њ'' (Dative state experiencer).'
  - 'Semantic distinction: –†–∞–і–Є–є (Situational gladness, gendered: —А–∞–і–Є–є/—А–∞–і–∞) vs –©–∞—Б–ї–Є–≤–Є–є
    (Deep/permanent feeling) vs –Ь–µ–љ—Ц –≤–µ—Б–µ–ї–Њ (Adverbial state).'
- section: –Ъ—Г–ї—М—В—Г—А–љ–Є–є –Ї–Њ–љ—В–µ–Ї—Б—В (Cultural Context)
  words: 500
  points:
  - Meteosensitivity (–Ь–µ—В–µ–Њ–Ј–∞–ї–µ–ґ–љ—Ц—Б—В—М) вАФ explaining how complaints about 'magnetic
    storms' (–Љ–∞–≥–љ—Ц—В–љ—Ц –±—Г—А—Ц) serve as a social bonding mechanism in Ukraine.
  - 'Folk wisdom: Analysis of the proverb ''–Ы–Њ–Љ–Є—В—М —А—Г–Ї–Є, –∞–±–Њ –Ї–Њ–ї—Ц–љ–∞ вАУ –±—Г–і–µ –њ–Њ–≥–Њ–і–Є
    –њ–µ—А–µ–Љ—Ц–љ–∞'' to illustrate the cultural connection between physical sensation and
    nature.'
- section: –Я—А–∞–Ї—В–Є–Ї–∞ —В–∞ –≤–њ—А–∞–≤–Є (Practice and Exercises)
  words: 600
  points:
  - 'Dative conversion drills: mapping Nominative to Dative (—ПвЖТ–Љ–µ–љ—Ц, —В–ЄвЖТ—В–Њ–±—Ц, –≤—Ц–љвЖТ–є–Њ–Љ—Г,
    –≤–Њ–љ–∞вЖТ—Ч–є); correcting the common error ''–Т–Њ–љ–∞ —Б—Г–Љ–љ–Њ'' to ''–З–є —Б—Г–Љ–љ–Њ''.'
  - 'Adjective vs Adverb contrast: Drills to prevent ''–Ь–µ–љ—Ц —Е–Њ–ї–Њ–і–љ–Є–є'' (Adj) by contrasting
    it with correct ''–Ь–µ–љ—Ц —Е–Њ–ї–Њ–і–љ–Њ'' (Adv) for feeling/state.'
- section: –Ф—Ц–∞–ї–Њ–≥–Є —В–∞ –њ—Ц–і—Б—Г–Љ–Њ–Ї (Dialogues and Summary)
  words: 500
  points:
  - 'Dialogue scenarios: comforting a friend who feels unwell or complaining about
    the weather; using ''–Љ–µ–љ—Ц...'' to express spontaneous physical needs or feelings.'
  - 'Final summary: Recap of the Dative experiencer pattern and the list of core adverbs
    for physical and emotional states.'
focus: vocabulary
pedagogy: PPP
objectives:
- Learner can describe physical states (hot, cold, painful)
- Learner can describe emotional states (sad, happy, bored)
- Learner can ask others about their feelings
- Learner can distinguish between personal traits and temporary states
module_type: vocabulary
sources:
- name: Ukrainian State Standard 2024 - States and Emotions
  url: https://mon.gov.ua/
  type: reference
  notes: Standards for expressing subjective physical and mental states at A2
- name: Psychology of Language - Slavic Subjective Dative
  url: https://uk.wikipedia.org/wiki/–С–µ–Ј–Њ—Б–Њ–±–Њ–≤—Ц_—А–µ—З–µ–љ–љ—П
  type: reference
  notes: Syntax of impersonal sentences for expressing feelings
immersion: 60-75% Ukrainian
phase: A2.2
persona:
  voice: Encouraging Cultural Guide
  role: Melancholy Poet
vocabulary_hints:
  required:
  - '–Љ–µ–љ—Ц (to me) вАФ Dative case marker for subjective states; Very High Frequency
    (Rank #51); anchor for the experiencer construction'
  - '—Е–Њ–ї–Њ–і–љ–Њ (cold/coldly) вАФ High Frequency; ''–Љ–µ–љ—Ц —Е–Њ–ї–Њ–і–љ–Њ'' (I feel cold), ''–љ–∞–і–≤–Њ—А—Ц
    —Е–Њ–ї–Њ–і–љ–Њ'' (outside); antonym: –ґ–∞—А–Ї–Њ'
  - '–ґ–∞—А–Ї–Њ (hot/hotly) вАФ High Frequency; ''–Љ–µ–љ—Ц –ґ–∞—А–Ї–Њ'' (I feel hot); learner warning:
    avoid ''—П –≥–∞—А—П—З–Є–є'' for bodily temperature'
  - '—Б—Г–Љ–љ–Њ (sad/sadly) вАФ High Frequency; ''–Љ–µ–љ—Ц —Б—Г–Љ–љ–Њ'' (I feel sad); collocation:
    ''—Б—В–∞–ї–Њ —Б—Г–Љ–љ–Њ'' (became sad)'
  - –≤–µ—Б–µ–ї–Њ (fun/merrily) вАФ High Frequency; '–љ–∞–Љ –≤–µ—Б–µ–ї–Њ' (we are having fun), '–њ—А–Њ–≤–Њ–і–Є—В–Є
    —З–∞—Б –≤–µ—Б–µ–ї–Њ' (enjoyable time)
  - –±–Њ–ї—П—З–µ (painfully/hurts) вАФ Medium Frequency; '–Љ–µ–љ—Ц –±–Њ–ї—П—З–µ' (it hurts me), '—А–Њ–±–Є—В–Є
    –±–Њ–ї—П—З–µ' (to inflict pain)
  recommended:
  - —А–∞–і–Є–є (glad) вАФ Short adjective, agrees with gender (—П —А–∞–і–Є–є/—А–∞–і–∞); situational
    usage
  - —Й–∞—Б–ї–Є–≤–Є–є (happy) вАФ Long adjective describing a permanent trait or profound state
  - –љ—Г–і–љ–Њ (boring/bored) вАФ '–Љ–µ–љ—Ц –љ—Г–і–љ–Њ' (I am bored); distinct from '–љ—Г–і–љ–Є–є' (boring
    person/thing)
  - –Љ–µ—В–µ–Њ–Ј–∞–ї–µ–ґ–љ—Ц—Б—В—М (meteosensitivity) вАФ Cultural term for physical reactions to weather
    changes
  - –Љ–∞–≥–љ—Ц—В–љ—Ц –±—Г—А—Ц (magnetic storms) вАФ Specific cultural hook for explaining fatigue
    or headaches
word_target: 3000
