module: a2-08
level: A2
sequence: 8
slug: logical-prepositions
version: '2.0'
title: Logical Prepositions
subtitle: Reasons, Time, and Relationships
content_outline:
- section: Introduction / Вступ
  points:
  - Purpose and benefit concept — align with State Standard §4.2.2.2.2 (Genitive with
    prepositions)
  - Abstract vs spatial prepositions — note transition from A2-07 and build on A1
    time expressions
- section: Presentation / Презентація
  points:
  - 'для vs без (Genitive) — collocations: для мене, для роботи, для здоров''я; без
    цукру, без проблем, без допомоги'
  - 'через vs про (Accusative) — distinguish через (negative/neutral cause) vs завдяки
    (positive); learner error: avoid Russianism "із-за" (strictly spatial)'
  - від vs з (Source/Accompaniment)
  - 'Time prepositions (о, після) — learner error: use "о/об" for clock time, not
    "в"; note pronunciation of після [ˈpʲisʲlʲa]; learner error: avoid "на протязі"
    for duration (use "протягом")'
- section: Practice / Практика
  points:
  - 'Contextual sentences — cultural hook: The "Bread" Distinction — "піти по хліб"
    (purpose) vs "піти за хлібом" (behind)'
  - Story analysis (The Letter) — focus on logical connectors like тому що, щоб (align
    with State Standard §4.4.2)
- section: Dialogues / Діалоги
  points:
  - At the Pharmacy — usage of "для здоров'я", "після їжі" (High frequency context)
  - Planning a Trip — contrast "через затори" (negative) vs "завдяки погоді" (positive)
vocabulary_hints:
  required:
  - 'для (for) — High frequency (Top 10); collocations: для мене, для роботи, для
    здоров''я'
  - 'без (without) — High frequency; collocations: без цукру, без проблем, без допомоги'
  - 'через (because of/through) — High frequency; collocations: через дощ, через помилку,
    через затори; learner error: avoid Russianism "із-за"'
  - 'про (about) — Very High frequency; collocations: думати про..., розмовляти про...
    (Accusative §4.2.2.4.2)'
  - від (from person)
  - з (from place)
  - 'о (at time) — use for clock time; learner error: avoid "в 10 годині"'
  - 'після (after) — High frequency; collocations: після роботи, після обіду, після
    війни; IPA [ˈpʲisʲlʲa]'
  - крім (except)
  - замість (instead of)
  - 'завдяки (thanks to) — Medium frequency; collocations: завдяки підтримці, завдяки
    зусиллям; use for positive cause'
  - всупереч (despite)
  - 'протягом (during) — learner error: avoid "на протязі" (draft), use протягом or
    упродовж'
  - щодо (regarding)
  - стосовно (concerning)
  recommended:
  - заради (for the sake of)
  - незважаючи на (despite)
  - внаслідок (as a result of)
  - 'по (after/along) — cultural hook: піти по хліб'
  - при (at/during)
