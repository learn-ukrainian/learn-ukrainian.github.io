level: A2
word_target: 2000
title: Моєму другові
subtitle: Узгодження прикметників і займенників у давальному відмінку
slug: dative-adjectives-pronouns
focus: grammar
status: DRAFT
objectives:
- Навчитись відмінювати прикметники в давальному відмінку (ому, -ій, -им).
- Узгоджувати прикметники з іменниками в давальному відмінку за родом і числом.
- Навчитись відмінювати присвійні (мій, твій, наш) та вказівні (цей, той) займенники
  в давальному відмінку.
- Будувати словосполучення та речення на зразок "Я дзвоню моєму новому другові".
content_outline:
- section: Прикметники в давальному відмінку
  points:
  - 'Чоловічий та середній рід: закінчення -ому. ''новому студенту'', ''великому місту''.'
  - 'Жіночий рід: закінчення -ій. ''гарній дівчині'', ''старій книзі''.'
  - 'Множина: закінчення -им. ''новим студентам'', ''гарним дівчатам''.'
  - 'Приклади повних словосполучень: ''Я допомагаю моєму старшому братові''.'
- section: Присвійні займенники в давальному відмінку
  points:
  - 'Таблиця відмінювання: мій → моєму/моїй/моїм, твій → твоєму/твоїй/твоїм, і т.д.'
  - 'Узгодження з іменником: ''Дякую твоєму батькові'', ''Ми радіємо нашій перемозі''.'
- section: Вказівні займенники в давальному відмінку
  points:
  - 'Таблиця відмінювання: цей → цьому/цій/цим, той → тому/тій/тим.'
  - 'Узгодження з іменником: ''Поясни цьому студенту правило'', ''Я не вірю тій історії''.'
vocabulary_hints:
  required:
  - мій (my)
  - твій (your, informal)
  - наш (our)
  - ваш (your, formal/plural)
  - цей (this)
  - той (that)
  - новий (new)
  - старий (old)
  - гарний (beautiful, good)
  - великий (big)
  - маленький (small)
  - цікавий (interesting)
  recommended:
  - дорогий (dear, expensive)
  - рідний (native, own)
  - український (Ukrainian)
  - іноземний (foreign)
  - кожен (every, each)
  - весь (all, whole)
  - інший (other, another)
activity_hints:
- type: phrase-declension
  focus: Відмінювання словосполучень 'прикметник + іменник' у давальному відмінку.
  config:
    quantity: 15
    prompts:
    - новий друг → новому другові
    - моя улюблена книга → моїй улюбленій книзі
- type: fill-in-the-blanks
  focus: Заповнення пропусків правильними формами прикметників та займенників.
  config:
    quantity: 15
    blanks:
    - Я допомагаю ___ (мій, молодший) братові.
    - Він розповів про це ___ (наша, нова) вчителька.
- type: multiple-choice
  focus: Вибір правильного узгодження прикметника/займенника з іменником.
  config:
    quantity: 12
    options:
    - Я дзвоню (мій новий / моєму новому / мого нового) другу.
- type: description
  focus: Практика вживання вивчених конструкцій у зв'язному мовленні.
  config:
    quantity: 1
    prompt: 'Напишіть 5-6 речень про те, кому ви даруєте подарунки на свята. Використовуйте
      прикметники та присвійні займенники. (Наприклад: ''На Різдво я дарую подарунок
      моїй любій мамі...'')'
sequence: 17
module: a2-017
version: '1.0'
phase: A2.3 [Dative Case]
references:
