module: a2-019
level: A2
sequence: 19
slug: dative-adjectives-pronouns
version: 1.0.3
title: Моєму другові, нашій вчительці
subtitle: Узгодження прикметників та присвійних займенників у давальному відмінку
focus: grammar
pedagogy: PPP
phase: A2.3 [Давальний відмінок]
word_target: 2000
objectives:
- Вміти утворювати закінчення прикметників у давальному відмінку для всіх родів та множини (-ому/-ій/-ому/-им).
- Вміти утворювати закінчення присвійних займенників у давальному відмінку (моєму/моїй, твоєму/твоїй, нашому/нашій, вашому/вашій).
- Вміти будувати правильно узгоджені іменникові групи у давальному відмінку (моєму старшому братові, нашій новій вчительці).
- Вміти використовувати вказівні займенники цьому/цій/тому/тій в іменникових групах у давальному відмінку.
dialogue_situations:
- setting: 'Викладач роздає перевірені есе — віддає конкретним студентам: Моєму найкращому студентові — десятка! Нашій новій студентці — дев''ятка. Цьому хлопцю треба більше працювати.'
  speakers:
  - Вчитель
  - Студенти
  motivation: 'Повні конструкції у давальному відмінку: моєму студентові, нашій студентці, цьому хлопцю'
content_outline:
- section: Прикметники у давальному відмінку
  words: 600
  points:
  - 'Закінчення чоловічого та середнього роду: -ому для твердої групи (новому, старому, гарному), -ьому для м''якої групи (синьому, середньому).'
  - 'Закінчення жіночого роду: -ій для твердої групи (новій, старій, гарній), -ій також для м''якої групи (синя→синій). Після г, к, х: -ій без чергування (довгій, тихій).'
  - 'Закінчення множини для всіх родів: -им (новим, старим, гарним).'
  - 'Таблиця порівняння закінчень прикметників у називному, родовому та давальному відмінках для розпізнавання патернів.'
  - 'Практика зі знайомими прикметниками зі словника рівнів A1-A2.'
- section: Присвійні та вказівні займенники у давальному відмінку
  words: 550
  points:
  - 'Присвійні займенники мають такі ж закінчення, як і прикметники: мій→моєму/моїй, твій→твоєму/твоїй, його (незмінний), її (незмінний), наш→нашому/нашій, ваш→вашому/вашій, їхній→їхньому/їхній.'
  - 'Вказівні займенники: цей→цьому/цій, той→тому/тій. Множина: цим, тим.'
  - 'Ключове правило: його, її, їхній — його ніколи не змінює форму (дати його брату → його братові), але їхній відмінюється (їхньому братові).'
  - 'Практика утворення конструкцій у давальному відмінку з комбінаціями присвійний займенник + іменник.'
- section: Повні іменникові групи у давальному відмінку
  words: 500
  points:
  - 'Побудова багатослівних фраз у давальному відмінку: присвійний займенник + прикметник + іменник — усі слова мають бути узгоджені (моєму старшому братові, нашій новій вчительці, твоєму маленькому синові).'
  - 'Порядок слів: присвійний займенник перед прикметником перед іменником, так само як у називному відмінку.'
  - 'Практика з реальними життєвими ситуаціями: дарувати подарунки (подарувати моєму другові), писати комусь (написати нашій бабусі), пояснювати комусь (пояснити цьому студентові).'
  - 'Поширені помилки, яких слід уникати — сплутування чоловічого закінчення -ому з жіночим закінченням -ій.'
- section: Порівняння вивчених відмінків
  words: 350
  points:
  - 'Коротка порівняльна таблиця: закінчення прикметників/займенників у називному, родовому та давальному відмінках поруч для всіх родів.'
  - 'Розпізнавання патернів: закінчення чоловічого/середнього роду родового відмінка -ого проти давального -ому; жіночого роду родового відмінка -ої проти давального -ій.'
  - 'Практика вибору правильної форми відмінка залежно від дієслова та контексту речення.'
- section: Підсумок
  words: 200
  points:
  - 'Узгодження прикметників і займенників у давальному відмінку залежить від роду: чоловічий і середній рід мають закінчення -ому/-ьому (моєму новому), жіночий рід має закінчення -ій (моїй новій), а множина має закінчення -им. Пам''ятайте, що «його» та «її» є незмінними, тоді як «їхній» відмінюється.'
  - 'Самоперевірка: Як сказати українською «моєму старшому братові» та «нашій новій вчительці»? Яка різниця між закінченнями прикметників чоловічого роду у родовому та давальному відмінках? (-ого проти -ому) Напишіть 3 речення, описуючи, кому ви даруєте подарунки, використовуючи повні іменникові групи у давальному відмінку.'
vocabulary_hints:
  required:
  - моєму (to my (masc./neut. dat.))
  - моїй (to my (fem. dat.))
  - твоєму (to your (masc./neut. dat.))
  - нашій (to our (fem. dat.))
  - цьому (to this (masc./neut. dat.))
  - тому (to that (masc./neut. dat.))
  - новому (to the new (masc./neut. dat.))
  - старшому (to the older (masc./neut. dat.))
  - прикметник (adjective)
  - присвійний (possessive)
  recommended:
  - вказівний (demonstrative)
  - узгодження (agreement (grammar))
  - іменникова група (noun phrase)
  - їхньому (to their (masc./neut. dat.))
activity_hints:
- type: fill-in
  focus: Доповнити іменникові групи у давальному відмінку правильним закінченням прикметника/займенника (мо___ друг___)
  items: 8
- type: quiz
  focus: Обрати правильну форму присвійного займенника у давальному відмінку (моєму чи моїй чи моїм)
  items: 8
- type: match-up
  focus: Зіставити іменникові групи у називному відмінку з їхніми еквівалентами у давальному (мій друг → моєму другові)
  items: 8
- type: group-sort
  focus: Відсортувати форми прикметників у давальному відмінку за родами (чоловічий -ому, жіночий -ій, множина -им)
  items: 8
- type: error-correction
  focus: 'Знайти та виправити помилки узгодження прикметників та займенників в іменникових групах у давальному відмінку (наприклад, *моїй другові → моєму другові, *нашому вчительці → нашій вчительці)'
  items: 6
references:
