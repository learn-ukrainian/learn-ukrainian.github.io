module: a2-41
level: A2
sequence: 41
slug: root-families-i
version: '2.0'
title: Root Families I
subtitle: The DNA of Vocabulary
content_outline:
- section: Introduction / Вступ
  points:
  - 'The ''Lego'' Language: Why Ukrainian is built, not just memorized — visual analogy:
    the root is the ''block'', the prefix is the ''connector'' (strong Lego metaphor)'
  - 'The 4 Super-Roots: ход-, пис-, чит-, бач- — historically deep roots (State Standard
    §4.3.2 productive roots: *пис-* (*написати*), *ход-* (*виходити*))'
- section: Presentation / Презентація
  points:
  - 'The ход- Family: Motion, paths, and destinations — cognate with Greek *hodos*
    (method, exodus); key derivatives: вхід, вихід, перехід, прихід, похід; learner
    error: confusing directional prefixes (in/out) — use physical motion analogies'
  - 'The пис- Family: Writing, signing, and describing — cultural hook: originally
    meant ''to paint/decorate'' (Proto-Slavic *pьsati*), connecting *писати* to *писанка*;
    derivatives: підпис, опис, запис, письменник'
  - 'The чит- Family: Consumption of information — etymology hook: ''reading'' linked
    to ''counting/honoring'' (Proto-Slavic *čisti*); key derivatives: читач, читання,
    прочитати, вичитати'
  - 'The бач-/гляд- Family: Perception and vision — collocations: побачення (date),
    бачення (vision/view), передбачити (foresee), обачний (cautious); learner error:
    confusing with *дивитися*'
  - 'The Guessing Machine: Logic of prefix + root — learner error: assuming *записати*
    only means ''write down'' (also ''record audio/video''); simplification: Focus
    on ''Big 4'' prefixes for A2: *в-, ви-, при-, під-*'
  - 'Etymology Corner: Why -хід- and -ход- are siblings — euphony rule: the ''Kafka-Ptakh''
    rule for *с-* vs *з-* prefixes (e.g., *сходити* vs *зходити*)'
- section: Practice / Практика
  points:
  - Root identification drills — identifying core meaning within complex words
  - '''Translate by Logic'' challenge — guessing meaning from prefix + root combinations
    (e.g., ви- + хід = exit)'
- section: Dialogues / Діалоги
  points:
  - 'At the library: Discussing writers, readers, and descriptions — using *письменник*,
    *читач*, *опис*, *записати* in context'
focus: grammar
pedagogy: PPP
objectives:
- Learner can identify root families in complex words
- Learner can guess meanings of derivatives using prefix-root logic
- Learner can build new words from basic roots
- Learner can recognize the 4 core professional roots
grammar:
