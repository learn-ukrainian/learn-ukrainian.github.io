vocabulary_hints:
  required:
  - хід (move/turn/progress) — base noun for motion family; cognate with Greek *hodos*
  - вхід (entrance) — common signage, physical entry; prefix *в-* (in)
  - вихід (exit/solution) — physical exit or abstract solution; prefix *ви-* (out)
  - перехід (crossing/transition) — pedestrian crossing or state change; prefix *пере-*
    (across)
  - прихід (arrival) — arrival of person or time; prefix *при-* (arrival)
  - похід (hike/campaign) — military or recreational movement; prefix *по-* (start/duration)
  - писати (to write) — core verb, imperfective; Proto-Slavic *pьsati* (to paint)
  - написати (to write/finish writing) — perfective pair; State Standard §4.3.2 example
  - підпис (signature) — legal or personal mark; prefix *під-* (under)
  - опис (description) — textual representation; prefix *о-* (around/about)
  - 'запис (record/entry) — written note or audio/video recording; learner error:
    often confused with just writing'
  - письменник (writer) — professional author; derivative of *письмо*
  - читач (reader) — person reading; suffix *-ач* (agent)
  - читання (reading) — the process or skill; noun ending *-ння*
  - прочитати (to read through) — perfective completion; prefix *про-* (through)
  - побачення (date) — romantic meeting (lit. 'seeing each other'); derivative of
    *бачити*
  - передбачити (to foresee/predict) — seeing beforehand; prefix *перед-* (before)
  recommended:
  - розклад (schedule) — conceptually related to writing/ordering (laying out)
  - вичитати (to proofread/scold) — reading intensively to find errors
  - обачний (cautious) — seeing around oneself (looking both ways)
  - сходити (to go and come back/climb) — illustrative example for 'Kafka-Ptakh' euphony
    rule (*с-* not *з-*)
word_target: 3000
