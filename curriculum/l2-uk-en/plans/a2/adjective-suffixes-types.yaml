vocabulary_hints:
  required:
  - дерев'яний (wooden) — дерев'яний стіл, дерев'яний будинок, дерев'яна ложка; High
    frequency
  - скляний (glass adj.) — скляна пляшка, скляний посуд, скляні двері; Medium frequency
  - залізний (iron adj.) — залізні двері, залізний характер (idiom), залізниця (noun);
    High frequency
  - київський (Kyiv adj.) — київський торт, київський князь, Київська Русь; High frequency
  - львівський (Lviv adj.) — львівська кава, львівський сирник, львівська ґвара; High
    frequency
  - домашній (home/domestic) — домашнє завдання, домашня тварина, домашній затишок;
    Very High frequency
  - вовняний (woolen) — вовняний светр, вовняна ковдра, вовняні шкарпетки; Medium
    frequency
  recommended:
  - осика (aspen) — traditional wood for Yavoriv toys, believed to drive away evil
  - ліжник (lizhnyk) — Hutsul woven blanket made of sheep's wool, famous for therapeutic
    'biting' texture
  - овеча вовна (sheep's wool) — the raw material for traditional Ukrainian textiles
  - яворівська забавка (Yavoriv toy) — traditional wooden toy decorated with willow
    branch patterns
word_target: 3000
