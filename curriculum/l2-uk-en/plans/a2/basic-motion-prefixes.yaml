module: a2-36
level: A2
sequence: 36
slug: basic-motion-prefixes
version: '2.0'
title: Basic Motion Prefixes
subtitle: In and Out
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - Prefixes as the GPS of Slavic verbs — direction is 'built-in' in Ukrainian verbs,
    unlike English phrasal verbs where direction is external to the stem
  - Why direction is 'built-in' in Ukrainian — emphasizes the vector of movement (into
    vs out of) as a fundamental part of the verb's semantic core
  - 'Alignment with State Standard §4.2.3.1: Reinforce the conjugation of base motion
    verbs (іти, їхати, ходити, їздити) as the essential foundation for prefixed forms'
- section: 'Презентація: В- та Ви- (Presentation: V- and VY-)'
  words: 900
  points:
  - 'The Binary: В- (Into) vs Ви- (Out) — use the ''Box Analogy'' from research: В-
    is an arrow INTO the box, Ви- is an arrow OUT OF the box to visualize spatial
    relations'
  - 'Prepositional Hooks: Alignment with State Standard §4.2.2.4.2 — pairing ''в,
    у, на'' with ''входити/зайти'' for destinations (e.g., ''зайти в кімнату'') using
    the Accusative case'
  - 'Perfective Shift: How a prefix creates a ''result'' state — explicitly teach
    the aspectual difference between ''входити'' (process/habit) and ''увійти'' (one-time
    completed result)'
  - 'Euphony and the Apostrophe: В’їхати vs Виїхати — rules for ''увійти'' vs ''ввійти''
    vs ''увіходити'' and how they trigger constant phonetic adjustments in spoken
    Ukrainian'
  - 'The Space Rule: Distinguish enclosed spaces (В) vs surfaces/open areas (На) —
    ''входити в кімнату'' vs ''виходити на вулицю/балкон'''
- section: Культурний контекст (Cultural Context)
  words: 500
  points:
  - 'The Threshold (Поріг): Explore the cultural prohibition of shaking hands or passing
    money ''через поріг'', illustrating the in/out binary as a sacred boundary in
    Ukrainian homes'
  - 'Kyiv Metro Navigation: Practical application of ''Вхід'' (Entrance) and ''Вихід''
    (Exit) signs; common warnings like ''Не притулятися'' (Do not lean) on transit
    doors'
  - 'Urban Narratives: Applying ''в''їжджати/виїжджати'' to city commutes and ''входити/виходити''
    to office and building navigation as part of daily life'
- section: Практика та помилки (Practice and Errors)
  words: 800
  points:
  - 'Learner error: Using ''в/у'' with ''виходити'' instead of ''з'' (e.g., error
    ''Я виходжу в офісу'') — teach the ''З + Genitive'' requirement for the ''out
    of'' vector'
  - 'Learner error: Confusing mode of transport — explain why ''Машина входить у гараж''
    is incorrect and must be ''Машина в''їжджає у гараж'' (strict separation of foot
    vs vehicle)'
  - 'Directional transformation drills: Practicing the shift from base verbs (іти/їхати)
    to prefixed verbs based on specific destination and origin cues'
  - 'Aspect confusion drills: Identifying when to use ''входжу'' (daily habit like
    the gym) vs ''увійшов'' (specific completed action) to avoid common A2 mistakes'
- section: Підсумок та діалоги (Summary and Dialogues)
  words: 400
  points:
  - 'Morning Routine Dialogue: Constructing a narrative from house (вийти) to car
    (в''їхати на дорогу) to office (ввійти), practicing logical prefix sequencing'
  - 'Idiomatic Review: High-frequency collocations like ''входити в моду'', ''виходити
    заміж'', and ''виїжджати на природу'' to demonstrate register variety'
  - 'Summary of Prefix-Preposition Logic: A final checklist of ''В- + В/На'' (Acc)
    and ''Ви- + З/Із'' (Gen) pairings for student reference and review'
focus: grammar
pedagogy: PPP
objectives:
- Learner can describe entering and exiting places
- Learner can use prefixes в-/у- and ви- correctly
- Learner can choose the correct preposition for motion verbs
- Learner can describe daily commute actions
grammar:
- prefix в-/у- (entering)
- prefix ви- (exiting)
- prepositions with motion verbs
- motion verb pairs
module_type: grammar
