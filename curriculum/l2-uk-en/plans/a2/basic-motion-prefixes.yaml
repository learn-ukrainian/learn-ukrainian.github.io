  notes: Structural rules for V- and VY- prefixes with motion stems
immersion: 60-75% Ukrainian
phase: A2.3
persona:
  voice: Encouraging Cultural Guide
  role: Taxi Driver
vocabulary_hints:
  required:
  - входити (to enter [on foot]) — входити в кімнату, входити в історію, входити в
    моду (idiom)
  - виходити (to exit [on foot]) — виходити з дому, виходити на вулицю, виходити заміж
    (idiom), виходити з себе (idiom)
  - в'їжджати (to drive in/enter [by vehicle]) — в'їжджати до міста, в'їжджати в гараж,
    в'їжджати в нову квартиру (move in)
  - виїжджати (to drive out/exit [by vehicle]) — виїжджати за кордон, виїжджати з
    парковки, виїжджати на природу
  recommended:
  - вхід (entrance) — напис на дверях метро
  - вихід (exit) — напис на дверях метро
  - поріг (threshold) — не вітатися через поріг
