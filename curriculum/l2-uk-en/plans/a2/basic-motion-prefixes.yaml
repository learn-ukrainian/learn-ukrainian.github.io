  role: Taxi Driver
vocabulary_hints:
  required:
  - входити (to enter [on foot]) — входити в кімнату, входити в моду (idiom), входити
    в історію; high frequency verb
  - виходити (to exit [on foot]) — виходити з дому, виходити на вулицю, виходити заміж
    (idiom), виходити з себе (idiom); high frequency verb
  - в'їжджати (to drive in/enter [by vehicle]) — в'їжджати до міста, в'їжджати в гараж,
    в'їжджати в нову квартиру (move in); medium frequency
  - виїжджати (to drive out/exit [by vehicle]) — виїжджати за кордон, виїжджати з
    парковки, виїжджати на природу; medium frequency
  recommended:
  - вхід (entrance) — ubiquitous sign in Kyiv Metro and public buildings; often paired
    with 'Вхід заборонено'
  - вихід (exit) — ubiquitous sign in Kyiv Metro and public buildings; 'Запасний вихід'
    (Emergency exit)
  - поріг (threshold) — cultural boundary; 'не вітатися через поріг' (superstition)
  - увійти (to enter [perfective]) — common digital UI term for 'Login' or 'Enter'
    on websites
word_target: 3000
