module: a2-067
level: A2
sequence: 67
slug: a2-comprehensive-review
version: 1.2.1
title: Повна картина
subtitle: Повторення всієї граматики рівня A2
focus: review
pedagogy: Review
phase: A2.10 [Refinement and Graduation]
word_target: 2000
objectives:
- Learner can correctly use all seven cases in singular and plural with nouns, adjectives, and pronouns in mixed exercises.
- Learner can distinguish and use perfective and imperfective aspect appropriately in past, present, and future contexts.
- Learner can form and use comparative and superlative adjectives, including suppletive forms, in connected speech.
- Learner can construct complex sentences using subordinate conjunctions (що, тому що, коли, щоб, якщо) and express opinions
  with justification.
