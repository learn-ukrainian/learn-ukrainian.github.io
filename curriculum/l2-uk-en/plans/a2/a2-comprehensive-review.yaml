level: A2
slug: a2-comprehensive-review
title: Повна картина
focus: review
pedagogy: review
word_target: 1500
objectives:
- Систематизувати та повторити знання про відмінки іменників, прикметників та займенників.
- Закріпити навички використання доконаного та недоконаного видів дієслова в минулому
  та майбутньому часі.
- Повторити утворення та вживання ступенів порівняння прикметників.
- Практикувати побудову простих і складних речень з різними сполучниками.
- Активізувати лексику з пройдених тем для використання в мовленні.
content_outline:
- section: 'Огляд відмінків: Іменники та прикметники'
  points:
  - Таблиця відмінків з питаннями.
  - Огляд закінчень іменників та прикметників у різних відмінках.
  - Практичні вправи на вибір правильного відмінка.
- section: 'Дієслова: Вид, час, спосіб'
  points:
  - Формування видових пар.
  - Схеми утворення минулого та майбутнього часу для обох видів.
  - Тренування у вживанні дієслів у контексті розповіді.
- section: 'Займенники: Особові, присвійні, зворотні'
  points:
  - Відмінювання особових займенників.
  - Правила вживання "свій" та "себе".
  - Повторення неозначених та заперечних займенників.
- section: Складне речення та стилістика
  points:
  - Повторення сполучників: і, а, але, тому що, щоб, якщо.
  - Практика поєднання простих речень у складні.
  - Огляд стилістичних фігур: синоніми, антоніми, зменшувальні форми.
- section: Інтегрована комунікативна практика
  points:
  - Комплексні діалоги, що вимагають використання різних граматичних структур.
  - Написання короткого тексту-розповіді на знайому тему.
