title: Повна картина
subtitle: Повторення всієї граматики рівня A2
focus: review
pedagogy: Review
phase: 'A2.10 [Вдосконалення та випуск]'
word_target: 2000
objectives:
- Учень може правильно вживати всі сім відмінків в однині та множині з іменниками, прикметниками та займенниками у змішаних вправах.
- Учень може розрізняти та доречно використовувати доконаний і недоконаний види в минулому, теперішньому та майбутньому часі.
- Учень може утворювати та вживати вищі й найвищі ступені порівняння прикметників, включно із суплетивними формами, у зв'язному мовленні.
- Учень може будувати складні речення з використанням підрядних сполучників (що, тому що, коли, щоб, якщо) та висловлювати думки з обґрунтуванням.
dialogue_situations:
- situation: 'Двоє друзів готуються до вступного тесту на рівень B1 — перевіряють знання одне одного з відмінків, видів дієслова та сполучників, використовуючи змішані приклади з повсякденного життя'
  functions:
  - 'перевірка граматичних знань'
  - 'самооцінювання готовності'
  key_vocabulary:
  - відмінок
  - дієслово
  - сполучник
  - впевнено
- situation: 'Студент пояснює новому одногрупнику, що вони вивчили на рівні А2 — підсумовує граматичні теми та наводить приклади речень'
  functions:
  - 'підсумовування знань'
  - 'наведення прикладів'
  - 'пояснення граматики'
  key_vocabulary:
  - граматика
  - повторення
  - речення
  - помилка
content_outline:
- section: 'Відмінки: від називного до кличного'
  words: 500
  points:
  - 'Систематичне повторення всіх семи відмінків: коли кожен з них вживається, ключові прийменники та типове керування дієслів. Коротка довідкова таблиця з найважливішими маркерами для кожного відмінка.'
  - 'Поглиблене вивчення родового та орудного відмінків — двох відмінків, які учні найчастіше плутають на рівні А2. Контрастні пари: без + родовий відмінок проти з + орудний відмінок, перетин прийменників.'
  - 'Змішана вправа: речення, в яких учень має вибрати правильний відмінок на основі контексту — дієслів, прийменників та конструкцій з усього рівня А2.'
  - 'Виправлення помилок: речення зі свідомо зробленими помилками у відмінках, які учень має знайти та виправити — типові помилки рівня А2 з розділу повторення підручника Заболотного для 6 класу.'
- section: 'Дієслово: вид, час, спосіб'
  words: 450
  points:
  - 'Повторення видових пар та їх використання в контексті. Коли вживати недоконаний вид (процес, повторення, загальний факт) проти доконаного (результат, завершеність, одноразова дія).'
  - 'Повторення часів: минулий, теперішній, майбутній — включно зі складеним майбутнім (буду + інфінітив) та простою формою майбутнього часу (-му). Коли якій формі віддається перевага.'
  - 'Наказовий та умовний способи: короткий огляд наказів та побажань (Прочитай! Якби я мав час, я б поїхав).'
  - 'Повторення дієслів руху: базові пари (іти/ходити, їхати/їздити) та ключові префіксальні форми (прийти, поїхати, вийти) з модуля А2, присвяченого руху.'
- section: 'Прикметники, порівняння, займенники'
  words: 400
  points:
  - 'Повторення відмінювання прикметників: тверда і м''яка групи в усіх відмінках. Вищий і найвищий ступені порівняння, зокрема неправильні форми (кращий, більший, гірший).'
  - 'Повторення системи займенників: особові, присвійні (включно зі свій), вказівні, питальні, неозначені (хтось, щось), заперечні (ніхто, ніщо), зворотний (себе).'
  - 'Практика: вставити правильну форму займенника або прикметника у зв''язному тексті.'
  - 'Повторення числівників і їх узгодження у відмінку: кількісні числівники 1-100 з правилами відмінювання (один зошит, два зошити, п''ять зошитів).'
- section: 'Складне речення: з''єднуємо думки'
  words: 350
  points:
  - 'Повторення сполучників та їх використання: що, тому що, бо, коли, якщо, щоб, хоча.'
  - 'Розрізнення регістрів: бо (неформальний) проти тому що (нейтральний) проти через те що (формальний). Коли що використовувати на письмі та в усному мовленні.'
  - 'Практика: об''єднання простих речень у складні за допомогою відповідного сполучника. Трансформація між рівнями регістру.'
- section: Самооцінка і перехід до B1
  words: 300
  points:
  - 'Контрольний список для самооцінки: оцініть свою впевненість у кожній граматичній темі (відмінки, вид, порівняння, синтаксис, метамова). Визначте найслабші місця.'
  - 'Що очікувати на рівні B1: попередній огляд вивчення граматики українською мовою, перевірка готовності метамовного словника (з модулів метамови А2 модулі №55–60).'
  - 'Персональний план навчання: на основі результатів самооцінки визначити, до яких модулів А2 слід повернутися перед початком рівня B1.'
- section: Підсумок
  words: 200
  points:
  - 'Прийменники з/із/зі, від та після вимагають родового відмінка для вираження походження (з Києва), матеріалу (сік з яблук), джерела від особи (від мами) та послідовності (після роботи).'
  - 'Правила милозвучності визначають варіант прийменника: використовуйте "з" перед голосними (з Одеси), "із" перед свистячими або між приголосними (із села) та "зі" перед збігом приголосних, що починається на з, с, ш (зі Львова, зі школи).'
  - 'Самоперевірка: Яка різниця між "з Києва" та "від Олени"? Опишіть 3 дії з вашого розпорядку дня, використовуючи "після". Коли ви використовуєте "зі" замість "з"?'
