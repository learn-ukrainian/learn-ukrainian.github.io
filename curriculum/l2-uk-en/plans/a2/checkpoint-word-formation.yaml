module: a2-049
level: A2
sequence: 49
slug: checkpoint-word-formation
version: '2.0'
title: 'Checkpoint: Word Formation'
subtitle: Review and Mastery Assessment
focus: checkpoint
pedagogy: TTT
phase: A2.4 [Word Formation]
word_target: 2000
objectives:
- Demonstrate confidence in identifying root families
- Deduce meaning using morphological clues
- Form words using correct prefixes and suffixes
- Correct common word formation errors
content_outline:
- section: Огляд та місток до B1 (Overview and Bridge to B1)
  words: 400
  points:
  - Skills assessment focusing on A2 standards (§4.3.1 degrees of comparison and §4.3.2 aspect pairs) as a foundation for
    mastery
  - 'Transitioning to B1 requirements: introducing linguistic terminology (префікс, суфікс, корінь) in Ukrainian to prepare
    for advanced grammar'
  - 'Word formation as the engine of the language: how morphological awareness accelerates vocabulary acquisition and autonomy'
- section: Словотворчі префікси та дієслівний вид (Word-forming Prefixes and Verb Aspect)
  words: 650
  points:
  - 'Directional and aspectual prefixes: consolidating aspect pairs (робити – зробити, ділити – поділити) per Standard §4.3.2'
  - 'Learner error: avoiding Surzhyk and Russian calques (e.g., using correct спів- as in співробітник, but correcting wrong
    співпадати to збігатися)'
  - 'Cultural hook: ''Вороженьки'' (Ukrainian anthem) and the diminutive suffix -еньк — how word formation ''softens'' even
    the concept of enemies'
  - 'Prefix substitution practice: identifying how changing a prefix alters the lexical meaning of common A2 verbs'
- section: 'Суфіксальне багатство: -ння, -ість, -ач (Suffixal Richness: -ння, -ість, -ач)'
  words: 650
  points:
  - 'Standard §4.3.4: High productivity of -ння for verbal nouns (читання, навчання, життя); drill as the default ''action-to-noun''
    converter'
  - 'Learner error: identifying the misuse of -к suffixes (розробка) where literary Ukrainian requires -ння (розроблення)
    for active processes'
  - 'Abstract and Agent nouns: using -ість (радість, незалежність) for concepts and -ач (слухач, викладач) for active roles'
  - 'Productive patterns: creating new nouns from known A2 verbs and adjectives using specified suffix sets'
- section: Ад’єктивні суфікси та родини коренів (Adjective Suffixes and Root Families)
  words: 650
  points:
  - 'Standard §4.3.6: Review of -ний and -ський suffixes for relational and national adjectives'
  - 'Learner error: confusion between -ний (general relation) and -овий (material/type) — stylistic and semantic distinctions'
  - 'Visualizing morphology: ''Word Families'' trees and ''Root Flowers'' (a core root in the center with derived petals)
    for visual learners'
  - 'Cultural hook: The creation of «мрія» (dream) by Mykhailo Starytsky — an example of conscious word formation shaping
    national identity'
- section: 'Підсумковий практикум: «Паляниця» та помилки (Final Workshop: «Palianytsia» and Errors)'
  words: 650
  points:
  - 'Comprehensive word analysis: breaking down complex words into morphemes to deduce meaning without a dictionary'
  - 'The ''Паляниця'' shibboleth: analysis of the -иця suffix and how word formation creates unique cultural identifiers'
  - 'Common mistake clinic: fixing wrong suffix calques and Surzhyk forms in a text-based context'
  - 'Final summary table: a visual guide to the most productive A2/B1 prefixes and suffixes as a reference for future modules'
vocabulary_hints:
  required:
  - корінь (root) — спільний корінь, корінь слова, пустити коріння (High frequency; foundation of the word)
  - префікс (prefix) — додати префікс, префікс з- (Mid frequency; changes direction/aspect)
  - суфікс (suffix) — словотворчий суфікс, суфікс -ння (Mid frequency; defines word class/nuance)
  - значення (meaning) — лексичне значення, змінити значення, має значення (Very High frequency)
  - утворення (formation) — словотворення, утворення слів, рік утворення (High frequency)
  - помилка (error) — груба помилка, виправити помилку, зробити помилку (High frequency; focus on 'growth points')
  - слово (word) — корінь слова, утворення слів
  - правильний (correct) — правильна форма, правильний суфікс
  recommended:
  - -ння (verbal noun suffix) — читання, навчання, життя (Extremely high productivity for processes)
  - -ість (abstract noun suffix) — радість, незалежність (High productivity for qualities)
  - -ач (agent noun suffix) — слухач, глядач, викладач (High productivity for people)
  - '-иця (suffix) — паляниця, крамниця (Context: cultural shibboleth)'
  - морфема (morpheme) — аналіз морфем
  - аналіз (analysis) — морфемний аналіз
  - синтез (synthesis) — словотворчий синтез
  - похідний (derivative) — похідне слово, похідне значення
