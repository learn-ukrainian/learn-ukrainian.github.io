module: a2-44
level: A2
sequence: 44
slug: checkpoint-word-formation
version: '2.0'
title: 'Checkpoint: Word Formation'
subtitle: Review and Mastery Assessment
content_outline:
- section: Огляд
  points:
  - Skills overview — bridges to B1 standards (verbal nouns, suffixes)
  - Checkpoint goals
- section: 'Skill 1: Verb Prefixes'
  points:
  - 'Direction prefixes — learner error: avoiding Surzhyk prefixes (спів- vs со-,
    авто- vs само-)'
  - Practice exercises
  - 'Myth Buster and History — cultural hook: ''Вороженьки'' (anthem) and emotional
    nuance in word formation'
- section: 'Skill 2: Noun Suffixes'
  points:
  - 'Verbal noun -ння — high productivity; learner error: using -к (розробка) instead
    of -ння (розроблення)'
  - Abstract noun -ість — productive for abstract concepts
  - Agent noun -ач — productive for active agents
- section: 'Skill 3: Adjective Suffixes'
  points:
  - 'General relation -ний — learner error: confusion with -овий (material/type)'
  - Material/type -овий
  - Place/nation -ський
- section: 'Skill 4: Root Families'
  points:
  - Core root meaning
  - Root recognition practice
  - 'Extended root families — visual: ''Word Families'' trees or flowers; cultural
    hook: ''Мрія'' (Starytsky) as conscious formation'
- section: Integration Challenge
  points:
  - 'Word analysis practice — cultural hook: ''Паляниця'' shibboleth and -иця suffix'
  - Common mistakes — wrong suffix calques and Surzhyk forms
- section: Підсумок
  points:
  - Summary table
  - Linguistic insight — word formation as the engine of the language
vocabulary_hints:
  required:
  - корінь (root) — спільний корінь, корінь слова
  - префікс (prefix) — додати префікс, префікс з-
  - суфікс (suffix) — суфікс -ння, словотворчий суфікс
  - слово (word) — утворення слів
  - утворення (formation) — словотворення, рік утворення
  - значення (meaning) — лексичне значення, змінити значення
  - помилка (error) — виправити помилку, груба помилка
  - правильний (correct)
  recommended:
  - морфема (morpheme)
  - аналіз (analysis)
  - синтез (synthesis)
  - похідний (derivative)
