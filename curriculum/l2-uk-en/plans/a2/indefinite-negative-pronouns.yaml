  role: Practical Communicator
grammar:
- indefinite pronouns (хтось, щось, десь, колись) as vocabulary
- negative pronouns (ніхто, нічого, ніде, ніколи) as vocabulary
- mandatory double negation (ні-word + не + verb)
register: розмовний
