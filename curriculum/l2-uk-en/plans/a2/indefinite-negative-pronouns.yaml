slug: indefinite-negative-pronouns
level: A2
title: Хтось, щось, ніхто, ніщо
subtitle: Someone, Nobody
focus: grammar
word_target: 2000
objectives:
- Form indefinite pronouns using the particles -сь, -небудь, аби-, де- (хтось, що-небудь).
- Form negative pronouns using the particle ні- (ніхто, ніщо, ніякий).
- Understand the difference between -сь (specific but unknown) and -небудь (any, non-specific).
- Decline indefinite and negative pronouns in all cases.
- Use double negation correctly with negative pronouns (e.g., Я нічого не знаю).
vocabulary_hints:
- uk: неозначений займенник
  en: indefinite pronoun
- uk: заперечний займенник
  en: negative pronoun
- uk: хтось / щось
  en: someone / something
- uk: хто-небудь / що-небудь
  en: anyone / anything
- uk: ніхто / ніщо
  en: nobody / nothing
- uk: ніякий
  en: no / not any
- uk: ніколи
  en: never
- uk: ніде
  en: nowhere
activity_hints:
- type: word-building
  focus: Creating indefinite and negative pronouns from base words (хто, що, який,
    де, коли).
  items: 15
- type: fill-in-the-blank
  focus: Completing sentences with the correct indefinite or negative pronoun in the
    required case.
  items: 15
- type: multiple-choice
  focus: Choosing between similar pronouns like 'щось' and 'що-небудь'.
  items: 12
- type: sentence-correction
  focus: Fixing sentences by adding the second 'не' required for correct double negation.
  items: 12
- type: dialogue-completion
  focus: Completing a short dialogue where characters are asking about unknown things
    or stating they know nothing.
  items: 10
sequence: 51
module: a2-051
version: '1.0'
phase: A2.8 [Refinement and Graduation]
references:
- title: Заболотний Grade 6, §43-48
  notes: Займенник
