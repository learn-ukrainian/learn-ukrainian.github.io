module: a2-051
level: A2
sequence: 51
slug: indefinite-negative-pronouns
version: '1.0'
title: Хтось, ніхто
subtitle: Неозначені та заперечні займенники і прислівники
focus: grammar
pedagogy: PPP
phase: A2.8 [Refinement and Graduation]
word_target: 2000
objectives:
  - Learner can form and use indefinite pronouns with the suffixes -сь/-небудь 
    and prefixes де-/будь-/аби- (хтось, щось, дехто, будь-хто, абихто).
  - Learner can form and use negative pronouns and adverbs with the prefix ні- 
    (ніхто, ніщо, ніде, ніколи, ніяк).
  - Learner can distinguish between the different indefinite series (-сь for 
    unknown specific, -небудь for any at all, де- for some among many, будь- for
    any whatsoever).
  - Learner can use double negation correctly in Ukrainian (Ніхто не прийшов. Я 
    нічого не бачу.).
dialogue_situations:
  - setting: 'Mystery party game — who did it and who saw what: Хтось з''їв торт (m)!
      Ніхто не бачив! Щось впало на кухні (f)! Дехто підозрює Олега. Будь-хто міг
      це зробити.'
    speakers:
      - Гості на вечірці
    motivation: Хтось, ніхто, щось, дехто, будь-хто with торт(m), кухня(f)
content_outline:
  - section: 'Хтось, щось: невідоме, але конкретне (Someone, Something: Unknown but
      Specific)'
    words: 500
    points:
      - 'The -сь series: хтось (someone specific), щось (something specific), десь
        (somewhere specific), колись (sometime, once), якось (somehow). Used when
        the speaker knows the entity exists but not who/what exactly.'
      - 'Examples in context: Хтось постукав у двері. Я щось забув. Десь тут була
        моя книга.'
      - 'Declension: хтось and щось decline like хто and що — хтось, когось, комусь,
        кимось.'
  - section: 'Будь-хто, дехто, абихто: різні відтінки (Anyone, Some, Just Anyone:
      Shades of Meaning)'
    words: 500
    points:
      - 'The -небудь series: хто-небудь (anyone at all), що-небудь (anything), де-небудь
        (anywhere). Used in questions and hypothetical situations: Хто-небудь бачив
        мої ключі?'
      - 'The де- series: дехто (some people), дещо (some things), деколи (sometimes),
        деякий (some, certain). Refers to an unspecified part of a group: Дехто вважає,
        що...'
      - 'The будь- series: будь-хто (anyone whatsoever), будь-що (anything at all),
        будь-де (anywhere). Emphasizes complete lack of restriction: Будь-хто може
        це зробити.'
      - 'The аби- series (colloquial/low quality): абихто (just anyone), абияк (carelessly).
        Carries a dismissive nuance: Не можна робити абияк.'
  - section: 'Ніхто, ніщо, ніколи: заперечення (Nobody, Nothing, Never: Negation)'
    words: 550
    points:
      - 'The ні- series: ніхто (nobody), ніщо (nothing), ніде (nowhere), ніколи (never),
        ніяк (no way), ніякий (no kind of), нічий (nobody''s).'
      - 'Ukrainian requires double negation — always ні- pronoun + не + verb: Ніхто
        не знає. Я нічого не бачив. Ми ніколи не були в Одесі. This is NOT an error
        — it is mandatory grammar.'
      - 'Declension of ніхто, ніщо: нікого, нічого, нікому, нічому, etc. With prepositions,
        ні- separates: ні до кого, ні з ким, ні про що.'
      - 'Contrast: ніколи (never) vs. колись (once, ever). ніде (nowhere) vs. десь
        (somewhere). ніхто (nobody) vs. хтось (someone).'
  - section: 'Практика: хтось чи ніхто? (Practice: Someone or Nobody?)'
    words: 450
    points:
      - 'Dialogue: a mystery scenario — someone heard something, nobody saw anything,
        someone must have been somewhere. Uses all pronoun types naturally.'
      - 'Reading practice: a short anecdote using indefinite and negative pronouns
        throughout.'
      - 'Common mistakes: using ні- without не (*Ніхто прийшов → Ніхто не прийшов),
        confusing -сь and -небудь, failing to split ні- with prepositions (*нідокого
        → ні до кого).'
vocabulary_hints:
  required:
    - хтось (someone)
    - щось (something)
    - ніхто (nobody)
    - ніщо (nothing)
    - ніколи (never)
    - ніде (nowhere)
    - дехто (some people)
    - будь-хто (anyone)
    - десь (somewhere)
    - колись (once, sometime)
  recommended:
    - абияк (carelessly, anyhow)
    - деякий (some, certain)
    - нічий (nobody's)
    - хто-небудь (anyone at all)
activity_hints:
  - type: quiz
    focus: Choose the correct indefinite or negative pronoun for the context
    items: 8
  - type: fill-in
    focus: Complete sentences with the appropriate -сь, -небудь, де-, будь-, or 
      ні- form
    items: 8
  - type: group-sort
    focus: Sort pronouns by series (-сь, -небудь, де-, будь-, ні-)
    items: 8
  - type: true-false
    focus: Identify correct double negation usage in sentences
    items: 8
references:
  - title: Заболотний Grade 6, Неозначені та заперечні займенники
    notes: Formation patterns with де-, будь-, аби-, ні- and their declension
  - title: Авраменко Grade 6, Займенник
    notes: Exercises on distinguishing indefinite pronoun series
