module: a2-021
level: A2
sequence: 21
slug: indefinite-negative-pronouns
version: '3.0'
title: Someone, Something, Nobody
subtitle: хтось, щось, ніхто, ніщо
focus: grammar
pedagogy: PPP
phase: A2.2
word_target: 2000
scope_note: >
  A2 scope: usage-focused introduction to the most common indefinite and negative
  pronouns as vocabulary items. Full morphological system (declension paradigms,
  formation rules for будь-/хто-небудь, preposition-split rules) deferred to B1
  per State Standard §4.2.1.4 and Grade 6 textbook evidence (Betsa §75-76,
  Litvinova §54).
objectives:
- Learner can use хтось/щось/десь/колись in everyday situations with unknown referents
- Learner can use ніхто/ніщо/ніде/ніколи with mandatory double negation (ні- + не)
- Learner can distinguish "someone called" (хтось подзвонив) from "nobody called" (ніхто не подзвонив)
- Learner can read and understand sentences containing these pronouns in context
sources:
- name: Ukrainian State Standard 2024 - Pronouns
  url: https://mon.gov.ua/
  type: reference
  notes: 'A2 §4.2.1.4: possessive, demonstrative, interrogative pronouns. Indefinite/negative deferred to B1.'
content_outline:
- section: 'Вступ: Хтось подзвонив! (Introduction: Someone Called!)'
  words: 300
  points:
  - 'Natural entry point: the phone rings, the door knocks — хтось подзвонив (someone called), щось упало (something fell);
    these are high-frequency words learners encounter daily.'
  - 'Two families previewed: хтось-family (someone/something — unknown but existing) vs ніхто-family (nobody/nothing —
    denial of existence). No morphological analysis yet — just meaning and use.'
  - 'Motivation: these words appear in every conversation. Not knowing them creates a communication gap that grammar
    alone cannot fill.'
- section: 'Хтось, щось, десь, колись (Someone, Something, Somewhere, Sometime)'
  words: 425
  points:
  - 'Core vocabulary set: хтось (someone), щось (something), десь (somewhere), кудись (somewhere/direction), колись
    (sometime/once), якось (somehow). Presented as vocabulary items to memorize, not as a formation system.'
  - 'Usage patterns with examples: "Хтось стукає у двері" (Someone is knocking); "Щось смачне пахне" (Something smells
    delicious); "Я десь це бачив" (I saw it somewhere); "Колись я був у Львові" (I was once in Lviv).'
  - 'The -сь pattern (recognition only): learners notice that -сь appears on all these words. Mention it as a pattern
    to help memorization, but do NOT teach it as a productive formation rule at A2.'
  - 'Common collocations: хтось із друзів (one of the friends), щось цікаве (something interesting), десь тут
    (somewhere here), колись давно (a long time ago).'
- section: 'Ніхто, ніщо, ніде, ніколи (Nobody, Nothing, Nowhere, Never)'
  words: 425
  points:
  - 'Core vocabulary set: ніхто (nobody), ніщо/нічого (nothing), ніде (nowhere), нікуди (nowhere/direction), ніколи
    (never), ніяк (no way). Presented as vocabulary items.'
  - 'CRITICAL RULE — Double negation is REQUIRED: Ukrainian demands BOTH the ні-word AND не before the verb. "Ніхто
    не прийшов" (Nobody came); "Ніщо не сталося" (Nothing happened). Omitting не is ungrammatical.'
  - 'Contrast with English: English uses single negation (Nobody came) but Ukrainian uses double (Ніхто НЕ прийшов).
    Frame this as a feature — Ukrainian is more explicit about negation.'
  - 'High-frequency examples: "Я нікого не бачив" (I saw nobody); "Вона ніколи не спізнюється" (She is never late);
    "Мені нічого не потрібно" (I do not need anything); "Він нікуди не пішов" (He went nowhere).'
  - 'Note on нічого: in spoken Ukrainian, нічого is far more common than ніщо, even in nominative position. Teach
    нічого as the default form.'
- section: 'Хтось vs ніхто: Хто подзвонив? (Someone vs Nobody: Who Called?)'
  words: 325
  points:
  - 'Two-way decision: хтось = someone exists but is unknown; ніхто + не = no one exists. The question determines
    which to use: "Хтось подзвонив?" (Did someone call?) → "Так, хтось подзвонив" / "Ні, ніхто не подзвонив".'
  - 'Parallel pairs for all words: десь/ніде, колись/ніколи, кудись/нікуди, щось/нічого — each pair covers the same
    semantic domain (place, time, direction, thing) with opposite polarity.'
  - 'Dialogue practice: phone call scenario, lost item scenario, party invitation scenario — each requires choosing
    between хтось-family and ніхто-family based on context.'
- section: Культурний контекст (Cultural Context)
  words: 275
  points:
  - 'Ukrainian proverbs with these words: "Хто рано встає, тому Бог дає" — connecting interrogative хто to indefinite
    хтось; "Ніколи не кажи ніколи" (Never say never) — double ніколи for emphasis.'
  - 'Everyday Ukrainian speech patterns: "Щось мені підказує..." (Something tells me...); "Нічого страшного" (Nothing
    terrible — used to mean "No worries"); "Десь я це чув" (I heard this somewhere — expressing vague recognition).'
  - 'Register note: these words are equally common in formal and informal speech. They are core communicative
    vocabulary, not register-specific.'
- section: Практика (Practice)
  words: 250
  points:
  - 'Fill-in drill: choose хтось/щось/ніхто/ніщо in 15 dialogue lines — contexts include phone calls, party
    invitations, lost items, daily routines.'
  - 'Double negation completion: supply both the negative pronoun and не — "___  ___ знає правди"; "Я ___  ___ бачив";
    "Вона ___  ___ відповіла" — 12 items.'
  - 'Dialogue comprehension: read a short dialogue using both хтось-family and ніхто-family; answer comprehension
    questions about what happened and who was involved.'
vocabulary_hints:
  required:
  - хтось (someone) — Very high frequency; collocations: хтось подзвонив, хтось із друзів
  - щось (something) — Very high frequency; collocations: щось цікаве, щось смачне
  - десь (somewhere) — High frequency; collocations: десь тут, десь далеко
  - колись (sometime/once) — High frequency; collocations: колись давно, колись потім
  - кудись (somewhere/direction) — Medium frequency; collocations: піти кудись
  - ніхто (nobody) — Very high frequency; always with не; collocations: ніхто не знає
  - нічого (nothing) — Very high frequency; dominant over ніщо; collocations: нічого не сталося, нічого страшного
  - ніде (nowhere) — High frequency; always with не; collocations: ніде немає
  - ніколи (never) — Very high frequency; always with не; collocations: ніколи не кажи
  recommended:
  - якось (somehow) — Medium frequency; collocations: якось так, якось дивно
  - нікуди (nowhere/direction) — Medium frequency; collocations: нікуди не пішов
  - ніяк (no way) — Medium frequency; collocations: ніяк не можу
activity_hints:
- type: fill-in
  focus: Choose хтось/щось/ніхто/ніщо based on context
  items: 15
- type: fill-in
  focus: Complete sentences with double negation (ні-word + не)
  items: 12
- type: quiz
  focus: Distinguish хтось-family from ніхто-family in given contexts
  items: 12
- type: match-up
  focus: Match хтось-family words to their ніхто-family opposites
  items: 10
