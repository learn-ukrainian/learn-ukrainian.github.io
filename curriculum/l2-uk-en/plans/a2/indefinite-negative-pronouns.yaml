module: a2-057
level: A2
sequence: 57
slug: indefinite-negative-pronouns
version: 1.0.3
title: Хтось, ніхто
subtitle: Неозначені та заперечні займенники і прислівники
focus: grammar
pedagogy: PPP
phase: A2.8 [Refinement and Graduation]
word_target: 2000
objectives:
- Учень вміє утворювати та використовувати неозначені займенники з суфіксами -сь/-небудь і префіксами де-/будь-/аби- (хтось, щось, дехто, будь-хто, абихто).
- Учень може утворювати та використовувати заперечні займенники та прислівники з префіксом ні- (ніхто, ніщо, ніде, ніколи, ніяк).
- Учень вміє розрізняти різні серії неозначених займенників (-сь для невідомого конкретного, -небудь для будь-кого взагалі, де- для деяких серед багатьох, будь- для будь-кого/будь-чого без обмежень).
- Учень може правильно використовувати подвійне заперечення в українській мові (Ніхто не прийшов. Я нічого не бачу.).
dialogue_situations:
- setting: 'Гра в детектив на вечірці — хто що зробив і хто що бачив: Хтось з''їв торт (m)! Ніхто не бачив! Щось впало на кухні (f)! Дехто підозрює Олега. Будь-хто міг це зробити.'
  speakers:
  - Гості на вечірці
  motivation: 'Хтось, ніхто, щось, дехто, будь-хто з торт(m), кухня(f)'
content_outline:
- section: 'Хтось, щось: невідоме, але конкретне'
  words: 500
  points:
  - 'Серія на -сь: хтось (someone specific), щось (something specific), десь (somewhere specific), колись (sometime, once), якось (somehow). Використовується, коли мовець знає про існування об''єкта, але не знає точно, хто/що це.'
  - 'Приклади в контексті: Хтось постукав у двері. Я щось забув. Десь тут була моя книга.'
  - 'Відмінювання: хтось і щось відмінюються як хто і що — хтось, когось, комусь, кимось.'
- section: 'Будь-хто, дехто, абихто: різні відтінки'
  words: 500
  points:
  - 'Серія на -небудь: хто-небудь (anyone at all), що-небудь (anything), де-небудь (anywhere). Використовується в питаннях та гіпотетичних ситуаціях: Хто-небудь бачив мої ключі?'
  - 'Серія на де-: дехто (some people), дещо (some things), деколи (sometimes), деякий (some, certain). Вказує на невизначену частину групи: Дехто вважає, що...'
  - 'Серія на будь-: будь-хто (anyone whatsoever), будь-що (anything at all), будь-де (anywhere). Підкреслює повну відсутність обмежень: Будь-хто може це зробити.'
  - 'Серія на аби- (розмовна/низька якість): абихто (just anyone), абияк (carelessly). Має зневажливий відтінок: Не можна робити абияк.'
- section: 'Ніхто, ніщо, ніколи: заперечення'
  words: 550
  points:
  - 'Серія на ні-: ніхто (nobody), ніщо (nothing), ніде (nowhere), ніколи (never), ніяк (no way), ніякий (no kind of), нічий (nobody''s).'
  - 'Українська мова вимагає подвійного заперечення — завжди займенник на ні- + не + дієслово: Ніхто не знає. Я нічого не бачив. Ми ніколи не були в Одесі. Це НЕ помилка — це обов''язкова граматика.'
  - 'Відмінювання ніхто, ніщо: нікого, нічого, нікому, нічому тощо. З прийменниками частка ні- розривається: ні до кого, ні з ким, ні про що.'
  - 'Порівняння: ніколи (never) проти колись (once, ever). ніде (nowhere) проти десь (somewhere). ніхто (nobody) проти хтось (someone).'
- section: 'Практика: хтось чи ніхто?'
  words: 450
  points:
  - 'Діалог: детективний сценарій — хтось щось чув, ніхто нічого не бачив, хтось мусив десь бути. Природно використовує всі типи займенників.'
  - 'Практика читання: короткий анекдот, що містить неозначені та заперечні займенники.'
  - 'Поширені помилки: використання ні- без не (*Ніхто прийшов → Ніхто не прийшов), плутанина між -сь і -небудь, нерозірвання ні- з прийменниками (*нідокого → ні до кого).'
- section: Підсумок
  words: 200
  points:
  - 'Неозначені займенники використовують афікси для передачі відтінків: -сь (конкретне, але невідоме, хтось), -небудь (будь-хто взагалі, хто-небудь), де- (дехто, деякі) та будь- (будь-хто без обмежень, будь-хто). Самоперевірка: У чому різниця між хтось і будь-хто?'
  - 'Заперечні займенники (ніхто, ніщо) вимагають обов''язкового подвійного заперечення (Ніхто не прийшов). З прийменниками префікс відділяється: ні до кого, ні з ким. Самоперевірка: Перекладіть "I saw nothing" та "I spoke with nobody" українською.'
vocabulary_hints:
  required:
  - хтось (someone)
  - щось (something)
  - ніхто (nobody)
  - ніщо (nothing)
  - ніколи (never)
  - ніде (nowhere)
  - дехто (some people)
  - будь-хто (anyone)
  - десь (somewhere)
  - колись (once, sometime)
  recommended:
  - абияк (carelessly, anyhow)
  - деякий (some, certain)
  - нічий (nobody's)
  - хто-небудь (anyone at all)
