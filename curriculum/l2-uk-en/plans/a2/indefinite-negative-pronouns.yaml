title: Indefinite and Negative Pronouns
subtitle: хтось, щось, ніхто, ніщо, будь-хто
focus: grammar
pedagogy: PPP
phase: A2.2
word_target: 2000
objectives:
- Learner can form indefinite pronouns using -сь and будь- prefixes
- Learner can form negative pronouns using ні- prefix and apply mandatory double negation
- Learner can split ні- pronouns when a preposition intervenes
- Learner can distinguish хтось/ніхто/будь-хто by communicative context
