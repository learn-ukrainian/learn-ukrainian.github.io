  - "A2 completion (learner can read/write Ukrainian, knows basic grammar)"
  - "b1-001 metalanguage-phonetics (sound system terminology)"
grammar:
  - "Будова слова: основа, закінчення (звукове і нульове), змінні/незмінні слова"
