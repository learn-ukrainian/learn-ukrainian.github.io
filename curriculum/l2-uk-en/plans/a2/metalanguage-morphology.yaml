module: a2-059
level: A2
sequence: 59
slug: metalanguage-morphology
version: '3.0'
title: "Морфологія"
subtitle: "Будова слова і частини мови — від знання до називання"
focus: morphology
pedagogy: PPP
phase: "A2.9 [Metalanguage Bridge & Foundation]"
word_target: 4000
objectives:
  - "Learner can name and identify the five parts of a Ukrainian word (корінь, префікс,
    суфікс, закінчення, основа) using Ukrainian terminology"
  - "Learner can perform a розбір слова за будовою (morphemic analysis) on common
    Ukrainian words"
  - "Learner can distinguish самостійні частини мови from службові частини мови and
    name all ten parts of speech in Ukrainian"
  - "Learner can identify спільнокореневі (споріднені) слова and explain how prefixes
    and suffixes create new words and meaning shifts"
  - "Learner can use part-of-speech-specific suffixes to identify whether a word is
    an іменник, прикметник, or дієслово"
dialogue_situations:
  - setting: 'Study group at a Lviv university library — students quiz each other
      on morphology terms: корінь (m, root), префікс (m, prefix), суфікс (m, suffix),
      закінчення (n, ending), основа (f, stem). They analyze words like переказувати,
      написання.'
    speakers:
      - Студентка Марина
      - Студент Богдан
    motivation: 'Morphology terms: корінь, префікс, суфікс, закінчення — word structure
      analysis'
content_outline:
  - section: "Що вивчає морфологія?"
    words: 550
    points:
      - "Bridge introduction: learners already USE Ukrainian word forms from A1-A2.
        This module teaches them to NAME the parts of words and parts of speech using
        Ukrainian linguistic terminology. The shift: from 'root' to корінь, from 'ending'
        to закінчення, from 'noun' to іменник."
      - "Core definitions from Авраменко Grade 5 p.60: Морфологія — розділ мовознавства,
        що вивчає слово як частину мови. Будова слова — how words are built from meaningful
        parts (морфеми). Словотвір — how new words are created from existing ones.
        These three areas work together: you must know the parts before you can understand
        how they combine."
      - "Why this matters for B1: upcoming grammar modules on чергування, word formation,
        and case nuances all use morphological terminology. A Ukrainian grammar explanation
        like 'у суфіксі -ськ- відбувається чергування' is incomprehensible without
        knowing what суфікс means."
  - section: "Основа і закінчення"
    words: 650
    points:
      - "From Авраменко Grade 5 p.58: Основа слова — це частина слова без закінчення.
        Вона виражає лексичне значення слова: люблю, полуницю, вершками. Закінчення
        — змінна значуща частина слова, що виражає його граматичне значення — рід,
        число, відмінок, особу. Example: полуниц|ю (Зн. в., одн.), полуниц|і (М. в.,
        одн.)."
      - "Звукове vs нульове закінчення (Заболотний Grade 5 p.46): Звукове закінчення
        виражено звуком: альбоми, яблунею, дощу. Нульове закінчення не виражено звуком:
        альбом, яблунь, дощ. How to find the нульове закінчення: change the word form
        — if a sound appears where there was none, the original had нульове закінчення.
        кінь (нульове) → коня (звукове -я)."
      - "Змінні vs незмінні слова (Авраменко Grade 5 p.59): Змінні слова have закінчення
        (іменники, прикметники, дієслова, числівники). Незмінні слова have no закінчення:
        прислівники (тут, учора, по-французьки), деякі іншомовні слова (хакі, лото,
        шосе, жалюзі). Key insight: незмінні слова consist entirely of основа."
      - "Practice: learners identify основа and закінчення in word sets, distinguishing
        звукове from нульове закінчення. Example words: вулиця/вулиць, перехід/перейду,
        Київ/Києва."
  - section: "Корінь і спільнокореневі слова"
    words: 600
    points:
      - "From Авраменко Grade 5 p.60: Корінь — це головна значуща частина слова, що
        містить у собі спільне лексичне значення споріднених слів: ліс, праліс, лісовий,
        лісник. Спільнокореневими (спорідненими) називають слова зі спільним коренем,
        але з різним лексичним значенням."
      - "Critical distinction: спільнокореневі слова vs форми одного слова. ліс, лісовий,
        лісник — different words sharing a root (спільнокореневі). ліс, лісу, лісом,
        лісі — same word in different forms (not спільнокореневі). The difference:
        спільнокореневі differ in лексичне значення, word forms differ only in граматичне
        значення."
      - "How to find the корінь: collect спільнокореневі слова and identify the shared
        part. вода, водний, підводний, водяний → вод-. Warning: корінь can change
        due to чергування: друг — дружний (г→ж), рік — річний (к→ч). These are still
        спільнокореневі despite the sound change."
      - "Reading practice: a short passage where learners circle спільнокореневі groups
        and mark корені in each word."
  - section: "Префікс і суфікс"
    words: 650
    points:
      - "From Авраменко Grade 5 p.62: Префікс — це значуща частина слова, що стоїть
        перед коренем і слугує для творення нових слів або нових відтінків у значенні:
        друк — передрук, друг — недруг, мудрий — премудрий. Common prefixes: ви-,
        за-, на-, пере-, під-, при-, роз-, без-."
      - "From Авраменко Grade 5 p.66: Суфікс — це значуща частина слова, що стоїть
        після кореня й надає словам нового лексичного значення або нового відтінку:
        кіт — котик — котяра. Суфікс changes not just meaning but emotion: -ик/-ок
        (зменшення, пестливість), -ищ/-юр (збільшення)."
      - "Part-of-speech-specific suffixes (Заболотний Grade 5 p.58): Іменникові суфікси:
        -ок-, -ар(-яр), -иц-, -ист-, -іст-, -тель-, -к- (місток, бджоляр, учитель,
        юристка). Прикметникові суфікси: -н-, -ив-, -ськ-, -еньк- (осінній, красивий,
        морський). Дієслівні суфікси: -и-, -а-, -ва-, -ува-, -ти- (писати, просити,
        зимувати). This is a powerful recognition tool: suffix reveals part of speech."
      - "A word can have multiple prefixes or suffixes: пре-за-довгий (two prefixes),
        висот-ин-а (two suffixes). Розбір слова за будовою — breaking a word into
        all its морфеми: пере-хід-н-ий = префікс + корінь + суфікс + закінчення."
  - section: "Самостійні частини мови"
    words: 650
    points:
      - "From Авраменко Grade 5 p.144 and Заболотний Grade 5 p.245: Самостійні частини
        мови name things, actions, qualities, quantities. They answer questions and
        serve as members of a sentence. Six самостійні частини мови: Іменник (хто?
        що?) — сонце, мрія, Київ. Прикметник (який? чий?) — сонячний, мамин. Числівник
        (скільки? котрий?) — три, третій. Займенник (хто? що? який?) — я, ти, він,
        цей. Дієслово (що робити? що зробити?) — сидіти, написати. Прислівник (як?
        де? коли? куди?) — сонячно, восени."
      - "Each самостійна частина мови has its own граматичні категорії: Іменник: рід,
        число, відмінок, відміна. Прикметник: рід, число, відмінок (agrees with іменник).
        Дієслово: час, особа, число, спосіб, вид, стан. Understanding these categories
        in Ukrainian is essential: a grammar rule like 'прикметник узгоджується з
        іменником у роді, числі та відмінку' requires knowing all these terms."
      - "Contrastive pairs for clarity: іменник книга vs прикметник книжковий — same
        root, different part of speech. дієслово зеленіти vs прислівник зелено vs
        іменник зелень — suffix determines the part of speech."
  - section: "Службові частини мови"
    words: 500
    points:
      - "From Заболотний Grade 5 p.245: Службові частини мови do not name anything,
        do not answer questions, and cannot be sentence members on their own. Three
        службові частини мови: Прийменник (на, в, з, до, біля, серед) — links words,
        governs case. Сполучник (і, й, та, але, або, що, щоб, бо) — connects words/clauses.
        Частка (не, б, хай, нехай, чи, навіть) — adds shades of meaning."
      - "Why службові слова matter: they are the glue of Ukrainian sentences. Прийменник
        determines which відмінок follows: до + Р.в., з + О.в. Сполучник signals the
        type of складне речення: але = протиставне, бо = причинове. Частка не creates
        заперечення. Learners already use these words — now they learn to name them."
      - "The вигук (interjection: ой, ах, гей) and special word categories: вигук
        is neither самостійна nor службова — it stands apart. Some textbooks list
        it separately; others group it with службові. At B1 level, the key is recognizing
        it exists as a category."
  - section: "Підсумок: ваш морфологічний словник"
    words: 400
    points:
      - "Complete metalanguage glossary — all terms from this module collected: морфологія,
        будова слова, словотвір, морфема, корінь, префікс, суфікс, закінчення, основа,
        спільнокореневий, споріднений, змінний, незмінний, нульове закінчення, звукове
        закінчення, іменник, прикметник, числівник, займенник, дієслово, прислівник,
        прийменник, сполучник, частка, вигук, самостійний, службовий, граматичне значення,
        лексичне значення."
      - "Self-check in Ukrainian: Дайте відповіді на запитання: 1. Назвіть п'ять значущих
        частин слова. 2. Чим основа слова відрізняється від закінчення? 3. Як відрізнити
        спільнокореневі слова від форм одного слова? 4. Назвіть шість самостійних
        частин мови і три службових. 5. Розберіть за будовою: перехідний, безхмарний,
        підводний."
      - "Preview of next module: Синтаксис і відмінки — підмет, присудок, додаток,
        означення, обставина. After naming word parts and word classes, you will learn
        to name the roles words play inside sentences."
vocabulary_hints:
  required:
    - "морфологія (morphology — the study of word forms and parts of speech)"
    - "корінь (root — the main meaningful part of a word)"
    - "префікс (prefix — meaningful part before the root)"
    - "суфікс (suffix — meaningful part after the root)"
    - "закінчення (ending — changeable part expressing grammatical meaning)"
    - "основа (stem — the part of a word without the ending)"
    - "спільнокореневий (cognate — words sharing the same root)"
    - "іменник (noun — names things, answers хто? що?)"
    - "прикметник (adjective — names qualities, answers який? чий?)"
    - "дієслово (verb — names actions, answers що робити?)"
    - "прислівник (adverb — names circumstances, answers як? де? коли?)"
    - "самостійний (content/autosemantic — part of speech with independent meaning)"
    - "службовий (function/synsemantic — part of speech without independent meaning)"
    - "прийменник (preposition — links words, governs case)"
    - "сполучник (conjunction — connects words or clauses)"
    - "частка (particle — adds shades of meaning)"
  recommended:
    - "морфема (morpheme — the smallest meaningful unit of a word)"
    - "словотвір (word formation — how new words are created)"
    - "споріднений (related/cognate — sharing a common root)"
    - "числівник (numeral — names numbers, answers скільки? котрий?)"
    - "займенник (pronoun — replaces other parts of speech)"
    - "вигук (interjection — expresses emotion: ой, ах, гей)"
    - "нульове закінчення (zero ending — ending not expressed by sound)"
    - "лексичне значення (lexical meaning — the core meaning of a word)"
    - "граматичне значення (grammatical meaning — expressed by endings)"
    - "розбір слова за будовою (morphemic analysis — breaking a word into parts)"
activity_hints:
  - type: quiz
    focus: "Identify word parts: Which морфема is highlighted? (корінь, префікс, суфікс,
      закінчення)"
    items: 8
  - type: match-up
    focus: "Match Ukrainian parts of speech to their definitions and question words
      (іменник — хто? що?)"
    items: 10
  - type: group-sort
    focus: "Sort words into самостійні vs службові частини мови"
    items: 10
  - type: fill-in
    focus: "Complete розбір слова за будовою — fill in missing морфеми for given words"
    items: 6
  - type: mark-the-words
    focus: "In a passage, mark all спільнокореневі слова belonging to the same word
      family"
    items: 6
  - type: error-correction
    focus: "Find and fix mistakes in morphemic analysis (e.g., wrong root boundary,
      missing prefix)"
    items: 6
connects_to:
  - "b1-001 (Фонетика — sound system metalanguage, prerequisite)"
