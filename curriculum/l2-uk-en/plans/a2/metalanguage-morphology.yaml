  - "Спільнокореневі слова vs форми одного слова"
  - "Розбір слова за будовою (morphemic analysis procedure)"
  - "Самостійні частини мови: іменник, прикметник, числівник, займенник, дієслово,
    прислівник"
  - "Службові частини мови: прийменник, сполучник, частка"
register: науково-навчальний
