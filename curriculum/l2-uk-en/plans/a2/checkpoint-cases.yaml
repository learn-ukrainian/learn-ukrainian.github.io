content_outline:
- section: Огляд та самооцінка (Overview and Self-assessment)
  words: 200
  points:
  - 'Checkpoint goals and alignment with Ukrainian State Standard §4.2.2 (Linguistic competence: morphology, Catalogue C);
    emphasis on systematic review of all 7 cases.'
  - Comprehensive self-assessment checklist based on CEFR A2 descriptors; must include a 'Preposition + Case' matching section
    as identified in research as a primary friction point.
- section: 'Відмінки в дії: Давальний та Орудний (Cases in Action: Dative and Instrumental)'
  words: 350
  points:
  - 'Dative case review (Standard §4.2.2.3): Emphasize recipients (Подарувати книжку студентові), age (Дідусеві вісімдесят
    років), and expressions of feeling (мені холодно/цікаво).'
  - 'Instrumental case review (Standard §4.2.2.5): Focus on profession/status (бути програмувальником) and instruments (пише
    ручкою).'
  - 'Targeted drill for learner error: Nom. for Instruments (e.g., correcting ''Я пишу ручка'' to ''Я пишу ручкою'') to ensure
    mastery of case endings for tools.'
- section: 'Граматичні тонкощі: Родовий, Знахідний та Кличний (Grammar Nuances: Genitive, Accusative, and Vocative)'
  words: 350
  points:
  - 'Genitive case functions (Standard §4.2.2.2): Practice with time/date (десятого березня), prepositions (з, до, для, біля),
    and mandatory case change under negation.'
  - 'Correction of learner error ''Nom. after Negation'': Drill minimal pairs (e.g., correcting ''У мене немає гроші'' to
    ''У мене немає грошей'').'
  - 'Accusative vs. Locative for Motion and Location (Standard §4.2.2.4/§4.2.2.6): Mastering prepositions в/у, на and the
    path-oriented ''по''.'
  - 'Vocative case mastery: Addressing learner error ''Nom. instead of Voc.'' (e.g., correcting ''Сергій, привіт!'' to ''Сергію,
    привіт!'') to build natural conversational habits.'
- section: Сервіси та цифрова Україна (Services and Digital Ukraine)
  words: 350
  points:
  - 'Practical mixed-case dialogues in service environments: Post office and Banking (Standard Catalogue B).'
  - 'Vocabulary integration: ''відправити поштою'', ''рахунок у банку'', ''допомагати з роботою'' using high-frequency verbs
    ''допомагати'' and ''відправляти''.'
  - 'Cultural Hook — Digital Banking Leadership: Exploring Ukraine''s role as a global leader via Monobank and the ''Diia''
    app; practicing case usage while discussing modern tech ecosystems.'
- section: Історичний виклик та підсумок (Historical Challenge and Summary)
  words: 250
  points:
  - 'Integration Challenge: Mixed case narrative analysis based on the cultural hook ''Stamps as Currency (1918)''; how the
    UNR issued stamps that circulated equally with coins.'
  - Final summary of case governance and prepositional matching; preparing the learner for a2-12 (Aspect Introduction) where
    case endings remain constant regardless of verb aspect.
vocabulary_hints:
  required:
  - відмінок (case) — Nominative to Vocative (7 cases); review of the full system.
  - давальний (dative) — Recipients & Experiencers; focus on age and feelings.
  - орудний (instrumental) — Tools & Companions; focus on profession/status.
  - прийменник (preposition) — Critical for case governance; major focus on matching.
  - 'допомагати (to help) — High frequency (Dative); collocations: допомагати мамі/другові, допомагати з роботою.'
  - 'подобатися (to like) — High frequency (Dative); collocations: мені подобається це місто, подобатися вчителю.'
  - 'з (із/зі) (with/from) — Very High frequency (Inst/Gen); collocations: кава з молоком, розмовляти з другом, приїхати з
    Києва.'
  - для (for) — Genitive preposition; high frequency in service contexts.
  - без (without) — Genitive preposition; essential for negation and exclusion.
  - 'через (because of/through) — High frequency (Acc); collocations: через дорогу (motion), через дощ (reason), через тиждень
    (time).'
  - після (after) — Genitive preposition; frequency in scheduling and dates.
  - 'пошта (post office) — Medium (Services); collocations: на пошті, відправити поштою, відділення пошти.'
  - 'рахунок (account) — Medium (Bank); collocations: відкрити рахунок, гроші на рахунку, номер рахунку.'
  - відправляти (to send) — Post context; typically takes Accusative direct object.
  - обмінювати (to exchange) — Bank context; essential for currency exchange tasks.
  recommended:
  - правильно (correctly) — Self-correction and assessment context.
  - помилка (mistake) — Focus on identifying and correcting learner errors.
  - виправити (to correct) — Action-oriented verb for error correction tasks.
  - перевірити (to check) — Self-assessment and verification context.
  - оцінка (assessment) — Progress tracking and goal setting.
