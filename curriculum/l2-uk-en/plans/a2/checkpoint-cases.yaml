  focus: 'Змішане тренування відмінків — доповнити речення, що вимагають усіх 7 відмінків в однині та множині'
  items: 8
- type: quiz
  focus: 'Виправлення помилок — знайти та виправити відмінкові помилки в реченнях'
  items: 8
- type: group-sort
  focus: 'Відсортувати форми іменників за відмінками (називний, родовий, давальний, знахідний, орудний, місцевий, кличний)'
  items: 8
- type: error-correction
  focus: 'Знайти та виправити змішані відмінкові помилки в реченнях — неправильні закінчення після прийменників, плутанина істот/неістот, помилки в родовому відмінку множини'
  items: 6
