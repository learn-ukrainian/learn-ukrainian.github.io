module: a2-039
level: A2
sequence: 39
slug: checkpoint-cases
version: 1.0.3
title: 'Контрольна точка: Відмінки та множина'
subtitle: 'Перевірка знань: усі відмінки в однині та множині'
focus: review
pedagogy: Review
phase: А2.5 [Синтез відмінків та множина]
word_target: 1500
objectives:
- Здобувач може правильно утворювати іменники у множині в усіх 7 відмінках, включаючи складний родовий відмінок множини з нульовим закінченням та випадними голосними.
- Здобувач може вибрати відповідний відмінок на основі керування дієслова, прийменника або контексту (час, характеристика, шлях) у змішаних вправах.
- Здобувач може знаходити та виправляти відмінкові помилки в коротких текстах, демонструючи свідомий контроль над системою відмінків.
- Здобувач може створити короткий зв'язний текст (8-10 речень), який природно використовує принаймні 5 різних відмінків як в однині, так і в множині.
dialogue_situations:
- setting: 'Планування весілля — кожен відмінок з''являється природно: Запрошення для гостей (gen). Подарунок нареченій (dat). Бачу наречену (acc). Фото з молодятами (inst). На весіллі (loc). Олено! (voc)'
  speakers:
  - Наречена
  - Подруга
  motivation: 'Усі 7 відмінків у плануванні весілля: родовий, давальний, знахідний, орудний, місцевий, кличний'
content_outline:
- section: 'Частина 1: Форми множини'
  words: 450
  points:
  - 'Вправа 1: Утворити називний відмінок множини від 10 іменників однини різних відмін (включно з винятками, такими як дитина, людина, око).'
  - 'Вправа 2: Утворити родовий відмінок множини — найскладніші форми. Для 10 іменників написати форму родового відмінка множини (книга → книг, студент → студентів, місто → міст, ніч → ночей, теля → телят).'
  - 'Вправа 3: Доповнити вирази кількості правильною формою родового відмінка множини (п''ять ___, багато ___, скільки ___?).'
- section: 'Частина 2: Який відмінок?'
  words: 500
  points:
  - 'Вправа 4: Множинний вибір — для речення з пропуском вибрати правильну форму відмінка. Охоплює всі тригери: дієслова (допомагати + давальний, бачити + знахідний, користуватися + орудний), прийменники (у + місцевий/знахідний, з + родовий/орудний, по + місцевий), особливі випадки (у четвер, у 2014 році, хлопець у светрі).'
  - 'Вправа 5: Визначення відмінка — короткий текст (8-10 речень) з підкресленими іменниками. Здобувач визначає відмінок кожного підкресленого іменника та його тригер (дієслово, прийменник або конструкцію).'
  - 'Вправа 6: Виправлення помилок — 6 речень з відмінковими помилками. Здобувач знаходить і виправляє кожну помилку (наприклад, *Я допомагаю сестру → сестрі; *багато студенти → студентів).'
- section: 'Частина 3: Вільне мовлення'
  words: 550
  points:
  - 'Вправа 7: Кероване письмо — "Опишіть свій ідеальний вихідний день". Обов''язково включити: куди ви йдете (знахідний/місцевий), з ким зустрічаєтесь (знахідний/давальний), що робите (знахідний/орудний), що їсте (родовий для кількості, знахідний для предметів).'
  - 'Вправа 8: Завершення діалогу — діалог з пропущеними формами іменників. Здобувач заповнює 8-10 пропусків, використовуючи правильний відмінок, як в однині, так і в множині.'
  - 'Чек-лист для самооцінки: Чи можу я впевнено утворювати множину? Чи знаю я, якого відмінка вимагає кожен прийменник? Чи можу я користуватися відмінковим компасом з М31? Чи готовий я до А2.6?'
- section: Підсумок
  words: 200
  points:
  - 'Утворення множини у всіх 7 відмінках значною мірою спирається на засвоєння родового відмінка множини з його нульовими закінченнями та випадними голосними (книга → книг, місто → міст). Самоперевірка: Які форми родового відмінка множини мають слова дитина, людина та око?'
  - 'Вибір правильного відмінка залежить від керування дієслова (допомагати + давальний), прийменників та контексту (час, характеристики). Самоперевірка: Яка різниця між "у четвер" та "у 2014 році"? Опишіть, що ви робите у свій ідеальний вихідний день, використовуючи принаймні 5 різних відмінків.'
vocabulary_hints:
