slug: checkpoint-cases
title: Контрольна точка
level: A2
word_target: 1500
objectives:
- Review and consolidate knowledge of plural noun declensions (Nominative, Accusative,
  Genitive).
- Demonstrate correct usage of Dative, Instrumental, and Locative plural endings.
- Choose the appropriate case in complex sentences based on verbs and prepositions.
- Apply case knowledge to practical communicative tasks like describing places and
  events.
- Identify and correct common mistakes in plural case usage.
content_outline:
- section: 'Повторення: Множина (Називний, Знахідний, Родовий)'
  points:
  - 'Тест-огляд: утворення множини для різних іменників.'
  - 'Практика: розрізнення істот і неістот у Знахідному відмінку множини.'
  - Вправи на вживання Родового відмінка множини з числами та словами 'багато'/'мало'.
- section: 'Повторення: Множина (Давальний, Орудний, Місцевий)'
  points:
  - Вправи на стабільні закінчення -ам/-ям, -ами/-ями, -ах/-ях.
  - Складання речень з прийменниками, що вимагають цих відмінків (з, по, в, на).
  - 'Творче завдання: написати лист другові, використовуючи різні відмінки множини
    (''Я сумую за нашими прогулянками...'').'
- section: Комплексний тест 'Відмінковий компас'
  points:
  - Завдання на вибір правильного відмінка в реченні.
  - Трансформація речень з однини в множину.
  - Знаходження та виправлення помилок у тексті.
- section: 'Комунікативне завдання: ''Моє місто'''
  points:
  - Підготувати коротку розповідь про своє місто.
  - Описати, що є в місті (Називний), що можна побачити (Знахідний), де можна погуляти
    (Місцевий), з ким можна зустрітися (Орудний).
  - Використовувати лексику з теми 'Дім та повсякденне життя'.
