module: a2-006
level: A2
sequence: 6
slug: genitive-dates-numbers
version: 1.1.3
title: Скільки? Котра година? Яке число?
subtitle: Родовий відмінок з числами, датами та запереченням
focus: grammar
pedagogy: PPP
phase: 'A2.1 [Основи та вступ до видів дієслова]'
word_target: 2000
objectives:
  - Вміти використовувати назви місяців у родовому відмінку однини для називання дати.
  - Вміти застосовувати правило 1, 2-4, 5+ для узгодження кількісних числівників з іменниками, використовуючи називний однини, називний множини та родовий множини відповідно.
  - Вміти використовувати родовий відмінок для прямого додатка в заперечному реченні.
  - Навчитися ставити основні запитання про кількість, дати та заперечні дії і відповідати на них, використовуючи родовий відмінок.
dialogue_situations:
  - setting: 'Бронювання номера в готелі телефоном — дати та ціни: З якого числа? З п''ятого березня. До якого? До десятого. Скільки номерів? Два номери. Скільки гостей? П''ять гостей.'
    speakers:
      - Гість
      - Адміністратор готелю
    motivation: 'Родовий відмінок з датами: п''ятого березня, та лічбою: два номери, п''ять гостей'
content_outline:
  - section: Яке сьогодні число? Родовий відмінок з датами
    words: 500
    points:
      - 'Як спитати про дату: ''Яке сьогодні число?'''
      - 'Як відповісти: День — це порядковий числівник (перше, друге), а місяць — іменник у родовому відмінку однини.'
      - 'Приклади: перше січня, друге лютого, двадцять п''яте грудня. Усі назви місяців належать до чоловічого роду і мають стандартні закінчення родового відмінка: -я (січня, лютого, березня...) або -а (листопада).'
      - Практика з усіма 12 місяцями, запитання та відповіді про важливі дати (дні народження, свята).
  - section: 'Рахуємо предмети: правило 1, 2-4, 5+'
    words: 800
    points:
      - 'Основне правило лічби в українській мові:'
      - '1 (+21, 31..): Називний відмінок однини (один стіл).'
      - '2, 3, 4 (+22-24..): Називний відмінок множини (два столи, три столи, чотири столи).'
      - '5-20 (+25-30..): Родовий відмінок множини (п''ять столів).'
      - 'Широка практика з іменниками чоловічого, жіночого та середнього родів. ''одна книга, дві книги, п''ять книг''; ''одне вікно, два вікна, п''ять вікон''.'
      - 'Особлива увага іменникам жіночого роду, де форми називного множини та родового однини можуть бути схожими (наприклад, ''сестри'').'
  - section: Заперечення з прямим додатком
    words: 700
    points:
      - 'Під час заперечення дієслова, яке вимагає прямого додатка в знахідному відмінку, додаток часто (але не завжди) переходить у родовий відмінок.'
      - 'Це додає наголос на запереченні. Це різниця між "я не читав конкретну книгу" та "я не читав жодної книги".'
      - 'Зрозумілі приклади: ''Я читаю книгу'' (Acc) -> ''Я не читаю книги'' (Gen). ''Він купив машину'' (Acc) -> ''Він не купив машини'' (Gen).'
      - 'Поясніть, що використання знахідного відмінка в запереченні також можливе і поширене, але родовий відмінок є граматично нормативним і часто вживаним.'
  - section: Підсумок
    words: 200
    points:
      - 'Для дат день вказується порядковим числівником, а місяць — у родовому відмінку однини (перше січня). Правило лічби ''1, 2-4, 5+'' визначає відмінки іменників: 1 вимагає називного однини, 2-4 — називного множини, а 5+ — родового множини. Перевірка: Як сказати ''3 столи'' і ''5 книг''? Відповідайте на запитання ''Яке сьогодні число?'' щодо свого дня народження.'
      - 'Прямі додатки заперечних дієслів часто переходять зі знахідного відмінка в родовий (Я читаю книгу → Я не читаю книги), щоб підсилити заперечення. Перевірка: У чому граматична різниця між використанням знахідного та родового відмінків у заперечних реченнях? Перетворіть речення ''Вона бачить брата'' на заперечне.'
vocabulary_hints:
  required:
    - число (дата) (date)
    - місяць (month)
    - січень (січня) (January)
    - лютий (лютого) (February)
    - березень (березня) (March)
    - квітень (квітня) (April)
    - травень (травня) (May)
    - червень (червня) (June)
    - липень (липня) (July)
    - серпень (серпня) (August)
    - вересень (вересня) (September)
    - жовтень (жовтня) (October)
    - листопад (листопада) (November)
    - грудень (грудня) (December)
    - заперечення (negation)
  recommended:
    - числівник (numeral)
    - додаток (object (grammatical))
    - правило (rule)
