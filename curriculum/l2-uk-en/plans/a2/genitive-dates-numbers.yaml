module: a2-005
level: A2
sequence: 5
slug: genitive-dates-numbers
version: '1.0'
title: Скільки? Котра година? Яке число?
subtitle: Родовий відмінок з числами, датами та запереченням
focus: grammar
pedagogy: PPP
phase: A2.1 [Foundation and Aspect Introduction]
word_target: 2000
objectives:
- Learner can use the Genitive singular of months to state the date.
- Learner can apply the '1, 2-4, 5+' rule for noun agreement with cardinal numbers,
  using Nominative singular, Genitive singular, and Genitive plural accordingly.
- Learner can use the Genitive case for the direct object in a negated sentence.
- Learner can ask and answer basic questions about quantity, dates, and negated actions
  using the Genitive case.
content_outline:
- section: Яке сьогодні число? Родовий з датами (What's the Date? Genitive with Dates)
  words: 500
  points:
  - 'How to ask the date: ''Яке сьогодні число?'''
  - 'How to answer: The day is an ordinal numeral (перше, друге), and the month is
    a noun in the Genitive singular.'
  - 'Examples: перше січня, друге лютого, двадцять п''яте грудня. Note that ''вересня''
    and ''листопада'' have the -а ending.'
  - Practice with all 12 months, asking and answering about important dates (birthdays,
    holidays).
- section: 'Рахуємо предмети: правило ''1, 2-4, 5+'' (Counting Items: The ''1, 2-4,
    5+'' Rule)'
  words: 800
  points:
  - 'The fundamental rule for counting in Ukrainian:'
  - '1 (+21, 31..): Nominative Singular (один стіл).'
  - '2, 3, 4 (+22-24..): Genitive Singular (два столи, три столи, чотири столи).'
  - '5-20 (+25-30..): Genitive Plural (п''ять столів).'
  - Provide extensive practice with masculine, feminine, and neuter nouns. 'одна книга,
    дві книги, п'ять книг'; 'одне вікно, два вікна, п'ять вікон'.
  - Special attention to feminine nouns where Nom. Pl. and Gen. Sg. can look similar
    (e.g., 'сестри').
- section: Заперечення з прямим додатком (Negation with a Direct Object)
  words: 700
  points:
  - When you negate a verb that takes a direct object in the Accusative, the object
    often (but not always) shifts to the Genitive.
  - This adds emphasis to the negation. It's the difference between 'I didn't read
    *the book*' and 'I didn't read *any book*'.
  - 'Clear examples: ''Я читаю книгу'' (Acc) -> ''Я не читаю книги'' (Gen). ''Він
    купив машину'' (Acc) -> ''Він не купив машини'' (Gen).'
  - Explain that using the Accusative in negation is also possible and common, but
    the Genitive is grammatically standard and frequent.
vocabulary_hints:
  required:
  - число (дата) (date)
  - місяць (month)
  - січень (січня) (January)
  - лютий (лютого) (February)
  - березень (березня) (March)
  - квітень (квітня) (April)
  - травень (травня) (May)
  - червень (червня) (June)
  - липень (липня) (July)
  - серпень (серпня) (August)
  - вересень (вересня) (September)
  - жовтень (жовтня) (October)
  - листопад (листопада) (November)
  - грудень (грудня) (December)
  - заперечення (negation)
  recommended:
  - числівник (numeral)
  - додаток (object (grammatical))
  - правило (rule)
