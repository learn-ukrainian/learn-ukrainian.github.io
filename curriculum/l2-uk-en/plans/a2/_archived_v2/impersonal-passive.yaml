title: Impersonal Passive Forms
subtitle: Зроблено в Україні — The -но/-то Construction
focus: grammar
pedagogy: PPP
phase: A2.7
word_target: 2000
objectives:
- Learner can form -но/-то impersonal passives from perfective verb infinitives
- Learner can distinguish -но/-то from passive participial adjectives
- Learner can explain that -но/-то is invariable (no gender/number/case)
- Learner can read and understand common Ukrainian signs and notifications
- Learner can use -но/-то in digital, commercial, and official contexts
