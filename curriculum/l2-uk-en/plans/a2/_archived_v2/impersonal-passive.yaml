content_outline:
- section: 'Вступ: Написи навколо нас (Introduction: Signs Around Us)'
  words: 275
  points:
  - 'Cultural hook: Ukrainian signs, labels, and notifications use -но/-то forms everywhere — "Магазин зачинено", "Вхід заборонено",
    "Зроблено в Україні"; motivation to read real-world Ukrainian.'
  - 'Functional literacy goal: after this module learners can decode shop signs, app notifications, official notices, and
    product labels independently.'
  - 'Key contrast established upfront: -но/-то forms report a state or completed action impersonally — no subject, no agent
    required.'
- section: Утворення форм на -но/-то (Formation of -но/-то Forms)
  words: 400
  points:
  - 'Pattern 1 — verbs in -ати/-яти: зробити→зроблено, написати→написано, відкрити→відкрито, закрити→закрито; the -и- of the
    infinitive drops and -но is added.'
  - 'Pattern 2 — verbs in -увати/-ювати: побудувати→побудовано, підготувати→підготовано; the -увати drops and -ано is added.
    For verbs in -ити: зварити→зварено, попросити→попрошено; the -ити drops and -ено is added.'
  - 'Pattern 3 — verbs in -ти (roots ending in consonant): принести→принесено, знайти→знайдено, привезти→привезено.'
  - 'Formation from perfective verbs only: imperfective verbs do not typically form -но/-то impersonal passives; aspect is
    the gatekeeper.'
  - 'Spelling variants -то (older/rarer): зроблено (standard) vs. роблено (dialectal); forms like "зварено", "спечено" in
    recipes and folklore.'
- section: -но/-то vs дієприкметник (-но/-то vs Passive Participle)
  words: 400
  points:
  - 'Critical distinction: -но/-то is INVARIABLE — no gender, no number, no case agreement ever; it is a verbal adverb/predicate,
    not an adjective.'
  - 'Contrastive pair: "Магазин закрито" (impersonal state: the shop is closed right now) vs "Закритий магазин" (descriptive
    adjective: a closed shop, could reopen).'
  - 'Contrastive pair: "Лист написано" (the letter has been written — action complete) vs "Написаний лист" (the written letter
    — describes the noun).'
  - 'Identifying them in text: -но/-то always appears as predicate at end of clause; participle always immediately before
    or after noun it modifies.'
  - 'Learner error alert: *"Замовлена доставлена"* (wrong — two adjectives clashing) vs "Замовлення доставлено" (correct —
    impersonal passive reports completion).'
- section: 'Національна ідентичність: "Зроблено в Україні" (National Identity)'
  words: 325
  points:
  - 'Cultural context: "Зроблено в Україні" as a brand and a statement of national pride; comparison with "Made in Ukraine"
    and what it signals post-2022.'
  - '"Написано українською" (written in Ukrainian) — the language form in the instrumental case combined with -но/-то; seen
    in book colophons and digital content metadata.'
  - '"Засновано у 2014 році" (founded in 2014) — the year in locative case; common in company descriptions, NGO profiles,
    app stores.'
  - 'Patriotic and commercial applications: product certifications, film credits ("Знято в Україні"), newspaper bylines, app
    release notes.'
- section: Читання вивісок та етикеток (Reading Signs and Labels)
  words: 325
  points:
  - 'Real-world sign vocabulary: "Оплату прийнято" (payment accepted), "Замовлення відправлено" (order shipped), "Доступ заборонено"
    (access denied), "Вихід закрито" (exit closed).'
  - 'Digital and app notifications: "Повідомлення надіслано", "Файл завантажено", "Акаунт підтверджено", "Підписку скасовано"
    — recognising forms in everyday tech interactions.'
  - 'Official document language: "Підписано", "Затверджено", "Скасовано" in legal/administrative contexts; why passive is
    preferred over active in bureaucratic registers.'
  - 'Recipe and instruction context: "Нарізано дрібно", "Посолено за смаком", "Запечено до золотистої скоринки" — -но/-то
    in written instructions without a stated cook.'
- section: Практика (Practice)
  words: 275
  points:
  - 'Transformation drill: given an active sentence "Вони зробили замовлення" → produce "Замовлення зроблено"; 15 items covering
    all three formation patterns.'
  - '"Sign or adjective?" identification: read 12 Ukrainian signs and notices; mark each as -но/-то impersonal or participial
    adjective and explain the difference.'
  - 'Creative task: design three bilingual product labels or app notifications using -но/-то forms correctly.'
  - 'Summary: -но/-то as a "done-ness stamp" — invariable, perfective, predicate-only; contrasted with participial adjective
    as a "descriptor stamp".'
vocabulary_hints:
  required:
  - зроблено (done/made) — Very high frequency; "Зроблено в Україні"; from зробити
  - написано (written) — Very high frequency; "Написано українською"; from написати
  - закрито (closed) — Very high frequency; "Магазин закрито"; from закрити
  - відкрито (opened/open) — Very high frequency; "Магазин відкрито"; from відкрити
  - заборонено (forbidden) — High frequency; "Вхід заборонено"; from заборонити
  - побудовано (built) — High frequency; "Будинок побудовано"; from побудувати
  - засновано (founded) — High frequency; "Засновано у 2014 році"; from заснувати
  - відправлено (sent/dispatched) — High frequency; "Замовлення відправлено"; from відправити
  recommended:
  - оплачено (paid) — "Оплату прийнято" / "Оплачено"; from оплатити
  - замовлено (ordered) — "Замовлення замовлено"; from замовити
  - прийнято (accepted/received) — "Оплату прийнято"; from прийняти
  - продано (sold) — "Квитки продано"; from продати
  - знайдено (found) — "Рішення знайдено"; from знайти
  - втрачено (lost) — "З''єднання втрачено"; from втратити
