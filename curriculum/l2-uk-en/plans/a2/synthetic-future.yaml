slug: synthetic-future
level: A2
title: Я це напишу
focus: grammar
track: core
word_target: 2000
reference_word_count: 0
objectives:
- Формувати складену форму майбутнього часу недоконаного виду (буду + інфінітив).
- Формувати просту форму майбутнього часу доконаного виду.
- Розрізняти, коли використовувати кожну з форм майбутнього часу.
- Складати плани та давати обіцянки, використовуючи правильні форми дієслів.
- Правильно ставити запитання про майбутні події.
content_outline:
- section: 'Вступ: Два погляди в майбутнє'
  points:
  - Огляд двох основних способів говорити про майбутнє в українській мові.
  - Прямий зв'язок між видами дієслова та формами майбутнього часу.
  - 'Презентація базової ідеї: ''буду робити'' (процес) vs ''зроблю'' (результат).'
- section: 'Недоконаний майбутній час: Процеси та плани (Буду робити)'
  points:
  - 'Формула утворення: ''буду'', ''будеш'', ''буде'' + інфінітив недоконаного виду.'
  - Відмінювання допоміжного дієслова 'бути' в майбутньому часі.
  - 'Використання для опису дії, що триватиме в майбутньому: ''Завтра я буду працювати
    весь день''.'
  - 'Використання для опису регулярних дій у майбутньому: ''Я буду ходити в спортзал
    тричі на тиждень''.'
- section: 'Доконаний майбутній час: Наміри та результати (Зроблю)'
  points:
  - 'Формула утворення: дієслово доконаного виду у формі теперішнього часу (має значення
    майбутнього).'
  - 'Приклади відмінювання: ''я скажу'', ''ти скажеш'', ''він скаже''.'
  - 'Використання для вираження наміру або обіцянки зробити щось: ''Я подзвоню тобі
    ввечері''.'
  - 'Використання для опису завершеної дії в майбутньому: ''Коли я вивчу ці слова,
    я зможу читати''.'
- section: Запитання та заперечення в майбутньому часі
  points:
  - 'Формування запитань для обох форм: ''Що ти будеш робити?'', ''Що ти зробиш?''.'
  - 'Формування заперечень з часткою ''не'': ''Я не буду цього робити'', ''Я цього
    не зроблю''.'
  - Аналіз смислової різниці між запитаннями.
- section: 'Практика: Планування тижня'
  points:
  - Вправи на вибір правильної форми майбутнього часу в залежності від контексту.
  - Складання власного розкладу на наступний тиждень.
  - 'Діалоги про плани: ''Що ти робиш на вихідних?'' vs ''Що ти будеш робити завтра
    ввечері?''.'
vocabulary_hints:
  required:
  - '[''говорити'', ''to speak, to say (imperfective)'']'
  - '[''сказати'', ''to say, to tell (perfective)'']'
  - '[''вчити'', ''to learn, to study (imperfective)'']'
  - '[''вивчити'', ''to learn, to study (perfective)'']'
  - '[''дзвонити'', ''to call (on the phone) (imperfective)'']'
  - '[''подзвонити'', ''to call (on the phone) (perfective)'']'
  - '[''допомагати'', ''to help (imperfective)'']'
  - '[''допомогти'', ''to help (perfective)'']'
  - '[''завтра'', ''tomorrow'']'
  - '[''післязавтра'', ''the day after tomorrow'']'
  - '[''скоро'', ''soon'']'
  - '[''потім'', ''then, later'']'
  recommended:
  - '[''купувати'', ''to buy (imperfective)'']'
  - '[''купити'', ''to buy (perfective)'']'
  - '[''шукати'', ''to look for (imperfective)'']'
  - '[''знайти'', ''to find (perfective)'']'
  - '[''наступного тижня'', ''next week'']'
  - '[''наступного року'', ''next year'']'
  - '[''ввечері'', ''in the evening'']'
  - '["обов''язково", ''definitely, for sure'']'
activity_hints:
- type: verb_conjugation
  focus: Відмінювання дієслів у недоконаному та доконаному майбутньому часі.
  items_count: 10
- type: cloze
  focus: Вибір правильної форми майбутнього часу (буду робити / зроблю).
  items_count: 15
- type: translation
  focus: Переклад речень з англійської, звертаючи увагу на різницю 'will do' vs 'will
    be doing'.
  items_count: 12
- type: planning_task
  focus: Створення детального плану на вихідні, використовуючи обидві форми майбутнього
    часу.
  items_count: 1
- type: dialogue_construction
  focus: Складання діалогу про плани на відпустку.
  items_count: 8
