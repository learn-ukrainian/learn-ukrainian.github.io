slug: plural-nominative-accusative
title: Багато людей, багато речей
level: A2
word_target: 2000
objectives:
- Form and use the nominative plural for all three genders and declension classes.
- Form and use the accusative plural, distinguishing between animate and inanimate
  nouns.
- Recognize and correctly apply the key plural endings (-и, -і, -а, -я).
- Identify common plural exceptions and irregularities.
- Use plural nouns and adjectives in basic sentences to describe multiple objects
  and people.
content_outline:
- section: 'Називний відмінок множини: Хто? Що?'
  points:
  - 'Основне правило: чоловічий та жіночий рід здебільшого отримують закінчення -и
    або -і (студенти, столи, книги, пісні).'
  - 'Середній рід: закінчення -а або -я (міста, вікна, моря, завдання).'
  - Огляд закінчень для всіх трьох відмін.
  - 'Винятки та особливі форми: друзі, гості, гроші, діти, люди.'
  - 'Прикметники у називному відмінку множини: завжди закінчення -і (нові, великі,
    цікаві).'
- section: 'Знахідний відмінок множини: Кого? Що?'
  points:
  - 'Ключове правило: розрізнення істот та неістот.'
  - 'Неістоти (Що?): форма збігається з називним відміноком (Я бачу нові столи, читаю
    цікаві книги).'
  - 'Істоти (Кого?): форма збігається з родовим відмінком (Ми знаємо цих студентів,
    любимо наших друзів).'
  - 'Практика: порівняння речень з істотами та неістотами.'
  - 'Прикметники у знахідному відмінку множини: залежність від істоти/неістоти (бачу
    цікаві фільми vs. бачу цікавих людей).'
- section: Практика вживання
  points:
  - 'Діалоги в магазині: ''Покажіть, будь ласка, ці окуляри'', ''Які яблука ви хочете?'''
  - 'Опис кімнати або класу: ''У кімнаті стоять столи, стільці та шафи''.'
  - 'Створення речень за зразком: ''Це студенти. Я бачу студентів.'' ''Це книги. Я
    читаю книги.'''
