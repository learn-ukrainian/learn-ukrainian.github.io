slug: home-and-daily-life
title: Мій дім, мій день
level: A2
word_target: 2000
objectives:
- Describe your house or apartment, including different rooms and furniture.
- Talk about your daily routine using verbs of motion and time expressions.
- Use the full case system to describe locations, actions, and objects related to
  home and daily life.
- Learn and use vocabulary for furniture, home appliances, and daily activities.
- Ask and answer questions about someone's home and daily schedule.
content_outline:
- section: 'Мій дім: Опис помешкання'
  points:
  - 'Типи житла: квартира, будинок, гуртожиток.'
  - 'Кімнати: вітальня, спальня, кухня, ванна кімната, кабінет.'
  - 'Опис кімнати: ''У моїй кімнаті стоїть...'', ''На стіні висить...'' (Місцевий
    відмінок).'
  - 'Меблі: стіл, стілець, ліжко, шафа, диван, крісло.'
  - 'Побутова техніка: холодильник, телевізор, комп''ютер, пральна машина.'
- section: Де що знаходиться? Прийменники місця
  points:
  - 'Використання прийменників з Місцевим та Орудним відмінками: в, на, біля, поруч
    з, між, над, під.'
  - 'Приклади: ''Картина висить над диваном'', ''Килим лежить на підлозі під столом'',
    ''Крісло стоїть біля вікна''.'
  - 'Практика: опис власної кімнати або картинки з інтер''єром.'
- section: 'Мій день: Розпорядок дня'
  points:
  - 'Основні дії: прокидатися, вмиватися, снідати, йти/їхати на роботу/навчання, обідати,
    вечеряти, лягати спати.'
  - 'Часові вирази: о сьомій годині (Місцевий), вранці, вдень, ввечері, вночі (Орудний).'
  - 'Дієслова руху: ''Я ходжу в університет'', ''Я їжджу на роботу автобусом''.'
  - Створення розповіді про свій типовий день.
- section: Запитання та відповіді
  points:
  - 'Питання про житло: ''Де ти живеш?'', ''У тебе є своя кімната?'', ''Що є у твоїй
    вітальні?''.'
  - 'Питання про розпорядок дня: ''О котрій годині ти прокидаєшся?'', ''Що ти робиш
    увечері?'', ''Куди ти ходиш у вільний час?''.'
  - 'Практика в парах: інтерв''ю з одногрупником.'
