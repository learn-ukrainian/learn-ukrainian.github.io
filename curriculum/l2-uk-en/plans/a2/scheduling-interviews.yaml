module: a2-64
level: A2
sequence: 64
slug: scheduling-interviews
version: '2.0'
title: Scheduling Interviews
subtitle: Job Search and Interviews
content_outline:
- section: Introduction / Вступ
  points:
  - 'Job market basics — distinguish ''робота'' (job/employment) vs ''праця'' (labor);
    learner error: ''шукати працю'' is incorrect'
  - Finding job openings — collocations for 'вакансія' (відкрита вакансія, шукати
    вакансію, опис вакансії) — aligns with State Standard §3.8 'Робота', 'місця роботи'
- section: Presentation / Презентація
  points:
  - 'призначити співбесіду — collocations: пройти співбесіду, запросити на співбесіду'
  - 'Confirming time and place — cultural hook: Strict use of formal ''Ви'' address
    and ''Пан/Пані + Surname'' until invited otherwise; learner error: switching to
    ''ти'' without invitation'
  - 'Interview vocabulary — collocations for ''резюме'' (надіслати, писати, розглядати);
    cultural hook: emphasis on academic degrees/diplomas'
- section: Practice / Практика
  points:
  - 'Scheduling practice — reinforce Instrumental case for professions (працювати
    + Instr); learner error: using ''як'' instead of Instrumental (e.g., ''працюю
    як менеджер'' is wrong)'
- section: Dialogues / Діалоги
  points:
  - Interview dialogues — include key phrase 'Коли ви можете почати?'
  - Salary discussions — include key phrase 'Яка бажана зарплата?' and collocations
    (висока/низька, середня, виплачувати) — aligns with State Standard §3.8 'заробітна
    плата'
- section: Narrative / Розповідь
  points:
  - Job search story — contextual usage of 'досвід' (досвід роботи, мати досвід, без
    досвіду)
- section: Need More Practice?
  points:
  - Summary and links
vocabulary_hints:
  required:
  - співбесіда (interview) — пройти співбесіду, призначити співбесіду, запросити на
    співбесіду
  - резюме (resume) — надіслати резюме, писати резюме, розглядати резюме
  - вакансія (vacancy) — відкрита вакансія, шукати вакансію, опис вакансії
  - досвід (experience) — досвід роботи, мати досвід, без досвіду
  - зарплата (salary) — висока/низька зарплата, середня зарплата, виплачувати зарплату
  - обов'язки (duties)
  - навички (skills)
  - кандидат (candidate)
  recommended:
  - HR-менеджер (HR manager)
  - графік (schedule)
  - випробувальний (probation)
  - соціальний пакет (benefits)
  - відпустка (vacation)
  - підвищення (promotion)
