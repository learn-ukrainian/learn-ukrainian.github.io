module: a2-067
level: A2
sequence: 67
slug: scheduling-interviews
version: '2.0'
title: Scheduling Interviews
subtitle: Job Search and Interviews
focus: practical
pedagogy: PPP
phase: A2.6 [Practical]
word_target: 3000
objectives:
- Learner can arrange a job interview
- Learner can describe their professional background
- Learner can ask about salary and duties
- Learner can use formal language for business
content_outline:
- section: Вступ (Introduction)
  words: 450
  points:
  - 'Job market basics — distinguish ''робота'' (job/employment) vs ''праця'' (labor); learner error: ''шукати працю'' is
    incorrect, use ''шукати роботу'' as per research.'
  - Finding job openings — collocations for 'вакансія' (відкрита вакансія, шукати вакансію, опис вакансії); aligns with State
    Standard §3.8 'Робота', 'місця роботи'.
  - 'Cultural Hook: Academic Prestige — Ukrainians place high value on formal education; highlight diplomas and academic titles
    on a resume/CV as a cultural differentiator.'
- section: Презентація (Presentation)
  words: 650
  points:
  - Interview terminology — collocations for 'співбесіда' (пройти, призначити, запросити); collocations for 'резюме' (надіслати,
    писати, розглядати).
  - 'Formality hook — strict use of formal ''Ви'' address and ''Пан/Пані + Surname''. Register slip-up: sticking to ''Ви''
    until explicitly invited otherwise (''можна на "ти"?'').'
  - State Standard §3.8 coverage — terminology for professions, places of work, and formal interactions in a professional
    environment.
- section: Граматика та практика (Grammar and Practice)
  words: 600
  points:
  - 'Instrumental case for professions — reinforce ''працюю менеджером'' pattern; learner error drill: correcting ''я працюю
    як менеджер'' (literal translation) to the correct Instrumental case.'
  - Describing professional background — using 'досвід' (мати досвід, без досвіду) and 'навички' (skills) in context.
- section: Діалоги (Dialogues)
  words: 650
  points:
  - Interview dialogues — scheduling time and place using formal register; include key recruitment phrase 'Коли ви можете
    почати?' (When can you start?).
  - Salary discussions — include key phrase 'Яка бажана зарплата?' and collocations (висока/низька, середня, виплачувати);
    aligns with State Standard §3.8 'заробітна плата'.
- section: Розповідь (Narrative)
  words: 450
  points:
  - Job search story — contextual narrative of a candidate applying, being interviewed (formal 'Ви'), and starting a 'випробувальний
    термін' (probation period).
  - Experience summary — using 'досвід роботи' to describe professional background and career goals.
- section: Підсумок (Need More Practice?)
  words: 200
  points:
  - Summary of professional collocations and rules for formal address (Ви vs Ти).
  - 'Quick self-check: matching professions with their correct Instrumental case forms.'
vocabulary_hints:
  required:
  - співбесіда (interview) — пройти співбесіду, призначити співбесіду, запросити на співбесіду; High frequency
  - резюме (resume) — надіслати резюме, писати резюме, розглядати резюме; High frequency
  - вакансія (vacancy) — відкрита вакансія, шукати вакансію, опис вакансія; Aligns with State Standard §3.8
  - досвід (experience) — досвід роботи, мати досвід, без досвіду; High frequency
  - зарплата (salary) — висока/низька зарплата, середня зарплата, виплачувати зарплату; State Standard §3.8
  - обов'язки (duties) — professional responsibilities
  - навички (skills) — specific abilities
  - кандидат (candidate) — applicant for a position
  recommended:
  - робота (job) — distinguish from 'праця' (labor/effort); High frequency usage
  - HR-менеджер (HR manager) — common professional title
  - графік (schedule) — work hours/schedule
  - випробувальний (probation) — typically used as 'випробувальний термін' (probation period)
  - соціальний пакет (benefits) — employee benefits
  - відпустка (vacation) — annual leave
  - підвищення (promotion) — career advancement
  - Пан/Пані (Mr./Ms.) — formal address required in professional settings until invited otherwise
