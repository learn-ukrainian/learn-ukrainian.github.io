title: Numerals and Case Agreement
subtitle: 'Правильно рахуємо: 1 книга, 2 книги, 5 книг'
focus: grammar
pedagogy: PPP
phase: A2.2
word_target: 2000
objectives:
- Learner can use correct noun forms with numerals 1, 2–4, and 5+
- Learner can apply the last-digit rule for compound numerals
- Learner can use один/одна/одне with correct gender agreement
- Learner can distinguish два/дві by gender
- Learner can decline cardinal and ordinal numerals in common oblique cases
- Learner can express prices, ages, and times with correct numeral agreement
