content_outline:
- section: 'Вступ: Чому "дві книги" але "п''ять книг"? (Introduction)'
  words: 400
  points:
  - 'The puzzle of Ukrainian numeral agreement: three distinct agreement zones, not English-style singular/plural binary logic.'
  - 'Practical motivation: correct numeral agreement is essential for shopping (скільки це коштує?), travel (скільки зупинок?),
    and daily life (скільки мені літ?).'
  - 'Preview of three agreement patterns — the mental model for the whole module: Zone 1 (один), Zone 2 (два–чотири), Zone
    3 (п''ять і більше).'
- section: Один/одна/одне + називний (One + Nominative)
  words: 400
  points:
  - 'Gender agreement with одна/один/одне: один друг (m.), одна книга (f.), одне місто (n.); explicit drill to prevent *один
    книга* errors.'
  - 'Plural-only nouns with одні: одні двері, одні штани, одні окуляри — the special case where "one" uses plural form.'
  - 'Cardinal vs ordinal mini-review: один / перший, два / другий — setting up the oblique cases section later.'
- section: Два/три/чотири + називний множини (2–4 + Nominative Plural)
  words: 600
  points:
  - 'Special gender form for два/дві: два квитки (m./n.) vs дві книги (f.); drilling the common learner error *два пляшки*
    → *дві пляшки*.'
  - 'Zone 2 pattern: 2–4 trigger Nominative Plural noun: два друзі, три книги, чотири міста — Ukrainian differs from Russian
    Genitive Singular here.'
  - 'Adjective agreement in Zone 2: два великі будинки, три нові книги — adjective also takes Nominative Plural.'
  - 'Cultural hook: The ancient dual number (двоїна) — why 2–4 behave differently; historical traces visible in stress patterns
    (дві книги vs plural книги).'
- section: П'ять і більше + родовий множини (5+ + Genitive Plural)
  words: 700
  points:
  - 'Zone 3 pattern: 5–20 and all multiples ending in 5–9 and 0 govern Genitive Plural: п''ять друзів, десять книг, двадцять
    міст.'
  - 'The 11–14 trap: these always belong to Zone 3 despite ending in 1–4; drill to prevent over-application of the last-digit
    rule.'
  - 'Connection to Genitive Plural endings from earlier modules: п''ять книг (zero ending), десять міст (zero ending), п''ять
    друзів (-ів ending).'
  - 'Large numbers: сто гривень, тисяча людей, мільйон доларів — same Genitive Plural logic scales up.'
  - 'The "last digit" rule for compound numerals: 21 follows Zone 1, 24 follows Zone 2, 25 follows Zone 3.'
- section: Числівники у непрямих відмінках (Numerals in Oblique Cases)
  words: 500
  points:
  - 'Cardinal numerals decline too: два → двох (Gen/Acc), двом (Dat), двома (Instr); п''ять → п''яти/п''ятьох, п''яти/п''ятьом.'
  - 'Ordinal numerals decline like adjectives: першого (Gen), другому (Dat), третьому (Loc); full agreement with noun gender
    and case.'
  - 'Dates and years: у першому кварталі, у двадцять першому столітті, у дві тисячі двадцять четвертому році — practical high-frequency
    patterns.'
  - 'Age expressions in Dative: мені двадцять один рік vs мені двадцять п''ять років — zone logic applies even when the numeral
    is not the subject.'
- section: 'Практика: Скільки це коштує? (Practice: How Much Does It Cost?)'
  words: 400
  points:
  - 'Shopping dialogues: full numeral + noun agreement in context — один долар, дві гривні, п''ять євро, сто гривень.'
  - 'Time expressions with agreement: одна година, дві години, п''ять годин; двадцять хвилин, один день, три дні, сім днів.'
  - 'Age expressions revisited: мені двадцять один рік, їй тридцять чотири роки, йому п''ятдесят років — all three zones in
    one context.'
  - Summary of the three-zone model as a portable self-correction tool for A2→B1 progression.
vocabulary_hints:
  required:
  - один / одна / одне (one) — Very high frequency; один друг, одна книга, одне місто; mandatory gender agreement
  - два / дві (two) — High frequency; два квитки, дві книги; note gender distinction
  - три (three) — High frequency; три дні, три книги; Zone 2 Nominative Plural
  - чотири (four) — High frequency; чотири роки, чотири міста; Zone 2 agreement
  - п'ять (five) — High frequency; п'ять гривень, п'ять друзів; Zone 3 Genitive Plural
  - 'десять (ten) — High frequency; десять євро, десять хвилин; Zone 3; Note: євро indeclinable'
  - двадцять (twenty) — High frequency; двадцять хвилин, двадцять один рік; compound numeral context
  - сто (one hundred) — High frequency; сто гривень, сто метрів; Zone 3 Genitive Plural
  - тисяча (one thousand) — High frequency; тисяча людей, тисяча гривень
  - гривня / гривні / гривень (hryvnia) — Very high frequency; одна гривня (Zone 1), дві гривні (Zone 2), п'ять гривень (Zone
    3)
  - рік / роки / років (year) — Very high frequency; один рік, два роки, п'ять років; critical for age expressions
  - людина / люди / людей (person/people) — High frequency; одна людина, дві людини, п'ять людей
  recommended:
  - обидва / обидві (both) — High frequency; обидва друзі, обидві книги; functions like Zone 2
  - перший / першого (first) — High frequency ordinal; у першому кварталі, першого січня
  - другий / другому (second) — High frequency ordinal; decline like adjective
  - скільки + Gen pl (how many) — Core question word triggering Genitive Plural
