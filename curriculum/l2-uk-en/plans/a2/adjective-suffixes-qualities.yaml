vocabulary_hints:
  required:
  - 'маленький (small/little) — High frequency; collocations: маленька дитина, маленьке
    село'
  - 'гарненький (pretty/nice - diminutive) — High frequency; collocations: гарненька
    дівчина, гарненький будинок'
  - 'тепленький (warm - diminutive) — High frequency; collocations: тепленьке молоко,
    тепленька вода'
  - 'рідненький (dear/kindred - diminutive) — Cultural hook: рідненька матуся (deep
    affection/intimacy)'
  - 'тихенький (quiet - diminutive) — High frequency; collocations: тихенький голос'
  - 'малесенький (tiny - emphatic) — Medium frequency; collocations: малесенький котик'
  - 'чистесенький (pure/clean - emphatic) — Medium frequency; collocations: чистесенька
    вода'
  - 'страшенний (terrible/huge - expressive) — High frequency in storytelling; collocations:
    страшенний вітер, страшенний змій'
  - 'здоровенний (huge/enormous - expressive) — High frequency; collocations: здоровенний
    чоловік, здоровенний собака'
  - 'величезний (huge/gigantic) — High frequency; collocations: величезний будинок'
  - 'київський (Kyiv adjective) — High frequency; collocations: київський торт, київські
    вулиці'
  - 'львівський (Lviv adjective) — High frequency; collocations: львівська кава, львівський
    дворик'
  - 'український (Ukrainian) — High frequency; collocations: українська мова, українська
    пісня'
  - 'студентський (student adjective) — High frequency; collocations: студентський
    квиток, студентське життя'
  recommended:
  - 'білесенький (white - emphatic) — collocations: білесенький сніг'
  - 'тонесенький (thin - emphatic) — collocations: тонесенька нитка'
  - 'довжелезний (long - emphatic) — collocations: довжелезний шлях'
  - 'козацький (Cossack adjective) — Note: spelling rule K+ськ=цьк; collocations:
    козацький драйв'
  - 'празький (Prague adjective) — Note: spelling rule G/H+ськ=зьк; collocations:
    празький торт'
word_target: 3000
