  notes: Rules for diminutive and intensive adjective suffixes
content_outline:
- section: Вступ (Introduction)
  words: 275
  points:
  - 'The power of the suffix: descriptiveness without ''very'' — introduce the ''Temperature Scale'' concept: Neutral (малий)
    → Warm (маленький) → Intense (малесенький)'
  - Ukrainian as the language of 'Sweetness' — explain that diminutives (пестливі форми) signal respect and intimacy (e.g.,
    рідненька матуся vs. рідна мати), not just physical smallness — reference State Standard §4.5.1 on 'emotional-expressive
    lexis'
- section: 'Презентація 1: Пестливість та периферія (Presentation 1: Diminutives and Precision)'
  words: 500
  points:
  - 'Diminutive Magic: -Еньк- and -Есеньк- (Sweetness and Precision) — focus on high-frequency conversational forms like «гарненька
    дівчина», «тепленьке молоко» and emphatic precision like «малесенький котик», «чистесенька вода»'
  - 'The ''Register Mismatch'' Trap: Why context matters — explain the social error of using diminutives in formal settings
    (e.g., asking a boss for a «підписочок» instead of a «підпис») and how it affects perceived professionalism'
- section: 'Презентація 2: Гіпербола та Відношення (Presentation 2: Hyperbole and Relationships)'
  words: 500
  points:
  - 'The Scale of Giants: -Енн- and -Езн- (Enormous and Intense) — cultural hook: explain Ukrainian hyperbole in storytelling
    and folk tales using «страшенний змій» or «здоровенний чоловік»'
  - 'Stress and Spelling Alert: Distinguishing emphatic adjectives (-енний) from passive participles (-ений) — focus on the
    double ''н'' and stress shift in pairs like «нездійсне́нний» (impossible) vs. «незді́йснений» (unfulfilled)'
  - 'The Universal Link: -Н-, -Ян-, and -Ов- (Materials and Groups) — reference State Standard §4.3.6 on noun-to-adjective
    derivation rules (осінь → осінній, дерево → дерев''яний)'
- section: Практика та орфографія (Practice and Orthography)
  words: 425
  points:
  - 'Mastering the Consonant Mutation: The K/Ch/Ts + -ськ- = -ЦЬК- rule — intensive spelling drill to correct common learner
    errors like «пражський» (wrong) → «празький» (correct) and «козакський» (wrong) → «козацький» (correct)'
  - 'Emotional Transformation Drills: Re-writing neutral sentences into ''warm'' (diminutive) and ''intense'' (emphatic) versions
    to practice register control and suffix selection'
- section: Діалоги та підсумок (Dialogues and Summary)
  words: 300
  points:
  - 'On the Market: Choosing between a «здоровенний кавун» (gigantic watermelon) and a «гарненький кавунчик» (nice little
    watermelon) — dialogue focusing on size vs. affection'
  - 'Summary: Suffixes as the key to linguistic decolonization — moving away from English-style ''very'' modifiers toward
    authentic Ukrainian morphological depth, preparing for B1 participles'
vocabulary_hints:
  required:
  - 'маленький (small/little) — High frequency; collocations: маленька дитина, маленьке село'
  - 'гарненький (pretty/nice - diminutive) — High frequency; collocations: гарненька дівчина, гарненький будинок'
  - 'тепленький (warm - diminutive) — High frequency; collocations: тепленьке молоко, тепленька вода'
  - 'рідненький (dear/kindred - diminutive) — Cultural hook: рідненька матуся (deep affection/intimacy)'
  - 'тихенький (quiet - diminutive) — High frequency; collocations: тихенький голос'
  - 'малесенький (tiny - emphatic) — Medium frequency; collocations: малесенький котик'
  - 'чистесенький (pure/clean - emphatic) — Medium frequency; collocations: чистесенька вода'
  - 'страшенний (terrible/huge - expressive) — High frequency in storytelling; collocations: страшенний вітер, страшенний
    змій'
  - 'здоровенний (huge/enormous - expressive) — High frequency; collocations: здоровенний чоловік, здоровенний собака'
  - 'величезний (huge/gigantic) — High frequency; collocations: величезний будинок'
  - 'київський (Kyiv adjective) — High frequency; collocations: київський торт, київські вулиці'
  - 'львівський (Lviv adjective) — High frequency; collocations: львівська кава, львівський дворик'
  - 'український (Ukrainian) — High frequency; collocations: українська мова, українська пісня'
  - 'студентський (student adjective) — High frequency; collocations: студентський квиток, студентське життя'
  recommended:
  - 'білесенький (white - emphatic) — collocations: білесенький сніг'
  - 'тонесенький (thin - emphatic) — collocations: тонесенька нитка'
  - 'довжелезний (long - emphatic) — collocations: довжелезний шлях'
  - 'козацький (Cossack adjective) — Note: spelling rule K+ськ=цьк; collocations: козацький драйв'
  - 'празький (Prague adjective) — Note: spelling rule G/H+ськ=зьк; collocations: празький торт'
