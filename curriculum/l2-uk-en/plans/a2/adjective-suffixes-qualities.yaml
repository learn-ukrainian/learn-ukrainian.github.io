module: a2-39
level: A2
sequence: 39
slug: adjective-suffixes-qualities
version: '2.0'
title: Adjective Suffixes — Qualities
subtitle: Making Descriptions Richer
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'The power of the suffix: descriptiveness without ''very'' — introduce the ''Temperature
    Scale'' concept: Neutral (малий) → Warm (маленький) → Intense (малесенький)'
  - Ukrainian as the language of 'Sweetness' — explain that diminutives (пестливі
    форми) signal respect and intimacy (e.g., рідненька матуся vs. рідна мати), not
    just physical smallness — reference State Standard §4.5.1 on 'emotional-expressive
    lexis'
- section: 'Презентація 1: Пестливість та периферія (Presentation 1: Diminutives and
    Precision)'
  words: 750
  points:
  - 'Diminutive Magic: -Еньк- and -Есеньк- (Sweetness and Precision) — focus on high-frequency
    conversational forms like «гарненька дівчина», «тепленьке молоко» and emphatic
    precision like «малесенький котик», «чистесенька вода»'
  - 'The ''Register Mismatch'' Trap: Why context matters — explain the social error
    of using diminutives in formal settings (e.g., asking a boss for a «підписочок»
    instead of a «підпис») and how it affects perceived professionalism'
- section: 'Презентація 2: Гіпербола та Відношення (Presentation 2: Hyperbole and
    Relationships)'
  words: 750
  points:
  - 'The Scale of Giants: -Енн- and -Езн- (Enormous and Intense) — cultural hook:
    explain Ukrainian hyperbole in storytelling and folk tales using «страшенний змій»
    or «здоровенний чоловік»'
  - 'Stress and Spelling Alert: Distinguishing emphatic adjectives (-енний) from passive
    participles (-ений) — focus on the double ''н'' and stress shift in pairs like
    «нездійсне́нний» (impossible) vs. «незді́йснений» (unfulfilled)'
  - 'The Universal Link: -Н-, -Ян-, and -Ов- (Materials and Groups) — reference State
    Standard §4.3.6 on noun-to-adjective derivation rules (осінь → осінній, дерево
    → дерев''яний)'
- section: Практика та орфографія (Practice and Orthography)
  words: 650
  points:
  - 'Mastering the Consonant Mutation: The K/Ch/Ts + -ськ- = -ЦЬК- rule — intensive
    spelling drill to correct common learner errors like «пражський» (wrong) → «празький»
    (correct) and «козакський» (wrong) → «козацький» (correct)'
  - 'Emotional Transformation Drills: Re-writing neutral sentences into ''warm'' (diminutive)
    and ''intense'' (emphatic) versions to practice register control and suffix selection'
- section: Діалоги та підсумок (Dialogues and Summary)
  words: 450
  points:
  - 'On the Market: Choosing between a «здоровенний кавун» (gigantic watermelon) and
    a «гарненький кавунчик» (nice little watermelon) — dialogue focusing on size vs.
    affection'
  - 'Summary: Suffixes as the key to linguistic decolonization — moving away from
    English-style ''very'' modifiers toward authentic Ukrainian morphological depth,
    preparing for B1 participles'
focus: grammar
pedagogy: PPP
objectives:
- Learner can use suffixes to express affection or smallness
- Learner can use suffixes to express largeness or intensity
- Learner can form adjectives from nouns using common suffixes
- Learner can describe objects with emotional nuance
module_type: grammar
