module: a2-020
level: A2
sequence: 20
slug: locative-expanded
version: 1.0.4
title: Місцевий відмінок у нових контекстах
subtitle: Абстрактні іменники, часові вирази та тема розмови у місцевому відмінку
focus: grammar
pedagogy: PPP
phase: 'A2.3 [Давальний відмінок]'
word_target: 2000
objectives:
- Студент вміє використовувати місцевий відмінок з абстрактними іменниками для вираження контексту та сфери діяльності (у житті, в освіті, на роботі, у політиці).
- Студент вміє використовувати часові вирази в місцевому відмінку для позначення місяців, тижнів та періодів (у минулому місяці, на цьому тижні, у дитинстві).
- Студент вміє позначати тему чи засіб зв'язку за допомогою конструкції по + місцевий відмінок (по телефону, по радіо) та розрізняти розмовляти/говорити про + знахідний відмінок і по + місцевий відмінок.
- Студент вміє поєднувати місцевий відмінок із прийменниками у/в, на, по в різних життєвих контекстах, що виходять за межі простого позначення фізичного місця.
dialogue_situations:
- setting: 'Двоє друзів діляться новинами після довгої розлуки — говорять про зміни в житті: Що нового у твоєму житті? — У минулому місяці я змінила роботу. Тепер працюю в освіті. А ти? — Я на новому курсі. Розмовляли по телефону з мамою — вона хвилюється.'
  speakers:
  - Марія
  - Ігор
  motivation: 'Природна розмова, що охоплює всі три нові функції місцевого відмінка: абстрактну (у житті, в освіті), часову (у минулому місяці) та комунікативну (по телефону)'
- setting: 'Студент обговорює свій розклад та інтереси з викладачем: На цьому тижні у мене три заняття. У вільний час я читаю про Україну — у підручнику з історії. В дитинстві я мало знав про українську культуру.'
  speakers:
  - Студент
  - Викладач
  motivation: 'Часовий місцевий відмінок (на цьому тижні, в дитинстві) + абстрактна сфера (в історії, про культуру)'
content_outline:
- section: Місцевий відмінок з абстрактними іменниками
  words: 550
  points:
  - 'На рівні A1 ми вивчали місцевий відмінок для позначення фізичного місця (у місті, на вулиці). Тепер розширюємо його на абстрактні сфери та контексти.'
  - 'Поширені абстрактні словосполучення в місцевому відмінку: у житті, в освіті, у політиці, на роботі, в економіці, у мистецтві.'
  - 'Модель: у/в + абстрактний іменник у місцевому відмінку = "у певній сфері/галузі". Зверніть увагу: на роботі (не *у роботі) — для слова робота традиційно використовується прийменник на.'
  - 'Практика утворення місцевого відмінка абстрактних іменників жіночого роду на -а/-я: наука→у науці, політика→у політиці, культура→у культурі.'
- section: Часовий місцевий відмінок
  words: 600
  points:
  - 'Місяці: у січні, у лютому, у березні... усі місяці вживаються з прийменниками у/в + місцевий відмінок. Чоловічий рід на -ень змінюється на -ні (січень→у січні). Конструкції зі словом місяць: у минулому місяці, у наступному місяці.'
  - 'Тижні: на цьому тижні, на минулому тижні, на наступному тижні. Зверніть увагу: зі словом тиждень використовується прийменник на (а не у).'
  - 'Життєві періоди: у дитинстві, у молодості, у старості, у минулому, у майбутньому.'
  - 'Протиставлення зі знахідним відмінком для позначення тривалості: у понеділок (знахідний відм.) та у минулому місяці (місцевий відм.). Перевірка запитанням: Коли? (часовий місцевий) та Як довго? (тривалість, знахідний).'
- section: 'По телефону, по радіо: місцевий відмінок із прийменником «по»'
  words: 500
  points:
  - 'Тема або засіб комунікації за допомогою конструкції по + місцевий відмінок: по телефону, по радіо, по пошті, по дорозі.'
  - 'Різниця: говорити по телефону (засіб зв''язку) та говорити про телефон (про телефон як тему). По + місцевий відмінок = засіб/канал. Про + знахідний відмінок = тема.'
  - 'Поширені фрази: Я подзвоню по телефону. Ми почули по радіо. Він надіслав по пошті. Зустрілися по дорозі додому.'
  - 'Зверніть увагу: по + місцевий відмінок — це традиційна українська модель. У сучасному мовленні іноді трапляється перехід до по + давальний відмінок (розподіл: по одному), але для засобів зв''язку місцевий відмінок залишається нормою.'
- section: 'Місцевий відмінок: від місця до сенсу'
  words: 350
  points:
  - 'Підсумок: місцевий відмінок позначає не лише місце — він відповідає на запитання де? (місце), коли? (час) та як? (засіб/канал).'
  - 'Узагальнювальна таблиця: фізичне місце (у місті), абстрактна сфера (у житті), час (у січні), засіб (по телефону) — усе це місцевий відмінок, але чотири різні функції.'
  - 'Практика: побудова речень, у яких поєднуються 2-3 функції місцевого відмінка: У минулому місяці я розмовляв по телефону з другом у Києві.'
- section: Підсумок
  words: 200
  points:
  - 'Місцевий відмінок виходить за межі фізичних місць, охоплюючи абстрактні сфери (у житті, у політиці, на роботі) та періоди часу (у січні, на цьому тижні, у дитинстві). Самоперевірка: Перекладіть "at work in January" українською. Який прийменник ми використовуємо зі словом "тиждень" у місцевому відмінку?'
  - 'Прийменник "по" + місцевий відмінок виражає засіб або канал зв''язку (по телефону, по радіо). Самоперевірка: У чому різниця між "говорити по телефону" та "говорити про телефон"? Напишіть одне речення, у якому місцевий відмінок вживається і для позначення періоду часу, і для каналу зв''язку.'
vocabulary_hints:
  required:
  - місцевий (locative (case))
  - абстрактний (abstract)
  - минулий (past, previous)
  - місяць (month)
  - тиждень (week)
  - телефон (phone, telephone)
  - подорож (journey, trip)
  - зустріч (meeting, encounter)
  - думка (thought, opinion)
  - проблема (problem)
  recommended:
  - дитинство (childhood)
  - молодість (youth)
  - майбутнє (future)
  - освіта (education)
  - мистецтво (art)
activity_hints:
- type: quiz
  focus: Визначити функцію місцевого відмінка в кожному реченні (фізичне місце, абстрактна сфера, час або засіб)
  items: 8
- type: fill-in
  focus: Доповнити речення правильною формою іменника в місцевому відмінку (у минулому ___, на цьому ___, по ___)
  items: 8
- type: match-up
  focus: Зіставити вирази в місцевому відмінку з їхніми англійськими відповідниками для всіх чотирьох типів функцій
  items: 8
- type: error-correction
  focus: Виправити помилки у вживанні прийменників (наприклад, *у роботі → на роботі, *у телефону → по телефону, *на минулому місяці → у минулому місяці)
  items: 8
references:
- title: Заболотний Grade 5, §28-30
