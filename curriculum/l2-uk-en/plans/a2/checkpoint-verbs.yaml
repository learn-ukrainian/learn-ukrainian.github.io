slug: checkpoint-verbs
level: A2
title: 'Контрольна точка: Дієслова'
focus: review
track: core
word_target: 1500
reference_word_count: 0
objectives:
- Перевірити розуміння та використання видів дієслів у минулому часі.
- Оцінити вміння утворювати та розрізняти форми майбутнього часу.
- Перевірити правильність використання базових дієслів руху.
- Оцінити здатність утворювати та використовувати всі форми наказового способу.
- Перевірити вміння інтегрувати всі вивчені граматичні концепції в коротких розповідях
  та діалогах.
content_outline:
- section: 'Повторення: Минулий час (Що робив? vs. Що зробив?)'
  points:
  - 'Ключові відмінності: процес/повторення vs. результат/завершеність.'
  - Вправи на вибір правильного виду в реченнях.
  - Короткі запитання-відповіді про минулий досвід.
- section: 'Повторення: Майбутній час (Буду робити vs. Зроблю)'
  points:
  - Структура складеного та простого майбутнього часу.
  - Контексти використання кожної форми.
  - Вправи на трансформацію речень та вибір правильної форми.
- section: 'Повторення: Дієслова руху (Іти/Ходити, Їхати/Їздити)'
  points:
  - Різниця між односпрямованим та різноспрямованим рухом.
  - Використання 'пішки' та 'транспортом'.
  - Ситуативні задачі на вибір правильного дієслова.
- section: 'Повторення: Наказовий спосіб (Читай, Хай читає, Читаймо)'
  points:
  - Огляд форм для 2-ї, 3-ї особи та 1-ї особи множини.
  - Вправи на утворення всіх форм від заданих дієслів.
  - Створення прохань та побажань.
- section: Комплексний тест
  points:
  - Заповнення пропусків у зв'язному тексті дієсловами в правильній формі.
  - Написання короткої розповіді про свою останню подорож.
  - Створення діалогу, де обговорюються плани на майбутнє.
vocabulary_hints:
  required:
  - '[''робити/зробити'', ''to do/make'']'
  - '[''читати/прочитати'', ''to read'']'
  - '[''писати/написати'', ''to write'']'
  - '[''іти/ходити'', ''to go (on foot)'']'
  - '[''їхати/їздити'', ''to go (by vehicle)'']'
  - '[''давати/дати'', ''to give'']'
  - '[''брати/взяти'', ''to take'']'
  - '[''говорити/сказати'', ''to speak/say'']'
  - '[''починати/почати'', ''to begin'']'
  - '[''закінчувати/закінчити'', ''to finish'']'
  - '[''допомагати/допомогти'', ''to help'']'
  - '[''бути'', ''to be'']'
  recommended:
  - '[''минулий'', ''past'']'
  - '[''майбутній'', ''future'']'
  - '[''теперішній'', ''present'']'
  - '[''завжди'', ''always'']'
  - '[''іноді'', ''sometimes'']'
  - '[''ніколи'', ''never'']'
  - '[''план'', ''plan'']'
  - '[''історія'', ''story, history'']'
activity_hints:
- type: multiple_choice
  focus: Вибір правильного дієслова або його форми з кількох варіантів.
  items_count: 15
- type: error_correction
  focus: Знаходження та виправлення помилок у використанні дієслів у тексті.
  items_count: 12
- type: short_narrative
  focus: Написання короткого тексту (5-7 речень) на задану тему (напр., 'Мій робочий
    день').
  items_count: 3
- type: dialogue_completion
  focus: Заповнення пропущених реплік у діалозі.
  items_count: 10
- type: mixed_tense_drill
  focus: Трансформація речень між минулим, теперішнім та майбутнім часами.
  items_count: 10
