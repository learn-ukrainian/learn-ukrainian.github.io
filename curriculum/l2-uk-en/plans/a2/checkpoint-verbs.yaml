module: a2-046
level: A2
sequence: 46
slug: checkpoint-verbs
version: 1.1.3
title: 'Контрольна точка: Вид, час і рух'
subtitle: 'Перевірка знань: видові pairs, майбутній час, дієслова руху та наказовий спосіб'
focus: review
pedagogy: Review
phase: А2.6 [Вид, часи та дієслова руху]
word_target: 1500
objectives:
- Здобувач може правильно вибирати між недоконаним і доконаним видом у минулому та майбутньому часі в різних контекстах (процес vs. результат, звичка vs. одноразова подія, тло vs. основна дія).
- Здобувач може утворювати синтетичний майбутній час (доконаний вид) та аналітичний майбутній час (недоконаний вид) для поширених видових пар дієслів і пояснювати, чому використовується кожна форма.
- Здобувач може використовувати дієслова руху (іти/ходити, їхати/їздити) з правильними прийменниками та відмінками, а також утворювати їхні видові пари з префіксом по-.
- Здобувач може утворювати форми наказового способу для всіх осіб (2-га особа, 3-тя особа з "хай", 1-ша особа множини на -мо), включаючи конструкції побажань (Кличний відмінок + наказовий спосіб + Орудний відмінок).
dialogue_situations:
- situation: 'Викладач проводить усне опитування — просить студента переказати свої вихідні, правильно використовуючи вид дієслова, дієслова руху та наказовий спосіб'
  functions:
  - розповідь про минулі події
  - вибір виду дієслова
  - використання дієслів руху
  key_vocabulary:
  - вид дієслова
  - дієслова руху
  - наказовий спосіб
- situation: 'Двоє друзів планують похід у гори — один вказує дорогу, використовуючи дієслова руху, інший радить, що взяти з собою, використовуючи наказовий спосіб'
  functions:
  - вказування дороги
  - висловлення пропозицій
  - планування діяльності
  key_vocabulary:
  - іти
  - їхати
  - візьми
  - ходімо
content_outline:
- section: 'Частина 1: Вид дієслова — минулий і майбутній час'
  words: 450
  points:
  - 'Вправа 1: Визначення виду — прочитати 8 речень у минулому часі, визначити вид кожного підкресленого дієслова та пояснити вибір (процес, результат, звичка, одноразова подія, тло, послідовність).'
  - 'Вправа 2: Вибір виду — заповнити пропуск правильною видовою формою (недоконаною або доконаною) у реченнях минулого та майбутнього часу. Змішані контексти: Вона довго ___ (готувати/приготувати) обід. Він вже ___ (писати/написати) листа.'
  - 'Вправа 3: Утворення майбутнього часу — для заданих 8 інфінітивів (змішаних видів) утворити правильну форму майбутнього часу: доконаний вид → синтетична форма (напишу), недоконаний вид → аналітична форма (буду писати).'
- section: 'Частина 2: Дієслова руху та наказовий спосіб'
  words: 450
  points:
  - 'Вправа 4: Вибір дієслова руху — доповнити 6 речень, вибираючи між дієсловами односпрямованого та різноспрямованого руху. Зараз я ___ (іти/ходити) додому. Щодня він ___ (їхати/їздити) на роботу.'
  - 'Вправа 5: Дієслова руху + прийменники — з''єднати дієслова руху з пунктами призначення, використовуючи правильний прийменник і відмінок: ___ школи (з + родовий — from), ___ Львова (до + родовий — to), ___ роботу (на + знахідний — to).'
  - 'Вправа 6: Утворення наказового способу — утворити форми наказового способу для всіх осіб від заданих інфінітивів. 2-га особа: читай/читайте. 3-тя особа: хай читає. 1-ша особа множини: читаймо. Включаючи вибір виду дієслова.'
- section: 'Частина 3: Комплексні завдання'
  words: 600
  points:
  - 'Вправа 7: Виправлення помилок — 8 речень із дієслівними помилками (неправильний вид, неправильний тип руху, неправильна форма наказового способу, неправильний тип майбутнього часу). Здобувач виявляє та виправляє кожну помилку. Наприклад: *Він щодня зробив вправи → робив; *Ми їдемо туди кожного літа → їздимо.'
  - 'Вправа 8: Завершення розповіді — коротка розповідь із 8 пропусками. Здобувач заповнює пропуски правильними формами, використовуючи всі навички з М35-40: вид дієслова в минулому часі, майбутній час, дієслова руху, наказовий спосіб.'
  - 'Вправа 9: Кероване мовлення — написати 8-10 речень із розповіддю про поїздку на вихідні. Обов''язково включити: вид дієслова в минулому часі (обидва), дієслова руху (принаймні 2 пари), одну форму наказового способу (порада другу), одне побажання (Кличний відмінок + будь + Орудний відмінок).'
  - 'Самооцінка: Чи можу я впевнено вибирати вид дієслова? Чи можу я утворювати обидва типи майбутнього часу? Чи знаю я, коли використовувати "іти" або "ходити"? Чи можу я висловлювати побажання за допомогою "Кличний відмінок + будь + Орудний відмінок"? Чи готовий я до А2.7?'
- section: Підсумок
  words: 200
  points:
  - 'Вибір виду дієслова визначає його значення: недоконаний вид для процесів або звичок (я писав, буду писати), доконаний вид для результатів або одноразових подій (я написав, напишу). Самоперевірка: Яка різниця між "вона готувала" та "вона приготувала"?'
  - 'Дієслова руху поділяються на односпрямовані (іти, їхати) для поїздок у межах одного напрямку в процесі та різноспрямовані (ходити, їздити) для звичок або поїздок туди й назад. Самоперевірка: Перекладіть "I go to work every day" та "I am going to work right now", використовуючи правильні дієслова руху.'
  - 'Наказовий спосіб дозволяє давати команди або висловлювати пропозиції в усіх особах (читай, читаймо, хай читає). Самоперевірка: Як запропонувати "Let''s go to the cafe!" українською?'
