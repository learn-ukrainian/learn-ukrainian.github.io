- type: fill-in
  focus: 'Змішане тренування — доповнити речення, що вимагають вибору виду, дієслова руху та утворення наказового способу для всіх тем М35-40'
  items: 8
- type: quiz
  focus: 'Виправлення помилок — знайти та виправити дієслівні помилки (неправильний вид, тип руху, форма наказового способу або утворення майбутнього часу)'
  items: 8
- type: group-sort
  focus: 'Відсортувати дієслівні форми за категоріями — минулий час недоконаного виду, минулий час доконаного виду, синтетичний майбутній час, аналітичний майбутній час, наказовий спосіб'
  items: 8
- type: error-correction
  focus: 'Знайти та виправити помилки в дієслівних формах — неправильний вид, неправильний тип дієслова руху, неправильна форма наказового способу, неправильна конструкція майбутнього часу'
  items: 6
