level: A2
word_target: 1500
title: 'Контрольна точка: Родовий відмінок'
subtitle: Перевірка знань з модулів 08-13
objectives:
- Систематизувати знання про форми та функції родового відмінка.
- Перевірити вміння правильно використовувати прийменники родового відмінка.
- Оцінити навички узгодження прикметників та займенників з іменниками в родовому відмінку.
- Перевірити знання форм родового відмінка множини.
- Продемонструвати застосування родового відмінка в комунікативних ситуаціях.
content_outline:
- section: 'Повторення: Прийменники та їх значення'
  points:
  - 'Швидкий огляд прийменників: з, від, після, для, без, біля, навпроти, коло, до.'
  - Вправа на вибір правильного прийменника.
- section: 'Повторення: Узгодження прикметників та займенників'
  points:
  - Коротке нагадування про закінчення -ого, -ої.
  - Вправа на розкриття дужок та узгодження.
- section: 'Повторення: Родовий відмінок множини'
  points:
  - Нагадування про закінчення -ів, нульове закінчення, -ей.
  - Вправа на утворення форм множини після чисел та слів кількості.
- section: Комплексна вправа
  points:
  - Текст з пропусками, де потрібно вставити слова в правильній формі родового відмінка
    (однина, множина, з прийменниками та узгодженням).
- section: Комунікативне завдання
  points:
  - 'Завдання: написати короткий текст або діалог (5-7 речень), використовуючи різні
    конструкції з родовим відмінком (напр., розказати про свій день, описати покупки).'
vocabulary_hints:
  required:
  - 'без цукру: without sugar'
  - 'для друзів: for friends'
  - 'до роботи: to work'
  - 'після школи: after school'
  - 'багато людей: many people'
  - 'п''ять кілограмів: five kilograms'
  - 'цього будинку: of this house'
  - 'гарної погоди: of good weather'
  - 'немає часу: no time'
  - 'немає грошей: no money'
  - 'кілька питань: a few questions'
  recommended:
  - 'немає проблем: no problems'
  - 'навпроти театру: opposite the theater'
  - 'від моєї сестри: from my sister'
  - 'сто грамів сиру: 100 grams of cheese'
  - 'чашка кави: a cup of coffee'
  - 'десять хвилин: ten minutes'
  - 'урок української мови: Ukrainian language lesson'
activity_hints:
- type: mixed-fill-in-the-blanks
  focus: Комплексна вправа на всі аспекти родового відмінка
  items: 20
- type: text-completion
  focus: Заповнення пропусків у зв'язному тексті, що вимагає глибокого розуміння контексту
  items: 15
- type: error-analysis
  focus: Пошук, ідентифікація та виправлення помилок у реченнях
  items: 12
- type: translation-challenge
  focus: Переклад речень з англійської на українську, що вимагають точного вживання
    родового відмінка
  items: 10
