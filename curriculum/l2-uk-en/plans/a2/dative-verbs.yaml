module: a2-021
level: A2
sequence: 21
slug: dative-verbs
version: 1.0.2
title: Допомагати, дякувати, дзвонити
subtitle: Дієслова, що вимагають давального відмінка, та конструкція з 
  подобатися
focus: grammar
pedagogy: PPP
phase: A2.3 [Dative Case]
word_target: 2000
objectives:
- Learner can use at least 6 verbs that govern the dative case (допомагати, 
  дякувати, дзвонити, радити, заважати, відповідати) with correct noun/pronoun 
  forms.
- Learner can produce sentences with подобатися using the dative experiencer + 
  nominative object pattern (Мені подобається ця книжка).
- Learner can express age using the dative construction (Дідусеві вісімдесят 
  років, Мені двадцять п'ять).
- Learner can distinguish verbs that take dative from verbs that take accusative
  in sentence production.
dialogue_situations:
- setting: 'Community volunteer day — helping different people: Допомагаю бабусі (f,
    grandma) нести сумки. Дзвоню другові (m, friend). Раджу сусідці (f, neighbor)
    нового лікаря. Мені подобається допомагати!'
  speakers:
  - Волонтер
  - Різні люди
  motivation: 'Dative verbs: допомагати бабусі, дзвонити другові, радити сусідці'
content_outline:
- section: Дієслова з давальним відмінком (Verbs That Take the Dative)
  words: 600
  points:
  - 'Core group of dative-governing verbs: допомагати (to help), дякувати (to thank),
    дзвонити (to call/phone), радити (to advise), заважати (to bother/disturb), відповідати
    (to answer someone).'
  - 'Key insight: in English many of these take direct objects (help someone, call
    someone), but in Ukrainian the person is in the Dative — допомагати кому?, дякувати
    кому?'
  - 'Sentence patterns: Я допомагаю мамі. Він дякує вчителеві. Вона дзвонить подрузі.
    Ми радимо тобі. Вони заважають нам.'
  - Practice combining these verbs with both pronoun and noun dative forms.
  - 'Negative forms: не заважай мені, не дзвони їй.'
- section: 'Мені подобається: Давальний відмінок досвідника (The Experiencer Dative
    with подобатися)'
  words: 500
  points:
  - 'подобатися has reversed syntax: the experiencer (who likes) is in the Dative,
    the thing liked is in the Nominative and controls the verb — Мені подобається
    ця книжка. Тобі подобаються ці фільми.'
  - 'Conjugation: подобається (singular subject) vs. подобаються (plural subject).
    The verb agrees with the Nominative thing, NOT the Dative person.'
  - Compare with English "I like this book" (I = subject) vs. Ukrainian "Мені 
    подобається ця книжка" (книжка = grammatical subject).
  - 'Past tense: Мені подобалася ця пісня. Мені подобався цей фільм. (Gender agrees
    with the nominative subject.)'
  - Practice with various subjects and dative experiencers.
- section: Скільки тобі років? Вік у давальному відмінку (Age in the Dative)
  words: 450
  points:
  - 'Age construction: Dative + number + рік/роки/років. Мені двадцять п''ять років.
    Дідусеві вісімдесят. Дитині три роки.'
  - 'Question pattern: Скільки тобі років? Скільки їй років?'
  - 'Number agreement: один рік, два/три/чотири роки, п''ять і більше років.'
  - Dialogue practice — asking and telling ages of family members and friends.
- section: Давальний чи знахідний? Порівняння (Dative vs. Accusative with Verbs)
  words: 450
  points:
  - 'Verbs with Accusative (direct object): бачити, знати, любити, чекати — кого?
    що?'
  - 'Verbs with Dative (indirect/experiencer): допомагати, дякувати, дзвонити, радити
    — кому?'
  - 'Some verbs take both: давати КОМУ (Dat.) ЩО (Acc.), розповідати КОМУ (Dat.) ПРО
    ЩО (Acc.).'
  - 'Decision strategy: Is the person a recipient/experiencer? → Dative. Is the person
    directly acted upon? → Accusative.'
  - Contrastive drills with minimal pairs.
- section: Підсумок — Summary
  words: 200
  points:
  - "The Dative case is used for the recipient or experiencer with verbs like допомагати,
    дякувати, дзвонити, and for expressing age: Мені двадцять років. Self-check: How
    do you ask 'How old are you?' in Ukrainian? Tell the age of 3 family members using
    the Dative."
  - 'The verb подобатися reverses standard syntax: the experiencer is Dative, and
    the liked object is Nominative and controls the verb (Мені подобається ця книжка,
    Тобі подобаються ці фільми). Self-check: What is the difference between любити
    and подобатися in terms of cases? List 3 things you like using подобається or
    подобаються.'
vocabulary_hints:
  required:
  - допомагати (to help)
  - дякувати (to thank)
  - дзвонити (to call, to phone)
  - радити (to advise)
  - заважати (to bother, to disturb)
  - подобатися (to be pleasing to, to like (reversed syntax))
  - відповідати (to answer (someone))
  - рік (year)
  - роки (years (2-4))
  - років (years (5+))
  recommended:
  - довіряти (to trust)
  - вибачати (to forgive)
  - посміхатися (to smile (at someone))
  - співчувати (to sympathize (with someone))
  - заздрити (to envy)
activity_hints:
- type: fill-in
  focus: Complete sentences with the correct dative form after dative-governing 
    verbs
  items: 8
- type: quiz
  focus: Choose dative vs. accusative for the underlined noun/pronoun 
    (допомагати мам_ vs. бачити мам_)
  items: 8
- type: match-up
  focus: Match подобатися sentences to their English equivalents (reversed 
    subject mapping)
  items: 8
- type: true-false
  focus: Judge whether age expressions use correct dative forms and number 
    agreement
  items: 8
