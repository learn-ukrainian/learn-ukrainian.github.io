  items: 8
- type: quiz
  focus: Обрати давальний або знахідний відмінок для підкресленого іменника/займенника (допомагати мам_ проти бачити мам_)
  items: 8
- type: match-up
  focus: Зіставити речення з подобатися з їхніми англійськими еквівалентами (зворотне відображення підмета)
  items: 8
- type: true-false
  focus: Визначити, чи правильно використані форми давального відмінка та узгодження чисел у виразах віку
  items: 8
