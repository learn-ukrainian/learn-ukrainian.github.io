module: a2-021
level: A2
sequence: 21
slug: dative-verbs
version: 1.0.3
title: Допомагати, дякувати, дзвонити
subtitle: Дієслова, що вимагають давального відмінка, та конструкція з подобатися
focus: grammar
pedagogy: PPP
phase: A2.3 [Давальний відмінок]
word_target: 2000
objectives:
- Вміти використовувати щонайменше 6 дієслів, які керують давальним відмінком (допомагати, дякувати, дзвонити, радити, заважати, відповідати) з правильними формами іменників/займенників.
- Вміти будувати речення з дієсловом подобатися, використовуючи модель давальний відмінок досвідника + називний відмінок об'єкта (Мені подобається ця книжка).
- Вміти висловлювати вік за допомогою конструкції з давальним відмінком (Дідусеві вісімдесят років, Мені двадцять п'ять).
- Вміти розрізняти під час побудови речень дієслова, що вимагають давального відмінка, та дієслова, що вимагають знахідного відмінка.
dialogue_situations:
- setting: 'День волонтера в громаді — допомога різним людям: Допомагаю бабусі нести сумки. Дзвоню другові. Раджу сусідці нового лікаря. Мені подобається допомагати!'
  speakers:
  - Волонтер
  - Різні люди
  motivation: 'Дієслова з давальним відмінком: допомагати бабусі, дзвонити другові, радити сусідці'
content_outline:
- section: Дієслова, що вимагають давального відмінка
  words: 600
  points:
  - 'Основна група дієслів, що керують давальним відмінком: допомагати, дякувати, дзвонити, радити, заважати, відповідати комусь.'
  - 'Ключове розуміння: в англійській мові багато з цих дієслів мають прямий додаток (help someone, call someone), але в українській особа стоїть у давальному відмінку — допомагати кому?, дякувати кому?'
  - 'Моделі речень: Я допомагаю мамі. Він дякує вчителеві. Вона дзвонить подрузі. Ми радимо тобі. Вони заважають нам.'
  - 'Практика поєднання цих дієслів з формами займенників та іменників у давальному відмінку.'
  - 'Заперечні форми: не заважай мені, не дзвони їй.'
- section: 'Мені подобається: Давальний відмінок досвідника'
  words: 500
  points:
  - 'Дієслово подобатися має зворотний синтаксис: досвідник (той, кому подобається) стоїть у давальному відмінку, а об''єкт, що подобається, стоїть у називному відмінку і керує дієсловом — Мені подобається ця книжка. Тобі подобаються ці фільми.'
  - 'Відмінювання: подобається (підмет в однині) проти подобаються (підмет у множині). Дієслово узгоджується з предметом у називному відмінку, а НЕ з особою у давальному відмінку.'
  - 'Порівняння з англійським «I like this book» (I = subject) та українським «Мені подобається ця книжка» (книжка = grammatical subject).'
  - 'Минулий час: Мені подобалася ця пісня. Мені подобався цей фільм. (Рід узгоджується з підметом у називному відмінку.)'
  - 'Практика з різними підметами та досвідниками у давальному відмінку.'
- section: Скільки тобі років? Вік у давальному відмінку
  words: 450
  points:
  - 'Конструкція віку: Давальний відмінок + числівник + рік/роки/років. Мені двадцять п''ять років. Дідусеві вісімдесят. Дитині три роки.'
  - 'Модель питання: Скільки тобі років? Скільки їй років?'
  - 'Узгодження з числівниками: один рік, два/три/чотири роки, п''ять і більше років.'
  - 'Діалогічна практика — запитувати та розповідати про вік членів родини та друзів.'
- section: Давальний чи знахідний? Порівняння
  words: 450
  points:
  - 'Дієслова зі знахідним відмінком (прямий додаток): бачити, знати, любити, чекати — кого? що?'
  - 'Дієслова з давальним відмінком (непрямий додаток/досвідник): допомагати, дякувати, дзвонити, радити — кому?'
  - 'Деякі дієслова приймають обидва відмінки: давати КОМУ (дав. відм.) ЩО (знах. відм.), розповідати КОМУ (дав. відм.) ПРО ЩО (знах. відм.).'
  - 'Стратегія вибору: Чи є особа одержувачем/досвідником? → Давальний відмінок. Чи особа піддається безпосередньому впливу? → Знахідний відмінок.'
  - 'Контрастні вправи з мінімальними парами.'
- section: Підсумок
  words: 200
  points:
  - "Давальний відмінок використовується для позначення одержувача або досвідника з такими дієсловами, як допомагати, дякувати, дзвонити, а також для вираження віку: Мені двадцять років. Самоперевірка: Як запитати «Скільки тобі років?» (How old are you?) українською? Назвіть вік 3 членів родини, використовуючи давальний відмінок."
  - 'Дієслово подобатися має зворотний синтаксис: досвідник стоїть у давальному відмінку, а об''єкт, що подобається, стоїть у називному відмінку і керує дієсловом (Мені подобається ця книжка, Тобі подобаються ці фільми). Самоперевірка: У чому різниця між любити та подобатися з точки зору відмінків? Перелічіть 3 речі, які вам подобаються, використовуючи подобається або подобаються.'
vocabulary_hints:
  required:
  - допомагати (to help)
  - дякувати (to thank)
  - дзвонити (to call, to phone)
  - радити (to advise)
  - заважати (to bother, to disturb)
  - подобатися (to be pleasing to, to like (reversed syntax))
  - відповідати (to answer (someone))
  - рік (year)
  - роки (years (2-4))
  - років (years (5+))
  recommended:
  - довіряти (to trust)
  - вибачати (to forgive)
  - посміхатися (to smile (at someone))
  - співчувати (to sympathize (with someone))
  - заздрити (to envy)
activity_hints:
