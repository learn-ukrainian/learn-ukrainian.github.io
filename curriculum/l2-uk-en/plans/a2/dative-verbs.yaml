level: A2
word_target: 2000
title: Допомагати, дякувати, дзвонити
subtitle: Дієслова, що вимагають давального відмінка
slug: dative-verbs
focus: grammar
status: DRAFT
objectives:
- Вивчити список поширених дієслів, що вимагають після себе давального відмінка (допомагати,
  дякувати, дзвонити, тощо).
- Навчитись правильно будувати речення з цими дієсловами.
- Навчитись ставити запитання та відповідати на них, використовуючи ці дієслова.
- Вивчити та практикувати конструкцію для позначення віку ('комусь + число + років').
content_outline:
- section: Дієслова, що вимагають давального відмінка
  points:
  - 'Група 1 (спілкування та взаємодія): дзвонити, дякувати, відповідати, пояснювати,
    радити, обіцяти.'
  - 'Приклади: ''Я часто дзвоню батькам'', ''Студент дякує вчителю'', ''Лікар радить
    пацієнту більше відпочивати''.'
  - 'Група 2 (допомога та перешкода): допомагати, заважати.'
  - 'Приклади: ''Син допомагає мамі'', ''Гучна музика заважає мені працювати''.'
  - 'Група 3 (віра та довіра): вірити, довіряти.'
  - 'Приклади: ''Я вірю тобі'', ''Вона не довіряє незнайомим людям''.'
- section: Конструкція для позначення віку
  points:
  - 'Формула: комусь (давальний відмінок) + число + рік/роки/років.'
  - '1 → рік: ''Моєму братові двадцять один рік''.'
  - '2, 3, 4 → роки: ''Моїй сестрі двадцять два роки''.'
  - '5-20, 25-30... → років: ''Моїй бабусі сімдесят років''.'
  - Питання 'Скільки тобі/йому/їй років?'.
vocabulary_hints:
  required:
  - допомагати (to help)
  - дякувати (to thank)
  - дзвонити (to call)
  - радити (to advise)
  - заважати (to disturb, to bother)
  - вірити (to believe)
  - пояснювати (to explain)
  - обіцяти (to promise)
  - рік (year)
  - роки (years, 2-4)
  - років (years, 5+)
  - скільки (how much/many)
  recommended:
  - відповідати (to answer)
  - дарувати (to give a gift)
  - бажати (to wish)
  - довіряти (to trust)
  - належати (to belong to)
  - пасувати (to suit, to fit)
activity_hints:
- type: verb-match
  focus: Поєднання дієслів з відповідними іменниками в давальному відмінку.
  config:
    quantity: 12
    pairs:
    - допомагати -> мамі
    - дякувати -> друзям
- type: sentence-construction
  focus: Складання речень з використанням дієслів, що вимагають давального відмінка.
  config:
    quantity: 15
    prompts:
    - я / допомагати / моя сестра
    - ти / часто / дзвонити / твої батьки?
- type: q-and-a
  focus: Практика конструкції для позначення віку.
  config:
    quantity: 10
    questions:
    - Скільки років твоєму батькові?
    - Скільки років Президенту України?
    prompts:
    - Мій друг, 25
    - Моя сестра, 14
- type: mini-dialogues
  focus: Завершення коротких діалогів з використанням вивчених дієслів.
  config:
    quantity: 8
    dialogues:
    - 'A: Алло! Я можу поговорити з Оленою? Б: Вибачте, вона зараз зайнята. Я ___
      (обіцяти) передати їй, що ви дзвонили.'
