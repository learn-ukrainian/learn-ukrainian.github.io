module: a2-009
level: A2
sequence: 9
slug: genitive-prepositions-source
version: 1.1.3
title: Звідки ти? З чого це зроблено?
subtitle: Прийменники з/із/зі, від, після з родовим відмінком
focus: grammar
pedagogy: PPP
phase: 'A2.2 [Родовий відмінок: завершення]'
word_target: 2000
objectives:
  - Вміти використовувати з/із/зі + родовий відмінок для вираження походження, матеріалу та початкової точки в часі.
  - Навчитися обирати правильний варіант (з, із, зі) залежно від наступного збігу приголосних.
  - Вміти використовувати від + родовий відмінок для вираження відправника або джерела.
  - Вміти використовувати після + родовий відмінок для вираження події чи періоду, що слідує за чимось.
dialogue_situations:
  - setting: 'Міжнародна вечеря в складчину — кожен приніс щось зі своєї країни: Це сир (m) з Франції. Оливки (pl) з Греції. Шоколад (m) від бабусі з Бельгії. А це вино (n) після подорожі Італією.'
    speakers:
      - Учасники вечірки
    motivation: 'З/від/після + родовий відмінок: з Франції, від бабусі, після подорожі'
content_outline:
  - section: Звідки? З/із/зі + родовий відмінок
    words: 700
    points:
      - 'Походження та джерело: з Києва, з України, зі Львова, зі Швеції. Основне значення — походження з місця, від особи або джерела.'
      - 'Фонетичні варіанти: з перед голосними та одиночними приголосними (з Одеси, з університету); із перед одиночними свистячими і шиплячими [з], [с], [ц], [ж], [ч], [ш] (із золота, із села) та між двома приголосними (лист із Бразилії); зі перед збігом приголосних, що починається на з-, с-, ш- (зі Львова, зі школи, зі стола). Загальний принцип: милозвучність — обирайте той варіант, який легше вимовити.'
      - 'Матеріал і склад: склянка з молока, сік з яблук, сукня з шовку.'
      - 'Початкова точка в часі: з ранку, з понеділка, з дитинства.'
  - section: Від кого? Від + родовий відмінок
    words: 600
    points:
      - 'Від особи: лист від мами, подарунок від друга, новини від сусіда.'
      - 'Протиставлення з проти від: з Києва (з місця) проти від Олени (від особи). З = джерело/місце походження, від = від конкретної особи або організації.'
      - 'Відстань: далеко від центру, недалеко від вокзалу.'
      - 'Захист: ліки від головного болю, парасолька від дощу.'
  - section: Що було потім? Після + родовий відмінок
    words: 700
    points:
      - 'Після події або періоду: після уроку, після обіду, після роботи, після канікул.'
      - 'Форми родового відмінка після після з іменниками твердої та м''якої груп: після екзамену (тверда чол.), після дня (м''яка чол.), після лекції (жін. на -ія), після свята (тверда сер. на -о).'
      - 'Поширені послідовності щоденної рутини: після сніданку йду на роботу, після роботи готую вечерю, після вечері дивлюся фільм.'
      - 'Протиставлення з до (перед) для закріплення обох прийменників: до уроку проти після уроку, до обіду проти після обіду.'
  - section: Підсумок
    words: 200
    points:
      - 'Прийменники з/із/зі, від та після завжди вимагають родового відмінка для вираження походження (з Києва), матеріалу (сік з яблук), відправника (від мами) та послідовності (після роботи).'
      - 'Правила милозвучності визначають варіант прийменника з: використовуйте з перед голосними (з Одеси), із перед свистячими/шиплячими або між приголосними (із села), та зі перед збігом приголосних, що починається на з, с, ш (зі Львова, зі школи).'
      - 'Перевірка: Яка різниця між "з Києва" та "від Олени"? Опишіть 3 події з вашого розпорядку дня, використовуючи "після". Коли використовується "зі" замість "з"?'
vocabulary_hints:
  required:
    - прийменник (preposition)
    - джерело (source)
    - походження (origin)
    - матеріал (material)
    - далеко (far)
    - недалеко (not far, nearby)
    - подарунок (gift)
    - сніданок (breakfast)
    - вечеря (dinner, supper)
    - канікули (vacation, holidays)
  recommended:
    - дитинство (childhood)
    - шовк (silk)
    - парасолька (umbrella)
    - сусід (neighbor)
activity_hints:
  - type: quiz
    focus: Вибір правильного варіанта з/із/зі залежно від наступного слова
    items: 8
  - type: fill-in
    focus: Доповнення речень прийменниками від або з + правильною формою родового відмінка
    items: 8
  - type: match-up
    focus: Встановлення відповідності між прийменниковими фразами та їхніми англійськими значеннями (походження, матеріал, час)
    items: 8
  - type: group-sort
    focus: Групування фраз за прийменниками з (місце/матеріал) проти від (особа/захист) проти після (час)
    items: 8
