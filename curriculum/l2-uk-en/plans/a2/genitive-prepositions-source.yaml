level: A2
word_target: 2000
title: Родовий відмінок з прийменниками (Походження)
subtitle: Звідки це? Прийменники з/із/зі, від, після
objectives:
- Використовувати прийменники з/із/зі для позначення походження, матеріалу та часу.
- Використовувати прийменник 'від' для позначення особи-джерела.
- Використовувати прийменник 'після' для позначення послідовності в часі.
- Розрізняти вживання 'з' (походження) та 'від' (особа-джерело).
- Правильно утворювати закінчення іменників у родовому відмінку після цих прийменників.
content_outline:
- section: 'Вступ: Прийменники походження та джерела'
  points:
  - Короткий огляд ролі прийменників у родовому відмінку.
  - Знайомство з прийменниками з/із/зі, від, після.
- section: 'Прийменник ''з/із/зі'': Походження, матеріал, час'
  points:
  - 'Походження: Я з України. Цей лист зі Львова.'
  - 'Матеріал: Стіл з дерева. Чашка зі скла.'
  - 'Час (початок): Я працюю з ранку до вечора.'
  - Правила вживання варіантів з/із/зі.
- section: 'Прийменник ''від'': Джерело (особа)'
  points:
  - 'Отримання чогось від когось: подарунок від друга, лист від мами.'
  - Відмінність від давального відмінка (подарунок другу vs. подарунок від друга).
- section: 'Прийменник ''після'': Послідовність у часі'
  points:
  - 'Позначення дії, що відбувається після іншої: після роботи, після школи, після
    вечері.'
  - 'Приклади в реченнях: Після роботи я йду додому.'
- section: Підсумок та порівняння
  points:
  - Порівняльна таблиця прийменників та їх значень.
  - Практичні приклади, що показують різницю між 'з' та 'від'.
vocabulary_hints:
  required:
  - 'з/із/зі: from'
  - 'від: from (a person)'
  - 'після: after'
  - 'подарунок: present, gift'
  - 'лист: letter'
  - 'друг: friend'
  - 'робота: work, job'
  - 'школа: school'
  - 'ранок: morning'
  - 'дерево: wood, tree'
  recommended:
  - 'походження: origin'
  - 'матеріал: material'
  - 'початок: beginning'
  - 'кінець: end'
  - 'зустріч: meeting'
  - 'вечеря: dinner, supper'
  - 'Україна: Ukraine'
activity_hints:
- type: fill-in-the-blanks
  focus: Вибір правильного прийменника (з/від/після)
  items: 12
- type: sentence-construction
  focus: Створення речень за зразком, використовуючи нові прийменники
  items: 10
- type: matching
  focus: Поєднання речення з функцією прийменника (походження, матеріал, джерело,
    час)
  items: 10
- type: dialogue-completion
  focus: Заповнення пропусків у коротких діалогах
  items: 8
