module: a2-008
level: A2
sequence: 8
slug: genitive-prepositions-source
version: '1.0'
title: Звідки ти? З чого це зроблено?
subtitle: Прийменники з/із/зі, від, після з родовим відмінком
focus: grammar
pedagogy: PPP
phase: A2.2 [Genitive Case Complete]
word_target: 2000
objectives:
- Learner can use з/із/зі + Genitive to express origin, material, and starting point
  in time.
- Learner can choose the correct variant (з, із, зі) based on the following consonant
  cluster.
- Learner can use від + Genitive to express 'from a person' or 'from a source'.
- Learner can use після + Genitive to express 'after' an event or time period.
dialogue_situations:
- setting: 'International potluck dinner — everyone brought something from their country:
    Це сир (m) з Франції. Оливки (pl) з Греції. Шоколад (m) від бабусі з Бельгії.
    А це вино (n) після подорожі Італією.'
  speakers:
  - Учасники вечірки
  motivation: 'З/від/після + genitive: з Франції, від бабусі, після подорожі'
content_outline:
- section: 'Звідки? З/із/зі + родовий (Where From? З/із/зі + Genitive)'
  words: 700
  points:
  - 'Origin and source: з Києва, з України, зі Львова, зі Швеції. The core meaning
    is ''from'' a place, person, or source.'
  - 'Phonetic variants: з before vowels and single consonants (з Одеси, з університету),
    із before consonant clusters (із Закарпаття), зі before зл-, зм-, зн-, сп-, ст-,
    шт- clusters (зі Львова, зі школи, зі стола).'
  - 'Material and composition: склянка з молока (a glass of milk), сік з яблук (apple
    juice), сукня з шовку (a dress made of silk).'
  - 'Time starting point: з ранку (since morning), з понеділка (since Monday), з дитинства
    (since childhood).'
- section: 'Від кого? Від + родовий (From Whom? Від + Genitive)'
  words: 600
  points:
  - 'From a person: лист від мами (a letter from mom), подарунок від друга (a gift
    from a friend), новини від сусіда (news from a neighbor).'
  - 'Contrast з vs. від: з Києва (from Kyiv — place) vs. від Олени (from Olena — person).
    З = source/origin, від = from a specific person or entity.'
  - 'Distance from: далеко від центру (far from the center), недалеко від вокзалу
    (not far from the station).'
  - 'Protection from: ліки від головного болю (medicine for a headache), парасолька
    від дощу (umbrella from rain).'
- section: 'Що було потім? Після + родовий (What Happened Next? Після + Genitive)'
  words: 700
  points:
  - 'After an event or period: після уроку (after the lesson), після обіду (after lunch),
    після роботи (after work), після канікул (after vacation).'
  - 'Genitive forms after після with both hard and soft nouns: після екзамену (hard
    masc.), після дня (soft masc.), після лекції (-ія fem.), після свята (hard neuter -о).'
  - 'Common daily routine sequences: після сніданку йду на роботу, після роботи готую
    вечерю, після вечері дивлюся фільм.'
  - 'Contrast with до (before) to reinforce both prepositions: до уроку vs. після уроку,
    до обіду vs. після обіду.'
vocabulary_hints:
  required:
  - прийменник (preposition)
  - джерело (source)
  - походження (origin)
  - матеріал (material)
  - далеко (far)
  - недалеко (not far, nearby)
  - подарунок (gift)
  - сніданок (breakfast)
  - вечеря (dinner, supper)
  - канікули (vacation, holidays)
  recommended:
  - дитинство (childhood)
  - шовк (silk)
  - парасолька (umbrella)
  - сусід (neighbor)
activity_hints:
- type: quiz
  focus: Choose the correct variant з/із/зі based on the following word
  items: 8
- type: fill-in
  focus: Complete sentences with від or з + correct Genitive noun form
  items: 8
- type: match-up
  focus: Match preposition phrases to their English meanings (origin, material, time)
  items: 8
- type: group-sort
  focus: Sort phrases into з (place/material) vs. від (person/protection) vs. після (time)
  items: 8
