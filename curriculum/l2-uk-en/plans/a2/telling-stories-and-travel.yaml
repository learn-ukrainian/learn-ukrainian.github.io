slug: telling-stories-and-travel
level: A2
title: Історії та подорожі
focus: communication
track: core
word_target: 2000
reference_word_count: 0
objectives:
- Розповідати просту історію про минулу подію, використовуючи ланцюжок дієслів доконаного
  виду.
- Описувати рутинні або тривалі процеси в минулому, використовуючи недоконаний вид.
- Планувати майбутню подорож, використовуючи майбутній час та дієслова руху.
- Ставити запитання та відповідати на них про минулий досвід та майбутні плани.
- Інтегрувати вивчену граматику (види, часи, дієслова руху) в зв'язне мовлення.
content_outline:
- section: 'Інструментарій оповідача: Як вид допомагає розповідати'
  points:
  - 'Недоконаний вид для створення сцени та опису фонових дій: ''Це був чудовий день.
    Сонце світило, пташки співали...''.'
  - 'Доконаний вид для послідовності основних подій: ''Я прокинувся, поснідав, одягнувся
    і пішов на роботу''.'
  - Аналіз короткої казки або історії.
- section: Розповідь про минулі вихідні
  points:
  - 'Лексика для опису відпочинку: ходити в кіно, зустрічатися з друзями, читати книгу,
    відпочивати вдома.'
  - 'Практика відповідей на запитання: ''Що ти робив на вихідних?'', ''Що цікавого
    ти зробив?''.'
  - 'Створення власної розповіді: поєднання описів (недоконаний вид) та конкретних
    подій (доконаний вид).'
- section: Планування відпустки мрії
  points:
  - 'Лексика для подорожей: квиток, готель, вокзал, аеропорт, валіза, маршрут.'
  - 'Використання дієслів руху та майбутнього часу: ''Спочатку ми поїдемо до Львова.
    Там ми будемо гуляти містом...'''
  - 'Практика: планування уявної подорожі Україною.'
- section: 'Діалоги в дорозі: На вокзалі, в аеропорту'
  points:
  - 'Типові фрази: ''Де я можу купити квиток?'', ''О котрій годині відправляється
    поїзд?'', ''Допоможіть, будь ласка''.'
  - Розігрування діалогів між пасажиром та касиром, пасажиром та іншим пасажиром.
  - Використання наказового способу для прохань.
- section: 'Письмова практика: Листівка з подорожі'
  points:
  - 'Структура листівки: привітання, коротка розповідь про те, де ви є і що робите/робили,
    побажання, прощання.'
  - Приклади листівок.
  - Написання власної листівки з уявної подорожі.
vocabulary_hints:
  required:
  - '[''подорожувати'', ''to travel'']'
  - '[''подорож'', ''a trip, a journey'']'
  - '[''відпустка'', ''vacation, holiday'']'
  - '[''квиток'', ''ticket'']'
  - '[''вокзал'', ''train station'']'
  - '[''аеропорт'', ''airport'']'
  - '[''готель'', ''hotel'']'
  - '[''валіза'', ''suitcase'']'
  - '[''минулого року'', ''last year'']'
  - '[''наступного місяця'', ''next month'']'
  - '[''спочатку'', ''at first, firstly'']'
  - '[''в кінці'', ''in the end'']'
  recommended:
  - '[''маршрут'', ''route'']'
  - '[''зупинка'', ''a stop (bus, train)'']'
  - '[''літак'', ''airplane'']'
  - '[''поїзд'', ''train'']'
  - '[''гуляти містом'', ''to walk around the city'']'
  - '[''зустрічатися з друзями'', ''to meet with friends'']'
  - '[''фотографувати'', ''to take photos'']'
  - '[''відпочинок'', ''rest, relaxation'']'
activity_hints:
- type: story_prompt
  focus: 'Написання короткої розповіді за початком: ''Одного разу я вирішив...'''
  items_count: 5
- type: dialogue_building
  focus: Створення діалогів на тему 'Плани на літо'.
  items_count: 8
- type: trip_planning
  focus: Створення детального маршруту подорожі на 3 дні, описуючи плани на кожен
    день.
  items_count: 1
- type: postcard_writing
  focus: Написання листівки другу з описом своїх вражень від поїздки.
  items_count: 3
- type: question_answer_drill
  focus: Швидкі відповіді на запитання про минулі та майбутні події.
  items_count: 15
