module: a2-004
level: A2
sequence: 4
slug: liudyna-i-stosunky
version: 1.0.4
title: Яка вона людина? Описуємо людей навколо нас
subtitle: Зовнішність, характер та стосунки — описуємо рідних, друзів і знайомих
focus: communication
pedagogy: PPP
phase: 'A2.1 [Основи та вступ до видів дієслова]'
word_target: 2000
objectives:
- Студент вміє описувати зовнішність людини, використовуючи базові прикметники та іменникові словосполучення (високий, темноволосий, з карими очима).
- Студент вміє описувати характер людини, використовуючи прикметники на позначення рис характеру (привітний, щирий, працьовитий, терплячий).
- Студент вміє розповідати про стосунки та людей у своєму житті (родич, сусід, колега, знайомий), використовуючи відповідну лексику.
- Студент вміє розрізняти недоконаний і доконаний вид у контексті, описуючи регулярні та одноразові дії знайомих людей.
dialogue_situations:
- setting: 'Дві подруги розглядають фотографії в телефоні — описують членів родини та друзів: Це моя сестра. Вона висока, темноволоса. Дуже весела і щира людина. А це мій сусід — він завжди допомагає (impf). Учора допоміг (pf) мені з валізою.'
  speakers:
  - Подруга 1
  - Подруга 2
  motivation: 'Природний контекст для опису людей: зовнішність + характер + протиставлення видів дієслова (допомагає/допоміг)'
- setting: 'Новий колега на роботі — знайомиться та розпитує про колектив: Хто ваш керівник? Який він? — Він дуже відповідальний і справедливий. А колеги? — Усі привітні, особливо Оксана — вона завжди підказує (impf) новим працівникам.'
  speakers:
  - Новий працівник
  - Досвідчений колега
  motivation: 'Знайомство на робочому місці: опис характеру колег за допомогою звичних дій недоконаного виду'
content_outline:
- section: 'Зовнішність: як виглядає людина?'
  words: 500
  points:
  - 'Базова лексика на позначення зовнішності: високий/низький, худий/повний, молодий/старий, темноволосий/світловолосий, кароокий/блакитноокий.'
  - 'Опис за допомогою дієслова мати та прийменника з + орудний відмінок (ознайомлення): Вона має карі очі / Вона з карими очима. Зверніть увагу: тут ми лише знайомимося з орудним відмінком, формально він вивчатиметься пізніше, у модулі A2.4.'
  - 'Практика опису людей за фотографіями чи ілюстраціями — побудова описів із кількома прикметниками. Узгодження: високий чоловік, висока жінка.'
- section: 'Характер: яка вона людина?'
  words: 600
  points:
  - 'Позитивні риси: привітний, щирий, чуйний, добрий, веселий, розумний, працьовитий, терплячий, відповідальний, наполегливий.'
  - 'Складні риси (не просто "негативні"): впертий, сумний, ледачий, серйозний, тихий. Український контекст: впертий може бути позитивною рисою (наполегливий, принциповий).'
  - 'Моделі речень для опису характеру: Він дуже добрий. Вона — щира людина. Мій брат — працьовитий і відповідальний.'
  - 'Інтеграція видів дієслова: для опису звичних рис характеру використовується недоконаний вид — Він завжди допомагає (impf). Одноразовий прояв характеру передається доконаним видом — Він допоміг (pf) мені вчора.'
- section: 'Люди навколо нас: родичі, друзі, знайомі'
  words: 550
  points:
  - 'Лексика на позначення стосунків: родич, мати/батько, брат/сестра, дідусь/бабуся, дядько/тітка, друг/подруга, товариш, сусід/сусідка, колега, знайомий.'
  - 'Розповідь про стосунки: Ми дружимо вже п''ять років. Вона — моя найкраща подруга. Він мій сусід — живе поруч.'
  - 'Опис того, як хтось ставиться до вас: Вона мені довіряє. Він мене поважає. Вони нам допомагають.'
  - 'Природна розмова про людей: відповіді на запитання "А хто це?" та "Який він/яка вона?"'
- section: Описуємо людину цілком
  words: 350
  points:
  - 'Поєднання зовнішності, характеру та стосунків у короткому тексті: Мій друг Андрій — високий хлопець із карими очима. Він дуже веселий і щирий. Ми познайомилися в університеті.'
  - 'Практика: студент описує 2-3 знайомих людей, використовуючи повну модель (хто це, як виглядає, який має характер).'
  - 'Культурна примітка: українці часто описують людей через їхні вчинки та характер, а не лише зовнішність — фраза "Добра людина" є вагомим компліментом.'
- section: Підсумок
  words: 200
  points:
  - 'Узгодження прикметників для опису зовнішності та характеру відбувається за правилами роду: високий чоловік, висока жінка, привітний сусід, привітна сусідка. Самоперевірка: Опишіть 3 людей у вашому житті, використовуючи риси зовнішності та характеру (наприклад, темноволосий, щирий, працьовитий).'
  - 'Дієслова недоконаного виду виражають звичні риси характеру (Він завжди допомагає), тоді як дієслова доконаного виду вказують на одноразовий прояв характеру (Він допоміг мені вчора). Самоперевірка: Яка різниця між словами "знайомий" і "друг"? Чому слово "впертий" може використовуватися як позитивна риса в українській культурі?'
vocabulary_hints:
  required:
  - людина (person, human being)
  - стосунок (relationship)
  - характер (character, personality)
  - зовнішність (appearance)
  - привітний (friendly, welcoming)
  - щирий (sincere, genuine)
  - працьовитий (hardworking)
  - терплячий (patient)
  - сусід (neighbor)
  - описувати (to describe)
  recommended:
  - впертий (stubborn, persistent)
  - чуйний (responsive, caring)
  - наполегливий (persistent, determined)
  - родич (relative)
  - знайомий (acquaintance)
activity_hints:
- type: match-up
  focus: Зіставити прикметники на позначення рис характеру з їхніми визначеннями або життєвими ситуаціями
  items: 8
- type: quiz
  focus: 'Вибрати правильний прикметник для доповнення опису людини (Він завжди допомагає — він дуже ___: щирий/ледачий/сумний)'
  items: 8
- type: fill-in
  focus: Доповнити речення, що описують людей, правильною формою прикметника (узгодження за родом)
  items: 8
- type: group-sort
  focus: Розподілити прикметники на позитивні та складні риси характеру
  items: 8
references:
- title: Заболотний Grade 5, §38-42
  notes: Іменник — людина, стосунки, описові тексти
- title: Большакова Grade 1, §14-16
  notes: Опис людини, зовнішність і характер у дитячих текстах
