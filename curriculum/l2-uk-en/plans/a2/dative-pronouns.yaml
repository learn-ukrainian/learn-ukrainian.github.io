level: A2
word_target: 2000
title: Мені, тобі
subtitle: Давальний відмінок особових займенників
slug: dative-pronouns
focus: grammar
status: DRAFT
objectives:
- Навчитись відмінювати особові займенники в давальному відмінку (мені, тобі, йому,
  їй, нам, вам, їм).
- Навчитись використовувати займенники в давальному відмінку в ролі непрямого додатка.
- Будувати безособові речення для вираження станів, потреб та емоцій (наприклад, "мені
  холодно", "тобі потрібно").
- Практикувати використання давального відмінка в простих діалогах та реченнях.
content_outline:
- section: Знайомство з давальним відмінком займенників
  points:
  - Що таке давальний відмінок і на які питання він відповідає (кому? чому?).
  - 'Таблиця відмінювання особових займенників: я → мені, ти → тобі, він/воно → йому,
    вона → їй, ми → нам, ви → вам, вони → їм.'
  - 'Приклади вживання: ''Дай мені книгу'', ''Я дзвоню тобі'', ''Ми показуємо їм фотографії''.'
- section: Безособові конструкції
  points:
  - Пояснення структури 'комусь + прислівник/дієслово' для опису фізичних та емоційних
    станів.
  - 'Приклади з прислівниками: мені холодно/тепло, тобі сумно/весело, йому цікаво/нудно.'
  - 'Приклади з дієсловами ''потрібно'', ''треба'', ''можна'', ''не можна'': ''Нам
    потрібно йти'', ''Вам можна увійти''.'
- section: Вираження симпатії та антипатії
  points:
  - 'Конструкція з дієсловом ''подобатися'': ''Мені подобається ця пісня'', ''Їй не
    подобається дощ''.'
  - 'Відмінність від знахідного відмінка: ''Я люблю музику'' (прямий додаток) vs.
    ''Мені подобається музика'' (безособова конструкція).'
vocabulary_hints:
  required:
  - мені (to me)
  - тобі (to you, informal)
  - йому (to him, to it)
  - їй (to her)
  - нам (to us)
  - вам (to you, formal/plural)
  - їм (to them)
  - потрібно (it is necessary)
  - треба (one must, it is needed)
  - подобається (to like)
  - холодно (cold)
  - тепло (warm)
  recommended:
  - сумно (sad)
  - весело (cheerful)
  - цікаво (interesting)
  - нудно (boring)
  - легко (easy)
  - важко (difficult)
  - шкода (it's a pity)
activity_hints:
- type: fill-in-the-blanks
  focus: Правильне вживання особових займенників у давальному відмінку.
  config:
    quantity: 15
    blanks:
    - Дай __ книгу, будь ласка. (я)
    - Я хочу розповісти __ одну історію. (ти)
- type: multiple-choice
  focus: Вибір правильного займенника в безособових конструкціях.
  config:
    quantity: 12
    options:
    - Йому / Він / Його холодно.
    - Мені / Я / Мене подобається кава.
- type: sentence-completion
  focus: Практика безособових конструкцій та дієслова 'подобатися'.
  config:
    quantity: 10
    prompts:
    - Мені потрібно...
    - Тобі подобається...?
- type: translation-match
  focus: Співставлення англійських фраз з українськими конструкціями давального відмінка.
  config:
    quantity: 12
    pairs:
    - I am cold. -> Мені холодно.
    - He needs help. -> Йому потрібна допомога.
sequence: 15
module: a2-015
version: '1.0'
phase: A2.3 [Dative Case]
