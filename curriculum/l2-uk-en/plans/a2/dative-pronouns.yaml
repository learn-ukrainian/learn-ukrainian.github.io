module: a2-017
level: A2
sequence: 17
slug: dative-pronouns
version: 1.0.3
title: Мені, тобі, йому...
subtitle: Давальний відмінок особових займенників та безособові конструкції
focus: grammar
pedagogy: PPP
phase: A2.3 [Давальний відмінок]
word_target: 2000
objectives:
- Вміти відтворювати по пам'яті всі форми особових займенників у давальному відмінку (мені, тобі, йому/їй, нам, вам, їм), маючи форму називного відмінка.
- Вміти використовувати займенники в давальному відмінку як непрямі додатки в реченнях з такими дієсловами, як давати, говорити, писати.
- Вміти будувати безособові речення за моделлю займенник у давальному відмінку + прислівник (мені холодно, тобі потрібно, їй цікаво).
- Вміти розрізняти форми займенників знахідного (бачу тебе) та давального (кажу тобі) відмінків у контексті.
dialogue_situations:
- setting: 'Роздача подарунків на день народження під час сімейного свята — хто що отримує: Мені — книгу. Тобі — шоколад. Йому — шарф (m, scarf). Їй — квіти (pl, flowers). Нам — торт!'
  speakers:
  - Іменинник
  - Родина
  motivation: 'Займенники в давальному відмінку: мені, тобі, йому, їй зі словами подарунок (m), книга (f)'
content_outline:
- section: 'Давальний відмінок: Кому?'
  words: 500
  points:
  - 'Знайомство з давальним відмінком як таким, що відповідає на питання Кому? Чому?'
  - 'Основне значення: одержувач — особа, яка щось отримує, якій щось говорять, або для якої щось робиться.'
  - 'Порівняння з родовим (Кого? Чого?) та знахідним (Кого? Що?) відмінками — кожен відмінок має своє питання та функцію.'
  - 'Прості приклади, що демонструють давальний відмінок у дії зі знайомими дієсловами (давати, казати).'
- section: Особові займенники у давальному відмінку
  words: 700
  points:
  - 'Повна парадигма: я→мені, ти→тобі, він→йому, вона→їй, воно→йому, ми→нам, ви→вам, вони→їм.'
  - 'Ключова закономірність: форми 1-ї та 2-ї особи (мені, тобі, нам, вам) є унікальними — їх потрібно запам''ятати як єдиний набір.'
  - '3-я особа: йому (чоловічий/середній рід), їй (жіночий рід), їм (множина). Після прийменників вони отримують початкову н-: до нього, але йому.'
  - 'Практика з поширеними дієсловами: Дай мені книгу. Скажи їй правду. Покажи нам фото. Напиши їм листа.'
  - 'Протиставлення форм знахідного і давального відмінків у парах для вироблення навички їх розрізнення.'
- section: 'Мені холодно: Безособові конструкції'
  words: 500
  points:
  - 'Модель: Займенник у давальному відмінку + прислівник для вираження станів і почуттів без підмета — мені холодно, тобі сумно, їй весело.'
  - 'Поширені предикативи: холодно, тепло, важко, легко, весело, сумно, приємно, цікаво, нудно, потрібно, можна.'
  - 'Порівняння з реченнями, що мають підмет у називному відмінку: Я втомлена проти Мені важко — різна структура, різний відтінок значення.'
  - 'Діалогічна практика, де герої описують, як вони почуваються, використовуючи безособові конструкції з давальним відмінком.'
- section: Давальний чи знахідний?
  words: 300
  points:
  - 'Мінімальні пари: Я бачу тебе (знах. відм.) проти Я кажу тобі (дав. відм.). Він знає її (знах. відм.) проти Він дзвонить їй (дав. відм.).'
  - 'Стратегія вибору: Хто є одержувачем дії? → Давальний відмінок. Хто піддається безпосередньому впливу? → Знахідний відмінок.'
  - 'Практика розрізнення відмінків за допомогою дієслів з двома додатками (давати щось комусь).'
- section: Підсумок
  words: 200
  points:
  - 'Давальний відмінок (Кому?) використовується для позначення одержувача дії. Ключові форми займенників: я→мені, ти→тобі, він/воно→йому, вона→їй, ми→нам, ви→вам, вони→їм. Самоперевірка: У чому різниця між «Я бачу тебе» (знахідний відмінок) та «Я кажу тобі» (давальний відмінок)?'
  - 'У безособових конструкціях використовується займенник у давальному відмінку + прислівник для вираження станів та почуттів (мені холодно, тобі потрібно). Самоперевірка: Опишіть, як ви почуваєтеся зараз, використовуючи безособову конструкцію. Як сказати «It is interesting for us» українською?'
vocabulary_hints:
  required:
  - давальний відмінок (dative case)
  - мені (to me)
  - тобі (to you (informal))
  - йому (to him, to it)
  - їй (to her)
  - нам (to us)
  - вам (to you (formal/plural))
  - їм (to them)
  - холодно (cold (impersonal state))
  - потрібно (necessary, needed)
  recommended:
  - приємно (pleasant)
  - цікаво (interesting)
  - сумно (sad (impersonal state))
  - важко (difficult, hard)
activity_hints:
- type: match-up
  focus: Зіставити займенник у називному відмінку з його формою в давальному (я→мені, ти→тобі тощо)
  items: 8
- type: fill-in
  focus: Доповнити речення правильним займенником у давальному відмінку на основі контексту
  items: 8
- type: quiz
  focus: Обрати форму займенника давального або знахідного відмінка в контексті (тобі чи тебе)
  items: 8
- type: true-false
  focus: Визначити, чи правильні безособові речення з давальним відмінком (мені холодно, мені бачу)
  items: 8
references:
- title: Захарійчук Grade 4, §281
  notes: Повна таблиця відмінювання особових займенників 1-ї/2-ї особи з формами давального відмінка
- title: Заболотний Grade 10, §157
  notes: Закінчення давального відмінка для іменників чоловічого роду з паралельними формами -ові/-у
