  група: -ім/-ьою)."
- Учень може утворювати закінчення орудного відмінка однини для присвійних займенників (моїм, моєю, твоїм, твоєю, нашим,
  нашою).
- Учень вміє будувати повні словосполучення в орудному відмінку з узгодженням прикметника та іменника (з гарним другом,
  за нашим будинком, під великою ялинкою).
- Учень може використовувати вказівні займенники цим/цією, тим/тією у словосполученнях в орудному відмінку.
register: науково-навчальний
persona:
  voice: Терплячий A2 граматичний наставник
  role: Пояснює граматику через короткі дорослі приклади, контрасти форм і контроль типових помилок.
references:
- title: Захарійчук Grade 4, с. 85-92
  notes: 'Повні таблиці відмінювання прикметників твердої та м''якої груп, включаючи закінчення орудного відмінка (-им/-ою
    та -ім/-ьою)'
- title: Голуб Grade 6, с. 179
  notes: 'Таблиця відмінювання займенників, що показує форми орудного відмінка (моїм, такою, усім) з приміткою, що присвійні
    займенники відмінюються як прикметники'
- title: Авраменко Grade 11, с. 25
  notes: 'Довідкова таблиця відмінювання прикметників — тверда група (білий → білим/білою) та м''яка група (синій → синім/синьою)'
