level: A2
module_id: 25
slug: instrumental-adjectives-pronouns
title: З моїм найкращим другом
subtitle: The Instrumental Case of Adjectives and Pronouns
word_target: 2000
objectives:
- Навчитися утворювати орудний відмінок прикметників.
- Навчитися утворювати орудний відмінок присвійних та вказівних займенників.
- Практикувати узгодження іменників, прикметників та займенників в орудному відмінку.
- Навчитися будувати складніші фрази з прийменниками, що вимагають орудного відмінка.
content_outline:
- section: 'Вступ: Додаємо деталі'
  points:
  - Пояснення, як прикметники та займенники допомагають зробити мову багатшою.
  - 'Принцип узгодження: іменник, прикметник і займенник мають стояти в одному відмінку,
    роді та числі.'
- section: Орудний відмінок прикметників
  points:
  - 'Чоловічий та середній рід: закінчення -им (з новим столом, під синім небом).'
  - 'Жіночий рід: закінчення -ою, -ею (з гарною подругою, перед нашою школою).'
  - 'Множина: закінчення -ими (з добрими друзями, за високими деревами).'
- section: Орудний відмінок займенників
  points:
  - 'Присвійні займенники: моїм, твоїм, нашим, вашим, його, її, їхнім.'
  - 'Вказівні займенники: цим, тим, цією, тією, цими, тими.'
  - 'Особові займенники: мною, тобою, ним, нею, нами, вами, ними.'
- section: 'Практика: Будуємо фрази'
  points:
  - 'Поєднання: прийменник + займенник + прикметник + іменник.'
  - 'Приклади: Я розмовляв з моїм старим другом. Машина стоїть за цим великим будинком.
    Ми гуляли під теплим літнім дощем.'
vocabulary_hints:
  required:
  - word (мій / моя / моє)
  - word (твій / твоя / твоє)
  - word (наш / наша / наше)
  - word (ваш / ваша / ваше)
  - word (цей / ця / це)
  - word (той / та / те)
  - word (новий)
  - word (старий)
  - word (великий)
  - word (малий)
  - word (гарний)
  - word (цікавий)
  recommended:
  - word (найкращий)
  - word (улюблений)
  - word (добрий)
  - word (поганий)
  - word (місто)
  - word (книга)
  - word (фільм)
activity_hints:
- type: phrase_building
  focus: Скласти фрази в орудному відмінку, поєднуючи іменник, прикметник і займенник.
  items: 15
- type: cloze
  focus: Вставити правильні закінчення прикметників та займенників у тексті.
  items: 12
- type: sentence_expansion
  focus: Додати прикметники та займенники до простих речень, щоб зробити їх більш
    детальними.
  items: 10
- type: writing_prompt
  focus: Описати свого найкращого друга, улюблене місце в місті або останній фільм,
    який ви дивилися, використовуючи вивчені конструкції.
  items: 1
sequence: 25
