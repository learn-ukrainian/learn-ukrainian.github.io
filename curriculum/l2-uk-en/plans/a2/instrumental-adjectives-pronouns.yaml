module: a2-029
level: A2
sequence: 29
slug: instrumental-adjectives-pronouns
version: 1.0.3
title: З моїм найкращим другом
subtitle: Узгодження прикметників та займенників в орудному відмінку
focus: grammar
pedagogy: PPP
phase: A2.4 [Instrumental Case]
word_target: 2000
objectives:
- 'Учень вміє утворювати закінчення орудного відмінка однини для прикметників у всіх трьох родах (тверда група: -им/-ою, м''яка група: -ім/-ьою).'
- Учень може утворювати закінчення орудного відмінка однини для присвійних займенників (моїм, моєю, твоїм, твоєю, нашим, нашою).
- Учень вміє будувати повні словосполучення в орудному відмінку з узгодженням прикметника та іменника (з гарним другом, за нашим будинком, під великою ялинкою).
- Учень може використовувати вказівні займенники цим/цією, тим/тією у словосполученнях в орудному відмінку.
dialogue_situations:
- setting: 'Запис у щоденнику про ваш ідеальний день — повні словосполучення в орудному відмінку: Гуляла з моїм найкращим другом (m). Обідала зі своєю старшою сестрою (f). Пила каву з тим новим колегою (m).'
  speakers:
  - Автор щоденника
  motivation: 'Повний орудний відмінок: з моїм другом, зі своєю сестрою, з тим колегою'
content_outline:
- section: 'Прикметники в орудному відмінку'
  words: 550
  points:
  - 'Закінчення прикметників твердої групи в орудному відмінку однини: чоловічий/середній рід -им (новим, гарним, великим, старим), жіночий рід -ою (новою, гарною, великою, старою).'
  - 'Закінчення прикметників м''якої групи в орудному відмінку однини: чоловічий/середній рід -ім (синім, літнім, домашнім), жіночий рід -ьою (синьою, літньою, домашньою).'
  - 'Довідкова таблиця за підручником Захарійчук 4 клас, с. 92: повна таблиця відмінювання для твердої та м''якої груп прикметників.'
  - 'Практика: з добрим другом, з гарною подругою, під великим деревом, за синім морем — побудова словосполучень з узгодженням прикметника та іменника.'
- section: 'Присвійні та вказівні займенники'
  words: 500
  points:
  - 'Присвійні займенники в орудному відмінку однини: мій → моїм/моєю, твій → твоїм/твоєю, наш → нашим/нашою, ваш → вашим/вашою. його/її/їхній не змінюються (його — незмінне, їхній відмінюється як прикметник).'
  - 'Вказівні займенники: цей → цим/цією, той → тим/тією. Цим автобусом (by this bus), за тією стіною (behind that wall).'
  - 'Побудова повних словосполучень: з моїм старим другом, за нашим новим будинком, під цією великою ялинкою.'
  - 'Модель: прийменник + займенник (орудний) + прикметник (орудний) + іменник (орудний) — усі частини узгоджуються у відмінку.'
- section: 'Повні словосполучення в орудному відмінку'
  words: 500
  points:
  - 'Ланцюжки узгодження з трьох слів: з моїм найкращим другом (прийм. + присв. займ. + прикм. + ім.), за нашим великим будинком, між тією старою школою і новою бібліотекою.'
  - 'Порівняння ланцюжків чоловічого та жіночого роду: з моїм новим сусідом проти з моєю новою сусідкою — кожне слово змінюється.'
  - 'Поширені фрази з реального життя: з моєю найкращою подругою, за вашим будинком, цим вечором (this evening — часове), тим часом (meanwhile).'
  - 'Сталі вирази з використанням займенників і прикметників в орудному відмінку в повсякденному мовленні.'
- section: 'Практика: Опиши свій день'
  words: 450
  points:
  - 'Вправа на продукування: опишіть свій день, використовуючи повні словосполучення в орудному відмінку — З ким ти снідаєш? З моєю сім''єю. Чим ти їдеш на роботу? Нашим старим автобусом.'
  - 'Діалог: Двоє друзів обмінюються новинами — запитують про сім''ю, нових сусідів, щоденний розпорядок. Практика з ланцюжками присвійний займенник + прикметник + іменник.'
  - 'Вправа на виправлення помилок: знайдіть і виправте помилки в узгодженні у словосполученнях в орудному відмінку (напр., *з моїм новою другом → з моїм новим другом).'
  - 'Повторення всіх вивчених досі функцій орудного відмінка: супровід, інструмент, професія, простір — тепер із повним узгодженням прикметника та займенника.'
- section: Підсумок
  words: 200
  points:
  - 'Утворення майбутнього часу залежить від виду: дієслова доконаного виду використовують синтетичні форми для завершених дій (напишу, зроблю, скажу). Дієслова недоконаного виду використовують аналітичні форми (буду + інфінітив) для тривалих або повторюваних процесів (буду писати, буду робити, буду говорити).'
  - 'Самоперевірка: Яка різниця у значенні між "я прочитаю книгу" та "я буду читати книгу"? Чому дієслова доконаного виду не мають теперішнього часу? Опишіть 3 речі, які ви плануєте зробити завтра, використовуючи обидві форми майбутнього часу.'
vocabulary_hints:
  required:
  - мій (my)
  - твій (your (informal))
  - наш (our)
  - ваш (your (formal/plural))
  - цей (this)
  - той (that)
  - новий (new)
  - старий (old)
  - великий (big, large)
  - гарний (nice, beautiful)
  - найкращий (the best)
  - сусід (neighbor (male))
  recommended:
  - домашній (home (adj.), domestic)
  - синій (blue)
  - сусідка (neighbor (female))
  - тим часом (meanwhile)
  - цим вечором (this evening)
activity_hints:
- type: fill-in
  focus: 'Додайте правильні закінчення прикметників в орудному відмінку, щоб доповнити словосполучення'
  items: 8
- type: match-up
  focus: 'З''єднайте словосполучення в називному відмінку (мій новий друг) з їхніми формами в орудному (моїм новим другом)'
  items: 8
- type: quiz
  focus: 'Виберіть правильну форму займенника (моїм проти моєю) залежно від роду іменника'
  items: 8
- type: fill-in
  focus: 'Побудуйте повні речення, використовуючи прийменник + займенник + прикметник + іменник в орудному відмінку'
  items: 8
- type: error-correction
  focus: 'Знайдіть та виправте помилки узгодження у словосполученнях в орудному відмінку (напр., *з моїм новою другом → з моїм новим другом, *моєю великим містом → моїм великим містом)'
  items: 6
references:
- title: Захарійчук Grade 4, с. 85-92
  notes: 'Повні таблиці відмінювання прикметників твердої та м''якої груп, включаючи закінчення орудного відмінка (-им/-ою та -ім/-ьою)'
- title: Голуб Grade 6, с. 179
  notes: 'Таблиця відмінювання займенників, що показує форми орудного відмінка (моїм, такою, усім) з приміткою, що присвійні займенники відмінюються як прикметники'
- title: Авраменко Grade 11, с. 25
  notes: 'Довідкова таблиця відмінювання прикметників — тверда група (білий → білим/білою) та м''яка група (синій → синім/синьою)'