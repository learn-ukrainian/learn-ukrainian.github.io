module: a2-19
level: A2
sequence: 19
slug: the-best-the-worst
version: '2.0'
title: The Best, The Worst
subtitle: The Superlative Degree
content_outline:
- section: Introduction / Вступ
  points:
  - Concept of superlative as the extreme
  - 'Simplicity of Ukrainian ''най-'' rule — grammar scaffolding: simply add ''най-''
    to the comparative form'
- section: Presentation / Презентація
  points:
  - 'Regular formation (най- + comparative) — learner error: Double Superlatives (e.g.,
    ''найбільш цікавіший'' instead of ''найбільш цікавий'' or ''найцікавіший''); align
    with State Standard §4.3.1 (synthetic form)'
  - Analytic superlative formation (найбільш/найменш + adjective) — align with State
    Standard §4.3.1 (analytic form)
  - 'Irregular superlatives (Top 10) — focus on high-frequency pairs: великий/найбільший,
    малий/найменший, добрий/найкращий; learner error: Russian influence ''самий''
    (e.g., ''самий гарний'' instead of ''найгарніший'')'
  - Emphatic prefixes (якнай-, щонай-) — introduce as ways to express 'as ... as possible'
    (e.g., якнайшвидше)
  - Intensifiers vs Superlatives (дуже vs найкращий)
- section: Practice / Практика
  points:
  - 'World records quiz — cultural hooks: Станція «Арсенальна» (найглибша), Говерла
    (найвища гора), печера «Оптимістична» (найдовша), АН-225 «Мрія» (найбільший літак)'
  - 'Sentence transformation drills — learner error: ensure adjective agreement in
    gender, number, and case (e.g., найкраща ідея vs найкращий план)'
- section: Dialogues / Діалоги
  points:
  - Award ceremony dialogue using superlatives — use collocations like 'найважливіший
    крок' and 'найвищий рівень'
focus: grammar
pedagogy: PPP
objectives:
- Learner can form superlative adjectives
- Learner can describe the highest degree of a quality
- Learner can use superlatives to talk about records and favorites
- Learner can distinguish between comparative and superlative forms
grammar:
- superlative adjectives formation (най-)
- irregular superlatives (найкращий)
- emphatic superlatives (якнай-, щонай-)
- world records context
module_type: grammar
