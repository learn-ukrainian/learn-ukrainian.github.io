vocabulary_hints:
  required:
  - найкращий (the best) — найкращий друг, найкращий час, найкраща ідея
  - найгірший (the worst) — найгірший сценарій, найгірша погода, найгірший день
  - найбільший (the biggest/largest) — найбільша країна, найбільша помилка, найбільше
    місто
  - найменший (the smallest) — найменша дитина, найменша деталя, найменша ціна
  - найважливіший (the most important) — найважливіше питання, найважливіший крок
  recommended:
  - найвищий (the highest) — найвища гора, найвищий бал, найвищий рівень
  - найбільш (the most... [analytic]) — найбільш популярний, найбільш відомий, найбільш
    цікавий
  - якнайшвидше (as fast as possible) — emphatic prefix usage
  - станція (station) — context for 'найглибша станція метро' (Арсенальна)
  - гора (mountain) — context for 'найвища гора' (Говерла)
