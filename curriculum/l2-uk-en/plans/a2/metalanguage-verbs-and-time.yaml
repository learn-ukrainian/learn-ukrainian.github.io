level: A2
slug: metalanguage-verbs-and-time
title: Дія і час
focus: bridge
pedagogy: PPP
word_target: 2000
objectives:
- Називати українською мовою основні категорії дієслова (час, вид, спосіб, особа).
- Розрізняти доконаний та недоконаний вид дієслова.
- Називати три часи дієслова: теперішній, минулий, майбутній.
- Розуміти поняття "дієвідміна" (І та ІІ) та її вплив на особові закінчення.
- Навчитися користуватися словником для пошуку інформації про дієслово.
content_outline:
- section: 'Що робити? Що зробити?: Категорія виду'
  points:
  - Недоконаний вид (НД): відповідає на питання "що робити?", позначає тривалу або
      повторювану дію (читати, писати).
  - Доконаний вид (Д): відповідає на питання "що зробити?", позначає завершену дію,
      результат (прочитати, написати).
  - Видові пари.
- section: 'Вчора, сьогодні, завтра: Категорія часу'
  points:
  - Теперішній час (теп. час): дія відбувається зараз (тільки для дієслів НД).
  - Минулий час (мин. час): дія відбулася раніше (утворюється від основи інфінітива
      + суфікс -в/-л-).
  - Майбутній час (майб. час): складена форма для НД ("буду читати") і проста форма
      для Д ("прочитаю").
- section: 'Я, ти, він, вона...: Особа та дієвідміна'
  points:
  - 1-ша, 2-га, 3-тя особа однини і множини.
  - І та ІІ дієвідміни: як визначити за закінченнями 3-ї особи множини (-уть/-ють
      та -ать/-ять).
  - Вплив дієвідміни на особові закінчення в теперішньому часі.
- section: 'Реальність, бажання, наказ: Категорія способу'
  points:
  - Дійсний спосіб: дія, що відбувається, відбувалася чи буде відбуватися ("Я читаю
      / читав / буду читати").
  - Умовний спосіб: можлива за певних умов дія (минулий час + частка "б/би"). "Я прочитав
      би".
  - Наказовий спосіб: наказ, прохання, порада ("Читай!", "Ходімо!").
- section: Як користуватися словником
  points:
  - Пошук дієслова за інфінітивом.
  - Умовні позначення: нд, д, перех., неперех. (перехідне/неперехідне).
  - Приклади вживання.
vocabulary_hints:
  required:
  - 'вид (дієслова): aspect (of a verb)'
  - 'доконаний вид: perfective aspect'
  - 'недоконаний вид: imperfective aspect'
  - 'час (дієслова): tense (of a verb)'
  - 'теперішній час: present tense'
  - 'минулий час: past tense'
  - 'майбутній час: future tense'
  - 'спосіб (дієслова): mood (of a verb)'
  - 'дійсний спосіб: indicative mood'
  - 'наказовий спосіб: imperative mood'
  - 'особа: person'
  - 'дієвідміна: conjugation'
  recommended:
  - 'інфінітив: infinitive'
  - 'основа (слова): stem (of a word)'
  - 'закінчення: ending'
  - 'словник: dictionary'
  - 'приклад: example'
activity_hints:
- type: multiple_choice
  focus: Визначення виду дієслова (доконаний/недоконаний)
  items: 15
- type: table_completion
  focus: Створення форм минулого, теперішнього та майбутнього часу
  items: 1
- type: fill_in_the_blank
  focus: Вписування дієслова у правильній особовій формі
  items: 12
- type: matching
  focus: Поєднання термінів з їхніми визначеннями
  items: 10
