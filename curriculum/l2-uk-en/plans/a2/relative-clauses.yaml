slug: relative-clauses
level: A2
word_target: 2000
title: 'Який? Той, що...: Означальні речення'
description: Вчимося описувати людей та предмети за допомогою підрядних речень.
focus: grammar
objectives:
- Описувати та ідентифікувати людей і предмети, використовуючи 'який', 'яка', 'яке',
  'які'.
- Правильно узгоджувати означальні займенники з іменником, який вони описують.
- Використовувати 'де', 'куди', 'звідки' для опису місць.
- Ставити та відповідати на уточнюючі питання, наприклад, 'Яка саме книга?'.
- Створювати більш детальні та точні описи.
content_outline:
- section: 'Вступ: Який саме?'
  points:
  - 'Проблема ідентифікації: ''Дай мені книгу''. ''Яку?''.'
  - Як означальні речення допомагають уточнити інформацію.
- section: 'Означальний займенник: ''Який, яка, яке, які'''
  points:
  - 'Опис предметів: ''Це стіл, який стоїть у кімнаті''.'
  - 'Опис людей: ''Це мій друг, який живе в Києві''.'
  - Узгодження в роді та числі з іменником.
  - Прості відмінки (називний, знахідний).
- section: 'Прислівники місця: ''Де, куди, звідки'''
  points:
  - 'Опис місця: ''Це місто, де я народився''.'
  - 'Опис напрямку: ''Це вулиця, куди я йду''.'
  - 'Опис походження: ''Це країна, звідки я приїхав''.'
- section: Розрізнення 'що' та 'який'
  points:
  - Коли можна використовувати 'що' замість 'який'.
  - '''Що'' як універсальний сполучник.'
  - 'Стилістичні відмінності: ''який'' є більш книжним.'
- section: 'Синтез: Детальний опис'
  points:
  - Поєднання різних типів означальних речень.
  - 'Практичне завдання: написати детальний опис друга, улюбленого місця або предмета.'
