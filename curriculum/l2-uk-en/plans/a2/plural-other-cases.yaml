module: a2-034
level: A2
sequence: 34
slug: plural-other-cases
version: 1.0.3
title: З друзями, для дітей
subtitle: Давальний, орудний та місцевий відмінки множини
focus: grammar
pedagogy: PPP
phase: A2.5 [Синтез відмінків та множина]
word_target: 2000
objectives:
- Учень вміє утворювати давальний відмінок множини для іменників усіх відмін, використовуючи закінчення -ам/-ям.
- Учень вміє утворювати орудний відмінок множини за допомогою -ами/-ями та розпізнавати типові моделі чергування.
- Учень вміє утворювати місцевий відмінок множини за допомогою -ах/-ях і правильно використовувати його з прийменниками (у/в, на, по).
- Учень вміє використовувати всі три відмінки множини в практичних реченнях про спільні дії з друзями, дарування подарунків та опис локацій.
dialogue_situations:
- setting: 'Організація шкільної поїздки — усі відмінки у множині: Розкажіть дітям (dat pl) план. Їдемо автобусами (inst pl). Зупинимося в готелях (loc pl). Купимо подарунки для батьків (gen pl).'
  speakers:
  - Вчитель
  - Учні
  motivation: 'Усі відмінки множини: дітям, автобусами, готелях, батьків'
content_outline:
- section: 'Давальний множини: Кому?'
  words: 550
  points:
  - 'Універсальне правило: усі іменники приймають -ам (тверда група) або -ям (м''яка група) у Дав. мн. студентам, друзям, дітям, містам, ночам.'
  - 'Це найрегулярніший відмінок множини — ОДНЕ правило охоплює майже все. Порівняйте зі складністю родового відмінка множини.'
  - 'Типові дієслова, що вимагають давального відмінка: давати, допомагати, пояснювати, телефонувати, дякувати, радити.'
  - 'Практика: Я даю подарунки друзям. Вчитель пояснює правила студентам. Батьки допомагають дітям.'
- section: 'Орудний множини: З ким? Чим?'
  words: 600
  points:
  - 'Універсальне правило: -ами (тверда група) або -ями (м''яка група). студентами, друзями, дітьми (неправильне), містами, ночами.'
  - 'Ключові неправильні форми: діти → дітьми, люди → людьми, коні → кіньми, гості → гістьми (або гостями). Вони дуже поширені — вивчіть їх.'
  - 'Прийменник з/із + Оруд. мн.: Я зустрівся з друзями. Ми розмовляли з учителями. Вона прийшла з дітьми.'
  - 'Орудний відмінок без прийменника (засіб/інструмент): писати олівцями, їсти паличками, прикрасити квітами.'
  - 'Практичні діалоги: планування спільних справ з друзями, опис того, як щось робиться.'
- section: 'Місцевий множини: Де? На чому?'
  words: 500
  points:
  - 'Універсальне правило: -ах (тверда група) або -ях (м''яка група). у містах, на столах, у книжках, на заняттях, у ночах.'
  - 'Прийменники: у/в + Місц. мн. (локація), на + Місц. мн. (поверхня/подія), по + Місц. мн. (розповсюдження/рух вздовж).'
  - 'Приклади: Діти грають у парках. Книжки лежать на полицях. По вулицях ходять люди. На заняттях ми багато говоримо.'
  - 'Порівняйте давальний і місцевий відмінки множини — однакові основи, різні закінчення: друзям (Дав.) проти на друзях (Місц. — рідко, але демонструє модель).'
- section: 'Три відмінки разом: Практика'
  words: 350
  points:
  - 'Об''єднані речення з використанням Дав., Оруд., і Місц. відмінків множини: Ми подарували квіти вчителям (Дав.) і сфотографувалися з ними (Оруд.) у класах (Місц.).'
  - 'Короткий діалог: організація поїздки — кого запросити (Дав.), що взяти з собою (Оруд.), куди поїхати (Місц.).'
  - 'Підсумкова таблиця: Дав. -ам/-ям, Оруд. -ами/-ями, Місц. -ах/-ях — найрегулярніший набір закінчень множини в українській мові.'
- section: Підсумок
  words: 200
  points:
  - 'Давальний (-ам/-ям), орудний (-ами/-ями) та місцевий (-ах/-ях) відмінки множини є дуже регулярними в усіх групах іменників. Зверніть увагу на дуже поширені неправильні форми в орудному відмінку множини: діти → дітьми, люди → людьми.'
  - 'Самоперевірка: Які прийменники зазвичай використовуються з місцевим відмінком множини? Перекладіть: "Я даю подарунки друзям" та "Ми гуляємо з дітьми в парках". Опишіть 3 предмети, якими ви можете їсти, використовуючи орудний відмінок множини.'
vocabulary_hints:
  required:
  - давальний відмінок (dative case)
  - орудний відмінок (instrumental case)
  - місцевий відмінок (locative case)
  - допомагати (to help)
  - дякувати (to thank)
  - подарунок (gift)
  - квіти (flowers)
  - діти (children)
  - люди (people)
  - заняття (class, lesson)
  recommended:
  - радити (to advise)
  - пояснювати (to explain)
  - полиця (shelf)
  - прикрашати (to decorate)
activity_hints:
- type: fill-in
  focus: 'Поставити іменник у правильний відмінок множини (Дав., Оруд., або Місц.) залежно від прийменника чи дієслова в реченні'
  items: 8
- type: match-up
  focus: 'Зіставити форми іменників у множині з правильною назвою відмінка (Дав., Оруд., Місц.)'
  items: 8
- type: quiz
  focus: 'Вибрати правильну комбінацію прийменника та відмінка множини, щоб доповнити речення'
  items: 8
- type: error-correction
  focus: 'Виправити неправильні відмінкові закінчення в реченнях'
  items: 6
references:
- title: Заболотний Grade 6, §§63-65
  notes: 'Закінчення Дав., Оруд., Місц. множини зі вправами'
- title: Кравцова Grade 4, с. 46-48
  notes: 'Розрізнення давального та місцевого відмінків — прості вправи на розпізнавання відмінка за запитальними словами'