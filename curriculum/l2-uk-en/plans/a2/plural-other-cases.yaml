slug: plural-other-cases
title: З друзями, для дітей
level: A2
word_target: 2000
objectives:
- Form and use the dative plural with the ending -ам/-ям.
- Form and use the instrumental plural with the ending -ами/-ями.
- Form and use the locative plural with the ending -ах/-ях.
- Recognize that these plural case endings are more regular than genitive or nominative.
- Use plural nouns in dative, instrumental, and locative cases in context with appropriate
  prepositions.
content_outline:
- section: 'Давальний відмінок множини (-ам, -ям): Кому? Чому?'
  points:
  - 'Основне правило: завжди закінчення -ам (після твердих приголосних) або -ям (після
    м''яких).'
  - 'Приклади: Я допомагаю студентам, дзвоню друзям, даю їжу котам.'
  - 'Вживання з прийменниками ''по'' та ''завдяки'': ''подорожувати по містах'', ''завдяки
    друзям''.'
  - 'Практика: ''Я бажаю вам...'', ''Я розповідаю друзям про...'''
- section: 'Орудний відмінок множини (-ами, -ями): Ким? Чим?'
  points:
  - 'Основне правило: завжди закінчення -ами (після твердих) або -ями (після м''яких).'
  - 'Приклади: Я розмовляю з друзями, цікавлюся іноземними мовами, пишаюся батьками.'
  - 'Вживання з прийменниками ''з'', ''між'', ''над'', ''під'', ''перед'': ''зустріч
    з колегами'', ''полиця над столами''.'
  - 'Особливі форми: людьми, дітьми, грошима.'
  - 'Практика: ''Я люблю пити каву з...'' (вершками, друзями).'
- section: 'Місцевий відмінок множини (-ах, -ях): На кому? На чому?'
  points:
  - 'Основне правило: завжди закінчення -ах (після твердих) або -ях (після м''яких).'
  - 'Вживання: завжди з прийменником (''в/у'', ''на'', ''по'').'
  - 'Приклади: ''Книги лежать на столах'', ''Студенти сидять в аудиторіях'', ''Діти
    граються на вулицях''.'
  - 'Порівняння з іншими відмінками: ''Я думаю про...'' (проблеми/проблемах).'
  - 'Практика: опишіть, що знаходиться в різних місцях (у парках, на площах, у містах).'
