module: a2-034
level: A2
sequence: 34
slug: plural-other-cases
version: 1.0.2
title: З друзями, для дітей
subtitle: Давальний, орудний та місцевий відмінки множини
focus: grammar
pedagogy: PPP
phase: A2.5 [Case Synthesis and Plurals]
word_target: 2000
objectives:
- Learner can form the Dative plural for nouns of all declension classes using 
  the endings -ам/-ям.
- Learner can form the Instrumental plural using -ами/-ями and recognize the 
  common alternation pattern.
- Learner can form the Locative plural using -ах/-ях and use it correctly with 
  prepositions (у/в, на, по).
- Learner can use all three plural cases in practical sentences about doing 
  things with friends, giving things to people, and describing locations.
dialogue_situations:
- setting: 'Organizing a school trip — all cases in plural: Розкажіть дітям (dat pl)
    план. Їдемо автобусами (inst pl). Зупинимося в готелях (loc pl). Купимо подарунки
    для батьків (gen pl).'
  speakers:
  - Вчитель
  - Учні
  motivation: 'All plural cases: дітям, автобусами, готелях, батьків'
content_outline:
- section: 'Давальний множини: Кому? (Dative Plural: To Whom?)'
  words: 550
  points:
  - 'Universal pattern: all nouns take -ам (hard) or -ям (soft) in Dat.Pl. студентам,
    друзям, дітям, містам, ночам.'
  - This is the most regular plural case — ONE rule covers almost everything. 
    Compare with the complexity of Gen.Pl.
  - 'Common verbs requiring Dative: давати, допомагати, пояснювати, телефонувати,
    дякувати, радити.'
  - 'Practice: Я даю подарунки друзям. Вчитель пояснює правила студентам. Батьки допомагають
    дітям.'
- section: 'Орудний множини: З ким? Чим? (Instrumental Plural: With Whom? With What?)'
  words: 600
  points:
  - 'Universal pattern: -ами (hard) or -ями (soft). студентами, друзями, дітьми (irregular),
    містами, ночами.'
  - 'Key irregular forms: діти → дітьми, люди → людьми, коні → кіньми, гості → гістьми
    (or гостями). These are high-frequency — learn them.'
  - 'Preposition з/із + Instr.Pl.: Я зустрівся з друзями. Ми розмовляли з учителями.
    Вона прийшла з дітьми.'
  - 'Instrumental without preposition (means/tool): писати олівцями, їсти паличками,
    прикрасити квітами.'
  - 'Practice dialogues: planning activities with friends, describing how things are
    done.'
- section: 'Місцевий множини: Де? На чому? (Locative Plural: Where? On What?)'
  words: 500
  points:
  - 'Universal pattern: -ах (hard) or -ях (soft). у містах, на столах, у книжках,
    на заняттях, у ночах.'
  - 'Prepositions: у/в + Loc.Pl. (location), на + Loc.Pl. (surface/event), по + Loc.Pl.
    (distribution/across).'
  - 'Examples: Діти грають у парках. Книжки лежать на полицях. По вулицях ходять люди.
    На заняттях ми багато говоримо.'
  - 'Compare Dat. and Loc. plural — same stems, different endings: друзям (Dat.) vs.
    на друзях (Loc. — rare but demonstrates the pattern).'
- section: 'Три відмінки разом: Практика (All Three Together: Practice)'
  words: 350
  points:
  - 'Combined sentences using Dat., Instr., and Loc. plurals: Ми подарували квіти
    вчителям (Dat.) і сфотографувалися з ними (Instr.) у класах (Loc.).'
  - 'Short dialogue: organizing a trip — who to invite (Dat.), what to bring (Instr.),
    where to go (Loc.).'
  - 'Summary table: Dat. -ам/-ям, Instr. -ами/-ями, Loc. -ах/-ях — the most regular
    set of plural endings in Ukrainian.'
- section: Підсумок — Summary
  words: 200
  points:
  - 'The Dative (-ам/-ям), Instrumental (-ами/-ями), and Locative (-ах/-ях) plurals
    are highly regular across all noun classes. Watch out for high-frequency irregulars
    in the Instrumental plural: діти → дітьми, люди → людьми.'
  - "Self-check: What prepositions are commonly used with the Locative plural? Translate:
    'I give gifts to friends' and 'We are walking with children in the parks.' Describe
    3 objects you can eat with using the Instrumental plural."
vocabulary_hints:
  required:
  - давальний відмінок (dative case)
  - орудний відмінок (instrumental case)
  - місцевий відмінок (locative case)
  - допомагати (to help)
  - дякувати (to thank)
  - подарунок (gift)
  - квіти (flowers)
  - діти (children)
  - люди (people)
  - заняття (class, lesson)
  recommended:
  - радити (to advise)
  - пояснювати (to explain)
  - полиця (shelf)
  - прикрашати (to decorate)
activity_hints:
- type: fill-in
  focus: Put the noun into the correct plural case (Dat., Instr., or Loc.) based
    on the preposition or verb in the sentence
  items: 8
- type: match-up
  focus: Match plural noun forms with the correct case label (Dat., Instr., 
    Loc.)
  items: 8
- type: quiz
  focus: Choose the correct preposition + plural case combination to complete a 
    sentence
  items: 8
- type: error-correction
  focus: Fix incorrect case endings in sentences
  items: 6
references:
- title: Заболотний Grade 6, §§63-65
  notes: Dat., Instr., Loc. plural endings with exercises
- title: Кравцова Grade 4, с. 46-48
  notes: Distinguishing Dative and Locative — simple exercises for recognizing 
    case by question words
