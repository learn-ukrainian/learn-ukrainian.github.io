  url: https://uk.wikipedia.org/wiki/Складнопідрядне_речення_часу
  type: reference
  notes: Detailed rules for 'коли', 'поки', and 'як тільки'
immersion: 60-75% Ukrainian
phase: A2.2
persona:
  voice: Encouraging Cultural Guide
  role: Orchestra Conductor
vocabulary_hints:
  required:
  - 'коли (when) — Collocations: Коли ти прийдеш? Коли я був маленьким...'
  - 'поки (while/until) — Collocations: Поки я чекаю... Поки що (meanwhile/so far)'
  - 'перед тим як (before [doing something]) — Usage: Перед тим як вийти... Перед
    тим як лягти спати...'
  - 'після того як (after [doing something]) — Usage: Після того як ми закінчили...
    Після того як він подзвонив...'
  - 'щойно (just/as soon as) — Collocations: Щойно я зайшов...'
  - 'як тільки (as soon as) — Collocations: Як тільки зможу...'
word_target: 3000
