vocabulary_hints:
  required:
  - 'коли (when) — High frequency/Core. Collocations: Коли ти прийдеш? Коли я був
    маленьким...'
  - 'поки (while/until) — High frequency/Core. Collocations: Поки я чекаю... Поки
    що (meanwhile/so far).'
  - 'перед тим як (before [doing something]) — Medium frequency. Usage: Перед тим
    як вийти... Перед тим як лягти спати...'
  - 'після того як (after [doing something]) — Medium frequency. Usage: Після того
    як ми закінчили... Після того як він подзвонив...'
  - 'щойно (just/as soon as) — Medium frequency/Spoken register. Collocations: Щойно
    я зайшов...'
  - 'як тільки (as soon as) — Medium frequency/Spoken register. Collocations: Як тільки
    зможу...'
  recommended:
  - 'поки не (until) — Grammatical logic: requires a double negative in Ukrainian.'
  - якщо (if) — Essential contrast word to avoid the 'when/if' confusion at A2.
  - кожного разу, коли (every time when) — Frequency pattern for habit description.
word_target: 3000
