module: a2-33
level: A2
sequence: 33
slug: time-clauses
version: '2.0'
title: Time Clauses
subtitle: When, While, and After
content_outline:
- section: Introduction / Вступ
  points:
  - 'Life as a sequence of events — aligns with State Standard §1.4.1.1: creating
    a narrative as a simple sequence of events'
  - 'Why chronological ''logic'' matters for storytelling — cultural hook: proverb
    «Всьому свій час» (Everything has its time)'
- section: Presentation / Презентація
  points:
  - '''Simultaneity: Поки (Process) vs Коли (Point)'' — visualize with a timeline;
    learner error: confusing «коли» (when) with «якщо» (if)'
  - '''Sequencing: Перед тим як (Before) vs Після того як (After)'' — pedagogy note:
    explicitly contrast «перед» + Noun vs «перед тим як» + Verb; learner error: dropping
    «тим/того» (missing linkers)'
  - '''Immediacy: Як тільки, Щойно'' — colloquial usage «як тільки зможу»'
  - '''Frequency: Кожного разу, коли...'' — reinforce pattern consistency'
  - '''The Until Trap: Поки не'' — cultural hook: Christmas Eve tradition (do not
    eat «поки не зійде перша зірка»); learner error: missing the double negative'
  - '''Aspect Selection: Ongoing processes vs Finished triggers'' — builds on «verb-aspect-intro»'
- section: Practice / Практика
  points:
  - Narrative sequencing drills — focus on State Standard requirement for monologue
    production
  - '''''''Wait until'''' logic exercises'''
- section: Dialogues / Діалоги
  points:
  - Reporting a busy morning or planning a trip's schedule
focus: grammar
pedagogy: PPP
objectives:
- Learner can sequence events using time conjunctions
- Learner can describe simultaneous actions using 'поки' and 'коли'
- Learner can distinguish between 'перед тим як' and 'після того як'
- Learner can tell stories with clear chronological structure
grammar:
- time connectors (коли, поки, після того як)
- sequence of tenses
- aspect in time clauses
- simultaneous vs sequential actions
module_type: grammar
sources:
