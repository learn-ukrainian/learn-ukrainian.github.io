module: a2-33
level: A2
sequence: 33
slug: time-clauses
version: '2.0'
title: Time Clauses
subtitle: When, While, and After
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'Life as a sequence of events: alignment with Ukrainian State Standard §1.4.1.1
    regarding the creation of a narrative monologue as a simple sequence of events.'
  - 'The cultural concept of time and patience: Introduction of the proverb «Всьому
    свій час» (Everything has its time) to frame the importance of temporal logic.'
- section: 'Презентація: Граматичні основи (Presentation: Grammatical Foundations)'
  words: 800
  points:
  - 'Simultaneity and Points in Time: Contrast between «коли» (point/when) and «поки»
    (process/while) using a visual timeline for clarity.'
  - 'Sequencing events: Detailed rules for «перед тим як» (before) and «після того
    як» (after), focusing on the necessity of the linkers «тим/того».'
  - 'Common Error Correction: Addressing the ''If confusion'' where learners use «коли»
    for conditional «якщо» (e.g., «Якщо я матиму час...» vs «Коли я матиму час...»).'
  - 'Pedagogical Distinction: Explicitly contrast the structure of «перед» + Noun
    (prepositional phrase) vs «перед тим як» + Verb (time clause).'
- section: 'Презентація: Складні випадки та культура (Presentation: Complex Cases
    and Culture)'
  words: 700
  points:
  - 'The ''Until Trap'': Explaining the double negative requirement in «поки не» clauses
    (e.g., «Я чекаю, поки ти не прийдеш»).'
  - 'Cultural Hook: The Ukrainian Christmas Eve (Свята Вечеря) tradition of waiting
    to eat «поки не зійде перша зірка» (until the first star appears).'
  - 'Immediacy and Frequency: Usage of «щойно» (just/as soon as) and «як тільки» (as
    soon as) in spoken register, plus «кожного разу, коли...» for habits.'
- section: Практика та корекція помилок (Practice and Error Correction)
  words: 600
  points:
  - 'Drill: Identifying and fixing the missing linker error (e.g., correcting «Перед
    я пішов» to «Перед тим як я пішов»).'
  - 'Transformation exercises: Converting simple prepositional phrases into complex
    time clauses using the research-based contrast patterns.'
  - 'Negative logic drills: Practicing the «поки не» structure to internalize the
    Ukrainian negation of the limit-action.'
- section: Продукція та діалоги (Production and Dialogues)
  words: 500
  points:
  - 'Monologue production: Reporting a busy morning schedule or a trip itinerary,
    strictly following the State Standard requirement for sequencing.'
  - 'Dialogue: Planning a shared event where participants use «поки», «як тільки»,
    and «після того як» to coordinate their actions.'
focus: grammar
pedagogy: PPP
objectives:
- Learner can sequence events using time conjunctions
- Learner can describe simultaneous actions using 'поки' and 'коли'
- Learner can distinguish between 'перед тим як' and 'після того як'
- Learner can tell stories with clear chronological structure
grammar:
- time connectors (коли, поки, після того як)
- sequence of tenses
- aspect in time clauses
- simultaneous vs sequential actions
module_type: grammar
