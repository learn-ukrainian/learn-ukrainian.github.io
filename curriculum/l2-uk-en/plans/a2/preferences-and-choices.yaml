vocabulary_hints:
  required:
  - подобатися (to like) — мені подобається, дуже подобається, подобається бути...
  - вибирати (to choose) — вибирати книжку, вибирати професію, вибирати між...
  - краще (better) — краще ніж, краще зробити, так краще
  - хотів би (would like) — я хотів би замовити, я хотіла би вибрати (polite request
    chunk)
  recommended:
  - перевага (preference/advantage) — віддавати перевагу (to prefer), мати перевагу
