slug: preferences-and-choices
level: A2
title: Я надаю перевагу, я обираю
subtitle: I Prefer, I Choose
focus: communication
word_target: 2000
objectives:
- Express preferences using verbs like 'подобатися', 'любити', and 'надавати перевагу'.
- Use comparative adjectives to justify choices (e.g., 'Я обираю це, бо воно дешевше').
- Ask others about their preferences and choices.
- Form complex sentences using 'тому що', 'але', 'і' to explain decisions.
- Engage in dialogues about making choices in various situations (shopping, planning
  a trip, ordering food).
vocabulary_hints:
- uk: надавати перевагу (+ Dat.)
  en: to prefer
- uk: обирати / вибрати
  en: to choose / select
- uk: вибір
  en: a choice
- uk: рішення
  en: a decision
- uk: по-моєму
  en: in my opinion
- uk: я думаю, що...
  en: I think that...
- uk: краще
  en: better (it is better to...)
- uk: смачніший
  en: tastier
activity_hints:
- type: role-play
  focus: A dialogue in a cafe, choosing between two dishes and explaining why.
  items: 1
- type: survey
  focus: 'Asking and answering survey questions about preferences (e.g., ''What do
    you prefer: mountains or the sea?'').'
  items: 10
- type: sentence-building
  focus: Combining simple sentences into complex ones using conjunctions to explain
    a choice.
  items: 12
- type: open-ended-question
  focus: Writing short paragraphs to answer questions about personal preferences and
    the reasons behind them.
  items: 8
- type: scenario
  focus: Given a scenario (e.g., planning a weekend), discuss the options and make
    a decision.
  items: 5
sequence: 53
module: a2-053
version: '1.0'
phase: A2.8 [Refinement and Graduation]
