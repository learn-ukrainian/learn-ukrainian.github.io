slug: aspect-in-past
level: A2
title: Що ти робив? vs. Що ти зробив?
focus: grammar
track: core
word_target: 2000
reference_word_count: 0
objectives:
- Розрізняти недоконаний і доконаний вид дієслів у минулому часі.
- Правильно використовувати недоконаний вид для опису тривалих, повторюваних або незавершених
  дій у минулому.
- Правильно використовувати доконаний вид для опису завершених дій з конкретним результатом
  у минулому.
- Ставити запитання та відповідати на них про минулі події, обираючи правильний вид
  дієслова.
- Розуміти, як вибір виду впливає на значення речення.
content_outline:
- section: 'Вступ: Два минулі часи в українській мові'
  points:
  - Пояснення концепції виду дієслова як ключової відмінності від англійської граматики.
  - 'Аналогія: ''was doing'' (процес) vs ''did'' (факт, результат).'
  - 'Презентація базової пари: читати (що робив?) vs. прочитати (що зробив?).'
- section: 'Недоконаний вид: Процес і повторення (Що робив?)'
  points:
  - 'Використання для опису дії, що тривала певний час: ''Я вчора цілий день читав
    книгу''.'
  - 'Використання для опису повторюваних дій: ''Раніше я часто ходив у цей парк''.'
  - 'Використання, коли результат невідомий або неважливий: ''Ти відчиняв вікно?''
    (Але невідомо, чи відчинив).'
  - 'Маркери часу: довго, цілий день, завжди, часто, кожного дня.'
- section: 'Доконаний вид: Результат і завершеність (Що зробив?)'
  points:
  - 'Використання для опису одноразової, завершеної дії: ''Я нарешті прочитав цю книгу''.'
  - 'Використання, коли важливий результат: ''Він збудував дім''.'
  - 'Використання в ланцюжку послідовних дій: ''Він прийшов, сів і почав працювати''.'
  - 'Маркери часу: нарешті, вже, раптом, вчора о п''ятій годині.'
- section: 'Порівняльний аналіз: Історія одного вечора'
  points:
  - 'Парні речення для порівняння: ''Я готував вечерю'' vs ''Я приготував вечерю''.'
  - Аналіз короткого тексту, де обидва види використовуються для опису подій.
  - Таблиця з ключовими відмінностями та прикладами.
- section: Практика та типові помилки
  points:
  - Вправи на вибір правильного виду в реченні.
  - Розбір поширених помилок, особливо при перекладі з англійської.
  - Створення власних речень за заданими ситуаціями.
vocabulary_hints:
  required:
  - '[''читати'', ''to read (imperfective)'']'
  - '[''прочитати'', ''to read (perfective, to finish reading)'']'
  - '[''писати'', ''to write (imperfective)'']'
  - '[''написати'', ''to write (perfective, to finish writing)'']'
  - '[''дивитися'', ''to watch (imperfective)'']'
  - '[''подивитися'', ''to watch (perfective, to have a look)'']'
  - '[''робити'', ''to do, to make (imperfective)'']'
  - '[''зробити'', ''to do, to make (perfective)'']'
  - '[''готувати'', ''to cook, to prepare (imperfective)'']'
  - '[''приготувати'', ''to cook, to prepare (perfective)'']'
  - '[''вчора'', ''yesterday'']'
  - '[''цілий день'', ''all day long'']'
  recommended:
  - '[''снідати'', ''to have breakfast (imperfective)'']'
  - '[''поснідати'', ''to have breakfast (perfective)'']'
  - '[''відпочивати'', ''to rest (imperfective)'']'
  - '[''відпочити'', ''to rest (perfective)'']'
  - '[''нарешті'', ''finally'']'
  - '[''вже'', ''already'']'
  - '[''ще'', ''still, yet'']'
  - '[''раптом'', ''suddenly'']'
