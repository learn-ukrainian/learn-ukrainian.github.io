level: A2
word_target: 2000
title: 'Родовий відмінок: Прикметники та займенники'
subtitle: Чий це? Мого друга, цієї книги
objectives:
- Узгоджувати присвійні займенники (мій, твій) з іменниками в родовому відмінку.
- Узгоджувати вказівні займенники (цей, той) з іменниками в родовому відмінку.
- Утворювати форми родового відмінка прикметників чоловічого, жіночого та середнього
  роду.
- Правильно будувати фрази типу 'книга мого нового друга'.
- 'Використовувати ці конструкції з прийменниками: без мого пальта, для цієї гарної
  дівчини.'
content_outline:
- section: 'Вступ: Узгодження в родовому відмінку'
  points:
  - Повторення форм іменників у родовому відмінку.
  - Важливість узгодження прикметників та займенників з іменником.
- section: 'Чоловічий та середній рід: закінчення -ого'
  points:
  - 'Присвійні займенники: мого, твого, нашого, вашого.'
  - 'Вказівні займенники: цього, того.'
  - 'Прикметники: нового, великого, українського.'
  - 'Приклади: немає мого брата, біля цього великого вікна.'
- section: 'Жіночий рід: закінчення -ої/-її'
  points:
  - 'Присвійні займенники: моєї, твоєї, нашої, вашої.'
  - 'Вказівні займенники: цієї, тієї.'
  - 'Прикметники: нової, гарної, вечірньої.'
  - 'Приклади: для моєї сестри, після цієї цікавої лекції.'
- section: Підсумкові таблиці та практика
  points:
  - Зведені таблиці закінчень для всіх родів.
  - Практика узгодження в реченнях з різними прийменниками.
vocabulary_hints:
  required:
  - 'мій (мого/моєї): my'
  - 'твій (твого/твоєї): your (sg.)'
  - 'наш (нашого/нашої): our'
  - 'ваш (вашого/вашої): your (pl./formal)'
  - 'цей (цього/цієї): this'
  - 'той (того/тієї): that'
  - 'новий (-ого/-ої): new'
  - 'великий (-ого/-ої): big'
  - 'гарний (-ого/-ої): beautiful, good'
  - 'цікавий (-ого/-ої): interesting'
  recommended:
  - 'старий (-ого/-ої): old'
  - 'маленький (-ого/-ої): small'
  - 'важливий (-ого/-ої): important'
  - 'добрий (-ого/-ої): good, kind'
  - 'улюблений (-ого/-ої): favorite'
  - 'український (-ого/-ої): Ukrainian'
activity_hints:
- type: declension-drill
  focus: Відмінювання словосполучень у родовому відмінку (напр., 'цей новий стіл')
  items: 12
- type: fill-in-the-blanks
  focus: Вставка правильної форми прикметника або займенника
  items: 15
- type: sentence-correction
  focus: Пошук та виправлення помилок в узгодженні
  items: 10
- type: sentence-construction
  focus: Побудова речень за зразком 'Я не бачу (твій старий друг)'
  items: 10
