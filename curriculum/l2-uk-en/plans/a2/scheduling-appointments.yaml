module: a2-63
level: A2
sequence: 63
slug: scheduling-appointments
version: '2.0'
title: Scheduling Appointments
subtitle: Making and Changing Plans
content_outline:
- section: Introduction / Вступ
  points:
  - 'Appointment culture — cultural hook: The ''Academic Quarter'' (social lateness
    OK) vs Strict Business Punctuality; use of 24-hour clock in official schedules;
    aligned with State Standard §1.1.2.1.1'
  - 'Phone vs online booking — cultural hook: The Messenger Revolution (Viber/Telegram
    dominance over voice calls)'
- section: Presentation / Презентація
  points:
  - 'Я хочу записатися на... — distinguish ''записатися'' (service appointment) vs
    ''домовитися про зустріч'' (hangout); collocations: записатися на прийом/стрижку'
  - 'Choosing date and time — learner error: confusing ''о котрій?'' (at what time?
    - Locative) with ''на котру?'' (for what time? - Accusative); warning on ''half
    past'' logic (3:30 is ''half on fourth'')'
  - Phone etiquette — polite phrases for scheduling and checking availability
- section: Practice / Практика
  points:
  - 'Make appointment calls — immersion note: use Ukrainian interface terms (calendars,
    booking apps) for realism'
  - 'Reschedule meetings — collocations: перенести на завтра, перенести на іншу годину'
- section: Dialogues (Діалоги)
  points:
  - Scheduling dialogues — mix of formal (doctor/business) and informal scenarios
  - 'Confirming details — cultural hook: ''Check your Viber'' for confirmation details'
- section: Narrative (Розповідь)
  points:
  - Scheduling story — realistic scenario involving booking via app or messenger
- section: Need More Practice?
  points:
  - Summary and links
vocabulary_hints:
  required:
  - записатися (to make an appointment) — записатися на прийом (book appointment),
    записатися до лікаря
  - 'зустріч (meeting) — призначити зустріч (schedule), перенести (reschedule), скасувати
    (cancel); learner error: зустріти vs зустрітися з'
  - час (time) — вільний час (free time)
  - дата (date)
  - перенести (to reschedule) — перенести на завтра, перенести на іншу годину
  - скасувати (to cancel) — скасувати зустріч
  - підтвердити (to confirm)
  - вільний (available) — ви вільні? (are you free?), вільне місце (free spot)
  recommended:
  - нагадування (reminder)
  - прийом (appointment)
  - секретар (secretary)
  - зайнятий (busy) — я зайнятий, лінія зайнята
  - раніше (earlier)
  - пізніше (later)
