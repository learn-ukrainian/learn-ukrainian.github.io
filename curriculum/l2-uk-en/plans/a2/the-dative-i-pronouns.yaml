module: a2-01
level: A2
sequence: 1
slug: the-dative-i-pronouns
version: '2.0'
title: The Dative I — Pronouns
subtitle: I Like, I Need, and How I Feel
content_outline:
- section: Introduction / Вступ
  points:
  - 'The sixth case in Ukrainian (давальний відмінок) — focus on recipient role per
    State Standard §4.2.2.3: person for whom action happens (favor/harm)'
  - Key question - кому? чому? (to whom? to what?)
  - Why dative matters for expressing needs and feelings — includes subject of quantitative
    age trait (e.g., Мені двадцять років, Дідусеві вісімдесят років)
- section: Presentation / Презентація
  points:
  - 'Personal pronoun forms (мені, тобі, йому, їй, нам, вам, їм) — collocations: дай
    мені (give to me), скажи мені (tell me), дзвони йому (call him), допоможи їй (give
    help TO her)'
  - 'Comparison with nominative forms — learner error: using Dative for direct objects
    (Я бачу тобі) or Accusative for indirect objects (Дай це мене); learner error:
    ''help me'' is direct in English but Dative in Ukrainian (допомагати мені)'
  - 'Structure - Dat + подобається + Nom (Мені подобається музика) — learner error:
    following English SVO structure (Я подобаю...); visual aid: English Subject ->
    Ukrainian Dative transformation; collocation: як тобі? (how do you like it?)'
  - 'Structure - Dat + потрібно + infinitive/noun — collocations: мені потрібно, тобі
    треба, нам час, їй пасує (it suits her); pedagogy: group by pronoun form (мені...)
    rather than syntactic bucket'
  - 'Temperature and emotional states — collocations: мені холодно, йому нудно, їй
    весело, їм байдуже; cultural hook: «Мені приємно» as a polite response; hospitality
    involves urging guests to eat/drink; flowers must be odd numbers (3, 5, 7) for
    living people (even is for funerals); Bread and Salt given TO guests; gift giving
    taboo: never hand gifts across a threshold (через поріг)'
- section: Practice / Практика
  points:
  - Common expressions review — focus on inversion drills (Object=Subject)
  - Transformation exercises
- section: Dialogues / Діалоги
  points:
  - 'Mini-dialogues for practice — scenarios: hospitality/urging guests to eat, offering
    gifts (avoiding threshold)'
vocabulary_hints:
  required:
  - 'мені (to me) — collocations: мені подобається, дай мені, скажи мені, мені потрібно,
    мені холодно'
  - 'тобі (to you) — collocations: тобі треба, я дам тобі, як тобі? (how do you like
    it?)'
  - 'йому (to him) — collocations: йому 20 років, йому нудно, дзвони йому'
  - 'їй (to her) — collocations: їй пасує (it suits her), їй весело, допоможи їй'
  - 'нам (to us) — collocations: нам треба, нам час (it''s time for us)'
  - 'вам (to you pl./formal) — collocations: що вам дати?, вам допомогти?, скільки
    вам років?'
  - 'їм (to them) — collocations: їм байдуже (they don''t care), їм вдалося (they
    succeeded)'
  - 'подобатися (to like/please) — learner error: avoid Я подобаю це; logic: It pleases
    me (It -> Nom, Me -> Dat)'
  - 'допомагати (to help) — learner error: use Dative (кому?), not Accusative (кого?);
    logic: give help TO someone'
  - 'здаватися (to seem) — collocation: мені здається (it seems to me)'
  - 'потрібно (need) — usage: Dat + потрібно + infinitive/noun'
  - необхідно (necessary)
  - 'цікаво (interesting) — state: мені цікаво (I''m interested)'
  - 'важко (difficult) — state: йому важко (it''s hard for him)'
  - легко (easy)
  - 'приємно (pleasant) — cultural hook: polite response «Мені приємно»'
  recommended:
  - боляче (painful)
  - сумно (sad)
  - весело (fun)
  - гарно (nice/well)
  - погано (bad)
