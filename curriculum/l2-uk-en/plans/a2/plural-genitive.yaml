module: a2-033
level: A2
sequence: 33
slug: plural-genitive
version: 1.0.3
title: Скільки?
subtitle: Родовий відмінок множини — найскладніший відмінок
focus: grammar
pedagogy: PPP
phase: A2.5 [Синтез відмінків та множина]
word_target: 2000
objectives:
- Учень вміє утворювати родовий відмінок множини для іменників I відміни, правильно застосовуючи нульове закінчення та вставляючи вставні голосні там, де це потрібно (сестер, книжок).
- Учень вміє утворювати родовий відмінок множини для іменників II відміни, використовуючи правильне закінчення (-ів/-їв для більшості чоловічого роду, нульове закінчення для більшості середнього роду, -ей для чоловічого роду на м'який приголосний).
- Учень вміє правильно використовувати вислови кількості (скільки, багато, мало, кілька, декілька, числівники від 5) з родовим відмінком множини.
- Учень вміє будувати короткі висловлювання про кількість у повсякденних контекстах (покупки, опис кімнати, розмова про родину).
dialogue_situations:
- setting: 'Інвентаризація в шкільній їдальні — підрахунок речей, що залишилися: Скільки тарілок (f)? Двадцять. Виделок (f)? П''ятнадцять. Ложок (f)? Десять. Склянок (f)? Немає склянок!'
  speakers:
  - Завідувач їдальні
  - Помічник
  motivation: 'Родовий множини: тарілка→тарілок, виделка→виделок, склянка→склянок'
content_outline:
- section: Чому родовий множини такий складний?
  words: 400
  points:
  - 'Огляд: Род. мн. має ТРИ можливі закінчення — нульове закінчення, -ів/-їв, -ей — плюс вставні голосні. Немає єдиного правила, що охоплює всі іменники.'
  - 'Чому це важливо: Род. мн. з''являється після чисел від 5, після багато/мало/кілька/скільки та в багатьох прийменникових конструкціях. Це найпоширеніший відмінок множини.'
  - 'Стратегія: вчити за відмінами та родами, починаючи з найуживаніших слів.'
- section: 'I відміна: нульове закінчення'
  words: 500
  points:
  - 'Більшість іменників I відміни (жіночий та чоловічий рід на -а/-я) мають нульове закінчення: книга → книг, зірка → зірок, вишня → вишень.'
  - 'Вставні голосні з''являються, коли утворюється збіг приголосних: сестра → сестер, земля → земель, пісня → пісень, казка → казок.'
  - 'Винятки з -ів або -ей: суддя → суддів, сім''я → сімей, стаття → статей.'
  - 'Вправа: утворити Род. мн. для поширених іменників I відміни зі вставними голосними та без них.'
- section: 'II відміна: -ів, нульове, -ей'
  words: 600
  points:
  - 'Чоловічий рід на твердий приголосний: -ів (столів, братів, учнів, днів).'
  - 'Чоловічий рід на м''який приголосний: -ів або -ей (учителів, але гостей, коней).'
  - 'Середній рід на -о: нульове закінчення, часто зі вставними голосними (вікон, слів, але міст — без вставного голосного).'
  - 'Середній рід на -е/-я: -ів/-їв (морів, подвір''їв) або нульове (сердець, яєць).'
  - 'Суфікс -ин/-їн зникає: громадянин → громадян, киянин → киян.'
- section: Скільки чого? Кількість у житті
  words: 500
  points:
  - 'Патерн: скільки/багато/мало/кілька/декілька + Род. мн. — Скільки студентів? Багато книжок. Мало грошей. Кілька друзів.'
  - 'Числа від 5 вимагають Род. мн.: п''ять яблук, десять студентів, двадцять гривень.'
  - 'Порівняння з 2-4 (Наз. мн.): два студенти проти п''ять студентів; три книжки проти сім книжок.'
  - 'Діалоги: у магазині запитувати про кількість, описувати, що є в кімнаті, розповідати про членів родини.'
- section: Підсумок
  words: 200
  points:
  - 'Закінчення родового відмінка множини залежать від відміни: I відміна часто має нульове закінчення (книга → книг) зі вставними голосними (сестра → сестер). II відміна чоловічого роду зазвичай має -ів (столів) або -ей (гостей), а середній рід має нульове закінчення (вікон).'
  - 'Слова на позначення кількості (скільки, багато, мало, кілька) та числа від 5 вимагають родового відмінка множини. Самоперевірка: Яка різниця між "два студенти" та "п''ять студентів"? Опишіть кількість 3 різних предметів у вашій кімнаті, використовуючи "багато" або "мало".'
vocabulary_hints:
  required:
  - родовий відмінок (genitive case)
  - нульове закінчення (zero ending)
  - кількість (quantity, amount)
  - багато (a lot, many)
  - мало (few, little)
  - кілька (a few, several)
  - декілька (a few, several)
  - скільки (how many, how much)
  - гроші (money)
  - гривня (hryvnia)
  recommended:
  - вставний голосний (fleeting vowel)
  - виняток (exception)
  - десяток (a dozen, ten-unit)
activity_hints:
- type: fill-in
  focus: 'Утворити родовий відмінок множини від поданих іменників (змішані відміни), вставляючи вставні голосні там, де це потрібно'
  items: 8
- type: quiz
  focus: 'Вибрати правильну форму Род. мн. у виразах кількості (багато ___, п''ять ___)'
  items: 8
- type: match-up
  focus: 'Зіставити іменники в однині з їхніми правильними формами родового відмінка множини'
  items: 8
- type: true-false
  focus: 'Визначити, чи є подана форма Род. мн. правильною чи неправильною (типові помилки, як-от книгів замість книг)'
  items: 8
