slug: plural-genitive
title: Скільки?
level: A2
word_target: 2000
objectives:
- Form and use the genitive plural for all declension classes.
- 'Master the three main genitive plural endings: zero ending, -ів/-їв, and -ей.'
- Correctly use the genitive plural after numbers (5, 6, 10, 100...) and words like
  'багато', 'мало', 'кілька', 'скільки'.
- Recognize and apply vowel insertion/alternation in stems with zero endings (книга
  -> книг, пісня -> пісень).
- Understand when to use different endings for masculine nouns (-ів vs. zero ending).
content_outline:
- section: 'Родовий відмінок множини: Кого? Чого?'
  points:
  - 'Головна функція: позначення кількості після чисел (5 і більше) та слів ''багато'',
    ''мало'', ''кілька'', ''трохи''.'
  - 'Приклади: п''ять студентів, багато книг, кілька проблем, мало грошей.'
  - 'Використання для позначення відсутності: ''Немає... (кого? чого?)'' - ''Немає
    друзів'', ''немає квитків''.'
- section: 'Три основні закінчення: нульове, -ів, -ей'
  points:
  - 'Нульове закінчення: найпоширеніше для жіночого та середнього роду (багато країн,
    книг, слів, місць, питань).'
  - 'Чергування голосних при нульовому закінченні: ''о'', ''е'' -> ''і'' (дорога -
    доріг), випадання ''е'', ''о'' (пісня - пісень).'
  - 'Закінчення -ів/-їв: типове для більшості іменників чоловічого роду (багато столів,
    комп''ютерів, музеїв, героїв).'
  - 'Закінчення -ей: для деяких іменників на -я та іменників типу ''ніч'' (статей,
    ночей).'
  - 'Особливі форми: людей, дітей, грошей.'
- section: 'Числа і кількість: Практичне застосування'
  points:
  - 'Правило: 1 + Називний однини; 2, 3, 4 + Називний множини; 5+ + Родовий множини.'
  - 'Порівняння: один стіл, два столи, п''ять столів.'
  - 'Практика з різними числами та іменниками: ''У мене є десять доларів'', ''Я прочитав
    двадцять книг'', ''Тут працює сто людей''.'
  - 'Запитання ''Скільки?'': ''Скільки у вас друзів?'' - ''У мене багато друзів''.'
