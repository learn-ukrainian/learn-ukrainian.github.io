module: a2-49
level: A2
sequence: 49
slug: work-professions
version: '2.0'
title: Work and Professions
subtitle: Jobs and Careers
content_outline:
- section: Вступ
  points:
  - Job market overview — IT sector prominence (programmers, remote work, flexible
    schedules) as a modern cultural touchpoint — use terms «віддалено» and «гнучкий
    графік»
  - Work vocabulary introduction — focus on high-frequency collocations like «шукати
    роботу», «місце роботи», «важка/цікава робота»
- section: Граматика
  points:
  - 'Professions (лікар, вчитель, інженер) — ensure gender balance (лікар/лікарка,
    вчитель/вчителька) where standard, noting official masculine titles — examples:
    «вчитель історії», «сімейний лікар», «головний інженер»'
  - 'Instrumental with professions — explain "Instrumental = Role/Function" logic;
    learner error: usage of Nominative ("Він працює лікар") instead of Instrumental
    ("Він працює лікарем"); aligns with State Standard §4.2.2.5.1 — learner error:
    ending mismatches (masc -ом/-ем vs fem -ою/-ею)'
  - 'Workplace vocabulary — address forms (Pan/Pani + Name/Title) in formal settings;
    distinguish «колега» vs friend — include academic titles (Professor, Docent);
    collocations: «шановний колега», «порада колеги»'
  - Job activities — verbs governing specific roles (e.g., «викликати лікаря», «бути
    класним керівником») — add «записатися до лікаря», «працювати інженером»
- section: Практика
  points:
  - Dialogues about work — contrast "Я — студент" (Nominative/Now) vs "Я буду студентом"
    (Instrumental/Future) — emphasize "to be" omission in present tense
  - Job interview practice — basic intro preparing for deep dive in module a2-64 —
    use «співбесіда», «резюме»
- section: Підсумок
  points:
  - Summary of vocabulary
vocabulary_hints:
  required:
  - робота (work/job) — шукати роботу, графік роботи, місце роботи, важка/цікава робота
  - професія (profession) — за професією, характеристика особи за професією (State
    Standard)
  - лікар (doctor) — сімейний лікар, головний лікар, викликати лікаря, записатися
    до лікаря
  - вчитель (teacher) — вчитель історії, класний керівник, День вчителя (cultural
    hook)
  - інженер (engineer) — головний інженер, працювати інженером, інженер-програміст
  - офіс (office) — працювати в офісі
  - зарплата (salary) — висока/низька зарплата
  - колега (colleague) — шановний колега, мої колеги, порада колеги
  recommended:
  - програміст (programmer) — працювати віддалено, гнучкий графік (cultural hook)
  - бухгалтер (accountant) — головний бухгалтер
  - резюме (resume) — писати резюме
  - співбесіда (interview) — проходити співбесіду
  - керівник (manager) — класний керівник
  - підлеглий (subordinate) — мати підлеглих
