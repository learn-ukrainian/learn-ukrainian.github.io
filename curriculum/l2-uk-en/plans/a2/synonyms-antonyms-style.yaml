module: a2-058
level: A2
sequence: 58
slug: synonyms-antonyms-style
version: 1.0.3
title: Слова мають друзів
subtitle: Синоніми, антоніми, епітети, метафори та стилістичні прийоми
focus: grammar
pedagogy: PPP
phase: 'A2.8 [Удосконалення та випуск]'
word_target: 2000
objectives:
- Вміти визначати синоніми та антоніми в українській мові і використовувати їх для збагачення мовлення та уникнення повторень.
- Розпізнавати та використовувати базові художні засоби, такі як епітети (золота осінь) та метафори (море квітів).
- Вміти утворювати та використовувати пестливі слова з українськими суфіксами -ик, -ок, -ечк-, -очк- для вираження ніжності та емоційних відтінків.
- Розпізнавати синтаксичні стилістичні прийоми — еліпсис та повтор — в українських текстах та прислів'ях.
dialogue_situations:
- setting: 'Майстер-клас із творчого письма — покращення сухого тексту: Замість "великий будинок" — "величезний палац (m, palace)". Замість "маленька дівчинка" — "крихітна дівчинка". Антонім: "холодний вітер (m)" ↔ "теплий вечір (m)".'
  speakers:
  - Викладач
  - Студенти-письменники
  motivation: 'Синоніми/антоніми/пестливі слова: палац(m), дівчинка(f), вітер(m)'
content_outline:
- section: 'Синоніми та антоніми: збагачуємо мовлення'
  words: 500
  points:
  - 'Що таке синоніми і чому вони важливі: говорити — казати — розповідати, великий — чималий — величезний, гарний — красивий — вродливий. Кожен синонім несе інший відтінок значення.'
  - 'Що таке антоніми: великий — малий, день — ніч, початок — кінець, радість — сум. Пари антонімів у прислів''ях: Не знаючи лиха, не пізнаєш і добра.'
  - 'Практична вправа: замінити слова, що повторюються в абзаці, на синоніми для покращення стилю.'
- section: 'Епітети та метафори: мова, що малює'
  words: 450
  points:
  - 'Епітети — виразні прикметники, які створюють образ: золота осінь, срібний дощ, палке серце, синє небо. Епітети виходять за межі буквального опису.'
  - 'Метафори — порівняння без «як»: море квітів, крила мрії, зоря надії. Українська поезія багата на метафори.'
  - 'Приклади з українських пісень та поезії: Реве та стогне Дніпр широкий (Шевченко) — персоніфікація як метафора.'
  - 'Практика: знайти епітети та метафори в коротких уривках текстів.'
- section: 'Зменшувальні суфікси: ласкаві слова'
  words: 500
  points:
  - 'Головні зменшувально-пестливі суфікси: -ик (хлопчик, котик, столик), -ок (батько → батечко, примітка: -ок для чоловічого роду), -ечк- (книжечка, рученька через -еньк-), -очк- (зірочка, квіточка, ніченька через -еньк-).'
  - 'Емоційна функція: пестливі слова виражають ніжність, прихильність, близькість. Мамочка, серденько, сонечко — повсякденна українська мова сповнена ними.'
  - 'Імена також мають пестливі форми: Оксана → Оксаночка, Тарас → Тарасик, Марія → Марійка, Іван → Іванко.'
  - 'Коли зменшувальні форми змінюють значення: рука → ручка (також для письма або дверна), голова → головка (також часнику або цвяха).'
- section: 'Синтаксична стилістика: еліпсис і повтор'
  words: 550
  points:
  - 'Еліпсис — пропуск дієслова або підмета, який зрозумілий з контексту. Українська використовує це природно: Усе найкраще — дітям! (= Усе найкраще належить/дається дітям). Кожному — своє.'
  - 'Еліпсис у повсякденному мовленні: Він — додому, вона — на роботу. Я — каву, а ти? Це не помилки — це природний український стиль.'
  - 'Повтор — навмисне повторення для підсилення або виразності: думали-думали, ходили-ходили, де-де? Подвоєння як стилістичний прийом.'
  - 'Повтор у прислів''ях і народному мовленні: Тихше їдеш — далі будеш. Ішов, ішов та й прийшов. Тут тобі і хліб, тут тобі і сіль.'
  - 'Практика: розпізнавати еліпсис і повтор в українських прислів''ях та коротких текстах.'
- section: Підсумок
  words: 200
  points:
  - 'Синоніми та антоніми збагачують мовлення (великий — чималий, день — ніч), тоді як епітети (золота осінь) та метафори (море квітів) створюють образи. Самоперевірка: Яка різниця між «красивий» та «вродливий»? Визначте художній засіб у фразі «крила мрії».'
  - 'Зменшувально-пестливі суфікси (-ик, -ок, -ечк-, -очк-) виражають ніжність і можуть змінювати буквальні значення (рука → ручка). Самоперевірка: Утворіть пестливі форми від «кіт», «зірка» та «Іван». Як змінюється значення між «голова» та «головка»?'
  - 'Синтаксична стилістика, як-от еліпсис, пропускає дієслова з контексту (Усе найкраще — дітям!), а повтор підсилює дію (думали-думали). Самоперевірка: Перепишіть «Він пішов додому, а вона пішла на роботу», використовуючи природний український еліпсис.'
vocabulary_hints:
  required:
  - синонім (synonym)
  - антонім (antonym)
  - епітет (epithet)
  - метафора (metaphor)
  - зменшувальний (diminutive)
  - суфікс (suffix)
  - еліпсис (ellipsis)
  - повтор (repetition)
  - образний (figurative, expressive)
  - ласкавий (tender, affectionate)
  recommended:
  - стилістика (stylistics)
  - порівняння (comparison, simile)
  - відтінок (shade, nuance)
  - прислів'я (proverb)
  - виразність (expressiveness)
