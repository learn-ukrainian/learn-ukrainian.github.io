slug: which-case-when
title: Відмінковий компас
level: A2
word_target: 2000
objectives:
- Systematically review the core functions of all 7 cases.
- Choose the correct case based on the verb, preposition, or question being asked.
- Apply specific case uses for time, location, and abstract concepts.
- Distinguish between similar-looking prepositions that govern different cases (e.g.,
  'в/у' for Accusative vs. Locative).
- Build complex sentences by correctly combining multiple nouns in different cases.
content_outline:
- section: 'Карта відмінків: Систематичний огляд'
  points:
  - 'Називний: Хто? Що? (Суб''єкт дії).'
  - 'Родовий: Кого? Чого? (Володіння, відсутність, кількість).'
  - 'Давальний: Кому? Чому? (Адресат, непрямий об''єкт).'
  - 'Знахідний: Кого? Що? (Прямий об''єкт, напрямок).'
  - 'Орудний: Ким? Чим? (Інструмент, компанія, засіб).'
  - 'Місцевий: На кому? На чому? (Місцезнаходження).'
  - 'Кличний: (Звертання).'
- section: Прийменники-вказівники
  points:
  - Прийменники, що вимагають один відмінок (без, для, до, з, про).
  - 'Прийменники-хамелеони: ''в/у'', ''на'', ''за'', ''під'', ''по''.'
  - 'Логіка ''хамелеонів'': рух/напрямок (Куди? -> Знахідний) vs. місце (Де? -> Місцевий).'
  - 'Приклади: ''Я йду в парк'' vs. ''Я гуляю в парку''. ''Я поклав книгу на стіл''
    vs. ''Книга лежить на столі''.'
- section: 'Особливі випадки вживання: Час, місце, характеристики'
  points:
  - 'Знахідний для часу: ''Я працював цілий день'', ''Ми зустрінемося через годину''.'
  - 'Орудний для часу: ''я працюю днями і ночами''.'
  - 'Місцевий для часу: ''у 2024 році'', ''в березні''.'
  - 'Місцевий для шляху: ''йти по вулиці'', ''їхати по дорозі''.'
  - 'Родовий для дати: ''п''ятого березня''.'
- section: 'Практичний синтез: Будуємо складні речення'
  points:
  - 'Аналіз речень: розбір кожного іменника за відмінком.'
  - 'Приклад: ''Вчора (коли?) я (хто?) з другом (з ким?) ходив у кіно (куди?) на новий
    фільм (на що?)''.'
  - Створення власних довгих речень за моделями.
