content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - 'Context and motivation: why this topic matters at A2. Connect to prior knowledge from A2.5.'
- section: Граматика (Grammar)
  words: 1100
  points:
  - |-
    Systematic comparison: choosing the right case by verb/preposition/context. **Gap fills:** Acc. for time (у четвер), про + Acc. (думати про майбутнє), Loc. по + path (бігати по кімнаті), Loc. for characteristic (хлопець у червоному светрі), Loc. for time with years (у 2014 році).
- section: Практика (Practice)
  words: 400
  points:
  - 'Reading Practice: 8-10 Ukrainian sentences using the grammar taught in this module.'
  - Mini-dialogues applying the grammar in real situations.
- section: Підсумок (Summary)
  words: 200
  points:
  - Key patterns summary. Self-check questions.
