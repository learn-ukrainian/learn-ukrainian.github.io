  items: 8
- type: quiz
  focus: Conjugate казати, пити, and боротися — choose the correct form for the
    given person and number
  items: 8
- type: match-up
  focus: Match motion verbs with the correct preposition and case for direction
    (до + Gen., на + Acc., з + Gen.)
  items: 8
