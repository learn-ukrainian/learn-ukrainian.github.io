slug: motion-verbs
level: A2
title: Йти чи ходити, їхати чи їздити?
focus: grammar
track: core
word_target: 2000
reference_word_count: 0
objectives:
- Розрізняти односпрямовані (іти, їхати) та різноспрямовані (ходити, їздити) дієслова
  руху.
- Правильно використовувати дієслова для позначення руху пішки та транспортом.
- Утворювати та використовувати доконаний вид для позначення початку руху (піти, поїхати).
- Відмінювати базові дієслова руху в теперішньому та минулому часах.
- Описувати прості маршрути та подорожі.
content_outline:
- section: 'Логіка руху: В один бік чи туди-назад?'
  points:
  - Введення поняття 'unidirectional' та 'multidirectional' дієслів.
  - 'Аналогія: ''I am going'' (зараз, в один бік) vs ''I go'' (взагалі, регулярно).'
  - Візуальна схема з напрямками руху.
- section: 'Рух пішки: іти vs. ходити'
  points:
  - 'Іти: рух в одному напрямку в даний момент: ''Куди ти йдеш? - Я йду в магазин''.'
  - 'Ходити: рух у різних напрямках, повторювана дія, здатність: ''Я люблю ходити
    пішки'', ''Дитина вже ходить''.'
  - Відмінювання обох дієслів у теперішньому та минулому часах (йшов, йшла; ходив,
    ходила).
- section: 'Рух транспортом: їхати vs. їздити'
  points:
  - 'Їхати: рух транспортом в одному напрямку в даний момент: ''Ми їдемо в Київ''.'
  - 'Їздити: рух транспортом у різних напрямках, повторювана дія: ''Він часто їздить
    у відрядження''.'
  - Відмінювання обох дієслів у теперішньому та минулому часах.
  - Порівняння 'іти/ходити' та 'їхати/їздити'.
- section: 'Початок подорожі: Доконаний вид (піти, поїхати)'
  points:
  - Утворення доконаного виду за допомогою префікса по-.
  - 'Піти: почати рух пішки, ''піти геть''.'
  - 'Поїхати: почати рух транспортом.'
  - 'Використання в минулому та майбутньому часі: ''Він пішов на роботу'', ''Завтра
    ми поїдемо до Львова''.'
- section: 'Практика: Мій маршрут'
  points:
  - Опис свого щоденного маршруту (на роботу, в університет), використовуючи вивчені
    дієслова.
  - Вправи на вибір правильного дієслова в залежності від ситуації.
  - 'Складання діалогів: ''Як дістатися до...?''.'
vocabulary_hints:
  required:
  - '[''іти'', ''to go, to walk (unidirectional)'']'
  - '[''ходити'', ''to go, to walk (multidirectional)'']'
  - '[''їхати'', ''to go, to travel by vehicle (unidirectional)'']'
  - '[''їздити'', ''to go, to travel by vehicle (multidirectional)'']'
  - '[''піти'', ''to go, to leave (perfective, on foot)'']'
  - '[''поїхати'', ''to go, to leave (perfective, by vehicle)'']'
  - '[''пішки'', ''on foot'']'
  - '[''на роботу'', ''to work'']'
  - '[''додому'', ''home(wards)'']'
  - '[''в магазин'', ''to the store'']'
  - '[''зараз'', ''now'']'
  - '[''зазвичай'', ''usually'']'
  recommended:
  - '[''летіти'', ''to fly (unidirectional)'']'
  - '[''літати'', ''to fly (multidirectional)'']'
  - '[''пливти'', ''to swim, to sail (unidirectional)'']'
  - '[''плавати'', ''to swim, to sail (multidirectional)'']'
  - '[''часто'', ''often'']'
  - '[''рідко'', ''rarely'']'
  - '[''туди'', ''there, thither'']'
  - '[''сюди'', ''here, hither'']'
