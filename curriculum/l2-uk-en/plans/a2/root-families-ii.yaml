vocabulary_hints:
  required:
  - 'думати (to think) — high frequency; collocations: думати про (+ Acc), я думаю,
    що...'
  - 'думка (thought/opinion) — high frequency; collocations: цікава думка, на мою
    думку, гарна думка'
  - 'говорити (to speak) — focus on process/ability; usage: говорити українською (no
    prep), говорити про (+ Acc)'
  - 'розмовляти (to converse) — ''роз-'' prefix implies exchange; collocations: розмовляти
    телефоном, ми розмовляли про...'
  - 'мова (language) — cultural note: never use ''язик'' for language; collocations:
    рідна мова, іноземна мова'
  - 'слухати (to listen) — active process; collocations: слухати музику, слухати маму,
    уважно слухати'
  - 'слухняний (obedient) — mnemonic: ''he who listens''; collocations: слухняна дитина'
  - 'відмова (refusal) — etymology: ''speaking back/away''; collocation: отримати
    відмову'
  - казати (to say/tell) — focus on content/message; used for reporting speech
  recommended:
  - 'мовчання (silence) — derivative of ''мов-''; proverb: «Слово – срібло, мовчання
    – золото»'
  - вважати (to consider/believe) — high frequency for expressing formal opinions;
    synonym for 'думати'
  - чути (to hear) — passive counterpart to 'слухати'; common source of learner confusion
  - розмова (conversation) — noun derived from 'розмовляти'; focus on 'роз-' prefix
    logic
word_target: 3000
