level: A2
word_target: 2000
title: Родовий відмінок з прийменником 'до'
subtitle: 'Напрямок і час: до Львова, до вечора'
objectives:
- Використовувати прийменник 'до' для позначення напрямку руху до місця.
- Використовувати прийменник 'до' для позначення кінцевої точки в часі.
- Розрізняти вживання 'до' (напрямок) та 'в/у' (кінцевий пункт, всередину).
- Будувати фрази для позначення часових проміжків (з... до...).
- Правильно утворювати закінчення іменників у родовому відмінку після 'до'.
content_outline:
- section: 'Вступ: Багатозначний прийменник ''до'''
  points:
  - 'Представлення прийменника ''до'' та його основних значень: напрямок і час.'
- section: Прийменник 'до' з просторовим значенням (напрямок)
  points:
  - 'Рух до місця: іти до школи, їхати до Києва.'
  - 'Рух до особи: іти в гості до друга, іти до лікаря.'
- section: Прийменник 'до' з часовим значенням (кінцева точка)
  points:
  - 'Позначення кінцевого моменту: працювати до вечора, чекати до завтра.'
  - 'Конструкція ''з... до...'': з понеділка до п''ятниці, з дев''ятої до шостої.'
- section: 'Порівняння: ''до'' (Genitive) vs ''в/у'' (Accusative)'
  points:
  - Я йду до магазину (напрямок) vs Я йду в магазин (всередину).
  - Контекстуальні приклади для ілюстрації різниці.
- section: Підсумок та вирази
  points:
  - Зведена таблиця значень прийменника 'до'.
  - 'Корисні вирази: до побачення, до завтра, до зустрічі.'
vocabulary_hints:
  required:
  - 'до: to, until'
  - 'місто: city'
  - 'лікар: doctor'
  - 'завтра: tomorrow'
  - 'вечір: evening'
  - 'понеділок: Monday'
  - 'кінець: end'
  - 'побачення: meeting, date'
  - 'зустріч: meeting'
  - 'вокзал: train station'
  recommended:
  - 'напрямок: direction'
  - 'термін: deadline, term'
  - 'відстань: distance'
  - 'аеропорт: airport'
  - 'університет: university'
  - 'бібліотека: library'
  - 'центр: center'
activity_hints:
- type: fill-in-the-blanks
  focus: Вибір між прийменниками 'до' та 'в/у'
  items: 12
- type: schedule-planning
  focus: Створення розкладу на день, використовуючи конструкцію 'з... до...'
  items: 8
- type: sentence-completion
  focus: Доповнення речень місцем або часом після прийменника 'до'
  items: 12
- type: question-answer
  focus: Відповіді на запитання 'Куди ти йдеш?' та 'Доки ти вільний?'
  items: 10
