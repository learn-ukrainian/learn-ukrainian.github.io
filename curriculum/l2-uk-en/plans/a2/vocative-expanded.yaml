title: Пане лікарю! Друже мій!
subtitle: Кличний відмінок у формальних, професійних та емоційних звертаннях
focus: grammar
pedagogy: PPP
phase: A2.4 [Орудний відмінок]
word_target: 2000
objectives:
- Вміти утворювати та використовувати формальні звертання з пане/пані + професія або прізвище (пане директоре, пані вчителько, пане Коваленку).
- Вміти утворювати кличний відмінок професійних назв та посад (лікарю, вчителю, професоре, колего, товаришу).
- Вміти використовувати емоційні та пестливі форми кличного відмінка (друже мій, люба моя, серденько, сонечко).
- Вміти обирати відповідний регістр звертання — формальний, професійний або емоційний — залежно від соціального контексту.
dialogue_situations:
- setting: 'У поліклініці: пацієнт формально звертається до лікаря, а потім телефонує другові: Пане лікарю, мені потрібна довідка. — Добре, пане Ковальчуку, сідайте. Згодом по телефону: Друже мій, уяви собі — лікар каже, що я здоровий!'
  speakers:
  - Пацієнт (Олег)
  - Лікар
  - Друг (by phone)
  motivation: 'Формальний кличний (пане лікарю, пане Ковальчуку) → емоційний кличний (друже мій) в одній природній ситуації'
- setting: 'Вчителька звертається до учнів у класі, а потім учень звертається до вчительки: Маріє, читай далі. Андрію, тихіше. — Пані вчителько, я не розумію це завдання. — Добре, Андрію, пояснюю ще раз.'
  speakers:
  - Вчителька
  - Учні (Марія, Андрій)
  motivation: 'Професійний кличний (пані вчителько) + кличний відмінок імен (Маріє, Андрію) у шкільному контексті'
content_outline:
- section: 'Пане, пані: формальне звертання'
  words: 550
  points:
  - 'Рівень А1 охоплював базовий кличний відмінок (Оксано! Тарасе!). Тепер: система формального звертання з пане/пані.'
  - 'Модель: Пане + професія/посада у кличному відмінку: пане директоре, пане професоре, пане міністре. Пані + професія у кличному відмінку: пані вчителько, пані директорко, пані лікарко.'
  - 'З прізвищами: Пане Ковальчуку, пане Шевченку (чоловічі прізвища відмінюються). Пані Ковальчук, пані Шевченко (для жіночих прізвищ — пані незмінне, прізвище може відмінюватися або ні, залежно від форми).'
  - 'Культурний контекст: пан/пані замінили товариш після здобуття незалежності. Використання пане/пані є свідомим деколоніальним вибором — це вказує на українську, а не радянську ідентичність.'
  - 'Застарілі альтернативи: добродію/добродійко — більш літературне/діаспорне використання. Досі зрозумілі, але менш поширені в сучасній повсякденній українській мові.'
- section: Професійні звертання
  words: 500
  points:
  - 'Кличний відмінок чоловічих професій: лікарю, вчителю, професоре, інженере, водію. Модель: друга відміна → -у/-ю для більшості, -е для іменників твердої групи.'
  - 'Кличний відмінок жіночих професій: лікарко, вчителько, професорко. Українська мова активно використовує фемінітиви — це природно та нормативно.'
  - 'Іменники спільного роду: колего — форма однакова для обох статей. Суддя → суддю. Модель залежить від відміни іменника.'
  - 'Практика: рольова гра зі звертаннями до фахівців — Пане лікарю, у мене болить голова. Пані вчителько, я зробив домашнє завдання.'
- section: 'Друже мій, люба моя: емоційний кличний'
  words: 550
  points:
  - 'Пестливі звертання між близькими людьми: друже, друже мій, подруго моя, люба/любий, кохана/коханий.'
  - 'Зменшувально-пестливий кличний — глибоко українська риса: серденько, сонечко, зіронько, любочко.'
  - 'Займенник + кличний: мій завжди стоїть після іменника у кличному відмінку — друже мій (а не *мій друже), мамо моя (а не *моя мамо). Цей порядок слів є фіксованим у конструкціях зі звертанням.'
  - 'Емоційні вигуки: Боже мій!, Мамо!, Друзі! (кличний відмінок множини збігається з називним для більшості іменників).'
  - 'Усвідомлення регістру: коли використовувати друже мій, пане чи ім''я. Контекст визначає регістр — одна і та ж людина може бути Тарасе на вечірці та пане Ковальчуку на нараді.'
- section: Який кличний обрати?
  words: 400
  points:
  - 'Зведена таблиця регістрів: формальний (пане лікарю), професійний (лікарю), дружній (Тарасе), емоційний (друже мій), інтимний (любий/люба).'
  - 'Практичні сценарії: студент обирає відповідну форму кличного відмінка для різних соціальних ситуацій — написання листа професору, дзвінок другові, розмова з лікарем, заспокоєння дитини.'
  - 'Типові помилки: *пан лікар (називний відмінок замість кличного після пане) → пане лікарю. *Друже моя (неправильне узгодження роду) → подруго моя.'
- section: Підсумок
  words: 200
  points:
  - "Формальне звертання вимагає і 'пане/пані', і професію або прізвище у кличному відмінку: пане директоре, пані вчителько, пане Шевченку. Емоційні звертання ставлять присвійний займенник після іменника: друже мій, люба моя."
  - 'Самоперевірка: Як формально звернутися до лікаря-чоловіка та вчительки-жінки? (пане лікарю, пані вчителько). Зверніться до трьох різних фахівців, з якими ви спілкуєтеся.'
  - "Самоперевірка: Яка різниця в регістрі між 'пане Ковальчуку' та 'друже мій'? Які пестливі слова можна використати для близького друга або дитини? (сонечко, серденько)."
vocabulary_hints:
  required:
  - кличний (vocative (case))
  - звертання (address, appeal)
  - пан (Mr., sir)
  - пані (Mrs., Ms., madam)
  - лікар (doctor)
  - вчитель (teacher)
  - друг (friend)
  - ввічливий (polite)
  - офіційний (official, formal)
  - професія (profession)
  recommended:
  - добродій (sir (literary/diaspora))
  - добродійка (madam (literary/diaspora))
  - емоційний (emotional)
  - ніжний (tender, affectionate)
  - колега (colleague)
