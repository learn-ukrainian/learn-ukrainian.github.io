objectives:
- Аналізувати трилогію «Джури» як комплексний літературний та суспільний феномен.
- Критично оцінювати співвідношення історичної правди та художньої вигадки в літературі для юнацтва.
- Формулювати аргументовану позицію щодо ролі літератури у формуванні національної ідентичності та деколонізації свідомості.
- Розрізняти поняття патріотичного виховання та пропаганди на прикладі аналізованого твору.
