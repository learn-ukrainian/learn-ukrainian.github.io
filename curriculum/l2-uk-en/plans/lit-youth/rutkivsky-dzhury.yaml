activity_hints:
- description: Визначити, яка з тез належить до «педагогічної», а яка до «комерційної» інтерпретації «Джур». Перевірка розуміння
    дебату про місце в каноні.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення терміни з козацького побуту, використані в романі (джура, характерник, курінь, отаман, пластун).
  focus: Лексика твору
  items: 5
  type: fill-in
- description: На основі уривків з роману та коротких історичних довідок, порівняйте образ козацтва у Рутківського з історичною
    реальністю. Що автор змінює і з якою метою?
  focus: 'Аналіз: Історична правда vs. художня вигадка'
  type: note
- description: Напишіть коротке есе (400-600 слів) на тему «Чому трилогія "Джури" стала культовою для покоління, що виросло
    в незалежній Україні?». Використовуйте аргументи з модуля.
  focus: 'Есе: Роль «Джур» у моєму поколінні'
  type: note
