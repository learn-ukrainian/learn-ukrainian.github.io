vocabulary_hints:
- definition: в ієрархії козацтва — молодий зброєносець, учень у досвідченого козака; у романі — символ посвяти та дорослішання.
  pos: ч.
  word: джура
- definition: у козацькій міфології — воїн, наділений надприродними, магічними здібностями; у романі — уособлення духовної
    сили українського народу.
  pos: ч.
  word: характерник
- definition: спосіб розповіді, сукупність пов'язаних подій, що створюють певну історію; у контексті модуля — створення українського
    національного наративу.
  pos: ч.
  word: наратив
- definition: здатність бути активним діячем, самостійно визначати свою долю; у тексті — утвердження української історичної
    суб'єктності.
  pos: ж.
  word: суб'єктність
- definition: наука, що вивчає розвиток історичних знань та те, як пишуться історії; у модулі — критика імперської історіографії.
  pos: ж.
  word: історіографія
- definition: процес позбавлення від залишків колоніального минулого в політиці, культурі та свідомості; у літературі — створення
    наративів, вільних від імперського погляду.
  pos: ж.
  word: деколонізація
- definition: первинний, універсальний образ або символ, що лежить в основі колективного несвідомого; напр., архетип героя,
    мудрого старця.
  pos: ч.
  word: архетип
- definition: сприйняття, засвоєння та інтерпретація твору мистецтва читацькою аудиторією та критикою в різні епохи.
  pos: ж.
  word: рецепція
