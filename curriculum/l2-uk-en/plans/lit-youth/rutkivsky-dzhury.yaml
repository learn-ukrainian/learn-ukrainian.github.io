content_outline:
- points:
  - 'Провокація: «Джури» — це підручник з історії, замаскований під пригодницький роман, чи фентезі, що лише використовує
    історичний антураж?'
  - Де проходить межа між вихованням патріотизму та пропагандою в дитячій літературі?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Джури» як педагогічний проєкт для «виправлення» радянської версії історії та заповнення лакун vs. «Джури» як
    комерційно успішна пригодницька серія, що експлуатує популярну козацьку тематику.'
  - 'Дебат 2: Місце твору в каноні. Це «серйозна» література чи «популярне дитяче чтиво»? Роль трилогії в літературному процесі
    після 2004 року.'
  - '[!epistemic-humility] Критики сперечаються, чи є поєднання фентезійних елементів (характерництво) з історичною канвою
    художнім успіхом, чи це спрощення складної реальності.'
  section: 'Конфліктна карта: Історія чи казка?'
  words: 900
- points:
  - 'Аналіз сюжету та структури: як трилогія еволюціонує від локальної пригоди до епопеї національного масштабу.'
  - 'Система персонажів: Санько, Грицик та інші як архетипи. Шлях героя.'
  - 'Роль фантастичних елементів: характерництво як метафора унікального українського духу та спосіб вирішення конфліктів.'
  - '[!decolonization] «Джури» як відповідь на радянське замовчування та викривлення козацької історії. Створення власного,
    українського героїчного наративу для нового покоління, вільного від імперських комплексів.'
  section: 'Читання: Трилогія «Джури»'
  words: 1700
- points:
  - Дорослішання = становлення джурою. Особистісний ріст героїв нерозривно пов'язаний зі служінням громаді та здобуттям національної
    свідомості.
  - 'Ідеалізований образ козацтва: аналіз цінностей, що транслює текст — побратимство, відвага, жертовність, вірність.'
  - '[!anti-hagiography] Чи не є образ козака у Рутківського надто романтизованим? Критичний аналіз «темних» сторін козацтва,
    які автор залишає поза кадром.'
  - 'Педагогічна функція: як текст конструює для читача-підлітка модель «правильного» українця.'
  section: 'Ідентичність та дорослішання: Козак-характерник як модель для наслідування'
  words: 1200
- points:
  - 'Повернення до розминки: тож, «Джури» — це історія чи казка? Формулювання студентами власної аргументованої позиції.'
  - 'Історія рецепції: шалена популярність, численні нагороди (зокрема Шевченківська премія) та водночас скепсис деяких літературних
    критиків.'
  - 'Сучасне значення: чому ця історія так сильно зарезонувала в Україні після Помаранчевої революції? Роль «Джур» у формуванні
    світогляду покоління, яке сьогодні захищає Україну.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз трилогії «Джури» Володимира Рутківського як феномену сучасної української літератури для юнацтва, що поєднує
  історичну прозу, фентезі та патріотичне виховання. Деконструкція наративу, дослідження його ролі у формуванні національної
  ідентичності покоління.
level: LIT-YOUTH
