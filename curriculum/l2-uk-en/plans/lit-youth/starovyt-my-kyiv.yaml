content_outline:
- points:
  - '"Старовит Мій Київ" — це історик, міфотворець чи пропагандист? Провокативне питання для аналізу найпопулярніших наративів
    про "тисячолітню столицю".'
  - Цитата з тексту "Старовита" про "дух віків", подана без контексту, для первинної реакції та дискусії.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи має право популярна історія "додумувати" факти заради створення сильного національного наративу? Позиція
    "за" (формування ідентичності) vs позиція "проти" (ризик скотитися в пропаганду).'
  - 'Дебат 2: Де межа між деколонізацією історії Києва та створенням нових, "зручних" міфів? [!epistemic-humility] Критика
    радянської/імперської історіографії vs небезпека "відбілювання" складних сторінок української історії.'
  section: 'Конфліктна карта: Історія vs Наратив'
  words: 900
- points:
  - 'Аналіз конкретного тексту (напр., "Міф про заснування Києва"): як автор використовує мову (архаїзми, емоційна лексика)
    для створення ефекту "автентичності".'
  - 'Стилістичні прийоми: порівняння стилю автора з академічною історіографією та з радянськими путівниками по Києву.'
  - '[!decolonization] Як "Старовит" переписує імперські розповіді про Київ (напр. про добу Російської імперії), повертаючи
    місту українську суб''єктність.'
  section: 'Читання: Ключові наративи "Старовит Мій Київ"'
  words: 1700
- points:
  - Відкриття "справжньої" історії свого міста як метафора дорослішання. Як тексти "Старовита" допомагають підліткам сформувати
    власну українську ідентичність.
  - '[!anti-hagiography] Критичний аналіз: чи не замінює автор старі радянські міфи новими національними? Розбір спірних тверджень
    та маніпулятивних прийомів.'
  - 'Цільова аудиторія vs реальна: для кого насправді пише "Старовит"? Для підлітків, що шукають себе, чи для дорослих, що
    ностальгують за "втраченим" Києвом?'
  section: 'Ідентичність та дорослішання: Київ як простір для самопізнання'
  words: 1200
- points:
  - 'Повернення до розминки: тож "Старовит" — історик, міфотворець чи пропагандист? Студент має сформулювати власну позицію,
    використовуючи аргументи з модуля.'
  - 'Спадщина і вплив: як такі проєкти змінюють уявлення про історію та впливають на міський простір (нові екскурсії, назви
    вулиць, меми).'
  - 'Рефлексія: чи змінилося ваше ставлення до популярних історичних блогів/каналів після цього аналізу? На що ви тепер звертатимете
    увагу?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз популярних історичних наративів про Київ, розрізнення факту та міфу, роль у формуванні ідентичності та деколонізаційна
  перспектива
