objectives:
- Критично аналізувати популярні історичні наративи, розрізняючи факти, інтерпретації та міфи
- Оцінювати роль популярної історії у формуванні національної та міської ідентичності підлітків
- Застосовувати концепції "деколонізація" та "суб''єктність" до аналізу текстів про історію України
- Формулювати власну аргументовану позицію щодо балансу між історичною точністю та створенням національного наративу
