content_outline:
- points:
  - 'Провокація: Чи може казка про чудовисько бути інструментом деколонізації? Початкова цитата з твору Сашка Дерманського,
    що ставить під сумнів звичні уявлення про добро і зло.'
  - 'Загадка: Чому герої Івана Андрусяка постійно потрапляють у халепи, пов''язані з історією? Питання, що змушує задуматись
    про зв''язок минулого і сьогодення.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література для підлітків — це передусім розважальний жанр чи інструмент патріотичного виховання? Позиція "за"
    і "проти" на прикладі творів Дерманського.'
  - 'Дебат 2: Чи є сучасна популярна проза "справжньою" літературою, гідною канону? Дискусія про комерційний успіх та художню
    вартість.'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у цих текстах глибокий підтекст, інші — лише вдалий маркетинг.
    "Правильної" відповіді не існує.'
  section: 'Конфліктна карта: Розвага чи виховання?'
  words: 900
- points:
  - 'Уривок з тексту: знайомство з головним героєм та зав''язка конфлікту.'
  - 'Аналіз наративу: як автор використовує гумор та іронію для обговорення серйозних тем — толерантності, дружби, самотності.'
  - 'Стилістика та мова: неологізми, гра слів, живий діалог як засіб створення унікального світу та характеру персонажів.'
  - '[!decolonization] На відміну від радянської дитячої літератури, де герой завжди був частиною колективу, тут у центрі
    — індивідуальність, її право бути іншою.'
  section: 'Читання: "Чудове Чудовисько" Сашка Дерманського'
  words: 1700
- points:
  - 'Пригоди як метафора дорослішання: як через подолання перешкод герой знаходить не лише друзів, а й власну ідентичність.'
  - 'Українська суб''єктність: світ героїв Дерманського та Андрусяка — це сучасна Україна. Як мова, географія та культурні
    коди вплітаються в наратив.'
  - '[!decolonization] Руйнування імперського міфу про "малоросійську" провінційність. Герої живуть у самодостатньому, цікавому
    українському світі.'
  - '[!anti-hagiography] Чи не є такий підхід новою формою пропаганди, тепер уже "правильної"? Критичний аналіз педагогічної
    функції текстів.'
  section: 'Ідентичність та дорослішання: Герой у пошуках себе та країни'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може казка бути зброєю? Формулювання студентами аргументованої відповіді.'
  - 'Рецепція та критика: як ці твори були сприйняті читачами та критиками в момент публікації і як їхнє значення змінилося
    сьогодні.'
  - 'Сучасне значення: що ці тексти говорять нам про Україну 2020-х і про нове покоління, яке на них зростає?'
  - 'Рефлексія: Запропонувати студентам подумати, як би вони написали історію про своє дорослішання в сучасній Україні.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз творчості Сашка Дерманського та Івана Андрусяка як представників нової хвилі української підліткової літератури,
  їх роль у деколонізації свідомості та формуванні сучасної української ідентичності.
level: LIT-YOUTH
module: lit-youth-015
objectives:
- Критично аналізувати твори сучасної української підліткової прози в культурному та історичному контексті.
- Розрізняти та обговорювати ключові літературно-критичні дебати щодо літератури для юнацтва.
- Пояснювати, як літературні тексти можуть сприяти процесам деколонізації та формуванню національної ідентичності.
- Формулювати власну аргументовану позицію щодо ролі та значення сучасної літератури для підлітків.
pedagogy: CBI
