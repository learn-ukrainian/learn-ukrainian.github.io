content_outline:
- points:
  - 'Провокаційне питання: Чи є література Аліси Малик лише підлітковою фантастикою, чи це складний коментар до української
    історії, замаскований під young adult роман?'
  - Цитата з твору, що ілюструє дилему самовизначення персонажа в умовах невизначеного майбутнього.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ескапізм vs. Політичний коментар. Чи є твори Малик втечею від реальності, чи гострою критикою цієї реальності
    через метафору?'
  - 'Дебат 2: Місце в каноні. Чи є Аліса Малик частиною нового канону літератури після 2014 року, чи вона залишається нішевим
    автором у жанрі фентезі?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у її творах глибоку філософію, інші — лише розважальний сюжет.
    Істина, як завжди, залежить від оптики.'
  section: 'Конфліктна карта: Література для молоді чи про молодь?'
  words: 900
- points:
  - 'Аналіз уривків: детальний розбір ключових сцен, що розкривають стилістичні особливості авторки.'
  - 'Система персонажів: як головні та другорядні герої втілюють різні аспекти української ідентичності.'
  - 'Наративна структура: нелінійність, зміна оповідачів, і як ці прийоми працюють на розкриття головної теми.'
  - '[!decolonization] Мова як поле боротьби: аналіз того, як персонажі використовують або відкидають українську мову, і що
    це говорить про їхню суб''єктність.'
  section: 'Читання: Аналіз стилю та наративу в романах Аліси Малик'
  words: 1800
- points:
  - 'Coming-of-age arc: Що означає "подорослішати" у світі, де минуле постійно втручається в сьогодення?'
  - 'Формування ідентичності: аналіз того, як мова, культура та національна історія стають елементами самопізнання підлітків.'
  - '[!anti-hagiography] Педагогічна функція: чи не є деякі твори прихованою пропагандою певних цінностей? Критичний аналіз
    ідеологічного підґрунтя.'
  - '[!decolonization] Руйнування імперських міфів: як авторка переосмислює історію, показуючи її з неочікуваного, "негероїчного"
    боку.'
  section: 'Ідентичність та дорослішання: Пошук себе в тіні імперії'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, підліткова фантастика чи серйозна література? Студент формулює власну аргументовану відповідь.'
  - 'Історія рецепції: як сприймали твори Малик на початку її кар''єри і як сприймають зараз? Що змінилося в суспільстві?'
  - 'Сучасна релевантність: що говорять твори Аліси Малик сучасній Україні, яка бореться за свою ідентичність?'
  - '[!anti-hagiography] Рефлексія для студента: чи змінилося ваше ставлення до "молодіжної" літератури після цього аналізу?
    Чому?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Alice Malyk's works in the context of modern Ukrainian youth literature, focusing on identity formation,
  decolonization narratives, and the author's unique stylistic elements.
level: LIT-YOUTH
module: lit-youth-010
objectives:
- Аналізувати твори Аліси Малик як феномен сучасної молодіжної літератури України.
- Визначати, як теми ідентичності та дорослішання розкриваються у творах автора як відповідь на постколоніальні виклики.
- Застосовувати інструменти деколоніальної критики для аналізу літературних текстів.
- Формулювати власну позицію в літературно-критичних дебатах щодо канону та функції літератури.
pedagogy: CBI
persona:
  role: Критик сучасного канону, що бачить у молодіжній літературі ключ до розуміння національних трансформацій.
  voice: Proponent of "serious" reading of "unserious" genres
phase: LIT-YOUTH.1
