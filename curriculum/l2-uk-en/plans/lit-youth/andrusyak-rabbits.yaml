content_outline:
- points:
  - 'Провокація: Чи може книга про кроликів бути інструментом деколонізації? Розглядаємо уривок з твору Івана Андрусяка без
    контексту.'
  - 'Запитання до студентів: Які цінності, на вашу думку, має транслювати дитяча література в країні, що воює за своє існування?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Творчість Андрусяка — це легка розважальна література для дітей чи складний текст з подвійним дном, адресований
    батькам?'
  - 'Дебат 2: Чи є дитяча література полем ідеологічної боротьби? Роль Андрусяка у формуванні "правильних" цінностей у нового
    покоління українців.'
  - '[!epistemic-humility] Розгляд протилежних поглядів критиків: одні бачать в Андрусяку лише доброго казкаря, інші — ідеолога,
    що виховує майбутніх громадян.'
  section: 'Конфліктна карта: Дитяча література — розвага чи ідеологія?'
  words: 900
- points:
  - 'Аналіз сюжету та системи персонажів: як головний герой проходить шлях від невпевненості до усвідомлення власної сили.'
  - 'Стилістика та мова автора: гумор, іронія та гра слів як інструменти для розмови з дітьми на складні теми.'
  - 'Контекстуалізація: місце повісті у творчості Андрусяка та в панорамі сучасної української дитячої літератури.'
  - '[!decolonization] Андрусяк свідомо вибудовує світ дитинства, вільний від радянських чи російських культурних кодів, пропонуючи
    натомість українські наративи.'
  section: 'Читання: ''Вісім днів із життя Бурундука'''
  words: 1700
- points:
  - 'Аналіз процесу дорослішання: як герой вчиться брати на себе відповідальність та робити свідомий вибір.'
  - 'Формування суб''єктності: як через мову, щоденні практики та стосунки з іншими персонажами автор конструює модель маленького,
    але свідомого українця.'
  - '[!decolonization] Як автор руйнує імперські міфи про "меншовартість" через дитячі образи, показуючи їх здатними на великі
    вчинки.'
  - '[!anti-hagiography] Критичний погляд: чи не є такий підхід формою "м''якої пропаганди"? Обговорення межі між вихованням
    та ідеологічною індоктринацією в дитячій літературі.'
  section: 'Ідентичність та дорослішання: Як стати суб''єктом, а не об''єктом'
  words: 1200
- points:
  - 'Повернення до провокації з розминки: тож чи може книга про кроликів бути інструментом деколонізації? Студенти формулюють
    аргументовану відповідь.'
  - 'Рецепція та вплив: як творчість Андрусяка сприймається читачами та критиками сьогодні? Який її внесок у сучасний літературний
    процес?'
  - '[!anti-hagiography] Рефлексія: чи змінилося ваше сприйняття дитячої літератури після цього аналізу? Які небезпеки та
    можливості ви в ній бачите?'
  section: Дискусія та підсумок
  words: 800
focus: Творчість Івана Андрусяка в контексті сучасної української дитячої літератури, аналіз механізмів формування ідентичності
  та деколонізації через дитячі наративи.
level: LIT-YOUTH
module: lit-youth-021
objectives:
- Аналізувати, як сучасна українська дитяча література на прикладі творів Івана Андрусяка формує національну ідентичність
- Розрізняти поняття 'розважальна функція' та 'ідеологічна функція' в дитячих текстах
- Застосовувати інструменти деколоніальної критики до аналізу літературних творів для юнацтва
- Формулювати власну аргументовану позицію в літературно-критичних дебатах щодо ролі письменника в суспільстві
pedagogy: CBI
