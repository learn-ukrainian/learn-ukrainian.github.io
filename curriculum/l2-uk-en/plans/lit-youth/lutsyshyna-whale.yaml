content_outline:
- points:
  - 'Провокаційне питання: Як можна пам''ятати те, чого ніколи не бачив? Що, як ціле покоління успадкувало спогади про катастрофу,
    що сталася до їхнього народження?'
  - Цитата з роману "Іван і Феба" про кита, що символізує невимовну травму, подана без контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є проза Луцишиної в першу чергу свідченням, "літературою травми", що фіксує досвід покоління? Або це передусім
    естетичний експеримент, постмодерна гра з наративом та міфом?'
  - 'Дебат 2: Місце в каноні. Луцишина — авторка діаспори чи центральна фігура сучасної "материкової" літератури? Як її транснаціональний
    досвід (життя в США) впливає на її сприйняття в Україні?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у її творах терапевтичний інструмент для нації, інші — складну
    інтелектуальну прозу, що вимагає підготовленого читача.'
  section: 'Конфліктна карта: Травма-письмо vs. Постмодерна гра'
  words: 900
- points:
  - 'Аналіз ключового уривку: сцена, де дитяча гра перетворюється на ритуал відтворення травматичних подій, пов''язаних із
    Чорнобилем.'
  - 'Наративна структура: фрагментарність, нелінійність, поєднання сну та реальності як спосіб зобразити розірвану свідомість
    персонажів.'
  - 'Система персонажів: Іван, Феба та міфологічний образ кита. Кит як метафора радянського минулого — гігантського, мертвого,
    але все ще присутнього.'
  - '[!decolonization] Луцишина свідомо відходить від соцреалістичної традиції "великого наративу", створюючи мозаїку особистих
    історій, що разом складають картину епохи, вільну від імперського погляду.'
  section: 'Читання: "Іван і Феба"'
  words: 1800
- points:
  - 'Арка дорослішання: як персонажі будують свою ідентичність не "завдяки", а "всупереч" історії? Дорослішання як процес
    звільнення від нав''язаної радянської суб''єктності.'
  - 'Мова як поле боротьби: використання суржику, неологізмів та поетичної мови для створення власного світу, вільного від
    ідеологічних кліше.'
  - 'Педагогічна функція: Чи вчить текст, як жити з травмою? Які цінності він пропонує поколінню, що виросло на руїнах імперії?'
  - '[!anti-hagiography] Критичний погляд: чи не романтизує текст страждання? Чи не стає "травма" єдиним визначальним елементом
    ідентичності для цілого покоління?'
  section: 'Ідентичність та дорослішання: Покоління "дітей асфальту"'
  words: 1200
- points:
  - 'Повернення до розминки: Як роман відповідає на питання про успадковану пам''ять? Студенти формулюють свою позицію.'
  - 'Рецепція твору: Чому "Іван і Феба" отримав Шевченківську премію? Яке значення ця книга має для сучасного українського
    канону?'
  - 'Сучасна релевантність: Як досвід персонажів Луцишиної резонує з досвідом молодих українців сьогодні, що переживають нову,
    повномасштабну травму війни?'
  - '[!anti-hagiography] Рефлексія: чи не стає "опрацювання травми" модною інтелектуальною грою, що знецінює реальний біль?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість Оксани Луцишиної, зокрема роман "Іван і Феба", як приклад пост-Чорнобильського дорослішання, боротьби з травмою
  пам'яті та деконструкції радянської суб'єктності.
level: LIT-YOUTH
module: lit-youth-022
objectives:
- Аналізувати роман Оксани Луцишиної "Іван і Феба" як ключовий текст про дорослішання в епоху після Чорнобиля
- Розрізняти та аргументувати різні критичні підходи до "літератури травми" (документальний vs. естетичний)
- Критично осмислювати процес формування ідентичності на руїнах імперії, використовуючи поняття суб'єктності та деколонізації
- Формулювати власну позицію щодо ролі літератури в опрацюванні колективних травм, порівнюючи історичний та сучасний контексти
pedagogy: CBI
