activity_hints:
- description: Визначте, яка з тез належить до "травматичної", а яка до "постмодерної" інтерпретації творчості Луцишиної.
  focus: Розуміння літературно-критичних дебатів
  items: 4
  type: quiz
- description: 'Вставте в речення правильні терміни: суб''єктність, фрагментарність, канон, наратив, травма.'
  focus: Ключова термінологія модуля
  items: 5
  type: fill-in
- description: На основі уривків з модуля та власних міркувань, напишіть коротке есе про те, що символізує кит. Чому саме
    ця тварина? Які культурні асоціації вона викликає?
  focus: 'Аналіз символу: образ кита в романі "Іван і Феба"'
  type: note
- description: Порівняйте досвід дорослішання покоління "після Чорнобиля", зображений у Луцишиної, з досвідом сучасних підлітків
    в умовах повномасштабної війни. Що спільного, а що відмінного у цих досвідах? (400-600 слів).
  focus: 'Есе: Дорослішання в умовах травми — тоді і зараз'
  type: note
