content_outline:
- points:
  - 'Провокація: Чи є «Котигорошко» просто казкою про хлопчика-силача, чи це — інструкція з виживання для нації, оточеної
    ворогами?'
  - 'Питання для роздумів: Які настанови для життя винесли ви зі своїх улюблених дитячих казок?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Дидактична vs. Естетична функція. Чи має дитяча література навчати моралі (версія радянської педагогіки), чи
    розвивати уяву та критичне мислення (сучасний погляд)?'
  - 'Дебат 2: Канон — це список рекомендованої літератури чи інструмент формування «правильного» громадянина? Хто вирішує,
    що читатимуть діти, і чому?'
  - '[!epistemic-humility] Розгляд позицій від Олександра Потебні (фольклор як «психологія народу») до сучасних постколоніальних
    критиків.'
  section: 'Конфліктна карта: Дитячий канон: педагогіка чи ідеологія?'
  words: 900
- points:
  - 'Close-reading уривків: аналіз мотивів (чудесне народження, боротьба зі змієм), символів (булава, залізо) та персонажів.'
  - '[!decolonization] Порівняння українського Котигорошка з російським Іваном-дураком. Котигорошко — активний будівничий,
    що долає ворога працею і силою. Іван — пасивний, очікує на диво. Це відображає фундаментально різні національні архетипи.'
  - 'Стилістика та мова казки: аналіз епітетів, повторів та формульних виразів.'
  - 'Структура оповіді як обряд ініціації: від дитини до захисника роду.'
  section: 'Читання: Казка "Котигорошко" та її символізм'
  words: 1800
- points:
  - '«Дорослішання» в казці як алегорія становлення нації: від беззахисності до повноцінної суб''єктності.'
  - '[!anti-hagiography] Аналіз цінностей, що транслюються: сила, хитрість, вірність роду. Чи є місце для слабкості, сумнівів,
    індивідуалізму в цьому світі? Критичний погляд на мілітаризований ідеал маскулінності.'
  - '[!decolonization] Як радянська цензура «редагувала» фольклор, видаляючи мотиви національної боротьби і замінюючи їх класовою
    боротьбою.'
  - 'Суб''єктність українського героя: аналіз здатності до самостійних рішень та взяття відповідальності.'
  section: 'Ідентичність та дорослішання: Національний характер у дитячих історіях'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, "Котигорошко" — це казка чи посібник з національної безпеки? Формулювання відповіді на
    основі аналізу.'
  - 'Рецепція та спадщина: як змінювалося сприйняття казки від XIX століття до сьогодні. Що нового ми бачимо в ній після 2014/2022
    років?'
  - '[!anti-hagiography] Підсумкова дискусія: чи не створює такий фольклор «комплекс обложеної фортеці»? Як збалансувати виховання
    стійкості та відкритість до світу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз українського дитячого фольклору як засобу передачі національної ідентичності, цінностей та культурних кодів.
  Дослідження наративу дорослішання у народних текстах та порівняння педагогічного задуму з постколоніальною критикою.
level: LIT-YOUTH
module: lit-youth-024
objectives:
- Аналізувати твори дитячого фольклору як систему передачі культурних цінностей та ідентичності
- Критично оцінювати педагогічну функцію дитячої літератури, виявляючи потенційну пропаганду та ідеологічні настанови
- Формулювати аргументовану позицію в літературних дебатах щодо канону дитячої літератури та її інтерпретацій
- Застосовувати методику close-reading для аналізу стилістики, символізму та наративних структур у текстах для дітей
pedagogy: CBI
persona:
  role: Аналітик культурних кодів, що розшифровує приховані послання у текстах для дітей та підлітків
  voice: Critical-Pedagogue
