content_outline:
- points:
  - 'Провокація: Чому пригодницький роман для підлітків про козаків, написаний у 2007 році, став одним із найважливіших текстів
    для розуміння сучасної України?'
  - 'Загадка: У тексті немає жодного "поганого росіянина". Чому ж тоді цей роман вважають потужним інструментом деколонізації?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Джури" — це історична реконструкція чи створення нового національного міфу? Позиція "реконструкторів" (увага
    до деталей побуту) vs позиція "міфотворців" (ідеалізація козацтва).'
  - 'Дебат 2: Це дитяча література чи політичний маніфест для дорослих, замаскований під казку? Аргументи "за" дитячу книгу
    (проста мова, пригоди) vs аргументи "за" політичний проєкт (чіткий ідеологічний меседж).'
  - '[!epistemic-humility] Літературна критика не має єдиної відповіді. Завдання — не знайти "правильну" інтерпретацію, а
    зрозуміти, чому твір провокує такі різні читання.'
  section: 'Конфліктна карта: Історія, міф чи політичний проєкт?'
  words: 900
- points:
  - 'Аналіз ключового епізоду: перша зустріч Санька і Грицика зі Швайкою. Як автор створює атмосферу таємниці та довіри?'
  - 'Система персонажів: Швайка (ідеальний воїн), Санько (майбутній характерник, інтелект), Грицик (звичайний хлопець, хоробрість).
    Як ця трійця репрезентує різні аспекти української душі?'
  - 'Наративна структура: подорож-квест як шлях до самопізнання. Плавні як український "ліс чудес" — місце ініціації.'
  - '[!decolonization] Рутківський забирає козацтво з "общерусского" поля і повертає його в суто український контекст. Козак
    — це не розбійник, а прикордонник, захисник, носій традиції.'
  section: 'Читання: "Джури козака Швайки"'
  words: 1800
- points:
  - 'Ініціація героїв: від звичайних хлопців до джур. Які випробування вони проходять і що символізує кожен етап?'
  - 'Козацька педагогіка: чого Швайка вчить хлопців? Не лише воювати, а й думати, аналізувати, розуміти природу, цінувати
    побратимство.'
  - 'Мова як елемент ідентичності: аналіз мови персонажів, використання діалектизмів, історизмів. Як мова конструює світ твору?'
  - '[!anti-hagiography] Чи є в "Джурах" місце для слабкості або зради? Як Рутківський показує "поганих" українців (зрадник
    Тишкевич) і що це говорить про його розуміння нації?'
  section: 'Ідентичність та дорослішання: Як стати українцем?'
  words: 1200
- points:
  - 'Повернення до розминки: Як роман без "поганих росіян" став антиколоніальним? Відповідь — через створення позитивної,
    самодостатньої української ідентичності, яка не потребує "Іншого" для самовизначення.'
  - 'Рецепція твору: Чому "Джури" "вистрілили" саме в 2000-х? Суспільний запит на нових героїв і нову, нерадянську, версію
    історії.'
  - 'Сучасне значення: Чи можуть "Джури" бути відповіддю на питання "яких героїв потребує сучасна Україна"? Рефлексія для
    студента: порівняйте героїв Рутківського з реальними героями сучасної війни.'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Volodymyr Rutkivsky's "Dzhury" trilogy as a phenomenon of modern Ukrainian youth literature, its role in
  decolonizing historical consciousness, and shaping identity.
level: LIT-YOUTH
module: lit-youth-012
objectives:
- Аналізувати трилогію "Джури" як феномен сучасної підліткової літератури та інструмент деколонізації.
- Досліджувати, як текст конструює українську ідентичність через пригоди та дорослішання героїв.
- Критично оцінювати співвідношення історичної правди та художнього вимислу в романі.
- Формулювати власну позицію в літературних дебатах щодо інтерпретації твору.
