content_outline:
- points:
  - 'Провокація: Історичний роман для підлітків без кривавих битв? Володимир Рутківський пропонує подивитись на козацтво очима
    дітей. Це казка чи новий канон історичної прози?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Джури» — це історичний роман чи фентезі з елементами історії? Дискусія про співвідношення факту та художньої
    вигадки у творі.'
  - 'Дебат 2: Чи може дитяча книга «переписати» національний міф про козацтво? Роль «Джур» у формуванні образу козака для
    нового покоління, вільного від імперської ідеології.'
  - '[!epistemic-humility] Літературні критики сперечаються: одні бачать у творі дидактичну казку, інші — серйозну спробу
    деконструкції героїчного міфу.'
  section: 'Конфліктна карта: Історія vs. Вигадка'
  words: 900
- points:
  - 'Аналіз сюжету: як побудована трилогія? Пригоди, випробування та дорослішання головних героїв (Санько, Грицик, Демко).'
  - 'Стиль Рутківського: поєднання гумору, пригодницького жанру, елементів фентезі та глибокого психологізму.'
  - '[!decolonization] Як Рутківський створює український погляд на історію, очищений від імперських наративів. Козаки — не
    розбійники, а захисники і носії культури.'
  - '[!myth-buster] Образ козака-характерника: Рутківський раціоналізує містику, пояснюючи «магію» знаннями природи та психології.'
  section: 'Читання: Трилогія «Джури»'
  words: 1800
- points:
  - 'Дорослішання як ініціація: шлях від звичайного хлопця до джури — це метафора становлення особистості та, в ширшому сенсі,
    нації.'
  - 'Формування ідентичності: мова, віра, побратимство та вірність землі як основи козацького світу в романі, що протиставляються
    «чужому» світу.'
  - 'Суб''єктність: герої Рутківського — активні творці своєї долі, а не пасивні жертви обставин.'
  - '[!anti-hagiography] Чи не ідеалізує Рутківський козацтво? Критичний погляд на те, які цінності транслює твір і чи є в
    ньому місце для «негероїчних» козаків.'
  section: 'Ідентичність та дорослішання: Шлях джури'
  words: 1300
- points:
  - 'Повернення до розминки: тож «Джури» — це казка чи новий історичний канон? Студент формулює власну аргументовану позицію.'
  - 'Рецепція твору: як читачі та критики сприйняли трилогію? Чому вона стала культовою для покоління, що виросло в незалежній
    Україні?'
  - 'Спадщина: вплив трилогії на подальший розвиток української підліткової літератури.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз трилогії Володимира Рутківського «Джури» як зразка сучасної підліткової історичної прози, її роль у формуванні
  національної ідентичності та деконструкції імперських міфів.
level: LIT-YOUTH
module: lit-youth-027
objectives:
- Аналізувати трилогію «Джури» в контексті сучасної української підліткової літератури та історичної прози.
- Досліджувати, як твір формує національну ідентичність через образ козака-джури та інтерпретацію історії.
- Критично оцінювати авторську інтерпретацію історичних подій та її відмінність від академічної історіографії.
- Визначати ключові риси авторського стилю та мови, що роблять твір привабливим для сучасної аудиторії.
