content_outline:
- points:
  - 'Провокація: Чи може книга для підлітків бути небезпечнішою за політичний маніфест? Розглядаємо цитату з Pavliuk Rytm,
    що викликала скандал.'
  - 'Загадка: Автор пише про підлітків, але його найбільші фанати — 30-річні. Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Творчість Pavliuk Rytm — це безпечна, схвалена державою патріотика для молоді, чи тонка критика суспільних норм,
    замаскована під простий сюжет?'
  - 'Дебат 2: Чи є мова автора автентичним голосом покоління, чи це лише вдала стилізація, сконструйована дорослим для комерційного
    успіху?'
  - '[!epistemic-humility] Літературні критики розділились: одні бачать у ньому нового класика, інші — тимчасове явище. Правильної
    відповіді не існує.'
  section: 'Конфліктна карта: Автор для системи чи проти неї?'
  words: 900
- points:
  - 'Аналіз ключової сцени: герой вперше усвідомлює себе частиною спільноти, що протистоїть зовнішній загрозі. Розбір діалогів
    та внутрішніх монологів.'
  - 'Структура оповіді: як автор використовує флешбеки для пояснення мотивації персонажів.'
  - 'Стиль та мова: вживання сленгу, неологізмів та алюзій на сучасну поп-культуру. Чи це збагачує текст, чи робить його одноразовим?'
  - '[!decolonization] Автор свідомо уникає будь-яких порівнянь з російською літературою, натомість будуючи мости до західних
    зразків coming-of-age романів.'
  section: 'Читання: Уривок з роману «Наші»'
  words: 1700
- points:
  - 'Концепція дорослішання у творах: це не просто фізіологічний процес, а свідомий вибір ідентичності — мовної, культурної,
    національної.'
  - 'Педагогічна функція: які цінності транслює автор? Чи завжди це цінності, які схвалює суспільство?'
  - '[!anti-hagiography] Критичний погляд на персонажів: вони не ідеальні герої, а звичайні підлітки зі своїми вадами, що
    робить їх більш реальними, але й більш суперечливими.'
  - '[!decolonization] Текст як інструмент руйнування імперських міфів про «братні народи» та «спільну історію», показаний
    через особистий досвід героя.'
  section: 'Ідентичність та дорослішання: Стати собою в тіні імперії'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому дорослі так захоплюються підлітковою літературою? Формулюємо відповідь на основі аналізу.'
  - 'Рецепція творчості: як сприймали автора 5 років тому і як зараз? Які події в країні вплинули на зміну оптики?'
  - 'Сучасне значення: що тексти Pavliuk Rytm говорять про виклики, що стоять перед сучасними українськими підлітками?'
  - '[!anti-hagiography] Розвінчання міфу про «простого автора для простих людей». Аналіз показує складну, багатошарову структуру
    його творів.'
  section: Дискусія та підсумок
  words: 800
focus: 'Аналіз творчості Pavliuk Rytm: конфлікт ідентичностей, деколоніальний погляд на дорослішання та роль молодіжної літератури
  у формуванні сучасного українського наративу.'
level: LIT-YOUTH
module: lit-youth-020
objectives:
- Критично аналізувати творчість Pavliuk Rytm у контексті сучасної української літератури та суспільних дебатів
- Застосовувати інструменти деколоніальної критики для аналізу молодіжної літератури
- Досліджувати, як у художньому тексті конструюється національна та особистісна ідентичність
- Формулювати власну аргументовану позицію щодо ролі та функцій літератури для молоді
