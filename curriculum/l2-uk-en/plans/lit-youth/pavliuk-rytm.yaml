activity_hints:
- description: Визначити, яка з наведених тез належить до одного, а яка до іншого табору критиків Pavliuk Rytm.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені терміни (суб'єктність, наратив, деколонізація, ідентичність) у речення з тексту модуля.
  focus: Ключова термінологія аналізу
  items: 4
  type: fill-in
- description: На основі прочитаного уривку, проаналізуйте, де, на вашу думку, проходить межа між вихованням патріотизму та
    пропагандою у молодіжній літературі. Аргументуйте свою позицію (300-400 слів).
  focus: 'Аналіз: Педагогічна функція vs. пропаганда'
  type: note
cefr_min: C1
connects_to:
