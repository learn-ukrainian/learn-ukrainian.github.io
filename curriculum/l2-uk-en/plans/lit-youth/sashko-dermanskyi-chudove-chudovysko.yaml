content_outline:
- points:
  - 'Провокація: Чи може дитяча казка бути зброєю у війні за ідентичність? Як веселі чудовиська та дракони Сашка Дерманського
    стали частиною культурного опору?'
  - 'Цитата-загадка: «А часом для перемоги достатньо, щоб хтось один, найменший і найнепомітніший, просто перестав боятися».
    Звідки це і як стосується теми?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література для розваги vs інструмент виховання. Чи є твори Дерманського лише веселою грою зі словом та абсурдом,
    чи це свідомий проєкт формування нового покоління українців?'
  - 'Дебат 2: Популярна література vs «високий» канон. Чи заслуговує фентезі Дерманського на місце в шкільній програмі поруч
    із класиками, чи це тимчасове захоплення масової культури?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у його творах лише розважальний продукт, інші — «м’яку силу»,
    що створює повноцінну українську альтернативу російськомовному контенту.'
  section: 'Конфліктна карта: Гра чи Ідеологія?'
  words: 900
- points:
  - 'Аналіз сюжету та структури «Чудового Чудовиська»: квест як подорож до самоприйняття.'
  - 'Поетика «Казок Дракона Омелька»: гумор, абсурд та інтертекстуальні зв''язки з українським фольклором.'
  - 'Мова та стиль: жива розмовна мова, авторські неологізми («букожер», «драколяція») та динамічний синтаксис як спосіб залучення
    юного читача.'
  - '[!decolonization] Створення повноцінного, самодостатнього українського фентезі-простору, що не потребує озирання на російські
    чи західні зразки.'
  section: 'Читання: Світи Чудовиськ та Драконів'
  words: 1800
- points:
  - 'Герої на роздоріжжі: персонажі Дерманського (Софійка, дракон Омка) шукають не лише пригоди, а й себе. Дорослішання як
    вибір цінностей.'
  - 'Мова як дім: природність української мови в діалогах та оповіді створює комфортне мовне середовище, що формує дитячу
    ідентичність.'
  - 'Педагогічна функція: які цінності транслює автор? Дружба, сміливість, креативність, повага до іншого (навіть якщо це
    чудовисько).'
  - '[!anti-hagiography] Чи не є створення «ідеального» українського дитячого світу формою пропаганди, що уникає складних
    тем (війна, бідність, соціальні проблеми)?'
  - '[!decolonization] Пряме протиставлення «свого» світу «чужому» — як Дерманський бореться зі стереотипом «меншовартості»
    української культури.'
  section: 'Ідентичність та дорослішання: Стати українцем у казковому світі'
  words: 1200
- points:
  - 'Повернення до розминки: тож як саме дитяча книжка може бути інструментом деколонізації?'
  - 'Рецепція та вплив: аналіз феномену популярності Дерманського — тиражі, фестивалі, фанатські спільноти.'
  - '[!anti-hagiography] Чи не загрожує масова популярність перетворенням автора на «бронзовий пам''ятник» дитячої літератури,
    позбавляючи його гостроти?'
  - 'Сучасне значення: Чому твори Дерманського, написані до повномасштабного вторгнення, стали ще більш актуальними сьогодні?'
  - 'Рефлексія: що нового ви дізналися про роль дитячої літератури в житті нації?'
  section: Дискусія та підсумок
  words: 700
focus: Sashko Dermanskyi's role in creating modern Ukrainian children's fantasy, analysis of his key works, and the decolonizing
  dimension of popular youth literature.
level: LIT-YOUTH
module: lit-youth-030
objectives:
- Критично аналізувати феномен Сашка Дерманського як одного з найпопулярніших сучасних дитячих авторів України.
- Досліджувати поетику, гумор та мовну гру у фентезійних творах письменника.
- Пояснювати, як сучасна дитяча література може виконувати деколонізаційну функцію та формувати національну ідентичність.
- Формулювати власну позицію в літературних дебатах щодо ролі популярної культури в національному каноні.
