content_outline:
- points:
  - 'Провокативне питання: Хто важливіший для сучасної України — поет Малкович чи видавець Малкович?'
  - Цитата з його програмного вірша або інтерв'ю про створення «А-БА-БА-ГА-ЛА-МА-ГА»
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чий внесок є визначальним? Малкович-поет з його метафоричною мовою чи Малкович-видавець як культурний інституціотворець?'
  - 'Дебат 2: Канонотворець чи комерсант? «А-БА-БА-ГА-ЛА-МА-ГА» — це проект національного виховання чи успішний бізнес, що
    знайшов свою нішу?'
  - '[!epistemic-humility] Оцінка його діяльності коливається від "просвітителя нації" до "монополіста дитячого книжкового
    ринку". Де правда?'
  section: 'Конфліктна карта: Поет vs. Видавець'
  words: 900
- points:
  - 'Аналіз ключових поезій Малковича: «Свічечка букви», «Ангел-хоронитель» — як текст працює з образом, звуком, метафорою.'
  - 'Аналіз ключових видавничих проектів: перші видання «Снігової Королеви», «Гаррі Поттера» — як дизайн, ілюстрації та переклад
    створюють єдиний наратив.'
  - 'Стилістика та мова: порівняння мови поезії та мови видавничих анотацій — де говорить поет, а де маркетолог?'
  - '[!decolonization] «А-БА-БА-ГА-ЛА-МА-ГА» як свідомий розрив із радянською традицією дитячої книги. Створення нового візуального
    та текстового канону.'
  section: 'Читання: Поезія і книжковий дизайн'
  words: 1800
- points:
  - Як видавництво формує ідентичність молодого українця? Аналіз наративів, які просуваються через вибір творів та їх оформлення.
  - 'Педагогічна функція: чи є книги «А-БА-БА-ГА-ЛА-МА-ГА» інструментом пропаганди певних цінностей? Яких саме?'
  - '[!anti-hagiography] Критичний погляд на видавничу політику: чи завжди якість перемагає комерційні інтереси? Аналіз критики
    на адресу видавництва.'
  - '[!decolonization] Руйнування міфу про "меншовартість" української книги. Як Малкович довів, що українське може бути модним,
    якісним і комерційно успішним.'
  section: 'Ідентичність та дорослішання: Виховання смаку і нації'
  words: 1200
- points:
  - 'Повернення до початкового питання: то хто ж важливіший? Студент має сформулювати власну позицію, спираючись на матеріал
    модуля.'
  - 'Рецепція та спадщина: як змінилося сприйняття Малковича та його видавництва за 30 років?'
  - 'Сучасне значення: Яке місце «А-БА-БА-ГА-ЛА-МА-ГА» посідає в культурному ландшафті України сьогодні, в епоху діджиталізації
    та війни?'
  - '[!anti-hagiography] Чи не став сам Малкович "бронзовим" класиком, проти чого він боровся на початку кар''єри?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість Івана Малковича як поета та засновника видавництва «А-БА-БА-ГА-ЛА-МА-ГА» — аналіз його ролі у формуванні
  сучасної української дитячої літератури та пост-радянської ідентичності.
level: LIT-YOUTH
module: lit-youth-013
objectives:
- Аналізувати подвійну роль Івана Малковича як поета та видавця в сучасному українському культурному процесі.
- Критично оцінювати внесок видавництва «А-БА-БА-ГА-ЛА-МА-ГА» у формування модерного українського культурного канону та дитячої
  ідентичності.
- Розрізняти та аналізувати літературні та комерційні стратегії у діяльності митця.
- Формулювати власну аргументовану позицію щодо спадщини Малковича, використовуючи понятійний апарат літературної критики.
