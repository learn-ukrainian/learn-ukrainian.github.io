activity_hints:
- description: 'Перевірка розуміння дебатів навколо постаті Малковича. Кому належить теза: критику-літературознавцю чи критику-маркетологу?'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи терміни: суб''єктність, канон, рецепція, деколонізація.'
  focus: Ключові терміни модуля
  items: 4
  type: fill-in
- description: Порівняйте вірш Івана Малковича та дизайн обкладинки однієї з книг «А-БА-БА-ГА-ЛА-МА-ГА». Які спільні естетичні
    принципи ви можете виділити? Де вони розходяться?
  focus: 'Порівняльний аналіз: Поезія vs. Книга'
  type: note
- description: 'Напишіть есе на тему: "Внесок Івана Малковича у формування пост-радянської української ідентичності". Обґрунтуйте,
    чий вплив ви вважаєте сильнішим — поета чи видавця (400-600 слів).'
  focus: 'Есе: Спадщина Івана Малковича'
  type: note
