content_outline:
- points:
  - 'Провокація: Чи може казка про тварин бути інструментом "м''якої сили" для виховання "правильної" радянської дитини? Крапля
    дьогтю в улюбленій книжці дитинства.'
  - 'Цитата-загадка: "Головне — зберегти в собі людину". Хто з персонажів "Лісової школи" міг би це сказати і в якій ситуації?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Лісова школа" — це геніальний педагогічний інструмент для виховання дружби та взаємодопомоги, чи це прихована
    пропаганда колективізму та безконфліктності?'
  - 'Дебат 2: Місце Нестайка в каноні. Чи є він суто українським автором, чи це феномен "всесоюзної" дитячої літератури, що
    успішно маскувався під український продукт?'
  - '[!epistemic-humility] Критики-сучасники бачили у Нестайкові лише "веселого казкаря". Постколоніальна оптика бачить у
    тексті складну гру з ідеологічними обмеженнями.'
  section: 'Конфліктна карта: Педагогіка vs. Ідеологія'
  words: 900
- points:
  - 'Аналіз ключових епізодів: урок мужності, порятунок від "поганця" Бурмили, створення "таємного товариства". Як будується
    сюжет?'
  - 'Система персонажів: їжачок Колько Колючка та зайчик Кося Вухань як архетипи "відмінника" та "двієчника". Чому ми їм співчуваємо?'
  - 'Мова Нестайка: гумор, іронія, авторські неологізми ("хитромудра сова", "леопардова жаба"). Як мова створює настрій?'
  - '[!decolonization] Навіть у рамках радянської цензури Нестайко створює унікальний український фантастичний світ, що мінімально
    перетинається з російськими наративами. Це втеча чи тихий спротив?'
  section: 'Читання: Світ "Лісової школи"'
  words: 1800
- points:
  - Що означає "вирости" у світі Нестайка? Перехід від індивідуалізму ("я") до колективної відповідальності ("ми").
  - 'Ціннісна матриця: дружба, чесність, сміливість, взаємодопомога. Як ці цінності прищеплюються через пригоди персонажів?'
  - '[!anti-hagiography] "Лісова школа" ідеалізує інститут школи та вчителя (ведмідь, сова). Чи не є це інструментом для виховання
    слухняності та поваги до авторитету за замовчуванням?'
  - '[!decolonization] Формування української ідентичності через мову та культурні коди, зашиті в імена та поведінку персонажів,
    навіть за відсутності прямої національної риторики.'
  section: 'Ідентичність та дорослішання: Уроки лісової школи'
  words: 1200
- points:
  - 'Повернення до розминки: тож "Лісова школа" — це інструмент ідеології чи простір свободи? Формулювання власної позиції.'
  - 'Рецепція твору: чому книга, написана в 1960-х, залишається популярною серед сучасних українських дітей, які живуть у
    зовсім іншому світі?'
  - 'Спадщина Нестайка: чи можна вважати його предтечею сучасної української підліткової літератури? Порівняння з сучасними
    авторами.'
  - 'Рефлексія: чи змінилося ваше ставлення до "Лісової школи" після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз повісті-казки В. Нестайка, концепція дорослішання в радянській дитячій літературі, педагогічна функція та роль
  у формуванні ідентичності
