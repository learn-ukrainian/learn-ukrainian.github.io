activity_hints:
- description: Наведено тези літературних критиків. Визначте, яка теза належить до «естетичного», а яка до «соціологічного»
    підходу до аналізу літератури.
  focus: 'Конфліктна карта: Мистецтво vs. Пропаганда'
  items: 6
  type: quiz
- description: Вставте пропущені терміни (суб'єктність, канон, рецепція, наратив) у речення з модуля.
  focus: Термінологія літературного аналізу
  items: 8
  type: fill-in
- description: Оберіть одного з головних героїв. Проаналізуйте його вчинки з точки зору [!anti-hagiography]. Які його риси
    ідеалізовані, а які, можливо, є проблематичними з сучасної точки зору? Напишіть коротке есе (300-400 слів).
  focus: 'Аналіз цінностей: Деконструкція героя'
  type: note
- description: Як ви вважаєте, чи змінилося б сприйняття цього твору, якби він був написаний сьогодні? Які теми стали б більш
    гострими, а які — менш актуальними? Аргументуйте свою думку (400-600 слів).
  focus: 'Есе: Сучасна рецепція'
  type: note
cefr_min: C1
connects_to:
- some-other-youth-lit-module
- decolonization-theory-module
content_outline:
- points:
  - 'Провокація: Чи є література для підлітків просто розвагою, чи це — інструмент для виховання майбутнього покоління нації?
    Розглядаємо на прикладі творів, які читали всі.'
  - 'Цитата без контексту: «Коли світ руйнується, найважливіше знати, на чиєму ти боці». З якого твору це, і чому цей вибір
    стає центральним для героя-підлітка?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є Близнець-Земляник насамперед дидактичним автором, що свідомо «програмує» цінності, чи його тексти — це
    в першу чергу мистецтво, де ідеї виникають органічно?'
  - 'Дебат 2: Місце в каноні. Чи завжди ці твори вважалися «високою» літературою, чи їх довго ігнорували як «дитячі»? Хто
    і чому ввів їх до шкільної програми?'
  - '[!epistemic-humility] Критики-естети бачать у текстах універсальні теми дорослішання, тоді як соціологи літератури —
    інструмент національного будівництва.'
  section: 'Конфліктна карта: Мистецтво чи пропаганда?'
  words: 900
- points:
  - 'Аналіз ключової сцени: герой вперше усвідомлює себе частиною більшої спільноти, що має спільну історію та ворогів.'
  - 'Стиль автора: поєднання реалізму з елементами фентезі як спосіб говорити про складні теми (окупація, колабораціонізм,
    історична пам''ять) мовою, зрозумілою підліткам.'
  - '[!decolonization] Як автор використовує мову для протиставлення «свого» і «чужого» світу, руйнуючи імперський наратив
    про «спільну історію».'
  - 'Система персонажів: як через взаємодію з друзями, ворогами та наставниками формується характер і світогляд головного
    героя.'
  section: 'Читання: Уривок з «Той, що проходить крізь стіни»'
  words: 1800
- points:
  - 'Дорослішання героя як алегорія пробудження нації: від індивідуального бунту до усвідомленого служіння спільноті.'
  - 'Аналіз цінностей: Які моделі поведінки текст пропонує як бажані? (Жертовність, відповідальність, вірність, критичне мислення).'
  - '[!anti-hagiography] Чи є в текстах ідеалізація боротьби? Аналізуємо сцени, де показана ціна вибору та «темний бік» патріотизму.'
  - '[!decolonization] Текст як відповідь на імперські міфи: як автор переосмислює історію та повертає українцям суб''єктність.'
  section: 'Ідентичність та дорослішання: Метафора національного становлення'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, твори Близнець-Земляника — це мистецтво чи інструмент? Формулювання власної позиції на
    основі аналізу.'
  - 'Історія рецепції: Як сприймали ці твори в момент написання і як їх читають зараз, в умовах повномасштабної війни?'
  - '[!anti-hagiography] Чи не застаріли певні ідеї? Критична дискусія про актуальність та можливі «сліпі плями» автора.'
  - 'Рефлексія: Що нового ви дізналися про себе та про Україну, перечитавши знайомий з дитинства текст через дорослу аналітичну
    оптику?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз творчості Близнець-Земляника як інструменту передачі цінностей, формування національної ідентичності та деколонізації
  свідомості через юнацьку літературу.
level: LIT-YOUTH
module: lit-youth-009
objectives:
- Аналізувати твори юнацької літератури як інструмент формування національної ідентичності та передачі цінностей
- Застосовувати методи критичного аналізу, зокрема [!anti-hagiography] та [!decolonization], до текстів шкільної програми
- Розрізняти та аргументувати різні позиції в літературно-критичних дебатах (напр., мистецтво vs. дидактика)
- Формулювати власну аргументовану позицію щодо ролі та рецепції літературного твору в минулому та сьогоденні
pedagogy: CBI
persona:
  role: Аналітик, що розглядає юнацьку літературу не як розвагу, а як потужний інструмент формування суспільства та передачі
    культурного коду.
  voice: Literary-Sociologist
phase: LIT-YOUTH.1
