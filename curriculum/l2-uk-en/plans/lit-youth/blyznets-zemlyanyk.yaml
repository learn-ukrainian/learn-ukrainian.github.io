vocabulary_hints:
- definition: здатність особи або спільноти бути активним творцем власної долі, а не пасивним об'єктом зовнішніх впливів
  pos: ж.
  word: суб'єктність
- definition: спосіб розповіді, конструювання подій у певну сюжетну лінію, що формує їхнє сприйняття
  pos: ч.
  word: наратив
- definition: процес звільнення від імперського впливу в політичній, культурній та інтелектуальній сферах
  pos: ж.
  word: деколонізація
- definition: сукупність творів, визнаних взірцевими та обов'язковими для вивчення в певній культурі чи спільноті
  pos: ч.
  word: канон
- definition: усвідомлення особою своєї унікальності та водночас належності до певної соціальної групи (мовної, національної,
    культурної)
  pos: ж.
  word: ідентичність
- definition: процес фізичного, психологічного та соціального становлення особистості, перехід від дитинства до зрілості
  pos: с.
  word: дорослішання
- definition: повчальний, той, що має на меті насамперед навчити, а не розважити чи викликати емоції
  pos: прикм.
  word: дидактичний
- definition: сприйняття та інтерпретація твору читачами в різні історичні епохи
  pos: ж.
  word: рецепція
