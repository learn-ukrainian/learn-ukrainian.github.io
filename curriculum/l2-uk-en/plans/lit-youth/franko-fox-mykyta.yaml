objectives:
- Аналізувати алегоричну поему-казку «Лис Микита» Івана Франка як політичну сатиру на галицьке суспільство кінця XIX століття
- Критично оцінювати роль архетипу трикстера у формуванні національної ідентичності та моделей поведінки
- Формулювати та захищати власну інтерпретацію багатошарового художнього твору, беручи участь у літературно-критичній дискусії
