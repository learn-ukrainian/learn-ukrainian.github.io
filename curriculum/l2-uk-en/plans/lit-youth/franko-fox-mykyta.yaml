content_outline:
- points:
  - 'Провокація: Хто такий Лис Микита — хитрий пройдисвіт, аморальний шахрай чи вчитель з виживання в корумпованому світі?'
  - 'Цитата без контексту: «Що цар, що царська кров, / Яка в них до заслуги є любов?» — як ви розумієте ці рядки?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Лис Микита» — це дитяча казка про тварин чи гостра політична сатира на галицьке суспільство часів Франка? Позиція
    «за» і «проти».'
  - 'Дебат 2: Чому радянська влада активно просувала цей твір? Як «безпечна» казка маскувала гостру критику будь-якої влади
    та імперії?'
  - '[!epistemic-humility] Немає єдиної «правильної» інтерпретації. Франко свідомо створив багатошаровий твір, який кожен
    читає по-своєму.'
  section: 'Конфліктна карта: Казка чи політичний памфлет?'
  words: 900
- points:
  - 'Сцена суду: як Микита використовує риторику, лестощі та обман, щоб маніпулювати царем Левом та іншими звірами. Аналіз
    мовних засобів.'
  - 'Архетип трикстера: Микита як втілення фігури шахрая, що руйнує сталий порядок, але водночас виявляє його лицемірство.'
  - 'Стиль Франка: поєднання простонародної мови, високої поезії, політичних алюзій та філософських роздумів.'
  - '[!decolonization] Твір утверджує українську суб’єктність, створюючи самодостатній алегоричний світ, що функціонує за
    власними законами, незалежними від імперських наративів (польського чи австрійського).'
  section: 'Читання: Аналіз ключових епізодів'
  words: 1800
- points:
  - «Дорослішання» в світі «Лиса Микити» — це не моральний розвиток, а опанування мистецтва виживання за будь-яку ціну. Чи
    це цинічний урок?
  - 'Педагогічна функція: які цінності насправді транслює текст? Скептицизм до влади, інтелектуальну перевагу над грубою силою,
    гнучкість.'
  - '[!anti-hagiography] Микита — не позитивний герой. Він — вбивця, брехун і маніпулятор. Чи може такий персонаж бути рольовою
    моделлю? Чому він викликає симпатію?'
  - Прихована пропаганда? Чи вчить казка, що чесність і праця — для дурнів, а успіху досягають лише хитрістю та обманом?
  section: 'Ідентичність та дорослішання: Трикстер як модель виживання'
  words: 1200
- points:
  - 'Повернення до розминки: тож хто такий Лис Микита? Студенти формулюють власну оцінку, спираючись на аналіз.'
  - 'Рецепція твору: як змінювалося сприйняття «Лиса Микити» від часів Франка, через радянський період, до сьогодення?'
  - 'Сучасна релевантність: чи можна знайти сучасних «Лисів Микит» в українській політиці, бізнесі чи медіа?'
  - 'Рефлексія: чи змінилося ваше ставлення до цього твору (і його героя) після детального аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Ivan Franko's "Fox Mykyta", analysis of genre (political satire vs. children's fairy tale), trickster archetype, and
  its role in shaping Ukrainian identity through allegory.
