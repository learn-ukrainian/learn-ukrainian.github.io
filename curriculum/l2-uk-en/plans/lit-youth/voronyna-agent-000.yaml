    для боротьби з імперськими міфами про українську культуру.
  focus: 'Аналіз: Деколонізаційна стратегія'
  type: note
- description: Порівняйте образ Клима Джури з образом типового радянського «піонера-героя». Які риси відрізняють їх? Що це
    говорить про зміну ціннісних орієнтирів у дитячій літературі?
  focus: 'Порівняльний аналіз: Клим Джура vs персонажі радянських дитячих книжок'
  type: note
