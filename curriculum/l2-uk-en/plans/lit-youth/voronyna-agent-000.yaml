content_outline:
- points:
  - 'Провокація: «Таємне Товариство Боягузів» — це просто дитячий детектив, чи інструкція з культурного самозахисту для нового
    покоління українців?'
  - 'Цитата-загадка: «...головним їхнім ворогом були синьоморди-завойовники, що вилуплювалися з гігантських синіх яєць...»
    — Проти кого насправді борються герої Ворониної?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це пародія на шпигунські романи для розваги, чи серйозний постмодерністський твір, що використовує іронію для
    роботи з національними травмами?'
  - 'Дебат 2: Педагогічна функція. Це «ескапістська» література, що відволікає від реальності, чи інструмент для виховання
    нової, модерної ідентичності, вільної від шароварщини?'
  - '[!epistemic-humility] Критики досі сперечаються: чи є Клим Джура (головний герой) просто хлопчиком, що долає страх, чи
    алегорією України, що вчиться бути суб''єктом історії.'
  section: 'Конфліктна карта: Пародія чи постмодернізм?'
  words: 900
- points:
  - 'Аналіз ключової сцени: перша зустріч Клима з синьомордами. Як мова та стиль Ворониної перетворюють жахливе на смішне?'
  - 'Система персонажів: Клим, Жук, Заєць — як «команда боягузів» стає ефективнішою за традиційних героїв-одинаків?'
  - 'Наративна стратегія: використання елементів детективу, фентезі та наукової фантастики для створення унікального світу.'
  - '[!decolonization] Воронина свідомо уникає фольклорно-етнографічного образу українця. Її герої — сучасні міські діти.
    Це відповідь на імперський міф про «сільську» природу української культури.'
  section: 'Читання: Уривки з «Таємного Товариства Боягузів»'
  words: 1700
- points:
  - 'Подолання страху як метафора дорослішання: індивідуальний шлях Клима Джури від боягуза до героя як модель для колективної
    ідентичності.'
  - 'Мова як зброя: аналіз неологізмів, каламбурів та мовної гри у творах. Як гумор стає інструментом деколонізації свідомості?'
  - 'Ціннісна система: які цінності транслює «Таємне Товариство»? Дружба, взаємодопомога, креативність — на противагу грубій
    силі загарбників.'
  - '[!anti-hagiography] Чи не є такий оптимістичний погляд на подолання труднощів інфантилізацією національної боротьби?
    Критична оцінка «хепі-енду» у творах Ворониної.'
  section: 'Ідентичність та дорослішання: Таємне Товариство як модель нації'
  words: 1200
- points:
  - 'Повернення до розминки: тож, чи є твори Ворониної інструкцією з самозахисту? Студенти формулюють аргументовану відповідь.'
  - 'Рецепція та вплив: як сприйняли ці твори в 2000-х, і як вони читаються після 2014 та 2022 років? Чи змінився їхній сенс?'
  - 'Сучасне значення: Чому прибульці-синьоморди, що хочуть заразити всіх вірусом страху, виявилися напрочуд точним пророцтвом?'
  - 'Рефлексія: що нового про українську ідентичність ви дізналися з творів, написаних для дітей?'
  section: Дискусія та підсумок
  words: 800
focus: Analysis of Lesia Voronyna's "Agent 000" series as a model for modern Ukrainian identity formation through humor, genre
  parody, and decolonial narrative strategies.
level: LIT-YOUTH
module: lit-youth-028
objectives:
- Аналізувати твори Лесі Ворониної в контексті сучасної української підліткової літератури
- Досліджувати, як гумор та іронія використовуються для формування сучасної української ідентичності, вільної від постколоніальних
  комплексів
- Пояснювати роль жанрової літератури (детектив, пригоди) у деконструкції імперських наративів та формуванні суб'єктності
