content_outline:
- points:
  - 'Провокація: Дитячий вірш — це невинна забава чи інструмент ідеологічної боротьби? Розглянемо один чотиривірш, який спричинив
    скандал.'
  - 'Запитання без контексту: Коли дитина перестає бути дитиною в українській літературі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Дидактизм vs. мистецтво. Чи є головна мета дитячої поезії — виховувати та навчати, чи вона має право на чисту
    естетику без моралі?'
  - 'Дебат 2: Формування канону. Хто вирішує, які вірші потраплять до антології — видавці, батьки, держава? Як цей вибір відображає
    ідеологію суспільства?'
  - '[!epistemic-humility] Немає "правильної" дитячої поезії. Кожна епоха та ідеологія створює свій образ "ідеального" тексту
    для дитини.'
  section: 'Конфліктна карта: Поезія для дітей чи про дітей?'
  words: 900
- points:
  - 'Близьке читання 1-2 знакових віршів: аналіз стилістики, образної системи, ритмомелодики.'
  - 'Наративна голос: Хто говорить у вірші? Це дорослий, що імітує дитину, чи автентичний дитячий голос?'
  - 'Мова та лексика: Як автори використовують мову для створення дитячого світу? Аналіз неологізмів, звуконаслідування, зменшувальних
    форм.'
  - '[!decolonization] Як сучасна українська дитяча поезія свідомо чи несвідомо витісняє радянські та російські культурні
    коди (заміна героїв, мотивів, свят).'
  section: 'Читання: Аналіз ключових віршів з антології'
  words: 1700
- points:
  - 'Дзеркало ідентичності: Як вірші допомагають дитині формувати уявлення про себе, свою сім''ю, свою країну.'
  - 'Мова як дім: Роль поезії у засвоєнні мови не як набору правил, а як живого, емоційного простору.'
  - 'Прихована програма: Які цінності (патріотизм, індивідуалізм, повага до природи) закладаються у свідомість дитини через
    поетичні образи.'
  - '[!anti-hagiography] Чи не створює патріотична дитяча поезія ідеалізований, безконфліктний образ України, готуючи дитину
    до розчарування в майбутньому?'
  section: 'Ідентичність та дорослішання: Конструювання маленького українця'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, дитячий вірш — це зброя? Формулювання студентом власної позиції з аргументами з модуля.'
  - 'Рецепція та критика: Як ці антології сприймаються критиками, батьками та самими дітьми? Аналіз відгуків та рецензій.'
  - 'Сучасне значення: Яку роль відіграє дитяча поезія в умовах війни та глобалізації? Чи може вона конкурувати з TikTok та
    YouTube?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз сучасних антологій української дитячої поезії, їх роль у формуванні ідентичності, дидактичні функції та деколоніальний
  потенціал.
level: LIT-YOUTH
module: lit-youth-023
objectives:
- Аналізувати ключові твори з сучасних антологій дитячої поезії, застосовуючи інструментарій літературного аналізу
- Досліджувати роль дитячої поезії у формуванні національної та культурної ідентичності в дитини
- Критично оцінювати ідеологічні та дидактичні функції дитячої літератури, розрізняючи мистецьку вартість та виховні завдання
- Застосовувати деколоніальну оптику до аналізу текстів для дітей, виявляючи процеси заміщення культурних кодів
