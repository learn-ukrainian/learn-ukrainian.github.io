content_outline:
- points:
  - 'Провокація: Чому книга про будівництво метро в селі та кориду з коровою стала головним українським дитячим романом 20-го
    століття?'
  - 'Цитата без контексту: «Ми стояли біля колодязя, і в мене була зламана нога, а в Яви — розбите серце». Про що насправді
    цей твір?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Тореадори» — це лише безтурботна пригодницька повість для розваги, чи це замаскована педагогічна поема про
    формування «правильної» радянської/української дитини?'
  - 'Дебат 2: Канонізація Нестайка. Чому саме цей текст став абсолютним каноном, затьмаривши інші твори для дітей? Роль шкільної
    програми та літературної критики.'
  - '[!epistemic-humility] Інтерпретації читачів: для одних — ностальгія за ідеальним дитинством, для інших — світ, що вже
    не існує. Чия правда?'
  section: 'Конфліктна карта: Розвага чи виховання?'
  words: 900
- points:
  - 'Уривок з тексту: знаменитий епізод, де Ява та Павлуша заблукали в кукурудзі — аналіз стилю та гумору.'
  - 'Наративна техніка: як Нестайко створює ефект «усної розповіді»? Аналіз синтаксису, діалогів та авторської іронії.'
  - 'Система персонажів: Ява як «генератор ідей» та Павлуша як «голос розуму». Як їхній дует рухає сюжет?'
  - '[!decolonization] На відміну від типових радянських дитячих книг, де герої борються з «ворогами» чи виконують план, герої
    Нестайка досліджують світ і самих себе. Це створює простір для української суб''єктності.'
  section: 'Читання: Пригоди в кукурудзі'
  words: 1800
- points:
  - 'Формування особистості: як через гру та «авантюри» герої засвоюють поняття дружби, честі, відповідальності та справедливості?'
  - 'Сільський vs. міський світ: Васюківка як ідеалізований український мікрокосм, де збереглися автентичні цінності.'
  - '[!decolonization] Мова як маркер ідентичності. Суржик, діалектизми, дитячий сленг — Нестайко легітимізує живу народну
    мову, протиставляючи її уніфікованій літературній нормі.'
  - '[!anti-hagiography] Чи не є світ «Тореадорів» надто ідеалізованим? Критичний погляд на відсутність гострих соціальних
    проблем та конфліктів у тексті.'
  section: 'Ідентичність та дорослішання: Світ Яви та Павлуші'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому «Тореадори» — це велика література, а не просто смішні історії? Аргументація на основі
    аналізу.'
  - 'Рецепція твору: як змінювалося сприйняття книги від 1960-х до сьогодні? Від радянського дитліту до національного символу.'
  - 'Сучасне значення: Чи можуть «Тореадори» навчити чогось сучасних дітей, які живуть у світі TikTok та відеоігор? Які цінності
    твору є універсальними?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Vsevolod Nestayko's classic trilogy, focusing on themes of adventure, friendship, identity formation, and
  the novel's role as a cultural touchstone for generations of Ukrainians.
level: LIT-YOUTH
module: lit-youth-004
objectives:
- Аналізувати твір «Тореадори з Васюківки» як феномен української дитячої літератури, визначаючи його жанрові особливості
  та стилістику автора.
- Досліджувати, як текст Нестайка конструює ідеали дружби, чесності та української ідентичності через пригоди головних героїв.
- Критично оцінювати педагогічні та ідеологічні меседжі, закладені у дитячій літературі, на прикладі аналізованого твору.
