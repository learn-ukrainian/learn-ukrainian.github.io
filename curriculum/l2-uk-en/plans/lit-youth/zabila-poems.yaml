content_outline:
- points:
  - 'Провокація: Простий дитячий віршик Наталі Забіли про природу поруч із віршем про Леніна. Чи може один автор писати щиро
    про берізку і так само щиро — про "вождя"? Де межа?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Забіла — талановита поетеса, що відчувала мову і психологію дитини, чи функціонерка, що виконувала партійне
    "соціальне замовлення" (соцзамовлення)?'
  - 'Дебат 2: Чи є місце творам Забіли в сучасному українському каноні дитячої літератури? Якщо так, то як їх читати — як
    взірці чи як історичні артефакти тоталітарної доби?'
  - '[!epistemic-humility] Оцінки творчості Забіли коливаються від "класик дитячої літератури" до "колаборантка на ідеологічному
    фронті". Істина, як завжди, у нюансах.'
  section: 'Конфліктна карта: Мистецтво чи пропаганда?'
  words: 900
- points:
  - 'Аналіз мови: простота, мелодійність, звукопис, повтори. Як поетеса досягає ефекту "дитячої мови"?'
  - 'Тематичний аналіз: природа, гра, сім''я. Який світ бачить дитина в поезії Забіли?'
  - 'Прихована ідеологія: навіть у "нейтральних" віршах — відсутність релігійних символів (Різдво vs Новий рік), національних
    традицій (замість святого Миколая — Дід Мороз).'
  - '[!decolonization] Творчість Забіли — приклад того, як українська мова використовувалася для конструювання "радянської"
    ідентичності, а не для збереження питомо української. Мова є, нації — немає.'
  section: 'Читання: Вірші з "Ясоччиного садка"'
  words: 1700
- points:
  - 'Які цінності пропагуються: колективізм ("разом веселіше"), слухняність, любов до праці (на благо держави), повага до
    "старших" (партійних символів).'
  - 'Конструювання "правильного" дитинства: відсутність індивідуального бунту, сумнівів. Дитина як майбутній гвинтик системи.'
  - '[!anti-hagiography] Замість того, щоб вчити критичного мислення, поезія Забіли часто пропонує готові відповіді та незаперечні
    авторитети. Це педагогіка підкорення, а не розвитку.'
  - Порівняння з творами інших дитячих письменників того часу (Корній Чуковський, Агнія Барто) — чи був це унікальний український
    радянський феномен?
  section: 'Ідентичність та дорослішання: Модель "радянської дитини"'
  words: 1200
- points:
  - 'Повернення до розминки: Чи може автор бути одночасно і пропагандистом, і щирим ліриком? Студент формулює власну позицію.'
  - 'Рецепція творчості: як Забілу читали в 1950-х, 1980-х і як її сприймають сьогодні? Чому оцінки так змінилися?'
  - 'Сучасний контекст: як відрізнити патріотичне виховання від пропаганди в сучасній українській дитячій літературі?'
  - '[!anti-hagiography] Спадщина Забіли — це не лише її тексти, а й дискусія навколо них, що змушує нас говорити про роль
    митця в тоталітарному суспільстві.'
  section: Дискусія та підсумок
  words: 800
focus: Критичний аналіз ідеологічного виховання та формування ідентичності в дитячій поезії Наталі Забіли, межа між мистецтвом
  та пропагандою.
