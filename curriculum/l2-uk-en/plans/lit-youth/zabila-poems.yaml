objectives:
- Критично аналізувати дитячу поезію як інструмент ідеологічного впливу.
- Розрізняти художні засоби та пропагандистські прийоми в літературному творі.
- Формулювати аргументовану позицію щодо місця "проблемних" авторів у сучасному культурному просторі.
- Простежити, як у дитячій літературі конструюється модель ідентичності та система цінностей.
