vocabulary_hints:
- definition: процес становлення особистості, перехід від дитинства до дорослого життя, часто через випробування та відповідальність
  pos: с.
  word: дорослішання
- definition: усвідомлення себе як унікальної особистості, а також своєї належності до певної соціальної, етнічної чи культурної
    групи
  pos: ж.
  word: ідентичність
- definition: спосіб оповіді; розповідь, що конструює певне бачення світу, подій та цінностей
  pos: ч.
  word: наратив
- definition: здатність бути активним діячем, творцем власної долі, а не пасивним об'єктом зовнішніх впливів
  pos: ж.
  word: суб'єктність
- definition: художній прийом, за яким абстрактне поняття передається через конкретний образ (напр., чудовисько як алегорія
    самотності)
  pos: ж.
  word: алегорія
- definition: процес позбавлення від колоніальних впливів у культурі, політиці та мисленні, утвердження власної суб'єктності
  pos: ж.
  word: деколонізація
- definition: сукупність творів, визнаних взірцевими та найважливішими для певної національної літератури чи періоду
  pos: ч.
  word: канон
word_target: 5000
