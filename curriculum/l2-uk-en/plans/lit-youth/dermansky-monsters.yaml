activity_hints:
- description: Наведіть аргументи на користь обох позицій у дебаті про функцію літератури Дерманського.
  focus: 'Конфліктна карта: Розвага чи виховання?'
  items: 4
  type: quiz
- description: Поясніть значення авторських слів з тексту (напр., "страхожер", "сміходень") у наданому контексті.
  focus: 'Мова Дерманського: Неологізми та гумор'
  items: 5
  type: fill-in
- description: 'Напишіть короткий аналітичний текст (300-400 слів), де обґрунтуйте або спростуйте тезу: "Історія Чу-Чу — це
    алегорія новітньої історії України".'
  focus: 'Аналіз: "Чудовисько" як національна алегорія'
  type: note
- description: Порівняйте образ Чу-Чу з образом Чебурашки. Що спільного та відмінного в цих персонажах? Як вони відображають
    цінності своїх епох та культур?
  focus: 'Порівняльний аналіз: Українські монстри vs радянські'
  type: note
cefr_min: C1
connects_to:
