content_outline:
- points:
  - 'Провокаційне питання: Чи може книга про фіолетове чудовисько навчити дитину бути українцем? І чи повинна?'
  - 'Цитата-загадка: "Щастя — це коли всі вдома". Чому ця проста фраза є ключем до розуміння всього твору?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Чудове Чудовисько" — це лише весела казка для розваги чи це замаскований інструмент патріотичного виховання
    нового покоління?'
  - 'Дебат 2: Чи є література Дерманського частиною нового канону української дитячої літератури, чи це тимчасовий тренд,
    що замінив радянські зразки?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у творі глибокі алегорії, інші — просто добру історію. "Правильної"
    відповіді немає.'
  section: 'Конфліктна карта: Розвага чи виховання?'
  words: 900
- points:
  - 'Аналіз наративної структури: як історія про пошук родини чудовиськом відображає історію України в пошуку власної ідентичності?'
  - 'Стилістика та мова: аналіз авторських неологізмів, гумору та мовної гри. Як це створює унікальний світ і водночас збагачує
    мову читача?'
  - '[!decolonization] Твір написано після 2014 року. Як він свідомо чи несвідомо протистоїть "русскому миру" у дитячій літературі,
    пропонуючи власних, українських, героїв та цінності?'
  section: 'Читання: Уривки з "Чудового Чудовиська"'
  words: 1800
- points:
  - 'Чу-Чу як "Інший": аналіз образу монстра як метафори інакшості. Як суспільство приймає чи відторгає його?'
  - 'Дорослішання через відповідальність: дівчинка Соня, яка бере на себе відповідальність за Чу-Чу, — це модель дорослішання
    для юного читача.'
  - '[!anti-hagiography] Чи не є образ Соні надто ідеалізованим? Розглядаємо, чи є у тексті елементи пропаганди "правильної"
    поведінки.'
  - '[!decolonization] Формування української ідентичності: як через прості побутові сцени (спільні сніданки, розмови) текст
    конструює модель сучасної української родини та її цінностей.'
  section: 'Ідентичність та дорослішання: Як стати собою?'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може книга про чудовисько виховувати патріотизм? Формулюємо відповідь на основі аналізу.'
  - 'Рецепція та критика: як твір був сприйнятий читачами та критиками? Чи були негативні відгуки і чому?'
  - 'Сучасне значення: Чому "Чудове Чудовисько" залишається актуальним у контексті повномасштабної війни? Що ця історія говорить
    нам про дім, родину та боротьбу за своє?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Sashko Dermansky's work, focusing on "Chu-Chu," postcolonial themes in youth literature, the pedagogical
  function of fantasy, and the construction of modern Ukrainian identity for young readers.
level: LIT-YOUTH
module: lit-youth-014
objectives:
- Аналізувати, як сучасна українська дитяча література (на прикладі творів Дерманського) формує національну ідентичність та
  цінності
- Розрізняти розважальну та педагогічну функції тексту, виявляючи приховані ідеологічні меседжі
- Застосовувати інструменти постколоніального аналізу до текстів, написаних для молодої аудиторії
- Формулювати власну позицію в літературно-критичній дискусії щодо канону сучасної дитячої літератури
pedagogy: CBI
