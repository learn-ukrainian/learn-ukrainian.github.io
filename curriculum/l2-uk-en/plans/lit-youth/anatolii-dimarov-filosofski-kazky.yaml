content_outline:
- points:
  - 'Провокація: Чи може дитяча казка бути небезпечнішою для тоталітарного режиму, ніж політичний трактат? Анатолій Дімаров
    довів, що так.'
  - 'Запитання без контексту: «Для чого людині серце?» — як відповідь на це просте питання стала формою тихого опору системі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є твори Дімарова частиною європейської традиції філософської казки (Екзюпері, Андерсен), чи це унікальний
    український феномен, народжений тиском радянської цензури?'
  - 'Дебат 2: Це дитяча література з глибоким підтекстом, чи це доросла філософія, замаскована під дитячу книгу, щоб уникнути
    знищення?'
  - '[!epistemic-humility] Критики сперечаються: одні вбачають у Дімарові насамперед дитячого письменника, інші — філософа,
    що використовував дитячу літературу як єдиний можливий засіб висловлювання.'
  section: 'Конфліктна карта: Казка для дітей чи притча для дорослих?'
  words: 900
- points:
  - 'Аналіз ключових притч: алегорична структура та подвійне кодування — що читає дитина і що розуміє дорослий.'
  - 'Мова та стиль: як прозорість мови та ліризм створюють емоційну глибину при зовнішній простоті.'
  - 'Наративна структура: притчевість як метод обходу цензурних обмежень та донесення гуманістичних цінностей.'
  - '[!decolonization] Творчість Дімарова як антитеза до радянського «дитячого реалізму». Збереження української філософської
    традиції в умовах, коли вона мала бути знищена.'
  section: 'Читання: Притчі зі збірки «Для чого людині серце»'
  words: 1800
- points:
  - 'Дорослішання як прозріння: головні герої казок часто стикаються з вибором між конформізмом (безсердечність) та індивідуальністю
    (мати серце).'
  - 'Невидима присутність травми: як тема репресованих батьків, сирітства та історичної несправедливості (Голодомор, терор)
    просочується в тканину дитячого тексту.'
  - 'Формування ідентичності: казка як простір, де зберігається українська суб''єктність, мова та цінності всупереч тиску
    русифікації та ідеологізації.'
  - '[!anti-hagiography] Чи не є така «езопова мова» формою втечі від прямої боротьби? Критичний аналіз педагогічної функції
    та меж алегоричного спротиву.'
  section: 'Ідентичність та дорослішання: Збереження суб''єктності через алегорію'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, для чого людині серце в тоталітарному суспільстві? Формулювання відповіді на основі аналізу
    текстів Дімарова.'
  - 'Рецепція: як сприймали книгу в радянські часи і як її читають зараз, після розкриття архівів та історичних контекстів.'
  - 'Сучасне значення: чому філософські казки Дімарова, написані десятиліття тому, залишаються актуальними для України, що
    бореться за свою ідентичність сьогодні?'
  - 'Рефлексія: чи змінилося ваше сприйняття дитячої літератури як жанру після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз філософських казок Анатолія Дімарова «Для чого людині серце» як форма опору радянській цензурі через езопову
  мову, алегорію та збереження української суб'єктності.
level: LIT-YOUTH
module: lit-youth-031
objectives:
- Критично аналізувати філософські казки Анатолія Дімарова як форму опору радянській цензурі.
- Розрізняти та пояснювати поняття «алегорія», «притча» та «езопова мова» на прикладі конкретних текстів.
- Дослідити, як дитяча література може слугувати інструментом збереження національної суб'єктності під ідеологічним тиском.
- Формулювати аргументовану позицію щодо місця творчості Дімарова в українському та світовому літературному контексті.
