content_outline:
- points:
  - 'Провокативне питання: Чи може тиша бути гучнішою за крик? Розглядаємо вступний епіграф з роману "140 децибелів тиші"
    без контексту.'
  - 'Сучасна паралель: чим "мовчазні протести" підлітків у соцмережах схожі на головний конфлікт твору Бачинського?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "140 децибелів тиші" — це художній твір про дорослішання чи соціальний маніфест покоління?'
  - 'Дебат 2: Чи може підліткова література бути "великою літературою"? Місце роману в сучасному каноні — тимчасовий бестселер
    чи майбутня класика?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у творі глибоку психологію, інші — вдалий маркетинговий хід,
    що експлуатує тему протесту.'
  section: 'Конфліктна карта: Література чи маніфест?'
  words: 900
- points:
  - 'Аналіз ключових уривків: розбираємо стиль автора, його роботу з мовою, сленгом та музичними алюзіями.'
  - 'Структура наративу: як Бачинський використовує композицію для створення напруги та розкриття внутрішнього світу героя.'
  - '[!decolonization] Головний герой бореться не лише з батьками та школою, а й з "тишею" — спадком радянської покірності
    та конформізму. Його бунт — це вибір української суб''єктності.'
  - 'Стилістика та мова: аналіз, як мова твору відображає розрив між поколіннями та пошук власного голосу.'
  section: 'Читання: "140 децибелів тиші"'
  words: 1800
- points:
  - '"Дорослішання" в романі як процес набуття власного голосу та права говорити від свого імені.'
  - 'Формування ідентичності через протест: як відмова від "старих правил" стає способом самоствердження для героя і його
    покоління.'
  - '[!anti-hagiography] Чи не є романтизація протесту небезпечною? Критичний аналіз цінностей, які транслює текст, та можливих
    наслідків.'
  - '[!decolonization] Текст як приклад руйнування імперського міфу про "тихого", "співучого" українця. Новий герой — галасливий
    і вимогливий.'
  section: 'Ідентичність та дорослішання: Народження голосу'
  words: 1200
- points:
  - 'Повернення до розминки: то що ж таке "140 децибелів тиші"? Формулювання відповіді на основі аналізу.'
  - 'Історія рецепції: як сприйняли роман у рік виходу і як його читають після повномасштабного вторгнення? Чи змінились акценти?'
  - 'Сучасна актуальність: що цей текст говорить про сучасну українську молодь, її цінності та страхи?'
  - 'Рефлексія: що у вашому сприйнятті роману змінилося після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Андрія Бачинського "140 децибелів тиші" як ключового тексту сучасної української підліткової літератури.
  Дослідження тем дорослішання, протесту та формування ідентичності в контексті деколонізації.
