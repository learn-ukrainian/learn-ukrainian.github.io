activity_hints:
- description: Визначте, яка з позицій ("література" vs "маніфест") відповідає наведеній цитаті з критики.
  focus: Розуміння літературно-критичних дебатів
  items: 4
  type: quiz
- description: 'Вставте в речення правильний термін: суб''єктність, наратив, деколонізація, конформізм.'
  focus: Ключові терміни модуля
  items: 4
  type: fill-in
- description: Напишіть коротке есе (300-400 слів), де проаналізуйте, що символізує "тиша" в романі. Чому саме її децибели
    вимірює автор?
  focus: 'Аналіз: "Тиша" як метафора'
  type: note
- description: Порівняйте головного героя "140 децибелів тиші" з героями класичної української літератури (напр., з "Хіба
    ревуть воли..."). Що змінилося в образі "бунтаря" і чому?
  focus: 'Есе: Сучасний герой'
  type: note
cefr_min: C1
connects_to:
- lit-youth-zhadan-voroshylovhrad
