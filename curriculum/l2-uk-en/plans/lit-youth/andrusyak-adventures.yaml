objectives:
- Аналізувати, як Іван Андрусяк використовує мовну гру та іронію для створення діалогу з юним читачем
- Визначати риси "нової української ідентичності" в образах персонажів-підлітків (Стефа, Стефко)
- Критично оцінювати деколонізаційний потенціал сучасної дитячої літератури на прикладі творів Андрусяка
- Формулювати власну позицію в дебаті про дидактичну та розважальну функції літератури для дітей
