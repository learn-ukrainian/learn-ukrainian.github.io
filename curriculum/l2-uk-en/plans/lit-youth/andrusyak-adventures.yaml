content_outline:
- points:
  - 'Провокація: Чи може дитяча книга про дерев''яну іграшку ("Вісім днів із життя Бурундука") бути інструментом деколонізації?'
  - 'Запитання: Хто такі "розумні дівчата" в українській літературі? Представлення Стефи з книги "Стефа і її Чакалка" як нетипової
    героїні.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи повинна дитяча література "навчати"? Позиція Андрусяка (література як простір свободи) vs радянська традиція
    "виховної" літератури.'
  - 'Дебат 2: "Хлопчача" vs "Дівчача" проза — чи актуальний цей поділ? Аналіз "Зайчикознавства" та "Стефи і її Чакалки" як
    спроби вийти за межі гендерних стереотипів.'
  - '[!epistemic-humility] Критики звинувачують Андрусяка в надмірній "дидактичності", тоді як інші бачать у ньому лише "розважальність".
    Розбираємо аргументи обох сторін.'
  section: 'Конфліктна карта: Розвага чи виховання?'
  words: 900
- points:
  - 'Уривок з "Вісім днів із життя Бурундука": Аналіз мови, гри слів, іронії. Як Андрусяк говорить з дітьми як з рівними.'
  - 'Уривок з "Стефа і її Чакалка": Розбір образу сильної, незалежної героїні. Це феміністична проза для дітей?'
  - 'Стилістика та мова автора: аналіз неологізмів, гумору та способів ведення наративу.'
  - '[!decolonization] Порівняння світу Бурундука (сучасний Київ) зі світом радянських дитячих книжок (умовний, ідеологізований
    простір). Андрусяк повертає дитинству його географію та сучасність.'
  section: 'Читання: Стефа, Стефко і Бурундук'
  words: 1800
- points:
  - 'Стефко ("М''яке і пухнасте") як модель нового українського хлопця: рефлексуючого, чутливого, вільного від токсичної маскулінності.'
  - 'Дорослішання як деколонізація: як персонажі Андрусяка (і читачі) позбуваються радянських/імперських наративів про "правильне"
    дитинство, родину, історію.'
  - '[!anti-hagiography] Чи не є образ "ідеальної" української родини в книгах Андрусяка новою формою пропаганди? Критичний
    аналіз ідеалів, що транслюються.'
  - '[!decolonization] "Суб''єктність" у Андрусяка: його персонажі — активні творці свого світу, а не об''єкти виховання.
    Протиставлення радянській педагогіці.'
  section: 'Ідентичність та дорослішання: Як стати українцем у XXI столітті'
  words: 1300
- points:
  - 'Повернення до розминки: Отже, чи може дитяча книга змінити світ? Формулювання відповіді на основі аналізу творчості Андрусяка.'
  - 'Рецепція творчості: як книги Андрусяка сприймають діти, батьки та критики? Аналіз відгуків та рецензій.'
  - 'Спадщина та вплив: Іван Андрусяк як один із творців канону сучасної української дитячої літератури. Кого він надихнув?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість Івана Андрусяка як приклад деколонізації дитячої літератури, аналіз образів сильних дівчат (Стефа) та рефлексуючих
  хлопців (Стефко), руйнування радянських наративів про дитинство.
