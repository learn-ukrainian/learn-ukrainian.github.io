activity_hints:
- description: Перевірка розуміння термінів (суб'єктність, деколонізація) та позицій у "Конфліктній карті".
  focus: Ключові поняття та дебати
  items: 5
  type: quiz
- description: Знайти приклади іронії, гри слів та неологізмів у наданих уривках з текстів.
  focus: Стилістика Івана Андрусяка
  items: 5
  type: fill-in
- description: Порівняйте образи Стефи ("Стефа і її Чакалка") та Стефка ("М'яке і пухнасте"). Які сучасні українські гендерні
    ролі вони представляють? (250-300 слів).
  focus: 'Аналіз персонажа: Стефа vs. Стефко'
  type: note
- description: 'Напишіть есе на тему: "Як творчість Івана Андрусяка сприяє деколонізації українського дитинства?". Використовуйте
    приклади з прочитаних творів та поняття "суб''єктність" і "наратив". (400-600 слів).'
  focus: 'Есе: Деколонізація дитинства'
  type: note
