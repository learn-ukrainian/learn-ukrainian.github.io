content_outline:
- points:
  - 'Провокація: Якщо література — це зброя, то канон — це арсенал чи музей? Для чого ми відбираємо, зберігаємо та вивчаємо
    ці тексти?'
  - 'Завдання: Зібрати хмару тегів із 10 слів, які описують українську юнацьку літературу, спираючись на вже вивчені твори.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є канон незмінним монументом, який треба шанувати, чи живим діалогом, де нові покоління сперечаються з попередниками?
    Позиція "охоронців" vs "реформаторів".'
  - 'Дебат 2: Як працювати з авторами, що зазнали імперського впливу? "Очищення" канону (вилучення) vs "деколонізаційна реінтерпретація"
    (критичне перепрочитання).'
  - '[!epistemic-humility] Не існує єдиного "правильного" канону. Кожна епоха формує свій, відповідаючи на власні виклики.
    Наш канон — це наша відповідь.'
  section: 'Конфліктна карта: Канон як вирок чи як діалог?'
  words: 900
- points:
  - 'Аналіз уривків: порівняння текстів різних авторів, що звертаються до одного архетипу (напр. "дорога", "зрада", "вибір").
    Як трансформується його сенс?'
  - 'Лінгвістична еволюція: як змінюється літературна мова від автора до автора? Приклади архаїзмів, неологізмів, мовних експериментів.'
  - 'Інтертекстуальність: пошук прихованих цитат, алюзій, пародій. Хто з ким сперечається? Хто кого продовжує?'
  - '[!decolonization] Простежити, як кожен наступний автор робить крок до деконструкції імперського наративу — навіть несвідомо.
    Де і як українське пробивається крізь нав''язані схеми?'
  section: 'Читання: Діалог через покоління'
  words: 1700
- points:
  - 'Конструювання суб''єкта: як юнацька література пропонує моделі "правильного" українця? Які риси заохочуються, а які —
    засуджуються?'
  - 'Від особистого до національного: аналіз того, як індивідуальне дорослішання героя стає метафорою дорослішання нації.'
  - 'Педагогічна функція: чи є ця література інструментом виховання, чи простором для вільного пошуку ідентичності? Де межа
    між освітою та ідеологією?'
  - '[!anti-hagiography] Критичний погляд на "позитивних" героїв. Чи не є їхня бездоганність формою пропаганди? Які людські
    слабкості їм дозволені?'
  section: 'Ідентичність та дорослішання: "Ми" як метанаратив'
  words: 1200
- points:
  - 'Повернення до розминки: Канон — арсенал чи музей? Сформулювати власну позицію, спираючись на аналіз модуля.'
  - 'Спадщина та горизонти: що з вивченого канону є баластом, а що — фундаментом для майбутнього української літератури?'
  - 'Роль читача: чи є ми пасивними споживачами канону, чи його співавторами, що надають текстам нових сенсів?'
  - '[!anti-hagiography] Чи не призводить надмірна критика канону до його руйнування, залишаючи націю без інтелектуального
    фундаменту?'
  section: Дискусія та підсумок
  words: 800
focus: 'Діахронний синтез юнацької літератури: аналіз тяглості та трансформації ключових ідей, деконструкція імперських наративів
  та конструювання українського суб''єкта через діалог поколінь.'
level: LIT-YOUTH
module: lit-youth-032
objectives:
- Синтезувати знання про літературний процес у вивчених творах юнацької літератури, застосовуючи діахронний аналіз
- Критично оцінювати концепцію літературного канону, формулюючи власну позицію в дебатах про його роль та формування
- Застосовувати деколонізаційну оптику для аналізу тяглості та трансформації української ідентичності в літературі
- Аналізувати тексти на рівні інтертекстуальних зв''язків та стилістичних змін між поколіннями авторів
