content_outline:
- points:
  - 'Провокація: Чи може дитяча байка бути зброєю в боротьбі за незалежність? Розглядаємо Олену Пчілку не як «дитячу письменницю»,
    а як політичного стратега.'
  - Цитата Пчілки про призначення літератури, що ставить під сумнів її «простоту».
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пчілка — просвітителька, що несла дітям універсальну мораль, чи політик, що використовувала байки для виховання
    «правильних» українців?'
  - 'Дебат 2: Чому Пчілку часто затьмарює її донька, Леся Українка? Роль гендеру та «дитячого» жанру в ієрархії національного
    канону.'
  - '[!epistemic-humility] Оцінка її творчості коливається від «матері українського модернізму» до «авторки другого ряду».'
  section: 'Конфліктна карта: Педагог чи політик?'
  words: 900
- points:
  - Повний текст байок з коментарем.
  - 'Аналіз сюжету та персонажів: хто є алегорією українця, а хто — імперського «старшого брата»?'
  - 'Стилістика та мова: Пчілка свідомо обирає «просту», народну мову як протиставлення імперському «високому стилю». Це політичний
    вибір.'
  - '[!decolonization] Творчість Пчілки — це акт культурного спротиву в умовах Емського указу. Кожна українська книжка для
    дітей була політичною декларацією.'
  section: 'Читання: Байки "Два хлопці" та "Рак-неборак"'
  words: 1700
- points:
  - '«Дорослішання» в байках Пчілки — це не індивідуальний, а колективний процес: дорослішання нації до власної суб''єктності.'
  - 'Цінності, що транслюються: працьовитість, взаємодопомога, хитрість як засіб виживання, пріоритет громадського над особистим.'
  - '[!anti-hagiography] Чи не є такий підхід маніпулятивним? Аналіз потенційно пропагандистської функції дитячої літератури.'
  - '[!decolonization] Пчілка створює український дитячий світ, вільний від імперських наративів. Це формування ідентичності
    «з нуля».'
  section: 'Ідентичність та дорослішання: Виховання майбутнього нації'
  words: 1200
- points:
  - 'Повернення до розминки: тож Пчілка — педагог чи політик? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція: як сприймали байки Пчілки сучасники, і як їх читаємо ми сьогодні? Чи змінився їхній сенс?'
  - 'Сучасне значення: які уроки з байок Пчілки актуальні для України у XXI столітті?'
  - 'Рефлексія: що змінилось у вашому сприйнятті «дитячої літератури» після цього модуля?'
  section: Дискусія та підсумок
  words: 800
focus: Olena Pchilka's fables and their role in shaping Ukrainian national identity through children's literature, stylistic
  analysis, and decolonial perspectives.
level: LIT-YOUTH
module: lit-youth-002
objectives:
- Аналізувати байки Олени Пчілки в контексті українського національного відродження кінця XIX ст. та умов імперських утисків
- Критично оцінювати роль дитячої літератури у формуванні національної ідентичності та передачі цінностей
- Розрізняти літературно-критичні підходи до аналізу тексту (біографічний, феміністичний, постколоніальний)
- Формулювати аргументовану позицію щодо використання літератури як інструменту ідеологічного впливу
