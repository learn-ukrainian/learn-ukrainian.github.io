activity_hints:
- description: Перевірка розуміння дебатів про роль Пчілки (педагог vs політик). Чия це теза? Визначити позицію за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Терміни суб'єктність, наратив, алегорія, деколонізація у контексті речень з модуля.
  focus: Ключові терміни аналізу
  items: 4
  type: fill-in
- description: Порівняйте байки Олени Пчілки та Леоніда Глібова. У чому їхні підходи до моралі, алегорії та національного
    питання схожі, а в чому — принципово відрізняються?
  focus: 'Порівняльний аналіз: Пчілка vs Глібов'
  type: note
- description: Наскільки етично використовувати дитячу літературу для просування політичних ідей, навіть якщо ці ідеї є національно-визвольними?
    Аргументуйте свою позицію на прикладі творчості Пчілки (400-600 слів).
  focus: 'Есе: Етика ідеологічної літератури'
  type: note
