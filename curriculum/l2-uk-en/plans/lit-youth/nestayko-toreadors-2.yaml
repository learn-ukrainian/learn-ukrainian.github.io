activity_hints:
- description: 'Перевірка розуміння дебатів: "Тореадори" — це лише розвага чи педагогічний інструмент? Визначити аргументи
    "за" і "проти".'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити у речення яскраві авторські неологізми та фразеологізми з тексту, що аналізуються в модулі.
  focus: Стилістика Нестайка
  items: 6
  type: fill-in
- description: Порівняйте образи Яви Реня та Павлуші Завгороднього. Як через їхні характери розкривається тема дружби, честі
    та відповідальності?
  focus: Аналіз персонажів
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: "Як гумор у ''Тореадорах з Васюківки'' працює як інструмент деколонізації
    та утвердження української суб''єктності в радянський час?"'
  focus: 'Есе: Деколонізаційний аналіз'
  type: note
cefr_min: C1
connects_to:
