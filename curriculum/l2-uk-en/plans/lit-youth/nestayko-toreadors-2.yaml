content_outline:
- points:
  - 'Провокація: Чому книга, написана в 1960-х, досі є найулюбленішою для багатьох українських дітей, які живуть у світі TikTok
    та відеоігор?'
  - 'Загадковий факт: автор переписував твір тричі. Що він намагався змінити чи приховати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Тореадори" лише веселою пригодницькою повістю, чи це складний педагогічний інструмент для виховання "правильного"
    українця?'
  - 'Дебат 2: Місце в каноні. Це "висока" література чи "масове" дитяче чтиво? Як змінювалось ставлення критиків до твору
    від 1970-х до сьогодні?'
  - '[!epistemic-humility] Деякі критики бачать у творі приховану радянську пропаганду "щасливого дитинства", інші — тонку
    сатиру на неї.'
  section: 'Конфліктна карта: Розвага чи виховання?'
  words: 900
- points:
  - 'Аналіз епізоду "Будівництво метро": мрія про неможливе як двигун прогресу та дитячої ініціативи.'
  - 'Стилістика Нестайка: поєднання гумору, ліризму та динамічного сюжету. Авторські неологізми та їхня роль.'
  - 'Система персонажів: Ява та Павлуша як два типи українського характеру — мрійник-авантюрист і розважливий прагматик.'
  - '[!decolonization] Текст створює автономний український світ (село, природа, мова), де радянська ідеологія присутня лише
    як формальний, далекий фон.'
  section: 'Читання: "Ми з тобою, Яво, друзі. Назавжди!"'
  words: 1700
- points:
  - 'Ініціація: кожна пригода — це випробування, що перетворює хлопців на дорослих. Які саме "уроки" вони засвоюють?'
  - 'Кодекс честі: що означає бути "справжнім другом" та "чесним козаком" у світі Яви та Павлуші? Аналіз їхніх правил та цінностей.'
  - 'Формування суб''єктності: персонажі самі вирішують свою долю, будують плани та несуть відповідальність. Протиставлення
    радянській моделі "гвинтика системи".'
  - '[!anti-hagiography] Чи не є ідеалізований світ Васюківки втечею від реальних проблем українського села 1960-х? Критичний
    погляд на "пасторальний" наратив.'
  section: 'Ідентичність та дорослішання: Уроки Васюківки'
  words: 1200
- points:
  - 'Повернення до розминки: Так чому ж книга залишається актуальною? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція твору: як читали "Тореадорів" у 1970-х, 1990-х, і як читають сьогодні? Що змінилось у сприйнятті?'
  - 'Сучасне значення: Чи можуть "Тореадори з Васюківки" навчити чогось про стійкість, винахідливість та оптимізм сучасну
    Україну, що бореться за своє існування?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз повісті Всеволода Нестайка, ідеали дружби та честі, дитяча суб'єктність, гумор як інструмент деколонізації,
  формування української ідентичності через пригодницький жанр.
level: LIT-YOUTH
module: lit-youth-005
objectives:
- Аналізувати повість "Тореадори з Васюківки" як ключовий текст української дитячої літератури, визначаючи її місце в каноні
- Досліджувати, як текст формує українську ідентичність через мову, гумор та моделі поведінки, протиставляючи це радянському
  контексту
- Критично оцінювати педагогічні та ідеологічні меседжі, закладені в текст, розрізняючи авторський задум та можливі інтерпретації
- 'Розрізняти авторський стиль Нестайка: поєднання гумору, ліризму та пригодницького сюжету'
pedagogy: CBI
