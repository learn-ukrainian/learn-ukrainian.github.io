content_outline:
- points:
  - 'Провокація: Чому радянська критика називала роман «Лісова долина» «націоналістичною отрутою для дітей», а сучасні українські
    педагоги вважають його обов''язковим для читання?'
  - Уривок з тексту без контексту, де головний герой робить неочікуваний вибір, що суперечить «дитячій» логіці.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «Лісова долина» лише дитячою казкою про пригоди в лісі (формалістичний підхід), чи це замаскована політична
    алегорія про виживання української культури під імперським тиском (постколоніальний підхід)?'
  - 'Дебат 2: Місце в каноні. Чому твір, написаний у середині ХХ ст., увійшов до шкільної програми лише після 1991 року? Дискусія
    про «замовчуваних» авторів та формування нового канону юнацької літератури.'
  - '[!epistemic-humility] Немає «правильної» відповіді. Аналізуємо аргументи обох сторін: що втрачає текст, якщо читати його
    лише як казку? А якщо лише як політичний маніфест?'
  section: 'Конфліктна карта: Казка чи політична алегорія?'
  words: 900
- points:
  - 'Ключова сцена: герой вперше заходить углиб лісу. Аналіз мови, символів (ліс, стежка, звірі), наративної перспективи.'
  - '[!decolonization] Текст свідомо уникає російських мовних кальок, створюючи власний «лісовий» лексикон. Це акт мовного
    спротиву. Порівняння з тогочасною радянською літературою для дітей.'
  - 'Структура твору: як побудована подорож героя? Що символізують три випробування? Зв''язок з архаїчними міфами про ініціацію.'
  - 'Стилістичні особливості Оксеника: поєднання реалізму (описи природи) з фантастикою (розмовляючі тварини). Як це працює
    на створення унікального світу?'
  section: 'Читання: Ініціація в Лісовій долині'
  words: 1700
- points:
  - Дорослішання як метафора. Герой вчиться самостійно приймати рішення, відмовляючись від нав'язаних «старшими» правил. Як
    це віддзеркалює процес формування української суб'єктності?
  - '[!anti-hagiography] Чи не є світ «Лісової долини» занадто ідеалізованим? Автор пропонує чіткий поділ на «своїх» і «чужих».
    Аналіз потенційної пропагандистської функції тексту.'
  - '[!decolonization] «Ліс» як безпечний простір української ідентичності, оточений ворожим «Полем» (алюзія на імперію).
    Аналіз просторової символіки в романі.'
  - 'Мова як дім буття: герой остаточно «дорослішає», коли починає говорити мовою лісу. Роль мови у формуванні національної
    ідентичності.'
  section: 'Ідентичність та дорослішання: Набуття суб''єктності'
  words: 1200
- points:
  - 'Повернення до розминки: тож «націоналістична отрута» чи обов''язкова класика? Студент формулює власну позицію, використовуючи
    аргументи з модуля.'
  - 'Рецепція твору: як читали «Лісову долину» в діаспорі, де її вперше видали, і як її читають в Україні сьогодні?'
  - '[!anti-hagiography] Спадщина Оксеника: чи актуальний його дещо романтичний націоналізм у ХХІ столітті? Критична дискусія
    про сильні та слабкі сторони його ідеологічної позиції.'
  - 'Рефлексія: Які аспекти твору відкрилися для вас по-новому після цього аналізу? Чи змінилося ваше ставлення до літератури
    «для юнацтва»?'
  section: Дискусія та підсумок
  words: 700
focus: Oksenyk's 'Forest Valley', coming-of-age narrative as national allegory, decolonization of youth literature, stylistic
  analysis, identity formation
