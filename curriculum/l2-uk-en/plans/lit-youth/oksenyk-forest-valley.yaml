activity_hints:
- description: Перевірка розуміння дебатів. Чия це теза — формалістів чи постколоніальних критиків? Визначити позицію за цитатою.
  focus: 'Конфліктна карта: Казка чи алегорія?'
  items: 4
  type: quiz
- description: 'Вставити в речення ключові терміни зі стилістичного аналізу: метафора, алегорія, символ, наративна перспектива
    — на основі уривків з модуля.'
  focus: Стилістика Оксеника
  items: 5
  type: fill-in
- description: Головний герой проходить ініціацію в лісі. Як його особисте дорослішання символізує процес становлення української
    нації, що виходить з-під імперського контролю? Порівняйте з іншими творами про ініціацію.
  focus: 'Аналіз: Дорослішання як алегорія нації'
  type: note
- description: Література для юнацтва часто має виховну мету. Де проходить межа між передачею цінностей та пропагандою? На
    прикладі «Лісової долини» проаналізуйте, які ідеї автор транслює молодому читачеві. (400-600 слів).
  focus: 'Есе: Пропаганда чи педагогіка?'
  type: note
cefr_min: C1
