objectives:
- Аналізувати роман «Лісова долина» Оксеника в контексті української юнацької літератури ХХ століття
- Досліджувати, як текст формує українську ідентичність через алегорію дорослішання
- Критично оцінювати педагогічну функцію та потенційну ідеологічність літератури для юнацтва
- Розрізняти авторський стиль Оксеника та його внесок у деколонізацію українського наративу
