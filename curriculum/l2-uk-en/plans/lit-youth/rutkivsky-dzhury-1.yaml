content_outline:
- points:
  - 'Провокація: Чому найпопулярніший український дитячий роман XXI століття — про війну, шпигунів і сиріт?'
  - 'Загадка: у тексті є вовки-перевертні, таємничі ліки, надлюдські здібності. Це фентезі чи історія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це історична реконструкція чи фентезі на історичному тлі? Позиція автора vs аналіз тексту.'
  - 'Дебат 2: "Джури" — це якісна дитяча література чи інструмент патріотичного виховання? Дискусія про дидактизм.'
  - '[!epistemic-humility] Критики досі сперечаються, чи можна вважати "Джурів" частиною "великого" літературного канону,
    чи це виключно жанрова проза.'
  section: 'Конфліктна карта: Література чи ідеологія?'
  words: 900
- points:
  - 'Аналіз наративної структури: тріада "діти-герої" (Грицик і Санько) та їхній наставник (Швайка).'
  - 'Система персонажів: Санько (інтелект, "чарівник"), Грицик (сила, воїн) — два шляхи розвитку для юного українця.'
  - 'Стиль Рутківського: поєднання динамічного сюжету з ліричними описами природи та гумором.'
  - '[!decolonization] Текст активно творить позитивний міф про козацтво як про лицарський орден, що захищає кордони, протиставляючи
    його "ординцям" — це свідома робота з повернення національної історії.'
  section: 'Читання: "Джури козака Швайки"'
  words: 1800
- points:
  - 'Дорослішання як ініціація: шлях від сільських хлопців до "джур" (зброєносців) — це метафора становлення нації.'
  - 'Педагогічна функція: які цінності транслює текст? Побратимство, вірність, сміливість, готовність до самопожертви.'
  - '[!anti-hagiography] Романтизація війни: чи показує Рутківський справжню ціну конфлікту? Аналіз сцен насильства та смерті.'
  - '[!decolonization] Мова як маркер ідентичності: персонажі говорять живою, насиченою українською мовою, що протиставляється
    мовчанню або ворожій мові "ординців".'
  section: 'Ідентичність та дорослішання: Козацький вишкіл як модель нації'
  words: 1200
- points:
  - 'Повернення до розминки: чи є "Джури" відповіддю на потребу суспільства в героях під час війни?'
  - 'Рецепція: як і чому книга стала бестселером і увійшла до шкільної програми? Вплив на покоління "дітей незалежності".'
  - '[!anti-hagiography] Сучасне значення: де межа між патріотичним вихованням на прикладі книги та мілітаризацією свідомості
    дитини?'
  - 'Студентська рефлексія: чи змінилося ваше сприйняття роману після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Володимир Рутківський, "Джури козака Швайки", історична проза для юнацтва, козацька ідентичність, дорослішання, деколонізація
  дитячої літератури
