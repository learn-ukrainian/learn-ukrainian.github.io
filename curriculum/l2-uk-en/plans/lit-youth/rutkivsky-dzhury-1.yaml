objectives:
- Критично аналізувати співвідношення історичної правди та художнього вимислу в літературі для юнацтва
- Досліджувати механізми формування національної ідентичності через популярну культуру на прикладі роману
- Розрізняти літературні та ідеологічні функції тексту
- Формулювати власну аргументовану позицію щодо ролі дидактичної літератури в сучасному освітньому процесі
