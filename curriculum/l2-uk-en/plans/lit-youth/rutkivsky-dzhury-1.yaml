activity_hints:
- description: Визначити, яка з позицій ("література" vs "ідеологія") відповідає наведеним тезам критиків.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення слова: джура, пластун, вишкіл, наставник, ініціація — на основі контексту з модуля.'
  focus: Лексика козацького вишколу
  items: 5
  type: fill-in
- description: Проаналізуйте розвиток Санька. Як його "магічні" здібності співіснують з ідеєю раціонального козацького світу?
    Це метафора таланту, духовності чи просто елемент фентезі? (300-500 слів).
  focus: 'Аналіз персонажа: шлях Санька'
  type: note
- description: 'Напишіть есе на тему: "Роль роману "Джури козака Швайки" в сучасній українській школі: переваги та ризики".
    Аргументуйте свою позицію. (400-600 слів).'
  focus: 'Есе: "Джури" в освіті'
  type: note
