content_outline:
- points:
  - 'Провокація: "Тореадори з Васюківки" — це просто смішна книга для дітей, чи це щось значно більше? Чому дорослі, які читали
    її 40 років тому, досі пам''ятають її з теплотою?'
  - 'Цитата-загадка: "Ми, звісно, не хотіли нічого поганого. Ми просто хотіли збудувати метро..." Про що може свідчити таке
    поєднання дитячої наївності та інженерної амбітності?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Тореадори" насамперед літературною грою, самоцінною розвагою (позиція формалістів)? Чи це інструмент для
    "правильного" виховання, що пропагує цінності дружби, чесності, любові до Батьківщини (позиція педагогів-традиціоналістів)?'
  - 'Дебат 2: Місце в каноні. Чи був Нестайко "дозволеним" дитячим письменником у СРСР, що маскував українську ідентичність
    під маскою гумору? Як змінилося сприйняття твору після 1991 року?'
  - '[!epistemic-humility] Немає єдиної "правильної" відповіді. Текст існує на перетині цих інтерпретацій, і його сила — саме
    в цій багатозначності.'
  section: 'Конфліктна карта: Розвага чи виховання?'
  words: 900
- points:
  - 'Аналіз ключового епізоду: будівництво метро під свинарником. Як цей епізод розкриває характери Яви та Павлуші, їхню мрійливість
    та практичність?'
  - 'Система персонажів: Ява та Павлуша як два полюси українського національного характеру — романтичний, непосидючий "козак"
    і розважливий, мудрий "господар".'
  - 'Стилістика та мова: аналіз унікального гумору Нестайка, його неологізмів ("вигаданція"), іронії та динамічного синтаксису,
    що створює ефект присутності.'
  - '[!decolonization] Васюківка як автентичний український простір. На відміну від уніфікованих "радянських сіл" в офіціозній
    літературі, світ Нестайка наповнений специфічними українськими реаліями, мовою та ментальністю, що було формою культурного
    спротиву.'
  section: 'Читання: Пригоди у Васюківці'
  words: 1800
- points:
  - 'Арка дорослішання: кожна пригода — це випробування (ініціація), що перетворює хлопчачу гру на усвідомлення відповідальності,
    вірності та ціни справжньої дружби.'
  - 'Формування ідентичності: як через локальні пригоди (порятунок села від "шпигуна", організація театру) герої несвідомо
    долучаються до ширшої української спільноти та її цінностей.'
  - '[!anti-hagiography] Чи не є "Тореадори" формою "дозволеного націоналізму" в УРСР? Книга уникає гострих кутів радянської
    дійсності, створюючи ідилічний, дещо романтизований образ українського села. Чи можна вважати це компромісом з системою?'
  - '[!decolonization] Твір як руйнування імперського міфу про "малороса" — смішного, але недолугого селянина. Герої Нестайка,
    попри комічність, є суб''єктними, винахідливими та здатними на шляхетні вчинки.'
  section: 'Ідентичність та дорослішання: Як Ява та Павлуша стають українцями'
  words: 1200
- points:
  - 'Повернення до розминки: тож, "Тореадори" — це розвага чи серйозна література? Сформулюйте власну позицію, спираючись
    на аналіз.'
  - 'Історія рецепції: як змінилося сприйняття книги від радянських часів до сьогодні? Що в ній знаходять сучасні діти, які
    живуть у світі інтернету та комп''ютерних ігор?'
  - 'Спадщина Нестайка: чому "Тореадори" стали абсолютним каноном, тоді як інші, можливо, більш "ідеологічно правильні" радянські
    дитячі твори, забуті?'
  - 'Рефлексія: що цей текст говорить про універсальні цінності дитинства, дружби та мрії, які не залежать від епохи?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз трилогії Всеволода Нестайка "Тореадори з Васюківки", її роль у каноні української дитячої літератури, та теми
  дружби, пригод і дорослішання в українському селі як просторі національної ідентичності.
level: LIT-YOUTH
module: lit-youth-006
objectives:
- Аналізувати трилогію "Тореадори з Васюківки" як ключовий текст української дитячої літератури ХХ століття.
- Досліджувати, як теми гри, дружби та пригод у творі сприяють формуванню особистої та національної ідентичності.
- Розрізняти поняття "дитяча література для розваги" та "дитяча література для виховання" на прикладі творчості Нестайка.
- Критично оцінювати ідеологічні та деколонізаційні аспекти твору, написаного в радянський час.
