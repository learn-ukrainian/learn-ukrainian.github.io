activity_hints:
- description: Розрізнити позиції критиків щодо творчості Винничука. Чия це теза — прихильників "реставрації" чи "деконструкції"?
  focus: 'Розуміння конфліктної карти: Ностальгія чи насмішка?'
  items: 4
  type: quiz
- description: Вставити в речення з модуля специфічні слова з текстів Винничука (батяр, кнайпа, філіжанка, штрека).
  focus: 'Лексика Винничука: ґвара та авторські неологізми'
  items: 5
  type: fill-in
- description: На основі секції "Ідентичність та дорослішання", поясніть, як використання мови та гра з історією допомагають
    формувати унікальну львівську ідентичність у творах Винничука.
  focus: 'Аналіз: Ідентичність у міському просторі'
  type: note
- description: Чи згодні ви, що сьогоднішня інтернет-культура (меми, міські легенди на форумах) є продовженням традиції, яку
    представляє Винничук? Аргументуйте свою позицію (400-600 слів).
  focus: 'Есе: Сучасна міфотворчість'
  type: note
