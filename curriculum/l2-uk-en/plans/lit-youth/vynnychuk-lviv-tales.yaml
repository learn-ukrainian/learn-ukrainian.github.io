objectives:
- Аналізувати, як Юрій Винничук використовує іронію та міфологізацію для створення унікального образу Львова
- Розрізняти поняття постмодерної деконструкції та ностальгічної реставрації на прикладі "Легенд Львова"
- Критично оцінювати роль міської літератури у формуванні національної та регіональної ідентичності в постколоніальному суспільстві
- Формулювати власну позицію в літературних дебатах щодо місця автора в каноні та його стилю
