content_outline:
- points:
  - 'Провокація: "У Львові мертві говорять частіше за живих, якщо знати, де слухати". Як ця фраза Винничука задає тон усьому
    місту?'
  - 'Загадка: що спільного між львівським катом, чорним котом та австрійським цісарем? Відповідь — усі вони герої постмодерних
    легенд.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Винничук — реставратор "золотого віку" мультикультурного Львова чи його постмодерний деконструктор, що висміює
    ностальгію?'
  - 'Дебат 2: Чи є Винничук продовжувачем автентичної батярської традиції, чи він створює комерціалізований симулякр для сучасного
    читача?'
  - '[!epistemic-humility] Критики досі сперечаються, де в текстах Винничука закінчується любов до міста і починається їдка
    іронія над його міфами.'
  section: 'Конфліктна карта: Ностальгія чи насмішка?'
  words: 900
- points:
  - 'Аналіз уривків: Як Винничук перетворює історичні факти на міські легенди, а міські легенди — на нову "історію" Львова.'
  - 'Прийом "оживлення метафори": Львів, що дихає, кава, що розмовляє, вулиці, що мають пам''ять. Місто як головний герой.'
  - 'Наративна структура: фрагментарність, колажність, гра з читачем. Чому немає єдиного сюжету?'
  - '[!decolonization] Винничук створює суто український міф про Львів, витісняючи імперські (польські, австрійські) наративи
    на периферію або пародіюючи їх.'
  section: 'Читання: Легенди Львова'
  words: 1800
- points:
  - 'Примірка ідентичностей: Львів у Винничука постійно "приміряє" різні маски — австрійську, польську, радянську, європейську.
    Це пошук себе чи втеча від себе?'
  - 'Мова як дорослішання: Тексти насичені львівською ґварою, архаїзмами, вульгаризмами. Як цей мовний карнавал допомагає
    сформувати унікальну міську ідентичність, відмінну від "нормативної" української?'
  - '[!anti-hagiography] Чи не створює Винничук нову, солодку пропаганду "ідеального Львова", ігноруючи темні сторінки його
    історії (погроми, колабораціонізм)?'
  section: 'Ідентичність та дорослішання: Львів як підліток'
  words: 1200
- points:
  - 'Повернення до розминки: Як тепер ви розумієте фразу про "мертвих, що говорять"? Про що вони попереджають, а про що розповідають?'
  - 'Рецепція: Чому творчість Винничука стала культовою в 90-х і 2000-х? Яку потребу суспільства вона задовольнила?'
  - 'Сучасне значення: Чи може міфотворчість у стилі Винничука бути терапевтичною для травмованих війною українських міст
    сьогодні?'
  - 'Студентський рефлексивний запит: Ваше уявлення про Львів змінилося після цього аналізу? Він став більш реальним чи, навпаки,
    ще більш казковим?'
  section: Дискусія та підсумок
  words: 700
focus: Юрій Винничук "Легенди Львова", міська міфологія, львівський текст, постмодерна іронія, деконструкція міфів, батярська
  культура
