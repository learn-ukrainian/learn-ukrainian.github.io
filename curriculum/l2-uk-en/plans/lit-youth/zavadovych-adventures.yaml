activity_hints:
- description: Визначення термінів у контексті аналізу твору. Відрізнити визначення "суб'єктності" від "ідентичності".
  focus: 'Ключові поняття: ідентичність, канон, суб''єктність'
  items: 4
  type: quiz
- description: Заповнити пропуски в тезах, що представляють позиції "за" і "проти" канонізації "Пригод Завадовича".
  focus: Аргументи з конфліктної карти
  items: 5
  type: fill-in
- description: Проаналізуйте поданий уривок з твору. Які маркери дорослішання героя ви бачите? Як це пов'язано з темою національної
    ідентичності?
  focus: 'Аналіз уривка: Дорослішання героя'
  type: note
- description: Напишіть есе на тему "Чи можуть пригоди одного підлітка допомогти деколонізувати свідомість цілого покоління?".
    Використовуйте приклади з модуля (400-600 слів).
  focus: 'Есе: Деколонізація через літературу'
  type: note
