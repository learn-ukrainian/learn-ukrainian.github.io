content_outline:
- points:
  - 'Провокація: Чи може книга для підлітків бути зброєю в інформаційній війні? Розглядаємо "Пригоди Завадовича" як прецедент.'
  - 'Цитата без контексту: "Зрозуміти, хто ти, іноді означає згадати, ким ти ніколи не був."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Висока полиця" vs "масова література". Чи є у "Пригод Завадовича" канонічна вартість, чи це лише вдалий комерційний
    проєкт?'
  - 'Дебат 2: Текст для підлітків чи про підлітків для дорослих? Аналіз маркетингової стратегії та реальної читацької аудиторії.'
  - '[!epistemic-humility] Літературна критика розділилася: одні бачать у творі потужний інструмент "м''якої сили", інші —
    звинувачують у надмірній дидактичності та спрощенні.'
  section: 'Конфліктна карта: Канон чи жанрова література?'
  words: 900
- points:
  - 'Уривок з тексту: сцена, де герой вперше стикається з вибором між особистим комфортом та колективною відповідальністю.'
  - 'Аналіз наративної структури: як квестова модель подорожі героя використовується для розкриття етапів становлення особистості.'
  - 'Стилістика та мова: використання сучасного сленгу, англіцизмів та історизмів як інструмент створення багатошарового мовного
    світу.'
  - '[!decolonization] Твір як відповідь на радянську дитячу літературу. Замість "піонера-героя" — підліток, що ставить під
    сумнів авторитети і шукає власну правду.'
  section: 'Читання: Пригоди Завадовича'
  words: 1800
- points:
  - Що означає "стати дорослим" у світі Завадовича? Це про сепарацію від батьків чи про ментальну сепарацію від імперського
    минулого?
  - Мова, історія, міські легенди — як елементи української культури стають інструментами для самопізнання героя, а не просто
    шкільними предметами.
  - '[!decolonization] Тіло, простір, мова — як герой повертає собі суб''єктність через фізичні та інтелектуальні виклики,
    відкидаючи нав''язані імперські комплекси меншовартості.'
  - '[!anti-hagiography] Чи не є "Пригоди" новою формою пропаганди? Аналіз "правильних" та "неправильних" ціннісних виборів,
    які пропонує текст. Де межа між вихованням і маніпуляцією?'
  section: 'Ідентичність та дорослішання: Сепарація від імперії'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, "Пригоди Завадовича" — це зброя, ескапізм чи щось третє? Студент формулює власну аргументовану
    відповідь.'
  - 'Рецепція твору: відгуки критиків, фанатські теорії у соцмережах та звинувачення в політичній заангажованості. Як суспільство
    читає текст?'
  - Що робить цей текст актуальним для покоління, яке дорослішає під час повномасштабного вторгнення? Зв'язок між вигаданими
    пригодами та реальною боротьбою.
  - '[!anti-hagiography] Критичний розбір спадщини: чи не створює твір нового, ідеалізованого міфу про "правильного українця"?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз "Пригод Завадовича" як сучасного молодіжного роману, його роль у деколонізації дитячої літератури та конструювання
  української ідентичності для нового покоління.
level: LIT-YOUTH
module: lit-youth-003
objectives:
- Критично аналізувати твір сучасної молодіжної літератури в контексті формування національної ідентичності.
- Розрізняти та аргументувати позиції в літературно-критичних дебатах щодо канону, жанру та дидактичності.
- Досліджувати, як література може слугувати інструментом деколонізації свідомості.
- Формулювати власну аргументовану позицію щодо ролі та відповідальності молодіжної літератури в сучасному українському суспільстві.
