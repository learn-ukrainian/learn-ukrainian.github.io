content_outline:
- points:
  - 'Провокація: Чи можуть пригоди двох сільських хлопчаків бути "великою літературою"? Питання про місце "Тореадорів з Васюківки"
    в каноні.'
  - 'Цитата: "Це була геніальна, на нашу думку, ідея — влаштувати бій биків. Ви не думайте, ми не задля розваги це робили.
    Ми — для слави!" — без контексту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Тореадори" — це лише веселі, безтурботні пригоди для втечі від реальності (ескапізм), чи це продуманий педагогічний
    текст про відповідальність та дружбу?'
  - 'Дебат 2: Радянська vs. Пострадянська рецепція. Чи був Нестайко "безпечним" радянським автором, чи його світ українського
    села був формою тихого опору русифікації?'
  - '[!epistemic-humility] Критики досі сперечаються, чи варто аналізувати дитячу літературу тими ж методами, що й "дорослу".'
  section: 'Конфліктна карта: Ескапізм чи глибока педагогіка?'
  words: 900
- points:
  - 'Аналіз ключових епізодів: будівництво метро під свинарником, порятунок Собакевича, "бій биків" із коровою Контрибуцією.'
  - 'Система персонажів: Ява Рень і Павлуша Завгородній як архетипні образи "мрійника" та "прагматика".'
  - 'Мова Нестайка: унікальний гумор, яскраві неологізми, поєднання дитячої безпосередності з дорослою іронією.'
  - '[!decolonization] Нестайко створює абсолютно український світ (село Васюківка), що існує поза радянським ідеологічним
    контекстом. Герої живуть українською культурою, а не радянськими ритуалами.'
  section: 'Читання: "Тореадори з Васюківки"'
  words: 1800
- points:
  - 'Дружба як найвища цінність: аналіз клятви Яви та Павлуші. Їхні сварки та примирення як модель справжніх людських стосунків.'
  - Що таке "дорослішання" у Нестайка? Це не кінець дитинства, а взяття на себе відповідальності за свої вчинки.
  - 'Формування ідентичності: як через пригоди хлопці пізнають не лише світ, а й себе як частину українського села, громади,
    культури.'
  - '[!anti-hagiography] Чи не ідеалізує Нестайко українське село? Розгляд тексту на предмет відсутності важких тем радянської
    дійсності (колгоспний побут, бідність).'
  section: 'Ідентичність та дорослішання: Світ дружби та пригод'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи є "Тореадори" великою літературою? Аргументація з опорою на текст.'
  - 'Рецепція та спадщина: чому "Тореадори" стали найвідомішим українським дитячим твором у світі? Аналіз перекладів та адаптацій.'
  - 'Сучасне значення: що Ява та Павлуша можуть сказати сучасним українським дітям, які дорослішають в умовах війни та цифрових
    технологій?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість Всеволода Нестайка, аналіз "Тореадорів з Васюківки", ідеї дружби, дорослішання та української ідентичності
  в дитячій літературі.
level: LIT-YOUTH
