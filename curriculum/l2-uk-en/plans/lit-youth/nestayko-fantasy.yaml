objectives:
- Аналізувати творчість Всеволода Нестайка в контексті української дитячої літератури ХХ століття.
- Дослідити, як у творах Нестайка формуються концепти дружби, дорослішання та української ідентичності.
- Критично оцінювати дебати навколо дитячої літератури, зокрема її розважальну та дидактичну функції.
