content_outline:
- points:
  - 'Провокація: Українська фантастика — це лише наслідування західних чи російських зразків, чи це унікальний простір для
    національної уяви, що має власну логіку розвитку?'
  - 'Цитата-загадка: "Майбутнє, якого ніхто не прагнув, настало. Тепер треба було вчитися в ньому жити". З якого твору ця
    фраза і про яку реальність вона говорить?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Діалог чи розрив? Сучасні автори (Жадан, Малярчук) ведуть діалог з радянською фантастикою (Бердник, Околітенко)
    чи повністю розривають з нею, створюючи новий канон?'
  - 'Дебат 2: Наслідування чи суверенітет? Чи є український кіберпанк та фентезі лише локальною адаптацією глобальних жанрів,
    чи вони пропонують унікальні світобудовні моделі та вирішують власні філософські задачі?'
  - '[!epistemic-humility] Критики сперечаються, чи варто розглядати українську фантастику через призму постколоніалізму,
    чи це обмежує її естетичну цінність.'
  section: 'Конфліктна карта: Суверенітет уяви'
  words: 900
- points:
  - 'Порівняльний аналіз уривків: Бердник ("Зоряний корсар"), Дяченки ("Vita Nostra"), Ірина Грабовська ("Леобург"). Як змінюється
    мова, стиль, образ героя та модель майбутнього?'
  - 'Трансформація літературної мови: від патетики та езотерики 60-х до жорсткого психологізму 90-х та іронічної гри з жанром
    2010-х.'
  - '[!decolonization] Як кожен з авторів деконструює імперський наратив: Бердник — через космізм, Дяченки — через екзистенціалізм,
    Грабовська — через постмодерну гру з історією.'
  - 'Аналіз трансформації архетипів: як змінюється образ "обраного", "вчителя", "ворога" впродовж 50 років.'
  section: 'Читання: Три покоління українських фантастів'
  words: 1800
- points:
  - 'Алегорії опору: як фантастичні світи кодують досвід українського опору — від партизанських рухів у космосі до кібер-дисидентства.'
  - 'Конструювання українського суб''єкта: аналіз того, як герої фантастичних творів проходять шлях від об''єкта імперії до
    суб''єкта власної історії.'
  - 'Жанрові конвенції як інструмент деколонізації: використання тропів фентезі для переосмислення козацьких міфів, кіберпанку
    — для критики олігархічних систем.'
  - '[!decolonization] Література як простір формування національної етики та альтернативних моделей майбутнього, вільних
    від імперського тяжіння.'
  section: 'Світобудова та алегорія: Метафори національного'
  words: 1200
- points:
  - 'Повернення до розминки: Чи вдалося українській фантастиці здобути "суверенітет уяви"? Студент формулює відповідь, спираючись
    на проаналізовані тексти.'
  - 'Рецепція та канон: Чому деякі твори радянського періоду залишаються в каноні, а інші, не менш талановиті, — витіснені
    на маргінес?'
  - '[!anti-hagiography] Критичний погляд на "канонізованих" авторів: чи завжди їхні погляди відповідають сучасним етичним
    нормам?'
  - 'Значення для сьогодення: яку роль відіграє фантастика в інтелектуальній безпеці нації та її здатності уявляти й будувати
    власне майбутнє?'
  section: Дискусія та підсумок
  words: 700
focus: Ukrainian sci-fi/fantasy as a vehicle for social commentary, national imagination, and decolonization
level: LIT-FANTASTIKA
module: lit-fantastika-025
objectives:
- Синтезувати знання про еволюцію української фантастики від радянських часів до сьогодення
- Застосовувати деколонізаційну оптику для аналізу української фантастики як простору інтелектуального опору
- Критично оцінювати тяглість та розриви в українській літературній традиції наукової фантастики
- Формулювати аргументовану позицію в рамках ключових літературно-критичних дебатів щодо жанру
