content_outline:
- points:
  - 'Провокація: "Київ — це не місто, а діагноз." — цитата з роману. Що це означає? Як ви розумієте цей вислів до і після
    прочитання модуля?'
  - 'Загадка: описується дивний ритуал на вулицях сучасного міста. Студент має вгадати, що це — уривок з фентезі, опис арт-перформансу
    чи реальний міський звичай?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Творчість Химери — це модернізація українського фольклору чи створення абсолютно нової, "штучної" міфології
    для сучасної України?'
  - 'Дебат 2: Місце в каноні. Це "висока література" чи якісна, але все ж "жанрова" белетристика? Хто і за якими критеріями
    це визначає?'
  - '[!epistemic-humility] Аргументи "за": твори піднімають складні філософські питання. Аргументи "проти": автор використовує
    кліше масової культури. Немає єдиної правильної відповіді.'
  section: 'Конфліктна карта: Інтерпретація чи містифікація?'
  words: 900
- points:
  - 'Текст: Розгорнутий уривок, що описує взаємодію головного героя з олюдненою архітектурою міста.'
  - 'Аналіз сюжету: як побудований конфлікт уривку? Яка роль діалогів та внутрішніх монологів?'
  - 'Характеротворення: що ми дізнаємося про головного героя та світ через його реакції на фантастичні події?'
  - '[!decolonization] Порівняння з російською міською фентезі (напр. "Дозори" Лук''яненка). Чим український погляд на міську
    магію та її джерела принципово відрізняється? Відхід від імперського центру.'
  section: 'Читання: Уривок з роману "Химерний Київ"'
  words: 1800
- points:
  - 'Правила світу: які закони керують фантастичним Києвом Химери? Як магія пов''язана з історією та топографією реального
    міста?'
  - 'Алегоричне прочитання: що уособлюють "химери", "духи місць" та інші фантастичні істоти? Які соціальні та політичні проблеми
    сучасної України вони віддзеркалюють?'
  - '[!decolonization] Як автор "повертає" місту його українську історію, витісняючи або переосмислюючи імперські та радянські
    наративи через фантастичні елементи.'
  - 'Жанрові конвенції: елементи нуару, детективу, кіберпанку в тканині тексту. Як Химера поєднує глобальні тренди з локальним
    матеріалом?'
  section: 'Світобудова та алегорія: Київ як жива істота'
  words: 1200
- points:
  - 'Повернення до розминки: після аналізу, як тепер ви інтерпретуєте цитату "Київ — це не місто, а діагноз"?'
  - 'Історія рецепції: як критики та читачі сприйняли твори Химери на момент виходу? Чи змінилося сприйняття з часом?'
  - '[!anti-hagiography] Чи не є комерційний успіх та "попсовість" жанру перешкодою для глибшого прочитання? Критичний погляд
    на феномен популярності автора.'
  - 'Рефлексія: що нового ви дізналися не лише про літературу, а й про сучасну Україну та її столицю завдяки творчості Корнія
    Химери?'
  section: Дискусія та підсумок
  words: 800
focus: 'Творчість Корнія Химери як приклад української speculative fiction: аналіз світобудови, соціальної алегорії та деколоніального
  потенціалу жанру.'
level: LIT.FANTASTIKA
module: lit-fantastika-015
objectives:
- Аналізувати творчість Корнія Химери у контексті сучасної української speculative fiction
- Досліджувати, як фантастична література може бути інструментом соціального коментаря та деколонізації
- Розрізняти поняття світобудови, алегорії та авторської міфології на конкретних прикладах
- Формулювати аргументовану позицію в літературно-критичних дебатах щодо жанрової літератури та її місця в каноні
