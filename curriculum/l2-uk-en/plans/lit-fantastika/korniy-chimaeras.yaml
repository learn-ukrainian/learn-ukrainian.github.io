vocabulary_hints:
- definition: система законів, принципів та елементів, що створюють унікальний вигаданий світ у творі.
  pos: ж.
  word: світобудова
- definition: інакомовлення; спосіб художнього зображення, що полягає в двоплановому показі предметів і явищ, де за конкретним
    образом прихована абстрактна ідея.
  pos: ж.
  word: алегорія
- definition: здатність бути активним, свідомим діячем, а не пасивним об'єктом зовнішніх сил; ключове поняття у деколоніальних
    студіях.
  pos: ж.
  word: суб''єктність
- definition: спосіб оповіді, розповідь про певні пов'язані між собою події, що розглядається як культурний конструкт.
  pos: ч.
  word: наратив
- definition: 1) наука про розвиток історичних знань; 2) сукупність історичних праць, що належать до певної епохи, народу
    або присвячені певній темі.
  pos: ж.
  word: історіографія
- definition: процес позбавлення від колоніальної спадщини в політиці, економіці та, що важливо для літератури, у культурі
    та свідомості.
  pos: ж.
  word: деколонізація
- definition: художня проза, переважно розважального характеру; часто протиставляється "високій" літературі.
  pos: ж.
  word: белетристика
- definition: сприйняття та інтерпретація твору мистецтва аудиторією, критиками, іншими митцями.
  pos: ж.
  word: рецепція
