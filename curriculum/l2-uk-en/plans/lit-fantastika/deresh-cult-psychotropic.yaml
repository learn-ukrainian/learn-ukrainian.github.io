content_outline:
- points:
  - 'Провокаційне питання: Чому Юрій Банзай став культовою фігурою для свого покоління, а не просто черговим дивним хлопцем
    із дивного міста?'
  - Цитата з роману "Культ" без контексту про Мізґан — що це за місце і яку роль воно відіграє?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Дереш — це автентичний український постмодернізм чи талановите наслідування західної контр-культури (Стівен
    Кінг, Чак Паланік, Лавкрафт)?'
  - 'Дебат 2: "Культ" — це щирий молодіжний роман-маніфест чи геніальний маркетинговий проєкт видавництва "Кальварія"?'
  - '[!epistemic-humility] Критики досі сперечаються: чи був Дереш "голосом покоління", чи лише вдало вловив кон''юнктуру
    та запит на "український жах".'
  section: 'Конфліктна карта: Феномен Дереша — прорив чи епігонство?'
  words: 900
- points:
  - 'Аналіз ключової сцени: перша зустріч із Юрієм Банзаєм та його філософія.'
  - 'Система персонажів: Юрій Банзай як харизматичний лідер-трикстер, оповідач як рефлексуючий адепт.'
  - 'Наративна техніка: потік свідомості, ненадійний оповідач, фрагментарність як відображення стану героя.'
  - '[!decolonization] "Культ" — це не просто "український Лавкрафт". Це спроба знайти нову міфологію для пострадянського
    міста, що втратило старі радянські орієнтири.'
  section: 'Читання: Уривки з роману "Культ"'
  words: 1800
- points:
  - 'Аналіз світу: Як функціонує Мізґан? Які закони керують цим "містом у місті"?'
  - 'Алегоричне прочитання: "Культ" як метафора втечі від сірої реальності в езотеричні субкультури, що було характерно для
    молоді 2000-х.'
  - 'Жанрові конвенції: Як Дереш поєднує елементи готичного роману, горору, філософської притчі та молодіжної прози?'
  - 'Мова як елемент світобудови: аналіз авторського стилю, сленгу, неологізмів.'
  section: 'Світобудова та алегорія: Психоделічний реалізм та містика міста'
  words: 1200
- points:
  - 'Повернення до розминки: то ким же був Юрій Банзай для покоління "нульових"?'
  - 'Рецепція твору: як сприймали "Культ" у 2002-му, і як він читається зараз, після двох революцій та повномасштабної війни?'
  - '[!anti-hagiography] Визнання новаторства Дереша не скасовує критики його ранніх творів за певну схематичність, вторинність
    та стилістичну неохайність.'
  - 'Рефлексія: чи змінилося ваше ставлення до молодіжних субкультур після аналізу роману?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману "Культ" як феномену українського постмодернізму, дослідження молодіжної контркультури 2000-х, психоделічного
  реалізму та пошуку ідентичності в пострадянській Україні.
level: LIT-FANTASTIKA
