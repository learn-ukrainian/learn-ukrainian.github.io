objectives:
- Аналізувати ранню творчість Любка Дереша ("Культ") як феномен українського постмодернізму та молодіжної контркультури 2000-х.
- Визначати риси постколоніальної свідомості в тексті, розрізняючи впливи західної культури та унікальні українські контексти.
- Формулювати власну аргументовану позицію в літературно-критичних дебатах щодо місця Дереша в сучасному українському каноні.
