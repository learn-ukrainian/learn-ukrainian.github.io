  focus: 'Конфліктна карта: Дебати про Дереша'
  items: 4
  type: quiz
- description: 'Вставити в речення ключові поняття та неологізми з роману: Мізґан, психотропіки, трипи, адепти тощо.'
  focus: 'Словник "Культу": Лексика Дереша'
