objectives:
- Аналізувати роман «Колонія» як зразок українського Hard Sci-Fi, що поєднує наукову достовірність та гострий соціально-політичний
  коментар.
- Інтерпретувати алегорії світобудови роману в контексті української історії та сучасних викликів, зокрема колоніального тиску
  та боротьби за суб'єктність.
- Формулювати власну позицію в літературних дебатах щодо жанрової приналежності твору та його місця в сучасному українському
  каноні.
- Розрізняти авторську стилістику Макса Кідрука, зокрема використання наукового апарату як художнього засобу.
