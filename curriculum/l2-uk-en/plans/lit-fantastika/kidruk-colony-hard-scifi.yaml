content_outline:
- points:
  - 'Провокація: Чи можна втекти від земних проблем на Марс? Історія «Колонії» Макса Кідрука як несподіване дзеркало української
    реальності.'
  - 'Фрагмент з роману: опис перших хвилин після вибуху на Землі очима колоністів. Без коментарів.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Колонія» — це передусім Hard Sci-Fi, де наука і техніка є головними героями, чи це політичний трилер, замаскований
    під фантастику, де головне — алегорія сучасної України?'
  - 'Дебат 2: Чи може комерційно успішний бестселер, як «Колонія», увійти до канону української літератури, традиційно орієнтованого
    на «високу полицю» та некомерційні твори?'
  - '[!epistemic-humility] Позиція 1: Кідрук — популяризатор науки, що пише захопливі сюжети. Позиція 2: Кідрук — політичний
    публіцист, що використовує жанрову літературу для просування національного наративу.'
  section: 'Конфліктна карта: Жанр vs. Ідеологія'
  words: 900
- points:
  - 'Структура оповіді: паралельні сюжетні лінії на Марсі та Землі. Як вони взаємодіють і створюють напругу?'
  - 'Система персонажів: вчені-ідеалісти, військові, політики, штучний інтелект «Дев''ятий». Хто є справжнім рушієм сюжету?'
  - 'Наративна техніка: поєднання детальних наукових описів з динамічними сценами. Як Кідрук балансує між лекцією та бойовиком?'
  - '[!decolonization] «Колонія» як розрив з російською фантастикою (Стругацькі, Лук''яненко). Створення власного, українського
    погляду на майбутнє, не обтяженого імперськими комплексами.'
  section: 'Читання: Роман «Колонія»'
  words: 1800
- points:
  - 'Наукова достовірність: аналіз ключових елементів світобудови (тераформування, загрози Марса, технології) — що є фактом,
    а що припущенням?'
  - 'Алегорія української долі: колонія як модель молодої держави, що бореться за виживання та суб''єктність проти більших,
    агресивних гравців (земні корпорації/держави).'
  - '[!decolonization] Мовне питання на Марсі: як функціонує українська мова в багатонаціональній колонії? Чому це важливий
    елемент деколонізаційного прочитання?'
  - 'Жанрові конвенції: «Колонія» у світовому контексті Hard Sci-Fi (Кім Стенлі Робінсон, Енді Вейр). Що є унікально українським?'
  section: 'Світобудова та алегорія: Марсіанський світ та земні паралелі'
  words: 1400
- points:
  - 'Повернення до розминки: тож чи є Марс втечею? Формулювання відповіді на основі аналізу роману.'
  - 'Рецепція твору: чому «Колонія» стала феноменом в Україні? Аналіз читацьких відгуків та критичних рецензій.'
  - 'Сучасне значення: як війна змінила прочитання роману? Мотиви стійкості, боротьби за ресурси та інформаційної війни.'
  - '[!anti-hagiography] Критичний погляд: чи не є персонажі надто функціональними, а сюжет — надто залежним від зовнішніх
    загроз? Пошук слабких місць у тексті.'
  section: Дискусія та підсумок
  words: 700
focus: Роман Макса Кідрука «Колонія» як зразок Hard Sci-Fi, соціальна алегорія української стійкості та проєкт деколонізації
  у спекулятивній літературі.
