activity_hints:
- description: 'Перевірка розуміння двох ключових дебатів з "Конфліктної карти": кіберпанк vs епігонство, деколонізація vs
    відтворення наративів.'
  focus: Розуміння літературно-критичних дебатів
  type: quiz
- description: 'Заповнення пропусків у реченнях термінами з модуля: світобудова, алегорія, технокозацтво, кіборг-характерник
    тощо.'
  focus: Термінологія світобудови та алегорії
  type: fill-in
- description: Порівняйте образ козака у класичному творі (напр., "Чорна рада") та образ кіборга-характерника у Флеша. Що
    змінилося, що залишилося, і чому?
  focus: 'Аналіз: Деконструкція архетипу'
  type: note
- description: Напишіть есе на тему "Як спекулятивна фантастика Павлика Флеша допомагає зрозуміти сучасну Україну та її місце
    у світі?". (400-600 слів)
  focus: 'Есе: Спекулятивна фантастика як інструмент'
  type: note
cefr_min: C1
connects_to: []
content_outline:
- points:
  - 'Провокація: Тексти Павлика Флеша — це втеча від реальності чи її найточніший діагноз? Чи може фантастика сказати про
    війну більше, ніж реалізм?'
  - 'Цитата з твору без контексту: "Коли останній дрон-кобзар заспівав про кінець історії, на Марсі щойно зійшла перша картопля".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Творчість Флеша — це автентичний український кіберпанк, що виріс на місцевому ґрунті, чи лише талановите наслідування
    західних зразків (Гібсон, Стерлінг)?'
  - 'Дебат 2: Чи є його світи справді деколонізованим простором, чи вони несвідомо відтворюють імперські наративи, лише в
    новій "нео-козацькій" обгортці?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у Флеші візіонера та творця нового національного міту, інші —
    талановитого стилізатора, що вдало експлуатує тренди.'
  section: 'Конфліктна карта: Український кіберпанк чи епігонство?'
  words: 900
- points:
  - Розширений уривок з ключового твору, що демонструє поєднання високих технологій та українських архетипів.
  - 'Аналіз наративної структури: як автор використовує нелінійну оповідь для створення відчуття "зламаного часу".'
  - 'Система персонажів: кіборг-характерник, штучний інтелект "Мольфар", космічний чумак — як вони переосмислюють класичні
    образи.'
  - '[!decolonization] Як текст Флеша звільняє українські архетипи (козак, відьма) від російської імперської інтерпретації,
    роблячи їх суб''єктами глобального футуристичного наративу.'
  section: 'Читання: Уривок з роману «Марс у вишиванці»'
  words: 1700
- points:
  - 'Аналіз правил світу: які закони (фізичні, соціальні, технологічні) керують всесвітом Флеша?'
  - 'Алегоричне прочитання: що насправді означає "технокозацтво"? Як воно кодує сучасний український волонтерський рух, цифрову
    армію та громадянський опір?'
  - '[!decolonization] Порівняльний аналіз: чому "світлий український футуризм" Флеша є прямою антитезою до імперського "світу
    полудня" братів Стругацьких.'
  - 'Жанровий аналіз: місце творів Флеша в контексті світового кіберпанку (США, Японія) та східноєвропейської соціальної фантастики
    (Польща).'
  section: 'Світобудова та алегорія: Технокозацтво як соціальний код'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, фантастика — це ескапізм чи інструмент? Формулювання студентом власної аргументованої позиції.'
  - 'Історія рецепції: як сприймали тексти Флеша до 2022 року і як їх читають зараз, в умовах повномасштабної війни?'
  - '[!anti-hagiography] Чи є в утопічних світах Флеша місце для темних сторін української історії та національного характеру?
    Критичний погляд на "ідеалізоване майбутнє".'
  - 'Студентська рефлексія: що нового про сучасну Україну ви дізналися, читаючи спекулятивну фантастику, а не історичні праці
    чи новини?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість Павлика Флеша як приклад українського кіберпанку, соціальної алегорії та деколонізації національної уяви.
level: LIT-FANTASTIKA
module: lit-fantastika-012
objectives:
- Аналізувати твори Павлика Флеша як зразок української спекулятивної фантастики та соціальної алегорії.
- Визначати способи, якими автор конструює деколонізоване майбутнє та українську суб'єктність у своїх текстах.
- Формулювати аргументовану позицію в літературно-критичних дебатах щодо місця творчості Флеша в українському каноні.
- Розрізняти автентичне мистецтво та епігонство на прикладі сучасної української літератури.
