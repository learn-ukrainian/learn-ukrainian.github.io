content_outline:
- points:
  - 'Провокація: Чи можна "покращити" класику? Що відбувається, коли магічний світ "Тіней забутих предків" стикається з правилами
    сучасного фентезі?'
  - 'Цитата: "Марічка не тонула. Вона поверталася додому." — як один рядок може змінити все, що ви знали про твір?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Формалістичний аналіз vs рецептивна естетика. Це самостійний твір, що використовує знайомі образи, чи просто
    фанфік, що експлуатує класику?'
  - 'Дебат 2: Деколонізаційний інструмент vs само-екзотизація. Чи допомагає таке переосмислення боротися з імперським поглядом
    на Карпати, чи навпаки, перетворює українську культуру на товар для зовнішнього споживача?'
  - '[!epistemic-humility] Немає "правильної" інтерпретації. Мета — оцінити силу аргументів кожної зі сторін, спираючись на
    текст.'
  section: 'Конфліктна карта: Модернізація чи святотатство?'
  words: 900
- points:
  - Уривок з твору: сцена зустрічі Івана з "новою" Марічкою, яка є не духом, а представницею іншого світу.
  - Аналіз наративу: як зміна ключової події (смерть Марічки) перебудовує всю структуру сюжету та мотивацію персонажів.
  - '[!decolonization] Текст відбирає "Тіні" у російської імперської критики, яка бачила в них лише "етнографічну екзотику".
    Новий твір наполягає на суб''єктності та складній метафізиці гуцульського світу.'
  - 'Порівняння: стилістика мови Коцюбинського (музична, імпресіоністична) vs мова нового твору (динамічна, сюжетно-орієнтована).'
  section: 'Читання: "Тіні забутих предків" наново'
  words: 1700
- points:
  - 'Правила світу: аналіз системи магії, духів (лісовик, чугайстер) та її взаємодії зі світом людей. Що раніше було поетичним
    образом, тепер стає законом фентезійного світу.'
  - 'Алегоричне прочитання: війна між родами Палійчуків та Гутенюків як алегорія внутрішніх українських конфліктів. Мольфар
    як фігура, що намагається зберегти крихкий баланс.'
  - 'Жанрові конвенції: як твір використовує тропи "темного фентезі" (dark fantasy) та "магічного реалізму" для розповіді
    суто української історії.'
  - '[!decolonization] Перетворення фольклору на систему — це акт повернення контролю над власним наративом.'
  section: 'Світобудова та алегорія: Гуцульська магія як система'
  words: 1200
- points:
  - Повернення до розминки: тож чи варто було "чіпати" класику? Формулювання студентом власної аргументованої позиції.
  - 'Рецепція: як критики та читачі сприйняли цей твір? Аналіз кількох рецензій — від захоплених до обурених.'
  - '[!anti-hagiography] Чи не є така "модернізація" спробою втекти від складності та трагізму оригіналу, замінивши його на
    більш просту жанрову розвагу? Критичний погляд на мотивацію автора та ринку.'
  - 'Сучасне значення: що ця книга говорить про те, як сучасна Україна хоче бачити своє минуле і свою культуру?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз сучасного фантастичного твору, що переосмислює "Тіні забутих предків" Коцюбинського. Фокус на світобудові карпатського
  магічного реалізму, алегоріях національної ідентичності та постколоніальній критиці.
