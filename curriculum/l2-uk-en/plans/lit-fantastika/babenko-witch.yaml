content_outline:
- points:
  - 'Провокація: Чи може відьма бути національною героїнею? Розглядаємо творчість Babenko Witch як дзеркало сучасних українських
    страхів та сподівань.'
  - Цитата з твору без контексту, що натякає на боротьбу з безликою, прадавньою силою — чи йдеться про магію, чи про історію?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Фемінізм vs Національна алегорія): Чи є "відьма" у творах Babenko Witch символом жіночої емансипації проти патріархату,
    чи це алегорія України, що чинить опір колоніальному гніту?'
  - 'Дебат 2 (Висока vs Популярна література): Чи є твори авторки "серйозною літературою", гідною канону, чи це "жанрова фантастика"?
    Дискусія про місце її творчості в академічному полі.'
  - '[!epistemic-humility] Не існує єдиної "правильної" інтерпретації. Цінність критики — в обґрунтованості та глибині аргументів,
    а не в остаточній істині.'
  section: 'Конфліктна карта: Відьомство як метафора'
  words: 900
- points:
  - Розгорнутий уривок з центрального роману авторки, що демонструє її стиль та ключові теми.
  - 'Аналіз наративної структури: як побудована оповідь, хто є оповідачем, як це впливає на сприйняття світу.'
  - 'Система персонажів: протагоніст(ка) та антагоніст як носії протилежних ідеологій.'
  - '[!decolonization] Вписування творчості Babenko Witch в українську фантастичну традицію (від Гоголя до Дяченків), а не
    просто як частину глобального тренду на "dark fantasy".'
  section: 'Читання: Уривок з ключового твору Babenko Witch'
  words: 1800
- points:
  - 'Аналіз законів магії та правил вигаданого світу: як вони віддзеркалюють або спотворюють соціальні та політичні ієрархії
    в реальній Україні?'
  - 'Алегоричне прочитання: як "прокляті землі", "втрачені артефакти" та "древні угоди" у творах авторки кодують теми Голодомору,
    репресій, імперського стирання пам''яті.'
  - 'Жанрові конвенції: як авторка використовує та деконструює тропи урбаністичного фентезі, відьомських романів та готичної
    літератури для створення унікального українського наративу.'
  - '[!decolonization] Боротьба з "північним сусідом" як центральний конфлікт у багатьох творах — аналіз алегорії імперіалізму.'
  section: 'Світобудова та алегорія: Соціальна критика через фентезі'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може відьма бути національною героїнею? Формулювання відповіді на основі проаналізованого
    матеріалу.'
  - 'Історія рецепції: як критики та читачі сприймали твори Babenko Witch на момент виходу і як це сприйняття змінилося після
    повномасштабного вторгнення?'
  - 'Сучасне значення: чому ця авторка стала культурним феноменом? Що її твори говорять про сучасну Україну, чого не може
    сказати "реалістична" література?'
  - '[!anti-hagiography] Критичний погляд: чи не відбувається надмірної романтизації образу "відьми"? Які небезпеки криються
    в такій естетизації опору?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз творчості Babenko Witch, зокрема як її фентезійні світи слугують алегорією української соціальної та політичної
  реальності, деколонізації та формування сучасної національної ідентичності.
