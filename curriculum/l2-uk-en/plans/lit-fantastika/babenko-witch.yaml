objectives:
- Аналізувати, як Babenko Witch використовує елементи фантастики для коментування української соціально-політичної реальності
- Визначати та інтерпретувати ключові алегорії у світобудові авторки, пов'язуючи їх із постколоніальним досвідом України
- Формулювати аргументовану позицію в рамках літературно-критичних дебатів щодо феміністичного та національного прочитання
  її творів
- Критично оцінювати місце творчості авторки в сучасному українському літературному каноні
