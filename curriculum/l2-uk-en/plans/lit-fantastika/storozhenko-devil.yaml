activity_hints:
- description: Перевірка позицій у дебатах про Стороженка. Чия це теза — що він епігон Гоголя? Хто вважав його автором "другого
    ряду"?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Терміни з модуля: готика, алегорія, суб''єктність, іронія, канон — у контексті речень.'
  focus: Літературознавча лексика
  items: 5
  type: fill-in
- description: На основі уривків з "Ночі перед Різдвом" та "Закоханого чорта", порівняйте образи. У чому принципова різниця
    в їхній мотивації, мові та стосунках з людьми?
  focus: 'Порівняльний аналіз: Чорт у Гоголя vs Чорт у Стороженка'
  type: note
- description: Напишіть есе (400-600 слів), де ви розкриваєте, як образ чорта у Стороженка може бути прочитаний як алегорія
    українського народу в Російській імперії.
  focus: 'Есе: "Диявол як алегорія національної долі"'
  type: note
