content_outline:
- points:
  - 'Провокація: "Чого, вражий сину, оком накидав на мою працю?". Простий фольклорний чорт чи складний психологічний образ?
    Де межа між смішним і страшним у Стороженка?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Етнографічний романтизм vs Гоголівська традиція. Стороженко просто наслідує Гоголя на українському матеріалі,
    чи створює самобутній художній світ?'
  - 'Дебат 2: Канон і маргінес. Чому Стороженка, на відміну від Шевченка, довго вважали автором "другого ряду"? Хто і коли
    повернув його в активний літературний обіг?'
  - '[!epistemic-humility] Немає єдиної відповіді; його місце в каноні є предметом постійної переоцінки, від Нечуя-Левицького
    до сучасних дослідників.'
  section: 'Конфліктна карта: Стороженко — епігон чи новатор?'
  words: 900
- points:
  - Уривок з твору, де чорт описує свої почуття та страждання — аналіз його "людських" рис.
  - 'Наративна техніка: оповідь від першої особи (чорта). Як це змінює сприйняття читача?'
  - '[!decolonization] Розрив із імперським стереотипом "малоросійського чорта". Стороженко наділяє свого персонажа суб''єктністю
    та складною психологією, неможливою в колоніальній оптиці.'
  - 'Стилістичний аналіз: поєднання просторіччя, фольклорних виразів та високої романтичної лексики в мові персонажа.'
  section: 'Читання: "Закоханий чорт"'
  words: 1700
- points:
  - 'Правила світу: які закони керують надприродними силами у Стороженка? Що може і чого не може чорт?'
  - 'Алегоричне прочитання: "закоханий чорт" як метафора української душі, що змушена служити імперії, але мріє про власне
    щастя. Невдала любов як алегорія нереалізованих національних прагнень.'
  - '[!decolonization] Переосмислення фольклору. Автор не просто переказує народні вірування, а використовує їх як будівельний
    матеріал для створення національного міфу, альтернативного імперському.'
  - 'Жанровий аналіз: елементи готичного роману, бурлеску та романтичної новели у творчості письменника.'
  section: 'Світобудова та алегорія: Українська демонологія'
  words: 1200
- points:
  - 'Повернення до розминки: тож, диявол Стороженка — це фігура трагічна чи комічна? Формулювання аргументованої відповіді.'
  - 'Рецепція: як сприймали твори Стороженка в XIX ст. і як їхнє прочитання змінилося сьогодні, в епоху постколоніальних студій?'
  - '[!anti-hagiography] Поза літературою: консервативні, монархічні погляди реального Олекси Стороженка. Чи можна відокремити
    автора від його творів?'
  - 'Сучасна актуальність: чому сьогоднішній український читач знову цікавиться готикою та фантастикою? Що тексти Стороженка
    говорять нам про сучасні страхи та надії?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз образу диявола, готичних елементів та національної алегорії у прозі Олекси Стороженка, зокрема в творах "Закоханий
  чорт" та "Марко Проклятий"
level: LIT-FANTASTIKA
module: lit-fantastika-002
objectives:
- Аналізувати ключові твори Олекси Стороженка, де фігурує образ диявола, в контексті українського романтизму.
- Дослідити, як автор використовує фольклорні та готичні елементи для створення національних алегорій.
- Відрізняти українську готичну традицію від імперських російських наративів на прикладі аналізу текстів.
- Формулювати власну позицію в рамках літературно-критичних дебатів про місце Стороженка в українському каноні.
