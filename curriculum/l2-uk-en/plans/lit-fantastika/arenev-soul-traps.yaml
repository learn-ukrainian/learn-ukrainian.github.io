content_outline:
- points:
  - 'Провокаційне питання: Українська фантастика — це втеча від реальності чи інструмент для її осмислення?'
  - Цитата з "Пасток для душ", що натякає на "душеловство" як метафору культурної асиміляції, без прямого пояснення.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Підліткова" фантастика vs "доросла" література. Чи є такий поділ легітимним? Аргументи за і проти жанрової
    ієрархії в українській літературі.'
  - 'Дебат 2: Місце Арєнєва в каноні. Як твори, що не вписуються в традиційну реалістичну парадигму, здобувають визнання?
    Роль премій, критики та читацької спільноти.'
  - '[!epistemic-humility] Не існує "правильної" відповіді на питання про канон; це постійний процес переговорів та переоцінки.'
  section: 'Конфліктна карта: Жанр, канон і стигма'
  words: 900
- points:
  - Ключовий уривок з роману, що демонструє механіку "полювання на душі" та її наслідки для персонажів.
  - 'Близьке читання: аналіз стилю, діалогів, внутрішніх монологів персонажів.'
  - '[!decolonization] Трактування "Імперії" в романі не як узагальненого зла, а як конкретної алюзії на російський імперський
    проєкт та його методи культурного поглинання.'
  - 'Аналіз системи персонажів: як головні герої втілюють різні стратегії опору чи колаборації.'
  section: 'Читання: Уривок з "Пасток для душ"'
  words: 1800
- points:
  - 'Аналіз законів вигаданого світу: як працює магія, технологія "пасток", соціальна структура Імперії та її околиць.'
  - 'Алегоричне прочитання: "душі" як культурна ідентичність, мова, історична пам''ять. "Душелови" як агенти імперської асиміляції.'
  - '[!decolonization] Порівняння механізмів "душеловства" з реальними історичними практиками русифікації та нищення української
    суб''єктності.'
  - 'Місце твору у світовому контексті: порівняння з класикою антиутопії та соціальної фантастики (Орвелл, Бредбері, Ле Гуїн),
    виявлення специфічно українських рис.'
  section: 'Світобудова та алегорія: "Душеловство" як метафора імперії'
  words: 1200
- points:
  - 'Повернення до розминки: як після детального аналізу виглядає відповідь на питання про роль фантастики?'
  - 'Рецепція творів Арєнєва: як його тексти сприймають в Україні та за кордоном?'
  - '[!anti-hagiography] Критичний погляд на можливі слабкі місця чи суперечності у світобудові або ідеологічному посилі автора.'
  - 'Підсумкова рефлексія для студента: Яку роль відіграє уява та фантазія у спротиві тоталітарним режимам та збереженні ідентичності?'
  section: Дискусія та підсумок
  words: 700
focus: Соціальна критика та національна уява в циклі Володимира Арєнєва "Пастки для душ"; світобудова як алегорія української
  реальності; виклик імперським наративам через фантастику.
level: LIT-FANTASTIKA
module: lit-fantastika-014
objectives:
- Аналізувати твори української фантастики як інструмент соціальної критики та алегорію національної реальності.
- Визначати та обговорювати ключові літературно-критичні дебати навколо жанрової літератури та її місця в каноні.
- Застосовувати деколонізаційну оптику для аналізу світобудови та персонажів у творах Володимира Арєнєва.
- Формулювати власну позицію щодо ролі фантастичної літератури у формуванні сучасної української ідентичності.
