content_outline:
- points:
  - 'Провокація: Чи може штучний інтелект бути зброєю? Або жертвою? Роман Кідрука «Боти» ставить це питання на тлі реальної
    війни.'
  - Цитата з роману про дилему оператора бойового дрона, що має ШІ-напарника.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Боти» — це якісний науково-фантастичний трилер за світовими зразками чи це політична алегорія, яку неможливо
    зрозуміти поза контекстом російсько-української війни?'
  - 'Дебат 2: Автор як інженер vs автор як письменник. Наскільки наукова точність Кідрука допомагає, а наскільки заважає літературній
    якості тексту?'
  - '[!epistemic-humility] Критики розділились: одні бачать у творі глибоку соціальну діагностику, інші — лише захопливий
    сюжет з елементами конспірології.'
  section: 'Конфліктна карта: Жанр чи реальність?'
  words: 900
- points:
  - 'Аналіз сцени першого бойового зіткнення, де ШІ-боти діють пліч-о-пліч з людьми: стиль, динаміка, лексика.'
  - 'Мова персонажів: як мова військових, програмістів та політиків створює поліфонію тексту.'
  - 'Наративна структура: як паралельні сюжетні лінії (розробники, військові, спецслужби) сходяться в одній точці.'
  - '[!decolonization] Твір аналізує гібридну війну, де інформаційні атаки та психологічні операції є не менш руйнівними,
    ніж кінетичні удари. Це пряма відповідь на російські методи ведення війни.'
  section: 'Читання: Уривки з роману "Боти"'
  words: 1800
- points:
  - 'Аналіз "правил гри": як функціонують бойові ШІ в романі? Які обмеження та можливості вони мають?'
  - 'Алегоричний рівень: як поведінка "ворожих" ботів віддзеркалює тактику "зелених чоловічків", проксі-армій та інформаційних
    "ферм", що їх використовує Росія.'
  - 'Технологія як персонаж: чи є ШІ повноцінним учасником конфлікту, чи лише інструментом у руках людей?'
  - '[!decolonization] Роман досліджує вразливість суспільства, що довго існувало в парадигмі "братніх народів", до підступної,
    неоголошеної війни нового типу.'
  section: 'Світобудова та алегорія: Гібридна війна та штучний інтелект'
  words: 1200
- points:
  - 'Повернення до розминки: тож чим є ШІ в романі — зброєю, жертвою чи дзеркалом, що показує людську сутність?'
  - 'Рецепція твору: як "Ботів" сприйняли в Україні та за кордоном? Чому цей текст важливий саме зараз?'
  - '[!anti-hagiography] Критика роману: чи не є запропоновані автором технологічні рішення надто спрощеними? Чи не романтизує
    він війну, перетворюючи її на захопливий трилер?'
  - 'Рефлексія: яке питання, що його ставить роман, є для вас найважливішим і чому?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Макса Кідрука "Боти" як рефлексії на тему гібридної війни, інформаційних технологій та кризи ідентичності
  в сучасній Україні.
