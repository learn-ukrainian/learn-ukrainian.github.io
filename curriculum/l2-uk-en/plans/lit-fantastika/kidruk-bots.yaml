objectives:
- Аналізувати роман Макса Кідрука «Боти» як зразок українського технотрилера та літературну рефлексію на тему гібридної війни.
- Визначати елементи світобудови та алегорії у творі, пов'язуючи їх з українським соціально-політичним контекстом.
- Формулювати власну позицію в літературних дебатах щодо жанрової приналежності та суспільної ролі твору.
- Застосовувати деколонізаційний підхід до аналізу сучасної української літератури, виявляючи способи подолання імперських
  наративів.
