content_outline:
- points:
  - 'Провокація: "Що якби першими словами незалежної марсіанської нації були сказані українською?"'
  - Цитата з роману про "нових Адама і Єву" на червоній планеті, що не знають гріхопадіння земної історії.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Колонія" — це успішна імплементація західних лекал технотрилеру на українському ґрунті, чи це принципово новий
    текст, де жанр є лише оболонкою для постколоніального висловлювання?'
  - 'Дебат 2: Місце Кідрука в каноні. Чи є він "серйозним" письменником, чи автором "масової літератури"? І чи доречна ця
    дихотомія у XXI столітті?'
  - '[!epistemic-humility] Літературна критика пропонує різні оптики: від формалістичного аналізу жанрових кліше до постколоніальних
    студій, що бачать у тексті національну алегорію.'
  section: 'Конфліктна карта: Жанр чи маніфест?'
  words: 900
- points:
  - 'Уривок: Сцена заснування колонії та перші конфлікти з земними корпораціями — як встановлюються правила нового суспільства.'
  - 'Наративна структура: аналіз двох паралельних ліній (події на Марсі та розслідування на Землі). Як вони перетинаються
    і що це дає для розуміння цілого?'
  - 'Система персонажів: чи є герої функціями (вчений, військовий, політик), чи повноцінними особистостями? Роль штучного
    інтелекту "Дріади".'
  - '[!decolonization] Марсіанська боротьба за незалежність від Землі як пряма алегорія багатовікової боротьби України за
    власну суб''єктність. "Метрополія" (Земля) та її інструменти контролю.'
  section: 'Читання: Аналіз "Колонії"'
  words: 1700
- points:
  - 'Аналіз світу: Які фізичні, соціальні та технологічні закони діють у "Колонії"? Наскільки світ є "твердим" (hard sci-fi)?'
  - 'Алегоричний рівень: Як деталі марсіанського світу (брак ресурсів, зовнішня загроза, необхідність єднання) віддзеркалюють
    українські реалії?'
  - 'Мова як елемент світобудови: чому для марсіанських колоністів українська мова стає фундаментом нової ідентичності?'
  - '[!decolonization] Твір як акт культурної меліорації: Кідрук "заселяє" жанр, що традиційно був полем англо-американської
    культури, українськими сенсами та травмами.'
  section: 'Світобудова та алегорія: Марсіанська Україна'
  words: 1200
- points:
  - 'Повернення до розминки: Чи є "Колонія" оптимістичним текстом? Чи можливе створення "ідеальної України" з чистого аркуша,
    навіть на іншій планеті?'
  - 'Рецепція твору: Як сприйняли роман критики та масовий читач? Які дискусії він спровокував у суспільстві?'
  - 'Сучасне значення: Що говорить цей текст про українські мрії та страхи в епоху повномасштабної війни? Якою бачиться майбутня
    перемога?'
  - '[!anti-hagiography] Критичний погляд: чи не є ідея "втечі" на Марс формою ескапізму? Чи не спрощує жанр технотрилеру
    складні соціально-політичні проблеми?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману "Колонія" як зразка українського технотрилера, що досліджує теми постколоніалізму, штучного інтелекту
  та національної суб'єктності через алегорію марсіанської незалежності.
level: LIT-FANTASTIKA
module: lit-fantastika-018
objectives:
- Аналізувати роман 'Колонія' як зразок українського технотрилеру та соціально-філософської фантастики.
- Визначати алегоричні паралелі між сюжетом роману та історією України (колоніалізм, боротьба за незалежність).
- Формулювати власну позицію в літературно-критичних дебатах щодо жанрової приналежності та ідеологічного навантаження твору.
- Критично оцінювати прийоми світобудови, використані автором для створення алегоричного простору.
