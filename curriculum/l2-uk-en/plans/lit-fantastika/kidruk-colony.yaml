activity_hints:
- description: 'Перевірка обох позицій дебату: "Колонія" — це вестернізація української літератури чи її деколонізація? Визначити
    позицію за цитатою.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Ключові поняття з роману: світобудова, алегорія, суб''єктність, тераформування, штучний інтелект — у контексті
    речень з модуля.'
  focus: Термінологія технотрилера
  items: 5
  type: fill-in
- description: Порівняйте образи пустельних планет (Марс у Кідрука, Арракіс у Герберта) як арен для геополітичних та цивілізаційних
    конфліктів. Що спільного та відмінного в їхніх алегоричних функціях?
  focus: 'Порівняльний аналіз: "Колонія" vs "Дюна"'
  type: note
- description: Напишіть есе-роздум (400-600 слів), використовуючи "Колонію" як центральний приклад. Аргументуйте, як жанр
    дозволяє (або не дозволяє) пропрацьовувати травми колоніального минулого та моделювати майбутнє.
  focus: 'Есе: Чи може наукова фантастика бути інструментом деколонізації?'
  type: note
