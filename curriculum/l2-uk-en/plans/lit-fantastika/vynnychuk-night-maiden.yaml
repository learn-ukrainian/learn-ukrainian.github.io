content_outline:
- points:
  - 'Провокація: Чи може Львів бути українським Гоґвортсом? Історія про журналіста, який веде розслідування таємничих смертей,
    відкриває портал у світ, де міфи оживають, а історія – це зброя.'
  - Цитата з роману без контексту, що натякає на існування паралельного, містичного світу в сучасному місті.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: ''Нічний продавець'' — це міське фентезі чи постмодерний історичний роман, що грається з фактами?'
  - 'Дебат 2: ''Львівська міфологія'' у Винничука — це автентичне відродження забутих легенд чи талановитий комерційний конструкт
    для сучасної аудиторії?'
  - '[!epistemic-humility] Літературна критика не дає остаточних відповідей, але ставить гострі питання про те, як ми читаємо
    і конструюємо минуле.'
  section: 'Конфліктна карта: Винничук — містифікатор чи історик?'
  words: 900
- points:
  - 'Уривок: знайомство головного героя з таємним товариством та його правилами.'
  - 'Аналіз наративної структури: як детективне розслідування перетворюється на занурення в окультну історію міста.'
  - 'Система персонажів: журналіст-скептик, таємничий наставник, фатальна жінка — як автор працює з архетипами.'
  - '[!decolonization] Львів Винничука як контр-наратив до імперських (польського, австрійського, радянського) міфів про місто.
    Повернення української суб''єктності.'
  section: 'Читання: Фрагменти з ''Нічного продавця'''
  words: 1700
- points:
  - 'Аналіз правил вигаданого світу: закони магії, ієрархія таємних товариств, артефакти.'
  - 'Алегоричне прочитання: Що приховані товариства та давні прокляття кажуть про стосунки сучасної України з її минулим та
    прихованими травмами?'
  - 'Жанрові конвенції: як роман вписується у світову традицію міського фентезі (Ніл Ґейман, Чайна М''євіль), зберігаючи українську
    ідентичність.'
  - '[!decolonization] Використання української демонології та фольклору як основи для унікального фентезійного світу, на
    противагу запозиченим англо-саксонським моделям.'
  section: 'Світобудова та алегорія: Міфологія містичного Львова'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи є Львів українським Гоґвортсом? Формулювання відповіді на основі аналізу.'
  - 'Історія рецепції: як критики та читачі сприйняли роман? Які дискусії він викликав?'
  - '[!anti-hagiography] Критичний погляд на творчість Винничука: звинувачення в епатажності, надмірній еротизації та вільній
    грі з історичними фактами.'
  - 'Сучасне значення: Чому жанр історичного фентезі та альтернативної історії став таким популярним в Україні після 2014
    року?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Юрія Винничука 'Нічний продавець' як твору міського фентезі та соціальної сатири, дослідження міфології
  Львова та коментар до сучасного українського суспільства.
level: LIT.FANTASTIKA
module: lit-fantastika-011
objectives:
- Аналізувати роман 'Нічний продавець' як зразок українського міського фентезі, визначаючи його жанрові особливості.
- Критично оцінювати авторську концепцію 'міфології Львова', розрізняючи історичні факти, літературну вигадку та соціальну
  сатиру.
- Формулювати власну позицію в дебаті про співвідношення розважального та соціально-критичного компонентів у сучасній українській
  фантастиці.
- Пояснювати, як фантастична література може слугувати інструментом деколонізації культурного простору.
pedagogy: CBI
