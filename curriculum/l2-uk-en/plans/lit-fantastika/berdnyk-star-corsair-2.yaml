  pos: ж.
  word: алегорія
- definition: піджанр фантастики, що фокусується на романтичних та масштабних космічних пригодах, часто з елементами мелодрами.
  pos: ж.
  word: космічна опера
- definition: у Бердника — гіпотетична сфера розуму, інформаційне поле Землі та Космосу, що об'єднує свідомості всіх істот.
  pos: ж.
  word: ноосфера
- definition: сукупність таємних, прихованих знань, доступних лише для вузького кола "посвячених"; часто протиставляється
    науці.
  pos: ж.
  word: езотерика
- definition: здатність бути активним творцем власної долі, а не пасивним об'єктом зовнішніх впливів; ключове поняття для
    постколоніальних студій.
  pos: ж.
  word: суб''єктність
- definition: опис ідеального, неіснуючого суспільного ладу; у Бердника — проект майбутньої духовної цивілізації на Землі.
  pos: ж.
  word: утопія
- definition: неприйняття норм, цінностей та традицій, що панують у суспільстві; прагнення діяти всупереч загальновизнаним
    стандартам.
  pos: ч.
  word: нонконформізм
