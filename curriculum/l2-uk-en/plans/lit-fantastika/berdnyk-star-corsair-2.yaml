objectives:
- Аналізувати роман "Зоряний корсар" як ключовий твір української філософської фантастики
- Оцінювати внесок Олеся Бердника у формування альтернативного, нерадянського бачення української ідентичності та майбутнього
- Розрізняти алегоричний та буквальний рівні прочитання у спекулятивній літературі
- Формулювати власну позицію в літературно-критичних дебатах щодо місця Бердника в українському літературному каноні
