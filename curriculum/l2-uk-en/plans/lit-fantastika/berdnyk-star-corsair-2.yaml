content_outline:
- points:
  - 'Провокація: Чи може космічний корабель бути символом національного визволення? Розглядаємо "Зоряний корсар" не як казку,
    а як політичний маніфест.'
  - 'Уривок з роману про політ крізь "океан ноосфери" — що це: поетична метафора, наукова гіпотеза чи релігійне прозріння?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Бердник — радянський фантаст чи дисидент? Аналіз його творчості в контексті цензури. Чи був він "дозволеним"
    вільнодумцем, чи його тексти були актом підривної діяльності?'
  - 'Дебат 2: Місце Бердника в каноні. Чому його вважали маргіналом у 70-ті, а сьогодні називають пророком? Хто і чому просуває
    його повернення в літературний пантеон?'
  - '[!epistemic-humility] Інтерпретації творчості Бердника коливаються від "геніального провидця" до "графомана-езотерика".
    Немає "правильної" відповіді, є лише рівень аргументації.'
  section: 'Конфліктна карта: Радянська фантастика чи українська утопія?'
  words: 900
- points:
  - 'Аналіз ключових сцен: діалог Корсара з Великим Всесвітнім Розумом, створення Аеліти, битва з "чорним драконом" імперії.'
  - 'Система персонажів: Корсар як бунтівний дух, Гриць як земний скептик, Аеліта як ідеал. Чи є вони психологічними характерами,
    чи філософськими алегоріями?'
  - '[!decolonization] Творчість Бердника — не "молодший брат" російської фантастики (Стругацькі, Єфремов). Його джерела —
    український космізм (Вернадський, Ціолковський) та філософія серця (Сковорода, Юркевич).'
  - 'Наративна структура: як поєднуються елементи космічної опери, фольклорної казки та філософського трактату.'
  section: 'Читання: Уривки з роману "Зоряний корсар"'
  words: 1800
- points:
  - 'Аналіз світу: Які закони діють у "Всесвіті Розуму"? Що таке "ноосфера" в розумінні Бердника і як вона відрізняється від
    версії Вернадського?'
  - 'Алегоричне прочитання: "Імперія темряви" як метафора СРСР. "Корсар" як символ України, що виривається з колоніального
    минулого.'
  - '[!decolonization] Жанрові конвенції: Бердник використовує тропи американської "space opera", але наповнює їх українським
    змістом — туга за волею, ідея соборності, культ "Роду".'
  - 'Мова як світотворення: аналіз авторських неологізмів ("світломисль", "вогнетіла") та їх роль у побудові фантастичного
    світу.'
  section: 'Світобудова та алегорія: Космос як внутрішній світ'
  words: 1200
- points:
  - 'Повернення до розминки: Чи є "Зоряний корсар" політичним маніфестом? Формулювання відповіді на основі аналізу.'
  - 'Історія рецепції: Як сприймали твір у 60-х, 80-х (після ув''язнення автора) і зараз? Чому він знову актуальний?'
  - '[!anti-hagiography] Критичний погляд: Окрім візіонерства, у текстах Бердника є елементи окультизму та сектантства. Як
    відділити літературну вартість від сумнівних ідеологічних конструкцій?'
  - 'Сучасне значення: Чи можуть ідеї "космічного гуманізму" Бердника бути відповіддю на виклики сучасності (екологічна криза,
    війни, штучний інтелект)?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Олеся Бердника "Зоряний корсар" як зразка української філософської фантастики, його алегоричний вимір
  та роль у формуванні нонконформістської культурної традиції.
