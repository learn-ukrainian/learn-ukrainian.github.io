content_outline:
- points:
  - 'Провокація: чому підліток, що пише про ритуали, мертвих і дивні культи, став голосом цілого покоління на початку 2000-х?'
  - Цитата з "Архе" про "мертвий час" без контексту.
  - 'Паралель: сучасні молодіжні субкультури в Україні та їхній пошук "справжності" — чим це схоже на героїв Дереша?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літературний феномен vs віковий феномен. Дереш — це серйозний автор з унікальною мовою, чи його популярність
    — це лише влучне потрапляння в запит покоління "дітей незалежності"?'
  - 'Дебат 2: Український Лавкрафт чи епігон західної мас-культури? Критики звинувачували Дереша в наслідуванні Стівена Кінга
    та комп''ютерних ігор. Прихильники бачили в цьому створення нового українського міфу.'
  - '[!epistemic-humility] Немає єдиної відповіді. Аналіз показує, як критика змінювала свої оцінки від захоплення до розчарування
    і назад з кожною новою книгою автора.'
  section: 'Конфліктна карта: Герметичний геній чи підлітковий графоман?'
  words: 900
- points:
  - 'Ключовий уривок: опис міста-сновидіння Міфогорськ та його дивних мешканців.'
  - 'Аналіз структури: як "гра в бісер" Германа Гессе вплинула на композицію роману.'
  - 'Наративна голос: розповідь від імені кількох персонажів — створення поліфонічного, але герметичного світу.'
  - '[!decolonization] Дереш створює абсолютно нову, власну міфологію, вільну від радянських чи російських культурних кодів.
    Його герої живуть у світі, де Україна — це даність, а не предмет рефлексії.'
  section: 'Читання: Уривок з роману "Архе"'
  words: 1700
- points:
  - 'Правила світу: що таке "мертвий час"? Хто такі "кокони" та "метелики"? Аналіз унікальної космогонії романів Дереша.'
  - 'Алегорія: чи є "Архе" метафорою України 1990-х — "мертвого часу" між радянським минулим і неясним майбутнім?'
  - 'Жанрові конвенції: як Дереш поєднує елементи готики, магічного реалізму та підліткової прози, створюючи унікальний жанровий
    гібрид.'
  - '[!decolonization] Мова Дереша як інструмент деколонізації свідомості: він використовує суржик та сленг не як ознаку "низької
    культури", а як живу, автентичну мову свого покоління.'
  section: 'Світобудова та алегорія: Езотерика як втеча'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому Дереш став "голосом покоління"? Відповідь через аналіз його світобудови як ескапістської
    відповіді на історичну травму.'
  - 'Рецепція: як читачі 2000-х сприймали його тексти, і як вони читаються зараз, після 2014 та 2022 років?'
  - 'Сучасне значення: чи залишився Дереш актуальним? Чи його езотеричний світ може щось сказати сучасній Україні, яка бореться
    за існування в реальному світі?'
  - '[!anti-hagiography] Критичний погляд на еволюцію автора: від ранніх "герметичних" текстів до пізніших, більш "духовних"
    та комерційно орієнтованих творів.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз ранньої творчості Любка Дереша ("Архе", "Поклоніння ящірці") як зразка української езотеричної фантастики та
  соціальної алегорії. Світобудова Дереша як відповідь на пост-радянську кризу ідентичності.
level: LIT-FANTASTIKA
module: lit-fantastika-024
objectives:
- Аналізувати творчість Любка Дереша в контексті української постмодерної та фантастичної літератури
- Дослідити, як світобудова в його творах відображає соціальні та культурні кризи пост-радянської України
- Розрізняти та аргументовано обговорювати різні критичні інтерпретації творчості автора
- Застосовувати деколонізаційну оптику для аналізу мови та тематики сучасної української прози
pedagogy: CBI
