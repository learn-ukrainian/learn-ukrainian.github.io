content_outline:
- points:
  - 'Провокаційне питання: Чи може кіборг, створений радянською системою, мріяти про свободу? Цитата з твору Росоховатського,
    де машина виявляє людські емоції.'
  - 'Сучасний паралель: кіборги з ДАП vs кіборги Росоховатського — як змінилося значення слова і що це говорить про українське
    суспільство?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Лояльний радянський фантаст чи прихований дисидент? Аналіз езопової мови та цензурних правок у творах Росоховатського.'
  - 'Дебат 2: Чи є «кіборги» Росоховатського лише наслідуванням західної НФ (Азімов, Шеклі), чи це унікальний український
    кіберпанк?'
  - '[!epistemic-humility] Позиція 1: Росоховатський — продукт системи, що оспівував науково-технічний прогрес в СРСР.'
  - '[!decolonization] Позиція 2: Його твори — це алегорія на тему втрати людяності та національної ідентичності в тоталітарному
    суспільстві.'
  section: 'Конфліктна карта: Радянська утопія чи антирадянська алегорія?'
  words: 900
- points:
  - 'Уривок з тексту: центральна сцена перетворення людини на кіборга, психологічний злам героя.'
  - 'Аналіз сюжету: розрив між фізичною реальністю та внутрішнім світом героя як основний конфлікт.'
  - 'Система персонажів: герой-кіборг, інженер-творець, байдужий апаратник — хто головний антагоніст?'
  - '[!decolonization] Порівняння з російською фантастикою того часу (Стругацькі): чи є в Росоховатського специфічно український
    погляд на імперський центр і периферію?'
  section: 'Читання: Аналіз оповідання «Побачити обрій»'
  words: 1700
- points:
  - 'Правила світу: які закони керують кіборгізацією? Чи є вона добровільною? Які соціальні наслідки?'
  - 'Алегоричне читання: Кіборг як метафора «нової радянської людини» — без емоцій, без національної пам''яті, повністю функціональний.'
  - '[!decolonization] Мова і стиль: науково-технічний жаргон, неологізми, та контраст між «сухою» мовою описів і «людськими»
    внутрішніми монологами героя.'
  - '[!myth-buster] Росоховатський — не просто фантаст. Він був кандидатом хімічних наук. Його світи науково обґрунтовані,
    що відрізняє його від багатьох колег.'
  section: 'Світобудова та алегорія: Технократична утопія і тіло як конструктор'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи можуть кіборги Росоховатського мріяти? Формулювання власної аргументованої відповіді.'
  - 'Історія рецепції: як сприймали твори у 70-х, і як їх читають зараз, після досвіду війни та появи «кіборгів»-захисників.'
  - '[!anti-hagiography] Чи не є захоплення Росоховатським сьогодні спробою знайти «нашого Азімова» і ретроактивно сконструювати
    потужну традицію там, де її, можливо, не було в такому масштабі?'
  - 'Сучасне значення: що пророцтва Росоховатського говорять нам про сучасні загрози дегуманізації та технологічного контролю?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз «кіборг-циклу» Ігоря Росоховатського, перетин радянської НФ та української ідентичності, світобудова як соціальна
  алегорія, рецепція творів у сучасності.
level: LIT-FANTASTIKA
module: lit-fantastika-009
objectives:
- Аналізувати цикл творів Ігоря Росоховатського про кіборгів як унікальне явище на перетині української літератури та світової
  наукової фантастики.
- Визначати та інтерпретувати алегоричні та деколонізаційні мотиви у текстах, написаних в умовах радянської цензури.
- Формулювати аргументовану позицію в рамках літературно-критичних дебатів щодо місця автора в каноні української літератури.
- Критично порівнювати авторський концепт «кіборга» із сучасним значенням цього слова в українському суспільному дискурсі.
