activity_hints:
- description: Перевірка обох позицій дебату. Чия це теза — прихильників «радянського проекту» чи «деколоніальної оптики»?
    Визначити позицію за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити у речення з модуля специфічні терміни та неологізми автора (кіборгізація, сигом, психотронний контроль
    тощо).
  focus: Термінологія Росоховатського
  items: 5
  type: fill-in
- description: 'Подано два тексти: уривок з твору Росоховатського, де описується кіборг, та уривок сучасної статті про захисників
    ДАП. Порівняйте: що спільне, що відмінне в образах? Чому відбувся такий семантичний зсув?'
  focus: 'Порівняльний аналіз: Кіборг тоді і зараз'
  type: note
- description: Чи можна вважати твори Росоховатського пророчими? Які аспекти сучасного суспільства (технології, війна, ідентичність)
    він передбачив, а в чому помилився? Аргументуйте свою думку на основі текстів з модуля (400-600 слів).
  focus: 'Есе: Пророцтва Росоховатського'
  type: note
