content_outline:
- points:
  - 'Провокація: Чи може наукова фантастика бути формою національного спротиву? Розглядаємо цитату Бердника про «вибір майбутнього»
    як єдину справжню свободу.'
  - 'Загадка: що спільного між українським рушником, космічним кораблем і філософією серця? Відповідь — у творах Бердника.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Бердник — письменник-фантаст чи філософ-містик? Аналіз його творів крізь призму жанрових канонів НФ (Asimov,
    Clarke) vs критеріїв філософської прози (Hesse, Camus).'
  - 'Дебат 2: Чи можна відокремити літературну спадщину Бердника від його суперечливої громадської діяльності та пізніх езотеричних
    поглядів? [!epistemic-humility] — розглядаємо аргументи за і проти.'
  - '[!anti-hagiography] Постать Бердника як дисидента, в''язня сумління, а потім — засновника «духовної республіки». Як ці
    ролі відображались у його текстах, і де проходила межа між автором та його ліричним героєм.'
  section: 'Конфліктна карта: Утопія чи езотерика?'
  words: 900
- points:
  - 'Уривок з роману «Зоряний корсар»: знайомство з головним героєм, концепція «космічної свідомості».'
  - 'Аналіз наративу: як Бердник поєднує авантюрний сюжет космічної опери з глибокими філософськими роздумами.'
  - 'Характерна система: персонажі як носії ідей — архетипи «шукача», «мудреця», «бунтаря» в його творах.'
  - '[!decolonization] «Зоряний корсар» як відповідь на радянську «фантастику ближнього прицілу». Бердник пропонує не технологічну,
    а духовну еволюцію людства, що прямо суперечило матеріалістичній доктрині СРСР.'
  section: 'Читання: Зоряний корсар'
  words: 1800
- points:
  - 'Аналіз світобудови: Всесвіт у Бердника як жива, одухотворена сутність («Океан Космосу»). Як закони його всесвітів відрізняються
    від класичних фізичних законів?'
  - 'Алегорія 1: Планети-в''язниці та імперії зла як метафора тоталітарних режимів і, зокрема, СРСР.'
  - 'Алегорія 2: Пошук «духовної батьківщини» у космосі як віддзеркалення пошуку української ідентичності в умовах бездержавності.'
  - '[!decolonization] Як Бердник інтегрує елементи української міфології та філософії кордоцентризму (Сковорода, Юркевич)
    у космічний антураж, створюючи унікальний український мета-міф.'
  section: 'Світобудова та алегорія: Космічний кордоцентризм'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може фантастика бути зброєю? Формулюємо відповідь, спираючись на аналіз творів Бердника.'
  - 'Рецепція творчості: чому Бердник був культовою фігурою в радянські часи, і чому його популярність знизилась у незалежній
    Україні?'
  - 'Сучасне значення: Чи актуальні ідеї Бердника про духовну еволюцію, трансгуманізм та ноосферу в епоху ШІ та екологічних
    криз?'
  - 'Рефлексія: Яка ідея Бердника здалася вам найбільш радикальною чи надихаючою і чому?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз творчості Олеся Бердника як явища на перетині наукової фантастики, філософії та українського spiritualism-у,
  з акцентом на деколонізаційному потенціалі його світобудови.
level: LIT.FANTASTIKA
module: lit-fantastika-008
objectives:
- Аналізувати творчість Олеся Бердника як унікальне явище на перетині наукової фантастики, філософії та українського духовного
  традиціоналізму.
- Визначати, як Бердник використовував інструменти фантастики для деколонізаційних цілей та утвердження української суб’єктності
  в умовах радянського культурного тиску.
- Досліджувати принципи світобудови у романах Бердника, виявляючи алегоричні зв''язки з українською історією та культурними
  архетипами.
- Формулювати власну позицію в літературних дебатах щодо жанрової приналежності та спадщини автора.
