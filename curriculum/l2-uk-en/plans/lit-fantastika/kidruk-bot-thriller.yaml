activity_hints:
- description: 'Кому належить теза: критикам, що вважають Кідрука "жанровим", чи тим, хто бачить його в "каноні"? Розподіліть
    аргументи.'
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставте правильні терміни (технотрилер, світобудова, алегорія, саспенс, суб'єктність) у речення з аналізом
    творів Кідрука.
  focus: Термінологія фантастики
  items: 5
  type: fill-in
- description: Прочитайте короткий синопсис роману "Сфера" Майкла Крайтона. Напишіть 3-4 тези, що є спільного та відмінного
    у підходах Кідрука та Крайтона до жанру технотрилера.
  focus: 'Порівняльний аналіз: Кідрук vs. Захід'
  type: note
- description: 'На основі аналізу романів Кідрука напишіть есе (400-600 слів) на тему: "Як наукова фантастика допомагає нації
    переосмислити своє минуле та спроектувати майбутнє?".'
  focus: 'Есе: Фантастика як інструмент деколонізації'
  type: note
