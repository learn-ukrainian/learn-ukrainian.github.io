content_outline:
- points:
  - 'Провокація: Чи може книга про роботів-убивць та космічні колонії бути «великою літературою»? І що, якщо саме така література
    потрібна Україні сьогодні?'
  - 'Цитата з роману «Колонія»: "Історія — це війна за майбутнє, яку ведуть зброєю з минулого". Як це стосується української
    фантастики?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Технотрилер vs. «висока полиця». Аргументи критиків, що вважають Кідрука автором розважального чтива, проти
    аргументів тих, хто бачить у ньому соціального коментатора.'
  - 'Дебат 2: Український Крайтон чи самобутнє явище? Наскільки проза Кідрука є адаптацією західних лекал, а наскільки — відповіддю
    на унікальні українські виклики.'
  - '[!epistemic-humility] Не існує єдиної відповіді. Статус письменника визначається не лише якістю тексту, але й запитом
    суспільства та боротьбою в критичному полі.'
  section: 'Конфліктна карта: Кідрук — жанровий чи канонічний?'
  words: 900
- points:
  - 'Текст: сцена першого зіткнення програміста з неконтрольованим штучним інтелектом.'
  - 'Аналіз структури: як Кідрук будує напругу (саспенс) за допомогою технічних деталей та психології персонажа.'
  - 'Наративна голос: технократичний, точний, але водночас емоційний. Як цей стиль працює на ідею твору?'
  - '[!decolonization] Кідрук свідомо вписує українських персонажів (програмістів, вчених) у глобальний технологічний контекст,
    утверджуючи їхню суб’єктність і відходячи від постколоніального комплексу меншовартості.'
  section: 'Читання: Уривок з роману «Бот»'
  words: 1700
- points:
  - 'Аналіз світу в романі «Колонія»: правила, фракції, технології. Як створено відчуття реалістичного майбутнього?'
  - 'Алегорія колоніалізму: Марс як метафора України. Боротьба за незалежність, мовне питання, стосунки з метрополією (Землею).'
  - 'Алегорія в «Жорстокому небі»: несправність техніки як метафора несправної, корумпованої державної системи.'
  - '[!decolonization] Фантастичні світи Кідрука дозволяють моделювати та аналізувати цілком реальні травми української історії:
    втрату суб''єктності, асиміляцію, боротьбу за ресурси та ідентичність.'
  section: 'Світобудова та алегорія: Технологія як колонізатор'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може технотрилер бути «великою літературою»? Формулювання власної позиції на основі аналізу.'
  - 'Рецепція: як змінювалося ставлення до Кідрука від перших романів до сьогодні? Роль фан-спільноти.'
  - 'Сучасне значення: яку роль відіграє Кідрук у популяризації читання та української науки? Чи є він "інфлюенсером" від
    літератури?'
  - '[!anti-hagiography] Критика ранніх творів: надмірна деталізація, спрощені персонажі. Еволюція Кідрука як письменника
    — це шлях від інженера до гуманіста.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз творчості Макса Кідрука як феномену сучасного українського технотрилеру та наукової фантастики. Соціальна критика
  та деколоніальні алегорії у його творах.
level: LIT-FANTASTIKA
module: lit-fantastika-021
objectives:
- Аналізувати творчість Макса Кідрука в контексті українського та світового технотрилеру, виявляючи риси жанру.
- Інтерпретувати алегорії колоніалізму, асиміляції та боротьби за суб''єктність у фантастичних світах письменника.
- Формулювати аргументовану позицію в літературній дискусії щодо місця "жанрової" літератури в національному каноні.
- Розрізняти авторський стиль Кідрука, аналізуючи, як побудова саспенсу та наукова деталізація працюють на ідейний задум твору.
