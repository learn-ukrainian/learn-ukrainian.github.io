content_outline:
- points:
  - 'Провокація: «Сонячна машина» дарує людству безмежну енергію та їжу. Чому ж ця утопія призводить до хаосу, розпаду цивілізації
    та диктатури?'
  - Цитата з роману про перші дні "вивільнення" від праці — без контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є роман гімном анархо-комуністичній утопії, як мріяв сам автор, чи геніальним пророцтвом про небезпеку будь-якої
    соціальної інженерії?'
  - 'Дебат 2: Місце твору в каноні. Це серйозний філософський роман, що випередив свій час, чи талановита, але хаотична бульварна
    фантастика?'
  - '[!epistemic-humility] Позиції радянських, еміграційних та сучасних критиків кардинально відрізняються, що унеможливлює
    єдину "правильну" інтерпретацію.'
  section: 'Конфліктна карта: Утопія чи антиутопія?'
  words: 900
- points:
  - 'Ключовий уривок: Паніка та ейфорія на вулицях Берліна після ввімкнення машини.'
  - 'Аналіз наративу: Як Винниченко зображує психологію натовпу, звільненого від необхідності працювати та дотримуватися законів?'
  - 'Система персонажів: Принц, інженер Штор, комуніст Арпад — як різні соціальні класи та ідеології реагують на кінець світу,
    який вони знали?'
  - '[!decolonization] Роман написаний у діалозі з європейським модернізмом (Веллс, Чапек), а не як наслідування російської
    літератури. Це самостійний український інтелектуальний проєкт.'
  section: 'Читання: Сцени колапсу старого світу'
  words: 1700
- points:
  - 'Правила нового світу: аналіз принципів роботи "сонячної машини" та її впливу на біологію та психологію людини.'
  - 'Алегорія влади: Як спроба збудувати безвладне суспільство призводить до виникнення нової, ще жорстокішої диктатури на
    чолі з "Інергархією"?'
  - 'Критика капіталізму та державного соціалізму: Роман можна прочитати як подвійну критику — і світу грошей, і світу примусової
    праці в ім''я держави.'
  - '[!decolonization] Тема звільнення від гнітючих структур (праці, держави, моралі) як алегорія віковічної мрії України
    про звільнення від імперії.'
  section: 'Світобудова та алегорія: Анархічний експеримент'
  words: 1200
- points:
  - 'Повернення до розминки: Так чому ж утопія провалилася? Формулювання відповіді на основі аналізу тексту.'
  - 'Історичний контекст: Роман як реакція на Першу світову війну, революції та крах імперій.'
  - 'Сучасна релевантність: "Сонячна машина" в епоху дискусій про штучний інтелект, базовий дохід та автоматизацію. Чи актуальні
    попередження Винниченка сьогодні?'
  - '[!anti-hagiography] Роман відображає суперечливі, часом наївні, а часом небезпечні політичні погляди самого Винниченка,
    який був не іконою, а складною історичною постаттю.'
  section: Дискусія та підсумок
  words: 800
focus: 'Vynnychenko''s "The Solar Machine": utopia vs. dystopia, anarchist ideals, the "new human," and sci-fi as social critique.'
level: LIT-FANTASTIKA
module: lit-fantastika-004
objectives:
- Аналізувати "Сонячну машину" як зразок української наукової фантастики та філософського роману.
- Оцінювати аргументи в літературній дискусії про твір як утопію та антиутопію, формулюючи власну позицію.
- Інтерпретувати алегоричний вимір твору, пов'язуючи світобудову роману з політичними та соціальними ідеями Винниченка.
- Розглядати роман у контексті європейського модернізму та українського визвольного руху, застосовуючи деколонізаційну оптику.
