content_outline:
- points:
  - 'Провокація: "Імперії починаються там, де закінчується уява." Як уривок з "Пороху з драконових кісток" без контексту змушує
    нас замислитися над природою влади та історії?'
  - 'Загадковий артефакт: опис дивного предмету з тексту. Яку роль він відіграє у світі, де минуле — це буквально велетенський
    скелет під ногами?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Порох" — це "справжня" наукова фантастика, стімпанк чи "лише" підліткове фентезі? Аргументи за і проти кожного
    з таборувань.'
  - 'Дебат 2: Чи може твір, що здобув премію BBC Дитяча Книга Року, бути серйозною дорослою літературою? Дискусія про межі
    між "високою" та "жанровою" літературою в сучасному каноні.'
  - '[!epistemic-humility] Критики сперечаються, чи є "Порох" алегорією пострадянського простору, чи універсальною історією
    про дорослішання та владу. Обидві позиції мають сильні аргументи.'
  section: 'Конфліктна карта: Жанрові ігри та канон'
  words: 900
- points:
  - 'Ключова сцена: аналіз діалогу між студентами-медиками, що вивчають кістки велетня. Як їхні розмови відображають різні
    підходи до історії та пам''яті?'
  - 'Наративна техніка: голос оповідача — чи він об''єктивний хронікер, чи активний учасник, що маніпулює читачем?'
  - '[!decolonization] Текст Арєнєва як відповідь на імперський наратив: замість "великої російської культури" — унікальний,
    самодостатній світ, що будує свою ідентичність на власних, а не нав''язаних, міфах та кістках.'
  section: 'Читання: Уривок з "Пороху з драконових кісток"'
  words: 1700
- points:
  - 'Анатомія світу: Як влаштована держава, що буквально стоїть на скелеті переможеного "іншого"? Які політичні, соціальні
    та релігійні системи це породжує?'
  - 'Алегорія пам''яті: "Порох" як метафора України, що будує своє майбутнє на залишках імперії. Що означає "перетравлювати"
    минуле? Які частини варто зберегти, а які — відкинути?'
  - '[!decolonization] Жанр як інструмент: Арєнєв використовує конвенції фентезі та стімпанку не для ескапізму, а для гострої
    соціальної критики та моделювання сценаріїв майбутнього для постколоніального суспільства.'
  section: 'Світобудова та алегорія: Місто на кістках'
  words: 1200
- points:
  - 'Повернення до розминки: що уривок з початку модуля говорить нам тепер, після детального аналізу? Як змінилося ваше сприйняття?'
  - 'Рецепція: як критики та читачі в Україні та за кордоном (після перекладів) інтерпретували роман? Чи побачили вони деколоніальний
    підтекст?'
  - 'Сучасне значення: чому твори Арєнєва є важливими для України, що воює? Як фантастика допомагає осмислити реальність та
    уявити перемогу?'
  - '[!anti-hagiography] Попри успіх, чи не є світ "Пороху" занадто ескапістським? Чи не відволікає він від нагальних проблем
    реального світу? Критичний погляд на роль жанрової літератури.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз творчості Володимира Арєнєва, зокрема циклу про місто-державу на кістках велетня. Дослідження світобудови як
  деколоніального інструменту, дебати про чистоту жанру та місце твору в сучасному українському каноні.
level: LIT-FANTASTIKA
module: lit-fantastika-013
objectives:
- Аналізувати, як українська наукова фантастика та фентезі використовуються для соціальної критики та деколонізації.
- Аргументувати власну позицію в літературно-критичних дебатах щодо жанрової чистоти та місця твору в каноні.
- Інтерпретувати складні алегорії та символічні системи у творах сучасної української літератури.
- Розрізняти та аналізувати елементи світобудови (worldbuilding) як самостійного художнього інструменту.
