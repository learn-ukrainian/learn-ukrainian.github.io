activity_hints:
- description: Кому належить теза? Розподіліть аргументи між прихильниками "високої" та "жанрової" літератури.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставте в речення ключові поняття з модуля: алегорія, стімпанк, суб''єктність, канон, деколонізація.'
  focus: Термінологія світобудови
  items: 5
  type: fill-in
- description: Напишіть коротке есе (300-400 слів), в якому поясніть, як структура міста-держави в "Поросі" є алегорією на
    пост-імперський стан України.
  focus: 'Аналіз алегорії: Місто та Імперія'
  type: note
- description: Займіть позицію в "Дебаті 2". Чи вважаєте ви "Порох..." серйозною літературою, гідною канону, чи талановитою,
    але все ж підлітковою розвагою? Аргументуйте свою відповідь (400-600 слів).
  focus: 'Критична відповідь: Ваше місце в дебаті'
  type: note
