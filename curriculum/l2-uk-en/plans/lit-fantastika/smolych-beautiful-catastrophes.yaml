content_outline:
- points:
  - 'Провокація: Чи може технологічний рай бути пеклом? Уривок зі Смолича про ідеальне суспільство, де немає місця для людських
    почуттів.'
  - 'Питання до студента: Яку "катастрофу" ви бачите в цій "прекрасній" картині світу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Смолич — це апологет комунізму чи прихований критик? Аргументи "за" (оспівування технічного прогресу, колективізму)
    та "проти" (трагічні фінали, знецінення особистості).'
  - 'Дебат 2: Український футуризм — це провінційна копія російського чи самобутнє явище? Порівняння з тогочасними радянськими
    фантастами.'
  - '[!epistemic-humility] Немає єдиної відповіді. Творчість Смолича — це поле боротьби суперечливих ідей, що відображало
    драму цілого покоління.'
  section: 'Конфліктна карта: Ідеологія чи дисидентство?'
  words: 900
- points:
  - 'Аналіз сюжету: шлях головного героя від ентузіазму до розчарування. Як структура роману відображає крах утопічних ідеалів.'
  - 'Система персонажів: інженер-творець, партійний функціонер, "стара" інтелігенція. Хто з них є справжнім героєм, а хто
    — лиходієм?'
  - '[!decolonization] Смолич, на відміну від багатьох російських фантастів, ставить у центр не імперську велич, а долю українського
    суспільства в глобальному проекті майбутнього.'
  - 'Мова твору: неологізми, техніцизми, футуристична поетика — як Смолич конструює мову майбутнього?'
  section: 'Читання: Уривки з "Прекрасної катастрофи"'
  words: 1700
- points:
  - 'Аналіз світу: Як влаштований соціум у "Прекрасних катастрофах"? Які закони ним керують? Де джерело енергії, їжі, контролю?'
  - 'Алегоричний рівень: Що "прекрасна катастрофа" говорить про реалії НЕПу та індустріалізації в УСРР? (наприклад, тема знищення
    села заради міста).'
  - 'Жанрові конвенції: Зв''язок з творами Веллса, Гакслі, Замятіна. Як Смолич вписується у світовий канон антиутопії, залишаючись
    при цьому глибоко українським автором?'
  - '[!myth-buster] Поширений міф, що вся радянська фантастика була пропагандою. Творчість Смолича доводить, що це був простір
    для складної соціальної критики.'
  section: 'Світобудова та алегорія: Технократична утопія 1920-х'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, в чому полягає "прекрасна катастрофа" Смолича? Формулювання відповіді на основі аналізу.'
  - '[!anti-hagiography] Подальша доля автора: як футурист і критик системи перетворився на лояльного радянського письменника?
    Дискусія про компроміси та трагедію митця в тоталітарній державі.'
  - 'Сучасне значення: Чому романи 100-річної давнини про утопію актуальні сьогодні, в епоху штучного інтелекту та тотального
    контролю?'
  - 'Рефлексія: Які питання до нашого власного "прекрасного" сьогодення ставить текст Смолича?'
  section: Дискусія та підсумок
  words: 700
focus: Юрій Смолич, "Прекрасні катастрофи", український футуризм, утопія vs антиутопія, соціальна критика через фантастику,
  деколоніальний аналіз радянської наукової фантастики.
level: LIT-FANTASTIKA
module: lit-fantastika-005
objectives:
- Аналізувати трилогію Юрія Смолича «Прекрасні катастрофи» як зразок українського футуризму та соціальної фантастики
- Критично оцінювати роль радянської наукової фантастики у формуванні та деконструкції національних міфів
- Розрізняти утопічні та антиутопічні елементи у світобудові твору та їхній алегоричний зв'язок з реаліями 1920-х років
- Формулювати аргументовану позицію в літературних дебатах щодо ідеологічної функції та художньої цінності твору
