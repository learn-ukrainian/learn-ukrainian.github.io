activity_hints:
- description: 'Кому належить теза: апологету радянської влади чи її прихованому критику? Розподіліть аргументи з дебату.'
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставте в речення з модуля правильні терміни: утопія, антиутопія, світобудова, футуризм, алегорія.'
  focus: Термінологія футуризму та фантастики
  items: 5
  type: fill-in
- description: 'Прочитайте уривок з роману "Ми" Євгена Замятіна. Порівняйте його зі світом "Прекрасної катастрофи": що спільного
    у зображенні технократичного суспільства, а в чому принципова відмінність підходів?'
  focus: 'Порівняльний аналіз: Смолич vs Замятін'
  type: note
- description: 'На основі аналізу роману Смолича напишіть есе (400-600 слів) на тему: "Яку ціну готове заплатити суспільство
    за технологічний прогрес та соціальну стабільність, і де проходить межа?".'
  focus: 'Есе: Ціна прогресу'
  type: note
