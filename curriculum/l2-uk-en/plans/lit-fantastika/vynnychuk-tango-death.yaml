content_outline:
- points:
  - 'Провокація: Чотири друзі, чотири нації, одне місто. Чи може пам''ять Львова бути спільною, якщо історія була такою різною?
    І чия версія "Танґа смерті" є справжньою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жанрова приналежність — це магічний реалізм у дусі Маркеса, чи це історична фентезі, що використовує історію
    як сировину для міфу?'
  - 'Дебат 2: Це ностальгійний текст про мультикультурний "золотий вік" Львова чи, навпаки, постколоніальна критика самого
    міфу про "щасливу Австрію"?'
  - '[!epistemic-humility] Текст Винничука дозволяє обидві інтерпретації, і саме в цій двозначності полягає його сила.'
  section: 'Конфліктна карта: Пам''ять та постколоніалізм'
  words: 900
- points:
  - 'Аналіз композиції: дві сюжетні лінії (міжвоєнний Львів та сучасність), що сходяться в фіналі. Як вони коментують одна
    одну?'
  - 'Система персонажів: чотири побратими (українець, поляк, німець, єврей) як модель ідеального, але втраченого львівського
    суспільства.'
  - 'Ключовий епізод: спорудження "Ковчега" для порятунку книг, мов та культури. Що це — наївна утопія чи програма культурного
    спротиву?'
  - '[!decolonization] Роман повертає українцям їхню частку у міській історії Львова, показуючи їх не об''єктами, а активними
    суб''єктами культурного та політичного життя.'
  section: 'Читання: Танґо Смерті'
  words: 1700
- points:
  - 'Місто як головний персонаж: топографія Львова (вулиці, кам''яниці, цвинтарі) як повноцінний учасник подій.'
  - 'Мова як маркер ідентичності: львівська ґвара, суміш мов як відображення мультикультурного середовища та водночас його
    вразливості.'
  - Надприродні елементи (вічне життя героїв, містичний "Ковчег") як алегорія безсмертя культури та незнищенності пам'яті.
  - '[!decolonization] Апокаліптичний фінал для міжвоєнного Львова — це не просто трагедія, а алегоричне зображення наслідків
    етнічних чисток та радянської окупації.'
  section: 'Світобудова та алегорія: Львів як текст'
  words: 1200
- points:
  - 'Повернення до розминки: чи можлива спільна пам''ять? Роман дає парадоксальну відповідь: спільна пам''ять можлива саме
    через визнання її болючої, конфліктної природи.'
  - 'Рецепція роману: чому "Танґо смерті" стало бестселером і як воно вплинуло на "львівський міф" у сучасній українській
    літературі?'
  - '[!anti-hagiography] Критична рефлексія: чи не романтизує роман міжвоєнний період, ігноруючи реальні міжетнічні конфлікти
    того часу?'
  - 'Провокаційне питання до студента: якби ви будували "Ковчег" для сучасної української культури, що б ви туди поклали в
    першу чергу?'
  section: Дискусія та підсумок
  words: 700
focus: 'Yuriy Vynnychuk''s novel "Tango of Death": interwar Lviv, historical allegory, magical realism, and the decolonization
  of memory.'
level: LIT-FANTASTIKA
