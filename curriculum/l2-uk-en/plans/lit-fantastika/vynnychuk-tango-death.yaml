objectives:
- Аналізувати роман "Танґо смерті" як приклад українського магічного реалізму та постколоніальної літератури
- Інтерпретувати алегоричний вимір твору, пов'язуючи світобудову роману з історією Львова XX століття
- Розрізняти та критично оцінювати різні літературно-критичні підходи до аналізу роману
- Формулювати власну позицію щодо ролі історичної пам'яті та міфу про "втрачене місто" в сучасній українській культурі
