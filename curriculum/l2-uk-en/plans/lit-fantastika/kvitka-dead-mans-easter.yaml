content_outline:
- points:
  - 'Провокаційне питання: Чи може твір, що описує повстання мерців, бути глибоко християнським текстом? "Мертвецький Великдень"
    як теологічний парадокс.'
  - 'Цитата: "І встала Україна, і розвіяла тьму неволі..." — але що, як це не метафора? Розглядаємо буквальне воскресіння.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Мертвецький Великдень" — це українська готична проза чи богословська алегорія? Аргументи за жанрову природу
    (елементи жаху, фольклор) vs аргументи за релігійний символізм (тема воскресіння, спокути).'
  - 'Дебат 2: Місце твору в каноні. Чи це серйозна література, чи "народне чтиво"? Як статус "фантастичного" твору впливав
    на його сприйняття критикою XIX століття та сьогодні.'
  - '[!epistemic-humility] Інтерпретації твору кардинально різняться: від звинувачень в єресі до проголошення "пророчим текстом".
    Немає єдиної правильної відповіді, є лише рівень аргументації.'
  section: 'Конфліктна карта: Готика чи Євангеліє?'
  words: 900
- points:
  - 'Уривок з твору: Сцена пробудження мерців та їхньої ходи до церкви. Аналіз мови та стилістики — як Квітка поєднує високий
    стиль з простонародною лексикою.'
  - 'Наративна структура: Чому саме Великдень? Символізм головного християнського свята як точка перелому сюжету і долі нації.'
  - 'Система персонажів: живі, що бояться, і мертві, що несуть істину. Хто є справжнім суб''єктом історії в тексті?'
  - '[!decolonization] Твір як відповідь на імперський наратив про "малоросійську" літературу як виключно побутову та гумористичну.
    Квітка доводить її здатність говорити на есхатологічні теми.'
  section: 'Читання: "Мертвецький Великдень"'
  words: 1700
- points:
  - 'Правила світу: Які закони керують цим дивним воскресінням? Хто може воскреснути і чому? Аналіз умов, за яких стається
    диво.'
  - 'Алегоричне прочитання: Повстання мертвих як метафора пробудження національної свідомості після століть колоніального
    сну. "Мертві" покоління козаків повертаються, щоб нагадати живим про їхню історію та обов''язок.'
  - 'Жанрові конвенції: Твір у контексті європейського романтизму та готичної літератури, але з глибоко українським корінням
    у фольклорі (легенди про "ходячих мерців") та історії (козацькі повстання).'
  - '[!decolonization] "Великдень" руйнує міф про "спільну" історію, показуючи унікальний український шлях страждань і надії
    на воскресіння, окремий від імперського центру.'
  section: 'Світобудова та алегорія: Україна як потойбіччя'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, "Мертвецький Великдень" — це єретичний текст жахів чи глибока алегорія національного спасіння?
    Студент формулює власну позицію.'
  - 'Історія рецепції: Як твір сприймався сучасниками (Шевченко, Гоголь) і як його читають сьогодні в контексті війни та нової
    боротьби за незалежність?'
  - 'Сучасне значення: Що "Мертвецький Великдень" говорить нам про роль минулого у теперішній війні? Чи можуть "мертві герої"
    надихати реальну боротьбу?'
  - '[!anti-hagiography] Критичний погляд: Чи не є ідея "воскресіння нації" небезпечною ідеалізацією, що заважає тверезо оцінювати
    сучасні виклики?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Kvitka-Osnovianenko's "Mertvetskyi Velykden" as a work of fantasy, gothic horror, and social commentary.
  Examines its world-building, allegorical representation of Ukrainian national fate, and challenges to the imperial narrative.
level: LIT-FANTASTIKA
module: lit-fantastika-001
objectives:
- Аналізувати твір "Мертвецький Великдень" у подвійній оптиці: як готичний текст та як богословську алегорію.
- Виявляти та інтерпретувати засоби деколонізації в тексті, що кидають виклик імперським наративам.
- Формулювати власну позицію в літературно-критичних дебатах щодо місця жанрової літератури в українському каноні.
- Застосовувати поняття "світобудова" та "алегорія" для аналізу фантастичних творів як коментаря до соціальної реальності.
