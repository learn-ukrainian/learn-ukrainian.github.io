activity_hints:
- description: Визначити, якій критичній позиції ("ескапізм" чи "соціальна критика") належить наведена теза про твір.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення ключові поняття з модуля: світобудова, алегорія, утопія, дистопія, канон.'
  focus: Термінологія фантастикознавства
  items: 5
  type: fill-in
- description: На прикладі одного з проаналізованих творів поясніть, як автор використовує фантастичні елементи для алегоричного
    зображення реальних історичних чи соціальних проблем України.
  focus: Аналіз алегорії у творі
  type: note
- description: Напишіть коротке есе (400-600 слів) про те, як сучасні українські автори-фантасти "деколонізують" жанр, що
    раніше асоціювався з російською чи західною традицією.
  focus: 'Есе: Деколонізація жанру'
  type: note
cefr_min: C1
connects_to:
