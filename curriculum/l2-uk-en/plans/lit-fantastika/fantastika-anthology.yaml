content_outline:
- points:
  - 'Провокація: "Чи може космічний корабель бути алегорією України?" — питання, що розкриває приховані сенси української
    фантастики.'
  - Цитата з невідомого твору про політ крізь "мертву зону космосу" як метафора проходження через темні сторіччя бездержавності.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є українська фантастика втечею від реальності, чи закодованою критикою влади та суспільства? Позиції радянських
    та сучасних критиків.'
  - 'Дебат 2: Місце фантастики в каноні. Чому жанр, що вважався "несерйозним", сьогодні виходить на перший план у літературних
    дискусіях?'
  - '[!epistemic-humility] Немає "правильної" відповіді — є лише краще аргументовані позиції. Розглядаємо докази обох сторін.'
  section: 'Конфліктна карта: Ескапізм чи соціальна критика?'
  words: 900
- points:
  - 'Аналіз уривків з ключових творів, що репрезентують різні епохи: від радянської "наукової фантастики" до сучасної постколоніальної.'
  - Структура сюжету та система персонажів як віддзеркалення суспільних ієрархій та конфліктів.
  - '[!decolonization] Виявлення та деконструкція імперських наративів, прихованих у "нейтральних" науково-фантастичних сюжетах.
    Як українські автори переписують колоніальні тропи.'
  section: 'Читання: Вибрані тексти з антології'
  words: 1700
- points:
  - 'Аналіз правил, що керують вигаданими світами: магія, технології, соціальні закони — як вони проектуються на українську
    дійсність?'
  - 'Алегоричне прочитання: що символізують монстри, інопланетяни чи паралельні світи в контексті української історії (окупація,
    опір, пошук ідентичності).'
  - 'Жанрові конвенції: як українська фантастика запозичує та трансформує глобальні традиції sci-fi/fantasy, створюючи унікальний
    національний продукт.'
  - '[!decolonization] Мова як інструмент світобудови: аналіз авторських неологізмів та мовних експериментів, що утверджують
    українську суб''єктність.'
  section: 'Світобудова та алегорія: Кодовані світи української реальності'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може космічний корабель бути алегорією України? Формулювання відповіді на основі проаналізованих
    текстів.'
  - 'Історія рецепції: як ці твори читалися в момент публікації і як ми читаємо їх сьогодні? Що змінилося в нашому сприйнятті?'
  - 'Сучасна релевантність: що фантастика може сказати про майбутнє України, що перебуває у стані війни?'
  - '[!anti-hagiography] Критичний погляд на утопічні моделі в українській фантастиці: чи не приховують вони нових форм тоталітаризму?'
  section: Дискусія та підсумок
  words: 800
focus: Ukrainian sci-fi/fantasy as a vehicle for social commentary and national imagination, analyzing world-building as an
  allegory for Ukrainian reality.
level: LIT-FANTASTIKA
module: lit-fantastika-020
objectives:
- Аналізувати, як українська фантастика використовує алегорію та світобудову для коментування соціальних та політичних реалій
- Розрізняти різні критичні підходи до фантастичної літератури (ескапістський, постколоніальний, соціально-критичний)
- Ситуатизувати твори української фантастики в національному та світовому літературних контекстах
- Формулювати власну аргументовану позицію щодо місця фантастики в українському літературному каноні
