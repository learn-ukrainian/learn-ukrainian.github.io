content_outline:
- points:
  - 'Провокація: Що, якби найвища форма бунту проти системи — це не збройна боротьба, а створення власного Всесвіту? Цитата
    з Бердника про свободу духу.'
  - 'Загадковий уривок: опис космічного корабля як живого організму без згадки автора чи назви.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Бердник — релігійний містик і філософ, що використовує фантастику як інструмент, чи письменник-фантаст, що використовує
    духовні теми для антуражу?'
  - 'Дебат 2: Місце Бердника в каноні. Чи був він «справжнім» письменником, чи андеграундним явищем? Як і чому його було канонізовано
    після 1991 року?'
  - '[!epistemic-humility] Немає єдиної «правильної» інтерпретації Бердника. Його творчість — це поле для дискусій між літературознавцями,
    філософами та езотериками.'
  section: 'Конфліктна карта: Духовний пошук чи втеча від реальності?'
  words: 900
- points:
  - 'Уривок 1: Маніфест Зоряного Корсара — аналіз мови, стилю, ключових ідей про свободу та безсмертя.'
  - 'Наративна структура: система персонажів як відображення різних аспектів людської душі (Корсар, Ая, Гор).'
  - '[!decolonization] Духовний пошук Бердника як альтернатива радянському атеїзму та російському месіанству. Створення власної,
    української космогонії.'
  - Порівняння з іншими творами автора (напр., «Чаша Амріти») для розуміння еволюції його поглядів.
  section: 'Читання: "Зоряний Корсар", ключові уривки'
  words: 1700
- points:
  - 'Правила всесвіту: аналіз концепцій реінкарнації, ноосфери, космічної свідомості у творі.'
  - 'Алегоричне прочитання: «Сіра Республіка» та «Всепланетний Уряд» як метафори СРСР та його бюрократії.'
  - Пошук «Квітки Світів» як алегорія пошуку Україною власної ідентичності та шляху.
  - '[!decolonization] Жанрові конвенції: як Бердник адаптує глобальні традиції наукової фантастики для вираження унікального
    українського досвіду та світогляду.'
  section: 'Світобудова та алегорія: Духовний космос Бердника'
  words: 1200
- points:
  - 'Повернення до розминки: відповідь на питання про бунт через творчість на основі аналізу «Зоряного Корсара».'
  - 'Історія рецепції: від самвидаву та таборів до культового статусу та академічного вивчення.'
  - 'Сучасна релевантність: чи актуальні ідеї Бердника в епоху ШІ, космічних перегонів мільярдерів та нових форм тоталітаризму?'
  - '[!anti-hagiography] Критичний погляд: ексцентричність та суперечливі аспекти світогляду Бердника. Вчимося відділяти художню
    цінність від ідеології.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз роману Олеся Бердника «Зоряний Корсар» як ключового твору української духовної космології та нонконформістської
  думки. Дослідження світобудови, алегоричних зв'язків з радянським режимом та місця твору в українському літературному каноні.
level: LIT-FANTASTIKA
module: lit-fantastika-006
objectives:
- Аналізувати роман «Зоряний Корсар» Олеся Бердника як алегоричний твір, що відображає соціальні та духовні пошуки української
  інтелігенції в умовах радянського режиму
- Визначати місце творчості Бердника в каноні української літератури, враховуючи його дисидентський статус та посмертну реабілітацію
- Розрізняти різні критичні підходи до аналізу наукової фантастики (формалістський, постколоніальний, біографічний)
- Застосовувати поняття «світобудова» та «алегорія» для аналізу фантастичних творів
