content_outline:
- points:
  - 'Провокаційне питання: Korniy Forest — це реальна людина чи колективний псевдонім українського лісу, що нарешті заговорив?'
  - 'Цитата з твору (без контексту): "Коли остання мавка завантажить свій код у філогенетичну мережу, імперія впаде не від
    зброї, а від самоусвідомлення."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є твори Korniy Forest втечею від реальності, чи це форма активного політичного спротиву через створення нової
    національної міфології?'
  - 'Дебат 2: Це "справжня" література чи нішева жанрова проза? Дискусія про місце спекулятивної фантастики в українському
    каноні.'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у цьому новий вимір українського модернізму, інші — лише комерційний
    продукт.'
  section: 'Конфліктна карта: Ескапізм чи нова міфологія?'
  words: 900
- points:
  - 'Розширений уривок з ключового твору: аналіз сюжету, системи персонажів та наративного голосу.'
  - 'Близьке читання: як автор використовує мову для створення унікальної атмосфери техно-чарівного лісу.'
  - '[!decolonization] Творчість Korniy Forest як відповідь не на російську фантастику (брати Стругацькі), а як продовження
    та переосмислення української химерної прози (Ільченко, Дрозд).'
  section: 'Читання: Уривок з "Лісового коду"'
  words: 1800
- points:
  - 'Аналіз світобудови: які правила керують вигаданим світом? Як поєднуються магія та технології?'
  - 'Алегоричне прочитання: які аспекти української реальності закодовані у спекулятивному світі (колоніалізм, опір, пошук
    ідентичності, мовне питання)?'
  - 'Жанрові конвенції: як цей твір використовує та трансформує традиції світової наукової фантастики та фентезі, залишаючись
    глибоко українським.'
  - '[!decolonization] Руйнування імперського міфу про "спільну" фантастичну традицію; утвердження української суб''єктності
    через унікальний сетинг.'
  section: 'Світобудова та алегорія: Техно-ліс та кібер-мавки'
  words: 1200
- points:
  - 'Повернення до провокації з розминки: тож хто такий Korniy Forest? Формулювання відповіді на основі аналізу.'
  - 'Історія рецепції: як ці тексти сприймали на момент публікації і як їх читають зараз, в умовах повномасштабної війни?'
  - 'Сучасне значення: що ці твори говорять сучасній Україні про її майбутнє та її місце у світі?'
  - '[!anti-hagiography] Чи є в утопічному світі Korniy Forest темні сторони? Критичний погляд на авторський задум.'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Korniy Forest's work in the context of Ukrainian speculative fiction, social commentary, and decolonization.
level: LIT-FANTASTIKA
module: lit-fantastika-016
objectives:
- Аналізувати творчість Korniy Forest як приклад української спекулятивної фантастики, що є інструментом соціальної критики
  та національного самовизначення.
- Визначати, як світобудова та алегорії у творах автора відображають та проблематизують українську реальність (колоніалізм,
  опір, ідентичність).
- Критично оцінювати місце творчості Korniy Forest в українському літературному каноні та його зв'язок із світовими традиціями
  наукової фантастики.
- Формулювати аргументовану позицію щодо використання фантастичних жанрів для деколонізаційних наративів.
