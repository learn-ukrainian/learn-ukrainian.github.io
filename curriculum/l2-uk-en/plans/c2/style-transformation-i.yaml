module: c2-010
level: C2
sequence: 10
version: 1.3.2
title: 'Трансформація стилів: синтез та деконструкція'
subtitle: Стилістична трансформація I
focus: integration
pedagogy: workshop
objectives:
- 'Досконало опанувати механізми міжстильової трансформації: від наукової точності
  до художньої експресії'
- Навчитися перекодувати інформацію між різними регістрами мови без втрати 
  семантичного інваріанта
- Дослідити явища стилістичного синтезу, дифузії та еклектики в сучасних 
  медійних та художніх текстах
- Розвинути навички свідомої деконструкції стилістичних штампів та канцеляризмів
  через засоби пародії та іронії
content_outline:
- section: Теорія та практика міжстильового перекладу
  words: 1250
  subsections:
  - Поняття семантичного інваріанта при зміні функціонального стилю
  - 'Трансформація лексичного складу: від термінів до метафор'
  - Синтаксичні перебудови при переході від офіційного до розмовного регістра
  key_concepts:
  - трансформація
  - інваріант
  - регістр
  - декодування
- section: Стилізація, пародія та травестія
  words: 1250
  subsections:
  - 'Механізми імітації чужого стилю: від омажу до сатири'
  - Травестія як засіб зниження високого стилю (на прикладі 'Енеїди' І. 
    Котляревського)
  - Пародіювання як інструмент критичного аналізу дискурсу
  key_concepts:
  - стилізація
  - пародія
  - травестія
  - інтертекстуальність
  primary_sources:
  - Іван Котляревський, 'Енеїда'
  - Юрій Андрухович, 'Перверзія' (фрагменти стилізацій)
- section: Стилістичний синтез у постмодерному тексті
  words: 1250
  subsections:
  - Поєднання несумісних стилів як засіб створення комічного або гротескного 
    ефекту
  - Есеїстика як територія синтезу наукового, публіцистичного та художнього 
    стилів
  - Вплив дигітального дискурсу на розмивання меж традиційних стилів
  key_concepts:
  - еклектика
  - дифузія
  - гібридність
  - колаж
- section: Деконструкція мовних кліше та штампів
  words: 1250
  subsections:
  - Виявлення та нейтралізація канцеляризмів у невідповідних контекстах
  - Методи творчого переосмислення ідеологічних гасел та рекламних слоганів
  - Роль індивідуально-авторських новотворів у подоланні стильової інерції
  key_concepts:
  - деконструкція
  - канцеляризм
  - штамп
  - мовна гра
- section: Підсумок — Summary
  words: 300
  points:
  - 'Cross-stylistic transformation shifts texts between registers (від офіційного
    до розмовного) while preserving the semantic invariant (семантичний інваріант).
    Self-check: What is the primary difference between stylization (стилізація) and
    parody (пародія)?'
  - "Travesty (травестія) lowers a high style for comedic effect, famously used in
    Kotliarevsky's 'Eneida'. Self-check: How does travesty change the tone of a text?
    Transform 3 official bureaucratic cliches (канцеляризми) into natural, everyday
    Ukrainian."
word_target: 5000
activities:
  types_required:
  - comparative-study
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Порівняльне дослідження
  topic: 'Аналіз опису тієї самої події в різних регістрах: офіційному звіті, газетному
    репортажі та приватному щоденнику.'
  key_elements:
  - модальність
  - суб'єктивність
  - лексичний вибір
  motivation: Наочне демонстрування залежності мовних засобів від комунікативної
    мети.
- source_type: Художня стилізація
  topic: 'Аналіз пародійного використання наукового стилю в літературі. Джерело: сучасна
    українська постмодерна проза.'
  key_elements:
  - псевдонауковість
  - іронія
  - термінологічна надмірність
  motivation: Розуміння засобів деконструкції серйозного дискурсу.
listening_situations:
- media_type: відео
  setting: 'Політичне ток-шоу: як учасники змінюють стиль від формальної промови до
    емоційних реплік під час дискусії.'
  focus_points:
  - Маркери зміни регістра
  - Використання риторичних фігур для маніпуляції або захисту
  motivation: Спостереження за динамікою стильових трансформацій у живому 
    спілкуванні.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Візьміть фрагмент із юридичного документа та перепишіть його: 1) як казку
    для дітей, 2) як сенсаційну новину в таблоїді. Проаналізуйте зроблені зміни.'
  requirements:
  - мінімум 400 слів
  - збереження основної інформації
  - чітке дотримання обраних стилів
  motivation: Розвиток максимальної стилістичної гнучкості та усвідомленого 
    вибору мовних засобів.
  model_answer: Текст у стилі казки має використовувати фольклорні елементи та 
    спрощений синтаксис. Версія для таблоїда повинна мати клікбейтний заголовок 
    та емоційно забарвлену лексику. Обидві версії повинні точно передавати суть 
    вихідного юридичного положення.
discussion_topics:
- context: Чи існує межа допустимого змішування стилів? Чи веде стилістична 
    гібридність до хаосу та втрати сенсів?
  questions:
  - Як ви оцінюєте використання сленгу в наукових дискусіях?
  - Чи може висока література існувати без елементів деконструкції та пародії 
    сьогодні?
  motivation: Філософське осмислення сучасних тенденцій розвитку української 
    мови.
activity_hints:
- type: reading
  focus: Прочитайте текст про теорія та практика міжстильового перекладу і дайте
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про стилізація, пародія та 
    травестія, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Теорія та практика
    міжстильового перекладу». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    теорія та практика міжстильового перекладу.
- type: comparative-study
  focus: 'Порівняйте різні підходи до теорія та практика міжстильового перекладу:
    Поняття семантичного інваріанта при зміні функціонального стилю. Визначте спільне
    та відмінне.'
references:
- Котляревський І. Енеїда — класичний зразок травестії
- Андрухович Ю. Перверзія — постмодерна стилістична гра
- Глазова О. П. Українська мова, 11 клас (2019), §40-45 — стилістична 
  диференціація
- Караман С. О. Українська мова, 10 клас (2018), §38 — лексичні засоби 
  стилістики
phase: C2.1 [Stylistic Perfection]
