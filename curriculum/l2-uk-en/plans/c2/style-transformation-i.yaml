vocabulary_hints:
  required:
  - популяризація (popularization) — займатися популяризацією науки, ефективна популяризація;
    висока частотність у медіа
  - спрощення (simplification) — виправдане спрощення vs надмірне спрощення; стратегія
    доступності
  - аналогія (analogy) — проводити влучну аналогію, за аналогією з; інструмент пояснення
    складного
  - доступність (accessibility) — доступність викладу, мовна доступність; ключовий
    критерій наукпопу
  - концепція (concept) — пояснення концепції простою мовою, збереження точності концепції
  recommended:
  - наукпоп (popular science) — сучасний термін для науково-популярного контенту та
    видань
  - вторинний текст (secondary text) — термін Держстандарту для рефератів та адаптацій
  - канцелярит (nominalization/bureaucratese) — негативне явище надмірного вживання
    віддієслівних іменників
  - активний стан (active voice) — пріоритетна граматична форма для динамічного сторітелінгу
  - просвітництво (enlightenment) — місія популяризатора науки в сучасному суспільстві
