content_outline:
- section: 'Вступ: Природа науково-популярного стилю (Introduction: Nature of Popular
    Science Style)'
  words: 400
  points:
  - 'Реалізація вимог Держстандарту 2024 (§4.3.7): трансформація наукового стилю в
    науково-популярний як ключова компетенція C2'
  - Популяризація як 'переклад' мовою іншої аудиторії, а не примітивізація контенту;
    розрізнення понять 'спрощення' та 'вульгаризація'
- section: 'Культурний контекст: Український наукпоп (Cultural Context: Ukrainian
    Popular Science)'
  words: 500
  points:
  - 'Кейс-стаді медіа «Куншт» (Kunsht): використання візуального сторітелінгу та мистецьких
    метафор для пояснення квантової фізики'
  - 'Ініціатива «Моя наука» (Moya Nauka): як українські вчені НАНУ протидіють псевдонауці
    через доступний експертний виклад'
  - 'Проєкт «Лекції Майбутнього» (MANU): досвід адаптації знань нобелівських лауреатів
    для підліткової аудиторії'
- section: Лексична адаптація та термінологія (Lexical Adaptation and Terminology)
  words: 600
  points:
  - 'Стратегія введення терміна через аналогію: приклад з біології (мітохондрія як
    енергетична станція клітини)'
  - 'Learner error: використання вузькоспеціальних термінів без контексту — методика
    введення дефініції в популярному тексті'
  - Використання загальновживаних синонімів замість абстрактних наукових конструкцій
    для забезпечення мовної доступності
- section: Синтаксична трансформація та деноміналізація (Syntactic Transformation
    and De-nominalization)
  words: 600
  points:
  - 'Learner error: надмірне вживання пасивного стану (калькування англійської або
    офіційного стилю) — перехід до активних, динамічних конструкцій'
  - 'Практикум з ''деноміналізації'': подолання канцеляриту через заміну віддієслівних
    іменників (''здійснення перевірки'') на дієслова (''перевірити'')'
  - 'Впровадження діалогічності: використання риторичних запитань та прямого звернення
    до читача для залучення аудиторії'
- section: Жанрова специфіка та вторинні тексти (Genre Specificity and Secondary Texts)
  words: 500
  points:
  - 'Вимога Держстандарту (§4.3.8): створення вторинних текстів (рефератів, повідомлень,
    довідок) на основі наукових першоджерел'
  - 'Адаптація структури: від академічної анотації до клікабельного блог-посту або
    сценарію для соціальних мереж'
- section: 'Підсумок: Етика та точність популяризації (Summary: Ethics and Accuracy
    of Popularization)'
  words: 400
  points:
  - 'Баланс між захопливим викладом та науковою достовірністю: як не втратити суть
    концепції при спрощенні'
  - 'Фінальний практикум: оцінка трансформації тексту за критеріями точності, доступності
    та емоційного впливу'
