content_outline:
- section: 'Від дослідження до тексту: Психологія чернетки (From Research to Text: Psychology of the Draft)'
  words: 700
  points:
  - 'Стратегії переходу від зібраного матеріалу до першої чернетки: подолання страху чистого аркуша через техніку вільного
    письма.'
  - 'Термінологія процесу: ''писати на чернетку'' vs ''чорновий варіант'' — аналіз частотності та стилістичних нюансів.'
  - Психологічна установка на 'недосконалий текст' як спосіб підвищення продуктивності в науковому письмі.
- section: Вступ та обґрунтування актуальності (Introduction and Justification of Relevance)
  words: 1000
  points:
  - 'Вимоги державного стандарту (§4.3.6) до структури академічного тексту: логіка побудови вступної частини.'
  - 'Техніки обґрунтування актуальності теми: вживання сталих конструкцій ''тема втрачає актуальність'' або ''обґрунтувати
    актуальність''.'
  - 'Формулювання наукової новизни: як коректно вживати фрази ''претендувати на новизну'' та ''наукова новизна полягає в тому,
    що...'''
- section: 'Дихотомія Об’єкта і Предмета: Культурний код (Dichotomy of Object and Subject: Cultural Code)'
  words: 600
  points:
  - 'Унікальність української академічної традиції: суворе розрізнення об’єкта (поле дослідження) та предмета (конкретний
    колос на полі).'
  - 'Аналіз типової помилки: плутанина об’єкта і предмета — вправи на розрізнення через метафоричну дефініцію ''сфери'' та
    ''аспекту''.'
  - 'Маркери ''свого'' в науковому середовищі: як правильне визначення предмета дослідження демонструє фаховий рівень.'
- section: 'Академічний стиль: Авторське «Ми» проти «Литви води» (Academic Style: Author''s ''We'' vs ''Water Pouring'')'
  words: 1700
  points:
  - 'Боротьба з надмірним ''яканням'': заміна англомовного ''I think'' на авторське ''ми'' або безособові форми (''встановлено'',
    ''вважається'').'
  - 'Проблема ''литви води'' (water pouring): ідентифікація та вилучення порожніх фраз-кліше (''у сучасному світі'', ''як
    відомо всім'') для підвищення щільності інформації.'
  - 'Когерентність тексту: використання логічних переходів та абзацної структури для створення цілісного наукового дискурсу.'
- section: Академічна доброчесність та Висновки (Academic Integrity and Conclusions)
  words: 1000
  points:
  - 'Концепція академічної доброчесності в сучасному українському дискурсі: боротьба з плагіатом як маркер євроінтеграції
    освіти.'
  - 'Етичний кодекс дослідника: вживання термінів ''кодекс доброчесності'' та ''порушення доброчесності'' у професійному контексті.'
  - 'Структура висновків: узагальнення результатів, відповідь на мета-питання та окреслення перспектив подальших розвідок.'
vocabulary_hints:
  required:
  - чернетка (draft) — 'перша чернетка', 'писати на чернетку'; висока частотність, базовий термін процесу письма
  - актуальність (relevance) — 'обґрунтувати актуальність', 'втрачати актуальність'; ключовий маркер наукового вступу
  - наукова новизна (scientific novelty) — 'елементи наукової новизни', 'претендувати на новизну'; специфічний термін для
    С2
  - академічна доброчесність (academic integrity) — 'кодекс доброчесності', 'порушення доброчесності'; маркер сучасного дискурсу
  - об'єкт дослідження (research object) — ширша сфера реальності; визначення меж об'єкта як етап дослідження
  - предмет дослідження (research subject) — конкретний аспект; дихотомія з об'єктом є специфікою української науки
  recommended:
  - авторське «ми» (author's 'we') — стилістична норма українського наукового стилю замість 'я'
  - литво води (water pouring) — сленговий термін для надмірної кількості малозмістовних фраз у тексті
  - безособові конструкції (impersonal constructions) — 'вважається', 'встановлено', 'доведено'; основа наукової об'єктивності
  - когерентність (coherence) — цілісність та логічна зв'язність аргументації в академічному письмі
vocabulary:
  required:
