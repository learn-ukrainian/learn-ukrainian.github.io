module: c2-101
level: C2
sequence: 101
version: 1.2.1
title: 'Написання чернетки проєкту: Стилістика та аргументація'
subtitle: 'Написання проєкту: стиль і аргументація'
focus: professional
pedagogy: workshop
objectives:
- Забезпечити стилістичну єдність та академічну коректність тексту
- Навчитись використовувати складні логічні конектори для забезпечення зв'язності викладу
- Сформулювати вступну частину, основні розділи та аргументовані висновки
- Дотримуватися норм сучасного правопису та специфіки наукового дискурсу
content_outline:
- section: 'Науковий стиль: точність, лаконічність, логічність'
  words: 1250
  subsections:
  - 'Вибір лексики: уникнення надмірної емоційності та художніх метафор'
  - 'Синтаксична складність наукового речення: дієприкметникові та дієприслівникові звороти'
  - 'Безособовість та пасивні конструкції: роль автора у тексті'
  key_concepts:
  - академічне письмо
  - термінологічна консистентність
  - синтаксична складність
  - модальність впевненості
  primary_sources:
  - 'Олександер Пономарів: ''Культура слова'' (рекомендації щодо наукового викладу)'
- section: Забезпечення когезії та когерентності
  words: 1250
  subsections:
  - Використання вставних слів для структурування аргументації (по-перше, отже, на нашу думку)
  - Логічні переходи між розділами та підрозділами
  - Анафоричні та катафоричні зв'язки у великих текстових масивах
  key_concepts:
  - когезія
  - когерентність
  - дискурс-маркери
  - логічна послідовність
  primary_sources:
  - Лінгвістичні праці про зв'язність тексту (наприклад, Н. Кондратенко)
- section: Написання вступу та висновків
  words: 1250
  subsections:
  - 'Вступ як візитна картка проєкту: від актуальності до структури'
  - 'Формулювання висновків: синтез результатів та відповідь на дослідницькі питання'
  - Окреслення перспектив подальших досліджень
  key_concepts:
  - композиція тексту
  - синтез
  - узагальнення
  - прогностика
  primary_sources:
  - Зразки вступів та висновків до класичних українознавчих монографій
- section: Цитування та оформлення апарату
  words: 1250
  subsections:
  - 'Правила прямого та непрямого цитування: як уникнути плагіату'
  - Оформлення виносок та посилань у тексті за обраним стандартом
  - Складання списку використаних джерел та літератури
  key_concepts:
  - цитування
  - парафраза
  - бібліографія
  - академічна етика
  primary_sources:
  - 'ДСТУ 8302:2015: Бібліографічне посилання'
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - select
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Науковий стиль мовлення'
- 'Авраменко, 11 клас (2019): Академічне письмо'
- 'Державний стандарт 2024: C2 — наукова письмова компетенція'
reading_situations:
- source_type: науковий уривок
  topic: 'Аналіз логічних зв''язків у фрагменті монографії: пошук засобів забезпечення когезії.'
  key_elements:
  - конектори
  - повтори
  - займенникові заміни
  motivation: Розуміння механізмів створення цілісного наукового тексту.
- source_type: стилістична інструкція
  topic: 'Типові помилки у наукових текстах: від плеоназмів до порушення логіки викладу.'
  key_elements:
  - плеоназм
  - тавтологія
  - канцелярит
  motivation: Вдосконалення мовної грамотності на високому рівні.
listening_situations:
- media_type: лекція
  setting: 'Вебінар про культуру наукового мовлення: як писати просто про складне.'
  focus_points:
  - Стилістичне редагування власних текстів
  - Вибір оптимальної довжини речення
  motivation: Підвищення якості написання дипломного проєкту.
writing_tasks:
- task_type: есе
  prompt: Напишіть вступ до вашого проєкту (або переробіть існуючий), приділяючи особливу увагу чіткості формулювань та логіці
    викладу.
  requirements:
  - мінімум 600 слів
  - використання щонайменше 10 логічних конекторів
  - дотримання структури вступу
  motivation: Практичне відпрацювання найважливішої частини проєкту.
  model_answer: Текст має бути переконливим, академічно коректним та логічно завершеним.
discussion_topics:
- context: Чи може науковий текст бути емоційним?
  questions:
  - Де проходить межа між академічною стриманістю та авторською захопленістю?
  - У яких випадках доречне використання риторичних запитань у науковому тексті?
  motivation: Дискусія про межі наукового стилю.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про науковий стиль: точність, лаконічність, логічність і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про забезпечення когезії та когерентності, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Науковий стиль: точність, лаконічність, логічність». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему науковий стиль: точність, лаконічність, логічність.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до науковий стиль: точність, лаконічність, логічність: Вибір лексики: уникнення надмірної
    емоційності та художніх метафор. Визначте спільне та відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
