module: c2-059
level: C2
sequence: 59
version: '1.2'
title: 'Академічне видання: Від наукової гіпотези до публікації у фаховому часописі'
subtitle: 'Академічні публікації'
focus: professional
pedagogy: workshop
objectives:
  - Опанувати повний цикл підготовки та подання наукової статті до 
    високорейтингового українського часопису
  - Навчитися аргументовано відповідати на рецензії та вносити стилістичні й 
    змістові правки
  - Вдосконалити навички підготовки анотацій (Abstracts) українською та 
    англійською мовами (з акцентом на українську)
  - Розвинути розуміння етичних стандартів академічного видання та авторського 
    права
content_outline:
  - section: Анатомія успішної наукової статті
    words: 1250
    subsections:
      - Стандарти IMRAD (Introduction, Methods, Results, and Discussion) в 
        українському науковому дискурсі
      - 'Мистецтво вибору назви статті: лаконічність, інформативність, ключові слова'
      - 'Логічна зв''язність тексту: використання перехідних елементів та аргументативних
        маркерів'
    key_concepts:
      - IMRAD
      - наукова стаття
      - когерентність
      - інформаційна щільність
    primary_sources:
      - Вимоги до публікацій у журналі 'Мовознавство' (аналіз стандартів 
        фахового видання)
  - section: Рецензування та академічна полеміка
    words: 1250
    subsections:
      - 'Процес Double-blind peer review: роль автора та рецензента'
      - Мовні стратегії написання відповіді на зауваження рецензента (Response 
        to Reviewers)
      - 'Культура дискусії: як захистити власну наукову позицію, не порушуючи академічної
        етики'
    key_concepts:
      - рецензування
      - апробація
      - наукова етика
      - контраргументація
  - section: 'Апарат видання: анотації, ключові слова, список літератури'
    words: 1250
    subsections:
      - 'Специфіка написання анотацій: як вмістити суть дослідження у 200 слів'
      - Формування списку використаних джерел за ДСТУ 8302:2015 та міжнародними 
        стандартами (APA, MLA)
      - Цифрові ідентифікатори (DOI, ORCID) та їх роль у науковій комунікації
    key_concepts:
      - анотація
      - метадані
      - бібліографічний опис
      - індекс цитування
    primary_sources:
      - Михайло Грушевський, 'Початки українського академічного життя' 
        (історичний контекст формування наукових часописів)
  - section: Етика публікацій та авторське право
    words: 1250
    subsections:
      - 'Запобігання академічному плагіату та некоректним запозиченням: робота з антиплагіатними
        системами'
      - Етика співавторства та визначення внеску кожного дослідника
      - 'Юридичні аспекти публікації: передача прав, відкритий доступ (Open Access)'
    key_concepts:
      - академічна доброчесність
      - плагіат
      - співавторство
      - інтелектуальна власність
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): Науковий стиль мовлення'
  - 'Авраменко, 11 клас (2019): Культура наукового мовлення'
  - 'Державний стандарт 2024: C2 — академічна комунікативна компетенція'
reading_situations:
  - source_type: Правила для авторів
    topic: Аналіз стилістичних та технічних вимог журналу 'Мовознавство'. 
      Дослідження критеріїв якості наукового тексту.
    key_elements:
      - науковий апарат
      - оригінальність
      - методологічна база
    motivation: Підготовка до реальної публікаційної активності у фаховому 
      середовищі.
  - source_type: Історичний нарис
    topic: Аналіз праці Михайла Грушевського про академічне життя. Вивчення 
      тяглості традицій української академічної періодики.
    key_elements:
      - наукова спільнота
      - видавнича справа
      - інтелектуальна спадщина
    motivation: Осмислення історичного контексту розвитку української науки.
listening_situations:
  - media_type: відео
    setting: Інтерв'ю з головним редактором провідного українського наукового 
      журналу про типові помилки авторів.
    focus_points:
      - Якість української мови у наукових текстах
      - Найпоширеніші причини відхилення статей на етапі рецензування
    motivation: Розвиток здатності до сприйняття фахових порад щодо покращення 
      наукового письма.
writing_tasks:
  - task_type: власне висловлення
    prompt: 'Напишіть анотацію до вашої (уявної або реальної) магістерської чи докторської
      роботи українською мовою. Дотримуйтесь структури: об''єкт, мета, методи, результати,
      висновки.'
    requirements:
      - мінімум 250 слів
      - використання наукового стилю
      - точність термінології
    motivation: Тренування навичок стислого та інформативного академічного 
      викладу.
    model_answer: Анотація має бути чіткою, без зайвих епітетів, з логічним 
      переходом від проблеми до отриманих результатів. Кожне речення має нести 
      нову інформацію.
discussion_topics:
  - context: Чи повинна українська мова залишатися основною мовою публікацій у 
      вітчизняній науці, попри глобалізацію та домінування англійської?
    questions:
      - Як зберегти повноцінну українську наукову термінологію в умовах 
        англомовного тиску?
      - Яка роль національних наукових часописів у розвитку культури?
    motivation: Обговорення стратегічних питань розвитку української науки в 
      глобальному контексті.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати анотацію до наукової статті: оцінити стилістичну відповідність,
      логічну структуру та інформативність'
  - type: essay-response
    focus: Написати відповідь на рецензію (Response to Reviewers) з 
      обґрунтованою контраргументацією та збереженням академічної етики
  - type: error-correction
    focus: Виправити порушення бібліографічного стандарту ДСТУ 8302:2015 та 
      стилістичні огріхи у фрагменті наукової статті
  - type: essay-response
    focus: Вставити відповідні дискурс-маркери та логічні конектори у текст 
      наукової статті
  - type: comparative-study
    focus: Зіставити елементи структури IMRAD з їхніми функціями у науковому 
      тексті
