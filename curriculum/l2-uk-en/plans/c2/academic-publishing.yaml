content_outline:
- section: 'Вступ — Академічне публікування в Україні (Introduction: Academic Publishing in Ukraine)'
  words: 600
  points:
  - 'Crisis and revival: the historical marginalization of Ukrainian-language scholarship, the post-2014 decolonization movement
    in academia, and the growing institutional support for Ukrainian-language publication.'
  - 'Institutional landscape: the roles of НАН (National Academy of Sciences), МОН (Ministry of Education and Science), and
    НКРЕ (National Council for Electronic Information Resources) in shaping publishing standards.'
  - 'The language question in academia: practical challenges of publishing in Ukrainian when international metrics favor English;
    strategies for bilingual academic presence.'
- section: Структура наукової статті (Article Structure)
  words: 900
  points:
  - 'IMRAD format adapted for Ukrainian tradition: introduction (вступ), methods (методи), results (результати), and discussion
    (обговорення) with Ukrainian-specific conventions for each section.'
  - 'Анотація vs. реферат: distinguishing the brief abstract (анотація) from the extended summary (реферат); structural and
    stylistic requirements for each in Ukrainian academic journals.'
  - 'Abstract writing in bilingual publishing: composing parallel Ukrainian and English abstracts that are not mere translations
    but register-appropriate texts in each language; common calquing errors to avoid.'
- section: Цитування та бібліографія (Citation and Bibliography)
  words: 900
  points:
  - 'Ukrainian citation standard ДСТУ 8302:2015: formatting rules for bibliographic references in Ukrainian academic texts;
    differences from APA, MLA, and Chicago styles.'
  - 'Scopus and Web of Science requirements for Ukrainian journals: indexing criteria, language policies, and strategies for
    meeting international standards while publishing in Ukrainian.'
  - 'Academic integrity and plagiarism norms: the evolution of plagiarism awareness in Ukrainian academia post-2014; institutional
    policies, software tools (Unicheck, StrikePlagiarism), and the cultural shift toward citation ethics.'
- section: Рецензування (Peer Review Process)
  words: 800
  points:
  - 'The peer review system: single-blind, double-blind, and open review models as practiced in Ukrainian academic journals;
    the role of the рецензент (reviewer) and the наукова рада (editorial board).'
  - 'Writing a constructive review: structure, tone, and terminology of Ukrainian academic peer review; balancing criticism
    with constructive suggestions; the register of наукова етика (research ethics).'
  - 'Responding to reviewer comments: composing a відповідь рецензенту (response to reviewer) letter; strategies for accepting,
    partially accepting, or respectfully disagreeing with reviewer recommendations.'
- section: Конференційна комунікація (Conference Communication)
  words: 800
  points:
  - 'Тези доповіді (conference abstracts/theses): structure, length, and register conventions for Ukrainian academic conferences;
    the distinction between тези and a full paper.'
  - 'Oral presentation and poster sessions: language for structuring a наукова доповідь (scholarly presentation); visual communication
    norms for poster sessions; handling Q&A in Ukrainian academic register.'
  - 'Networking in Ukrainian academic community: professional correspondence with colleagues, conference introductions, and
    collaborative project proposals using appropriate formality levels.'
- section: Академічні бази даних та інструменти (Academic Databases and Tools)
  words: 600
  points:
  - 'Ukrainian academic databases: Національна бібліотека України ім. В. І. Вернадського digital repository, institutional
    repositories, and Ukrainian open-access initiatives (відкритий доступ).'
  - 'Research identity tools: setting up Google Scholar profile in Ukrainian, ORCID registration, ResearchGate and Academia.edu
    presence for Ukrainian scholars.'
  - 'Open access movement in Ukraine: Green and Gold OA models, Ukrainian OA mandates, and the practical implications for
    researchers choosing where and how to publish.'
- section: 'Практикум — Написання анотації (Workshop: Writing an Abstract)'
  words: 400
  points:
  - 'Writing exercise: compose a structured abstract (250-300 words) for a hypothetical article in the learner''s professional
    or academic field, following IMRAD and ДСТУ 8302:2015 conventions.'
  - 'Peer review simulation: exchange abstracts and write a brief рецензія (review) using the terminology and register practiced
    in the module.'
  - 'Self-assessment: evaluate the abstract against journal submission checklists; identify areas where academic register,
    citation format, or structural conventions need refinement.'
vocabulary_hints:
  required:
  - анотація (abstract/annotation) — структурована анотація, написати анотацію; brief summary of academic article
  - рецензування (peer review) — подвійне сліпе рецензування, процес рецензування; quality control in academic publishing
  - бібліографічне посилання (bibliographic reference) — оформити посилання, список посилань; ДСТУ 8302:2015 format
  - тези доповіді (conference abstract/theses) — подати тези, збірник тез; Ukrainian conference submission format
  - наукова стаття (scholarly article) — опублікувати статтю, фахова стаття; core publication type
  - академічна доброчесність (academic integrity) — дотримуватися доброчесності, політика доброчесності; ethical publishing
    standards
  - відкритий доступ (open access) — золотий/зелений доступ, відкрита публікація; OA publishing model
  recommended:
  - реферат (extended abstract/summary) — розширений реферат, авторський реферат; longer than анотація
  - імпакт-фактор (impact factor) — журнал з високим імпакт-фактором; journal ranking metric
  - наукометрія (scientometrics) — наукометричні бази, наукометричні показники; publication metrics
  - плагіат (plagiarism) — перевірка на плагіат, уникати плагіату; academic integrity violation
  - рецензент (reviewer/referee) — призначити рецензента, відповідь рецензенту; peer review participant
