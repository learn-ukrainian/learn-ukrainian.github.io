module: c2-059
level: C2
sequence: 59
slug: academic-publishing
version: '2.0'
title: Академічне публікування українською мовою
subtitle: Academic Publishing in Ukrainian
focus: grammar
pedagogy: TTT
phase: C2.3 [Professional Language]
word_target: 5000
objectives:
- Learner can compose a bilingual abstract (Ukrainian + English) conforming to IMRAD structure and journal submission standards
- Learner can apply Ukrainian citation standards (DSTU 8302:2015) and navigate Scopus/WoS requirements for Ukrainian-language
  publications
- Learner can write a constructive peer review and respond to reviewer comments using appropriate Ukrainian academic register
- Learner can prepare conference materials (тези доповіді, poster, oral presentation) in Ukrainian academic register
