  notes: Official Ukrainian standard for bibliographic references in academic publications
- name: Національна бібліотека України ім. В. І. Вернадського
  url: https://nbuv.gov.ua/
  type: reference
  notes: Central Ukrainian academic repository and digital library resources
- name: МОН — Вимоги до наукових публікацій
  url: https://mon.gov.ua/
