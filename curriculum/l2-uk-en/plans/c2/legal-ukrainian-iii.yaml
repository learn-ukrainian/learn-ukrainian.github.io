vocabulary_hints:
  required:
  - позов (lawsuit/claim) — подати позов, забезпечення позову, предмет позову; висока
    частотність
  - 'позивач (plaintiff) — процесуальні права позивача; антонім: відповідач'
  - відповідач (defendant) — заперечення відповідача, виклик відповідача до суду
  - провадження (proceedings) — відкрити провадження, виконавче провадження, закрити
    провадження
  - ухвала (ruling/order) — постановлення ухвали, оскарження ухвали; процесуальний
    характер
  - рішення (decision/judgment) — ухвалити рішення, набрання рішенням законної сили,
    оскаржити рішення
  - апеляція (appeal) — подати апеляційну скаргу, апеляційний розгляд; термінологічна
    точність
  - касація (cassation) — касаційна скарга, розгляд у касаційному порядку
  - докази (evidence) — подання доказів, оцінка доказів, допустимість доказів
  - судовий збір (court fee) — квитанція про сплату судового збору, звільнення від
    сплати
  recommended:
  - вирок (sentence) — обвинувальний вирок; вживається виключно у кримінальному судочинстві
  - відзив (response/objection) — надати відзив на позов; ключовий документ захисту
  - клопотання (motion/petition) — заявити клопотання, задовольнити клопотання
  - згідно з (according to) — вживається з Орудним відмінком (згідно з законом)
  - відповідно до (in accordance with) — вживається з Родовим відмінком (відповідно
    до закону)
  - Електронний суд (E-Court) — подання документів онлайн; сучасний юридичний дискурс
