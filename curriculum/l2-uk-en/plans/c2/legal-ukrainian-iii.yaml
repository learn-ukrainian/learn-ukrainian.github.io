content_outline:
- section: 'Вступ: Судова система України та історичне коріння (Introduction: Ukraine''s
    Judicial System and Historical Roots)'
  words: 700
  points:
  - 'Аналіз структури судової влади згідно зі ст. 124-131 Конституції України: триланкова
    система (місцеві, апеляційні, Верховний Суд) та спеціалізовані суди.'
  - 'Історичний контекст: Магдебурзьке право в українських містах (Київ, Львів) як
    фундамент правової традиції самоврядування та кодифікованих прав.'
  - 'Державний стандарт (§3.7): Роль правоохоронних органів та судочинства у протидії
    корупції та забезпеченні правопорядку.'
- section: Офіційно-діловий стиль та мовна норма в юриспруденції (Official-Business
    Style and Linguistic Norms in Law)
  words: 850
  points:
  - 'Характеристики офіційно-ділового стилю (§4.3.1.1): точність, лаконічність, відсутність
    двозначності та використання стандартних кліше.'
  - 'Корекція типових помилок: прийменникове керування — «згідно з» (Орудний відмінок)
    проти «відповідно до» (Родовий відмінок).'
  - 'Лексична диференціація: розрізнення термінів «вирок» (лише у кримінальних справах),
    «рішення» (цивільне судочинство) та «ухвала» (процесуальні дії).'
  - 'Хибні друзі перекладача: вживання дієслова «апелювати» у строгому юридичному
    сенсі (оскаржувати) на відміну від загальномовного звернення.'
- section: 'Позовна заява: Структура та процесуальні вимоги (Statement of Claim: Structure
    and Procedural Requirements)'
  words: 900
  points:
  - 'Алгоритм складання позовної заяви: реквізити сторін, предмет позову (матеріально-правова
    вимога) та підстави позову (фактичні обставини).'
  - 'Юридична термінологія: опрацювання понять «забезпечення позову», «предмет і підстави»
    та «доказова база».'
  - 'Економічний аспект: порядок розрахунку та сплати судового збору згідно із Законом
    України «Про судовий збір».'
- section: Учасники судового розгляду та процесуальні стадії (Participants in the
    Trial and Procedural Stages)
  words: 850
  points:
  - 'Процесуальний статус учасників: права та обов''язки позивача, відповідача та
    третіх осіб; представництво адвокатом.'
  - 'Стадії провадження: від відкриття провадження та підготовчого засідання до розгляду
    справи по суті.'
  - 'Практикум: аналіз заперечень відповідача та підготовка відзиву на позовну заяву
    з дотриманням ділового етикету.'
- section: Судові рішення, оскарження та цифровізація (Judicial Decisions, Appeals,
    and Digitalization)
  words: 700
  points:
  - Процедура ухвалення та проголошення рішення; умови набрання рішенням законної
    сили.
  - 'Механізми оскарження: апеляційне та касаційне провадження; вимоги до змісту скарги.'
  - 'Сучасний контекст: система «Електронний суд» як інструмент модернізації та діджиталізації
    судочинства в Україні.'
  - 'Виконавче провадження: роль Державної виконавчої служби та примусове виконання
    судових актів.'
