content_outline:
- section: 'Вступ: Портфоліо як вияв мовної особистості (Introduction: Portfolio as
    Linguistic Identity Expression)'
  words: 500
  points:
  - Концепція 'мовної особистості' та 'ідіостилю' як центральних цілей рівня C2 —
    портфоліо як доказ стилістичної гнучкості
  - 'Методологія оцінювання за державним стандартом 2024 (§4.3.6): структура портфоліо
    та рубрики оцінювання виробничих навичок'
- section: 'Науковий стиль: Академічний дискурс та уникнення пасиву (Scientific Style:
    Academic Discourse and Avoiding Passive)'
  words: 750
  points:
  - 'Типова помилка: надмірне вживання пасивних конструкцій (напр. ''було зроблено
    аналіз'') замість активних або безособових форм (''проаналізовано'')'
  - Вимоги до академічної анотації згідно зі стандартом (§4.3.1.1) та підтримка високого
    наукового реєстру без канцеляризмів
- section: 'Офіційно-діловий стиль: Стандарти, кліше та точність (Official-Business
    Style: Standards, Clichés, and Precision)'
  words: 750
  points:
  - Роль функціональних кліше як позитивного явища стандартизації в офіційних документах
    на противагу їхньому негативному впливу в інших стилях
  - 'Запобігання стилістичному дисонансу: уникнення розмовних лексем та суржику в
    юридично точних текстах та ділових листах'
- section: 'Публіцистичний стиль: Полемічна майстерність та аналітика (Journalistic
    Style: Polemical Mastery and Analytics)'
  words: 750
  points:
  - 'Культурний гачок: Памфлети Миколи Хвильового 1920-х років як взірець інтелектуальної
    полеміки, що поєднує гостроту стилю з аналітичною глибиною'
  - 'Диференціація жанрів: відмінності в регістрі та мовних засобах між аналітичною
    колонкою та фактологічним журналістським звітом'
- section: 'Художній стиль: Пошук власного ідіостилю (Artistic Style: Searching for
    Own Idiostyle)'
  words: 750
  points:
  - 'Творче письмо: подолання мовних штампів та робота над індивідуальною образністю
    (ідіостилем) у межах літературного уривку'
  - Використання стилістичних фігур та тропів для досягнення емоційної виразності
    відповідно до вимог C2.2 (Literary Mastery)
- section: 'Епістолярій та розмовність: Тон, кличний відмінок та Франко (Epistolary
    and Colloquial: Tone, Vocative, and Franko)'
  words: 1000
  points:
  - Епістолярна спадщина Івана Франка як приклад майстерного переходу від офіційного
    до інтимного тону в листуванні
  - 'Помилка калькування звертань: відпрацювання правильних форм кличного відмінка
    («Пане професоре», «Дорога громадо») замість дослівного перекладу з англійської'
  - 'Природність мовлення в діалогах: використання дискурсивних маркерів та уникнення
    бюрократизмів у живому спілкуванні'
- section: 'Самооцінка та рефлексія: Критерії успіху (Self-assessment and Reflection:
    Success Criteria)'
  words: 500
  points:
  - Критичний аналіз створених текстів за дескрипторами якості державного стандарту
    та виявлення індивідуальних стилістичних лакун
  - Складання плану вдосконалення мовної компетентності з акцентом на розрізненні
    конотацій та зміні стилістичних регістрів
