module: c2-023
level: C2
sequence: 23
version: 1.1.2
title: 'Практикум з мовної майстерності I: лексико-стилістична точність'
subtitle: Практикум мовної майстерності I
focus: integration
pedagogy: workshop
objectives:
- Систематизувати знання про складні випадки слововживання та стилістичної 
  диференціації
- Опанувати техніку глибокого редагування текстів різних функціональних стилів
- Збагатити активний словник рідковживаними фразеологізмами та професійною 
  термінологією
- Вдосконалити вміння семантичної конденсації та розгортання складних концептів
content_outline:
- section: Лабіринти лексики та фразеології
  words: 1000
  subsections:
  - 'Паронімічна точність: розрізнення смислових нюансів у подібних словах'
  - 'Фразеологічна автентичність: уникнення кальок та пошук питомих еквівалентів'
  - 'Архаїзми та неологізми: доречність та функціональне навантаження'
  key_concepts:
  - паронімія
  - фразеологічна синонімія
  - лексична сполучуваність
  - пуризм
  primary_sources:
  - Борис Антоненко-Давидович, 'Як ми говоримо'
  - Святослав Караванський, 'Секрети української мови'
- section: Синтаксична архітектоніка складного вислову
  words: 1000
  subsections:
  - Ритмічна організація складних синтаксичних цілих
  - Інверсія та інші засоби актуалізації сенсу в реченні
  - Помилки в побудові складних речень та способи їх усунення
  key_concepts:
  - актуальне членування
  - дистантний зв'язок
  - період
  - стилістичний синтаксис
- section: Мистецтво стилістичного редагування
  words: 1000
  subsections:
  - Алгоритм редакторського аналізу тексту
  - Усунення мовного сміття, тавтології та плеоназмів
  - Адаптація авторського тексту до вимог видавничих стандартів
  key_concepts:
  - редагування
  - плеоназм
  - канцеляризм
  - мовна економія
- section: Трансформаційні вправи
  words: 1000
  subsections:
  - 'Компресія тексту: від анотації до твіту без втрати змісту'
  - 'Декомпресія: розгортання афоризму в аналітичне есе'
  - Стилістична перекодифікація (трансформація офіційного повідомлення в 
    художній нарис)
  key_concepts:
  - компресія
  - парафраз
  - інтерпретація
  - когнітивна лінгвістика
- section: Підсумок — Summary
  words: 300
  points:
  - "Stylistic precision relies on distinguishing paronyms and avoiding calques in
    favor of authentic phraseology. Self-check: What is the semantic difference between
    'особистий' and 'особовий'? Identify and correct one common grammatical calque
    using Антоненко-Давидович's principles."
  - 'Advanced editing requires mastering text compression, syntactic architectonics,
    and eliminating language clutter like pleonasms. Self-check: Transform a formal,
    bureaucratic sentence into a concise summary without losing its core meaning.
    Name two common pleonasms to avoid in professional Ukrainian writing.'
word_target: 4000
activities:
  types_required:
  - error-correction
  - select
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Лексична стилістика'
- 'Авраменко, 11 клас (2019): Паронімія та синонімія'
- 'Заболотний, 11 клас (2019): Стилістичне редагування тексту'
- 'Державний стандарт 2024: C2 — лексико-стилістична компетенція'
reading_situations:
- source_type: Науково-популярна праця
  topic: Аналіз мовних порад Бориса Антоненка-Давидовича щодо вживання 
    дієприкметників.
  key_elements:
  - активні дієприкметники
  - описові конструкції
  - мовна норма
  motivation: Вивчення шляхів подолання надмірного впливу чужих граматичних 
    структур.
- source_type: Художня проза
  topic: Аналіз стилістичних правок у рукописах Михайла Коцюбинського.
  key_elements:
  - епітет
  - ритміка
  - точність слова
  motivation: Спостереження за процесом творчого пошуку ідеального вислову.
listening_situations:
- media_type: подкаст
  setting: 'Інтерв''ю з відомим літредактором: ''Типові огріхи в рукописах сучасних
    авторів''.'
  focus_points:
  - Паразитарні конструкції
  - Невдале використання метафор
  motivation: Сприйняття професійного погляду на стан сучасної мовної культури.
writing_tasks:
- task_type: відгук
  prompt: Відредагуйте наданий текст (фрагмент перекладу з російської, 
    пересичений кальками та канцеляризмами) і напишіть обґрунтований відгук на 
    роботу перекладача, пропонуючи кращі варіанти.
  requirements:
  - мінімум 300 слів відгуку
  - аргументація з посиланням на норми
  - збереження інтенції автора
  motivation: Розвиток критичного мислення та практичних навичок редагування.
  model_answer: Відгук має містити класифікацію помилок, пояснення, чому ці 
    варіанти є невдалими, та демонструвати володіння синонімічним багатством 
    мови.
discussion_topics:
- context: Чи може бути забагато редагування? Де межа між виправленням помилок 
    та втручанням у творчий задум?
  questions:
  - Які ознаки надмірного редагування?
  - Чи має автор право на 'стилістичну помилку' заради художнього ефекту?
  motivation: Дискусія про етику та естетику редакторської праці.
activity_hints:
- type: reading
  focus: Прочитайте текст про лабіринти лексики та фразеології і дайте відповіді
    на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про синтаксична архітектоніка 
    складного вислову, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Лабіринти лексики 
    та фразеології». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    лабіринти лексики та фразеології.
- type: comparative-study
  focus: 'Порівняйте різні підходи до лабіринти лексики та фразеології: Паронімічна
    точність: розрізнення смислових нюансів у подібних словах. Визначте спільне та
    відмінне.'
phase: C2.1 [Stylistic Perfection]
