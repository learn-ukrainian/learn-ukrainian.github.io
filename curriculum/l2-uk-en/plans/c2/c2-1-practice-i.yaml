vocabulary_hints:
  required:
  - портфоліо (portfolio) — створення презентаційного портфоліо; висока частотність
    в академічному середовищі
  - дискурс (discourse) — науковий та публічний дискурс; аналіз мовних стратегій (Стандарт
    §4.3.1.1)
  - реєстр (register) — зміна стилістичного реєстру залежно від адресата; ключова
    компетентність C2
  - конотація (connotation) — розрізнення негативних та позитивних конотацій для точного
    вибору лексем
  - канцеляризм (bureaucratic jargon) — розпізнавання та усунення канцеляризмів у
    розмовному та художньому стилях
  - кліше (cliché) — використання функціональних кліше в офіційному дискурсі на противагу
    мовним штампам
  recommended:
  - ідіостиль (idiostyle) — індивідуальна авторська манера; прояв 'мовної особистості'
  - калькування (calquing) — запобігання калькуванню з англійської (особливо в пасивних
    конструкціях та звертаннях)
  - памфлет (pamphlet) — гострий полемічний жанр; приклад публіцистики Миколи Хвильового
  - рефлексія (reflection) — критичне осмислення власного прогресу та стилістичних
    виборів
  - діапазон (range) — широта використання стилістичних засобів мови
