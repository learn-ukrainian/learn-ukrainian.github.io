content_outline:
- section: Вступ — Особливості усної професійної комунікації (Introduction — Features
    of Oral Professional Communication)
  words: 400
  points:
  - Відмінність між академічним та бізнесовим регістрами української мови в усному
    професійному дискурсі
  - 'Зміна культури звертань: перехід від радянської моделі ''ім’я + по батькові''
    до сучасних ''Пан/Пані + ім’я'' або звертання на ім''я в ІТ-сфері'
  - Роль невербальної комунікації та адаптація мовлення до контексту ситуації (High-level
    register adaptation)
- section: Професійна презентація та риторика (Professional Presentation and Rhetoric)
  words: 600
  points:
  - Використання елементів риторики в композиції виступу згідно з вимогами стандарту
    §4.3.5
  - 'Еволюція PowerPoint-культури в Україні: від перенасичених текстом академічних
    слайдів до візуального сторітелінгу за зразком TED'
  - 'Подолання помилки читання з аркуша: техніки живого зорового контакту та риторичної
    взаємодії з авдиторією'
- section: Участь у нарадах та засіданнях (Participation in Meetings and Sessions)
  words: 500
  points:
  - 'Етикет проведення оперативних нарад: регламент виступів (turn-taking) та модерація'
  - 'Типова лексична помилка: вживання калькованого ''приймати участь'' замість нормативного
    ''брати участь'' — практичне відпрацювання'
  - Мовленнєві формули для ввічливого переривання, аргументованої незгоди та підбиття
    підсумків засідання
- section: Конференційна комунікація та створення вторинних текстів (Conference Communication
    and Secondary Texts)
  words: 500
  points:
  - 'Специфіка наукової доповіді vs. популярної презентації: баланс між термінологічною
    точністю та доступністю'
  - 'Уміння утворювати вторинні тексти: ведення протоколів нарад та складання тез
    доповіді згідно з §4.3.8'
  - Стратегії нетворкінгу та професійного спілкування на українських бізнес-форумах
    (наприклад, iForum)
- section: Телефонні та відеоконференції (Telephone and Video Conferences)
  words: 500
  points:
  - 'Специфіка дистанційного спілкування: технічний етикет та подолання комунікаційних
    бар’єрів'
  - 'Лексична норма: використання ''правильна відповідь/рішення'' замість помилкового
    ''вірна відповідь'' у професійній дискусії'
  - Особливості надання та отримання конструктивного зворотного зв’язку (фідбеку)
    в онлайн-форматі
- section: Практична симуляція та оцінювання (Practical Simulation and Evaluation)
  words: 500
  points:
  - 'Рольова гра: симуляція професійної наради або конференційної сесії з фокусом
    на природність та етикет'
  - 'Підсумковий аналіз виступів: самокорекція та вдосконалення навичок усної професійної
    комунікації'
