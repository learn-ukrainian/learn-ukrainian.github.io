vocabulary_hints:
  required:
  - презентація (presentation) — ефективна презентація, робити презентацію (High frequency
    in business/academic)
  - доповідь (report/presentation) — виголошувати доповідь, тези доповіді (High frequency
    academic/official)
  - нарада (meeting) — проводити нараду, брати участь у нараді (High frequency business)
  - порядок денний (agenda) — затвердити порядок денний, включити до порядку денного
    (Formal register)
  - зворотний зв'язок (feedback) — давати/отримувати зворотний зв'язок, конструктивний
    фідбек (Modern business context)
  recommended:
  - брати участь (to participate) — виправлення кальки 'приймати участь'
  - правильне рішення (correct decision) — виправлення кальки 'вірне рішення'
  - протокол (minutes) — вести протокол засідання (Administrative context)
  - черговість (turn-taking) — дотримуватися черговості виступів
  - авдиторія (audience) — взаємодія з авдиторією (Modern spelling)
  - нетворкінг (networking) — професійний нетворкінг
