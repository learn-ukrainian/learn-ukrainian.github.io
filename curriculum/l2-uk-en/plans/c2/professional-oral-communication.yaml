module: c2-052
level: C2
sequence: 52
version: 1.2.2
title: 'Професійна усна комунікація: Мистецтво публічного виступу та презентації'
subtitle: Професійна усна комунікація
focus: professional
pedagogy: seminar
objectives:
- Досягти найвищого рівня ораторської майстерності у професійному середовищі
- Опанувати техніки управління аудиторією та подолання комунікативних бар'єрів
- Навчитися створювати та проводити переконуючі мультимедійні презентації 
  українською мовою
- Вдосконалити навички імпровізації та швидкого реагування на складні запитання 
  під час виступів
content_outline:
- section: Риторика та психологія публічного виступу
  words: 1250
  subsections:
  - 'Побудова композиції виступу: вступ, аргументація, кульмінація, фінал'
  - Використання риторичних фігур та тропів для підсилення експресивності 
    мовлення
  - 'Невербальна комунікація: мова тіла, жестикуляція, зоровий контакт як доповнення
    до слова'
  key_concepts:
  - риторична композиція
  - комунікативна інтенція
  - аргументація
  - паралінгвістика
  primary_sources:
  - В'ячеслав Чорновіл, Вибрані промови та виступи (аналіз ораторського стилю та
    засобів переконання)
- section: Презентаційні стратегії у професійній сфері
  words: 1250
  subsections:
  - 'Дизайн повідомлення: поєднання візуального ряду та усного коментаря'
  - 'Сторітелінг у професійній презентації: перетворення даних на захопливу розповідь'
  - Адаптація змісту та стилю виступу під рівень підготовки та очікування 
    аудиторії
  key_concepts:
  - візуальна комунікація
  - сторітелінг
  - цільова аудиторія
  - презентаційний скрипт
- section: Культура дискусії та робота із запитаннями
  words: 1250
  subsections:
  - Техніки активного слухання та парафразування під час професійного діалогу
  - Стратегії відповіді на маніпулятивні та провокаційні запитання
  - 'Етикет ведення фахової дискусії: повага до опонента та конструктивний пошук істини'
  key_concepts:
  - дискурс-аналіз
  - активне слухання
  - маніпуляція
  - контр-аргумент
  primary_sources:
  - Степан Смаль-Стоцький, 'Мова і наука' (аналіз полеміки про науковий статус 
    української мови)
- section: Голос, дикція та енергетика мовця
  words: 1250
  subsections:
  - Вправи на розвиток дихання, артикуляції та мелодики професійного мовлення
  - Управління тембром та темпоритмом виступу для утримання уваги аудиторії
  - Подолання страху сцени та методи самоналаштування перед відповідальним 
    виходом
  key_concepts:
  - фонетична чистота
  - інтонаційне варіювання
  - темпоритм
  - самопрезентація
- section: Підсумок — Summary
  words: 300
  points:
  - Master the elements of rhetorical composition (вступ, аргументація, 
    кульмінація, фінал) and professional presentation strategies, including 
    сторітелінг and візуальна комунікація.
  - Navigating professional discussions requires активне слухання and the 
    ability to counter маніпуляція with strong контр-аргументи while maintaining
    proper темпоритм.
  - 'Self-check: How do you handle manipulative questions during a Q&A? What is the
    difference between simple speaking and utilizing a презентаційний скрипт? Describe
    3 non-verbal techniques (невербальна комунікація) to engage your audience.'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): §36-37 — Культура усного мовлення'
- 'Авраменко, 11 клас (2019): Риторика та публічний виступ'
- 'Державний стандарт 2024: C2 — комунікативна компетенція'
reading_situations:
- source_type: Промова
  topic: Аналіз виступів В'ячеслава Чорновола. Дослідження логіки побудови 
    політичного та професійного вислову.
  key_elements:
  - громадянська позиція
  - риторична фігура
  - логічний наголос
  motivation: Вивчення взірців української ораторської майстерності новітнього 
    часу.
- source_type: Полемічна праця
  topic: Аналіз наукових дискусій Степана Смаль-Стоцького. Вивчення способів 
    ведення аргументованої суперечки.
  key_elements:
  - доказова база
  - спростування
  - інтелектуальна чесність
  motivation: Розвиток здатності до аналізу складних фахових дебатів минулого.
listening_situations:
- media_type: лекція
  setting: Публічна лекція Оксани Забужко про роль інтелектуала в сучасному 
    світі (аналіз ораторської манери).
  focus_points:
  - Складність синтаксису усномовного вислову
  - Використання пауз та акцентів для підкреслення сенсів
  motivation: Сприйняття та аналіз високого інтелектуального стилю усного 
    мовлення.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть сценарій (скрипт) для 10-хвилинного виступу на конференції 
    TEDxUA на тему 'Майбутнє вашої професії в Україні'. Опишіть також візуальні 
    образи, які мають супроводжувати ваш виступ.
  requirements:
  - мінімум 800 слів
  - використання метафор
  - 'чітка структура: зачіпка, тези, заклик до дії'
  motivation: Комплексна перевірка навичок підготовки публічного виступу.
  model_answer: Скрипт має демонструвати вміння автора утримувати увагу, 
    використовувати риторичні засоби та структурувати складну інформацію у 
    форматі розповіді. Мова має бути живою, але професійною.
discussion_topics:
- context: Чи може харизма оратора компенсувати слабку аргументацію у 
    професійному виступі?
  questions:
  - Де проходить межа між ораторською майстерністю та маніпуляцією?
  - Як змінилися вимоги до публічного мовлення в епоху соціальних мереж та 
    коротких відео?
  motivation: Обговорення етичних та практичних аспектів сучасної професійної 
    ораторики.
activity_hints:
- type: reading
  focus: Прочитайте текст про риторика та психологія публічного виступу і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про презентаційні стратегії у 
    професійній сфері, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Риторика та 
    психологія публічного виступу». Обґрунтуйте свою позицію прикладами з 
    тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    риторика та психологія публічного виступу.
- type: comparative-study
  focus: 'Порівняйте різні підходи до риторика та психологія публічного виступу: Побудова
    композиції виступу: вступ, аргументація, кульмінація, фінал. Визначте спільне
    та відмінне.'
phase: C2.3 [Professional Specialization]
