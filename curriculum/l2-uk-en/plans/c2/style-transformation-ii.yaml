vocabulary_hints:
  required:
  - фреймінг (framing) — зміна фреймінгу, медійний фреймінг; ключовий термін для аналізу
    подачі інформації в медіа.
  - наратив (narrative) — будувати наратив, стратегічний наратив; висока частотність
    у сучасному публіцистичному дискурсі.
  - саспенс (suspense) — тримати в саспенсі, нагнітання саспенсу; прийом створення
    емоційної напруги в оповідній структурі.
  - апель (appeal) — емоційний апель, апель до цінностей; риторичний прийом звернення
    до емоційної сфери аудиторії.
  - канцеляризм (bureaucratism) — уникати канцеляризмів, нагромадження канцеляризмів;
    ознаки «дерев'яної мови», що заважають сприйняттю.
  - концепція (concept) — методологічна основа трансформації; загальне бачення медійного
    продукту.
  recommended:
  - деофіціалізація (de-officialization) — перехід від формального до «людяного» тону;
    тренд сучасної державної та корпоративної комунікації.
  - верифікація (verification) — перевірка джерел; критична навичка для запобігання
    маніпуляціям при спрощенні офіційних текстів.
  - інтерпретація (interpretation) — контекстуалізація фактів; розкриття прихованих
    значень при зміні стилістичного регістру.
  - контекстуалізація (contextualization) — надання ширшого контексту офіційній інформації
    для її адаптації до публіцистичного стилю.
