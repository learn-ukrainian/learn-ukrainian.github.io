module: style-transformation-ii
level: C2
sequence: 11
version: '1.2'
title: 'Трансформація стилів: практичне моделювання'
subtitle: Style Transformation II
focus: integration
pedagogy: workshop
objectives:
- Опанувати передові техніки адаптації складних інтелектуальних текстів для різних аудиторій
- Розвинути навички створення багаторівневих текстів з використанням прихованих стилістичних кодів
- Навчитися керувати емоційним та інтелектуальним впливом тексту через зміну стилістичних домінант
- Дослідити етичні аспекти стилістичних маніпуляцій у сучасному інформаційному просторі
content_outline:
- section: Адаптація та популяризація складних смислів
  words: 1250
  subsections:
  - Техніки спрощення (simplification) наукового дискурсу для масового читача
  - 'Збереження точності при зміні експресивності: від формул до образів'
  - Сторітелінг як інструмент трансформації офіційної інформації
  key_concepts:
  - популяризація
  - адаптація
  - інтерпретація
  - наукпоп
- section: Стилістичні маніпуляції та контр-маніпуляції
  words: 1250
  subsections:
  - Аналіз пропагандистських технік крізь призму стилістики
  - Виявлення прихованих ідеологем у нейтральних на перший погляд текстах
  - 'Методи стилістичного опору: іронія, езопова мова, гіперболізація'
  key_concepts:
  - маніпуляція
  - ідеологема
  - езопова мова
  - контр-дискурс
  primary_sources:
  - Василь Барка, 'Жовтий князь' (аналіз стилістики трагедії)
  - Джордж Орвелл, '1984' (український переклад, аналіз 'новомови')
- section: Авторська ідентичність та стильова мімікрія
  words: 1250
  subsections:
  - Свідоме використання стильових масок у художньому та публіцистичному письмі
  - Проблема автентичності в умовах тотальної стилізації
  - Стиль як засіб створення альтернативних реальностей (фанфіки, альтернативна історія)
  key_concepts:
  - мімікрія
  - містифікація
  - ідіостиль
  - авторська маска
- section: Стилістичний аудит та редизайн тексту
  words: 1250
  subsections:
  - Аналіз ефективності стильового вибору для конкретної комунікативної задачі
  - 'Техніки редагування: від ''засміченого'' тексту до стилістичного еталона'
  - Трансформація тексту під вимоги SEO та SMM без втрати якості мови
  key_concepts:
  - аудит тексту
  - редизайн
  - копірайтинг
  - мовна норма
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - writing
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Науково-популярна стаття
  topic: Пояснення квантової фізики через метафори української демонології.
  key_elements:
  - дифузія
  - суперпозиція
  - мавка
  - міфологема
  motivation: Аналіз успішного синтезу наукового та художньо-міфологічного дискурсів.
- source_type: Маніпулятивний текст
  topic: Деконструкція політичної реклами або пропагандистського заклику.
  key_elements:
  - емоційні тригери
  - логічні помилки
  - евфемізми
  motivation: Розвиток навичок критичного лінгвістичного аналізу.
listening_situations:
- media_type: лекція
  setting: Виступ відомого інтелектуала про 'смерть автора' та народження читача.
  focus_points:
  - Використання цитування як стилістичного прийому
  - Темп та паузація як інструменти переконання
  motivation: Вивчення риторики високого інтелектуального рівня.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть репортаж про вигадану подію в майбутньому (наприклад, відкриття першої колонії на Марсі), використовуючи
    стиль козацьких літописів XVII ст. Потім напишіть про ту саму подію в стилі сухого наукового звіту.
  requirements:
  - мінімум 500 слів загалом
  - архаїчна лексика для першої частини
  - максимальна об'єктивність для другої
  motivation: Відпрацювання глибокої стилістичної мімікрії та контрастного письма.
  model_answer: Перша частина має бути сповнена барокових метафор, посилань на Божу волю та звитягу. Друга — оперувати цифрами,
    технічними термінами та пасивними конструкціями. Обидва тексти мають описувати одну й ту саму подію.
discussion_topics:
- context: Чи може стиль бути аморальним? Чи несе письменник відповідальність за стилістичне прикрашання жахливих подій?
  questions:
  - Чи існує естетизація зла в українській літературі?
  - Як стиль впливає на наше сприйняття історичної правди?
  motivation: Глибока дискусія на перетині етики та естетики мови.
activity_hints:
- type: critical-analysis
  hint: Деконструюйте пропагандистський текст, виявивши приховані ідеологеми та маніпулятивні прийоми
- type: style-transformation
  hint: Перепишіть подію у стилі козацького літопису XVII ст. та у стилі наукового звіту
- type: error-correction
  hint: Виявіть та усуньте стилістичний баласт (штампи, канцеляризми, кальки) у поданому тексті
- type: authorial-intent
  hint: Визначте стратегію стилістичної мімікрії та маскування авторської позиції
references:
- Барка В. Жовтий князь — стилістика трагедії
- Глазова О. П. Українська мова, 11 клас (2019), §40-45 — стилістична трансформація
- Караман С. О. Українська мова, 10 клас (2018), §53 — стилістика словотвору
