content_outline:
- section: 'Вступ: Від бюрократії до людяності (Introduction: From Bureaucracy to
    Humanity)'
  words: 600
  points:
  - 'Аналіз вимог Державного стандарту (§4.3.7) щодо трансформації офіційно-ділового
    стилю в публіцистичний: методологія переходу від сухої констатації фактів до впливового
    медійного тексту.'
  - 'Феномен «дерев''яної мови» (wooden language) у пострадянському просторі та сучасна
    деофіціалізація: порівняльний аналіз стилістики комунікації «Дії» та Укрзалізниці
    проти застарілих бюрократичних звітів.'
- section: Деофіціалізація та зміна фокусу (De-officialization and Shifting the Focus)
  words: 1250
  points:
  - 'Кейс-стаді: Трансформація воєнних зведень Генштабу — як офіційні цифри та терміни
    перетворюються на емоційні наративи про героїв у незалежних медіа без втрати фактологічної
    точності.'
  - 'Зміна фокусу з документа на результат: техніка персоніфікації статистики та впровадження
    прямої мови (цитування живих людей) для посилення «людського інтересу» в публіцистиці.'
- section: Емоційний апель та риторичні стратегії (Emotional Appeal and Rhetorical
    Strategies)
  words: 1100
  points:
  - 'Побудова стратегічного наративу: використання емоційної лексики та «апелю до
    цінностей» (appeal to values) для створення глибинного зв''язку з аудиторією в
    межах медійного фреймінгу.'
  - 'Запобігання маніпуляціям: методика верифікації фактів та уникнення оцінних суджень
    без підґрунтя (Learner Error: перетворення новини на маніпуляцію через зловживання
    емоційністю).'
- section: Синтаксичний та лексичний «переклад» (Syntactic and Lexical Translation)
  words: 1100
  points:
  - 'Подолання канцеляриту (Bureaucratic to Human): заміна пасивних конструкцій («було
    вирішено») активними дієсловами («вирішили», «ми ініціювали») для динамізації
    тексту (Learner Error: калькування синтаксису).'
  - 'Термінологічна точність vs Читабельність: трансформація складних юридичних термінів
    (напр., «відчуження майна») у зрозумілу публічну мову без викривлення суті (Learner
    Error: втрата точності при спрощенні).'
- section: Наративна структура та візуальна мова (Narrative Structure and Visual Language)
  words: 950
  points:
  - 'Елементи саспенсу в публіцистиці: використання специфічної оповідної структури
    (інтрига, кульмінація) та нагнітання саспенсу для утримання уваги читача в лонгрідах
    та feature-статтях.'
  - 'Від цифр до образів: застосування метафор, порівнянь та сенсорних деталей для
    візуалізації абстрактних статистичних даних та створення образності опису.'
