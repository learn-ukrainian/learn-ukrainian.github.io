module: c2-055
level: C2
sequence: 55
version: 1.2.1
title: 'Професійні дискусії: Аргументація, полеміка та переговори'
subtitle: 'Професійні дискусії: аргументація і переговори'
focus: professional
pedagogy: seminar
objectives:
- Досягти досконалості у веденні складних професійних дискусій та переговорів
- Опанувати стратегії переконуючої аргументації та методи деконструкції маніпуляцій
- Навчитися гнучко змінювати мовний регістр залежно від перебігу дискусії та реакції опонентів
- Вдосконалити навички підбиття підсумків та фіксації домовленостей у професійному діалозі
content_outline:
- section: Структура та стратегії професійної аргументації
  words: 1250
  subsections:
  - 'Побудова логічного ланцюжка аргументів: теза, доказ, демонстрація, висновок'
  - 'Види аргументів: раціональні, емоційні, етичні (логос, пафос, етос)'
  - Техніки підкріплення власної позиції через апеляцію до авторитетів та фактів
  key_concepts:
  - аргументація
  - теза
  - логос
  - етос
  primary_sources:
  - Агатангел Кримський, 'Про наукову термінологію' (приклад аргументативного тексту)
- section: Мистецтво полеміки та управління конфліктом
  words: 1250
  subsections:
  - 'Прийоми спростування позиції опонента: від критики фактів до аналізу логіки'
  - 'Використання іронії та сарказму у професійній полеміці: межі дозволеного'
  - Способи нейтралізації агресії та переведення деструктивної суперечки у конструктивне русло
  key_concepts:
  - полеміка
  - контраргументація
  - редукція до абсурду
  - фасилітація
- section: Психолінгвістика переговорного процесу
  words: 1250
  subsections:
  - 'Мовна підготовка до переговорів: визначення цілей, позицій та альтернатив (BATNA)'
  - Використання пауз, темпу мовлення та інтонації як інструментів впливу
  - Розпізнавання та подолання маніпулятивних тактик у професійному спілкуванні
  key_concepts:
  - переговори
  - компроміс
  - консенсус
  - маніпулятивна тактика
  primary_sources:
  - Михайло Драгоманов, 'Листи до Івана Франка' (аналіз полемічного стилю та переговорних позицій)
- section: Підбиття підсумків та результативність дискусії
  words: 1250
  subsections:
  - 'Формулювання фінальних домовленостей: однозначність та лаконічність'
  - 'Мистецтво компромісу: як програти в деталях, але виграти у стратегії'
  - Аналіз проведеної дискусії та оцінювання власної комунікативної ефективності
  key_concepts:
  - резолюція
  - протокол
  - рефлексія
  - синергія
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): §36-37 — Культура усного мовлення'
- 'Авраменко, 11 клас (2019): Риторика та публічний виступ'
- 'Державний стандарт 2024: C2 — комунікативна компетенція'
reading_situations:
- source_type: Наукова полеміка
  topic: Аналіз статті Агатангела Кримського про термінологію. Вивчення способів ведення наукової суперечки та використання
    аргументів.
  key_elements:
  - пуризм
  - термінотворення
  - логічна послідовність
  motivation: Вивчення класичних взірців української інтелектуальної дискусії.
- source_type: Приватне листування інтелектуалів
  topic: Аналіз полеміки у листах Михайла Драгоманова до Івана Франка. Дослідження стратегій переконання та емоційного фону.
  key_elements:
  - громадська думка
  - ідейна боротьба
  - стиль викладу
  motivation: Розуміння глибинних механізмів формування українського професійного та політичного дискурсу.
listening_situations:
- media_type: відео
  setting: Дебати на тему економічних реформ в Україні за участю провідних експертів (аналіз мовних тактик).
  focus_points:
  - Робота з цифрами та фактами у живому мовленні
  - Реакція на критику та несподівані тези опонентів
  motivation: Сприйняття та аналіз сучасної динамічної фахової полеміки.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть аналітичну записку про стратегію ведення переговорів з проблемним клієнтом/партнером, описуючи конкретні
    мовні прийоми, які ви плануєте застосувати.
  requirements:
  - мінімум 600 слів
  - використання професійної термінології
  - прогнозування результату
  motivation: Практичне застосування навичок планування професійної комунікації.
  model_answer: Текст має бути структурованим, містити аналіз ризиків та чіткий план комунікації. Автор повинен показати розуміння
    психолінгвістичних аспектів переговорів.
discussion_topics:
- context: Чи завжди консенсус є найкращим результатом професійної дискусії?
  questions:
  - Коли варто йти на конфлікт задля захисту професійної істини?
  - Як культура переговорів впливає на розвиток бізнесу та науки в Україні?
  motivation: Обговорення філософських та практичних аспектів професійної взаємодії.
activity_hints:
- type: reading
  focus: Прочитайте текст про структура та стратегії професійної аргументації і дайте відповіді на запитання щодо ключових
    понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про мистецтво полеміки та управління конфліктом, використовуючи нову лексику
    модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Структура та стратегії професійної аргументації». Обґрунтуйте
    свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему структура та стратегії професійної аргументації.
- type: comparative-study
  focus: 'Порівняйте різні підходи до структура та стратегії професійної аргументації: Побудова логічного ланцюжка аргументів:
    теза, доказ, демонстрація, висновок. Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
