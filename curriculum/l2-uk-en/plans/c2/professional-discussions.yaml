content_outline:
- section: 'Вступ: Етика та культура професійного дискурсу (Introduction: Ethics and Professional Discourse Culture)'
  words: 700
  points:
  - Поняття конструктивного діалогу та відмінність «дискусії» від «суперечки» у фаховому середовищі
  - 'Принципи професійної етики під час обговорень: конструктивізм, ввічливість та повага до опонента'
  - 'Хибні друзі перекладача: розмежування значення слова «аргумент» (як доказ/reason) та поняття «суперечка» (dispute/argument)'
- section: Публічні дебати та мистецтво переконання (Public Debates and the Art of Persuasion)
  words: 1300
  points:
  - 'Традиція публічних дебатів в Україні на прикладі «Суспільного» та «Громадського»: високі стандарти модерації'
  - Структура формальних дебатів та реалізація вимог стандарту §4.3.5 щодо риторичної композиції тексту
  - 'Аргументація та контраргументація: наведення вагомих та переконливих аргументів'
  - 'Типові помилки: калькування англійської ідіоми «make a point» — перехід від неправильного «зробити точку» до питомого
    «висловити думку / навести аргумент»'
  - Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами
- section: Ділові переговори та інститут медіації (Business Negotiations and the Institution of Mediation)
  words: 1300
  points:
  - Типи та стратегії переговорів (розподільчі та інтегративні) відповідно до стандарту §3.13
  - Закон України «Про медіацію» (2021) як новий контекст для професійного вирішення конфліктів
  - 'Техніки досягнення компромісу: пошук «розумного компромісу» та робота з концепціями BATNA та ZOPA'
  - 'Термінологія переговорного процесу: «сідати за стіл переговорів», «вести переговори», «виходити з глухого кута»'
  - Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами
- section: Експертні консультації та пошук консенсусу (Expert Consultations and Seeking Consensus)
  words: 1000
  points:
  - Роль експерта та представлення фахової думки в обговоренні складних суспільних проблем (§3.7)
  - 'Плутанина регістрів: дотримання офіційно-ділового стилю та уникнення емоційно забарвленої лексики (сварка, базар) у дискусії'
  - Механізми досягнення «загального консенсусу» в робочих групах та прийняття колективних рішень
- section: Модерація та підбиття підсумків (Moderation and Summarizing Results)
  words: 700
  points:
  - 'Роль модератора як фасилітатора: техніки управління динамікою групи та нейтралізації конфліктів'
  - 'Мистецтво резюмування: підбиття підсумків, структурування результатів дискусії та формулювання висновків'
  - 'Заключне слово: етичні аспекти завершення професійного обговорення та планування подальших кроків'
vocabulary_hints:
  required:
  - дискусія (discussion) — плідна дискусія, гостра дискусія, винести питання на дискусію
  - дебати (debate) — парламентські дебати, брати участь у дебатах; часто у контексті медіа
  - переговори (negotiations) — вести переговори, сідати за стіл переговорів, ділові переговори
  - аргумент (argument/reason) — вагомий аргумент, переконливий аргумент; доказ, а не суперечка
  - компроміс (compromise) — шукати компроміс, піти на розумний компроміс
  - консенсус (consensus) — досягти загального консенсусу, дійти згоди
  - модератор (moderator) — ключова фігура, що забезпечує дотримання регламенту та етики
  - експерт (expert) — фахівець, що надає професійну оцінку; експертне середовище
  - позиція (position) — чітка позиція, обґрунтувати свою позицію
  recommended:
  - медіація (mediation) — альтернативний спосіб вирішення спорів за участю посередника
  - фасилітатор (facilitator) — особа, що полегшує процес комунікації в групі
  - полеміка (polemics) — гостра дискусія при зіткненні протилежних думок
  - резюмування (summarizing) — стислий виклад основних положень обговорення
  - пропонент (proponent) — особа, що висуває та підтримує тезу в дебатах
  - опонент (opponent) — супротивник у дискусії або дебатах
