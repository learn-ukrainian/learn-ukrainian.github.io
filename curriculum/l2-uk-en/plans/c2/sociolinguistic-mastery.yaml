module: c2-087
level: C2
sequence: 87
version: 1.2.2
title: Соціолінгвістична майстерність
subtitle: Соціолінгвістична майстерність
focus: cultural
pedagogy: workshop
objectives:
- Опанувати різні соціальні регістри української мови та навчитися доречно 
  перемикатися між ними
- 'Вивчити прагматику спілкування: стратегії ввічливості, мовленнєві акти та культурні
  коди'
- Проаналізувати взаємозв'язок між мовою, соціальним статусом та груповою 
  ідентичністю
- Навчитися ідентифікувати та використовувати професійні жаргони та сленг у 
  відповідних контекстах
content_outline:
- section: 'Соціальні виміри мови: регістри та стилі'
  words: 1250
  subsections:
  - 'Високий академічний та дипломатичний регістри: норми та обмеження'
  - Нейтральний розмовний стиль як база міжособистісного спілкування
  - 'Нижній регістр: сленг, арго та жаргон у молодіжному та професійному середовищах'
  key_concepts:
  - мовленнєвий регістр
  - диглосія
  - стильова диференціація
  - просторіччя
  primary_sources:
  - Дипломатичний протокол та етикет (аналіз мовних формул)
- section: Прагматика та етикет українського спілкування
  words: 1250
  subsections:
  - 'Стратегії ввічливості: позитивне та негативне обличчя в українській культурі'
  - 'Мовленнєві акти: прохання, відмова, комплімент, вибачення — культурна специфіка'
  - 'Епістолярний етикет: від класичних листів до ділового листування в месенджерах'
  key_concepts:
  - мовленнєвий акт
  - фатична комунікація
  - дискурсивна маркер
  - комунікативна стратегія
  primary_sources:
  - Леся Українка, листи (як зразок епістолярної майстерності та етикету)
- section: Мова як маркер ідентичності
  words: 1250
  subsections:
  - 'Гендерний аспект мови: фемінітиви та особливості чоловічого/жіночого мовлення'
  - 'Професійна ідентичність через мову: IT-сленг, юридична та медична термінологія'
  - 'Мова міста та соціальна ієрархія: від київського інтелігентного мовлення до урбаністичного
    сленгу'
  key_concepts:
  - фемінітив
  - соціолект
  - ідіолект
  - лінгвоцид
  primary_sources:
  - Сучасні соціологічні опитування щодо мовної ідентичності в Україні
- section: Майстерність публічного виступу та переконання
  words: 1250
  subsections:
  - Риторичні прийоми в політичному та корпоративному дискурсах
  - Маніпулятивні техніки та способи їх нейтралізації
  - 'Адаптація мовлення під аудиторію: від формальної презентації до неформального
    сторітелінгу'
  key_concepts:
  - риторика
  - персуазивність
  - фреймінг
  - публічний дискурс
  primary_sources:
  - Промови відомих українських громадських та політичних діячів (аналіз 
    риторики)
- section: Підсумок — Summary
  words: 300
  points:
  - Mastery of social registers involves appropriately switching between high 
    academic, neutral conversational, and lower slang/jargon styles. Language 
    serves as a strong identity marker through sociolects (соціолект), 
    professional jargon, and gendered language like feminitives (фемінітив).
  - 'Self-check: What is the difference between a sociolect and an idiolect? Describe
    your professional identity using 3 examples of industry-specific jargon. How do
    politeness strategies change when shifting from formal email etiquette to messenger
    communication?'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Діалекти, варіантність'
- 'Державний стандарт 2024: C2 — соціолінгвістична компетенція'
reading_situations:
- source_type: офіційне листування / етикет
  topic: Аналіз ділового етикету в листах українських інтелектуалів початку XX 
    століття vs сучасність.
  key_elements:
  - форми звертання
  - ввічливі кліше
  - дистанція
  motivation: Розуміння еволюції норм ввічливості та соціальної дистанції в 
    українському суспільстві.
- source_type: критичний аналіз тексту
  topic: 'Фемінітиви в сучасному українському медіапросторі: ідеологія vs лінгвістична
    традиція.'
  key_elements:
  - правописні норми
  - словотвір
  - рецепція
  motivation: Вивчення актуальних соціолінгвістичних процесів та їх відображення
    в мові.
listening_situations:
- media_type: відео
  setting: 'Запис дебатів на телебаченні або в YouTube: як учасники змінюють регістр
    залежно від емоційної напруги.'
  focus_points:
  - Використання риторичних запитань
  - Перехід на розмовний стиль для зближення з аудиторією
  motivation: Аналіз живої соціолінгвістичної динаміки в реальному часі.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть текст для публічного виступу (промови) перед двома різними аудиторіями
    на одну тему: «Чому важливо підтримувати місцевого виробника». Варіант А: конференція
    експертів-економістів. Варіант Б: зустріч з мешканцями невеликого містечка.'
  requirements:
  - мінімум 300 слів для кожного варіанту
  - відповідність регістру
  - використання доречної термінології та метафор
  motivation: Відпрацювання навичок стильової гнучкості та адаптації 
    повідомлення.
  model_answer: Тексти мають кардинально відрізнятися за лексичним наповненням, 
    довжиною речень та емоційним забарвленням, демонструючи майстерність 
    володіння регістрами.
discussion_topics:
- context: Чи є використання сленгу та ненормативної лексики ознакою деградації 
    мови чи її життєздатності?
  questions:
  - Які межі допустимого сленгу в публічному просторі?
  - Як сленг допомагає формувати групову ідентичність?
  motivation: Дискусія про етичні та соціальні межі використання різних мовних 
    шарів.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про соціальні виміри мови: регістри та стилі і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про прагматика та етикет 
    українського спілкування, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Соціальні виміри мови:
    регістри та стилі». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему соціальні
    виміри мови: регістри та стилі.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до соціальні виміри мови: регістри та стилі: Високий
    академічний та дипломатичний регістри: норми та обмеження. Визначте спільне та
    відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
