content_outline:
- section: 'Вступ: Мова і суспільство (Introduction: Language and Society)'
  words: 600
  points:
  - 'Визначення соціолінгвістики як інструменту аналізу суспільних трансформацій: інтеграція знань про стилістику (§4.3) та
    суспільні відносини (§3.7).'
  - 'Мова як маркер безпеки («свій-чужий»): соціолінгвістичний аналіз зміни суспільного договору та ролі мови у формуванні
    національної ідентичності під час війни.'
- section: Українська мовна ситуація (Ukrainian Language Situation)
  words: 900
  points:
  - 'Аналіз сучасних даних 2024-2025 років: обговорення статистики (66% за усунення російської з офіційної сфери, 60% україномовних
    у побуті) та динаміки змін.'
  - 'Понятійне розмежування: детальне пояснення різниці між білінгвізмом (компетенція) та диглосією (функціональна нерівність);
    корекція типової помилки вживання термінів як синонімів.'
  - 'Еволюція мовної стратегії: перехід від концепції «лагідної українізації» до «стратегічної українізації» як відповідь
    на екзистенційні загрози.'
- section: Мовна політика та законодавство (Language Policy and Legislation)
  words: 750
  points:
  - 'Закон про мову 2019 року: аналіз як механізму захисту прав україномовних громадян, а не «карального інструменту»; роль
    мови в освіті та медіа (§3.8).'
  - 'Інституційна підтримка: функціонування офісу Уповноваженого із захисту державної мови та Нацкомісії зі стандартів державної
    мови.'
- section: Мовний вибір та перемикання кодів (Language Choice and Code-Switching)
  words: 750
  points:
  - 'Чинники мовного вибору та типи перемикання кодів: стратегічне використання мовних ресурсів у різних соціальних контекстах.'
  - 'Корекція калькованих конструкцій: аналіз помилки «я рахую, що...» (influence of Russian switching) та закріплення нормативного
    «я вважаю, що...».'
  - 'Переосмислення суржику: аналіз явища як «мовної милиці» (мовна милиця) та «симптому одужання» — перехідного етапу на
    шляху до повного опанування української.'
- section: Соціальна варіативність мови (Social Variation of Language)
  words: 750
  points:
  - 'Функціональні стилі української мови (§4.3.1.1): аналіз відмінностей між офіційно-діловим, науковим та розмовним регістрами.'
  - 'Мова та медіа (§3.20): соціолінгвістичні маркери пропаганди та фейкових новин; аналіз маніпулятивних стратегій через
    мовні засоби.'
  - 'Помилки регістру: аналіз недоречного використання сленгу в офіційному спілкуванні під впливом надмірної демократизації
    мовного простору.'
- section: Мовна ідентичність та ставлення до мови (Language Identity and Attitudes)
  words: 600
  points:
  - 'Мовні установки (language attitudes) та престиж: чинники підвищення соціального статусу української мови в професійному
    та культурному середовищах.'
  - 'Мовна лояльність та стійкість (мовна стійкість): розвиток навичок збереження мовної ідентичності в умовах неоднорідного
    мовного оточення.'
- section: 'Практикум: Соціолінгвістичний аналіз (Practicum: Sociolinguistic Analysis)'
  words: 650
  points:
  - 'Прикладний аналіз мовних практик: розбір кейсів перемикання кодів у публічному дискурсі та їхнього впливу на сприйняття
    аудиторією.'
  - 'Рефлексія про власну мовну біографію: аналіз змін у мовній поведінці та ідентичності через призму соціолінгвістичних
    теорій.'
vocabulary_hints:
  required:
  - соціолінгвістика (sociolinguistics) — прикладна ~, методи ~; High academic frequency, fundamental term.
  - мовна ситуація (language situation) — сучасна ~, динаміка ~; Medium frequency in academic and media contexts.
  - диглосія (diglossia) — ситуація диглосії, подолання ~; Low frequency, specialized academic term; vital for C2 analysis.
  - суржик (Surzhyk) — побутовий ~, перехідний етап; High frequency; emphasize the concept of 'linguistic crutch' (мовна милиця).
  - перемикання кодів (code-switching) — ситуативне ~, стратегія ~; Medium frequency; key for discussing multilingualism.
  - дискурс (discourse) — медіа-дискурс, соціолінгвістичний ~; Essential for analyzing text vs social context (§3.20).
  - мовний омбудсмен (language ombudsman) — офіс ~, звернення до ~; High frequency in legal/official contexts.
  recommended:
  - мовна стійкість (language resilience) — виховувати ~, проявляти ~; Medium frequency, often used in patriotic/educational
    registers.
  - лагідна українізація (gentle Ukrainization) — етап ~; Cultural hook term for gradual language transition strategies.
  - стратегічна українізація (strategic Ukrainization) — концепція ~; Term reflecting the post-2022 pivot in language policy.
  - мовна установка (language attitude) — позитивна ~, змінювати ~; Specialized term for sociological perception of language.
  - гендерлект (genderlect) — особливості ~; Term for gender-specific speech patterns.
  - симптом одужання (symptom of recovery) — ~ переходу; Metaphorical term for the use of Surzhyk during language learning.
