module: c2-067
level: C2
sequence: 67
version: '1.0'
title: 'Дім і житловий простір: Архітектура, урбаністика та філософія домівки'
subtitle: 'Дім і житловий простір'
focus: vocabulary
pedagogy: seminar
objectives:
  - Аналізувати концепт домівки та житлового простору в українській культурній
    традиції та сучасному урбаністичному дискурсі
  - Опанувати термінологію архітектури, містобудування та просторового
    планування на рівні фахового обговорення
  - Досліджувати соціокультурні аспекти житлової політики, джентрифікації та
    відбудови зруйнованих міст
  - Розвинути навички критичного аналізу текстів про архітектуру, міський
    простір та ідентичність місця
content_outline:
  - section: 'Філософія домівки: від хати до мегаполісу'
    words: 1000
    subsections:
      - 'Концепт хати в українській культурній свідомості: етнографічний та
        символічний виміри'
      - 'Дім як мікрокосм: приватний простір, затишок та ідентичність мешканця'
      - Мовна картина «домашнього світу» в українській фразеології та літературі
    key_concepts:
      - затишок
      - облаштування
      - домашній
      - просторовий
    primary_sources:
      - Тарас Шевченко, 'Садок вишневий коло хати' (аналіз образу української
        хати як культурного символу)
  - section: 'Українська архітектура: від народного зодчества до модернізму'
    words: 1000
    subsections:
      - 'Народна архітектура: регіональні типи житла та їхня адаптація до
        ландшафту'
      - Архітектурна спадщина українських міст — від бароко до конструктивізму
      - Сучасна українська архітектура та проблема збереження ідентичності
    key_concepts:
      - архітектура
      - ландшафт
      - реконструкція
      - забудова
  - section: 'Урбаністика та містобудування: простір для людини'
    words: 1000
    subsections:
      - Генеральний план міста як інструмент формування міського середовища
      - Ревіталізація занедбаних територій та публічний простір
      - Транспортна інфраструктура та пішохідне місто
    key_concepts:
      - урбаністика
      - містобудування
      - інфраструктура
      - ревіталізація
    primary_sources:
      - Юрій Андрухович, 'Лексикон інтимних міст' (вибрані нариси про
        феноменологію міського простору)
  - section: 'Житлова політика та соціальний вимір: хто має право на дім?'
    words: 1000
    subsections:
      - 'Житлобудівництво в Україні: від радянського спадку до сучасних реалій'
      - 'Джентрифікація та муніципальна політика: конфлікт інтересів'
      - Кондомініуми та ОСББ як форма житлового самоврядування
    key_concepts:
      - житлобудівництво
      - джентрифікація
      - муніципалітет
      - кондомініум
  - section: 'Відбудова та майбутнє: архітектура після руйнувань'
    words: 1000
    subsections:
      - Масштаб руйнувань та виклики відбудови українських міст після 2022 року
      - 'Благоустрій та ергономіка міського простору: людиноцентричний підхід'
      - 'Архітектура пам''яті: меморіальні простори та зціленння через простір'
    key_concepts:
      - благоустрій
      - ергономічний
      - генеральний
      - домобудівництво
word_target: 5000
vocabulary_hints:
  required:
    - архітектура
    - урбаністика
    - забудова
    - інфраструктура
    - реконструкція
    - ландшафт
    - муніципалітет
    - кондомініум
    - ревіталізація
    - джентрифікація
  recommended:
    - просторовий
    - ергономічний
    - благоустрій
    - містобудування
    - облаштування
    - житлобудівництво
    - затишок
    - домобудівництво
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Поетичний твір
    topic: Аналіз образу хати у поезії Тараса Шевченка «Садок вишневий коло хати».
      Дослідження символіки домашнього простору як культурного коду.
    key_elements:
      - ідилія
      - родинний затишок
      - природний ландшафт
    motivation: Осмислення архетипу української домівки через класичну поезію.
  - source_type: Есеїстика
    topic: Дослідження феноменології міського простору у нарисах Юрія Андруховича.
      Аналіз мовних засобів відтворення атмосфери міста.
    key_elements:
      - урбаністичний простір
      - пам'ять місця
      - культурна ідентичність
    motivation: Розвиток навичок сприйняття складної есеїстичної прози про міський
      простір.
listening_situations:
  - media_type: дискусія
    setting: Круглий стіл архітекторів та урбаністів про принципи відбудови
      українських міст після руйнувань.
    focus_points:
      - Баланс між збереженням спадщини та модернізацією
      - Участь громад у процесі містобудівних рішень
    motivation: Аналіз фахового дискурсу про архітектуру та просторове планування.
writing_tasks:
  - task_type: есе
    prompt: Напишіть аналітичне есе на тему «Відбудова як можливість — яким має
      бути українське місто майбутнього?». Поєднайте архітектурний аналіз з
      культурологічною рефлексією.
    requirements:
      - мінімум 700 слів
      - використання архітектурної та урбаністичної термінології
      - аргументована позиція з конкретними прикладами
    motivation: Перевірка здатності до фахового аналізу проблем міського простору.
    model_answer: Есе має демонструвати розуміння зв'язку між архітектурою та
      ідентичністю, аналізувати конкретні приклади (Маріуполь, Харків, Ірпінь) та
      пропонувати візію людиноцентричного міста.
discussion_topics:
  - context: Чи має відбудова зруйнованих міст відтворювати попередній вигляд, чи
      створювати принципово новий простір?
    questions:
      - Де межа між пам'яттю та прогресом в архітектурі?
      - Хто має ухвалювати рішення про вигляд відбудованих міст — експерти чи
        громади?
    motivation: Дебати про філософію відбудови та роль архітектури у формуванні
      ідентичності.
activity_hints:
  - type: reading
    focus: 'Проаналізувати образ хати у поезії Шевченка: визначити символіку
      домашнього простору як культурного коду'
  - type: essay-response
    focus: Написати аналітичне есе про принципи відбудови українських міст після
      руйнувань
  - type: critical-analysis
    focus: Оцінити аргументацію у тексті про джентрифікацію та конфлікт інтересів
      у житловій політиці
  - type: fill-in
    focus: 'Доповнити текст архітектурною термінологією: ревіталізація,
      містобудування, благоустрій'
  - type: error-correction
    focus: Виправити кальки та росіянізми у публіцистичному тексті про урбаністику
      та міське середовище
