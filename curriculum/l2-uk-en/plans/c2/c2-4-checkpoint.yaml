module: c2-4-checkpoint
level: C2
sequence: 79
version: "1.1"
title: "Підсумковий контроль рівня С2.4: Оцінювання та рефлексія"
subtitle: "Level C2.4 Checkpoint: Assessment and Reflection"
focus: checkpoint
pedagogy: review
objectives:
  - "Перевірити рівень засвоєння тематичного вокабуляру та граматичних структур модулів 71–77"
  - "Оцінити навички читання, аудіювання, письма та говоріння за стандартами рівня С2"
  - "Виявити зони для подальшого вдосконалення мовної майстерності"
  - "Систематизувати досвід навчання на фінальному етапі курсу"
content_outline:
  - section: "Комплексне тестування: лексика, граматика, стилістика"
    words: 1000
    subsections:
      - "Контроль володіння термінологією тематичних блоків: екологія, медіа, урбаністика, ідентичність"
      - "Тестування на знання складних синтаксичних та морфологічних норм"
      - "Завдання на стилістичну відповідність та редагування текстів"
    key_concepts:
      - "нормативність"
      - "варіативність"
      - "адекватність"
      - "саморедагування"
  - section: "Аналіз та інтерпретація автентичних текстів високої складності"
    words: 1000
    subsections:
      - "Робота з науково-публіцистичними та літературними джерелами: виявлення підтексту та інтенцій"
      - "Оцінювання здатності до критичного розбору аргументації та маніпулятивних стратегій"
      - "Порівняльний аналіз текстів різних функціональних стилів на спільну тематику"
    key_concepts:
      - "герменевтика"
      - "дискурс-аналіз"
      - "критична оцінка"
      - "контекстуальність"
  - section: "Творча та аналітична продукція: письмовий іспит"
    words: 1000
    subsections:
      - "Написання розлогого аналітичного есе або програмної статті на запропоновану тему"
      - "Складання офіційного звернення або меморандуму за заданими параметрами"
      - "Оцінювання композиційної стрункості, логічності та багатства мови"
    key_concepts:
      - "композиційна цілісність"
      - "аргументованість"
      - "стильова довершеність"
      - "оригінальність"
  - section: "Усна презентація та участь у дискусії"
    words: 1000
    subsections:
      - "Захист індивідуального проекту або виступ на задану тему перед аудиторією"
      - "Демонстрація навичок ведення інтелектуальної полеміки та швидкої реакції на запитання"
      - "Оцінювання фонетичної довершеності, риторичної майстерності та стратегій комунікації"
    key_concepts:
      - "риторична гнучкість"
      - "комунікативна стратегія"
      - "публічний виступ"
      - "дискусійна культура"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Програмний маніфест"
    topic: "Аналіз сучасного українського інтелектуального маніфесту про майбутнє культури. Оцінювання глибини змісту та засобів виразності."
    key_elements: ["програмність", "візійність", "стилістична енергетика"]
    motivation: "Підсумкова перевірка здатності до глибокої текстової інтерпретації."
  - source_type: "Науково-аналітичний звіт"
    topic: "Читання та аналіз звіту про соціокультурні зміни в Україні. Перевірка розуміння статистичних та концептуальних даних."
    key_elements: ["дані", "тенденції", "висновки"]
    motivation: "Оцінювання навичок роботи з фаховою інформацією."
listening_situations:
  - media_type: "відео"
    setting: "Перегляд та аналіз дебатів між двома провідними інтелектуалами про шляхи розвитку сучасної освіти."
    focus_points:
      - "Здатність виокремлювати ключові тези обох сторін"
      - "Оцінка культури дискусії та риторичних прийомів"
    motivation: "Фінальна перевірка навичок аудіювання складного дискурсу."
writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть підсумкове аналітичне есе на тему 'Мовна стійкість як основа національного виживання: досвід та перспективи'. Проаналізуйте історичні та сучасні контексти."
    requirements: ["мінімум 1000 слів", "використання термінології всіх попередніх модулів", "високий рівень стилістичної майстерності"]
    motivation: "Фінальна перевірка навичок письмової продукції рівня С2."
    model_answer: "Текст має бути логічно бездоганним, містити глибокий аналіз, бути написаним мовою найвищої складності та відображати авторську позицію."
discussion_topics:
  - context: "Яка роль інтелектуала у сучасному демократичному суспільстві: він має бути 'голосом істини' чи 'модератором дискусії'?"
    questions:
      - "Чи існує об'єктивна істина в епоху постправди?"
      - "Як зберегти високий рівень дискурсу в умовах масовізації культури?"
    motivation: "Підсумкова дискусія, що вимагає синтезу всіх знань та компетенцій курсу."

activity_hints:
  - type: critical-analysis
    focus: "Проаналізуйте складний публіцистичний текст. Оцініть аргументацію, стилістичні засоби та авторську позицію."
  - type: essay-response
    focus: "Напишіть підсумкове аналітичне есе про мовну стійкість як основу національного виживання. Інтегруйте терміни всіх попередніх модулів."
  - type: select
    focus: "Оберіть стилістично доцільний варіант формулювання для офіційного звернення, аналітичної статті та публіцистичного тексту."
  - type: error-correction
    focus: "Відредагуйте текст, що поєднує стилістичні помилки різних типів: канцеляризми, жаргонізми, стилістична невідповідність."

references:
  - "Державний стандарт 2024: C2 — підсумковий контроль, інтегровані компетенції"
  - "Глазова, 11 клас (2019), §21-25 — Синтаксична норма"
  - "Ворон, 11 клас (2019), с. 207-218 — Наукова доповідь, науковий стиль"
