content_outline:
- section: 'Вступ: Структура оцінювання C2.4 (Introduction: C2.4 Assessment Structure)'
  words: 500
  points:
  - 'Огляд охоплення модулів 65-77: від суспільства і громадянства через зовнішню політику, здоров''я,
    довкілля, мистецтво, спорт, науку, право до подорожей, ідентичності та інтеграційної практики.'
  - 'Контекстуалізація через культурний гачок: тематичний дискурс як інструмент повноцінної участі
    в українському суспільному та інтелектуальному житті на рівні освіченого носія.'
  - 'Критерії успіху: тематичне покриття (усі 21 тема), регістрова гнучкість, аргументативна
    глибина, лексичне багатство та стилістична доречність.'
- section: 'Частина I — Читання та розуміння тематичних текстів (Part I: Reading Comprehension
    Across Thematic Domains)'
  words: 750
  points:
  - 'Тексти різних тематичних доменів: суспільно-політичний (парламентські дебати), науково-популярний
    (довкілля та технології), культурологічний (мистецтво та традиції) — по одному тексту з кожної групи.'
  - 'Завдання на розуміння: визначення авторської позиції, виявлення імпліцитних аргументів, розпізнавання
    регістрових маркерів та оцінка стилістичної адекватності тексту.'
  - 'Крос-текстовий аналіз: порівняння двох текстів на суміжні теми з різних регістрів — виявлення
    спільних аргументів, відмінних перспектив та стилістичних стратегій.'
- section: 'Частина II — Лексична компетентність (Part II: Lexical Competency Assessment)'
  words: 650
  points:
  - 'Тематична лексика в контексті: заповнення пропусків у текстах різних тематичних доменів із вибором
    між стилістичними синонімами (наприклад, подорож / мандрівка / вояж — у відповідному контексті).'
  - 'Колокації та стійкі сполучення: перевірка знання тематичних колокацій (висловити співчуття,
    провести реформу, зберегти спадщину) через завдання на зіставлення.'
  - 'Регістрова диференціація лексики: розподіл синонімічних рядів за регістрами (академічний,
    публіцистичний, розмовний) у контексті конкретних тематичних доменів.'
- section: 'Частина III — Письмова продукція (Part III: Written Production)'
  words: 800
  points:
  - 'Аналітичне есе: написання есе на задану міждисциплінарну тему (наприклад, «Вплив урбанізації
    на культурну ідентичність українських громад») з дотриманням академічного регістру.'
  - 'Регістрова трансформація: переписування фрагмента наукового тексту у публіцистичному стилі
    зі збереженням фактичного змісту та адаптацією стилістичних засобів.'
  - 'Формульна мова: написання офіційного листа-подяки, співчуття або привітання у відповідному
    регістрі з дотриманням етикетних формул та стилістичних норм.'
- section: 'Частина IV — Усна продукція та взаємодія (Part IV: Oral Production and Interaction)'
  words: 650
  points:
  - 'Структурована аргументація: усний виступ на задану тему (3-5 хвилин) з чіткою тезою, системою
    аргументів з різних тематичних полів та обґрунтованим висновком.'
  - 'Регістрове переключення: обговорення однієї теми в трьох регістрах — доповідь на конференції
    (академічний), коментар для ЗМІ (публіцистичний), розмова з другом (розмовний).'
  - 'Дебатна взаємодія: реагування на контраргументи опонента з використанням дипломатичних
    формул незгоди та академічних стратегій спростування.'
- section: 'Частина V — Самооцінка та зразки відповідей (Part V: Self-Assessment and Model Answers)'
  words: 650
  points:
  - 'Рубрика самооцінки: оцінювання власних відповідей за критеріями тематичного покриття, лексичного
    багатства, регістрової адекватності та аргументативної глибини (шкала 1-10).'
  - 'Зразки відповідей: модельні відповіді для кожного типу завдань із коментарями щодо сильних сторін
    та типових помилок — інструмент для самостійного порівняння та корекції.'
  - 'План подальшого розвитку: на основі результатів самооцінки — визначення пріоритетних зон для
    опрацювання перед переходом до фази C2.5 (Meta-Skills & Capstone).'
vocabulary_hints:
  required:
  - оцінювання (assessment) — комплексне оцінювання, критерії оцінювання; базовий термін
    контрольного модуля
  - контрольна точка (checkpoint) — пройти контрольну точку, результати контрольної точки;
    структурний термін курикулуму
  - тематичне покриття (thematic coverage) — повне тематичне покриття, забезпечити покриття;
    оціночний термін для повноти знань
  - регістрова гнучкість (register flexibility) — демонструвати регістрову гнучкість; ключова
    компетентність С2 рівня
  - аргументативний (argumentative) — аргументативна глибина, аргументативне есе; термін
    риторичного аналізу
  - самооцінка (self-assessment) — рубрика самооцінки, адекватна самооцінка; рефлексивний
    компонент автономного навчання
  recommended:
  - зразок відповіді (model answer) — порівняти зі зразком, модельний зразок; педагогічний
    термін для еталонного тексту
  - крос-текстовий (cross-textual) — крос-текстовий аналіз, крос-текстове порівняння; термін
    для порівняльного аналізу кількох текстів
  - імпліцитний (implicit) — імпліцитний аргумент, імпліцитне значення; лінгвістичний термін
    для невираженого прямо змісту
  - спростування (refutation) — стратегія спростування, аргументоване спростування; термін
    дебатного та академічного дискурсу
  - рубрика (rubric) — оціночна рубрика, рубрика самооцінки; педагогічний термін для критеріїв
    оцінювання
