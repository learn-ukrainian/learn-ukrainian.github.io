title: Контрольна точка C2.4 — Тематичний дискурс
subtitle: C2.4 Checkpoint — Thematic Discourse Assessment
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 4000
objectives:
- Продемонструвати вільне володіння тематичною лексикою з усіх 21 теми Державного стандарту через комплексне
  оцінювання рецептивних та продуктивних навичок
- Learner can produce an analytical essay on a given thematic topic that integrates evidence from multiple
  domains and demonstrates register-appropriate academic Ukrainian
- Оцінити власний рівень тематичного дискурсу через структуровану самооцінку з використанням критеріїв
  відповідності стандарту С2
- Learner can switch registers fluently when discussing the same topic in different communicative contexts
  (academic, journalistic, conversational), as assessed through structured oral and written tasks
