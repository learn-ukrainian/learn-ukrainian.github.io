vocabulary_hints:
  required:
  - договір (contract) — укласти договір, розірвати договір; основний юридичний документ.
  - сторона (party) — уповноважена сторона, третя сторона; висока частотність у юридичному
    дискурсі.
  - зобов'язання (obligation) — виконувати зобов'язання, порушення зобов'язань; ключовий
    термін цивільного права.
  - предмет договору (subject of contract) — чітке визначення об'єкта домовленості.
  - істотні умови (essential terms) — умови, без яких договір вважається неукладеним.
  - реквізити (requisites/details) — банківські реквізити, платіжні реквізити; обов'язкові
    дані для ідентифікації.
  - уповноважений (authorized) — уповноважений представник; особа, що має право підпису.
  - пеня (penalty/fine) — нарахування пені; важливо не плутати зі штрафом.
  - форс-мажор (force majeure) — обставини непереборної сили; дія форс-мажору.
  recommended:
  - преамбула (preamble) — вступна частина договору із зазначенням сторін.
  - контрагент (counterparty) — інша сторона договору; вживається переважно в офіційному
    листуванні.
  - акцепт (acceptance) — відповідь про прийняття оферти.
  - оферта (offer) — пропозиція укласти договір.
  - розірвання (termination) — одностороннє розірвання, підстави для розірвання.
  - непереборна сила (act of God / force majeure) — офіційний синонім до форс-мажору
    в законодавстві.
