content_outline:
- section: Вступ — Офіційно-діловий стиль та поняття договору (Introduction — Official
    Business Style and Contract Concepts)
  words: 450
  points:
  - 'Вступ до вимог Держстандарту (§4.3.1.1) щодо офіційного стилю: використання безособових
    конструкцій (наприклад, ''Оплата здійснюється...'') та точності термінології.'
  - 'Аналіз типової помилки: розрізнення понять ''Угода'' (ширше поняття, домовленість)
    та ''Договір'' (конкретний юридичний документ), виправлення калькування ''контракт
    оренди'' на правильне ''договір оренди''.'
  - Огляд загальної структури договору в українському праві та обов'язкових реквізитів
    згідно з Цивільним кодексом України.
- section: Преамбула та ідентифікація сторін (Preamble and Identification of Parties)
  words: 500
  points:
  - 'Формулювання преамбули та ідентифікація сторін: розгляд специфіки фізичних та
    юридичних осіб та вживання формули ''далі — Сторона 1, Сторона 2''.'
  - 'Культурний гачок: традиційний український формат підпису ''Прізвище І.Б.'' (спочатку
    прізвище) та необхідність розшифрування підпису, порівняння із західними стандартами.'
  - 'Корекція помилок відмінювання: відпрацювання родового та орудного відмінків для
    сторін ''Орендодавець'' та ''Орендар'' у тексті типових угод.'
- section: Предмет договору та істотні умови (Subject Matter and Essential Terms)
  words: 550
  points:
  - Реалізація вимог стандарту (§3.2 та §3.7) щодо прав та обов'язків у сфері оренди
    помешкання та комунальних платежів.
  - 'Визначення предмета договору та істотних умов: виокремлення об''єкта оренди,
    строків виконання та обсягу зобов''язань кожної зі сторін.'
  - 'Юридична точність: аналіз формулювань, що забезпечують однозначне тлумачення
    прав сторін без використання розмовної лексики.'
- section: Фінансові умови та порядок розрахунків (Financial Terms and Settlement
    Procedure)
  words: 500
  points:
  - 'Ціна договору, валюта розрахунків та графік оплати: вживання терміна ''банківські
    реквізити'' (висока частотність) та правильне оформлення платіжних даних.'
  - 'Робота з санкціями: чітке розрізнення юридичних понять ''пеня'' (періодична виплата)
    та ''штраф'' (одноразова виплата) для запобігання поширеним помилкам у правозастосуванні.'
  - Безособові синтаксичні моделі для опису порядку перерахування коштів та підтвердження
    отримання оплати.
- section: Відповідальність та обставини непереборної сили (Liability and Force Majeure)
  words: 550
  points:
  - 'Порядок вирішення спорів та претензійний порядок: відпрацювання сталих виразів
    ''порушення зобов''язань'', ''третя сторона'' та ''уповноважена сторона''.'
  - 'Обставини непереборної сили (форс-мажор): вивчення колокацій ''дія форс-мажору''
    та ''обставини непереборної сили'', алгоритм повідомлення про настання таких подій.'
  - 'Дриль на виправлення помилок: вживання прийменникових конструкцій у контексті
    відповідальності за невиконання умов договору.'
- section: Прикінцеві положення та Практикум (Final Provisions and Workshop)
  words: 450
  points:
  - 'Культурний контекст: значення ''мокрої печатки'' (stamp) в українській діловій
    культурі як ознаки надійності, попри законодавче скасування обов''язковості для
    багатьох суб''єктів.'
  - Порядок внесення змін до договору та роль додатків як його невід'ємної частини;
    формат скріплення документа підписами.
  - 'Практичне завдання: аналіз реального договору оренди на відповідність істотним
    умовам та редагування пунктів із помилковим вживанням юридичних термінів.'
