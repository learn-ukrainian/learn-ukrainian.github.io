module: c2-022
level: C2
sequence: 22
slug: practical-rhetoric
version: '2.0'
title: 'Практична риторика: переконання та дебати'
subtitle: 'Practical Rhetoric: Persuasion and Debate'
focus: stylistics
pedagogy: TTT
phase: C2.1 [Stylistics & Rhetoric]
word_target: 5000
objectives:
- Learner can construct and deliver a persuasive speech using deductive and inductive argumentation structures
- Learner can participate in structured debates using Ukrainian academic debate formats and conventions
- Learner can identify and counter logical fallacies and emotional manipulation in opponent arguments
- Learner can apply rhetorical ethics principles to distinguish persuasion from manipulation
sources:
- name: Феофан Прокопович. Про риторичне мистецтво
  url: https://www.nbuv.gov.ua/
  type: primary
  notes: Foundational Ukrainian rhetorical treatise adapted for modern analysis
- name: 'Сагач Г. М. Риторика: підручник'
  url: https://uk.wikipedia.org/wiki/Сагач_Галина_Михайлівна
  type: reference
  notes: Contemporary Ukrainian rhetoric textbook covering argumentation and debate
- name: Державний стандарт 2024 — Риторичні та ораторські компетенції
  url: https://mon.gov.ua/
  type: reference
  notes: C2 requirements for rhetorical mastery (sections 4.3.5-6)
content_outline:
- section: 'Вступ — Риторика як практична навичка (Introduction: Rhetoric as Practical Skill)'
  words: 600
  points:
  - 'Rhetoric beyond theory: transitioning from analytical understanding (c2-021) to active deployment of persuasive techniques
    in real-world contexts.'
  - 'Ukrainian debate tradition: Kyiv-Mohyla Academy disputations as the historical foundation of structured academic argumentation
    in Ukrainian intellectual culture.'
  - 'Modern debate culture in Ukraine: parliamentary hearings, public discussions, and the role of civic rhetoric in democratic
    society.'
- section: Структури аргументації (Argumentation Structures)
  words: 900
  points:
  - 'Розширення бази C1: студент уже володіє дедукцією/індукцією та моделлю теза-антитеза-синтез (c1-062); тут ці
    інструменти інтегруються у формальні аргументаційні моделі вищого рівня.'
  - 'Модель Тулміна для української риторичної практики: теза (claim), підстава (grounds), обґрунтування (warrant),
    підтримка (backing), застереження (qualifier), спростування (rebuttal) — повна шестикомпонентна модель.'
  - 'Ентимеми та приховані засновки: виявлення невисловлених припущень в українському політичному та медійному дискурсі;
    конструювання ентимем для переконливої ефективності.'
- section: Побудова переконливого виступу (Persuasive Speech Construction)
  words: 900
  points:
  - 'Поглиблення етосу/патосу/логосу (введених на C1): розбудова авторитету (етос), емоційний зв''язок (патос) та
    логічна структура (логос) у контексті українських культурних очікувань та жанрових конвенцій.'
  - 'Prokopovych''s rules adapted for modern contexts: compositional principles from Baroque oratory applied to contemporary
    presentations, lectures, and public addresses (Standard §4.3.5-6).'
  - 'Speech planning and structure: exordium (вступ), narratio (виклад), argumentatio (доведення), peroratio (завершення);
    adapting classical dispositio to Ukrainian professional communication.'
- section: Формати дебатів (Debate Formats)
  words: 800
  points:
  - 'Academic debate formats: structured argumentation with time limits, cross-examination, and rebuttal rounds; roles of
    affirmative and negative teams.'
  - 'Parliamentary debate and public discussions: круглий стіл (roundtable), публічні слухання (public hearings), панельна
    дискусія (panel discussion) as Ukrainian-specific civic formats.'
  - 'Moderating and facilitating: language for managing turns, summarizing positions, and maintaining productive discourse
    in Ukrainian professional settings.'
- section: Контраргументація (Counter-Argumentation)
  words: 800
  points:
  - 'Refutation techniques: direct refutation (пряме спростування), reductio ad absurdum (доведення до абсурду), and turning
    the argument (обернення аргументу).'
  - 'Logical fallacies (софізми): identifying ad hominem, straw man (підміна тези), false dilemma (хибна дилема), appeal to
    authority (апеляція до авторитету), and slippery slope (хибна каузація) in Ukrainian media and political discourse.'
  - 'Emotional manipulation detection: distinguishing legitimate emotional appeal (патос) from manipulative techniques; media
    literacy as a component of rhetorical competence.'
- section: Риторична етика (Rhetorical Ethics)
  words: 600
  points:
  - 'Responsibility of the speaker: ethical obligations in persuasion, the boundary between advocacy and manipulation, and
    intellectual honesty in argumentation.'
  - 'Manipulation vs. persuasion: structural and intentional differences; case studies from Ukrainian public discourse illustrating
    ethical and unethical rhetorical practices.'
  - 'Media literacy connection: critical evaluation of persuasive techniques in news, social media, and advertising as an
    extension of rhetorical competence.'
- section: 'Практикум — Дебатна практика (Workshop: Debate Practice)'
  words: 400
  points:
  - 'Structured debate exercise: preparation, delivery, and evaluation of arguments on a contemporary Ukrainian civic topic
    using learned frameworks.'
  - 'Peer feedback protocol: constructive critique using metalinguistic terminology; evaluating ethos, logos, and pathos effectiveness
    in peer speeches.'
  - 'Self-reflection: identifying personal rhetorical strengths and areas for improvement; developing an individual persuasion
    style.'
vocabulary_hints:
  required:
  - аргументація (argumentation) — будувати аргументацію, послідовна аргументація; core term for structured reasoning
  - теза (thesis/claim) — висунути тезу, захищати тезу; the central claim in a debate
  - спростування (refutation) — пряме спростування, навести спростування; counter-argumentation technique
  - софізм (sophism/fallacy) — логічний софізм, викривати софізми; identifying flawed reasoning
  - переконання (persuasion) — мистецтво переконання, переконливий аргумент; the goal of practical rhetoric
  - дебати (debate) — академічні дебати, парламентські дебати, формат дебатів
  - етос (ethos) — ораторський етос, побудова етосу; credibility dimension of persuasion
  - красномовство (eloquence) — практичне красномовство, ораторське красномовство; mastery of persuasive speech
  recommended:
  - ентимема (enthymeme) — скорочений силогізм, приховані засновки; implicit argumentation
  - диспут (disputation) — академічний диспут, традиція диспутів; formal argumentation tradition
  - публічні слухання (public hearings) — брати участь у слуханнях; Ukrainian civic debate format
  - апеляція (appeal) — апеляція до авторитету, апеляція до емоцій; rhetorical appeal types
  - підміна тези (straw man) — софізм підміни тези; common logical fallacy
activity_hints:
- type: quiz
  focus: Identify argumentation structures and logical fallacies
  items: 15
- type: essay-response
  focus: Compose a persuasive speech on a civic topic
- type: critical-analysis
  focus: Analyze rhetorical strategies in authentic Ukrainian speeches
  items: 8
- type: discussion
  focus: Structured debate practice with peer evaluation
  items: 1
