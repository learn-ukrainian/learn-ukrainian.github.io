module: c2-022
level: C2
sequence: 22
version: 1.2.2
title: 'Практична риторика: майстерність публічного виступу'
subtitle: Практична риторика
focus: professional
pedagogy: workshop
objectives:
- 'Удосконалити техніку мовлення: дикцію, інтонаційну виразність та мелодику українського
  слова'
- Навчитися адаптувати риторичні стратегії до різних типів аудиторій та 
  комунікативних ситуацій
- Опанувати методику ведення дебатів, переговорів та кризової комунікації
- Розвинути навички мовленнєвої імпровізації та ефективної самопрезентації
content_outline:
- section: Фонетична та просодична майстерність
  words: 1250
  subsections:
  - 'Дикційна гігієна та артикуляційна чіткість: професійні стандарти'
  - Логічні наголоси та паузація як інструменти керування увагою
  - 'Мелодика українського речення: емоційна палітра та її вплив'
  key_concepts:
  - просодія
  - мелодика
  - акцентуація
  - дикція
- section: Жанри публічного мовлення та їх специфіка
  words: 1250
  subsections:
  - Інформаційні виступи (доповідь, лекція, презентація)
  - Переконувальні виступи (політична промова, адвокатське слово)
  - Розважальна та епідейктична риторика (ювілейна промова, тост)
  key_concepts:
  - епідейктика
  - дискурс-аналіз
  - жанрова форма
  - комунікативна інтенція
  primary_sources:
  - Олександр Потебня, 'Думка і мова' (психологія сприйняття слова)
  - Микола Костомаров, 'Книги буття українського народу' (приклад месіанської 
    риторики)
- section: Дебати та стратегії переговорів
  words: 1250
  subsections:
  - 'Побудова аргументативної лінії в дебатах: кейс та контраргументи'
  - Техніки активного слухання та 'риторичного джиу-джитсу'
  - Медіація та розв'язання конфліктів через мовленнєві стратегії
  key_concepts:
  - медіація
  - фасилітація
  - рефреймінг
  - кейс-метод
- section: Риторична імпровізація та харизма
  words: 1250
  subsections:
  - Алгоритми миттєвого реагування на несподівані запитання
  - Сторітелінг як інструмент емоційного залучення аудиторії
  - Формування персонального риторичного стилю
  key_concepts:
  - імпровізація
  - сторітелінг
  - харизма
  - ідіолект
- section: Підсумок — Summary
  words: 300
  points:
  - 'Rhetorical mastery relies on clear articulation (дикція), sentence melody (мелодика),
    and appropriate genre selection based on communicative intent (комунікативна інтенція).
    Self-check: What is the difference between an informative presentation and an
    epideictic speech (епідейктика)? Describe 3 ways to use logical stress (акцентуація)
    to control audience attention.'
  - 'Debates and crisis communication require active listening, mediation (медіація),
    and quick improvisation (імпровізація). Self-check: How do you use reframing (рефреймінг)
    to handle an unexpected question? Outline 3 storytelling techniques to emotionally
    engage your listeners and build charisma (харизма).'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Текст виступу
  topic: Аналіз судової промови відомого українського адвоката початку ХХ 
    століття.
  key_elements:
  - логіка доведення
  - сугестивна лексика
  - психологізм
  motivation: Вивчення юридичної риторики як взірця логічної стрункості та 
    переконувальної сили.
- source_type: Науково-популярна стаття
  topic: Олександр Потебня про внутрішню форму слова та її значення для оратора.
  key_elements:
  - внутрішня форма
  - символ
  - образне мислення
  motivation: Глибоке розуміння психологічного впливу слова на слухача.
listening_situations:
- media_type: відео
  setting: 'Запис політичних дебатів у форматі ''один на один'': аналіз тактик перехоплення
    ініціативи.'
  focus_points:
  - Способи ухилення від відповіді
  - Використання іронії як зброї
  motivation: Розвиток здатності аналізувати живу полеміку в реальному часі.
writing_tasks:
- task_type: репортаж
  prompt: Уявіть, що ви ведете репортаж з чемпіонату України з дебатів. Опишіть 
    найяскравіший раунд, проаналізуйте аргументацію команд та техніку ораторів.
  requirements:
  - мінімум 400 слів
  - використання термінології з риторики
  - оцінка невербальної поведінки
  motivation: Поєднання аналітичного мислення з навичками художнього опису.
  model_answer: Репортаж має містити опис етапів дебатів, аналіз сильних та 
    слабких місць аргументації та яскраві характеристики стилів учасників.
discussion_topics:
- context: Чи є імпровізація вродженим даром, чи це результат тривалої 
    підготовки та тренування?
  questions:
  - Які ризики несе в собі надмірна підготовка до виступу?
  - Як зберегти природність, використовуючи відпрацьовані риторичні прийоми?
  motivation: Пошук балансу між технікою та автентичністю оратора.
activity_hints:
- type: reading
  focus: Прочитайте текст про фонетична та просодична майстерність і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про жанри публічного мовлення та
    їх специфіка, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Фонетична та 
    просодична майстерність». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    фонетична та просодична майстерність.
- type: comparative-study
  focus: 'Порівняйте різні підходи до фонетична та просодична майстерність: Дикційна
    гігієна та артикуляційна чіткість: професійні стандарти. Визначте спільне та відмінне.'
references:
- Потебня О. Думка і мова — психологія сприйняття слова
- Костомаров М. Книги буття українського народу — зразок месіанської риторики
- Глазова О. П. Українська мова, 11 клас (2019), §40-45 — стилістичні засоби
- 'State Standard 2024: C2 SS 4.3 (Stylistics)'
