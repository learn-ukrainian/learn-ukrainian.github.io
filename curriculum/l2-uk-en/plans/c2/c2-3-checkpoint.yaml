module: c2-065
level: C2
sequence: 65
version: 1.1.1
title: 'Контрольна точка C2.3: Оцінювання професійної спеціалізації'
subtitle: 'Контроль C2.3: оцінка професійної спеціалізації'
focus: checkpoint
pedagogy: review
objectives:
- Продемонструвати вищий рівень професійної комунікативної компетенції у письмових та усних форматах
- Підтвердити здатність до створення складних, аргументованих фахових документів та презентацій
- Засвідчити вільне оперування галузевою термінологією та стратегіями професійної взаємодії
- Здійснити підсумкову рефлексію професійного портфоліо та ідентичності на рівні C2
content_outline:
- section: Діагностика професійної грамотності та термінології
  words: 1000
  subsections:
  - Аудит володіння вузькоспеціалізованою термінологією та її контекстуальним вживанням
  - Комплексна перевірка знань офіційно-ділового та наукового стилів на публікаційному рівні
  - Аналіз здатності до розпізнавання та корекції складних професійних кальок та русизмів
  key_concepts:
  - термінологічна валідність
  - стилістична бездоганність
  - лінгвістична чистота
  - фаховий аудит
  primary_sources:
  - Юрій Шевельов, 'Я — мене — мені... (і довкола)' (аналіз мовної стійкості та інтелектуальної чесності)
- section: 'Письмова атестація: створення експертного контенту'
  words: 1000
  subsections:
  - Написання аналітичного висновку або проєктної пропозиції на основі наданих даних
  - Демонстрація здатності до синтезу інформації з декількох фахових джерел
  - Оформлення покликань та дотримання академічної доброчесності у письмовому вислові
  key_concepts:
  - експертний висновок
  - синтез знань
  - академічна доброчесність
  - аргументативна стратегія
- section: 'Усна атестація: захист портфоліо та полеміка'
  words: 1000
  subsections:
  - Презентація ключових елементів професійного портфоліо перед експертною комісією
  - Ведення фахової дискусії, відповіді на критичні зауваження та контраргументація
  - Оцінювання риторичної ефективності, невербальної комунікації та впевненості
  key_concepts:
  - публічний захист
  - полемічна вправність
  - риторичний самоконтроль
  - професійна переконливість
- section: Оцінка професійної ідентичності та перспектив
  words: 1000
  subsections:
  - Саморефлексія щодо сформованості особистого бренду та етичних переконань
  - Визначення стратегій подальшого професійного розвитку в україномовному середовищі
  - Підсумковий висновок про готовність до роботи на рівні C2 у вибраній галузі
  key_concepts:
  - мовна особистість
  - професійний шлях
  - ціннісне самовизначення
  - майстерність
  primary_sources:
  - Володимир Вернадський, 'Листи про науку та Україну' (аналіз бачення ролі вченого у розвитку держави)
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Науковий та офіційно-діловий стилі'
- 'Авраменко, 11 клас (2019): Комплексний аналіз тексту'
- 'Державний стандарт 2024: C2 — підсумкова професійна атестація'
reading_situations:
- source_type: Мемуари / Есеїстика
  topic: Аналіз мовної концепції Юрія Шевельова за його мемуарами. Дослідження зв'язку між мовою, політикою та професійною
    етикою.
  key_elements:
  - мовна історія
  - інтелектуальний опір
  - наукова об'єктивність
  motivation: Перевірка здатності до глибокого інтерпретаційного аналізу текстів найвищого інтелектуального рівня.
- source_type: Науково-публіцистичний лист
  topic: Дослідження візії Володимира Вернадського щодо розвитку української науки. Аналіз мовних засобів вираження віри у
    майбутнє.
  key_elements:
  - ноосфера
  - науковий прогрес
  - державотворення
  motivation: Оцінювання здатності сприймати та аналізувати складні ідеї через призму мови першоджерел.
listening_situations:
- media_type: відео
  setting: Запис відкритого захисту дисертації або великого проєкту в провідному українському університеті.
  focus_points:
  - Якість наукової полеміки між доповідачем та опонентами
  - Використання ввічливих форм незгоди та професійного сумніву
  motivation: Перевірка розуміння академічного та професійного етикету високого рівня.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть підсумковий аналітичний репорт (Final Assessment Report) про ваше професійне портфоліо. Оцініть його за
    критеріями повноти, стилістичної єдності та відповідності вимогам рівня C2.
  requirements:
  - мінімум 700 слів
  - структурований аналіз за розділами
  - висновки щодо подальшого вдосконалення
  motivation: Підсумкова перевірка навичок письмового аналізу та самооцінки.
  model_answer: Звіт має бути професійно оформленим, містити глибокий аналіз власних досягнень, бути написаним бездоганною
    мовою з використанням відповідних професійних термінів.
discussion_topics:
- context: Яке майбутнє у професійної української мови у глобалізованому світі, де домінує англійська?
  questions:
  - Чи може рівень C2 стати конкурентною перевагою на міжнародному ринку праці?
  - Як ви особисто плануєте підтримувати та розвивати свою мовну майстерність після завершення курсу?
  motivation: Фінальна дискусія, що підбиває підсумки фази професійної спеціалізації.
activity_hints:
- type: reading
  focus: Прочитайте текст про діагностика професійної грамотності та термінології і дайте відповіді на запитання щодо ключових
    понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про письмова атестація: створення експертного контенту, використовуючи нову
    лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Діагностика професійної грамотності та термінології». Обґрунтуйте
    свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему діагностика професійної грамотності та термінології.
- type: comparative-study
  focus: 'Порівняйте різні підходи до діагностика професійної грамотності та термінології: Аудит володіння вузькоспеціалізованою
    термінологією та її контекстуальним вживан. Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
