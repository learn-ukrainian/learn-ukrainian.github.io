content_outline:
- section: 'Вступ — Структура оцінювання C2.3 (Introduction: Assessment Structure)'
  words: 500
  points:
  - Огляд охоплення модулів M46-74 (право, медицина, IT, освіта) з акцентом на професійну спеціалізацію.
  - Контекстуалізація іспиту через культурний гачок ЄДКІ (Єдиного державного кваліфікаційного іспиту) для створення атмосфери
    високої відповідальності.
  - 'Роль Голови комісії (Board Commissioner): встановлення формального тону та роз''яснення критеріїв успіху згідно зі стандартом
    §4.3.1.1.'
- section: 'Частина I — Термінологія та професійна компетентність (Part I: Terminology and Professional Competency)'
  words: 750
  points:
  - Критичне розрізнення понять 'Компетенція' (сфера повноважень) та 'Компетентність' (професійний рівень) у контексті атестації.
  - 'Робота з високочастотною лексикою: атестаційна комісія, підтвердження кваліфікації та проведення незалежної експертизи.'
  - 'Аналіз наукового та офіційно-ділового стилів: використання термінологічних одиниць відповідно до обраного фаху.'
- section: 'Частина II — Читання та критичний аналіз фахових текстів (Part II: Reading and Critical Analysis of Professional
    Texts)'
  words: 1000
  points:
  - Аналіз юридичних або медичних документів на предмет дотримання норм офіційного стилю (стандарт §4.3.3).
  - 'Виявлення та правильне вживання канцеляризмів: ''згідно з'', ''відповідно до'', ''у зв’язку з'' (виправлення помилки
    вживання родового відмінка).'
  - 'Критичне оцінювання професійної кореспонденції: розпізнавання прихованих інтенцій та професійного жаргону.'
- section: 'Частина III — Письмо: Створення вторинних текстів (Part III: Writing: Creating Secondary Texts)'
  words: 1250
  points:
  - Написання фахового висновку або реферату з використанням безособових конструкцій ('Встановлено...', 'Виявлено...') для
    імітації офіційного протоколу.
  - Трансформація первинної інформації у довідково-інформаційний текст (звіт, повідомлення) згідно з вимогами стандарту C2.
  - 'Кейс-стаді: підготовка аргументації для підвищення кваліфікації або проходження атестації держслужбовців.'
- section: 'Частина IV — Усна професійна комунікація (Part IV: Oral Professional Communication)'
  words: 900
  points:
  - Симуляція професійної консультації або засідання атестаційної комісії з дотриманням етикету високого регістру.
  - Викорінення кальки 'приймати участь' та закріплення нормативної форми 'брати участь' у дискусіях.
  - Аргументовані відповіді на запитання експертів під час презентації професійного портфоліо.
- section: 'Частина V — Інтеграція, рефлексія та зворотний зв''язок (Part V: Integration, Reflection, and Feedback)'
  words: 600
  points:
  - 'Самооцінка за критеріями якості: відповідність результатів атестації встановленим професійним стандартам.'
  - Рефлексивне есе щодо набутої компетентності та стратегії подальшого професійного розвитку.
  - Формування плану ліквідації типових помилок (кальки, граматичні неточності в офіційних документах).
vocabulary_hints:
  required:
  - атестація (certification/assessment) — проходити атестацію, атестаційна комісія; надзвичайно висока частотність у держсекторі
  - кваліфікація (qualification) — підвищення кваліфікації, підтвердити фах; ключове поняття для кар'єрного росту
  - компетентність (competence) — професійна компетентність; на відміну від 'компетенції' означає рівень знань
  - експертиза (expertise/examination) — проводити незалежну експертизу; часто вживається в юридичному та технічному контекстах
  - згідно з (according to) — вживається з орудним відмінком (згідно з інструкцією); критична точка для уникнення помилок
  - брати участь (to participate) — єдино правильна форма; витісняє кальку 'приймати участь'
  recommended:
  - відповідно до (in accordance with) — канцеляризм для офіційно-ділового стилю
  - у зв’язку з (due to) — стійка конструкція для обґрунтування рішень у документах
  - презентувати (to present) — презентувати портфоліо; активна професійна лексика
  - валідація (validation) — валідація результатів; термін з IT та наукової сфери
  - кейс-стаді (case study) — метод аналізу конкретних ситуацій у навчанні та бізнесі
