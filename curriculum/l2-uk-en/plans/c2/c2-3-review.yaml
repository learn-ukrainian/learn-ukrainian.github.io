content_outline:
- section: Вступ (Introduction)
  words: 650
  points:
  - Аналіз структури фази C2.3 та вимог Державного стандарту 2024 щодо професійного володіння мовою (§4.3.3, §4.3.8).
  - 'Культурний контекст: роль Інституту української наукової мови (1921-1930) у створенні словників та закладенні фундаменту
    сучасної терміносистеми.'
- section: Професійна термінологія та культура письма (Professional Terminology and Writing Culture)
  words: 1000
  points:
  - 'Типові лексичні помилки: розрізнення понять «компетенція» (сфера повноважень органу) та «компетентність» (навички особи)
    — практичні вправи на диференціацію.'
  - 'Подолання кальок у діловому спілкуванні: заміна помилкового «аплікуватися» на нормативне «претендувати на вакансію» або
    «подаватися на посаду».'
  - 'Стилістична корекція: перехід від застарілого канцеляриту з пасивними конструкціями («нами було зроблено») до динамічного
    професійного стилю («ми зробили»).'
- section: Спеціалізований дискурс — Право та Медицина (Specialized Discourse — Law and Medicine)
  words: 1250
  points:
  - 'Правнича українська: історична тяглість від «Руської Правди» та Литовських статутів до сучасної кодифікації правової
    термінології.'
  - 'Медична термінологія: консолідація знань (M66-70) та етика професійного спілкування як елемент загальної ерудиції фахівця
    рівня C2.'
  - 'Правопис та вживання канцеляризмів згідно зі Стандартом: нормативне використання конструкцій «згідно з», «відповідно
    до», «у зв’язку з».'
  - Комплексна інтеграція набутих навичок через багаторівневі завдання з автентичними текстами
- section: Академічне та професійне письмо (Academic and Professional Writing)
  words: 1100
  points:
  - 'Методологія створення вторинних текстів: алгоритми написання рефератів, аналітичних довідок та інформаційних повідомлень
    (Стандарт §4.3.8).'
  - 'Синтез матеріалів професійного портфоліо (M71-73): демонстрація багатоформатної компетентності та стратегії розбудови
    особистого бренду.'
  - Комплексна інтеграція набутих навичок через багаторівневі завдання з автентичними текстами
- section: Консолідація та самооцінка (Consolidation and Self-Assessment)
  words: 1000
  points:
  - 'Методика самооцінки: використання професійних чеклістів для виявлення прогалин (правових, мовних, фахових) та планування
    подальшої роботи.'
  - 'Комплексний практикум: симуляція професійної ситуації (дискурс, презентація, аргументація) як підготовка до Checkpoint
    C2.3.'
vocabulary_hints:
  required:
  - консолідація (consolidation) — консолідація активів, консолідація зусиль; висока частотність в академічному та фінансовому
    дискурсі
  - компетентність (competence) — професійна компетентність, цифрова компетентність; набути компетентності (на відміну від
    компетенції як повноважень)
  - прогалина (gap) — прогалина в знаннях, правова прогалина; заповнити прогалину; низька частотність у розмовному мовленні,
    типова для професійного контексту
  - претендувати (to apply/claim) — претендувати на вакансію; вживати замість кальки «аплікуватися»
  - відповідно до (according to) — нормативний канцеляризм згідно зі Стандартом §4.3.3; вимагає родового відмінка
  recommended:
  - самооцінка (self-assessment) — адекватна самооцінка, лист самооцінки; ключовий термін HR та психології
  - систематизація (systematization) — систематизація термінології, знань; процес упорядкування складних систем
  - вторинний текст (secondary text) — реферат, анотація, огляд; термін Стандарту §4.3.8
  - дискурс (discourse) — професійний дискурс, аналіз дискурсу; термін для опису специфічного мовного середовища
