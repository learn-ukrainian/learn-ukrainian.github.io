content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - Аналіз структури фази C2.3 та вимог Державного стандарту 2024 щодо професійного
    володіння мовою (§4.3.3, §4.3.8).
  - 'Культурний контекст: роль Інституту української наукової мови (1921-1930) у створенні
    словників та закладенні фундаменту сучасної терміносистеми.'
- section: Професійна термінологія та культура письма (Professional Terminology and
    Writing Culture)
  words: 600
  points:
  - 'Типові лексичні помилки: розрізнення понять «компетенція» (сфера повноважень
    органу) та «компетентність» (навички особи) — практичні вправи на диференціацію.'
  - 'Подолання кальок у діловому спілкуванні: заміна помилкового «аплікуватися» на
    нормативне «претендувати на вакансію» або «подаватися на посаду».'
  - 'Стилістична корекція: перехід від застарілого канцеляриту з пасивними конструкціями
    («нами було зроблено») до динамічного професійного стилю («ми зробили»).'
- section: Спеціалізований дискурс — Право та Медицина (Specialized Discourse — Law
    and Medicine)
  words: 750
  points:
  - 'Правнича українська: історична тяглість від «Руської Правди» та Литовських статутів
    до сучасної кодифікації правової термінології.'
  - 'Медична термінологія: консолідація знань (M66-70) та етика професійного спілкування
    як елемент загальної ерудиції фахівця рівня C2.'
  - 'Правопис та вживання канцеляризмів згідно зі Стандартом: нормативне використання
    конструкцій «згідно з», «відповідно до», «у зв’язку з».'
- section: Академічне та професійне письмо (Academic and Professional Writing)
  words: 650
  points:
  - 'Методологія створення вторинних текстів: алгоритми написання рефератів, аналітичних
    довідок та інформаційних повідомлень (Стандарт §4.3.8).'
  - 'Синтез матеріалів професійного портфоліо (M71-73): демонстрація багатоформатної
    компетентності та стратегії розбудови особистого бренду.'
- section: Консолідація та самооцінка (Consolidation and Self-Assessment)
  words: 600
  points:
  - 'Методика самооцінки: використання професійних чеклістів для виявлення прогалин
    (правових, мовних, фахових) та планування подальшої роботи.'
  - 'Комплексний практикум: симуляція професійної ситуації (дискурс, презентація,
    аргументація) як підготовка до Checkpoint C2.3.'
