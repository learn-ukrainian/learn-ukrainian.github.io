module: c2-064
level: C2
sequence: 64
version: 1.1.3
title: 'Повторення C2.3: Професійна спеціалізація та фахова майстерність'
subtitle: 'Огляд C2.3: фахова майстерність'
focus: review
pedagogy: review
objectives:
- Систематизувати та закріпити навички створення складних професійних документів
  та презентацій
- Узагальнити методи опанування та використання галузевої термінології на 
  найвищому рівні
- Відшліфувати стратегії професійної комунікації, самопрезентації та етичного 
  лідерства
- Підготуватися до фінального оцінювання фази C2.3 через комплексне повторення 
  ключових компетенцій
content_outline:
- section: Ретроспектива професійного інструментарію
  words: 1000
  subsections:
  - Огляд типів документів та їх стилістичних домінант (№51–53)
  - Систематизація стратегій читання та критичного аналізу фахових текстів 
    (M49-50)
  - Кореляція між термінологічною вправністю та професійною репутацією (№47–48)
  key_concepts:
  - документознавство
  - критичне читання
  - терміносистема
  - фахова досконалість
  primary_sources:
  - Микола Костомаров, 'Автобіографія' (аналіз професійного становлення та 
    академічної мови XIX ст.)
- section: 'Комунікативна майстерність: від діалогу до виступу'
  words: 1000
  subsections:
  - Синтез навичок усної професійної комунікації та публічних виступів (№54, 
    M62)
  - Еволюція особистого бренду та професійної ідентичності (№61, №63)
  - Удосконалення навичок професійної дискусії та полеміки (№57)
  key_concepts:
  - риторична гнучкість
  - комунікативна стратегія
  - публічний образ
  - полемічна майстерність
- section: Етика та лідерство у професійному дискурсі
  words: 1000
  subsections:
  - Закріплення етичних засад та розв'язання складних кейсів (№63)
  - Мова як інструмент лідерства, наставництва та управління змінами
  - Специфіка професійної кореспонденції та етикету в цифровому середовищі (№56)
  key_concepts:
  - професійна етика
  - лідерський наратив
  - цифровий етикет
  - ціннісна аргументація
- section: Комплексний практикум та самоаудит
  words: 1000
  subsections:
  - Аналіз типових помилок у професійному мовленні високого рівня та способи їх 
    усунення
  - Підготовка фінальної версії професійного портфоліо на основі отриманого 
    фідбеку
  - Діагностика готовності до контрольної точки фази C2.3
  key_concepts:
  - лінгвістичний аудит
  - самокорекція
  - персональна стратегія
  - професійне резюме
  primary_sources:
  - Михайло Грушевський, 'Як я став істориком' (дослідження методології та мови 
    вченого-державника)
- section: Підсумок — Summary
  words: 300
  points:
  - "Professional communication at the C2 level requires a synthesis of document creation
    (документознавство), industry terminology (терміносистема), and rhetorical flexibility
    (риторична гнучкість). Self-check: What are the key stylistic differences between
    a formal presentation and an academic text like Kostomarov's? Describe 3 strategies
    for maintaining professional ethics (професійна етика) in digital correspondence."
  - 'Continuous self-audit (самоаудит) and self-correction (самокорекція) are essential
    for maintaining a flawless public image (публічний образ). Self-check: How do
    you perform a linguistic audit (лінгвістичний аудит) on your own professional
    speech? What is the main difference between a standard resume and a comprehensive
    professional portfolio?'
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Офіційно-діловий стиль'
- 'Авраменко, 11 клас (2019): Професійна комунікація'
- 'Державний стандарт 2024: C2 — систематизація професійних мовних компетенцій'
reading_situations:
- source_type: Мемуари / Наукова автобіографія
  topic: Дослідження шляху становлення вченого за 'Автобіографією' Миколи 
    Костомарова. Аналіз поєднання особистого та професійного стилів.
  key_elements:
  - академічне середовище
  - науковий пошук
  - стилістична єдність
  motivation: Розуміння історичної тяглості української професійної еліти та її 
    мовної традиції.
- source_type: Аналітичний звіт
  topic: Комплексний аналіз структури та мови сучасних українських звітів про 
    професійні стандарти. Порівняння з історичними аналогами.
  key_elements:
  - нормативність
  - термінологічна чіткість
  - структурованість
  motivation: Систематизація знань про офіційно-діловий та науковий стилі.
listening_situations:
- media_type: лекція
  setting: Узагальнююча лекція про тренди розвитку професійної української мови 
    у XXI столітті.
  focus_points:
  - Динаміка запозичень та питома термінологія
  - Зміни у мовному етикеті ділового спілкування
  motivation: Цілісне сприйняття пройденого матеріалу фази C2.3.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть аналітичне есе-рефлексію ''Мій шлях у професійній мові: від знання
    до майстерності''. Узагальніть ваш досвід опанування фази C2.3 та спрогнозуйте
    подальше застосування набутих компетенцій.'
  requirements:
  - мінімум 600 слів
  - використання лексики високого рівня
  - 'структура: тези — аргументи — висновки'
  motivation: Підсумкова перевірка здатності до складного синтезу та рефлексії.
  model_answer: Текст має бути зрілим, демонструвати глибоке розуміння пройдених
    тем, містити конкретні приклади професійного зростання та бути написаним 
    бездоганною мовою.
discussion_topics:
- context: Чи є професійна мова лише інструментом передачі інформації, чи вона є
    фундаментом професійної культури?
  questions:
  - Як змінилося ваше сприйняття власної фаховості після завершення цієї фази?
  - Які аспекти професійної комунікації ви вважаєте найбільш складними для 
    опанування на рівні C2?
  motivation: Підсумкова дискусія перед контрольною точкою.
activity_hints:
- type: reading
  focus: Прочитайте текст про ретроспектива професійного інструментарію і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про комунікативна майстерність: від
    діалогу до виступу, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Ретроспектива 
    професійного інструментарію». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    ретроспектива професійного інструментарію.
- type: comparative-study
  focus: 'Порівняйте різні підходи до ретроспектива професійного інструментарію: Огляд
    типів документів та їх стилістичних домінант (№51–53). Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
