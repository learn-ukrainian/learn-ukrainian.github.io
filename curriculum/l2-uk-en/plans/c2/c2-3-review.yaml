vocabulary_hints:
  required:
  - консолідація (consolidation) — консолідація активів, консолідація зусиль; висока
    частотність в академічному та фінансовому дискурсі
  - компетентність (competence) — професійна компетентність, цифрова компетентність;
    набути компетентності (на відміну від компетенції як повноважень)
  - прогалина (gap) — прогалина в знаннях, правова прогалина; заповнити прогалину;
    низька частотність у розмовному мовленні, типова для професійного контексту
  - претендувати (to apply/claim) — претендувати на вакансію; вживати замість кальки
    «аплікуватися»
  - відповідно до (according to) — нормативний канцеляризм згідно зі Стандартом §4.3.3;
    вимагає родового відмінка
  recommended:
  - самооцінка (self-assessment) — адекватна самооцінка, лист самооцінки; ключовий
    термін HR та психології
  - систематизація (systematization) — систематизація термінології, знань; процес
    упорядкування складних систем
  - вторинний текст (secondary text) — реферат, анотація, огляд; термін Стандарту
    §4.3.8
  - дискурс (discourse) — професійний дискурс, аналіз дискурсу; термін для опису специфічного
    мовного середовища
