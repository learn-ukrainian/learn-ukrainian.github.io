content_outline:
- section: 'Вступ: Граматика як жива система (Introduction: Grammar as a Living System)'
  words: 850
  points:
  - 'Рівні граматичного опису: від морфонеми до тексту; мета повторення на С2 як шлях до стилістичної досконалості'
  - 'Політична історія стандартизації: «репресована» граматика 1930-х років, Харківський правопис (1928) та повернення органічних
    рис (закінчення -и в родовому відмінку)'
- section: Поглиблена морфологія іменних частин мови (Advanced Morphology of Nominal Parts)
  words: 1150
  points:
  - 'Іменник: системний аналіз §4.1.1.1 Державного стандарту — відмінювання назв осіб чоловічого роду на твердий приголосний
    (лемко, договір, вельможа)'
  - 'Складні випадки: морфологія множинних іменників (ворота, надра, дрова), специфіка іменників спільного роду (бездара,
    волоцюга), відмінювання абревіатур (Кабмін → Кабміну, МОН → МОНу) та складних/складноскорочених слів (прем''єр-міністр,
    бетоновоз, велодоріжка) згідно з §4.1.1.1 Державного стандарту'
  - Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами
- section: Дієслівна система та стилістика стану (The Verb System and Stylistics of Voice)
  words: 1000
  points:
  - 'Вид і час у повному обсязі: рідкісні та книжні форми дієслів; особливості дієвідмінювання за новим правописом'
  - 'Подолання пасивності: корекція калькованих структур (було вирішено комітетом) на активні (комітет вирішив) або безособові
    (комітетом вирішено) форми'
- section: Синтаксичні норми та закони милозвучності (Syntactic Norms and Laws of Euphony)
  words: 1150
  points:
  - 'Синтаксис простого та складного речення: актуальне членування та порядок слів; багатокомпонентні безсполучникові конструкції'
  - 'Милозвучність як граматичний закон: чергування у/в, і/й; виправлення помилок керування (дякувати тобі замість тебе, вибачати
    йому)'
  - Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами
- section: Відмінкова система з прийменниками та семантичними полями (The Case System with Prepositions
    and Semantic Fields)
  words: 400
  points:
  - 'Систематизація всіх 7 відмінків із прийменниковим керуванням: називний (безприйменниковий),
    родовий (без, від, до, для, з, після, біля, серед, щодо), давальний (завдяки, всупереч,
    назустріч), знахідний (в/на + напрямок, за, через, про, під), орудний (з, за, між, над,
    під, перед), місцевий (в/у, на, при, по), кличний (безприйменниковий).'
  - 'Семантичні поля прийменників: просторові (в, на, під, над, між, біля), часові (до, після,
    під час, протягом), причинові (через, завдяки, внаслідок), цільові (для, заради, на).'
- section: Складені числівники у всіх відмінках (Compound Numerals in All Cases)
  words: 350
  points:
  - 'Відмінювання складених кількісних числівників: правило відмінювання кожного компонента
    (двісті сорок п''ять → двохсот сорока п''яти); типові помилки з числівниками на -сот,
    -десят.'
  - 'Числівники з іменниками: узгодження після складених числівників (двадцять один студент,
    двадцять два студенти, двадцять п''ять студентів); порядкові числівники (двісті сорок
    п''ятий).'
- section: Типи односкладних речень (Types of One-Member Sentences)
  words: 300
  points:
  - 'Класифікація односкладних речень: означено-особові (Читаю книгу), неозначено-особові
    (Кажуть, що...), узагальнено-особові (Що посієш, те й пожнеш), безособові (Світає,
    Мені холодно), називні (Зима. Тиша.).'
  - 'Стилістичне використання: односкладні речення як засіб динаміки в художньому стилі
    та лаконічності в науковому.'
- section: Повні парадигми прикметників (Complete Adjective Paradigms)
  words: 300
  points:
  - 'Систематизація відмінювання прикметників: тверда група (новий), м''яка група (синій),
    мішана група (безкрайній); повні парадигми в однині та множині для всіх родів.'
  - 'Короткі форми прикметників (рад, годен, ладен, повен, дрібен): обмеження вживання
    та стилістичне навантаження; прикметники з подвійними формами (повний/повен).'
- section: 'Практикум: Аналіз помилок та самокорекція (Workshop: Error Analysis and Self-Correction)'
  words: 850
  points:
  - 'Діагностика слабких місць: правильне утворення та наголошування віддієслівних іменників (навча́ння vs на́вчання)'
  - 'Комплексна перевірка: аналіз дефектних парадигм та стилістична правка академічних текстів'
vocabulary_hints:
  required:
  - морфологія (morphology) — словотвірна та історична морфологія; висока частотність в академічному дискурсі
  - синтаксис (syntax) — актуальне членування речення, синтаксичні норми; ключовий термін рівня С2
  - парадигма (paradigm) — повна, дефектна або змінена парадигма; концепт системного підходу до мови
  - відмінок (case) — непрямі відмінки, кличний відмінок; увага на відмінкові закінчення за правописом 2019
  - концепція (concept) — методологічна основа граматичного аналізу
  - методологія (methodology) — системний підхід до вивчення мовних рівнів
  recommended:
  - милозвучність (euphony) — чергування у/в, і/й як обов'язковий граматичний закон
  - дієвідміна (conjugation) — особливості дієвідмінювання першої та другої груп; маркер високої грамотності
  - дієприкметник (participle) — вживання активних та пасивних форм у науковому стилі
  - синтез (synthesis) — поєднання граматичних одиниць для створення складного дискурсу
  - контекстуалізація (contextualization) — аналіз граматичних категорій у живому мовленні
vocabulary:
  required:
  - морфологія (morphology)
  - синтаксис (syntax)
  - парадигма (paradigm)
  - відмінок (case)
  - дієвідміна (conjugation)
  - спосіб (mood)
  - стан (voice)
  - односкладне речення (one-member sentence)
  - ускладнене речення (complex simple sentence)
  - сполучник (conjunction)
  - числівник (numeral)
  - прикметник (adjective)
  - прийменник (preposition)
  recommended:
  - дієприкметник (participle)
  - дієприслівник (adverbial participle)
  - частка (particle)
  - вигук (interjection)
  - називне речення (nominal sentence)
  forbidden: []
