module: c2-084
level: C2
sequence: 84
version: 1.1.1
title: 'Повний граматичний огляд рівня С2: Системність та нюанси'
subtitle: Повний огляд граматики C2
focus: grammar
pedagogy: review
objectives:
- Систематизувати знання про складну морфологію та синтаксис української мови
- Проаналізувати рідковживані, архаїчні та книжні форми, що забезпечують високий стиль мовлення
- Закріпити навички стилістичного редагування та виправлення типових помилок у складних текстах
- Опанувати систему засобів милозвучності та ритміки української фрази на рівні майстерності
content_outline:
- section: 'Морфологічна система: складні випадки словозміни та нюанси значень'
  words: 1000
  subsections:
  - Варіантні форми іменників (відмінювання прізвищ, географічних назв, запозичень)
  - 'Дієслівна система: аспекти, способи та рідковживані форми (архаїчні дієприкметники та дієприслівники)'
  - 'Чисельник у складних синтаксичних конструкціях: узгодження та керування'
  key_concepts:
  - морфологічна норма
  - варіантність
  - архаїзм
  - граматична категорія
- section: 'Синтаксична архітектоніка: складні речення та засоби зв''язку'
  words: 1000
  subsections:
  - 'Періоди та складні синтаксичні цілі: логічна та інтонаційна завершеність'
  - Відокремлені члени речення як засіб деталізації та експресії у високому стилі
  - 'Типологія зв''язку у багатокомпонентних конструкціях: сурядність, підрядність, безсполучниковість'
  key_concepts:
  - синтаксична модель
  - інтерпункція
  - фразова архітектоніка
  - модальність
- section: Функціональна стилістика та лексична синонімія
  words: 1000
  subsections:
  - 'Взаємодія стилів: дифузія елементів наукового, офіційного та художнього мовлення'
  - Лексична синонімія як інструмент уникнення тавтології та уточнення відтінків значень
  - Виправлення лексичних та синтаксичних помилок (кальки, плеоназми, порушення керування)
  key_concepts:
  - стилістична домінанта
  - мовна культура
  - редагування
  - синонімічний ряд
  primary_sources:
  - Борис Антоненко-Давидович, 'Як ми говоримо' (вибрані замітки про чистоту та багатство мови)
- section: 'Пунктуаційна норма та милозвучність: фінальні акценти'
  words: 1000
  subsections:
  - Складні випадки вживання розділових знаків у авторських та інтелектуальних текстах
  - 'Милозвучність (евфонія) української мови: чергування у-в, і-й, з-із-зі та ритміка фрази'
  - 'Культура інтелектуального мовлення: відбір засобів виразності для аудиторії рівня С2'
  key_concepts:
  - евфонія
  - пунктуаційний знак
  - ритмомелодика
  - мовна майстерність
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - error-correction
  - highlight-morphemes
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Варіантність морфологічних норм'
- 'Державний стандарт 2024: C2 — граматична компетенція'
reading_situations:
- source_type: Мовознавчий посібник
  topic: Аналіз праці Бориса Антоненка-Давидовича 'Як ми говоримо'. Дослідження типових мовних огріхів та шляхів їх уникнення.
  key_elements:
  - норма
  - калька
  - точне слово
  motivation: Вдосконалення чуття мови та культури слововживання.
- source_type: Текст високого стилю
  topic: Аналіз складного синтаксису у праці відомого філолога чи філософа. Дослідження пунктуаційних та граматичних особливостей.
  key_elements:
  - період
  - вставні конструкції
  - узгодження
  motivation: Вивчення взірцевих синтаксичних моделей.
listening_situations:
- media_type: аудіо
  setting: Запис радіопередачі про еволюцію української граматичної норми у ХХ-ХХІ століттях.
  focus_points:
  - Зміни у правописі 2019 року
  - Тенденції до спрощення чи ускладнення граматичних структур
  motivation: Розуміння динаміки мовної норми.
writing_tasks:
- task_type: власне висловлення
  prompt: Виконайте комплексне стилістичне та граматичне редагування запропонованого ускладненого тексту, обґрунтовуючи кожну
    правку посиланням на правила.
  requirements:
  - мінімум 600 слів
  - аргументація змін
  - забезпечення високого рівня милозвучності
  motivation: Перевірка навичок практичного застосування граматичних та стилістичних знань.
  model_answer: Відредагований текст має бути бездоганним з точки зору норми, стилістично витриманим та логічно послідовним.
discussion_topics:
- context: Чи повинна граматична норма бути непохитною, чи вона має гнучко підлаштовуватися під потреби живого мовлення?
  questions:
  - Яка роль словників та правопису в епоху інтернету?
  - Де межа між мовною творчістю та мовною неграмотністю?
  motivation: Дискусія про філософію мовної норми та майбутнє кодифікації.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про морфологічна система: складні випадки словозміни та нюанси значень і дайте відповіді на запитання
    щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про синтаксична архітектоніка: складні речення та засоби зв''язку, використовуючи
    нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Морфологічна система: складні випадки словозміни та нюанси
    значень». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему морфологічна система: складні випадки словозміни
    та нюанси значень.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до морфологічна система: складні випадки словозміни та нюанси значень: Варіантні форми
    іменників (відмінювання прізвищ, географічних назв, запозичень). Визначте спільне та відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
