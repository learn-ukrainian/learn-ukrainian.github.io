module: c2-068
level: C2
sequence: 68
version: '1.0'
title: 'Побут і щоденне життя: Культура повсякденності та філософія буття'
subtitle: 'Побут і щоденне життя'
focus: vocabulary
pedagogy: seminar
objectives:
  - Аналізувати феномен повсякденності як культурологічну та філософську
    категорію в українському контексті
  - Опанувати лексику побуту, домогосподарства та організації щоденного життя
    на рівні аналітичного дискурсу
  - Досліджувати трансформацію побутових практик українців від традиційного
    укладу до сучасних моделей
  - Розвинути навички критичного аналізу текстів про культуру споживання,
    мінімалізм та якість життя
content_outline:
  - section: 'Філософія повсякденності: побут як дзеркало культури'
    words: 1000
    subsections:
      - 'Повсякденність як категорія: від побутового до буттєвого виміру'
      - 'Побут в українській літературі: від етнографічного опису до
        екзистенційної рефлексії'
      - Мовна репрезентація повсякденності — побутова лексика як культурний код
    key_concepts:
      - повсякденний
      - побутовий
      - рутина
      - затишок
    primary_sources:
      - Іван Нечуй-Левицький, 'Кайдашева сім''я' (вибрані фрагменти про побут
        та звичаї українського села)
  - section: 'Домогосподарство та організація побуту: від традиції до раціональності'
    words: 1000
    subsections:
      - 'Еволюція домогосподарства: від натурального господарювання до сучасних
        моделей'
      - Ґендерний розподіл побутових обов'язків та його трансформація
      - Раціональне господарювання та фінансова грамотність домогосподарства
    key_concepts:
      - домогосподарство
      - господарювання
      - раціональний
      - упорядкування
  - section: 'Культура споживання та мінімалізм: свідомий вибір у сучасному світі'
    words: 1000
    subsections:
      - 'Від надспоживання до свідомого вибору: глобальні тренди та українські
        реалії'
      - 'Мінімалізм як філософія: екологічний, економічний та естетичний виміри'
      - Етичне споживання та відповідальність перед громадою
    key_concepts:
      - споживання
      - мінімалізм
      - самоорганізація
      - ергономіка
    primary_sources:
      - Григорій Сковорода, 'De libertate' (вибрані афоризми про «сродну працю»
        та невибагливість як чесноту)
  - section: 'Побут під час війни: стійкість та адаптація повсякденності'
    words: 1000
    subsections:
      - Трансформація побутових практик в умовах воєнного стану
      - 'Волонтерська кухня, енергетична стійкість та побутова винахідливість:
        мова адаптації'
      - Психологічний вимір повсякденності — рутина як інструмент збереження
        психічного здоров'я
    key_concepts:
      - комунальний
      - домашній
      - домобудівництво
      - облаштування
  - section: 'Нові моделі побуту: технології, екологія та якість життя'
    words: 1000
    subsections:
      - 'Розумний дім та автоматизація побуту: можливості та обмеження'
      - Екологічний побут — відмова від одноразового, переробка, компостування
      - 'Баланс між роботою та особистим життям: побут як простір самореалізації'
    key_concepts:
      - ергономічний
      - просторовий
      - самоорганізація
      - раціональний
word_target: 5000
vocabulary_hints:
  required:
    - побутовий
    - повсякденний
    - рутина
    - домогосподарство
    - господарювання
    - самоорганізація
    - споживання
    - мінімалізм
    - ергономіка
    - комунальний
  recommended:
    - домашній
    - затишок
    - упорядкування
    - раціональний
    - облаштування
    - домобудівництво
    - просторовий
    - ергономічний
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Класична проза
    topic: Аналіз побутових описів у «Кайдашевій сім'ї» Нечуя-Левицького.
      Дослідження функції побутових деталей у створенні образу епохи.
    key_elements:
      - побут села
      - родинні стосунки
      - гумор та іронія
    motivation: Осмислення ролі побутового дискурсу в українській класичній
      літературі.
  - source_type: Філософське есе
    topic: Дослідження поглядів Сковороди на невибагливість та «сродну працю» як
      протиставлення марнославному побутовому надмірству.
    key_elements:
      - аскеза
      - внутрішня свобода
      - сродна праця
    motivation: Аналіз філософського осмислення побуту як етичної категорії.
listening_situations:
  - media_type: подкаст
    setting: Розмова соціолога та психологині про трансформацію побутових практик
      українців під час повномасштабної війни.
    focus_points:
      - Стратегії побутової адаптації в умовах обстрілів та блекаутів
      - Рутина як механізм психологічної стабілізації
    motivation: Аналіз сучасного соціологічного дискурсу про повсякденність в
      екстремальних умовах.
writing_tasks:
  - task_type: есе
    prompt: Напишіть аналітичне есе на тему «Побут як філософія — що повсякденні
      практики говорять про цінності суспільства?». Поєднайте культурологічний
      аналіз з особистою рефлексією.
    requirements:
      - мінімум 700 слів
      - використання культурологічної та соціологічної термінології
      - аргументована позиція з прикладами з української культури
    motivation: Перевірка здатності до аналітичного осмислення повсякденності як
      культурного феномену.
    model_answer: Есе має демонструвати розуміння зв'язку між побутовими
      практиками та ціннісними орієнтаціями, аналізувати приклади з української
      історії та сучасності.
discussion_topics:
  - context: Чи є мінімалізм та свідоме споживання привілеєм заможних, чи
      реальною альтернативою для кожного?
    questions:
      - Як війна змінила ставлення українців до матеріальних речей?
      - Де межа між раціональним побутом та аскезою?
    motivation: Дебати про культуру споживання та якість життя у сучасному
      українському контексті.
activity_hints:
  - type: reading
    focus: 'Проаналізувати побутові описи у «Кайдашевій сім''ї»: визначити функцію
      побутових деталей у створенні образу епохи'
  - type: essay-response
    focus: Написати аналітичне есе про побут як дзеркало цінностей суспільства
  - type: critical-analysis
    focus: Оцінити аргументацію у тексті про трансформацію побуту під час війни та
      стратегії адаптації
  - type: essay-response
    focus: 'Доповнити текст побутовою та соціологічною термінологією:
      домогосподарство, упорядкування, споживання'
  - type: error-correction
    focus: Виправити кальки та росіянізми у тексті про культуру споживання та
      мінімалізм
