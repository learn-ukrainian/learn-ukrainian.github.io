module: c2-078
level: C2
sequence: 78
slug: translation-practice-ii
version: '2.0'
title: Практика перекладу II — Спеціалізований переклад
focus: practice
pedagogy: TTT
phase: C2.4 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Застосовувати перекладацькі стратегії для передачі стилістичних нюансів
- Аналізувати перекладацькі рішення та оцінювати їхню адекватність
- Продукувати переклади, що зберігають стилістичну специфіку оригіналу
- 'Застосовувати знання з теми «Медичний переклад: Точність та відповідальність» у власній мовній практиці'
sources:
- name: Карабан — Переклад науково-технічної літератури
  url: https://uk.wikipedia.org/wiki/Карабан_В'ячеслав_Іванович
  type: primary
  notes: Standard textbook for technical translation Ukrainian-English
- name: ISO 17100 — Translation Services Requirements
  url: https://www.iso.org/
  type: reference
  notes: International standard for translation quality
- name: Державний стандарт термінології
  url: https://dstu-online.com/
  type: reference
  notes: Ukrainian terminology standardization
content_outline:
- section: 'Вступ: Світ спеціалізованого перекладу (Introduction: The World of Specialized Translation)'
  words: 650
  points:
  - 'Вимоги Державного стандарту (§4.3.7) щодо компетенції перекладача: здатність трансформувати текст між науковим, офіційним
    та публіцистичним стилями.'
  - 'Огляд ринку спеціалізованого перекладу в Україні крізь призму стандарту ISO 17100: кваліфікаційні вимоги та професійна
    етика.'
- section: Науково-технічний переклад та стандартизація (Scientific-Technical Translation and Standardization)
  words: 1000
  points:
  - Роль ДСТУ та ДП «УкрНДНЦ» у розробці термінологічних стандартів; важливість опори на чинні нормативи замість самостійного
    вигадування термінів.
  - 'Робота з галузевими терміносистемами: методи впорядкування та верифікації науково-технічної термінології в українському
    контексті.'
  - Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів
- section: Юридичний переклад та євроінтеграція (Legal Translation and Eurointegration)
  words: 1150
  points:
  - Масштабний проєкт перекладу законодавства ЄС (Acquis communautaire) як приклад викликів уніфікації термінології та створення
    нових правничих лексем.
  - 'Learner error: Аналіз калькування (calques) юридичних термінів, наприклад, помилковий переклад «civil servant» як «цивільний
    слуга» замість нормативного «державний службовець».'
  - Особливості еквівалентності правових понять при перекладі міжнародних контрактів та сертифікованих документів.
  - Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів
- section: 'Медичний переклад: Точність та відповідальність (Medical Translation: Precision and Responsibility)'
  words: 850
  points:
  - 'Етичні аспекти медичного перекладу: розбір критичної відповідальності перекладача за життя та здоров’я пацієєнта через
    точність передачі діагнозів.'
  - Специфіка взаємодії латинської термінології з українськими медичними текстами та переклад фармацевтичної документації.
- section: Інструменти та контроль якості (Translator Tools and Quality Control)
  words: 650
  points:
  - Використання CAT-систем (SDL Trados, MemoQ) для забезпечення термінологічної єдності в межах великих проєктів та галузевих
    баз даних.
  - 'Learner error: Зловживання пасивним станом («було виконано») під впливом російської канцелярської мови; стратегії переходу
    до активних та безособових форм.'
- section: 'Практична майстерня: Аналіз та корекція (Practical Workshop: Analysis and Correction)'
  words: 700
  points:
  - 'Дрилі на розрізнення «хибних друзів перекладача»: правильний переклад термінів «data» (дані, а не дата) та «academic»
    (науковий/навчальний, а не лише академічний).'
  - Практичне редагування результатів машинного перекладу (MTPE) з акцентом на виправлення стилістичних кальок та термінологічних
    неточностей.
vocabulary_hints:
  required:
  - технічний переклад (technical translation) — виконувати технічний переклад; ключовий термін для професійної сфери
  - терміносистема (terminology system) — впорядкована терміносистема, галузева терміносистема; фокус на системності
  - юридичний переклад (legal translation) — нотаріально засвідчений юридичний переклад; вимагає високої юридичної еквівалентності
  - CAT-система (CAT tool) — використання CAT-систем (Trados, MemoQ); базова технологія для сучасного перекладача
  - локалізація (localization) — локалізація програмного забезпечення, культурна адаптація; висока частотність в IT-секторі
  - Acquis communautaire (Acquis communautaire) — правова спадщина ЄС; обов'язковий термін у контексті євроінтеграційного
    перекладу
  recommended:
  - ДСТУ (DSTU) — Державний стандарт України; посилання на нормативну базу термінології
  - калькування (calquing) — уникати калькування; термін для опису типових помилок (напр. civil servant)
  - хибні друзі перекладача (false friends) — слова, схожі за звучанням, але різні за змістом (напр. data, academic)
  - постредагування (post-editing) — редагування машинного перекладу (MTPE); актуальна компетенція рівня C2
  - термінологічна база (terminology database) — створення та підтримка термінологічних глосаріїв
vocabulary:
  required:
  - технічний переклад (technical translation)
  - термін (term)
  - терміносистема (terminology system)
  - юридичний переклад (legal translation)
  - медичний переклад (medical translation)
  - CAT-система (CAT tool)
  - термінологічна база (terminology database)
  - глосарій (glossary)
  - машинний переклад (machine translation)
  - контроль якості (quality control)
  recommended:
  - локалізація (localization)
  - постредагування (post-editing)
  - пам'ять перекладів (translation memory)
  - сертифікований переклад (certified translation)
  - апостиль (apostille)
  forbidden: '[]'
