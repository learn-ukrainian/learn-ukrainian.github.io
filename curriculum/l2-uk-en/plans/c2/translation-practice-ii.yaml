module: c2-097
level: C2
sequence: 97
version: "1.1"
title: "Перекладацька практика II: Художній та фаховий переклад"
subtitle: "Перекладацька практика II"
focus: professional
pedagogy: workshop
objectives:
  - "Опанувати методику перекладу художньої прози та поезії зі збереженням індивідуального
    стилю автора"
  - "Навчитися працювати зі складними юридичними та медичними текстами, дотримуючись
    термінологічної точності"
  - "Дослідити проблему відтворення гри слів, діалектизмів та безеквівалентної лексики"
  - "Проаналізувати особливості перекладу аудіовізуального контенту (дубляж та субтитрування)"
content_outline:
  - section: "Художній переклад: між буквалізмом та переспівом"
    words: 1000
    subsections:
      - "Відтворення авторської метафорики та ритміки тексту"
      - "Локалізація ідіом та мовної гри: стратегії творчого пошуку"
      - "Переклад діалогів: природність звучання та соціальні характеристики персонажів"
    key_concepts:
      - "стилістична адекватність"
      - "коменормалізація"
      - "форенізація та доместикація"
      - "верлібр та силлабо-тонічна система"
    primary_sources:
      - "Переклади Шекспіра або Данте українськими майстрами (Кочур, Лукаш, Стріха)"
  - section: "Юридичний та медичний переклад"
    words: 1000
    subsections:
      - "Особливості перекладу міжнародних договорів та судових актів"
      - "Медична термінологія: греко-латинська основа та українські відповідники"
      - "Забезпечення однозначності та уникнення двозначності у технічних специфікаціях"
    key_concepts:
      - "правнича термінологія"
      - "номенклатура"
      - "стандартизація"
      - "юридична сила тексту"
    primary_sources:
      - "Цивільний кодекс України (фрагменти про зобов'язальне право)"
      - "Міжнародна класифікація хвороб (МКХ)"
  - section: "Діалекти та соціолекти у перекладі"
    words: 1000
    subsections:
      - "Як передати шотландський акцент чи техаський говір засобами української мови"
      - "Використання суржику як перекладацького прийому: за та проти"
      - "Архаїзація тексту при перекладі історичних романів"
    key_concepts:
      - "соціолект"
      - "територіальний діалект"
      - "мовна компенсація"
      - "стилістичне забарвлення"
    primary_sources:
      - "Сергій Жадан: Переклади сучасної німецькомовної поезії"
  - section: "Аудіовізуальний переклад та цифрові медіа"
    words: 1000
    subsections:
      - "Специфіка перекладу для дубляжу: ліпсинк та таймінг"
      - "Субтитрування: лаконічність та збереження ключового змісту"
      - "Локалізація відеоігор та програмного забезпечення"
    key_concepts:
      - "дубляж"
      - "субтитрування"
      - "транскреація"
      - "локалізація ПЗ"
    primary_sources:
      - "Матеріали студій дубляжу (наприклад, 'Postmodern Postproduction')"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - translate
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "художній уривок"
    topic: "Аналіз перекладу роману Джойса 'Улісс' українською мовою: робота з неологізмами."
    key_elements: ["гра слів", "потік свідомості", "асоціативне мислення"]
    motivation: "Вивчення найскладніших випадків художньої інтерпретації."
  - source_type: "юридичний документ"
    topic: "Угода про нерозголошення (NDA) та специфіка її перекладу з англо-саксонського
      права на українське."
    key_elements: ["відповідальність сторін", "конфіденційність", "юрисдикція"]
    motivation: "Набуття практичних навичок у комерційному перекладі."
listening_situations:
  - media_type: "відео"
    setting: "Порівняння оригінальної доріжки та українського дубляжу популярного
      анімаційного фільму."
    focus_points:
      - "Адаптація гумору"
      - "Відповідність довжини фраз міміці персонажів"
    motivation: "Розуміння технічних обмежень аудіовізуального перекладу."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Оберіть вірш відомого іноземного поета (наприклад, Еліота чи Рільке)
      та запропонуйте власний варіант перекладу однієї строфи. Обґрунтуйте вибір лексики
      та метрику."
    requirements: ["аналіз оригіналу", "власний переклад", "коментар на 300 слів"]
    motivation: "Розвиток творчих здібностей та розуміння поетичної форми."
    model_answer: "Текст має демонструвати розуміння ритміки оригіналу та здатність
      добирати поетичні еквіваленти в українській мові."
discussion_topics:
  - context: "Чи може машинний переклад (ШІ) замінити перекладача художньої літератури?"
    questions:
      - "Чого бракує алгоритмам для передачі іронії?"
      - "Чи стане професія перекладача суто редакторською?"
    motivation: "Обговорення майбутнього творчих професій в умовах технологічного
      прогресу."

activity_hints:
  - type: reading
    focus: "Прочитайте текст про художній переклад: між буквалізмом та переспівом і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про юридичний та медичний переклад, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Художній переклад: між буквалізмом та переспівом». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему художній переклад: між буквалізмом та переспівом."
  - type: comparative-study
    focus: "Порівняйте різні підходи до художній переклад: між буквалізмом та переспівом: Відтворення авторської метафорики та ритміки тексту. Визначте спільне та відмінне."

references:
  - "Державний стандарт 2024: C2 — професійні компетенції, художній переклад"
  - "University-level: аудіовізуальний переклад, локалізація"
  - "Авраменко, 11 клас (Укр. літ.) — Літературний аналіз, порівняльне літературознавство"
phase: C2.4 [Meta-Skills & Capstone]
