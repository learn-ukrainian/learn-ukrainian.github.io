module: c2-070
level: C2
sequence: 70
version: 1.2.1
title: 'Суспільство і громадянство: Соціальна динаміка та активізм'
subtitle: Суспільство і громадянство
focus: vocabulary
pedagogy: seminar
objectives:
- Глибоко аналізувати структуру та динаміку українського громадянського суспільства засобами мови високого рівня
- Опанувати термінологію та концептуальний апарат у сфері соціології, політології та прав людини
- Розвинути навички ведення складних дискусій про соціальну справедливість, інклюзивність та громадську активність
- Навчитися створювати аналітичні та публіцистичні тексти на гостросоціальні теми з дотриманням етичних норм
content_outline:
- section: Громадянське суспільство в українському вимірі
  words: 1250
  subsections:
  - 'Генезис та еволюція громадянського активізму: від громад до сучасних ГО'
  - Роль волонтерського руху як фундаменту національної стійкості
  - Мовна репрезентація соціальної солідарності та горизонтальних зв'язків
  key_concepts:
  - громадянське суспільство
  - активізм
  - горизонтальні зв'язки
  - соціальний капітал
  primary_sources:
  - Іван Франко, 'Що таке поступ?' (філософське осмислення соціального прогресу та свободи)
- section: Права людини та соціальна справедливість
  words: 1250
  subsections:
  - 'Дискурс прав людини в Україні: міжнародні стандарти та національний досвід'
  - Проблеми інклюзивності, рівності та подолання соціальної стигматизації
  - Мовні засоби захисту прав та адвокації інтересів вразливих груп
  key_concepts:
  - правосуддя
  - інклюзивність
  - адвокація
  - права людини
- section: Медіа, дезінформація та критичне мислення
  words: 1250
  subsections:
  - Вплив медіа на формування суспільної думки та соціальних міфів
  - Стратегії протидії дезінформації та маніпуляціям у публічному просторі
  - Розвиток критичного дискурс-аналізу медійних повідомлень
  key_concepts:
  - медіаграмотність
  - дезінформація
  - суспільна думка
  - критичне мислення
- section: Активна громадянська позиція та лідерство
  words: 1250
  subsections:
  - 'Форми громадської участі: від петицій до протестних рухів'
  - Мова як інструмент мобілізації та формування соціальної візії
  - 'Етика громадського лідера: відповідальність та підзвітність'
  key_concepts:
  - громадянська позиція
  - мобілізація
  - підзвітність
  - соціальна візія
  primary_sources:
  - Мирослав Маринович, 'Всесвіт за колючим дротом' (рефлексії про людську гідність та незламність)
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
- source_type: Філософське есе
  topic: Аналіз концепту прогресу у праці Івана Франка 'Що таке поступ?'. Дослідження критики соціал-демократичних утопій.
  key_elements:
  - прогрес
  - індивідуальна свобода
  - державний примус
  motivation: Глибоке осмислення політичної та соціальної думки України кінця XIX ст.
- source_type: Мемуари / Есеїстика
  topic: Дослідження концепту гідності у мемуарах Мирослава Мариновича. Аналіз мовних засобів опису морального опору.
  key_elements:
  - гідність
  - свобода духу
  - соціальна відповідальність
  motivation: Усвідомлення етичного виміру громадянства через тексти видатних дисидентів.
listening_situations:
- media_type: лекція
  setting: Виступ відомого українського соціолога про зміни в ідентичності українців після 2022 року.
  focus_points:
  - Трансформація цінностей від виживання до самореалізації
  - Нові форми соціальної довіри в українському суспільстві
  motivation: Аналіз сучасного соціологічного дискурсу на рівні C2.
writing_tasks:
- task_type: есе
  prompt: Напишіть аналітичне есе на тему 'Роль громадянського суспільства у зміцненні національної стійкості України'. Поєднайте
    історичні паралелі та сучасні приклади.
  requirements:
  - мінімум 700 слів
  - використання соціологічної термінології
  - аргументована авторська позиція
  motivation: Перевірка здатності до складного соціально-політичного аналізу.
  model_answer: Текст має містити чітку структуру, глибокий аналіз взаємодії держави та громади, приклади успішних громадських
    ініціатив та бути написаним мовою високого інтелектуального рівня.
discussion_topics:
- context: Чи може громадянське суспільство повністю замінити функції держави у кризові періоди?
  questions:
  - Які небезпеки та переваги несе надмірна активність громадського сектору?
  - Як змінюється поняття 'громадянина' у цифрову епоху?
  motivation: Дебати про майбутнє суспільного устрою та роль активізму.
activity_hints:
- type: reading
  focus: Прочитайте текст про громадянське суспільство в українському вимірі і дайте відповіді на запитання щодо ключових
    понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про права людини та соціальна справедливість, використовуючи нову лексику
    модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Громадянське суспільство в українському вимірі». Обґрунтуйте
    свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему громадянське суспільство в українському вимірі.
- type: comparative-study
  focus: 'Порівняйте різні підходи до громадянське суспільство в українському вимірі: Генезис та еволюція громадянського активізму:
    від громад до сучасних ГО. Визначте спільне та відмінне.'
