content_outline:
- section: 'Вступ: Громадянський дискурс на рівні С2 (Introduction: Civic Discourse at C2 Level)'
  words: 600
  points:
  - 'From basic civic vocabulary (B1-B2) to analytical discourse: the C2 learner engages with political and social
    topics through the lens of argument, critique, and evidence-based analysis.'
  - 'Overview of thematic territory: connecting State Standard themes 3.7 (Суспільні відносини) and 3.8 (Внутрішня
    політика) to real-world Ukrainian discourse contexts.'
  - 'Register expectations: navigating between академічний, публіцистичний, and розмовний registers when discussing
    societal issues.'
- section: Державний устрій і конституційна архітектура (State Structure and Constitutional Architecture)
  words: 800
  points:
  - 'Three branches of power: Верховна Рада (legislative), Кабінет Міністрів (executive), and судова система (judicial);
    constitutional checks and balances in the Ukrainian model.'
  - 'Electoral system: мажоритарна та пропорційна системи (majoritarian and proportional representation); voter rights,
    candidacy requirements, and the role of ЦВК (Central Election Commission).'
  - 'Constitutional reform debates: decentralization (децентралізація), pension reform (пенсійна реформа), land reform
    (земельна реформа) as ongoing political discourse topics.'
- section: Суспільні проблеми та нерівність (Societal Problems and Inequality)
  words: 800
  points:
  - 'Corruption (корупція) and lawlessness (безчинство) as systemic issues: anti-corruption institutions (НАБУ, НАЗК,
    САП), their mandates, and public discourse around their effectiveness.'
  - 'Crime, law enforcement (правоохоронні органи), and the justice system: analyzing media coverage of criminal cases
    and reform of the поліція and прокуратура.'
  - 'Poverty, social stratification, and regional inequality: using sociological data to discuss малозабезпечені
    групи населення and the effectiveness of social policy.'
- section: Ґендерна рівність і права меншин (Gender Equality and Minority Rights)
  words: 700
  points:
  - 'Gender equality (ґендерна рівність) in Ukrainian law and society: wage gaps, representation in politics and
    business, domestic violence legislation.'
  - 'Minority rights: мовні, національні, та соціальні меншини; legal frameworks, challenges, and integration
    policies in wartime and peacetime contexts.'
  - 'Youth subcultures and social movements (молодіжні субкультури та рухи): civic activism, volunteer movements,
    and the post-2014 transformation of Ukrainian civil society.'
- section: Війна, мир та демографічні процеси (War, Peace, and Demographic Processes)
  words: 700
  points:
  - 'War and peace as political discourse: analyzing parliamentary debates, presidential addresses, and diplomatic
    communications around conflict resolution.'
  - 'Demographic processes: population displacement (внутрішньо переміщені особи), emigration, aging population,
    and their impact on social policy and labor markets.'
  - 'Patriotism (патріотизм) in Ukrainian discourse: distinguishing healthy civic patriotism from nationalism;
    wartime solidarity and post-war social cohesion.'
- section: Дискусійні проблеми та громадянська участь (Controversial Issues and Civic Participation)
  words: 700
  points:
  - 'Controversial topics in Ukrainian public discourse: capital punishment debates, drug policy, religious
    influence on legislation, LGBTQ+ rights discourse.'
  - 'Civic participation mechanisms: петиції, громадські слухання, громадські організації; how citizens engage
    with government beyond elections.'
  - 'Social media as a civic space: analyzing online discourse around policy proposals, the role of opinion leaders,
    and echo chambers.'
- section: 'Практикум: Аналіз політичного дискурсу (Workshop: Political Discourse Analysis)'
  words: 700
  points:
  - 'Applied analysis: deconstructing a political speech or reform proposal using argumentation models from
    c2-022 (Practical Rhetoric).'
  - 'Debate exercise: constructing arguments for and against a specific reform (e.g., децентралізація) using
    evidence from sociological data and legal documents.'
  - 'Essay production: writing an analytical essay on a chosen societal problem, integrating evidence from
    multiple registers and source types.'
vocabulary_hints:
  required:
  - децентралізація (decentralization) — реформа децентралізації, процес децентралізації; key reform concept in
    post-2014 Ukraine
  - електоральний (electoral) — електоральна система, електоральний процес; academic political science register
  - правоохоронний (law enforcement) — правоохоронні органи, правоохоронна діяльність; institutional terminology
  - ґендерна рівність (gender equality) — принцип ґендерної рівності, забезпечення ґендерної рівності; human rights
    register
  - корупція (corruption) — протидія корупції, системна корупція; central societal problem term
  - демографічний (demographic) — демографічна криза, демографічні процеси; analytical sociology register
  - законодавчий (legislative) — законодавча гілка влади, законодавча ініціатива; constitutional terminology
  - патріотизм (patriotism) — громадянський патріотизм, виховання патріотизму; values discourse
  recommended:
  - безчинство (lawlessness/abuse) — посадове безчинство, боротьба з безчинством; legal register for systemic
    misconduct
  - правозахисний (human rights) — правозахисна організація, правозахисна діяльність; civil society register
  - субкультура (subculture) — молодіжна субкультура, контркультура; sociology terminology
  - реформування (reforming) — реформування системи, комплексне реформування; process-oriented governance term
  - внутрішньо переміщена особа (internally displaced person) — права внутрішньо переміщених осіб, реєстрація ВПО;
    wartime humanitarian terminology
