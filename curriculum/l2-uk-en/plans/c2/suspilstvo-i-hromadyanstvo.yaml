module: c2-066
level: C2
sequence: 66
slug: suspilstvo-i-hromadyanstvo
version: '2.0'
title: Суспільство і громадянство
subtitle: Society and Citizenship
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати структуру державного устрою України та функціонування трьох гілок влади з використанням відповідної
  академічної термінології
- Learner can critically discuss societal problems including corruption, crime, and inequality using nuanced argumentative
  discourse in Ukrainian
- Конструювати аргументоване есе на тему ґендерної рівності, прав меншин або реформ децентралізації з опорою на
  соціологічні дані
- Learner can analyze Ukrainian political speeches and reform proposals, identifying rhetorical strategies and evaluating
  policy arguments
