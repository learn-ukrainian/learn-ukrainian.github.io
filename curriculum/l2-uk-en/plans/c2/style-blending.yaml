vocabulary_hints:
  required:
  - гібридний (hybrid) — гібридний жанр, гібридна форма; висока частотність в академічному
    та медійному дискурсах
  - змішування (blending) — змішування стилів, змішування регістрів; базова лексема
    для опису стильової дифузії
  - науково-популярний (popular science) — науково-популярне видання, науково-популярна
    література; висока частотність у медіа
  - художньо-публіцистичний (literary-journalistic) — художньо-публіцистичний твір;
    специфічний термін для аналізу синтетичних жанрів
  - регістр (register) — мовний регістр, перемикання регістрів; низька частотність
    у побуті, але ключове поняття для рівня C2
  - сказ (skaz) — літературний сказ, манера сказу; вузькоспеціалізований термін для
    опису імітації усного мовлення
  - есей (essay) — критичний есей, філософський есей; часто вживається в академічному
    та літературному середовищах
  - доцільність (appropriateness) — комунікативна доцільність; ключовий критерій оцінки
    якості та доречності змішування стилів
  recommended:
  - белетристика (belles-lettres) — елементи белетристики; вживається при описі художньої
    журналістики
  - репортаж (reportage) — художній репортаж; популярний гібридний жанр сучасної української
    журналістики
  - контекстуалізація (contextualization) — контекстуалізація стилістичних засобів;
    важливий аналітичний процес
  - суржик (surzhyk) — стилістичне використання суржику; розгляд як інструменту стилізації,
    а не просто помилки
