module: style-blending
level: C2
sequence: 20
version: "1.0"
title: "Стильовий блендинг: мистецтво гібридних форм"
subtitle: "Style Blending: The Art of Hybrid Forms"
focus: integration
pedagogy: workshop
objectives:
  - "Досягти найвищого рівня майстерності у свідомому змішуванні функціональних стилів для створення оригінальних інтелектуальних продуктів"
  - "Навчитися керувати стильовими контрастами та дифузією регістрів як засобом поглиблення прагматичного впливу тексту"
  - "Дослідити явища жанрового синкретизму в сучасній українській літературі, журналістиці та цифровій комунікації"
  - "Сформувати цілісне бачення української мови як гнучкої системи, здатної до нескінченних стилістичних трансформацій"
content_outline:
  - section: "Феноменологія стильового змішування"
    words: 1000
    subsections:
      - "Від чистоти стилю до постмодерної еклектики: історичний огляд"
      - "Механізми стильового блендингу: вкраплення, дифузія, контраст"
      - "Функціональна доцільність змішування стилів у різних комунікативних ситуаціях"
    key_concepts:
      - "блендинг"
      - "дифузія"
      - "еклектика"
      - "синкретизм"
  - section: "Гібридні жанри в сучасному дискурсі"
    words: 1000
    subsections:
      - "Есеїстика як територія синтезу: поєднання науковості, публіцистичності та художньої образності"
      - "Документальна проза (non-fiction) та її художня трансформація (docufiction)"
      - "Блогосфера та соцмережі: народження нових стильових конгломератів"
    key_concepts:
      - "есеїстика"
      - "нон-фікшн"
      - "інфотейнмент"
      - "цифрова стилістика"
    primary_sources:
      - "Юрій Андрухович, 'Диявол знаходиться в деталях' (синтез стилів)"
      - "Тарас Прохасько, 'Бо так є' (філософсько-художній блендинг)"
  - section: "Стилістичний контраст як риторична стратегія"
    words: 1000
    subsections:
      - "Використання канцеляризмів у художньому тексті: від сатири до абсурду"
      - "Вкраплення наукової термінології в інтимну лірику або публічне звернення"
      - "Розмовна лексика в академічному середовищі: межі допустимого та ефект новизни"
    key_concepts:
      - "контраст"
      - "деканонізація"
      - "мовна гра"
      - "регістровий зсув"
  - section: "Стиль майбутнього: тенденції та прогнози"
    words: 1000
    subsections:
      - "Вплив візуальної культури на структуру та стиль вербального повідомлення"
      - "Персоналізація стилю в епоху масових комунікацій"
      - "Українська мова як простір стилістичної свободи та інновацій"
    key_concepts:
      - "персоналізація"
      - "інновація"
      - "креолізація"
      - "мовна свобода"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - comparative-study
    - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Есе"
    topic: "Стилістичний аналіз есеїстики Володимира Єрмоленка. Джерело: 'Плинні ідеології'."
    key_elements: ["філософський термін", "художній образ", "публіцистичний запал"]
    motivation: "Вивчення гармонійного синтезу трьох функціональних стилів."
  - source_type: "Художній текст"
    topic: "Змішування офіційного та розмовного стилів у прозі Артема Чеха. Джерело: 'Точка нуль'."
    key_elements: ["військовий сленг", "суха фактологія", "глибокий ліризм"]
    motivation: "Аналіз стильового блендингу в умовах екстремального досвіду."
listening_situations:
  - media_type: "подкаст"
    setting: "Дискусія між літературознавцем та ІТ-фахівцем про вплив коду на стиль мовлення."
    focus_points:
      - "Запозичення синтаксичних структур"
      - "Зміна лексичного наповнення"
    motivation: "Спостереження за процесами стильової дифузії в реальному часі."
writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть репортаж-есе про відвідини наукової лабораторії майбутнього. Вимоги: поєднати сувору наукову термінологію з вишуканими поетичними метафорами та елементами приватного щоденника."
    requirements: ["мінімум 600 слів", "використання щонайменше 10 термінів", "збереження цілісності образу при стильовому розмаїтті"]
    motivation: "Тренування складного стильового маневрування та синтезу."
    model_answer: "Текст має бути органічним цілим, де перехід від технічного опису приладу до філософського роздуму про життя відбувається плавно. Використання термінів має бути точним, а метафор — оригінальним."
discussion_topics:
  - context: "Чи веде тотальний стильовий блендинг до втрати культури мовлення та її примітивізації?"
    questions:
      - "Чи потрібні нам ще 'чисті' стилі?"
      - "Який стиль ви вважаєте найперспективнішим для української мови XXI століття?"
    motivation: "Підсумкова дискусія про майбутнє української стилістики."
