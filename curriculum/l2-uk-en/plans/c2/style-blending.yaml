content_outline:
- section: 'Вступ: феномен стильової дифузії (Introduction: Phenomenon of Style Diffusion)'
  words: 500
  points:
  - 'Теоретичне обґрунтування: чисті стилі як ідеальні моделі vs. реальна практика
    гібридизації; поняття стильової дифузії та інтерференції'
  - 'Вимоги Державного стандарту (§4.3.7): здатність до трансформації текстів між
    реєстрами як ключова компетенція рівня C2'
  - 'Комунікативна доцільність: коли змішування стилів є виправданим стратегічним
    вибором, а коли — свідченням низької мовної культури'
- section: Науково-популярний стиль — інтелектуальна популяризація (Popular Science
    Style — Intellectual Popularization)
  words: 750
  points:
  - 'Синтез наукової точності та розмовної доступності: аналіз успішних кейсів у сучасних
    медіа («Куншт», «Локальна історія»)'
  - 'Типова помилка: втрата наукової достовірності через надмірне спрощення термінології;
    методи збереження фактологічної глибини'
  - 'Інструментарій популяризатора: використання метафор, сторітелінгу та аналогій
    для пояснення складних концепцій'
- section: Художньо-публіцистичний синтез та сучасна есеїстика (Literary-Journalistic
    Synthesis and Modern Essayistics)
  words: 900
  points:
  - 'Майстри сучасної есеїстики: аналіз інтелектуального письма Оксани Забужко та
    Юрія Андруховича як взірців високого стильового змішування'
  - 'Історична ретроспектива: пристрасна публіцистика Миколи Хвильового («Розстріляне
    відродження») та елементи художнього памфлету'
  - 'Жанрові гібриди: есей, літературний репортаж та колонка — розмежування понять
    «нарис» та «есей» у сучасному контексті'
- section: Офіційно-публіцистичні гібриди в цифрову епоху (Official-Journalistic Hybrids
    in the Digital Era)
  words: 650
  points:
  - 'Демократизація державної комунікації: аналіз мови прес-релізів та соціальних
    мереж держорганів (кейс застосунку «Дія»)'
  - 'Learner Error (Register Clash): небезпека використання сленгу або надмірної емоційності
    в офіційних зверненнях; межа між близькістю до народу та бюрократичним етикетом'
  - 'Пом''якшення канцеляризмів: трансформація «сухої» мови документів у зрозумілу
    публічну комунікацію без втрати юридичної сили'
- section: 'Стилізація vs. Помилка: розмовно-художній регістр (Stylization vs. Error:
    Oral-Literary Register)'
  words: 600
  points:
  - 'Літературний прийом «сказ»: імітація усного мовлення, діалектизмів та просторіччя
    в художній прозі'
  - 'Критична диференціація: свідоме вживання суржику як засобу характеристики персонажа
    vs. несвідома помилка студента'
  - 'Аналіз авторського наміру: як контекст та цільова аудиторія визначають допустимість
    розмовних елементів у письмовій мові'
- section: 'Підсумок: стратегії міжстильової трансформації (Summary: Strategies of
    Inter-Stylistic Transformation)'
  words: 600
  points:
  - 'Практикум: трансформація фрагмента суто наукового тексту в науково-популярний
    допис для соціальних мереж'
  - 'Чек-лист для самоперевірки: оцінка балансу точності, емоційності та відповідності
    обраному гібридному регістру'
  - 'Ризики стильової еклектики: як уникнути перетворення тексту на хаотичне нагромадження
    несумісних мовних елементів'
