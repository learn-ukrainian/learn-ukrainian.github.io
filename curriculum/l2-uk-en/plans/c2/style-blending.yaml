module: c2-020
level: C2
sequence: 20
slug: style-blending
version: '2.0'
title: Змішування стилів і гібридні регістри
subtitle: 'Introduction: Phenomenon of Style Diffusion'
focus: stylistics
pedagogy: TTT
phase: C2.1 [Stylistics & Rhetoric]
word_target: 5000
objectives:
- Аналізувати стилістичні засоби в текстах різних функціональних стилів
- Продукувати тексти із свідомим використанням стилістичних фігур
- Розрізняти авторські стилістичні прийоми та оцінювати їхню ефективність
- Застосовувати знання з теми «Офіційно-публіцистичні гібриди в цифрову епоху» у власній мовній практиці
