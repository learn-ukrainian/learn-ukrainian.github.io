- name: Сучасна українська публіцистика
  url: https://ukrlib.com.ua/
  type: primary
  notes: Examples of style blending in contemporary journalism
content_outline:
- section: 'Вступ: феномен стильової дифузії (Introduction: Phenomenon of Style Diffusion)'
  words: 600
  points:
  - 'Теоретичне обґрунтування: чисті стилі як ідеальні моделі vs. реальна практика гібридизації; поняття стильової дифузії
    та інтерференції'
  - 'Вимоги Державного стандарту (§4.3.7): здатність до трансформації текстів між реєстрами як ключова компетенція рівня C2'
  - 'Комунікативна доцільність: коли змішування стилів є виправданим стратегічним вибором, а коли — свідченням низької мовної
    культури'
- section: Науково-популярний стиль — інтелектуальна популяризація (Popular Science Style — Intellectual Popularization)
  words: 950
  points:
  - 'Синтез наукової точності та розмовної доступності: аналіз успішних кейсів у сучасних медіа («Куншт», «Локальна історія»)'
  - 'Типова помилка: втрата наукової достовірності через надмірне спрощення термінології; методи збереження фактологічної
    глибини'
  - 'Інструментарій популяризатора: використання метафор, сторітелінгу та аналогій для пояснення складних концепцій'
- section: Художньо-публіцистичний синтез та сучасна есеїстика (Literary-Journalistic Synthesis and Modern Essayistics)
  words: 1100
  points:
  - 'Майстри сучасної есеїстики: аналіз інтелектуального письма Оксани Забужко та Юрія Андруховича як взірців високого стильового
    змішування'
  - 'Історична ретроспектива: пристрасна публіцистика Миколи Хвильового («Розстріляне відродження») та елементи художнього
    памфлету'
  - 'Жанрові гібриди: есей, літературний репортаж та колонка — розмежування понять «нарис» та «есей» у сучасному контексті'
- section: Офіційно-публіцистичні гібриди в цифрову епоху (Official-Journalistic Hybrids in the Digital Era)
  words: 800
  points:
  - 'Демократизація державної комунікації: аналіз мови прес-релізів та соціальних мереж держорганів (кейс застосунку «Дія»)'
  - 'Learner Error (Register Clash): небезпека використання сленгу або надмірної емоційності в офіційних зверненнях; межа
    між близькістю до народу та бюрократичним етикетом'
  - 'Пом''якшення канцеляризмів: трансформація «сухої» мови документів у зрозумілу публічну комунікацію без втрати юридичної
    сили'
- section: 'Стилізація vs. Помилка: розмовно-художній регістр (Stylization vs. Error: Oral-Literary Register)'
  words: 750
  points:
  - 'Літературний прийом «сказ»: імітація усного мовлення, діалектизмів та просторіччя в художній прозі'
  - 'Критична диференціація: свідоме вживання суржику як засобу характеристики персонажа vs. несвідома помилка студента'
  - 'Аналіз авторського наміру: як контекст та цільова аудиторія визначають допустимість розмовних елементів у письмовій мові'
- section: 'Підсумок: стратегії міжстильової трансформації (Summary: Strategies of Inter-Stylistic Transformation)'
  words: 800
  points:
  - 'Практикум: трансформація фрагмента суто наукового тексту в науково-популярний допис для соціальних мереж'
  - 'Чек-лист для самоперевірки: оцінка балансу точності, емоційності та відповідності обраному гібридному регістру'
  - 'Ризики стильової еклектики: як уникнути перетворення тексту на хаотичне нагромадження несумісних мовних елементів'
vocabulary_hints:
  required:
  - гібридний (hybrid) — гібридний жанр, гібридна форма; висока частотність в академічному та медійному дискурсах
  - змішування (blending) — змішування стилів, змішування регістрів; базова лексема для опису стильової дифузії
  - науково-популярний (popular science) — науково-популярне видання, науково-популярна література; висока частотність у медіа
  - художньо-публіцистичний (literary-journalistic) — художньо-публіцистичний твір; специфічний термін для аналізу синтетичних
    жанрів
  - регістр (register) — мовний регістр, перемикання регістрів; низька частотність у побуті, але ключове поняття для рівня
    C2
  - сказ (skaz) — літературний сказ, манера сказу; вузькоспеціалізований термін для опису імітації усного мовлення
  - есей (essay) — критичний есей, філософський есей; часто вживається в академічному та літературному середовищах
  - доцільність (appropriateness) — комунікативна доцільність; ключовий критерій оцінки якості та доречності змішування стилів
  recommended:
  - белетристика (belles-lettres) — елементи белетристики; вживається при описі художньої журналістики
  - репортаж (reportage) — художній репортаж; популярний гібридний жанр сучасної української журналістики
  - контекстуалізація (contextualization) — контекстуалізація стилістичних засобів; важливий аналітичний процес
  - суржик (surzhyk) — стилістичне використання суржику; розгляд як інструменту стилізації, а не просто помилки
