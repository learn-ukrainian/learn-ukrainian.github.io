vocabulary_hints:
  required:
  - проводити дослідження (to conduct research) — High-frequency academic collocation;
    avoid the literal translation 'робити'.
  - надійне джерело (reliable source) — Terminology for verification; avoid 'вірне'
    which implies loyalty.
  - академічна доброчесність (academic integrity) — Key policy term in modern Ukrainian
    education and professional research.
  - об'єкт дослідження (object of research) — The broad phenomenon or process under
    investigation.
  - предмет дослідження (subject of research) — The specific aspect or property of
    the object being analyzed.
  - висунути гіпотезу (to propose a hypothesis) — Standard academic collocation for
    the initial stage of research.
  - цитування (citation) — The system or process of referencing; use 'правила цитування'
    (not 'правила цитати').
  recommended:
  - верифікація (verification) — Process of checking data for accuracy and authenticity.
  - валідність (validity) — Degree to which a research method accurately measures
    what it is intended to measure.
  - дійти висновку (to reach a conclusion) — Preferred academic phrase over the literal
    'прийти до висновку'.
  - першоджерело (primary source) — Original material that provides direct evidence
    or first-hand testimony.
  - спростувати (to refute/disprove) — To prove a statement or hypothesis to be wrong
    or false.
