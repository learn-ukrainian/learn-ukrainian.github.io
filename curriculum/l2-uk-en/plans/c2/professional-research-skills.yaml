content_outline:
- section: Вступ — Дослідницькі компетенції (Introduction — Research Competencies)
  words: 650
  points:
  - Роль дослідження в професійній діяльності та вимоги Державного стандарту (§4.3.1.1)
    щодо володіння науковим стилем.
  - 'Колокаційна точність: виправлення типової кальки «робити дослідження» на нормативне
    «проводити дослідження».'
  - 'Культурний контекст: Національна бібліотека України імені В. І. Вернадського
    (НБУВ) як центральний осередок наукової інформації.'
- section: Пошук та оцінка джерел (Source Search and Evaluation)
  words: 1100
  points:
  - Цифрові архіви та сучасні вимоги до публікацій у Scopus/Web of Science для українських
    дослідників.
  - 'Критерії достовірності: розрізнення «надійного/достовірного джерела» та лексичної
    помилки «вірне джерело» (loyal source).'
  - 'Первинні vs. вторинні тексти: робота з рефератами та повідомленнями згідно з
    вимогами §4.3.8.'
  - 'Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами'
- section: Методологія та методи збору даних (Methodology and Data Collection)
  words: 1100
  points:
  - 'Методологічні засади: подолання труднощів у розрізненні «об''єкта» (явище) та
    «предмета» (конкретний аспект) дослідження.'
  - 'Робота з гіпотезами: вживання академічних кліше «висунути гіпотезу», «підтвердити»
    або «спростувати» результати.'
  - Огляд літератури (literature review) як інструмент критичного опрацювання наукового
    дискурсу.
  - 'Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами'
- section: Аналіз та синтез інформації (Analysis and Synthesis)
  words: 1100
  points:
  - 'Систематизація даних: перехід від описовості до критичного аналізу та виявлення
    закономірностей.'
  - 'Формулювання результатів: використання конструкції «дійти висновку» як стилістично
    виправданої альтернативи.'
  - Синтез багатомовних джерел та інтеграція українського наукового контексту в міжнародний
    простір.
- section: Презентація та академічна доброчесність (Presentation and Academic Integrity)
  words: 1050
  points:
  - 'Культура цитування: обов''язкове дотримання стандарту ДСТУ 8302:2015 для оформлення
    бібліографії в Україні.'
  - 'Академічна доброчесність: рух за етичні стандарти в українській науці після 2014
    року та боротьба з плагіатом.'
  - 'Термінологічний нюанс: розрізнення «цитати» (текстовий фрагмент) та «цитування»
    (процес або правила оформлення посилань).'
