module: professional-research-skills
level: C2
sequence: 57
version: "1.0"
title: "Дослідницькі навички: Методологія пошуку та аналізу професійної інформації"
subtitle: "Research Skills: Methodology for Searching and Analyzing Professional Information"
focus: professional
pedagogy: workshop
objectives:
  - "Опанувати передові методи наукового та професійного пошуку в українському та світовому інформаційному просторі"
  - "Навчитися критично оцінювати валідність, надійність та упередженість джерел інформації"
  - "Розвинути навички синтезу великих масивів даних для створення аналітичних оглядів та прогнозів"
  - "Вдосконалити використання цифрових інструментів та корпусних ресурсів для фахових досліджень"
content_outline:
  - section: "Стратегії ефективного пошуку та відбору інформації"
    words: 1000
    subsections:
      - "Побудова пошукових запитів: використання логічних операторів та фахових тезаурусів"
      - "Огляд наукових баз даних (Scopus, Web of Science) та відкритих українських репозиторіїв"
      - "Алгоритм первинної верифікації джерел: перевірка авторитетності, актуальності та цитованості"
    key_concepts:
      - "інформаційний пошук"
      - "тезаурус"
      - "репозиторій"
      - "верифікація джерела"
    primary_sources:
      - "Дмитро Яворницький, 'Історія запорозьких козаків' (аналіз методів роботи з історичними джерелами)"
  - section: "Критичний аналіз та інтерпретація професійного контенту"
    words: 1000
    subsections:
      - "Виявлення прихованих упереджень (bias) та маніпулятивних технік у професійних текстах"
      - "Методика порівняльного аналізу декількох джерел з одного питання: пошук розбіжностей та консенсусу"
      - "Контент-аналіз та дискурс-аналіз як інструменти дослідника"
    key_concepts:
      - "критичне мислення"
      - "інтерпретація"
      - "когнітивне викривлення"
      - "дискурс-аналіз"
  - section: "Корпусні інструменти та цифрова гуманітаристика"
    words: 1000
    subsections:
      - "Робота з великими текстовими корпусами (ГРАК) для дослідження еволюції понять"
      - "Статистичне оброблення лінгвістичних даних: частотність, конкорданси, колокації"
      - "Візуалізація результатів дослідження: від хмар тегів до складних інфографік"
    key_concepts:
      - "корпусна лінгвістика"
      - "цифрова гуманітаристика"
      - "конкорданс"
      - "візуалізація даних"
    primary_sources:
      - "Матеріали Генерального регіонального анотованого корпусу української мови (ГРАК) - аналіз прикладів"
  - section: "Синтез результатів та написання літературного огляду"
    words: 1000
    subsections:
      - "Структурування огляду літератури: тематичний, хронологічний та методологічний підходи"
      - "Мовні засоби для порівняння ідей різних авторів: від цитування до парафразу"
      - "Формулювання висновків та гіпотез на основі проведеного аналізу"
    key_concepts:
      - "синтез"
      - "огляд літератури"
      - "наукова гіпотеза"
      - "авторський внесок"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Історичне дослідження"
    topic: "Аналіз методів джерелознавства у працях Дмитра Яворницького. Вивчення способів опису та інтерпретації фактів."
    key_elements: ["архівні матеріали", "польові дослідження", "об'єктивність викладу"]
    motivation: "Вивчення класичної методології українського наукового пошуку."
  - source_type: "Корпусний звіт"
    topic: "Аналіз результатів запиту в ГРАК щодо зміни значення терміна 'влада' або 'громада' протягом XX-XXI ст."
    key_elements: ["діахронічний аналіз", "контекстуальне значення", "частотний розподіл"]
    motivation: "Опанування сучасних цифрових методів семантичного аналізу."
listening_situations:
  - media_type: "відео"
    setting: "Вебінар бібліотеки НаУКМА про використання міжнародних наукометричних баз даних для українських дослідників."
    focus_points:
      - "Стратегії пошуку за ключовими словами"
      - "Інструменти автоматизації бібліографії (Zotero, Mendeley)"
    motivation: "Розвиток практичних навичок роботи з академічною інформацією."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть критичний огляд трьох наукових або аналітичних статей за вашою спеціальністю, опублікованих в Україні за останні 2 роки. Порівняйте їхні методологічні підходи та висновки."
    requirements: ["мінімум 800 слів", "використання академічного стилю", "обґрунтована власна позиція"]
    motivation: "Перевірка здатності до синтезу та критичного аналізу професійного контенту."
    model_answer: "Текст має демонструвати вміння автора структурувати огляд, виділяти головні тези та критично оцінювати аргументацію колег. Мова має бути бездоганною науковою українською."
discussion_topics:
  - context: "Чи може штучний інтелект повністю замінити людину-дослідника на етапі збору та аналізу інформації?"
    questions:
      - "Які етичні виклики виникають при використанні ШІ у науковому пошуку?"
      - "Як зберегти критичне мислення в умовах інформаційного перенасичення?"
    motivation: "Обговорення майбутнього дослідницької діяльності в цифрову епоху."
