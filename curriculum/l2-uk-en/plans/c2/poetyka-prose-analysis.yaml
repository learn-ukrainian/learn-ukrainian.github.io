vocabulary_hints:
  required:
  - 'поетика (poetics) — висока частотність; колок.: історична поетика, поетика твору,
    нормативна поетика'
  - 'наратив (narrative) — висока частотність; колок.: наративна стратегія, зміна
    наративу, ненадійний наратор'
  - 'хронотоп (chronotope) — середня частотність; вживається у значенні ''часопростір'';
    колок.: хронотоп дороги, замкнутий хронотоп'
  - 'фокалізація (focalization) — низька частотність (термін); колок.: внутрішня фокалізація,
    зміна фокалізації'
  recommended:
  - 'архітектоніка (architectonics) — середня частотність; колок.: архітектоніка роману,
    складна архітектоніка'
  - сказ (skaz) — специфічна форма оповіді, орієнтована на усне мовлення
  - сюжет vs фабула (plot vs fabula) — розрізнення художньої конструкції (сюжет) та
    хронології подій (фабула)
  - 'психологізм (psychologism) — колок.: глибокий психологізм, індивідуальний психологізм,
    пейзаж душі'
