content_outline:
- section: Вступ — Поетика та стилістика (Introduction — Poetics and Stylistics)
  words: 500
  points:
  - Визначення поетики як науки про систему художніх засобів у прозі відповідно до
    Державного стандарту §4.3.1.1 (художній стиль)
  - 'Внутрішня форма слова за Олександром Потебнею: зв''язок між лінгвістичною структурою
    та художнім образом'
  - 'Специфіка прозового слова: поліфонія та діалогізм за Михайлом Бахтіним як база
    аналізу на рівні С2'
- section: Суб'єктна організація твору (Subject Organization of the Work)
  words: 600
  points:
  - 'Ієрархія голосів у тексті: розмежування реального автора, образу автора та наратора
    (оповідача)'
  - 'Типові помилки: ототожнення думок персонажа з авторською позицією (аналіз на
    прикладі новели Хвильового «Я (Романтика)»)'
  - Поняття фокалізації (нульова, внутрішня, зовнішня) як інструмент визначення ракурсу
    оповіді
- section: 'Структура твору: Сюжет та композиція (Work Structure: Plot and Composition)'
  words: 700
  points:
  - 'Сюжет vs. Фабула: аналіз художньої конструкції подій порівняно з їх хронологічною
    послідовністю (корекція лексичної плутанини)'
  - 'Архітектоніка роману: гармонійна побудова великих форм та функції вставних конструкцій'
  - 'Кінематографічність прози та монтажна композиція: аналіз тексту О. Довженка «Зачарована
    Десна»'
  - 'Орнаментальна проза: дослідження ритміки та музичності тексту в українському
    модернізмі'
- section: Хронотоп та психологізм (Chronotope and Psychologism)
  words: 600
  points:
  - 'Бахтінське поняття хронотопу: типи часопростору (дороги, замку, ідилії) в українській
    класиці'
  - 'Психологізм та «пейзаж душі»: аналіз імпресіоністичної поетики в новелі М. Коцюбинського
    «Intermezzo»'
  - Використання стилістичних засобів (§4.3.3) — метафор, епітетів та перифраз — для
    творення психологічного портрета героя
- section: Форми оповіді та аналітичний синтез (Narrative Forms and Analytical Synthesis)
  words: 600
  points:
  - Сказ (skaz) як специфічна форма нарації, орієнтована на усне мовлення (на прикладах
    творів Квітки-Основ'яненка)
  - 'Від описового переказу до структурного аналізу: методологія дослідження «як зроблено»
    текст'
  - 'Практикум: створення вторинного аналітичного тексту (реферату чи повідомлення)
    за Державним стандартом §4.3.8'
