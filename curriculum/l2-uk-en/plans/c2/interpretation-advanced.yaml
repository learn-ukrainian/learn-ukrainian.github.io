content_outline:
- section: Вступ — Усний переклад як професія (Introduction — Interpretation as a
    Profession)
  words: 750
  points:
  - 'Професійний ландшафт: Зростання попиту на українських перекладачів у міжнародних
    організаціях (НАТО, ЄС, ООН) після 2022 року та роль прискорених програм AIIC.'
  - 'Термінологічна точність: Чітке розмежування понять «усний переклад» та «інтерпретація»
    (тлумачення); усунення кальки з англійської мови у фаховому контексті.'
  - 'Відповідність Стандарту §1.4.1.1.1: Формування вміння невимушено виступати в
    офіційних ситуаціях, адаптуючи регістр мовлення до різних аудиторій.'
- section: Методологія та когнітивні моделі (Methodology and Cognitive Models)
  words: 1050
  points:
  - 'Когнітивне навантаження: Аналіз Моделі зусиль Даніеля Жіля (Gile''s Effort Model)
    — розподіл уваги між слуханням, пам''яттю та відтворенням.'
  - 'Сучасна методологія: Перехід від радянських підходів (Г. Чернов) до провідних
    європейських стандартів підготовки конференц-перекладачів.'
  - 'Техніка відставання (décalage): Відпрацювання оптимального часового проміжку
    в синхронному перекладі для мінімізації смислових помилок (Learner Error 3).'
- section: Техніка послідовного перекладу та нотація (Consecutive Interpretation and
    Note-taking)
  words: 1100
  points:
  - 'Система нотації: Застосування принципів Жана-Франсуа Розана; розробка індивідуальних
    символів та стратегій скорочення для фіксації ключових змістових блоків.'
  - 'Робота з текстом: Використання елементів риторики в композиції перекладу згідно
    зі Стандартом §4.3.5 для забезпечення логічності та переконливості.'
  - 'Розвиток робочої пам''яті: Вправи на розширення ємності пам''яті для точного
    відтворення складних наукових та офіційних текстів (§3.13).'
- section: Синхронний переклад та професійне середовище (Simultaneous Interpretation
    and Professional Environment)
  words: 1000
  points:
  - 'Професійне середовище: Технічні вимоги до кабіни перекладача (ISO 2603) та етика
    взаємодії з напарником під час зміни.'
  - 'Спеціалізовані режими: Особливості релейного перекладу (relay), роботи на мову
    Б (retour) та специфіка перекладу шепотінням (chuchotage).'
  - 'Shadowing та парафразування: Використання технік тіньового повторення та швидкого
    перефразування для подолання екстремального темпу мовлення.'
- section: Етика, корекція та практична адаптація (Ethics, Correction, and Practical
    Adaptation)
  words: 1100
  points:
  - 'Стратегії корекції: Використання прихованих методів виправлення помилок та полегшення
    вислову, щоб співрозмовники їх не зауважили (§1.4.1.1.1).'
  - 'Подолання інтерференції: Робота з «активаційними блоками» для заміни лексичних
    кальок на питомі українські конструкції та фразеологічне багатство.'
  - 'Професійна етика та переговори: Дотримання конфіденційності та нейтральності
    під час укладання ділових угод і контрактів (§3.13).'
