module: c2-098
level: C2
sequence: 98
version: 1.2.2
title: 'Поглиблене усне перекладання: Послідовний та синхронний методи'
subtitle: 'Просунутий переклад: послідовний і синхронний'
focus: professional
pedagogy: workshop
objectives:
- Опанувати техніку послідовного перекладу з використанням системи скорописного 
  запису
- Навчитися виконувати синхронний переклад у кабіні, дотримуючись часових рамок 
  та темпу мовлення
- Розвинути навички швидкого перемикання між мовними кодами та управління 
  когнітивним ресурсом
- Засвоїти етичні норми та професійні стандарти роботи усного перекладача (AIIC)
content_outline:
- section: Психолінгвістичні основи усного перекладу
  words: 1250
  subsections:
  - Механізми короткочасної пам'яті та прогнозування в усному перекладі
  - 'Управління увагою: розподіл ресурсу між слуханням, аналізом та мовленням'
  - Стресостійкість та подолання мовних перешкод у реальному часі
  key_concepts:
  - антиципація
  - когнітивне навантаження
  - лінгвістична компресія
  - тінь (shadowing)
  primary_sources:
  - Професійний кодекс AIIC (International Association of Conference 
    Interpreters)
- section: Послідовний переклад та перекладацький скоропис
  words: 1250
  subsections:
  - 'Символізація та логічна структура записів: як не втратити нитку розмови'
  - 'Переклад промов тривалістю до 5 хвилин: точність та повнота передачі'
  - 'Публічний виступ перекладача: дикція, постава та контакт з аудиторією'
  key_concepts:
  - нотатки (note-taking)
  - семантичний аналіз
  - інтонаційне маркування
  - прецизійна лексика
  primary_sources:
  - Практичні посібники з перекладацького скоропису українських авторів 
    (наприклад, О. Чередниченко)
- section: 'Синхронний переклад: техніка та стратегії'
  words: 1250
  subsections:
  - 'Робота в парі: етикет у кабіні та механізми взаємодопомоги'
  - 'Технічне забезпечення синхрону: мікрофони, пульти, гарнітури'
  - Швидка лексична підстановка та спрощення складних синтаксичних конструкцій
  key_concepts:
  - декаляж (lag time)
  - парафраза
  - мікро-реферування
  - кабінна етика
  primary_sources:
  - Регламенти міжнародних організацій щодо усного перекладу (ЄС, ООН)
- section: Спеціалізовані види усного перекладу
  words: 1250
  subsections:
  - 'Телефонний та відео-переклад (VRI): особливості дистанційної роботи'
  - 'Переклад ''шушутаж'' (whispering): техніка та фізичне навантаження'
  - 'Судовий та медичний усний переклад: юридична відповідальність за помилку'
  key_concepts:
  - шушутаж
  - VRI (Video Remote Interpreting)
  - комунальний переклад
  - конфіденційність
  primary_sources:
  - Закон України 'Про судоустрій і статус суддів' (фрагменти про участь 
    перекладача)
- section: Підсумок — Summary
  words: 300
  points:
  - "Consecutive interpretation relies on efficient note-taking (скоропис) and managing
    cognitive load: anticipation (антиципація), compression (компресія), and shadowing
    (тінь). Self-check: Describe 3 techniques for handling precision vocabulary (прецизійна
    лексика) during a speech. What's the difference between note-taking and regular
    dictation?"
  - 'Simultaneous interpretation demands strict lag time (декаляж) management and
    adherence to booth etiquette (кабінна етика). Specialized forms include whispering
    (шушутаж) and VRI. Self-check: What is the difference between consecutive and
    simultaneous interpretation? Name 3 ethical standards required by the AIIC professional
    code.'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - error-correction
  - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: методична інструкція
  topic: Методика створення індивідуальної системи знаків для перекладацького 
    скоропису.
  key_elements:
  - вертикалізм
  - ступінчастість
  - символізм
  motivation: Навчання структуруванню інформації для тривалої фіксації в 
    пам'яті.
- source_type: етичний кодекс
  topic: Межі нейтральності усного перекладача при роботі в конфліктних 
    ситуаціях.
  key_elements:
  - безсторонність
  - точність
  - нерозголошення
  motivation: Формування професійної ідентичності та етичного стрижня.
listening_situations:
- media_type: лекція
  setting: Запис промови на економічному форумі для тренування синхронного 
    перекладу.
  focus_points:
  - Статистичні дані та цифри
  - Термінологія інвестицій
  motivation: Відпрацювання швидкості реакції та точності передачі числових 
    показників.
writing_tasks:
- task_type: репортаж
  prompt: Опишіть свій досвід проходження вправи 'shadowing' (тіньове 
    повторення) протягом 10 хвилин. Які труднощі виникли? Як ви справлялися з 
    відставанням від спікера?
  requirements:
  - аналіз когнітивного навантаження
  - опис стратегій подолання пауз
  - 300-400 слів
  motivation: Рефлексія над власним прогресом у техніці синхрону.
  model_answer: Текст має містити самоаналіз помилок, опис фізичного стану під 
    час вправи та плани щодо вдосконалення дикції.
discussion_topics:
- context: Чи замінять системи автоматичного розпізнавання мовлення усних 
    перекладачів на конференціях?
  questions:
  - Чому емпатія та розуміння контексту критично важливі для перекладача?
  - У яких сферах ШІ ніколи не замінить людину-перекладача?
  motivation: Обговорення стратегічного майбутнього професії.
activity_hints:
- type: reading
  focus: Прочитайте текст про психолінгвістичні основи усного перекладу і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про послідовний переклад та 
    перекладацький скоропис, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Психолінгвістичні 
    основи усного перекладу». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    психолінгвістичні основи усного перекладу.
- type: comparative-study
  focus: 'Порівняйте різні підходи до психолінгвістичні основи усного перекладу: Механізми
    короткочасної пам''яті та прогнозування в усному перекладі. Визначте спільне та
    відмінне.'
references:
- 'Державний стандарт 2024: C2 — професійні компетенції, усний переклад'
- 'University-level: теорія та практика усного перекладу (Чередниченко)'
- Глазова, 11 клас (2019), §21-25 — Синтаксична норма (для спрощення 
  конструкцій)
