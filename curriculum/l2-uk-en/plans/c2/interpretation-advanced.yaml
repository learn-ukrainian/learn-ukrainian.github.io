vocabulary_hints:
  required:
  - усний переклад (interpretation) — усний переклад з аркуша, послідовний/синхронний
    переклад; фаховий термін, уникати вживання «інтерпретація»
  - послідовний переклад (consecutive interpretation) — виконувати послідовний переклад
    виступу; основний режим для офіційних зустрічей
  - синхронний переклад (simultaneous interpretation) — кабінний синхронний переклад;
    вимагає спеціального обладнання
  - нотація (note-taking/notation) — система нотації, символи нотації, нотаційні скорочення;
    за Розаном
  - відставання (décalage) — часове відставання, оптимальне відставання; ключовий
    показник у синхронному перекладі
  - когнітивне навантаження (cognitive load) — розподіл когнітивного навантаження;
    центральне поняття моделі Жіля
  recommended:
  - робоча пам'ять (working memory) — ємність робочої пам'яті, розширення пам'яті;
    психолінгвістичний контекст
  - парафразування (paraphrasing) — техніка парафразування; стратегія спрощення складних
    структур
  - кабіна перекладача (interpreter booth) — ізольована кабіна, вимоги стандарту ISO
    2603
  - релейний переклад (relay interpretation) — перекладати через ретрансляцію; коли
    немає прямої пари мов
  - ретур (retour/B language) — перекладач з ретуром, працювати на ретур; переклад
    на іноземну мову
  - модель зусиль (effort model) — три зусилля за моделлю Жіля; методологічна база
