content_outline:
- section: 'Вступ: Огляд компетенцій C2.1 (Introduction: C2.1 Competency Overview)'
  words: 400
  points:
  - Аналіз критеріїв оцінювання стилістичної компетентності згідно з Державним стандартом
    (§4.3.7) та CEFR C2.
  - 'Філософія свідомого вибору: перехід від інтуїтивного володіння мовою до експертної
    маніпуляції мовними регістрами.'
  - 'Структура фінальної перевірки: від аналізу чужих текстів до створення власного
    портфоліо.'
- section: Портфоліо семи стилів та ідеал досконалості (Portfolio of Seven Styles
    and the Ideal of Perfection)
  words: 700
  points:
  - 'Практичний огляд 7 стилів української мови за Стандартом (§4.3.1.1): від офіційного
    до релігійного та епістолярного.'
  - 'Культурний еталон: Київські неокласики (Зеров, Рильський) як символ виваженого
    «високого штилю» та боротьби з примітивізмом.'
  - 'Вимоги до зразків портфоліо: дотримання жанрових канонів у наукових статтях,
    договорах та публіцистичних колонках.'
  - 'Аналіз релігійного стилю: робота з сакральними текстами як вищий рівень стилістичної
    майстерності.'
- section: Трансформаційні стратегії та досвід «Енеїди» (Transformational Strategies
    and the 'Eneida' Experience)
  words: 700
  points:
  - Іван Котляревський та «Енеїда» як історичний прецедент радикальної стилістичної
    трансформації з високого у низький регістр.
  - 'Алгоритм трансформації тексту згідно з вимогою Стандарту: науковий → науково-популярний
    (спрощення без втрати точності).'
  - 'Трансформація офіційно-ділового повідомлення у публіцистичний пост для соцмереж:
    збереження інформативності при зміні тональності.'
  - 'Вправа: три рівні стилістичної адаптації одного сюжету для різних аудиторій.'
- section: 'Стилістична гігієна: Помилки та канцеляризми (Stylistic Hygiene: Errors
    and Officialese)'
  words: 600
  points:
  - 'Learner error: Невідповідність регістру — використання сленгу в академічних роботах
    та книжних кліше у побутовому діалозі.'
  - 'Боротьба з канцеляризмами: деконструкція штампів («дане питання», «згідно з»,
    «на сьогоднішній день») у художньому та розмовному мовленні.'
  - 'Декалькація синтаксису: заміна англійських пасивних структур («було зроблено»)
    на природні українські активні конструкції («ми зробили»).'
  - 'Дриль на розпізнавання: 10 прикладів стилістичного дисонансу з вимогою відредагувати
    текст під заданий контекст.'
- section: Творчий синтез та усна імпровізація (Creative Synthesis and Oral Improvisation)
  words: 600
  points:
  - 'Демонстрація особистого «авторського голосу»: написання фінального есе з використанням
    засобів синтаксичної стилістики (інверсія, паралелізм).'
  - 'Усна перевірка: швидке переключення регістрів (code-switching) в імпровізованих
    ситуаціях.'
  - 'Обґрунтування стилістичних рішень: самоаналіз використаних тропів (метафор, метонімій)
    та ритмомелодики тексту.'
  - Підбиття підсумків C2.1 та огляд наступної фази літературної майстерності (C2.2).
