vocabulary_hints:
  required:
  - досконалість (perfection) — прагнути досконалості, вершина досконалості, стилістична
    досконалість
  - майстерність (mastery) — літературна майстерність, відточувати майстерність, професійна
    майстерність
  - трансформація (transformation) — стилістична трансформація, зазнати трансформації,
    докорінна трансформація
  - регістр (register) — перемикання регістрів, високий/низький регістр, мовний регістр
  - канцеляризм (officialese/chancelleryism) — уникати канцеляризмів, нагромадження
    канцеляризмів, сухий канцеляризм
  - обґрунтування (justification) — логічне обґрунтування, надати обґрунтування вибору
  recommended:
  - еталон (benchmark/standard) — служити еталоном, еталон стилю
  - штамп (cliché) — мовний штамп, позбутися стилістичних штампів
  - дисонанс (dissonance) — стилістичний дисонанс, викликати відчуття дисонансу
  - консолідація (consolidation) — консолідація знань, консолідація стилістичних навичок
  - індивідуальний голос (individual voice) — виробити власний індивідуальний голос
    у письмі
