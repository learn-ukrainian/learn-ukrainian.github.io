content_outline:
- section: Вступ — Структура та контекст фінального екзамену (Introduction — Exam Structure and Context)
  words: 750
  points:
  - Огляд компонентів екзамену відповідно до Держстандарту 2024 (§1.1–1.4) та критеріїв вільного володіння другого ступеня
    (С2).
  - 'Культурний контекст: еволюція системи тестування в Україні від ЗНО до НМТ та роль сертифікації НАЯО для діаспори та міжнародного
    визнання.'
  - Стратегії підготовки до 'тематично необмеженого' спілкування та використання максимально можливого діапазону виражальних
    засобів (§4.3.6).
- section: 'Компонент I та II — Рецептивні навички: Аудіювання та Читання (Component I and II — Receptive Skills: Listening
    and Reading)'
  words: 1000
  points:
  - 'Слухання (§1.1): стратегії сприйняття швидкого мовлення в складних акустичних умовах, розуміння діалектів та ідіоматики
    в лекціях та медіа.'
  - 'Читання (§1.2): поглиблений аналіз неадаптованих текстів, розпізнавання іронії, алюзій та прихованих символів (implicit
    meaning).'
  - Типові пастки в тестових завданнях С2 та методи критичного оцінювання наукових і публіцистичних джерел.
- section: Компонент III — Продуктивне письмо та трансформація стилів (Component III — Productive Writing and Style Transformation)
  words: 1100
  points:
  - Вимоги до створення складних структурованих текстів та вторинних текстів (анотація, реферат, рецензія) згідно з §4.3.8.
  - Трансформація текстів між функційними стилями (§4.3.7) та підтримка академічного дискурсу без стилістичних дисонансів.
  - 'Аналіз рубрик оцінювання: розмежування змісту, мовної точності та стилю; уникнення кальок типу ''оціночна сітка''.'
  - 'Корекція типових помилок: розрізнення понять ''оцінювання'' (процес) та ''оцінка'' (результат) в академічному контексті.'
- section: 'Компонент IV — Говоріння: Спонтанність та фразеологічне багатство (Component IV — Speaking: Spontaneity and Phraseological
    Richness)'
  words: 900
  points:
  - Спонтанний монолог та діалог (12–15 реплік) на абстрактні теми з використанням відтінків змісту та алюзій (§1.4).
  - Адаптація мовлення до різних аудиторій та використання модальних маркерів (hedging) для вираження складної аргументації.
  - 'Специфіка вживання дієслів ''складати'' vs ''здати'' екзамен: аспектні нюанси та стилістична доречність у формальному
    реєстрі.'
- section: Пробний екзамен — Повна симуляція та оцінювання (Mock Exam — Full Simulation and Assessment)
  words: 1250
  points:
  - Комплексна симуляція повного циклу екзамену (3-4 години) з інтеграцією всіх видів мовленнєвої діяльності згідно з вимогами
    Рівня С2.
  - 'Самооцінювання за офіційними рубриками НАЯО: аналіз результатів та ідентифікація зон для фінального вдосконалення.'
  - Поріг проходження (passing threshold) та інтерпретація балів у межах Європейської рамки кваліфікацій (CEFR).
vocabulary_hints:
  required:
  - екзамен (exam) — складати/здати екзамен; вживання perfective 'скласти' у формальному контексті результату.
  - оцінювання (assessment) — процес оцінювання; відрізняти від результативної 'оцінки' (grade/mark).
  - критерії (criteria) — критерії оцінювання С2; відповідати встановленим стандартам Держстандарту.
  - рубрика (rubric) — аналітична/оціночна рубрика; уникати кальки 'оціночна сітка'.
  - бал (score/grade) — набрати прохідний бал; максимальна кількість балів за компонент.
  - аудіювання (listening) — навички аудіювання; сприйняття мовлення за складних умов (§1.1).
  - говоріння (speaking) — усна частина іспиту; спонтанна взаємодія та 12-15 реплік у діалозі (§1.4).
  - письмо (writing) — письмова продукція; створення вторинних текстів (реферат, анотація, доповідь).
  - читання (reading) — розуміння імпліцитного змісту; аналіз алюзій та іронії в неадаптованих текстах.
  recommended:
  - валідність (validity) — валідність тесту; забезпечення відповідності інструменту оцінювання цілям вимірювання.
  - надійність (reliability) — внутрішня надійність оцінювання та стабільність результатів тесту.
  - зворотний вплив (washback effect) — позитивний зворотний вплив тестування на навчальний процес.
  - дискурс (discourse) — академічний/публіцистичний дискурс; створення текстів у відповідному функційному стилі.
  - флуентність (fluency) — флуентність мовлення; невимушене висловлення думок без невиправданих пауз.
  - концепція (concept) — концептуальна цілісність відповіді та дотримання методології аналізу.
  - синтез (synthesis) — здатність до синтезу інформації з різних джерел у письмових роботах високого рівня.
