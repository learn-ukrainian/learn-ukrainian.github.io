module: c2-108
level: C2
sequence: 108
version: '1.1'
title: 'Фінальний іспит: Комплексна перевірка мовної майстерності'
subtitle: 'Фінальний екзамен: інтегровані навички'
focus: checkpoint
pedagogy: workshop
objectives:
  - Продемонструвати вільне володіння українською мовою в усіх видах мовленнєвої
    діяльності (C2)
  - Показати здатність до глибокого аналізу та інтерпретації складних 
    автентичних текстів
  - Підтвердити навички аргументованого письма та публічного виступу на 
    професійні теми
  - Засвідчити високий рівень соціокультурної компетенції та лінгвістичної 
    точності
content_outline:
  - section: Читання та критичний аналіз
    words: 1000
    subsections:
      - 'Аналіз наукових та філософських текстів: виявлення прихованих змістів та
        імпліцитної інформації'
      - 'Порівняння різних точок зору на одну проблему: синтез інформації з декількох
        джерел'
      - Робота зі складними стилістичними прийомами та термінологією
    key_concepts:
      - імпліцитний зміст
      - синтез
      - критичне мислення
      - дискурс-аналіз
    primary_sources:
      - Тексти для аналізу (наукові статті, есеїстика, офіційні документи)
  - section: Аудіювання та аналіз почутого
    words: 1000
    subsections:
      - Сприйняття швидкого мовлення з різними акцентами та фоновим шумом
      - 'Виявлення ставлення та намірів мовця: іронія, скепсис, переконання'
      - Конспектування ключових тез лекцій та дискусій
    key_concepts:
      - аудіовізуальне сприйняття
      - мовна інтенція
      - селективне слухання
      - нотування
    primary_sources:
      - Аудіозаписи дискусій, інтерв'ю та публічних виступів
  - section: Професійне та творче письмо
    words: 1000
    subsections:
      - Написання розлогого аргументаційного есе на складну соціальну чи 
        філософську тему
      - Підготовка аналітичного звіту або офіційного листа-відповіді з високим 
        ступенем ввічливості
      - Стилістичне редагування та трансформація запропонованого тексту
    key_concepts:
      - аргументативне есе
      - офіційна кореспонденція
      - редагування
      - когерентність
    primary_sources:
      - Зразки тем для творчих робіт рівня C2
  - section: Усне мовлення та дискусія
    words: 1000
    subsections:
      - Монологічне висловлювання на задану тему без тривалої підготовки
      - 'Участь у дебатах: захист власної позиції та спростування аргументів опонента'
      - Демонстрація багатства лексики та гнучкості синтаксису в живому 
        спілкуванні
    key_concepts:
      - спонтанне мовлення
      - дебати
      - риторична гнучкість
      - інтонаційна виразність
    primary_sources:
      - Перелік дискусійних питань для усного іспиту
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Авраменко, 11 клас (2019): Культура мовлення, стилістика'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Державний стандарт 2024: C2 — комплексна мовна компетенція'
reading_situations:
  - source_type: науковий звіт
    topic: 'Комплексний аналіз соціальних змін в Україні: інтегроване завдання на
      читання та критику.'
    key_elements:
      - дані
      - аргументи
      - висновки
    motivation: Перевірка здатності обробляти великі обсяги складної інформації.
  - source_type: філософський трактат
    topic: 'Проблема свободи та відповідальності в сучасній етиці: аналіз тексту.'
    key_elements:
      - абстрактні поняття
      - логічна структура
      - авторський стиль
    motivation: Оцінка глибини розуміння абстрактного дискурсу.
listening_situations:
  - media_type: лекція
    setting: Академічна лекція на тему 'Трансформація української ідентичності в
      умовах війни'.
    focus_points:
      - Основні тези доповідача
      - Приклади та докази
    motivation: Перевірка здатності до аналітичного слухання.
writing_tasks:
  - task_type: есе
    prompt: Оберіть одну з запропонованих тем (наприклад, 'Вплив штучного 
      інтелекту на майбутнє національних мов') та напишіть аргументативне есе.
    requirements:
      - мінімум 800 слів
      - використання щонайменше 3-х різних стилістичних фігур
      - чітка логічна структура
    motivation: Фінальна перевірка навичок письмового вираження думок.
    model_answer: 'Текст має відповідати стандартам рівня C2: бути лексично багатим,
      граматично бездоганним та переконливим.'
discussion_topics:
  - context: Чи може мова бути інструментом геополітичного впливу?
    questions:
      - Як мова формує м'яку силу держави?
      - Чи існують 'малі' та 'великі' мови в еру глобального інтернету?
    motivation: Оцінка навичок спонтанної аргументації та риторики.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати науковий текст: виявити імпліцитний зміст, оцінити аргументацію
      та стилістичні прийоми'
  - type: essay-response
    focus: Написати аргументативне есе на складну тему з використанням різних 
      стилістичних фігур
  - type: error-correction
    focus: 'Відредагувати текст: виявити та виправити лексичні, граматичні та стилістичні
      помилки'
  - type: select
    focus: Обрати стилістично доречні варіанти у контекстах різних 
      функціональних стилів
phase: C2.4 [Meta-Skills & Capstone]
