module: narratology
level: C2
sequence: 28
version: '1.2'
title: 'Нарратологія: мистецтво оповіді'
subtitle: 'Narratology: The Art of Storytelling'
focus: literature
pedagogy: seminar
objectives:
- Зрозуміти специфіку наративної структури художнього тексту та її вплив на сприйняття читача
- Аналізувати типи розповідачів, рівні нарації та механізми фокалізації
- Дослідити складні форми часопросторової організації літературного твору
- Навчитися розрізняти наративні стратегії в класичній, модерній та постмодерній літературі
content_outline:
- section: 'Наративна структура: історія та дискурс'
  words: 1250
  subsections:
  - 'Предмет наратології: від Аристотеля до структуралізму'
  - 'Опозиція ''фабула - сюжет - наррація'': термінологічне уточнення'
  - 'Дискурс як спосіб представлення події: роль медіатора'
  key_concepts:
  - диєгезис
  - екзегезис
  - наратив
  - дискурс
  primary_sources:
  - Михайло Коцюбинський, 'Intermezzo' (суб'єктивована нарація)
  - В. Домонтович, 'Доктор Серафікус' (інтелектуальна гра з розповідачем)
- section: Суб'єктна організація оповіді
  words: 1250
  subsections:
  - 'Типологія розповідачів: автор, наратор, персонаж-мовець'
  - 'Фокалізація: хто бачить і хто говорить? Нульова, внутрішня, зовнішня'
  - Ненадійний оповідач та стратегії створення недовіри
  key_concepts:
  - фокалізація
  - наратор
  - перспектива
  - ненадійний розповідач
- section: Темпоральність та просторовість наративу
  words: 1250
  subsections:
  - 'Художній час: порядок, тривалість, частота (аналепсис та пролепсис)'
  - 'Хронотоп як категорія змістової форми: типи художнього простору'
  - 'Сповільнення та прискорення оповіді: функція описів та діалогів'
  key_concepts:
  - аналепсис
  - пролепсис
  - хронотоп
  - пауза
- section: Наративні стратегії та читацький досвід
  words: 1250
  subsections:
  - 'Сюжетна логіка: від причинно-наслідкового зв''язку до вільного монтажу'
  - 'Інтертекстуальність як наративний прийом: цитування та алюзія'
  - 'Рецептивна естетика: роль ''ідеального читача'' у творенні сенсу'
  key_concepts:
  - рецепція
  - монтаж
  - когнітивний сценарій
  - імпліцитний автор
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Авраменко, 11 клас (2019): Аналіз літературного процесу'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Державний стандарт 2024: C2 — літературна компетенція'
reading_situations:
- source_type: Художня новела
  topic: Аналіз імпресіоністичної нарації в 'Intermezzo' Михайла Коцюбинського.
  key_elements:
  - потік свідомості
  - персоніфікація
  - ліризм
  motivation: Вивчення межі між епічною оповіддю та ліричною сповіддю.
- source_type: Роман
  topic: Типологія розповідачів у романі 'Доктор Серафікус' В. Домонтовича.
  key_elements:
  - іронія
  - відстороненість
  - інтелектуальні рефлексії
  motivation: Аналіз модерністської гри з наративними рівнями.
listening_situations:
- media_type: лекція
  setting: 'Лекція з циклу ''Теорія літератури'': фокалізація та точка зору в сучасній прозі.'
  focus_points:
  - Різниця між наратором та автором
  - Приклади нульової фокалізації
  motivation: Розуміння технічних аспектів побудови оповіді.
writing_tasks:
- task_type: есе
  prompt: Напишіть наративний аналіз невеликого оповідання на ваш вибір, зосередившись на часовій структурі (аналепсисах та
    пролепсисах) та типі розповідача.
  requirements:
  - мінімум 450 слів
  - використання термінології наратології
  - графічна схема сюжету як додаток
  motivation: Практична перевірка навичок деконструкції наративу.
  model_answer: Аналіз має чітко розмежовувати події фабули та порядок їх представлення в сюжеті, а також аргументувати вибір
    автором певного типу розповідача.
discussion_topics:
- context: Чи може існувати текст без розповідача (навіть імпліцитного)?
  questions:
  - Як змінюється сприйняття тексту при зміні фокалізації?
  - Чи обов'язково читач має довіряти розповідачу?
  motivation: Дискусія про природу літературної комунікації.
activity_hints:
- type: critical-analysis
  focus: 'Проаналізувати наративну структуру ''Intermezzo'' Коцюбинського: визначити тип фокалізації та суб''єктну організацію'
- type: essay-response
  focus: 'Написати наративний аналіз оповідання з акцентом на часовій структурі: аналепсис, пролепсис, тип розповідача'
- type: match-up
  focus: 'Зіставити наратологічні терміни з їхніми визначеннями: фокалізація, наратор, диєгезис, хронотоп'
- type: select
  focus: Обрати правильний тип розповідача та фокалізації у запропонованих уривках художньої прози
