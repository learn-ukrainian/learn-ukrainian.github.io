content_outline:
- section: 'Вступ: Що таке наратологія? (Introduction: What is Narratology?)'
  words: 600
  points:
  - Визначення наратології як теоретичної дисципліни, що вивчає закони побудови оповіді; пряма відповідність Держстандарту
    §1.1.2.1.1 щодо аналізу складних художніх текстів (роман, новела, повість).
  - 'Базові дихотомії: Історія vs. Дискурс. Корекція типової помилки: розрізнення фабули (хронологічний порядок подій, ''що
    сталося'') та сюжету (авторський виклад подій, ''як розказано'').'
- section: Наративні інстанції та голоси (Narrative Instances and Voices)
  words: 750
  points:
  - 'Деконструкція рівнів оповіді: реальний автор vs. імпліцитний автор vs. наратор. Корекція помилки: чому не можна ототожнювати
    біографічного автора з голосом у тексті (на прикладі новели Миколи Хвильового ''Я (Романтика)'').'
  - 'Класифікація нараторів: гомодієгетичний (наратор-персонаж) та гетеродієгетичний (зовнішній наратор); рівні нарації (екстрадієгетичний
    та інтрадієгетичний за Женеттом).'
- section: 'Фокалізація: Око та Голос (Focalization: Eye and Voice)'
  words: 750
  points:
  - 'Теорія фокалізації: розрізнення запитань ''хто говорить?'' та ''хто бачить?''. Корекція помилки: оповідач може вести
    розповідь від першої особи, але фокусуватися на баченні іншого персонажа (наприклад, дитини).'
  - 'Аналіз режимів фокалізації: нульова (всезнаючий наратор), внутрішня (обмежена свідомістю персонажа) та зовнішня (об''єктивне
    спостереження). Використання внутрішньої фокалізації у психологічній прозі Василя Стефаника.'
- section: Темпоральність та часові анахронії (Temporality and Temporal Anachronies)
  words: 900
  points:
  - 'Сюжетний час vs. фабульний час. Робота з анахроніями: аналепсис (ретроспекція/flashback) та пролепсис (передбачення майбутнього/flash-forward)
    як інструменти динаміки тексту.'
  - 'Ритм оповіді та його складники: тривалість (підсумок, сцена, пауза, еліпсис) та частотність (сингулятив, ітератив). Аналіз
    ітеративних описів у побутових сценах української класики.'
- section: Наративний модус та 'Сказ' (Narrative Mode and 'Skaz')
  words: 750
  points:
  - 'Дистанція в оповіді: показ (mimesis) vs. розповідь (diegesis). Форми передачі мовлення: пряма, непряма та невласне-пряма
    мова як засіб психологічного заглиблення.'
  - 'Специфіка українського ''сказу'' (skaz): стилізація нарації під усну манеру оповідача-простолюдина на прикладах творчості
    Г. Квітки-Основ''яненка (''Конотопська відьма'') та Марка Вовчка.'
- section: 'Практикум: Глибокий аналіз текстів (Workshop: Deep Narrative Analysis)'
  words: 750
  points:
  - 'Аналіз наративної структури новели ''Я (Романтика)'': розщеплений ''Я''-наратор, використання внутрішньої фокалізації
    для створення атмосфери етичного колапсу.'
  - 'Поліфонія та діалогізм (за Бахтіним): романна поліфонія як рівноправність голосів автора та персонажів у сучасній українській
    інтелектуальній прозі.'
- section: 'Підсумок: Інструментарій для творчості (Summary: Toolkit for Creativity)'
  words: 500
  points:
  - 'Синтез концепцій: як знання наратології допомагає деконструювати ідеологічні меседжі в тексті та розуміти авторські стратегії
    маніпуляції часом і точкою зору.'
  - 'Застосування в письмі: поради щодо вибору фокалізації та темпорального ритму для власних текстів з метою підвищення їхньої
    художної переконливості.'
vocabulary_hints:
  required:
  - наратологія (narratology) — сучасна наратологія, когнітивна наратологія; академічний термін
  - наратор (narrator) — гомодієгетичний наратор, гетеродієгетичний наратор; голос у тексті
  - фокалізація (focalization) — нульова фокалізація, внутрішня фокалізація; ракурс бачення
  - фабула (fabula/story) — розгортання фабули, динамічна фабула; логічний порядок подій
  - сюжет (sjuzhet/plot) — сюжетні анахронії, вибудова сюжету; авторська композиція подій
  - дієгезис (diegesis) — дієгетичний світ, межі дієгезису; простір розказаної історії
  - аналепсис (analepsis) — використання аналепсису; часове повернення назад (flashback)
  - пролепсис (prolepsis) — фігура пролепсису; забігання оповіді наперед (flash-forward)
  - всезнаючий (omniscient) — всезнаючий оповідач; наратор з необмеженим баченням
  - поліфонія (polyphony) — поліфонія голосів, романна поліфонія; багатоголосся за Бахтіним
  recommended:
  - нарататор (narratee) — експліцитний або імпліцитний адресат оповіді всередині тексту
  - екстрадієгетичний (extradiegetic) — наратор вищого рівня, що перебуває поза розказаним світом
  - інтрадієгетичний (intradiegetic) — наратор або подія, що належить до внутрішнього світу історії
  - ітератив (iterative) — розповідь один раз про те, що відбувалося багаторазово (частотність)
  - невласне-пряма мова (free indirect speech) — гібридна форма, де думки персонажа зливаються з мовою наратора
  - анахронія (anachrony) — будь-яке часове зміщення оповіді відносно хронології фабули
  - сказ (skaz) — специфічна манера оповіді, що імітує живе, усне, часто діалектне мовлення
