vocabulary_hints:
  required:
  - наратологія (narratology) — сучасна наратологія, когнітивна наратологія; академічний
    термін
  - наратор (narrator) — гомодієгетичний наратор, гетеродієгетичний наратор; голос
    у тексті
  - фокалізація (focalization) — нульова фокалізація, внутрішня фокалізація; ракурс
    бачення
  - фабула (fabula/story) — розгортання фабули, динамічна фабула; логічний порядок
    подій
  - сюжет (sjuzhet/plot) — сюжетні анахронії, вибудова сюжету; авторська композиція
    подій
  - дієгезис (diegesis) — дієгетичний світ, межі дієгезису; простір розказаної історії
  - аналепсис (analepsis) — використання аналепсису; часове повернення назад (flashback)
  - пролепсис (prolepsis) — фігура пролепсису; забігання оповіді наперед (flash-forward)
  - всезнаючий (omniscient) — всезнаючий оповідач; наратор з необмеженим баченням
  - поліфонія (polyphony) — поліфонія голосів, романна поліфонія; багатоголосся за
    Бахтіним
  recommended:
  - нарататор (narratee) — експліцитний або імпліцитний адресат оповіді всередині
    тексту
  - екстрадієгетичний (extradiegetic) — наратор вищого рівня, що перебуває поза розказаним
    світом
  - інтрадієгетичний (intradiegetic) — наратор або подія, що належить до внутрішнього
    світу історії
  - ітератив (iterative) — розповідь один раз про те, що відбувалося багаторазово
    (частотність)
  - невласне-пряма мова (free indirect speech) — гібридна форма, де думки персонажа
    зливаються з мовою наратора
  - анахронія (anachrony) — будь-яке часове зміщення оповіді відносно хронології фабули
  - сказ (skaz) — специфічна манера оповіді, що імітує живе, усне, часто діалектне
    мовлення
