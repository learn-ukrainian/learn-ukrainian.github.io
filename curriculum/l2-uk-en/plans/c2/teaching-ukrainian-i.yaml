content_outline:
- section: 'Вступ: Педагогічна свідомість на рівні C2 (Introduction: Pedagogical Consciousness at C2 Level)'
  words: 700
  points:
  - 'Перехід від ролі активного носія (C2 user) до ролі викладача: усвідомлення системних зв''язків мови згідно з дескрипторами
    рівня C2.'
  - 'Розвиток метамовної свідомості: здатність пояснювати мовні явища не лише через інтуїцію, а й через лінгвістичну термінологію
    (наукові ступені, вчені звання, галузі знань).'
  - Рефлексія власного досвіду вивчення мови як інструмент емпатії та планування траєкторії навчання учня.
- section: Історико-культурний контекст та сучасні виклики (Historical-Cultural Context and Modern Challenges)
  words: 800
  points:
  - 'Деколонізація методики: тяглість Харківської лінгвістичної школи 1920-х (Скрипник, Синявський, Тимченко) та подолання
    наслідків радянської уніфікації викладання.'
  - 'Феномен волонтерського викладання після 2022 року: як перетворити масовий запит на професійну педагогічну практику в
    міжнародному контексті.'
  - 'Роль української мови на глобальному ринку освітніх послуг: аналіз попиту в країнах ЄС та Північної Америки.'
- section: Теоретичні основи сучасної лінгводидактики (Theoretical Foundations of Modern Language Pedagogy)
  words: 1000
  points:
  - 'Принципи комунікативного підходу та CEFR Companion Volume: фокус на вмінні учня діяти в мовному середовищі.'
  - 'Теорія засвоєння другої мови (SLA) для морфологічно багатих мов: адаптація західних моделей під специфіку української
    флективності.'
  - 'Уміння трансформувати регістри (§4.3.7 Держстандарту): переклад складного наукового опису граматики в доступну інструкцію
    для іноземного учня.'
- section: Аналіз помилок та стратегії корекції (Error Analysis and Correction Strategies)
  words: 1000
  points:
  - 'Типологія помилок за С. Кордером: розмежування систематичних помилок (errors) та випадкових хиб (slips) у мовленні іноземців.'
  - 'Подолання міжмовної інтерференції: робота з англійськими кальками (напр., «Дякую тебе» замість «Дякую тобі») через контрастивний
    аналіз.'
  - 'Пріоритети корекції: чому виправлення прагматичних неточностей та культурних невідповідностей важливіше за дрібні помилки
    в закінченнях на рівні B2+.'
- section: Планування уроку та мікровикладання (Lesson Planning and Microteaching)
  words: 1000
  points:
  - 'Структура уроку за моделлю TTT (Test-Teach-Test): діагностика знань учня перед подачею нового матеріалу.'
  - 'Створення вторинних текстів (§4.3.8): написання поурочного плану як структурованого методичного документа.'
  - 'Метод скафолдингу: створення тимчасових опор (візуальних, лексичних) для підтримки автономії учня під час складних завдань.'
- section: 'Підсумок: Шлях до професійної майстерності (Summary: Path to Professional Mastery)'
  words: 500
  points:
  - 'Формування індивідуального стилю викладання: поєднання академічної глибини з комунікативною гнучкістю.'
  - 'Професійний розвиток: використання ресурсів МОН, порталу litopys.org.ua та участь у науково-педагогічних конференціях.'
  - Рефлексивна практика як основа вдосконалення техніки викладання та зворотного зв'язку.
vocabulary_hints:
  required:
  - лінгводидактика (language pedagogy) — теоретична ~, прикладна ~, розвиток ~и; наукова дисципліна про викладання мови
  - методика викладання (teaching methodology) — ~ мови як іноземної, сучасна ~, ~альні засади; практичне застосування лінгводидактики
  - засвоєння мови (language acquisition) — природне ~, кероване ~, теорія ~; процес оволодіння мовою в природному чи штучному
    середовищі
  - інтерференція (interference) — мовна ~, подолати ~ю, негативний вплив рідної мови; перенесення рис однієї мови в іншу
  - корекція помилок (error correction) — стратегії ~ї, ~ без демотивації, відтермінована ~; методика виправлення мовленнєвих
    недоліків
  - зворотний зв'язок (feedback) — надавати конструктивний ~, позитивний ~, отримати ~ від учнів; реакція вчителя на результати
    діяльності учня
  - мікровикладання (microteaching) — проводити сесію ~я, самоаналіз ~, фрагмент уроку; тренувальний метод підготовки вчителів
  - план уроку (lesson plan) — складати ~, структура ~у, вторинний текст; детальний сценарій навчального заняття
  - комунікативна компетенція (communicative competence) — розвивати ~ю, складники ~ї, формування ~ї; здатність ефективно
    спілкуватися
  - метамовна свідомість (metalinguistic awareness) — рівень ~ості, розвиток ~ості; здатність об’єктивно аналізувати мову
    як систему
  recommended:
  - скафолдинг (scaffolding) — метод ~у, надавати підтримку; система тимчасових опор для учня
  - диференціація (differentiation) — ~ навчання, індивідуальний підхід; адаптація матеріалу до потреб різних учнів
  - формувальне оцінювання (formative assessment) — інструменти ~я; оцінювання процесу навчання, а не лише кінцевого результату
  - автентичні матеріали (authentic materials) — використання ~их текстів; матеріали, створені носіями мови для носіїв
  - мотивація учнів (student motivation) — підвищувати ~ю, внутрішня ~; чинники, що спонукають до вивчення мови
