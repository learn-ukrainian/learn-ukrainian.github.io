module: c2-092
level: C2
sequence: 92
version: 1.2.1
title: Методика викладання української мови I
subtitle: Методика викладання I
focus: professional
pedagogy: seminar
objectives:
- Ознайомитися з ключовими принципами сучасної деколонізованої методики викладання української мови як іноземної (УМІ)
- Навчитися структурувати навчальні програми та модулі відповідно до рівнів CEFR та Державного стандарту 2024
- 'Опанувати навички ефективного планування уроків: від формулювання цілей до таймінгу та вибору активностей'
- Проаналізувати роль викладача як фасилітатора та культурного посередника в процесі навчання
content_outline:
- section: Філософія та принципи деколонізованої педагогіки
  words: 1250
  subsections:
  - 'Україноцентричний підхід: відмова від російських імперських наративів у викладанні'
  - 'Комунікативна методика: пріоритет мовленнєвої практики над механічним заучуванням правил'
  - 'Агентність студента: як зробити учня активним суб''єктом навчального процесу'
  key_concepts:
  - деколонізована педагогіка
  - комунікативний підхід
  - агентність
  - критичне мислення
  primary_sources:
  - Державний стандарт української мови як іноземної (2024)
- section: 'Дизайн курсу: від програми до модулів'
  words: 1250
  subsections:
  - 'Структурування навчального матеріалу: логіка послідовності модулів'
  - Визначення цілей навчання (Learning Objectives) за критеріями SMART
  - 'Рівні володіння мовою (A1-C2): специфіка та вимоги до кожного етапу'
  key_concepts:
  - навчальний план
  - модуль
  - дескриптори рівнів
  - прогресія
  primary_sources:
  - Загальноєвропейські рекомендації з мовної освіти (CEFR) — український контекст
- section: 'Анатомія уроку: планування та реалізація'
  words: 1250
  subsections:
  - 'Структура уроку: розминка, введення матеріалу, практика, продукція та підсумок'
  - Методики PPP (Presentation, Practice, Production) та TTT (Test, Teach, Test) у викладанні граматики
  - Управління часом та гнучкість плану в реальних умовах класу
  key_concepts:
  - план уроку
  - таймінг
  - етап уроку
  - педагогічна гнучкість
  primary_sources:
  - Методичні посібники О. Паламар або інших провідних педагогів
- section: Роль викладача та психологія навчання
  words: 1250
  subsections:
  - Створення безпечного та стимулюючого навчального середовища
  - Врахування індивідуальних стилів навчання та мотивації студентів
  - Етика викладача та робота з культурними стереотипами
  key_concepts:
  - фасилітація
  - інклюзивність
  - навчальне середовище
  - емоційний інтелект
  primary_sources:
  - Сучасні дослідження з психолінгвістики та нейродидактики
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: навчальна програма / стандарт
  topic: Аналіз дескрипторів рівня С1/С2 у Державному стандарті української мови 2024.
  key_elements:
  - компетентності
  - критерії оцінювання
  - мовні завдання
  motivation: Розуміння офіційних вимог до вищого рівня володіння мовою.
- source_type: методична стаття
  topic: Переваги та недоліки використання підходу 'Test-Teach-Test' на уроках високого рівня.
  key_elements:
  - діагностика
  - цільове навчання
  - активна роль студента
  motivation: Вивчення інструментів для роботи з просунутими учнями.
listening_situations:
- media_type: лекція
  setting: 'Запис вебінару для вчителів УМІ: ''Як планувати модулі так, щоб студенти не втрачали мотивації''.'
  focus_points:
  - Чергування складних та легких тем
  - Інтеграція культурного контенту в граматичні уроки
  motivation: Сприйняття практичних порад від досвідчених методистів.
writing_tasks:
- task_type: власне висловлення
  prompt: Розробіть детальний план одного уроку для рівня С1 на тему «Постколоніальна література України». Вкажіть цілі, етапи,
    необхідні матеріали та очікувані результати.
  requirements:
  - мінімум 500 слів
  - відповідність структурі уроку
  - обґрунтування вибору активностей
  motivation: Практичне відпрацювання навичок педагогічного дизайну.
  model_answer: План має містити чітку структуру з таймінгом, описом завдань для читання та дискусії, а також методику оцінювання
    досягнення цілей.
discussion_topics:
- context: Чи може викладач бути нейтральним, викладаючи мову в країні, що бореться за свою незалежність?
  questions:
  - Яка межа між навчанням та патріотичним вихованням?
  - Як працювати зі студентами, які мають упередження щодо української історії?
  motivation: Дискусія про етичні та політичні аспекти професії вчителя української мови.
activity_hints:
- type: reading
  focus: Прочитайте текст про філософія та принципи деколонізованої педагогіки і дайте відповіді на запитання щодо ключових
    понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про дизайн курсу: від програми до модулів, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Філософія та принципи деколонізованої педагогіки». Обґрунтуйте
    свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему філософія та принципи деколонізованої педагогіки.
- type: comparative-study
  focus: 'Порівняйте різні підходи до філософія та принципи деколонізованої педагогіки: Україноцентричний підхід: відмова
    від російських імперських наративів у викладан. Визначте спільне та відмінне.'
references:
- 'Державний стандарт 2024: C2 — педагогічні компетенції, методика УМІ'
- Караман, 10 клас (2018), §1-5 — Загальне мовознавство (металінгвістична свідомість)
- Загальноєвропейські рекомендації з мовної освіти (CEFR) — український контекст
phase: C2.4 [Meta-Skills & Capstone]
