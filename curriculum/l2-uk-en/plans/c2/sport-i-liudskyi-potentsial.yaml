module: sport-i-liudskyi-potentsial
level: C2
sequence: 73
version: '1.2'
title: 'Спорт та людський потенціал: Психологія перемоги та фізична культура'
subtitle: 'Sport and Human Potential: Psychology of Victory and Physical Culture'
focus: vocabulary
pedagogy: seminar
objectives:
- Опанувати професійну лексику у сферах професійного спорту, спортивної медицини та психології досягнень
- Аналізувати роль спорту в сучасному суспільстві, політиці та формуванні національної ідентичності
- Дослідити феномен людської витривалості та межі фізичних можливостей організму
- Розвинути навички ведення дискусій про етику в спорті, допінг та інклюзивність
content_outline:
- section: 'Великий спорт: політика, бізнес та національний престиж'
  words: 1250
  subsections:
  - Спорт як інструмент м'якої сили (soft power) та засіб культурної дипломатії
  - 'Економіка олімпійського руху: інвестиції, спонсорство та комерціалізація'
  - Спортивне вболівання як соціальний феномен та елемент колективної ідентичності
  key_concepts:
  - культурна дипломатія
  - національний престиж
  - комерціалізація
  - фанатський рух
  primary_sources:
  - Олімпійська хартія (аналіз фундаментальних принципів та мови спортивного права)
- section: Психологія високих досягнень та ментальна стійкість
  words: 1250
  subsections:
  - Стресостійкість, концентрація та 'стан потоку' у професійних спортсменів
  - 'Мотиваційні стратегії та подолання поразок: погляд спортивного психолога'
  - 'Командна динаміка: роль лідерства та групової згуртованості у досягненні результату'
  key_concepts:
  - ментальна стійкість
  - мотивація
  - стан потоку
  - лідерство
- section: 'Фізична культура та здоров''я нації: від масового спорту до біохакінгу'
  words: 1250
  subsections:
  - Популяризація здорового способу життя (ЗСЖ) як стратегічне завдання держави
  - 'Біохакінг та оптимізація людського організму: наукові та етичні аспекти'
  - Спортивна інфраструктура та доступність фізичної культури для різних верств населення
  key_concepts:
  - біохакінг
  - рекреація
  - здоровий спосіб життя
  - фізична культура
  primary_sources:
  - Микола Амосов, 'Роздуми про здоров'я' (вибрані думки про резерви організму)
- section: 'Етичні виклики: допінг, гендерні дебати та інклюзивність у спорті'
  words: 1250
  subsections:
  - Проблема допінгу та роль антидопінгових агентств (WADA) у чистоті спорту
  - 'Гендерна політика в спорті: рівність можливостей та сучасні дискусії'
  - Паралімпійський рух як взірець незламності та інклюзивності суспільства
  key_concepts:
  - допінг-контроль
  - інклюзивність
  - паралімпізм
  - етичний кодекс
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
- source_type: Нормативний документ
  topic: Аналіз Олімпійської хартії. Вивчення основних цінностей олімпізму та специфіки юридичної термінології.
  key_elements:
  - олімпізм
  - взаєморозуміння
  - солідарність
  motivation: Опанування офіційного міжнародного дискурсу у сфері спорту.
- source_type: Науково-публіцистична праця
  topic: Дослідження поглядів Миколи Амосова на здоров'я та фізичну активність. Аналіз концепції 'режиму обмежень та навантажень'.
  key_elements:
  - резерви організму
  - старіння
  - саморегуляція
  motivation: Вивчення наукового підходу до фізичної культури через призму української інтелектуальної спадщини.
listening_situations:
- media_type: лекція
  setting: Виступ спортивного лікаря про вплив високих навантажень на організм та сучасні методи реабілітації.
  focus_points:
  - Спортивна кардіологія
  - Психосоматика у спорті
  motivation: Розвиток розуміння фахового медичного вокабуляру.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть аналітичне есе на тему ''Спорт як дзеркало суспільства: чи відображають спортивні досягнення рівень розвитку
    нації?''.'
  requirements:
  - мінімум 700 слів
  - використання соціологічної термінології
  - аналіз ролі держави у підтримці спорту
  motivation: Розвиток навичок синтезу соціальних та спортивних знань у письмовому викладі.
  model_answer: Текст має містити аргументацію про зв'язок між інвестиціями в спорт, здоров'ям нації та міжнародним іміджем
    держави.
discussion_topics:
- context: Чи є справедливим відсторонення цілих національних збірних від змагань через політичні причини або системне вживання
    допінгу?
  questions:
  - Чи має спорт залишатися 'поза політикою'?
  - 'Хто несе відповідальність за порушення: спортсмен, тренер чи держава?'
  motivation: Дебати про етичні та правові засади світового спорту.
activity_hints:
- type: reading
  focus: 'Проаналізувати Олімпійську хартію: визначити фундаментальні цінності та специфіку юридичної термінології'
- type: essay-response
  focus: Написати аналітичне есе про спорт як дзеркало суспільства та рівень розвитку нації
- type: critical-analysis
  focus: Оцінити аргументацію у дискусії про відсторонення національних збірних за політичні причини
- type: fill-in
  focus: 'Доповнити текст спортивною термінологією: допінг-контроль, паралімпізм, рекреація, біохакінг'
- type: error-correction
  focus: Виправити кальки та росіянізми у спортивному репортажі
