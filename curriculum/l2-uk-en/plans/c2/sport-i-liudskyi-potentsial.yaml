slug: sport-i-liudskyi-potentsial
version: '2.0'
title: Спорт і людський потенціал
subtitle: Sport and Human Potential
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати українські спортивні досягнення та роль спорту в суспільному житті з використанням фахової спортивної
  термінології та аналітичного регістру
- Learner can critically discuss doping ethics, anti-doping policies, and the intersection of sport with politics
  using nuanced argumentative discourse in Ukrainian
- Обговорювати можливості людського тіла, спортивну медицину та розвиток інфраструктури спорту в Україні на рівні
  фахового дискурсу
- Learner can compose an analytical text about Olympic and Paralympic achievements, extreme sports trends, or sports
  policy using formal academic Ukrainian
