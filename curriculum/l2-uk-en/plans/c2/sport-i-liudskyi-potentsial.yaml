content_outline:
- section: 'Вступ: Спортивний дискурс на рівні С2 (Introduction: Sports Discourse at C2 Level)'
  words: 600
  points:
  - 'From sports vocabulary (B1-B2) to analytical sports discourse: the C2 learner engages with sport as a sociocultural
    phenomenon through institutional analysis, ethics debates, and policy evaluation.'
  - 'State Standard theme 3.5: full coverage of Спорт including achievements, extreme sports, doping, Olympics and
    Paralympics, human potential, and sports medicine.'
  - 'Register spectrum: спортивний коментар (sports commentary), науковий (sports science), публіцистичний (sports
    journalism), and офіційний (policy documents) registers in sports discourse.'
- section: Спортивні досягнення і рекорди України (Ukraine's Sports Achievements and Records)
  words: 750
  points:
  - 'Ukraine''s sporting heritage: legendary athletes (Сергій Бубка, брати Кличко, Яна Клочкова), their global impact,
    and the role of sports in national identity formation after independence in 1991.'
  - 'Contemporary achievements: Ukrainian success in boxing, wrestling, gymnastics, fencing, swimming, and athletics;
    analyzing performance trends and the impact of war on athlete training and competition schedules.'
  - 'Sports records and record-keeping: world records, national records, and the institutional framework of record
    certification; the role of sports federations (спортивні федерації) and international governing bodies.'
- section: Екстремальний спорт і нові дисципліни (Extreme Sports and New Disciplines)
  words: 700
  points:
  - 'Extreme sports culture in Ukraine: rock climbing (скелелазіння), skydiving (стрибки з парашутом), freestyle skiing,
    mountain biking, and urban sports (паркур, скейтбординг); infrastructure and safety regulations.'
  - 'E-sports and cyber-athletics (кібератлетика): Ukraine''s growing competitive gaming scene, professional teams
    (NAVI), tournament culture, and the debate around e-sports as legitimate athletic competition.'
  - 'New Olympic disciplines and their Ukrainian practitioners: sport climbing, breakdancing, skateboarding; how emerging
    sports reshape the спортивний ландшафт and attract youth participation.'
- section: Допінг і антидопінгова політика (Doping and Anti-Doping Policy)
  words: 800
  points:
  - 'Doping as an ethical problem: types of prohibited substances and methods (анаболічні стероїди, стимулятори, кров''яний
    допінг, генний допінг), their health consequences, and the moral dimension of competitive fairness.'
  - 'Anti-doping system: WADA (Всесвітнє антидопінгове агентство), NADС Ukraine (Національне антидопінгове агентство),
    testing procedures (допінг-контроль), therapeutic use exemptions (ТВЗ), and sanctions for violations.'
  - 'Case studies and controversies: high-profile doping scandals in international sport, their impact on Ukraine, the
    intersection of doping with state-sponsored programs, and the ethical debate around performance enhancement in sport.'
- section: Олімпійські та Паралімпійські ігри (Olympic and Paralympic Games)
  words: 750
  points:
  - 'Ukraine at the Olympics: historical participation from 1994, medal tallies, notable performances, the evolution of
    Ukraine''s Olympic program, and the impact of government investment in elite sport development.'
  - 'Paralympic movement in Ukraine: remarkable success (consistently top-5 in medal count), athletes like Максим Яровий
    and Оксана Ботурчук, inclusive sports policy, and the societal impact of Paralympic visibility.'
  - 'Olympic values and politics: the intersection of sport and geopolitics (boycotts, neutral athletes, wartime
    participation), the debate around Russian and Belarusian athletes, and Ukraine''s diplomatic advocacy in sports.'
- section: Спортивна медицина та інфраструктура (Sports Medicine and Infrastructure)
  words: 700
  points:
  - 'Human body potential and sports science: biomechanics (біомеханіка), physiology of training (фізіологія тренувань),
    sports nutrition (спортивне харчування), recovery methods (відновлення), and the limits of human performance.'
  - 'Sports medicine in Ukraine: rehabilitation (реабілітація), injury prevention (профілактика травм), physiotherapy
    (фізіотерапія); the role of sports medicine in both elite athletics and veterans'' recovery programs.'
  - 'Sports infrastructure: stadiums, training facilities (тренувальні бази), fitness industry (тренажерні зали, фітнес-центри),
    government and private investment, and the challenge of rebuilding destroyed infrastructure during wartime.'
- section: 'Практикум: Аналіз спортивного дискурсу (Workshop: Sports Discourse Analysis)'
  words: 700
  points:
  - 'Applied analysis: deconstructing a sports commentary, policy document, or sports science article to identify register
    features, argumentation strategies, and specialized terminology.'
  - 'Debate exercise: constructing arguments for and against a specific sports policy issue (e.g., state funding priorities,
    e-sports recognition, doping legalization) using evidence from multiple sources.'
  - 'Analytical writing: composing a sports policy analysis brief (аналітична записка) evaluating Ukraine''s Olympic
    development strategy or Paralympic integration program using academic register.'
vocabulary_hints:
  required:
  - екстремальний спорт (extreme sport) — види екстремального спорту, безпека в екстремальному спорті; sports culture register
  - допінг (doping) — допінг-контроль, вживання допінгу; anti-doping policy terminology
  - Олімпійські ігри (Olympic Games) — літні Олімпійські ігри, учасник Олімпійських ігор; international sports register
  - Паралімпійські ігри (Paralympic Games) — Паралімпійський рух, паралімпійська збірна; inclusive sports terminology
  - рекорд (record) — світовий рекорд, побити рекорд; competitive sports register
  - спортивна дисципліна (sports discipline) — олімпійська дисципліна, нова спортивна дисципліна; classification terminology
  - спорядження (equipment) — спортивне спорядження, захисне спорядження; gear and safety register
  - тренажерний зал (gym) — обладнання тренажерного залу, заняття в тренажерному залі; fitness industry terminology
  - спортивне досягнення (sports achievement) — видатне спортивне досягнення, визнання спортивних досягнень; achievement
    discourse
  - антидопінговий (anti-doping) — антидопінгова політика, антидопінговий контроль; regulatory sports terminology
  recommended:
  - паралімпієць (Paralympian) — український паралімпієць, золотий паралімпієць; inclusive athletic identity term
  - воркаут (workout/street workout) — вуличний воркаут, воркаут-майданчик; urban fitness culture loanword
  - фізіотерапія (physiotherapy) — курс фізіотерапії, спортивна фізіотерапія; sports medicine register
  - легкоатлетичний (track-and-field) — легкоатлетичні змагання, легкоатлетичний стадіон; athletics terminology
  - кібератлетика (e-sports/cyber-athletics) — розвиток кібератлетики, змагання з кібератлетики; emerging sports discourse
