module: c2-051
level: C2
sequence: 51
version: 1.2.2
title: 'Практикум з професійного письма II: Підготовка аналітичних звітів та проєктних
  пропозицій'
subtitle: Практикум з професійного письма II
focus: professional
pedagogy: workshop
objectives:
- Досягти майстерності у створенні розлогих аналітичних звітів з високим рівнем 
  узагальнення даних
- Опанувати стратегії переконуючого письма при підготовці інвестиційних та 
  грантових пропозицій
- Навчитися інтегрувати складні статистичні та експертні дані у цілісний 
  текстовий наратив
- Вдосконалити навички дотримання вимог академічної та професійної доброчесності
  у звітності
content_outline:
- section: Структура та логіка професійного аналітичного звіту
  words: 1250
  subsections:
  - 'Архітектоніка звіту: від резюме для керівництва (Executive Summary) до висновків'
  - 'Методи подання доказової бази: верифікація джерел та інтерпретація фактів'
  - Забезпечення когерентності та цілісності викладу у багатосторінкових 
    документах
  key_concepts:
  - аналітичний звіт
  - архітектоніка тексту
  - верифікація
  - когерентність
  primary_sources:
  - Національна академія наук України, 'Річний звіт про діяльність НАН України' 
    (аналіз структури та мови)
- section: Проєктна пропозиція як жанр переконуючого письма
  words: 1250
  subsections:
  - 'Формулювання мети, завдань та очікуваних результатів: лаконічність та точність'
  - Мовна стратегія обґрунтування актуальності та інноваційності проєкту
  - Побудова системи аргументів для переконання потенційного донора чи інвестора
  key_concepts:
  - проєктна пропозиція
  - інноваційність
  - аргументативна стратегія
  - сталий розвиток
- section: Стилістика експертних висновків та рекомендацій
  words: 1250
  subsections:
  - 'Модальність професійного тексту: баланс між категоричністю та припущенням'
  - Використання вставних конструкцій та дієслівних форм для вираження 
    авторської позиції
  - 'Оформлення рекомендаційної частини: імперативність та конструктивність'
  key_concepts:
  - експертний висновок
  - модальність
  - імператив
  - конструктивність
- section: Академічна доброчесність та етика у звітності
  words: 1250
  subsections:
  - Стандарти цитування та оформлення покликань на першоджерела за ДСТУ та 
    міжнародними стилями
  - Запобігання плагіату та некоректному запозиченню ідей у професійному 
    середовищі
  - Етичні аспекти оприлюднення результатів досліджень та конфіденційність даних
  key_concepts:
  - академічна доброчесність
  - інтелектуальна власність
  - цитування
  - професійна етика
  primary_sources:
  - Володимир Вернадський, 'Про наукову роботу' (аналіз етичних засад наукової 
    діяльності)
- section: Підсумок — Summary
  words: 300
  points:
  - 'Professional analytical reports and project proposals require a balance of clear
    structure (архітектоніка тексту) and persuasive argumentation (аргументативна
    стратегія). Key concepts to review include: аналітичний звіт, експертний висновок,
    and академічна доброчесність.'
  - 'Self-check: What is the difference between the модальність of an analytical report
    and a project proposal? Formulate a brief, constructive recommendation using appropriate
    imperative forms. How do you ensure когерентність when integrating expert data?'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): §42-44 — Офіційно-діловий стиль'
- 'Авраменко, 11 клас (2019): Науковий стиль мовлення'
- 'Державний стандарт 2024: C2 — професійна комунікативна компетенція'
reading_situations:
- source_type: Аналітичний звіт
  topic: Аналіз мовних засобів у звітах НАН України. Дослідження способів 
    вираження наукової новизни та практичної значущості.
  key_elements:
  - фундаментальні дослідження
  - впровадження
  - пріоритетні напрями
  motivation: Вивчення офіційного науково-адміністративного стилю на прикладі 
    головної наукової установи країни.
- source_type: Методологічна праця
  topic: Дослідження етичних та професійних настанов у працях Володимира 
    Вернадського. Аналіз мови вченого.
  key_elements:
  - ноосфера
  - наукова думка
  - відповідальність
  motivation: Осмислення тяглості української наукової елітарної думки та її 
    мовного втілення.
listening_situations:
- media_type: лекція
  setting: Вебінар провідного експерта з написання успішних грантових заявок 
    'Horizon Europe' в Україні.
  focus_points:
  - Типові мовні помилки, що призводять до відмови у фінансуванні
  - Мистецтво формулювання Impact (впливу) проєкту
  motivation: Розуміння сучасних міжнародних вимог до українськомовного 
    професійного контенту.
writing_tasks:
- task_type: есе
  prompt: Складіть аналітичне резюме (Executive Summary) для уявного проєкту 
    реформування вашої професійної галузі. Використайте складні синтаксичні 
    конструкції та термінологію високого рівня.
  requirements:
  - мінімум 600 слів
  - чітка логічна структура
  - переконуючий тон
  motivation: Перевірка здатності до стислого, але змістовного викладу складних 
    ідей.
  model_answer: Текст має містити чітку постановку проблеми, пропоновані рішення
    та очікуваний ефект. Мова має бути професійною, без зайвої емоційності, але 
    з виразним акцентом на перевагах проєкту.
discussion_topics:
- context: Чи є жорстка стандартизація звітів перешкодою для вираження глибокої 
    фахової думки?
  questions:
  - Як поєднати творчий підхід дослідника з бюрократичними вимогами до 
    звітності?
  - Яке майбутнє у паперової звітності в епоху цифровізації?
  motivation: Розвиток здатності до ведення дискусії на професійно-етичні теми.
activity_hints:
- type: reading
  focus: Прочитайте текст про структура та логіка професійного аналітичного 
    звіту і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про проєктна пропозиція як жанр 
    переконуючого письма, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Структура та 
    логіка професійного аналітичного звіту». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    структура та логіка професійного аналітичного звіту.
- type: comparative-study
  focus: 'Порівняйте різні підходи до структура та логіка професійного аналітичного
    звіту: Архітектоніка звіту: від резюме для керівництва (Executive Summary) до
    висновків. Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
