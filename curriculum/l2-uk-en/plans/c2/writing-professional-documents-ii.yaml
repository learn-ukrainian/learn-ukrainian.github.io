content_outline:
- section: Вступ — Психологія та етика переконання (Introduction — Psychology and Ethics of Persuasion)
  words: 850
  points:
  - 'Від інформування до переконання: аналіз авдиторії та мети в професійному дискурсі рівня C2.'
  - 'Дерадянізація ділової мови: перехід від пасивних конструкцій (наприклад, «нами було вирішено») до активної агентності
    («ми вирішили»).'
  - 'Етика переконання: побудова довіри через конкретику (цифри, терміни) та уникнення «води» (неінформативного тексту) у
    вступі пропозиції.'
- section: Анатомія успішної пропозиції (Anatomy of a Successful Proposal)
  words: 1150
  points:
  - Застосування моделі «Біль -> Рішення -> Вигода» (Pain-Solution-Benefit) у проєктних та комерційних пропозиціях.
  - 'Економічне та технічне обґрунтування: використання прецизійної термінології (рентабельність, конкурентоспроможність)
    для підкріплення аргументації.'
  - 'Типові лексичні помилки та кальки: розрізнення правильних форм «вжити заходів» та «завдати шкоди» від суржикових аналогів.'
  - Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами
- section: Бізнес-планування та аналіз ризиків (Business Planning and Risk Analysis)
  words: 1000
  points:
  - 'Ключові елементи бізнес-плану в українському контексті: SWOT-аналіз та фінансове обґрунтування проєкту.'
  - 'Культурний гачок: культура «прозорості» в Україні (система Prozorro) та її вплив на відкритість бізнес-процесів та тендерну
    грамотність.'
  - 'Аналіз ризиків: професійне використання модальних маркерів (ймовірно, водночас) для опису складності професійного контексту.'
  - Розширена практика із систематизацією складних граматичних явищ та порівнянням нормативних варіантів за різними джерелами
- section: Письмова презентація та візуальна комунікація (Written Presentation and Visual Communication)
  words: 1000
  points:
  - 'Формат аналітичної записки (Amazon-style memo) проти слайд-презентацій: структура та мовні особливості лаконічного професійного
    письма.'
  - 'Візуальні елементи: лінгвістичне супроводження графіків та таблиць; правильне вживання часового маркера «протягом» (замість
    помилкового «на протязі»).'
  - 'Адаптація до формату: зміна регістру та стилістики залежно від мети — від стислого звіту до розлогої письмової пропозиції.'
- section: Тендерна документація та практичний аналіз (Tender Documentation and Practical Analysis)
  words: 1000
  points:
  - 'Специфіка тендерних пропозицій: регуляторні вимоги, критерії оцінки та важливість формальної точності документації.'
  - 'Критичний аналіз зразків: розгляд реальних тендерних пропозицій з метою виявлення сильних сторін та типових помилок,
    що призводять до дискваліфікації.'
  - 'Продуктивна вправа: написання переконливого вступу для комерційної пропозиції з урахуванням вивчених риторичних прийомів.'
vocabulary_hints:
  required:
  - пропозиція (proposal) — комерційна ~, тендерна ~, внести ~ю, розглянути ~ю; висока частотність у бізнесі
  - обґрунтування (justification) — економічне ~, технічне ~, детальне ~, надати ~; база для аргументації
  - рентабельність (profitability) — поріг ~і, ~ інвестицій, розрахунок ~і; ключовий економічний показник
  - конкурентоспроможність (competitiveness) — підвищення ~і, ~ продукції, втрата ~і; стратегічний термін
  - тендер (tender) — оголосити ~, виграти ~, учасник ~у, ~на документація; контекст системи Prozorro
  - методологія (methodology) — ~ дослідження, вибір ~ї; високий академічний та професійний регістр
  - дискурс (discourse) — професійний ~, аналіз ~у, в межах ~у; термін для опису мовного середовища
  - концепція (concept) — розробити ~ю, засаднича ~, ~ розвитку; основа будь-якої пропозиції
  - вжити заходів (to take measures) — коректна форма; вживається замість поширеної помилки «прийняти міри»
  - завдати шкоди (to cause harm) — коректна форма; вживається замість помилкового «нанести шкоду»
  recommended:
  - інтерпретація (interpretation) — неоднозначна ~, ~ даних; важливий термін для аналізу результатів
  - контекстуалізація (contextualization) — необхідність ~ї; адаптація пропозиції до ринкових умов
  - синтез (synthesis) — ~ ідей, аналіз і ~; здатність поєднувати різні аспекти бізнес-плану
  - індикатор успіху (success indicator) — ключові ~и (KPI), визначити ~и; конкретика в обґрунтуванні
  - етапність (phasing) — ~ реалізації, дотримуватися ~і; планування строків проєкту
  - протягом (during/throughout) — часовий маркер; вживається замість суржикового «на протязі»
  - рентабельність інвестицій (ROI) — ключовий показник для фінансового обґрунтування
