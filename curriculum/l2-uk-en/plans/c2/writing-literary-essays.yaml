module: writing-literary-essays
level: C2
sequence: 29
version: '1.2'
title: Мистецтво написання літературного есею
subtitle: Мистецтво написання літературних есе
focus: literature
pedagogy: workshop
objectives:
  - Опанувати жанрову специфіку літературного есею як синтезу наукового аналізу 
    та художньої рефлексії
  - Розвинути навички побудови асоціативної композиції та парадоксальної 
    аргументації
  - Вдосконалити індивідуальний стиль письма через роботу над афористичністю та 
    образністю вислову
  - Навчитися інтегрувати особистий досвід у літературознавчий контекст
content_outline:
  - section: Есеїстика як форма інтелектуальної свободи
    words: 1250
    subsections:
      - 'Генезис есею: від Монтеня до сучасної української інтелектуальної прози'
      - 'Жанрові межі: есе vs стаття, відгук, нарис'
      - 'Суб''єктивність як домінанта: роль автора та його позиції'
    key_concepts:
      - есеїзм
      - інтелектуальна рефлексія
      - дискурсивність
      - автентичність
    primary_sources:
      - Юрій Шевельов, 'Зустрічі з Заходом' (майстерність есеїстичного вислову)
      - Оксана Забужко, 'Хроніки від Фортінбраса' (філософська есеїстика)
  - section: Композиція та архітектоніка есею
    words: 1250
    subsections:
      - Асоціативний монтаж як спосіб організації матеріалу
      - 'Зачин та фінал: стратегії залучення та ''післясмаку'' в читанні'
      - 'Динаміка думки: чергування аналізу, спогаду та прогнозу'
    key_concepts:
      - асоціативність
      - фрагментарність
      - пунктирність
      - кумуляція
  - section: Стилістичні інструменти есеїста
    words: 1250
    subsections:
      - 'Афористичність та лаконізм: мистецтво формулювання тези'
      - Метафора як інструмент пізнання, а не лише прикраса
      - 'Ритміка есеїстичної прози: від коротких речень до розлогих періодів'
    key_concepts:
      - афоризм
      - інтелектуальна метафора
      - ритмомелодика
      - елокуція
  - section: 'Творча лабораторія: від ідеї до тексту'
    words: 1250
    subsections:
      - 'Пошук ''своєї'' теми: як побачити універсальне в приватному'
      - 'Робота з джерелами: цитування, алюзія, прихована полеміка'
      - 'Редагування та шліфування: вилучення зайвого та посилення акцентів'
    key_concepts:
      - інтерпретація
      - алюзійність
      - авторедагування
      - концептуалізація
word_target: 5000
activities:
  types_required:
    - essay-response
    - critical-analysis
    - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Есе
    topic: 'Аналіз есеїстичного стилю Юрія Шевельова: філологічна точність та європейський
      контекст.'
    key_elements:
      - іронія
      - глибока ерудиція
      - багаторівневий синтаксис
    motivation: Вивчення зразка інтелектуальної есеїстики найвищого гатунку.
  - source_type: Філософське есе
    topic: 'Оксана Забужко: полемічність та пристрасність есеїстичного вислову.'
    key_elements:
      - пафос
      - довгий період
      - культурна ідентичність
    motivation: Аналіз сучасного типу есеїстики, що поєднує літературознавство з
      публіцистикою.
listening_situations:
  - media_type: подкаст
    setting: 'Бесіда з сучасним есеїстом: ''Як писати про книги, не переказуючи їх''.'
    focus_points:
      - Пошук власного кута зору
      - Робота з метафорою
    motivation: Розуміння практичних аспектів написання успішного есею.
writing_tasks:
  - task_type: есе
    prompt: Напишіть літературне есе на тему 'Мій діалог з (ім'я автора)', 
      використовуючи асоціативну композицію та демонструючи здатність до 
      глибокої текстової рефлексії.
    requirements:
      - мінімум 600 слів
      - використання щонайменше 3 алюзій
      - наявність парадоксальної тези в зачині
    motivation: Комплексна перевірка навичок есеїстичного письма.
    model_answer: Есе має бути цілісним, демонструвати індивідуальність автора, 
      багатство лексики та здатність до філософського осмислення літературного 
      явища.
discussion_topics:
  - context: Чи може есе бути об'єктивним, чи воно за своєю природою завжди 
      суб'єктивне?
    questions:
      - Де проходить межа між есе та науковою статтею?
      - Яка роль читача у творенні сенсу в есеїстичному тексті?
    motivation: Дискусія про жанрову природу та етичні виміри есеїстики.
activity_hints:
  - type: essay-response
    focus: Напишіть літературне есе з асоціативною композицією. Інтегруйте 
      щонайменше три алюзії та парадоксальну тезу в зачині.
  - type: critical-analysis
    focus: Проаналізуйте есеїстичний стиль Юрія Шевельова. Визначте засоби 
      афористичності, інтелектуальної метафори та ритмомелодики.
  - type: error-correction
    focus: 'Відредагуйте есе: усуньте надмірну абстрактність, покращте зв''язність
      між асоціативними блоками, загострите формулювання тези.'
  - type: fill-in
    focus: Доповніть текст про стилістику есею термінами (есеїзм, 
      дискурсивність, афоризм, алюзійність, кумуляція).
references:
  - Авраменко, 11 клас (Укр. літ.) — Літературний аналіз, есе як жанр
  - Караман, 10 клас (2018), §53 — Стилістичне використання засобів словотвору
  - 'Державний стандарт 2024: C2 — творче письмо, інтелектуальна есеїстика'
phase: C2.2 [Literary Mastery]
