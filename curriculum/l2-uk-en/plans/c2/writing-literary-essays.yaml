title: Написання літературознавчих есеїв
subtitle: 'Introduction: Literary Essay as an Intellectual Genre'
focus: literature
pedagogy: TTT
phase: C2.2 [Literature & Creative Writing]
word_target: 5000
objectives:
- Аналізувати літературні твори на рівні глибокої текстуальної інтерпретації
- Критично оцінювати літературні тексти в контексті української та європейської традицій
- Продукувати вторинні тексти (рецензії, анотації, літературно-критичні есе)
- Застосовувати знання з теми «Стилістика та сучасні дискурсивні практики» у власній мовній практиці
