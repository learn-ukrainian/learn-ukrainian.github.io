content_outline:
- section: 'Вступ: Літературознавчий есей як інтелектуальний жанр (Introduction: Literary Essay as an Intellectual Genre)'
  words: 750
  points:
  - 'Дефініція есею згідно з вимогами Держстандарту §4.3.8: розмежування вторинного тексту (реферат) та авторського аналітичного
    есею'
  - 'Культурний орієнтир: Микола Зеров та неокласична традиція есеїзму («До джерел») як взірець інтелектуальної свободи та
    високої культури слова'
  - 'Жанрові межі: есей vs. рецензія vs. наукова стаття — баланс між суб''єктивним баченням та академічною строгістю'
- section: 'Аналітична стратегія: Від переказу до інтерпретації (Analytical Strategy: From Plot to Interpretation)'
  words: 1050
  points:
  - 'Корекція типової помилки: подолання надмірного переказу сюжету («що сталося») через фокус на аналітичних питаннях «чому?»
    та «як?»'
  - 'Приклад високого стилю: Василь Стус та його «Феномен доби» як зразок поєднання філологічного аналізу з морально-етичною
    позицією автора'
  - 'Методологія С2: формулювання тези (thesis statement), що пропонує оригінальний погляд на твір, а не констатує загальновідомі
    факти'
- section: Аргументація та робота з текстовими доказами (Argumentation and Working with Evidence)
  words: 1200
  points:
  - 'Подолання суб’єктивності без доказів: перетворення емоційного відгуку («це гарно») на аргументовану позицію, підкріплену
    цитатами'
  - 'Техніка цитування: інтеграція прямої мови в авторський наратив та майстерність парафразу без втрати концептуальної глибини'
  - 'Академічна доброчесність: етика посилань на першоджерела та недопустимість плагіату в літературознавчому дискурсі'
- section: Стилістика та сучасні дискурсивні практики (Stylistics and Modern Discursive Practices)
  words: 1000
  points:
  - 'Корекція стилістичного міксу: дотримання інтелектуальної прозорості (academic clarity) та уникнення недоречного пафосу
    або просторіччя'
  - 'Сучасна оптика: феміністичний та деколоніальний дискурс на прикладі праць Соломії Павличко та Віри Агеєвої (перепрочитання
    Лесі Українки та Кобилянської)'
  - 'Термінологічна вправність: доречне використання понять ''парадигма'', ''наратив'', ''екзистенціальний'' у контексті аналізу
    твору'
- section: Алгоритм редагування та досконалість форми (Editing Algorithm and Formal Perfection)
  words: 600
  points:
  - 'Дотримання стандарту §4.3.6: створення логічного та зв’язного тексту за планом, робота над структурою переконуючих переходів'
  - 'Самоперевірка: відповідність аргументів тезі, точність формулювань та усунення мовних кліше'
- section: 'Підсумок: Від чернетки до професійної публікації (Summary: From Draft to Professional Publication)'
  words: 400
  points:
  - Трансформація академічної навички у професійне портфоліо культурного оглядача та критика
  - 'Рецензування: значення конструктивної критики та відгуків колег для розвитку авторського голосу'
vocabulary_hints:
  required:
  - есей (essay) — літературознавчий есей, жанр есею; High frequency, розрізняти зі шкільним твором
  - теза (thesis) — висунути тезу, обґрунтувати тезу, ключова теза; High frequency academic core
  - аргумент (argument) — вагомий аргумент, переконливий аргумент, навести аргументи; Essential for argumentation
  - цитата (quotation) — доречна цитата, підкріпити цитатою, етика цитування; High frequency evidence tool
  - інтерпретація (interpretation) — авторська інтерпретація, множинність інтерпретацій; Key literary term for C2
  - дискурс (discourse) — літературний дискурс, колоніальний дискурс, феміністичний дискурс; High register academic marker
  recommended:
  - парафраз (paraphrase) — вдалий парафраз; використання для аналізу ідей без надмірного цитування
  - контекстуалізація (contextualization) — контекстуалізація твору; зв'язок з епохою та традицією
  - синтез (synthesis) — синтез аргументів; узагальнення аналітичних висновків
  - чернетка (draft) — робоча чернетка; етапність процесу письма
  - рецензування (peer review) — сліпе рецензування; академічний стандарт оцінки якості
