module: c2-067
level: C2
sequence: 67
slug: regional-varieties
version: '2.0'
title: Регіональні різновиди
focus: culture
pedagogy: TTT
phase: C2.4 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Інтерпретувати культурні явища в контексті українського суспільства
- Аналізувати взаємозв'язки між мовою та культурною ідентичністю
- Демонструвати культурну компетентність у професійній комунікації
- Застосовувати знання з теми «Південно-східне наріччя та основа літературної мови» у власній мовній практиці
sources:
- name: Атлас української мови
  url: https://inmo.org.ua/
  type: primary
  notes: Діалектологічний атлас
- name: Словник українських говорів
  url: https://lcorp.ulif.org.ua/
  type: reference
  notes: Діалектна лексика
- name: Українська діалектологія
  url: https://uk.wikipedia.org/wiki/Українські_діалекти
  type: reference
  notes: Огляд діалектних груп
content_outline:
- section: 'Вступ: Діалектна мапа України (Introduction: Dialect Map of Ukraine)'
  words: 600
  points:
  - Класифікація трьох наріч української мови та їх географічне мапування на сучасні області України
  - Концепція діалектів як національного багатства (багатство) та джерела розвитку літературної мови, а не мовних помилок
  - 'Розмежування понять: діалект, наріччя, говір та ізоглоса як межа поширення мовних явищ'
- section: Північне наріччя та архаїка (Northern Dialect Group and Archaism)
  words: 750
  points:
  - 'Поліські говори: фонетична специфіка (ікання, укання) та збереження давньоруських реліктів'
  - Лексичні регіоналізми півночі (полісизми) та їх роль у формуванні специфічного регіонального дискурсу
  - Аналіз північних говорів через призму функціональних стилів за Держстандартом (§4.3.1.1)
- section: 'Південно-західне наріччя: Від Гуцульщини до Галичини (South-Western Group: From Hutsulshchyna to Galicia)'
  words: 1100
  points:
  - 'Гуцульський говір у мистецтві: аналіз мови повісті М. Коцюбинського та фільму С. Параджанова «Тіні забутих предків»'
  - 'Лексика за Держстандартом (§4.3.3): стилістичне використання слів ''ватра'', ''тайстра'', ''колиба'' у художніх текстах'
  - 'Галицькі та буковинські говори: вплив сусідніх мов та специфіка запозичень, що стали частиною регіональної ідентичності'
  - 'Типова помилка: помилкове маркування діалектизмів (напр. ''файний'') як суржику — аналіз структурованої системи діалекту'
- section: Південно-східне наріччя та основа літературної мови (South-Eastern Group and Standard Basis)
  words: 900
  points:
  - 'Слобожанські та степові говори: роль полтавського говору як основи сучасної літературної норми (кейс «Енеїди» Котляревського)'
  - Особливості південно-східної вимови та її домінування в медіа-просторі України
  - Вплив індустріалізації та мовних контактів на лексичний склад південних регіонів
- section: 'Культура мовлення: Діалект vs Суржик (Speech Culture: Dialect vs Surzhyk)'
  words: 900
  points:
  - Суржик як хаотичне змішування мов проти діалекту як історично сформованої мовної системи
  - 'Проблема гіперкорекції: розрізнення реальних русизмів та спільних слов''янських коренів (напр. ''ждати'', ''держати''),
    що збереглися в діалектах'
  - Аналіз побутового суржику та стратегії переходу до чистої літературної мови або свідомого використання діалекту
- section: Мовна норма та стилізація (Language Norm and Stylization)
  words: 750
  points:
  - 'Ставлення до діалектів у сучасному суспільстві: від стигматизації до використання в сучасній музиці та медіа'
  - 'Практикум: аналіз автентичних діалектних текстів з використанням IPA-описів для фонетичних розбіжностей'
  - 'Творче завдання: стилізований переклад (Stylized Translation) стандартного тексту на гуцульський або поліський манер'
vocabulary_hints:
  required:
  - діалект (dialect) — місцевий діалект; носій діалекту; особливості діалекту
  - наріччя (major dialect group) — класифікація наріч; північне/південне наріччя
  - говір (local dialect) — гуцульський/степовий говір; особливості говору
  - суржик (surzhyk) — побутовий суржик; явище змішування мов; уникати суржику
  - ватра (ritual/mountain bonfire) — розпалити ватру; сидіти біля ватри; вівчарська ватра
  - ізоглоса (isogloss) — пучок ізоглос; лінгвістична карта; межа поширення
  recommended:
  - тайстра (hutsul shoulder bag) — традиційна тайстра; вишита тайстра
  - колиба (seasonal shepherd's hut) — гуцульська колиба; зупинитися в колибі
  - гіперкорекція (hypercorrection) — уникнення питомих слів через страх суржику
  - багатство (wealth/richness) — діалектне багатство мови; лексичне багатство
  - регіоналізм (regionalism) — вживання регіоналізмів у літературі
  - файний (fine/good - Galician) — часто плутають із суржиком; маркер західного регіону
