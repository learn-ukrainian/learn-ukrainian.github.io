module: c2-086
level: C2
sequence: 86
version: '1.2'
title: Регіональні варіанти та діалекти
subtitle: Регіональні різновиди та діалекти
focus: vocabulary
pedagogy: seminar
objectives:
  - Проаналізувати класифікацію діалектних груп української мови та їхні ключові
    особливості
  - Дослідити вплив діалектного середовища на формування сучасної літературної 
    норми
  - Вивчити специфіку гуцульського, бойківського та лемківського говорів через 
    літературні тексти
  - Осмислити роль діалектизмів як засобу ідентифікації та художньої виразності
content_outline:
  - section: 'Діалектна карта України: структура та динаміка'
    words: 1250
    subsections:
      - 'Північне (поліське) наріччя: архаїчні риси у фонетиці та морфології'
      - Південно-західне наріччя як найбагатше на говори та різновиди
      - Південно-східне наріччя — основа сучасної літературної мови
    key_concepts:
      - наріччя
      - діалект
      - ізоглоса
      - діалектний континуум
    primary_sources:
      - Атлас української мови (як джерело для аналізу територіального поширення
        явищ)
  - section: Південно-західні говори в літературному дзеркалі
    words: 1250
    subsections:
      - 'Гуцульський говір у творчості Михайла Коцюбинського: магія та мова'
      - Покутська діалектна лексика в новелах Василя Стефаника
      - 'Лемківська та бойківська традиції: збереження унікальних мовних пластів'
    key_concepts:
      - діалектизм
      - локальний колорит
      - етнолінгвістика
      - мовна репрезентація
    primary_sources:
      - Михайло Коцюбинський, «Тіні забутих предків»
      - Василь Стефаник, збірка «Синя книжечка»
  - section: 'Північне та південно-східне наріччя: взаємодія з нормою'
    words: 1250
    subsections:
      - 'Специфіка північних говорів: релікти давньоруської мови'
      - 'Південно-східні діалекти: широта поширення та вплив на розмовний стиль'
      - 'Проблема суржику vs територіальні діалекти: розмежування понять'
    key_concepts:
      - суржик
      - літературна норма
      - мова міста vs мова села
      - мовна інтерференція
    primary_sources:
      - Григорій Тютюнник, «Вир» (використання степових говорів)
  - section: Діалекти в епоху глобалізації та диджиталізації
    words: 1250
    subsections:
      - 'Зникнення чи трансформація: доля діалектів у сучасному світі'
      - Використання діалектної лексики в сучасній музиці та медіа
      - Створення діалектних словників та електронних корпусів
    key_concepts:
      - дифузія
      - мовна мода
      - неодіалектизм
      - цифрова фіксація
    primary_sources:
      - Сучасні музичні проєкти (наприклад, фольк-гурти), що використовують 
        діалекти
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
  - 'Авраменко, 11 клас (2019): Діалекти, варіантність'
  - 'Державний стандарт 2024: C2 — соціолінгвістична компетенція'
reading_situations:
  - source_type: художній твір
    topic: Порівняльний аналіз гуцульського діалекту в «Тінях забутих предків» 
      та покутського в творах Стефаника.
    key_elements:
      - діалектизми
      - фонетичні особливості
      - авторська стратегія
    motivation: Розвиток навичок розрізнення специфічних регіональних форм та їх
      функцій у тексті.
  - source_type: наукова стаття
    topic: 'Юрій Шевельов про генезу українських наріч: теорія та докази.'
    key_elements:
      - прамова
      - міграційні процеси
      - мовні межі
    motivation: Ознайомлення з фундаментальними дослідженнями української 
      діалектології.
listening_situations:
  - media_type: подкаст
    setting: 'Випуск подкасту про експедиції на Полісся: жива мова носіїв архаїчних
      говорів.'
    focus_points:
      - Інтонаційні особливості
      - Специфічні назви побутових предметів
    motivation: Слухання автентичного мовлення з різних регіонів України.
writing_tasks:
  - task_type: репортаж
    prompt: Уявіть, що ви журналіст, який відвідав віддалене село на Закарпатті 
      чи Поліссі. Напишіть репортаж, використовуючи діалектну лексику (з 
      поясненнями), щоб передати атмосферу місця.
    requirements:
      - мінімум 500 слів
      - використання принаймні 10 діалектизмів
      - дотримання стилістики репортажу
    motivation: Творче застосування знань про регіональні особливості мови.
    model_answer: Репортаж має гармонійно поєднувати літературну мову автора з 
      живою мовою персонажів, демонструючи розуміння контексту використання 
      діалектів.
discussion_topics:
  - context: Чи повинна школа навчати дітей літературної мови за рахунок 
      витіснення діалектів?
    questions:
      - Чи є діалекти загрозою єдності мови?
      - Як зберегти діалектне розмаїття в епоху інтернету?
    motivation: Дискусія про цінність мовного різноманіття для національної 
      культури.
activity_hints:
  - type: critical-analysis
    focus: Порівняти гуцульський діалект у 'Тінях забутих предків' з покутським 
      у творах Стефаника
  - type: reading
    focus: Ідентифікувати діалектні особливості (фонетичні, лексичні) у 
      художньому тексті
  - type: essay-response
    focus: Написати репортаж з використанням діалектної лексики для передачі 
      атмосфери регіону
  - type: match-up
    focus: 'Зіставити діалектні слова з їхніми літературними відповідниками: гуцульські,
      бойківські, лемківські форми'
  - type: error-correction
    focus: Розмежувати територіальні діалектизми та суржикові форми у тексті
phase: C2.4 [Meta-Skills & Capstone]
