vocabulary_hints:
  required:
  - клінічне дослідження (clinical study/trial) — рандомізоване ~, подвійне сліпе
    ~, проводити ~; висока частотність у медичному дискурсі
  - вибірка (sample) — репрезентативна ~, обсяг ~и, критерії включення у ~у; ключовий
    методологічний термін
  - статистична значущість (statistical significance) — рівень ~і (p-value), досягти
    ~і; основний показник достовірності результатів
  - доказова медицина (evidence-based medicine) — на засадах ~ої медицини, дані ~ої
    медицини; сучасна парадигма охорони здоров'я
  - рандомізація (randomization) — метод ~ії, стратифікована ~; спеціалізований реєстр
    клінічних випробувань
  - інформована згода (informed consent) — отримати ~у згоду, процедура ~ої згоди;
    юридичний та етичний стандарт
  - академічна доброчесність (academic integrity) — дотримуватися принципів ~ої доброчесності;
    ключове поняття наукової етики
  - первинна кінцева точка (primary endpoint) — досягнення ~ої точки; термін протоколу
    дослідження
  recommended:
  - 'дієвість (efficacy) — Note: розрізняти з «ефективність» (effectiveness) у контексті
    фармакологічних досліджень'
  - 'точний (accurate) — Note: уникати кальки «акуратний» (false friend meaning neat/tidy)'
  - проаналізовано (analyzed) — безособова форма на -но/-то; маркер високого наукового
    стилю замість «був проведений аналіз»
  - встановлено (established) — стандартна фраза для розділу «Результати» або «Висновки»
  - метааналіз (meta-analysis) — найвищий рівень доказовості в ієрархії наукових даних
  - довірчий інтервал (confidence interval) — стандартний статистичний показник у
    медичних звітах
