content_outline:
- section: 'Вступ: Наукова медична діяльність та Академія медичних наук (Introduction:
    Medical Science in Ukraine)'
  words: 400
  points:
  - 'Огляд системи медичної науки в Україні: роль Національної академії медичних наук
    (НАМН) та провідних установ, як-от Інститут серцево-судинної хірургії ім. М.М.
    Амосова'
  - 'Медична періодика як джерело наукового дискурсу: аналіз вимог видань «Український
    медичний часопис» та «Львівський клінічний вісник»'
  - 'Державний стандарт: опанування наукового стилю мовлення та створення вторинних
    текстів (анотацій, рефератів) відповідно до вимог С2'
- section: 'Структура наукової статті: Стандарт IMRAD та академічна доброчесність
    (Structure of a Scientific Article: IMRAD and Academic Integrity)'
  words: 500
  points:
  - 'Глобальний стандарт IMRAD (Вступ, Методи, Результати, Обговорення) в українському
    науковому контексті: логіка та взаємозв''язок частин'
  - 'Принципи академічної доброчесності (academic integrity): боротьба з плагіатом,
    етика цитування та відповідальність дослідника в епоху відкритої науки'
  - 'Стилістичні маркери високого наукового стилю: використання безособових форм на
    -но/-то (досліджено, виявлено, встановлено) замість застарілих пасивних конструкцій'
- section: 'Методологія: Дизайн дослідження та вибірка (Methodology: Study Design
    and Sampling)'
  words: 500
  points:
  - 'Типологія клінічних досліджень: рандомізовані контрольовані, подвійні сліпі та
    когортні дослідження; термінологія «доказової медицини» (EBM)'
  - 'Дизайн та протокол дослідження: формування репрезентативної вибірки, визначення
    обсягу вибірки та критеріїв включення/виключення'
  - 'Рандомізація як метод мінімізації систематичних помилок: стратифікована та блокова
    рандомізація; рандомізоване дослідження як ''золотий стандарт'''
- section: 'Результати: Статистична значущість та інтерпретація (Results: Statistical
    Significance and Interpretation)'
  words: 500
  points:
  - 'Обробка та візуалізація даних: вимоги до таблиць, рисунків та описової статистики
    в сучасних медичних публікаціях'
  - 'Поняття статистичної значущості: коректна інтерпретація p-value (рівень значущості)
    та довірчих інтервалів; розрізнення статистичної та клінічної значущості'
  - 'Коректна інтерпретація результатів: уникнення хибних кореляцій та обґрунтування
    наукової новизни отриманих даних'
- section: Етика та доказова медицина (Ethics and Evidence-Based Medicine)
  words: 400
  points:
  - 'Етичні засади досліджень за Хельсінською декларацією: роль етичних комітетів
    та процедура отримання інформованої згоди (informed consent)'
  - 'Лексична точність у науці: розрізнення понять «ефективність» (effectiveness —
    у реальних умовах) та «дієвість» (efficacy — в ідеальних умовах дослідження)'
  - 'Конфлікт інтересів та прозорість фінансування: міжнародні вимоги до розкриття
    інформації в медичних статтях'
- section: Презентація та захист результатів (Presentation and Defense of Results)
  words: 400
  points:
  - 'Підготовка наукової доповіді та постерної презентації: візуальна грамотність,
    структура тез та ораторське мистецтво Senior Specialist'
  - 'Процедура захисту дисертації в Україні: вимоги ДАК, ведення наукової дискусії
    та стратегії відповіді на критичні запитання опонентів'
  - 'Формулювання висновків та практичних рекомендацій: використання модального хеджування
    для відображення наукової обережності та точності'
- section: 'Практикум: Наукове письмо та аналіз помилок (Workshop: Scientific Writing
    and Error Analysis)'
  words: 300
  points:
  - 'Робота над типовими помилками: виправлення калькованих пасивів (заміна «було
    проведено аналіз» на «проаналізовано») та хибних друзів перекладача («акуратний»
    замість «точний»)'
  - Написання анотації (abstract) та підбір ключових слів українською мовою відповідно
    до вимог міжнародних баз даних (Scopus, Web of Science)
  - 'Критичний аналіз медичної публікації: оцінка методологічної якості статті та
    перевірка логічної відповідності висновків отриманим результатам'
vocabulary:
  required:
  - клінічне дослідження (clinical study/trial)
  - дизайн дослідження (study design)
  - вибірка (sample)
  - статистична значущість (statistical significance)
  - етичний комітет (ethics committee)
  - інформована згода (informed consent)
  - рандомізація (randomization)
  - плацебо (placebo)
  - контрольна група (control group)
  - первинна кінцева точка (primary endpoint)
  recommended:
  - подвійне сліпе (double-blind)
  - когорта (cohort)
  - метааналіз (meta-analysis)
  - систематичний огляд (systematic review)
  - довірчий інтервал (confidence interval)
  forbidden: '[]'
