slug: spozhyvannya-i-posluhy
version: '2.0'
title: Споживання і послуги
subtitle: Consumer Culture and Services
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати споживчу культуру в Україні, включно з захистом прав споживачів, рекламною риторикою та тенденціями
  електронної комерції, з використанням відповідної фахової термінології
- Learner can critically evaluate advertising strategies, product labeling claims, and consumer protection mechanisms
  using nuanced analytical discourse in Ukrainian
- Обговорювати харчову безпеку, дієтичні тенденції та кулінарні традиції України на рівні академічного та публіцистичного
  дискурсу
- Learner can compose a formal complaint (рекламація) and navigate banking, insurance, and automotive services using
  appropriate official register in Ukrainian
