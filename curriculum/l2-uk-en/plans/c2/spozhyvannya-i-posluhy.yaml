module: c2-078
level: C2
sequence: 78
version: 1.2.1
title: 'Споживання та послуги: Економіка вибору та культура сервісу'
subtitle: Споживання і послуги
focus: vocabulary
pedagogy: workshop
objectives:
- Проаналізувати трансформацію споживчої поведінки в умовах цифровізації та глобалізації
- Опанувати термінологію у сферах маркетингу, захисту прав споживачів та економіки вражень
- Дослідити етичні аспекти надмірного споживання та перехід до відповідального використання ресурсів
- Вдосконалити навички комунікації у сфері послуг високого рівня та вирішення конфліктних ситуацій
content_outline:
- section: 'Суспільство споживання: соціолінгвістичний та економічний аналіз'
  words: 1250
  subsections:
  - 'Від потреби до бажання: психологічні механізми сучасного маркетингу'
  - Культура брендів та лояльність споживачів у цифрову епоху
  - Феномен інфлюенс-маркетингу та його вплив на формування стилю життя
  key_concepts:
  - споживацтво
  - маркетингова стратегія
  - цільова аудиторія
  - позиціонування
  primary_sources:
  - Євген Гуцало, есе 'З погляду вічності' (філософська рефлексія про матеріальні та духовні цінності)
- section: Економіка вражень та нові стандарти клієнтського сервісу
  words: 1250
  subsections:
  - 'Послуга як продукт: від базового функціоналу до емоційного досвіду'
  - 'Стандарти сервісу (SOP) у преміальному сегменті: мовні формули та етикет'
  - 'Діджиталізація послуг: персоналізація, автоматизація та омніканальність'
  key_concepts:
  - клієнтський досвід (CX)
  - персоналізація
  - економіка вражень
  - стандартизація
- section: Права споживачів та правові механізми їх захисту в Україні
  words: 1250
  subsections:
  - 'Аналіз законодавства: права, обов''язки та процедури оскарження'
  - 'Електронна комерція: специфіка захисту прав при онлайн-покупках'
  - Роль державних органів та громадських організацій у захисті інтересів споживачів
  key_concepts:
  - рекламація
  - гарантійні зобов'язання
  - публічна оферта
  - відшкодування збитків
  primary_sources:
  - Закон України 'Про захист прав споживачів' (ключові терміни та правові норми)
- section: Від свідомого споживання до економіки замкненого циклу
  words: 1250
  subsections:
  - Zero Waste, мінімалізм та шеринг-економіка (sharing economy)
  - 'Екологічне маркування та сертифікація товарів: як читати етикетки'
  - Відповідальне споживання як елемент громадянської ідентичності
  key_concepts:
  - мінімалізм
  - сталий розвиток
  - екологічне маркування
  - шеринг
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - error-correction
  - translate
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Ворон, 11 клас (2019): с. 239-240 — Професійний дискурс'
reading_situations:
- source_type: Юридичний текст
  topic: Аналіз Закону України 'Про захист прав споживачів'. Вивчення процедури подання рекламації.
  key_elements:
  - істотний недолік
  - висновок експертизи
  - термін усунення
  motivation: Опанування правового дискурсу захисту власних інтересів.
- source_type: Філософське есе
  topic: Рефлексії Євгена Гуцала про баланс між матеріальним та духовним. Аналіз мовних засобів художньої публіцистики.
  key_elements:
  - символ
  - антитеза
  - екзистенційний вибір
  motivation: Розвиток здатності до глибокої філософської інтерпретації текстів про споживання.
listening_situations:
- media_type: відео
  setting: Тренінг для персоналу готельного комплексу преміум-класу про культуру мовлення та етикет.
  focus_points:
  - Мовні формули ввічливості
  - Алгоритм роботи зі скаргами клієнтів
  motivation: Вивчення професійного етикету у сфері послуг.
writing_tasks:
- task_type: офіційний лист
  prompt: Напишіть обґрунтовану претензію (рекламацію) до компанії-виробника або надавача послуг щодо неякісного товару або
    сервісу.
  requirements:
  - мінімум 400 слів
  - використання офіційно-ділового стилю
  - посилання на норми закону
  motivation: Практичне відпрацювання навичок ділового листування у конфліктних ситуаціях.
  model_answer: Лист має містити чіткий опис проблеми, вимоги споживача згідно із законодавством та бути витриманим у коректному
    офіційному тоні.
discussion_topics:
- context: Чи може сучасна економіка вижити без постійного зростання споживання, і чи готові ми до свідомого обмеження?
  questions:
  - 'Що робить нас щасливими: речі чи враження?'
  - Як протистояти маніпуляціям реклами у повсякденному житті?
  motivation: Дебати про цінності суспільства та майбутнє глобальної економіки.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про суспільство споживання: соціолінгвістичний та економічний аналіз і дайте відповіді на запитання
    щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про економіка вражень та нові стандарти клієнтського сервісу, використовуючи
    нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Суспільство споживання: соціолінгвістичний та економічний
    аналіз». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему суспільство споживання: соціолінгвістичний
    та економічний аналіз.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до суспільство споживання: соціолінгвістичний та економічний аналіз: Від потреби до бажання:
    психологічні механізми сучасного маркетингу. Визначте спільне та відмінне.'
