content_outline:
- section: 'Вступ: Споживчий дискурс на рівні С2 (Introduction: Consumer Discourse at C2 Level)'
  words: 600
  points:
  - 'From transactional shopping vocabulary (A2-B2) to analytical consumer discourse: the C2 learner engages with consumer
    culture through legal frameworks, rhetorical analysis, and institutional critique.'
  - 'State Standard themes 3.14, 3.15, 3.16: integrated coverage of Покупки та товари, Харчування, and Послуги as
    interconnected domains of consumer life in contemporary Ukraine.'
  - 'Register expectations: офіційно-діловий (complaints, contracts), рекламний (advertising rhetoric), науковий (food
    science, nutrition), and розмовний (everyday consumer interactions).'
- section: Захист прав споживачів і рекламна риторика (Consumer Protection and Advertising Rhetoric)
  words: 750
  points:
  - 'Consumer protection framework: Закон «Про захист прав споживачів», Держпродспоживслужба, the right to return goods
    (право на повернення товару), warranty obligations (гарантійні зобов''язання), and dispute resolution mechanisms.'
  - 'Advertising rhetoric and manipulation: analyzing рекламні слогани, persuasion techniques (емоційний вплив, соціальний
    доказ, хибний авторитет), hidden conditions in promotional offers, and legal restrictions on advertising claims.'
  - 'Online shopping and e-commerce: rights in онлайн-торгівля (distance selling), platform responsibility (маркетплейс),
    payment security, counterfeit goods (контрафактна продукція), and the Ukrainian e-commerce boom (Rozetka, Prom.ua).'
- section: Склад продуктів і харчова безпека (Product Composition and Food Safety)
  words: 750
  points:
  - 'Food labeling and composition: reading етикетки (labels), understanding харчова цінність (nutritional value), additives
    (харчові добавки, E-коди), allergen declarations, and organic certification (органічна продукція).'
  - 'GMO debate: генномодіфіковані організми in Ukrainian agriculture and food production, labeling requirements, public
    attitudes, scientific consensus, and the regulatory framework (маркування ГМО).'
  - 'Food safety institutions: HACCP standards (НАССР), sanitary norms (санітарні норми), food recalls (відкликання продукції),
    and the role of Держпродспоживслужба in monitoring food safety across the supply chain.'
- section: Дієтичні тенденції та кулінарні традиції (Dietary Trends and Culinary Traditions)
  words: 700
  points:
  - 'Modern dietary trends in Ukraine: вегетаріанство, веганство, безглютенова дієта, кетогенна дієта, інтервальне голодування;
    how global trends interact with Ukrainian food culture and availability.'
  - 'Ukrainian culinary traditions: борщ as UNESCO intangible heritage, regional cuisines (галицька, подільська, слобожанська
    кухні), ritual foods (кутя, паска, узвар), and the revitalization of traditional Ukrainian gastronomy.'
  - 'Food industry and gastrotourism: restaurant culture (ресторанний бізнес), street food, craft production (крафтове
    виробництво), farmers'' markets (фермерські ринки), and gastrotourism as cultural tourism.'
- section: Банківські, страхові та поштові послуги (Banking, Insurance, and Postal Services)
  words: 750
  points:
  - 'Banking services: types of accounts (поточний рахунок, депозитний рахунок), credit products (кредитна картка,
    споживчий кредит, іпотека), mobile banking (мобільний банкінг), and the cashless economy (безготівкові розрахунки).'
  - 'Insurance services: types of insurance (страхування життя, медичне страхування, ОСЦПВ — обов''язкове страхування
    цивільно-правової відповідальності), policy terms (страховий поліс, страхова виплата), and claim procedures.'
  - 'Postal and delivery services: Укрпошта, Нова Пошта, Meest; tracking (відстеження), customs declarations (митна
    декларація), international shipping, and the revolution in Ukrainian logistics infrastructure.'
- section: Автосервіс, рекламації та форми оплати (Automotive Services, Complaints, and Payment Forms)
  words: 750
  points:
  - 'Automotive services: СТО (станція технічного обслуговування), АЗС (автозаправна станція), технічний огляд, ремонт
    автомобіля; navigating service terminology, warranty claims, and vehicle documentation.'
  - 'Formal complaints and reclamations: writing a рекламація (formal complaint), structure of a скарга (grievance), the
    претензія procedure, escalation to Держпродспоживслужба or court, and the discourse of customer dissatisfaction.'
  - 'Payment forms and financial literacy: готівка vs безготівковий розрахунок, QR-оплата, кешбек programs, buy-now-pay-later
    (розстрочка), digital wallets, and cryptocurrency regulations in Ukraine.'
- section: 'Практикум: Споживчий аналіз і рекламація (Workshop: Consumer Analysis and Formal Complaint)'
  words: 700
  points:
  - 'Applied analysis: deconstructing an advertising text to identify persuasion techniques, hidden conditions, and
    potentially misleading claims using consumer protection law as an analytical framework.'
  - 'Document production: composing a formal рекламація or скарга about a defective product or unsatisfactory service,
    following the conventions of офіційно-діловий стиль and citing relevant consumer protection legislation.'
  - 'Comparative analysis: evaluating banking or insurance products from competing providers using authentic terms and
    conditions documents, synthesizing findings in a consumer advisory brief.'
vocabulary_hints:
  required:
  - генномодифікований (genetically modified) — генномодифікований організм, генномодифіковані продукти; food safety policy term
  - рекламація (formal complaint/reclamation) — подати рекламацію, розгляд рекламації; official-business register for disputes
  - споживчий (consumer) — споживчі права, споживчий кредит, споживчий ринок; core consumer protection terminology
  - страхова компанія (insurance company) — вибір страхової компанії, послуги страхової компанії; financial services register
  - кредитна картка (credit card) — оформлення кредитної картки, ліміт кредитної картки; banking services terminology
  - скарга (complaint/grievance) — подати скаргу, розгляд скарги; formal dispute resolution register
  - дієта (diet) — збалансована дієта, лікувальна дієта; nutrition and health discourse
  - кулінарний (culinary) — кулінарні традиції, кулінарна спадщина; gastrocultural register
  - замовлення (order) — онлайн-замовлення, оформити замовлення; e-commerce and service terminology
  - незадоволення якістю (dissatisfaction with quality) — висловити незадоволення якістю, скарга на якість; consumer complaint
    register
  recommended:
  - маркетинговий (marketing) — маркетингова стратегія, маркетингова кампанія; advertising analysis register
  - франшиза (franchise) — відкрити франшизу, франчайзингова мережа; business model terminology
  - гарантійний (warranty) — гарантійний строк, гарантійне обслуговування; consumer rights register
  - харчова безпека (food safety) — стандарти харчової безпеки, контроль харчової безпеки; regulatory food science term
  - кешбек (cashback) — програма кешбеку, отримати кешбек; digital payment loanword
