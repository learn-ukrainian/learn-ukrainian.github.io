module: c2-056
level: C2
sequence: 56
version: 1.2.2
title: 'Міждисциплінарна комунікація: Синтез терміносистем та концептів'
subtitle: Крос-доменна комунікація
focus: professional
pedagogy: seminar
objectives:
- Розвинути здатність до ефективної комунікації на стику різних професійних 
  галузей
- Опанувати методику 'перекладу' вузькоспеціалізованих концептів для фахівців 
  суміжних доменів
- Навчитися синтезувати термінологічні системи для опису складних 
  мультидисциплінарних об'єктів
- Вдосконалити навички створення інтеграційних текстів (проєктів, оглядів, 
  стратегій) українською мовою
content_outline:
- section: Феномен міждисциплінарності у сучасній українській науці та бізнесі
  words: 1250
  subsections:
  - Поняття 'наукового горизонту' та необхідність подолання галузевої 
    герметичності
  - 'Трансфер знань: як ідеї однієї галузі трансформують іншу через мову'
  - Створення спільних комунікативних протоколів для команд з різних професійних
    сфер
  key_concepts:
  - міждисциплінарність
  - трансфер знань
  - комунікативний протокол
  - синергетика
  primary_sources:
  - Статті з часопису 'Світогляд' (аналіз міждисциплінарних підходів у науці)
- section: Методика деспеціалізації та адаптації професійних смислів
  words: 1250
  subsections:
  - Мовні стратегії пояснення складних термінів через аналогію, метафору та 
    візуалізацію
  - Баланс між спрощенням (для розуміння) та точністю (для фаховості)
  - Трансформація наукового дискурсу в науково-популярний та управлінський
  key_concepts:
  - деспеціалізація
  - аналогія
  - когнітивна метафора
  - контекстуалізація
- section: Гібридні терміносистеми та неологотворення
  words: 1250
  subsections:
  - Процеси взаємопроникнення термінології (наприклад, біоінформатика, юридична 
    психологія)
  - Правила створення та адаптації нових термінів на межі наук відповідно до 
    норм української мови
  - Забезпечення однозначності вживання запозичених термінів у 
    мультидисциплінарному контексті
  key_concepts:
  - гібридний термін
  - термінополе
  - неологізм
  - лінгвістична адаптація
  primary_sources:
  - Термінологічні словники на стику галузей (аналіз способів дефініції нових 
    понять)
- section: 'Проєктування міждисциплінарного продукту: текстовий вимір'
  words: 1250
  subsections:
  - 'Структурування інтеграційних документів: стратегій розвитку, комплексних експертиз'
  - Об'єднання різних стилістичних манер у межах одного колективного звіту
  - Роль лідера-комунікатора у забезпеченні змістової єдності міждисциплінарного
    тексту
  key_concepts:
  - інтеграційний текст
  - комплексна експертиза
  - редагування
  - дискурсивна єдність
- section: Підсумок — Summary
  words: 300
  points:
  - "The methodology of 'деспеціалізація' involves using analogy and cognitive metaphor
    to explain complex professional terms across different fields. Self-check: Explain
    a complex concept from your profession using a 'когнітивна метафора'. What is
    the critical balance between 'спрощення' (simplification) and 'точність' (accuracy)?"
  - "Creating an 'інтеграційний текст' requires standardizing 'гібридні терміни' and
    combining different stylistic manners into one cohesive document. Self-check:
    What is the role of a 'лідер-комунікатор' in ensuring 'дискурсивна єдність'? Describe
    3 rules for adapting borrowed terms on the intersection of sciences."
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Державний стандарт 2024: C2 — професійна компетенція'
reading_situations:
- source_type: Науково-популярна стаття
  topic: Аналіз текстів з журналу 'Світогляд'. Дослідження способів пояснення 
    складних фізичних концептів гуманітаріям.
  key_elements:
  - популяризація науки
  - міжсвітова комунікація
  - інтелектуальний діалог
  motivation: Вивчення стратегій адаптації складного змісту для широкої 
    професійної аудиторії.
- source_type: Словникова передмова
  topic: Аналіз принципів укладання міждисциплінарних словників. Вивчення 
    методів узгодження значень термінів.
  key_elements:
  - дефініція
  - полісемія
  - термінологічний стандарт
  motivation: Розуміння лексикографічних викликів при роботі з декількома 
    галузями одночасно.
listening_situations:
- media_type: лекція
  setting: Презентація стартапу, що поєднує ІТ та екологію, для інвесторів та 
    фахівців обох галузей.
  focus_points:
  - Використання мостиків (analogies) між технічною та біологічною мовами
  - Забезпечення зрозумілості презентації для різнопланових експертів
  motivation: Сприйняття та оцінювання ефективності міждисциплінарного пітчу.
writing_tasks:
- task_type: есе
  prompt: Опишіть складний концепт із вашої галузі так, щоб його зрозумів 
    фахівець із зовсім іншої сфери (наприклад, фізик — лінгвісту). Використайте 
    метод аналогії та уникайте професійного жаргону.
  requirements:
  - мінімум 600 слів
  - використання метафор
  - перевірка зрозумілості через контрольні запитання
  motivation: Тренування навичок деспеціалізації та адаптації професійного 
    мовлення.
  model_answer: Текст має бути доступним, але не примітивним. Автор повинен 
    вдало підібрати аналогії, які розкривають сутність явища, не втрачаючи його 
    наукової чи професійної ваги.
discussion_topics:
- context: Чи веде міждисциплінарність до втрати глибини фахових знань через 
    'розмивання' термінології?
  questions:
  - Яка галузь сьогодні має найбільший вплив на формування загальнонаукової 
    мови?
  - Як виховати фахівця-комунікатора, здатного працювати на межі різних 
    дисциплін?
  motivation: Обговорення стратегічних викликів сучасної освіти та професійної 
    діяльності.
activity_hints:
- type: reading
  focus: Прочитайте текст про феномен міждисциплінарності у сучасній українській
    науці та бізнесі і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про методика деспеціалізації та 
    адаптації професійних смислів, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Феномен 
    міждисциплінарності у сучасній українській науці та бізнесі». Обґрунтуйте 
    свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    феномен міждисциплінарності у сучасній українській науці та бізнесі.
- type: comparative-study
  focus: 'Порівняйте різні підходи до феномен міждисциплінарності у сучасній українській
    науці та бізнесі: Поняття ''наукового горизонту'' та необхідність подолання галузевої
    герметичності. Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
