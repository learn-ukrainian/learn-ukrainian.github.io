vocabulary_hints:
  required:
  - міжгалузевий (cross-domain) — міжгалузеві зв'язки, міжгалузевий проєкт, міжгалузевий
    підхід; середня частота в академічному дискурсі
  - популяризація (popularization) — популяризація науки, популяризація знань; висока
    частота в публіцистиці
  - авдиторія (audience) — цільова авдиторія, широка авдиторія, залучення авдиторії;
    висока частота
  - спрощення (simplification) — виправдане спрощення, спрощення без втрати змісту;
    середня частота
  - адаптація (adaptation) — адаптація тексту, адаптація матеріалу, мовна адаптація;
    висока частота
  recommended:
  - порозумітися (to reach an understanding) — вживається замість поширеної кальки
    'знаходити спільну мову'
  - аналізувати (to analyze) — динамічна заміна обтяженого канцеляризму 'здійснювати
    аналіз'
  - примітивізація (primitivization) — термін для опису негативного наслідку надмірного
    або невдалого спрощення
  - когнітивне навантаження (cognitive load) — професійний термін для оцінки труднощів
    сприйняття інформації авдиторією
  - вторинний текст (secondary text) — термін Держстандарту для рефератів та анотацій,
    створених на основі першоджерел
