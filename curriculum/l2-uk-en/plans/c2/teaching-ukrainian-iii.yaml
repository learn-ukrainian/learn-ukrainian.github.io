title: Викладання української мови III — Розробка матеріалів
subtitle: Introduction — The Role of Materials in Language Learning
focus: practice
pedagogy: TTT
phase: C2.5 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Аналізувати та класифікувати явища Адаптація та стильова трансформація у автентичних текстах
- Продукувати тексти з коректним застосуванням Розробка завдань та вторинних текстів
- Оцінювати стилістичну доречність мовних засобів у контексті Викладання української мови III — Розробка матеріалів
- Застосовувати знання з теми «Розробка завдань та вторинних текстів» у власній мовній практиці
