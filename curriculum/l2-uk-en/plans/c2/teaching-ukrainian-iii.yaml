content_outline:
- section: Вступ — Роль матеріалів у навчанні мови (Introduction — The Role of Materials
    in Language Learning)
  words: 650
  points:
  - 'Аналіз підручника як базису навчання: критерії якості сучасних навчальних матеріалів
    та баланс між автентичністю та навчальною доцільністю.'
  - 'Ітеративний цикл розробки: шлях від методологічної концепції через пілотування
    до фінального вдосконалення на основі зворотного зв''язку.'
- section: Адаптація та стильова трансформація (Adaptation and Stylistic Transformation)
  words: 1150
  points:
  - 'Трансформація стилів згідно з Держстандартом (§4.3.7): практичні техніки перетворення
    наукових текстів у науково-популярні та офіційних у публіцистичні для потреб учнів.'
  - 'Ризики «стерилізації» тексту: аналіз типової помилки надмірного спрощення, що
    знищує культурні маркери; стратегії використання глосаріїв та лінгвокраїнознавчих
    коментарів.'
  - 'Градуювання (grading) та «scaffolding»: розробка різнорівневих завдань до одного
    автентичного тексту без втрати його природної цілісності.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: Розробка завдань та вторинних текстів (Development of Tasks and Secondary
    Texts)
  words: 1150
  points:
  - 'Створення вторинних текстів (§4.3.8): методика навчання розробці рефератів, анотацій
    та довідкових матеріалів як автономних навчальних продуктів.'
  - 'Типологія вправ: перехід від механічних до комунікативних завдань; послідовність
    «сприйняття — аналіз — продукція».'
  - 'Помилка «невідповідності інструкції»: аналіз кейсів, де мова інструкції складніша
    за мову самого завдання; вимоги до чіткості та лаконічності формулювань.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: Культурний контекст та авторська візія (Cultural Context and Authorial
    Vision)
  words: 1000
  points:
  - 'Спадщина Бориса Грінченка: застосування принципу поєднання мовної норми з живим
    народним мовленням при укладанні навчальних збірників.'
  - 'Модель Василя Сухомлинського: використання життєвого досвіду та емоційного залучення
    (концепція «Школи під голубим небом») для створення авторського контенту.'
- section: Мультимедіа, ШІ та професійна етика (Multimedia, AI, and Professional Ethics)
  words: 1050
  points:
  - 'Роль візуальної підтримки та мультимедіа: відбір відео- та аудіоматеріалів, що
    відповідають когнітивному рівню учнів та культурному контексту.'
  - 'Використання штучного інтелекту (AI): етичні аспекти генерації вправ та обов''язкова
    роль методиста-редактора у верифікації згенерованого контенту.'
  - 'Правові аспекти розробки: дотримання авторських прав, ліцензування освітніх продуктів
    та правила етичного цитування автентичних джерел.'
