vocabulary_hints:
  required:
  - автентичний текст (authentic text) — збереження автентичності, автентичні матеріали;
    ключовий термін професійного дискурсу
  - адаптація тексту (text adaptation) — рівнева адаптація, методи адаптації; трансформація
    згідно з Держстандартом (§4.3.7)
  - пілотування (piloting) — пілотування матеріалів, етап пілотування, апробація курсу;
    професійний реєстр
  - градуювання (grading) — градуювання складності, принцип градуювання; техніка диференціації
    завдань
  - інструкція до завдання (task instruction) — чітка інструкція, сформулювати інструкцію;
    уникнення помилки невідповідності рівня
  - навчальні матеріали (teaching materials) — концепція, розробка, вдосконалення
  - ітеративний процес (iterative process) — цикл розробки, зворотний зв'язок, вдосконалення
  - авторське право (copyright) — дотримання авторських прав, ліцензування, цитування
  recommended:
  - стерилізація тексту (text sterilization) — надмірне спрощення, що вилучає ідіоми
    та культурні маркери
  - вторинний текст (secondary text) — реферат, анотація, повідомлення згідно з §4.3.8
  - стильова трансформація (stylistic transformation) — перетворення регістру тексту
    для навчальних цілей
  - методологія (methodology) — методологія розробки вправ
  - контекстуалізація (contextualization) — занурення матеріалу в реальний культурний
    контекст
  - дискурс (discourse) — навчальний дискурс, професійне мовлення педагога
