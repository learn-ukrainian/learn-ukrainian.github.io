module: teaching-ukrainian-iii
level: C2
sequence: 90
version: "1.0"
title: "Методика викладання української мови III"
subtitle: "Teaching Methodology III"
focus: professional
pedagogy: workshop
objectives:
  - "Дослідити сучасні цифрові інструменти та платформи для викладання української мови (LMS, застосунки, ШІ)"
  - "Навчитися створювати власні автентичні навчальні матеріали на основі медіа, літератури та соціальних мереж"
  - "Опанувати методи верифікації контенту за допомогою RAG-технологій та лінгвістичних баз даних"
  - "Сформувати стратегію професійного розвитку та інтеграції в глобальну спільноту викладачів української мови"
content_outline:
  - section: "Цифрова трансформація навчання мови"
    words: 1000
    subsections:
      - "Огляд платформ для управління навчанням (Canvas, Google Classroom, Moodle) в контексті УМІ"
      - "Мобільні застосунки для вивчення мови: від Duolingo до спеціалізованих українських ресурсів"
      - "Гейміфікація та інтерактивні інструменти (Kahoot, Quizlet, Miro) на уроці"
    key_concepts:
      - "LMS (Learning Management System)"
      - "гейміфікація"
      - "цифрова грамотність"
      - "blended learning (змішане навчання)"
    primary_sources:
      - "Огляди освітніх технологій (EdTech) для викладання мов"
  - section: "Створення та адаптація автентичних матеріалів"
    words: 1000
    subsections:
      - "Використання новин, соцмереж та YouTube як джерела живого мовного матеріалу"
      - "Дидактизація художніх текстів та поезії: як зробити складне доступним"
      - "Авторське право та етика використання чужого контенту в освітніх цілях"
    key_concepts:
      - "дидактизація"
      - "реалії"
      - "мультимедійний контент"
      - "авторське право"
    primary_sources:
      - "Приклади дидактизованих текстів з сучасних платформ (наприклад, 'Є-мова')"
  - section: "Штучний інтелект та RAG у роботі викладача"
    words: 1000
    subsections:
      - "Використання LLM (ChatGPT, Gemini) для генерації ідей, вправ та текстів"
      - "Технологія RAG (Retrieval-Augmented Generation) як інструмент верифікації та точності"
      - "Етичні виклики використання ШІ: де проходить межа між допомогою та плагіатом"
    key_concepts:
      - "Штучний інтелект"
      - "RAG (пошукова генерація)"
      - "галюцинація моделі"
      - "верифікація"
    primary_sources:
      - "Технічна документація до лінгвістичних ШІ-інструментів"
  - section: "Професійний розвиток та спільнота"
    words: 1000
    subsections:
      - "Міжнародні асоціації викладачів української мови (наприклад, УАУМІ)"
      - "Безперервна освіта: конференції, курси та обмін досвідом"
      - "Створення власного професійного бренду та портфоліо вчителя"
    key_concepts:
      - "networking"
      - "професійне портфоліо"
      - "сертифікація"
      - "м'які навички (soft skills)"
    primary_sources:
      - "Матеріали конференцій Міжнародної асоціації україністів"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "науково-популярна стаття"
    topic: "Як штучний інтелект змінює роль викладача мови: від транслятора знань до модератора процесу."
    key_elements: ["персоналізація", "автоматизація", "людський фактор"]
    motivation: "Осмислення майбутнього професії в епоху цифрових змін."
  - source_type: "методичний звіт"
    topic: "Ефективність використання RAG-систем для перевірки граматичної правильності студентських робіт."
    key_elements: ["точність", "швидкість", "мовна модель"]
    motivation: "Ознайомлення з передовими технологічними рішеннями для викладання."
listening_situations:
  - media_type: "подкаст"
    setting: "Інтерв'ю з розробником освітнього софту: 'Чому українській мові потрібні власні цифрові корпуси та моделі'."
    focus_points:
      - "Проблема дефіциту даних для української мови"
      - "Перспективи створення ідеального мовного застосунку"
    motivation: "Розуміння технічної сторони створення цифрових освітніх ресурсів."
writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть проєктну пропозицію (репортаж-план) для створення власного цифрового ресурсу для вивчення української мови. Опишіть цільову аудиторію, основні функції та методи верифікації контенту."
    requirements: ["мінімум 500 слів", "структурований виклад", "обґрунтування інноваційності"]
    motivation: "Розвиток стратегічного мислення та креативності в професійній сфері."
    model_answer: "Проєкт має містити аналіз ринку, опис унікальних переваг (USP), технічну схему роботи та план маркетингової стратегії."
discussion_topics:
  - context: "Чи замінить ШІ вчителя української мови найближчим часом?"
    questions:
      - "Чого машина ніколи не зможе навчити?"
      - "Як зберегти 'живу' мову в цифровому середовищі?"
    motivation: "Дискусія про цінність людського спілкування в освітньому процесі."
