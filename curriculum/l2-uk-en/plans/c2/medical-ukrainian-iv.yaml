content_outline:
- section: 'Вступ: Клінічне мислення та медична деонтологія (Introduction: Clinical
    Thinking and Medical Deontology)'
  words: 700
  points:
  - Алгоритми диференційної діагностики та впровадження клінічних протоколів МОЗ як
    фундаментальний стандарт професійної діяльності (§3.11 Державного стандарту).
  - 'Медична філософія Миколи Амосова: розгляд концепції «обмеження напружень» та
    її вплив на сучасну українську кардіохірургію та біокібернетику.'
  - 'Професійна ідентичність та мовний етикет: розмежування понять «лікар» (назва
    професії) та «доктор» (науковий ступінь) у клінічному середовищі.'
- section: Терапевтичні сценарії та граматичні аспекти (Therapeutic Scenarios and
    Grammatical Aspects)
  words: 800
  points:
  - 'Комунікація з пацієнтами при серцево-судинних та респіраторних захворюваннях:
    стратегії дотримання уніфікованих клінічних протоколів.'
  - 'Граматичний фокус на роді іменника «біль»: запобігання поширеній помилці (вживання
    «гострий біль» замість суржикового «гостра біль»).'
  - 'Функціонування виду дієслів у медичному контексті: розрізнення процесних («лікувати»)
    та результативних («вилікувати») дій лікаря.'
- section: Хірургічний профіль та післяопераційний догляд (Surgical Profile and Postoperative
    Care)
  words: 800
  points:
  - 'Отримання інформованої згоди: використання специфічних мовних конструкцій для
    роз''яснення ризиків, переваг та альтернатив хірургічного втручання.'
  - 'Післяопераційні ускладнення: термінологія для діагностики та запобігання ризикам
    згідно з професійними стандартами (ДЕЦ МОЗ).'
  - 'Деонтологія спілкування з родичами пацієнта: баланс між емпатією та наданням
    точної клінічної інформації.'
- section: Педіатрична практика та вакцинація (Pediatric Practice and Vaccination)
  words: 700
  points:
  - 'Особливості педіатричного анамнезу: адаптація медичного дискурсу для ефективної
    комунікації з дітьми та їхніми батьками.'
  - 'Протоколи вакцинації та профілактики: аргументація переваг імунізації на основі
    стандартів доказової медицини.'
  - 'Диференційна діагностика дитячих інфекційних захворювань: опис клінічної картини
    та алгоритмів невідкладної допомоги.'
- section: Невідкладні стани та тактична медицина (Emergency Conditions and Tactical
    Medicine)
  words: 800
  points:
  - 'Алгоритми невідкладної допомоги при інфаркті міокарда та інсульті: координація
    дій бригади та використання професійної термінології.'
  - 'Феномен батальйону «Госпітальєри»: вивчення досвіду сучасної української тактичної
    медицини як символу професіоналізму в екстремальних умовах.'
  - 'Стилістика медичної звітності: застосування безособових конструкцій («рекомендовано»,
    «виявлено», «виконано») для об''єктивізації описів.'
- section: Паліативна допомога та етика (Palliative Care and Ethics)
  words: 700
  points:
  - 'Хоспісна та паліативна допомога в Україні: функціонування мобільних бригад та
    специфіка комунікації в термінальних станах.'
  - 'Етичні аспекти обговорення кінця життя: лексичні засоби для висловлення співчуття
    та підтримки родини пацієнта.'
  - 'Юридичні та моральні межі медичного втручання: дискусія щодо паліативних стандартів
    та прав пацієнта.'
- section: 'Практикум: Комплексне моделювання випадків (Workshop: Complex Case Modeling)'
  words: 700
  points:
  - 'Мультидисциплінарний консиліум: симуляція обговорення складного клінічного випадку
    з акцентом на диференційну діагностику.'
  - 'Документування та презентація випадку: підготовка офіційного звіту про клінічний
    сценарій з використанням високого професійного регістру.'
