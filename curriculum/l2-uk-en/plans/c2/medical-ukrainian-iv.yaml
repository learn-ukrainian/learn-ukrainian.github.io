vocabulary_hints:
  required:
  - диференційна діагностика (differential diagnosis) — проводити ~, складна ~, попереднa
    ~; ключовий метод §3.11
  - клінічний протокол (clinical protocol) — уніфікований ~, дотримуватися ~у, затверджений
    МОЗ; професійний стандарт
  - невідкладна допомога (emergency care) — надавати ~у, бригада ~ої ~и, викликати
    ~у; висока частота вживання
  - паліативна допомога (palliative care) — хоспісна та ~, мобільна бригада ~и; фокус
    на деонтології
  - реанімація (resuscitation) — серцево-легенева ~, відділення ~ї, успішна ~; невідкладний
    стан
  - 'гострий біль (acute pain) — відчувати ~, гострий ~; УВАГА: іменник «біль» чоловічого
    роду (не «гостра біль»)'
  - лікар (physician) — працювати ~ем; розмежування з «доктор» (науковий ступінь)
    у професійному дискурсі
  - аналіз (analysis) — проводити ~, результати ~у; основа діагностичного процесу
  - методологія (methodology) — ~ діагностики, клінічна ~; системний підхід до лікування
  recommended:
  - ускладнення (complication) — післяопераційні ~, ризик ~ь, запобігання ~ям; критичний
    показник якості
  - консиліум (consilium/medical board) — скликати ~, мультидисциплінарний ~; командна
    робота
  - лікувати (to treat) — недоконаний вид (процес); порівняно з доконаним «вилікувати»
    (результат)
  - інформована згода (informed consent) — підписати ~у ~у; обов'язковий етап перед
    втручанням
  - контекстуалізація (contextualization) — ~ клінічного випадку; врахування анамнезу
  - синтез (synthesis) — ~ результатів обстеження; перехід до діагнозу
  - інтерпретація (interpretation) — ~ результатів аналізів; професійне судження
