module: c2-103
level: C2
sequence: 103
version: 1.2.1
title: 'Фінальне шліфування проєкту: Технічне оформлення та презентація'
subtitle: 'Оформлення проєкту: форматування'
focus: professional
pedagogy: workshop
objectives:
- Забезпечити повну відповідність оформлення проєкту державним та академічним стандартам
- Підготувати якісну візуальну презентацію результатів дослідження
- Написати переконливий автореферат (Summary) українською та іноземною мовами
- Перевірити проєкт на відсутність технічних огріхів (нумерація, зміст, додатки)
content_outline:
- section: Технічні стандарти оформлення
  words: 1250
  subsections:
  - Вимоги до полів, шрифтів, міжрядкових інтервалів та абзаців
  - Оформлення складних таблиць, формул та графічних матеріалів
  - 'Автоматична генерація змісту та покажчиків: технічні аспекти'
  key_concepts:
  - верстка
  - форматування
  - технічний стандарт
  - навігація текстом
  primary_sources:
  - 'ДСТУ 3008:2015: Звіти у сфері науки і техніки (структура та правила оформлення)'
- section: Складання бібліографії та додатків
  words: 1250
  subsections:
  - 'Фінальна звірка списку джерел: алфавітний порядок та хронологія'
  - Відбір матеріалів для додатків (протоколи, анкети, тексти перекладів)
  - Вимоги до електронних версій та архівування даних
  key_concepts:
  - бібліографічний список
  - додатки
  - першоджерела
  - архівування
  primary_sources:
  - Стандарти МОН щодо оформлення дисертацій та магістерських робіт
- section: Підготовка автореферату та анотацій
  words: 1250
  subsections:
  - 'Структура автореферату: як передати суть 50 сторінок на 2 сторінках'
  - Формулювання ключових слів та наукових тез
  - Мовні особливості лаконічного наукового резюме
  key_concepts:
  - автореферат
  - резюме (summary)
  - ключові слова
  - тези
  primary_sources:
  - Зразки авторефератів кандидатських та докторських дисертацій
- section: Дизайн презентації та публічний виступ
  words: 1250
  subsections:
  - 'Візуалізація даних: менше тексту, більше сенсу на слайдах'
  - 'Підготовка тексту доповіді: таймінг та риторичні прийоми'
  - Прогнозування запитань та підготовка відповідей (Defensive strategies)
  key_concepts:
  - візуальна комунікація
  - риторика виступу
  - слайд-шоу
  - полеміка
  primary_sources:
  - Посібники з мистецтва презентації та ораторської майстерності
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Офіційно-діловий стиль'
- 'Авраменко, 11 клас (2019): Технічне оформлення наукової роботи'
- 'Державний стандарт 2024: C2 — академічна презентаційна компетенція'
reading_situations:
- source_type: технічний стандарт
  topic: 'Аналіз ДСТУ щодо оформлення ілюстрацій у наукових роботах: як не припуститися помилок.'
  key_elements:
  - підпис
  - посилання
  - якість зображення
  motivation: Забезпечення професійного вигляду проєкту.
- source_type: автореферат
  topic: 'Порівняльний аналіз анотацій трьома мовами: збереження термінологічної єдності.'
  key_elements:
  - еквівалентність
  - стислість
  - точність
  motivation: Розвиток навичок міжнародної наукової комунікації.
listening_situations:
- media_type: відео
  setting: 'Перегляд ''Elevator Pitch'' наукових проєктів: як коротко розповісти про свою роботу.'
  focus_points:
  - Структура 'пітчу'
  - Впевненість та невербальна комунікація
  motivation: Підготовка до стислого представлення результатів.
writing_tasks:
- task_type: власне висловлення
  prompt: Складіть текст доповіді для захисту вашого проєкту (на 7-10 хвилин). Вкажіть основні тези та логіку переходу між
    слайдами.
  requirements:
  - чітка структура
  - використання засобів привернення уваги
  - 600-800 слів
  motivation: Безпосередня підготовка до фінального етапу — захисту.
  model_answer: Текст доповіді має бути динамічним, логічним та узгодженим із візуальним рядом презентації.
discussion_topics:
- context: Скільки слайдів потрібно для 10-хвилинного виступу?
  questions:
  - Чи доречно використовувати анімацію у науковій презентації?
  - Як реагувати на критичні запитання комісії, щоб зберегти обличчя?
  motivation: Обмін досвідом та підготовка до ситуацій публічного захисту.
activity_hints:
- type: reading
  focus: Прочитайте текст про технічні стандарти оформлення і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про складання бібліографії та додатків, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Технічні стандарти оформлення». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему технічні стандарти оформлення.
- type: comparative-study
  focus: 'Порівняйте різні підходи до технічні стандарти оформлення: Вимоги до полів, шрифтів, міжрядкових інтервалів та абзаців.
    Визначте спільне та відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
