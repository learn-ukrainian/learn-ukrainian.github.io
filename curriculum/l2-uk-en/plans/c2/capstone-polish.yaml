vocabulary_hints:
  required:
  - шліфування (polishing) — фінальне шліфування тексту; шліфування стилю. High academic
    register.
  - коректура (proofreading) — виправлення технічних помилок; відрізняти від змістовного
    редагування.
  - анотація (abstract) — створення вторинного тексту (§4.3.8); вимагає лаконічності
    та термінологічної точності.
  - нормоконтроль (normocontrol) — формальний етап перевірки відповідності стандартам;
    критичний для допуску до захисту.
  - академічна доброчесність (academic integrity) — запобігання плагіату; дотримання
    етичних норм наукового дослідження.
  recommended:
  - палітурка (binding) — тверда палітурка; ритуальне завершення фізичного оформлення
    дипломної роботи.
  - авторська агентність (author agency) — використання активних конструкцій (автор
    досліджує) замість пасивних (досліджено).
  - ДСТУ 8302:2015 (State Standard) — чинний стандарт для бібліографічних посилань
    та оформлення списку літератури.
  - самоцитування (self-citation) — використання фрагментів власних попередніх праць
    з обов'язковим посиланням.
