content_outline:
- section: Вступ — Від редагування до шліфування (Introduction — From Editing to Polishing)
  words: 850
  points:
  - 'Learner error: confusion of ''редагування'' (improving logic/flow) with ''коректура'' (fixing typos/grammar) — strategy
    for separating these stages to avoid circular rework.'
  - 'Psychology of completion: overcoming the ''perfectionism trap'' vs. the deadline; establish a checklist for the final
    ''Senior Specialist'' sign-off.'
- section: Мовна коректура та синтаксична чистота (Language Proofreading and Syntactic Clarity)
  words: 1250
  points:
  - 'Syntactic decolonization: identifying and replacing passive Anglicisms/Sovietisms (''було проведено аналіз'') with active
    Ukrainian constructions (''автор дослідив'', ''ми проаналізували'').'
  - 'Advanced proofreading: verifying orthography (apostrophe, soft sign) in complex professional terminology and ensuring
    correct case agreement in multi-level nested lists.'
  - Практичне завдання: самостійний аналіз та продукування тексту з теми «Мовна коректура та синтаксична чистота».
- section: Технічний нормоконтроль та вимоги ДСТУ (Technical Normocontrol and DSTU Requirements)
  words: 1250
  points:
  - 'Cultural hook: ''Нормоконтроль'' — navigating the specific Ukrainian academic stage where a dedicated officer verifies
    margins, fonts, and DSTU alignment.'
  - 'Mastering DSTU 8302:2015: applying specific punctuation rules for the bibliography, including the correct use of double
    slashes (//) and square brackets for citations.'
  - Завдання на синтез: інтеграція навичок попередніх розділів у контексті «Технічний нормоконтроль та вимоги ДСТУ».
- section: Вторинні тексти — Анотація та ключові слова (Secondary Texts — Abstract and Keywords)
  words: 850
  points:
  - 'Applying §4.3.8: structuring the ''анотація'' (abstract) as a high-density summary of research novelty, methodology,
    and key results in professional style.'
  - 'Terminology alignment: ensuring precision in translating keywords between Ukrainian and English abstracts to maintain
    semantic consistency.'
- section: Академічна доброчесність та фінальна презентація (Academic Integrity and Final Presentation)
  words: 800
  points:
  - 'Academic honesty: interpreting Unicheck/StrikePlagiarism reports and defining the acceptable boundaries for self-citation
    (самоцитування).'
  - 'Cultural hook: The ritual of the ''Палітурка'' — the hard-binding of the thesis as a symbolic transition from a working
    draft to a defense-ready scholarly document.'
vocabulary_hints:
  required:
  - шліфування (polishing) — фінальне шліфування тексту; шліфування стилю. High academic register.
  - коректура (proofreading) — виправлення технічних помилок; відрізняти від змістовного редагування.
  - анотація (abstract) — створення вторинного тексту (§4.3.8); вимагає лаконічності та термінологічної точності.
  - нормоконтроль (normocontrol) — формальний етап перевірки відповідності стандартам; критичний для допуску до захисту.
  - академічна доброчесність (academic integrity) — запобігання плагіату; дотримання етичних норм наукового дослідження.
  recommended:
  - палітурка (binding) — тверда палітурка; ритуальне завершення фізичного оформлення дипломної роботи.
  - авторська агентність (author agency) — використання активних конструкцій (автор досліджує) замість пасивних (досліджено).
  - ДСТУ 8302:2015 (State Standard) — чинний стандарт для бібліографічних посилань та оформлення списку літератури.
  - самоцитування (self-citation) — використання фрагментів власних попередніх праць з обов'язковим посиланням.
vocabulary:
