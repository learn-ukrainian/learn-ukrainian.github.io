objectives:
- Аналізувати та класифікувати явища Мовна коректура та синтаксична чистота у автентичних текстах
- Продукувати тексти з коректним застосуванням Технічний нормоконтроль та вимоги ДСТУ
- Оцінювати стилістичну доречність мовних засобів у контексті Дипломний проєкт — Фінальне шліфування
- Застосовувати знання з теми «Технічний нормоконтроль та вимоги ДСТУ» у власній мовній практиці
