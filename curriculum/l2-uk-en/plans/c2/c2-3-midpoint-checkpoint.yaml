vocabulary_hints:
  required:
  - концепція (concept) — розробка концепції, концептуальні засади, в рамках концепції;
    ключовий термін академічного дискурсу
  - аналіз (analysis) — критичний аналіз, порівняльний аналіз, глибокий аналіз даних;
    базова компетенція для C2
  - дискурс (discourse) — науковий дискурс, політичний дискурс, дискурсивна практика;
    маркер високого регістру
  - методологія (methodology) — методологія дослідження, методологічний підхід; обов'язково
    для наукових текстів
  - брати участь (to participate) — нормативна конструкція; заміна поширеної кальки
    «приймати участь»
  recommended:
  - інтерпретація (interpretation) — інтерпретація результатів, вільна інтерпретація;
    часто вживається при аналізі даних
  - належати до (to belong to) — правильне вживання у класифікаціях замість кальки
    «відноситися до»
  - контекстуалізація (contextualization) — навичка вписування фактів у ширшу концепцію
  - синтез (synthesis) — процес об'єднання розрізнених даних у єдиний вторинний текст
  - перепрошувати (to apologize/excuse me) — професійний етикет; заміна ненормативного
    «вибачатися»
