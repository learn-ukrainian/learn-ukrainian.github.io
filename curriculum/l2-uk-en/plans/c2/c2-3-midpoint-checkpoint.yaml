module: c2-053
level: C2
sequence: 53
version: '1.1'
title: 'Проміжний контроль C2.3: Професійна та академічна майстерність'
subtitle: 'Проміжний контроль C2.3'
focus: checkpoint
pedagogy: review
objectives:
  - Здійснити комплексну перевірку знань та навичок у сфері професійної 
    комунікації високого рівня
  - Продемонструвати здатність до створення складних офіційних та наукових 
    текстів без стилістичних хиб
  - Засвідчити вільне володіння професійною термінологією та стратегіями 
    ораторської майстерності
  - Оцінити прогрес у формуванні індивідуальної мовної особистості у фаховому 
    контексті
content_outline:
  - section: Комплексний аналіз професійного дискурсу
    words: 1000
    subsections:
      - Діагностика здатності до розпізнавання прихованих інтенцій у діловому та
        науковому текстах
      - Тестування навичок швидкого редагування та стилістичної корекції фахових
        документів
      - Аналіз лексичного розмаїття та точності використання спеціальних 
        термінів
    key_concepts:
      - дискурс-аудит
      - стилістична виправність
      - термінологічна варіативність
      - модальність тексту
    primary_sources:
      - Юрій Шевельов, 'Українська мова в першій половині двадцятого століття 
        (1900-1941)' (аналіз наукової методології)
  - section: Синтез письмової та усної професійної комунікації
    words: 1000
    subsections:
      - Підготовка тез виступу на основі розлогого аналітичного звіту
      - Трансформація письмового наукового тексту у формат популярної лекції або
        інтерв'ю
      - Обґрунтування вибору мовних засобів для різних комунікативних ситуацій
    key_concepts:
      - жанрова адаптація
      - комунікативна гнучкість
      - риторичний синтез
      - прагматика мовлення
  - section: Критичне мислення та фахова аргументація
    words: 1000
    subsections:
      - Оцінювання ефективності систем аргументації у складних професійних 
        суперечках
      - Робота з контраргументами та стратегії захисту власної позиції
      - Аналіз логічних помилок у професійних текстах та способи їх усунення
    key_concepts:
      - аргументативне поле
      - логічна верифікація
      - евристика
      - інтелектуальна дискусія
  - section: Саморефлексія та планування професійного зростання
    words: 1000
    subsections:
      - Аналіз власних письмових та усних робіт за попередні 10 модулів
      - Визначення 'зон росту' у володінні українською мовою для професійних 
        потреб
      - Складання індивідуальної карти мовної компетенції високого рівня
    key_concepts:
      - самомоніторинг
      - мовна карта
      - персональна стратегія
      - професійний етос
    primary_sources:
      - Михайло Грушевський, 'Автобіографія' (аналіз саморефлексії вченого та 
        державного діяча)
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Авраменко, 11 клас (2019): Культура наукового мовлення'
  - 'Глазова, 11 клас (2019): Науковий стиль'
  - 'Караман, 10 клас (2018): Стилістика тексту'
  - 'Державний стандарт 2024: C2 — проміжна професійна атестація'
reading_situations:
  - source_type: Наукова монографія
    topic: Аналіз методологічної бази та стилю Юрія Шевельова. Дослідження 
      способів аргументації в гуманітарних науках.
    key_elements:
      - доказова база
      - джерелознавство
      - термінологічна чіткість
    motivation: Перевірка здатності сприймати наукові тексти найвищої 
      складності.
  - source_type: Его-документ (Автобіографія)
    topic: Аналіз стилю самопрезентації Михайла Грушевського. Вивчення мови 
      інтелектуала у приватному та публічному вимірах.
    key_elements:
      - авторська позиція
      - історичний контекст
      - витонченість стилю
    motivation: Оцінювання розуміння глибинних зв'язків між особистістю вченого 
      та його мовою.
listening_situations:
  - media_type: відео
    setting: Запис експертного круглого столу з питань мовної політики в 
      Україні. Аналіз стратегій переконання учасників.
    focus_points:
      - Взаємодія учасників у дискусії високого рівня
      - Використання риторичних прийомів для донесення позиції
    motivation: Перевірка розуміння динаміки професійної суперечки.
writing_tasks:
  - task_type: власне висловлення
    prompt: На основі вашого професійного досвіду напишіть аналітичне есе про 
      те, як мовна компетенція впливає на кар'єрне зростання у вашій галузі. 
      Використайте порівняльний аналіз та прогнозування.
    requirements:
      - мінімум 1000 слів
      - науковий або офіційний стиль
      - висока щільність термінології
    motivation: Підсумкова перевірка письмових навичок рівня C2.
    model_answer: Текст має бути структурованим, логічним, з глибоким аналізом 
      проблеми. Автор повинен продемонструвати володіння складним синтаксисом та
      точність у виборі лексики.
discussion_topics:
  - context: Чи є українська мова повноцінним інструментом у всіх сферах вашої 
      професійної діяльності?
    questions:
      - З якими труднощами ви стикаєтесь при перекладі професійних концептів?
      - Як ви оцінюєте роль української мови у формуванні вашого професійного 
        авторитету?
    motivation: Обговорення ролі мови у професійній самоідентифікації.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про комплексний аналіз професійного дискурсу і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про синтез письмової та усної професійної комунікації, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Комплексний аналіз професійного дискурсу». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему комплексний аналіз професійного дискурсу."
  - type: comparative-study
    focus: "Порівняйте різні підходи до комплексний аналіз професійного дискурсу: Діагностика здатності до розпізнавання прихованих інтенцій у діловому та науково. Визначте спільне та відмінне."
phase: C2.3 [Professional Specialization]
