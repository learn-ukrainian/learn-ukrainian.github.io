content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Огляд компетенцій М46-54 через призму Державного стандарту 2024 року (§4.3.6) та вимог до професійного мовлення рівня
    C2.
  - Роль Національної комісії зі стандартів державної мови у деколонізації термінології та відході від радянських лексичних
    кальок.
- section: Частина I — Термінологія та наукові традиції (Part I — Terminology and Scientific Traditions)
  words: 900
  points:
  - Історичний внесок Києво-Могилянської академії у формування української наукової терміносистеми, риторики та філософського
    дискурсу.
  - 'Аналіз словотворчих моделей: виправлення кальки «відноситися до» на нормативне «належати до» у термінологічних класифікаціях.'
  - Розробка концептуальних засад для створення власних фахових глосаріїв як ключова мета-навичка спеціаліста.
  - Практичне завдання: самостійний аналіз та продукування тексту з теми «Частина I — Термінологія та наукові традиції».
- section: Частина II — Читання та критичний аналіз фахових текстів (Part II — Reading and Critical Analysis of Professional
    Texts)
  words: 900
  points:
  - Стратегії читання та критичний аналіз джерел згідно з вимогами до створення вторинних текстів (§4.3.8 Державного стандарту).
  - 'Синтез інформації та інтерпретація результатів у науковому дискурсі: уникнення змішування регістрів та розмовних конструкцій.'
  - 'Діагностика типових помилок керування: перехід від «вибачатися» до етикетної форми «перепрошувати» у професійному середовищі.'
  - Завдання на синтез: інтеграція навичок попередніх розділів у контексті «Частина II — Читання та критичний аналіз фахових текстів (Part II — Reading and Critical Analysis of Professional».
- section: Частина III — Письмова фахова комунікація та документація (Part III — Written Professional Communication and Documentation)
  words: 900
  points:
  - 'Написання звітів, рефератів та пропозицій: дотримання суворого академічного тону та уникнення емоційно забарвленої лексики.'
  - Корекція лексичної кальки «приймати участь» — відпрацювання вживання нормативної конструкції «брати участь» у діловому
    листуванні.
  - Застосування методологічного підходу при структуруванні довідково-інформаційних текстів та професійних звітів.
- section: Частина IV — Усна презентація та конференційна комунікація (Part IV — Oral Presentation and Conference Communication)
  words: 850
  points:
  - 'Мистецтво професійної презентації та ведення дискусій: використання модальних маркерів для точності висловлювання думок.'
  - 'Корекція граматичного керування дієслів: тренінг з правильного вживання «дякувати тобі/вам» (Dat) замість помилкової
    форми з знахідним відмінком.'
  - Аналіз та контекстуалізація даних під час участі у професійних нарадах та конференціях.
vocabulary_hints:
  required:
  - концепція (concept) — розробка концепції, концептуальні засади, в рамках концепції; ключовий термін академічного дискурсу
  - аналіз (analysis) — критичний аналіз, порівняльний аналіз, глибокий аналіз даних; базова компетенція для C2
  - дискурс (discourse) — науковий дискурс, політичний дискурс, дискурсивна практика; маркер високого регістру
  - методологія (methodology) — методологія дослідження, методологічний підхід; обов'язково для наукових текстів
  - брати участь (to participate) — нормативна конструкція; заміна поширеної кальки «приймати участь»
  recommended:
  - інтерпретація (interpretation) — інтерпретація результатів, вільна інтерпретація; часто вживається при аналізі даних
  - належати до (to belong to) — правильне вживання у класифікаціях замість кальки «відноситися до»
  - контекстуалізація (contextualization) — навичка вписування фактів у ширшу концепцію
  - синтез (synthesis) — процес об'єднання розрізнених даних у єдиний вторинний текст
  - перепрошувати (to apologize/excuse me) — професійний етикет; заміна ненормативного «вибачатися»
