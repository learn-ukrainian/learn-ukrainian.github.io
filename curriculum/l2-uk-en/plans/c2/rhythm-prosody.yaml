module: c2-018
level: C2
sequence: 18
version: 1.2.1
title: Ритм та просодія українського тексту
subtitle: Ритм і просодія українського тексту
focus: integration
pedagogy: workshop
objectives:
- Глибоко усвідомити ритмічну природу української мови та її музичність (милозвучність)
- 'Опанувати засоби ритмічної організації прозового та поетичного тексту: паузація, акцентуація, інтонація'
- Дослідити вплив чергування у/в, і/й та інших фонетичних законів на темпоритм висловлення
- Навчитися керувати емоційним станом читача через свідому зміну ритмічних малюнків тексту
content_outline:
- section: Фонетична естетика та закони милозвучності
  words: 1250
  subsections:
  - Милозвучність (евфонія) як засаднича риса українського стилю
  - 'Чергування у/в, і/й, з/із/зі: стилістичні аспекти вибору'
  - Запобігання збігу голосних та приголосних як шлях до витонченості письма
  key_concepts:
  - евфонія
  - милозвучність
  - алітерація
  - асонанс
- section: Ритміка прози та інтелектуального дискурсу
  words: 1250
  subsections:
  - Взаємодія довжини речень та ритмічної пульсації тексту
  - Ритм як засіб логічного наголошення та емоційної напруги
  - Синтаксичні паралелізми та повтори як ритмотворчі чинники
  key_concepts:
  - темпоритм
  - пульсація
  - паралелізм
  - періодичність
  primary_sources:
  - Михайло Коцюбинський, 'Intermezzo' (звукопис та ритм)
  - Олесь Гончар, 'Собор' (поетичність прози)
- section: Просодія та мистецтво виразного читання
  words: 1250
  subsections:
  - 'Інтонаційні контури українського речення: розповідь, запитання, оклик'
  - Логічний наголос та психологічна пауза в ораторському мистецтві
  - Мелодика мовлення в різних регіональних та стилістичних варіантах
  key_concepts:
  - просодія
  - акцентуація
  - інтонація
  - логічна пауза
- section: Версифікація та поетична майстерність
  words: 1250
  subsections:
  - 'Основи українського віршування: силабо-тонічна система та верлібр'
  - Ритмічні перебої та перенесення (enjambement) як стилістичні прийоми
  - Зв'язок між метром вірша та його емоційно-змістовим наповненням
  key_concepts:
  - верлібр
  - анжамбеман
  - метрика
  - строфіка
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - highlight-morphemes
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Художній уривок
  topic: 'Аналіз звукопису та алітерації у поезії Павла Тичини. Джерело: ''Сонячні кларнети''.'
  key_elements:
  - кларнетизм
  - звукові образи
  - ритмічна розкутість
  motivation: Вивчення музичності як домінанти індивідуального стилю.
- source_type: Промова
  topic: Аналіз ритму та інтонації політичної промови видатного українського діяча.
  key_elements:
  - пафос
  - риторичні повтори
  - паузація
  motivation: Розуміння ритму як інструменту ораторського впливу.
listening_situations:
- media_type: аудіо
  setting: 'Порівняння виконання одного вірша різними акторами: аналіз просодії.'
  focus_points:
  - Розміщення логічних наголосів
  - Використання тембру та темпу
  motivation: Розвиток слухової чутливості до нюансів просодії.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть опис сходу сонця у горах, спочатку у формі ритмізованої прози (близько до вірша), а потім у формі сухого
    метеорологічного звіту. Проаналізуйте, як зміна ритму змінює сприйняття події.
  requirements:
  - мінімум 400 слів
  - дотримання законів евфонії
  - використання алітерації
  motivation: Відпрацювання свідомого керування музичністю та ритмом тексту.
  model_answer: Перша частина має нагадувати поезію в прозі — з внутрішньою римою, повторами та милозвучними чергуваннями.
    Друга — бути функціональною та позбавленою будь-якої музичності.
discussion_topics:
- context: Чи є українська мова об'єктивно однією з наймилозвучніших у світі, чи це культурний міф?
  questions:
  - Які фонетичні особливості роблять мову музичною?
  - Як глобалізація та вплив англомовного ритму впливають на сучасну українську просодію?
  motivation: Дискусія про фонетичну ідентичність та естетику мови.
activity_hints:
- type: reading
  focus: Прочитайте текст про фонетична естетика та закони милозвучності і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про ритміка прози та інтелектуального дискурсу, використовуючи нову лексику
    модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Фонетична естетика та закони милозвучності». Обґрунтуйте свою
    позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему фонетична естетика та закони милозвучності.
- type: comparative-study
  focus: 'Порівняйте різні підходи до фонетична естетика та закони милозвучності: Милозвучність (евфонія) як засаднича риса
    українського стилю. Визначте спільне та відмінне.'
references:
- Караман С. О. Українська мова, 10 клас (2018), §19 — милозвучність
- Коцюбинський М. Intermezzo — зразок звукопису та ритму прози
- Тичина П. Сонячні кларнети — музичність як ідіостиль
- 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
