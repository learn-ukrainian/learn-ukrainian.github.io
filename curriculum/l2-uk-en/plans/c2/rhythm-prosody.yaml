content_outline:
- section: 'Вступ: Природа ритму в прозовому тексті (Introduction: The Nature of Rhythm
    in Prose)'
  words: 600
  points:
  - Поняття ритму як «серцебиття» тексту та його відмінність від поетичного метра
    (відсутність регулярної стопи)
  - Роль ритму в створенні емоційного настрою та атмосфери твору
  - 'Аналіз «мовленнєвої просодії»: як наголоси та паузи формують ритмічний малюнок'
  - 'Попередження помилки: аналіз «монотонного гудіння» (Uniform sentences) та важливість
    ритмічної варіативності'
- section: Фонетична стилістика та закони евфонії (Phonetic Stylistics and Laws of
    Euphony)
  words: 1000
  points:
  - 'Дотримання §4.3.2 Держстандарту: чергування у/в, і/й, з/зі/із як стилістичний
    імператив української мови'
  - Принципи милозвучності (евфонії) vs. какофонія (скупчення приголосних)
  - 'Звукопис у прозі: художнє використання алітерації, асонансу та ономатопеї для
    звукової імітації дійсності'
  - 'Learner Error: нехтування законами милозвучності в письмі (Euphony neglect) —
    вправи на редагування важковимовних кластерів'
- section: Синтаксична архітектура та інтонаційний період (Syntactic Architecture
    and Intonational Period)
  words: 1000
  points:
  - 'Структура синтаксичного періоду: протасис (підвищення напруги) та аподосис (логічне
    завершення/спад)'
  - 'Інтонаційний малюнок речення: висхідні та спадні хвилі, модуляція голосу при
    читанні'
  - 'Застосування §4.3.4 Держстандарту: використання еліпсису, повторів та риторичних
    запитань для зміни темпоритму'
  - 'Аналіз логічних наголосів: як уникнути інтерференції з англійським наголошуванням
    кожного значущого слова'
- section: 'Ритмічні стратегії класиків: Коцюбинський vs. Стефаник (Rhythmic Strategies
    of Classics: Kotsiubynsky vs. Stefanyk)'
  words: 1000
  points:
  - 'Культурний гачок: Михайло Коцюбинський та «музична проза» («Intermezzo») — імпресіоністичний
    ритм на асоціаціях'
  - 'Культурний гачок: Василь Стефаник та експресіоністська «рубана проза» — короткі,
    важкі речення як віддзеркалення суворої реальності'
  - 'Техніка чергування довжини речень для створення динаміки: короткі для напруги,
    довгі для описової плинності'
  - 'Компаративний аналіз: порівняння «ритмічно бідного» перекладу з оригінальним
    шедевром (на прикладі М. Бажана або М. Лукаша)'
- section: 'Практикум: Техніки шліфування індивідуального ритму (Workshop: Techniques
    for Refining Individual Rhythm)'
  words: 900
  points:
  - Читання вголос як основний інструмент діагностики ритмічних збоїв у власному тексті
  - 'Вправи на редагування темпу: розширення періодів для рефлексії та стиснення для
    екшн-сцен'
  - 'Корекція «інтонаційного переносу» (Intonation transfer): робота над мелодійним
    контуром української фрази'
  - 'Підсумковий аналіз: зв’язок ритму з індивідуальним стилем автора (Voice/Persona)'
