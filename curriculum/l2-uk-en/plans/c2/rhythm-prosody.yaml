vocabulary_hints:
  required:
  - ритм (rhythm) — шалений ритм, ритмічний малюнок, збитися з ритму; висока частотність
  - просодія (prosody) — мовленнєва просодія, елементи просодії; академічний реєстр
  - інтонація (intonation) — інтонаційний малюнок, висхідна/спадна інтонація, інтонація
    переліку
  - період (period) — інтонаційний період, синтаксичний період, структура періоду;
    ключова одиниця прози
  - евфонія (euphony) — закони евфонії, евфонічний принцип, милозвучність; літературний
    термін
  recommended:
  - алітерація (alliteration) — художня алітерація, приклад алітерації, звуковий повтор
    приголосних
  - асонанс (assonance) — звуковий повтор голосних для створення настрою
  - милозвучність (melodiousness) — ключовий концепт української лінгвокультурної
    ідентичності
  - протасис (protasis) — перша частина періоду (підвищення)
  - аподосис (apodosis) — друга частина періоду (спад)
  - какофонія (cacophony) — збіг приголосних, немилозвучність; те, чого слід уникати
