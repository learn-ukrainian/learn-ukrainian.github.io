content_outline:
- section: Вступ — Що таке інтертекстуальність? (Introduction — What is Intertextuality?)
  words: 600
  points:
  - 'Визначення Ю. Крістевої: текст як ''мозаїка цитат'' та поглинання інших текстів.'
  - 'Культурний гачок: «Енеїда» І. Котляревського як фундамент нової літератури через травестію поеми Вергілія.'
  - 'Державний стандарт (§4.3.8): розвиток компетенції створення вторинних текстів (рефератів, есе) на основі наявних дискурсів.'
- section: Алюзія та ремінісценція (Allusion and Reminiscence)
  words: 1000
  points:
  - Типологія алюзій (біблійні, історичні, літературні) на прикладах есеїстики Оксани Забужко.
  - 'Типові помилки: розрізнення свідомого натяку (алюзія) та несвідомого відлуння стилю чи атмосфери (ремінісценція).'
  - 'Стилістичні засоби (§4.3.3): використання перифраз (автор «Заповіту») та метонімії як засобів інтертекстуального зв''язку.'
- section: Цитата та палімпсест (Quotation and Palimpsest)
  words: 1100
  points:
  - 'Механізми цитування: пряма атрибуція vs приховане цитування; поняття ''претексту'' (джерела) та тексту-реципієнта.'
  - 'Навчальна проблема: пунктуація при інтегрованому цитуванні; оформлення непрямої мови без перетворення на ''клаптикову
    ковдру''.'
  - 'Концепція палімпсесту: текст як нашарування попередніх смислів; аналіз культурного палімпсесту в сучасній українській
    прозі.'
- section: Пародія, стилізація та 'Бу-Ба-Бу' (Parody, Stylization, and 'Bu-Ba-Bu')
  words: 1100
  points:
  - Розмежування пародії (критичне висміювання) та стилізації (шаноблива гра з формою); бурлеск та травестія.
  - 'Культурний гачок: творчість Юрія Андруховича та групи ''Бу-Ба-Бу'' як квінтесенція постмодерної карнавальної інтертекстуальності.'
  - 'Аналіз інтертекстуальних шарів у романі «Рекреації»: гра з класичними сюжетами та деконструкція міфів.'
- section: Практикум та підсумок (Workshop and Summary)
  words: 1200
  points:
  - 'Гіпертекстуальність за Ж. Женеттом: архітекстуальність (жанрові зв''язки) та паратекстуальність (роль епіграфів та заголовків).'
  - 'Практичне завдання: написання тексту зі свідомим використанням алюзій; запобігання помилці надуживання чужим голосом.'
  - 'Інтертекстуальність як інструмент деколонізації: переосмислення імперських наративів через іронічну гру та цитування.'
vocabulary_hints:
  required:
  - інтертекстуальність (intertextuality) — постмодерна ~, принцип ~, явна/прихована ~; академічний регістр
  - алюзія (allusion) — прозора ~, біблійна ~, історична ~; середній рівень частотності
  - ремінісценція (reminiscence) — літературна ~, смутна ~, викликати ~; часто плутають з алюзією
  - палімпсест (palimpsest) — культурний ~, текст як ~; термін для опису нашарування смислів
  - стилізація (stylization) — майстерна ~, під народну творчість, жанрова ~; розрізняти з пародією
  - пародія (parody) — гостра ~, об'єкт пародії; критичний аспект наслідування
  recommended:
  - претекст (pretext/source text) — текст-джерело для інтертекстуальної взаємодії
  - травестія (travesty) — комічне переодягання серйозного сюжету (контекст Котляревського)
  - бурлеск (burlesque) — низький стиль, гра на контрасті (контекст 'Бу-Ба-Бу')
  - перифраз (periphrasis) — непряме найменування об'єкта через його ознаки (стандарт §4.3.3)
  - метатекст (metatext) — коментар тексту до самого себе або іншого тексту
