module: intertextuality
level: C2
sequence: 19
version: '1.2'
title: 'Інтертекстуальність: діалог текстів'
subtitle: 'Intertextuality: The Dialogue of Texts'
focus: integration
pedagogy: seminar
objectives:
- Досконало опанувати концепцію інтертекстуальності як фундаментальної ознаки сучасного інтелектуального дискурсу
- 'Навчитися ідентифікувати та аналізувати складні типи міжтекстових зв''язків: цитата, алюзія, ремінісценція, пастиш, пародія'
- Дослідити функціонування культурних кодів та прецедентних текстів в українській літературі та медіа
- Розвинути навички створення власних інтертекстуальних конструктів для поглиблення змісту висловлення
content_outline:
- section: Теорія інтертекстуальності та її види
  words: 1250
  subsections:
  - 'Від Бахтіна до Крістевої: еволюція поняття інтертексту'
  - 'Види інтертекстуальних відношень: архітекстуальність, паратекстуальність, метатекстуальність'
  - 'Функції інтертекстуальності: експресивна, апелятивна, ігрова'
  key_concepts:
  - інтертекстуальність
  - гіпертекст
  - палімпсест
  - діалогізм
- section: Механізми міжтекстового запозичення
  words: 1250
  subsections:
  - 'Цитата як засіб авторизації та аргументації: типи та способи введення в текст'
  - 'Алюзія та ремінісценція: мистецтво прихованого посилання та натяку'
  - 'Прецедентні феномени в українській культурі: імена, тексти, події'
  key_concepts:
  - алюзія
  - ремінісценція
  - прецедентний текст
  - культурний код
  primary_sources:
  - Оксана Забужко, 'Музей покинутих секретів' (аналіз інтертекстуальних шарів)
  - Сергій Жадан, поетичні збірки (цитування класики та мас-культури)
- section: 'Постмодерні стратегії: пастиш та пародія'
  words: 1250
  subsections:
  - Пастиш як засіб стилістичної гри та омажу без сатиричної мети
  - Пародія як деконструкція та критичне переосмислення чужого слова
  - Створення багаторівневих смислів через змішування високої та низької культур
  key_concepts:
  - пастиш
  - пародія
  - деконструкція
  - карнавальність
- section: Творча практика інтертекстуального письма
  words: 1250
  subsections:
  - 'Інтеграція цитат у власне висловлення: етика та естетика'
  - 'Створення текстів-палімпсестів: накладання нових значень на класичні сюжети'
  - Аналіз інтертекстуальності в рекламі, медіа та політичному дискурсі
  key_concepts:
  - інтерпретація
  - авторська позиція
  - контекст
  - рецепція
word_target: 5000
activities:
  types_required:
  - authorial-intent
  - critical-analysis
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Авраменко, 11 клас (2019): Аналіз літературного процесу'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Державний стандарт 2024: C2 — літературна компетенція'
reading_situations:
- source_type: Художній уривок
  topic: 'Аналіз біблійних та античних алюзій у поезії Лесі Українки. Джерело: ''Одержима''.'
  key_elements:
  - міфологема
  - релігійний дискурс
  - філософський підтекст
  motivation: Вивчення класичної інтертекстуальності.
- source_type: Літературна критика
  topic: Дослідження інтертекстуальних зв'язків у романі 'Місто' В. Підмогильного.
  key_elements:
  - європейський модернізм
  - цитація Мопассана
  - урбанізм
  motivation: Розуміння діалогу української літератури зі світовою традицією.
listening_situations:
- media_type: лекція
  setting: Курс лекцій Олександра Бойченка про постмодерну гру з текстами класиків.
  focus_points:
  - Приклади вдалого пастишу
  - Функція іронії в інтертексті
  motivation: Сприйняття складних інтелектуальних концепцій інтертекстуальності.
writing_tasks:
- task_type: есе
  prompt: Напишіть коротке оповідання на сучасну тему, де основою сюжету або образності будуть алюзії на відомий твір української
    класики (напр., 'Кайдашева сім'я' або 'Тіні забутих предків').
  requirements:
  - мінімум 500 слів
  - наявність принаймні 5 чітких алюзій
  - обґрунтування вибору прецедентного тексту
  motivation: Розвиток навичок свідомого використання інтертекстуальності.
  model_answer: Текст має бути самостійним твором, але містити глибинні зв'язки з першоджерелом через імена, ситуації або
    ключові фрази. Важливо показати, як класичний конфлікт трансформується у сучасних реаліях.
discussion_topics:
- context: Чи вбиває інтертекстуальність оригінальність автора? Чи можливо сьогодні написати текст, який би не був діалогом
    з іншими текстами?
  questions:
  - Яка межа між інтертекстуальністю та плагіатом?
  - Чи має читач бути ерудованим, щоб розуміти сучасний текст?
  motivation: Дебати про природу авторства та роль читацької культури.
activity_hints:
- type: critical-analysis
  focus: 'Проаналізувати інтертекстуальні шари у романі Забужко: визначити типи алюзій, ремінісценцій та прецедентних текстів'
- type: reading
  focus: Ідентифікувати біблійні та античні алюзії у поезії Лесі Українки та їхні функції у тексті
- type: essay-response
  focus: Написати оповідання з алюзіями на твір української класики, обґрунтувавши вибір прецедентного тексту
- type: match-up
  focus: 'Зіставити типи інтертекстуальних зв''язків з їхніми визначеннями: пастиш, пародія, алюзія, ремінісценція'
