slug: intertextuality
version: '2.0'
title: Інтертекстуальність
focus: literature
pedagogy: TTT
phase: C2.1 [Stylistics & Rhetoric]
word_target: 5000
objectives:
- Аналізувати літературні твори на рівні глибокої текстуальної інтерпретації
- Критично оцінювати літературні тексти в контексті української та європейської традицій
- Продукувати вторинні тексти (рецензії, анотації, літературно-критичні есе)
- Застосовувати знання з теми «Цитата та палімпсест» у власній мовній практиці
sources:
- name: Інтертекстуальність — Вікіпедія
