title: Медіа і дезінформація
subtitle: Media and Disinformation
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати українське медіасередовище (преса, радіо, телебачення, інтернет) з використанням фахової термінології медіаграмотності
  та журналістикознавства
- Learner can critically evaluate propaganda techniques, fake news, and information warfare tactics using evidence-based
  analytical frameworks in Ukrainian
- Конструювати аргументований текст про загрози свободі слова, незалежності ЗМІ та вплив соціальних мереж на суспільну
  думку
- Learner can identify manipulation strategies in media texts and compose a media literacy analysis brief in formal
  academic Ukrainian
