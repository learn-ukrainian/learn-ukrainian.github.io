module: c2-076
level: C2
sequence: 76
version: 1.2.1
title: 'Медіа та дезінформація: Інформаційна гігієна в епоху постправди'
subtitle: Медіа та дезінформація
focus: vocabulary
pedagogy: workshop
objectives:
- Дослідити механізми маніпуляцій, фейків та дезінформації в сучасних медійних дискурсах
- Опанувати інструментарій критичного аналізу новин, пропагандистських наративів та стратегій деконструкції міфів
- Вдосконалити навички інформаційної гігієни та медіаграмотності в умовах гібридних загроз
- Проаналізувати роль соціальних мереж та штучного інтелекту у формуванні громадської думки
content_outline:
- section: 'Анатомія дезінформації: від фейків до глибоких підробок'
  words: 1250
  subsections:
  - 'Дезінформація, місінформація та малінформація: категоріальні відмінності'
  - 'Технології створення фейків: ботоферми, тролінг та алгоритмічні маніпуляції'
  - Феномен Deepfakes та його загроза для верифікації інформації
  key_concepts:
  - постправда
  - інформаційна бульбашка
  - фейк
  - когнітивне упередження
  primary_sources:
  - Віталій Портников, есе 'Інформаційна війна та її наслідки' (аналіз стратегій ворожої пропаганди)
- section: Стратегії пропаганди та мовні засоби маніпуляції
  words: 1250
  subsections:
  - Евфемізми, емоційно забарвлена лексика та 'мова ворожнечі' у медіа
  - Маніпулювання статистичними даними та виривання з контексту
  - 'Наративна війна: боротьба за сенси та історичну пам''ять'
  key_concepts:
  - пропаганда
  - дискурс-маркер
  - евфемізація
  - наратив
- section: Медіаграмотність та критичне мислення як засоби протидії
  words: 1250
  subsections:
  - 'Алгоритм перевірки фактів (fact-checking): джерела, експертиза, верифікація'
  - 'Розвиток критичного мислення: як розпізнати логічні помилки та маніпуляції'
  - 'Цифрова безпека: захист персональних даних та гігієна в соціальних мережах'
  key_concepts:
  - фактчекінг
  - критичне мислення
  - верифікація
  - медіаграмотність
  primary_sources:
  - Кодекс етики українського журналіста (аналіз стандартів правдивості та об'єктивності)
- section: Етика журналістики та майбутнє інформаційного простору
  words: 1250
  subsections:
  - Баланс між свободою слова та національною безпекою в умовах війни
  - Відповідальність медіаплатформ та роль незалежних регуляторів
  - 'Перспективи штучного інтелекту в журналістиці: від автоматизації до загрози професії'
  key_concepts:
  - редакційна політика
  - цензура
  - об'єктивність
  - соціальна відповідальність
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - error-correction
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики, неологізми'
- 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
- source_type: Аналітична стаття
  topic: Дослідження Віталія Портникова про механізми інформаційної війни. Аналіз аргументації та стилістичних засобів.
  key_elements:
  - дискурс
  - маніпуляція
  - інформаційний простір
  motivation: Розуміння глибинних процесів формування громадської думки через медіа.
- source_type: Професійний стандарт
  topic: Аналіз Кодексу етики українського журналіста. Дослідження етичних дилем у роботі медіа.
  key_elements:
  - достовірність
  - відокремлення фактів від суджень
  - суспільний інтерес
  motivation: Вивчення нормативної бази та професійної лексики журналістики.
listening_situations:
- media_type: інтерв'ю
  setting: Бесіда з експертом-фактчекером про найгучніші фейки року та методи їх деконструкції.
  focus_points:
  - Ознаки маніпулятивного заголовка
  - Використання зворотного пошуку зображень
  motivation: Практичне засвоєння алгоритмів перевірки інформації.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть критичний розбір (debunking) поширеного медійного фейку або маніпуляції. Використовуйте доказову базу та
    логічну аргументацію.
  requirements:
  - мінімум 600 слів
  - використання термінології медіаграмотності
  - посилання на першоджерела
  motivation: Розвиток навичок деконструкції дезінформації.
  model_answer: 'Текст має бути структурованим: опис фейку, аналіз його складників, спростування фактами та висновок про мету
    маніпуляції.'
discussion_topics:
- context: Чи повинні соціальні мережі нести юридичну відповідальність за контент, який поширюють їхні користувачі?
  questions:
  - Де проходить межа між боротьбою з дезінформацією та цензурою?
  - Як змусити глобальні техгіганти дотримуватися національного законодавства?
  motivation: Дискусія про регулювання інформаційного простору та свободу слова.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про анатомія дезінформації: від фейків до глибоких підробок і дайте відповіді на запитання щодо
    ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про стратегії пропаганди та мовні засоби маніпуляції, використовуючи нову
    лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Анатомія дезінформації: від фейків до глибоких підробок».
    Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему анатомія дезінформації: від фейків до глибоких
    підробок.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до анатомія дезінформації: від фейків до глибоких підробок: Дезінформація, місінформація
    та малінформація: категоріальні відмінності. Визначте спільне та відмінне.'
