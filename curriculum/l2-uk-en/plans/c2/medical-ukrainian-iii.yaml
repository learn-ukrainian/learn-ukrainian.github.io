vocabulary_hints:
  required:
  - епікриз (discharge summary/epicrisis) — виписний, етапний, посмертний; висока
    частотність у C2 дискурсі
  - анамнез (anamnesis) — збирати анамнез (життя, хвороби), обтяжений анамнез; фундаментальна
    діагностична категорія
  - листок непрацездатності (sick leave certificate) — офіційний термін; уникати кальки
    «лікарняний лист»
  - направлення (referral) — електронне направлення, видати направлення на госпіталізацію
    чи обстеження
  - висновок (conclusion/opinion) — консультативний, судово-медичний висновок, заключення
    МСЕК
  - МКХ-10 (ICD-10) — міжнародний класифікатор хвороб; основа кодування та статистичної
    звітності
  recommended:
  - згідно з (according to) — вимагає орудного відмінка (згідно з наказом); типова
    помилка «згідно інструкції»
  - відповідно до (in accordance with) — маркер офіційно-ділового стилю; «відповідно
    до протоколу»
  - eHealth (eHealth system) — цифрова екосистема охорони здоров'я та база медичних
    даних
  - медичний висновок (medical opinion) — офіційне заключення у цифровій формі про
    стан пацієнта
  - рецептурний бланк (prescription form) — паперовий носій для відпуску ліків за
    певних умов
  - анамнез хвороби (history of present illness) — деталізація перебігу захворювання
    в документації
