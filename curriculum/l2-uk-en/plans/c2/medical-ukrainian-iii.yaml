content_outline:
- section: 'Вступ: Система медичної документації в Україні (Introduction: Medical
    Documentation System in Ukraine)'
  words: 500
  points:
  - Правові основи та законодавче регулювання медичного документообігу в Україні згідно
    з актуальними наказами МОЗ
  - 'Культурний та інфраструктурний зсув: впровадження системи eHealth та платформи
    Helsi.me як інструментів цифровізації медицини'
  - 'Трансформація системи: скасування застарілих паперових форм та впровадження електронних
    медичних висновків про тимчасову непрацездатність'
- section: Первинна медична документація та збір анамнезу (Primary Medical Documentation
    and Anamnesis)
  words: 600
  points:
  - Стандарти ведення форми 025/о (амбулаторна карта) та 003/о (стаціонарна карта)
    в умовах цифрової трансформації
  - 'Професійна термінологія при зборі анамнезу: збирати анамнез життя, анамнез хвороби
    та обтяжений анамнез як складники діагностики'
  - Вимоги до лаконічності та точності записів в електронній медичній карті (ЕМК)
    пацієнта відповідно до стандартів eHealth
- section: Виписки, епікризи та листки непрацездатності (Extracts, Epicrises and Sick
    Leave Certificates)
  words: 600
  points:
  - 'Термінологічна точність: розрізнення розмовного поняття «виписка» та офіційного
    документа «виписний епікриз» у медичній практиці'
  - 'Методологія складання епікризів: етапний, виписний та посмертний епікриз — структура
    та ключові мовленнєві кліше професійного стилю'
  - 'Ліквідація лексичних кальок: перехід від суржикового «лікарняного листа» до офіційного
    терміна «листок непрацездатності»'
- section: Направлення та електронні рецепти (Referrals and Electronic Prescriptions)
  words: 600
  points:
  - Оформлення електронних направлень на консультацію та госпіталізацію відповідно
    до стандартів НСЗУ
  - 'Дискурс рецептурного призначення: правила заповнення електронних рецептів та
    особливості використання паперових рецептурних бланків'
  - 'Граматичні норми офіційного стилю: правильне вживання конструкцій «згідно з інструкцією»
    (Instrumental case) та «відповідно до протоколу»'
- section: Протоколи, консиліуми та експертні висновки (Protocols, Case Conferences
    and Expert Opinions)
  words: 600
  points:
  - Структура протоколів діагностичних обстежень та написання консультативних висновків
    вузьких спеціалістів
  - Особливості оформлення заключень МСЕК (Медико-соціальної експертної комісії) та
    складання судово-медичних висновків
  - Мовні засоби вираження експертної оцінки та аргументації в офіційно-діловому медичному
    дискурсі
- section: Статистична звітність та класифікатор МКХ-10 (Statistical Reporting and
    ICD-10 Classification)
  words: 500
  points:
  - 'Кодування діагнозів за міжнародним класифікатором МКХ-10: термінологічна уніфікація
    та точність українського перекладу'
  - Форми статистичної звітності про надані медичні послуги та контроль якості внесених
    даних до загальнонаціональної системи
  - Роль стандартизованої термінології у забезпеченні юридичної та статистичної достовірності
    медичної документації
- section: 'Практикум: Культура медичного письма та ведення документації (Workshop:
    Medical Writing Culture and Documentation)'
  words: 600
  points:
  - 'Диференціація стилів: розрізнення офіційно-ділового стилю документації та професійного
    сленгу медичних працівників'
  - 'Редагування та корекція типових помилок: усунення канцеляризмів та суржикових
    конструкцій у медичних записах'
  - Створення зразка виписного епікризу та електронного рецепта з дотриманням усіх
    лексико-граматичних норм української мови
