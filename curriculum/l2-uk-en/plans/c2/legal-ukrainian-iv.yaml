vocabulary_hints:
  required:
  - юридичний висновок (legal opinion) — скласти/надати висновок; ключовий вторинний
    текст за стандартом §4.3.8
  - правова позиція (legal position) — сформувати позицію; врахування практики Верховного
    Суду; висока частотність
  - кваліфікація (qualification) — правова кваліфікація обставин; юридична оцінка
    діяння
  - клопотання (motion/petition) — заявити/задовольнити клопотання; висока частотність
    у процесуальних текстах
  - претензія (claim/demand) — пред'явити претензію; досудова претензія; ключовий
    термін господарського права
  - адвокатський запит (attorney's request) — офіційне письмове звернення адвоката;
    засіб збору інформації
  - норма права (legal norm) — одиниця правової системи; імперативна або диспозитивна
    норма
  - диспозитивний (dispositive) — такий, що передбачає можливість вибору моделі поведінки
  - імперативний (imperative/mandatory) — такий, що містить суворо обов'язковий припис
  - застереження (caveat/reservation) — зробити застереження; інструмент обмеження
    відповідальності в договорах
  recommended:
  - нормотворення (norm-making) — процес розробки та прийняття нормативних актів
  - перехресне посилання (cross-reference) — посилання на інші структурні одиниці
    документа або зовнішні акти
  - заперечення (objection) — письмове викладення незгоди з аргументами іншої сторони
  - повістка (summons) — офіційний виклик до суду; уникати змішування з 'порядок денний'
  - правонаступник (legal successor) — особа, до якої переходять права та обов'язки
    попередника
  - згідно з (according to) — канцеляризм за §4.3.3; фіксована конструкція з прийменником
    'з'
  - відповідно до (in accordance with) — канцеляризм за §4.3.3; уникнення помилки
    'відповідно плану'
  - чинний (valid/effective) — нормативний термін для позначення сили закону; протиставлення
    калькованому 'діючий'
