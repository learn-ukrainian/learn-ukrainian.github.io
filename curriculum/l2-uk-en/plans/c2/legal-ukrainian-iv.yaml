content_outline:
- section: Вступ — Особливості юридичного письма (Introduction — Features of Legal
    Writing)
  words: 300
  points:
  - 'Аналіз вимог офіційно-ділового стилю в праві: точність, однозначність та нормативність
    термінології.'
  - 'Вимоги Держстандарту (§4.3.3) щодо вживання канцеляризмів: нормативні конструкції
    «згідно з», «відповідно до», «у зв’язку з».'
  - 'Поняття вторинного тексту згідно з §4.3.8: методика реферування та створення
    довідково-інформаційних юридичних текстів.'
- section: Мова законодавчих актів та історичне коріння (Language of Legislative Acts
    and Historical Roots)
  words: 400
  points:
  - 'Історична тяглість української правничої мови: термінологічні пласти від «Руської
    Правди» до сучасної нормотворчої техніки.'
  - 'Конституція Пилипа Орлика (1710) як пам''ятка правової думки: лінгвістичний аналіз
    закладених основ поділу влади.'
  - 'Стилістика нормативно-правових актів: мовне оформлення імперативних (зобов''язальних)
    та диспозитивних (дозвільних) норм.'
- section: Юридичні висновки та правові позиції (Legal Opinions and Legal Positions)
  words: 450
  points:
  - 'Методика складання юридичного висновку: алгоритм від аналізу фактичних обставин
    до правової кваліфікації.'
  - 'Формування правової позиції: робота з прецедентною практикою Верховного Суду
    та механізми обґрунтування «відступу від позиції».'
  - Застосування юридичних застережень (caveats) та рекомендацій для мінімізації правових
    ризиків клієнта.
- section: Процесуальні документи (Procedural Documents)
  words: 450
  points:
  - 'Складання клопотань та заяв: специфіка вживання дієслів «заявити», «задовольнити»
    або «відхилити» клопотання.'
  - 'Підготовка скарг та письмових заперечень: логіка аргументації та мовні засоби
    вираження незгоди з позицією опонента.'
  - 'Learner error: виправлення калькованої конструкції «згідно наказу» (помилка)
    на нормативну «згідно з наказом» (правильно).'
- section: Ділова юридична кореспонденція (Legal Business Correspondence)
  words: 350
  points:
  - 'Адвокатський запит як інструмент збору доказів: структура, правові підстави та
    етикет офіційного листування.'
  - 'Мова претензійної роботи: пред''явлення претензії та підготовка вмотивованої
    відповіді на досудову вимогу.'
  - 'Оформлення повідомлень та повісток: розрізнення понять «повістка» (судовий виклик)
    та «порядок денний» (agenda).'
- section: Редагування юридичних текстів (Editing Legal Texts)
  words: 350
  points:
  - 'Лексична гігієна: заміна суржикових конструкцій «приймати міри» на «вживати заходів»
    та «повістка дня» на «порядок денний».'
  - 'Робота з дієприкметниками: чому «діючий закон» є помилкою і як правильно вживати
    «чинний закон».'
  - Усунення синтаксичної двозначності та перевірка логічної послідовності в складних
    юридичних конструкціях.
- section: Практикум — Юридичне письмо (Workshop — Legal Writing)
  words: 200
  points:
  - 'Практичне завдання: складання проекту юридичного висновку або правничого листа
    з акцентом на безособові конструкції («було встановлено»).'
  - 'Редагування «проблемного» документа: виправлення прийменникових кальок та вдосконалення
    офіційно-ділового стилю.'
