module: c2-069
level: C2
sequence: 69
version: '1.0'
title: 'Харчування і культура їжі: Гастрономія, традиції та ідентичність'
subtitle: 'Харчування і культура їжі'
focus: cultural
pedagogy: seminar
objectives:
  - Аналізувати українську гастрономічну традицію як культурний феномен та
    маркер національної ідентичності
  - Опанувати термінологію кулінарії, продовольчої безпеки та гастрономічної
    критики на рівні фахового дискурсу
  - Досліджувати зв'язок між їжею, пам'яттю та ідентичністю через призму
    української літератури та етнографії
  - Розвинути навички критичного аналізу текстів про культуру харчування,
    продовольчу політику та деколонізацію української кухні
content_outline:
  - section: 'Їжа як культурний код: етнографія та символіка української кухні'
    words: 1000
    subsections:
      - 'Обрядова їжа: кутя, паска, коливо — сакральний вимір харчування'
      - Борщ як культурний символ та предмет нематеріальної спадщини ЮНЕСКО
      - 'Мовна картина їжі: фразеологізми, приказки та метафори, пов''язані з
        харчуванням'
    key_concepts:
      - борщ
      - страва
      - автентичний
      - смаколик
    primary_sources:
      - Олександр Довженко, 'Зачарована Десна' (вибрані фрагменти про їжу як
        частину дитячих спогадів та ідилічного світу)
  - section: 'Деколонізація української кухні: від стереотипів до автентичності'
    words: 1000
    subsections:
      - 'Імперські спотворення: як російський та радянський наративи привласнили
        українську кухню'
      - Регіональне розмаїття української гастрономії — від Полісся до Причорномор'я
      - Сучасний рух за автентичність та повернення забутих рецептів
    key_concepts:
      - рецептура
      - кулінарія
      - гастрономія
      - вареники
  - section: 'Продовольча безпека та агрокультура: Україна як житниця'
    words: 1000
    subsections:
      - 'Україна і глобальна продовольча безпека: зерновий коридор та його
        геополітичне значення'
      - Сировинна база та агропромисловий комплекс як основа продовольчої
        незалежності
      - Дискурс продовольчої безпеки у контексті війни та відбудови
    key_concepts:
      - продовольчий
      - сировина
      - заготівля
      - консервація
    primary_sources:
      - Василь Стефаник, 'Камінний хрест' (вибрані фрагменти про зв'язок
        селянина із землею та хлібом)
  - section: 'Гастрономічна критика та ресторанна культура: нова українська кухня'
    words: 1000
    subsections:
      - Феномен нової української кухні та гастрономічний туризм
      - 'Мова гастрономічної критики: дегустація, рецензія, кулінарний наратив'
      - 'Ресторанний бум та гастрономічна ідентичність: від фастфуду до крафту'
    key_concepts:
      - дегустація
      - гурман
      - ферментація
      - калорійність
  - section: 'Їжа та пам''ять: Голодомор, спогади та зцілення через кухню'
    words: 1000
    subsections:
      - 'Голодомор як травма та її відбиток у ставленні українців до їжі: поведінкові
        патерни та колективна пам''ять'
      - 'Їжа діаспори: збереження ідентичності через кулінарні практики за кордоном'
      - 'Кулінарна спадщина як інструмент зцілення: психологічний та культурний
        виміри'
    key_concepts:
      - харчування
      - споживач
      - напівфабрикат
      - рецептура
word_target: 5000
vocabulary_hints:
  required:
    - гастрономія
    - кулінарія
    - харчування
    - автентичний
    - ферментація
    - борщ
    - вареники
    - смаколик
    - страва
    - рецептура
  recommended:
    - дегустація
    - гурман
    - продовольчий
    - сировина
    - консервація
    - заготівля
    - споживач
    - напівфабрикат
    - калорійність
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Автобіографічна проза
    topic: Аналіз описів їжі у «Зачарованій Десні» Олександра Довженка. Дослідження
      ролі гастрономічних образів у створенні ідилічного світу дитинства.
    key_elements:
      - сенсорні деталі
      - ностальгія
      - природний цикл
    motivation: Осмислення зв'язку між їжею та культурною пам'яттю через класичну
      прозу.
  - source_type: Новела
    topic: Дослідження символіки хліба та землі у прозі Василя Стефаника. Аналіз
      трагічного виміру зв'язку селянина із землею.
    key_elements:
      - земля
      - хліб
      - еміграція
      - втрата
    motivation: Розвиток навичок аналізу екзистенційного виміру теми харчування у
      модерністській прозі.
listening_situations:
  - media_type: документальний фільм
    setting: Фрагмент документального фільму про деколонізацію української кухні
      та повернення автентичних регіональних рецептів.
    focus_points:
      - Історія привласнення українських страв імперськими наративами
      - Роль сучасних шеф-кухарів у відновленні гастрономічної ідентичності
    motivation: Аналіз дискурсу про деколонізацію у гастрономічному контексті.
writing_tasks:
  - task_type: есе
    prompt: Напишіть аналітичне есе на тему «Борщ як культурний символ — чому
      боротьба за кухню є боротьбою за ідентичність?». Поєднайте культурологічний
      аналіз з історичним контекстом.
    requirements:
      - мінімум 700 слів
      - використання гастрономічної та культурологічної термінології
      - аргументована позиція з історичними та сучасними прикладами
    motivation: Перевірка здатності до аналізу культурних символів через
      міждисциплінарну призму.
    model_answer: Есе має поєднувати етнографічний аналіз борщу як обрядової та
      повсякденної страви з аналізом його привласнення та визнання ЮНЕСКО,
      демонструючи глибоке розуміння зв'язку між гастрономією та ідентичністю.
discussion_topics:
  - context: Чи є гастрономічна автентичність досяжною метою, чи кухня за своєю
      природою еволюціонує та запозичує?
    questions:
      - Де межа між збереженням рецептурної спадщини та кулінарною інновацією?
      - Як Голодомор вплинув на ставлення українців до їжі та харчові патерни?
    motivation: Дебати про автентичність, еволюцію та травму у контексті
      гастрономічної культури.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про їжа як культурний код: етнографія та символіка української кухні і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про деколонізація української кухні: від стереотипів до автентичності, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Їжа як культурний код: етнографія та символіка української кухні». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему їжа як культурний код: етнографія та символіка української кухні."
  - type: comparative-study
    focus: "Порівняйте різні підходи до їжа як культурний код: етнографія та символіка української кухні: Обрядова їжа: кутя, паска, коливо — сакральний вимір харчування. Визначте спільне та відмінне."
