vocabulary_hints:
  required:
  - голос (voice) — авторський голос, знайти свій голос; ключова частотна категорія
    С2
  - тон (tone) — іронічний тон, задавати тон, зміна тону; маркер емоційного регістру
  - ритм (rhythm) — ритм прози, рваний ритм; синтаксична організація тексту
  - автентичність (authenticity) — пошук автентичності, втрата автентичності; академічний
    реєстр
  - манерність (mannerism) — стилістична манерність, позбутися манерності; критичний
    термін
  - послідовність (consistency) — стилістична послідовність; рекомендована заміна
    кальки 'консистентність'
  - канцелярит (officialese) — нагромадження іменників, що робить голос 'сухим' та
    неприродним
  - афористичність (aphoristic quality) — інтелектуальний лаконізм, властивий голосу
    Л. Костенко
  recommended:
  - кольоровий слух (color hearing) — метод М. Коцюбинського для створення психологічного
    голосу
  - цілісність (integrity/unity) — цілісність стилю та світогляду автора
  - калькування (calquing) — помилка перенесення англійських синтаксичних структур
    (пасиву)
  - дієслівність (verb-centricity) — використання активних дієслів для посилення голосу
  - підпис (signature) — стилістичний підпис, унікальний набір мовних засобів
