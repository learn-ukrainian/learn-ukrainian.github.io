content_outline:
- section: Вступ — Сутність індивідуального голосу (Introduction — The Essence of
    Individual Voice)
  words: 750
  points:
  - Визначення авторського голосу як вищої стилістичної компетенції згідно з Державним
    стандартом (§4.3.6), розмежування понять 'голос', 'стиль' та 'манерність'.
  - 'Культурний гачок: Психологічний голос Михайла Коцюбинського в ''Intermezzo''
    — як використання ''кольорового слуху'' та ритму створює унікальну автентичність,
    відмінну від реалізму.'
- section: Тональні регістри та інтелектуальна напруга (Tonal Registers and Intellectual
    Tension)
  words: 900
  points:
  - 'Робота з тональними реєстрами: іронічний, ліричний та серйозний тони. Аналіз
    інтелектуального голосу Ліни Костенко — афористичність та гострота як стилістичний
    підпис.'
  - 'Типова помилка: Надуживання прикметниками та епітетами для створення ''краси''
    тексту замість роботи з точністю дієслова та ритмічною структурою.'
  - 'Порівняльний аналіз стилістичних прийомів на матеріалі текстів різних епох та жанрів із залученням сучасного українського медіадискурсу'
- section: Синтаксичний ритм та активні конструкції (Syntactic Rhythm and Active Constructions)
  words: 850
  points:
  - 'Аналіз ритму прози: вплив довжини речень та специфічних синтаксичних конструкцій
    на темп тексту. Пошук індивідуального ритмічного підпису.'
  - 'Подолання помилок: Калькування англійського синтаксису (passive voice) та нагромадження
    іменників (канцелярит) — вправи на трансформацію пасивних структур в активні дієслівні
    форми.'
  - 'Порівняльний аналіз стилістичних прийомів на матеріалі текстів різних епох та жанрів із залученням сучасного українського медіадискурсу'
- section: Лексичний fingerprint та термінологічна чистота (Lexical Fingerprint and
    Terminological Purity)
  words: 850
  points:
  - 'Вибір лексики та характерних образів. Свідомий підхід до термінології: перевага
    питомих слів (наприклад, ''послідовність'' або ''цілісність'' замість калькованого
    ''консистентність'').'
  - Лексичні преференції як інструмент формування особистого бренду в професійній
    комунікації, блогах та есеїстиці. Використання 'fingerprint' для ідентифікації
    автора.
- section: Подолання манерності та пошук автентичності (Overcoming Mannerism and Finding
    Authenticity)
  words: 850
  points:
  - 'Ризики імітації: як уникнути стилістичного кітчу при використанні архаїзмів або
    діалектизмів без внутрішнього ідейного стрижня. Плутанина між ''манерністю'' та
    ''голосом''.'
  - 'Методологія самоаналізу: виявлення несвідомих тенденцій у власних текстах, сильних
    та слабких сторін стилю через порівняння з еталонними зразками.'
- section: Практикум — Трансформація та шліфування стилю (Workshop — Style Transformation
    and Refinement)
  words: 800
  points:
  - 'Завдання за Держстандартом (§4.3.7): Трансформація одного уривку (теми) в три
    різні авторські голоси (наприклад, офіційно-професійний, іронічний блог, ліричне
    есе).'
  - Експериментування з голосом через імітацію улюбленого автора з наступним критичним
    аналізом та виділенням елементів власної автентичності.
