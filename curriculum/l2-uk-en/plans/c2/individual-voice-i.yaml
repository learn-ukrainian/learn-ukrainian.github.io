module: c2-014
level: C2
sequence: 14
version: 1.2.1
title: 'Індивідуальний голос: природа ідіостилю'
subtitle: 'Індивідуальний голос: природа ідіостилю'
focus: integration
pedagogy: workshop
objectives:
- Зрозуміти концепцію ідіостилю як унікальної системи мовних засобів конкретного автора
- Аналізувати механізми формування авторського голосу через лексичні домінанти, синтаксичну архітектоніку та образну систему
- Навчитися розпізнавати 'стилістичний підпис' видатних українських письменників та мислителів
- Почати свідоме формування власного індивідуального стилю письма через експериментування з мовними регістрами
content_outline:
- section: Феноменологія ідіостилю
  words: 1250
  subsections:
  - 'Стиль як вияв особистості: психолінгвістичний аспект'
  - 'Компоненти індивідуального стилю: лексикон, граматика, ритміка, прагматика'
  - 'Традиція vs Новаторство: як автор вписується в літературний канон та долає його'
  key_concepts:
  - ідіостиль
  - авторська інтенція
  - мовотворчість
  - концептосфера
- section: 'Стилістичні портрети: майстри українського слова'
  words: 1250
  subsections:
  - Інтелектуальна напруга та європейський контекст у стилі Лесі Українки
  - Орнаменталізм та барокова складність у письмі Валерія Шевчука
  - Постмодерний іронізм та карнавальність у мові Юрія Андруховича
  key_concepts:
  - інтелектуалізація
  - орнаменталізм
  - карнавальність
  - дискурс
  primary_sources:
  - Леся Українка, 'Кассандра' (фрагменти діалогів)
  - Юрій Андрухович, 'Рекреації' (стилістична розкутість)
- section: Маркери авторської присутності
  words: 1250
  subsections:
  - Індивідуально-авторські новотвори (оказіоналізми) як засіб маркування стилю
  - Улюблені синтаксичні конструкції та ритмічні малюнки
  - 'Специфіка використання засобів комічного: іронія, сарказм, гротеск'
  key_concepts:
  - оказіоналізм
  - підтекст
  - модальність
  - стилістема
- section: Шлях до власного стилю
  words: 1250
  subsections:
  - 'Від імітації до автентичності: етапи становлення авторського голосу'
  - 'Свідомий вибір мовної маски: навіщо письменнику кілька стилів?'
  - Редагування як шлях до кристалізації індивідуального вислову
  key_concepts:
  - автентичність
  - стилізація
  - саморедагування
  - мовна особистість
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Художній уривок
  topic: 'Аналіз ''загадкового'' стилю Миколи Хвильового. Джерело: ''Я (Романтика)''.'
  key_elements:
  - експресіонізм
  - рваний синтаксис
  - колірна символіка
  motivation: Вивчення експресіоністичного ідіостилю як способу передачі внутрішнього конфлікту.
- source_type: Есе
  topic: 'Інтелектуальна есеїстика Оксани Забужко. Джерело: ''Хроніки від Фортінбраса''.'
  key_elements:
  - довгий період
  - багаторівневе цитування
  - полемічний пафос
  motivation: Аналіз сучасного філософського ідіостилю.
listening_situations:
- media_type: відео
  setting: 'Виступ Ліни Костенко на творчому вечорі: коментарі до власних поезій.'
  focus_points:
  - Афористичність мовлення
  - Витончена іронія та етична безкомпромісність
  motivation: Сприйняття живого авторського голосу як вияву ідіостилю.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть опис одного і того ж осіннього парку від імені трьох різних авторів: 1) поета-символіста, 2) сухого архівіста,
    3) сучасного скептичного блогера.'
  requirements:
  - мінімум 450 слів
  - чітке маркування кожного ідіостилю
  - аналіз використаних засобів
  motivation: Розвиток здатності до стилістичної трансформації та пошук власного голосу через контраст.
  model_answer: Тексти мають демонструвати глибоке розуміння кожної 'маски'. Символіст має оперувати алегоріями, архівіст
    — точними фактами та пасивом, блогер — сленгом та риторичними вигуками.
discussion_topics:
- context: Чи може перекладач зберегти ідіостиль автора, чи переклад — це завжди ідіостиль перекладача?
  questions:
  - Які елементи стилю найважче піддаються перекладу?
  - Чи варто перекладачу 'покращувати' стиль оригіналу?
  motivation: Обговорення меж інтерпретації та збереження авторської унікальності.
activity_hints:
- type: reading
  focus: Прочитайте текст про феноменологія ідіостилю і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про стилістичні портрети: майстри українського слова, використовуючи нову
    лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Феноменологія ідіостилю». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему феноменологія ідіостилю.
- type: comparative-study
  focus: 'Порівняйте різні підходи до феноменологія ідіостилю: Стиль як вияв особистості: психолінгвістичний аспект. Визначте
    спільне та відмінне.'
references:
- Авраменко О. М. Українська література, 11 клас — аналіз ідіостилю
- Борзенко О. Українська література, 11 клас — модерністська проза та її стильові ознаки
- Забужко О. Хроніки від Фортінбраса — зразок інтелектуальної есеїстики
phase: C2.1 [Stylistic Perfection]
