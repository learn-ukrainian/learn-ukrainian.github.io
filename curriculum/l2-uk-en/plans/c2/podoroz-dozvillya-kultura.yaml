- type: essay-response
  focus: Аналітичне есе про культурний туризм як інструмент збереження спадщини
- type: critical-analysis
  focus: Аналіз рекламних туристичних текстів та порівняння з академічним дискурсом
  items: 8
- type: discussion
  focus: Дебати щодо впливу масового туризму на культурну спадщину
  items: 1
- type: match-up
  focus: Зіставлення типів туризму з відповідними регіонами та інституціями
  items: 12
