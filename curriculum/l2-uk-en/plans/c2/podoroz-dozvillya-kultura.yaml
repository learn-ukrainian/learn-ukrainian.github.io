title: 'Подорож, дозвілля, культура'
subtitle: 'Travel, Leisure and Culture'
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати різні форми туризму в Україні (екологічний, сільський, культурний) з використанням відповідної фахової
  термінології та публіцистичного регістру
- Learner can discuss travel logistics, accommodation types, and cultural institutions in Ukrainian at a nuanced C2
  level, comparing Ukrainian tourism infrastructure with international standards
- Конструювати аналітичне есе про роль культурного туризму у збереженні національної спадщини з опорою на конкретні
  приклади українських музеїв, фестивалів та філармоній
- Learner can critically evaluate the balance between active and passive recreation in Ukrainian culture, articulating
  personal preferences using sophisticated argumentative structures
