module: c2-080
level: C2
sequence: 80
version: 1.2.1
title: 'Подорожі та дозвілля: Культурний туризм та антропологія відпочинку'
subtitle: 'Подорожі та дозвілля: культурний туризм'
focus: vocabulary
pedagogy: workshop
objectives:
- Опанувати термінологію у сферах індустрії гостинності, креативного дозвілля та міжнародного туризму
- Аналізувати роль подорожей як способу пізнання світу, саморозвитку та культурної дипломатії
- Дослідити феномен 'повільного туризму' (slow travel) та автентичного досвіду в глобалізованому світі
- Розвинути навички планування та опису складних туристичних маршрутів та культурних подій
content_outline:
- section: 'Психологія подорожі: від пошуку екзотики до внутрішньої трансформації'
  words: 1250
  subsections:
  - 'Чому ми подорожуємо: мотивація, очікування та реальність'
  - 'Пошук автентичності в еру Instagram: між видовищем та справжнім досвідом'
  - Культурний шок та стратегії адаптації в новому середовищі
  key_concepts:
  - автентичність
  - культурний шок
  - саморефлексія
  - досвід
  primary_sources:
  - Леся Українка, вибрані листи з подорожей (Єгипет, Кавказ) — аналіз спостережень та стилю.
- section: 'Культурний та гастрономічний туризм в Україні: потенціал та реальність'
  words: 1250
  subsections:
  - 'Локальні бренди та ''місця сили'': розвиток внутрішнього туризму'
  - Гастрономічна спадщина як інструмент промоції регіонів
  - 'Індустрія гостинності (HoReCa): стандарти, тренди та вокабуляр'
  key_concepts:
  - місце сили
  - гастротуризм
  - інфраструктура
  - гостинність
- section: 'Індустрія дозвілля в цифрову епоху: віртуальні тури та гейміфікація досвіду'
  words: 1250
  subsections:
  - 'Цифрові кочівники (Digital Nomads): новий стиль життя та його вплив на ринок праці'
  - 'Віртуальний туризм: доповнена реальність (AR) та віртуальні екскурсії музеями'
  - 'Гейміфікація туристичних маршрутів: квести, мобільні додатки, інтерактивність'
  key_concepts:
  - цифровий кочівник
  - гейміфікація
  - доповнена реальність
  - інтеракт
  primary_sources:
  - Юрій Андрухович, 'Лексикон інтимних міст' (аналіз есе про подорожі та відчуття місця).
- section: Екологія подорожей та етика відповідального туризму
  words: 1250
  subsections:
  - Наслідки овертуризму (overtourism) для популярних напрямків
  - Екотуризм та збереження заповідних територій
  - 'Відповідальний мандрівник: як зменшити негативний вплив на довкілля'
  key_concepts:
  - овертуризм
  - екотуризм
  - сталий туризм
  - етичний кодекс мандрівника
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - match-up
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Ворон, 11 клас (2019): с. 239-240 — Професійний дискурс'
reading_situations:
- source_type: Епістолярій
  topic: Аналіз листів Лесі Українки з Єгипту. Дослідження її сприйняття іншої культури та мови описів.
  key_elements:
  - екзотика
  - спостережливість
  - ностальгія
  motivation: Вивчення класичного взірця українського інтелектуального travel-writing.
- source_type: Есеїстика
  topic: Аналіз есе Юрія Андруховича про міста. Вивчення засобів створення атмосфери та суб'єктивного сприйняття простору.
  key_elements:
  - міфологія міста
  - суб'єктивізм
  - інтертекстуальність
  motivation: Опанування сучасного художньо-публіцистичного стилю в описі подорожей.
listening_situations:
- media_type: подкаст
  setting: Бесіда з тревел-блогером про еволюцію подорожей у ХХІ столітті та феномен цифрового кочівництва.
  focus_points:
  - Переваги та недоліки життя в дорозі
  - Як змінилися запити туристів після пандемії
  motivation: Сприйняття сучасного розмовного та професійного лексикону тревел-індустрії.
writing_tasks:
- task_type: відгук
  prompt: Напишіть розширений аналітичний відгук про відвідування культурного об'єкта або туристичного маршруту, оцінивши
    його потенціал та сервіс.
  requirements:
  - мінімум 500 слів
  - використання професійної термінології
  - критична оцінка інфраструктури
  motivation: Розвиток навичок критичного письма та оцінювання послуг.
  model_answer: Текст має бути збалансованим, містити опис об'єкта, аналіз позитивних та негативних моментів та конструктивні
    рекомендації.
discussion_topics:
- context: Чи вбиває масовий туризм автентичність культури, перетворюючи її на товар для продажу?
  questions:
  - Чи можливо знайти компроміс між прибутком та збереженням спадщини?
  - Яка роль туриста у збереженні локальної ідентичності місця?
  motivation: Дебати про етичні аспекти глобального туризму.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про психологія подорожі: від пошуку екзотики до внутрішньої трансформації і дайте відповіді на
    запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про культурний та гастрономічний туризм в україні: потенціал та реальність,
    використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Психологія подорожі: від пошуку екзотики до внутрішньої трансформації».
    Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему психологія подорожі: від пошуку екзотики до
    внутрішньої трансформації.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до психологія подорожі: від пошуку екзотики до внутрішньої трансформації: Чому ми подорожуємо:
    мотивація, очікування та реальність. Визначте спільне та відмінне.'
