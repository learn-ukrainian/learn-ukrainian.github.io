content_outline:
- section: 'Вступ: Подорож як тематичний дискурс на рівні С2 (Introduction: Travel as C2 Thematic Discourse)'
  words: 600
  points:
  - 'Від базової туристичної лексики (A2-B1) до аналітичного дискурсу: С2-студент обговорює подорожі через призму
    культурної політики, сталого розвитку та регіональної ідентичності.'
  - 'Тематичне охоплення: інтеграція тем Державного стандарту 3.4 (Культурне дозвілля) та 3.6 (Подорожі) у єдиний
    аналітичний модуль із акцентом на українську специфіку.'
  - 'Регістрові очікування: переключення між публіцистичним (туристична журналістика), академічним (культурологічний
    аналіз) та розмовним (особисті подорожні наративи) стилями.'
- section: Форми туризму в Україні (Forms of Tourism in Ukraine)
  words: 800
  points:
  - 'Екологічний туризм (екотуризм): національні парки (Карпатський, Шацький, Асканія-Нова), принципи сталого туризму,
    відповідальне ставлення до природних ресурсів та біорізноманіття.'
  - 'Сільський туризм та агротуризм: агросадиби як форма автентичного знайомства з українською культурою; гостинність
    як культурна цінність; етнотуризм у різних регіонах (Гуцульщина, Полісся, Поділля).'
  - 'Культурний туризм: паломництво до об''єктів ЮНЕСКО (Софія Київська, Львівський історичний центр), літературні
    маршрути (Шевченківськими стежками), гастрономічний туризм як форма культурного пізнання.'
- section: Логістика подорожей (Travel Logistics)
  words: 750
  points:
  - 'Бронювання та резервування: відмінності між бронюванням готелю, резервуванням квитків та замовленням екскурсій;
    онлайн-платформи та їхня українська локалізація.'
  - 'Транспортна інфраструктура: залізничний транспорт (Укрзалізниця, класи вагонів), автобусне сполучення, внутрішні
    авіарейси; порівняння з європейськими стандартами.'
  - 'Типи розміщення: готель, хостел, санаторій, пансіонат, приватна садиба, кемпінг; історія санаторного відпочинку
    в Україні як культурний феномен радянської та пострадянської доби.'
- section: Культурні інституції та дозвілля (Cultural Institutions and Leisure)
  words: 800
  points:
  - 'Музейна справа: типологія музеїв (краєзнавчий, етнографічний, меморіальний, скансен); роль музеїв просто
    неба (Пирогів) у збереженні народної архітектури.'
  - 'Театральне та музичне мистецтво: філармонії (Національна філармонія України), оперні театри, драматичні театри;
    система абонементів та фестивальна культура (Koktebel Jazz, Leopolis Jazz Fest, GogolFest).'
  - 'Картинні галереї та виставковий простір: Національний художній музей, PinchukArtCentre; сучасне мистецтво
    як форма культурного дозвілля та його доступність для широкої аудиторії.'
- section: Активний і пасивний відпочинок (Active and Passive Recreation)
  words: 700
  points:
  - 'Активний відпочинок: гірськолижний туризм (Буковель, Драгобрат), водний туризм (рафтинг на Черемоші, каякінг),
    велотуризм та піший туризм у Карпатах; лексика спортивного відпочинку.'
  - 'Пасивний відпочинок: курортне лікування (Трускавець, Моршин, Миргород), СПА-культура, літературний відпочинок;
    філософія дозвілля в українській культурній традиції.'
  - 'Порівняльний аналіз: як культурні та економічні фактори впливають на вибір форми відпочинку; соціологічні
    дослідження щодо дозвіллєвих практик українців.'
- section: Порівняння культур та міжкультурний діалог (Cross-Cultural Comparison and Intercultural Dialogue)
  words: 700
  points:
  - 'Порівняння туристичних практик: українська vs європейська модель відпочинку; роль сімейних подорожей, колективного
    дозвілля та індивідуального туризму в різних культурних контекстах.'
  - 'Культурні непорозуміння та адаптація: типові ситуації міжкультурного непорозуміння під час подорожей; стратегії
    подолання культурного шоку та розвиток міжкультурної компетентності.'
  - 'Українська гостинність як культурний код: традиції привітності (хліб-сіль), гостинності в різних регіонах;
    як гостинність стає туристичним продуктом без втрати автентичності.'
- section: 'Практикум: Аналіз туристичного дискурсу (Workshop: Tourism Discourse Analysis)'
  words: 650
  points:
  - 'Прикладний аналіз: деконструкція рекламного туристичного тексту та порівняння його з академічним аналізом
    того самого напряму — виявлення маніпулятивних стратегій та фактичних спотворень.'
  - 'Есе-продукція: написання аналітичного есе на тему «Культурний туризм як інструмент збереження національної
    ідентичності» з інтеграцією аргументів різних регістрів.'
  - 'Дискусія: структуровані дебати на тему «Масовий туризм руйнує чи зберігає культурну спадщину?» із застосуванням
    аргументаційних моделей з c2-022 (Practical Rhetoric).'
vocabulary_hints:
  required:
  - екологічний туризм (eco-tourism) — розвиток екотуризму, засади екологічного туризму; ключовий термін сталого
    розвитку в туристичній галузі
  - сільський туризм (rural tourism) — сільський зелений туризм, розвивати сільський туризм; офіційний термін
    Державної програми розвитку туризму
  - резервування (reservation) — резервування місць, система онлайн-резервування; формальний термін для попереднього
    замовлення послуг
  - бронювання (booking) — бронювання готелю, підтвердження бронювання; стандартний туристичний термін
  - санаторій (sanatorium) — санаторно-курортне лікування, путівка до санаторію; культурно специфічний тип
    оздоровчого закладу
  - фестиваль (festival) — міжнародний фестиваль, фестивальна культура; ключове поняття культурного дозвілля
  - філармонія (philharmonic hall) — Національна філармонія, абонемент філармонії; інституція академічної
    музичної культури
  - мандрівка (journey/trip) — далека мандрівка, мандрівка Україною; літературно забарвлений синонім до «подорож»
  - картинна галерея (art gallery) — відвідати картинну галерею, виставка в галереї; термін для простору
    образотворчого мистецтва
  - екскурсія (excursion/guided tour) — оглядова екскурсія, тематична екскурсія; базовий термін організованого
    туризму з розширенням на C2
  recommended:
  - агросадиба (agritourism estate) — відпочинок на агросадибі, зареєструвати агросадибу; специфічний український
    тип сільського розміщення
  - гостинність (hospitality) — традиції гостинності, індустрія гостинності; подвійне значення — культурне
    та комерційне
  - етнотуризм (ethno-tourism) — розвиток етнотуризму, етнотуристичний маршрут; туризм із фокусом на етнічну
    автентичність
  - кемпінг (camping) — обладнаний кемпінг, кемпінгове обладнання; запозичення з англійської, адаптоване
    в українському туристичному дискурсі
  - культурна спадщина (cultural heritage) — нематеріальна культурна спадщина, об'єкт культурної спадщини;
    офіційний термін ЮНЕСКО та українського законодавства
activity_hints:
- type: quiz
  focus: Ідентифікація туристичних термінів та культурних інституцій у контексті
