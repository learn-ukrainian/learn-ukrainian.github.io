module: c2-040
level: C2
sequence: 40
version: 1.1.2
title: 'Практикум з мовної майстерності II: індивідуальний стиль'
subtitle: 'Практикум мовної майстерності II: індивідуальний стиль'
focus: integration
pedagogy: workshop
objectives:
- Вдосконалити індивідуальну манеру письма через опанування складних 
  стилістичних фігур
- Розвинути відчуття ритму та мелодики української прози та офіційної мови
- Навчитися адаптувати стиль викладу під конкретну цільову аудиторію та 
  комунікативну мету
- Опанувати методи глибокого стилістичного редагування та авторедагування
content_outline:
- section: Стилістична архітектура тексту
  words: 1000
  subsections:
  - 'Створення індивідуального стилю: між нормою та творчим експериментом'
  - Функціональне використання тропів у нехудожніх текстах
  - 'Стилістичний синтаксис: управління увагою читача через довжину та структуру речень'
  key_concepts:
  - стилістична фігура
  - індивідуальна манера
  - експресивність
  - комунікативна прагматика
  primary_sources:
  - Святослав Караванський, 'Пошук українського слова'
  - Олександр Потебня, 'Думка і мова' (вибрані фрагменти про психологію стилю)
- section: Ритм та евфонія складного вислову
  words: 1000
  subsections:
  - Милозвучність як засадничий принцип української стилістики
  - Ритмічна організація періоду в ораторському та публіцистичному мовленні
  - Уникнення мовної монотонності та стилістичної глухоти
  key_concepts:
  - ритмомелодика
  - евфонія
  - алітерація
  - період
- section: Техніки професійного редагування
  words: 1000
  subsections:
  - 'Вилучення стилістичного баласту: боротьба з канцеляризмами та штампами'
  - 'Уточнення семантики: вибір найбільш точного слова з синонімічного ряду'
  - 'Логіка та зв''язність: перевірка аргументації та переходів між частинами тексту'
  key_concepts:
  - концептуальна точність
  - когерентність
  - дискурсивна цілісність
  - редакторська правка
- section: 'Творчий синтез: від ідеї до довершеного тексту'
  words: 1000
  subsections:
  - 'Стилістична мімікрія та пастиш: вправи на імітацію різних стилів'
  - 'Трансформація тексту: зміна жанру та регістру без втрати змісту'
  - 'Фінальне шліфування: робота над афористичністю та яскравістю вислову'
  key_concepts:
  - стилістична трансформація
  - пастиш
  - афористичність
  - авторська інтенція
- section: Підсумок — Summary
  words: 300
  points:
  - 'Mastering individual style involves balancing norms with creative experimentation,
    utilizing stylistic figures (стилістичні фігури), and maintaining euphony (евфонія).
    Self-check: What is the difference between a neutral text and one with strong
    rhythm and alliteration? Rewrite a short paragraph to improve its rhythmic organization.'
  - 'Professional editing requires removing stylistic ballast (канцеляризми) and achieving
    conceptual accuracy. Self-check: How does sentence length affect reader attention?
    Transform a bureaucratic sentence into an expressive, aphoristic statement (афористичність)
    without losing its core meaning.'
word_target: 4000
activities:
  types_required:
  - error-correction
  - critical-analysis
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Стилістичне редагування'
- 'Авраменко, 11 клас (2019): Лексична стилістика'
- 'Заболотний, 11 клас (2019): Культура мовлення'
- 'Державний стандарт 2024: C2 — стилістична компетенція'
reading_situations:
- source_type: Есе / Теоретична праця
  topic: 'Аналіз мовних поглядів Олександра Потебні: зв''язок думки та слова.'
  key_elements:
  - внутрішня форма слова
  - образність
  - психологізм
  motivation: Глибоке розуміння філософських основ української стилістики.
- source_type: Практичний посібник
  topic: Поради Святослава Караванського щодо збагачення словникового запасу та 
    уникнення одноманітності.
  key_elements:
  - синоніміка
  - неологізми
  - питома лексика
  motivation: Вивчення практичних інструментів вдосконалення мовної 
    майстерності.
listening_situations:
- media_type: лекція
  setting: 'Майстер-клас провідного публіциста: ''Як зробити складний текст легким
    для читання''.'
  focus_points:
  - Структура аргументу
  - Використання метафор у бізнес-контексті
  motivation: Отримання практичних навичок професійного письма.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Візьміть фрагмент офіційно-ділового тексту (наприклад, постанову або інструкцію)
    і перепишіть його у трьох варіантах: як емоційне звернення в соцмережі, як фрагмент
    художньої прози та як науковий коментар. Проаналізуйте зміни у виборі лексики
    та синтаксису.'
  requirements:
  - мінімум 150 слів для кожного варіанту
  - чітка стилістична диференціація
  - короткий аналітичний коментар
  motivation: Розвиток гнучкості стилю та розуміння функціональних меж мови.
  model_answer: Тексти мають демонструвати повну зміну тональності, лексичного 
    складу та синтаксичних структур відповідно до обраного стилю.
discussion_topics:
- context: Чи існує 'ідеальний' стиль, чи він завжди залежить від контексту?
  questions:
  - Які ознаки сучасного 'успішного' тексту?
  - Як зберегти індивідуальність при написанні сухих академічних чи офіційних 
    текстів?
  motivation: Дискусія про природу стилю та межі творчої свободи у 
    функціональному мовленні.
activity_hints:
- type: reading
  focus: Прочитайте текст про стилістична архітектура тексту і дайте відповіді 
    на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про ритм та евфонія складного 
    вислову, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Стилістична 
    архітектура тексту». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    стилістична архітектура тексту.
- type: comparative-study
  focus: 'Порівняйте різні підходи до стилістична архітектура тексту: Створення індивідуального
    стилю: між нормою та творчим експериментом. Визначте спільне та відмінне.'
phase: C2.2 [Literary Mastery]
