content_outline:
- section: 'Вступ: Мета та структура літературного портфоліо (Introduction: Purpose
    and Structure)'
  words: 650
  points:
  - Визначення літературного портфоліо як інструменту самооцінки та реалізації вимог
    Стандарту §4.3.6 щодо створення текстів за планом.
  - Аналіз часопису «Кур'єр Кривбасу» як моделі професійної багатожанрової збірки
    (проза, поезія, критика).
  - Критерії відбору репрезентативних текстів для демонстрації творчої еволюції автора.
- section: 'Аналітичне есе: Від опису до літературознавчого аналізу (Analytical Essay:
    From Description to Analysis)'
  words: 1000
  points:
  - 'Подолання помилки описовості: трансформація анотацій (що написано) в авторський
    аналіз (чому обрано саме такі засоби).'
  - 'Практикум з усунення гіперпасивізації: заміна конструкцій «було зображено» на
    активний аналітичний голос «текст репрезентує».'
  - Інтеграція теоретичних концепцій (наратологія, структуралізм) з посиланням на
    попередні модулі M26-31.
- section: 'Творча лабораторія: Поезія та проза (Creative Lab: Poetry and Prose)'
  words: 1150
  points:
  - 'Демонстрація системи тропів за Стандартом §4.3.3: свідоме використання метафор,
    метонімій та перифраз для створення індивідуального голосу.'
  - 'Робота з просодією (M22, M28): коментар до вибору метричних форм (ямб, верлібр)
    як засіб посилення художнього образу.'
  - 'Нарратологічний самоаналіз прозового уривка: обґрунтування вибору точки зору
    та типу наратора (M27, M29).'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: 'Перекладацький розділ: Традиція та коментар (Translation Section: Tradition
    and Commentary)'
  words: 1150
  points:
  - 'Трансформація стилів за Стандартом §4.3.7: перехід від художнього тексту оригіналу
    до науково-критичного коментаря перекладача.'
  - 'Школа Миколи Лукаша та Григорія Кочура: застосування стандартів академічного
    перекладацького коментаря до власних рішень.'
  - 'Порівняльний аналіз оригіналу та перекладу: обґрунтування відтворення культурних
    та лексичних особливостей.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: 'Підсумок: Рефлексія та стилістична цілісність (Summary: Reflection and
    Stylistic Integrity)'
  words: 1050
  points:
  - 'Створення вторинного тексту за Стандартом §4.3.8: рефлексивний звіт як фінальний
    акорд самооцінки компетентностей.'
  - 'Корекція стильової непослідовності: забезпечення єдиного академічного регістру
    в метатекстах портфоліо (есе, коментарі, рефлексія).'
  - Формулювання плану подальшого вдосконалення на основі ідентифікованих зон росту.
