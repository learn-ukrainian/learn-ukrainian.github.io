vocabulary_hints:
  required:
  - портфоліо (portfolio) — укласти літературне портфоліо; стабільний термін академічного
    реєстру
  - збірка (collection) — укласти збірку поезій; ключовий термін видавничої сфери
  - самооцінка (self-assessment) — критерії адекватної самооцінки; психолого-педагогічний
    контекст
  - рефлексія (reflection) — критична рефлексія над текстом; високий академічний стиль
  - майстерність (mastery) — художня майстерність автора; стандарт літературної критики
  - авторський коментар (author's commentary) — написати розгорнутий коментар; видавничий
    стандарт
  recommended:
  - когерентність (coherence) — тематична когерентність тексту; термін лінгвістики
    тексту
  - репрезентативність (representativeness) — репрезентативність творчої вибірки;
    науковий реєстр
  - стилістична цілісність (stylistic integrity) — зберігати цілісність документа;
    критерій оцінювання C2
  - творча еволюція (creative evolution) — простежити еволюцію митця; публіцистичний
    штамп
  - еклектика (eclecticism) — свідома стильова еклектика; мистецтвознавчий термін
