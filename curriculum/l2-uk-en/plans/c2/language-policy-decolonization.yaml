slug: language-policy-decolonization
version: '2.0'
title: Мовна політика та деколонізація
subtitle: Language Policy and Decolonization
focus: culture
pedagogy: TTT
phase: C2.4 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Learner can analyze historical and contemporary language policies in Ukraine using appropriate academic terminology
- Learner can articulate the mechanisms of linguistic colonization and decolonization with reference to Ukrainian and global
  contexts
- Learner can critically evaluate the sociolinguistic consequences of wartime language shift and its implications for national
  identity
- Learner can construct a well-argued analytical essay on language policy using evidence from legal documents and sociological
  data
