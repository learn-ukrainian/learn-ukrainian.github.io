module: c2-088
level: C2
sequence: 88
version: 1.2.2
title: Мовна політика та деколонізація
subtitle: Мовна політика і деколонізація
focus: cultural
pedagogy: seminar
objectives:
- Проаналізувати історичний контекст мовної політики в Україні від імперських 
  заборон до сучасності
- Дослідити механізми лінгвоциду та їхній вплив на сучасний стан української 
  мови
- Вивчити нормативно-правову базу функціонування української мови як державної
- Осмислити стратегії деколонізації публічного простору, топоніміки та 
  свідомості
content_outline:
- section: 'Історія мовних репресій: від Валуєвського циркуляра до радянського зросійщення'
  words: 1250
  subsections:
  - Імперські укази XIX століття та їхні довгострокові наслідки
  - 'Радянська мовна політика: теорія ''зближення націй'' та прихований лінгвоцид'
  - Методи штучного зближення української мови з російською в словниках та 
    граматиках
  key_concepts:
  - лінгвоцид
  - валуєвський циркуляр
  - емський указ
  - асиміляція
  primary_sources:
  - Тексти Валуєвського циркуляра та Емського указу (для аналізу мови заборон)
- section: Сучасне законодавство та державна мовна політика
  words: 1250
  subsections:
  - 'Закон України ''Про забезпечення функціонування української мови як державної'':
    ключові положення'
  - Роль Уповноваженого із захисту державної мови у забезпеченні прав громадян
  - Державний стандарт української мови та система сертифікації рівнів володіння
  key_concepts:
  - мовний омбудсмен
  - державна мова
  - мовна квота
  - іспит на рівень володіння
  primary_sources:
  - Закон України «Про забезпечення функціонування української мови як 
    державної»
- section: Деколонізація та деокупація мовного простору
  words: 1250
  subsections:
  - 'Очищення топоніміки: перейменування як шлях до повернення історичної пам''яті'
  - 'Деколонізація культурного дискурсу: подолання меншовартості та імперських міфів'
  - Психологічні аспекти переходу на українську мову в дорослому віці
  key_concepts:
  - деколонізація
  - топоніміка
  - мовна стійкість
  - постколоніальний синдром
  primary_sources:
  - Маніфести та публікації руху «Марафон переходу на українську»
- section: Мовна стійкість та майбутнє української мови
  words: 1250
  subsections:
  - Поняття мовної стійкості та фактори, що її підтримують
  - 'Українська мова у світовому контексті: діаспора та міжнародний інтерес'
  - Роль еліти та лідерів думок у формуванні мовної моди
  key_concepts:
  - мовна стійкість
  - м'яка сила
  - мовна екологія
  - престиж мови
  primary_sources:
  - Праці Лариси Масенко про соціолінгвістичний аспект української мови
- section: Підсумок — Summary
  words: 300
  points:
  - 'Understanding historical language policy requires mastering concepts like лінгвоцид,
    асиміляція, and деколонізація. Self-check: What is the difference between Валуєвський
    циркуляр and Емський указ? Name 3 methods of historical language repression in
    Ukraine.'
  - 'Modern linguistic space focuses on мовна стійкість and the role of the мовний
    омбудсмен. Self-check: How does changing street names (топоніміка) contribute
    to decolonization? Describe 3 psychological challenges of transitioning to Ukrainian
    in adulthood.'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - reading
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Діалекти, варіантність'
- 'Державний стандарт 2024: C2 — соціолінгвістична компетенція'
reading_situations:
- source_type: офіційний документ / закон
  topic: 'Аналіз мовних норм у Законі про державну мову: права та обов''язки громадян.'
  key_elements:
  - сфера застосування
  - державна служба
  - публічний простір
  motivation: Розуміння правового статусу мови та механізмів його захисту.
- source_type: науково-публіцистична стаття
  topic: Лариса Масенко про 'мовний конфлікт' та шляхи його вирішення в Україні.
  key_elements:
  - білінгвізм
  - диглосія
  - національна ідентичність
  motivation: Вивчення професійного погляду на соціолінгвістичну ситуацію в 
    Україні.
listening_situations:
- media_type: інтерв'ю
  setting: 'Інтерв''ю з Уповноваженим із захисту державної мови: виклики та досягнення
    мовної політики.'
  focus_points:
  - Статистика скарг на порушення мовного закону
  - Пріоритетні напрямки роботи на наступний рік
  motivation: Сприйняття офіційної позиції держави щодо мовних питань.
writing_tasks:
- task_type: есе
  prompt: Проаналізуйте роль деколонізації топонімії (перейменування вулиць, 
    міст) у процесі формування сучасної української ідентичності. Чи є цей 
    процес незворотним?
  requirements:
  - мінімум 600 слів
  - аргументація з історичними паралелями
  - 'використання термінів: символічний простір, дерашизація'
  motivation: Розвиток здатності аналізувати складні суспільно-політичні процеси
    через мовну призму.
  model_answer: Есе має демонструвати розуміння важливості топоніміки як частини
    культурного ландшафту та оцінювати вплив змін на колективну свідомість.
discussion_topics:
- context: 'Суперечка про ''лагідну'' vs ''радикальну'' українізацію: який шлях є
    більш ефективним у довгостроковій перспективі?'
  questions:
  - Чи може державна політика змінити приватну мовну поведінку?
  - Яка роль економічних стимулів у підтримці української мови?
  motivation: Дискусія про стратегії та методи впровадження мовної політики.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про історія мовних репресій: від валуєвського циркуляра
    до радянського зросійщення і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про сучасне законодавство та 
    державна мовна політика, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Історія мовних репресій:
    від Валуєвського циркуляра до радянського зросійщення». Обґрунтуйте свою позицію
    прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему історія
    мовних репресій: від валуєвського циркуляра до радянського зросійщення.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до історія мовних репресій: від валуєвського циркуляра
    до радянського зросійщення: Імперські укази XIX століття та їхні довгострокові
    наслідки. Визначте спільне та відмінне.'
