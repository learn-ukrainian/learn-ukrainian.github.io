content_outline:
- section: 'Вступ: Когерентність vs когезія (Introduction: Coherence vs Cohesion)'
  words: 600
  points:
  - 'Диференціація понять: когезія як видима граматична/лексична зв''язність та когерентність як невидима логічна модель тексту'
  - Аналіз причин розпаду тексту на рівні смислів та граматики крізь призму Державного стандарту §4.3.4 щодо елементів структурування
- section: Тематична прогресія та актуальне членування (Thematic Progression and Information Structure)
  words: 1000
  points:
  - Застосування принципу 'Дане — Нове' (Given-New principle) для керування інформаційним потоком у реченні
  - 'Learner error: Порушення актуального членування речення (Rheme-Theme misalignment) — помилкове винесення нової інформації
    на початок речення, що руйнує плинність'
  - 'Мапування типів прогресії: лінійна, константна та розгалужена теми як каркас логічної наступності'
- section: Граматичні та лексичні засоби когезії (Grammatical and Lexical Means of Cohesion)
  words: 1000
  points:
  - Глибокий аналіз референції, заміщення та еліпсису як засобів уникнення тавтології та підтримки динаміки
  - 'Learner error: ''Пастка і/потім'' (The ''And Then'' trap) — зловживання елементарними сполучниками; корекція через використання
    конекторів ''водночас'', ''натомість'', ''згодом'''
  - Стилістичні функції лексичного повтору та синонімічної деривації для зміцнення текстової тканини
- section: Риторична спадщина та художній плин (Rhetorical Heritage and Artistic Flow)
  words: 900
  points:
  - 'Барокова традиція Києво-Могилянської риторики (Теофан Прокопович): концепції ''ornatus'' та логічної переконливості як
    витоки сучасної когерентності'
  - 'Аналіз ''імпресіоністичного плину'' Михайла Коцюбинського (на прикладі ''Intermezzo''): синтаксична когезія як засіб
    створення безперервного сенсорного досвіду'
- section: Логіка абзацу та архітектоніка тексту (Paragraph Logic and Text Architectonics)
  words: 750
  points:
  - 'Робота з мікротемами: абзац як завершена смислова одиниця з тезою та перехідними містками'
  - 'Learner error: Фрагментація параграфів — випадкові розриви замість логічного секціонування; відпрацювання ''речень-мостів''
    між секціями тексту'
- section: 'Практикум: Редагування та синтез (Practicum: Editing and Synthesis)'
  words: 750
  points:
  - 'Критичний аналіз когерентності в академічному дискурсі: виявлення логічних лакун та слабких конекторів'
  - Редагування 'переривчастих' текстів (choppy text) для досягнення стилістичного ідеалу плинності та наступності
vocabulary_hints:
  required:
  - когерентність (coherence) — логічна когерентність, когерентність викладу; academic register
  - когезія (cohesion) — засоби когезії, лексична когезія; linguistics focus
  - плинність (flow) — забезпечити плинність думок, плинність мови; high stylistic value
  - референція (reference) — анафорична/катафорична референція; functional tool
  - конектор (connector) — логічний конектор, варіативність конекторів; structuring element
  - рема (rheme) — актуальне членування, фокус нової інформації; technical syntax term
  recommended:
  - наступність (continuity) — логічна наступність, принцип наступності; formal register
  - актуальне членування (information structure) — тема-рематична структура речення
  - дискурс (discourse) — науковий дискурс, аналіз дискурсу; context marker
  - анафора (anaphora) — засіб референції до попереднього контексту
  - катафора (cataphora) — підготовка сприйняття наступної інформації
