module: c2-016
level: C2
sequence: 16
version: 1.2.2
title: Когерентність та цілісність тексту
subtitle: Зв'язність і цілісність тексту
focus: integration
pedagogy: seminar
objectives:
- Досконало опанувати механізми забезпечення логічної та смислової зв'язності 
  складних текстів
- 'Навчитися використовувати різноманітні засоби текстотворення: лексичні повтори,
  займенникові заміни, сполучникові зв''язки та анафору'
- Дослідити структуру складного синтаксичного цілого та абзацу як одиниць 
  мікротеми
- Розвинути навички створення цілісного тексту з чіткою аргументацією та 
  послідовним викладом думок
content_outline:
- section: 'Категорії тексту: когезія та когерентність'
  words: 1250
  subsections:
  - 'Когезія як формальна зв''язність: граматичні та лексичні засоби'
  - 'Когерентність як смислова цілісність: логіка, концептуальність, прагматика'
  - Роль заголовка та ключових слів у формуванні цілісності тексту
  key_concepts:
  - когезія
  - когерентність
  - цілісність
  - зв'язність
- section: Засоби зв'язку в українському тексті
  words: 1250
  subsections:
  - 'Лексичні засоби: повтори, синоніми, антоніми, слова однієї тематичної групи'
  - 'Граматичні засоби: займенники, прислівники, видо-часові форми дієслів'
  - Сполучники та вставні слова як логічні конектори
  key_concepts:
  - анафора
  - епіфора
  - конектор
  - тематичне поле
  primary_sources:
  - Юрій Шевельов, 'Нарис сучасної української літературної мови' (структура 
    тексту)
  - Дмитро Павличко, літературно-критичні есе (логіка викладу)
- section: Архітектоніка абзацу та складного синтаксичного цілого
  words: 1250
  subsections:
  - Абзац як змістовий та композиційний вузол тексту
  - 'Типи зв''язку між реченнями: ланцюговий, паралельний, змішаний'
  - 'Тема та рема: актуальне членування речення в контексті цілого тексту'
  key_concepts:
  - складне синтаксичне ціле
  - тема-рематична послідовність
  - ланцюговий зв'язок
  - паралелізм
- section: Стратегії побудови аргументативного тексту
  words: 1250
  subsections:
  - Структура 'Теза — Аргумент — Приклад — Висновок' (ТАПВ)
  - Забезпечення перехідності між частинами тексту через риторичні переходи
  - Роль вступу та висновку у створенні кільцевої композиції та смислової 
    завершеності
  key_concepts:
  - аргументація
  - теза
  - висновок
  - риторичний перехід
- section: Підсумок — Summary
  words: 300
  points:
  - Text unity depends on formal linking (когезія) and logical flow 
    (когерентність). Sentences within paragraphs are connected via chain 
    (ланцюговий) or parallel (паралельний) links using pronouns, synonyms, and 
    conjunctions.
  - "Self-check: What is the main difference between когезія and когерентність? Name
    3 lexical linking devices (засоби зв'язку). Write a short paragraph using the
    ТАПВ (Теза — Аргумент — Приклад — Висновок) structure and identify the theme/rheme
    in each sentence."
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Глазова, 11 клас (2019): §30-32 — Текст як одиниця мовлення'
- 'Державний стандарт 2024: C2 — текстотворча компетенція'
reading_situations:
- source_type: Наукова стаття
  topic: Аналіз логічної зв'язності в історичному дослідженні Сергія Плохія.
  key_elements:
  - хронологічна послідовність
  - причинно-наслідкові зв'язки
  - термінологічна єдність
  motivation: Вивчення методів побудови великого інтелектуального наративу.
- source_type: Художній уривок
  topic: Руйнування когерентності як стилістичний прийом у літературі абсурду.
  key_elements:
  - алогізм
  - фрагментарність
  - відсутність зв'язків
  motivation: Розуміння важливості когерентності через її свідоме порушення.
listening_situations:
- media_type: лекція
  setting: Виступ філософа про структуру європейської думки та її відображення в
    мові.
  focus_points:
  - Використання пауз для розділення смислових блоків
  - Засоби логічного переходу між тезами
  motivation: Аналіз когерентності усного інтелектуального виступу.
writing_tasks:
- task_type: есе
  prompt: Напишіть розлоге есе на тему 'Свобода слова vs Відповідальність за 
    слово', забезпечивши максимальну логічну та граматичну зв'язність. 
    Проаналізуйте використані вами засоби зв'язку.
  requirements:
  - мінімум 500 слів
  - використання ланцюгового та паралельного зв'язку
  - наявність чіткої структури ТАПВ
  motivation: Практичне відпрацювання створення когерентного тексту на складну 
    тему.
  model_answer: Есе має демонструвати майстерне володіння конекторами. Кожен 
    абзац повинен логічно випливати з попереднього. Висновок має не просто 
    дублювати тезу, а синтезувати аргументи на вищому рівні.
discussion_topics:
- context: Чи змінилося наше сприйняття цілісності тексту в епоху гіпертексту та
    кліпового мислення?
  questions:
  - Чи може текст бути цілісним без лінійної структури?
  - Як посилання (лінки) впливають на когерентність нашого мислення?
  motivation: Дискусія про еволюцію текстотворення у цифровому світі.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про категорії тексту: когезія та когерентність і дайте
    відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про засоби зв'язку в 
    українському тексті, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Категорії тексту:
    когезія та когерентність». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему категорії
    тексту: когезія та когерентність.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до категорії тексту: когезія та когерентність:
    Когезія як формальна зв''язність: граматичні та лексичні засоби. Визначте спільне
    та відмінне.'
phase: C2.1 [Stylistic Perfection]
