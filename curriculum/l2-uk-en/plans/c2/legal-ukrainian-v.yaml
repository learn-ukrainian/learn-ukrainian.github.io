vocabulary_hints:
  required:
  - судова практика (judicial practice) — єдність судової практики, стала судова практика,
    узагальнення практики
  - правова позиція (legal position) — формування правової позиції, відступ від правової
    позиції ВС
  - мотивувальна частина (reasoning/rationale) — скласти мотивувальну частину, обґрунтування
    рішення
  - резолютивна частина (operative part) — оголосити резолютивну частину, набрання
    законної сили
  - кваліфікація (qualification) — правова кваліфікація злочину, помилкова кваліфікація
  - касаційне провадження (cassation proceedings) — перегляд у касаційному порядку,
    відкриття провадження
  - згідно із законом (according to law) — обов’язкове вживання прийменника 'із' та
    орудного відмінка
  recommended:
  - вирок (verdict) — рішення суду по суті у кримінальній справі
  - ухвала (court ruling) — судове рішення щодо процесуальних питань
  - постанова (resolution) — рішення судів апеляційної та касаційної інстанцій
  - юридичний факт (legal fact) — встановлення факту, що має юридичне значення
  - аналітична записка (analytical note) — вторинний текст, що містить аналіз та висновки
  - канцеляризми (cancellarisms) — згідно з, відповідно до, у зв’язку з, з метою
