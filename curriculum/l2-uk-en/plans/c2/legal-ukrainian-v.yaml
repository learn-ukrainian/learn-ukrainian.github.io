content_outline:
- section: Вступ — Методологія аналізу судових справ (Introduction — Case Analysis
    Methodology)
  words: 500
  points:
  - Мета та завдання аналізу справ у контексті вимог Державного стандарту (§3.7) щодо
    прав і обов’язків
  - 'Cultural hook: Єдиний державний реєстр судових рішень (ЄДРСР) як унікальний інструмент
    прозорості та громадського контролю в Україні'
  - 'Джерела судової практики та ієрархія норм: Конституція, міжнародні договори,
    кодекси та закони'
- section: Види та структура судових рішень (Types and Structure of Court Decisions)
  words: 600
  points:
  - 'Learner error: розрізнення понять ''рішення'' (цивільні справи), ''вирок'' (кримінальні),
    ''ухвала'' (процесуальні питання) та ''постанова'' (апеляція/касація)'
  - 'Аналіз структурних частин: вступна, описова, мотивувальна та резолютивна частини
    рішення'
  - 'Юридична точність: використання термінів ''скасувати рішення'' vs ''визнати нечинним
    акт'' vs ''розірвати договір'''
- section: Алгоритм аналізу цивільної справи (Civil Case Analysis Algorithm)
  words: 600
  points:
  - Визначення характеру правовідносин та встановлення юридичних фактів, що мають
    значення для справи
  - Оцінка доказової бази та застосування норм матеріального і процесуального права
    судом
  - 'Правове обґрунтування: логіка побудови мотивувальної частини в цивільному судочинстві'
- section: Особливості аналізу кримінальної справи (Specifics of Criminal Case Analysis)
  words: 600
  points:
  - 'Правова кваліфікація злочину: точність формулювань згідно із Кримінальним кодексом
    України'
  - 'Learner error: правильне вживання конструкцій ''згідно із законом'' або ''відповідно
    до закону'' замість кальки ''згідно закону'' (§4.3.3)'
  - Аналіз обставин, що пом'якшують або обтяжують покарання, та доказової бази обвинувачення
- section: Правові позиції та єдність судової практики (Legal Positions and Unity
    of Judicial Practice)
  words: 600
  points:
  - 'Cultural hook: Реформа 2016 року та зміна назви на ''Верховний Суд'' (без ''України'')
    як маркер компетентності'
  - Механізм формування правової позиції Великою Палатою ВС та поняття відступу від
    попередньої практики
  - Уніфікація судової практики через постанови Пленуму ВС та висновки в касаційних
    провадженнях
- section: Методика підготовки аналітичної записки (Methodology for Preparing an Analytical
    Note)
  words: 600
  points:
  - Навички створення вторинних текстів на основі судових рішень згідно з вимогами
    стандарту (§4.3.8)
  - 'Структура аналітичної записки: від викладу обставин до формулювання практичних
    рекомендацій'
  - 'Стилістичні засоби офіційно-ділової лексики: доречне використання канцеляризмів
    та сталих зворотів'
- section: 'Практикум: Від реєстру до висновку (Practicum: From Register to Conclusion)'
  words: 500
  points:
  - 'Робота з реальними кейсами ЄДРСР: пошук за номером справи (напр., № 757/12345/20-ц)
    та аналіз резолютивної частини'
  - Складання фрагмента аналітичної записки з дотриманням Senior Specialist tone та
    офіційного стилю
vocabulary:
  required:
  - судова практика (judicial practice/case law)
  - правова позиція (legal position)
  - мотивувальна частина (reasoning/rationale)
  - резолютивна частина (operative part)
  - кваліфікація (qualification)
  - обставини справи (circumstances of the case)
  - доказова база (evidentiary base)
  - касаційне провадження (cassation proceedings)
  - уніфікація (unification)
  - Пленум (Plenum)
  recommended:
  - аналітична записка (analytical note)
  - пом'якшуючі обставини (mitigating circumstances)
  - обтяжуючі обставини (aggravating circumstances)
  - правовідносини (legal relations)
  - юридичний факт (legal fact)
  forbidden: '[]'
