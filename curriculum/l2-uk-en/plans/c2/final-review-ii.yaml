vocabulary_hints:
  required:
  - лексика (vocabulary/lexis) — стилістичні засоби лексики; активна та пасивна лексика
  - синонімія (synonymy) — багатство синонімічних рядів; контекстуальна синонімія
  - паронімія (paronymy) — паронімічна плутанина; розрізнення значень паронімів
  - колокація (collocation) — стійка колокація; типові лексичні сполучення
  - ідіома (idiom) — фразеологічна одиниця; ідіоматика на рівні носія
  - архаїзм (archaism) — застарілі слова; використання у стилістичних цілях
  - неологізм (neologism) — індивідуально-авторські неологізми; запозичення
  - концепція (concept) — наукова концепція, розробити концепцію; high academic frequency
  - аналіз (analysis) — глибокий аналіз, піддати аналізу; general/academic high frequency
  - дискурс (discourse) — публічний дискурс, дискурсивна практика; academic register
  - методологія (methodology) — методологія дослідження, методологічні засади; academic
  recommended:
  - контекстуалізація (contextualization) — історична контекстуалізація; low frequency
    academic
  - інтерпретація (interpretation) — багатогранна інтерпретація; наукова інтерпретація
  - синтез (synthesis) — лексичний синтез; синтез знань та вмінь
  - конотація (connotation) — емоційно-експресивна конотація; стилістичне забарвлення
  - етимологія (etymology) — етимологічний аналіз; походження слова
