module: final-review-ii
level: C2
sequence: 102
version: "1.0"
title: "Підсумковий огляд II: Синтаксис, пунктуація та текстознавство"
subtitle: "Final Review II: Syntax, Punctuation, and Textology"
focus: integration
pedagogy: review
objectives:
  - "Систематизувати знання про структуру складного речення та складного синтаксичного цілого"
  - "Узагальнити правила пунктуації у складних випадках (авторська пунктуація, дужки, тире)"
  - "Проаналізувати засоби забезпечення когезії та когерентності у текстах різних стилів"
  - "Вдосконалити навички синтаксичної трансформації та стилістичного редагування"
content_outline:
  - section: "Складний синтаксис: структура та семантика"
    words: 1000
    subsections:
      - "Комбіновані типи складних речень: аналіз багаторівневої структури"
      - "Безсполучникове речення: смислові відношення та способи їх вираження"
      - "Складне синтаксичне ціло (абзац) як одиниця тексту"
    key_concepts:
      - "складне синтаксичне ціле"
      - "період"
      - "багатокомпонентне речення"
      - "паралелізм"
    primary_sources:
      - "Лінгвістичні праці про структуру українського речення (наприклад, І. Вихованець)"
  - section: "Пунктуаційна система: від норми до експресії"
    words: 1000
    subsections:
      - "Функції тире у простому та складному реченнях: узагальнюючий огляд"
      - "Пунктуація при вставних та вставлених конструкціях, відокремлених членах"
      - "Авторська пунктуація в художній літературі: коли розділовий знак стає метафорою"
    key_concepts:
      - "авторський знак"
      - "інтонаційне тире"
      - "відокремлення"
      - "пунктограма"
    primary_sources:
      - "Український правопис 2019 (розділи про пунктуацію)"
  - section: "Текстознавство та дискурс-аналіз"
    words: 1000
    subsections:
      - "Категорії тексту: цілісність, завершеність, інтенційність"
      - "Аналіз інтертекстуальності: цитати, алюзії, ремінісценції"
      - "Типологія дискурсів: від наукового до цифрового (соцмережі)"
    key_concepts:
      - "когезія"
      - "когерентність"
      - "інтертекстуальність"
      - "прецедентний текст"
    primary_sources:
      - "Тексти сучасної української есеїстики (Юрій Андрухович, Сергій Жадан)"
  - section: "Стилістичний синтаксис та редагування"
    words: 1000
    subsections:
      - "Трансформація пасивних конструкцій в активні для посилення динаміки"
      - "Використання риторичних фігур синтаксису: інверсія, еліпсис, градація"
      - "Редагування великих текстових масивів на предмет логічних провалів"
    key_concepts:
      - "синтаксична інверсія"
      - "еліпсис"
      - "градація"
      - "стилістична правка"
    primary_sources:
      - "Редакторські стандарти видавництв (наприклад, 'А-БА-БА-ГА-ЛА-МА-ГА')"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - error-correction
    - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "художній уривок"
    topic: "Аналіз авторської пунктуації у текстах Василя Стефаника: роль тире та короткого речення."
    key_elements: ["експресія", "ритміка", "психологізм"]
    motivation: "Вивчення експресивних можливостей пунктуації."
  - source_type: "наукова стаття"
    topic: "Механізми забезпечення зв'язності тексту в наукових працях О. Потебні."
    key_elements: ["логічний перехід", "анафора", "термінологічна повторюваність"]
    motivation: "Аналіз досконалої структури академічного тексту."
listening_situations:
  - media_type: "лекція"
    setting: "Вебінар про сучасні тенденції в українському синтаксисі та вплив іноземних мов."
    focus_points:
      - "Парцеляція та її функції"
      - "Спрощення синтаксичних конструкцій у медіа"
    motivation: "Розуміння живих процесів у синтаксичній системі."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть складний синтаксичний опис архітектурної пам'ятки (наприклад, Софії Київської), використовуючи різні типи складних речень та риторичні фігури синтаксису."
    requirements: ["мінімум 500 слів", "використання періоду", "застосування інверсії та градації"]
    motivation: "Практичне відпрацювання майстерності складного синтаксису."
    model_answer: "Текст має бути піднесеним, структурно складним, але логічно прозорим."
discussion_topics:
  - context: "Чи вбиває інтернет-спілкування пунктуаційну грамотність?"
    questions:
      - "Чи можна вважати 'смайли' новими розділовими знаками?"
      - "Яка роль крапки в кінці повідомлення у месенджерах: граматика чи пасивна агресія?"
    motivation: "Обговорення еволюції пунктуації у цифровому середовищі."
