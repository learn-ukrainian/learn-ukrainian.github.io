content_outline:
- section: Вступ (Introduction — C2 Lexical Mastery)
  words: 500
  points:
  - Аналіз обсягу активного словника на рівні C2 (~12,000 слів) та концепція глибини
    знання лексики (семантичні нюанси vs. просте впізнавання)
  - 'Методологія лексичного розвитку: перехід від кількісного накопичення до якісної
    стилістичної гнучкості згідно з Державним стандартом §4.3.3'
- section: Стилістична диференціація та історія мови (Stylistic Differentiation and
    Linguistic History)
  words: 1100
  points:
  - 'Класифікація лексики за §4.3.3: нейтральна, стилістично маркована, архаїзми,
    історизми та індивідуально-авторські неологізми'
  - 'Культурний код: Іван Котляревський та «Енеїда» як приклад лексичного вибуху;
    використання бурлеску та поєднання різних мовних пластів'
  - 'Історія лексикографії як боротьба за ідентичність: аналіз цензурних правок у
    СУМ-11 та повернення автентичних лексем у СУМ-20'
- section: Синонімія та уникнення лексичних пасток (Synonymy and Avoiding Lexical
    Traps)
  words: 1100
  points:
  - 'Робота з синонімічними рядами для досягнення точності: вибір слова залежно від
    дискурсу (науковий, публічний, політичний)'
  - 'Корекція типових помилок (False Friends): розрізнення «акуратний» vs «точний»
    (accurate) та «фабрика» vs «тканина» (fabric)'
  - 'Подолання стилістичного дисонансу: недоречність розмовної лексики (напр. «класний»)
    в академічному контексті; вправи на перефразування'
- section: Паронімія та фразеологічна компетенція (Paronymy and Phraseological Competence)
  words: 1100
  points:
  - 'Диференціація паронімів на основі контекстуальних полів: «ефектний» vs «ефективний»,
    «військовий» vs «воєнний»'
  - 'Фразеологія вищого рівня: ідіоми, крилаті вирази з класичної літератури, а також
    біблійні та міфологічні референції за вимогами стандарту'
  - 'Сучасний лексикон: інтеграція мемних виразів та неофразеологізмів у живий дискурс
    без втрати якості мовлення'
- section: Активізація пасивного запасу та мета-лексика (Passive Vocabulary Activation
    and Meta-Lexis)
  words: 600
  points:
  - 'Техніки контекстуалізації рідковживаних слів: використання творів Ю. Андруховича
    та О. Забужко як зразків стилістичної гри'
  - 'Мета-лексичний підхід: обговорення мовних явищ з використанням складних термінів
    (контекстуалізація, синтез, методологія, дискурс)'
- section: Діагностика та стратегії саморозвитку (Diagnosis and Self-Development Strategies)
  words: 600
  points:
  - Комплексний лексичний тест на знання семантичних відтінків, перифраз та засобів
    виразності (метафора, метонімія, евфемізм)
  - 'План лексичного розвитку після C2: робота з етимологічними словниками та створення
    особистого глосарію вузькоспеціалізованих сфер'
