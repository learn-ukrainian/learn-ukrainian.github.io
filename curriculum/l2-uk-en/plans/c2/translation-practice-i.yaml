module: translation-practice-i
level: C2
sequence: 92
version: "1.1"
title: "Перекладацька практика I: Суспільно-політичний та медійний дискурс"
subtitle: "Translation Practice I: Socio-Political and Media Discourse"
focus: professional
pedagogy: workshop
objectives:
  - "Опанувати переклад новинних текстів та журналістських розслідувань з дотриманням стандартів видань"
  - "Навчитися адекватно відтворювати політичні реалії та термінологію міжнародних відносин"
  - "Застосовувати стратегії локалізації та культурної адаптації медійного контенту"
  - "Вдосконалити навички редагування та коректури перекладених текстів"
content_outline:
  - section: "Специфіка перекладу новин та заголовків"
    words: 1000
    subsections:
      - "Інформаційна стислість та структура перевернутої піраміди в перекладі"
      - "Функціональні аналоги заголовків: як зберегти клікабельність та сенс"
      - "Робота з цитатами та непрямою мовою в журналістських текстах"
    key_concepts:
      - "новинний стиль"
      - "локалізація"
      - "адаптація заголовків"
      - "перевернута піраміда"
    primary_sources:
      - "Архів новинних публікацій 'Української правди' та 'Радіо Свобода' (порівняльний аналіз)"
  - section: "Дипломатичний та політичний переклад"
    words: 1000
    subsections:
      - "Протокольна лексика та кліше у міжнародній кореспонденції"
      - "Переклад офіційних промов та звернень: риторичні фігури та емоційне забарвлення"
      - "Передача абревіатур та назв міжнародних організацій"
    key_concepts:
      - "дипломатичний протокол"
      - "політичні евфемізми"
      - "офіційно-діловий стиль"
      - "інтернаціоналізми"
    primary_sources:
      - "Статут ООН (українська та англійська версії)"
      - "Офіційні пресрелізи Міністерства закордонних справ України"
  - section: "Аналітичні тексти та колумнистика"
    words: 1000
    subsections:
      - "Переклад суб'єктивної думки: авторські метафори та іронія"
      - "Аргументативна структура есеїв: збереження логічних зв'язків"
      - "Термінологія соціальних наук та економіки в публіцистиці"
    key_concepts:
      - "авторський стиль"
      - "модальність"
      - "дискурс-маркери"
      - "експресивність"
    primary_sources:
      - "Есеї Віталія Портникова або Оксани Забужко (публіцистика)"
  - section: "Інструменти перекладача та перевірка фактів"
    words: 1000
    subsections:
      - "Використання корпусів текстів для перевірки колокацій"
      - "Глосарії та бази пам'яті перекладів (TM) у роботі з медіа"
      - "Фактчекінг у перекладі: верифікація географічних назв та імен"
    key_concepts:
      - "CAT-інструменти"
      - "корпусна лінгвістика"
      - "фактчекінг"
      - "термінологічна база"
    primary_sources:
      - "ГРАК (Генеральний регіональний корпус української мови)"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - error-correction
    - translate
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "аналітична стаття"
    topic: "Аналіз геополітичних змін у Східній Європі: труднощі перекладу специфічних термінів ('soft power', 'proxy war')."
    key_elements: ["еквівалентність", "контекстуальне значення", "політичний дискурс"]
    motivation: "Тренування точності передачі концептів, що не мають прямих відповідників."
  - source_type: "офіційне звернення"
    topic: "Звернення Президента України до міжнародної спільноти: аналіз риторичних засобів."
    key_elements: ["пафос", "заклик до дії", "офіційні формули"]
    motivation: "Вивчення способів передачі ідеологічного та емоційного заряду тексту."
listening_situations:
  - media_type: "інтерв'ю"
    setting: "Відеоінтерв'ю з міжнародним експертом про виклики інформаційної війни."
    focus_points:
      - "Специфічна термінологія дезінформації"
      - "Темп мовлення та підбір синонімів 'на льоту'"
    motivation: "Підготовка до швидкого сприйняття та обробки актуальної термінології."
writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть критичний відгук на переклад свіжої статті з The Economist або NYT українською мовою. Оцініть якість передачі заголовків, метафор та економічних термінів."
    requirements: ["мінімум 500 слів", "наведення прикладів вдалої та невдалої адаптації", "пропозиції власних варіантів"]
    motivation: "Розвиток критичного мислення та редакторських навичок."
    model_answer: "Аналіз має містити порівняння оригіналу та перекладу, вказувати на стилістичні невідповідності та пропонувати лексичні заміни."
discussion_topics:
  - context: "Чи припустима 'домашня' адаптація новин, чи перекладач має залишатися максимально відстороненим?"
    questions:
      - "Як перекладати культурно-специфічні жарти в політичних коментарях?"
      - "Де межа між перекладом та інтерпретацією в новинах?"
    motivation: "Дискусія про етику та нейтральність перекладача в медіасфері."

activity_hints:
  - type: critical-analysis
    focus: "Оцініть якість перекладу свіжої статті з The Economist українською. Проаналізуйте передачу заголовків, метафор та термінів."
  - type: error-correction
    focus: "Виправте помилки в перекладі дипломатичного тексту: неточна термінологія, стилістична невідповідність, порушення протоколу."
  - type: essay-response
    focus: "Перекладіть фрагмент аналітичної статті та обґрунтуйте свої перекладацькі рішення: вибір еквівалентів, адаптацію реалій."
  - type: match-up
    focus: "Зіставте медійні терміни та їх перекладацькі стратегії (локалізація, транскрипція, функціональний аналог, калькування)."

references:
  - "Державний стандарт 2024: C2 — професійні компетенції, медійна грамотність"
  - "Глазова, 11 клас (2019), §21-25 — Синтаксична норма, ділове мовлення"
  - "University-level: медійний та дипломатичний переклад"
