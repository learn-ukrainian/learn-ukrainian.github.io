content_outline:
- section: 'Вступ: Художній переклад як окремий вид мистецтва (Introduction)'
  words: 800
  points:
  - Поняття художнього перекладу як творчої трансформації тексту зі збереженням естетичної функції за вимогами Державного
    стандарту (§4.3.7)
  - 'Дилема перекладача: творча свобода проти вірності оригіналу та концепція ''перекладача як співавтора'''
  - 'Специфіка українського контексту: переклад як інструмент збагачення національної мови та культури'
- section: 'Школа українського перекладу: Від Зерова до Лукаша (Ukrainian Translation School)'
  words: 1000
  points:
  - 'Київські неокласики та Микола Зеров: програма ''Ad fontes'' (до джерел) як вимога перекладу з мови оригіналу та збереження
    класичних форм'
  - 'Микола Лукаш як феномен: використання архаїчної лексики для відтворення колориту епохи (на прикладі ''Декамерона'') та
    сміливі мовні експерименти'
  - 'Традиція адаптації: ''Енеїда'' Котляревського як приклад творчої травестії, що заклала підвалини сучасної літературної
    мови'
- section: 'Специфіка перекладу прози: Культурні коди та реалії (Prose Translation Specifics)'
  words: 900
  points:
  - 'Відтворення індивідуально-авторського стилю: неологізми, епітети та метафори як об''єкт перекладу за Державним стандартом
    (§4.3.3)'
  - 'Робота з безеквівалентною лексикою: стратегії перекладу реалій (транслітерація, калькування, описовий переклад)'
  - 'Проблема ''хибних друзів перекладача'' у художньому тексті: розрізнення понять (напр., ''artist'' як ''митець/художник'',
    а не ''артист'')'
- section: 'Поетичний переклад та драма: Ритм, рима, сценічність (Poetic and Drama Translation)'
  words: 900
  points:
  - Проблема збереження звукопису (алітерацій, асонансів) та ритмічної структури оригіналу в українській поетичній традиції
  - 'Верлібр vs. римований переклад: коли форма стає змістом і як уникнути втрати підтексту'
  - 'Специфіка драми: поняття ''сценічності'' (speakability) — адаптація тексту для природного звучання з вуст актора та сприйняття
    глядачем'
- section: 'Практичний практикум: Аналіз рішень та типових помилок (Practical Workshop)'
  words: 900
  points:
  - 'Аналіз калькування фразеологізмів: чому дослівний переклад ідіом руйнує образність (напр., пошук відповідників для ''it
    rains cats and dogs'')'
  - 'Помилки регістру: використання анахронізмів або надто сучасної лексики в історичних творах та втрата соціального діалекту
    персонажа'
  - 'Порівняльний аналіз: зіставлення різних варіантів перекладу одного уривка (напр., Шекспір у перекладі Кочура vs. Лукаша)'
- section: 'Підсумок: Етика та відповідальність перекладача (Summary)'
  words: 500
  points:
  - 'Культурна адаптація проти збереження колориту: пошук золотої середини для сучасного українського читача'
  - 'Рецензування та саморедагування: роль перекладацького коментаря у поясненні складних рішень'
vocabulary_hints:
  required:
  - художній переклад (literary translation) — майстерність художнього перекладу; теорія перекладу
  - вірність оригіналу (fidelity to original) — зберегти вірність оригіналу; відійти від тексту
  - колорит (local color) — національний та мовний колорит; відтворити атмосферу
  - реалія (culture-specific item) — безеквівалентна лексика; переклад культурних реалій
  - підтекст (subtext) — читати між рядками; прихований зміст; втратити підтекст
  - верлібр (free verse) — писати верлібром; перекладати білим віршем
  - звукопис (sound painting) — алітерація та асонанс; відтворення фоніки
  - сценічність (stageability/speakability) — придатність тексту для виголошення зі сцени
  recommended:
  - перекладацька трансформація (translation transformation) — зміна структури речення задля змісту (§4.3.7)
  - травестія (travesty) — переробка твору зі зміною стилю (напр., Енеїда Котляревського)
  - архаїзація (archaisation) — навмисне використання застарілих слів для колориту (метод Лукаша)
  - калькування (calquing) — дослівний переклад, що часто призводить до помилок у фразеології
  - хибні друзі перекладача (false friends) — лексичні одиниці, схожі за формою, але різні за змістом
