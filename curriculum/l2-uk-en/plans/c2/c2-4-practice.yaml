module: c2-082
level: C2
sequence: 82
version: "1.1"
title: "Практикум рівня С2.4: Інтегровані мовні компетенції"
subtitle: "Практика C2.4: інтегровані компетенції"
focus: integration
pedagogy: workshop
objectives:
  - "Закріпити навички використання складних граматичних конструкцій та стилістичних
    фігур у тематичних контекстах (модулі 71–77)"
  - "Вдосконалити здатність до спонтанної аргументованої комунікації на високому інтелектуальному
    рівні"
  - "Розвинути навички створення складних письмових текстів різних жанрів (аналітичні
    статті, офіційні звернення, есе)"
  - "Підготуватися до фінального оцінювання рівня С2"
content_outline:
  - section: "Лексико-стилістичний синтез: робота з тематичними вокабулярами"
    words: 1000
    subsections:
      - "Систематизація вокабуляру з тем екології, медіа, спорту, урбаністики та ідентичності"
      - "Синонімічні ряди та реєстрове варіювання у фахових та публіцистичних текстах"
      - "Використання ідіоматики та фразеології у високому стилі мовлення"
    key_concepts:
      - "стильова диференціація"
      - "лексична сполучуваність"
      - "термінологічна точність"
      - "експресивність"
  - section: "Синтаксична майстерність у складних дискурсах"
    words: 1000
    subsections:
      - "Побудова складних речень з декількома типами зв'язку: архітектоніка думки"
      - "Риторичні фігури та засоби логічного наголошення у великих текстових масивах"
      - "Стилістичне редагування та трансформація текстів: від розмовного до офіційного"
    key_concepts:
      - "синтаксичний паралелізм"
      - "інверсія"
      - "період"
      - "когерентність"
  - section: "Практикум письмової аргументації: від тези до висновків"
    words: 1000
    subsections:
      - "Структурування аналітичної статті: вступ, доказова база, контраргументи,
        синтез"
      - "Техніки переконування та етика аргументації у письмовому викладі"
      - "Написання офіційних документів високої складності: звернення, меморандуми,
        стратегії"
    key_concepts:
      - "тезисність"
      - "аргументативна стратегія"
      - "композиція"
      - "дискурс"
  - section: "Риторика та стратегії успішної усної комунікації"
    words: 1000
    subsections:
      - "Публічний виступ на складні суспільно-політичні теми: голос, жест, структура"
      - "Мистецтво ведення дебатів: активне слухання, спростування, пошук консенсусу"
      - "Спонтанне мовлення: як зберігати високий рівень нормативності та стилю"
    key_concepts:
      - "ораторське мистецтво"
      - "полеміка"
      - "мовний етикет"
      - "переконливість"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Аналітична доповідь"
    topic: "Комплексний аналіз тексту про майбутнє громадянського суспільства в Україні.
      Виявлення стилістичних домінант та стратегій аргументації."
    key_elements: ["логічні зв'язки", "модальність", "авторська інтенція"]
    motivation: "Підготовка до аналізу текстів найвищого рівня складності."
  - source_type: "Збірник есе"
    topic: "Порівняльний аналіз стилів декількох сучасних українських публіцистів
      на тему культурної дипломатії."
    key_elements: ["індивідуальний стиль", "метафоричність", "алюзії"]
    motivation: "Розвиток здатності до стилістичного розрізнення та синтезу."
listening_situations:
  - media_type: "лекція"
    setting: "Запис панельної дискусії на міжнародному форумі про роль української
      мови в сучасному інтелектуальному просторі."
    focus_points:
      - "Різні типи аргументації спікерів"
      - "Використання риторичних прийомів для впливу на аудиторію"
    motivation: "Тренування сприйняття полілогічного складного мовлення."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть програмну статтю на тему 'Україна у 2050 році: візія розвитку,
      виклики та можливості', інтегруючи знання з усіх тематичних блоків С2.4."
    requirements: ["мінімум 800 слів", "використання щонайменше 15 термінів з різних
          тем", "дотримання публіцистичного стилю"]
    motivation: "Синтетична перевірка навичок письмової продукції на фінальному етапі."
    model_answer: "Текст має бути концептуальним, логічно вибудуваним, стилістично
      багатим та демонструвати володіння всіма компетенціями рівня С2."
discussion_topics:
  - context: "Яка компетенція є найважливішою для сучасної освіченої людини: здатність
      аналізувати інформацію чи здатність її переконливо доносити?"
    questions:
      - "Чи може стиль компенсувати брак глибокого змісту?"
      - "Як знайти баланс між емоційним впливом та раціональною аргументацією?"
    motivation: "Фінальна дискусія про цінності та інструменти сучасної комунікації."

activity_hints:
  - type: critical-analysis
    focus: "Порівняйте стилі декількох сучасних українських публіцистів. Визначте
      індивідуальні стилістичні домінанти та засоби аргументації."
  - type: essay-response
    focus: "Напишіть програмну статтю 'Україна у 2050 році', інтегруючи терміни з
      усіх тематичних блоків С2.4."
  - type: error-correction
    focus: "Трансформуйте розмовний текст в офіційний: замініть стилістично невідповідні
      елементи, збережіть зміст."
  - type: fill-in
    focus: "Доповніть аналітичний текст відповідними дискурсивними маркерами та модальними
      конструкціями."

references:
  - "Державний стандарт 2024: C2 — практикум інтегрованих компетенцій"
  - "Глазова, 11 клас (2019), §21-25 — Синтаксична норма, ділове мовлення"
  - "Ворон, 11 клас (2019), с. 207-218 — Наукова доповідь"
