content_outline:
- section: 'Вступ: Мета інтеграційної практики (Introduction: Purpose of Integration Practice)'
  words: 700
  points:
  - 'Від модульного навчання до вільного дискурсу: чому C2-студент повинен уміти переключатися між тематичними
    доменами (суспільство, політика, культура, подорожі, ідентичність) без втрати аналітичної глибини.'
  - 'Самодіагностика тематичних прогалин: інструменти для виявлення слабких зон у тематичному покритті модулів
    65-76 та стратегії їхнього заповнення перед контрольною точкою.'
  - 'Структура практикуму: шість типів вправ (крос-тематичний аналіз, регістрова трансформація, інтегроване
    есе, симуляція дебатів, портфоліо, рефлексія) як підготовка до c2-079.'
- section: Крос-тематичний аналіз (Cross-Thematic Analysis)
  words: 900
  points:
  - 'Поєднання тем Державного стандарту: аналіз явища на перетині кількох тем — наприклад, трудова міграція
    (3.9) як фактор зміни сімейних структур (3.1) та культурної ідентичності (3.21).'
  - 'Мультиперспективний аналіз: обговорення одного явища (наприклад, децентралізації) з позицій різних
    тематичних модулів — політичного (c2-066), економічного (c2-070), культурного (c2-076).'
  - 'Практична вправа: написання аналітичної записки, що інтегрує дані з щонайменше трьох тематичних модулів
    C2.4 для обґрунтування позиції з конкретного суспільного питання.'
- section: Регістрова трансформація (Register Transformation)
  words: 900
  points:
  - 'Науковий → публіцистичний → розмовний: трансформація одного тематичного тексту (наприклад, про екотуризм
    або демографічні процеси) через три регістри зі збереженням змісту та зміною стилістичних засобів.'
  - 'Аналіз втрат і здобутків при трансформації: які аспекти змісту неминуче спрощуються при переході від
    академічного до публіцистичного регістру, і як це компенсувати стилістично.'
  - 'Практична вправа: отримати текст в одному регістрі та переписати його у двох інших, потім написати
    рефлексивний коментар щодо прийнятих стилістичних рішень із посиланням на норми C2.1.'
- section: Інтегроване есе (Integrated Essay Production)
  words: 900
  points:
  - 'Міждисциплінарні теми для есе: «Як війна змінила українську ідентичність» (c2-066 + c2-077), «Діаспора
    як культурний міст» (c2-067 + c2-076), «Здоров''я нації як дзеркало суспільства» (c2-069 + c2-072).'
  - 'Структура аргументації: від тези через систему аргументів (з різних тематичних полів) до висновку;
    інтеграція емпіричних даних, цитат та особистого досвіду в академічну структуру.'
  - 'Практична вправа: написання повноформатного аналітичного есе (800-1000 слів) на обрану міждисциплінарну
    тему з дотриманням академічного регістру та з використанням лексики щонайменше чотирьох модулів.'
- section: Симуляція дебатів (Debate Simulation)
  words: 800
  points:
  - 'Підготовка до дебатів: вибір дискусійної теми на перетині кількох тематичних доменів (наприклад,
    «Чи повинна Україна обмежити масовий туризм для захисту культурної спадщини?»).'
  - 'Ведення дебатів: конструювання аргументів «за» і «проти» з використанням тематичної лексики модулів
    65-76; переключення між регістрами залежно від аудиторії (парламент, ЗМІ, громадські слухання).'
  - 'Аналіз дебатів: рефлексія щодо ефективності аргументації, лексичного різноманіття та регістрової
    адекватності; виявлення слабких місць для подальшого опрацювання.'
- section: 'Портфоліо та рефлексія (Portfolio and Reflection)'
  words: 800
  points:
  - 'Формування тематичного портфоліо: збір найкращих зразків дискурсу з кожного тематичного модуля C2.4
    (аналітичні записки, есе, дебатні промови) як доказ тематичної компетентності.'
  - 'Рефлексивний звіт: самооцінка тематичного покриття — які теми Державного стандарту (3.1-3.21) опановано
    на рівні вільного аналітичного дискурсу, а які потребують додаткової практики.'
  - 'Стратегія підготовки до контрольної точки: на основі рефлексії — план цільової підготовки до c2-079
    із визначенням пріоритетних тем та типів завдань для додаткового опрацювання.'
vocabulary_hints:
  required:
  - крос-тематичний (cross-thematic) — крос-тематичний аналіз, крос-тематичне дослідження; термін
    інтеграційного підходу до тематичного навчання
  - регістрова трансформація (register transformation) — вправа на регістрову трансформацію; ключова
    навичка C2 рівня зі стилістики
  - міждисциплінарний (interdisciplinary) — міждисциплінарний підхід, міждисциплінарне есе; академічний
    термін для інтеграції знань різних галузей
  - аргументація (argumentation) — побудова аргументації, стратегія аргументації; базовий термін
    риторики та аналітичного письма
  - самодіагностика (self-diagnosis) — самодіагностика прогалин, інструменти самодіагностики;
    рефлексивний термін для автономного навчання
  - портфоліо (portfolio) — тематичне портфоліо, укласти портфоліо; термін для збору доказів
    навчальних досягнень
  recommended:
  - мультиперспективний (multiperspective) — мультиперспективний аналіз; академічний термін
    для багатовимірного дослідження
  - дискурсивний (discursive) — дискурсивна стратегія, дискурсивна компетентність; лінгвістичний
    термін для аналізу мовлення на рівні тексту
  - інтегративний (integrative) — інтегративний підхід, інтегративне завдання; педагогічний
    термін для поєднання різних навичок
  - рефлексивний (reflective) — рефлексивний звіт, рефлексивна практика; термін автономного
    навчання та самооцінки
  - тематичне покриття (thematic coverage) — забезпечити тематичне покриття; оціночний термін
    для повноти опанування тем
