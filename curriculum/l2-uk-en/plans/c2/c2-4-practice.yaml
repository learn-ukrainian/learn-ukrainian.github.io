title: Практика C2.4 — Тематичний дискурс
subtitle: C2.4 Practice — Thematic Discourse
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Інтегрувати тематичну лексику та дискурсивні стратегії з модулів 65-76 у зв'язному аналітичному тексті,
  що охоплює кілька тем Державного стандарту одночасно
- Learner can perform register transformation on the same topic across scientific, journalistic, and conversational
  registers, demonstrating C2-level stylistic flexibility
- Конструювати аргументоване есе на міждисциплінарну тему, що поєднує суспільний, культурний та політичний
  аналіз із використанням відповідної академічної структури
- Learner can participate in a structured debate on a complex societal issue, switching registers and deploying
  evidence from multiple thematic domains covered in C2.4
