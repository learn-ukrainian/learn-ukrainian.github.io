module: c2-071
level: C2
sequence: 71
version: '1.2'
title: 'Зовнішня політика і діаспора: Україна у світі'
subtitle: 'Зовнішня політика та діаспора'
focus: cultural
pedagogy: seminar
objectives:
  - Аналізувати зовнішньополітичні стратегії України та роль діаспори у 
    міжнародному просуванні національних інтересів
  - Опанувати дипломатичну термінологію та концептуальний апарат геополітики на 
    рівні C2
  - Розвинути навички ведення переговорів та публічного дискурсу у сфері 
    міжнародних відносин
  - Вивчити історію та сучасний стан взаємодії між Україною та українською 
    світовою спільнотою
content_outline:
  - section: Дипломатична історія та становлення суб'єктності
    words: 1250
    subsections:
      - 'Традиції української дипломатії: від УНР до сучасності'
      - Боротьба за міжнародне визнання та суб'єктність на різних історичних 
        етапах
      - Мовна репрезентація державних інтересів у міжнародних договорах
    key_concepts:
      - суб'єктність
      - міжнародне визнання
      - дипломатичний протокол
      - геополітичний вектор
    primary_sources:
      - Михайло Грушевський, 'На порозі нової України' (аналіз 
        зовнішньополітичних орієнтирів української держави)
  - section: Сучасна геополітика та стратегічне партнерство
    words: 1250
    subsections:
      - 'Інтеграція в ЄС та НАТО: виклики, досягнення та мовний дискурс інтеграції'
      - Стратегічне партнерство та безпекові альянси в умовах глобальної 
        нестабільності
      - Публічна дипломатія (Soft Power) як інструмент формування позитивного 
        іміджу України
    key_concepts:
      - євроінтеграція
      - бепековий альянс
      - м'яка сила
      - стратегічне партнерство
  - section: 'Українська діаспора: глобальна солідарність'
    words: 1250
    subsections:
      - Хвилі української еміграції та їхня роль у збереженні національної 
        ідентичності
      - Світове українство як мережева структура впливу та лобіювання
      - 'Мова діаспори: архаїзми, інновації та збереження питомої норми'
    key_concepts:
      - світове українство
      - лобіювання
      - національна ідентичність
      - культурна дипломатія
    primary_sources:
      - Євген Маланюк, 'Листи до друзів' (рефлексії про роль еміграції у 
        боротьбі за Україну)
  - section: Міжнародна комунікація та переговорний процес
    words: 1250
    subsections:
      - Мовні стратегії ведення складних дипломатичних переговорів
      - Особливості офіційного листування у сфері міжнародних відносин
      - Етика та культурний інтелект у міждержавній комунікації
    key_concepts:
      - переговорний процес
      - культурний інтелект
      - дипломатичне листування
      - компроміс
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Програмна стаття
    topic: Аналіз візії Михайла Грушевського щодо місця України в Європі за 
      працею 'На порозі нової України'.
    key_elements:
      - європейська орієнтація
      - самовизначення
      - федералізм vs самостійність
    motivation: Розуміння витоків сучасної зовнішньополітичної думки України.
  - source_type: Есеїстика / Публіцистика
    topic: Дослідження концепту 'духовної Батьківщини' в есеїстиці Євгена 
      Маланюка. Аналіз мови вигнання та надії.
    key_elements:
      - державність
      - історична пам'ять
      - місія діаспори
    motivation: Осмислення інтелектуального внеску української еміграції у 
      державне будівництво.
listening_situations:
  - media_type: інтерв'ю
    setting: Інтерв'ю з Міністром закордонних справ України про нову архітектуру
      світової безпеки.
    focus_points:
      - Мовні засоби переконання західних партнерів
      - Ключові наративи української дипломатії на міжнародній арені
    motivation: Аналіз сучасного дипломатичного дискурсу високого рівня.
writing_tasks:
  - task_type: офіційний лист
    prompt: Напишіть проєкт дипломатичної ноти або офіційного звернення до 
      міжнародної організації щодо підтримки українських культурних ініціатив за
      кордоном.
    requirements:
      - мінімум 600 слів
      - дотримання дипломатичного етикету
      - аргументована вимога або пропозиція
    motivation: Розвиток навичок офіційного листування у сфері міжнародних 
      відносин.
    model_answer: Текст має бути витриманий у суворому офіційному стилі, містити
      відповідні формули звернення, чітку аргументацію та відповідати нормам 
      міжнародного протоколу.
discussion_topics:
  - context: Чи є діаспора 'голосом України', чи вона створює окремий, відмінний
      від метрополії, наратив?
    questions:
      - Як змінюється роль Світового конгресу українців у сучасних геополітичних
        умовах?
      - Чи може мова стати єдиним чинником об'єднання українців у всьому світі?
    motivation: Дискусія про глобальне українство та спільні стратегії впливу.
activity_hints:
  - type: reading
    focus: 'Проаналізувати візію Грушевського щодо місця України в Європі: визначити
      зовнішньополітичні орієнтири'
  - type: essay-response
    focus: Написати проєкт дипломатичної ноти щодо підтримки українських 
      культурних ініціатив за кордоном
  - type: critical-analysis
    focus: Оцінити аргументацію у тексті про роль діаспори як 'голосу України' 
      на міжнародній арені
  - type: fill-in
    focus: 'Доповнити текст дипломатичною термінологією: суб''єктність, євроінтеграція,
      м''яка сила'
  - type: error-correction
    focus: Виправити кальки та росіянізми у тексті офіційного дипломатичного 
      звернення
