module: c2-067
level: C2
sequence: 67
slug: zovnishnia-polityka-i-diaspora
version: '2.0'
title: Зовнішня політика і діаспора
subtitle: Foreign Policy and Diaspora
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати напрями зовнішньої політики України та дипломатичні відносини з використанням відповідного академічного
  та дипломатичного регістру
- Learner can discuss migration processes, diaspora challenges, and integration issues with nuanced sociolinguistic
  awareness
- Критично оцінювати стереотипи щодо українців за кордоном та іноземців в Україні, розрізняючи факти та упередження
- Learner can compose a policy analysis brief on a foreign relations topic in formal academic Ukrainian
sources:
- name: МЗС України — Офіційний сайт
  url: https://mfa.gov.ua/
  type: primary
  notes: Official foreign policy statements, diplomatic communications, bilateral agreements
- name: 'Толстов С. Зовнішня політика України: стратегічні пріоритети'
  url: https://www.nas.gov.ua/
  type: reference
  notes: Academic analysis of Ukraine's foreign policy strategy and EU integration path
- name: 'Діаспора як ресурс: українці за кордоном'
  url: https://ukrainianworldcongress.org/
  type: reference
  notes: Ukrainian World Congress materials on diaspora communities and advocacy
content_outline:
- section: 'Вступ: Зовнішня політика як тематичний дискурс (Introduction: Foreign Policy as Thematic Discourse)'
  words: 600
  points:
  - 'From geographic awareness (B1-B2) to policy analysis: the C2 learner engages with international relations through
    diplomatic register, analytical frameworks, and evidence-based argumentation.'
  - 'State Standard theme 3.9: full coverage of зовнішньополітичні відносини including diplomacy, migration, stereotypes,
    and cross-cultural interaction.'
  - 'Register mastery: diplomatic (дипломатичний) and policy-analytical registers as specialized subsets of офіційний
    та науковий styles from C2.1.'
- section: Напрями зовнішньої політики України (Directions of Ukraine's Foreign Policy)
  words: 800
  points:
  - 'Strategic priorities: European integration (євроінтеграція), Euro-Atlantic partnership (євроатлантичне партнерство),
    bilateral relations with key partners, and the role of international organizations.'
  - 'Diplomatic relations: двосторонні угоди (bilateral agreements), багатостороння дипломатія (multilateral diplomacy),
    and the language of international treaties and communiqués.'
  - 'Ukraine in international institutions: ООН, Рада Європи, ОБСЄ; analyzing Ukrainian diplomatic statements and
    voting patterns using authentic diplomatic texts.'
- section: Українці за кордоном (Ukrainians Abroad)
  words: 800
  points:
  - 'Historical and contemporary diaspora: waves of emigration (трудова міграція, політична еміграція, воєнна евакуація
    після 2022), geographic distribution, and community structures.'
  - 'Stereotypes and challenges: analyzing and deconstructing common stereotypes about Ukrainian emigrants; issues of
    integration, language maintenance, and dual identity.'
  - 'Diaspora organizations and advocacy: Ukrainian World Congress, Saturday schools (суботні школи), cultural centers;
    their role in maintaining Ukrainian identity and lobbying for Ukraine internationally.'
- section: Іноземці в Україні (Foreigners in Ukraine)
  words: 700
  points:
  - 'Immigration to Ukraine: labor migration, student mobility, international marriages; legal frameworks for residency
    and naturalization (натуралізація, дозвіл на проживання).'
  - 'Stereotypes and societal attitudes: analyzing Ukrainian media representations of foreigners; the evolution of
    attitudes in wartime (international volunteers, foreign correspondents).'
  - 'Integration challenges: language barriers, bureaucratic obstacles, cultural adaptation; policy discussions around
    immigration reform and inclusion.'
- section: Міграційні процеси (Migration Processes)
  words: 700
  points:
  - 'Migration as a global and Ukrainian phenomenon: types of migration (трудова, вимушена, зворотна, нелегальна),
    push and pull factors, and demographic consequences.'
  - 'Refugees and internally displaced persons: legal status (біженець, шукач притулку, внутрішньо переміщена особа),
    international protection frameworks, and Ukrainian experience post-2014 and post-2022.'
  - 'Brain drain (відплив мізків) and its reversal: analyzing the economic and cultural impact of emigration on
    Ukraine; policies for encouraging return migration.'
- section: Дипломатичний регістр і аналітичне письмо (Diplomatic Register and Analytical Writing)
  words: 700
  points:
  - 'Diplomatic language conventions: формули ввічливості (courtesies), протокольні звернення (protocol forms of
    address), нотатки та ноти (diplomatic notes) as genre-specific conventions.'
  - 'Policy analysis brief: structure and conventions of an аналітична записка (policy brief) — problem statement,
    background analysis, policy options, and recommendations.'
  - 'Cross-register transformation: rewriting a diplomatic communiqué as a news article and as an academic analysis,
    applying C2.1 stylistic transformation skills to foreign policy content.'
- section: 'Практикум: Аналіз дипломатичного тексту (Workshop: Diplomatic Text Analysis)'
  words: 700
  points:
  - 'Applied analysis: reading and deconstructing an authentic Ukrainian diplomatic statement or MZS press release
    using analytical frameworks.'
  - 'Argumentative writing: composing a policy analysis brief on a chosen foreign relations topic (e.g., EU integration
    challenges, diaspora advocacy strategy).'
  - 'Debate: structured discussion on a foreign policy dilemma using diplomatic register and argumentation techniques.'
vocabulary_hints:
  required:
  - дипломатичний (diplomatic) — дипломатичні відносини, дипломатична нота, дипломатичний регістр; core diplomatic
    register term
  - міграційний (migratory) — міграційні процеси, міграційна політика; analytical term for population movement
  - діаспора (diaspora) — українська діаспора, діаспорні організації; community identity term
  - зовнішньополітичний (foreign policy) — зовнішньополітичний курс, зовнішньополітичні пріоритети; policy analysis
    register
  - двосторонній (bilateral) — двосторонні угоди, двосторонні відносини; diplomatic terminology
  - ратифікація (ratification) — ратифікація договору, процедура ратифікації; international law register
  - біженець (refugee) — статус біженця, захист біженців; humanitarian law terminology
  - натуралізація (naturalization) — процедура натуралізації, набуття громадянства; immigration law register
  recommended:
  - євроінтеграція (European integration) — курс на євроінтеграцію, євроінтеграційні реформи; strategic policy term
  - стереотип (stereotype) — національний стереотип, подолання стереотипів; sociolinguistic analysis term
  - багатосторонній (multilateral) — багатостороння дипломатія, багатосторонні переговори; international relations term
  - відплив мізків (brain drain) — проблема відпливу мізків, зворотний відплив; economic migration analysis
  - притулок (asylum) — шукач притулку, надання притулку; refugee law terminology
