content_outline:
- section: 'Вступ: Когнітивні стратегії та історичний контекст (Introduction: Cognitive
    Strategies and Historical Context)'
  words: 700
  points:
  - Чому системний підхід (когнітивні карти) ефективніший за механічне заучування
    на рівні C2.
  - 'Культурний гачок: ''Золота доба'' української термінології 1920-х років, діяльність
    ІУНМ та Медичний словник Олени Курило.'
  - 'Історичний контекст: Репресії 1930-х років, бюлетені 1933 року та штучне наближення
    термінології до російських норм.'
  - 'Внесок Івана Пулюя: Розробка фізичної термінології та стратегії творення питомих
    відповідників.'
- section: Словотворення та нормативні моделі (Word Formation and Normative Models)
  words: 900
  points:
  - 'Державний стандарт (§4.1.1.1): Опанування професіоналізмів та відмінюваних абревіатур
    у межах фаху.'
  - 'Аналіз словотворчих моделей: продуктивні префікси (анти-, гіпер-, гіпо-) та суфікси
    (-ація, -ізм, -ист).'
  - 'Диференціація запозичень: різниця між лексичним інтернаціоналізмом та структурною
    калькою морфем.'
  - 'Стандарт (§4.3.3): Використання термінів як стилістичних засобів (наприклад,
    гіпербола в лінгвістиці та математиці).'
- section: Міжнародний пласт та міжмовна інтерференція (International Layer and Interlingual
    Interference)
  words: 800
  points:
  - Греко-латинські елементи в науковій мові та стратегії розпізнавання когнатів (cognates).
  - 'Попередження помилок: ''Фальшиві друзі перекладача'' у термінології — розбір
    слів ''комплекція'' (будова тіла) та ''академік'' (науковий ступінь vs посада).'
  - 'Адаптація інтернаціоналізмів: фонологічне та морфологічне пристосування термінів
    до української мови.'
- section: Синтаксис терміна та подолання типових помилок (Term Syntax and Overcoming
    Typical Errors)
  words: 800
  points:
  - 'Типова помилка: Виправлення активних дієприкметників (наприклад, ''домінуючий
    фактор'' → ''панівний чинник'').'
  - 'Граматична норма: Коректне вживання родового відмінка у складених термінах (''система
    управління базами даних'').'
  - 'Контекстуальне виведення значення: використання контекстних підказок для інференції
    значень вузькоспеціальних термінів.'
- section: Академічне опрацювання та ресурси (Academic Processing and Resources)
  words: 800
  points:
  - 'Державний стандарт (§4.3.8): Уміння утворювати вторинні тексти (реферати, повідомлення)
    на основі опрацьованої термінології.'
  - 'Робота з ресурсами: використання r2u.org.ua для пошуку питомої термінології та
    сайтів ІУНМ НАН України.'
  - 'Критичне оцінювання джерел: перевірка термінів через ДСТУ ISO 704:2018 та фахові
    наукові видання.'
