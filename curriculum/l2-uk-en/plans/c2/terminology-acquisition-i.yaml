module: terminology-acquisition-i
level: C2
sequence: 45
version: "1.0"
title: "Стратегії опанування терміносистем I: Структурний підхід"
subtitle: "Terminology Acquisition Strategies I: Structural Approach"
focus: professional
pedagogy: workshop
objectives:
  - "Опанувати морфологічні та словотвірні моделі творення української фахової термінології"
  - "Навчитися аналізувати терміносистему як цілісну логічну структуру"
  - "Розробити індивідуальні стратегії ефективного пошуку та відбору термінів у спеціалізованих джерелах"
  - "Виробити навички верифікації термінів на відповідність мовній нормі та галузевим стандартам"
content_outline:
  - section: "Морфологія та словотвір української термінології"
    words: 1000
    subsections:
      - "Питомі українські афікси у термінотворенні: від традиції до сучасності"
      - "Складання слів та основ як продуктивний спосіб творення складних термінів"
      - "Адаптація запозичених елементів (префіксів, суфіксів) в українській термінології"
    key_concepts:
      - "деривація"
      - "терміноелемент"
      - "словотвірна модель"
      - "інтернаціоналізація"
  - section: "Системність як головна ознака термінологічного апарату"
    words: 1000
    subsections:
      - "Логіко-понятійні зв'язки в терміносистемі: ієрархія, координація, антонімія"
      - "Роль дефініції у встановленні меж терміна"
      - "Поняття 'гніздування' термінів та його роль у систематизації знань"
    key_concepts:
      - "терміносистема"
      - "гіперонім"
      - "гіпонім"
      - "понятійна парадигма"
    primary_sources:
      - "Анатолій Волков, 'Логіка' (використання як зразка чітко структурованої понятійної системи)"
  - section: "Робота з галузевими словниками та базами даних"
    words: 1000
    subsections:
      - "Типологія термінологічних словників: тлумачні, перекладні, енциклопедичні"
      - "Використання цифрових ресурсів та онлайн-термінотек (СУМ, r2u, IATE)"
      - "Методика критичного оцінювання словникових дефініцій"
    key_concepts:
      - "лексикографія"
      - "термінографія"
      - "словникова стаття"
      - "інформаційний пошук"
    primary_sources:
      - "Словник української біологічної термінології (аналіз структури та принципів укладання)"
  - section: "Техніки запам'ятовування та інтеграції термінів"
    words: 1000
    subsections:
      - "Мнемонічні прийоми для засвоєння абстрактної професійної лексики"
      - "Метод ментальних карт у вивченні складних термінологічних полів"
      - "Контекстуалізація як спосіб переведення терміна з пасивного словника в активний"
    key_concepts:
      - "когнітивна карта"
      - "мнемоніка"
      - "активізація лексики"
      - "термінологічне поле"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - match-up
    - group-sort
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Науковий посібник"
    topic: "Аналіз логічної структури термінів у підручнику А. Волкова 'Логіка'. Виявлення взаємозв'язків між базовими поняттями."
    key_elements: ["судження", "умовивід", "силогізм"]
    motivation: "Розвиток здатності бачити систему за окремими словами."
  - source_type: "Передмова до галузевого словника"
    topic: "Вивчення принципів відбору лексики та термінотворення, викладених у вступі до Словника біологічної термінології."
    key_elements: ["принцип системності", "мовна традиція", "наукова точність"]
    motivation: "Розуміння методології, що стоїть за професійним лексиконом."
listening_situations:
  - media_type: "лекція"
    setting: "Вебінар для термінологів про проблеми перекладу технічної документації та уніфікації назв."
    focus_points:
      - "Конфлікт між традиційними та запозиченими термінами"
      - "Роль контексту у виборі правильного еквівалента"
    motivation: "Ознайомлення з живим процесом формування професійної мови."
writing_tasks:
  - task_type: "есе"
    prompt: "Створіть глосарій з 15 ключових термінів вашої професійної галузі. Для кожного терміна наведіть дефініцію, етимологію та приклад вживання в реченні. Напишіть короткий вступний коментар про особливості формування терміносистеми у вашій галузі."
    requirements: ["мінімум 400 слів загалом", "дотримання термінологічних стандартів", "точність дефініцій"]
    motivation: "Практична робота з систематизації власного фахового лексикону."
    model_answer: "Глосарій має демонструвати глибоке розуміння семантики обраних термінів. Вступний коментар повинен містити аналіз продуктивних словотвірних моделей галузі."
discussion_topics:
  - context: "Чи є 'ідеальний' термін завжди однозначним, і чи можлива повна відсутність синонімії в науці?"
    questions:
      - "Чому виникає термінологічна варіативність, і як з нею боротися?"
      - "Яка роль національної специфіки у творенні термінів для глобальних галузей (наприклад, IT)?"
    motivation: "Дискусія про природу терміна як мовного та когнітивного феномену."
