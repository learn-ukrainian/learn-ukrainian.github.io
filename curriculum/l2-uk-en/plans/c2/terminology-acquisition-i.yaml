vocabulary_hints:
  required:
  - термін (term) — науковий термін, вузькоспеціальний термін, тлумачення терміна
  - дефініція (definition) — дати чітку дефініцію, розширена дефініція
  - панівний чинник (dominant factor) — коректний відповідник до калькованого 'домінуючий
    фактор'
  - словотворення (word formation) — способи словотворення, продуктивна словотворча
    модель
  - інтернаціоналізм (internationalism) — лексичний інтернаціоналізм, адаптація інтернаціоналізмів
  - когнат (cognate) — фальшиві когнати, розпізнавання когнатів
  - абревіатура (abbreviation) — відмінювані абревіатури, фахова абревіація
  recommended:
  - інференція (inference) — контекстуальна інференція значень
  - питомий (native/indigenous) — питомий відповідник, питома термінологія
  - калькування (calquing) — семантичне калькування, структурна калька
  - реферат (abstract/summary) — підготовка реферату (§4.3.8)
  - етимологія (etymology) — етимологічний аналіз терміна
