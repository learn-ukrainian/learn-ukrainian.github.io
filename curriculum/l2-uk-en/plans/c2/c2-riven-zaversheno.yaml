module: c2-riven-zaversheno
level: C2
sequence: 106
version: '1.1'
title: 'C2: Рівень завершено. Шлях до досконалості'
subtitle: Рівень C2 завершено
focus: integration
pedagogy: review
objectives:
  - Систематизувати та узагальнити здобуті знання та навички на рівні мовної 
    майстерності (C2)
  - Провести фінальну самооцінку мовної компетенції згідно з критеріями CEFR
  - Окреслити плани щодо інтеграції в україномовне середовище як повноправного 
    учасника
  - Сформувати бачення ролі української мови у власному житті та професійній 
    діяльності
content_outline:
  - section: 'Ретроспектива навчання: від A1 до C2'
    words: 1000
    subsections:
      - 'Аналіз основних етапів опанування мови: від перших слів до складних дискурсів'
      - 'Трансформація мовної картини світу: як українська змінила сприйняття реальності'
      - 'Збереження мотивації на довгому шляху: досвід подолання плато'
    key_concepts:
      - навчальна траєкторія
      - мовна картина світу
      - метапізнання
      - самоактуалізація
    primary_sources:
      - Власні записи (нотатки, есе) початкових рівнів для порівняння
  - section: Українська мова як стиль життя
    words: 1000
    subsections:
      - Інтеграція в сучасне культурне та інтелектуальне поле України
      - Участь у волонтерських, професійних та соціальних проєктах українською 
        мовою
      - 'Бути амбасадором української мови у світі: місія та відповідальність'
    key_concepts:
      - культурна інтеграція
      - соціальна відповідальність
      - амбасадор мови
      - національна ідентичність
    primary_sources:
      - Маніфести сучасних українських культурних рухів
  - section: "Постійний розвиток: стратегії безперервного навчання"
    words: 1000
    subsections:
      - 'Робота з новими лексичними шарами: сленг, арго, наукові неологізми'
      - Підтримка рівня через читання інтелектуальної літератури та перегляд 
        медіа
      - 'Створення власного україномовного контенту: блог, подкаст, статті'
    key_concepts:
      - lifelong learning
      - дифузія мови
      - мовне середовище
      - творче самовираження
    primary_sources:
      - Ресурси для самостійного поглибленого вивчення мови (словники, корпуси)
  - section: Фінальна рефлексія та урочистий підсумок
    words: 1000
    subsections:
      - 'Створення ''Послання майбутнім студентам'': поради та настанови'
      - Формулювання особистого мовного кредо
      - Заключне слово про силу та красу українського слова
    key_concepts:
      - мовне кредо
      - спадкоємність
      - естетика мови
      - досконалість
    primary_sources:
      - Цитати українських класиків про значення мови (Франко, Стус, Костенко)
word_target: 4000
activities:
  types_required:
    - essay-response
    - critical-analysis
    - select
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Авраменко, 11 клас (2019): Мова і культура'
  - 'Глазова, 11 клас (2019): Українська мова в сучасному світі'
  - 'Державний стандарт 2024: C2 — підсумкова інтегративна компетенція'
reading_situations:
  - source_type: есе
    topic: 'Аналіз філософського есе про невмирущість мови: синтез ідей.'
    key_elements:
      - символізм
      - традиція
      - майбутнє
    motivation: Емоційне та інтелектуальне завершення курсу.
  - source_type: маніфест
    topic: 'Маніфест сучасної української молоді про мову: бачення майбутнього.'
    key_elements:
      - модерність
      - вибір
      - свобода
    motivation: Натхнення на подальшу активну позицію.
listening_situations:
  - media_type: відео
    setting: Перегляд підсумкового відео про красу українських регіонів та 
      розмаїття діалектів.
    focus_points:
      - Єдність у багатоманітності
      - Мова як живий організм
    motivation: Формування цілісного образу мовного простору.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть лист собі у минуле (рівень A1). Розкажіть про свої 
      досягнення та те, що для вас зараз означає знати українську мову на рівні 
      майстерності.
    requirements:
      - емоційність
      - глибина аналізу
      - 800-1000 слів
    motivation: Глибока психологічна та лінгвістична рефлексія.
    model_answer: Текст має бути підсумком усього шляху, демонструвати вільне 
      володіння всіма засобами мови та особистісне зростання.
discussion_topics:
  - context: Чи можна колись сказати 'Я знаю українську мову досконало'?
    questions:
      - Де межа між знанням та відчуттям мови?
      - Як знання української змінило ваш професійний та особистий горизонт?
    motivation: Фінальна дискусія та святкування успіху.
activity_hints:
  - type: essay-response
    focus: Написати лист собі у минуле (рівень A1) з демонстрацією вільного 
      володіння всіма засобами мови
  - type: critical-analysis
    focus: 'Проаналізувати філософське есе про невмирущість мови: визначити символізм
      та підтекст'
  - type: reading
    focus: 'Оцінити маніфест сучасної української молоді про мову: мовні засоби впливу
      та переконання'
  - type: select
    focus: Визначити стилістичні та риторичні засоби у цитатах українських 
      класиків про значення мови
phase: C2.4 [Meta-Skills & Capstone]
