content_outline:
- section: 'Вступ: Досягнення вершини С2 (Introduction: Reaching the C2 Summit)'
  words: 625
  points:
  - 'Аналіз особистісної трансформації: від вивчення правил до ''життя в мові'' та
    формування ідентичності освіченого носія.'
  - 'Мотиваційний блок: українська мова як символ стійкості та глобальний тренд (Duolingo
    data 2022/2023) для 45 мільйонів мовців.'
- section: Стандарт С2 та системні зв'язки мови (C2 Standard and Systemic Language
    Links)
  words: 1000
  points:
  - 'Розбір Державного стандарту (§4603-4604): що означає ''тематично необмежене''
    та ''невимушене'' спілкування на найвищому рівні.'
  - 'Компетенція вільного володіння другого ступеня: використання максимально широкого
    діапазону засобів для передачі тонких відтінків змісту.'
  - 'Розуміння системних зв''язків: як граматична досконалість переплітається з лексичним
    багатством (~12,000 слів).'
  - Практичне завдання: самостійний аналіз та продукування тексту з теми «Стандарт
      С2 та системні зв'язки мови».
- section: Державна сертифікація та НКСДМ (State Certification and the National Commission)
  words: 875
  points:
  - Роль Національної комісії зі стандартів державної мови (НКСДМ) у процесі офіційного
    підтвердження рівня володіння.
  - 'Професійні перспективи: сертифікат С2 як обов''язкова умова для вищих посад державної
    служби та дипломатичного корпусу.'
  - 'Імплементація стандартів: структура іспиту, вимоги до академічного письма та
    усного дискурсу.'
- section: 'Практикум: Подолання стилістичних пасток (Workshop: Overcoming Stylistic
    Pitfalls)'
  words: 1000
  points:
  - 'Типова помилка: калькування синтаксичних структур (наприклад, англійське ''It
    is... that...'') замість використання гнучкої української інверсії (наприклад,
    ''Саме це я мав на увазі'').'
  - 'Регістрова чистота: аналіз помилок змішування високого стилю зі сленгом (використання
    ''чувак'' у формальному контексті замість ''колега'' чи ''пане'').'
  - 'Граматична складність: активне використання дієприкметників та складних сполучникових
    конструкцій для уникнення спрощення мовлення.'
  - Завдання на синтез: інтеграція навичок попередніх розділів у контексті «Подолання
      стилістичних пасток».
- section: Українська мова у глобальному вимірі (Ukrainian Language in the Global
    Dimension)
  words: 875
  points:
  - 'Роль культурного посередника (cultural mediator): як носій С2 стає амбасадором
    української ідентичності у світі.'
  - 'Діаспора та міжнародне визнання: підтримка рівня через участь у глобальних україномовних
    професійних спільнотах.'
  - 'Майбутнє мови: ваша роль у збереженні та розвитку мови після завершення формального
    навчання.'
- section: 'Підсумок: Нові обрії та зобов''язання (Summary: New Horizons and Commitment)'
  words: 625
  points:
  - 'Рефлексія на досягнення: оцінка капіталізації знань та презентація фінального
    капстоун-проєкту.'
  - 'План подальшого розвитку: професійне застосування (переклад, викладання, дослідження)
    та мовний активізм.'
  - 'Прощальне слово: перехід до статусу рівноправного учасника мовної спільноти.'
vocabulary_hints:
  required:
  - сертифікація (certification) — державна сертифікація, пройти сертифікацію; висока
    частотність в офіційному дискурсі
  - компетенція (competence) — мовна компетенція, розширювати професійну компетенцію;
    ключовий академічний термін
  - вільне володіння (fluency/mastery) — рівень вільного володіння другого ступеня
    (С2) згідно зі стандартом
  - імплементація (implementation) — імплементація стандартів, процес імплементації;
    офіційно-діловий регістр
  - носій мови (native speaker) — освічений носій мови; акцент на еталоні мовлення
  - перспектива (perspective/prospect) — у довгостроковій перспективі, відкривати
    нові перспективи
  recommended:
  - культурний посередник (cultural mediator) — роль мовця рівня С2 у міжкультурній
    комунікації
  - мовний активізм (language activism) — свідома діяльність із поширення та захисту
    мови
  - саме це (precisely this) — конструкція для вираження логічного наголосу замість
    калькованих структур
  - засвідчити (to certify/verify) — засвідчити рівень володіння мовою; термін Стандарту
