vocabulary_hints:
  required:
  - силабус (syllabus) — розробити силабус, структура силабусу; висока частота в академічному
    середовищі, студент-орієнтований
  - навчальна програма (curriculum) — затвердити типову навчальну програму; основний
    офіційний термін для освітніх документів
  - аналіз потреб (needs analysis) — проводити аналіз потреб; перший етап планування
    будь-якого курсу
  - результати навчання (learning outcomes) — очікувані результати навчання; фокус
    на досягненнях та компетентностях учня
  - прогресія (progression) — логічна прогресія, граматична прогресія; послідовність
    викладу навчального матеріалу
  - спіральний підхід (spiral approach) — застосовувати спіральний підхід; циклічне
    повернення до тем на вищому рівні складності
  - формувальне оцінювання (formative assessment) — роль формувального оцінювання;
    оцінювання під час навчання для покращення результатів
  - підсумкове оцінювання (summative assessment) — критерії підсумкового оцінювання;
    проводиться наприкінці курсу або модуля
  - компетентнісний підхід (competency-based approach) — реалізація компетентнісного
    підходу; вимога Державного стандарту 2024
  - індивідуалізація (individualization) — індивідуалізація навчання; адаптація програми
    під конкретні запити та темп учня
  recommended:
  - зміст навчання (course content) — розробляти зміст навчання; нормативна альтернатива
    запозиченню «курикулум»
  - когнітивне навантаження (cognitive load) — оптимальне когнітивне навантаження;
    обсяг інформації, що може бути засвоєний
  - зона найближчого розвитку (zone of proximal development) — враховувати зону найближчого
    розвитку; психолого-педагогічний аспект планування
  - інпут (input) — вхідний мовний матеріал; автентичний інпут як основа для засвоєння
  - аутпут (output) — мовленнєва продукція учня; баланс між сприйняттям та продукуванням
