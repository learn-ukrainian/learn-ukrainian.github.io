content_outline:
- section: Вступ (Introduction) — Від уроку до курсу
  words: 600
  points:
  - Різниця між стратегічним плануванням цілісного курсу та тактичним плануванням уроку; тяглість та цілісність освітнього
    процесу
  - Гуманістична педагогіка Василя Сухомлинського («Серце віддаю дітям») як філософська база для людиноцентрованого дизайну
    курсів
  - 'Лексичний практикум: розрізнення «навчати студентів» (teach skill), «вивчати мову» (study subject) та «вчити» (colloquial/ambiguous)
    у професійному дискурсі'
- section: Теоретичні засади та стандарти (Theoretical Foundations and Standards)
  words: 900
  points:
  - 'Відповідність Державний стандарт 2024 (§3.12): освітні реформи, галузі знань та професійні компетенції викладача української
    мови'
  - 'Робота з вторинними текстами (§4.3.8): методика створення анотацій, тез та рецензій на навчальні програми як складник
    C2-компетенції'
  - 'Історична ретроспектива: структура курсів у Києво-Могилянській академії (риторика, поетика) проти сучасних європейських
    стандартів Болонського процесу'
- section: Аналіз потреб та визначення цілей (Needs Analysis and Goal Setting)
  words: 1000
  points:
  - 'Методи аналізу потреб (needs analysis): мотиваційні чинники та адаптація курсу до соціокультурного та професійного контексту
    учнів'
  - Визначення SMART-цілей та очікуваних результатів навчання (learning outcomes) для вищих рівнів володіння мовою (C1-C2)
  - 'Попередження помилок: використання терміну «навчальна програма» як нормативного еквівалента професійної кальки «курикулум»'
- section: Структурування контенту та спіральний підхід (Content Structuring and Spiral Approach)
  words: 1000
  points:
  - 'Реалізація спірального підходу (spiral approach): циклічне розширення граматичних та лексичних тем на нових рівнях складності'
  - 'Функціональні відмінності документів: «силабус» як публічний контракт зі студентом проти деталізованої адміністративної
    «робочої програми»'
  - 'Інтеграція культурного компонента: деколонізаційні наративи та національна ідентичність у структурі мовного курсу'
- section: Система оцінювання та зворотний зв'язок (Assessment System and Feedback)
  words: 900
  points:
  - 'Формувальне (formative) vs. підсумкове (summative) оцінювання: вибір інструментів перевірки для об''єктивного вимірювання
    прогресу'
  - 'Корекція типових помилок: розмежування понять «оцінка» (бал, маркер результату) та «оцінювання» (процес, методика) у
    мовленні викладача'
  - Зворотний зв'язок та самооцінювання учнів як засіб корекції та персоналізації індивідуальної освітньої траєкторії
- section: Практика — Розробка силабусу (Practice — Syllabus Development)
  words: 600
  points:
  - 'Практичне розроблення силабусу: врахування когнітивного навантаження (cognitive load) та зон найближчого розвитку учнів'
  - 'Календарно-тематичне планування: розподіл годин, вибір методів та підготовка до етапу розробки матеріалів (Materials
    Development, C2-084)'
  - Професійна рефлексія та колегіальне рецензування (peer review) розроблених планів курсів
vocabulary_hints:
  required:
  - силабус (syllabus) — розробити силабус, структура силабусу; висока частота в академічному середовищі, студент-орієнтований
  - навчальна програма (curriculum) — затвердити типову навчальну програму; основний офіційний термін для освітніх документів
  - аналіз потреб (needs analysis) — проводити аналіз потреб; перший етап планування будь-якого курсу
  - результати навчання (learning outcomes) — очікувані результати навчання; фокус на досягненнях та компетентностях учня
  - прогресія (progression) — логічна прогресія, граматична прогресія; послідовність викладу навчального матеріалу
  - спіральний підхід (spiral approach) — застосовувати спіральний підхід; циклічне повернення до тем на вищому рівні складності
  - формувальне оцінювання (formative assessment) — роль формувального оцінювання; оцінювання під час навчання для покращення
    результатів
  - підсумкове оцінювання (summative assessment) — критерії підсумкового оцінювання; проводиться наприкінці курсу або модуля
  - компетентнісний підхід (competency-based approach) — реалізація компетентнісного підходу; вимога Державного стандарту
    2024
  - індивідуалізація (individualization) — індивідуалізація навчання; адаптація програми під конкретні запити та темп учня
  recommended:
  - зміст навчання (course content) — розробляти зміст навчання; нормативна альтернатива запозиченню «курикулум»
  - когнітивне навантаження (cognitive load) — оптимальне когнітивне навантаження; обсяг інформації, що може бути засвоєний
  - зона найближчого розвитку (zone of proximal development) — враховувати зону найближчого розвитку; психолого-педагогічний
    аспект планування
  - інпут (input) — вхідний мовний матеріал; автентичний інпут як основа для засвоєння
  - аутпут (output) — мовленнєва продукція учня; баланс між сприйняттям та продукуванням
