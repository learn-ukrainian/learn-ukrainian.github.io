module: c2-093
level: C2
sequence: 93
version: 1.2.1
title: Методика викладання української мови II
subtitle: Методика викладання II
focus: professional
pedagogy: workshop
objectives:
- Опанувати методики навчання рецептивних видів мовленнєвої діяльності (читання та аудіювання)
- Вивчити стратегії розвитку продуктивних навичок (говоріння та письмо) у студентів різних рівнів
- 'Навчитися розробляти систему оцінювання: від формувального фідбеку до сумативних тестів'
- Дослідити техніки надання конструктивного зворотного зв'язку та виправлення помилок
content_outline:
- section: 'Навчання рецептивних навичок: читання та аудіювання'
  words: 1250
  subsections:
  - 'Стратегії читання: сканування, пошук деталей та глибоке критичне осмислення тексту'
  - 'Аудіювання: подолання бар''єрів сприйняття живої мови та робота з аудіовізуальним контентом'
  - 'Добір автентичних текстів: складність, актуальність та культурна цінність'
  key_concepts:
  - рецептивні навички
  - інтенсивне читання
  - екстенсивне аудіювання
  - автентичний матеріал
  primary_sources:
  - Методичні рекомендації щодо використання автентичних джерел на уроках мови
- section: 'Розвиток продуктивних навичок: говоріння та письмо'
  words: 1250
  subsections:
  - 'Говоріння: від контрольованої практики до вільних дискусій та дебатів'
  - 'Письмо: створення різних жанрів текстів — від формальних листів до творчих есе'
  - Використання рольових ігор та симуляцій для стимулювання мовленнєвої активності
  key_concepts:
  - продуктивні навички
  - флуентність
  - акуратність
  - функціональне письмо
  primary_sources:
  - Зразки завдань для розвитку усного мовлення в сучасних підручниках
- section: Оцінювання та зворотний зв'язок
  words: 1250
  subsections:
  - 'Формувальне оцінювання: підтримка прогресу та саморегуляція студента'
  - 'Сумативне оцінювання: розробка тестів та іспитів відповідно до стандартів'
  - 'Критерії оцінювання та рубрики (Rubrics): як зробити фідбек об''єктивним та прозорим'
  key_concepts:
  - формувальне оцінювання
  - сумативне оцінювання
  - критерії оцінювання
  - рубрикатор
  primary_sources:
  - Критерії оцінювання Державного іспиту на рівень володіння українською мовою
- section: Корекція помилок та робота з фідбеком
  words: 1250
  subsections:
  - Техніки негайної та відкладеної корекції помилок під час говоріння
  - 'Як виправляти письмові роботи: кодування помилок та заохочення до самокорекції'
  - 'Психологія зворотного зв''язку: як критикувати, не знижуючи мотивації'
  key_concepts:
  - корекція
  - самокорекція
  - позитивне підкріплення
  - навчальна помилка
  primary_sources:
  - Дослідження про вплив фідбеку на ефективність вивчення іноземної мови
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - comparative-study
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: методична стаття / посібник
  topic: Методика 'Scaffolding' у навчанні читання складних академічних текстів.
  key_elements:
  - підтримка
  - поступове ускладнення
  - самостійність
  motivation: Вивчення способів допомоги студентам у подоланні лінгвістичних труднощів.
- source_type: тестове завдання / специфікація
  topic: 'Аналіз структури та завдань тесту рівня B2 з української мови: що перевіряється?'
  key_elements:
  - валидність
  - надійність
  - практичність
  motivation: Розуміння принципів створення якісних тестів.
listening_situations:
- media_type: відео
  setting: 'Фрагмент реального уроку: викладач надає фідбек студентам після групової дискусії.'
  focus_points:
  - Баланс між виправленням граматики та похвалою за зміст
  - Використання мови тіла викладача
  motivation: Аналіз професійної поведінки викладача в ситуації надання зворотного зв'язку.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть аналітичну статтю для методичного журналу на тему «Оцінювання як інструмент навчання, а не покарання:
    сучасні підходи в українській аудиторії».'
  requirements:
  - мінімум 600 слів
  - аргументація з прикладами
  - 'використання термінів: формувальне оцінювання, рубрики'
  motivation: Розвиток навичок науково-методичного письма.
  model_answer: Стаття має містити порівняння традиційної та сучасної систем оцінювання, описувати конкретні інструменти (наприклад,
    портфоліо) та робити висновки про їх ефективність.
discussion_topics:
- context: Чи потрібно виправляти кожну помилку студента під час розмови?
  questions:
  - Як помилки допомагають у вивченні мови?
  - Коли втручання вчителя руйнує комунікацію?
  motivation: Дискусія про баланс між правильністю та вільним мовленням.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про навчання рецептивних навичок: читання та аудіювання і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про розвиток продуктивних навичок: говоріння та письмо, використовуючи нову
    лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Навчання рецептивних навичок: читання та аудіювання». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему навчання рецептивних навичок: читання та аудіювання.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до навчання рецептивних навичок: читання та аудіювання: Стратегії читання: сканування,
    пошук деталей та глибоке критичне осмислення текс. Визначте спільне та відмінне.'
references:
- 'Державний стандарт 2024: C2 — педагогічні компетенції, оцінювання'
- Караман, 10 клас (2018), §1-5 — Загальне мовознавство
- Критерії оцінювання Державного іспиту на рівень володіння українською мовою
phase: C2.4 [Meta-Skills & Capstone]
