title: Викладання української мови II — Планування курсів
subtitle: Introduction
focus: practice
pedagogy: TTT
phase: C2.4 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Аналізувати та класифікувати явища Теоретичні засади та стандарти у автентичних текстах
- Продукувати тексти з коректним застосуванням Аналіз потреб та визначення цілей
- Оцінювати стилістичну доречність мовних засобів у контексті Викладання української мови II — Планування курсів
- Застосовувати знання з теми «Структурування контенту та спіральний підхід» у власній мовній практиці
