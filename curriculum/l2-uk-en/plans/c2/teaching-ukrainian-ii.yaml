module: teaching-ukrainian-ii
level: C2
sequence: 89
version: '1.2'
title: Методика викладання української мови II
subtitle: Методика викладання II
focus: professional
pedagogy: workshop
objectives:
  - Опанувати методики навчання рецептивних видів мовленнєвої діяльності 
    (читання та аудіювання)
  - Вивчити стратегії розвитку продуктивних навичок (говоріння та письмо) у 
    студентів різних рівнів
  - 'Навчитися розробляти систему оцінювання: від формувального фідбеку до сумативних
    тестів'
  - Дослідити техніки надання конструктивного зворотного зв'язку та виправлення 
    помилок
content_outline:
  - section: 'Навчання рецептивних навичок: читання та аудіювання'
    words: 1250
    subsections:
      - 'Стратегії читання: сканування, пошук деталей та глибоке критичне осмислення
        тексту'
      - 'Аудіювання: подолання бар''єрів сприйняття живої мови та робота з аудіовізуальним
        контентом'
      - 'Добір автентичних текстів: складність, актуальність та культурна цінність'
    key_concepts:
      - рецептивні навички
      - інтенсивне читання
      - екстенсивне аудіювання
      - автентичний матеріал
    primary_sources:
      - Методичні рекомендації щодо використання автентичних джерел на уроках 
        мови
  - section: 'Розвиток продуктивних навичок: говоріння та письмо'
    words: 1250
    subsections:
      - 'Говоріння: від контрольованої практики до вільних дискусій та дебатів'
      - 'Письмо: створення різних жанрів текстів — від формальних листів до творчих
        есе'
      - Використання рольових ігор та симуляцій для стимулювання мовленнєвої 
        активності
    key_concepts:
      - продуктивні навички
      - флуентність
      - акуратність
      - функціональне письмо
    primary_sources:
      - Зразки завдань для розвитку усного мовлення в сучасних підручниках
  - section: Оцінювання та зворотний зв'язок
    words: 1250
    subsections:
      - 'Формувальне оцінювання: підтримка прогресу та саморегуляція студента'
      - 'Сумативне оцінювання: розробка тестів та іспитів відповідно до стандартів'
      - 'Критерії оцінювання та рубрики (Rubrics): як зробити фідбек об''єктивним
        та прозорим'
    key_concepts:
      - формувальне оцінювання
      - сумативне оцінювання
      - критерії оцінювання
      - рубрикатор
    primary_sources:
      - Критерії оцінювання Державного іспиту на рівень володіння українською 
        мовою
  - section: Корекція помилок та робота з фідбеком
    words: 1250
    subsections:
      - Техніки негайної та відкладеної корекції помилок під час говоріння
      - 'Як виправляти письмові роботи: кодування помилок та заохочення до самокорекції'
      - 'Психологія зворотного зв''язку: як критикувати, не знижуючи мотивації'
    key_concepts:
      - корекція
      - самокорекція
      - позитивне підкріплення
      - навчальна помилка
    primary_sources:
      - Дослідження про вплив фідбеку на ефективність вивчення іноземної мови
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - comparative-study
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: методична стаття / посібник
    topic: Методика 'Scaffolding' у навчанні читання складних академічних 
      текстів.
    key_elements:
      - підтримка
      - поступове ускладнення
      - самостійність
    motivation: Вивчення способів допомоги студентам у подоланні лінгвістичних 
      труднощів.
  - source_type: тестове завдання / специфікація
    topic: 'Аналіз структури та завдань тесту рівня B2 з української мови: що перевіряється?'
    key_elements:
      - валидність
      - надійність
      - практичність
    motivation: Розуміння принципів створення якісних тестів.
listening_situations:
  - media_type: відео
    setting: 'Фрагмент реального уроку: викладач надає фідбек студентам після групової
      дискусії.'
    focus_points:
      - Баланс між виправленням граматики та похвалою за зміст
      - Використання мови тіла викладача
    motivation: Аналіз професійної поведінки викладача в ситуації надання 
      зворотного зв'язку.
writing_tasks:
  - task_type: есе
    prompt: 'Напишіть аналітичну статтю для методичного журналу на тему «Оцінювання
      як інструмент навчання, а не покарання: сучасні підходи в українській аудиторії».'
    requirements:
      - мінімум 600 слів
      - аргументація з прикладами
      - 'використання термінів: формувальне оцінювання, рубрики'
    motivation: Розвиток навичок науково-методичного письма.
    model_answer: Стаття має містити порівняння традиційної та сучасної систем 
      оцінювання, описувати конкретні інструменти (наприклад, портфоліо) та 
      робити висновки про їх ефективність.
discussion_topics:
  - context: Чи потрібно виправляти кожну помилку студента під час розмови?
    questions:
      - Як помилки допомагають у вивченні мови?
      - Коли втручання вчителя руйнує комунікацію?
    motivation: Дискусія про баланс між правильністю та вільним мовленням.
activity_hints:
  - type: critical-analysis
    focus: Проаналізуйте методику Scaffolding у навчанні читання складних 
      текстів. Визначте принципи поступового ускладнення.
  - type: essay-response
    focus: 'Напишіть статтю для методичного журналу про оцінювання як інструмент навчання.
      Використайте терміни: формувальне оцінювання, рубрики.'
  - type: critical-analysis
    focus: Оцініть структуру тесту рівня B2 з української. Визначте валідність, 
      надійність та практичність завдань.
  - type: select
    focus: Оберіть оптимальну техніку корекції помилок (негайна / відкладена / 
      самокорекція) для конкретної навчальної ситуації.
references:
  - 'Державний стандарт 2024: C2 — педагогічні компетенції, оцінювання'
  - Караман, 10 клас (2018), §1-5 — Загальне мовознавство
  - Критерії оцінювання Державного іспиту на рівень володіння українською мовою
phase: C2.4 [Meta-Skills & Capstone]
