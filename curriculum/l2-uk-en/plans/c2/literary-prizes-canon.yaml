content_outline:
- section: 'Вступ: Хто визначає, що читати? (Introduction: Who Defines the Reading
    List?)'
  words: 600
  points:
  - Поняття літературного канону як системи визнаних текстів (§3.4); обговорення механізмів
    формування культурної пам'яті та ієрархій.
  - Премії як інструмент легітимації та канонотворення; роль інституцій (держави,
    медіа, академій) у визначенні «класики».
  - 'Метонімія та перифраз у літературному дискурсі (§4.3.3): аналіз висловів на зразок
    «читати Шевченка» або «місто Лева» як маркерів канонічності.'
- section: Українські літературні премії (Ukrainian Literary Prizes)
  words: 950
  points:
  - 'Шевченківська премія: від ідеологічного інструменту УРСР (1961) до найвищої державної
    нагороди; аналіз трансформації престижу.'
  - 'Сучасний контекст: лауреати 2024 року (Дмитро Лазуткін, Ярина Чорногуз) та фокус
    на документації війни («20 днів у Маріуполі»).'
  - 'Незалежні інституції: 20-річчя премії «BBC Книга року» як альтернативного механізму
    канонізації сучасної прози.'
  - 'Спеціалізовані нагороди: «Коронація слова» (жанрова література) та Drahomán Prize
    (міжнародне просування перекладів).'
- section: Міжнародне визнання та український голос (International Recognition and
    Ukrainian Voice)
  words: 700
  points:
  - 'Україна на Нобелівській мапі: від номінації Василя Стуса до сучасних висувань
    Сергія Жадана; виклики світової легітимації.'
  - Роль PEN International та міжнародних фестивалів у формуванні репутації українських
    авторів за кордоном.
  - 'Переклад як перепустка до глобального канону: аналіз того, як міжнародні премії
    впливають на вибір текстів для перекладу.'
- section: Дебати про канон та його ревізія (Debates on Canon and Its Revision)
  words: 850
  points:
  - 'Гендерний аспект: феміністична критика канону та парадокс Лесі Українки («єдиний
    мужчина»); маргіналізація та повернення жіночих голосів.'
  - 'Шкільна програма як «жорсткий канон»: дискусія про конфлікт між академічними
    традиціями та потребами сучасного читача.'
  - 'Деканонізація імперських міфів: переосмислення ролі авторів, що підтримували
    колоніальний наратив, та пошук нових центрів тяжіння.'
- section: 'Канон і влада: Постколоніальна перспектива (Canon and Power: Postcolonial
    Perspective)'
  words: 950
  points:
  - 'Парадокси канонізації: історія терміну «Розстріляне відродження» (Єжи Гедройць,
    1958) як приклад формування канону в діаспорі.'
  - 'Критика термінології: чому сучасні дослідники (Ярина Цимбал) пропонують термін
    «Червоний ренесанс» замість традиційних метафор.'
  - 'Радянський спадок: аналіз механізмів цензури та штучного виключення митців з
    літературного процесу; процес реканонізації репресованих.'
- section: Формування власного канону (Forming a Personal Canon)
  words: 600
  points:
  - 'Практичне застосування (§4.3.8): написання критичного повідомлення або реферату
    про критерії відбору творів до «золотого фонду».'
  - 'Робота над помилками: корекція вживання «лауреат премії» (Р.в.) та стилістичне
    збагачення відгуків (відзначено/удостоєно премії).'
  - 'Критичне ставлення до «списків найкращих»: розвиток навички самостійної оцінки
    літературної вартості поза впливом інституцій.'
- section: Підсумок (Summary)
  words: 350
  points:
  - 'Премія як орієнтир, а не догма: синтез поглядів на літературну ієрархію як на
    живий, динамічний процес.'
  - 'Зв''язок із наступними модулями: підготовка до обговорення літературної спільноти
    (c2-041) та фінального огляду C2.2.'
