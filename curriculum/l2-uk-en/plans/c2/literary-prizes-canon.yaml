vocabulary_hints:
  required:
  - канон (canon) — літературний/шкільний канон; ревізувати/переосмислювати канон;
    канонічний текст
  - премія (prize/award) — здобути/отримати/вручити премію; літературна/державна/незалежна
    премія
  - лауреат (laureate/winner) — лауреат премії (Genitive case!); стати лауреатом;
    оголосити лауреата
  - номінація (nomination) — потрапити до номінації; перемогти в номінації; шорт-лист
  - визнання (recognition) — здобути міжнародне визнання; літературне визнання; шлях
    до визнання
  - репутація (reputation) — літературна репутація; здобути/зруйнувати репутацію;
    незаплямована репутація
  recommended:
  - канонотворення (canon formation) — процес канонотворення; механізм канонотворення;
    канонотворча роль
  - деканонізація (decanonization) — деканонізація радянського спадку; потреба в деканонізації
  - маргіналізація (marginalization) — маргіналізація жіночих текстів; подолання маргіналізації
  - ревізія (revision) — постколоніальна ревізія канону; радикальна ревізія списків
  - легітимація (legitimation) — легітимація через премію; інституційна легітимація
    тексту
  - інституція (institution) — культурна інституція; роль інституцій у формуванні
    канону
