module: c2-038
level: C2
sequence: 38
version: 1.2.2
title: Літературні премії та формування канону
subtitle: Літературні премії та формування канону
focus: literature
pedagogy: seminar
objectives:
- Проаналізувати роль літературних премій як інституту легітимації та визнання
- Дослідити історію та сучасний статус Шевченківської премії як державної 
  інституції
- Ознайомитися з впливом міжнародних та незалежних премій на розвиток 
  літературного ринку
- 'Осмислити процес формування літературного канону: хто і як обирає ''класику'''
content_outline:
- section: Премія як культурна інституція
  words: 1250
  subsections:
  - 'Функції літературних премій: від матеріальної підтримки до символічного капіталу'
  - 'Механізми номінації та експертного оцінювання: прозорість vs заангажованість'
  - Літературна премія як засіб маркетингу та популяризації читання
  key_concepts:
  - символічний капітал
  - легітимація
  - експертне середовище
  - шорт-лист
  primary_sources:
  - Положення про Національну премію України імені Тараса Шевченка
  - Списки лауреатів премії 'Книга року BBC'
- section: 'Шевченківська премія: традиція та оновлення'
  words: 1250
  subsections:
  - 'Історія премії: від радянського періоду до Незалежності'
  - 'Скандали та дискусії навколо вибору лауреатів: дзеркало суспільних суперечностей'
  - Спроби реформування премії та її роль у сучасному націєтворенні
  key_concepts:
  - державна нагорода
  - істеблішмент
  - репрезентативність
  - культурна політика
- section: Незалежні та міжнародні премії
  words: 1250
  subsections:
  - Премія 'Книга року BBC' та формування читацьких смаків
  - Роль премії імені Юрія Шевельова для есеїстики та Ангелуса для Центральної 
    Європи
  - Українські автори у списках Букерівської та Нобелівської премій
  key_concepts:
  - лонг-лист
  - престижність
  - міжнародне визнання
  - літературний агент
- section: 'Формування канону: боротьба за пам''ять'
  words: 1250
  subsections:
  - 'Поняття канону: від шкільної програми до інтелектуального консенсусу'
  - 'Переосмислення канону: повернення забутих імен та деколонізація'
  - Хто вирішує, що ми читатимемо через 50 років? Роль критики та освіти
  key_concepts:
  - літературний канон
  - маргіналізація
  - деколонізація канону
  - освітній стандарт
- section: Підсумок — Summary
  words: 300
  points:
  - 'Literary awards function as mechanisms of validation (легітимація) and provide
    symbolic capital (символічний капітал) to authors. Review key terminology: шорт-лист,
    лонг-лист, істеблішмент, and літературний канон.'
  - 'Self-check: What is the difference between a state award (державна нагорода)
    like the Shevchenko Prize and an independent award? Describe 3 factors that influence
    the formation and decolonization of a literary canon (деколонізація канону).'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Авраменко, 11 клас (2019): Аналіз літературного процесу'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Державний стандарт 2024: C2 — літературна компетенція'
reading_situations:
- source_type: Статут / Офіційний документ
  topic: 'Аналіз критеріїв відбору творів на Шевченківську премію: високий художній
    рівень чи актуальність?'
  key_elements:
  - гуманістичні цінності
  - внесок у культуру
  - державна значущість
  motivation: Вивчення офіційних вимог до 'вершинних' творів національної 
    літератури.
- source_type: Критичний нарис
  topic: 'Григорій Грабович про канонізацію Тараса Шевченка: міфотворчість та реальність.'
  key_elements:
  - сакралізація
  - іконографія
  - критичне прочитання
  motivation: Розуміння механізмів перетворення автора на символ нації.
listening_situations:
- media_type: відео
  setting: 'Круглий стіл літературних критиків: ''Чи потрібні нам премії сьогодні?'''
  focus_points:
  - Вплив премії на продажі
  - Ризик суб'єктивізму журі
  motivation: Ознайомлення з експертним поглядом на літературну інфраструктуру.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть обґрунтування (500 слів) для номінації одного з творів 
    сучасного українського автора на умовну премію 'Голос сучасності'. Чому саме
    цей твір заслуговує на статус 'канонічного'?
  requirements:
  - аналіз художніх переваг
  - опис суспільної важливості
  - стиль професійної рецензії
  motivation: Розвиток навичок критичної аргументації та літературної 
    експертизи.
  model_answer: Текст має бути переконливим, містити глибокий аналіз тексту та 
    демонструвати розуміння місця твору в загальному контексті.
discussion_topics:
- context: Чи може премія 'зіпсувати' автора, примушуючи його підлаштовуватися 
    під смаки журі?
  questions:
  - 'Яка премія є більш вагомою: від критиків чи від читачів?'
  - Чи варто включати до канону твори авторів з сумнівною репутацією?
  motivation: Дискусія про етичні, естетичні та ринкові аспекти визнання в 
    літературі.
activity_hints:
- type: reading
  focus: Прочитайте текст про премія як культурна інституція і дайте відповіді 
    на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про шевченківська премія: традиція
    та оновлення, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Премія як 
    культурна інституція». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    премія як культурна інституція.
- type: comparative-study
  focus: 'Порівняйте різні підходи до премія як культурна інституція: Функції літературних
    премій: від матеріальної підтримки до символічного капіталу. Визначте спільне
    та відмінне.'
phase: C2.2 [Literary Mastery]
