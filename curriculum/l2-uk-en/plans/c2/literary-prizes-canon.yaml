module: literary-prizes-canon
level: C2
sequence: 38
version: "1.0"
title: "Літературні премії та формування канону"
subtitle: "Literary Prizes and Canon Formation"
focus: literature
pedagogy: seminar
objectives:
  - "Проаналізувати роль літературних премій як інституту легітимації та визнання"
  - "Дослідити історію та сучасний статус Шевченківської премії як державної інституції"
  - "Ознайомитися з впливом міжнародних та незалежних премій на розвиток літературного ринку"
  - "Осмислити процес формування літературного канону: хто і як обирає 'класику'"
content_outline:
  - section: "Премія як культурна інституція"
    words: 1000
    subsections:
      - "Функції літературних премій: від матеріальної підтримки до символічного капіталу"
      - "Механізми номінації та експертного оцінювання: прозорість vs заангажованість"
      - "Літературна премія як засіб маркетингу та популяризації читання"
    key_concepts:
      - "символічний капітал"
      - "легітимація"
      - "експертне середовище"
      - "шорт-лист"
    primary_sources:
      - "Положення про Національну премію України імені Тараса Шевченка"
      - "Списки лауреатів премії 'Книга року BBC'"
  - section: "Шевченківська премія: традиція та оновлення"
    words: 1000
    subsections:
      - "Історія премії: від радянського періоду до Незалежності"
      - "Скандали та дискусії навколо вибору лауреатів: дзеркало суспільних суперечностей"
      - "Спроби реформування премії та її роль у сучасному націєтворенні"
    key_concepts:
      - "державна нагорода"
      - "істеблішмент"
      - "репрезентативність"
      - "культурна політика"
  - section: "Незалежні та міжнародні премії"
    words: 1000
    subsections:
      - "Премія 'Книга року BBC' та формування читацьких смаків"
      - "Роль премії імені Юрія Шевельова для есеїстики та Ангелуса для Центральної Європи"
      - "Українські автори у списках Букерівської та Нобелівської премій"
    key_concepts:
      - "лонг-лист"
      - "престижність"
      - "міжнародне визнання"
      - "літературний агент"
  - section: "Формування канону: боротьба за пам'ять"
    words: 1000
    subsections:
      - "Поняття канону: від шкільної програми до інтелектуального консенсусу"
      - "Переосмислення канону: повернення забутих імен та деколонізація"
      - "Хто вирішує, що ми читатимемо через 50 років? Роль критики та освіти"
    key_concepts:
      - "літературний канон"
      - "маргіналізація"
      - "деколонізація канону"
      - "освітній стандарт"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Статут / Офіційний документ"
    topic: "Аналіз критеріїв відбору творів на Шевченківську премію: високий художній рівень чи актуальність?"
    key_elements: ["гуманістичні цінності", "внесок у культуру", "державна значущість"]
    motivation: "Вивчення офіційних вимог до 'вершинних' творів національної літератури."
  - source_type: "Критичний нарис"
    topic: "Григорій Грабович про канонізацію Тараса Шевченка: міфотворчість та реальність."
    key_elements: ["сакралізація", "іконографія", "критичне прочитання"]
    motivation: "Розуміння механізмів перетворення автора на символ нації."
listening_situations:
  - media_type: "відео"
    setting: "Круглий стіл літературних критиків: 'Чи потрібні нам премії сьогодні?'"
    focus_points:
      - "Вплив премії на продажі"
      - "Ризик суб'єктивізму журі"
    motivation: "Ознайомлення з експертним поглядом на літературну інфраструктуру."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть обґрунтування (500 слів) для номінації одного з творів сучасного українського автора на умовну премію 'Голос сучасності'. Чому саме цей твір заслуговує на статус 'канонічного'?"
    requirements: ["аналіз художніх переваг", "опис суспільної важливості", "стиль професійної рецензії"]
    motivation: "Розвиток навичок критичної аргументації та літературної експертизи."
    model_answer: "Текст має бути переконливим, містити глибокий аналіз тексту та демонструвати розуміння місця твору в загальному контексті."
discussion_topics:
  - context: "Чи може премія 'зіпсувати' автора, примушуючи його підлаштовуватися під смаки журі?"
    questions:
      - "Яка премія є більш вагомою: від критиків чи від читачів?"
      - "Чи варто включати до канону твори авторів з сумнівною репутацією?"
    motivation: "Дискусія про етичні, естетичні та ринкові аспекти визнання в літературі."
