content_outline:
- section: 'Вступ: Просторовий дискурс на рівні С2 (Introduction: Spatial Discourse at C2 Level)'
  words: 600
  points:
  - 'From housing vocabulary (A2-B2) to spatial analysis: the C2 learner engages with living environments through
    urban planning theory, real estate economics, and cultural heritage discourse.'
  - 'State Standard themes 3.2 and 3.17: integrated coverage of Житло (home/housing) and Місця (places) as interconnected
    domains encompassing housing markets, urban development, and cultural landmarks.'
  - 'Register spectrum: офіційно-діловий (real estate contracts, urban planning documents), науковий (urban studies),
    публіцистичний (housing journalism), and розмовний (everyday discussions about living spaces).'
- section: Житловий ринок і нерухомість (Housing Market and Real Estate)
  words: 750
  points:
  - 'Housing market structure: первинний ринок (new builds) vs вторинний ринок (resale), types of housing (квартира,
    приватний будинок, таунхаус, котедж), and the price dynamics in major Ukrainian cities.'
  - 'Buying and renting: оренда (rental) vs купівля (purchase), іпотека (mortgage), договір купівлі-продажу (sale contract),
    нотаріальне посвідчення, and the role of ріелтори (real estate agents) in Ukrainian property transactions.'
  - 'Housing problems and policy: комунальні платежі (utility bills), ОСББ (homeowners'' associations), житлові субсидії
    (housing subsidies), and the ongoing challenge of affordable housing (доступне житло) in Ukrainian cities.'
- section: Ремонт, реставрація та перепланування (Renovation, Restoration, and Remodeling)
  words: 700
  points:
  - 'Residential renovation: євроремонт (modern renovation), косметичний ремонт (cosmetic repair), капітальний ремонт
    (major overhaul); construction materials, contractor culture, and DIY practices in Ukraine.'
  - 'Architectural restoration: реставрація пам''яток архітектури (restoration of architectural monuments), preservation
    vs reconstruction debates, EU-funded restoration projects, and the wartime destruction and rebuilding challenge.'
  - 'Remodeling regulations: перепланування (layout changes), building permits (дозвіл на будівництво), legal requirements
    for structural modifications, and common disputes between residents and authorities over unauthorized changes.'
- section: Містобудування та генеральний план (Urban Planning and the Master Plan)
  words: 750
  points:
  - 'Urban planning fundamentals: генеральний план міста (city master plan), зонування (zoning), детальний план території
    (detailed area plan), and the process of public consultation (громадські слухання) in urban development.'
  - 'Urbanization challenges: транспортна інфраструктура (transport infrastructure), зелені зони (green spaces), хмарочоси
    vs малоповерхова забудова, parking problems, and the tension between densification and livability.'
  - 'Smart city initiatives and revitalization: ревіталізація промислових зон (industrial zone revitalization), громадський
    простір (public space) design, пішохідні зони (pedestrian zones), велоінфраструктура (cycling infrastructure), and
    digital urban services.'
- section: Пам''ятки культури та туристичні об''єкти (Cultural Landmarks and Tourist Attractions)
  words: 700
  points:
  - 'UNESCO World Heritage sites in Ukraine: Софійський собор, Києво-Печерська лавра, Старе місто Львова; management
    challenges, visitor impact, and wartime protection of cultural heritage.'
  - 'Castles, palaces, and historic squares: замки (Паланок, Олеський, Хотинський), палаци (Потоцьких, Шенборнів), площі
    (Ринок, Майдан Незалежності); their history, current use, and role in cultural tourism.'
  - 'Places of memory and monuments: пам''ятники (monuments), меморіали (memorials), місця пам''яті (sites of memory);
    the politics of decommunization (декомунізація), renaming, and the creation of new commemorative spaces.'
- section: Місто проти села та приватна забудова (Urban vs Rural Life and Private Construction)
  words: 750
  points:
  - 'Urban-rural divide: socioeconomic disparities, infrastructure gaps, migration from villages to cities (урбанізація),
    and the depopulation of rural areas; government programs for rural development (сільський розвиток).'
  - 'Suburbanization and dacha culture: передмістя (suburbs), приміська забудова (suburban development), дачна культура
    as a post-Soviet phenomenon, садівничі товариства (garden cooperatives), and the weekend migration pattern.'
  - 'Private construction: приватна забудова (private housing development), індивідуальне житлове будівництво (individual
    housing construction), land allocation (земельна ділянка), building regulations, and the aesthetic chaos of unregulated
    suburban sprawl.'
- section: 'Практикум: Просторовий аналіз (Workshop: Spatial Analysis)'
  words: 750
  points:
  - 'Applied analysis: evaluating an urban development proposal or генеральний план excerpt, identifying planning
    principles, stakeholder interests, and potential social impacts using urban studies analytical frameworks.'
  - 'Comparative analysis: contrasting life in a major Ukrainian city (Київ, Львів, Одеса) with a rural area, using
    sociological data on quality of life, infrastructure, employment, and cultural opportunities.'
  - 'Document production: composing an analytical text about a housing policy issue (e.g., affordable housing, wartime
    reconstruction, heritage preservation) or writing a formal response to a public consultation on urban development.'
vocabulary_hints:
  required:
  - нерухомість (real estate) — ринок нерухомості, агентство нерухомості; property market terminology
  - реставрація (restoration) — реставрація будівлі, реставраційні роботи; architectural heritage register
  - оренда (rent/lease) — оренда квартири, договір оренди; housing market terminology
  - комунальний платіж (utility payment) — нарахування комунальних платежів, заборгованість за комунальні платежі; housing
    services register
  - передмістя (suburb) — передмістя Києва, життя в передмісті; urban geography terminology
  - забудова (development/construction) — житлова забудова, приватна забудова, незаконна забудова; urban planning register
  - пам'ятка культури (cultural monument/landmark) — пам'ятка культури місцевого значення, охорона пам'яток культури;
    heritage preservation terminology
  - перепланування (remodeling/layout change) — незаконне перепланування, дозвіл на перепланування; construction regulations
    register
  - інфраструктура (infrastructure) — транспортна інфраструктура, соціальна інфраструктура; urban planning core term
  - генеральний план (master plan) — генеральний план міста, розробка генерального плану; urban planning terminology
  recommended:
  - ревіталізація (revitalization) — ревіталізація міського простору, ревіталізація промзони; modern urban development term
  - урбаністика (urban studies/urbanism) — сучасна урбаністика, принципи урбаністики; academic urban planning discourse
  - благоустрій (improvement/landscaping) — благоустрій території, благоустрій двору; municipal services register
  - житловий фонд (housing stock) — державний житловий фонд, зношений житловий фонд; housing policy terminology
  - зонування (zoning) — функціональне зонування, зонування території; urban planning regulatory term
