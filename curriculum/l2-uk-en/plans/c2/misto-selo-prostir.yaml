objectives:
- Аналізувати житловий ринок, процеси урбанізації та субурбанізації в Україні з використанням фахової термінології
  містобудування та нерухомості
- Learner can critically discuss urban planning, cultural heritage preservation, and the tension between development
  and conservation using nuanced analytical discourse in Ukrainian
- Порівнювати міський та сільський способи життя, обговорювати дачну культуру і приватну забудову на рівні соціологічного
  та публіцистичного дискурсу
- Learner can compose an analytical text about housing policy, tourist infrastructure, or urban revitalization using
  formal academic Ukrainian
