module: c2-079
level: C2
sequence: 79
version: '1.2'
title: 'Місто та село: Урбаністика, простір та регіональна ідентичність'
subtitle: 'Місто і село: урбанізм і регіональна ідентичність'
focus: vocabulary
pedagogy: seminar
objectives:
  - Дослідити процеси урбанізації, дезурбанізації та трансформації українського 
    села в ХХІ столітті
  - 'Опанувати концепції сучасної урбаністики: комфортне місто, інклюзивність, джентрифікація
    та сталий розвиток територій'
  - Аналізувати взаємодію людини з простором через архітектуру, ландшафт та 
    соціальну інфраструктуру
  - Сформувати розуміння важливості збереження культурної спадщини та 
    автентичності поселень
content_outline:
  - section: 'Міська екосистема: архітектура, логістика та соціальна взаємодія'
    words: 1250
    subsections:
      - 'Право на місто: участь громади у плануванні та розвитку публічних просторів'
      - 'Джентрифікація та ревіталізація промислових зон: соціальні та мовні наслідки'
      - Розумне місто (Smart City) та цифрова інфраструктура як фактори комфорту
    key_concepts:
      - урбаністика
      - джентрифікація
      - публічний простір
      - ревіталізація
    primary_sources:
      - Стратегія регіонального розвитку України (аналіз дискурсу 
        територіального планування та розвитку громад)
  - section: 'Сучасне українське село: виклики відродження та агроінновації'
    words: 1250
    subsections:
      - 'Від колгоспів до фермерських господарств: зміна соціально-економічної парадигми'
      - 'Екопоселення та дезурбанізація: чому молодь обирає життя за містом?'
      - 'Збереження автентичності: сільський туризм та локальні традиції як ресурс
        розвитку'
    key_concepts:
      - дезурбанізація
      - агрохолдинг
      - територіальна громада
      - автентичність
  - section: 'Урбаністичні стратегії: від радянського планування до креативних просторів'
    words: 1250
    subsections:
      - 'Спадщина модернізму та деколонізація міського простору: пам''ятники, топоніми,
        символи'
      - 'Архітектура як мова: що розповідають про нас наші будівлі?'
      - 'Інклюзивність та доступність: створення міст для всіх груп населення'
    key_concepts:
      - інклюзивність
      - універсальний дизайн
      - модернізм
      - топоніміка
    primary_sources:
      - Іван Нечуй-Левицький, 'Світогляд українського народу' (вибрані думки про
        естетику та зв'язок з простором)
  - section: 'Людина в ландшафті: психологія простору та локальна ідентичність'
    words: 1250
    subsections:
      - 'Психогеографія: як міський ландшафт впливає на емоційний стан особистості'
      - Формування локального патріотизму через причетність до простору
      - 'Майбутнє територій: екологічна архітектура та гармонія з природою'
    key_concepts:
      - психогеографія
      - локальна ідентичність
      - ландшафтний дизайн
      - урбаністичне середовище
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Стратегічний документ
    topic: Аналіз Стратегії регіонального розвитку України. Дослідження 
      пріоритетів розвитку малих міст та сільських територій.
    key_elements:
      - людський капітал
      - територіальна згуртованість
      - сталий розвиток
    motivation: Вивчення офіційної термінології регіональної політики.
  - source_type: Етнографічне дослідження
    topic: Аналіз праці Івана Нечуя-Левицького про світогляд українців. 
      Дослідження концепції взаємодії людини та природи.
    key_elements:
      - естетика
      - духовність
      - національний характер
    motivation: Розуміння історичного коріння сприйняття простору в українській 
      культурі.
listening_situations:
  - media_type: лекція
    setting: Виступ відомого урбаніста про принципи створення комфортного 
      міського середовища та роль громади.
    focus_points:
      - Принципи універсального дизайну
      - Методи залучення мешканців до планування (партисипація)
    motivation: Опанування сучасного урбаністичного лексикону.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть пропозицію щодо ревіталізації занедбаного об'єкта (заводу, 
      парку, площі) у вашому місті чи селі.
    requirements:
      - мінімум 500 слів
      - використання термінів урбаністики
      - обґрунтування соціальної користі проекту
    motivation: Розвиток навичок проектного мислення та фахової аргументації.
    model_answer: Текст має містити опис поточного стану, концепцію змін, план 
      залучення громади та очікувані результати.
discussion_topics:
  - context: Чи можливо зберегти душу українського села в умовах тотальної 
      глобалізації та технологічного прогресу?
    questions:
      - Чи є урбанізація незворотним процесом?
      - Як збалансувати потребу в модернізації зі збереженням традиційної 
        архітектури?
    motivation: Дебати про майбутнє розселення та розвиток територій.
activity_hints:
  - type: reading
    focus: 'Проаналізувати Стратегію регіонального розвитку: визначити пріоритети
      розвитку та термінологію територіального планування'
  - type: essay-response
    focus: Написати пропозицію щодо ревіталізації занедбаного об'єкта з 
      обґрунтуванням соціальної користі
  - type: critical-analysis
    focus: Оцінити аргументацію у тексті про джентрифікацію та соціальні 
      наслідки урбанізації
  - type: essay-response
    focus: 'Доповнити текст урбаністичною термінологією: ревіталізація, психогеографія,
      універсальний дизайн'
  - type: error-correction
    focus: Виправити росіянізми та кальки у тексті про міське планування
