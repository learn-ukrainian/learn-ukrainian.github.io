content_outline:
- section: Вступ — Тропи та фігури в системі мови (Introduction — Tropes & Figures in the Language System)
  words: 750
  points:
  - Теоретичне розрізнення тропів (лексичне перенесення) та стилістичних фігур (синтаксичні конструкції) згідно з вимогами
    Держстандарту §4.3.3 та §4.3.4.
  - 'Функціональне навантаження образності: аналіз того, чому автор обирає художній засіб замість прямої назви для створення
    певної конотації чи емоційного фону.'
  - 'Класифікація засобів за типом перенесення значення: схожість (метафора), суміжність (метонімія), кількісне співвідношення
    (синекдоха, гіпербола).'
- section: 'Метафора: від побутової мови до поетичного образу (Metaphor: from Everyday Language to Poetic Image)'
  words: 900
  points:
  - Розмежування 'стертих' (мертвих) метафор, що стали частиною нейтральної лексики (наприклад, 'ніжка столу', 'ручка дверей'),
    та оригінальних авторських образів.
  - 'Техніка створення розгорнутої метафори: аналіз механізму послідовного розгортання одного образу через цілу низку взаємопов''язаних
    метафоричних висловів.'
  - Метафоричні епітети як засіб створення експресивно забарвленої лексики в сучасному художньому та публіцистичному дискурсах
    (Ю. Андрухович).
  - Порівняльний аналіз стилістичних прийомів на матеріалі текстів різних епох та жанрів із залученням сучасного українського
    медіадискурсу
- section: 'Метонімія та синекдоха: магія суміжності (Metonymy & Synecdoche: Magic of Contiguity)'
  words: 1000
  points:
  - 'Метонімія як перенесення за суміжністю: аналіз класичних прикладів ''назва місця замість людей'' у Т. Шевченка (''Гомоніла
    Україна'') та І. Франка (''Борислав сміється'').'
  - 'Корекція типової помилки: розрізнення метафори (логіка ''схожий на...'') та метонімії (логіка ''знаходиться поруч'' або
    ''є частиною...'').'
  - 'Синекдоха як кількісний різновид метонімії: використання частини замість цілого для підкреслення емоційного стану (М.
    Вороний ''Сну не знають його очі'').'
  - Порівняльний аналіз стилістичних прийомів на матеріалі текстів різних епох та жанрів із залученням сучасного українського
    медіадискурсу
- section: 'Олюднення та інакомовлення: персоніфікація та алегорія (Anthropomorphization & Allusion: Personification & Allegory)'
  words: 850
  points:
  - 'Персоніфікація (уособлення) як засіб олюднення природи та абстрактних понять: аналіз синтезу персоніфікації та метонімії
    в сучасній поезії (Л. Костенко ''Флоренція плаче'').'
  - 'Алегорія в системі дидактичних жанрів: трансформація абстрактних ідей у конкретні образи в байках та притчах, відмінність
    алегорії від символу.'
  - Функції інакомовлення в умовах цензури (езопівська мова) та його роль у формуванні інтелектуального підтексту сучасного
    тексту.
- section: Кількісні та синтаксичні засоби виразності (Quantitative & Syntactic Expressive Means)
  words: 850
  points:
  - 'Гіпербола та литота: межа між художнім перебільшенням та фактичною помилкою; аналіз доречності використання в інформаційних
    та художніх текстах.'
  - 'Стилістичні засоби синтаксису за Держстандартом §4.3.4: роль еліпсису (пропуску) та повтору для створення динаміки та
    ритму прозового тексту.'
  - 'Перифраз та евфемізм: використання описових зворотів для уникнення повторів (варіативність) та пом''якшення небажаних
    висловів.'
- section: 'Практикум: аналіз функціонального навантаження (Workshop: Analysis of Functional Load)'
  words: 650
  points:
  - 'Вправа на ідентифікацію засобів у текстах різних стилів: від класики до постмодерну (визначення типу тропа та його стилістичного
    ефекту).'
  - 'Творча трансформація: переклад буквального повідомлення в образне з використанням заданого переліку тропів (метафора
    -> персоніфікація -> перифраз).'
  - 'Дискусія щодо доречності надмірної метафоризації: аналіз текстів, де образність заважає сприйняттю основної думки (критичне
    осмислення).'
vocabulary_hints:
  required:
  - метафора (metaphor) — розгорнута, стерта (мертва), авторська; вживати метафору, будувати образ
  - метонімія (metonymy) — перенесення за суміжністю; назва місця замість спільноти людей
  - синекдоха (synecdoche) — кількісний різновид метонімії; частина замість цілого (pars pro toto)
  - троп (trope) — художній засіб перенесення значення; система тропів, багатство образності
  - фігура (figure) — стилістична/риторична фігура; засіб синтаксичної виразності тексту
  - персоніфікація (personification) — уособлення, олюднення неживих предметів чи явищ
  recommended:
  - образність (imagery) — система художніх засобів у творі; створювати візуальний ряд
  - перифраз (periphrasis) — описова заміна прямої назви; засіб уникнення тавтології
  - евфемізм (euphemism) — пом'якшувальний вислів замість грубого або неприємного
  - еліпсис (ellipsis) — стилістична фігура пропуску елемента речення для динамізму
  - гіпербола (hyperbole) — художнє перебільшення; литота (litotes) — художнє применшення
