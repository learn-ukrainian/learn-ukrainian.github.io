module: c2-017
level: C2
sequence: 17
version: '1.2'
title: Майстерність стилістичних фігур та тропів
subtitle: Майстерність стилістичних засобів і тропів
focus: integration
pedagogy: workshop
objectives:
  - Досягти віртуозності у використанні художніх тропів (метафора, метонімія, 
    синекдоха) для створення багатопланових образів
  - Досконало опанувати стилістичні фігури (оксюморон, літота, гіпербола, 
    іронія) як засоби інтелектуальної гри та експресії
  - Аналізувати складні метафоричні системи у творах класичної та сучасної 
    української літератури
  - Навчитися створювати власні оригінальні тропи, уникаючи стертих метафор та 
    стилістичних кліше
content_outline:
  - section: Тропеїчна система української мови
    words: 1250
    subsections:
      - 'Метафора як спосіб мислення: від простого порівняння до розгорнутого образу'
      - 'Метонімія та синекдоха: логіка перенесення значень у різних стилях'
      - 'Епітет як засіб індивідуалізації та оцінки: постійні та індивідуально-авторські
        епітети'
    key_concepts:
      - троп
      - метафора
      - метонімія
      - епітет
  - section: 'Стилістичні фігури: синтаксис та логіка'
    words: 1250
    subsections:
      - 'Оксюморон та парадокс: єдність протилежностей як джерело смислу'
      - 'Гіпербола та літота: засоби емоційного та кількісного перебільшення/применшення'
      - 'Градація та антитеза: динаміка напруги та сила контрасту'
    key_concepts:
      - оксюморон
      - парадокс
      - градація
      - антитеза
    primary_sources:
      - Богдан-Ігор Антонич, 'Ротації' (складна метафорика)
      - Микола Бажан, 'Сліпці' (аналіз барокової фігуративності)
  - section: Комічне та іронічне у стилістиці
    words: 1250
    subsections:
      - Іронія як інтелектуальна позиція та стилістичний прийом
      - 'Сарказм, гротеск та алегорія: від соціальної критики до філософського узагальнення'
      - Засоби створення комічного ефекту в сучасній українській публіцистиці
    key_concepts:
      - іронія
      - сарказм
      - гротеск
      - алегорія
  - section: Творче моделювання та аналіз тропів
    words: 1250
    subsections:
      - Деконструкція 'стертих' метафор та штампів у рекламі та медіа
      - Алгоритми створення свіжих, несподіваних образів (концептуальна 
        інтеграція)
      - 'Стилістичний аналіз тексту: виявлення домінуючих тропів та їх функцій'
    key_concepts:
      - стерта метафора
      - образність
      - концепт
      - експресивність
word_target: 5000
activities:
  types_required:
    - authorial-intent
    - critical-analysis
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Художній уривок
    topic: 'Метафоричний світ Богдана-Ігоря Антонича. Джерело: збірка ''Зелена Євангелія''.'
    key_elements:
      - пантеїзм
      - антропоморфізм
      - неологізми
    motivation: Вивчення граничної образності та міфологізації через тропи.
  - source_type: Публіцистична стаття
    topic: Використання іронії та сарказму в сучасних політичних оглядах Віталія
      Портникова.
    key_elements:
      - підтекст
      - алюзія
      - аналогія
    motivation: Аналіз тропів як інструментів аналітичного мислення та 
      переконання.
listening_situations:
  - media_type: аудіо
    setting: 'Поетичні читання сучасних слем-поетів: аналіз живої метафорики.'
    focus_points:
      - Використання урбаністичних метафор
      - Ритмічна подача стилістичних фігур
    motivation: Сприйняття динамічної, сучасної образної системи.
writing_tasks:
  - task_type: власне висловлення
    prompt: 'Опишіть сучасне місто крізь призму трьох різних тропів: 1) як живий організм
      (метафора), 2) як складний механізм (порівняння), 3) як текст (алегорія). Уникайте
      штампів.'
    requirements:
      - мінімум 400 слів
      - використання оксюморона та градації
      - висока оригінальність образів
    motivation: Тренування творчої уяви та майстерного володіння тропеїкою.
    model_answer: Текст має бути багатим на свіжі образи. Місто-організм має 
      'дихати', місто-механізм — 'скреготіти', місто-текст — 'читатися'. Кожна 
      частина повинна мати свій настрій та лексичну домінанту.
discussion_topics:
  - context: Чи може метафора бути небезпечною? Як тропи використовуються для 
      створення дезінформації?
    questions:
      - Як військові метафори у мирному житті впливають на суспільство?
      - Чи можливо мислити без метафор?
    motivation: Дискусія про когнітивну та соціальну роль стилістичних засобів.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про тропеїчна система української мови і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про стилістичні фігури: синтаксис та логіка, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Тропеїчна система української мови». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему тропеїчна система української мови."
  - type: comparative-study
    focus: "Порівняйте різні підходи до тропеїчна система української мови: Метафора як спосіб мислення: від простого порівняння до розгорнутого образу. Визначте спільне та відмінне."
references:
  - Глазова О. П. Українська мова, 11 клас (2019), §40 — стилістичне забарвлення
    лексики, тропи
  - Авраменко О. М. Українська література, 11 клас — літературознавча 
    термінологія
  - Антонич Б.-І. Зелена Євангелія — зразок складної метафорики
  - 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
