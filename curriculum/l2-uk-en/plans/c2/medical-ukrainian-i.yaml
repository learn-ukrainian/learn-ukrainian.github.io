content_outline:
- section: 'Вступ: Історія та розвиток медичної мови (Introduction: History and Development
    of Medical Language)'
  words: 400
  points:
  - 'Історичний огляд української медичної термінології: від традицій Агапіта Печерського
    до «Золотого десятиліття» 1920-х років.'
  - 'Діяльність Інституту української наукової мови: відродження питомих термінів
    (наприклад, «м''яз» замість «мускул») та сучасні процеси деколонізації медичного
    словника.'
- section: Анатомічна термінологія та граматичні норми (Anatomical Terminology and
    Grammatical Norms)
  words: 500
  points:
  - 'Професійна анатомічна номенклатура: використання латинських основ поряд із питомими
    українськими відповідниками (напр., «черевна порожнина» замість загального «живіт»).'
  - 'Граматичний практикум C2: запобігання морфологічним помилкам у роді іменників
    на -ь; акцент на чоловічому роді слів «біль», «кір», «ступінь» (корекція кальки
    з рос. «сильна біль»).'
- section: Клінічна термінологія та діагностика (Clinical Terminology and Diagnostics)
  words: 600
  points:
  - 'Робота з діагнозом та симптоматикою: розмежування попереднього, клінічного та
    диференційного діагнозів; стійкі сполучення (безсимптомний перебіг, усунути симптоми).'
  - 'Методика збору анамнезу: термінологія (сімейний, обтяжений анамнез) та чітке
    розрізнення паронімів «лікувати» (пацієнта) та «лічити» (гроші/предмети).'
- section: Фармацевтична термінологія та призначення (Pharmaceutical Terminology and
    Prescriptions)
  words: 500
  points:
  - 'Державне регулювання обігу ліків: реєстр лікарських засобів, правила відпуску
    та юридичні аспекти (фальсифікація лікарських засобів).'
  - 'Рецептурна мова та дозування: способи застосування препаратів; згадка про внесок
    Миколи Амосова у популяризацію фізичного здоров''я та кардіохірургію.'
- section: Медична документація та сучасні стандарти (Medical Documentation and Modern
    Standards)
  words: 500
  points:
  - 'Оформлення медичних записів за стандартами МОЗ: історія хвороби, виписка та роль
    електронної системи охорони здоров''я (eHealth/NSZU).'
  - 'Словотворення в медицині за стандартом §4.1.1.1: використання відмінюваних абревіатур
    (медпрацівник) та складних термінів (водолікування, грязелікування).'
- section: 'Практикум: Корекція професійних кальків (Workshop: Correction of Professional
    Calques)'
  words: 500
  points:
  - 'Аналіз типових лексичних помилок у медичному середовищі: вживання нормативного
    «серцевий напад» замість «приступ» та «ускладнення» замість «осложнення».'
  - 'Стилістичний аналіз професійного тексту: робота з уривками праць Миколи Амосова
    як взірця природного медичного наративу.'
