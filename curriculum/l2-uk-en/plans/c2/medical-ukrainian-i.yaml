vocabulary_hints:
  required:
  - діагноз (diagnosis) — встановлювати/диференційний діагноз, помилковий діагноз
  - симптом (symptom) — безсимптомний перебіг, зняти/усунути симптоми; клінічна ознака
  - лікування (treatment) — призначити курс лікування, стаціонарне/амбулаторне лікування
  - анамнез (anamnesis) — збирати анамнез, сімейний/обтяжений анамнез; професійний
    термін
  - лікарський засіб (medication) — державний реєстр лікарських засобів, відпуск за
    рецептом
  - 'біль (pain) — гострий/сильний біль; УВАГА: чоловічий рід (не «сильна біль»)'
  - ускладнення (complication) — запобігання ускладненням, дати ускладнення на серце
  - напад (attack) — серцевий напад; нормативний термін (уникати кальки «приступ»)
  recommended:
  - черевна порожнина (abdominal cavity) — високий регістр, анатомічний термін
  - лікувати (to treat) — стосується пацієнта; не плутати з «лічити» (to count)
  - виписка (discharge summary) — виписка з медичної карти
  - направлення (referral) — направлення до фахівця
  - медпрацівник (healthcare worker) — відмінювана абревіатура за Стандартом
  - водолікування (hydrotherapy) — складний іменник (§4.1.1.1)
