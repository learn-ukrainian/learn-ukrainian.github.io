module: c2-109
level: C2
sequence: 109
version: '1.1'
title: 'Підготовка до сертифікації C2: Стратегії успіху'
subtitle: Підготовка до сертифікації C2
focus: professional
pedagogy: workshop
objectives:
  - Ознайомитися з форматом та вимогами основних міжнародних та національних 
    іспитів з української мови (рівень C2)
  - Опанувати стратегії управління часом та ресурсами під час тестування
  - Відпрацювати виконання типових завдань підвищеної складності (Reading, 
    Listening, Writing, Speaking)
  - Пройти пробне тестування та провести аналіз типових помилок
content_outline:
  - section: Структура сертифікаційних іспитів рівня C2
    words: 1000
    subsections:
      - 'Огляд іспитів: УМІ (Українська як іноземна), Державний сертифікат про володіння
        мовою'
      - Розподіл балів та критерії оцінювання кожного компонента
      - Технічні аспекти складання іспитів (онлайн vs офлайн)
    key_concepts:
      - сертифікація
      - тестовий формат
      - критерії оцінювання
      - компетентнісний підхід
    primary_sources:
      - Постанова Кабінету Міністрів України 'Про затвердження Порядку 
        проведення іспитів на рівень володіння державною мовою'
  - section: Стратегії виконання завдань з читання та аудіювання
    words: 1000
    subsections:
      - Техніки Skimming та Scanning для швидкого пошуку інформації у великих 
        текстах
      - Розпізнавання дистракторів (неправильних варіантів) у тестах закритого 
        типу
      - Тренування вибіркового слухання та розрізнення нюансів значень в 
        аудіотекстах
    key_concepts:
      - дистрактор
      - skimming
      - scanning
      - контекстуальна здогадка
    primary_sources:
      - Приклади тестових завдань з офіційних ресурсів Національної комісії зі 
        стандартів державної мови
  - section: 'Письмо: від есе до офіційного документа'
    words: 1000
    subsections:
      - 'Алгоритм написання твору: планування, чернетка, фінальне редагування'
      - Типові теми та очікувані структури аргументації на рівні C2
      - 'Критерії оцінювання грамотності: де можна припуститися помилки, а де ні'
    key_concepts:
      - планування тексту
      - аргументативна стратегія
      - мовна правильність
      - стилістична єдність
    primary_sources:
      - Методичні рекомендації для екзаменаторів (критерії перевірки письмових 
        робіт)
  - section: 'Говоріння: впевненість та природність'
    words: 1000
    subsections:
      - 'Формат усної співбесіди: діалог з екзаменатором та монолог'
      - Як уникати пауз та правильно використовувати кліше для виграшу часу
      - Демонстрація володіння ідіоматикою та складними граматичними структурами
    key_concepts:
      - співбесіда
      - мовленнєва гнучкість
      - паузи хезитації
      - ідіоматичність
    primary_sources:
      - Відеозаписи зразкових усних відповідей рівня C2
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): Підготовка до ДПА/ЗНО'
  - 'Авраменко, 11 клас (2019): Комплексне тестування'
  - 'Державний стандарт 2024: C2 — сертифікаційні вимоги'
reading_situations:
  - source_type: інструкція для кандидатів
    topic: 'Аналіз правил поведінки під час іспиту: як уникнути анулювання результатів.'
    key_elements:
      - академічна доброчесність
      - апеляція
      - технічний збій
    motivation: Забезпечення психологічного спокою та поінформованості.
  - source_type: фрагмент тесту
    topic: 'Розбір найскладнішого завдання з читання минулих років: логічні пастки.'
    key_elements:
      - логіка
      - синонімічна заміна
      - авторська позиція
    motivation: Навчання критичному підходу до вибору відповідей.
listening_situations:
  - media_type: аудіо
    setting: Прослуховування зразка завдання з аудіювання для підготовки до 
      формату 'true/false/not given'.
    focus_points:
      - Нюанси тверджень
      - Слова-пастки
    motivation: Розвиток уважності до деталей.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть відповідь на офіційний лист (завдання з іспиту), де вам 
      потрібно аргументовано відхилити пропозицію, зберігаючи високу 
      ввічливість.
    requirements:
      - мінімум 250 слів
      - використання офіційно-ділових формул
      - дотримання структури відповіді
    motivation: Тренування виконання типового екзаменаційного завдання.
    model_answer: Текст має демонструвати володіння етикетними нормами та 
      здатність чітко формулювати відмову без агресії.
discussion_topics:
  - context: Чи є оцінка на іспиті об'єктивним показником знання мови?
    questions:
      - Як впоратися з хвилюванням, яке заважає показати реальний рівень?
      - Чи варто готуватися спеціально 'під формат', чи достатньо просто добре 
        знати мову?
    motivation: Психологічне налаштування на іспит.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про структура сертифікаційних іспитів рівня c2 і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про стратегії виконання завдань з читання та аудіювання, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Структура сертифікаційних іспитів рівня C2». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему структура сертифікаційних іспитів рівня c2."
  - type: comparative-study
    focus: "Порівняйте різні підходи до структура сертифікаційних іспитів рівня c2: Огляд іспитів: УМІ (Українська як іноземна), Державний сертифікат про володіння . Визначте спільне та відмінне."
phase: C2.4 [Meta-Skills & Capstone]
