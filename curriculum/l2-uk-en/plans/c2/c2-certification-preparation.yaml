content_outline:
- section: 'Вступ: Рівень C2 та державний стандарт (Introduction: C2 Level and State Standard)'
  words: 750
  points:
  - 'Детальний аналіз вимог Державного стандарту (§4603-4606): що означає «вичерпне ознайомлення зі структурою» та «максимально
    можливий діапазон виражальних засобів»'
  - 'Психологічна установка на рівень C2: перехід від функціональної грамотності до мовної віртуозності та передавання найтонших
    відтінків змісту'
  - Значення сертифікації для академічної та професійної кар'єри в сучасній Україні
- section: Огляд сертифікаційних систем та культурний контекст (Overview of Certification Systems and Cultural Context)
  words: 1000
  points:
  - 'Культурний контекст: обов''язковий іспит на громадянство з 2024 року (Конституція, Історія, Мова) як чинник престижу
    офіційного сертифіката'
  - Роль провідних університетів (КНУ ім. Шевченка, НаУКМА, ЛНУ ім. Франка) та їхніх центрів сертифікації як осередків академічної
    культури
  - 'Порівняння форматів: Національна комісія зі стандартів державної мови vs міжнародні програми оцінювання'
- section: 'Мовна компетенція: Лексичні тонкощі та уникнення помилок (Linguistic Competence: Lexical Nuances and Error Avoidance)'
  words: 1100
  points:
  - 'Типова помилка: лексична інтерференція з англійської та російської — використання «брати екзамен» або «здавати екзамен»
    замість нормативного «складати іспит»'
  - 'Граматичний нюанс: розрізнення «складати іспит» (процес, недоконаний вид) та «скласти іспит» (результат, доконаний вид)
    у контексті сертифікації'
  - 'Проблема регістру: як уникнути розмовних кальок та суржику в офіційно-діловому та академічному письмі під час іспиту'
  - 'Опрацювання частотної термінології: поріг проходження, апеляційна комісія, відповідність критеріям оцінювання'
- section: Стратегії підготовки та структура іспиту (Preparation Strategies and Exam Structure)
  words: 1100
  points:
  - 'Мистецтво написання есе на C2: обов''язковість чіткої тези, аргументації та логічних містків між абзацами згідно з критеріями
    Нацкомісії'
  - 'Техніки аудіювання та читання: швидке виявлення ключових слів та розуміння імпліцитних (прихованих) смислів у складних
    текстах'
  - 'Тайм-менеджмент: похвилинний план розподілу часу для кожного блоку завдань, щоб уникнути поспіху в секції письма'
- section: Процедурні аспекти та фінальна підготовка (Procedural Aspects and Final Preparation)
  words: 1050
  points:
  - 'Технічна реєстрація та документація: робота з електронним кабінетом вступника/кандидата та процедура подання апеляції'
  - 'Фінальний пробний іспит: симуляція реальних умов (обмеження часу, відсутність словників) для виявлення слабких місць'
  - 'Психологічна стійкість: методи подолання стресу перед «high-stakes» тестуванням та стратегії самоконтролю під час усної
    частини'
vocabulary_hints:
  required:
  - сертифікація (certification) — пройти сертифікацію; центр сертифікації; офіційно-діловий реєстр
  - іспит (exam) — складати іспит (процес), скласти іспит (результат); державний іспит
  - поріг (threshold) — поріг проходження, подолати пороговий бал; критичне значення для успіху
  - критерій (criterion) — відповідати критеріям, чіткі критерії оцінювання; висока частотність в інструкціях
  - апеляція (appeal) — подати апеляцію, розгляд апеляції апеляційною комісією; юридичний підтекст
  - концепція (concept) — методологічна база для академічного дискурсу
  - методологія (methodology) — опис стратегій та підходів до виконання завдань
  recommended:
  - складати (to take) — вживання недоконаного виду для позначення тривалої дії (процесу іспиту)
  - скласти (to pass) — вживання доконаного виду для позначення успішного завершення та отримання результату
  - інтерпретація (interpretation) — здатність пояснювати складні смисли в текстах рівня C2
  - контекстуалізація (contextualization) — вміння пов'язувати мовні явища з соціокультурним контекстом України
  - синтез (synthesis) — поєднання розрізнених аргументів у цілісну структуру есе
