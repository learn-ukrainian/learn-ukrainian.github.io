objectives:
- Аналізувати та класифікувати явища Огляд сертифікаційних систем та культурний контекст у автентичних текстах
- Продукувати тексти з коректним застосуванням Лексичні тонкощі та уникнення помилок
- Оцінювати стилістичну доречність мовних засобів у контексті Підготовка до сертифікації C2
- 'Застосовувати знання з теми «Мовна компетенція: Лексичні тонкощі та уникнення помилок» у власній мовній практиці'
