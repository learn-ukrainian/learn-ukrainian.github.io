content_outline:
- section: 'Вступ: Мовна археологія (Introduction: Linguistic Archaeology)'
  words: 500
  points:
  - 'Дефініція та класифікація застарілої лексики: розрізнення архаїзмів (перст) та
    історизмів (смерд) на основі зникнення явища чи лише слова.'
  - 'Джерела формування архаїчного шару: церковнослов’янізми, давньоукраїнська книжна
    лексика та діалектні релікти, що зберігають давню структуру.'
  - 'Функціональне навантаження архаїзмів у сучасному дискурсі: від створення урочистості
    та поетичної піднесеності до засобів іронії та пародіювання.'
- section: 'Архаїчна морфологія: Іменник та двоїна (Archaic Morphology: Noun and Dual
    Number)'
  words: 900
  points:
  - 'Релікти двоїни (dual number) в сучасній українській мові: аналіз відмінювання
    слів ''очі'', ''плечі'', ''вуха'' та вживання архаїчних форм ''дві руці'' у високому
    стилі.'
  - 'Поетичний кличний відмінок згідно з §4.1.2.7 Держстандарту: використання ''акцентованого
    адресата'' для посилення емоційності звертання (напр., ''Зоре моя!'', ''Дунаю'').'
  - Варіантні та рідкісні відмінкові закінчення іменників, характерні для класичної
    літератури XVIII–XIX століть.
- section: 'Дієслівні релікти: Давноминулий час (Verbal Relics: Pluperfect)'
  words: 1000
  points:
  - 'Давноминулий час (pluperfect) як засіб позначення дистанційованого минулого:
    морфологічна структура ''ходив був'', ''казала була'' та її стилістична роль.'
  - 'Аналіз типових помилок: коригування неправильного порядку слів (уникнення форми
    ''був ходив'') та відпрацювання нормативного вживання.'
  - 'Traces of aorist and imperfect: ідентифікація залишків праслов’янських часових
    форм у сучасних церковних текстах та історичній прозі.'
- section: Займенникові та прикметникові архаїзми (Pronominal and Adjectival Archaisms)
  words: 750
  points:
  - 'Парадигма займенників ''сей, ся, се'' згідно з §4.1.1.4 Держстандарту: порівняння
    з нейтральним ''цей'' та контексти збереження в діалектах і поезії.'
  - 'Тріада ''сей, той, оний'': семантичні нюанси просторової та часової віддаленості
    в текстах барокової літератури та офіційних урочистих актах.'
  - Короткі та стягнені форми прикметників (рад, ладен, повен, золота) як засіб поетичної
    економії та фольклорної стилізації.
- section: 'Культурний контекст: Від Євангелія до Котляревського (Cultural Context:
    From the Gospel to Kotlyarevsky)'
  words: 1000
  points:
  - 'Пересопницьке Євангеліє (1561) як лінгвістичний та державний символ: аналіз переходу
    від книжної до живої мови та роль пам’ятки у сучасній інавгурації.'
  - 'Стилістична революція І. Котляревського в ''Енеїді'': використання бурлеску як
    реакції на засилля ''високих'' архаїчних форм XVIII століття.'
  - 'Церковнослов’янізми (град, глас, древо) як маркери високого штилю: від сакрального
    змісту до фразеологізмів (''глас вопіющого в пустелі'').'
- section: Стилістичний практикум та аналіз помилок (Stylistic Workshop and Error
    Analysis)
  words: 850
  points:
  - 'Виправлення ''стилістичної недоречності'': ідентифікація та заміна архаїзмів,
    що створюють дисонанс у нейтральному офіційному або бізнес-мовленні.'
  - 'Коментоване читання фрагментів творів Т. Шевченка та І. Франка: розкодування
    архаїчних маркерів та інтерпретація їхнього emotive impact.'
  - 'Вправи на трансформацію: переклад фрагментів староукраїнських текстів на сучасну
    літературну норму із збереженням регістру.'
