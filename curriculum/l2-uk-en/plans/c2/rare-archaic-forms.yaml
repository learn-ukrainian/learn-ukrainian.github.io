vocabulary_hints:
  required:
  - 'сей, ся, се (this) — архаїчні вказівні займенники (§4.1.1.4); collocations: ''сей
    світ'', ''від сього дня'', ''по сей день'''
  - 'давноминулий час (pluperfect) — рідкісна дієслівна форма (''ходив був''); позначає
    дію, що передувала іншій минулій дії; порядок слів: V + був'
  - двоїна (dual number) — граматична категорія числа для означення пари; залишки
    у формах 'очі', 'плечі', 'вуха', 'дві руці'
  - глас (voice) — церковнослов’янізм урочистого стилю; часто у значенні публічного
    волевиявлення ('глас народу')
  - град (city) — поетичний архаїзм; вживається в книжних контекстах ('стольний град',
    'град Божий')
  recommended:
  - 'архаїзм (archaism) — слово, витіснене сучасним синонімом; приклад: ''перст''
    (палець), ''уста'' (губи)'
  - 'історизм (historicism) — слово, що зникло разом із предметом; приклад: ''смерд''
    (вільний селянин у Русі), ''жупан'''
  - Пересопницьке Євангеліє (Peresopnytsia Gospels) — символ живої староукраїнської
    мови; використовується для присяги президентів
  - стягнена форма (contracted form) — особливість прикметників у поетичній та фольклорній
    традиції
  - стилістичний дисонанс (stylistic dissonance) — помилка використання архаїзмів
    у недоречному нейтральному контексті
