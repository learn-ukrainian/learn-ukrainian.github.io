module: rare-archaic-forms
level: C2
sequence: 81
version: '1.2'
title: Рідкісні та архаїчні форми
subtitle: Рідкісні та архаїчні форми
focus: grammar
pedagogy: seminar
objectives:
  - Проаналізувати відмінності між архаїзмами та історизмами в контексті 
    розвитку української мови
  - Дослідити морфологічні архаїзми, зокрема залишкові форми двоїни та давні 
    відмінкові закінчення
  - Вивчити функціонування архаїчної лексики в релігійному, художньому та 
    офіційно-діловому стилях
  - Навчитися використовувати архаїзовані конструкції для створення специфічного
    стилістичного ефекту
content_outline:
  - section: Генеза та класифікація застарілої лексики
    words: 1250
    subsections:
      - Історизми як відображення минулих реалій суспільного життя
      - 'Лексичні архаїзми: заміна назв при збереженні понять'
      - 'Семантичні архаїзми: еволюція значень відомих слів'
    key_concepts:
      - історизм
      - власне архаїзм
      - пасильний словниковий запас
      - архаїзація
    primary_sources:
      - Іван Котляревський, «Енеїда» (аналіз бурлескного використання архаїзмів)
  - section: Морфологічні та синтаксичні релікти
    words: 1250
    subsections:
      - Сліди двоїни в сучасній мовній системі та художньому тексті
      - 'Давні форми дієслівних часів: плюсквамперфект (давноминулий час)'
      - Архаїчні відмінкові флексії та їхня роль у поетичній мові
    key_concepts:
      - двоїна
      - плюсквамперфект
      - флексія
      - морфологічний релікт
    primary_sources:
      - Слово о полку Ігоревім (уривки в оригіналі для аналізу граматичних форм)
  - section: Функціонування архаїзмів у стилях мовлення
    words: 1250
    subsections:
      - 'Сакральна мова: архаїзми в літургійних текстах та молитвах'
      - 'Офіційно-діловий стиль: традиційні формули та канцеляризми минулих епох'
      - 'Художня література: створення історичного колориту та патетики'
    key_concepts:
      - сакралізація
      - високий стиль
      - історичний колорит
      - стилізація
    primary_sources:
      - Пантелеймон Куліш, «Чорна рада» (історична стилізація)
  - section: Практика використання та ревіталізації форм
    words: 1250
    subsections:
      - Ревіталізація архаїзмів у сучасному публіцистичному дискурсі
      - 'Переклад текстів минулих епох: вибір стратегії архаїзації чи модернізації'
      - Естетична роль рідкісних форм у сучасному мовленні
    key_concepts:
      - ревіталізація
      - стратегія перекладу
      - естетична функція
      - мовна виразність
    primary_sources:
      - Василь Стус, поетичні збірки (індивідуально-авторська робота з архаїчним
        пластом)
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
  - 'Авраменко, 11 клас (2019): Діалекти, варіантність'
  - 'Державний стандарт 2024: C2 — лінгвістична компетенція'
reading_situations:
  - source_type: художній твір
    topic: 'Аналіз мовних засобів у «Енеїді» Івана Котляревського: поєднання низького
      стилю з архаїчними формами.'
    key_elements:
      - архаїзми
      - вульгаризми
      - стилістичний контраст
    motivation: Розуміння механізмів формування нової української літературної 
      мови через деконструкцію архаїчного канону.
  - source_type: історичний документ / маніфест
    topic: 'Мова козацьких літописів Самійла Величка: барокова складність та архаїчна
      морфологія.'
    key_elements:
      - бароковий стиль
      - складні речення
      - слов'янізми
    motivation: Вивчення офіційної та літописної мови Гетьманщини як джерела 
      рідкісних форм.
listening_situations:
  - media_type: лекція
    setting: Уривок лекції професора мовознавства про втрачені граматичні 
      категорії української мови (двоїна, аорист).
    focus_points:
      - Причини зникнення форм
      - Залишки в діалектах та поезії
    motivation: Розвиток здатності сприймати складний науковий дискурс про 
      історію мови.
writing_tasks:
  - task_type: есе
    prompt: Напишіть аналітичне есе на тему «Чи є майбутнє у архаїзмів? Роль 
      застарілої лексики у формуванні сучасного культурного коду українця».
    requirements:
      - мінімум 600 слів
      - аргументація з прикладами з літератури
      - 'використання термінів: ревіталізація, мовна пам''ять'
    motivation: Стимулювання критичного мислення щодо динаміки мовного розвитку.
    model_answer: Есе має містити роздуми про те, як архаїзми допомагають 
      відновити зв'язок з минулим, наводити приклади з творчості сучасних поетів
      та оцінювати доречність використання таких форм у різних контекстах.
discussion_topics:
  - context: Суперечка про доречність повернення певних архаїчних норм у 
      сучасний правопис (наприклад, проєкт, етер).
    questions:
      - Чи сприяє повернення архаїчних форм деколонізації мови?
      - Де проходить межа між природним розвитком і штучним архаїзуванням?
    motivation: Обговорення актуальних питань мовної політики та стилістики.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати бурлескне використання архаїзмів у ''Енеїді'' Котляревського:
      стилістичний контраст'
  - type: reading
    focus: Ідентифікувати діалектні та архаїчні форми у козацьких літописах 
      Самійла Величка
  - type: essay-response
    focus: Написати лінгвістичний аналіз ролі архаїзмів у формуванні сучасного 
      культурного коду
  - type: match-up
    focus: 'Зіставити архаїчні форми з їхніми сучасними відповідниками: двоїна, аорист,
      давні флексії'
  - type: error-correction
    focus: Виправити неправильне використання архаїзмів у сучасному тексті
phase: C2.4 [Meta-Skills & Capstone]
