content_outline:
- section: 'Вступ: Шлях до експертизи (Introduction: Path to Expertise)'
  words: 750
  points:
  - Філософський концепт Григорія Сковороди про «сродну працю» як фундаментальне підґрунтя для досягнення справжньої майстерності
    та експертизи.
  - Етапи розвитку фахової компетентності згідно з Національною рамкою кваліфікацій України (§3.12) та принципами андрагогіки
    (навчання дорослих).
- section: Стратегії опанування галузі (Domain Mastery Strategies)
  words: 1000
  points:
  - Методологія побудови ландшафту знань (landscape mapping) та ідентифікація ключових джерел та авторитетів у суміжних галузях.
  - 'Корекція лексичних кальок: розбір помилки «взяти курс» (take a course) та впровадження правильних конструкцій «пройти
    курс» або «записатися на курс».'
- section: Ресурси та EdTech-ландшафт (Resources and EdTech Landscape)
  words: 1000
  points:
  - 'Аналіз українського EdTech-буму: можливості платформ Prometheus, EdEra та Projector для безперервної самоосвіти та професійного
    зростання.'
  - 'Мовна точність у професійному дискурсі: розрізнення понять «освіта» (як результат/система) та «навчання» (як безперервний
    процес) згідно з §3.13.'
- section: Практика та наставництво (Practice and Mentorship)
  words: 1000
  points:
  - 'Інститут наставництва (mentorship) в Україні: роль менторської підтримки та рефлексивної практики у розвитку фахових
    знань.'
  - 'Семантичний аналіз терміна «експертиза»: розрізнення бізнес-значення (expertise) та вузькоспеціалізованого поняття «судова
    експертиза».'
- section: Розвиток експертизи та репутація (Expertise Development and Reputation)
  words: 750
  points:
  - Концепція Life-long learning (навчання впродовж життя) як сучасна норма професіоналізму на українському та міжнародному
    ринках послуг.
  - Стратегії формування професійної репутації через публікації, участь у конференціях та побудову нішевої експертизи.
- section: Практичні вправи (Practical Exercises)
  words: 500
  points:
  - Розробка індивідуального плану опанування галузі, що базується на принципі «сродної праці» та інтеграції з попереднім
    досвідом.
  - Критичний аналіз ресурсів для самоосвіти та створення портфоліо компетентностей відповідно до державних кваліфікаційних
    стандартів.
vocabulary_hints:
  required:
  - експертиза (expertise) — будувати експертизу, глибока експертиза; уникати плутанини з юридичним терміном
  - компетентність (competency) — фахова компетентність, набувати компетентності; частотний термін професійних стандартів
  - галузь (field/domain) — суміжна галузь, опанувати галузь; ключовий термін для мапування професійного ландшафту
  - самоосвіта (self-education) — займатися самоосвітою, інструменти самоосвіти; база для професійного розвитку
  - концепція (concept) — концепція «сродної праці»; філософський та науковий контексти
  - методологія (methodology) — методологія навчання дорослих; високий академічний регістр
  recommended:
  - наставництво (mentorship) — інститут наставництва, менторська підтримка; середньочастотний термін у бізнес-середовищі
  - «сродна праця» (vocation/congenial labor) — праця за покликанням (Г. Сковорода); важливий культурний та філософський якір
  - андрагогіка (andragogy) — навчання дорослих; професійний термін у сфері освіти
  - контекстуалізація (contextualization) — надання контексту фаховим знанням; аналітичний інструмент С2
