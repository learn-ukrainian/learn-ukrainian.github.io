module: c2-058
level: C2
sequence: 58
version: 1.2.2
title: Формування фахової експертності через поглиблене володіння мовою
subtitle: Експертиза через мовну майстерність
focus: professional
pedagogy: seminar
objectives:
- Усвідомити роль мови як ключового інструменту формування та трансляції 
  професійної експертності
- Навчитися створювати інтелектуальний контент (статті, блоги, експертні 
  коментарі), що підсилює професійний авторитет
- Опанувати стратегії мовної самопрезентації у висококонкурентному фаховому 
  середовищі
- Розвинути здатність до концептуалізації власного досвіду через точні мовні 
  форми
content_outline:
- section: 'Мовна особистість професіонала: від компетенції до експертності'
  words: 1250
  subsections:
  - 'Структура мовної особистості фахівця: тезаурус, прагматикон та когнітивні карти'
  - 'Стиль як маркер експертності: поєднання впевненості, точності та інтелектуальної
    чесності'
  - Формування персонального бренду через мовну автентичність та вишуканість
  key_concepts:
  - мовна особистість
  - експертність
  - прагматикон
  - персональний бренд
  primary_sources:
  - Іван Огієнко, 'Наука про рідну мову' (аналіз поглядів на роль мови у 
    професійному та духовному становленні)
- section: Створення та просування експертного контенту
  words: 1250
  subsections:
  - 'Жанри експертного вислову: аналітичний огляд, колонка в медіа, фаховий блог'
  - Адаптація складних професійних смислів для різних цільових аудиторій (від 
    колег до широкого загалу)
  - Використання сторітелінгу та метафоризації для підсилення експертної позиції
  key_concepts:
  - інтелектуальний продукт
  - авторська колонка
  - цільова аудиторія
  - лідер думок
- section: Мовна етика та відповідальність експерта
  words: 1250
  subsections:
  - Чесність у вираженні припущень та визнанні меж власної компетентності
  - 'Культура дискусії та критики у фаховій спільноті: збереження репутації'
  - Протидія поширенню фейків та некомпетентних суджень у професійній сфері
  key_concepts:
  - професійна етика
  - репутаційний капітал
  - верифікація
  - критичний відгук
  primary_sources:
  - Микола Костомаров, 'Автобіографія' (аналіз становлення вченого як лідера 
    думок)
- section: Концептуалізація досвіду та стратегічне мовлення
  words: 1250
  subsections:
  - Перетворення практичного досвіду на теоретичні концепції та моделі через 
    мову
  - Мова стратегічного планування та візіонерства у професійній діяльності
  - Постійний розвиток професійної мови як засіб запобігання фаховому вигоранню
  key_concepts:
  - концептуалізація
  - візіонерство
  - стратегічний дискурс
  - мовна рефлексія
- section: Підсумок — Summary
  words: 300
  points:
  - 'Professional language shapes your expert identity and personal brand (персональний
    бренд) through your unique pragmaticon (прагматикон). Self-check: What is the
    difference between simply knowing a subject and expressing it as a лідер думок?
    Describe 3 genres of expert content you could create in your field.'
  - 'Expertise requires strict language ethics (професійна етика) and the ability
    to conceptualize experience (концептуалізація) into strategic discourse. Self-check:
    How do you build reputation capital (репутаційний капітал) during a professional
    disagreement? Pitch a strategic vision for your career using professional terminology.'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Публіцистичний стиль мовлення'
- 'Авраменко, 11 клас (2019): Мовна особистість та культура мовлення'
- 'Державний стандарт 2024: C2 — професійна комунікативна компетенція'
reading_situations:
- source_type: Теоретична праця
  topic: Аналіз поглядів Івана Огієнка на зв'язок мови та фахової культури. 
    Дослідження концепту 'мовної обов'язковості'.
  key_elements:
  - мовна норма
  - професійна гідність
  - культурна ідентичність
  motivation: Розуміння філософського підґрунтя української професійної 
    культури.
- source_type: Мемуаристика
  topic: Аналіз автобіографічних текстів Миколи Костомарова. Вивчення способів 
    опису наукового шляху та формування авторитету.
  key_elements:
  - самопрезентація
  - інтелектуальне середовище
  - відданість справі
  motivation: Дослідження історичних прикладів розбудови професійної 
    експертності.
listening_situations:
- media_type: інтерв'ю
  setting: Бесіда з успішним українським фахівцем (наприклад, архітектором чи 
    лікарем), який активно веде професійний блог.
  focus_points:
  - Поєднання професійного жаргону та доступної мови
  - Як мова допомагає завойовувати довіру аудиторії
  motivation: Аналіз сучасних стратегій розбудови експертності через медіа.
writing_tasks:
- task_type: відгук
  prompt: Напишіть програмну статтю (колонку) для профільного видання на тему 
    'Чому професіонал у моїй галузі повинен володіти українською мовою на рівні 
    C2'. Обґрунтуйте свою позицію трьома вагомими аргументами.
  requirements:
  - мінімум 700 слів
  - публіцистичний стиль з елементами наукового
  - високий рівень переконуваності
  motivation: Перевірка здатності до концептуалізації професійної значимості 
    мови.
  model_answer: Текст має бути натхненним, але логічним та аргументованим. Автор
    повинен показати, як саме мова стає інструментом підвищення якості фахової 
    діяльності.
discussion_topics:
- context: Чи може людина бути висококласним фахівцем, не володіючи мовою на 
    високому рівні?
  questions:
  - Які ризики несе низький рівень мовної компетенції для професійної репутації?
  - Як виміряти вплив 'мовного капіталу' на фінансовий успіх фахівця в Україні?
  motivation: Обговорення прагматичних аспектів володіння мовою у професійній 
    сфері.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про мовна особистість професіонала: від компетенції до
    експертності і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про створення та просування 
    експертного контенту, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Мовна особистість
    професіонала: від компетенції до експертності». Обґрунтуйте свою позицію прикладами
    з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему мовна
    особистість професіонала: від компетенції до експертності.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до мовна особистість професіонала: від компетенції
    до експертності: Структура мовної особистості фахівця: тезаурус, прагматикон та
    когнітивні карти. Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
