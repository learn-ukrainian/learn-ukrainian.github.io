content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - Повторення базових концепцій та перехід до створення 'вторинних текстів' згідно
    зі стандартом §4.3.8 (реферати, повідомлення, довідкові тексти)
  - Розмежування художнього запозичення (оммаж, пастиш) та плагіату — важливість маркування
    'чужого' слова як художнього прийому
  - Інтертекстуальність як механізм творення смислу, а не просто декоративний елемент
    постмодерного письма
- section: Транстекстуальність за Женеттом (Transtextuality by Genette)
  words: 700
  points:
  - 'П''ять типів транстекстуальності за Ж. Женеттом: паратекстуальність, метатекстуальність,
    інтертекстуальність, гіпертекстуальність та архітекстуальність'
  - 'Гіпертекстуальність детально: трансформація претексту через пародію, травестію
    та пастиш'
  - 'Помилка ігнорування архітекстуальності: зв''язок твору з жанровою пам''яттю та
    очікуваннями читача'
- section: Український постмодернізм та Бу-Ба-Бу (Ukrainian Postmodernism and Bu-Ba-Bu)
  words: 900
  points:
  - Карнавалізація традиції та гра з каноном у творчості угруповання Бу-Ба-Бу (Ю.
    Андрухович, О. Ірванець, В. Неборак)
  - 'Аналіз інтертекстуальних шарів у творах ''Московіада'' та ''Рекреації'' Юрія
    Андруховича: алюзії на Котляревського, Біблію та європейську класику'
  - 'Перифраз (§4.3.3) як засіб інтертекстуальної ідентифікації: від класичних формул
    (''автор Заповіту'') до іронічних постмодерних конструкцій'
- section: Автоінтертекстуальність та сучасна проза (Auto-intertextuality and Contemporary
    Prose)
  words: 600
  points:
  - 'Автоінтертекстуальність як інструмент побудови авторського міфу: самоцитування,
    автопародія та внутрішній діалог у творчому доробку'
  - 'Сучасні інтертекстуальні коди: рок-культура у Сергія Жадана та гра з масовими
    жанрами у Люко Дашвар'
  - 'Метатекстуальність: роль критичного коментаря та саморефлексії всередині художнього
    наративу'
- section: Інтермедіальність та екфразис (Intermediality and Ekphrasis)
  words: 600
  points:
  - 'Інтермедіальність: діалог літератури з музикою та візуальним мистецтвом як розширення
    концепції інтертексту'
  - 'Помилка вузького розуміння екфразису: розширення від опису живопису до урбаністичних
    об''єктів та музичних творів у прозі'
  - 'Практикум: аналіз функцій інтертекстуальних посилань у вибраних уривках сучасної
    прози'
- section: Підсумок (Summary)
  words: 300
  points:
  - 'Інтертекстуальність як інструмент деколонізації: переосмислення імперських наративів
    через іронічне цитування та зміну контексту'
  - Синтез навичок для створення складних вторинних текстів та проведення професійного
    літературознавчого аналізу
