vocabulary_hints:
  required:
  - транстекстуальність (transtextuality) — теорія транстекстуальності, види транстекстуальності;
    низька частотність, академічний реєстр
  - гіпертекстуальність (hypertextuality) — гіпертекстуальний зв'язок, пародія як
    гіпертекст; середня частотність, термін для трансформацій
  - метатекстуальність (metatextuality) — метатекстуальний коментар, критична метатекстуальність;
    низька частотність, акцент на аналізі коментарів
  - архітекстуальність (architextuality) — жанрова архітекстуальність, архітекст твору;
    низька частотність, зв'язок із жанровими очікуваннями
  - автоінтертекстуальність (auto-intertextuality) — авторський міф, автоцитування,
    внутрішній діалог; низька частотність, посилання на власні твори
  - інтермедіальність (intermediality) — музична інтермедіальність, візуальний код;
    середня частотність, культурний контекст
  - екфразис (ekphrasis) — урбаністичний екфразис, живописний екфразис; низька частотність,
    літературний опис візуального
  - претекст (pretext/source text) — звернення до претексту, європейські претексти;
    ключове поняття для аналізу джерел
  - постмодернізм (postmodernism) — український постмодернізм, естетика постмодернізму;
    загальнокультурний термін
  - гра (play/game) — інтертекстуальна гра, гра з читачем; центральний концепт постмодерної
    методології
  recommended:
  - паратекстуальність (paratextuality) — роль паратексту, заголовок як паратекст;
    елемент женеттівської схеми
  - палімпсест (palimpsest) — текст-палімпсест, структура палімпсеста; метафора багатошаровості
    тексту
  - пастиш (pastiche) — художній пастиш, стилістичний пастиш; свідомий оммаж на відміну
    від плагіату
  - колаж (collage) — літературний колаж, техніка колажу; метод поєднання фрагментів
    різних текстів
  - децентрація (decentering) — децентрація суб'єкта; філософське підґрунтя постмодерної
    гри
  - концепція (concept) — концепція інтертекстуальності; академічна рамка аналізу
  - контекстуалізація (contextualization) — контекстуалізація алюзій; процес вписування
    знаків у новий контекст
  - синтез (synthesis) — аналітичний синтез; поєднання результатів розбору інтертексту
