module: c2-099
level: C2
sequence: 99
version: '1.2'
title: 'Вибір теми дипломного проєкту: Від ідеї до концепції'
subtitle: 'Вибір теми проєкту'
focus: professional
pedagogy: seminar
objectives:
  - Визначити критерії актуальності та наукової новизни теми для дипломного 
    проєкту
  - Провести попередній огляд літератури та джерельної бази за обраним напрямком
  - Сформулювати мету, об'єкт, предмет та гіпотезу дослідження
  - Підготувати та презентувати обґрунтування (проєктну пропозицію) теми
content_outline:
  - section: Методологія вибору теми дослідження
    words: 1250
    subsections:
      - Аналіз власних наукових інтересів та професійного досвіду
      - Актуальність теми у контексті сучасної україністики та глобальних 
        трендів
      - Обмеження та реалістичність виконання проєкту в межах курсу
    key_concepts:
      - актуальність
      - наукова новизна
      - теоретична значущість
      - практична цінність
    primary_sources:
      - Методичні рекомендації МОН України щодо підготовки магістерських робіт 
        (фрагменти)
  - section: Робота з джерелами та огляд літератури
    words: 1250
    subsections:
      - Пошук релевантних академічних баз даних та архівів
      - 'Критичний аналіз попередніх досліджень: виявлення ''білих плям'''
      - Бібліографічний опис та правила цитування (ДСТУ 8302:2015)
    key_concepts:
      - історіографія
      - джерельна база
      - критичний огляд
      - академічна доброчесність
    primary_sources:
      - 'ДСТУ 8302:2015: Бібліографічне посилання (основні положення)'
  - section: Формулювання наукового апарату
    words: 1250
    subsections:
      - 'Чітке окреслення об''єкта та предмета дослідження: у чому різниця?'
      - Постановка дослідницьких питань та формування робочої гіпотези
      - 'Вибір методів дослідження: описовий, порівняльний, кількісний, якісний'
    key_concepts:
      - об'єкт дослідження
      - предмет дослідження
      - гіпотеза
      - методологія
    primary_sources:
      - 'Олександер Пономарів: ''Культура слова'' (розділи про науковий стиль)'
  - section: Написання та захист концепції
    words: 1250
    subsections:
      - 'Структура проєктної пропозиції: від анотації до плану виконання'
      - 'Мистецтво аргументації: як переконати комісію у важливості проєкту'
      - Отримання та обробка зворотного зв'язку від наукового керівника
    key_concepts:
      - проєктна пропозиція
      - анотація (abstract)
      - терміни виконання (timeline)
      - апробація результатів
    primary_sources:
      - Зразки успішних заявок на гранти та наукові проєкти в Україні
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): Науковий стиль мовлення'
  - 'Авраменко, 11 клас (2019): Академічне письмо'
  - 'Державний стандарт 2024: C2 — дослідницька компетенція'
reading_situations:
  - source_type: наукова анотація
    topic: 'Аналіз структури анотації до дисертаційного дослідження: логіка викладу
      та ключові слова.'
    key_elements:
      - мета
      - методи
      - висновки
    motivation: Навчання лаконічному та змістовному представленню власної 
      роботи.
  - source_type: етичний кодекс
    topic: 'Декларація про академічну доброчесність: чому плагіат є неприпустимим
      на рівні C2.'
    key_elements:
      - авторське право
      - самоплагіат
      - цитування
    motivation: Формування високої академічної культури.
listening_situations:
  - media_type: подкаст
    setting: 'Інтерв''ю з відомим науковцем: ''Як я шукаю теми для своїх досліджень
      та чому це важливо''.'
    focus_points:
      - Інтуїція vs розрахунок
      - Поради початківцям щодо звуження теми
    motivation: Натхнення та практичні поради від професіонала.
writing_tasks:
  - task_type: есе
    prompt: Напишіть обґрунтування теми вашого проєкту (Proposal). Вкажіть 
      актуальність, об'єкт, предмет та очікувані результати.
    requirements:
      - мінімум 500 слів
      - використання наукового стилю
      - список з 5 ключових джерел
    motivation: Практична підготовка до основного етапу роботи над дипломом.
    model_answer: Текст має бути логічно структурованим, аргументованим та 
      містити чітко сформульовані дослідницькі питання.
discussion_topics:
  - context: Чи може тема бути 'надто вузькою' або 'надто широкою'?
    questions:
      - Які ризики несе вибір занадто масштабної теми?
      - Як знайти золоту середину між індивідуальним інтересом та суспільною 
        потребою?
    motivation: Колективний розбір тем та їх корекція на початковому етапі.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про методологія вибору теми дослідження і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про робота з джерелами та огляд літератури, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Методологія вибору теми дослідження». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему методологія вибору теми дослідження."
  - type: comparative-study
    focus: "Порівняйте різні підходи до методологія вибору теми дослідження: Аналіз власних наукових інтересів та професійного досвіду. Визначте спільне та відмінне."
phase: C2.4 [Meta-Skills & Capstone]
