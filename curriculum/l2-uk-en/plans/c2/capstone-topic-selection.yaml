module: c2-080
level: C2
sequence: 80
slug: capstone-topic-selection
version: '2.0'
title: Дипломний проєкт — Вибір теми
focus: practice
pedagogy: TTT
phase: C2.4 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Аналізувати ключові поняття та явища модуля на рівні глибокого розуміння
- Продукувати тексти академічного та професійного рівня за тематикою модуля
- Демонструвати вільне володіння спеціалізованою лексикою та термінологією
- 'Застосовувати знання з теми «Об''єкт vs Предмет: Уникнення типових помилок» у власній мовній практиці'
sources:
- name: Методичні рекомендації до написання магістерських робіт
  url: https://mon.gov.ua/
  type: reference
  notes: Guidelines for academic thesis writing in Ukraine
- name: CEFR C2 Portfolio Requirements
  url: https://www.coe.int/en/web/common-european-framework-reference-languages
  type: reference
  notes: C2 level assessment through portfolio
- name: Academic Writing in Ukrainian — Best Practices
  url: https://naqa.gov.ua/
  type: secondary
  notes: Quality standards for academic writing
content_outline:
- section: Вступ (Introduction) — Дипломний проєкт як вершина навчання
  words: 650
  points:
  - 'Значення проєкту в контексті Державного стандарту (§4.3.6) та CEFR C2: перехід від загального володіння мовою до створення
    професійно орієнтованих наукових текстів'
  - 'Типологія робіт: розмежування магістерської роботи (теоретичне дослідження) та дипломного проєкту (практичне або творче
    рішення у конкретній галузі)'
- section: Вибір типу проєкту та наукового керівника (Choosing the Project Type and Scientific Supervisor)
  words: 850
  points:
  - 'Культурний аспект: роль наукового керівника (mentorship) як ключової фігури в українській академічній традиції та ієрархія
    наукових шкіл'
  - 'Самооцінка схильностей: вибір стратегії між дослідницькою роботою (10,000+ слів), перекладацьким проєктом або літературною
    творчістю'
  - Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів
- section: Формулювання теми та "ритуал" академічного вступу (Formulating the Topic and the "Ritual" of Academic Introduction)
  words: 1000
  points:
  - 'Культурна специфіка та формальна жорсткість: опанування послідовності вступних формул (Актуальність → Мета → Завдання
    → Об''єкт → Предмет → Методи)'
  - Критерії наукової новизни та актуальності теми; техніка звуження широкої предметної області до конкретного та вимірюваного
    дослідницького питання
  - Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів
- section: 'Об''єкт vs Предмет: Уникнення типових помилок (Object vs Subject: Avoiding Common Learner Errors)'
  words: 850
  points:
  - 'Корекція помилок: концептуальне розмежування Об''єкта (процес або сфера реальності загалом) та Предмета (конкретний аспект,
    що безпосередньо вивчається)'
  - 'Вправи на дефініцію предмета дослідження: від загального «лісу» (об''єкт) до конкретного «виду дерев» (предмет) для забезпечення
    глибини аналізу'
- section: Академічний стиль та огляд літератури (Academic Style and Literature Review)
  words: 850
  points:
  - 'Граматична корекція: перехід від використання першої особи («Я дослідив») до безособових та пасивних конструкцій («У
    роботі досліджено», «Автором проаналізовано»)'
  - Пошук та критична оцінка джерел українською мовою; ідентифікація дослідницьких прогалин (research gaps) та позиціонування
    власної роботи у дискурсі
- section: Практика — Обґрунтування теми та планування (Practice — Topic Justification and Planning)
  words: 800
  points:
  - Написання proposal (обґрунтування) як переконливого вторинного тексту; використання результативних дієслів доконаного
    виду (встановити, розробити) замість процесних
  - Розробка календарного плану та стратегія апробації результатів; підготовка до презентації теми для отримання зворотного
    зв'язку від фахівців
vocabulary_hints:
  required:
  - 'дипломний проєкт (capstone project) — висока частотність; collocations: захист проєкту, керівник проєкту, тема проєкту'
  - 'об''єкт дослідження (object of research) — широка сфера реальності; часто плутають із предметом; реєстр: науковий'
  - предмет дослідження (subject of research) — конкретний аспект об'єкта; вимагає чіткого звуження для академічної точності
  - 'актуальність (relevance/timeliness) — обов''язковий елемент вступу; collocations: обґрунтування актуальності, втрата
    актуальності'
  - 'наукова новизна (scientific novelty) — вимога до оригінальності; collocations: претендувати на новизну, елементи новизни'
  - апробація (approbation/testing) — представлення результатів на конференціях; обов'язковий етап перед захистом
  - методологія (methodology) — сукупність методів дослідження; висока частотність у розділі вступу
  - 'гіпотеза (hypothesis) — наукове припущення; collocations: висунути гіпотезу, підтвердити або спростувати гіпотезу'
  recommended:
  - науковий керівник (scientific supervisor) — роль ментора; відображає ієрархічність та спадкоємність наукових шкіл
  - магістерська робота (master's thesis) — науково-дослідний тип дипломного проєкту
  - вторинний текст (secondary text) — термін Державного стандарту для рефератів, анотацій та обґрунтувань тем
  - науковий стиль (scientific style) — вимагає використання безособових конструкцій та спеціальної термінології
  - джерельна база (source base) — сукупність матеріалів та досліджень, на які спирається автор
  - контекстуалізація (contextualization) — вміщення теми у ширший науковий або суспільний контекст
vocabulary:
  required:
  - дипломний проєкт (capstone project)
  - дослідницька робота (research paper)
  - дослідницьке питання (research question)
  - огляд літератури (literature review)
  - актуальність (relevance/timeliness)
  - оригінальність (originality)
  - методологія (methodology)
  - гіпотеза (hypothesis)
  - proposal (project proposal)
  - календарний план (timeline)
  recommended:
  - звуження теми (narrowing down)
  - прогалина в дослідженнях (research gap)
  - теоретична рамка (theoretical framework)
  - практична значущість (practical significance)
  - джерельна база (source base)
