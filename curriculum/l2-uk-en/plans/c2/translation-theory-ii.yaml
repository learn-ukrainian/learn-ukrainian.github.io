vocabulary_hints:
  required:
  - 'перекладознавство (translation studies) — Academic frequency; collocations: вітчизняне
    перекладознавство, методи перекладознавства'
  - 'еквівалентність (equivalence) — High frequency; collocations: динамічна еквівалентність,
    рівні еквівалентності, повна/часткова еквівалентність'
  - 'адекватність (adequacy) — Focus on quality criteria; collocations: адекватність
    перекладу, стилістична адекватність'
  - 'одомашнення (domestication) — Specialized term (Venuti); collocation: стратегія
    одомашнення, культурне одомашнення'
  - 'очуження (foreignization) — Specialized term (Venuti); collocation: ефект очуження,
    стратегія очуження'
  - 'трансформація (transformation) — General/Academic; collocations: перекладацька
    трансформація, граматична трансформація'
  - конкретизація (specification) — Translation technique; narrowing of meaning from
    SL to TL
  - генералізація (generalization) — Translation technique; widening of meaning from
    SL to TL
  - модуляція (modulation) — Semantic/perspective shift in translation
  - компенсація (compensation) — Replacing lost element in one part of the text with
    a gain in another
  recommended:
  - неперекладність (untranslatability) — Phenomenon where target language lacks exact
    equivalent
  - реалія (culture-specific item) — Term for objects/concepts specific to a particular
    culture
  - калька (calque) — Loan translation; often leads to 'false friends' errors if overused
  - транслітерація (transliteration) — Mechanical rendering of characters from SL
    to TL
  - інтерпретант (interpretant) — Semantic aspect of a sign in the process of translation
