module: c2-085
level: c2
sequence: 85
version: '2.0'
title: Теорія перекладу II — Поглиблений курс
focus: stylistics
pedagogy: TTT
objectives:
- TBD
sources:
- name: Коптілов — Теорія і практика перекладу
  url: https://uk.wikipedia.org/wiki/Коптілов_Віктор_Вікторович
  type: primary
  notes: Classic Ukrainian translation studies textbook
- name: Venuti — The Translator's Invisibility
  url: https://www.routledge.com/
  type: secondary
  notes: Key concepts of domestication and foreignization
- name: Nida — Toward a Science of Translating
  url: https://www.brill.com/
  type: reference
  notes: Dynamic vs. formal equivalence theory
content_outline:
- section: 'Вступ: Перекладознавство та українська традиція (Introduction: Translation
    Studies and Ukrainian Tradition)'
  words: 700
  points:
  - 'Місце перекладознавства серед гуманітарних наук та його розвиток в Україні: від
    Котляревського до сучасності'
  - 'Культурний гачок: «Енеїда» І. Котляревського як радикальний приклад одомашнення
    (доместикації) класичного сюжету для самоствердження мови'
  - 'Київська школа перекладу (Г. Кочур, М. Лукаш): опір уніфікації через естетичну
    еквівалентність та використання архаїзмів/діялектизмів'
  - 'Державний стандарт (§4.3.8): Навички утворення вторинних текстів (рефератів,
    повідомлень) як форма перекладацької компресії'
- section: 'Ключові концепції: Еквівалентність та адекватність (Key Concepts: Equivalence
    and Adequacy)'
  words: 800
  points:
  - Диференціація понять «еквівалентність» та «адекватність» у сучасному перекладознавчому
    дискурсі
  - 'Теорія Ю. Найди: формальна еквівалентність (відповідність форми) vs. динамічна
    еквівалентність (тотожність реакції отримувача)'
  - 'Рівні еквівалентності: від семантичної точності до прагматичної відповідності
    цільовому контексту'
  - 'Критерії адекватності перекладу: стилістична витриманість та збереження авторської
    інтенції'
- section: 'Перекладацькі стратегії: Одомашнення та очуження (Translation Strategies:
    Domestication and Foreignization)'
  words: 900
  points:
  - 'Концепція Лоуренса Венуті: «невидимість» перекладача та етичний вибір між двома
    полюсами'
  - 'Стратегія одомашнення (domestication): адаптація тексту до мовних та культурних
    норм цільової авдиторії'
  - 'Стратегія очуження (foreignization): збереження культурної дистанції та специфіки
    оригіналу'
  - Аналіз «за» та «проти» кожної стратегії в контексті глобалізації та культурної
    ідентичності
- section: Трансформації та типові помилки перекладача (Transformations and Common
    Translator Errors)
  words: 800
  points:
  - 'Лексичні та граматичні трансформації: конкретизація, генералізація, модуляція
    та перестановка'
  - 'Помилка перекладача: калькування (False Friends) сталих сполук — drill: «брати
    участь» (correct) vs. «приймати участь» (wrong)'
  - 'Стилістичний дисонанс: недоречне використання канцеляризмів у художньому тексті
    або розмовної лексики в офіційних документах'
  - Гіперкорекція як наслідок намагання штучно уникнути міжмовної схожості; пошук
    природного балансу
- section: Етика, деколонізація та оцінка якості (Ethics, Decolonization, and Quality
    Assessment)
  words: 800
  points:
  - 'Відповідальність перекладача в постколоніальному контексті: рішення щодо збереження
    чи стирання «іншості» (agency)'
  - 'Деколоніальний підхід у перекладі: повернення суб''єктності українській культурі
    через деконструкцію імперських наративів'
  - 'Державний стандарт (§4.3.7): Уміння трансформувати текст з одного стилю в інший
    (науковий у науково-популярний тощо)'
  - 'Методологія критичного аналізу: обґрунтування перекладацьких рішень та оцінка
    їхнього впливу на реципієнта'
vocabulary:
