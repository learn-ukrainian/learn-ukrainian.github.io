slug: translation-theory-ii
version: '2.0'
title: Теорія перекладу II — Поглиблений курс
subtitle: 'Introduction: Translation Studies and Ukrainian Tradition'
focus: stylistics
pedagogy: TTT
phase: C2.5 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Застосовувати перекладацькі стратегії для передачі стилістичних нюансів
- Аналізувати перекладацькі рішення та оцінювати їхню адекватність
- Продукувати переклади, що зберігають стилістичну специфіку оригіналу
- 'Застосовувати знання з теми «Перекладацькі стратегії: Одомашнення та очуження» у власній мовній практиці'
sources:
- name: Коптілов — Теорія і практика перекладу
