module: professional-correspondence
level: C2
sequence: 54
version: "1.0"
title: "Мистецтво професійного листування: Етикет та стратегії дипломатичного викладу"
subtitle: "Art of Professional Correspondence: Etiquette and Diplomatic Strategies"
focus: professional
pedagogy: workshop
objectives:
  - "Опанувати тонкощі офіційно-ділового та дипломатичного листування на рівні майстерності"
  - "Навчитися використовувати мовні засоби для пом'якшення відмови або висловлення незгоди"
  - "Вдосконалити навички підготовки складних листів-запитів, претензій та супровідних листів"
  - "Досягти бездоганності у дотриманні етикетних норм професійного спілкування в цифрову епоху"
content_outline:
  - section: "Етикетні формули та структура високого стилю листування"
    words: 1000
    subsections:
      - "Звертання та завершальні фрази у листуванні з високопосадовцями та іноземними партнерами"
      - "Логічна архітектоніка офіційного листа: від встановлення контакту до підбиття підсумків"
      - "Вживання ввічливих форм та займенників у контексті професійної дистанції"
    key_concepts:
      - "мовленнєвий етикет"
      - "дипломатичний протокол"
      - "адресант і адресат"
      - "реверанс"
    primary_sources:
      - "Зразки дипломатичних листів Міністерства закордонних справ України (аналіз стилю та етикету)"
  - section: "Стратегії делікатної комунікації та вирішення конфліктів"
    words: 1000
    subsections:
      - "Мистецтво ввічливої відмови: використання непрямих мовленнєвих актів"
      - "Мовні формули висловлення критики, незадоволення та претензій без переходу на особистості"
      - "Нейтралізація конфліктних ситуацій через письмовий дискурс"
    key_concepts:
      - "евфемізація"
      - "асертивність"
      - "дипломатична мова"
      - "конфліктологія тексту"
  - section: "Жанрове розмаїття сучасного ділового листування"
    words: 1000
    subsections:
      - "Специфіка написання супровідних листів до резюме, грантових заявок та статей"
      - "Листи-запити про інформацію та листи-нагадування: баланс між наполегливістю та ввічливістю"
      - "Особливості офіційної комунікації в месенджерах та корпоративних чатах"
    key_concepts:
      - "супровідний лист"
      - "претензійний лист"
      - "діловий етикет"
      - "мережева етика"
  - section: "Редагування та вдосконалення власного ділового стилю"
    words: 1000
    subsections:
      - "Аналіз та усунення канцеляризмів і штампів, що захаращують текст"
      - "Досягнення лаконічності та однозначності без втрати ввічливості"
      - "Робота над індивідуальним стилем професійного листування"
    key_concepts:
      - "мовна економія"
      - "стилістична правка"
      - "персональний бренд"
      - "авторський голос"
    primary_sources:
      - "Андрій Ніковський, 'Словник ділової мови' (історичний контекст формування українського ділового стилю)"
word_target: 4000
activities:
  types_required:
    - error-correction
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Дипломатичний лист"
    topic: "Аналіз мовних засобів у листуванні українських дипломатів початку XX ст. (УНР) та сучасних зразків МЗС."
    key_elements: ["дипломатичний такт", "термінологія", "вишуканість"]
    motivation: "Вивчення традицій та сучасного стану українського дипломатичного письма."
  - source_type: "Словникова стаття"
    topic: "Робота зі словником ділової мови Андрія Ніковського. Порівняння історичних термінів із сучасними нормами."
    key_elements: ["архаїзми", "неологізми", "мовна норма"]
    motivation: "Розуміння витоків та тяглості українського офіційно-ділового стилю."
listening_situations:
  - media_type: "аудіо"
    setting: "Подкаст про сучасний бізнес-етикет в Україні: як писати листи, які читають."
    focus_points:
      - "Зміна формальності у сучасному листуванні"
      - "Правила ведення переписки у месенджерах"
    motivation: "Адаптація класичних знань до сучасних цифрових реалій."
writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть дипломатичний лист-відмову партнеру, який пропонує невигідну співпрацю. Використайте стратегію 'так, але...' та збережіть можливість для майбутніх контактів."
    requirements: ["мінімум 400 слів", "використання етикетних формул", "аргументованість"]
    motivation: "Перевірка здатності до асертивного та ввічливого професійного викладу."
    model_answer: "Лист має починатися з подяки за пропозицію, містити чітке, але делікатне пояснення причин неможливості співпраці зараз та пропозицію залишатися на зв'язку. Тон має бути професійним та доброзичливим."
discussion_topics:
  - context: "Чи вбиває штучний інтелект індивідуальність у діловому листуванні?"
    questions:
      - "Яка роль емоційного інтелекту у написанні складних ділових листів?"
      - "Як зберегти автентичність української мови в умовах домінування англомовних бізнес-шаблонів?"
    motivation: "Дискусія про майбутнє професійної письмової комунікації."
