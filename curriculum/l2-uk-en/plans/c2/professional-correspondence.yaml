content_outline:
- section: Вступ — Культура та еволюція кореспонденції (Introduction — Culture and Evolution of Correspondence)
  words: 600
  points:
  - 'Роль листування в професійному житті та дебюрократизація: перехід від радянського «канцеляриту» до концепції «human-to-human»
    комунікації при збереженні офіційного тону'
  - Універсальні принципи ефективного листування та відповідність вимогам державного стандарту щодо стилістичного регістру
    (§4.3.1.1)
- section: Офіційні листи та ДСТУ 4163:2020 (Official Letters and DSTU 4163:2020)
  words: 1000
  points:
  - 'Типологія офіційних документів згідно з ДСТУ (§1.3.2): запити, пропозиції, скарги, гарантії та звіти'
  - Обов'язкові реквізити та оформлення «шапки» листа, датування та підпису відповідно до вимог «Вимог до оформлювання документів»
- section: Специфіка ділової електронної комунікації (Specificity of Business Electronic Communication)
  words: 900
  points:
  - Етикет використання великої літери у займенниках «Ви», «Ваш» як унікальна риса українського ділового етикету для вияву
    поваги до адресата
  - 'Структура ділового email: від інформативної теми листа до блоку цифрового підпису; правила роботи з вкладеннями (файлами)'
- section: Етика запитів та стратегії відповідей (Ethics of Requests and Response Strategies)
  words: 900
  points:
  - 'Формулювання запитів на інформацію: відмова від англійських кальок (напр., заміна «Я пишу, щоб запитати» на питоме «Звертаюся
    до Вас із запитанням»)'
  - Структура ввічливої відмови та «follow-up» листи як інструмент підтримки партнерських стосунків
- section: Скарги, претензії та культура відмови (Complaints, Claims, and Rejection Culture)
  words: 900
  points:
  - 'Аргументація у скаргах та претензіях: юридична точність та доказова база; розгляд скарги як етап діловодного процесу'
  - 'Мовні формули ввічливості при реагуванні на претензії: баланс між професійною відповідальністю та корпоративним інтересом'
- section: 'Практикум: Мовна чистота та запобігання калькам (Workshop: Language Purity and Calque Prevention)'
  words: 700
  points:
  - 'Корекція типових помилок керування: вживання «згідно з» виключно з Орудним відмінком (напр., «згідно з інструкцією»)'
  - 'Заміна ненормативних закриваючих формул: заміна кальки «Щиро Ваш» на стандартне українське «З повагою»'
vocabulary_hints:
  required:
  - кореспонденція (correspondence) — ділова кореспонденція, вести кореспонденцію, вхідна/вихідна кореспонденція
  - офіційний лист (official letter) — документ, оформлений за державним стандартом; офіційно-діловий стиль
  - запит (request/inquiry) — надіслати запит на інформацію, у відповідь на Ваш запит; висока частотність в офіційній сфері
  - відповідь (response) — надати вичерпну відповідь; терміни реагування
  - скарга (complaint) — подати скаргу, розгляд скарги, книга скарг
  - претензія (claim) — висунути претензію, обґрунтованість претензій
  - звертання (salutation) — офіційне звертання до посадової особи; використання кличного відмінка
  - реквізит (requisite) — обов'язкові реквізити, банківські реквізити, оформити реквізити за ДСТУ
  - вкладення (attachment) — файл у вкладенні, надіслати вкладенням, див. у вкладенні
  - підпис (signature) — електронний цифровий підпис (ЕЦП), завірити підписом
  recommended:
  - згідно з (according to) — вживається з Орудним відмінком; критично для офіційно-ділового стилю
  - шаблон (template) — типовий шаблон документа; уніфікація текстів
  - адресат (addressee) — отримувач кореспонденції; зазначення посади та прізвища
  - вихідний номер (outgoing number) — реєстраційний індекс документа
  - З повагою (Sincerely / With respect) — нормативна формула завершення листа
