title: Професійна кореспонденція
focus: grammar
pedagogy: TTT
phase: C2.3 [Professional Language]
word_target: 5000
objectives:
- Систематизувати граматичні явища на рівні усвідомленого володіння
- Демонструвати безпомилкове вживання складних граматичних конструкцій
- Трансформувати граматичні структури між стилями та регістрами
- Застосовувати знання з теми «Етика запитів та стратегії відповідей» у власній мовній практиці
