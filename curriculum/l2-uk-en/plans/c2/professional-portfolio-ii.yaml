module: c2-062
level: C2
sequence: 62
version: '1.2'
title: 'Професійне портфоліо II: Мультимедійна презентація та самопрезентація'
subtitle: 'Професійне портфоліо II: самопрезентація'
focus: professional
pedagogy: workshop
objectives:
  - Створювати високоякісні мультимедійні презентації професійного портфоліо для
    різних форматів
  - Вдосконалити навички публічного виступу та переконуючої самопрезентації 
    українською мовою
  - Навчитися інтегрувати візуальні дані (графіки, схеми) у цілісний професійний
    наратив
  - Опанувати техніки ведення професійного діалогу та відповіді на складні 
    запитання під час захисту проєктів
content_outline:
  - section: Дизайн та архітектура мультимедійного портфоліо
    words: 1250
    subsections:
      - 'Візуалізація експертності: відбір шаблонів, кольорової гами та шрифтів для
        професійного контексту'
      - 'Логіка побудови презентаційного ряду: принцип ''одна ідея на один слайд'''
      - Інтеграція відеозвернень та інтерактивних елементів у цифрове портфоліо
    key_concepts:
      - візуальна комунікація
      - інфографіка
      - користувацький досвід (UX)
      - бренд-бук
    primary_sources:
      - Гарр Рейнольдс, 'Презентація у стилі дзен' (аналіз принципів мінімалізму
        та фокусу, адаптований до українського контексту)
  - section: Мистецтво публічної самопрезентації
    words: 1250
    subsections:
      - 'Elevator Pitch українською: як розповісти про себе за 60 секунд на найвищому
        рівні'
      - Робота з голосом, інтонацією та невербальними знаками під час виступу
      - Використання риторичних фігур для утримання уваги аудиторії
    key_concepts:
      - публічний виступ
      - невербаліка
      - риторичне запитання
      - антитеза
  - section: Аналітика та डेटा у професійній презентації
    words: 1250
    subsections:
      - 'Мовне коментування статистичних даних: динаміка, тренди, кореляції'
      - Перетворення сухих цифр у переконуючі історії (Storytelling with Data)
      - 'Етика подання візуальної інформації: запобігання маніпуляціям'
    key_concepts:
      - сторітелінг
      - статистична значущість
      - візуалізація даних
      - інтерпретація
  - section: Захист портфоліо та фахова дискусія
    words: 1250
    subsections:
      - Стратегії відповіді на провокативні та уточнюючі запитання експертів
      - Мовні маркери впевненості та професійної скромності
      - 'Ведення конструктивного діалогу після презентації: аргументація та контраргументація'
    key_concepts:
      - полеміка
      - контраргумент
      - конструктивізм
      - професійна етика
    primary_sources:
      - Василь Сухомлинський, 'Слово про слово' (філософія відповідальності за 
        сказане)
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): §36-37 — Культура усного мовлення'
  - 'Авраменко, 11 клас (2019): Риторика та публічний виступ'
  - 'Державний стандарт 2024: C2 — комунікативна компетенція'
reading_situations:
  - source_type: Методичні рекомендації
    topic: Аналіз сучасних українських вимог до оформлення презентаційних 
      матеріалів. Вивчення стилістики заголовків та тез.
    key_elements:
      - лаконічність
      - акцент
      - структурованість
    motivation: Формування навичок створення стилістично бездоганних текстових 
      супроводів до слайдів.
  - source_type: Педагогічне есе
    topic: Дослідження праці Василя Сухомлинського 'Слово про слово' у контексті
      культури професійного мовлення.
    key_elements:
      - культура слова
      - духовність
      - педагогічний такт
    motivation: Усвідомлення важливості кожного слова у професійній комунікації 
      високого рівня.
listening_situations:
  - media_type: відео
    setting: Запис виступу успішного українського стартапера на конференції 
      TEDxKyiv.
    focus_points:
      - Структура виступу та логіка переходу між слайдами
      - Використання гумору та сторітелінгу для залучення авдиторії
    motivation: Аналіз кращих зразків сучасної української публічної промови.
writing_tasks:
  - task_type: відгук
    prompt: Напишіть критичний відгук на власну відеопрезентацію або презентацію
      колеги. Оцініть якість візуального ряду, логіку викладу та мовну 
      вправність.
    requirements:
      - мінімум 500 слів
      - об'єктивність
      - конструктивні пропозиції щодо вдосконалення
    motivation: Розвиток навичок критичного аналізу та професійної самооцінки.
    model_answer: Відгук має містити аналіз сильних та слабких сторін 
      презентації, оцінку відповідності мовних засобів обраній аудиторії та 
      конкретні поради щодо покращення дизайну та риторики.
discussion_topics:
  - context: Чи може форма (дизайн презентації) компенсувати слабкий зміст, і чи
      є це допустимим у професійному середовищі?
    questions:
      - Як знайти баланс між візуальним ефектом та змістовною глибиною?
      - Які цифрові інструменти презентації є найбільш ефективними для 
        українського бізнес-середовища сьогодні?
    motivation: Дискусія про пріоритети у професійній комунікації.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати текст публічного виступу: визначити використання сторітелінгу
      та риторичних прийомів'
  - type: essay-response
    focus: Написати критичний відгук на презентацію з оцінкою візуального ряду, 
      логіки та мовної вправності
  - type: error-correction
    focus: Виправити порушення стилістики та мовного етикету у тексті Elevator 
      Pitch
  - type: select
    focus: Визначити найдоречніший мовний маркер впевненості або професійної 
      скромності для конкретного контексту
phase: C2.3 [Professional Specialization]
