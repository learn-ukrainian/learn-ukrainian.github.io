content_outline:
- section: Вступ — Мультиформатне портфоліо (Introduction — Multi-format Portfolio)
  words: 400
  points:
  - 'Cultural shift: transitioning from traditional Ukrainian modesty to the proactive
    ''personal branding'' paradigm prevalent in IT and creative sectors'
  - 'Strategic consistency: maintaining a unified professional narrative across disparate
    digital formats to ensure a coherent personal brand'
- section: Цифрове портфоліо та платформи (Digital Portfolio and Platforms)
  words: 700
  points:
  - 'Adaptation of content strategy for different platforms: professional tone for
    LinkedIn vs. visual storytelling for Behance and Dribbble'
  - 'Linguistic purism as a professional marker: using clean Ukrainian (without calques
    or surzhyk) to signal high educational status and expertise'
- section: Відеопрезентація та риторика (Video Presentation and Rhetoric)
  words: 700
  points:
  - 'Video resume: applying rhetorical elements of persuasion and composition according
    to State Standard §4.3.5 for effective self-presentation'
  - 'Technical quality and digital literacy: importance of lighting and sound in video
    resumes as markers of professional attention to detail'
- section: Кейс-стаді та методологія STAR (Case Study and STAR Methodology)
  words: 800
  points:
  - The STAR method (Situation, Task, Action, Result) as a rhetorical framework for
    structuring achievement-oriented project descriptions
  - 'Shifting from duty-based descriptions to result-based narratives: using measurable
    metrics and quantitative indicators of success'
- section: Презентаційні матеріали та візуалізація (Presentation Materials and Visualization)
  words: 700
  points:
  - 'Pitch deck structure according to State Standard §4.3.6: creating goal-oriented
    professional texts following a specific stylistic plan'
  - 'Infographics and visual hierarchy: highlighting key achievements and skills to
    manage audience attention and information density'
- section: Практикум — Мовна чистота (Practicum — Linguistic Purity)
  words: 700
  points:
  - 'Common learner error: correcting the Russian-influenced «приймати участь» with
    the proper Ukrainian «брати участь» in professional contexts'
  - 'Correction of temporal calques: using «протягом року» or «впродовж року» instead
    of the erroneous «на протязі року» in project documentation'
