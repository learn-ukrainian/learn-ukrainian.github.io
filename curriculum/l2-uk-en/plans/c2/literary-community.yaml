module: c2-039
level: C2
sequence: 39
version: '1.2'
title: Літературне середовище та інституції
subtitle: Літературна спільнота та інституції
focus: literature
pedagogy: seminar
objectives:
  - Проаналізувати структуру та динаміку сучасного літературного середовища в 
    Україні
  - 'Дослідити роль ключових літературних фестивалів: Книжкового Арсеналу та BookForum
    у Львові'
  - Вивчити функціонування видавничого ринку та роль незалежних видавництв
  - Оцінити стан сучасної літературної критики та її вплив на розвиток книжкової
    культури
content_outline:
  - section: Фестивальна культура як простір діалогу
    words: 1250
    subsections:
      - 'Книжковий Арсенал: синтез літератури, мистецтва та дизайну'
      - 'Lviv BookForum: від книжкового ярмарку до міжнародного інтелектуального майданчика'
      - Локальні фестивалі та їхній внесок у децентралізацію культури
    key_concepts:
      - літературний фестиваль
      - інтелектуальна дискусія
      - кураторська програма
      - нетворкінг
    primary_sources:
      - Маніфести та концепції Міжнародного фестивалю 'Книжковий Арсенал'
      - Програми фокусних тем BookForum
  - section: Видавнича справа та книжковий ринок
    words: 1250
    subsections:
      - 'Великі видавництва vs нішеві проекти: стратегії виживання'
      - Роль дизайну та поліграфії у створенні книжкового продукту
      - 'Вплив війни на книговидання: релокація, знищення друкарень, нові теми'
    key_concepts:
      - видавнича стратегія
      - книжковий дизайн
      - авторське право
      - тираж
  - section: Літературна критика та медіа
    words: 1250
    subsections:
      - Від академічного літературознавства до книжкового блогінгу
      - 'Спеціалізовані видання про літературу: ''ЛітАкцент'', ''Читомо'', ''Тиктор'''
      - Професійна репутація критика та етика літературної полеміки
    key_concepts:
      - літературна рецепція
      - рецензія
      - букстаграм
      - публічний інтелектуал
  - section: Інституційна підтримка та промоція
    words: 1250
    subsections:
      - 'Український інститут книги: державна політика у сфері читання'
      - 'ПЕН-Україна: захист прав письменників та культурна дипломатія'
      - 'Промоція української літератури за кордоном: переклади та резиденції'
    key_concepts:
      - культурна дипломатія
      - літературна резиденція
      - грант на переклад
      - свобода слова
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Маніфест / Концепція
    topic: 'Аналіз фокусної теми ''Книжкового Арсеналу'': як література реагує на
      виклики часу.'
    key_elements:
      - кураторський підхід
      - міжсциплінарність
      - суспільна рефлексія
    motivation: Вивчення стратегій великих культурних інституцій.
  - source_type: Аналітичний звіт
    topic: 'Стан українського книжкового ринку: виклики та перспективи в умовах війни.'
    key_elements:
      - статистика видань
      - споживчі настрої
      - підтримка видавців
    motivation: Розуміння економічних та соціальних аспектів побутування 
      літератури.
listening_situations:
  - media_type: подкаст
    setting: Бесіда з представником Українського інституту книги про промоцію 
      українських авторів у світі.
    focus_points:
      - Механізми грантової підтримки
      - Найпопулярніші жанри за кордоном
    motivation: Ознайомлення з роботою державних інституцій у сфері культури.
writing_tasks:
  - task_type: репортаж
    prompt: Напишіть аналітичний репортаж (500 слів) про уявний або реальний 
      книжковий фестиваль, фокусуючись на атмосфері, ключових дискусіях та ролі 
      події для громади.
    requirements:
      - 'використання термінів: кураторська програма, нетворкінг'
      - інтерв'ю з умовним відвідувачем
      - особисті враження
    motivation: Розвиток навичок культурної журналістики.
    model_answer: Текст має бути жвавим, демонструвати здатність аналізувати 
      подію як соціокультурне явище та використовувати професійну термінологію.
discussion_topics:
  - context: Чи може літературна критика реально впливати на успіх книги в 
      Україні?
    questions:
      - 'Кому більше довіряє читач: професійному критику чи блогеру?'
      - Чи має право видавець втручатися в оцінку книги критиком?
    motivation: Дискусія про незалежність критики та формування суспільної 
      думки.
activity_hints:
  - type: critical-analysis
    focus: Проаналізуйте фокусну тему Книжкового Арсеналу. Визначте кураторські 
      стратегії та їх вплив на літературний процес.
  - type: essay-response
    focus: 'Напишіть аналітичний репортаж про стан українського книжкового ринку в
      умовах війни. Використайте терміни: видавнича стратегія, тираж, нетворкінг.'
  - type: critical-analysis
    focus: Порівняйте рецензії на один і той самий роман у ЛітАкценті та 
      букстаграм-блозі. Оцініть критерії якості рецензування.
  - type: match-up
    focus: Зіставте літературні інституції (ПЕН-Україна, Інститут книги, 
      Книжковий Арсенал) з їхніми функціями та місією.
references:
  - 'Державний стандарт 2024: C2 — літературна компетенція, аналіз культурних процесів'
  - Борзенко, 11 клас (Укр. літ.) — Сучасна українська література
  - Авраменко, 11 клас (Укр. літ.) — Літературний аналіз, жанри
phase: C2.2 [Literary Mastery]
