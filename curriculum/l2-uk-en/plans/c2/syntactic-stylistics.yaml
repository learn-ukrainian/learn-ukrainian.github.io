vocabulary_hints:
  required:
  - інверсія (inversion) — стилістична інверсія; зміна нейтрального порядку слів для
    логічного наголосу
  - еліпсис (ellipsis) — еліптичне речення; пропуск члена речення для динамізму, характерний
    для прози та розмови
  - паралелізм (parallelism) — психологічний паралелізм; симетрична побудова суміжних
    частин тексту, часто у фольклорі
  - градація (gradation) — висхідна градація (клімакс), спадна градація (антиклімакс);
    розташування слів за наростанням чи спаданням значень
  - парцеляція (parcellation) — явище парцеляції, розчленування речення; інтонаційний
    розрив для виділення важливої деталі
  - риторичний (rhetorical) — риторичне запитання, риторичне звертання; фігура, що
    не потребує відповіді, а підсилює увагу
  - тема (theme/topic) — відома інформація в реченні, основа для повідомлення нового
  - рема (rheme/comment) — ядро повідомлення, нова інформація, що несе основне логічне
    навантаження
  - анафора (anaphora) — єдинопочаток; повторення слів на початку речень для ритмізації
  - епіфора (epiphora) — повторення однакових слів у кінці речень для емоційного акценту
  recommended:
  - 'асиндетон (asyndeton) — безсполучниковість; пропуск сполучників для швидкого
    темпу (collocation: ''динамічний асиндетон'')'
  - полісиндетон (polysyndeton) — багатосполучниковість; надмірне вживання сполучників
    для сповільнення ритму та урочистості
  - хіазм (chiasmus) — перехресне повторення елементів двох речень; створює ефект
    інтелектуальної гри чи завершеності
  - антиклімакс (anticlimax) — спадна градація; раптове зниження емоційного тону,
    часто з іронічною метою
  - апосіопеза (aposiopesis) — риторичне замовчування; переривання мовлення через
    хвилювання або з розрахунком на здогадку читача
