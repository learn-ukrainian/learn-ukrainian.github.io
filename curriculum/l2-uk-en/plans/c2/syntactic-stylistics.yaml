content_outline:
- section: 'Вступ: Синтаксис як інструмент стилю (Introduction: Syntax as a Tool of
    Style)'
  words: 500
  points:
  - 'Аналіз синтаксису як ''дихання'' тексту: зв''язок між структурою речення, ритмом
    та емоційним сприйняттям читача.'
  - 'Відповідність вимогам Державного стандарту (§4.3.4): огляд синтаксичних засобів
    (звертання, вставні слова, уточнення) як елементів структурування тексту.'
  - 'Поняття синтаксичної норми та стилістичного відхилення: коли порушення граматичного
    очікування стає мистецьким прийомом.'
- section: 'Порядок слів: Тема, Рема та Стилістична інверсія (Word Order: Theme, Rheme,
    and Stylistic Inversion)'
  words: 800
  points:
  - 'Дослідження структури ''Тема-Рема'': як логічний наголос визначає порядок слів
    у гнучкому українському синтаксисі.'
  - 'Learner error: Rigid adherence to English-like SVO (Subject-Verb-Object) order;
    drill the transformation of neutral sentences into expressive structures to avoid
    ''foreign'' sounding mono-rhythm.'
  - 'Функції інверсії: винесення реми на початок або кінець речення для створення
    смислової напруги (collocation: ''стилістична інверсія'').'
- section: 'Фігури стиснення та накопичення: Еліпсис та Градація (Figures of Compression
    and Accumulation: Ellipsis and Gradation)'
  words: 700
  points:
  - 'Еліпсис у літературному та розмовному дискурсі: використання пропущеного присудка
    для створення динамізму мовлення та ефекту присутності.'
  - 'Градація як засіб емоційного нагнітання: аналіз висхідної градації (клімаксу)
    у творчості Тараса Шевченка («І в''яне, сохне, гине...»).'
  - 'Розрізнення клімаксу та антиклімаксу: використання спадної градації для створення
    іронічного або трагічного ефекту.'
- section: 'Ритм та симетрія: Паралелізм у народній та авторській поезії (Rhythm and
    Symmetry: Parallelism in Folk and Authorial Poetry)'
  words: 750
  points:
  - 'Cultural hook: Дослідження синтаксичного паралелізму на прикладі пісень Марусі
    Чурай («Як ми кохалися...»); поняття психологічного паралелізму.'
  - 'Синтаксична симетрія: використання анафори та епіфори для структурування складних
    періодів та посилення ораторського пафосу.'
  - 'Learner error: ''Choppy syntax'' (lack of flow); correction through the use of
    subordinate clauses and participial constructions to create melodic rhythmic ''periods''
    (following Nechuy-Levytsky''s style).'
- section: 'Емоційний синтаксис: Парцеляція та риторичні фігури (Emotional Syntax:
    Parcellation and Rhetorical Figures)'
  words: 750
  points:
  - 'Парцеляція як інструмент імпресіонізму: аналіз ''рваного'' синтаксису Михайла
    Коцюбинського та Василя Стефаника для передачі психологічного стресу.'
  - 'Learner error: Misuse of parcellation; drill the logical isolation of the rheme
    (new information) instead of random sentence breaking.'
  - 'Риторичні запитання та вигуки: використання синтаксичних фігур для залучення
    читача до діалогу та створення експресивного підсумку.'
