module: c2-013
level: C2
sequence: 13
version: '1.2'
title: 'Синтаксична стилістика: архітектоніка висловлення'
subtitle: 'Синтаксична стилістика'
focus: grammar
pedagogy: seminar
objectives:
  - 'Досконало опанувати стилістичні ресурси українського синтаксису: від простих
    речень до складних синтаксичних цілих'
  - Навчитися використовувати інверсію, еліпсис та риторичні фігури для 
    створення динамічного та експресивного мовлення
  - Дослідити потенціал різних типів підрядного та безсполучникового зв'язку у 
    формуванні інтелектуального дискурсу
  - Опанувати мистецтво побудови періоду та ритмічної організації прозового 
    тексту
content_outline:
  - section: Експресивні можливості простого речення
    words: 1250
    subsections:
      - 'Стилістична роль порядку слів: прямий та зворотний порядок (інверсія)'
      - Відокремлені члени речення як засіб деталізації та увиразнення образу
      - Еліпсис, асиндетон (безсполучниковість) та полісиндетон 
        (багатосполучниковість)
    key_concepts:
      - інверсія
      - еліпсис
      - асиндетон
      - полісиндетон
  - section: Складне речення як інструмент аналітичного стилю
    words: 1250
    subsections:
      - Стилістична диференціація складносурядних та складнопідрядних речень
      - 'Громіздкість vs лаконічність: використання дієприкметникових та дієприслівникових
        зворотів'
      - 'Специфіка синтаксису в науковому та офіційно-діловому стилях: пасивні конструкції'
    key_concepts:
      - гіпотаксис
      - паратаксис
      - дієприкметниковий зворот
      - пасивна конструкція
    primary_sources:
      - Михайло Грушевський, 'Історія України-Руси' (складний академічний 
        синтаксис)
      - Іван Франко, філософська проза (аналітизм вислову)
  - section: Риторичний синтаксис та фігури виразності
    words: 1250
    subsections:
      - 'Риторичні запитання, вигуки та звертання: прагматика впливу'
      - 'Паралелізм та антитеза: симетрія думки та контраст'
      - Парцеляція як засіб створення експресивного підтексту та ритму
    key_concepts:
      - парцеляція
      - антитеза
      - паралелізм
      - риторична фігура
  - section: Синтаксичне ціле та ритміка тексту
    words: 1250
    subsections:
      - 'Складне синтаксичне ціле: засоби зв''язку та логічна послідовність'
      - 'Синтаксичний період: структура, мелодика та завершеність думки'
      - 'Ритм прози: взаємодія довжини речень та інтонаційних пауз'
    key_concepts:
      - період
      - абзац
      - дискурс
      - темпоритм
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - error-correction
    - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Художній уривок
    topic: 'Аналіз барокового синтаксису та періоду. Джерело: проза Валерія Шевчука.'
    key_elements:
      - багатослів'я
      - орнаментальність
      - філософська заглибленість
    motivation: Вивчення складних синтаксичних структур у сучасному 
      інтелектуальному письмі.
  - source_type: Наукова праця
    topic: 'Синтаксис гуманітарного дослідження. Джерело: Дмитро Чижевський, ''Нариси
      з історії філософії на Україні''.'
    key_elements:
      - логічна послідовність
      - вставні конструкції
      - термінологічна чіткість
    motivation: Аналіз побудови наукового доведення через синтаксис.
listening_situations:
  - media_type: лекція
    setting: Професор читає лекцію про архітектоніку тексту 'Слова о полку 
      Ігоревім'.
    focus_points:
      - Ритмічні повтори та паралелізми
      - Вплив синтаксису на емоційну напругу
    motivation: Сприйняття ритмізованого синтаксису на слух.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть опис бурхливого моря, використовуючи спочатку лише короткі 
      прості речення (динаміка), а потім — один розлогий синтаксичний період 
      (велич).
    requirements:
      - мінімум 300 слів
      - використання інверсії та антитези
      - аналіз власного синтаксичного вибору
    motivation: Тренування свідомого керування темпоритмом тексту через 
      синтаксис.
    model_answer: Текст має чітко розділятися на дві стилістичні частини. У 
      першій — акцент на дієсловах та еліпсисі. У другій — майстерно побудований
      період із багатьма підрядними реченнями, що веде до змістової кульмінації.
discussion_topics:
  - context: Чи вбиває довге речення цікавість сучасного читача? Чому складний 
      синтаксис вважається ознакою елітарності?
    questions:
      - Як змінюється сприйняття тексту при парцеляції?
      - Чи може офіційно-діловий стиль бути людяним без зміни свого 
        синтаксичного кістяка?
    motivation: Дискусія про функціональність та естетику синтаксису.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про експресивні можливості простого речення і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про складне речення як інструмент аналітичного стилю, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Експресивні можливості простого речення». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему експресивні можливості простого речення."
  - type: comparative-study
    focus: "Порівняйте різні підходи до експресивні можливості простого речення: Стилістична роль порядку слів: прямий та зворотний порядок (інверсія). Визначте спільне та відмінне."
references:
  - Глазова О. П. Українська мова, 11 клас (2019), §42-43 — синтаксичні засоби 
    стилістики
  - Караман С. О. Українська мова, 10 клас (2018), §53 — стилістика синтаксису
  - Чижевський Д. Нариси з історії філософії на Україні — зразок академічного 
    синтаксису
phase: C2.1 [Stylistic Perfection]
