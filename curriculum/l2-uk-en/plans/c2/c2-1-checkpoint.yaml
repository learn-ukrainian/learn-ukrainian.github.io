vocabulary_hints:
  required:
  - оцінювання (assessment) — критерії оцінювання, об'єктивне оцінювання; висока частотність
    в академічному контексті
  - критерій (criterion) — ключовий критерій, задовольняти критерії; база для рубрик
    оцінювання C2
  - дискурс (discourse) — публічний дискурс, аналіз дискурсу; ключове поняття для
    стилістичного аналізу
  - трансформація (transformation) — стилістична трансформація; обов'язкова навичка
    згідно зі стандартом §4.3.7
  - стилістика (stylistics) — функціональна стилістика, засоби стилістики; теоретичний
    фундамент модуля
  - методологія (methodology) — методологія аналізу; термін для опису підходу до екзаменаційних
    завдань
  recommended:
  - інтерпретація (interpretation) — інтерпретація результатів; використовується в
    блоці самооцінки
  - контекстуалізація (contextualization) — контекстуалізація тексту; для глибинного
    аналізу авторських рішень
  - синтез (synthesis) — синтез стилів; для опису складних творчих робіт
  - модальність (modality) — засоби модальності; лексика для реалізації 'hedging'
    (ймовірно, можливо)
  - канцеляризм (officialism) — калькування канцеляризмів; для роботи над стилістичними
    помилками
