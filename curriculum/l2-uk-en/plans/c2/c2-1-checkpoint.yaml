content_outline:
- section: 'Вступ: Формат та критерії контрольної точки (Introduction: Checkpoint
    Format and Criteria)'
  words: 400
  points:
  - Огляд структури екзамену та деталізація критеріїв оцінювання відповідно до Державного
    стандарту 2024 (§4.3.1.1).
  - Інструктаж щодо розподілу часу між письмовою та усною частинами та пояснення системи
    балів за кожен блок.
- section: 'Частина 1: Аналіз дискурсу та стилістичних засобів (Part 1: Discourse
    and Stylistic Devices Analysis)'
  words: 800
  points:
  - Методологія ідентифікації функціональних стилів (розмовний, офіційний, науковий,
    публіцистичний, художній, релігійний, епістолярний).
  - Аналіз дискурсу на прикладі текстів «Розстріляного відродження» (В. Підмогильний,
    М. Семенко) як зразків формування модерного урбаністичного стилю.
  - Виявлення авторських стилістичних рішень та їхнього впливу на сприйняття тексту
    читачем.
- section: 'Частина 2: Стилістична трансформація та модальність (Part 2: Stylistic
    Transformation and Hedging)'
  words: 900
  points:
  - Практика трансформації офіційно-ділового тексту в публіцистичний відповідно до
    компетенцій стандарту (§4.3.7).
  - 'Корекція типових помилок: усунення калькованих канцеляризмів та заміна пасивних
    конструкцій («було зроблено») на питомі активні («ми зробили»).'
  - Застосування засобів модальності (hedging) для вираження обережних припущень у
    науковому стилі («можливо», «ймовірно», «можна припустити»).
- section: 'Частина 3: Творче письмо та інтелектуальний синтаксис (Part 3: Creative
    Writing and Intellectual Syntax)'
  words: 1000
  points:
  - Написання тексту обсягом 500 слів із дотриманням параметрів заданого стилю (State
    Standard §4.3.6).
  - 'Опанування складного інтелектуального синтаксису за зразком есеїстики Оксани
    Забужко: робота з довгими реченнями та вставними конструкціями.'
  - Використання специфічної термінології та абстрактної лексики для досягнення стилістичної
    точності на рівні C2.
- section: 'Частина 4: Усний екзамен та переключення регістрів (Part 4: Oral Exam
    and Register Switching)'
  words: 600
  points:
  - Демонстрація вміння спонтанно переключати мовні регістри залежно від комунікативної
    ситуації.
  - Усне обґрунтування стилістичних рішень та вибору лексичних одиниць під час захисту
    своєї позиції.
- section: 'Підсумок: Самооцінка та моделі відповідей (Summary: Self-Assessment and
    Model Answers)'
  words: 300
  points:
  - Робота з чек-листом майстерності C2.1 та інтерпретація результатів тестування
    для планування подальшого навчання.
  - Аналіз модельних відповідей із демонстрацією «процесу мислення» (think-aloud protocol)
    для кожного типу завдань.
