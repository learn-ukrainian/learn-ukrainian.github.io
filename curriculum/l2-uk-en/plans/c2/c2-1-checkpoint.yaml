content_outline:
- section: 'Вступ: Формат та критерії контрольної точки (Introduction: Checkpoint Format and Criteria)'
  words: 450
  points:
  - Огляд структури екзамену та деталізація критеріїв оцінювання відповідно до Державного стандарту 2024 (§4.3.1-§4.3.7).
  - Інструктаж щодо розподілу часу між письмовою та усною частинами та пояснення системи балів за кожен блок.
- section: 'Частина 1: Аналіз дискурсу та стилістичних засобів (Part 1: Discourse and Stylistic Devices Analysis)'
  words: 850
  points:
  - Методологія ідентифікації 7 функціональних стилів (розмовний, офіційний, науковий, публіцистичний, художній, релігійний,
    епістолярний) згідно з §4.3.1.
  - Аналіз дискурсу на прикладі текстів «Розстріляного відродження» (В. Підмогильний, М. Семенко) як зразків формування модерного
    урбаністичного стилю.
  - Виявлення авторських стилістичних рішень та їхнього впливу на сприйняття тексту читачем.
- section: 'Частина 2: Стилістична трансформація (Part 2: Stylistic Transformation)'
  words: 950
  points:
  - Практика трансформації офіційно-ділового тексту в публіцистичний та науковий у науково-популярний відповідно до §4.3.7.
  - 'Корекція типових помилок: усунення калькованих канцеляризмів та заміна пасивних конструкцій («було зроблено») на питомі
    активні («ми зробили»).'
  - 'Вправа: три рівні стилістичної адаптації одного сюжету для різних аудиторій (академічна, публіцистична, розмовна).'
- section: 'Частина 3: Риторичні фігури та аргументація (Part 3: Rhetorical Figures and Argumentation)'
  words: 850
  points:
  - 'Перевірка знань складних риторичних фігур: хіазм, зевгма, антиметабола, оксиморон; написання тексту з використанням мінімум
    5 різних фігур.'
  - 'Практична аргументація: побудова переконливого виступу за моделлю теза-аргумент-висновок із застосуванням етос/патос/логос.'
- section: 'Частина 4: Творче письмо та авторський голос (Part 4: Creative Writing and Authorial Voice)'
  words: 950
  points:
  - Написання тексту обсягом 500 слів у заданому стилі з демонстрацією індивідуального авторського голосу (§4.3.6).
  - 'Опанування складного інтелектуального синтаксису: інверсія, парцеляція, паралелізм як засоби побудови складного тексту
    на рівні C2.'
  - Портфоліо семи стилів як підсумковий проєкт C2.1.
- section: 'Частина 5: Усний екзамен та переключення регістрів (Part 5: Oral Exam and Register Switching)'
  words: 650
  points:
  - Демонстрація вміння спонтанно переключати мовні регістри залежно від комунікативної ситуації.
  - Усне обґрунтування стилістичних та риторичних рішень під час імпровізованого захисту позиції.
- section: 'Підсумок: Самооцінка та моделі відповідей (Summary: Self-Assessment and Model Answers)'
  words: 300
  points:
  - Робота з чек-листом майстерності C2.1 (стилістика + риторика) та інтерпретація результатів для планування подальшого навчання.
  - Аналіз модельних відповідей із демонстрацією «процесу мислення» (think-aloud protocol) для кожного типу завдань.
vocabulary_hints:
  required:
  - оцінювання (assessment) — критерії оцінювання, об'єктивне оцінювання; висока частотність в академічному контексті
  - критерій (criterion) — ключовий критерій, задовольняти критерії; база для рубрик оцінювання C2
  - дискурс (discourse) — публічний дискурс, аналіз дискурсу; ключове поняття для стилістичного аналізу
  - трансформація (transformation) — стилістична трансформація; обов'язкова навичка згідно зі стандартом §4.3.7
  - стилістика (stylistics) — функціональна стилістика, засоби стилістики; теоретичний фундамент модуля
  - методологія (methodology) — методологія аналізу; термін для опису підходу до екзаменаційних завдань
  recommended:
  - інтерпретація (interpretation) — інтерпретація результатів; використовується в блоці самооцінки
  - контекстуалізація (contextualization) — контекстуалізація тексту; для глибинного аналізу авторських рішень
  - синтез (synthesis) — синтез стилів; для опису складних творчих робіт
  - модальність (modality) — засоби модальності; лексика для реалізації 'hedging' (ймовірно, можливо)
  - канцеляризм (officialism) — калькування канцеляризмів; для роботи над стилістичними помилками
