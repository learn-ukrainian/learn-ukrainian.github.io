module: c2-026
level: C2
sequence: 26
version: 1.1.2
title: Контрольна робота та підсумок рівня C2.1
subtitle: Контроль і підсумок рівня C2.1
focus: checkpoint
pedagogy: review
objectives:
- Продемонструвати вичерпне володіння граматичними та лексичними нормами 
  високого академічного рівня
- Здійснити глибокий аналіз та інтерпретацію складного інтелектуального тексту
- Створити розгорнуте аналітичне есе з чіткою аргументативною структурою
- Оцінити власний прогрес та окреслити траєкторію подальшого вдосконалення на 
  рівні С2.2
content_outline:
- section: 'Комплексне тестування: лексика, граматика, стилістика'
  words: 1000
  subsections:
  - 'Діагностика слововживання: паронімія, синонімія, фразеологія'
  - 'Граматична експертиза: складний синтаксис та пунктуація в періодах'
  - 'Стилістична диференціація: розпізнавання та трансформація регістрів'
  key_concepts:
  - мовно-стилістична компетенція
  - нормативність
  - варіативність
  - когнітивна точність
- section: Герменевтичний аналіз першоджерела
  words: 1000
  subsections:
  - 'Читання ''між рядків'': виявлення прихованих смислів та інтенцій'
  - Аналіз образної системи та риторичних засобів тексту
  - 'Контекстуалізація: вписування тексту в історико-культурне тло'
  key_concepts:
  - інтерпретація
  - підтекст
  - авторська модальність
  - контекст
  primary_sources:
  - Василь Стус, 'Ваші листи завжди пахнуть зів'ялими трояндами' 
    (літературно-критичний роздум)
  - Леся Українка, 'Листи' (інтелектуальний епістолярій)
- section: 'Творчий синтез: фінальне письмо'
  words: 1000
  subsections:
  - Побудова цілісного тексту на задану філософську або культурну тему
  - Демонстрація індивідуального стилю та інтелектуальної ерудиції
  - Техніка доведення та спростування в академічному форматі
  key_concepts:
  - есеїстика
  - аргументація
  - авторський голос
  - синтез
- section: Рефлексія та підсумки першої частини курсу
  words: 1000
  subsections:
  - 'Самоаналіз досягнень: від В2 до С2.1'
  - Обговорення найскладніших тем та шляхів їх подолання
  - Презентація власного 'мовного портфоліо'
  key_concepts:
  - метапізнання
  - рефлексія
  - мовна стійкість
  - самоактуалізація
- section: Підсумок — Summary
  words: 300
  points:
  - 'C2-level language norms require precise stylistic differentiation, mastery of
    paronymy and phraseology, and the use of complex syntax. Self-check: Can you transform
    a conversational paragraph into a high academic register? Explain the nuanced
    difference between two complex Ukrainian paronyms.'
  - "Hermeneutic analysis of primary sources (like the letters of Stus or Ukrainka)
    involves reading 'between the lines' to uncover subtext, authorial modality, and
    historical context. Self-check: What rhetorical devices does the author use to
    convey hidden meanings? Outline the argumentative structure of a philosophical
    essay."
  - 'Progressing to C2.1 demands the ability to synthesize an analytical essay with
    a distinct authorial voice, as well as deep self-reflection on your linguistic
    journey. Self-check: What are the key elements of effective academic argumentation?
    Reflect on your progress: describe the most difficult topic you mastered between
    B2 and C2.1 and the strategy you used.'
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Стилістика української мови'
- 'Авраменко, 11 клас (2019): Комплексний аналіз тексту'
- 'Караман, 10 клас (2018): Функціональні стилі мовлення'
- 'Державний стандарт 2024: C2 — інтегративна мовна компетенція'
reading_situations:
- source_type: Лист-есе
  topic: Аналіз інтелектуальної напруги в есеїстиці Василя Стуса.
  key_elements:
  - екзистенційна лексика
  - складна метафорика
  - етичний пафос
  motivation: Перевірка здатності сприймати надскладні філософські тексти.
- source_type: Епістолярій
  topic: 'Леся Українка: мова як інструмент європеїзації українського дискурсу.'
  key_elements:
  - інтелектуалізація
  - модерністський синтаксис
  - багатомовність контексту
  motivation: Аналіз ролі еліти у формуванні літературного стандарту.
listening_situations:
- media_type: лекція
  setting: 'Заключне слово викладача про філософію українського слова: синтез пройденого
    матеріалу.'
  focus_points:
  - Ключові тези курсу
  - Перспективи подальшого вивчення
  motivation: Підсумовування та мотивація до подальшого навчання.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть підсумкове аналітичне есе на тему: ''Мистецтво бути мовцем: відповідальність
    за слово в епоху постправди'', спираючись на вивчені першоджерела.'
  requirements:
  - мінімум 800 слів
  - використання щонайменше 10 термінів з риторики та стилістики
  - глибока філософська аргументація
  motivation: Кінцева перевірка здатності до самостійної творчої та аналітичної 
    праці на рівні майстерності.
  model_answer: Робота має бути взірцем академічного письма, демонструвати 
    зрілість думки, багатство мови та здатність до складних інтелектуальних 
    побудов.
discussion_topics:
- context: Який момент у вивченні мови на рівні С2.1 став для вас найбільш 
    трансформаційним?
  questions:
  - Як змінилося ваше сприйняття складних текстів?
  - Які нові можливості відкриває перед вами рівень С2?
  motivation: Узагальнення особистого досвіду навчання.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про комплексне тестування: лексика, граматика, стилістика
    і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про герменевтичний аналіз 
    першоджерела, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Комплексне тестування:
    лексика, граматика, стилістика». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему комплексне
    тестування: лексика, граматика, стилістика.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до комплексне тестування: лексика, граматика, стилістика:
    Діагностика слововживання: паронімія, синонімія, фразеологія. Визначте спільне
    та відмінне.'
phase: C2.1 [Stylistic Perfection]
