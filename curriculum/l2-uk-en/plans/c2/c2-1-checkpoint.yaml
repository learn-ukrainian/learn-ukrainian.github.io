title: Контрольна точка C2.1 — Стилістика та риторика
focus: checkpoint
pedagogy: TTT
phase: C2.1 [Stylistics & Rhetoric]
word_target: 5000
objectives:
- Конструювати переконливі аргументативні тексти із використанням риторичних стратегій
- Аналізувати риторичні прийоми в публічних промовах та дебатах
- Продукувати усні та письмові висловлювання з ефективною аргументацією
- 'Застосовувати знання з теми «Частина 3: Риторичні фігури та аргументація» у власній мовній практиці'
