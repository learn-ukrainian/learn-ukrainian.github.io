content_outline:
- section: 'Вступ: Чи можна перекласти поезію? (Introduction: Is Poetry Translatable?)'
  words: 550
  points:
  - 'Проблема поетичного перекладу: що втрачається (Loss in Translation) і що залишається в основі ліричного твору.'
  - 'Чітке розмежування термінів: «поетичний переклад» (еквівалентність), «переспів» (вільна адаптація) та «наслідування»
    (imitations).'
  - 'Рильський як теоретик: концепція перекладу як «змагання» з оригіналом; збереження авторського голосу через призму іншої
    культури.'
- section: Традиції української школи перекладу (Traditions of the Ukrainian School of Translation)
  words: 1000
  points:
  - 'Геній Миколи Лукаша: використання різних пластів української мови (архаїзми, діалектизми) для відтворення багатства оригіналу
    (на прикладі перекладів «Декамерона» та «Фауста»).'
  - 'Київські неокласики (Микола Зеров): принцип ''ad fontes'' (до джерел), виступ проти дилетантизму та боротьба за високу
    перекладацьку культуру.'
  - Григорій Кочур та його роль у збереженні тяглості перекладацької традиції в умовах цензури; філософський підхід до вибору
    тексту.
- section: 'Техніка відтворення форми та звукопису (Technique: Reproducing Form and Sound Painting)'
  words: 1100
  points:
  - 'Метрика та ритміка: специфіка збереження віршових метрів (ямб, хорей) в українській мові; коли зміна форми є допустимою.'
  - 'Рима в перекладі: класифікація (точна/неточна, багата, чоловіча/жіноча); помилка «рима заради рими» — втрата змісту заради
    співзвучності.'
  - 'Звукопис (Sound Painting): алітерація та асонанс як засоби створення атмосфери; використання стратегії компенсації для
    відтворення звукового ефекту в іншому місці строфи.'
- section: Стилістика та образність за Державним стандартом (Stylistics and Imagery per State Standard)
  words: 1100
  points:
  - 'Трансформація художнього стилю (§4.3.3): відтворення епітетів, метафор та уособлень засобами цільової мови зі збереженням
    емоційного впливу.'
  - 'Стилістичні фігури (§4.3.7): робота з перифразом, метонімією та синекдохою; навичка перекодування складних образів без
    втрати конотацій.'
  - 'Культурно-специфічні образи та інтертекстуальні посилання: стратегії адаптації vs. збереження екзотизмів оригіналу.'
- section: Аналіз типових помилок та практикум (Analysis of Common Errors and Workshop)
  words: 800
  points:
  - 'Помилка калькування синтаксису: як пряме збереження порядку слів ламає природну мелодику української фрази; вправи на
    ритмічну трансформацію.'
  - 'Практичне завдання: аналіз оригіналу з англійської мови, виявлення наскрізних образів та вибір стратегії (фокус на ритмі
    чи на метафориці).'
  - 'Порівняльний аналіз: зіставлення різних перекладів одного твору (наприклад, Шекспіра чи Рільке) для оцінки майстерності
    відтворення звукопису.'
- section: 'Підсумок: Перекладач як співавтор (Summary: The Translator as Co-author)'
  words: 450
  points:
  - 'Критерії якості поетичного тексту: адекватність, поетичність та здатність перекладу жити самостійним життям у новій літературі.'
  - 'Творча етика: межа між інтерпретацією та свавіллям перекладача; важливість представлення української поезії світові через
    високу якість перекладу.'
vocabulary_hints:
  required:
  - 'поетичний переклад (poetry translation) — collocations: теорія, майстерність, адекватний; academic/literary register.'
  - 'переспів (adaptation/versification) — collocations: вільний/авторський переспів; distinguishing from strict translation.'
  - 'метр (meter) — collocations: віршовий метр, ямб, хорей, збереження метру; literary focus.'
  - 'рима (rhyme) — collocations: точна/неточна, багата, чоловіча/жіноча рима; high frequency in poetry analysis.'
  - 'звукопис (sound painting) — collocations: засоби звукопису, алітерація та асонанс; specialist/academic register.'
  - 'образ (image) — collocations: художній, наскрізний образ, система образів; central concept in literary analysis.'
  - 'оригінал (original) — collocations: мова оригіналу, вірність оригіналу.'
  - 'еквівалент (equivalent) — collocations: функціональний/стилістичний еквівалент.'
  - 'інтерпретація (interpretation) — collocations: авторська інтерпретація, простір для інтерпретації.'
  - 'компенсація (compensation) — collocations: стратегія компенсації, лексична/фонетична компенсація.'
  recommended:
  - верлібр (free verse) — free verse form without rhyme or meter.
  - строфіка (stanzaic form) — structure of stanzas; consistency in translation.
  - калька (calque) — negative connotation in translation; avoid syntactic calquing.
  - 'трансформація (transformation) — collocations: стилістична трансформація (§4.3.3).'
  - конотація (connotation) — preserving emotional overtones.
  - евфонія (euphony) — the pleasantness of sound in poetry.
