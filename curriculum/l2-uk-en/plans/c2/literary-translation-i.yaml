module: c2-031
level: C2
sequence: 31
version: 1.2.1
title: 'Художній переклад I: поезія та ритмізована проза'
subtitle: 'Художній переклад I: поезія'
focus: professional
pedagogy: workshop
objectives:
- 'Опанувати специфіку відтворення поетичної форми: метра, ритму, рими та фоніки'
- Дослідити стратегії перекладу верлібру та візуальної поезії
- Навчитися зберігати образну систему та емоційну тональність оригіналу
- Вивчити концепції вірності та творчої зради в поетичному перекладі
content_outline:
- section: Феноменологія поетичного перекладу
  words: 1250
  subsections:
  - Поезія як те, що втрачається чи набувається при перекладі
  - 'Еквілінеарність та еквіритмія: межі формальної точності'
  - 'Трансформація метафоричного ладу: від дослівності до інтерпретації'
  key_concepts:
  - еквіритмія
  - алітерація
  - строфіка
  - поетична вольність
  primary_sources:
  - Василь Стус, 'Листи до сина' (про переклад Гете та Рільке)
  - Іван Франко, 'Каменярі' в іншомовних інтерпретаціях
- section: 'Архітектоніка вірша: техніка відтворення'
  words: 1250
  subsections:
  - 'Робота з римою: багатство української рими vs англійська традиція'
  - 'Ритмомелодика верлібру: як не перетворити поезію на прозу'
  - 'Звукопис та інструментування вірша: переклад фоніки'
  key_concepts:
  - верлібр
  - асонанс
  - пауза
  - анжамбеман
- section: Ритмізована проза та її виклики
  words: 1250
  subsections:
  - Визначення ритмізованої прози та її стилістичні функції
  - Синтаксичний паралелізм та інверсія як засоби ритмізації
  - Переклад текстів-медитацій та ліричних відступів
  key_concepts:
  - ритмізована проза
  - паралелізм
  - період
  - евфонія
- section: Майстерня поетичного перекладу
  words: 1250
  subsections:
  - Аналіз перекладацьких рішень у спадщині неокласиків
  - 'Колективне редагування перекладу: пошук ідеального слова'
  - Проблема перекладу 'темних' та герметичних текстів
  key_concepts:
  - герметизм
  - редагування
  - варіантність
  - авторська інтенція
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Листи / Есеїстика
  topic: 'Роздуми Василя Стуса про складність перекладу Рільке: боротьба за сенс та образ.'
  key_elements:
  - екзистенційна напруга
  - точність образу
  - мовна стихія
  motivation: Розуміння глибинної психології творчого процесу перекладача-поета.
- source_type: Літературознавче дослідження
  topic: 'Іван Франко як теоретик і практик перекладу: концепція ''духу'' тексту.'
  key_elements:
  - адаптація
  - культурний трансфер
  - філологічна сумлінність
  motivation: Вивчення класичної української традиції перекладу.
listening_situations:
- media_type: відео
  setting: 'Запис дискусії на поетичному фестивалі: ''Чи можливо перекласти музику вірша?'''
  focus_points:
  - Роль звукопису
  - Збереження емоційного впливу
  motivation: Сприйняття різних поглядів на проблему відтворення поетичної форми.
writing_tasks:
- task_type: есе
  prompt: Проаналізуйте три різні переклади одного сонета Шекспіра українською мовою (наприклад, Дмитра Паламарчука, Ігоря
    Костецького та Дмитра Павличка). Який з них найбільш адекватно відтворює дух оригіналу?
  requirements:
  - мінімум 500 слів
  - 'використання термінів: еквіритмія, образність'
  - порівняльна таблиця ключових метафор
  motivation: Розвиток навичок компаративного аналізу перекладів.
  model_answer: Есе має демонструвати здатність розрізняти індивідуальні стратегії перекладачів та аргументувати переваги
    того чи іншого підходу.
discussion_topics:
- context: Роберт Фрост стверджував, що 'поезія — це те, що втрачається при перекладі'. Чи згодні ви з цим?
  questions:
  - 'Що є важливішим: точність форми чи точність настрою?'
  - Чи має право перекладач додавати власні образи для збереження рими?
  motivation: Філософська дискусія про межі та можливості перекладу поезії.
activity_hints:
- type: reading
  focus: Прочитайте текст про феноменологія поетичного перекладу і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про архітектоніка вірша: техніка відтворення, використовуючи нову лексику
    модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Феноменологія поетичного перекладу». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему феноменологія поетичного перекладу.
- type: comparative-study
  focus: 'Порівняйте різні підходи до феноменологія поетичного перекладу: Поезія як те, що втрачається чи набувається при
    перекладі. Визначте спільне та відмінне.'
references:
- 'Державний стандарт 2024: C2 — професійні компетенції, художній переклад'
- Авраменко, 11 клас (Укр. літ.) — Літературний аналіз, поезія
- 'University-level: теорія поетичного перекладу (Рильський, Кочур, Стус)'
phase: C2.2 [Literary Mastery]
