title: Літературний переклад I — поезія
focus: literature
pedagogy: TTT
phase: C2.2 [Literature & Creative Writing]
word_target: 5000
objectives:
- Застосовувати перекладацькі стратегії для передачі стилістичних нюансів
- Аналізувати перекладацькі рішення та оцінювати їхню адекватність
- Продукувати переклади, що зберігають стилістичну специфіку оригіналу
- Застосовувати знання з теми «Стилістика та образність за Державним стандартом» у власній мовній практиці
