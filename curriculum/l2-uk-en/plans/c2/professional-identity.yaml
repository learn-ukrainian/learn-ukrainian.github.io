content_outline:
- section: Вступ — Професійна ідентичність та автентичність (Introduction — Professional Identity and Authenticity)
  words: 750
  points:
  - 'Поняття професійної ідентичності згідно з Держстандартом (§3.13, §4.3.6): самопрезентація та риторика в межах теми «Робота».'
  - 'Автентичність vs ''Show-off'': чому запит на щирість є ключовим трендом в українському бізнес-дискурсі та як це впливає
    на лояльність.'
  - 'Культурний гачок: Як особиста ідентичність українських волонтерів (напр. кейс Сергія Притули) інтегрується у професійний
    профіль.'
- section: Стратегічне позиціонування та ціннісна пропозиція (Strategic Positioning and Value Proposition)
  words: 1000
  points:
  - 'Формулювання унікальної ціннісної пропозиції: відхід від надмірних англіцизмів (заміна ''скіли'' на ''навички'' або ''компетенції'').'
  - 'Типова помилка: Виправлення кальки «Я маю експертизу» на правильні конструкції «Я є експертом у галузі» або «Маю досвід».'
  - 'Граматичний аспект ідентичності: Використання орудного відмінка для позначення ролі («працюю менеджером») замість дистанційованого
    «працюю як менеджер».'
- section: Голос та тон комунікації в українському контексті (Brand Voice and Tone in the Ukrainian Context)
  words: 1000
  points:
  - 'Tone of Voice (ToV): як війна та соціальні зміни трансформували прийнятні межі професійного спілкування в LinkedIn та
    професійних медіа.'
  - Аналіз кампанії «Bravery to be Ukraine» та «Diia City» як приклад гармонізації національного бренду з професійною ідентичністю.
  - 'Баланс між автентичністю та діловим етикетом: вибір мовних засобів для різних цільових авдиторій (колеги, інвестори,
    клієнти).'
- section: Публічна присутність та нетворкінг (Public Presence and Networking)
  words: 750
  points:
  - 'Ефективний нетворкінг: розширення кола контактів; використання синонімічних конструкцій для уникнення зловживання запозиченням
    ''нетворкінг''.'
  - 'Культура експертних публікацій: структура тексту, лаконічність та аргументація згідно з вимогами до професійного стилю.'
  - 'Elevator pitch українською: створення короткої самопрезентації, що фокусується на реальних результатах, а не порожніх
    епітетах.'
- section: Репутаційний менеджмент та кризові комунікації (Reputation Management and Crisis Communications)
  words: 900
  points:
  - 'Ділова репутація та репутаційні ризики: лексика для моніторингу та оцінки сприйняття бренду в публічному просторі.'
  - 'Робота з негативом: стилістичні прийоми для конструктивної відповіді на критику без шкоди для професійного іміджу.'
  - 'Відновлення репутації: дискурс відповідальності та цінностей як фундамент для кризової комунікації.'
- section: Практикум — Побудова та аудит бренду (Workshop — Brand Building and Audit)
  words: 600
  points:
  - 'Аудит поточної присутності: аналіз цифрового сліду та відповідність обраному реєстру (формальний vs напівформальний).'
  - 'Симуляція: Розробка контент-плану самопрезентації, що демонструє професійну ідентичність через призму української специфіки.'
vocabulary_hints:
  required:
  - професійна ідентичність (professional identity) — поєднання ролі, цінностей та сприйняття; висока частотність
  - 'позиціонування (positioning) — стратегічне розміщення бренду; колок.: чітке позиціонування, ринкове позиціонування'
  - ціннісна пропозиція (value proposition) — ключова перевага для авдиторії; уникати кальок з англійської
  - 'автентичність (authenticity) — щирість та відповідність внутрішнім цінностям; колок.: запит на автентичність'
  - репутація (reputation) — ділова репутація, бездоганна репутація; критично для C2
  recommended:
  - 'компетенції (competencies) — перевага над ''скіли''; колок.: професійні компетенції'
  - 'нетворкінг (networking) — запозичення; синонім: розширення кола професійних контактів'
  - лідер думок (thought leader) — впливова особа в професійній спільноті
  - репутаційні ризики (reputational risks) — загрози для іміджу через дії або висловлювання
  - експертність (expertise) — заміна конструкції 'мати експертизу'; часто в бізнес-жаргоні
