vocabulary_hints:
  required:
  - професійна ідентичність (professional identity) — поєднання ролі, цінностей та
    сприйняття; висока частотність
  - 'позиціонування (positioning) — стратегічне розміщення бренду; колок.: чітке позиціонування,
    ринкове позиціонування'
  - ціннісна пропозиція (value proposition) — ключова перевага для авдиторії; уникати
    кальок з англійської
  - 'автентичність (authenticity) — щирість та відповідність внутрішнім цінностям;
    колок.: запит на автентичність'
  - репутація (reputation) — ділова репутація, бездоганна репутація; критично для
    C2
  recommended:
  - 'компетенції (competencies) — перевага над ''скіли''; колок.: професійні компетенції'
  - 'нетворкінг (networking) — запозичення; синонім: розширення кола професійних контактів'
  - лідер думок (thought leader) — впливова особа в професійній спільноті
  - репутаційні ризики (reputational risks) — загрози для іміджу через дії або висловлювання
  - експертність (expertise) — заміна конструкції 'мати експертизу'; часто в бізнес-жаргоні
