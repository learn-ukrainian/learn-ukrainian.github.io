module: professional-identity
level: C2
sequence: 63
version: "1.0"
title: "Професійна ідентичність: Особистий бренд та професійна етика"
subtitle: "Professional Identity: Personal Brand and Professional Ethics"
focus: professional
pedagogy: seminar
objectives:
  - "Сформулювати власну професійну ідентичність та стратегію її розвитку в українському соціокультурному контексті"
  - "Опанувати мовні засоби побудови та підтримки особистого бренду (Personal Branding) у професійному середовищі"
  - "Глибоко усвідомити етичні засади професійної діяльності та навчитися розв'язувати етичні дилеми засобами мови"
  - "Розвинути навички ведення публічного дискурсу щодо професійних цінностей та відповідальності"
content_outline:
  - section: "Побудова особистого бренду фахівця"
    words: 1000
    subsections:
      - "Від самоідентифікації до публічного образу: вибір ніші та цільових аудиторій"
      - "Тональність комунікації (Tone of Voice) як відображення професійних цінностей"
      - "Мовна стратегія в соціальних мережах: баланс між професіоналізмом та особистістю"
    key_concepts:
      - "особистий бренд"
      - "самоідентифікація"
      - "позиціонування"
      - "експертність"
    primary_sources:
      - "Григорій Сковорода, 'Розмова про справжню щасливість' (ідея 'сродної праці' як фундаменту ідентичності)"
  - section: "Етичні кодекси та професійна відповідальність"
    words: 1000
    subsections:
      - "Аналіз українських та міжнародних етичних кодексів у різних професійних сферах"
      - "Мовні засоби вираження етичних зобов'язань та принципів доброчесності"
      - "Концепт професійної честі та репутації в українській мовній картині світу"
    key_concepts:
      - "етичний кодекс"
      - "доброчесність"
      - "репутація"
      - "конфлікт інтересів"
  - section: "Комунікація в кризових та етично складних ситуаціях"
    words: 1000
    subsections:
      - "Аргументація власної позиції при зіткненні з неетичною поведінкою колег чи клієнтів"
      - "Мистецтво вибачення та визнання професійних помилок без втрати авторитету"
      - "Мовна дипломатія при врегулюванні ціннісних конфліктів у команді"
    key_concepts:
      - "кризова комунікація"
      - "асертивність"
      - "ціннісний конфлікт"
      - "мовна стійкість"
  - section: "Лідерство та наставництво через мову"
    words: 1000
    subsections:
      - "Мова лідера: від директивності до надихаючого візіонерства"
      - "Етика наставництва (mentoring): конструктивний зворотний зв'язок та підтримка"
      - "Трансляція професійних цінностей через публічні виступи та публікації"
    key_concepts:
      - "візіонерство"
      - "наставництво"
      - "емпатія"
      - "лідерський дискурс"
    primary_sources:
      - "Іван Франко, 'Сільська громада' (аналіз етики громадського лідерства та служіння)"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Філософський діалог"
    topic: "Аналіз ідеї 'сродної праці' Григорія Сковороди. Пошук зв'язку між природними здібностями та професійною ідентичністю."
    key_elements: ["сродність", "щастя", "покликання"]
    motivation: "Глибоке філософське осмислення професійної долі на базі класичного українського тексту."
  - source_type: "Етичний кодекс"
    topic: "Порівняльний аналіз мови етичних кодексів українських журналістів, лікарів та юристів. Дослідження способів вираження імперативів."
    key_elements: ["неупередженість", "конфіденційність", "професійна таємниця"]
    motivation: "Вивчення нормативного дискурсу професійної етики."
listening_situations:
  - media_type: "подкаст"
    setting: "Випуск подкасту про розвиток особистого бренду експерта в умовах війни та кризи."
    focus_points:
      - "Зміна риторичних стратегій у соціальних мережах"
      - "Як словами виразити солідарність та професійну відповідальність"
    motivation: "Аналіз сучасних соціолінгвістичних викликів для професійної ідентичності."
writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть програмне есе (Manifesto) про вашу професійну місію та етичні принципи, якими ви керуєтеся. Опишіть вашу 'сродну працю' та її значення для суспільства."
    requirements: ["мінімум 700 слів", "високий рівень абстракції", "переконуючий та надихаючий тон"]
    motivation: "Синтез особистих цінностей та професійної мовної вправності."
    model_answer: "Текст має бути глибоко особистим, але водночас професійно аргументованим, містити посилання на культурні та філософські контексти, демонструвати впевнене володіння абстрактною лексикою."
discussion_topics:
  - context: "Чи може особистий бренд існувати окремо від професійної етики, і які наслідки це має для репутації?"
    questions:
      - "Як цифрова епоха змінила поняття професійної честі?"
      - "Чи має фахівець рівня C2 бути публічним інтелектуалом, чи достатньо бути вузьким спеціалістом?"
    motivation: "Дебати про роль та відповідальність професійної еліти."
