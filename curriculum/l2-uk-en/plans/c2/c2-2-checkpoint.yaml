content_outline:
- section: 'Вступ: Структура та методологія оцінювання (Introduction: Assessment Structure and Methodology)'
  words: 500
  points:
  - 'Огляд компетенцій рівня C2: фокус на вмінні створювати вторинні тексти згідно з державним стандартом §4.3.8.'
  - 'Диференціація понять: пояснення різниці між процесом «оцінювання» та результатом «оцінка» на основі академічного дискурсу.'
- section: 'Частина I: Літературна теорія та академічні стандарти (Part I: Literary Theory and Academic Standards)'
  words: 750
  points:
  - Роль Інституту літератури ім. Т. Шевченка НАН України у формуванні канону та методології літературознавчого аналізу.
  - 'Корекція типових помилок: відпрацювання правильної форми родового відмінка множини іменника «критерій» — «багато критеріїв».'
  - Застосування наратологічних концепцій до аналізу класичних текстів з використанням високої частотності терміна «дискурс».
- section: 'Частина II: Поетика та стилістичні засоби (Part II: Poetics and Stylistic Devices)'
  words: 850
  points:
  - 'Аналіз тропів згідно з §4.3.3 стандарту: практичне виявлення метафор, метонімій та перифраз у прозових та поетичних творах.'
  - 'Стилістична чистота аналізу: вправи на заміну англіцизмів («фідбек», «бекграунд») питомими відповідниками («зворотний
    зв''язок», «тло»).'
  - Розширений блок комплексного оцінювання з інтеграцією всіх мовленнєвих компетенцій фази
- section: 'Частина III: Критичний аналіз та інтертекстуальність (Part III: Critical Analysis and Intertextuality)'
  words: 900
  points:
  - 'Інтерпретація тексту: розвиток навичок «вільної інтерпретації» при дотриманні логіки авторського задуму та наукової доказовості.'
  - 'Трансформація тексту: створення рефератів та повідомлень як вторинних текстів (вимога §4.3.8) на основі критичних есе.'
  - Розширений блок комплексного оцінювання з інтеграцією всіх мовленнєвих компетенцій фази
- section: 'Частина IV: Переклад та творча практика (Part IV: Translation and Creative Practice)'
  words: 850
  points:
  - 'Стратегії художнього перекладу: аналіз перекладацьких трансформацій та їхньої відповідності стилістичним нормам української
    мови.'
  - 'Творче письмо: створення оригінального фрагмента з використанням складних фігур мовлення та демонстрацією індивідуального
    стилю.'
- section: 'Частина V: Сучасна література та канон (Part V: Contemporary Literature and the Canon)'
  words: 750
  points:
  - Вплив конкурсу «Коронація слова» на формування сучасного літературного ландшафту та появу нових жанрових стандартів.
  - 'Дискусія про «літературну компетенцію»: обговорення творчості Люко Дашвар та Ірен Роздобудько в контексті масової та
    елітарної культури.'
- section: Підсумок та зворотний зв'язок (Summary and Feedback)
  words: 400
  points:
  - 'Саморефлексія: оцінка прогресу у використанні стилістичних засобів лексики та термінологічної точності.'
  - 'Рекомендації для Phase C2.3: перехід від літературної майстерності до професійних мета-навичок у науковому та діловому
    середовищі.'
vocabulary_hints:
  required:
  - оцінювання (assessment) — критерії оцінювання, система оцінювання; вживається для позначення процесу (на відміну від 'оцінка')
  - компетенція (competency) — літературна компетенція, фахова компетенція; ключовий термін для опису фахових навичок
  - 'критерій (criterion) — чіткий критерій, відповідати критеріям; увага на форму родового відмінка множини: ''критеріїв'''
  - інтерпретація (interpretation) — авторська інтерпретація, вільна інтерпретація; центральне поняття літературознавчого
    аналізу
  - дискурс (discourse) — літературний дискурс, аналіз дискурсу; термін для опису мовленнєвої практики в широкому контексті
  - вторинний текст (secondary text) — текст, створений на основі першоджерела (реферат, анотація)
  recommended:
  - зворотний зв'язок (feedback) — рекомендований термін для академічного спілкування замість кальки 'фідбек'
  - контекстуалізація (contextualization) — вміння розглядати твір у зв'язку з історичними та культурними обставинами
  - перифраз (periphrasis) — стилістичний засіб, передбачений стандартом §4.3.3
  - метонімія (metonymy) — перенесення назви за суміжністю; вимога до знань на рівні C2
  - синтез (synthesis) — поєднання результатів аналізу в цілісну концепцію
