objectives:
- Аналізувати та класифікувати явища Літературна теорія та академічні стандарти у автентичних текстах
- Продукувати тексти з коректним застосуванням Поетика та стилістичні засоби
- Оцінювати стилістичну доречність мовних засобів у контексті Контрольна точка C2.2 — Літературна майстерність
- 'Застосовувати знання з теми «Частина III: Критичний аналіз та інтертекстуальність» у власній мовній практиці'
