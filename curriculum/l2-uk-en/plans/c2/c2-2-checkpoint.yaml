module: c2-2-checkpoint
level: C2
sequence: 43
version: '1.1'
title: 'Підсумкова атестація: Майстерність володіння мовою'
subtitle: 'Final Assessment: Language Mastery'
focus: checkpoint
pedagogy: review
objectives:
- Продемонструвати вищий рівень комунікативної компетенції у всіх видах мовленнєвої діяльності
- Здійснити критичний самоаналіз мовних досягнень та визначити вектори подальшого розвитку
- Підтвердити здатність до створення складних, стилістично диференційованих текстів
- Засвідчити вільне оперування інтелектуальним та професійним інвентарем української мови
content_outline:
- section: Комплексний мовний аудит
  words: 1000
  subsections:
  - Діагностика лексичної точності та синонімічного розмаїття
  - Перевірка володіння складними граматичними категоріями та синтаксичними конструкціями
  - Аналіз здатності до розпізнавання та використання прихованих прагматичних значень
  key_concepts:
  - мовна автентичність
  - стилістична адекватність
  - прагматична компетенція
  - лінгвістичний аудит
  primary_sources:
  - Микола Хвильовий, 'Україна чи Малоросія?' (аналіз полемічного стилю та риторичної сили)
- section: 'Риторичний перформанс: підготовка та аналіз'
  words: 1000
  subsections:
  - Створення сценарію переконуючого виступу на актуальну суспільну тему
  - Методи самоконтролю та управління увагою аудиторії
  - Оцінювання риторичної ефективності та аргументативної бази
  key_concepts:
  - публічний дискурс
  - риторична фігура
  - персуазивна стратегія
  - когнітивний вплив
- section: Жанрова багатогранність
  words: 1000
  subsections:
  - 'Адаптація змісту для різних цільових аудиторій: від експертів до широкого загалу'
  - Дотримання вимог академічної та професійної доброчесності
  - Експериментування з гібридними формами вислову
  key_concepts:
  - жанрова трансформація
  - цільова аудиторія
  - регістр мовлення
  - авторська ідентичність
- section: Рефлексія навчального поступу
  words: 1000
  subsections:
  - 'Підбиття підсумків опанування рівня C2: досягнення та виклики'
  - Складання індивідуального плану подальшої мовної підтримки
  - Роль української мови у професійній самореалізації
  key_concepts:
  - саморефлексія
  - мовний профіль
  - стратегія навчання
  - мовна особистість
  primary_sources:
  - Дмитро Павличко, 'Таємниця твого обличчя' (аналіз філософської глибини та мовної експресії)
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Риторика та стилістика'
- 'Авраменко, 11 клас (2019): Публіцистичний стиль мовлення'
- 'Караман, 10 клас (2018): Функціональні стилі'
- 'Державний стандарт 2024: C2 — підсумкова мовна атестація'
reading_situations:
- source_type: Памфлет / Полемічна стаття
  topic: Аналіз полемічного майстерства Миколи Хвильового. Робота з агресивними та захисними риторичними стратегіями.
  key_elements:
  - іронія
  - сарказм
  - інтелектуальна провокація
  motivation: Перевірка здатності аналізувати найскладніші зразки української публіцистики XX ст.
- source_type: Філософська лірика
  topic: Аналіз мовно-філософських концептів у поезії Дмитра Павличка. Дослідження зв'язку форми та змісту.
  key_elements:
  - метафора
  - філософська категорія
  - евфонія
  motivation: Оцінювання естетичного сприйняття та здатності до глибинного лінгвокультурологічного аналізу.
listening_situations:
- media_type: відео
  setting: Запис панельної дискусії на міжнародному форумі за участю українських експертів.
  focus_points:
  - Логіка аргументації в умовах жорсткого таймінгу
  - Використання мовних засобів для підкреслення експертності
  motivation: Перевірка розуміння професійного дискурсу високого рівня в реальних умовах.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть аналітичний репортаж про стан української мови у вашій професійній сфері. Поєднайте статистичні дані, особисті
    спостереження та прогнози на майбутнє.
  requirements:
  - мінімум 700 слів
  - використання професійної лексики
  - структурованість та логічність
  motivation: Підсумкова перевірка здатності створювати великі за обсягом, змістовні та стилістично витримані тексти.
  model_answer: Текст має бути збалансованим, містити глибокий аналіз, бути написаним бездоганною літературною мовою з використанням
    відповідних професійних термінів.
discussion_topics:
- context: Чи може бути рівень C2 остаточною межею, чи це лише початок справжнього занурення в глибини мови?
  questions:
  - Як мова формує нашу ідентичність на найвищому рівні володіння?
  - Які аспекти української культури стають доступними лише на рівні C2?
  motivation: Фінальна дискусія, що підбиває підсумки курсу.
activity_hints:
- type: critical-analysis
  focus: 'Проаналізувати полемічний стиль Миколи Хвильового: іронія, сарказм та інтелектуальна провокація як риторичні засоби'
- type: essay-response
  focus: Написати аналітичний репортаж про стан української мови у професійній сфері з поєднанням статистики та прогнозів
- type: error-correction
  focus: Виправити стилістичні хиби та порушення мовної норми у тексті високого академічного рівня
- type: select
  focus: Визначити тип риторичної стратегії (персуазивна, маніпулятивна, аргументативна) у фрагментах промов
