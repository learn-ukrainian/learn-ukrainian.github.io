module: rozmovnyi-styl
level: C2
sequence: 7
version: "1.1"
title: "Розмовний стиль: від сленгу до інтелектуальної норми"
subtitle: "Colloquial Style: From Slang to High Register"
focus: vocabulary
pedagogy: seminar
objectives:
  - "Досконало вивчити особливості розмовного синтаксису: еліпс, парцеляція, повтори, спонтанність"
  - "Опанувати сучасну українську розмовну фразеологію, сленг та жаргонізми у правильному контексті"
  - "Навчитися гнучко перемикатися між різними регістрами усного мовлення залежно від ситуації"
  - "Аналізувати вплив цифрової комунікації на трансформацію сучасної розмовної норми"
content_outline:
  - section: "Усне мовлення як динамічна система"
    words: 1000
    subsections:
      - "Спонтанність, ситуативність та емоційність як визначальні ознаки"
      - "Роль невербальних засобів та паралінгвістики у комунікації"
      - "Нормативність vs жива практика: де проходить межа?"
    key_concepts:
      - "парцеляція"
      - "еліпсис"
      - "інтонація"
      - "прагматика"
  - section: "Соціальна диференціація та мовна варіативність"
    words: 1000
    subsections:
      - "Молодіжний сленг, професійні жаргони та арго: функції та генезис"
      - "Суржик як соціолінгвістичне явище: причини збереження та шляхи нейтралізації"
      - "Територіальні діалекти в розмовному мовленні городян"
    key_concepts:
      - "сленг"
      - "арго"
      - "жаргон"
      - "соціолект"
  - section: "Культура інтелектуальної розмови та етикет"
    words: 1000
    subsections:
      - "Формування високого стилю спілкування: лексичний відбір та тактовність"
      - "Фатична функція мови: мистецтво 'малої розмови' (small talk) по-українськи"
      - "Мовленнєвий етикет у різних соціальних групах"
    key_concepts:
      - "фатична функція"
      - "мовленнєвий етикет"
      - "діалогічність"
      - "мовленнєвий акт"
  - section: "Цифровий розмовний стиль: письмове усне мовлення"
    words: 1000
    subsections:
      - "Дискурс у соціальних мережах: специфіка синтаксису та пунктуації"
      - "Емотикони, меми та стікери як замінники невербальних засобів"
      - "Вплив месенджерів на лаконізацію та спрощення мови"
    key_concepts:
      - "нетикет"
      - "віртуальна комунікація"
      - "медіа-текст"
      - "креолізований текст"
word_target: 4000
activities:
  types_required:
    - error-correction
    - unjumble
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Драматичний текст"
    topic: "Аналіз розмовного синтаксису та соціолінгвістичних маркерів у комедії. Джерело: Микола Куліш, 'Мина Мазайло'."
    motivation: "Вивчення мовних портретів персонажів та засобів відтворення живої мови в літературі."
listening_situations:
  - media_type: "інтерв'ю"
    setting: "Спонтанна вулична розмова або фрагмент сучасного комедійного шоу з елементами імпровізації."
    focus_points:
      - "Використання модальних часток, вигуків та пауз хезитації"
      - "Швидкість вимови та редукція звуків у побіжному мовленні"
    motivation: "Тренування сприйняття непідготовленого автентичного мовлення з високою концентрацією розмовних елементів."
writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть розгорнутий коментар до дискусійного поста у соцмережі, використовуючи сучасний сленг та емоційно забарвлену лексику, але дотримуючись правил правопису та етики."
    motivation: "Практика написання текстів у гібридному (усно-письмовому) форматі цифрової епохи."
    model_answer: "Відгук має бути живим, містити елементи мовної гри, доречні неологізми або питомі розмовні звороти. Важливо продемонструвати володіння сучасним контекстом та здатність аргументувати позицію в розмовному ключі."
discussion_topics:
  - context: "Чи вбиває інтернет-комунікація традиційну літературну мову, чи вона створює новий, багатший засіб виразності?"
    questions:
      - "Які сленгові новоутворення останнього десятиліття мають шанс закріпитися в нормі?"
      - "Де межа між творчим використанням розмовної стихії та мовною безграмотністю?"
    motivation: "Глибока дискусія про динаміку мовних процесів та роль мовної особистості у формуванні норми."
