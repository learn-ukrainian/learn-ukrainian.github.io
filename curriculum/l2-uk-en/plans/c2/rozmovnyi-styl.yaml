content_outline:
- section: Вступ — Розмовний стиль та літературна норма (Introduction — Colloquial
    Style and Literary Norm)
  words: 600
  points:
  - Визначення розмовного стилю згідно з Державним стандартом (§4.3.1.1), акцент на
    вільне володіння усним мовленням на рівні носія (C2.1).
  - Критичне розмежування просторіччя (colloquialism) як частини літературної норми
    та суржику як хаотичної позанормової суміші (напр., порівняння «зрозумів» vs «поняв»).
  - 'Культурний контекст: аналіз діалогів у творах Сергія Жадана («Ворошиловград»,
    «Інтернат») як зразка майстерної стилізації живого українського мовлення.'
- section: Фонетика та просодія усного мовлення (Phonetics and Prosody of Spoken Speech)
  words: 800
  points:
  - Механізми редукції та скорочення в темпі живого спілкування; регіональні вимовні
    акценти та їхня доречність у розмовному стилі.
  - 'Корекція типової помилки «плаского» мовлення: робота над питомою українською
    висхідно-спадною інтонацією в питаннях та емоційних вигуках.'
  - 'Темпоритм розмови: як використання паузації та інтонаційних моделей впливає на
    сприйняття автентичності мовлення носієм.'
- section: 'Специфічний синтаксис: Еліпсис та неповні речення (Specific Syntax: Ellipsis
    and Incomplete Sentences)'
  words: 900
  points:
  - Застосування еліпсису та повторів згідно зі стандартом (§4.3.4) для досягнення
    комунікативної економії та стилістичної виразності.
  - 'Трансформація формальних конструкцій у природні діалогічні відповіді (практикум:
    «Ти каву будеш? — Буду» замість «Я буду пити каву»).'
  - 'Парцеляція та емоційний синтаксис: розбиття складних думок на короткі, динамічні
    фрази для підсилення експресії в розмові.'
- section: Прагматика часток та дискурсивних маркерів (Pragmatics of Particles and
    Discourse Markers)
  words: 900
  points:
  - 'Функція «цементування» розмови: використання часток (ж, бо, от, ну, власне) для
    забезпечення фатичної функції та логічного зв''язку.'
  - Вживання дискурсивних маркерів вагання (ну, це, як його) та маркерів уточнення
    позиції (власне кажучи, зрештою) згідно з частотними даними.
  - Розпізнавання та уникнення слів-паразитів, що не несуть прагматичного навантаження,
    на користь функціональних часток.
- section: Соціальні та регіональні варіації (Social and Regional Variations)
  words: 800
  points:
  - Дослідження феномену львівської ґвари як історичного прикладу міського койне,
    що збагачує лексичний склад мови.
  - 'Аналіз сучасного сленгу: уникнення прямого калькування (крінж, рофл) на користь
    питомих відповідників або адаптованих форм.'
  - 'Гендерні та професійні відмінності в розмовному мовленні: вибір лексичного регістру
    залежно від соціального контексту спілкування.'
