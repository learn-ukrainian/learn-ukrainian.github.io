vocabulary_hints:
  required:
  - дискурс (discourse) — побутовий дискурс, аналіз дискурсу; надзвичайно висока частота
    в медіа та академічному середовищі
  - еліпсис (ellipsis) — ефект еліпсису, контекстуальний еліпсис; ключовий засіб економії
    мовлення згідно зі стандартом §4.3.4
  - частка (particle) — модальна частка, підсилювальна частка; виконує функцію «цементування»
    живої розмови
  - власне (actually/properly) — власне кажучи, власне тому; вживається для уточнення
    тези або позиції мовця
  - зрештою (after all/finally) — і зрештою, зрештою це не важливо; маркер завершення
    аргументації або підбиття підсумків
  recommended:
  - просторіччя (colloquialism) — вживається для позначення розкутих, але нормативних
    форм літературної мови
  - суржик (surzhyk) — хаотична суміш мов; об'єкт критичного аналізу для уникнення
    помилок
  - хезитація (hesitation) — маркери хезитації (паузи вагання); важливий елемент натурального
    розмовного потоку
  - фатичний (phatic) — фатична функція мови; спрямована на підтримання контакту,
    а не лише передачу інформації
