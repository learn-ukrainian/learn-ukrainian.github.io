module: literary-theory
level: C2
sequence: 27
version: "1.0"
title: "Теорія літератури: інструментарій аналізу"
subtitle: "Literary Theory: Tools of Analysis"
focus: literature
pedagogy: seminar
objectives:
  - "Опанувати фундаментальні категорії літературознавства та методологію філологічного аналізу"
  - "Дослідити еволюцію літературних напрямів та шкіл у контексті української та світової культури"
  - "Навчитися дешифрувати складні художні структури, аналізуючи єдність змісту та форми"
  - "Сформувати навички професійного оперування теоретико-літературним апаратом"
content_outline:
  - section: "Методологічні засади літературознавства"
    words: 1000
    subsections:
      - "Література як вид мистецтва: специфіка художнього образу"
      - "Функції літератури: естетична, пізнавальна, виховна, комунікативна"
      - "Основні літературознавчі школи: від біографізму до постструктуралізму"
    key_concepts:
      - "художній образ"
      - "мімезис"
      - "катарсис"
      - "методологія"
    primary_sources:
      - "Іван Франко, 'Із секретів поетичної творчості'"
      - "Григорій Грабович, 'Тексти і маски'"
  - section: "Генерика та жанрологія: система координат"
    words: 1000
    subsections:
      - "Літературні роди: епос, лірика, драма. Ліро-епос як синтетична форма"
      - "Еволюція жанрових систем: від канону до жанрової дифузії"
      - "Специфіка української жанрової традиції (дума, балада, химерна проза)"
    key_concepts:
      - "роди літератури"
      - "жанровий канон"
      - "модифікація жанру"
      - "архетип"
  - section: "Поетика художнього твору: архітектоніка сенсів"
    words: 1000
    subsections:
      - "Тема, ідея, проблематика, пафос: ідейно-тематичний рівень"
      - "Сюжет і композиція: фабула, конфлікт, художній час і простір"
      - "Система персонажів та засоби їх творення: портрет, мова, психологізм"
    key_concepts:
      - "фабула"
      - "хронотоп"
      - "психологізм"
      - "композиція"
  - section: "Літературний процес та стильові напрями"
    words: 1000
    subsections:
      - "Поняття про літературний напрям, течію, стиль епохи"
      - "Від бароко до класицизму, романтизму, реалізму та модернізму"
      - "Специфіка постмодерної ситуації в літературі"
    key_concepts:
      - "літературний процес"
      - "модернізм"
      - "реалізм"
      - "постмодернізм"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Теоретична праця"
    topic: "Аналіз праці Івана Франка 'Із секретів поетичної творчості': психологія сприйняття."
    key_elements: ["нижня свідомість", "поетична рефлексія", "асоціативність"]
    motivation: "Розуміння класичних підходів до психології творчості."
  - source_type: "Наукова стаття"
    topic: "Григорій Грабович про міфологію Шевченка: аналіз символічних структур."
    key_elements: ["архетип", "міфотворчість", "національний символ"]
    motivation: "Вивчення сучасних методологій інтерпретації класичного тексту."
listening_situations:
  - media_type: "лекція"
    setting: "Публічна лекція про постмодернізм в українській літературі: розбір ключових ознак."
    focus_points:
      - "Іронія та інтертекстуальність"
      - "Гра з читачем"
    motivation: "Опанування складних концепцій сучасного літературознавства."
writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть порівняльний аналіз двох творів різних епох (наприклад, барокової поезії та модерного вірша), використовуючи категоріальний апарат теорії літератури."
    requirements: ["мінімум 500 слів", "використання термінів: хронотоп, фабула, пафос", "обґрунтування вибору методології"]
    motivation: "Практичне застосування теоретичних знань для аналізу текстів."
    model_answer: "Аналіз має демонструвати здатність бачити за текстом теоретичну модель та вміння пояснювати художні явища через призму наукових категорій."
discussion_topics:
  - context: "Чи може теорія літератури допомогти автору писати краще, чи вона лише 'анатомізує' готовий текст?"
    questions:
      - "Чи корисні теоретичні знання для пересічного читача?"
      - "Яка школа літературознавства здається вам найбільш релевантною сьогодні?"
    motivation: "Дискусія про прагматику літературознавчих знань."
