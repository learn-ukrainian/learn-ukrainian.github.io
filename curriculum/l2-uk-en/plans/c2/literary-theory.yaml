content_outline:
- section: 'Вступ: Що таке теорія літератури? (Introduction: What is Literary Theory?)'
  words: 400
  points:
  - Предмет і завдання літературознавства як наукової дисципліни; акцент на науковому стилі мовлення (Стандарт §4.3.1.1).
  - 'Розмежування понять: теорія, історія та критика літератури; запобігання поширеній помилці ототожнення наукового літературознавства
    з публіцистичною критикою.'
  - Огляд основних питань теорії через термінологічну систему C2 (гіпербола, методологія, парадигма).
- section: 'Класичні підходи: Від Арістотеля до Позитивізму (Classical Approaches: From Aristotle to Positivism)'
  words: 700
  points:
  - Арістотелівська поетика та риторична традиція як фундамент; термін 'поетика' у синхронному та діахронному аспектах.
  - Романтична естетика та перехід до позитивізму в літературознавстві XIX століття (Г. Тен).
  - 'Іван Франко як теоретик: аналіз есе «Із секретів поетичної творчості» (1898) та його концепції ''національної літератури''.'
- section: 'Формалізм і структуралізм: Слов''янська наукова традиція (Formalism and Structuralism: The Slavic Scholarly Tradition)'
  words: 850
  points:
  - 'Формалізм як широкий слов''янський науковий рух: внесок Харківської та Київської шкіл поруч із Празьким лінгвістичним
    гуртком.'
  - 'Ключові поняття формалізму: прийом ''остранення'' (В. Шкловський), художня форма та літературність.'
  - 'Структуралізм (Ф. де Соссюр, Р. Барт): поняття знака (означуване та означник) та система бінарних опозицій.'
- section: 'Постструктуралізм і деконструкція: Текст як дискурс (Poststructuralism and Deconstruction: Text as Discourse)'
  words: 850
  points:
  - 'Ж. Дерріда та стратегія деконструкції: розмивання ієрархічних опозицій та множинність інтерпретацій тексту.'
  - М. Фуко та теорія дискурсу; Ю. Крістева та концепція інтертекстуальності як взаємодії текстів.
  - 'Стилістичний аналіз теоретичних текстів: дотримання 100% мовної імерсії без використання латинської транслітерації термінів.'
- section: Контекстуальні підходи та деколонізація (Contextual Approaches and Decolonization)
  words: 850
  points:
  - 'Феміністична, марксистська критика та Новий історизм: література в соціокультурному полі.'
  - 'Постколоніальна теорія: деколонізація українського літературного канону у працях Г. Грабовича, О. Забужко та Т. Гундорової.'
  - 'Практична вправа: трансформація наукового тексту про постколоніалізм у науково-популярний стиль (Стандарт §4.3.7).'
- section: Фундатори українського літературознавства (Foundations of Ukrainian Literary Studies)
  words: 950
  points:
  - 'Олександр Потебня та Харківська лінгвістична школа: психолінгвістичний підхід, тричленна структура твору (зміст, зовнішня
    форма, внутрішня форма).'
  - Аналіз праці Потебні «Думка та мова» (1862) як попередниці структуралізму.
  - 'Корекція регістрових помилок: точне вживання терміна «наратив» (теоретичний концепт) порівняно з «оповідь» (конкретний
    акт мовлення).'
- section: 'Підсумок: Застосування теорії в аналізі (Conclusion: Applying Theory in Analysis)'
  words: 400
  points:
  - Алгоритм вибору методологічної парадигми для аналізу художнього твору.
  - Синтез методів у сучасному літературознавстві; підготовка до написання критичного есе (модуль c2-032).
  - 'Підсумкова дискусія: майбутнє літературознавчої парадигми в цифрову епоху.'
vocabulary_hints:
  required:
  - літературознавство (literary studies) — галузь л., сучасне л., структура л.; наукова дисципліна, що включає теорію, історію
    та критику
  - поетика (poetics) — поетика тексту, порівняльна п., нормативна п.; вчення про художню структуру твору
  - формалізм (formalism) — формальна школа, критика формалізму; слов'янський інтелектуальний контекст
  - структуралізм (structuralism) — засади структуралізму, с. у мові і літературі; аналіз стійких систем
  - деконструкція (deconstruction) — метод деконструкції, стратегія д., д. тексту; аналіз суперечностей усередині твору
  - дискурс (discourse) — науковий дискурс, постколоніальний д., критичний д.; мовленнєва практика в контексті
  - наратив (narrative) — структура наративу, великий наратив; теоретична модель оповіді (високий регістр)
  - інтерпретація (interpretation) — множинність інтерпретацій, авторська і., і. тексту; розкриття змісту
  - методологія (methodology) — методологічна база, методологія дослідження; вчення про методи пізнання
  - парадигма (paradigm) — зміна парадигми, наукова п., літературознавча п.; панівна система поглядів
  recommended:
  - остранення (defamiliarization) — прийом остранення, ефект о.; спосіб виведення сприйняття зі стану автоматизму
  - знак (semiotic sign) — мовний знак, довільність знака, система знаків; єдність форми та змісту
  - означуване / означник (signified / signifier) — зв'язок означуваного і означника; компоненти мовного знака за Соссюром
  - бінарна опозиція (binary opposition) — система бінарних опозицій, розмивання опозиції; базова пара протилежностей
  - канон (canon) — літературний канон, перегляд канону; сукупність творів, визнаних взірцевими
  - оповідь (narrative/telling) — конкретний процес розповідання; використовувати для опису тексту (на відміну від терміна
    'наратив')
