vocabulary_hints:
  required:
  - літературна критика (literary criticism) — висока частотність; вживається у словосполученнях
    'об'єктивна критика', 'нищівна критика'
  - рецензія (review) — академічний та медійний регістр; 'писати рецензію', 'схвальна
    рецензія', 'критична рецензія'
  - аналіз (analysis) — дуже висока частотність; 'глибокий аналіз', 'структурний аналіз',
    'порiвняльний аналіз'
  - інтерпретація (interpretation) — 'авторська інтерпретація', 'множинність інтерпретацій';
    уникати 'хибної інтерпретації'
  - дискурс (discourse) — академічний термін; 'літературний дискурс', 'культурний
    дискурс', 'владний дискурс'
  recommended:
  - наратив (narrative) — середньо-висока частотність; 'наративна стратегія', 'зміна
    наративу'
  - концепція (concept) — вживається у контексті теоретичних засад аналізу
  - контекстуалізація (contextualization) — навичка С2 для пояснення твору через історичне
    тло
  - синтез (synthesis) — поєднання різних аналітичних підходів
  - сюжет vs. фабула (plot vs. story) — критичне розрізнення для аналізу структури
    твору
