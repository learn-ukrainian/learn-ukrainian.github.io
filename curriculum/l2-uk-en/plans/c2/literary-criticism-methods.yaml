content_outline:
- section: 'Вступ: Критика як професія (Introduction: Criticism as a Profession)'
  words: 500
  points:
  - Розмежування понять літературознавство (академічна наука) та літературна критика
    (оперативна, публіцистична реакція на твір)
  - 'Типологія критичних текстів: від анотації та відгуку до розлогої рецензії та
    критичного есею'
  - 'Подолання помилки: розрізнення понять «літературна критика» (аналітичне оцінювання)
    та «критиканство» (дріб''язкове пошукування хиб)'
- section: 'Традиції та полеміка: Канони і міфи (Traditions and Polemics: Canons and
    Myths)'
  words: 800
  points:
  - 'Еволюція шевченкознавства: перехід від радянського фрейму «революціонера-демократа»
    до концепції Григорія Грабовича «Поет як міфотворець»'
  - 'Аналіз дискурсів: як наукова полеміка змінює сприйняття національного канону
    (приклад «канонічних воєн» в українській літературі)'
  - 'Опрацювання складних текстів: аналіз уривків з праць Грабовича або Дзюби з фокусом
    на складний синтаксис та термінологічну щільність'
- section: Методологічний інструментарій (Methodological Toolkit)
  words: 1000
  points:
  - 'Формалістична та структуралістська критика: аналіз прийому та «пильне читання»
    (close reading) тексту'
  - 'Термінологічна точність: розрізнення понять «сюжет» (художнє впорядкування подій)
    та «фабула» (хронологічна послідовність)'
  - 'Імпресіоністична критика vs. об''єктивний аналіз: перехід від суб''єктивного
    естетичного переживання до аргументованої оцінки'
- section: Контекстуальна та ідеологічна критика (Contextual and Ideological Criticism)
  words: 800
  points:
  - Волюнтаристичний націоналізм Дмитра Донцова («Вісниківці») проти етичного гуманізму
    «Шістдесятників» (Дзюба, Сверстюк)
  - 'Сучасні підходи: феміністична оптика та постколоніальні студії в аналізі української
    класики'
  - 'Екокритика та рецептивна естетика: роль читацького відгуку у творенні сенсів
    літературного наративу'
- section: 'Практикум: Написання рецензії (Workshop: Writing a Review)'
  words: 600
  points:
  - 'Стандарт §4.3.8: Вироблення вміння створювати вторинні тексти (рецензії, реферати)
    на основі критичного аналізу'
  - 'Мовленнєві стратегії об''єктивності: заміна суб''єктивного «Мені не сподобалося...»
    на конструкції «Твір характеризується...», «Автор вдається до...»'
  - 'Етика критика та аргументація: структура переконливої оцінки без переходу на
    особистості автора'
- section: 'Підсумок: Від критики до есею (Summary: From Criticism to Essay)'
  words: 300
  points:
  - 'Синтез аналітичного та творчого підходів: як літературна критика стає частиною
    культурного дискурсу'
  - Вибір оптимальної методології залежно від жанру та завдань аналізованого тексту
