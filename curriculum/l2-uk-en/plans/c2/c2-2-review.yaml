objectives:
- Аналізувати та класифікувати явища Поетика та стилістичні засоби у автентичних текстах
- Продукувати тексти з коректним застосуванням Структура та голос
- Оцінювати стилістичну доречність мовних засобів у контексті Повторення C2.2 — Літературна майстерність
- Застосовувати знання з теми «Інтертекстуальність та майстерність перекладу» у власній мовній практиці
