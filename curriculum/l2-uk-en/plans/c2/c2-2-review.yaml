vocabulary_hints:
  required:
  - консолідація (consolidation) — консолідація знань, консолідація зусиль; High Frequency
    (Academic)
  - наратив (narrative) — наративна стратегія, зміна наративу, історичний наратив;
    High Frequency (Humanities)
  - інтертекстуальність (intertextuality) — постмодерна інтертекстуальність, прихована
    інтертекстуальність; Specialized
  - дискурс (discourse) — літературний дискурс, дискурсивні практики; High Frequency
    (Academic)
  - рефлексія (reflection) — критична рефлексія, саморефлексія; High Frequency (General/Academic)
  recommended:
  - канон (canon) — літературний канон, перегляд канону; Medium Frequency
  - фабула (fabula/plot) — хронологія подій; розрізняти з поняттям «сюжет»
  - версифікація (versification) — система віршування; низька частотність, спеціалізоване
  - концепція (concept) — цілісний погляд на явище; Academic register
  - контекстуалізація (contextualization) — аналіз у контексті; High academic complexity
