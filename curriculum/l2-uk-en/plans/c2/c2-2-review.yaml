content_outline:
- section: 'Вступ: Консолідація літературних компетенцій (Introduction: Consolidation of Literary Competencies)'
  words: 500
  points:
  - Огляд пройденого матеріалу М26-43 через призму Держстандарту §4.3.1.1 щодо стилістичної диференціації та консолідації
    знань.
  - 'Взаємозв''язки між теорією та практикою: рефлексія над переходом від аналізу чужого тексту до творення власного.'
- section: Поетика та стилістичні засоби (Poetics and Stylistic Devices)
  words: 950
  points:
  - 'Стилістичні засоби лексики (§4.3.3): поглиблений аналіз епітетів, метафор та метонімії на прикладі поетичних палімпсестів
    Василя Стуса.'
  - 'Learner error: Розрізнення понять «вірш» (poem — малий жанр) та «поема» (long poem/epic — великий ліро-епічний твір)
    для уникнення інтерференції з англійською мовою.'
- section: 'Наратологія: Структура та голос (Narratology: Structure and Voice)'
  words: 950
  points:
  - 'Наратологічний аналіз: диференціація функцій автора, розповідача (narrator) та персонажа в літературному дискурсі.'
  - 'Learner error: Чітке розрізнення фабули (хронологічна послідовність подій) та сюжету (авторський виклад) на прикладах
    імпресіоністичної прози М. Коцюбинського.'
- section: Інтертекстуальність та майстерність перекладу (Intertextuality and Translation Mastery)
  words: 1000
  points:
  - 'Принцип інтертекстуальності: гра з текстом у «Станіславівському феномені» (творчість Ю. Андруховича, Ю. Іздрика, Т. Прохаська).'
  - 'Культурний якір: Школа перекладу Миколи Лукаша та Григорія Кочура як доказ безмежних можливостей української мови у відтворенні
    світових шедеврів.'
- section: Літературна критика та формування канону (Literary Criticism and Canon Formation)
  words: 1000
  points:
  - 'Створення вторинних текстів (§4.3.8): практика написання рецензій та наукових повідомлень у жанрі літературної критики.'
  - 'Поняття літературного канону та його динаміка. Learner error: запобігання калькуванню термінів (вживання «роман» замість
    помилкового «новел» від англ. novel).'
- section: 'Підсумок: Рефлексія та самодіагностика (Summary: Reflection and Self-Diagnosis)'
  words: 600
  points:
  - Критична рефлексія (High Frequency) над індивідуальною траєкторією навчання та самодіагностика прогалин перед Checkpoint.
  - 'Систематизація інтегрованих знань: підготовка до контрольної оцінки рівня літературної майстерності.'
vocabulary_hints:
  required:
  - консолідація (consolidation) — консолідація знань, консолідація зусиль; High Frequency (Academic)
  - наратив (narrative) — наративна стратегія, зміна наративу, історичний наратив; High Frequency (Humanities)
  - інтертекстуальність (intertextuality) — постмодерна інтертекстуальність, прихована інтертекстуальність; Specialized
  - дискурс (discourse) — літературний дискурс, дискурсивні практики; High Frequency (Academic)
  - рефлексія (reflection) — критична рефлексія, саморефлексія; High Frequency (General/Academic)
  recommended:
  - канон (canon) — літературний канон, перегляд канону; Medium Frequency
  - фабула (fabula/plot) — хронологія подій; розрізняти з поняттям «сюжет»
  - версифікація (versification) — система віршування; низька частотність, спеціалізоване
  - концепція (concept) — цілісний погляд на явище; Academic register
  - контекстуалізація (contextualization) — аналіз у контексті; High academic complexity
