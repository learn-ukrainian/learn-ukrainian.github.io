module: c2-2-review
level: C2
sequence: 42
version: '1.1'
title: 'Систематизація знань: від риторики до стилістики'
subtitle: 'Systematization of Knowledge: From Rhetoric to Stylistics'
focus: integration
pedagogy: review
objectives:
- Узагальнити знання про функціональну систему сучасної української літературної мови
- Систематизувати риторичні прийоми та стратегії переконування в різних типах дискурсу
- Закріпити навички аналізу складних синтаксичних структур та їх стилістичного навантаження
- Підготуватися до фінальної атестації через комплексне повторення лексичних та граматичних норм
content_outline:
- section: Ретроспективний аналіз функціональних стилів
  words: 1000
  subsections:
  - Взаємодія та взаємопроникнення стилів у сучасній комунікації
  - 'Динаміка мовної норми: що вважалося помилкою вчора, а що є нормою сьогодні'
  - 'Стилістична парадигма української мови: від розмовного до конфесійного'
  key_concepts:
  - функціональний стиль
  - стильова домінанта
  - мовна норма
  - експресивний потенціал
  primary_sources:
  - Іван Огієнко, 'Наука про рідномовні обов'язки' (філософія мовної стійкості)
- section: Риторичні канони в сучасному контексті
  words: 1000
  subsections:
  - Класична риторика та її трансформація в епоху цифрових медіа
  - Етос, пафос та логос як фундамент успішного публічного виступу
  - Аналіз маніпулятивних стратегій та способів їх нейтралізації
  key_concepts:
  - риторичний канон
  - аргументація
  - персуазивність
  - критичний дискурс-аналіз
- section: Синтаксична архітектура складного вислову
  words: 1000
  subsections:
  - Типологія складних речень та їх роль у формуванні логіки тексту
  - Період як вища форма організації синтаксичного цілого
  - Специфіка вживання відокремлених та вставних конструкцій у високому стилі
  key_concepts:
  - синтаксична єдність
  - логічна зв'язність
  - ритмомелодика
  - пунктуаційна майстерність
- section: 'Культура фахової комунікації: підсумковий огляд'
  words: 1000
  subsections:
  - 'Мовний етикет у професійному середовищі: традиції та сучасність'
  - 'Термінологічна культура: відбір, вживання та переклад термінів'
  - 'Стратегії самовдосконалення: як підтримувати рівень C2 у повсякденному житті'
  key_concepts:
  - мовна культура
  - фахова термінологія
  - комунікативна компетенція
  - лінгвістична саморефлексія
  primary_sources:
  - Борис Антоненко-Давидович, 'Як ми говоримо' (поради щодо чистоти та багатства мови)
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - error-correction
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Функціональні стилі та їх взаємодія'
- 'Авраменко, 11 клас (2019): Риторика та стилістика'
- 'Ворон, 11 клас (2019): Культура мовлення'
- 'Державний стандарт 2024: C2 — систематизація стилістичних знань'
reading_situations:
- source_type: Теоретична праця
  topic: Аналіз 'Науки про рідномовні обов'язки' Івана Огієнка. Робота з концептами мовної стійкості та обов'язку.
  key_elements:
  - рідна мова
  - мовна совість
  - національна ідентичність
  motivation: Глибоке усвідомлення етичного та соціолінгвістичного виміру мови на найвищому рівні.
- source_type: Практичний посібник
  topic: Стилістичний аналіз рекомендацій Бориса Антоненка-Давидовича щодо вживання сумнівних слів та зворотів.
  key_elements:
  - мовна чистота
  - лексичне багатство
  - синонімічний вибір
  motivation: Систематизація знань про питомі українські конструкції та уникнення кальок.
listening_situations:
- media_type: лекція
  setting: Узагальнююча лекція професора мовознавства про стан сучасної української літературної мови.
  focus_points:
  - Ключові тенденції розвитку синтаксису
  - Проблеми термінотворення в нових галузях
  motivation: Цілісне сприйняття мовної ситуації та наукових підходів до її аналізу.
writing_tasks:
- task_type: власне висловлення
  prompt: Проаналізуйте два тексти одного жанру (наприклад, дві політичні промови або дві наукові рецензії) різних історичних
    періодів. Порівняйте їх за критеріями лексичного наповнення, синтаксичної структури та риторичного впливу.
  requirements:
  - мінімум 500 слів
  - використання термінології дискурс-аналізу
  - обґрунтовані висновки
  motivation: Розвиток навичок порівняльного стилістичного аналізу.
  model_answer: Аналіз повинен містити чітке порівняння мовних засобів, виявлення архаїзмів/неологізмів, аналіз зміни риторичних
    стратегій відповідно до соціокультурного контексту.
discussion_topics:
- context: Чи є українська мова на етапі C2 статичною системою, чи вона постійно вимагає переосмислення норм?
  questions:
  - Як ви ставитеся до фемінітивів та нових правописних норм крізь призму мовної традиції?
  - У чому полягає відповідальність носія рівня C2 перед мовною спільнотою?
  motivation: Філософське завершення курсу загальної мовної підготовки.
activity_hints:
- type: critical-analysis
  focus: 'Проаналізувати рекомендації Антоненка-Давидовича щодо вживання сумнівних слів: визначити кальки та питомі еквіваленти'
- type: error-correction
  focus: 'Виправити порушення мовної норми у текстах різних функціональних стилів: кальки, плеоназми, порушення керування'
- type: essay-response
  focus: Порівняти два тексти одного жанру різних історичних періодів за лексичним, синтаксичним та риторичним критеріями
- type: select
  focus: Визначити тип риторичного канону (етос, пафос, логос) у фрагментах публічних виступів
