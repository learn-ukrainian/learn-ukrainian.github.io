module: creative-writing-poetry
level: C2
sequence: 33
version: "1.0"
title: "Творче письмо: поетичні форми та версифікація"
subtitle: "Creative Writing: Poetic Forms and Versification"
focus: literature
pedagogy: workshop
objectives:
  - "Опанувати систему українського віршування: силлабо-тоніку, дольник та верлібр"
  - "Розвинути навички створення складних метафор та оригінальних поетичних образів"
  - "Навчитися працювати з твердими поетичними формами: сонетом, ронделем, тріолетом"
  - "Дослідити можливості фоніки та звукопису для посилення художнього ефекту"
content_outline:
  - section: "Механіка українського вірша"
    words: 1000
    subsections:
      - "Силлабо-тонічна система: від ямба до анапеста в українській традиції"
      - "Ритмічні варіації: пірихій та спондей як інструменти динаміки"
      - "Рима: класифікація, еволюція та сучасні тенденції"
    key_concepts:
      - "стопа"
      - "цезура"
      - "жіноча рима"
      - "асонансна рима"
    primary_sources:
      - "Леся Українка, 'Ритми' (філософське осмислення форми)"
      - "Максим Рильський, 'Про поезію' (традиції та новаторство)"
  - section: "Образна система та тропеїка"
    words: 1000
    subsections:
      - "Метафора як спосіб бачення світу: від порівняння до метаморфози"
      - "Символ та алегорія: багатошаровість поетичного повідомлення"
      - "Специфіка поетичного синтаксису: інверсія, еліпсис, повтор"
    key_concepts:
      - "метанімія"
      - "синекдоха"
      - "оксюморон"
      - "паралелізм"
  - section: "Тверді форми та вільний вірш"
    words: 1000
    subsections:
      - "Архітектоніка сонета: замок, катрен, терцет"
      - "Експериментальні форми: від візуальної поезії до центонів"
      - "Естетика верлібру: внутрішній ритм та паузація"
    key_concepts:
      - "сонетарій"
      - "акровірш"
      - "білий вірш"
      - "інтонаційний центр"
  - section: "Редагування та шліфування поезії"
    words: 1000
    subsections:
      - "Усунення зайвих слів та 'води' у вірші"
      - "Робота над евфонією: уникнення збігу приголосних та монотонності"
      - "Пошук власного голосу: між традицією та індивідуальністю"
    key_concepts:
      - "евфонія"
      - "дисонанс"
      - "поетичний ідіолект"
      - "авторефлексія"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Поетична збірка"
    topic: "Аналіз 'Сім струн' Лесі Українки: цикл як цілісний музично-поетичний твір."
    key_elements: ["символіка кольорів", "музична термінологія", "філософська лірика"]
    motivation: "Вивчення зразка досконалої циклізації та жанрової майстерності."
  - source_type: "Теоретичне есе"
    topic: "Максим Рильський про 'алхімію вірша': від ремесла до мистецтва."
    key_elements: ["культура слова", "традиція класицизму", "поетична етика"]
    motivation: "Осмислення професійної відповідальності поета перед мовою."
listening_situations:
  - media_type: "аудіо"
    setting: "Авторське читання віршів Ліною Костенко: аналіз інтонації та пауз."
    focus_points:
      - "Емоційний акцент"
      - "Ритмічний малюнок"
    motivation: "Розуміння зв'язку між написаним словом та його живим звучанням."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть власний сонет на вільну тему, суворо дотримуючись вимог архітектоніки (два катрени, два терцети) та схеми римування. Додайте короткий коментар про вибір образів."
    requirements: ["14 рядків", "дотримання метра (бажано ямб)", "обґрунтування вибору ключової метафори"]
    motivation: "Практичне застосування знань про тверді поетичні форми."
    model_answer: "Текст має демонструвати володіння формою, ритмом та здатність вмістити завершену думку в жорсткі рамки сонета."
discussion_topics:
  - context: "Чи може поезія бути повністю вільною від правил? Чи є верлібр простішим за класичний вірш?"
    questions:
      - "Яка роль обмежень у творчості?"
      - "Що робить текст поезією, якщо в ньому немає рими та метра?"
    motivation: "Дискусія про природу поетичного натхнення та формальні рамки."
