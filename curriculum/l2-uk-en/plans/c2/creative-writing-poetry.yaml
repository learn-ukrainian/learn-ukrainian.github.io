content_outline:
- section: Вступ — Від читача до творця (Introduction — From Reader to Creator)
  words: 500
  points:
  - Перехід від пасивного аналізу до активного поетичного виробництва згідно зі стандартом §4.3.6.
  - Поезія як баланс між ремеслом (майстерність) та натхненням; деконструкція міфу про виключно стихійну творчість.
  - 'Огляд етапів написання вірша: від первинного імпульсу до фінальної чернетки.'
- section: Пошук теми та автентичного голосу (Finding Theme and Authentic Voice)
  words: 900
  points:
  - 'Методи спостереження та рефлексії: як перетворювати щоденний досвід на матеріал для поезії.'
  - 'Пошук власного голосу: розрізнення автентичного стилю та наслідування (уникнення пасток копіювання Шевченка чи Жадана).'
  - 'Типова помилка: абстрактна сентиментальність (наприклад, «я відчуваю смуток») замість конкретного образу (наприклад,
    «порожня чашка на підвіконні»).'
- section: 'Робота з формою: Від сонета до верлібру (Working with Form: From Sonnet to Free Verse)'
  words: 1100
  points:
  - 'Традиційні форми в українському контексті: мистецтво сонета від Миколи Зерова до ''сонетоїдів'' Емми Андієвської.'
  - 'Верлібр як сучасна мережева практика: розквіт вільного вірша в Україні (1980-ті та 2014–2022 роки) на прикладах поетів
    Facebook-спільноти.'
  - 'Білий вірш vs. верлібр: функціональні відмінності та вибір форми відповідно до художнього завдання.'
- section: Поетична образність та мовотворчість (Poetic Imagery and Language-making)
  words: 1000
  points:
  - 'Стандарт §4.3.3: Використання індивідуально-авторських неологізмів (наприклад, ''синьожовтеня'') як інструменту розширення
    мовних меж.'
  - 'Створення системи образів: робота з метафорою, символом та метафоричним епітетом для досягнення глибини тексту.'
  - 'Мовна економія: як прибрати зайве, зберігаючи максимальну концентрацію сенсу.'
- section: Звукова організація та фоніка (Sound Organization and Phonics)
  words: 750
  points:
  - 'Стандарт §4.3.2: Стилістичні засоби фонетики (милозвучність) — свідоме використання чергувань у/в, і/й, з/зі/із для ритміки
    вірша.'
  - 'Звукопис як інструмент: алітерація, асонанс та звуконаслідування для створення фонетичного настрою тексту.'
  - 'Ритмічна організація: від силабо-тоніки до акцентного вірша; читання вголос як метод перевірки музикальності.'
- section: Редагування та шліфування тексту (Editing and Refining the Text)
  words: 750
  points:
  - 'Стандарт §4.3.7: Трансформація чернетки у фінальний текст як процес внутрішньостильового редагування.'
  - 'Типова помилка: рима як самоціль (вибір слабких рим ''для зручності'' замість точності образу) та методи її виправлення.'
  - 'Критичний аналіз власного тексту: що залишити, а що безжально викреслити заради цілісності твору.'
vocabulary_hints:
  required:
  - творчість (creativity) — творчий процес, мистецька творчість; висока частотність у літературному дискурсі
  - натхнення (inspiration) — черпати натхнення, момент натхнення; ключовий концепт творчого акту
  - чернетка (draft) — працювати над чернеткою, чорновий варіант; технічний етап письма
  - образ (image) — поетичний образ, система образів; центральна категорія художнього мислення
  - верлібр (free verse) — писати верлібром; основна форма сучасної української поезії
  - ремесло (craft) — поетичне ремесло, майстерність ремесла; акцент на технічному аспекті
  recommended:
  - звукопис (soundscape) — засоби звукопису, алітерація, асонанс; термін українського літературознавства
  - автентичність (authenticity) — автентичний голос, пошук автентичності; критичний критерій C2
  - неологізм (neologism) — індивідуально-авторські неологізми; за стандартом §4.3.3
  - рима (rhyme) — точна/недосконала рима, схема рим; технічний параметр версифікації
  - ритм (rhythm) — поетичний ритм, ритмічна організація; основа милозвучності
  - рефлексія (reflection) — авторська рефлексія, глибинна рефлексія; перехід до філософського рівня
  - збірка (collection) — поетична збірка, видати збірку; контекст публікації
