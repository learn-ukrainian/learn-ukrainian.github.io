module: c2-105
level: C2
sequence: 105
version: 1.1.1
title: 'Підсумковий огляд I: Фонетика, морфологія та лексичні норми'
subtitle: 'Фінальний огляд I: фонетика, морфологія, лексика'
focus: integration
pedagogy: review
objectives:
- Систематизувати знання про фонологічну систему української мови та орфоепічні норми (C2)
- Узагальнити складні випадки словозміни іменних та дієслівних частин мови
- 'Проаналізувати лексичні норми: пароніми, омоніми та стилістично марковану лексику'
- Виправити типові помилки, пов'язані з інтерференцією та порушенням мовної норми
content_outline:
- section: 'Фонетика та орфоепія: милозвучність та наголос'
  words: 1000
  subsections:
  - Складні випадки чергування голосних та приголосних у коренях слів
  - 'Акцентуаційні норми: подвійний наголос та зміна наголосу при словозміні'
  - 'Фонетична стилістика: алітерація та асонанс у поетичному тексті'
  key_concepts:
  - орфоепія
  - акцентологія
  - милозвучність
  - евфонія
  primary_sources:
  - 'Олександер Пономарів: ''Культура слова'' (розділи про фонетику та наголос)'
- section: 'Морфологічна норма: виклики словозміни'
  words: 1000
  subsections:
  - Варіантні закінчення іменників чоловічого роду в родовому відмінку
  - Особливості відмінювання складних числівників та числівників з іменниками
  - 'Дієслівні форми: архаїчні та рідковживані парадигми (наказовий та умовний способи)'
  key_concepts:
  - морфологічна норма
  - відмінювання
  - число і рід
  - дієслівні категорії
  primary_sources:
  - Український правопис 2019 (морфологічні норми)
- section: 'Лексикологія та фразеологія: багатство вираження'
  words: 1000
  subsections:
  - 'Синонімічне багатство: вибір найбільш точного слова в контексті C2'
  - 'Пароніми: розрізнення близьких за звучанням, але різних за значенням слів'
  - Фразеологічні одиниці та афоризми як маркери вільного володіння мовою
  key_concepts:
  - лексична норма
  - паронімія
  - синонімічний ряд
  - фразеологізм
  primary_sources:
  - Словник паронімів української мови (Д. Гринчишин)
- section: Типові мовні помилки та їх корекція
  words: 1000
  subsections:
  - 'Кальки та русизми: методи їх виявлення та заміни на питомі форми'
  - Помилки у вживанні сполучників та сполучних слів у складних реченнях
  - Аналіз 'суржикових' конструкцій у сучасному публічному просторі
  key_concepts:
  - калька
  - мовна помилка
  - лінгвістична корекція
  - чистота мови
  primary_sources:
  - 'Борис Антоненко-Давидович: ''Як ми говоримо'''
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 4000
activities:
  types_required:
  - error-correction
  - critical-analysis
  - select
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Культура мовлення'
- 'Державний стандарт 2024: C2 — лінгвістична компетенція'
reading_situations:
- source_type: лінгвістична стаття
  topic: Проблема варіативності норм у сучасному українському правописі.
  key_elements:
  - норма
  - варіантність
  - традиція
  motivation: Розуміння динаміки мовних норм на найвищому рівні.
- source_type: художній текст
  topic: 'Аналіз мовних засобів у поезії Ліни Костенко: від фонетики до фразеології.'
  key_elements:
  - метафора
  - алітерація
  - ідіома
  motivation: Оцінка естетичної функції мовних одиниць.
listening_situations:
- media_type: подкаст
  setting: Дискусія мовознавців про майбутнє українського наголосу та вплив медіа на норму.
  focus_points:
  - Тенденції до спрощення наголошування
  - Роль словників у фіксації норми
  motivation: Розвиток критичного ставлення до мовних процесів.
writing_tasks:
- task_type: есе
  prompt: Напишіть лінгвістичне есе на тему 'Роль Б. Антоненка-Давидовича у боротьбі за чистоту української мови', використовуючи
    приклади з його праці 'Як ми говоримо'.
  requirements:
  - аналіз конкретних прикладів
  - використання термінології C2
  - 500-600 слів
  motivation: Синтез знань з історії мовознавства та культури мови.
  model_answer: Есе має демонструвати глибоке знання джерел та здатність аргументувати необхідність дотримання норм.
discussion_topics:
- context: Чи повинна мовна норма бути жорсткою, чи вона має підлаштовуватися під мовців?
  questions:
  - 'Хто створює норму: науковці чи народ?'
  - Як ви ставитеся до фемінітивів у науковому та офіційному стилях?
  motivation: Дискусія про соціальні аспекти мовної політики.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про фонетика та орфоепія: милозвучність та наголос і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про морфологічна норма: виклики словозміни, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Фонетика та орфоепія: милозвучність та наголос». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему фонетика та орфоепія: милозвучність та наголос.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до фонетика та орфоепія: милозвучність та наголос: Складні випадки чергування голосних
    та приголосних у коренях слів. Визначте спільне та відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
