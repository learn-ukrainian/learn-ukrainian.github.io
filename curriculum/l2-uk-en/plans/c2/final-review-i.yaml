content_outline:
- section: Вступ — Граматична досконалість C2 (Introduction — C2 Grammatical Excellence)
  words: 750
  points:
  - 'Огляд граматичних компетенцій рівня C2: перехід від формального знання правил до експліцитної металінгвістичної свідомості
    та стилістичної гнучкості.'
  - 'Самооцінка за критеріями Державного стандарту 2024: аналіз готовності до маніпулювання складними синтаксичними структурами
    та розуміння ієрархії граматичних норм.'
  - 'Стратегія консолідації: як поєднувати морфологічну точність із витонченістю синтаксичної побудови речення.'
- section: Морфологічна система та правописні виклики (Morphological System and Orthography Challenges)
  words: 1250
  points:
  - 'Культурний гачок: Правописна реформа 2019 року — повернення питомих норм «харківського правопису» (индик, ирій) та їхній
    історичний зв''язок із Розстріляним відродженням.'
  - 'Складні випадки відмінювання іменників: флексія -и в родовому відмінку однини жіночого роду (імені, радости) — практика
    використання як ознаки академічного та художнього стилів.'
  - 'Дієслівна парадигма: ревізія архаїчних та рідкісних форм дієвідмінювання для надання тексту історичної або літературної
    глибини.'
  - 'Числівник та займенник: шліфування відмінкових форм збірних числівників та неозначених займенників у формальному дискурсі.'
- section: Синтаксична стилістика та активна агентність (Syntactic Stylistics and Active Agency)
  words: 1250
  points:
  - 'Синтаксичний аналіз за §4.2.4.1 Стандарту: побудова та інтерпретація складнопідрядних речень з декількома типами підрядного
    зв''язку (обставинні відношення часу, умови, мети).'
  - 'Боротьба за активну агентність мовлення: системна заміна пасивних конструкцій («питання було вирішене») на активні («ми
    вирішили питання») згідно з концепцією Бориса Антоненка-Давидовича.'
  - 'Синтаксис як засіб створення «вайбу»: експерименти з порядком слів та актуальним членуванням речення для зміни емоційного
    та інтелектуального навантаження тексту.'
- section: Складні випадки, винятки та варіативність (Complex Cases, Exceptions, and Variation)
  words: 1000
  points:
  - 'Прийменникова система: деконструкція типової помилки — зловживання прийменником «по» (по вихідним, по справам) — та заміна
    на нормативні конструкції (вихідними, у справах).'
  - 'Часова ретроспекція: відновлення навичок використання давноминулого часу (був зробив) для структурування складних наративів
    та додавання стилістичного забарвлення.'
  - 'Варіативність норми: свідомий вибір між паралельними формами як інструмент вираження ставлення автора та наближення до
    мовного ідеалу.'
- section: Діагностика, редактура та план дій (Diagnostics, Editing, and Action Plan)
  words: 750
  points:
  - 'Практикум з граматичної редактури: виявлення та усунення бюрократичних кальок та стилістично невідповідних граматичних
    форм у текстах високого рівня складності.'
  - 'Фінальний діагностичний тест: комплексний перегляд морфологічних та синтаксичних тем з акцентом на індивідуальні зони
    росту (дефектні парадигми).'
  - 'Створення персонального плану підтримки граматичної норми: ресурси (lcorp.ulif.org.ua, праці Антоненка-Давидовича) для
    професійного вдосконалення.'
vocabulary_hints:
  required:
  - морфологія (morphology) — історична морфологія, морфологічна норма; академічний реєстр
  - синтаксис (syntax) — актуальний синтаксис, синтаксична конструкція; висока частотність у науковому мовленні
  - парадигма (paradigm) — повна парадигма, дефектна парадигма, зміна парадигми; ключовий термін для аналізу мовної системи
  - дієвідмінювання (conjugation) — тип дієвідмінювання, архаїчне дієвідмінювання; увага на нетипові форми
  - норма (grammatical norm) — літературна норма, кодифікована норма, порушення норми; зв'язок із правописом 2019
  - відмінювання (declension) — специфічні флексії, подвійна норма; особливості родового відмінка
  - винятки (exceptions) — системні винятки, маргінальні форми; « master the exceptions »
  - варіативність (variation) — стилістична варіативність, вибір граматичного засобу залежно від мети
  - стилістична маркованість (stylistic marking) — граматика як засіб експресії; високий стиль
  - діагностика (diagnostics) — самооцінка компетенцій, виявлення прогалин у знаннях
  recommended:
  - активна агентність (active agency) — уникнення пасиву («було вирішено» -> «ми вирішили»)
  - правописна реформа (orthography reform) — контекст 2019 року, Розстріляне відродження, деколонізація
  - давноминулий час (pluperfect) — був зробив; ретроспективний план оповіді, стилістична вишуканість
  - калька (calque) — боротьба з бюрократизмами за Б. Антоненком-Давидовичем; «Як ми говоримо»
  - металінгвістична свідомість (metalinguistic awareness) — розуміння внутрішньої логіки та філософії мови
  - концепція (concept) — теоретична база граматичної системи
  - аналіз (analysis) — синтаксичний та морфологічний розбір тексту
  - дискурс (discourse) — граматичні особливості різних типів дискурсу
