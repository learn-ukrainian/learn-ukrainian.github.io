module: capstone-research-project
level: C2
sequence: 96
version: "1.0"
title: "Дослідницький проєкт: Збір та аналіз даних"
subtitle: "Capstone Research Project"
focus: professional
pedagogy: workshop
objectives:
  - "Здійснити систематичний збір емпіричного матеріалу (тексти, інтерв'ю, опитування)"
  - "Проаналізувати зібрані дані за допомогою обраних методів (дискурс-аналіз, контент-аналіз тощо)"
  - "Виявити основні закономірності та тенденції в об'єкті дослідження"
  - "Структурувати основну частину проєкту за розділами та підрозділами"
content_outline:
  - section: "Збір емпіричного матеріалу"
    words: 1000
    subsections:
      - "Відбір репрезентативної вибірки: принципи та критерії"
      - "Робота з першоджерелами: архівні документи, художні тексти, медіа-архіви"
      - "Проведення польових досліджень: опитування та глибинні інтерв'ю"
    key_concepts:
      - "вибірка (sampling)"
      - "корпус текстів"
      - "репрезентативність"
      - "емпіричні дані"
    primary_sources:
      - "Методика польових досліджень у соціолінгвістиці (посібники)"
  - section: "Методи якісного та кількісного аналізу"
    words: 1000
    subsections:
      - "Контент-аналіз та дискурс-аналіз: інструментарій та процедура"
      - "Порівняльно-типологічний аналіз перекладів чи культурних явищ"
      - "Інтерпретація отриманих результатів у світлі гіпотези"
    key_concepts:
      - "контент-аналіз"
      - "дискурс-аналіз"
      - "кореляція"
      - "інтерпретація"
    primary_sources:
      - "Теоретичні праці з дискурс-аналізу (наприклад, праці Г. Почепцова)"
  - section: "Структурування результатів дослідження"
    words: 1000
    subsections:
      - "Логіка побудови розділів: від загального до часткового"
      - "Аргументація власної позиції на основі зібраних фактів"
      - "Використання візуалізації: таблиці, графіки, діаграми для ілюстрації висновків"
    key_concepts:
      - "структура розділу"
      - "доказова база"
      - "візуалізація даних"
      - "аргументація"
    primary_sources:
      - "Стандарти оформлення наукових робіт ДСТУ (витяг щодо таблиць та схем)"
  - section: "Етика дослідження та верифікація"
    words: 1000
    subsections:
      - "Захист персональних даних респондентів та конфіденційність"
      - "Перевірка результатів на точність та об'єктивність"
      - "Попередні висновки та підготовка до написання тексту"
    key_concepts:
      - "конфіденційність"
      - "анонімність"
      - "валідація"
      - "об'єктивність"
    primary_sources:
      - "Закон України 'Про захист персональних даних'"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - comparative-study
    - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "фрагмент дослідження"
    topic: "Аналіз результатів соціолінгвістичного опитування щодо мовної стійкості українців."
    key_elements: ["статистична значущість", "кореляція", "інтерпретація результатів"]
    motivation: "Вивчення способів опису та пояснення статистичних даних у науковому тексті."
  - source_type: "методична стаття"
    topic: "Метод дискурс-аналізу в політичних промовах: покрокова інструкція."
    key_elements: ["контекст", "ідеологеми", "стратегії переконання"]
    motivation: "Опанування практичного інструментарію аналізу текстів."
listening_situations:
  - media_type: "лекція"
    setting: "Вебінар про використання ШІ-інструментів для обробки великих масивів текстових даних."
    focus_points:
      - "Автоматизація кодування даних"
      - "Помилки та обмеження ШІ"
    motivation: "Ознайомлення з сучасними технологіями аналізу даних."
writing_tasks:
  - task_type: "репортаж"
    prompt: "Складіть детальний план одного розділу вашого проєкту. Вкажіть підрозділи, методи, які будуть використані, та очікувані висновки."
    requirements: ["логічна структура", "чітке формулювання назв підрозділів", "500 слів"]
    motivation: "Розвиток навичок наукового планування та структурування матеріалу."
    model_answer: "План має відображати логіку дослідження, містити опис методів аналізу та попередній перелік ключових тез."
discussion_topics:
  - context: "Які дані можна вважати 'достовірними' в гуманітарних науках?"
    questions:
      - "Як уникнути суб'єктивності при інтерпретації текстів?"
      - "Чи може кількісний аналіз замінити якісний опис явища?"
    motivation: "Обговорення методологічних викликів та шляхів їх вирішення."
