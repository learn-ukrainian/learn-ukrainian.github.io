content_outline:
- section: Вступ — Етап збору матеріалу (Introduction — Material Collection Phase)
  words: 700
  points:
  - Огляд етапів дослідження згідно з вимогами §4.3.1.1 (науковий стиль) та §4.3.6 (створення тексту за планом) Державного
    стандарту.
  - 'Трансформація наукового тексту в науково-популярний (§4.3.7): зміна регістру залежно від аудиторії.'
  - 'Деколонізація наукової інфраструктури: перехід від радянських ГОСТів до національних стандартів та агентств (НАЗЯВО).'
- section: Робота з джерелами (Working with Sources)
  words: 1000
  points:
  - 'Диференціація первинних архівних та вторинних джерел: критична оцінка авторитетності в українському науковому дискурсі.'
  - 'Стилістична норма наукового стилю: домінування віддієслівних іменників на -ння/-ення (дослідження, опрацювання) над дієприслівниковими
    зворотами.'
  - 'Використання національних ресурсів: НБУВ (nbuviap.gov.ua) та корпусних інструментів ULIF для пошуку академічних прецедентів.'
  - Практичне завдання: самостійний аналіз та продукування тексту з теми «Робота з джерелами».
- section: Методи дослідження (Research Methods)
  words: 850
  points:
  - 'Якісні та кількісні методи: вибір методологічної бази відповідно до галузі знань (§3.12).'
  - 'Сучасні підходи: корпусний аналіз текстів та методологічна триангуляція даних для забезпечення валідності результатів.'
  - 'Лексика епістемічних дій: використання дієслів ''встановити'', ''виявити'', ''дійти висновку'' замість розмовного ''знайти''
    або ''зробити''.'
- section: Академічна доброчесність (Academic Integrity)
  words: 1000
  points:
  - 'Правове та етичне поле: Рекомендації НАЗЯВО (2020) та роль системи Unicheck у забезпеченні якості вищої освіти.'
  - 'Типові помилки: розрізнення коректного парафразування та плагіату типу ''word-swap'' (заміна слів при збереженні структури
    речення).'
  - 'Техніки парафразування: повна структурна перебудова інформації при збереженні наукового регістру.'
  - Завдання на синтез: інтеграція навичок попередніх розділів у контексті «Академічна доброчесність».
- section: Бібліографія та посилання (Bibliography and Citations)
  words: 850
  points:
  - 'ДСТУ 8302:2015: специфіка українського бібліографічного посилання (surname-first, вживання скорочень ''авт.'', ''упоряд.'',
    ''пер.'').'
  - 'Помилка конфляції: чітке розрізнення понять ''посилання'' (внутрішньотекстове) та ''бібліографія'' (повний список у кінці
    праці).'
  - Оформлення покликань на електронні ресурси та архівні матеріали згідно з чинними ДСТУ.
- section: Практика та звітність (Practice and Reporting)
  words: 600
  points:
  - Складання робочої бібліографії з використанням українських джерел для відпрацювання навичок ДСТУ.
  - 'Підготовка вторинних текстів (§4.3.8): рефератів та повідомлень про стан дослідження (Research Status Report).'
  - Самоаудит тексту на відповідність академічному стандарту та відсутність розмовних конструкцій.
vocabulary_hints:
  required:
  - 'методологія (methodology) — висока частотність в академічному письмі; кол.: методологічна база, теоретична методологія.'
  - 'первинне джерело (primary source) — стандартний архівний термін; кол.: аналіз первинних джерел.'
  - 'вторинне джерело (secondary source) — передбачає опрацювання існуючих досліджень; кол.: критика вторинних джерел.'
  - 'академічна доброчесність (academic integrity) — кодифікований термін (Закон про освіту 2017); кол.: дотримання академічної
    доброчесності.'
  - 'плагіат (plagiarism) — технічно визначений НАЗЯВО; кол.: виявлення плагіату, антиплагіатна перевірка.'
  - 'бібліографія (bibliography) — повний список джерел; кол.: складання бібліографії, бібліографічний запис.'
  - посилання (citation/reference) — внутрішньотекстове покликання; часто плутають з англ. 'reference' (список).
  - парафразування (paraphrasing) — науковий термін для переказу; уникати 'word-swap' перефразу.
  - встановити (to establish) — науковий реєстр для результатів; замість розмовного 'знайти'.
  - дослідження (research) — віддієслівний іменник (-ння); основна одиниця наукового стилю.
  recommended:
  - 'корпусний аналіз (corpus analysis) — сучасний метод (ULIF); кол.: комп''ютерно-лінгвістичний аналіз.'
  - 'триангуляція (triangulation) — запозичення з англ. методології; кол.: методологічна триангуляція.'
  - покликання (reference) — західноукраїнський варіант та сучасний синонім до 'посилання'.
  - валідність (validity) — показник достовірності даних у кількісних методах.
  - опрацювання (processing) — типовий науковий термін для аналізу матеріалу.
