objectives:
- Аналізувати та класифікувати явища Робота з джерелами у автентичних текстах
- Продукувати тексти з коректним застосуванням Методи дослідження
- Оцінювати стилістичну доречність мовних засобів у контексті Дипломний проєкт — Дослідження
- Застосовувати знання з теми «Академічна доброчесність» у власній мовній практиці
