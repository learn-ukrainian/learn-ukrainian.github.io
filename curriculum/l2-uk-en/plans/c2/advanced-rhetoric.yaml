module: c2-101
level: C2
sequence: 101
slug: advanced-rhetoric
version: '2.0'
title: Поглиблена риторика
subtitle: 'Advanced Rhetoric: The Mechanics of Great Speeches'
content_outline:
- section: Вступ — Традиції українського красномовства (Introduction — Traditions
    of Ukrainian Eloquence)
  words: 400
  points:
  - 'Alignment with State Standard §4.3.5: rhetoric as a tool for text composition
    and conscious persuasion at the C2 mastery level.'
  - 'Historical context: The Kyiv-Mohyla Academy tradition and Baroque rhetoric (Feofan
    Prokopovych) as the foundation of Ukrainian academic oratory, blending European
    Latin models with local vitality.'
  - 'Pedagogical distinction: Transitioning from C1 intuitive persuasion to C2 structural
    mastery of advanced compositional figures.'
- section: Механіка складних риторичних фігур (Mechanics of Complex Rhetorical Figures)
  words: 700
  points:
  - 'Lexical stylistic means (Standard §4.3.3): Mastery of oxymoron (гірка радість),
    zeugma (підняв прапор і дух), and their interaction in a single paragraph.'
  - 'Syntactic symmetry: Chiasmus (mirror structure) as a tool for creating memorable
    aphorisms: «Не життя для роботи, а робота для життя».'
  - 'Rhythm through syntax: Contrasting asyndeton (omission of conjunctions) for speed
    vs. polysyndeton (repetition) for cumulative weight and solemnity.'
  - 'The power of omission: Ellipsis (Standard §4.3.4) as a strategic tool for brevity
    and dynamic impact in public speaking.'
- section: Архітектоніка та ритміка промови (Architectonics and Rhythm of Speech)
  words: 600
  points:
  - 'Tricolon: Constructing three-part parallel structures to enhance memorability
    and rhetorical balance.'
  - 'Antimetabole: Using reversed repetition for philosophical depth and reversed
    parallelism (reversed repetition of words in successive clauses).'
  - 'Persuasive dynamics: Prioritizing active voice and strong verbs over passive
    constructions («Ми вирішили» vs. «Було вирішено») to maintain agency and drive.'
  - 'Compositional frames: Implementing ring composition (ending where you began)
    to provide a sense of logical and emotional closure.'
- section: 'Риторичний аналіз: від Бароко до Модерну (Rhetorical Analysis: From Baroque
    to Modernism)'
  words: 600
  points:
  - 'Analysis of literary oratory: Ivan Franko''s public speeches and monologues (e.g.,
    in ''Zakhar Berkut'')—examining the use of rhythmic prose and rhetorical questions.'
  - 'Comparing traditions: Synthesizing the Baroque ''elevated pathos'' of the 18th-century
    sermons with modern political discourse.'
  - 'Case study: Identifying the hierarchy of rhetorical devices in a classic Ukrainian
    text and evaluating their contribution to the overall ''pathos''.'
- section: 'Лабораторія оратора: подолання типових помилок (Orator''s Laboratory:
    Overcoming Common Errors)'
  words: 500
  points:
  - 'Distinguishing redundancy: Correcting unintentional pleonasm («пам''ятний сувенір»)
    while mastering intentional rhetorical repetition («слова, слова, слова»).'
  - 'Structural de-calquing: Avoiding English cleft sentences (''It is he who...'')
    in favor of Ukrainian word order inversion and the use of focus markers like «саме».'
  - 'Revision workshop: Rewriting flat, descriptive passages into highly persuasive
    rhetorical sequences using at least 5 different figures.'
- section: Підсумок та саморефлексія (Summary and Self-Reflection)
  words: 200
  points:
  - 'Consolidation of the rhetoric taxonomy: A comprehensive review of chiasmus, zeugma,
    oxymoron, and antimetabole.'
  - 'Self-assessment checklist: Evaluating one''s ability to deploy rhetorical devices
    for maximum persuasive impact without compromising naturalness.'
vocabulary_hints:
  required:
  - красномовство (eloquence) — ораторське красномовство, мистецтво красномовства;
    high frequency in formal/literary register.
  - хіазм (chiasmus) — синтаксичний хіазм, дзеркальний хіазм; term for mirror structure.
  - оксиморон (oxymoron) — вживати оксиморон, яскравий оксиморон; State Standard §4.3.3
    alignment.
  - зевгма (zeugma) — одне дієслово, різні об'єкти; focus on compositional interaction.
  - асиндетон (asyndeton) — безсполучниковість для створення ритму та динаміки промови.
  - полісиндетон (polysyndeton) — багатосполучниковість для урочистості та накопичення
    значень.
  - антиметабола (antimetabole) — зворотне повторення слів у зворотному порядку для
    акцентування.
  - пафос (pathos/passion) — піднесений пафос, громадянський пафос; емоційна наповненість
    промови.
  recommended:
  - перорація (peroration) — завершальна частина промови з найбільшим емоційним навантаженням.
  - інвектива (invective) — гостра інвектива, політична інвектива; вдаватися до інвективи.
  - еліпсис (ellipsis) — стилістичний еліпсис для лаконічності та динамізму (Standard
    §4.3.4).
  - кільцева композиція (ring composition) — повтор елементів вступу у висновку для
    завершеності.
  - плеоназм (pleonasm) — мовна надмірність, якої слід уникати на користь риторичного
    повтору.
