module: c2-021
level: C2
sequence: 21
version: '1.2'
title: 'Поглиблена риторика: філософія та стратегія слова'
subtitle: 'Просунута риторика'
focus: professional
pedagogy: seminar
objectives:
  - Опанувати складні стратегії переконування та еристичної аргументації
  - Аналізувати механізми маніпулятивного впливу та методи протидії їм у 
    публічному дискурсі
  - Дослідити еволюцію українського ораторського мистецтва від бароко до 
    сучасності
  - Сформувати навички побудови концептуально цілісної промови для академічної 
    та політичної аудиторій
content_outline:
  - section: Епістемічні основи риторики
    words: 1250
    subsections:
      - Риторика як інструмент пізнання та соціальної взаємодії
      - 'Класичний канон: інвенція, диспозиція, елокуція, меморія, акція'
      - 'Неориторика ХХ століття: переосмислення переконування'
    key_concepts:
      - епістема
      - інвенція
      - елокуція
      - персуазивність
  - section: Еристика та теорія аргументації
    words: 1250
    subsections:
      - 'Структура доведення: теза, аргументи, демонстрація'
      - 'Логічні помилки та свідомі софізми: класифікація та розпізнавання'
      - 'Мистецтво полеміки: стратегії захисту та нападу в дискусії'
    key_concepts:
      - еристика
      - софізм
      - дедукція
      - аргументація
    primary_sources:
      - Феофан Прокопович, 'Про риторичне мистецтво'
      - Григорій Сковорода, 'Розмова, звана алфавіт, чи буквар світу'
  - section: Психологія та прагматика публічного виступу
    words: 1250
    subsections:
      - Етос, пафос і логос як складники авторитету оратора
      - 'Маніпулятивні технології: нейролінгвістичне програмування та когнітивні упередження'
      - Вербальні та невербальні засоби сугестії
    key_concepts:
      - сугестія
      - етос
      - пафос
      - прагматика
  - section: Український риторичний ідеал
    words: 1250
    subsections:
      - Традиція 'живого слова' в українській культурі
      - Аналіз промов визначних діячів (М. Грушевський, В. Чорновіл)
      - Сучасна політична та військова риторика України
    key_concepts:
      - націєтворчий дискурс
      - ораторський ідеал
      - інгеренція
      - комунікативна стратегія
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Науковий трактат
    topic: 'Аналіз барокової риторики Феофана Прокоповича. Джерело: ''De Arte Rhetorica''.'
    key_elements:
      - метафорика
      - періодизація речення
      - дидактизм
    motivation: Розуміння витоків української риторичної школи та її зв'язку з 
      античною традицією.
  - source_type: Політична промова
    topic: 'Промови В''ячеслава Чорновола: аналіз аргументативної бази та емоційного
      впливу.'
    key_elements:
      - риторичні питання
      - антитеза
      - патріотичний пафос
    motivation: Вивчення практичного застосування риторичних фігур у боротьбі за
      державність.
listening_situations:
  - media_type: лекція
    setting: 'Університетська лекція про маніпуляції в медіа-дискурсі: розбір фейків
      та пропагандистських кліше.'
    focus_points:
      - Маркери маніпуляції
      - Логічні розриви в аргументації
    motivation: Розвиток критичного слухання та здатності розпізнавати приховані
      інтенції.
writing_tasks:
  - task_type: есе
    prompt: Напишіть критичний аналіз сучасної телевізійної полеміки, 
      зосередившись на етичних та логічних аспектах аргументації сторін.
    requirements:
      - мінімум 500 слів
      - виявлення мінімум 3 логічних помилок
      - оцінка ефективності етосу ораторів
    motivation: Практичне застосування теоретичних знань з еристики для аналізу 
      живого мовлення.
    model_answer: Аналіз має містити чітку ідентифікацію софізмів, опис 
      стратегій сторін та висновок про те, чи була досягнута мета комунікації 
      (переконання чи маніпуляція).
discussion_topics:
  - context: Чи може риторика бути морально нейтральною, чи вона завжди несе в 
      собі етичне навантаження?
    questions:
      - Де проходить межа між переконуванням та маніпуляцією?
      - Чи має оратор нести відповідальність за наслідки своїх слів?
    motivation: Обговорення етичних вимірів мовленнєвого впливу.
activity_hints:
  - type: critical-analysis
    hint: Проаналізуйте аргументативну базу та логічні помилки (софізми) у 
      поданій полемічній промові
  - type: essay-response
    hint: Напишіть критичний аналіз телевізійної полеміки з виявленням 
      маніпулятивних прийомів
  - type: authorial-intent
    hint: Визначте риторичну стратегію оратора (етос, пафос, логос) на основі 
      поданого тексту виступу
  - type: error-correction
    hint: Знайдіть логічні розриви та маніпулятивні прийоми у поданому 
      аргументативному тексті
references:
  - Прокопович Ф. Про риторичне мистецтво — витоки української риторичної школи
  - Сковорода Г. Розмова, звана алфавіт, чи буквар світу — діалогічна риторика
  - Заболотний О. В. Українська мова, 11 клас (2019), с. 177-198 — засоби 
    переконування
  - 'State Standard 2024: C2 SS 4.3 (Stylistics)'
