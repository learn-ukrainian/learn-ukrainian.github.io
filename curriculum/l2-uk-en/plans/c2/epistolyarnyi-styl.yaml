module: c2-009
level: C2
sequence: 9
version: '1.3'
title: 'Епістолярний стиль: культура інтелектуального діалогу'
subtitle: 'Епістолярний стиль: культура діалогу'
focus: cultural
pedagogy: workshop
objectives:
  - 'Глибоко вивчити еволюцію українського епістолярію: від ділового листування минулих
    епох до філософських роздумів'
  - Навчитися використовувати складні етикетні формули, витончені звертання та 
    засоби мовленнєвої ввічливості
  - Аналізувати епістолярну спадщину українських інтелектуалів як форму 
    інтелектуальної автобіографії
  - Опанувати трансформацію епістолярних жанрів у сучасних цифрових форматах при
    збереженні високої культури висловлювання
content_outline:
  - section: Епістолярій як соціокультурний феномен
    words: 1250
    subsections:
      - 'Історія українського листування: від козацьких літописів до інтелектуальних
        салонів'
      - 'Функції епістолярного стилю: комунікативна, експресивна та документальна'
      - 'Жанрова диференціація: приватний, офіційний та відкритий лист'
    key_concepts:
      - епістолографія
      - адресант
      - адресат
      - етикет
    primary_sources:
      - Листи Лесі Українки до рідних та друзів
      - Листування Михайла Драгоманова та Івана Франка
  - section: Лінгвістична палітра епістолярного тексту
    words: 1250
    subsections:
      - 'Формули звертання та прощання: відображення соціальної дистанції та емоційної
        близькості'
      - 'Емоційно-експресивна лексика та фразеологія: від інтимності до патетики'
      - 'Специфіка займенникової системи: використання ''Ви'' та ''ти'' як стилістичний
        маркер'
    key_concepts:
      - гоноратив
      - сповідальність
      - діалогізм
      - інтимізація
  - section: Синтаксис та композиція листа
    words: 1250
    subsections:
      - 'Архітектоніка класичного листа: зачин, виклад, епілог та постскриптум'
      - Використання вставних конструкцій, вигуків та риторичних звертань
      - 'Психологізм епістолярного мовлення: передача складних відтінків думки та
        почуттів'
    key_concepts:
      - дискурс
      - епістолярій
      - постскриптум
      - ліризм
  - section: Епістолярій у цифрову епоху
    words: 1250
    subsections:
      - 'Електронний лист vs паперовий: зміна темпоритму та глибини висловлювання'
      - 'Етикет мережевого спілкування: збереження мовної норми в месенджерах'
      - 'Лист у художньому творі: епістолярний роман та його сучасні модифікації'
    key_concepts:
      - нетикет
      - дигіталізація
      - стилізація
      - автентичність
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Приватний лист
    topic: 'Аналіз епістолярного стилю Василя Стуса. Джерело: Василь Стус, ''Листи
      до сина''.'
    key_elements:
      - самоактуалізація
      - моральний імператив
      - метафора
      - філософська рефлексія
    motivation: Вивчення мови як засобу духовного опору та інтелектуального 
      виховання.
  - source_type: Відкритий лист
    topic: 'Публіцистичний пафос у відкритих листах. Джерело: Михайло Коцюбинський,
      відкритий лист до Г. Сенкевича.'
    key_elements:
      - громадянська позиція
      - риторичні фігури
      - іронія
    motivation: Розуміння особливостей поєднання епістолярного та 
      публіцистичного стилів.
listening_situations:
  - media_type: аудіо
    setting: 'Радіовистава: листування між Лесею Українкою та Сергієм Мержинським.'
    focus_points:
      - Передача психологічного стану через інтонацію
      - Використання пауз та акцентів для підсилення змісту
    motivation: Аналіз аудіального втілення емоційної напруги епістолярного 
      тексту.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть відповідь на лист Василя Стуса до сина від імені сучасної 
      молодої людини, яка рефлексує над тими ж моральними проблемами.
    requirements:
      - мінімум 300 слів
      - використання засобів мовленнєвого етикету
      - аргументація власної позиції
    motivation: Розвиток навичок ведення інтелектуального діалогу з класикою.
    model_answer: Текст має бути написаний у формі листа, зберігаючи поважний, 
      але щирий тон. Слід продемонструвати розуміння ключових тез Стуса, 
      апелюючи до його цитат. Важливо використати вишукану лексику та складні 
      синтаксичні конструкції.
discussion_topics:
  - context: Чи вбиває швидкість комунікації (месенджери) глибину думки? Чи 
      можливий розквіт епістолярію у XXI столітті?
    questions:
      - Як формат повідомлення впливає на вибір лексики та структуру речень?
      - Чи можна вважати довгі пости у соціальних мережах сучасним аналогом 
        відкритих листів?
    motivation: Дебати про майбутнє культури спілкування у світі технологій.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про епістолярій як соціокультурний феномен і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про лінгвістична палітра епістолярного тексту, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Епістолярій як соціокультурний феномен». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему епістолярій як соціокультурний феномен."
  - type: comparative-study
    focus: "Порівняйте різні підходи до епістолярій як соціокультурний феномен: Історія українського листування: від козацьких літописів до інтелектуальних сало. Визначте спільне та відмінне."
references:
  - Стус В. Листи до сина — зразок інтелектуального епістолярію
  - Листування Лесі Українки — еталон культури інтелектуального діалогу
  - Глазова О. П. Українська мова, 11 клас (2019), §40 — епістолярний стиль
phase: C2.1 [Stylistic Perfection]
