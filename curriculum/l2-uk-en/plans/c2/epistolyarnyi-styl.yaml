vocabulary_hints:
  required:
  - кореспонденція (correspondence) — ділова/приватна кореспонденція, вести листування;
    висока частотність в офіційному контексті
  - звертання (salutation) — офіційне звертання, етикетні формули; критичне використання
    кличного відмінка
  - реквізит (requisite/element) — обов'язкові реквізити, кутовий штамп; технічний
    термін діловодства
  - адресат (addressee) — шановний адресат; той, кому призначено лист (плутанина з
    адресантом)
  - адресант (sender) — вказати адресанта; той, хто відправляє лист
  - супровідний (accompanying/cover) — супровідний лист до резюме; стандарт для професійної
    комунікації
  - рекомендаційний (recommendation) — лист-рекомендація; важливий елемент кар'єрного
    просування
  - скарга (complaint) — обґрунтована скарга; юридично-ділова термінологія
  - подяка (gratitude/thanks) — офіційна подяка; етикетний інструмент
  - підпис (signature) — власноручний підпис; увага на відсутність коми після імені
    в українській традиції
  recommended:
  - рекламація (claim/complaint) — подати рекламацію; специфічний термін для торговельних
    відносин
  - претензія (claim) — висунути претензію; юридичний відтінок у діловому листуванні
  - нетикет (netiquette) — правила нетикету, цифровий етикет; медійна та ІТ-термінологія
  - етикет (etiquette) — мовний етикет; ширше поняття норм поведінки в мовленні
  - формула (formula) — етикетна формула; стійкі вирази для початку та завершення
    листа
  - інтерпретація (interpretation) — інтерпретація епістолярного тексту; для аналізу
    листів письменників
  - контекстуалізація (contextualization) — історична контекстуалізація; зв'язок листів
    з епохою
  - дискурс (discourse) — епістолярний дискурс; академічний термін для C2
