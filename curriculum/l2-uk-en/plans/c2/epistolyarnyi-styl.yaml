content_outline:
- section: Вступ — Феномен епістолярію (Introduction — The Epistolary Phenomenon)
  words: 500
  points:
  - 'Епістолярний стиль як самостійна функціональна система: визначення згідно з Держстандартом
    §4.3.1.1 та історія становлення в Україні'
  - 'Типологія листів: розмежування офіційно-ділового (документального) та суто епістолярного
    стилів, зони їхнього перетину в діловій практиці'
  - 'Етикетна функція листа: значення соціальної дистанції та вибір мовних засобів
    залежно від статусу адресата'
- section: Офіційно-ділові листи та Державний стандарт (Official and Business Letters
    and the State Standard)
  words: 900
  points:
  - 'Нормативні вимоги до офіційного листа (Держстандарт §4.3.4): система звертань
    («Пані і панове!», «Шановний пане голово!») та їх стилістичне навантаження'
  - 'Реквізити документа: кутовий штамп, дата, реєстраційний номер, адресат — правила
    оформлення з використанням професійної термінології'
  - 'Специфіка функціональних листів: логічна структура та кліше для написання запитів,
    скарг, рекламацій та листів-подяк'
  - 'Реквізит «підпис»: правильне оформлення та пунктуаційна пастка — заборона ставлення
    коми після імені/прізвища (порівняння з англійською пунктуацією)'
- section: 'Ділова та електронна комунікація: еволюція нетикету (Business and Electronic
    Communication: Evolution of Netiquette)'
  words: 1000
  points:
  - 'Цифрова трансформація листування: email-етикет проти месенджерів — правила нетикету
    в сучасному українському бізнес-середовищі'
  - 'Гібридні форми комунікації: робочі чати як поєднання офіційного тону з елементами
    розмовності; небезпека надмірного використання емодзі та скорочень'
  - 'Комерційні пропозиції та презентаційні листи: мистецтво аргументації та утримання
    уваги адресата в цифровому просторі'
  - 'Learner error: калькування вітань — розбір помилкового «Доброго дня!» та перехід
    до нормативних «Добрий день!» або «Вітаю!» у діловому контакті'
- section: Приватна кореспонденція та культурна пам'ять (Private Correspondence and
    Cultural Memory)
  words: 1000
  points:
  - 'Епістолярій Лесі Українки як взірець інтелектуального модернізму: аналіз листів
    до Ольги Кобилянської як приклад емоційної довершеності та стилю'
  - '«Листи до сина» Василя Стуса: епістолярний жанр як форма духовного заповіту та
    виховного дискурсу в екстремальних умовах'
  - 'Тон і стиль приватного листа: від інтимної щирості до інтелектуальної дискусії
    — роль епістолярної спадщини у збереженні української ідентичності'
  - 'Мовний портрет адресанта: як стиль приватного листування відображає рівень культури
    та епоху (аналіз лексичного складу історичних листів)'
- section: 'Практикум: трансформація та подолання типових помилок (Workshop: Transformation
    and Overcoming Common Errors)'
  words: 600
  points:
  - 'Трансформація тексту за Держстандартом §4.3.7: перетворення неформального повідомлення
    у месенджері на офіційний email із дотриманням усіх реквізитів'
  - 'Корекційна робота: аналіз кейсів із порушенням регістрів (наприклад, використання
    сленгу в першому контакті) та виправлення пунктуації підписів'
  - 'Складання супровідного та рекомендаційного листів: практичне застосування формул
    звертання та завершальних етикетних зворотів'
  - 'Саморедагування: чек-лист для перевірки відповідності листа обраному стилеві
    та дотримання норм сучасного українського правопису'
