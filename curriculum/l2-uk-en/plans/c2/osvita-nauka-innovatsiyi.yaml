module: c2-074
level: C2
sequence: 74
version: 1.2.2
title: 'Освіта, наука, інновації: Майбутнє знань та технологій'
subtitle: 'Освіта і наука: майбутнє знань'
focus: vocabulary
pedagogy: seminar
objectives:
- Аналізувати сучасні освітні парадигми та науково-технологічні тренди засобами 
  української мови найвищого рівня
- Опанувати термінологію у сферах інноваційного менеджменту, вищої освіти та 
  наукових досліджень
- Розвинути навички ведення дискусій про майбутнє знань, штучний інтелект та 
  цифровізацію освіти
- Дослідити історію української науки та її роль у формуванні національної 
  інтелектуальної еліти
content_outline:
- section: 'Трансформація вищої освіти: глобальні контексти'
  words: 1250
  subsections:
  - 'Автономія університетів та академічна свобода: український досвід та світові
    стандарти'
  - Навчання впродовж життя (Lifelong Learning) як виклик часу та мовна 
    репрезентація цього концепту
  - Міжнародна академічна мобільність та інтеграція в європейський освітній 
    простір
  key_concepts:
  - академічна свобода
  - автономія
  - інтернаціоналізація
  - компетентнісний підхід
  primary_sources:
  - Іван Пулюй, 'Мова і наука' (аргументація на користь української мови як мови
    високої науки)
- section: Наука як фундамент інноваційного розвитку
  words: 1250
  subsections:
  - 'Пріоритетні напрями наукових досліджень в Україні: від фундаментальної фізики
    до біотехнологій'
  - Проблеми фінансування науки та комерціалізації інтелектуальної власності
  - 'Наукова комунікація: публікаційна активність, наукометрія та відкрита наука'
  key_concepts:
  - інтелектуальна власність
  - комерціалізація
  - наукометрія
  - фундаментальні дослідження
- section: Екосистема інновацій та технологічний прогрес
  words: 1250
  subsections:
  - Роль стартапів, технопарків та R&D центрів у сучасній економіці
  - 'Штучний інтелект (AI) та автоматизація: соціолінгвістичні та етичні наслідки'
  - 'Цифрова трансформація суспільства: від ''держави у смартфоні'' до кібербезпеки'
  key_concepts:
  - стартап
  - технопарк
  - штучний інтелект
  - кібербезпека
  primary_sources:
  - Стратегія розвитку вищої освіти в Україні на 2022–2032 роки (аналіз ключових
    візій та термінології)
- section: Етика науки та академічна доброчесність
  words: 1250
  subsections:
  - 'Запобігання плагіату та фальсифікаціям у науковому середовищі: мовні та правові
    аспекти'
  - Відповідальність вченого перед суспільством та екологічна етика технологій
  - Формування культури академічної доброчесності у студентському середовищі
  key_concepts:
  - академічна доброчесність
  - плагіат
  - рецензування
  - відповідальність
- section: Підсумок — Summary
  words: 300
  points:
  - 'Review advanced terminology for higher education, science, and innovation: академічна
    свобода, інтернаціоналізація, наукометрія, and штучний інтелект.'
  - 'Self-check: What is the difference between фундаментальні дослідження and комерціалізація?
    Describe 3 ethical challenges of штучний інтелект in the context of академічна
    доброчесність.'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики, неологізми'
- 'Ворон, 11 клас (2019): с. 239-240 — Професійний дискурс'
reading_situations:
- source_type: Науково-публіцистичне есе
  topic: Аналіз поглядів Івана Пулюя на роль рідної мови у науковому пізнанні за
    працею 'Мова і наука'.
  key_elements:
  - термінотворення
  - культурна ідентичність
  - інтелектуальний розвиток
  motivation: Глибоке усвідомлення важливості української мови у високих 
    інтелектуальних сферах.
- source_type: Державна стратегія
  topic: Дослідження візій та пріоритетів 'Стратегії розвитку вищої освіти в 
    Україні'. Аналіз мови стратегічного планування.
  key_elements:
  - людський потенціал
  - якість освіти
  - конкурентоспроможність
  motivation: Вивчення офіційного дискурсу освітньої та наукової політики.
listening_situations:
- media_type: лекція
  setting: Виступ відомого українського футуролога про вплив технологій на 
    професії майбутнього.
  focus_points:
  - Навички, що будуть затребувані у 2030-х роках
  - Зміна освітньої парадигми під впливом ШІ
  motivation: Аналіз сучасного візіонерського та технологічного дискурсу.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть аналітичне есе на тему ''Штучний інтелект у наукових дослідженнях:
    помічник чи загроза академічній доброчесності?''. Оцініть етичні та прагматичні
    аспекти.'
  requirements:
  - мінімум 700 слів
  - використання наукової термінології
  - пропозиції щодо регулювання
  motivation: Розвиток навичок критичного аналізу сучасних технологічних 
    викликів.
  model_answer: Текст має бути збалансованим, містити аналіз ризиків 
    використання ШІ у написанні робіт, обґрунтування нових підходів до 
    оцінювання знань та бути написаним мовою високої складності.
discussion_topics:
- context: Чи повинна вища освіта бути доступною для всіх, чи вона має стати 
    елітарним привілеєм для кращих?
  questions:
  - Як масовість освіти впливає на її якість та наукові досягнення?
  - Яку роль відіграє мова викладання у формуванні наукових шкіл?
  motivation: Дебати про майбутнє університетської освіти та науки.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про трансформація вищої освіти: глобальні контексти і дайте
    відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про наука як фундамент 
    інноваційного розвитку, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Трансформація вищої
    освіти: глобальні контексти». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему трансформація
    вищої освіти: глобальні контексти.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до трансформація вищої освіти: глобальні контексти:
    Автономія університетів та академічна свобода: український досвід та світові ста.
    Визначте спільне та відмінне.'
