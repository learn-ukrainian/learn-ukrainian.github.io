vocabulary_hints:
  required:
  - новина (news) — свіжа новина, фейкова новина, стрічка новин, спростовувати новину
  - джерело (source) — надійне джерело, перевірене джерело, витік інформації, посилатися
    на джерело
  - висвітлення (coverage) — об'єктивне висвітлення подій, всебічне висвітлення теми,
    медійне висвітлення
  - вплив (influence) — вплив на громадську думку, здійснювати вплив, сфера впливу
  - об'єктивність (objectivity) — журналістська об'єктивність, дотримуватися принципу
    об'єктивності
  - фактчекінг (fact-checking) — інструмент боротьби з дезінформацією, проект StopFake
  - вживати заходів (to take measures) — нормативний вислів; уникати кальки «приймати
    міри»
  recommended:
  - спростування (refutation) — офіційне спростування недостовірної інформації
  - ексклюзив (exclusive) — ексклюзивне інтерв'ю, отримати ексклюзивні дані
  - згідно із (according to) — вживати «згідно із законом / правилами»; уникати «згідно
    закону»
  - маніпуляція (manipulation) — маніпуляція фактами, прихована маніпуляція свідомістю
  - свобода слова (freedom of speech) — фундаментальний принцип демократичних медіа,
    Премія імені Ґонґадзе
