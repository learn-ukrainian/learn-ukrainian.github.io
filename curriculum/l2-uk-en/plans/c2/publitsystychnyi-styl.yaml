module: c2-005
level: C2
sequence: 5
version: '1.3'
title: Публіцистичний стиль та медіа-дискурс
subtitle: Публіцистичний стиль і медіадискурс
focus: vocabulary
pedagogy: seminar
objectives:
  - Аналізувати риторичні засоби впливу в аналітичних та полемічних текстах на 
    рівні експерта
  - Опанувати суспільно-політичну лексику та фразеологію в усіх її нюансах
  - Навчитися деконструювати медіа-повідомлення, виявляючи факти, оцінки та 
    маніпуляції
  - Розвинути навички створення авторського медіа-контенту високої якості
content_outline:
  - section: Функції та стильові домінанти публіцистики
    words: 1250
    subsections:
      - Інформативна, переконувальна та виховна функції медіа-тексту
      - Поєднання логічності доказів з емоційною експресивністю
      - Сучасна українська політична метафора
    key_concepts:
      - маніпуляція
      - експресивність
      - актуальність
      - публіцистичність
  - section: Жанрове розмаїття та еволюція сучасних медіа
    words: 1250
    subsections:
      - 'Класичні жанри: репортаж, нарис, памфлет, фейлетон'
      - 'Аналітична публіцистика: стаття, колонка, огляд'
      - 'Нові медіа: лонгріди, блоги, подкасти, сторітелінг'
    key_concepts:
      - інтерв'ю
      - памфлет
      - лонгрід
      - конвергенція
  - section: Мовна гра, підтекст та засоби впливу
    words: 1250
    subsections:
      - Використання іронії, сарказму та гротеску як засобів полеміки
      - Алюзії та ремінісценції в суспільно-політичному дискурсі
      - Риторичні фігури та тропи у заголовках та лідах
    key_concepts:
      - алегорія
      - підтекст
      - дискурс
      - інтертекстуальність
  - section: Критичне мислення та медіаграмотність
    words: 1250
    subsections:
      - Механізми формування громадської думки через мову
      - Протидія фейкам та маніпуляціям у сучасному інформаційному просторі
      - Етика та відповідальність публіциста
    key_concepts:
      - верифікація
      - об'єктивність
      - наратив
      - медіа-гігієна
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Памфлет
    topic: 'Аналіз полемічної майстерності у класичній українській публіцистиці. Джерело:
      Микола Хвильовий, ''Україна чи Малоросія?''.'
    motivation: Вивчення гострої інтелектуальної полеміки та засобів виразності.
listening_situations:
  - media_type: подкаст
    setting: 'Дискусія сучасних інтелектуалів про майбутнє української культури. Джерело:
      подкаст ''Простими словами'' або ''Культурний трибунал''.'
    focus_points:
      - Використання інтелектуального сленгу та термінології
      - Стратегії аргументації у живому мовленні
    motivation: Аналіз високого рівня публіцистичного мовлення у цифровому 
      форматі.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть авторську колонку про вплив штучного інтелекту на майбутнє 
      національних мов, використовуючи яскраві метафори, риторичні запитання та 
      переконливу аргументацію.
    motivation: Відпрацювання суб'єктивного, емоційно забарвленого та 
      інтелектуально насиченого стилю викладу.
    model_answer: 'Текст має бути переконливим, містити чітку авторську позицію, залучати
      читача через звертання. Мова — експресивна, з використанням неологізмів та оціночних
      епітетів. Структура: яскравий заголовок, теза, аргументи, несподіваний висновок.'
discussion_topics:
  - context: 'Свобода слова vs інформаційна безпека: чи має публіцистика бути абсолютно
      вільною, чи держава має право на цензуру в умовах гібридної війни?'
    questions:
      - Як балансувати між патріотизмом та об'єктивністю?
      - Яка роль емоцій у сучасному сприйнятті політичних новин?
    motivation: Розвиток здатності вести складні дискусії на межі лінгвістики, 
      журналістики та соціології.
activity_hints:
  - type: critical-analysis
    hint: Деконструюйте маніпулятивні прийоми та риторичні засоби впливу у 
      поданому медіа-тексті
  - type: essay-response
    hint: Напишіть авторську колонку з яскравими метафорами, риторичними 
      запитаннями та чіткою позицією
  - type: error-correction
    hint: Виправте порушення стилістичної норми (змішування стилів, невдалі 
      штампи) у публіцистичному тексті
  - type: select
    hint: Визначте жанр поданих медіа-текстів (репортаж, нарис, памфлет, 
      фейлетон, колонка)
references:
  - Глазова О. П. Українська мова, 11 клас (2019), §41 — публіцистичний стиль
  - Заболотний О. В. Українська мова, 11 клас (2019), с. 177-198 — мовленнєві 
    жанри
  - Хвильовий М. Україна чи Малоросія? — зразок полемічної публіцистики
  - 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
