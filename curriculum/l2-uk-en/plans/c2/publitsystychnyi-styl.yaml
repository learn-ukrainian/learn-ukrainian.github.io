content_outline:
- section: 'Вступ: Публіцистичний стиль як інструмент впливу (Introduction: Publicistic
    Style as a Tool of Influence)'
  words: 750
  points:
  - 'Визначення функцій публіцистики згідно з Державним стандартом (§4.3.1.1): інформування,
    переконання та формування громадської думки.'
  - 'Культурний контекст: Премія імені Георгія Ґонґадзе як символ незалежної журналістики
    та її роль у розвитку свободи слова в Україні.'
  - Аналіз поняття «вплив на громадську думку» та етичні межі журналістського втручання
    в суспільні процеси.
- section: Жанри інформаційної журналістики та стандарти фактчекінгу (Information
    Journalism Genres and Fact-checking Standards)
  words: 1000
  points:
  - 'Структура новини: розширене застосування моделі «перевернутої піраміди» та формула
    5W+H для побудови ефективного ліду.'
  - 'Стандарти журналістики (IMI/BBC): об''єктивність, баланс думок, точність та відокремлення
    фактів від коментарів.'
  - 'Методологія StopFake (§3.20): практичні алгоритми деконструкції пропаганди, фейкових
    новин та верифікації джерел інформації.'
  - 'Робота з джерелами: надійні vs анонімні джерела, поняття «витік інформації» та
    відповідальність за поширення неперевірених даних.'
- section: 'Репортаж та інтерв''ю: ефект присутності та етика діалогу (Reportage and
    Interview: Presence Effect and Dialogue Ethics)'
  words: 750
  points:
  - 'Мова репортажу: створення «ефекту очевидця» через деталізацію, динаміку та використання
    активних дієслівних конструкцій.'
  - 'Типова помилка: надмірне вживання пасивного стану («було повідомлено») — тренування
    переходу до активної агентності («ЗМІ повідомили»).'
  - 'Інтерв''ю як жанр: підготовка, стратегії ставлення запитань та етичне цитування
    прямої мови героя.'
- section: Аналітична стаття та авторська колонка (Analytical Article and Authorial
    Column)
  words: 900
  points:
  - 'Структура аналітичного тексту: від постановки проблеми до аргументованих висновків
    та експертних прогнозів.'
  - 'Розвиток авторського голосу в колонці та есеї: використання риторичних запитань,
    іронії та метафор для підсилення позиції.'
  - Різниця між «стандартом новини» (нейтральність) та «авторським поглядом» (суб'єктивність)
    у сучасному українському медіапросторі.
- section: Культура мови та стилістична коректність (Linguistic Culture and Stylistic
    Correctness)
  words: 900
  points:
  - 'Подолання лексичних кальок: заміна суржикових висловів (напр., «приймати міри»)
    на нормативні відповідники («вживати заходів»).'
  - Усунення канцеляризмів та офіційно-ділових штампів у журналістському тексті для
    досягнення живої та експресивної мови.
  - 'Дотримання норм узгодження: правильне вживання конструкцій «згідно із законом»
    замість помилкового «згідно закону».'
- section: 'Практикум: Створення та критичний аналіз медіатекстів (Workshop: Creating
    and Critically Analyzing Media Texts)'
  words: 700
  points:
  - Написання оперативного повідомлення (новини) з дотриманням стандартів об'єктивності
    та перевірки фактів (§4.3.6).
  - Трансформація офіційного прес-релізу в цікавий для аудиторії журналістський матеріал
    (репортаж або за замітку).
  - 'Редагування тексту: виявлення маніпуляцій, прихованої пропаганди та мовних помилок
    у запропонованих медіа-кейсах.'
