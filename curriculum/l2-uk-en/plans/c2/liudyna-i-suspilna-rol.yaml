module: c2-066
level: C2
sequence: 66
version: '1.0'
title: 'Людина і суспільна роль: Ідентичність, гідність та права особистості'
subtitle: 'Людина і суспільна роль'
focus: vocabulary
pedagogy: seminar
objectives:
  - Аналізувати концепт людської гідності та правосуб'єктності у сучасному
    українському дискурсі
  - Опанувати термінологію соціальної стратифікації, маргіналізації та
    інклюзивності на рівні академічного аналізу
  - Досліджувати еволюцію соціальних ролей та ідентичностей в українському
    суспільстві через призму літератури та публіцистики
  - Розвинути навички критичного аналізу текстів про права людини, соціальну
    справедливість та громадянську відповідальність
content_outline:
  - section: 'Гідність і правосуб''єктність: філософські засади людського статусу'
    words: 1000
    subsections:
      - 'Концепт гідності в українській філософській традиції: від Сковороди до
        сучасності'
      - Правосуб'єктність та права людини в українському конституційному дискурсі
      - 'Мовна репрезентація людської гідності: лексика поваги, визнання та захисту'
    key_concepts:
      - гідність
      - правосуб'єктність
      - самоідентифікація
      - людський вимір
    primary_sources:
      - Григорій Сковорода, 'Розмова, названа Алфавіт, або Буквар миру' (вибрані
        афоризми про внутрішню людину та самопізнання)
  - section: 'Соціальні ролі та стратифікація: між статусом і покликанням'
    words: 1000
    subsections:
      - 'Соціальна стратифікація в сучасній Україні: нерівність, мобільність, бар''єри'
      - Ґендерні ролі та їхня трансформація в українському суспільстві
      - Професійна ідентичність та її вплив на самовизначення особистості
    key_concepts:
      - стратифікація
      - соціалізація
      - ієрархія
      - самореалізація
  - section: 'Маргіналізація та інклюзивність: голоси на узбіччі суспільства'
    words: 1000
    subsections:
      - 'Механізми маргіналізації: стигматизація, дискримінація, виключення'
      - Інклюзивний дискурс та мова поваги в українському публічному просторі
      - Емпатія як основа соціальної комунікації та порозуміння
    key_concepts:
      - маргіналізація
      - стигматизація
      - дискримінація
      - інклюзивність
    primary_sources:
      - Софія Андрухович, 'Фелікс Австрія' (вибрані фрагменти про соціальну
        нерівність та приниження людської гідності)
  - section: 'Волонтерство та громадянська відповідальність: від індивіда до спільноти'
    words: 1000
    subsections:
      - Волонтерський рух як феномен національної стійкості після 2014 року
      - Громадянськість і підзвітність у контексті місцевого самоврядування
      - 'Мова мобілізації та солідарності: дискурс-аналіз волонтерських наративів'
    key_concepts:
      - волонтерство
      - громадянськість
      - підзвітність
      - самоврядування
  - section: 'Особистість у цифрову епоху: нові виміри ідентичності та приналежності'
    words: 1000
    subsections:
      - Цифрова ідентичність та проблема автентичності в соціальних мережах
      - Толерантність і емпатія в умовах інформаційних бульбашок
      - 'Перспективи людяності: штучний інтелект, біоетика та межі визначення
        ''людини'''
    key_concepts:
      - толерантність
      - емпатія
      - аутсайдер
      - самоідентифікація
word_target: 5000
vocabulary_hints:
  required:
    - гідність
    - правосуб'єктність
    - самоідентифікація
    - маргіналізація
    - стратифікація
    - інклюзивність
    - волонтерство
    - самореалізація
    - громадянськість
    - соціалізація
  recommended:
    - ієрархія
    - дискримінація
    - толерантність
    - емпатія
    - аутсайдер
    - стигматизація
    - підзвітність
    - самоврядування
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Філософський трактат
    topic: Аналіз афоризмів Григорія Сковороди про самопізнання та «внутрішню
      людину». Дослідження мовних засобів бароко.
    key_elements:
      - сродна праця
      - внутрішня людина
      - мікрокосм
    motivation: Осмислення філософського фундаменту поняття людської гідності в
      українській традиції.
  - source_type: Сучасний роман
    topic: Дослідження зображення соціальної нерівності у фрагментах роману Софії
      Андрухович «Фелікс Австрія». Аналіз мовних засобів створення образу
      маргіналізованої людини.
    key_elements:
      - соціальний статус
      - приниження
      - внутрішній конфлікт
    motivation: Розвиток навичок аналізу художнього зображення соціальних проблем.
listening_situations:
  - media_type: лекція
    setting: Виступ українського філософа про еволюцію концепту гідності від
      козацьких часів до сьогодення.
    focus_points:
      - Трансформація уявлень про честь та гідність
      - Вплив Революції Гідності на суспільний дискурс
    motivation: Аналіз академічного мовлення на філософську тематику.
writing_tasks:
  - task_type: есе
    prompt: Напишіть аналітичне есе на тему «Людська гідність як фундамент
      суспільного договору в Україні». Поєднайте філософську рефлексію з аналізом
      сучасних соціальних процесів.
    requirements:
      - мінімум 700 слів
      - використання філософської та соціологічної термінології
      - аргументована авторська позиція з посиланнями на джерела
    motivation: Перевірка здатності до складного міждисциплінарного аналізу.
    model_answer: Есе має поєднувати українську філософську традицію
      (Сковорода, Шевченко) з сучасним правозахисним дискурсом, демонструючи
      глибоке володіння мовою високого інтелектуального рівня.
discussion_topics:
  - context: Чи змінює цифрова епоха сутність людської ідентичності, чи лише
      форми її вираження?
    questions:
      - Де межа між реальною та цифровою ідентичністю?
      - Як зберегти автентичність в умовах інформаційного перевантаження?
    motivation: Дебати про природу ідентичності в технологізованому світі.
activity_hints:
  - type: reading
    focus: 'Проаналізувати філософські афоризми Сковороди про самопізнання:
      визначити ключові ідеї та мовні засоби бароко'
  - type: essay-response
    focus: Написати аналітичне есе про людську гідність як фундамент суспільного
      договору в Україні
  - type: critical-analysis
    focus: Оцінити аргументацію у тексті про маргіналізацію та інклюзивність в
      українському суспільстві
  - type: fill-in
    focus: 'Доповнити текст соціологічною термінологією: стратифікація,
      маргіналізація, самоідентифікація'
  - type: error-correction
    focus: Виправити кальки та росіянізми у публіцистичному тексті про соціальні
      ролі та права людини
