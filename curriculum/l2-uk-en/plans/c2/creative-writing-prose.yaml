content_outline:
- section: Вступ — Проза як мистецтво (Introduction — Prose as Art)
  words: 500
  points:
  - 'Від споживача до творця: перехід до активної письменницької позиції у сучасному літературному процесі.'
  - 'Термінологічна диференціація за матеріалами дослідження: розмежування ''оповідання'' (ширший термін) та ''новели'' (фокус
    на психологізмі та несподіваному фіналі).'
- section: Жанрова специфіка та наративні стратегії (Genre Specificity and Narrative Strategies)
  words: 900
  points:
  - 'Наративні стратегії: вибір між лінійним та нелінійним наративом; роль наратора у формуванні довіри читача.'
  - 'Сюжетна архітектура: розвиток ''закрученого сюжету'' та вибудовування ''сюжетних ліній'' без логічних провалів.'
  - 'Фокалізація на практиці: використання внутрішньої фокалізації для глибшого розкриття психологічного стану персонажа.'
- section: Техніка потоку свідомості та синтаксис (Stream of Consciousness and Syntax)
  words: 1000
  points:
  - 'Потік свідомості (stream of consciousness) через призму Стандарту §4.3.4: використання еліпсису, парцеляції та асиндетону
    для імітації плину думок.'
  - 'Художній ефект синтаксису: застосування повторів та риторичних запитань (§4.3.4) для створення ритму та емоційної напруги.'
  - 'Культурний гачок: аналіз фрагментарного синтаксису в ''Intermezzo'' Михайла Коцюбинського як еталону української психологічної
    прози.'
- section: Побудова світу та сенсорна деталізація (World Building and Sensory Detailing)
  words: 800
  points:
  - 'Хронотоп (часопростір) у власній прозі: концепція міського чи сільського хронотопу як активного учасника подій.'
  - 'Подолання статичних описів: заміна ланцюжків прикметників (типова помилка) на динамічні сенсорні деталі та дієслівні
    конструкції.'
  - 'Атмосфера і настрій: техніка створення ''густого'' (dense) стилю за прикладом Оксани Забужко.'
- section: Діалог та природність мовлення (Dialogue and Naturalness of Speech)
  words: 1000
  points:
  - 'Корекція кальок: заміна повторюваних англіцизмів ''He said/She said'' багатим спектром українських дієслів мовлення (зауважив,
    прошепотів, відгукнувся, кинув).'
  - 'Голос персонажа через просодію: використання підтексту та індивідуальних мовленнєвих маркерів.'
  - 'Подолання надуживання займенником ''Я'': відпрацювання техніки pro-drop (опускання підмета) для досягнення природного
    звучання першої особи.'
- section: Редагування та письменницька майстерність (Editing and Writing Craft)
  words: 800
  points:
  - 'Мовне шліфування: вибір між ''телеграфним'' стилем та складним модерністським синтаксисом залежно від мети.'
  - 'Kill your darlings: методи структурного редагування та видалення зайвих елементів для посилення ідеї.'
  - Підготовка до публікації та участь у творчих майстернях як шлях інтеграції в професійну спільноту.
vocabulary_hints:
  required:
  - оповідання (short story) — 'писати оповідання', 'збірка оповідань'; висока частотність, загальний термін
  - сюжет (plot) — 'закручений сюжет', 'розвиток сюжету', 'сюжетна лінія'; ключовий термін структури
  - персонаж (character) — 'головний персонаж', 'другорядний персонаж', 'розкриття персонажа'
  - фокалізація (focalization) — 'внутрішня фокалізація', 'зміна фокалізації'; академічний реєстр для аналізу точки зору
  - хронотоп (chronotope) — 'часопростір', 'міський хронотоп'; термін для C2 для аналізу часу і місця
  - наратив (narrative) — 'наративна стратегія', 'зміна наративу', 'лінійний наратив'
  recommended:
  - новела (novella) — психологізм, несподіваний фінал; вужчий жанр, ніж оповідання
  - потік свідомості (stream of consciousness) — техніка асоціативного письма; пов'язано з еліпсисом (§4.3.4)
  - еліпсис (ellipsis) — пропуск елементів речення для динаміки; згідно зі Стандартом §4.3.4
  - асиндетон (asyndeton) — безсполучниковість; засіб посилення експресії
  - підтекст (subtext) — прихований зміст діалогу
