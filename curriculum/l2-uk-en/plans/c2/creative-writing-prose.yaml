module: creative-writing-prose
level: C2
sequence: 34
version: "1.0"
title: "Творче письмо: архітектоніка художньої прози"
subtitle: "Creative Writing: Architectonics of Fiction"
focus: literature
pedagogy: workshop
objectives:
  - "Вивчити структурні елементи художнього твору: експозицію, зав'язку, кульмінацію та розв'язку"
  - "Опанувати техніку створення психологічно переконливого персонажа (героя)"
  - "Навчитися працювати з наративними перспективами та голосом оповідача"
  - "Розвинути вміння створювати атмосферу та художній простір (хронотоп)"
content_outline:
  - section: "Побудова сюжету та композиція"
    words: 1000
    subsections:
      - "Лінійна та нелінійна композиція: флешбеки, ретардація, кільцевий сюжет"
      - "Конфлікт як рушійна сила оповіді: зовнішній та внутрішній виміри"
      - "Сюжетні вузли та тримання читацької уваги (саспенс)"
    key_concepts:
      - "композиція"
      - "фабула"
      - "перипетія"
      - "розв'язка"
    primary_sources:
      - "Михайло Коцюбинський, 'Intermezzo' (приклад нелінійної структури)"
      - "Юрій Яновський, 'Вершники' (новела як структурна одиниця роману)"
  - section: "Антропологія персонажа"
    words: 1000
    subsections:
      - "Способи портретування: пряма характеристика, вчинок, мовлення, деталь"
      - "Динаміка героя: еволюція чи деградація протягом твору"
      - "Типові та індивідуальні риси: як уникнути кліше та стереотипів"
    key_concepts:
      - "протагоніст"
      - "антагоніст"
      - "психологізм"
      - "мотивація"
  - section: "Наратологія: хто і як розповідає"
    words: 1000
    subsections:
      - "Перша особа (Я-нарація): інтимність та обмеженість знання"
      - "Всезнаючий автор vs сторонній спостерігач"
      - "Техніка 'потоку свідомості' та внутрішній монолог"
    key_concepts:
      - "нарація"
      - "точка зору"
      - "ненадійний оповідач"
      - "потік свідомості"
  - section: "Стилістична майстерність та деталь"
    words: 1000
    subsections:
      - "Роль художньої деталі у творенні образу та атмосфери"
      - "Ритм прози: чергування описів, діалогів та роздумів"
      - "Редагування тексту: усунення штампів та пошук точного слова"
    key_concepts:
      - "символічна деталь"
      - "екстер'єр"
      - "інтер'єр"
      - "художній час"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Новела"
    topic: "Аналіз психологічного стану героя в новелі Михайла Коцюбинського 'Intermezzo'."
    key_elements: ["втома", "діалог з сонцем", "метафорика природи"]
    motivation: "Вивчення майстерності імпресіоністичної прози та внутрішнього сюжету."
  - source_type: "Роман у новелах"
    topic: "Стилістична єдність та композиційна роздробленість 'Вершників' Юрія Яновського."
    key_elements: ["епічність", "романтика", "символіка степу"]
    motivation: "Розуміння жанрових експериментів в українській прозі XX століття."
listening_situations:
  - media_type: "лекція"
    setting: "Лекція відомого сучасного письменника про 'Мистецтво початку: як захопити читача першим реченням'."
    focus_points:
      - "Гачок (hook) сюжету"
      - "Встановлення тону оповіді"
    motivation: "Ознайомлення з практичними порадами щодо старту літературного твору."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Створіть психологічний портрет персонажа (мінімум 300 слів), використовуючи лише опис його кімнати та одну характерну деталь зовнішності, не називаючи прямо його рис характеру."
    requirements: ["використання художньої деталі", "непряма характеристика", "багата прикметникова лексика"]
    motivation: "Розвиток навичок непрямого портретування (show, don't tell)."
    model_answer: "Текст має дозволити читачеві самостійно зробити висновки про характер, звички та минуле персонажа через оточення."
discussion_topics:
  - context: "Чи може бути сюжет без конфлікту? Чи достатньо лише описів та роздумів для повноцінної прози?"
    questions:
      - "Яка роль читацької уяви у заповненні прогалин у сюжеті?"
      - "Що робить історію універсальною для різних культур?"
    motivation: "Дискусія про фундаментальні закони оповідного мистецтва."
