module: c2-012
level: C2
sequence: 12
version: 1.2.1
title: 'Лексична стилістика: багатство та точність слова'
subtitle: 'Лексична стилістика: багатство слова'
focus: vocabulary
pedagogy: seminar
objectives:
- Досягти досконалості у використанні синонімічного багатства української мови для створення найтонших значеннєвих відтінків
- Опанувати культуру слововживання через розрізнення паронімів, омонімів та стилістично маркованої лексики
- Дослідити потенціал фразеологізмів, афоризмів та авторських неологізмів як засобів стилістичної експресії
- Навчитися уникати лексичних помилок, тавтології та плеоназмів на рівні майстерного володіння мовою
content_outline:
- section: Синонімія як стилістичний ресурс
  words: 1250
  subsections:
  - 'Абсолютні та контекстуальні синоніми: межі замінності'
  - 'Стилістичні та ідеографічні відтінки синонімів: від нейтрального до емоційно-експресивного'
  - 'Градація як стилістична фігура: нагнітання синонімів для підсилення образу'
  key_concepts:
  - синонімічний ряд
  - домінанта
  - конатація
  - градація
- section: 'Культура слововживання: паронімія та багатозначність'
  words: 1250
  subsections:
  - 'Паронімічні пари в українській мові: запобігання змішуванню значень (абонент/абонемент тощо)'
  - Полісемія та омонімія як засіб створення мовної гри та каламбуру
  - Стилістичне використання застарілої лексики (архаїзми, історизми) та неологізмів
  key_concepts:
  - паронім
  - полісемія
  - каламбур
  - неологізм
  primary_sources:
  - Микола Зеров, 'Лекції з історії української літератури' (лексична точність)
  - Борис Антоненко-Давидович, 'Як ми говоримо'
- section: Фразеологія та крилаті вислови
  words: 1250
  subsections:
  - 'Стилістична диференціація фразеології: від народнорозмовної до книжної'
  - Трансформація фразеологізмів як засіб авторської виразності
  - Крилаті вислови, афоризми та цитати як маркери інтелектуального стилю
  key_concepts:
  - ідіома
  - крилатий вислів
  - афористичність
  - дефразеологізація
- section: Стилістична чистота та енергія слова
  words: 1250
  subsections:
  - 'Подолання лексичної надмірності: тавтологія, плеоназм та прихована тавтологія'
  - Боротьба з суржиком та калькованими конструкціями на вищому рівні мовної компетенції
  - Естетика лаконізму та точність лексичного вибору в різних функціональних стилях
  key_concepts:
  - пуризм
  - лаконізм
  - калька
  - суржик
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - error-correction
  - highlight-morphemes
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Художній уривок
  topic: 'Аналіз багатства епітетів та метафор у прозі Ольги Кобилянської. Джерело: ''Valse mélancolique''.'
  key_elements:
  - екзистенція
  - меланхолія
  - естетизм
  - вишуканість
  motivation: Вивчення лексичних засобів творення психологічного портрета.
- source_type: Критична стаття
  topic: 'Аналіз лексичного складу сучасної української поезії. Джерело: сучасні літературні огляди.'
  key_elements:
  - метаметафора
  - дискурс
  - постмодерністський палімпсест
  motivation: Розуміння термінологічної лексики в гуманітарній сфері.
listening_situations:
- media_type: інтерв'ю
  setting: Бесіда з мовознавцем про майбутнє української лексики та виклики англіцизмів.
  focus_points:
  - Ставлення експерта до запозичень
  - Використання синонімів до іноземних слів
  motivation: Розвиток здатності до критичного сприйняття мовних запозичень.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть критичний відгук на статтю про загрозу суржику, використовуючи виключно високу літературну лексику, уникаючи
    при цьому будь-яких штампів.
  requirements:
  - мінімум 350 слів
  - використати 3 різні фразеологізми
  - продемонструвати багатство синоніміки
  motivation: Тренування лексичної чистоти та виразності.
  model_answer: Текст має бути взірцем академічної та художньої мови. Автор повинен показати розуміння проблеми суржику не
    лише як лінгвістичного, а й як ментального явища. Важливо продемонструвати володіння синонімічним рядом до слова 'мова'
    та 'культура'.
discussion_topics:
- context: Чи є запозичення з англійської мови ознакою прогресу чи свідченням мовної бідності?
  questions:
  - Як знайти баланс між пуризмом та природним розвитком мови?
  - Чи варто створювати українські відповідники для всіх технічних термінів?
  motivation: Обговорення стратегій розвитку словникового складу мови.
activity_hints:
- type: reading
  focus: Прочитайте текст про синонімія як стилістичний ресурс і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про культура слововживання: паронімія та багатозначність, використовуючи
    нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Синонімія як стилістичний ресурс». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему синонімія як стилістичний ресурс.
- type: comparative-study
  focus: 'Порівняйте різні підходи до синонімія як стилістичний ресурс: Абсолютні та контекстуальні синоніми: межі замінності.
    Визначте спільне та відмінне.'
references:
- Антоненко-Давидович Б. Як ми говоримо — калькування та лексична чистота
- Караман С. О. Українська мова, 10 клас (2018), §38 — лексичні засоби стилістики
- Глазова О. П. Українська мова, 11 клас (2019), §40 — стилістичне забарвлення лексики
- 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
