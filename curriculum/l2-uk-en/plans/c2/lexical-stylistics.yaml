content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Лексична стилістика як наука про точність та доречність слововживання; виклики для Senior Specialist у сучасному дискурсі.
  - Реалізація вимог §4.3.3 Державного стандарту 2024 щодо володіння стилістичними засобами лексики на рівні C2.
  - 'Поняття денотації та конотації: аналіз емоційного, експресивного та стилістичного забарвлення слова в різних регістрах.'
- section: 'Синонімія: мистецтво вибору (Synonymy: The Art of Choice)'
  words: 900
  points:
  - 'Культурний гачок: «Репресовані синоніми» 1930-х років — історія штучного звуження синонімічних рядів для наближення української
    мови до російської (на прикладі слів «обрій», «виднокіл»).'
  - Багатство «Словаря» Бориса Грінченка як ілюстрація точності народної лексики (десятки назв для відтінків вітру та дощу).
  - Типи синонімів (абсолютні, часткові, контекстуальні); стратегії уникнення тавтології та плеоназмів («пам'ятний сувенір»,
    «вільна вакансія»).
- section: Антонімія та Омонімія (Antonymy and Homonymy)
  words: 750
  points:
  - 'Сила контрасту: типи антонімів, використання антитези та оксиморону як потужних стилістичних прийомів у текстах Коцюбинського.'
  - 'Омоніми vs Полісемія (багатозначність): розрізнення лексичної омонімії та гри значень; каламбур як інструмент інтелектуального
    стилю.'
  - Контекстуальні антоніми як засіб створення індивідуального авторського голосу.
- section: 'Пароніми: мистецтво розрізнення (Paronyms: The Art of Distinction)'
  words: 900
  points:
  - 'Аналіз типових паронімічних пасток: «військовий» (стосується війська) vs «воєнний» (стосується війни); «тактовний» (ввічливий)
    vs «тактичний» (тактика).'
  - 'Подолання міжмовної інтерференції: правильне вживання слова «вважати» (to consider) замість хибного калькованого «рахувати».'
  - Робота зі словниками паронімів для редагування професійних текстів та уникнення смислових помилок.
- section: Стилістично маркована лексика (Stylistically Marked Vocabulary)
  words: 750
  points:
  - Архаїзми та історизми як засіб створення урочистості (High Register); межа доречності використання застарілої лексики.
  - Індивідуально-авторські неологізми (§4.3.3) для свіжості викладу на прикладі творчості Забужко та Андруховича.
  - 'Діалектизми та жаргонізми: створення автентичного колориту vs ризики втрати професіоналізму в офіційному спілкуванні.'
- section: Тропи та фігури мовлення (Tropes and Figures of Speech)
  words: 750
  points:
  - 'Система художніх тропів згідно зі Стандартом: метафора, метонімія, синекдоха, епітет, порівняння, гіпербола та литота.'
  - 'Евфемізми як засіб мовної коректності та етики: аналіз політичних евфемізмів та способів оминання табуйованих тем.'
  - Перифраз як інструмент лаконічності та образної заміни прямих найменувань.
- section: 'Практикум: Мистецтво редагування (Workshop: The Art of Editing)'
  words: 450
  points:
  - Аналіз лексичної точності в есеїстиці сучасних інтелектуалів (Хвильовий, Хрицак); вибір найвлучнішого слова з синонімічного
    ряду.
  - Практичні вправи на виправлення плеоназмів («прейскурант цін») та калькованих конструкцій («рахувати за необхідне»).
  - 'Творче редагування: трансформація нейтрального повідомлення на стилістично багатий текст Senior Specialist.'
vocabulary_hints:
  required:
  - синонім (synonym) — синонімічний ряд, абсолютний/частковий синонім, контекстуальний синонім
  - паронім (paronym) — паронімічна пара, сплутування паронімів, словник паронімів
  - конотація (connotation) — негативна/позитивна конотація, емоційно-експресивне забарвлення
  - троп (trope) — художній троп, система тропів, метафоричний перенос
  - евфемізм (euphemism) — політичний евфемізм, вживати евфемізми, мовне табу
  - денотація (denotation) — пряме лексичне значення, денотативний центр
  - антонім (antonym) — антитеза, оксиморон, контекстуальний антонім
  - омонім (homonym) — лексична омонімія, каламбур, гра слів
  - архаїзм (archaism) — застаріла лексика, історизм, архаїзація мовлення
  - неологізм (neologism) — індивідуально-авторське новоутворення, оновлення лексикону
  recommended:
  - каламбур (pun) — гра значень, доречність у риториці
  - антитеза (antithesis) — різкий контраст, художнє протиставлення
  - оксиморон (oxymoron) — поєднання логічно несумісних понять
  - литота (litotes) — художнє зменшення, протилежність гіперболи
  - перифраз (periphrasis) — описовий зворот, засіб елімінації повторів
  - плеоназм (pleonasm) — мовна надмірність, лексична помилка («вільна вакансія»)
  - калькування (calquing) — дослівний переклад з іншої мови, лексична інтерференція
