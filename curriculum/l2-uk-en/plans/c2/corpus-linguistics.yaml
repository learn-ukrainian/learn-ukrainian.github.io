module: c2-089
level: C2
sequence: 89
version: 1.2.1
title: Корпусна лінгвістика
subtitle: Корпусна лінгвістика
focus: integration
pedagogy: workshop
objectives:
- Ознайомитися з теоретичними засадами та практичними інструментами корпусної лінгвістики
- Навчитися працювати з Генеральним регіональним анотованим корпусом української мови (ГРАК)
- Опанувати методи аналізу частотності слів, пошуку колокацій та верифікації мовних норм
- Дослідити можливості використання корпусів для перекладу та наукових досліджень
content_outline:
- section: 'Вступ до корпусної лінгвістики: від теорії до інструментів'
  words: 1250
  subsections:
  - Що таке корпус текстів і чому він важливий для сучасного мовознавства
  - 'Типологія корпусів: анотовані, паралельні, діахронні та спеціалізовані'
  - 'Огляд основних українських корпусів: ГРАК, BrUK, корпус UberText'
  key_concepts:
  - корпус
  - анотація
  - лематизація
  - корпусна репрезентативність
  primary_sources:
  - Документація ГРАК (інструкції користувача та опис структури корпусу)
- section: 'Практична робота з ГРАК: пошук та аналіз'
  words: 1250
  subsections:
  - 'Складні запити в ГРАК: використання регулярних виразів та морфологічних тегів'
  - Аналіз контексту (KWIC — Key Word In Context) та інтерпретація результатів
  - 'Статистика в корпусі: IPM (Instances Per Million) та її значення'
  key_concepts:
  - конкорданс
  - IPM
  - морфологічний тег
  - регулярний вираз
  primary_sources:
  - Приклади видачі конкордансу для частотних та рідкісних слів
- section: Колокації, частотність та мовна норма
  words: 1250
  subsections:
  - Вивчення типової сполучуваності слів через корпусні дані
  - Порівняння частотності синонімів та вибір найбільш природного варіанту
  - Виявлення архаїзмів та неологізмів через діахронний аналіз корпусу
  key_concepts:
  - колокація
  - міра асоціації
  - статистична значущість
  - узус
  primary_sources:
  - Дослідження С. Шарова про корпусні методи в українській лексикографії
- section: Корпуси в перекладацькій та науковій практиці
  words: 1250
  subsections:
  - 'Паралельні корпуси як інструмент перекладача: пошук еквівалентів'
  - Корпусний підхід до вивчення граматичних трансформацій
  - 'Перспективи розвитку корпусів: великі мовні моделі та машинне навчання'
  key_concepts:
  - паралельний корпус
  - трансляційна еквівалентність
  - машинне навчання
  - цифрова гуманітаристика
  primary_sources:
  - Статті з лінгвістичного порталу 'Mova.info' про цифрові ресурси
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - select
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Варіантність, діалекти'
- 'Державний стандарт 2024: C2 — лінгвістична компетенція'
reading_situations:
- source_type: наукова стаття / інструкція
  topic: 'Методологія побудови та анотування українських корпусів: досвід ГРАК.'
  key_elements:
  - розмітка
  - метадані
  - репрезентативність
  motivation: Розуміння внутрішньої логіки побудови лінгвістичних баз даних.
- source_type: лінгвістичне дослідження
  topic: Аналіз еволюції слова 'воля' в українській літературі XIX-XXI ст. за даними ГРАК.
  key_elements:
  - діахронний зріз
  - семантичні зсуви
  - частотний графік
  motivation: Демонстрація того, як кількісні дані допомагають у якісному філологічному аналізі.
listening_situations:
- media_type: лекція
  setting: 'Вебінар для лінгвістів: ''Як корпуси змінюють словники''. Доповідач розповідає про перегляд значень слів на основі
    реального вжитку.'
  focus_points:
  - Невідповідність словникових дефініцій реальному узусу
  - Нові типи колокацій у сучасному медіа-дискурсі
  motivation: Розвиток здатності сприймати інформацію про сучасні цифрові методи в лінгвістиці.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть звіт (репортаж) про невелике власне лінгвістичне дослідження. Виберіть пару синонімів (наприклад, 'мати'
    та 'посідати') і за допомогою ГРАК проаналізуйте їхню частотність та типові контексти вжитку в офіційному та художньому
    стилях.
  requirements:
  - мінімум 400 слів
  - використання числових даних (IPM)
  - короткі висновки про доречність використання
  motivation: Практичне застосування корпусних інструментів для вирішення стилістичних завдань.
  model_answer: Звіт має містити чітко сформульовану мету, опис кроків у корпусі, порівняльну таблицю або опис результатів
    та обґрунтовані рекомендації щодо вжитку.
discussion_topics:
- context: Чи замінять корпуси та штучний інтелект традиційних лексикографів та мовознавців?
  questions:
  - Чи може статистика вловити всі нюанси поетичної мови?
  - Які ризики надмірної довіри до корпусних даних?
  motivation: Дискусія про роль людини та алгоритму в сучасному мовознавстві.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про вступ до корпусної лінгвістики: від теорії до інструментів і дайте відповіді на запитання щодо
    ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про практична робота з грак: пошук та аналіз, використовуючи нову лексику
    модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Вступ до корпусної лінгвістики: від теорії до інструментів».
    Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему вступ до корпусної лінгвістики: від теорії
    до інструментів.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до вступ до корпусної лінгвістики: від теорії до інструментів: Що таке корпус текстів і
    чому він важливий для сучасного мовознавства. Визначте спільне та відмінне.'
