content_outline:
- section: 'Вступ — Творча нефікція як жанр (Introduction: Creative Nonfiction as Genre)'
  words: 600
  points:
  - 'Defining creative nonfiction (документальна проза): the boundary between fiction and non-fiction, the role of literary
    technique in factual writing, and the genre''s growing prestige in Ukrainian literature.'
  - 'Ukrainian tradition of creative nonfiction: from chronicle writing (літописна традиція) through publicistic prose (публіцистика)
    to contemporary documentary literature.'
  - 'Genre taxonomy: essayistic prose (есеїстика), memoir (мемуари), literary reportage (літературний репортаж), travel writing
    (подорожній нарис) as distinct but overlapping forms.'
- section: Есеїстична традиція (Essay Tradition)
  words: 900
  points:
  - 'Ukrainian essayistic tradition: Khvylovyi''s polemical pamphlets as essays of ideas, Zabuzhko''s intellectual essays
    blending philosophy with personal voice, Zhadan''s war-era reflective prose.'
  - 'Montaigne tradition vs. Ukrainian transformation: the European personal essay adapted through Ukrainian rhetorical and
    literary conventions; the role of polemic (полеміка) in Ukrainian essay culture.'
  - 'Essay structure and voice: building an argument through association rather than formal logic; the essay as a space for
    intellectual exploration and provisional thinking in Ukrainian academic and literary discourse.'
- section: Мемуарне письмо (Memoir Writing)
  words: 900
  points:
  - 'Memoirist techniques: fragmentation (фрагментарність), unreliable narrator (ненадійний оповідач), temporal shifts (зсуви
    часу), and the interplay of memory and imagination.'
  - 'Ukrainian memoirs as literary form: Kobylianska''s diaries as self-fashioning, Dovzhenko''s wartime diary as national
    testimony, Stus''s camp notes as existential literature.'
  - 'The memoir vs. autobiography distinction: selective memory as artistic choice; constructing a narrative arc from lived
    experience without falsifying the record.'
- section: Літературний репортаж (Literary Reportage)
  words: 800
  points:
  - 'Ukrainian reportage tradition: from interwar reportage through Soviet-era limitations to the contemporary renaissance;
    Zhadan''s blending of reportage with novelistic technique.'
  - 'Techniques of immersive journalism: scene construction, dialogue reconstruction, participant observation, and the controlled
    use of first-person perspective in factual narrative.'
  - 'War reportage and documentary prose: the unique challenges of writing about conflict — balancing testimony with literary
    form, avoiding exploitation of suffering, maintaining factual integrity under emotional pressure.'
- section: Подорожній нарис та культурне есе (Travel Writing and Cultural Essay)
  words: 800
  points:
  - 'Ukrainian travel writing tradition: Andrukhovych''s geographic essays as cultural criticism, place-based writing as a
    method of understanding identity and landscape.'
  - 'Cultural essay as genre: writing about art, music, architecture, and food as vehicles for exploring Ukrainian identity;
    the intersection of personal experience and cultural analysis.'
  - 'Techniques of place-based writing: sensory detail, historical layering, and the psychogeographic approach to Ukrainian
    spaces (urban and rural).'
- section: Голос та етика нефікції (Voice and Ethics in Nonfiction)
  words: 600
  points:
  - 'Truth obligation: the nonfiction contract with the reader; degrees of fictionalization and their ethical implications;
    fact-checking and verification as writerly responsibility.'
  - 'Privacy and consent: ethical representation of real people, the right to tell vs. the right to privacy, informed consent
    in memoir and reportage.'
  - 'Positionality and power: who has the right to tell whose story; avoiding extractive narratives; the ethics of witness
    and testimony in Ukrainian war literature.'
- section: 'Практикум — Початок творчої нефікції (Workshop: Opening a Creative Nonfiction Piece)'
  words: 400
  points:
  - 'Writing exercise: compose the opening 300-500 words of a creative nonfiction piece (essay, memoir fragment, or reportage
    scene) using techniques covered in the module.'
  - 'Peer critique protocol: evaluating voice consistency, factual grounding, literary technique, and ethical awareness in
    peer nonfiction drafts.'
  - 'Revision strategy: identifying and strengthening the central tension or question that drives a nonfiction narrative forward.'
vocabulary_hints:
  required:
  - документальна проза (documentary prose/creative nonfiction) — жанр документальної прози, межа між фікцією та нефікцією
  - есе (essay) — інтелектуальне есе, полемічне есе, есеїстична традиція
  - мемуари (memoir) — писати мемуари, мемуарна література; selective personal narrative
  - репортаж (reportage) — літературний репортаж, воєнний репортаж; immersive factual narrative
  - свідчення (testimony/witness) — особисте свідчення, свідчення очевидця; ethical witness in nonfiction
  - нарис (essay/sketch) — подорожній нарис, культурний нарис; Ukrainian nonfiction genre term
  recommended:
  - фрагментарність (fragmentation) — фрагментарна оповідь, техніка фрагментарності; memoir technique
  - публіцистика (publicistic prose) — публіцистичний стиль, гостра публіцистика; Ukrainian essay-polemic tradition
  - психогеографія (psychogeography) — психогеографічний підхід, дослідження простору; place-based writing method
  - ненадійний оповідач (unreliable narrator) — стратегія ненадійного оповідача; controlled subjectivity technique
  - автофікція (autofiction) — межа між автобіографією та фікцією; contemporary hybrid genre
