module: c2-035
level: C2
sequence: 35
version: '1.2'
title: 'Творче письмо: креативний нон-фікшн та есеїстика'
subtitle: 'Креативне письмо: есеїстика'
focus: literature
pedagogy: workshop
objectives:
  - 'Опанувати жанрові форми креативного нон-фікшну: мемуари, репортаж, тревелог,
    літературний портрет'
  - Розвинути навички поєднання документальної точності з художньою виразністю
  - Навчитися структурувати інтелектуальне есе на основі особистого досвіду та 
    рефлексії
  - Вивчити етичні аспекти написання про реальних людей та події
content_outline:
  - section: Документальність та художній вимисел
    words: 1250
    subsections:
      - 'Що таке креативний нон-фікшн: межі жанру та свобода автора'
      - Фактчекінг vs суб'єктивна інтерпретація в художньому репортажі
      - Роль автора як учасника та спостерігача подій
    key_concepts:
      - нон-фікшн
      - художня документалістика
      - автентичність
      - суб'єктивізм
    primary_sources:
      - Микола Хвильовий, 'Подорож ученого доктора Леонардо...' (як 
        експериментальний тревелог)
      - Артем Чех, 'Точка нуль' (сучасний військовий щоденник)
  - section: Мемуаристика та література факту
    words: 1250
    subsections:
      - 'Мистецтво спогаду: як перетворити автобіографію на літературний твір'
      - 'Літературний портрет: відтворення особистості через деталь та діалог'
      - Щоденникова проза та її стилістичні особливості
    key_concepts:
      - мемуари
      - автобіографізм
      - ретроспекція
      - щоденник
  - section: Художній репортаж та есеїстика
    words: 1250
    subsections:
      - 'Побудова сюжету в нон-фікшн: конфлікт у реальному житті'
      - 'Тревелог: опис простору як подорож до себе'
      - 'Інтелектуальне есе: від тези до метафоричного узагальнення'
    key_concepts:
      - тревелог
      - репортаж
      - дискурс
      - концептуалізація
  - section: Етика та відповідальність автора
    words: 1250
    subsections:
      - 'Правда vs приватність: етичні дилеми нон-фікшну'
      - Право на власну версію подій та проблема маніпуляції
      - 'Стилістичне редагування: як зробити реальність цікавішою за вимисел'
    key_concepts:
      - наративна етика
      - верифікація
      - інтерпретація
      - авторське право
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Репортаж / Щоденник
    topic: 'Аналіз стилю Артема Чеха в книзі ''Точка нуль'': лаконізм та емоційна
      стриманість.'
    key_elements:
      - окопна правда
      - деталь
      - відсутність пафосу
    motivation: Вивчення зразка сучасної української мілітарної 
      документалістики.
  - source_type: Мемуарна проза
    topic: Поєднання іронії та ностальгії в есеїстиці Юрія Андруховича.
    key_elements:
      - міфологізація простору
      - інтелектуальна гра
      - автобіографічний герой
    motivation: Розуміння стратегій творення 'автобіографічного міфу' в сучасній
      літературі.
listening_situations:
  - media_type: подкаст
    setting: Дискусія на тему 'Чому нон-фікшн сьогодні популярніший за романи?'
    focus_points:
      - Запит на справжність
      - Межі приватності
    motivation: Ознайомлення з тенденціями книжкового ринку та культурними 
      запитами суспільства.
writing_tasks:
  - task_type: репортаж
    prompt: Напишіть короткий художній репортаж (400-500 слів) про подію або 
      місце, де ви побували нещодавно. Зосередьтеся на звуках, запахах та 
      власних відчуттях, уникаючи сухого переліку фактів.
    requirements:
      - використання п'яти сенсорних деталей
      - наявність діалогу з реальним свідком
      - яскравий заголовок
    motivation: Практикування навичок 'занурення' читача в атмосферу 
      документальної оповіді.
    model_answer: Текст має бути динамічним, демонструвати спостережливість 
      автора та здатність до стилістичного опрацювання реального матеріалу.
discussion_topics:
  - context: Чи має автор право змінювати факти в мемуарах заради кращого 
      літературного ефекту?
    questions:
      - Де закінчується пам'ять і починається вимисел?
      - Чи зобов'язаний автор нон-фікшну бути об'єктивним?
    motivation: Дискусія про етичні межі та естетичні цілі художньої 
      документалістики.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про документальність та художній вимисел і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про мемуаристика та література факту, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Документальність та художній вимисел». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему документальність та художній вимисел."
  - type: comparative-study
    focus: "Порівняйте різні підходи до документальність та художній вимисел: Що таке креативний нон-фікшн: межі жанру та свобода автора. Визначте спільне та відмінне."
references:
  - Авраменко, 11 клас (Укр. літ.) — Літературний аналіз, жанри
  - Борзенко, 11 клас (Укр. літ.) — Сучасна українська література
  - 'Державний стандарт 2024: C2 — творче письмо, документальна проза'
