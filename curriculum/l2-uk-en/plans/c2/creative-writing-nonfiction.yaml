module: c2-035
level: C2
sequence: 35
slug: creative-writing-nonfiction
version: '2.0'
title: 'Творча нефікція: есеїстика, мемуари, репортаж'
subtitle: 'Creative Nonfiction: Essays, Memoirs, Reportage'
focus: literature
pedagogy: TTT
phase: C2.2 [Literature & Creative Writing]
word_target: 5000
objectives:
- Learner can analyze and produce creative nonfiction texts distinguishing between essayistic, memoirist, and reportage registers
- Learner can apply Ukrainian literary nonfiction conventions from Khvylovyi through Zabuzhko to contemporary war reportage
- Learner can construct memoir passages using techniques of fragmentation, temporal shifts, and controlled subjectivity
- Learner can navigate ethical considerations of truth, consent, and representation in nonfiction writing
