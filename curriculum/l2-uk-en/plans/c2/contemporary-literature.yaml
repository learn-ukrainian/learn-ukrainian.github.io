vocabulary_hints:
  required:
  - сучасний (contemporary) — сучасна література, сучасний світ; high frequency in
    cultural analysis
  - постмодернізм (postmodernism) — епоха постмодернізму, український постмодернізм;
    academic register
  - тенденція (trend) — основні тенденції, позитивна тенденція; key for analytical
    writing
  - покоління (generation) — молоде покоління, покоління незалежності; often used
    for literary grouping
  - дебют (debut) — літературний дебют, успішний дебют; specific to new authors
  - премія (prize/award) — лауреат премії, Шевченківська премія; indicator of prestige
  - видавництво (publishing house) — провідне видавництво, Форум видавців; industry
    terminology
  - ярмарок (fair/market) — книжковий ярмарок, Книжковий Арсенал; cultural infrastructure
  - війна (war) — воєнна література, досвід війни; central context for current narratives
  - ідентичність (identity) — національна ідентичність, пошук ідентичності; core sociocultural
    concept
  recommended:
  - автофікшн (autofiction) — blending autobiography and fiction; rising trend
  - магічний реалізм (magical realism) — literary style associated with Latin American
    and Ukrainian prose
  - слем (slam poetry) — performative poetry; register of youth subculture
  - трилер (thriller) — popular genre classification
  - бестселер (bestseller) — commercial success marker
  - письменник (writer) — correct term to avoid interference with 'писатель'
