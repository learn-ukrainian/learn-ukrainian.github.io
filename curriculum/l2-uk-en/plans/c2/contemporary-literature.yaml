module: c2-036
level: C2
sequence: 36
version: 1.2.1
title: Сучасний літературний процес в Україні
subtitle: Сучасний літературний процес в Україні
focus: literature
pedagogy: seminar
objectives:
- Проаналізувати ключові етапи розвитку української літератури від 1991 року до сьогодні
- Дослідити естетичні засади українського постмодернізму та його трансформацій
- Вивчити феномен сучасної мілітарної літератури та літератури травми
- Ознайомитися з творчістю провідних сучасних авторів та їхнім впливом на суспільний дискурс
content_outline:
- section: 'Зміна парадигми: література Незалежності'
  words: 1250
  subsections:
  - 'Відхід від соцреалізму: пошук нових форм та ідентичностей у 90-х'
  - Бу-Ба-Бу та карнавальна культура як виклик канону
  - 'Інтелектуалізація прози: Оксана Забужко та Юрій Андрухович'
  key_concepts:
  - постколоніалізм
  - дискурс
  - деконструкція
  - карнавальність
  primary_sources:
  - Оксана Забужко, 'Польові дослідження з українського сексу'
  - Юрій Андрухович, 'Московіада'
- section: Постмодернізм та його українське обличчя
  words: 1250
  subsections:
  - 'Гра з текстом: інтертекстуальність та алюзивність'
  - Іронія та пародія як засоби переосмислення історії
  - Київська іронічна школа та Станіславський феномен
  key_concepts:
  - інтертекстуальність
  - пастиш
  - ризома
  - метафікція
- section: 'Сучасна проза та поезія: нові вектори'
  words: 1250
  subsections:
  - 'Сергій Жадан: поетика індустріального сходу та волонтерський рух'
  - Новий реалізм та документалізм у літературі про війну
  - Жіноче письмо та феміністичний дискурс у сучасному тексті
  key_concepts:
  - новий реалізм
  - мілітарний роман
  - екзистенціалізм
  - ідентичність
- section: Література як дзеркало суспільства
  words: 1250
  subsections:
  - 'Літературні покоління: від ''вісімдесятників'' до ''двотисячників'''
  - Роль літератури у формуванні національного міфу
  - Сучасна драма та її експерименти з формою
  key_concepts:
  - літературна генерація
  - рецепція
  - культурна пам'ять
  - перформативність
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Авраменко, 11 клас (2019): Аналіз літературного процесу'
- 'Державний стандарт 2024: C2 — літературна компетенція'
reading_situations:
- source_type: Маніфест / Есе
  topic: 'Аналіз есе Юрія Андруховича про ''Станіславський феномен'': витоки та значення.'
  key_elements:
  - локальна ідентичність
  - європейський контекст
  - мова
  motivation: Розуміння географічних та культурних центрів сучасної літератури.
- source_type: Рецензія / Критична стаття
  topic: 'Тамара Гундорова про український постмодернізм: подолання колоніальної травми.'
  key_elements:
  - трансгресія
  - кітч
  - висока полиця
  motivation: Вивчення теоретичного підґрунтя сучасного літературного процесу.
listening_situations:
- media_type: інтерв'ю
  setting: 'Інтерв''ю з Сергієм Жаданом: ''Як література реагує на війну в режимі реального часу''.'
  focus_points:
  - Мова ненависті vs мова співчуття
  - Роль поета в сучасному світі
  motivation: Сприйняття живого голосу сучасної літератури та актуальних етичних питань.
writing_tasks:
- task_type: есе
  prompt: Проаналізуйте, як змінився образ українського героя в літературі від початку 90-х років до сьогодення на прикладі
    творів принаймні двох різних авторів.
  requirements:
  - мінімум 600 слів
  - аргументована теза про еволюцію героя
  - 'використання термінів: ідентичність, архетип'
  motivation: Розвиток навичок аналітичного осмислення літературного процесу в динаміці.
  model_answer: Есе має демонструвати глибоке знання текстів, здатність до узагальнень та розуміння соціально-політичного
    контексту літератури.
discussion_topics:
- context: Чи можна вважати сучасну українську літературу повністю вільною від комплексів минулого?
  questions:
  - Яка тема є найбільш табуйованою в сучасній прозі?
  - Чи має література бути 'національною' за змістом чи лише за мовою?
  motivation: Дискусія про самодостатність та майбутнє української літератури.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про зміна парадигми: література незалежності і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про постмодернізм та його українське обличчя, використовуючи нову лексику
    модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Зміна парадигми: література Незалежності». Обґрунтуйте свою
    позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему зміна парадигми: література незалежності.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до зміна парадигми: література незалежності: Відхід від соцреалізму: пошук нових форм та
    ідентичностей у 90-х. Визначте спільне та відмінне.'
phase: C2.2 [Literary Mastery]
