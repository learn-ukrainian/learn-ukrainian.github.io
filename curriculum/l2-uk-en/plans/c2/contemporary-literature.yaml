content_outline:
- section: Вступ — Літературний ландшафт сьогодення (Introduction — Today's Literary
    Landscape)
  words: 700
  points:
  - 'Періодизація сучасної літератури: від постмодернізму 90-х до ''нового реалізму''
    та воєнної прози'
  - Дискурс ідентичності в літературі незалежної України та відхід від радянського
    канону
  - 'Культурний контекст: як війна змінила роль письменника в суспільстві (інтелектуал
    vs волонтер)'
- section: Провідні автори та культурні ікони (Leading Authors and Cultural Icons)
  words: 1000
  points:
  - 'Сергій Жадан як ''голос покоління'': поєднання літератури, музики та волонтерства;
    феномен стадіонних читань'
  - 'Патріархи та матріархи: Юрій Андрухович (від Бу-Ба-Бу до сьогодні) та Оксана
    Забужко (філософська есеїстика та проза)'
  - 'Андрій Курков: вибір мови, світове визнання та представлення України на міжнародній
    арені'
  - Марія Матіос та психологізм історичної пам’яті в українській літературі
- section: Жанрова панорама та нове покоління (Genre Panorama and the New Generation)
  words: 1000
  points:
  - 'Трансформація історичного роману: пошук відповідей на сучасні виклики через минуле'
  - 'Популярні жанри: детектив, трилер та магічний реалізм; розвиток українського
    фентезі'
  - Автофікшн та документальна проза як відповідь на травматичний досвід війни
  - 'Нова хвиля: автори 2010-х та 2020-х років, тематичні тенденції та формальні експерименти'
- section: Книжкова інфраструктура та індустрія (Book Infrastructure and Industry)
  words: 900
  points:
  - 'Фестивальне життя: Книжковий Арсенал (Київ) як мультидисциплінарний захід vs
    традиційний Форум видавців (Львів)'
  - Провідні видавництва (Старого Лева, Фабула, Віват) та їхня роль у формуванні читацьких
    смаків
  - Літературні премії (Шевченківська, Книга року ВВС, Angelus) як орієнтири якості
  - 'Цифрова трансформація: подкасти про книги, літературні блоги та роль соціальних
    мереж у промоції'
- section: Майстерня книжкового оглядача (Book Reviewer's Workshop)
  words: 1000
  points:
  - 'Роль книжкового оглядача: професійна термінологія (сюжетна арка, наратив, фокалізація,
    інтертекстуальність)'
  - 'Методологія написання рецензії: від аналізу задуму до критичної оцінки виконання'
  - 'Learner Error Focus: розрізнення понять ''сучасний'' (contemporary) та ''модерний''
    (modernist/early 20th century)'
  - 'Linguistic Correction: подолання інтерференції (вживання ''письменник'' замість
    русизму ''писатель'')'
  - 'Syntactic Drill: правильне керування дієслова ''цікавитися'' + орудний відмінок
    (цікавитися сучасною літературою)'
- section: 'Підсумок: Створення вторинних текстів (Summary: Creating Secondary Texts)'
  words: 400
  points:
  - 'Дотримання стандарту §4.3.8: створення рефератів та довідково-інформаційних повідомлень
    про літературні новинки'
  - 'Рекомендації для читання: формування власного літературного ''списку бажань'''
  - Власна позиція в літературному полі та вміння аргументувати вподобання
