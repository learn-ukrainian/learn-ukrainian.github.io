module: c2-091
level: C2
sequence: 91
version: 1.2.2
title: Вільне володіння на рівні носія
subtitle: Вільне володіння на рівні носія
focus: integration
pedagogy: workshop
objectives:
- Досягти майстерності у спонтанному мовленні на будь-які теми з використанням 
  складних конструкцій
- Глибоко зрозуміти культурні нюанси, метафори та приховані смисли в 
  українському дискурсі
- Опанувати ідіоматику, фразеологію та сучасний сленг для природного звучання
- Навчитися розпізнавати та використовувати гумор, іронію та сарказм як 
  інструменти комунікації
content_outline:
- section: Спонтанна комунікація та стратегії висловлювання
  words: 1250
  subsections:
  - Техніки підтримки тривалого діалогу без пауз та лексичних прогалин
  - Використання вставних слів та дискурсивних маркерів для структурування живої
    мови
  - Адаптація темпу та інтонації залежно від емоційного стану співрозмовника
  key_concepts:
  - мовленнєва швидкість
  - спонтанність
  - паралінгвістика
  - дискурсивна компетенція
  primary_sources:
  - Записи живих дискусій на суспільно-важливі теми (аналіз природних реакцій)
- section: Ідіоматика та фразеологічне багатство
  words: 1250
  subsections:
  - 'Фразеологізми як дзеркало національного менталітету: від класики до неофразеології'
  - 'Метафоричне мислення: як створювати власні образи, що звучать природно'
  - Крилаті вислови з літератури та кіно, що стали частиною повсякденного вжитку
  key_concepts:
  - фразеологізм
  - ідіома
  - концептуальна метафора
  - прецедентний текст
  primary_sources:
  - Фразеологічний словник української мови (вибірковий аналіз)
- section: Гумор, іронія та мовна гра
  words: 1250
  subsections:
  - 'Специфіка українського гумору: від доброзичливого сміху до гострої сатири'
  - 'Мовна гра: каламбури, перекручування слів та створення комічного ефекту'
  - 'Іронія та сарказм: межі доречності та засоби вербального вираження'
  key_concepts:
  - мовна гра
  - каламбур
  - сарказм
  - інтертекстуальність
  primary_sources:
  - Твори Остапа Вишні (аналіз засобів комічного)
- section: Культурні коди та асоціативне мислення
  words: 1250
  subsections:
  - 'Розуміння підтексту: те, що не сказано, але мається на увазі в українському середовищі'
  - 'Асоціативні зв''язки: чому певні образи викликають конкретні емоції (калина,
    верба, степ тощо)'
  - 'Емпатія та активне слухання: як стати ''своїм'' у мовній спільноті'
  key_concepts:
  - культурний код
  - асоціативне поле
  - лінгвокраїнознавство
  - комунікативна удача
  primary_sources:
  - Сучасні українські подкасти (наприклад, 'Вулиця' або 'Простими словами')
- section: Підсумок — Summary
  words: 300
  points:
  - Spontaneous communication relies on discourse markers (вставні слова) to 
    structure speech and avoid pauses. True fluency requires mastering idioms 
    (фразеологізми), wordplay (каламбури), and understanding cultural 
    associations (калина, степ).
  - 'Self-check: What is the difference between friendly humor and sharp sarcasm in
    Ukrainian discourse? Describe a recent event using at least 3 discourse markers
    to maintain flow. Can you explain the cultural subtext behind one of the idioms
    learned?'
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Діалекти, варіантність'
- 'Державний стандарт 2024: C2 — соціолінгвістична компетенція'
reading_situations:
- source_type: художня проза / есеїстика
  topic: Аналіз підтексту та іронії в есеїстиці Юрія Андруховича або Олександра 
    Бойченка.
  key_elements:
  - алюзії
  - інтелектуальна гра
  - прихований зміст
  motivation: Розвиток здатності бачити за текстом глибші культурні пласти.
- source_type: фразеологічний довідник
  topic: 'Еволюція українських фразеологізмів: від біблійних витоків до сучасних мемів.'
  key_elements:
  - етимологія
  - варіантність
  - узус
  motivation: Збагачення мовлення стійкими висловами, що роблять його 
    автентичним.
listening_situations:
- media_type: відео
  setting: 'Стендап-виступ сучасного українського коміка: як працюють мовні каламбури
    та актуальні культурні відсилки.'
  focus_points:
  - Реакція залу на специфічні слова
  - Використання паузи для підсилення комічного ефекту
  motivation: Розуміння живого, неформального та гострого мовлення в реальному 
    часі.
writing_tasks:
- task_type: відгук
  prompt: Напишіть іронічний або сатиричний відгук на вигадану (або реальну) 
    культурну подію (фільм, виставку, книгу), використовуючи принаймні 5 
    фразеологізмів та елементи мовної гри.
  requirements:
  - мінімум 300 слів
  - витриманий стиль
  - використання засобів іронії
  motivation: Відпрацювання навичок складного стилістичного маневрування в 
    письмовому тексті.
  model_answer: Відгук має бути не лише інформативним, а й демонструвати тонке 
    володіння мовою, здатність до стилізації та створення специфічного настрою.
discussion_topics:
- context: Чи може іноземець колись повністю опанувати український гумор та 
    підтекст?
  questions:
  - Що є найважчим для розуміння в українській ментальності через мову?
  - Чи існують універсальні жарти, зрозумілі всім?
  motivation: Дискусія про межі перекладності культури та глибину мовного 
    занурення.
activity_hints:
- type: reading
  focus: Прочитайте текст про спонтанна комунікація та стратегії висловлювання і
    дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про ідіоматика та фразеологічне 
    багатство, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Спонтанна 
    комунікація та стратегії висловлювання». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    спонтанна комунікація та стратегії висловлювання.
- type: comparative-study
  focus: 'Порівняйте різні підходи до спонтанна комунікація та стратегії висловлювання:
    Техніки підтримки тривалого діалогу без пауз та лексичних прогалин. Визначте спільне
    та відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
