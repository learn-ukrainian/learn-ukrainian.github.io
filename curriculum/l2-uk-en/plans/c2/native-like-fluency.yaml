content_outline:
- section: 'Вступ: Що означає володіти мовою як носій (Introduction: What Native-like
    Fluency Means)'
  words: 850
  points:
  - Визначення 'native-like fluency' згідно з вимогами Держстандарту 2024 (§4.3.2-4.3.4)
    щодо стилістичної гнучкості та елегантності мовлення.
  - 'Різниця між формальною коректністю C1 та стилістичною довершеністю C2: перехід
    від правильності до природності та ''flow''.'
  - 'Концепція ''автентичної недосконалості'': чому носії роблять помилки та як відрізнити
    їх від помилок учня через механізми самовиправлення (self-repair).'
- section: Фонетична елегантність та закони милозвучності (Phonetic Elegance and Laws
    of Euphony)
  words: 1000
  points:
  - 'Культурний імператив милозвучності: мова як музика — аналіз законів уникнення
    збігу приголосних та чергування у/в, і/й як базового тесту на природність.'
  - 'Інтонаційні контури та ритміка спонтанного мовлення: робота з редукцією та логічними
    наголосами для досягнення плинності.'
  - 'Регіональна автентичність проти нейтральності: свідомий вибір вимови для створення
    певного образу або соціальної інтеграції.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: Лексична гнучкість та запобігання калькам (Lexical Flexibility and Preventing
    Calques)
  words: 1150
  points:
  - 'Практика використання автентичних колокацій: аналіз частотності сполук ''набути
    плинності'' та ''дбати про милозвучність'' за даними корпусів.'
  - 'Подолання інтерференції: виправлення типових кальок (мати рацію замість ''мати
    сенс'' у значенні бути правим, брати участь замість ''приймати участь'').'
  - 'Робота з підтекстом (implicit meaning): розвиток мовної здогадки для розкодування
    алюзій та іронії в розмовному стилі.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: Синтаксична спонтанність та еліпсис (Syntactic Spontaneity and Ellipsis)
  words: 1000
  points:
  - 'Подолання синтаксичної ригідності SVO: використання інверсії (OVS/Topicalization)
    для виділення реми та створення природного акценту.'
  - 'Еліпсис у побутовому мовленні: заміна книжних конструкцій (напр., ''Ти будеш
    каву?'' замість повного ''Чи ти будеш пити каву?'').'
  - Риторичні запитання та повтори як засоби стилістичного синтаксису для підсилення
    експресії мовлення.
- section: Комунікативна прагматика та культура пауз (Communicative Pragmatics and
    the Culture of Pauses)
  words: 1000
  points:
  - Функціональне використання прагматичних часток та вигуків (ну, так, цей, як його)
    як маркерів автентичності, а не браку слів.
  - 'Порівняльний аналіз ''культури пауз'': як українські носії обробляють тишу в
    дискурсі порівняно з англомовними нормами.'
  - 'Сценарії ''ремонту мовлення'': стратегії перефразування та уточнення в реальному
    часі без втрати темпу комунікації.'
