vocabulary_hints:
  required:
  - 'плинність мовлення (fluency) — колокації: набути плинності, втратити плинність;
    висока частотність у лінгвістичному дискурсі'
  - 'милозвучність (euphony) — культурний концепт; колокації: закони милозвучності,
    дбати про милозвучність'
  - 'підтекст (implicit meaning) — колокації: читати підтекст, глибокий підтекст;
    для аналізу прихованих значень'
  - мовна здогадка (language guessing) — здатність розуміти значення з контексту;
    ключовий елемент C2
  - мати рацію (to be right) — автентична заміна поширеній помилці 'бути правим' або
    кальці 'мати сенс'
  recommended:
  - збіг приголосних (consonant cluster) — технічний термін для пояснення порушень
    милозвучності
  - паузи-заповнювачі (fillers) — ну, так, цей, власне; прагматичне використання
  - мовна інверсія (inversion) — засіб актуального членування речення (rheme highlighting)
  - мовна інтерференція (interference) — вплив першої мови на українську на рівні
    C2
