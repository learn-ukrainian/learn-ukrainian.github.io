objectives:
- Аналізувати та класифікувати явища Фонетична елегантність та закони милозвучності у автентичних текстах
- Продукувати тексти з коректним застосуванням Лексична гнучкість та запобігання калькам
- Оцінювати стилістичну доречність мовних засобів у контексті Володіння на рівні носія
- Застосовувати знання з теми «Лексична гнучкість та запобігання калькам» у власній мовній практиці
