module: native-like-fluency
level: C2
sequence: 87
version: "1.0"
title: "Вільне володіння на рівні носія"
subtitle: "Native-like Fluency"
focus: integration
pedagogy: workshop
objectives:
  - "Досягти майстерності у спонтанному мовленні на будь-які теми з використанням складних конструкцій"
  - "Глибоко зрозуміти культурні нюанси, метафори та приховані смисли в українському дискурсі"
  - "Опанувати ідіоматику, фразеологію та сучасний сленг для природного звучання"
  - "Навчитися розпізнавати та використовувати гумор, іронію та сарказм як інструменти комунікації"
content_outline:
  - section: "Спонтанна комунікація та стратегії висловлювання"
    words: 1000
    subsections:
      - "Техніки підтримки тривалого діалогу без пауз та лексичних прогалин"
      - "Використання вставних слів та дискурсивних маркерів для структурування живої мови"
      - "Адаптація темпу та інтонації залежно від емоційного стану співрозмовника"
    key_concepts:
      - "мовленнєва швидкість"
      - "спонтанність"
      - "паралінгвістика"
      - "дискурсивна компетенція"
    primary_sources:
      - "Записи живих дискусій на суспільно-важливі теми (аналіз природних реакцій)"
  - section: "Ідіоматика та фразеологічне багатство"
    words: 1000
    subsections:
      - "Фразеологізми як дзеркало національного менталітету: від класики до неофразеології"
      - "Метафоричне мислення: як створювати власні образи, що звучать природно"
      - "Крилаті вислови з літератури та кіно, що стали частиною повсякденного вжитку"
    key_concepts:
      - "фразеологізм"
      - "ідіома"
      - "концептуальна метафора"
      - "прецедентний текст"
    primary_sources:
      - "Фразеологічний словник української мови (вибірковий аналіз)"
  - section: "Гумор, іронія та мовна гра"
    words: 1000
    subsections:
      - "Специфіка українського гумору: від доброзичливого сміху до гострої сатири"
      - "Мовна гра: каламбури, перекручування слів та створення комічного ефекту"
      - "Іронія та сарказм: межі доречності та засоби вербального вираження"
    key_concepts:
      - "мовна гра"
      - "каламбур"
      - "сарказм"
      - "інтертекстуальність"
    primary_sources:
      - "Твори Остапа Вишні (аналіз засобів комічного)"
  - section: "Культурні коди та асоціативне мислення"
    words: 1000
    subsections:
      - "Розуміння підтексту: те, що не сказано, але мається на увазі в українському середовищі"
      - "Асоціативні зв'язки: чому певні образи викликають конкретні емоції (калина, верба, степ тощо)"
      - "Емпатія та активне слухання: як стати 'своїм' у мовній спільноті"
    key_concepts:
      - "культурний код"
      - "асоціативне поле"
      - "лінгвокраїнознавство"
      - "комунікативна удача"
    primary_sources:
      - "Сучасні українські подкасти (наприклад, 'Вулиця' або 'Простими словами')"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "художня проза / есеїстика"
    topic: "Аналіз підтексту та іронії в есеїстиці Юрія Андруховича або Олександра Бойченка."
    key_elements: ["алюзії", "інтелектуальна гра", "прихований зміст"]
    motivation: "Розвиток здатності бачити за текстом глибші культурні пласти."
  - source_type: "фразеологічний довідник"
    topic: "Еволюція українських фразеологізмів: від біблійних витоків до сучасних мемів."
    key_elements: ["етимологія", "варіантність", "узус"]
    motivation: "Збагачення мовлення стійкими висловами, що роблять його автентичним."
listening_situations:
  - media_type: "відео"
    setting: "Стендап-виступ сучасного українського коміка: як працюють мовні каламбури та актуальні культурні відсилки."
    focus_points:
      - "Реакція залу на специфічні слова"
      - "Використання паузи для підсилення комічного ефекту"
    motivation: "Розуміння живого, неформального та гострого мовлення в реальному часі."
writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть іронічний або сатиричний відгук на вигадану (або реальну) культурну подію (фільм, виставку, книгу), використовуючи принаймні 5 фразеологізмів та елементи мовної гри."
    requirements: ["мінімум 300 слів", "витриманий стиль", "використання засобів іронії"]
    motivation: "Відпрацювання навичок складного стилістичного маневрування в письмовому тексті."
    model_answer: "Відгук має бути не лише інформативним, а й демонструвати тонке володіння мовою, здатність до стилізації та створення специфічного настрою."
discussion_topics:
  - context: "Чи може іноземець колись повністю опанувати український гумор та підтекст?"
    questions:
      - "Що є найважчим для розуміння в українській ментальності через мову?"
      - "Чи існують універсальні жарти, зрозумілі всім?"
    motivation: "Дискусія про межі перекладності культури та глибину мовного занурення."
