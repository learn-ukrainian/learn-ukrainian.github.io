content_outline:
- section: Вступ — Від розуміння до критичного аналізу (Introduction — From Understanding to Critical Analysis)
  words: 600
  points:
  - Різниця між пасивним сприйняттям інформації та активним оцінюванням тексту; роль критичного мислення у професійному дискурсі.
  - 'Культурний контекст: еволюція критичного мислення в Україні від радянської традиції відтворення знань до концепції Нової
    української школи (НУШ).'
- section: Оцінка джерел та авторитетності (Evaluating Sources and Credibility)
  words: 900
  points:
  - 'Традиція українського джерелознавства (М. Грушевський, В. Антонович): принципи критичної перевірки походження та достовірності
    документів.'
  - 'Критерії оцінки сучасних наукових публікацій: рецензовані (peer-reviewed) видання, бібліометрика та виявлення конфлікту
    інтересів.'
  - Практика розрізнення факту (verifiable data) та судження (interpretative claim); ідентифікація маркерів суб'єктивності
    в тексті.
- section: Аналіз та деконструкція аргументації (Analysis and Deconstruction of Argumentation)
  words: 1000
  points:
  - 'Структура фахового аргументу згідно з §4.3.5 Держстандарту: використання елементів риторики в композиції тексту для переконання.'
  - Типи доказів та їхня вагомість у різних дисциплінах; виявлення логічних помилок (fallacies) та маніпулятивних технік.
  - 'Подолання семантичної плутанини: розмежування понять «критика» (негативне судження) та «критичний аналіз» (об''єктивна
    оцінка).'
- section: Порівняльний аналіз та стратегії синтезу (Comparative Analysis and Synthesis Strategies)
  words: 900
  points:
  - 'Зіставлення кількох джерел на одну тему: техніка виявлення консенсусу, розбіжностей та концептуальних лакун у фаховому
    полі.'
  - 'Методи синтезу інформації: об''єднання аргументів з різних текстів для формування власної обґрунтованої аналітичної позиції.'
  - 'Корекція мовленнєвих звичок: заміна пасивних конструкцій («було стверджено») на активну атрибуцію («автор наголошує»,
    «стаття демонструє»).'
- section: Критичне анотування та вторинні тексти (Critical Annotation and Secondary Texts)
  words: 800
  points:
  - 'Уміння створювати вторинні тексти (§4.3.8): методологія написання рефератів, аналітичних повідомлень та критичних анотацій.'
  - 'Техніка критичного анотування: поєднання стислого викладу змісту з експертною оцінкою методології та висновків першоджерела.'
  - Організація аналітичних нотаток для подальшого використання у науковій діяльності або професійному документообігу.
- section: Підсумок та практичне застосування (Summary and Practical Application)
  words: 800
  points:
  - 'Комплексна вправа: критичний аналіз реального фахового тексту з використанням критеріїв авторитетності та аргументації.'
  - Написання критичної анотації до статті за спеціальністю з дотриманням принципів об'єктивності та академічної етики.
  - 'Рефлексія: перевірка власного аналітичного тексту на логічну цілісність та відповідність стандартам фахового дискурсу.'
vocabulary_hints:
  required:
  - критичний аналіз (critical analysis) — провести критичний аналіз, навички критичного аналізу; висока частотність в академічному
    середовищі
  - авторитетність (authority/credibility) — авторитетність джерела, перевірка авторитетності, сумнівна авторитетність
  - рецензування (peer review) — сліпе рецензування, процес рецензування, фахове рецензування
  - упередженість (bias) — когнітивна упередженість, політична упередженість, уникати упередженості
  - аргументація (argumentation) — переконлива аргументація, логіка аргументації, слабка аргументація
  - джерелознавство (source studies) — українська дисципліна, що вивчає методи перевірки походження документів
  - вторинний текст (secondary text) — результат аналітичної переробки джерел (реферат, анотація) згідно з §4.3.8
  recommended:
  - автор стверджує (the author claims) — використання активних дієслів замість пасивних конструкцій
  - дослідник наголошує (the researcher emphasizes) — вираження активної атрибуції в аналітичному письмі
  - концептуальна лакуна (conceptual gap) — термін для позначення прогалин у наявних дослідженнях
  - верифікація (verification) — процес підтвердження достовірності фактів або джерел
  - валідність (validity) — обґрунтованість та адекватність методів дослідження
vocabulary:
  required:
  - критичний аналіз (critical analysis)
  - авторитетність (authority/credibility)
  - рецензування (peer review)
  - упередженість (bias)
  - аргументація (argumentation)
  - докази (evidence)
  - логічна помилка (logical fallacy)
  - синтез (synthesis)
  - анотація (annotation)
  - консенсус (consensus)
  recommended:
  - верифікація (verification)
  - валідність (validity)
  - надійність (reliability)
  - первинне джерело (primary source)
  - вторинне джерело (secondary source)
