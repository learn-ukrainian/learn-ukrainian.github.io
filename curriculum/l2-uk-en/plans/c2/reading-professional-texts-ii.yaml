module: reading-professional-texts-ii
level: C2
sequence: 48
version: '1.2'
title: 'Критичне читання професійних текстів II: Галузева експертиза'
subtitle: 'Критичне читання професійних текстів II'
focus: professional
pedagogy: seminar
objectives:
  - Розвинути навички аналізу та інтерпретації вузькоспеціалізованих галузевих 
    текстів
  - Опанувати специфіку мови юридичних документів, нормативно-правових актів та 
    технічних регламентів
  - Навчитися критично оцінювати аналітичні звіти та експертні висновки на 
    предмет об'єктивності та переконливості
  - Зрозуміти особливості корпоративного дискурсу та професійної 
    медіа-комунікації в українському контексті
content_outline:
  - section: Аналіз галузевої аналітики та експертних звітів
    words: 1250
    subsections:
      - Структура та мовні засоби переконування в аналітичних оглядах ринків
      - Використання статистичних даних та їх мовна інтерпретація
      - 'Прогнозування та гіпотетичність: специфіка вживання модальних конструкцій'
    key_concepts:
      - аналітичний звіт
      - експертна оцінка
      - тренди ринку
      - економічний дискурс
    primary_sources:
      - Звіт про фінансову стабільність Національного банку України (аналіз 
        лексико-граматичного наповнення)
  - section: 'Юридичні та нормативні тексти: мовна специфіка'
    words: 1250
    subsections:
      - Принципи однозначності та вичерпності в юридичній техніці
      - 'Аналіз структури законодавчих актів: від преамбули до прикінцевих положень'
      - Специфіка вживання безособових конструкцій та дієслівних форм у 
        нормативних текстах
    key_concepts:
      - нормативно-правовий акт
      - юридична термінологія
      - правова прецизійність
      - імперативність
    primary_sources:
      - Постанова Кабінету Міністрів України (приклад для детального 
        лінгвістичного аналізу)
  - section: Робота з патентами та технічною документацією
    words: 1250
    subsections:
      - 'Мова винаходу: аналіз формули патенту та опису технічного рішення'
      - Специфіка термінологізації дієслівних процесів у технічних інструкціях
      - Вимоги до лаконічності та точності в інженерному дискурсі
    key_concepts:
      - патентна формула
      - технічна специфікація
      - експлуатаційна документація
      - протокол випробувань
  - section: Професійні медіа та корпоративний дискурс
    words: 1250
    subsections:
      - Особливості стилю галузевих видань та професійних спільнот
      - 'Корпоративна етика та її мовне вираження: місія, цінності, внутрішня комунікація'
      - 'PR-дискурс у професійному середовищі: баланс між фактами та іміджем'
    key_concepts:
      - корпоративний стиль
      - стейкхолдери
      - ділова репутація
      - галузеві медіа
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - error-correction
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): §42-44 — Офіційно-діловий стиль'
  - 'Ворон, 11 клас (2019): с. 239-240 — Професійний дискурс'
  - 'Державний стандарт 2024: C2 — читацька компетенція'
reading_situations:
  - source_type: Аналітичний звіт
    topic: Аналіз 'Звіту про фінансову стабільність' НБУ. Вивчення способів 
      подачі макроекономічної інформації.
    key_elements:
      - фінансовий показник
      - ризик-менеджмент
      - прогнозний сценарій
    motivation: Опанування складного економічного дискурсу на прикладі текстів 
      центрального банку.
  - source_type: Нормативно-правовий акт
    topic: Лінгвістичний розбір постанови Кабінету Міністрів України щодо 
      регулювання певної галузі.
    key_elements:
      - юридичне кліше
      - структура документа
      - логіка викладу
    motivation: Розуміння механізмів створення однозначних юридичних текстів.
listening_situations:
  - media_type: інтерв'ю
    setting: Професійна дискусія фахівців з енергетики про впровадження нових 
      технічних регламентів.
    focus_points:
      - Використання специфічної термінології в усному діалозі
      - Аргументація за і проти прийняття нових стандартів
    motivation: Сприйняття фахової полеміки на слух.
writing_tasks:
  - task_type: власне висловлення
    prompt: На основі фрагмента технічної специфікації та аналітичного звіту 
      напишіть коротку пояснювальну записку для керівництва компанії, де 
      обґрунтуйте необхідність модернізації виробничого процесу. Використовуйте 
      термінологію обох документів.
    requirements:
      - мінімум 400 слів
      - чітка логічна структура
      - дотримання офіційно-ділового стилю
    motivation: Практичне застосування навичок синтезу технічної та аналітичної 
      інформації.
    model_answer: 'Пояснювальна записка повинна містити: об''єктивні дані, аналіз
      ризиків, пропозиції та очікувані результати. Мова має бути професійною, точною
      та лаконічною.'
discussion_topics:
  - context: Чи може надмірна складність фахових текстів бути інструментом 
      маніпуляції та приховування реального стану справ?
    questions:
      - Де проходить межа між необхідною професійною точністю та навмисним 
        заплутуванням читача?
      - Яка роль 'простої мови' (plain language) у професійній комунікації 
        майбутнього?
    motivation: Критична дискусія про етику та доступність професійного знання.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати мовні засоби переконування в аналітичному звіті НБУ: модальні
      конструкції та інтерпретація даних'
  - type: error-correction
    focus: Виправити порушення юридичної точності та стилю у тексті 
      нормативно-правового акта
  - type: match-up
    focus: 'Зіставити типи професійних текстів з їхніми жанровими ознаками: патент,
      контракт, регламент, аналітика'
  - type: fill-in
    focus: 'Доповнити текст галузевою термінологією: прецизійність, імперативність,
      стейкхолдери, верифікація'
phase: C2.3 [Professional Specialization]
