title: Індивідуальний голос II — Вдосконалення стилю
subtitle: Introduction — From Experiment to Mastery
focus: stylistics
pedagogy: TTT
phase: C2.1 [Stylistics & Rhetoric]
word_target: 5000
objectives:
- Аналізувати стилістичні засоби в текстах різних функціональних стилів
- Продукувати тексти із свідомим використанням стилістичних фігур
- Розрізняти авторські стилістичні прийоми та оцінювати їхню ефективність
- Застосовувати знання з теми «Стилістичні 'тіки' та шліфування» у власній мовній практиці
