content_outline:
- section: Вступ — Від експерименту до майстерності (Introduction — From Experiment to Mastery)
  words: 650
  points:
  - Перехід від стилістичного пошуку до вдосконалення майстерності відповідно до вимог стандарту §4.3.6 (уміння створити текст
    за планом)
  - 'Ознаки зрілого ідіостилю: баланс між індивідуальною впізнаваністю та жанровою консистентністю як ознака рівня Mastery'
- section: 'Свідомі vs несвідомі вибори: Психологія стилю (Conscious vs. Unconscious Choices: Psychology of Style)'
  words: 850
  points:
  - Роль художньої інтуїції та відчуття слова у прийнятті стилістичних рішень; інтуїція як накопичений технічний досвід, а
    не просто везіння
  - 'Аналіз помилки ''щирості'': спростування міфу про те, що перша думка — найкраща, та доведення важливості авторедагування
    для чистоти голосу'
  - 'Керування стилістичними рішеннями: коли свідоме порушення власних правил (broken stylistics) стає новим прийомом'
  - Порівняльний аналіз стилістичних прийомів на матеріалі текстів різних епох та жанрів із залученням сучасного українського
    медіадискурсу
- section: Фірмові прийоми та ідіостиль (Signature Techniques and Idiostyle)
  words: 850
  points:
  - Використання індивідуально-авторських неологізмів, епітетів та метафор (§4.3.3) для формування унікального авторського
    голосу
  - 'Кейс Коцюбинського: імпресіоністична кольористика та ''психологія квітів'' у повісті ''Intermezzo'' як приклад впізнаваного
    ритму прози'
  - 'Корекція термінології: перехід від маркетингового поняття ''бренд-войс'' до літературознавчого та мистецького ''ідіостиль'''
  - Порівняльний аналіз стилістичних прийомів на матеріалі текстів різних епох та жанрів із залученням сучасного українського
    медіадискурсу
- section: Стилістичні 'тіки' та шліфування (Stylistic Tics and Polishing)
  words: 650
  points:
  - 'Виявлення несвідомих повторів (''тіків''): надмірне вживання ефектних слів (напр. ''безумовно'', ''автентичний'') як
    ознака стилістичної слабкості'
  - 'Техніка ''шліфування'' (polishing) тексту: приклад ретельної праці Івана Франка та В''ячеслава Липинського над легкістю
    викладу через правку'
- section: Еволюція голосу та сонорність (Evolution of Voice and Sonority)
  words: 750
  points:
  - 'Кейс Павла Тичини: аналіз ''кларнетизму'' як унікальної музикальності та подальша еволюція/деградація голосу під тиском
    соцреалізму'
  - 'Диференціація понять: відмінність між незмінним ''авторським голосом'' (personality) та гнучким ''тоном'' (situational
    adaptation)'
- section: Peer feedback та редагування для голосу (Peer Feedback and Editing for Voice)
  words: 650
  points:
  - 'Специфіка C2 workshop-культури: отримання фідбеку на рівні стилістичної системи, а не лише точкової граматичної коректності'
  - 'Збереження автентичності: як впроваджувати поради колег, не втрачаючи власної ''руки'' та характерних засобів виразності'
- section: Практикум — Шліфування авторської манери (Practicum — Polishing Authorial Manner)
  words: 600
  points:
  - Трансформація попередніх начерків у цілісний твір із використанням showcase індивідуальних прийомів (ритмізація, авторські
    епітети)
  - 'Фінальна рефлексія на основі самоаналізу: шлях від учнівського наслідування до впевненого володіння власним стилем'
vocabulary_hints:
  required:
  - вдосконалення (refinement/improvement) — вдосконалення майстерності, постійне вдосконалення; висока частотність у дискурсі
    Mastery
  - ідіостиль (idiostyle) — індивідуальна авторська манера; вживати замість маркетингового 'фірмовий стиль'
  - інтуїція (intuition) — художня інтуїція, інтуїтивне відчуття слова; покладатися на інтуїцію
  - прийом (technique/device) — художній прийом, стилістичний прийом, улюблений прийом автора; технічний засіб виразності
  - мотив (motif) — провідний мотив, наскрізний мотив, лейтмотив; основа тематичної та стилістичної єдності
  - редагування (editing) — авторедагування, літературне редагування; етапи редагування для шліфування голосу
  recommended:
  - шліфування (polishing) — шліфування стилю, шліфування майстерності; ретельна робота над деталями
  - впізнаваний (recognizable) — впізнавана манера, впізнаваний стиль; визначальна риса зрілого автора
  - тіки (tics) — стилістичні тіки; несвідомі нав'язливі повтори слів чи конструкцій, що засмічують стиль
  - кларнетизм (clarnetism) — музикальність поетичного голосу; термін, пов'язаний із ранньою творчістю П. Тичини
