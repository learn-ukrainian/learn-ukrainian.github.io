module: c2-015
level: C2
sequence: 15
version: 1.2.1
title: 'Індивідуальний голос: стратегії самовираження'
subtitle: 'Індивідуальний голос: стратегії самовираження'
focus: integration
pedagogy: workshop
objectives:
- Досягти високого рівня свідомого керування власним ідіостилем для різних комунікативних завдань
- Навчитися інтегрувати складні культурні коди та інтертекстуальні посилання у власні тексти
- 'Опанувати техніки стилістичного експерименту: від неокласицизму до авангарду'
- Розвинути навички глибокого критичного аналізу власного письма та його впливу на аудиторію
content_outline:
- section: Архітектоніка авторського тексту
  words: 1250
  subsections:
  - 'Побудова композиції як вияв індивідуального стилю: лінійність vs нелінійність'
  - Керування увагою читача через ритмічні та змістові акценти
  - Створення авторського міфу через повторювані образи та мотиви
  key_concepts:
  - композиція
  - архітектоніка
  - лейтмотив
  - авторський міф
- section: Стилістичний експеримент та межі мови
  words: 1250
  subsections:
  - Авангардні пошуки в українській літературі (від футуризму до сучасності)
  - 'Мовна деконструкція: коли порушення норми стає стилем'
  - 'Гра з жанрами: створення гібридних форм (роман-есе, вірш-репортаж)'
  key_concepts:
  - авангард
  - деконструкція
  - гібридність
  - експериментальне письмо
  primary_sources:
  - Михайль Семенко, футуристичні поезії (фрагменти)
  - Валер'ян Підмогильний, 'Місто' (аналіз міського ідіостилю)
- section: Інтертекстуальність як засіб збагачення ідіостилю
  words: 1250
  subsections:
  - Цитування, алюзія та ремінісценція як способи розширення змісту
  - 'Діалог з попередниками: омаж, пастиш, полеміка'
  - Створення власного 'тексту в тексті'
  key_concepts:
  - алюзія
  - пастиш
  - омаж
  - ремінісценція
- section: Прагматика та етика індивідуального вислову
  words: 1250
  subsections:
  - Вплив ідіостилю на формування громадської думки та інтелектуального клімату
  - Відповідальність автора за слово в епоху 'постправди'
  - 'Кристалізація власного ''я'' через письмо: терапевтичний та екзистенційний вимір'
  key_concepts:
  - прагматика
  - постправда
  - інтелектуальна чесність
  - екзистенціалізм
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Художній експеримент
  topic: 'Аналіз потоку свідомості в українській модерній прозі. Джерело: Микола Хвильовий, ''Сентиментальна історія''.'
  key_elements:
  - фрагментарність
  - асоціативність
  - ліризм
  motivation: Вивчення засобів передачі внутрішнього світу персонажа через розрив традиційного синтаксису.
- source_type: Полемічна стаття
  topic: 'Битва ідіостилів у літературній дискусії 1920-х років. Джерело: памфлети Миколи Хвильового.'
  key_elements:
  - пафос
  - сатира
  - європейський вектор
  motivation: Розуміння стилю як зброї в ідеологічній та естетичній боротьбі.
listening_situations:
- media_type: подкаст
  setting: Сучасні українські письменники (напр., Сергій Жадан та Тарас Прохасько) обговорюють свій творчий метод.
  focus_points:
  - Ставлення до мовної норми
  - Процес пошуку 'свого' слова
  motivation: Аналіз рефлексії професіоналів над власним ідіостилем.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть 'Маніфест власного стилю'. Окресліть свої мовні пріоритети, улюблені прийоми та цілі як автора. Використайте
    принаймні три різні стилістичні фігури.
  requirements:
  - мінімум 400 слів
  - високий рівень рефлексії
  - вишукана аргументація
  motivation: Усвідомлення власної мовної траєкторії та цілей.
  model_answer: Маніфест має бути переконливим та стилістично витриманим. Автор повинен пояснити свій вибір лексики, синтаксису
    та образності, апелюючи до прикладів з власної практики або планів.
discussion_topics:
- context: Чи може штучний інтелект імітувати ідіостиль настільки досконало, що ми не відрізнимо його від оригіналу?
  questions:
  - У чому полягає 'людський фактор' у стилі, який неможливо прорахувати алгоритмом?
  - Чи знецінює імітація унікальність авторського голосу?
  motivation: Дискусія про природу творчості та майбутнє авторства.
activity_hints:
- type: reading
  focus: Прочитайте текст про архітектоніка авторського тексту і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про стилістичний експеримент та межі мови, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Архітектоніка авторського тексту». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему архітектоніка авторського тексту.
- type: comparative-study
  focus: 'Порівняйте різні підходи до архітектоніка авторського тексту: Побудова композиції як вияв індивідуального стилю:
    лінійність vs нелінійність. Визначте спільне та відмінне.'
references:
- Семенко М. Футуристичні поезії — авангардний експеримент
- Підмогильний В. Місто — аналіз міського ідіостилю
- Авраменко О. М. Українська література, 11 клас — літературознавча термінологія
phase: C2.1 [Stylistic Perfection]
