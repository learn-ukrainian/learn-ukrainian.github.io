module: c2-060
level: C2
sequence: 60
version: '1.2'
title: 'Конференційна комунікація: Написання тез та підготовка доповідей'
subtitle: 'Комунікація на конференції: тези та доповіді'
focus: professional
pedagogy: workshop
objectives:
  - Опанувати специфіку написання наукових тез для участі у всеукраїнських та 
    міжнародних конференціях
  - Навчитися трансформувати складний дослідницький текст у формат стислої та 
    змістовної усної доповіді
  - Вдосконалити навички підготовки та ведення наукової дискусії за результатами
    виступу
  - Досягти майстерності у створенні супровідних матеріалів (презентацій, 
    роздаткових матеріалів) українською мовою
content_outline:
  - section: Жанрові особливості наукових тез
    words: 1250
    subsections:
      - 'Відмінність між тезами, анотацією та повною статтею: обсяг та щільність інформації'
      - 'Структурування тез: постановка проблеми, опис результатів та їхня новизна'
      - Мовні засоби лаконізації наукового тексту без втрати змістової 
        цілісності
    key_concepts:
      - тези доповіді
      - лаконічність
      - інформативність
      - актуальність
    primary_sources:
      - Збірники тез провідних українських конференцій (НаУКМА, КНУ ім. 
        Шевченка) - аналіз взірців
  - section: Трансформація тексту в усну доповідь
    words: 1250
    subsections:
      - 'Сценарій наукового виступу: як вкластися у регламент (5-10 хвилин) та зацікавити
        аудиторію'
      - 'Переклад письмового академічного стилю в усно-публічний: спрощення синтаксису
        при збереженні термінології'
      - Використання риторичних прийомів для акцентування на найважливіших 
        результатах
    key_concepts:
      - регламент
      - наукова доповідь
      - публічне мовлення
      - акцентуація
  - section: Візуальний супровід та додаткові матеріали
    words: 1250
    subsections:
      - 'Дизайн наукової презентації: баланс тексту, графіків та візуальних образів'
      - Підготовка Handouts (роздаткових матеріалів) як інструменту підтримки 
        доповіді
      - Використання QR-кодів та інших цифрових посилань для доступу до повних 
        результатів
    key_concepts:
      - візуалізація
      - інфографіка
      - роздатковий матеріал
      - інтерактивність
    primary_sources:
      - Олена Семеног, 'Культура наукової мови' (аналіз вимог до усних виступів 
        науковців)
  - section: Мистецтво наукової дискусії та нетворкінг
    words: 1250
    subsections:
      - 'Робота з питаннями аудиторії: як відповідати на критику, уточнення та коментарі'
      - 'Етикет наукового спілкування на полях конференції: встановлення професійних
        контактів'
      - Підготовка фінального слова та резюмування результатів конференційної 
        участі
    key_concepts:
      - науковий нетворкінг
      - дискусійне поле
      - академічна етика
      - репутація дослідника
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - highlight-morphemes
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): Науковий стиль мовлення'
  - 'Авраменко, 11 клас (2019): Культура наукового мовлення'
  - 'Ворон, 11 клас (2019): Публічний виступ'
  - 'Державний стандарт 2024: C2 — конференційна комунікативна компетенція'
reading_situations:
  - source_type: Збірник тез
    topic: Аналіз тез доповідей з філології чи історії. Вивчення способів 
      формулювання наукової новизни на обмеженому обсязі.
    key_elements:
      - об'єкт
      - предмет
      - наукова новизна
    motivation: Розуміння структури та мови тез як специфічного наукового жанру.
  - source_type: Методичний посібник
    topic: Аналіз рекомендацій Олени Семеног щодо культури наукового виступу. 
      Вивчення типових помилок ораторів-науковців.
    key_elements:
      - мовна норма
      - етикет
      - риторика
    motivation: Підготовка до публічного захисту наукових результатів.
listening_situations:
  - media_type: відео
    setting: Запис пленарного засідання міжнародної конференції в Україні. 
      Аналіз виступу ключового спікера.
    focus_points:
      - 'Структура доповіді: від вступу до висновків'
      - Способи взаємодії з аудиторією під час виступу
    motivation: Вивчення реальних прикладів успішної конференційної комунікації.
writing_tasks:
  - task_type: есе
    prompt: Напишіть тези доповіді (обсягом 1-2 сторінки) на тему вашого 
      професійного чи наукового дослідження для уявної конференції 'Інновації в 
      українській науці та практиці'.
    requirements:
      - мінімум 500 слів
      - чітка структура
      - використання щонайменше 10 фахових термінів
    motivation: Комплексна перевірка навичок написання тез.
    model_answer: Тези мають бути змістовними, логічно побудованими, містити 
      чітко сформульовані висновки та відповідати всім нормам академічного стилю
      української мови.
discussion_topics:
  - context: Яке майбутнє у наукових конференцій в епоху онлайн-трансляцій та 
      віртуальних світів?
    questions:
      - Чи може онлайн-участь замінити живий науковий нетворкінг?
      - Як змінилися вимоги до ораторської майстерності в умовах 
        відеоконференцій?
    motivation: Обговорення трансформації наукової комунікації у сучасному 
      світі.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про жанрові особливості наукових тез і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про трансформація тексту в усну доповідь, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Жанрові особливості наукових тез». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему жанрові особливості наукових тез."
  - type: comparative-study
    focus: "Порівняйте різні підходи до жанрові особливості наукових тез: Відмінність між тезами, анотацією та повною статтею: обсяг та щільність інформац. Визначте спільне та відмінне."
