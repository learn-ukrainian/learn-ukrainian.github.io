vocabulary_hints:
  required:
  - 'портфоліо (portfolio) — висока частотність (IT/Business); колокації: «сформувати
    цифрове портфоліо», «портфоліо робіт»'
  - 'резюме (CV/resume) — частотне; НЕ вживати «сумарі»; сталі сполуки: «скласти резюме»,
    «надіслати резюме»'
  - супровідний лист (cover letter) — часто синонімічне до «мотиваційний лист»; вимагає
    офіційно-ділового стилю
  - компетентність (competency) — середньочастотне, формальний реєстр; «професійна
    компетентність», «рівень компетентності»
  - 'досягнення (achievement) — висока частотність; синонім: «професійні здобутки»;
    вживається для кількісних показників'
  - професійний досвід (professional experience) — критично відрізняти від наукового
    «досліду» (experiment)
  recommended:
  - подаватися на вакансію (apply for a job) — нормативна конструкція; уникати кальки
    «аплікуватися»
  - точність (accuracy) — вживається для опису компетенцій; відрізняти від охайності
    («акуратність»)
  - 'вакансія (job opening) — колокація: «відкрита вакансія», «відповідати вимогам
    вакансії»'
  - кваліфікація (qualification) — підтвердження компетентності через дипломи та сертифікати
  - вторинний текст (secondary text) — лінгвістичний термін для рефератів та повідомлень
    на основі портфоліо
