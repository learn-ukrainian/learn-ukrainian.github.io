title: Професійне портфоліо I — Демонстрація компетентності
focus: domain
pedagogy: TTT
phase: C2.3 [Professional Language]
word_target: 5000
objectives:
- Аналізувати ключові поняття та явища модуля на рівні глибокого розуміння
- Продукувати тексти академічного та професійного рівня за тематикою модуля
- Демонструвати вільне володіння спеціалізованою лексикою та термінологією
- Застосовувати знання з теми «Супровідний лист та ділове листування» у власній мовній практиці
