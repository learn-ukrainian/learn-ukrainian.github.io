content_outline:
- section: 'Вступ: Професійне портфоліо в українському контексті (Introduction)'
  words: 600
  points:
  - Визначення портфоліо як довідково-інформаційного тексту (§4.3.8) та його роль у демонстрації кваліфікації на сучасному
    ринку праці.
  - 'Культурна специфіка: традиційна очікуваність фотографії в українському резюме та поступова лібералізація цієї норми в
    IT-сфері.'
  - 'Типологія портфоліо: академічне, творче та професійне; перехід від традиційних папок до цифрових платформ.'
- section: 'Структура та зміст: від резюме до портфоліо (Structure and Content)'
  words: 1000
  points:
  - Розмежування понять «резюме» (CV) та «портфоліо» (доказова база професійних здобутків); структура професійного профілю
    (summary).
  - 'Документація досягнень: підготовка «вторинних текстів» (рефератів проєктів, звітів про результати) згідно зі стандартом
    §4.3.8.'
  - 'Сертифікація як інструмент верифікації: подолання проблеми суб''єктивного завищення рівня володіння мовами у резюме («читаю
    зі словником»).'
- section: Мовна грамотність та професійна термінологія (Linguistic Accuracy)
  words: 900
  points:
  - 'Корекція типових помилок калькування: вживання «подаватися на вакансію» або «надсилати резюме» замість помилкового «аплікуватися».'
  - 'Розрізнення паронімів у професійному описі: вживання терміна «досвід» (experience) та уникнення плутанини з науковим
    «дослідом» (experiment).'
  - Диференціація понять «акуратний» (охайний, neat) та «точний» (accurate) при формулюванні навичок та кількісних показників.
- section: Супровідний лист та ділове листування (Cover Letter and Correspondence)
  words: 1000
  points:
  - 'Стилістичні норми мотиваційного листа: використання безособових конструкцій («вимагається», «очікується») для аналізу
    вакансії.'
  - Опис власних досягнень в активному стані («я реалізував», «ми досягли») для підкреслення професійної агентності.
  - 'Формат і тон супровідного листа: адаптація стилю під корпоративну культуру потенційного роботодавця.'
- section: Рекомендації та презентація портфоліо (Recommendations and Presentation)
  words: 900
  points:
  - 'Специфіка рекомендацій в Україні: порівняльний аналіз письмових листів та поширеної практики телефонних перевірок (дзвінок
    попередньому керівнику).'
  - 'Презентаційні формати: вимоги до PDF-версії та оптимізація профілю в LinkedIn для українського та міжнародного ринків.'
  - 'Усна презентація портфоліо: стратегії аргументації власних компетенцій під час ділових переговорів (§3.13).'
- section: 'Практикум: Створення та аудит власного бренду (Practical Workshop)'
  words: 600
  points:
  - 'Аудит власних досягнень: трансформація професійного досвіду в структуровані кейси з використанням частотної лексики («здобутки»,
    «компетентність»).'
  - 'Складання пакету документів: написання резюме та супровідного листа з дотриманням мовних норм та униканням «хибних друзів
    перекладача».'
vocabulary_hints:
  required:
  - 'портфоліо (portfolio) — висока частотність (IT/Business); колокації: «сформувати цифрове портфоліо», «портфоліо робіт»'
  - 'резюме (CV/resume) — частотне; НЕ вживати «сумарі»; сталі сполуки: «скласти резюме», «надіслати резюме»'
  - супровідний лист (cover letter) — часто синонімічне до «мотиваційний лист»; вимагає офіційно-ділового стилю
  - компетентність (competency) — середньочастотне, формальний реєстр; «професійна компетентність», «рівень компетентності»
  - 'досягнення (achievement) — висока частотність; синонім: «професійні здобутки»; вживається для кількісних показників'
  - професійний досвід (professional experience) — критично відрізняти від наукового «досліду» (experiment)
  recommended:
  - подаватися на вакансію (apply for a job) — нормативна конструкція; уникати кальки «аплікуватися»
  - точність (accuracy) — вживається для опису компетенцій; відрізняти від охайності («акуратність»)
  - 'вакансія (job opening) — колокація: «відкрита вакансія», «відповідати вимогам вакансії»'
  - кваліфікація (qualification) — підтвердження компетентності через дипломи та сертифікати
  - вторинний текст (secondary text) — лінгвістичний термін для рефератів та повідомлень на основі портфоліо
