module: professional-portfolio-i
level: C2
sequence: 61
version: "1.0"
title: "Професійне портфоліо I: Демонстрація компетентності та здобутків"
subtitle: "Professional Portfolio I: Demonstrating Competence and Achievements"
focus: professional
pedagogy: workshop
objectives:
  - "Систематизувати професійний досвід та досягнення для створення переконуючого портфоліо"
  - "Опанувати стратегії самопрезентації високого рівня з використанням фахової термінології"
  - "Навчитися структурувати складні кейс-стаді (Case Studies) з акцентом на аналітику та результати"
  - "Вдосконалити навички добору мовних засобів для підкреслення експертного статусу"
content_outline:
  - section: "Концептуалізація професійного портфоліо"
    words: 1000
    subsections:
      - "Визначення цільової аудиторії та мети портфоліо (працевлаштування, грант, партнерство)"
      - "Відбір та класифікація артефактів: від проєктів до наукових публікацій"
      - "Формулювання унікальної ціннісної пропозиції (Unique Value Proposition) фахівця"
    key_concepts:
      - "артефакт портфоліо"
      - "компетентнісний підхід"
      - "ціннісна пропозиція"
      - "професійна траєкторія"
    primary_sources:
      - "Міністерство освіти і науки України, 'Професійний стандарт вчителя' (аналіз структури компетентностей)"
  - section: "Мистецтво опису професійних кейсів"
    words: 1000
    subsections:
      - "Метод STAR (Situation, Task, Action, Result) в українському контексті"
      - "Використання сильних дієслів та кількісних показників для опису успіху"
      - "Баланс між індивідуальним внеском та командною роботою у наративі"
    key_concepts:
      - "кейс-стаді"
      - "результативність"
      - "синергія"
      - "стратегічне планування"
  - section: "Стилістика супровідних текстів та резюме"
    words: 1000
    subsections:
      - "Адаптація резюме (CV) під різні запити: академічний vs корпоративний формат"
      - "Написання переконуючого супровідного листа з дотриманням етикету високого рівня"
      - "Використання вставних конструкцій для пом'якшення самовихваляння"
    key_concepts:
      - "супровідний лист"
      - "адаптивність"
      - "корпоративна культура"
      - "мовний етикет"
  - section: "Експертний відгук та саморефлексія"
    words: 1000
    subsections:
      - "Робота з рекомендаціями: як просити про відгук та як його інтерпретувати"
      - "Критична самооцінка портфоліо за критеріями повноти та переконливості"
      - "Планування професійного зростання на основі виявлених прогалин"
    key_concepts:
      - "саморефлексія"
      - "верифікація компетентностей"
      - "професійне зростання"
      - "експертна оцінка"
    primary_sources:
      - "Андрій Шептицький, 'Як будувати рідну хату' (аналіз принципів професійної та громадської відповідальності)"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Професійний стандарт"
    topic: "Аналіз мовних формулювань у державних професійних стандартах України. Вивчення дієслівної лексики для опису навичок."
    key_elements: ["здатність", "володіння", "застосування", "інноваційність"]
    motivation: "Розуміння офіційних критеріїв оцінки професіоналізму в Україні."
  - source_type: "Есе / Повчання"
    topic: "Дослідження етичних засад праці у творі Андрія Шептицького 'Як будувати рідну хату'. Аналіз концепту 'спільного добра'."
    key_elements: ["відповідальність", "професіоналізм", "суспільне благо"]
    motivation: "Осмислення морально-етичного фундаменту професійної діяльності в українській традиції."
listening_situations:
  - media_type: "інтерв'ю"
    setting: "Інтерв'ю з HR-директором провідної української IT-компанії про роль портфоліо при наймі топ-менеджерів."
    focus_points:
      - "Найпоширеніші мовні помилки в резюме керівників"
      - "Як словами продемонструвати стратегічне мислення"
    motivation: "Отримання актуальної інформації про вимоги сучасного українського ринку праці."
writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Складіть детальний опис складного професійного проєкту (Case Study), який ви реалізували. Використайте метод STAR та інтегруйте спеціалізовану термінологію вашої галузі."
    requirements: ["мінімум 600 слів", "чітка структура", "наявність аналітичних висновків"]
    motivation: "Практичне відпрацювання навичок професійного самоопису на рівні майстра."
    model_answer: "Текст має містити чітке формулювання проблеми, опис етапів рішення, кількісні та якісні результати, а також висновки щодо власного професійного зростання."
discussion_topics:
  - context: "Чи є портфоліо об'єктивним відображенням майстерності, чи це лише майстерно сконструйований образ?"
    questions:
      - "Де проходить межа між самопрезентацією та маніпуляцією фактами?"
      - "Яку роль відіграє мовна досконалість у сприйнятті професійної експертності?"
    motivation: "Дискусія про етику та ефективність професійної самопрезентації."
