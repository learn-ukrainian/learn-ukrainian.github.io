module: c2-003
level: C2
sequence: 3
version: '1.3'
title: Майстерність наукового стилю
subtitle: Майстерність наукового стилю
focus: professional
pedagogy: seminar
objectives:
  - Досконало опанувати лексико-фразеологічну систему української наукової мови
  - Навчитися структурувати наукові тексти відповідно до високих академічних 
    стандартів
  - 'Оволодіти специфікою наукового синтаксису: пасивні конструкції, безособові речення,
    номінативізація'
  - Виробити навички написання та редагування складних наукових текстів різних 
    жанрів
content_outline:
  - section: 'Українська наукова термінологія: історія та сучасність'
    words: 1250
    subsections:
      - Принципи українського наукового назовництва та термінотворення
      - Гібридні терміни, інтернаціоналізми та проблема мовної чистоти
      - Стандартизація та кодифікація фахової лексики
    key_concepts:
      - термін
      - дефініція
      - номенклатура
      - терміносистема
  - section: Синтаксис та когнітивна логіка наукового викладу
    words: 1250
    subsections:
      - Складні синтаксичні конструкції як засіб передачі багатогранних зв'язків
      - 'Номіналізація дієслівних процесів: переваги та ризики'
      - Узагальнена та абстрактна лексика
    key_concepts:
      - категоріальна абстракція
      - доказовість
      - логічна послідовність
      - предикація
  - section: Культура наукового діалогу та етика цитування
    words: 1250
    subsections:
      - 'Етикет наукової дискусії: аргументація та контраргументація'
      - Академічна доброчесність та форми посилання на джерела
      - Специфіка вживання модальних слів для вираження 
        впевненості/гіпотетичності
    key_concepts:
      - апробація
      - дискусійність
      - об'єктивність
      - авторська позиція
  - section: Жанрова специфіка академічного письма
    words: 1250
    subsections:
      - Написання наукової статті, рецензії, анотації
      - Особливості тез доповідей та наукових звітів
      - Стилістичне редагування власного та чужого наукового тексту
    key_concepts:
      - композиція
      - аргументованість
      - верифікація
word_target: 5000
activities:
  types_required:
    - error-correction
    - critical-analysis
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Наукова праця
    topic: 'Аналіз філологічного дослідження. Джерело: Іван Франко, ''Із секретів
      поетичної творчості''.'
    motivation: Ознайомлення з високим академічним стилем та класичною 
      термінологією.
listening_situations:
  - media_type: лекція
    setting: Фрагмент лекції Юрія Шевельова з історії української мови.
    focus_points:
      - Використання наукової фразеології
      - Логічні переходи між тезами
    motivation: Сприйняття наукового мовлення на слух та виділення ключових 
      концептів.
writing_tasks:
  - task_type: есе
    prompt: 'Напишіть коротку анотацію до уявної наукової праці на тему: ''Функціонування
      модальних часток у публіцистичних текстах початку XXI ст.'''
    motivation: Формування навичок стислого та інформативного викладу в 
      науковому ключі.
    model_answer: 'Анотація має містити: об’єкт дослідження, мету, методику, ключові
      результати та практичне значення. Мова повинна бути сухою, точною, з використанням
      кліше: ''у статті проаналізовано'', ''автор доходить висновку'', ''особливу
      увагу приділено''.'
discussion_topics:
  - context: 'Проблема запозичень в українській науковій термінології: чи варто шукати
      власні відповідники для кожного IT-терміна чи медичної назви?'
    questions:
      - Як надмірне вживання інтернаціоналізмів впливає на доступність науки?
      - Які приклади успішного впровадження питомих термінів ви знаєте?
    motivation: Дебати про розвиток наукової мови в умовах глобалізації.
activity_hints:
  - type: error-correction
    hint: Виправте стилістичні хиби (кальки, русизми, невдала номіналізація) у 
      фрагменті наукової статті
  - type: essay-response
    hint: Напишіть анотацію до уявної наукової праці, дотримуючись усіх вимог 
      наукового стилю
  - type: critical-analysis
    hint: Проаналізуйте аргументативну структуру та мовні засоби переконування в
      поданому науковому тексті
  - type: essay-response
    hint: Доповніть речення науковими кліше та фразеологізмами (у статті 
      проаналізовано, автор доходить висновку)
references:
  - Глазова О. П. Українська мова, 11 клас (2019), §42-43 — науковий стиль
  - Ворон А. А. Українська мова, 11 клас (2019), с. 115-160 — науковий стиль 
    мовлення
  - 'State Standard 2024: C2 SS 4.3 (Stylistics)'
  - Шевельов Ю. Нарис сучасної української літературної мови та інші 
    лінгвістичні студії (методологія)
phase: C2.1 [Stylistic Perfection]
