content_outline:
- section: 'Вступ: Специфіка письмового професійного мовлення (Introduction: Specifics of Written Professional Speech)'
  words: 600
  points:
  - 'Аналіз відмінностей між усним та письмовим мовленням у професійному контексті: від оперативності до нормативної закріпленості.'
  - 'Риси офіційного та наукового стилів згідно з ДСТУ: об''єктивність, точність, логічність та відсутність емоційного забарвлення.'
  - 'Принципи ефективного професійного письма на рівні С2: стратегічне планування тексту та врахування потреб адресата.'
- section: Феномен реферату в українському дискурсі (The Phenomenon of the 'Referat' in Ukrainian Discourse)
  words: 1000
  points:
  - 'Культурний код реферату: від студентського огляду літератури (literature review) до серйозного наукового синтезу.'
  - 'Типологія рефератів: інформативні (реферати-конспекти) vs. індикативні (реферати-резюме) — мета та обсяг.'
  - 'Техніка реферування: вилучення надлишкової інформації, узагальнення та логічне структурування вторинного тексту.'
- section: 'Анотація vs. Реферат: Теорія і практика (Annotation vs. Abstract: Theory and Practice)'
  words: 900
  points:
  - 'Подолання плутанини: анотація як стисла характеристика («реклама») vs. реферат як виклад змісту («спойлер»).'
  - 'Структура та обсяг анотації: від об''єкта дослідження до практичного значення. Роль ключових слів у пошукових системах.'
  - 'Практичне завдання: трансформація розлогого звіту в анотацію обсягом до 500-600 друкованих знаків.'
- section: Звіт як офіційний документ та ДСТУ 3008:2015 (The Report as an Official Document and DSTU 3008:2015)
  words: 1250
  points:
  - 'ДСТУ 3008:2015 як «біблія» українського звітування: вивчення обов''язкових структурних елементів (титульний аркуш, зміст,
    вступ, основна частина, висновки).'
  - 'Типологія звітів: наукові, технічні та фінансові. Специфіка викладу фактичного матеріалу та результатів досліджень.'
  - 'Жорстка структура звіту як маркер професіоналізму: дотримання міжрядкових інтервалів, шрифтів та правил нумерації розділів.'
- section: 'Культура професійної мови: Граматика та десуб''єктивізація (Professional Language Culture: Grammar and De-subjectivization)'
  words: 1250
  points:
  - 'Корекція типових помилок: вживання прийменникових конструкцій — «згідно з інструкцією» (Instr.) замість кальки «згідно
    інструкції» (Gen.).'
  - 'Синтаксичні норми: правильне вживання «відповідно до плану» (Gen.) та «на виконання наказу» (Gen.).'
  - 'Елімінація суб''єктивності: заміна конструкцій «я вважаю/думаю» на безособові форми («встановлено», «досліджено», «варто
    зазначити», «вважається»).'
  - 'Доповідна та службова записки: правила оформлення, мета (інформування vs. пропозиція) та адресація керівництву.'
vocabulary_hints:
  required:
  - реферат (abstract/summary) — структура реферату, написати реферат, оглядовий реферат; висока частотність в академічному
    середовищі
  - анотація (annotation/abstract) — скласти анотацію до статті, розширена анотація, ключові слова; фокус на стислості
  - звіт (report) — подати звіт, річний звіт, науковий звіт, затвердити звіт; основний документ професійної звітності
  - доповідна записка (memo/report) — подати доповідну записку на ім'я керівника, службова записка; офіційний реєстр
  - згідно з (according to) — згідно з інструкцією, згідно з наказом; вимагає орудного відмінка (Instr.), критично для С2
  - відповідно до (in accordance with) — відповідно до плану, відповідно до закону; вимагає родового відмінка (Gen.)
  recommended:
  - інформативний (informative) — інформативний реферат (детальний виклад)
  - індикативний (indicative) — індикативний реферат (лише основні положення)
  - безособова конструкція (impersonal construction) — вживання форм на -но, -то (досліджено, проведено) для об'єктивності
  - ДСТУ (State Standard) — дотримання вимог ДСТУ, згідно з ДСТУ; професійний маркер
  - ключові слова (keywords) — перелік ключових слів, індексація документа
  - вторинний текст (secondary text) — процес реферування та анотування первинних джерел
