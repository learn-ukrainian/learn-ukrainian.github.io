module: writing-professional-documents-i
level: C2
sequence: 50
version: '1.2'
title: 'Практикум з професійного письма I: Створення складних документів'
subtitle: 'Практикум з професійного письма I'
focus: professional
pedagogy: workshop
objectives:
  - 'Оволодіти повним циклом підготовки складних професійних документів: від концепції
    до фінального редагування'
  - Навчитися створювати аналітичні матеріали та доповідні записки з високим 
    ступенем деталізації
  - Опанувати методику розробки проектів нормативних актів, інструкцій та 
    регламентів
  - Вдосконалити навички стилістичного редагування та коректури фахових текстів 
    відповідно до чинних норм
content_outline:
  - section: Алгоритм підготовки складного управлінського документа
    words: 1250
    subsections:
      - 'Передтекстовий етап: збір інформації, визначення мети та адресата'
      - 'Логічне структурування змісту: побудова доказової бази та системи аргументів'
      - Відбір мовних засобів для забезпечення однозначності та офіційності 
        викладу
    key_concepts:
      - алгоритм складання
      - логічна структура
      - мовний інвентар
      - авторська відповідальність
    primary_sources:
      - Зразки розпорядчих документів Національного університету 
        'Києво-Могилянська академія' (аналіз стилю)
  - section: Написання аналітичних та доповідних записок
    words: 1250
    subsections:
      - 'Специфіка аналітичного жанру: поєднання фактів, оцінок та пропозицій'
      - Мовні формули вираження причинно-наслідкових зв'язків та обґрунтування 
        рішень
      - Техніки візуалізації та структурування великих обсягів даних у тексті
    key_concepts:
      - аналітична записка
      - доповідна записка
      - обґрунтування
      - верифікація тез
  - section: Робота над проектами нормативних актів та інструкцій
    words: 1250
    subsections:
      - Юридико-лінгвістичні вимоги до проектів наказів, положень, інструкцій
      - Забезпечення системності та відсутності суперечностей у тексті 
        регламенту
      - Методика формулювання прав, обов'язків та відповідальності
    key_concepts:
      - нормативне проектування
      - юридична дефініція
      - диспозиція
      - регламентація
  - section: Стилістичне редагування та коректура професійних текстів
    words: 1250
    subsections:
      - Типові стилістичні помилки у фаховому мовленні та методи їх усунення
      - Використання довідкових ресурсів та автоматизованих систем перевірки 
        тексту
      - 'Авторедагування: критичний погляд на власний текст'
    key_concepts:
      - літературне редагування
      - коректура
      - мовна виправність
      - стилістична доцільність
    primary_sources:
      - Михайло Грушевський, 'Листи' (аналіз точності та вишуканості ділового та
        наукового стилю)
word_target: 5000
activities:
  types_required:
    - error-correction
    - essay-response
    - critical-analysis
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): §42-44 — Офіційно-діловий стиль'
  - 'Ворон, 11 клас (2019): с. 239-240 — Професійний дискурс'
  - 'Державний стандарт 2024: C2 — професійна комунікативна компетенція'
reading_situations:
  - source_type: Розпорядчий документ
    topic: Аналіз структури та мови наказів НаУКМА. Вивчення способів 
      формулювання завдань та термінів виконання.
    key_elements:
      - констатуюча частина
      - розпорядча частина
      - контроль за виконанням
    motivation: Ознайомлення з взірцевою українською управлінською документацією
      академічного середовища.
  - source_type: Листування видатних діячів
    topic: Стилістичний аналіз ділових листів Михайла Грушевського. Робота з 
      лексичною точністю та етикетними нормами.
    key_elements:
      - офіційний тон
      - інтелектуальна аргументація
      - вишуканість вислову
    motivation: Вивчення історичних витоків українського високого стилю та його 
      актуальності для сучасності.
listening_situations:
  - media_type: лекція
    setting: Майстер-клас професійного редактора про типові хиби сучасних 
      офіційних текстів та способи їх 'лікування'.
    focus_points:
      - Канцеляризми vs жива професійна мова
      - Робота з новими нормами правопису в документах
    motivation: Отримання практичних порад від експерта-практика.
writing_tasks:
  - task_type: власне висловлення
    prompt: 'Складіть проект положення про роботу вашого підрозділу (або уявної компанії),
      що містить 5 розділів: загальні положення, основні завдання, права, обов''язки
      та відповідальність. Забезпечте повну відповідність нормам ДСТУ та сучасному
      правопису.'
    requirements:
      - мінімум 700 слів
      - чітка нумерація та структура
      - юридична точність формулювань
    motivation: Комплексна перевірка здатності створювати складні нормативні 
      тексти.
    model_answer: Проект положення має бути структурованим, логічним, написаним 
      нейтральним офіційним тоном. Усі терміни мають бути вжиті однозначно, а 
      права та обов'язки — сформульовані без лакун.
discussion_topics:
  - context: Чи може бути професійне письмо творчим процесом, чи це лише 
      слідування шаблонам?
    questions:
      - Як знайти баланс між стандартом та індивідуальністю в офіційному тексті?
      - Яка роль мовної інтуїції при написанні складних проектів нормативних 
        актів?
    motivation: Дискусія про філософію професійного письма.
activity_hints:
  - type: error-correction
    focus: Виправити стилістичні помилки та канцеляризми у фрагменті 
      управлінського документа
  - type: essay-response
    focus: Скласти проект положення про роботу підрозділу з дотриманням норм 
      ДСТУ та правопису
  - type: critical-analysis
    focus: 'Проаналізувати мовну культуру ділових листів Грушевського: визначити етикетні
      формули та стиль'
  - type: fill-in
    focus: 'Доповнити текст нормативного акта юридичною термінологією: диспозиція,
      регламентація, коректура'
phase: C2.3 [Professional Specialization]
