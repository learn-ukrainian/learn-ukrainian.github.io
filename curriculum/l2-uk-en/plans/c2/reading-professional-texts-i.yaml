content_outline:
- section: Вступ — Читання як активний процес (Introduction — Reading as an Active Process)
  words: 600
  points:
  - 'Принципова відмінність між читанням для задоволення та фаховим читанням: перехід від лінійності до прагматичного, цілеспрямованого
    пошуку знань.'
  - 'Відповідність Державному стандарту (§1.2.1.2): аналіз когнітивних стратегій для швидкої ідентифікації загального змісту
    та оцінки релевантності повідомлення за заголовком.'
- section: Структура фахових текстів та навігація (Structure of Professional Texts and Navigation)
  words: 900
  points:
  - 'Типова архітектура наукових статей (IMRAD) та технічної документації: роль анотації (абстракту) як первинного фільтра
    інформації.'
  - 'Помилка студента: лінійна обробка тексту (читання ''від А до Я''). Стратегія ''Abstract -> Headers -> Conclusion'' для
    швидкої оцінки доцільності повного прочитання.'
  - 'ДСТУ 3017:2015 та навігація за допомогою заголовків та підзаголовків: використання метаданих для побудови ментальної
    мапи тексту.'
- section: Переглядове та пошукове читання (Skimming and Scanning Strategies)
  words: 1100
  points:
  - 'Техніка ''Переглядового читання'' (Skimming): швидке охоплення основної тези та ідентифікація аргументації без заглиблення
    в деталі.'
  - 'Техніка ''Пошукового/вибіркового читання'' (Scanning): цілеспрямований пошук конкретних фактів, цифр або термінів за
    допомогою ключових слів.'
  - 'Помилка студента: плутанина між технікамі скімінгу та сканінгу (використання сканінгу для пошуку головної ідеї), що призводить
    до фрагментарності розуміння.'
- section: Робота з лексикою та контекстуальна інференція (Working with Vocabulary and Contextual Inference)
  words: 1000
  points:
  - 'Подолання ''словникової залежності'': стратегії розуміння фахового тексту без звернення до словника через морфологічний
    аналіз (суфікси -ння, -ість).'
  - 'Розвиток контекстуальної здогадки: використання фахового контексту та міжнародних коренів для визначення значень вузькоспеціалізованих
    термінів.'
  - 'Коли варто шукати значення: критерії критичності терміна для розуміння основної тези (зв''язок з М47).'
- section: 'Культурний контекст: Науковий простір України (Cultural Context: Ukrainian Scientific Space)'
  words: 750
  points:
  - 'Національна бібліотека України імені В. І. Вернадського (НБУВ): ієрархія каталогів та портал ''Наукова періодика України''
    як золотий стандарт джерел.'
  - 'Історичний внесок Івана Пулюя у формування української наукової термінології: боротьба за точність номенклатури у фізиці
    та інженерії на противагу імперським стандартам.'
- section: Практичний аналіз та критична оцінка (Practical Analysis and Critical Evaluation)
  words: 650
  points:
  - 'Застосування комбінованих стратегій на реальних текстах з платформи USJ: відбір релевантних джерел за ключовими словами
    та анотаціями.'
  - 'Критична оцінка прочитаного: перевірка аргументації на відповідність висунутій тезі та підготовка до поглибленого аналізу
    в М50.'
vocabulary_hints:
  required:
  - переглядове читання (skimming) — когнітивна стратегія для виявлення основної тези; висока частотність у науковому стилі
  - пошукове / вибіркове читання (scanning) — цілеспрямований пошук деталей; знайти інформацію про одну чи кілька деталей
  - вивчальне / інтенсивне читання (intensive reading) — поглиблена робота з текстом; аналіз кожного логічного блоку
  - стратегія читання (reading strategy) — когнітивна стратегія, вибір стратегії; свідомий підхід до обробки тексту
  - релевантність (relevance) — релевантність джерела, оцінка релевантності; відповідність інформаційному запиту
  - анотація (annotation/abstract) — структура анотації, стисла анотація; перший етап переглядового читання
  - теза (thesis/main point) — основна теза, аргументувати тезу; головне твердження автора
  - контекстуальна здогадка (contextual inference) — розуміння значення через фаховий контекст; подолання словникової залежності
  recommended:
  - когнітивний (cognitive) — когнітивні стратегії обробки інформації; ментальні процеси під час читання
  - навігація (navigation) — навігація за допомогою заголовків; орієнтація у структурі документа
  - абстракт (abstract) — синонім анотації; широко вживається у міжнародних наукових виданнях
  - номенклатура (nomenclature) — система назв у певній галузі; спадщина Івана Пулюя у термінології
  - інференція (inference) — логічний висновок на основі наявних даних; видобування прихованого змісту
