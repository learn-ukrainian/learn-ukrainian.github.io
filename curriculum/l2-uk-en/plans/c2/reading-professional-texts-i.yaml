module: c2-047
level: C2
sequence: 47
version: '1.2'
title: 'Критичне читання професійних текстів I: Академічний дискурс'
subtitle: 'Критичне читання професійних текстів I'
focus: professional
pedagogy: seminar
objectives:
  - Розвинути навички глибокого герменевтичного аналізу складних академічних 
    текстів
  - Навчитися деконструювати логіко-смислову структуру наукових публікацій 
    різних жанрів
  - Опанувати методи виявлення прихованої полеміки та ідеологічних нашарувань у 
    професійному дискурсі
  - Сформувати ефективні стратегії критичного оцінювання та синтезу фахової 
    інформації
content_outline:
  - section: Герменевтика наукового тексту
    words: 1250
    subsections:
      - 'Розуміння як процес: від поверхневого сприйняття до глибинного тлумачення'
      - Роль фонових знань та інтелектуального контексту в дешифруванні смислів
      - Аналіз термінологічного наповнення як ключа до авторської концепції
    key_concepts:
      - герменевтика
      - інтерпретація
      - горизонт очікувань
      - концептуальний аналіз
    primary_sources:
      - Юрій Шевельов, 'Українська мова в першій половині двадцятого століття' 
        (аналіз методології та стилю)
  - section: Логіко-смислова структура академічної публікації
    words: 1250
    subsections:
      - 'Архітектоніка наукової статті: від гіпотези до верифікації результатів'
      - Способи вираження причинно-наслідкових зв'язків та логічних переходів
      - Співвідношення фактичного матеріалу та теоретичних узагальнень
    key_concepts:
      - архітектоніка
      - предикація
      - аргументативне поле
      - дискурсивна зв'язність
  - section: Виявлення авторської позиції та прихованої полеміки
    words: 1250
    subsections:
      - 'Модальність наукового тексту: вираження впевненості, сумніву, припущення'
      - Аналіз цитування як інструменту залучення до інтелектуального діалогу
      - Розпізнавання прихованої критики та полемічних стратегій
    key_concepts:
      - авторська модальність
      - інтертекстуальність
      - полемічний дискурс
      - академічний етос
    primary_sources:
      - Дмитро Чижевський, 'Нариси з історії філософії на Україні' (вивчення 
        способів викладу філософських систем)
  - section: Стратегії опрацювання великих обсягів фахової інформації
    words: 1250
    subsections:
      - Методи швидкого читання (skimming та scanning) для професійних цілей
      - Створення аналітичних анотацій та реферативних оглядів
      - Критичне оцінювання джерел та верифікація наукових даних
    key_concepts:
      - інформаційна компресія
      - реферування
      - верифікація
      - критичне оцінювання
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
  - 'Авраменко, 11 клас (2019): Науковий стиль мовлення'
  - 'Державний стандарт 2024: C2 — читацька компетенція'
reading_situations:
  - source_type: Наукова монографія
    topic: Глибоке читання фрагментів праці Юрія Шевельова 'Українська мова в 
      першій половині двадцятого століття'. Аналіз аргументації.
    key_elements:
      - соціолінгвістичний контекст
      - фактологічна база
      - авторський стиль
    motivation: Знайомство з взірцевим академічним письмом світового рівня.
  - source_type: Філософське есе / Дослідження
    topic: Аналіз 'Нарисів з історії філософії на Україні' Дмитра Чижевського. 
      Дослідження способів структурування абстрактних ідей.
    key_elements:
      - філософська термінологія
      - логіка викладу
      - синтез ідей
    motivation: Розвиток здатності сприймати та аналізувати складні абстрактні 
      концепти.
listening_situations:
  - media_type: лекція
    setting: Запис академічної лекції сучасного українського історика про 
      проблеми інтерпретації архівних джерел.
    focus_points:
      - Використання наукового апарату в усному мовленні
      - Способи акцентування уваги на ключових тезах
    motivation: Сприйняття структурованого наукового викладу на слух.
writing_tasks:
  - task_type: есе
    prompt: Напишіть критичну рецензію на одну з прочитаних наукових праць 
      (Шевельова або Чижевського). Оцініть логічність аргументації, 
      переконливість висновків та стилістичну майстерність автора.
    requirements:
      - мінімум 600 слів
      - використання академічного стилю
      - наявність посилань на текст
    motivation: Відпрацювання навичок професійного рецензування та критичного 
      аналізу.
    model_answer: Рецензія повинна бути об'єктивною, містити аналіз структури, 
      змісту та стилю праці, а також аргументовану власну оцінку її наукового 
      значення.
discussion_topics:
  - context: Чи може бути науковий текст абсолютно об'єктивним, чи авторська 
      позиція завжди присутня через вибір мовних засобів?
    questions:
      - Як мова формує наукове знання?
      - У чому полягає етика наукового письма при висвітленні суперечливих тем?
    motivation: Дискусія про природу наукової істини та роль мови у її 
      вираженні.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про герменевтика наукового тексту і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про логіко-смислова структура академічної публікації, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Герменевтика наукового тексту». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему герменевтика наукового тексту."
  - type: comparative-study
    focus: "Порівняйте різні підходи до герменевтика наукового тексту: Розуміння як процес: від поверхневого сприйняття до глибинного тлумачення. Визначте спільне та відмінне."
phase: C2.3 [Professional Specialization]
