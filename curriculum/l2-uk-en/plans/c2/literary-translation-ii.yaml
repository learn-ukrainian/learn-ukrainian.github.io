module: literary-translation-ii
level: C2
sequence: 32
version: "1.0"
title: "Художній переклад II: проза та діалог"
subtitle: "Literary Translation II: Prose and Dialogue"
focus: professional
pedagogy: workshop
objectives:
  - "Вдосконалити навички відтворення індивідуального авторського стилю (ідіостилю) у прозі"
  - "Опанувати стратегії перекладу діалогів: відтворення мовленнєвих характеристик персонажів"
  - "Навчитися передавати соціальні та регіональні діалекти, сленг та жаргон"
  - "Дослідити проблему перекладу культурних реалій та інтертекстуальних посилань"
content_outline:
  - section: "Наративні стратегії та ідіостиль"
    words: 1000
    subsections:
      - "Відтворення наративної дистанції та точки зору в перекладі"
      - "Робота з довгими синтаксичними конструкціями: збереження дихання тексту"
      - "Стилістичне вирівнювання vs збереження авторської своєрідності"
    key_concepts:
      - "наратор"
      - "фокалізація"
      - "стилістична домінанта"
      - "ідіолект"
    primary_sources:
      - "Микола Лукаш: переклад 'Декамерона' Боккаччо та 'Фауста' Гете"
      - "Григорій Кочур, 'Майстри перекладу'"
  - section: "Поетика та прагматика перекладу діалогу"
    words: 1000
    subsections:
      - "Природність звучання: як уникнути 'перекладної мови' в діалогах"
      - "Мовленнєва характеристика: соціальний статус, вік та характер героя"
      - "Переклад гумору, іронії та мовної гри в прямій мові"
    key_concepts:
      - "мовленнєвий акт"
      - "репліка"
      - "субстандарт"
      - "когнітивний дисонанс"
  - section: "Діалекти та реалії: межі доречності"
    words: 1000
    subsections:
      - "Функціональний еквівалент діалекту: використання українських говірок"
      - "Стратегії перекладу реалій: транскрипція, опис, заміна"
      - "Переклад макаронізмів та іншомовних вкраплень у тексті"
    key_concepts:
      - "діалектизм"
      - "арго"
      - "форенізація"
      - "домістифікація"
  - section: "Перекладацька етика та критика"
    words: 1000
    subsections:
      - "Відповідальність перед автором та читачем: право на інтерпретацію"
      - "Аналіз сучасних перекладів світової класики українською мовою"
      - "Переклад як інструмент збагачення мовних ресурсів нації"
    key_concepts:
      - "деонтологія перекладу"
      - "інтерпретаційна модель"
      - "критика перекладу"
      - "літературний процес"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Передмова / Стаття"
    topic: "Микола Лукаш: майстер мовної гри та неологізмів у перекладі."
    key_elements: ["вербальна винахідливість", "архаїзація", "народно-розмовна стихія"]
    motivation: "Вивчення феноменальної мовотворчості одного з найвидатніших українських перекладачів."
  - source_type: "Наукова стаття"
    topic: "Проблема відтворення чорношкірого діалекту (AAVE) в українських перекладах американської літератури."
    key_elements: ["соціолект", "суржик", "компенсація"]
    motivation: "Обговорення складних випадків соціолінгвістичної адаптації тексту."
listening_situations:
  - media_type: "подкаст"
    setting: "Бесіда з перекладачами сучасної прози: 'Як перекладати нецензурну лексику та сленг'."
    focus_points:
      - "Межа між епатажем та природністю"
      - "Пошук синонімів в українській мові"
    motivation: "Ознайомлення з живим процесом подолання табу в перекладі."
writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть аналітичний звіт про порівняльне дослідження двох перекладів сучасного бестселера (наприклад, 'Гаррі Поттера' або романів Стівена Кінга), зосередившись на передачі власних назв та каламбурів."
    requirements: ["мінімум 500 слів", "доведення успішності або хибності обраної стратегії", "цитування прикладів"]
    motivation: "Розвиток навичок професійної оцінки якості перекладу."
    model_answer: "Звіт має бути структурованим, містити лінгвістичні аргументи та демонструвати глибоке розуміння прагматики тексту."
discussion_topics:
  - context: "Чи варто використовувати українські діалекти (наприклад, гуцульський) для перекладу іноземних регіональних говірок?"
    questions:
      - "Які ризики несе за собою така адаптація?"
      - "Чи не виникає ефекту 'очуження' у читача?"
    motivation: "Дискусія про стратегії локалізації та етнографічної точності перекладу."
