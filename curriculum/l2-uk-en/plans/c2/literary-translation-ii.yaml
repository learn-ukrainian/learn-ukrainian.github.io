content_outline:
- section: 'Вступ — Специфіка та етика перекладу прози (Introduction: Specifics and
    Ethics of Prose Translation)'
  words: 600
  points:
  - 'Специфіка художнього перекладу прози згідно з Держстандартом (§4.3.6): створення
    тексту певного стилю за планом та етика перекладу як інтерпретації.'
  - 'Принцип Миколи Лукаша: переклад має бути «дуже по-українськи», навіть якщо оригінал
    «дуже по-іспанськи» — пріоритет національної мовної стихії над буквою.'
  - 'Роль перекладу як інструменту культурної дипломатії (кейс 2024 року: бум перекладів
    української літератури за кордоном).'
- section: Відтворення авторського голосу та ідіолекту (Reconstructing Authorial Voice
    and Idiolect)
  words: 900
  points:
  - 'Ідентифікація авторського ідіолекту та збереження тону через стилістичні засоби
    лексики (§4.3.3): неологізми, епітети, метафори та синекдоха.'
  - 'Помилка №1: «перекладна мова» (translationese) через буквальне копіювання англійського
    порядку слів (SVO) — виправлення через інверсію та безособові звороти.'
  - 'Ритм прози: трансформація довгих англійських періодів у природні для української
    мови розгалужені атрибутивні конструкції.'
- section: Соціолекти, діалоги та мовлення персонажів (Sociolects, Dialogues, and
    Character Speech)
  words: 1000
  points:
  - 'Помилка №2: нівелювання соціолекту персонажів — використання лексичних та синтаксичних
    засобів української мови для передачі соціальної характеризації.'
  - Використання регіонального забарвлення та діалектизмів для відтворення іншомовного
    колориту (досвід Лукаша з перекладом Лорки через гуцульський діалект).
  - 'Стилістична диференціація мовлення (§4.3.1.1): перехід між розмовним, публіцистичним
    та художнім регістрами в межах діалогу.'
- section: Стратегії перекладу реалій та культурна адаптація (Strategies for Realia
    Translation and Cultural Adaptation)
  words: 1000
  points:
  - 'Типи реалій та методи їх передачі: транскрипція, калька, генералізація або функціональний
    аналог (кейс безеквівалентної лексики за Влаховим і Флоріним).'
  - 'Помилка №3: порушення ритму через вставні пояснення реалій — застосування стратегії
    транскрипції з підрядковою приміткою для збереження авторського темпу.'
  - Баланс між локалізацією (адаптацією для читача) та збереженням автентичності (екзотизацією)
    через метод експлікації прихованих смислів.
- section: 'Практикум перекладу — з англійської та на англійську (Translation Workshop:
    From and To English)'
  words: 1500
  points:
  - 'Педагогіка TTT: аналіз та самостійний переклад уривку прози перед вивченням теоретичних
    моделей (метод проб і помилок).'
  - 'Практикум: аналіз «щоденника» перекладу — від першої підрядкової версії до фінального
    редагування з урахуванням синтаксичної реструктуризації.'
  - 'Специфіка представлення українського автора іноземному читачу: збереження національної
    ідентичності та деколонізація наративу в англомовному контексті.'
