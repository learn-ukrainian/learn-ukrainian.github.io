vocabulary_hints:
  required:
  - прозовий переклад (prose translation) — здійснити прозовий переклад роману; професійний/академічний
    регістр
  - авторський голос (authorial voice) — зберегти упізнаваний авторський голос; ключовий
    концепт стилістики
  - реалія (realia) — безеквівалентна реалія; культурна реалія; стратегії перекладу
    за Влаховим та Флоріним
  - соціолект (sociolect) — відтворити соціолект персонажа; соціолінгвістичний маркер
    у діалозі
  - ідіолект (idiolect) — авторський ідіолект оповідача; відображення індивідуального
    стилю
  - примітка (footnote) — підрядкова примітка перекладача; засіб уникнення перевантаження
    тексту поясненнями
  - адаптація (adaptation) — вільна адаптація для цільового читача; висока частотність
    у всіх стилях
  - локалізація (localization) — культурна локалізація тексту; перенесення у звичне
    для читача середовище
  - контекст (context) — функціональний контекст реалії; збереження смислової цілісності
    при перекладі
  - інтерпретація (interpretation) — авторська інтерпретація оригіналу; межі допустимого
    в художньому перекладі
  recommended:
  - калька (calque) — семантична або структурна калька; загроза виникнення «перекладної
    мови» (translationese)
  - транскрипція (transcription) — транскрипція власних назв; фонетичне відтворення
    для збереження колориту
  - експлікація (explicitation) — метод експлікації (пояснення) прихованих смислів;
    академічний перекладацький прийом
  - генералізація (generalization) — метод генералізації (заміни часткового цілим);
    використання при другорядності контексту
  - конкретизація (particularization) — метод конкретизації поняття; уточнення значення
    при перекладі на українську
