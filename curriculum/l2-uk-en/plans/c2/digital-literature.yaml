content_outline:
- section: Вступ — Література в цифрову епоху (Introduction — Literature in the Digital Age)
  words: 650
  points:
  - Визначення цифрової літератури (born-digital) та її засаднича відмінність від дигіталізованої (digitized) класики; роль
    інтернету як простору свободи слова згідно зі Стандартом §3.20.
  - Концепція гіпертексту та нелінійної нарації як фундаменту новітнього літературного дискурсу; перехід від пасивного споживання
    до інтерактивної взаємодії з текстом.
- section: Генеалогія українського цифрового простору (Genealogy of the Ukrainian Digital Space)
  words: 1000
  points:
  - 'Культурний гачок: ''Самвидав'' — від підпілля 1960-х (Стус, Костенко, Сверстюк) до сучасної мережевої незалежності; тяглість
    традиції вільного слова в українському контексті.'
  - 'Деколонізаційний аспект: розбудова власної цифрової генеалогії поза межами ''Рунету''; вплив подій після 2014 року на
    сплеск україномовного цифрового літературного контенту.'
  - 'Типова помилка: відмінювання слова ''самвидав'' як іменника чоловічого роду (твори самвидаву, видано в самвидаві) та
    суворе застереження проти вживання форми ''саміздат''.'
- section: Новітні форми та провідні онлайн-платформи (New Forms and Leading Online Platforms)
  words: 1150
  points:
  - 'Огляд основних форм: гіпертекстова проза, інтерактивна фікшн (interactive fiction) та мережева візуальна поезія; відповідність
    вимогам Стандарту §4.3.6 щодо стилістики.'
  - 'Аналіз впливових порталів: ''ЛітАкцент'' та ''Читомо'' як гібридних вузлів професійної критики та спільнотного залучення;
    їхня роль у формуванні сучасної літературної ідентичності.'
  - 'Мовна норма: правильне вживання прийменника ''на'' з назвами цифрових середовищ (на платформі, на пристрої, на сайті)
    на противагу помилковому вживанню ''в платформі''.'
  - Поглиблений аналіз із залученням додаткових літературних зразків та міжтекстових зв'язків у контексті української та європейської
    традицій
- section: Соціальні медіа та авторський брендинг (Social Media and Author Branding)
  words: 1000
  points:
  - Феномен 'інстапоезії' (Instagram-poetry), літературний TikTok (BookTok) та фейсбук-проза як нові канали безпосередньої
    комунікації автора з авдиторією.
  - Стратегії розбудови персонального брендингу письменника в мережі; демократизація процесу публікації та виклики уваги читача
    в цифрову добу.
  - 'Лексична диференціація: розрізнення понять ''цифровий'' (технології, медіа) та ''числовий'' (числа, математичні ряди)
    для уникнення помилкового перекладу ''digital''.'
- section: Рецепція, критика та вторинні тексти (Reception, Criticism, and Secondary Texts)
  words: 1200
  points:
  - 'Трансформація літературної критики: книжкові блоги, влоги та краудсорсингові платформи (Goodreads) як інструменти рецепції
    та формування канону онлайн.'
  - 'Стандарт §4.3.8: Створення вторинних текстів у цифровій формі — методологія написання фахових рецензій, анотацій та довідково-інформаційних
    повідомлень.'
  - 'Стилістична вправність: використання складних підрядних речень згідно зі Стандартом §4.2.4 для академічного аналізу складних
    цифрових наративів.'
  - Поглиблений аналіз із залученням додаткових літературних зразків та міжтекстових зв'язків у контексті української та європейської
    традицій
vocabulary_hints:
  required:
  - концепція (concept) — авторська концепція тексту; нейтральний академічний реєстр
  - аналіз (analysis) — критичний аналіз цифрового дискурсу; Стандарт §4.3.6
  - дискурс (discourse) — цифровий літературний дискурс; висока частотність у наукових текстах
  - методологія (methodology) — методологія дослідження медіалітератури та цифрових форм
  - цифровий (digital) — цифрова доба, цифровий простір; не плутати з 'числовий' (numerical)
  - платформа (platform) — публікувати на платформі; уникати кальки 'в платформі'
  - самвидав (self-publishing) — у самвидаві (відмінюваний ч.р.); уникати форми 'саміздат'
  recommended:
  - інтерпретація (interpretation) — інтерпретація гіпертексту; суб'єктивне сприйняття читачем
  - контекстуалізація (contextualization) — контекстуалізація твору в межах сучасної мережевої культури
  - синтез (synthesis) — синтез традиційних літературних канонів та цифрових форм оповіді
  - краудсорсинг (crowdsourcing) — краудсорсингова критика; залучення спільноти до рецензування
  - дигіталізація (digitization) — дигіталізація фондів; процес оцифрування архівів та бібліотек
