module: c2-037
level: C2
sequence: 37
version: '1.2'
title: Цифрова література та мережева словесність
subtitle: Цифрова література та мережеве письмо
focus: literature
pedagogy: seminar
objectives:
  - Дослідити специфіку побутування літературного тексту в цифровому середовищі
  - Опанувати поняття гіпертексту, інтерактивної оповіді та мультимедійності
  - Вивчити вплив соціальних мереж на сучасну поетику та формотворення
  - Проаналізувати перспективи співпраці людини та штучного інтелекту в 
    літературній творчості
content_outline:
  - section: Гіпертекстуальність та нелінійність
    words: 1250
    subsections:
      - 'Від книги до екрана: трансформація читацького досвіду'
      - 'Гіпертекст як ризоматична структура: вузли, посилання, лабіринти'
      - 'Інтерактивність: читач як співавтор оповіді'
    key_concepts:
      - гіпертекст
      - нелінійність
      - мультимедійність
      - ризома
    primary_sources:
      - Марк Данилевський, 'Дім листя' (як прото-цифровий текст)
      - Українські цифрові проекти (наприклад, 'Чарівний світ UA')
  - section: 'Мережева література: поетика соцмереж'
    words: 1250
    subsections:
      - 'Фейсбук-поезія та Instagram-есеїстика: фрагментарність та миттєвість'
      - 'Блогосфера як простір для нових жанрів: лонгріди та мікроблоги'
      - Віральність та мережевий фольклор (меми, скріншоти)
    key_concepts:
      - віральність
      - мікропроза
      - лонгрід
      - мережевий ідіолект
  - section: Електронна література та штучний інтелект
    words: 1250
    subsections:
      - 'Генеративне мистецтво: алгоритми як інструмент творчості'
      - Штучний інтелект та великі мовні моделі (LLM) у ролі співавтора
      - 'Цифрова поезія: робота зі звуком, візуалізацією та кодом'
    key_concepts:
      - алгоритмічна поезія
      - генеративний текст
      - промпт-інжиніринг
      - постлюдство
  - section: Майбутнє книги та читання
    words: 1250
    subsections:
      - 'Аудіокниги та подкасти: повернення до усної традиції'
      - 'Цифрові архіви та бібліотеки: збереження та доступ до знань'
      - Проблема авторського права та автентичності в цифрову епоху
    key_concepts:
      - діджиталізація
      - конвергенція
      - трансмедійна оповідь
      - копірайт
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Наукова стаття
    topic: 'Еволюція гіпертексту: від ідеї Ванневара Буша до сучасних веб-платформ.'
    key_elements:
      - асоціативний зв'язок
      - інформаційний лабіринт
      - децентралізація
    motivation: Вивчення теоретичних витоків цифрової словесності.
  - source_type: Рецензія / Маніфест
    topic: 'Аналіз сучасного українського мультимедійного проекту: синтез слова та
      технології.'
    key_elements:
      - доповнена реальність (AR)
      - візуалізація
      - залучення користувача
    motivation: Ознайомлення з передовими практиками поєднання літератури з 
      новими медіа.
listening_situations:
  - media_type: подкаст
    setting: 'Бесіда з розробниками літературних ігор: ''Як розповісти історію, в
      якій гравець приймає рішення''.'
    focus_points:
      - Наративне дерево
      - Емоційна залученість
    motivation: Розуміння механіки інтерактивного сторітелінгу.
writing_tasks:
  - task_type: власне висловлення
    prompt: Спробуйте написати короткий 'мережевий' текст (мінімум 200 слів), 
      який би використовував можливості гіперпосилань (хоча б на рівні ідеї) та 
      фрагментарну композицію, адаптовану для читання з екрана мобільного 
      телефону.
    requirements:
      - фрагментарність
      - лаконізм
      - наявність прихованих смислів за 'посиланнями'
    motivation: Практичне освоєння специфіки цифрового письма.
    model_answer: Текст має бути зручним для сприйняття, демонструвати розуміння
      контексту споживання інформації в мережі та використовувати мультимедійні 
      алюзії.
discussion_topics:
  - context: Чи вб'є штучний інтелект професію письменника, чи стане його 
      найкращим помічником?
    questions:
      - Що є унікально людським у творчості, чого не може імітувати алгоритм?
      - Як зміниться поняття 'авторства', якщо текст написаний AI?
    motivation: Дискусія про етичні та філософські виклики технологічного 
      прогресу в культурі.
activity_hints:
  - type: critical-analysis
    focus: Проаналізуйте український мультимедійний літературний проєкт. 
      Визначте, як технології змінюють читацький досвід та які мовні засоби 
      використовує автор.
  - type: essay-response
    focus: Напишіть есе про перспективи гіпертекстової літератури українською 
      мовою. Обґрунтуйте, чи може цифрове середовище збагатити мову чи збідніти 
      її.
  - type: critical-analysis
    focus: Оцініть приклад генеративного тексту, створеного ШІ. Порівняйте його 
      з текстом живого автора за критеріями стилю, образності та мовної 
      автентичності.
  - type: essay-response
    focus: Доповніть текст про еволюцію цифрової словесності відповідними 
      термінами (гіпертекст, віральність, мережевий ідіолект, лонгрід, 
      конвергенція).
references:
  - 'Державний стандарт 2024: C2 — професійні компетенції, медіаграмотність'
  - Борзенко, 11 клас (Укр. літ.) — Сучасна українська література, нові жанри
  - Караман, 10 клас (2018), §53 — Стилістичне використання засобів словотвору
phase: C2.2 [Literary Mastery]
