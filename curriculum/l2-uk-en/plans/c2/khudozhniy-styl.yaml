vocabulary_hints:
  required:
  - 'оповідання (short story) — high frequency; collocations: ''коротке оповідання'',
    ''збірка оповідань'', ''писати оповідання'''
  - 'наратор (narrator) — academic register; types: ''ненадійний наратор'' (unreliable),
    ''всезнаючий наратор'' (omniscient)'
  - 'кульмінація (climax) — medium frequency; collocations: ''емоційна кульмінація'',
    ''у момент кульмінації'', ''наступила кульмінація'''
  - 'ліричний (lyrical) — high frequency; terms: ''ліричний герой'', ''ліричний відступ'',
    ''лірична поезія'''
  - метафора (metaphor) — high frequency; 'розгорнута метафора' (extended), 'смілива
    метафора', 'вживати метафору'
  - епітет (epithet) — high frequency; 'постійний епітет' (folkloric), 'влучний епітет',
    'постійний епітет'
  - 'символ (symbol) — high frequency; archetypes: ''символ волі'', ''національний
    символ'', ''глибокий символ'''
  - 'хронотоп (chronotope) — low frequency/academic; types: ''хронотоп дороги'', ''хронотоп
    міста'', ''поняття хронотопу'''
  - характеротворення (characterization) — academic term; 'засоби характеротворення',
    'психологічне характеротворення'
  - композиція (composition) — medium frequency; 'кільцева композиція' (circular),
    'складна композиція', 'елементи композиції'
  recommended:
  - ремарка (stage direction) — essential for the analysis of dramatic texts and character
    context
  - зав'язка (exposition/setup) — the starting point of plot development; 'несподівана
    зав'язка'
  - розв'язка (denouement) — the resolution of literary conflict; 'неминуча розв'язка'
  - персоніфікація (personification) — stylistic device where inanimate objects take
    on human traits per §4.3.3
  - алегорія (allegory) — complex symbolic representation often used in parables and
    fables
