module: c2-006
level: C2
sequence: 6
version: '1.3'
title: 'Художній стиль: інтертекстуальність та образність'
subtitle: 'Художній стиль: інтертекстуальність та образність'
focus: literature
pedagogy: workshop
objectives:
  - Досконало розуміти глибинні шари метафор, алегорій та символів у художньому 
    тексті
  - Аналізувати стилістичні фігури та тропи у складних творах класичної та 
    сучасної літератури
  - Опанувати поняття інтертекстуальності, алюзії та ремінісценції в 
    українському дискурсі
  - Розвинути власні навички високої художньої стилізації та творчого письма
content_outline:
  - section: Естетична функція мови та художній образ
    words: 1250
    subsections:
      - 'Художній образ як основа стилю: від конкретики до абстракції'
      - Багатство синоніміки, епітетів та порівнянь як засіб типізації
      - 'Експресивність та образність: роль емоційного забарвлення'
    key_concepts:
      - метафора
      - персоніфікація
      - евфонія
      - художній образ
  - section: Поетичний синтаксис та ритмомелодика
    words: 1250
    subsections:
      - Інверсія, паралелізм та риторичні фігури як засоби виразності
      - 'Специфіка авторського стилю (ідіостилю): аналіз індивідуальної манери'
      - Ритм та інтонація прозового та поетичного тексту
    key_concepts:
      - алюзія
      - ремінісценція
      - інтертекст
      - інверсія
  - section: Жанрові форми та художній експеримент
    words: 1250
    subsections:
      - Трансформація мовних засобів у різних літературних напрямах (від бароко 
        до постмодернізму)
      - 'Модернізм та постмодернізм в українській прозі: мовна деконструкція'
      - Гротеск, парадокс та іронія як стилістичні домінанти
    key_concepts:
      - гротеск
      - парадокс
      - поліфонія
      - деконструкція
  - section: Інтертекстуальність та культурний код
    words: 1250
    subsections:
      - 'Діалог текстів: як література відсилає до попередньої традиції'
      - Виявлення прихованих цитат та культурних кодів
      - Трансформація класичних сюжетів у сучасній літературі
    key_concepts:
      - палімпсест
      - архетип
      - культурний код
      - контекст
word_target: 5000
activities:
  types_required:
    - authorial-intent
    - critical-analysis
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Художній уривок
    topic: 'Аналіз імпресіоністичного письма та психологізму. Джерело: Михайло Коцюбинський,
      ''Intermezzo''.'
    motivation: Вивчення психологізму та багатства звукопису в українській 
      модерній прозі.
listening_situations:
  - media_type: відео
    setting: Фрагмент театральної вистави за твором Лесі Українки 'Лісова пісня'
      (монолог Мавки).
    focus_points:
      - Виразне читання та інтонаційне забарвлення художнього слова
      - Використання міфологічної лексики та засобів фольклорної стилізації
    motivation: Сприйняття художнього слова через акторську інтерпретацію та 
      аналіз ритміки.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть коротку художню стилізацію під українське бароко або 
      модернізм початку XX ст., описуючи сучасне місто крізь призму обраного 
      стилю.
    motivation: Розвиток здатності до імітації та глибокого розуміння художніх 
      засобів різних епох.
    model_answer: Текст має демонструвати глибоке розуміння обраного стилю 
      (наприклад, складні синтаксичні конструкції та алегоричність для бароко 
      або уривчастість речень та психологізм для модернізму). Використання 
      архаїзмів чи неологізмів має бути доречним.
discussion_topics:
  - context: Чи може художня література бути інструментом збереження та розвитку
      мови у часи глобалізації та цифровізації?
    questions:
      - Як змінюється мова класичних творів у сприйнятті сучасного цифрового 
        читача?
      - Чи варто 'осучаснювати' класичні тексти при перевиданні для молоді?
    motivation: Дебати про роль літератури у формуванні національної 
      ідентичності та мовної естетики.
activity_hints:
  - type: critical-analysis
    hint: Проаналізуйте стилістичні засоби (тропи, фігури, ідіостиль) у поданому
      художньому уривку
  - type: comparative-study
    hint: Порівняйте мовні засоби художнього стилю двох різних епох (бароко vs 
      модернізм)
  - type: essay-response
    hint: Напишіть художню стилізацію під обраний літературний напрям, описуючи 
      сучасне місто
  - type: authorial-intent
    hint: Визначте авторську інтенцію через аналіз інтертекстуальних зв'язків у 
      поданому фрагменті
references:
  - Глазова О. П. Українська мова, 11 клас (2019), §40-41 — художній стиль
  - Ворон А. А. Українська мова, 11 клас (2019), с. 115-140 — художній стиль 
    мовлення
  - Авраменко О. М. Українська література, 11 клас — аналіз поезії та 
    літературознавча термінологія
  - 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
