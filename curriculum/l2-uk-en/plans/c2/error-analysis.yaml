module: c2-090
level: C2
sequence: 90
version: '1.2'
title: Аналіз помилок та культура мовлення
subtitle: Аналіз помилок і культура мовлення
focus: integration
pedagogy: workshop
objectives:
  - Систематизувати знання про типові помилки в українському мовленні (лексичні,
    граматичні, синтаксичні)
  - Навчитися ідентифікувати та усувати кальки, росіянізми та суржикові форми
  - Опанувати норми українського правопису 2019 року та акцентологічні стандарти
  - Розвинути навички редагування текстів різних стилів для підвищення культури 
    мовлення
content_outline:
  - section: 'Лексичні помилки: подолання інтерференції'
    words: 1250
    subsections:
      - 'Росіянізми та суржик: причини появи та стратегії заміщення питомими словами'
      - 'Кальки як прихована загроза: буквальний переклад фразеологізмів та стійких
        сполук'
      - 'Пароніми та плеоназми: точність слововживання та уникнення надмірності'
    key_concepts:
      - інтерференція
      - мовна калька
      - плеоназм
      - мовна норма
    primary_sources:
      - Борис Антоненко-Давидович, «Як ми говоримо»
  - section: Граматична та синтаксична правильність
    words: 1250
    subsections:
      - 'Складні випадки керування та узгодження: відмінки після числівників та дієслів'
      - 'Вживання активних та пасивних конструкцій: вибір на користь природності'
      - Помилки в побудові складних речень та вживанні дієприслівникових 
        зворотів
    key_concepts:
      - керування
      - узгодження
      - дієприслівниковий зворот
      - синтаксична норма
    primary_sources:
      - Правопис 2019 (розділи про синтаксис та пунктуацію)
  - section: Орфоепія та культура вимови
    words: 1250
    subsections:
      - 'Складні випадки наголошення в українській мові: подвійні наголоси та акцентологічні
        варіанти'
      - Вплив іноземних мов на сучасну вимову та шляхи збереження милозвучності
      - 'Офіційний та розмовний стандарти вимови: доречність та межі'
    key_concepts:
      - орфоепія
      - акцентологія
      - милозвучність
      - евфонія
    primary_sources:
      - Олександр Авраменко, посібники з культури мовлення
  - section: Редагування та самоконтроль
    words: 1250
    subsections:
      - 'Методика редагування тексту: від загального змісту до розділових знаків'
      - Використання онлайн-сервісів для перевірки текстів (OnlineCorrection, 
        LanguageTool)
      - Формування мовного смаку та відповідальності за якість мовлення
    key_concepts:
      - літературне редагування
      - саморедагування
      - мовна стійкість
      - мовний смак
    primary_sources:
      - Марія Волощак, «Неправильно — правильно. Довідник з українського 
        слововживання»
word_target: 5000
activities:
  types_required:
    - error-correction
    - critical-analysis
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
  - 'Авраменко, 11 клас (2019): Культура мовлення'
  - 'Державний стандарт 2024: C2 — лінгвістична компетенція'
reading_situations:
  - source_type: критична стаття / посібник
    topic: Аналіз найбільш поширених помилок у сучасних українських медіа за 
      Антоненком-Давидовичем.
    key_elements:
      - лексична точність
      - традиція вжитку
      - природні конструкції
    motivation: Розвиток критичного ставлення до текстів, що оточують нас у 
      повсякденні.
  - source_type: правописний кодекс
    topic: 'Зміни в українському правописі 2019 року: що стало нормою і чому.'
    key_elements:
      - флексії
      - написання разом/окремо
      - іншомовні слова
    motivation: Забезпечення відповідності мовлення сучасним академічним 
      стандартам.
listening_situations:
  - media_type: аудіо
    setting: 'Радіопередача про культуру мовлення: розбір типових помилок у промовах
      політиків та зірок шоу-бізнесу.'
    focus_points:
      - Неправильне наголошення слів
      - Використання недоречних іноземних слів (варваризмів)
    motivation: Розвиток здатності ідентифікувати мовні огріхи на слух у 
      швидкому потоці мовлення.
writing_tasks:
  - task_type: репортаж
    prompt: Проаналізуйте текст (репортаж або статтю) з будь-якого популярного 
      українського новинного порталу. Знайдіть принаймні 5 лексичних або 
      граматичних помилок, поясніть, чому це помилки, і запропонуйте правильні 
      варіанти.
    requirements:
      - мінімум 400 слів
      - аргументація з посиланням на словники або правопис
      - структурований виклад
    motivation: Практичне відпрацювання навичок лінгвістичної експертизи тексту.
    model_answer: Аналіз має містити цитату з помилкою, класифікацію помилки 
      (наприклад, 'калька'), пояснення норми та відредагований варіант речення.
discussion_topics:
  - context: Чи є суржик окремою мовою, діалектом чи проявом мовної 
      неосвіченості?
    questions:
      - Чи допустимий суржик у художній літературі (наприклад, у 
        Подерев'янського)?
      - Як боротися з суржиком у власному оточенні, не ображаючи людей?
    motivation: Обговорення соціальних та етичних аспектів чистоти мови.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про лексичні помилки: подолання інтерференції і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про граматична та синтаксична правильність, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Лексичні помилки: подолання інтерференції». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему лексичні помилки: подолання інтерференції."
  - type: comparative-study
    focus: "Порівняйте різні підходи до лексичні помилки: подолання інтерференції: Росіянізми та суржик: причини появи та стратегії заміщення питомими словами. Визначте спільне та відмінне."
phase: C2.4 [Meta-Skills & Capstone]
