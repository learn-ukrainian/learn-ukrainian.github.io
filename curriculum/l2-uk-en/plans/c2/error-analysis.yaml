content_outline:
- section: 'Вступ: Помилка як інструмент навчання (Introduction: Error as a Learning Tool)'
  words: 500
  points:
  - 'Типологія мовних помилок згідно з Державним стандартом (§4.0 Каталог В): диференціація між системною помилкою (error)
    та випадковою обмовкою (slip)'
  - Концепція помилки як джерела розвитку свідомого володіння мовленням; психологічні аспекти інтерференції та явища гіперкорекції
- section: 'Орфографія та історія: Кейс літери «Ґ» (Orthography and History: The Case of the Letter ''G'')'
  words: 900
  points:
  - Історія літери «Ґ» як приклад політичного втручання в орфографію (заборона 1933 року); відновлення норми як акт історичної
    справедливості та деколонізації
  - Аналіз типових орфографічних помилок у правописі голосних (е/и, о/а) та подвоєння/подовження крізь призму Українського
    правопису 2019 року
- section: 'Граматичні пастки: Канцелярит та інтерференція (Grammatical Traps: Officialese and Interference)'
  words: 900
  points:
  - 'Подолання канцеляриту: трансформація штучних пасивних конструкцій («нами було вирішено») у нормативні активні форми («ми
    вирішили»)'
  - 'Корекція прийменникової інтерференції: виправлення помилок на кшталт «по понеділкам» (щопонеділка) та «вибачаюсь» (перепрошую
    або вибачте мені)'
- section: 'Лексична чистота: Пуризм та подолання калькованих форм (Lexical Purity: Purism and Overcoming Calques)'
  words: 900
  points:
  - 'Культурний гачок: Стовпи чистоти мови — Святослав Караванський та його «Секрети української мови» як форма інтелектуального
    опору асиміляції'
  - 'Практичний аналіз лексичних кальок: «брати участь» замість «приймати участь», «зрештою» замість «в кінці кінців», «протягом»
    замість «на протязі»'
- section: 'Стилістичні помилки: Тавтологія та плеоназм (Stylistic Errors: Tautology and Pleonasm)'
  words: 600
  points:
  - Діагностика лексичного плеоназму та прихованої тавтології у текстах високого регістру; диференціація варіанта норми від
    грубого порушення
  - 'Змішування стилів та регістрів: аналіз надмірної метафоризації та порушення логіки тексту в академічному дискурсі'
- section: 'Стратегії самокорекції: Голос Senior Proofreader (Self-Correction Strategies: The Senior Proofreader Voice)'
  words: 600
  points:
  - 'Методологія перевірки власного тексту: використання чек-лістів для виявлення двозначності та перевірки логічної зв''язності
    за стандартом §4.0'
  - Робота з авторитетними джерелами (НАН України, словники r2u.org.ua) для верифікації складних випадків слововживання
- section: 'Практикум: Лабораторія редактора (Workshop: Editor''s Laboratory)'
  words: 600
  points:
  - 'Критичний аналіз текстів із сучасних медіа: виявлення русизмів, калькування та порушення норм сполучуваності'
  - 'Створення особистої мапи помилок: фіксація індивідуальних мовленнєвих пасток та розробка алгоритмів їхнього автоматичного
    подолання'
vocabulary_hints:
  required:
  - інтерференція (interference) — мовна/міжмовна інтерференція; негативний вплив першої мови на вивчену
  - гіперкорекція (hypercorrection) — явище гіперкорекції; надмірне виправлення форм, що не є помилковими
  - плеоназм (pleonasm) — лексичний/невиправданий плеоназм; вживання зайвих слів («масло масляне»)
  - тавтологія (tautology) — прихована тавтологія; припускатися тавтології; повторення спільнокореневих слів
  - калькування (calquing) — сліпе/синтаксичне калькування; механічний переклад сталих виразів
  recommended:
  - пуризм (purism) — мовний пуризм; прагнення до очищення мови від іншомовних запозичень (кейс Караванського)
  - канцеляризм (officialese) — бюрократичний канцеляризм; зловживання книжними штампами у живому мовленні
  - самокорекція (self-correction) — стратегія самокорекції; здатність самостійно виправляти власні помилки
  - адекватність (adequacy) — адекватність мовлення; відповідність висловлювання контексту та нормам літературної мови
vocabulary:
  required:
