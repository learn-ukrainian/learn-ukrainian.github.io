vocabulary_hints:
  required:
  - договір (contract) — укласти, розірвати, порушити умови; висока частотність у
    діловому обігу
  - позов (claim/lawsuit) — подати, задовольнити, відхилити; ключовий термін цивільного
    та кримінального процесів
  - засвідчувати (to certify) — підписом, печаткою, нотаріусом; офіційне підтвердження
    факту або документа
  - відповідальність (liability/responsibility) — нести, кримінальна, адміністративна,
    притягнути до; юридичні наслідки діяння
  - згідно з (according to) — вимагає орудного відмінка (Instr.); критично важлива
    конструкція офіційного стилю
  recommended:
  - відповідно до (in accordance with) — вимагає родового відмінка (Gen.); стандартна
    формула посилання на норми
  - угода (agreement) — додаткова, мирова, досягти угоди; часто вживається для позначення
    результату переговорів
  - доручення (power of attorney) — видати, нотаріально засвідчене; передача повноважень
    іншій особі
  - скарга (complaint/appeal) — апеляційна, касаційна; термін для процесу оскарження
    рішень у судах
  - вживати заходів (to take measures) — нормативна сполучуваність; заміна калькованого
    «приймати міри»
  - брати участь (to participate) — нормативна сполучуваність; заміна калькованого
    «приймати участь»
