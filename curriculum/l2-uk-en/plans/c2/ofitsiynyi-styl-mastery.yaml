content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - 'Характеристика офіційно-ділового стилю на рівні C2: юридична точність, лаконізм
    та стандартизація мовних засобів'
  - 'Історичні витоки української правничої думки: аналіз термінології ''Руської Правди''
    Ярослава Мудрого (майнові права, штрафи)'
  - 'Конституція Пилипа Орлика (1710) як символ правової суб''єктності: структура
    документа та аналіз мовних формул XVIII століття'
- section: Договори та угоди (Contracts and Agreements)
  words: 700
  points:
  - 'Структура та реквізити договору: аналіз преамбули, предмета угоди та форс-мажорних
    обставин'
  - 'Частотна лексика та сполучуваність: укладання, розірвання та порушення умов договору;
    розмежування понять «договір» та «угода»'
  - 'Формульні вирази в преамбулах: «Цим засвідчується...», «Сторони дійшли згоди...»
    та використання кліше для юридичної однозначності'
- section: Процесуальні документи (Procedural Documents)
  words: 700
  points:
  - 'Позовна заява: мовні вимоги до викладу обставин справи та формулювання вимог
    (подати, задовольнити або відхилити позов)'
  - 'Апеляційні та касаційні скарги: специфіка аргументації та використання юридичних
    кліше для оскарження рішень'
  - 'Клопотання та судові ухвали: аналіз структури судового рішення та способів його
    мовного оформлення'
- section: Адміністративні та нотаріальні акти (Administrative and Notarial Acts)
  words: 600
  points:
  - 'Доручення (Power of Attorney): нотаріальне засвідчення факту та повноважень;
    діяти «на підставі доручення»'
  - 'Службові записки, накази та розпорядження: ієрархія адміністративної документації
    та мовні засоби вираження наказовості'
  - 'Протоколи та акти: фіксація фактів за допомогою стандартних виразів; вимоги до
    об''єктивності та точності опису'
- section: Мовні норми та корекція помилок (Linguistic Norms and Error Correction)
  words: 600
  points:
  - 'Корекція калькованих прийменникових конструкцій: вживання «згідно з» (Inst.)
    та «відповідно до» (Gen.) замість помилкових «згідно наказу»'
  - 'Де-русифікація юридичної термінології: розрізнення понять «позов» (claim) vs
    суржикове «іск», «повістка» vs «повестка»'
  - 'Лексична точність: подолання кальок «приймати міри/участь» шляхом вживання нормативних
    «вживати заходів» та «брати участь»'
- section: Стилістичні особливості правової мови (Stylistic Features of Legal Language)
  words: 500
  points:
  - 'Безособові конструкції як маркер об''єктивності: використання форм «встановлено»,
    «передбачено», «визначено» у тексті документа'
  - 'Пасивний стан та його функція в юридичному дискурсі: аналіз переваг пасивних
    конструкцій над активними для створення офіційного тону'
  - 'Синтаксис юридичного тексту: використання складних речень з чітким логічним зв''язком
    та умови («У разі...»)'
- section: 'Практикум: Складання документів (Workshop: Document Composition)'
  words: 400
  points:
  - 'Творче завдання: складання проекту двосторонньої угоди з дотриманням усіх структурних
    частин та формульних виразів'
  - 'Аналіз та редагування реального судового рішення: виявлення мовних недоліків
    та їх усунення згідно з нормами сучасного стилю'
  - 'Моделювання ситуації: написання апеляційної скарги з використанням аргументаційних
    стратегій та юридичної термінології'
