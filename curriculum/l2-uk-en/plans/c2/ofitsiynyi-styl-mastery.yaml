module: c2-004
level: C2
sequence: 4
version: 1.3.2
title: 'Офіційно-діловий стиль: рівень експерта'
subtitle: Майстерність офіційно-ділового стилю
focus: professional
pedagogy: workshop
objectives:
- Вивчити лексичні та граматичні стандарти офіційно-ділового мовлення на 
  найвищому рівні
- Навчитися складати та редагувати складні юридичні, адміністративні та 
  дипломатичні документи
- 'Опанувати культуру професійного спілкування: від офіційного листування до переговорів'
- Засвоїти особливості функціонування ділової мови в умовах цифровізації
content_outline:
- section: Стилістичні норми та стандартизація ділових паперів
  words: 1250
  subsections:
  - 'Уніфікація документів: реквізити, бланки, формуляри'
  - 'Специфічна лексика та фразеологія: вживання канцеляризмів та штампів'
  - Кодифікація офіційно-ділового стилю в сучасних правописах
  key_concepts:
  - реквізит
  - формуляр
  - кодифікація
  - уніфікація
- section: 'Юридичний підстиль: точність та імперативність викладу'
  words: 1250
  subsections:
  - 'Термінологія права: легітимність, диспозиція, санкція'
  - Специфіка вживання дієслівних форм у наказах, угодах та постановах
  - Безособовість та об'єктивність юридичного тексту
  key_concepts:
  - легітимність
  - диспозиція
  - імперативність
  - прецедент
- section: Ділова етика та дипломатичний протокол
  words: 1250
  subsections:
  - Етикетні формули ввічливості в офіційному листуванні
  - 'Структура та мова дипломатичної ноти: від протоколу до суті'
  - Міжкультурні аспекти професійної комунікації
  key_concepts:
  - етикет
  - компетентність
  - субординація
  - протокол
- section: Сучасне електронне діловодство та цифрова комунікація
  words: 1250
  subsections:
  - Специфіка мови державних онлайн-сервісів та реєстрів
  - Особливості офіційного листування електронною поштою та в месенджерах
  - Кібербезпека та етика цифрової взаємодії
  key_concepts:
  - інтерфейс
  - верифікація
  - транспарентність
  - цифрова підпись
- section: Підсумок — Summary
  words: 300
  points:
  - Official-business style relies on strict standardization, utilizing specific
    requisites (реквізит, формуляр) and precise legal terminology (легітимність,
    диспозиція) alongside modern digital communication standards (верифікація, 
    транспарентність).
  - 'Self-check: What is the difference between кодифікація and уніфікація in document
    creation? Name 3 essential components (реквізити) of a formal business letter.
    How does the imperative nature of legal texts affect the choice of verb forms?'
word_target: 5000
activities:
  types_required:
  - error-correction
  - translate
  - writing
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Юридичний документ
  topic: 'Аналіз мови Конституції України як взірця офіційно-ділового стилю. Джерело:
    Конституція України (Преамбула та Розділ І).'
  motivation: Вивчення еталонного офіційного тексту з високим ступенем 
    абстракції.
listening_situations:
- media_type: інтерв'ю
  setting: Прес-брифінг офіційного представника Міністерства закордонних справ.
  focus_points:
  - Дипломатичні звороти та евфемізми
  - Стилістично нейтральна лексика у відповідях на гострі запитання
  motivation: Розуміння усного офіційного мовлення та його відмінностей від 
    письмового стандарту.
writing_tasks:
- task_type: офіційний лист
  prompt: Складіть офіційну претензію до компанії-партнера щодо невиконання умов
    договору, використовуючи специфічну лексику (пеня, реквізиції, форс-мажор) 
    та посилаючись на пункти угоди.
  motivation: Практичне відпрацювання навичок ділового листування у конфліктних 
    ситуаціях.
  model_answer: 'Лист має містити: офіційний бланк, посилання на конкретні пункти
    договору, чітку вимогу про усунення порушень, зазначення термінів та наслідків
    невиконання. Стиль — сухий, логічний, без емоційного забарвлення, з використанням
    складних синтаксичних конструкцій.'
discussion_topics:
- context: Чи повинна ділова мова ставати простішою та ближчою до розмовної 
    ('plain language'), чи вона має зберігати свою архаїчність задля 
    максимальної точності?
  questions:
  - Які ризики надмірного спрощення офіційного стилю в юридичних документах?
  - Як ви оцінюєте мову сучасних державних онлайн-сервісів (наприклад, 'Дія')?
  motivation: Обговорення тенденцій демократизації офіційного стилю в Україні та
    світі.
activity_hints:
- type: reading
  focus: Прочитайте текст про стилістичні норми та стандартизація ділових 
    паперів і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про юридичний підстиль: точність
    та імперативність викладу, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Стилістичні норми 
    та стандартизація ділових паперів». Обґрунтуйте свою позицію прикладами з 
    тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    стилістичні норми та стандартизація ділових паперів.
- type: comparative-study
  focus: 'Порівняйте різні підходи до стилістичні норми та стандартизація ділових
    паперів: Уніфікація документів: реквізити, бланки, формуляри. Визначте спільне
    та відмінне.'
references:
- Глазова О. П. Українська мова, 11 клас (2019), §44-45 — офіційно-діловий стиль
- Ворон А. А. Українська мова, 11 клас (2019), с. 200-240 — ділове мовлення
- Конституція України — еталон офіційно-ділового стилю
- 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
