module: c1-bridge-assessment
level: C2
sequence: 1
version: "1.1"
title: "Комплексне оцінювання рівня C1"
subtitle: "C1 Bridge Assessment"
focus: checkpoint
pedagogy: review
objectives:
  - "Оцінити рівень володіння складними граматичними структурами української мови"
  - "Перевірити здатність розуміти автентичні тексти різних стилів без словника"
  - "Проаналізувати вміння аргументувати власну позицію в письмовій формі"
  - "Підготуватися до переходу на рівень вільного володіння C2"
content_outline:
  - section: "Ревізія складної граматики та синтаксису"
    words: 1000
    subsections:
      - "Складні випадки керування та узгодження в академічному дискурсі"
      - "Активні та пасивні конструкції: функціонально-стилістичний вибір"
      - "Специфіка вживання дієприкметникових та дієприслівникових зворотів"
    key_concepts:
      - "синтаксичний паралелізм"
      - "інверсія"
      - "адекватність"
  - section: "Текстуальна герменевтика: аналіз публіцистичного тексту"
    words: 1000
    subsections:
      - "Глибоке читання аналітичної статті"
      - "Виявлення прихованих смислів, іронії та підтексту"
      - "Стилістичне декодування авторських інтенцій"
    key_concepts:
      - "авторська інтенція"
      - "риторичне запитання"
      - "когнітивна метафора"
  - section: "Дискурс та стратегії аргументації"
    words: 1000
    subsections:
      - "Побудова логічної структури розгорнутого висловлювання"
      - "Використання вставних конструкцій для забезпечення зв'язності"
      - "Риторичні прийоми переконання в інтелектуальній дискусії"
    key_concepts:
      - "теза"
      - "аргумент"
      - "висновок"
      - "когезія"
  - section: "Психолінгвістичні аспекти мовної стійкості"
    words: 1000
    subsections:
      - "Мовна ідентичність у кризових ситуаціях"
      - "Адаптація мовленнєвої поведінки до соціокультурного контексту"
    key_concepts:
      - "мовна стійкість"
      - "адаптивність"
      - "рефлексія"
word_target: 4000
activities:
  types_required:
    - error-correction
    - critical-analysis
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Аналітична стаття"
    topic: "Еволюція української мовної ідентичності у XXI столітті. Джерело: Володимир Єрмоленко, 'Плинні ідеології'."
    motivation: "Перевірка здатності сприймати абстрактні поняття та складну лексику."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть есе на тему: 'Чи є мовна норма статичною категорією, чи вона повинна адаптуватися до викликів часу?'"
    motivation: "Перевірка вміння будувати логічну аргументацію та використовувати багатий словниковий запас."
    model_answer: "Есе має містити чітку тезу про динамічність мовної норми, два розгорнуті аргументи (наприклад, про вплив технологій та правописні зміни 2019 року), приклади з літератури чи історії, та підсумок, що підкреслює баланс між традицією та інновацією."
discussion_topics:
  - context: "Проблема суржику в сучасному українському суспільстві: маркер маргінальності чи природний етап мовного розвитку?"
    questions:
      - "Які соціальні чинники сприяють збереженню суржику?"
      - "Чи можливо повністю викорінити суржик через освіту?"
    motivation: "Розвиток навичок ведення дискусії на гострі соціолінгвістичні теми."
