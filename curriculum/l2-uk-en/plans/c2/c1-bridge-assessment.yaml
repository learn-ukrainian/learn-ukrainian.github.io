module: c2-001
level: C2
sequence: 1
version: 1.2.2
title: Комплексне оцінювання рівня C1
subtitle: Комплексне оцінювання C1
focus: checkpoint
pedagogy: review
objectives:
- Оцінити рівень володіння складними граматичними структурами української мови
- Перевірити здатність розуміти автентичні тексти різних стилів без словника
- Проаналізувати вміння аргументувати власну позицію в письмовій формі
- Підготуватися до переходу на рівень вільного володіння C2
content_outline:
- section: Ревізія складної граматики та синтаксису
  words: 1000
  subsections:
  - Складні випадки керування та узгодження в академічному дискурсі
  - 'Активні та пасивні конструкції: функціонально-стилістичний вибір'
  - Специфіка вживання дієприкметникових та дієприслівникових зворотів
  key_concepts:
  - синтаксичний паралелізм
  - інверсія
  - адекватність
- section: 'Текстуальна герменевтика: аналіз публіцистичного тексту'
  words: 1000
  subsections:
  - Глибоке читання аналітичної статті
  - Виявлення прихованих смислів, іронії та підтексту
  - Стилістичне декодування авторських інтенцій
  key_concepts:
  - авторська інтенція
  - риторичне запитання
  - когнітивна метафора
- section: Дискурс та стратегії аргументації
  words: 1000
  subsections:
  - Побудова логічної структури розгорнутого висловлювання
  - Використання вставних конструкцій для забезпечення зв'язності
  - Риторичні прийоми переконання в інтелектуальній дискусії
  key_concepts:
  - теза
  - аргумент
  - висновок
  - когезія
- section: Психолінгвістичні аспекти мовної стійкості
  words: 1000
  subsections:
  - Мовна ідентичність у кризових ситуаціях
  - Адаптація мовленнєвої поведінки до соціокультурного контексту
  key_concepts:
  - мовна стійкість
  - адаптивність
  - рефлексія
- section: Підсумок — Summary
  words: 300
  points:
  - 'Complex academic syntax requires mastery of active versus passive constructions,
    inversion, and precise use of participles (дієприкметникові звороти). Self-check:
    What is the stylistic difference between an active and passive sentence in Ukrainian?
    Rewrite an active statement into a formal passive construction.'
  - "Argumentation and textual hermeneutics rely on building logical structures (теза,
    аргумент, висновок) and decoding hidden subtexts. Self-check: How do cognitive
    metaphors reveal an author's true intention? Construct a brief argument defending
    a thesis using advanced cohesion markers."
  - 'Language resilience (мовна стійкість) involves adapting linguistic identity to
    sociocultural contexts. Self-check: How does your speech behavior adapt during
    a crisis? Describe two strategies for maintaining language stability.'
word_target: 4000
activities:
  types_required:
  - error-correction
  - critical-analysis
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Аналітична стаття
  topic: 'Еволюція української мовної ідентичності у XXI столітті. Джерело: Володимир
    Єрмоленко, ''Плинні ідеології''.'
  motivation: Перевірка здатності сприймати абстрактні поняття та складну 
    лексику.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть есе на тему: ''Чи є мовна норма статичною категорією, чи вона
    повинна адаптуватися до викликів часу?'''
  motivation: Перевірка вміння будувати логічну аргументацію та використовувати 
    багатий словниковий запас.
  model_answer: Есе має містити чітку тезу про динамічність мовної норми, два 
    розгорнуті аргументи (наприклад, про вплив технологій та правописні зміни 
    2019 року), приклади з літератури чи історії, та підсумок, що підкреслює 
    баланс між традицією та інновацією.
discussion_topics:
- context: 'Проблема суржику в сучасному українському суспільстві: маркер маргінальності
    чи природний етап мовного розвитку?'
  questions:
  - Які соціальні чинники сприяють збереженню суржику?
  - Чи можливо повністю викорінити суржик через освіту?
  motivation: Розвиток навичок ведення дискусії на гострі соціолінгвістичні 
    теми.
activity_hints:
- type: reading
  focus: Прочитайте текст про ревізія складної граматики та синтаксису і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про текстуальна герменевтика: аналіз
    публіцистичного тексту, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Ревізія складної 
    граматики та синтаксису». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    ревізія складної граматики та синтаксису.
- type: comparative-study
  focus: 'Порівняйте різні підходи до ревізія складної граматики та синтаксису: Складні
    випадки керування та узгодження в академічному дискурсі. Визначте спільне та відмінне.'
references:
- Глазова О. П. Українська мова, 11 клас (2019), §40-45 — стилістичне 
  забарвлення лексики
- Заболотний О. В. Українська мова, 11 клас (2019), с. 177-198 — стилістично 
  забарвлена лексика
- 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
