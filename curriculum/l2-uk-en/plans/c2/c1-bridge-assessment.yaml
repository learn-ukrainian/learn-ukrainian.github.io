module: c2-001
level: C2
sequence: 1
slug: c1-bridge-assessment
version: '2.0'
title: Перехідний модуль C1→C2 та діагностика
focus: checkpoint
pedagogy: TTT
phase: C2.1 [Stylistics & Rhetoric]
word_target: 5000
objectives:
- Аналізувати ключові поняття та явища модуля на рівні глибокого розуміння
- Продукувати тексти академічного та професійного рівня за тематикою модуля
- Демонструвати вільне володіння спеціалізованою лексикою та термінологією
- 'Застосовувати знання з теми «Культурний контекст: ЗНО та синтетичність Шевельова» у власній мовній практиці'
sources:
- name: Ukrainian State Standard C2 (2024)
  url: https://mon.gov.ua/
  type: reference
  notes: C2 proficiency descriptors and requirements
- name: CEFR C2 Descriptors
  url: https://www.coe.int/en/web/common-european-framework-reference-languages
  type: reference
  notes: General C2 level descriptors for comparison
content_outline:
- section: 'Вступ: Філософія рівня C2 та «Архітектор мови» (Introduction: C2 Philosophy and the Language Architect)'
  words: 500
  points:
  - 'Порівняння компетенцій C1 та C2: від вільного володіння до абсолютної точності та усвідомленого естетичного вибору.'
  - Метафора «Архітектора мови» — проектування комунікації замість механічного будування речень.
  - 'Концепція «холодного душу»: чесна діагностика як необхідний етап перед зануренням у найвищий рівень майстерності.'
- section: Діагностика граматичних компетенцій та типові помилки (Grammar Competence Diagnostics and Common Errors)
  words: 1000
  points:
  - 'Аналіз складного синтаксису: перевірка вживання дієприслівникових зворотів та повної парадигми 7 відмінків у рідкісних
    формах.'
  - 'Learner error: калькування англійських пасивних конструкцій (Passive voice overuse) — вправа на трансформацію «Було вирішено»
    у активні форми «Ми вирішили» або безособові «Рішення ухвалено».'
  - 'Діагностика прийменникового керування в абстрактних поняттях: розрізнення правильного «Враження від» (correct) та помилкового
    «Враження про».'
  - 'Аналіз типових помилок у керуванні дієслів: «характерний для» проти нюансів використання «типовий для».'
- section: Стилістичні регістри та трансформація за Стандартом (Stylistic Registers and Transformation by Standard)
  words: 1250
  points:
  - 'Діагностика за Державним стандартом C2 (§4.3.7): уміння трансформувати науковий текст у науково-популярний та офіційний
    у публіцистичний.'
  - 'Learner error: Stylistic mismatch — виявлення недоречного використання сленгу («класний», «супер») в академічному або
    офіційному дискурсі.'
  - 'Регістрові переключення: вправи на миттєву зміну тональності повідомлення залежно від соціального контексту та аудиторії.'
  - Аналіз стилістичних засобів та їхнього прагматичного ефекту в текстах високої складності.
- section: 'Культурний контекст: ЗНО та синтетичність Шевельова (Cultural Context: ZNO and Shevelov''s Syntheticity)'
  words: 1000
  points:
  - 'ЗНО/НМТ як культурний феномен: обговорення системи стандартизованого тестування як механізму формування сучасної мовної
    норми.'
  - 'Концепція Юрія Шевельова про «синтетичність» української мови: гнучкість носія як здатність синтезувати різні мовні пласти.'
  - Глибокий аналіз цитати про «всебічність» української культури як виклик для інтелектуального зростання на рівні C2.
- section: Аналіз прогалин та критична самооцінка (Gap Analysis and Critical Self-Assessment)
  words: 750
  points:
  - 'Критерії оцінювання: використання шкал адекватної та критичної самооцінки для виявлення зон росту.'
  - Побудова індивідуального профілю сильних сторін на основі результатів діагностичного тестування.
  - 'Заповнення прогалин: методи самостійної роботи з лінгвістичними джерелами для усунення «плато C1».'
- section: 'Підсумок: Траєкторія досконалості (Summary: Trajectory of Mastery)'
  words: 500
  points:
  - 'Структура рівня C2 (100 модулів): огляд майбутніх тем від евфонії до літературного аналізу.'
  - 'Формування персонального плану навчання: перехід від діагностики до систематичного вдосконалення стилю.'
  - 'Очікування від рівня C2: шлях до статусу нативного або освіченого носія-експерта.'
vocabulary_hints:
  required:
  - діагностика (diagnostics) — методи діагностики, диференційна діагностика; High frequency (Academic/Med)
  - компетенція (competency) — фахова компетенція, мовна компетенція, у межах компетенції; High frequency (Official/Pro)
  - прогалина (gap) — заповнити прогалину, суттєва прогалина, прогалина в знаннях; Med frequency (General/Academic)
  - самооцінка (self-assessment) — адекватна самооцінка, критична самооцінка, шкала самооцінки; Med frequency (Psych/Edu)
  - стилістика (stylistics) — функціональна стилістика, практична стилістика, закони стилістики; Med frequency (Ling/Acad)
  - регістр (register) — зміна регістру, офіційний регістр, стилістичний регістр; Specific usage (Ling)
  - профіль (profile) — індивідуальний профіль, профіль компетенцій; High frequency (HR/Pro)
  - досконалість (perfection/mastery) — прагнути досконалості, технічна досконалість; High frequency (General)
  - синтаксис (syntax) — складний синтаксис, правила синтаксису; Specific usage (Academic)
  - парадигма (paradigm) — зміна парадигми, повна парадигма відмінювання; High frequency (Academic/General)
  recommended:
  - критерій (criterion) — критерій оцінювання, чіткий критерій; High frequency (Official/Academic)
  - показник (indicator) — ключовий показник, кількісний показник; High frequency (Academic/Pro)
  - еталон (standard/benchmark) — культурний еталон, мовний еталон; Med frequency (Arts/General)
  - рефлексія (reflection) — здатність до рефлексії, критична рефлексія; High frequency (Academic/Psych)
  - траєкторія (trajectory) — освітня траєкторія, траєкторія розвитку; High frequency (General/Academic)
  - трансформація (transformation) — стилістична трансформація тексту; High frequency (Academic/General)
  - калькування (calquing) — помилкове калькування, уникати калькування; Specific usage (Ling/Academic)
