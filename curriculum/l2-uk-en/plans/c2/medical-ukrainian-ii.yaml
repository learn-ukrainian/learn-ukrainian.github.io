vocabulary_hints:
  required:
  - анамнез (medical history) — збирати анамнез, обтяжений анамнез; спеціалізований
    термін середньої частотності
  - скарги (complaints) — основні скарги, скарги при вступі; висока частотність у
    розмовній практиці
  - діагноз (diagnosis) — встановити діагноз, диференційний діагноз, попередній діагноз
  - інформована згода (informed consent) — підписати інформовану згоду, добровільна
    згода пацієнта
  - протипоказання (contraindications) — абсолютні протипоказання, відносні протипоказання
  recommended:
  - біль (pain) — чоловічий рід (сильний біль, гострий біль); критична зона для інтерференції
  - лікувати (to treat) — проводити терапію; не плутати з «лічити» (to count)
  - хворіти на (to be ill with) — керування «на + знахідний відмінок»
  - прогноз (prognosis) — сприятливий прогноз, сумнівний прогноз
