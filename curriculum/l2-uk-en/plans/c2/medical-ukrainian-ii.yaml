content_outline:
- section: Вступ — Етика та історія медичної комунікації (Introduction — Ethics and
    History of Medical Communication)
  words: 500
  points:
  - 'Комунікація в медичній практиці згідно з §3.11 Державного стандарту: роль професійного
    спілкування в системі охорони здоров''я.'
  - 'Культурний код: Агапіт Печерський як перший відомий лікар Київської Русі та символ
    етичного, безкорисливого служіння пацієнту.'
  - 'Концепція Patient-Centered Approach: перехід від патернелізму до партнерства
    між лікарем та пацієнтом.'
- section: Збір анамнезу та діагностичне інтерв'ю (History Taking and Diagnostic Interview)
  words: 600
  points:
  - 'Техніка збору анамнезу: використання відкритих питань для опису основних скарг
    при вступі та сімейного анамнезу.'
  - 'Специфічні колокації: збирати анамнез, обтяжений анамнез, встановити попередній
    діагноз.'
  - 'Learner error: Виправлення помилки в роді іменника «біль» — тренування вживання
    чоловічого роду (гострий біль, сильний біль).'
- section: Фізикальний огляд та інструкції (Physical Examination and Instructions)
  words: 500
  points:
  - 'Пояснення маніпуляцій пацієнту: використання доступного реєстру «лікар-пацієнт»
    без надмірної латинізації.'
  - 'Learner error: Розрізнення дієслів «лікувати» (проводити терапію) та «лічити»
    (рахувати гроші чи предмети) у клінічному контексті.'
  - 'Мовний супровід огляду: надання чітких інструкцій та реагування на дискомфорт
    пацієнта.'
- section: Пояснення діагнозу та інформована згода (Explaining Diagnosis and Informed
    Consent)
  words: 700
  points:
  - Встановлення диференційного діагнозу та обговорення плану лікування з пацієнтом.
  - 'Юридичний та етичний аспект: підписати інформовану добровільну згоду та пояснити
    абсолютні чи відносні протипоказання.'
  - 'Grammar point: Керування дієслова «хворіти на (+ Знахідний відмінок)» — drill
    на прикладі захворювань (хворіти на грип, на пневмонію).'
- section: Складні розмови та спадщина Амосова (Difficult Conversations and Amosov's
    Legacy)
  words: 700
  points:
  - 'Повідомлення поганих новин та обговорення прогнозу: дотримання Етичного кодексу
    лікаря України.'
  - 'Микола Амосов: інтеграція системи «обмежень і навантажень» у розмови про профілактику
    та спосіб життя.'
  - 'Специфіка спілкування з родичами та людьми похилого віку: дотримання ввічливого
    реєстру («ви») та емоційної підтримки.'
