module: c2-107
level: C2
sequence: 107
version: 1.1.1
title: 'Підсумковий огляд III: Стилістика, риторика та соціокультурна компетенція'
subtitle: 'Фінальний огляд III: стилістика і риторика'
focus: integration
pedagogy: review
objectives:
- Систематизувати знання про стилістичну диференціацію сучасної української мови
- Узагальнити риторичні стратегії переконання та маніпуляції у різних типах дискурсу
- Проаналізувати соціокультурні коди та реалії, необхідні для автентичного спілкування (C2)
- Виробити індивідуальну стратегію подальшого вдосконалення мовної майстерності
content_outline:
- section: 'Функціональна стилістика: від розмовного до конфесійного'
  words: 1000
  subsections:
  - 'Взаємопроникнення стилів у сучасному медіа-просторі: феномен публіцистичного розмовлення'
  - 'Офіційно-діловий стиль: оновлення кліше та дерадянізація ділового мовлення'
  - Специфіка конфесійного стилю та його роль у сучасній українській культурі
  key_concepts:
  - стилістична норма
  - функціональний стиль
  - експресивність
  - стилістична трансформація
  primary_sources:
  - 'Олександер Пономарів: ''Стилістика сучасної української мови'' (ключові тези)'
- section: Практична риторика та теорія аргументації
  words: 1000
  subsections:
  - 'Класичні канони риторики в сучасному публічному виступі: ethos, pathos, logos'
  - 'Еристика: мистецтво ведення суперечки та нейтралізація некоректних прийомів'
  - Методи лінгвістичного маніпулювання в рекламі та політичному піарі
  key_concepts:
  - риторичний канон
  - логічний аргумент
  - софізм
  - маніпуляція
  primary_sources:
  - Праці з риторики (наприклад, Г. Сагач)
- section: 'Соціокультурний контекст: ідіоматика та прецедентність'
  words: 1000
  subsections:
  - 'Культурні коди в українській фразеології: від міфології до сучасності'
  - Прецедентні імена та тексти як основа національної ідентичності
  - 'Етикетні формули у різних соціальних групах: вік, статус, регіон'
  key_concepts:
  - лінгвокультурологія
  - культурний код
  - прецедентне ім'я
  - мовленнєвий етикет
  primary_sources:
  - Словник символів української культури (фрагменти)
- section: 'Вершина C2: індивідуальна мовна особистість'
  words: 1000
  subsections:
  - 'Створення індивідуального стилю: від наслідування до авторського голосу'
  - Мовна стійкість та деколонізація свідомості через мову
  - Перспективи розвитку української мови у глобальному світі
  key_concepts:
  - мовна особистість
  - мовна стійкість
  - ідіостиль
  - глобалізація
  primary_sources:
  - Есеїстика сучасних українських мислителів про мову (Мирослав Маринович, Оксана Забужко)
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - select
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Авраменко, 11 клас (2019): Стилістика, риторика'
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Державний стандарт 2024: C2 — соціокультурна компетенція'
reading_situations:
- source_type: філософський есей
  topic: Аналіз культурних метафор у праці Оксани Забужко 'Notre Dame d’Ukraine'.
  key_elements:
  - культурний код
  - інтертекстуальність
  - авторська позиція
  motivation: Розуміння глибинних зв'язків між мовою та національною пам'яттю.
- source_type: політична промова
  topic: 'Риторичний аналіз промови відомого українського політика: пошук засобів переконання.'
  key_elements:
  - риторичне запитання
  - повтор
  - емоційний заклик
  motivation: Деконструкція риторичних стратегій у публічному дискурсі.
listening_situations:
- media_type: подкаст
  setting: Інтерв'ю з експертом з етикету про трансформацію норм звертання в сучасній Україні.
  focus_points:
  - Використання кличного відмінка у різних ситуаціях
  - Гендерно-нейтральні звертання та фемінітиви
  motivation: Орієнтування у мінливих соціокультурних нормах.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть програмну статтю на тему 'Українська мова як інструмент м'якої сили в XXI столітті'. Використовуйте риторичні
    прийоми для переконання аудиторії.
  requirements:
  - високий публіцистичний стиль
  - логічна аргументація
  - 600-700 слів
  motivation: Демонстрація рівня C2 через здатність впливати на аудиторію словом.
  model_answer: Текст має бути переконливим, містити глибокий аналіз соціокультурної ситуації та чіткі висновки.
discussion_topics:
- context: Чи може людина бути 'носієм мови' (native speaker) на рівні C2, якщо вона не народилася в україномовному середовищі?
  questions:
  - 'Що є вирішальним: граматична досконалість чи розуміння культурного підтексту?'
  - Як відчути 'дух мови'?
  motivation: Обговорення поняття 'майстерності' та 'автентичності' на рівні C2.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про функціональна стилістика: від розмовного до конфесійного і дайте відповіді на запитання щодо
    ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про практична риторика та теорія аргументації, використовуючи нову лексику
    модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Функціональна стилістика: від розмовного до конфесійного».
    Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему функціональна стилістика: від розмовного до
    конфесійного.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до функціональна стилістика: від розмовного до конфесійного: Взаємопроникнення стилів у
    сучасному медіа-просторі: феномен публіцистичного роз. Визначте спільне та відмінне.'
phase: C2.4 [Meta-Skills & Capstone]
