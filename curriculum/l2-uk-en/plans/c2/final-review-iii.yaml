content_outline:
- section: 'Вступ: Поліфонія мовленнєвих навичок (Introduction: Polyphony of Speech Skills)'
  words: 500
  points:
  - 'Концепція ''поліфонії'' навичок на рівні C2: чому інтеграція є вичерпною ознакою вільного володіння згідно з §1 Держстандарту
    2024'
  - 'Тематично необмежене та невимушене спілкування: перехід від ізольованих вправ до комплексного передавання найтонших відтінків
    змісту'
- section: 'Сприйняття: Аудіювання та критичне читання (Receptive Skills: Listening and Critical Reading)'
  words: 1000
  points:
  - Робота з імпліцитним змістом та прихованим підтекстом у складних автентичних текстах (від наукового дискурсу до поезії
    Семенка)
  - 'Стратегії сприйняття швидкого, діалектного та ідіоматичного мовлення: розпізнавання іронії, гумору та емоційного підтексту'
- section: 'Культурний код: Від панфутуризму до сучасних форумів (Cultural Code: From Panfuturism to Modern Forums)'
  words: 1000
  points:
  - 'Культурний гачок: Панфутуризм Михайля Семенка як приклад радикальної інтеграції поезії, звуку та візуального перформансу
    (''надмистецтво'')'
  - 'Книжковий Арсенал та BookForum як майданчики інтегрованих навичок: аналіз статистики (51 000+ відвідувачів) та запиту
    на інтелектуальний продукт'
- section: 'Продукція: Стилістична гнучкість та контроль (Productive Skills: Stylistic Flexibility and Control)'
  words: 1000
  points:
  - 'Learner error: змішування регістрів (Register Mixing) — аналіз недоречності розмовних слів (наприклад, ''класний'') в
    офіційних контекстах'
  - 'Вправи на ''перемикання кодів'' (code-switching) між регістрами: від академічного есе до спонтанного невимушеного говоріння'
- section: 'Практикум: Природність проти калькування (Workshop: Naturalness vs. Calques)'
  words: 1000
  points:
  - Виправлення кальки 'це має сенс' (it makes sense) на питомі 'це має рацію', 'має зміст' або 'у цьому є логіка' — дриль
    мінімальних пар
  - 'Agency Pass: подолання зловживання пасивом типу ''Мною було прочитано'' на користь активних конструкцій ''Я прочитав''
    для автентичності'
- section: Медіація та фінальна інтеграція (Mediation and Final Integration)
  words: 500
  points:
  - 'Мовна медіація: навички перефразування та синтезу інформації з різних джерел для ведення публічного дискурсу'
  - 'Комплексне підсумкове завдання: дискусія на основі прочитаного та прослуханого матеріалу з дотриманням ідіоматичності
    та точності'
vocabulary_hints:
  required:
  - аудіювання (listening comprehension) — навички аудіювання, критичне аудіювання; висока частотність в академічному контексті
  - підтекст (subtext) — читати підтекст, прихований підтекст, розуміти підтекст; ключовий термін для аналізу С2
  - імпліцитний (implicit) — імпліцитний зміст, імпліцитна інформація; вживається в науковому та лінгвістичному дискурсі
  - дискурс (discourse) — публічний дискурс, науковий дискурс, аналіз дискурсу; частотне слово у фаховому спілкуванні
  - медіація (mediation) — мовна медіація, навички медіації, виступати медіатором; спеціалізований термін CEFR/Standard
  recommended:
  - має рацію (is right/makes sense) — стандартна заміна кальки 'має сенс' стосовно логіки твердження
  - ідіоматичність (idiomaticity) — ознака природності мовлення на рівні С2; вживання фразеологізмів
  - перемикання кодів (code-switching) — здатність змінювати регістр залежно від ситуації спілкування
  - панфутуризм (panfuturism) — радикальна течія українського авангарду Семенка; інтеграція мистецтв
  - контекстуалізація (contextualization) — здатність сприймати та створювати тексти з урахуванням середовища
vocabulary:
  required:
  - аудіювання (listening comprehension)
  - читання (reading)
  - письмо (writing)
  - говоріння (speaking)
  - інтеграція навичок (skills integration)
  - рецептивні навички (receptive skills)
  - продуктивні навички (productive skills)
  - медіація (mediation)
  - спонтанне мовлення (spontaneous speech)
  - критичне читання (critical reading)
  recommended:
  - підтекст (subtext)
  - імпліцитний зміст (implicit meaning)
  - ідіоматичність (idiomaticity)
  - флуентність (fluency)
  - точність (accuracy)
