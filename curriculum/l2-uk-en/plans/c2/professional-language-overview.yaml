module: professional-language-overview
level: C2
sequence: 44
version: "1.0"
title: "Огляд професійної мови: Стандарти та інновації"
subtitle: "Professional Language Overview: Standards and Innovations"
focus: professional
pedagogy: seminar
objectives:
  - "Зрозуміти структуру та функції сучасної української професійної мови як спеціалізованої підсистеми"
  - "Вивчити актуальні державні стандарти (ДСТУ) та міжнародні вимоги до професійної комунікації"
  - "Проаналізувати етичні норми та прагматичні стратегії в діловому та науковому середовищах"
  - "Дослідити процеси трансформації професійного дискурсу під впливом цифровізації та глобалізації"
content_outline:
  - section: "Концепція фахової мови у сучасному світі"
    words: 1000
    subsections:
      - "Професійна мова як інструмент фахової ідентифікації та ефективної діяльності"
      - "Співвідношення загальнолітературної та спеціалізованої мови"
      - "Типологія професійних дискурсів: юридичний, економічний, технічний, медичний"
    key_concepts:
      - "фахова мова"
      - "професійний дискурс"
      - "спеціальна лексика"
      - "комунікативна прагматика"
  - section: "Нормативність та стандартизація професійного мовлення"
    words: 1000
    subsections:
      - "Державні стандарти України (ДСТУ) в системі професійної комунікації"
      - "Правописні особливості фахових текстів: нові норми та традиції"
      - "Уніфікація та кодифікація терміносистем: український та міжнародний досвід"
    key_concepts:
      - "стандартизація"
      - "уніфікація"
      - "термінологічна норма"
      - "кодифікація"
    primary_sources:
      - "ДСТУ 4163:2020 'Уніфікована система організаційно-розпорядчої документації'"
  - section: "Етичні та прагматичні аспекти ділової комунікації"
    words: 1000
    subsections:
      - "Етикет професійного спілкування: вербальний та невербальний рівні"
      - "Стратегії ввічливості та субординація в українському професійному середовищі"
      - "Управління репутацією через мовну поведінку"
    key_concepts:
      - "професійна етика"
      - "мовленнєвий етикет"
      - "комунікативний статус"
      - "репутаційний менеджмент"
    primary_sources:
      - "Наталія Артиш, 'Українська мова за професійним спрямуванням' (аналіз розділів про ділову етику)"
  - section: "Вплив технологій на трансформацію професійного дискурсу"
    words: 1000
    subsections:
      - "Диджиталізація професійної комунікації: від паперового документа до цифрового сервісу"
      - "Вплив штучного інтелекту на створення та переклад фахових текстів"
      - "Адаптація професійної термінології до вимог пошукової оптимізації та інтерфейсів"
    key_concepts:
      - "цифровізація"
      - "електронний документообіг"
      - "автоматизація контенту"
      - "технологічний неологізм"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - comparative-study
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Нормативний документ"
    topic: "Аналіз ДСТУ 4163:2020. Вивчення вимог до оформлення реквізитів та мовного наповнення документів."
    key_elements: ["реквізит", "бланк", "формуляр-зразок"]
    motivation: "Формування чіткого розуміння формальних стандартів українського діловодства."
  - source_type: "Науково-методична праця"
    topic: "Дослідження поглядів Наталії Артиш на роль мовної культури у професійному становленні фахівця."
    key_elements: ["мовна компетенція", "професіограма", "комунікативна стратегія"]
    motivation: "Усвідомлення важливості мови як інструменту професійного успіху."
listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з експертом зі стандартизації про гармонізацію українських термінів з міжнародними стандартами ISO."
    focus_points:
      - "Труднощі перекладу вузькоспеціалізованих термінів"
      - "Процедура затвердження нових стандартів"
    motivation: "Розуміння динаміки розвитку професійної мови на державному та міжнародному рівнях."
writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть офіційну пропозицію про співпрацю від імені вашої компанії до іноземного партнера, дотримуючись усіх норм ДСТУ та правил ділового етикету. Обґрунтуйте вибір лексичних засобів."
    requirements: ["мінімум 300 слів", "використання щонайменше 5 специфічних кліше", "бездоганне оформлення реквізитів"]
    motivation: "Практика написання базового, але складного виду професійної кореспонденції."
    model_answer: "Лист має містити: чіткий предмет пропозиції, переваги співпраці, ввічливі форми звернення та закінчення, логічну структуру. Мова має бути нейтральною, але переконуючою."
discussion_topics:
  - context: "Чи веде стандартизація професійної мови до її збіднення та втрати національної специфіки?"
    questions:
      - "Де проходить межа між необхідною уніфікацією та надмірним канцеляризмом?"
      - "Як збалансувати традиційні українські форми з вимогами глобалізованого бізнес-світу?"
    motivation: "Критичне осмислення ролі стандартів у сучасному професійному мовленні."
