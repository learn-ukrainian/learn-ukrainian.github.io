content_outline:
- section: 'Вступ: Сутність професійної мови (Introduction: Essence of Professional Language)'
  words: 900
  points:
  - Визначення професійної комунікації крізь призму Державного стандарту 2024 (§4.3.1.1), що розмежовує офіційний та науковий
    стилі як фундамент фахового мовлення.
  - 'Аналіз поняття «професіоналізми» згідно з §4.3.3 (на прикладах: контрольна, НМТ) та їхнє функціональне призначення в
    межах обраного фаху.'
  - 'Відмінність між загальновживаною лексикою та вузькоспеціалізованим дискурсом: критерії точності, лаконічності та однозначності.'
- section: Історична спадщина та кодифікація (Historical Heritage and Codification)
  words: 1100
  points:
  - 'Культурний гачок: «Золота доба» української термінології (1920-ті рр.) — діяльність Інституту української наукової мови
    та створення перших галузевих словників.'
  - 'Трагедія 1930-х: «термінологічне шкідництво» як інструмент репресій та штучне зближення української фахової мови з російською.'
  - Сучасна роль Національної комісії зі стандартів державної мови у відновленні органічних норм та кодифікації нових терміносистем.
- section: Структура та динаміка терміносистем (Structure and Dynamics of Terminology Systems)
  words: 1000
  points:
  - 'Методологія творення термінів: власне українські деривати (наприклад, питомі суфікси -ння, -ість) проти надмірного калькування
    та запозичень.'
  - 'Проблема стандартизації: як сучасні професійні спільноти впорядковують термінологію в умовах стрімкого технологічного
    розвитку.'
  - 'Міжгалузеві терміни та явища детермінологізації: перехід спеціальних назв у загальновживаний фонд (наприклад, ''реакція'',
    ''інтерфейс'').'
- section: Регістри та культура фахового спілкування (Registers and Professional Communication Culture)
  words: 1000
  points:
  - 'Регістри професійної комунікації: формальний (документація), напівформальний (наради) та розмовно-професійний (спілкування
    в кулуарах).'
  - 'Попередження помилок: недопустимість змішування регістрів (використання демінутивів ''договірчик'' або сленгу ''передзвони''
    в офіційному контексті).'
  - Стратегії адаптації фахового тексту під різну авдиторію (експерти vs клієнти) без втрати термінологічної точності.
- section: Корекція типових помилок та кальок (Correction of Common Errors and Calques)
  words: 1000
  points:
  - 'Практичний дриль на усунення прийменникових кальок: заміна помилкового ''по питаннях'' на нормативне ''з питань'' (наприклад,
    з питань економіки).'
  - 'Виправлення стійких лексичних кальок: ''брати участь'' замість ''приймати участь'', ''вживати заходів'' замість ''приймати
    міри''.'
  - 'Аналіз культури професійної мови як складової фахової компетентності C2: від володіння термінами до бездоганного дотримання
    синтаксичних норм.'
vocabulary_hints:
  required:
  - професійна мова (professional language) — культура професійної мови; володіння професійною мовою; особливості професійної
    мови (High Frequency)
  - терміносистема (terminology system) — упорядкування терміносистеми; розвиток терміносистеми; українська терміносистема
    (Medium Frequency/Academic)
  - фахова комунікація (professional communication) — навички фахової комунікації; ефективна фахова комунікація (Modern professional
    context)
  - галузь (field/domain) — галузь знань; провідна галузь; суміжні галузі (Very High Frequency)
  - спеціалізація (specialization) — вузька спеціалізація; зміна спеціалізації
  - регістр (register) — високий регістр; формальний регістр; зміна регістру (Linguistic meta-term)
  - жанр (genre) — жанрові очікування; конвенції жанру
  - конвенція (convention) — мовна конвенція; дотримання конвенцій
  - метанавичка (meta-skill) — ключова метанавичка; формування метанавичок
  - самостійне навчання (self-directed learning) — стратегії самостійного навчання
  recommended:
  - кодифікація (codification) — кодифікація норм; процеси кодифікації
  - стандартизація (standardization) — національний стандарт; стандартизація термінології
  - міжгалузевий (cross-domain) — міжгалузевий характер; міжгалузеві зв'язки
  - універсальний (universal) — універсальні принципи; універсальний інструментарій
  - трансферний (transferable) — трансферні навички; трансфер знань
  - з питань (concerning/on) — нормативна конструкція замість калькованого 'по питаннях'
  - брати участь (to participate) — нормативний вираз замість кальки 'приймати участь'
  - вживати заходів (to take measures) — нормативний вираз замість кальки 'приймати міри'
