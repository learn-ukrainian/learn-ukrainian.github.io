content_outline:
- section: 'Вступ: Консолідація та систематизація (Introduction: Consolidation and Systematization)'
  words: 600
  points:
  - 'Огляд стилістичної компетенції на рівні C2 згідно з Державним стандартом 2024 (§4.3.1.1): від теорії до автоматизації.'
  - Поняття ідіостилю як вершини мовної особистості — перехід від загальних норм до індивідуального голосу.
- section: 'Функціональна стилістика: Сім граней мови (Functional Stylistics: Seven Facets of Language)'
  words: 1250
  points:
  - Глибокий аналіз наукового та художнього стилів крізь призму Київських неокласиків (М. Зеров) — взірець дисципліни та 'високого
    стилю'.
  - 'Критичний розбір розмовного стилю: подолання ''канцеляриту'' (вживання ''згідно з'', ''з метою'' у побуті) як ознаки
    низької культури мовлення.'
  - Практика епістолярного та релігійного стилів (вимога Стандарту §4.3.1.1) — сакральна мова та етикет сучасного листування.
- section: Динаміка та трансформація стилів (Dynamics and Style Transformation)
  words: 1000
  points:
  - 'Методологія трансформації тексту (§4.3.7): адаптація наукового викладу для публіцистичної аудиторії без втрати змісту.'
  - 'Історична стилістична гра: бурлескно-травестійна трансформація сюжету в ''Енеїді'' Котляревського як заснування нової
    літературної мови.'
- section: Евфонія та когерентність тексту (Euphony and Text Coherence)
  words: 1100
  points:
  - 'Закони милозвучності (§4.3.2): діагностика типових помилок у чергуванні у/в, і/й, з/зі/із, що створюють фонетичні затики.'
  - 'Когерентність та логічна зв''язність: використання інтелектуальних конекторів для побудови складного академічного дискурсу.'
- section: 'Практикум: Від аналізу до синтезу (Workshop: From Analysis to Synthesis)'
  words: 1050
  points:
  - 'Стилістичне редагування: виявлення та усунення змішування регістрів (Register mixing) у професійних та офіційних текстах.'
  - 'Підсумкова рефлексія: самооцінка володіння інструментами стилістики C2.1 та підготовка до літературної майстерності C2.2.'
vocabulary_hints:
  required:
  - консолідація (consolidation) — консолідація знань/зусиль; висока частотність в академічному дискурсі.
  - стилістика (stylistics) — функціональна/практична стилістика; базовий термін курсу.
  - евфонія (euphony) — засоби милозвучності; ключовий чинник плинності мовлення (§4.3.2).
  - когерентність (coherence) — логічна когерентність тексту; зв'язність і цілісність викладу.
  - ідіостиль (idiostyle) — індивідуальна манера автора; виявлення авторського 'Я' через вибір засобів.
  recommended:
  - канцелярит (bureaucratese) — стилістична вада; використання офіційно-ділових штампів у невідповідних регістрах.
  - травестія (travesty) — трансформація високого в низьке; на прикладі І. Котляревського.
  - неокласицизм (neoclassicism) — орієнтир на високу естетику та стилістичну строгість (М. Зеров).
  - регістр (register) — ситуативна доречність мовних засобів; уникнення register mixing.
