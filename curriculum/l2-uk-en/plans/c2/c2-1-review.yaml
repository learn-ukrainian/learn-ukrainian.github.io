module: c2-025
level: C2
sequence: 25
version: 1.1.2
title: 'Повторення та узагальнення рівня C2.1: синтез майстерності'
subtitle: 'Огляд рівня C2.1: синтез майстерності'
focus: integration
pedagogy: review
objectives:
- Систематизувати та узагальнити знання про функціональні стилі української мови
  та їхню взаємодію
- Закріпити навички комплексного аналізу текстів високої складності
- Перевірити готовність до самостійного створення концептуально цілісних 
  інтелектуальних продуктів
- Повторити ключові аспекти складного синтаксису, лексичної стилістики та 
  риторики
content_outline:
- section: Функціональна стилістика в ретроспективі
  words: 1000
  subsections:
  - 'Синтез стилів: як межі між регістрами стають прозорими у постмодерні'
  - Порівняльний аналіз ключових маркерів усіх вивчених стилів
  - 'Еволюція мовної норми: від Огієнка до сучасності'
  key_concepts:
  - стильова домінанта
  - мовна культура
  - кодифікація
  - дифузія
  primary_sources:
  - Іван Огієнко, 'Наука про рідномовні обов'язки'
  - Дмитро Чижевський, 'Нариси з історії філософії на Україні'
- section: Синтаксичний та лексичний практикум (підсумковий)
  words: 1000
  subsections:
  - 'Складні випадки узгодження та керування: робота над помилками'
  - 'Ритмічна архітектоніка прози: аналіз взірцевих періодів'
  - Лексична синонімія як засіб уникнення монотонності
  key_concepts:
  - синтаксичний паралелізм
  - періодичність
  - лексична варіативність
  - евфонія
- section: Методологія критичного аналізу тексту
  words: 1000
  subsections:
  - Герменевтичний підхід до тлумачення підтексту
  - Деконструкція маніпулятивних стратегій у складних дискурсах
  - Виявлення авторської позиції через стилістичний інструментарій
  key_concepts:
  - герменевтика
  - деконструкція
  - дискурс-аналіз
  - інтенційність
- section: Стратегії побудови досконалого вислову
  words: 1000
  subsections:
  - 'Від планування до реалізації: етапи створення великого аналітичного тексту'
  - 'Саморедагування: чек-лист для рівня С2'
  - Риторична адаптація тексту для різних платформ сприйняття
  key_concepts:
  - композиційна стрункість
  - аргументативна цілісність
  - авторедагування
  - мовна особистість
- section: Підсумок — Summary
  words: 300
  points:
  - "Functional style synthesis and diffusion (дифузія) blur the boundaries between
    registers in complex discourse. Self-check: What is the difference between a text's
    stylistic dominant (стильова домінанта) and its lexical variability? Identify
    3 markers of stylistic evolution from Ohienko to the present."
  - 'Advanced expression relies on hermeneutics, syntactic parallelism, and the deconstruction
    of manipulative strategies. Self-check: How does euphony (евфонія) enhance the
    rhythmic architecture of prose? Name 3 critical elements from the C2 self-editing
    checklist to maintain argumentative integrity (аргументативна цілісність).'
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Глазова, 11 клас (2019): Функціональні стилі мовлення'
- 'Авраменко, 11 клас (2019): Комплексний аналіз тексту'
- 'Караман, 10 клас (2018): Стилістика тексту'
- 'Державний стандарт 2024: C2 — інтегративна стилістична компетенція'
reading_situations:
- source_type: Наукова праця
  topic: 'Аналіз ''Науки про рідномовні обов''язки'' Івана Огієнка: етика та естетика
    мовлення.'
  key_elements:
  - мовознавчий термін
  - імператив
  - пуризм
  motivation: Узагальнення знань про нормативність та культуру українського 
    слова.
- source_type: Філософський нарис
  topic: 'Дмитро Чижевський про українське бароко: аналіз стилістичної складності
    тексту.'
  key_elements:
  - термінологія
  - історичні алюзії
  - складний синтаксис
  motivation: Розвиток навичок читання та розуміння академічних текстів 
    найвищого рівня.
listening_situations:
- media_type: аудіо
  setting: 'Архівний запис лекції Юрія Шевельова: роздуми про долю української мови.'
  focus_points:
  - Особливості інтелектуального мовлення
  - Афористичність вислову
  motivation: Сприйняття живого взірця мовної майстерності видатного філолога.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть підсумкове есе на тему ''Стиль як дзеркало епохи: трансформація
    українського інтелектуального дискурсу в ХХІ столітті'', використовуючи всі вивчені
    прийоми аргументації.'
  requirements:
  - мінімум 700 слів
  - посилання на щонайменше 2 першоджерела
  - демонстрація володіння різними стильовими регістрами
  motivation: Синтетична перевірка всіх компетенцій рівня С2.1.
  model_answer: Есе має бути логічно бездоганним, стилістично багатим та містити
    глибоку аналітичну складову з елементами власної філософської рефлексії.
discussion_topics:
- context: Чи може мова існувати без суворої кодифікації, покладаючись лише на 
    'чуття стилю' носіїв?
  questions:
  - Яка роль словників у цифрову епоху?
  - Чи загрожує мовна свобода руйнуванням літературної норми?
  motivation: Дискусія про майбутнє мови та роль індивідуальної майстерності у 
    її збереженні.
activity_hints:
- type: reading
  focus: Прочитайте текст про функціональна стилістика в ретроспективі і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про синтаксичний та лексичний 
    практикум (підсумковий), використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Функціональна 
    стилістика в ретроспективі». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    функціональна стилістика в ретроспективі.
- type: comparative-study
  focus: 'Порівняйте різні підходи до функціональна стилістика в ретроспективі: Синтез
    стилів: як межі між регістрами стають прозорими у постмодерні. Визначте спільне
    та відмінне.'
phase: C2.1 [Stylistic Perfection]
