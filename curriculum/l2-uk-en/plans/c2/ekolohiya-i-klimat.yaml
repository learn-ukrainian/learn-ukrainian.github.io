module: c2-075
level: C2
sequence: 75
version: 1.2.1
title: 'Екологія та клімат: Глобальні виклики та локальні рішення'
subtitle: 'Екологія і клімат: глобальні виклики'
focus: vocabulary
pedagogy: seminar
objectives:
- Опанувати термінологію у сферах сталого розвитку, відновлюваної енергетики та кліматичного активізму
- Аналізувати екологічну політику України в контексті європейської інтеграції та глобальних угод
- Розвинути навички критичного аналізу наукових та публіцистичних текстів про зміну клімату
- Сформувати активну громадянську позицію щодо збереження біорізноманіття та природних ресурсів
content_outline:
- section: 'Кліматична криза: дискурсивні та термінологічні виміри'
  words: 1250
  subsections:
  - 'Глобальне потепління vs Зміна клімату: точність формулювань у науковому дискурсі'
  - 'Парниковий ефект, антропогенний вплив та декарбонізація: ключові концепти'
  - 'Мовна репрезентація кліматичних катастроф у медіа: від інформування до алармізму'
  key_concepts:
  - антропоцен
  - декарбонізація
  - кліматична нейтральність
  - сталий розвиток
  primary_sources:
  - Володимир Вернадський, 'Біосфера' (концепція ноосфери та відповідальності людини за планету)
- section: Сталий розвиток та енергетичний перехід
  words: 1250
  subsections:
  - 'Відновлювані джерела енергії: технологічний вокабуляр та економічне обґрунтування'
  - Енергоефективність та зелена трансформація української промисловості
  - Циркулярна економіка як альтернатива лінійній моделі споживання
  key_concepts:
  - відновлювана енергетика
  - енергомодернізація
  - циркулярна економіка
  - екологічний слід
- section: Біорізноманіття та охорона природних територій
  words: 1250
  subsections:
  - 'Екосистеми України: від Полісся до степів — виклики збереження видів'
  - 'Природно-заповідний фонд: правовий статус заповідників та національних парків'
  - Червона книга України як інструмент моніторингу та захисту природи
  key_concepts:
  - біорізноманіття
  - ендемік
  - заповідний режим
  - ревіталізація
  primary_sources:
  - Закон України 'Про основні засади (стратегію) державної екологічної політики України на період до 2030 року'
- section: Екологічна етика та громадянська відповідальність
  words: 1250
  subsections:
  - 'Екологічний активізм: стратегії комунікації та мобілізації громадськості'
  - 'Етичні аспекти споживання: від веганства до відмови від швидкої моди'
  - Корпоративна соціальна відповідальність та 'зелений камуфляж' (greenwashing)
  key_concepts:
  - екоактивізм
  - екологічна етика
  - грінвошинг
  - свідоме споживання
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
- 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
- 'Заболотний, 11 клас (2019): с. 177 — Наукова, офіційно-ділова лексика'
reading_situations:
- source_type: Науково-філософська праця
  topic: Аналіз концепції ноосфери Володимира Вернадського та її актуальність у контексті сучасної екологічної кризи.
  key_elements:
  - жива речовина
  - ноосфера
  - геологічна сила людини
  motivation: Глибоке розуміння філософських підвалин української екологічної думки.
- source_type: Нормативно-правовий акт
  topic: Аналіз Стратегії державної екологічної політики України. Дослідження термінології та стратегічних цілей.
  key_elements:
  - екологічне врядування
  - стале природокористування
  - моніторинг довкілля
  motivation: Опанування офіційно-ділового стилю в екологічній сфері.
listening_situations:
- media_type: подкаст
  setting: Дискусія експертів про енергетичну безпеку та 'зелений' перехід України в умовах післявоєнної відбудови.
  focus_points:
  - Роль водневої енергетики
  - Виклики децентралізації енергосистеми
  motivation: Розвиток здатності сприймати складну фахову аргументацію на слух.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть аналітичне есе на тему ''Екологічна свідомість як складова національної безпеки: виклики для України ХХІ
    століття''.'
  requirements:
  - мінімум 700 слів
  - використання наукового стилю
  - аргументація з посиланням на міжнародні угоди
  motivation: Тренування навичок побудови складної аргументації на перетині екології та політології.
  model_answer: Есе має демонструвати володіння термінологією, містити аналіз конкретних кейсів та пропонувати системне бачення
    вирішення екологічних проблем.
discussion_topics:
- context: Чи є економічний розвиток сумісним із повним збереженням довкілля, чи ми завжди змушені йти на компроміс?
  questions:
  - Чи може технологічний прогрес повністю нівелювати антропогенну шкоду?
  - Яка роль індивідуальних зусиль у порівнянні з системними державними змінами?
  motivation: Розвиток навичок ведення інтелектуальної полеміки про майбутнє планети.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про кліматична криза: дискурсивні та термінологічні виміри і дайте відповіді на запитання щодо
    ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про сталий розвиток та енергетичний перехід, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Кліматична криза: дискурсивні та термінологічні виміри». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему кліматична криза: дискурсивні та термінологічні
    виміри.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до кліматична криза: дискурсивні та термінологічні виміри: Глобальне потепління vs Зміна
    клімату: точність формулювань у науковому дискурсі. Визначте спільне та відмінне.'
