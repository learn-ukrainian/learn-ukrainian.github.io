module: c2-071
level: C2
sequence: 71
slug: ekolohiya-i-klimat
version: '2.0'
title: Екологія і клімат
subtitle: Ecology and Climate
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати екологічні проблеми України та глобальні кліматичні процеси з використанням фахової
  природничо-наукової та політичної термінології
- Learner can critically evaluate environmental policy proposals and climate action strategies using
  evidence-based argumentation in academic Ukrainian register
- Порівнювати моделі енергетичного переходу та обґрунтовувати позиції щодо збалансованого розвитку з
  опорою на екологічні та економічні дані
- Learner can compose an analytical essay on environmental protection, climate adaptation, or ecological
  economics integrating scientific data and policy analysis
sources:
- name: Міндовкілля — Міністерство захисту довкілля та природних ресурсів України
  url: https://mepr.gov.ua/
  type: primary
  notes: Official environmental policy documents, nature protection strategies, climate action plans
- name: 'Червона книга України'
  url: https://redbook-ua.org/
  type: primary
  notes: Authoritative source on endangered species — fauna and flora volumes, conservation status data
- name: 'Національна доповідь про стан навколишнього природного середовища в Україні'
  url: https://mepr.gov.ua/
  type: reference
  notes: Annual environmental state report — pollution data, biodiversity indicators, climate trends
content_outline:
- section: 'Вступ: Екологічний дискурс на рівні С2 (Introduction: Environmental Discourse at C2 Level)'
  words: 600
  points:
  - 'From basic environmental vocabulary (B1-B2 nature, weather, recycling) to policy-level analysis: the
    C2 learner engages with climate science, environmental economics, and conservation policy through
    specialized academic and political registers.'
  - 'Overview of thematic territory: State Standard theme 3.18 (Природне середовище) expanded to include
    climate change discourse, ecological economics, nuclear legacy, and biodiversity conservation.'
  - 'Register expectations: navigating науковий (environmental science), офіційно-діловий (environmental
    legislation), and публіцистичний (eco-journalism) registers in environmental discourse.'
- section: Забруднення довкілля та охорона природи (Environmental Pollution and Nature Protection)
  words: 800
  points:
  - 'Types of pollution: забруднення повітря, водних ресурсів, ґрунтів; industrial pollution hotspots in
    Ukraine (Донбас, Кривий Ріг, Запоріжжя); analyzing environmental monitoring data.'
  - 'Nature protection framework: заповідники (strict nature reserves), національні природні парки,
    заказники (wildlife sanctuaries); Ukraine''s природно-заповідний фонд and its management challenges.'
  - 'Environmental legislation: Закон про охорону навколишнього природного середовища, оцінка впливу на
    довкілля (EIA), екологічний контроль; analyzing enforcement gaps and reform proposals.'
- section: Зміна клімату та парниковий ефект (Climate Change and the Greenhouse Effect)
  words: 800
  points:
  - 'Climate science fundamentals in Ukrainian: парниковий ефект (greenhouse effect), глобальне потепління,
    парникові гази (CO₂, метан); reading IPCC-equivalent reports in Ukrainian scientific register.'
  - 'Climate change impacts on Ukraine: посухи, повені, зміна агрокліматичних зон; analyzing Ukrainian
    climate adaptation strategies and their agricultural, economic, and social dimensions.'
  - 'International climate policy: Паризька угода, Кіотський протокол, вуглецевий ринок; Ukraine''s
    commitments, nationally determined contributions (ННВ), and emissions reduction targets.'
- section: Чорнобильська спадщина (Chernobyl Legacy)
  words: 700
  points:
  - 'The 1986 disaster and its long-term environmental consequences: зона відчуження (exclusion zone),
    радіоактивне забруднення, дезактивація; analyzing scientific discourse on radiation effects.'
  - 'Chernobyl as an ecological laboratory: wildlife recovery in the exclusion zone, biodiversity studies,
    long-term environmental monitoring; the paradox of nature thriving in human absence.'
  - 'Nuclear energy debates: атомна енергетика in Ukraine (Запорізька, Рівненська, Хмельницька, Южно-
    Українська АЕС); nuclear safety in wartime, decommissioning, and radioactive waste management.'
- section: Червона книга та біорізноманіття (Red Book and Biodiversity)
  words: 650
  points:
  - 'Червона книга України: structure (тваринний and рослинний volumes), categories of threat (зникаючі,
    вразливі, рідкісні види); analyzing conservation priorities and their scientific basis.'
  - 'Biodiversity challenges: втрата середовища існування (habitat loss), інвазивні види, браконьєрство;
    the impact of war on Ukraine''s ecosystems and protected areas.'
  - 'Flora and fauna of Ukraine: степ (steppe) as a unique biome, лісові екосистеми, водно-болотні угіддя
    (wetlands); biogeographic diversity and its conservation significance.'
- section: Екологічна економіка та альтернативна енергетика (Ecological Economics and Alternative Energy)
  words: 750
  points:
  - 'Sustainable development: сталий розвиток, Цілі сталого розвитку (SDGs), зелена економіка; analyzing
    Ukraine''s national sustainable development strategy and its implementation.'
  - 'Alternative energy: відновлювана енергетика (сонячна, вітрова, біоенергетика), зелений тариф;
    Ukraine''s energy transition challenges and the impact of war on energy infrastructure.'
  - 'Carbon economics: вуглецевий слід (carbon footprint), вуглецевий податок, торгівля квотами на
    викиди; analyzing the economic instruments of climate policy in the Ukrainian context.'
- section: 'Практикум: Аналіз екологічного дискурсу (Workshop: Environmental Discourse Analysis)'
  words: 700
  points:
  - 'Applied analysis: reading and deconstructing a Міндовкілля policy document or national environmental
    report using analytical frameworks from environmental science and policy studies.'
  - 'Argumentative writing: composing an analytical essay on a chosen environmental topic (e.g., nuclear
    energy future, climate adaptation, biodiversity conservation in wartime) with evidence from scientific
    and policy sources.'
  - 'Debate exercise: constructing arguments for and against a specific environmental policy (e.g., nuclear
    energy expansion, carbon tax introduction, mining in protected areas) using specialized terminology.'
vocabulary_hints:
  required:
  - парниковий ефект (greenhouse effect) — посилення парникового ефекту, парникові гази; core climate
    science term
  - потепління (warming) — глобальне потепління, кліматичне потепління; climate change discourse
  - альтернативна енергетика (alternative energy) — розвиток альтернативної енергетики, джерела
    альтернативної енергетики; energy transition policy term
  - забруднення (pollution) — забруднення довкілля, промислове забруднення; core environmental science term
  - охорона довкілля (environmental protection) — охорона навколишнього середовища, заходи з охорони
    довкілля; environmental policy and legislation register
  - Червона книга (Red Book) — види Червоної книги, занесення до Червоної книги; biodiversity conservation
    institutional term
  - біорізноманіття (biodiversity) — збереження біорізноманіття, втрата біорізноманіття; ecological science
    and conservation policy register
  - екологічний (ecological/environmental) — екологічна криза, екологічна безпека, екологічний моніторинг;
    broad environmental register term with high frequency
  - відновлюваний (renewable) — відновлювана енергія, відновлювані ресурси; energy and sustainability discourse
  - Чорнобиль (Chernobyl) — Чорнобильська катастрофа, зона відчуження; nuclear legacy and environmental
    history reference
  recommended:
  - сталий розвиток (sustainable development) — стратегія сталого розвитку, принципи сталого розвитку;
    international development and policy planning term
  - вуглецевий слід (carbon footprint) — зменшення вуглецевого сліду, розрахунок вуглецевого сліду;
    climate economics and individual action discourse
  - екосистема (ecosystem) — морська екосистема, екосистемні послуги; ecological science analytical term
  - заповідник (nature reserve) — біосферний заповідник, режим заповідника; conservation management term
  - рекультивація (reclamation/remediation) — рекультивація земель, рекультивація відвалів; post-industrial
    and post-mining environmental restoration
