vocabulary_hints:
  required:
  - віршування (versification) — силабо-тонічне віршування, система віршування; часто
    вживається в науковому стилі
  - метр (meter) — віршовий метр; фундаментальна одиниця ритмічної організації
  - стопа (foot) — двоскладова стопа, п'ятистопний ямб; основа метричного аналізу
  - ямб (iamb) — наголос на парних складах; найпоширеніший розмір української класики
  - хорей (trochee) — наголос на непарних складах; характерний для народнопісенної
    традиції
  - катрен (quatrain) — сонетний катрен; базова одиниця строфіки
  - рима (rhyme) — чоловіча, жіноча, точна, багата рима; висока частотність у дискурсі
  - строфа (stanza) — сонетна строфа, вільна строфа; середня частотність
  - верлібр (free verse) — сучасний верлібр; ключовий термін для модерної поезії
  - анжамбеман (enjambment) — перенесення фрази; термін для аналізу ритміко-синтаксичного
    зв'язку
  recommended:
  - дактиль (dactyl) — трискладова стопа з наголосом на першому складі
  - амфібрахій (amphibrach) — трискладова стопа з наголосом на другому складі
  - анапест (anapest) — трискладова стопа з наголосом на третьому складі
  - цезура (caesura) — ритмічна пауза всередині віршового рядка
  - сонет (sonnet) — італійський сонет, шекспірівський сонет; класична «тверда» форма
  - алітерація (alliteration) — звукова алітерація; засіб милозвучності (§4.3.2)
