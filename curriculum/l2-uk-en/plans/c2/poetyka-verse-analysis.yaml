content_outline:
- section: Вступ (Introduction) — Системи віршування
  words: 500
  points:
  - 'Історичний злам в українській поезії: перехід від силабічного віршування (Г.
    Сковорода) до силабо-тонічного (І. Котляревський, Т. Шевченко) як маркер нової
    літератури.'
  - Зв'язок систем віршування зі стилістичними засобами фонетики (§4.3.2) та загальною
    концепцією милозвучності української мови.
- section: Метрика та ритміка (Metrics and Rhythm)
  words: 800
  points:
  - 'Двоскладові та трискладові стопи: ямб, хорей, дактиль, амфібрахій, анапест; когнітивні
    стратегії розпізнавання розмірів у текстах.'
  - 'Помилка учня: плутанина наголосів у ямбі та хореї через інтонаційні особливості
    рідної мови — вправи на правильне скандування.'
  - 'Подолання механічного підрахунку складів: роль піррихіїв та спондеїв як ритмічних
    акцентів та пауз, що формують індивідуальний малюнок вірша.'
- section: Строфіка та звукова організація (Stanza and Sound Organization)
  words: 700
  points:
  - 'Поетична архітектура: катрен, терцет, дистих та складні форми (сонет, октава,
    онегінська строфа в контексті українського перекладу).'
  - 'Евфонія та звукопис: стилістичне використання алітерації й асонансу для створення
    звукового символізму (аналіз «музики слова» П. Тичини).'
- section: Тропи та фігури в поетичній мові (Tropes and Figures in Poetic Language)
  words: 800
  points:
  - 'Лексичні засоби виразності (§4.3.3): поглиблений аналіз епітетів, метафор, уособлень,
    перифразу та метонімії як засобів творення художнього образу.'
  - Філософська роль оксиморона та антитези у вираженні внутрішнього дуалізму; аналіз
    поетичних текстів Лесі Українки та І. Франка.
- section: Модернізм, Верлібр та Сучасність (Modernism, Vers Libre, and Contemporaneity)
  words: 800
  points:
  - 'Експерименти Розстріляного відродження: футуризм М. Семенка та неокласицизм неокласиків
    як інтеграція в європейський модерністський дискурс.'
  - 'Верлібр vs Рима: спростування помилки щодо ототожнення поезії лише з римуванням;
    аналіз сучасного верлібру (С. Жадан, О. Герасим''юк).'
- section: Підсумок (Summary) — Майстерність аналізу
  words: 400
  points:
  - 'Інтегрований метод літературознавчого аналізу вірша: синтез форми (метрика, строфіка)
    та змісту (тропи, ідейне навантаження).'
  - Зв'язок класичної традиції з постмодерним дискурсом; підготовка до власної творчої
    інтерпретації текстів.
