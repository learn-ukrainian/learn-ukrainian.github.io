module: c2-068
level: C2
sequence: 68
slug: zdorovya-i-medytsyna
version: '2.0'
title: Здоров'я і медицина
subtitle: Health and Medicine
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати систему охорони здоров'я України та медичну реформу з використанням фахової медичної та
  адміністративної термінології
- Learner can critically discuss addiction, prevention, and public health policy using nuanced argumentative
  discourse in academic Ukrainian register
- Порівнювати народну медицину з доказовою медициною та обґрунтовувати етичні позиції щодо біоетичних
  дилем у сучасному медичному дискурсі
- Learner can compose a policy analysis on healthcare reform, bioethics, or addiction prevention integrating
  medical terminology and statistical evidence
sources:
- name: МОЗ України — Офіційний сайт
  url: https://moz.gov.ua/
  type: primary
  notes: Official health policy documents, reform updates, public health statistics and guidelines
- name: НСЗУ — Національна служба здоров'я України
  url: https://nszu.gov.ua/
  type: reference
  notes: Healthcare financing data, medical guarantee program details, provider contracts
- name: 'Грузєва Т. Громадське здоров''я: підручник'
  url: https://www.nas.gov.ua/
  type: reference
  notes: Academic textbook on public health in Ukraine — epidemiology, prevention, health systems
content_outline:
- section: 'Вступ: Медичний дискурс на рівні С2 (Introduction: Medical Discourse at C2 Level)'
  words: 600
  points:
  - 'From basic health vocabulary (B1-B2 doctor visits, symptoms) to policy-level analysis: the C2 learner
    engages with healthcare systems, bioethics, and public health through specialized academic and
    administrative registers.'
  - 'Overview of thematic territory: State Standard theme 3.11 (Здоров''я та особиста гігієна) expanded to
    include healthcare reform, addiction discourse, folk medicine, and bioethical debates.'
  - 'Register expectations: navigating науковий (medical literature), офіційно-діловий (policy documents),
    and публіцистичний (health journalism) registers in medical discourse.'
- section: Система охорони здоров'я та медична реформа (Healthcare System and Medical Reform)
  words: 800
  points:
  - 'Structure of Ukrainian healthcare: первинна, вторинна, та третинна медична допомога (primary, secondary,
    tertiary care); the role of сімейний лікар (family doctor) as gatekeeper in the reformed system.'
  - 'Medical reform since 2017: НСЗУ (National Health Service) as a single payer, програма медичних
    гарантій (medical guarantee program), eHealth system; analyzing reform outcomes and ongoing challenges.'
  - 'Medical insurance: обов''язкове медичне страхування (mandatory health insurance) debates — models,
    implementation obstacles, comparison with European systems; voluntary insurance market development.'
- section: Діагностика та невідкладна допомога (Diagnostics and Emergency Care)
  words: 700
  points:
  - 'Diagnostic procedures and terminology: обстеження (examination), аналізи (tests), УЗД (ultrasound),
    МРТ (MRI), біопсія (biopsy); reading and discussing medical reports in Ukrainian.'
  - 'Emergency care system: невідкладна (швидка) допомога, екстрена медична допомога; triage protocols,
    the 103 service reform, and hospital emergency departments.'
  - 'Preventive medicine: профілактика, диспансеризація, скринінг, вакцинація; analyzing public discourse
    around prevention versus treatment paradigms and anti-vaccination movements.'
- section: Залежності та їх подолання (Addictions and Their Overcoming)
  words: 700
  points:
  - 'Types of addiction: алкогольна залежність, наркотична залежність, тютюнова залежність, інтернет-залежність;
    medical versus moral models of addiction in Ukrainian public discourse.'
  - 'Policy responses: замісна терапія (substitution therapy), реабілітаційні центри, програми зменшення шкоди
    (harm reduction); analyzing the effectiveness and public perception of different approaches.'
  - 'Social dimensions: стигматизація залежних осіб, вплив залежності на сім''ю та суспільство; constructing
    evidence-based arguments about addiction policy using sociological and medical data.'
- section: Народна медицина та доказова медицина (Folk Medicine and Evidence-Based Medicine)
  words: 700
  points:
  - 'Ukrainian folk medicine traditions: знахарство (folk healing), народні засоби (folk remedies), фітотерапія
    (herbal medicine); ethnographic context and cultural significance.'
  - 'Evidence-based medicine (доказова медицина): principles of clinical trials, рандомізовані дослідження
    (randomized studies), систематичні огляди (systematic reviews); the hierarchy of medical evidence.'
  - 'Tension between traditions and science: analyzing discourse around альтернативна медицина, шарлатанство
    (quackery), and the integration of validated traditional remedies into modern practice.'
- section: Біоетика та медична деонтологія (Bioethics and Medical Deontology)
  words: 800
  points:
  - 'Core bioethical principles: автономія пацієнта (patient autonomy), інформована згода (informed consent),
    конфіденційність медичної інформації; legal and ethical frameworks in Ukrainian medicine.'
  - 'Contemporary bioethical debates: трансплантація органів (organ transplantation), паліативна допомога
    (palliative care), евтаназія, сурогатне материнство (surrogacy); analyzing Ukrainian legal positions
    and public discourse.'
  - 'Medical deontology (деонтологія): лікарська етика, лікарська таємниця, відповідальність лікаря;
    professional ethics in the context of wartime medicine and resource scarcity.'
- section: 'Практикум: Аналіз медичного дискурсу (Workshop: Medical Discourse Analysis)'
  words: 700
  points:
  - 'Applied analysis: reading and deconstructing an МОЗ policy document or НСЗУ reform report using
    analytical frameworks from health policy studies.'
  - 'Argumentative writing: composing an analytical essay on a chosen health topic (e.g., addiction policy,
    healthcare financing reform, bioethical dilemma) with evidence from medical and statistical sources.'
  - 'Case study discussion: analyzing a bioethical case scenario (e.g., organ donation consent, end-of-life
    care decisions) using specialized medical and ethical terminology.'
vocabulary_hints:
  required:
  - медичне страхування (medical insurance) — обов'язкове медичне страхування, поліс медичного страхування;
    central healthcare reform concept
  - залежність (addiction/dependence) — алкогольна залежність, подолання залежності; medical and social
    policy term
  - діагностика (diagnostics) — медична діагностика, методи діагностики; clinical medicine register
  - невідкладна допомога (emergency care) — екстрена невідкладна допомога, служба невідкладної допомоги;
    emergency medicine terminology
  - охорона здоров'я (healthcare/health protection) — система охорони здоров'я, громадське здоров'я; policy
    and institutional term
  - наркотичний (narcotic) — наркотичні речовини, наркотична залежність; substance abuse and legal register
  - обстеження (examination/check-up) — медичне обстеження, комплексне обстеження; diagnostic medicine term
  - профілактика (prevention) — профілактика захворювань, профілактичні заходи; public health register
  - реабілітація (rehabilitation) — медична реабілітація, реабілітаційний центр; recovery and treatment term
  - біоетика (bioethics) — принципи біоетики, біоетична комісія; medical ethics and philosophy of medicine
  recommended:
  - знахарство (folk healing) — народне знахарство, практики знахарства; ethnographic and cultural medicine term
  - народний засіб (folk remedy) — перевірені народні засоби, ефективність народних засобів; traditional
    medicine discourse
  - деонтологія (deontology) — лікарська деонтологія, медична деонтологія; professional ethics register
  - трансплантація (transplantation) — трансплантація органів, закон про трансплантацію; biomedical and legal term
  - паліативний (palliative) — паліативна допомога, паліативна медицина; end-of-life care terminology
