module: zdorovya-i-medytsyna
level: C2
sequence: 69
version: "1.0"
title: "Здоров'я і медицина: Сучасні виклики та біоетика"
subtitle: "Health and Medicine: Modern Challenges and Bioethics"
focus: vocabulary
pedagogy: seminar
objectives:
  - "Аналізувати сучасні тенденції у сфері охорони здоров'я та біоетики засобами мови високого рівня"
  - "Опанувати загальномедичну та біоетичну термінологію для участі у фахових дискусіях"
  - "Розвинути навички критичного аналізу медичних публікацій, протоколів та етичних висновків"
  - "Дослідити філософські аспекти здоров'я, життя та смерті в українському соціокультурному контексті"
content_outline:
  - section: "Трансформація системи охорони здоров'я"
    words: 1000
    subsections:
      - "Реформування медичної галузі в Україні: пацієнтоцентричність та доказова медицина"
      - "Фінансування та управління в медицині: солідарна система vs страхування"
      - "Мовна репрезентація прав пацієнтів та обов'язків медичних працівників"
    key_concepts:
      - "доказова медицина"
      - "пацієнтоцентричність"
      - "медична реформа"
      - "превентивна медицина"
    primary_sources:
      - "Микола Амосов, 'Роздуми про здоров'я' (філософія активного довголіття та відповідальності за здоров'я)"
  - section: "Біоетика та новітні технології"
    words: 1000
    subsections:
      - "Етичні дилеми у сучасній медицині: трансплантологія, генетика, репродуктивні технології"
      - "Цифровізація медицини (eHealth) та питання конфіденційності даних"
      - "Мовні засоби вираження етичної позиції у біомедичних дослідженнях"
    key_concepts:
      - "біоетика"
      - "генетична інженерія"
      - "інформована згода"
      - "конфіденційність"
  - section: "Психічне здоров'я та психосоціальна підтримка"
    words: 1000
    subsections:
      - "Посттравматичний стресовий розлад (ПТСР): виклики для українського суспільства"
      - "Розвиток системи психологічної допомоги та подолання стигми щодо психічних розладів"
      - "Мовна стратегія підтримки та емпатії у роботі з травмою"
    key_concepts:
      - "психічне здоров'я"
      - "резильєнтність"
      - "стигматизація"
      - "реабілітація"
    primary_sources:
      - "Віктор Франкл, 'Людина у пошуках справжнього сенсу' (аналіз психологічної стійкості, адаптований до українського дискурсу)"
  - section: "Глобальні загрози та громадське здоров'я"
    words: 1000
    subsections:
      - "Пандемії та епідемічна безпека: уроки минулого та стратегії майбутнього"
      - "Роль громадського здоров'я (Public Health) у зміцненні національної безпеки"
      - "Комунікація ризиків та формування здорової поведінки нації"
    key_concepts:
      - "громадське здоров'я"
      - "епідеміологічний нагляд"
      - "вакцинація"
      - "інформаційна гігієна"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "Науково-популярна праця / Есе"
    topic: "Аналіз філософії Миколи Амосова щодо здоров'я як здатності до адаптації. Вивчення концепту 'межі міцності' організму."
    key_elements: ["резерви здоров'я", "раціональне життя", "механізм саморегуляції"]
    motivation: "Осмислення української медичної школи та її гуманістичного складника."
  - source_type: "Етичний висновок / Декларація"
    topic: "Дослідження Гельсінської декларації про етичні принципи медичних досліджень за участю людини (український переклад)."
    key_elements: ["добровільність", "ризик vs користь", "вразливі групи"]
    motivation: "Вивчення нормативного дискурсу біоетики."
listening_situations:
  - media_type: "лекція"
    setting: "Виступ провідного українського психолога про розбудову системи психологічної стійкості нації."
    focus_points:
      - "Термінологія травмофокусованої терапії"
      - "Як мова допомагає у зціленні та інтеграції досвіду"
    motivation: "Аналіз сучасного дискурсу психічного здоров'я."
writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть аналітичне есе на тему 'Етичні виклики застосування штучного інтелекту в медичній діагностиці'. Поєднайте технологічний та гуманістичний аспекти."
    requirements: ["мінімум 700 слів", "використання біоетичної термінології", "критична оцінка ризиків"]
    motivation: "Розвиток навичок аргументації у складних міждисциплінарних питаннях."
    model_answer: "Текст має містити аналіз переваг та загроз ШІ в медицині, обґрунтування необхідності етичного регулювання та бути написаним мовою високої інтелектуальної напруги."
discussion_topics:
  - context: "Чи повинна держава мати право примусово впроваджувати заходи громадського здоров'я (наприклад, вакцинацію)?"
    questions:
      - "Як знайти баланс між індивідуальною свободою та суспільною безпекою?"
      - "Яку роль відіграє довіра до інституцій у питаннях здоров'я нації?"
    motivation: "Дебати про біополітику та права людини."
