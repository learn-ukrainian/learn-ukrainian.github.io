vocabulary_hints:
  required:
  - 'право (law/right) — collocations: верховенство права (rule of law), суб''єкт
    права, мати право; denotes the system or an entitlement.'
  - 'закон (statute/law) — collocations: згідно із законом (Instrumental case), ухвалити
    закон, чинне законодавство; denotes a specific legislative act.'
  - 'юридична особа (legal entity) — official term for organizations/corporations;
    Frequency: High.'
  - фізична особа (natural person) — official term for individuals; note 'фізична
    особа-підприємець' (FOP).
  - 'договір (contract) — collocations: укласти договір (to enter into), розірвати
    договір (to terminate); legal term of art.'
  - 'позов (lawsuit/claim) — collocations: подати позов, позовна заява, задовольнити
    позов; Frequency: High (Official).'
  - 'суд (court) — collocations: Конституційний Суд України, Верховний Суд, судове
    засідання (court hearing).'
  - 'відповідальність (liability/responsibility) — collocations: нести відповідальність,
    притягнути до відповідальності, кримінальна відповідальність.'
  - концепція (concept) — abstract register for legal theory.
  - аналіз (analysis) — key action for C2 legal discourse.
  - дискурс (discourse) — academic/professional register marker.
  - методологія (methodology) — used in discussing legal research/theory.
  recommended:
  - згідно із (according to) — Mandatory Instrumental governance; major learner error
    focus.
  - адвокат (lawyer/advocate) — specific to bar-qualified members; contrast with general
    'юрист'.
  - законодавство (legislation) — the body of law as a whole; 'чинне законодавство'.
  - правовідносини (legal relations) — formal interactions regulated by legal norms.
  - правоохоронні органи (law enforcement agencies) — State Standard (§3.7) terminology.
  - державний устрій (state structure) — State Standard (§3.8) terminology.
  - інтерпретація (interpretation) — specifically 'юридична інтерпретація'.
  - контекстуалізація (contextualization) — analyzing law within historical/social
    frameworks.
  - синтез (synthesis) — summarizing legal arguments.
