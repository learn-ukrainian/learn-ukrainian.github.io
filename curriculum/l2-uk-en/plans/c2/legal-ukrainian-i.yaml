content_outline:
- section: 'Вступ: Історія та природа правничої мови (Introduction: History and Nature
    of Legal Language)'
  words: 700
  points:
  - 'Historical foundations of Ukrainian law: Analysis of ''Ruska Pravda'' and the
    Constitution of Pylyp Orlyk (1710) as early European models of the separation
    of powers concept.'
  - 'Characteristics of the Official-Business Style (§4.3.1.1): The balance between
    informative precision and prescriptive authority in legal discourse.'
- section: Державний устрій та ієрархія нормативних актів (State Structure and Hierarchy
    of Normative Acts)
  words: 900
  points:
  - 'Branches of power in Ukraine (§3.8): The roles of the legislative (Verkhovna
    Rada), executive, and judicial branches in maintaining the legal order.'
  - 'The hierarchy of normative acts: Exploring the supremacy of the Constitution
    over statutes (закони) and bylaws (підзаконні акти), and the Constitutional Court''s
    oversight.'
- section: Суб'єкти права та правовідносини (Subjects of Law and Legal Relations)
  words: 900
  points:
  - 'Defining legal subjects (§3.7): Rights and obligations of natural persons (фізичні
    особи), legal entities (юридичні особи), and the status of FOP (фізична особа-підприємець).'
  - 'Legal capacity and participation: Mapping the scope of civil rights and the nature
    of legal relations (правовідносини) in the modern Ukrainian context.'
- section: Правнича термінологія та культура мовлення (Legal Terminology and Speech
    Culture)
  words: 900
  points:
  - 'Learner error focus: Correcting prepositional governance — «згідно із законом»
    (Instrumental) vs. common mistake «згідно закону»; distinguishing «вивчати право»
    (system) from «вивчати закон» (statute).'
  - 'Lexical precision for C2: Differentiating ''юрист'' from ''адвокат''; refining
    the register by preferring active official voice (''суд ухвалив'') over passive
    bureaucratic forms (''було вирішено'').'
- section: 'Робота з першоджерелами: Закони та договори (Working with Primary Sources:
    Laws and Contracts)'
  words: 900
  points:
  - 'Anatomy of a Ukrainian legal act: Mastering the interpretation of articles (статті),
    parts (частини), and clauses (пункти) in legislative codes.'
  - 'Contractual analysis: Identifying essential clauses, liabilities (відповідальність),
    and dispute resolution mechanisms in standard civil agreements.'
- section: Правопорядок та підсумковий аналіз (Law Order and Final Analysis)
  words: 700
  points:
  - 'State Standard focus (§3.7): Discussing law enforcement agencies, corruption,
    and the transition toward a transparent justice system in post-decolonized Ukraine.'
  - 'Professional synthesis: Creating a bilingual legal glossary and analyzing the
    linguistic differences between high-level legislative texts and practical documents.'
