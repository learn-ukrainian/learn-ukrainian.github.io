content_outline:
- section: Вступ — Редагування як етап творення (Introduction — Editing as a Creative Stage)
  words: 750
  points:
  - 'Постать Івана Франка як зразкового редактора: аналіз його досвіду в «Літературно-науковому віснику», де він власноруч
    правив рукописи молодих авторів, навчаючи їх лаконічності та точності слова.'
  - 'Рівні редагування за Державним стандартом (§4.3.7): методологія трансформації наукового тексту в науково-популярний та
    публіцистичний стилі; дотримання часової дистанції перед початком правки.'
- section: Культура наукової мови та мовна гігієна (Culture of Scientific Language and Language Hygiene)
  words: 1250
  points:
  - 'Спадщина Олени Курило та її праця «Уваги до сучасної української літературної мови»: застосування принципів очищення
    наукової мови від кальок та штучних конструкцій 1920-х років у сучасній практиці.'
  - 'Боротьба з канцеляризмами (§4.3.3): усунення конструкцій «згідно з», «відповідно до», «у зв’язку з» та заміна стилю ''мертвої
    мови'' на живий, динамічний академічний дискурс.'
  - 'Корекція лексичних кальок та суржику: системне виправлення поширених помилок в академічних текстах, зокрема заміна «приймати
    участь» на «брати участь» та «вірна відповідь» на «правильна відповідь».'
- section: Змістове та структурне редагування (Content and Structural Editing)
  words: 1000
  points:
  - 'Когезія та логічна узгодженість: аналіз засобів лексичної когезії, перевірка зв''язності між абзацами та усунення структурних
    розривів у ланцюгу наукової аргументації.'
  - 'Творення вторинних текстів (§4.3.8): практична методика написання рефератів, анотацій та довідково-інформаційних повідомлень
    на основі результатів дипломного проєкту.'
- section: Практикум — Синтаксична динаміка та стилістична корекція (Workshop — Syntactic Dynamics and Stylistic Correction)
  words: 1250
  points:
  - 'Деколонізація наукового стилю через синтаксичні зміни: трансформація пасивного стану («нами було проведено») на активний
    («ми провели») для усунення імперських мовних впливів.'
  - 'Діагностика та усунення плеоназмів: розбір типових помилок «вільна вакансія», «пам''ятний сувенір», «спускатися вниз»
    та механізмів їхнього стилістичного виправлення.'
  - 'Прихована тавтологія в наукових текстах: вправи на виявлення лексичної надмірності та забезпечення суворої термінологічної
    послідовності й лаконічності.'
- section: Рецензування та фіналізація проєкту (Reviewing and Finalizing the Project)
  words: 750
  points:
  - 'Процедура рецензування (сліпе та зовнішнє): етичні аспекти сприйняття критики, алгоритм інтерпретації відгуків експертів
    та пріоритизація правок у фінальному тексті.'
  - 'Обґрунтування авторських рішень: підготовка до публічного захисту (c2-94) шляхом аргументованого захисту внесених змін
    та структурного вдосконалення роботи.'
vocabulary_hints:
  required:
  - концепція (concept) — наукова, авторська; основа цілісного сприйняття тексту
  - аналіз (analysis) — критичний, текстовий; головний інструмент наукового редактора
  - дискурс (discourse) — науковий, академічний; трансформація стилів згідно з §4.3.7
  - методологія (methodology) — методика редагування та рецензування; етапи роботи над текстом
  - редагування (editing) — літературне, наукове; High frequency (Academic); етапи за Державним стандартом
  - когезія (cohesion) — лексична когезія, засоби когезії; порушення когезії; Medium frequency (Linguistics)
  - узгодженість (consistency) — логічна узгодженість, узгодженість термінології; High frequency (General)
  - канцеляризми (bureaucratese) — зловживання штампами (§4.3.3); стиль 'мертвої мови'; Medium frequency
  recommended:
  - інтерпретація (interpretation) — задуму автора, критики рецензентів; контекстуалізація тез
  - контекстуалізація (contextualization) — розташування доказів у межах структурних частин роботи
  - синтез (synthesis) — зворотного зв'язку; інтеграція зауважень у цілісну структуру проєкту
  - тавтологія (tautology) — прихована тавтологія; лексична помилка; High frequency (General)
  - плеоназм (pleonasm) — мовна надмірність («вільна вакансія»); усунення стилістичних огріхів
  - рецензування (reviewing) — сліпе рецензування, процедура рецензування; High frequency (Academic)
