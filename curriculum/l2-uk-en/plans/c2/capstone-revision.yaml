module: c2-102
level: C2
sequence: 102
version: '1.2'
title: 'Редагування та перегляд проєкту: Критичний аналіз та вдосконалення'
subtitle: Редакція кваліфікаційного проєкту
focus: professional
pedagogy: review
objectives:
  - Провести глибоке змістовне та стилістичне редагування тексту проєкту
  - Здійснити взаємне рецензування робіт колег (peer review) та надати 
    конструктивний фідбек
  - Виправити логічні помилки, неточності у фактах та термінологічні огріхи
  - Вдосконалити структуру та аргументацію на основі отриманих коментарів
content_outline:
  - section: Стратегії саморедагування
    words: 1250
    subsections:
      - 'Відсторонене читання: як подивитися на власний текст очима критика'
      - 'Перевірка логічного ланцюжка: теза — аргумент — висновок'
      - 'Скорочення зайвого: боротьба з багатослів''ям та інформаційним шумом'
    key_concepts:
      - саморедагування
      - логічна верифікація
      - дистиляція змісту
      - стилістична правка
    primary_sources:
      - Посібники з наукового редагування та видавничої справи (фрагменти)
  - section: Взаємне рецензування
    words: 1250
    subsections:
      - Етика та методика надання зворотного зв'язку
      - 'Критерії оцінювання наукової роботи: повнота, оригінальність, аргументованість'
      - 'Робота з коментарями рецензента: як сприймати критику конструктивно'
    key_concepts:
      - рецензія
      - конструктивний фідбек
      - експертна оцінка
      - академічна дискусія
    primary_sources:
      - Зразки рецензій на наукові статті у провідних українських часописах
  - section: Робота над помилками та уточнення термінології
    words: 1250
    subsections:
      - 'Уніфікація термінів у межах всієї роботи: створення глосарію проєкту'
      - Виправлення синтаксичних та пунктуаційних помилок згідно з Правописом 
        2019
      - Перевірка точності цитат та бібліографічних посилань
    key_concepts:
      - уніфікація
      - коректура
      - нормативність
      - верифікація джерел
    primary_sources:
      - Український правопис 2019 (розділи про пунктуацію та складні слова)
  - section: Фіналізація структури та композиції
    words: 1250
    subsections:
      - 'Оптимізація обсягу розділів: дотримання балансу'
      - 'Удосконалення апарату орієнтування: зміст, перелік абревіатур, додатки'
      - Остаточне шліфування вступу та висновків
    key_concepts:
      - композиційна цілісність
      - баланс частин
      - науковий апарат
      - фіналізація
    primary_sources:
      - Приклади зразково оформлених магістерських та докторських робіт
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - error-correction
    - select
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Авраменко, 11 клас (2019): Стилістичне редагування'
  - 'Глазова, 11 клас (2019): Культура наукового мовлення'
  - 'Ворон, 11 клас (2019): Правописна норма'
  - 'Державний стандарт 2024: C2 — редакторська компетенція'
reading_situations:
  - source_type: рецензія
    topic: 'Аналіз наукової рецензії: які аспекти роботи піддаються критиці найчастіше?'
    key_elements:
      - аргументованість
      - методологія
      - висновки
    motivation: Навчання професійному сприйняттю та наданню критики.
  - source_type: фрагмент чернетки
    topic: 'Порівняння ''сирого'' тексту та відредагованої версії: аналіз стилістичних
      правок.'
    key_elements:
      - стислість
      - точність
      - динаміка викладу
    motivation: Розвиток редакторського чуття.
listening_situations:
  - media_type: відео
    setting: 'Дискусія на науковому семінарі: обговорення спірних тез у дослідженні.'
    focus_points:
      - Способи захисту власної позиції
      - Визнання помилок та готовність до змін
    motivation: Підготовка до публічного обговорення результатів проєкту.
writing_tasks:
  - task_type: відгук
    prompt: Напишіть рецензію на один розділ проєкту вашого колеги. 
      Використовуйте професійну термінологію та надайте конкретні поради щодо 
      вдосконалення.
    requirements:
      - мінімум 400 слів
      - структурований відгук
      - виділення сильних та слабких сторін
    motivation: Розвиток критичного мислення та академічної етики.
    model_answer: Рецензія має бути доброзичливою, але об'єктивною, з чіткими 
      посиланнями на текст та методичними рекомендаціями.
discussion_topics:
  - context: Де межа між редагуванням та переписуванням?
    questions:
      - Чи може втручання редактора (чи колеги) змінити авторську концепцію?
      - Як зберегти власний голос у процесі академічного рецензування?
    motivation: Обговорення авторської автономії в колективному навчальному 
      процесі.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про стратегії саморедагування і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про взаємне рецензування, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Стратегії саморедагування». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему стратегії саморедагування."
  - type: comparative-study
    focus: "Порівняйте різні підходи до стратегії саморедагування: Відсторонене читання: як подивитися на власний текст очима критика. Визначте спільне та відмінне."
phase: C2.4 [Meta-Skills & Capstone]
