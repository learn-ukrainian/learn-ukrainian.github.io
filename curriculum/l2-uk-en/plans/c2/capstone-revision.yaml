module: c2-083
level: C2
sequence: 83
slug: capstone-revision
version: '2.0'
title: Дипломний проєкт — Редагування
focus: practice
pedagogy: TTT
phase: C2.4 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Аналізувати ключові поняття та явища модуля на рівні глибокого розуміння
- Продукувати тексти академічного та професійного рівня за тематикою модуля
- Демонструвати вільне володіння спеціалізованою лексикою та термінологією
- Застосовувати знання з теми «Змістове та структурне редагування» у власній мовній практиці
