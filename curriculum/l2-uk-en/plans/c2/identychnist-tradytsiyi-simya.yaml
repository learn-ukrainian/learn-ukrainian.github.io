module: c2-077
level: C2
sequence: 77
slug: identychnist-tradytsiyi-simya
version: '2.0'
title: 'Ідентичність, традиції, сім''я'
subtitle: 'Identity, Traditions and Family'
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати концепцію особистої та національної ідентичності в українському культурному контексті з використанням
  відповідної соціологічної та культурологічної термінології
- Learner can discuss generational conflicts, gender dynamics, and evolving family structures in Ukraine using nuanced
  analytical discourse that integrates personal narrative with sociological perspective
- Конструювати розгорнутий аналітичний текст про роль традицій та обрядів у формуванні культурної ідентичності,
  розрізняючи живі традиції та стилізований фольклоризм
- Learner can appropriately express condolences, formulate wishes for life events, and navigate sensitive cultural
  situations using register-appropriate Ukrainian at C2 level
