content_outline:
- section: 'Вступ: Ідентичність як тематичний дискурс (Introduction: Identity as Thematic Discourse)'
  words: 600
  points:
  - 'Від особистого представлення (A1-A2) до аналізу ідентичності: С2-студент досліджує питання «хто я?» через
    призму родоводу, професії, мови, релігії та культурних практик.'
  - 'Тематичне охоплення: інтеграція тем Державного стандарту 3.1 (Людина), 3.3 (Повсякденне життя) та 3.21
    (Традиції, звичаї, свята) в єдиний антропологічний модуль.'
  - 'Чутливість теми: навігація між особистим наративом та аналітичним дискурсом; уникнення стереотипізації
    при обговоренні традицій різних регіонів та спільнот.'
- section: Особиста ідентичність та родовід (Personal Identity and Lineage)
  words: 750
  points:
  - 'Складові ідентичності на рівні С2: від базових категорій (ім''я, вік, професія) до глибинних — родовід,
    культурна пам''ять, мовна ідентичність, ставлення до Батьківщини.'
  - 'Родовід і генеалогія: дослідження власного коріння як культурна практика; термінологія спорідненості
    (кум, сват, побратим) та її соціальна функція в українському суспільстві.'
  - 'Кар''єра та самореалізація як компоненти ідентичності: професійна ідентичність, покликання (vocation),
    баланс між особистим і професійним — порівняння українського та західного підходів.'
- section: Покоління та ґендерні відносини (Generations and Gender Relations)
  words: 750
  points:
  - 'Конфлікт поколінь: відмінності у цінностях між поколіннями (радянське, незалежне, post-Maidan, воєнне);
    як історичні травми формують ідентичність різних вікових груп.'
  - 'Ґендерні ролі в українській родині: еволюція від патріархальної моделі до сучасних партнерських відносин;
    вплив війни на перерозподіл ґендерних ролей.'
  - 'Повсякденне життя та побут: організація часу, розподіл обов''язків, ставлення до домашньої праці; як
    повсякденність формує культурну ідентичність.'
- section: Українські звичаї та традиції (Ukrainian Customs and Traditions)
  words: 800
  points:
  - 'Релігійні свята: Різдво (7 січня та 25 грудня — дискусія щодо дати), Великдень (писанкарство, кошик,
    гаївки), Трійця (зелені свята); синкретизм язичницьких та християнських елементів.'
  - 'Державні свята та дні пам''яті: День Незалежності, День Конституції, День захисників і захисниць;
    нові свята після 2014 року та процес деколонізації календаря.'
  - 'Обряди життєвого циклу: хрестини (хрещення), іменини vs день народження, весілля (сватання, вінчання,
    весільні обряди), народні забобони та їхня роль у сучасному житті.'
- section: Поховальні традиції та вираження співчуття (Funeral Traditions and Expressing Condolences)
  words: 700
  points:
  - 'Поховальні обряди: традиційний український похорон (поминки, дев''ятий день, сорочини), регіональні
    відмінності; вплив війни на поховальну культуру (прощання з воїнами).'
  - 'Мова співчуття: формули висловлення співчуття (Щиро співчуваю Вашій втраті; Вічна пам''ять; Нехай
    земля буде пухом) — регістрові відмінності між формальним та особистим співчуттям.'
  - 'Табу та евфемізми: культурні табу навколо смерті в українській традиції; евфемістичні вирази (відійшов
    у вічність, спочив, пішов з життя) та їхня стилістична маркованість.'
- section: Забобони та культурний код (Superstitions and Cultural Code)
  words: 700
  points:
  - 'Забобони у повсякденному житті: не вітатися через поріг, не дарувати парну кількість квітів живим,
    не свистіти в хаті, чорний кіт — систематизація та культурне пояснення.'
  - 'Побажання та тости: формули побажань на різні випадки (день народження, Новий рік, весілля, народження
    дитини); мистецтво українського тосту як культурний жанр.'
  - 'Ментальність та культурний код: поняття «менталітет» та його критика; як традиції, забобони та обряди
    формують колективну свідомість — аналітичний підхід без есенціалізму.'
- section: 'Практикум: Аналіз культурних наративів (Workshop: Cultural Narrative Analysis)'
  words: 700
  points:
  - 'Прикладний аналіз: деконструкція етнографічного тексту (Воропай або Грушевський) з погляду сучасної
    антропології — що залишається актуальним, а що потребує критичного переосмислення.'
  - 'Есе-продукція: написання аналітичного тексту «Традиція між автентичністю та стилізацією» з прикладами
    конкретних обрядів та їхніх сучасних трансформацій.'
  - 'Дискусія: структуровані дебати «Чи потрібні традиції сучасній людині?» — інтеграція особистого досвіду
    з антропологічним аналізом та соціологічними даними.'
vocabulary_hints:
  required:
  - забобони (superstitions) — народні забобони, вірити в забобони; культурно специфічне поняття з виразним
    конотативним навантаженням
  - іменини (name day) — святкувати іменини, привітати з іменинами; традиційне свято, відмінне від дня
    народження
  - хрестини (christening/baptism celebration) — запросити на хрестини, хрестини дитини; обрядовий термін
    для святкування хрещення
  - побажання (wishes/greetings) — щирі побажання, висловити побажання; формульна мова для офіційних
    та неофіційних привітань
  - співчуття (condolences/sympathy) — висловити співчуття, щире співчуття; ключовий термін для
    делікатних комунікативних ситуацій
  - покоління (generation) — конфлікт поколінь, молоде покоління; соціологічний термін для аналізу
    суспільних змін
  - спадщина (heritage/legacy) — культурна спадщина, родинна спадщина; подвійне значення —
    матеріальне та нематеріальне
  - повсякденний (everyday/quotidian) — повсякденне життя, повсякденні практики; академічний термін
    для аналізу побуту
  - обряд (rite/ritual) — поховальний обряд, весільний обряд; ключове поняття етнографії та
    культурології
  - родовід (lineage/genealogy) — дослідити родовід, козацький родовід; термін для генеалогічного
    та ідентичнісного дискурсу
  recommended:
  - родинне гніздо (family nest/ancestral home) — повернутися до родинного гнізда; поетичний
    вираз для батьківського дому з глибокою культурною конотацією
  - ментальність (mentality) — національна ментальність, ментальність покоління; соціологічний
    термін, який потребує критичного вжитку
  - звичаєвий (customary/traditional) — звичаєве право, звичаєва практика; юридично-етнографічний
    термін для усталених норм
  - побутовий (domestic/household) — побутові умови, побутова культура; термін для аналізу
    повсякденного життя
  - культурний код (cultural code) — розшифрувати культурний код, спільний культурний код;
    культурологічний термін для системи значень і символів
