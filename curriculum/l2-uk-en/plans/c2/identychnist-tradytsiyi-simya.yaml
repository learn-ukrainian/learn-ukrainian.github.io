module: identychnist-tradytsiyi-simya
level: C2
sequence: 77
version: '1.2'
title: 'Ідентичність, традиції та сім''я: Сучасні виміри приналежності'
subtitle: 'Ідентичність і традиції: сучасний вимір'
focus: cultural
pedagogy: seminar
objectives:
  - Дослідити еволюцію концептів сім'ї, роду та національної ідентичності в 
    українській культурі
  - Аналізувати взаємодію традиційних цінностей з викликами глобалізації та 
    постмодерну
  - Опанувати дискурс про гендерні ролі, поколіннєві зв'язки та інклюзивні 
    моделі співжиття
  - Сформувати розуміння ролі традиції як фундаменту для творення сучасної 
    ідентичності
content_outline:
  - section: 'Феномен ідентичності: між спадковістю та свідомим вибором'
    words: 1250
    subsections:
      - 'Багатошаровість ідентичності: етнічна, громадянська, персональна та соціальна'
      - Процес самоідентифікації в умовах глобальних трансформацій та 
        інформаційного тиску
      - Мова як маркер приналежності та інструмент творення смислів
    key_concepts:
      - самоідентифікація
      - національна свідомість
      - культурний код
      - приналежність
    primary_sources:
      - Оксана Забужко, 'Шевченків міф України' (вибрані думки про ідентичність 
        та культурну тяглість)
  - section: 'Трансформація української сім''ї: від патріархального ладу до партнерства'
    words: 1250
    subsections:
      - 'Еволюція сімейних цінностей: історія та сучасність українського роду'
      - 'Нові моделі сім''ї та партнерства: зміна гендерних ролей та обов''язків'
      - Проблема поколінь (батьки і діти) в епоху швидких технологічних змін
    key_concepts:
      - гендерні ролі
      - партнерство
      - наступність поколінь
      - інституція сім'ї
  - section: 'Жива традиція: роль обрядів та звичаїв у сучасному урбанізованому світі'
    words: 1250
    subsections:
      - Відтворення та адаптація народних традицій у міському середовищі 
        (neo-folk)
      - Свято як спосіб гуртування громади та збереження колективної пам'яті
      - 'Традиція vs Традиціоналізм: де межа між збереженням та консервацією?'
    key_concepts:
      - обрядовість
      - колективна пам'ять
      - неофольклор
      - адаптація
    primary_sources:
      - Григорій Сковорода, 'Розмова про істинне щастя' (вибрані афоризми про 
        самопізнання та 'сродну працю')
  - section: 'Національна ідентичність у глобальному контексті: виклики збереження
      та розвитку'
    words: 1250
    subsections:
      - 'Українська ідентичність перед обличчям агресії: солідарність та стійкість'
      - Діаспора та збереження національної приналежності поза межами 
        Батьківщини
      - 'Творення модерного українського наративу: від минулого до майбутнього'
    key_concepts:
      - солідарність
      - стійкість (resilience)
      - національний наратив
      - глобалізація
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - unjumble
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Суспільно-політична лексика'
reading_situations:
  - source_type: Філософсько-літературний трактат
    topic: Аналіз поглядів Оксани Забужко на українську ідентичність через 
      призму творчості Шевченка.
    key_elements:
      - культурний міф
      - самоусвідомлення
      - історична пам'ять
    motivation: Розвиток здатності до сприйняття та аналізу складних 
      інтелектуальних дискурсів про націю.
  - source_type: Класична філософія
    topic: Дослідження афоризмів Григорія Сковороди про пізнання себе. Аналіз 
      мовних засобів барокового тексту.
    key_elements:
      - мікрокосм
      - сродна праця
      - внутрішня людина
    motivation: Вивчення філософського підґрунтя українського індивідуалізму та 
      ідентичності.
listening_situations:
  - media_type: інтерв'ю
    setting: Бесіда з відомим соціологом про зміни у структурі та цінностях 
      української сім'ї за останнє десятиліття.
    focus_points:
      - Чинники трансформації сімейних ролей
      - Вплив міграції на родинні зв'язки
    motivation: Сприйняття та аналіз науково-публіцистичного мовлення про 
      соціальні процеси.
writing_tasks:
  - task_type: есе
    prompt: 'Напишіть аналітичне есе на тему ''Традиція як ресурс, а не гальмо: як
      зберегти автентичність у світі, що швидко змінюється?''.'
    requirements:
      - мінімум 700 слів
      - використання термінології з теми
      - аргументована позиція
    motivation: Розвиток навичок синтезу традиційних знань та сучасних 
      соціокультурних викликів у письмі.
    model_answer: Есе має демонструвати глибоке розуміння концепту традиції, 
      аналізувати приклади успішної адаптації звичаїв та пропонувати візію 
      розвитку ідентичності.
discussion_topics:
  - context: Чи є національна ідентичність справою виключно вибору особистості, 
      чи вона диктується походженням та середовищем?
    questions:
      - Чи може людина змінити свою національну приналежність?
      - Яка роль мови та культури у цьому виборі?
    motivation: Дискусія про природу ідентичності та свободу особистості в 
      сучасному світі.
activity_hints:
  - type: reading
    focus: Проаналізувати погляди Оксани Забужко на українську ідентичність 
      через призму творчості Шевченка
  - type: essay-response
    focus: Написати аналітичне есе про традицію як ресурс збереження 
      автентичності у глобалізованому світі
  - type: critical-analysis
    focus: Оцінити аргументацію у тексті про трансформацію гендерних ролей в 
      українській сім'ї
  - type: fill-in
    focus: 'Доповнити текст термінологією ідентичності: самоідентифікація, культурний
      код, неофольклор'
  - type: error-correction
    focus: Виправити кальки та росіянізми у публіцистичному тексті про 
      національну свідомість
