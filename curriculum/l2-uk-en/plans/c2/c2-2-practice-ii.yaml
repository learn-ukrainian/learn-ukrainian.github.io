vocabulary_hints:
  required:
  - творче портфоліо (creative portfolio) — створити/презентувати ~, концепція та
    наповнення; Medium frequency (Academic/Artistic)
  - хронотоп (chronotope) — часопростір твору, розгорнутий ~, міфологічний ~; Low
    frequency (Literary Term)
  - наративна техніка (narrative technique) — зміна фокалізації, потік свідомості,
    ненадійний оповідач; Medium frequency (Literary Studies)
  - підтекст (subtext) — психологічний ~, іронічний ~, читати між рядків; High frequency
  - авторська ідентичність (authorial identity) — національна ~, криза ~, пошук та
    твердження ~; Medium frequency (Criticism)
  recommended:
  - художня деталь (artistic detail) — питомий термін на противагу калькованому 'show
    don't tell'; High importance for C2
  - стилістичний дисонанс (stylistic dissonance) — виникає через вживання канцеляризмів
    у художньому тексті; Register marker
  - фокалізація (focalization) — утримання перспективи оповідача, запобігання змішуванню
    точок зору
  - мистецький проєкт (artistic project) — цілісна концепція, що об'єднує різні твори
