module: c2-2-practice-ii
level: C2
sequence: 41
version: '1.1'
title: 'Практикум з мовної майстерності III: Складні комунікативні стратегії'
subtitle: 'Advanced Language Practice III: Complex Communication Strategies'
focus: integration
pedagogy: workshop
objectives:
- Опанувати стратегії ведення багаторівневого полілогу в інтелектуальному та професійному середовищах
- Розвинути здатність до спонтанної риторичної імпровізації з використанням складних стилістичних засобів
- Навчитися аналізувати та створювати тексти з високим ступенем інтертекстуальності та прихованих смислів
- Досягти автоматизму у виправленні найскладніших випадків порушення мовної норми в умовах дефіциту часу
content_outline:
- section: Полілог у складному соціокультурному середовищі
  words: 1000
  subsections:
  - 'Динаміка групової дискусії: управління ініціативою та реакція на невербальні сигнали'
  - Мовні стратегії нейтралізації конфліктів та пошуку консенсусу в академічних дебатах
  - Культурні коди та прецедентні тексти як інструменти порозуміння
  key_concepts:
  - комунікативна ініціатива
  - фатична функція
  - дискурсивна стратегія
  - прецедентний текст
- section: Риторична імпровізація на межі стилів
  words: 1000
  subsections:
  - 'Техніки швидкого перемикання регістрів: від офіційного до іронічного'
  - Використання афоризмів та цитат для підсилення імпровізованого виступу
  - 'Риторика несподіваного запитання: як формулювати та відповідати'
  key_concepts:
  - риторичний маневр
  - експромт
  - інтонаційна палітра
  - мовна винахідливість
- section: Гіпертекст та інтертекстуальність
  words: 1000
  subsections:
  - 'Текст у тексті: розпізнавання алюзій, ремінісценцій та прихованих цитат'
  - Створення багатошарових повідомлень для різних типів адресатів
  - Гіпертекстуальна організація сучасних інтелектуальних есе
  key_concepts:
  - алюзія
  - ремінісценція
  - палімпсест
  - інтертекстуальний простір
  primary_sources:
  - Оксана Забужко, 'Планета Полин' (аналіз есеїстичного стилю та інтертекстуальності)
- section: Філігранність мовного оформлення
  words: 1000
  subsections:
  - Тонкі відмінності в семантиці близьких синонімів у науковому та юридичному контекстах
  - Усунення двозначності в складних синтаксичних конструкціях
  - Стилістична диференціація граматичних варіантів
  key_concepts:
  - семантична точність
  - синтаксична прозорість
  - варіативність норми
  - стилістична норма
word_target: 4000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - error-correction
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Авраменко, 11 клас (2019): Засоби міжтекстового зв''язку'
- 'Глазова, 11 клас (2019): Стилістичні фігури'
- 'Державний стандарт 2024: C2 — інтертекстуальна компетенція'
reading_situations:
- source_type: Есеїстика
  topic: Інтертекстуальний аналіз есе Оксани Забужко 'Планета Полин'. Виявлення культурних кодів та прихованих цитат.
  key_elements:
  - культурна метафора
  - філософський підтекст
  - алюзія
  motivation: Розвиток навичок читання між рядків та розуміння складних інтелектуальних текстів.
- source_type: Лекція / Промова
  topic: Риторичний аналіз виступу Ліни Костенко 'Гуманітарна аура нації'. Робота з афористичністю та емоційним впливом.
  key_elements:
  - риторичне запитання
  - інверсія
  - градація
  motivation: Вивчення майстерності публічного мовлення на зразках найвищого рівня.
listening_situations:
- media_type: інтерв'ю
  setting: Глибоке інтерв'ю з сучасним українським інтелектуалом про майбутнє культури.
  focus_points:
  - Способи висловлення сумніву та припущення
  - Використання парафразу для уточнення думок співрозмовника
  motivation: Аналіз живого інтелектуального спілкування в реальному часі.
writing_tasks:
- task_type: есе
  prompt: Напишіть есе-рефлексію на тему 'Мова як простір свободи', інтегруючи в текст щонайменше три цитати з української
    класики та дві алюзії на сучасні події. Дотримуйтесь балансу між особистим досвідом та філософським узагальненням.
  requirements:
  - мінімум 600 слів
  - високий рівень інтертекстуальності
  - використання складного синтаксису
  motivation: Практика створення багатошарових текстів з індивідуальним голосом.
  model_answer: Есе має демонструвати майстерне володіння словом, де цитати не просто вставлені, а органічно вплетені в канву
    роздумів. Стиль має бути елегантним, з використанням різноманітних риторичних фігур.
discussion_topics:
- context: Чи може штучний інтелект опанувати справжню майстерність української стилістики, враховуючи її контекстуальну глибину
    та емоційні нюанси?
  questions:
  - Що робить текст 'живим' та 'авторським'?
  - У чому полягає унікальність української мовної картини світу для C2-користувача?
  motivation: Глибока дискусія про майбутнє мови та авторства.
activity_hints:
- type: critical-analysis
  focus: 'Проаналізувати інтертекстуальність есе Оксани Забужко: виявити культурні коди, алюзії та приховані цитати'
- type: error-correction
  focus: Усунути двозначність та семантичні неточності у складних синтаксичних конструкціях наукового тексту
- type: essay-response
  focus: Написати есе-рефлексію з інтеграцією цитат з української класики та алюзій на сучасні події
- type: match-up
  focus: Зіставити типи інтертекстуальних зв'язків (алюзія, ремінісценція, пастіш) з конкретними прикладами з тексту
