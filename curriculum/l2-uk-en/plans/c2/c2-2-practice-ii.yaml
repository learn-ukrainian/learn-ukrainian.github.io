content_outline:
- section: 'Вступ (Introduction: Portfolio as an Artistic Project)'
  words: 400
  points:
  - Концептуальна різниця між творчим та літературознавчим портфоліо як реалізація
    вимог стандарту §4.3.6 щодо планування складних текстів
  - 'Творче портфоліо в контексті професійного визнання: огляд критеріїв конкурсу
    «Коронація слова» як орієнтиру для сучасного автора'
- section: 'Поезія (Poetry: Thematic Cycle and Form Experiments)'
  words: 700
  points:
  - 'Створення тематичного поетичного циклу: робота над естетичною єдністю за моделлю
    «Станіславського феномену» (Андрухович, Іздрик)'
  - 'Експериментальна поетика: від традиційних форм до візуальної поезії, де звук
    і ритм (М22) формують авторський стиль'
- section: 'Проза (Prose: Narrative Techniques and Artistic Detail)'
  words: 850
  points:
  - 'Опанування фокалізації (М27): утримання стабільної перспективи та запобігання
    типовій помилці змішування голосів автора й персонажа'
  - 'Художня деталь як засіб уникнення калькування: перехід від англомовного «show
    don''t tell» до української традиції зорових образів'
  - 'Корекція стилістичного дисонансу: витіснення канцеляризмів (напр. «здійснити
    написання») живою мовою та метафорикою художнього стилю (§4.3.1.1)'
- section: 'Драматургія (Dramaturgy: Subtext and Dramatic Action)'
  words: 600
  points:
  - 'Побудова діалогу через психологічний підтекст: мистецтво «читання між рядків»
    та непряма характеризація героїв'
  - 'Функціональність сценічної ремарки: від технічної вказівки до створення атмосфери
    та візуальної мови драми'
- section: 'Есеїстика (Essay Writing: Personal Voice and Intertextuality)'
  words: 650
  points:
  - 'Пошук автентичного авторського голосу в есеї: аналіз моделей суб''єктивності
    на прикладах есеїстики О. Забужко та С. Жадана'
  - 'Інтертекстуальність (М23) як інтелектуальна гра: інтеграція цитат та алюзій для
    поглиблення змісту без втрати цілісності тексту'
- section: 'Підсумок (Conclusion: Final Reflection and Creative Philosophy)'
  words: 300
  points:
  - 'Формулювання творчої філософії: кураторський погляд на портфоліо як на цілісний
    мистецький проєкт'
  - Визначення стратегії подальшого розвитку авторської ідентичності у професійному
    літературному дискурсі
