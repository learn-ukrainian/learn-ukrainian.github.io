content_outline:
- section: 'Вступ: Переклад як міжкультурна медіація (Introduction: Translation as Intercultural Mediation)'
  words: 500
  points:
  - Визначення перекладу як процесу перекодування інформації з вихідної мови в цільову зі збереженням стилістичної цілісності
    відповідно до Держстандарту (§4.3.8).
  - Роль перекладача як культурного посередника; концепція «вторинного тексту» та вміння трансформувати стиль (§4.3.7).
- section: Історія та ідеологія українського перекладу (History and Ideology of Ukrainian Translation)
  words: 800
  points:
  - Традиція від Цицерона до сучасності; боротьба між «вільним» та «буквальним» підходами.
  - 'Культурний гачок: «Розстріляне відродження» (Зеров, Підмогильний) та їхня роль у європеїзації України через прямі переклади,
    оминаючи російське посередництво.'
  - Поняття перекладацької еквівалентності в історичній ретроспективі.
- section: Основні концепції та пастки перекладу (Core Concepts and Translation Traps)
  words: 1000
  points:
  - Еквівалентність (формальна vs. динамічна) та критерії адекватності перекладу.
  - 'Типові помилки: «Фальшиві друзі перекладача» — розбір міжмовної омонімії на прикладах: pathetic (жалюгідний, а не патетичний),
    sympathy (співчуття, а не симпатія).'
  - 'Проблема неперекладності: межі компенсації та втрат у тексті.'
- section: 'Стратегії: Одомашнення vs. Очуження (Strategies: Domestication vs. Foreignization)'
  words: 900
  points:
  - Аналіз стратегій одомашнення (domestication) та очуження (foreignization) за Л. Венуті.
  - 'Помилка учня: Синтаксичне калькування англійського пасиву (напр. «Книга була написана ним») vs. природна українська активна
    конструкція («Книгу написав він»).'
  - Баланс між «вірністю» оригіналу та «природністю» звучання в українському контексті.
- section: Проблеми художнього перекладу та реалії (Problems of Literary Translation and Realia)
  words: 900
  points:
  - Специфіка перекладу метафор, ідіом та каламбурів; збереження гри слів.
  - 'Переклад культурних реалій: вибір між транслітерацією, калькою та описовим перекладом.'
  - 'Порівняльний аналіз: «Гамлет» у перекладах Г. Кочура (класична традиція) та Ю. Андруховича (сучасна інтерпретація).'
- section: 'Українська школа: Постаті та спадщина (Ukrainian School: Figures and Heritage)'
  words: 700
  points:
  - 'Микола Лукаш («Моцарт перекладу»): використання архаїзмів та лексичного багатства для відтворення духу епохи («Декамерон»,
    «Дон Кіхот»).'
  - 'Григорій Кочур: патріарх українського перекладу, творчість у ГУЛАГу та виховання «школи Кочура».'
  - 'Сучасний стан галузі: переклад на українську vs. переклад з української для світового ринку.'
- section: 'Підсумок: Від теорії до практики (Summary: From Theory to Practice)'
  words: 200
  points:
  - Переклад як акт творчості та інтелектуальної деколонізації.
  - Підготовка до практичних модулів (С2-34, С2-35) та фінальної практики (С2-85+).
vocabulary_hints:
  required:
  - переклад (translation) — художній ~, дослівний ~, синхронний ~, машинний ~; висока частотність
  - еквівалентність (equivalence) — динамічна ~, формальна ~, повна ~; академічний реєстр
  - адекватність (adequacy) — критерії адекватності, ~ перекладу; вимога до якості
  - одомашнення (domestication) — стратегія ~; культурне засвоєння тексту
  - очуження (foreignization) — стратегія ~, ефект ~; збереження чужості оригіналу
  - реалія (realia) — переклад реалій, культурна ~; специфічні етнографічні терміни
  - фальшиві друзі перекладача (false friends) — міжмовна омонімія; пастка для лінгвіста
  - цільова мова (target language) — мова, на яку здійснюється переклад; термін перекладознавства
  recommended:
  - калька (calque) — синтаксична ~, семантична ~; часто в контексті помилок
  - компенсація (compensation) — перекладацька ~; відшкодування смислових втрат
  - інтерпретація (interpretation) — суб'єктивна ~; переклад як пояснення смислу
  - локалізація (localization) — адаптація продукту; технічний та маркетинговий контекст
  - транслітерація (transliteration) — передача літер; спосіб перекладу власних назв
