module: translation-theory
level: C2
sequence: 30
version: '1.2'
title: 'Основи теорії перекладу: стратегії та виклики'
subtitle: 'Translation Theory: Strategies and Challenges'
focus: professional
pedagogy: seminar
objectives:
- Опанувати фундаментальні концепції та термінологічний апарат сучасного перекладознавства
- Зрозуміти діалектику еквівалентності та адекватності в процесі міжмовної комунікації
- Дослідити специфіку відтворення авторського ідіостилю, культурних реалій та фразеології
- Вивчити історію та досягнення української перекладацької школи
content_outline:
- section: Перекладознавство в системі гуманітарного знання
  words: 1250
  subsections:
  - 'Предмет і завдання теорії перекладу: від лінгвістики до культурології'
  - 'Проблема перекладності: межі та можливості відтворення сенсів'
  - 'Види перекладу: усний, письмовий, художній, технічний'
  key_concepts:
  - перекладознавство
  - мовна посередність
  - інтерпретація
  - перекладність
  primary_sources:
  - Максим Рильський, 'Мистецтво перекладу'
  - Григорій Кочур, 'Література і переклад'
- section: Категорії еквівалентності та адекватності
  words: 1250
  subsections:
  - 'Рівні еквівалентності: семантичний, прагматичний, стилістичний'
  - 'Трансформації при перекладі: лексичні, граматичні, синтаксичні'
  - Поняття 'перекладацької похибки' та способи її мінімізації
  key_concepts:
  - еквівалентність
  - адекватність
  - транспозиція
  - компенсація
- section: Специфіка художнього перекладу
  words: 1250
  subsections:
  - Відтворення образу та ритмомелодики оригіналу
  - 'Переклад безеквівалентної лексики та реалій: домістифікація vs форенізація'
  - Авторський стиль перекладача та вірність першоджерелу
  key_concepts:
  - реалії
  - домістифікація
  - форенізація
  - ідіостиль
- section: Український переклад як культурний чинник
  words: 1250
  subsections:
  - 'Етапи розвитку українського перекладу: від бароко до неокласиків'
  - 'Феномен Миколи Лукаша та Григорія Кочура: переклад як націєтворення'
  - 'Сучасний стан перекладацького ринку в Україні: виклики та перспективи'
  key_concepts:
  - неокласики
  - культуротворення
  - перекладацька школа
  - націєцентризм
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - authorial-intent
  - essay-response
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Наукова праця
  topic: 'Аналіз есе Максима Рильського ''Мистецтво перекладу'': вимоги до особистості перекладача.'
  key_elements:
  - творча інтуїція
  - знання контексту
  - мовна культура
  motivation: Розуміння класичних підходів до професії перекладача.
- source_type: Теоретична стаття
  topic: Григорій Кочур про взаємозв'язок літератури та перекладу.
  key_elements:
  - діалог культур
  - стилістична точність
  - традиція
  motivation: Вивчення ролі перекладу у збагаченні національної літератури.
listening_situations:
- media_type: інтерв'ю
  setting: 'Інтерв''ю з провідним сучасним перекладачем: ''Як перекладати неповторне''.'
  focus_points:
  - Робота з діалектизмами та сленгом
  - Виклики перекладу поезії
  motivation: Ознайомлення з живою практикою перекладацької діяльності.
writing_tasks:
- task_type: власне висловлення
  prompt: Проаналізуйте два переклади одного і того ж вірша (наприклад, Гейне або Рільке в українських перекладах), порівнюючи
    стратегії перекладачів щодо відтворення образу та ритму.
  requirements:
  - мінімум 400 слів
  - 'використання термінів: адекватність, трансформація'
  - особиста аргументована оцінка успішності перекладу
  motivation: Розвиток навичок порівняльного стилістичного аналізу.
  model_answer: Аналіз має демонструвати глибоке розуміння нюансів міжмовних відповідностей та здатність оцінювати естетичну
    цінність перекладу.
discussion_topics:
- context: Чи може переклад бути кращим за оригінал? Чи є перекладач 'суперником' автора?
  questions:
  - Чи має перекладач право на адаптацію тексту під культуру читача?
  - Яка роль перекладу у збереженні мови?
  motivation: Дискусія про етичні та естетичні межі перекладацької свободи.
activity_hints:
- type: critical-analysis
  focus: Порівняйте два переклади одного вірша українською. Оцініть стратегії перекладачів щодо відтворення образу та ритму.
- type: essay-response
  focus: Напишіть есе про роль перекладу у розвитку української мови. Спирайтеся на діяльність Кочура та Лукаша.
- type: match-up
  focus: Зіставте перекладознавчі терміни (еквівалентність, адекватність, домістифікація, форенізація, транспозиція) з їхніми
    визначеннями.
- type: error-correction
  focus: 'Виявіть та виправте перекладацькі помилки: буквалізм, калькування, стилістичну невідповідність.'
references:
- 'Державний стандарт 2024: C2 — професійні компетенції, перекладознавство'
- Авраменко, 11 клас (Укр. літ.) — Літературний аналіз, порівняльне літературознавство
- 'University-level: перекладознавство виходить за межі шкільної програми'
