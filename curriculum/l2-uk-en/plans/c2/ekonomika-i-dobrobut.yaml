module: c2-072
level: C2
sequence: 72
version: '1.2'
title: 'Економіка і добробут: Глобальні тренди та національні виклики'
subtitle: 'Економіка та добробут'
focus: vocabulary
pedagogy: seminar
objectives:
  - Аналізувати складні економічні процеси та тренди добробуту засобами 
    української мови найвищого рівня
  - Опанувати фахову економічну термінологію, включаючи макро- та 
    мікроекономічний апарати
  - Розвинути навички створення аналітичних звітів, бізнес-планів та економічних
    оглядів
  - Дослідити етичні та соціальні аспекти економічного розвитку в українському 
    та глобальному контекстах
content_outline:
  - section: Макроекономічна стабільність та розвиток
    words: 1250
    subsections:
      - 'Інструменти державного регулювання економіки: фіскальна та монетарна політики'
      - Аналіз динаміки ВВП, інфляції та валютного курсу в українських реаліях
      - Мовна репрезентація економічних циклів та стратегій подолання криз
    key_concepts:
      - макроекономічна стабільність
      - монетарна політика
      - валовий внутрішній продукт
      - платіжний баланс
    primary_sources:
      - Михайло Туган-Барановський, 'Основи політичної економії' 
        (фундаментальний аналіз економічних законів)
  - section: Бізнес-середовище та інвестиційний клімат
    words: 1250
    subsections:
      - 'Правові та економічні засади ведення бізнесу в Україні: виклики та перспективи'
      - 'Інвестиційна привабливість та ризики: як словами переконати інвестора'
      - Розвиток малого та середнього підприємництва як чинника соціальної 
        стійкості
    key_concepts:
      - інвестиційний клімат
      - підприємництво
      - акціонерний капітал
      - менеджмент
  - section: Економіка добробуту та соціальний захист
    words: 1250
    subsections:
      - Моделі соціальної держави та їх адаптація до українського контексту
      - Аналіз нерівності, бідності та механізмів розподілу національного доходу
      - Якість життя та людський капітал як головні орієнтири сучасної економіки
    key_concepts:
      - людський капітал
      - якість життя
      - соціальний захист
      - розподіл доходів
    primary_sources:
      - Михайло Драгоманов, 'Листи на Наддніпрянську Україну' (рефлексії про 
        соціально-економічний лад)
  - section: Глобалізація та цифрова трансформація економіки
    words: 1250
    subsections:
      - Україна в системі міжнародного поділу праці та глобальних ланцюжків 
        доданої вартості
      - Вплив цифровізації (Digital Economy) на традиційні галузі економіки
      - 'Зелена енергетика та сталий розвиток: нова парадигма добробуту'
    key_concepts:
      - глобалізація
      - цифрова економіка
      - сталий розвиток
      - декарбонізація
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Державний стандарт 2024: C2 SS 3 — тематичні сфери'
  - 'Глазова, 11 клас (2019): §40-41 — Стилістичне забарвлення лексики'
  - 'Заболотний, 11 клас (2019): с. 177 — Наукова, офіційно-ділова лексика'
reading_situations:
  - source_type: Наукова праця
    topic: Аналіз теорії економічних циклів Михайла Туган-Барановського. 
      Дослідження внеску українського вченого у світову економічну думку.
    key_elements:
      - промислова криза
      - капіталізація
      - інвестиційний попит
    motivation: Вивчення класичної економічної термінології та глибокого 
      аналітичного стилю.
  - source_type: Публіцистичний лист
    topic: Дослідження поглядів Михайла Драгоманова на економічне самоврядування
      та громади.
    key_elements:
      - самоврядування
      - громада
      - соціальна справедливість
    motivation: Осмислення історичних коренів української соціально-економічної 
      думки.
listening_situations:
  - media_type: лекція
    setting: Виступ провідного експерта на економічному форумі про стратегію 
      відновлення України.
    focus_points:
      - Джерела фінансування та інвестиційні пріоритети
      - Мовні засоби обґрунтування необхідності реформ
    motivation: Аналіз сучасного ділового та економічного дискурсу.
writing_tasks:
  - task_type: есе
    prompt: Напишіть аналітичний огляд на тему 'Виклики та можливості цифрової 
      трансформації для української економіки'. Використайте сучасну 
      термінологію та статистичні дані.
    requirements:
      - мінімум 700 слів
      - чітка структура
      - критичний погляд на ризики
    motivation: Розвиток навичок написання складних економічних текстів.
    model_answer: Текст має бути змістовним, містити аналіз конкретних галузей, 
      оцінку впливу технологій на ринок праці та бути написаним професійною 
      мовою.
discussion_topics:
  - context: Чи може сталий розвиток бути пріоритетом для економіки, що 
      перебуває у стані війни та відновлення?
    questions:
      - Як поєднати швидке економічне зростання з екологічними вимогами ЄС?
      - 'Що є важливішим для добробуту: низька інфляція чи високі соціальні стандарти?'
    motivation: Дебати про стратегічні пріоритети економічного розвитку.
activity_hints:
  - type: reading
    focus: "Прочитайте текст про макроекономічна стабільність та розвиток і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про бізнес-середовище та інвестиційний клімат, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Макроекономічна стабільність та розвиток». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему макроекономічна стабільність та розвиток."
  - type: comparative-study
    focus: "Порівняйте різні підходи до макроекономічна стабільність та розвиток: Інструменти державного регулювання економіки: фіскальна та монетарна політики. Визначте спільне та відмінне."
