version: '2.0'
title: Економіка і добробут
subtitle: Economy and Welfare
focus: culture
pedagogy: TTT
phase: C2.4 [Thematic Discourse]
word_target: 5000
objectives:
- Аналізувати макроекономічні процеси в Україні та їхній вплив на добробут населення з використанням фахової
  економічної термінології
- Learner can critically evaluate fiscal and monetary policies using evidence-based argumentation in academic
  Ukrainian register
- Порівнювати моделі соціального захисту та обґрунтовувати реформаторські пропозиції щодо подолання бідності
  й соціальної нерівності
- Learner can compose an analytical essay on labor market dynamics, pension reform, or tax policy integrating
  statistical data and expert discourse
