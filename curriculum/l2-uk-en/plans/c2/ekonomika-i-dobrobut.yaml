content_outline:
- section: 'Вступ: Економічний дискурс на рівні С2 (Introduction: Economic Discourse at C2 Level)'
  words: 600
  points:
  - 'From everyday economic vocabulary (B2 shopping, budgets) to analytical discourse: the C2 learner engages
    with macroeconomic policy, fiscal analysis, and welfare economics through specialized academic register.'
  - 'Overview of thematic territory: connecting State Standard themes 3.10 (Економіка) and 3.13 (Праця —
    advanced aspects) to real-world Ukrainian economic discourse and policy debates.'
  - 'Register expectations: mastering the intersection of науковий, публіцистичний, and офіційно-діловий
    registers in economic writing and media analysis.'
- section: Макроекономіка та споживчий добробут (Macroeconomics and Consumer Welfare)
  words: 750
  points:
  - 'Key macroeconomic indicators: ВВП (GDP), інфляція, дефіцит бюджету, державний борг; reading and
    interpreting Держстат data in academic Ukrainian.'
  - 'Consumer basket (споживчий кошик) as a policy instrument: its calculation methodology, criticism of
    its adequacy, and comparison with EU standards; прожитковий мінімум as a legislative benchmark.'
  - 'Household economics: сімейний бюджет, доходи та видатки домогосподарств; analyzing statistical data on
    income distribution and purchasing power across Ukrainian regions.'
- section: Податкова система та фіскальна політика (Tax System and Fiscal Policy)
  words: 750
  points:
  - 'Structure of the Ukrainian tax system: ПДВ (VAT), податок на доходи фізичних осіб (PIT), єдиний
    податок (simplified tax); the balance between fiscal revenue and business development.'
  - 'Tax reform debates: тіньова економіка (shadow economy) and its impact on the tax base; policy
    proposals for detinization (детінізація) and their socioeconomic consequences.'
  - 'Fiscal decentralization: how tax revenues are distributed between центральний бюджет and місцеві
    бюджети; analyzing the impact of decentralization reform on regional economic development.'
- section: Бідність і соціальна нерівність (Poverty and Social Inequality)
  words: 750
  points:
  - 'Measuring poverty: абсолютна та відносна бідність, межа бідності, індекс Джині; using statistical
    indicators to analyze social stratification in Ukraine.'
  - 'Social protection mechanisms: соціальна допомога, субсидії, пільги; evaluating the effectiveness of
    targeted versus universal social support programs.'
  - 'Vulnerable groups: малозабезпечені сім''ї, люди з інвалідністю, пенсіонери; analyzing policy discourse
    around inclusivity and the adequacy of state support.'
- section: Ринок праці та зайнятість (Labor Market and Employment)
  words: 750
  points:
  - 'Labor market structure: рівень безробіття, зайнятість, економічно активне населення; analyzing
    Держстат employment data and comparing pre-war and wartime labor dynamics.'
  - 'Modern employment forms: самозайнятість, фріланс, аутсорсинг, гіг-економіка; the legal and economic
    implications of non-standard employment in Ukraine.'
  - 'Qualifications and competitiveness: кваліфікація, перекваліфікація, професійна сертифікація; analyzing
    the gap between education outcomes and labor market demands.'
- section: Пенсійна реформа та соціальне страхування (Pension Reform and Social Insurance)
  words: 700
  points:
  - 'The three-pillar pension system: солідарна система (pay-as-you-go), обов''язкове накопичувальне
    страхування (mandatory funded), добровільне накопичення (voluntary savings); comparing reform models.'
  - 'Pension reform debates: підвищення пенсійного віку, мінімальна пенсія, страховий стаж; analyzing
    political discourse around reform resistance and demographic pressure.'
  - 'Social insurance beyond pensions: медичне страхування, страхування від безробіття, страхування від
    нещасних випадків; building a comprehensive picture of Ukraine''s social safety net.'
- section: 'Практикум: Аналіз економічного дискурсу (Workshop: Economic Discourse Analysis)'
  words: 700
  points:
  - 'Applied analysis: reading and deconstructing an НБУ інфляційний звіт or Держстат statistical release
    using analytical frameworks from academic economics.'
  - 'Argumentative writing: composing an analytical essay on a chosen economic topic (e.g., tax reform,
    pension sustainability, inequality reduction) with evidence from statistical data.'
  - 'Debate exercise: constructing arguments for and against a specific economic policy (e.g., universal
    basic income, progressive taxation) using specialized economic terminology.'
vocabulary_hints:
  required:
  - споживчий кошик (consumer basket) — вартість споживчого кошика, перегляд споживчого кошика; key welfare
    measurement instrument in Ukrainian economic policy
  - податковий (tax-related) — податкова система, податкове навантаження, податкова реформа; core fiscal
    policy terminology
  - малозабезпечений (low-income) — малозабезпечені сім'ї, допомога малозабезпеченим; social welfare register
    for targeted assistance discourse
  - безробіття (unemployment) — рівень безробіття, приховане безробіття; labor market analytics term
  - кваліфікація (qualification) — підвищення кваліфікації, кваліфікаційні вимоги; professional development
    and labor market discourse
  - контрактний (contract-based) — контрактна форма, контрактні зобов'язання; employment law register
  - пенсійний (pension-related) — пенсійна реформа, пенсійний фонд, пенсійний вік; social insurance policy term
  - видаток (expenditure) — бюджетні видатки, видатки домогосподарств; fiscal and household economics register
  - інфляційний (inflationary) — інфляційний тиск, інфляційне таргетування; monetary policy analytical term
  - соціальна допомога (social assistance) — адресна соціальна допомога, система соціальної допомоги; welfare
    policy terminology
  recommended:
  - ринок праці (labor market) — стан ринку праці, регулювання ринку праці; economics and employment discourse
  - бюджетний (budget-related) — бюджетний процес, бюджетний дефіцит; fiscal policy register
  - дефіцит (deficit) — дефіцит бюджету, торговельний дефіцит; macroeconomic analysis term
  - аутсорсинг (outsourcing) — аутсорсинг послуг, ІТ-аутсорсинг; modern labor market borrowing with stable usage
  - самозайнятість (self-employment) — рівень самозайнятості, реєстрація самозайнятості; non-standard employment term
