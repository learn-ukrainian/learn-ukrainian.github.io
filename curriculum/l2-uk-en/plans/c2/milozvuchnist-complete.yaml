  type: reference
  notes: Euphonic variants and stylistic choices
content_outline:
- section: Вступ — Філософія та естетика української евфонії (Introduction — Philosophy and Aesthetics of Ukrainian Euphony)
  words: 750
  points:
  - Концепція 'солов'їної мови' як центральний елемент мовної ідентичності та аналіз популярного міфу про світову першість
    за милозвучністю.
  - Аналіз поезії Максима Рильського 'Мова' («Як парость виноградної лози...») — заклик до плекання 'музики' мови та метафоричного
    виполювання 'бур'янів'.
  - Визначення евфонії як системної ознаки культури мовлення високого рівня (C2) та її роль у створенні стилістичного ефекту.
- section: Динаміка чергування у/в та і/й як стилістичний інструмент (Dynamics of u/v and i/y Alternation as a Stylistic Tool)
  words: 1000
  points:
  - Закон відкритого складу як фундаментальний рушій українських чергувань; реалізація вимог Держстандарту §4.3.2 (C2) щодо
    'стилістичних засобів фонетики'.
  - 'Аналіз типової помилки ''зіяння'' (hiatus): виправлення конструкцій на кшталт ''Вона уміє'' на ''Вона вміє'' з урахуванням
    законів мелодики.'
  - Стратегія вибору між 'і' та 'й' у поєднанні з іншими чергуваннями для досягнення безперервного звукового потоку (speech
    flow).
- section: Варіативність прийменника з/зі/із та початкових звуків (Variability of the Preposition z/zi/iz and Initial Sounds)
  words: 1000
  points:
  - Три варіанти прийменника 'з' та критерії їхнього вибору для запобігання какофонії; уникнення 'збігу приголосних' (consonant
    clusters).
  - 'Кейс-стаді какофонії: виправлення помилки ''З школою'' на ''Зі школою'' через збіг шиплячих; стилістичне використання
    варіанта ''із'' у високому регістрі.'
  - Варіювання у-/в- на початку слова та чергування постфіксів -ся/-сь у дієсловах як засіб тонкого ритмічного налаштування
    фрази.
- section: 'Авторська стратегія: Свідоме порушення милозвучності (Author''s Strategy: Conscious Violation of Euphony)'
  words: 1100
  points:
  - Використання какофонії (дисонансу) як свідомого художнього прийому для передачі напруги, хаосу або агресії в літературних
    текстах.
  - 'Ритм і мелодика прози: аналіз впливу фонетичного вибору на темпоритм читання та сприйняття тексту аудиторією.'
  - 'Дискусія про ''природну благозвучність'' vs ''надмірну правильність'': межі між граматичною нормою та авторською свободою
    вибору.'
- section: Практикум — Високий рівень редагування та стилізації (Workshop — High-Level Editing and Stylization)
  words: 1150
  points:
  - Виявлення та усунення важких збігів приголосних та 'зіяння' в офіційно-ділових та академічних текстах без втрати змістової
    точності.
  - 'Редагування художнього перекладу: порівняльний аналіз варіантів з точки зору фонетичної гармонії та мелодики української
    мови.'
  - Створення власного 'евфонічного' есе на тему мовної культури, інтегруючи всі вивчені засоби чергування як елементи стилю.
vocabulary_hints:
  required:
  - 'милозвучність (euphony) — домінантні колокації: ''досягнення милозвучності'', ''закони милозвучності'', ''порушення милозвучності'';
    ядро C2-фонології.'
  - чергування (alternation) — 'позиційне чергування', 'фонетичне чергування'; технічний термін для системи у/в, і/й.
  - евфонія (euphony) — 'засоби евфонії', 'евфонічна система'; академічний еквівалент милозвучності.
  - благозвучність (sonority) — 'природна благозвучність', 'мовна благозвучність'; літературно-естетичний регістр.
  - зіяння (hiatus) — 'уникнення зіяння' (vowel+vowel clash); ключовий термін для опису помилок у чергуванні.
  - збіг (cluster/confluence) — 'збіг приголосних', 'уникнення збігу'; основна причина виникнення какофонії.
  - приголосний (consonant) — фонологічна основа для правил чергування 'з/зі/із'.
  - голосний (vowel) — ключовий фактор у правилах у/в та запобіганні зіянню.
  - сполучник (conjunction) — контекст вживання і/й та та.
  - прийменник (preposition) — контекст вживання у/в та з/зі/із.
  recommended:
  - какофонія (cacophony) — антонім евфонії; використання як стилістичного прийому 'навмисного дисонансу'.
  - мелодика (melody) — 'мелодика фрази', 'мелодика прози'; зв'язок між звуком і ритмом.
  - ритміка (rhythmics) — 'ритміка тексту'; як чергування впливають на довжину складів.
  - гармонія (harmony) — фонетична узгодженість елементів речення.
  - солов'їна мова (nightingale language) — стійка метафора української мови, що підкреслює її евфонічність.
  - редагування (editing) — процес оптимізації тексту за законами милозвучності.
