module: c2-002
level: C2
sequence: 2
version: 1.3.2
title: 'Милозвучність української мови: повний курс'
subtitle: Повна українська милозвучність
focus: grammar
pedagogy: workshop
objectives:
- Досконало опанувати закони чергування у-в, і-й як засіб милозвучності
- Вивчити особливості функціонування прийменників з-із-зі-зо в поетичному та 
  прозовому текстах
- Аналізувати фонологічний ритм та евфонію художнього висловлювання
- Розвинути навички автоматичного застосування правил милозвучності у 
  спонтанному мовленні
content_outline:
- section: Фундаментальні закони української фонології
  words: 1250
  subsections:
  - Співвідношення голосних та приголосних звуків у потоці мовлення
  - Принципи запобігання збігу однакових фонем
  - Чергування як маркер високого стилю
  key_concepts:
  - фонема
  - алітерація
  - асонанс
  - евфонія
- section: Система чергувань та її функціональні можливості
  words: 1250
  subsections:
  - 'Контекстуальні правила вживання у-в та і-й: складні випадки'
  - 'Варіативність прийменників з-із-зі-зо: семантика та фонетична зумовленість'
  - Специфічні чергування часток та сполучників
  key_concepts:
  - префіксальна варіативність
  - евфонічний варіант
  - дисиміляція
- section: 'Естетика мовлення: ритмічна організація'
  words: 1250
  subsections:
  - 'Ритм прозового тексту: роль голосних та пауз'
  - Аналіз мелодики на прикладах української класики
  - Інтонаційне багатство як наслідок милозвучності
  key_concepts:
  - мелодика мовлення
  - інтонаційне багатство
  - метрика
- section: Практична стилістика та звукопис
  words: 1250
  subsections:
  - Звуковий символізм у художньому тексті
  - Редагування текстів з метою покращення їхньої евфонії
  key_concepts:
  - звукопис
  - гармонія
  - фоносемантика
- section: Підсумок — Summary
  words: 300
  points:
  - "Ukrainian euphony (милозвучність) relies on the alternation of у/в and і/й to
    prevent unnatural sound clusters. After a vowel, use 'в' or 'й'; after a consonant,
    use 'у' or 'і'. Self-check: Why is it correct to say 'він пішов у кіно' but 'вона
    пішла в кіно'?"
  - "Prepositions have euphonic variants (з, із, зі, зо) that adapt to the surrounding
    phonemes to maintain rhythm and melody. Self-check: What is the difference in
    usage between 'з' and 'зі' (e.g., 'з братом' vs. 'зі мною')? Identify 3 examples
    of deliberate sound symbolism (звукопис) in a Ukrainian poem."
word_target: 5000
activities:
  types_required:
  - highlight-morphemes
  - error-correction
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Поезія
  topic: 'Аналіз звукової організації вірша. Джерело: Леся Українка, ''Contra spem
    spero!''.'
  motivation: Демонстрація того, як правила милозвучності формують емоційне 
    забарвлення тексту.
listening_situations:
- media_type: аудіо
  setting: Декламація поезії Тараса Шевченка професійним актором.
  focus_points:
  - Чергування у-в, і-й у вимові
  - Паузи та ритмічні групи
  motivation: Розвиток фонетичного слуху та здатності відчувати гармонію звуків.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть коротке есе на тему: ''Милозвучність — це лише форма чи глибинна
    характеристика мови?'' з обов''язковим дотриманням усіх правил чергування у-в,
    і-й.'
  motivation: Практичне застосування правил евфонії у вільному творчому письмі.
  model_answer: 'Текст має бути зразковим з погляду милозвучності: жодного збігу трьох
    приголосних на межі слів без потреби, правильне вживання варіантів ''у/в'', ''і/й'',
    ''з/із''. Змістовно текст повинен пов''язувати фонетичну форму з національною
    ідентичністю та художньою виразністю.'
discussion_topics:
- context: Чи варто суворо дотримуватися правил милозвучності у швидкому темпі 
    розмовного мовлення або в технічних текстах?
  questions:
  - Чи впливає порушення евфонії на сприйняття сенсу?
  - Як цифровізація та швидке листування впливають на дотримання цих норм?
  motivation: Дискусія про доречність та гнучкість мовних норм у різних 
    регістрах.
activity_hints:
- type: reading
  focus: Прочитайте текст про фундаментальні закони української фонології і 
    дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про система чергувань та її 
    функціональні можливості, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Фундаментальні 
    закони української фонології». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    фундаментальні закони української фонології.
- type: comparative-study
  focus: 'Порівняйте різні підходи до фундаментальні закони української фонології:
    Співвідношення голосних та приголосних звуків у потоці мовлення. Визначте спільне
    та відмінне.'
references:
- Караман С. О. Українська мова, 10 клас (2018), §19 — Милозвучність української
  мови
- Глазова О. П. Українська мова, 11 клас (2019), §40 — стилістичні засоби 
  фонетики
- Правопис 2019, §4-6 — чергування у-в, і-й, з-із-зі
phase: C2.1 [Stylistic Perfection]
