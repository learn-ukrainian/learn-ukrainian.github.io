module: milozvuchnist-complete
level: C2
sequence: 2
version: '1.3'
title: 'Милозвучність української мови: повний курс'
subtitle: Complete Ukrainian Euphony
focus: grammar
pedagogy: workshop
objectives:
- Досконало опанувати закони чергування у-в, і-й як засіб милозвучності
- Вивчити особливості функціонування прийменників з-із-зі-зо в поетичному та прозовому текстах
- Аналізувати фонологічний ритм та евфонію художнього висловлювання
- Розвинути навички автоматичного застосування правил милозвучності у спонтанному мовленні
content_outline:
- section: Фундаментальні закони української фонології
  words: 1250
  subsections:
  - Співвідношення голосних та приголосних звуків у потоці мовлення
  - Принципи запобігання збігу однакових фонем
  - Чергування як маркер високого стилю
  key_concepts:
  - фонема
  - алітерація
  - асонанс
  - евфонія
- section: Система чергувань та її функціональні можливості
  words: 1250
  subsections:
  - 'Контекстуальні правила вживання у-в та і-й: складні випадки'
  - 'Варіативність прийменників з-із-зі-зо: семантика та фонетична зумовленість'
  - Специфічні чергування часток та сполучників
  key_concepts:
  - префіксальна варіативність
  - евфонічний варіант
  - дисиміляція
- section: 'Естетика мовлення: ритмічна організація'
  words: 1250
  subsections:
  - 'Ритм прозового тексту: роль голосних та пауз'
  - Аналіз мелодики на прикладах української класики
  - Інтонаційне багатство як наслідок милозвучності
  key_concepts:
  - мелодика мовлення
  - інтонаційне багатство
  - метрика
- section: Практична стилістика та звукопис
  words: 1250
  subsections:
  - Звуковий символізм у художньому тексті
  - Редагування текстів з метою покращення їхньої евфонії
  key_concepts:
  - звукопис
  - гармонія
  - фоносемантика
word_target: 5000
activities:
  types_required:
  - highlight-morphemes
  - error-correction
  - authorial-intent
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
- source_type: Поезія
  topic: 'Аналіз звукової організації вірша. Джерело: Леся Українка, ''Contra spem spero!''.'
  motivation: Демонстрація того, як правила милозвучності формують емоційне забарвлення тексту.
listening_situations:
- media_type: аудіо
  setting: Декламація поезії Тараса Шевченка професійним актором.
  focus_points:
  - Чергування у-в, і-й у вимові
  - Паузи та ритмічні групи
  motivation: Розвиток фонетичного слуху та здатності відчувати гармонію звуків.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть коротке есе на тему: ''Милозвучність — це лише форма чи глибинна характеристика мови?'' з обов''язковим
    дотриманням усіх правил чергування у-в, і-й.'
  motivation: Практичне застосування правил евфонії у вільному творчому письмі.
  model_answer: 'Текст має бути зразковим з погляду милозвучності: жодного збігу трьох приголосних на межі слів без потреби,
    правильне вживання варіантів ''у/в'', ''і/й'', ''з/із''. Змістовно текст повинен пов''язувати фонетичну форму з національною
    ідентичністю та художньою виразністю.'
discussion_topics:
- context: Чи варто суворо дотримуватися правил милозвучності у швидкому темпі розмовного мовлення або в технічних текстах?
  questions:
  - Чи впливає порушення евфонії на сприйняття сенсу?
  - Як цифровізація та швидке листування впливають на дотримання цих норм?
  motivation: Дискусія про доречність та гнучкість мовних норм у різних регістрах.
activity_hints:
- type: error-correction
  hint: Виправте порушення евфонії (збіг приголосних, неправильне у/в, і/й) у поданих реченнях
- type: fill-in
  hint: Вставте правильний евфонічний варіант (у/в, і/й, з/із/зі) у контексті художнього та наукового стилів
- type: critical-analysis
  hint: Проаналізуйте звукопис та ритмічну організацію поданого поетичного фрагмента
- type: highlight-morphemes
  hint: Позначте всі випадки чергування у/в, і/й та поясніть мотивацію кожного вибору
references:
- Караман С. О. Українська мова, 10 клас (2018), §19 — Милозвучність української мови
- Глазова О. П. Українська мова, 11 клас (2019), §40 — стилістичні засоби фонетики
- Правопис 2019, §4-6 — чергування у-в, і-й, з-із-зі
