objectives:
- Аналізувати та класифікувати явища Динаміка чергування у/в та і/й як стилістичний інструмент у автентичних текстах
- Продукувати тексти з коректним застосуванням Варіативність прийменника з/зі/із та початкових звуків
- Оцінювати стилістичну доречність мовних засобів у контексті Милозвучність — Повна система евфонії
- Застосовувати знання з теми «Варіативність прийменника з/зі/із та початкових звуків» у власній мовній практиці
