vocabulary_hints:
  required:
  - захист (defense) — публічний захист, процедура захисту; основний академічний термін
    С2
  - комісія (committee/panel) — екзаменаційна комісія, голова комісії; формальний
    орган оцінювання
  - опонент (opponent) — офіційний опонент, відгук опонента; ключова фігура в науковій
    дискусії
  - регламент (time limit/regulations) — дотримуватися регламенту, порушити регламент;
    критично для успішного виступу
  - теза (thesis/point) — висунути тезу, аргументувати тезу; основа наукової аргументації
  - критика (criticism) — конструктивна критика, сприймати критику; частина академічного
    діалогу
  - аргументація (argumentation) — переконлива аргументація; логічне обґрунтування
    висновків
  - обмеження дослідження (research limitations) — визнання меж наукового пошуку
  recommended:
  - передзахист (pre-defense) — генеральна репетиція на кафедрі; важливий культурний
    етап
  - академічна ввічливість (academic politeness) — етикетна стратегія реагування на
    запитання
  - тезова заява (thesis statement) — центральне твердження презентації
  - візуальний супровід (visual aids) — графіки, таблиці та діаграми на слайдах
  - контраргумент (counterargument) — відповідь на зауваження опонента
  - лаконічність (conciseness) — уміння виділити головне в межах регламенту
