content_outline:
- section: 'Вступ: Захист як кульмінація наукового проєкту (Introduction: Defense as the Culmination of the Scientific Project)'
  words: 650
  points:
  - 'Мета і формат публічного захисту: розгляд процедури як вторинного тексту на основі письмового дослідження (згідно зі
    стандартом §4.3.8)'
  - 'Психологічна підготовка та дотримання академічного етикету: використання суворо регламентованої формули звертання до
    комісії («Шановний голово, шановні члени екзаменаційної комісії...»)'
- section: Структура наукової промови та презентації (Structure of the Academic Speech and Presentation)
  words: 1000
  points:
  - 'Логічна побудова виступу: обов''язкова послідовність — Актуальність -> Об''єкт/Предмет -> Мета -> Завдання -> Методологія
    -> Результати -> Висновки'
  - 'Дизайн візуальних матеріалів: робота над помилкою «читання зі слайдів» — слайди мають ілюструвати тези, а не дублювати
    промову'
  - 'Перехідні фрази: мовні кліше для логічного зв''язку між структурними частинами та слайдами («Зверніть увагу на...», «Переходячи
    до результатів...»)'
  - Практичне завдання: самостійний аналіз та продукування тексту з теми «Структура наукової промови та презентації».
- section: Академічна риторика та техніка виступу (Academic Rhetoric and Performance Technique)
  words: 1000
  points:
  - 'Використання елементів риторики в композиції виступу (згідно зі стандартом §4.3.5): паузи, наголоси та управління темпом'
  - 'Техніка усного мовлення для значних за обсягом виступів (стандарт §1.1.2.1.2): підтримка візуального контакту та невербальна
    комунікація як ознака впевненого володіння матеріалом'
  - 'Культура публічної промови: перехід від заготовленого тексту до живого наукового дискурсу без втрати академічного реєстру'
  - Завдання на синтез: інтеграція навичок попередніх розділів у контексті «Академічна риторика та техніка виступу».
- section: Наукова дискусія та академічна ввічливість (Scientific Discussion and Academic Politeness)
  words: 1000
  points:
  - 'Робота з типами запитань від комісії, рецензента та опонентів: стратегія вдячності («Дякую за цікаве запитання...») перед
    наданням відповіді'
  - 'Виправлення помилки «агресивного захисту»: перехід до моделі «академічної ввічливості» при сприйнятті критичних зауважень'
  - 'Захист авторської позиції через аргументацію: використання модальних часток та ввічливих форм незгоди («З вашого дозволу,
    я хотів би уточнити...»)'
- section: 'Академічні традиції: Передзахист та процедура (Academic Traditions: Pre-defense and Procedure)'
  words: 650
  points:
  - 'Культурний аспект «Передзахисту»: генеральна репетиція на кафедрі, отримання рекомендації до захисту та робота з попередньою
    критикою'
  - 'Ролі учасників процесу: взаємодія з науковим керівником, офіційним опонентом та рецензентом; аналіз відгуків'
- section: 'Практикум: Пробний захист та регламент (Practicum: Mock Defense and Time Management)'
  words: 700
  points:
  - 'Керування часом виступу: виправлення помилки порушення регламенту — тренування лаконічного викладу результатів протягом
    7-10 хвилин'
  - 'Симуляція захисту перед аудиторією: виступ, відповіді на критику та отримання зворотного зв''язку за критеріями оцінювання'
vocabulary_hints:
  required:
  - захист (defense) — публічний захист, процедура захисту; основний академічний термін С2
  - комісія (committee/panel) — екзаменаційна комісія, голова комісії; формальний орган оцінювання
  - опонент (opponent) — офіційний опонент, відгук опонента; ключова фігура в науковій дискусії
  - регламент (time limit/regulations) — дотримуватися регламенту, порушити регламент; критично для успішного виступу
  - теза (thesis/point) — висунути тезу, аргументувати тезу; основа наукової аргументації
  - критика (criticism) — конструктивна критика, сприймати критику; частина академічного діалогу
  - аргументація (argumentation) — переконлива аргументація; логічне обґрунтування висновків
  - обмеження дослідження (research limitations) — визнання меж наукового пошуку
  recommended:
  - передзахист (pre-defense) — генеральна репетиція на кафедрі; важливий культурний етап
  - академічна ввічливість (academic politeness) — етикетна стратегія реагування на запитання
  - тезова заява (thesis statement) — центральне твердження презентації
  - візуальний супровід (visual aids) — графіки, таблиці та діаграми на слайдах
  - контраргумент (counterargument) — відповідь на зауваження опонента
  - лаконічність (conciseness) — уміння виділити головне в межах регламенту
