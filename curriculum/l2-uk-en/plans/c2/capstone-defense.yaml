module: capstone-defense
level: C2
sequence: 100
version: "1.0"
title: "Захист дипломного проєкту: Вершина майстерності"
subtitle: "Capstone Defense"
focus: professional
pedagogy: workshop
objectives:
  - "Продемонструвати високий рівень володіння українською мовою у формі публічного захисту"
  - "Ефективно представити результати дослідження, використовуючи риторичні та візуальні засоби"
  - "Відповісти на складні та непередбачувані запитання екзаменаційної комісії"
  - "Провести саморефлексію щодо навчального поступу на рівні C2"
content_outline:
  - section: "Психологічна підготовка та риторика захисту"
    words: 1000
    subsections:
      - "Подолання страху перед публічним виступом: дихальні вправи та ментальні установки"
      - "Структура виступу: привітання, основна частина, подяка"
      - "Мовний етикет під час офіційної процедури захисту"
    key_concepts:
      - "публічний виступ"
      - "риторика"
      - "мовленнєвий етикет"
      - "аргументованість"
    primary_sources:
      - "Регламент проведення захисту дипломних робіт у вищих навчальних закладах України"
  - section: "Мистецтво ведення наукової дискусії"
    words: 1000
    subsections:
      - "Типологія запитань комісії: від уточнюючих до критичних"
      - "Стратегії коректної відповіді на критику та незгоду"
      - "Використання вставних конструкцій для виграшу часу на роздуми"
    key_concepts:
      - "дискусія"
      - "контраргументація"
      - "гнучкість мислення"
      - "академічна етика"
    primary_sources:
      - "Професійні стандарти наукового спілкування"
  - section: "Процедура захисту: від доповіді до рішення"
    words: 1000
    subsections:
      - "Етапи захисту: доповідь, запитання, відгук наукового керівника, рецензія"
      - "Прикінцеве слово автора: підсумовування та висловлення вдячності"
      - "Ознайомлення з протоколом та оголошення оцінки"
    key_concepts:
      - "регламент"
      - "процедура"
      - "протокол"
      - "фінальна оцінка"
    primary_sources:
      - "Зразки протоколів засідань екзаменаційних комісій"
  - section: "Саморефлексія та стратегія подальшого розвитку"
    words: 1000
    subsections:
      - "Аналіз власного виступу: що вдалося, а над чим ще варто працювати"
      - "Узагальнення набутого досвіду під час навчання на рівні C2"
      - "Планування професійного та особистісного розвитку поза межами курсу"
    key_concepts:
      - "рефлексія"
      - "компетентність"
      - "професійний шлях"
      - "lifelong learning"
    primary_sources:
      - "Європейський мовний портфоліо: рівень С2 (самооцінювання)"
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: "регламент захисту"
    topic: "Аналіз офіційної процедури захисту: права та обов'язки студента."
    key_elements: ["апеляція", "регламент", "оцінювання"]
    motivation: "Розуміння формальної сторони процесу."
  - source_type: "фрагмент стенограми"
    topic: "Стенограма дискусії на захисті дисертації: аналіз стратегій відповіді на запитання."
    key_elements: ["ввічливість", "точність", "аргументація"]
    motivation: "Вивчення зразків високої академічної культури."
listening_situations:
  - media_type: "відео"
    setting: "Перегляд успішного захисту дипломного проєкту в університеті."
    focus_points:
      - "Таймінг та структура доповіді"
      - "Реакція доповідача на запитання"
    motivation: "Моделювання власної поведінки під час захисту."
writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть коротку рефлексію на тему 'Мій шлях до C2: найскладніші виклики та найбільші перемоги'."
    requirements: ["щирість", "аналіз власного поступу", "400-500 слів"]
    motivation: "Підбиття підсумків навчального процесу."
    model_answer: "Текст має бути емоційним, але змістовним, відображати реальні етапи опанування мови."
discussion_topics:
  - context: "Що є головною метою захисту — перевірка знань чи демонстрація впевненості?"
    questions:
      - "Як балансувати між науковою скромністю та впевненою презентацією?"
      - "Чи може один невдалий захист нівелювати результати багатомісячної роботи?"
    motivation: "Зняття психологічного напруження та налаштування на успіх."
