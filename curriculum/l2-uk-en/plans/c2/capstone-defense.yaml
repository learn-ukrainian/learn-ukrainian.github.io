title: Дипломний проєкт — Захист
subtitle: 'Introduction: Defense as the Culmination of the Scientific Project'
focus: practice
pedagogy: TTT
phase: C2.5 [Meta-Skills & Capstone]
word_target: 5000
objectives:
- Аналізувати та класифікувати явища Структура наукової промови та презентації у автентичних текстах
- Продукувати тексти з коректним застосуванням Академічна риторика та техніка виступу
- Оцінювати стилістичну доречність мовних засобів у контексті Дипломний проєкт — Захист
- Застосовувати знання з теми «Наукова дискусія та академічна ввічливість» у власній мовній практиці
