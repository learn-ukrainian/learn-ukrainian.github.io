content_outline:
- section: Вступ — Трансформація як ознака мовної майстерності (Introduction — Transformation
    as a Sign of Linguistic Mastery)
  words: 650
  points:
  - 'Аналіз вимог Державного стандарту 2024 (§4.3.7) щодо вміння адаптувати тексти
    під різні комунікативні завдання: від наукового до популярного.'
  - 'Трансформація як інструмент збереження змісту при зміні форми: чому вміння перефразувати
    без втрати сенсу є ознакою рівня C2.'
  - 'Критерії успішної трансформації: точність передачі фактів, доречність регістру
    та глибоке розуміння очікувань цільової аудиторії.'
- section: Подолання канцеляриту та 'стилістичних слідів' (Overcoming Bureaucratese
    and 'Stylistic Traces')
  words: 1000
  points:
  - 'Культурний контекст: українська традиція боротьби з канцеляритом від класиків
    до сучасних медіа; концепція ''перекладу з бюрократичної на людську''.'
  - 'Learner error: збереження пасивних конструкцій та кліше (напр. ''даний захід'',
    ''здійснювати контроль'') при переході до блогу — вправи на де-бюрократизацію.'
  - 'Аналіз ''стилістичних слідів'' (Calquing of register): як розпізнати та усунути
    недоречні елементи попереднього стилю в новій версії тексту.'
- section: 'Практикум: Від наукового оригіналу до соцмереж (Workshop: From Academic
    Original to Social Media)'
  words: 1150
  points:
  - 'Методологія адаптації академічної статті до науково-популярного викладу: вилучення
    надмірної термінології при збереженні концептуальної глибини.'
  - 'Техніки радикального стиснення інформації для форматів Facebook/Twitter: виділення
    ''головного меседжу'' при обмеженні знаків.'
  - 'Дискусія про межу між ''спрощенням'' (clarification) та ''примітивізацією'' (dumbing
    down): як зробити текст доступним, не втрачаючи наукової точності.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: Офіційний виступ та іронічна трансформація (Official Speech and Ironic
    Transformation)
  words: 1150
  points:
  - 'Трансформація формальної промови у неформальне пояснення: зміна синтаксичних
    структур, вибір емоційної лексики та розмовних маркерів.'
  - 'Постмодерна гра стилями в українській літературі (Ю. Андрухович, С. Жадан): використання
    трансформації як художнього прийому для іронічного ефекту.'
  - 'Learner error: ''Tone mismatch'' — використання надмірно емоційної лексики при
    адаптації наукового тексту або сухість у соцмережах.'
  - 'Додаткові творчі та аналітичні завдання з комплексною інтеграцією навичок попередніх модулів'
- section: Контроль якості та зворотна трансформація (Quality Control and Reverse
    Transformation)
  words: 1050
  points:
  - 'Методика зворотної трансформації: спроба відновити вихідний документ на основі
    спрощеної версії для перевірки збереження критичних елементів змісту.'
  - 'Етичні аспекти трансформації: межа між успішною адаптацією та маніпулятивним
    викривленням інформації при зміні каналу зв''язку.'
  - 'Підсумковий аналіз ланцюжка перетворень: порівняння трьох версій одного змісту
    (юридичний → журналістський → блог) та оцінка втрат і здобутків.'
