module: c2-024
level: C2
sequence: 24
version: '1.1'
title: 'Практикум з мовної майстерності II: креативність та синтез'
subtitle: 'Практикум мовної майстерності II: синтез'
focus: integration
pedagogy: workshop
objectives:
  - Розвинути здатність до створення складних, багатошарових текстів з 
    використанням інтертекстуальності
  - Вдосконалити навички побудови витонченої аргументації в академічному та 
    публіцистичному дискурсах
  - Опанувати техніку мовної гри як засобу створення інтелектуального комізму та
    іронії
  - Навчитися синтезувати різні стилістичні регістри для досягнення конкретної 
    комунікативної мети
content_outline:
  - section: 'Аргументація вищого рівня: логіка та естетика'
    words: 1000
    subsections:
      - 'Побудова інтелектуального доказу в есеїстиці: від тези до синтезу'
      - Використання парадоксів та апорій як засобів актуалізації думки
      - 'Специфіка академічної полеміки: етика цитування та спростування'
    key_concepts:
      - діалектика
      - силогізм
      - парадокс
      - академічна доброчесність
    primary_sources:
      - Микола Зеров, 'До джерел' (літературно-критичні есеї)
      - Юрій Шевельов, 'Зустрічі з Заходом' (інтелектуальна проза)
  - section: Креативне письмо та образна система
    words: 1000
    subsections:
      - 'Розгортання метафоричного ряду: від образу до концепту'
      - 'Символіка та підтекст: як сказати більше, використовуючи менше'
      - 'Експериментальна стилістика: поєднання несумісних мовних пластів'
    key_concepts:
      - концептуальна метафора
      - алегорія
      - сугестія
      - дифузія стилів
  - section: Віртуозність мовної гри
    words: 1000
    subsections:
      - 'Каламбури, алюзії та ремінісценції: механізми творення інтертексту'
      - Стилістичний пастіш та пародія як форми критичної рефлексії
      - Гра з мовними нормами та їх свідоме порушення (оказіоналізми)
    key_concepts:
      - інтертекстуальність
      - пастіш
      - каламбур
      - ремінісценція
  - section: 'Синтетичний проект: від задуму до втілення'
    words: 1000
    subsections:
      - 'Проектування структури великого тексту: архітектоніка та композиція'
      - Забезпечення когезії та когерентності в багатосторінковому викладі
      - 'Фінальна шліфовка: ритм, звук, паузи в письмі'
    key_concepts:
      - когезія
      - когерентність
      - архітектоніка
      - фіналізація
word_target: 4000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - essay-response
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Авраменко, 11 клас (2019): Засоби художньої виразності'
  - 'Глазова, 11 клас (2019): Стилістичні фігури та тропи'
  - 'Державний стандарт 2024: C2 — креативна мовна компетенція'
reading_situations:
  - source_type: Літературно-критична стаття
    topic: 'Аналіз інтелектуального стилю Миколи Зерова: класична стрункість та ерудиція.'
    key_elements:
      - алюзії
      - термінологічна точність
      - елегантний синтаксис
    motivation: Вивчення зразка високої академічної культури українського 
      мовлення.
  - source_type: Есе
    topic: 'Юрій Шевельов про мову та ідеологію: аналіз дискурсу.'
    key_elements:
      - іронія
      - історичний контекст
      - філологічний аналіз
    motivation: Розуміння взаємозв'язку між мовними структурами та культурними 
      смислами.
listening_situations:
  - media_type: відео
    setting: 'Круглий стіл за участю сучасних філософів та письменників: обговорення
      ''мовної стійкості''.'
    focus_points:
      - Полемічні прийоми
      - Використання цитат як аргументів
    motivation: Спостереження за високим рівнем усної дискусії на абстрактні 
      теми.
writing_tasks:
  - task_type: есе
    prompt: Напишіть інтелектуальне есе на тему 'Мова як дім буття або як 
      в'язниця духу', використовуючи щонайменше три алюзії на українську класику
      та демонструючи майстерність мовної гри.
    requirements:
      - мінімум 600 слів
      - багаторівнева аргументація
      - використання складних синтаксичних структур
    motivation: Комплексна перевірка навичок креативного та аналітичного письма.
    model_answer: Есе має демонструвати глибоку ерудицію, здатність до 
      філософського узагальнення та віртуозне володіння мовними засобами 
      виразності.
discussion_topics:
  - context: Чи є 'чистота мови' реальною метою, чи це міф, що заважає розвитку 
      креативності?
    questions:
      - Як знайти баланс між нормою та індивідуальним стилем?
      - Чи може мовна гра зашкодити зрозумілості вислову?
    motivation: Дискусія про межі свободи та відповідальності автора.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати інтелектуальний стиль есе Миколи Зерова: алюзії, термінологічна
      точність, елегантний синтаксис'
  - type: essay-response
    focus: Написати інтелектуальне есе з використанням щонайменше трьох алюзій 
      на українську класику та мовної гри
  - type: reading
    focus: Виявити інтертекстуальні зв'язки, ремінісценції та приховані цитати у
      есе Юрія Шевельова
  - type: comparative-study
    focus: Зіставити риторичні фігури (каламбур, пастіш, алюзія) з їхніми 
      функціями у тексті
phase: C2.1 [Stylistic Perfection]
