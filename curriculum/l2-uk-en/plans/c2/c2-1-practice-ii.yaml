vocabulary_hints:
  required:
  - трансформація (transformation) — докорінна, структурна, поетапна трансформація
    тексту; ключовий термін для C2
  - адаптація (adaptation) — успішна мовна адаптація до умов; вживання в контексті
    налаштування тексту під аудиторію
  - версія (version) — попередня, остаточна, скорочена версія; базове поняття для
    порівняльного аналізу варіантів
  - спрощення (simplification) — процедурне спрощення, спрощення викладу; важливо
    уникати надмірного спрощення (примітивізації)
  - канал (channel) — інформаційний канал, канал зв'язку; фактор, що визначає технічні
    межі трансформації
  - аудиторія (audience) — цільова, широка аудиторія; головний орієнтир для вибору
    стилістичного регістру
  - збереження (preservation) — збереження змісту, збереження точності викладу; основний
    критерій якості трансформації
  recommended:
  - примітивізація (dumbing down) — уникати примітивізації; негативний аспект невдалої
    спроби спрощення тексту
  - прояснення (clarification) — стилістичне прояснення сенсів; позитивна мета якісної
    переробки тексту
  - канцелярит (bureaucratese) — очищення мови від канцеляриту; традиція висміювання
    офіціозу в українській культурі
  - ланцюжок (chain) — ланцюжок перетворень; послідовна зміна регістрів від високого
    до низького
