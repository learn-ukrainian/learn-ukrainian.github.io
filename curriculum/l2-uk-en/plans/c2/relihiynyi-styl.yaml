vocabulary_hints:
  required:
  - благо (good/blessing) — на благо України, усіх благ, спільне благо, дарувати благо;
    висока частотність у літургійних текстах.
  - глас (voice — archaic) — глас вопіющого в пустелі (голос самотнього), глас Божий,
    глас народу; стилістичне маркування урочистості.
  - воістину (truly/verily) — воістину воскрес, воістину так, це воістину святе діло;
    прислівник підтвердження сакральної істини.
  - спасіння (salvation) — спасіння душі, шлях до спасіння, вічне спасіння; ключовий
    сотеріологічний термін.
  - гріх (sin) — первородний гріх, спокутувати гріх, смертний гріх, ввести у гріх;
    центральне поняття морального богослов'я.
  recommended:
  - відійти у вічність (to pass away) — релігійний евфемізм згідно з §4.3.3 Державного
    стандарту.
  - священник (priest) — нормативний український термін; уникати русизму 'батюшка'.
  - спаси і помилуй (save and have mercy) — канонічна українська формула; уникати
    кальки 'спаси і сохрани'.
  - спокута (atonement/repentance) — акт визнання провини та духовного очищення.
