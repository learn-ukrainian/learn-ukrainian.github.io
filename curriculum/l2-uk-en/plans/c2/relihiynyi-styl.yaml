module: relihiynyi-styl
level: C2
sequence: 8
version: '1.3'
title: Релігійний стиль та сакральні тексти
subtitle: Релігійний стиль і сакральні тексти
focus: cultural
pedagogy: seminar
objectives:
  - Досконало опанувати термінологічну систему та лексико-фразеологічний склад 
    української богословської мови
  - Глибоко проаналізувати особливості функціонування архаїзмів, 
    старослов'янізмів та латинізмів у сакральному контексті
  - Дослідити архітектоніку та лінгвопрагматичні засоби проповідей, катехитичних
    текстів та літургійної поезії
  - Осмислити роль конфесійного стилю у процесі націєтворення та 
    інтелектуалізації української літературної мови
content_outline:
  - section: Генеза та еволюція сакрального дискурсу в Україні
    words: 1250
    subsections:
      - 'Києво-руська спадщина: церковнослов''янська мова як мова культури та її вплив'
      - Пересопницьке Євангеліє як переломний момент народнорозмовної стихії в 
        богослужінні
      - 'Конфесійна диференціація: мовно-стильові особливості православ''я, католицизму
        та протестантизму в Україні'
    key_concepts:
      - сакралізація
      - конфесія
      - архаїзація
      - літургійний канон
    primary_sources:
      - Пересопницьке Євангеліє (1556–1561)
      - Пантелеймон Куліш, Переклад Біблії (1903)
  - section: 'Вертикаль релігійної мови: лексико-семантичний рівень'
    words: 1250
    subsections:
      - 'Богословська термінологія: метафізичний та догматичний аспекти'
      - 'Біблійні фразеологізми: етимологія, семантика та трансформації у світському
        мовленні'
      - 'Стилістична роль старослов''янізмів: створення піднесеної тональності та
        урочистості'
    key_concepts:
      - екзегетика
      - догмат
      - епіфанія
      - біблеїзм
  - section: 'Лінгвопрагматика сакрального тексту: синтаксис та риторика'
    words: 1250
    subsections:
      - 'Гомілетика: мистецтво сучасної проповіді та її жанрова специфіка'
      - 'Риторичні фігури в літургійній поезії: паралелізм, антитеза, анафора'
      - Модальність та імперативність у текстах молитов та звернень
    key_concepts:
      - гомілетика
      - герменевтика
      - молитовний дискурс
      - риторичне запитання
  - section: Сакральне в сучасному соціокультурному просторі
    words: 1250
    subsections:
      - Проблема перекладу сакральних текстів на сучасну українську мову (І. 
        Огієнко, І. Хоменко, Р. Турконяк)
      - 'Інтертекстуальність: сакральні мотиви в сучасній українській поезії та прозі'
      - 'Релігійний стиль у медіа та цифровій комунікації: еволюція чи деградація?'
    key_concepts:
      - інтертекстуальність
      - секуляризація
      - культурний код
      - мовотворчість
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - comparative-study
  min_items_per_type: 2
  total_min_items: 6
reading_situations:
  - source_type: Сакральний текст
    topic: 'Герменевтичний аналіз прологу до Євангелія від Іоана. Джерело: Біблія
      у перекладі Івана Огієнка.'
    key_elements:
      - Логос
      - світло
      - темрява
      - свідчення
    motivation: Вивчення філософсько-богословської термінології та метафізичних 
      опозицій.
  - source_type: Богословська праця
    topic: 'Роль мови в духовному житті нації. Джерело: Іван Огієнко (Митрополит Іларіон),
      ''Українська культура''.'
    key_elements:
      - рідна мова
      - духовна незалежність
      - церковна служба
    motivation: Аналіз публіцистично-наукового підстилю релігійної мови.
listening_situations:
  - media_type: подкаст
    setting: Бесіда сучасного богослова та філософа про виклики віри в епоху 
      штучного інтелекту.
    focus_points:
      - Використання релігійних метафор для опису технологічних процесів
      - Аргументація та логічна структура дискурсу
    motivation: Розуміння адаптації релігійної мови до сучасних інтелектуальних 
      запитів.
writing_tasks:
  - task_type: власне висловлення
    prompt: Напишіть есе-роздум на тему 'Роль сакральної мови у збереженні 
      національної пам'яті'. Використайте щонайменше 5 біблеїзмів та 3 
      старослов'янізми.
    requirements:
      - мінімум 300 слів
      - дотримання академічної доброчесності
      - вишуканий стиль
    motivation: Розвиток навичок використання високого стилю для філософської 
      рефлексії.
    model_answer: Модельна відповідь має містити тези про тяглість мовної 
      традиції від літописів до сучасності. Використання біблеїзмів типу 
      'наріжний камінь', 'сіль землі' має бути органічним. Текст повинен 
      демонструвати високий рівень лексичної різноманітності та складний 
      синтаксис.
discussion_topics:
  - context: 'Суперечка про канонічність мови: чи втрачає молитва свою силу при переході
      від архаїчної мови до сучасної розмовної?'
    questions:
      - Які переваги та ризики несе лінгвістична модернізація релігійних 
        обрядів?
      - Чи здатна сучасна українська мова повноцінно передати всі нюанси 
        старослов'янського канону?
    motivation: Стимулювання критичного мислення та захисту власної позиції у 
      складних світоглядних питаннях.
activity_hints:
  - type: critical-analysis
    hint: Проаналізуйте стилістичні засоби (старослов'янізми, біблеїзми, 
      риторичні фігури) у поданому сакральному тексті
  - type: comparative-study
    hint: Порівняйте мовні засоби двох перекладів Біблії (Огієнко vs Хоменко) за
      лексичними та синтаксичними ознаками
  - type: essay-response
    hint: Напишіть есе-роздум про роль сакральної мови у збереженні національної
      пам'яті з використанням біблеїзмів
  - type: authorial-intent
    hint: Визначте комунікативну інтенцію проповідника через аналіз модальних та
      імперативних конструкцій
references:
  - Огієнко І. (Митрополит Іларіон). Українська культура — роль мови в духовному
    житті нації
  - Пересопницьке Євангеліє (1556-1561) — перший переклад частин Біблії на 
    народну мову
  - Глазова О. П. Українська мова, 11 клас (2019), §40 — конфесійний стиль
  - 'State Standard 2024: C2 SS 4.3 (Stylistics)'
phase: C2.1 [Stylistic Perfection]
