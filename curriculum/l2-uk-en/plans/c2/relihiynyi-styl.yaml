content_outline:
- section: 'Вступ: Поняття релігійного стилю (Introduction: Concept of Religious Style)'
  words: 600
  points:
  - Визначення релігійного (конфесійного) стилю згідно з Державним стандартом §4.3.1.1
    та його роль у системі стилів сучасної української літературної мови.
  - 'Сакральна мова як ключовий шар українського культурного коду: від Траса Шевченка
    та Івана Франка до Василя Стуса — аналіз тяглості релігійної образності.'
  - 'Диференціація понять: церковнослов''янська спадщина (стилістичні запозичення)
    проти давньоукраїнської мовної основи в релігійних текстах.'
- section: Сакральні тексти та історія перекладу (Sacred Texts and Translation History)
  words: 900
  points:
  - Пересопницьке Євангеліє (1556–1561) як перша пам'ятка перекладу на староукраїнську
    мову та її сучасне значення як національного символу, на якому присягають Президенти
    України.
  - 'Постать Івана Огієнка (митрополита Іларіона) та його переклад Біблії 1962 року:
    аналіз балансу між точністю богословського змісту та естетикою українського літературного
    слова.'
  - 'Компаративний аналіз перекладів Огієнка та Хоменка: синтаксичні особливості та
    лексичний вибір (наприклад, використання архаїзмів для підсилення урочистості).'
- section: Лексико-семантичні особливості сакральної мови (Lexical and Semantic Features
    of Sacred Language)
  words: 1000
  points:
  - 'Робота з архаїзмами та історизмами згідно з §4.3.3: функціонування слів ''глас'',
    ''врата'', ''днесь'' у сучасному теологічному дискурсі.'
  - 'Евфемізація в релігійному стилі: заміна побутової лексики на сакральну (наприклад,
    ''відійти у вічність'' замість ''померти'') як вияв поваги та метафізичного підтексту.'
  - 'Фразеологія біблійного походження: аналіз значень та вживання висловів ''глас
    вопіющого в пустелі'', ''шлях до спасіння'', ''спокутувати гріх''.'
- section: Молитовний дискурс та гомілетика (Prayer Discourse and Homiletics)
  words: 1000
  points:
  - 'Граматичний канон молитви згідно з §4.3.4: обов''язковість кличного відмінка
    (Vocative case) у звертаннях до Бога (''Боже'', ''Ісусе'', ''Господи'') та аналіз
    помилок його опускання.'
  - 'Духовний гімн ''Молитва за Україну'' (Боже великий, єдиний): аналіз тексту Олександра
    Кониського та музики Миколи Лисенка як зразка високого релігійного стилю в національному
    контексті.'
  - 'Структура сучасної проповіді: поєднання традиційної гомілетики з актуальною риторикою,
    тематика та образність виголошення слова до вірян.'
- section: Релігійний стиль у літературі та культурі (Religious Style in Literature
    and Culture)
  words: 900
  points:
  - 'Біблійні алюзії та ремінісценції у творчості класиків (Шевченко, Франко): як
    релігійний стиль стає інструментом соціальної та національної критики (зв''язок
    із c2-23).'
  - 'Проблема секуляризації релігійної мови в сучасному медіа-дискурсі: переосмислення
    сакральних понять у світському контексті та збереження регістру.'
  - Вплив релігійної термінології на формування філософських та етичних концепцій
    в українській гуманітаристиці.
- section: 'Практикум: Культура мовлення та аналіз помилок (Workshop: Speech Culture
    and Error Analysis)'
  words: 600
  points:
  - 'Виправлення типових помилок: усунення русизмів (''батюшка'' замість ''отець''
    або ''священник'') та кальок (''спаси і сохрани'' замість нормативного ''спаси
    і помилуй'').'
  - 'Правописні норми: правила вживання великої та малої літер у релігійних назвах
    (Церква як інституція vs церква як будівля) згідно з чинним правописом.'
  - 'Стилістичний експеримент: трансформація світського тексту в релігійний регістр
    з використанням відповідної лексики та синтаксичних конструкцій.'
