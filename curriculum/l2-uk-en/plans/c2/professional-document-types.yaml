content_outline:
- section: Вступ та класифікація (Introduction and Classification)
  words: 800
  points:
  - 'Класифікація професійних документів за функціональним призначенням: організаційно-розпорядчі, інформаційно-довідкові,
    особові та договірні.'
  - 'Культурно-історичний контекст: інститут Генерального писаря в Гетьманщині як вияв тяглості української державної канцелярії
    та ваги документа.'
  - 'Нормативна база: огляд ДСТУ 4163:2020 «Оформлення документів» — ключові зміни та сучасні вимоги до юридичної сили документа.'
- section: Організаційно-розпорядча документація (Organizational and Directive Documentation)
  words: 1200
  points:
  - 'Поглиблений аналіз наказів та розпоряджень: констатуюча частина vs. розпорядча частина. Специфіка дієслів: ''наказую'',
    ''зобов’язую'', ''пропоную''.'
  - 'Реквізити за ДСТУ: правила оформлення грифу затвердження, підпису, дати та реєстраційного індексу. Вимоги до бланків
    та печаток.'
  - 'Офіційно-діловий синтаксис (§4.3.3): вживання прийменникових конструкцій ''згідно з'', ''відповідно до'', ''у зв’язку
    з'' (корекція керування відмінками).'
- section: Інформаційні та договірні документи (Information and Contractual Documents)
  words: 1200
  points:
  - 'Протокол засідання: структура (порядок денний, розділи ''слухали'', ''виступили'', ''ухвалили'') та процедура оформлення
    витягу з протоколу.'
  - 'Договірна база: архітектоніка контракту (преамбула, права та обов''язки, форс-мажор). Термінологія: ''укласти'', ''розірвати'',
    ''пролонгувати''.'
  - 'Інформаційні записки: диференціація доповідних та службових записок за напрямком комунікації. Етикет внутрішнього листування.'
- section: Особисті документи та цифровізація (Personal Documents and Digitalization)
  words: 1000
  points:
  - 'Заява та доручення: аналіз мовних кліше (§4.3.4). Передача повноважень, відповідальності та структура ідентифікації підписанта.'
  - 'Термінологічна диференціація: розрізнення понять ''особовий'' (HR/personnel, напр. ''особовий склад'') та ''особистий''
    (private/personal).'
  - 'Сучасна трансформація: проект «Дія» (Держава у смартфоні) — електронний підпис (КЕП) та перехід до безпаперового офісу.'
- section: Практичний аналіз та мовна культура (Practical Analysis and Language Culture)
  words: 800
  points:
  - 'Корекція типових помилок: вживання норми ''брати участь'' (замість ''приймати участь'') та ''протягом'' (замість ''на
    протязі'' — протяг як draft).'
  - 'Створення вторинних текстів (§4.3.8): правила реферування професійних документів, підготовка тез та звітів за результатами
    аналізу.'
  - 'Стилістичне редагування офіційних текстів (§4.3.6): усунення багатослів’я, канцеляризмів-паразитів та розмовної лексики
    в документах.'
vocabulary_hints:
  required:
  - документ (document) — нормативний, розпорядчий, первинний; скласти, завізувати, підписати
  - наказ (order) — видати наказ, скасувати, наказ по особовому складу; розпорядча частина
  - протокол (minutes/protocol) — порядок денний, витяг з протоколу; вести засідання, ухвалити
  - договір (contract/agreement) — укласти договір, розірвати, пролонгувати; істотні умови контракту
  - заява (application) — подати заяву про прийняття на роботу, клопотання, задовольнити
  - концепція (concept) — загальна ідея документа або проекту
  - аналіз (analysis) — критичний розгляд структурних елементів та реквізитів
  - дискурс (discourse) — офіційно-діловий мовний контекст
  - методологія (methodology) — сукупність прийомів та правил складання документів
  recommended:
  - згідно з (according to) — вимагає орудного відмінка (згідно з інструкцією); канцеляризм
  - брати участь (to participate) — лексична норма офіційного стилю, корекція кальки
  - протягом (during) — для позначення тривалості (протягом місяця); виправлення помилки 'на протязі'
  - особовий (personnel) — вживання у сполуках 'особова справа', 'особовий склад'
  - інтерпретація (interpretation) — тлумачення нормативних актів та положень
  - контекстуалізація (contextualization) — врахування обставин створення документа
  - синтез (synthesis) — об'єднання інформації з різних джерел у звітах
