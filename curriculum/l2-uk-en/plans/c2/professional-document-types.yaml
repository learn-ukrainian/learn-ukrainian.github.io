module: professional-document-types
level: C2
sequence: 49
version: '1.2'
title: 'Типологія професійної документації: Форма та зміст'
subtitle: 'Типологія професійної документації'
focus: professional
pedagogy: seminar
objectives:
  - Систематизувати знання про види та класифікацію сучасної української 
    професійної документації
  - Опанувати композиційні та мовні стандарти управлінських, наукових та 
    спеціалізованих документів
  - Навчитися розрізняти функціональну специфіку дипломатичних та 
    зовнішньоекономічних текстів
  - Зрозуміти вимоги до оформлення та юридичної сили електронних документів у 
    сучасному правовому полі України
content_outline:
  - section: Класифікація управлінської документації
    words: 1250
    subsections:
      - 'Організаційна, розпорядча та інформаційно-довідкова документація: функції
        та взаємозв''язок'
      - 'Стандартизація структури документа: реквізити, блоки, формуляри'
      - 'Мовна культура управлінського тексту: точність, лаконічність, нейтральність'
    key_concepts:
      - управлінська документація
      - розпорядчий документ
      - інформаційна довідка
      - уніфікація форми
    primary_sources:
      - Український класифікатор управлінської документації (аналіз системи 
        категорій)
  - section: Специфіка науково-технічної та патентної документації
    words: 1250
    subsections:
      - Особливості оформлення звітів про науково-дослідні роботи та технічних 
        завдань
      - 'Патентна документація як гібридна форма: поєднання технічного та юридичного
        дискурсів'
      - Вимоги до опису інноваційних рішень та винаходів
    key_concepts:
      - науково-технічний звіт
      - технічне завдання
      - патентна декларація
      - об'єкт інтелектуальної власності
  - section: Документування зовнішньоекономічної та дипломатичної діяльності
    words: 1250
    subsections:
      - 'Жанрова палітра дипломатичного листування: ноти, меморандуми, комюніке'
      - Структура та мовні кліше міжнародних контрактів (експорт, імпорт, 
        логістика)
      - Етикетні формули та протокольні вимоги у міжнародній професійній 
        комунікації
    key_concepts:
      - дипломатична нота
      - меморандум
      - зовнішньоекономічний контракт
      - прецедентність
    primary_sources:
      - Зразки дипломатичних документів з архіву МЗС України (аналіз стилю та 
        структури)
  - section: Електронний документообіг та новітні форми фіксації інформації
    words: 1250
    subsections:
      - Правовий статус електронного документа та цифрового підпису в Україні
      - Особливості створення та зберігання електронних архівів
      - 'Трансформація традиційних жанрів у цифровому середовищі: від листа до меседжу'
    key_concepts:
      - електронний документ
      - цифровий підпис (ЕЦП/КЕП)
      - хмарні технології
      - верифікація цілісності
word_target: 5000
activities:
  types_required:
    - critical-analysis
    - match-up
    - group-sort
  min_items_per_type: 2
  total_min_items: 6
references:
  - 'Глазова, 11 клас (2019): §42-44 — Офіційно-діловий стиль'
  - 'Ворон, 11 клас (2019): с. 239-240 — Професійний дискурс'
  - 'Державний стандарт 2024: C2 — професійна комунікативна компетенція'
reading_situations:
  - source_type: Дипломатичний документ
    topic: Аналіз дипломатичної ноти. Дослідження структури звернення, основної 
      частини та фінальних формул ввічливості.
    key_elements:
      - протокольна формула
      - офіційне звернення
      - дипломатичний етикет
    motivation: Вивчення найвищого рівня офіційності та стриманості в 
      професійній мові.
  - source_type: Зовнішньоекономічний контракт
    topic: Розбір структури та мовних засобів міжнародного договору 
      купівлі-продажу. Аналіз статей про форс-мажор та арбітраж.
    key_elements:
      - предмет договору
      - права та обов'язки
      - юридичні застереження
    motivation: Опанування складної термінології та синтаксису міжнародного 
      бізнесу.
listening_situations:
  - media_type: інтерв'ю
    setting: 'Розмова з юристом про перехід компанії на 100% електронний документообіг:
      юридичні виклики та мовні аспекти.'
    focus_points:
      - Зміна стилю викладу в електронних документах
      - Проблеми ідентифікації та автентичності
    motivation: Розуміння сучасних тенденцій у професійному діловодстві.
writing_tasks:
  - task_type: офіційний лист
    prompt: Напишіть проект меморандуму про взаєморозуміння між вашим навчальним
      закладом та міжнародним науковим фондом. Використайте відповідні 
      дипломатичні та юридичні кліше.
    requirements:
      - мінімум 500 слів
      - дотримання структури меморандуму
      - високий рівень офіційності
    motivation: Практичне застосування знань про специфічні професійні жанри.
    model_answer: Меморандум повинен містити преамбулу, напрямки співпраці, 
      форми взаємодії та прикінцеві положення. Мова має бути стриманою, точною 
      та відповідати міжнародним стандартам.
discussion_topics:
  - context: Чи може електронний формат призвести до спрощення та примітивізації
      професійної мови документа?
    questions:
      - Які традиційні елементи документа варто зберегти в цифрову епоху?
      - Як змінюється відповідальність автора за слово в електронному документі?
    motivation: Обговорення майбутнього українського діловодства.
activity_hints:
  - type: critical-analysis
    focus: 'Проаналізувати структуру дипломатичної ноти: визначити протокольні формули
      та жанрові ознаки'
  - type: match-up
    focus: 'Зіставити типи документів з їхніми функціями: розпорядчий, інформаційно-довідковий,
      нормативний, дипломатичний'
  - type: error-correction
    focus: Виправити порушення стилю та структури в електронному діловому 
      документі
  - type: fill-in
    focus: 'Доповнити текст термінологією документознавства: реквізит, формуляр, уніфікація,
      верифікація цілісності'
phase: C2.3 [Professional Specialization]
