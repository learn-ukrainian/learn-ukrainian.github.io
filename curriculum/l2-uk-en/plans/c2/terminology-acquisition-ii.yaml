module: c2-046
level: C2
sequence: 46
version: 1.2.2
title: 'Стратегії опанування терміносистем II: Контекстуальний аналіз'
subtitle: Стратегії опанування термінології II
focus: professional
pedagogy: workshop
objectives:
- Розвинути навички аналізу функціонування термінів у різних типах професійного 
  дискурсу
- Опанувати методику роботи з лінгвістичними корпусами для дослідження 
  сполучуваності фахової лексики
- Навчитися розпізнавати та правильно використовувати процеси детермінологізації
  та ретермінологізації
- Сформувати стратегії запобігання міжмовної та внутрішньомовної термінологічної
  інтерференції
content_outline:
- section: 'Термін у тексті: функціонально-стилістичні трансформації'
  words: 1250
  subsections:
  - Специфіка вживання одного і того ж терміна в науковій статті, патенті та 
    науково-популярному есе
  - Трансформація семантики терміна під впливом контексту та авторської інтенції
  - Експресивні можливості термінології у публіцистичному та художньому стилях
  key_concepts:
  - контекстуалізація
  - стилістична трансформація
  - дискурсивне оточення
  - прагматика терміна
  primary_sources:
  - Вибрана наукова стаття з журналу 'Мовознавство' (аналіз терміновживання)
- section: Детермінологізація та ретермінологізація
  words: 1250
  subsections:
  - 'Перехід термінів у загальновживану лексику: причини та наслідки для мовної системи'
  - Процеси запозичення термінів однією галуззю з іншої (ретермінологізація)
  - Метафоричне використання термінів у неспеціалізованих текстах
  key_concepts:
  - детермінологізація
  - ретермінологізація
  - термінологічна метафора
  - дифузія знань
- section: Робота з корпусами текстів для вивчення колокацій
  words: 1250
  subsections:
  - Використання ГРАК (Генерального регіонального анотованого корпусу 
    української мови) для пошуку фахових словосполучень
  - Аналіз типових колокацій та стійких виразів у професійній сфері
  - Статистичні методи оцінювання вживаності термінологічних одиниць
  key_concepts:
  - корпусна лінгвістика
  - колокація
  - конкорданс
  - IPM (items per million)
  primary_sources:
  - Генеральний регіональний анотований корпус української мови (ГРАК) - 
    онлайн-інструмент
- section: Подолання термінологічної інтерференції
  words: 1250
  subsections:
  - Типові помилки при калькуванні термінів з англійської та російської мов
  - Проблема 'фальшивих друзів перекладача' у фаховій лексиці
  - Методи перевірки автентичності українських термінологічних відповідників
  key_concepts:
  - інтерференція
  - калькування
  - автентичність
  - мовна гігієна
- section: Підсумок — Summary
  words: 300
  points:
  - 'Terminological adaptation relies on discourse and context: determinologization
    moves terms to general use, while reterminologization transfers them between scientific
    fields. Self-check: What is the difference between determinologization and reterminologization?
    Identify 3 specialized terms that are used metaphorically in everyday conversation.'
  - "Authentic professional language requires corpus validation (e.g., GRAC) to find
    correct collocations and avoid interlingual interference (calques, 'false friends').
    Self-check: What is the difference between a natural collocation and a calqued
    phrase? Use GRAC to find 3 authentic Ukrainian verb-noun collocations for a key
    concept in your profession."
word_target: 5000
activities:
  types_required:
  - critical-analysis
  - essay-response
  - comparative-study
  min_items_per_type: 2
  total_min_items: 6
references:
- 'Караман, 10 клас (2018): §1-5 — Загальне мовознавство'
- 'Авраменко, 11 клас (2019): Науковий стиль мовлення'
- 'Державний стандарт 2024: C2 — лексична компетенція'
reading_situations:
- source_type: Наукова стаття
  topic: Комплексний аналіз наукової статті з журналу 'Мовознавство'. 
    Дослідження щільності терміновживання та логіки викладу.
  key_elements:
  - об'єкт дослідження
  - методологія
  - висновки
  motivation: Розвиток здатності працювати з академічними текстами найвищого 
    рівня складності.
- source_type: Результати пошуку в корпусі
  topic: Аналіз конкордансу для обраного базового терміна (наприклад, 'дискурс' 
    або 'система'). Вивчення колокацій.
  key_elements:
  - лівий контекст
  - правий контекст
  - типова сполучуваність
  motivation: Опанування сучасних цифрових інструментів для лінгвістичного 
    аналізу фахової мови.
listening_situations:
- media_type: лекція
  setting: Виступ провідного українського науковця на професійній конференції 
    про розвиток новітньої термінології.
  focus_points:
  - Аргументи на користь питомих чи запозичених назв
  - Способи пояснення складних концептів через метафору
  motivation: Сприйняття складної фахової аргументації на слух.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть порівняльний аналіз функціонування одного і того ж терміна у трьох
    різних контекстах: у науковому стандарті, у популярній статті в медіа та у вашому
    власному професійному блозі. Прокоментуйте зміну конотацій та вимог до точності.'
  requirements:
  - мінімум 500 слів
  - використання методології дискурс-аналізу
  - обґрунтованість висновків
  motivation: Практичне застосування навичок контекстуального аналізу 
    термінології.
  model_answer: Текст має демонструвати глибоке розуміння того, як один і той же
    термін адаптується до різних аудиторій та комунікативних завдань без втрати 
    сутнісного значення (або з його свідомим спрощенням).
discussion_topics:
- context: Чи є 'мовна мода' на певні терміни загрозою для точності професійної 
    комунікації?
  questions:
  - Чому певні терміни стають популярними поза межами своєї галузі?
  - Як запобігти розмиванню значень термінів при їх детермінологізації?
  motivation: Обговорення соціолінгвістичних аспектів життя професійного слова.
activity_hints:
- type: reading
  focus: 'Прочитайте текст про термін у тексті: функціонально-стилістичні трансформації
    і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про детермінологізація та 
    ретермінологізація, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Термін у тексті: функціонально-стилістичні
    трансформації». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему термін
    у тексті: функціонально-стилістичні трансформації.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до термін у тексті: функціонально-стилістичні трансформації:
    Специфіка вживання одного і того ж терміна в науковій статті, патенті та науково.
    Визначте спільне та відмінне.'
phase: C2.3 [Professional Specialization]
