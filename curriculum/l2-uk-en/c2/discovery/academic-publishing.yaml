  chunk_id: 10-klas-ukrmova-karaman-2018_s0408
  text: "Науковий стиль української мови має свої особливості. Його основ на функція\
    \ — інформативна (повідомлення, пояс-\nнення, з’ясування, обґрунтування, роз’яснення,\
    \ класифікація \nпонять, систематизація знань, аргументований доказ); завдан-\n\
    ня — передавання наукової інформації; обставини мовлення — \nофіційні. Досить\
    \ широким є діапазон його використання — на-\nукові праці (дисертації, монографії,\
    \ статті, доповіді, реферати, \nрецензії, анотації, тези), підручники і навчальні\
    \ посібники для \nВНЗ, науково-по"
  section_title: Сторінка 231
  grade: 10
  author: karaman
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 10-klas-ukrmova-karaman-2018_s0428
  text: "Готуючи повідомлення, необхідно пам’ятати:\n1) структура повинна бути трикомпонентною:\
