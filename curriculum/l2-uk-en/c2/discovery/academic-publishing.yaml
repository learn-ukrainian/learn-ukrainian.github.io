    \ яку досліджують або \nдосліджували; в  основній частині стисло й  вичерпно пред-\n\
    ставляють зміст проведеного дослідження або узагальнюють \nнаукові погляди з \
    \ цієї проблеми, розкривають певні законо-\nмірності або підтверджують чи спростовують\
    \ наукові факти; \nу висновках коротко підсумовують сказане;\n3) матеріали повідомлення\
    \ перевіряють "
