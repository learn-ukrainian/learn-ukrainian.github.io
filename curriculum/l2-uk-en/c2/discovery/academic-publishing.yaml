- score: 0.25
  chunk_id: 10-klas-ukrmova-karaman-2018_s0397
  text: "6. Завершеність тексту полягає в наповненні конкретним зміс-\nтом з визначеними\
    \ межами. До структурних одиниць тексту належать речення, складне \nсинтаксичне\
    \ ціле, абзац. Складний за змістом текст поділяється \nна абзаци (мікротеми),\
    \ між ними існує певний змістовий зв’язок. Структурна організація тексту залежить\
    \ від типу мовлення, сти-\nлістичних завдань і жанру. Та сама інформація може\
    \ бути передана \nв науковому і художньому стилі, у жанрі наукової статті й оповідан-\n\
    ня. Наприклад: 1. Вода  — речов"
