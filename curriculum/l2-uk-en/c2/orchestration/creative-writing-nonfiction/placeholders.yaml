D1_OUTPUT_FORMAT: '## Output Format


  > **DELIMITER ENFORCEMENT**: Content outside delimiters is automatically discarded
  by the extraction pipeline.

  > **NO FIX OUTPUT** — this step produces the review only. Fixes are handled in a
  separate step if needed.


  ### Output Block 0: Citation Bank (BEFORE the review)


  **MANDATORY** — Build this FIRST by reading files with Read tool and copy-pasting
  exact quotes.

  Each citation must be verified with Grep before adding to the bank.

  Use `「...」` (CJK corner brackets) for ALL Ukrainian citations — NOT `«»` (those
  appear inside Ukrainian text and cause parsing collisions).


  ```

  ===CITATION_BANK_START===

  1. Line {N}: 「{exact Ukrainian text copy-pasted from Read output}」

  2. Line {N}: 「{exact Ukrainian text copy-pasted from Read output}」

  3. Line {N}: 「{exact Ukrainian text copy-pasted from Read output}」

  ...

  ===CITATION_BANK_END===

  ```


  **Rules:**

  - Every entry MUST be copy-pasted verbatim from Read tool output — zero rewording

  - Verify each with Grep before adding: `Grep pattern="first 5 words" path="{CONTENT_PATH}"`

  - If Grep returns no match, you paraphrased — delete and re-copy

  - Minimum 8 citations for modules >2000 words

  - In the review body below, you may ONLY use `「」` citations that appear in this
  bank


