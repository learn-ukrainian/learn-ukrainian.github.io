slug: sociolinguistic-mastery
title: Соціолінгвістична майстерність
word_target: 5000
content_outline:
- section: Вступ — Мова і суспільство
  words: 600
  points:
  - 'Визначення соціолінгвістики: як суспільство впливає на мову і навпаки'
  - 'Ключові поняття: мовна спільнота, мовна ситуація, мовна політика'
  - Мова як маркер ідентичності та інструмент соціальної влади
  - 'Світовий контекст: як мовні питання вирішуються в інших країнах (коротке порівняння)'
- section: Українська мовна ситуація
  words: 800
  points:
  - 'Історична динаміка: від лінгвоциду до відродження (стислий огляд)'
  - 'Сучасна статистика (2024-2025): зсув у бік монолінгвізму'
  - 'Білінгвізм vs Диглосія: чітке розмежування понять на українському ґрунті'
  - 'Регіональні особливості: міф про ''російськомовний Схід'' та реальна динаміка
    змін'
- section: Мовна політика та законодавство
  words: 800
  points:
  - 'Закон ''Про забезпечення функціонування української мови як державної'' (2019):
    філософія та ключові норми'
  - 'Сфери обов''язкового вжитку: державне управління, освіта, наука, сфера обслуговування'
  - 'Інституційна підтримка: Уповноважений із захисту державної мови (Мовний омбудсмен)
    та Нацкомісія'
  - Права громадян на отримання інформації та послуг державною мовою
- section: Мовний вибір та перемикання кодів
  words: 700
  points:
  - 'Психологія мовного вибору: чому ми обираємо ту чи іншу мову?'
  - 'Перемикання кодів (code-switching): стратегії (ситуативна, метафорична)'
  - 'Акомодація (пристосування) до співрозмовника: ''ввічливість'' vs ''мовна стійкість'''
  - Етикет спілкування в багатомовному середовищі
- section: Соціальна варіативність мови
  words: 800
  points:
  - 'Суржик: від ''мовної хвороби'' до перехідного етапу (соціолінгвістичний погляд)'
  - 'Соціолекти: мова айтішників, військових, молодіжний сленг як маркери групи'
  - 'Гендерний аспект: фемінітиви як соціолінгвістичний маркер змін у суспільстві'
  - Професійні жаргони та їх вплив на загальнолітературну мову
- section: Мовна ідентичність та ставлення до мови
  words: 700
  points:
  - Поняття мовної стійкості (language loyalty) та престижу мови
  - 'Стратегічна українізація: мова як фактор національної безпеки'
  - Зміна мовних установок (language attitudes) під час війни
  - 'Неофіти (new speakers): психологічні бар''єри та шляхи їх подолання'
- section: Практикум — Соціолінгвістичний аналіз
  words: 600
  points:
  - 'Кейс-стаді: аналіз мовної поведінки в публічному просторі (сценарії)'
  - 'Аналіз медіа-дискурсу: виявлення маніпуляцій на мовному ґрунті'
  - 'Рефлексія: моя власна мовна біографія та стратегії'
  - 'Словник термінів: перевірка засвоєння ключових понять'
