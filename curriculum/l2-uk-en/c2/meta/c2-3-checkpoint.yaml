slug: c2-3-checkpoint
title: Контрольна точка C2.3 — Оцінювання професійної спеціалізації
word_target: 5000
content_outline:
- section: Вступ — Структура оцінювання C2.3
  words: 250
  points:
  - 'Огляд охоплення матеріалу: модулі M46-74 (професійна спеціалізація).'
  - 'Пояснення формату: симуляція реальної професійної атестації.'
  - Чіткі часові рамки та умови виконання (імітація екзамену).
  - 'Критерії успішного складання: поріг проходження.'
- section: Частина I — Термінологія та професійне розуміння (20%)
  words: 800
  points:
  - 'Перевірка точності вживання термінів: розрізнення паронімів (компетенція/компетентність).'
  - 'Аналіз типових канцеляризмів та кліше: доцільність вживання.'
  - 'Контекстуальне розуміння: вибір правильного терміну залежно від галузі (право,
    медицина, IT).'
  - 'Робота з дефініціями: здатність дати чітке визначення професійному поняттю.'
- section: Частина II — Аналіз професійних текстів (20%)
  words: 1000
  points:
  - 'Робота зі складним юридичним документом (нормативний акт або договір): виявлення
    нюансів.'
  - 'Аналіз медичного звіту або наукової статті: розуміння причинно-наслідкових зв''язків.'
  - 'Критичний розбір професійної кореспонденції: виявлення тону та прихованих намірів.'
  - Синтез інформації з різних джерел для прийняття рішення.
- section: Частина III — Письмова комунікація (30%)
  words: 1200
  points:
  - 'Завдання на вибір спеціалізації: написання юридичного висновку або медичного
    епікризу.'
  - 'Складання офіційного листа-відповіді на скаргу або запит: дотримання етикету.'
  - Написання аналітичної записки (policy brief) для керівництва.
  - Вимоги до структури, аргументації та стилістичної чистоти.
- section: Частина IV — Усна професійна взаємодія (20%)
  words: 900
  points:
  - 'Сценарій симуляції: консультація клієнта або пацієнта (стратегії комунікації).'
  - 'Презентація професійного портфоліо або проекту: структура виступу.'
  - Техніки відповідей на складні запитання (Q&A session).
  - 'Діалог у конфліктній ситуації: професійна стриманість та аргументація.'
- section: Частина V — Інтеграція та рефлексія (10%)
  words: 500
  points:
  - 'Інтегроване завдання: поєднання читання, аналізу та прийняття рішення.'
  - 'Рефлексивне есе: самооцінка власних професійних компетенцій.'
  - План подальшого професійного розвитку (PDP) українською мовою.
  - Аналіз слабких сторін та стратегії їх покращення.
- section: Критерії оцінювання та зворотний зв'язок
  words: 350
  points:
  - Детальні рубрики оцінювання для кожної частини (Rubrics).
  - 'Інтерпретація результатів: що означає кожен бал.'
  - Рекомендації щодо повторного опрацювання матеріалу в разі невдачі.
  - 'Заключне слово комісії: мотивація до подальшого вдосконалення.'
