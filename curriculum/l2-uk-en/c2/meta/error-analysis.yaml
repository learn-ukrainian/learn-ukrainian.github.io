slug: error-analysis
title: Аналіз помилок
word_target: 5000
content_outline:
- section: 'Вступ: Помилка як інструмент пізнання'
  words: 600
  points:
  - 'Філософія помилки: від біхевіоризму (помилка як гріх) до когнітивістики (помилка
    як крок).'
  - 'Типологія: обмовка (slip) vs помилка компетенції (error).'
  - 'Джерела помилок на рівні С2: інтерференція (міжмовна/внутрішньомовна) та гіперкорекція.'
  - 'Поняття мовної норми: кодифікована vs узус.'
- section: 'Орфографічна пильність: Типові складні випадки'
  words: 700
  points:
  - 'Правопис 2019: критичні зміни, які досі спричиняють помилки (индик, пів яблука,
    етер).'
  - 'Велика літера в назвах установ та посад: де закінчується пошана і починається
    помилка.'
  - Складні випадки написання разом, окремо і через дефіс (прислівники, частки).
  - 'Апостроф і м''який знак: нюанси для просунутих (свято, тьмяний, різьбяр).'
- section: 'Граматична система: Тонкощі та порушення'
  words: 800
  points:
  - 'Керування дієслів: типові помилки у виборі відмінка (дякувати (кому?), вибачати
    (кому?), сміятися (з кого?)).'
  - Узгодження числівників з іменниками (два, три, чотири + Н.в. множини).
  - 'Паралельні форми: коли ''в залі'' і ''у залі'' — це не просто милозвучність,
    а ритміка.'
  - 'Ступені порівняння прикметників: ''самий кращий'' як маркер суржику.'
- section: 'Лексична точність: Інтерференція та пуризм'
  words: 800
  points:
  - Фальшиві друзі перекладача (польська, англійська, російська).
  - 'Кальки: синтаксичні (''слідкувати за думкою'') та фразеологічні (''кидатися в
    очі'').'
  - 'Тавтологія і плеоназм: ''пам''ятний сувенір'', ''вільна вакансія'' — прихована
    надмірність.'
  - 'Пароніми: ''компанія'' vs ''кампанія'', ''освічений'' vs ''освітянський'' vs
    ''освітній''.'
- section: 'Стилістична доречність: Регістр і контекст'
  words: 700
  points:
  - 'Стилістичний дисонанс: канцеляризми в розмовній мові (''здійснити покупку'').'
  - 'Змішування регістрів: сленг в академічному тексті, архаїзми в новинах.'
  - 'Порушення логіки тексту: анаколуф (неузгодженість частин речення).'
  - Милозвучність (евфонія) як критерій стилістичної помилки (збіг приголосних).
- section: Методологія саморедагування
  words: 700
  points:
  - 'Алгоритм перевірки власного тексту: від структури до коми.'
  - 'Робота зі словниками: чому Google Translate — не авторитет (SUM-11, SUM-20, r2u.org.ua).'
  - Техніка 'свіжого ока' та читання вголос для виявлення ритмічних збоїв.
  - Користування корпусами текстів (GRAC) для перевірки узусу.
- section: 'Практикум: Майстерня тексту'
  words: 700
  points:
  - 'Кейс-стаді: редагування ''зіпсованого'' перекладу.'
  - Аналіз реальних помилок публічних осіб (без імен, але з контекстом).
  - Створення власного 'Blacklist' типових помилок.
  - 'Підсумкова рефлексія: культура помилки як шлях до майстерності.'
