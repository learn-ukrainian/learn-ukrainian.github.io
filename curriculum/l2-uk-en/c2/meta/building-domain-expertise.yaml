slug: building-domain-expertise
title: Побудова галузевої експертизи
word_target: 5000
content_outline:
- section: 'Вступ: Шлях до галузевої експертизи'
  words: 600
  points:
  - 'Визначення експертизи: від новачках до майстра (модель Дрейфусів або аналогічна).'
  - 'Філософський аспект: концепція «сродної праці» Сковороди в сучасному контексті.'
  - Відмінність між формальною освітою та реальною компетентністю.
  - Роль мета-навичок (soft skills) у побудові твердої експертизи (hard skills).
- section: Стратегії опанування нової галузі
  words: 1000
  points:
  - 'Картографування галузі (landscape mapping): як швидко зрозуміти структуру знань.'
  - 'Ідентифікація авторитетів та джерел: хто формує думку (opinion leaders).'
  - Створення індивідуальної траєкторії навчання (learning path).
  - Методи ефективного читання та конспектування професійної літератури (Zettelkasten
    тощо).
  - Інтеграція нових знань з попереднім досвідом (трансфер навичок).
- section: Ресурси для самостійного навчання
  words: 800
  points:
  - 'Огляд сучасних форматів: MOOCs, вебінари, подкасти, лонгріди.'
  - Українські освітні платформи (Prometheus, EdEra, Projector) та їх роль.
  - 'Професійні спільноти та асоціації: нетворкінг як інструмент навчання.'
  - Роль конференцій та галузевих подій.
  - 'Наставництво (менторство) та коучинг: як знайти і як працювати з ментором.'
- section: Практика та застосування знань
  words: 1000
  points:
  - 'Концепція «Learning by doing»: навчання через дію.'
  - Pet-projects та волонтерські ініціативи як полігон для навичок.
  - 'Метод кейс-стаді (case study): аналіз реальних ситуацій.'
  - 'Рефлексивна практика: аналіз успіхів та помилок (After Action Review).'
  - 'Створення портфоліо компетенцій: як документувати свій ріст.'
- section: Підтримка та розвиток експертизи
  words: 800
  points:
  - Концепція неперервної освіти (Lifelong Learning) як стиль життя.
  - 'Інформаційна гігієна: як слідкувати за трендами і не потонути в шумі.'
  - 'Публічна активність: статті, виступи, викладання (Feynman technique).'
  - Побудова професійної репутації та особистого бренду експерта.
- section: Практичні вправи
  words: 800
  points:
  - Вправа на розробку плану входження в нову вузьку нішу (на вибір студента).
  - 'Аналіз кейсу: оцінка компетентності фахівця за його публічним профілем.'
  - Написання есе-рефлексії на тему «Моя стратегія професійного зростання».
  - 'Симуляція: підготовка до інтерв''ю з ментором (формулювання запиту).'
