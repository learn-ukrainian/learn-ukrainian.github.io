slug: poetyka-prose-analysis
title: Поетика — аналіз прози
word_target: 5000
content_outline:
- section: Вступ — Поетика прози
  words: 400
  points:
  - 'Визначення поетики: від Арістотеля до сучасного структуралізму.'
  - 'Специфіка прозового слова: двоплановість, діалогічність, зв''язок з реальністю.'
  - 'Жанрова система прози: еволюція від новели до роману-епопеї.'
  - 'Мала проза vs. велика форма: концентрація змісту проти розгортання світів.'
- section: Композиція та архітектоніка тексту
  words: 800
  points:
  - 'Архітектоніка як побудова художнього цілого: співвідношення частин.'
  - 'Сюжет і фабула: українська термінологічна традиція та розбіжності.'
  - 'Класичні елементи сюжету: експозиція, зав''язка, перипетії, кульмінація, розв''язка.'
  - 'Позасюжетні елементи: вставні новели, ліричні відступи, обрамлення (frame narrative).'
  - 'Монтажний принцип у прозі: фрагментарність і «кліпове мислення» модернізму.'
- section: 'Хронотоп: час і простір'
  words: 800
  points:
  - 'Бахтінська концепція хронотопу: нерозривність часу і простору.'
  - 'Типологія хронотопів: хронотоп дороги, провінційного міста, порогу (кризи).'
  - 'Суб''єктивний час у психологічній прозі: розтягування миті (Коцюбинський, Пруст).'
  - Міфологічний час в українській прозі (магічний реалізм, химерна проза).
- section: Персонаж і характеротворення
  words: 800
  points:
  - 'Система персонажів: протагоніст, антагоніст, трикстер, резонер.'
  - 'Засоби характеротворення: портрет, інтер''єр, мовна характеристика, вчинок.'
  - 'Психологізм: «діалектика душі» та внутрішній монолог.'
  - 'Еволюція героя: від статичних типів до динамічних характерів.'
  - Специфіка героя в літературі Розстріляного відродження (маргінал, бунтар).
- section: Мова прози та наративні стратегії
  words: 800
  points:
  - 'Наратологія: хто говорить? (Типи наратора: всевідаючий, ненадійний, персональний).'
  - 'Фокалізація: чиїми очима ми бачимо світ? (Нульова, внутрішня, зовнішня).'
  - 'Сказ і стилізація: імітація усного мовлення (приклад: «Конотопська відьма»).'
  - 'Непряме мовлення та потік свідомості: техніки передачі думки.'
  - Функції описів (пейзаж, інтер'єр) у структурі тексту.
- section: Аналіз українських прозових текстів (Практикум)
  words: 900
  points:
  - 'Мікроаналіз новели Василя Стефаника: експресіонізм і лаконічність.'
  - 'Аналіз психологізму Михайла Коцюбинського: імпресіоністична техніка.'
  - Постмодерна гра в сучасній прозі (Ю. Андрухович, Т. Прохасько).
  - Деконструкція радянських міфів у сучасній українській романістиці.
- section: 'Підсумок: від аналізу до творчості'
  words: 500
  points:
  - 'Синтез аналітичних навичок: як написати рецензію або критичну статтю.'
  - 'Герменевтичне коло: розуміння частини через ціле і навпаки.'
  - Значення теорії прози для перекладача та письменника.
  - 'Фінальна рефлексія: текст як живий організм.'
