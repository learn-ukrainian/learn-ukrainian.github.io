slug: stylistic-devices-mastery
title: Стилістичні засоби — Повне володіння
word_target: 5000
content_outline:
- section: Вступ — Тропи та фігури
  words: 400
  points:
  - 'Визначення тропів та стилістичних фігур: фундаментальна різниця (зміна значення
    vs. зміна структури)'
  - Класифікація основних засобів образності за Стандартом 2024
  - Естетична та емоційна функції образності в художньому та публіцистичному текстах
  - Роль контексту у визначенні стилістичної доречності
- section: Метафора — розширена та стерта
  words: 800
  points:
  - 'Механізм метафори: перенесення за схожістю (колір, форма, функція)'
  - 'Стерта (мертва) метафора в щоденній мові: коли образність зникає (ніжка столу,
    вушко голки)'
  - 'Розгорнута метафора: побудова наскрізного образу через весь текст або абзац'
  - Авторська метафора як ознака індивідуального стилю (приклади з Л. Костенко)
- section: Метонімія та синекдоха
  words: 800
  points:
  - 'Метонімія: перенесення за суміжністю (матеріал-виріб, автор-твір, місце-люди)'
  - 'Синекдоха як кількісний різновид метонімії: pars pro toto (частина замість цілого)
    і навпаки'
  - 'Тонкі відмінності між метафорою та метонімією: тест на ''як'' (similes)'
  - Аналіз класичних прикладів ('читати Шевченка', 'все село гуде')
- section: Персоніфікація та алегорія
  words: 700
  points:
  - 'Персоніфікація (уособлення): наділення неживого людськими рисами (психологізм
    природи)'
  - 'Алегорія: абстрактне поняття через конкретний образ (лисиця = хитрість, Феміда
    = правосуддя)'
  - Відмінність алегорії від символу та розгорнутої метафори
  - Функціонування алегорії в байках (Глібов) та притчах
- section: Гіпербола та літота
  words: 600
  points:
  - 'Гіпербола: художнє перебільшення для емоційного посилення'
  - 'Літота: художнє применшення та заперечення протилежного (''непоганий'' замість
    ''добрий'')'
  - Іронічний підтекст при використанні гіперболи та літоти
  - 'Межі доречності: від комічного ефекту до пафосу'
- section: Інші тропи
  words: 800
  points:
  - 'Епітет: художнє означення vs. логічне означення (постійні та метафоричні епітети)'
  - 'Порівняння: пряме зіставлення зі сполучниками (як, мов, наче) та орудний відмінок
    порівняння'
  - 'Перифраз: описова заміна назви (''Кобзар'' замість Шевченко)'
  - 'Евфемізм: пом''якшення небажаних понять (табу, етикет, політкоректність)'
- section: Практикум — Створення та аналіз
  words: 900
  points:
  - 'Алгоритм стилістичного аналізу тексту: від ідентифікації до інтерпретації'
  - Трансформація нейтрального речення в художнє за допомогою різних тропів
  - Створення власних розгорнутих метафор та метонімічних рядів
  - 'Критичний аналіз: визначення авторського наміру через використані засоби'
