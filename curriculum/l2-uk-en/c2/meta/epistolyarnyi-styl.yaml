- section: Електронна комунікація та нетикет
  words: 800
  points:
  - 'Еволюція жанру: від паперового листа до месенджера'
  - 'Реєстр спілкування в цифрову добу: формальний email vs робочий чат'
  - 'Нетикет українською: використання скорочень, смайлів, голосових повідомлень'
  - 'Гігієна цифрового листування: лаконічність і структурування думки'
