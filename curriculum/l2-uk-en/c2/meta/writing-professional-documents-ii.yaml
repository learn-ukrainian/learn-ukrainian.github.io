slug: writing-professional-documents-ii
title: Написання професійних документів II — Пропозиції та презентації
word_target: 5000
content_outline:
- section: Вступ — Переконливе професійне письмо
  words: 600
  points:
  - 'Еволюція ділового письма: від сухого інформування до стратегічного переконання'
  - 'Риторичний трикутник у бізнесі: логос (факти), етос (репутація), патос (емоційний
    зв''язок)'
  - 'Аналіз цільової авдиторії: стейкхолдери, десижн-мейкери та їхні ''болі'''
  - 'Етика впливу: межа між аргументацією та маніпуляцією в українському бізнес-середовищі'
- section: Пропозиція — Структура та зміст
  words: 1000
  points:
  - 'Типологія пропозицій: ''холодні'' (масові) проти ''гарячих'' (персоналізованих)'
  - 'Анатомія успішної комерційної пропозиції (КП): заголовок, лід, оффер, тіло, CTA'
  - 'Мистецтво формулювання офферу: модель ''Проблема — Рішення — Вигода'''
  - 'Мовні засоби переконання: активні дієслова, модальність впевненості, уникнення
    канцеляризмів'
  - 'Типові помилки: відсутність заклику до дії (CTA), розмитість умов, кліше (''індивідуальний
    підхід'')'
- section: Бізнес-план та обґрунтування проєкту
  words: 900
  points:
  - 'Логіка бізнес-планування: від Executive Summary до фінансових додатків'
  - 'Фінансове обґрунтування: лексика ROI, EBITDA, рентабельності та маржинальності'
  - 'Оцінка ризиків та SWOT-аналіз: мовні конструкції для опису гіпотетичних загроз
    (умовний спосіб)'
  - 'Стилістика Executive Summary: як продати ідею на одній сторінці'
- section: Письмова презентація
  words: 900
  points:
  - 'Жанр ''Silent Meeting'' (Amazon style): наративні меморандуми проти слайдів'
  - 'Структурування візуальної інформації: опис графіків, діаграм та трендів українською'
  - 'Дизайн тексту: заголовки, списки, ''повітря'' як інструменти утримання уваги'
  - 'Адаптація контенту під формат: що залишити в документі, а що винести в усний
    виступ'
- section: Тендерна документація
  words: 900
  points:
  - 'Екосистема Prozorro: специфіка державної мови закупівель'
  - 'Кваліфікаційні критерії: як правильно оформити довідки про досвід та матеріально-технічну
    базу'
  - 'Технічне завдання (ТЗ): лексична точність та уникнення двозначностей'
  - 'Фатальні помилки: невідповідність формату, арифметичні розбіжності, відсутність
    підписів/печаток'
- section: Практичні вправи
  words: 700
  points:
  - 'Редагування: перетворення ''канцелярської'' пропозиції на ефективний оффер'
  - 'Симуляція: написання ''Ліду'' для холодної комерційної пропозиції'
  - 'Аналіз кейсу: пошук помилок у відхиленій тендерній пропозиції'
  - Створення структури презентації для захисту інвестиційного проєкту
