slug: literary-criticism-methods
title: Методи літературної критики
word_target: 5000
content_outline:
- section: Вступ — Критика як професія
  words: 600
  points:
  - Definition of literary criticism as a mediator between author and reader
  - Distinction between academic literary studies (літературознавство) and operative
    criticism
  - 'The ethical responsibility of the critic: objectivity vs. subjectivity'
  - 'Key genres: review (рецензія), critical article (стаття), essay (есе), literary
    portrait'
  - The role of criticism in shaping the literary canon
- section: Імпресіоністична критика
  words: 700
  points:
  - 'Concept: criticism as a record of the soul''s adventures among masterpieces (Anatole
    France)'
  - Focus on aesthetic experience and emotional resonance over structure
  - 'Key features: associative thinking, metaphorical language, stylistic expressiveness'
  - 'Ukrainian context: Mykola Yevshan and early modernist criticism'
  - 'Limitations: risk of extreme subjectivity and lack of verifiable criteria'
  - 'When to use: emphasizing the ''mood'' and ''atmosphere'' of a text'
- section: Формалістична і структуралістська критика
  words: 800
  points:
  - 'Shift to the text itself: ''Death of the Author'' (Barthes) concept overview'
  - 'Russian Formalism influence (Shklovsky): ''ostranenie'' (making strange) as ''очуднення'''
  - 'Analyzing the ''how'': plot vs. story (сюжет vs. фабула), narrative techniques'
  - 'Structuralism: looking for underlying systems, binary oppositions, and myths'
  - 'Technique of ''Close Reading'' (пильне читання): analyzing micro-details to prove
    macro-themes'
  - 'Application: analyzing a poem''s sound structure or a novel''s time sequence'
- section: Контекстуальна критика
  words: 800
  points:
  - 'Sociological criticism: literature as a reflection of social conditions (Marxist
    roots vs. modern sociology)'
  - 'Psychoanalytic criticism: Freudian/Lacanian concepts in text analysis (subconscious,
    trauma, shadow)'
  - 'Feminist criticism: Solomiya Pavlychko and the re-reading of Ukrainian classics
    (e.g., Kobylianska)'
  - 'Postcolonial criticism: analyzing imperial power dynamics (Ewa Thompson, Grabowicz)'
  - The concept of 'Othering' (Іншування) in Ukrainian literature
  - 'Importance of context: biography, history, and ideology'
- section: Сучасні підходи
  words: 800
  points:
  - 'Receptive aesthetics (Jauss, Iser): the reader as the co-creator of meaning'
  - The concept of 'Horizon of Expectation' (горизонт сподівання)
  - 'Deconstruction (Derrida): finding contradictions and margins in the text'
  - 'Cultural Studies: literature as one of many cultural practices'
  - 'Ecocriticism: nature not just as setting, but as an agent (anthropocene in literature)'
  - 'Digital humanities: distant reading and data analysis (brief mention)'
- section: Практикум — написання рецензії
  words: 700
  points:
  - 'Standard structure of a professional review: hook, summary (no spoilers), analysis,
    verdict'
  - 'Selecting the right lens: when to use formalist vs. feminist approach'
  - 'Argumentation strategies: quoting the text to support claims'
  - 'Tone and Register: balancing academic rigour with journalistic flair'
  - 'Ethics: how to write a negative review constructively'
  - 'Step-by-step guide: from reading notes to final polish'
- section: Підсумок
  words: 600
  points:
  - 'Synthesis: the ''pluralism'' of methods in contemporary criticism'
  - The danger of methodology for methodology's sake
  - The future of criticism in the age of social media (blogs, Goodreads)
  - 'Final reflection: criticism as an art form in itself'
  - Encouragement to develop a personal critical voice
