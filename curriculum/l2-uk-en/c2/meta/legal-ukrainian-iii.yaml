slug: legal-ukrainian-iii
title: Правнича українська III — Судові процедури
word_target: 5000
content_outline:
- section: Вступ — Судова система України
  words: 700
  points:
  - Overview of the Constitutional basis of the judiciary (Articles 124-131 of the
    Constitution)
  - 'Hierarchical structure: Local courts -> Courts of Appeal -> Supreme Court'
  - Role and functions of the Constitutional Court of Ukraine (distinct from general
    jurisdiction)
  - 'Specialized courts: High Anti-Corruption Court (HACC) and its significance'
  - 'Principles of justice: Rule of law, independence of judges, adversarial nature'
- section: Позовна заява та її структура
  words: 800
  points:
  - Definition of a lawsuit (позов) and the Civil Procedure Code requirements
  - 'Mandatory requisites: Court name, parties'' details, price of claim'
  - 'Substantive elements: Subject of dispute (предмет) vs. Grounds for claim (підстави)'
  - 'Formulating claims (позовні вимоги): Specificity and clarity'
  - 'Evidence description: What constitutes admissible evidence'
  - 'Court fee (судовий збір): Calculation and exemption categories'
- section: Учасники судового процесу
  words: 700
  points:
  - 'Parties: Plaintiff (позивач) and Defendant (відповідач) - definitions and roles'
  - 'Third parties (треті особи): With and without independent claims'
  - 'Legal representation: Role of the Attorney (адвокат) vs. Self-representation'
  - 'Rights of participants: Access to files, filing motions, recusals'
  - 'Duties: Good faith usage of procedural rights (prohibition of abuse)'
- section: Стадії судового розгляду
  words: 800
  points:
  - 'Opening of proceedings (відкриття провадження): Acceptance of the claim'
  - 'Preparatory proceedings (підготовче провадження): Clarifying claims, gathering
    evidence'
  - 'Judicial review (судовий розгляд): Examination of the merits, debate'
  - 'Examining evidence: Witness testimony, documents, expertise'
  - Judicial debate (судові дебати) and final words
  - Deliberation room (нарадча кімната) and secrecy of deliberation
- section: Судові рішення та їх оскарження
  words: 800
  points:
  - 'Typology of acts: Decision (рішення - merits), Ruling (ухвала - procedural),
    Resolution (постанова - appeal/cassation)'
  - 'Legal force (законна сила): When and how a decision becomes binding'
  - 'Appellate appeal (апеляційне оскарження): Grounds, deadlines, suspense effect'
  - 'Cassation appeal (касаційне оскарження): Review of legal application (not facts)'
  - European Court of Human Rights (ECHR) as a mechanism of last resort
- section: Виконавче провадження
  words: 600
  points:
  - 'Concept of enforcement: Moving from paper decision to reality'
  - The Executive Writ (виконавчий лист) as the basis for enforcement
  - State Enforcement Service vs. Private Executors (приватні виконавці)
  - 'Measures of compulsory execution: Seizure of assets, garnishment of wages'
  - Debtor's rights and responsibilities during enforcement
- section: Практикум — Складання процесуальних документів
  words: 600
  points:
  - Step-by-step drafting of a model Claim (Позовна заява)
  - 'Drafting a Response to Claim (Відзив на позов): Strategic denial'
  - Structure of an Appellate Complaint (Апеляційна скарга)
  - 'Checklist for document validation: Dates, signatures, attachments'
  - Common drafting errors to avoid (vagueness, missing requisites)
