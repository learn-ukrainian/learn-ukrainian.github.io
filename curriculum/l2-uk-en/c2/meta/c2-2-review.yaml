slug: c2-2-review
title: Повторення C2.2 — Літературна майстерність
word_target: 5000
content_outline:
- section: Вступ — Консолідація літературних компетенцій
  words: 600
  points:
  - 'Огляд пройденого шляху: від теорії (М26) до практики перекладу (М37) та участі
    в літпроцесі (М41).'
  - 'Систематизація ключових понять: текст, контекст, інтертекст.'
  - Взаємозв'язок між читацькою компетентністю та письменницькою майстерністю.
  - 'Підготовка до фінального оцінювання: стратегії самоперевірки.'
- section: Літературна теорія та наратологія
  words: 900
  points:
  - 'Дихотомія ''автор — оповідач — герой'': рівні наративної інстанції.'
  - 'Фокалізація та точка зору: як перспектива змінює сприйняття тексту.'
  - 'Сюжет і фабула: аналіз хронотопу та архітектоніки твору.'
  - 'Практикум: визначення типу наратора у фрагментах модерністської прози.'
- section: Поетика вірша та прози
  words: 900
  points:
  - 'Версифікація: від силабо-тоніки до верлібру (аналіз ритмомелодики).'
  - 'Тропіка та стилістичні фігури: метафора, метонімія, оксиморон як інструменти
    смислотворення.'
  - Прозовий ритм та синтаксичні фігури (період, еліпсис, парцеляція).
  - 'Інтеграція формального аналізу: як форма працює на зміст (прикладний розбір).'
- section: Інтертекстуальність та критика
  words: 900
  points:
  - 'Текст як палімпсест: алюзії, ремінісценції, цитування.'
  - 'Методологія літературної критики: від есеїстичного враження до академічного аналізу.'
  - 'Жанри критики: рецензія, огляд, літературний портрет, полемічна стаття.'
  - 'Написання мікро-есею: інтерпретація класичного образу в сучасному контексті.'
- section: Переклад та творче письмо
  words: 900
  points:
  - 'Переклад як інтерпретація: доместикація vs форенізація (стратегії).'
  - 'Відтворення індивідуального стилю автора: збереження ''дихання'' тексту.'
  - 'Creative Writing: пошук власного голосу в поезії та прозі.'
  - 'Подолання страху ''чистого аркуша'': техніки фрірайтингу та редагування.'
- section: Сучасна література та спільнота
  words: 700
  points:
  - 'Літературний канон і його перегляд: хто і чому стає класиком.'
  - Літературні премії (Шевченківська, Книга року BBC) як маркери процесу.
  - Феномен літературних фестивалів та публічних читань в Україні.
  - 'Як писати про книги в епоху соцмереж: від блогу до лонгріду.'
- section: Підсумок та підготовка до Checkpoint
  words: 400
  points:
  - 'Мапа компетенцій C2.2: чек-ліст знань та вмінь.'
  - Типові помилки на рівні C2 та стратегії їх уникнення.
  - Рекомендації для поглибленого читання (список must-read).
  - 'Налаштування на Checkpoint: формат завдань та критерії оцінювання.'
