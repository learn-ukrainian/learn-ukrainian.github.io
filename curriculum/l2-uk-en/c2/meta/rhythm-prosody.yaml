slug: rhythm-prosody
title: Ритм і просодія прози
word_target: 5000
content_outline:
- section: Вступ — Ритм у прозі vs. поезії
  words: 600
  points:
  - 'Definition of prose rhythm: ''Hidden'' regularity vs. overt meter in poetry.'
  - The concept of 'inner ear' (внутрішній слух) in reading prose.
  - 'Contrast: The rigid beat of a march (poetry) vs. the flow of a river (prose).'
  - Brief overview of how rhythm influences reader emotion and pacing.
- section: Інтонаційні періоди
  words: 800
  points:
  - Definition of the 'Period' (період) in rhetoric and stylistics.
  - 'Structure: Protasis (naprúha/tension, rising intonation) and Apodosis (rozrýadká/release,
    falling intonation).'
  - 'The ''Golden Ratio'' of sentence structure: Balancing the two halves.'
  - Analysis of a classical period example (e.g., from Panas Myrny or Dovzhenko).
  - Rhythmic groups (colons) within the sentence.
- section: Довжина речень як інструмент
  words: 800
  points:
  - 'The ''Stefanyk Effect'': Short, staccato sentences for high tension, trauma,
    or rapid action.'
  - 'The ''Kotsiubynsky/Zabuzhko Effect'': Long, flowing syntax for stream of consciousness,
    description, or philosophical nuance.'
  - 'Rhythmic modulation: Alternating long and short sentences to prevent monotony.'
  - 'Case study: Rewrite a paragraph changing only sentence lengths to see the shift
    in mood.'
- section: Звукопис у прозі
  words: 800
  points:
  - 'Alliteration (алітерація) in prose: Subtle repetition of consonants to bind keywords
    (e.g., ''s'' for whispering/silence).'
  - 'Assonance (асонанс): Repetition of vowel sounds (e.g., ''o''/''u'' for gloom,
    ''i''/''e'' for light).'
  - 'Onomatopoeia (ономатопея): Direct sound imitation beyond ''moo'' and ''woof''
    (e.g., verbs like ''шелестіти'', ''грюкати'').'
  - 'The danger of overuse: When sound painting becomes comical or intrusive.'
- section: Евфонія та какофонія
  words: 800
  points:
  - Euphony (милозвучність) as a stylistic imperative, not just grammar.
  - 'The ''Cacophony Test'': Reading aloud to find stumbling blocks (consonant clusters).'
  - 'Strategic Cacophony: Deliberately using harsh sounds (e.g., ''r'', ''g'', ''z'')
    to describe conflict or ugliness.'
  - Review of u/v, i/y, z/zi/iz rules through the lens of *flow*.
- section: Практикум — редагування ритму
  words: 600
  points:
  - Step-by-step algorithm for rhythmic editing.
  - 'Technique 1: The ''Breath Test'' (reading aloud until you run out of air).'
  - 'Technique 2: ''Sentence Mapping'' (marking sentence lengths visually).'
  - 'Technique 3: ''Cluster Busting'' (fixing euphonic clashes).'
  - 'Self-reflection: Identifying one''s own natural rhythm (staccato vs. legato).'
- section: Підсумок
  words: 600
  points:
  - 'Recap: Rhythm is the invisible framework of style.'
  - The balance between natural speech patterns and artistic stylization.
  - 'Final thought: Prosody allows the writer to control the reader''s breath.'
  - 'Transition to Intertextuality: How rhythm can be an homage.'
