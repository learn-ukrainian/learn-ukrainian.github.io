slug: capstone-topic-selection
title: Дипломний проєкт — Вибір теми
word_target: 5000
content_outline:
- section: Вступ — Дипломний проєкт як вершина навчання
  words: 800
  points:
  - Визначення кваліфікаційної роботи (магістерська/дипломна) в українській освітній
    системі
  - Роль наукового керівника та кафедри у процесі підготовки
  - 'Основні типи проєктів: дослідницькі, прикладні, творчі, комплексні'
  - 'Критерії оцінювання: від формальних вимог до наукової новизни'
- section: Вибір типу проєкту та самооцінка
  words: 800
  points:
  - 'Дослідницька робота: структура, вимоги до обсягу (магістерська дисертація)'
  - 'Перекладацький або творчий проєкт: специфіка для філологів та митців'
  - 'Професійне портфоліо: кейс-стаді та практичні розробки'
  - SWOT-аналіз власних сильних сторін та інтересів перед вибором
- section: Формулювання теми та проблеми
  words: 900
  points:
  - 'Критерії вдалої теми: актуальність, новизна, реалістичність виконання'
  - 'Техніка звуження теми: від широкої галузі до конкретного фокусу'
  - Формулювання дослідницького питання (research question) vs робоча гіпотеза
  - 'Типові помилки: надмірна широта або вузькість теми'
- section: Попередній огляд літератури та джерел
  words: 850
  points:
  - Стратегії пошуку джерел українською мовою (репозитарії, бібліотеки, vernadsky.gov.ua)
  - Оцінка стану розробленості проблеми (state of the art)
  - Ідентифікація 'білих плям' (research gaps) та ніш для дослідження
  - Позиціонування власного дослідження в контексті наявних праць
- section: Планування та організація роботи
  words: 800
  points:
  - 'Створення календарного плану (timeline): етапи та дедлайни'
  - 'Управління часом: техніка ''зворотного відліку'' від дати захисту'
  - 'Ресурси та інструменти: бібліографічні менеджери, доступ до баз даних'
  - 'Ризики та план ''Б'': що робити, якщо гіпотеза не підтверджується'
- section: Практика — Обґрунтування теми (Proposal)
  words: 850
  points:
  - 'Структура ''Обґрунтування теми'': вступні формули (актуальність, мета, завдання)'
  - Написання переконливого тексту заявки для затвердження на кафедрі
  - 'Презентація ідеї науковому керівнику: підготовка до обговорення'
  - Чек-ліст готовності до старту роботи над проєктом
