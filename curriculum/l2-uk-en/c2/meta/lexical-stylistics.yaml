slug: lexical-stylistics
title: Лексична стилістика — Точність слововживання
word_target: 5000
content_outline:
- section: Вступ — Чому кожне слово важливе
  words: 600
  points:
  - Лексична точність як основа майстерності мовця рівня C2.
  - Денотація (пряме значення) vs Конотація (емоційне/стилістичне забарвлення).
  - 'Поняття ''le mot juste'' в українській стилістиці: пошук єдиного правильного
    слова.'
  - Зв'язок лексичного вибору з комунікативною інтенцією та контекстом.
- section: Синоніми — мистецтво вибору
  words: 800
  points:
  - 'Синонімічний ряд: домінанта ряду та стилістичні відтінки периферії.'
  - Абсолютні (дублети) vs Ідеографічні (семантичні) синоніми.
  - 'Контекстуальні синоніми: як автор створює нові сенси.'
  - 'Історичний екскурс: репресії проти українських синонімів у XX столітті.'
  - 'Практичні поради: як уникати повторів, не втрачаючи змісту.'
- section: Антоніми — сила контрасту
  words: 600
  points:
  - Лексичні (мовні) vs Контекстуальні (мовленнєві) антоніми.
  - 'Антитеза як стилістична фігура: побудова контрастних образів.'
  - 'Оксиморон: поєднання непоєднуваного (''живий труп'', ''дзвінка тиша'').'
  - Роль антонімів у створенні іронії та сарказму.
- section: Омоніми та пароніми
  words: 800
  points:
  - 'Відмінність омонімії від полісемії (багатозначності): чому це важливо.'
  - 'Типи омонімів: омоформи, омофони, омографи.'
  - 'Каламбур: омонімія як засіб мовної гри та гумору.'
  - 'Пароніми: пастки схожості. Аналіз типових пар (*ефектний/ефективний*, *компанія/кампанія*).'
  - Стратегії редагування паронімічних помилок.
- section: Стилістично маркована лексика
  words: 800
  points:
  - Нейтральна лексика як тло vs Маркована лексика як акцент.
  - 'Архаїзми та історизми: різниця функцій (відтворення епохи vs урочистість).'
  - 'Неологізми: загальномовні vs індивідуально-авторські (оказіоналізми).'
  - 'Діалектизми в художньому тексті: колорит чи бар''єр для розуміння?'
  - 'Варваризми, екзотизми та сленг: межі доречності.'
- section: Тропи — лексичні образи
  words: 800
  points:
  - 'Метафора як королева тропів: від стертої до розгорнутої.'
  - 'Метонімія та Синекдоха: перенесення за суміжністю.'
  - 'Епітети: логічні означення vs художні образи.'
  - Гіпербола (перебільшення), Літота (пременшення) та Градація.
  - 'Евфемізми та Дисфемізми: маніпуляція сприйняттям реальності.'
- section: Практикум — Робота зі словом
  words: 600
  points:
  - 'Редагування тексту: усунення тавтологій, плеоназмів та неточних слів.'
  - 'Стилістичний експеримент: заміна нейтральної лексики на марковану (зміна регістру).'
  - 'Аналіз тексту: визначення авторських неологізмів та тропів.'
  - Створення власного висловлювання з використанням заданих стилістичних фігур.
