slug: cross-domain-communication
title: Міжгалузева комунікація
word_target: 5000
content_outline:
- section: Вступ — Чому міжгалузева комунікація важлива
  words: 600
  points:
  - Визначення міжгалузевої комунікації у сучасному світі (подолання 'прокляття знання')
  - Роль фахівця як 'перекладача' смислів між вузькими спеціалізаціями
  - 'Науково-популярна комунікація: міст між лабораторією та суспільством'
  - 'Огляд українського контексту: зростання попиту на якісний наукпоп (кейс ''Куншт'',
    ''The Ukrainians'')'
- section: Пояснення складного простими словами
  words: 900
  points:
  - 'Стратегії спрощення: відсікання зайвого без втрати наукової точності'
  - 'Сила аналогій та метафор: як пояснити квантову фізику на прикладі кави'
  - 'Візуалізація даних: інфографіка як мова міждисциплінарного спілкування'
  - 'Табу на жаргон: коли термін необхідний, а коли є перешкодою'
  - Техніка 'ліфтової промови' (elevator pitch) для складних ідей
- section: Адаптація до авдиторії
  words: 900
  points:
  - 'Аналіз цільової авдиторії: рівень знань, очікування, упередження'
  - 'Градація складності: від ''Science Kids'' до міждисциплінарного симпозіуму'
  - 'Психологія сприйняття: як утримати увагу нефахівця'
  - 'Зворотний зв''язок: як перевірити, чи вас зрозуміли правильно'
  - 'Мовні засоби контакту: звертання, риторичні запитання, ''ми-конструкції'''
- section: Міждисциплінарні проєкти
  words: 800
  points:
  - Специфіка роботи в гетерогенних командах (напр., IT + медицина + юриспруденція)
  - 'Укладання ''глосарію проєкту'': узгодження термінології на старті'
  - Подолання професійного снобізму та стереотипів
  - 'Кейс-стаді: успішний український міжгалузевий проєкт (напр., у сфері Defense
    Tech або AgriTech)'
- section: Науковий журналізм
  words: 1000
  points:
  - Відмінність наукового журналіста від науковця та піарника
  - 'Структура науково-популярної статті: заголовок-гачок, лід, сторітелінг'
  - 'Етичні дилеми: сенсаційність vs достовірність (боротьба з фейками та псевдонаукою)'
  - 'Стилістичні прийоми: використання художніх засобів у науковій темі'
  - 'Інтерв''ю з експертом: як ставити правильні запитання, щоб отримати зрозумілі
    відповіді'
- section: Практичні вправи
  words: 800
  points:
  - 'Завдання 1: ''Переклад'' — переписати абзац з академічної статті для блогу'
  - 'Завдання 2: ''Метафора'' — підібрати влучну аналогію для складного терміна (напр.,
    ''блокчейн'', ''ентропія'')'
  - 'Завдання 3: Критичний аналіз — знайти помилки спрощення у запропонованому медіа-тексті'
  - 'Завдання 4: Міні-проєкт — скласти план комунікації для запуску нового продукту'
