slug: professional-research-skills
title: Професійні дослідницькі навички
word_target: 5000
content_outline:
- section: Вступ — Дослідницькі компетенції для професіонала
  words: 600
  points:
  - Role of research in modern professional environments (beyond academia)
  - 'Types of research: academic (fundamental), applied (market, UX, policy)'
  - 'Concept of Academic Integrity (Академічна доброчесність): plagiarism, fabrication,
    falsification'
  - 'Key terminology: об''єкт vs предмет, мета vs завдання'
- section: Пошук та оцінка джерел
  words: 1000
  points:
  - 'Key databases: Vernadsky Library, Scopus, Web of Science, Google Scholar'
  - 'Evaluation criteria: reliability, relevance, authority, currency (comparable
    to CRAAP)'
  - Distinguishing Primary (першоджерела) vs Secondary (вторинні) sources
  - Bibliography management tools (Zotero, Mendeley) in Ukrainian context
- section: Методи збору інформації
  words: 1000
  points:
  - 'Literature Review (огляд літератури): structure and purpose'
  - 'Document Analysis: working with archives and official reports'
  - 'Qualitative methods: interviews (глибинні інтерв''ю) and focus groups'
  - 'Quantitative methods: surveys (опитування) and basics of sampling (вибірка)'
- section: Аналіз та синтез інформації
  words: 1000
  points:
  - 'Systematization of data: coding and categorization'
  - Identifying patterns and trends (виявлення закономірностей)
  - 'Critical analysis: identifying bias and limitations'
  - 'Synthesis: combining sources to create new understanding (not just summarizing)'
- section: Презентація результатів дослідження
  words: 800
  points:
  - 'Standard report structure: Introduction, Methodology, Results, Discussion, Conclusions'
  - 'Data visualization: charts, graphs, and their Ukrainian terminology'
  - 'Citation standards: DSTU 8302:2015 basics vs APA/MLA'
  - 'Ethical presentation: transparency and acknowledging limitations'
- section: Практичні вправи
  words: 600
  points:
  - 'Task: Formulate a research question and hypothesis'
  - 'Task: Source evaluation (Reliable vs Unreliable)'
  - 'Task: Draft a mini-literature review (1-2 paragraphs)'
  - 'Task: Correct citation formatting (DSTU style)'
