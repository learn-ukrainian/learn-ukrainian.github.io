slug: medical-ukrainian-ii
title: Медична українська II — Спілкування з пацієнтами
word_target: 5000
content_outline:
- section: Вступ — Комунікація в медицині
  words: 400
  points:
  - 'Комунікативна компетентність як складова професіоналізму лікаря: сучасні українські
    стандарти.'
  - 'Правові та етичні засади: права пацієнта на інформацію та конфіденційність (медична
    таємниця).'
  - 'Поняття інформованої згоди: від формальності до справжнього розуміння.'
  - 'Бар''єри в спілкуванні: фізичні, психологічні, мовні та шляхи їх подолання.'
- section: Збір анамнезу
  words: 800
  points:
  - 'Структура медичного інтерв''ю: алгоритм розпитування за системою (скарги, історія
    хвороби, історія життя).'
  - 'Техніка постановки запитань: баланс між відкритими (для початку) та закритими
    (для уточнення) запитаннями.'
  - 'Активне слухання: вербальні та невербальні техніки підтримки діалогу.'
  - 'Анамнез життя (Anamnesis vitae): делікатні питання про спосіб життя, шкідливі
    звички та спадковість.'
- section: Фізикальний огляд — комунікація
  words: 600
  points:
  - 'Вербальний супровід дій лікаря: пояснення маніпуляцій до та під час огляду.'
  - 'Інструктування пацієнта: чіткі, зрозумілі команди та прохання («Зробіть глибокий
    вдих», «Затримайте дихання»).'
  - 'Реагування на дискомфорт та біль пацієнта: емпатійні висловлювання та паузи.'
  - 'Коментування результатів огляду: що варто говорити одразу, а що — після аналізу.'
- section: Пояснення діагнозу та плану лікування
  words: 800
  points:
  - 'Адаптація складної медичної інформації: уникнення професійного жаргону, використання
    аналогій.'
  - 'Стратегія «Chunk and Check»: подання інформації порціями з перевіркою розуміння.'
  - 'Залучення пацієнта до прийняття рішень (Shared decision making): обговорення
    альтернатив.'
  - 'Обговорення ризиків, побічних ефектів та прогнозу: чесність без залякування.'
- section: Складні розмови
  words: 1000
  points:
  - Протокол повідомлення поганих новин (наприклад, протокол SPIKES в українській
    адаптації).
  - 'Робота з сильними емоціями пацієнта та родичів: гнів, заперечення, розпач.'
  - 'Обговорення паліативної допомоги та питань кінця життя: культурні та етичні аспекти.'
  - 'Спілкування з «важкими» пацієнтами: агресія, маніпуляції, іпохондрія.'
- section: Особливі категорії пацієнтів
  words: 600
  points:
  - 'Педіатрична комунікація: специфіка спілкування з дітьми різного віку та їхніми
    батьками (тріада лікар-дитина-батьки).'
  - 'Геронтологічні пацієнти: врахування когнітивних змін, порушень слуху та множинної
    патології.'
  - 'Міжкультурна компетентність: спілкування з пацієнтами, для яких українська мова
    не є рідною.'
  - Комунікація з пацієнтами з обмеженими можливостями (вади слуху, зору, мовлення).
- section: Практикум — Симуляційні діалоги
  words: 800
  points:
  - 'Моделювання клінічного випадку: первинний прийом пацієнта зі скаргами на біль
    у серці (збір анамнезу).'
  - 'Рольова гра: роз''яснення необхідності оперативного втручання пацієнту, який
    вагається.'
  - 'Сценарний аналіз: розмова з родичами тяжкохворого пацієнта (етичні дилеми).'
  - 'Аналіз помилок: розбір відеозаписів або транскриптів невдалих медичних консультацій.'
