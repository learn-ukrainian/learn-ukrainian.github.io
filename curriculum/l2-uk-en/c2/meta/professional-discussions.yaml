slug: professional-discussions
title: Професійні дискусії
word_target: 5000
content_outline:
- section: Вступ — Культура професійної дискусії
  words: 600
  points:
  - Визначення професійної дискусії та її відмінність від побутової суперечки (dispute
    vs discussion).
  - 'Ключові принципи конструктивного діалогу: повага, чутність, аргументованість.'
  - Етичні норми професійних обговорень в українському діловому середовищі.
  - Роль емоційного інтелекту в управлінні професійною дискусією.
- section: Ведення дебатів
  words: 1000
  points:
  - 'Формальна структура дебатів: регламент, ролі (пропонент, опонент), етапи.'
  - 'Стратегії аргументації: побудова сильної позиції, використання фактів та даних.'
  - 'Мистецтво контраргументації: як коректно спростовувати тези опонента.'
  - 'Риторичні прийоми переконання: логос, пафос, етос в сучасному контексті.'
  - Типові логічні помилки (ad hominem, солом'яне опудало) та як їх виявляти.
- section: Переговори
  words: 1000
  points:
  - 'Типологія переговорів: розподільчі (win-lose) vs інтегративні (win-win).'
  - 'Підготовка до переговорів: визначення цілей, аналіз інтересів сторін.'
  - Поняття BATNA (Best Alternative to a Negotiated Agreement) та ZOPA (Zone of Possible
    Agreement) в українській термінології.
  - 'Тактики ведення переговорів: торг, поступки, фіксація домовленостей.'
  - Психологічні аспекти переговорного процесу та подолання тупикових ситуацій.
- section: Консультації та експертні обговорення
  words: 800
  points:
  - 'Специфіка експертної комунікації: точність, об''єктивність, відповідальність.'
  - Як ефективно представити фахову думку для нефахової аудиторії.
  - 'Динаміка роботи в експертних групах: мозковий штурм, метод Дельфі.'
  - Техніки досягнення консенсусу в групі професіоналів.
- section: Модерація дискусій
  words: 800
  points:
  - Функції та відповідальність модератора (фасилітатора) дискусії.
  - 'Інструментарій модератора: надання слова, контроль часу, фокусування теми.'
  - 'Управління конфліктами: техніки деескалації напруги в прямому ефірі або на нараді.'
  - Мистецтво підбиття підсумків (резюмування) та фіксації результатів дискусії.
- section: Практичні вправи
  words: 800
  points:
  - 'Аналіз кейсу: розбір реальних телевізійних дебатів (скрипт) на предмет аргументації.'
  - 'Симуляція: сценарій переговорів між замовником та підрядником (рольова модель).'
  - Вправа на ідентифікацію маніпуляцій та логічних помилок у тексті.
  - Написання сценарію модерації для проблемного круглого столу.
