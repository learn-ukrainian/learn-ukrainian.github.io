slug: poetyka-verse-analysis
title: Поетика — аналіз віршів
word_target: 5000
content_outline:
- section: Вступ — Системи віршування
  words: 700
  points:
  - 'Визначення віршування: ритмічна організація мови як основа поезії.'
  - 'Силабічна система: історичний контекст (XVII-XVIII ст.), рівноскладовість, цезура.'
  - 'Силабо-тонічна система: революція Котляревського і Шевченка, чергування наголошених
    і ненаголошених складів.'
  - 'Тонічна система: акцентний вірш, роль наголосів (Маяковський, Тичина).'
  - 'Верлібр: відмова від рими і розміру, ритм думки та інтонації (сучасна поезія).'
- section: Метрика та ритміка
  words: 900
  points:
  - 'Поняття стопи: двоскладові (ямб, хорей) та трискладові (дактиль, амфібрахій,
    анапест) розміри.'
  - 'Визначення розміру: алгоритм аналізу, схема наголосів.'
  - 'Ритмічні варіації: піррихій (пропуск наголосу) і спондей (надсхемний наголос).'
  - Цезура та її роль у розбивці віршорядка; паузи.
  - 'Анжамбеман (перенесення): змістовий та інтонаційний розрив рядка.'
- section: Строфіка
  words: 700
  points:
  - 'Класичні строфи: дистих (двовірш), терцет, катрен (чотиривірш).'
  - 'Тверді форми: сонет (італійський vs англійський), його структура та ''сонетний
    замок''.'
  - 'Складні строфи: октава, секстина, рондо (оглядово).'
  - 'Астрофічна будова: вільний поділ тексту у сучасній поезії.'
- section: Рима і звукова організація
  words: 700
  points:
  - 'Класифікація рим за наголосом: чоловіча (останній склад), жіноча (передостанній),
    дактилічна.'
  - 'Характер звучання: точна і неточна рима, багата і бідна рима.'
  - 'Схеми римування: суміжне (aabb), перехресне (abab), кільцеве (abba).'
  - 'Евфонія (милозвучність): алітерація (повтор приголосних) та асонанс (повтор голосних).'
  - 'Звукопис: відтворення звуків природи чи емоційного стану через фонетику.'
- section: Тропи та фігури в поезії
  words: 800
  points:
  - 'Метафора як королева поезії: розгорнута метафора, метафоричний образ.'
  - 'Символ: багатозначність образу, відмінність від алегорії.'
  - Персоніфікація (уособлення) та антропоморфізм у ліриці.
  - 'Оксиморон та антитеза: гра контрастів.'
  - 'Епітети: постійні (фольклорні) та авторські (індивідуальні).'
- section: Аналіз українських віршів
  words: 800
  points:
  - Алгоритм цілісного аналізу поетичного твору (тема, ідея, жанр, образи, художні
    засоби).
  - Практичний розбір класичного твору (наприклад, 'Садок вишневий...' або 'Contra
    spem spero').
  - 'Аналіз модерністського тексту: фокус на формі та звукописі (Тичина, ''Сонячні
    кларнети'').'
  - 'Інтерпретація сучасного верлібру: пошук прихованих сенсів і ритму.'
- section: Підсумок
  words: 400
  points:
  - 'Єдність форми і змісту: як метрика впливає на сприйняття сенсу.'
  - 'Еволюція українського віршування: від силабіки до верлібру.'
  - Значення поетичного аналізу для глибокого розуміння літератури.
  - Заклик до власної творчості та експериментів зі словом.
