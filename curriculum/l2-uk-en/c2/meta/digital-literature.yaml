slug: digital-literature
title: Цифрова література
word_target: 5000
content_outline:
- section: Вступ — Література в цифрову епоху
  words: 700
  points:
  - 'Відкрити розділ діагностичним завданням: уривок з конкретного твору або Instagram-вірш
    сучасного українського автора — читач аналізує форму до пояснення теорії (TTT)'
  - 'Дати чітке визначення цифрової літератури (цифрова народжена vs. дигіталізована:
    два принципово різних явища — кожне з прикладом)'
  - 'Пояснити гіпертекст і нелінійну нарацію: що відрізняє від традиційної лінійної
    розповіді; навести конкретний приклад структури гіпертексту'
  - Ввести поняття 'медіум як повідомлення' (Маклюен) в контексті цифрового письма
    — як платформа формує текст
  - 'Вставити engagement box: ключові терміни з визначеннями (цифровий, дигіталізація,
    гіпертекст, нелінійність) — мінімум 4 терміни'
- section: Форми цифрової літератури
  words: 900
  points:
  - 'Гіпертекстова проза: H3 підрозділ — визначення, структурні особливості, відомі
    українські чи міжнародні приклади; пояснити відмінність від просто ''тексту з
    посиланнями'''
  - 'Інтерактивна фікшн: H3 підрозділ — читач як співавтор, вибір розвитку сюжету;
    навести конкретні платформи (Twine, Inkle) та проаналізувати їхній потенціал для
    україномовного контенту'
  - 'Візуальна поезія онлайн: H3 підрозділ — конкретгні форми (gif-поезія, відеопоезія,
    кінетична поезія); назвати 1-2 українських митців'
  - 'Твіттер-література і мікроформи: H3 підрозділ — мікрооповідання, твіттер-поезія;
    обговорити обмеження символів як художній прийом; зв''язок з японськими мікроформами
    (хайку, танка)'
  - 'Engagement box: порівняльна таблиця або схема ''традиційна форма → цифровий аналог''
    (роман → гіпертекстова проза; драма → інтерактивна фікшн; поезія → мікроформа)'
- section: Онлайн-платформи і публікація
  words: 750
  points:
  - 'Огляд ключових українських літературних порталів з конкретними назвами: ЛітАкцент,
    Читомо, Буквоїд, Litcentr.in.ua — описати профіль кожного (критика, новини, спільнота)'
  - 'Самвидав онлайн: спадкоємність з радянським самвидавом (ethos опору/незалежності)
    + сучасні платформи (Ridero, Amazon KDP для україномовних авторів); підкреслити
    термінологічну свідомість — тільки самвидав, не саміздат'
  - 'Електронні книги: формати (epub, pdf, mobi), ринок е-книг в Україні, видавництва
    що активно розвивають цифрові версії'
  - 'Аудіокниги і подкасти: зростання ринку; українські аудіокнижкові проекти; літературні
    подкасти як новий жанр критики (конкретні приклади)'
  - 'Engagement box: схема або перелік ''шлях тексту від автора до читача'' на різних
    платформах (традиційне видавництво vs. самвидав онлайн)'
- section: Соціальні мережі і література
  words: 800
  points:
  - 'Instagram-поезія: естетика, формат (текст + візуал), характеристики успішної
    Instagram-публікації; назвати конкретних українських Instagram-поетів; обговорити
    критику формату (комерціалізація, ''інстаграмізація'' поезії)'
  - 'Літературний TikTok (BookTok): механіка алгоритму, як він впливає на читацькі
    смаки та книжкові продажі; українськомовний BookTok — стан і перспективи; tension
    між популярністю і якістю'
  - 'Фейсбук-проза: жанровий феномен — короткий прозовий текст для читання у стрічці;
    приклади з практики українських авторів (Жадан, Дереш та ін. публікували на Facebook
    ще до книжкових видань)'
  - 'Авторський брендинг: цифрова ідентичність письменника, стратегії присутності
    онлайн; розмежування між маркетингом і мистецьким проектом; небезпека редукції
    автора до ''контент-мейкера'''
  - 'Engagement box або міні-діалог: уявна розмова між двома авторами — один практикує
    активний брендинг, інший свідомо уникає соціальних мереж — аргументи обох сторін'
- section: Критика і рецепція онлайн
  words: 750
  points:
  - 'Книжкові блоги та влоги (BookTube): специфіка жанру; різниця між аматорською
    та професійною критикою онлайн; чи можна вважати блог-рецензію повноцінною критикою
    — аргументи за і проти'
  - 'Goodreads і подібні платформи (StoryGraph, LiveLib): краудсорсингова рейтингова
    система; як читацький рейтинг впливає (і не впливає) на канонізацію; знаменита
    проблема ''кількість зірок ≠ якість'''
  - 'Онлайн-рецензії: нові форми і нові голоси — хто тепер рецензує книжки? зміна
    медіапростору: від товстих журналів до Twitter-тредів; жанрові ознаки якісної
    онлайн-рецензії'
  - 'Краудсорсингова критика: плюси (демократизація, різноманіття голосів) і мінуси
    (ехо-камера, фаббінг, тролінг); порівняти з традиційною редакційною критикою'
  - 'Мінідіалог або engagement box: фрагмент онлайн-дискусії про книжку — учень аналізує
    аргументаційну структуру, тон, реєстр'
- section: Виклики і можливості
  words: 700
  points:
  - 'Авторське право в цифрову епоху: проблема піратства, Creative Commons ліцензії,
    відкритий доступ (open access) — термінологія і позиції; конкретний кейс з українського
    видавничого досвіду'
  - 'Демократизація публікації: хто виграє, хто програє? — більше голосів, але якість
    фільтрації падає; роль редакторів у цифровому середовищі'
  - 'Увага і конкуренція: ''економіка уваги'' (attention economy); як цифрові платформи
    змінюють читацькі звички; довгий текст vs. короткий контент; наслідки для книжкової
    культури'
  - 'Майбутнє цифрової літератури: штучний інтелект і генеративна проза — загроза
    чи інструмент? Що залишається унікальним у людському письмі; приклади AI-генерованих
    текстів і питання авторства'
  - 'Engagement box: список ключових концептів розділу (авторське право, Creative
    Commons, відкритий доступ, економіка уваги, генеративна проза) з стислими визначеннями'
- section: Підсумок
  words: 400
  points:
  - 'Інтеграція цифрового і традиційного: підсумувати як цифрові форми не замінюють,
    а розширюють літературний простір — конкретні приклади гібридних практик (автор
    публікує в Instagram І видає книжку)'
  - 'Практичні кроки для автора або читача: коротки список рекомендацій — як орієнтуватися
    в цифровому літературному просторі, як критично оцінювати онлайн-платформи'
  - 'Критичне ставлення до платформ: завершальна думка про медіаграмотність як необхідну
    компетенцію C2-рівня; зв''язок з §4.3.8 (вторинні тексти, анотації, рецензії)
    — читач як активний учасник, а не пасивний споживач'
  - 'Підсумковий engagement box або рефлексивне питання: ''Що для вас означає цифрова
    література особисто? Яка форма здається найперспективнішою?'''
