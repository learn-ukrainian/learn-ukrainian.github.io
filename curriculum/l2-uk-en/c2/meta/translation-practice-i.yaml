slug: translation-practice-i
title: Практика перекладу I — Літературний переклад
word_target: 5000
content_outline:
- section: Вступ — Художній переклад як мистецтво
  words: 800
  points:
  - Визначення художнього перекладу та його відмінність від технічного/інформативного.
  - 'Концепція ''перекладацької інтерпретації'': перекладач як співавтор і медіатор
    культур.'
  - 'Історичний екскурс: Київські неокласики (Зеров) та школа Лукаша-Кочура як фундамент
    українського перекладознавства.'
  - 'Етичні дилеми: межі творчої свободи vs. вірність духу та літері оригіналу.'
- section: Переклад прози
  words: 1000
  points:
  - Стратегії відтворення авторського стилю (ідіостилю) та голосу оповідача.
  - 'Робота з діалогами: відтворення соціальних, вікових та регіональних особливостей
    мовлення персонажів.'
  - 'Передача реалій (culture-specific items): доместикація (наближення до читача)
    vs. форенізація (збереження чужинності).'
  - 'Техніки перекладу безеквівалентної лексики: транслітерація, калькування, описовий
    переклад, адаптація.'
- section: Переклад поезії
  words: 1000
  points:
  - 'Вічна дилема: що важливіше — форма чи зміст? Втрати та компенсації.'
  - 'Еквіритмічний переклад: збереження розміру, ритму та схеми римування.'
  - 'Верлібр у перекладі: особливості відтворення вільного вірша та ритмічної прози.'
  - Звукопис (алітерація, асонанс) та його відтворення засобами української мови.
- section: Переклад драми
  words: 800
  points:
  - 'Специфіка драматургічного тексту: орієнтація на усне промовляння (сценічність).'
  - 'Природність та динаміка діалогів: уникнення ''книжковості'' в репліках.'
  - 'Відтворення підтексту та іронії: як передати те, що ''між рядками''.'
  - 'Культурна адаптація для українського глядача: межі локалізації гумору та гри
    слів.'
- section: Практична майстерня — Переклад прози
  words: 700
  points:
  - 'Аналіз кейсу: покроковий розбір перекладу уривка англійської класики (напр.,
    Гемінґвей або Орвелл).'
  - 'Порівняння різних українських перекладів одного тексту: аналіз перекладацьких
    рішень.'
  - 'Типові помилки: буквалізм, канцелярит, стилістичний дисонанс.'
  - 'Редагування та саморедагування: чек-ліст перекладача прози.'
- section: Практична майстерня — Переклад поезії
  words: 700
  points:
  - 'Аналіз кейсу: переклад сонета або модерної поезії (напр., Шекспір або Вітмен).'
  - 'Пошук рим та ритмічних відповідників: робота зі словниками рим та синонімів.'
  - '''Муки перекладача'': вибір між точністю образу та милозвучністю.'
  - 'Коментар до перекладу: обґрунтування вибору стратегії.'
