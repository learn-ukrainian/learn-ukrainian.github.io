slug: capstone-drafting
title: Дипломний проєкт — Написання чернетки
word_target: 5000
content_outline:
- section: Вступ — Від матеріалу до тексту
  words: 600
  points:
  - 'Психологія чернетки: чому ''поганий перший варіант'' кращий за порожню сторінку.'
  - Стратегії подолання 'страху чистого аркуша' (freewriting, метод помідора).
  - Організація робочого простору та матеріалів (нотатки, джерела, план).
  - 'Відмінність чернетки від фінального тексту: фокус на ідеях, а не на формі.'
- section: Структура академічної роботи
  words: 800
  points:
  - Стандартна архітектура дипломної роботи в Україні (Вступ, Розділи, Висновки).
  - Вимоги МОН до обсягу та пропорцій частин роботи.
  - 'Логічний зв''язок між розділами: принцип ''червоної нитки''.'
  - 'Огляд літератури як фундамент: не просто перелік, а аналіз стану проблеми.'
- section: 'Написання вступу: методологічний апарат'
  words: 1000
  points:
  - 'Формулювання актуальності: як довести, що ваша тема важлива зараз.'
  - 'Об''єкт і предмет дослідження: чітке розмежування з прикладами.'
  - 'Мета і завдання: дієслова доконаного виду (дослідити, проаналізувати, встановити).'
  - 'Наукова новизна: формули ''вперше...'', ''удосконалено...'', ''набуло подальшого
    розвитку...''.'
- section: Написання основної частини
  words: 1000
  points:
  - 'Побудова аргументації: теза — доказ — приклад — висновок.'
  - 'Когерентність (зв''язність) тексту: лексичні та граматичні засоби зв''язку.'
  - 'Інтеграція цитат та посилань: як уникнути плагіату та ''клаптикового'' тексту.'
  - 'Академічний стиль: безособовість, точність, відсутність емоційності.'
- section: Написання висновків
  words: 800
  points:
  - 'Висновки як дзеркало вступу: відповідь на поставлені завдання.'
  - 'Структура висновків: від конкретних результатів до узагальнень.'
  - 'Чого не має бути у висновках: нових фактів, цитат, ''води''.'
  - Формулювання перспектив подальших досліджень.
- section: Практика — Техніка написання чернетки
  words: 800
  points:
  - 'Алгоритм написання: не обов''язково писати лінійно (можна почати з 2-го розділу).'
  - Чекліст самоперевірки першої чернетки (структура, логіка, обсяг).
  - 'Робота з науковим керівником: як правильно ставити запитання та подавати матеріал.'
  - Моделювання типової ситуації захисту чернетки перед кафедрою (попередній розгляд).
