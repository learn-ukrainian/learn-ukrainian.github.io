slug: regional-varieties
title: Регіональні різновиди
word_target: 5000
content_outline:
- section: Вступ — Діалектний ландшафт України
  words: 600
  points:
  - 'Definition of key terms: наріччя (super-group), діалект (dialect), говір (local
    variety), говірка (single village speech).'
  - 'The three major supradialectal groups (наріччя): Northern, South-Western, South-Eastern.'
  - 'Historical formation: How geography and political borders shaped the dialect
    map over centuries.'
  - 'The relationship between dialects and the modern literary standard: The Poltava-Kyiv
    base.'
- section: Північне наріччя (Полісся)
  words: 800
  points:
  - 'Geographic range: Volyn, Rivne, Zhytomyr, Kyiv (north), Chernihiv.'
  - 'Phonetic archaisms: Retention of diphthongs (віл -> вуол, кінь -> куонь) in some
    areas.'
  - 'Morphological features: Adjective contractions (добрая -> добра, молодая -> молода).'
  - 'Lexical regionalisms: Specific vocabulary related to forest and swamp terrain
    (botany, geography).'
  - 'Cultural context: The archaic nature of Polissian folklore and songs.'
- section: Південно-західне наріччя
  words: 900
  points:
  - The most fragmented and diverse group due to mountainous terrain and historical
    borders.
  - 'Subgroups: Hutsul, Boyko, Lemko (Carpathian group); Galician, Bukovinian, Podilian.'
  - 'Hutsul features: Phonetic distinctiveness, specific vocabulary (gazda, płay,
    polonyna).'
  - 'Galician urban speech: Influence of Polish and German (Germanisms in technical/urban
    life).'
  - 'Morphological traits: Enclitic pronouns (ся миє vs миється), past tense forms
    (ходив''єм vs я ходив).'
- section: Південно-східне наріччя
  words: 800
  points:
  - 'Geographic range: Central Ukraine, Slobozhanshchyna, Steppe Ukraine.'
  - 'The base of the Literary Language: Why Kotliarevsky and Shevchenko anchored on
    this dialect.'
  - 'Slobozhanshchyna: Contact zone features, specific intonation patterns.'
  - 'Steppe dialects: Influence of late colonization, massive mixing of population.'
  - 'Russification pressure: Distinguishing authentic South-Eastern traits from recent
    Russian interference.'
- section: Регіональні стандарти та норма
  words: 700
  points:
  - 'The concept of ''Literary Norm'' vs. ''Living Speech'': When is dialect appropriate?'
  - 'Code-switching: Bidialectal speakers (using Standard at work, Dialect at home).'
  - 'The problem of Surzhyk: Definition, sociolinguistic status, and difference from
    organic dialects.'
  - 'Purism vs. Tolerance: Modern attitudes towards regional variation in public space.'
- section: Діалекти в культурі та мистецтві
  words: 600
  points:
  - 'Literature: Kotsiubynsky (Hutsul), Stefanyk (Pokuttia), Maria Matios (Bukovinian).'
  - 'Music and Folklore: How dialect preserves archaic rhythms and rhymes distinct
    from the standard.'
  - 'Cinema and Dubbing: The trend of using dialects to dub specific character archetypes
    (e.g., Alf in Galician style).'
  - Dialects as a marker of identity and local patriotism.
- section: Практикум — Розпізнавання та розуміння
  words: 600
  points:
  - 'Analysis strategy: How to identify a dialect region by 2-3 key markers (phonetic
    or lexical).'
  - 'Translation challenges: How to render dialectal color when translating to/from
    English.'
  - 'Stylized Translation (Explanation): Theoretical background for the active tasks
    (rewriting standard text into dialect style).'
  - 'Listening strategies: Tuning the ear to non-standard stress and intonation patterns.'
