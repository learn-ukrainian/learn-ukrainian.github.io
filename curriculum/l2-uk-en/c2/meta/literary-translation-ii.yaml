slug: literary-translation-ii
title: Літературний переклад II — проза
word_target: 5000
content_outline:
- section: Вступ — Специфіка перекладу прози
  words: 600
  points:
  - Відкрити розділ автентичним уривком (100–120 слів) з відомого перекладу — показати,
    як голос автора зберігається (або губиться). TTT-тригер.
  - 'Пояснити відмінності прозового перекладу від поетичного: більша синтаксична свобода,
    але жорсткіші зобов''язання перед ритмом прози та послідовністю голосу. Конкретні
    приклади.'
  - 'Осмислити межу між перекладом і адаптацією: де закінчується вірність і починається
    вільна інтерпретація — з реальними прикладами дискусій у перекладознавстві.'
  - 'Ввести ключову термінологію модуля: авторський голос, реалія, соціолект, ідіолект,
    калька, локалізація — коротко, з прикладами. Детальніший розгляд у наступних розділах.'
- section: Переклад авторського голосу
  words: 900
  points:
  - 'Показати, як ідентифікувати авторський стиль: розбір конкретного уривку по осях
    — довжина речення, лексичний реєстр, синтаксична складність, улюблені фігури.
    Таблиця порівняння.'
  - 'Збереження тону і регістру: пояснити, що тон — це не лише вибір слів, а й синтаксичний
    ритм. Порівняти 2–3 різні перекладацькі рішення одного й того самого уривку.'
  - 'Ритм прози: як визначати ритм прозового уривку (чергування коротких і довгих
    речень, асиндетон, полісиндетон), як відтворювати засобами української мови.'
  - 'Синтаксичні особливості оригіналу і що з ними робити: пояснити явище translationese;
    дати правило реструктурування з прикладами трьох найпоширеніших ситуацій (SVOC
    → гнучкий укр. порядок; складений присудок; підрядне часу).'
  - 'Практичний міні-розбір: один уривок — дві версії перекладу (невдала і вдала).
    Аналіз причин.'
- section: Переклад діалогів і мовлення персонажів
  words: 850
  points:
  - 'Пояснити різницю між соціолектом (мовлення соціальної групи: класовий, фаховий,
    вікової) і ідіолектом (індивідуальні мовні особливості персонажа). Приклади з
    відомих текстів.'
  - 'Розмовні елементи: еліпсис, усічені форми, прагматичні частки (ну, от, та й,
    аж) — як їх відтворювати в перекладі; таблиця «джерело → функціональний еквівалент».'
  - 'Сленг і жаргон: проблема часового та культурного зсуву (slang expires); стратегії
    нейтралізації, функціонального аналогу, пояснювальної примітки. Конкретні кейси.'
  - 'Діалекти в перекладі: принцип Лукаша (використовувати рівноцінний ресурс цільової
    мови, а не штучний «говір»). Описати гуцульський/волинський/слобожанський як перекладацький
    інструмент з попередженням про ризики.'
  - 'Звуковий і ритмічний вимір усного мовлення: як передати заїкання, інверсії, незавершені
    речення, паузи — через пунктуацію і синтаксис.'
- section: Переклад реалій і культурних посилань
  words: 850
  points:
  - 'Класифікація реалій: матеріальні (побут, їжа, одяг), соціокультурні (інституції,
    обряди, топоніми), мовні реалії (прислів''я, кліше, гра слів). Дати по 2–3 приклади
    кожного типу.'
  - 'П''ять основних стратегій перекладу реалій: (1) транскрипція, (2) калька, (3)
    функціональний аналог, (4) генералізація/конкретизація, (5) дескриптивний переклад
    (експлікація). Таблиця з прикладами + умови застосування кожної.'
  - 'Примітки перекладача: коли ставити підрядкову примітку, як її формулювати (норма
    обсягу, тон), коли вона є ознакою слабкості перекладу. Приклади.'
  - 'Баланс зрозумілості і автентичності: описати дискусію між domestication (одомашнення)
    і foreignization (очуження) з посиланням на Лоуренса Венуті. Показати, як обидва
    підходи реалізуються в українській перекладацькій традиції.'
  - 'Кейс-стаді: перекласти один уривок з культурно-насиченим текстом двома стратегіями
    — порівняти ефект.'
- section: Практикум — переклад прози з англійської
  words: 700
  points:
  - Надати автентичний англомовний прозовий уривок (150–180 слів) з чітким авторським
    голосом і принаймні однією реалією та одним діалоговим фрагментом.
  - 'Поетапний аналіз перед перекладом: (1) визначити стиль і реєстр, (2) позначити
    реалії, (3) позначити діалектні/соціолектні маркери, (4) схарактеризувати синтаксичний
    ритм.'
  - Запропонувати чернетку перекладу з коментарями на кожне перекладацьке рішення
    (inline — чому обрано той чи інший варіант).
  - 'Редагування і вдосконалення: показати процес перегляду — де голос загубився,
    як відновити ритм. Порівняти чернетку і фінальну версію.'
- section: Практикум — переклад української прози на англійську
  words: 700
  points:
  - Надати уривок із сучасної української прози (150–180 слів) — авторський вибір
    з поясненням, чому цей текст є репрезентативним і важливим для перекладу.
  - 'Обговорити: «для якого читача?» — академічного дослідника vs. широкої аудиторії
    vs. діаспори. Показати, як ця відповідь впливає на стратегії domestication/foreignization.'
  - 'Збереження національної специфіки: які елементи є незамінними (топоніми, звернення,
    культурні маркери), а що можна адаптувати. Конкретні рішення.'
  - 'Представлення українського автора: коротко, як перекладач формулює авторську
    довідку і контекстуальну примітку для іноземного читача (формат і зразок).'
- section: Підсумок
  words: 400
  points:
  - 'Переклад як інтерпретація: узагальнити, що кожен перекладацький вибір є також
    критичним актом — розкрити або приховати певний пласт. Зв''язок з §4.3.7 (трансформація
    стилю).'
  - 'Етика прозового перекладу: права на ідіолект, відповідальність за реалії, видимість
    перекладача. Коротко, без лекції.'
  - 'Від навчального до професійного: що відрізняє перекладача-початківця від майстра
    — не знання стратегій, а чуття, коли яку застосовувати.'
  - Глосарій ключових термінів модуля (6–8 позицій) — стисла довідка для повторення.
