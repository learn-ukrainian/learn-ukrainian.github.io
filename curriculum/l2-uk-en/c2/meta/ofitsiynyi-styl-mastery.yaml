slug: ofitsiynyi-styl-mastery
title: Офіційний стиль — Юридичні документи
word_target: 5000
content_outline:
- section: Вступ — Офіційний стиль на рівні юриста
  words: 600
  points:
  - Визначення та функції офіційно-ділового стилю у правовій сфері
  - 'Основні ознаки: стандартизація, логічність, точність, об''єктивність'
  - 'Підстилі: законодавчий, дипломатичний, адміністративно-канцелярський'
  - Вимоги Державного стандарту до створення юридичних текстів
- section: Договори та угоди
  words: 800
  points:
  - 'Структура типового договору: преамбула, предмет, права та обов''язки'
  - 'Ключові формульні вирази: «Сторони домовилися про таке...», «Цей Договір набуває
    чинності...»'
  - 'Реквізити та оформлення: підписи, печатки, дати'
  - 'Види договорів: купівлі-продажу, оренди, надання послуг (відмінності у формулюваннях)'
- section: Процесуальні документи
  words: 800
  points:
  - 'Позовна заява: структура, аргументація, посилання на законодавство'
  - 'Скарга (апеляційна, касаційна): специфіка мовних засобів оскарження'
  - 'Клопотання: етикет звернення до суду, обґрунтування прохання'
  - 'Судове рішення: аналіз мови резолютивної частини («ВИРІШИВ», «УХВАЛИВ»)'
- section: Адміністративні документи
  words: 700
  points:
  - 'Доручення: види, структура, термін дії, делегування повноважень'
  - 'Акти та протоколи: фіксація фактів, безособові конструкції'
  - 'Службові записки: внутрішня комунікація, доповідні та пояснювальні'
  - 'Накази та розпорядження: імперативний характер, розпорядчі дієслова (НАКАЗУЮ,
    ЗОБОВ''ЯЗУЮ)'
- section: Мовні особливості правової мови
  words: 800
  points:
  - Специфічна юридична термінологія та її однозначність
  - 'Синтаксичні конструкції: ланцюжки родових відмінків, розщеплені присудки'
  - 'Кліше та канцеляризми: коли вони є нормою (згідно з, відповідно до, всупереч)'
  - Умовні конструкції («у разі», «за умови») та часові обмеження
- section: Редагування юридичних текстів
  words: 700
  points:
  - 'Типові помилки: русизми, кальки, лексичні повтори'
  - Баланс між юридичною точністю та зрозумілістю тексту
  - 'Адаптація міжнародних документів: особливості перекладу термінів'
  - 'Уникнення двозначності: як одна кома може змінити суть'
- section: Практикум — Створення документів
  words: 600
  points:
  - Алгоритм складання простого договору про надання послуг
  - Написання скарги на дії посадової особи (кейс-стаді)
  - Аналіз та виправлення помилок у зразку судового рішення
  - Чек-ліст перевірки готового документа
