slug: c2-1-review
title: Повторення C2.1 — Консолідація стилістики
word_target: 5000
content_outline:
- section: Огляд — Сім функціональних стилів
  words: 900
  points:
  - 'Науковий стиль: об''єктивність, термінологічність, логічна послідовність (аналіз
    уривка)'
  - 'Офіційно-діловий: стандартизація, імперативність, кліше (документація)'
  - 'Публіцистичний: заклик, емоційність, суспільна значущість (медіа)'
  - 'Художній: образність, естетична функція, багатозначність (література)'
  - 'Розмовний: спонтанність, еліптичність, емоційна безпосередність (діалог)'
  - 'Релігійний (конфесійний): сакральність, архаїчність, урочистість'
  - 'Епістолярний: адресність, етикетні формули, приватність vs публічність'
- section: Трансформація стилів (Inter-style Transformation)
  words: 800
  points:
  - Алгоритм адаптації наукового тексту для широкої аудиторії (популяризація)
  - Перетворення офіційного повідомлення на публіцистичний допис
  - Збереження змістового ядра (core meaning) при зміні регістру
  - Стратегії уникнення стилістичного дисонансу при трансформації
- section: Милозвучність та евфонія
  words: 700
  points:
  - 'Глобальний принцип милозвучності: уникнення збігу приголосних'
  - 'Система чергувань у/в, і/й: позиційні правила та ритмомелодика'
  - 'Чергування прийменників з/зі/із: коли який варіант є обов''язковим'
  - 'Практикум: редагування тексту для покращення фоніки'
- section: Лексична та синтаксична стилістика
  words: 1000
  points:
  - 'Лексичний відбір: синонімічне багатство vs точність (антоніми, пароніми)'
  - 'Стилістично маркована лексика: архаїзми, неологізми, терміни'
  - 'Синтаксичні фігури: інверсія, еліпсис, риторичні запитання, паралелізм'
  - 'Експресивний синтаксис: парцеляція та градація як засоби впливу'
- section: Індивідуальний голос та ідіостиль
  words: 600
  points:
  - 'Складові авторського стилю: улюблена лексика, ритм, тон'
  - Баланс між наслідуванням канону та пошуком власного голосу
  - Консистентність голосу (Voice Consistency) у великих текстах
  - Розвиток мовної особистості на рівні C2
- section: Когерентність тексту (Text Coherence)
  words: 600
  points:
  - 'Засоби міжфразового зв''язку: лексичні повтори, займенникова заміна'
  - 'Тематична прогресія: тема-рема (дане і нове)'
  - Логічні конектори та переходи (transitional words) для плинності
  - 'Архітектоніка тексту: абзац як змістова єдність'
- section: Рефлексія та планування
  words: 400
  points:
  - Самооцінка прогресу за модулями C2.1 (Checklist компетенцій)
  - Аналіз сильних сторін та зон росту (Gap Analysis)
  - Постановка цілей для фази C2.2 (Літературна майстерність)
  - 'Стратегія подальшого вдосконалення: читання, письмо, практика'
