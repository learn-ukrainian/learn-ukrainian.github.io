slug: language-policy-decolonization
title: Мовна політика та деколонізація
word_target: 5000
content_outline:
- section: 'Вступ: Мовна політика як академічна дисципліна'
  words: 700
  points:
  - 'H3: Визначення та ключові поняття. Define ''мовна політика'', ''мовне планування'',
    and ''мовний менеджмент'' using the C2 academic register.'
  - 'H3: Мова як політичний інструмент. Analyze the relationship between language,
    state power, and ideology in the context of empire-building.'
  - 'H3: Поняття лінгвоциду. Differentiate ''лінгвоцид'' (deliberate, systematic language
    destruction) from natural language shift, establishing clear criteria.'
- section: 'Історична мовна політика: від Валуєвського циркуляру до радянського мовного
    планування'
  words: 900
  points:
  - 'H3: Імперські обмеження. Detail the systemic linguistic suppression via the Valuev
    Circular (1863) and Ems Decree (1876), focusing on their impacts on education
    and public life.'
  - 'H3: Розстріляне відродження. Discuss the physical elimination of the Ukrainian
    intelligentsia and lexicographers (Skrypnyk, Khvylovyi, Zerov) as a form of cultural
    genocide.'
  - 'H3: Радянське мовне планування. Expose the 1958 education reform and the doctrine
    of ''зближення мов'' as ideological covers for administrative ''русифікація''.'
- section: Мовне законодавство незалежної України
  words: 900
  points:
  - 'H3: Еволюція правового поля. Trace the legal journey from the 1989 Language Law
    and Article 10 of the 1996 Constitution to the present.'
  - 'H3: Закон 2019 року. Analyze the scope and implementation mechanisms of the ''Закон
    про забезпечення функціонування української мови як державної''.'
  - 'H3: Інституційні механізми. Explain the specific role of the ''Уповноважений
    із захисту державної мови'' and key Constitutional Court decisions on linguistic
    pluralism.'
- section: Деколонізація мови
  words: 800
  points:
  - 'H3: Теоретичні засади деколонізації. Apply Frantz Fanon''s theories of colonial
    language politics to the Ukrainian linguistic hierarchy.'
  - 'H3: Суржик: колоніальний слід чи соціолект? Analyze the sociolinguistic debate
    around ''суржик'', framing it through the lens of unequal historical prestige
    and colonial interference.'
  - 'H3: Мовне питання. Trace the evolution of the great language debate from the
    19th century to the present, contrasting prescriptivism with descriptivism.'
- section: Воєнний мовний зсув
  words: 800
  points:
  - 'H3: Прискорення мовного зсуву. Present sociological data on the language transition
    after 2014 and 2022, introducing the concept of ''мовна мобілізація''.'
  - 'H3: Мова як маркер безпеки. Discuss the function of language in national resistance,
    information warfare, and the ''свій-чужий'' dichotomy.'
  - 'H3: Динаміка переходу. Examine grassroots and institutional dimensions of voluntary
    language switching in business, social media, and daily life.'
- section: Глобальний контекст
  words: 600
  points:
  - 'H3: Збереження мови в діаспорі. Discuss heritage language maintenance challenges
    in the global Ukrainian diaspora, including the role of Saturday schools.'
  - 'H3: Порівняльні студії. Draw analytical parallels with the Welsh revival, Hebrew
    revitalization, and Irish language policy.'
  - 'H3: Європейська мовна політика. Analyze the EU''s multilingualism policy and
    the implications of the European Charter for Regional or Minority Languages.'
- section: 'Практикум: Аналіз документа мовної політики'
  words: 300
  points:
  - 'H3: Деконструкція документа. Provide a guided academic reading and analysis of
    an excerpt from the 2019 Language Law or a ruling by the Language Ombudsman.'
  - 'H3: Аргументоване есе. Set the parameters and criteria for constructing a C2-level
    analytical essay on a contemporary language challenge, integrating legal and historical
    evidence.'
