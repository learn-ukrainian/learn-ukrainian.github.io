slug: c2-3-review
title: Повторення C2.3 — Консолідація професійної спеціалізації
word_target: 5000
content_outline:
- section: Вступ — Огляд фази C2.3
  words: 400
  points:
  - 'Архітектура професійної мови: від загальних основ до вузької спеціалізації (структура
    30 модулів).'
  - 'Інтеграція навичок: як правнича точність допомагає в медицині, а медична етика
    — в бізнесі.'
  - 'Критерії готовності до Checkpoint C2.3: не просто знання слів, а вміння діяти
    в професійному контексті.'
  - Роль вторинних текстів (анотацій, оглядів) у професійній комунікації.
- section: Блок I — Основи професійної мови (M46-55)
  words: 800
  points:
  - 'Термінологічна матриця: принципи творення та адаптації термінів (пуризм vs запозичення).'
  - 'Мистецтво ділового листування: нюанси етикету, тональності та структури.'
  - 'Публічний виступ та презентація: риторичні прийоми утримання уваги професійної
    аудиторії.'
  - 'Аналіз типових помилок: канцеляризми, які вбивають живу думку, та як їх уникати.'
  - 'Ключовий висновок блоку: професійна мова — це інструмент точності, а не ускладнення.'
- section: Блок II — Правнича українська (M61-65)
  words: 800
  points:
  - 'Мова закону та договору: імперативність, однозначність, безособовість.'
  - 'Синтаксис правничих текстів: складні речення з умовним підпорядкуванням (якщо...
    то...).'
  - 'Ключові терміно-системи: цивільне право, кримінальне право, господарські відносини.'
  - 'Культурний контекст: українська правнича термінологія як спадкоємиця європейської
    традиції.'
  - 'Практичне значення для неюристів: вміння читати угоди та розуміти свої права.'
- section: Блок III — Медична українська (M66-70)
  words: 800
  points:
  - 'Специфіка медичного дискурсу: поєднання латини, міжнародних термінів та українських
    відповідників.'
  - 'Комунікація «лікар-пацієнт»: емпатія, евфемізми та етичні імперативи мовлення.'
  - 'Медична документація: лаконічність, стандартизація, об''єктивність опису.'
  - 'Науковий стиль у медицині: особливості написання статей та звітів про дослідження.'
  - 'Важливість точності: ціна мовної помилки в медичному контексті.'
- section: Блок IV — Професійне портфоліо (M71-73)
  words: 800
  points:
  - 'Стратегія самопрезентації: як вербалізувати свої досягнення без хибної скромності
    та арогантності.'
  - Структура ідеального CV та супровідного листа (Cover Letter) українськими реаліями.
  - 'Цифровий слід: професійна комунікація в соцмережах та на платформах типу LinkedIn.'
  - 'Співбесіда рівня С2: вміння відповідати на незручні питання та вести переговори
    про умови.'
  - 'Особистий бренд фахівця: мовна харизма та професійний ідіолект.'
- section: Інтегрована самооцінка
  words: 600
  points:
  - 'Діагностична карта компетенцій: де я знаходжусь на шкалі від «початківець» до
    «експерт».'
  - 'Ідентифікація «сліпих зон»: лексичні лакуни та граматичні скам''янілості.'
  - 'Стратегія подолання плато: як перейти від «вільного володіння» до «майстерності».'
  - План індивідуального розвитку перед фінальним Checkpoint.
- section: Практикум — Комплексна підготовка
  words: 800
  points:
  - 'Симуляція: Розв''язання міждисциплінарного кейсу (наприклад, юридичний аспект
    медичної реформи).'
  - 'Аналіз тексту: Редагування поганого перекладу професійної статті (пошук кальок
    та помилок).'
  - 'Синтез: Написання виконавчого резюме (Executive Summary) для уявного проєкту.'
  - 'Підготовка до тестування: огляд форматів завдань та стратегій їх виконання.'
  - 'Фінальна настанова: професіоналізм як відповідальність перед мовою.'
