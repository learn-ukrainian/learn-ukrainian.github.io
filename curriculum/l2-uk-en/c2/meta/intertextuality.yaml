slug: intertextuality
title: Інтертекстуальність
word_target: 5000
content_outline:
- section: Вступ — Що таке інтертекстуальність?
  words: 600
  points:
  - 'Визначення Юлії Крістевої: текст як мозаїка цитат та трансформація інших текстів.'
  - Концепція 'смерті автора' Ролана Барта в контексті інтертекстуальності.
  - Діалогізм М. Бахтіна як попередник теорії інтертекстуальності.
  - 'Типи зв''язків: від прямого цитування до несвідомої ремінісценції.'
- section: Алюзія — непряме посилання
  words: 800
  points:
  - 'Визначення алюзії: натяк, розрахований на ерудицію читача.'
  - 'Літературні алюзії: гра з класичними сюжетами (на прикладі українських неокласиків).'
  - Біблійні та міфологічні алюзії в сучасній публіцистиці.
  - 'Маркери алюзії в тексті: власні назви, крилаті вирази, впізнавані ситуації.'
  - 'Функція алюзії: створення подвійного кодування тексту.'
- section: Цитата та ремінісценція
  words: 800
  points:
  - 'Цитата: точне відтворення претексту. Види цитування (пряме, непряме, змішане).'
  - 'Ремінісценція: «смутний спогад» або несвідоме запозичення образу/ритму.'
  - Відмінність ремінісценції від алюзії (ступінь усвідомленості та точності).
  - Епіграф як сильна позиція цитування (паратекстуальний елемент).
  - 'Поняття аплікації: вкраплення цитат у тканину тексту без лапок.'
- section: Пародія та стилізація
  words: 800
  points:
  - Пародія як комічне або сатиричне переосмислення 'чужого слова'.
  - 'Травестія та бурлеск: приклад ''Енеїди'' Котляревського (високе — низьким, низьке
    — високим).'
  - 'Стилізація: імітація стилю автора/епохи з естетичною метою (без насмішки).'
  - 'Пастиш: постмодерністське ''склеювання'' різних стилів (Андрухович, Ірванець).'
  - 'Центон: вірш, повністю складений з рядків інших поетів.'
- section: Палімпсест і гіпертекст
  words: 700
  points:
  - 'Метафора палімпсесту: текст, крізь який просвічують попередні шари культури.'
  - 'Гіпертекстуальність за Ж. Женеттом: відношення похідності тексту В (гіпертексту)
    від тексту А (гіпотексту).'
  - Приклади рімейків та сиквелів у літературі як форми гіпертексту.
  - 'Архітекстуальність: зв''язок тексту з жанровим каноном.'
- section: Практикум — створення інтертекстуального тексту
  words: 700
  points:
  - 'Техніка ''вживленої'' цитати: як інтегрувати чуже слово органічно.'
  - 'Створення алюзій: вибір загальновідомого претексту (Гамлет, Біблія, Шевченко).'
  - 'Вправа на стилізацію: написання уривка в манері відомого українського письменника
    (напр., Стефаника чи Коцюбинського).'
  - Аналіз інтертекстуальних шарів у уривку постмодерного тексту.
- section: Підсумок
  words: 600
  points:
  - Інтертекстуальність як невід'ємна риса будь-якого тексту (немає текстів поза культурою).
  - 'Читацька компетенція: здатність розкодувати інтертекстуальні посилання.'
  - Роль інтертекстуальності в українській літературі (від бароко до сьогодення).
  - Заклик до свідомого використання 'чужого слова' у власному мовленні.
