slug: interpretation-advanced
title: Поглиблений усний переклад
word_target: 5000
content_outline:
- section: Усний переклад як професія
  words: 600
  points:
  - 'Чіткий контраст між письмовим перекладом (translation) і усним (interpretation):
    темп, умови, помилки, стрес — наводяться конкретні приклади, що унаочнюють різницю'
  - 'Три основні режими усного перекладу: послідовний (consecutive), синхронний (simultaneous),
    шептання (chuchotage/переклад шепотінням) — коли і де застосовується кожен'
  - 'Ринок усного перекладу в Україні: роль українських перекладачів у ЄС/НАТО/ООН,
    попит після 2022 року, AIIC-акредитація, фахові асоціації в Україні'
- section: Послідовний переклад
  words: 1000
  points:
  - 'Техніка ведення нотаток (нотація): принципи системи нотації за Розаном — не стенографія,
    а смисловий скелет; пояснюється ідея структурування за предикатами, а не за словами'
  - 'Символи та скорочення: приклади з реальної практики — 15-20 символів із поясненням
    (стрілки, логічні зв''язки, часові маркери); читач практикує власну систему'
  - 'Тренування пам''яті: короткочасна та довгострокова пам''ять у послідовному перекладі;
    техніки запам''ятовування великих обсягів — chunking, структурування за темою'
  - 'Відтворення змісту українською: не буквальний переклад, а смислова точність;
    як уникати кальок під тиском — активаційні блоки готових еквівалентів; приклади
    з дипломатичного/конференційного дискурсу'
- section: Синхронний переклад — Знайомство
  words: 1000
  points:
  - 'Когнітивні вимоги: одночасне слухання, розуміння, прийняття рішень і мовлення
    — чому це виснажує мозок, фізіологічний аспект (ротація кожні 20-30 хв.)'
  - 'Модель зусиль Жіля (Gile''s Effort Model): три зусилля — Listening & Analysis,
    Production, Memory — подається у вигляді схеми/таблиці; рівняння EL+EP+EM ≤ TE
    пояснюється на прикладі'
  - 'Техніка відставання (décalage): оптимальний часовий проміжок, чому занадто мале
    і занадто велике відставання однаково небезпечні; приклад із реальним конфігурацій
    речення (іменна група на початку → дієслово в кінці)'
  - 'Обладнання та робоче місце: стандарти ISO 2603 для кабіни — акустична ізоляція,
    вентиляція, видимість зали; пульт перекладача, мікрофон, виносні монітори'
- section: Розвиток ключових навичок
  words: 900
  points:
  - 'Активне слухання: слухати смисл, не слова — вправи на виявлення основного повідомлення
    крізь «шум»; розрізнення головної та другорядної інформації'
  - 'Shadowing (тіньове повторення): базова вправа для синхронізації слухання і мовлення
    — три рівні складності (рідна мова, повільний темп → висока швидкість → міжмовний
    shadowing); точна інструкція для самостійного відпрацювання'
  - 'Парафразування як стратегія: коли і як перефразовувати замість прямого перекладу
    — вставні конструкції, узагальнення, антипасив; вправи на перефразування юридичних
    та наукових текстів українською'
  - 'Розширення робочої пам''яті: доказово обґрунтовані методи — chunking, візуалізація,
    техніки концентрації; конкретна тижнева програма вправ для самостійного тренування'
- section: Етика та професійні стандарди
  words: 800
  points:
  - 'Конфіденційність: юридичний та етичний виміри — NDA у практиці, приклади порушень
    і наслідки; специфіка кабіни (перекладач чує всі переговори, але не може передавати
    інформацію)'
  - 'Нейтральність перекладача: класичний принцип «невидимого перекладача» (invisible
    interpreter) і сучасна дискусія про нього — коли нейтральність неможлива (ненависницьке
    мовлення, пропаганда), що робить AIIC, FIT'
  - 'Робота в стресових ситуаціях: психологічна готовність, технічні збої, оратор
    говорить забагато/надто швидко — стратегії (сигналізування, «вбивання часу», компресія)'
  - 'Професійні асоціації: AIIC (International Association of Conference Interpreters)
    — умови членства; УАП (Українська асоціація перекладачів); ЄС «Scic» (Joint Interpreting
    and Conference Service) — перспективи для українців'
- section: Практична майстерня
  words: 700
  points:
  - 'Вправи на розвиток пам''яті: конкретні завдання — 3 тексти різної складності
    для запам''ятовування і відтворення; критерії оцінювання точності'
  - 'Практика нотації: 2-3 адаптованих уривки конференційних виступів → студент будує
    власну нотаційну систему, порівнює з рекомендованими символами'
  - 'Послідовний переклад короткого виступу: скрипт виступу 3-4 хв. → відтворення
    українською з нотатками; чеклист типових помилок для самооцінювання'
  - 'Shadowing та парафразування: покрокові завдання — аудіо → shadowing → парафразування
    → порівняння з «еталонним» перекладом; підсумкова рефлексія з питаннями для самоаналізу'
