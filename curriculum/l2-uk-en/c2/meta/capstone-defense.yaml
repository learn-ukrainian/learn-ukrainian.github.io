slug: capstone-defense
title: Дипломний проєкт — Захист
word_target: 5000
content_outline:
- section: Вступ — Захист як кульмінація проєкту
  words: 600
  points:
  - 'Захист як ритуал ініціації в наукову спільноту: перехід від студента до фахівця'
  - 'Формат та процедура захисту: від вступного слова до оголошення оцінок'
  - 'Критерії оцінювання: на що саме звертає увагу комісія (зміст vs подача)'
  - 'Психологічне налаштування: впевненість як компонент професійної компетентності'
- section: Підготовка презентації
  words: 1000
  points:
  - 'Архітектура виступу: відбір ключових результатів з великого масиву даних'
  - 'Візуальна екологія слайдів: принцип ''менше тексту, більше сенсу'''
  - 'Тайм-менеджмент: мистецтво вкластися в жорсткий регламент (7-10 хвилин)'
  - Баланс між деталізацією методології та демонстрацією практичних висновків
- section: Техніка усного виступу
  words: 1000
  points:
  - 'Академічна риторика: маркери наукового стилю в усному мовленні'
  - 'Невербальна комунікація: зоровий контакт, жестикуляція, поза доповідача'
  - 'Голос як інструмент: інтонування, паузи, темп мовлення для акцентування головного'
  - 'Поширені помилки: читання з аркуша, монотонність, втрата контакту з аудиторією'
- section: Відповіді на запитання
  words: 1000
  points:
  - 'Типологія запитань: уточнюючі, провокаційні, дискусійні та ''запитання на засипку'''
  - 'Алгоритм відповіді: подяка -> перефразування -> відповідь -> підтвердження'
  - Мистецтво визнавати обмеження дослідження без втрати авторитету
  - 'Стратегії захисту авторської позиції: як не погоджуватися ввічливо'
- section: Робота зі стресом
  words: 600
  points:
  - 'Фізіологія стресу під час публічного виступу: чому тремтять руки і як це приховати'
  - Техніки миттєвої релаксації перед виходом на трибуну (дихання, заземлення)
  - 'Когнітивне переформулювання: стрес як мобілізація ресурсу, а не загроза'
  - 'Робота з форс-мажорами: що робити, якщо зламався проєктор або забули слово'
- section: Практика — Пробний захист
  words: 800
  points:
  - 'Методика самостійної репетиції: запис на відео та самоаналіз'
  - 'Симуляція запитань: підготовка ''банків відповідей'' на ймовірні зауваження'
  - 'Чек-лист готовності: технічне забезпечення, зовнішній вигляд, роздаткові матеріали'
  - 'Фінальна поліровка: перевірка наголосів у термінах та логічних зв''язок'
