slug: advanced-rhetoric
title: Поглиблена риторика
word_target: 5000
content_outline:
- section: 'Вступ: Від риторики до красномовства'
  words: 500
  points:
  - 'Definition of rhetoric at the C2 level: strategy, not just decoration'
  - 'Historical context: The Kyiv-Mohyla school and the Ukrainian Baroque tradition'
  - Distinction between C1 persuasion (argumentation) and C2 eloquence (aesthetic
    impact)
  - 'The ethical dimension of rhetoric: manipulation vs. inspiration'
- section: Складні фігури мовлення
  words: 1200
  points:
  - 'Хіазм (Chiasmus): The mirror structure (AB-BA) for memorable contrasts'
  - 'Зевгма (Zeugma): Grammatical economy and wit — connecting abstract and concrete'
  - 'Оксиморон (Oxymoron): The cognitive impact of contradictory pairings'
  - 'Асиндетон (Asyndeton): Creating urgency through the omission of conjunctions'
  - 'Полісиндетон (Polysyndeton): Creating weight and solemnity through excess conjunctions'
  - 'Еліпсис (Ellipsis): The power of silence and omission in high style'
- section: Ритм і композиція промови
  words: 1200
  points:
  - 'Tricolon (The Rule of Three): Rhythmic completeness and crescendo'
  - 'Антиметабола (Antimetabole): Repetition in reverse order for logical finality'
  - 'Кільцева композиція (Ring Composition): Structural unity by returning to the
    opening motif'
  - 'The Peroration: Techniques for the emotional climax of a speech'
  - 'Rhythm and breath: How sentence length controls the audience''s pulse'
- section: Аналіз великих промов
  words: 1100
  points:
  - Deconstructing a classical Ukrainian political speech (e.g., Vynnychenko or Hrushevsky)
  - 'Literary analysis: The rhetorical structure of Ivan Franko''s monologues'
  - 'Religious oratory: The Baroque sermon techniques of Ioanikii Galyatovsky'
  - 'Comparative analysis: Ukrainian emotive rhetoric vs. Western rational rhetoric'
- section: 'Практика: Мистецтво промови'
  words: 600
  points:
  - 'Synthesis exercise: Constructing a paragraph using chiasmus and tricolon'
  - 'Rewrite task: Transforming a dry news report into a rhetorical appeal'
  - 'Identification task: Spotting zeugma and asyndeton in complex texts'
  - 'Debate simulation: Using rhetorical figures to defend a controversial thesis'
- section: Підсумок
  words: 400
  points:
  - 'Taxonomy review: A systematic table of all figures covered'
  - 'Self-assessment checklist: Evaluating the ''temperature'' and ''rhythm'' of a
    speech'
  - 'Final thought: Rhetoric as a tool for national self-expression'
