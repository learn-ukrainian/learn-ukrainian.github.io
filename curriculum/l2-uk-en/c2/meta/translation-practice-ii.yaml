slug: translation-practice-ii
title: Практика перекладу II — Спеціалізований переклад
word_target: 5000
content_outline:
- section: Вступ — Світ спеціалізованого перекладу
  words: 600
  points:
  - 'Визначення та класифікація видів спеціалізованого перекладу: технічний, юридичний,
    медичний, економічний.'
  - 'Профіль компетентності технічного перекладача: знання мови vs знання предметної
    галузі.'
  - 'Огляд ринку перекладацьких послуг в Україні: попит, ставки, ключові гравці та
    тенденції.'
  - Етичний кодекс перекладача та відповідальність за точність передачі інформації.
- section: Науковий і технічний переклад
  words: 1000
  points:
  - Поняття терміносистеми та вимоги до науково-технічного терміна (однозначність,
    точність, стилістична нейтральність).
  - Робота з термінологічними стандартами ДСТУ та міжнародними стандартами ISO.
  - 'Особливості перекладу науково-технічних текстів: синтаксичні конструкції, безособові
    форми, логічність викладу.'
  - 'Специфіка оформлення та перекладу нетекстових елементів: формул, таблиць, графіків,
    схем.'
  - 'Типові помилки в технічному перекладі: калькування, хибні друзі перекладача,
    порушення узусу.'
- section: Юридичний переклад
  words: 1000
  points:
  - 'Характеристика правничої мови: кліше, архаїзми, формалізм, точність формулювань.'
  - Проблема еквівалентності правових понять різних правових систем (англо-американської
    та континентальної).
  - 'Особливості перекладу основних типів документів: договорів, контрактів, статутів,
    судових рішень.'
  - 'Сертифікований та нотаріальний переклад: процедура засвідчення, вимоги до оформлення,
    роль присяжного перекладача.'
  - Переклад офіційних назв установ, посад та реалій міжнародного права.
- section: Медичний переклад
  words: 800
  points:
  - 'Специфіка медичної термінології: роль латини, грецьких коренів, міжнародних непатентованих
    назв (МНН).'
  - 'Типи медичних текстів: історії хвороби, клінічні дослідження, інструкції до препаратів,
    наукові статті.'
  - 'Вимоги до перекладу фармацевтичної документації та інструкцій: сувора регламентація
    та стандартизація.'
  - Етичні аспекти та конфіденційність у медичному перекладі.
  - Хибні друзі перекладача в медицині (наприклад, 'angina', 'preservative', 'cystic').
- section: Інструменти перекладача
  words: 800
  points:
  - 'Огляд сучасних CAT-систем (Computer-Assisted Translation): Trados, MemoQ, Smartcat
    — принцип роботи та переваги.'
  - Створення та управління термінологічними базами (Termbases) та пам'яттю перекладів
    (Translation Memories).
  - 'Роль машинного перекладу (MT) та нейромереж у роботі професійного перекладача:
    можливості та обмеження.'
  - 'Постредагування (Post-editing) машинного перекладу: стратегії, рівні якості,
    оплата праці.'
  - Засоби контролю якості (QA tools) для забезпечення єдності термінології та форматування.
- section: Практична майстерня
  words: 800
  points:
  - 'Алгоритм роботи над спеціалізованим текстом: від аналізу вихідного тексту до
    фінальної вичитки.'
  - 'Практикум: аналіз паралельних текстів українською та англійською мовами (технічний
    або юридичний уривок).'
  - 'Створення власного міні-глосарію до тексту: вибір відповідників, перевірка за
    словниками.'
  - 'Редагування та коректура перекладу: чек-лист для самоперевірки.'
  - 'Поради щодо професійного розвитку: спеціалізація, сертифікація, членство в асоціаціях.'
