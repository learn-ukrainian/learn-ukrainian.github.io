slug: professional-oral-communication
title: Усна професійна комунікація
word_target: 5000
content_outline:
- section: 'Вступ: Специфіка усної професійної комунікації'
  words: 600
  points:
  - 'Відмінності між усним та письмовим діловим мовленням: спонтанність vs підготовленість.'
  - 'Роль невербальної комунікації: жести, міміка, інтонація в українському бізнес-етикеті.'
  - 'Адаптація мовлення до контексту: від офіційного засідання до неформального брейнстормінгу.'
  - Поняття комунікативної компетенції фахівця.
- section: Мистецтво професійної презентації
  words: 1000
  points:
  - 'Структура ефективної презентації: хук, основна частина, заклик до дії (CTA).'
  - 'Візуалізація даних: сучасна українська термінологія для опису графіків та діаграм.'
  - 'Сторітелінг у бізнесі: як перетворити сухі факти на переконливу історію.'
  - Техніки утримання уваги авдиторії та робота з 'важкими' запитаннями.
- section: Культура нарад та засідань
  words: 1000
  points:
  - 'Типологія нарад: планірка, брейнстормінг, ретроспектива, стратегічна сесія.'
  - 'Роль модератора: фрази для керування дискусією та таймінгом.'
  - Етикет черговості виступів (turn-taking) та перебивання в українській діловій
    культурі.
  - 'Формулювання та затвердження рішень: від обговорення до протоколу.'
- section: Конференційна та публічна комунікація
  words: 800
  points:
  - 'Жанри публічних виступів: наукова доповідь, пітчинг, вітальна промова.'
  - Специфіка постерних сесій та коротких самопрезентацій (elevator pitch).
  - 'Мистецтво нетворкінгу: як зав''язувати професійні знайомства українською мовою.'
  - 'Small talk у професійному середовищі: дозволені та табуйовані теми.'
- section: 'Дистанційна комунікація: виклики сучасності'
  words: 800
  points:
  - 'Етикет відеоконференцій: технічні та комунікативні аспекти.'
  - Подолання бар'єрів відсутності візуального контакту.
  - Специфіка телефонних переговорів та голосових повідомлень.
  - 'Гібридні формати роботи: поєднання офлайн та онлайн учасників.'
- section: 'Практикум: Стратегії самовдосконалення'
  words: 800
  points:
  - Алгоритм підготовки до важливого виступу.
  - Техніки подолання страху публічних виступів.
  - Аналіз власних помилок та робота зі зворотним зв'язком.
  - Ресурси для розвитку ораторської майстерності (TEDx, Toastmasters в Україні).
