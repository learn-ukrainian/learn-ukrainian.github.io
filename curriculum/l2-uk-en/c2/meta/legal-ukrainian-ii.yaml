slug: legal-ukrainian-ii
title: Правнича українська II — Договори та угоди
word_target: 5000
content_outline:
- section: Вступ — Структура договору в українському праві
  words: 600
  points:
  - 'Загальна архітектура договору: від ''шапки'' до підписів'
  - Юридичне значення обов'язкових реквізитів (дата, місце, назва)
  - 'Класифікація договорів за Цивільним кодексом України: односторонні, двосторонні,
    багатосторонні'
  - Відмінність між поняттями 'договір', 'угода' та 'контракт' в українському законодавстві
- section: Преамбула та сторони договору
  words: 700
  points:
  - 'Стандарти формулювання преамбули: хто, коли і де'
  - 'Ідентифікація сторін: повна назва, код ЄДРПОУ/РНОКПП, адреса'
  - 'Перевірка повноважень підписантів: ''що діє на підставі Статуту/Довіреності'''
  - Використання скорочень 'далі — Замовник', 'далі — Виконавець' для спрощення тексту
- section: Предмет договору та істотні умови
  words: 800
  points:
  - 'Чітке визначення предмета договору: товар, послуга, майно'
  - Поняття 'істотних умов' (essential terms) без яких договір є нікчемним
  - 'Деталізація прав та обов''язків сторін: баланс інтересів'
  - 'Фіксація строків виконання зобов''язань: календарні дні vs робочі дні'
- section: Фінансові умови та порядок розрахунків
  words: 700
  points:
  - 'Фіксація ціни договору: з ПДВ чи без ПДВ'
  - Валютне застереження та прив'язка до курсу НБУ у довгострокових договорах
  - 'Етапи оплати: передплата (аванс) та післяплата за актом'
  - 'Види фінансових санкцій: різниця між штрафом (фіксована сума/%) та пенею (за
    кожен день)'
- section: Відповідальність сторін та форс-мажор
  words: 700
  points:
  - Матеріальна відповідальність за невиконання умов
  - Визначення форс-мажорних обставин (непереборної сили) та їх підтвердження (Торгово-промислова
    палата)
  - 'Порядок вирішення спорів: переговори, претензійний порядок, суд'
  - Застереження про конфіденційність
- section: Прикінцеві положення та підписи
  words: 600
  points:
  - Строк дії договору vs строк виконання зобов'язань
  - Процедура внесення змін та доповнень (додаткові угоди)
  - Кількість примірників та їх юридична сила
  - Вимоги до підписів та печаток (регламентація використання КЕП/ЕЦП)
- section: Практикум — Аналіз та складання договорів
  words: 900
  points:
  - 'Кейс-стаді: детальний аналіз типового договору оренди житла'
  - Виявлення 'підводних каменів' та ризикових формулювань у зразку
  - 'Вправа на редагування: виправлення помилок у ''слабкому'' договорі'
  - Складання простого договору про надання послуг (шаблон)
