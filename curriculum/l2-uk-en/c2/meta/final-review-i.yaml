slug: final-review-i
title: Фінальне повторення I — Граматична консолідація
word_target: 5000
content_outline:
- section: 'Вступ: Граматична досконалість C2'
  words: 400
  points:
  - Відмінність між рівнем C1 (вільне володіння) та C2 (майстерність)
  - Роль інтуїтивного відчуття мови проти академічного знання
  - 'Стратегія ''свідомого редагування'': як аналізувати власне мовлення'
  - Огляд змін у правописі 2019 року як контекст для повторення
- section: 'Морфологічна система: Повне повторення'
  words: 1200
  points:
  - 'Іменник: складні випадки роду, числа та відмінювання (кличний відмінок)'
  - 'Прикметник та Числівник: узгодження у складних конструкціях (два з половиною
    роки)'
  - 'Дієслово: нюанси виду, давноминулий час, наказовий спосіб у непрямій мові'
  - 'Займенник та Службові частини мови: стилістичні функції часток та сполучників'
- section: 'Синтаксична система: Архітектура думки'
  words: 1200
  points:
  - 'Просте речення: інверсія та актуальне членування (тема-рема)'
  - 'Складне речення: багатокомпонентні конструкції з різними видами зв''язку'
  - 'Безсполучникові речення: ритм, динаміка та емоційне напруження'
  - Період як вища форма синтаксичної організації тексту
- section: 'Складні випадки та винятки: Зона майстерності'
  words: 1000
  points:
  - 'Варіативність норми: коли помилка стає художнім засобом'
  - Архаїчні та діалектні форми в сучасному літературному мовленні
  - Типові кальки та 'суржик інтелігенції' (приховані помилки)
  - Стилістичне забарвлення граматичних форм (книжні vs розмовні)
- section: 'Практичне застосування: Стилістична гнучкість'
  words: 800
  points:
  - 'Граматика офіційно-ділового стилю: чіткість і безособовість'
  - 'Граматика публіцистики: експресія та вплив'
  - 'Редакторський практикум: ''лікування'' канцеляриту та багатослів''я'
  - 'Мистецтво перефразування: одна думка — десять граматичних форм'
- section: Діагностика та план дій
  words: 400
  points:
  - Як проводити регулярний самоаудит граматики
  - Робота зі словниками та корпусами (ГРАК, СУМ)
  - 'Індивідуальна траєкторія: від виправлення помилок до шліфування стилю'
