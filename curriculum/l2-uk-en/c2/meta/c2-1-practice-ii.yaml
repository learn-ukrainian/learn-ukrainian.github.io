slug: c2-1-practice-ii
title: Практика C2.1 II — Вправи на трансформацію
word_target: 5000
content_outline:
- section: Вступ — Трансформація як майстерність
  words: 600
  points:
  - 'Трансформація тексту як ключова компетенція рівня C2: від розуміння до маніпуляції.'
  - 'Баланс форми та змісту: як змінити оболонку, не пошкодивши ядро інформації.'
  - 'Критерії успішної адаптації: точність, доречність, читабельність.'
  - 'Огляд основних векторів трансформації: спрощення, ускладнення, зміна тональності.'
- section: Трансформація 1 — Юридичний → Журналістський → Блог
  words: 900
  points:
  - 'Аналіз вихідного тексту: структура офіційно-ділового документу (закон, постанова).'
  - 'Крок 1: Переклад на мову медіа. Як перетворити імперативи на інфоприводи.'
  - 'Крок 2: Адаптація для блогу/Telegram. Особистий тон, емоційне забарвлення, клікбейтність.'
  - 'Порівняльний розбір трьох версій: що зникло (пасивний стан), що з''явилося (метафори).'
  - 'Типові помилки: залишки канцеляриту в живому тексті.'
- section: Трансформація 2 — Наукова стаття → Популярна → Соцмережі
  words: 900
  points:
  - 'Аналіз вихідного тексту: академічний синтаксис, термінологічна щільність, безособовість.'
  - 'Крок 1: Науково-популярна стаття. Введення наративу, пояснення термінів через
    аналогії.'
  - 'Крок 2: Формат Twitter/Instagram. Стиснення до суті, візуалізація даних текстом,
    хештеги.'
  - 'Робота з фактажем: як не викривити наукову істину заради хайпу.'
  - Приклад вдалої метафоризації складного концепту.
- section: Трансформація 3 — Формальна промова → Неформальне пояснення → Жарт
  words: 900
  points:
  - 'Офіційний виступ: риторичні фігури, пафос, дистанція з аудиторією.'
  - 'Крок 1: Кулуарне пояснення (''на пальцях''). Зняття пафосу, прямий контакт, скорочення
    дистанції.'
  - 'Крок 2: Перетворення на анекдот чи мем. Гіперболізація, іронія, парадокс.'
  - 'Межі припустимого: коли гумор руйнує репутацію, а коли рятує ситуацію.'
  - Техніка 'зниження регістру' без втрати авторитету.
- section: 'Multi-step трансформація: Ланцюгова реакція'
  words: 600
  points:
  - 'Поняття ланцюжка перетворень: послідовна зміна цільових аудиторій.'
  - 'Контроль якості на проміжних етапах: де виникає ефект ''зіпсованого телефону''.'
  - 'Зворотна трансформація (Reverse Engineering): спроба відновити оригінал зі спрощеної
    версії.'
  - Вправа на відновлення втрачених деталей контексту.
- section: 'Peer comparison: Порівняння стратегій'
  words: 500
  points:
  - 'Варіативність рішень: чому один текст можна трансформувати по-різному.'
  - 'Аналіз кейсів: порівняння ''сухого'' та ''креативного'' підходів до одного завдання.'
  - Стратегія 'відсікання зайвого' проти стратегії 'перефразування'.
  - 'Обговорення кращих практик: як колеги вирішують стилістичні дилеми.'
- section: 'Оцінка збереження інформації: Етика спрощення'
  words: 600
  points:
  - 'Інформаційна ентропія: що неминуче втрачається при зміні каналу.'
  - Визначення критичних елементів змісту (Must-have vs Nice-to-have).
  - 'Етичні межі: маніпуляція через спрощення та виривання з контексту.'
  - 'Підсумок: відповідальність автора за інтерпретацію.'
