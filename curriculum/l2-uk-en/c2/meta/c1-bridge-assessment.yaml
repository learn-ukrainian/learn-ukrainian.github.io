slug: c1-bridge-assessment
title: Перехідний модуль C1→C2 та діагностика
word_target: 5000
content_outline:
- section: Вступ — Що означає рівень C2?
  words: 800
  points:
  - Концептуальна різниця між C1 (ефективна комунікація) та C2 (майстерність і точність).
  - 'Огляд дескрипторів CEFR та Держстандарту 2024: від ''вільного володіння'' до
    ''авторського стилю''.'
  - 'Метафора ''Архітектора мови'': перехід від інтуїтивного до свідомого конструювання
    тексту.'
  - 'Чек-ліст самоперевірки: чи відчуваєте ви різницю між ''сказати'' і ''висловити''?'
- section: Діагностика граматичних компетенцій
  words: 1000
  points:
  - 'Стрес-тест на відмінки: нетипові іменники (IV відміна, іншомовні слова) та подвійні
    форми.'
  - 'Синтаксична гнучкість: трансформація простих речень у розгорнуті періоди і навпаки.'
  - 'Дієприкметникові та дієприслівникові звороти: активні конструкції проти пасивних
    (уникнення канцеляриту).'
  - 'Модальність і тональність: як граматика змінює категоричність висловлювання (напр.,
    умовний спосіб).'
- section: Діагностика стилістичних компетенцій
  words: 1000
  points:
  - Розпізнавання 7 функціональних стилів за §4.3.1.1 Держстандарту (включно з конфесійним
    та епістолярним).
  - 'Вправа на ''переклад'' стилів: як одну думку висловити науковою, публіцистичною
    та розмовною мовою.'
  - 'Табу C2: суржик, калька, лексичні повтори (тавтологія vs плеоназм).'
  - 'Евфонія тексту: ритмомелодика як маркер майстерності (чергування у/в, і/й як
    стилістичний засіб).'
- section: Діагностика літературних компетенцій
  words: 1000
  points:
  - 'Інтертекстуальність: здатність бачити приховані цитати та алюзії (Шевченко, Хвильовий,
    Костенко).'
  - 'Аналіз підтексту: що автор ''не сказав'', але мав на увазі (іронія, сарказм,
    алегорія).'
  - 'Робота з конотаціями: емоційне забарвлення синонімів (йти - чвалати - крокувати).'
  - 'Створення вторинних текстів (§4.3.8): анотація vs рецензія vs критичний есей.'
- section: Виявлення прогалин та Personal SWOT
  words: 600
  points:
  - 'Методика аналізу помилок: розрізнення ''випадкових описок'' та ''системних прогалин''.'
  - Створення індивідуальної карти компетенцій (Strengths, Weaknesses, Opportunities,
    Threats).
  - 'Роль словників на рівні C2: перехід від перекладних до тлумачних та синонімічних
    (SUM-11, SUM-20).'
  - 'Психологія перфекціонізму: як не застрягти на плато.'
- section: Підсумок та шлях уперед
  words: 600
  points:
  - 'Структура курсу C2: чотири етапи (Стилістика, Література, Професійна майстерність,
    Capstone).'
  - 'Очікування від студента: автономність, дослідницький підхід, створення власного
    контенту.'
  - 'Завдання-виклик: написати ''мовну автобіографію'' у трьох різних стилях.'
  - 'Заклик до дії: C2 — це не фініш, це початок творчості.'
