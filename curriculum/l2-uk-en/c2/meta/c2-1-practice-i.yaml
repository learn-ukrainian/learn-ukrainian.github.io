slug: c2-1-practice-i
title: Практика C2.1 I — Стилістичне портфоліо
word_target: 5000
content_outline:
- section: Вступ — Портфоліо як демонстрація майстерності
  words: 400
  points:
  - 'Концепція стилістичного портфоліо: відбір найкращих зразків текстів для демонстрації
    мовної компетенції С2.'
  - 'Критерії оцінювання: відповідність жанру, багатство лексики, граматична точність,
    стилістична доречність.'
  - 'Структура портфоліо: шість обов''язкових текстів, що репрезентують різні функціональні
    стилі української мови.'
  - Роль саморефлексії у процесі вдосконалення навичок письма.
- section: 'Текст 1 — Науковий стиль: Академічна точність'
  words: 700
  points:
  - 'Специфіка наукового стилю: об''єктивність, термінологічна точність, логічна послідовність,
    відсутність емоційності.'
  - 'Жанр: Анотація до наукової статті або вступ до дослідження.'
  - 'Мовні засоби: безособові конструкції, пасивні дієприкметники (обережно), складнопідрядні
    речення причини та наслідку.'
  - 'Типові помилки: надмірна метафоричність, суб''єктивність, розмовні вкраплення.'
- section: 'Текст 2 — Офіційний стиль: Стандартизація та протокол'
  words: 700
  points:
  - 'Особливості офіційно-ділового стилю: стандартизація, імперативність, документальність,
    сувора регламентація.'
  - 'Жанр: Офіційний лист-запит або службова записка.'
  - 'Мовні кліше як інструмент ефективності: «відповідно до», «згідно з», «з огляду
    на».'
  - 'Етикет офіційного листування: звертання, формули ввічливості, підпис.'
- section: 'Текст 3 — Публіцистичний стиль: Переконання та вплив'
  words: 700
  points:
  - 'Мета публіцистики: інформування та вплив на громадську думку, поєднання логіки
    та емоційності.'
  - 'Жанр: Авторська колонка (опініон) або проблемна стаття.'
  - 'Риторичні фігури: риторичні запитання, антитези, градація, емоційно забарвлена
    лексика.'
  - Баланс між фактами та оціночними судженнями.
- section: 'Текст 4 — Художній стиль: Естетика та образність'
  words: 700
  points:
  - 'Естетична функція мови: образність, метафоричність, індивідуалізація мовлення.'
  - 'Жанр: Етюд або уривок оповідання (опис природи чи психологічного стану).'
  - 'Використання тропів: метафора, епітет, порівняння, персоніфікація.'
  - Уникнення штампів та пошук власного ідіостилю.
- section: 'Текст 5 — Розмовний стиль: Спонтанність та природність'
  words: 600
  points:
  - 'Характеристики розмовного стилю: спонтанність, діалогічність, емоційність, ситуативність.'
  - 'Жанр: Скрипт діалогу або запис подкасту (імітація живого мовлення).'
  - Дискурсивні маркери, еліптичні речення, вигуки, модальні частки.
  - Відмінність літературного розмовного стилю від просторіччя та суржику.
- section: 'Текст 6 — Епістолярний стиль: Особистий вимір'
  words: 600
  points:
  - 'Епістолярний жанр як простір для самовираження: інтимність, сповідальність, діалогічність.'
  - 'Жанр: Приватний лист другу або видатному діячу (уявний).'
  - 'Традиції українського листування: формули вітання та прощання, етикетні звороти.'
  - Вплив цифрової ери на епістолярний стиль (електронні листи vs паперові).
- section: 'Самооцінка та рефлексія: Шлях до майстерності'
  words: 600
  points:
  - 'Методологія самоаналізу: порівняння власних текстів із критеріями С2.'
  - 'Аналіз сильних сторін: що вдалося найкраще (лексика, структура, стиль).'
  - 'Ідентифікація зон росту: типові помилки та стратегії їх усунення.'
  - Складання плану подальшого вдосконалення стилістичної компетенції.
