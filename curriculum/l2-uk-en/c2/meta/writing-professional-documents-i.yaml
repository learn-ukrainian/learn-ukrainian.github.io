slug: writing-professional-documents-i
title: Написання професійних документів I — Звіти та реферати
word_target: 5000
content_outline:
- section: Вступ — Письмове професійне мовлення
  words: 800
  points:
  - Фундаментальні відмінності між усним та письмовим професійним дискурсом (документованість,
    точність, безваріантність).
  - 'Принципи ефективного професійного письма: лаконічність, логічна послідовність,
    стандартизація.'
  - 'Етап підготовки: визначення мети документа, аудиторії та контексту написання.'
  - 'Поняття мовного кліше та канцеляризму: коли вони необхідні, а коли шкідливі.'
- section: Реферат — Короткий виклад
  words: 1000
  points:
  - 'Визначення реферату в українській академічній традиції: відмінність від ''summary''
    та ''essay''.'
  - 'Класифікація рефератів: інформативні (конспект) та індикативні (вказівні).'
  - 'Універсальна структура реферату: вступ, основна частина (огляд джерел), висновки,
    список літератури.'
  - 'Техніка реферування: компресія тексту, виокремлення головного, перефразування.'
- section: Анотація — Стисла характеристика
  words: 800
  points:
  - 'Анотація як метатекст: функція ''навігатора'' для читача.'
  - 'Структурні елементи анотації: тема, проблематика, мета, результати (без деталізації).'
  - 'Обсяг та мовні особливості: синтаксична компресія, безособові речення.'
  - 'Ключові слова: принципи вибору та оформлення для пошукових систем.'
- section: Звіт — Офіційний документ
  words: 1000
  points:
  - 'Звіт як документ офіційно-ділового стилю: юридична відповідальність автора.'
  - 'Типологія звітів: наукові (НДР), технічні, фінансові, адміністративні.'
  - Вимоги ДСТУ 3008:2015 до структури звіту (реферат, вступ, суть, висновки, рекомендації).
  - 'Мовні засоби звітування: констатація фактів, використання пасивних конструкцій,
    статистичних даних.'
- section: Повідомлення та доповідна записка
  words: 800
  points:
  - 'Доповідна записка як інструмент внутрішньої комунікації: вертикаль ''підлеглий-керівник''.'
  - 'Структура доповідної записки: заголовок, виклад проблеми, пропозиції/висновки,
    підпис.'
  - 'Повідомлення (notice/memo): інформаційна функція, лаконічність, відсутність аналітичної
    частини.'
  - 'Етикет службового листування: звертання, тон, субординація.'
- section: Практичні вправи
  words: 600
  points:
  - Алгоритм написання реферату на основі наукової статті (покроковий розбір).
  - 'Складання анотації до уявного проекту: відбір ключової інформації.'
  - 'Моделювання ситуації: перетворення ''сирих'' даних на структурований короткий
    звіт.'
  - 'Редагування: пошук та виправлення помилок у фрагментах офіційних документів.'
