slug: khudozhniy-styl
title: Художній стиль — Літературна творчість
word_target: 5000
content_outline:
- section: Вступ — Художній стиль як мистецтво слова
  words: 600
  points:
  - Визначення художнього стилю та його місце серед інших функціональних стилів (порівняння
    з публіцистичним та науковим).
  - 'Естетична функція мови: слово як будівельний матеріал образу.'
  - Поняття індивідуального стилю автора (ідіостилю) та його складові.
  - Образність, емоційність та експресивність як ключові ознаки.
- section: Оповідання — мала проза
  words: 800
  points:
  - 'Жанрові особливості оповідання та новели: лаконізм, увага до деталі.'
  - 'Композиційна будова: експозиція, зав''язка, розвиток дії, кульмінація, розв''язка.'
  - 'Типологія нараторів: всезнаючий автор, оповідач-персонаж, ненадійний наратор.'
  - Аналіз уривка з новели Василя Стефаника або Михайла Коцюбинського (фокус на психологізм).
- section: Поезія — ліричний вимір
  words: 700
  points:
  - 'Специфіка поетичної мови: ритм, рима, строфіка (оглядово).'
  - 'Поняття ліричного героя: відмінність від автора.'
  - 'Система образів у поезії: зорові, слухові та дотикові образи.'
  - Приклади з сучасної української поезії (Ліна Костенко, Сергій Жадан).
- section: Драматичний діалог
  words: 700
  points:
  - 'Особливості мови драми: діалог та монолог як двигуни сюжету.'
  - 'Функція ремарок: авторський коментар до дії та емоційного стану.'
  - Конфлікт як основа драми та його вираження через мовлення персонажів.
  - Мовна індивідуалізація персонажів (соціалекти, діалектизми в прямій мові).
- section: Літературні прийоми та тропи
  words: 800
  points:
  - 'Лексичні засоби: метафора, порівняння, епітет, гіпербола, алегорія.'
  - 'Синтаксичні фігури: риторичні запитання, еліпсис, градація, інверсія.'
  - 'Звукопис: алітерація та асонанс як засоби створення настрою.'
  - 'Інтертекстуальність: алюзії та ремінісценції в художньому тексті.'
- section: Хронотоп — простір і час
  words: 600
  points:
  - 'Поняття хронотопу: взаємозв''язок часу і простору в літературі.'
  - 'Види художнього часу: лінійний, циклиний, психологічний (суб''єктивний).'
  - 'Моделювання художнього простору: відкритий (степ, море) vs закритий (дім, кімната).'
  - Роль пейзажу та інтер'єру у створенні атмосфери твору.
- section: Практикум — Творче письмо
  words: 800
  points:
  - Техніка 'Show, don't tell' (Показуй, а не розказуй) в українському контексті.
  - 'Вправа на зміну фокалізації: опис однієї події очима різних персонажів.'
  - 'Створення етюду: опис емоційного стану через деталі пейзажу.'
  - Поради щодо редагування власного художнього тексту (уникнення штампів).
