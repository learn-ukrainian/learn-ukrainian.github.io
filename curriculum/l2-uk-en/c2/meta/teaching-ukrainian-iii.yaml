slug: teaching-ukrainian-iii
title: Викладання української мови III — Розробка матеріалів
word_target: 5000
content_outline:
- section: Вступ — Роль матеріалів у навчанні мови
  words: 800
  points:
  - 'Визначення навчальних матеріалів: від підручника до мультимедійного комплексу.'
  - 'Дихотомія «Автентичне vs Штучне»: переваги та недоліки кожного підходу.'
  - 'Історичний контекст: традиція Грінченка та Сухомлинського у творенні українського
    навчального контенту.'
  - 'Критерії якості: релевантність, доступність, культурна цінність, естетика.'
- section: Адаптація автентичних текстів
  words: 1000
  points:
  - 'Принципи відбору текстів: відповідність рівню (CEFR), інтересам учнів та актуальність.'
  - 'Техніки текстової трансформації (§4.3.7): спрощення синтаксису, лексична заміна,
    скорочення.'
  - 'Метод глосування та коментування: збереження культурних маркерів без втрати розуміння.'
  - 'Робота з жанрами: адаптація новин, літературних уривків, науково-популярних статей.'
  - Етичні межі втручання в авторський текст.
- section: Створення вправ і завдань
  words: 1000
  points:
  - 'Типологія вправ: рецептивні, репродуктивні, продуктивні, творчі.'
  - 'Принцип градуювання (Scaffolding): від механічного повторення до вільної комунікації.'
  - 'Мистецтво інструкції: як писати чіткі, лаконічні та зрозумілі завдання (імператив,
    прямий порядок слів).'
  - 'Створення тестових завдань: дистрактори, ключі, уникнення двозначності.'
  - Баланс форми та змісту в комунікативних завданнях.
- section: Візуальні та мультимедійні матеріали
  words: 800
  points:
  - 'Теорія подвійного кодування: чому візуал покращує запам''ятовування лексики.'
  - 'Робота з автентичним аудіо та відео: створення скриптів, таймкодів, завдань pre/while/post-watching.'
  - 'Інфографіка та схеми: візуалізація граматичних правил (mind maps, flowcharts).'
  - 'Цифрові інструменти та інтерактивність: онлайн-дошки, квізи, флеш-картки.'
  - 'Авторське право і Creative Commons: легальне використання зображень та медіа.'
- section: Оцінювання та вдосконалення матеріалів
  words: 700
  points:
  - 'Пілотування (апробація): чому матеріали потрібно тестувати перед публікацією.'
  - 'Збір та аналіз зворотного зв''язку від студентів: анкети, спостереження, аналіз
    помилок.'
  - 'Критерії ефективності: чи досягають матеріали поставлених навчальних цілей.'
  - 'Ітеративний дизайн: процес постійного оновлення та покращення контенту.'
- section: Практика — Розробка навчального модуля
  words: 700
  points:
  - 'Алгоритм розробки: від визначення цілей до фінальної верстки.'
  - 'Чек-лист розробника: перевірка на логічність, грамотність, різноманітність.'
  - 'Створення комплекту матеріалів (case study): текст + словник + 3 вправи.'
  - 'Рефлексія: самооцінка створеного матеріалу.'
