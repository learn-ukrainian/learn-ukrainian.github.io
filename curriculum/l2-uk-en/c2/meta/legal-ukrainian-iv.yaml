slug: legal-ukrainian-iv
title: Правнича українська IV — Юридичне письмо
word_target: 5000
content_outline:
- section: Вступ — Особливості юридичного письма
  words: 600
  points:
  - 'Вимоги до юридичного тексту: точність, однозначність, нейтральність.'
  - 'Структурованість: роль абзаців, нумерації та рубрикації.'
  - 'Офіційно-діловий стиль: лексичні та синтаксичні маркери.'
  - Відмінність юридичного письма від академічного та публіцистичного.
- section: Мова законодавчих актів
  words: 800
  points:
  - 'Анатомія нормативного акта: преамбула, статті, прикінцеві положення.'
  - 'Юридична термінологія: визначення понять (дефініції) у тексті закону.'
  - 'Імперативні (зобов''язальні) та диспозитивні (дозвільні) норми: мовні засоби
    вираження.'
  - Техніка посилань (бланкетні норми) та перехресних посилань (cross-references).
- section: Юридичні висновки та правові позиції
  words: 800
  points:
  - 'Структура юридичного висновку (Legal Opinion): факти, питання, аналіз, висновок.'
  - 'Опис фактичних обставин: хронологія та об''єктивність.'
  - 'Правова кваліфікація: підведення фактів під норму права (силогізм).'
  - Формулювання рекомендацій та застережень (disclaimers).
- section: Процесуальні документи
  words: 800
  points:
  - 'Клопотання та заяви до суду: структура, реквізити, аргументація.'
  - 'Типологія скарг: апеляційні, касаційні, адміністративні.'
  - 'Письмові пояснення: стратегія викладу позиції клієнта.'
  - 'Заперечення (відзив): спростування аргументів опонента.'
- section: Ділова юридична кореспонденція
  words: 700
  points:
  - 'Етикет правничого листування: звертання, тон, підпис.'
  - 'Претензійна робота: структура претензії та відповіді на неї.'
  - Офіційні повідомлення, повістки та виклики.
  - 'Адвокатський запит: специфіка формулювання питань та вимог.'
- section: Редагування юридичних текстів
  words: 700
  points:
  - 'Типові мовні помилки юристів: канцеляризми-паразити та плеоназми.'
  - 'Перевірка логічності: усунення суперечностей та двозначностей.'
  - 'Linguistic audit: перевірка узгодженості термінології.'
  - Форматування та візуальне оформлення (Legal Design basics).
- section: Практикум — Юридичне письмо
  words: 600
  points:
  - 'Case Study: Аналіз та редагування ''слабкого'' юридичного висновку.'
  - 'Drafting: Написання фрагмента позовної заяви за фабулою.'
  - 'Simulated task: Відповідь на необґрунтовану претензію.'
