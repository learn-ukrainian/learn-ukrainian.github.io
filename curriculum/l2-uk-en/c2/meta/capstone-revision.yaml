slug: capstone-revision
title: Дипломний проєкт — Редагування
word_target: 5000
content_outline:
- section: Вступ — Редагування як етап творення
  words: 600
  points:
  - Відмінність між процесом написання (генерація ідей) та редагування (критичний
    аналіз).
  - 'Психологічна дистанція: чому важливо ''відкласти'' текст перед редагуванням.'
  - 'Три рівні редагування: макрорівень (зміст), мезорівень (структура), мікрорівень
    (мова).'
  - 'Роль редактора: не ''виправляти помилки'', а ''покращувати комунікацію''.'
- section: Змістове редагування (Substantive Editing)
  words: 800
  points:
  - 'Перевірка логіки аргументації: чи випливають висновки з передумов.'
  - 'Аналіз повноти розкриття теми: чи всі питання research questions мають відповідь.'
  - Виявлення логічних прогалин (gaps) та суперечностей у тезах.
  - Відповідність тексту заявленій меті та аудиторії.
  - Техніка 'зворотного планування' (reverse outlining) для перевірки змісту.
- section: Структурне редагування (Structural Editing)
  words: 800
  points:
  - 'Оцінка архітектури тексту: пропорційність вступу, основної частини та висновків.'
  - 'Когезія (cohesion) та когерентність (coherence): перевірка логічних переходів
    між абзацами.'
  - 'Структура абзацу: наявність тематичного речення (topic sentence) та його розвиток.'
  - 'Рубрикація та візуальна структура: чи допомагають заголовки навігації.'
  - 'Вилучення зайвого: скорочення відступів, що не працюють на головну думку.'
- section: Мовне редагування (Copy Editing)
  words: 1000
  points:
  - 'Боротьба з канцеляризмами та штампами: перетворення ''мертвої'' мови на живу.'
  - Усунення плеоназмів (масло масляне) та тавтологій.
  - 'Граматична точність: виправлення помилок у керуванні (прийменники) та узгодженні.'
  - 'Синтаксична різноманітність: чергування довгих і коротких речень для ритму.'
  - 'Термінологічна гігієна: уніфікація термінів по всьому тексту.'
  - Типові помилки інтерференції (кальки) та їх усунення.
- section: Робота зі зворотним зв'язком
  words: 800
  points:
  - 'Культура сприйняття критики: як відділити емоції від конструктиву.'
  - 'Інтерпретація відгуків рецензентів: що робити з суперечливими зауваженнями.'
  - 'Пріоритизація змін: які правки є критичними, а які — смаковими (stylistic preferences).'
  - 'Етика авторської відповіді: як аргументовано відхилити правку.'
  - Синдром самозванця під час редагування та як його подолати.
- section: Практика — Редагування роботи
  words: 1000
  points:
  - Створення персонального чеклиста (checklist) для саморедагування.
  - 'Алгоритм редагування розділу: від загального до конкретного (top-down approach).'
  - Техніка 'читання вголос' для виявлення ритмічних збоїв.
  - 'Інструменти автоматизованої перевірки (LanguageTool тощо): користь та обмеження.'
  - 'Фінальна вичитка (proofreading): полювання на одруківки та пунктуаційні ''блохи''.'
