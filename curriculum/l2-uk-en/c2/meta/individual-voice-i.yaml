slug: individual-voice-i
title: Індивідуальний голос I — Розвиток особистого стилю
word_target: 5000
content_outline:
- section: Вступ — Що таке авторський голос?
  words: 600
  points:
  - 'Визначення індивідуального стилю: відмінність від функціонального стилю.'
  - Голос як відображення особистості автора vs манерність та штучність.
  - 'Поняття автентичності у письмі: чому читач вірить одним і не вірить іншим.'
  - Роль 'чесності' тексту у формуванні довіри читача.
- section: Елементи голосу — Тон
  words: 800
  points:
  - 'Тональні регістри: відсторонений, інтимний, іронічний, патетичний.'
  - Керування дистанцією з читачем через вибір займенників та звертань.
  - 'Консистентність (цілісність) тону: як уникнути випадкових ''зривів''.'
  - Аналіз тональних переключень на прикладах відомих есеїстів.
- section: Елементи голосу — Ритм
  words: 800
  points:
  - 'Синтаксис як інструмент ритму: довжина речень та їх чергування.'
  - 'Темп прози: як пунктуація (тире, трикрапка, крапка з комою) керує диханням читача.'
  - Улюблені синтаксичні конструкції як частина 'ритмічного підпису'.
  - Поняття 'милозвучності' та уникнення небажаних збігів приголосних.
- section: Елементи голосу — Лексика
  words: 800
  points:
  - 'Лексичний fingerprint: слова-маркери, які видають автора.'
  - 'Робота з синонімічними рядами: чому автор обирає саме це слово.'
  - Метафорика та образи як частина світогляду автора.
  - Баланс між унікальною лексикою та зрозумілістю.
- section: Самоаналіз — Дослідження власного голосу
  words: 700
  points:
  - 'Методика ''close reading'' власних текстів: пошук патернів.'
  - Виявлення паразитичних слів та неусвідомлених звичок.
  - 'Аналіз сильних сторін: що вдається найкраще (опис, діалог, роздум)?'
  - Свідомий вибір vs інтуїтивне письмо.
- section: Експериментування з голосом
  words: 700
  points:
  - 'Вправа ''стилізація'': імітація улюбленого автора для розуміння його інструментів.'
  - 'Ефект ''маски'': написання тексту від імені іншого персонажа.'
  - 'Пошук меж: коли експеримент стає кітчем.'
  - Як інтегрувати чужі прийоми, не втрачаючи себе.
- section: Практикум — Знаходження голосу
  words: 600
  points:
  - Комплексний аналіз власного тексту на ознаки стилю (тон, ритм, лексика).
  - 'Завдання: написання одного абзацу трьома різними емоційними тонами.'
  - Порівняльний аналіз свого голосу з еталонним зразком (наприклад, Коцюбинський
    або Забужко).
  - Створення персонального плану розвитку письменницької майстерності.
