slug: c2-1-checkpoint
title: Контрольна точка C2.1 — Стилістична майстерність
word_target: 5000
content_outline:
- section: Вступ — Формат контрольної точки
  words: 300
  points:
  - 'Огляд структури екзамену C2.1: чотири частини, часові рамки та вагові коефіцієнти.'
  - Пояснення компетенції 'Стилістична майстерність' згідно з Держстандартом.
  - Інструкція з налаштування на 'екзаменаційний режим' (таймінг, відсутність словників).
  - 'Критерії успішного проходження: пороговий бал та вимоги до якості.'
- section: Частина 1 — Аналіз стилю (20%)
  words: 800
  points:
  - Методологія ідентифікації функціонального стилю тексту (маркери лексики, синтаксису).
  - 'Практичний розбір тексту: виявлення стилістичних засобів (метафора, еліпсис,
    термінологія).'
  - 'Аналіз авторських рішень: чому обрано саме цей засіб для досягнення мети.'
  - Алгоритм написання письмової відповіді-аналізу (структура аргументації).
- section: Частина 2 — Трансформація (25%)
  words: 1000
  points:
  - 'Завдання на трансформацію: переробка офіційно-ділового тексту (наказ/звіт) у
    публіцистичний (стаття/пост).'
  - 'Ключові виклики трансформації: збереження змісту при зміні тону та лексики.'
  - 'Стратегії ''олюднення'' канцеляризмів: заміна пасиву на актив, спрощення синтаксису.'
  - Критерії оцінювання стилістичної точності та адекватності цільовій аудиторії.
- section: Частина 3 — Творче письмо (30%)
  words: 1100
  points:
  - 'Завдання: написання есе або статті заданого стилю (науково-популярний або художній)
    на 500 слів.'
  - 'Вимоги до структури тексту: теза, антитеза, синтез, стилістична єдність.'
  - 'Використання засобів виразності C2: риторичні питання, інверсія, градація.'
  - 'Детальна рубрика оцінювання: зміст, організація, лексика, граматика, механіка.'
- section: Частина 4 — Усний екзамен (25%)
  words: 1000
  points:
  - 'Сценарій усного екзамену: спонтанна зміна регістру в діалозі (від формального
    до неформального).'
  - 'Вимоги до аргументації: захист власних стилістичних рішень перед екзаменатором.'
  - Техніки утримання паузи та дискурсивні маркери високого рівня ('щоправда', 'попри
    це', 'зрештою').
  - 'Критерії оцінювання: плинність, багатство словника, адекватність стилю.'
- section: Самооцінка та зворотний зв'язок
  words: 300
  points:
  - 'Чек-лист майстерності C2.1: ''Я можу...'' (Can-Do statements).'
  - 'Інтерпретація результатів: що означає певний бал у кожній секції.'
  - Стратегії роботи над помилками для слабких зон (граматика vs стиль).
  - 'План підготовки до наступного етапу (C2.2: Літературна майстерність).'
- section: Модельні відповіді
  words: 500
  points:
  - Еталонний зразок аналізу стилю з коментарями експерта.
  - Приклад вдалої трансформації тексту 'До' і 'Після'.
  - Фрагмент зразкового есе рівня C2 з підкресленими стилістичними засобами.
  - Типові помилки на прикладі 'слабкої' роботи та їх виправлення.
