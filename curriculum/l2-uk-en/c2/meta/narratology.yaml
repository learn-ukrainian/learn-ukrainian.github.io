slug: narratology
title: Наратологія
word_target: 5000
content_outline:
- section: Вступ — Що таке наратологія?
  words: 400
  points:
  - Визначення наратології як науки про структуру оповіді (від Арістотеля до структуралізму).
  - 'Фундаментальна дихотомія: Історія (що розказано) vs. Дискурс (як розказано).'
  - Розрізнення фабули (хронологічна послідовність подій) та сюжету (художня конструкція).
  - Чому наратологія важлива для глибокого читання та аналізу української літератури.
- section: Наративні інстанції
  words: 800
  points:
  - 'Ланцюжок комунікації: Реальний автор → Імпліцитний автор → Наратор → Нарататор
    → Імпліцитний читач → Реальний читач.'
  - 'Типологія нараторів: гомодієгетичний (учасник подій) vs. гетеродієгетичний (спостерігач).'
  - 'Рівні нарації за Женеттом: екстрадієгетичний (зовнішній) та інтрадієгетичний
    (вкладений).'
  - Приклад рамовикових композицій (вкладених історій) в українській прозі (наприклад,
    у Юрія Винничука).
- section: 'Фокалізація: Хто бачить?'
  words: 800
  points:
  - Різниця між голосом (хто говорить) та фокалізацією (чия перспектива).
  - 'Нульова фокалізація: всезнаючий оповідач (класичний роман XIX ст., Панас Мирний).'
  - 'Внутрішня фокалізація: світ через призму свідомості персонажа (фіксована, змінна,
    множинна). Приклади з Коцюбинського (''Intermezzo'').'
  - 'Зовнішня фокалізація: об''єктивний спостерігач, ''камера'', без доступу до думок
    (новели Тютюнника).'
- section: 'Темпоральність: Час у розповіді'
  words: 800
  points:
  - 'Порядок (Order): Анахронії — аналепсис (флешбек) та пролепсис (забігання наперед).'
  - 'Тривалість (Duration): Еліпсис (пропуск), Пауза (опис), Сцена (діалог), Підсумок
    (стислий виклад).'
  - 'Частотність (Frequency): Сингулятив (раз сталося — раз розказано) vs. Ітератив
    (багато разів сталося — раз розказано).'
  - Вплив темпу розповіді на сприйняття динаміки твору.
- section: 'Голос і модус: Дистанція та мовлення'
  words: 800
  points:
  - 'Дистанція: Мімезис (показ, showing) vs. Дієгезис (розповідь, telling).'
  - 'Типи передачі мовлення: пряма мова, непряма мова.'
  - Невласне-пряма мова (free indirect speech) як інструмент злиття голосу автора
    і героя.
  - Потік свідомості та внутрішній монолог в українському модернізмі (Валер'ян Підмогильний
    'Місто').
- section: Наративний аналіз українських текстів
  words: 1000
  points:
  - 'Кейс-стаді 1: Психологізм новели ''Камінний хрест'' Стефаника (експресіоністична
    нарація, фокус на внутрішньому стані).'
  - 'Кейс-стаді 2: Розщеплений наратор у ''Я (Романтика)'' Хвильового (ненадійний
    оповідач, ідеологічний конфлікт).'
  - 'Кейс-стаді 3: Постмодерна гра з наративом у сучасній літературі (Андрухович,
    Забужко) — метапроза та іронічна дистанція.'
  - 'Практичні поради: як писати наратологічний аналіз (алгоритм дій).'
- section: Підсумок
  words: 400
  points:
  - Наратологічний інструментарій як ключ до 'майстерні' письменника.
  - Як знання наратології допомагає у власному творчому письмі (Creative Writing).
  - Застосування набутих знань для аналізу текстів на рівні C2 (відгуки, рецензії).
