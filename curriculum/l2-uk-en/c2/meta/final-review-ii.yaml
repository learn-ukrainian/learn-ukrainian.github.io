slug: final-review-ii
title: Фінальне повторення II — Лексична консолідація
word_target: 5000
content_outline:
- section: Вступ — Лексична майстерність C2
  words: 600
  points:
  - 'Визначення лексичної компетентності на рівні C2: не просто кількість, а якість
    та доречність.'
  - 'Обсяг активного словника C2 (~12,000 слів) vs пасивний запас: як керувати цими
    масивами.'
  - 'Глибина знання слова: від денотації до конотації, від прямого значення до метафоричного.'
  - 'Стратегії постійного лексичного розвитку: читання ''складних'' текстів, робота
    з корпусами.'
- section: Стилістична диференціація лексики
  words: 900
  points:
  - Нейтральна лексика як база vs стилістично маркована лексика як інструмент виразності.
  - 'Архаїзми та історизми: коли вони доречні (іронія, історичний контекст, урочистість).'
  - 'Неологізми та оказіоналізми: авторське словотворення в сучасних медіа та літературі.'
  - 'Діалектизми та регіоналізми: ''галицький шарм'' та інші регіональні фарби в літературній
    мові.'
  - 'Жаргонізми, арготизми, сленг: межі допустимого в різних комунікативних ситуаціях.'
- section: Синонімія та точність слововживання
  words: 900
  points:
  - 'Синонімічні ряди: як обрати єдине правильне слово з десятка варіантів (нюанси
    значень).'
  - Абсолютні синоніми vs контекстуальні синоніми vs ідеографічні синоніми.
  - 'Паронімія: пастки схожості (адресат/адресант, компанія/кампанія) та як їх уникати.'
  - 'Колокації: ''дружба'' слів, порушення лексичної сполучуваності як ознака ненейтива.'
  - 'Ідіоматика на рівні носія: коли ідіома збагачує, а коли — обтяжує текст.'
- section: Фразеологія та крилаті вирази
  words: 900
  points:
  - 'Фразеологізми як дзеркало менталітету: етнокультурний компонент лексики.'
  - 'Трансформація фразеологізмів у мовленні: гра зі сталими виразами.'
  - Крилаті вирази з класичної літератури (Шевченко, Леся Українка, Франко, Котляревський).
  - Біблійні та античні референції в сучасному інтелектуальному дискурсі.
  - Сучасні 'мемні' вирази та цитати з масової культури (Подерв'янський, сучасні медіа).
- section: Активізація пасивного словника
  words: 900
  points:
  - 'Проблема ''знаю, але не використовую'': психологічні бар''єри.'
  - 'Техніки активації: свідоме використання нових слів у письмі та мовленні.'
  - 'Контекстуалізація: створення власних прикладів та історій з рідковживаними словами.'
  - Інтервальне повторення (Spaced Repetition) для лексики високого рівня.
  - 'Словник як інструмент творчості: вправи на перефразування та пошук точнішого
    відповідника.'
- section: Діагностика та закріплення
  words: 800
  points:
  - 'Самодіагностика лексичного запасу: як оцінити свій реальний рівень.'
  - Створення та ведення особистого лексичного порфоліо/словника.
  - Стратегії довготривалого запам'ятовування без зубріння (читання, аудіювання, спілкування).
  - 'План лексичного розвитку after-C2: мова змінюється, і ми разом з нею.'
