slug: milozvuchnist-complete
title: Милозвучність — Повна система евфонії
word_target: 5000
content_outline:
- section: Вступ — Що таке милозвучність?
  words: 600
  points:
  - Визначення милозвучності (евфонії) як фундаментальної риси української мови
  - 'Історичний аспект: від праслов''янського закону відкритого складу до сучасних
    норм'
  - 'Культурологічний вимір: міф про ''солов''їну мову'' та реальна фонетична статистика'
  - Відмінність між обов'язковими (граматичними) та стилістичними (факультативними)
    чергуваннями
- section: 'Система у/в: Більше, ніж правило'
  words: 800
  points:
  - 'Класичні правила чергування у/в: між приголосними, між голосними, на початку
    речення'
  - Позиція перед розділовими знаками та після них (пауза як чинник)
  - Смислорозрізнювальна роль (вдача/удача, вклад/уклад) — де чергування неможливе
  - 'Аналіз складних випадків: власні назви (Врубель/Урубель?), абревіатури (в СРСР/у
    СРСР)'
- section: 'Система і/й/та: Сполучники та гармонія'
  words: 800
  points:
  - 'Три варіанти сполучника ''і'': і, й, та — алгоритм вибору'
  - Заборона на 'й' після приголосного та на початку речення (окрім поезії)
  - Чергування 'і' з 'й' у дієсловах (іти/йти) та іменниках (імення/ймення)
  - Стилістична роль 'та' як засобу уникнення тавтології 'і... і...'
- section: 'Система з/зі/із: Подолання збігу приголосних'
  words: 800
  points:
  - Базова форма 'з' та умови переходу в 'зі' (перед с, ш, щ + приголосний)
  - 'Варіант ''із'': урочистість, фольклорне забарвлення, поетичний ритм'
  - Фонетичні групи приголосних, що вимагають вокалізації прийменника
  - Регіональні та діалектні особливості вживання (зокрема, західноукраїнське 'зо')
- section: Початкові у-/в- та постфікси -ся/-сь
  words: 600
  points:
  - 'Варіювання у-/в- на початку слова: учитель/вчитель, уже/вже'
  - Чергування дієслівних постфіксів -ся (після приголосних) та -сь (після голосних)
  - 'Винятки з правила -ся/-сь: збереження -ся в причастиях та безособових формах'
  - 'Авторські переваги в літературі: коли ''сь'' додає розмовності чи динаміки'
- section: Комплексна евфонія та ритмомелодика
  words: 700
  points:
  - Взаємодія різних типів чергувань в одному реченні (синергія засобів)
  - Поняття 'хіатусу' (зіяння) та 'какофонії' — як їх уникати на практиці
  - 'Ритмічна організація прози: чергування наголошених і ненаголошених складів'
  - Аналіз уривків з творів Коцюбинського та Гончара (майстри звукопису)
- section: Практикум — Редагування та вдосконалення
  words: 700
  points:
  - 'Алгоритм евфонічного редагування тексту: від грубих помилок до шліфування'
  - 'Робота з офіційно-діловим стилем: де милозвучність поступається стандарту?'
  - 'Редагування художніх перекладів: адаптація іншомовних імен та назв'
  - Створення власного тексту з максимальним використанням засобів милозвучності
