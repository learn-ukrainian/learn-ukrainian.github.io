slug: style-transformation-ii
title: Трансформація стилю II — Офіційний → Публіцистичний
word_target: 5000
content_outline:
- section: Вступ — Від бюрократії до читабельності
  words: 600
  points:
  - 'Аналіз бар''єрів сприйняття офіційно-ділового стилю: чому «суха» мова не працює
    для широкої аудиторії.'
  - 'Ключова місія журналіста: перекладач з «бюрократичної» на «людську».'
  - 'Етичні межі трансформації: як спростити форму, не викрививши зміст (точність
    vs доступність).'
  - 'Огляд основних відмінностей: лексика, синтаксис, тон.'
- section: Додавання людського інтересу (Human Interest)
  words: 800
  points:
  - 'Принцип «Show, don''t tell» у публіцистиці: перехід від абстрактних понять до
    конкретних образів.'
  - 'Персоналізація статистики: як перетворити цифру «1000 постраждалих» на історію
    однієї родини.'
  - 'Техніки введення героя: цитування, опис зовнішності, деталі побуту.'
  - Роль прямої мови та живих цитат для оживлення офіційного фактажу.
- section: Емоційний апель та вплив
  words: 700
  points:
  - 'Спектр емоційного впливу: від нейтральної констатації до заклику до дії.'
  - 'Лексичні засоби експресивності: епітети, метафори, фразеологізми, що неприпустимі
    в офіційному стилі.'
  - 'Риторичні фігури в публіцистиці: риторичні запитання, антитези, градація.'
  - 'Баланс між фактажем та емоцією: як уникнути маніпуляції та «жовтизни».'
- section: Наративні елементи та структура історії
  words: 700
  points:
  - Від лінійної хронології звіту до драматургії нарису.
  - 'Побудова сюжету: зав''язка (лід), розвиток дії, кульмінація, розв''язка в журналістському
    тексті.'
  - 'Інтрига та саспенс: як утримувати увагу читача, використовуючи дозовану подачу
    інформації.'
  - 'Сильні позиції тексту: заголовок, лід та кінцівка (пуант) — трансформація канцелярських
    заголовків.'
- section: Візуальна мова та образність
  words: 700
  points:
  - 'Сенсорні деталі: як змусити читача «бачити», «чути» і «відчувати» подію.'
  - 'Метафоризація офіційних понять: переклад складних термінів через зрозумілі аналогії.'
  - 'Візуалізація даних: перехід від таблиць до інфографіки та словесних описів масштабів
    (порівняння).'
  - 'Стилістичний контраст: використання елементів розмовного стилю для зближення
    з аудиторією.'
- section: Типи джерельних документів та стратегії роботи
  words: 600
  points:
  - 'Прес-реліз: алгоритм виокремлення новинного приводу з «води».'
  - 'Офіційна заява/Коментар посадовця: як цитувати, щоб не звучати як прес-секретар.'
  - 'Статистичний звіт/Аналітика: пошук трендів та аномалій, що стануть темою статті.'
  - 'Законодавчий акт: як пояснити вплив нового закону на життя пересічного громадянина.'
- section: Практикум — Трансформація документів
  words: 900
  points:
  - 'Кейс-стаді: покрокова трансформація офіційного повідомлення про подію в новину.'
  - 'Кейс-стаді: перетворення звіту про діяльність організації на feature-статті про
    успіх/проблему.'
  - 'Аналіз фреймінгу: порівняння подачі однієї події в офіційному джерелі та в опозиційному/незалежному
    медіа.'
  - 'Вправа на деофіціалізацію: переписування бюрократичних зворотів живою українською
    мовою.'
  - 'Чек-ліст редагування: виявлення залишків канцеляриту та пасивних станів.'
