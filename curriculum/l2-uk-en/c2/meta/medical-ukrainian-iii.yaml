slug: medical-ukrainian-iii
title: Медична українська III — Медична документація
word_target: 5000
content_outline:
- section: 'Вступ: Система медичної документації в Україні'
  words: 750
  points:
  - 'Нормативно-правова база: від паперових наказів до цифрових стандартів eHealth.'
  - Юридична відповідальність лікаря за ведення документації (первинної та звітної).
  - 'Структура eHealth: центральна база даних (ЦБД) та медичні інформаційні системи
    (МІС).'
  - 'Захист персональних даних пацієнта: правові аспекти та лікарська таємниця.'
- section: 'Первинна медична документація: Стандарти та форми'
  words: 850
  points:
  - Медична карта амбулаторного хворого (форма 025/о) vs електронний медичний запис.
  - 'Медична карта стаціонарного хворого (форма 003/о): структура та вимоги до заповнення.'
  - Правила формулювання скарг та анамнезу (Anamnesis morbi, Anamnesis vitae).
  - 'Об''єктивний статус (Status praesens): стандарти опису та уникнення двозначностей.'
  - 'Щоденник лікаря (декурсус): вимоги до динамічного спостереження.'
- section: 'Виписки та епікризи: Мистецтво медичного резюме'
  words: 850
  points:
  - 'Епікриз як ключовий документ: визначення, види (етапний, виписний, перевідний,
    посмертний).'
  - 'Структура виписного епікризу: діагноз, проведене лікування, рекомендації, прогноз.'
  - 'Клінічне обґрунтування діагнозу: логіка побудови та мовні кліше.'
  - 'Особливості посмертного епікризу: кореляція клінічного та патологоанатомічного
    діагнозів.'
  - 'Довідки: форми, призначення та терміни дії.'
- section: Направлення, рецепти та листки непрацездатності
  words: 850
  points:
  - 'Електронне направлення: правила створення та погашення.'
  - Рецептурні бланки (ф-1, ф-3) та програма «Доступні ліки».
  - 'Правила виписування рецептів: Latin abbreviations vs українські вимоги.'
  - 'Експертиза тимчасової непрацездатності: медичний висновок vs «лікарняний».'
  - Порядок направлення на МСЕК (Медико-соціальну експертну комісію).
- section: Протоколи діагностики та консультативні висновки
  words: 800
  points:
  - 'Протоколи інструментальних досліджень (УЗД, Рентген, КТ/МРТ): структура опису.'
  - 'Консультативний висновок спеціаліста: алгоритм взаємодії лікарів.'
  - 'Консиліум лікарів: оформлення колегіального рішення.'
  - 'Судово-медична документація: специфіка мови та юридична вага кожного слова.'
- section: 'Практикум: Клінічний кейс документування'
  words: 900
  points:
  - 'Наративна симуляція: повний цикл документування одного пацієнта (від звернення
    до виписки).'
  - 'Крок 1: Оформлення первинного огляду та електронного направлення.'
  - 'Крок 2: Заповнення щоденників стаціонарного хворого.'
  - 'Крок 3: Формування виписного епікризу та електронного рецепта.'
  - Аналіз типових помилок при заповненні (розбіжності в датах, нечіткі формулювання).
