slug: c2-2-checkpoint
title: Контрольна точка C2.2 — Літературна майстерність
word_target: 5000
content_outline:
- section: 'Вступ: Структура контрольної оцінки'
  words: 600
  points:
  - Привітання та окреслення мети контрольної точки як етапу професійної сертифікації
  - Детальний огляд п'яти ключових компетенцій (теорія, поетика, критика, творчість,
    контекст)
  - Пояснення системи оцінювання та критеріїв успішності (рівень C2)
  - Налаштування на академічний та професійний тон роботи
- section: 'Частина I: Літературна теорія та наратологія'
  words: 900
  points:
  - Перевірка знання теоретичних концепцій (дискурс, інтертекстуальність, мімезис)
  - 'Аналіз наративних стратегій: фокалізація, голос наратора, часова організація'
  - Ідентифікація та характеристика літературознавчих шкіл та підходів
  - 'Практичне завдання: деконструкція теоретичної моделі на прикладі тексту'
- section: 'Частина II: Поетика, стилістика та версифікація'
  words: 900
  points:
  - 'Глибинний аналіз поетичного тексту: метрика, ритміка, строфіка'
  - 'Дослідження прозової поетики: синтаксичні фігури, ритмізована проза'
  - Оцінка ефективності стилістичних засобів (тропи, фігури) у конкретному контексті
  - Завдання на розрізнення індивідуальних авторських стилів
- section: 'Частина III: Інтертекстуальність та літературна критика'
  words: 900
  points:
  - Виявлення та аналіз алюзій, ремінісценцій та цитувань у складних текстах
  - Написання фрагменту літературно-критичної статті (рецензії)
  - Порівняльний аналіз двох творів (компаративістика)
  - Аргументація власної позиції в академічній дискусії
- section: 'Частина IV: Перекладознавчий аналіз та творче письмо'
  words: 900
  points:
  - Критичний аналіз перекладу художнього твору (втрати, компенсація)
  - 'Завдання на стилізацію: написання тексту в манері певного автора або епохи'
  - 'Творче письмо: есе-роздум на літературознавчу тему'
  - Демонстрація власного 'голосу' та стилістичної гнучкості
- section: 'Частина V: Сучасний літературний процес'
  words: 600
  points:
  - Орієнтація в сучасному українському літературному каноні (постмодернізм і далі)
  - Знання ключових літературних премій, фестивалів та видавництв
  - Аналіз тенденцій розвитку сучасної літератури (жанри, теми)
  - Дискусія про роль письменника в сучасному суспільстві
- section: Підсумок та стратегія подальшого розвитку
  words: 200
  points:
  - Узагальнення результатів контрольної точки
  - Рекомендації щодо подолання типових труднощів на рівні C2
  - 'Анонс наступного етапу: професійні мета-навички (Phase C2.3)'
