slug: literary-prizes-canon
title: Літературні премії та канон
word_target: 5000
content_outline:
- section: Вступ — Хто визначає, що читати?
  words: 650
  points:
  - 'Відкрита діагностична задача: учасники записують 5 книжок, які вважають «обов''язковими
    для читання», та пояснюють чому — активує інтуїтивне уявлення про канон'
  - 'Поняття літературного канону: визначення (Harold Bloom, Terry Eagleton та сучасна
    українська теорія) подається в оригінальних формулюваннях, а не переказі'
  - 'Механізми формування канону: роль критиків, видавців, академій, шкільних програм,
    перекладів — кожен механізм з конкретним прикладом з укр. літератури'
  - 'Премії як канонотворчий механізм: як отримання нагороди впливає на тиражі, переклади,
    включення до шкільних програм — конкретні дані'
  - 'Вводиться ключова термінологія: канон, канонотворення, деканонізація, реканонізація,
    легітимація — з прикладами-реченнями'
- section: Українські літературні премії
  words: 1000
  points:
  - 'Шевченківська премія — детальна Н3-підсекція: заснована 20 травня 1961 р. Радою
    Міністрів УРСР (радянський контекст); трансформація після незалежності; структура
    сучасної премії (комітет, номінації); лауреати 2024 р. (Лазуткін, Чорногуз, журналісти
    «20 днів у Маріуполі»); дискусія щодо державної природи нагороди'
  - 'BBC Book of the Year — Н3-підсекція: незалежна премія медіаорганізації; 20-та
    річниця 2024 р.; структура (читацьке голосування + журі); лауреат 2024 — «Мої
    жінки» Юлії Ілюхи; роль у формуванні ринку сучасної прози'
  - '«Коронація слова» — Н3-підсекція: заснована 1999 р.; незалежний конкурс рукописів;
    автори, відкриті конкурсом (Шкляр, Роздобудько, Кокотюха, Гримич); значення для
    демократизації видавничого процесу'
  - 'Незалежні та регіональні премії — Н3-підсекція: ЛітАкцент, Книга Року ВВС, Драгоманівська
    премія (для перекладачів з укр. мови, 2020); порівняльна таблиця державних vs.
    незалежних премій за критеріями легітимності'
  - 'Аналіз: чи є лауреатство гарантією якості? Обговорення суперечливих рішень журі;
    роль медійного висвітлення'
- section: Міжнародні премії і українська література
  words: 800
  points:
  - Нобелівська премія і Україна — жоден українець не отримав; Сергій Жадан як номінант;
    причини відсутності (мовна нерівність у перекладах, геополітика, порівняно малий
    корпус перекладів)
  - 'PEN International і PEN Україна: структура (170+ членів, 1 з 146 національних
    центрів); роль у захисті авторів і просуванні україномовної літератури; конкретні
    кампанії (захист Олега Сенцова)'
  - 'Драгоманівська премія для перекладачів: заснована 2020 р. Українським інститутом,
    PEN Україна, Українським інститутом книги; лауреат 2024 — фінський перекладач
    Ееро Балк; як переклади творять міжнародний канон'
  - 'Аналіз: переклади як ворота до міжнародного канону — статистика: скільки укр.
    книжок перекладено за останнє десятиріччя; вплив 2022 р. на попит на переклади'
  - 'Проблема нерівного доступу: мовна ієрархія в міжнародному літературному просторі
    — чому «великі» мови домінують у нагородах; деколоніальна перспектива'
- section: Дебати про канон
  words: 850
  points:
  - Класичний канон і його критика — концепція «великої традиції» (Гарольд Блум vs.
    постструктуралізм); що означає «класичний» в українському контексті — не стабільність,
    а боротьба за визначення
  - 'Гендер і канон — детальна Н3-підсекція: статистика присутності жінок у шкільних
    програмах; парадокс «Леся Українка — єдиний чоловік у нашій літературі»; патерн
    ''виключення через поодинокий виняток'' (Ірен Роздобудько, Оксана Забужко як ''четверта
    Леся''); як це відтворює канонічне виключення замість inclusion'
  - Постколоніальні ревізії — роль постколоніальної теорії (Саїд, Бгабга, Брюхачук)
    у переосмисленні укр. канону; відновлення маргіналізованих голосів (діаспора,
    регіональна literature, Розстріляне відродження); конкретні приклади реканонізованих
    авторів
  - Шкільна програма як де-факто канон — аналіз структури укр. шкільної літературної
    програми; що входить і чого бракує; наскільки програма відстає від академічного
    канону; роль МОН у формуванні масових читацьких смаків
  - 'Аргументативна практика: учасники беруть сторону в дебаті «потрібен чи ні нам
    фіксований канон» з аргументами PRO та CONTRA'
- section: Канон і влада
  words: 950
  points:
  - 'Радянський канон і його спадок — механізми радянського канонотворення: соцреалізм
    як обов''язковий метод; класифікація ''ідеологічно правильних'' vs. заборонених
    авторів; кон''юнктурний канон (Тичина як радянський поет vs. Тичина раннього модернізму)'
  - 'Розстріляне відродження в каноні — детальна Н3-підсекція: парадокс народження
    терміну (Гедройць і Лавріненко, Париж, 1958–1959); канонізація в діаспорі vs.
    радянська заборона на Батьківщині; критика терміну (Ярина Цимбал: не відображає
    різноманіття; автори самі себе називали ''Червоний ренесанс''); реканонізація
    після незалежності'
  - Деканонізація і реканонізація — процеси переосмислення після 1991 р.; які автори
    повернулися (Хвильовий, Зеров, Куліш, Осьмачка); які залишились поза програмою;
    швидкість реканонізації у воєнний час (2022–)
  - Сучасні канонічні дебати — дискусія про «скасування» Пушкіна і рос. класики в
    укр. культурному просторі; переосмислення спільного 'радянського' спадку; деколоніальний
    канон як позиція; роль воєнної літератури у формуванні нового канону
  - 'Влада і легітимація: хто сьогодні є «арбітром смаку» в Україні — академія, медіа,
    читачі? Зміна балансу після 2022 р.'
- section: Формування власного канону
  words: 550
  points:
  - Критичне ставлення до «списків must-read» — відмінність між списком (list) і каноном
    (system); як медіа і соцмережі формують нові «списки обов'язкового читання»; небезпека
    некритичного споживання
  - Стратегії розширення читацьких горизонтів — читання текстів поза шкільним каноном;
    автори-жінки, регіональна література, діаспора, сучасна war literature як доповнення
    до класики
  - 'Особистий канон читача — концепція персонального канону як динамічного проекту;
    вправа: учасники формулюють власний список 5 творів та обґрунтовують вибір академічною
    мовою (практика §4.3.6 — створення тексту певного стилю)'
  - 'Активна участь у літературному процесі: рецензування, обговорення, соцмережі
    як сучасні інструменти канонотворення'
- section: Підсумок
  words: 200
  points:
  - 'Синтез: премії — орієнтир, не догма; канон — динамічний процес, не список'
  - 'Ключові поняття зведено в підсумкову схему/таблицю: канонотворення / деканонізація
    / реканонізація / легітимація'
  - 'Мотиваційний вивід: читач як учасник канонотворення, не пасивний споживач'
