slug: capstone-research-project
title: Дипломний проєкт — Дослідження
word_target: 5000
content_outline:
- section: Вступ — Від теми до дослідження
  words: 700
  points:
  - 'Відкриваємо з конкретного дослідницького питання — приклад: формулювання теми
    → гіпотеза → план збору даних (3 кроки, пронумерованих)'
  - Пояснити різницю між темою (broad) та дослідницьким питанням (focused, operationalizable)
    — 2 контрастивних приклади
  - 'Карта дослідницького процесу: огляд усіх 5 етапів (збір → аналіз → синтез → написання
    → перегляд) з одним реченням про кожен'
  - 'Організаційні засоби: принцип папок-завдань, хронологія vs. тематична систематизація
    — коротко, як анкер для секцій 5–6'
  - 'Маркування мовних конструкцій наукового стилю: перші приклади дієслів (встановити,
    виявити, дійти висновку) в контексті'
- section: Робота з джерелами
  words: 900
  points:
  - 'Визначення первинного джерела: архівні документи, інтерв''ю, сирі дані, оригінальні
    тексти — кожен тип з 1 прикладом з українського академічного контексту'
  - 'Визначення вторинного джерела: монографії, оглядові статті, підручники — роль
    у дослідженні та обмеження; критерій ''відстані від даних'''
  - Критична оцінка джерел за схемою CRAAP (Currency / Relevance / Authority / Accuracy
    / Purpose) — адаптована для українського академічного середовища з прикладами
  - 'Бібліографічні бази даних: НБУВ (nbuviap.gov.ua), Google Scholar (україномовний
    інтерфейс), ULIF corpus — конкретні інструкції для пошуку'
  - 'Архівні та онлайн-ресурси: Центральний державний архів (tsdavo.gov.ua), відцифровані
    фонди, умови доступу — коротка навігаційна довідка'
  - 'Engagement box: «Проблема ехо-камери» — ризик надмірного покладання на один тип
    джерел'
- section: Методи дослідження
  words: 800
  points:
  - 'Якісні методи: аналіз дискурсу, контент-аналіз, тематичне кодування, феноменологія
    — кожен з одним реченням-визначенням + типовий дослідницький контекст'
  - 'Кількісні методи: статистичний аналіз, корпусний аналіз, опитування зі шкалами
    — акцент на корпусному аналізі як інструменті для мовознавчих досліджень (ULIF)'
  - 'Змішані методи: триангуляція як принцип — поєднання даних для підвищення валідності;
    послідовна vs. паралельна триангуляція'
  - 'Вибір методу за типом дослідницького питання: таблиця-матриця (тип питання |
    рекомендований метод | приклад)'
  - 'Мова методологічного опису: типові конструкції у розділі ''Методологія'' (застосовано
    метод...; дослідження ґрунтується на...; матеріалом слугує...)'
- section: Академічна доброчесність
  words: 900
  points:
  - 'ДСТУ 8302:2015: повна назва, статус обов''язкового стандарту, відмінності від
    APA/MLA — чому Україна розробила власний стандарт (відхід від ГОСТ після незалежності)'
  - 'Формат бібліографічного запису за ДСТУ: окремі H3 для книги, статті у журналі,
    розділу в збірнику, інтернет-ресурсу — кожен з розміченим прикладом з українськими
    авторами'
  - 'Уникнення плагіату: визначення НАЯО 2020; чотири типи порушень (дослівне копіювання
    / near-verbatim / само-плагіат / фабрикація)'
  - 'Парафразування vs. пряме цитування: детальне пояснення різниці з 3 прикладами
    (оригінал → некоректне парафразування → коректне парафразування)'
  - 'Оформлення покликань у тексті: автор-рік vs. числова система — вибір залежно
    від галузі; типові помилки оформлення'
  - 'Engagement box: Unicheck і антиплагіатні системи в українських університетах'
- section: Ведення дослідницьких нотаток
  words: 700
  points:
  - 'Принцип систематизації: 3 моделі організації (хронологічна / тематична / за типом
    джерела) — коли кожна модель оптимальна'
  - 'Конспектування за системою Корнелла: поля для ключових понять, основний текст,
    підсумковий рядок — приклад розліновки сторінки'
  - 'Каталогізація цитат: картка цитати (джерело + сторінка + дослівна цитата + власний
    коментар) — зразок заповненої картки'
  - 'Цифрові інструменти: Zotero (підтримка ДСТУ 8302), Notion, Obsidian — порівняльна
    таблиця (безкоштовний / зберігання / мобільний доступ / ДСТУ-плагін)'
  - 'Мова нотаток: рекомендація вести нотатки мовою джерела + коментарі мовою роботи
    — запобігання ненавмисному плагіату'
- section: Практика — Збір матеріалу
  words: 1000
  points:
  - 'Завдання 1: Складання робочої бібліографії (20+ джерел) — конкретні вимоги до
    балансу джерел: ≥5 первинних, ≥10 рецензованих статей, ≥3 ресурси з різних десятиліть;
    шаблон бібліографічного запису за ДСТУ'
  - 'Завдання 2: Конспект 5 ключових джерел — структурований шаблон (тема / центральний
    аргумент / ключові дані / методологія / зв''язок з власним дослідженням / критична
    оцінка)'
  - 'Завдання 3: Критичний аналіз суперечливих позицій — вибрати 2 джерела з протилежними
    аргументами; написати 200 слів синтезу з чіткою власною позицією'
  - 'Завдання 4: Звіт про стан дослідження (research status report) — зразок структури
    (що зібрано / що ще потрібно / виявлені прогалини / наступні кроки) + зразок заповненого
    звіту'
  - 'Мовний фокус: відпрацювання академічних конструкцій у кожному завданні — кожне
    завдання містить мову-маркер для перевірки власного тексту'
  - 'Підсумок фази дослідження: рефлексія — що зробив, що дізнався, як перейти до
    фази написання (логічний місток до c2-91)'
