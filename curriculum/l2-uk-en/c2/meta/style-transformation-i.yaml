slug: style-transformation-i
title: Трансформація стилю I — Науковий → Популярний
word_target: 5000
content_outline:
- section: Вступ — Навіщо популяризувати науку?
  words: 600
  points:
  - Роль науково-популярного стилю в сучасному інформаційному просторі (кейс 'Куншт').
  - 'Відмінність між популяризацією та примітивізацією: збереження суті при зміні
    форми.'
  - 'Аудиторії популяризації: від школярів до фахівців суміжних галузей.'
  - 'Етичний вимір: відповідальність за точність фактів vs. потреба в клікбейті.'
- section: Стратегії спрощення термінології
  words: 800
  points:
  - 'Принцип ''чорної скриньки'': що читачу дійсно потрібно знати про будову механізму?'
  - 'Техніка введення терміна: контекстуальне визначення без розриву оповіді.'
  - Використання синонімів та описових конструкцій замість латинізмів.
  - 'Коли термін варто залишити: формування словникового запасу читача.'
  - 'Аналіз кейсу: як пояснити ''ентропію'' без формул.'
- section: Додавання прикладів та ілюстрацій
  words: 700
  points:
  - 'Сила метафори та аналогії: ''мітохондрія як електростанція'', ''ДНК як інструкція''.'
  - 'Візуалізація текстом: створення яскравих образів у уяві читача.'
  - 'Сторітелінг у науці: перетворення факту на історію відкриття.'
  - Історичні анекдоти та персоналії як 'гачки' уваги (кейс 'Моя наука').
- section: 'Зміна синтаксису: від пасиву до активу'
  words: 800
  points:
  - 'Боротьба з канцеляритом: заміна віддієслівних іменників (-ння) на дієслова.'
  - 'Трансформація пасивного стану в активний: повернення Агента в речення.'
  - 'Ритм тексту: чергування коротких і довгих речень для динаміки.'
  - 'Діалогічність: використання риторичних запитань та звертань до читача.'
  - 'Порівняльний аналіз абзацу: ''До і Після'' редагування.'
- section: Адаптація для різних аудиторій
  words: 700
  points:
  - 'Сегментація аудиторії: діти, підлітки (ТікТок формат), дорослі неспеціалісти.'
  - 'Адаптація тону (Tone of Voice): від менторського до партнерського.'
  - 'Вибір каналів комунікації: лонгрід, пост у соцмережах, подкаст.'
  - 'Кейс: як розповісти про чорні діри п''ятирічній дитині та студенту-філологу.'
- section: Жанри науково-популярного письма
  words: 700
  points:
  - 'Стаття-експлейнер (explainer): структура ''питання — відповідь''.'
  - 'Науковий блог: особистий досвід дослідника.'
  - 'Інтерв''ю з вченим: як перекладати ''з наукової на людську'' в реальному часі.'
  - 'Огляд (Review) та дайджест новин: принципи відбору головного.'
- section: Практикум — Трансформація текстів
  words: 700
  points:
  - 'Завдання 1: ''Переклад'' анотації дисертації на мову науково-популярного блогу.'
  - 'Завдання 2: Пошук та виправлення канцеляризмів у наданому тексті.'
  - 'Завдання 3: Створення влучної аналогії для абстрактного терміна.'
  - 'Чек-лист редактора науково-популярного тексту: перевірка на доступність.'
