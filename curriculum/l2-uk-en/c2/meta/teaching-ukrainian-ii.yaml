slug: teaching-ukrainian-ii
title: Викладання української мови II — Планування курсів
word_target: 5000
content_outline:
- section: Вступ — Від уроку до курсу
  words: 700
  points:
  - Відмінність тактичного (урок) і стратегічного (курс) планування
  - Поняття цілісності навчальної програми (curriculum integrity)
  - Принципи наступності та спірального розвитку компетентностей
  - Роль викладача як архітектора освітнього процесу
- section: Аналіз потреб учнів (Needs Analysis)
  words: 800
  points:
  - Діагностика мовного рівня та комунікативних потреб групи
  - Врахування контексту навчання (університет, курси, індивідуально)
  - 'Психологічні аспекти: мотивація, стилі навчання, вікові особливості'
  - 'Інструменти аналізу потреб: анкетування, тестування, інтерв''ю'
- section: Визначення цілей і результатів навчання
  words: 900
  points:
  - Формулювання SMART-цілей для мовного курсу
  - Узгодження цілей із Загальноєвропейськими рекомендаціями (CEFR)
  - Визначення очікуваних результатів (Learning Outcomes) за видами мовленнєвої діяльності
  - 'Компетентнісний підхід: знання, вміння, навички та ставлення'
- section: Структурування контенту та логіка курсу
  words: 900
  points:
  - Тематичний vs. граматичний vs. функціональний підходи до структурування
  - Баланс рецептивних (читання, слухання) і продуктивних (говоріння, письмо) навичок
  - Інтеграція соціокультурного компонента в структуру курсу
  - Планування самостійної роботи студентів
- section: Система оцінювання і зворотний зв'язок
  words: 800
  points:
  - Формувальне (formative) та підсумкове (summative) оцінювання в структурі курсу
  - Розробка прозорих критеріїв успішності (rubrics)
  - Інструменти зворотного зв'язку та корекція програми в процесі навчання
  - Роль самооцінювання та взаємооцінювання студентів
- section: Практика — Розробка силабусу
  words: 900
  points:
  - 'Структура сучасного силабусу: від політики курсу до календарного плану'
  - Опис пререквізитів та постреквізитів курсу
  - Технічне оформлення та візуалізація навчальної траєкторії
  - Рецензування та валідація програми колегами
