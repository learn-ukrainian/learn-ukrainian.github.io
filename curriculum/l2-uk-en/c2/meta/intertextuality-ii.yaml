slug: intertextuality-ii
title: Інтертекстуальність II — поглиблене вивчення
word_target: 5000
content_outline:
- section: Вступ — від базової до глибинної інтертекстуальності
  words: 400
  points:
  - Актуалізація знань про цитату, алюзію та ремінісценцію
  - Інтертекстуальність як «пам'ять культури» (за Ю. Лотманом)
  - Поняття «діалогічності» тексту (М. Бахтін) як основа теорії
  - Відмінність модерністської (елітарної) та постмодерністської (ігрової) інтертекстуальності
- section: Женеттівська транстекстуальність
  words: 1000
  points:
  - П'ять типів транстекстуальних відношень за Ж. Женеттом (огляд)
  - 'Інтертекстуальність у вузькому сенсі: цитата, плагіат, алюзія'
  - 'Паратекстуальність: роль заголовків, епіграфів, передмов у формуванні сприйняття'
  - 'Метатекстуальність: текст як критичний коментар до іншого тексту'
  - 'Гіпертекстуальність: пародія, травестія, пастиш, продовження (сиквел)'
  - 'Архітекстуальність: жанровий зв''язок і читацькі очікування'
- section: Інтертекстуальність в українському постмодернізмі
  words: 1000
  points:
  - 'Карнавалізація та гра з класикою: феномен Бу-Ба-Бу'
  - 'Юрій Андрухович: «Рекреації» та «Московіада» як інтертекстуальні лабіринти'
  - Гра з «Енеїдою» Котляревського як національним претекстом
  - 'Сергій Жадан: інтертекстуальність рок-культури та соціального дна'
  - 'Оксана Забужко: інтелектуальна інтертекстуальність та феміністичний перегляд
    канону'
- section: Автоінтертекстуальність
  words: 600
  points:
  - 'Поняття автоінтертекстуальності: діалог автора з власними текстами'
  - Авторський міф і його конструювання через самоцитування
  - Цикли творів як єдиний метатекст (приклад «Ворошиловград» — «Інтернат»)
  - Переосмислення ранніх ідей у пізній творчості
- section: Інтермедіальність
  words: 800
  points:
  - 'Вихід за межі слова: взаємодія літератури з іншими мистецтвами'
  - 'Екфразис: словесний опис візуальних образів (живопис, архітектура, фотографія)'
  - Урбаністичний екфразис у сучасній прозі (Люко Дашвар, Софія Андрухович)
  - 'Музична інтермедіальність: структура музичного твору в тексті (фуга, соната)'
  - 'Кінематографічність літератури: монтажний принцип побудови тексту'
- section: Практикум — багаторівневий аналіз
  words: 800
  points:
  - Алгоритм виявлення інтертекстуальних маркерів у тексті
  - Розрізнення явних (маркованих) і прихованих (немаркованих) цитат
  - 'Аналіз функції інтертексту: полеміка, оммаж, іронія, авторитет'
  - Реконструкція «горизонту очікування» читача через архітекстуальні ознаки
  - Створення власного тексту з використанням пастишу або стилізації
- section: Підсумок
  words: 400
  points:
  - Транстекстуальність як інструмент фахового філолога
  - 'Етичні межі запозичення: де закінчується інтертекст і починається плагіат'
  - Майбутнє інтертекстуальності в епоху цифрових медіа
