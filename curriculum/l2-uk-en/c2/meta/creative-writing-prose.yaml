slug: creative-writing-prose
title: Творче письмо — проза
word_target: 5000
content_outline:
- section: Вступ — Проза як мистецтво
  words: 400
  points:
  - 'Трансформація читача в автора: як читати як письменник (reading like a writer).'
  - 'Жанрова специфіка малої прози: відмінність між ескізом, етюдом, новелою та оповіданням.'
  - 'Творчий процес: від зародження ідеї до першої чернетки (подолання страху білого
    аркуша).'
- section: Елементи оповідання
  words: 800
  points:
  - 'Ідея проти Теми: про що історія (сюжет) і про що вона *справді* (глибинний сенс).'
  - 'Створення тривимірних персонажів: досьє героя, мотивація, вади та внутрішні демони.'
  - 'Архітектура сюжету: класична арка (експозиція, зав''язка, кульмінація) та альтернативні
    структури.'
  - 'Конфлікт як двигун прози: внутрішній (людина проти себе) та зовнішній (людина
    проти обставин).'
- section: Побудова світу і атмосфери
  words: 800
  points:
  - 'Поняття хронотопу: єдність часу і простору в художньому тексті.'
  - 'Техніка ''Show, don''t tell'' в українському контексті: використання сенсорних
    деталей (зір, слух, нюх).'
  - Створення атмосфери та настрою через добір лексики та ритм речень.
  - 'Деталізація: як вибрати ''правильну'' деталь, що працює на розкриття теми.'
- section: Голос і точка зору
  words: 900
  points:
  - 'Типологія нараторів: перша особа (суб''єктивність), третя особа (обмежена vs
    всезнаюча).'
  - 'Фокалізація: чиїми очима ми бачимо сцену і як це змінює сприйняття.'
  - 'Авторський голос vs Голос персонажа: збереження стилістичної єдності.'
  - 'Потік свідомості (Stream of Consciousness): синтаксичні засоби передачі хаотичного
    мислення (приклад Коцюбинського).'
- section: Діалог і мовлення
  words: 800
  points:
  - 'Функції діалогу: рух сюжету, розкриття характеру, створення підтексту.'
  - 'Природність мовлення: як уникнути ''дерев''яних'' реплік та інфодампінгу.'
  - 'Індивідуалізація мовлення героїв: соціолект, ідіолект, сленг (у міру).'
  - 'Баланс сцени: чергування прямої мови, авторських ремарок та внутрішніх роздумів.'
- section: Редагування прози
  words: 800
  points:
  - 'Рівні редагування: структурне (сюжетні діри), стилістичне (ритм), коректорське
    (граматика).'
  - 'Техніка ''Kill your darlings'': чому важливо видаляти вдалі, але зайві фрагменти.'
  - 'Робота з чернеткою: стратегії саморедагування та ''відстоювання'' тексту.'
  - 'Підготовка до публікації: оформлення рукопису та етика подання.'
- section: Підсумок
  words: 500
  points:
  - 'Дисципліна письменника: регулярність практики та пошук власного голосу.'
  - 'Важливість зворотного зв''язку: як працювати з критикою (бета-рідери, редактори).'
  - 'Письменницька спільнота в Україні: де шукати однодумців та публікації.'
  - 'Фінальна рефлексія: проза як спосіб пізнання світу.'
