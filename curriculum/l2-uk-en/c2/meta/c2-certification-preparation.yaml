slug: c2-certification-preparation
title: Підготовка до сертифікації C2
word_target: 5000
content_outline:
- section: Вступ — Сертифікація як підтвердження рівня
  words: 600
  points:
  - 'С2 як ''золотий стандарт'' володіння мовою: що це означає на практиці (академічна
    та професійна свобода).'
  - 'Огляд доступних сертифікаційних програм: Державний стандарт, ALTE, університетські
    сертифікати.'
  - 'Сфера визнання сертифікатів: держслужба, громадянство, наукова діяльність, викладання.'
  - 'Мотиваційний компонент: сертифікат як особисте досягнення та професійний інструмент.'
- section: Огляд сертифікаційних іспитів
  words: 800
  points:
  - Структура Державного іспиту з української мови як іноземної (рівень С2).
  - 'Порівняльний аналіз форматів: аудіювання, читання, письмо, говоріння (специфіка
    завдань на С2).'
  - 'Вимоги до лексичного та граматичного мінімуму: що саме перевіряється (нюанси,
    стилістика).'
  - 'Критерії оцінювання: вага кожної частини, ''поріг склав/не склав'', система нарахування
    балів.'
- section: Стратегії підготовки до іспиту
  words: 1000
  points:
  - 'Довгострокове планування: як розподілити навантаження за 3-6 місяців до дати
    Х.'
  - 'Робота з автентичними джерелами: як перетворити читання новин і літератури на
    підготовку.'
  - 'Стратегії для аудіювання: розуміння прихованого змісту, іронії, діалектних особливостей.'
  - 'Стратегії для читання: швидке сканування (skimming) vs детальне вивчення (scanning),
    робота зі складними науковими текстами.'
  - Техніки запам'ятовування складної лексики та фразеології в контексті.
- section: Типові помилки та як їх уникнути
  words: 800
  points:
  - 'Аналіз типових помилок у письмовій частині: стилістичний дисонанс, калька, пунктуація
    у складних реченнях.'
  - 'Пастки в усному мовленні: паузи хезитації, надмірна простота, невпевнена інтонація.'
  - 'Помилки в розумінні інструкцій: чому важливо уважно читати завдання (ключові
    слова-маркери).'
  - 'Методи самоконтролю під час виконання завдань: чек-лист для перевірки есе та
    усного виступу.'
- section: Документи та процедури
  words: 600
  points:
  - 'Алгоритм реєстрації на іспит: від подачі заявки до отримання перепустки.'
  - 'Пакет необхідних документів: паспорт, посвідка, фотографії (вимоги).'
  - 'Процедура дня іспиту: таймінг, правила поведінки, заборонені предмети, технічні
    аспекти.'
  - 'Оскарження результатів: процедура подання апеляції, терміни розгляду, можливі
    результати.'
- section: Практика — Фінальна підготовка
  words: 1200
  points:
  - 'Симуляція іспиту: важливість проходження повного тесту в реальному часі без пауз.'
  - 'Психологічна підготовка: техніки подолання стресу, дихальні вправи, налаштування
    на успіх.'
  - 'План ''останнього тижня'': режим сну, повторення ключових моментів, відмова від
    вивчення нового.'
  - 'Аналіз власного прогресу: як об''єктивно оцінити свою готовність за результатами
    пробних тестів.'
  - 'Підсумок курсу: рефлексія над пройденим шляхом від А1 до С2.'
