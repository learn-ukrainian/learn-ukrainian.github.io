slug: contemporary-literature
title: Сучасна українська література
word_target: 5000
content_outline:
- section: Вступ — Літературний ландшафт сьогодення
  words: 600
  points:
  - 'Періодизація: від ''станіславського феномену'' до літератури часу війни.'
  - 'Зміна парадигм: вичерпання постмодернізму та повернення до реалізму.'
  - Література як інструмент фіксації національної травми та пам'яті.
  - Роль літератури в сучасному інформаційному просторі України.
- section: Провідні автори покоління
  words: 900
  points:
  - 'Юрій Андрухович: патріарх Бу-Ба-Бу та вічний карнавал.'
  - 'Оксана Забужко: інтелектуальний роман та феміністичний дискурс.'
  - 'Сергій Жадан: поетика індустріального сходу та волонтерський чин.'
  - 'Марія Матіос: історична травма та буковинська автентика.'
  - 'Андрій Курков: феномен перекладу та ''пікнік на льоду''.'
- section: 'Нове покоління: 2010-ті та 2020-ті'
  words: 700
  points:
  - 'Покоління ''двотисячників'': нові теми та нова щирість.'
  - 'Артем Чех та Ірина Цілик: голоси з передової та тилу.'
  - 'Софія Андрухович: магічний реалізм та історична реконструкція (''Фелікс Австрія'').'
  - 'Макс Кідрук: від тревелогу до технотрилеру (''Нові темні віки'').'
  - 'Ілларіон Павлюк: український нуар та містичний трилер.'
- section: Жанрові трансформації та експерименти
  words: 800
  points:
  - 'Ренесанс історичного роману: від Шкляра до Лиса.'
  - 'Розвиток жанрової літератури: український детектив, трилер, фантастика.'
  - 'Автобіографічна проза та автофікшн: межі відвертості.'
  - Есеїстика як провідний жанр інтелектуальної дискусії.
  - Репортаж і документальна проза (The Ukrainians, Reporters).
- section: Поезія XXI століття
  words: 800
  points:
  - 'Від герметичності до слему: поезія виходить на площі.'
  - Феномен поетичних читань та музичних колаборацій.
  - 'Поезія в соціальних мережах: лаконічність і вірусність.'
  - 'Воєнна лірика: пряма мова свідків (Ярина Чорногуз, Павло Вишебаба).'
  - Вплив репу та хіп-хопу на сучасну силабо-тоніку.
- section: Видавнича індустрія та літературний процес
  words: 700
  points:
  - 'Провідні гравці ринку: ''Видавництво Старого Лева'', ''А-ба-ба-га-ла-ма-га'',
    ''Vivat'', ''Meridian Czernowitz''.'
  - 'Книжкові фестивалі як культурні явища: Книжковий Арсенал vs BookForum.'
  - 'Перекладацька активність: українська література на експорт.'
  - 'Цифрова література: електронні книги, аудіокниги (Абук), подкасти.'
- section: 'Підсумок: Як орієнтуватися в потоці'
  words: 500
  points:
  - 'Рекомендації для читання: must-read список для C2.'
  - 'Ресурси для відстеження новинок: ЛітАкцент, Читомо, соцмережі критиків.'
  - 'Власна стратегія читання: як обирати якісну літературу.'
  - Заклик до підтримки українського книговидання.
