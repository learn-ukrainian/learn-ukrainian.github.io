slug: translation-theory
title: Теорія перекладу
word_target: 5000
content_outline:
- section: 'Вступ: Сутність перекладу'
  words: 600
  points:
  - Translation as a bridge between cultures, not just languages.
  - 'Definition: Primary vs. Secondary texts (§4.3.8).'
  - 'The translator''s role: Invisible glass or stained glass?'
  - 'Types of translation: Literary, technical, oral (interpretation).'
- section: Історія перекладознавства
  words: 700
  points:
  - 'Historical dichotomy: Word-for-word (Cicero/Jerome) vs. Sense-for-sense.'
  - The Bible translation controversy as the root of theory.
  - 'Evolution of views: From servitude to co-creation.'
  - The concept of 'untouchability' of the original.
- section: 'Ключові концепції: Еквівалентність та Адекватність'
  words: 800
  points:
  - 'Formal Equivalence (Nida): Focus on message form.'
  - 'Dynamic Equivalence: Focus on receptor response.'
  - 'Adequacy: Does the translation fulfill its intended function?'
  - 'Loss and Gain: Compensation strategies when exact equivalent is missing.'
- section: 'Стратегії: Одомашнення та Очуження'
  words: 750
  points:
  - Lawrence Venuti's concepts explained in Ukrainian context.
  - 'Domestication (Одомашнення): Making the text fluent for the reader, erasing foreignness.'
  - 'Foreignization (Очуження): Preserving the foreign flavor, challenging the reader.'
  - 'Cultural adaptation vs. exoticism: Where to draw the line?'
- section: Лексико-стилістичні виклики
  words: 800
  points:
  - 'Translating Realia (culture-specific items): Transliteration, calque, or descriptive
    translation?'
  - The trap of 'False Friends of the Translator' (Фальшиві друзі).
  - 'Handling Idioms and Puns: Translating the meaning vs. the image.'
  - 'Register and Dialect: How to translate ''Cockney'' into Ukrainian?'
- section: Українська школа художнього перекладу
  words: 800
  points:
  - 'The ''High Style'' tradition: Neoclassicists (Zerov) to Kochur/Lukash.'
  - 'Resistance through translation: Creating a Ukrainian world culture under Soviet
    pressure.'
  - 'Contemporary trends: Postmodern playfulness (Andrukhovych) and re-translation.'
  - The principle of direct translation (avoiding Russian as intermediary).
- section: 'Підсумок: Майстерність відтворення'
  words: 550
  points:
  - Translation as an ethical act.
  - The balance of science (theory) and art (intuition).
  - Preparation for practical modules (Poetry/Prose).
  - 'Final reflection: The translator as the unsung hero of literature.'
