slug: teaching-ukrainian-i
title: Викладання української мови I — Педагогічні основи
word_target: 5000
content_outline:
- section: Вступ — Педагогічна свідомість на рівні C2
  words: 600
  points:
  - 'Відкрити з питання: чим відрізняється мовна компетентність від здатності навчати
    мові? Провести коротку діагностику — читачеві пропонується пригадати, як вони
    самі вчили українську і що б вони пояснили б по-іншому'
  - 'Визначити поняття ''педагогічна свідомість'': не просто знати мову, а розуміти
    її механізми настільки, щоб пояснити їх іншим на різних рівнях складності'
  - 'Метамовна усвідомленість на рівні C2 як передумова викладання: конкретні приклади
    того, що носій мови ''знає'', але не може пояснити, vs. те, що C2-учень знає і
    пояснити може'
  - 'Рефлексія власного досвіду вивчення мови як педагогічний ресурс: якими методами
    вас навчали? Що спрацювало, що ні? Один конкретний приклад з викладацької практики
    (анонімна студентська помилка чи успіх)'
  - 'Орієнтація в мінісерії: цей модуль (основи) → c2-83 (планування) → c2-84 (матеріали)'
- section: Основи лінгводидактики
  words: 1000
  points:
  - 'Визначення лінгводидактики як науки: розмежувати лінгводидактику (теорія навчання
    мови), методику викладання (прикладна дисципліна) і педагогіку (загальна наука
    про навчання) — H3 для кожного терміна з чітким визначенням і прикладом'
  - 'Комунікативний підхід (КП): принципи (автентичні завдання, мова як засіб, а не
    мета; учень у центрі), практичне втілення в класі — таблиця порівняння: традиційний
    граматичний підхід vs. комунікативний підхід за 5 критеріями'
  - 'Теорія засвоєння другої мови: ключові поняття: гіпотеза вхідних даних (i+1),
    інтермова, ментальна граматика, свідоме vs. неусвідомлене засвоєння — кожне поняття
    з конкретним прикладом з класу з вивчення української'
  - 'Роль рідної мови учня: стратегічне використання L1 (для пояснення складних концепцій)
    vs. залежність від L1 (гальмування розвитку); конкретний сценарій: англомовний
    учень і відмінкова система'
  - 'Короткий огляд: як українська лінгводидактика розвивалась — від Харківської школи
    1920-х до CEFR-інтеграції після 1991 р. (2 абзаци, без детального розгляду)'
- section: Аналіз помилок і корекція
  words: 1000
  points:
  - 'Типологія помилок: системні помилки (errors — свідчать про хибну гіпотезу в інтермові)
    vs. ненавмисні хиби (mistakes — слипи, втома); важливість розрізнення для стратегії
    корекції — з таблицею прикладів у контексті вивчення української'
  - 'Інтерференція з англійської: 3–4 конкретних pattern з прикладами: (1) артикль-засіб
    (укр. не має артиклів → надмірне використання ''цей/та''); (2) аспект (укр. доконаний/недоконаний
    → неправильний вибір виду); (3) порядок слів (SOV vs SVO); (4) відмінки (english-speaker
    uses nominative by default)'
  - 'Стратегії корекції без демотивації: класифікація — пряма корекція, рекаст (recast),
    елісітація, метамовний коментар, паралельне повторення; для кожної стратегії —
    приклад обміну «учень–вчитель» у форматі діалогу (по 3–4 репліки)'
  - 'Позитивний зворотний зв''язок: що таке справжнє похвалення (specific, earned)
    на відміну від порожнього (''добре!''); роль afective filter (Krashen) у формуванні
    безпечного мовного середовища; 2–3 конкретних фрази для вчителя'
- section: Планування уроку
  words: 1000
  points:
  - 'Структура ефективного уроку: класична схема (розминка → презентація → практика
    → продукція → підсумок) — з часовими орієнтирами для 60-хв уроку; показати, як
    TTT (Test-Teach-Test) накладається на цю структуру'
  - 'Визначення цілей і завдань уроку: SMART-критерії в контексті викладання мови
    — конкретний приклад погано сформульованої цілі vs. добре сформульованої цілі;
    розрізнення цілі уроку (teacher''s goal) і навчального завдання (learner outcome)'
  - 'Розподіл часу і темп: типові помилки початківців (занадто багато презентації,
    замало практики; 80/20 vs. оптимальний 20/80 для комунікативного класу); пацинг
    — як відчути темп і адаптувати його в реальному часі'
  - 'Адаптація до рівня учнів: диференціація у змішаних групах — конкретні техніки
    (tiered tasks, flexible grouping); адаптація автентичних текстів без втрати автентичності;
    H3 з прикладом адаптації одного тексту для A2 і B2'
- section: Практика викладання — Симуляція
  words: 1000
  points:
  - 'Що таке мікровикладання: визначення, історія методу (Dwight Allen, Stanford,
    1963), адаптація для C2-контексту; чому 5–10 хвилин мінівикладання ефективніші
    за годинні спостереження'
  - 'Сценарій симуляції (структурований): дати конкретний мовний контент для мінівикладання
    — наприклад, ''Поясніть учневі рівня B1 різницю між доконаним і недоконаним видом
    дієслова''; крок за кроком через 10-хвилинний мікроурок із хронометражем'
  - 'Самоаналіз і рефлексія після мікровикладання: чекліст із 8–10 пунктів для самооцінки
    (чіткість пояснення, якість прикладів, темп, залучення учня, корекція помилок
    тощо)'
  - 'Зворотний зв''язок від колег: як давати конструктивний feedback: sandwich-метод
    (позитив → зауваження → позитив); конкретні фрази для спостерігача; розбір одного
    прикладу feedback-сесії у форматі короткого діалогу'
  - 'Вдосконалення техніки: концепція deliberate practice — цілеспрямована, зосереджена
    практика з feedback-петлею; як застосовувати до розвитку викладацьких умінь'
- section: Підсумок — Перші кроки у викладанні
  words: 400
  points:
  - 'Індивідуальний стиль викладання: чому не існує ''єдиного правильного'' стилю;
    короткий огляд типів педагогічних особистостей (facilitator, instructor, coach);
    запрошення поміркувати, який стиль ближчий читачу'
  - 'План професійного розвитку: конкретні 3 кроки на наступні 6 місяців (знайти учня
    для мікровикладання, пройти онлайн-курс, вступити до спільноти викладачів)'
  - 'Ресурси для вчителів: перелік з 5–7 ресурсів — УМЦ МОН, АЦДНЯ (Асоціація вчителів),
    CEFR Companion Volume 2020, Методика Ніколаєвої (Ukrainian EFL textbook methodology),
    українські педагогічні журнали'
