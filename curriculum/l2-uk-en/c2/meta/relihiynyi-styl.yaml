slug: relihiynyi-styl
title: Релігійний стиль — Сакральна мова
word_target: 5000
content_outline:
- section: Вступ — Релігійний стиль в українській мові
  words: 600
  points:
  - Definition of religious (confessional) style in the system of functional styles
    (§4.3.1.1).
  - 'Historical trajectory: from Church Slavonic to the living Ukrainian language
    in liturgy.'
  - The role of the Peresopnytsia Gospel as a bridge between sacral and vernacular.
  - 'Specific features: solemnity, archaism, symbolic imagery.'
- section: Біблійний стиль
  words: 800
  points:
  - The significance of Ivan Ohienko's translation (1962) as a standard.
  - Lexical features of the biblical text (high lexis, specific terminology).
  - 'Syntactic rhythm: parataxis, repetition, ''and'' (і) usage mirroring Hebrew syntax.'
  - 'Comparative analysis: Ohienko vs. Khomenko vs. Kulish (stylistic nuances).'
- section: Молитовний дискурс
  words: 800
  points:
  - 'The communicative structure of prayer: Address -> Petition -> Glorification.'
  - The mandatory nature of the Vocative case (Кличний відмінок) in addressing the
    Divine (Боже, Господи, Ісусе, Маріє).
  - 'Analysis of ''Отче наш'' (The Lord''s Prayer): archaic forms (даждь, остави)
    vs. modern equivalents.'
  - Formulaic nature of liturgical prayers (Єктенії).
- section: Церковнослов'янські елементи
  words: 700
  points:
  - 'Lexical markers: благо, глас, істина, врата, уста.'
  - 'Phonetic features: non-pleophony (град vs город, глас vs голос).'
  - Grammatical archaisms surviving in fixed phrases (во віки віків, нині і повсякчас).
  - 'Stylistic function: creating solemnity vs. ironic use in secular literature.'
- section: Проповідь та гомілетика
  words: 700
  points:
  - 'Homiletics as the rhetoric of faith: structure of a sermon.'
  - 'Rhetorical devices: direct address, rhetorical questions, biblical parallels.'
  - 'Thematic range: moral instruction, exegesis, contemporary application.'
  - 'Evolution: classical baroque sermon (Stefan Yavorsky) vs. modern pastoral communication.'
- section: Релігійний стиль у літературі
  words: 700
  points:
  - Biblical intertextuality in Taras Shevchenko ('David's Psalms', 'Mariia').
  - Ivan Franko and the desacralization/humanization of biblical themes ('Moses').
  - Sacred imagery in modern poetry (Stus, Kostenko) – religious style beyond religion.
  - 'Secularization: how religious idioms became part of everyday language (нести
    свій хрест, терновий вінок).'
- section: Практикум — Аналіз та інтерпретація
  words: 700
  points:
  - Textual analysis of a Psalm (identifying stylistic markers).
  - Syntactic reconstruction of a prayer structure.
  - 'Lexical differentiation: sorting Church Slavonicisms, Old Ukrainian, and Modern
    terms.'
  - 'Discussion topic: ''Sacred language in a secular state — cultural code or archaism?'''
