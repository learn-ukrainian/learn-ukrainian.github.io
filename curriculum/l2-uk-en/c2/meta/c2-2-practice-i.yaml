slug: c2-2-practice-i
title: Практика C2.2 I — Літературне портфоліо
word_target: 5000
content_outline:
- section: Вступ — Мета літературного портфоліо
  words: 600
  points:
  - Визначення літературного портфоліо як інструменту самооцінки та демонстрації творчої
    еволюції — пояснення різниці між 'демонстраційним' та 'робочим' портфоліо
  - 'Структура повного літературного портфоліо: перелік обов''язкових розділів (есе,
    поезія, проза, переклад, рефлексія) з поясненням їхньої педагогічної функції'
  - 'Критерії відбору текстів: репрезентативність, когерентність, жанрова різноманітність
    — конкретні запитання для самоперевірки (''Чи демонструє цей текст мою кращу роботу?
    Чи відрізняється він від інших?'')'
  - 'Баланс між жанрами: чому портфоліо не є збіркою найкращих текстів, а є аргументованою
    добіркою — поняття стилістичної цілісності'
  - Короткий зразок вступного слова до портфоліо (авторська передмова, 100–150 слів)
    як модель для наслідування
- section: Аналітичне есе — Літературознавчий аналіз
  words: 1000
  points:
  - 'Структура літературознавчого есе: теза → текстуальні докази → теоретична інтерпретація
    → висновок — кожен елемент з окремим H3 і зразком речення'
  - 'Різниця між ''описом'' і ''аналізом'': таблиця з двома колонками (описовий фрагмент
    / аналітичний аналог) для 4–5 пар'
  - 'Інтеграція теоретичних концепцій із M26–31 (наратологія, структуралізм, постколоніальна
    теорія): як вводити термін, давати визначення і застосовувати до конкретного тексту
    — 3 приклади різних концепцій'
  - 'Цитування в академічному стилі: пряма цитата, блок-цитата, парафраз — формати
    для есе (без посилань у форматі APA/MLA, а в стилі українського академічного листа)'
  - 'Авторський голос в есе: як зберегти аналітичну дистанцію і водночас не втратити
    особистої позиції — приклади вставних конструкцій (на мою думку / на думку дослідника
    / аналіз свідчить)'
  - Зразковий фрагмент есе (150–200 слів) із аналізом конкретного українського тексту
    — анотований для учня
- section: Поетичний розділ
  words: 900
  points:
  - 'Три обов''язкові форми: верлібр, класичний сонет (петрарківський або шекспірівський),
    вірш з римою — для кожної: визначення, схема, приклад із сучасної української
    поезії'
  - 'Зразковий верлібр (8–10 рядків) авторства куратора модуля: повний текст + анотований
    коментар до просодичних рішень (розриви рядків, ритм, образна система)'
  - 'Зразковий сонет з поясненням структури: де вольта, як будувати октаву та секстет
    — коментар до кожного структурного елемента'
  - 'Авторський коментар до власних творів: як відповісти на питання ''Яку функцію
    виконує цей образ?'', ''Чому саме цей розмір?'', ''Що лишилося незавершеним?''
    — шаблон коментаря (5 запитань)'
  - 'Демонстрація просодії (М22, М28): тонічна, силабо-тонічна і силабічна системи
    — визначення з прикладами в контексті власних творів учня'
- section: Прозовий розділ
  words: 900
  points:
  - 'Вимоги до прозового фрагмента портфоліо: оповідання або уривок (800–1500 слів)
    — параметри якості (зав''язка, конфлікт, голос, закінчення або відкритий фінал)'
  - 'Наратологічний самоаналіз (М27, М29): оповідач (надійний/ненадійний), точка зору
    (перша/третя особа, обмежена/всезнаюча), темпоральна структура (ретроспекція,
    проспекція) — для кожного параметра учень вказує власне рішення і обґрунтовує'
  - 'Індивідуальний голос (М14–15): лексичний вибір, синтаксичний ритм, повторювані
    образи та мотиви — як ідентифікувати власний голос через порівняння двох власних
    текстів'
  - Різниця між авторською передмовою та аналітичним коментарем до прозового тексту
    — два зразкових формати (по 80–100 слів кожен)
  - 'Типові проблеми прозового фрагмента і способи їх усунення: розмитий конфлікт,
    невмотивований POV-стрибок, кліше — 3 ''до/після'' приклади'
- section: Перекладацький розділ
  words: 850
  points:
  - 'Мета перекладацького розділу: демонстрація розуміння іншої мови/культури через
    призму української — не просто ''правильний'' переклад, а ''аргументований'''
  - 'Зразок поетичного перекладу у двох колонках (оригінал | переклад) — рекомендований
    текст: короткий вірш (8–16 рядків) з будь-якої мови, відомої учню'
  - 'Перекладацький коментар: структурований формат — (а) ключові лексичні рішення
    (де і чому відступ від буквального значення), (б) просодична адаптація (ритм,
    рима у перекладі), (в) культурні еквіваленти (реалії, які не перекладаються дослівно)'
  - 'Порівняльний аналіз оригіналу та перекладу: таблиця з 5–6 конкретними рядками/фразами
    з поясненням рішення — деколонізована рамка: переклад як акт культурного привласнення,
    а не підпорядкування'
  - 'Українська традиція літературного перекладу: Микола Лукаш, Григорій Кочур — коротка
    характеристика їхнього підходу до коментаря як моделі для учня'
- section: Рефлексія та висновки
  words: 750
  points:
  - 'Критерії самооцінки літературного розвитку: фреймворк з 5 параметрів (технічна
    майстерність, жанрова різноманітність, оригінальність голосу, аналітична глибина,
    перекладацька компетентність) — для кожного: шкала і дескриптори'
  - 'Ідентифікація сильних сторін: як писати про власні досягнення без хвалькуватості
    і без надмірної скромності — 3 зразкові формулювання'
  - 'Ідентифікація зон росту: чесна критична самооцінка — різниця між ''мені важко
    дається X'' і ''я ще не розвинув Y, тому що...'' — 3 зразкові формулювання'
  - 'План подальшого вдосконалення: конкретні, вимірювані кроки (список читання на
    5 позицій, щотижнева практика написання, участь у літературній спільноті) — не
    абстрактні наміри'
  - 'Підсумковий метакогнітивний блок: як портфоліо змінило розуміння власної творчості
    — моделювання відкритого запитання для усної захисту портфоліо'
