slug: writing-literary-essays
title: Написання літературознавчих есеїв
word_target: 5000
content_outline:
- section: Вступ — Літературознавчий есей як жанр
  words: 700
  points:
  - 'Визначення літературознавчого есею: баланс між науковим дослідженням (scientific
    rigor) та художньою публіцистикою (artistic flair).'
  - 'Відмінність від інших жанрів: есей vs. наукова стаття (стаття вимагає вичерпності,
    есей — оригінальності погляду), есей vs. рецензія (рецензія оцінює новинку, есей
    аналізує сенси).'
  - 'Академічний vs. есеїстичний стиль: коли доречна метафоричність, а коли — суха
    логіка.'
  - 'Вимоги до публікації в сучасних українських літературних часописах («Критика»,
    «ЛітАкцент»): актуальність, полемічність, глибина.'
  - 'Культурний контекст: есеїстика як інструмент інтелектуального опору (приклад
    шістдесятників).'
- section: Пошук теми та тези
  words: 700
  points:
  - 'Етап передписання (pre-writing): від пасивного читання до активного спостереження.
    Техніка «Close Reading» (пильне читання).'
  - 'Формулювання дослідницького питання: як перетворити спостереження («у творі багато
    символів води») на проблему («як символіка води розкриває тему очищення?»).'
  - 'Кристалізація тези (Thesis Statement): формула «Тема + Твердження + Аргументація».
    Теза як хребет есею.'
  - 'Критерії сильної тези: дискусійність (arguable), конкретність, масштабність (не
    надто вузька, не надто широка).'
  - 'Оригінальність і релевантність: чому ця тема важлива саме зараз? (Контекстуалізація
    в сучасному дискурсі).'
- section: Структура літературознавчого есею
  words: 750
  points:
  - 'Архітектоніка тексту: класична тричастинна структура (Вступ, Основна частина,
    Висновок) та її варіації в есеїстиці.'
  - 'Вступ (Introduction): гачок (hook), контекст (background info) і чітка теза.
    Як зацікавити читача з першого речення.'
  - 'Основна частина (Body Paragraphs): принцип «Один абзац — одна ідея». Структура
    абзацу: Тематичне речення (Topic Sentence) → Докази → Аналіз → Перехід.'
  - 'Логічні переходи (Transitions): створення «течії» тексту (flow). Використання
    конекторів (водночас, натомість, у цьому контексті).'
  - 'Висновки (Conclusion): стратегія «Synthesize, don''t summarize». Вихід на ширший
    контекст, відповідь на питання «So what?».'
- section: Робота з текстовими доказами
  words: 750
  points:
  - 'Доказова база: текст твору як єдине джерело істини. Чому «я так відчуваю» не
    працює без цитати.'
  - 'Мистецтво цитування: короткі вкраплення (embedded quotes) vs. блокові цитати.
    Граматична інтеграція цитат у речення.'
  - 'Аналіз цитати (Unpacking): правило «2 до 1» (два речення аналізу на одне речення
    цитати). Пояснення, *як* цитата підтверджує тезу.'
  - 'Парафраз vs. пряма цитата: коли краще переказати своїми словами (сюжетні моменти),
    а коли — цитувати дослівно (стилістичні особливості).'
  - 'Робота з вторинними джерелами: як коректно залучати думки інших критиків (полемізувати
    або погоджуватися), уникаючи плагіату.'
- section: Стилістика академічного письма
  words: 700
  points:
  - 'Тон і регістр (Tone and Register): як звучати авторитетно, але не зарозуміло.
    Уникнення категоричності (hedging): «можна припустити», «ймовірно».'
  - 'Лексичне багатство: використання фахової термінології (наратор, фокалізація,
    хронотоп) без надуживання (jargon overload).'
  - 'Синтаксична різноманітність: баланс між короткими ударними фразами та розгорнутими
    періодними конструкціями.'
  - 'Уникнення кліше та «води»: боротьба зі штампами («червоною ниткою проходить»,
    «оспівує красу рідного краю»).'
  - 'Авторський голос (Voice): як зберегти індивідуальність у межах академічного канону.'
- section: Редагування та вдосконалення
  words: 700
  points:
  - 'Стратегія «холодного ока»: чому важливо відкласти текст перед редагуванням.'
  - 'Чек-лист самоперевірки (Self-Audit): чи відповідає кожен абзац тезі? Чи є логічні
    діри?'
  - 'Перевірка аргументації: чи не допущено логічних помилок (ad hominem, хибне узагальнення).'
  - 'Мовне шліфування (Polishing): усунення тавтологій, русизмів, стилістичних покручів.
    Ритм тексту.'
  - 'Форматування та бібліографія: культура оформлення посилань (ДСТУ/APA) як ознака
    професіоналізму.'
- section: Підсумок
  words: 700
  points:
  - 'Шлях есею від чернетки до публікації: культура подання рукопису.'
  - 'Інститут рецензування (Peer Review): як сприймати критику та вдосконалювати текст
    на основі відгуків.'
  - 'Портфоліо літературознавця: навіщо збирати свої тексти і де їх можна публікувати
    (блоґи, академічні збірки, культурні медіа).'
  - 'Есей як інструмент мислення: як написання текстів структурує власну картину світу.'
  - 'Фінальна настанова: писати чесно, аргументовано і з любов''ю до слова.'
