slug: reading-professional-texts-ii
title: Читання фахових текстів II — Критичний аналіз
word_target: 5000
content_outline:
- section: Вступ — Від розуміння до критичного аналізу
  words: 600
  points:
  - Визначення критичного аналізу як переходу від пасивного сприйняття до активної
    оцінки тексту.
  - Різниця між розумінням (що сказано) та оцінюванням (чому і як сказано).
  - 'Ключові питання до тексту: хто, для кого, з якою метою, у якому контексті.'
  - Роль критичного мислення у фаховій діяльності та прийнятті рішень.
- section: Оцінка джерел та авторитетності
  words: 900
  points:
  - 'Ієрархія джерел: первинні vs вторинні, рецензовані наукові видання vs публіцистика.'
  - 'Критерії оцінки авторитетності: репутація автора, статус видавництва, наявність
    посилань.'
  - Виявлення конфлікту інтересів та прихованого порядку денного (hidden agenda).
  - 'Розпізнавання упередженості (bias): емоційна лексика, вибірковість фактів, логічні
    стрибки.'
- section: Аналіз аргументації
  words: 900
  points:
  - 'Анатомія аргументу: теза (твердження) — докази (дані) — обґрунтування (зв''язок).'
  - 'Типи доказів у фахових текстах: емпіричні дані, експертні думки, логічні висновки.'
  - Оцінка валідності та надійності доказів.
  - Поширені логічні помилки (fallacies) в академічному та професійному дискурсі (наприклад,
    хибна причинність, апеляція до авторитету).
- section: Порівняльний аналіз
  words: 900
  points:
  - Методологія зіставлення різних джерел на одну тему (синтопічне читання).
  - Виявлення консенсусу (спільних точок зору) та розбіжностей (дискусійних питань).
  - 'Синтез інформації: як об''єднати суперечливі дані в цілісну картину.'
  - Техніки візуалізації порівняння (таблиці, матриці) для аналітичної роботи.
- section: Критичне анотування
  words: 800
  points:
  - Відмінність анотації (summary) від критичної анотації (critical abstract).
  - 'Структура критичної анотації: бібліографічний опис, стислий зміст, оцінка значущості,
    рекомендації.'
  - Техніка 'Smart Notes' для організації нотаток та майбутнього цитування.
  - Етичне цитування та уникнення плагіату при реферуванні.
- section: Практичні вправи
  words: 900
  points:
  - 'Кейс-стаді: розбір реальної наукової статті з виділенням сильних та слабких сторін
    аргументації.'
  - Завдання на порівняння двох текстів з протилежними поглядами на одну професійну
    проблему.
  - Написання критичної анотації до запропонованого фахового тексту.
  - Редагування тексту з метою усунення логічних помилок та упередженості.
