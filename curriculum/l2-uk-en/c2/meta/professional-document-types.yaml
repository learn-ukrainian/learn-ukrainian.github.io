slug: professional-document-types
title: Типи професійних документів
word_target: 5000
content_outline:
- section: 'Вступ: Класифікація професійних документів'
  words: 600
  points:
  - 'Визначення документа згідно з ДСТУ 4163:2020: зафіксована інформація з реквізитами.'
  - 'Функціональна класифікація: організаційні, розпорядчі, інформаційні, колегіальні.'
  - 'Рівні стандартизації: типові (шаблонні) та індивідуальні документи.'
  - 'Роль цифровізації: від паперу до кваліфікованого електронного підпису (КЕП).'
- section: Організаційно-розпорядча документація
  words: 900
  points:
  - 'Наказ як основний розпорядчий документ: структура (констатуюча та розпорядча
    частини).'
  - 'Імперативність мови: дієслова ''НАКАЗУЮ'', ''ЗОБОВ''ЯЗУЮ'', ''ЗАТВЕРДЖУЮ''.'
  - 'Постанови та рішення: колегіальність прийняття vs. одноосібна відповідальність.'
  - 'Вимоги до оформлення: гриф затвердження, візи, резолюції керівника.'
- section: Інформаційно-довідкові документи
  words: 900
  points:
  - 'Протокол засідання: фіксація ходу обговорення (СЛУХАЛИ — ВИСТУПИЛИ — УХВАЛИЛИ).'
  - 'Доповідна та службова записки: внутрішня комунікація та ієрархія (кому? від кого?).'
  - 'Акти: фіксація фактів (передачі, списання, перевірки) комісією.'
  - 'Довідка: підтвердження біографічних або службових фактів.'
- section: Документи щодо особового складу
  words: 800
  points:
  - 'Заява: універсальний інструмент волевиявлення (структура ''шапки'', текст, підпис).'
  - 'Автобіографія та CV: хронологічний виклад vs. компетентнісний підхід.'
  - 'Характеристика та рекомендаційний лист: оцінна лексика в офіційному стилі.'
  - 'Типові помилки: плутанина між ''особистим'' та ''особовим'' листком.'
- section: Договірно-правова документація
  words: 800
  points:
  - 'Договір (Контракт): істотні умови, права та обов''язки сторін.'
  - 'Кліше зобов''язання: ''Сторони зобов''язуються'', ''Виконавець гарантує''.'
  - 'Доручення (Довіреність): делегування повноважень (хто? кому? що? на який термін?).'
  - 'Приклад із Держстандарту: синтаксис доручення.'
- section: 'Практикум: Культура ділового мовлення'
  words: 1000
  points:
  - 'Мовні штампи та канцеляризми: коли вони необхідні, а коли зайві.'
  - 'Аналіз типових помилок: ''згідно інструкції'', ''приймати міри'', ''на протязі''.'
  - 'Редагування тексту: усунення двозначності та тавтології.'
  - 'Етикет офіційного документа: тон, звертання, гендерно-нейтральна мова.'
