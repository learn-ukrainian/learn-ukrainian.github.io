slug: complete-grammar-review
title: Повний огляд граматики
word_target: 5000
content_outline:
- section: Вступ — Граматика як система
  words: 400
  points:
  - 'Мова як живий організм: взаємозв''язок рівнів (фонетика → морфологія → синтаксис).'
  - 'Граматичні категорії: чому українська флективна система гнучкіша за аналітичні.'
  - 'Морфологія vs синтаксис: де закінчується форма і починається функція.'
  - 'Мета огляду на рівні C2: від несвідомого володіння до усвідомленої майстерності.'
- section: Морфологія іменних частин мови
  words: 900
  points:
  - 'Іменник: критичні точки чотирьох відмін (IV відміна, множинні іменники, спільний
    рід).'
  - 'Категорія відмінка: глибинні значення (орудний творця, родовий частини).'
  - 'Прикметник: стягнені та нестягнені форми, стилістичні нюанси ступенів порівняння.'
  - 'Числівник: ''хворі місця'' відмінювання складених числівників та дробових.'
  - 'Займенник: енклітичні форми та стилістична роль (всякий vs. кожний).'
- section: Морфологія дієслова
  words: 800
  points:
  - 'Вид і час: асиметрія системи (чому немає майбутнього доконаного складеного).'
  - 'Способові нюанси: наказовий спосіб для 1-ї та 3-ї особи, умовний спосіб у ввічливості.'
  - 'Дієприкметник: обмеженість активних форм та заміна підрядними реченнями.'
  - 'Дієприслівник: нормативність вживання (суб''єкт дії) та типові помилки.'
  - 'Безособові форми на -но/-то: активність чи пасивність?'
- section: Службові та незмінні слова
  words: 500
  points:
  - 'Прийменники: керування відмінками та синонімічні ряди (задля/для/ради).'
  - 'Сполучники: семантичні відтінки сурядності та підрядності (оскільки/тому що/бо).'
  - 'Частки: модальні, формотворчі та їхня роль у формуванні підтексту.'
  - 'Вигуки: від емоційних реакцій до етикетних формул.'
- section: Синтаксис простого речення
  words: 700
  points:
  - 'Порядок слів: актуальне членування (тема-рема) як засіб логічного наголосу.'
  - 'Односкладні речення: стилістична потужність безособових та номінативних конструкцій.'
  - 'Ускладнення: відокремлені члени речення як інструмент інформаційної щільності.'
  - 'Вставні конструкції: модальність автора та структурування думки.'
- section: Синтаксис складного речення
  words: 900
  points:
  - 'Складносурядність: єднальні, протиставні та розділові відношення.'
  - 'Складнопідрядність: багатокомпонентні конструкції з послідовною підрядністю.'
  - 'Безсполучникові речення: інтонаційна виразність та смислова ємність.'
  - 'Період: гармонійна побудова розгорнутого висловлювання.'
- section: Практикум — Комплексна перевірка
  words: 800
  points:
  - 'Діагностика слабких місць: ''сліпі зони'' навіть на рівні C2.'
  - 'Аналіз тексту: пошук граматичних маркерів стилю.'
  - 'Редагування: виправлення стилістичних та граматичних огріхів.'
  - 'Стратегія подальшого вдосконалення: як підтримувати граматичну форму.'
