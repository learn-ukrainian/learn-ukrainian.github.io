slug: syntactic-stylistics
title: Синтаксична стилістика — Різноманітність речень
word_target: 5000
content_outline:
- section: Вступ — Синтаксис як інструмент стилю
  words: 400
  points:
  - 'Синтаксис як ''дихання'' тексту: зв''язок структури з ритмом і сприйняттям.'
  - 'Норма та відхилення: коли граматична помилка стає стилістичним прийомом.'
  - 'Огляд основних засобів: від порядку слів до фігур мови.'
  - Роль синтаксису у творенні індивідуального авторського стилю.
- section: 'Просте vs складне речення: Ритм прози'
  words: 800
  points:
  - 'Естетика простого речення: лаконічність, динаміка, ''телеграфний стиль''.'
  - 'Магія складного речення: розгортання думки, гіпотаксис, плинність.'
  - 'Синтаксичний період (періодичне мовлення): структура, гармонія, класичні приклади.'
  - Чергування довгих і коротких речень як засіб уникнення монотонності (аналіз уривків).
- section: 'Інверсія та порядок слів: Логіка vs Емоція'
  words: 600
  points:
  - 'Актуальне членування речення: Тема (відоме) і Рема (нове).'
  - Прямий порядок слів як нейтральне тло.
  - 'Стилістична інверсія: винесення присудка або додатка на початок для акценту.'
  - Поетична вільність vs комунікативна необхідність (аналіз прикладів).
- section: 'Спеціальні конструкції: Експресія розриву'
  words: 800
  points:
  - 'Парцеляція: крапка там, де її не чекають (ефект живої думки, акцент на деталі).'
  - 'Еліпсис: динаміка через тишу (пропуск присудка, ''рубана'' проза).'
  - 'Приєднання (приєднувальні конструкції): додавання думки ''навздогін''.'
  - Асиндетон (безсполучниковість) як засіб пришвидшення темпу.
- section: 'Риторичні фігури: Симетрія та Нагнітання'
  words: 1000
  points:
  - 'Синтаксичний паралелізм: магія повторюваних структур (фольклор, пісні).'
  - 'Градація (клімакс та антиклімакс): емоційні сходи тексту.'
  - 'Анафора та епіфора: ритмічне скріплення тексту через повтори.'
  - 'Полісиндетон (багатосполучниковість): урочистість і сповільнення ритму.'
- section: Діалогічність та адресність тексту
  words: 600
  points:
  - 'Риторичні запитання: ствердження через сумнів.'
  - Звертання як засіб інтимізації або офіціозу (стилістичні функції).
  - 'Уточнювальні члени речення та вставні конструкції: авторський коментар.'
  - 'Відокремлення: змістова вага другорядних членів речення.'
- section: Практикум — Майстерня синтаксису
  words: 800
  points:
  - 'Трансформація: перетворення набору простих речень у синтаксичний період.'
  - 'Стилістичний експеримент: зміна ефекту тексту через зміну порядку слів.'
  - 'Аналіз тексту: визначення синтаксичних домінант у Коцюбинського vs Нечуя-Левицького.'
  - 'Редагування: ''лікування'' монотонного тексту шляхом варіювання структур.'
