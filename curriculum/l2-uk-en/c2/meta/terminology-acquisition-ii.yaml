slug: terminology-acquisition-ii
title: Опанування термінології II — Побудова глосаріїв
word_target: 5000
content_outline:
- section: Вступ — Персональний глосарій як інструмент
  words: 600
  points:
  - 'Відмінність глосарія від словника: контекстуалізація та спеціалізація'
  - 'Історичний екскурс: Інститут української наукової мови та Агатангел Кримський
    як приклад системного підходу'
  - Переваги ведення власного глосарію для рівня C2 (активний словниковий запас)
  - 'Принципи організації: системність, актуальність, доступність'
  - 'Цифрові (Excel, Notion, Anki) проти паперових інструментів: плюси та мінуси'
- section: Структура термінологічної картки
  words: 900
  points:
  - Анатомія терміна згідно з ISO 1087 (поняття vs позначення)
  - 'Обов''язкові елементи: лема, граматична характеристика, дефініція'
  - 'Роль контексту: чому ''голий'' переклад не працює (приклад полісемії)'
  - 'Факультативні елементи: синоніми, антоніми, етимологія'
  - 'Колокації (сполучуваність): як термін ''поводиться'' у реченні'
  - 'Візуалізація понять: схеми та ілюстрації у картці'
- section: Методи збору термінів
  words: 900
  points:
  - 'Стратегії читання: сканування тексту на наявність термінів (term extraction)'
  - 'Робота з паралельними текстами (bitexts): пошук відповідників'
  - Використання корпусів (ГРАК) для перевірки вживаності
  - Екстракція з усного мовлення (лекції, подкасти, конференції)
  - 'Критерії відбору: чи варто заносити це слово у глосарій?'
  - Консультації з фахівцями (SME) як метод уточнення значень
- section: Верифікація та валідація
  words: 900
  points:
  - 'Джерела правди: СУМ-20, словники ULIF, фахові енциклопедії'
  - 'Проблема ''Вікіпедії'': як критично оцінювати онлайн-ресурси'
  - 'Деколонізаційна призма: виявлення та заміна російських кальок (напр., ''міроприємство''
    -> ''захід'')'
  - Розв'язання термінологічних конфліктів (коли різні джерела дають різні визначення)
  - 'Валідація через узус: перевірка частотності у фаховій літературі'
  - Роль стандартизації (ДСТУ, ISO) у виборі терміна
- section: Організація та підтримка глосарію
  words: 900
  points:
  - Класифікація за семантичними полями (тегування)
  - 'Алфавітний vs тематичний порядок: що обрати?'
  - 'Регулярний огляд (maintenance): видалення застарілого, уточнення дефініцій'
  - 'Інтеграція глосарію в навчальний процес: техніка інтервального повторення'
  - 'Обмін глосаріями: спільноти практики та відкрий код'
  - Еволюція від списку слів до бази знань (Personal Knowledge Management)
- section: Практичний проєкт
  words: 800
  points:
  - 'Завдання: Створення міні-глосарію (50 термінів) з обраної галузі'
  - 'Етап 1: Обрання домену та пошук 3-5 джерел (статті, відео)'
  - 'Етап 2: Екстракція та заповнення термінологічних карток'
  - 'Етап 3: Верифікація термінів за авторитетними словниками'
  - 'Презентація результату: структура, найцікавіші знахідки, труднощі'
  - Самооцінка за чеклистом якості глосарію
