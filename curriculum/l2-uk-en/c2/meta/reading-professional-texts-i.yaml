slug: reading-professional-texts-i
title: Читання фахових текстів I — Стратегії розуміння
word_target: 5000
content_outline:
- section: Вступ — Читання як активний процес
  words: 600
  points:
  - 'Deconstruct the myth of passive reading: professional reading is an active interrogation
    of the text.'
  - Distinguish between 'reading for pleasure' (linear, immersive) and 'professional
    reading' (non-linear, goal-oriented).
  - 'Introduce the four modes: skimming (переглядове), scanning (пошукове), intensive
    (вивчальне), extensive (ознайомлювальне).'
  - 'Define ''cognitive strategies'': metacognition and setting a reading purpose
    before starting.'
- section: Структура фахових текстів
  words: 1000
  points:
  - Analyze the IMRAD structure (Вступ, Методи, Результати, Обговорення) as a navigation
    map.
  - 'Explain the function of technical documents: technical specs, white papers, legislative
    acts (ДСТУ).'
  - 'The hierarchy of navigation markers: how to use H1-H3 headers, abstracts, and
    bold text to predict content.'
  - 'Case study: dissecting the visual anatomy of a typical article from ''Visnyk
    NBUV''.'
- section: Скімінг — Техніка швидкого огляду
  words: 800
  points:
  - 'Definition and goal: grasping the ''gist'' (основна ідея) without reading every
    word.'
  - 'Technique: reading the first and last sentence of each paragraph.'
  - 'Technique: scanning visual aids (graphs, tables) before the text.'
  - 'Decision gate: using skimming to decide ''Do I need to read this deeply?'' (Triage).'
- section: Сканінг — Стратегії цілеспрямованого пошуку
  words: 800
  points:
  - 'Definition and goal: locating specific data points (dates, names, terms) ignoring
    the rest.'
  - 'The ''Searchlight'' technique: moving eyes vertically or diagonally looking for
    keyword shapes.'
  - Using indices, tables of contents, and 'Ctrl+F' (mental and digital) effectively.
  - 'Contrast with skimming: scanning is for *data*, skimming is for *concepts*.'
- section: Робота з незнайомою лексикою
  words: 1000
  points:
  - 'The danger of ''dictionary fatigue'': why looking up every word kills comprehension.'
  - 'Contextual inference strategies: using surrounding words to guess meaning.'
  - 'Morphological analysis: decomposing complex terms (root + suffix) to find meaning.'
  - 'When to stop and look it up: criteria for ''blocking vocabulary'' vs. ''noise''.'
- section: Практичні стратегії та самооцінка
  words: 800
  points:
  - 'Synthesizing the approach: the ''Skim -> Scan -> Intensive'' workflow.'
  - 'Adapting strategy to domain: how reading a legal contract differs from reading
    a medical study.'
  - 'Self-regulation: checking comprehension (''Did I answer my initial question?'').'
  - 'Summary of key takeaway: efficiency does not mean shallowness; it means strategic
    depth.'
