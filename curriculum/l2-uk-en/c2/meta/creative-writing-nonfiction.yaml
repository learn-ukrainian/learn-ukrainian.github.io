slug: creative-writing-nonfiction
title: 'Творча нефікція: есеїстика, мемуари, репортаж'
word_target: 5000
content_outline:
- section: Вступ — Творча нефікція як жанр
  words: 700
  points:
  - Define 'документальна проза' (creative nonfiction) as a genre at the intersection
    of factual accuracy and literary artistry, detailing the boundary between fiction
    and non-fiction.
  - Trace the independent Ukrainian documentary tradition from chronicle writing (літописна
    традиція) to modern publicistics (публіцистика), highlighting its role in preserving
    national memory.
  - 'Provide a comprehensive taxonomy of subgenres with specific C2-level definitions:
    есеїстика (essayistic prose), мемуари (memoirs), літературний репортаж (literary
    reportage), and подорожній нарис (travel writing).'
- section: Есеїстична традиція
  words: 800
  points:
  - Examine the Ukrainian polemical essay tradition starting from Mykola Khvylovyi's
    pamphlets, establishing their role as intellectual resistance and cultural orientation.
  - Analyze Oksana Zabuzhko's contribution to the philosophical and intellectual essay,
    demonstrating how she blends personal voice with deep cultural critique.
  - Contrast the structure of a formal academic paper with the associative, provisional
    nature of the essay (есе) in Ukrainian literary discourse.
- section: Мемуарне письмо
  words: 800
  points:
  - Clearly distinguish between strict autobiography (автобіографія) and literary
    memoir (мемуари/спогади), focusing on subjective truth and selective memory as
    artistic choices.
  - 'Deconstruct memoirist techniques using advanced terminology: the unreliable narrator
    (ненадійний оповідач), fragmentation (фрагментарність), and temporal shifts (зсуви
    часу).'
  - Analyze the profound existential dimensions of Ukrainian camp literature (e.g.,
    Vasyl Stus's notes) and wartime diaries (e.g., Oleksandr Dovzhenko) as specialized
    forms of memoir.
- section: Літературний репортаж
  words: 800
  points:
  - Define 'літературний репортаж', discussing the contemporary renaissance of immersive
    journalism in Ukraine (e.g., the 'Самовидець' tradition).
  - 'Break down techniques of immersive reportage: scene construction, dialogue reconstruction,
    and participant observation with controlled first-person perspective.'
  - Discuss the specific challenges and ethics of contemporary Ukrainian war reportage
    (e.g., Serhiy Zhadan), focusing on balancing traumatic testimony with literary
    form and maintaining factual integrity.
- section: Подорожній нарис та культурне есе
  words: 700
  points:
  - Introduce the 'подорожній нарис' (travel essay) through the geographic essays
    of Yuriy Andrukhovych, using place-based writing as a method of understanding
    identity.
  - Explain the concept of psychogeography (психогеографія) in writing about Ukrainian
    spaces, layering historical and cultural memory over physical urban and rural
    landscapes.
  - Demonstrate techniques for writing a cultural essay that uses art, architecture,
    or food as a specific vehicle for exploring broader societal themes.
- section: Голос та етика нефікції
  words: 600
  points:
  - 'Establish the ''nonfiction contract'' with the reader: the strict obligation
    to truth, rigorous fact-checking, and the ethical limits of fictionalization.'
  - Discuss privacy, informed consent, and the ethical representation of real people,
    distinguishing between the right to tell a story and the right to privacy.
  - 'Address positionality and power dynamics: avoiding extractive narratives and
    respecting the ethics of witness (свідчення) in trauma and war literature.'
- section: Практикум — Початок творчої нефікції
  words: 600
  points:
  - Provide a step-by-step structural framework for composing the opening 300-500
    words of a creative nonfiction piece (establishing voice, setting the scene, introducing
    the central tension).
  - Outline a peer critique protocol for evaluating voice consistency, factual grounding,
    literary technique, and ethical awareness in nonfiction drafts.
  - Present an advanced revision strategy focused on identifying and strengthening
    the central narrative question that drives a documentary text forward.
