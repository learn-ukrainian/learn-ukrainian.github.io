slug: rare-archaic-forms
title: Рідкісні та архаїчні форми
word_target: 5000
content_outline:
- section: Вступ — Мовна археологія
  words: 600
  points:
  - 'Визначення понять: архаїзми (застарілі назви існуючих речей) та історизми (назви
    зниклих явищ)'
  - 'Джерела архаїзації: старослов''янська спадщина, діалектна консервація'
  - 'Функціональне навантаження: урочистість, історичний колорит, іронія'
  - Різниця між активним та пасивним запасом мовця рівня C2
- section: Архаїчні іменникові форми
  words: 800
  points:
  - 'Сліди двоїни в сучасній мові: очі, плечі, двері, вуса (історія форми)'
  - 'Давні відмінкові закінчення: -ове (сватове), -и (в називному множини чоловічого
    роду)'
  - Поетичний та розширений кличний відмінок (Зоре! Дунаю! Земле!)
  - Варіантні закінчення родового відмінка як стилістичний засіб
- section: Архаїчні дієслівні форми
  words: 800
  points:
  - 'Давноминулий час (плюсквамперфект): структура (дієслово минулого часу + був/була)'
  - Значення та вживання давноминулого часу в сучасній літературі та усному мовленні
  - Залишки аориста та імперфекта в літературних текстах (реминисценції)
  - Архаїчні форми наказового способу та інфінітива (-ть замість -ти в поезії)
- section: Архаїчні займенники та прикметники
  words: 700
  points:
  - 'Вказівні займенники: сей, ся, се (парадигма та вживання у фразеологізмах)'
  - 'Займенникові форми: оний, кождий (діалектне/архаїчне)'
  - 'Короткі форми прикметників: зелен гай, повен чаша, ясен місяць (фольклорний стиль)'
  - Стягнені та нестягнені форми прикметників у поетичних текстах
- section: Книжна та урочиста лексика
  words: 700
  points:
  - 'Церковнослов''янізми: фонетичні ознаки (ра- замість ро-, -щ- замість -ч-)'
  - 'Лексичні пари: злато/золото, глас/голос, врата/ворота'
  - 'Високий стиль: використання архаїзмів у промовах та офіційних зверненнях'
  - Символіка та сакральність старовинних слів
- section: Архаїзми в сучасних контекстах
  words: 700
  points:
  - Стилізація в сучасній літературі (створення історичної атмосфери)
  - Використання архаїзмів у релігійних текстах та молитвах
  - Іронічне та пародійне використання (бурлеск)
  - Архаїзми в офіційно-урочистому стилі (інавгураційні промови)
- section: Практикум — Робота з архаїчними текстами
  words: 700
  points:
  - Аналіз уривків з класичної літератури (Шевченко, Куліш)
  - Ідентифікація та класифікація застарілих форм у тексті
  - 'Вправи на трансформацію: заміна архаїзмів нейтральними відповідниками'
  - Створення стилізованого тексту з використанням вивчених форм
