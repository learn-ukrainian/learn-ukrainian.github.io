slug: translation-theory-ii
title: Теорія перекладу II — Поглиблений курс
word_target: 5000
content_outline:
- section: Вступ — Перекладознавство як наука
  words: 600
  points:
  - 'Визначення перекладознавства: від ремесла до академічної дисципліни'
  - 'Міждисциплінарність: зв''язок з лінгвістикою, літературознавством, когнітивною
    психологією та культурологією'
  - 'Українська школа перекладу: постаті Григорія Кочура та Миколи Лукаша як еталон'
  - Роль перекладу в українському державотворенні та культурному спротиві
- section: Ключові концепції перекладу
  words: 1000
  points:
  - 'Еквівалентність vs Адекватність: у чому фундаментальна різниця?'
  - 'Теорія Юджина Найди: формальна (дослівна) та динамічна (функціональна) еквівалентність'
  - 'Лоуренс Венуті: дихотомія «одомашнення» (domestication) та «очуження» (foreignization)'
  - Поняття «перекладацька одиниця» та рівні еквівалентності (від морфеми до тексту)
  - 'Інваріант перекладу: що має залишитися незмінним?'
- section: Перекладацькі стратегії та трансформації
  words: 1000
  points:
  - 'Класифікація трансформацій: лексичні, граматичні, стилістичні'
  - 'Лексичні: транскрипція/транслітерація, калькування, конкретизація, генералізація,
    модуляція (смисловий розвиток)'
  - 'Граматичні: заміна частин мови, членування та об''єднання речень, зміна порядку
    слів'
  - 'Компенсація втрат: як відтворити гумор, гру слів чи діалект іншими засобами'
  - Антонімічний переклад та описовий переклад (експлікація)
- section: Проблеми неперекладності
  words: 800
  points:
  - 'Абсолютна vs Відносна неперекладність: міф чи реальність?'
  - 'Реалії (culture-specific items): стратегії передачі (транслітерація, гіперонім,
    аналог, опис)'
  - 'Фразеологія та ідіоматика: пошук функціональних відповідників замість дослівних'
  - 'Фоносемантика: переклад звукопису, ритму та рими в поезії'
  - Лакуни в мові перекладу та способи їх заповнення
- section: Етика перекладу
  words: 800
  points:
  - 'Перекладач як (не)видимий посередник: етичні наслідки «прозорості»'
  - Вірність автору vs Вірність читачу vs Вірність епосі
  - 'Деколоніальний підхід: небезпека імперської апропріації через переклад'
  - 'Цензура та самоцензура в перекладі: історичні уроки'
  - Відповідальність за викривлення змісту та культурну репрезентацію
- section: Практика — Аналіз перекладів
  words: 800
  points:
  - Алгоритм перекладацького аналізу тексту (передперекладацький та постперекладацький)
  - 'Case Study: Порівняння двох перекладів одного уривку (наприклад, Шекспіра або
    сучасного роману)'
  - Ідентифікація використаних стратегій та оцінка їх доцільності
  - 'Редагування машинного перекладу: типові помилки ШІ та людський фактор'
  - 'Критичний огляд перекладу: як писати рецензію (state standard skill)'
