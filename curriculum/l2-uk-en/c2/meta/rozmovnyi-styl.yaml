slug: rozmovnyi-styl
title: Розмовний стиль — Рівень носія
word_target: 5000
content_outline:
- section: Вступ — Розмовний стиль vs 'суржик'
  words: 600
  points:
  - Визначення розмовного стилю як функціонального різновиду літературної мови (неформальність,
    спонтанність).
  - 'Чітке розмежування понять: літературна норма, просторіччя, діалектизм та суржик.'
  - 'Роль кодифікації: чому ''зрозумів'' — це розмовна норма, а ''поняв'' — суржик.'
  - 'Сфери вживання: від побутового спілкування до невимушених професійних розмов.'
- section: Фонетичні особливості живого мовлення
  words: 700
  points:
  - Явище редукції голосних у швидкому темпі (але збереження чіткості приголосних,
    на відміну від російської).
  - 'Інтонаційні моделі: логічний наголос, емфатичні паузи, питальна інтонація.'
  - Стягнення звуків у дієслівних формах (-ться, -шся) як орфоепічна норма.
  - 'Темп і ритм: як змінюється структура фрази залежно від швидкості мовлення.'
- section: 'Частки та вигуки: емоційний каркас'
  words: 700
  points:
  - Модальні частки (ж, бо, но, таки) як інструмент вираження ставлення мовця.
  - 'Прагматичні функції часток: пом''якшення наказу (''дай-но''), підсилення (''та
    йди вже'').'
  - Вигуки (ой, гей, ага, еге ж) як реактивні репліки в діалозі.
  - Вигукові фразеологізми ('от тобі й на', 'маєш тобі') та їхня емоційна вага.
- section: 'Синтаксис економії: неповні речення та еліпсис'
  words: 750
  points:
  - 'Принцип мовної економії: усунення надлишкової інформації, зрозумілої з контексту.'
  - Типи неповних речень у діалозі (репліки-відповіді, репліки-підхоплення).
  - Еліпсис присудка як стилістичний засіб динаміки ('Ми — додому', 'Він — за двері').
  - 'Парцеляція: розчленування речення на частини для акцентування уваги (''Він прийшов.
    Пізно. І не сам.'').'
- section: Дискурсивні маркери та слова-паразити
  words: 750
  points:
  - 'Функція дискурсивних маркерів: структурування думки, заповнення пауз (хезитація).'
  - Маркери початку думки ('власне', 'знаєш', 'слухай') та підсумку ('зрештою', 'словом').
  - Маркери невпевненості та припущення ('мабуть', 'напевно', 'здається').
  - 'Тонка межа між маркером і словом-паразитом (''ну'', ''типу'', ''короче''): як
    уникнути засмічення мовлення.'
- section: 'Соціальні варіанти: сленг і жаргон'
  words: 700
  points:
  - 'Молодіжний сленг: джерела походження, функції (ідентифікація ''свій-чужий'').'
  - 'Професійний жаргон у розмовній мові: коли термін стає буденним словом.'
  - 'Регіональні особливості: львівська ґвара, київський узус, слобожанські слівця.'
  - 'Гендерні аспекти мовлення: чи існує ''жіноча'' та ''чоловіча'' лексика в українській
    мові?'
- section: Практикум — Природні діалоги
  words: 800
  points:
  - 'Аналіз сценаріїв: ''Кав''ярня'' (замовлення, small talk).'
  - 'Аналіз сценаріїв: ''Зустріч друзів'' (емоційний обмін новинами, перебивання).'
  - 'Трансформація: переклад офіційного повідомлення на живу розмовну мову.'
  - 'Рольова гра: використання маркерів ввічливості та пом''якшення категоричності.'
