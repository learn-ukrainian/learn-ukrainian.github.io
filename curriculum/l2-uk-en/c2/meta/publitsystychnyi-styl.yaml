slug: publitsystychnyi-styl
title: Публіцистичний стиль — Журналістика
word_target: 5000
content_outline:
- section: Вступ — Публіцистика як стиль впливу
  words: 700
  points:
  - Визначення публіцистичного стилю та його місце в системі функціональних стилів
    (між художнім і науковим).
  - 'Основна функція: вплив на громадську думку (агітація, пропаганда vs інформування).'
  - 'Ключові риси: актуальність, соціальна значущість, емоційність, документальна
    точність.'
  - Баланс між фактом (об'єктивність) і коментарем (суб'єктивність) — етичні стандарти.
- section: Новина — інформаційний жанр
  words: 800
  points:
  - 'Структура новини: принцип ''перевернутої піраміди'' (найважливіше — на початку).'
  - 'Написання ліду (lead): правило 5W+H (Хто? Що? Де? Коли? Як? Чому?).'
  - 'Мистецтво заголовка: інформативність vs клікбейт.'
  - 'Стандарти інформаційної журналістики: точність, оперативність, відокремлення
    фактів від думок.'
  - 'Основи фактчекінгу: перевірка джерел, пошук першоджерела.'
- section: Репортаж та інтерв'ю
  words: 900
  points:
  - 'Репортаж як жанр ''ефекту присутності'': деталізація, динаміка, авторське ''я''.'
  - 'Види репортажів: подієвий, тематичний, спеціальний.'
  - 'Інтерв''ю: підготовка, типи запитань (відкриті/закриті), драматургія розмови.'
  - 'Техніка цитування: пряма мова, непряма мова, правила оформлення цитат.'
  - 'Етичні аспекти: узгодження тексту, ''off the record''.'
- section: Аналітична стаття
  words: 800
  points:
  - 'Відмінність аналітики від новини: пошук причинно-наслідкових зв''язків.'
  - 'Структура аналітичного тексту: теза — аргументи — висновки.'
  - 'Використання експертних думок: як обирати експертів та інтегрувати їхні коментарі.'
  - 'Баланс точок зору: представлення різних позицій для об''єктивності.'
  - Візуалізація даних (інфографіка) як частина аналітичного матеріалу.
- section: Колонка та есей
  words: 800
  points:
  - 'Авторська колонка: суб''єктивність як перевага, особистий стиль.'
  - 'Есей у публіцистиці: свобода форми, філософське осмислення актуальних тем.'
  - 'Риторичні прийоми переконання: апеляція до емоцій, логіки, авторитету.'
  - Іронія, сатира та сарказм як інструменти соціальної критики.
  - 'Відомі українські публіцисти та їхній стиль (приклад: Віталій Портников, Сергій
    Рахманін).'
- section: Мовні особливості публіцистики
  words: 500
  points:
  - 'Лексика: суспільно-політична термінологія, емоційно забарвлені слова, кліше vs
    штампи.'
  - 'Синтаксис: риторичні запитання, окличні речення, парцеляція, інверсія.'
  - 'Засоби образності: метафора, епітет, гіпербола в заголовках і текстах.'
  - Мовна гра та інтертекстуальність у сучасних медіа.
- section: Практикум — Створення журналістських текстів
  words: 500
  points:
  - Алгоритм написання новини на основі прес-релізу.
  - Трансформація офіційного тексту в публіцистичний (спрощення, оживлення).
  - 'Редагування тексту: усунення канцеляризмів, тавтологій, пасивних конструкцій.'
  - Критичний аналіз медійного тексту на предмет маніпуляцій та фейків.
