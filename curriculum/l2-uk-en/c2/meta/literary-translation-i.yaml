slug: literary-translation-i
title: Літературний переклад I — поезія
word_target: 5000
content_outline:
- section: 'Вступ: Чи можливо перекласти поезію?'
  words: 600
  points:
  - 'Вічна дискусія: перекладність vs. неперекладність поезії (Роберт Фрост: ''Поезія
    — це те, що губиться в перекладі'').'
  - 'Основна дилема перекладача: вірність формі чи вірність змісту.'
  - 'Визначення понять: адекватний переклад, вільний переклад, переспів, наслідування.'
  - 'Роль особистості перекладача: співавтор чи провідник?'
- section: 'Відтворення форми: метр, ритм, рима'
  words: 900
  points:
  - 'Силабо-тонічна система віршування в українській та англійській мовах: спільне
    та відмінне.'
  - 'Стратегії відтворення метру: коли варто зберігати розмір, а коли — змінювати
    (еквіритмічний переклад).'
  - 'Рима в перекладі: типи рим (чоловіча/жіноча/дактилічна) та їх відповідники.'
  - Проблема 'бідних' та 'банальних' рим у перекладі; поняття римоїда.
- section: 'Магія звуків: переклад звукопису'
  words: 800
  points:
  - 'Звуковий символізм та фоніка тексту: чому це важливо.'
  - 'Відтворення алітерації та асонансу: чи завжди можливий прямий відповідник?'
  - 'Принцип компенсації: якщо не можна зберегти звук тут, відтвори його поруч.'
  - Евфонія української мови як інструмент перекладача (уникнення збігу приголосних).
- section: Образність та метафорика
  words: 800
  points:
  - 'Переклад метафор, епітетів та порівнянь: дослівність vs. образність.'
  - Культурно-специфічні образи (реалії) та способи їх передачі (адаптація, коментар).
  - 'Інтертекстуальність: як передати приховані цитати та алюзії.'
  - Відтворення авторського стилю та атмосфери вірша.
- section: 'Практикум: Лабораторія перекладу (Eng -> Ukr)'
  words: 900
  points:
  - 'Покроковий аналіз оригіналу: визначення домінанти (що найважливіше зберегти).'
  - Створення підрядника (literal translation) як проміжний етап.
  - Пошук ритмічної схеми та римування українською.
  - 'Шліфування тексту: перевірка на природність та милозвучність.'
  - 'Кейс-стаді: порівняння кількох перекладів одного сонета Шекспіра.'
- section: Специфіка перекладу на англійську (Ukr -> Eng)
  words: 500
  points:
  - Основні виклики перекладу української силабо-тоніки на англійську (різниця в довжині
    слів).
  - Збереження українського колориту без екзотизації.
  - Важливість співпраці з носієм мови (editor) при перекладі на нерідну мову.
- section: Підсумок
  words: 500
  points:
  - 'Критерії якісного поетичного перекладу: художня цілісність.'
  - Відповідальність перекладача перед автором і читачем.
  - Переклад як школа власної літературної творчості.
