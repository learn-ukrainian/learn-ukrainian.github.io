slug: creative-writing-poetry
title: Творче письмо — поезія
word_target: 5000
content_outline:
- section: Вступ — Від читача до творця
  words: 500
  points:
  - 'Розмежувати аналіз чужого тексту і власне творення: дві різні когнітивні позиції.
    Конкретно — приклад одного і того самого вірша, про який можна написати есей (аналіз)
    або від якого можна відштовхнутись (поштовх до власного).'
  - 'Поезія як ремесло і натхнення: розвіяти міф про виключно ''вроджений талант''
    — навести приклад щоденної практики у визнаних поетів (Ліна Костенко про дисципліну).'
  - 'Описати повний процес написання вірша як цикл: спостереження → імпульс → чернетка
    → редагування → завершена версія. Кожен етап коротко означений, щоб структура
    модуля була зрозумілою від початку.'
  - 'Engagement box: Риторичне питання — ''Коли ви востаннє хотіли записати момент
    у слова?'' — запускає особистісний резонанс.'
- section: Пошук теми і голосу
  words: 800
  points:
  - 'Звідки беруться теми: три джерела — пряме спостереження (конкретна деталь реального
    світу), рефлексія (повернення до пережитого), мова сама по собі (звук або слово
    як відправна точка). Кожен варіант проілюстрований коротким прикладом.'
  - 'Практика спостереження: методика ''поетичного блокнота'' — записувати конкретні
    деталі, а не абстрактні почуття. Пряма полеміка з типовою помилкою (абстрактна
    сентиментальність).'
  - 'Пошук власного голосу: голос — це не стиль, а сукупність: вибір теми + ставлення
    + мова + ритм. Практична вправа: взяти одну тему (наприклад, ''ранок'') і написати
    три рядки у трьох різних тональностях (іронічній, ліричній, холодній).'
  - 'Автентичність vs. наслідування: чому наслідування — це нормальний етап навчання,
    але де проходить межа між навчальним наслідуванням і власним голосом. Приклад:
    молодий Шевченко наслідував Котляревського, але потім вийшов за межі.'
  - 'Engagement box: Цитата Ліни Костенко про поетичний голос як екзистенційну позицію.'
- section: Робота з формою
  words: 900
  points:
  - 'Огляд основних поетичних форм в українській традиції: (1) Сонет — 14 рядків,
    два різновиди (шекспірівський, петрарківський), приклад — Зеров або Рильський;
    (2) катрен — базова строфічна одиниця; (3) терцина — схема рим ABA BCB, пов''язана
    з Данте, але наявна в українській традиції.'
  - 'Вільний вірш (верлібр): визначення через відсутність регулярного метру і рими,
    але наявність інших ритмоутворювальних засобів (анафора, синтаксичний паралелізм,
    інтонація). Сучасні приклади — Жадан, Якимчук.'
  - 'Білий вірш: відмінність від верлібру — є метрична схема, але відсутня рима. Функція:
    торжественність, наближення до розмовної мови.'
  - 'Принцип відповідності форми і змісту: форма — не контейнер, а значення. Наприклад,
    сонет для дражливої теми створює напругу між обмеженістю і пристрастю; верлібр
    для хаосу міста — органічний вибір. Вправа: взяти один і той самий мотив і записати
    у двох формах.'
  - 'Таблиця: порівняльна характеристика трьох форм (сонет / верлібр / білий вірш)
    — структура, ритм, рима, типові теми, українські приклади.'
  - 'Engagement box: Навіщо обирати форму заздалегідь — чи краще писати і потім формалізувати?
    Обидві стратегії.'
- section: Образність і мова поезії
  words: 1000
  points:
  - 'Конкретність проти абстракції: центральний принцип — ''show, don''t tell'' у
    поетичному варіанті. Аналіз двох варіантів одного рядка: абстрактного (''вона
    сумувала'') і конкретного (''вона ставила чайник тричі поспіль''). Пояснення механізму.'
  - 'Метафора: визначення + три рівні складності (банальна / свіжа / авторська). Приклад
    авторського неологізму-образу з §4.3.3: ''синьожовтеня'' — і пояснення, як він
    працює.'
  - 'Символ: відмінність від метафори — символ не пояснює, а натякає. Класичний приклад:
    калина в українській поезії. Сучасний приклад з Якимчук або Жадана.'
  - 'Мовна економія: поезія — найщільніший тип тексту. Вправа на стиснення: взяти
    речення з 10 слів і скоротити до 4, не втративши образ.'
  - 'Епітет, метонімія, уособлення: кожен прийом — одне визначення + два приклади
    (класичний і власний учнівський приклад для написання). Прив''язка до §4.3.3.'
  - 'Engagement box: ''Авторські неологізми'' — вправа на словотворення за моделями
    (prefix + root, compound words). Кілька власних спроб.'
  - 'Міні-текст для аналізу: уривок сучасного українського вірша (Якимчук або Жадан)
    з маркованими образними засобами.'
- section: Звукова організація
  words: 800
  points:
  - 'Ритм у верлібрі: якщо нема метру, що створює ритм? — довжина рядків, синтаксичний
    паралелізм, анафора, пауза (рядковий відступ). Конкретна демонстрація на прикладі.'
  - 'Рима: використовувати чи ні? Типи рими — точна, неточна (асонансна), нульова.
    Пастка ''рими заради рими'' — і як її уникнути. Вправа: написати строфу з точною
    римою, потім переписати без рими — що втрачається, що здобувається.'
  - 'Засоби звукопису (§4.3.2 + §4.3.3): алітерація, асонанс, звуконаслідування. Зв''язок
    між звуком і значенням (''фонетична іконічність''). Приклад: рядки з Тичини або
    Антонича, де звук іконічно підсилює зміст.'
  - 'Читання вголос як редакційний інструмент: чому аудіальна перевірка є обов''язковою.
    Конкретний список запитань: де спотикаєшся? Де хочеться прискоритися? Де пауза
    природна?'
  - 'Engagement box: Вправа ''звуковий портрет'' — написати 4–6 рядків про звук (дощ,
    вулицю, тишу), де звукопис стає головним засобом.'
- section: Редагування віршів
  words: 750
  points:
  - 'Від чернетки до фінальної версії: редагування — не виправлення помилок, а переосмислення.
    Три раунди: (1) структурний — що залишити, що прибрати; (2) образний — чи кожен
    образ свіжий; (3) звуковий — читання вголос.'
  - 'Що прибрати: діагностика зайвих елементів — пояснення образу замість образу,
    ''милиці'' (adverbs-модифікатори), банальні рими, вступні речення без функції.'
  - 'Критичний погляд на власний текст: методика ''холодного читання'' — відкласти
    вірш на день і читати як чужий. Запитання для самодіагностики.'
  - 'Зворотний зв''язок: як читати критику (що брати, що відкидати), як давати корисну
    критику іншому поету. Коротка модель workshop-сесії.'
  - 'Зв''язок з §4.3.7 (трансформація тексту): редагування як внутрішньостильова трансформація
    — від сирого до обробленого в межах одного жанру.'
  - 'Engagement box: Приклад двох версій одного вірша (чернетка і фінальна), з коментарем
    — що і чому змінено.'
- section: Підсумок
  words: 250
  points:
  - 'Щоденна практика: поезія потребує регулярності. Три конкретні звички: читати
    вірші щодня, вести поетичний блокнот, писати хоча б один рядок.'
  - 'Публікація і спільнота: де публікувати (літературні журнали: Meridian Czernowitz,
    Четвер; Facebook-спільноти; Poetry Slam). Значення читання власного тексту вголос
    для авторів.'
  - 'Поезія як спосіб мислення: фінальна рефлексія — поетичний погляд на світ змінює
    не тільки тексти, а й те, як помічаєш деталі, як формулюєш думки. Перехід до с2-37
    (Творче письмо — проза).'
