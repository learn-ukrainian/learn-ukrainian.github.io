slug: corpus-linguistics
title: Корпусна лінгвістика та цифрові інструменти
word_target: 5000
content_outline:
- section: 'Вступ: Що таке мовний корпус'
  words: 700
  points:
  - 'Визначення корпусу: фундаментальна різниця між розміченим мовним корпусом і звичайним
    архівом текстів; чому репрезентативність корпусу є критичною для рівня C2.'
  - 'Типологія корпусів: огляд морфологічно розмічених, паралельних, діахронних та
    учнівських корпусів. Кожен тип отримує окремий підзаголовок (H3) з поясненням
    його дослідницької мети.'
  - 'Методологічні підходи: контраст між дослідженням на основі корпусу (corpus-based,
    перевірка гіпотез) та дослідженням, керованим корпусом (corpus-driven, індуктивне
    виявлення закономірностей).'
- section: Українські мовні корпуси
  words: 900
  points:
  - 'ГРАК (Генеральний регіонально анотований корпус): детальний розбір структури,
    обсягу, жанрової та регіональної розмітки; інструкція з навігації пошуковим інтерфейсом.'
  - 'Корпус текстів НАН України: специфіка фокусу на академічних та наукових текстах;
    як цей ресурс доповнює ГРАК при роботі з вузькоспеціалізованою термінологією.'
  - 'Спеціалізовані ресурси: використання діахронних корпусів для відстеження мовних
    змін та відновлення репресованої питомої лексики (деколонізаційний аспект).'
- section: Корпусні інструменти та методи
  words: 900
  points:
  - 'Робота з конкордансом (KWIC): як аналізувати ключове слово в контексті для виявлення
    його синтаксичної поведінки та семантичної просодії.'
  - 'Частотні списки: розуміння рейтингів частотності; практичне застосування частотних
    профілів для оптимізації словникового запасу та стилістичного вибору.'
  - 'Аналіз колокацій: практичне пояснення статистичних мір (MI-показник, t-score);
    як читати колокаційні таблиці для розрізнення сильних та слабких зв''язків між
    словами.'
- section: Частотність і автентичність
  words: 800
  points:
  - 'Частотні словники: огляд наявних ресурсів та їхньої ролі у формуванні сучасних
    підручників і навчальних програм з української мови.'
  - 'Педагогічна мова проти природного узусу: виявлення розбіжностей між правилами
    з підручників та реальними корпусними даними; приклади штучних і природних конструкцій.'
  - 'Регістрова варіативність: дослідження того, як частотний профіль лексем та граматичних
    форм різко змінюється залежно від функціонального стилю тексту.'
- section: Обчислювальні підходи
  words: 800
  points:
  - 'Інструменти NLP для української мови: принцип роботи морфологічного аналізатора
    та синтаксичного парсера; огляд популярних моделей (pymorphy2-uk, Stanza, LanguageTool-UA).'
  - 'Ландшафт мовних технологій: ключові дослідницькі групи (ІМФ НАНУ, Грамматично)
    та специфічні виклики обробки української мови (багата словозміна, вільний порядок
    слів).'
  - 'Оцінка машинного перекладу: використання корпусних методів для тестування систем
    машинного перекладу та виявлення типових структурних помилок.'
- section: Практичне застосування
  words: 600
  points:
  - 'Саморедагування: покроковий алгоритм застосування корпусних даних для перевірки
    власних текстів, верифікації колокацій та вирішення сумнівів щодо керування.'
  - 'Академічне письмо: використання частотних даних для наближення власного стилю
    до рівня носія мови (native-like) у складних наукових та професійних текстах.'
  - 'Вирішення нормативних суперечок: роль об''єктивних емпіричних даних у сучасних
    дискусіях про мовну норму, стандартизацію та усунення мовних міфів.'
- section: 'Практикум: Корпусний запит'
  words: 300
  points:
  - 'Практичне завдання: формулювання багатокомпонентних пошукових запитів у ГРАК
    для вирішення конкретної лексико-граматичної проблеми.'
  - 'Аналітичний звіт: порівняльний аналіз отриманих конкордансних рядків із традиційними
    словниковими статтями або правилами; формулювання самостійних висновків.'
