  - Ієрархія джерел права vs. сила судового прецеденту в Україні (de jure vs de facto)
- section: 'Структура судового рішення: анатомія тексту'
  words: 650
  points:
  - 'Вступна частина: ідентифікація суду, сторін та предмета спору'
