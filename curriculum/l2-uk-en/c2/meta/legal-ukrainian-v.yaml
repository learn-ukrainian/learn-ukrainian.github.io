  - Тлумачення норм матеріального права у контексті конкретних обставин
  - Розподіл тягаря доказування (onus probandi) між сторонами
  - 'Кейс-стаді: аналіз типового рішення у майновому спорі'
- section: 'Аналіз кримінальної справи: специфіка провадження'
  words: 850
  points:
  - 'Кримінально-правова кваліфікація діяння: об''єкт, суб''єкт, об''єктивна та суб''єктивна
