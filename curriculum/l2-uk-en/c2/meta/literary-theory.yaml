slug: literary-theory
title: Теорія літератури
word_target: 5000
content_outline:
- section: Вступ — Що таке теорія літератури?
  words: 500
  points:
  - 'Визначення літературознавства як науки: три гілки (теорія, історія, критика)
    — дати чітке розмежування з прикладами кожної гілки'
  - 'Основні питання теорії: Що таке текст? Що таке смисл? Як читач взаємодіє з твором?
    — подати у формі риторичних питань, що структурують весь модуль'
  - 'Короткий огляд методологічної різноманітності: чому існує багато підходів, а
    не один — пояснення через концепцію парадигмальної зміни (Кун)'
  - Попередній погляд на Потебню як місток між §1 і §6 — двоє речень, що встановлюють
    місцевий якір
- section: Класичні підходи
  words: 700
  points:
  - 'Арістотелівська поетика: мімезис, катарсис, єдності часу/місця/дії — кожен термін
    пояснити українським прикладом з драматургії (Леся Українка, Куліш)'
  - 'Риторична традиція: від Квінтіліана до українського бароко — зв''язок із курсом
    стилістики (C2.1a); показати як риторика передувала сучасній теорії'
  - 'Романтична естетика: геній, народний дух (Volksgeist), органічна форма — роль
    у формуванні Харківської школи та Потебні'
  - 'Позитивізм у літературознавстві (Тен, Сент-Бев): раса, середовище, момент — критика
    і спадщина; як Франко переосмислив позитивізм для України'
  - 'Коротка таблиця: підхід / ключове поняття / обмеження — зведення всіх чотирьох
    підходів для запам''ятовування'
- section: Формалізм і структуралізм
  words: 800
  points:
  - 'Слов''янський формалізм: ОПОЯЗ (Шкловський, Ейхенбаум) і концепція остранення
    — пояснити остранення через вправу: описати знайомий предмет ''зовнішнім'' поглядом'
  - 'Якобсон і Мукаржовський: Празький лінгвістичний гурток як міст між формалізмом
    і структуралізмом — роль функцій мови (поетична функція)'
  - 'Де Сосюр і знак: означник / означуване / довільність знака — мінімально необхідна
    термінологічна база; схема зі стрілками'
  - 'Наративні структури (Пропп, Греймас): актанти, функції, граматика оповіді — місток
    до c2-027 (Наратологія)'
  - 'Критика формалізму: що він залишає поза дужками (контекст, ідеологію, читача)
    — органічний перехід до наступного розділу'
  - 'Вставна рубрика ''Спробуй сам'': аналіз абзацу Франка за допомогою формального
    підходу (остранення / домінанта)'
- section: Постструктуралізм і деконструкція
  words: 800
  points:
  - 'Деррідеана деконструкція: розмивання меж тексту, апорія, différance — пояснити
    через конкретний приклад з двозначного вірша (Стус або Костенко)'
  - 'Фуко і дискурс: знання/влада, дискурсивні практики, автор як конструкт (''Що
    таке автор?'') — зв''язок із питаннями цензури в радянській Україні'
  - 'Крістева й інтертекстуальність: кожен текст як реакція на попередні тексти —
    ілюструвати через інтертекстуальні зв''язки Лесі Українки з античністю'
  - 'Критика бінарних опозицій: чому центр/периферія, буквальний/образний, автор/читач
    є нестійкими — практичний приклад з канонічного/неканонічного тексту'
  - 'Рубрика ''Занотуй'': відмінність між структуралізмом (пошук системи) і постструктуралізмом
    (ставлення системи під сумнів)'
- section: Контекстуальні підходи
  words: 750
  points:
  - 'Марксистська критика: базис/надбудова, ідеологія (Альтюссер), суспільна детермінованість
    тексту — обережно: показати марксизм як аналітичний інструмент, незалежно від
    радянського застосування'
  - 'Феміністична критика: ''читати як жінка'', гіноцентричний канон, письмо жіночих
    суб''єктів — в українському контексті: Кобилянська, Забужко, Фоменко'
  - 'Постколоніальна теорія: Гомі Баба / Співак / Саїд і ВЛАСНЕ українські теоретики
    (Грабович, Гундорова, Павличко) — НЕ подавати Саїда як єдину точку відліку'
  - 'Новий історизм (Грінблатт): текст занурений в культурну енергію своєї доби —
    приклад аналізу козацького літопису крізь призму нового історизму'
  - 'Мінітаблиця: чотири підходи / об''єкт аналізу / ключове питання / обмеження —
    узагальнення для навчальних цілей'
- section: Українське літературознавство
  words: 950
  points:
  - 'Потебня і психолінгвістика: структура твору як структура слова (зміст / зовнішня
    форма / внутрішня форма) — розгорнутий аналіз з цитатою; місток до вступного анонсу'
  - 'Харківська школа і її спадщина: де Потебня вписується в глобальний контекст (передбачення
    структуралізму); вплив на сучасне мовознавство'
  - 'Франко як теоретик: ''Із секретів поетичної творчості'' (1898) — методологічний
    синтез Франка; поняття ''наукового реалізму'' і ''народності'''
  - 'Радянський період і його обмеження: соцреалізм як нав''язана методологія; що
    було заборонено (формалізм, компаративістика) і що збереглося підпільно'
  - 'Шістдесятники і самвидав як позаінституційна критика: літературна критика як
    акт опору'
  - 'Сучасне українське літературознавство (після 1991): Грабович, Гундорова, Павличко,
    Забужко — деколоніальний поворот; повернення до заборонених методів; інтеграція
    в міжнародну теорію'
  - 'Рубрика ''Ключові тексти'': рекомендований перелік джерел українського літературознавства
    для самостійного читання (Потебня, Франко, Гундорова)'
- section: Підсумок — застосування теорії
  words: 500
  points:
  - 'Вибір методологічного підходу: практична матриця ''питання → метод'' — якщо цікавить
    форма → формалізм; якщо влада → постструктуралізм; якщо контекст → нов. історизм
    тощо'
  - 'Поєднання методів: принцип методологічного плюралізму — чому один підхід рідко
    достатній; приклад синтезованого аналізу (феміністичний + постколоніальний)'
  - 'Практичне застосування: місток до наступних модулів (c2-027 Наратологія, c2-031
    Методи критики, c2-032 Написання есею) — як термінологія цього модуля буде активно
    використана'
  - 'Фінальна рефлексія: чому теорія важлива не лише для академіків — теорія як спосіб
    свідомого читання у дорослому культурному житті'
