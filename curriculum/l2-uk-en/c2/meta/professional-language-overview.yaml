slug: professional-language-overview
title: Огляд професійної мови
word_target: 5000
content_outline:
- section: Вступ — Що таке професійна мова?
  words: 600
  points:
  - Definition of professional communication as a functional variation of the national
    language.
  - Key distinctions between general (common) language and specialized (professional)
    language.
  - 'The ''Official'' vs. ''Scientific'' styles overlap: where professional language
    sits on the spectrum.'
  - 'The three pillars: Precision, Standardization, and Appropriateness.'
- section: Структура професійних терміносистем
  words: 1000
  points:
  - 'Hierarchy of lexicon: General words → General scientific lexis → Specific terminology
    → Professionalisms (jargon).'
  - 'The concept of a ''term'' (термін): monosemy within a specific field.'
  - 'Ways of term formation in Ukrainian: morphological derivation (suffixation),
    semantic change, and borrowing.'
  - 'Historical context: The 1920s terminology boom vs. Soviet Russification vs. Modern
    standardization.'
  - 'Purism vs. Internationalism: balancing authentic Ukrainian roots with global
    scientific vocabulary.'
- section: Регістри професійної комунікації
  words: 800
  points:
  - 'The spectrum of formality: Official (Protocol) → Neutral (Workplace) → Professional
    Colloquial (Jargon).'
  - 'Oral vs. Written distinctions: why speaking like a law textbook in a meeting
    is a mistake.'
  - 'Audience adaptation: communicating with peers (term-heavy) vs. clients/public
    (simplification).'
  - 'Code-switching markers: how to signal a shift in register.'
- section: Жанри професійних текстів
  words: 900
  points:
  - 'Classification of genres: Informational (reports, briefs), Directive (orders,
    instructions), Phatic (networking, correspondence).'
  - Universal structural elements of professional texts (Header, Preamble, Body, Conclusion/Call
    to Action).
  - 'Genre expectations: why an academic article differs structurally from a business
    pitch.'
  - The concept of 'Standardization' in document types (DSTU standards).
- section: Стратегії опанування нової галузі
  words: 900
  points:
  - 'Meta-skills for C2 learners: how to enter a new domain (e.g., Ukrainian Law or
    IT) from scratch.'
  - 'Building a ''personal corpus'': collecting texts, glossary creation, and collocations
    mining.'
  - 'Identifying key information sources: finding the ''authoritative'' texts in a
    specific field.'
  - 'Self-directed learning tools: dictionaries (r2u.org.ua), corpora (GRAC), and
    professional communities.'
- section: Підготовка до Phase C2.3
  words: 800
  points:
  - 'Overview of the upcoming Professional Track (Modules 47-75): what to expect.'
  - 'Expected learning outcomes: moving from passive understanding to active production
    of complex professional texts.'
  - 'Plan for individual specialization: encouraging learners to pick their ''target
    domain'' for upcoming projects.'
  - 'Final motivation: Professional language as the key to integration into the Ukrainian
    economy and society.'
