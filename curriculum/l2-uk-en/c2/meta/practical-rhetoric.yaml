slug: practical-rhetoric
title: 'Практична риторика: переконання та дебати'
word_target: 5000
content_outline:
- section: Вступ — Риторика як практична навичка
  words: 600
  points:
  - Чітко розмежувати теоретичне розуміння риторики (c2-021) та її практичне застосування
    в реальних ситуаціях переконання.
  - Описати традицію диспутів Києво-Могилянської академії як історичний фундамент
    української академічної аргументації (використати абстрактну лексику С2).
  - Схарактеризувати сучасну українську дебатну культуру (публічні слухання, парламентські
    дебати) як інструмент громадянського суспільства.
- section: Структури аргументації
  words: 900
  points:
  - Пояснити дедуктивний та індуктивний підходи до розбудови аргументів, використовуючи
    складні приклади з суспільного дискурсу.
  - 'Адаптувати модель Тулміна українською: дати детальний розбір компонентів (теза,
    підстава, обґрунтування, підтримка, застереження, спростування) на єдиному наскрізному
    прикладі.'
  - Дати визначення ентимеми; показати, як виявляти приховані засновки в медіаповідомленнях
    для посилення аналітичних навичок.
- section: Побудова переконливого виступу
  words: 900
  points:
  - Розглянути класичну тріаду (етос, патос, логос) крізь призму сучасних українських
    комунікативних очікувань (важливість щирості, баланс раціо та емоцій).
  - Провести паралелі між правилами композиції Феофана Прокоповича та вимогами до
    сучасних публічних виступів.
  - 'Надати чітку схему диспозиції промови: вступ (exordium), виклад (narratio), доведення
    (argumentatio), завершення (peroratio), з маркерною лексикою для кожного етапу.'
- section: Формати дебатів
  words: 800
  points:
  - Описати структуру формальних академічних дебатів (ролі стверджувальної та заперечної
    сторін, таймінг, перехресний допит).
  - 'Проаналізувати специфічні українські громадянські формати: круглий стіл, панельна
    дискусія, віче, громадські обговорення.'
  - Надати великий блок метамовної лексики для модерації, ввічливого перебивання,
    утримання черги та підбиття підсумків (напр., «Дозвольте уточнити...», «Повертаючись
    до ключової тези...»).
- section: Контраргументація
  words: 800
  points:
  - 'Деталізувати техніки спростування: пряме спростування, доведення до абсурду (reductio
    ad absurdum), обернення аргументу.'
  - 'Сформувати каталог логічних хиб (софізмів) із питомо українською термінологією:
    підміна тези (straw man), хибна дилема, перехід на особистості (ad hominem), апеляція
    до авторитету.'
  - Описати механізми виявлення емоційної маніпуляції та відмінності між прийнятним
    патосом і демагогією.
- section: Риторична етика
  words: 600
  points:
  - Сформулювати принципи етичної відповідальності оратора та концепцію інтелектуальної
    чесності.
  - Провести чітку межу між переконанням (поважає суб'єктність аудиторії) та маніпуляцією
    (використовує аудиторію як об'єкт), спираючись на структурний аналіз.
  - Зв'язати риторичну компетентність із медіаграмотністю як інструментом захисту
    в умовах інформаційної війни.
- section: Практикум — Дебатна практика
  words: 400
  points:
  - Описати сценарій симульованих дебатів на гостру суспільну тему для самостійного
    опрацювання студентом.
  - Надати рубрику/критерії для оцінювання промови (peer feedback protocol) з фокусом
    на етос, логос і патос.
  - Додати питання для глибокої саморефлексії щодо власного індивідуального стилю
    переконання.
