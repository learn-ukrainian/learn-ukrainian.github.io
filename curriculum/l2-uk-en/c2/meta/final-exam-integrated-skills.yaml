slug: final-exam-integrated-skills
title: Фінальний екзамен — Інтегровані навички
word_target: 5000
content_outline:
- section: Вступ — Структура фінального екзамену
  words: 600
  points:
  - 'Огляд чотирьох компонентів: аудіювання, читання, письмо, говоріння — їхня питома
    вага у загальному балі та послідовність проходження'
  - 'Критерії успішності: прохідний бал (поріг проходження), шкала оцінювання від
    0 до 100, відповідність рівню C2'
  - 'Часові рамки: загальна тривалість (~3–4 год), час на кожен компонент; умови складання
    (дозволені матеріали, технічне оснащення)'
  - 'Стратегії підготовки: самооцінювання за рубриками, симуляційні вправи, аналіз
    власних слабких місць; зв''язок з попередніми модулями C2'
- section: Компонент I — Аудіювання
  words: 750
  points:
  - 'Формат завдань: вибір з множини відповідей (MCQ), завдання на заповнення прогалин,
    відкриті відповіді — специфіка кожного типу на рівні C2'
  - 'Типи аудіо відповідно до §1.1 Держстандарту: лекції й академічні виступи, радіо/ТВ-програми
    (новини, дебати, документальні фільми), інтерв''ю, фрагменти художніх текстів
    із діалектними рисами та ідіомами'
  - 'Критерії оцінювання аудіювання: розуміння основної думки, виявлення деталей і
    прихованих смислів, відповідність C2 (§1.1.1.1)'
  - 'Зразок завдання з аудіювання: опис аудіотексту (наприклад, фрагмент лекції про
    сучасну українську культуру, ~3 хв), 6–8 запитань, коментар до очікуваних відповідей'
- section: Компонент II — Читання
  words: 750
  points:
  - 'Формат завдань: глобальне розуміння (заголовки/основна думка), аналіз деталей,
    завдання на критику й інтерпретацію (розпізнавання іронії, символів, алюзій —
    §1.2.1.1)'
  - 'Типи текстів відповідно до §1.2: наукові статті, публіцистика (репортажі, фейлетони,
    есеї), літературні уривки (новели, поезія), ділові папери — всі без адаптації'
  - 'Критерії оцінювання читання: повнота розуміння, швидкість ідентифікації структури,
    здатність критично оцінити прочитане (§1.2.1.2)'
  - 'Зразок завдання з читання: фрагмент публіцистичного тексту (~600 слів), 8–10
    запитань різних типів (MCQ + відкриті), коментар до правильних відповідей'
- section: Компонент III — Письмо
  words: 1000
  points:
  - 'Формат завдань: академічне есе (аргументація, 300–400 слів), трансформація тексту
    між стилями (§4.3.7), аналіз першоджерела або рецензія (§4.3.8)'
  - 'Вимоги до обсягу й змісту: мінімальний обсяг, структура (теза → аргументи → висновок),
    відповідність функціонального стилю'
  - 'Аналітична рубрика письмової частини: 4 виміри — Зміст (relevance, completeness),
    Мова (accuracy, lexical range), Стиль (register consistency, expressive means),
    Структура (cohesion, coherence) — дескриптори для кожного рівня (0–5 балів)'
  - 'Зразок завдання: тема есе (напр., «Роль мистецтва в умовах збройного конфлікту»),
    рубрика з дескрипторами, зразок сильної відповіді C2 з коментарем'
- section: Компонент IV — Говоріння
  words: 850
  points:
  - 'Формат завдань: монолог за темою/стимулом (2–3 хв), дискусія/дебати з екзаменатором
    (5–7 хв), рольова гра або спонтанна реакція на непередбачену ситуацію'
  - 'Критерії оцінювання: флуентність і спонтанність (§1.4.1.1.1), точність і діапазон
    засобів (фразеологізми, іронія, алюзії — §1.4.1.1.1), інтеракція і когерентність
    (§1.4.1.2.1); специфіка діалогу (12–15 реплік, §1.4.2.2)'
  - 'Процедура усної частини: підготовчий час (5 хв), умови запису/оцінювання, присутність
    двох екзаменаторів або використання аудіозапису'
  - 'Зразки тем і завдань: теми монологу (аналіз цитати, коментар до зображення, дискусія
    про суспільну проблему); теми діалогу (переговори, офіційне інтерв''ю); коментар
    до очікуваної відповіді C2'
- section: Пробний екзамен — Повна симуляція
  words: 1050
  points:
  - 'Повне проходження всіх чотирьох компонентів у реальному форматі: один аудіозапис
    (~3 хв) з 7 запитаннями; один текст (~600 слів) з 8 запитаннями; одне письмове
    завдання (есе 300–400 слів за 45 хв); одна тема для монологу'
  - 'Самооцінювання за рубриками: заповнення рубрик для Компонента III (письмо) і
    Компонента IV (говоріння) щодо власної роботи — конкретні запитання для самоаналізу'
  - 'Аналіз результатів: як інтерпретувати помилки (систематичні vs. випадкові), що
    означає кожен бал у контексті реального іспиту НАЯО'
  - 'Рекомендації до доопрацювання: матриця «компонент × тип помилки → цільові модулі
    для повторення»; план останніх 2–4 тижнів перед реальним іспитом'
