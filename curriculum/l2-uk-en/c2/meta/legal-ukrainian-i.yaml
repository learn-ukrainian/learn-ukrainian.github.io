slug: legal-ukrainian-i
title: Юридична українська I — Основи правничої термінології
word_target: 5000
content_outline:
- section: Вступ — Правнича мова як система
  words: 800
  points:
  - Definition and function of official-business style (офіційно-діловий стиль) in
    the legal sphere.
  - 'Historical evolution: From Ruska Pravda to modern Ukrainian legal terminology.'
  - The influence of Latin (terminological loans) and the purification from Russisms
    in modern legal discourse.
  - 'Key characteristics: precision, standardization, lack of emotional coloring.'
- section: Структура правової системи України
  words: 1000
  points:
  - 'The Hierarchy of Normative Acts: Constitution as the Supreme Law.'
  - Legislative Power (Verkhovna Rada) and the process of law-making.
  - Executive Power and by-laws (підзаконні акти).
  - 'Judicial System: General jurisdiction, administrative, and economic courts.'
  - 'The Constitutional Court of Ukraine: specific role and jurisdiction.'
- section: Базова правнича термінологія
  words: 1200
  points:
  - 'Legal Subjects: Distinction between ''фізична особа'' (natural person) and ''юридична
    особа'' (legal entity).'
  - 'Legal Relations (Правовідносини): Object, subject, and content of legal relations.'
  - 'Rights vs. Legitimate Interests: Semantic and legal distinctions.'
  - 'Legal Liability (Юридична відповідальність): Types (civil, administrative, criminal,
    disciplinary).'
  - Sanctions and enforcement mechanisms.
- section: Читання правових текстів
  words: 1000
  points:
  - 'Anatomy of a Law: Preamble, Articles (статті), Parts (частини), Points (пункти).'
  - Understanding 'Final and Transitional Provisions' (Прикінцеві та перехідні положення).
  - 'Standard legal formulas: ''відповідно до'', ''на підставі'', ''в порядку, встановленому
    законом''.'
  - 'How to navigate citations: ''ч. 1 ст. 10 Закону України...''.'
- section: Юридична лексика в повсякденному житті
  words: 800
  points:
  - 'Everyday legal capacity: Passport, registration (прописка vs. реєстрація), TIN
    (ІПН).'
  - 'Consumer rights terminology: ''скарга'', ''заява'', ''відшкодування''.'
  - 'Property rights: ''власність'', ''оренда'', ''відчуження''.'
  - Distinguishing professional jargon from proper official terminology (e.g., 'справа'
    vs. 'провадження').
- section: Практичні вправи
  words: 200
  points:
  - 'Transition to practice: Brief methodology for analyzing legal texts.'
  - Checklist for identifying the legal force of a document.
  - Preparation for the following activities (analysis of Constitution excerpts).
