slug: c2-1-final-checkpoint
title: Фінальна перевірка C2.1 — Стилістична досконалість
word_target: 5000
content_outline:
- section: Вступ — Що перевіряємо
  words: 600
  points:
  - 'Вітання на екваторі рівня C2.1: від окремих стилів до повної стилістичної свободи.'
  - 'Огляд компетенцій C2.1 згідно зі Стандартом: вміння не лише розуміти, а й створювати
    та трансформувати тексти.'
  - 'Структура фінальної перевірки: портфоліо, трансформація, аналіз, творчість, усна
    взаємодія.'
  - 'Критерії оцінювання: доречність, багатство лексики, синтаксична гнучкість, відсутність
    кальок.'
  - Поняття 'мовного смаку' як найвищого прояву володіння мовою.
- section: Портфоліо семи стилів
  words: 900
  points:
  - 'Вимоги до створення портфоліо: демонстрація діапазону від сакрального до профанного.'
  - 'Науковий стиль: написання анотації до уявної дисертації (точність, термінологічність,
    безособовість).'
  - 'Офіційно-діловий стиль: складання скарги або петиції (стандартизація, кліше,
    імперативність).'
  - 'Публіцистичний стиль: колонка для сучасного медіа (риторичні фігури, заклик,
    емоційність).'
  - 'Художній стиль: етюд-опис природи або інтер''єру (образність, тропи, індивідуальність).'
  - 'Розмовний стиль: запис діалогу двох друзів (еліпсиси, сленг, емоційні частки).'
  - 'Релігійний та епістолярний стилі: специфіка архаїзмів та етикетних формул.'
- section: Трансформаційні завдання
  words: 800
  points:
  - 'Суть стилістичної трансформації: зміна форми при збереженні змісту.'
  - 'Завдання 1: Переклад ''з української на українську'' (науковий текст → науково-популярний
    допис).'
  - 'Завдання 2: ''Бюрократизація'' казки (переказ сюжету ''Котигорошка'' мовою поліцейського
    протоколу).'
  - 'Завдання 3: Адаптація промови для різних аудиторій (школярі, інвестори, науковці).'
  - 'Аналіз втрат і здобутків при трансформації: що неможливо передати іншим стилем?'
- section: Аналіз стилістичних засобів
  words: 700
  points:
  - 'Діагностика чутливості до тексту: розпізнавання прихованих цитат та алюзій.'
  - 'Лексична стилістика: робота з синонімічними рядами (нейтральне — книжне — розмовне).'
  - 'Синтаксична стилістика: використання інверсії, парцеляції та паралелізму для
    емоційного впливу.'
  - 'Фігури мови: ідентифікація та створення метафор, метонімій, оксиморонів у контексті.'
  - 'Фоностилістика: роль ритму та милозвучності в публіцистичному та художньому текстах.'
- section: Творче письмо з індивідуальним голосом
  words: 800
  points:
  - 'Перехід від імітації до власного голосу: що робить стиль впізнаваним?'
  - 'Завдання ''Есе-маніфест'': викладення власної позиції щодо актуальної теми.'
  - 'Вимога свідомих стилістичних виборів: обґрунтування кожної використаної метафори
    чи риторичного запитання.'
  - 'Робота з когерентністю: засоби міжфразового зв''язку на рівні цілого тексту.'
  - 'Саморедагування: вміння ''вбити своїх улюбленців'' (викреслення зайвого).'
- section: Усна перевірка — переключення регістрів
  words: 600
  points:
  - Специфіка усного перемикання кодів (code-switching) у реальному часі.
  - 'Симуляція ситуацій: від розмови в барі до виступу на конференції за 5 хвилин.'
  - Контроль невербальних сигналів та інтонації, що відповідають обраному стилю.
  - 'Типові помилки: ''збивання'' на нейтральний стиль у стресовій ситуації.'
  - Роль пауз і темпу мовлення в різних регістрах.
- section: Підсумок і перехід до C2.2
  words: 600
  points:
  - 'Чек-ліст компетенцій C2.1: що має вміти студент на цьому етапі.'
  - 'Рефлексія результатів перевірки: визначення сильних сторін та зон росту.'
  - 'Анонс наступного етапу: C2.2 Літературна майстерність (глибинне занурення в художній
    стиль).'
  - 'Мотивація: стиль — це не маска, а інструмент точності думки.'
  - 'Фінальна настанова: мова як живий організм, що постійно змінюється.'
