slug: medical-ukrainian-i
title: Медична українська I — Основи термінології
word_target: 5000
content_outline:
- section: Вступ — Медична термінологія в Україні
  words: 600
  points:
  - 'Historical evolution of Ukrainian medical terminology: The 1920s ''Golden Age''
    and the Institute of Ukrainian Scientific Language.'
  - The impact of Soviet russification on medical lexicon and the modern renaissance
    of authentic terms.
  - 'The dual nature of medical language: International Greco-Latin roots vs. native
    Ukrainian roots.'
  - Current standardization bodies and dictionaries (e.g., UMSA dictionary).
- section: Анатомічна термінологія
  words: 800
  points:
  - Detailed nomenclature of organ systems (cardiovascular, respiratory, digestive,
    nervous).
  - 'Specific skeletal and muscular terms: comparing Latin (tibia) with Ukrainian
    (великогомілкова кістка).'
  - Anatomical planes and directions (проксимальний, дистальний, сагітальний) in Ukrainian
    context.
  - Common pitfalls in anatomical gender (e.g., 'путь' in medicine vs general usage,
    'біль', 'кір').
- section: Клінічна термінологія
  words: 800
  points:
  - 'Nosology: naming diseases and pathological states (запалення vs -іт).'
  - 'Suffixes in pathology: -іт/-ит (inflammation), -оз (non-inflammatory/degenerative),
    -ома (tumor).'
  - 'Differentiation of synonyms: ''хвороба'', ''недуга'', ''захворювання'', ''розлад''.'
  - 'Describing symptoms: ''гострий'', ''тупий'', ''ниючий'', ''переймоподібний''
    (specifically regarding pain).'
- section: Фармацевтична термінологія
  words: 800
  points:
  - 'Classification of medicinal products: ''лікарський засіб'', ''препарат'', ''ліки''.'
  - 'Forms of release: ''пігулки'' vs ''таблетки'', ''ампули'', ''мазі'', ''розчини'',
    ''супозиторії''.'
  - 'Routes of administration: ''перорально'', ''внутрішньовенно'', ''внутрішньом''язово'',
    ''зовнішнє''.'
  - 'Prescription language: Ukrainian grammar in recipes (Genitive case usage for
    quantities).'
- section: Медична документація
  words: 700
  points:
  - 'Structure of the Anamnesis (Medical History): ''скарги'', ''анамнез хвороби'',
    ''анамнез життя''.'
  - 'Professional phrasing for ''History Taking'': ''Зі слів хворого...'', ''Об''єктивно...'',
    ''Status praesens''.'
  - 'Types of documents: ''амбулаторна картка'', ''виписка'', ''епікриз'', ''направлення'',
    ''рецепт''.'
  - 'Digital transformation: Terminology related to eHealth and electronic records
    in Ukraine.'
- section: Словотворення в медичній термінології
  words: 600
  points:
  - 'Productive prefixes: гіпер-, гіпо-, дис-, а-/ан-, ендо-, екзо-.'
  - 'Compound words in medicine: ''кровообіг'', ''водолікування'', ''світлобоязнь''.'
  - 'Adapting foreign terms: Transliteration rules and euphonic adaptation.'
  - 'Avoidance of calques: ''серцевий напад'' vs ''приступ'', ''знеболювальне'' vs
    ''болезаспокійливе''.'
- section: Практикум — Робота з медичними термінами
  words: 700
  points:
  - Reading and analyzing a complex clinical case study (text analysis).
  - 'Translation challenges: Rendering complex English medical diagnoses into standard
    Ukrainian.'
  - 'Editing task: Correcting a text full of surzhyk and medical calques.'
  - Glossary compilation principles for medical interpreters.
