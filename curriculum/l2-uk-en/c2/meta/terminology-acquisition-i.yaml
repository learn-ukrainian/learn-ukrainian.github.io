slug: terminology-acquisition-i
title: Опанування термінології I — Системний підхід
word_target: 5000
content_outline:
- section: Вступ — Принципи опанування термінології
  words: 600
  points:
  - 'Системність термінології: гіперо-гіпонімічні зв''язки замість ізольованих слів'
  - Роль когнітивних стратегій у запам'ятовуванні складної лексики
  - Розрізнення активного (продуктивного) та пасивного (рецептивного) термінологічного
    запасу
  - Історичний контекст української термінології (1920-ті vs сьогодення)
- section: Словотворчі моделі в термінології
  words: 1200
  points:
  - Продуктивні префікси наукового стилю (над-, під-, між-, перед-, анти-, контр-)
  - 'Суфіксальний словотвір: -ння (процеси), -ість (властивості), -ізм (течії/явища)'
  - 'Складні слова та основи (композити): само-, життє-, людино- та їхня роль'
  - Тенденція до уникнення активних дієприкметників (-учий/-ючий) у термінотворенні
  - Абревіація як спосіб економії мовних засобів (ініціальні абревіатури, усічення)
- section: Міжнародна термінологія та інтернаціоналізми
  words: 800
  points:
  - Греко-латинський спадок в українській науковій мові
  - 'Терміни-дублети: питоме слово vs інтернаціоналізм (чинник/фактор, відсоток/процент)'
  - Стратегії розпізнавання когнатів та уникання «фальшивих друзів перекладача»
  - Адаптація запозичень до законів української милозвучності
- section: Контекстуальне виведення значення
  words: 800
  points:
  - 'Інференція: як зрозуміти незнайомий термін без словника'
  - Морфологічний аналіз незнайомого слова (розбір на знайомі морфеми)
  - 'Синтаксичні підказки: означення, прикладки, пояснювальні конструкції (тобто,
    або)'
  - Перевірка гіпотези значення через широкий контекст
- section: Робота зі словниками та фаховими ресурсами
  words: 800
  points:
  - 'Типологія словників: тлумачні, перекладні, етимологічні, термінологічні'
  - Огляд ключових онлайн-ресурсів (e2u.org.ua, r2u.org.ua, СУМ-20)
  - 'Критичний підхід до джерел: як відрізнити якісний словник від аматорського'
  - Робота з корпусами текстів (ГРАК) для перевірки слововживання
- section: Практичні вправи та самооцінка
  words: 800
  points:
  - 'Аналіз науково-популярного тексту: виділення термінів та їх дефініцій'
  - Трансформація інтернаціоналізмів у питомі відповідники і навпаки
  - Створення власного міні-глосарію за фахом
  - Чек-лист для перевірки правильності вживання термінів
