slug: professional-correspondence
title: Професійна кореспонденція
word_target: 5000
content_outline:
- section: Вступ — Культура ділової кореспонденції
  words: 600
  points:
  - Роль професійного листування в сучасному українському бізнес-середовищі
  - Еволюція від паперового документообігу до цифрової екосистеми
  - 'Етика та тон: баланс між офіційністю та людяністю'
  - 'Основні принципи: лаконічність, точність, грамотність'
- section: 'Офіційні листи: Структура та стандарти'
  words: 1000
  points:
  - 'Класифікація листів: лист-запит, лист-пропозиція (оферта), лист-претензія, гарантійний
    лист'
  - 'Обов''язкові реквізити за ДСТУ 4163:2020: адресат, дата, реєстраційний індекс,
    заголовок'
  - 'Композиція тексту: вступна частина (мотивація), основна частина (суть), заключна
    частина (висновки/прохання)'
  - Етикетні формули звертання (Шановний пане/пані) та прощання (З повагою)
- section: Ділові електронні листи (Email)
  words: 800
  points:
  - 'Специфіка email-етикету: швидкість vs. якість'
  - 'Мистецтво написання теми листа (Subject Line): інформативність та стислість'
  - 'Структура тіла листа: принцип перевернутої піраміди'
  - Правила оформлення підпису (Signature block) та робота з вкладеннями
- section: 'Запити та відповіді: Комунікативні стратегії'
  words: 900
  points:
  - 'Алгоритм написання ефективного запиту: чіткість формулювань'
  - 'Структура позитивної відповіді: підтвердження та деталізація'
  - 'Мистецтво відмови: формула ''сендвіча'' (позитив -> відмова -> позитив)'
  - 'Листи follow-up: як нагадати про себе, не будучи нав''язливим'
- section: 'Скарги та претензії: Конструктивний конфлікт'
  words: 900
  points:
  - 'Структура листа-претензії: факти, докази, вимоги'
  - 'Емоційний інтелект у скаргах: як писати жорстко, але ввічливо'
  - 'Алгоритм реагування на скаргу: визнання, вибачення, рішення (Recovery strategy)'
  - Типові помилки при роботі з конфліктною кореспонденцією
- section: 'Практичні вправи: Майстерня письма'
  words: 800
  points:
  - 'Аналіз кейсу: перетворення ''поганого'' листа на професійний'
  - Складання офіційного запиту до державної установи
  - Написання делікатної відмови партнеру
  - 'Редагування тексту: усунення канцеляризмів та кальок'
