  text: "Розділ III. Україна в період системної кризи Союзу Радянських Соціалістичних\
    \ Республік\n116\n1972 рр. загальна кількість учасників диси­дентського \nй правозахисного\
    \ рухів в Україні становила близько \n1  тис. осіб. Репресії 1970-х рр. завдали\
    \ удару українському \nопозиційному руху, але не змогли його зупинити. 3\t\nУтворення\
    \ Української громадської групи \nсприяння виконанню Гельсінських угод. У  1975 \
    \ р. СРСР підписав Гельсінський Заключний \nакт Наради з  безпеки та співробітництва\
    \ в  Європі, \nта зобо"
