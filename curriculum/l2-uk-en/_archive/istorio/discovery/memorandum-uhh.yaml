  text: "3) Домагатися, щоб на всіх міжнародних нарадах, де \nмають обговорюватися\
    \ підсумки виконання Гельсін­\nських угод, Україна як суверенна європейська дер­\n\
    жава і член ООН була представлена окремою деле­\nгацією. 4) З  метою вільного\
    \ обміну інформацією та ідеями \nдомагатися акредитування в Україні представників\
    \ \nзакордонної преси, створення незалежних прес­\nагентств тощо. Своїм головним\
    \ завданням Група вважає ознайом­\nлення урядів країн-учасників і світової громадськос­\n\
