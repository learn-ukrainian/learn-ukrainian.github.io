    \ кару (14.07.1976 року). Підсумуйте свої знання \n \n1. Запам’ятайте дату і подію,\
    \ пов’язані з ними: \n– 9 листопада 1976 р. — створено Українську Гельсінську\
    \ групу (УГГ). 2. За допомогою інтернет-ресурсів дізнайтесь, як реагували українці\
