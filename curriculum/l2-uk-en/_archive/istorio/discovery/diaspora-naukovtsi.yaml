  text: "Закордонні університети визнали Український \nуніверситет у  Львові рівноправним\
    \ із західноєвропей-\nськими вищими школами та зараховували студентам \nроки навчання\
    \ в  ньому. Головним осередком української науки та загалом \nкультури залишалося\
    \ Наукове товариство ім. Т. Шев-\nченка (НТШ). У  1920—1930-х рр. тут працювало\
    \ понад \n200  науковців. Завдяки підтримці української громади \nНТШ вдалося\
    \ утримувати велику бібліотеку, три музеї \nі  два науково-дослідні інститути.\
    \ У 1920-х рр. певні кошти на утри"
