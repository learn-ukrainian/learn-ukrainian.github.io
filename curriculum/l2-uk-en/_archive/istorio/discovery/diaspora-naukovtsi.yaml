    \ вченому, історику-енциклопедис-\nту Омеляну Пріцаку. Важливим здобутком української\
    \ діаспори цієї \nдоби залишалася діяльність відродженого Наукового \nтовариства\
    \ імені Т. Шевченка. У  цей час воно ви-\nдавало десятитомну «Енциклопедію українознавства»\
    \ \n(до 1989  р.). У  1979  р. виник один із наймолодших"
