  text: "174\nРозділ V\nПротягом другої половини XIX ст. зі Східної Галичини й Північної\
    \ \nБуковини в пошуках кращої долі до Америки виїхало близько 250 тис. осіб. Закарпаття\
    \ упродовж 1871—1900 рр. залишили 170 тис. переселенців. Перша хвиля трудової\
    \ еміграції із західноукраїнських земель тривала до початку \nПершої світової\
    \ війни. У  цілому вона була частиною світового міграційного про­\nцесу, що особливо\
    \ активізувався на межі XIX—XX  ст. за масштабами вона пере­\nважала всі наступні\
    \ хвилі української еміграц"
  section_title: Сторінка 174
  grade: 9
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
