  text: "Проте незважаючи на позитивні тенденції, у краї й надалі не ви-\nстачало\
    \ свого хліба, його доводилося завозити з Угорщини. Значно кра-\nще було розвинене\
    \ тваринництво, яким більше займалися селяни (91 % \nпоголів’я). Експорт худоби\
    \ став одним із головних джерел прибутку на-\nселення краю. У Закарпатті традиційно\
    \ розвивалося виноградарство. Малоземелля та інші соціальні проблеми продовжували\
    \ відігравати провідну роль \nу  збільшенні трудової еміграції українців до Північної\
    \ Америки. тільки протягом \n1"
