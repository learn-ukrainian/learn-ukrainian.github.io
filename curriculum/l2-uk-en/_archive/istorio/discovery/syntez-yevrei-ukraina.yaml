  chunk_id: 8-klas-istoria-ukr-galimov-2025_s0184
  text: "Хроніка містить відомості про те, як на \nпочатку Хмельниччини єврейське\
    \ населення на \nтеренах України зазнавало численних погромів, \nвиселень або\
    \ примусового навернення у право­\nслав’я. Загалом за період Козацької революції\
    \ \nблизько 300  єврейських громад припинили \n­існування, а кожного другого їхнього\
    \ представ-\nника було вбито. Загальна кількість жертв серед \nєврейського населення,\
    \ за різними оцінками, \nстановить від декількох десятків тисяч до \n100  тис.\
    \ осіб або більше. Словник\nМикитинська С"
