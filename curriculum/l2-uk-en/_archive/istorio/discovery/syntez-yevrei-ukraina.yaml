  text: "Мовою джерела. Зі спогадів Євгена Сверстюка: \n«…Перед нашими друзями-євреями\
    \ була ясна перспектива: вихід на волю і \nповернення на свою історичну батьківщину,\
    \ де на них чекають з розкритими обіймами. Вони розуміли, що перед українцями\
    \ немає іншої перспективи, крім виходу в \nсибірське заслання або повернення додому,\
    \ в зону особливого тиску і нагляду. Вони \nпрагнули нам допомогти, як тільки\
    \ могли. Вони апелювали до вільного світу. Багато з них \nнаписали спогади про\
    \ спільне життя в зоні. Йосеф Менд"
  section_title: Сторінка 140
