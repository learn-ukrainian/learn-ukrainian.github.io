  text: "Голодомор мав політичне підґрунтя. Свідомо йдучи на\r\nгеноцид, сталінське\
    \ керівництво партії й держави прагнуло зламати та знекровити\r\nі селянство як\
    \ клас, і найнебезпечніші для диктатури, найзаможніші регіони\r\nкраїни, можливу\
    \ базу для селянського опору — Дон, Кубань, Сибір і особливо\r\nУкраїну.\n\nДеякі\
    \ комуністичні керівники здійснили спроби якщо не\r\nпротесту, то критики «перегинів\
    \ у заготівельній політиці». Так, листа до ЦК\r\nВКП(б) з засудженням таких «перегинів»\
    \ написав шерег українських партійн"
