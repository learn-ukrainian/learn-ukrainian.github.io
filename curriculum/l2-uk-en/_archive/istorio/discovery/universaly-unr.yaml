  text: "IV Універсал і ін. законодавчі акти. В ході війни з большевиками єдиним реальним\
    \ порятунком став мир із\r\nцентр. державами і організація при їх допомозі оборони\
    \ України від червоної\r\nМоскви. Щоб стати на шлях цілком самостійної міжнар.\
    \ політики, треба було\r\nостаточно оголосити незалежність України. Це зроблено\
    \ новим важливим актом\r\nЦентр. Ради — IV Універсалом. В ньому містилися слова:\
    \ »Однині Українська\r\nНародна Республіка стає самостійною, ні від кого незалежною,\
    \ вільною,\r\nсуверенною Державою У"
