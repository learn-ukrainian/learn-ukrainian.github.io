  text: "Розпочавши ще 1929 р. політику «розкуркулювання», а\r\n1930 р. взявши курс\
    \ на повну колективізацію села, сталінське керівництво не\r\nрозраховувало на\
    \ негайні економічні успіхи. Мільйони селян, не тільки\r\nбільш-менш заможних,\
    \ а й середнього достатку, і просто біднота, за спущеними\r\n«зверху» рознарядками\
    \ були вислані у віддалені області неозорого Союзу без\r\nбудь-якого майна. Скільки\
    \ з них померло в дорозі — ніхто сьогодні визначити не\r\nможе. Майно «розкуркулених»\
    \ було передане колгоспам, але з безпри"
