  text: "143\n§ 24—25. Насильницька колективізація та опір їй населення. Голодомор\
    \ 1932—1933 рр. Голодомор, окрім очевидних людських втрат та величезного мо-\n\
    рального удару, завдав непоправної шкоди українському національному \nжиттю. Він\
    \ практично знищив старе українське село з його багатими \nнародними традиціями.\
    \ Замість нього з’явилося колгоспне село, яке вже \nніколи відкрито не повставало\
    \ проти радянської влади. Було приглуше-\nно почуття індивідуалізму, яке було\
    \ основним для ідентичності україн-\nського"
