    Але це вже щось, як останні місяці, можливо навіть тижні, цієї доби, назовні,
    раз-у-раз, зривається розпачливий крик сирен, там то там зриваються вибухи і це
    підбадьорює, надає сили, до того, там десь в тому он просторі, Віра і, можливо,
    вона не в кращому стані, ніж він тут, тому, як не видержати. Це понад силу, але
    треба... Жий, тримайс'
