  text: "142\nРозділ IV\nухвалювала Конвенцію 1948 р. про запобігання \nгеноциду та\
    \ ратифікувала її в  1951 р. Злочин \nгеноциду та покарання за нього зафіксовані\
    \ у \nКримінальному кодексі України (стаття 442). 22 травня 2009  р. Головне слідче\
    \ управління \nСлужби безпеки України порушило Криміналь-\nну справу № 475 за\
    \ фактом вчинення геноци-\nду в  Україні в  1932—1933 pp., спираючись \nна міжнародне\
    \ і  національне ­законодавство, \nа  ­також здійснивши системне розслідування,\
    \ \nвивчення сотень томів справ, опитав"
