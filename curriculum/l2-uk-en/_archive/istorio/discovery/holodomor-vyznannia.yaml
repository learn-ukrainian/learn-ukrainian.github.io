  text: "РОЗДІЛ 4\n144\nв Україні. Голодомор 1932–1933 рр. — страшний злочин проти\
    \ укра-\nїнського народу. Його вчинила комуністична влада на чолі з Йосипом \n\
    Сталіним для того, щоб залякати і підкорити українців. У селян вилучали \nне лише\
    \ зерно, а й їстівні припаси. Якщо хтось намагався чинити спро-\nтив чи збирав\
    \ колоски на полях, щоб прогодувати дітей, то він підлягав \nжорсткому покаранню\
