  text: "Окремі татарські групи проникали в Крим, кочували в\r\nйого степовій частині\
    \ й осідали на землю. Центром татарського населення Криму\r\nспочатку було м.\
    \ Крим (нині Старий Крим), звідки починалися татарські шляхи на\r\nпівніч. У середині\
    \ XV ст. Крим повністю підпадає під владу татарської держави, очолюваної\r\nдинастією\
    \ Ґіреїв. Столиця, Бахчисарай, розбудовується біля центру колишнього\r\nМанґупського\
    \ князівства. Перший хан, Хаджі-Ґірей, принаймні певний час жив у\r\nЛитві у Вітовта;\
    \ в кінці XIV ст. він захо"
