  text: 'Історія Криму дуже-дуже давня… Ще як Каїн Авеля вхекав за жертву господню,
    так і тоді вже Крим був. Взагалі, як переказують тут старі люди, Крим постав у
    той самий день, як господь створив "твердь та видиме небо"… Старенький, як бачите,
    є Крим.


    Передісторична Кримова доля була така. (За точність не ручусь!).


    Колись-колись-колись Крим, як відомо, звався Таврія. Це його найстарша назва.
    А постала вона від народу "таврів" (таври), найдавніших, що їх історія застукує
    на цім півострові, пожильців. '
