  text: "Які події відбувалися в Криму в 1778—1779 роках? Відлуння минулого \nЗі звернення\
    \ християнського населення до кримського хана        \nШагін Ґерая (1778 рік)\
    \ \n«Ми … ханом і вітчизною своєю задоволені; від предків своїх \nплатимо данину\
    \ … (ханові), і хоч шаблями нас рубати будуть, то ми все-\nтаки нікуди не підемо.\
    \ …Ми слуги ваші й піддані триста років, … і ніколи від вас \nобраз не бачили.\
    \ Нині ж нас хочуть звідси вивести. … просимо (нас) від такої \nнапасті позбавити,\
    \ за що за вас Бога молити будемо»"
