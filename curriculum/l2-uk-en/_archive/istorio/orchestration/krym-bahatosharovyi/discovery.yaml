  text: "Кримські татари стали оселятися в містах з XIV ст. З\r\nних найстарішим містом\
    \ з переважно татарським населенням був Солхат (Старий\r\nКрим). Населення Бахчисарая,\
    \ Карасубазара (Білогорська), Гезлева (Євпаторії), Кирк-Ера\r\n(Чуфут-Кале), Перекопа\
    \ та інших татарських міст залишалося поліетнічним. У цих\r\nмістах поруч з татарами\
    \ жили греки, українці, караїми, вірмени, євреї, нащадки\r\nготів та інші народи.\
    \ В ряді міст були ремісницькі цехи. Так, у Бахчисараї було\r\n32 ремісничі цехи.\
    \ Цех очолював уста-баш"
