  text: "98\nРозділ III\n­єдність уже не піддавали сумніву. Однак держави-переможниці\
    \ в  Пер-\nшій світовій війні не бажали виникнення самостійної України. Етнічні\
    \ \nукраїнські землі було поділено між чотирма державами  — Польщею, \nЧехо­словаччиною,\
    \ Румунією та майбутнім СРСР. Поразка Української революції була обумовлена різними\
    \ причина-\nми. На жаль, на цей час переважна частина населення була не готова\
    \ \nдо вирішальної боротьби за Україну через низький рівень національної \nсвідомості.\
    \ Досить негативно вплин"
  section_title: Сторінка 98
  grade: 10
  author: gisem
  page: ''
