  text: "Проте \nУЦР зовсім відмовилася від створення власного регулярного війська,\
    \ \nУкраїнська Держава П. Скоропадського спиралася на допомогу інозем-\nної армії,\
    \ і  лише Директорія УНР розпочала створення українського \nвійська. Найважливішим\
    \ в  історичному значенні Української революції \n1917—1921  рр. було те, що вона\
    \ активізувала процеси формування мо-\nдерної української політичної нації та \
    \ відновила традиції української \nдержавності. ! Висновки. Завдяки Варшавській\
    \ угоді, яка була неоднозначно \nсприй"
