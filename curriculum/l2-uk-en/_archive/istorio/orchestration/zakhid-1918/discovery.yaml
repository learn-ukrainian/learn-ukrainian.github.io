  text: "66\nРозділ III\n­Федеративної Радянської Республіки (РСФРР) на Україні немає.\
    \ Вій-\nськова акція на українській території на цей момент проводиться по-\n\
    між військом Директорії та військами Українського Радянського Уряду, \nякий є \
    \ цілком незалежним». Розуміючи, хто діє разом з  українськими більшовиками, Директо-\n\
    рія УНР 16 січня 1919 р. оголосила війну більшовицькій Росії. Однак сил \nзупинити\
    \ більшовицький наступ у неї не було. На Київ стрімко рухалися \nвійська українських\
    \ більшовиків, дії яких під"
