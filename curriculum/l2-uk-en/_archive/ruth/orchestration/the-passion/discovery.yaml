    \ причин. Тут ми досліджуємо дві справи: по-перше, чи можуть\r\nпричини бути взаємно\
    \ для себе причинами і, по-друге, чи внаслідок дії двох\r\nоднакових причин може\
    \ виникнути той самий наслідок."
