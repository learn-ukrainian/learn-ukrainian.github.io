  text: "Наступна площина, яка вбирає попередню, — наративна\r\nабо риторична. Адже\
    \ кожен текст має певний голос, оскільки він постає як\r\nоповідь і послуговується\
    \ такими чи іншими риторичними прийомами. Навіть текст,\r\nякий не має помітного\
    \ оповідача, все одно має голос. Цей випадок безтілесного\r\nголосу, де текст\
    \ твориться не якоюсь індивідуальною психікою, а самою чистою\r\nпоезією, є особливим\
    \ і вельми цікавим варіантом, який, до речі, зможемо\r\nпроілюструвати. Більш\
    \ звичні прояви голосу в цьому наративно-ри"
