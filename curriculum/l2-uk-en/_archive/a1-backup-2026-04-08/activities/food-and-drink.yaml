- id: odd-one-out-food-groups
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the word that doesn't belong)
  items:
  - words:
    - кава
    - чай
    - хліб
    - компот
    correct: 2
    explanation: Хліб — це їжа, а кава, чай і компот — напої.
  - words:
    - картопля
    - помідор
    - огірок
    - молоко
    correct: 3
    explanation: Молоко — це молочний продукт, а картопля, помідор і огірок — овочі.
  - words:
    - яблуко
    - банан
    - лимон
    - суп
    correct: 3
    explanation: Суп — це страва, а яблуко, банан і лимон — фрукти.
  - words:
    - сніданок
    - обід
    - вечеря
    - вода
    correct: 3
    explanation: Вода — це напій, а сніданок, обід і вечеря — прийоми їжі.
  - words:
    - масло
    - сметана
    - сир
    - риба
    correct: 3
    explanation: Риба — це м'ясний продукт, а масло, сметана і сир — молочні продукти.
  - words:
    - борщ
    - вареники
    - деруни
    - кефір
    correct: 3
    explanation: Кефір — це напій, а борщ, вареники і деруни — традиційні українські
      страви.
