- id: error-correction-food-facts
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Борщ — це традиційний польський суп.
    error: польський
    correction: український
    error_type: word
    options:
    - український
    - французький
    - іспанський
    explanation: Борщ — це традиційний UKRAINIAN суп. У 2022 році UNESCO визнало борщ
      українською культурною спадщиною.
  - sentence: Вареники готують з тіста з рибою або сиром.
    error: рибою
    correction: картоплею
    error_type: word
    options:
    - картоплею
    - рисом
    - морквою
    explanation: Традиційна начинка вареників — картопля або сир, а не риба.
  - sentence: Компот — це гарячий напій із фруктів.
    error: гарячий
    correction: холодний
    error_type: word
    options:
    - холодний
    - молочний
    - алкогольний
    explanation: Компот — це холодний (або кімнатної температури) напій із фруктів,
      зварених у воді. Не гарячий, як кава.
  - sentence: Вечеря — це ранковий прийом їжі.
    error: ранковий
    correction: вечірній
    error_type: word
    options:
    - вечірній
    - денний
    - традиційний
    explanation: Вечеря — це вечірній прийом їжі (ввечері). Ранковий — це сніданок.
  - sentence: Сало — це популярна українська страва з курки.
    error: курки
    correction: свинини
    error_type: word
    options:
    - свинини
    - риби
    - картоплі
    explanation: Сало — це солона свиняча (pork) жирна тканина. Не курка і не риба.
  - sentence: Кефір — це овоч.
    error: овоч
    correction: напій
    error_type: word
    options:
    - напій
    - фрукт
    - страва
    explanation: Кефір — це молочний напій (milk drink). Овочі — це картопля, помідор,
      огірок.
