workbook:
- id: true-false-food-facts
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Борщ — це традиційний український суп.
    correct: true
    explanation: Борщ — це національна страва України з буряком, картоплею і сметаною.
      UNESCO визнало борщ українською культурною спадщиною у 2022 році.
  - statement: Вареники — це тісто з картоплею або сиром.
    correct: true
    explanation: Вареники — страва з тіста, наповнена картоплею, сиром або вишнями.
      Символ заможного, щасливого життя в Україні.
  - statement: Компот — це гарячий напій, як кава.
    correct: false
    explanation: Компот — це холодний (або кімнатної температури) напій із фруктів,
      зварених у воді. Кава — гаряча, а компот — ні.
  - statement: На сніданок українці зазвичай їдять суп.
    correct: false
    explanation: Суп зазвичай їдять на обід. На сніданок типово їдять кашу, яйце,
      хліб, п'ють каву або чай.
  - statement: Сметана — це молочний продукт.
    correct: true
    explanation: Сметана — молочний продукт, важливий в українській кухні. Її додають
      до борщу, вареників і деруниів.
  - statement: Деруни — це вареники з тертої картоплі.
    correct: false
    explanation: Деруни — це картопляні оладки (pancakes) з тертої картоплі. Вареники
      — це зовсім інша страва з тіста.
