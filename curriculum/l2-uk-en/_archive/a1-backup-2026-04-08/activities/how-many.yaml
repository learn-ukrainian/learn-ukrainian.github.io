workbook:
- type: match-up
  instruction: Match each number to its Ukrainian word.
  pairs:
  - left: '7'
    right: сім
  - left: '11'
    right: одинадцять
  - left: '14'
    right: чотирнадцять
  - left: '20'
    right: двадцять
  - left: '40'
    right: сорок
  - left: '90'
    right: дев'яносто
  - left: '100'
    right: сто
  - left: '200'
    right: двісті
  - left: '1000'
    right: тисяча
- type: group-sort
  instruction: 'Sort the numbers into three groups based on which form of the word
    **рік** follows them: **рік** (after 1), **роки** (after 2–4), or **років** (after
    5+).'
  groups:
  - label: рік
    items:
    - один
    - двадцять один
    - тридцять один
    - сорок один
    - шістдесят один
    - дев'яносто один
  - label: роки
    items:
    - два
    - три
    - чотири
    - двадцять два
    - двадцять три
    - двадцять чотири
  - label: років
    items:
    - п'ять
    - десять
    - одинадцять
    - двадцять
    - п'ятнадцять
    - тридцять
- type: true-false
  instruction: True or false? Choose Правда or Ні.
  items:
  - statement: 40 in Ukrainian is «чотиридесят».
    correct: false
    explanation: '40 is irregular: **сорок**. The form *чотиридесят* does not exist
      in Ukrainian.'
  - statement: In numbers 11–19, stress always falls on the -на- syllable of -надцять.
    correct: true
    explanation: 'Correct: одинáдцять, дванáдцять, тринáдцять — the **-на-** syllable
      is always stressed.'
  - statement: After the number 5, the currency form is «гривень».
    correct: true
    explanation: '5+ takes the genitive plural: **п''ять гривень**, **двадцять гривень**.'
  - statement: 90 in Ukrainian is «дев'ятдесят».
    correct: false
    explanation: '90 is irregular: **дев''яносто**. The form *дев''ятдесят* does not
      exist.'
  - statement: «Мені два роки» is correct for someone who is 2 years old.
    correct: true
    explanation: 'After 2 (range 2–4), the form is **роки**: Мені два **роки**.'
  - statement: 200 in Ukrainian is «двасто».
    correct: false
    explanation: 200 is **двісті**, not *двасто*. The pattern shifts at 200 and does
      not follow the триста/чотириста model.
  - statement: After number 1, the currency form is «одна гривня».
    correct: true
    explanation: 'After 1, use the nominative singular feminine: **одна гривня**.'
  - statement: «П'ятнадцять» means 50.
    correct: false
    explanation: '**П''ятнадцять** = 15. The word for 50 is **п''ятдесят**.'
