- type: error-correction
  instruction: Find and correct the mistake in each sentence.
  items:
  - sentence: Мені сорок п'ять рік.
    error: рік
    correction: років
    error_type: word
    options:
    - рік
    - роки
    - років
    explanation: 'After 45 (5+), the correct form is **років**: Мені сорок п''ять
      **років**.'
  - sentence: Торт коштує двісті гривні.
    error: гривні
    correction: гривень
    error_type: word
    options:
    - гривня
    - гривні
    - гривень
    explanation: 'After 200 (5+), the correct form is **гривень**: двісті **гривень**.'
  - sentence: Число 40 — чотиридесят.
    error: чотиридесят
    correction: сорок
    error_type: word
    options:
    - чотириста
    - чотирнадцять
    - сорок
    explanation: '40 is irregular in Ukrainian: **сорок**. There is no *чотиридесят*.'
  - sentence: Число 90 — дев'ятдесят.
    error: дев'ятдесят
    correction: дев'яносто
    error_type: word
    options:
    - дев'ятсот
    - дев'ятнадцять
    - дев'яносто
    explanation: '90 is irregular: **дев''яносто**. There is no *дев''ятдесят*.'
  - sentence: Йому два рік.
    error: рік
    correction: роки
    error_type: word
    options:
    - рік
    - роки
    - років
    explanation: 'After 2 (range 2–4), use **роки**: Йому два **роки**.'
  - sentence: Хліб коштує п'ятнадцять гривня.
    error: гривня
    correction: гривень
    error_type: word
    options:
    - гривня
    - гривні
    - гривень
    explanation: 'After 15 (5+), use **гривень**: п''ятнадцять **гривень**.'
