- id: fill-in-frequency
  type: fill-in
  instruction: Оберіть правильне слово або фразу (Choose the correct word or phrase)
  items:
  - sentence: Неділя — вихідний день. Я ___ працюю у неділю.
    answer: ніколи не
    options:
    - ніколи не
    - завжди
    - часто
  - sentence: Вона грає у теніс двічі ___ тиждень.
    answer: на
    options:
    - на
    - у
    - в
  - sentence: — ___ в кіно у суботу! — Добре!
    answer: Ходімо
    options:
    - Ходімо
    - Давай
    - Ідемо
  - sentence: Я люблю спорт, тому ___ граю у баскетбол.
    answer: часто
    options:
    - часто
    - ніколи
    - рідко
  - sentence: Я не маю часу, тому ___ читаю книги.
    answer: рідко
    options:
    - рідко
    - часто
    - завжди
  - sentence: — Що ти робиш ___ ? — Зазвичай відпочиваю.
    answer: у вихідні
    options:
    - у вихідні
    - вихідні
    - на вихідні
workbook:
- type: group-sort
  instruction: Розподіліть слова за групами (Sort the words into groups)
  groups:
  - label: грати у ___
    items:
    - футбол
    - баскетбол
    - теніс
    - волейбол
  - label: грати на ___
    items:
    - гітарі
    - піаніно
    - скрипці
  - label: ходити в / на ___
    items:
    - кіно
    - театр
    - концерт
    - музей
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Вона ніколи ходить у театр.
    correct: false
    explanation: '''Ніколи'' always requires ''не'' before the verb: ніколи не ходить.'
  - statement: Я часто граю у футбол — двічі на тиждень.
    correct: true
    explanation: '''Часто'' (often) is consistent with ''двічі на тиждень'' (twice
      a week).'
  - statement: Він завжди малює — кожен день.
    correct: true
    explanation: '''Завжди'' (always) and ''кожен день'' (every day) express the same
      frequency.'
  - statement: Я рідко читаю книги — кожен день.
    correct: false
    explanation: '''Рідко'' (rarely) contradicts ''кожен день'' (every day) — these
      are opposites.'
  - statement: Я ніколи не граю у волейбол — у мене немає часу.
    correct: true
    explanation: 'Correct: ''ніколи не'' + verb. The context (no time) supports ''never''.'
  - statement: Він ніколи не ходить у кіно — двічі на тиждень.
    correct: false
    explanation: '''Ніколи не ходить'' (never goes) contradicts ''двічі на тиждень''
      (twice a week).'
  - statement: Ми зазвичай дивимося фільми у вихідні.
    correct: true
    explanation: 'Correct structure: ''зазвичай'' (usually) + verb + object + time
      phrase.'
- type: quiz
  instruction: Дайте відповідь на запитання (Answer the question)
  items:
  - question: Що Вітя зазвичай робить у вихідні?
    options:
    - Ходить у театр
    - Гуляє і читає
    - Грає у футбол
    - Слухає музику
    correct: 1
  - question: Куди Лєна запрошує Вітю в суботу?
    options:
    - У музей
    - На концерт
    - В кіно
    - В театр
    correct: 2
  - question: Як часто Лєна грає у футбол?
    options:
    - Раз на тиждень
    - Двічі на тиждень
    - Кожен день
    - Рідко
    correct: 1
  - question: Коли саме Лєна грає у футбол?
    options:
    - У понеділок і середу
    - У п'ятницю і суботу
    - У вівторок і четвер
    - У неділю
    correct: 2
  - question: Як часто Лєна ходить у музей?
    options:
    - Кожен день
    - Двічі на тиждень
    - Раз на місяць
    - Ніколи
    correct: 2
  - question: Що Вітя і Лєна люблять робити?
    options:
    - Грати у футбол
    - Слухати музику
    - Ходити в театр
    - Малювати
    correct: 3
- type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Я ___ слухаю музику — кожен день.
    answer: завжди
    options:
    - завжди
    - рідко
    - іноді
    - ніколи не
  - sentence: Він ___ ходить у театр — раз на рік.
    answer: рідко
    options:
