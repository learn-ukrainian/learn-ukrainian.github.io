    - ніколи
    - рідко
    - зазвичай
- type: error-correction
  instruction: Знайдіть помилку і виправте (Find the error and correct it)
  items:
  - sentence: Він грає у піаніно.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - до
    explanation: 'Instruments use ''на'': грати на піаніно.'
  - sentence: Вона ходить на театр.
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - до
    explanation: 'Places of entertainment use ''в'': ходити в театр.'
  - sentence: Я граю на футбол.
    error: на
    correction: у
    error_type: word
    options:
    - у
    - в
    - до
    explanation: 'Sports use ''у'': грати у футбол.'
  - sentence: Ми ходимо в концерт.
    error: в
    correction: на
    error_type: word
    options:
    - на
    - у
    - до
    explanation: 'Events and performances use ''на'': ходити на концерт.'
  - sentence: Він грає у скрипці.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - до
    explanation: 'Instruments use ''на'': грати на скрипці.'
  - sentence: Вона ходить на музей.
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - до
    explanation: 'Places use ''в'': ходити в музей.'
