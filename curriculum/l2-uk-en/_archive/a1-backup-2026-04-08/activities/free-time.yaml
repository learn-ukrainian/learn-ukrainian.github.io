    - часто
    - завжди
    - іноді
  - sentence: Вона ___ грає на гітарі — тричі на тиждень.
    answer: часто
    options:
    - часто
    - іноді
    - рідко
    - завжди
  - sentence: Зазвичай я граю у волейбол, але ___ ходжу в театр.
    answer: іноді
    options:
    - іноді
    - завжди
    - ніколи не
    - рідко
  - sentence: Він ___ не дивиться фільми — він не любить кіно.
    answer: ніколи
    options:
    - ніколи
    - рідко
    - іноді
    - часто
  - sentence: Ми ___ граємо у баскетбол — двічі або тричі на тиждень.
    answer: часто
    options:
