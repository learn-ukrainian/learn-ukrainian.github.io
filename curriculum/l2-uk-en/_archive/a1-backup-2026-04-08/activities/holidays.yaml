version: '1.0'
module: holidays
level: a1
inline:
- id: quiz-holiday-dates
  type: quiz
  instruction: Коли це свято? (When is this holiday?)
  items:
  - question: Коли Різдво в Україні?
    options:
    - 25 грудня
    - 7 січня
    - 24 серпня
    correct: 0
  - question: Коли День Незалежності?
    options:
    - 24 серпня
    - 25 грудня
    - 1 січня
    correct: 0
  - question: Коли Новий рік?
    options:
    - 1 січня
    - 28 червня
    - 24 серпня
    correct: 0
  - question: Великдень — це яка пора року?
    options:
    - весна
    - зима
    - літо
    correct: 0
  - question: Коли Вишиванковий день?
    options:
    - травень
    - грудень
    - серпень
    correct: 0
  - question: Коли День Конституції?
    options:
    - 28 червня
    - 1 жовтня
    - 25 грудня
    correct: 0
  - question: Коли День захисників і захисниць?
    options:
    - 1 жовтня
    - 28 червня
    - 1 січня
    correct: 0
  - question: Скільки страв подають на Святвечір?
    options:
    - Дванадцять
    - Сім
    - П'ять
    correct: 0
- id: quiz-holiday-traditions
  type: quiz
  instruction: Яке свято? (Which holiday?)
  items:
  - question: Кутя, колядки, Свята вечеря — це традиції якого свята?
    options:
    - Різдво
    - Великдень
    - День Незалежності
    correct: 0
  - question: Писанка і паска — це символи якого свята?
    options:
    - Великдень
    - Різдво
    - Новий рік
    correct: 0
  - question: Парад, салют і прапор — це символи якого свята?
    options:
    - День Незалежності
    - Різдво
    - Великдень
    correct: 0
  - question: «Христос воскрес!» — це привітання якого свята?
    options:
    - Великдень
    - Різдво
    - Новий рік
    correct: 0
  - question: Вишиванка і синьо-жовтий прапор — символи якого свята?
    options:
    - День Незалежності
    - Великдень
    - Різдво
    correct: 0
  - question: Дванадцять пісних страв — традиція якого свята?
    options:
    - Різдво
    - Великдень
    - Новий рік
    correct: 0
  - question: «Слава Україні! Героям слава!» — привітання якого свята?
    options:
    - День Незалежності
    - Різдво
    - Великдень
    correct: 0
  - question: Освячений кошик із паскою несуть до церкви на якому святі?
    options:
    - Великдень
    - Різдво
    - Новий рік
    correct: 0
- id: group-sort-traditions
  type: group-sort
  instruction: Розподіліть за святами (Sort by holiday)
  groups:
  - label: Різдво
    items:
    - кутя
    - колядки
    - святвечір
    - Свята вечеря
    - колядники
    - дванадцять страв
  - label: Великдень
    items:
    - писанка
    - паска
    - кошик
    - Христос воскрес!
    - воістину воскрес!
    - весна
  - label: День Незалежності
    items:
    - парад
    - салют
    - вишиванка
    - прапор
    - Слава Україні!
    - концерт
- id: fill-in-greetings
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: З ___ Христовим!
    answer: Різдвом
    options:
    - Різдвом
    - Різдво
    - Різдва
  - sentence: З Новим ___!
    answer: роком
    options:
    - роком
    - рік
    - році
  - sentence: З Днем ___!
    answer: Незалежності
    options:
    - Незалежності
    - Незалежність
    - Незалежному
  - sentence: З ___ ! (Happy Easter)
    answer: Великоднем
    options:
    - Великоднем
    - Великдень
    - Великодня
  - sentence: Зі ___ ! (Happy holiday!)
    answer: святом
    options:
    - святом
    - свято
    - свята
  - sentence: З ___ народження!
    answer: днем
    options:
    - днем
    - день
    - дня
  - sentence: Христос ___!
    answer: воскрес
    options:
    - воскрес
    - воскресає
    - воскресив
  - sentence: Слава Україні! — ___ слава!
    answer: Героям
    options:
    - Героям
    - Героїв
    - Герої
workbook:
- type: match-up
  instruction: З'єднайте свято з датою (Match the holiday with its date)
  pairs:
  - left: Різдво
    right: 25 грудня
  - left: Новий рік
    right: 1 січня
  - left: День Незалежності
    right: 24 серпня
  - left: День Конституції
    right: 28 червня
  - left: День захисників і захисниць
    right: 1 жовтня
  - left: Вишиванковий день
    right: третій четвер травня
  - left: Великдень
    right: весна
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Різдво в Україні святкують 25 грудня.
    correct: true
    explanation: Так, з 2023 року офіційна дата Різдва — 25 грудня.
  - statement: Кутя — це м'ясна страва на Святвечір.
    correct: false
    explanation: 'Ні, кутя — пісна страва: пшениця з медом, маком і горіхами.'
  - statement: На Великдень говорять «З Великоднем Христовим!»
    correct: false
    explanation: Ні, на Великдень говорять «Христос воскрес!» — «Воістину воскрес!»
  - statement: Писанка — це розписане великоднє яйце.
    correct: true
    explanation: Так, писанка — унікальне українське народне мистецтво.
  - statement: День Незалежності — 24 серпня.
    correct: true
    explanation: Так, 24 серпня 1991 року Україна проголосила незалежність.
  - statement: На Вишиванковий день українці носять вишиванку.
    correct: true
    explanation: Так, вишиванка — символ української ідентичності та культури.
  - statement: «Слава Україні!» — це тільки святкова фраза.
    correct: false
    explanation: Ні, «Слава Україні!» використовують цілий рік — це офіційне військове
      привітання.
  - statement: На Святвечір традиційно подають тридцять страв.
    correct: false
    explanation: Ні, на Святвечір подають дванадцять страв — по одній за кожного апостола.
- type: quiz
  instruction: Дайте відповідь на запитання (Answer the question)
  items:
  - question: Як Олена і Том вітають одне одного в діалозі на Різдво?
    options:
    - З Різдвом Христовим!
    - Христос воскрес!
    - З Новим роком!
    correct: 0
  - question: Що Оксана і Марко роблять ввечері на День Незалежності?
    options:
    - Дивляться салют
    - Їдять кутю
    - Співають колядки
    correct: 0
  - question: Що означає слово «незалежність»?
    options:
    - Не залежати від іншої держави
    - Державне свято
    - Синьо-жовтий прапор
    correct: 0
  - question: Яка страва завжди перша на Свята вечеря?
    options:
    - Кутя
    - Паска
    - Борщ
    correct: 0
  - question: Що відповідають на «Христос воскрес!»?
    options:
    - Воістину воскрес!
    - Слава Україні!
    - З Різдвом!
    correct: 0
  - question: Де святкують День Незалежності вдень, згідно з діалогом?
    options:
    - На параді та концерті
    - Вдома з родиною
    - У церкві
    correct: 0
  - question: Хто такі «колядники»?
    options:
    - Люди, які ходять і співають колядки
    - Традиційна різдвяна страва
    - Різдвяний символ
    correct: 0
  - question: Що таке паска?
    options:
    - Великодній хліб
    - Різдвяна страва
    - Новорічна прикраса
    correct: 0
- type: error-correction
  instruction: Виправте привітання — неправильний відмінок (Correct the greeting —
    wrong case)
  items:
  - sentence: З Різдво Христовим!
    error: Різдво
    correction: Різдвом
    error_type: word
    options:
    - Різдвом
    - Різдва
    - Різдві
    explanation: 'Після «З» — орудний відмінок: Різдво → Різдвом.'
  - sentence: З Новий роком!
    error: Новий
    correction: Новим
    error_type: word
    options:
    - Новим
    - Нового
    - Нові
    explanation: 'Прикметник теж в орудному відмінку: новий → новим.'
  - sentence: З День Незалежності!
    error: День
    correction: Днем
    error_type: word
    options:
    - Днем
    - Дня
    - Дні
    explanation: 'Після «З» — орудний відмінок: день → днем.'
  - sentence: З Великдень!
    error: Великдень
    correction: Великоднем
    error_type: word
    options:
    - Великоднем
    - Великодня
    - Великодні
    explanation: 'Після «З» — орудний відмінок: Великдень → Великоднем.'
  - sentence: Зі свято!
    error: свято
    correction: святом
    error_type: word
    options:
    - святом
    - свята
    - святі
    explanation: 'Після «Зі» — орудний відмінок: свято → святом.'
  - sentence: З день народження!
    error: день
    correction: днем
    error_type: word
    options:
    - днем
    - дня
    - дні
    explanation: 'Після «З» — орудний відмінок: день → днем.'
