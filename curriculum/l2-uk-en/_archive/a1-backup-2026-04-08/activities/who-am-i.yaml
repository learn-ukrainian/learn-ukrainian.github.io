workbook:
- type: group-sort
  instruction: 'Sort each sentence into the correct column: Informal (using ти/тебе)
    or Formal (using ви/вас).'
  groups:
  - label: Informal (ти / тебе)
    items:
    - Як тебе звати?
    - Звідки ти?
    - Ти з України?
    - А тебе?
    - Ти — студент?
    - Ти з Канади?
  - label: Formal (ви / вас)
    items:
    - Як вас звати?
    - Звідки ви?
    - Ви з України?
    - А вас?
    - Ви — студент?
    - Ви з Канади?
- type: true-false
  instruction: True or false? Read each statement about Ukrainian and decide.
  items:
  - statement: '**Це** changes its form depending on whether you point at a man or
      a woman.'
    correct: false
    explanation: '**Це** never changes. It means ''this is,'' ''it is,'' and ''these
      are'' — all in one fixed form.'
  - statement: '**Вас** is the formal way to say ''you'' in Ukrainian.'
    correct: true
    explanation: '**Вас** is used with strangers, elders, and in professional situations.
      **Тебе** is informal.'
  - statement: In Ukrainian, you must include the verb 'to be' in sentences like **Я
      — студент**.
    correct: false
    explanation: Ukrainian omits 'to be' in the present tense. The dash (—) marks
      where it would appear in English.
  - statement: '**Дуже приємно!** is a greeting you say when you first see someone.'
    correct: false
    explanation: '**Дуже приємно!** is a reaction said *after* exchanging names —
      not a general greeting like Привіт!'
  - statement: '**Звідки** means ''where from'' in Ukrainian.'
    correct: true
    explanation: '**Звідки ти?** = ''Where are you from?'' The answer follows the
      pattern **Я з** + country name.'
  - statement: Both **мене звати** and **мене звуть** are correct Ukrainian.
    correct: true
    explanation: Both forms are standard Ukrainian. This curriculum teaches **мене
      звати** as the primary A1 form.
- type: quiz
  instruction: Choose the correct Ukrainian sentence or word.
  items:
  - question: How do you say 'I am a teacher' in Ukrainian?
    options:
    - Я — вчитель.
    - Я є вчитель.
    - Я маю вчитель.
    - Мене вчитель.
    correct: 0
  - question: A woman introduces herself. Which sentence is correct?
    options:
    - Мені звати Марта.
    - Мене звати Марта.
    - Я звати Марта.
    - Він звати Марта.
    correct: 1
  - question: Which pronoun addresses one person politely?
    options:
    - ти
    - ви
    - він
    - вона
    correct: 1
  - question: How do you say 'I am from Ukraine'?
    options:
    - Я в Україні.
    - Я з України.
    - Я Україна.
    - Я до України.
    correct: 1
  - question: You want to ask 'What is this?' What do you say?
    options:
    - Хто це?
    - Що це?
    - Це що?
    - Як це?
    correct: 1
  - question: Which word means 'they' in Ukrainian?
    options:
    - ми
    - ви
    - вони
    - він
    correct: 2
