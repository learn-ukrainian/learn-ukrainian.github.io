version: '1.0'
module: who-am-i
level: a1
inline:
- id: fill-in-self-intro
  type: fill-in
  instruction: Complete each sentence with the correct word.
  items:
  - sentence: _____ звати Марко.
    answer: Мене
    options:
    - Мене
    - Мені
    - Я
    - Він
  - sentence: Я _____ України.
    answer: з
    options:
    - з
    - у
    - до
    - від
  - sentence: Мені _____! (response to 'Дуже приємно!')
    answer: також
    options:
    - також
    - приємно
    - звати
    - добре
  - sentence: Як _____ звати? (asking a friend)
    answer: тебе
    options:
    - тебе
    - вас
    - його
    - її
  - sentence: Як _____ звати? (asking a professor)
    answer: вас
    options:
    - тебе
    - вас
    - його
    - її
  - sentence: Це Марія. Вона — _____. (female doctor)
    answer: лікарка
    options:
    - лікарка
    - лікар
    - студент
    - вчитель
- id: quiz-formal-informal
  type: quiz
  instruction: Choose the correct phrase for each situation.
  items:
  - question: Your classmate says hello. How do you ask their name?
    options:
    - Як тебе звати?
    - Як вас звати?
    - Як його звати?
    correct: 0
  - question: You meet your teacher for the first time. Which question do you ask?
    options:
    - Як тебе звати?
    - Як вас звати?
    - Як її звати?
    correct: 1
  - question: Someone is talking about a male friend who is not there. Which question
      asks his name?
    options:
    - Як тебе звати?
    - Як вас звати?
    - Як його звати?
    correct: 2
  - question: Someone is talking about a female colleague who is not there. Which
      question asks her name?
    options:
    - Як тебе звати?
    - Як її звати?
    - Як вас звати?
    correct: 1
  - question: After you and a new acquaintance exchange names, what do you say?
    options:
    - Звідки ти?
    - Дуже приємно!
    - Як вас звати?
    correct: 1
  - question: Which phrase correctly says 'My name is Іван'?
    options:
    - Мені звати Іван.
    - Мене звати Іван.
    - Він звати Іван.
    correct: 1
- id: match-question-words
  type: match-up
  instruction: Match each Ukrainian phrase to its correct meaning or use.
  pairs:
  - left: Хто це?
    right: Use for people and animals
  - left: Що це?
    right: Use for things, places, and concepts
  - left: Як тебе звати?
    right: Asking a friend's name (informal)
  - left: Як вас звати?
    right: Asking a stranger's or elder's name (formal)
  - left: Звідки ти?
    right: Asking where someone is from (informal)
  - left: Дуже приємно!
    right: Said after exchanging names
- id: match-professions
  type: match-up
  instruction: Match each male profession with its female form.
  pairs:
  - left: студент
    right: студентка
  - left: вчитель
    right: вчителька
  - left: лікар
    right: лікарка
  - left: програміст
    right: програмістка
  - left: інженер
    right: інженерка
  - left: журналіст
    right: журналістка
  - left: українець
    right: українка
  - left: канадієць
    right: канадка
