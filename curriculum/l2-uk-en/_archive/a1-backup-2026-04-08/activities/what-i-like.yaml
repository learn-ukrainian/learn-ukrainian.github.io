- id: quiz-structure-choice
  type: quiz
  instruction: 'Choose the correct structure. Remember: **Я люблю** = activity (verb),
    **Мені подобається** = thing or place (noun).'
  items:
  - question: ___ читати. (I like to read — activity)
    options:
    - Я люблю
    - Мені подобається
    - Я не люблю
    correct: 0
  - question: ___ ця книга. (I like this book — thing)
    options:
    - Мені подобається
    - Я люблю
    - Тобі подобається
    correct: 0
  - question: ___ гуляти в парку. (I like to walk — activity)
    options:
    - Я люблю
    - Мені подобається
    - Я не подобається
    correct: 0
  - question: ___ джаз. (I like jazz — thing)
    options:
    - Мені подобається
    - Я люблю
    - Я не люблю
    correct: 0
  - question: ___ цей фільм. (I like this film — thing)
    options:
    - Мені подобається
    - Я люблю
    - Тобі подобається
    correct: 0
  - question: ___ співати. (I like to sing — activity)
    options:
    - Я люблю
    - Мені подобається
    - Мені не подобається
    correct: 0
  - question: ___ класична музика. (I like classical music — thing)
    options:
    - Мені подобається
    - Я люблю
    - Я не люблю
    correct: 0
  - question: ___ малювати. (I like to draw — activity)
    options:
    - Я люблю
    - Мені подобається
    - Тобі подобається
    correct: 0
