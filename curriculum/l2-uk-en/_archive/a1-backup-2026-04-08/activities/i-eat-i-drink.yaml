workbook:
- type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова їсти (Match each
    pronoun to the correct form of їсти)
  pairs:
  - left: я
    right: їм
  - left: ти
    right: їси
  - left: він / вона
    right: їсть
  - left: ми
    right: їмо
  - left: ви
    right: їсте
  - left: вони
    right: їдять
- type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова пити (Match each
    pronoun to the correct form of пити)
  pairs:
  - left: я
    right: п'ю
  - left: ти
    right: п'єш
  - left: він / вона
    right: п'є
  - left: ми
    right: п'ємо
  - left: ви
    right: п'єте
  - left: вони
    right: п'ють
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the mistake)
  items:
  - sentence: Я п'ю кава.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - кавою
    - кави
    explanation: 'After п''ю the noun must be in the accusative case. Feminine nouns
      ending in -а change to -у: кава → каву.'
  - sentence: Він їсть рибі.
    error: рибі
    correction: рибу
    error_type: word
    options:
    - рибу
    - риби
    - рибою
    explanation: Accusative of риба (feminine -а) is рибу. Рибі is the dative case.
  - sentence: Ми п'ємо воді.
    error: воді
    correction: воду
    error_type: word
    options:
    - воду
    - води
    - водою
    explanation: Accusative of вода (feminine -а) is воду. Воді is the dative/locative
      case.
  - sentence: Вона їсть картопля.
    error: картопля
    correction: картоплю
    error_type: word
    options:
    - картоплю
    - картоплі
    - картоплею
    explanation: Accusative of картопля (feminine -я) is картоплю. The nominative
      form cannot follow їсть.
  - sentence: Вони п'ють кави.
    error: кави
    correction: каву
    error_type: word
    options:
    - каву
    - каво
    - кавою
    explanation: Accusative of кава is каву. Кави is the genitive case.
  - sentence: Я їм м'ясу.
    error: м'ясу
    correction: м'ясо
    error_type: word
    options:
    - м'ясо
    - м'яса
    - м'ясом
    explanation: М'ясо is a neuter noun — it does not change in the accusative case.
      М'ясу is the dative case.
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Олег їсть кашу на сніданок.
    correct: true
    explanation: 'Correct! Олег says: Я їм кашу і п''ю каву.'
  - statement: Олег п'є чай.
    correct: false
    explanation: 'No — Олег п''є каву. It is Олена who drinks tea: Вона їсть хліб
      з маслом і п''є чай.'
  - statement: Олена їсть яйця.
    correct: false
    explanation: 'No — Вона їсть хліб з маслом. The children eat eggs: Вони їдять
      яйця.'
  - statement: Діти п'ють молоко.
    correct: true
    explanation: Correct! Вони їдять яйця і п'ють молоко.
  - statement: Колеги їдять суп і салат на обід.
    correct: true
    explanation: Correct! Ми їмо суп і салат.
  - statement: Колеги п'ють каву на обід.
    correct: false
    explanation: No — Ми п'ємо воду або сік. Coffee was at breakfast.
