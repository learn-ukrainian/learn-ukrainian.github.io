workbook:
- type: group-sort
  instruction: Sort each verb form into the correct column based on which pronoun
    it belongs to.
  groups:
  - label: я  (ending -ю)
    items:
    - читаю
    - слухаю
    - гуляю
    - знаю
    - готую
    - працюю
  - label: ти  (ending -єш)
    items:
    - читаєш
    - слухаєш
    - гуляєш
    - знаєш
    - готуєш
    - працюєш
  - label: він/вона  (ending -є)
    items:
    - читає
    - слухає
    - гуляє
    - знає
    - готує
    - працює
- type: error-correction
  instruction: Each sentence has one wrong verb form. Find it and choose the correct
    one.
  items:
  - sentence: Я читаєш книгу.
    error: читаєш
    correction: читаю
    error_type: word
    options:
    - читаю
    - читає
    - читають
    explanation: '**Я** = first person singular → ending **-ю**: читаю. The ending
      **-єш** belongs to ти.'
  - sentence: Ти слухає музику.
    error: слухає
    correction: слухаєш
    error_type: word
    options:
    - слухаю
    - слухаєш
    - слухають
    explanation: '**Ти** = second person singular → ending **-єш**: слухаєш. The ending
      **-є** belongs to він/вона.'
  - sentence: Вона гуляю в парку.
    error: гуляю
    correction: гуляє
    error_type: word
    options:
    - гуляю
    - гуляєш
    - гуляє
    explanation: '**Вона** = third person singular → ending **-є**: гуляє. The ending
      **-ю** belongs to я.'
  - sentence: Я готуєш вечерю.
    error: готуєш
    correction: готую
    error_type: word
    options:
    - готую
    - готуєш
    - готує
    explanation: '**Я** = first person singular → ending **-ю**: готую. Note the stem
      shortening: готувати → готу-.'
  - sentence: Він вивчаю українську.
    error: вивчаю
    correction: вивчає
    error_type: word
    options:
    - вивчаю
    - вивчаєш
    - вивчає
    explanation: '**Він** = third person singular → ending **-є**: вивчає. The ending
      **-ю** belongs to я.'
  - sentence: Ти знаю цю пісню.
    error: знаю
    correction: знаєш
    error_type: word
    options:
    - знаю
    - знаєш
    - знає
    explanation: '**Ти** = second person singular → ending **-єш**: знаєш. The rule:
      **ти завжди -єш** for every Group I verb.'
- type: true-false
  instruction: True or false? Decide if each statement about Group I verbs is correct.
  items:
  - statement: The **ти** form of **читати** is **читаєш**.
    correct: true
    explanation: 'Correct! Every Group I verb takes **-єш** in the ти form: читаєш,
      слухаєш, гуляєш, знаєш...'
  - statement: The **я** form of **слухати** is **слухає**.
    correct: false
    explanation: 'No — **я** takes **-ю**: слухаю. The ending **-є** belongs to він/вона
      (third person singular).'
  - statement: The **він** form of **гуляти** ends in **-єш**.
    correct: false
    explanation: 'No — **він** takes **-є**: гуляє. The ending **-єш** belongs to
      ти (second person singular).'
  - statement: '**Готувати** is a Group I verb.'
    correct: true
    explanation: Yes! **Готувати** ends in **-увати**, one of the three Group I infinitive
      endings (-ати, -увати, -яти).
  - statement: The **ти** form of every Group I verb ends in **-єш**.
    correct: true
    explanation: 'Correct! This is the key rule: **ти завжди -єш**. Reading, listening,
      walking, cooking — the ти ending never changes in Group I.'
  - statement: '**Робити** is a Group I verb.'
    correct: false
    explanation: No — **робити** is Group II. Its ти form is **робиш** (with **-и-**,
      not **-є-**). You will learn Group II in M17.
- type: observe
  examples:
  - Я читаю → я слухаю → я гуляю → я знаю → я готую → я працюю
  - Ти читаєш → ти слухаєш → ти гуляєш → ти знаєш → ти готуєш → ти працюєш
  - Він читає → він слухає → він гуляє → він знає → він готує → він працює
  - Вона читає → вона слухає → вона гуляє → вона знає → вона готує → вона працює
  - 'Я готую / ти готуєш / він готує  — stem: готу- (not готува-)'
  - 'Я працюю / ти працюєш / він працює  — stem: працю- (not працюва-)'
  prompt: Look at all six rows. (1) What ending do ALL ти forms share? (2) What ending
    do ALL він/вона forms share? (3) For готувати and працювати, what happened to
    the -ва- before the endings? State the pattern in your own words.
