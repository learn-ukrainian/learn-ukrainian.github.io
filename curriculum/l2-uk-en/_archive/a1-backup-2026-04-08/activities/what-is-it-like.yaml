workbook:
- type: group-sort
  instruction: 'Sort these nouns into three groups by gender. Hint: masculine = він,
    feminine = вона, neuter = воно.'
  groups:
  - label: Masculine (він)
    items:
    - стіл
    - атлас
    - плакат
    - стілець
  - label: Feminine (вона)
    items:
    - кімната
    - книга
    - листівка
    - підлога
  - label: Neuter (воно)
    items:
    - вікно
    - ліжко
    - фото
- type: true-false
  instruction: Read the dialogues again. Are these statements true or false?
  items:
  - statement: Кімната Олі велика і світла.
    correct: true
    explanation: 'Оля каже: ''Моя кімната велика і світла.'''
  - statement: Стіл у Олі старий.
    correct: false
    explanation: 'Оля каже: ''Стіл новий.'' — The table is new, not old.'
  - statement: Ліжко у Олі нове.
    correct: false
    explanation: 'Оля каже: ''Воно старе.'' — The bed is old.'
  - statement: Вікно у Олі чисте і велике.
    correct: true
    explanation: 'Оля каже: ''Вікно чисте і велике.'''
  - statement: Атлас на ярмарку дешевий.
    correct: false
    explanation: 'Софія каже: ''він дорогий.'' — The atlas is expensive.'
  - statement: Книга на ярмарку нова і дешева.
    correct: true
    explanation: 'Софія каже: ''Нова і дешева.'''
  - statement: Листівка стара, але гарна.
    correct: true
    explanation: 'Софія каже: ''Стара, але гарна.'''
  - statement: Плакат маленький.
    correct: false
    explanation: 'Тарас каже: ''Великий і яскравий.'' — The poster is big.'
- type: error-correction
  instruction: Each sentence has a gender agreement error. Find the wrong adjective
    form and choose the correct one.
  items:
  - sentence: Книга новий.
    error: новий
    correction: нова
    error_type: word
    options:
    - новий
    - нова
    - нове
    explanation: 'книга is feminine — the adjective needs the feminine ending -а:
      нова'
  - sentence: Вікно великий.
    error: великий
    correction: велике
    error_type: word
    options:
    - великий
    - велика
    - велике
    explanation: 'вікно is neuter — the adjective needs the neuter ending -е: велике'
  - sentence: Стіл нова.
    error: нова
    correction: новий
    error_type: word
    options:
    - новий
    - нова
    - нове
    explanation: 'стіл is masculine — the adjective needs the masculine ending -ий:
      новий'
  - sentence: Кімната великий.
    error: великий
    correction: велика
    error_type: word
    options:
    - великий
    - велика
    - велике
    explanation: 'кімната is feminine — the adjective needs the feminine ending -а:
      велика'
  - sentence: Ліжко старий.
    error: старий
    correction: старе
    error_type: word
    options:
    - старий
    - стара
    - старе
    explanation: 'ліжко is neuter — the adjective needs the neuter ending -е: старе'
  - sentence: Атлас дорога.
    error: дорога
    correction: дорогий
    error_type: word
    options:
    - дорогий
    - дорога
    - дороге
    explanation: 'атлас is masculine — the adjective needs the masculine ending -ий:
      дорогий'
- type: observe
  examples:
  - Вікно велике **і** чисте. — both qualities are true (parallel)
  - Кімната світла **і** велика. — both qualities are true (parallel)
  - Стіл великий, **а** стілець маленький. — one is big, the other is small (contrast)
  - Книга нова, **а** атлас старий. — one is new, the other is old (contrast)
  - Стілець маленький, **але** зручний. — small, yet unexpectedly comfortable (concession)
  - Атлас дорогий, **а** книга дешева. — one is expensive, the other is cheap (contrast)
  prompt: Look at the bold connectors. When do you use **і** (and)? When do you use
    **а** or **але** (but)? What is the difference?
- type: translate
  instruction: Choose the correct Ukrainian translation. Watch the adjective endings!
  items:
  - source: The table is new.
    options:
    - text: Стіл новий.
      correct: true
    - text: Стіл нова.
      correct: false
    - text: Стіл нове.
      correct: false
  - source: The window is clean.
    options:
    - text: Вікно чистий.
      correct: false
    - text: Вікно чиста.
      correct: false
    - text: Вікно чисте.
      correct: true
  - source: The room is big and bright.
    options:
    - text: Кімната велика і світла.
      correct: true
    - text: Кімната великий і світлий.
      correct: false
    - text: Кімната велике і світле.
      correct: false
  - source: The book is new and cheap.
    options:
    - text: Книга новий і дешевий.
      correct: false
    - text: Книга нова і дешева.
      correct: true
    - text: Книга нове і дешеве.
      correct: false
  - source: The atlas is expensive.
    options:
    - text: Атлас дорогий.
      correct: true
    - text: Атлас дорога.
      correct: false
    - text: Атлас дороге.
      correct: false
  - source: The chair is small but comfortable.
    options:
    - text: Стілець маленька, але зручна.
      correct: false
    - text: Стілець маленьке, але зручне.
      correct: false
    - text: Стілець маленький, але зручний.
      correct: true
