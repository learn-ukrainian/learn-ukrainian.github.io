    - маленьке
  - sentence: Це _____ плакат.
    answer: дорогий
    options:
    - дорогий
    - дорога
    - дороге
  - sentence: Це _____ підлога.
    answer: брудна
    options:
    - брудний
    - брудна
    - брудне
  - sentence: Це _____ кімната.
    answer: темна
    options:
    - темний
