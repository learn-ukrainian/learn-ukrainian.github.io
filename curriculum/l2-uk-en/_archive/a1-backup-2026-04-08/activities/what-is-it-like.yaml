  - question: _____ твій стіл?
    options:
    - Який
    - Яка
    - Яке
    correct: 0
  - question: _____ твоє вікно?
    options:
    - Який
    - Яка
    - Яке
    correct: 2
  - question: _____ цей атлас?
    options:
    - Який
    - Яка
    - Яке
    correct: 0
  - question: _____ це фото?
    options:
    - Який
    - Яка
    - Яке
    correct: 2
  - question: _____ ця книга?
    options:
    - Який
    - Яка
    - Яке
