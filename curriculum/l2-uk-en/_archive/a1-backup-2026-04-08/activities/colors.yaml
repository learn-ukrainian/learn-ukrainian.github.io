- type: error-correction
  instruction: Find the gender agreement error. Choose the correct color form.
  items:
  - sentence: Це зелена вікно.
    error: зелена
    correction: зелене
    error_type: word
    options:
    - зелений
    - зелена
    - зелене
    explanation: '**Вікно** is neuter (n) — the adjective must end in **-е**: **зелене
      вікно**.'
  - sentence: Це білий книга.
    error: білий
    correction: біла
    error_type: word
    options:
    - білий
    - біла
    - біле
    explanation: '**Книга** is feminine (f) — the adjective must end in **-а**: **біла
      книга**.'
  - sentence: Це чорне стіл.
    error: чорне
    correction: чорний
    error_type: word
    options:
    - чорний
    - чорна
    - чорне
    explanation: '**Стіл** is masculine (m) — the adjective must end in **-ий**: **чорний
      стіл**.'
  - sentence: Це синій ваза.
    error: синій
    correction: синя
    error_type: word
    options:
    - синій
    - синя
    - синє
    explanation: '**Ваза** is feminine (f). **Синій** is soft-stem, so its feminine
      form is **синя** (soft **-я**, not hard **-а**).'
  - sentence: Це сірий пальто.
    error: сірий
    correction: сіре
    error_type: word
    options:
    - сірий
    - сіра
    - сіре
    explanation: '**Пальто** is neuter (n) — the adjective must end in **-е**: **сіре
      пальто**.'
  - sentence: Це рожевий троянда.
    error: рожевий
    correction: рожева
    error_type: word
    options:
    - рожевий
    - рожева
    - рожеве
    explanation: '**Троянда** is feminine (f) — the adjective must end in **-а**:
      **рожева троянда**.'
- type: true-false
  instruction: True or false? Read each statement about Ukrainian color adjectives.
  items:
  - statement: '**Синій** ends in **-ій** because it is a soft-stem adjective (м''яка
      група).'
    correct: true
    explanation: Correct! **Синій** is the only basic color with a soft stem. All
      other basic colors use the hard stem (тверда група) and end in **-ий**.
  - statement: '**Синій** and **блакитний** can always be used interchangeably.'
    correct: false
    explanation: No! **Синій** = dark, deep blue (sea, night sky, flag). **Блакитний**
      = light, sky blue. Native speakers notice the difference immediately.
  - statement: The Ukrainian flag is described as **синьо-жовтий**.
    correct: true
    explanation: 'Correct! The blue stripe is **синій** (deep blue) and the yellow
      stripe is **жовтий**. The compound adjective is hyphenated: **синьо-жовтий прапор**.'
  - statement: For a feminine noun, you add **-е** to the color adjective stem.
    correct: false
    explanation: 'No! Feminine nouns take **-а** (hard stem): **червона книга**. The
      ending **-е** is for neuter nouns: **червоне вікно**.'
  - statement: '**Помаранчевий**, **коричневий**, and **фіолетовий** all belong to
      the тверда група.'
    correct: true
    explanation: Correct! All three end in **-ий** — they are hard-stem adjectives
      (тверда група).
  - statement: In modern standard Ukrainian, **голубий** is preferred over **блакитний**.
    correct: false
    explanation: No! **Блакитний** is the standard modern choice. **Голубий** appears
      in older texts but **блакитний** is the recommended form today.
