version: '1.0'
module: colors
level: a1
inline:
- id: fill-in-gender-agreement
  type: fill-in
  instruction: Choose the correct color form to match the noun's gender. (**Виберіть
    правильну форму кольору**.)
  items:
  - sentence: Це ___ олівець. (red pencil)
    answer: червоний
    options:
    - червоний
    - червона
    - червоне
  - sentence: Це ___ книга. (red book)
    answer: червона
    options:
    - червоний
    - червона
    - червоне
  - sentence: Це ___ вікно. (white window)
    answer: біле
    options:
    - білий
    - біла
    - біле
  - sentence: Це ___ сукня. (black dress)
    answer: чорна
    options:
    - чорний
    - чорна
    - чорне
  - sentence: Це ___ светр. (white sweater)
    answer: білий
    options:
    - білий
    - біла
    - біле
  - sentence: Це ___ пальто. (grey coat)
    answer: сіре
    options:
    - сірий
    - сіра
    - сіре
  - sentence: Це ___ ваза. (dark-blue vase)
    answer: синя
    options:
    - синій
    - синя
    - синє
  - sentence: Це ___ море. (dark-blue sea)
    answer: синє
    options:
    - синій
    - синя
    - синє
  - sentence: Це ___ стіл. (brown table)
    answer: коричневий
    options:
    - коричневий
    - коричнева
    - коричневе
  - sentence: Це ___ троянда. (pink rose)
    answer: рожева
    options:
    - рожевий
    - рожева
    - рожеве
- id: group-sort-hard-soft
  type: group-sort
  instruction: Sort each word into the correct adjective group. Hard-stem (**тверда
    група**) ends in **-ий**. The one soft-stem exception (**м'яка група**) ends in
    **-ій**.
  groups:
  - label: Тверда група (-ий)
    items:
    - червоний
    - жовтий
    - зелений
    - білий
    - чорний
    - сірий
    - коричневий
    - рожевий
  - label: М'яка група (-ій)
    items:
    - синій
    - синя
    - синє
    - сині
    - темно-синій
    - синьо-жовтий
