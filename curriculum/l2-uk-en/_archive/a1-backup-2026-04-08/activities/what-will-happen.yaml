- type: group-sort
  instruction: Розподіліть речення за часом (Sort sentences by tense)
  groups:
  - label: Майбутній час (Future)
    items:
    - Завтра я буду працювати.
    - Вона буде читати книжку.
    - Ми будемо гуляти в парку.
    - Вони будуть відпочивати.
    - Ти будеш готувати вечерю?
    - Ви будете дивитися футбол?
  - label: Не майбутній час (Past / Present)
    items:
    - Зараз я читаю.
    - Він гуляв у парку вчора.
    - Вона читала книжку.
    - Ми готуємо зараз.
    - Учора вони відпочивали.
    - Ти добре говориш.
