- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the mistake)
  items:
  - sentence: Котра зараз годину?
    error: годину
    correction: година
    error_type: word
    options:
    - година
    - години
    - годині
    explanation: 'After ''котра'', use nominative: ''Котра година?'' (What time is
      it?)'
  - sentence: Взимку дуже холодний.
    error: холодний
    correction: холодно
    error_type: word
    options:
    - холодно
    - холодна
    - холодне
    explanation: 'Weather uses impersonal adverbs: ''холодно'', not the adjective
      ''холодний''.'
  - sentence: Навесна тепло і сонячно.
    error: Навесна
    correction: Навесні
    error_type: word
    options:
    - Навесні
    - Навесно
    - На весні
    explanation: The correct form is 'навесні' — a fixed adverb meaning 'in spring'.
  - sentence: Зустріч в п'ятій годині.
    error: в п'ятій
    correction: о п'ятій
    error_type: phrase
    options:
    - о п'ятій
    - в п'ятій
    - на п'ятій
    explanation: 'Time expressions use ''о/об'' + locative: ''о п''ятій годині'' (at
      five o''clock).'
  - sentence: Я ніколи рідко ходжу в кіно.
    error: ніколи рідко
    correction: рідко
    error_type: phrase
    options:
    - рідко
    - ніколи
    - іноді
    explanation: Use only one frequency adverb. 'Ніколи рідко' is contradictory —
      choose one.
  - sentence: Спочатку нарешті я снідаю.
    error: Спочатку нарешті
    correction: Спочатку
    error_type: phrase
    options:
    - Спочатку
    - Нарешті
    - Потім
    explanation: '''Спочатку'' means ''first'' and ''нарешті'' means ''finally'' —
      they cannot both describe the same opening action.'
