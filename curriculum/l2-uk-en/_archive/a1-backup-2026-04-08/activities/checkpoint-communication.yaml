version: '1.0'
module: checkpoint-communication
level: a1
inline:
- id: activity-1
  type: true-false
  instruction: Правда чи ні? (True or false?) Read the statements about the reading
    dialogue.
  items:
  - statement: Олена телефонує Тарасу напередодні Різдва.
    correct: true
    explanation: Yes — 'Олена телефонує Тарасу напередодні Різдва' is the opening
      sentence of the reading.
  - statement: Тарас телефонує Олені першим.
    correct: false
    explanation: No — Olena calls Taras, not the other way around.
  - statement: Олена просить Тараса принести кутю.
    correct: true
    explanation: Yes — Олена says 'Принеси кутю, будь ласка!'
  - statement: Тарас не хоче прийти на свято.
    correct: false
    explanation: 'No — Тарас agrees: ''Добре, принесу!'''
  - statement: Тарас має гарні колядки.
    correct: true
    explanation: Yes — Тарас says 'І я маю дуже гарні колядки!'
  - statement: Олена знає, коли Тарас вільний.
    correct: false
    explanation: No — Олена says 'я не знаю, коли ти вільний.'
- id: activity-2
  type: fill-in
  instruction: Вставте правильну форму кличного відмінка (Fill in the correct vocative
    form)
  items:
  - sentence: _____, принеси воду, будь ласка!
    answer: Олено
    options:
    - Олена
    - Олено
    - Олені
  - sentence: _____, читай цей текст!
    answer: Тарасе
    options:
    - Тараса
    - Тарасу
    - Тарасе
  - sentence: _____, допоможіть нам!
    answer: Учителю
    options:
    - Учитель
    - Учителя
    - Учителю
  - sentence: _____, подивися сюди!
    answer: Мамо
    options:
    - Мама
    - Мамі
    - Мамо
  - sentence: _____, скажи мені правду!
    answer: Друже
    options:
    - Друг
    - Друга
    - Друже
  - sentence: _____, принеси колядки!
    answer: Андрію
    options:
    - Андрій
    - Андрія
    - Андрію
- id: activity-3
  type: quiz
  instruction: Оберіть правильне привітання (Choose the correct holiday greeting)
  items:
  - question: Як привітати з Різдвом? (How do you greet someone for Christmas?)
    options:
    - З Різдво!
    - З Різдвом!
    - З Різдві!
    - На Різдво!
    correct: 1
  - question: Як привітати з Великоднем? (How do you greet for Easter?)
    options:
    - З Великодень!
    - З Великодні!
    - З Великоднем!
    - На Великдень!
    correct: 2
  - question: Як привітати з Новим роком? (How do you greet for New Year?)
    options:
    - З Новий рік!
    - З Нового року!
    - З Новим роком!
    - На Новий рік!
    correct: 2
  - question: Як привітати з днем народження? (How do you greet for a birthday?)
    options:
    - З день народження!
    - З днем народження!
    - З днем народженні!
    - На день народження!
    correct: 1
  - question: Яке слово стоїть після 'З' у привітаннях? (What case follows 'З' in
      greetings?)
    options:
    - Називний (Nominative)
    - Родовий (Genitive)
    - Орудний (Instrumental)
    - Давальний (Dative)
    correct: 2
  - question: Яке правильне привітання? (Which greeting is correct?)
    options:
    - З ярмарок!
    - З ярмарку!
    - З ярмарком!
    - На ярмарку!
    correct: 2
- id: activity-4
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words by grammar category)
  groups:
  - label: Кличний відмінок (Vocative)
    items:
    - Олено
    - Тарасе
    - мамо
    - учителю
    - друже
    - Андрію
  - label: Наказовий спосіб (Imperative)
    items:
    - читай
    - пиши
    - принеси
    - постав
    - перевір
    - скажи
  - label: Сполучник (Conjunction)
    items:
    - і
    - а
    - але
    - бо
    - що
    - де
workbook:
- type: fill-in
  instruction: Вставте правильні форми кличного відмінка та наказового способу (Fill
    in the correct vocative and imperative forms)
  items:
  - sentence: _____ (Олена), _____ (читати) цей текст, будь ласка!
    answer: Олено, читай
    options:
    - Олено, читай
    - Олена, читати
    - Олені, читаєш
  - sentence: _____ (Тарас), _____ (принести) кутю!
    answer: Тарасе, принеси
    options:
    - Тарасе, принеси
    - Тараса, принести
    - Тарасу, принесе
  - sentence: _____ (мама), _____ (дати) мені книгу!
    answer: Мамо, дай
    options:
    - Мамо, дай
    - Мама, дає
    - Мамі, дати
  - sentence: _____ (Андрій), _____ (писати) своє ім'я!
    answer: Андрію, пиши
    options:
    - Андрію, пиши
    - Андрія, писати
    - Андрієві, пише
  - sentence: _____ (учитель), _____ (читати) вголос, будь ласка!
    answer: Учителю, читайте
    options:
    - Учителю, читайте
    - Учитель, читати
    - Учителя, читає
  - sentence: _____ (друг), _____ (дати) мені олівець!
    answer: Друже, дай
    options:
    - Друже, дай
    - Друга, дати
    - Другу, дає
  - sentence: _____ (Олена), _____ (писати) листа!
    answer: Олено, пиши
    options:
    - Олено, пиши
    - Олена, писати
    - Олені, пише
  - sentence: _____ (Тарас), _____ (принести) колядки!
    answer: Тарасе, принеси
    options:
    - Тарасе, принеси
    - Тараса, принести
    - Тарасові, принесе
