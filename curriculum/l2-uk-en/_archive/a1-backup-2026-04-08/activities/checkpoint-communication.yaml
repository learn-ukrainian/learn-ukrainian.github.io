- type: match-up
  instruction: З'єднайте свято з його формою орудного відмінка для привітань (Match
    each holiday to its instrumental form used in greetings)
  pairs:
  - left: Різдво
    right: Різдвом
  - left: Великдень
    right: Великоднем
  - left: Новий рік
    right: Новим роком
  - left: день народження
    right: днем народження
  - left: ярмарок
    right: ярмарком
  - left: свято
    right: святом
- type: error-correction
  instruction: Виправте помилку в реченні (Find and correct the error in the sentence)
  items:
  - sentence: Олено, принести воду, будь ласка!
    error: принести
    correction: принеси
    error_type: word
    options:
    - принеси
    - принесіть
    - приносить
    explanation: Use the imperative 'принеси' (ти-form), not the infinitive 'принести'.
  - sentence: Тарас, читай цей текст!
    error: Тарас
    correction: Тарасе
    error_type: word
    options:
    - Тарасе
    - Тараса
    - Тарасові
    explanation: 'When calling someone directly, use the vocative case: Тарас → Тарасе.'
  - sentence: Я хочу прийти, і я хворий.
    error: і
    correction: але
    error_type: word
    options:
    - але
    - бо
    - що
    explanation: '''Але'' expresses contradiction (but). ''І'' simply adds — it cannot
      express ''but I''m sick''.'
  - sentence: З Різдво!
    error: Різдво
    correction: Різдвом
    error_type: word
    options:
    - Різдвом
    - Різдва
    - Різдві
    explanation: '''З'' requires the instrumental case in holiday greetings: Різдво
      → Різдвом.'
  - sentence: Мама, дайте мені воду!
    error: дайте
    correction: дай
    error_type: word
    options:
    - дай
    - дати
    - дає
    explanation: Use 'дай' (ти-form, informal) when addressing мама. 'Дайте' is the
      formal/plural form.
  - sentence: Олена, пиши листа!
    error: Олена
    correction: Олено
    error_type: word
    options:
    - Олено
    - Олені
    - Олени
    explanation: 'Direct address requires the vocative case: Олена → Олено (-а → -о).'
