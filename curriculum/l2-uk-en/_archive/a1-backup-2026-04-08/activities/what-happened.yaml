workbook:
- type: group-sort
  instruction: Розподіліть форми дієслів за родом і числом (Sort the verb forms by
    gender and number)
  groups:
  - label: він (♂)
    items:
    - читав
    - гуляв
    - готував
    - говорив
    - робив
    - дивився
  - label: вона (♀)
    items:
    - читала
    - гуляла
    - готувала
    - говорила
    - робила
    - дивилася
  - label: вони (мн.)
    items:
    - читали
    - гуляли
    - готували
    - говорили
    - робили
    - дивилися
- type: error-correction
  instruction: Виправте помилку у формі дієслова (Correct the error in the verb form)
  items:
  - sentence: Оксана читав книжку учора.
    error: читав
    correction: читала
    error_type: word
    options:
    - читала
    - читали
    - читало
    explanation: 'Оксана is female → past tense ending -ла: читала'
  - sentence: Вони гуляла в парку в неділю.
    error: гуляла
    correction: гуляли
    error_type: word
    options:
    - гуляли
    - гуляв
    - гуляло
    explanation: 'Вони (plural) → past tense ending -ли: гуляли'
  - sentence: Іван готувала вечерю вдома.
    error: готувала
    correction: готував
    error_type: word
    options:
    - готував
    - готували
    - готувало
    explanation: 'Іван is male → past tense ending -в: готував'
  - sentence: Вона дивився фільм у суботу.
    error: дивився
    correction: дивилася
    error_type: word
    options:
    - дивилася
    - дивилися
    - дивилося
    explanation: 'Вона is female → reflexive verb past tense uses -лася: дивилася'
  - sentence: Ми говорив учора.
    error: говорив
    correction: говорили
    error_type: word
    options:
    - говорили
    - говорила
    - говорило
    explanation: 'Ми (we) is a plural subject → past tense ending -ли: говорили'
  - sentence: Марія і Тарас працювала разом.
    error: працювала
    correction: працювали
    error_type: word
    options:
    - працювали
    - працював
    - працювало
    explanation: 'Марія і Тарас = two people = plural subject → ending -ли: працювали'
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: У минулому часі дієслово змінюється за особами (я, ти, він).
    correct: false
    explanation: Ukrainian past tense marks gender (♂/♀/neuter), not person. Я читав
      = він читав — both masculine, same form.
  - statement: Форма «читав» використовується для чоловіків у минулому часі.
    correct: true
    explanation: 'Masculine past tense ending is -в: читав, гуляв, готував, говорив.'
  - statement: «Вони читали» і «вона читала» мають однакове закінчення.
    correct: false
    explanation: Вони takes -ли (читали); вона takes -ла (читала). They are different
      endings.
  - statement: Зворотні дієслова зберігають «-ся» після закінчення минулого часу.
    correct: true
    explanation: 'E.g.: він дивився, вона дивилася — the -ся particle stays after
      the gender suffix.'
  - statement: «Я читав» (чоловік) і «він читав» — це однакові форми.
    correct: true
    explanation: Past tense marks gender, not person. Both я and він are masculine,
      so both use -в.
  - statement: Форма вони у минулому часі завжди закінчується на «-ло».
    correct: false
    explanation: 'Вони always takes -ли: вони читали, гуляли, говорили. The ending
      -ло belongs to воно (neuter singular).'
