- type: observe
  examples:
  - Цей стіл — мій стіл — який стіл? → all masculine
  - Ця книга — моя книга — яка книга? → all feminine
  - Це вікно — моє вікно — яке вікно? → all neuter
  - Цей рюкзак (near) ↔ Той рюкзак (far) → same masculine form, different distance
  - Ця сумка (near) ↔ Та сумка (far) → same feminine form, different distance
  - Це крісло (near) ↔ Те крісло (far) → same neuter form, different distance
  prompt: What do цей/ця/це share with мій/моя/моє and який/яка/яке? And what is the
    only difference between цей and той, ця and та, це and те?
