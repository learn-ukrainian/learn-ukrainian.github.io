workbook:
- type: group-sort
  instruction: Sort the nouns into two groups by the form of 'this' they take.
  groups:
  - label: цей — masculine
    items:
    - рюкзак
    - стіл
    - стілець
    - телефон
    - олівець
    - ноутбук
  - label: ця або це — feminine or neuter
    items:
    - сумка
    - камера
    - ручка
    - книга
    - крісло
    - вікно
- type: error-correction
  instruction: Find the wrong demonstrative and choose the correct one.
  items:
  - sentence: Цей книга нова.
    error: Цей
    correction: Ця
    error_type: word
    options:
    - Цей
    - Ця
    - Це
    explanation: книга is feminine — it needs ця, not masculine цей. Same logic as
      моя книга and яка книга.
  - sentence: Це стіл великий.
    error: Це
    correction: Цей
    error_type: word
    options:
    - Це
    - Цей
    - Ця
    explanation: стіл is masculine — when describing it with an adjective (великий),
      use цей. (Це стіл = 'This is a table' is a separate introductory construction
      with no adjective.)
  - sentence: Той крісло зручне.
    error: Той
    correction: Те
    error_type: word
    options:
    - Той
    - Та
    - Те
    explanation: крісло is neuter — the correct far form is те. Той is masculine only.
  - sentence: Та рюкзак синій.
    error: Та
    correction: Той
    error_type: word
    options:
    - Та
    - Той
    - Те
    explanation: рюкзак is masculine — use той (far) or цей (near), not feminine та.
  - sentence: Ця вікно велике.
    error: Ця
    correction: Це
    error_type: word
    options:
    - Ця
    - Це
    - Цей
    explanation: вікно is neuter — it needs це, not feminine ця.
  - sentence: Те телефон дорогий.
    error: Те
    correction: Той
    error_type: word
    options:
    - Те
    - Той
    - Та
    explanation: телефон is masculine — use той (far) or цей (near), not neuter те.
- type: true-false
  instruction: True or false? Check each statement about Ukrainian demonstratives.
  items:
  - statement: Цей is correct before masculine nouns like стіл and телефон.
    correct: true
    explanation: Yes — цей matches masculine nouns, just like мій and який.
  - statement: Ця вікно велике is correct Ukrainian for 'this window is big'.
    correct: false
    explanation: Wrong — вікно is neuter, so the correct form is Це вікно велике.
  - statement: The word та can mean both 'that (feminine)' and 'and'.
    correct: true
    explanation: Та книга = 'that book' (demonstrative before a noun). Ірина та Максим
      = 'Iryna and Maksym' (conjunction linking two names).
  - statement: Той and цей both agree with masculine nouns — the only difference is
      distance.
    correct: true
    explanation: Correct — цей рюкзак = this backpack (near you), той рюкзак = that
      backpack (over there). Same masculine form, different near/far meaning.
  - statement: Це крісло зручне means 'That armchair is comfortable.'
    correct: false
    explanation: No — це means 'this' (near). 'That armchair is comfortable' = Те
      крісло зручне.
  - statement: The gender endings of цей/ця/це are the same pattern as мій/моя/моє
      and який/яка/яке.
    correct: true
    explanation: Exactly — one pattern, three sets of words. Learn the pattern once
      and it works for possessives, question words, and demonstratives.
