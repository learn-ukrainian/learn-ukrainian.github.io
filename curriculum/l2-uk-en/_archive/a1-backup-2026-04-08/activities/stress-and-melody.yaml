workbook:
- type: group-sort
  instruction: Sort these words into two groups based on where the stress falls. Listen
    for which syllable sounds louder and longer.
  groups:
  - label: First-syllable stress (МА-ма pattern)
    items:
    - ранок
    - кава
    - мама
    - тато
    - книга
  - label: Last-syllable stress (во-ДА pattern)
    items:
    - вода
    - зима
    - метро
    - кафе
    - молоко
- type: true-false
  instruction: True or false? Read each statement about Ukrainian stress and intonation.
  items:
  - statement: In Ukrainian, stress always falls on the last syllable — just like
      in French.
    correct: false
    explanation: 'Ukrainian stress is FREE — it can fall on ANY syllable. Compare:
      МА-ма (first syllable) vs во-ДА (last syllable). There is no shortcut rule.'
  - statement: The word 'замок' can mean two completely different things depending
      on where the stress falls.
    correct: true
    explanation: ЗАмок = castle (stress on the first syllable). замОк = lock (stress
      on the second syllable). Same five letters, entirely different objects.
  - statement: For a yes/no question with no question word (like 'Це кава?'), your
      voice should rise ↗.
    correct: true
    explanation: 'Without a question word, rising intonation signals that you are
      asking. Example: Це ка-ВА? ↗ — your voice goes up on the stressed syllable of
      кава.'
  - statement: When a sentence has a question word like 'де' or 'хто', your voice
      should rise at the end.
    correct: false
    explanation: 'Question words carry the interrogative meaning themselves — your
      voice FALLS ↘. Example: Де метро? ↘ — ''де'' already tells the listener you
      are asking about location.'
  - statement: An exclamation mark (!) always means your voice rises sharply.
    correct: false
    explanation: 'Exclamations use a strong FALLING voice ↘↘ — dropping with extra
      force and emotion. Example: Як гарно! ↘↘'
  - statement: The word 'мука' with stress on the first syllable (МУка) means flour.
    correct: false
    explanation: МУка (first syllable) = torment or suffering. мукА (last syllable)
      = flour. Wrong stress gives the completely wrong word.
  - statement: In everyday Ukrainian text — newspapers, messages, novels — stress
      marks are usually written over every word.
    correct: false
    explanation: Stress marks appear only in textbooks and learning materials. Native
      speakers do not write them in everyday text — they already know where stress
      falls. As a learner, YOU write stress marks in your notes.
  - statement: The word 'фотографія' has its stress on the third syllable.
    correct: true
    explanation: 'фо-то-ГРА-фі-я — stress falls on ГРА, the third syllable. Slow reading
      helps: фо... то... ГРА... фі... я. Then together: фотоГРАфія.'
- type: quiz
  instruction: Odd one out — which word has a DIFFERENT stress pattern from the other
    three?
  items:
  - question: Three of these words have first-syllable stress. Which one is different?
    options:
    - мама
    - кава
    - ранок
    - вода
    correct: 3
  - question: Three of these words have last-syllable stress. Which one is different?
    options:
    - молоко
    - зима
    - метро
    - книга
    correct: 3
  - question: Which word has stress on the LAST syllable?
    options:
    - ранок
    - кава
    - тато
    - вода
    correct: 3
  - question: Which word has stress on the FIRST syllable?
    options:
    - молоко
