  - question: What does 'АТлас' (stress on the first syllable) mean?
    options:
    - satin fabric
    - atlas — a collection of maps
    - castle
    - suffering
    correct: 1
- type: match-up
  instruction: Match each intonation pattern to what it signals in Ukrainian speech.
  pairs:
  - left: Voice falls ↘ at the end (period)
    right: Statement — you are telling someone something
  - left: Voice rises ↗ at the end (question mark, no question word)
    right: Yes/no question — asking for confirmation
  - left: Voice falls ↘ at the end (question mark, WITH a question word)
    right: Information question — де/хто/що does the work
  - left: Strong falling voice ↘↘ (exclamation mark)
    right: Exclamation — high emotion, surprise, or delight
  - left: Це кава. ↘
    right: Calm statement — this is coffee
  - left: Це кава? ↗
    right: Confirmation question — is this coffee?
  - left: Як гарно! ↘↘
    right: Emotional exclamation — how beautiful!
  - left: Де метро? ↘
    right: Direction question — 'де' signals asking about location
- type: observe
  examples:
  - ЗАмок (castle) ↔ замОк (lock)
  - МУка (torment) ↔ мукА (flour)
  - АТлас (atlas/maps) ↔ атлАС (satin fabric)
  - МАма — stress stays on the first syllable
  - воДА — stress stays on the last syllable
  - фотоГРАфія — stress stays on the third syllable
  prompt: Look at the first three pairs. What happens to the MEANING of a Ukrainian
    word when you move the stress to a different syllable? Now look at the last three
    examples — what does this tell you about learning new Ukrainian words?
