workbook:
- type: match-up
  instruction: Match each singular noun to its plural form.
  pairs:
  - left: стіл
    right: столи
  - left: книга
    right: книги
  - left: вікно
    right: вікна
  - left: стілець
    right: стільці
  - left: зошит
    right: зошити
  - left: дзеркало
    right: дзеркала
- type: observe
  examples:
  - великий стіл → великі столи
  - велика книга → великі книги
  - велике вікно → великі вікна
  - старий олівець → старі олівці
  - стара сумка → старі сумки
  - старе крісло → старі крісла
  prompt: 'In singular, adjectives change ending by gender: -ий (m), -а (f), -е (n).
    What happens in the plural? How many different endings are there for plural adjectives?'
- type: true-false
  instruction: Read each statement. Is it true (правда) or false (неправда)?
  items:
  - statement: Столи у класі великі й нові.
    correct: true
    explanation: 'Олена confirms: ''Столи великі й нові.'''
  - statement: Стільці у класі нові.
    correct: false
    explanation: 'Олена says the chairs are old: ''стільці — старі''.'
  - statement: Вікна у класі чисті.
    correct: true
    explanation: 'Олена confirms: ''Вікна чисті.'''
  - statement: Plural adjectives in Ukrainian always end in -і.
    correct: true
    explanation: 'All three genders share one plural ending: великі, нові, старі,
      чисті.'
  - statement: The plural of 'вікно' is 'вікні'.
    correct: false
    explanation: 'Neuter nouns take -а in the plural: вікно → вікна.'
  - statement: The plural of 'стілець' is 'стільці'.
    correct: true
    explanation: 'Soft-stem masculine nouns take -і: стілець → стільці.'
  - statement: '''Ці'' means ''those'' in Ukrainian.'
    correct: false
    explanation: '''Ці'' means ''these''. ''Ті'' means ''those''.'
  - statement: The plural of 'ручка' is 'ручки'.
    correct: true
    explanation: 'Feminine nouns ending in -ка take -и in the plural: ручка → ручки.'
- type: error-correction
  instruction: Find the error in each sentence and correct it.
  items:
  - sentence: Ці столи великий.
    error: великий
    correction: великі
    error_type: word
    options:
    - великі
    - велика
    - великого
    explanation: Plural adjectives always end in -і. 'Великий' is masculine singular.
  - sentence: Мої ручки синя.
    error: синя
    correction: сині
    error_type: word
    options:
    - сині
    - синій
    - синього
    explanation: Plural adjectives always end in -і. 'Синя' is feminine singular.
  - sentence: Ті вікна чисте.
    error: чисте
    correction: чисті
    error_type: word
    options:
    - чисті
    - чистий
    - чистого
    explanation: Plural adjectives always end in -і. 'Чисте' is neuter singular.
  - sentence: Ці стільці старий.
    error: старий
    correction: старі
    error_type: word
    options:
    - старі
    - стара
    - старого
    explanation: Plural adjectives always end in -і. 'Старий' is masculine singular.
  - sentence: Мої зошити новий.
    error: новий
    correction: нові
    error_type: word
    options:
    - нові
    - нова
    - нового
    explanation: Plural adjectives always end in -і. 'Новий' is masculine singular.
  - sentence: Ці книги червона.
    error: червона
    correction: червоні
    error_type: word
    options:
    - червоні
    - червоний
    - червоного
    explanation: Plural adjectives always end in -і. 'Червона' is feminine singular.
- type: translate
  instruction: Choose the correct Ukrainian translation.
  items:
  - source: These tables are big.
    options:
    - text: Ці столи великі.
      correct: true
