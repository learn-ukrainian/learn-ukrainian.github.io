workbook:
- type: match-up
  instruction: З'єднайте інфінітив з формою для 'ти' (Match the infinitive to its
    ти-imperative)
  pairs:
  - left: читати
    right: читай
  - left: писати
    right: пиши
  - left: слухати
    right: слухай
  - left: дивитися
    right: дивись
  - left: говорити
    right: говори
  - left: іти
    right: іди
  - left: дати
    right: дай
  - left: сказати
    right: скажи
- type: match-up
  instruction: З'єднайте ти-форму з ви-формою (Match each ти-form to its ви-form)
  pairs:
  - left: читай
    right: читайте
  - left: пиши
    right: пишіть
  - left: слухай
    right: слухайте
  - left: дивись
    right: дивіться
  - left: говори
    right: говоріть
  - left: іди
    right: ідіть
  - left: дай
    right: дайте
  - left: скажи
    right: скажіть
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Вчителька у діалозі використовує ви-форми, бо говорить до всього класу.
      (The teacher uses ви-forms because she speaks to the whole class.)
    correct: true
    explanation: 'Correct: відкрийте, читайте, пишіть — all ви-forms for a group.'
  - statement: Олесь використав ти-форму, коли говорив до офіціанта. (Oles used the
      ти-form when speaking to the waiter.)
    correct: false
    explanation: No — he said принесіть (ви-form). The waiter is a stranger.
  - statement: Будь ласка перетворює команду на ввічливе прохання. (Будь ласка turns
      a command into a polite request.)
    correct: true
    explanation: 'Correct: дай → дай, будь ласка; дайте → дайте, будь ласка.'
  - statement: Ти-форма 'читай' закінчується на '-іть'. (The ти-form читай ends in
      -іть.)
    correct: false
    explanation: No — читай ends in -й. The -іть ending belongs to consonant-stem
      ви-forms like пишіть.
  - statement: 'Дієслово ''дати'' — нерегулярне: форма ''дай'' не утворюється за стандартним
      правилом. (The verb дати is irregular: дай does not follow the standard rule.)'
    correct: true
    explanation: 'Correct: дати → дай / дайте must be memorized as irregular.'
  - statement: До групи людей завжди вживаємо ти-форму. (We always use the ти-form
      for a group of people.)
    correct: false
    explanation: 'No — to a group we always use the ви-form: Діти, сідайте! Учні,
      читайте!'
- type: error-correction
  instruction: Виправте помилкову форму наказового способу (Correct the wrong imperative
    form)
  items:
  - sentence: Вчителю, читай текст, будь ласка!
    error: читай
    correction: читайте
    error_type: word
    options:
    - читайте
    - читати
    - читають
    explanation: 'Addressing a teacher requires the formal ви-form: читайте.'
  - sentence: Оленко, дайте мені підручник!
    error: дайте
    correction: дай
    error_type: word
    options:
    - дай
    - дати
    - даєш
    explanation: 'Olenka is a friend — use the informal ти-form: дай.'
  - sentence: Пане Іване, скажи адресу, будь ласка!
    error: скажи
    correction: скажіть
    error_type: word
    options:
    - скажіть
    - сказати
    - скажемо
    explanation: 'Пане Іване is a formal address — use the ви-form: скажіть.'
  - sentence: Діти, слухай уважно!
    error: слухай
    correction: слухайте
    error_type: word
    options:
    - слухайте
    - слухати
    - слухають
    explanation: Діти is a group — the ви-form слухайте is required.
  - sentence: Друже, говоріть повільно!
    error: говоріть
    correction: говори
    error_type: word
    options:
    - говори
    - говорити
    - говорять
    explanation: 'Друже (friend) is informal — use the ти-form: говори.'
  - sentence: Маринко, відкрийте підручник!
    error: відкрийте
    correction: відкрий
    error_type: word
    options:
    - відкрий
    - відкрити
    - відкриває
    explanation: 'Маринка is addressed informally — use the ти-form: відкрий.'
