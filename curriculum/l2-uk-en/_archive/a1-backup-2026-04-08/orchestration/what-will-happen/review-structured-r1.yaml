findings:
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: Fortune teller dialogue — "Будеш щаслива! *(You will be happy!)*"
  issue: Gender agreement mismatch. The speaker label is "Клієнт" (masculine noun),
    but the predicate adjective is "щаслива" (feminine). Either the label or the adjective
    must change. The plan specifies "Будеш щасливий/щаслива!" showing both forms.
  fix: Change to "щасливий" to match "Клієнт" (m), and add a parenthetical note showing
    the feminine alternative, matching the plan's intent to demonstrate gender agreement
    with буду + adjective.
- dimension: PEDAGOGICAL QUALITY
  severity: CRITICAL
  location: After dialogue 2 — "*Every person of **буду** appears in this dialogue
    — **буду**, **будеш**, **буде**, **будемо**, **будете**. Did you catch them all?*"
  issue: Claims "every person" but lists only 5 of 6 forms. The 3rd person plural
    "будуть" is missing from the dialogue and from the list. An A1 learner trusting
    this statement will believe there are only 5 future forms of бути. This directly
    contradicts the conjugation table presented later, which correctly shows 6 forms.
  fix: Add a dialogue exchange using "будуть" to dialogue 2 and include it in the
    list.
- dimension: PEDAGOGICAL QUALITY
  severity: MINOR
  location: :::note block — "The Litvinova Grade 7 textbook confirms both forms are
    equivalent."
  issue: RAG search of Litvinova Grade 7 (chunk 7-klas-ukrmova-litvinova-2024_s0054/s0055)
    shows the textbook presents both future forms but does not use the word "equivalent."
    The attribution is an extrapolation. This reference is also not listed in the
    plan's references.
  fix: Replace with a general attribution to Ukrainian textbooks.
- dimension: VOCABULARY COVERAGE
  severity: MINOR
  location: Dialogue 3 (Оксана/Тарас)
  issue: Plan's dialogue 2 script included "Звучить добре!" which would introduce
    the recommended vocab word "звучати." The module replaced this with "Чудово!"
    — a fine word but misses the vocab opportunity.
  fix: Not fixing — "Чудово!" is natural and "звучати" is only recommended, not required.
    Informational only.
