  text: 'У 1851 р. Марія одружилася з О. Марковичем і виїхала в Україну,

    де, досліджуючи разом із чоловіком фольклор, вивчила українську

    мову, яку чула з дитинства у своєму домі (її мати любила народні

    пісні й часто їх співала). Студіюючи фольклор в українських селах,

    Марія засвоювала народні звичаї, обряди, побут. Страждання укра-

    їнських селян стали її власними, майбутня письменниця усвідом-

    лювала, що треба якось протидіяти рабству в закріпаченій Україні. Вона почала
    писати твори. Літературна діяльніс'
