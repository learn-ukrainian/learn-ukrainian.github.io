  text: "Липинський висуває державницьку концепцію\r\nукраїнського консерватизму,\
    \ орієнтовану на монархію та «класократію», владу\r\nхліборобськоорганізаторської\
    \ еліти, сформованої у військових змаганнях. Як\r\nмислитель-державник, Липинський,\
    \ етнічний поляк за походженням і римо-католик\r\nза конфесією, визначає себе\
    \ як політичного українця і дає таке визначення\r\nукраїнства: «Українським єсть\
    \ і повинно бути все, що осіло (а не кочує!) на\r\nнашій землі і що тим самим\
    \ стало частиною України, без огляду на його пле"
