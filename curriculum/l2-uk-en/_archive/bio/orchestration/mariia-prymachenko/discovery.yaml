  text: "154\nчекало перше замовлення. За розмальовку хати сусідів Марія \nотримала\
    \ винагороду — порося. Згодом саме це порося \nдопомогло усій її сім’ї вижити\
    \ в голодні часи.\nІще трохи фактів\nМарія Приймаченко ніколи не брала грошей\
    \ за картини — \nвона їх лише дарувала. Щоб заробити грошей, вона шила \nвесільні\
    \ сукні всій окрузі.\nМисткиня однаково вправно малювала обома руками.\nМарія\
