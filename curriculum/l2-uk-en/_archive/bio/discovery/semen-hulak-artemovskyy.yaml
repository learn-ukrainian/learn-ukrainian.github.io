  text: "У повісті «Художник» згадано оперні вистави\r\n«Роберт-диявол» Д. Мейєрбера\
    \ і «Фенелла» Д. Обера, гастролі М. Тальоні. Для\r\nформування й розвитку театрально-естетичних\
    \ поглядів Шевченка в перший петерб.\r\nперіод його життя велике значення мало\
    \ спілкування з відомими діячами рос. і\r\nукр. культури, що з ними поет зустрічався\
    \ на муз.-літ. вечорах. Ближчому\r\nзнайомству поета з театром сприяла, зокрема,\
    \ його особиста дружба з С. Гулаком-Артемовським,\r\nз яким він познайомився восени\
    \ 1838, а зблизився 184"
