- score: 0.5171838998794556
  chunk_id: 955b1bc8_c0256
  text: "Гулак-Артемовський Семен Степанович (1813 — 1873) — український композитор\
    \ та оперний співак.\r\nАвтор першої української опери «Запорожець за Дунаєм»\
    \ (1862). Один з найближчих\r\nдрузів Шевченка. Познайомився з ним у Петербурзі\
    \ 1838 p., листувався з поетом,\r\nприсвятив йому пісню «Стоїть явір над водою»,\
    \ допомагав у роки заслання\r\nматеріально.\n\n[Спогади про Тараса Шевченка. —\
    \ К.: Дніпро, 1982. — С. 119-121.]\n\nП. О. Куліш\n\nЖИЗНЬ КУЛІША\n\n(Уривки)"
  work: Спогади про Шевченка (1982)
