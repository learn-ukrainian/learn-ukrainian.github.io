  text: "ГУЛАК-АРТЕМОВСЬКИЙ (справж.\r\nпрізв. — Артемовський) Семен Степанович [4(16).II\
    \ 1813, містечко Городище,\r\nтепер місто Черкас. обл. — 5(17). IV 1873, Москва]\
    \ — укр. і рос. оперний\r\nспівак, композитор, драматург. Походив з родини священика.\
    \ Навчався 1824 — 30\r\nв Київ. духовному уч-щі та 1835 — 38 в Київ. духов. семінарії.\
    \ У 1838 був\r\nзапрошений рос. композитором М. Глинкою за рідкісний голос до\
    \ придворної\r\nкапели. М. Глинка керував навчанням талановитого юнака, познайомив\
    \ його з\r\nвизначними діячами"
