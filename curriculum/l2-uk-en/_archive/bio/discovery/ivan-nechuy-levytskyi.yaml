    \ Т. Шевченка. Саме він прищепив синові інтерес до літе-\nратури та історії. Згадуючи\
    \ матір, письменник писав: «…була висока на зріст, \nвесела, проворна, говорюча\
    \ та  співуча. <…> …любила читати ж"
