  text: "«Повчання дітям» Володимир Мономах (1053–1125) написав\nнаприкінці свого\
    \ життя. У ньому він закликав своїх синів до праці\nй науки, до того, щоб вони\
    \ захищали інтереси держави. У добу між-\nкнязівських чвар князь навчав їх тримати\
    \ слово, «не давати силь-\nним губити людину» і зауважував, що сам не давав кривдити\
    \ ані бід-\nного смерда, ані вбогу вдову. \nУмовно «Повчання...» складається з\
    \ двох частин: у першій князь\nВолодимир Мономах дає конкретні поради своїм дітям,\
    \ а в другій\nрозповідає, «як трудився"
