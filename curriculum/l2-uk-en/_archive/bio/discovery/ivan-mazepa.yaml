  text: "Особливо піклу-\n \n \n185 \nвався про Києво-Могилянський колегіум: розбудував\
    \ його, добився \nстатусу академії, сприяв заснуванню бібліотеки та друкарні.\
    \ Гетьманування Івана Мазепи позитивно позначилося на господар-\nському становищі\
    \ козацької держави. Освоювалися запустілі та \nраніше не оброблювані землі, зростали\
    \ вже існуючі та засновувалися \nнові населені пункти. Розвивалися промисли, ремесла,\
    \ торгівля. За \nмістами зберігали магдебурзьке право. 1. В якому році і за яких\
    \ обставин гетьманом став Іва"
