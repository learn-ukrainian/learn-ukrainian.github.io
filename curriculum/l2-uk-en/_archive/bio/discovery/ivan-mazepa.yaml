- score: 0.3333333432674408
  chunk_id: 8-klas-istoria-ukr-schupak-2025_s0240
  text: "Поступово І. Мазепа, показавши свої політичні здібності, здобув авто­\nритет\
    \ у московського царя Петра І та підняв статус гетьманської влади. Це дало йому\
    \ можливість рішуче діяти як у внутрішній, так і зовнішній \nполітиці. Як і деякі\
    \ попередники, він прагнув об’єднати під своєю вла­\nдою Лівобережну та Правобережну\
    \ Гетьманщину. Це йому вдалося піс­\nля придушення антипольського повстання під\
    \ проводом Семена Палія \nна Правобережжі в 1702-1704 рр. 2. Внутрішня політика\
    \ І. Мазепи\nЗа гетьманування І. М"
  section_title: Сторінка 179
