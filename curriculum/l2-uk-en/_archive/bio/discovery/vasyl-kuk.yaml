    \ заарештований у 1954 році. 1961 року припинила спротив остання боївка УПА. Це\
    \ сталося на \nПідгаєччині Тернопільської області. Після завершення війни ОУН\
    \ (б) \nзалишалася найпотужнішою націоналістичною силою в середовищі \nукраїнської\
    \ еміграції, яка продовжувала стояти на позиціях ідеології \nорганізованого націоналізму.\
