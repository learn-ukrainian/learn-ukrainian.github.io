  text: "Це об’єднання молодих митців було радикальним у своїх намірах, \nадже пропонувало\
    \ орієнтуватися на досвід підпілля ОУН. Проте вільнодумному \nпоколінню шістдесятників\
    \ протистояла інша тенденція, що знищувала національ-\nні відмінності й прискорювала\
    \ русифікацію з метою злиття національних куль-\nтур. На протести митців влада\
    \ відповідала погромами, найбільші з яких були в \n1965 р. та 1972 р. За ґратами\
    \ опинилися Є. Сверстюк, С. Параджанов, І. Світличний, \nІ. Калинець, В. Чорновіл\
    \ та ін. Тож нове відр"
  section_title: Сторінка 189
