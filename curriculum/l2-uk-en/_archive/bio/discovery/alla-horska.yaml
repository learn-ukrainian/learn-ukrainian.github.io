  text: "108 \nАлла Горська (1929 – 1970) \nНародилася в Ялті, зростала в \nросійськомовному\
    \ середовищі. Бать-\nко працював у сфері кіно, тому сім’я часто \nпереїздила.\
    \ Вищу освіту здобула в Київсь-\nкому художньому інституті, тут познайоми-\nлася\
    \ зі своїм майбутнім чоловіком – Вікто-\nром Зарецьким. Твори успішної випускниці\
    \ \nінституту експонували на багатьох виставках. У 1959 році \nїї \nприйняли \n\
    до \nСпілки \nрадянських художників України. Працювала \nв напрямках: соціалістичний\
    \ реалізм, радян-\nський нонконформіз"
  section_title: Сторінка 109
  grade: 11
  author: hlibovska
  page: ''
  trust_tier: 1
- score: 0.25
  chunk_id: 11-klas-istoriya-ukr-hlibovska-2024_s0304
  text: "166 \nНовим \nпоступом \nозначився \nрозвиток \nмонументального \nми-\nстецтва.\
    \ Серед споруджених у цей \nчас – монумент Вічної Слави в \nЧеркасах, меморіальний\
    \ комплекс \nдля увічнення пам’яті героїв, які \nзагинули в оборонних боях 1941\
    \ \nроку і за звільнення Волині 1944 \nроку в місті Луцьку. Водночас \nпомітним\
    \ явищем стало створення \nпам’ятників \nдо \nвидатних \nдат \nукраїнської історії.\
    \ Зокрема, у \n1982 році до 1500-ліття міста \nКиєва \nспоруджено \nпам’ятний\
    \ \nзнак, який зображав засновників \nміста – трьох "
  section_title: Сторінка 167
  grade: 11
