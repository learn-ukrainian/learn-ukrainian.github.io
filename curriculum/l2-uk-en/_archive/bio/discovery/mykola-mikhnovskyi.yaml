  text: "Залізняк та інші), які пізніше, у 1907 р., \nспробували створити українську\
    \ есерівську партію \n соціалістів-революціонерів. Водночас до РУП приєдна-\n\
    лася Українська соціалістична партія (1900 р.), що вела \nпропаганду ідей соціалізму\
    \ серед робітників невеликих \nпідприємств. Після цих перетворень партія остаточно\
    \ \nвизначилася як соціалістична. Це було закріплено \nв прийнятій 1903 р. програмі\
    \ РУП, яка також вису-\nвала вимогу національно-культурної автономії України \n\
    в ме жах Росії. Із брошури М. Міх"
