  text: "Володимир Великий — це\r\nсправді був великий князь український; він перший\
    \ князь, що вже\r\nпо-європейському глибоко зрозумів потреби своєї великої держави.\
    \ Маючи від\r\nприроди глибокий державний розум, Володимир з'єднав докупи, в одне\
    \ ціле, весь український\r\nнарод, і його держава була однією з найбільших і найміцніших\
    \ держав на Сході\r\nЄвропи. Володимир не цурався Європи — він сам добре бачив,\
    \ що культурою Європа\r\nбула-таки значно вища за Україну, його державу; він рано\
    \ переконався, що таки\r\nпотрібн"
