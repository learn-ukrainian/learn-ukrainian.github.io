    \ Чому літописець \nпорівняв князя саме з  ним? Цікаві факти\nСвідченням визнання\
    \ заслуг князя \nВолодимира стало звеличення його \nв  билинах як Володимира Красне\
    \ \nСонечко і  долучення православною \nцерквою до лику святих. У Західній Європі\
    \ Володимира \nз  повагою називали «повелителем \nрусів, могутнім завдяки своєму\
    \ \nкоролівству й  багатству». В істо"
