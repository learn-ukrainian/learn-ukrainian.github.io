  text: "Полишаючи на боцї такі надприродні, \r\n провіденціальні обяснення Володимирового\
    \ навернення, мусимо пошукати більш \r\n реальних і конкретних мотивів в обставинах\
    \ Володимирової дїяльности, в його \r\n становищі володаря і полїтика. Ми бачили\
    \ до тепер Володимира в ролї полїтика, \r\n державного мужа в повнім значінню\
    \ того слова — одного з видатнїйших, і то не \r\n тільки в нашій історії. Протягом\
    \ кількох років він відбудував розсипану руську \r\n державну систему. Він, далї,\
    \ звязав сю слабко злучену систему"
