  text: "65\n§ 8. Початок українського національного відродження\nУсвідомлення А.\
    \ Бачинським простої істини, \nщо доки існуватиме русинська мова, доти існуватиме\
    \ \nй сам народ, мало важливе значення. Завдяки його \nзусиллям в Закарпатті при\
    \ церковних громадах  діяло \nблизько 300 початкових шкіл. Найталановитіші із\
    \ за-\nкарпатських русинів здобули освіту в провідних єв-\nропейських університетах\
