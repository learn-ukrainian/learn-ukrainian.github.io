  text: "190\nРОЗДІЛ V\n українських земель і політичної самостійності України. Він\
    \ містився \nв книзі Ю. Бачинського «Україна irredenta» (1895 р.). Юліан Бачинський\
    \ (1870—1940  рр.) народився в  селі Новосілка (тепер  — тері-\nторія тернопільської\
    \ області) в родині греко-католицького священика. соціалізмом \nзахопився під\
    \ час навчання в  Академічній гімназії, був членом союзу польської \nмолоді «Зет»,\
    \ у  1890  р. його обрали до проводу РуРП. Один із головних теорети-\nків цієї\
    \ партії, а  також заснованої в 189"
  section_title: Сторінка 190
