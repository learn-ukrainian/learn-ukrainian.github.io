    \ мало першорядне значення. Це вияв-\nлялось у трьох площинах:\n\x17 загальнодержавний\
    \ напрямок: прагнення \nавстро-угорських правлячих кіл використати \nукраїнське\
    \ питання в протистоянні з Росією, \n уникнути радикалізації українського руху;\n\
    \x17 міжнаціональні відносини в краї: підне-\nсення українського руху робило неминучою\
    \ \nзміну системи відносин із поля"
