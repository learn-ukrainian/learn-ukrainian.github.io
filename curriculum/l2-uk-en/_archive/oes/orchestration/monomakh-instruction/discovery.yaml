    \ автора, що має служити\r\nдітям прикладом і наукою. Спираючись на Св. Письмо\
    \ та писання отців церкви,\r\nговорить Мономах у релігійному викладі про Божу\
    \ любов і Божу всемогутність.\r\nКоли ми, думає автор, на кого лихі, бажаємо його\
    \ крові. Натомість Бог терпить\r\nусі наші гріхи й дає можливість за допомогою\
    \ каяття, сліз і молитви одержати\r\nнад ними "
