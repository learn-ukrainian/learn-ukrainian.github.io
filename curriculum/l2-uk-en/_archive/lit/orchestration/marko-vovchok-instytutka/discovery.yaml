  text: 'Характеристика персонажів. Марко Вовчок використовує в по-

    вісті «Інститутка» увесь письменницький арсенал творення образів:

    прямі авторські розповіді, самоаналіз героїв, зовнішнє мовлення

    (діалог), внутрішні монологи, непрямі характеристики, наскрізну

    психологічну деталь. Персонажі чітко поділяються на дві групи, які протиставляються

    у творі: пани (панночка, бабуся інститутки; полковий лікар, майбут-

    ній чоловік інститутки) і кріпаки (Устина, Прокіп, бабуся-служниця,

    Назар, Катря). Упродовж усь'
