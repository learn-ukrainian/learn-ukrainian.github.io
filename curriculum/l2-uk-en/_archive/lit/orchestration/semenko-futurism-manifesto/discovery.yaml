- score: 0.568821132183075
  chunk_id: b8f1c684_c0004
  text: 'Кінець двадцятих років. Комуністична машина все більше й більше тисне на
    творчу свободу поета, примушуючи виконувати замовлення на соціальну тематику.
    Як і В. Маяковський, М. Семенко змушений вдатися до створення функціональної поезії
    (збірник "З радянського щоденника"), що по суті є схематичним переказом газетного
    тексту, віршованими лозунгами та агітками: "Писать про активність я мушу, забувши
    про людську душу" (Семенко М. З радянського щоденника. К., 1932, С. 86).


