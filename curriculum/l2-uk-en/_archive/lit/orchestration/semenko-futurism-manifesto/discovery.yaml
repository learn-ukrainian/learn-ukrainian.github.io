  text: 'Своєрідність урбаністичної тематики Семенка, яка вирізняє його з-поміж усіх
    інших футуристів, полягає у введенні до тексту твору науково-технічної термінології,
    розмовно-побутової лексики, синтаксичних ускладнень, а також у майстерному переході
    від узагальненого до конкретних образів-елементів міста ("Ліхтар", Тротуар", "Вулиця").
    В. Коряк з цього приводу зауважив, що М. Семенко всією творчістю "споруджує в
    українській поезії культ урбанізму".


