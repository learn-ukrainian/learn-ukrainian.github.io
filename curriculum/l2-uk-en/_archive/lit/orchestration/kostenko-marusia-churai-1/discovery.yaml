  text: "Віршований роман «Маруся Чурай» переповідає у віршах\r\nсюжетні колізії художнього\
    \ твору Шаховського, але, звичайно, авторка надає власного\r\nтлумачення описуваним\
    \ подіям. Ліна Костенко не просто пише історичний роман,\r\nвона впевнено творить\
    \ свою версію легенди про вкраїнську героїню — жінку, яка\r\nживе не самою любов’ю,\
    \ а й служить Батьківщині. До коханого чоловіка в неї\r\nмаксималістські вимоги.\
    \ Як і в літературних версіях російських попередників\r\nЛіни Костенко, поруч\
    \ із Марусею в романі з’являєтьс"
