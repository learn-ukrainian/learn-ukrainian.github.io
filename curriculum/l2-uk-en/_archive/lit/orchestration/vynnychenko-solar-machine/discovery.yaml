  text: "«Сонячна машина» Винниченка різко випадає з його\r\nреалістичної прози та\
    \ самоаналізу його драматургії. Персонажів цього\r\nфантастичного роману можна\
    \ назвати картонними, але такими вони і є, Винниченко\r\nне прагне до реальності\
    \ людей і обставин, хоча манера художника змушує його\r\nперевантажувати твір\
    \ опуклими реалістичними подробицями. Це навіть не\r\nфантастично-утопічний твір,\
    \ а казка, в якій розвиток подій підпорядкований\r\nодвічному міфологічному сюжетові\
    \ героїчного весілля надлюдини-плебея та\r\nнад"
