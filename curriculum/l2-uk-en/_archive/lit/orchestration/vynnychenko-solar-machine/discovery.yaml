  text: "Ре-\nзультатом наполегливої праці стали романи «Сонячна машина» й «Поклади\
    \ зо-\nлота», повість «На той бік», збірка оповідань «Намисто»  та низка нових\
    \ драм. Твори виходили великими накладами, зокрема, перший український \nнауково-фантастичний\
    \ роман «Сонячна машина»  (1924) витримав у  той час \nаж три перевидання. А драми\
    \ В. Винниченка здобули європейське визнання. П’єси «Чорна Пантера і  Білий Ведмідь»,\
    \ «Брехня», «Гріх», «Закон» з  успіхом \nвиставлялися в театрах Німеччини, Італії,\
    \ Іспанії, Норвег"
