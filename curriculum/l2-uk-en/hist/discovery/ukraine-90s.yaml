    \ про можливу причетність Президента та інших високо-\nпосадовців до зникнення\
    \ 16 вересня 2000 року опозиційного журна-\nліста Георгія Гонгадзе, засновника\
    \ і першого головного редактора \nінтернет-газети «Українська правда». Протести,\
    \ які розпочалися, \nзгодом переросли в акцію «Україна без Кучми». Не зняли гостроти\
    \ \nпротистояння в державі парл"
