  text: "Роботи істориків середини XX ст. більш докладно\r\nвисвітлили деякі аспекти\
    \ проблеми. Була повністю спростована думка про\r\nбудь-який позитивний вплив\
    \ монгольської навали. Першорядну роль тут відіграли\r\nархеологічні дослідження\
    \ Києва, які наочно показали справжню картину розгрому\r\nстолиці Київської Русі\
    \ у 1240 р. Доведено було і те, що думка про повне\r\nзапустіння та зміну населення\
    \ у Наддніпрянщині не має під собою достатнього\r\nгрунту. Проте і сьогодні деякі\
    \ дослідники, даючи безумовно вірну негати"
