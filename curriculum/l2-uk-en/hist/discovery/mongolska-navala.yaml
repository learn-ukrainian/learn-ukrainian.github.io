  text: "Основу монгольсь-\nКартина Павла Риженка\n«Битва на річці Калка»\n119 \n\
    кого війська складала важка кіннота. Військо мало метальні й \nстінобитні машини,\
    \ які запозичили в китайців. Перший удар монголів припав на князівства Північно-\n\
    Східної Русі. Упродовж 1237—1238 років Батиєва орда спу-\nстошила землі Рязанського\
    \ та Володимиро-Суздальського кня-\nзівств. Після цього монгольське військо повернуло\
    \ на південь. На шляху до Половецького степу їм відчайдушний спротив \nчинили\
    \ мешканці невеликого міста Козел"
  section_title: Сторінка 60
  grade: 7
  author: hlibovska
  page: ''
  trust_tier: 1
- score: 0.3333333432674408
  chunk_id: 7-klas-istoria-ukr-hlibovska-2024_s0122
  text: "Коли монголи захопили землі Південно-Західної Русі? Барвограй ідей \nКліо\
    \ вважає, що історична карта є важливим носієм \nінформації про події минувшини.\
    \ Тож попрацюйте в парах з \nісторичною картою «Монгольське завоювання земель\
    \ Русі-України (1222–\n1242 роки)». Дайте розгорнуті відповіді на запитання 1–5.\
    \ Складіть власне \nзапитання та озвучте його в класі."
  section_title: Сторінка 60
  grade: 7
  author: hlibovska
  page: ''
  trust_tier: 1
- score: 0.25
  chunk_id: 8-klas-istoria-ukr-schupak-2025_s0028
  text: "Велика хвиля набігів припала на кінець \nXV — початок XVI ст., коли було\
    \ зруйновано Київ і спустошено значні \nтериторії аж до північних меж України.\
    \ Військо кримських татар \n(сучасна історична реконструкція)\nЯк художник зображує\
    \ військові \nякості кримських татар? Якими художніми деталями \nвони підтверджуються?\
    \ 21"
  section_title: Сторінка 21
  grade: 8
  author: schupak
  page: ''
  trust_tier: 1
- score: 0.20000000298023224
  chunk_id: 7-klas-istoria-ukr-pometun-2024_s0265
  text: "Об’єднання \nВолині й Галичини \nв єдине князівство \nпід владою \nРомановичів\
    \ \n(Василька \nі Данила)\nКнязювання  \nДанила  \nРомановича\nПравління  \nЮрія\
    \ І \nЛьвовича \nІнкорпорація земель \nПівденно-Західної \nРусі до Великого  \n\
    князівства  \nЛитовського\nПравління  \nЛева І Даниловича \nу Волинсько- \nГалицькій\
    \ державі \nКревська унія між  \nВеликим князівством  \nЛитовським  \nі Королівством\
    \ Польським\nПравління \nХаджі-Гірея \nв Криму\nБитва руського \nта половецького\
    \ \nвійська \nз монголами \nна річці Калка\n1223 р.\n12"
  section_title: Сторінка 213
  grade: 7
  author: pometun
  page: ''
  trust_tier: 1
- score: 0.1666666716337204
  chunk_id: 7-klas-istoria-ukr-galimov-2024_s0163
  text: "Напасті й  захоплення \nбули, але не таке нині зло сталося. Не \nлише один\
    \ Поділ зайняли і попалили, \nале й  Гору зайняли, і  митрополичу \n[церкву] Святої\
    \ Софії розграбували, \nі Десятинну [церкву] Святої Богородиці \nрозграбували,\
    \ і монастирі всі, й [одні] \nікони обідрали, а  інші позабирали, \nі чесні хрести,\
    \ й святі посудини, і кни-\nги, й одежі блаженних перших князів, \nщо ті повішали\
    \ у  святих церквах на \nпам’ять по собі. \e\n\e Поміркуйте, чому Рюрик, \nОльговичі\
    \ та половці вчинили \nрозгром Києва. r"
  section_title: Сторінка 109
