  text: "Розділ І. Україна в повоєнний період\n14\n2. Операція «Вісла»\n\e\n\e Як\
    \ проходила операція «Вісла»? Чому терени, де вона \nвідбувалася, називали Закерзонням?\
    \ «Обмін населенням» між УРСР і Польщею, що \nрозпочався в  1944  р., було завершено\
    \ в  1947  р. Чимало українців продовжували жити на україн-\nських етнічних землях\
    \ Посяння, Лемківщини, \nХолмщини й Підляшшя, які узагальнено називали \nЗакерзонням.\
    \ Польща \nвирішила \n«остаточно \nрозв’язати українське питання»  — саме таке\
    \ за-\nвдання зафіксували міністр"
