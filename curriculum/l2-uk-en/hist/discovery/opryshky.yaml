  text: 'І кляла всюди, кляла всіх, кого здибала. Громада чула свою вину перед Тодорихою
    й старалася хоч чим–небудь загладити. Той принесе хліба, той бринзи. Їй дають,
    а вона лає. Притихло село. Коли королівською грамотою можна підтиратися, і грім
    не вдарив, і не вбив напасника, і королівські слуги не прилетіли на конях, не
    схопили, не замкнули у вічну тюрму за зневагу королівського імені, то що ж говорити
    далі? Значить, дійсно вище пана нікого нема на світі, й треба покоритися волі
    Божій.


    Село мовчало.'
