- score: 0.3333333432674408
  chunk_id: 7-klas-istoria-ukr-galimov-2024_s0222
  text: "Словник\nІнкорпорація земель  — \nприєднання, включення земель \nоднієї держави\
    \ до іншої зі \nзбереженням (переважно тимчасово) \nсоціально-еко­но­мічних відносин.\
    \ Експансія  — розширення сфери \nвпливу, що здійснюється шляхом \nзбройного захоплення\
    \ території, \nдипломатичного або економічного \nтиску тощо."
  section_title: Сторінка 151
  grade: 7
  author: galimov
