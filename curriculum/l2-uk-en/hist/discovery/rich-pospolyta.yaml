- score: 0.25
  chunk_id: 8-klas-istoria-ukr-schupak-2025_s0037
  text: "Люблінська унія створила суперечливі умови для розвит ку укра­\nїнських земель.\
    \ Українські землі у складі Королівства Польського стали \nзначно ближчими до\
    \ західноєвропейських впливів. Входження більшос­\nті українських земель до складу\
    \ однієї держави — Речі Посполитої — \nсприяло формуванню у їх мешканців спільної\
    \ української ідентичності. УКРАЇНСЬКІ ЗЕМЛІ У СКЛАДІ РЕЧІ ПОСПОЛИТОЇ\nРОЗДІЛ\
    \ 1 \nу XVI -  першій половині XVII ст. 28"
  section_title: Сторінка 28
  grade: 8
  author: schupak
  page: ''
  trust_tier: 1
- score: 0.20000000298023224
  chunk_id: 8-klas-istoria-ukr-schupak-2025_s0064
  text: "Але завдяки релігійній полеміці викристалізува­\nлася ідея «руського народу»\
