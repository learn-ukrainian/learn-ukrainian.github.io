  text: "В історіографії досить поширена думка, що повстання\r\n1594-1595 рр. під\
    \ проводом Северина Наливайка ще не мало антиуніатського\r\nспрямування, оскільки\
    \ відсутні документи, які б засвідчували, що боротьбу проти\r\nунії козаки ставили\
    \ за свою свідому мету. Справді, як непохитна програма дій ця\r\nборотьба починає\
    \ усвідомлюватися козаками дещо пізніше, на початку XVII ст.,\r\nале незаперечним\
    \ є і той факт, що під час повстання 1594-1595 рр. козаки\r\nвиступали рішучими\
    \ ворогами унії, хоч ці їхні виступи й мал"
