  text: "Програмові документи української Гельсінгської Групи\r\nписані різними людьми\
    \ в різний час, а тому на початку досить розмиті. Чогось\r\nособливо нового в\
    \ суспільну думку вони не привнесли, а лише підтвердили ідею\r\n«єдності загальнолюдських\
    \ і національних прав українських громадян». Група\r\nеволюціонувала від загальнодемократичних,\
    \ правових завдань, де серед інших був\r\nі захист національних прав у досить\
    \ поміркованих тонах, до осуду тоталітарної\r\nсистеми й усвідомлення першорядних\
    \ завдань українського"
