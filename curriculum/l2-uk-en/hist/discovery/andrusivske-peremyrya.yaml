  text: "Дорошенко \nзрозумів, що сподіватися на допомогу Польщі в  боротьбі \nпроти\
    \ Московії не варто. За допомогою татар він розгромив \nпід Браїловом польське\
    \ військо (19  грудня 1666  р.), тим \nсамим перешкодивши його намірам розміститися\
    \ на Право-\nбережжі. У той самий час у  результаті тривалих переговорів \n30 \
    \ січня 1667  р. в  селі Андрусово, що під Смоленськом, \nМосковська держава та\
    \ Польща уклали угоду про перемир’я \nна 13,5  року. На підписання Андрусівського\
    \ перемир’я не \nзапросили ні лівобережно"
