  text: "Розділ VI. Європейський вибір України. Російсько-українська війна\n266\n\t\
    \nЗверніть увагу\n6  червня 2023  р. на початку \nукраїнського контрнаступу росіяни\
    \ \nпідірвали дамбу Каховської ГЕС. Села \nй  міста на обох берегах Дніпра нижче\
    \ \nза течією зазнали серйозної шкоди від \nпаводка, загинули десятки людей. У \
    \ зоні підтоплення опинилися \n80  населених пунктів, більшість із них \nна лівобережжі\
    \ Херсонщини. Евакуації \nпотребували 40  тис. осіб, 25  тис. із \nних  — на окупованій\
    \ частині \nтериторії. Російсь"
  section_title: Сторінка 268
