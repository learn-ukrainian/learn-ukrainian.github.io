    \ західноєвропейських впливів. Входження більшос­\nті українських земель до складу\
    \ однієї держави — Речі Посполитої — \nсприяло формуванню у їх мешканців спільної\
    \ української ідентичності. УКРАЇНСЬКІ ЗЕМЛІ У СКЛАДІ РЕЧІ ПОСПОЛИТОЇ\nРОЗДІЛ\
