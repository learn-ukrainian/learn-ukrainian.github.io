- type: reading
  id: reading-mazepa-kultura
  title: "Уривок: Диспути в Академії"
  source: "Історичний есей"
  text: "Уявіть собі прохолодний осінній ранок на київському Подолі. З дзвіниці лунає дзвін, що скликає спудеїв до Бурси. Два юнаки вступають у словесну дуель латиною. Жоден з них не користується папірцями — пам'ять і логіка є їхньою зброєю."
  tasks:
    - "Прочитайте уривок про студентські диспути."
    - "Зверніть увагу на те, які навички здобували майбутні лідери."

- type: true-false
  title: "Правда чи вигадка: культурні досягнення епохи"
  instruction: "Визначте, чи є наведені твердження правдивими згідно з текстом уроку."
  items:
    - statement: "Іван Мазепа витратив понад один мільйон дукатів на культурні та церковні потреби."
      correct: true
      explanation: "Бендерська комісія козацької старшини підрахувала саме таку суму витрат."
    - statement: "Мазепинське бароко відзначалося важкими скульптурами та похмурою атмосферою."
      correct: false
      explanation: "Навпаки, воно було світлим, з легким ліпним орнаментом на білих стінах."
    - statement: "Києво-Могилянська академія неофіційно називалася Могило-Мазепинською."
      correct: true
      explanation: "Це підкреслювало рівноцінний внесок гетьмана та Петра Могили у розвиток закладу."
    - statement: "Партесний спів передбачав одноголосне виконання церковних пісень."
      correct: false
      explanation: "Партесний спів — це багатоголосся, яке створювало ілюзію архітектурного простору у звуці."
    - statement: "У шкільних драмах інтермедії завжди виконувалися латинською мовою."
      correct: false
      explanation: "Інтермедії виконувалися винятково живою народною українською мовою."
    - statement: "Російська православна церква проголосила анафему Мазепі в тих самих соборах, які він фінансував."
      correct: true
      explanation: "У цьому полягав головний парадокс політичного прокляття."
    - statement: "Гравюра Івана Мигури зображує Мазепу як руйнівника імперії без жодної церкви."
      correct: false
      explanation: "Гравюра 1706 року зображує гетьмана в оточенні понад десятка церков, які він збудував."
    - statement: "Особистий герб Мазепи мав назву Курч і використовувався як державний символ."
      correct: true
      explanation: "Цей герб карбували на гарматах, дзвонах та фасадах соборів."
    - statement: "Всі нові храми, збудовані за кошти Мазепи, збереглися до наших днів."
      correct: false
      explanation: "Багато шедеврів, зокрема Військовий Микільський та Богоявленський собори, були знищені більшовиками."
    - statement: "За часів правління Мазепи Київська академія отримала офіційний статус."
      correct: true
      explanation: "Це сталося у 1701 році, що юридично закріпило її значення."

- type: critical-analysis
  title: "Аналіз: Роль освіти в розбудові держави"
  source_reading: "reading-mazepa-kultura"
  instruction: "Проаналізуйте наведений текст і дайте розгорнуті відповіді."
  questions:
    - "Як саме диспути латиною готували студентів до майбутньої державної та дипломатичної служби?"
    - "Чому Мазепа вважав за необхідне фінансувати навчання спудеїв власним коштом?"
  model_answers:
    - "Диспути тренували логіку, пам'ять та здатність аргументовано захищати свої позиції під тиском аудиторії. Це були критично важливі навички для майбутніх дипломатів."
    - "Гетьман розумів, що незалежній державі потрібна потужна інтелектуальна еліта, здатна конкурувати на європейському рівні."

- type: comparative-study
  title: "Порівняння: Українське та західне бароко"
  instruction: "Порівняйте архітектурні традиції, спираючись на матеріали уроку."
  items_to_compare:
    - "Мазепинське (козацьке) бароко"
    - "Західноєвропейське бароко"
  criteria:
    - "Форма бань та куполів"
    - "Оздоблення фасадів будівлі"
  prompt: "Опишіть головні відмінності між цими двома архітектурними стилями."
  model_answer: "Західне бароко часто мало видовжений план, важку кам'яну скульптуру та складні форми бань. Натомість мазепинське бароко відзначалося грушоподібними ярусними банями, легким ліпним орнаментом і білосніжними стінами, що створювало світлу, радісну атмосферу."

- type: essay-response
  title: "Есе: Деколонізація історичної спадщини"
  source_reading: "reading-mazepa-kultura"
  instruction: "Напишіть розгорнуту відповідь."
  prompt: "Як меценатська та культурна діяльність Івана Мазепи (зокрема будівництво церков і підтримка академії) спростовує російський міф про нього як винятково про політичного зрадника? Обґрунтуйте свою думку."
  min_words: 150
  model_answer: "Діяльність Мазепи як будівничого та мецената доводить, що він був справжнім державним діячем, який дбав про довгостроковий розвиток України. Витрати понад мільйона дукатів на церкви, освіту та мистецтво свідчать про його прагнення створити самостійну, інтелектуально потужну націю європейського зразка. Міф про зрадника є продуктом російської пропаганди, мета якої — приховати той факт, що Мазепа захищав український суверенітет від поглинання імперією. Матеріальні пам'ятки, такі як собори та гравюри, фізично доводять його роль як фундатора українського ренесансу."
  rubric:
    - criteria: "Аргументація"
      description: "Есе містить чіткі докази з тексту (суми пожертв, будівництво храмів)."
      points: 40
    - criteria: "Аналіз міфу"
      description: "Чітко пояснено контраст між російським наративом та реальними фактами."
      points: 40
    - criteria: "Мовне оформлення"
      description: "Використана відповідна історична термінологія, текст логічно структурований."
      points: 20