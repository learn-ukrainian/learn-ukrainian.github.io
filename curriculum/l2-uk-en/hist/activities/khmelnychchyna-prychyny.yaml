- type: reading
  id: reading-samovydets
  title: 'Первинне джерело: Літопис Самовидця про причини війни'
  source: Літопис Самовидця (XVII ст.)
  text: '...бо не тільки в добрах шляхетських, але й в добрах королівських... людей
    привертали до послушенства, отбираючи ґрунти, ліси, млини, ...а найбільше знущання
    над вольними людьми...

    '
  tasks:
  - Які саме форми економічного тиску описує автор літопису?
  - Як автор ставиться до дій королівської влади та місцевих чиновників?
- type: critical-analysis
  title: 'Аналіз: Соціальна нерівність у Літописі'
  source_reading: reading-samovydets
  target_text: найбільше знущання над вольними людьми
  questions:
  - Кого літописець називає вольними людьми і чому вони зазнавали знущань?
  - Як поняття знущання співвідноситься з терміном кривда, поширеним у суспільстві
    того часу?
  model_answers:
  - Вольними людьми були козаки та вільні поселенці Дикого Поля, які стикалися з намаганнями
    магнатів перетворити їх на безправних кріпаків.
  - Знущання та кривда відображали не просто значний економічний визиск, а брутальне
    порушення морального права та багатовікових традиційних свобод.
  focus_points:
  - Соціальний статус вольних людей
  - Етичний та правовий вимір соціального гніту
- type: essay-response
  title: 'Есе: Каталізатор загальнонаціонального повстання'
  source_reading: reading-samovydets
  prompt: Проаналізуйте, чому особиста трагедія Богдана Хмельницького в Суботові стала
    іскрою, яка перетворила локальний протест на Національно-визвольну війну. Зважайте
    на соціально-економічні, релігійні та політичні передумови.
  min_words: 150
  model_answer: Трагедія в Суботові яскраво продемонструвала повну відсутність правового
    захисту навіть для еліти. Напад Чаплинського на маєток сотника показав, що в Речі
    Посполитій жоден православний русин не був у безпеці. Хмельницький геніально використав
    власну кривду як потужний символ загальнонародних страждань. Об'єднавши особистий
    мотив із соціально-економічним невдоволенням (нестерпна панщина), релігійною дискримінацією
    (утиски православ'я) та політичним хаосом (повне безсилля короля), він зміг успішно
    мобілізувати надзвичайно широкі верстви населення.
  rubric:
  - criteria: Аргументація
    description: Чітко пояснено нерозривний зв'язок між особистою кривдою лідера та
      глобальними суспільними процесами.
    points: 40
  - criteria: Використання контексту
    description: Переконливо наведено конкретні приклади соціальних, релігійних та
      політичних утисків населення.
    points: 40
  - criteria: Мовне оформлення
    description: Текст написаний логічно і грамотно, з доречним використанням історичної
      термінології.
    points: 20
- type: comparative-study
  title: 'Порівняння: Історичні погляди на Хмельниччину'
  source_reading: reading-samovydets
  instruction: Порівняйте різні історичні трактування подій тисяча шістсот сорок восьмого
    року.
  items_to_compare:
  - Імперський (польський або радянський) історичний наратив
  - Сучасний деколонізований (науковий український) наратив
  criteria:
  - Загальний характер конфлікту (бунт черні чи масштабна революція?)
  - Кінцева стратегії та мета повстанців
  - Оцінка ролі іноземних військових союзників
  prompt: Опишіть, як кардинально змінювалася оцінка Хмельниччини від колоніальної
    до сучасної об'єктивної історіографії за вказаними критеріями.
  model_answer: Імперські наративи розглядали козацьке повстання як деструктивний
    бунт черні (класична Польща) або прагнення до негайного возз'єднання з Росією
    (СРСР). Сучасний деколонізований погляд визначає ці масштабні події як повноцінну
    Національно-визвольну революцію з чіткою метою створення власної суверенної держави.
    У постійному пошуку союзників гетьман Хмельницький керувався не етнічними сентиментами,
    а виключно державним прагматизмом, що блискуче підтверджується раннім військово-політичним
    союзом із Кримським ханством.
- type: true-false
  title: 'Перевірка фактів: Передумови повстання'
  items:
  - statement: Напередодні повстання панщина на Правобережжі значно зменшилася завдяки
      стрімкому розвитку європейських фольварків.
    correct: false
    explanation: Насправді панщина катастрофічно зросла до трьох, а іноді й п'яти
      днів на тиждень.
  - statement: Сумнозвісна Ординація тисяча шістсот тридцять восьмого року штучно
      обмежила козацький реєстр до мізерних шести тисяч осіб.
    correct: true
    explanation: Це жорстоке рішення влади призвело до миттєвої появи десятків тисяч
      випищиків, які раптово опинилися під прямою загрозою покріпачення.
  - statement: Берестейська унія успішно та остаточно об'єднала українське суспільство
      та припинила багаторічні релігійні конфлікти.
    correct: false
    explanation: Унія, навпаки, спричинила глибокий, трагічний розкол і перетворилася
      на зручний інструмент державної дискримінації православних.
  - statement: Масовий, добровільний перехід вищої української шляхти в католицтво
      створив у суспільстві небезпечний феномен безголового народу.
    correct: true
    explanation: Абсолютно всю політичну та військову відповідальність за долю цього
      безголового народу швидко перебрало на себе вільне збройне козацтво.
  - statement: Король Речі Посполитої Владислав Четвертий мав необмежену абсолютну
      владу і міг легко приборкати свавілля місцевих магнатів.
    correct: false
    explanation: Королівська влада була повністю паралізована шляхетською анархією
      та деструктивним правом вільного вето на сеймі.
  - statement: Таємні переговори тисяча шістсот сорок шостого року завершилися успішним
      спільним збройним походом короля та козаків проти Туреччини.
    correct: false
    explanation: Польський сейм категорично заблокував плани монарха, і він був змушений
      публічно скасувати всі свої щедрі обіцянки козакам.
  - statement: Багатий особистий маєток сотника Богдана Хмельницького в хуторі Суботів
      був нахабно і жорстоко пограбований чигиринським підстаростою.
    correct: true
    explanation: Цей зухвалий, кривавий напад став потужним особистим мотивом лідера,
      що згодом ідеально переріс у всенародний визвольний виступ.
  - statement: У своїх численних Універсалах бунтівний гетьман Хмельницький звертався
      виключно і тільки до досвідченого реєстрового козацтва.
    correct: false
    explanation: Універсали були звернені до всього пригнобленого православного люду
      (селян, міщан, духовенства), формуючи єдину модерну політичну націю.
  - statement: Класична радянська історіографія завжди розглядала Хмельниччину виключно
      як класову селянську війну, повністю ігноруючи її важливий національний аспект.
    correct: false
    explanation: Вона маніпулятивно і постійно фокусувалася на нібито споконвічному,
      єдиному прагненні повстанців до державного возз'єднання з Московським царством.
  - statement: Найпершим і найголовнішим військово-тактичним союзником гетьмана Богдана
      Хмельницького на самому початку війни виступило ісламське Кримське ханство.
    correct: true
    explanation: Цей прагматичний військовий союз дозволив успішно компенсувати гостру
      нестачу козацької легкої кавалерії у переможних перших битвах.
  instruction: Визначте, чи твердження правильне.
