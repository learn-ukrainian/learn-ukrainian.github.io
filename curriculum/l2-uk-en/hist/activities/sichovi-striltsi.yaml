- type: reading
  id: reading-uss-oath
  title: "Таємна присяга Українських січових стрільців"
  source: "Стрий, 3 вересня 1914 року"
  text: |
    Я, Український Січовий Стрілець, присягаю українським князям, гетьманам, Запорізькій Січі, могилам і всій Україні, що вірно служитиму Рідному Краєві, боронитиму його перед ворогом, воюватиму за честь української зброї до останньої краплини крові.
  instruction: "Прочитайте текст таємної присяги, яку склали добровольці УСС, відмовившись присягати лише австрійському імператору."

- type: essay-response
  title: "Аналіз державної суб'єктності"
  source_reading: "reading-uss-oath"
  instruction: "Напишіть коротке есе, спираючись на текст присяги."
  prompt: "Яким чином текст таємної присяги УСС відображає перетворення українців з об'єкта імперської політики на повноцінний політичний суб'єкт? Чому стрільці згадують князів, гетьманів та Запорізьку Січ?"
  min_words: 150
  model_answer: "Текст присяги яскраво демонструє, що стрільці усвідомлювали себе спадкоємцями української державності, а не просто австрійськими солдатами. Згадка про князів, гетьманів та Січ вказує на історичну тяглість мілітарної традиції та легітимізує їхню збройну боротьбу. Вони відкрито декларують свою мету — захист Рідного Краю та України, що повністю суперечить імперському міфу про них як про 'австрійських найманців'. Складаючи таку присягу, бійці УСС де-факто заявляли про свою політичну самостійність та абсолютну готовність відновити втрачену державність."
  rubric:
    - criteria: "Аналіз тексту присяги"
      description: "Есе детально пояснює значення згаданих у присязі історичних епох."
      points: 5
    - criteria: "Розуміння політичної суб'єктності"
      description: "Автор чітко розкриває концепцію переходу від об'єкта до суб'єкта історії."
      points: 5

- type: true-false
  title: "Факти про Українських січових стрільців"
  instruction: "Визначте, чи є ці твердження про УСС правдивими, чи хибними."
  items:
    - statement: "Легіон УСС був сформований з примусово мобілізованих селян Галичини."
      correct: false
      explanation: "Легіон складався виключно з добровольців, серед яких було дуже багато інтелігенції."
    - statement: "Головна Українська Рада закликала підтримати Австро-Угорщину для здобуття автономії."
      correct: true
      explanation: "Це був прагматичний крок задля створення українського коронного краю."
    - statement: "Австрійське командування дозволило мобілізувати всі 28 тисяч добровольців до УСС."
      correct: false
      explanation: "Було дозволено сформувати легіон чисельністю лише 2500 осіб."
    - statement: "Стрільці склали таємну присягу на вірність Україні у Стрию."
      correct: true
      explanation: "Це стало виявом їхньої державної суб'єктності та національної свідомості."
    - statement: "Битва на горі Маківка завершилася повною поразкою УСС і втратою позицій."
      correct: false
      explanation: "Стрільці героїчно втримали позиції і повністю зірвали російський наступ."
    - statement: "У затяжних боях на горі Лисоня легіон УСС втратив більшість свого особового складу."
      correct: true
      explanation: "Втрати склали понад 70% вбитими, важко пораненими та полоненими."
    - statement: "Легіон УСС був остаточно розформований одразу після Листопадового чину 1918 року."
      correct: false
      explanation: "Він став надійним ядром для формування регулярної Української Галицької Армії."
    - statement: "Пресова кватира УСС займалася виключно випуском сухих військових наказів."
      correct: false
      explanation: "Вона була потужним культурним хабом: видавала часописи, листівки, створювала картини та пісні."
    - statement: "Російська пропаганда постійно називала січових стрільців 'австрійськими найманцями'."
      correct: true
      explanation: "Цей брехливий міф мав на меті позбавити український визвольний рух політичної суб'єктності."
    - statement: "Пісня 'Ой у лузі червона калина' була створена авторами легіону УСС у 1914 році."
      correct: true
      explanation: "Її талановитими авторами є стрільці Степан Чарнецький та Григорій Трух."

- type: reading
  id: reading-uss-mission
  title: "Деколонізаційний вимір діяльності УСС"
  text: |
    На величезну відміну від російських військ, які під час своєї окупації Галичини негайно закривали всі українські школи, забороняли мову та знищували пресу, січові стрільці прийшли на звільнену Волинь з кардинально іншою метою. Вони розгорнули масштабну освітню кампанію, відкривши понад 100 українських народних шкіл, і вчили місцевих дітей читати й писати рідною мовою, ефективно долаючи наслідки тривалої російської асиміляції.
  instruction: "Прочитайте уривок тексту про діяльність легіону УСС на території Волині."

- type: critical-analysis
  title: "Просвітницька місія як противага окупації"
  source_reading: "reading-uss-mission"
  instruction: "Проаналізуйте наведений текст та дайте розгорнуті відповіді на запитання."
  questions:
    - "Які саме дії російських військ у Галичині чітко свідчили про їхню репресивну окупаційну політику?"
    - "У чому полягала головна гуманітарна мета перебування січових стрільців на Волині у 1916-1918 роках?"
    - "Як просвітницька діяльність УСС спростовує російський міф про те, що вони були просто 'австрійськими найманцями'?"
  model_answers:
    - "Російські війська закривали українські школи, жорстко забороняли мову, ліквідовували пресу та репресували інтелігенцію, намагаючись повністю асимілювати місцеве українське населення."
    - "Головна мета УСС полягала у національному пробудженні регіону: вони самостійно відкривали народні школи, викладали українською мовою та долали важкі наслідки тривалої російської русифікації."
    - "Їхня просвітницька місія переконливо доводить, що вони керувалися власними стратегічними національними інтересами та дбали про розвиток суспільства, а не просто виконували вузькі військові завдання Відня."
  focus_points:
    - "Освітня діяльність як потужний інструмент деколонізації"
    - "Контрастне протиставлення імперської окупації та національного відродження"

- type: comparative-study
  title: "Порівняння російського та українського наративів"
  instruction: "Порівняйте, як трактувалася роль Українських січових стрільців у двох діаметрально протилежних історіографіях."
  items_to_compare:
    - "Російський імперський (радянський) наратив"
    - "Український (деколонізований) наратив"
  criteria:
    - "Статус легіону УСС"
    - "Сенс участі легіону у Першій світовій війні"
    - "Оцінка місії легіону на території Волині"
  prompt: "На основі матеріалу модуля заповніть порівняльні критерії, демонструючи ключові відмінності між імперським пропагандистським міфом та об'єктивною історичною реальністю."
  model_answer: "У російському наративі бійці УСС вважалися 'зрадниками' та безідейними 'австрійськими найманцями', тоді як в українському — це перше національне військо за 200 років та елітні борці за незалежність. Сенс їхньої участі у війні російська імперія трактувала як сліпу службу інтересам Австро-Угорщини, а насправді це було прагматичне використання глобального конфлікту для відновлення власної державності (концепція 'українського П'ємонту'). Щодо Волині, російська пропаганда називала це жорстокою окупацією, тоді як стрільці насправді здійснювали там масову гуманітарну та просвітницьку роботу."