- type: reading
  id: reading-hrushevsky-scheme
  title: "Первинне джерело: Звичайна схема історії"
  source: "Михайло Грушевський (1904)"
  text: "Обминаннє київського періоду в російській схемі... переносить початок російської історії в ліси, на багна Оки та Волги... Київський період перейшов не до Володимиро-Московської держави, а до Галицько-Волинської, а потім до Литовсько-Польської..."

- type: critical-analysis
  source_reading: reading-hrushevsky-scheme
  title: "Аналіз тексту: Деконструкція міфу"
  instruction: "Проаналізуйте наведений уривок та дайте відповіді на запитання."
  questions:
    - "Що Грушевський має на увазі під 'обминанням київського періоду'?"
    - "Чому перенесення початку російської історії 'на багна Оки та Волги' є політично важливим твердженням?"
    - "Як цей фрагмент руйнує традиційну імперську концепцію історії?"
  model_answers:
    - "Автор вказує на те, що російська історіографія ігнорує київську спадщину як основу виключно українського процесу."
    - "Це доводить, що етногенез росіян відбувався на іншій території та в інших географічних умовах."
    - "Він доводить неможливість прямої спадкоємності між Києвом і Москвою, розриваючи цей штучний зв'язок."

- type: true-false
  title: "Перевірка розуміння: Життя та діяльність"
  instruction: "Визначте, чи є твердження правильними."
  items:
    - statement: "Михайло Грушевський народився в Києві і ніколи не залишав українських етнічних земель."
      correct: false
      explanation: "Він народився в Холмі і виріс на Кавказі, що допомогло йому сприймати Україну як єдине ціле."
    - statement: "Головним наставником молодого Грушевського був професор Володимир Антонович."
      correct: true
      explanation: "Антонович передав йому позитивістську методологію і рекомендував до Львова."
    - statement: "Свою знамениту Історію України-Руси Грушевський писав виключно в еміграції."
      correct: false
      explanation: "Він почав писати її ще у Львові у 1898 році і працював над нею все життя."
    - statement: "У своїй концепції історик поставив у центр вивчення народ, а не державу."
      correct: true
      explanation: "Він довів, що народ продовжує жити і творити навіть без власної держави."
    - statement: "Грушевський від початку діяльності Центральної Ради був прихильником повної незалежності України."
      correct: false
      explanation: "Спочатку він був автономістом і федералістом, а до незалежності еволюціонував під впливом російської агресії."
    - statement: "Четвертий Універсал урочисто проголосив повну незалежність УНР."
      correct: true
      explanation: "Це сталося у січні 1918 року."
    - statement: "Після поразки революції Грушевський назавжди залишився в Європі і ніколи не повертався до України."
      correct: false
      explanation: "Він свідомо повернувся до радянської України у 1924 році заради наукової роботи і архівів."
    - statement: "Термін 'Україна-Русь' був покликаний об'єднати давню спадщину Києва з модерним українським рухом."
      correct: true
      explanation: "Цей геніальний дефіс назавжди повернув українцям вкрадену давньоруську спадщину."
    - statement: "За імперською схемою Погодіна-Карамзіна, росіяни були єдиними законними спадкоємцями Києва."
      correct: true
      explanation: "Ця схема агресивно стверджувала, що історія Росії бере початок у стародавньому Києві."
    - statement: "Смерть історика в Кисловодську є наслідком природних причин і не викликає підозр."
      correct: false
      explanation: "Сучасні дослідники вважають, що це було навмисне приховане вбивство, організоване радянськими спецслужбами через некомпетентне хірургічне втручання."

- type: comparative-study
  title: "Порівняльне дослідження: Дві концепції історії"
  instruction: "Порівняйте російську імперську схему історії та українську національну концепцію Михайла Грушевського."
  items_to_compare:
    - "Схема Карамзіна-Погодіна (російська імперська)"
    - "Концепція Михайла Грушевського (національна українська)"
  criteria:
    - "Головний об'єкт дослідження"
    - "Спадкоємець Київської держави"
    - "Географія історичного розвитку"
  prompt: "Опишіть фундаментальні відмінності між цими двома концепціями за наведеними критеріями."
  model_answer: "У російській схемі головним об'єктом є держава і монарх, тоді як у Грушевського — український народ (етнос). Імперська схема стверджує, що спадщина Києва перейшла до Москви, а Грушевський доводить, що вона органічно перейшла до Галицько-Волинського князівства. За Грушевським, історичний розвиток нерозривно прив'язаний до території і є безперервним, тоді як імперська школа вважала можливою міграцію культурного і політичного центру на північ."

- type: essay-response
  title: "Есе-відповідь: Деколонізаційна спадщина"
  instruction: "Напишіть розгорнуте аналітичне есе на задану тему."
  prompt: "Чому історична концепція Михайла Грушевського вважається нашою найголовнішою інтелектуальною зброєю в сучасній війні? Яким чином вона деконструює пропагандистські міфи?"
  min_words: 250
  model_answer: "Концепція Грушевського є потужною зброєю, оскільки вона забирає у російського імперіалізму його головний ідеологічний фундамент — претензію на київську спадщину. Довівши безперервність українського історичного процесу на власній землі, історик зруйнував міф про те, що росіяни є прямими нащадками Київської Русі. Це позбавляє сучасну Росію права на 'повернення історичних земель' і доводить її статус як окремого утворення з фіно-угорськими та північнослов'янськими коренями. Сьогодні, коли агресор виправдовує війну псевдоісторичними заявами, науково обґрунтована схема Грушевського надає українцям залізні аргументи власної самодостатності."
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Глибоке розкриття суті концепції Грушевського та її впливу на деколонізацію."
      points: 10
    - criteria: "Структура есе"
      description: "Логічна послідовність викладу, наявність вступу, основної частини та висновків."
      points: 5
    - criteria: "Використання термінології"
      description: "Доречне застосування історичних термінів."
      points: 5