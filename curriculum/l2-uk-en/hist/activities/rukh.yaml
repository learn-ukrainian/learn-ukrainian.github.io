- type: reading
  id: reading-rukh-program
  title: "Первинне джерело: Звернення до громадян"
  source: "З програмних документів Народного руху України"
  instruction: "Прочитайте уривок з документу та дайте відповіді на запитання."
  text: |
    Народний рух України — це форма масової самоорганізації громадян.
    Ми виступаємо за повну державну незалежність, створення демократичної 
    багатопартійної системи та забезпечення рівних прав для всіх національних 
    меншин. Наш шлях — це мирний перехід від тоталітаризму до вільного суспільства, 
    де закон є найвищою цінністю.
  tasks:
    - "Якою була головна політична мета організації згідно з цим текстом?"
    - "Які права гарантувалися представникам інших національностей?"
    - "Яким шляхом планувалося досягти змін у суспільстві?"
    - "Як ви розумієте фразу про масову самоорганізацію?"

- type: critical-analysis
  source_reading: reading-rukh-program
  title: "Критичний аналіз: Еволюція ідей Руху"
  instruction: "Проаналізуйте зміну програмних вимог Народного руху."
  target_text: "Від вимог перебудови в рамках СРСР до проголошення незалежності."
  questions:
    - "Чому перша програма Руху містила згадки про оновлення соціалізму?"
    - "Який фактор став вирішальним для переходу від культурних вимог до політичних?"
    - "Як екологічні проблеми сприяли політизації суспільства?"
    - "Чому інтелігенція (зокрема письменники) очолила цей рух?"
    - "Як вплинув досвід інших країн на українські події?"

- type: true-false
  title: "Правда чи вигадка: Факти про Рух"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Народний рух України виник виключно як партія для захисту екології."
      correct: false
      explanation: "Хоча екологічний фактор був важливим, Рух швидко став політичною силою з вимогами незалежності."
    - statement: "Установчий з'їзд Руху відбувся у Києві восени 1989 року."
      correct: true
      explanation: "З'їзд пройшов 8-10 вересня 1989 року в актовій залі КПІ."
    - statement: "Радянська влада активно підтримувала створення Руху."
      correct: false
      explanation: "Влада чинила шалений опір, а КДБ намагався дискредитувати рухівців як екстремістів."
    - statement: "Першим головою Народного руху був обраний Іван Драч."
      correct: true
      explanation: "Іван Драч був компромісною фігурою, яка об'єднала різні крила організації."
    - statement: "Акція Живий ланцюг з'єднала Київ та Москву."
      correct: false
      explanation: "Ланцюг з'єднав Івано-Франківськ, Львів та Київ як символ соборності України."
    - statement: "Демократичний блок зазнав повної поразки на виборах 1990 року."
      correct: false
      explanation: "Блок здобув переконливу перемогу в п'яти областях і сформував опозицію в парламенті."
    - statement: "У Верховній Раді рухівці створили опозиційну групу Народна Рада."
      correct: true
      explanation: "Цю групу очолив академік Ігор Юхновський."
    - statement: "В'ячеслав Чорновіл належав до еволюційного крила Руху."
      correct: false
      explanation: "Чорновіл був лідером радикального крила, яке вимагало негайного виходу з СРСР."
    - statement: "Рух виступав за надання рівних прав усім національним меншинам."
      correct: true
      explanation: "Це було закріплено у Відозві до усіх людей доброї волі."
    - statement: "Акт незалежності України був підтверджений на референдумі 1 грудня."
      correct: true
      explanation: "Понад 90 відсотків громадян підтримали незалежність завдяки активній агітації Руху."

- type: essay-response
  source_reading: reading-rukh-program
  title: "Есе: Роль Руху у здобутті незалежності"
  instruction: "Напишіть розгорнуту відповідь на запитання."
  prompt: "Яку роль відіграв Народний рух України у здобутті незалежності у 1991 році? Чи була б можлива незалежність без цієї масової самоорганізації? Обґрунтуйте свою думку."
  min_words: 150
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чіткої тези та підкріплення її історичними фактами."
      points: 5
    - criteria: "Використання лексики"
      description: "Доречне використання політичної термінології рівня B2."
      points: 3
    - criteria: "Структура тексту"
      description: "Логічний виклад думок: вступ, основна частина, висновок."
      points: 2

- type: comparative-study
  title: "Порівняльний аналіз: Лідери Руху"
  instruction: "Порівняйте політичний стиль різних крил Народного руху."
  items_to_compare:
    - "Крило письменників (Іван Драч, Дмитро Павличко)"
    - "Крило дисидентів (В'ячеслав Чорновіл, Михайло Горинь)"
  criteria:
    - "Головна політична мета на початковому етапі"
    - "Стиль боротьби та методи досягнення цілей"
    - "Ставлення до радянської влади та компромісів"
  prompt: "Проаналізуйте, як поєднання цих двох підходів вплинуло на ефективність організації та її масову підтримку."