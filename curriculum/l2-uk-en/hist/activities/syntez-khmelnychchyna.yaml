- type: reading
  id: reading-bereznevi
  title: "Первинне джерело: Березневі статті"
  source: "Березневі статті 1654 року"
  text: |
    Козацька держава зберігає повну внутрішню автономію, власний адміністративний устрій, свою податкову систему та незалежне судочинство. Козацький реєстр фіксується на рівні 60 тисяч осіб. Гетьманщина має право на самостійну міжнародну політику, за винятком Речі Посполитої та Османської імперії.
  instruction: "Прочитайте уривок документа, щоб відповісти на наступні запитання."
  tasks:
    - "У чому полягали основні пункти автономії Гетьманщини?"
    - "Які обмеження накладалися на міжнародну політику Козацької держави?"

- type: critical-analysis
  source_reading: "reading-bereznevi"
  instruction: "Дайте розгорнуті відповіді на запитання щодо Березневих статей."
  title: "Аналіз договору"
  target_text: "Березневі статті 1654 року"
  questions:
    - "Як українська старшина розуміла цей договір порівняно з московським урядом?"
    - "Чи можна назвати цей договір втратою державної незалежності України?"
    - "Яке значення мало збереження права на власну дипломатію для гетьмана?"
  model_answers:
    - "Українська старшина розглядала його як військову конфедерацію чи васалітет, тоді як Москва сприймала як інкорпорацію."
    - "Ні, оскільки зберігалися всі ознаки державності: армія, податки, суд та дипломатія."
    - "Це засвідчувало статус Гетьманщини як повноцінного суб'єкта міжнародного права."
  focus_points:
    - "Конфедерація проти інкорпорації"
    - "Ознаки державного суверенітету"

- type: comparative-study
  title: "Зборівський та Білоцерківський договори"
  instruction: "Порівняйте умови двох мирних угод."
  items_to_compare:
    - "Зборівський договір 1649 року"
    - "Білоцерківський договір 1651 року"
  criteria:
    - "Територія автономії"
    - "Кількість козацького реєстру"
    - "Право на зовнішню політику"
  prompt: "Проаналізуйте, як поразка під Берестечком вплинула на політичні здобутки Козацької держави."
  model_answer: "Зборівський договір надавав автономію на трьох воєводствах і 40-тисячний реєстр, тоді як Білоцерківський залишив лише одне Київське воєводство та скоротив реєстр удвічі. Це був значний геополітичний відступ, хоча й тимчасовий."

- type: true-false
  title: "Факти чи міфи"
  instruction: "Визначте, які твердження є правдивими, а які — хибними."
  items:
    - statement: "Козацька революція ставила за мету лише відновлення старих привілеїв реєстрового козацтва."
      correct: false
      explanation: "Козацька революція мала на меті докорінну зміну соціального ладу та створення власної держави."
    - statement: "Берестейська унія 1596 року стала однією з причин зростання соціальної напруги в суспільстві."
      correct: true
      explanation: "Утиски православної церкви після унії викликали глибоке обурення українців."
    - statement: "Особиста образа Хмельницького на Чаплинського була головною причиною Національно-визвольної війни."
      correct: false
      explanation: "Це було лише приводом, тоді як справжні причини крилися в соціальному, релігійному та національному гніті."
    - statement: "Зборівський договір визнавав автономію Гетьманщини на території трьох воєводств."
      correct: true
      explanation: "Автономія охоплювала Київське, Чернігівське та Брацлавське воєводства."
    - statement: "Битва під Берестечком закінчилася тріумфальною перемогою українсько-татарського війська."
      correct: false
      explanation: "Це була найтяжча поразка української армії через несподіваний відступ кримського хана."
    - statement: "Згідно з Березневими статтями, козаки зберігали право самостійно обирати свого гетьмана."
      correct: true
      explanation: "Москва не мала права призначати або навіть погоджувати кандидатуру гетьмана."
    - statement: "Переяславська рада була актом добровільного інкорпорування Козацької держави до складу Московського царства."
      correct: false
      explanation: "Це був суто прагматичний військовий союз проти спільного зовнішнього ворога."
    - statement: "Московський цар підтвердив права козаків власною присягою під час Переяславської ради."
      correct: false
      explanation: "Московські посли категорично відмовилися присягати, оскільки цар вважався абсолютним монархом."
    - statement: "Віленське перемир'я 1656 року стало прямим порушенням союзницьких зобов'язань з боку Москви."
      correct: true
      explanation: "Москва уклала сепаратний мир з Річчю Посполитою без участі української дипломатичної делегації."
    - statement: "Покозачення означало масовий перехід селян у козацький стан для здобуття особистої свободи."
      correct: true
      explanation: "Це був потужний соціальний ліфт, який фактично знищував кріпацтво на визволених територіях."

- type: essay-response
  title: "Деколонізаційний погляд на Хмельниччину"
  instruction: "Напишіть коротке есе, спираючись на матеріали модуля."
  prompt: "Спростуйте міф про так зване возз'єднання братніх народів. Наведіть аргументи, що доводять прагматичний характер рішень Богдана Хмельницького та суб'єктність Козацької держави на міжнародній арені."
  min_words: 150
  model_answer: "Міф про возз'єднання був створений в імперський період для виправдання поглинання України. Насправді у 1654 році Хмельницький уклав з Москвою виключно прагматичний військовий союз проти Польщі, при цьому зберігаючи всі ознаки держави: національну армію, податкову систему та власну дипломатію. Він розглядав цю угоду як військову конфедерацію чи васалітет, а не злиття. Коли Московське царство зрадило Україну, підписавши Віленське перемир'я у 1656 році, гетьман одразу почав шукати нових союзників, ведучи переговори зі Швецією та Трансільванією. Це доводить, що він діяв виключно в національних інтересах, захищаючи державний суверенітет."
  rubric:
    - criteria: "Історична аргументація"
      description: "Наявність чітких доказів прагматичного характеру рішень гетьмана."
      points: 40
    - criteria: "Критичне мислення"
      description: "Уміння аналізувати імперські міфи та спростовувати їх фактами."
      points: 30
    - criteria: "Стиль та лексика"
      description: "Використання академічного стилю та відповідної історичної термінології."
      points: 30