- type: reading
  id: reading-statut
  title: 'Первинне джерело: Литовський Статут (1529)'
  source: 'Перший Литовський Статут'
  text: |
    Ми, великий князь, обіцяємо і присягаємо, що нікого не будемо карати ні на горло, ні на честь, ні на маєток, без суду і доведення провини. А також усі земські уряди мають бути роздані тільки місцевим жителям. А писар земський має по-руськи, а не іншою мовою, всі листи і вироки писати.
  tasks:
    - 'Які гарантії недоторканності особи надає цей документ?'
    - 'Як закріплюється статус руської мови?'
  instruction: 'Прочитайте уривок і підготуйтеся до аналізу.'

- type: critical-analysis
  title: 'Аналіз: Принцип договірної монархії'
  source_reading: reading-statut
  instruction: 'Проаналізуйте уривок зі Статуту.'
  target_text: 'нікого не будемо карати ні на горло, ні на честь, ні на маєток, без суду і доведення провини'
  questions:
    - 'Як цей принцип обмежує владу монарха?'
    - 'У чому полягає відмінність цього підходу від східного деспотизму?'
  model_answers:
    - 'Цей принцип гарантує презумпцію невинуватості та захист від свавілля. Монарх не має абсолютної влади над життям підданих.'
    - 'У східних деспотіях (наприклад, Московському царстві) всі жителі вважалися холопами царя, і монарх міг стратити будь-кого без суду.'
  focus_points:
    - 'Верховенство права'
    - 'Захист приватної власності'

- type: essay-response
  title: 'Есе: Литва і Русь'
  source_reading: reading-statut
  instruction: 'Напишіть аналітичне есе.'
  prompt: 'Поясніть феномен оксамитового проникнення Литви на українські землі. Чому руська культура та мова стали домінантними у Великому князівстві Литовському?'
  min_words: 150
  model_answer: 'Литва, будучи менш культурно розвиненою на момент експансії, природно перейняла вищу руську культуру, право (Руська Правда) та православну віру. Принцип старого не рушимо дозволив українським елітам добровільно інтегруватися в нову державу.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Чітке пояснення причин культурної домінації Русі.'
      points: 5
    - criteria: 'Використання джерел'
      description: 'Посилання на принцип старого не порушуємо.'
      points: 5

- type: comparative-study
  title: 'Порівняння: Дві моделі державності'
  source_reading: reading-statut
  instruction: 'Порівняйте дві політичні системи.'
  items_to_compare:
    - 'Велике князівство Литовське'
    - 'Московське царство'
  criteria:
    - 'Джерело влади (договірна чи сакральна)'
    - 'Права підданих (шляхта чи холопи)'
    - 'Роль права у суспільстві'
  prompt: 'Зіставте європейську договірну модель Литовсько-Руської держави та деспотичну модель Московії.'
  model_answer: 'Литовська держава базувалася на договірних відносинах, де влада монарха обмежувалася законом (Литовські статути) та парламентом (сейм). У Московії ж сформувалася деспотична модель, де цар мав абсолютну владу, а всі жителі розглядалися як його безправні раби (холопи).'

- type: true-false
  title: 'Перевірка фактів: Литовсько-Руська доба'
  instruction: 'Визначте, чи є ці твердження істинними чи хибними.'
  items:
    - statement: 'Битва на Синіх Водах поклала край прямому пануванню Золотої Орди над більшістю українських земель.'
      correct: true
      explanation: 'Ця битва 1362 року дозволила звільнити Київщину та Поділля від ординців.'
    - statement: 'Офіційною мовою Великого князівства Литовського була литовська мова.'
      correct: false
      explanation: 'Офіційною державною мовою була руська (староукраїнська) мова.'
    - statement: 'Принцип старого не порушуємо, нового не вводимо означав повну заборону будь-яких реформ.'
      correct: false
      explanation: 'Цей принцип гарантував збереження існуючих прав, релігії та звичаїв приєднаних руських земель.'
    - statement: 'Магдебурзьке право надавало українським містам можливість самоврядування.'
      correct: true
      explanation: 'Міста звільнялися від юрисдикції феодалів і мали власні органи влади.'
    - statement: 'Перший Литовський Статут був написаний латинською мовою.'
      correct: false
      explanation: 'Він був написаний руською (староукраїнською) мовою.'
    - statement: 'Князі Острозькі були ревними захисниками католицької віри на українських землях.'
      correct: false
      explanation: 'Вони були головними захисниками православної церкви та руської культури.'
    - statement: 'Руська шляхта мала право на недоторканність особи і майна без рішення суду.'
      correct: true
      explanation: 'Ці права були чітко прописані в Литовських статутах.'
    - statement: 'Велике князівство Литовське було абсолютною монархією східного типу.'
      correct: false
      explanation: 'Воно було станово-представницькою монархією, де влада князя обмежувалася законом.'
    - statement: 'Литовські статути містили норми перейняті з Руської Правди.'
      correct: true
      explanation: 'Вони органічно продовжували правову традицію Київської Русі.'
    - statement: 'Більшість населення Великого князівства Литовського становили етнічні литовці.'
      correct: false
      explanation: 'До дев''яноста відсотків населення становили слов''яни (предки українців і білорусів).'