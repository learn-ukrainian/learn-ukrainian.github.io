- type: reading
  id: reading-franko
  title: 'Первинне джерело: Звернення Івана Франка'
  source: Іван Франко, пролог до поеми Мойсей
  text: 'Народе мій, замучений, розбитий,

    Мов паралітик той на роздорожжу,

    Людським презирством, ніби струпом, вкритий!

    Твоїм будущим душу я тривожу...

    Та прийде час, і ти огнистим видом

    Засяєш у народів вольних колі,

    Труснеш Кавказ, впережешся Бескидом,

    Покотиш чорним яром гомін волі.

    '
  tasks:
  - Прочитайте уривок з прологу до поеми.
  - Зверніть увагу на емоційний стан ліричного героя.
- type: essay-response
  source_reading: reading-franko
  title: 'Аналітичне есе: Роль літератури в націєтворенні'
  prompt: Напишіть есе, у якому проаналізуйте, яким чином Франко використовував поезію
    як інструмент політичного пробудження. Як уривок з прологу відображає його бачення
    майбутнього України?
  min_words: 150
  model_answer: У пролозі до поеми Франко виступає не лише як поет, а як політичний
    пророк. Він жорстко критикує поточний стан нації, порівнюючи її з паралітиком.
    Але ця критика має на меті пробудити гідність. Він прогнозує, що народ зможе стати
    вільним і рівним серед інших. Це є класичним прикладом того, як література замінювала
    політичну діяльність в умовах відсутності власної держави.
  rubric:
  - criteria: Аналіз ролі
    description: Наведено переконливі аргументи про те, як Франко використовував літературу.
    points: 10
  - criteria: Робота з текстом
    description: Есе містить прямі відсилання до запропонованого уривку.
    points: 10
- type: reading
  id: reading-lesia
  title: 'Первинне джерело: Монолог Оксани'
  source: Леся Українка, поема Бояриня
  text: "Чи ж тут не тая ж тюрма?\nТільки що більша?\n...\nВсе тільки цар волив, та\
    \ цар волив, \nа самі хіба не мають волі?\nРаби, невільники! У нас в Україні\n\
    не так було, не так би ми жили!\n"
  tasks:
  - Проаналізуйте монолог Оксани.
  - Зверніть увагу на порівняння двох політичних традицій.
- type: critical-analysis
  source_reading: reading-lesia
  title: 'Критичний аналіз: Деколонізаційний контекст драми Лесі Українки'
  questions:
  - Який головний політичний конфлікт розкривається в монолозі Оксани?
  - Чому Леся Українка звертається до історичного минулого для критики імперії?
  - Як монолог Оксани руйнує міф про спільну колиску українців та росіян?
  model_answers:
  - У монолозі розкривається глибинний ціннісний конфлікт між українською традицією
    волі та московською традицією тотального підкорення царю (рабством).
  - Через цензуру письменниця не могла прямо критикувати сучасну їй Російську імперію.
    Історичні декорації дозволяли піднімати гострі політичні проблеми безпечно.
  - Монолог підкреслює абсолютну ментальну прірву між двома народами, показуючи, що
    українська героїня задихається в московському середовищі.
  focus_points:
  - Аналіз ментальної прірви між Україною та Росією.
  - Розуміння езопівської мови в умовах цензури.
- type: true-false
  title: 'Перевірка розуміння фактів: Франко, Леся, Грінченко'
  items:
  - statement: Наприкінці дев'ятнадцятого століття література в Україні виконувала
      виключно розважальну функцію.
    correct: false
    explanation: Література перебрала на себе функції держави та стала потужним інструментом
      націєтворення.
  - statement: Іван Франко у своїй поемі закликав лише до руйнування старих порядків,
      не пропонуючи розбудови.
    correct: false
    explanation: Образ Каменяра символізує важку, щоденну працю будівничих нації,
      а не сліпих руйнівників.
  - statement: Іван Франко написав статтю Що таке поступ?, у якій різко критикував
      теорію марксизму.
    correct: true
    explanation: Він геніально передбачив, що спроби побудувати комунізм призведуть
      до появи тоталітарної диктатури.
  - statement: Леся Українка в своїй драматургії використовувала переважно традиційні
      сільські та етнографічні сюжети.
    correct: false
    explanation: Вона стала творцем жанру драми ідей, використовуючи античні, середньовічні
      та ранньохристиянські сюжети.
  - statement: У своїй драмі Камінний господар Леся Українка кинула виклик європейській
      класиці, запропонувавши власне трактування образу Дон Жуана.
    correct: true
    explanation: Це був новаторський крок, який вивів українську літературу на європейський
      рівень.
  - statement: Важка фізична хвороба Лесі Українки змусила її зосередитися виключно
      на написанні сумних, песимістичних віршів.
    correct: false
    explanation: Хвороба стала каталізатором її сили духу, що яскраво проявилося у
      вірші Contra spem spero.
  - statement: Борис Грінченко уклав фундаментальний чотиритомний словник, який зафіксував
      багатство української мови.
    correct: true
    explanation: Цей словник налічував понад шістдесят вісім тисяч слів і став справжнім
      паспортом української нації.
  - statement: Російська імперська влада активно фінансувала та підтримувала створення
      Словника української мови Бориса Грінченка.
    correct: false
    explanation: Словник створювався виключно завдяки приватним благодійним ініціативам
      українських меценатів.
  - statement: Борис Грінченко та його дружина принципово виховували свою доньку виключно
      в україномовному середовищі.
    correct: true
    explanation: Це був унікальний для русифікованого Києва експеримент, який завершився
      повним успіхом.
  - statement: Франко, Леся Українка та Грінченко намагалися інтегрувати українську
      культуру в Європу через посередництво російської культури.
    correct: false
    explanation: Вони свідомо налагоджували прямий діалог із європейським культурним
      простором, оминаючи Росію як посередника.
  instruction: Визначте, чи твердження правильне.
