- type: reading
  id: reading-universals
  title: "Первинне джерело: Еволюція Універсалів"
  source: "Тексти державних актів Центральної Ради"
  instruction: "Прочитайте уривки з Універсалів та проаналізуйте зміну політичних вимог."
  text: |
    Перший Універсал: "Хай буде Україна вільною. Не одділяючись від всієї Росії, не розриваючи з державою Російською, хай народ український на своїй землі має право сам порядкувати своїм життям."
    Четвертий Універсал: "Однині Українська Народна Республіка стає самостійною, ні від кого не залежною, вільною, суверенною державою Українського Народу."
  tasks:
    - "Проаналізуйте, як змінилася риторика лідерів Центральної Ради."

- type: critical-analysis
  title: "Аналіз еволюції політичної думки"
  source_reading: reading-universals
  instruction: "Дайте відповіді на запитання на основі прочитаних уривків з Універсалів."
  questions:
    - "Які зовнішні та внутрішні фактори змусили Центральну Раду відмовитися від ідеї автономії?"
    - "Чому ідея федеративної Росії виявилася трагічною ілюзією для українських соціалістів?"
  model_answers:
    - "Відкрита військова агресія більшовиків, загроза Києву та необхідність підписання Брест-Литовського миру як незалежної держави змусили відмовитися від автономії."
    - "Більшовики на словах декларували право націй на самовизначення, а на практиці розпочали гібридну війну та терор, прагнучи зберегти імперію."

- type: true-false
  title: "Перевірка фактів: Центральна Рада"
  instruction: "Визначте, чи є ці твердження правдивими чи хибними."
  items:
    - statement: "Лютнева революція в Петрограді стала каталізатором національного відродження в Україні."
      correct: true
      explanation: "Повалення монархії відкрило можливості для відкритої політичної боротьби."
    - statement: "Михайло Грушевський був лідером радикальних самостійників і вимагав негайної незалежності."
      correct: false
      explanation: "Грушевський був поміркованим діячем і тривалий час підтримував ідею федеративної Росії."
    - statement: "Перший Універсал проголошував повну державну незалежність України від Росії."
      correct: false
      explanation: "Перший Універсал вимагав лише національно-територіальної автономії."
    - statement: "Генеральний Секретаріат став першим українським урядом, який очолив Володимир Винниченко."
      correct: true
      explanation: "Генеральний Секретаріат був створений як виконавчий орган влади після Першого Універсалу."
    - statement: "Другий Універсал був компромісом, за яким Центральна Рада відмовлялася від самочинної автономії."
      correct: true
      explanation: "Цей крок викликав обурення самостійників, зокрема полку імені Полуботка."
    - statement: "Третій Універсал проголосив створення УНР після більшовицького перевороту в Росії."
      correct: true
      explanation: "УНР була проголошена у відповідь на загрозу більшовицького хаосу."
    - statement: "Четвертий Універсал остаточно і беззастережно проголосив незалежність України."
      correct: true
      explanation: "Він розривав будь-які політичні чи юридичні зв'язки з російським центром."
    - statement: "Центральна Рада змогла швидко створити потужну регулярну армію для захисту Києва."
      correct: false
      explanation: "Соціалістичне керівництво УЦР не довіряло регулярній армії, що призвело до трагедії під Крутами."
    - statement: "Брест-Литовський мир допоміг вигнати більшовиків, але призвів до залежності від німецьких військ."
      correct: true
      explanation: "Союзники надали військову допомогу, яка фактично перетворилася на окупацію."
    - statement: "Конституція УНР була прийнята після того, як Павло Скоропадський прийшов до влади."
      correct: false
      explanation: "Конституція УНР була ухвалена Центральною Радою в останній день її існування, перед переворотом."

- type: comparative-study
  title: "Порівняння політичних концепцій"
  source_reading: reading-universals
  instruction: "Порівняйте політичні позиції Центральної Ради на початку та в кінці її діяльності."
  items_to_compare:
    - "Ідея автономії (Перший Універсал)"
    - "Ідея повної незалежності (Четвертий Універсал)"
  criteria:
    - "Ставлення до імперського центру"
    - "Міжнародний статус України"
    - "Головні зовнішні загрози на момент ухвалення"
  prompt: "Поясніть, як змінилися ці три аспекти за неповний рік революції."
  model_answer: "Ставлення до центру еволюціонувало від прагнення до діалогу з урядом Росії до повного розриву через більшовицький терор. Міжнародний статус змінився від внутрішньої автономії до суб'єкта міжнародного права. Загрози перетворилися з політичного тиску на відкриту військову агресію."

- type: essay-response
  title: "Есе: Еволюція державності"
  source_reading: reading-universals
  instruction: "Напишіть розгорнуту відповідь на запитання."
  prompt: "Проаналізуйте еволюцію політичних поглядів лідерів Центральної Ради від проголошення автономії до незалежності. Які внутрішні та зовнішні чинники відіграли вирішальну роль у цій трансформації?"
  min_words: 150
  model_answer: "Еволюція поглядів Центральної Ради була зумовлена жорстокою реальністю. На початку лідери щиро вірили у можливість створення демократичної федерації з Росією, що відображено у Першому Універсалі. Однак агресивна політика Тимчасового уряду, а згодом — збройний переворот більшовиків і їхній відкритий наступ на Київ, зруйнували ці ілюзії. Третій Універсал став перехідним етапом, проголосивши УНР, але ще у зв'язку з Росією. Вирішальним чинником стала військова агресія більшовиків та необхідність укласти мирний договір у Брест-Литовську. Щоб виступати на міжнародній арені як повноправний суб'єкт, Україна мала бути повністю суверенною. Тому Четвертий Універсал став актом фізичного та політичного виживання нації."
  rubric:
    - criteria: "Аналіз чинників"
      description: "Чітко визначені та пояснені зовнішні і внутрішні причини трансформації."
      points: 5
    - criteria: "Історичний контекст"
      description: "Наведено приклади з різних Універсалів та подій (агресія, Брестський мир)."
      points: 5