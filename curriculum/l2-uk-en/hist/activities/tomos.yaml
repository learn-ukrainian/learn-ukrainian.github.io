- type: reading
  id: reading-tomos
  title: "Первинне джерело: Патріарший і Синодальний Томос"
  source: "Текст Томосу про автокефалію Православної Церкви України"
  text: |
    Відтепер ця автокефальна Церква, створена та встановлена в межах суверенної держави Україна... є нашою духовною донькою та отримує всі привілеї та суверенні права, що належать такій Церкві.
  instruction: "Уважно прочитайте уривок з офіційного документа для подальшого аналізу."

- type: critical-analysis
  source_reading: reading-tomos
  title: "Аналіз патріаршого документа"
  instruction: "Проаналізуйте наведений уривок з Томосу."
  target_text: "Текст Томосу про автокефалію"
  questions:
    - "Яке значення має використання терміна духовна донька у тексті документа?"
    - "Як фраза про межі суверенної держави Україна руйнує концепцію канонічної території імперії?"
    - "Чому було важливо чітко артикулювати відмову від московського материнства?"
  model_answers:
    - "Цей термін підкреслює, що материнською структурою є Константинополь, а не Москва, скасовуючи багатовіковий міф."
    - "Вона прив'язує юрисдикцію до визнаних міжнародних кордонів, заперечуючи транснаціональні амбіції північного сусіда."
    - "Це позбавляло Росію будь-яких юридичних чи історичних підстав для втручання у внутрішні справи українського православ'я."

- type: essay-response
  source_reading: reading-tomos
  title: "Есе: Автокефалія та державний суверенітет"
  instruction: "Напишіть розгорнуту відповідь на запропоновану тему."
  prompt: "Спираючись на текст Томосу та історичний контекст, поясніть концепцію Незалежна держава — незалежна церква. Чому здобуття автокефалії стало питанням національної безпеки для України?"
  min_words: 150
  model_answer: "Здобуття автокефалії є невіддільним елементом повноцінного державного суверенітету. Століттями Російська імперія використовувала релігійні структури як інструмент асиміляції та контролю над свідомістю українців, нав'язуючи концепцію триєдиного народу. Отримання Томосу не лише відновило історичну справедливість, ліквідувавши наслідки незаконної анексії тисяча шістсот вісімдесят шостого року, але й зруйнувало механізм імперського впливу. Тепер Україна має незалежну інституцію, яка визнана у світі та діє виключно в інтересах власного народу, що є критично важливим для національної безпеки в умовах гібридної війни."
  rubric:
    - criteria: "Історичний контекст"
      description: "Згадка про події тисяча шістсот вісімдесят шостого року та наслідки підпорядкування."
      points: 10
    - criteria: "Аналіз концепції"
      description: "Пояснення зв'язку між церковною та державною незалежністю."
      points: 10

- type: comparative-study
  title: "Порівняльний аналіз: Дві моделі православ'я"
  instruction: "Порівняйте українську та російську церковні традиції за наведеними критеріями."
  items_to_compare:
    - "Українське православ'я"
    - "Російське православ'я"
  criteria:
    - "Ставлення до державної влади та політичного контролю"
    - "Модель внутрішнього управління"
    - "Відкритість до європейського простору та освіти"
  prompt: "Опишіть фундаментальні відмінності між цими двома традиціями, використовуючи історичні факти."
  model_answer: "Українська традиція історично базувалася на соборності, глибокій повазі до освіти та залученні мирян до управління. Вона зберігала демократичний світогляд та зв'язок з Європою. Натомість московська модель формувалася в умовах ізоляціонізму, жорсткого підпорядкування державному апарату та авторитаризму. Сучасний Статут ПЦУ втілює європейські демократичні засади, тоді як РПЦ залишається інструментом імперського впливу та політичного контролю."

- type: true-false
  title: "Перевірка фактів: Історія боротьби за автокефалію"
  instruction: "Визначте, чи є наведені твердження правдивими або хибними."
  items:
    - statement: "Київська митрополія була заснована у дев'ятсот вісімдесят восьмому році і є справжньою Матір'ю-Церквою для московського православ'я."
      correct: true
      explanation: "Київська традиція значно давніша за московську."
    - statement: "Москва отримала автокефалію у п'ятнадцятому столітті за офіційною згодою Константинополя."
      correct: false
      explanation: "Москва самовільно проголосила автокефалію і перебувала в ізоляції сто сорок один рік."
    - statement: "Передача права висвячення Київського митрополита у тисяча шістсот вісімдесят шостому році супроводжувалася банальною корупцією."
      correct: true
      explanation: "Патріарх Діонісій Четвертий отримав хабар соболями та золотом."
    - statement: "Після отримання Томосу Українська Церква отримала право відкривати власні парафії по всьому світу."
      correct: false
      explanation: "Згідно з Томосом, українська діаспора підпорядковується структурам Вселенського патріархату."
    - statement: "Об'єднавчий собор у дві тисячі вісімнадцятому році відбувся у величній Софії Київській."
      correct: true
      explanation: "Ця локація підкреслювала історичну спадкоємність від епохи Київської Русі."
    - statement: "Російська влада активно і всебічно підтримувала процес надання автокефалії Україні."
      correct: false
      explanation: "Росія розгорнула масштабну агресію, шантаж та кібератаки, щоб зірвати цей процес."
    - statement: "Митрополита Епіфанія обрали предстоятелем через його тісні та давні зв'язки з радянським минулим."
      correct: false
      explanation: "Епіфаній був молодим лідером без темного радянського минулого."
    - statement: "У дві тисячі двадцять третьому році відбувся історичний перехід на новоюліанський календар."
      correct: true
      explanation: "Це рішення синхронізувало український святковий ритм із цивілізованою Європою."
    - statement: "Термін розкол російська пропаганда використовувала виключно у суто богословському значенні."
      correct: false
      explanation: "Цей термін був агресивним політичним інструментом для маргіналізації українців."
    - statement: "Отримання грамоти гарантувало новоствореній інституції п'ятнадцяте місце в Диптиху."
      correct: true
      explanation: "Це забезпечило статус повноцінної та рівноправної автокефальної інституції."