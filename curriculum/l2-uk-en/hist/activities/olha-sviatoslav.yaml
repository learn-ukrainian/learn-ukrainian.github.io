- type: reading
  id: reading-povist
  title: 'Літопис про реформи княгині Ольги'
  source: 'Повість минулих літ'
  instruction: 'Прочитайте уривок з літопису та підготуйтеся до аналізу тексту.'
  text: |
    І пішла Ольга по древлянській землі з сином своїм і з дружиною, встановлюючи устави й уроки. І існують становища її й ловища... І пішла вона до Новгорода, і встановила по Мсті погости і данину, і по Лузі оброки і данину. І ловища її є по всій землі, і знаки, і місця, і погости.

- type: critical-analysis
  source_reading: reading-povist
  title: 'Аналіз літописного джерела'
  instruction: 'Проаналізуйте наведений уривок з літопису.'
  questions:
    - 'Які саме терміни вказують на інституціоналізацію збору податків?'
    - 'Чому літописець так детально перераховує місця, де Ольга встановила свої знаки?'
    - 'Як цей текст контрастує з попередньою практикою полюддя?'
  focus_points:
    - 'Термінологія державного управління'
    - 'Територіальне охоплення реформ'
    - 'Економічна централізація'

- type: comparative-study
  title: 'Порівняльний аналіз: Ольга та Святослав'
  instruction: 'Порівняйте політичні підходи двох правителів Русі.'
  items_to_compare:
    - 'Княгиня Ольга'
    - 'Князь Святослав'
  criteria:
    - 'Основний інструмент політики (дипломатія чи війна)'
    - 'Ставлення до адміністративної системи'
    - 'Зовнішньополітичні пріоритети'
    - 'Ставлення до релігії'
  prompt: 'На основі критеріїв створіть порівняльну таблицю та зробіть висновок, чий підхід був більш ефективним для розбудови держави.'

- type: true-false
  title: 'Перевірка фактів: Епоха Ольги та Святослава'
  instruction: 'Визначте, чи є твердження правдивими.'
  items:
    - statement: 'Княгиня Ольга віддавала перевагу жорсткій військовій силі.'
      correct: false
      explanation: 'Ольга віддавала перевагу дипломатії та інституційній розбудові держави.'
    - statement: 'Князь Святослав знищив Хозарський каганат.'
      correct: true
      explanation: 'Святослав розгромив Хозарію, ствердивши незалежність Києва.'
    - statement: 'Система полюддя була чітко регламентованим податком.'
      correct: false
      explanation: 'Полюддя було довільним збором данини, який нагадував звичайний грабіж.'
    - statement: 'Ольга запровадила фіксовані податки, які називалися уроки.'
      correct: true
      explanation: 'Уроки були фіксованим розміром данини, встановленим княгинею Ольгою.'
    - statement: 'Святослав прагнув перенести свою столицю на береги Дунаю.'
      correct: true
      explanation: 'Святослав хотів створити нову столицю в місті Переяславець.'
    - statement: 'Візантійські джерела описують Святослава як типового скандинавського вікінга.'
      correct: false
      explanation: 'Лев Диякон описував його з голеною головою та чубом, що нагадує степову традицію.'
    - statement: 'Помста Ольги над деревлянами була виключно емоційним кроком.'
      correct: false
      explanation: 'Помста була юридичним обов''язком для легітимізації влади в очах дружини.'
    - statement: 'Ольга успішно хрестила всю територію Київської Русі.'
      correct: false
      explanation: 'Ольга прийняла християнство особисто, але не змогла хрестити всю Русь через сильний опір.'
    - statement: 'Святослав загинув у битві з візантійцями біля стін міста Доростол.'
      correct: false
      explanation: 'Святослав загинув на дніпровських порогах у засідці печенігів.'
    - statement: 'Погости в епоху Ольги були укріпленими центрами влади.'
      correct: true
      explanation: 'Погости були місцями збору данини та опорними пунктами князівської влади.'

- type: essay-response
  title: 'Есе: Ольга чи Святослав?'
  instruction: 'Напишіть аргументоване есе на запропоновану тему.'
  prompt: 'Хто з правителів мав більший та довготриваліший вплив на розвиток держави - Ольга чи Святослав? Спирайтеся на конкретні факти.'
  min_words: 200
  rubric:
    - criteria: 'Історична аргументація'
      description: 'Використання конкретних фактів для підкріплення позиції.'
      points: 10
    - criteria: 'Аналіз наслідків'
      description: 'Оцінка довгострокових результатів правління обох лідерів.'
      points: 10
    - criteria: 'Структура есе'
      description: 'Наявність чіткого вступу, основної частини та логічного висновку.'
      points: 5