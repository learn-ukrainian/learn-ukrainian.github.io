- type: reading
  id: reading-nemyrych-speech
  title: "Первинне джерело: Маніфестація Юрія Немирича"
  source: "Промова на Варшавському сеймі (1659)"
  text: |
    Не з інших мотивів прийняли ми протекторат великого князя московського, як тільки щоб нашу свободу, кров'ю здобуту й освячену, могли заховати й по смерті передати потомкам нашим. Ми, як вільні до вільних і рівні до рівних, повертаємось.
  instruction: "Прочитайте уривок з промови Юрія Немирича."

- type: essay-response
  source_reading: reading-nemyrych-speech
  title: "Аналіз причин провалу європейського вибору"
  instruction: "Напишіть коротке есе, аналізуючи причини краху Гадяцької угоди."
  prompt: "Спираючись на текст модуля та уривок з промови Юрія Немирича, поясніть, чому проект Великого Князівства Руського, незважаючи на свою прогресивність та європейський характер, зазнав поразки? Яку роль у цьому відіграли внутрішній соціальний розкол та московська гібридна війна?"
  min_words: 200
  model_answer: "Проект Великого Князівства Руського зазнав поразки через комбінацію внутрішніх та зовнішніх факторів. З одного боку, це був елітарний проект, який не знаходив підтримки серед простих козаків та селян, що побоювалися повернення польських панів і кріпацтва. Цей соціальний розкол став слабким місцем, яким вміло скористалася Московія. Московська пропаганда та підкуп (гібридна війна) розпалили класову ворожнечу, підбуривши чернь проти гетьмана Виговського та Немирича, що призвело до внутрішнього повстання та краху угоди."
  rubric:
    - criteria: "Аргументація"
      description: "Чітко названі та пояснені внутрішні та зовнішні причини краху угоди."
      points: 10
    - criteria: "Використання термінології"
      description: "Доречне використання термінів: гібридна війна, соціальний розкол, шляхта."
      points: 5

- type: comparative-study
  title: "Порівняння політичних моделей: Переяслав та Гадяч"
  instruction: "Порівняйте дві ключові міжнародні угоди Гетьманщини."
  items_to_compare:
    - "Переяславська угода 1654 року (протекторат Москви)"
    - "Гадяцька угода 1658 року (союз із Річчю Посполитою)"
  criteria:
    - "Статус держави (залежність чи рівноправність)"
    - "Форма правління монарха (деспотія чи виборність)"
    - "Самостійність у внутрішніх справах та судах"
    - "Контроль над скарбницею та податками"
  prompt: "Проаналізуйте наведені критерії та зробіть висновок, яка з угод надавала Гетьманщині більше реального суверенітету та гарантій свобод."
  model_answer: "Гадяцька угода надавала незрівнянно більше суверенітету. На відміну від Переяслава, де Гетьманщина ставала залежною територією під абсолютною владою царя (деспотія), Гадяч пропонував рівноправне партнерство в конфедерації. Гадяцький трактат гарантував власну скарбницю, незалежні суди та виборність монарха, тоді як Москва постійно втручалася через воєвод і прагнула контролювати фінанси. Гадяч був поверненням до європейської правової моделі."

- type: critical-analysis
  title: "Атрибути Великого Князівства Руського"
  instruction: "Проаналізуйте складові державного проекту Юрія Немирича."
  questions:
    - "Які три народи мали утворити нову федерацію згідно з Гадяцькою угодою?"
    - "Які інституції та права гарантували економічну незалежність Великого Князівства Руського?"
    - "Чому Юрій Немирич приділяв таку велику увагу розвитку освіти та створенню академій?"
    - "Якою була головна гарантія від військової окупації князівства польськими військами?"
  model_answers:
    - "Федерацію мали утворити народи Корони Польської, Великого Князівства Литовського та Великого Князівства Руського."
    - "Економічна незалежність гарантувалася власною скарбницею, правом карбувати власну монету та залишенням усіх зібраних податків на потреби місцевого війська та адміністрації."
    - "Немирич, як інтелектуал, розумів, що без власної освіченої еліти держава залишиться провінцією. Освіта розглядалася як фундамент державності та запорука культурної автономії."
    - "Головною гарантією була сувора заборона польським та литовським військам переходити кордони Великого Князівства Руського без дозволу гетьмана."

