- type: reading
  id: reading-procopius-democracy
  title: Прокопій Кесарійський про устрій слов'ян
  text: |
    Ці племена, слов'яни і анти, не підлягають одній людині, а з давніх-давен живуть у демократії, тому про все, що для них корисне чи шкідливе, вони міркують спільно. І майже в усьому іншому обидва варварські народи здавна живуть однаково.

    Вони вважають, що тільки один Бог — творець блискавки — є владикою над усім, і йому приносять у жертву биків і всяких жертовних тварин. Долі вони не знають і взагалі не визнають, що вона має якусь силу над людьми, і коли їм загрожує смерть, охопленим хворобою, або на війні, вони дають обітницю, якщо врятуються, негайно принести Богу жертву за своє життя.
  instruction: Прочитайте уривок з «Війни з готами» Прокопія Кесарійського. Цей текст є основою для наступних аналітичних завдань.

- type: essay-response
  title: Антське народоправство vs Імперська ієрархія
  source_reading: reading-procopius-democracy
  prompt: |
    Прокопій Кесарійський, описуючи слов'ян, з подивом відзначає, що вони «не підлягають одній людині». Проаналізуйте, чому візантійському історику, вихованому в умовах абсолютної монархії, цей факт видався таким незвичайним.

    Порівняйте політичну культуру Антського союзу (віче, рада старійшин) з політичною системою Візантійської імперії або Готського королівства. Як, на вашу думку, цей ранній демократичний досвід вплинув на подальшу історію українського державотворення (Київська Русь, Козаччина)?
  min_words: 200
  model_answer: |
    > [!model-answer]
    Для Прокопія, як представника цивілізації, де влада імператора вважалася божественною і абсолютною, слов'янське народовладдя виглядало як хаос або дивина. У Візантії порядок забезпечувався суворою вертикаллю влади, тоді як у слов'ян порядок тримався на горизонтальних зв'язках і консенсусі громади («міркують спільно»).

    Антська модель була протодемократичною: князь був першим серед рівних, військовим лідером, а не деспотом. Його влада обмежувалася вічем. Це кардинально відрізняло антів від готів, де королі мали значно більшу владу, і тим більше від візантійців. Ця традиція обмеження влади і спільного прийняття рішень стала фундаментом української політичної культури, відродившись згодом у вічових традиціях Русі та козацьких радах, де гетьмана обирали голосуванням.

  rubric:
  - criteria: Аналіз джерела
    description: Пояснено здивування Прокопія через призму різниці політичних культур.
    points: 40
  - criteria: Історичні паралелі
    description: Проведено коректне порівняння з Візантією та подальшою українською історією.
    points: 30
  - criteria: Аргументація
    description: Чітко сформульовано думку про тяглість демократичної традиції.
    points: 30

- type: comparative-study
  title: "Склавіни та Анти: Два крила слов'янства"
  instruction: Порівняйте склавінів та антів за наведеними критеріями, використовуючи матеріали уроку.
  items_to_compare:
  - Склавіни
  - Анти
  criteria:
  - Географічне розташування
  - Археологічна культура
  - Політична організація
  - Відносини з Візантією
  prompt: |
    Візантійські автори розрізняли дві великі групи слов'ян: склавінів та антів. У чому полягала різниця між ними? Спираючись на дані археології та писемні джерела, порівняйте їхній спосіб життя, територію розселення та рівень політичної організації. Яка з цих груп стала ядром українського етногенезу?
  model_answer: |
    > [!model-answer]
    Головна відмінність полягала в географії та рівні політичного розвитку. Склавіни займали західніші території (Правобережжя, Подунав'я) і асоціюються з Празько-Корчацькою культурою. Анти жили на схід від Дністра (Лівобережжя, Причорномор'я) і створили Пеньківську культуру.

    Політично Анти були більш організованими і могутніми, створивши Антський союз — справжню протодержаву, здатну вести масштабні війни і дипломатичні ігри з імперією. Склавіни були більш роздрібненими. Саме анти вважаються безпосередніми предками українців, передавши нам свою назву (через Русь) і політичні традиції.

- type: critical-analysis
  title: Символізм числа 70
  instruction: Проаналізуйте повідомлення Йордана про страту князя Божа та 70 старійшин.
  target_text: |
    Вінітарій... розп'яв короля антів Божа з синами його і 70 старійшинами для залякування, щоб трупи повішених подвоювали страх підкорених.
  questions:
  - Про що свідчить наявність саме 70 старійшин у оточенні князя?
  - Яку мету переслідував Вінітарій такою жорстокою стратою?
  - Чому ця поразка не стала кінцем для антів, а навпаки, мобілізувала їх?
  model_answers:
  - Число 70 вказує на розгалужену федеративну структуру союзу, де кожен рід або плем'я мало свого представника. Це була рада, а не просто почет.
  - "Метою був психологічний терор: знищити еліту і зламати волю народу через жах."
  - Страта лідерів перетворила їх на мучеників і об'єднала народ спільною ненавистю до ворога, що призвело до швидкого реваншу за підтримки гунів.
  focus_points:
  - Структура влади (федерація)
  - Психологія війни
  - Роль еліти

- type: true-false
  title: Факти про антів
  instruction: Визначте, чи є твердження правильним.
  items:
  - statement: Слово «слов'яни» походить від слова «слава».
    correct: false
    explanation: Наукова етимологія виводить його від «слова» (ті, хто розмовляють зрозуміло).
  - statement: Анти жили на захід від Дністра.
    correct: false
    explanation: Анти жили на схід від Дністра, а на захід — склавіни.
  - statement: Пеньківська археологічна культура відповідає літописним антам.
    correct: true
    explanation: Ареал і час існування Пеньківської культури збігаються з історичними антами.
  - statement: Князь Бож переміг готів у першій битві.
    correct: true
    explanation: Так, спочатку анти завдали поразки війську Вінітарія.
  - statement: Антський союз розпався під ударами гунів.
    correct: false
    explanation: Антський союз впав під ударами аварів (обрів) у 602 році.
  - statement: Прокопій Кесарійський писав, що слов'янами править один цар.
    correct: false
    explanation: Навпаки, він писав, що вони «не підлягають одній людині» і живуть у демократії.
  - statement: Антські жінки не мали жодних прав.
    correct: false
    explanation: Жінки мали високий статус, керували господарством і брали участь у житті громади.
  - statement: Кий міг бути історичним антським князем VI століття.
    correct: true
    explanation: Це гіпотеза історика Михайла Брайчевського, підтверджена даними про походи до Царгорода.
  - statement: «Німцями» називали тільки жителів Німеччини.
    correct: false
    explanation: Так називали всіх чужинців, чию мову не розуміли («німих»).
  - statement: Авари залишили по собі добру пам'ять і багату культуру.
    correct: false
    explanation: Вони запам'яталися жорстокістю і зникли безслідно («згинули як обри»).
