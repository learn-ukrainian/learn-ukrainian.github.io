- type: reading
  id: reading-yaroslav
  title: "Первинне джерело: Повість минулих літ про книги"
  source: "Нестор Літописець (бл. 1113)"
  text: |
    Великою бо буває користь від учення книжного. Книги ж учать і наставляють нас на путь покаяння, і мудрість бо, і стриманість здобуваємо ми із словес книжних... Се бо суть ріки, що напоюють всесвіт увесь. Се є джерела мудрості, бо є у книгах незмірна глибина.
  tasks:
    - "З чим літописець порівнює книги та знання?"
    - "Яку головну користь від читання книг вбачає автор?"

- type: critical-analysis
  title: "Аналіз: Роль писемності та освіти"
  source_reading: reading-yaroslav
  instruction: "Проаналізуйте наведений уривок з літопису."
  target_text: "Се бо суть ріки, що напоюють всесвіт увесь. Се є джерела мудрості..."
  questions:
    - "Які метафори використовує автор для опису книг і що вони символізують?"
    - "Як цей текст спростовує міф про те, що культура Русі була примітивною?"
  model_answers:
    - "Метафори річок та джерел символізують життєдайну силу знань, без яких неможливий духовний розвиток суспільства."
    - "Текст демонструє глибоку повагу до інтелектуальної праці та філософське осмислення ролі освіти, що свідчить про високий рівень культури."
  focus_points:
    - "Метафорична мова літопису"
    - "Цінність знань у середньовічному суспільстві"

- type: reading
  id: reading-yaroslavna
  title: "Первинне джерело: Плач Ярославни"
  source: "Слово о полку Ігоревім (1187)"
  text: |
    О вітре, вітрило! Чому, господине, так сильно вієш ти? Чому мечеш ти хиновськії стріли на своїх легесеньких крильцях на моєї лади воїв?.. О Дніпре Словутицю! Ти пробив єси кам'янії гори крізь землю Половецькую... Прилелій же, господине, мою ладу мені, щоб я не слала до нього сліз на море рано.
  tasks:
    - "До яких сил природи звертається Ярославна?"
    - "Як у цьому тексті поєднуються християнські та язичницькі світоглядні елементи?"

- type: essay-response
  title: "Есе: Деколонізація культурної спадщини"
  source_reading: reading-yaroslavna
  instruction: "Напишіть коротке есе на основі прочитаного тексту та матеріалу уроку."
  prompt: "Проаналізуйте уривок зі Слова о полку Ігоревім. Як цей текст, а також інші культурні пам'ятки Київської Русі (наприклад, графіті Софії Київської), доводять тяглість української культурної традиції та спростовують імперський міф про спільну колиску?"
  min_words: 150
  model_answer: "У тексті ми бачимо глибокий зв'язок з українською природою та фольклором (звернення до Дніпра, вітру), що є характерним для української ментальності. Використання назви Україна в літописах того ж періоду, а також специфічні фонетичні риси (повноголосся, кличний відмінок) у живій мові, зафіксовані в епіграфіці Софії Київської, беззаперечно свідчать про те, що культурне ядро формувалося саме на території сучасної України. Це спростовує російський імперський міф про єдину давньоруську мову та доводить безперервність розвитку української ідентичності від часів Київської Русі до наших днів."
  rubric:
    - criteria: "Аргументація та доказовість"
      description: "Здатність наводити переконливі аргументи на основі тексту та історичних фактів."
      points: 40
    - criteria: "Розуміння деколонізаційного контексту"
      description: "Вміння спростовувати імперські міфи та пояснювати тяглість традиції."
      points: 40
    - criteria: "Мовне оформлення"
      description: "Грамотність, багатство словникового запасу та логічність викладу."
      points: 20

- type: true-false
  title: "Перевірка фактів: Культура Київської Русі"
  instruction: "Визначте, чи є наведені твердження істинними (true) або хибними (false)."
  items:
    - statement: "Культура Київської держави розвивалася в повній ізоляції від Візантійської імперії."
      correct: false
      explanation: "Русь активно взаємодіяла з Візантією, адаптуючи її досягнення до місцевих традицій."
    - statement: "Кирилиця виявилася зручнішою за глаголицю і швидко стала основною системою письма."
      correct: true
      explanation: "Кирилиця мала чіткіші пропорції та була легшою для засвоєння."
    - statement: "Берестяні грамоти свідчать про те, що грамотність була привілеєм лише князівської еліти."
      correct: false
      explanation: "Знахідки берестяних грамот доводять масову грамотність серед простих містян, ремісників та торговців."
    - statement: "Графіті на стінах Софії Київської написані штучною церковнослов'янською мовою."
      correct: false
      explanation: "Графіті фіксують живу розмовну мову киян, яка мала багато спільних рис із сучасною українською мовою."
    - statement: "Софійський собор у Києві мав тринадцять куполів, що було відходом від стандартних візантійських зразків."
      correct: true
      explanation: "Це відображало місцеву традицію багатоверхих будівель."
    - statement: "Фреска — це зображення, викладене з дрібних шматочків кольорового скла (смальти)."
      correct: false
      explanation: "Мозаїка викладається зі смальти, а фреска — це розпис водяними фарбами по вологій штукатурці."
    - statement: "Київські ювеліри прославилися на всю Європу завдяки техніці перегородчастої емалі."
      correct: true
      explanation: "Їхні вироби зі складною емаллю цінувалися монархами Західної Європи."
    - statement: "Православна церква активно заохочувала виступи скоморохів на народних святах."
      correct: false
      explanation: "Церква засуджувала скоморохів як носіїв язичницьких традицій, хоча вони були дуже популярними в народі."
    - statement: "Сучасна історична наука відкидає імперський міф про Київську Русь як спільну колиску трьох братніх народів."
      correct: true
      explanation: "Цей міф був штучно сконструйований імперською історіографією; культурне ядро Русі формувалося на території України."
    - statement: "Явище повноголосся (наприклад, слова молоко, дерево) є доказом тяглості української мови від часів Київської Русі."
      correct: true
      explanation: "Ці фонетичні особливості були притаманні живій мові киян і збереглися в сучасній українській мові."