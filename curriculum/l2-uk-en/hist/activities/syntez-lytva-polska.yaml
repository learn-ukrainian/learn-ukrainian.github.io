- type: reading
  id: reading-lytovska-doba
  title: 'Первинне джерело: Другий Литовський статут'
  source: Литовський статут 1566 року
  text: А писар земський маєт по-руську літери і слова писати, а не іншим язиком і
    словами.
- type: essay-response
  title: Роль шляхти та Литовських статутів
  source_reading: reading-lytovska-doba
  prompt: Напишіть коротке есе про те, як Литовські статути захищали права та ідентичність
    руської шляхти. Чому важливо відмовитися від російського імперського міфу про
    тотальну зраду шляхти?
  min_words: 150
  model_answer: Литовські статути були прогресивними кодексами законів, які гарантували
    шляхетські вольності та закріплювали статус руської мови в діловодстві. Вони захищали
    недоторканність особи та майна. Російський міф про зраду шляхти є маніпуляцією,
    адже руська еліта була повноцінним творцем Речі Посполитої і захищала власні права
    та культуру в межах європейського правового поля.
  rubric:
  - criteria: Історична аргументація
    description: Есе містить чіткі посилання на Литовські статути та пояснює політичну
      суб'єктність шляхти.
    points: 5
  - criteria: Деколонізаційний підхід
    description: Автор аргументовано спростовує міф про іноземне панування та зраду
      еліти.
    points: 5
- type: critical-analysis
  title: 'Аналіз причинно-наслідкових зв''язків: Від Речі Посполитої до Хмельниччини'
  instruction: Проаналізуйте наведені питання, спираючись на текст модуля.
  questions:
  - Як економічна система фільварку сприяла настанню Козацької революції?
  - Яким чином релігійний конфлікт після Берестейської унії вплинув на радикалізацію
    суспільства?
  - Як засвоєння шляхетських республіканських ідеалів вплинуло на козацьких ідеологів?
  model_answers:
  - Фільварок призвів до другого видання кріпацтва і жорстокої експлуатації селянства.
    Це накопичило соціальний гнів, який вилився у повстання.
  - Берестейська унія розколола суспільство і вивела православну ієрархію поза закон,
    що змусило козацтво взяти на себе роль збройного захисника православної віри.
  - Козацька еліта засвоїла концепцію договору між владою і громадянами та право на
    збройний опір тиранії, що стало ідеологічною основою створення незалежної Гетьманщини.
  focus_points:
  - Економічні причини Козацької революції
  - Релігійні конфлікти
  - Політична культура
- type: comparative-study
  title: Порівняльний аналіз політичних систем
  instruction: Порівняйте політичний устрій Речі Посполитої та Московського царства.
  items_to_compare:
  - Річ Посполита (шляхетська демократія)
  - Московське царство (самодержавство)
  criteria:
  - Ставлення до влади монарха та законності
  - Права політичної еліти
  - Роль представницьких органів
  prompt: Які ключові відмінності існували між цими двома політичними системами, і
    чому українська еліта категорично відкидала московську модель?
  model_answer: Річ Посполита базувалася на шляхетській демократії, де король обирався,
    а його влада обмежувалася законом і сеймом. Натомість Московське царство було
    абсолютною деспотією без прав для підданих. Українська еліта, вихована на європейських
    республіканських ідеях і повазі до свобод, відкидала московську тиранію як варварську
    і несумісну з людською гідністю.
- type: true-false
  title: 'Перевірка фактів: Литовсько-польська доба'
  items:
  - statement: Велике князівство Литовське було переважно руською державою за культурою
      та демографічним складом.
    correct: true
    explanation: Руська мова, православна віра та культура домінували в цій державі.
  - statement: Російський міф стверджує, що українці прагнули злиття з Москвою через
      гноблення в Речі Посполитій.
    correct: false
    explanation: Це пропагандистський міф. Українські еліти орієнтувалися на Європу
      і відкидали московську деспотію.
  - statement: Українська шляхта була політичним народом, що мав вплив на державну
      політику Речі Посполитої.
    correct: true
    explanation: Вони брали участь у виборах королів, засідали в сеймі і керували
      на місцях.
  - statement: Формула Gente Ruthenus, natione Polonus означала повну відмову від
      української ідентичності.
    correct: false
    explanation: 'Ця формула означала подвійну ідентичність: етнічний русин, але політичний
      громадянин Польщі.'
  - statement: Фільварки сприяли економічному розвитку селян і покращенню їхнього
      соціального статусу.
    correct: false
    explanation: Фільварки призвели до закріпачення селян та запровадження важкої
      панщини.
  - statement: Берестейська унія тисяча п'ятсот дев'яносто шостого року призвела до
      об'єднання всіх християн в Україні.
    correct: false
    explanation: Вона трагічно розколола суспільство на православних і греко-католиків.
  - statement: Козацька революція тисяча шістсот сорок восьмого року стала реакцією
      на виклики литовсько-польської доби.
    correct: true
    explanation: Хмельниччина була прямою реакцією на соціальні, релігійні та політичні
      виклики того часу.
  - statement: Грюнвальдська битва зупинила німецьку військову експансію за участі
      руських хоругв.
    correct: true
    explanation: У цій битві спільне військо розгромило Тевтонський орден.
  - statement: Православні братства були створені для збройного нападу на католицькі
      храми.
    correct: false
    explanation: Братства були громадськими просвітницькими організаціями, які відкривали
      школи та друкарні для захисту віри.
  - statement: Литовські статути були написані польською мовою для прискорення полонізації.
    correct: false
    explanation: Литовські статути були повністю написані староукраїнською літературною
      мовою.
  instruction: Визначте, чи твердження правильне.
