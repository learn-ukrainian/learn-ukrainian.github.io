- type: reading
  id: reading-kobzar
  title: "Первинне джерело: Рядки, що змінили історію"
  source: "Тарас Шевченко, вибрані твори"
  instruction: "Уважно прочитайте уривки з творів Шевченка."
  text: |
    "Борітеся — поборете!
    Вам Бог помагає!
    За вас правда, за вас слава
    І воля святая!"
    (з поеми "Кавказ")

    "В своїй хаті своя й правда,
    І сила, і воля."
    (з послання "І мертвим, і живим...")
  tasks:
    - "Визначте, до кого звертається поет у цих уривках."
    - "Поясніть значення метафори 'своя хата'."
    - "Які умови свободи називає автор?"
    - "Чому ці слова стали гаслом національного опору?"

- type: essay-response
  source_reading: reading-kobzar
  title: "Творець нації"
  instruction: "Напишіть розгорнуту відповідь-есе на запропоновану тему."
  prompt: "Спираючись на прочитані уривки та матеріал уроку, поясніть, чому Тараса Шевченка називають творцем модерної української нації, а не просто видатним поетом-романтиком. Як його творчість змінила політичну свідомість українців?"
  min_words: 200
  model_answer: "Шевченко заклав концептуальну базу для модерної нації. Він не лише описував минуле чи красу природи, а чітко сформулював політичні прагнення народу. Його слова 'В своїй хаті своя й правда' утверджували ідею державної самостійності. Поет розмежував 'ми' (українці) і 'вони' (імперія), десакралізував владу царів у поемі 'Сон' і закликав до активної боротьби за волю. Це перетворило етнографічну масу на свідомий народ, готовий боротися за власну державу."
  rubric:
    - criteria: "Аргументація"
      description: "Чітке пояснення ролі Шевченка у формуванні нації з наведенням аргументів."
      points: 10
    - criteria: "Робота з текстом"
      description: "Використання цитат або відсилок до творів ('Кавказ', 'Сон', 'Заповіт')."
      points: 10

- type: critical-analysis
  title: "Антиколоніалізм поеми 'Кавказ'"
  instruction: "Дайте відповіді на запитання для критичного аналізу."
  target_text: "Поема 'Кавказ' і образ Прометея"
  questions:
    - "Який символічний сенс має образ Прометея та орла в контексті Російської імперії?"
    - "У чому полягала принципова відмінність позиції Шевченка від позиції російських поетів щодо війни на Кавказі?"
    - "Як ви розумієте слова 'Не нам на прю з тобою стати!' у контексті солідарності поневолених народів?"
  model_answers:
    - "Прометей уособлює всі поневолені імперією народи, а орел — герб Російської імперії, який викачує їхні життєві ресурси. Але серце Прометея 'оживає знову', що символізує незнищенність народного духу."
    - "Більшість лояльних російських поетів славили перемоги своєї зброї та імперську експансію. Шевченко ж відкрито засудив російський імперіалізм і виявив солідарність із горцями, які боролися за свою свободу."
    - "Ці слова є вироком колонізаторам: Шевченко відмовляється підтримувати імперію і виступає на боці тих, хто чинить їй збройний опір."

- type: comparative-study
  title: "Образ Шевченка: Імперський та Радянський міфи"
  instruction: "Порівняйте дві спроби спотворення образу поета."
  items_to_compare:
    - "Імперський (російський) наратив"
    - "Радянський (більшовицький) наратив"
  criteria:
    - "Головна мета пропаганди"
    - "Який образ поета створювався"
    - "Що саме замовчувалося або заборонялося"
  prompt: "Проаналізуйте, як і чому Російська імперія та Радянський Союз намагалися змінити сприйняття творчості Тараса Шевченка. Зробіть висновки про спільні та відмінні риси цих двох підходів."
  model_answer: "Імперія намагалася маргіналізувати Шевченка, зводячи його до 'регіонального поета' (смішного етнографічного курйозу), замовчуючи державотворчий вимір його творів. Радянська влада, не маючи змоги заборонити його через народну любов, перетворила його на 'революціонера-демократа' та атеїста, вирізаючи з його текстів критику Москви та заклики до збройного опору російським загарбникам. Спільна мета: нейтралізувати загрозу для імперського центру, позбавивши українців їхнього духовного лідера та ідеї незалежності."

- type: true-false
  title: "Перевірка фактів: Життя і творчість"
  instruction: "Визначте, чи є твердження правильним, чи хибним."
  items:
    - statement: "Тарас Шевченко народився в сім'ї заможних міщан і отримав класичну освіту з дитинства."
      correct: false
      explanation: "Він народився кріпаком і рано залишився сиротою."
    - statement: "Викуп поета з кріпацтва відбувся завдяки благодійній лотереї, в якій розіграли портрет Жуковського."
      correct: true
      explanation: "Це був успішний краудфандинг за участі Карла Брюллова та інших видатних митців."
    - statement: "Перше видання збірки 'Кобзар' у 1840 році містило понад п'ятдесят поетичних творів."
      correct: false
      explanation: "Перше видання містило лише вісім творів, але мало колосальний успіх."
    - statement: "У Кирило-Мефодіївському братстві Шевченко займав найбільш радикальну позицію, закликаючи до збройних дій."
      correct: true
      explanation: "На відміну від поміркованого Костомарова, Шевченко був безкомпромісним революціонером."
    - statement: "Центром майбутньої федерації слов'янських народів братчики бачили імперський Петербург."
      correct: false
      explanation: "Центром і духовною столицею майбутньої федерації мав стати давній Київ."
    - statement: "Імператор Микола І заслав поета до пустелі із суворою забороною писати й малювати."
      correct: true
      explanation: "Це було неймовірно жорстоке покарання за написання політично гострих антиімперських творів."
    - statement: "У поемі 'Сон' Шевченко створив піднесені та героїчні образи російських царів."
      correct: false
      explanation: "Він створив гротескні сатиричні карикатури: Петра І як 'ведмедя', а Катерину ІІ як 'чаплю'."
    - statement: "Знаменитий 'Заповіт' був написаний у Переяславі, коли молодий поет важко захворів."
      correct: true
      explanation: "Він написав цей програмовий вірш у 1845 році під час хвороби на запалення легень."
    - statement: "Радянська пропаганда відкрито підтримувала образ Шевченка як націоналіста і борця за незалежну Україну."
      correct: false
      explanation: "Вона спотворила його образ, зробивши з нього 'революціонера-демократа', і замовчувала його націоналізм."
    - statement: "Шевченко володіє абсолютним світовим рекордом за кількістю встановлених йому пам'ятників."
      correct: true
      explanation: "У світі налічується понад 1380 монументів на його честь у різних країнах."