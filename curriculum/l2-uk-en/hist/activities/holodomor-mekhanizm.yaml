- type: reading
  id: "reading-stalin-letter"
  title: "Первинне джерело: Лист Сталіна до Кагановича"
  source: "Йосип Сталін (11 серпня 1932 року)"
  text: "Найголовніше тепер Україна... Якщо не візьмемося нині за виправлення становища в Україні, Україну можемо втратити."
  tasks:
    - "Проаналізуйте політичний підтекст цього листа."
    - "Як цей документ вплинув на долю селянства?"

- type: critical-analysis
  source_reading: "reading-stalin-letter"
  title: "Політичний вимір геноциду"
  instruction: "Проаналізуйте наведений уривок та дайте відповідь на запитання."
  questions:
    - "Чому Сталін розглядав Україну як загрозу для всієї комуністичної імперії?"
    - "Як цей лист доводить, що Голодомор був не економічним прорахунком, а свідомим каральним заходом?"
  model_answers:
    - "Сталін боявся відродження українського національного руху та пам'яті про 1917–1921 роки, тому вважав незалежне селянство головною загрозою."
    - "Фраза про втрату України свідчить, що штучний голод використовувався як інструмент політичного упокорення нації, а не був наслідком неврожаю."

- type: comparative-study
  title: "Аналіз дегуманізації: мова пропаганди та реальність"
  instruction: "Порівняйте радянську термінологію з реальними статусами людей."
  items_to_compare:
    - "Радянський пропагандистський термін (куркуль, саботажник)"
    - "Реальний статус (незалежний господар, селянин)"
  criteria:
    - "Справжня мета використання терміна"
    - "Наслідки для людини, якій прикріпили цей ярлик"
  prompt: "Поясніть, як зміна мови дозволила виконавцям подолати психологічний бар'єр і стати співучасниками злочину."
  model_answer: "Радянська пропаганда навмисно замінювала слова, що позначають людей, на абстрактні терміни на кшталт 'класовий ворог' або 'саботажник'. Це дегуманізувало жертву. Виконавці бачили перед собою злочинців, чиє знищення подавалося як моральний обов'язок. Ця лінгвістична інженерія виправдовувала конфіскації та вбивства."

- type: reading
  id: "reading-bilous-diary"
  title: "Первинне джерело: Зі щоденника Нестора Білоуса"
  source: "Нестор Білоус (квітень 1933 року)"
  text: "Люди мруть з голоду, будь-якого дня по 5-6 душ, і це ще не всі пухлі. Немає в людей ні хліба, ні картоплі, ні буряків. Кожного дня копають ями і ховають мертвих..."
  tasks:
    - "Які деталі побуту вказують на тотальний характер голоду?"

- type: essay-response
  source_reading: "reading-bilous-diary"
  title: "Его-документи як доказ злочину"
  instruction: "Напишіть коротке есе, спираючись на текст джерела та матеріали модуля."
  prompt: "Поясніть, чому особисті щоденники очевидців є ключовими для спростування радянського міфу про неврожай. Як ці джерела допомагають реконструювати механізм геноциду?"
  min_words: 150
  model_answer: "Его-документи (такі як щоденники Білоуса та Радченко) є безцінними первинними джерелами, оскільки офіційна статистика фальсифікувалася. Вони фіксують реальні механізми терору: конфіскацію всіх продуктів харчування (натуральні штрафи), діяльність буксирних бригад і масову смертність. На відміну від пропагандистської брехні про тимчасові труднощі, ці документи розкривають свідомий характер створення нестерпних умов для життя та доводять факт геноциду."
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чітких аргументів щодо ролі щоденників у спростуванні радянських міфів."
      points: 10
    - criteria: "Використання фактів"
      description: "Згадка конкретних історичних механізмів (натуральні штрафи, буксирні бригади)."
      points: 10

- type: true-false
  title: "Механізми репресій: факти та міфи"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Термін куркуль застосовувався виключно до найбагатших селян, які мали великі земельні наділи."
      correct: false
      explanation: "Це був політичний ярлик для будь-кого, хто чинив опір системі або зберігав українські традиції."
    - statement: "Протягом 1930 року українські селяни підняли понад чотири тисячі масових повстань проти колективізації."
      correct: true
      explanation: "Масовий збройний спротив був загальнонаціональним і змусив владу тимчасово відступити у березні 1930 року."
    - statement: "Закон про п'ять колосків передбачав можливість амністії для тих, хто вкрав їжу заради порятунку дітей."
      correct: false
      explanation: "Закон категорично забороняв амністію і був абсолютно безжалісним, масово застосовуючись навіть до дітей."
    - statement: "Режим чорних дощок означав повну продовольчу блокаду, вилучення всіх товарів і заборону торгівлі у селі."
      correct: true
      explanation: "Це був специфічно український механізм репресій, який перетворював цілі села на табори смерті."
    - statement: "Натуральні штрафи дозволяли державі конфісковувати м'ясо та картоплю, якщо селянин не мав зерна."
      correct: true
      explanation: "Вилучення альтернативної їжі доводить, що метою держави був саме геноцид, а не збирання пшениці."
    - statement: "У 1933 році кордони радянської України були відкриті, і селяни могли вільно виїхати до сусідніх республік."
      correct: false
      explanation: "Директива 22 січня 1933 року суворо забороняла виїзд селян, створюючи гігантське гетто навколо України."
    - statement: "Паспортна система, запроваджена наприкінці 1932 року, гарантувала селянам право на вільне пересування."
      correct: false
      explanation: "Колгоспникам не видавали внутрішніх паспортів, що фактично прикріпило їх до землі, як кріпаків."
    - statement: "Після Голодомору спустошені українські села заселялися вихідцями з російських губерній."
      correct: true
      explanation: "Це був свідомий акт демографічної інженерії та русифікації, характерний для колоніальної політики імперії."
    - statement: "Жінки відігравали ключову роль у протестах на селі, розраховуючи, що солдати не стрілятимуть у матерів."
      correct: true
      explanation: "Такі виступи отримали назву бабські бунти і були ефективним форматом місцевого опору."
    - statement: "Офіційна мета розкуркулення збігалася з реальною і полягала виключно у вирівнюванні доходів населення."
      correct: false
      explanation: "Реальна мета полягала в ліквідації природних лідерів та авторитетних господарів, щоб знеглавити громаду."