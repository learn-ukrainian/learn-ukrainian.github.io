- type: "reading"
  id: "reading-manifest-1775"
  title: "Первинне джерело: Маніфест про скасування Запорозької Січі"
  source: "Маніфест Катерини II, 3 серпня 1775 року"
  instruction: "Прочитайте уривок з історичного документа для подальшого аналізу."
  text: |
    Ми вважаємо за свій святий обов'язок перед Богом, перед нашою великою імперією і перед самим людством назавжди зруйнувати Запорозьку Січ, і сама назва запорозьких козаків віднині і навіки хай зникне. Вони стали вкрай шкідливими для нашої держави своїм постійним самовіллям і прагненням до повної, неконтрольованої незалежності.

- type: "essay-response"
  title: "Аналітичне есе: Причини знищення козацької вольниці"
  source_reading: "reading-manifest-1775"
  instruction: "Напишіть розгорнуту відповідь, спираючись на текст маніфесту та історичний контекст."
  prompt: "Якими були справжні причини ліквідації Запорозької Січі? Проаналізуйте розбіжність між офіційною риторикою Катерини II у маніфесті (звинувачення у самовіллі) та реальними геополітичними й економічними мотивами Російської імперії."
  min_words: 200
  model_answer: "Офіційна риторика імперії звинувачувала козаків у розбійництві та самовіллі, маскуючи свої дії гуманністю. Проте справжні причини були геополітичними та економічними. Після Кючук-Кайнарджійського миру 1774 року зникла загроза від татар, і козаки як прикордонний щит стали непотрібними. Водночас економічна модель Нової Січі — без кріпацтва, з розвиненим товарним фермерством — була надзвичайно успішною альтернативою і становила пряму загрозу деспотичному устрою Російської імперії, яка саме готувалася до повного закріпачення українських селян."
  rubric:
    - criteria: "Історична точність"
      description: "Чітке визначення реальних причин ліквідації Січі замість офіційних"
      points: 40
    - criteria: "Аналіз джерела"
      description: "Вміння відрізняти імперську пропаганду від реальних фактів"
      points: 30
    - criteria: "Аргументація"
      description: "Логічна побудова відповіді та використання прикладів"
      points: 30

- type: "critical-analysis"
  title: "Аналіз життєвого шляху: Від тріумфу до трагедії"
  instruction: "Проаналізуйте ключові етапи діяльності Петра Калнишевського та їхнє значення."
  questions:
    - "Чому козацтво свідомо порушило традицію щорічних виборів і дозволило Калнишевському керувати 10 років поспіль?"
    - "Як саме рішення Калнишевського здатися без бою під час оточення генералом Текелієм характеризує його як національного лідера?"
    - "У чому полягає символічне значення його відмови покинути Соловецький монастир після амністії 1801 року?"
  model_answers:
    - "Козацтво потребувало максимальної політичної стабільності та досвідченого дипломата для захисту автономії в умовах постійного тиску Петербурга."
    - "Він розумів, що збройний опір великій армії призведе до винищення генофонду нації та дасть імперії привід для масового терору. Він пожертвував власною свободою заради збереження життя тисяч козаків."
    - "Він розумів, що тієї вільної України, за яку він боровся, більше не існує. Залишившись у монастирі як вільний послушник, він продемонстрував духовну перемогу над системою."
  focus_points:
    - "Політична гнучкість та стабільність Січі"
    - "Моральна відповідальність лідера перед народом"
    - "Духовна незалежність ув'язненого"

- type: "critical-analysis"
  title: "Аналіз міфів та реалій ув'язнення"
  instruction: "Оцініть факти про перебування отамана на Соловках, спростовуючи імперські міфи."
  questions:
    - "Чому імперія не провела відкритого судового процесу над Петром Калнишевським?"
    - "Яким чином фінансове забезпечення ув'язненого контрастувало з умовами його утримання?"
    - "Чому охоронцям було суворо заборонено спілкуватися з в'язнем і варту постійно змінювали?"
    - "Який матеріальний доказ свідчить про те, що Петро Калнишевський зберіг ясний розум попри 25 років у темряві?"
  model_answers:
    - "Відкритий суд вимагав би доказів злочинів, яких не було. Його діяльність приносила користь імперії під час війни, тому його ізолювали таємно і без вироку."
    - "Імперія витрачала величезні кошти на його фізичне виживання, щоб продовжити страждання, але утримувала його в жахливому кам'яному мішку без світла та тепла, відмовляючи у свободі."
    - "Абсолютна психологічна ізоляція була головним інструментом тортур. Зміна варти запобігала виникненню емпатії у солдатів до старого козака."
    - "Він подарував монастирю Євангеліє у срібному окладі з власним дарчим написом. Грамотний текст і відсутність проклять свідчать про його духовне умиротворення."
  focus_points:
    - "Позасудові репресії імперії"
    - "Цинізм колоніальної політики"
    - "Психологічний терор як засіб зламати особистість"
    - "Християнське смирення та збереження інтелекту"

- type: "true-false"
  title: "Перевірка фактів: Біографія та епоха отамана"
  instruction: "Визначте, чи є твердження правильними, спираючись на текст лекції."
  items:
    - statement: "Петро Калнишевський походив із бідної селянської родини і випадково потрапив на Січ."
      correct: false
      explanation: "Він походив із заможного шляхетського роду з Сумщини і пройшов усі щаблі військової ієрархії."
    - statement: "Отаман брав активну особисту участь у військових походах, навіть коли йому було 80 років."
      correct: true
      explanation: "Це спростовує радянський міф про немічність лідерів пізньої Січі."
    - statement: "Російська імперія ліквідувала Січ через те, що козаки відмовилися воювати проти турків."
      correct: false
      explanation: "Козаки успішно воювали проти турків, а ліквідація відбулася одразу після перемоги, коли вони стали непотрібні як військова сила."
    - statement: "Нова Січ була надзвичайно успішною економічною моделлю з розвиненим землеробством і торгівлею."
      correct: true
      explanation: "Цей економічний успіх і відсутність кріпацтва були головною причиною ненависті імперії."
    - statement: "Під час оточення Січі Петро Калнишевський віддав наказ козакам розпочати збройне повстання."
      correct: false
      explanation: "Він наказав не чинити опору, щоб не допустити знищення генофонду нації та масштабних репресій в Україні."
    - statement: "Генерал Текелій дотримався своєї обіцянки гарантувати безпеку всім лідерам козацтва."
      correct: false
      explanation: "Російські обіцянки виявилися брехнею: лідерів заарештували, а Січ пограбували і зруйнували."
    - statement: "Соловецький монастир використовувався імперією як сувора в'язниця для політичних опонентів."
      correct: true
      explanation: "Калнишевський провів там 25 років в одиночній камері в найжахливіших умовах."
    - statement: "Петру Калнишевському дозволяли вільно гуляти територією монастиря та спілкуватися з вартою."
      correct: false
      explanation: "Його тримали в абсолютній ізоляції і виводили з камери лише тричі на рік на найбільші свята."
    - statement: "Катерина II у своєму маніфесті наказала назавжди стерти саму назву запорозьких козаків."
      correct: true
      explanation: "Це був свідомий акт лінгвоциду та стирання національної пам'яті."
    - statement: "Сьогодні українська церква не визнає Петра Калнишевського через те, що він здав Січ без бою."
      correct: false
      explanation: "Навпаки, він офіційно канонізований як святий праведник Петро Багатостраждальний за його духовну стійкість."