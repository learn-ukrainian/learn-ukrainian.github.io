- type: reading
  id: reading-ukaz-1751
  title: "Аналіз документа: Указ 1751 року"
  source: "Іменний указ Єлизавети Петрівни"
  text: |
    Ми, імператриця, турбуючись про долю одновірців наших, сербів та інших православних народів, які зазнають утисків у чужих краях, милостиво дозволяємо їм переселитися в межі нашої імперії. Надаємо їм землі для поселення та створення особливих полків для захисту кордонів наших. Гарантуємо їм звільнення від податків і збереження їхніх звичаїв, аби вони вірно служили престолу.
  instruction: "Прочитайте уривок документа, який легалізував військову колонізацію українських земель."
  tasks:
    - "Яким мотивом імперія офіційно пояснювала запрошення сербів?"
    - "Що уряд пропонував переселенцям в обмін на службу?"

- type: critical-analysis
  source_reading: reading-ukaz-1751
  title: "Критичний аналіз: Риторика та реальність"
  instruction: "Проаналізуйте текст імператорського указу в контексті реальної політичної ситуації на Півдні України."
  questions:
    - "Який факт щодо виділених для переселення земель свідомо замовчується в тексті указу?"
    - "Чому акцент на 'захисті одновірців' був ефективним інструментом імперської пропаганди?"
    - "Як ви вважаєте, чи був цей указ актом благодійності, чи продуманою геополітичною стратегією?"

- type: true-false
  title: "Міфи та факти про Нову Сербію"
  instruction: "Визначте, які з наведених тверджень є правдивими, а які — хибними."
  items:
    - statement: "Балканські переселенці були першими людьми, які почали освоювати землі Дикого Поля."
      correct: false
      explanation: "До приходу колоністів ці землі належали Запорозькій Січі, там існували козацькі паланки та зимівники."
    - statement: "Граничари втратили свої привілеї в Австрійській імперії через реформи Марії-Терезії."
      correct: true
      explanation: "Саме загроза перетворення на кріпаків змусила їх шукати нового сюзерена."
    - statement: "Українським селянам було суворо заборонено записуватися до сербських полків."
      correct: false
      explanation: "Навпаки, багато українців змінювали прізвища та масово записувалися 'сербами', щоб уникнути кріпацтва."
    - statement: "Нова Сербія та Слов'яносербія були створені як єдина адміністративна одиниця під керівництвом Івана Хорвата."
      correct: false
      explanation: "Це були дві різні автономії, оскільки Шевич і Прерадович відмовилися підпорядковуватися Хорвату."
    - statement: "Гусарські полки складалися переважно з важкої піхоти, озброєної мушкетами з багнетами."
      correct: false
      explanation: "Гусари були легкою кавалерією; піхотою були пандурські полки."
    - statement: "Православна віра стала головним чинником, що сприяв швидкій асиміляції колоністів."
      correct: true
      explanation: "Спільна релігія дозволила балканцям та українцям швидко знайти спільну мову та укладати мішані шлюби."
    - statement: "Система шанців передбачала поєднання військової служби та ведення сільського господарства."
      correct: true
      explanation: "Мешканці шанців у мирний час працювали на землі, а за сигналом тривоги брали зброю."
    - statement: "Іван Хорват керував Новою Сербією справедливо та був нагороджений за успішну розбудову провінції."
      correct: false
      explanation: "Хорват створив корупційну імперію, був заарештований за розтрати та відправлений у заслання."
    - statement: "Імперська адміністрація намагалася зберегти старі козацькі топоніми на картах нових поселень."
      correct: false
      explanation: "Відбувалася картографічна війна: українські назви масово замінювалися на балканські."
    - statement: "Справжньою метою створення іноземних поселень було оточення та поступове удушення Запорозької Січі."
      correct: true
      explanation: "Імперія використовувала колоністів як лояльний буфер, що відрізав Січ від Правобережної України."

- type: comparative-study
  title: "Порівняльне дослідження: Військові поселення"
  instruction: "Порівняйте дві моделі військових поселень на українських землях у середині вісімнадцятого століття."
  items_to_compare:
    - "Нова Сербія (під керівництвом Івана Хорвата)"
    - "Слов'яносербія (під керівництвом Шевича та Прерадовича)"
  criteria:
    - "Географічне розташування"
    - "Етнічний склад та мультиетнічність"
    - "Адміністративний центр"
  prompt: "Проаналізуйте відмінності між Новою Сербією та Слов'яносербією за вказаними критеріями. Чому імперський уряд вирішив не об'єднувати ці території?"

- type: essay-response
  source_reading: reading-ukaz-1751
  title: "Аналітичне есе: Роль військової колонізації"
  instruction: "Напишіть есе на основі історичного документа та матеріалів уроку."
  prompt: "Як указ 1751 року та створення балканських військових поселень допомогли Російській імперії у реалізації стратегії ліквідації Запорозької Січі? Наведіть конкретні приклади конфліктів."
  min_words: 150
  rubric:
    - criteria: "Історична аргументація"
      description: "Наведення прикладів геополітичного оточення Січі та земельних війн"
      points: 5
    - criteria: "Аналіз стратегії"
      description: "Розкриття справжніх мотивів імперії (принцип 'розділяй і володарюй') на противагу офіційній риториці"
      points: 5