- type: reading
  id: "reading-boplan"
  title: "Первинне джерело: Карти Боплана"
  source: "Гійом Левассер де Боплан, Опис України"
  instruction: "Прочитайте текст про картографічні свідчення Боплана."
  text: |
    Карти французького інженера Гійома де Боплана, створені у сімнадцятому столітті,
    є беззаперечним доказом української присутності на Півдні задовго до імперської
    експансії. На цих мапах чітко зафіксована густа мережа поселень, річок та урочищ
    з виразними українськими назвами. Це повністю спростовує імперський міф про те,
    що до вісімнадцятого століття тут існував лише безіменний і порожній степ.
  tasks:
    - "Які географічні об'єкти були позначені на картах Боплана?"
    - "Чому топоніміка на цих картах є важливою для істориків?"
    - "Який імперський міф спростовують картографічні свідчення?"
    - "Коли саме були створені ці історичні мапи?"

- type: true-false
  title: "Перевірте факти: Міфи та реальність"
  instruction: "Визначте, чи є ці твердження правдивими чи хибними."
  items:
    - statement: "Термін Новоросія був запроваджений для збереження пам'яті про козацькі вольності."
      correct: false
      explanation: "Цей термін був створений саме для стирання пам'яті про українську автономію."
    - statement: "Кримське ханство було впливовою державою з розвиненою економікою та міжнародною торгівлею."
      correct: true
      explanation: "Кримське ханство мало розвинену урбаністику, ремесла та активні торговельні зв'язки."
    - statement: "Одеса була заснована на абсолютно порожньому місці за наказом Катерини II."
      correct: false
      explanation: "Одеса була розбудована на місці давнього портового міста Хаджибей (Коцюбіїв)."
    - statement: "Чумаки відігравали ключову роль в економічній та культурній інтеграції Півдня з іншими регіонами."
      correct: true
      explanation: "Чумацький шлях зшивав економіку Лісостепу та Степу в єдиний організм."
    - statement: "Перепис тисяча вісімсот дев'яносто сьомого року показав домінування російського населення на Півдні."
      correct: false
      explanation: "Перепис довів, що українці становили абсолютну більшість у губерніях Півдня."
    - statement: "Козацькі зимівники були багатопрофільними фермерськими господарствами."
      correct: true
      explanation: "У зимівниках вирощували злаки, розводили худобу та займалися промислами."
    - statement: "Термін Дике Поле точно відображає відсутність соціальної організації у степу."
      correct: false
      explanation: "Степ був складним простором взаємодії різних цивілізацій, а не порожнечею."
    - statement: "Запорозькі козаки здійснювали контроль над територіями через систему паланок."
      correct: true
      explanation: "Паланковий устрій забезпечував ефективне адміністративне управління."
    - statement: "Іноземні колоністи повністю змінили український характер Півдня."
      correct: false
      explanation: "Вони створили локальні анклави, але регіон зберіг своє загальне українське обличчя."
    - statement: "Навесні дві тисячі чотирнадцятого року Росія використала міф про Новоросію для виправдання агресії."
      correct: true
      explanation: "Цей штучний конструкт був реанімований для спроби розчленування України."

- type: critical-analysis
  title: "Аналіз міфів: Концепт порожньої землі"
  instruction: "Дайте розгорнуті відповіді на запитання щодо імперських міфів."
  source_reading: "reading-boplan"
  questions:
    - "У чому полягає суть концепції чистої дошки щодо історії Півдня?"
    - "Яку мету переслідувала імперія, масово перейменовуючи місцеві топоніми?"
    - "Як саме первинні джерела допомагають історикам руйнувати колоніальні наративи?"
    - "Чому російська пропаганда зображувала Кримське ханство виключно як розбійницьке гніздо?"
    - "Як концепт Степова Україна сприяє деколонізації історичної пам'яті?"
  focus_points:
    - "Імперська стратегія стирання історії"
    - "Роль топоніміки як зброї"
    - "Об'єктивність первинних джерел"

- type: comparative-study
  title: "Порівняння концептів: Новоросія та Степова Україна"
  instruction: "Порівняйте два історичні концепти за вказаними критеріями."
  items_to_compare:
    - "Новоросія (імперський конструкт)"
    - "Степова Україна (деколонізаційний концепт)"
  criteria:
    - "Походження та мета створення"
    - "Ставлення до місцевого населення та історії"
    - "Сучасне політичне значення"

- type: essay-response
  title: "Есе: Чому міф Новоросія є інструментом пропаганди?"
  instruction: "Напишіть аналітичне есе на задану тему."
  prompt: "Спираючись на історичні факти (демографію, наявність зимівників та паланок, історію міст), поясніть, чому термін Новоросія є штучним пропагандистським конструктом. Як цей міф використовувався у вісімнадцятому столітті та як він був реанімований у дві тисячі чотирнадцятому році?"
  min_words: 200
  rubric:
    - criteria: "Історична аргументація"
      description: "Використання конкретних фактів для спростування міфу про порожню землю."
      points: 10
    - criteria: "Аналіз сучасності"
      description: "Розуміння причин реанімації міфу під час російської агресії."
      points: 5
    - criteria: "Структура та логіка"
      description: "Чітка структура есе з вступом, основною частиною та висновками."
      points: 5