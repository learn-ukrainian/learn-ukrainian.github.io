- type: reading
  id: "reading-yanukovychleaks"
  title: "Первинне джерело: YanukovychLeaks"
  source: "Журналістські розслідування та архіви Межигір'я"
  instruction: "Прочитайте інформацію про врятовані документи та дайте відповіді на запитання."
  text: "У лютому 2014 року, під час втечі Віктора Януковича, співробітники його охорони намагалися знищити докази фінансових злочинів. Тисячі сторінок документів були викинуті у воду Київського водосховища. Водолази діставали з крижаної води теки з документами, які охорона не встигла спалити. Згодом з цих врятованих паперів було створено проєкт YanukovychLeaks — відкриту базу даних, яка містила фінансові звіти, квитанції та внутрішнє листування. Ці документи стали юридичними доказами, які фіксували щоденні витрати на підкуп політиків, фінансування суддів та виведення державних коштів на офшорні рахунки."
  tasks:
    - "Які документи намагалася знищити охорона?"
    - "Яким чином вдалося врятувати частину архівів?"
    - "Що містила база даних YanukovychLeaks?"
    - "Як ці документи були використані в подальшому?"

- type: true-false
  title: "Факти про режим Януковича: правда чи вигадка"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "На президентських виборах 2010 року Віктор Янукович переміг з величезним відривом."
      correct: false
      explanation: "Він здобув перемогу з дуже незначним відривом від конкурентки Юлії Тимошенко."
    - statement: "Конституційний суд у 2010 році повернув президенту повноваження часів Леоніда Кучми."
      correct: true
      explanation: "Суд скасував реформу 2004 року, що стало антиконституційним переворотом."
    - statement: "Харківські угоди передбачали виведення російського флоту з Криму до 2017 року."
      correct: false
      explanation: "Угоди продовжували перебування Чорноморського флоту РФ на 25 років."
    - statement: "Закон Ківалова-Колесніченка сприяв розвитку та захисту української мови."
      correct: false
      explanation: "Закон став інструментом витіснення української мови та повзучої русифікації."
    - statement: "Юлія Тимошенко була засуджена до ув'язнення за підписання газових контрактів."
      correct: true
      explanation: "Її справа стала найвідомішим прикладом вибіркового правосуддя та політичних репресій."
    - statement: "Клан Сім'я складався переважно зі старих олігархів, таких як Ахметов та Фірташ."
      correct: false
      explanation: "Сім'я складалася з родичів та довірених осіб президента, які навпаки витісняли старих олігархів."
    - statement: "Афера Вишки Бойка продемонструвала виведення сотень мільйонів доларів через офшори."
      correct: true
      explanation: "Державна компанія суттєво переплатила за бурові установки, а гроші осіли на рахунках фіктивних фірм."
    - statement: "Резиденція Межигір'я залишалася у державній власності протягом усього правління Януковича."
      correct: false
      explanation: "Вона була виведена з державної власності через складну схему обміну майном."
    - statement: "Керівниками силових відомств часто призначалися особи з російським громадянством."
      correct: true
      explanation: "Це була свідома інфільтрація для підпорядкування державних інституцій Росії."
    - statement: "Розпорядження уряду про відмову від євроінтеграції було ухвалене після всенародного референдуму."
      correct: false
      explanation: "Рішення було ухвалене кулуарно, під тиском Кремля, без консультацій із суспільством."

- type: critical-analysis
  source_reading: "reading-yanukovychleaks"
  title: "Критичний аналіз: Система корупції"
  instruction: "Проаналізуйте наведений текст про архів YanukovychLeaks."
  target_text: "Ці документи стали юридичними доказами, які фіксували щоденні витрати на підкуп політиків, фінансування суддів та виведення державних коштів на офшорні рахунки."
  questions:
    - "Які механізми використовувала влада для приховування своїх фінансових злочинів?"
    - "Чому журналістські розслідування відігравали таку важливу роль в умовах цензури?"
    - "Як врятовані документи вплинули на суспільне сприйняття режиму після Революції Гідності?"
    - "Якою була мета ведення подвійної бухгалтерії високопосадовцями?"
    - "Чому знищення документів стало першочерговим завданням охорони під час втечі президента?"
  focus_points:
    - "Роль незалежних медіа у суспільстві"
    - "Масштаби тіньової економіки та підкупу"
    - "Важливість документальних доказів для правосуддя"
  model_answers:
    - "Влада використовувала систему офшорних компаній, підставних осіб та тіньові готівкові каси для фінансування своїх потреб і приховування злочинів."
    - "В умовах контролю над судами та телебаченням лише незалежні журналісти могли доносити до суспільства інформацію про справжні масштаби розкрадання державних коштів."

- type: comparative-study
  title: "Порівняльне дослідження: Еволюція олігархії"
  instruction: "Порівняйте дві групи впливу в українській політиці періоду 2010-2013 років."
  items_to_compare:
    - "Старі олігархи (Ахметов, Фірташ)"
    - "Клан Сім'я (Олександр Янукович, Арбузов, Клименко)"
  criteria:
    - "Методи накопичення капіталу"
    - "Відносини з державним апаратом та президентом"
    - "Вплив на ухвалення стратегічних рішень"
  prompt: "Проаналізуйте, як зміна балансу сил між старими олігархами та Сім'єю вплинула на стабільність режиму Януковича. Чому концентрація влади в руках найближчого оточення призвела до втрати підтримки з боку традиційних спонсорів партії?"
  model_answer: "Старі олігархи створювали свій капітал у 1990-х роках і спиралися на велику промисловість. Натомість Сім'я використовувала прямий контроль над податковою, митницею та державними банками для швидкого збагачення, часто займаючись рейдерством. Монополізація економіки Сім'єю викликала невдоволення традиційних олігархів, що позбавило Януковича їхньої підтримки у критичний момент початку Євромайдану."

- type: essay-response
  title: "Есе-відповідь: Передумови Революції Гідності"
  instruction: "Напишіть розгорнуте есе, спираючись на вивчений матеріал."
  prompt: "Проаналізуйте політику Віктора Януковича у 2010-2013 роках. Як системна корупція, згортання демократичних свобод та російська інфільтрація підготували ґрунт для Революції Гідності? Яку роль у цьому процесі відіграла раптова відмова від підписання Угоди про асоціацію з ЄС?"
  min_words: 250
  model_answer: "Політика режиму Януковича характеризувалася безпрецедентною концентрацією влади, що розпочалася зі скасування конституційної реформи 2004 року. Вибіркове правосуддя, ув'язнення політичних опонентів, таких як Юлія Тимошенко, та тотальна корупція клану Сім'я руйнували довіру суспільства до державних інститутів. Крім того, Харківські угоди та мовний закон Ківалова-Колесніченка свідчили про поступову здачу національного суверенітету на користь Росії. Інфільтрація російських агентів у СБУ та Міністерство оборони підтверджувала маріонетковий характер влади. Проте каталізатором протестів стала відмова від євроінтеграції у листопаді 2013 року. Для українського суспільства Угода про асоціацію символізувала цивілізаційний вибір та надію на верховенство права. Коли Янукович спробував розвернути країну в бік Митного союзу під тиском Москви, це було сприйнято як екзистенційна загроза та відверта зрада. Студентський протест швидко переріс у масову Революцію Гідності, яка стала відповіддю на роки приниження та авторитаризму."
  rubric:
    - criteria: "Аргументація та історичний контекст"
      description: "Есе має містити конкретні приклади політики режиму (Межигір'я, ув'язнення опозиції, російська інфільтрація)."
      points: 40
    - criteria: "Аналіз причинно-наслідкових зв'язків"
      description: "Студент повинен чітко пояснити, чому відмова від євроінтеграції стала каталізатором революції."
      points: 40
    - criteria: "Граматика та лексика"
      description: "Правильне використання складнопідрядних речень та політичної лексики рівня B2."
      points: 20