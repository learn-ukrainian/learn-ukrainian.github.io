- type: true-false
  title: 'Перевірте знання фактів'
  instruction: 'Визначте, чи є ці твердження правдивими.'
  items:
    - statement: 'Софійський собор вінчали тринадцять куполів, що символізували Христа та дванадцять апостолів.'
      correct: true
      explanation: 'На відміну від традиційних візантійських храмів, Софія мала складну багатокупольну структуру.'
    - statement: 'Храм використовувався виключно для релігійних богослужінь та індивідуальної молитви.'
      correct: false
      explanation: 'Собор був справжнім адміністративним центром Русі, де збиралося віче та приймали послів.'
    - statement: 'Мозаїка Оранта знаходиться у центральній вівтарній апсиді.'
      correct: true
      explanation: 'Цей колосальний образ Богородиці став символом незламності та духовного захисту Києва.'
    - statement: 'Усі стіни собору зсередини були повністю покриті дорогою мозаїкою зі смальти.'
      correct: false
      explanation: 'Мозаїкою прикрашали лише найважливіші зони, а решта стін була розписана фресками.'
    - statement: 'Світські фрески зі сценами полювання та іподрому розташовані у сходових вежах.'
      correct: true
      explanation: 'Вони демонструють світську культуру та розваги князівської еліти.'
    - statement: 'Графіті на стінах залишали переважно хулігани, які хотіли зіпсувати фрески.'
      correct: false
      explanation: 'Написи на стінах були легітимним способом звернутися до Бога або залишити важливе повідомлення.'
    - statement: 'Графіті про смерть Ярослава Мудрого називає його високим титулом цар.'
      correct: true
      explanation: 'Цей імперський титул підкреслює абсолютну політичну суверенність київського правителя.'
    - statement: 'Першим митрополитом з місцевих русинів став видатний діяч Іларіон Київський.'
      correct: true
      explanation: 'Його призначення стало маніфестом церковної незалежності Києва від Константинополя.'
    - statement: 'Останки Ярослава Мудрого досі зберігаються в його мармуровому саркофазі у Києві.'
      correct: false
      explanation: 'У 2009 році з''ясувалося, що кістки князя безслідно зникли.'
    - statement: 'Сучасний вигляд собору з ліпниною є результатом перебудови у стилі козацького бароко.'
      correct: true
      explanation: 'Ця реконструкція відбулася за часів фінансування гетьмана Івана Мазепи.'

- type: reading
  id: reading-ilarion
  title: 'Первинне джерело: Маніфест Іларіона Київського'
  source: 'Іларіон Київський'
  text: 'Не в худій бо землі нашій і не в невідомій вони володарювали, але в Руській, про яку знають і чують в усіх чотирьох кінцях землі.'
  instruction: 'Прочитайте уривок із промови першого руського митрополита.'

- type: critical-analysis
  title: 'Критичний аналіз: Маніфест суверенності'
  source_reading: 'reading-ilarion'
  instruction: 'Проаналізуйте текст митрополита Іларіона та дайте відповіді на запитання.'
  questions:
    - 'Як Іларіон характеризує Русь у цьому уривку?'
    - 'Чому ці слова є викликом Візантійській імперії?'
  model_answers:
    - 'Він наголошує, що Русь є великою і відомою в усьому світі державою.'
    - 'Це спростовує монополію Візантії на владу та стверджує геополітичну рівноправність Києва.'

- type: comparative-study
  title: 'Порівняльний аналіз: Архітектурні стилі'
  instruction: 'Порівняйте архітектурні особливості Софії Київської ХІ століття та її сучасний вигляд.'
  items_to_compare:
    - 'Автентична архітектура 11 століття'
    - 'Козацьке бароко 17-18 століть'
  criteria:
    - 'Зовнішнє оздоблення фасадів'
    - 'Форма та кількість куполів'
  prompt: 'Як змінився зовнішній вигляд собору після реконструкції за часів Івана Мазепи?'
  model_answer: 'Первісний собор мав кладку opus mixtum та візантійські куполи. Фасади не тинькували. Під час реконструкції фасади потинькували, прикрасили ліпниною, а куполи набули форми козацького бароко.'

- type: essay-response
  title: 'Есе: Символ української державності'
  prompt: 'Опираючись на архітектурні, мистецькі та історичні факти, поясніть, чому Софія Київська вважається головним символом європейської суб''єктності Русі-України.'
  min_words: 200
  rubric:
    - criteria: 'Використання фактів'
      description: 'Наведено приклади архітектурних особливостей, фресок або графіті.'
      points: 40
    - criteria: 'Деколонізаційний аспект'
      description: 'Чітко спростовано міф про культурну провінційність Києва.'
      points: 40
    - criteria: 'Логіка та структура'
      description: 'Есе має вступ, аргументацію та чіткий висновок.'
      points: 20