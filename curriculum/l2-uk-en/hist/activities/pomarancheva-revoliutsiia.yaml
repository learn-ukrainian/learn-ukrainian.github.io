- type: reading
  id: reading-pravda
  title: 'Первинне джерело: Роль журналістики'
  source: 'Українська Правда'
  text: |
    Коли офіційні канали транслювали пропаганду, незалежні журналісти здійснювали трансляцію реальних подій. Мільйони громадян побачили Майдан завдяки чесним новинам. Це стало доказом того, що цензура не здатна зупинити прагнення до демократії.
  tasks:
    - 'У чому полягала головна місія незалежних медіа у 2004 році?'

- type: true-false
  title: 'Верифікація фактів: фальсифікації та наслідки'
  instruction: 'Визначте, чи є ці твердження правдивими.'
  items:
    - statement: 'На виборах 2004 року Віктор Ющенко та Віктор Янукович представляли схожі вектори розвитку держави.'
      correct: false
      explanation: 'Вони представляли кардинально різні світогляди: європейський вектор проти збереження олігархічної системи.'
    - statement: 'Під час другого туру виборів масово використовувалася технологія каруселей.'
      correct: true
      explanation: 'Групи людей пересувалися автобусами і голосували багато разів за відкріпними талонами.'
    - statement: 'Офіційна явка виборців у Донецькій області була в межах норми і не перевищувала 80 відсотків.'
      correct: false
      explanation: 'На деяких дільницях Центральна виборча комісія зафіксувала явку 105 або навіть 110 відсотків.'
    - statement: 'Діагноз Віктора Ющенка підтвердив гостру діоксинову інтоксикацію.'
      correct: true
      explanation: 'Доза діоксину в організмі політика перевищувала норму в тисячі разів.'
    - statement: 'Темники були неофіційними інструкціями для журналістів, які забороняли критикувати опозицію.'
      correct: false
      explanation: 'Темники навпаки змушували журналістів ігнорувати опозицію або висвітлювати її в негативному контексті.'
    - statement: '5 канал став єдиним загальнонаціональним каналом, який здійснював пряму трансляцію подій з Майдану.'
      correct: true
      explanation: 'Коли інші канали транслювали розважальні шоу, 5 канал показував багатотисячні мітинги.'
    - statement: 'Стратегія протестувальників передбачала збройний напад на урядові будівлі.'
      correct: false
      explanation: 'Організатори протестів свідомо обрали стратегію мирного та ненасильницького спротиву.'
    - statement: 'Верховний Суд України прийняв рішення про визнання результатів другого туру недійсними.'
      correct: true
      explanation: 'Суд визнав масові порушення та призначив повторне голосування другого туру.'
    - statement: 'У політичній історії та юриспруденції події 26 грудня офіційно називаються третім туром.'
      correct: false
      explanation: 'Юридично це було повторне голосування другого туру виборів, а не третій тур.'
    - statement: 'Помаранчева революція продемонструвала відмову українців від російської моделі керованої демократії.'
      correct: true
      explanation: 'Українці обрали справжню демократію, прозорість влади та європейські стандарти.'

- type: critical-analysis
  source_reading: reading-pravda
  title: 'Аналіз: Хронологія подій від виборів до перемоги'
  instruction: 'Дайте відповідь на запитання, аналізуючи події Помаранчевої революції.'
  questions:
    - 'Чому влада вдалася до безпрецедентного адміністративного тиску та фальсифікацій між першим і другим турами виборів?'
    - 'Як зовнішні зміни Віктора Ющенка вплинули на суспільні настрої та мобілізацію електорату перед виборами?'
    - 'Яку роль відіграло рішення Верховного Суду від 3 грудня 2004 року у вирішенні політичної кризи?'
  model_answers:
    - 'Влада розуміла, що програє чесні вибори, тому почала готувати механізми для масштабного спотворення результатів, щоб зберегти контроль над країною.'
    - 'Спотворене обличчя кандидата стало живим доказом жорстокості режиму і перетворилося на символ мучеництва, що викликало хвилю солідарності серед людей.'
    - 'Рішення Верховного Суду визнало масові фальсифікації та перевело вуличні протести у правову площину, дозволивши призначити повторне голосування.'
  focus_points:
    - 'Адміністративний тиск'
    - 'Мобілізація електорату'
    - 'Правове розв''язання конфлікту'

- type: comparative-study
  source_reading: reading-pravda
  title: 'Порівняльний аналіз: Інформаційний простір 2004 року'
  instruction: 'Порівняйте роботу державних телеканалів та незалежних медіа під час виборів.'
  items_to_compare:
    - 'Державні та підконтрольні владі телеканали'
    - 'Незалежні медіа'
  criteria:
    - 'Рівень цензури та використання темників'
    - 'Висвітлення подій на Майдані'
    - 'Вплив на формування громадянського суспільства'
  prompt: 'Напишіть короткий текст, у якому порівняйте інформаційну політику двох типів медіа під час Помаранчевої революції.'
  model_answer: 'Державні канали працювали під жорсткою цензурою темників, ігноруючи Майдан або показуючи протестувальників як екстремістів. Натомість незалежні медіа здійснювали прямі трансляції з площ, публікували аналітику та давали голос опозиції. Цей контраст допоміг людям зрозуміти масштаби брехні влади та стимулював самоорганізацію суспільства.'

- type: essay-response
  source_reading: reading-pravda
  title: 'Есе: Роль медіа в демократичних змінах'
  instruction: 'Напишіть есе на задану тему, використовуючи історичні факти.'
  prompt: 'Проаналізуйте, як виникнення 5 каналу та розвиток інтернет-видань, таких як Українська Правда, допомогли прорвати інформаційну блокаду у 2004 році. Чому незалежна журналістика є критично важливою для захисту демократії?'
  min_words: 150
  model_answer: 'У 2004 році інформаційний простір України перебував під контролем влади через систему темників. Державні канали транслювали пропаганду та приховували правду про фальсифікації. У цих умовах 5 канал та Українська Правда стали єдиними джерелами об''єктивної інформації. Завдяки прямим трансляціям та незалежній аналітиці громадяни могли бачити реальні масштаби протестів на Майдані Незалежності. Це доводить, що незалежна журналістика не лише інформує, а й руйнує монополію влади на правду, дозволяючи суспільству мобілізуватися для захисту демократії та своїх прав.'
  rubric:
    - criteria: 'Аналіз ситуації з цензурою'
      description: 'Учень пояснює сутність темників та інформаційної блокади.'
      points: 30
    - criteria: 'Роль незалежних медіа'
      description: 'Учень наводить конкретні приклади та їхній вплив.'
      points: 40
    - criteria: 'Аргументація щодо демократії'
      description: 'Учень логічно пов''язує свободу слова із захистом демократичних цінностей.'
      points: 30