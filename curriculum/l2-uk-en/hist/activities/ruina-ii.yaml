- type: reading
  id: reading-alliance-1669
  title: "Контекст: Протекторат та його сприйняття"
  source: "Історичний аналіз Корсунської угоди"
  text: |
    Укладення союзу з могутньою Османською імперією було блискучим прикладом Realpolitik. Після зради в Андрусові Дорошенко опинився в оточенні ворогів. Стамбул залишався єдиною силою, здатною гарантувати територіальну цілісність держави. Це був не васалітет з виплатою данини, а протекторат: султан здійснював лише номінальний сюзеренітет, тоді як Чигирин повністю контролював внутрішні справи. Водночас народ, наляканий іновірцями та татарськими набігами, сприйняв цей геополітичний тріумф як трагедію.

- type: critical-analysis
  source_reading: reading-alliance-1669
  title: "Спростування міфів: Дорошенко як зрадник"
  instruction: "Проаналізуйте поширені історичні міфи щодо османського вектору Петра Дорошенка."
  questions:
    - "Чому імперська історіографія століттями таврувала Дорошенка як зрадника, що продав Україну туркам?"
    - "Які факти з умов Корсунської угоди 1669 року спростовують міф про рабське підпорядкування султану?"
    - "У чому полягала принципова різниця між статусом протекторату і традиційним васалітетом з виплатою данини?"
    - "Як концепція Realpolitik характеризує зовнішньополітичні рішення гетьмана після Андрусівського перемир'я?"

- type: essay-response
  source_reading: reading-alliance-1669
  title: "Есе-роздум: Турецький союз — помилка чи необхідність?"
  instruction: "Напишіть аргументоване есе, спираючись на історичний контекст."
  prompt: "Оцініть наслідки прийняття османського протекторату. Чи був цей геополітичний крок блискучою дипломатичною перемогою на макрорівні, чи фатальною політичною помилкою, яка призвела до втрати народної довіри? Обґрунтуйте свою позицію."
  min_words: 150
  rubric:
    - criteria: "Історична аргументація"
      description: "Використання конкретних фактів про Корсунську угоду та Бучацький мир."
      points: 10
    - criteria: "Аналіз наслідків"
      description: "Оцінка впливу союзу на настрої населення та внутрішню стабільність."
      points: 10

- type: comparative-study
  title: "Порівняльний аналіз: Державність проти Вольниці"
  instruction: "Порівняйте політичні погляди та методи двох видатних діячів епохи Руїни."
  items_to_compare:
    - "Петро Дорошенко (гетьман)"
    - "Іван Сірко (кошовий отаман)"
  criteria:
    - "Головна політична мета та ставлення до ідеї єдиної держави"
    - "Ставлення до союзників (зокрема до Османської імперії та Криму)"
    - "Методи ведення боротьби: регулярна армія проти партизанських набігів"
  prompt: "Проаналізуйте, чому конфлікт між цими двома лідерами став фатальним для української державності в сімнадцятому столітті. На чиєму боці була історична рація?"

- type: true-false
  title: "Перевірка фактів: Епоха Петра Дорошенка"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Метафора 'Сонце Руїни' з'явилася ще за життя Петра Дорошенка і використовувалася його сучасниками."
      correct: false
      explanation: "Цей концепт став загальновідомим значно пізніше, завдяки історичній драмі Василя Пачовського 1911 року."
    - statement: "Корсунська угода 1669 року звільняла Українську державу від необхідності сплачувати данину турецькому султану."
      correct: true
      explanation: "Відсутність данини була ключовою умовою союзу, що підкреслювало статус протекторату, а не підкореної провінції."
    - statement: "Створений Дорошенком корпус сердюків складався виключно з представників вищої козацької старшини."
      correct: false
      explanation: "Сердюки були регулярною найманою піхотою, чия вірність належала особисто гетьману, а не місцевим полковникам."
    - statement: "Андрусівське перемир'я 1667 року передбачало поділ українських земель між Московським царством та Річчю Посполитою."
      correct: true
      explanation: "Це перемир'я розкололо країну по Дніпру, ставши безпрецедентною зрадою з боку християнських союзників."
    - statement: "Іван Сірко повністю підтримував дипломатичні зусилля Дорошенка і допомагав йому в переговорах з кримським ханом."
      correct: false
      explanation: "Сірко здійснював самовільні рейди на кримські улуси, руйнуючи дипломатичні угоди гетьманського уряду."
    - statement: "У Бучацькому договорі польська сторона вперше офіційно визнала існування Української держави."
      correct: true
      explanation: "У латиномовному тексті договору вперше в міжнародній дипломатії було використано термін 'Panstwo Ukrainskie'."
    - statement: "Після падіння Кам'янця-Подільського османська адміністрація суворо заборонила перетворювати християнські храми на мечеті."
      correct: false
      explanation: "Незважаючи на офіційні умови союзу, на Поділлі почалося масове перетворення величних соборів на мечеті."
    - statement: "Під час Чигиринських походів козацьку столицю захищав об'єднаний гарнізон козаків та московських військ."
      correct: true
      explanation: "Місто обороняли війська Івана Самойловича та князя Ромодановського разом з місцевими захисниками."
    - statement: "Петро Дорошенко був страчений після своєї капітуляції у 1676 році за наказом московського царя."
      correct: false
      explanation: "Дорошенко був відправлений у почесне заслання до Москви, де прожив решту життя і був призначений воєводою."
    - statement: "Головною політичною метою Петра Дорошенка було збереження незалежності лише Правобережної України."
      correct: false
      explanation: "Його абсолютною стратегічною метою була соборність — об'єднання обох берегів Дніпра в єдину державу."