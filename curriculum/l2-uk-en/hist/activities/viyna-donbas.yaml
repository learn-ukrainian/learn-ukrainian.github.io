- type: reading
  id: "reading-dap-defense"
  title: "Первинне джерело - Спогади про Донецький аеропорт"
  source: "Павло Новіцький, захисник ДАП"
  instruction: "Прочитайте спогади учасника оборони Донецького аеропорту."
  text: |
    Ми були на диспетчерській вежі, коли температура впала до мінус двадцяти чотирьох градусів. Постійні артилерійські обстріли не припинялися ні вдень, ні вночі. Але найважче було не від холоду чи втоми, а від розуміння, що ми відрізані. Проте ми трималися, бо знали, що за нами Україна. Ми навіть співали колядки на Різдво, щоб підняти бойовий дух, хоча ворог був зовсім поруч.

- type: critical-analysis
  title: "Критичний аналіз тексту"
  source_reading: "reading-dap-defense"
  instruction: "Проаналізуйте наведений текст та дайте відповіді на запитання."
  target_text: "Ми навіть співали колядки на Різдво, щоб підняти бойовий дух, хоча ворог був зовсім поруч."
  questions:
    - "Які умови несення служби описує автор спогадів?"
    - "Яку роль відігравали культурні традиції під час оборони?"
    - "Як цей фрагмент впливає на розуміння мотивації захисників?"
  model_answers:
    - "Автор описує екстремальні умови низькі температури, постійні артилерійські обстріли та перебування в оточенні."
    - "Культурні традиції допомагали психологічно вижити, зберігали зв'язок з мирним життям та підтримували моральний дух."
    - "Це свідчить про високий рівень усвідомлення своєї місії та незламність українських захисників."

- type: essay-response
  title: "Есе про Мінські угоди"
  instruction: "Напишіть розгорнуту відповідь на запропоновану тему."
  prompt: "Проаналізуйте політичні та військові наслідки Мінських угод для України. Чому цей дипломатичний процес призвів до позиційної війни, а не до остаточного миру?"
  min_words: 150
  model_answer: "Мінські угоди були підписані під величезним військовим тиском з боку Росії. Головною причиною їхньої неефективності було те, що Росія не визнавала себе стороною конфлікту. Вона вимагала, щоб Україна вела переговори з маріонетковими республіками, намагаючись легітимізувати окупаційні адміністрації. Угоди дозволили тимчасово зупинити наступ і зменшити втрати, але перетворили конфлікт на позиційну війну."
  rubric:
    - criteria: "Історичний контекст"
      description: "Есе пояснює умови підписання угод та роль Російської Федерації."
      points: 10
    - criteria: "Аналіз наслідків"
      description: "Наведено чіткі причини переходу до позиційної війни та збереження російського впливу."
      points: 10

- type: comparative-study
  title: "Порівняльний аналіз наративів"
  instruction: "Порівняйте російську пропагандистську версію подій з реальними історичними фактами."
  items_to_compare:
    - "Російський міф про громадянську війну на сході України"
    - "Історичні факти щодо збройної агресії Російської Федерації"
  criteria:
    - "Походження важкого озброєння"
    - "Керівництво військовими операціями"
    - "Джерела фінансування збройних формувань"
  prompt: "Опишіть, як російська пропаганда пояснювала причини конфлікту, і зіставте це з доказами прямої участі російської армії та спецслужб."
  model_answer: "Пропаганда стверджувала, що зброю місцеві бойовики знайшли у шахтах. Насправді важка техніка, як-от танки та зенітні комплекси, перетинала кордон з території Росії. Керівництво здійснювали не місцеві лідери, а російські офіцери. Фінансування повністю забезпечувалося російським урядом, що перетворює конфлікт на міжнародну збройну агресію."

