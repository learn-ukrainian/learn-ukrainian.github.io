- type: reading
  id: reading-kulish
  title: "Первинне джерело: Лист Миколи Куліша"
  source: "Микола Куліш (1937)"
  text: |
    Софіє! Соню! Учора дав мені товариш скалку від дзеркальця, я глянув на себе й не впізнав. Не тільки голова, а й брови посивіли. Зразу подумав: може, то іній (це надворі було), тернув долонею — ні, не іній... Більше не дивитимуся.

- type: critical-analysis
  source_reading: reading-kulish
  title: "Аналіз першоджерела: Лист із Соловків"
  instruction: "Проаналізуйте наведений уривок з листа Миколи Куліша та дайте відповіді на запитання."
  questions:
    - "Який психологічний стан автора передає цей короткий уривок?"
    - "Чому деталь про скалку від дзеркальця є такою важливою для розуміння умов утримання в'язнів?"
    - "Як ви розумієте фінальну фразу 'Більше не дивитимуся'?"
  model_answers:
    - "Уривок передає стан глибокого шоку, відчаю та передчуття неминучої загибелі."
    - "Ця деталь свідчить про повну відсутність базових побутових умов та тотальне знеособлення в'язнів."
    - "Ця фраза символізує відмову сприймати жахливу реальність та усвідомлення власної приреченості."
  focus_points:
    - "Емоційний та психологічний стан"
    - "Символізм побутових деталей"
    - "Дегуманізація в'язнів"

- type: reading
  id: reading-lemkin
  title: "Первинне джерело: Рафал Лемкін про геноцид"
  source: "Рафал Лемкін, Радянський геноцид в Україні (1953)"
  text: |
    Першим ударом було спрямовано на інтелігенцію — мозок нації, щоб паралізувати тіло нації. Це був перший етап послідовного плану ліквідації українського народу. Завданням було знищити культурний і політичний провід.

- type: essay-response
  source_reading: reading-lemkin
  title: "Есе: Знищення еліти як акт геноциду"
  prompt: "Спираючись на концепцію Рафала Лемкіна та матеріали модуля, напишіть есе про те, чому фізичне знищення української інтелігенції у 1930-х роках розглядається як ключова складова геноциду. Як це вплинуло на подальший розвиток нації?"
  instruction: "Напишіть аргументоване есе. Використовуйте історичні факти з модуля."
  min_words: 150
  model_answer: "Знищення інтелігенції було свідомим актом геноциду, оскільки інтелігенція формувала національну ідентичність і політичну волю українців. За Лемкіним, це був удар по 'мозку нації'. Метою імперії було перетворення українців на безвольну етнографічну масу. Наслідками стали десятиліття панування соцреалізму, поширення комплексу меншовартості та страх перед проявами національної ідентичності. Це був штучний злам природного культурного розвитку, який відкинув націю на багато років назад."
  rubric:
    - criteria: "Розуміння концепції Лемкіна"
      description: "Автор чітко пояснює роль інтелігенції як 'мозку нації'."
      points: 4
    - criteria: "Історична аргументація"
      description: "Використано конкретні факти з модуля для підтвердження тез."
      points: 4
    - criteria: "Аналіз наслідків"
      description: "Глибоко розкрито довгострокові наслідки терору для української культури."
      points: 2

- type: true-false
  title: "Правда чи вигадка: Механізми терору"
  instruction: "Визначте, які з наведених тверджень є правдивими, а які — хибними."
  items:
    - statement: "Наказ НКВС № 00447 запровадив систему лімітів на кількість репресованих осіб для кожної області."
      correct: true
      explanation: "Так, держава спускала кожній області конкретний план убивств та ув'язнень."
    - statement: "Співробітники НКВС використовували метод 'Конвеєр', який полягав у наданні в'язням комфортних умов для роздумів."
      correct: false
      explanation: "Конвеєр — це багатодобовий безперервний допит без сну зі зміною слідчих, спрямований на злам психіки."
    - statement: "Биківнянський ліс під Києвом став місцем масового таємного поховання жертв сталінських репресій."
      correct: true
      explanation: "Це найбільше в Україні місце поховання жертв масових політичних репресій."
    - statement: "Радянська влада відкрито публікувала списки розстріляних у газетах для залякування населення."
      correct: false
      explanation: "Влада ретельно приховувала масштаби розстрілів і місця поховань, родинам повідомляли про заслання без права листування."
    - statement: "Позасудові трійки виносили вироки після ретельного розгляду справ за участю адвокатів."
      correct: false
      explanation: "Трійки виносили вироки заочно, масово і без жодного захисту чи оскарження."
    - statement: "Знищення української інтелігенції Рафал Лемкін кваліфікував як складову геноциду."
      correct: true
      explanation: "Лемкін стверджував, що це був удар по 'розуму нації' з метою її знищення."
    - statement: "Соловецький табір особливого призначення був місцем ув'язнення багатьох видатних українських митців."
      correct: true
      explanation: "СЛОН став символом ГУЛАГу, де утримували і згодом розстріляли Курбаса, Куліша, Зерова."
    - statement: "Урочище Сандармох було віднайдене лише у 1997 році російським дослідником Юрієм Дмитрієвим."
      correct: true
      explanation: "Юрій Дмитрієв провів титанічну роботу в архівах та експедиціях, щоб знайти це місце."
    - statement: "Радянська пропаганда завжди визнавала, що в Биківні поховані жертви НКВС."
      correct: false
      explanation: "Радянська влада роками брехала, що там поховані жертви нацистської окупації."
    - statement: "В епоху хрущовської відлиги радянська влада повністю визнала провину за організацію геноциду."
      correct: false
      explanation: "Влада визнала лише 'перегини' та 'помилки' Сталіна, але ніколи не визнавала геноцид."