- type: reading
  id: reading-knyhy-buttia
  title: 'Первинне джерело: Книги буття українського народу'
  source: Микола Костомаров (1846)
  text: 'І встане Україна із своєї могили, і знову озветься до всіх братів своїх слов’ян,
    і почують крик її, і встане Слов’янщина, і не позостанеться ні царя, ні царевича,
    ні царівни, ні князя, ні графа, ні герцога...

    '
  tasks:
  - Проаналізуйте, які політичні інститути скасовуються у цьому тексті.
- type: true-false
  title: 'Перевірка фактів: Історія товариства'
  items:
  - statement: Кирило-Мефодіївське братство проіснувало офіційно більше десяти років.
    correct: false
    explanation: Організація існувала лише чотирнадцять місяців, з грудня 1845 до
      березня 1847 року.
  - statement: Головним ідеологічним документом товариства були Книги буття українського
      народу.
    correct: true
    explanation: Цей документ містив квінтесенцію політичних, соціальних та моральних
      поглядів.
  - statement: Тарас Шевченко був одним із перших засновників таємного товариства.
    correct: false
    explanation: Він долучився до нього пізніше, у квітні 1846 року, хоча і став його
      душею.
  - statement: Товариство пропонувало створити слов’янську федерацію зі столицею у
      Москві.
    correct: false
    explanation: Столицею нової демократичної конфедерації рівних республік мав стати
      Київ.
  - statement: Члени братства виступали за негайне скасування кріпацтва.
    correct: true
    explanation: Вони вважали володіння людьми найбільшим злочином проти Бога та людяності.
  - statement: Російська поліція вважала братчиків безпечними мрійниками і майже не
      карала їх.
    correct: false
    explanation: Поліція жорстоко розгромила товариство, а вироки були надзвичайно
      суворими.
  - statement: Микола Гулак виявив неймовірну стійкість під час допитів і відмовився
      давати свідчення.
    correct: true
    explanation: Він не видав побратимів і отримав найважче покарання серед засновників.
  - statement: Пантелеймон Куліш належав до радикального революційного крила організації.
    correct: false
    explanation: Куліш належав до поміркованого крила і вважав головним інструментом
      освіту.
  - statement: Ідеї братства базувалися виключно на російському імперському панславізмі.
    correct: false
    explanation: Вони базувалися на українському демократичному панславізмі, що відкидав
      домінування будь-якої нації.
  - statement: Заарештованого Тараса Шевченка відправили в заслання із забороною писати
      й малювати.
    correct: true
    explanation: Це була особиста помста імператора Миколи I за сатиричну поему Сон.
  instruction: Визначте, чи твердження правильне.
- type: critical-analysis
  source_reading: reading-knyhy-buttia
  title: 'Критичний аналіз: Месіанство та політична місія'
  questions:
  - Чому український народ розглядається у тексті як народ-мученик, що має воскреснути?
  - Яким чином релігійна лексика посилювала політичний меседж цього документа?
  model_answers:
  - Ідея воскресіння підкреслює, що через свої страждання українці отримали моральне
    право стати лідером серед вільних республік, показуючи приклад боротьби.
  - Використання біблійного стилю надавало вимогам сакрального авторитету, перетворюючи
    боротьбу за свободу на виконання Божої волі.
  focus_points:
  - Метафора смерті та воскресіння нації
  - Концепція політичного гріхопадіння
- type: comparative-study
  title: 'Порівняльне дослідження: Дві візії панславізму'
  items_to_compare:
  - Український демократичний панславізм
  - Російський імперський панславізм
  criteria:
  - Мета об’єднання слов’ян
  - Політичний устрій держави
  - Роль і права окремих націй
  prompt: Порівняйте дві концепції об’єднання слов’ян. Чому українська візія становила
    екзистенційну загрозу для імперії?
  model_answer: Український панславізм пропонував конфедерацію вільних республік зі
    скасуванням монархії. Натомість імперський панславізм передбачав розширення кордонів,
    абсолютну монархію та русифікацію народів. Українська концепція повністю руйнувала
    фундамент російського самодержавства.
- type: essay-response
  source_reading: reading-knyhy-buttia
  title: 'Есе: Історична спадщина кирило-мефодіївців'
  prompt: Проаналізуйте, чому діяльність братства, що існувало лише 14 місяців, вважається
    епохальним явищем. Який вплив воно мало на подальше формування української нації?
  min_words: 200
  model_answer: Братство здійснило перехід від культурництва до відкритої політичної
    боротьби. Вперше було сформульовано ідею України як окремої політичної нації з
    демократичними цінностями. Їхня програма скасування кріпацтва та створення республіки
    випередила європейську Весну народів. Попри арешти, їхні ідеї лягли в основу Громадівського
    руху та стали фундаментом незалежності.
  rubric:
  - criteria: Історична аргументація
    description: Наявність прикладів переходу від етнографії до політики.
    points: 40
  - criteria: Аналіз наслідків
    description: Оцінка впливу ідей на наступні покоління.
    points: 40
  - criteria: Структура тексту
    description: Логічна побудова та дотримання стилю.
    points: 20
