- type: reading
  id: reading-thomas-roe
  title: 'Свідчення Томаса Ро про козаків'
  source: 'Звіт англійського посла сера Томаса Ро (1623 рік)'
  text: 'Козаки для них [турків] набагато небезпечніші від їхніх наймогутніших і найсильніших ворогів, тому що вони щоразу заважають життєво необхідному завезенню провіанту в сам Константинополь.'
  instruction: 'Прочитайте уважно цитату англійського дипломата для подальшого аналізу.'
  tasks:
    - 'Проаналізуйте, яку саме вразливість Османської імперії виділяє автор.'

- type: critical-analysis
  title: 'Аналіз стратегії виснаження'
  source_reading: reading-thomas-roe
  instruction: 'Дайте розгорнуті відповіді на питання на основі цитати Томаса Ро.'
  target_text: 'Козаки для них [турків] набагато небезпечніші від їхніх наймогутніших і найсильніших ворогів...'
  questions:
    - 'Чому переривання логістики мало більший вплив на Османську імперію, ніж прямі військові сутички?'
    - 'Який психологічний ефект справляли ці перебої на керівництво у Стамбулі?'
  model_answers:
    - 'Переривання постачання продовольства морем миттєво викликало дефіцит і загрозу бунтів у величезній столиці, що змушувало султана відволікати армію на її захист.'
    - 'Це створювало постійне відчуття вразливості та паніки навіть у глибокому тилу.'
  focus_points:
    - 'Асиметрична війна'
    - 'Морська логістика'

- type: comparative-study
  title: 'Порівняння військових кораблів'
  instruction: 'Порівняйте бойові характеристики козацької чайки та османської галери.'
  items_to_compare:
    - 'Козацька чайка'
    - 'Османська галера'
  criteria:
    - 'Маневреність та навігація на мілководді'
    - 'Вогнева міць та артилерія'
    - 'Стійкість до ушкоджень'
    - 'Тактика ведення бою'
  prompt: 'Напишіть порівняльний аналіз двох типів суден, пояснюючи, як конструктивні особливості чайки дозволяли козакам ефективно протистояти більшим і важче озброєним галерам.'
  model_answer: 'Чайка була значно меншою і мала пласке дно, що дозволяло їй долати мілководдя. Завдяки фашинам з очерету вона була практично непотоплюваною. Галера мала потужну артилерію, але була неповороткою. Козаки компенсували брак важких гармат швидкістю, маневреністю та тактикою абордажу, атакуючи з боку сліпучого сонця і входячи у мертву зону галери.'

- type: true-false
  title: 'Перевірка фактів про морські походи'
  instruction: 'Визначте, чи є твердження правдивими чи хибними.'
  items:
    - statement: 'Османська імперія використовувала Чорне море як закрите внутрішнє озеро для торгівлі та логістики.'
      correct: true
      explanation: 'Чорне море називали Karadeniz (Турецьке озеро), і воно було закритим для іноземних кораблів.'
    - statement: 'Козацькі чайки будували виключно з дуба і вони мали глибокий кіль для стійкості.'
      correct: false
      explanation: 'Чайки мали пласке дно без кіля, а основою слугував видовбаний стовбур липи або верби.'
    - statement: 'Фашини на бортах чайок слугували як рятувальний круг та броня від ворожих куль.'
      correct: true
      explanation: 'В''язанки очерету (фашини) забезпечували непотоплюваність та захист екіпажу.'
    - statement: 'На козацьких човнах веслярів завжди набирали з полонених рабів.'
      correct: false
      explanation: 'На чайці кожен весляр був повноцінним і універсальним воїном-козаком.'
    - statement: 'У морських походах серед козаків дозволялося помірне вживання алкоголю для зігрівання.'
      correct: false
      explanation: 'Діяв суворий сухий закон: за вживання алкоголю козака викидали за борт.'
    - statement: 'Петро Сагайдачний змінив тактику з пасивної оборони на превентивні удари по ворожих базах.'
      correct: true
      explanation: 'Він переніс бойові дії на Чорне море, атакуючи османські порти та верфі.'
    - statement: 'Козаки ніколи не наважувалися підходити безпосередньо до Стамбула.'
      correct: false
      explanation: 'У 1615 році козаки увійшли в протоку Босфор і спалили передмістя Стамбула.'
    - statement: 'Взяття фортеці Кафа у 1616 році дозволило звільнити тисячі українських невільників.'
      correct: true
      explanation: 'Кафа була найбільшим невільничим ринком, і її знищення мало величезне моральне значення.'
    - statement: 'Османські гармати на галерах легко розбивали чайки на ближній дистанції.'
      correct: false
      explanation: 'Гармати стояли високо, і чайки входили у мертву зону, куди ядра не могли дістати.'
    - statement: 'Морські походи довели, що козацтво було потужною геополітичною силою, здатною вести асиметричну війну.'
      correct: true
      explanation: 'Козаки руйнували імперську монополію і діяли як незалежний суб''єкт міжнародних відносин.'

- type: essay-response
  title: 'Есе: Чорноморська стратегія Сагайдачного'
  instruction: 'Напишіть есе на задану тему.'
  prompt: 'Проаналізуйте роль гетьмана Петра Сагайдачного у реформуванні запорозького війська та розвитку українського флоту. Як його стратегія перенесення війни на ворожу територію вплинула на Османську імперію та авторитет козацтва в Європі?'
  min_words: 200
  model_answer: 'Петро Сагайдачний здійснив революційну реформу, перетворивши неорганізовані ватаги на регулярну армію із залізною дисципліною. Його стратегія превентивних ударів кардинально змінила баланс сил. Замість того, щоб чекати нападу татар, козаки систематично руйнували османські військові бази, арсенали та верфі, як це сталося в Синопі та Кафі. Це завдало колосальних економічних збитків імперії та порушило її логістику. Психологічний ефект був настільки сильним, що султан мусив тримати флот біля столиці. Завдяки цим походам, українське козацтво утвердилося як могутня військово-політична сила (таласократія), яка зламала османську гегемонію на Чорному морі.'
  rubric:
    - criteria: 'Аналіз реформ Сагайдачного'
      description: 'Детально описано зміни у військовій дисципліні та організації війська.'
      points: 4
    - criteria: 'Оцінка стратегії превентивних ударів'
      description: 'Пояснено логіку перенесення бойових дій на ворожу територію.'
      points: 3
    - criteria: 'Аналіз геополітичних наслідків'
      description: 'Розкрито вплив морських походів на Османську імперію та статус України.'
      points: 3