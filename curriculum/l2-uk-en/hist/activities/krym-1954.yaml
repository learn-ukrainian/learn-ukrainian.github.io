- type: "reading"
  id: "reading-ukaz-1954"
  title: "Первинне джерело: Указ про передачу Кримської області"
  source: "Указ Президії Верховної Ради СРСР (19 лютого 1954)"
  instruction: "Уважно прочитайте уривок і підготуйтеся до аналізу."
  text: |
    Враховуючи спільність економіки, територіальну близькість і тісні господарські й культурні зв'язки між Кримською областю і Українською РСР, Президія Верховної Ради Союзу Радянських Соціалістичних Республік постановляє:
    Затвердити спільне подання Президії Верховної Ради РРФСР і Президії Верховної Ради УРСР про передачу Кримської області зі складу Російської Радянської Федеративної Соціалістичної Республіки до складу Української Радянської Соціалістичної Республіки.
  tasks:
    - "Проаналізуйте аргументацію передачі Кримської області."

- type: "true-false"
  title: "Перевірка фактів: історичні реалії 1954 року"
  instruction: "Визначте, які твердження є правдивими, а які — хибними."
  items:
    - statement: "Ініціатива передачі півострова належала виключно Микиті Хрущову як одноосібне рішення."
      correct: false
      explanation: "Рішення було колегіальним, за участю впливових фігур радянського керівництва."
