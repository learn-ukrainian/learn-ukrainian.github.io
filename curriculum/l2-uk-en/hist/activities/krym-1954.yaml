      correct: true
      explanation: "Масова депортація корінного народу відбулася у травні 1944 року."
    - statement: "Економічна ситуація в області після закінчення війни була дуже стабільною."
      correct: false
      explanation: "Регіон перебував у стані глибокої економічної руїни та агрономічного колапсу."
    - statement: "Переселенці з російської глибинки миттєво адаптувалися до гірського землеробства на півдні."
      correct: false
      explanation: "Спроба переселення повністю провалилася через відсутність у людей знань про специфіку місцевого клімату."
    - statement: "Офіційні документи 1954 року не містили жодної згадки про подарунок на честь ювілею."
      correct: true
      explanation: "Указ оперував лише прагматичними поняттями: спільність економіки та територіальна близькість."
    - statement: "Українське партійне керівництво сприйняло передачу як величезну нагороду."
      correct: false
      explanation: "У Києві це рішення називали економічним хомутом, який вимагав колосальних фінансових інвестицій."
    - statement: "Процедура зміни кордонів відбулася з грубим порушенням тогочасного радянського законодавства."
      correct: false
      explanation: "Усі необхідні юридичні вимоги Конституції СРСР 1936 року були повністю дотримані."
    - statement: "До 1954 року Крим був нерозривно пов'язаний з материковою Україною транспортом та інфраструктурою."
      correct: true
      explanation: "Головні комунікації йшли виключно через Перекопський перешийок з боку України."
    - statement: "Будівництво Північно-Кримського каналу стало головним інфраструктурним проривом українського періоду."
      correct: true
      explanation: "Цей масштабний канал дозволив врятувати економіку степового Криму від тотального зневоднення."
    - statement: "На референдумі 1991 року абсолютна більшість кримчан проголосували проти державної незалежності України."
      correct: false
      explanation: "П'ятдесят чотири відсотки жителів Криму добровільно підтримали Акт проголошення незалежності."

- type: "critical-analysis"
  title: "Аналіз тексту указу: пошук прагматизму"
  source_reading: "reading-ukaz-1954"
  instruction: "Проаналізуйте наведений текст документа, давши відповіді на запитання."
  target_text: "Текст Указу Президії Верховної Ради СРСР від 19 лютого 1954 року"
  questions:
    - "Які три ключові причини передачі Кримської області вказані в тексті офіційного указу?"
    - "Чому в юридичному документі повністю відсутні згадки про так зване возз'єднання України з Росією?"
    - "Яким чином офіційне обґрунтування повністю руйнує сучасний російський міф про щедрий подарунок?"
  model_answers:
    - "В указі чітко названі такі об'єктивні причини: спільність економіки, територіальна близькість і тісні господарські й культурні зв'язки."
    - "Офіційні документи оперують виключно прагматичними обґрунтуваннями, тоді як гучні ювілеї слугували лише ідеологічним фасадом для радянської преси."
    - "Сухий діловий текст переконливо доводить, що передача була необхідним економічним кроком для порятунку регіону."
  focus_points:
    - "Економічна доцільність як основа прийнятого рішення"
    - "Контраст між суворим юридичним документом і гучною пропагандою"

- type: "comparative-study"
  title: "Порівняльний аналіз сільського господарства"
  instruction: "Уважно порівняйте два кардинально різні підходи до ведення сільського господарства на півострові."
  items_to_compare:
    - "Традиційне ефективне господарювання кримських татар до 1944 року"
    - "Спроба господарювання російських переселенців у 1944-1953 роках"
  criteria:
    - "Раціональне використання гірських водних ресурсів"
    - "Вибір основних сільськогосподарських культур для вирощування"
    - "Розуміння місцевого ландшафту та посушливого клімату"
  prompt: "На основі вашого порівняння зробіть аргументований висновок, чому спроба колонізації російськими селянами зазнала такого нищівного краху."
  model_answer: "Кримські татари століттями дбайливо адаптувалися до місцевих складних умов, збираючи воду в горах і вирощуючи специфічні південні культури. Російські переселенці вперто намагалися застосувати свій північний досвід: швидко виснажували підземні води та садили звичайну картоплю під палючим сонцем, що стрімко призвело до агрономічного колапсу."

- type: "essay-response"
  title: "Деконструкція сучасної російської пропаганди"
  source_reading: "reading-ukaz-1954"
  instruction: "Напишіть розгорнуту аналітичну відповідь, спираючись виключно на підтверджені історичні факти."
  prompt: "Детально опишіть, як сучасна російська пропаганда використовує вигаданий міф про подарунок Криму для спроб виправдання збройної окупації 2014 року. Чому глибоке розуміння реальних подій 1954 року є надзвичайно важливою інтелектуальною зброєю в інформаційній війні?"
  min_words: 150
  model_answer: "Російська державна пропаганда агресивно маніпулює історією 1954 року, навмисно зображуючи передачу Криму як історичну помилку або незаконний особистий подарунок Хрущова. Це робиться для того, щоб надати військовій окупації 2014 року фальшивого вигляду відновлення історичної справедливості. Проте архівні документи, як-от офіційний текст указу та стенограми, переконливо доводять, що рішення було колегіальним, повністю легітимним та викликаним глибокою економічною кризою. Передача стала справжнім порятунком для повністю зруйнованого регіону завдяки колосальним ресурсам УРСР. Розуміння цих фактів вщент руйнує колоніальний наратив і підтверджує законність перебування Криму у складі України."
  rubric:
    - criteria: "Використання об'єктивних історичних фактів"
      description: "Есе містить правильні посилання на тогочасну економічну кризу та абсолютну юридичну легітимність указу."
      points: 40
    - criteria: "Глибокий аналіз пропагандистських наративів"
      description: "Автор чітко і логічно пояснив механізм штучного створення міфу та його агресивну сучасну мету."
      points: 30
    - criteria: "Логічна структура та аргументація"
      description: "Текст має логічну послідовність думок, наявність аргументованого вступу та чітких висновків."
      points: 30