- type: reading
  id: reading-dekaloh
  title: 'Первинне джерело: Декалог українського націоналіста'
  source: 'Степан Ленкавський (1929)'
  text: |
    Я дух одвічної стихії, що зберіг Тебе від татарської потопи й поставив на грані двох світів творити нове життя.
    1. Здобудеш Українську Державу, або згинеш у боротьбі за Неї.
    2. Не дозволиш нікому плямити слави, ні честі Твоєї Нації.
    3. Пам'ятай про великі дні наших Визвольних змагань.

- type: critical-analysis
  title: 'Аналіз тексту: Ідеологія Декалогу'
  source_reading: reading-dekaloh
  instruction: 'Проаналізуйте наведений уривок та дайте відповіді на запитання.'
  questions:
    - 'Яким чином текст формує ставлення підпільника до власного життя та національної мети?'
    - 'Чому перша заповідь містить настільки категоричний вибір (здобудеш або згинеш)?'
    - 'Як цей документ відображає концепцію інтегрального націоналізму та волюнтаризму?'

- type: true-false
  title: 'Факти та міфи про ОУН'
  instruction: 'Визначте, чи є твердження істинним чи хибним.'
  items:
    - statement: 'Створення Організації Українських Націоналістів відбулося у Відні в 1929 році.'
      correct: true
      explanation: 'Перший Конгрес українських націоналістів пройшов саме у столиці Австрії.'
    - statement: 'Ідеологія ОУН базувалася на принципах марксистського соціалізму та лібералізму.'
      correct: false
      explanation: 'ОУН категорично відкидала соціалізм та лібералізм, вважаючи їх причинами поразки визвольних змагань.'
    - statement: 'Українська Військова Організація стала основним фундаментом для формування ОУН.'
      correct: true
      explanation: 'Ветерани УВО передали ОУН свої кадри, бойовий досвід і розгалужену мережу.'
    - statement: 'Дмитро Донцов був першим офіційним Провідником Організації Українських Націоналістів.'
      correct: false
      explanation: 'Провідником був Євген Коновалець, а Донцов створив ідеологічну базу, але ніколи не був членом ОУН.'
    - statement: 'Польська політика пацифікації 1930 року призвела до зменшення підтримки ОУН серед населення.'
      correct: false
      explanation: 'Жорстокі репресії під час пацифікації лише радикалізували суспільство та посилили підтримку підпілля.'
    - statement: 'Атентати, які здійснювала ОУН, мали характер точкової політичної відплати за репресії окупантів.'
      correct: true
      explanation: 'Наприклад, вбивство Майлова було актом помсти за Голодомор, а Пєрацького — за пацифікацію.'
    - statement: 'Під час судових процесів Степан Бандера та інші підсудні публічно покаялися перед польською владою.'
      correct: false
      explanation: 'Вони використали суд як трибуну для маніфестації своїх ідей і відмовилися розмовляти польською мовою.'
    - statement: 'Головною стратегічною метою ОУН було створення автономної республіки в складі відновленої Польщі.'
      correct: false
      explanation: 'Абсолютною і єдиною метою була Українська Самостійна Соборна Держава.'
    - statement: 'Після вбивства Євгена Коновальця в 1938 році організація зазнала глибокої внутрішньої кризи.'
      correct: true
      explanation: 'Ця криза керівництва та конфлікт поколінь призвели до остаточного розколу в 1940 році.'
    - statement: 'Степан Бандера очолив крило організації, яке перебувало переважно в політичній еміграції.'
      correct: false
      explanation: 'Еміграційне крило очолив Андрій Мельник, а Бандера був лідером радикального крила на українських землях.'

- type: comparative-study
  title: 'Порівняльний аналіз тактик боротьби'
  instruction: 'Порівняйте підходи легальних українських партій та радикального підпілля.'
  items_to_compare:
    - 'Легальні українські партії (наприклад, УНДО)'
    - 'Організація Українських Націоналістів'
  criteria:
    - 'Методи політичної боротьби'
    - 'Ставлення до окупаційної влади'
    - 'Кінцева політична ціль'

- type: essay-response
  title: 'Есе: Причини радикалізації визвольного руху'
  instruction: 'Напишіть розгорнуту відповідь на основі прочитаного матеріалу.'
  prompt: 'Як травма втрати державності та жорстока політика окупаційних режимів (зокрема пацифікація) вплинули на перехід української молоді до філософії радикального націоналізму? Обґрунтуйте свою думку історичними фактами.'
  min_words: 150
  rubric:
    - criteria: 'Історичний контекст'
      description: 'Глибоке розуміння умов бездержавності та політики окупаційних урядів.'
      points: 4
    - criteria: 'Аналіз причин'
      description: 'Чітке пояснення переходу від демократичних ілюзій до інтегрального націоналізму.'
      points: 6