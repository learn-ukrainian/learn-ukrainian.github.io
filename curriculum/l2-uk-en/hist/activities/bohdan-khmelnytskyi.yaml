- type: reading
  id: reading-khmelnytskyi
  title: "Первинне джерело: Звернення гетьмана"
  source: "Програмна промова до Адама Киселя (лютий 1649 року)"
  text: "Я єдиновладець і самодержець руський... Виб'ю з лядської неволі руський народ увесь! Перше я за свою шкоду і кривду воював — тепер буду воювати за віру православну нашу."
  tasks:
    - "Проаналізуйте еволюцію політичної мети Богдана Хмельницького."

- type: critical-analysis
  source_reading: reading-khmelnytskyi
  title: "Критичний аналіз політичної програми"
  target_text: "Виб'ю з лядської неволі руський народ увесь!"
  questions:
    - "Як еволюціонувала мета повстання від особистої кривди до національної ідеї?"
    - "Що означає концепт 'самодержець руський' у політичному контексті того часу?"
    - "Яку роль відігравав релігійний фактор у формуванні цієї політичної програми?"
    - "Як ця промова спростовує радянські міфи про так зване возз'єднання?"
  focus_points:
    - "Трансформація мотивів"
    - "Концепція суверенітету"
    - "Релігійна ідентичність"

- type: comparative-study
  title: "Історичні паралелі: Лідерство в епоху криз"
  items_to_compare:
    - "Богдан Хмельницький"
    - "Олівер Кромвель"
  criteria:
    - "Руйнування старого політичного порядку"
    - "Опора на революційну армію"
    - "Державотворчі інституції"
    - "Довгострокова політична спадщина"
  prompt: "Порівняйте діяльність Богдана Хмельницького та Олівера Кромвеля на основі запропонованих критеріїв. У чому полягає подібність їхніх дій як революційних лідерів, а в чому їхня принципова відмінність?"

- type: essay-response
  title: "Оцінка зовнішньої політики"
  prompt: "Проаналізуйте Переяславську угоду 1654 року в контексті багатовекторної дипломатії Богдана Хмельницького. Доведіть, спираючись на текст, що це був тимчасовий військовий протекторат, а не акт злиття держав."
  min_words: 250
  rubric:
    - criteria: "Історичний контекст"
      description: "Розуміння геополітичної ситуації та причин укладення угоди з Москвою."
      points: 10
    - criteria: "Аргументація"
      description: "Використання конкретних фактів для спростування міфу про возз'єднання."
      points: 15
    - criteria: "Аналіз наслідків"
      description: "Оцінка дій гетьмана після 1654 року, зокрема укладення нових союзів."
      points: 10

- type: true-false
  title: "Факти чи міфи про Богдана Хмельницького"
  instruction: "Визначте, чи є наведені твердження правдивими (true), чи хибними (false)."
  items:
    - statement: "Богдан Хмельницький походив із простого селянського роду."
      correct: false
      explanation: "Він належав до дрібної православної шляхти і його батько був чигиринським підстаростою."
    - statement: "Хмельницький досконало володів латиною та вільно цитував античних авторів."
      correct: true
      explanation: "Він отримав блискучу європейську освіту у Львівській єзуїтській колегії."
    - statement: "Повстання під проводом Хмельницького планувалося козаками протягом багатьох років."
      correct: false
      explanation: "Це міф. Повстання було спонтанним вибухом, спровокованим особистою кривдою від Данила Чаплинського."
    - statement: "Ключовим фактором у перших перемогах 1648 року став військовий союз із Кримським ханством."
      correct: true
      explanation: "Татарська кіннота Тугай-Бея повністю нейтралізувала перевагу польської важкої кавалерії."
    - statement: "Після блискучих перемог Хмельницький переніс політичну столицю своєї держави до Києва."
      correct: false
      explanation: "Київ залишався духовним центром, а реальною політичною столицею та дипломатичним центром став Чигирин."
    - statement: "Нова козацька держава мала власну фінансову систему та здійснювала спроби карбувати власну монету."
      correct: true
      explanation: "Була створена Генеральна військова скарбниця та запроваджена ефективна податкова система."
    - statement: "Гетьманські універсали були лише військовими наказами і не мали жодної юридичної сили."
      correct: false
      explanation: "Універсали були фундаментальними офіційними документами, які встановлювали нові закони та привілеї."
    - statement: "Переяславська рада 1654 року означала добровільне та остаточне злиття козацької держави з Московією."
      correct: false
      explanation: "Це був лише ситуативний військовий альянс та тимчасовий протекторат, що гарантував збереження повної автономії."
    - statement: "Під час переговорів у Переяславі московські посли відмовилися присягати від імені царя на вірність договору."
      correct: true
      explanation: "Вони зухвало заявили, що їхній самодержавний цар своїм підданим ніколи не присягає."
    - statement: "Після підписання угоди 1654 року Хмельницький припинив вести самостійну міжнародну дипломатію."
      correct: false
      explanation: "Він продовжував незалежну політику, зокрема уклавши новий антипольський альянс зі Швецією у 1656 році."