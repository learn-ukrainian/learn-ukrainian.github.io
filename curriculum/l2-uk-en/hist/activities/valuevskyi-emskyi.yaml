- type: reading
  id: reading-circular
  title: "Первинне джерело: Валуєвський циркуляр"
  source: "Петро Валуєв (1863)"
  text: |
    Беручи до уваги... пропуск же книг на малоросійській мові як духовного змісту, так навчальних і взагалі призначених для початкового читання народу, призупинити. Більшість малоросів самі вельми ґрунтовно доводять, що ніякої особливої малоросійської мови не було, немає і бути не може.
  tasks:
    - "Які саме категорії книг забороняв циркуляр?"
    - "Який аргумент наводив міністр щодо існування української мови?"

- type: critical-analysis
  title: "Аналіз тексту: Валуєвський циркуляр"
  source_reading: reading-circular
  instruction: "Проаналізуйте логіку імперського документа."
  target_text: "Більшість малоросів самі вельми ґрунтовно доводять, що ніякої особливої малоросійської мови не було, немає і бути не може..."
  questions:
    - "Чому Валуєв стверджує, що українці самі відмовляються від мови?"
    - "Яку політичну мету мав міф про зіпсоване наріччя?"
  model_answers:
    - "Це був пропагандистський прийом для розколу українського суспільства та створення ілюзії добровільної асиміляції."
    - "Міф про зіпсоване польським впливом наріччя виправдовував русифікацію як повернення до істинної російської мови."
  focus_points:
    - "Імперська пропаганда"
    - "Заперечення суб'єктності"

- type: true-false
  title: "Перевірка фактів: Мовні заборони"
  instruction: "Визначте, чи є ці твердження про мовні заборони правдивими."
  items:
    - statement: "Валуєвський циркуляр був прийнятий у тисяча вісімсот шістдесят третьому році."
      correct: true
      explanation: "Так, він був підписаний вісімнадцятого липня тисяча вісімсот шістдесят третього року."
    - statement: "Емський указ дозволяв друкувати українські переклади європейської літератури."
      correct: false
      explanation: "Емський указ категорично забороняв будь-які переклади українською мовою."
    - statement: "Валуєвський циркуляр був відкритим законом, опублікованим у всіх газетах."
      correct: false
      explanation: "Ні, це була суворо таємна відомча інструкція."
    - statement: "Пилип Морачевський здійснив переклад Нового Заповіту українською мовою."
      correct: true
      explanation: "Так, і це дуже налякало російську владу."
    - statement: "Емський указ забороняв українські театральні вистави."
      correct: true
      explanation: "Так, було введено повне табу на український театр."
    - statement: "Валуєв стверджував, що українська мова - це самостійна давня мова."
      correct: false
      explanation: "Він стверджував, що її не було, немає і бути не може."
    - statement: "Після Емського указу центр українського відродження перемістився до Львова."
      correct: true
      explanation: "Так, Львів став центром опору та вільного друку."
    - statement: "Російська влада заохочувала використання фонетичного правопису."
      correct: false
      explanation: "Навпаки, влада вимагала використовувати російський правопис."
    - statement: "Емський указ забороняв друкувати тексти українських пісень під музичними нотами."
      correct: true
      explanation: "Так, це був цілеспрямований удар по наймасовішому носію мови."
    - statement: "Михайло Драгоманов видавав журнал Громада у Санкт-Петербурзі."
      correct: false
      explanation: "Він був змушений емігрувати і видавав його у Женеві."

- type: reading
  id: reading-ems
  title: "Первинне джерело: Емський указ"
  source: "Олександр II (1876)"
  text: |
    Не допускати ввезення в межі Імперії без окремого на те дозволу Головного управління у справах друку будь-яких книг і брошур, що видаються за кордоном малоруським наріччям. Заборонити рівномірно будь-які на тому ж наріччі сценічні вистави, тексти до нот і публічні читання.
  tasks:
    - "Які обмеження стосувалися книжок, надрукованих за кордоном?"
    - "Що було заборонено в сфері музики і театру?"

- type: comparative-study
  title: "Порівняння двох документів"
  source_reading: reading-ems
  instruction: "Порівняйте рівень репресій у двох імперських документах."
  items_to_compare:
    - "Валуєвський циркуляр (1863)"
    - "Емський указ (1876)"
  criteria:
    - "Статус художньої літератури"
    - "Відношення до перекладів"
    - "Обмеження театру та музики"
  model_answer: "Валуєвський циркуляр ще залишав простір для художньої літератури, тоді як Емський указ був тотальною забороною. Емський указ також ввів заборону на театр, переклади та нотні тексти, що не було передбачено у 1863 році."

- type: essay-response
  title: "Есе: Культурний геноцид"
  source_reading: reading-circular
  instruction: "Напишіть розгорнуту відповідь на запитання."
  prompt: "Чому заборони української мови у ХІХ столітті сучасні науковці вважають формою культурного лінгвоциду? Наведіть аргументи, спираючись на аналіз Валуєвського циркуляра та Емського указу."
  min_words: 150
  model_answer: "Політика лінгвоциду полягала у свідомому знищенні мови для асиміляції українців. Імперія не просто забороняла книги, а намагалася відрізати мову від науки, освіти та релігії, щоб зупинити націєтворення."
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чітких аргументів щодо лінгвоциду."
      points: 10
    - criteria: "Використання джерел"
      description: "Згадка конкретних обмежень з циркуляра або указу."
      points: 10