- type: reading
  id: reading-mohyla
  title: 'Цитата Петра Могили про ідеал служіння'
  source: 'Петро Могила'
  text: |
    Гарно й почесно бути свічкою, бути оком, бути сіллю... Але свічка має світити, око має дивитися, сіль має діяти на гнилизну та її припиняти.

- type: critical-analysis
  title: 'Критичний аналіз: Ідеал служіння'
  source_reading: reading-mohyla
  instruction: 'Проаналізуйте філософію Петра Могили щодо відповідальності освіченої еліти.'
  questions:
    - 'Як ви розумієте метафори свічки, ока та солі у контексті виховання студентів Києво-Могилянської колегії?'
    - 'Чому Петро Могила вимагав від еліти не просто накопичення знань, а активної праці на благо народу?'
  model_answers:
    - 'Метафори означають, що еліта повинна просвіщати суспільство (свічка), бачити його проблеми (око) та активно виправляти моральні й соціальні недоліки (сіль).'
    - 'Він розумів, що в умовах бездержавності та зовнішнього тиску лише дієвий патріотизм та соціальна відповідальність освіченої верстви можуть захистити національну ідентичність.'

- type: comparative-study
  title: 'Порівняльний аналіз: Архітектура бароко'
  instruction: 'Порівняйте архітектурні стилі бароко, спираючись на історичний текст.'
  items_to_compare:
    - 'Західноєвропейське бароко'
    - 'Козацьке (українське) бароко'
  criteria:
    - 'Форма купола та загальна структура'
    - 'Фасадний декор і тематика ліпнини'
    - 'Колірна гама споруд'
  prompt: 'Які ключові відмінності між цими стилями роблять козацьке бароко самобутнім національним явищем, а не просто сліпою копією західних зразків?'
  model_answer: 'Козацьке бароко відрізняється грушоподібними багатоярусними банями (на відміну від напівсферичних), використанням пишних рослинних народних мотивів у ліпнині (виноград, соняшники замість античних статуй) та контрастною світлою колірною гамою (білосніжні стіни та яскраві дахи). Цей стиль став унікальним синтезом європейської барокової пишності та місцевої давньоруської хрестово-купольної традиції.'

- type: true-false
  title: 'Правда чи вигадка: Козацька культура'
  instruction: 'Визначте, чи є наведені твердження правдивими, спираючись на факти з модуля.'
  items:
    - statement: 'Кобзарі були мандрівними жебраками, які заробляли на життя виключно тим, що просили милостиню жалібним голосом.'
      correct: false
      explanation: 'Вони були професійними музикантами з чіткою цеховою організацією, і суспільство добровільно платило їм за духовну працю та виконання епосу.'
    - statement: 'Лебійська мова була створена кобзарями як таємний жаргон для безпечного спілкування та захисту під час мандрівок.'
      correct: true
      explanation: 'Цей унікальний арго дозволяв їм обмінюватися розвідувальними даними та попереджати товаришів про небезпеку.'
    - statement: 'Українські думи виконувалися як звичайні пісні з чіткою мелодією, що жорстко ділилася на однакові куплети.'
      correct: false
      explanation: 'Думи виконувалися речитативом — мелодійним декламуванням, що давало виконавцю великий простір для імпровізації.'
    - statement: 'Головними героями українських дум найчастіше виступали міфологізовані богатирі, наділені чарівними та надприродними силами.'
      correct: false
      explanation: 'Український епос був максимально наближений до реальності: його героями ставали козаки, невільники та звичайні люди.'
    - statement: 'Стиль козацького бароко виник як органічне поєднання західноєвропейської естетики та давньоруської мурованої традиції.'
      correct: true
      explanation: 'Українські архітектори не просто імпортували європейські зразки, а синтезували їх із місцевим відчуттям простору та гармонії.'
    - statement: 'Російське наришкінське бароко значною мірою сформувалося завдяки культурному впливу українських зодчих та майстрів.'
      correct: true
      explanation: 'Київ виступав як потужний донор культури для Московії, експортуючи туди європейські архітектурні інновації та кадри.'
    - statement: 'Парсуна була різновидом традиційної релігійної ікони, на якій суворо заборонялося малювати звичайних людей.'
      correct: false
      explanation: 'Парсуна — це світський портрет представників козацької еліти, який ще зберігав певні площинні риси іконопису.'
    - statement: 'Іван Мазепа розглядав масштабне церковне будівництво як стратегічний інструмент розбудови держави та легітимізації своєї влади.'
      correct: true
      explanation: 'Він розумів, що сильна і незалежна держава обов’язково потребує монументальної архітектури та високої культури.'
    - statement: 'Керівництво Києво-Могилянської колегії суворо забороняло студентам вивчати латинську мову та читати західних філософів.'
      correct: false
      explanation: 'Навпаки, Петро Могила запровадив латину як головну мову викладання, щоб інтегрувати академію у загальноєвропейський освітній простір.'
    - statement: 'Багато випускників Києво-Могилянської академії переїжджали до Росії, де ставали ідеологами державних реформ та займали високі посади.'
      correct: true
      explanation: 'Спудеї стали основним інтелектуальним ядром, яке здійснювало культурну модернізацію та європеїзацію сусідньої імперії.'

- type: reading
  id: reading-duma
  title: 'Першоджерело: Кобзарський епос'
  source: 'Історія української культури'
  text: |
    Центральним елементом кобзарського репертуару була дума — жанр українського героїчного епосу. Відмінною рисою думи є те, що вона виконується специфічним способом, який називається речитатив. Цей стиль дозволяв виконавцю зосередити увагу слухачів на змісті тексту, трагізмі подій та імпровізувати залежно від реакції аудиторії.

- type: essay-response
  title: 'Есе: Роль кобзарства у збереженні національної ідентичності'
  source_reading: reading-duma
  instruction: 'Напишіть розгорнуте есе, спираючись на зміст модуля та уривок про український епос.'
  prompt: 'Проаналізуйте феномен кобзарства як могутньої соціальної інституції Гетьманщини. Чому мандрівних музик називають живою газетою та духовним хребтом нації? Обґрунтуйте свою відповідь, згадавши про їхню цехову організацію, лебійську мову та специфіку виконання дум.'
  min_words: 150
  model_answer: 'Кобзарство було складною професійною інституцією зі своєю внутрішньою ієрархією, цехами та судами, а не просто формою розваги. В умовах бездержавності кобзарі виконували надважливу функцію живої газети: вони поширювали новини та формували суспільну мораль. Для власної безпеки та конспіративної розвідувальної діяльності вони створили унікальну лебійську мову. Їхнім головним інструментом була дума — героїчний епос, який виконувався речитативом. Це давало змогу імпровізувати та глибше впливати на емоції людей. Через виконання цих творів кобзарі формували національний етос, виховували кодекс честі та підтримували історичну пам’ять народу, що зробило їх справжнім духовним хребтом нації.'
  rubric:
    - criteria: 'Аргументація та розкриття теми'
      description: 'Детально проаналізовано соціальні та духовні функції кобзарів, пояснено поняття цехової організації та таємної мови.'
      points: 5
    - criteria: 'Структура тексту'
      description: 'Есе має логічний вступ, послідовну основну частину з історичними прикладами та аргументований висновок.'
      points: 3
    - criteria: 'Використання термінології'
      description: 'У тексті доречно вжито історичні поняття: речитатив, епос, цех, арго, імпровізація, інституція.'
      points: 2