- type: reading
  id: reading-march-articles
  title: "Первинне джерело: Березневі статті"
  source: "Витяг з умов договору"
  instruction: "Прочитайте уривок для подальшого аналізу юридичного статусу."
  text: |
    А тих послів, які здавна мирно приходять до Війська Запорозького з далеких чужих країв, щоб пану гетьману було вільно приймати і відпускати на свій розсуд. Нехай царські воєводи в права наші традиційні не вступають і вільних судів ніколи не судять. Збирати всі доходи до скарбу військового виключно власними, українськими урядниками. Старшину військову обирати за давнім козацьким звичаєм.

- type: essay-response
  title: "Есе: Спростування імперських міфів"
  source_reading: reading-march-articles
  instruction: "Напишіть розгорнуту аналітичну відповідь."
  prompt: "Спираючись на текст джерела та історичний контекст, доведіть, чому використання радянського терміну возз'єднання є маніпулятивним. Якою була справжня юридична природа Переяславської угоди?"
  min_words: 200
  model_answer: "Термін возз'єднання є ідеологічним міфом, який був штучно створений у 1954 році для виправдання російського панування. Насправді Переяславська угода була прагматичним військово-політичним союзом (протекторатом). Як свідчать документи, Україна зберігала всі ознаки суверенної держави: власну армію (реєстр у 60 тисяч), незалежну фінансову систему та право на власну дипломатію. Козаки не ставали частиною Московського царства, а лише шукали тимчасового захисту від Речі Посполитої."
  rubric:
    - criteria: "Аргументація"
      description: "Чітке спростування міфу з опорою на історичні факти та джерела"
      points: 40
    - criteria: "Термінологія"
      description: "Коректне використання понять (протекторат, автономія, військовий союз)"
      points: 30
    - criteria: "Структура"
      description: "Логічна побудова тексту з чітким висновком"
      points: 30

- type: comparative-study
  title: "Зіткнення політичних культур"
  source_reading: reading-march-articles
  instruction: "Порівняйте політичний устрій Війська Запорозького та Московського царства."
  items_to_compare:
    - "Українська політична культура (європейська договірна традиція)"
    - "Московська політична культура (азійське самодержавство)"
  criteria:
    - "Ставлення до монарха та взаємні зобов'язання"
    - "Особисті свободи та права станів"
    - "Місцеве самоврядування"
  prompt: "Яким чином відмова московського посла Василя Бутурліна присягати від імені царя відобразила фундаментальну різницю між цими двома політичними світами?"
  model_answer: "Відмова Бутурліна продемонструвала ментальну прірву. Козаки належали до європейської традиції, де правитель укладав договір з підданими і гарантував їхні права присягою. Московська система була деспотичною: цар вважався абсолютним намісником Бога на землі і не мав жодних зобов'ячень перед людьми, яких вважали його безправними холопами."

- type: critical-analysis
  title: "Глас вопіющого: Мотиви опозиції"
  instruction: "Проаналізуйте причини відмови еліти від присяги."
  target_text: "Легендарний Іван Богун прямо попереджав козаків: У тій далекій Московщині панують найогидніше рабство і страшна неволя... Там немає нічого власного чи приватного, бо всі люди і всі маєтки належать лише царю."
  questions:
    - "Кого саме представляв Іван Богун і чому його відмова мала велике значення?"
    - "Чому вище київське духовенство на чолі з Сильвестром Косовим відмовилося від присяги?"
    - "Як позиція Запорізької Січі вплинула на легітимність угоди?"
    - "Чи справдилися прогнози козацької опозиції в майбутньому?"
  model_answers:
    - "Іван Богун був легендарним полковником, і його позиція демонструвала, що значна частина військової еліти категорично проти московського союзу."
    - "Освічене духовенство боялося втратити свою автономію та зв'язки з Європою, підпавши під жорсткий контроль відсталого і ультраконсервативного Московського патріархату."
    - "Відмова Січі, яка була колискою козацьких вольностей, стала нищівним ударом по легітимності рішення, ухваленого в Переяславі."
    - "Так, прогнози справдилися. Москва використала угоду для поступового поглинання України, знищення свобод та перетворення протекторату на жорстку колонію."
  focus_points:
    - "Розуміння московського авторитаризму"
    - "Загроза культурної та релігійної асиміляції"
    - "Прозорливість опозиційних лідерів"

- type: true-false
  title: "Перевірка фактів: Міфи та реальність"
  instruction: "Визначте, чи є твердження правдивими, чи хибними."
  items:
    - statement: "Кримський хан Іслам-Гірей III підтримував українське військо під час Жванецької облоги до самого кінця кампанії."
      correct: false
      explanation: "Хан здійснив віроломство, уклавши сепаратний мир з поляками."
    - statement: "Турецький васалітет був відхилений Хмельницьким через глибокий релігійний бар'єр та небажання народу підкорятися мусульманам."
      correct: true
      explanation: "Козаки вважали себе захисниками православ'я."
    - statement: "Шведська королева Христина одразу надала масовану військову підтримку Війську Запорозькому."
      correct: false
      explanation: "Швеція була надзвичайно пасивною і переговори з нею затягнулися."
    - statement: "Московські посли в Переяславі урочисто склали зустрічну присягу від імені царя, гарантуючи козацькі права."
      correct: false
      explanation: "Посол Бутурлін відмовився, заявивши, що цар підданим не присягає."
    - statement: "Оригінали Березневих статей 1654 року зберігаються в архівах Москви до нашого часу."
      correct: false
      explanation: "Оригінали безслідно зникли; історики підозрюють їх свідоме знищення імперською владою."
    - statement: "Березневі статті легалізували реєстр у 60 тисяч козаків, що забезпечило Україні власну потужну армію."
      correct: true
      explanation: "Це був один з ключових пунктів збереження суверенітету."
    - statement: "Усі без винятку козацькі полковники без вагань підтримали Переяславську угоду."
      correct: false
      explanation: "Іван Богун, Іван Сірко та цілі полки утворили потужну опозицію."
    - statement: "Під час укладення Віленського перемир'я 1656 року московська дипломатія не пустила українських послів на переговори."
      correct: true
      explanation: "Це стало актом очевидної зради з боку Москви."
    - statement: "Після Віленської зради Хмельницький ініціював Раднотський договір для формування нової коаліції зі Швецією."
      correct: true
      explanation: "Гетьман повернувся до ідеї співпраці з протестантською Європою."
    - statement: "Термін возз'єднання адекватно і науково точно відображає природу Переяславського договору."
      correct: false
      explanation: "Це ідеологічний міф, вигаданий радянською пропагандою у 1954 році."