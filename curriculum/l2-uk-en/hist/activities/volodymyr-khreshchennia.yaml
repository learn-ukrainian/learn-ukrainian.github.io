- type: reading
  id: reading-ilarion
  title: "Первинне джерело: Слово про Закон і Благодать"
  source: "Митрополит Іларіон"
  text: "І не в убогій і невідомій землі панували, а в Руській, що знана і чута є в усіх чотирьох кінцях землі. Великий каган нашої землі Володимир..."
  tasks:
    - "Яким титулом називає Володимира автор?"
    - "Як Іларіон описує статус Русі у світі?"

- type: critical-analysis
  title: "Аналіз: Політичний маніфест Іларіона"
  source_reading: reading-ilarion
  instruction: "Проаналізуйте наведений уривок тексту."
  target_text: "І не в убогій і невідомій землі панували, а в Руській... великий каган нашої землі."
  questions:
    - "Чому митрополит використовує східний титул каган замість традиційного князь?"
    - "Який геополітичний сигнал посилає Іларіон європейським державам?"
  model_answers:
    - "Титул каган дорівнював статусу імператора і підкреслював абсолютну суверенність правителя Русі."
    - "Іларіон наголошує на міжнародній величі та незалежності Русі, яка є відомою і впливовою державою."

- type: reading
  id: reading-pvl-idols
  title: "Первинне джерело: Повалення ідолів"
  source: "Повість минулих літ"
  text: "Володимир наказав поскидати ідолів: тих порубати, а інших вогню оддати. А Перуна наказав прив'язати коневі до хвоста і волочити з гори до Дніпра."
  tasks:
    - "Що Володимир наказав зробити з головним ідолом?"
    - "Яке символічне значення мала ця публічна страта?"

- type: comparative-study
  title: "Порівняння: Зміна світогляду"
  source_reading: reading-pvl-idols
  instruction: "Порівняйте політику князя у язичницький та християнський періоди."
  items_to_compare:
    - "Язичницький період правління (до 988 року)"
    - "Християнський період правління (після 988 року)"
  criteria:
    - "Методи об'єднання суспільства"
    - "Ставлення до переможених і слабких"
    - "Міжнародна політика"
  prompt: "Проаналізуйте, як християнізація змінила методи державного управління та соціальну політику Київської Русі."
  model_answer: "У язичницький період князь об'єднував державу мечем і намагався централізувати старі вірування, створивши пантеон на чолі з Перуном. Політика базувалася на праві сили. Після хрещення Володимир впровадив благодійність на державному рівні, заборонив багатоженство та використав візантійську адміністративну модель для управління. У міжнародній політиці він перейшов до дипломатії."

- type: reading
  id: reading-korsun
  title: "Первинне джерело: Взяття Корсуня"
  source: "Літописна оповідь"
  text: "І ось муж корсунянин Анастас пустив стрілу, написавши: Перекопай і перейми воду, що йде по трубах... Володимир наказав перекопати труби, і люди здалися."
  tasks:
    - "Яка тактика допомогла князю захопити добре укріплене місто?"
    - "Що ця перемога означала для стосунків з Візантією?"

- type: essay-response
  title: "Есе: Геополітичний вимір хрещення"
  source_reading: reading-korsun
  instruction: "Напишіть розгорнуту відповідь на запропоновану тему."
  prompt: "Спираючись на події Корсунської кампанії, аргументовано спростуйте російський імперський міф про те, що Візантія добровільно подарувала християнство Русі."
  min_words: 150
  model_answer: "Імперська історіографія часто зображує хрещення як милостивий подарунок могутньої Візантії. Проте облога Корсуня свідчить про протилежне. Руський князь надав імператору Василію Другому військову допомогу для придушення повстання. Коли візантійці відмовилися віддати принцесу Анну, Володимир захопив Корсунь. Ця кампанія доводить, що Русь прийняла віру як повноцінний і сильний партнер."
  rubric:
    - criteria: "Історична точність"
      description: "Згадка про військову допомогу та облогу Корсуня."
      points: 40
    - criteria: "Деколонізаційний аналіз"
      description: "Спростування міфу про васальну залежність від імперії."
      points: 40
    - criteria: "Структура тексту"
      description: "Логічна послідовність викладу думок."
      points: 20

- type: true-false
  title: "Аналіз міфів та історичних фактів"
  instruction: "Визначте, які твердження є історично достовірними, а які належать до імперських міфів."
  items:
    - statement: "Князь Володимир прийняв християнство виключно через глибоке духовне прозріння."
      correct: false
      explanation: "Вибір віри був передусім прагматичним кроком для інтеграції в європейський простір."
    - statement: "У дев'ятсот вісімдесятому році князь здійснив спробу запровадити язичницьку релігію."
      correct: true
      explanation: "Володимир створив пантеон ідолів на чолі з Перуном, але ця реформа зазнала краху."
    - statement: "Візантійський імператор одразу і з радістю погодився віддати сестру заміж за князя."
      correct: false
      explanation: "Імператор відмовлявся виконати обіцянку, що змусило Володимира розпочати військову кампанію."
    - statement: "Захоплення міста Корсунь було інструментом тиску на Візантійську імперію."
      correct: true
      explanation: "Падіння цього багатого міста змусило імперію піти на поступки і відправити Анну."
    - statement: "Візантія милостиво подарувала християнство Києву, зробивши його васалом."
      correct: false
      explanation: "Це міф. Володимир виборов визнання збройним шляхом і прийняв хрещення як переможець."
    - statement: "Масове хрещення мешканців столиці відбулося у водах річки Почайни."
      correct: true
      explanation: "Літописи підтверджують, що хрещення киян пройшло саме у цій притоці Дніпра."
    - statement: "Статус багрянородна означав народження принцеси під час правління імператора."
      correct: true
      explanation: "Шлюб із принцесою такого статусу був дипломатичним тріумфом для руського князя."
    - statement: "Московське князівство стало релігійним центром одразу після подій хрещення."
      correct: false
      explanation: "На місці Москви тоді були ліси, а сама держава виникла значно пізніше."
    - statement: "Десятина була запроваджена як державний податок на потреби церкви."
      correct: true
      explanation: "Князь віддавав десяту частину доходів на будівництво храмів та утримання духовенства."
    - statement: "На златниках та срібниках карбувалися виключно грецькі візантійські символи."
      correct: false
      explanation: "На монетах був розміщений особистий родовий знак князя — Тризуб."