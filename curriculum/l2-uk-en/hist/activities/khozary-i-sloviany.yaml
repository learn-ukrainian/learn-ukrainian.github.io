- type: reading
  id: reading-pvl-khazars
  title: 'Первинне джерело: Повість минулих літ'
  source: 'Літопис Руський'
  text: |
    І знайшли їх хозари, коли вони сиділи в лісах на горах, і сказали хозари: Платіть нам данину. Поляни тоді, порадившись, дали від диму по мечу. І понесли це хозари князеві своєму і старійшинам своїм, і сказали їм: Ось, знайшли ми данину нову. А ті запитали їх: Звідки? Вони ж відказали: В лісі на горах, над рікою Дніпром. А ті запитали: Що вони дали? І вони показали меч. І мовили старійшини хозарські: Недобра се данина, княже. Ми здобули її однобічною зброєю, себто шаблями, а сих зброя обосічна, себто мечі. Сі будуть брати данину і з нас, і з інших земель.
  instruction: 'Уважно прочитайте літописний фрагмент та дайте відповіді на запитання.'
  tasks:
    - 'Проаналізуйте символічне значення меча та шаблі у цьому уривку.'
    - 'Чому хозарські старійшини назвали цю данину недоброю?'

- type: true-false
  title: 'Факти та міфи про Хозарський каганат'
  instruction: 'Визначте, чи є наведені твердження правдивими, чи хибними, спираючись на історичні дані.'
  items:
    - statement: 'Хозари змогли зупинити арабську армію у восьмому столітті, виступивши щитом для Східної Європи.'
      correct: true
      explanation: 'Хозарія прийняла на себе удар Халіфату, зупинивши експансію ісламу на північ.'
    - statement: 'Каган у хозарській системі двовладдя особисто водив армію в походи і збирав податки.'
      correct: false
      explanation: 'Ці функції виконував бек, тоді як каган залишався сакральним символом держави.'
    - statement: 'Хозарська еліта прийняла іудаїзм, щоб зберегти незалежність від Візантії та Халіфату.'
      correct: true
      explanation: 'Прийняття іудаїзму дозволило уникнути політичного підпорядкування цим двом могутнім імперіям.'
    - statement: 'У столиці каганату переслідували представників усіх релігій, окрім іудаїзму.'
      correct: false
      explanation: 'Хозарія вирізнялася високим рівнем толерантності: поруч існували синагоги, мечеті, християнські церкви та язичницькі святилища.'
    - statement: 'Салтівська археологічна культура свідчить про виключно кочовий спосіб життя хозарів.'
      correct: false
      explanation: 'Ця культура доводить перехід каганату до напівосілості, розвиток міст, землеробства та ремесел.'
    - statement: 'Фортецю Саркел на березі Дону хозари збудували за допомогою візантійських інженерів.'
      correct: true
      explanation: 'Каган звернувся за допомогою до імператора Феофіла, який надіслав інженера Петрону Каматира.'
    - statement: 'Основою економіки каганату було потужне власне виробництво зброї для експорту в Європу.'
      correct: false
      explanation: 'Головним джерелом багатства була транзитна торгівля і збір мита з купців.'
    - statement: 'Київ на ранніх етапах розвитку функціонував як хозарський прикордонний форпост або митниця.'
      correct: true
      explanation: 'Багато істориків вважають, що Київ (Самбатас) виконував роль стратегічної прикордонної митниці.'
    - statement: 'Концепція Pax Khazarica описує період стабільності, який сприяв економічному зростанню слов''ян.'
      correct: true
      explanation: 'Хозарський мир забезпечив безпеку торгових шляхів, дозволивши племенам накопичувати ресурси.'
    - statement: 'Київські князі категорично відмовлялися використовувати хозарський титул каган.'
      correct: false
      explanation: 'Князі, зокрема Володимир Великий, свідомо перейняли цей титул, претендуючи на рівний статус.'

- type: critical-analysis
  title: 'Символізм зброї: Аналіз літописного фрагмента'
  source_reading: reading-pvl-khazars
  instruction: 'Проаналізуйте прихований зміст відповіді слов''янських племен на вимогу сплачувати данину.'
  questions:
    - 'Що символізувала передача хозарам саме мечів, а не інших цінностей чи товарів?'
    - 'Як хозарські старійшини інтерпретували різницю між своєю зброєю (шаблями) та зброєю полян (мечами)?'
    - 'Яку ідеологічну функцію виконує ця легенда в контексті загального літописного наративу про піднесення Русі?'
  model_answers:
    - 'Меч виступав не просто як об''єкт матеріальної цінності, а як прояв військового потенціалу і прихована погроза. Передаючи мечі, слов''яни демонстрували свою здатність до майбутнього збройного опору.'
    - 'Старійшини побачили у двосічному мечі перевагу над однобічною шаблею. Це стало метафорою неминучої технологічної та мілітарної перемоги осілого землеробського світу над кочовиками.'
    - 'Ця легенда легітимізує майбутнє панування Києва над регіоном. Вона перетворює факт ранньої політичної залежності слов''ян на відправну точку героїчного епосу про здобуття гегемонії.'
  focus_points:
    - 'Символізм озброєння в середньовічній культурі'
    - 'Ретроспективне пророцтво як літературний прийом'
    - 'Еволюція взаємин від васалітету до сюзеренітету'

- type: comparative-study
  title: 'Порівняльний аналіз: Дві моделі влади'
  instruction: 'Порівняйте функції та роль кагана і бека в політичній системі Хозарії.'
  items_to_compare:
    - 'Каган (сакральний правитель)'
    - 'Бек або Шад (реальний правитель)'
  criteria:
    - 'Сфера відповідальності'
    - 'Ступінь публічності та взаємодія з народом'
    - 'Джерела легітимності влади'
    - 'Роль у кризових ситуаціях'
  prompt: 'Спираючись на критерії порівняння, поясніть, яким чином такий поділ влади забезпечував політичну стабільність і захищав каганат від внутрішніх переворотів.'
  model_answer: 'Каган відповідав за сакральний зв''язок держави з божественними силами і був джерелом легітимності, проте майже не з''являвся на публіці. Бек керував армією, збирав податки і вів щоденне адміністрування. Цей дуалізм створював баланс: амбітний бек не міг узурпувати абсолютну владу, бо не належав до священного роду Ашина і не мав божественного авторитету в очах армії та народу. Водночас каган не мав військових важелів для встановлення тиранії. У часи криз система дозволяла стратити кагана за втрату фарну, зберігши при цьому життєздатний адміністративний апарат на чолі з беком, що рятувало країну від хаосу.'

- type: essay-response
  title: 'Есе: Хозарія як каталізатор Русі'
  instruction: 'Напишіть аналітичне есе, розкриваючи роль Хозарського каганату в політичному та економічному піднесенні раннього Києва.'
  prompt: |
    Протягом десятиліть домінував міф про "хозарське ярмо", яке нібито лише гальмувало розвиток слов'ян. Сучасна історіографія пропонує інший погляд. Спираючись на матеріали модуля, напишіть есе (200-250 слів), у якому доведіть або спростуйте тезу: "Тривалий контакт із каганатом став вирішальним чинником у державотворенні та економічному зростанні Київської Русі".

    У вашому тексті обов'язково розкрийте такі аспекти:
    1. Економічний вплив Pax Khazarica на накопичення ресурсів лісовими племенами.
    2. Як зовнішній пресинг сприяв консолідації племен навколо київського центру.
    3. Причини запозичення хозарської титулатури (каган) та військово-адміністративних моделей київськими князями.
  min_words: 200
  model_answer: 'Роль Хозарського каганату у формуванні ранньої Київської Русі неможливо звести до примітивного міфу про безжальне гноблення. Навпаки, Хозарія стала потужним каталізатором економічного та політичного піднесення східних слов''ян. По-перше, встановлення Хозарського миру (Pax Khazarica) гарантувало безпеку торговельних магістралей, що дозволило слов''янським племенам включитися в глобальний обмін. Завдяки транзиту арабських дирхемів через Київ місцева еліта швидко накопичила багатства, необхідні для утримання професійних військових дружин. По-друге, постійна присутність грізного та організованого сусіда стала стимулом для консолідації. Розрізнені лісові племена, щоб ефективно протистояти степовикам та врешті-решт перехопити їхні торгові шляхи, мусили об''єднатися під владою єдиного сильного центру. Київське державотворення було відповіддю на геополітичний виклик Ітиля. Зрештою, вплив каганату виявився настільки глибоким, що київські правителі, такі як Володимир Великий, перейняли хозарський титул каган. Це було не просто сліпе копіювання, а свідома декларація своєї рівності та претензія на спадщину степової імперії. Русь не була вічною жертвою; вона виявилася здібним учнем, який засвоїв уроки свого могутнього сюзерена, адаптував його адміністративні інструменти і врешті зайняв його місце гегемона у Східній Європі.'
  rubric:
    - criteria: 'Історична аргументація'
      description: 'Есе містить конкретні факти (дирхеми, Pax Khazarica, титул каган) для підтвердження тез.'
      points: 40
    - criteria: 'Глибина аналізу'
      description: 'Продемонстровано розуміння причинно-наслідкових зв''язків між хозарським впливом та централізацією Русі.'
      points: 30
    - criteria: 'Стиль та лексика'
      description: 'Використана відповідна термінологія (консолідація, державотворення, гегемон, транзитна торгівля).'
      points: 30