- type: reading
  id: reading-deklara-dyrektorii
  title: 'Первинне джерело: Декларація Директорії УНР'
  source: 'Декларація Директорії УНР (26 грудня 1918 року)'
  text: |
    Директорія Української Народньої Республіки урочисто проголошує, що вся повнота влади в Україні повинна належати виключно трудовим класам: робітникам і селянам. Експлуататорські класи — нетрудова інтелігенція, поміщики та капіталісти — позбавляються права голосу в управлінні державою. Директорія є тимчасовим верховним органом революційного часу.
  tasks:
    - 'Проаналізуйте, які класи населення були позбавлені політичних прав.'
    - 'Як цей документ відображає соціалістичні погляди Винниченка?'

- type: critical-analysis
  title: 'Аналіз політичного радикалізму Директорії'
  source_reading: reading-deklara-dyrektorii
  instruction: 'Уважно перечитайте текст Декларації та дайте відповіді на запитання.'
  questions:
    - 'Чому позбавлення політичних прав підприємців та інтелігенції стало фатальною помилкою?'
    - 'Як така радикальна риторика вплинула на обороноздатність молодої держави?'
    - 'Чи сприяла ця Декларація консолідації української нації?'
  model_answers:
    - 'Відчуження середнього класу та спеціалістів позбавило державу кваліфікованих управлінців.'
    - 'Радикалізм відштовхнув потенційних союзників і посилив внутрішній розкол.'
    - 'Ні, вона поглибила класовий поділ замість того, щоб об''єднати всі верстви населення перед лицем агресора.'

- type: comparative-study
  title: 'Порівняльний аналіз лідерів Директорії'
  instruction: 'Порівняйте політичні підходи Володимира Винниченка та Симона Петлюри.'
  items_to_compare:
    - 'Володимир Винниченко'
    - 'Симон Петлюра'
  criteria:
    - 'Головна політична мета'
    - 'Ставлення до більшовицької Росії'
    - 'Бачення соціальної структури суспільства'
    - 'Методи досягнення незалежності'
  model_answer: 'Винниченко був ідеалістом-соціалістом, який вірив у можливість порозуміння з російськими комуністами та пріоритет соціальної революції. Петлюра був прагматиком-державником, який розумів неминучість збройної боротьби з Росією і вважав незалежність вищою за класові інтереси.'

- type: essay-response
  title: 'Причини поразки Директорії УНР'
  instruction: 'Напишіть розгорнуте есе, спираючись на матеріали уроку.'
  prompt: 'Проаналізуйте комплекс внутрішніх та зовнішніх причин, які призвели до поразки Директорії УНР та втрати державної незалежності. Оцініть роль геополітичної ізоляції та внутрішніх політичних конфліктів.'
  min_words: 200
  model_answer: 'Поразка Директорії УНР була зумовлена поєднанням зовнішніх і внутрішніх факторів. Головною зовнішньою причиною стала геополітична ізоляція: Антанта не визнала УНР, зробивши ставку на російських монархістів. Україна опинилася у ворожому оточенні (трикутник смерті) і змушена була воювати на кілька фронтів проти більшовиків, денікінців та поляків одночасно. Внутрішні фактори включали гострий ідеологічний розкол у керівництві між Винниченком і Петлюрою, утопічний соціалізм перших урядів, який відштовхнув середній клас, а також слабкість державного апарату та нестачу дисциплінованої регулярної армії.'
  rubric:
    - criteria: 'Аналіз зовнішніх факторів'
      description: 'Студент чітко пояснює роль Антанти, ворожого оточення та багатофронтової війни.'
      points: 40
    - criteria: 'Аналіз внутрішніх факторів'
      description: 'Студент описує конфлікт у керівництві та помилки соціальної політики.'
      points: 40
    - criteria: 'Структура та аргументація'
      description: 'Есе має логічну структуру та переконливі аргументи з опорою на історичні факти.'
      points: 20

- type: true-false
  title: 'Правда чи вигадка: Історія Директорії УНР'
  instruction: 'Визначте, чи є наведені історичні твердження правильними.'
  items:
    - statement: 'Директорія була створена для підтримки влади гетьмана Павла Скоропадського.'
      correct: false
      explanation: 'Директорія була створена як орган керівництва повстанням для повалення влади Скоропадського.'
    - statement: 'Вирішальна перемога повстанців над гетьманськими силами відбулася під Мотовилівкою.'
      correct: true
      explanation: 'Ця блискуча перемога відкрила повстанцям прямий шлях на Київ.'
    - statement: 'Володимир Винниченко виступав за жорстку військову диктатуру без жодних компромісів із соціалістами.'
      correct: false
      explanation: 'Навпаки, Винниченко був соціалістом-утопістом, який прагнув порозуміння з російськими більшовиками.'
    - statement: 'Акт Злуки УНР та ЗУНР було урочисто проголошено на Софійській площі в Києві.'
      correct: true
      explanation: 'Ця подія мала колосальне символічне значення для всієї розпорошеної нації.'
    - statement: 'Російські більшовики офіційно визнали незалежність України в січні 1919 року.'
      correct: false
      explanation: 'Більшовики здійснювали гібридну агресію, використовуючи маріонетковий радянський уряд у Суджі.'
    - statement: 'Київська катастрофа сталася через зіткнення українських військ із польською армією.'
      correct: false
      explanation: 'Вона сталася через конфлікт і відступ українських військ перед російськими монархістами Денікіна.'
    - statement: 'Перший Зимовий похід був партизанським рейдом тилами ворога.'
      correct: true
      explanation: 'Він дозволив зберегти боєздатне ядро армії та дезорганізувати тили противника.'
    - statement: 'Радянська пропаганда використовувала термін петлюрівщина для дискредитації українського визвольного руху.'
      correct: true
      explanation: 'Цей термін використовувався для створення міфу про бандитизм і хаос.'
    - statement: 'Державний Центр УНР в екзилі продовжував діяти в еміграції до кінця двадцятого століття.'
      correct: true
      explanation: 'Він передав історичні клейноди першому Президенту незалежної України Леоніду Кравчуку.'
    - statement: 'Уряд Директорії заохочував погроми єврейського населення як офіційну державну політику.'
      correct: false
      explanation: 'Уряд Директорії створив Міністерство єврейських справ і суворо карав за погроми.'