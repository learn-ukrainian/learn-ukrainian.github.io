- type: reading
  id: 'reading-skovoroda-fable'
  title: 'Первинне джерело: Бджола та Шершень'
  source: 'Григорій Сковорода (1774)'
  instruction: 'Прочитайте фрагмент байки та зверніть увагу на алегоричні образи.'
  text: |
    Шершень: Скажи мені, Бджоло, чого ти така дурна? Чи знаєш ти, що плоди вашої праці не стільки вам самім, як людям корисні...
    Бджола: Ти поважний дурень, пане раднику... А нам незрівнянно більша радість збирати мед, аніж його споживати. До сього ми народжені.
    Сила: Шершень — се образ людей, котрі живуть крадіжкою чужого і народжені на те тільки, щоб їсти, пити і таке інше. А бджола — се герб мудрої людини, яка у сродному ділі трудиться.
  tasks:
    - 'Які людські риси уособлює Шершень?'
    - 'Що символізує Бджола та її ставлення до процесу збирання меду?'
    - 'Як поняття "сродної праці" розкривається у відповіді Бджоли?'
    - 'У чому полягає різниця між фабулою та "силою" у цьому тексті?'

- type: true-false
  title: 'Життєвий шлях та філософія'
  instruction: 'Визначте, чи є наведені твердження правдивими, чи хибними.'
  items:
    - statement: 'Григорій Сковорода ніколи не залишав територію Російської імперії і навчався лише в Києві.'
      correct: false
      explanation: 'Сковорода мандрував Європою у складі Токайської комісії та відвідував університети у Відні та Братиславі.'
    - statement: 'Мислитель відмовився від посади в придворній співацькій капелі в Санкт-Петербурзі.'
      correct: true
      explanation: 'Незважаючи на високу платню, він залишив капелу, оскільки відчував відразу до імперської розкоші.'
    - statement: 'Сковорода обрав мандрівний спосіб життя через бідність і відсутність пропозицій працевлаштування.'
      correct: false
      explanation: 'Він добровільно відмовився від офіційних посад і матеріальних благ заради збереження абсолютної духовної свободи.'
    - statement: 'У філософії Сковороди Макрокосм позначає людину, а Мікрокосм — Всесвіт.'
      correct: false
      explanation: 'Навпаки: Макрокосм — це великий Всесвіт, а Мікрокосм — це людина, яка несе в собі його відбиток.'
    - statement: 'Згідно з концепцією "сродної праці", людина може бути щасливою лише тоді, коли займається справою за своїм покликанням.'
      correct: true
      explanation: 'Сковорода вважав, що праця поза природним покликанням приносить страждання і руйнує особистість.'
    - statement: 'Мислитель активно публікував і поширював свої філософські трактати в друкарнях Києва.'
      correct: false
      explanation: 'Сковорода ніколи не друкував свої твори за життя, вважаючи друкований текст лише мертвою тінню живого слова.'
    - statement: 'У своїх творах він використовував словенороську мову, яка була книжною мовою української еліти того часу.'
      correct: true
      explanation: 'Ця мова поєднувала елементи церковнослов''янської та живої розмовної української мови.'
    - statement: 'Епітафія "Світ ловив мене, та не впіймав" символізує втечу від правосуддя.'
      correct: false
      explanation: 'Ця фраза символізує перемогу духу над матеріальним світом і уникнення спокус мирського життя.'
    - statement: 'Радянська пропаганда часто зображувала Сковороду як атеїста та борця з релігією.'
      correct: true
      explanation: 'Цей міф використовувався для приховування глибоко релігійного і містичного характеру його філософії.'
    - statement: 'Найближчим другом і першим біографом Сковороди був Михайло Ковалинський.'
      correct: true
      explanation: 'Ковалинський був його улюбленим учнем, духовним побратимом та автором трактату про життя мислителя.'

- type: critical-analysis
  title: 'Аналіз причинно-наслідкових зв''язків'
  source_reading: 'reading-skovoroda-fable'
  instruction: 'Проаналізуйте взаємозв''язки між філософськими концепціями та історичним контекстом.'
  target_text: 'Відмова від кар''єри та концепція сродної праці'
  questions:
    - 'Як історичний перехід Гетьманщини під владу Російської імперії вплинув на рішення Сковороди відмовитися від суспільних статусів?'
    - 'Яким чином концепція "сродної праці" заперечувала традиційну ієрархічну модель суспільства XVIII століття?'
    - 'Чому мандрівний спосіб життя Сковороди можна вважати формою асиметричного політичного та культурного спротиву?'
  model_answers:
    - 'В умовах ліквідації козацької автономії інтеграція в імперську систему вимагала компромісів із совістю, тому Сковорода обрав шлях абсолютної духовної незалежності, щоб не стати гвинтиком системи.'
    - 'Вона стверджувала, що цінність людини визначається не її походженням чи посадою, а здатністю реалізувати свої природні таланти, чим нівелювала значення штучних соціальних статусів.'
    - 'Уникаючи офіційних посад, Сковорода ставав "невидимим" для системи імперського контролю і демонстрував своїм прикладом можливість бути вільним навіть у невільній державі.'

- type: critical-analysis
  title: 'Критична оцінка міфів та стереотипів'
  instruction: 'Оцініть поширені твердження про філософа крізь призму деколонізаційного підходу.'
  target_text: 'Імперські та радянські маніпуляції образом Сковороди'
  questions:
    - 'На чому ґрунтується абсурдність твердження В. Ерна про те, що Сковорода є "першим російським філософом"?'
    - 'З якою метою радянська пропаганда перетворила містика-богослова на "селянського демократа"?'
    - 'Які елементи біографії Сковороди доводять його приналежність до європейського, а не московського інтелектуального простору?'
    - 'Як використання словенороської мови використовувалося для створення міфу про російськомовність мислителя?'
    - 'У чому полягає символізм знищення музею у Сковородинівці у 2022 році та збереження його статуї?'
  model_answers:
    - 'Сковорода ніколи не жив у Москві, був випускником Києво-Могилянської академії та продуктом виключно української барокової культури, яка кардинально відрізнялася від російського православ''я.'
    - 'Радянська система намагалася привласнити популярного мислителя, тому викреслила з його образу всю релігійність та елітарність, залишивши зручну для комуністичної ідеології карикатуру борця з царизмом.'
    - 'Вільне володіння латиною, глибоке знання античної філософії, мандри Європою у складі Токайської комісії та навчання в західних університетах.'
    - 'Словенороська мова була штучною книжною нормою, яка містила церковнослов''янізми, що російські пропагандисти помилково або свідомо трактували як російську мову, ігноруючи українську лексику і фонетику.'
    - 'Це уособлює спроби імперії фізично знищити українську культуру, яку вона не може привласнити, водночас вціліла статуя стала живою ілюстрацією фрази "Світ ловив мене, та не впіймав".'

- type: essay-response
  title: 'Есе: Філософія незламності у сучасному світі'
  source_reading: 'reading-skovoroda-fable'
  instruction: 'Напишіть розгорнуте есе, використовуючи запропонований промпт.'
  prompt: 'Спираючись на концепції "сродної праці", "двох натур" та епітафію "Світ ловив мене, та не впіймав", доведіть, що філософія Григорія Сковороди не втратила своєї актуальності, а навпаки — є ключем до розуміння стійкості українців під час сучасних випробувань.'
  min_words: 250
  model_answer: 'Григорій Сковорода сформулював етичну та онтологічну основу, яка допомагає зрозуміти сучасну українську стійкість. Його концепція "сродної праці" акцентує на внутрішній мотивації та свободі вибору, які є фундаментом волонтерського та громадського руху в Україні сьогодні. Кожен робить те, до чого має хист, заради спільної мети. Теорія "двох натур" вчить розрізняти матеріальне (яке можна зруйнувати) і духовне (яке є вічним), що дозволяє українцям зберігати гідність навіть в умовах втрати майна чи дому через війну. Епітафія "Світ ловив мене, та не впіймав" символізує незламність українського духу перед обличчям імперської машини, яка намагається поглинути Україну, але зазнає невдачі, бо стикається з ідейною незалежністю нації. Отже, Сковорода — це не просто історична постать, а живий моральний компас нашого часу.'
  rubric:
    - criteria: 'Розуміння філософських концепцій'
      description: 'Автор коректно тлумачить "сродну працю" та "дві натури" Сковороди.'
      points: 40
    - criteria: 'Аргументація та застосування до сучасності'
      description: 'Наведено переконливі паралелі між ідеями Сковороди та сучасною українською стійкістю.'
      points: 40
    - criteria: 'Мовне оформлення'
      description: 'Есе написано академічним стилем, без граматичних помилок та русизмів.'
      points: 20