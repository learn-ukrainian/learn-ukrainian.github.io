- type: reading
  id: reading-manifest
  title: "Первинне джерело: Маніфест Головної Руської Ради"
  source: "Маніфест Головної Руської Ради (1848)"
  instruction: "Прочитайте уривок з маніфесту та зверніть увагу на те, як українці Галичини ідентифікували себе у 1848 році."
  text: |
    Ми Русини Галицькі належимо до великого руського народу, котрий одним говорить язиком і 15 міліонів виносить, з котрого пілтреття міліона землю Галицьку замешкує. Той народ був колись самодільний, рівнявся в славі з наймогутнішими народами Європи, мав свій письменний язик, свої власні закони, своїх власних князів — одним словом: був в добре биті, заможний і сильний.
  tasks:
    - "Якими словами автори маніфесту описують єдність українського народу?"
    - "Як маніфест згадує про історичне минуле народу?"
    - "Чому згадка про 15 мільйонів була важливою політичною заявою?"
    - "Як ви розумієте термін 'самодільний' у контексті цього документу?"

- type: true-false
  title: "Перевірка розуміння: Імперія та рух"
  instruction: "Визначте, чи є наведені твердження правдивими, чи хибними, опираючись на текст лекції."
  items:
    - statement: "Після поділів Речі Посполитої Галичина відійшла до Російської імперії."
      correct: false
      explanation: "Галичина стала провінцією Габсбурзької імперії."
    - statement: "Австрійський уряд підтримував українців виключно через велику історичну симпатію."
      correct: false
      explanation: "Відень прагматично інвестував у розвиток українців, щоб створити політичну противагу польським елітам."
    - statement: "Михайло Грушевський назвав західноукраїнські землі Українським П'ємонтом."
      correct: true
      explanation: "Це метафора, що вказує на роль регіону як центру національного об'єднання."
    - statement: "Семінарія Барбареум була відкрита у Львові."
      correct: false
      explanation: "Ця духовна семінарія була заснована у Відні."
    - statement: "Термін уніати був офіційно замінений на греко-католики за часів Марії Терезії."
      correct: true
      explanation: "Цей крок повернув українцям лінгвістичну гідність."
    - statement: "Альманах Русалка Дністрова був надрукований у Львові, щоб уникнути імперської цензури Відня."
      correct: false
      explanation: "Альманах був виданий у Буді (Будапешт), щоб обійти львівську місцеву церковну цензуру."
    - statement: "Головна Руська Рада вимагала адміністративного поділу Галичини на дві частини."
      correct: true
      explanation: "Це була найважливіша вимога — відділити українську східну частину від польської західної."
    - statement: "Москвофіли вважали за необхідне розвивати живу народну українську мову."
      correct: false
      explanation: "Москвофіли використовували штучне язичіє та орієнтувалися на російську культуру."
    - statement: "Товариство Просвіта займалося боротьбою з неписьменністю та відкриттям читалень."
      correct: true
      explanation: "Головною метою організації було перетворити неписьменних селян на свідомих громадян."
    - statement: "Російська імперія, на відміну від Австрійської, дозволяла українцям мати своїх представників у парламенті."
      correct: false
      explanation: "У Росії політична діяльність була заборонена, тоді як в Австрії українці засідали в сеймі та парламенті."

- type: critical-analysis
  title: "Аналіз національного руху"
  source_reading: "reading-manifest"
  instruction: "Проаналізуйте ідеологічні течії та розвиток національного руху в Галичині."
  questions:
    - "У чому полягала головна екзистенційна загроза москвофільства для української нації?"
    - "Чому народовці вважали розвиток живої народної мови критично важливим для політичної боротьби?"
    - "Яку роль відіграло товариство Просвіта у формуванні українського громадянського суспільства?"
    - "Чому створення кооперативного руху вважалося економічним самозахистом?"
    - "Як еволюціонували методи політичної боротьби українців від середини до кінця дев'янадцятого століття?"
  focus_points:
    - "Загроза асиміляції та втрати ідентичності"
    - "Зв'язок між мовою та освіченістю селянства"
    - "Соціальна мобілізація через мережу читалень"
    - "Принцип Свій до свого по своє"
    - "Перехід від культурних об'єднань до політичних партій"

- type: comparative-study
  title: "Порівняння двох імперій"
  instruction: "Порівняйте політику Російської та Австрійської імперій щодо українського національного руху."
  items_to_compare:
    - "Російська імперія"
    - "Австрійська (Габсбурзька) імперія"
  criteria:
    - "Офіційний статус української мови"
    - "Політичне представництво та права"
    - "Легальність громадських організацій"
    - "Статус вищої освіти"
  prompt: "Спираючись на критерії, зробіть висновок про те, чому саме Галичина стала центром українського національного відродження у другій половині дев'янадцятого століття."
  model_answer: "В Австрійській імперії українська мова мала офіційний статус у початковій школі, а українці могли обирати депутатів до сейму та парламенту. Громадські організації, такі як Просвіта, діяли легально. Існували українські кафедри в університеті. Натомість у Російській імперії Емський указ та Валуєвський циркуляр забороняли мову, жодного політичного представництва не існувало, а будь-які національні організації переслідувалися жандармами. Саме тому легальні можливості Австрії, попри економічний гніт та польське домінування, дозволили Галичині стати Українським П'ємонтом."

- type: essay-response
  title: "Есе: Феномен Українського П'ємонту"
  source_reading: "reading-manifest"
  instruction: "Напишіть есе, спираючись на історичні факти з лекції та первинні джерела."
  prompt: "Поясніть, чому Михайло Грушевський назвав Галичину Українським П'ємонтом. Які фактори сприяли перетворенню найбіднішої провінції імперії на центр національного відродження? Оцініть роль австрійських конституційних свобод у цьому процесі."
  min_words: 250
  model_answer: "Галичина стала Українським П'ємонтом, оскільки вона взяла на себе роль лідера у збереженні та розбудові національної ідентичності для всього розірваного кордонами українського народу. Завдяки конституційним свободам Австрійської імперії, українці тут мали можливості, яких були повністю позбавлені їхні брати в Росії. Вони могли видавати пресу рідною мовою, відкривати школи, створювати легальні політичні партії та кооперативи. Ці свободи дозволили сформувати освічену еліту, переважно з духовенства, яка повела за собою селянство. Незважаючи на бідність краю та постійну політичну боротьбу з польською адміністрацією, саме легальне поле Австрії дало змогу українцям навчитися парламентаризму та самоорганізації. Це перетворило Галичину на безпечну гавань для українських діячів і підготувало міцний фундамент для майбутньої незалежності."
  rubric:
    - criteria: "Історична точність"
      description: "Есе містить правильні посилання на історичні події та концепції."
      points: 40
    - criteria: "Аргументація"
      description: "Наведено логічні пояснення того, як саме працював феномен П'ємонту."
      points: 40
    - criteria: "Аналіз ролі свобод"
      description: "Чітко пояснено значення легальної боротьби та конституції Австрії."
      points: 20