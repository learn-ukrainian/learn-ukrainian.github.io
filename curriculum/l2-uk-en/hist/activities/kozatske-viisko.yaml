- type: reading
  id: reading-boplan
  title: 'Первинне джерело: Свідчення Гійома де Боплана'
  source: 'Гійом Левассер де Боплан, Опис України (1651)'
  text: 'Сотня цих козаків, добре і надійно отаборившись, абсолютно не боїться тисячі польської кінноти чи навіть кількох тисяч татар. Мало хто з козаків помирає від звичайної хвороби... абсолютна більшість гине дуже почесною смертю на кривавій війні. Серед цих козаків дуже часто трапляються справжні знавці абсолютно усіх корисних ремесел... вони надзвичайно кмітливі.'

- type: critical-analysis
  title: 'Критичний аналіз: Ефективність козацької армії'
  source_reading: reading-boplan
  target_text: 'Свідчення Боплана про боєздатність Запорозького війська.'
  questions:
    - 'Які фактори, за свідченням Боплана, забезпечували перевагу сотні козаків над тисячею вершників?'
    - 'Чому універсальність навичок (знання ремесел) була критично важливою в умовах степу?'
  model_answers:
    - 'Головним фактором була геніальна тактика рухомого табору з возів, яка нівелювала чисельну перевагу ворожої кавалерії та дозволяла вести щільний залповий вогонь з безпечного укриття.'
    - 'В умовах тривалих походів без постійних ліній постачання воїни мали бути автономними: вміти ремонтувати зброю, виготовляти порох (селітру) та самостійно облаштовувати побут.'
  focus_points:
    - 'Тактика оборонного табору'
    - 'Автономність та витривалість піхоти'

- type: comparative-study
  title: 'Порівняльне дослідження: Козацька та західноєвропейська армії'
  items_to_compare:
    - 'Військо Запорозьке'
    - 'Західноєвропейські армії XVII століття'
  criteria:
    - 'Комплектування та соціальний статус'
    - 'Роль артилерії та мобільність'
    - 'Основна тактика піхоти'
  prompt: 'Порівняйте організацію та тактику козацького війська з класичними феодальними арміями Західної Європи того часу за вказаними критеріями.'
  model_answer: 'На відміну від феодальних армій Західної Європи, де високий статус визначався шляхетним походженням, козацтво було демократичною корпорацією, де посади здобувалися військовим досвідом та кров''ю. Козаки використовували легкі мобільні фальконети замість важких облогових гармат для досягнення блискавичної мобільності у степу. У піхотній тактиці козаки повністю покладалися на безперервний залповий вогонь з самопалів у три шеренги, тоді як в Європі ще значну роль відігравали пікінери для ближнього бою.'

- type: true-false
  title: 'Верифікація фактів: Зброя та клейноди'
  instruction: 'Визначте, які з цих тверджень є правдивими, а які — хибними.'
  items:
    - statement: 'Шабля була головною і найефективнішою зброєю козацької піхоти під час масштабних польових битв.'
      correct: false
      explanation: 'Головною силою піхоти була вогнепальна зброя (самопали), а шабля часто залишалася зброєю останнього шансу або інструментом кінноти.'
    - statement: 'Масивна золота булава символізувала найвищу виконавчу та військову владу обраного Гетьмана над усім військом.'
      correct: true
      explanation: 'Булава була головним клейнодом і абсолютним, неподільним символом найвищої влади Гетьмана.'
    - statement: 'Реєстрові козаки постійно підпорядковувалися місцевій шляхетській адміністрації та старостам.'
      correct: false
      explanation: 'Реєстровці підпорядковувалися лише своєму військовому командуванню і були офіційно звільнені від шляхетського суду.'
    - statement: 'Генеральний обозний безпосередньо відповідав за систему правосуддя та суворі військові суди.'
      correct: false
      explanation: 'Генеральний обозний керував потужною артилерією та логістикою (обозом), а за суди відповідав Генеральний суддя.'
    - statement: 'Козацький табір формувався з міцно зчеплених між собою возів для організації кругової оборони.'
      correct: true
      explanation: 'Ця геніальна тактика дозволяла створити своєрідну рухому фортецю у відкритому степу для надійного захисту від кавалерії.'
    - statement: 'Пластунами традиційно називали елітних козацьких розвідників, які виконували найскладніші секретні місії в тилу ворога.'
      correct: true
      explanation: 'Пластуни були спецпризначенцями сімнадцятого століття, які досконало володіли навичками маскування та таємної підводної розвідки.'
    - statement: 'Козаки завжди використовували дуже важкі європейські облогові гармати для своїх швидких морських походів.'
      correct: false
      explanation: 'Козаки надавали перевагу відносно легким і рухливим фальконетам, які можна було легко монтувати на бойових возах або чайках.'
    - statement: 'Втрата бойової хоругви у кривавому бою беззаперечно вважалася найбільшою і найжахливішою ганьбою для всього підрозділу.'
      correct: true
      explanation: 'Хоругва мала величезне сакральне значення, і її втрата могла призвести до ганебного розформування полку чи сотні.'
    - statement: 'Європейські монархи ніколи не наймали українських козаків для участі у своїх війнах через їхню неконтрольованість.'
      correct: false
      explanation: 'Козаки мали репутацію елітних найманців по всій Європі і брали активну участь у багатьох конфліктах, включаючи Тридцятилітню війну.'
    - statement: 'Запорозький кіш дозволяв помірне вживання алкоголю під час тривалих морських чи сухопутних бойових походів.'
      correct: false
      explanation: 'Під час офіційного воєнного походу діяв абсолютно суворий сухий закон, а за вживання алкоголю часто карали на смерть.'

- type: essay-response
  title: 'Есе: Етика та дисципліна лицарського люду'
  prompt: 'На основі вивченого матеріалу напишіть розгорнуте есе (мінімум 150 слів) про роль суворої дисципліни та особистої відповідальності у Війську Запорозькому. Як успішно поєднувалися абсолютна демократичність під час виборів старшини та залізна, беззаперечна покора наказам під час воєнного походу? Чи можна впевнено назвати це головним фундаментом успіху козацької модерної армії?'
  min_words: 150
  model_answer: 'У Війську Запорозькому унікальним чином поєднувалися високі демократичні ідеали мирного часу та залізна дисципліна військових походів. З одного боку, козацтво функціонувало як своєрідний лицарський люд, де кожен мав рівний голос на генеральній раді, а вищі посади гетьмана чи полковника були виключно виборними. Це створювало потужне відчуття братерства та особистої відповідальності за спільну державну справу. З іншого боку, з офіційним оголошенням воєнного походу Запорозький кіш запроваджував надзвичайно суворі правила: абсолютний сухий закон та покарання на смерть за дезертирство чи непокору командиру. Демократія не перетворювалася на анархію саме завдяки цій свідомій, глибокій самодисципліні. Досвідчені воїни чудово розуміли, що в умовах відкритого бою і чисельної переваги ворога лише беззаперечне підпорядкування командирам та надійна взаємовиручка можуть врятувати життя всьому підрозділу. Такий збалансований підхід між особистою свободою вибору та безкомпромісним військовим обов''язком перетворював козацьку армію на надзвичайно вмотивовану, професійну боєздатну машину, яка успішно протистояла найбільшим імперіям свого часу.'
  rubric:
    - criteria: 'Глибина аналізу'
      description: 'Здатність логічно пояснити баланс між козацькою демократією та військовою дисципліною.'
      points: 40
    - criteria: 'Використання термінології'
      description: 'Доречне використання понять (кіш, генеральна рада, лицарський люд, дисципліна).'
      points: 30
    - criteria: 'Структура та аргументація'
      description: 'Правильна та послідовна побудова тексту есе з чіткими історичними прикладами.'
      points: 30