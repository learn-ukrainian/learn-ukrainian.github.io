- type: reading
  id: reading-act-zluka
  title: Універсал Директорії про Злуку
  source: Універсал Директорії УНР
  text: 'Однині воєдино зливаються століттями одірвані одна від одної частини єдиної
    України — Західно-Українська Народна Республіка (Галичина, Буковина, Угорська
    Русь) і Наддніпрянська Велика Україна. Здійснились віковічні мрії, якими жили
    і за які вмирали кращі сини України. Однині є єдина незалежна Українська Народна
    Республіка.

    '
  tasks:
  - Проаналізуйте, як в тексті обґрунтовується історична необхідність об'єднання.
  - Яке значення має використання слова "зливаються" замість "приєднуються"?
- type: true-false
  title: Факти про ЗУНР та Акт Злуки
  items:
  - statement: Листопадовий чин відбувся першого листопада 1918 року у Львові.
    correct: true
    explanation: Військовий виступ відбувся в ніч на перше листопада.
  - statement: Дмитро Вітовський планував захопити владу у Львові мирним шляхом без
      зброї.
    correct: false
    explanation: Він очолив збройне повстання, щоб випередити поляків.
  - statement: Українська Національна Рада була вищим законодавчим органом ЗУНР.
    correct: true
    explanation: Це був парламент ЗУНР, який очолював Євген Петрушевич.
  - statement: ЗУНР вдалося зберегти контроль над усіма 70 тисячами квадратних кілометрів
      заявленої території.
    correct: false
    explanation: Фактично контролювалося близько 40 тисяч квадратних кілометрів через
      агресію сусідів.
  - statement: Євген Петрушевич був прихильником радикальних більшовицьких реформ.
    correct: false
    explanation: Він був представником європейського консерватизму та легалізму.
  - statement: УГА страждала від гострої нестачі вищих офіцерських кадрів.
    correct: true
    explanation: Українцям в австрійській армії рідко дозволяли займати високі командні
      посади.
  - statement: ЗУНР прийняла закон про державну мову, який позбавляв меншини права
      використовувати свої мови.
    correct: false
    explanation: Закон гарантував національним меншинам право звертатися до органів
      влади їхніми мовами.
  - statement: Після підписання Акту Злуки ЗУНР перетворилася на Західну Область УНР,
      зберігши свою автономію.
    correct: true
    explanation: Вона зберегла свої закони, уряд та армію через складність ситуації.
  - statement: Антанта повністю підтримала створення незалежної ЗУНР на Паризькій
      мирній конференції.
    correct: false
    explanation: Антанта підтримала Польщу як бар'єр проти більшовизму, проігнорувавши
      українські інтереси.
  - statement: Чортківська офензива була успішним українським контрнаступом, який
      зупинився через нестачу боєприпасів.
    correct: true
    explanation: УГА відкинула поляків на 120 км, але була змушена відступити, вичерпавши
      резерви.
  instruction: Визначте, чи твердження правильне.
- type: critical-analysis
  title: Аналіз концепції соборності
  source_reading: reading-act-zluka
  questions:
  - Які історичні обставини зробили можливим проголошення Акту Злуки в січні 1919
    року?
  - Як ідеологія Акту Злуки спростовує колоніальні міфи про те, що Україна є штучним
    утворенням?
  model_answers:
  - Розпад Австро-Угорської та Російської імперій створив геополітичний вакуум, який
    дозволив українцям реалізувати своє право на самовизначення. Фастівський договір
    заклав юридичну базу для цього об'єднання.
  - Акт Злуки демонструє, що українці, незважаючи на століття перебування в різних
    імперіях, зберегли спільну національну ідентичність і ментальну єдність, що доводить
    природність їхнього прагнення до спільної держави.
  focus_points:
  - Вплив Першої світової війни на імперії.
  - Деколонізаційний характер документа.
- type: essay-response
  title: Причини та наслідки поразки ЗУНР
  source_reading: reading-act-zluka
  prompt: Проаналізуйте ключові фактори, які призвели до військової та політичної
    поразки Західно-Української Народної Республіки, незважаючи на її високу інституційну
    спроможність. Чому Акт Злуки не привів до реального об'єднання на практиці?
  min_words: 150
  model_answer: Поразка ЗУНР була зумовлена передусім несприятливою геополітичною
    ситуацією. Держава змушена була вести війну на два фронти, не маючи достатніх
    ресурсів. Ключовим фактором стала позиція Антанти, яка озброїла польську армію
    Галлера, докорінно змінивши баланс сил на фронті. Крім того, існували серйозні
    ідеологічні розбіжності між консервативним керівництвом ЗУНР та соціалістичною
    Директорією УНР. Це ускладнювало координацію дій та вироблення спільної дипломатичної
    стратегії. Акт Злуки не привів до адміністративного злиття через хаос воєнного
    часу та географічну розірваність фронтів. Проте його значення залишається величезним,
    оскільки він закріпив ідеал соборності в національній свідомості.
  rubric:
  - criteria: Аналіз зовнішніх факторів
    description: Студент розглядає вплив Антанти та польської армії Галлера на результат
      конфлікту.
    points: 10
  - criteria: Аналіз внутрішніх факторів
    description: Студент пояснює політичні та ідеологічні розбіжності між лідерами
      УНР та ЗУНР.
    points: 10
- type: comparative-study
  title: 'Порівняння політичних культур: ЗУНР та УНР'
  source_reading: reading-act-zluka
  items_to_compare:
  - Політична культура лідерів ЗУНР
  - Політична культура лідерів УНР
  criteria:
  - Ставлення до законності та права
  - Ідеологічні погляди (консерватизм проти соціалізму)
  - Методи державного управління
  prompt: Порівняйте політичні підходи лідерів Західно-Української Народної Республіки
    та Наддніпрянської УНР. Як ці відмінності вплинули на процес державотворення та
    долю Акту Злуки?
  model_answer: Лідери ЗУНР, виховані в традиціях австрійського парламентаризму, сповідували
    консервативний легалізм. Вони суворо дотримувалися процедур, поважали приватну
    власність і спиралися на регулярні інституції. Натомість лідери УНР були схильні
    до революційного соціалізму, діяли в умовах повстанського хаосу і готові були
    до радикальних соціальних експериментів. Ця прірва в політичній культурі призводила
    до взаємного нерозуміння. Галичани вважали наддніпрянців занадто радикальними,
    а ті дорікали галичанам за обережність. Це заважало виробленню спільної стратегії
    та стало однією з причин того, чому реальне злиття двох держав так і не відбулося.
