- type: reading
  id: reading-hordiyenko-sich
  title: 'Документи епохи: Вітчизна-мати'
  source: 'З листування Костя Гордієнка (1708)'
  instruction: 'Прочитайте уривок, який ілюструє політичну позицію кошового отамана.'
  text: |
    Злість московська здавна на Вітчизну, нашу матір, аби захопити її у владу й володіння, хитро задумує. Ми маємо боронити наші вольності та протистояти тим, хто прагне перетворити нас на рабів у власній країні.

- type: critical-analysis
  source_reading: reading-hordiyenko-sich
  title: 'Аналіз риторики спротиву'
  instruction: 'Проаналізуйте наведений текст Костя Гордієнка та дайте відповіді на запитання.'
  target_text: 'Злість московська здавна на Вітчизну, нашу матір...'
  questions:
    - 'Яке значення має використання метафори "Вітчизна-мати" у цьому документі?'
    - 'Як цей текст спростовує імперський міф про відсутність у козаків політичної візії?'
    - 'Який геополітичний контекст змусив Гордієнка написати ці слова?'
  model_answers:
    - 'Ця метафора емоційно мобілізує козацтво, перетворюючи Україну на сакральний об''єкт захисту, а не просто територію.'
    - 'Він доводить, що козацтво вело усвідомлену боротьбу за незалежність, оперуючи високими ідеологічними категоріями, а не діяло як найманці.'
    - 'Будівництво фортець, як-от Кам''яний Затон, та наступ на козацькі вольності з боку Петра I.'
  focus_points:
    - 'Антиколоніальна доктрина Січі'
    - 'Політична лексика XVIII століття'

- type: true-false
  title: 'Історичні факти: міфи та реальність'
  instruction: 'Визначте, чи є наведені твердження правдивими (true) або хибними (false).'
  items:
    - statement: 'Кость Гордієнко здобув вищу освіту в Києво-Могилянській академії.'
      correct: true
      explanation: 'Він був високоосвіченою людиною, знав латину та розбирався в європейській політиці.'
    - statement: 'Кошовий отаман мав абсолютну та спадкову владу на Запорозькій Січі.'
      correct: false
      explanation: 'Посада кошового отамана була виборною, і його могли усунути з посади за рішенням козацької ради.'
    - statement: 'Московська фортеця Кам''яний Затон була збудована для захисту козаків від татар.'
      correct: false
      explanation: 'Вона була збудована для контролю над Січчю, блокування торгівлі та шпигунства.'
    - statement: 'Мазепа та Гордієнко були давніми союзниками ще до Північної війни.'
      correct: false
      explanation: 'Вони довгий час були ворогами, але об''єдналися перед загрозою знищення української державності.'
    - statement: 'Запорожці становили важливу частину шведсько-українського союзу, привівши 8000 воїнів.'
      correct: true
      explanation: 'Їхня участь спростовує російський міф про те, що Мазепу не підтримав народ.'
    - statement: 'Шведські хроністи не бачили жодної різниці між запорозькими козаками та російськими військами.'
      correct: false
      explanation: 'Шведи чітко розрізняли запорожців і московитів, відзначаючи унікальну козацьку любов до свободи.'
    - statement: 'Захисники Чортомлицької Січі уклали чесну мирну угоду з полковником Яковлєвим.'
      correct: false
      explanation: 'Вони повірили зраднику Гнату Галагану, після чого російські війська влаштували жорстоку різанину.'
    - statement: 'Російські війська зруйнували січову церкву та розкопали козацький цвинтар.'
      correct: true
      explanation: 'Це був акт державного тероризму та намагання знищити історичну пам''ять народу.'
    - statement: 'Конституція Пилипа Орлика забороняла існування Запорозької Січі.'
      correct: false
      explanation: 'Навпаки, вона гарантувала права Січі та вимагала звільнення її земель від московських залог.'
    - statement: 'З точки зору європейського права, дії Мазепи та Гордієнка були законним повстанням проти тирана.'
      correct: true
      explanation: 'Порушення васальної угоди з боку царя Петра I давало законне право на розрив відносин.'

- type: comparative-study
  title: 'Порівняльний аналіз політичних систем'
  instruction: 'Порівняйте політичний устрій Запорозької Січі та Московського царства початку XVIII століття.'
  items_to_compare:
    - 'Чортомлицька Січ'
    - 'Московське царство'
  criteria:
    - 'Джерело влади та процедура призначення лідера'
    - 'Правовий статус особи'
    - 'Основа судочинства'
  prompt: 'Спираючись на текст модуля, поясніть, чому ці дві політичні системи перебували в стані екзистенційного конфлікту.'
  model_answer: 'Січ була демократичною республікою, де влада належала виборній раді, а кожна людина вважалася вільною. Московське царство будувалося на жорсткому самодержавстві та кріпацтві. Імперія не могла терпіти існування осередку свободи поруч зі своїми кордонами, оскільки Січ була прикладом альтернативного державного устрою і приваблювала поневолених селян. Цей конфлікт був не просто боротьбою за території, а цивілізаційним зіткненням ідеї вільної людини з ідеєю абсолютної покори монарху.'

- type: essay-response
  title: 'Аналітичне есе: Право на повстання'
  instruction: 'Напишіть аналітичне есе на задану тему.'
  prompt: 'Російська імперська історіографія століттями називала Мазепу та Гордієнка "зрадниками". Використовуючи концепцію васального договору та європейського права, аргументовано спростуйте цю тезу.'
  min_words: 200
  model_answer: 'Звинувачення українських лідерів у "зраді" є виключно продуктом імперської пропаганди, що спирається на азійську модель безумовного підпорядкування монарху. Європейська політична традиція будувалася на концепції двостороннього васального договору. Українське козацтво погодилося служити царю в обмін на захист і збереження своїх традиційних вольностей. Проте Петро I грубо порушив ці умови: він ввів війська, будував фортеці на землях Січі, руйнував економіку і відмовився надавати військовий захист від шведів. Згідно з європейським правом, порушення сюзереном умов договору автоматично звільняло васала від його зобов''язань. Отже, перехід Мазепи і Гордієнка на бік Карла XII був не зрадою, а законною реалізацією права нації на самозахист та повстання проти тиранії. Це був свідомий антиколоніальний крок, спрямований на збереження суверенітету Української держави.'
  rubric:
    - criteria: 'Історична аргументація'
      description: 'Використання європейської концепції васального договору для пояснення дій лідерів.'
      points: 40
    - criteria: 'Деколонізаційний підхід'
      description: 'Чітке спростування імперського міфу про зраду.'
      points: 30
    - criteria: 'Стилістика та лексика'
      description: 'Використання академічної лексики рівня B2-C1 (суверенітет, легітимність, тиранія).'
      points: 30