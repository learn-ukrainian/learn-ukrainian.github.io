- type: reading
  id: reading-slovo
  title: "Первинне джерело: Слово о полку Ігоревім"
  source: "Слово о полку Ігоревім (XII століття)"
  instruction: "Прочитайте уривок, присвячений галицькому князю Ярославу Осмомислу, та зверніть увагу на політичні метафори."
  text: |
    Галицький Осмомисле Ярославе! 
    Високо сидиш ти на своїм золотокованім престолі, 
    підперши Гори Угорські своїми залізними полками, 
    заступивши королеві дорогу, 
    зачинивши ворота Дунаєві, 
    мечучи тягарі через хмари, 
    суди рядячи до Дунаю.
  tasks:
    - "Проаналізуйте геополітичний сенс фрази про зачинені ворота Дунаю."
    - "Поміркуйте, чому автор згадує Угорські гори (Карпати)."
    - "Визначте, як економічна могутність Галичини відображена у тексті."
    - "Поясніть роль цього фрагмента для розуміння спадкоємності руської державності."

- type: essay-response
  title: "Есе: Геополітична роль Галичини"
  source_reading: reading-slovo
  instruction: "Напишіть аналітичне есе на основі первинного джерела та матеріалу уроку."
  prompt: "Спираючись на уривок зі Слова о полку Ігоревім та історичний контекст, проаналізуйте геополітичну роль Галицько-Волинської держави. Чому саме цей регіон став західним оплотом Русі та зміг зберегти державність після падіння Києва? Обґрунтуйте свою думку."
  min_words: 150
  model_answer: "Галицько-Волинська держава стала новим центром руської державності завдяки кільком факторам. По-перше, вона мала унікальне географічне положення: Карпатські гори та волинські ліси створювали природний бар'єр від степових кочівників. Це давало змогу зосередитися на внутрішньому розвитку, а не лише на обороні. По-друге, регіон контролював ключові торгові шляхи, включаючи доступ до Дунаю, що забезпечувало економічну незалежність. По-третє, могутність держави була закладена ще за Ярослава Осмомисла, про що свідчить Слово о полку Ігоревім. Його золотокований престол символізує багатство, а залізні полки — військову міць. Тому після падіння Києва Галичина та Волинь природно перебрали на себе роль політичного та культурного центру, зберігши традиції Київської Русі та інтегрувавшись у європейський простір."
  rubric:
    - criteria: "Історична аргументація"
      description: "Здатність наводити переконливі історичні факти для підтвердження тези"
      points: 40
    - criteria: "Аналіз джерела"
      description: "Вміння інтерпретувати метафори з тексту первинного джерела"
      points: 30
    - criteria: "Логіка та структура"
      description: "Чітка побудова есе, наявність вступу, основної частини та висновку"
      points: 30

- type: critical-analysis
  title: "Аналіз причинно-наслідкових зв'язків"
  instruction: "Проаналізуйте наведені питання та дайте розгорнуті відповіді."
  target_text: "Період правління Романа Мстиславича та початок епохи Романовичів характеризувалися жорстокою боротьбою за централізацію влади."
  questions:
    - "Які були головні причини постійних конфліктів між князями та галицьким боярством?"
    - "Як битва під Ярославом 1245 року змінила розстановку політичних сил у регіоні?"
    - "Які економічні реформи Данила Галицького дозволили йому здобути фінансову незалежність від старої аристократії?"
  model_answers:
    - "Головною причиною конфліктів було прагнення бояр зберегти свої величезні землеволодіння та монополію на видобуток солі. Бояри бажали децентралізації та можливості маніпулювати князями, тоді як Роман Мстиславич і пізніше Данило прагнули до абсолютної влади (самодержавства) для побудови міцної держави."
    - "Битва під Ярославом стала вирішальним моментом, який поклав край боярській смуті. Данило та Василько вщент розгромили коаліцію бунтівних бояр та іноземних інтервентів. Це дозволило їм консолідувати владу, знищити опозицію та розпочати період стабільного розквіту."
    - "Данило Галицький зосередив у своїх руках монополію на торгівлю сіллю та митні збори з транзитних шляхів. Крім того, він активно будував нові міста (Холм, Львів) та запрошував європейських ремісників, створюючи нову економічну базу, незалежну від старих боярських володінь."

- type: critical-analysis
  title: "Деколонізаційний аналіз: Розвінчання міфів"
  instruction: "Розгляньте наведені міфи імперської історіографії та спростуйте їх на основі історичних фактів."
  target_text: "Російська імперська та радянська історіографії століттями конструювали наративи, які применшували значення Королівства Русь, називаючи цей час періодом феодальної роздробленості."
  questions:
    - "У чому полягає маніпулятивність терміна феодальна роздробленість щодо Галицько-Волинської держави?"
    - "Чому імперська історіографія свідомо називала Королівство Русь князівством?"
    - "Як прийняття корони Данилом Галицьким спростовує міф про зраду православ'я?"
    - "Яке значення має збереження назви Русь для доведення легітимної спадкоємності Києва?"
    - "У чому полягала принципова різниця між політичною моделлю Галичини та деспотичною моделлю Залісся?"
  model_answers:
    - "Цей термін маніпулятивний, оскільки держава Романовичів була не роздробленим уламком, а високоцентралізованою європейською монархією, яка за своєю керованістю перевершувала стару Київську Русь."
    - "Називаючи європейське королівство (Regnum Russiae) князівством, імперські історики намагалися принизити його міжнародний статус і довести, що справжня спадщина Києва перейшла до Владимира-на-Клязьмі, а не залишилася в Україні."
    - "Прийняття корони було прагматичним політичним кроком для створення антимонгольської коаліції. Умови унії гарантували збереження православних обрядів, тому це не була зрада віри, а спроба врятувати державу."
    - "Збереження етноніму русини та державної назви Русь свідчить, що саме на західних українських землях продовжила жити легітимна держава київської традиції, тоді як на північному сході формувався новий етнос."
    - "Галицька модель орієнтувалася на Європу, розвиваючи міське самоврядування (магдебурзьке право) та баланс влади. Натомість Залісся перейняло монгольську деспотію, де населення було безправними холопами князя."

- type: true-false
  title: "Перевірка фактів: Епоха розквіту"
  instruction: "Визначте, чи є наведені твердження правдивими чи хибними."
  items:
    - statement: "Галицько-Волинська держава утворилася в результаті об'єднання двох князівств у 1199 році."
      correct: true
      explanation: "Так, у 1199 році волинський князь Роман Мстиславич об'єднав Волинь і Галичину під своєю владою."
    - statement: "Роман Мстиславич був відомий своєю толерантністю та мирним співіснуванням з галицьким боярством."
      correct: false
      explanation: "Ні, Роман Мстиславич вів жорстоку боротьбу з боярською опозицією, щоб централізувати владу."
    - statement: "Після смерті Романа Мстиславича розпочався період стабільного розвитку та економічного зростання."
      correct: false
      explanation: "Навпаки, після його загибелі у 1205 році почалася тридцятирічна Велика смута і громадянська війна."
    - statement: "Данило та Василько Романовичі спільно правили державою, утворивши унікальний дуумвірат."
      correct: true
      explanation: "Брати правили гармонійно: Данило відповідав за зовнішню політику і Галичину, а Василько забезпечував надійний тил на Волині."
    - statement: "У битві під Ярославом 1245 року військо Данила Галицького зазнало нищівної поразки від монголів."
      correct: false
      explanation: "У цій битві Данило розгромив об'єднані сили бунтівних бояр, угорців та поляків, остаточно зміцнивши свою владу."
    - statement: "Данило Галицький заснував місто Львів і назвав його на честь свого старшого сина Лева."
      correct: true
      explanation: "Перша письмова згадка про Львів датується 1256 роком, місто було засноване Данилом і назване на честь сина."
    - statement: "Коронація Данила Романовича папським легатом відбулася у новій столиці державі — місті Холм."
      correct: false
      explanation: "Коронація Данила Галицького королівською короною відбулася у 1253 році в місті Дорогичин."
    - statement: "Галицько-Волинський літопис був написаний монахами і присвячений переважно церковним справам."
      correct: false
      explanation: "Цей літопис має яскраво виражений світський характер і фокусується на політичних та військових діяннях князів."
    - statement: "Для архітектури Королівства Русь було характерним використання вітражів та білокам'яного різьблення."
      correct: true
      explanation: "Це свідчить про глибокий синтез місцевих традицій із західноєвропейським романським та готичним стилями."
    - statement: "Європейські монархи та папська курія офіційно називали державу Романовичів Королівством Русь."
      correct: true
      explanation: "В європейських хроніках того часу використовувався термін Regnum Russiae, що підкреслювало її суверенний статус."