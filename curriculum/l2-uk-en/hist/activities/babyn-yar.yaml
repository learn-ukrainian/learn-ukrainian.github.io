- type: reading
  id: reading-pronycheva
  title: Свідчення Діни Проничевої
  text: 'Я закрила очі, стисла кулаки, напружила всі м''язи та кинулася вниз до того,
    як пролунав постріл... Я впала на трупи. Навколо мене падали люди, я чула стогони,
    крики, плач... Потім я почула, як хтось ходить по тілах і добиває тих, хто ще
    живий. Я завмерла, намагаючись не дихати. Один із солдатів наступив мені на руку,
    інший — на ногу, але я не видала жодного звуку.

    '
  source: Свідчення Діни Проничевої, яка вижила в Бабиному Яру
  tasks:
  - Прочитайте свідчення Діни Проничевої.
  - Зверніть увагу на емоційний та фізичний стан жертви.
- type: critical-analysis
  source_reading: reading-pronycheva
  title: 'Аналіз свідчень: психологія порятунку'
  questions:
  - Які фізичні та психологічні зусилля допомогли Діні Проничевій вижити в момент
    екзекуції?
  - Як цей уривок допомагає зрозуміти технологію розстрілів у Бабиному Яру?
  model_answers:
  - 'Діні Проничевій довелося проявити неймовірний самоконтроль: стрибнути до пострілу,
    лежати нерухомо серед тіл та не видавати звуків навіть тоді, коли солдати наступали
    на неї.'
  - Уривок підтверджує практику добивання поранених та конвеєрний метод вбивства,
    коли люди падали одне на одного.
- type: reading
  id: reading-sheptytsky
  title: 'Моральний орієнтир: послання ''Не убий!'''
  text: 'У листопаді 1942 року митрополит Андрей Шептицький видав пастирське послання.
    У цьому документі він суворо засудив будь-які форми вбивства, наголошуючи, що
    жодна політична мета не може виправдати пролиття безневинної крові. Шептицький
    попереджав про духовну деградацію суспільства і погрожував відлученням від Церкви
    тим, хто сприяє масовим стратам.

    '
  source: Опис діяльності Андрея Шептицького
  tasks:
  - Прочитайте про послання митрополита Андрея Шептицького.
- type: comparative-study
  source_reading: reading-sheptytsky
  title: 'Порівняльний аналіз: реакція на насильство'
  items_to_compare:
  - Допоміжна поліція та колаборанти
  - Праведники народів світу та духовенство
  criteria:
  - Мотивація дій
  - Ставлення до людського життя
  - Рівень особистого ризику
  prompt: Порівняйте дві протилежні моделі поведінки місцевого населення під час нацистської
    окупації. Чим керувалися колаборанти та що спонукало Праведників до порятунку
    євреїв?
  model_answer: Колаборанти часто керувалися антисемітськими переконаннями, страхом
    або бажанням наживи, знецінюючи людське життя. Натомість Праведники народів світу
    ризикували власним життям та життям своїх родин заради порятунку інших, керуючись
    гуманістичними та релігійними цінностями, як-от послання 'Не убий!'.
- type: true-false
  title: Факти про Голокост на території України
  items:
  - statement: '''Голокост від куль'' характеризувався використанням стаціонарних
      газових камер замість розстрілів.'
    correct: false
    explanation: '''Голокост від куль'' відбувався через масові розстріли з гвинтівок
      та кулеметів поблизу міст і сіл.'
  - statement: Згідно зі звітом айнзацгрупи, за два дні в Бабиному Яру було вбито
      понад тридцять три тисячі євреїв.
    correct: true
    explanation: Звіт фіксує 33 771 жертву 29-30 вересня 1941 року.
  - statement: Допоміжна поліція здійснювала безпосередні розстріли на дні Бабиного
      Яру.
    correct: false
    explanation: Безпосередні розстріли здійснювала німецька зондеркоманда 4а, а поліція
      забезпечувала оточення та логістику.
  - statement: У післявоєнні роки радянська влада відкрито визнавала, що більшість
      жертв Бабиного Яру були євреями.
    correct: false
    explanation: Радянська влада замовчувала єврейську ідентичність жертв, називаючи
      їх 'мирними радянськими громадянами'.
  - statement: Куренівська трагедія стала наслідком спроби радянської влади замити
      Бабин Яр рідкими відходами.
    correct: true
    explanation: Прорив дамби, що утримувала пульпу, призвів до селевого потоку, який
      зруйнував Куренівку.
  - statement: Нацистська ідеологія не планувала знищувати ромів, зосередившись винятково
      на євреях.
    correct: false
    explanation: Роми також підлягали тотальному винищенню згідно з нацистською расовою
      теорією.
  - statement: Митрополит Андрей Шептицький відкрито звертався до Генріха Гіммлера
      з протестом проти вбивства євреїв.
    correct: true
    explanation: У лютому 1942 року він написав листа Гіммлеру, засуджуючи масове
      знищення єврейського населення.
  - statement: В Україні немає Праведників народів світу, оскільки все населення співпрацювало
      з окупантами.
    correct: false
    explanation: Понад 2600 українців офіційно визнані Праведниками народів світу.
  - statement: Трагедія Богданівки на Миколаївщині відбувалася в зоні окупації Трансністрія
      під контролем румунської адміністрації.
    correct: true
    explanation: Там було знищено понад 50 тисяч євреїв румунською владою за участю
      німецьких підрозділів.
  - statement: Перший офіційний пам'ятник у вигляді Менори в Бабиному Яру з'явився
      лише після здобуття Україною незалежності.
    correct: true
    explanation: Менору встановили у 1991 році, що стало кроком до визнання єврейської
      ідентичності жертв.
  instruction: Визначте, чи твердження правильне.
- type: essay-response
  source_reading: reading-sheptytsky
  title: 'Есе: Чому пам''ять про Голокост важлива для України'
  prompt: Спираючись на історію Бабиного Яру, політику замовчування в СРСР та сучасні
    процеси меморіалізації, напишіть есе про те, чому збереження пам'яті про Голокост
    є критично важливим для формування європейської ідентичності України.
  model_answer: Пам'ять про Голокост є наріжним каменем сучасної європейської ідентичності,
    що базується на принципі 'Ніколи знову'. Для України, яка десятиліттями перебувала
    під впливом радянської політики замовчування та знеособлення жертв, чесна меморіалізація
    Бабиного Яру означає деколонізацію власного минулого. Визнання трагедії єврейського
    народу, усвідомлення ролі Праведників та колаборантів допомагає суспільству долати
    травми тоталітаризму. Відповідальна політика пам'яті свідчить про зрілість нації,
    її здатність співчувати та будувати толерантне майбутнє, вільне від ненависті
    та ксенофобії.
  rubric:
  - criteria: Історична точність
    description: Правильне використання фактів про Бабин Яр та політику замовчування.
    points: 4
  - criteria: Глибина аналізу
    description: Вміння пов'язати історичну пам'ять із сучасною європейською інтеграцією
      України.
    points: 4
  - criteria: Логіка та структура
    description: Послідовний виклад думок та чітка аргументація.
    points: 2
