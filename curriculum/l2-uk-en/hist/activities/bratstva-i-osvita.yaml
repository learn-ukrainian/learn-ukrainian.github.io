- type: reading
  id: "reading-statute"
  title: "Первинне джерело: Порядок шкільний"
  source: "Статут Львівської братської школи, 1586 рік"
  text: "Багатий над убогим в школі нічим вищий не має бути, тільки самою наукою. Сідити має кожний на своїм місці, котре кому буде надане: якщо ж котрий у навчанні більше вмітиме, хоча б і убогий був, вище сидіти має, ніж багатий."
  instruction: "Прочитайте уривок зі статуту Львівської братської школи."

- type: critical-analysis
  title: "Критичний аналіз: Демократичні принципи освіти"
  source_reading: "reading-statute"
  instruction: "Проаналізуйте наведений уривок зі статуту Львівської братської школи."
  questions:
    - "Яким чином принцип розміщення учнів у класі руйнував станові бар'єри тогочасного суспільства?"
    - "Чому для міщанського братства було критично важливо закріпити цей принцип саме в юридичному документі?"
  model_answers:
    - "Розміщення учнів за успішністю, а не за багатством, підривало феодальну ієрархію, де соціальний статус визначався походженням. Це формувало нову еліту, базовану на інтелекті та знаннях."
    - "Братства діяли в межах європейського міського самоврядування. Юридичне закріплення статуту гарантувало, що ці революційні правила не будуть скасовані свавіллям аристократії чи консервативних єпископів."

- type: true-false
  title: "Факти про братства та Острозьку академію"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "У шістнадцятому столітті освіта стала головною зброєю в боротьбі за збереження української ідентичності."
      correct: true
      explanation: "Школа перетворилася на потужний інструмент формування національної свідомості та інтелектуального опору."
    - statement: "Братські школи обмежували свою програму читанням церковнослов'янських текстів та співом псалмів."
      correct: false
      explanation: "Це була обмежена програма старих дяківських шкіл. Братські школи навпаки пропонували вивчення семи вільних мистецтв."
    - statement: "Реформація сприяла ідеї використання живих національних мов у богослужінні та друкуванні книг."
      correct: true
      explanation: "Реформаційний підхід стимулював європейських та українських інтелектуалів до перекладів Святого Письма."
    - statement: "Єзуїтські колегіуми пропонували платну освіту виключно для дітей магнатів та багатої шляхти."
      correct: false
      explanation: "Єзуїти пропонували абсолютно безкоштовну освіту найвищого європейського рівня для всієї здібної молоді."
    - statement: "Православні діячі застосували стратегію 'наука проти науки', свідомо запозичивши єзуїтські освітні методики."
      correct: true
      explanation: "Вони успішно скопіювали класно-урочну систему та екзамени, щоб гідно протистояти католицьким опонентам."
    - statement: "Львівське Успенське братство здобуло право ставропігії, що означало пряме підпорядкування місцевому єпископу."
      correct: false
      explanation: "Ставропігія означала повну незалежність міщан від місцевого єпископа та пряме підпорядкування східному патріарху."
    - statement: "Принцип Львівської братської школи полягав у тому, що діти багатих купців завжди сиділи на перших лавах."
      correct: false
      explanation: "Згідно зі статутом 'Порядок шкільний', місця в класі розподілялися виключно за рівнем здобутих знань."
    - statement: "До навчальної програми Острозької академії входило обов'язкове вивчення п'яти різних мов."
      correct: true
      explanation: "Амбітні студенти мали опанувати церковнослов'янську, класичну грецьку, латинську, польську та давньоєврейську мови."
    - statement: "Острозька академія вважається найпершим вищим навчальним закладом на теренах Західної Європи."
      correct: false
      explanation: "Вона вважається одним із найперших вищих навчальних закладів саме на теренах Східної Європи."
    - statement: "Знаменита Острозька Біблія була надрукована у 1581 році та слугувала поважним дипломатичним подарунком."
      correct: true
      explanation: "Її тираж складав близько 1500 примірників. Один з них князь подарував до Московії, яка ще не мала власного перекладу."

- type: reading
  id: "reading-preface"
  title: "Первинне джерело: Передмова до Острозької Біблії"
  source: "Герасим Смотрицький, 1581 рік"
  text: "Прийміть це не як речі людські, але як духовний дар, що сходить згори, і віднайдіть істинний шлях свого спасіння."
  instruction: "Прочитайте емоційне звернення першого ректора Острозької академії до українців."

- type: essay-response
  title: "Есе: Історична місія Острозької Біблії"
  source_reading: "reading-preface"
  instruction: "Напишіть розгорнуту аналітичну відповідь, синтезуючи матеріали уроку та первинне джерело."
  prompt: "Спираючись на текст передмови Герасима Смотрицького та загальний історичний контекст, напишіть есе про культурне та політичне значення видання Острозької Біблії. Поясніть, чому православні автори сприймали свою кропітку друкарську роботу як масштабну місію збереження всієї нації."
  min_words: 150
  model_answer: "Видання Острозької Біблії у 1581 році стало епохальною подією для українського суспільства. В умовах агресивної Контрреформації та тиску з боку католицької церкви, поява повного канонічного тексту церковнослов'янською мовою позбавила іноземних полемістів можливості звинувачувати православних у використанні помилкових рукописних книг. Слова Герасима Смотрицького про 'духовний дар' свідчать про те, що творці Біблії усвідомлювали свою колосальну працю як усвідомлений акт духовного та політичного захисту. Це був могутній інтелектуальний щит, який надійно доводив спроможність українських вчених реалізовувати наукові проекти найвищого загальноєвропейського масштабу, тим самим зберігаючи суб'єктність та унікальну культурну ідентичність свого народу."
  rubric:
    - criteria: "Історичний контекст"
      description: "Чітко розкрито ключові передумови видання Біблії в складних умовах католицької експансії."
      points: 5
    - criteria: "Аналіз первинного джерела"
      description: "Логічно інтерпретовано слова ректора Смотрицького про духовний дар та національну місію."
      points: 5