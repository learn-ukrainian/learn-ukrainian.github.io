- type: reading
  id: "reading-khvylovyi"
  title: "Первинне джерело: Микола Хвильовий"
  source: "Микола Хвильовий, 'Думки проти течії' (1926)"
  instruction: "Прочитайте уривок з памфлету Миколи Хвильового, який став ідейним маніфестом покоління."
  text: |
    Перед нами стоїть таке питання: на яку зі світових літератур взяти курс? В будь-якому випадку не на російську. Від російської літератури, від її стилів українська поезія мусить тікати якомога швидше. Наша орієнтація — на західноєвропейське мистецтво, на його стиль, на його прийоми.
  tasks:
    - "Проаналізуйте, чому Хвильовий закликав орієнтуватися саме на західноєвропейське мистецтво."
    - "Як ви розумієте його гасло 'Геть від Москви'?"

- type: critical-analysis
  title: "Аналіз концепції 'психологічної Європи'"
  source_reading: "reading-khvylovyi"
  instruction: "Спираючись на уривок Хвильового та текст уроку, дайте відповіді на запитання."
  questions:
    - "Що Микола Хвильовий мав на увазі під терміном 'психологічна Європа'?"
    - "Чому українська література, за Хвильовим, мусила відмовитися від російських зразків?"
  model_answers:
    - "Це не географічне поняття, а символ активного світосприйняття, орієнтація на західноєвропейські цінності та інтелектуалізм замість пасивного російського 'страждання'."
    - "Тому що копіювання російських зразків зберігало українську культуру в стані провінційності. Щоб стати повноцінною європейською нацією, треба було виробити власний шлях."

- type: true-false
  title: "Перевірка фактів: Розстріляне відродження"
  instruction: "Визначте, які з наведених тверджень є правильними, а які — хибними."
  items:
    - statement: "Термін 'Розстріляне відродження' придумали самі українські митці у 1920-х роках."
      correct: false
      explanation: "Термін виник значно пізніше в еміграції, його запропонував Єжи Ґедройць у 1958 році."
    - statement: "Політика 'українізації' дозволила державі виявити найбільш активних та талановитих українців."
      correct: true
      explanation: "Так, для тоталітарної влади це була тимчасова поступка і пастка для інтелігенції."
    - statement: "Микола Хвильовий був прихильником орієнтації на російську літературну традицію."
      correct: false
      explanation: "Навпаки, його головним гаслом було 'Геть від Москви! Дайош Європу!'."
    - statement: "Лесь Курбас здійснив радикальну реформу українського театру, вивівши його на європейський рівень."
      correct: true
      explanation: "Він створив театр 'Березіль', де використовував європейські модерні техніки."
    - statement: "Михайло Бойчук повністю відкинув давньоруську традицію та захоплювався європейським кубізмом."
      correct: false
      explanation: "Бойчукізм був синтезом давньоруських фресок, візантійської традиції та модернізму."
    - statement: "Микола Зеров та неокласики проголосили гасло 'Ad fontes!' і перекладали античну літературу."
      correct: true
      explanation: "Вони вважали, що національна культура потребує засвоєння світової класики."
    - statement: "Будинок 'Слово' в Харкові був безпечним прихистком для українських письменників."
      correct: false
      explanation: "Він виявився жорстокою пасткою, де всі квартири прослуховувалися спецслужбами."
    - statement: "Розстріли в урочищі Сандармох відбулися до 20-ї річниці Жовтневої революції."
      correct: true
      explanation: "Це було сплановане масове вбивство з метою 'розвантажити' табори до свята."
    - statement: "Масове знищення української інтелігенції відбувалося одночасно зі штучним Голодомором."
      correct: true
      explanation: "Це були синхронізовані елементи геноциду проти української нації."
    - statement: "Радянська влада звинувачувала репресованих митців виключно у формалізмі."
      correct: false
      explanation: "Головним і найбільш смертельним звинуваченням був 'буржуазний націоналізм'."

- type: comparative-study
  title: "Порівняльний аналіз мистецьких напрямів"
  instruction: "Порівняйте різні підходи до розвитку української культури в 1920-х роках."
  items_to_compare:
    - "Неокласики (Микола Зеров)"
    - "Футуристи (Михайло Семенко)"
  criteria:
    - "Ставлення до класичної спадщини"
    - "Орієнтація у творчості"
    - "Ставлення до минулого"
  prompt: "Проаналізуйте, як по-різному ці дві групи бачили шлях розвитку української літератури, спираючись на критерії."
  model_answer: "Неокласики вважали необхідним спиратися на класичну європейську спадщину та античність (гасло 'До джерел!'). Натомість футуристи закликали відмовитися від класичних канонів (метафоричне 'спалення Кобзаря') і орієнтуватися на індустріальні ритми, динаміку сучасного великого міста та руйнування традиційних форм."

- type: essay-response
  source_reading: "reading-khvylovyi"
  title: "Есе: Причини знищення покоління"
  instruction: "Напишіть розгорнуте аналітичне есе."
  prompt: "Чому радянська влада свідомо знищила покоління українських митців 1920-х років? Проаналізуйте, у чому полягала справжня 'небезпека' Розстріляного відродження для імперії."
  min_words: 200
  model_answer: "Радянська влада знищила українську інтелігенцію, тому що вона створювала високоякісну, модерну і європейськи орієнтовану культуру. Ця культура стала повнокровною і почала складати реальну конкуренцію російській. Незалежна і самодостатня українська нація була прямою екзистенційною загрозою для імперії. Тому ярлик 'буржуазного націоналізму' використовувався для виправдання превентивного удару і культурного геноциду."
  rubric:
    - criteria: "Історичний аналіз"
      description: "Глибоке розуміння концепції 'культурної конкуренції' та мотивів імперії."
      points: 5
    - criteria: "Аргументація"
      description: "Використання прикладів з тексту (долі митців, будинок 'Слово', Сандармох)."
      points: 3
    - criteria: "Деколонізаційний підхід"
      description: "Чітке розмежування радянських міфів та реальних причин репресій."
      points: 2