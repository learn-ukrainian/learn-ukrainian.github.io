  text: "208 \nВідлуння минулого \nКоломацькі чолобитні \nМинулого і цього 1723 року,\
    \ полковник чернігівський Павло \nПолуботок і генеральна старшина били чолом вашій\
    \ імператорській \nвеличності… про обрання гетьмана, але оскільки досі не отримали\
    \ від вашої \nвеличності відповідного указу, то від усього війська малоросійського\
    \ б’ємо чолом і \nпокірно просимо, щоб ваша імператорська величність дозволив\
    \ у війську \nмалоросійському, відповідно до наших давніх прав, вільними голосами\
    \ серед \nмалоросіян обирати гетьма"
  section_title: Сторінка 105
