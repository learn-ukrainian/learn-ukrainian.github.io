    \ \nЗ промови наказного гетьмана Павла Полуботка до російського царя \nПетра І\
    \ у в’язниці (уривок з «Історії Русів») \n«Ми… вкинуті в найтяжче рабство і \n\
    змушені платити данину ганебну й незносну, \nрити лінії та канали і осушувати\
    \ непролазні \nбагнища, угноюючи все те тілами наших \nмерців, що впали цілими\
    \ тисячами од тягот, \nголоду та клімату… "
