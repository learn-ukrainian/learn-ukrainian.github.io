  text: "розділ ІІ. україна в умовах десталінізації\n58\n§ 7. Суспільно-політичне\
    \ життя в уРСР\n1 \nхх З’їЗд кпРС і пОчатОк лібеРаліЗаЦії. Часткова \nвідмова\
    \ керівництва СРСР від методів сталінсько-\nго режиму унаочнювала потребу продовження\
    \ деста-\nлінізації. Важливим кроком на шляху подальшої \nлібералізації радянського\
    \ суспільства став XX з’їзд \nКПРС, що відбувся в  лютому 1956  р. На закритому\
    \ \nзасіданні М. Хрущов виступив із доповіддю «Про \n“культ особи” і  його наслідки».\
    \ У  ній він піддав \nкритиці діяльні"
