  text: "Розділ ІІ. Україна в умовах десталінізації\n60\nнадіслав доповідну записку\
    \ до Москви, де перева-\nжали схожі думки. Щоб пригальмувати процес \nдесталінізації,\
    \ у 1956 р. влада прийняла постанову \n«Про подолання “культу особи” і  його наслідків».\
    \ У  ній наголошували, що «культ особи» був лише \nпроявом рис характеру Й. Сталіна,\
    \ а  не відобра-\nженням вад радянської влади. Компартійне керів-\nництво вочевидь\
    \ не бажало відмовлятися від моде-\nлі тоталітарного режиму. В Україні процес\
    \ десталінізації відбував"
  section_title: Сторінка 62
