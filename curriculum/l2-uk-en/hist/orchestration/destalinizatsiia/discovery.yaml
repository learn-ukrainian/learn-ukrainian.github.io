- score: 0.25
  chunk_id: 11-klas-istoriya-ukr-hlibovska-2024_s0118
  text: "68 \n2. XX з’їзд КПРС. Розгортання десталінізації \nОдним із важливих складових\
    \ елементів «відлиги» стала \nдесталінізація – процес подолання культу особи Йосифа\
    \ Сталіна та \nліквідації режиму, який сформувався в СРСР упродовж 1930-х—\nпочатку\
    \ 1950-х років. Культом особи називають звеличення особи, \nсліпе поклоніння,\
    \ а іноді й обожнювання людини, котра займає \nнайвище становище в політичній\
    \ чи іншій ієрархії, надмірне \nперебільшення заслуг і ролі лідера. Поступовий\
    \ процес ліквідації \nнаслідків сталін"
  section_title: Сторінка 69
  grade: 11
