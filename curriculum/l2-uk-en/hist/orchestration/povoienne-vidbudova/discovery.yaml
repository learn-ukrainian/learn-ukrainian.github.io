  text: "Відбудова — термін, застосований керівництвом СРСР для \nвизначення заходів\
    \ його політики з відновлення зруйнованого \nгосподарства. Військово-промисловий\
    \ комплекс — сукупність підприємств \nта організацій країни, які виготовляють\
    \ озброєння і військову \nтехніку для потреб власних збройних сил та на експорт.\
    \ «Гласність» — політика відкритості в діяльності державних \nустанов і свободи\
    \ інформації за часів «перебудови». Вона \nпередбачала подання населенню ідеологічно\
    \ спрямованої \nінформації про злочини"
