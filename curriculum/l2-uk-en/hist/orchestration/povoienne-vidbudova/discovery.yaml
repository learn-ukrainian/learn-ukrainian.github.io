- score: 0.25
  chunk_id: 11-klas-istoriya-ukr-galimov-2024_s0033
  text: "Також \nбуло залучено частину ресурсів, \nнаграбованих і  вивезених до СРСР\
    \ \nіз  держав Центрально-Східної Європи \n(за оцінками експертів, загалом на\
    \ суму \nприблизно 12  млрд дол.). Крім того, \nдля відбудови використовували\
    \ працю \nвійськовополонених німців, угорців, \nрумунів. Також СРСР активно залучав\
    \ \nвивезених із Німеччини та  інших держав \nЦентрально-Східної Європи інженерно-\n\
    технічних працівників. Загалом ці \nресурси перевищували масштаби \nдопомоги державам\
    \ Європи за «планом \nМаршалла». © ТОВ"
