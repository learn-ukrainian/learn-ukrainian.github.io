    \ відбудова? Фронт відсунувся на захід. В УРСР відновлювали-\nся радянська влада\
    \ та притаманна їй система управ-\nління і  господарства. Загальні збитки, завдані\
    \ еконо-\nміці, у 5 разів перевищували суму, витрачену на нове \nбудівництво в \
    \ 1920—1941  рр. Важким залишалося \nстановище сільського господарства, яке в 1945 р.\
    \ дало \nлише третину довоєнного р"
