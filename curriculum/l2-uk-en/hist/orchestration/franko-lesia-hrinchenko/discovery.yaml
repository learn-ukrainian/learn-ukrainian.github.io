    \ серпня 1856  року в  селі  Нагуєвичі \nна Львівщині. Його батько був ковалем,\
    \ мати походила зі збіднілого шляхет-\nського роду. Від батька успадкував любов\
    \ до праці та життєвий оптимізм. «На \nдні моїх спогадів, — зізнавався письменник, —\
