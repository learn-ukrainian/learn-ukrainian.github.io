  text: "Проте не можна заперечувати й того, що окремі ін-\nдивідуальності — письменники,\
    \ журналісти, мовознавці — мо-\nжуть надати літературній мові виразнішого характеру\
    \ в пев-\nному напрямі. Якщо в цьому сенсі і з цими застереженнями \nспитати,\
    \ хто, які індивідуальності особливо вирішально позна-\nчили своєю діяльністю\
    \ дальший розвиток української літера-\nтурної мови, то не буде перебільшенням\
    \ назвати троє прізвищ: \nТарас Шевченко, Борис Грінченко, Олекса Синявський.\
    \ Шев-\nченко заклав перші загальнонаціона"
