    \ влітку під м.\r\nБерестечком на Волині, де козацькі полки зустріли добре зорганізовану\
    \ й\r\nдисципліновану польську армію, в якій чималу ролю відігравали німецькі\
    \ реґулярні\r\nполки (силою до 20 000), набрані з старих ветеранів тридцятилітньої\
    \ війни. Укр.\r\nвійсько зазнало поразки й відійшло до Білої Церкви. Тим часом\
    \ втрачений був\r\nКиїв, який"
