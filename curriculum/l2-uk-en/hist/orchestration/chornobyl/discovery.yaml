  text: "212 \nЗ інформаційних матеріалів до річниці аварії на Чорнобиль-\nській АЕС\
    \ Українського інституту національної пам’яті: \n«Перші аварії на ЧАЕС сталися\
    \ ще в 1978—1979 роках, \nвідразу після запуску першого енергоблока. Були також\
    \ \nвитоки радіації в 1982, 1983, 1984 роках. В архіві Комітету держав-\nної безпеки\
    \ (КДБ) містяться документи про спорудження Чорно-\nбильської атомної електростанції,\
    \ її запуск у кінці 1970-х років, \nаварію та ліквідацію її наслідків. …від самого\
    \ початку спорудження \nцієї ато"
