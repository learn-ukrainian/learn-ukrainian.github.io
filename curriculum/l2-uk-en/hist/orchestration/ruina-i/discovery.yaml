  text: "Внутрішня війна, яку провокувала Московія, знесилювала державу. У середовищі\
    \ старшини, яка останніми роками близько пізнала політич­\nні звичаї московитів,\
    \ посилилися антиросійські настрої. Адже це були \nлюди, які мали інше бачення\
    \ держави й політики. Тому І. Виговський \nпродовжив курс Б. Хмельницького, який\
    \ він посилював наприкінці сво­\nго життя, на зближення Гетьманщини з Річчю Посполитою.\
    \ КОЗАЦЬКА УКРАЇНА наприкінці 50-х років XVII —\nна початку XVIII ст. РОЗДІЛ 4"
  section_title: Сторінка 147
  grade: 8
  author: schupak
