  text: "На час обрання гетьманом І. Виговський був досвідче-\nним державним діячем,\
    \ однак у  внутрішній політиці при-\nпустився досить серйозних помилок. По-перше,\
    \ гетьман \nпідтримував козацьку старшину й  шляхту, при цьому за-\nлишаючи поза\
    \ увагою інтереси основної маси козаків, ­селян \n\x84\n\x84 Чому значна частина\
    \ населення \nнегативно сприймала політику \nІ. Виговського? Гетьман Іван Виговський.\
    \ Невідомий \nхудожник. XIX ст."
