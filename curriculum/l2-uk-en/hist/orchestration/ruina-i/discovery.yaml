  text: "Виговський потрапив у полон \nдо  татар, був викуплений \nБ. Хмельницьким\
    \ та став його \nписарем і найближчим соратником. І. Виговський створив та очолив\
    \ \nГенеральну канцелярію, брав участь \nу  козацьких битвах, розробляв \nЗборівську\
    \ угоду, Білоцерківський \nдоговір та «Березневі статті». Словник\nГромадянська\
    \ війна  — форма політичної боротьби, \nщо є  збройною сутичкою між соціальними\
