  text: "Розділ IV. Козацька Україна наприкінці 50‑х рр. XVII — на початку XVIII ст.\
    \ 150\nІ. Виговський продовжував зовнішньополі-\nтичний курс Б. Хмельницького.\
    \ Він намагався \nзберегти союзницькі відносини зі Швецією, \nТрансільванією,\
    \ Кримським ханатом та Москов-\nською державою. Однак І. Виговський орієнтувався\
    \ на по-\nтреби козацької старшини й шляхти, залиша-\nючи поза увагою інтереси\
    \ козаків, селян та \nміщан. Прорахунки гетьмана спричинили ко-\nзацькі заворушення.\
    \ Козаків очолили кошовий \nотаман запорожці"
