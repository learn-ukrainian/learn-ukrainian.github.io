    \ признати, що доводи його не йдуть далї деяких \r\n правдоподібностей. В XIII\
    \ в. у всякім разї й Спіш і Сандеччина до Руси не \r\n належали, як показують\
    \ численні польські й угорські документи: Спиш належ"
