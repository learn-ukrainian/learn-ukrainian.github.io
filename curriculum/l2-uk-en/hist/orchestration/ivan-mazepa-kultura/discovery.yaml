- score: 0.20000000298023224
  chunk_id: 8-klas-istoria-ukr-hlibovska-2025_s0069
  text: "Учні Могилянки отримували \nрівень знань, подібний тому, що давали європейські\
    \ університети. Києво-Могилянський колегіум був усестановим навчальним закладом,\
    \ \nв якому могли здобувати освіту як діти містян чи козаків, так і \nшляхтичів,\
    \ а також триступеневим: коли учень проходив усі 12 років \nнавчання, то отримував\
    \ початкову, середню і вищу освіту. Основу \nнавчання складали «сім вільних наук»,\
    \ а в класах вищої школи – \nще філософія та богослов’я. У курсах філософії, окрім\
    \ філософських і \nбогословсь"
  section_title: Сторінка 26
