  chunk_id: 8-klas-istoria-ukr-schupak-2025_s0308
  text: "УКРАЇНСЬКІ ЗЕМЛІ у 20-90-х роках XVIII ст. \nРОЗДІЛ 5\nЦі заклади готували\
    \ священнослужителів, учителів або державних \nслужбовців. Колегіуми давали добру\
    \ освіту.\nЄзуїтські колегіуми діяли у Львові, Вінниці, Луцьку, Острозі.\nВищу\
    \ освіту можна було здобути у Львівському університеті та \nКиєво-Могилянській\
    \ академії Львівський університет (1661 р.) — центр \nнауки і культури на західноукраїнських\
    \ землях. Він мав богословський \nі філософський факультети, свою бібліотеку,\
    \ друкарню.\nЄдиним осередком вищої"
  section_title: Сторінка 229
  grade: 8
  author: schupak
  page: ''
  trust_tier: 1
- score: 0.3333333432674408
  chunk_id: 8-klas-istoriya-ukr-gisem-2021_s0251
  text: "Він \nздобув освіту в  Києво-Могилянській колегії та Варшавському єзуїтському\
    \ \nколегіумі, вивчав артилерійську справу у  Франції, Німеччині, Нідерландах\
    \ \nта Італії. Крім української, І. Мазепа вільно володів російською, польською,\
    \ \nіталійською, німецькою, французькою, ­кримськотатарською мовами та ла­\nтиною.\
    \ І. Мазепа служив при дворі польського короля Яна ІІ Казимира, виконую­\nчи важливі\
    \ дипломатичні доручення. Згодом він опинився в  оточенні геть­\nманів П. Дорошенка\
    \ та І. Самойловича. Відвідуюч"
  section_title: Сторінка 129
  grade: 8
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.25
  chunk_id: 8-klas-istoria-ukr-schupak-2025_s0199
  text: "• Києво-Могилянська академія визнавалася вищим навчальним закладом \nна рівні\
    \ з іншими польськими університетами. • Митрополит і четверо єпископів отримували\
    \ місця в сенаті триєдиної дер­\nжави. • Відкриття ще одного вищого православного\
    \ навчального закладу, шкіл і \nдрукарень. • Шляхті надавався дозвіл повернутися\
    \ до своїх колишніх володінь в Україні. ' \n'\nГАДЯЦЬКАУГОДА 1658 р.: основні\
