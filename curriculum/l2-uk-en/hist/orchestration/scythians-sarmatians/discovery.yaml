  text: "195\nОсновою суспільного устрою сарматів була родова община, \nутворена групою\
    \ споріднених сімей. Жили сармати табором, \nу наметах, які взимку утеплювали.\
    \ Це був народ кочовий — \nзалишалися на одному місці доти, допоки худоба не з’їдала\
    \ \nтраву. Ховаючи померлих, вони клали поруч із ними речі, \nякими ті користувалися\
    \ за життя: чоловікам — зброю, кубки \nз вином; жінкам — прикраси, дзеркальця,\
    \ голки.\nСармати уміли добувати й обробляти метали, досить ак-\nтивно торгували\
    \ шкірами, виробами ремісників. А"
