  text: "194\n42\nСармати на території України\nПоміркуйте, чим була зумовлена войовничість\
    \ кіммерійців і скіфів. \nЧи пов’язаний з нею кочовий спосіб життя цих народів?\n\
    Сарматські \nплемена \nжили \nна \nтериторії \nУкраїни \nз ІІІ ст. до н. е. до\
    \ ІІІ ст. н. е. Прийшли вони з південно-ураль-\nських степів, облаштувалися на\
    \ північному сході від скіфів. \nСармати вважаються спорідненим зі скіфами народом:\
    \ «сав-\nромати розмовляють скіфською мовою, але з давніх часів пе-\nрекрученою»\
    \ (Геродот).\nАнтичні автори завжди під"
