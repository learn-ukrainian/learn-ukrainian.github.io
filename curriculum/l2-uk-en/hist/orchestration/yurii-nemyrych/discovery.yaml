    \ \nкнязівство \nРуське\nВелике  \nкнязівство Литовське\n  Постать в  історії\n\
    Юрій Немирич народився в 1612 р. на Житомирщині в  родині бояр. По-\nчаткову освіту\
    \ за бажанням батька він \nздобув у  Раківській социніанській \nакадемії в Польщі,\
