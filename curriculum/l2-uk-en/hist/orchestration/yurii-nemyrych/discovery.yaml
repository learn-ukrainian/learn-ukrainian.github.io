  text: "КОЗАЦЬКА УКРАЇНА наприкінці 50-х років XVII\nРОЗДІЛ 4  \nна початку XVIII\
    \ ст. Свідчать документи\nІз промови комісара Речі Посполитої \nСтаніслава-Казимира\
    \ Беневського \nна козацькій раді під Гадячем (16 вересня 1668)\nВітчизна озивається\
    \ до вас: «Я вас породила, не москалі, я вас вигодува­\nла, викохала, уславила.\
    \ Схаменіться, будьте рідними дітьми, не виродками». Із промови державного і військового\
    \ діяча України і Речі Посполитої,\nгенерала, полковника війська Запорозького,\
    \ канцлера Великого \nкнязівст"
