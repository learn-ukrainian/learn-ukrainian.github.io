- term: кочівник
  translation: nomad
  definition: Людина, яка не має постійного житла і пересувається з місця на місце зі своєю худобою.
  usage: Скіфи були кочівниками, що жили в степу.

- term: пектораль
  translation: pectoral
  definition: Нагрудна прикраса, яку носили царі або вожді, часто виготовлена із золота.
  usage: Золота пектораль — найвідоміша знахідка скіфського мистецтва.

- term: курган
  translation: burial mound
  definition: Високий земляний насип над давнім похованням.
  usage: Степ усіяний скіфськими курганами, де ховали царів.

- term: скіф
  translation: Scythian
  definition: Представник давнього іранського народу, що жив у Північному Причорномор'ї.
  usage: Скіфи були непереможними вершниками і лучниками.

- term: сармат
  translation: Sarmatian
  definition: Представник кочового народу, що витіснив скіфів у III ст. до н.е.
  usage: Сармати принесли в степ важку панцирну кінноту.

- term: катафрактарій
  translation: cataphract
  definition: Важкоозброєний вершник у захисному обладунку.
  usage: Атака сарматських катафрактаріїв пробивала будь-який стрій.

- term: амазонка
  translation: Amazon
  definition: Жінка-воїн у давньогрецькій міфології, прообразом якої стали сарматки.
  usage: Греки називали сарматських жінок-воїнів амазонками.

- term: звіриний стиль
  translation: animal style
  definition: Художній стиль, для якого характерні зображення тварин і сцен боротьби.
  usage: Скіфське золото виконане у знаменитому звіриному стилі.

- term: випалена земля
  translation: scorched earth
  definition: Військова тактика знищення ресурсів, щоб ворог не міг ними скористатися.
  usage: Скіфи застосували тактику випаленої землі проти персів.

- term: побратимство
  translation: blood brotherhood
  definition: Урочиста клятва вірності між двома чоловіками, скріплена ритуалом.
  usage: Побратимство вважалося у скіфів святішим за кровну спорідненість.
