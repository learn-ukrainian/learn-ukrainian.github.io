items:
  - lemma: "окупація"
    translation: "occupation"
    pos: "noun"
    gender: "f"
    notes: "collocations: радянська окупація, режим окупації"
  - lemma: "геноцид"
    translation: "genocide"
    pos: "noun"
    gender: "m"
    notes: "usage: визнання Голодомору геноцидом; crime against humanity"
  - lemma: "розкуркулення"
    translation: "dekulakization"
    pos: "noun"
    gender: "n"
    notes: "context: знищення господара, масовий репресивний захід"
  - lemma: "колективізація"
    translation: "collectivization"
    pos: "noun"
    gender: "f"
    notes: "collocations: примусова колективізація, суцільна колективізація"
  - lemma: "чорна дошка"
    translation: "black board"
    pos: "noun"
    notes: "context: режим чорних дощок; death sentence for an entire village"
  - lemma: "саботаж"
    translation: "sabotage"
    pos: "noun"
    gender: "m"
    notes: "Soviet propaganda term used to label peasant resistance"
  - lemma: "тоталітаризм"
    translation: "totalitarianism"
    pos: "noun"
    gender: "m"
    notes: "context: сталінський тоталітаризм, абсолютний контроль над суспільством"
  - lemma: "хлібозаготівля"
    translation: "grain procurement"
    pos: "noun"
    gender: "f"
    notes: "official term covering the confiscation of grain with unrealistic quotas"
  - lemma: "продрозкладка"
    translation: "food apportionment (prodrazverstka)"
    pos: "noun"
    gender: "f"
    notes: "historical antecedent to 1930s policies, forced food collection"
  - lemma: "куркуль"
    translation: "kulak / fist"
    pos: "noun"
    gender: "m"
    notes: "political label for independent farmers, not an actual economic status"
  - lemma: "Закон про п'ять колосків"
    translation: "Law of Five Ears"
    pos: "noun"
    notes: "decree of 7.08.1932, mandating the death penalty for food theft"
  - lemma: "натуральні штрафи"
    translation: "fines in kind"
    pos: "noun"
    notes: "confiscation of meat, potatoes, and beans when grain was missing"
  - lemma: "червона мітла"
    translation: "red broom"
    pos: "noun"
    notes: "search brigades using metal probes to find hidden food"
  - lemma: "житниця"
    translation: "breadbasket"
    pos: "noun"
    gender: "f"
    notes: "Ukraine was seen as the main agricultural resource base of the empire"
  - lemma: "індустріалізація"
    translation: "industrialization"
    pos: "noun"
    gender: "f"
    notes: "funded by exporting confiscated Ukrainian grain"
  - lemma: "опір"
    translation: "resistance"
    pos: "noun"
    gender: "m"
    notes: "synonym for спротив; peasant resistance to Soviet policies"
  - lemma: "реманент"
    translation: "agricultural implement / equipment"
    pos: "noun"
    gender: "m"
    notes: "tools confiscated during collectivization"
  - lemma: "дегуманізація"
    translation: "dehumanization"
    pos: "noun"
    gender: "f"
    notes: "linguistic tactic to justify the murder of 'class enemies'"
  - lemma: "саботажник"
    translation: "saboteur"
    pos: "noun"
    gender: "m"
    notes: "label applied to anyone who refused to surrender their food"
  - lemma: "вирок"
    translation: "sentence / verdict"
    pos: "noun"
    gender: "m"
    notes: "a formal judgment, often leading to death or exile"
  - lemma: "амністія"
    translation: "amnesty"
    pos: "noun"
    gender: "f"
    notes: "explicitly forbidden under the Law of Five Ears"
  - lemma: "блокада"
    translation: "blockade"
    pos: "noun"
    gender: "f"
    notes: "total isolation of villages on the 'black boards'"
  - lemma: "гетто"
    translation: "ghetto"
    pos: "noun"
    gender: "n"
    notes: "describes the isolated zone created by blocking borders"
  - lemma: "очевидець"
    translation: "eyewitness"
    pos: "noun"
    gender: "m"
    notes: "survivors who left diaries and testimonies (ego-documents)"
  - lemma: "русифікація"
    translation: "russification"
    pos: "noun"
    gender: "f"
    notes: "resettlement of Russians into emptied Ukrainian villages"