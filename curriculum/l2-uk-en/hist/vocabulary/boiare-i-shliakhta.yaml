items:
  - lemma: "шляхта"
    translation: "nobility"
    pos: "noun"
    gender: "f"
    notes: "Ключовий соціальний стан у Речі Посполитій."
    example: "Українська шляхта ревно оберігала свої права."
  - lemma: "боярин"
    translation: "boyar"
    pos: "noun"
    gender: "m"
    notes: "Історичний попередник шляхтича, власник вотчини."
    example: "Галицькі бояри мали значний політичний вплив."
  - lemma: "привілей"
    translation: "privilege"
    pos: "noun"
    gender: "m"
    notes: "Юридичний документ, що гарантував права стану."
    example: "Король видав новий привілей для землевласників."
  - lemma: "сейм"
    translation: "diet / parliament"
    pos: "noun"
    gender: "m"
    notes: "Орган станового представництва."
    example: "Делегати прибули на вальний сейм до столиці."
  - lemma: "статут"
    translation: "statute"
    pos: "noun"
    gender: "m"
    notes: "Писаний збірник законів, наприклад Литовський Статут."
    example: "Суддя виніс рішення згідно зі статтями статуту."
  - lemma: "вольність"
    translation: "liberty"
    pos: "noun"
    gender: "f"
    notes: "Політична свобода, ключова цінність шляхти."
    example: "Золота вольність гарантувала незалежність еліти."
  - lemma: "магнат"
    translation: "magnate"
    pos: "noun"
    gender: "m"
    notes: "Надзвичайно багатий і могутній аристократ."
    example: "Впливовий магнат утримував власну армію."
  - lemma: "фільварок"
    translation: "manor farm"
    pos: "noun"
    gender: "m"
    notes: "Велике товарне господарство, орієнтоване на експорт."
    example: "Праця селян на фільварку приносила великі прибутки."
  - lemma: "олігархія"
    translation: "oligarchy"
    pos: "noun"
    gender: "f"
    notes: "Правління невеликої групи найвпливовіших осіб."
    example: "Боярська олігархія успішно керувала князівством."
  - lemma: "автономія"
    translation: "autonomy"
    pos: "noun"
    gender: "f"
    notes: "Право на самоврядування."
    example: "Українські землі зберегли широку автономію."
  - lemma: "інкорпорація"
    translation: "incorporation"
    pos: "noun"
    gender: "f"
    notes: "Юридичне включення території до складу держави."
    example: "Акт інкорпорації гарантував права місцевої шляхти."
  - lemma: "ієрархія"
    translation: "hierarchy"
    pos: "noun"
    gender: "f"
    notes: "Соціальна структура з чітким підпорядкуванням."
    example: "Суспільство мало складну станову ієрархію."
  - lemma: "аристократія"
    translation: "aristocracy"
    pos: "noun"
    gender: "f"
    notes: "Соціальна еліта, влада найкращих."
    example: "Українська аристократія була частиною європейського простору."
  - lemma: "вотчина"
    translation: "patrimony / hereditary estate"
    pos: "noun"
    gender: "f"
    notes: "Спадкове земельне володіння бояр."
    example: "Боярин передав свою вотчину старшому сину."
  - lemma: "землевласник"
    translation: "landowner"
    pos: "noun"
    gender: "m"
    notes: "Власник значних земельних угідь."
    example: "Заможний землевласник інвестував у будівництво замку."
  - lemma: "рокош"
    translation: "rokosz / legal rebellion"
    pos: "noun"
    gender: "m"
    notes: "Право на легальний збройний опір королю."
    example: "Шляхта пригрозила оголосити рокош через нові податки."
  - lemma: "конфедерація"
    translation: "confederation"
    pos: "noun"
    gender: "f"
    notes: "Тимчасовий збройний політичний союз шляхти."
    example: "Вони створили конфедерацію для захисту своїх прав."
  - lemma: "замок"
    translation: "castle"
    pos: "noun"
    gender: "m"
    notes: "Оборонна і адміністративна споруда магнатів."
    example: "Високі мури замку витримали довгу облогу."
  - lemma: "найманець"
    translation: "mercenary"
    pos: "noun"
    gender: "m"
    notes: "Професійний воїн, що служить за плату."
    example: "Приватна армія складалася з досвідчених найманців."
  - lemma: "дипломатія"
    translation: "diplomacy"
    pos: "noun"
    gender: "f"
    notes: "Ведення міжнародних переговорів."
    example: "Шляхта активно займалася європейською дипломатією."
  - lemma: "агрономія"
    translation: "agronomy"
    pos: "noun"
    gender: "f"
    notes: "Наука про ведення сільського господарства."
    example: "Воїн-підприємець мусив розумітися на агрономії."
  - lemma: "полонізація"
    translation: "Polonization"
    pos: "noun"
    gender: "f"
    notes: "Процес засвоєння польської культури і мови."
    example: "Полонізація еліти була тривалим прагматичним процесом."
  - lemma: "асиміляція"
    translation: "assimilation"
    pos: "noun"
    gender: "f"
    notes: "Злиття з іншою культурою."
    example: "Культурна асиміляція відбувалася через єзуїтські колегіуми."
  - lemma: "ідентичність"
    translation: "identity"
    pos: "noun"
    gender: "f"
    notes: "Усвідомлення своєї належності до певної спільноти."
    example: "Шляхтич зберігав свою руську ідентичність."
  - lemma: "автократія"
    translation: "autocracy"
    pos: "noun"
    gender: "f"
    notes: "Форма правління з необмеженою владою однієї особи."
    example: "Московська автократія була неприйнятною для українців."