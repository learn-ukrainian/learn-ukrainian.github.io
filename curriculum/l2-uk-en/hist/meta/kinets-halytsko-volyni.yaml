slug: kinets-halytsko-volyni
title: Занепад Галицько-Волинської держави
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Криза династії Романовичів: смерть Андрія та Лева ІІ (1323) та кінець прямої
    чоловічої лінії.'
  - '1340 рік як геополітичний вибух: початок 50-річної війни за спадщину.'
  - '[!context] Русь не зникла, а стала полем битви сусідніх держав.'
- section: 'Читання: I — Останні з роду Романовичів'
  words: 900
  points:
  - 'Правління після Данила: спроби балансування між Литвою та Золотою Ордою.'
  - 'Загадкова смерть останніх князів: ймовірна загибель у битві з ординцями.'
  - Вакуум влади та загроза поглинання сусідніми монархіями.
- section: 'Читання: II — Юрій ІІ Болеслав: Князь-західник'
  words: 1000
  points:
  - Юрій ІІ (Болеслав Тройденович) — син мазовецького князя, компромісна фігура на
    престолі.
  - 'Курс на вестернізацію: підтримка міст (Магдебурзьке право Сяноку 1339 р.), залучення
    німецьких колоністів.'
  - Конфлікт з консервативним боярством через західний стиль життя та підозри у католицьких
    симпатіях.
  - '[!history-bite] Князь у західному одязі: культурний шок для традиційного суспільства.'
- section: 'Читання: III — Трагедія 1340 року та війна за спадщину'
  words: 1100
  points:
  - 'Змова та отруєння Юрія ІІ у Володимирі (7 квітня 1340 р.): роль боярської опозиції.'
  - 'Миттєва реакція сусідів: напад Казимира ІІІ на Львів, пограбування княжої скарбниці
    та інсигній.'
  - 'Вишеградська угода 1339 року: попередні домовленості Польщі та Угорщини про поділ
    руських земель.'
  - 'Дмитро Дедько та боярська олігархія: спроба зберегти незалежність під формальним
    сюзеренітетом Любарта.'
- section: Первинні джерела
  words: 600
  points:
  - 'Мовчання руських літописів: хроніка подій обривається 1292 роком.'
  - 'Історія очима ворогів: свідчення Яна Длугоша та Янка з Чарнкова про загарбання
    Русі.'
  - '[!source] Аналіз печатки Юрія ІІ: латинський напис «Dux Russiae» як свідчення
    європейської орієнтації.'
- section: Деколонізаційний погляд
  words: 600
  points:
  - '[!myth-buster] Спростування міфу про «мирне успадкування»: збройна агресія проти
    суверенної держави.'
  - 'Трансформація статусу: від королівства (Regnum Russiae) до провінції (Ruś Czerwona).'
  - 'Опір русинів: повстання та дипломатичні маневри Дмитра Дедька.'
- section: Підсумок — Уроки державності
  words: 400
  points:
  - '[!reflection] Внутрішні чвари еліти як запрошення для зовнішньої агресії.'
  - 'Геополітична пастка: неможливість встояти без сильної центральної влади між католицьким
    Заходом та Ордою.'
- section: Потрібно більше практики?
  words: 100
  points:
  - Додаткові ресурси для вивчення епохи.
