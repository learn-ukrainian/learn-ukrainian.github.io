slug: kozatska-derzhava
title: 'Хмельниччина: Козацька держава'
word_target: 5000
content_outline:
- section: 'Вступ: Народилася Гетьманщина'
  words: 500
  points:
  - Трансформація повстання 1648 року у повноцінний державотворчий процес
  - 'Еволюція поглядів Хмельницького: від «козацьких вольностей» до «держави руського
    народу»'
  - Переяславська промова 1649 року як маніфест суверенітету («Виб'ю з лядської неволі
    руський нарід увесь!»)
- section: 'Структура влади: Гетьман та Генеральна старшина'
  words: 800
  points:
  - 'Гетьман як голова держави: поєднання військової, адміністративної та судової
    влади'
  - 'Генеральна старшина як Уряд: розподіл повноважень (прообраз міністерств)'
  - Роль Генерального писаря (Іван Виговський) як керівника зовнішньої політики та
    канцелярії
  - Функції Генерального обозного (логістика), судді (правосуддя) та підскарбія (фінанси)
- section: 'Адміністративний устрій: Полково-сотенна система'
  words: 700
  points:
  - Ліквідація воєводств та запровадження військово-адміністративного поділу
  - 'Полк і сотня як територіальні одиниці: злиття цивільної та військової влади'
  - 'Вертикаль влади: Гетьман -> Полковник -> Сотник -> Отаман'
  - Мобілізаційна гнучкість системи та самоврядування на місцях
- section: 'Чигирин: Серце козацької держави'
  words: 600
  points:
  - Чигирин як політична столиця та дипломатичний центр Східної Європи
  - 'Прийом іноземних посольств: Венеція, Москва, Туреччина, Швеція'
  - Опис міста очима сучасників (дерев'яна архітектура vs політична вага)
  - Скарбниця та архів у Чигирині як атрибути державності
- section: 'Економіка та право: Скарбниця та суди'
  words: 700
  points:
  - 'Формування незалежної фінансової системи: податки до Військового скарбу'
  - 'Джерела наповнення бюджету: мита, оренда шинків, податки з млинів'
  - 'Правова система: симбіоз звичаєвого козацького права та Литовського статуту'
  - Гетьманські універсали як джерело права та інструмент регулювання відносин
- section: 'Читання: Універсали Богдана Хмельницького'
  words: 600
  points:
  - Аналіз тексту Універсалу 1650 року про захист прав міщан і купців
  - Особливості канцелярської руської мови XVII століття
  - Демонстрація державного підходу до захисту економічних інтересів
- section: 'Первинні джерела: Альберто Віміна про козаків'
  words: 600
  points:
  - Аналіз праці «Реляція про походження і звичаї козаків» (1650)
  - Погляд європейця на козацьку освіченість, любов до свободи та побут
  - Свідчення про дипломатичний хист козацької еліти
- section: 'Деколонізаційний погляд: Державність проти анархії'
  words: 500
  points:
  - Спростування імперського міфу про Гетьманщину як період «хаосу» та «анархії»
  - 'Докази зрілості держави: чітка ієрархія, податкова система, міжнародне визнання'
  - Інтерпретація подій 1654 року як військового союзу рівних, а не «возз'єднання»
  - Козацька еліта як носій державної ідеї, а не «бунтівна чернь»
