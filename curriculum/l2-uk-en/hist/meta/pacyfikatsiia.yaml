slug: pacyfikatsiia
title: 'Пацифікація: Поляки в Галичині'
word_target: 5000
content_outline:
- section: 'Вступ: «Мирне» насильство'
  words: 400
  points:
  - 'Парадокс назви: «пацифікація» (від лат. pacificatio — умиротворення) як цинічний
    евфемізм для каральної експедиції'
  - 'Хронологія та ініціатори: особистий наказ Юзефа Пілсудського, виконання Славоя-Складковського
    (16 вересня — 30 листопада 1930)'
  - 'Географія терору: охоплення трьох воєводств (Львівське, Станіславівське, Тернопільське)'
- section: 'Причини та контекст: I — Українці в Другій Речі Посполитій'
  words: 600
  points:
  - 'Статус українців: найбільша національна меншина (5 млн), порушення міжнародних
    зобов''язань 1923 року про автономію'
  - 'Системна дискримінація: полонізація освіти (Lex Grabski 1924) та осадництво як
    інструменти асиміляції'
- section: 'Причини та контекст: II — Саботажна акція ОУН'
  words: 600
  points:
  - 'Тактика «перманентної революції»: саботажна акція ОУН влітку-восени 1930 року
    (підпали маєтків, пошкодження зв''язку)'
  - 'Реакція влади: використання саботажу як приводу для застосування принципу колективної
    відповідальності перед «виборами Берестейськими»'
- section: 'Хід пацифікації: I — Військова операція та насильство'
  words: 700
  points:
  - 'Методика каральної акції: введення підрозділів поліції та кавалерії, оточення
    сіл'
  - 'Тілесні покарання: публічні масові побиття (25-50 ударів), примус до лояльності
    («Haj żyje marszałek Piłsudski!»)'
- section: 'Хід пацифікації: II — Культурний та економічний погром'
  words: 700
  points:
  - 'Матеріальне нищення: руйнування дахів і підлог під приводом «ревізії», псування
    продуктів (гас у борошно і цукор)'
  - 'Війна з інституціями: ліквідація читалень «Просвіти», кооперативів та спортклубів;
    вандалізм щодо портретів Шевченка'
  - 'Масштаби репресій: статистика постраждалих (450+ сіл, 1739 арештів, до 35 вбитих)'
- section: 'Первинні джерела: I — Голоси жертв'
  words: 500
  points:
  - 'Мовний шовінізм: свідчення Зофії Микитів про приниження за українську мову'
  - 'Пам''ять про страх: спогади Ольги Мадзьопи про беззахисність перед державним
    насиллям'
- section: 'Первинні джерела: II — Офіційна реакція та світ'
  words: 500
  points:
  - 'Позиція влади: офіційні звіти про «вилучення зброї» та боротьбу з бандитизмом'
  - 'Міжнародний резонанс: розслідування «Комітету трьох» Ліги Націй, публікація «Чорної
    книги» та статті у Manchester Guardian'
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Зміна оптики: від польського міфу про «наведення порядку» до української реальності
    державного терору'
  - 'Колоніальні паралелі: схожість методів пацифікації з практиками Британії та Франції
    в колоніях'
  - 'Зворотний ефект: радикалізація молоді та зростання популярності ОУН як відповідь
    на насильство'
- section: 'Підсумок: Наслідки'
  words: 400
  points:
  - 'Точка неповернення: остаточний розкол між поляками та українцями, неможливість
    діалогу'
  - 'Історична тяглість: пацифікація 1930 року як передвісник кривавих подій Волині
    1940-х'
  - 'Урок для сучасності: визнання травми як необхідна умова примирення'
