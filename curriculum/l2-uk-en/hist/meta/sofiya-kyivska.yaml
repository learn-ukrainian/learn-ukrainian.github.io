id: sofiya-kyivska
version: "2.0"
slug: sofiya-kyivska
title: Софія Київська та культурний розквіт
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Символ мудрості та могутності — «Діамант у короні» Ярослава; місце коронацій,
    судів та поховань еліти
  - Державний статус — не просто церква, а «головний офіс» Русі-України
  - 'Engagement hook: [!history-bite] — Софія як адміністративний центр'
- section: 'Архітектура собору: Візантійський канон та київська сміливість'
  words: 800
  points:
  - 'Історичне тло: Майстри та замисел — грецькі архітектори з Константинополя та
    місцеві учні; дискусія про дату заснування (1011 vs 1037)'
  - Конструктивні особливості — 13 куполів (Христос і 12 апостолів) та пірамідальна
    композиція
  - 'Деколонізаційний аспект: унікальний київський стиль, відсутній у тогочасній Росії
    (Заліссі)'
  - 'Техніка мурування: Opus Mixtum — «смугаста» кладка з каменю та плінфи на рожевому
    розчині (цем''янці)'
  - 'Engagement hook: [!context] — про техніку opus mixtum'
- section: 'Мозаїки та фрески: Біблія у кольорі'
  words: 800
  points:
  - Світлоносна Мозаїка — смальта (177 відтінків), мерехтіння світла
  - Оранта «Нерушима стіна» — легенда про стійкість Києва та її символічне значення
  - 'Живописні Фрески — унікальні світські сюжети на стінах храму: полювання на вепра,
    скоморохи, іподром Константинополя (сходи на хори)'
- section: 'Графіті Софії: Голоси киян XI-XIII століть'
  words: 600
  points:
  - 'Про що писали кияни? — «Середньовічний Facebook»: скарги, молитви, прокляття,
    любовні зізнання та політичні новини'
  - 'Engagement hook: [!culture] — приклади написів'
  - 'Мовний аспект — жива староукраїнська мова (риси: «Володимир», «Олекса», «помагай»),
    відмінна від церковнослов''янської книжної'
- section: 'Культурний розквіт: "Афіни Сходу"'
  words: 500
  points:
  - Скрипторій та Бібліотека — перша на Русі, місце перекладу книг з грецької
  - Літературна школа — освіта для дітей знаті (і дівчат); Анна Ярославна
- section: Читання
  words: 400
  points:
  - Інтелектуальний центр Русі — Іларіон Київський та його «Слово про Закон і Благодать»
  - 'Маніфест політичної суверенності від Візантії: «не в худій бо землі нашій...»'
- section: Первинні джерела
  words: 400
  points:
  - 'Документ 1: «Повість минулих літ» про заснування Софії (1037 р.) — цитата про
    «писців многих» та переклади книг'
  - 'Документ 2: Графіті про смерть Ярослава Мудрого (1054 р.) — точна дата смерті'
  - Титулування князя «царем» (рівним імператору) у графіті
  - 'Engagement hook: [!source] — текст графіті'
- section: Таємниця саркофага Ярослава Мудрого
  words: 500
  points:
  - Історія відкриттів — 6-тонний мармуровий саркофаг
  - Зникнення кісток Ярослава — версія про вивезення до США (церква Трійці, Нью-Йорк)
  - Сучасні дослідження (2009) — виявлення лише жіночого скелета (Інгегерда?) та радянської
    газети
  - 'Engagement hook: [!mystery] — де кістки князя?'
- section: 'Дзвіниця: Голос Києва'
  words: 400
  points:
  - 'Історична доля: Від занепаду (XIII-XVII ст.) до відродження'
  - Роль гетьмана Івана Мазепи у відбудові — головний меценат, дзвін «Мазепа»
  - Стиль козацького бароко (бірюзово-білий) як символ національного відродження
  - 'Engagement hook: [!myth-buster] — дзвіниця не часів Русі, а часів Гетьманщини'
- section: Деколонізаційний погляд
  words: 500
  points:
  - Міфи та реальність — спростування імперського міфу про «спільну колиску»
  - Софія як доказ європейської суб'єктності Києва та культурної окремішності від
    Москви
  - Сучасна Україна — повернення справжніх титулів (каган, цар) замість нав'язаних
    пізніше «князів»
  - 'Engagement hook: [!decolonization] — про термінологію та привласнення спадщини'
- section: Потрібно більше практики?
  words: 200
  points:
  - Інтеграція знань — порівняння мозаїк Софії та Равенни
  - Реальне застосування — віртуальний тур заповідником
  - Онлайн-ресурси — сайт «Софія Київська» та база графіті
