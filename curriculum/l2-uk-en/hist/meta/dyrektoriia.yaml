  words: 500
  points:
  - 'Провал переговорів з більшовиками: Москва використала час для підготовки наступу'
  - 'Відставка Винниченка (лютий 1919): крах ілюзій про «мирне співіснування» з червоною
    Росією'
  - Перехід фактичної влади до Симона Петлюри як Головного Отамана в умовах тотальної
    війни
- section: 'Боротьба на кілька фронтів: I — Війна з більшовиками та Акт Злуки'
  words: 600
  points:
  - 'Гібридна агресія: тактика «їхтамнєт» та офіційне оголошення війни Директорією
