  - Втрата Києва (лютий 1919) та переїзд уряду до Вінниці
- section: 'Боротьба на кілька фронтів: II — Київська катастрофа'
  words: 600
  points:
  - 'Серпень 1919: успішний наступ українських армій та звільнення Києва'
