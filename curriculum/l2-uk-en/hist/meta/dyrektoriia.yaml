slug: dyrektoriia
title: Директорія УНР
word_target: 5000
content_outline:
- section: 'Вступ: Падіння Гетьманату'
  words: 500
  points:
  - 'Контекст листопада 1918: завершення Першої світової війни, вихід німців та втрата
