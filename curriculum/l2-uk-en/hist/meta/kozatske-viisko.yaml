slug: kozatske-viisko
title: Козацьке військо та озброєння
word_target: 5000
content_outline:
- section: 'Вступ: Феномен козацького війська'
  words: 500
  points:
  - 'Концепція «лицарського люду»: козацтво як окремий соціальний стан і професійна
    військова корпорація'
  - 'Міжнародна репутація: участь у Тридцятилітній війні, найманці від Дюнкерка до
    Персії'
  - Реєстрові реформи 1572 (Сигізмунд II Август) та 1578 (Стефан Баторій) років як
    початок легітимізації
- section: 'Структура та Ієрархія: Від коша до полку'
  words: 800
  points:
  - 'Генеральна старшина як уряд: функції обозного (логістика), судді, писаря (розвідка),
    осавулів та хорунжого'
  - 'Полково-сотенний устрій: ототожнення адміністративного та військового поділу
    («держава як військовий табір»)'
  - 'Жорстка дисципліна під час походів: заборона алкоголю, смертна кара за непослух'
- section: 'Озброєння: Шабля, самопал та гармата'
  words: 800
  points:
  - 'Пріоритет вогнепальної зброї: масове використання самопалів і мушкетів, тактика
    залпового вогню у три шеренги'
  - '[!myth-buster] Шабля як зброя останнього шансу або кінноти: розвінчання міфу
    про «виключно холодну зброю»'
  - 'Мобільна артилерія: використання фальконетів на возах, високий статус гармашів'
- section: 'Тактика бою: Козацький табір та розвідка'
  words: 800
  points:
  - '[!decolonization] Козацький табір (Wagenburg) як «рухома фортеця» і прообраз
    бронетанкових з''єднань'
  - 'Спецпризначенці XVII ст.: пластуни, підводна розвідка (очеретина), маскування
    в степу'
  - 'Інженерне мистецтво: облога фортець, підкопи, морські походи на чайках (взяття
    Кафи)'
- section: 'Символіка та Клейноди: Знаки влади'
  words: 600
  points:
  - 'Ієрархія символів: булава (гетьман), пернач (полковник), бунчук (символ влади
    у поході)'
  - 'Сакральне значення хоругви: малиновий стяг з Архангелом Михаїлом, ганьба втрати
    прапора'
  - 'Роль литавр (котлів): управління боєм звуковими сигналами та психологічний тиск'
- section: 'Читання: Опис козацького вишколу'
  words: 400
  points:
  - 'Свідчення Гійома де Боплана: фізична витривалість, невибагливість до їжі, орієнтування
    за зірками'
  - 'Автономність воїна: вміння самостійно виготовляти порох (селітру) та ремонтувати
    зброю'
- section: 'Первинні джерела: Голоси епохи'
  words: 400
  points:
  - 'Дипломатичне листування Богдана Хмельницького: стиль військового лідера європейського
    рівня'
  - Козацькі літописи (Граб'янка, Величко) про військову звитягу та самоідентифікацію
- section: Деколонізаційний погляд
  words: 700
  points:
  - 'Спростування імперського міфу про «розбійників»: Військо Запорозьке як модерна
    регулярна армія'
  - '[!perspective] Концепція «Antemurale Christianitatis» (Форпост християнства)
    у європейській геополітиці'
  - Вплив козацького військового мистецтва на європейські тактики (піхотний стрій,
    легка кавалерія)
