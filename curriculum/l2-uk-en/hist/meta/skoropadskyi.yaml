slug: skoropadskyi
title: 'Павло Скоропадський: Гетьманат'
word_target: 5000
content_outline:
- section: 'Вступ: Консервативна альтернатива'
  words: 600
  points:
  - '29 квітня 1918 року як унікальний день в історії України: проголошення монархічного
    устрою (Гетьманату) у ХХ столітті'
  - 'Особа Павла Скоропадського: бойовий генерал, аристократ, нащадок гетьманського
    роду Скоропадських'
  - Легітимність через історичну традицію, а не революційний популізм; суть «консервативної
    революції» проти соціалістичного хаосу Центральної Ради
- section: Прихід до влади
  words: 800
  points:
  - Криза УНР та втрата контролю над селом; німецький фактор і пошук сили, здатної
    забезпечити порядок (постачання хліба)
  - 'З''їзд хліборобів 29 квітня у цирку Крутікова: «Гетьман із цирку» чи волевиявлення
    власників? Безкровний переворот'
  - 'Проголошення Української Держави: відновлення права приватної власності як фундаменту
    цивілізації (антитеза більшовизму)'
  - 'Відносини з німцями: використання німецької військової сили як «парасольки» для
    розбудови інституцій; Скоропадський як партнер, а не маріонетка (приклад кримського
    питання)'
- section: 'Політика Гетьманату: I — Консервативний курс та земельне питання'
  words: 900
  points:
  - 'Законодавчий марафон: ухвалення близько 400 законів за 7,5 місяців; опора на
    заможне селянство та великих землевласників'
  - Скасування соціалізації землі; конфлікт між селянами та адміністрацією; повернення
    поміщиків
  - 'Кадрова політика: залучення старих фахівців (часто російськомовних/російських
    поглядів) для налагодження роботи міністерств'
  - 'Парадокс русифікації: критика Дмитра Донцова («На Україні будують Росію») та
    конфлікт з національно свідомими українцями'
- section: 'Політика Гетьманату: II — Культурний прорив та падіння'
  words: 900
  points:
  - '«Українізація здорового глузду»: заснування Української академії наук (Вернадський),
    Національної бібліотеки, Державного українського архіву'
  - 'Освітній бум: відкриття двох університетів (Кам''янець-Подільський, Київ), 150
    українських гімназій, Українського театру драми і опери'
  - 'Фатальний листопад: тиск Антанти та Грамота про федерацію з Росією (14 листопада
    1918 року)'
  - Антигетьманське повстання Директорії, перехід військ на бік повсталих та зречення
    влади (грудень 1918)
- section: Первинні джерела
  words: 600
  points:
  - '«Грамота до всього українського народу»: аналіз тексту (акцент на порядку, законності,
    приватній власності)'
  - 'Спогади Павла Скоропадського (писані в еміграції): розчарування «вузьким українством»
    соціалістів'
  - 'Складна ідентичність гетьмана: «Я хотів Україну, не ворожу Великоросії, а братню...»
    — розуміння України як європейської, класово примиреної держави'
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Спростування радянських/імперських міфів: Скоропадський не «німецька маріонетка»
    і не «білогвардієць»'
  - Гетьманат як доказ, що український рух не був монолітно лівим/соціалістичним;
    альтернатива УНР
  - 'Інституційна спадщина: Академія наук та культурні установи, що пережили сам режим'
- section: 'Підсумок: Доля Скоропадського'
  words: 600
  points:
  - Еміграція до Німеччини (Ванзеє) та створення Гетьманського руху (монархісти-державники)
  - 'Життя в еміграції: спроби об''єднати українську діаспору та зберегти ідею Гетьманату'
  - 'Трагічна загибель у квітні 1945 року: смертельне поранення під час бомбардування
    союзників на станції Меттен; символічний кінець епохи'
