slug: ruska-pravda
title: 'Руська Правда: Перший законодавчий кодекс'
word_target: 5000
content_outline:
  - section: Вступ
    words: 300
    points:
      - 'Історичне значення: «Руська Правда» — найважливіша пам''ятка права Київської
        Русі, що збереглася у понад 100 списках.'
      - 'Еволюція права: перехід від племінного звичаєвого права (кровної помсти)
        до державного законодавства (системи штрафів).'
      - 'Контекст появи: укладення перших статей (1016/1019) як договір Ярослава з
        варязькими найманцями для уникнення конфліктів.'
  - section: Правда Ярослава (1016–1036)
    words: 450
    points:
      - 'Історичне тло: [!context] Кодекс виник не від «хорошого життя», а як компроміс
        у жорсткій боротьбі за київський престол.'
      - 'Основні положення: дозвіл кровної помсти, але суворе обмеження кола месників
        (брат за брата, син за батька).'
      - 'Альтернатива помсті: якщо немає кому мстити, винуватець платить штраф 40
        гривень.'
  - section: Правда Ярославичів та соціальна структура
    words: 700
    points:
      - 'Реформа 1072 р. (Вишгород): сини Ярослава остаточно скасовують кровну помсту,
        замінюючи її на штрафи в казну.'
      - 'Соціальна ієрархія через віру: [!history-bite] Життя княжого «огнищанина»
        коштувало 80 гривень, а смерда — 5 гривень (ціна 16 коней).'
      - 'Категорії залежного населення: холопи (повна несвобода, об''єкт власності),
        закупи (боргова кабала з правом викупу), рядовичі.'
      - 'Майнові права: захист меж та знаків власності, штрафи за переорювання межі.'
  - section: Первинні джерела
    words: 400
    points:
      - 'Аналіз тексту: цитата з «Літопису руського» про заміну кровної помсти грошовим
        відшкодуванням.'
      - 'Захист честі: штраф за виривання бороди (12 гривень) був вищим, ніж за відрубаний
        палець (3 гривні), що свідчить про пріоритет гідності.'
      - 'Юридична термінологія: «вервь» (громада), «видок» (свідок-очевидець), «послух»
        (свідок доброї слави).'
  - section: Деколонізаційний погляд
    words: 450
    points:
      - 'Міф про «російське право»: [!myth-buster] Імперська назва «Русская Правда»
        (з двома «с») є крадіжкою; оригінальна назва — «Руська» (від Русь-Україна).'
      - 'Мовні ознаки: [!culture] Текст рясніє протоукраїнськими рисами — повноголосся
        (голова, бородома), закінчення -ові/-еві, кличний відмінок.'
      - 'Гуманність права: відсутність смертної кари та тілесних покарань (на відміну
        від візантійської та московської традицій).'
  - section: 'Читання: Ярослав Мудрий — законодавець'
    words: 450
    points:
      - 'Роль особистості: Ярослав як «Руський Юстиніан», що будував державу через
        утвердження правових норм.'
      - 'Захист торгівлі: надання особливого статусу та захисту «гостю» (купцю), що
        сприяло економічному розвитку.'
      - 'Державотворення: системна заміна племінної помсти на державний суд і віру
        (штраф), що зміцнювало княжу владу.'
  - section: Соціальні ліфти та Економіка
    words: 450
    points:
      - 'Соціальна мобільність: закуп міг виплатити борг і стати вільним; вільний
        міг стати холопом через злочин або банкрутство.'
      - 'Економічне регулювання: «Устав Володимира Мономаха» (1113) обмежив різи (відсотки)
        лихварям після повстання киян.'
      - 'Грошова система: [!fact] Штрафи були величезними: 40–80 гривень — це статок
        цілого села; гривня як срібна вагова одиниця.'
      - 'Роль громади: «вервь» несла колективну відповідальність («дика віра») за
        вбивство, скоєне на її території.'
  - section: Порівняльний аналіз правових систем
    words: 450
    points:
      - 'Європейські паралелі: подібність системи вергельдів (штрафів) до Салічної
        правди (Lex Salica) франків.'
      - 'Візантійський вплив: рецепція норм церковного права, але збереження самобутності
        (відсутність смертної кари).'
      - 'Контраст із Московщиною: [!context] «Божий суд» (ордалії) в Русі був гуманнішим
        за тортури та страти в Московському царстві (Судебник 1497).'
  - section: Жінки, Суд та Мова
    words: 450
    points:
      - 'Правовий статус жінки: високі штрафи за образу жінки («пошибання»), захист
        майнових прав вдів.'
      - 'Судовий процес: змагальність сторін, де позивач сам шукав докази («гоніння
        сліду»).'
      - 'Ордалії: застосування випробувань залізом або водою як доказу у складних
        справах за відсутності свідків.'
  - section: Спадщина та Сучасність
    words: 400
    points:
      - 'Пряма спадкоємність: Литовські Статути (1529, 1566, 1588) перейняли термінологію
        та гуманістичний дух «Руської Правди».'
      - 'Козацьке право: базування судочинства Гетьманщини на звичаєвих нормах Русі-України.'
      - 'Сучасний погляд: [!decolonization] «Руська Правда» свідчить про належність
        України до європейської правової традиції, на відміну від «Домострою».'
  - section: 'Повсякденне правосуддя: Казуси'
    words: 500
    points:
      - 'Казус про борт: штраф 12 гривень за знищення вуликів у деревах підкреслює
        значення меду і воску як стратегічного експорту.'
      - 'Казус про позику: розстрочка боргу, якщо товар втрачено через стихію, але
        рабство, якщо купець пропив чи програв товар.'
      - 'Правосвідомість: пріоритет відшкодування збитків потерпілому над фізичним
        покаранням злочинця.'
