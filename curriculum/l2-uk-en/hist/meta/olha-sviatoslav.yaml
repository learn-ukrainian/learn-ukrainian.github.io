slug: olha-sviatoslav
title: Ольга та Святослав
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Контраст двох правителів: Ольга-дипломат («м''яка сила») та Святослав-воїн («жорстка
    сила»)'
  - 'Тандем, що сформував Русь: адміністратор та експансіоніст'
  - '[!history-bite] Святослав носив «оселедець» (чуб) і виглядав як козак за 500
    років до появи козацтва'
- section: 'Читання: I — Помста та народження держави'
  words: 800
  points:
  - 'Ольга: Помста як Політика — кровна помста як юридичний обов''язок та легітимізація
    влади'
  - '[!context] Деталі трьох помст (посли в ямі, лазня, різанина на тризні) та спалення
    Іскоростеня'
  - 'Реформи: Від хаосу до порядку — перехід від полюддя (грабіж) до організованої
    системи'
  - '[!decolonization] Ольга — архітектор держави, творець адміністративного апарату
    (перші «погости» як центри влади)'
  - Інфраструктура реформ — введення «уроків» (фіксований податок) та створення фіскальної
    мережі
- section: 'Читання: II — Дипломатія рівних'
  words: 500
  points:
  - 'Дипломатія: Візит до Царгорода (957) — мета: рівноправність з Візантією, а не
    васалітет'
  - 'Хрещення як дипломатичний інструмент: легенда про те, як Ольга перехитрила імператора'
  - Відмова від масового хрещення Русі через опір язичницької дружини
- section: 'Читання: III — Святослав і ціна війни'
  words: 800
  points:
  - 'Святослав: Лицар Степу (964–972) — гасло «Іду на ви!» як елемент лицарського
    кодексу'
  - 'Війна з Хозарією: геополітична необхідність чи стратегічна помилка?'
  - '[!myth-buster] Знищення Хозарії — це ствердження суб''єктності Києва як імперії,
    що знищила іншу імперію'
  - 'Геополітична дилема: контроль над Волгою і Доном vs відкриття шляху печенігам'
  - 'Загибель: Чаша з черепа — засідка печенігів на порогах, хан Куря'
  - 'Цитата Святослава: «Мертві сорому не мають» (перед битвою під Доростолом)'
- section: Первинні джерела
  words: 400
  points:
  - Повість минулих літ про реформи Ольги — літописна фіксація переходу до регламентованого
    управління
  - 'Лев Диякон про Святослава: унікальний візантійський опис зовнішності ворога'
  - '[!quote] Опис зовнішності Святослава Левом Дияконом (сережка, чуб, біла сорочка)
    — прямий доказ української естетики еліти'
- section: 'Деколонізаційний погляд: I — Ідентичність та гендер'
  words: 600
  points:
  - 'Святослав: Вікінг чи Козак? — візуальний та ментальний зв''язок з пізнішим козацтвом
    (голена голова, вуса)'
  - 'Ольга: «Мудра», а не «Хитра» — літописні хитрощі як ознака політичної мудрості
    жінки-правителя'
  - 'Жінки у політиці Русі: Феномен Ольги — високий статус жінки в Русі порівняно
    з Європою'
  - '[!culture] Унікальний статус жінки в Русі vs пізніша московська традиція «терему»'
- section: 'Деколонізаційний погляд: II — Геополітика Русі'
  words: 600
  points:
  - Глибший аналіз реформ Ольги — створення інституційної держави замість пухкого
    військового союзу племен
  - 'Святослав: Портрет лицаря Степу — аскетизм, зневага до комфорту, життя в походах
    разом з дружиною'
  - 'Хозарія: Знищення буфера — війна двох регіональних наддержав за контроль над
    торговими шляхами'
  - 'Балканська епопея: Амбіція і катастрофа — спроба перенести столицю на Дунай (Переяславець)'
- section: 'Деколонізаційний погляд: III — Спадщина двох шляхів'
  words: 400
  points:
  - 'Загибель: Уроки для нащадків — ціна геополітичних амбіцій без надійного тилу'
  - 'Ольга і Святослав: Два шляхи розвитку України — європейський (дипломатія/інституції)
    та степовий (війна/експансія)'
  - 'Спадщина: адміністративна система Ольги стала фундаментом для Володимира, а військова
    слава Святослава — міфом'
  - Уроки для сучасної України — важливість поєднання сильної армії та ефективних
    державних інституцій
- section: 'Потрібно більше практики?: I — Економіка та побут'
  words: 300
  points:
  - Економіка епохи Ольги та Святослава — роль хутра і воску в експорті, шлях «із
    варяг у греки»
  - Християнство і язичництво — Ольга-християнка vs Святослав-язичник, релігійний
    дуалізм епохи
  - Життя звичайних людей — смерди, дружинники, ремісники
  - Жінки в суспільстві — майнові права, участь у господарському житті
- section: 'Потрібно більше практики?: II — Спадщина та пам''ять'
  words: 300
  points:
  - Військова культура — озброєння дружини, тактика «стіна щитів», роль кінноти
  - Спадщина для нащадків — як реформи Ольги вплинули на правління Володимира Великого
  - Завершення епохи — кінець періоду «дикої» експансії, початок державної консолідації
  - Археологічні свідчення епохи — скарби, зброя, поховання (Шестовиця, Гньоздово)
