slug: galytsko-volynska-derzhava
title: 'Галицько-Волинська держава: Розквіт'
word_target: 5000
content_outline:
- section: Вступ — Друга Русь на заході
  words: 400
  points:
  - Галичина і Волинь як прямі спадкоємці Києва; концепція «Королівства Русь» (Regnum
    Russiae)
  - 'Географічні переваги: Карпати («Угорські гори») та ліси Волині як природний захист
    від степових кочівників'
  - Переміщення центру української державності на захід після занепаду Києва (1240
    рік) — «щит Європи»
- section: Основні події
  words: 500
  points:
  - 'Хронологічні межі: 1199 (об''єднання Романом) — 1340 (смерть Юрія II Болеслава)'
  - 'Ключові дати: 1199 (утворення), 1238 (утвердження Данила), 1245 (Ярославська
    битва), 1253 (коронація)'
  - 'Періодизація: 1. Утворення та піднесен मिमीня (Роман); 2. «Велика смута» (боярська
    анархія); 3. Розквіт (Романовичі); 4. Стабілізація і занепад'
- section: 'Роман Мстиславич — об''єднувач земель: І — Шлях до влади'
  words: 600
  points:
  - 'Об''єднання Волині та Галичини 1199 року: створення потужної монархії на основі
    волинської династії'
  - 'Жорстка централізація та боротьба з боярською опозицією: політична максима «Не
    погнітивши бджіл, меду не їстимеш»'
  - Формування державного апарату, відданого князю, на противагу старій родовій аристократії
- section: 'Роман Мстиславич — об''єднувач земель: ІІ — Самодержець та його кінець'
  words: 600
  points:
  - Оволодіння Києвом (1202) та прийняття титулу «Самодержець всієї Русі»
  - Зовнішня політика та військові успіхи («кидався на поганих, як лев»); контроль
    земель від Карпат до Дніпра
  - Загибель у битві під Завихостом (1205) та її катастрофічні наслідки — початок
    30-річної громадянської війни та іноземних інтервенцій
- section: 'Золота доба Романовичів: І — Дуумвірат і перемога'
  words: 600
  points:
  - 'Унікальний братерський дуумвірат: Данило (зовнішня політика, війна, Галич) та
    Василько (внутрішні справи, Волинь)'
  - Важка боротьба за повернення батьківської спадщини; остаточне утвердження в Галичі
    1238 року
  - 'Битва під Ярославом (17 серпня 1245): вирішальний розгром об''єднаних сил угорців,
    поляків та бунтівних бояр'
- section: 'Золота доба Романовичів: ІІ — Корона і міста'
  words: 600
  points:
  - 'Коронація Данила в Дорогичині (1253): отримання титулу Rex Russiae від Папи та
    спроба антимонгольської коаліції'
  - 'Економічний розквіт: контроль торгових шляхів, солевидобування (Коломия, Дрогобич),
    митні надходження'
  - 'Урбанізація: заснування Холма (нова столиця) та Львова (1256, на честь сина Лева);
    запрошення ремісників з Європи'
- section: Культура і мистецтво
  words: 500
  points:
  - 'Галицько-Волинський літопис: світський характер, літературна майстерність, зосередженість
    на діяннях князів, а не церковних справах'
  - 'Архітектурна школа: синтез київських традицій (хрестово-купольний план) та західного
    романського стилю (білокам''яне різьблення, вітражі)'
  - 'Сакральне мистецтво: Холмська ікона Богородиці; храми Галича (Успенський собор)
    та Холма'
- section: Первинні джерела — Слово о полку Ігоревім
  words: 400
  points:
  - 'Образ Ярослава Осмомисла (тестя Ігоря): свідчення могутності Галицького князівства
    ще до об''єднання з Волинню'
  - 'Метафорика влади: «підпер гори Угорські», «зачинив ворота Дунаєві» — контроль
    над стратегічними комунікаціями'
  - Авторитет галицької династії в системі руських князівств XII століття
- section: Деколонізаційний погляд — Забута держава
  words: 500
  points:
  - 'Спростування радянського міфу про «феодальну роздробленість»: Г-В держава була
    централізованою європейською монархією, а не уламком'
  - 'Легітимність спадкоємності: саме Г-В держава (Regnum Russiae), а не Владимиро-Суздальське
    князівство, зберегла назву «Русь» і київську традицію'
  - 'Цивілізаційний вибір: інтеграція в європейський правовий простір vs деспотична
    модель Залісся під впливом Орди'
- section: Підсумок — Спадщина для нащадків
  words: 300
  points:
  - Збереження етноніму «русини» та державної ідентичності на 150 років після падіння
    Києва
  - 'Галичина як український «П''ємонт»: формування політичної культури, відмінної
    від російської автократії'
