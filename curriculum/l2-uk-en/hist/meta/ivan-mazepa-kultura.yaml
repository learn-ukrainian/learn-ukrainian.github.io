slug: ivan-mazepa-kultura
title: 'Іван Мазепа II: освіта і культура'
word_target: 5000
content_outline:
- section: 'Вступ: Золота доба українського духу'
  words: 400
  points:
  - Період гетьманування Мазепи (1687–1709) як час найвищого розквіту Гетьманщини
    — «Мазепинська доба» як синонім культурного ренесансу.
  - Освіченість гетьмана (навчання в Девентері, знання 8 мов) як фундамент для європеїзації
    України.
  - 'Масштаб меценатства: інвестиції понад 1 мільйон дукатів у культуру та церкву
    (за даними Бендерської комісії 1709 р.).'
  - 'Культура як державна політика: репрезентація влади через мистецтво та архітектуру.'
- section: 'Києво-Могилянська академія: Афіни на Дніпрі'
  words: 700
  points:
  - Києво-Могилянська академія як інтелектуальний центр Східної Європи та «Афіни на
    Дніпрі».
  - 'Неофіційна назва «Могило-Мазепинська академія»: визнання ролі гетьмана поруч
    із засновником Петром Могилою.'
  - 'Матеріальна підтримка: будівництво нового кам''яного корпусу (Бурси), Братського
    собору та щорічні стипендії спудеям.'
  - 'Юридичне закріплення статусу: отримання офіційного титулу академії у 1701 році.'
- section: 'Мазепинське бароко: Архітектура національної величі'
  words: 900
  points:
  - 'Унікальні риси стилю: поєднання європейського бароко з давньоруськими традиціями
    (грушоподібні бані, пишний ліпний декор, гра світла на білих стінах).'
  - 'Київські шедеври: Богоявленський собор Братського монастиря, Військовий Микільський
    собор (знищені більшовиками), Всіхсвятська церква Лаври.'
  - 'Реставрація святинь: відновлення Софії Київської та Успенського собору Лаври
    у барокових формах.'
  - 'Архітектурна географія Гетьманщини: Троїцький собор та Колегіум у Чернігові,
    Вознесенський собор у Переяславі, Мгарський монастир.'
- section: 'Література і друк: Мазепинське слово як національна зброя'
  words: 500
  points:
  - Розвиток друкарень (Лаврська, Чернігівська) та видання розкішних книг з гравюрами
    («Антимінс», «Євангеліє»).
  - 'Панегірична література як інструмент ідеології: твори Пилипа Орлика, Стефана
    Яворського.'
  - 'Трагікомедія Феофана Прокоповича «Володимир» (1705): алегоричне прославлення
    Мазепи в образі рівноапостольного князя.'
  - 'Титулування гетьмана в літературі: «Всіх славеноруських стран князь і повелитель».'
- section: Мистецтво гравюри та символіка влади
  words: 400
  points:
  - Київська школа гравюри (І. Щирський, Л. Тарасевич) як візуальна пропаганда гетьманату.
  - 'Гравюра Івана Мигури «Мазепа серед своїх добрих справ» (1706): програмний маніфест
    правління.'
  - 'Символіка: гетьман як стовп, на якому тримається церква і держава; алегоричні
    фігури Мудрості, Слави, Віри.'
  - Використання родинного герба «Курч» в архітектурному декорі та книжкових ілюстраціях.
- section: Українська барокова музика та хоровий спів
  words: 300
  points:
  - Розвиток партесного (багатоголосного) співу та вплив «Граматики мусикійської»
    Миколи Дилецького.
  - Високий рівень церковних хорів та музична освіта в колегіумах.
  - 'Естетика барокової музики: емоційність, динамічність, контрастність.'
  - Глухів як майбутній музичний центр (фундамент, закладений у мазепинську добу).
- section: Театральне мистецтво та шкільна драма
  words: 300
  points:
  - Шкільний театр при Києво-Могилянській академії як засіб виховання та пропаганди.
  - 'Жанрова різноманітність: драми на релігійні та історичні теми, використання алегорій.'
  - 'Інтермедії: гумористичні сценки живою народною мовою між актами серйозних драм.'
  - 'Дидактична функція театру: формування моральних цінностей та патріотизму.'
- section: 'Первинні джерела: Свідчення величі та щедрості'
  words: 400
  points:
  - Універсали Мазепи про надання земель і коштів монастирям (Густинський, Мгарський).
  - Написи на церковних дзвонах, вкладних хрестах та Євангеліях як докази меценатства.
  - 'Цитата з думи Мазепи «Всі покою щиро прагнуть»: «А за волю, хоч умріте, і вольності
    бороніте».'
  - «Же през шаблю маєм права» — формула політичної легітимності в культурному контексті.
- section: 'Деколонізаційний погляд: Відновлення правди про мецената'
  words: 600
  points:
  - Імперський міф про «зрадника» vs історична реальність «Гетьмана-будівничого».
  - 'Парадокс анафеми: прокляття Мазепі лунали в церквах, які він сам збудував і прикрасив.'
  - Мазепинське бароко як доказ приналежності України до європейського культурного
    простору.
  - 'Свідоме нищення пам''яті: збивання гербів, перейменування споруд, замовчування
    імені мецената.'
- section: Підсумок
  words: 200
  points:
  - Культурна спадщина Мазепи як «кам'яний літопис» українського духу, що пережив
    імперське нищення.
  - Доказ здатності українців творити високу культуру світового рівня за умов власної
    державності.
- section: Читання
  words: 300
  points:
  - Уривок з опису урочистої зустрічі гетьмана в Академії або опис архітектурної величі
    мазепинського собору.
