slug: nova-serbiya
title: Нова Сербія та Слов'яносербія
word_target: 5000
content_outline:
- section: 'Вступ: Чужинці на українській землі'
  words: 600
  points:
  - '1750-ті роки як «затишшя перед бурею»: підготовка імперії до остаточного поглинання
    козацьких земель.'
  - Хто такі «нові серби»? Історія австрійських граничарів (прикордонників), що втратили
    привілеї через реформи Марії-Терезії.
  - 'Феномен «сербського бренду» на Півдні: чому українські селяни-втікачі масово
    записувалися у «серби» (кейс зміни прізвищ).'
- section: 'Створення військових поселень: I — Нова Сербія'
  words: 550
  points:
  - 'Заснування Нової Сербії (1752): роль Івана Хорвата та вибір території (північ
    сучасної Кіровоградщини, Буго-Гардівська паланка).'
  - 'Новомиргород як адміністративний центр: формування інфраструктури та перші кроки
    нової влади.'
  - 'Структура поселення: поділ на гусарські та пандурські полки, військово-адміністративний
    устрій.'
- section: 'Створення військових поселень: II — Слов''яносербія'
  words: 550
  points:
  - 'Альтернативний проект (1753): конфлікт Йована Шевича та Райка Прерадовича з Хорватом,
    створення окремої автономії на Луганщині.'
  - 'Специфіка Слов''яносербії: розташування між Бахмутом і Луганню, етнічна строкатість
    (волохи, македонці, болгари).'
  - 'Юридична база: Іменний указ Єлизавети Петрівни від 24 грудня 1751 року як легалізація
    іноземної військової присутності.'
- section: 'Життя в колоніях: I — Військовий устрій та побут'
  words: 550
  points:
  - 'Система шанців: поєднання військового гарнізону та сільськогосподарського поселення
    («плуг і мушкет»).'
  - 'Культурний вплив: гусарська мода (ментика, доломан) та її проникнення в українську
    військову еліту.'
  - 'Побут колоністів: особливості господарювання в умовах постійної військової готовності.'
- section: 'Життя в колоніях: II — Конфлікти та асиміляція'
  words: 550
  points:
  - 'Земельні війни: постійні конфлікти із Запорозькою Січчю за «віковічні козацькі
    ґрунти» та зимовники.'
  - 'Релігійний фактор: роль православ''я у швидкій асиміляції рядових колоністів
    з місцевим українським населенням.'
  - 'Міф про «чистих сербів»: чому вже за кілька років полки складалися переважно
    з місцевих мешканців.'
- section: 'Життя в колоніях: III — Адміністративний крах'
  words: 450
  points:
  - 'Корупційна імперія Івана Хорвата: приписки «мертвих душ», фінансові махінації
    та зловживання владою.'
  - 'Розслідування та арешт: як імперія покарала свого ставленика, коли він став непотрібним.'
  - 'Ліквідація автономії (1764): включення земель до складу Новоросійської губернії,
    перетворення еліти на російське дворянство.'
- section: 'Первинні джерела: I — Закон імперії'
  words: 350
  points:
  - 'Аналіз указу 1751 року: риторика «захисту одновірців» як прикриття для геополітичної
    експансії.'
  - 'Картографічна війна: як на картах того часу козацькі топоніми замінювалися на
    балканські назви (Суботиці, Панчеве).'
- section: 'Первинні джерела: II — Опір землі'
  words: 350
  points:
  - 'Скарги Коша Запорозького: документи про захоплення худоби, сіножатей та руйнування
    зимівників.'
  - 'Справа козака Григорія Носенка (1762): мікроісторичний приклад побутового конфлікту
    з новою адміністрацією.'
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Руйнування міфу про «Дике Поле»: докази існування густої мережі козацьких поселень
    до приходу сербів.'
  - 'Колоністи як інструмент: використання імперією балканських переселенців як «етнічного
    бар''єру» проти Січі.'
  - 'Термінологічна пастка: чому термін «освоєння» є некоректним для опису анексії
    заселених територій.'
- section: 'Підсумок: Наслідки для Півдня'
  words: 500
  points:
  - 'Від Нової Сербії до «Новоросії»: як військові поселення стали плацдармом для
    повної ліквідації козацької автономії.'
  - 'Етнічний спадок: українські прізвища сербського походження (Вуйчич, Попович)
    та топоніміка регіону.'
  - 'Історичний урок: стратегія «розділяй і володарюй» у дії — використання одних
    поневолених народів проти інших.'
