slug: velyke-kniazivstvo-lytovske
title: Велике князівство Литовське — Руська держава
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Парадокс Великого князівства Литовського: назва «Литовське», але суть «Руська»
    (90% територій і населення — українці та білоруси)'
  - Принцип Гедиміновичів «Ми старини не рушимо і новини не вводимо» як основа легітимності
    та лояльності руських еліт
  - 'Титулатура володарів: «Король Литви і Русі» — претензія на спадщину Києва'
- section: 'Читання: I — Литовська експансія та Битва на Синіх Водах'
  words: 600
  points:
  - 'Динаміка розширення ВКЛ (1316–1392): від Гедиміна до Вітовта, феномен «оксамитового
    проникнення» через шлюби та угоди'
  - 'Битва на Синіх Водах (1362): звільнення Київщини та Поділля від Золотої Орди
    за 18 років до Куликовської битви'
  - 'Геополітичне значення: українські землі стають центром тяжіння для нової держави,
    зміщення цивілізаційного вектора на Захід'
- section: 'Читання: II — Руська мова як державна і «lingua franca»'
  words: 600
  points:
  - 'Статус руської (староукраїнської) мови: офіційна мова судочинства, державної
    канцелярії та дипломатії'
  - 'Культурна домінація: литовська еліта переймає мову, віру та звичаї більш розвиненої
    руської культури'
  - 'Руська мова як «lingua franca» Східної Європи: використання навіть у листуванні
    молдавських господарів'
- section: 'Читання: III — Релігійна толерантність та руська шляхта'
  words: 500
  points:
  - 'Ситуація до Городельської унії (1413): рівні права православних і католиків,
    відсутність релігійної дискримінації'
  - Роль православних магнатів (Острозькі, Вишневецькі, Збаразькі) у державному управлінні
    та захисті кордонів
  - 'Толерантність до інших конфесій: привілеї євреям та мусульманам (литовським татарам)'
- section: 'Первинні джерела: I — Литовські статути'
  words: 600
  points:
  - 'Перший Литовський статут (1529): кодифікація права на основі норм «Руської Правди»
    та західноєвропейської юриспруденції'
  - 'Закріплення державного статусу руської мови: цитата зі Статуту 1588 року про
    обов''язковість писання «літерами й словами руськими»'
  - Статути як вершина правової думки Європи XVI століття, що діяли на українських
    землях аж до XIX століття
- section: 'Первинні джерела: II — Європейська правова культура'
  words: 600
  points:
  - 'Прогресивні норми: впровадження презумпції невинуватості та захист прав особи
    (шляхтича) від свавілля влади'
  - Скасування колективної відповідальності роду — принцип індивідуальної відповідальності
    за злочин
  - Контраст із московським звичаєвим правом, де панував принцип колективної провини
    та деспотії
- section: 'Деколонізаційний погляд: I — Дві моделі державності'
  words: 600
  points:
  - 'ВКЛ як договірна монархія: влада князя обмежена законом і правами станів (шляхти)'
  - 'Московське царство як деспотична монархія: сакралізація влади царя, відсутність
    прав підданих (усі — холопи)'
  - 'Цивілізаційний розлом: ВКЛ інтегрується в європейський простір (Ренесанс, Магдебурзьке
    право), Москва обирає ізоляціонізм'
- section: 'Деколонізаційний погляд: II — Демократична спадщина Русі'
  words: 500
  points:
  - Еволюція вічевих традицій Київської Русі у шляхетську демократію та сеймову культуру
    ВКЛ
  - Знищення вічевих традицій у Московії (трагедія Новгорода) та утвердження автократії
  - Спростування міфу про ВКЛ як «чужоземне панування» — це була органічна форма існування
    руської державності
- section: Критерії оцінювання
  words: 100
  points:
  - Чіткість аргументації та використання історичних термінів
  - Глибина аналізу первинних джерел (Статутів)
  - Коректність порівняння політичних систем ВКЛ та Москви
- section: Зразок відповіді
  words: 400
  points:
  - Приклад есе на тему «ВКЛ як спадкоємець Київської Русі»
  - Демонстрація використання лексики (оксамитове проникнення, правова держава, політичний
    народ)
  - 'Структура відповіді: теза, аргументи (мова, право, релігія), висновок'
- section: Підсумок — Спільна спадщина
  words: 300
  points:
  - 'Концепція «Іншої Русі»: альтернативний, європейський шлях розвитку східних слов''ян'
  - Три народи (українці, білоруси, литовці) як співавтори Великого князівства
  - Герб «Погоня» як спільний символ боротьби та державності
- section: Потрібно більше практики?
  words: 100
  points:
  - Посилання на додаткові матеріали про Ольгерда та Вітовта
  - Рекомендовані відео про битву на Синіх Водах
