  - Збереження політичної суб'єктності українських земель до 1569 року
- section: Критерії оцінювання
  words: 200
  points:
  - Чіткість аргументації та використання історичних фактів
  - Глибина аналізу причинно-наслідкових зв'язків
- section: Зразок відповіді
  words: 400
