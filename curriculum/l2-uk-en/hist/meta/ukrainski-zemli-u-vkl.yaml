slug: ukrainski-zemli-u-vkl
title: Українські землі у ВКЛ
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Принцип «Старовини не рушимо, новини не вводимо» як основа політики ВКЛ
  - Симбіоз литовської та руської еліт до Кревської унії 1385 року
  - 'Входження земель: «оксамитове проникнення» та збереження автономії'
- section: 'Читання: I — Київське князівство: Останній відблиск Русі'
  words: 700
  points:
  - Династія Олельковичів як продовжувачі руської державності
  - 'Київ як суб''єкт міжнародної політики: власна монета та дипломатія'
  - Ліквідація князівства 1471 року та бунт киян проти воєводи Гаштовта
- section: 'Читання: II — Волинь: Колиска руської аристократії'
  words: 700
  points:
  - Волинь як найбагатший регіон («українська Тоскана»)
  - Збереження унікальних «княжих прав» та правового статусу
  - Формування потужного прошарку руської шляхти та її роль
- section: 'Читання: III — Магнатські роди: «Королев''ята» і нова еліта'
  words: 700
  points:
  - Феномен магнатів-«королев'ят» (Острозькі, Вишневецькі, Заславські)
  - Приватні армії, суди та замки як атрибути суверенної влади
  - Роль магнатів у захисті православ'я та регіональних інтересів
- section: Первинні джерела
  words: 600
  points:
  - 'Василь-Костянтин Острозький: «некоронований король Русі» та його меценатство'
  - Острозька Біблія (1581) як інтелектуальна відповідь на католицьку експансію
  - Острозька академія — перша вища школа Східної Європи
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Спростування міфу про ВКЛ як «окупанта»: концепція Литовсько-Руської держави'
