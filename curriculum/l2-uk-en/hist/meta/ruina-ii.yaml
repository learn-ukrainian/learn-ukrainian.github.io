slug: ruina-ii
title: 'Руїна II: Дорошенко і надія'
word_target: 5000
content_outline:
- section: 'Вступ: Людина, яка хотіла неможливого'
  words: 400
  points:
  - «Сонце Руїни» — метафора Василя Пачовського (драма 1911 р.) як символ трагічного
    героїзму
  - 'Геополітичний стан 1665 року: Україна розколота, виснажена війною, потребує «державного
    будівничого»'
  - 'Мета Дорошенка: подолати хаос і відновити цілісність держави всупереч волі сусідів'
- section: 'Петро Дорошенко: Шлях до булави'
  words: 500
  points:
  - 'Походження: онук гетьмана Михайла Дорошенка, аристократичний родовід як джерело
    легітимності'
  - 'Військова реформа: створення корпусу сердюків (20 тис. найманців) для незалежності
    від старшини'
  - 'Стратегія Соборності: об''єднання обох берегів Дніпра як абсолютний пріоритет'
- section: 'Турецький вектор: Союз чи зрада?'
  words: 600
  points:
  - 'Логіка союзу з Портою: Realpolitik як відповідь на зраду Москви і Польщі в Андрусові
    (1667)'
  - 'Корсунська рада 1669 року: козацтво схвалює протекторату (модель Молдавії/Трансільванії)'
  - 'Умови угоди: відсутність данини, військова допомога, непорушність кордонів, вільні
    вибори'
- section: 'Похід султана і Бучацький мир 1672: I — Падіння Кам''янця'
  words: 500
  points:
  - Спільний похід султана Мехмеда IV і гетьмана Дорошенка на Поділля
  - Облога і падіння неприступної фортеці Кам'янець-Подільський — шок для Європи
  - Масштаб кампанії та військова співпраця козаків з османами
- section: 'Похід султана і Бучацький мир 1672: II — Бучацький договір і наслідки'
  words: 500
  points:
  - 'Умови миру: Поділля відходить Туреччині, Брацлавщина та Київщина — під владою
    Дорошенка'
  - Перша фіксація терміну «Українська держава» (Panstwo Ukrainskie) в міжнародному
    договорі
  - 'Реакція населення: страх перед «турецькою неволею», перетворення церков на мечеті,
    падіння авторитету гетьмана'
- section: 'Внутрішній фронт: Дорошенко проти Сірка'
  words: 600
  points:
  - 'Іван Сірко як уособлення запорозької опозиції: конфлікт Ієрархії (Дорошенко)
    та Анархії (Сірко)'
  - 'Руйнівна роль Сірка: атаки на Крим під час дипломатичних переговорів Дорошенка'
  - 'Ідеологічне протистояння: Державність і прагматизм проти «Чистої віри» і популізму'
- section: 'Чигиринські походи: Оборона столиці: I — Перша облога (1677)'
  words: 500
  points:
  - Спроба Османської імперії відновити контроль після зречення Дорошенка
  - Перший похід турків на Чигирин та успішна оборона козацько-московського гарнізону
  - Тактика оборони та відступ османських військ
- section: 'Чигиринські походи: Оборона столиці: II — Загибель столиці (1678)'
  words: 500
  points:
  - 'Другий похід візира Кара-Мустафи: тотальне знищення міста'
  - 'Свідчення Патріка Гордона: опис штурму як «пекла на землі»'
  - Підрив замку і руйнування Чигирина як символічний кінець епохи Хмельниччини
- section: Капітуляція і доля гетьмана
  words: 500
  points:
  - 'Зречення 1676 року: передача клейнодів Самойловичу заради припинення кровопролиття'
  - 'Почесне заслання: життя воєводою у Вятці (Ярополче), смерть у 1698 році'
  - 'Спадщина: Дорошенко як останній гетьман, що діяв як суверенний володар'
- section: 'Первинні джерела: Свідчення іноземців'
  words: 400
  points:
  - 'Французькі дипломати про Дорошенка: «людина великого розуму і відваги» між трьома
    імперіями'
  - 'Літопис Самовидця: опис розрухи, «великого жалю» і трагедії народу'
  - Аналіз сприйняття постаті гетьмана сучасниками та нащадками (Пушкін, Шевченко)
