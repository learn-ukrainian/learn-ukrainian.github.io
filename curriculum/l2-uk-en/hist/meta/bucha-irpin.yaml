slug: bucha-irpin
title: 'Буча та Ірпінь: Злочини'
word_target: 5000
content_outline:
- section: 'Вступ: Лютий-березень 2022 — I. Контекст і географія'
  words: 400
  points:
  - '24 лютого 2022: спроба «бліцкригу» РФ через висадку десанту в аеропорту «Антонов»
    (Гостомель).'
  - 'Північні передмістя як ворота до Києва: стратегічне значення.'
  - Річка Ірпінь як природний оборонний бар'єр, що зупинив просування важкої техніки.
  - 'Підрив мостів у Романівці та Стоянці українськими силами: тяжке, але необхідне
    рішення для порятунку столиці.'
  - Романівський міст як «Дорога життя» для евакуації цивільних під обстрілами.
- section: 'Вступ: Лютий-березень 2022 — II. Стратегічний щит Києва'
  words: 400
  points:
  - '33 дні окупації: хронологічні межі трагедії.'
  - Роль міст-супутників у порушенні логістики ворога та виснаженні наступального
    потенціалу.
  - '[!context] Стратегічне значення: чому саме Буча та Ірпінь стали щитом для Києва.'
  - 'Ціна оборони: руйнування інфраструктури та гуманітарна катастрофа з перших днів.'
- section: Хроніка окупації — I. Вторгнення та виживання
  words: 450
  points:
  - '27 лютого: знищення колони російської бронетехніки («Росгвардія», кемеровський
    ЗМОП) на вулиці Вокзальній у Бучі.'
  - '[!history-bite] Героїзм ТрО та ЗСУ vs медійний міф про «Привида Києва»: реальні
    люди, що зупинили навалу.'
  - 'Побут в окупації: повна відсутність комунікацій (світло, газ, вода, зв''язок).'
  - Життя у підвалах та приготування їжі на вогнищах у дворах під постійним наглядом
    снайперів.
  - 'Психологічний тиск: заборона пересування, перевірки телефонів на наявність «нацистського
    контенту».'
- section: Хроніка окупації — II. Терор і відступ
  words: 500
  points:
  - 'Вулиця Яблунська («Вулиця смерті»): штаб окупантів та місце масових страт.'
  - 'Ідентифікація катів: 64-та окрема мотострілецька бригада (Хабаровськ), псковські
    десантники, «кадирівці».'
  - 'Система маркування «свій-чужий»: примусове носіння білих пов''язок цивільними
    як мітка ворога.'
  - '31 березня: втеча російських військ під тиском ЗСУ.'
  - 'Тактика «випаленої землі» при відступі: тотальне мінування будинків, тіл загиблих
    та цивільних об''єктів.'
- section: Виявлення злочинів — I. Світ бачить правду
  words: 400
  points:
  - '1-2 квітня 2022: входження українських військ та міжнародних журналістів (AFP,
    Reuters).'
  - 'Перші кадри, що шокували світ: тіла на дорогах, розстріляні автомобілі, спалена
    техніка.'
  - '[!quote] Анатолій Федорук: «Ми не встигали ховати людей» — масштаб трагедії очима
    місцевої влади.'
  - 'Зміна світового сприйняття війни: від «конфлікту» до усвідомлення геноцидного
    характеру агресії.'
- section: Виявлення злочинів — II. Докази та ексгумація
  words: 450
  points:
  - 'Братська могила біля церкви Андрія Первозванного: траншея як вимушене місце поховання
    під час обстрілів.'
  - 'Процес ексгумації та ідентифікації: робота криміналістів та іноземних експертів.'
  - 'Характер поранень: зв''язані за спиною руки, сліди катувань, постріли в потилицю.'
  - 'Статистика жертв: понад 1400 загиблих у Бучанському районі, 501 ідентифікована
    жертва безпосередньо в Бучі.'
- section: Первинні джерела — I. Голоси свідків
  words: 400
  points:
  - 'Проєкт «The Ukrainians» та фіксація усної історії: важливість збереження особистих
    трагедій.'
  - 'Свідчення про психологічний стан окупантів: погляд «крізь людей», відчуття абсолютної
    безкарності.'
  - Цитата Наташі Александрової про тишу як найбільшу загрозу під час евакуації.
  - 'Історії порятунку та взаємодопомоги: як громада виживала завдяки солідарності.'
- section: Первинні джерела — II. Документальні докази
  words: 400
  points:
  - 'Звіти міжнародних організацій (Human Rights Watch, ОБСЄ, ООН): юридична кваліфікація
    подій.'
  - 'Підтвердження системності терору: злочини не були ексцесами виконавців, а частиною
    стратегії залякування.'
  - '[!myth-buster] Супутникові знімки Maxar: спростування російського фейку про «постановку».'
  - 'Хронологічна прив''язка супутникових даних: докази того, що тіла лежали на вулицях
    тижнями під час контролю РФ.'
- section: Міжнародне правосуддя — I. Роль МКС
  words: 400
  points:
  - 'Візит прокурора МКС Каріма Хана до Бучі: місце злочину світового масштабу.'
  - Кваліфікація подій як воєнних злочинів та злочинів проти людяності.
  - 'Ордер на арешт Володимира Путіна: Буча як фундамент доказової бази в контексті
    відповідальності вищого керівництва.'
  - 'Складність процесу: від збору доказів до реальних вироків.'
- section: Міжнародне правосуддя — II. Трибунал та історичний контекст
  words: 400
  points:
  - 'Українські суди: заочні вироки конкретним виконавцям (військовослужбовцям 64-ї
    бригади).'
  - Ідея Спеціального трибуналу щодо злочину агресії.
  - '[!decolonization] Порівняльний контекст: реакція світу на Бучу (докази в реальному
    часі) vs замовчування Голодомору.'
  - 'Інформаційна війна: як Росія намагалася (і провалилася) створити альтернативну
    реальність навколо Бучі.'
- section: Пам'ять і спротив — I. Міста-Герої
  words: 400
  points:
  - Присвоєння почесної відзнаки «Місто-Герой України» Бучі та Ірпеню.
  - '«Стіна пам''яті» біля церкви Андрія Первозванного: імена тих, кого забрала війна.'
  - Меморіали на місцях розстрілів та стихійних поховань.
  - 'Ірпінь як місто, що не скорилося: лінія фронту проходила безпосередньо через
    житлові квартали, але ворог не пройшов.'
- section: Пам'ять і спротив — II. Відродження
  words: 400
  points:
  - 'Відбудова вулиці Вокзальної: символічне перетворення місця смерті на місце життя.'
  - '[!culture] Мистецтво на руїнах: графіті Бенксі в Бородянці, Ірпені та Гостомелі
    як світові маркери солідарності.'
  - Феномен швидкого повернення мешканців та відновлення життя в деокупованих містах.
  - 'Буча як символ: від місця трагедії до місця сили та пам''яті.'
