slug: diaspora
title: 'Діаспора: Ковчег держави'
word_target: 5000
content_outline:
- section: 'Вступ: Чому українці покидали батьківщину'
  words: 400
  points:
  - 'Три основні хвилі еміграції до 1991 року: економічна (земля), політична (поразка
    визвольних змагань), біженська (війна).'
  - '[!decolonization] Радянський міф про емігрантів як «зрадників» vs реальність
    «Ковчега», що зберіг державність.'
  - 'Унікальність української діаспори: сильна політична складова та місія «збереження
    нації» поза межами України.'
- section: Перша хвиля (1880-1914)
  words: 600
  points:
  - 'Початок масової трудової еміграції: прибуття Івана Пилипіва та Василя Єлиняка
    до Канади (1891).'
  - Аграрне перенаселення Галичини та Буковини як основна причина виїзду; роль священиків
    і «Просвіти» в організації життя.
  - '[!history-bite] Павлина Геникова про перші враження від «ангельських людей» та
    тугу за мовою в чужому середовищі.'
  - '«Ми будували Україну на чужині»: заснування церков, читалень та збереження традицій.'
- section: 'Друга хвиля (1920-1939): Політична еміграція та Уряд УНР'
  words: 600
  points:
  - '«Інтелектуальна еміграція»: виїзд військових та політичної еліти після поразки
    визвольних змагань.'
  - Діяльність Уряду УНР в екзилі (Тарнів, Париж) як єдиного легітимного спадкоємця
    української державності (1917-1992).
  - Боротьба за збереження державних атрибутів (прапор, тризуб, гімн) в умовах бездержавності.
- section: 'Друга хвиля (1920-1939): Наукові та культурні інституції'
  words: 400
  points:
  - '[!context] Прага як «український Оксфорд»: феномен Українського вільного університету
    та Господарської Академії в Подєбрадах.'
  - Розвиток української гуманітаристики та науки вільною від радянської цензури.
  - Варшава та Париж як центри культурного життя та політичної думки (публіцистика,
    література).
- section: 'Третя хвиля (ДіПі, 1945-1950): Феномен «переміщених осіб» та таборове
    життя'
  words: 600
  points:
  - 'Масова відмова від репатріації до СРСР через загрозу репресій: «Я не хочу вертатись
    на ту родіну» (Іван Багряний).'
  - '[!myth-buster] Табори ДіПі (Displaced Persons) як «держави в мініатюрі»: театри,
    гімназії, власна преса та самоврядування.'
  - 'Розквіт літератури та мистецтва в таборах: діяльність МУРу (Мистецького українського
    руху).'
- section: 'Третя хвиля (ДіПі, 1945-1950): Розселення та консолідація'
  words: 500
  points:
  - 'Закриття таборів та масовий переїзд за океан у 1950-х: формування потужних громад
    у США, Канаді, Австралії.'
  - Створення глобальних координаційних центрів, зокрема Світового Конгресу Вільних
    Українців (1967).
  - 'Інституціалізація діаспори: будівництво церков, суботніх шкіл та громадських
    центрів для збереження ідентичності.'
- section: Первинні джерела
  words: 400
  points:
  - 'Література «таборового періоду»: спогади Івана Багряного («Тигролови») та Уласа
    Самчука («Планета Ді-Пі») як свідчення епохи.'
  - Діаспорна періодика (газети «Свобода», «Українська думка») як основний канал комунікації
    та хроніка життя.
  - 'Історичний документ: Акт складання повноважень Державного Центру УНР в екзилі
    (1992) на користь незалежної України.'
- section: 'Внесок діаспори: Збереження культури та історичної пам''яті'
  words: 500
  points:
  - Видання Енциклопедії українознавства (ЕУ) — монументальна праця для збереження
    об'єктивного знання про Україну.
  - 'Політичний лобізм: діяльність Комісії Мейса та визнання Голодомору геноцидом
    у світі.'
  - Встановлення пам'ятників Шевченку (Вашингтон, Буенос-Айрес) як маркерів української
    присутності у світі.
- section: 'Внесок діаспори: Від відновлення незалежності до сучасної війни'
  words: 600
  points:
  - Роль діаспори у визнанні незалежності України західними урядами в 1991 році.
  - '[!quote] Микола Плав''юк про історичну спадкоємність: «Ваша Україна є правонаступницею
    УНР, а не УРСР».'
  - 'Реакція на війну з 2014 та 2022 років: адвокація санкцій, постачання зброї та
    гуманітарна допомога.'
  - Діаспора як «глобальний голос України» в протидії російській пропаганді.
- section: 'Підсумок: Діаспора сьогодні'
  words: 400
  points:
  - 'Четверта хвиля (після 2022): специфіка «тимчасового захисту» та надія на повернення
    додому.'
  - '[!reflection] Цифрова епоха: як інтернет та соцмережі змінюють поняття ностальгії,
    асиміляції та зв''язку з Батьківщиною.'
  - 'Концепція «Global Ukraine»: перехід від географічного розпорошення до мережевої
    глобальної нації.'
