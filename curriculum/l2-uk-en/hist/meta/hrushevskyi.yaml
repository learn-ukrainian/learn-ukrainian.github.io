slug: hrushevskyi
title: Михайло Грушевський
word_target: 5000
content_outline:
  - section: 'Вступ: Людина-епоха'
    points:
      - Чому Грушевський — найважливіший український історик — творець «паспорта»
        українського народу, наукової історії
      - Науковець, який став президентом — поєднання ролей національного пророка XIX
        ст. і державного будівничого XX ст.
      - 'Трагічна доля в радянські часи — повернення в 1924 році як свідома жертва
        заради науки; engagement hook: [!history-bite] про географію життя (Холм,
        Кавказ, Київ, Львів, Кисловодськ)'
    words: 850
  - section: Біографія та наукова кар'єра
    points:
      - Ранні роки та освіта — вплив Володимира Антоновича та київської школи
      - 'Львівський період: професор, керівник НТШ — «золота доба» (1894–1914), перетворення
        НТШ на де-факто Академію наук; engagement hook: [!context] про професорство
        у 28 років'
      - «Історія України-Руси» — монументальна праця — 10 томів у 13 книгах, писалася
        все життя
      - Деконструкція російської імперської схеми — зміщення фокусу з історії держави
        на історію народу
    words: 850
  - section: Політична діяльність
    points:
      - Революція 1917 року — обрання головою Центральної Ради заочно (березень 1917)
      - 'Голова Центральної Ради — легітимізація УНР; engagement hook: [!myth-buster]
        про «романтика, який не вмів керувати»'
      - Проголошення УНР — еволюція поглядів від автономії до незалежності (IV Універсал)
      - Еміграція та повернення — Прага, Відень, Женева (1919–1924) та фатальне рішення
        повернутися в СРСР
      - 'Радянський період: тиск та загибель — арешт 1931 року, смерть у Кисловодську
        1934 року (медичний терор)'
    words: 850
  - section: Первинні джерела
    points:
      - Фрагменти «Історії України-Руси» — аналіз стилю та аргументації
      - Промови Грушевського в Центральній Раді — риторика державотворення
      - 'Листи та щоденники — листи до доньки Катерини як свідчення людяності; engagement
        hook: [!quote] зі статті 1904 року «Звичайна схема...»'
    words: 850
  - section: Деколонізаційний погляд
    points:
      - Схема Грушевського проти схеми Карамзіна — «коперніканський переворот» в історії
        Східної Європи
      - 'Україна як окремий історичний суб''єкт — спадкоємність: Київська Русь ->
        Галицько-Волинська держава -> Козаччина -> УНР'
      - 'Чому Росія досі атакує Грушевського — боротьба за київську спадщину; engagement
        hook: [!decolonization] про термін «Україна-Русь»'
    words: 850
  - section: 'Підсумок: Незнищенна спадщина'
    points:
      - 'Грушевський на сторінці гривні — символізм 50 гривень; engagement hook: [!symbolism]'
      - Сучасна історіографія та його вплив — цитата «Біда України в тому, що нею
        керують ті, кому вона не потрібна»
      - Грушевський і війна 2022 року — історична схема як зброя проти російських
        псевдоісторичних наративів
    words: 850
