  ## Dimension Rubrics (Tier 3 Adaptations)


  ### Immersion Targets (Seminar)


  | Track | Target Range | Notes |

  |-------|--------------|-------|

  | HIST | 98-100% | Full historical immersion |

  | ISTORIOHRAFIIA | 98-100% | Full historical immersion (C1 complexity) |

  | C1-BIO | 98-100% | Full biographical immersion |

  | LIT | 100% | Pure Ukrainian (essays, not drills) |


  ### Language Quality (Seminar Level)


  **Ukrainian must be:**

  - Native-level, literary quality

  - Historically appropriate terminology (for HIST)

  - Stylistically varied (narrative + analytical)

  - Emotionally resonant

  - No Russianisms, no calques


  ### Activity Quality (Seminar Gates)


  | Metric | Seminar Threshold |

  |--------|-------------------|

  | Naturalness | ≥9.0 (literary quality) |

  | Types | reading, critical-analysis, essay-response, comparative-study |

  | Depth | Analysis, not just recognition |

  | Engagement | ≥4.0 |


  ### Richness (Seminar Level)


  **Richness means:**

  - Primary sources woven into narrative

  - Named historical figures, places, dates

  - Decolonization perspective integrated

  - Cultural continuity shown (past → present)

  - Emotional engagement throughout


  **Richness score minimums:**

  - HIST: 95%

  - ISTORIOHRAFIIA: 95%

  - C1-BIO: 95%

  - LIT: 90%


  ### Humanity & Teacher Voice (Seminar)


  | Marker | Minimum Count |

  |--------|---------------|

  | Direct address | ≥10 (but integrated, not forced) |

  | Questions to reader | ≥5 |

  | "Why this matters" statements | ≥3 |

  | Modern connections | ≥2 |


  ### LLM Fingerprint (Seminar Critical)


  **Strictest detection:**

  - ❌ Generic historical summaries

  - ❌ "It is important to note..."

  - ❌ Facts without interpretation

  - ❌ Missing narrative voice

  - ❌ No emotional engagement


  **Threshold:** Any AI slop pattern → Fix required


  ---


  ## Track-Specific Checks


  ### HIST (History — Foundational)


  **Required elements:**

  - Primary sources (≥3 per module)

  - Timeline markers (≥10 dates/periods)

  - Decolonization perspective (not Russian-centric)

  - Archaeological/historical evidence

  - Connection to Ukrainian identity


  ### ISTORIOHRAFIIA (History — Advanced)


  **Required elements:**

  - All HIST requirements, plus:

  - More sophisticated historiographical analysis

  - Multiple perspectives on events

  - Complex cause-effect chains

  - Connection to broader European/world history

  - Higher linguistic sophistication (C1-level vocabulary)


  ### C1-BIO (Biography)


  **Required elements:**

  - Personal narrative arc (life story)

  - Historical context

  - Primary sources (letters, quotes)

  - Impact on Ukrainian culture

  - Legacy connection to present


  ### LIT (Literature)


  **Required elements:**

  - Literary analysis, not summary

  - 100% Ukrainian (no English scaffolding)

  - Essays and reflections, not drills

  - Philosophical depth

  - Intertextual connections


  ---


  ## Lecture Quality Rubric (Tier 3)


  | Score | Description | Action |

  |-------|-------------|--------|

  | 10 | Exceptional — memorable, engaging, would recommend | None |

  | 9 | Excellent — compelling throughout, minor polish only | Light touch-ups |

  | 8 | Good — solid but missing 1-2 "wow" moments | Add emotional peaks |

  | 7 | Adequate — informative but forgettable | Significant enrichment needed |

  | 6 | Weak — technically correct but boring | Major narrative restructure |

  | ≤5 | Poor — fails as educational experience | Full rewrite |


  **Weight in overall score: 1.5 (highest weight along with Linguistic Accuracy)**

