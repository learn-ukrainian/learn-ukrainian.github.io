slug: kurbas-philosophy
title: "Філософія Сцени: Курбас про Природу Театру і Актора"
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Епоха «Розстріляного відродження»'
    words: 300
    points:
      - 'Історичні умови 1920-х років в радянській Україні: доба Українізації та короткочасний
        культурний ренесанс'
      - Розквіт українського мистецького авангарду та масштабні літературні дискусії
      - Місце Леся Курбаса як ключового візіонера та лідера театрального фронту відродження
  - section: 'Вступ та культурний контекст: Від побутовізму до авангарду'
    words: 300
    points:
      - 'Спадщина театру корифеїв: панування етнографічного, реалістично-побутового
        підходу до мистецтва'
      - Гостра потреба модернізації, урбанізації та європеїзації української національної
        сцени
      - Постать Курбаса як радикального руйнівника застарілих канонів та провінційних
        штампів
  - section: 'Аналіз твору: Сюжет та структура — «Молодий театр»'
    words: 400
    points:
      - Заснування «Молодого театру» (1917) у Києві як перший етап еволюції режисера
      - 'Пошук нового репертуару: відмова від шароварщини на користь європейської
        класики (Шекспір, Софокл) та модернізму'
      - Перші експерименти з театральною формою, символізмом та психологізмом на українському
        ґрунті
  - section: 'Аналіз твору: Сюжет та структура — Епоха «Березоля»'
    words: 450
    points:
      - Заснування мистецького об'єднання «Березіль» (1922) у Києві та його подальший
        переїзд до столичного Харкова (1926)
      - Організація «Березоля» як потужної філософської лабораторії та науково-дослідного
        інституту театру
      - Назрівання неминучого конфлікту між вільним авангардним баченням режисера
        та жорсткими вимогами радянської цензури
  - section: 'Герменевтика та ключові образи: Філософія «Перетворення»'
    words: 500
    points:
      - 'Детальний розбір концепції «Перетворення» (основа філософії Курбаса): відмова
        від натуралістичного копіювання дійсності'
      - 'Театр умовності: сцена як простір створення нової, вищої естетичної та інтелектуальної
        реальності'
      - 'Символізм, експресіонізм та використання масок: метафора як головний інструмент
        впливу на глядача'
  - section: 'Герменевтика та ключові образи: Концепція «Розумного Арлекіна»'
    words: 500
    points:
      - 'Нова філософія акторської гри: актор як «Розумний Арлекін», свідомий творець
        і співрежисер образу'
      - 'Відхід від сліпого переживання: використання раціонального аналізу, дистанціювання
        та емоційної гігієни актора'
      - Система суворої фізичної, пластичної та ритмічної підготовки («музичний рух»),
        що випереджала час
  - section: 'Мова, стиль та поетика: Конструктивізм та синтез мистецтв'
    words: 500
    points:
      - 'Стилістичні інновації: синтез європейського експресіонізму та елементів українського
        вертепу'
      - 'Багаторічна співпраця зі сценографом Вадимом Меллером: впровадження конструктивістських,
        багаторівневих декорацій'
      - 'Поліфонія засобів виразності: використання світлотіні, ритміки, хору, кінопроєкцій
        та звукових фактур'
  - section: 'Мова, стиль та поетика: Драматургія Миколи Куліша'
    words: 500
    points:
      - Унікальний творчий тандем Леся Курбаса та драматурга Миколи Куліша як вершина
        українського театрального модернізму
      - 'Постановки знакових п''єс: «Народний Малахій», «Мина Мазайло», що деконструювали
        міщанство та національні травми'
      - Особливості ритміки тексту Куліша та їхнє візуальне втілення в синтаксисі
        курбасівських мізансцен
  - section: 'Деколонізаційний вимір: Подолання малоросійського штампу'
    words: 500
    points:
      - Знищення нав'язаного ззовні імперського міфу про українську культуру як виключно
        селянську, комічну або екзотичну
      - 'Активна агентність Курбаса: творення елітарного, глибоко урбаністичного та
        інтелектуального національного мистецтва'
      - 'Опір асиміляції: виведення українського театру з об''єкта етнографії в рівноправний
        суб''єкт світового культурного процесу'
  - section: 'Деколонізаційний вимір: Інтелектуальний опір тоталітаризму'
    words: 450
    points:
      - Послідовна критика державної політики стандартизації мистецтва і нав'язування
        соцреалістичних догм
      - Постановка «Маклени Граси» (1933) як прихована, відчайдушна алегорія трагедії
        української нації в лещатах диктатури
      - Мужність митця у відстоюванні творчої свободи перед обличчям неминучих репресій
        з боку радянського режиму
  - section: 'Підсумок та рецепція: Розстріл у Сандармосі'
    words: 300
    points:
      - Усунення Курбаса від керівництва театром «Березіль» восени 1933 року, його
        арешт у Москві та заслання
      - Розстріл геніального режисера 3 листопада 1937 року в карельському урочищі
        Сандармох серед сотень інших українських інтелектуалів
      - 'Трагічні наслідки для українського театру: штучний відкат до побутовізму
        та втрата європейського вектору розвитку'
  - section: 'Підсумок та рецепція: Вплив на сучасний театр'
    words: 300
    points:
      - Довготривала заборона імені та спадщини Курбаса в СРСР, процес його поступової
        реабілітації у другій половині ХХ ст.
      - Глибокий вплив ідей «перетворення» та «розумного арлекіна» на сучасних театральних
        режисерів в Україні та за кордоном
      - 'Світовий контекст філософії Курбаса: місце його театральної системи поруч
        із новаціями В. Меєргольда, Є. Вахтангова та Б. Брехта'
