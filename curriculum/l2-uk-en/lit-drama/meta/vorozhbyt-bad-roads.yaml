content_outline:
- section: 'Вступ: Постмайданний театр та документальна драма'
  words: 400
  points:
  - Феномен «нової драми» в Україні після 2014 року.
  - Документалізм як спосіб осмислення війни.
  - Місце Наталії Ворожбит у сучасній культурній ієрархії.
- section: 'Наталія Ворожбит: творчий шлях та еволюція стилю'
  words: 500
  points:
  - 'Київське походження та московський досвід: шлях до самоідентифікації.'
  - Співпраця з Royal Court та міжнародне визнання.
  - 'Творчий метод: від ''Кіборгів'' до ''Спіймати Кайдаша''.'
- section: 'Генеза «Поганих доріг»: історія створення'
  words: 400
  points:
  - Лондонське замовлення та робота з волонтерським досвідом.
  - Перетворення реальних інтерв'ю на художній текст.
  - 'Значення назви: дорога як простір небезпеки та переходу.'
- section: 'Структура п''єси: Шість новел про війну'
  words: 500
  points:
  - 'Жанрова специфіка: п''єса-альманах.'
  - 'Логіка розташування новел: від інтимного до соціального.'
  - Відмінності між п'єсою та фільмом у сюжетній структурі.
- section: 'Аналіз новел: I — Журналістка та Блокпост'
  words: 450
  points:
  - 'Автопортрет драматургині: страх і сповідь.'
  - 'Сюжет про дівчину на блокпосту: сексуальна напруга та влада.'
  - Метафора кордону між цивільним і військовим життям.
- section: 'Аналіз новел: II — Курка та Підвал'
  words: 500
  points:
  - 'Абсурд війни у новелі про збиту курку: ціна життя.'
  - 'Психологічний трилер у підвалі: captive woman та сепаратист.'
  - Стокгольмський синдром як модель стосунків під час агресії.
- section: 'Жіночий погляд: Деконструкція гендерних міфів'
  words: 450
  points:
  - Відмова від образу 'Берегині' на користь реальної жінки.
  - Тілесність і сексуальність у зоні бойових дій.
  - Жінка як активний суб'єкт і жертва обставин водночас.
- section: 'Поетика та мова: Суржик як маркер реальності'
  words: 500
  points:
  - 'Функція суржику в п''єсі: деколонізація мовного простору.'
  - Радикальний реалізм та відмова від цензури.
  - Діалог як основний рушій драматичної дії.
- section: 'Сценічне життя: Тріумф Тамари Трунової'
  words: 450
  points:
  - 'Українська прем''єра на Лівому березі: візуальна мова вистави.'
  - Робота акторського ансамблю та режисерська інтерпретація.
  - Шлях до Шевченківської премії 2022 року.
- section: 'Екранне втілення: Режисерський дебют Ворожбит'
  words: 400
  points:
  - Особливості кіноадаптації 2020 року.
  - 'Міжнародна рецепція: Венеційський кінофестиваль.'
  - Відмінності у фіналах та настроях фільму і п'єси.
- section: 'Деколонізація: Подолання міфів про Донбас'
  words: 450
  points:
  - Суб'єктність регіону через призму людських історій.
  - Спростування імперських наративів про 'російський Донбас'.
  - Правда як інструмент деколонізаційної боротьби.
