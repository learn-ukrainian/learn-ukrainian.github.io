slug: kulish-myna-mazailo
title: 'Микола Куліш: «Мина Мазайло» — філологічна комедія'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: І — Історичні умови'
    words: 500
    points:
      - Історичні умови появи твору в Харкові 1920-х років на тлі політики українізації
      - Співпраця Миколи Куліша з Лесем Курбасом та театром «Березіль» як феномен
        мистецького авангарду
  - section: 'Вступ та культурний контекст: ІІ — Актуальність'
    words: 250
    points:
      - Місце п'єси у центральному каноні Розстріляного відродження та української
        драматургії
      - Паралелі між мовними питаннями 1920-х років та сучасними процесами дерусифікації
  - section: 'Аналіз твору: Сюжет та структура: І — Розвиток сюжету'
    words: 500
    points:
      - 'Огляд фабули: намір Мини змінити прізвище як каталізатор гострої родинної
        кризи'
      - Жанрова специфіка твору як новаторської філологічної комедії, де слово стає
        подією
  - section: 'Аналіз твору: Сюжет та структура: ІІ — Джерела і конфлікт'
    words: 500
    points:
      - Світоглядний конфлікт між ідеєю асиміляції (Мина, тьотя Мотя) та національного
        самоусвідомлення (Мокій)
      - Вплив європейської традиції комедії характерів (від Мольєра) на драматургічну
        структуру твору
  - section: 'Герменевтика та ключові образи: І — Персонажі'
    words: 600
    points:
      - Психологічний розбір Мини Мазайла як абсолютного втілення малоросійського
        комплексу меншовартості
      - Роль тьоті Моті з Курська як рупора агресивного російського шовінізму та імперської
        пихи
      - 'Мокій та дядько Тарас: романтичний ідеалізм проти консервативного патріотизму'
  - section: 'Герменевтика та ключові образи: ІІ — Символіка'
    words: 500
    points:
      - Глибинна символіка зміни прізвища як акту національної зради, асиміляції та
        стирання пам'яті
      - Міфологічні підтексти та реінкарнація архетипу 'перевертня' в образі головного
        героя
  - section: 'Мова, стиль та поетика: І — Інновації'
    words: 500
    points:
      - 'Стилістичні інновації Куліша: мова як головний інструмент характеротворення
        та конфлікту'
      - Майстерне використання іронії, сарказму та інтелектуального гротеску
  - section: 'Мова, стиль та поетика: ІІ — Народна мова'
    words: 400
    points:
      - 'Робота з лексикою: філологічні каламбури, багатство синонімічних рядів української
        мови'
      - Контраст між живою українською мовою Мокія та канцеляритом або міщанським
        суржиком
  - section: Деколонізаційний вимір
    words: 750
    points:
      - Послідовне руйнування імперського міфу про вторинність чи 'меншовартість'
        української культури
      - Висміювання колоніального мислення, яке вимірює соціальний престиж виключно
        приналежністю до російської мови
      - Агентність українського героя (Мокій) та відстоювання національного Я через
        свідомий мовний вибір
  - section: Підсумок та рецепція
    words: 500
    points:
      - Трагічна заборона п'єси радянською цензурою та знищення покоління Розстріляного
        відродження
      - Світовий контекст твору та його фундаментальне значення для сучасних постколоніальних
        студій
      - Питання для дискусії щодо подолання спадку столітнього лінгвоциду в сучасній
        Україні
