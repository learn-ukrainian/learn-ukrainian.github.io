slug: lesia-ukrainka-dramatic-legacy
title: "Леся Українка як Драматург: Від «Блакитної Троянди» до «Лісової Пісні» — Театр Ідей"
word_target: 5000
content_outline:
- section: 'Вступ: I — Поетеса, яку ми не знаємо'
  words: 500
  points:
  - 'Леся Українка (1871–1913) у шкільній програмі: «Лісова пісня», «Contra Spem Spero», «Камінний господар» — але чи знаємо ми її повну драматургію?'
  - 'Корпус драм: 20+ драматичних творів написаних протягом 1887–1913 рр. — від символізму до неоромантизму і філософської драми.'
  - 'Лесина драматургія як найбільш недооцінена частина її спадщини — і найбільш актуальна для сучасного театру.'
- section: 'Вступ: II — Театральний контекст: між Ібсеном і Кропивницьким'
  words: 500
  points:
  - 'Час написання драм: 1890–1910-і рр. — Ібсен, Метерлінк, Стріндберг переосмислюють театр, і Леся Українка у цьому контексті.'
  - 'Реакція на «корифейський» театр: Леся не відкидає традицію, але рухається далі — від побутового реалізму до театру ідей.'
  - '"Блакитна троянда" (1896) як перший маніфест: символізм, ідеалізм і відмова від прямолінійного суспільного повчання.'
- section: 'Аналіз: «Лісова пісня» (1911) — між казкою і трагедією'
  words: 700
  points:
  - 'Жанрова специфіка: «феєрія» між казкою, символістською драмою і філософською поемою — де кожен жанр вносить свій сенс.'
  - 'Образна система: Мавка і Лукаш як архетипи природи і культури — що ця дихотомія означає для Лесі Українки?'
  - 'Деконструкція фіналу: Мавка не «помирає» у традиційному розумінні — що означає її трансформація у природу?'
- section: 'Аналіз: «Камінний господар» (1912) — Дон Жуан і влада'
  words: 700
  points:
  - 'Дон Жуан у Лесі: не еротичний авантюрист, а символ влади над чужими свободами — принципово нова інтерпретація.'
  - 'Долорес і жіноча суб''єктність: де Леся Українка йде далі Мольєра і Цорілья у зображенні жіночої психології.'
  - '"Господар каменю": метафора соціального порядку, що перетворює живе на мертве — де тут читається Леся Українка?'
- section: 'Аналіз: «Кассандра» (1907) — пророцтво і неприйнятна правда'
  words: 600
  points:
  - '"Кассандра" як особистий твір: поетка, якій не вірять і яка не може мовчати — автобіографічний пласт драми.'
  - Антична тема і сучасний зміст — пророчиця Трої як модель для будь-якого інтелектуала, чиї слова випереджають час.
  - 'Хор у «Кассандрі»: колективна відмова чути правду — суспільна психологія у давньогрецькій рамці.'
- section: 'Стилістика: Мова і ритм Лесиних драм'
  words: 500
  points:
  - 'Верлібр і рима у драмах: де Леся Українка вибирає вільний вірш і де — строфічну дисципліну, і чому.'
  - 'Монолог у Лесиних драмах: не пасивна розповідь, а дія — герой думає вголос, і це є акт самовизначення.'
  - 'Символістська образність: що приходить з Метерлінка і що принципово українське у Лесиній системі образів.'
- section: 'Деколонізаційна перспектива: Універсальна мова і національна ідентичність'
  words: 500
  points:
  - 'Леся Українка і «провінційність»: її вибір всесвітніх сюжетів як стратегія — Trojan War written in Ukrainian = equal.'
  - 'Відповідь на заперечення «немає у вас своєї культури»: кожна п''єса Лесі Українки є спростуванням цього твердження.'
  - Сучасні постановки Лесиних драм — де «Лісова пісня» і «Камінний господар» говорять про сьогодення.
- section: 'Підсумок: Леся Українка і сучасний театр'
  words: 500
  points:
  - Рецепція за межами України — постановки в Канаді, США, Польщі — де Лесина драматургія знаходить нових читачів.
  - 'Леся Українка і Неда Неждана: пряма лінія від філософської драми XIX до сучасного жіночого театру XXI ст.'
  - Питання до читача і глядача: що означає «бути вільним» у Лесиних драмах і що це означає сьогодні.
