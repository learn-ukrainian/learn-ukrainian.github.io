slug: karpenko-karyi-theatre
title: "Іван Карпенко-Карий: Від Бурлаки до Хазяїна — Мистецтво Корифея"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Театр Корифеїв і місце Тобілевича'
    words: 500
    points:
      - Іван Карпенко-Карий (Іван Тобілевич, 1845–1907) — актор, режисер, драматург
        і організатор театру водночас.
      - Родина Тобілевичів як театральна «династія» — брати Саксаганський і
        Садовський, сестра Садовська-Барілотті.
      - Перехід від «малоросійської трупи» до повноцінного соціально-психологічного
        театру.
  - section: 'Вступ та контекст: II — Заборони і Виживання'
    words: 500
    points:
      - Емський указ 1876 р. і заборона україномовного репертуару — стратегія
        обходу через «малоросійський жанр».
      - Арешт Тобілевича 1883–1884 рр. за зв'язки з народниками і вплив на
        формування соціальної тематики.
      - Мандрівна трупа як форма збереження — понад 40 міст за сезон.
  - section: 'Рання творчість: «Бурлака» і «Безталанна»'
    words: 600
    points:
      - «Бурлака» (1883) — дебют і засвоєння традиції Квітки та Кропивницького.
      - '«Безталанна» (1886) — перший трагічний конфлікт з психологічною глибиною: жертва і злочин.'
      - Соціальна тематика вже в ранніх п'єсах — злидні, безправ'я, кохання
        як жертовність.
  - section: 'Вершина комедіографії: «Сто тисяч» і «Мартин Боруля»'
    words: 700
    points:
      - «Сто тисяч» (1890) — скнара Герасим Калитка як архетип буржуазної
        жадібності.
      - '«Мартин Боруля» (1891) — трагікомедія про Боруляча, який прагне дворянства: перший психологічно складний протагоніст в українській драмі.'
      - Порівняння Борулі з мольєрівськими типами — «Міщанин-шляхтич» і
        «Мізантроп» в українському контексті.
  - section: 'Зрілий реалізм: «Хазяїн» і класова свідомість'
    words: 700
    points:
      - «Хазяїн» (1900) — перша українська п'єса з виразним капіталістичним
        антагоністом.
      - Образ Пузиря як деструктивний тип: гроші проти людяності.
      - «Хазяїн» і соціальна драма Горького — синхронний розвиток реалізму
        без запозичень.
  - section: 'Акторська метода і режисерський підхід'
    words: 500
    points:
      - Кропивницький як вчитель актора — і в чому Карпенко-Карий перевершив
        його як актор.
      - Принцип «жити на сцені» — психологізм до Станіславського.
      - Маруся Заньковецька у п'єсах Тобілевича — синергія тексту й виконання.
  - section: 'Деколонізаційна перспектива: Соціальна драма без «малоруського»
      комплексу'
    words: 500
    points:
      - Відмова від фольклорно-етнографічного обрамлення — вихід з «картинки про
        хохлів».
      - Соціально-класовий конфлікт як знак зрілості — українська драма не
        «провінційна», а рівна Ібсену.
      - Спадщина Корифеїв у радянський час — між замовчуванням і інструменталізацією.
  - section: 'Підсумок та спадщина'
    words: 500
    points:
      - Від Тобілевича до Курбаса — що «Молодий театр» 1917 р. успадкував і
        від чого відштовхнувся.
      - Карпенко-Карий у сучасному репертуарі — «Мартин Боруля» як постійний
        хіт.
      - Місце Корифеїв у повній системі координат українського театру.
