slug: skovoroda-dialogues-theatre
title: 'Діалоги як протодрама: Григорій Сковорода і Витоки Театру Ідей'
word_target: 5000
content_outline:
- section: 'Вступ та контекст: I — Сковорода між філософією і сценою'
  words: 500
  points:
  - Григорій Сковорода як творець унікального жанру філософського діалогу в українській
    літературі.
  - Концепція 'світу як театру' (Theatrum Mundi) у світогляді філософа.
  - 'Чому діалог є більш театральним за трактат: наявність дійових осіб та конфлікту
    думок.'
  - 'Академічна дискусія: чи писав Сковорода свої діалоги для читання вголос або постановки?'
- section: 'Вступ та контекст: II — Традиція шкільної драми та вертепу'
  words: 500
  points:
  - Вплив навчання в Києво-Могилянській академії на формування драматичного мислення
    Сковороди.
  - 'Шкільна драма XVIII століття: алегоричність, дидактизм та використання біблійних
    сюжетів.'
  - 'Вертеп як структурна модель: поділ світу на ''горішній'' (духовний) та ''долішній''
    (матеріальний).'
  - 'Спадкоємність образів: від барокових містерій до сковородинівських притч.'
- section: 'Аналіз «Розмови п''яти подорожніх»: I — Персонажі як драматичні маски'
  words: 500
  points:
  - 'Представлення дійових осіб: Григорій, Афанасій, Яків, Єрмолай, Лонгін.'
  - Кожна фігура як втілення певного психотипу та соціального статусу (наприклад,
    Афанасій як шукач імперських чинів).
  - Система персонажів як 'dramatis personae' філософської вистави.
  - Внутрішні ремарки та жестикуляція персонажів у тексті.
- section: 'Аналіз «Розмови п''яти подорожніх»: II — Сократична маєвтика та шлях до
    щастя'
  words: 500
  points:
  - Метафора дороги як сценічного простору, де розгортається дія.
  - Використання сократівського методу (маєвтики) для розвитку сюжету діалогу.
  - 'Інтелектуальна напруга: перехід від суперечки до спільного відкриття істини.'
  - Катарсис через усвідомлення 'радості серця' як фінал драматичної дії.
- section: 'Аналіз діалогу «Наркіс»: Самопізнання як внутрішній монолог'
  words: 600
  points:
  - 'Діалог ''Наркіс. Розмова про те: пізнай себе'' як психологічна драма.'
  - 'Переосмислення античного міфу про Нарциса: дзеркало як інструмент метаморфози.'
  - 'Двоголосся тексту: розмова між ''зовнішнім я'' та ''внутрішньою людиною''.'
  - 'Елементи монодрами: самопізнання як найнапруженіша сцена людського життя.'
  - Значення самотності як позитивного театрального фону.
- section: 'Театральні прийоми: Сродна праця та концепція катарсису'
  words: 500
  points:
  - Концепція 'сродної праці' як драматургічний принцип розподілу ролей у житті.
  - 'Метафора ''грати свою роль'': небезпека ''несродності'' як екзистенційної фальші.'
  - Використання вставних байок та пісень як елементів proto-mise en scène.
  - Сковородинівський сміх та звільнення від марноти як форма очищення душі.
- section: 'Стилістика та мова: Барокова поліфонія та ритміка прози'
  words: 500
  points:
  - Багатомовність діалогів (койне, латина, грецька) як засіб типізації персонажів.
  - Риторичні фігури (антитеза, оксюморон) як інструменти створення драматичного ефекту.
  - 'Музичність та ритмічність фрази: вплив композиторського досвіду Сковороди.'
  - Роль діалогічного мовлення у руйнуванні канонів сухої богословської прози.
- section: 'Деколонізаційна перспектива: I — Спростування радянських міфів про ''простачка'''
  words: 500
  points:
  - Аналіз радянської ідеологеми 'бідного селянина-атеїста' проти реального образу
    Сковороди.
  - Сковорода як представник козацької старшинської інтелігенції, а не неосвіченого
    селянства.
  - Християнський містицизм Сковороди як основа його інтелектуальної незалежності.
  - Деконструкція міфу про Сковороду як 'початок російської філософії'.
- section: 'Деколонізаційна перспектива: II — Інтелектуальна суб''єктність проти імперської
    машини'
  words: 500
  points:
  - Мандрівне життя як радикальний політичний жест відмови від імперської служби.
  - Слобожанщина як простір української свободи, протиставлений Петербургу.
  - 'Чому Сковорода відмовив Катерині II: збереження внутрішньої автономії в умовах
    ліквідації Гетьманщини.'
  - Філософія Сковороди як маніфест індивідуальної та національної суб'єктності.
- section: 'Підсумок та спадщина: Сковорода на сучасній театральній сцені'
  words: 500
  points:
  - Вплив діалогів на становлення нової української літератури (Котляревський, Квітка-Основ'яненко).
  - 'Рецепція Сковороди Лесем Курбасом: пошук філософського театру ідей.'
  - Сучасні театральні інтерпретації діалогів Сковороди (Театр на Подолі, 'Слово і
    голос').
  - Діалог Сковороди як вічно жива форма інтелектуальної комунікації.
