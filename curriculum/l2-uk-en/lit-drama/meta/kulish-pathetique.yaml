slug: kulish-pathetique
title: "«Патетична Соната»: Революція, Інтелектуал і Трагедія Нації"
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 600
    points:
      - Історичні умови появи твору (написано 1929 р., доба Розстріляного відродження).
      - Місце в літературному каноні та чому текст залишається гостро актуальним сьогодні
        у розумінні національної долі.
  - section: 'Аналіз твору: Сюжет та структура'
    words: 500
    points:
      - 'Ключові етапи розвитку сюжету: динаміка Революції 1917–1918 років у провінційному
        місті.'
      - Впливи світової драматургії та новаторська форма Куліша (кінороман, музична
        композиція).
  - section: 'Аналіз твору: Конфлікт як рушійна сила'
    words: 450
    points:
      - 'Зіткнення трьох ідеологій: української (національної), російської (імперської)
        та більшовицької.'
      - Трагічна любовна та ідеологічна лінія Ілька та Марини.
  - section: 'Герменевтика: Система персонажів'
    words: 550
    points:
      - Марина і Ступай-Ступаненко як втілення української незалежницької ідеї.
      - Генерал Пероцький (російський монархізм) та Лука, Гамар (більшовицький прагматизм).
      - Еволюція, зрада і трагедія поета Ілька Юги.
  - section: 'Герменевтика: Символіка та підтексти'
    words: 500
    points:
      - Детальний розбір символіки 'Патетичної сонати' Л. ван Бетховена як структуротворчого
        ядра.
      - 'Архетипи та метафори: підвал (більшовики), перший поверх (білогвардійці),
        горище (українські мрійники).'
  - section: Мова, стиль та поетика
    words: 550
    points:
      - 'Стилістичні інновації автора: музичність, ліризм монологів від першої особи
        (''Я'').'
      - Особливості ритміки та мовної поліфонії (мовна характеристика як маркер світогляду).
  - section: 'Деколонізаційний вимір: Руйнування міфу'
    words: 550
    points:
      - Як п'єса спростовує радянський міф про беззастережну підтримку більшовиків.
      - Деконструкція російського імперіалізму ('На московському кумачі України не
        вишити').
  - section: 'Деколонізаційний вимір: Опір та агентність'
    words: 550
    points:
      - 'Агентність українського героя: перехід від романтичних мрій до усвідомлення
        необхідності збройної боротьби.'
      - Опір асиміляції та культурне самоствердження на тлі тотальної руїни.
  - section: Підсумок та рецепція
    words: 750
    points:
      - 'Історія цензури: заборона в Україні (1930), тріумф у Москві (1931) та повна
        ліквідація твору (1932).'
      - Вплив на наступні покоління письменників та включення у світовий театральний
        контекст.
      - 'Питання для дискусії: вибір між духовністю і силою, компроміс чи боротьба.'
