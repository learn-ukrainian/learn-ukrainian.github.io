slug: vynnychenko-european-stage
title: 'Володимир Винниченко на Європейській Сцені: Психологічна Драма'
word_target: 5000
content_outline:
- section: 'Вступ: Винниченко як драматург європейського масштабу'
  words: 500
  points:
  - Популярність п'єс Винниченка в Європі 1920-х років.
  - Переклади німецькою, італійською, польською мовами.
  - Відхід від народницького театру до модерної психологічної драми.
- section: Філософське підґрунтя драми Винниченка
  words: 600
  points:
  - Концепція «чесності з собою».
  - Вплив ідей Ніцше, Фройда, Ібсена.
  - Конфлікт між інстинктами (бажаннями) та соціальною мораллю.
- section: «Чорна Пантера і Білий Ведмідь» (1911)
  words: 700
  points:
  - Конфлікт мистецтва і життя, творчості та обов'язку.
  - 'Образи Рити та Корнія: психологічна глибина та амбівалентність.'
  - Розрив із традиційною мораллю.
- section: «Брехня» та «Гріх» (1910, 1919)
  words: 800
  points:
  - '«Брехня» (1910): проблема правди і брехні в людських стосунках.'
  - '«Гріх» (1919): революція, кохання і зрада.'
  - 'Жіночі персонажі Винниченка: сильні, суперечливі, емансиповані.'
- section: '«Закон» (1923): Між біологією та етикою'
  words: 700
  points:
  - Тема материнства, сурогатного материнства та подружньої вірності.
  - Скандальність та провокативність сюжету для свого часу.
  - Сутичка раціонального («закон») та ірраціонального.
- section: 'Сценічна доля: Курбас та європейські театри'
  words: 600
  points:
  - Постановки «Молодого театру» Леся Курбаса.
  - Успіх на сценах Берліна, Лейпцига, Праги, Рима.
  - 'Сприйняття європейською критикою: Винниченко в контексті експресіонізму.'
- section: 'Деколонізаційна перспектива: Інтеграція в Європу'
  words: 600
  points:
  - Українська драма як повноцінна частина європейського театрального процесу.
  - Подолання імперського стереотипу про «селянськість» української культури.
  - Винниченко як репрезентант міської, інтелектуальної України.
- section: 'Підсумок: Спадщина та сучасне прочитання'
  words: 500
  points:
  - Заборона творів у СРСР на понад 50 років.
  - Повернення п'єс на українську сцену в часи незалежності.
  - Актуальність етичних і психологічних проблем у його драмах.
