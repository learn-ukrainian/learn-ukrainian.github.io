slug: kotliarevsky-drama-tradition
title: "«Наталка Полтавка» і Народження Українського Театру: Котляревський як Засновник Традиції"
word_target: 5000
content_outline:
- section: 'Вступ: I — 1819 рік і початок всього'
  words: 500
  points:
  - 'Іван Котляревський (1769–1838): відомий як автор «Енеїди», але саме «Наталка Полтавка» (1819) заклала основи живого театру.'
  - 'Контекст прем''єри: Полтавський театр Шираєва 1819 р. — перша вистава на живій українській народній мові, а не на «театральному малоросійському».'
  - 'Чому «Наталка» є початком: не перша п''єса українською, але перша, що стала народним репертуаром на покоління вперед.'
- section: 'Вступ: II — «Москаль-чарівник» і парний дебют'
  words: 500
  points:
  - '«Москаль-чарівник» (1819): комедія-пара до «Наталки» — жанровий контраст і спільна проблематика.'
  - 'Водевіль і народна драма: де Котляревський грає за правилами жанру і де відступає на користь народної традиції.'
  - 'Дві п''єси як дві моделі: трагікомедія народного кохання і соціальна комедія про чужого і свого.'
- section: 'Аналіз: «Наталка Полтавка» — сюжет і підтекст'
  words: 700
  points:
  - 'Любовний трикутник: Наталка, Петро і Возний — не лише «хлопець і дівчина», а класовий і ціннісний конфлікт.'
  - 'Образ Наталки: самостійна жінка, що захищає власну гідність — не пасивна героїня народної пісні, а суб''єкт.'
  - 'Пісні як конструктивний елемент: котляревські вставні пісні між «реальним» діалогом і ліричним відступом.'
- section: 'Аналіз: Мова і образи народної культури'
  words: 700
  points:
  - 'Полтавський діалект як художня норма: Котляревський легітимізує народну мову як літературну не абстрактно, а через живий діалог.'
  - 'Прислів''я і приказки у тексті: усна традиція, що входить у письмову п''єсу і не втрачає свіжості.'
  - 'Гумор Возного: комічний образ, що критикує соціальну ієрархію без прямої дидактики.'
- section: 'Аналіз: Пісенна драматургія і жанровий синтез'
  words: 600
  points:
  - 'Пісня «Віють вітри»: від п''єси до народного побуту — як художній текст стає частиною народної пам''яті.'
  - 'Водевільний принцип: розв''язка через непередбачуваний поворот подій — і де Котляревський його порушує.'
  - Зв'язок з сентиментальними традиціями XIX ст. — Котляревський між Просвітництвом і Романтизмом.
- section: 'Від «Наталки» до Корифеїв: Театральна тяглість'
  words: 500
  points:
  - 'Кропивницький, Карпенко-Карий, Старицький: що вони успадкували від Котляревського і від чого відштовхнулися.'
  - '"Театр корифеїв" (1882–1900-і): побутова драма, яка почалася з Котляревського і стала системою.'
  - Місце «Наталки» в сучасному репертуарі — не «пережиток», а «жива класика» у руках режисерів.
- section: 'Деколонізаційна перспектива: Мова на сцені як право'
  words: 500
  points:
  - 'Котляревський і Емський указ 1876 р.: від «Наталки» 1819 р. до заборони сцени — 57 років свободи і повернення до тиші.'
  - 'Що вщухло після 1876 р. і що залишилося в підпіллі: виживання репертуару як культурна стійкість.'
  - 'Театр як декларація: кожна вистава «Наталки» — акт присутності, а не лише художня подія.'
- section: 'Підсумок: Котляревський і сучасна сцена'
  words: 500
  points:
  - Сучасні переосмислення «Наталки» — де режисери знаходять свіжий сенс у тексті XIX ст.
  - 'Котляревський і Леся Українка, і Карпенко-Карий: три покоління одного театру — що їх об''єднує і що розділяє?'
  - Питання для обговорення: що зробила б Наталка у 2024 р. — і чому це питання важливе.
