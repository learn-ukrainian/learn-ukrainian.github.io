slug: nezdana-contemporary-women-drama
title: "Неда Неждана: Жіночий Театр у Постсовєтській Україні — Форма, Голос і Опір"
word_target: 5000
content_outline:
- section: 'Вступ: I — Жіноче письмо і жіночий театр у постколоніальній Україні'
  words: 500
  points:
  - 'Неда Неждана (нар. 1962): найважливіший живий драматург України — і найменш знаний за кордоном.'
  - 'Жіночий театр як категорія: що означає «жіноча п''єса» і де ця категорія обмежує, а де — відкриває?'
  - '"New Drama" в Україні 1990–2010-х: Неждана серед Ворожбит, Тіліки, Коломійця — нове покоління після корифеїв.'
- section: 'Вступ: II — Театральний контекст: між традицією і авангардом'
  words: 500
  points:
  - 'Чому 1990-і — переломний момент: скасування совєтської цензури і водночас комерціалізація театру — два тиски на новий театр.'
  - 'Неждана і «Нова сцена»: де вона знаходить простір для ризику у часи, коли ризик не продається.'
  - '"Культура без держави": жіночий театральний проект у десятиліття, коли держава не думала про культуру.'
- section: 'Аналіз: «Той, що відчиняє двері» — жіноча ідентичність і вибір'
  words: 700
  points:
  - 'Центральний конфлікт: жінка між власним призначенням і тиском сімейних і соціальних ролей — без однозначного рішення.'
  - '"Двері" як символ: що залишається за порогом вибору і що відбувається з тим, хто відчиняє.'
  - 'Структурна особливість: часова нелінійність як спосіб зображення жіночого досвіду.'
- section: 'Аналіз: «Угода» — влада і тіло'
  words: 700
  points:
  - 'Тема договору: угода між людиною і системою — де закінчується компроміс і починається зрада себе?'
  - 'Мова влади у п''єсі: як Неждана відтворює мову бюрократії і патріархату через театральний діалог.'
  - 'Жіноче тіло як поле битви: фізичний і психологічний вимір тиску у пострадянській системі.'
- section: 'Стилістика: Мінімалізм і ритмічна точність'
  words: 600
  points:
  - 'Діалог Нежданої: короткі репліки, пауза як частина тексту — де мовчання говорить більше за слова.'
  - '"Театр жесту": що ремарки Нежданої говорять акторові і режисерові — вимоги до тіла і простору.'
  - 'Порівняння з Карелом Чапеком і Гаролом Пінтером: мінімалізм як міжнародна традиція і як українська відповідь.'
- section: 'Неждана і традиція: Від Лесі Українки до сьогодні'
  words: 500
  points:
  - 'Пряма лінія: де Неждана продовжує Лесин проект «театру ідей» і де принципово відходить від нього.'
  - 'Ворожбит і Неждана: два різних жіночих голоси в сучасній українській драмі — без конкуренції, у діалозі.'
  - 'Курбас і авангард: чи знає Неждана Курбаса і де це відчувається у її практиці?'
- section: 'Деколонізаційна перспектива: Жіночий театр як подвійна деколонізація'
  words: 500
  points:
  - 'Деколонізація від совєтського патріархату і від «радянського» репертуару — подвійна боротьба Нежданої.'
  - 'Жіноча режисура і жіночий текст: що змінюється, коли жінка контролює всі рівні театральної комунікації.'
  - Сучасний театр і 2022 рік: де «Угода» і «Той, що відчиняє двері» читаються по-новому в часи повномасштабного вторгнення.
- section: 'Підсумок: Неждана і майбутнє театру'
  words: 500
  points:
  - '"New Drama" після 2014 і після 2022 — як змінився укрансько-театральний дискурс і де Неждана в ньому.'
  - Міжнародні постановки Нежданої — де її п''єси перекладені і поставлені і що це говорить про їхню силу.
  - 'Питання до студента: що «жіночий театр» означає у час, коли жінки бойової готовності стають нормою?'
