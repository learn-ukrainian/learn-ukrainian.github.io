slug: kulish-dramaturgy
title: Kulish Dramaturgy
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови'
    words: 550
    points:
      - Феномен 1920-х років та політика українізації як тактичний крок імперії
      - 'Тандем Миколи Куліша та Леся Курбаса: народження театру «Березіль»'
      - Відмова від етнографічного «шароварного» театру на користь європейського модернізму
  - section: 'Вступ та культурний контекст: II — Місце в каноні'
    words: 550
    points:
      - Микола Куліш як центральна постать драматургії Розстріляного Відродження
      - 'Участь у ВАПЛІТЕ та Літературній дискусії: орієнтація на психологічну Європу'
      - 'Актуальність творів Куліша сьогодні: анатомія постколоніальної травми'
  - section: 'Аналіз твору: Сюжет та структура: I — Драматичний конфлікт'
    words: 700
    points:
      - 'Комедія «Мина Мазайло»: зміна прізвища як відмова від власної ідентичності'
      - '«Патетична соната»: трагічний конфлікт між національним ідеалом та більшовицьким
        фанатизмом'
      - '«Маклена Граса»: філософський вимір конфлікту людини та жорстокої системи'
  - section: 'Аналіз твору: Сюжет та структура: II — Впливи та новаторство'
    words: 550
    points:
      - Поєднання української вертепної традиції з європейським експресіонізмом
      - 'Новаторська композиція: паралельна дія, фрагментарність, кінематографічність
        сцени'
      - Сюжет, підпорядкований музичним або філологічним законам (ритм, поліфонія)
  - section: 'Герменевтика та ключові образи: I — Символіка та архетипи'
    words: 550
    points:
      - Музика як повноцінна дійова особа («Патетична соната» Бетховена як архетип
        бунту)
      - 'Символіка мови: слово як інструмент влади, маркер «свого» і «чужого»'
      - Міфологема загубленої нації та пошуку «європейського берега»
  - section: 'Герменевтика та ключові образи: II — Еволюція персонажів'
    words: 550
    points:
      - 'Галерея характерів: від комічного міщанина Мини до трагічної Марини'
      - Тьотя Мотя як уособлення агресивного імперського шовінізму
      - 'Соціальна анатомія суспільства: як ідеологія ламає людські долі'
  - section: 'Мова, стиль та поетика: I — Стилістичні інновації'
    words: 550
    points:
      - '«Мина Мазайло» як геніальна філологічна комедія: лінгвістичний аналіз реплік'
      - Суржик, неологізми та мовна гра як інструменти гострої сатири
      - Поліфонія та ритмізована проза, що створює музичність драматичного тексту
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 550
    points:
      - Деконструкція фасадної радянської «українізації»
      - Висміювання комплексу меншовартості («малоросійства») та малоросійського провінціалізму
      - 'Агентність українців: утвердження права на модерну, урбаністичну, повноцінну
        націю'
  - section: 'Підсумок та рецепція: I — Спадщина та світовий контекст'
    words: 450
    points:
      - 'Трагічний фінал: розстріл Куліша в Сандармосі як розправа над українським
        авангардом'
      - Тривала заборона спадщини та її повернення в європейський і світовий контекст
      - 'Значення Куліша для сучасного театру: незавершені уроки деколонізації'
