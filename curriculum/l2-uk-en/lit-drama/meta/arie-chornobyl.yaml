content_outline:
- section: 'Вступ: Панорама сучасної української драми та Павло Ар''є'
  words: 400
  points:
  - Огляд контексту появи «нової драми» в Україні після 2010 року.
  - Павло Ар'є як драматург-інтелектуал, що поєднує українське коріння та європейську
    школу.
  - Місце п'єси «На початку і наприкінці часів» у сучасному каноні.
- section: 'Простір Чорнобиля: Від зони відчуження до зони свободи'
  words: 600
  points:
  - Зона як художній простір (хронотоп), де час тече за іншими правилами.
  - Протиставлення 'чистого' лісу та 'брудного' цивілізованого світу (Києва).
  - 'Філософія самоселів: чому повернення на радіоактивну землю є актом свободи.'
- section: 'Хтонічний світ Баби Прісі: Зв''язок із землею та потойбіччям'
  words: 800
  points:
  - Аналіз образу Баби Прісі як архетипу Матері-Землі та хтоничної богині.
  - Здатність Прісі спілкуватися з силами природи та потойбічними істотами.
  - 'Темна сторона персонажа: вбивство солдата як акт сакрального захисту роду.'
- section: 'Міфологія та містика: Русалки, гриби та «інша» реальність'
  words: 700
  points:
  - 'Роль магічного реалізму в творі: як фантастичне стає частиною повсякденності.'
  - Чорнобильські русалки як символ природи, що повернула собі владу над техносферою.
  - Гриби як метафора зв'язку з корінням та інструмент виходу за межі реальності.
- section: 'Сюжетний трикутник: Побут і буття в серці зони'
  words: 600
  points:
  - 'Взаємини Баби Прісі, Слави та Вовчика: три покоління української травми.'
  - Донька Слава як втілення невдалої спроби втечі в цивілізацію.
  - Онук Вовчик як чиста свідомість, що не знає страху перед Зоною.
- section: 'Лінгвістична палітра: Суржик як інструмент драми'
  words: 500
  points:
  - Аналіз використання суржику як засобу характеристики персонажів.
  - Суржик як мова 'прикордоння' між містом і селом, між життям і смертю.
  - Естетика та функціональність нелітературної мови в сучасній українській драмі.
- section: 'Деколонізаційний дискурс: Спростування радянських міфів про Чорнобиль'
  words: 800
  points:
  - Чорнобильська катастрофа як фінал радянської епохи та початок нової української
    суб'єктності.
  - Відмова від ролі 'жертви катастрофи' на користь ролі 'господаря своєї землі'.
  - 'Деколонізація пам''яті: очищення території від імперських наративів через міф
    та фольклор.'
- section: 'Інтерпретація на сцені та в кіно: П''єса та фільм «Брама»'
  words: 600
  points:
  - Порівняльний аналіз вистави «Сталкери» та кінострічки «Брама».
  - Роль візуальної естетики (грим, локації) у створенні чорнобильського міфу.
  - Вплив твору на сучасне українське мистецтво та сприйняття Чорнобиля в світі.
