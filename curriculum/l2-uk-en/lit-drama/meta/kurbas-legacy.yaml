slug: kurbas-legacy
title: "Спадщина Леся Курбаса: Від Розстрілу до Реабілітації"
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 800
    points:
      - 'Історичні умови: зародження модерного українського театру на противагу традиційному
        етнографічно-побутовому'
      - Місце Леся Курбаса в каноні Розстріляного відродження та європейському театральному
        авангарді
      - Чому методологія театру «Березіль» є важливою сьогодні для національної ідентичності
  - section: 'Аналіз твору: Сюжет та структура'
    words: 900
    points:
      - 'Специфіка методу Курбаса: режисура як філософський акт і самостійний багаторівневий
        наратив'
      - Концепція 'перетворення' на противагу імперській системі психологічного 'переживання'
      - Етапні вистави (співпраця з М. Кулішем) як приклади сюжетно-структурної інновації
        на сцені
  - section: Герменевтика та ключові образи
    words: 900
    points:
      - 'Концепція ''розумного арлекіна'': актор-мислитель та його дистанціювання
        від образу'
      - 'Конструктивізм та символіка простору: сценографія Вадима Меллера як повноцінний
        дійовий елемент'
      - Архетипи та європейські міфологічні підтексти у виставах 'Березоля'
  - section: Мова, стиль та поетика
    words: 900
    points:
      - 'Створення нової театральної мови: ритмопластика, метафоричний жест та динамічна
        мізансцена'
      - 'Стилістичні інновації: синтез театру, кіно, акробатики та музики у єдине
        ціле'
      - Експресіонізм як інструмент візуалізації внутрішнього конфлікту епохи
  - section: Деколонізаційний вимір
    words: 900
    points:
      - 'Руйнування імперського міфу: відмова від образу провінційної, розважальної
        ''Малоросії'''
      - 'Агентність Курбаса: свідома переорієнтація української культури на європейські
        авангардні тенденції'
      - 'Опір асиміляції та політичний вирок: соцреалізм як зброя знищення вільного
        мистецтва'
  - section: Підсумок та рецепція
    words: 700
    points:
      - 'Трагедія в Сандармосі: наслідки фізичного знищення режисера для української
        культури'
      - Вплив спадщини Курбаса на світовий контекст та наступні покоління митців
      - 'Питання для дискусії: актуальність ідей філософського театру в умовах сучасної
        української культури'
