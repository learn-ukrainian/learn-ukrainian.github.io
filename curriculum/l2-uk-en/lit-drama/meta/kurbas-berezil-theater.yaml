slug: kurbas-berezil-theater
title: "«Березіль»: Театр Леся Курбаса як Лабораторія Авангарду"
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Створення «Березоля»'
    words: 600
    points:
      - Заснування Мистецького об'єднання «Березіль» (1922) у контексті Розстріляного
        відродження.
      - 'Символіка назви: «Березіль» як весна, оновлення та бунт проти консервативного
        театру.'
      - Переїзд до Харкова (1926) і статус головного експериментального майданчика
        УСРР.
  - section: 'Вступ та культурний контекст: II — Естетика і філософія'
    words: 600
    points:
      - Критика етнографічного реалізму та відмова від традиційної «шароварщини».
      - 'Концепція «розумного арлекіна»: актор як інтелектуальний творець.'
      - 'Орієнтація на європейський авангард: експресіонізм, конструктивізм, театральний
        синтез.'
  - section: 'Аналіз твору: Сюжет та структура: I — Драматургія Куліша'
    words: 900
    points:
      - Творчий симбіоз Леся Курбаса та драматурга Миколи Куліша.
      - Аналіз конфлікту утопії та жорсткої реальності у виставі «Народний Малахій».
      - 'Сатирична структура «Мини Мазайла»: філологічний сюжет як відображення суспільних
        зсувів.'
  - section: 'Аналіз твору: Сюжет та структура: II — Режисерські інновації'
    words: 600
    points:
      - 'Принцип «перетворення»: створення метафоричного образу замість побутового
        копіювання.'
      - Монтаж атракціонів та фрагментована структура вистав.
      - Роль музики, ритму і світла в управлінні емоційним сприйняттям глядача.
  - section: Герменевтика та ключові образи
    words: 600
    points:
      - Сценографія Вадима Меллера як самостійний семіотичний текст (кінетичні конструкції).
      - Архетипи загубленої людини в тоталітарному механізмі (образи Малахія та Маклени).
      - 'Символіка театрального жесту: тіло актора як ієрогліф сенсу.'
  - section: Мова, стиль та поетика
    words: 600
    points:
      - 'Синтетична поетика: поєднання пластики, акробатики, хореографії та тексту.'
      - Динамізм і рваний синтаксис сценічного діалогу.
      - 'Поліфонія сцени: багатошаровість візуальної та вербальної мови «Березоля».'
  - section: Деколонізаційний вимір
    words: 600
    points:
      - Злам імперського міфу про українців як виключно сільську націю через урбаністичний
        театр.
      - «Березіль» як акт культурного суверенітету і вихід з провінційного «гетто».
      - Протистояння вимогам соцреалізму та звинувачення Курбаса в буржуазному націоналізмі.
  - section: Підсумок та рецепція
    words: 500
    points:
      - 'Трагедія 1933 року: розгром театру та розстріл творців у Сандармосі (1937).'
      - Довге забуття та реабілітація спадщини Курбаса в незалежній Україні.
      - Вплив ідей «Березоля» на сучасний світовий та український авангардний театр.
