content_outline:
- section: 'Вступ: Ірина Цілик — на перетині літератури та візуальних медіа'
  words: 600
  points:
  - Становлення Ірини Цілик як письменниці та режисерки в контексті сучасної української
    культури.
  - Освіта в університеті Карпенка-Карого та перші кроки в кіно (фільми «Помин», «Дім»).
  - Взаємозв'язок літературного тексту та кінематографічного образу в її творчості.
- section: 'Контекст: Розквіт нової української документалістики'
  words: 500
  points:
  - Вплив Революції Гідності та початку російської агресії на зміну кіномови в Україні.
  - 'Феномен «нової хвилі» документального кіно: від фіксації подій до глибокої емпатії.'
  - Участь Цілик у проекті «Невидимий батальйон» та перші спроби роботи з темою війни.
- section: '«Земля блакитна, ніби апельсин»: Катарсис через творчість'
  words: 850
  points:
  - Історія створення фільму про родину з Красногорівки в «червоній зоні».
  - 'Аналіз центральної метафори: назва за віршем Поля Елюара як символ стійкості
    уяви.'
  - 'Творчість як інструмент виживання: як Ганна та її діти долають травму обстрілів
    через зйомки власного кіно.'
- section: 'Художній метод: Поетика спостереження та метакінематограф'
  words: 800
  points:
  - Використання прийому «фільм у фільмі» для створення багаторівневої оповіді.
  - 'Естетика кадру: поєднання побутового реалізму та візуальної поезії (робота оператора
    Вячеслава Цвєткова).'
  - Відмова від дидактики на користь глибокого спостереження за людськими стосунками.
- section: 'Від книги до екрана: Сценарій «Я і Фелікс» як рефлексія 90-х'
  words: 850
  points:
  - 'Процес адаптації роману Артема Чеха «Хто ти такий?»: від прози до ігрового сценарію.'
  - Тема травмованої ветеранської пам'яті (афганський досвід Фелікса) як провісник
    сучасних викликів.
  - 'Культурна вага акторського ансамблю: роль Юрія Іздрика як символ тяглості української
    інтелігенції.'
- section: 'Герої та характери: Сила вразливості в умовах війни'
  words: 500
  points:
  - 'Центральне місце жінки-матері у світі Цілик: Ганна як символ незламного дому.'
  - 'Дитячий погляд на війну: поєднання наївності, гри та гіркої мудрості.'
  - 'Героїзм повсякденності: як зберегти людяність і здатність до мрії в екстремальних
    обставинах.'
- section: 'Деколонізація наративу: Україна без «імперських окулярів»'
  words: 500
  points:
  - Демонтаж радянського міфу про «спільну долю» через унікальність індивідуального
    українського досвіду.
  - 'Вихід із тіні російського культурного поля: як Цілик формує автентичний український
    голос у світовому кіно.'
  - Спростування пропагандистських кліше про «внутрішній конфлікт» засобами мистецтва.
- section: 'Вплив: Суб''єктність сучасного фільму на світовій арені'
  words: 400
  points:
  - Світовий резонанс перемоги на Sundance та роль культурної дипломатії під час повномасштабного
    вторгнення.
  - 'Ірина Цілик як членкиня журі Каннського фестивалю: визнання професіоналізму української
    школи.'
  - 'Спадщина та перспективи: як роботи режисерки змінюють сприйняття сучасної України
    у світі.'
