slug: kulish-narodnyi-malahii
title: "«Народний Малахій»: Утопія і Безумство у Драмі Куліша"
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні умови появи твору'
    words: 500
    points:
      - 'Україна 1920-х років: зіткнення ідей національного відродження (українізація)
        та більшовицького тоталітаризму.'
      - Феномен творчого тандему Миколи Куліша та Леся Курбаса (театр «Березіль»).
      - '1927 рік як рубіж: створення п''єси напередодні згортання свобод і початку
        репресій.'
  - section: 'Вступ: Канон та сучасна актуальність'
    words: 350
    points:
      - Місце п'єси «Народний Малахій» у каноні Розстріляного відродження та модерністської
        драматургії.
      - 'Актуальність теми масової свідомості: як ідеологія інфікує індивіда і руйнує
        емпатію.'
      - Сучасне звучання твору в умовах гібридних інформаційних воєн.
  - section: 'Аналіз твору: Джерела та сюжетна канва'
    words: 450
    points:
      - Сюжет про поштаря-міщанина, що повірив в утопію негайної реформи людини.
      - 'Шлях Малахія: від Харкова до урядових установ, лікарні Сабурової дачі та
        публічного будинку.'
      - 'Інтертекстуальне коріння: вплив європейського експресіонізму, Біблії та української
        барокової драми.'
  - section: 'Аналіз твору: Конфлікт як рушійна сила'
    words: 450
    points:
      - Зіткнення фанатичної абстракції («блакитної мрії») з жорстокістю реальності.
      - 'Внутрішній конфлікт героя: межа між ідеалізмом і клінічним божевіллям.'
      - 'Соціальний конфлікт: людина як гвинтик проти людини-творця в умовах диктатури.'
  - section: 'Герменевтика: Символіка та міфологічні підтексти'
    words: 500
    points:
      - Концепт «блакитної мрії» як уособлення недосяжного, фальшивого раю.
      - Образ «Нового Єрусалима» як пародія на радянське світле майбутнє.
      - Топотос публічного будинку як метафора зґвалтованої постреволюційної України.
  - section: 'Герменевтика: Система персонажів та Дон Кіхот'
    words: 450
    points:
      - Малахій як український радянський Дон Кіхот, озброєний партійними декретами.
      - Трагедія доньки Люби — розплата за батьківські ілюзії, символ втраченого покоління.
      - 'Кум Тарас та родина: втілення побутового консерватизму, нездатного протистояти
        системі.'
  - section: 'Мова, стиль та поетика: Інновації та синтез'
    words: 450
    points:
      - 'Жанровий синтез: поєднання трагедії, фарсу, комедії і гротеску.'
      - 'Експресіоністична поетика Куліша: фрагментарність, сомнамбулізм сцен, маски
        замість осіб.'
      - Відхід від етнографічного реалізму до філософської драматичної притчі.
  - section: 'Мова, стиль та поетика: Ритміка і синтаксис'
    words: 350
    points:
      - 'Діагностика через мову: суміш партійної новомови, канцеляризмів та живої
        народної мови.'
      - Специфічна ритміка божевільних монологів героя.
      - Синтаксичні злами як відображення розщепленої свідомості радянської людини.
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 500
    points:
      - Деконструкція московсько-більшовицького міфу про силову зміну природи людини.
      - 'Викриття лицемірства системи: абстрактна любов до пролетаріату супроводжується
        знищенням конкретних людей.'
      - Спростування радянського клейма про п'єсу як просто «дрібнобуржуазну сатиру».
  - section: 'Деколонізаційний вимір: Агентність та опір'
    words: 450
    points:
      - Інтелектуальний опір авторів провінціалізації української культури.
      - Демонстрація того, як українська нація стала полігоном для чужих соціальних
        експериментів.
      - Сміливість демістифікації влади мовою авангардного мистецтва в умовах цензури.
  - section: 'Підсумок: Світовий контекст твору'
    words: 300
    points:
      - Синхронізація української драми з європейським модернізмом (Піранделло, Брехт).
      - Передбачення театру абсурду, дослідження екзистенційної самотності індивіда.
      - Внесок Розстріляного відродження у світову філософську літературу.
  - section: 'Підсумок: Рецепція та вплив на нащадків'
    words: 300
    points:
      - Ідеологічне цькування та десятиліття заборони в СРСР.
      - Повернення твору на українські сцени після незалежності (постановки Л. Танюка
        та ін.).
      - 'Дискусійні питання: ціна соціальних утопій та здатність мистецтва зцілювати
        травми.'
