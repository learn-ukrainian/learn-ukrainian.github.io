- word: сеньйорат
  translation: seniorate
  ipa: [sɛnʲjɔˈrɑt]
  definition: 'Система успадкування престолу, за якою влада передається найстаршому в роду (наприклад, від брата до брата), а не від батька до сина.'
  usage: 'Ярослав Мудрий запровадив сеньйорат, щоб уникнути боротьби за владу між своїми синами.'
- word: лествичне право
  translation: rota system
  ipa: [lɛstˈʋɪt͡ʃnɛ ˈprɑʋɔ]
  definition: 'Порядок престолонаслідування в Київській Русі, за яким князі переходили з менш престижних столів на більш престижні (сходами, "лествицею") у міру звільнення місць старшими родичами.'
  usage: 'Лествичне право згодом призвело до численних конфліктів між дядьками та племінниками.'
- word: віра
  translation: weregild
  ipa: [ˈʋirɑ]
  definition: 'Грошовий штраф у Київській Русі, який сплачувався за вбивство людини на користь князя та родичів загиблого; замінив кровну помсту.'
  usage: '«Руська Правда» встановлювала віру в розмірі 40 гривень за вбивство вільної людини.'
- word: посадник
  translation: posadnyk
  ipa: [pɔˈsɑdnɪk]
  definition: 'Урядовець у Київській Русі, намісник князя, який керував містом або областю від його імені.'
  usage: 'Ярослав замінив племінних вождів на своїх посадників для централізації влади.'
- word: скрипторій
  translation: scriptorium
  ipa: [skrɪpˈtɔrʲij]
  definition: 'Майстерня при монастирі або соборі, де переписували книги.'
  usage: 'При Софійському соборі діяв скрипторій, де перекладали грецькі книги церковнослов''янською мовою.'
- word: плінфа
  translation: plinthos
  ipa: [ˈplʲinfɑ]
  definition: 'Широка і плоска випалена цегла, яку використовували у візантійському та давньоруському храмовому будівництві.'
  usage: 'Стіни Софії Київської викладені з плінфи та природного каменю на рожевому цем''янковому розчині.'
- word: порфірородна
  translation: porphyrogenita
  ipa: [pɔrfirɔˈrɔdnɑ]
  definition: 'Титул дітей візантійського імператора, народжених у Порфіровій (Багряній) залі палацу, тобто після вступу батька на престол; символ найвищої легітимності.'
  usage: 'Гіпотеза про те, що матір''ю Ярослава була Анна Порфірородна, пояснює його імперські амбіції.'
- word: каган
  translation: kagan
  ipa: [kɑˈɦɑn]
  definition: 'Титул верховного правителя у тюркських народів (хозар, аварів); використовувався київськими князями для підкреслення своєї рівності з імператорами.'
  usage: 'Графіті в Софії Київській називають Ярослава титулом "каган".'
- word: усобиця
  translation: internecine strife
  ipa: [uˈsɔbɪt͡sʲɑ]
  definition: 'Збройна боротьба за владу всередині держави, зокрема між князями одного роду.'
  usage: 'Після смерті Володимира почалася жорстока усобиця між його синами.'
- word: саркофаг
  translation: sarcophagus
  ipa: [sɑrkɔˈfɑɦ]
  definition: 'Кам''яна труна, часто оздоблена різьбленням, для поховання знатних осіб.'
  usage: 'Біломармуровий саркофаг Ярослава Мудрого зберігся в Софійському соборі до наших днів.'
- word: смерд
  translation: smerd
  ipa: [smɛrd]
  definition: 'Вільний селянин у Київській Русі, який мав власне господарство, платив данину князю і підлягав княжому суду.'
  usage: 'За вбивство смерда «Руська Правда» передбачала штраф у 5 гривень.'
- word: огнищанин
  translation: ohnyshchanyn
  ipa: [ɔɦnɪˈʃt͡ʃɑnɪn]
  definition: 'Представник вищої княжої адміністрації, управитель княжого господарства (вогнища); пізніше — боярин.'
  usage: 'Життя огнищанина захищалося подвійною вірою у 80 гривень.'
