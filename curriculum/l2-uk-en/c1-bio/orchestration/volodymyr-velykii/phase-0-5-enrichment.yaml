content_outline:
- points:
  - Трансформація Володимира як ключова точка розлому історії — зміна вектору розвитку
    Східної Європи на 1000 років
  - Місце в українському державотворенні та європейському контексті — вибір християнства
    як вибір цивілізації (писемність, кам'яне будівництво)
  - Проблема джерел та 'легендарний' фільтр — ідеалізація в 'Повісті минулих літ'
    vs реальний жорсткий політик; [!decolonization] Пам'ятник у Москві як крадіжка
    історії
  section: 'Вступ: Архітектор цивілізаційного коду'
- points:
  - Статус 'робичича' (сина ключниці Малуші) як виклик і стимул — [!history-bite]
    порівняння з байстрюками Європи (Вільгельм Завойовник)
  - Виховання під наглядом воєводи Добрині — жорстка школа виживання та військової
    справи
  - 'Новгородський період: перша школа управління — тісні зв''язки зі Скандинавією
    та варязьким світом'
  section: 'Походження: Від ''робичича'' до великого стратега'
- points:
  - Загибель Святослава та початок війни між братами — Ярополк (Київ) vs Олег (Древляни)
    vs Володимир (Новгород)
  - Втеча до Скандинавії та збір варязького війська — повернення з найманцями для
    реваншу
  - Захоплення Полоцька (трагедія Рогнеди) та штурм Києва — відмова «не хочу роззути
    робичича» та брутальна помста
  section: 'Боротьба за престол: Кривава усобиця Рюриковичів'
- points:
  - 'Київський пантеон 980 року: політичний підтекст ієрархії богів — [!context] штучний
    конструкт для об''єднання племен'
  - 'Перун як патрон княжої влади — спроба централізації: один князь — один головний
    бог'
  - Криза ідеології та провал людських жертвоприношень — варяги Федір і Іван як свідчення
    тупикового шляху
  section: 'Язичницька реформа: Спроба створення державної віри'
- points:
  - 'Легенда про випробування вір: аналіз прагматичних факторів — мусульмани (вина),
    юдеї (землі), німці (піст)'
  - Чому було відкинуто іслам, юдаїзм та західне християнство — загроза від Степу
    та Хозарського каганату
  - 'Візантійський вектор: естетика, право та імперський статус — модель «цезаропапізму»
    (імператор вище патріарха)'
  section: 'Геополітичний вибір: Тендер світових релігій'
- points:
  - Облога Корсуня (Херсонеса) як інструмент тиску на Візантію — імператор Василій
    II потребував допомоги проти заколотників
  - 'Шлюб з Анною Порфірородною: вхід до світової еліти — [!myth-buster] це була прагматична
    умова, а не добровільне просвітлення'
  - 'Події 988 року: повалення ідолів та хрещення киян — «хто не з’явиться завтра
    на ріці... мені той противником буде»'
  section: 'Корсунь та Хрещення: Дипломатія примусу до рівності'
- points:
  - 'Змієві Вали: стратегічне значення та технологія будівництва — «Велика українська
    стіна» довжиною бл. 1000 км проти печенігів'
  - 'Карбування златників і срібників: акт фінансового суверенітету — копіювання візантійських
    зразків, але з власним портретом'
  - 'Тризуб Володимира: народження державного символу — [!culture] напис «Володимир
    на столі, а се його срібло»'
  section: 'Державне будівництво: Змієві вали та власний карб'
- points:
  - 'Будівництво Десятинної церкви: архітектурний та фінансовий центр — 989–996 рр.,
    майстри з Візантії, десятина доходів'
  - 'Заснування шкіл: ''навчання книжне'' як деколонізація неписьменності — примусове
    навчання дітей бояр (кадровий резерв)'
  - Початок літописання та візантійський культурний трансфер — впровадження кириличної
    писемності
  section: 'Культурна революція: Десятинна церква та освіта еліт'
- points:
  - 'Зміна стилю правління: соціальна опіка та милосердя — роздача їжі бідним, бенкети
    для дружини'
  - Образ 'Красного Сонечка' у народній пам'яті — літописний топос «вовк став ягням»
  - Спроба скасувати смертну кару — конфлікт «Боюсь гріха» vs позиція єпископів про
    покарання розбійників
  section: 'Трансформація особистості: Від деспота до милосердного батька'
- points:
  - Спростування імперських міфів про спадковість Москви — [!myth-buster] Володимир
    правив у Києві, коли Москви не існувало
  - Володимир як символ європейського вибору України — династичні шлюби дітей («Тесть
    Європи»)
  - Канонізація та тяглість ідеї української державності — Тризуб як спадок Київської
    Русі в сучасній Україні
  section: 'Спадщина: Деколонізація образу та тяглість Тризуба'
- points:
  - Квінтесенція правління Володимира Великого — перетворення конгломерату племен
    на централізовану імперію
  - Урок політичного візіонерства для сучасності — створення ідеологічного фундаменту,
    що тримає ідентичність досі
  section: 'Підсумок: Візіонер руської ойкумени'
vocabulary_hints:
  recommended:
  - клятва (oath) — порушення клятви, вірність
  - святиня (shrine) — християнська святиня, будівництво храмів
  - монастир (monastery) — заснування монастирів
  - єпископ (bishop) — порада єпископів, церковна ієрархія
  - грамота (charter/literacy) — навчання грамоти, книжне вчення
  required:
  - хрещення (baptism/Christianization) — прийняття християнства, акт хрещення
  - язичництво (paganism) — язичницька реформа, криза язичництва
  - хреститель (baptizer) — Володимир Хреститель, рівноапостольний князь
  - рівноапостольний (equal-to-the-apostles) — святий рівноапостольний князь
  - пантеон (pantheon) — язичницький пантеон, ієрархія богів
  - ідол (idol) — повалення ідолів, Перун
  - десятина (tithe) — Десятинна церква, віддавати десятину
  - усобиця (internecine war) — князівська усобиця, боротьба за владу
  - порфірородна (born in the purple) — Анна Порфірородна, візантійська принцеса
  - Корсунь (Chersonesus) — похід на Корсунь, облога міста
