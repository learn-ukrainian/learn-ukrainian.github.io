content_outline:
- points:
  - Контраст між 'м'якою силою' Ольги та 'твердою силою' Святослава — архетип воїна-захисника
  - 'Значення постаті: Святослав як ''український Александр Македонський'' — єдиний
    син Ігоря та Ольги, перший князь зі слов''янським іменем'
  - Чому він важливий для сучасної мілітарної ідентичності (гасло ССО) — [!history-bite]
    Опис зовнішності Левом Дияконом (оселедець, сережка, біла сорочка)
  section: Вступ — Воїн на троні
- points:
  - 'Основні етапи життя князя — Хронологія: 964 (В''ятичі), 965 (Хазарія), 967 (Балкани),
    972 (Загибель)'
  section: Життєпис
- points:
  - Дитинство в Києві та вплив трагічної загибелі Ігоря — необхідність сили як урок
  - Виховання варязькими воєводами Асмудом та Свенельдом — формування характеру у
    військових таборах
  - 'Похід на древлян 946 року: перший кинутий спис у 4 роки — «Князь уже почав, потягніте,
    дружино, за князем»'
  - 'Відмова хреститися — аргумент: «Дружина моя сміятиметься з цього»'
  section: 'Біографія: Ранні роки та становлення'
- points:
  - Економічна логіка знищення хазарської монополії на Волзі — [!context] Хазарія
    як «паразит» на торгових шляхах
  - Стратегія обходу степу через ліси в'ятичів та басейн Оки — звільнення в'ятичів
    від данини (964)
  - Падіння Ітіля у 965 році та зникнення Каганату з мапи історії — також взяття Саркела
    (Біла Вежа) та Семендера
  - Результат — відкриття шляху на Схід, але й оголення кордону для печенігів
  section: Східний похід та крах Хазарії
- points:
  - Проект перенесення столиці до Переяславця на Дунаї — [!quote] «Тут сходяться блага...
    бо то є середина землі моєї»
  - 'Конфлікт із Візантією: Битва під Аркадіополем — героїчна боротьба проти імперії'
  - 'Облога Доростола 971 року: героїчний опір та договір з Цимісхієм — 3 місяці оборони,
    голод, особиста зустріч на Дунаї'
  section: Балканська мрія та облога Доростола
- points:
  - 'Повернення до Києва: зимівля в Білобережжі та голод — ціна конячої голови пів
    гривні'
  - Пастка печенігів біля порогів та роль візантійської дипломатії — [!myth-buster]
    Це не випадкова засідка, а спланована операція Візантії
  - 'Легенда про чашу з черепа: визнання доблесті ворогом — напис хана Курі «Чужого
    шукаючи, своє втратив»'
  - Попередження воєводи Свенельда — «Обійди, княже, пороги на конях»
  section: 'Останні роки: Загибель на порогах'
- points:
  - Вихід Русі на глобальну арену — ствердження суб'єктності через знищення Хазарії
    та тиск на Візантію
  - 'Основи імперського мислення Києва — [!analysis] Парадокс: майже не бував у Києві,
    але перетворив Русь на гравця світової політики'
  - Адміністративна реформа — призначення синів намісниками (Ярополк, Олег, Володимир)
    замість племінних князів
  section: Внесок у розбудову держави
- points:
  - 'Геополітичний ландшафт: Між Другим Римом та Шовковим шляхом — Зіткнення цивілізацій:
    Степ, Імперія, Ліс'
  - 'Війська організація: ''Ефект пардуса'' (швидкість та мобільність) — використання
    моноксилів (ладдей) та пішої фаланги'
  - 'Мова та культура: Зіткнення язичницького етосу та християнської дипломатії —
    культ Перуна, зброї та клятви'
  section: 'Історичний контекст: Русь у X столітті'
- points:
  - Порівняння внутрішньої розбудови інституцій та зовнішньої експансії — «м'яка сила»
    vs «тверда сила»
  - 'Симбіоз: Чому Русі потрібен був і Скелет (Ольга), і М''язи (Святослав) — Ольга
    забезпечила тил для походів сина'
  - 'Спадщина: Як перемоги Святослава уможливили реформи Володимира — фундамент імперії'
  section: 'Порівняльний аналіз: Творець (Ольга) vs Завойовник (Святослав)'
- points:
  - 'Деколонізація: Повернення ''оселедця'' та ''сережки'' як українських символів
    — [!decolonization] Святослав як носій степового етосу, попередник козацтва'
  - 'Сучасна військова символіка: Святослав як патрон Сил спеціальних операцій — тяглість
    традиції'
  - Кодекс честі 'Іду на ви!' — відмова від підступності
  - Цитата під Доростолом — «Мертві сорому не мають»
  section: 'Спадщина: Від Князя до ЗСУ'
- points:
  - Квінтесенція правління Святослава Хороброго — кульмінація язичницької Русі, спалах,
    що освітив шлях імперії
  section: Підсумок
vocabulary_hints:
  recommended:
  - 'чаша (cup/goblet) — context: чаша з черепа, пити з чаші'
  - 'череп (skull) — context: череп ворога, зробити чашу з черепа'
  - 'здобич (spoils/booty) — collocations: багата здобич, ділити здобич'
  - 'облога (siege) — collocations: тримати облогу, зняти облогу Доростола'
  - 'перемога (victory) — collocations: здобути перемогу, велика перемога'
  required:
  - 'воїн (warrior) — collocations: хоробрий воїн, полеглий воїн; learner error: soldier
    (сучасний солдат)'
  - 'завойовник (conqueror) — collocations: жорстокий завойовник, світ завойовників'
  - 'каганат (khaganate) — context: Хозарський каганат; знищення каганату'
  - 'похід (campaign/march) — collocations: військовий похід, піти в похід, східний
    похід'
  - 'дружина (retinue/warband) — collocations: княжа дружина, вірна дружина; learner
    error: wife (жінка)'
  - 'печеніги (Pechenegs) — context: кочові племена, напад печенігів'
  - 'пороги (rapids) — context: Дніпровські пороги, загибель на порогах'
  - 'засідка (ambush) — collocations: влаштувати засідку, потрапити в засідку'
  - 'данник (tributary) — collocations: брати данину, звільнити від данини'
  - 'договір (treaty) — collocations: укласти договір, мирний договір'
