- type: reading
  id: reading-venetian-reports
  title: 'Первинне джерело: Депеші венеційських байло'
  source: Звіти П'єтро Брагадіна та Наваджеро (1526-1553 рр.)
  text: 'Вона не вирізняється надзвичайною красою, але є дуже граційною, елегантною
    і має неймовірно привабливу посмішку. Султан настільки відданий їй, що всі дивуються
    і кажуть, ніби вона його зачарувала. Він не хоче знати жодної іншої жінки. Її
    вплив на державні справи просто колосальний: жодне важливе рішення, чи то призначення
    великого візира, чи оголошення війни, не ухвалюється без її таємної згоди. Її
    розум гострий, як лезо, а здатність маневрувати серед небезпечних палацових інтриг
    не має рівних.

    '
  tasks:
  - Як венеційські дипломати описували зовнішність та характер Гюррем?
  - Яким чином вони пояснювали її колосальний вплив на султана?
- type: critical-analysis
  title: 'Критичний аналіз: Оцінка дипломатичних джерел'
  source_reading: reading-venetian-reports
  target_text: Він не хоче знати жодної іншої жінки. Її вплив на державні справи просто
    колосальний... кажуть, ніби вона його зачарувала.
  questions:
  - Чому європейські дипломати схильні були пояснювати вплив Роксолани магією чи чаклунством?
  - Як цей уривок ілюструє зіткнення європейських орієнталістських стереотипів із
    реальною османською політикою?
  model_answers:
  - Європейські дипломати, виховані в жорстко патріархальних традиціях, не могли раціонально
    збагнути, як жінка-іноземка, колишня рабиня, могла досягти такої влади завдяки
    власному інтелекту. Тому вони часто вдавалися до стереотипу про відьму-спокусницю.
  - 'Цей уривок демонструє типовий орієнталістський підхід: замість аналізу її дипломатичних
    здібностей та розуму, вся її агентність зводиться до містичної та сексуальної
    маніпуляції султаном, що було простіше прийняти тогочасному європейському суспільству.'
  focus_points:
  - Європоцентричний погляд на османський двір
  - Стереотипізація жіночої влади
- type: essay-response
  title: 'Аналітичне есе: Жертва системи чи архітектор влади?'
  source_reading: reading-venetian-reports
  prompt: Спираючись на прочитаний текст та матеріали уроку, проаналізуйте політичну
    агентність Роксолани. Чи можна її вважати просто жертвою жорстокої системи, яка
    змушена була інтригувати заради виживання, чи вона була свідомим архітектором
    нової політичної реальності? Обґрунтуйте свою позицію історичними фактами.
  min_words: 300
  model_answer: Роксолана безперечно розпочинала свій шлях як абсолютна жертва обставин
    — безправна бранка, позбавлена свободи. Однак її подальша доля демонструє видатну
    політичну суб'єктність. Вона не просто пристосувалася до жорстоких правил османського
    гарему, але й системно змінила їх. Замість пасивного виживання вона обрала шлях
    активного формування власної долі. Інституалізація титулу хасекі, офіційний шлюб,
    перенесення гарему до Топкапи та самостійне дипломатичне листування свідчать про
    те, що вона діяла як далекоглядний стратег та архітектор влади. Її участь в усуненні
    політичних опонентів (Ібрагіма-паші та шехзаде Мустафи) була прагматичним кроком,
    продиктованим суворим Законом Фатіха, де відсутність дії означала б неминучу загибель
    її власних дітей. Таким чином, вона еволюціонувала від жертви до могутнього і
    цілком свідомого гравця на геополітичній арені.
  rubric:
  - criteria: Аргументація та доказова база
    description: Використання конкретних історичних фактів (титул хасекі, листування,
      Закон Фатіха)
    points: 10
  - criteria: Глибина аналізу
    description: Здатність розглянути проблему з різних боків, уникаючи однозначного
      засудження чи ідеалізації
    points: 10
- type: quiz
  title: 'Перевірка розуміння: Шлях до влади'
  items:
  - question: Який унікальний офіційний титул був спеціально створений Сулейманом
      Пишним для Роксолани?
    explanation: Сулейман запровадив титул хасекі, який юридично підніс Роксолану
      над усіма іншими жінками двору та надав їй легітимну політичну владу.
    options:
    - text: хасекі
      correct: true
    - text: валіде
      correct: false
    - text: джаріє
      correct: false
    - text: ікбал
      correct: false
  - question: Яка подія дозволила Гюррем Султан назавжди перенести жіночий гарем до
      політичного центру імперії — палацу Топкапи?
    explanation: Масштабна пожежа у Старому палаці в 1541 році стала приводом для
      перенесення гарему до Топкапи, що наблизило її до центру прийняття державних
      рішень.
    options:
    - text: руйнівна пожежа у Старому палаці
      correct: true
    - text: народження першого сина Мехмеда
      correct: false
    - text: страта великого візира Ібрагіма-паші
      correct: false
    - text: офіційне укладення шлюбу (нікяха)
      correct: false
  - question: Яким був головний мотив участі Роксолани в політичних інтригах проти
      шехзаде Мустафи?
    explanation: Згідно з жорстоким Законом Фатіха, новий правитель мав стратити всіх
      своїх братів, тому її дії були прагматичним захистом власних дітей від неминучої
      загибелі.
    options:
    - text: необхідність захистити власних синів від дії Закону Фатіха
      correct: true
    - text: бажання особисто очолити османський уряд (Диван)
      correct: false
    - text: наказ європейських монархів дестабілізувати імперію
      correct: false
    - text: особиста ненависть до його матері Махідевран
      correct: false
  - question: Який монументальний благодійний заклад був побудований Гюррем Султан
      на місці колишнього невільничого ринку в Стамбулі?
    explanation: Вона збудувала великий релігійно-благодійний комплекс Хасекі, до
      складу якого входила велика безкоштовна лікарня (дарушшифа).
    options:
    - text: комплекс Хасекі Султан із безкоштовною лікарнею
      correct: true
    - text: великий палац Долмабахче на узбережжі Босфору
      correct: false
    - text: розкішний караван-сарай для європейських послів
      correct: false
    - text: міська фортеця для захисту від морських нападів
      correct: false
  - question: Як сучасна академічна наука розглядає популярне в літературі ім'я Анастасія
      Лісовська?
    explanation: Сучасна наука стверджує, що ім'я Анастасія або Олександра Лісовська
      є суто літературною вигадкою ХІХ століття, створеною письменниками-романтиками.
    options:
    - text: як літературну вигадку письменників-романтиків ХІХ століття
      correct: true
    - text: як офіційно підтверджене церковними метриками ім'я
      correct: false
    - text: як таємне ім'я, яке вона використовувала у листуванні
      correct: false
    - text: як переклад її османського імені Гюррем українською
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи вигадка: Історичні факти'
  items:
  - statement: Роксолана була першою жінкою в історії Османської імперії, яка вела
      власне міжнародне дипломатичне листування з європейськими монархами.
    correct: true
    explanation: Це правда. Вона активно листувалася з польським королем Сигізмундом
      II Августом та іншими правителями, використовуючи дипломатію м'якої сили.
  - statement: Згідно з традицією османського двору, султанам було суворо заборонено
      одружуватися зі звільненими невільницями, проте Сулейман порушив це правило.
    correct: true
    explanation: Офіційний шлюб (нікях) із колишньою рабинею Гюррем став безпрецедентним
      кроком, який шокував османське суспільство.
  - statement: Мавзолей Гюррем Султан у Стамбулі зсередини прикрашений переважно зображеннями
      батальних сцен та військових перемог Османської імперії.
    correct: false
    explanation: Мавзолей оздоблений кахлями із зображенням райського квітучого саду,
      що символізувало її життєрадісність та світлу душу.
  - statement: Роксолана самостійно фінансувала будівництво лікарень, шкіл та імаретів
      (кухонь для бідних), засновуючи спеціальні благодійні фонди (вакфи).
    correct: true
    explanation: Вона володіла значними власними коштами і масово засновувала вакфи
      для забезпечення суспільних потреб.
  - statement: Після смерті Роксолани її вплив на політику швидко згас, і жінки в
      Османській імперії більше ніколи не брали участі в управлінні державою.
    correct: false
    explanation: Навпаки, її діяльність започаткувала цілу епоху Жіночого султанату,
      під час якої впливові жінки активно керували державними справами.
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняльний аналіз: Моделі Жіночого султанату'
  source_reading: reading-venetian-reports
  items_to_compare:
    - Роксолана
    - Кесем Султан
  criteria:
    - Порівняння масштабів впливу
    - Аналіз інституціоналізації влади
  prompt: 'Порівняйте політичний вплив Роксолани з її наступницями (наприклад, Кесем Султан).'
  model_answer: 'Роксолана заклала фундамент для легітимізації жіночої влади через титул хасекі, тоді як Кесем Султан керувала імперією безпосередньо як регент.'
