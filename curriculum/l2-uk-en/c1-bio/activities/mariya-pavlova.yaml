- type: reading
  id: "reading-pavlova-method"
  title: "Первинне джерело: Трудова палеонтологія"
  source: "Реконструкція підходу Марії Павлової"
  text: |
    Кожну знайдену кістку ми повинні розглядати не просто як сухий, статичний об'єкт для вітрини музею, а як прямий результат надзвичайно динамічного процесу життя. Ця конкретна форма горбків на емалі або цей кут нахилу суглоба є яскравим відображенням постійної м'язової роботи, специфічного щоденного раціону та жорстокої, безкомпромісної боротьби за виживання тварини в дуже конкретних, мінливих екологічних умовах минулого. Ми не каталогізуємо фрагменти, ми відновлюємо біологічну історію.
  tasks:
    - "Проаналізуйте, що саме автор має на увазі під терміном динамічний процес життя."
    - "Поясніть, як м'язова робота та раціон можуть впливати на форму кісток."

- type: critical-analysis
  source_reading: "reading-pavlova-method"
  title: "Критичний аналіз: Методологія дослідження"
  instruction: "Проаналізуйте наведений текст та дайте розгорнуті відповіді на запитання."
  items:
    - prompt: "Згідно з текстом, як автор протиставляє традиційний музейний підхід своєму новаторському баченню?"
      model_answer: "Автор протиставляє сприйняття кістки як 'сухого, статичного об'єкта для вітрини' (традиційний підхід) розумінню її як 'прямого результату динамічного процесу життя' (новаторське бачення), підкреслюючи важливість реконструкції біологічної історії."
    - prompt: "Яку функцію автор підкреслює у деталях будови кістяка, таких як форма емалі або кут суглоба?"
      model_answer: "Автор розглядає ці деталі як індикатори еволюційної адаптації, що відображають 'м'язову роботу, специфічний раціон та боротьбу за виживання'."

- type: essay-response
  title: "Есе: Подолання гендерних бар'єрів у науці"
  instruction: "Напишіть розгорнуте есе на основі матеріалу модуля."
  prompt: "У тексті модуля автор детально описує перешкоди, з якими стикалися жінки-науковці у дев'ятнадцятому столітті. Проаналізуйте, як саме інституційні заборони Російської імперії формували 'освітню еміграцію' та як Марія Павлова використовувала європейський академічний простір для свого становлення як незалежного дослідника."
  min_words: 250
  model_answer: "У дев'ятнадцятому столітті університетські статути Російської імперії категорично забороняли жінкам навчатися або викладати. Це створювало інституційний сексизм, який змушував найбільш талановитих жінок вдаватися до 'освітньої еміграції' в міста Західної Європи, такі як Париж чи Цюрих. Марія Павлова використала ліберальніші закони Франції, ставши вільною слухачкою Сорбонни та отримавши доступ до колекцій Музею природничої історії. Робота з Альбером Годрі дозволила їй здобути міжнародне визнання, що згодом стало ключовим інструментом для подолання бар'єрів і здобуття статусу професора в Москві. Європейський академічний простір став для неї не лише місцем навчання, але й платформою для легітимізації свого права на наукову діяльність."
  rubric:
    - criteria: "Історичний контекст"
      description: "Аналіз причин освітньої еміграції жінок."
      points: 5
    - criteria: "Аргументація на прикладі Павлової"
      description: "Розкриття ролі паризького періоду в її кар'єрі."
      points: 5

- type: true-false
  title: "Правильно чи неправильно: Еволюція та вимирання"
  instruction: "Визначте, чи є твердження правильними згідно з текстом модуля."
  items:
    - statement: "Еволюція копита у предків коня була викликана переходом від вологих лісів до твердих відкритих степів."
      correct: true
      explanation: "Зміна клімату і ландшафту змусила тварин адаптуватися до твердого ґрунту."
    - statement: "За теорією Павлової, головною причиною масового вимирання мастодонтів стало падіння гігантського метеорита."
      correct: false
      explanation: "Вона стверджувала, що вимирання було тривалим екологічним процесом через втрату еволюційної гнучкості та зміну клімату, а не наслідком раптової катастрофи."
    - statement: "Форма зубів давніх ссавців використовується геологами як інструмент для визначення віку гірських порід."
      correct: true
      explanation: "Павлова довела, що еволюційні зміни емалі відбувалися закономірно, дозволяючи використовувати зуби як геологічні годинники."
    - statement: "Гіпаріонова фауна, яку досліджувала Павлова, була зосереджена виключно на території північної Європи."
      correct: false
      explanation: "Вона інтенсивно досліджувала Гіпаріонову фауну Півдня України, зокрема Бессарабії та Причорномор'я."
    - statement: "Обрання Марії Павлової дійсним членом Всеукраїнської академії наук відбулося у 1921 році."
      correct: true
      explanation: "ВУАН офіційно визнала її дійсним академіком у 1921 році, що підтвердило її зв'язок з українським інтелектуальним простором."

- type: quiz
  title: "Перевірте знання: Життєвий шлях Марії Павлової"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Згідно з текстом, чому Марія Павлова тривалий час працювала в Московському університеті без офіційної оплати?"
      explanation: "Консервативна академічна система та імперські закони категорично забороняли жінкам обіймати офіційні наукові або викладацькі посади."
      options:
        - text: "Жінкам законодавчо було заборонено обіймати офіційні викладацькі посади."
          correct: true
        - text: "Вона мала значні власні статки і принципово відмовлялася від грошей."
          correct: false
        - text: "Університет не мав достатнього фінансування для палеонтологічних досліджень."
          correct: false
        - text: "Вона вважала палеонтологію своїм хобі, а не основною професією."
          correct: false
    - question: "Який інноваційний метод аналізу кісток Марія Павлова досконало опанувала під керівництвом Альбера Годрі в Парижі?"
      explanation: "У Парижі вона опанувала метод порівняльної анатомії для виявлення генетичної спорідненості."
      options:
        - text: "метод порівняльної анатомії хребетних"
          correct: true
        - text: "метод радіовуглецевого датування"
          correct: false
        - text: "метод хімічного спектрального аналізу"
          correct: false
        - text: "метод рентгенівської кристалографії"
          correct: false
    - question: "Що, за словами автора тексту, стало головною екологічною причиною вимирання спеціалізованих видів тварин?"
      explanation: "Павлова стверджувала, що види вимирають через фатальну втрату еволюційної гнучкості при різкій зміні середовища."
      options:
        - text: "втрата еволюційної гнучкості та здатності до адаптації"
          correct: true
        - text: "поява нових агресивних інфекційних захворювань"
          correct: false
        - text: "глобальне потепління та танення льодовиків"
          correct: false
        - text: "масове полювання первісних людей на цих тварин"
          correct: false
    - question: "У тексті автор підкреслює, що шлюб Марії з Олексієм Павловим базувався насамперед на..."
      explanation: "Текст підкреслює, що це був науковий тандем абсолютно рівноцінних партнерів."
      options:
        - text: "рівноправному науковому партнерстві та співпраці"
          correct: true
        - text: "бажанні Марії отримати фінансову стабільність"
          correct: false
        - text: "необхідності приховати її власні наукові публікації"
          correct: false
        - text: "відмові Марії від кар'єри заради успіху свого чоловіка"
          correct: false
    - question: "Який конкретний ландшафт сприяв еволюційній появі єдиного твердого копита у давніх предків коней?"
      explanation: "Копито розвинулося для швидкого бігу по твердому і сухому ґрунту степів."
      options:
        - text: "відкриті посушливі степи з твердим ґрунтом"
          correct: true
        - text: "вологі тропічні ліси з м'якою підстилкою"
          correct: false
        - text: "гірські масиви зі складним рельєфом"
          correct: false
        - text: "болотисті місцевості біля великих річок"
          correct: false
    - question: "Згідно з текстом, який символічний акт остаточно підтвердив національну ідентичність Марії Павлової у 1921 році?"
      explanation: "Обрання академіком Всеукраїнської академії наук було визнанням її зв'язку з Україною."
      options:
        - text: "обрання дійсним академіком Всеукраїнської академії наук"
          correct: true
        - text: "отримання звання професора в Московському університеті"
          correct: false
        - text: "публікація першої монографії у Франції"
          correct: false
        - text: "організація масштабної експедиції до Криму"
          correct: false