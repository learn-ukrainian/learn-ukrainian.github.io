- type: reading
  id: reading-01
  title: "Первинне джерело: Рішительні пункти"
  source: "Адаптований витяг з документа (1728)"
  text: "Генеральному суду бути у трьох особах від великоросіян і у трьох від малоросіян. Суд має відбуватися за їхніми, малоросійськими правами. Без указу Його Імператорської Величності гетьману нікого не карати смертю, а також не відбирати маєтності у старшини без суду і не переслідувати їх за провини. Дипломатичні зносини з іноземними державами гетьману суворо забороняються, а якщо хтось приїде з таємними листами, тих негайно затримувати і відправляти до імператорського двору."
  tasks:
    - "Визначте, які сфери автономії Гетьманщини цей документ обмежував найбільше."
    - "Проаналізуйте, у чому полягав компромісний характер цього документа."

- type: critical-analysis
  title: "Аналіз правового статусу"
  source_reading: "reading-01"
  instruction: "Проаналізуйте текст і дайте розгорнуті відповіді."
  items:
    - prompt: "На основі наведеного тексту, поясніть стратегію Данила Апостола щодо судової влади. Чому закріплення права на власні суди було критично важливим?"
      model_answer: "Данило Апостол розумів неможливість військового протистояння, тому обрав шлях правового захисту. Власні суди гарантували, що майнові та особисті права старшини і козаків вирішуватимуться за українським, а не російським законодавством, що оберігало їх від свавілля імперських чиновників та дозволило зберегти внутрішню автономію."

- type: essay-response
  title: "Есе: Тактика компромісу Данила Апостола"
  instruction: "Напишіть аналітичне есе на запропоновану тему."
  min_words: 250
  items:
    - prompt: "У своєму есе аргументуйте або спростуйте тезу: 'Лояльність Данила Апостола Російській імперії була зовнішньою оболонкою, під якою ховалася системна робота зі збереження української державності'. Спирайтеся на його соціально-економічні реформи та кодифікацію права."
      model_answer: "Успішне есе повинно довести, що тактика Данила Апостола була вимушеним, але прагматичним кроком. Замість відкритого конфлікту він обрав шлях 'малих справ'. Наприклад, відновлення зовнішньої торгівлі та запровадження державного бюджету зміцнили фінансову базу автономії. Кодифікація права ('Права, за якими судиться малоросійський народ') та судова реформа створили інституційний бар'єр проти русифікації. Зрештою, його 'покірність' дозволила Гетьманщині проіснувати ще кілька десятиліть і зберегти правову традицію, що є ознакою далекоглядного державного діяча."
  rubric:
    - criteria: "Аргументація"
      description: "Чіткість доведення тези з використанням історичних фактів (реформи, кодифікація)."
      points: 10
    - criteria: "Структура"
      description: "Логічна побудова есе, наявність вступу, основної частини та висновків."
      points: 5

- type: true-false
  title: "Перевірка розуміння контексту"
  instruction: "Визначте, чи є ці твердження істинними."
  items:
    - statement: "Данило Апостол розпочав відкрите збройне повстання проти Російської імперії, щоб відновити права Гетьманщини."
      correct: false
      explanation: "Він діяв дипломатичними методами, розуміючи, що відкрита конфронтація призведе до ліквідації автономії."
    - statement: "Під час Великої Північної війни Данило Апостол з самого початку і до кінця залишався на боці Петра I."
      correct: false
      explanation: "Спочатку він перейшов на бік Карла XII разом із Мазепою, але згодом повернувся до російського табору."
    - statement: "'Рішительні пункти' тисяча сімсот двадцять восьмого року мали форму міждержавного договору між Гетьманщиною та Росією."
      correct: false
      explanation: "Вони були оформлені як указ російського імператора Петра II, підкреслюючи підлеглий статус України."
    - statement: "Генеральне слідство про маєтності мало на меті повернути незаконно захоплені землі до державного фонду."
      correct: true
      explanation: "Цей перепис був ініційований для впорядкування земельних відносин та захисту економічних інтересів козацтва."
    - statement: "Данило Апостол домігся дозволу на відновлення Запорозької Січі, що призвело до заснування Нової Січі."
      correct: true
      explanation: "Він переконав російський уряд, що повернення запорожців посилить обороноздатність південних кордонів."
    - statement: "Кодекс 'Права, за якими судиться малоросійський народ' був одразу ж офіційно затверджений російським урядом."
      correct: false
      explanation: "Російський уряд так і не затвердив цей кодекс офіційно, хоча він фактично використовувався в українських судах."
    - statement: "Запровадження державного бюджету дозволило Данилу Апостолу фінансувати власну адміністрацію та суди."
      correct: true
      explanation: "Це був важливий інструмент автономії, що забезпечував стабільність фінансової системи."
    - statement: "Данило Апостол заборонив міщанам користуватися магдебурзьким правом."
      correct: false
      explanation: "Навпаки, він видав низку універсалів, які підтверджували привілеї міст і захищали магдебурзьке право."

- type: quiz
  title: "Деталі біографії та діяльності"
  instruction: "Оберіть одну правильну відповідь до кожного запитання."
  items:
    - question: "У якій військовій кампанії Данило Апостол НЕ брав участі як полковник?"
      explanation: "Він брав участь у Кримських, Азовських походах та Північній війні, але не в Хотинській війні."
      options:
        - text: "Хотинська війна тисяча шістсот двадцять першого року"
          correct: true
        - text: "Кримські походи кінця сімнадцятого століття"
          correct: false
        - text: "Азовські походи проти Османської імперії"
          correct: false
        - text: "Велика Північна війна початку вісімнадцятого століття"
          correct: false
    - question: "Яку важливу інституцію ліквідував російський уряд перед обранням Апостола гетьманом?"
      explanation: "Перед обранням гетьмана російський уряд ліквідував Першу Малоросійську колегію."
      options:
        - text: "Першу Малоросійську колегію"
          correct: true
        - text: "Генеральну військову канцелярію"
          correct: false
        - text: "Києво-Могилянську академію"
          correct: false
        - text: "Генеральний військовий суд"
          correct: false
    - question: "Яким був головний наслідок економічних реформ Данила Апостола у сфері торгівлі?"
      explanation: "Він відновив право українських купців торгувати з Європою без транзиту через російські порти."
      options:
        - text: "Відновлення прямого експорту товарів до Західної Європи"
          correct: true
        - text: "Повна заборона на вивезення збіжжя за кордон"
          correct: false
        - text: "Передача всієї торгівлі під контроль російських купців"
          correct: false
        - text: "Введення високих внутрішніх мит між українськими полками"
          correct: false
    - question: "Яка архітектурна пам'ятка була збудована за фінансової підтримки Данила Апостола?"
      explanation: "За його підтримки було збудовано церкву Преображення Господнього у Великих Сорочинцях."
      options:
        - text: "Церква Преображення Господнього у Великих Сорочинцях"
          correct: true
        - text: "Софійський собор у місті Києві"
          correct: false
        - text: "Троїцько-Іллінський монастир у Чернігові"
          correct: false
        - text: "Успенський собор Києво-Печерської лаври"
          correct: false
    - question: "Чому Данило Апостол ініціював реформу Генерального суду в Гетьманщині?"
      explanation: "Він прагнув створити незалежну систему для захисту прав українців від зловживань та свавілля."
      options:
        - text: "Щоб створити дієвий механізм захисту від свавілля російських чиновників"
          correct: true
        - text: "Щоб повністю підпорядкувати судову систему Російському Сенату"
          correct: false
        - text: "Щоб особисто судити своїх політичних опонентів серед старшини"
          correct: false
        - text: "Щоб скасувати дію магдебурзького права в українських містах"
          correct: false
    - question: "Що означав інститут 'підскарбіїв', запроваджений під час реформ Данила Апостола?"
      explanation: "Це були фінансисти, відповідальні за централізований збір податків до державного бюджету."
      options:
        - text: "Спеціальні чиновники, що контролювали збір податків до державного скарбу"
          correct: true
        - text: "Військові командири, які охороняли кордони від набігів татар"
          correct: false
        - text: "Судді, що розглядали апеляції на рішення полкових судів"
          correct: false
        - text: "Дипломатичні представники Гетьманщини при російському дворі"
          correct: false
    - question: "Яку позицію зайняв гетьман щодо будівництва сумнозвісної 'Української лінії'?"
      explanation: "Він не міг зупинити будівництво, але намагався полегшити умови праці мобілізованих козаків."
      options:
        - text: "Намагався полегшити умови праці, просив зменшити кількість робітників"
          correct: true
        - text: "Активно підтримував і добровільно відправляв туди якомога більше козаків"
          correct: false
        - text: "Організував збройний бунт робітників проти військового командування"
          correct: false
        - text: "Повністю ігнорував це питання, займаючись лише особистими справами"
          correct: false
    - question: "Що було заборонено гетьману відповідно до положень 'Рішительних пунктів'?"
      explanation: "Документ суворо забороняв гетьману вести самостійну дипломатичну діяльність."
      options:
        - text: "Вести самостійну зовнішню політику та дипломатичні зносини з державами"
          correct: true
        - text: "Збирати будь-які податки на території Лівобережної України"
          correct: false
        - text: "Звертатися з петиціями безпосередньо до російського імператора"
          correct: false
        - text: "Фінансувати діяльність Києво-Могилянської академії та церков"
          correct: false