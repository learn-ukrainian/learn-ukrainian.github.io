- type: reading
  id: reading-sakovich
  title: 'Первинне джерело: Вірші на жалісний погреб...'
  source: Касіян Сакович (1622)
  text: 'Вольність єсть то річ добрая, усім людям милая,

    Которої не маючи, вічна єсть неволя.

    Але тая вольність не всім ся достаєт,

    Тілько тим, которії її боронять.

    '
  tasks:
  - Яку головну умову отримання вольності визначає автор?
  - Як цей текст відображає ідеологію козацтва часів Сагайдачного?
- type: critical-analysis
  title: 'Аналіз: Концепт вольності у творі Саковича'
  source_reading: reading-sakovich
  target_text: 'Але тая вольність не всім ся достаєт,

    Тілько тим, которії її боронять.

    '
  questions:
  - Згідно з текстом, як автор трактує концепцію золотої вольності порівняно з традиційним
    шляхетським розумінням?
  - Який зв'язок між цими рядками та військовими реформами Петра Сагайдачного?
  model_answers:
  - 'Автор переосмислює вольність: вона не є спадковим привілеєм, а здобувається зі
    зброєю в руках. Це легітимізує козацтво як нову еліту.'
  - 'Рядки відображають сутність реформ Сагайдачного: перетворення козаків на регулярне
    військо дало їм силу боронити край.'
- type: essay-response
  title: 'Есе: Стратегічний альянс меча і хреста'
  source_reading: reading-sakovich
  prompt: 'У тексті модуля зазначено, що Петро Сагайдачний ініціював стратегічний
    альянс меча і хреста. Спираючись на матеріал модуля, проаналізуйте мотиви та наслідки
    вступу Війська Запорозького до Київського братства та відновлення православної
    ієрархії у 1620 році. Чому Сагайдачний підтримував церкву?

    '
  min_words: 250
  model_answer: 'Петро Сагайдачний розумів, що для збереження нації недостатньо лише
    військової сили. Альянс меча і хреста був глибоко прагматичним кроком. З одного
    боку, православна церква після Берестейської унії 1596 року втратила легальний
    статус і потребувала фізичного захисту. Козацтво взяло на себе роль цього захисника.


    З іншого боку, козацтво потребувало ідеологічного обґрунтування своєї діяльності.
    Вступ до Київського братства та підтримка інтелектуалів перетворили козаків з
    найманців на лицарів-захисників віри. Це легітимізувало їхні вимоги перед польським
    королем і суспільством.


    Відновлення ієрархії у 1620 році стало кульмінацією цієї політики. Завдяки збройній
    охороні козаків, патріарх Феофан висвятив митрополита і єпископів. Наслідком цього
    альянсу стало збереження релігійної ідентичності та перетворення Києва на потужний
    духовний центр.

    '
  rubric:
  - criteria: Аналіз мотивів
    description: Пояснення причин, чому козацтво та церква потребували одне одного.
    points: 5
  - criteria: Оцінка наслідків
    description: Висвітлення результатів вступу до братства та відновлення ієрархії.
    points: 5
- type: quiz
  title: 'Перевірте знання: Військові та політичні стратегії'
  items:
  - question: Який тактичний прийом дозволив козакам ефективно боротися з османськими
      галерами?
    explanation: Чайки мали низьку посадку, і козаки використовували раптовий абордаж
      у штиль.
    options:
    - text: Використання важкої артилерії з великої відстані
      correct: false
    - text: Раптовий наближення та абордаж з легких чайок
      correct: true
    - text: Побудова рухомого табору на воді
      correct: false
    - text: Використання вітрил для швидкого маневрування
      correct: false
  - question: Згідно з текстом, у чому полягала головна мета Московського походу 1618
      року для Сагайдачного?
    explanation: Сагайдачний використав похід як спосіб розширити права та повернути
      українські етнічні землі.
    options:
    - text: Знищення Московського царства як держави
      correct: false
    - text: Отримання грошової винагороди від польського короля
      correct: false
    - text: Розширення прав козацтва та повернення етнічних земель
      correct: true
    - text: Встановлення козацького контролю над московським престолом
      correct: false
  - question: 'У тексті модуля автор характеризує політику Сагайдачного щодо польської
      корони як:'
    explanation: Лояльність Сагайдачного була винятково прагматичною для розбудови
      національних інституцій.
    options:
    - text: Стихійний та руйнівний бунт проти влади
      correct: false
    - text: Прагматичний компроміс для побудови автономії
      correct: true
    - text: Повна асиміляція та відмова від своїх прав
      correct: false
    - text: Безумовна відданість і покірність монарху
      correct: false
  - question: Який військовий винахід забезпечив козакам перевагу в обороні під час
      Хотинської битви?
    explanation: Рухомий табір із возів створював міцну оборону.
    options:
    - text: Рухомий табір зі зчеплених возів
      correct: true
    - text: Важка броньована кіннота
      correct: false
    - text: Використання бойових слонів
      correct: false
    - text: Система підземних тунелів
      correct: false
  - question: Яку функцію виконувало Київське братство, до якого вступив Петро Сагайдачний
      з військом?
    explanation: Братства були об'єднаннями міщан, які захищали православну культуру
      і школи.
    options:
    - text: Секретна організація для підготовки повстань
      correct: false
    - text: Об'єднання міщан для захисту освіти і культури
      correct: true
    - text: Військовий орден європейських лицарів
      correct: false
    - text: Комерційна гільдія для торгівлі з Європою
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Аналіз тексту: Правда чи вигадка'
  items:
  - statement: Згідно з текстом, Петро Сагайдачний походив із бідної селянської родини.
    correct: false
    explanation: Сагайдачний походив з родини дрібної православної шляхти.
  - statement: Автор стверджує, що козаки відновили православну ієрархію завдяки збройній
      охороні патріарха Феофана.
    correct: true
    explanation: Сагайдачний забезпечив охорону патріарху, що дозволило висвятити
      нового митрополита.
  - statement: У тексті зазначається, що Сагайдачний повністю відмовився від вогнепальної
      зброї.
    correct: false
    explanation: Навпаки, він зробив акцент на вогнепальній зброї, запровадивши мушкети.
  - statement: За словами автора, наслідком Деулінського перемир'я стало повернення
      Чернігівщини та Сіверщини.
    correct: true
    explanation: Це дозволило повернути ці етнічні землі в український культурний
      простір.
  - statement: Дослідники порівнюють Хотинську битву з Віденською битвою, оскільки
      обидві зупинили османську експансію.
    correct: true
    explanation: Хотинська битва стала подією, яка врятувала Європу від завоювання.
  - statement: Текст описує похід на Москву 1618 року виключно як польську інтервенцію
      без участі українців.
    correct: false
    explanation: Текст наголошує, що ударною силою були українські козаки.
  - statement: Згідно з матеріалом, Северин Наливайко та Петро Сагайдачний використовували
      однакові політичні стратегії.
    correct: false
    explanation: 'Текст протиставляє їх: Наливайко уособлював бунт, а Сагайдачний
      — системну політику.'
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняльний аналіз: Лідерські стратегії'
  items_to_compare:
  - Северин Наливайко
  - Петро Сагайдачний
  criteria:
  - Методи досягнення політичних цілей
  - Ставлення до існуючої влади (корони)
  prompt: Проаналізуйте та порівняйте лідерські підходи Северина Наливайка та Петра
    Сагайдачного.
  model_answer: Наливайко використовував стихійний бунт, що призводив до поразки та
    репресій. Натомість Сагайдачний обрав шлях прагматичного компромісу, лояльності
    до корони та системної інституційної розбудови.
