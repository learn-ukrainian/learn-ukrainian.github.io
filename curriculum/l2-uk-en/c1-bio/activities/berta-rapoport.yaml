- type: reading
  id: reading-rapoport
  title: 'Первинне джерело: Звіт Одеського порту'
  source: Архів Чорноморського пароплавства (1948)
  text: "Наказом керівництва від 1948 року капітан теплохода \"Туркменістан\"\nРапопорт\
    \ Берта Яківна переводиться на берегову роботу та призначається \nна посаду старшого\
    \ диспетчера флоту за станом здоров'я. Усі повноваження\nщодо судноводіння та\
    \ керівництва екіпажами з неї знімаються.\n"
  tasks:
  - Проаналізуйте справжню причину такого наказу.
- type: critical-analysis
  id: ca-01
  source_reading: reading-rapoport
  title: 'Критичний аналіз: Евфемізми тоталітаризму'
  target_text: переводиться на берегову роботу... за станом здоров'я
  questions:
  - Яку реальну причину звільнення приховує офіційне формулювання про стан здоров'я?
  - Як цей наказ відображає ширшу політичну кампанію того часу?
  model_answers:
  - Офіційне формулювання приховувало кампанію державного антисемітизму, відому як
    боротьба з космополітизмом. Берта Рапопорт була абсолютно здоровою, але її єврейське
    походження стало причиною репресій.
  - Наказ є типовим прикладом тоталітарного евфемізму, коли система усувала незручних
    людей, створюючи ілюзію законних медичних чи адміністративних причин, щоб уникнути
    відкритого визнання дискримінації.
- type: essay-response
  id: essay-01
  title: 'Есе: Руйнування гендерних стереотипів'
  prompt: У тексті зазначено, що Берта Рапопорт стала інституційною руйнівницею бар'єрів.
    Напишіть есе, у якому проаналізуйте, як її кар'єра контрастує з традиційними уявленнями
    про жіночі професії (такими як лікарка чи вчителька) на початку двадцятого століття.
    Спирайтеся на текст модуля.
  min_words: 300
  model_answer: На початку двадцятого століття суспільство вважало медичну освіту,
    благодійність та соціальну роботу максимально допустимими сферами для жінок. Берта
    Рапопорт, обравши професію судноводія, кинула виклик глибоко вкоріненим забобонам,
    згідно з якими жінка на кораблі приносить нещастя. Вона довела, що авторитет капітана
    залежить не від статі, а від професіоналізму, витримки та лідерських якостей,
    чим суттєво розширила межі можливого для майбутніх поколінь.
  rubric:
  - criteria: Аналіз контексту
    description: Глибоке розуміння історичних обмежень щодо жіночих професій.
    points: 40
  - criteria: Аргументація
    description: Наведення конкретних прикладів з життя Берти Рапопорт.
    points: 60
- type: quiz
  title: Перевірка розуміння тексту
  items:
  - question: Згідно з текстом, який кар'єрний шлях вважався найбільш соціально прийнятним
      для амбітних жінок на початку двадцятого століття?
    explanation: Медична освіта та професія лікарки вважалися найпрестижнішими та
      найбільш прийнятними.
    options:
    - text: здобуття медичної освіти та практика
      correct: true
    - text: служба на торговому флоті
      correct: false
    - text: політична та дипломатична діяльність
      correct: false
    - text: служба у збройних силах
      correct: false
  - question: У тексті модуля автор характеризує призначення Берти капітаном як подію,
      яка відбулася на тлі якої історичної ситуації?
    explanation: Її призначили капітаном наприкінці 1941 року під час національної
      катастрофи та війни.
    options:
    - text: масштабної національної катастрофи під час Другої світової війни
      correct: true
    - text: міжнародного визнання та святкувань у портах Європи
      correct: false
    - text: відродження незалежної держави та зникнення цензури
      correct: false
    - text: політичної відлиги та лібералізації в країні
      correct: false
  - question: Який аргумент автор наводить для пояснення того, чому радянська влада
      пропагувала образ Берти у довоєнні роки?
    explanation: Її образ використовували як вітрину досягнень системи щодо рівноправності
      жінок.
    options:
    - text: щоб продемонструвати нібито ідеальну рівноправність жінок у державі
      correct: true
    - text: щоб заохотити єврейське населення працювати на флоті
      correct: false
    - text: щоб приховати масові втрати кораблів у Чорному морі
      correct: false
    - text: щоб підготувати населення до майбутньої масштабної війни
      correct: false
  - question: Згідно з текстом, як саме екіпаж пароплава 'Катаяма' опинився у фашистському
      концентраційному таборі?
    explanation: Судно було незаконно затримане іспанськими франкістами у 1938 році.
    options:
    - text: судно захопили військові кораблі іспанських франкістів
      correct: true
    - text: команда добровільно здалася під час сильного шторму
      correct: false
    - text: вони були заарештовані німецькими військами в Одесі
      correct: false
    - text: їх депортували з британського порту Ліверпуль
      correct: false
  - question: 'У тексті автор зазначає, що перебування в іспанському полоні мало для
      Берти довгострокові негативні наслідки, оскільки:'
    explanation: Тоталітарна система підозрювала кожного полоненого у зраді, встановивши
      за ними нагляд.
    options:
    - text: це стало причиною постійної підозри з боку радянських спецслужб
      correct: true
    - text: це призвело до її негайного звільнення з посади старпома
      correct: false
    - text: це зробило її впливовою фігурою у вищих ешелонах влади
      correct: false
    - text: це змусило її назавжди емігрувати з Радянського Союзу
      correct: false
  - question: Згідно з текстом, яку функцію виконував капітанський місток під час
      роботи Берти на Каспійському морі?
    explanation: Вона мусила маневрувати серед мінних полів вночі, не сходячи з містка
      цілими тижнями.
    options:
    - text: це було місце безперервного цілодобового напруження та постійного маневрування
      correct: true
    - text: це був безпечний центр дипломатичних переговорів з іноземними союзниками
      correct: false
    - text: це було єдине захищене місце на судні під час інтенсивних авіанальотів
      correct: false
    - text: це був зручний майданчик для проведення ідеологічних мітингів
      correct: false
  - question: Яку стилістичну особливість автор підкреслює при описі звільнення Берти
      Рапопорт з торгового флоту?
    explanation: Офіційне формулювання 'за станом здоров'я' було жорстоким політичним
      евфемізмом.
    options:
    - text: використання бюрократичного евфемізму для приховування реальних репресій
      correct: true
    - text: вживання застарілих мореплавних термінів для надання наказу офіційності
      correct: false
    - text: використання яскравих метафор з традиційного морського сленгу
      correct: false
    - text: застосування іншомовних запозичень для демонстрації космополітизму
      correct: false
  - question: Згідно з текстом, у чому полягає глибинне значення встановлення меморіального
      барельєфа на морському вокзалі?
    explanation: Пам'ятник став символічним вибаченням суспільства за десятиліття
      несправедливого забуття.
    options:
    - text: це символічне вибачення суспільства за довгі десятиліття несправедливого
        забуття
      correct: true
    - text: це офіційна вимога міжнародних морських організацій щодо гендерної квоти
      correct: false
    - text: це початок нової урядової програми з масштабної розбудови порту
      correct: false
    - text: це виключно особиста ініціатива колишніх матросів з теплохода 'Туркменістан'
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Аналіз тверджень
  items:
  - statement: На початку двадцятого століття загальноприйнятим вважалося, що присутність
      жінки на борту корабля є запорукою успішного і спокійного плавання.
    correct: false
    explanation: Навпаки, старовинне повір'я стверджувало, що жінка на борту обов'язково
      приносить нещастя та загибель екіпажу.
  - statement: Свій офіційний диплом штурмана далекого плавання Берта Рапопорт отримала
      після проходження надзвичайно складної практики на вітрильному судні.
    correct: true
    explanation: Вона успішно пройшла виснажливу практику на гігантському чотирищогловому
      барку 'Товариш', що було обов'язковою умовою для навігаторів.
  - statement: Під час Другої світової війни державна радянська пропаганда активно
      та відкрито підкреслювала єврейське походження капітанки.
    correct: false
    explanation: Пропаганда старанно оминала факти про її походження та перебування
      в полоні, створюючи стерильний міф про ідеальну радянську громадянку.
  - statement: Примусове звільнення Берти з посади капітана було прямим наслідком
      жорстокої кампанії боротьби з так званим космополітизмом.
    correct: true
    explanation: Саме ця масштабна антисемітська кампанія кінця 1940-х років стала
      справжньою причиною її цинічного списання на берег.
  - statement: Після повернення з іспанського концтабору радянські моряки були повністю
      виправдані та позбавлені будь-яких підозр з боку органів державної безпеки.
    correct: false
    explanation: У тоталітарній системі сам факт перебування в іноземному полоні викликав
      постійну підозру в шпигунстві, тому за екіпажем був встановлений таємний нагляд.
  - statement: Для пояснення причин певних історичних подій сучасна українська мова
      дозволяє використовувати прийменник 'завдяки' у контексті негативних наслідків.
    correct: false
    explanation: Прийменник 'завдяки' має виключно позитивну конотацію. Для опису
      причин негативних подій слід вживати слова 'через' або 'внаслідок'.
  instruction: Визначте, чи твердження правильне.
