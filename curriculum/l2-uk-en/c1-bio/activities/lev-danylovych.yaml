- type: reading
  id: reading-lviv
  title: "Заснування та розбудова Львова"
  source: "Адаптований історичний текст"
  text: |
    Близько 1272 року Лев Данилович прийняв стратегічне рішення залишити вразливий Холм та бунтівний Галич, облаштувавши свою головну резиденцію у Львові. Географія цього місця була обрана з огляду на монгольську тактику облог: рівнинні міста ставали легкою здобиччю для кочівників, натомість Замкова гора з крутими схилами та модернізованими фортифікаціями робила використання важкої облогової техніки неможливим. Окрім безпеки, Львів розташовувався на перетині важливих трансконтинентальних магістралей — Королівському шляху, який з'єднував Схід із Заходом. Лев Данилович свідомо перетворював нову столицю на потужний економічний вузол, заохочуючи купців та колоністів.
  tasks:
    - "Визначте головні причини перенесення столиці."
    - "Проаналізуйте географічні переваги Замкової гори."

- type: essay-response
  source_reading: reading-lviv
  title: "Стратегічний аналіз перенесення столиці"
  instruction: "Напишіть есе на основі прочитаного тексту."
  prompt: "Проаналізуйте стратегічні, військові та економічні мотиви, якими керувався Лев Данилович, переносячи столицю до Львова."
  min_words: 250
  model_answer: |
    Перенесення столиці до Львова було продиктовано комплексом причин. По-перше, військовий фактор: Львів мав складний рельєф, де Замкова гора стала надійною цитаделлю проти монгольських облог. По-друге, політичний: Лев прагнув віддалитися від опозиційного галицького боярства, створюючи новий центр влади з нуля. По-третє, економічний: Львів лежав на перетині нових торгових шляхів, що з'єднували Схід і Захід після занепаду київських магістралей. Це рішення забезпечило державі стабільність.
  rubric:
    - criteria: "Аналіз військового фактору"
      description: "Оцінено географічне положення та захищеність Високого Замку."
      points: 10
    - criteria: "Політичний та економічний контекст"
      description: "Враховано фактор галицького боярства та контроль над торговими шляхами."
      points: 10

- type: comparative-study
  id: comp-study-lev
  title: "Порівняльний аналіз політичних стратегій: Лев та Данило"
  instruction: "Порівняйте політичні підходи Лева Даниловича та його батька Данила Галицького."
  items_to_compare:
    - "Політика Данила Галицького"
    - "Політика Лева Даниловича"
  criteria:
    - "Ставлення до Золотої Орди"
    - "Внутрішня політика щодо галицького боярства"
  model_answer: |
    Данило Галицький шукав підтримки Заходу для відкритої боротьби з монголами, що завершилося невдачею. Натомість Лев обрав шлях прагматичної співпраці («Realpolitik»), уклавши союз з темником Ногаєм, що дозволило зберегти автономію без баскаків. У внутрішній політиці Данило часто йшов на компроміси з бунтівним галицьким боярством. Лев же запровадив жорстку централізацію влади, конфісковував маєтки опозиціонерів і переніс столицю до Львова, щоб віддалитися від старих боярських еліт, спираючись на нових міщан.

- type: reading
  id: reading-diplomacy
  title: "Зовнішня політика та Золота Орда"
  source: "Історичний аналіз"
  text: |
    Діяльність Лева Даниловича становить унікальний геополітичний парадокс. Його держава перебувала під зверхністю Монгольської імперії, проте він поводився як суверенний монарх. Лев уклав особистий союз із могутнім темником Ногаєм. Замість того, щоб бути жертвою татар, він використовував їхні тумени як інструмент своєї зовнішньої політики для походів на Польщу та Угорщину. Ця дипломатія виживання мала ціну — податок кров'ю, тобто участь руських військ у монгольських кампаніях. Проте вона дозволила уникнути появи баскаків у Галичині, зберігши повністю автономну адміністративну структуру та захистивши православну церкву.
  tasks:
    - "Поясніть сутність геополітичного парадоксу Лева Даниловича."
    - "Які наслідки мала співпраця князя з темником Ногаєм?"

- type: critical-analysis
  source_reading: reading-diplomacy
  title: "Оцінка дипломатії Лева Даниловича"
  instruction: "Дайте розгорнуті відповіді на аналітичні питання щодо політики Лева Даниловича."
  target_text: "Замість того, щоб бути жертвою татар, він використовував їхні тумени як інструмент своєї зовнішньої політики для походів на Польщу та Угорщину."
  questions:
    - "Як автор тексту оцінює використання татарських військ Левом Даниловичем з точки зору прагматизму?"
    - "У чому, згідно з текстом, полягав головний здобуток такої моделі відносин із Золотою Ордою?"
  model_answers:
    - "Автор оцінює це як блискучий приклад прагматичної політики: Лев перетворив загрозу на військовий ресурс. Залучаючи татар до своїх походів, він економив власні сили та тримав у страху західних сусідів, маскуючи власну експансію під союзницькі дії."
    - "Головним здобутком стала відсутність баскаків. Це дозволило зберегти непорушними місцеве судочинство, адміністративний апарат та інституцію православної церкви, гарантувавши внутрішню автономію."

- type: quiz
  title: "Контекст та лексичні нюанси"
  instruction: "Оберіть правильну відповідь, спираючись на текст модуля."
  items:
    - question: "Згідно з текстом, який аргумент автор наводить для пояснення відмови Лева від офіційної папської коронації?"
      explanation: "Корона від Папи зобов'язувала б до церковної унії та війни з монголами, до якої Русь не була готова."
      options:
        - text: "Коронація зобов'язувала б до хрестового походу проти монголів."
          correct: true
        - text: "Папа Римський відмовився визнавати його законним спадкоємцем."
          correct: false
        - text: "Галицьке боярство погрожувало повстанням у разі коронації."
          correct: false
        - text: "Лев вважав католицький обряд неприйнятним для себе."
          correct: false
    - question: "Як у тексті модуля характеризується вплив вбивства Войшелка на позиції Лева Даниловича?"
      explanation: "Це був жорстокий політичний крок, спрямований на дестабілізацію позицій Шварна і розчищення шляху для власних амбіцій Лева."
      options:
        - text: "Як прояв жорстокої політичної боротьби за владу та вплив."
          correct: true
        - text: "Як трагічна помилка, що призвела до втрати всіх союзників."
          correct: false
        - text: "Як випадковість, що сталася під час конфлікту в монастирі."
          correct: false
        - text: "Як виконання таємного наказу золотоординського хана."
          correct: false
    - question: "Що, за словами автора, стало вирішальним географічним фактором для захисту Львова від монгольської облоги у 1287 році?"
      explanation: "Круті схили Замкової гори робили майже неможливим використання важкої облогової техніки."
      options:
        - text: "Круті схили Замкової гори та болотиста долина."
          correct: true
        - text: "Товсті кам'яні мури, збудовані німецькими колоністами."
          correct: false
        - text: "Віддаленість міста від основних торгових шляхів Європи."
          correct: false
        - text: "Наявність розгалуженої системи підземних ходів."
          correct: false
    - question: "Яку функцію автор підкреслює у використанні Левом Даниловичем статусу васала Золотої Орди?"
      explanation: "Васальний статус використовувався як дипломатичний щит та військовий ресурс для розширення власних володінь."
      options:
        - text: "Він використовував це як дипломатичний щит та військовий інструмент."
          correct: true
        - text: "Він змушений був прийняти це через повну втрату армії."
          correct: false
        - text: "Це дозволило йому повністю уникнути конфліктів із боярством."
          correct: false
        - text: "Він намагався таким чином поширити монгольську культуру."
          correct: false
    - question: "Згідно з текстом, чому залучення іноземних колоністів було стратегічним кроком у внутрішній політиці Лева?"
      explanation: "Формування нового класу міщан дозволило Леву створити міцну абсолютистську вертикаль і зменшити вплив бояр."
      options:
        - text: "Для зменшення залежності від старої боярської аристократії."
          correct: true
        - text: "Для підготовки масового переходу населення в католицтво."
          correct: false
        - text: "Для виконання умов мирного договору з угорським королем."
          correct: false
        - text: "Для створення нових елітних військових підрозділів."
          correct: false
    - question: "Що, згідно з текстом, символізував вибір імені Лев для сина Данила Галицького?"
      explanation: "Ім'я Лев відображало силу та владу, що було необхідним для виживання в епоху Монгольського миру."
      options:
        - text: "Силу та левину лютість, необхідну для виживання держави."
          correct: true
        - text: "Відданість католицькій вірі та союзу з Папою Римським."
          correct: false
        - text: "Бажання наслідувати візантійських імператорів того часу."
          correct: false
        - text: "Пам'ять про давніх предків з династії Рюриковичів."
          correct: false
    - question: "У чому полягало стратегічне значення приєднання Левом Мукачівської домінії у Закарпатті?"
      explanation: "Володіння Мукачевом означало повний контроль над карпатськими перевалами та торговими шляхами."
      options:
        - text: "Встановлення повного контролю над карпатськими перевалами."
          correct: true
        - text: "Отримання доступу до родовищ срібла та золота в горах."
          correct: false
        - text: "Створення військової бази для нападу на столицю Угорщини."
          correct: false
        - text: "Переселення туди частини галицького боярства."
          correct: false
    - question: "Яким чином шлюб Лева Даниловича з Констанцією вплинув на життя княжого двору?"
      explanation: "Двір став місцем культурного синтезу, де православні традиції перепліталися із західними лицарськими."
      options:
        - text: "Він сприяв культурному синтезу та залученню західноєвропейських традицій."
          correct: true
        - text: "Він призвів до повного переходу всієї знаті в католицьку віру."
          correct: false
        - text: "Він спричинив конфлікт з православним духовенством Галичини."
          correct: false
        - text: "Він змусив Лева відмовитися від претензій на литовський престол."
          correct: false