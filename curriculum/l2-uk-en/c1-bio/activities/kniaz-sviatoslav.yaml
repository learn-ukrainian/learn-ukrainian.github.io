- type: reading
  id: reading-leo-deacon
  title: "Лев Диякон: Портрет Завойовника"
  instruction: "Прочитайте опис зовнішності Святослава."
  source: "Лев Диякон. Історія (книга 9)"
  text: |
    Побачили його, що сидячи в човні, бив веслом нарівні з іншими, без жодної різниці. Виглядав він так: середнього зросту, не надто високого і не дуже низького, з кошлатими бровами і світло-синіми очима, кирпатий, безбородий, з густим, надмірно довгим волоссям над верхньою губою. Голова в нього була зовсім гола, але з одного боку її звисало пасмо волосся, що означало знатність роду; шия товста, плечі широкі, і весь стан досить стрункий. Він здавався похмурим і дикуватим. В одне вухо в нього була вдіта золота сережка; вона була прикрашена карбункулом, обрамленим двома перлинами. Одяг на ньому був білий і відрізнявся від одягу його наближених тільки чистотою.

- type: essay-response
  id: essay-soft-vs-hard
  title: "Есе: Сила Слова проти Сили Меча"
  instruction: "Напишіть есе, порівнюючи стратегії Ольги та Святослава."
  prompt: "Княгиня Ольга і князь Святослав уособлюють дві різні моделі державотворення. Яка з них, на вашу думку, була більш ефективною для Русі X століття? Чи можливо було поєднати ці підходи без внутрішнього конфлікту?"
  model_answer: |
    Ольга обрала шлях інтеграції та дипломатії («м'яка сила»), розуміючи, що Русь ще не готова до прямого зіткнення з Візантією. Її реформи зміцнили економіку і дали ресурс для армії. Святослав обрав шлях домінування («тверда сила»), прагнучи перетворити Русь на імперію.
    У короткостроковій перспективі методи Святослава дали територіальний приріст і славу, але виснажили ресурси. Методи Ольги дали стабільність і визнання. Ефективність залежала від цілей: для виживання потрібна була Ольга, для експансії — Святослав. Поєднання цих підходів відбулося лише за Володимира, який використав меч для об'єднання, а хрест (спадщину Ольги) — для легітимізації.
  min_words: 250

- type: comparative-study
  id: compare-warfare
  title: "Порівняльний аналіз: Стіна Щитів vs Катафракти"
  instruction: "Порівняйте військову тактику русів та візантійців."
  items_to_compare:
    - "Військо Святослава (Руси)"
    - "Військо Цимісхія (Візантія)"
  criteria:
    - "Основна ударна сила"
    - "Мобільність"
    - "Технологічне оснащення"
  model_answer: |
    Військо русів спиралося на піхоту («стіна щитів»), що була ефективною в обороні та на пересіченій місцевості. Їхньою перевагою була стратегічна мобільність (човни-моноксили) і високий бойовий дух. Недоліком була відсутність важкої кінноти і облогових машин.
    Візантійське військо було професійною машиною з важкою кіннотою (катафрактаріями) та флотом, оснащеним «грецьким вогнем». Вони переважали в технологіях і дисципліні маневру, але поступалися в індивідуальній люті та витривалості.

- type: true-false
  id: tf-sviatoslav-facts
  title: "Перевірка фактів"
  instruction: "Визначте правдивість тверджень про походи Святослава."
  items:
    - statement: "Святослав зруйнував столицю Хазарії Ітіль і залишив там гарнізон."
      correct: false
      explanation: "Ні, він зруйнував місто вщент, але не залишив гарнізону, на відміну від Саркела (Білої Вежі)."
    - statement: "Святослав загинув у битві з візантійцями під Доростолом."
      correct: false
      explanation: "Ні, він загинув від рук печенігів на дніпровських порогах, повертаючись додому."
    - statement: "Гасло «Іду на ви!» означало оголошення війни."
      correct: true
      explanation: "Так, це було попередження про напад, що демонструвало лицарську честь."
    - statement: "Святослав планував перенести столицю з Києва до Переяславця на Дунаї."
      correct: true
      explanation: "Так, він вважав це місто центром своєї землі."
    - statement: "Імператор Цимісхій був союзником Святослава у війні проти болгар."
      correct: false
      explanation: "Ні, спочатку союзником був Никифор Фока, а Цимісхій воював проти Святослава."
    - statement: "Армія Святослава використовувала «грецький вогонь»."
      correct: false
      explanation: "Ні, це була секретна зброя візантійців."
    - statement: "Святослав призначив своїх синів намісниками в ключових містах Русі."
      correct: true
      explanation: "Так, це була його адміністративна реформа."
    - statement: "Печеніги зробили з черепа Святослава чашу."
      correct: true
      explanation: "Так, за літописною легендою."
    - statement: "Святослав погодився прийняти хрещення після вмовлянь Ольги."
      correct: false
      explanation: "Ні, він категорично відмовився, боячись глузувань дружини."
    - statement: "Битва під Аркадіополем завершилася повною перемогою русів."
      correct: false
      explanation: "Ні, візантійці завдали русам значних втрат, хоча війна тривала."
