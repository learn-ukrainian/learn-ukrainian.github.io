- type: reading
  id: reading-testament
  title: "Первинне джерело: Заповіт"
  source: "Тарас Шевченко (1845)"
  text: |
    Як умру, то поховайте
    Мене на могилі
    Серед степу широкого
    На Вкраїні милій,
    Щоб лани широкополі,
    І Дніпро, і кручі
    Було видно, було чути,
    Як реве ревучий.
  instruction: "Прочитайте фрагмент найвідомішого твору поета."
  tasks:
    - "Знайдіть ключові географічні образи в тексті."
    - "Подумайте, яку емоційну роль вони відіграють."

- type: critical-analysis
  title: "Аналіз національного символізму"
  source_reading: "reading-testament"
  instruction: "Проаналізуйте наведений уривок."
  items:
    - prompt: "У тексті модуля зазначено, що цей вірш став причиною для масової маніфестації. Який символічний заповіт залишив автор для майбутніх поколінь через візуальні образи?"
      model_answer: "Через візуальні образи широкого степу та могутнього Дніпра автор залишив заповіт нерозривного зв'язку нації з рідною землею, перетворюючи ландшафт на частину національної ідентичності."

- type: essay-response
  title: "Есей: Архітектор нації"
  instruction: "Напишіть аргументований есей на основі прочитаного матеріалу."
  prompt: "Згідно з текстом модуля, Тарас Шевченко став 'архітектором нації'. Який аргумент автор тексту наводить на користь того, що література здатна формувати політичний фундамент? Обґрунтуйте свою відповідь."
  model_answer: "У тексті аргументується, що Шевченко через свої твори надав бездержавному народу потужний ідеологічний фундамент. Його література артикулювала національну ідею, створивши універсальний код ідентичності. На відміну від традиційного державотворення через закони та армії, Шевченко легітимізував українську мову і повернув народу його історичну пам'ять. Це доводить, що в умовах колоніалізму література може слугувати 'конституцією' та інструментом національного пробудження."
  rubric:
    - criteria: "Аналіз тексту"
      description: "Здатність знаходити та інтерпретувати аргументи автора щодо державотворчої ролі літератури."
      points: 40
    - criteria: "Структура есею"
      description: "Логічна послідовність думок, наявність вступу, основної частини та висновку."
      points: 30
    - criteria: "Мовне оформлення"
      description: "Використання академічної лексики та відсутність граматичних помилок."
      points: 30

- type: quiz
  title: "Перевірка розуміння тексту"
  instruction: "Оберіть правильну відповідь на основі тексту модуля."
  items:
    - question: "Згідно з текстом, як автор характеризує міф про Шевченка як про 'селянського поета-самоучку'?"
      explanation: "У тексті сказано, що цей спотворений образ був створений імперською та радянською пропагандою для маргіналізації його спадщини."
      options:
        - text: "Як спотворений образ, створений пропагандою для маргіналізації його європейської спадщини."
          correct: true
        - text: "Як абсолютно точне відображення його походження та відсутності класичної освіти."
          correct: false
        - text: "Як позитивний концепт, який допоміг йому стати популярним серед іноземної еліти."
          correct: false
        - text: "Як історичний факт, підтверджений його власними листами та щоденниками."
          correct: false
    - question: "Який аргумент автор наводить для пояснення феномену малювання в ранні роки життя Тараса?"
      explanation: "Малювання описано як форма екзистенційного внутрішнього спротиву в умовах кріпацтва."
      options:
        - text: "Воно було формою екзистенційного внутрішнього спротиву та можливістю бути творцем."
          correct: true
        - text: "Воно дозволяло йому заробляти великі гроші для своєї родини в селі."
          correct: false
        - text: "Це було обов'язкове завдання, яке йому доручив поміщик Енгельгардт."
          correct: false
        - text: "Це був єдиний спосіб швидко отримати відпускну грамоту від пана."
          correct: false
    - question: "У тексті модуля автор пояснює звільнення Шевченка. Яким чином Брюллов зібрав необхідну суму?"
      explanation: "Брюллов запропонував написати портрет Жуковського для приватної лотереї."
      options:
        - text: "Він написав портрет Василя Жуковського, який розіграли у приватну лотерею."
          correct: true
        - text: "Він звернувся з офіційним проханням про фінансування до імператора Миколи І."
          correct: false
        - text: "Він продав кілька своїх найкращих пейзажів на аукціоні у Європі."
          correct: false
        - text: "Він позичив гроші у найбагатших студентів Академії мистецтв."
          correct: false
    - question: "Згідно з текстом, яку роль відіграло видання збірки 'Кобзар' у 1840 році?"
      explanation: "Видання легітимізувало українську мову, довівши її здатність передавати високі почуття."
      options:
        - text: "Вона стала актом культурної легітимізації нації та довела повноцінність мови."
          correct: true
        - text: "Вона була виключно збіркою жартівливих віршів для петербурзької еліти."
          correct: false
        - text: "Вона стала офіційним підручником з історії для студентів університетів."
          correct: false
        - text: "Вона не мала великого впливу через тотальну заборону імперською цензурою."
          correct: false
    - question: "Яку причину автор наводить для переходу поета до жорсткої політичної сатири в альбомі 'Три літа'?"
      explanation: "Шоком стало зіткнення романтичної мрії з жорстокою колоніальною реальністю під час подорожі Україною."
      options:
        - text: "Зіткнення його романтичної мрії з жорстокою реальністю соціального гноблення в Україні."
          correct: true
        - text: "Офіційне замовлення від членів Кирило-Мефодіївського товариства у Києві."
          correct: false
        - text: "Бажання наслідувати стиль відомих європейських письменників того часу."
          correct: false
        - text: "Особистий конфлікт із петербурзькими літературними критиками."
          correct: false
    - question: "У тексті автор аналізує вирок Миколи І. Чому імператор додав заборону писати й малювати?"
      explanation: "Це була спроба духовної страти генія, оскільки цар розумів силу його мистецтва."
      options:
        - text: "Він розумів, що найбільшою зброєю митця є його мистецтво, і хотів духовно знищити його."
          correct: true
        - text: "Він боявся, що Шевченко малюватиме таємні військові карти Оренбурзького краю."
          correct: false
        - text: "Він вважав, що солдатська служба вимагає повної концентрації на муштрі."
          correct: false
        - text: "Він хотів змусити його працювати виключно як офіційного писаря в армії."
          correct: false
    - question: "Згідно з текстом, як сучасні дослідники пояснюють гнів поета на офіційну церкву?"
      explanation: "Гнів був викликаний тим, що офіційна церква слугувала інструментом імперського гноблення."
      options:
        - text: "Тим, що російська православна церква була інструментом імперського гноблення."
          correct: true
        - text: "Тим, що він поділяв марксистські та атеїстичні погляди європейських філософів."
          correct: false
        - text: "Тим, що церква забороняла йому малювати ікони у традиційному українському стилі."
          correct: false
        - text: "Тим, що священнослужителі відмовлялися допомагати йому під час заслання."
          correct: false
    - question: "Яку ключову ідею щодо статусу українців артикулював Шевченко у своїх історичних творах?"
      explanation: "Він показав історію очима народу, повернувши українцям право пишатися своїми предками-воїнами."
      options:
        - text: "Він довів, що українці мають власну історію і були вільними воїнами, а не покірними рабами."
          correct: true
        - text: "Він стверджував, що інтеграція в імперський простір є єдиним шляхом до прогресу."
          correct: false
        - text: "Він підкреслював необхідність забути минуле заради побудови мирного майбутнього."
          correct: false
        - text: "Він пропонував повністю відмовитися від козацької спадщини як застарілої."
          correct: false

- type: true-false
  title: "Аналіз тверджень за текстом"
  instruction: "Визначте, чи відповідають твердження змісту прочитаного модуля."
  items:
    - statement: "У тексті зазначено, що Кирило-Мефодіївське братство пропонувало створити конфедерацію рівноправних слов'янських республік."
      correct: true
      explanation: "Це була головна візія братства, яка передбачала демократичний лад і центр у Києві."
    - statement: "Згідно з текстом, Шевченко підтримав ідею Костомарова про виключно мирні реформи та просвітництво."
      correct: false
      explanation: "Шевченко належав до радикального крила і вважав, що свободу можна здобути шляхом народного повстання."
    - statement: "Автор тексту підкреслює, що під час заслання Шевченко повністю припинив писати вірші через сувору заборону."
      correct: false
      explanation: "Він таємно продовжував писати, ховаючи тексти у так звані 'захалявні книжечки'."
    - statement: "У тексті аргументується, що Шевченко став першим свідомим антиімперським мислителем Східної Європи."
      correct: true
      explanation: "Він деконструював міф про те, що імперія принесла цивілізацію, і передбачив її крах."
    - statement: "Автор зазначає, що статус козачка при дворі Енгельгардта дозволив юнакові наблизитися до світу аристократії та європейської культури."
      correct: true
      explanation: "Служба дала йому можливість бачити картини, слухати розмови еліти та подорожувати Європою."
    - statement: "Згідно з текстом, офіційна російська історіографія визнавала українців самостійним суб'єктом історії."
      correct: false
      explanation: "Офіційна історіографія викреслювала українців, називаючи їхні землі просто 'Південно-Західним краєм'."