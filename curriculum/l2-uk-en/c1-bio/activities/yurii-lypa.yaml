- type: reading
  id: reading-doctrine
  title: Концепція Чорноморської доктрини
  source: Юрій Липа
  text: 'Для нього велике Чорне море було зовсім не глухим природним кордоном, який
    нібито обмежує державу на півдні і замикає її в континентальному просторі. Навпаки
    — море розглядалося ним як ідеальний стартовий майданчик для масштабної міжнародної
    проекції військової сили, глобальної торгівлі та потужної культурної експансії
    українства у світ. Він переконливо стверджував, що справжній геополітичний центр
    тяжіння сучасної України лежить саме там — на солоному узбережжі.

    '
  tasks:
  - Як Юрій Липа пропонував сприймати Чорне море?
  - Що, на його думку, дає Україні контроль над узбережжям?
- type: true-false
  title: Біографічні та концептуальні факти
  items:
  - statement: Юрій Липа розглядав втрату незалежності як незворотну смерть нації.
    correct: false
    explanation: Він класифікував це як тимчасову хворобу, яку можна вилікувати.
  - statement: Літературне угруповання 'Танк' сповідувало естетику вольового націоналізму.
    correct: true
    explanation: Учасники групи вважали літературу зброєю мобілізації нації.
  - statement: У праці 'Призначення України' Липа доводив, що природною віссю України
      є вектор Захід-Схід.
    correct: false
    explanation: Він обґрунтував, що природна вісь України — це вектор Північ-Південь.
  - statement: Липа вважав, що Російська імперія неминуче розпадеться через свою штучність
      і поневолення інших націй.
    correct: true
    explanation: У книзі 'Розподіл Росії' він детально аналізував нежиттєздатність
      цієї імперії.
  - statement: У 1944 році Юрій Липа успішно емігрував до Мюнхена, щоб уникнути радянських
      репресій.
    correct: false
    explanation: Він категорично відмовився від еміграції, щоб залишитися з повстанцями.
  instruction: Визначте, чи твердження правильне.
- type: critical-analysis
  id: analysis-doctrine
  source_reading: reading-doctrine
  title: Аналіз морської парадигми
  target_text: море розглядалося ним як ідеальний стартовий майданчик для масштабної
    міжнародної проекції військової сили
  questions:
  - Яку функцію в цьому уривку виконує метафора 'стартовий майданчик'?
  - Як цей погляд контрастує з традиційною 'континентальною психологією'?
  model_answers:
  - Метафора підкреслює активну, наступальну роль держави. Море — це не кінець території,
    а початок експансії.
  - Континентальна психологія сприймає море як межу, тоді як Липа бачить у ньому ресурс
    для глобального домінування.
  focus_points:
  - Метафорика експансії
  - Просторова психологія
- type: reading
  id: reading-partition
  title: Концепція розподілу Росії
  source: Юрій Липа
  text: 'Цей очікуваний розподіл Липа розглядав зовсім не як якусь далеку теоретичну
    можливість чи фантазію, а як жорстку історичну неминучість, зумовлену законами
    розвитку суспільств. Він залізно аргументував свою позицію тим, що ця величезна
    імперія штучно тримається виключно на масовому терорі, системному залякуванні
    та військовому примусі. Вона повністю позбавлена будь-якої внутрішньої органічної
    єдності чи спільної ідеї. Вона механічно складається з десятків жорстоко поневолених
    націй, кожна з яких має власний, придушений потенціал для створення незалежної
    національної держави.

    '
  tasks:
  - Які фактори, на думку автора, забезпечують існування імперії?
  - Чому Липа вважав розпад імперії історичною неминучістю?
- type: authorial-intent
  id: intent-partition
  source_reading: reading-partition
  title: 'Аналіз авторського наміру: ''Розподіл Росії'''
  prompt: Проаналізуйте вибір автором терміна 'розподіл' замість 'розпад'. Який ідеологічний
    меседж закладено у цьому виборі?
  text_excerpt: Цей очікуваний розподіл Липа розглядав зовсім не як якусь далеку теоретичну
    можливість чи фантазію, а як жорстку історичну неминучість...
  techniques_to_identify:
  - Лексичний вибір (розподіл замість розпад)
  - Категоричність тверджень
  model_answer: Використання терміна 'розподіл' свідчить про активну позицію. Розпад
    — це пасивний процес, тоді як розподіл вимагає свідомої дії поневолених націй.
- type: quiz
  title: Перевірка розуміння концепцій
  items:
  - question: Яку методологію Юрій Липа застосовував до аналізу політичного стану
      нації?
    explanation: Як лікар, він застосовував медичний підхід до політичних проблем.
    options:
    - text: медичну методологію з діагнозами та лікуванням
      correct: true
    - text: економічний аналіз світових ринків
      correct: false
    - text: релігійно-містичний філософський підхід
      correct: false
    - text: марксистський класовий аналіз суспільства
      correct: false
  - question: Яку геополітичну організацію регіональної безпеки пропонував створити
      мислитель?
    explanation: Він був ідеологом Балто-Чорноморської дуги (Міжмор'я).
    options:
    - text: потужний Балто-Чорноморський союз вільних країн
      correct: true
    - text: Євразійський економічний союз із Росією
      correct: false
    - text: союз східноєвропейських держав під Німеччиною
      correct: false
    - text: Панслов'янську федерацію всіх народів
      correct: false
  - question: Який історичний міф руйнує участь Юрія Липи в боях за Одесу?
    explanation: Це доводить, що Одеса не була суто російським містом.
    options:
    - text: міф про Одесу як виключно російське місто
      correct: true
    - text: міф про те, що Одеса ніколи не мала портів
      correct: false
    - text: міф про мирне співіснування під час революції
      correct: false
    - text: міф про виключно грецьке походження міста
      correct: false
  - question: Чому мислитель обрав назву 'Розподіл Росії', а не 'розпад'?
    explanation: Термін вимагає активного суб'єкта, який діє.
    options:
    - text: бо цей термін вимагає активного суб'єкта дії
      correct: true
    - text: бо імперія розпадеться сама без втручання
      correct: false
    - text: бо це був популярний польський термін
      correct: false
    - text: бо він хотів поділити її порівну
      correct: false
  - question: Яку роль виконував Юрій Липа в Українській Повстанській Армії?
    explanation: Він був інструктором старшинської школи УПА.
    options:
    - text: був інструктором з медицини та геополітики
      correct: true
    - text: був головнокомандувачем усіх збройних сил
      correct: false
    - text: відповідав за закупівлю зброї за кордоном
      correct: false
    - text: був рядовим стрільцем без обов'язків
      correct: false
  instruction: Оберіть правильну відповідь.
- type: essay-response
  title: 'Есе: Пророчий вимір Чорноморської доктрини'
  source_reading: reading-doctrine
  prompt: 'Напишіть аналітичне есе на тему: ''Чи була Чорноморська доктрина Юрія Липи
    пророчою?''. Розгляньте його погляд на Чорне море як простір сили та порівняйте
    ці ідеї з сучасними безпековими викликами України.

    '
  min_words: 300
  model_answer: 'Чорноморська доктрина Юрія Липи беззаперечно виявилася пророчою працею,
    яка на багато десятиліть випередила свій час. У той час як значна частина української
    еліти страждала на континентальну психологію, Липа категорично стверджував, що
    море — це не кордон, а стартовий майданчик для експансії.

    Сьогоднішня геополітична ситуація повністю підтверджує його тези. Боротьба України
    за контроль над чорноморською акваторією є питанням виживання держави. Його ідея
    про те, що без військового панування на узбережжі неможлива економічна незалежність,
    стала практичною реальністю. Більше того, його бачення осі Північ-Південь активно
    втілюється у міжнародних альянсах, доводячи актуальність ідей мислителя.

    '
  rubric:
  - criteria: Аргументація та аналіз
    description: Глибоке розкриття теми з опорою на концепції Юрія Липи.
    points: 40
  - criteria: Зв'язок із сучасністю
    description: Вдале порівняння історичних ідей із поточними геополітичними реаліями.
    points: 30
  - criteria: Стилістика та мова
    description: Використання аналітичної термінології та академічного стилю.
    points: 30
