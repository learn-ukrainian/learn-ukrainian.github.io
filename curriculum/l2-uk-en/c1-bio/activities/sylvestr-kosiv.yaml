- type: reading
  id: reading-exegesis
  title: 'Первинне джерело: Екзегезис'
  source: Сильвестр Косів, Екзегезис (1635) (адаптовано)
  text: 'Перша причина, чому нашому народові потрібна латинська наука, є та, щоб нашої
    Руси не називали дурною Руссю. Вчіться, каже обмовець, грецькою мовою, а не латинською.
    Раджу й я те саме: вчіться грецькою, але й латинською не нехтуйте. Без неї ми
    не зможемо захистити наші права перед сеймом і королем. Латина є ключем до європейської
    освіти та надійним інструментом інтелектуального захисту нашої віри.

    '
  tasks:
  - Який головний аргумент наводить Косів на користь вивчення латини?
  - Як Косів ставиться до вивчення давньогрецької мови?
- type: critical-analysis
  source_reading: reading-exegesis
  title: 'Критичний аналіз: Захист освіти'
  instruction: Проаналізуйте аргументацію Сильвестра Косіва.
  items:
  - prompt: Яким чином Косів поєднує захист православної традиції з необхідністю вивчення
      католицької латини? Який прагматичний аргумент він використовує?
    model_answer: Косів стверджує, що латина потрібна не для зміни конфесії, а як
      інструмент захисту прав православних у Речі Посполитій. Прагматичний аргумент
      полягає в тому, що всі судові та політичні процеси велися латиною, і без неї
      українці не могли вести правову боротьбу та захищати свої інтереси перед королем
      і сеймом.
- type: true-false
  title: Перевірка розуміння тексту
  instruction: Визначте, чи відповідають твердження змісту модуля.
  items:
  - statement: Сильвестр Косів вважав, що православна церква повинна повністю ізолюватися
      від впливу західної науки.
    correct: false
    explanation: Навпаки, Косів був палким прихильником поєднання православної традиції
      з європейською вченістю.
  - statement: Твір Патерикон був написаний польською мовою з метою асиміляції української
      церкви.
    correct: false
    explanation: Косів використав польську мову стратегічно, щоб ознайомити польську
      еліту з величчю українських святих.
  - statement: Під час Переяславської ради 1654 року Сильвестр Косів категорично відмовився
      присягати московському царю.
    correct: true
    explanation: Митрополит відмовився складати присягу, захищаючи канонічну незалежність
      митрополії.
  - statement: Використання титулу Екзарх Константинопольського трону було для Косіва
      лише бюрократичною формальністю.
    correct: false
    explanation: Цей титул був потужним політичним маніфестом, який сигналізував Москві
      про незаконність її претензій на Київ.
  - statement: Після смерті Петра Могили Сильвестр Косів закрив Києво-Могилянський
      колегіум через брак фінансування.
    correct: false
    explanation: Навпаки, Косів докладав титанічних зусиль для розбудови колегіуму,
      інвестуючи в бібліотеку та викладачів.
- type: quiz
  title: Історичний та культурний контекст
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: У якому європейському навчальному закладі Сильвестр Косів отримав глибокі
      знання латини та античної філософії?
    explanation: Саме Замойська академія славилася своєю відкритістю до ренесансних
      ідей і стала ключовим етапом у формуванні світогляду митрополита.
    options:
    - text: у Замойській академії
      correct: true
    - text: у Краківському університеті
      correct: false
    - text: у Празькій академії
      correct: false
    - text: в університеті Сорбонни
      correct: false
  - question: Яку головну загрозу вбачав митрополит Косів у підпорядкуванні Київської
      церкви Московському патріархату?
    explanation: Московська традиція передбачала жорстке підпорядкування церкви державі
      та ворожість до західної науки, що загрожувало київській ідентичності.
    options:
    - text: втрату інтелектуальної свободи та русифікацію
      correct: true
    - text: збільшення церковних податків
      correct: false
    - text: зміну православного обряду на католицький
      correct: false
    - text: перенесення митрополії до Москви
      correct: false
  - question: Яким чином Сильвестр Косів захистив свою паству від звинувачень консерваторів
      у невігластві?
    explanation: Він видав трактат Екзегезис, де обґрунтував критичну необхідність
      вивчення латинської мови для українців.
    options:
    - text: видавши полемічний трактат Екзегезис
      correct: true
    - text: поїхавши з посольством до Варшави
      correct: false
    - text: заснувавши нову школу у місті Вільно
      correct: false
    - text: написавши офіційного листа Папі Римському
      correct: false
  - question: Що означав підкреслений титул Екзарх Константинопольського трону, який
      постійно використовував митрополит?
    explanation: Це був дипломатичний хід, що демонстрував підпорядкування Києва виключно
      Вселенському патріарху, а не Москві.
    options:
    - text: належність Києва до Вселенського патріархату
      correct: true
    - text: претензію на титул Вселенського патріарха
      correct: false
    - text: бажання перенести столицю до Константинополя
      correct: false
    - text: формальну посаду без реального політичного впливу
      correct: false
  - question: Яку стратегічну мету переслідував Сильвестр Косів, перекладаючи Патерик
      польською мовою?
    explanation: Польська була мовою еліти Речі Посполитої, і Косів прагнув змусити
      її поважати давню історію української святості.
    options:
    - text: демонстрацію величі київської святості польській еліті
      correct: true
    - text: повний перехід української церкви на польську мову
      correct: false
    - text: підготовку до підписання нової унії з Римом
      correct: false
    - text: полегшення читання тексту для простих селян
      correct: false
  - question: Як сучасні історики характеризують унікальну модель духовності, розбудовану
      Сильвестром Косівом?
    explanation: Цей феномен, що поєднував східну традицію із західним раціоналізмом,
      отримав назву київське християнство.
    options:
    - text: київське християнство
      correct: true
    - text: православний фундаменталізм
      correct: false
    - text: східний протестантизм
      correct: false
    - text: московське православ'я
      correct: false
  - question: Згідно з текстом модуля, як митрополит Сильвестр Косів ставився до повстання
      під проводом Богдана Хмельницького?
    explanation: Косів зустрічав гетьмана урочисто, але водночас глибоко боявся, що
      воєнний хаос знищить освітні здобутки.
    options:
    - text: вітав повстання, але боявся руйнівних наслідків війни
      correct: true
    - text: категорично засуджував повстання з найперших днів
      correct: false
    - text: особисто брав участь у битвах разом із козаками
      correct: false
    - text: повністю ігнорував військові події у країні
      correct: false
  - question: Який історичний наслідок мала принципова відмова Сильвестра Косіва присягати
      у 1654 році?
    explanation: Цей мужній крок дозволив зберегти канонічну незалежність Київської
      митрополії ще на три десятиліття, аж до 1686 року.
    options:
    - text: відтермінування анексії Київської митрополії на тридцять років
      correct: true
    - text: негайний арешт і страту митрополита московськими стрільцями
      correct: false
    - text: швидке скасування Переяславської угоди Богданом Хмельницьким
      correct: false
    - text: остаточний розрив відносин з Константинопольським патріархом
      correct: false
- type: essay-response
  title: 'Есе: Церква як інститут збереження ідентичності'
  instruction: Напишіть розгорнуту відповідь на запропоновану тему, спираючись на
    текст модуля.
  items:
  - prompt: На прикладі діяльності Сильвестра Косіва проаналізуйте, як церква може
      виступати інститутом збереження національної ідентичності в умовах війни та
      геополітичного тиску. Які методи (освітні, дипломатичні, літературні) він використовував
      і наскільки вони виявилися ефективними?
    model_answer: 'В умовах Хмельниччини та наступу Москви, Сильвестр Косів перетворив
      церкву на інтелектуальний щит нації. Він використовував комплексні методи. Освітні
      методи включали розбудову Києво-Могилянського колегіуму та захист латини як
      мови міжнародної дипломатії. Літературні методи проявилися у виданні твору Патерикон
      польською мовою для утвердження гідності української культури серед політичної
      еліти Речі Посполитої. Дипломатичні методи включали використання титулу Екзарха
      Константинопольського трону та категоричну відмову від присяги московському
      царю у 1654 році. Його стратегія виявилася вкрай ефективною: вона відтермінувала
      анексію митрополії на три десятиліття та сформувала концепт ''київського християнства'',
      що стало основою українського спротиву в майбутньому.'
  min_words: 200
  rubric:
  - criteria: Аргументація та аналіз методів
    description: Чітко визначено та проаналізовано освітні, літературні та дипломатичні
      методи Сильвестра Косіва.
    points: 40
  - criteria: Розуміння історичного контексту
    description: Відповідь враховує складні геополітичні умови Хмельниччини та Переяславської
      ради.
    points: 30
  - criteria: Структура та логічність викладу
    description: Есе має вступ, основну аргументацію з прикладами та обґрунтований
      висновок.
    points: 30
- type: comparative-study
  title: 'Порівняльний аналіз: Київська та Московська традиції'
  instruction: Порівняйте київську та московську традиції.
  items_to_compare:
  - Київське християнство
  - Московська традиція XVII ст.
  criteria:
  - Ставлення до західної освіти
  - Відносини церкви та держави
  - Ступінь канонічної автономії
