          correct: false
    - question: 'Чому сучасна історіографія відмовляється від радянського кліше щодо постаті Наливайка?'
      explanation: 'Радянська пропаганда навмисно приховувала його шляхетське походження та перетворила на плоского борця з гнобителями.'
