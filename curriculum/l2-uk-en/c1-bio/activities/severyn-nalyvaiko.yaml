- type: reading
  id: reading-solonytsia
  title: 'Уривок: Трагедія на Солониці'
  source: 'Історичний нарис'
  text: |
    Трагедія в урочищі Солониця, коли після капітуляції козацького табору та видачі ватажків поляки влаштували масову різанину беззбройних людей, мала колосальні довготривалі наслідки для української історії. Цей акт жорстокості породив глибокий, незагойний травматичний міф про лядську зраду. Пам'ять про те, що гарантіям коронного уряду та честі польських генералів категорично не можна довіряти, передавалася з покоління в покоління. Під час наступних повстань спогади про Солоницю слугували найсильнішим мобілізаційним фактором.

- type: critical-analysis
  title: 'Аналіз тексту: Міф про зраду'
  source_reading: reading-solonytsia
  questions:
    - question: 'Згідно з текстом, як автор пояснює психологічний феномен Солоницької трагедії у свідомості наступних поколінь?'
      sample_answer: 'Автор стверджує, що ця подія стала потужним мобілізаційним міфом, який знищив довіру до коронного уряду та змушував козаків об''єднуватися під час майбутніх виступів.'
    - question: 'Який аргумент наводить автор, порівнюючи повстання Наливайка та виступ Косинського?'
      sample_answer: 'Автор вказує на суттєву різницю в масштабах та цілях: Косинський захищав станові привілеї локально, тоді як Наливайко вимагав створення окремої територіальної автономії.'
    - question: 'У тексті зазначається, що Наливайко був професійним військовим, а не розбійником. Які факти з його біографії підтверджують цю тезу?'
      sample_answer: 'Його шляхетське походження, досвід служби сотником у князя Острозького, дипломатичне листування з монархом та свідома вимога автономії.'

- type: essay-response
  title: 'Есе: Історична оцінка постаті Наливайка'
  source_reading: reading-solonytsia
  instruction: 'Спираючись на текст модуля, поясніть, чому радянська історіографія намагалася приховати шляхетське походження Наливайка. Яку ідеологічну мету мав цей міф?'
  rubric:
    - criteria: 'Аналіз тексту'
      description: 'Есе спирається на наведені аргументи та історичний контекст Речі Посполитої.'
      points: 4
    - criteria: 'Словниковий запас'
      description: 'Використання цільової лексики модуля, зокрема термінів, пов''язаних із політикою та війною.'
      points: 3
    - criteria: 'Граматика'
      description: 'Правильне використання складних синтаксичних конструкцій та дотримання норм орфографії.'
      points: 3

