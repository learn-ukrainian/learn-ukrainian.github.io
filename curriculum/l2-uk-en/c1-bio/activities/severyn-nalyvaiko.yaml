      explanation: 'Наливайко першим вимагав створення окремої козацької території, вільної від польської адміністрації.'
      options:
        - text: 'створення козацької території'
          correct: true
        - text: 'збільшення козацького реєстру'
          correct: false
        - text: 'скасування Берестейської унії'
          correct: false
        - text: 'заборона католицької церкви'
          correct: false
    - question: 'Згідно з текстом, як урядові кола Речі Посполитої позиціонували Берестейську унію?'
      explanation: 'Офіційною метою проголошувалося подолання релігійного розколу, хоча фактично це була спроба асиміляції.'
