- type: reading
  id: reading-chronicle
  title: "Уривок з «Повісті минулих літ»: Помста Ольги"
  instruction: "Прочитайте уривок з літопису, звертаючи увагу на символізм дій Ольги."
  source: "Повість минулих літ (переклад В. Близнеця)"
  text: |
    І послала Ольга до деревлян, кажучи: «Се вже я йду до вас. Тож готуйте меди многі у граді, де вбито мужа мого. Хай поплачу я над гробом його і вчиню тризну мужеві моєму». Вони ж, почувши це, звезли меди многі і зварили. І прийшла Ольга з невеликою дружиною і плакала над гробом його. І повеліла вона людям своїм насипати могилу велику, і, як насипали, повеліла тризну чинити. Після цього сіли деревляни пити, і звеліла Ольга отрокам своїм прислуговувати їм. І сказали деревляни Ользі: «А де дружина наша, що ми послали по тебе?». Вона ж відповіла: «Ідуть за мною з дружиною мужа мого». І як упились деревляни, звеліла вона отрокам своїм пити за них, а сама відійшла геть і звеліла дружині сікти їх. І посікли їх п'ять тисяч.

- type: critical-analysis
  id: analysis-revenge
  title: "Аналіз ритуального символізму"
  source_reading: reading-chronicle
  instruction: "Проаналізуйте наведений уривок крізь призму язичницької традиції."
  target_text: "І повеліла вона людям своїм насипати могилу велику, і, як насипали, повеліла тризну чинити."
  questions:
    - "Яке значення мала тризна в язичницькому поховальному обряді?"
    - "Чому Ольга обрала саме момент сп'яніння ворогів для атаки (крім тактичної переваги)?"
  model_answers:
    - "Тризна була не просто поминанням, а ритуальним годуванням померлого та його супроводу. Пролиття крові ворогів на могилі сприймалося як жертва, необхідна для статусу вождя в потойбіччі."
    - "Сп'яніння у ритуальному контексті могло символізувати перехід у стан зміненої свідомості, близький до смерті. Ольга використала це як сакральну пастку."
  focus_points:
    - "Ритуальне жертвоприношення"
    - "Сакральна роль вдови"
    - "Поєднання хитрості та обов'язку"

- type: essay-response
  id: essay-diplomacy
  title: "Есе: Дипломатія Ольги"
  instruction: "Напишіть коротке есе, аналізуючи зовнішню політику княгині."
  prompt: "Порівняйте дипломатичні методи княгині Ольги з методами її попередників (Олега, Ігоря) та наступника (Святослава). У чому полягала її інноваційність?"
  model_answer: "Головна відмінність дипломатії Ольги полягала у відмові від виключно силового тиску на користь переговорів та особистих візитів. Якщо Олег та Ігор намагалися отримати торгові преференції через військові походи на Константинополь, то Ольга досягала цього через хрещення та особисті контакти з імператором. Святослав повернувся до мови зброї, що врешті призвело до його загибелі. Ольга ж інтегрувала Русь у європейський контекст як суб'єкта, а не як загрозу."
  min_words: 200

- type: comparative-study
  id: compare-reforms
  title: "Порівняльний аналіз: Полюддя vs Уроки"
  instruction: "Порівняйте дві системи збору данини."
  items_to_compare:
    - "Система «Полюддя» (до 945 р.)"
    - "Система «Уроків та погостів» (після 945 р.)"
  criteria:
    - "Передбачуваність та фіксованість"
    - "Роль адміністративного апарату"
    - "Ризики для центральної влади"
  model_answer: |
    Система полюддя базувалася на нерегулярному об'їзді та довільному вилученні ресурсів, що створювало високі ризики конфліктів (смерть Ігоря). Вона залежала від військової сили князя.
    Система уроків запровадила фіксований податок, відомий заздалегідь. Погости стали стаціонарними центрами влади, де сиділи тіуни (чиновники), а не дружинники. Це знизило ризик повстань і перетворило грабіж на державне адміністрування.

- type: true-false
  id: tf-facts
  title: "Перевірка фактів"
  instruction: "Визначте правдивість тверджень."
  items:
    - statement: "Княгиня Ольга була першою жінкою-правителькою Русі, яка прийняла християнство."
      correct: true
      explanation: "Так, вона охрестилася, ймовірно, у 950-х роках."
    - statement: "Реформа Ольги полягала у збільшенні розміру полюддя."
      correct: false
      explanation: "Ні, вона скасувала полюддя і запровадила фіксовані уроки."
    - statement: "Візит Ольги до Константинополя описаний у творі «Повість минулих літ» як суто військовий похід."
      correct: false
      explanation: "Ні, це був дипломатичний візит, хоча літопис містить легендарні деталі."
    - statement: "Святослав підтримав релігійний вибір матері і також охрестився."
      correct: false
      explanation: "Ні, Святослав залишився переконаним язичником."
    - statement: "Погости спочатку були місцями для збору данини, а не цвинтарями."
      correct: true
      explanation: "Термін походить від слова «гість» (купець)."
    - statement: "Ольга встановила погости по річках Мста і Луга, закріплюючи контроль над північчю."
      correct: true
      explanation: "Це було частиною її масштабного об'їзду територій у 947 році."
    - statement: "Місія єпископа Адальберта 961–962 рр. завершилася успішним хрещенням Русі."
      correct: false
      explanation: "Ні, місія провалилася через опір язичницького оточення Святослава."
    - statement: "Вишгород був особистою резиденцією Ольги, де вона тримала третину данини."
      correct: true
      explanation: "Літопис називає Вишгород «градом Ольжиним»."
    - statement: "Ольга заповіла синові справити над нею велику язичницьку тризну."
      correct: false
      explanation: "Навпаки, вона заборонила тризну і просила поховати її за християнським обрядом."
    - statement: "Ольгу було канонізовано церквою як рівноапостольну святу."
      correct: true
      explanation: "Цей статус підкреслює її роль як просвітительки Русі."
    - statement: "Археологічні розкопки підтверджують початок монументального кам'яного будівництва в Києві саме за часів Ольги."
      correct: true
      explanation: "Виявлені фундаменти ротонди X століття свідчать про впровадження візантійських архітектурних технік."
    - statement: "Ольга намагалася встановити церковні контакти з німецьким королем Оттоном I, щоб уникнути повної залежності від Візантії."
      correct: true
      explanation: "Місія 959 року свідчить про спробу багатовекторної дипломатії та звернення до Риму."
