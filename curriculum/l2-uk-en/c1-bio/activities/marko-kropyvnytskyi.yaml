- type: reading
  id: reading-letter
  title: 'Первинне джерело: Лист до Бориса Грінченка'
  source: 'Марко Кропивницький'
  text: |
    Я, добродію, артист, перш усього артист, і не схибив перед українським театром ані на півмізинця... Суду історії я не боюсь, бо я роблю моє діло як умію і як можу.
  tasks:
    - 'Як автор визначає свою головну ідентичність?'
    - 'Яке ставлення до можливої критики нащадків демонструє цей уривок?'

- type: critical-analysis
  title: 'Аналіз: Мистецтво як місія'
  source_reading: reading-letter
  target_text: 'Суду історії я не боюсь, бо я роблю моє діло як умію і як можу.'
  questions:
    - 'Як ця заява характеризує внутрішній стан митця в умовах постійного цензурного тиску?'
    - 'Що означає фраза "не схибив перед українським театром" у контексті комерційних спокус того часу?'
  model_answers:
    - 'Ця заява свідчить про глибоку внутрішню впевненість митця у правильності обраного шляху. В умовах імперських заборон така позиція була актом не лише мистецької, але й громадянської мужності.'
    - 'Фраза вказує на безкомпромісність Кропивницького. Попри можливість легко заробляти гроші на російськомовних водевілях, він залишався вірним складній, соціально значущій українській драмі.'

- type: reading
  id: reading-glytay
  title: 'Аналітичний текст: Мова експлуататорів'
  text: |
    Мова експлуататорів (Бичок): Сповнена фальшивої лагідності, зменшувально-пестливих суфіксів, які приховують загрозу: "Ось тобі, чоловіче, грошенята, бери й не думай. Ми ж свої люди, якось-то воно порахуємось..." Глядач одразу зчитує за цими словами небезпеку боргової кабали. Мова селян-жертв: Насичена традиційними народними формулами, фольклорними порівняннями та ритмікою голосіння.
  tasks:
    - 'Яку функцію виконують зменшувально-пестливі суфікси в мові Бичка?'
    - 'Як контрастує мова жертв із мовою експлуататорів?'

- type: essay-response
  title: 'Есе: Лінгвістичний маркер соціального статусу'
  source_reading: reading-glytay
  prompt: 'Спираючись на наведений уривок, проаналізуйте, як Марко Кропивницький використовує мову персонажів (зокрема лексику та синтаксис) як інструмент соціальної характеристики в п''єсі "Глитай, або ж Павук". Чому такий підхід був новаторським для свого часу?'
  min_words: 250
  model_answer: 'У п''єсі "Глитай, або ж Павук" Марко Кропивницький віртуозно використовує мову як головний маркер соціальної сутності персонажа. Мова Бичка, сільського капіталіста-експлуататора, пересипана зменшувально-пестливими словами, що створює оманливу атмосферу довіри та родинності. За цією фальшивою лагідністю ховається холодний, хижацький розрахунок. Такий дисонанс між формою та змістом висловлювань ідеально розкриває лицемірство нового типу сільського багатія. Водночас мова його жертв є архаїчною, сповненою фольклорних елементів, що підкреслює їхню беззахисність перед новими економічними реаліями. Цей лінгвістичний психологізм був новаторським, адже він відходив від традиційного шаблонного поділу героїв на добрих і злих, пропонуючи глядачеві тонку психологічну гру.'
  rubric:
    - criteria: 'Аналіз лексики'
      description: 'Здатність знаходити та інтерпретувати зменшувально-пестливі форми.'
      points: 40
    - criteria: 'Розуміння контексту'
      description: 'Вміння пов''язати мовні особливості з соціальними явищами того часу.'
      points: 40
    - criteria: 'Стилістика'
      description: 'Академічний стиль викладу, відсутність граматичних помилок.'
      points: 20

- type: quiz
  title: 'Аналіз тексту: Корифей театру'
  instruction: 'Оберіть правильну відповідь до кожного запитання, спираючись на текст модуля.'
  items:
    - question: 'Згідно з текстом, чому використання зменшувально-пестливих суфіксів у мові Бичка викликає відчуття загрози?'
      explanation: 'Ці мовні засоби використовуються лицемірно, щоб приспати пильність бідняка перед затягуванням у боргову кабалу.'
      options:
        - text: 'Вони маскують холодний фінансовий розрахунок під фальшивою родинністю.'
          correct: true
        - text: 'Вони вказують на низький рівень освіти персонажа.'
          correct: false
        - text: 'Вони є типовими для сільського фольклору того часу.'
          correct: false
        - text: 'Вони використовуються для комічного ефекту у виставі.'
          correct: false
    - question: 'Яким чином театральна діяльність Марка Кропивницького сприяла формуванню сучасної політичної нації?'
      explanation: 'Театр став тим майданчиком, де українці з різних регіонів усвідомлювали свою спільну ідентичність і єдність.'
      options:
        - text: 'Вона створювала єдиний культурний простір для різних соціальних верств.'
          correct: true
        - text: 'Вона фінансувала підпільні політичні партії та рухи.'
          correct: false
        - text: 'Вона популяризувала ідеї збройного повстання серед селян.'
          correct: false
        - text: 'Вона сприяла масовому відкриттю українських шкіл в імперії.'
          correct: false
    - question: 'Що у тексті модуля означає термін "ансамблевість" у контексті режисерського підходу Кропивницького?'
      explanation: 'Режисер відмовився від домінування однієї зірки; у його виставах кожен актор масовки мав свою роль.'
      options:
        - text: 'Кожен актор на сцені має власну чітку лінію поведінки та біографію.'
          correct: true
        - text: 'Вистава будується навколо одного або двох найталановитіших прем''єрів.'
          correct: false
        - text: 'Музичний супровід повністю домінує над драматичним текстом.'
          correct: false
        - text: 'Всі актори одягнені в однакові стилізовані театральні костюми.'
          correct: false
    - question: 'Яку функцію, за словами автора тексту, виконувала українська пісня у драматичних виставах корифеїв?'
      explanation: 'Пісня вступала тоді, коли звичайних слів бракувало для вираження глибини людського горя або найвищої радості.'
      options:
        - text: 'Вона слугувала потужним інструментом розкриття прихованих емоцій та мотивів героїв.'
          correct: true
        - text: 'Вона використовувалася виключно як розважальна вставка між серйозними актами.'
          correct: false
        - text: 'Вона була потрібна для маскування політичних закликів від цензорів.'
          correct: false
        - text: 'Вона допомагала акторам перепочити під час довгих монологів.'
          correct: false
    - question: 'Який головний інструмент соціального тиску, згідно з аналізом п''єси "Глитай, або ж Павук", використовує Йосип Бичок?'
      explanation: 'Бичок використовує економічні та правові важелі, а не грубу силу, що робить його ще небезпечнішим.'
      options:
        - text: 'Боргові розписки, юридичні маніпуляції та психологічний тиск на односельців.'
          correct: true
        - text: 'Груба фізична сила та прямі погрози розправою.'
          correct: false
        - text: 'Використання зв''язків з імперською поліцією та чиновниками.'
          correct: false
        - text: 'Монополізація ринку збуту сільськогосподарської продукції.'
          correct: false
    - question: 'Як критики пояснювали успіх гастролей Театру корифеїв у Петербурзі попри початкове скептичне ставлення публіки?'
      explanation: 'Снобська столична публіка була підкорена щирістю гри та глибоким психологізмом, порівнюючи трупу з європейськими.'
      options:
        - text: 'Високим реалізмом, ідеальною взаємодією акторів та неймовірною щирістю гри.'
          correct: true
        - text: 'Використанням інноваційних для того часу світлових та звукових ефектів.'
          correct: false
        - text: 'Безкоштовною роздачею квитків для привернення уваги інтелігенції.'
          correct: false
        - text: 'Повною відмовою від української мови на користь російських перекладів.'
          correct: false
    - question: 'Який вплив мав жорсткий Емський указ на професійний розвиток українського театрального мистецтва у сімдесятих роках?'
      explanation: 'Акт цілеспрямованого культурного геноциду забороняв українські вистави, змушуючи митців грати в російських трупах.'
      options:
        - text: 'Він змусив українських митців працювати в підпіллі або грати у російських трупах.'
          correct: true
        - text: 'Він стимулював масовий виїзд українських акторів за кордон.'
          correct: false
        - text: 'Він дозволив створення окремих, виключно україномовних театрів.'
          correct: false
        - text: 'Він призвів до повної зупинки будь-якої аматорської діяльності.'
          correct: false
    - question: 'Чому автор тексту називає етап управління аматорськими гуртками школою виживання для режисера?'
      explanation: 'За відсутності професійних кадрів Кропивницький навчився брати на себе всі функції і працювати з мінімальними ресурсами.'
      options:
        - text: 'Кропивницькому доводилося виконувати абсолютно всі організаційні та художні функції самостійно.'
          correct: true
        - text: 'Аматорські вистави часто розганялися поліцією із застосуванням сили.'
          correct: false
        - text: 'Фінансування гуртків здійснювалося за рахунок кримінальних структур.'
          correct: false
        - text: 'Актори-аматори постійно влаштовували страйки та відмовлялися грати.'
          correct: false

- type: true-false
  title: 'Правильно чи неправильно: Новаторство Корифеїв'
  instruction: 'Визначте, чи є наведені твердження щодо режисерського та сценографічного методів Кропивницького правильними.'
  items:
    - statement: 'Кропивницький використовував виключно стандартні мальовані декорації із зображенням лісу або зали для своїх вистав.'
      correct: false
      explanation: 'Навпаки, він відмовився від стандартних декорацій і запровадив етнографізм, використовуючи об''ємні декорації та справжній реквізит.'
    - statement: 'У постановках Театру корифеїв музика та пісні виконували функцію повноцінної дійової особи, а не просто розважальної вставки.'
      correct: true
      explanation: 'Музика органічно впліталася в сюжет і допомагала розкрити приховані мотиви та емоції персонажів.'
    - statement: 'Після часткової легалізації українського театру у 1881 році було дозволено створювати самостійні україномовні театри без обмежень.'
      correct: false
      explanation: 'Легалізація супроводжувалася абсурдними обмеженнями, зокрема українські п''єси дозволялося грати лише в один вечір із російськими.'
    - statement: 'Головним інструментом експлуатації у п''єсі "Глитай, або ж Павук" є застосування грубої фізичної сили проти селян.'
      correct: false
      explanation: 'Бичок використовує економічні маніпуляції, боргові розписки та психологічний тиск замість прямої фізичної сили.'
    - statement: 'Поділ первісної трупи Театру корифеїв на кілька колективів дозволив значно розширити географію виступів українських артистів.'
      correct: true
      explanation: 'Попри конфлікт, поява нових міцних труп призвела до того, що українське мистецтво почали пропагувати одночасно в різних куточках імперії.'
    - statement: 'Лесь Курбас вважав, що Театр корифеїв не мав жодного впливу на його власні авангардні експерименти у двадцятих роках.'
      correct: false
      explanation: 'Лесь Курбас наголошував, що його революція була б неможливою без того фундаменту професіоналізму, який заклав Марко Кропивницький.'