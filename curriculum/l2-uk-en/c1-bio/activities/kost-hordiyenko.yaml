- type: reading
  id: reading-speech
  title: 'Промова Гордієнка до Карла XII (адаптація)'
  source: 'Кость Гордієнко, 1709 рік (реконструкція)'
  text: |
    Ми прийшли сюди не як смиренні прохачі, а як вільні лицарі, готові стати пліч-о-пліч у спільній боротьбі з тиранією. Вольності наші справедливо здобуті гарячою кров'ю предків, і жоден земний монарх не має морального права їх свавільно скасувати. Ми шукаємо не пана, а надійного союзника, здатного поважати давні права Війська Запорозького Низового.
  tasks:
    - 'Проаналізуйте риторику звернення до короля.'

- type: critical-analysis
  title: 'Аналіз дипломатичної риторики'
  source_reading: reading-speech
  target_text: 'Ми шукаємо не пана, а надійного союзника, здатного поважати давні права Війська Запорозького Низового.'
  items:
    - prompt: 'Як ця фраза характеризує зміну парадигми у зовнішній політиці Січі?'
      model_answer: 'Фраза яскраво демонструє, що Січ позиціонувала себе як суверенний і рівноправний суб''єкт міжнародного права, відкидаючи традиційну модель підлеглості імперському монарху.'
    - prompt: "Який контраст між московським самодержавством та козацькою республікою закладено в словах 'не як смиренні прохачі, а як вільні лицарі'?"
      model_answer: "Цей вислів протиставляє російську модель абсолютизму, де всі є безправними підданими царя, козацькій військовій демократії, заснованій на особистій свободі, виборності влади та лицарській гідності."
  focus_points:
    - 'Політична суб''єктність'
    - 'Республіканські цінності'

- type: essay-response
  title: 'Есе: Кость Гордієнко та деконструкція колоніального міфу'
  prompt: 'Спираючись на текст модуля, проаналізуйте, як постать Костя Гордієнка руйнує російський імперський міф про запорозьких козаків як "неосвічених маргіналів" та "розбійників". Оцініть його роль як ідеолога європейської козацької республіки.'
  model_answer: 'У своєму есе студент має наголосити на шляхетському походженні Гордієнка та його освіті в Києво-Могилянській академії, що дозволило йому вільно володіти латиною та вести переговори на рівні європейських монархів. Важливо розкрити його державницьку візію: відстоювання Конституції Пилипа Орлика, союз із Мазепою як рівноправним партнером та неприйняття московського самодержавства. Гордієнко постає не просто воїном, а інтелектуалом-дипломатом, який бачив Січ як суверенну республіку, а степ — не як "Дике Поле", а як законні "Вольності Війська Запорозького".'
  min_words: 300
  rubric:
    - criteria: 'Глибина аналізу'
      description: 'Здатність аргументовано деконструювати колоніальний міф.'
      points: 40
    - criteria: 'Використання термінології'
      description: 'Доречне використання понять: політична суб''єктність, республіканізм, самодержавство.'
      points: 30
    - criteria: 'Структура та логіка'
      description: 'Наявність вступу, аргументів та чітких висновків.'
      points: 30

- type: comparative-study
  title: 'Порівняльний аналіз: Кость Гордієнко та Іван Сірко'
  items_to_compare:
    - 'Кость Гордієнко'
    - 'Іван Сірко'
  criteria:
    - 'Політичне бачення та стратегічні цілі'
    - 'Освітній рівень та дипломатичні методи'
    - 'Ставлення до Російської імперії та інших сусідів'
  prompt: 'Порівняйте політичні підходи двох видатних кошових отаманів — Костя Гордієнка та Івана Сірка. Як відрізнялися їхні методи захисту інтересів Запорозької Січі?'
  model_answer: 'Іван Сірко уособлював військову потугу та блискавичні тактичні кампанії, часто маневруючи між різними центрами сили заради ситуативної вигоди та послаблення ворогів. Його дипломатія була переважно силовою. Натомість Кость Гордієнко мислив глибшими геополітичними категоріями. Маючи елітну освіту Києво-Могилянської академії, він діяв як політик та ідеолог. Гордієнко не обмежувався військовими рейдами, а укладав стратегічні союзи на рівних (з Мазепою та Карлом XII), легітимізував Конституцію 1710 року та послідовно боровся за визнання Запорозької Січі суверенним суб''єктом європейського права, категорично відкидаючи будь-які компроміси з російським самодержавством.'

- type: true-false
  title: 'Перевірка фактів: Життєвий шлях отамана'
  instruction: 'Визначте, чи є наступні твердження правильними, спираючись на текст модуля.'
  items:
    - statement: 'Згідно з текстом, Кость Гордієнко походив із простої селянської родини, що зумовило його неприйняття будь-якої еліти.'
      correct: false
      explanation: 'Він походив із заможного полтавського шляхетського роду Головків.'
    - statement: 'Автор зазначає, що Гордієнко вільно володів латиною і виголосив нею вітальну промову шведському королю Карлу XII.'
      correct: true
      explanation: 'Його елітна освіта в Києво-Могилянській академії дозволила йому спілкуватися мовою європейської дипломатії.'
    - statement: 'У тексті підкреслюється, що союз Гордієнка та Мазепи був емоційним рішенням, прийнятим під тиском шведської армії.'
      correct: false
      explanation: 'Цей військово-політичний альянс був ретельно продуманим стратегічним актом двох лідерів задля збереження державної незалежності.'
    - statement: 'Запорожці під проводом Гордієнка повністю саботували Полтавську битву та відмовилися прикривати відступ союзних сил.'
      correct: false
      explanation: 'Мобільна козацька кіннота забезпечила надійне тактичне прикриття та високоорганізований відступ залишків армії до Бендер.'
    - statement: 'У бендерській еміграції Гордієнко відіграв ключову роль як політичний гарант у підписанні Конституції Пилипа Орлика.'
      correct: true
      explanation: 'Своїм офіційним підписом він засвідчив згоду всього Війська Запорозького з прогресивними принципами нового державного устрою.'
    - statement: 'Перебуваючи в Олешківській Січі, отаман активно підтримував "промосковську" партію, прагнучи повернутися під владу Росії.'
      correct: false
      explanation: 'Він категорично та жорстко виступав проти "промосковської" партії Івана Малашевича, відстоюючи незалежний геополітичний курс.'