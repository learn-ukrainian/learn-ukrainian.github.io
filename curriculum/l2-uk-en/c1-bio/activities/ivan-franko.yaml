- type: reading
  id: reading-moisei
  title: 'Первинне джерело: Пролог до поеми Мойсей'
  source: Іван Франко (1905)
  text: 'Народе мій, замучений, розбитий,

    Мов паралітик той на роздорожжу,

    Людським презирством, ніби струпом, вкритий!

    Твоїм будучим душу я тривожу...

    '
  tasks:
  - Який образ народу створює автор у перших рядках?
  - Яка емоція домінує у цьому зверненні?
- type: critical-analysis
  title: 'Аналіз: Образ народу у пролозі'
  source_reading: reading-moisei
  target_text: Народе мій, замучений, розбитий, / Мов паралітик той на роздорожжу...
  questions:
  - Чому Франко порівнює народ із паралітиком?
  - Яку функцію виконує такий жорсткий, неідеалізований образ у контексті національного
    пробудження?
  model_answers:
  - Порівняння з паралітиком підкреслює нездатність нації до самостійної дії, її політичну
    та духовну скутість під гнітом імперій.
  - Жорсткий образ має терапевтичну функцію — він руйнує сентиментальні ілюзії та
    змушує суспільство поглянути в очі реальності.
  focus_points:
  - метафорика
  - авторська інтонація
- type: reading
  id: reading-postup
  title: 'Первинне джерело: Що таке поступ?'
  source: Іван Франко (1903)
  text: 'Держава, заснована на повному контролі над економікою та особистим життям,
    стане величезною народною тюрмою, де людина втратить свободу і перетвориться на
    гвинтик системи.

    '
  tasks:
  - Про яку форму державного правління попереджає автор?
  - Якими метафорами він описує таку державу?
- type: essay-response
  title: 'Есе: Титан праці та Каменяр'
  source_reading: reading-postup
  prompt: Проаналізуйте, чому Івана Франка називають титаном праці та каменярем української
    нації. Спираючись на текст модуля та уривок зі статті Що таке поступ, поясніть,
    як його інтелектуальна спадщина формувала європейський вектор розвитку України.
  min_words: 250
  model_answer: Іван Франко поєднував у собі талант письменника, науковця та політичного
    мислителя. Його працездатність (понад 6000 творів) заповнила критичні прогалини
    в українській культурі. Образ каменяра символізує його щоденну, виснажливу боротьбу
    з консерватизмом та імперським гнітом. Стаття Що таке поступ демонструє його політичну
    прозорливість — він одним із перших передбачив тоталітарну сутність марксизму,
    пропонуючи натомість європейський, демократичний шлях розвитку нації.
  rubric:
  - criteria: Аргументація
    description: Глибоке розкриття концептів каменяра і титана праці.
    points: 40
  - criteria: Аналіз
    description: Доречне посилання на статтю та факти з біографії.
    points: 30
  - criteria: Стилістика
    description: Високий рівень академічної української мови.
    points: 30
- type: quiz
  title: 'Розуміння тексту: Життя та ідеї'
  items:
  - question: Згідно з текстом, яку роль відіграла батьківська кузня у формуванні
      світогляду майбутнього письменника?
    explanation: Текст зазначає, що саме там він вперше відчув повагу до важкої фізичної
      праці.
    options:
    - text: Вона виховала повагу до важкої праці
      correct: true
    - text: Вона стала символом злиднів і страждань
      correct: false
    - text: Вона відвернула його від фізичної роботи
      correct: false
    - text: Вона змусила його шукати кращої долі
      correct: false
  - question: Як автор тексту спростовує радянський міф про бідного селянина щодо
      походження Франка?
    explanation: Автор підкреслює, що батько був шанованим і заможним ковалем.
    options:
    - text: Вказує, що батько був заможним майстром
      correct: true
    - text: Наголошує на його аристократичному корінні
      correct: false
    - text: Стверджує, що він походив з родини священника
      correct: false
    - text: Пояснює, що родина мала великі борги
      correct: false
  - question: У чому, за текстом модуля, полягає головна суть алегорії біблійного
      сюжету в поемі Мойсей?
    explanation: Сюжет є глибокою алегорією на українське націєтворення та позбавлення
      психології рабів.
    options:
    - text: Вона відображає процес націєтворення
      correct: true
    - text: Вона є критикою релігійних догматів
      correct: false
    - text: Вона описує подорож письменника до Італії
      correct: false
    - text: Вона закликає до покірності долі
      correct: false
  - question: Який аргумент наводить автор, називаючи Франка академією наук в одній
      особі?
    explanation: Він володів чотирнадцятьма мовами, а його інтереси охоплювали практично
      всі сфери знання.
    options:
    - text: Його енциклопедизм та володіння багатьма мовами
      correct: true
    - text: Його посаду професора у Львівському університеті
      correct: false
    - text: Його співпрацю з австрійським урядом
      correct: false
    - text: Його вміння швидко писати тексти
      correct: false
  - question: Згідно з текстом, чому Франка не допустили до викладання у Львівському
      університеті?
    explanation: Польська адміністрація заблокувала його професуру з політичних мотивів.
    options:
    - text: Через політичні інтриги польської адміністрації
      correct: true
    - text: Через відсутність докторського ступеня
      correct: false
    - text: Через його слабке здоров’я
      correct: false
    - text: Через його небажання працювати викладачем
      correct: false
  - question: Як у тексті пояснюється еволюція політичних поглядів Франка під час
      навчання?
    explanation: Під впливом Драгоманова він розірвав з москвофільством і почав вивчати
      європейський соціалізм.
    options:
    - text: Відмовився від москвофільства на користь європейських ідей
      correct: true
    - text: Перейшов від радикалізму до жорсткого консерватизму
      correct: false
    - text: Став переконаним прихильником російського марксизму
      correct: false
    - text: Повністю відійшов від будь-якого політичного життя
      correct: false
  - question: Яким словом автор тексту характеризує працю Франка в умовах важкої хвороби
      та паралічу?
    explanation: Текст називає його боротьбу з недугою героїзмом творчості та безпрецедентним
      прикладом мужності.
    options:
    - text: Героїзм
      correct: true
    - text: Фанатизм
      correct: false
    - text: Відчай
      correct: false
    - text: Апатія
      correct: false
  - question: Яку головну загрозу марксизму передбачив Франко у своїй статті Що таке
      поступ згідно з текстом?
    explanation: Він пророкував, що тотальний контроль призведе до створення тоталітарної
      диктатури і тюрми.
    options:
    - text: Створення величезної народної тюрми
      correct: true
    - text: Економічний колапс молодої держави
      correct: false
    - text: Втрату національної української мови
      correct: false
    - text: Повернення до старого феодального ладу
      correct: false
  instruction: Оберіть правильну відповідь.
