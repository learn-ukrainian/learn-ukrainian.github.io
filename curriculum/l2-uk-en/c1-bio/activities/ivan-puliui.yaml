- type: reading
  id: reading-puliui-rays
  title: "Первинне джерело: Природа X-променів"
  source: "Адаптовано з наукових ідей Івана Пулюя (1896)"
  text: |
    Невидиме випромінювання, яке виникає у вакуумній трубці, має електромагнітну природу. Воно утворюється внаслідок різкого гальмування катодних променів на перешкоді, зокрема на слюдяному антикатоді. Ці промені є аналогічними до звичайного світла, але мають значно коротшу довжину хвилі, що дозволяє їм проникати крізь непрозорі матеріали, такі як картон, дерево і навіть людські тканини.
  instruction: "Прочитайте текст та проаналізуйте ключові аргументи щодо фізичної природи випромінювання."
  tasks:
    - "Визначте головну тезу уривка щодо природи променів."
    - "Знайдіть у тексті пояснення механізму утворення невидимого випромінювання."

- type: critical-analysis
  id: analysis-puliui-01
  source_reading: reading-puliui-rays
  title: "Критичний аналіз: Електромагнітна теорія"
  instruction: "Проаналізуйте наведений фрагмент з огляду на наукову полеміку того часу."
  target_text: "Воно утворюється внаслідок різкого гальмування катодних променів на перешкоді, зокрема на слюдяному антикатоді."
  questions:
    - "Згідно з текстом, який ключовий фізичний процес стоїть за виникненням X-променів?"
    - "Як автор тексту характеризує фізичну спорідненість X-променів зі звичайним світлом?"
  model_answers:
    - "Згідно з текстом, X-промені виникають внаслідок різкого гальмування катодних променів (потоків електронів) на перешкоді."
    - "Автор стверджує, що ці промені аналогічні до звичайного світла, відрізняючись лише значно коротшою довжиною хвилі, що забезпечує їхню високу проникну здатність."
  focus_points:
    - "Розуміння фізичних процесів"
    - "Порівняльний аналіз властивостей хвиль"

- type: true-false
  title: "Правда чи хиба: Біографічні факти"
  instruction: "Визначте, чи відповідають наведені твердження інформації з тексту модуля."
  items:
    - statement: "Згідно з текстом, родина Івана Пулюя сподівалася, що він стане видатним інженером-електротехніком у Відні."
      correct: false
      explanation: "У тексті зазначено, що родина сподівалася бачити його греко-католицьким священником."
    - statement: "У Віденському університеті Пулюй вирішив відмовитися від богослов'я на користь професійного вивчення фізики та астрономії."
      correct: true
      explanation: "Текст підтверджує, що він вступив на філософський факультет, відмовившись від висвячення всупереч волі батьків."
    - statement: "Вільгельм Рентген першим опублікував повідомлення про відкриття нового типу випромінювання у грудні 1895 року."
      correct: true
      explanation: "Рентген дійсно першим опублікував статтю, хоча Пулюй досліджував це явище систематично ще до нього."
    - statement: "Пулюй вважав, що для масштабної електрифікації промисловості краще використовувати систему постійного струму."
      correct: false
      explanation: "Згідно з текстом, Пулюй активно відстоював використання багатофазного змінного струму."
    - statement: "Переклад Біблії українською мовою Пулюй здійснив самостійно, без жодної допомоги з боку інших культурних діячів."
      correct: false
      explanation: "Він працював над масштабним перекладом спільно з Пантелеймоном Кулішем та Іваном Нечуєм-Левицьким."
    - statement: "За радянських часів ім'я Івана Пулюя постійно згадувалося в підручниках з фізики як видатного науковця."
      correct: false
      explanation: "У тексті пояснюється, що через його релігійність та антиімперські погляди на його ім'я було накладено жорстке табу."

- type: quiz
  title: "Перевірка розуміння тексту"
  instruction: "Оберіть одну правильну відповідь на кожне запитання, базуючись виключно на прочитаному тексті."
  items:
    - question: "Яку головну інновацію застосував Іван Пулюй у конструкції своєї вакуумної лампи 1881 року?"
      explanation: "Текст зазначає, що головною інновацією було розміщення всередині скляної колби спеціального слюдяного екранчика для фокусування променів."
      options:
        - text: "розміщення слюдяного екранчика для ефективного фокусування"
          correct: true
        - text: "використання виключно постійного електричного струму високої напруги"
          correct: false
        - text: "додавання спеціального інертного газу всередину скляної колби"
          correct: false
        - text: "використання дерев'яних електродів замість стандартних металевих"
          correct: false
    - question: "Згідно з текстом модуля, як Іван Пулюй пояснював фізичну природу X-променів у своїх статтях?"
      explanation: "Пулюй першим стверджував, що нове випромінювання має електромагнітну природу, на відміну від ефірної теорії Рентгена."
      options:
        - text: "як електромагнітне випромінювання зі значно коротшою довжиною хвилі"
          correct: true
        - text: "як специфічні повздовжні хвилі у міфічному світовому ефірі"
          correct: false
        - text: "як інтенсивний потік позитивно заряджених важких частинок"
          correct: false
        - text: "як особливий різновид концентрованої теплової енергії у вакуумі"
          correct: false
    - question: "З якою практичною метою Іван Пулюй займався склодувною майстерністю під час стажування у Страсбурзі?"
      explanation: "Він власноруч навчився видувати скляні трубки, щоб проводити дослідження вакууму на найвищому рівні."
      options:
        - text: "щоб самостійно конструювати досконалі вакуумні трубки для експериментів"
          correct: true
        - text: "щоб заробляти додаткові гроші на оплату свого навчання в університеті"
          correct: false
        - text: "щоб виготовляти точні медичні інструменти для місцевих лікарень"
          correct: false
        - text: "щоб створювати якісні лінзи для потужних астрономічних телескопів"
          correct: false
    - question: "Як у тексті пояснюється загальнонаціональне значення перекладу Біблії для розвитку української мови?"
      explanation: "Переклад довів здатність української мови повноцінно виражати складні філософські та теологічні концепції."
      options:
        - text: "він довів придатність мови для вираження найскладніших філософських концепцій"
          correct: true
        - text: "він став найпершою друкованою книгою на всій території Російської імперії"
          correct: false
        - text: "він вперше використовував виключно латинську абетку для запису українських слів"
          correct: false
        - text: "він був написаний виключно галицьким діалектом без жодних домішок"
          correct: false
    - question: "Яку чітку політичну позицію обґрунтовував Іван Пулюй у своїх публіцистичних брошурах під час війни?"
      explanation: "Пулюй аргументовано доводив історичне право українського народу на власну незалежну державу."
      options:
        - text: "життєву необхідність створення цілком незалежної української держави"
          correct: true
        - text: "необхідність добровільного приєднання Галичини до складу Російської імперії"
          correct: false
        - text: "стратегічну важливість збереження Австро-Угорщини в її довоєнних кордонах"
          correct: false
        - text: "доцільність швидкого створення спільної політичної федерації з Польщею"
          correct: false
    - question: "Чому тривалий час світова історіографія приписувала епохальне відкриття X-променів виключно Рентгену?"
      explanation: "Рентген першим опублікував коротке повідомлення, тоді як Пулюй довше досліджував явище перед публікацією."
      options:
        - text: "бо Рентген набагато швидше опублікував офіційне повідомлення про своє відкриття"
          correct: true
        - text: "бо Пулюй навмисно приховував свої наукові результати від широкої громадськості"
          correct: false
        - text: "бо експериментальна апаратура Рентгена була значно досконалішою за лампи Пулюя"
          correct: false
        - text: "бо Пулюй за все життя взагалі не залишив жодних якісних фотографічних знімків"
          correct: false
    - question: "Який реальний практичний медичний потенціал продемонстрував знаменитий знімок Пулюя, зроблений у 1896 році?"
      explanation: "Знімок зламаної руки доньки довів величезний практичний потенціал променів для потреб травматології."
      options:
        - text: "він наочно показав величезні можливості використання променів у травматології"
          correct: true
        - text: "він переконливо довів можливість швидкого лікування інфекційних захворювань"
          correct: false
        - text: "він несподівано виявив здатність нових променів знищувати шкідливі бактерії"
          correct: false
        - text: "він суттєво допоміг науковцям знайти дієві ліки проти поширених вірусів"
          correct: false
    - question: "З якої головної причини в радянській Україні ім'я видатного фізика було фактично викреслене з офіційної історії?"
      explanation: "Радянський тоталітарний режим наклав табу через його глибоку релігійність, патріотизм та антиімперські публікації."
      options:
        - text: "через його міцні релігійні переконання та відверто проукраїнську політичну позицію"
          correct: true
        - text: "через його остаточне рішення емігрувати назавжди до Сполучених Штатів Америки"
          correct: false
        - text: "через його категоричну відмову ділитися своїми науковими патентами з урядом"
          correct: false
        - text: "через його гостру критику комуністичної ідеології безпосередньо у фізичних працях"
          correct: false

- type: essay-response
  title: "Есе-відповідь: Наука і національна місія"
  instruction: "Напишіть розгорнуте есе-відповідь на основі матеріалів модуля."
  prompt: "Проаналізуйте феномен Івана Пулюя як інтегральної особистості. Як саме йому вдавалося поєднувати передові європейські наукові дослідження у сфері фізики з глибокою релігійністю та активною боротьбою за українське національне відродження? У своїй відповіді спирайтеся на конкретні факти з його біографії."
  min_words: 300
  model_answer: "Іван Пулюй є унікальним прикладом українського інтелектуала кінця XIX століття, який зумів гармонійно поєднати раціональну науку, духовність та патріотизм. Його наукова діяльність у Відні, Страсбурзі та Празі, зокрема створення досконалої вакуумної 'лампи Пулюя' та дослідження електромагнітної природи X-променів, довела його приналежність до еліти європейської фізики та електротехніки. Водночас Пулюй ніколи не розглядав престижну наукову кар'єру як інструмент відмови від своєї національної ідентичності чи асиміляції. Навпаки, він використовував свій європейський авторитет і ресурси для системної підтримки української справи. Його багаторічна, кропітка праця над повним перекладом Біблії разом із Пантелеймоном Кулішем та Іваном Нечуєм-Левицьким стала не просто релігійним актом, а потужним культурно-політичним кроком. Цей переклад на практиці довів багатство лексики української мови та її здатність виражати найвищі теологічні й філософські сенси на рівні з іншими європейськими мовами. Крім того, його гостра політична публіцистика під час Першої світової війни, зокрема брошури про необхідність незалежності України, свідчить про глибоке розуміння геополітичної архітектури Європи. Таким чином, Іван Пулюй сприймав свою наукову кар'єру і національну просвітницьку роботу як два взаємопов'язані крила єдиної великої місії — служіння об'єктивній істині та звільненню свого народу з-під імперського гніту."
  rubric:
    - criteria: "Аналіз наукового внеску"
      description: "Наведено конкретні приклади досягнень Пулюя у фізиці (X-промені) та електротехніці (змінний струм)."
      points: 5
    - criteria: "Висвітлення національної діяльності"
      description: "Розкрито його ключову роль у створенні перекладу Біблії та написанні політичної публіцистики."
      points: 5
- type: comparative-study
  id: comp-puliui-01
  title: "Порівняльний аналіз: Пулюй та Рентген"
  instruction: "Порівняйте наукові підходи Івана Пулюя та Вільгельма Рентгена до дослідження X-променів."
  prompt: "Проаналізуйте відмінності у підходах Пулюя та Рентгена щодо X-променів."
  items_to_compare:
    - "Підхід Івана Пулюя"
    - "Підхід Вільгельма Рентгена"
  criteria:
    - "Теоретичне пояснення природи променів"
    - "Експериментальна апаратура"
    - "Якість отриманих скіаграм"
  model_answer: "Пулюй вважав промені електромагнітними (аналогія зі світлом) та використовував лампу зі слюдяним антикатодом, що давало високу чіткість. Рентген вважав їх повздовжніми хвилями в ефірі і не мав ефективного фокусування."
