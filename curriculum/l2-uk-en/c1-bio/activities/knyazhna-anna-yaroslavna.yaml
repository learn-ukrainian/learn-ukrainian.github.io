- type: reading
  id: reading-papal-letter
  title: "Первинне джерело: Лист Папи Римського Миколая II"
  source: "Лист до королеви Анни (1059 рік)"
  text: |
    Чутка про ваші чесноти, чудова діво, долетіла до наших вух, і з великою радістю ми чуємо, що ви виконуєте свої королівські обов'язки у цій дуже християнській державі з похвальним завзяттям та видатним розумом.

- type: critical-analysis
  source_reading: "reading-papal-letter"
  title: "Аналіз дипломатичної кореспонденції"
  items:
    - prompt: "Як пряме звернення Папи до королеви Анни характеризує її статус на міжнародній арені XI століття?"
      model_answer: "Пряме звернення Папи свідчить про високий політичний статус Анни та визнання її як самостійної і впливової фігури на європейській арені, а не просто дружини монарха."
    - prompt: "Які саме риси Анни відзначає понтифік і як це контрастує з типовим становищем жінок-монархів того часу?"
      model_answer: "Папа відзначає її 'похвальне завзяття' та 'видатний розум' у виконанні державних обов'язків, що різко контрастує з тогочасним становищем більшості європейських королев, чия роль часто обмежувалася лише церемоніальними та сімейними справами."

- type: essay-response
  title: "Епістолярний жанр: Лист Анни до батька"
  instruction: "Напишіть уявний лист Анни Київської до свого батька Ярослава Мудрого."
  prompt: "Уявіть себе на місці Анни Ярославни у перші роки її перебування в Парижі. Напишіть листа до свого батька Ярослава Мудрого. Опишіть свої враження від французького двору, порівняйте рівень життя та культури з київськими реаліями, а також поділіться своїми планами щодо зміцнення авторитету королівської влади."
  min_words: 300
  model_answer: "Дорогий батьку! Звертаюся до тебе з далекого Парижа, де волею Божою та твоїм мудрим рішенням я стала королевою. Не приховую, перші місяці тут були сповнені здивування. Місто це не може зрівнятися з нашим золотоверхим Києвом — ні розмірами, ні багатством храмів. Багато з місцевих вельмож, і навіть сам король, мій чоловік, не навчені грамоти, що мене неабияк засмучує. Проте я не втрачаю надії. Я привезла з собою книги та візантійські звичаї, і бачу, як французький двір поступово переймає нашу культуру. Я беру активну участь у державних справах, і король дослухається до моїх порад. Сподіваюся народити йому спадкоємця, якого назву Філіпом, і тоді мій вплив стане ще міцнішим. Моя місія тут — бути гідною донькою Русі."
  rubric:
    - criteria: "Історична достовірність"
      description: "Використання фактів про контраст між Києвом та Парижем XI століття."
      points: 10
    - criteria: "Стилістика та емоційність"
      description: "Відтворення голосу високоосвіченої королеви-дипломатки."
      points: 10

- type: comparative-study
  title: "Порівняльний аналіз: Статус королеви в XI столітті"
  items_to_compare:
    - "Традиційна європейська королева XI століття"
    - "Анна Ярославна на французькому престолі"
  criteria:
    - "Участь у державних справах"
    - "Рівень освіченості"
    - "Вплив на зовнішню та внутрішню політику"
  prompt: "Спираючись на текст модуля, порівняйте статус та можливості Анни Ярославни у Франції з типовим становищем королівських дружин Західної Європи тієї епохи."
  model_answer: "Традиційні європейські королеви XI століття часто були неписьменними і відігравали переважно церемоніальну роль, обмежуючись родинними справами та народженням спадкоємців. Натомість Анна Ярославна вирізнялася надзвичайно високою освіченістю: вона вільно читала, писала кількома мовами і мала власну бібліотеку. Її участь у державних справах була безпрецедентною: вона виступала як повноцінна співправителька, чиє ім'я фігурувало на офіційних указах з приміткою 'за згодою королеви'. Її дипломатичний вплив підтверджується прямим листуванням з Папою Римським, що робило її унікальною фігурою на тлі інших європейських монархинь."

- type: true-false
  title: "Перевірка розуміння тексту"
  instruction: "Визначте, чи відповідають наведені твердження тексту модуля."
  items:
    - statement: "Згідно з текстом, Анна Ярославна прибула до Парижа, який за розмірами та розвитком значно перевершував тогочасний Київ."
      correct: false
      explanation: "У тексті зазначено протилежне: Київ того часу був розвиненим мегаполісом, а Париж — порівняно невеликим містом з дерев'яними будівлями."
    - statement: "У модулі стверджується, що Генріх I обрав Анну за дружину виключно через її красу та багатий посаг."
      correct: false
      explanation: "Текст підкреслює, що шлюб був геополітичним розрахунком через заборону Папи Римського на шлюби між родичами в Європі."
    - statement: "Автор зазначає, що підпис 'АНА РЪИНА' є єдиним відомим випадком, коли французький королівський документ був скріплений кирилицею."
      correct: true
      explanation: "Це твердження безпосередньо підтверджується в розділі про кириличний автограф як свідоцтво епохи."
    - statement: "Згідно з матеріалами модуля, відомий 'Лист Анни до батька' про 'варварську країну' є справжнім історичним документом, знайденим в архівах."
      correct: false
      explanation: "Текст чітко пояснює, що цей лист є літературною містифікацією французького письменника Моріса Дрюона."
    - statement: "Автор тексту наголошує, що Анна діяла як незалежна політична фігура під час свого регентства та укладання другого шлюбу."
      correct: true
      explanation: "Текст неодноразово підкреслює її агентність та самостійність у прийнятті державних і особистих рішень."
    - statement: "Згідно з текстом, будівництво монастиря Святого Вікентія в Санлісі мало лише релігійне значення і не впливало на політику."
      correct: false
      explanation: "Текст стверджує, що меценатство Анни мало глибокий політичний підтекст, зміцнюючи союз між короною та духовенством."