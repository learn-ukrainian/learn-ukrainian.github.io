- type: reading
  id: reading-hrinchenko
  title: 'Первинне джерело: Передмова до Словаря'
  source: Борис Грінченко (1907)
  text: Збирати матеріал для цього словника почали ще в шістдесятих роках. Але тільки
    тепер ми змогли впорядкувати цей колосальний масив і подати його у вигляді повної
    лексикографічної системи. Нашою головною метою було не лише зберегти народну мову
    від забуття, а й дати українській літературі та науці надійний фундамент для подальшого
    розвитку. Без власної мови, стандартизованої й багатої, нація не може претендувати
    на самостійне інтелектуальне життя.
  tasks:
  - Проаналізуйте головну мету створення словника, визначену Грінченком.
  - Який зв'язок автор вбачає між стандартизацією мови та націєтворенням?
- type: critical-analysis
  source_reading: reading-hrinchenko
  title: 'Критичний аналіз: Мова як інструмент нації'
  target_text: Без власної мови, стандартизованої й багатої, нація не може претендувати
    на самостійне інтелектуальне життя.
  items:
  - prompt: Яку політичну ідею Грінченко маскує під лексикографічним аргументом у
      цій цитаті?
    model_answer: Грінченко стверджує, що мова є не просто засобом спілкування, а
      базовим елементом національного суверенітету. Стандартизація мови (створення
      словника) є необхідною передумовою для політичного націєтворення, адже без неї
      українці залишалися б лише етнографічною масою, а не політичною нацією, здатною
      до інтелектуальної незалежності від імперії.
  focus_points:
  - Політичний підтекст лексикографії
  - Мова як фундамент нації
- type: essay-response
  source_reading: reading-hrinchenko
  title: 'Есе: Від етнографізму до націєтворення'
  prompt: У тексті модуля зазначено, що Грінченко здійснив перехід від пасивного етнографізму
    до активного політичного націєтворення. Використовуючи текст модуля та подане
    первинне джерело, напишіть есе про те, як саме створення словника та впровадження
    грінченківки стало не лише культурним, але й глибоко політичним актом протистояння
    Російській імперії.
  min_words: 300
  model_answer: 'Створення Словаря української мови Борисом Грінченком виходило далеко
    за межі звичайної лексикографії. В умовах Емського указу, який забороняв українську
    мову і зводив її до статусу малоросійського діалекту, кодифікація мови була прямим
    політичним викликом імперії. Зібравши та систематизувавши понад 68 тисяч слів,
    Грінченко довів, що українська мова є самодостатньою системою, здатною обслуговувати
    наукові та політичні потреби модерного суспільства. Це руйнувало імперський наратив
    про її меншовартість. Крім того, впровадження фонетичного правопису (грінченківки)
    стандартизувало літературну норму, об''єднавши розпорошені етнографічні матеріали
    в єдиний національний простір. Таким чином, словник став ідеологічною зброєю:
    він перетворив українську мову з музейного експоната на дієвий інструмент державотворення,
    заклавши основу для майбутньої політичної незалежності.'
  rubric:
  - criteria: Аналіз політичного контексту
    description: Есе має чітко розкрити умови Емського указу та політичний вимір створення
      словника.
    points: 10
  - criteria: Розуміння термінів
    description: Коректне використання понять етнографізм, націєтворення, кодифікація
      та стандартизація.
    points: 10
- type: true-false
  title: Аналіз біографічних фактів
  instruction: Визначте, чи є наведені твердження правильними, спираючись на текст
    модуля.
  items:
  - statement: Борис Грінченко походив із селянської родини, що зумовило його раннє
      захоплення народною мовою та культурою.
    correct: false
    explanation: Він походив зі збіднілої дворянської родини і зростав у зросійщеному
      середовищі.
  - statement: Прочитання Шевченкового Кобзаря стало переломним моментом, після якого
      Грінченко свідомо перейшов на українську мову.
    correct: true
    explanation: Саме Кобзар викликав шокову і незворотну українізацію тринадцятирічного
      Бориса.
  - statement: Грінченко вважав, що використання російської мови в школах допомагає
      українським селянам швидше інтегруватися у світову культуру.
    correct: false
    explanation: Він гостро критикував таку денаціоналізацію, вважаючи її психологічним
      насильством та інструментом асиміляції.
  - statement: У своїх публіцистичних статтях Листи з України Наддніпрянської Грінченко
      підтримував старше покоління українофілів за їхню обережну позицію.
    correct: false
    explanation: Він гостро засуджував українофільське угодовство та відсутність політичної
      державотворчої програми.
  - statement: Головною методологічною основою для Словника Грінченка стало використання
      штучних кабінетних новотворів.
    correct: false
    explanation: Він свідомо уникав штучних новотворів і спирався на живу народну
      мову та літературну традицію.
  - statement: Створення Братства тарасівців стало першим кроком до проголошення ідеї
      повної політичної незалежності України.
    correct: true
    explanation: Це була перша таємна організація, яка відкрито проголосила ідею державної
      самостійності.
  - statement: Дружина Бориса, Марія Загірня, взяла на себе левову частку чорнової
      роботи з упорядкування карток для словника.
    correct: true
    explanation: Марія Загірня була рівноправною співавторкою і виконала виснажливу
      роботу з систематизації 150 тисяч карток.
  - statement: Російська імператорська академія наук проігнорувала словник Грінченка
      через його політичну неблагонадійність.
    correct: false
    explanation: Незважаючи на антиукраїнську політику, академія була змушена визнати
      науковий рівень праці і присудила їй премію.
- type: quiz
  title: Концептуальні засади діяльності
  items:
  - question: У тексті модуля автор пояснює перехід Грінченка від етнографізму до
      націєтворення. Яка головна ідея лежить в основі цього переходу?
    explanation: Для Грінченка фольклор був лише фундаментом, на якому треба будувати
      конкурентну європейську націю за допомогою стандартизованої мови.
    options:
    - text: Українська мова має стати повноцінним інструментом науки, політики та
        високої культури.
      correct: true
    - text: Збереження народних традицій та пісень є єдиною метою української національної
        інтелігенції.
      correct: false
    - text: Народну мову потрібно сприймати як екзотичний релікт славного козацького
        минулого.
      correct: false
    - text: Селянство повинно ізолюватися від урбаністичної культури для збереження
        власної чистоти.
      correct: false
  - question: Згідно з текстом, чому Борис Грінченко у своїй художній прозі не ідеалізував
      українське селянство?
    explanation: Грінченко був прихильником реалізму і прагнув показати складні соціальні
      процеси та майнову нерівність без романтичних прикрас.
    options:
    - text: Він хотів об'єктивно показати соціальні процеси, розшарування громади
        та моральну деградацію.
      correct: true
    - text: Він вважав селянство абсолютно нездатним до культурного та політичного
        розвитку.
      correct: false
    - text: Його власне дворянське походження заважало йому зрозуміти реальні проблеми
        простого народу.
      correct: false
    - text: Він намагався догодити імперській цензурі, яка вимагала негативного зображення
        українців.
      correct: false
  - question: Яку роль, за текстом модуля, відігравали історичні драми Грінченка в
      суспільному житті того часу?
    explanation: Історичні драми, такі як Степовий гість, виконували функцію політичного
      маніфесту на сцені, пробуджуючи пам'ять про незалежність.
    options:
    - text: Вони були потужним політичним маніфестом, який пробуджував історичну пам'ять
        народу.
      correct: true
    - text: Вони виконували суто розважальну функцію для провінційної дворянської
        еліти.
      correct: false
    - text: Вони були інструментом поширення соціалістичних ідей серед промислових
        робітників.
      correct: false
    - text: Вони слугували лише для реконструкції старовинних козацьких костюмів та
        пісень.
      correct: false
  - question: У чому полягала суть жорсткого ультиматуму, який Грінченко висунув редакції
      Киевской старины?
    explanation: Грінченко вимагав повної автономії та одноосібного права формувати
      реєстр слів, щоб зробити словник фундаментальною науковою працею.
    options:
    - text: Він категорично вимагав повної незалежності в роботі та самостійного формування
        реєстру слів.
      correct: true
    - text: Він наполягав на величезному фінансовому гонорарі за свою виснажливу наукову
        роботу.
      correct: false
    - text: Він вимагав дозволу публікувати словник виключно в Австро-Угорщині без
        цензури.
      correct: false
    - text: Він відмовився працювати з матеріалами, які були зібрані іншими етнографами
        до нього.
      correct: false
  - question: Як імперська пропаганда лицемірно виправдовувала навчання українських
      дітей російською мовою?
    explanation: Пропаганда стверджувала, що російська школа нібито залучає темних
      селян до високої світової цивілізації.
    options:
    - text: Вона стверджувала, що це залучає темних українських селян до високої світової
        культури.
      correct: true
    - text: Вона визнавала право українців на самовизначення, але відкладала його
        реалізацію на майбутнє.
      correct: false
    - text: Вона пояснювала це браком кваліфікованих вчителів, здатних викладати українською.
      correct: false
    - text: Вона відверто заявляла про свій намір повністю і швидко знищити українську
        націю.
      correct: false
  - question: Яку мету переслідував Грінченко, застосувавши у своєму словнику фонетичний
      правопис (грінченківку)?
    explanation: Він систематизував орфографію, спростивши правила та усунувши хаос,
      що панував до цього часу.
    options:
    - text: Він хотів усунути хаос в орфографії та максимально спростити правила написання
        для народу.
      correct: true
    - text: Він намагався максимально наблизити український правопис до російських
        імперських стандартів.
      correct: false
    - text: Він прагнув зробити мову складнішою, щоб підкреслити її високий академічний
        європейський статус.
      correct: false
    - text: Він просто наслідував правила, раніше розроблені Пантелеймоном Кулішем
        та Михайлом Максимовичем.
      correct: false
  - question: Згідно з текстом, чому Російська імператорська академія наук присудила
      премію словнику Грінченка?
    explanation: Високий науковий рівень праці був настільки беззаперечним, що навіть
      ворожа академія була змушена його визнати.
    options:
    - text: Науковий рівень праці був настільки високим, що вони були змушені визнати
        її епохальне значення.
      correct: true
    - text: Це був хитрий політичний хід, спрямований на примирення з українським
        національним рухом.
      correct: false
    - text: Академія не зрозуміла, що словник містить українські слова, вважаючи їх
        російським діалектом.
      correct: false
    - text: Грінченко мав потужні родинні зв'язки серед російських впливових урядовців
        та чиновників.
      correct: false
  - question: Яким чином лексикографічна праця Грінченка вплинула на політику українізації
      в 1920-х роках?
    explanation: Його словник став гранітним фундаментом і головною нормативною базою
      для впровадження мови в державні установи.
    options:
    - text: Його словник став безальтернативною нормативною базою для впровадження
        української мови в установи.
      correct: true
    - text: Радянська влада повністю заборонила його словник як продукт буржуазного
        націоналізму.
      correct: false
    - text: Його праця використовувалася виключно для вивчення мертвого фольклору
        та сільських діалектів.
      correct: false
    - text: Українізація 1920-х років спиралася на зовсім інші, створені пізніше комуністичні
        словники.
      correct: false
  instruction: Оберіть правильну відповідь.
- type: comparative-study
  title: 'Порівняльний аналіз: Стратегії націєтворення'
  items_to_compare:
  - Пасивне етнографічне українофільство
  - Радикальне політичне націєтворення Грінченка
  criteria:
  - Ставлення до мови
  - Кінцева політична мета
  model_answer: Етнографічне українофільство сприймало мову як музейний експонат і обмежувалося культурним просвітництвом без політичних вимог. Натомість Грінченко розглядав стандартизовану мову як фундамент для розбудови модерної європейської нації і відкрито проголошував ідею повної державної самостійності.
  prompt: Порівняйте стратегії старшого покоління українофілів та радикального руху, до якого належав Грінченко, опираючись на текст модуля.
