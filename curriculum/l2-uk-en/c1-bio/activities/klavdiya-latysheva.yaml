- type: reading
  id: reading-latysheva-legacy
  title: "Первинне джерело: Здобутки Клавдії Латишевої"
  source: "Сучасний біографічний нарис (історична стилізація)"
  text: |
    Життєвий шлях Клавдії Латишевої став безпрецедентним явищем в історії української науки. Її блискучий захист докторської дисертації у тисяча дев'ятсот п'ятдесят другому році остаточно зруйнував упередження про неспроможність жінок до вищої абстрактної математики. Створений нею разом із німецьким колегою метод Фробеніуса-Латишевої став фундаментальним інструментом у розв'язанні диференціальних рівнянь, дозволивши інженерам моделювати складні аеродинамічні процеси без наближених похибок. Навіть в умовах ідеологічного тиску та евакуації Латишева зберегла інтелектуальну свободу і продовжила розвивати традиції київської математичної школи, закладені її вчителем, репресованим академіком Михайлом Кравчуком.
  tasks:
    - "Проаналізуйте, як автор оцінює внесок Латишевої в аеродинаміку."
    - "Визначте роль Михайла Кравчука у збереженні математичної школи за текстом."

- type: critical-analysis
  source_reading: reading-latysheva-legacy
  title: "Критичний аналіз наукового шляху"
  instruction: "Проаналізуйте наведений фрагмент тексту та дайте відповіді на запитання."
  target_text: "Створений нею разом із німецьким колегою метод Фробеніуса-Латишевої став фундаментальним інструментом у розв'язанні диференціальних рівнянь..."
  questions:
    - "Яким чином, згідно з текстом, абстрактна математика Латишевої набула прикладного значення в інших галузях?"
    - "Як автор протиставляє суто наукові досягнення вченої суспільно-політичним викликам того часу?"
  model_answers:
    - "За текстом, абстрактний метод дозволив інженерам моделювати аеродинамічні процеси без наближених похибок, що перетворило теоретичні формули на практичний інструмент конструювання."
    - "Автор наголошує, що Латишева досягла видатних результатів не завдяки сприятливим умовам, а всупереч ідеологічному тиску та евакуації, зберігаючи при цьому внутрішню інтелектуальну свободу."
  focus_points:
    - "взаємозв'язок теорії та практики"
    - "інтелектуальна стійкість"

- type: essay-response
  source_reading: reading-latysheva-legacy
  title: "Розгорнута відповідь: Подолання бар'єрів"
  instruction: "Напишіть аналітичне есе на основі запропонованого тексту."
  prompt: "Спираючись на текст джерела, проаналізуйте феномен Клавдії Латишевої як жінки-науковиці. Як саме її досягнення змінили сприйняття жіночого інтелектуального потенціалу в точних науках у середині двадцятого століття?"
  min_words: 150
  model_answer: "Згідно з текстом, успіх Клавдії Латишевої став переломним моментом у сприйнятті жінок у науці. До її історичного захисту докторської дисертації у тисяча дев'ятсот п'ятдесят другому році панувало упередження щодо нездатності жінок опанувати вищу абстрактну математику. Її досягнення не просто продемонструвало високий рівень інтелекту, а й зруйнувало ці стереотипи на системному рівні. Додатково, текст підкреслює її феноменальну стійкість: вона досягла вершин у професії не в тепличних умовах, а під час ідеологічних репресій та військової евакуації, зберігаючи при цьому спадщину свого вчителя Михайла Кравчука. Таким чином, Латишева стала не просто видатною дослідницею, а символом інтелектуальної незламності та рольовою моделлю для наступних поколінь."
  rubric:
    - criteria: "Аргументація"
      description: "Есе має чітко спиратися на факти та твердження з тексту джерела."
      points: 40
    - criteria: "Аналітичність"
      description: "Наявність глибокого аналізу суспільних бар'єрів та їх подолання."
      points: 40
    - criteria: "Мовне оформлення"
      description: "Використання академічного стилю та складної лексики."
      points: 20

- type: quiz
  title: "Перевірка розуміння тексту та лексики"
  instruction: "Оберіть правильну відповідь на основі матеріалів модуля."
  items:
    - question: "Яку функцію в тексті виконує використання терміна піонерка щодо головної героїні?"
      explanation: "Слово піонерка використовується для підкреслення першості жінки у незвіданій раніше науковій галузі."
      options:
        - text: "Вказує на її участь у радянських дитячих ідеологічних організаціях"
