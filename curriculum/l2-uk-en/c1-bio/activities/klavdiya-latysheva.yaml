          correct: false

- type: true-false
  title: "Аналіз тверджень за текстом"
  instruction: "Визначте, чи відповідають наведені твердження інформації, поданій у тексті."
  items:
    - statement: "У тексті підкреслюється, що Латишева досягла успіху виключно завдяки підтримці державної системи."
      correct: false
      explanation: "Текст наголошує, що вона працювала всупереч системі та в умовах сталінського терору."
    - statement: "Згідно з біографією, Латишева свідомо приховувала прямі посилання на репресованого Кравчука, щоб зберегти його ідеї."
      correct: true
      explanation: "Вона інтегрувала його ідеї без прямих посилань, рятуючи наукову парадигму від знищення."
    - statement: "Автор описує евакуацію університету виключно як акт гуманітарного порятунку без прихованих мотивів."
      correct: false
      explanation: "У тексті зазначається, що це також було викачування інтелектуального ресурсу імперією."
    - statement: "За змістом тексту, Латишева мала значний практичний досвід пілотування військових літаків."
      correct: false
      explanation: "Вона ніколи не сиділа за штурвалом, а допомагала авіації виключно своїми математичними розрахунками."
    - statement: "Автор стверджує, що після отримання докторського ступеня Латишева очолила механіко-математичний факультет."
      correct: true
      explanation: "Текст прямо вказує на те, що вона стала деканом і керувала факультетом протягом двох років."
    - statement: "Термін задачник у тексті вживається для позначення збірника суто абстрактних теорем."
      correct: false
      explanation: "Задачник описується як інструмент для закріплення теорії та адаптації формул для прикладних потреб."