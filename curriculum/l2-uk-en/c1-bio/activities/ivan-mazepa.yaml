- type: reading
  id: reading-mazepa
  title: 'Первинне джерело: Звернення гетьмана'
  source: 'Промова Івана Мазепи до козаків перед переходом Десни'
  text: |
    Братія, прийшла наша пора; скористаємось цим випадком: помстимося москалям за їх тривале насилля над нами, за всі скоєні ними жорстокості й несправедливості, зберемо навколо себе всіх воїнів своїх, захистимо свої права і свою землю!
  tasks:
    - 'До яких почуттів та мотивів апелює автор у своєму зверненні?'
    - 'Як у тексті обґрунтовується необхідність збройного виступу?'

- type: critical-analysis
  title: 'Аналіз: Мотивація повстання'
  source_reading: reading-mazepa
  instruction: 'Проаналізуйте наведене джерело.'
  items:
    - prompt: 'Яку функцію виконує концепт помсти у цьому зверненні?'
      model_answer: 'Помста розглядається не як сліпа емоція, а як акт відновлення справедливості та реакція на тривале системне насильство (жорстокості й несправедливості).'
    - prompt: 'Як автор формулює кінцеву мету збройного виступу?'
      model_answer: 'Головною метою визначається не завоювання нових територій, а захист власних, уже існуючих прав і своєї землі від імперського поглинання.'

- type: essay-response
  title: 'Есе: Зрада чи легітимний акт?'
  source_reading: reading-mazepa
  instruction: 'Напишіть розгорнуту відповідь.'
  prompt: 'Спираючись на концепцію васалітету та текст модуля, проаналізуйте вибір Івана Мазепи. Чому російська історіографія використовує термін "зрада", і як європейське право того часу оцінювало дії гетьмана?'
  min_words: 250
  model_answer: 'У російській історіографії акт Мазепи традиційно розглядається через призму абсолютного підданства, де будь-яка непокора монарху є зрадою. Натомість європейська правова традиція базувалася на договірних відносинах (протектораті). Коли Петро I відмовився захищати українські землі, він порушив обовʼязок сюзерена, що давало васалу легітимне право шукати нового протектора. Тому дії гетьмана були політичним актом порятунку автономії.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Чітке пояснення різниці між підданством і васалітетом.'
      points: 10
    - criteria: 'Історичний контекст'
      description: 'Використання фактів щодо порушення угоди Петром I.'
      points: 10

- type: comparative-study
  title: 'Порівняння: Два погляди на гетьмана'
  source_reading: reading-mazepa
  instruction: 'Порівняйте різні літературні традиції.'
  items_to_compare:
    - 'Образ Мазепи в європейському романтизмі'
    - 'Образ Мазепи в російській імперській літературі'
  criteria:
    - 'Політичний підтекст і мотивація створення образу'
    - 'Особистісні риси персонажа'
  prompt: 'Порівняйте, як різні культурні традиції конструювали образ Івана Мазепи та з якою ідеологічною метою це робилося.'
  model_answer: 'Європейські романтики (Байрон, Гюго) бачили в Мазепі трагічного героя-вигнанця, який бореться з тиранією, ідеалізуючи його прагнення до свободи. Натомість російська література (Пушкін) свідомо конструювала пропагандистський образ зрадника і підступного лиходія, щоб виправдати знищення української автономії та утвердити імперський наратив.'

- type: quiz
  title: 'Перевірка розуміння тексту'
  instruction: 'Оберіть одну правильну відповідь.'
  items:
    - question: 'Яку головну причину розриву з Москвою називали українські лідери того часу?'
      explanation: 'Петро I відмовився захищати Україну від шведів, чим порушив умови протекторату.'
      options:
        - text: 'Відмова російського царя захищати українські території'
          correct: true
        - text: 'Бажання гетьмана стати незалежним монархом'
          correct: false
        - text: 'Релігійні суперечності між православними та протестантами'
          correct: false
        - text: 'Економічна криза та масовий голод на Лівобережжі'
          correct: false
    - question: 'Який архітектурний стиль став візуальним символом української державності на початку вісімнадцятого століття?'
      explanation: 'Цей стиль отримав назву мазепинське бароко завдяки масштабному меценатству правителя.'
      options:
        - text: 'мазепинське бароко'
          correct: true
        - text: 'київська готика'
          correct: false
        - text: 'козацький класицизм'
          correct: false
        - text: 'візантійський монументалізм'
          correct: false
    - question: 'Як імперська влада намагалася дискредитувати Мазепу в очах глибоко релігійного населення?'
      explanation: 'Російська православна церква за наказом царя проголосила політично вмотивовану анафему.'
      options:
        - text: 'Оголосила йому церковну анафему'
          correct: true
        - text: 'Звинуватила його в таємному прийнятті ісламу'
          correct: false
        - text: 'Зруйнувала всі збудовані ним храми'
          correct: false
        - text: 'Заборонила друкувати будь-які релігійні книги'
          correct: false
    - question: 'Згідно з європейськими нормами права того часу, що давало васалу право шукати нового сюзерена?'
      explanation: 'Розрив договору сюзереном, зокрема відмова у військовому захисті.'
      options:
        - text: 'Невиконання сюзереном зобовʼязань щодо захисту васала'
          correct: true
        - text: 'Досягнення васалом певного віку та статусу'
          correct: false
        - text: 'Особиста неприязнь між двома правителями'
          correct: false
        - text: 'Дозвіл від Папи Римського на розірвання угоди'
          correct: false
    - question: 'Яку мету переслідувало показове знищення міста Батурин російськими військами?'
      explanation: 'Це був акт терору, спрямований на залякування козацької старшини та місцевого населення.'
      options:
        - text: 'Створення атмосфери паніки та страху серед українців'
          correct: true
        - text: 'Звільнення території для будівництва нової фортеці'
          correct: false
        - text: 'Покарання місцевих жителів за несплату високих податків'
          correct: false
        - text: 'Випадковий наслідок неконтрольованої пожежі під час бою'
          correct: false
    - question: 'Як сучасні українські військові сили вшановують памʼять про цього історичного лідера?'
      explanation: 'У 2022 році перший український корвет отримав його імʼя.'
      options:
        - text: 'Називають на його честь сучасні військові кораблі'
          correct: true
        - text: 'Використовують його особистий герб як емблему армії'
          correct: false
        - text: 'Складають присягу в його колишній резиденції'
          correct: false
        - text: 'Вивчають його тактику у військових академіях'
          correct: false