- type: reading
  id: reading-trenos
  title: 'Первинне джерело: Тренос'
  source: Мелетій Смотрицький (1610)
  text: 'Горе мені, бідній, горе нещасній, ах, з усіх боків пограбованій! Руки мої
    в оковах, ярмо на шиї, пути на ногах, ланцюг на стегнах, меч над головою обосічний...
    Перед тим гарна і багата, тепер — зогиджена й убога. Діток родила і виховала —
    а вони мене виреклися і стали самі упадком.

    '
- type: critical-analysis
  source_reading: reading-trenos
  title: Аналіз метафорики Треносу
  items:
  - prompt: Згідно з текстом уривку, яку алегорію використовує автор для зображення
      православної церкви та її вірян?
    model_answer: Смотрицький персоніфікує церкву в образі знеславленої, пограбованої
      Матері, чиї власні діти (віряни, єпископи) зреклися її, що підкреслює трагізм
      становища православ'я.
- type: true-false
  title: Життєпис та внесок Мелетія Смотрицького
  items:
  - statement: Згідно з текстом, Мелетій Смотрицький відмовився від використання літери
      ґ у своїй граматиці.
    correct: false
    explanation: Смотрицький першим офіційно ввів до граматичної системи літеру ґ
      з твердим звучанням.
  - statement: У тексті зазначається, що Смотрицький здобув освіту у Віленській єзуїтській
      академії, де опанував західну схоластику.
    correct: true
    explanation: Він навчався у Віленській єзуїтській академії, що дозволило йому
      поєднати православну традицію із західною наукою.
  - statement: За словами автора тексту, Тренос був написаний виключно церковнослов'янською
      мовою для вузького кола інтелектуалів.
    correct: false
    explanation: Тренос був написаний польською мовою, щоб донести послання до найширшої
      аудиторії.
  - statement: Як стверджує текст, Смотрицький відокремив вигук як самостійну частину
      мови.
    correct: true
    explanation: Він вперше в історії вітчизняного мовознавства виокремив вигук, відокремивши
      його від прислівника.
  - statement: У тексті модуля автор пояснює перехід Смотрицького в унію як пошук
      матеріальної вигоди та кар'єрного росту.
    correct: false
    explanation: Його перехід в унію був інтелектуальним пошуком виходу з духовної
      кризи та спробою врятувати церкву через єдність із Римом.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Лінгвістична та історична спадщина
  items:
  - question: Згідно з текстом модуля, як Смотрицький обґрунтував відмову від використання
      артиклів у своїй граматиці?
    explanation: Смотрицький відкинув артикль, штучно перенесений з грецьких граматик,
      оскільки слов'янські мови його не мають.
    options:
    - text: Слов'янські мови не мають артикля
      correct: true
    - text: Артиклі були заборонені королівським едиктом
      correct: false
    - text: Артиклі ускладнювали віршування
      correct: false
    - text: Він замінив їх новими розділовими знаками
      correct: false
  - question: 'У тексті автор зазначає, що граматика Смотрицького кодифікувала:'
    explanation: Праця була кодифікацією саме української редакції церковнослов'янської
      мови.
    options:
    - text: українську редакцію церковнослов'янської мови
      correct: true
    - text: живу розмовну польську мову того часу
      correct: false
    - text: класичну давньогрецьку мову для перекладів
      correct: false
    - text: штучну мову, створену для католицького духовенства
      correct: false
  - question: Який аргумент автор наводить для пояснення успіху граматики Смотрицького
      в інших країнах?
    explanation: Він структурував мовний матеріал так якісно, що інші народи змогли
      використовувати цю матрицю.
    options:
    - text: Вона мала логічну структуру європейського рівня
      correct: true
    - text: Вона поширювалася завдяки єзуїтським місіонерам
      correct: false
    - text: Вона була єдиною книгою, не забороненою владою
      correct: false
    - text: Вона була написана спрощеною латиною
      correct: false
  - question: Згідно з текстом, яку подію сучасники називали станом тіла без голови?
    explanation: Після Берестейської унії православна церква залишилася без вищої
      ієрархії.
    options:
    - text: становище православної церкви після Берестейської унії
      correct: true
    - text: діяльність Острозької академії після смерті засновника
      correct: false
    - text: стан східних патріархій під владою Османської імперії
      correct: false
    - text: відсутність єдиної граматики до появи праці Смотрицького
      correct: false
  - question: Яку функцію автор підкреслює у використанні розділових знаків, запроваджених
      Смотрицьким?
    explanation: Пунктуація структурувала текст, дисциплінувала мислення і робила
      читання логічним.
    options:
    - text: Вони дисциплінували мислення і структурували текст
      correct: true
    - text: Вони використовувалися лише для написання віршів
      correct: false
    - text: Вони були потрібні для приховування таємних послань
      correct: false
    - text: Вони замінювали відкинуті грецькі артиклі
      correct: false
  instruction: Оберіть правильну відповідь.
- type: essay-response
  title: 'Есе: Проблема конфесійного вибору'
  prompt: У трактаті Апологія Мелетій Смотрицький висунув тезу про те, що Русь з Руссю
    б'ється. Спираючись на текст модуля, проаналізуйте, які інтелектуальні та історичні
    передумови змусили його змінити конфесію і як ця теза відображає його бачення
    виходу з суспільної кризи.
  min_words: 300
  model_answer: 'Мелетій Смотрицький, глибоко розчарований занепадом східних патріархій
    та шокований кровопролиттям між вірянами, дійшов висновку про згубність релігійного
    розколу. Його теза про внутрішню війну Русі є діагнозом громадянської війни духу,
    що нищила націю. Перехід в унію був для нього спробою синтезу: зберегти східну
    ідентичність, але надати їй західної академічної дисципліни та європейського захисту
    через єдність із Римом. Він бачив унію не як капітуляцію, а як єдиний логічний
    шлях до модернізації та примирення розділеного народу.'
  rubric:
  - criteria: Аналіз передумов
    description: Студент чітко визначає причини переходу Смотрицького в унію.
    points: 4
  - criteria: Тлумачення тези
    description: Розкрито зміст вислову як діагнозу внутрішнього конфлікту.
    points: 3
  - criteria: Оцінка бачення
    description: Пояснено ідею синтезу східного обряду та західної освіти.
    points: 3
