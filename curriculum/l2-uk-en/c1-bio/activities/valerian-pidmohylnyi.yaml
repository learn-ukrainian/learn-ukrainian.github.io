- type: reading
  id: reading-pidmohylnyi
  title: 'Первинне джерело: Ставлення до міста'
  source: 'Валер''ян Підмогильний, роман Місто (1928)'
  text: |
    Знаєте, що таке наше місто? Історична здохлятина. Віками тхне. Так і хочеться його провітрити. Щасливі все-таки нагадують хворих і потребують обережного поводження. Логіка — це обмеженість людського розуму...

- type: critical-analysis
  title: 'Екзистенціалізм та скептицизм у прозі'
  source_reading: 'reading-pidmohylnyi'
  instruction: 'Проаналізуйте наведений уривок та його філософське підґрунтя.'
  items:
    - prompt: 'Згідно з текстом модуля, як наведена у джерелі цитата про щасливих людей відображає фундаментальний скептицизм автора щодо можливості абсолютного щастя?'
      model_answer: 'Цитата демонструє розуміння автором того, що щастя є крихким станом, який легко руйнується у жорстокому світі, і відображає його загальний екзистенційний вакуум.'

- type: essay-response
  title: 'Урбаністичний маніфест чи трагедія відчуження'
  source_reading: 'reading-pidmohylnyi'
  instruction: 'Напишіть аргументований есей на основі тексту модуля.'
  prompt: 'У тексті модуля автор аналізує еволюцію Степана Радченка від селянина до міського циніка. Згідно з текстом, чи Степан Радченко справді підкорив велике місто, чи місто підкорило і вихолостило його людяну душу? Обґрунтуйте свою думку.'
  min_words: 300
  model_answer: 'Згідно з текстом модуля, фінал роману є амбівалентним. З формальної точки зору Степан здобув літературну славу і матеріальний успіх. Проте з психологічної точки зору велике місто безжально перетравило його, позбавивши здатності до щирої любові та перетворивши на холодну, раціональну машину, що відчуває екзистенційну самотність.'
  rubric:
    - criteria: 'Розуміння амбівалентності'
      description: 'Есей глибоко розкриває подвійність фіналу роману на основі тексту.'
      points: 10
    - criteria: 'Аргументація з тексту'
      description: 'Наведені аргументи спираються на психологічний аналіз героя.'
      points: 10

- type: quiz
  title: 'Аналіз літературного процесу'
  instruction: 'Оберіть правильну відповідь на основі прочитаного тексту.'
  items:
    - question: 'У тексті модуля автор характеризує роман Місто як твір, що назавжди змінив українську літературу. Яку саме парадигму він зруйнував?'
      explanation: 'Автором зазначено, що письменник зламав народницький шаблон про селянський характер культури.'
      options:
        - text: 'шаблон про винятково селянський і провінційний характер української літератури'
          correct: true
        - text: 'уявлення про неможливість перекладу європейської класики українською мовою'
          correct: false
        - text: 'ідею про необхідність обов''язкової партійної заангажованості письменників'
          correct: false
        - text: 'стереотип про відсутність у Києві повноцінного міського життя в двадцяті роки'
          correct: false

    - question: 'Згідно з текстом, як автор пояснює справжню причину ненависті радянської ідеологічної машини до роману Місто?'
      explanation: 'У тексті підкреслюється, що радянських цензорів жахав привабливий образ модерного українця, який успішно освоює міський простір.'
      options:
        - text: 'роман стверджував право української нації на власне велике місто і високу європейську культуру'
          correct: true
        - text: 'автор відкрито закликав до збройного повстання проти тоталітарної комуністичної системи'
          correct: false
        - text: 'твір був написаний виключно французькою мовою без використання українських слів'
          correct: false
        - text: 'герой роману активно пропагував ідеї російського імперського шовінізму серед селян'
          correct: false

    - question: 'Який аргумент автор тексту наводить, пояснюючи титанічну перекладацьку діяльність Підмогильного?'
      explanation: 'Автор стверджує, що переклад був націєтворчим проєктом для введення європейської думки та збагачення мови.'
      options:
        - text: 'це була добре спланована стратегія культурної експансії та європеїзації української літератури'
          correct: true
        - text: 'це був єдиний спосіб заробити гроші під час страшного ворзельського голоду'
          correct: false
        - text: 'письменник намагався уникнути арешту, працюючи лише з нейтральними іноземними текстами'
          correct: false
        - text: 'він прагнув довести перевагу французької культури над усіма іншими світовими літературами'
          correct: false

    - question: 'Згідно з текстом модуля, яку функцію виконує кожна жінка в романі про Степана Радченка?'
      explanation: 'У тексті вказано, що жінки є символами певного етапу його міського життя і кар''єрного зростання.'
      options:
        - text: 'вона виступає символом певного етапу його міського життя та інструментом досягнення мети'
          correct: true
        - text: 'вона є незалежною особистістю, яка допомагає героєві знайти справжнє екзистенційне щастя'
          correct: false
        - text: 'вона уособлює глибоку релігійну мораль, яку герой намагається осягнути протягом усього життя'
          correct: false
        - text: 'вона представляє виключно комуністичну партію, яка контролює кожен крок молодого письменника'
          correct: false

    - question: 'У тексті автор характеризує повість Невеличка драма. Який ключовий конфлікт світоглядів препарує Підмогильний у цьому творі?'
      explanation: 'Текст вказує на конфлікт між раціональним підходом (сцієнтизмом) та ірраціональною природою людських почуттів.'
      options:
        - text: 'конфлікт між холодним розрахунком сцієнтизму та ірраціональною природою живих почуттів'
          correct: true
        - text: 'суперечність між міським індустріальним пейзажем та мальовничою сільською природою'
          correct: false
        - text: 'боротьбу між різними політичними фракціями всередині літературного угруповання МАРС'
          correct: false
        - text: 'протистояння між українською перекладацькою школою та російськими літературними критиками'
          correct: false

    - question: 'Згідно з наведеним текстом, як саме радянська каральна система використовувала допити проти Підмогильного?'
      explanation: 'У тексті описано механізм застосування тортур і безсонних ночей для зламу особистості та фабрикації свідчень.'
      options:
        - text: 'система застосовувала виснажливі нічні допити та тортури для фабрикації зізнань у тероризмі'
          correct: true
        - text: 'слідчі намагалися переконати його добровільно перейти на позиції соціалістичного реалізму'
          correct: false
        - text: 'допити мали на меті змусити письменника перекласти праці радянських вождів іноземними мовами'
          correct: false
        - text: 'система використовувала їх як спосіб виявити справжніх ворогів серед його київських друзів'
          correct: false

    - question: 'Який висновок робить автор тексту про значення творчої спадщини Підмогильного для сучасної України?'
      explanation: 'Автор тексту підсумовує, що спадщина є наріжним каменем сучасної культурної ідентичності та доказом належності до Європи.'
      options:
        - text: 'спадщина є доказом самодостатності нашої культури та історичної приналежності до європейського світу'
          correct: true
        - text: 'його твори цікаві виключно вузькому колу науковців, які досліджують літературу двадцятих років'
          correct: false
        - text: 'його романи залишаються найкращим посібником з історії українського сільського господарства'
          correct: false
        - text: 'тексти письменника остаточно доводять неможливість існування незалежної літератури в тоталітарній державі'
          correct: false

    - question: 'У тексті автор згадує літературну дискусію 1925–1928 років. Яку позицію, згідно з текстом, зайняв письменник?'
      explanation: 'Підмогильний беззастережно підтримав орієнтацію на європейські цінності і закликав позбутися провінційності.'
      options:
        - text: 'він послідовно аргументував потребу засвоювати здобутки європейського модернізму для розвитку літератури'
          correct: true
        - text: 'він рішуче виступив проти ідей Хвильового і закликав до збереження традиційної селянської тематики'
          correct: false
        - text: 'він запропонував повністю відмовитися від української мови на користь вивчення французької'
          correct: false
        - text: 'він ігнорував дискусію, вважаючи її неважливою на тлі масової індустріалізації країни'
          correct: false

- type: true-false
  title: 'Аналіз літературних та історичних фактів'
  instruction: 'Визначте, чи є твердження правильними згідно з текстом модуля.'
  items:
    - statement: 'Згідно з текстом, освіта Валер''яна Підмогильного в реальному училищі була безсистемною і не дала йому знань іноземних мов.'
      correct: false
      explanation: 'Текст наголошує, що реальне училище дало йому структуровану базу та ґрунтовні знання математики і європейських мов.'
    - statement: 'У тексті стверджується, що Підмогильний вважав українське село абсолютно непридатним середовищем для розгортання людських драм.'
      correct: false
      explanation: 'Автор тексту зазначає, що письменник не відкидав село, а робив його стартовим майданчиком для універсальних людських драм.'
    - statement: 'Згідно з текстом, офіційна зміна назви літературного угруповання з Ланки на МАРС не змінила його елітарної та аполітичної суті.'
      correct: true
      explanation: 'У тексті вказано, що МАРС залишався елітарною майстернею аполітичних естетів, незважаючи на революційну назву.'
    - statement: 'У тексті автор стверджує, що Підмогильний з радістю писав пропагандистські виробничі романи на замовлення комуністичної партії.'
      correct: false
      explanation: 'Текст підкреслює його категоричну відмову писати примітивні агітаційні тексти, що зробило його мішенню для репресій.'
    - statement: 'Згідно з текстом, перебуваючи на соловецькій каторзі, письменник продовжував перекладати твори Шекспіра та Уайльда.'
      correct: true
      explanation: 'Автор тексту зазначає, що в листах із Соловків Підмогильний просив словники і продовжував перекладати і творити.'
    - statement: 'У тексті автор підкреслює, що після розстрілу в урочищі Сандармох твори Підмогильного продовжували вільно видаватися.'
      correct: false
      explanation: 'Текст стверджує, що ім''я письменника було тотально викреслене, а його твори були терміново вилучені з бібліотек.'
    - statement: 'Згідно з текстом, роман Місто спричинив шквал захоплення серед радянських ідеологів завдяки оспівуванню індустріалізації.'
      correct: false
      explanation: 'Радянська критика несамовито таврувала роман як буржуазний і цькувала автора.'
    - statement: 'Автор тексту зауважує, що перший літературний досвід Підмогильного був пов''язаний з написанням високої психологічної прози.'
      correct: false
      explanation: 'Його перші спроби були пригодницькими оповіданнями під екзотичним псевдонімом Лорд Лістер.'
    - statement: 'Згідно з текстом модуля, Степан Радченко сприймав Київ початку 1920-х років як вороже скупчення крамарів та міщан.'
      correct: true
      explanation: 'Спочатку Степан відчував класову зневагу до міста і планував повернутися в село після навчання.'
    - statement: 'У тексті зазначається, що роман про колективізацію Осінь 1929 зберігся у повному обсязі завдяки архівам КДБ.'
      correct: false
      explanation: 'Текст констатує, що рукопис був повністю конфіскований слідчими і так ніколи не побачив світу.'
    - statement: 'Автор тексту стверджує, що в реальному училищі Підмогильний вивчав виключно мертві мови, такі як латина та давньогрецька.'
      correct: false
      explanation: 'Текст протиставляє реальне училище гімназіям, зазначаючи, що він вивчав прикладні науки та живі європейські мови.'
    - statement: 'Згідно з текстом, перекладацька робота Підмогильного довела абсолютну лексичну та синтаксичну рівність української мови серед інших європейських мов.'
      correct: true
      explanation: 'Автор наголошує, що його переклади назавжди усунули потребу в російських перекладах як посередниках.'