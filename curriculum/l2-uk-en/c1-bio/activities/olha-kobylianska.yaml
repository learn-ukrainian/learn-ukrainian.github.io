- type: reading
  id: reading-kobylianska-vstup
  title: "Первинне джерело: Роль Ольги Кобилянської"
  source: "Текст модуля"
  text: |
    Ольга Кобилянська увійшла в історію як непересічна письменниця, яка відкрила нову епоху в українській літературі. Її творчість знаменує рішучий перехід від традиційного реалізму до складного, витонченого модернізму. Вона не просто описувала події, а проникала у найглибші закутки людської свідомості. Водночас Кобилянська стала переконаною феміністкою, яка відкрито кинула виклик усталеним суспільним нормам свого часу. Її героїні — це не покірні жертви обставин, а сильні, незалежні особистості, що прагнуть свободи й самореалізації.
  tasks:
    - "Проаналізуйте, у чому полягав новаторський підхід письменниці до зображення жінок."

- type: critical-analysis
  source_reading: "reading-kobylianska-vstup"
  title: "Аналіз концепції нової жінки"
  instruction: "Прочитайте уривок і дайте відповіді на запитання."
  items:
    - prompt: "У тексті автор стверджує, що героїні Кобилянської не є покірними жертвами. Який літературний напрям дозволив авторці найповніше розкрити цей новий тип героїні?"
      model_answer: "Письменниця використовувала інструменти модернізму та психологічної прози, що дозволило їй зазирнути у внутрішній світ сильної жінки, її прагнення до свободи й індивідуалізму, відійшовши від поверхневого реалізму."
    - prompt: "Згідно з текстом, який виклик кидала Кобилянська усталеним нормам суспільства?"
      model_answer: "Вона відкрито протистояла патріархату, відстоюючи право жінки 'бути собі ціллю' — мати доступ до освіти, самореалізації та не залежати від нав'язаних суспільством ролей жертви."

- type: essay-response
  source_reading: "reading-kobylianska-vstup"
  title: "Письмова робота: Перехід до модернізму"
  instruction: "Напишіть есе на основі прочитаного тексту та матеріалу модуля."
  prompt: "У тексті модуля автор характеризує стиль Кобилянської як 'пишний' та елітарний, що долає вузькі рамки етнографізму. Напишіть есе, у якому поясніть, чому такий стилістичний зсув був необхідним для утвердження української літератури в європейському контексті. Обґрунтуйте свою думку."
  min_words: 300
  model_answer: "Ольга Кобилянська стала ключовою фігурою в модернізації української літератури саме завдяки відмові від виключно селянської тематики. Перехід до глибокого психологізму, використання символізму та імпресіоністичних прийомів наблизили українську прозу до європейських зразків. Її елітарний стиль довів здатність української мови передавати найтонші емоційні стани та складні філософські ідеї, зокрема ніцшеанські мотиви. Це було необхідно, аби вивести літературу з провінційної ізоляції та інтегрувати її у світовий культурний простір, продемонструвавши, що вона може задовольняти потреби вибагливого інтелектуального читача."
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Чітке пояснення причин переходу до модернізму та його значення для європейської інтеграції."
      points: 10
    - criteria: "Використання термінології"
      description: "Доречне застосування понять 'модернізм', 'психологізм', 'етнографізм'."
      points: 5

- type: reading
  id: reading-zemlya
  title: "Первинне джерело: Влада землі"
  source: "Текст модуля (аналіз твору)"
  text: |
    Повість Земля традиційно вважається вершиною творчості Кобилянської, проте її сприйняття часто буває спрощеним. Це не просто селянський епос, що описує важку працю хліборобів. Авторка свідомо відходить від класичного етнографізму, притаманного літературі дев'ятнадцятого століття. Її Земля — це радше психологічний і навіть психоделічний трилер, де соціальні умови є лише тлом для розгортання античної трагедії. Центральним мотивом повісті є магічна, майже демонічна влада землі над людиною. Земля в Кобилянської постає не просто як засіб до існування, а як живий, містичний організм.
  tasks:
    - "Визначте, як Кобилянська трансформує традиційну селянську тему."

- type: authorial-intent
  source_reading: "reading-zemlya"
  title: "Аналіз авторського задуму: Епос землі"
  instruction: "Проаналізуйте наведений концепт твору Земля."
  prompt: "Спираючись на прочитаний уривок, поясніть, яку мету переслідувала Ольга Кобилянська, наділяючи землю 'демонічною владою' над людиною, замість того, щоб обмежитися описом важкої праці хліборобів?"
  techniques_to_identify:
    - "Символізм"
    - "Психологізм"
  model_answer: "Авторка прагнула дослідити глибинні, ірраціональні інстинкти людської природи. Наділяючи землю рисами живого організму, вона створює психологічний трилер. Її задум полягав у тому, щоб показати фатальну залежність людини від містичних сил природи та згубний вплив жадоби власності."

- type: quiz
  title: "Перевірте знання: Життя і творчість Ольги Кобилянської"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Згідно з текстом модуля, як автор характеризує вплив філософії Ніцше на творчість Кобилянської?"
      explanation: "Саме філософія Ніцше та його ідея надлюдини надихнули письменницю на створення сильних жіночих характерів."
      options:
        - text: "Вона надихнула її на створення образів духовно аристократичних жінок"
          correct: true
        - text: "Вона змусила її повністю відмовитися від написання творів німецькою мовою"
          correct: false
        - text: "Вона переконала її присвятити життя опису селянського побуту Буковини"
          correct: false
        - text: "Вона стала причиною її конфлікту з родиною через радикальні погляди"
          correct: false
    - question: "У тексті автор аналізує повість Людина. Як саме героїня твору виражає свій бунт проти патріархату?"
      explanation: "Концепція 'бути собі ціллю' передбачає незалежність жінки та її право на самореалізацію, що є центральною думкою твору."
      options:
        - text: "Вона свідомо обирає бідність і збереження гідності замість шлюбу за розрахунком"
          correct: true
        - text: "Вона залишає батьківський дім і вирушає на навчання до Віденського університету"
          correct: false
        - text: "Вона організовує масові протести жінок проти несправедливих законів"
          correct: false
        - text: "Вона відмовляється спілкуватися з усіма чоловіками, включаючи власного батька"
          correct: false
    - question: "Яку функцію автор підкреслює, описуючи листування між Лесею Українкою та Ольгою Кобилянською?"
      explanation: "Вони використовували займенник 'хтось' у чоловічому роді, що символізувало їхню рівність та звільнення від традиційних гендерних ролей."
      options:
        - text: "Воно стало для них глибоким духовним зв'язком і формою взаємної підтримки"
          correct: true
        - text: "Воно використовувалося виключно для обговорення політичної ситуації в імперії"
          correct: false
        - text: "Воно було засобом публічної критики консервативних літературних кіл"
          correct: false
        - text: "Воно слугувало способом приховати свої справжні імена від цензури"
          correct: false
    - question: "У тексті автор характеризує роль музики у новелі Меланхолійний вальс. Яке значення вона має для головної героїні?"
      explanation: "Музика виступає не фоном, а ключовою рушійною силою і метафорою трагічної долі генія."
      options:
        - text: "Вона виступає повноцінним персонажем і символом найвищого духовного пориву"
          correct: true
        - text: "Вона є лише приємним фоном для розгортання основної сюжетної лінії"
          correct: false
        - text: "Вона слугує засобом для заробітку грошей у скрутних життєвих обставинах"
          correct: false
        - text: "Вона використовується як інструмент для привернення уваги чоловіків"
          correct: false
    - question: "Який аргумент автор наводить, доводячи, що повість Земля не є класичним етнографічним твором?"
      explanation: "Кобилянська свідомо відходить від етнографізму, щоб дослідити ірраціональні глибини людської природи."
      options:
        - text: "У творі досліджуються темні інстинкти, а соціальні умови є лише тлом для трагедії"
          correct: true
        - text: "Твір повністю ігнорує реалії селянського побуту і фокусується на житті інтелігенції"
          correct: false
        - text: "Авторка використовує виключно міські пейзажі замість опису сільської природи"
          correct: false
        - text: "Персонажі твору розмовляють винятково вишуканою літературною мовою"
          correct: false
    - question: "Згідно з текстом, як місцеві шовіністи та окупаційна влада ставилися до Кобилянської в останні роки її життя?"
      explanation: "Окупаційна влада ініціювала слідство і цькування великої письменниці на підставі сфабрикованих статей."
      options:
        - text: "Вони влаштували їй цькування та ініціювали слідство за сфабрикованими статтями"
          correct: true
        - text: "Вони намагалися підкупити її, пропонуючи високі посади в окупаційній адміністрації"
          correct: false
        - text: "Вони повністю ігнорували її існування, вважаючи її творчість незначною"
          correct: false
        - text: "Вони сприяли виданню її повного зібрання творів, щоб задобрити українців"
          correct: false