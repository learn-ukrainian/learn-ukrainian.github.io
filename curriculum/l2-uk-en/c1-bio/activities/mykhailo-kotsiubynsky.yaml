      explanation: "Вітаїзм — це життєствердний пафос, який був властивий творчості Коцюбинського, попри його власні хвороби."
      options:
        - text: "вітаїзм"
          correct: true
        - text: "фаталізм"
          correct: false
        - text: "песимізм"
          correct: false
        - text: "агностицизм"
          correct: false
    - question: "У якому регіоні України письменник отримав перші та найсильніші естетичні враження від природи?"
      explanation: "Поділля з його розкішними краєвидами стало першою школою естетичного виховання письменника."
      options:
        - text: "на Поділлі"
          correct: true
        - text: "на Галичині"
          correct: false
        - text: "на Волині"
          correct: false
        - text: "на Слобожанщині"
          correct: false
    - question: "З якою метою автор використовує специфічний звукопис у своїх літературних текстах?"
      explanation: "Звукопис використовується для створення ефекту присутності та потужної сугестії (навіювання)."
      options:
        - text: "для створення сугестивного ефекту присутності"
          correct: true
