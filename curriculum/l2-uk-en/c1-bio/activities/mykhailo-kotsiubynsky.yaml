- type: reading
  id: reading-intermezzo
  title: "Первинне джерело: уривок з новели Intermezzo"
  source: "Михайло Коцюбинський (1908)"
  text: |
    Я утомився. Мене втомили люди. Мені надокучило бути заїздом, де вічно товчуться оті створіння, кричать, метушаться і смітять. Повідчиняти вікна! Провітрить оселю! Викинуть разом із сміттям і тих, що смітять. Нехай увійдуть у хату чистота і спокій.
    Сонце! Я тобі вдячний. Ти сієш у мою душу золотий засів — хто знає, що вийде з того насіння? Може, вогні? Ти дороге для мене. Я п'ю тебе, сонце, твій теплий зцілющий напій, п'ю, як дитина молоко з матерніх грудей.
  tasks:
    - "Якими художніми засобами автор передає свою втому від суспільства?"
    - "Яку функцію виконує образ сонця в процесі психологічного зцілення героя?"

- type: critical-analysis
  title: "Аналіз: психологічний імпресіонізм тексту"
  source_reading: reading-intermezzo
  target_text: |
    Сонце! Я тобі вдячний. Ти сієш у мою душу золотий засів — хто знає, що вийде з того насіння? Може, вогні?
  questions:
    - "Як метафора 'золотого засіву' характеризує концепцію вітаїзму Коцюбинського?"
    - "Чому герой звертається до сонця безпосередньо, як до живої істоти?"
  model_answers:
    - "Метафора 'золотого засіву' відображає вітаїстичний світогляд автора, де сонячне світло є не просто фізичним явищем, а потужною життєтворчою енергією, здатною відродити виснажену психіку та стимулювати творче натхнення (вогні)."
    - "Безпосереднє звернення до сонця свідчить про пантеїстичне сприйняття природи, характерне для імпресіонізму Коцюбинського. Природа стає повноправним, активним учасником внутрішнього монологу героя, замінюючи йому людське спілкування."
  focus_points:
    - "Вітаїзм та сонцепоклонництво"
    - "Персоніфікація природних стихій"
    - "Психологічна сугестія світла"

- type: essay-response
  title: "Есе: Еволюція від побутописання до глибинної психології"
  source_reading: reading-intermezzo
  prompt: |
    Напишіть аналітичне есе про те, як Михайло Коцюбинський змінив українську літературу. Спираючись на матеріал модуля, порівняйте традиційний етнографічний реалізм із модерністською новелою. Як змінився фокус уваги, сюжет та мова у зрілих творах письменника?
  min_words: 300
  model_answer: |
    Михайло Коцюбинський здійснив революційний перехід в українській прозі від етнографічного реалізму до психологічного імпресіонізму. Традиційна література до нього зосереджувалася переважно на зовнішніх обставинах: побуті, соціальних конфліктах, детальних описах селянського життя. Сюжети були послідовними, а мова — епічною та деталізованою.
    
    Коцюбинський кардинально змінив цю оптику. У своїх зрілих модерністських новелах, таких як 'Цвіт яблуні' чи 'Intermezzo', він переніс фокус уваги із зовнішнього світу на внутрішній стан героя. Його перестає цікавити послідовний переказ подій; натомість сюжет стає фрагментарним і концентрується на психологічних зламах. Природа в його текстах перестала бути просто декорацією і перетворилася на активного учасника драми, що віддзеркалює мінливі стани людської душі. 
    
    Мова Коцюбинського стала музичною, ритмічною та насиченою метафорами, де колір і звук використовуються як інструменти сугестії. Завдяки цьому він вивів українське слово на європейський рівень, довівши його здатність передавати найтонші емоційні вібрації.
  rubric:
    - criteria: "Розуміння стилів"
      description: "Чітко визначено різницю між реалізмом та імпресіонізмом"
      points: 10
    - criteria: "Аналіз елементів твору"
      description: "Проаналізовано зміну ролі сюжету, пейзажу та мови"
      points: 10
    - criteria: "Аргументація"
      description: "Наведено конкретні приклади з біографії чи творчості письменника"
      points: 10

- type: true-false
  title: "Факти та міфи про Коцюбинського"
  instruction: "Визначте, чи є твердження правдивим, спираючись на текст модуля."
  items:
    - statement: "Ранні твори Коцюбинського були написані в стилі глибокого психологічного модернізму."
      correct: false
      explanation: "Перші літературні спроби були витримані в традиційному реалістичному ключі з акцентом на етнографію та побут."
    - statement: "Новела 'Цвіт яблуні' вважається переломним етапом, де автор аналізує роздвоєність людської психіки."
      correct: true
      explanation: "Саме в цьому творі автор безжально фіксує конфлікт між болем батька та професійною цікавістю письменника."
    - statement: "Радянська критика об'єктивно оцінювала модерністський та естетський характер творчості письменника."
      correct: false
      explanation: "Радянська критика ігнорувала його модернізм, ліплячи з нього 'революційного демократа' та послідовника Максима Горького."
    - statement: "У повісті 'Тіні забутих предків' Коцюбинський зобразив гуцульське двовір'я без жодної іронії."
      correct: true
      explanation: "Автор геніально відтворив синтез християнства та язичництва як органічну частину міфопоетичного всесвіту гуцулів."
    - statement: "У новелі 'Intermezzo' дійовими особами виступають реальні люди, з якими автор зустрівся в селі."
      correct: false
      explanation: "Дійовими особами є абстрактні поняття та природні стихії, що підкреслює зосередженість на внутрішньому світі."
    - statement: "Письменник часто працював із сухими статистичними даними під час роботи в земській управі."
      correct: true
      explanation: "Він керував відділом сільськогосподарської статистики, що дало йому матеріал для соціально-психологічних полотен."

- type: quiz
  title: "Концепції та терміни"
  instruction: "Оберіть правильну відповідь до кожного запитання."
  items:
    - question: "Який мистецький напрям зосереджується на передачі миттєвих вражень та мінливих станів душі?"
      explanation: "Імпресіонізм намагається вловити та зафіксувати суб'єктивні враження від реальності."
      options:
        - text: "імпресіонізм"
          correct: true
        - text: "романтизм"
          correct: false
        - text: "класицизм"
          correct: false
        - text: "реалізм"
          correct: false
    - question: "Як називається фізіологічна особливість Коцюбинського асоціювати звуки з певними кольорами?"
      explanation: "Синестезія (або кольоровий слух) дозволяла йому сприймати світ як єдину симфонію звуків і кольорів."
      options:
        - text: "синестезія"
          correct: true
        - text: "амнезія"
          correct: false
        - text: "гіпербола"
          correct: false
        - text: "сугестія"
          correct: false
