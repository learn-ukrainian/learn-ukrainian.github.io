- type: reading
  id: reading-lysenko-credo
  title: "Творче кредо композитора"
  source: "З листа Миколи Лисенка до Філарета Колесси (1896)"
  text: |
    Без неї [народної пісні] гріх починати свою працю й музикові, й філологові... Фольклор – це саме життя! 
    Ми — не малороси, ми — народ європейський, і наша музика мусить стояти врівні з європейською.
  tasks:
    - "Як ці дві тези відображають життєву позицію композитора?"

- type: critical-analysis
  source_reading: reading-lysenko-credo
  title: "Аналіз творчого маніфесту"
  instruction: "Проаналізуйте наведені тези та їхнє значення для української культури."
  items:
    - prompt: "Згідно з текстом, чому Лисенко вважав, що українська музика повинна базуватися на фольклорі, але при цьому використовувати складні європейські академічні форми?"
      model_answer: "Лисенко розумів, що для світового визнання українська музика має розмовляти складною європейською структурною мовою. Водночас він прагнув зберегти неповторну автентичну національну інтонацію, тому фольклор став основою, а європейські форми — інструментом його розвитку та популяризації."

- type: essay-response
  title: "Роль Лисенка у формуванні національної ідентичності"
  instruction: "Напишіть розгорнуте есе-відповідь на основі матеріалу модуля."
  items:
    - prompt: "У тексті модуля автор детально розглядає відмову Лисенка перекласти лібрето опери 'Тарас Бульба' російською мовою. Напишіть есе, в якому проаналізуйте, як цей вчинок характеризує композитора як громадського діяча та який вплив він мав на деколонізацію української культури. Наведіть конкретні аргументи з тексту."
      model_answer: "Відмова Лисенка була свідомим антиколоніальним жестом. Композитор пожертвував власною славою, визнанням та фінансовим успіхом заради збереження національної гідності. Він продемонстрував, що право нації на власну культуру є вищим за кар'єру в імперії. Цим він зберіг оригінальний твір для майбутніх поколінь вільної України та показав приклад безкомпромісного спротиву імперському тиску."
  min_words: 200
  rubric:
    - criteria: "Глибина аналізу"
      description: "Здатність глибоко аналізувати причини та наслідки свідомого вибору композитора."
      points: 10
    - criteria: "Аргументація з тексту"
      description: "Використання конкретних прикладів з модуля для підтвердження думки."
      points: 10

- type: quiz
  title: "Аналіз тексту: перевірка розуміння"
  instruction: "Оберіть одну правильну відповідь до кожного запитання на основі прочитаного тексту."
  items:
    - question: "Згідно з текстом, як саме природнича освіта допомогла композитору в його подальшій музичній діяльності?"
      explanation: "Науковий підхід дозволив йому систематизувати фольклор."
      options:
        - text: "Він застосував структурний аналітичний підхід до класифікації народних пісень."
          correct: true
        - text: "Він зміг створювати нові музичні інструменти з природних матеріалів."
          correct: false
        - text: "Вона дала йому змогу фінансувати свої власні музичні проєкти."
          correct: false
        - text: "Він використовував звуки природи як основу для симфонічних творів."
          correct: false
    - question: "Який основний аргумент наводить автор тексту, пояснюючи відмову Лисенка від блискучої кар'єри в Петербурзі?"
      explanation: "Він відмовився через небажання інтегруватися в російський імперський простір."
      options:
        - text: "Він вважав принизливою асиміляцію в панівну імперську культуру."
          correct: true
        - text: "Він не мав достатнього рівня володіння російською мовою для створення опер."
          correct: false
        - text: "Він побоювався жорсткої конкуренції з боку російських композиторів."
          correct: false
        - text: "Клімат Петербурга негативно впливав на його слабке здоров'я."
          correct: false
    - question: "Як автор характеризує музичну драматургію опери 'Тарас Бульба' порівняно зі старими традиціями?"
      explanation: "Він відмовився від застарілої номерної структури."
      options:
        - text: "У ній застосовано наскрізний симфонічний розвиток та лейтмотиви замість номерної структури."
          correct: true
        - text: "Вона повністю побудована на танцювальних ритмах та коротких розважальних аріях."
          correct: false
        - text: "Опера складається виключно з розмовних діалогів без вокального супроводу."
          correct: false
        - text: "У ній повністю відсутні хорові сцени та складні поліфонічні вокальні ансамблі."
          correct: false
    - question: "У тексті зазначається, що дитячі опери Лисенка були не просто розвагою. Яку ще функцію вони виконували?"
      explanation: "Вони були важливим інструментом національного виховання та педагогіки."
      options:
        - text: "Вони слугували потужним педагогічним інструментом для національного виховання."
          correct: true
        - text: "Вони створювалися виключно для комерційного продажу театрам Європи."
          correct: false
        - text: "Вони використовувалися для прихованої критики місцевих чиновників."
          correct: false
        - text: "Їхньою головною метою було залучення фінансування для школи."
          correct: false
    - question: "Як автор пояснює справжню сутність багаторічної етнографічної роботи Лисенка?"
      explanation: "Це був глибокий науковий проєкт, а не просто аматорське хобі."
      options:
        - text: "Це був фундаментальний науковий проєкт зі збереження автентики, а не аматорське хобі."
          correct: true
        - text: "Вона була спрямована на створення легких і популярних естрадних мелодій."
          correct: false
        - text: "Він записував лише тексти пісень, повністю ігноруючи їхні музичні особливості."
          correct: false
        - text: "Його цікавили лише міські романси, а не стародавні сільські традиції."
          correct: false
    - question: "Яким чином, згідно з матеріалом модуля, композитор протидіяв руйнівним наслідкам Емського указу?"
      explanation: "Лисенко організував потужну юридичну кампанію та домігся послаблення указу."
      options:
        - text: "Він розгорнув виснажливу дипломатичну кампанію, логічно доводячи абсурдність заборони нот."
          correct: true
        - text: "Він почав таємно видавати свої твори за кордоном під вигаданим псевдонімом."
          correct: false
        - text: "Він повністю відмовився від написання вокальної музики та перейшов на інструментальну."
          correct: false
        - text: "Він звернувся з відкритим листом безпосередньо до імператора, публічно вимагаючи скасування указу."
          correct: false

- type: true-false
  title: "Аналіз тверджень за текстом"
  instruction: "Визначте, чи відповідають наведені твердження змісту прочитаного тексту."
  items:
    - statement: "Згідно з текстом модуля, Лисенко прагнув адаптувати українські пісні до стандартних мажорно-мінорних європейських гармоній для більшої популярності."
      correct: false
      explanation: "Автор підкреслює, що Лисенко зберігав автентичні стародавні лади і виступав проти їхнього банального спрощення."
    - statement: "У тексті стверджується, що Лисенко написав оперу 'Тарас Бульба' виключно на основі російських літературних джерел та лібрето."
      correct: false
      explanation: "Він категорично відмовився перекладати лібрето російською мовою і використовував оригінальне українське джерело."
    - statement: "Автор зазначає, що заснування Музично-драматичної школи у Києві стало найголовнішим інституційним досягненням композитора."
      correct: true
      explanation: "Школа стала першим закладом з українським національним спрямуванням, і автор називає це колосальним історичним досягненням."
    - statement: "Як сказано у статті, ювілей Лисенка 1903 року пройшов тихо і залишився непоміченим за межами Києва через сувору цензуру."
      correct: false
      explanation: "Текст вказує, що ювілей перетворився на грандіозну загальнонаціональну маніфестацію, куди приїхали делегації навіть з-за кордону."
    - statement: "У матеріалі підкреслюється, що композитор особисто утримував свою Музично-драматичну школу, виплачуючи стипендії талановитим студентам із власних коштів."
      correct: true
      explanation: "Автор прямо зазначає, що Лисенко віддавав свої зароблені гроші на підтримку бідних, але талановитих учнів."
    - statement: "Текст доводить, що Лисенко вважав себе виключно виконавцем-віртуозом і не цікавився створенням власних масштабних оперних полотен."
      correct: false
      explanation: "Композитор свідомо відмовився від кар'єри піаніста заради створення національної академічної музики."