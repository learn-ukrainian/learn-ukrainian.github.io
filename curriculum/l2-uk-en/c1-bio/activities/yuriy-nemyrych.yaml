- type: reading
  id: reading-nemyrych-speech
  title: "Первинне джерело: Варшавська промова"
  source: "Варшавська промова Юрія Немирича (1659, реконструкція на основі ідей)"
  text: |
    Ми прийшли до вас не як невільники, а як вільні до вільних, рівні до рівних. 
    Козаки воювали не заради руйнування держави, а заради здобуття громадянських свобод, 
    які їм несправедливо відмовлялися надати. Лише визнання русинів рівними братами, 
    а не підлеглими хлопами, здатне врятувати всю Східну Європу від московської навали.
  tasks:
    - "Проаналізуйте риторичні прийоми, які використовує автор для переконання сенаторів."
    - "Визначте головну політичну тезу цього уривка."

- type: critical-analysis
  title: "Конфлікт ідентичностей: шляхтич vs козак"
  source_reading: reading-nemyrych-speech
  instruction: "Проаналізуйте поданий уривок тексту та дайте відповіді на запитання."
  target_text: "Трагедія Немирича полягала в тому, що його ідеї були занадто складними та новаторськими для суспільства. Для польської шляхти він був надто 'руським' та бунтівним, для козацьких мас — надто 'панським' і підозрілим."
  questions:
    - "Згідно з текстом, які основні причини нерозуміння ідей Юрія Немирича як польською шляхтою, так і козацтвом?"
    - "Як зміна релігії з протестантизму на православ'я відображає намагання Немирича подолати відчуження від козацьких мас?"
  model_answers:
    - "Автор підкреслює, що польська еліта не могла прийняти його як рівного через 'руське' походження і підтримку козацтва, тоді як козаки ставилися до нього з підозрою через його шляхетське коріння, європейську освіту та минулу ворожнечу."
    - "Перехід у православ'я був свідомим політичним маневром, покликаним здобути легітимність в очах козацтва, для якого релігія була ключовим маркером політичної лояльності. Це був прагматичний крок для реалізації державного проекту."
  focus_points:
    - "Соціальна дистанція"
    - "Релігійний прагматизм"
    - "Політична ідентичність"

- type: essay-response
  title: "Есе: Велике Князівство Руське як візія федералізму"
  source_reading: reading-nemyrych-speech
  instruction: "Напишіть розгорнуте есе-аналіз на основі тексту."
  prompt: "У тексті модуля концепція Великого Князівства Руського розглядається як прообраз 'Сполучених Штатів Східної Європи'. Спираючись на аргументацію Юрія Немирича, доведіть або спростуйте твердження, що цей проект був єдиним життєздатним шляхом порятунку для Речі Посполитої."
  min_words: 300
  model_answer: "У своєму есе студент повинен спиратися на текст модуля, зокрема на аналіз системної кризи Речі Посполитої (нездатність трансформувати унію 'двох народів'). Необхідно проаналізувати три стовпи Великого Князівства Руського: власну судову систему, скарбницю та незалежну армію. Слід підкреслити, що Немирич пропонував правовий інструмент стримування і противаг замість силового конфлікту. Також важливо згадати, що цей проект гарантував захист від московського деспотизму шляхом інтеграції в європейський безпековий простір."
  rubric:
    - criteria: "Аргументація на основі тексту"
      description: "Есе містить посилання на конкретні ідеї Немирича з тексту (три стовпи, правова культура)."
      points: 10
    - criteria: "Лексичне багатство"
      description: "Використання академічної політичної лексики (суб'єктність, федералізм, суверенітет)."
      points: 10

- type: quiz
  title: "Перевірте розуміння концепцій"
  instruction: "Оберіть одну правильну відповідь до кожного запитання."
  items:
    - question: "Згідно з текстом, як автор характеризує погляди Гуго Гроція щодо державного будівництва?"
      explanation: "У тексті зазначено, що Гроцій обґрунтував концепцію природного права та ідею про те, що відносини між державами мають регулюватися законами."
      options:
        - text: "Державні відносини мають регулюватися міжнародним правом і договорами."
          correct: true
        - text: "Єдиним ефективним методом управління є абсолютна монархія."
          correct: false
        - text: "Держава повинна спиратися виключно на військову диктатуру."
          correct: false
        - text: "Основою будь-якої держави є обов'язкова релігійна однорідність."
          correct: false
    - question: "У тексті модуля автор описує Варшавський дискурс щодо статусу козаків таким чином:"
      explanation: "За текстом, польська еліта вважала козаків підданими, і будь-яка поступка їм розглядалася як порушення вольностей шляхти."
      options:
        - text: "козаки є підданими, що не мають права на рівні вольності"
          correct: true
        - text: "козаки є повноправним третім народом Речі Посполитої"
          correct: false
        - text: "козаки повинні стати головною політичною силою держави"
          correct: false
        - text: "козаки мають право самостійно обирати короля у Варшаві"
          correct: false
    - question: "Згідно з текстом, яку конкретну освітню гарантію було включено до Гадяцького договору?"
      explanation: "У тексті чітко зазначено, що Могилянська колегія отримувала статус європейської академії."
      options:
        - text: "Києво-Могилянська колегія здобула статус рівноправної академії."
          correct: true
        - text: "Усі школи були підпорядковані винятково православній церкві."
          correct: false
        - text: "Латинська мова була заборонена у всіх навчальних закладах."
          correct: false
        - text: "Було наказано закрити всі протестантські друкарні на Волині."
          correct: false
    - question: "Як у тексті пояснюється феномен переходу Юрія Немирича з аріанства у православ'я?"
      explanation: "Текст розцінює це як свідомий політичний маневр, щоб здобути легітимність і посаду канцлера серед козацтва."
      options:
        - text: "Це був політичний крок для досягнення легітимності в Гетьманщині."
          correct: true
        - text: "Це був результат тривалих богословських дебатів у Киселині."
          correct: false
        - text: "Це була умова, поставлена шведським королем Карлом X Густавом."
          correct: false
        - text: "Це було примусове рішення, прийняте під загрозою вигнання."
          correct: false
    - question: "Який аргумент автор наводить для пояснення того, чому перемога під Конотопом не завершила війну?"
      explanation: "Автор вказує на катастрофічний розвиток подій всередині самої Гетьманщини та антиурядовий заколот."
      options:
        - text: "Почався масовий антиурядовий заколот і внутрішня криза."
          correct: true
        - text: "Козацьке військо зазнало величезних втрат у степу."
          correct: false
        - text: "Кримські татари несподівано перейшли на бік Московії."
          correct: false
        - text: "Польський сейм відмовився ратифікувати підписаний договір."
          correct: false

- type: true-false
  title: "Аналіз тверджень: правда чи вигадка"
  instruction: "Визначте, чи відповідають твердження змісту прочитаного тексту."
  items:
    - statement: "Згідно з текстом, Юрій Немирич з самого початку повстання Хмельницького 1648 року воював на боці козаків."
      correct: false
      explanation: "У тексті зазначається, що спочатку він воював у складі коронного війська, оскільки був магнатом."
    - statement: "За описом автора, проект Гадяцького договору містив вимогу щодо скасування Берестейської унії на території Князівства Руського."
      correct: true
      explanation: "Це була одна з ключових релігійних вимог для забезпечення миру, згадана в тексті."
    - statement: "Як стверджується в тексті, протестантська шляхта прагнула будувати державу з опорою винятково на військову силу та захист 'старої віри'."
      correct: false
      explanation: "Текст підкреслює, що такий підхід був притаманний православному козацтву, тоді як протестанти фокусувалися на законі та договорі."
    - statement: "У своєму трактаті Немирич аргументує, що єдиний спосіб здолати московську тиранію — це вести війну на її власній території."
      correct: true
      explanation: "Він стверджував, що оборонні війни проти такого ворога приречені на поразку."
    - statement: "Згідно з наведеним описом подій, смерть канцлера Немирича сталася під час масованої атаки військ Олексія Трубецького."
      correct: false
      explanation: "Автор вказує, що Немирич загинув під час спроби придушити внутрішній антиурядовий заколот на Лівобережжі."