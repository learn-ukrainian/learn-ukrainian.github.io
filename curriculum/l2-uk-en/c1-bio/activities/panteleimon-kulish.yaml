- type: reading
  id: reading-kulish-khutir
  title: 'Листи з хутора: Філософія Куліша'
  source: 'Пантелеймон Куліш (1861)'
  text: 'Хутір — це наша справжня Україна, де збереглася чистота звичаїв і глибина віри. У великих містах, як Петербург чи Москва, українська людина губить своє коріння, перетворюючись на безликого чиновника імперії. На хуторі ж ми є самі собою, господарями на власній землі. Це не втеча від світу, а збереження ядра нації для майбутнього відродження. Тільки спираючись на хуторянську мораль, ми зможемо збудувати справжню європейську цивілізацію.'
  instruction: 'Прочитайте уривок, що ілюструє філософську концепцію "хуторянства".'
  tasks:
    - 'Проаналізуйте, як автор джерела протиставляє український хутір та велике імперське місто.'
    - 'Визначте головну мету хуторянства згідно з наведеним текстом.'

- type: critical-analysis
  title: 'Аналіз концепції хуторянства'
  source_reading: 'reading-kulish-khutir'
  instruction: 'Проаналізуйте ключову думку з наведеного тексту.'
  target_text: 'Це не втеча від світу, а збереження ядра нації для майбутнього відродження.'
  items:
    - prompt: 'Згідно з текстом джерела, як Куліш переосмислює поняття "хутір", протиставляючи його імперському місту?'
      model_answer: 'Куліш відкидає розуміння хутора як символу відсталості чи провінційності. Натомість він розглядає його як духовний сховок, де зберігається національна ідентичність, автентична культура та християнська мораль. Місто ж, за Кулішем, є центром фальші, корупції та асиміляції, де українці втрачають себе.'

- type: true-false
  title: 'Аналіз тексту: Життєвий та творчий шлях'
  instruction: 'Визначте, чи відповідають твердження змісту прочитаного модуля.'
  items:
    - statement: 'Згідно з текстом, відсутність дворянського диплома призвела до того, що Куліш здався і припинив навчання в університеті.'
      correct: false
      explanation: 'У тексті стверджується, що ця соціальна несправедливість перетворила його на титана праці, який вирішив довести свою вищість через чистий інтелект.'
    - statement: 'У модулі автор характеризує підхід Куліша до націєтворення як революційний і такий, що спирається на кривавий бунт мас.'
      correct: false
      explanation: 'Текст підкреслює, що Куліш був переконаним еволюціоністом, який відкидав ідею кривавого бунту на користь просвіти та елітарного будівництва.'
    - statement: 'Згідно з текстом, введення нового фонетичного правопису мало колосальне психологічне значення для сепарації від імперії.'
      correct: true
      explanation: 'Текст пояснює, що читач, бачачи нові літери, одразу візуально розумів, що перед ним інша, самостійна мова, відмінна від російської.'
    - statement: 'У статті зазначається, що Куліш завжди повністю підтримував погляди Тараса Шевченка на гайдамацькі повстання.'
      correct: false
      explanation: 'Автор тексту наголошує на глибокому конфлікті між ними: Шевченко героїзував повстання, а Куліш засуджував їх як руйнівну анархію.'
    - statement: 'Як зазначає автор модуля, переклади творів Шекспіра та Байрона були способом довести гнучкість і багатство української мови.'
      correct: true
      explanation: 'У тексті вказано, що ці переклади стали інтелектуальним мостом до Західної Європи і доказом здатності мови передавати найвищі концепти.'

- type: comparative-study
  title: 'Два полюси: Куліш і Шевченко'
  instruction: 'Проаналізуйте різні підходи до розбудови нації, спираючись на текст модуля.'
  items_to_compare:
    - 'Підхід Тараса Шевченка'
    - 'Підхід Пантелеймона Куліша'
  criteria:
    - 'Ставлення до історичного минулого та збройних повстань'
    - 'Бачення оптимального шляху до національного звільнення'
  prompt: 'Спираючись на текст модуля, порівняйте ідеологічні платформи Тараса Шевченка та Пантелеймона Куліша. Як автор пояснює різницю у їхніх методах досягнення спільної мети?'
  model_answer: 'Шевченко був голосом стихійного народного протесту, він вірив у революційне пробудження та героїзував повстання як прояв справедливої помсти та волі. Куліш, натомість, мислив як раціональний еволюціонер. Він боявся охлократії, засуджував кривавий бунт і вважав, що нація має будуватися поступово: через освіту, формування інтелектуальної еліти та європеїзацію культури. Обидва прагнули європеїзації та звільнення України, але Шевченко діяв через емоції, а Куліш — через розум і методичну працю.'

- type: essay-response
  title: 'Дуалізм Куліша: європеїзм чи консерватизм?'
  instruction: 'Напишіть аналітичне есе на основі матеріалів модуля.'
  min_words: 300
  items:
    - prompt: 'Пантелеймон Куліш одночасно закликав до європеїзації української культури і проповідував консервативну філософію "хуторянства". Напишіть есе, у якому проаналізуйте, чи були ці дві ідеї взаємовиключними в його світогляді, чи, навпаки, доповнювали одна одну. Аргументуйте свою думку прикладами з тексту модуля.'
      model_answer: 'На перший погляд, заклики до європеїзації та ідеалізація українського хутора здаються парадоксом. З одного боку, Куліш титанічно працював над перекладами Біблії, Шекспіра та Байрона, прагнучи вивести українську мову з провінційного стану на світовий рівень. Він хотів бачити українців сучасною європейською нацією. З іншого боку, у своїх філософських працях він жорстко критикував імперське міське життя, вбачаючи в ньому загрозу асиміляції та морального розкладу. Проте, як свідчить текст модуля, цей дуалізм був не суперечністю, а складною стратегією виживання нації в умовах імперії. Місто в Росії дев''ятнадцятого століття було інструментом русифікації. Куліш розумів, що без міцного духовного фундаменту українці просто розчиняться в імперському просторі. Тому хутір для нього став символічною фортецею, де зберігається автентична мова, етика та ідентичність. Це була безпечна база, спираючись на яку, нація мала здійснити європейський стрибок. Отже, хуторянство Куліша не було закликом до ізоляції. Він пропонував зберегти національне ядро на хуторі, але при цьому озброїти його найкращими здобутками європейської цивілізації через якісні переклади та високу літературу. Його європеїзм був кінцевою метою, а хуторянський консерватизм — захисним механізмом на шляху до неї.'
  rubric:
    - criteria: 'Аргументація та аналіз'
      description: 'Глибокий і логічний аналіз поєднання концепцій хуторянства та європеїзму.'
      points: 40
    - criteria: 'Робота з текстом'
      description: 'Точні посилання на перекладацьку діяльність та суспільно-політичні погляди діяча.'
      points: 30
    - criteria: 'Стилістика та лексика'
      description: 'Використання академічної лексики, складного синтаксису, відсутність русизмів.'
      points: 30

- type: quiz
  title: 'Лексика: Інтелектуальний вимір'
  instruction: 'Оберіть правильне значення термінів, спираючись на контекст модуля.'
  items:
    - question: 'У тексті модуля слово "хуторянство" використовується для позначення якої саме концепції?'
      explanation: 'За Кулішем, хуторянство — це філософія збереження національної ідентичності та моралі.'
      options:
        - text: 'філософія збереження національної ідентичності в умовах сільського життя'
          correct: true
        - text: 'система адміністративного управління малими поселеннями в імперії'
          correct: false
        - text: 'прагнення українських селян до повної культурної ізоляції від Європи'
          correct: false
        - text: 'сукупність фольклорних творів, записаних Кулішем на Чернігівщині'
          correct: false
    - question: 'Згідно зі стилістичними нотатками, у якому контексті найкраще вживати термін "полеміка"?'
      explanation: 'Полеміка означає гостру дискусію або суперечку з важливого питання.'
      options:
        - text: 'для позначення високого академічного чи літературного рівня дискусії'
          correct: true
        - text: 'для опису звичайної побутової суперечки між двома людьми на вулиці'
          correct: false
        - text: 'як абсолютний синонім до слова компроміс у політичних переговорах'
          correct: false
        - text: 'для характеристики виключно процесу написання історичного роману'
          correct: false
    - question: 'Як автор модуля пояснює значення терміна "модернізація" щодо діяльності Куліша?'
      explanation: 'Модернізація в цьому контексті означає оновлення та виведення культури на сучасний рівень.'
      options:
        - text: 'процес оновлення та приведення культури до нових вимог часу'
          correct: true
        - text: 'повернення до архаїчних, давньоруських форм існування держави'
          correct: false
        - text: 'фізична реконструкція старих козацьких фортець і міст'
          correct: false
        - text: 'повна відмова від використання рідної мови в науковій сфері'
          correct: false
    - question: 'Згідно з текстом, що саме означає термін "охлократія" в контексті роману "Чорна рада"?'
      explanation: 'Охлократія — це влада натовпу, яким легко маніпулюють демагоги.'
      options:
        - text: 'влада бездумного натовпу, яким маніпулюють популісти'
          correct: true
        - text: 'система управління, за якої влада належить освіченій еліті'
          correct: false
        - text: 'форма правління, де всі рішення приймає виключно гетьман'
          correct: false
        - text: 'повна відсутність будь-якої влади, законів та уряду в суспільстві'
          correct: false
    - question: 'Який основний сенс вкладається у поняття "європеїзм" Куліша згідно з текстом модуля?'
      explanation: 'Європеїзм Куліша полягав у орієнтації на європейські стандарти та інтеграцію.'
      options:
        - text: 'орієнтація на західні культурні стандарти та переклад світової класики'
          correct: true
        - text: 'постійні подорожі містами Європи без мети створення власної культури'
          correct: false
        - text: 'копіювання виключно російських імперських зразків управління'
          correct: false
        - text: 'добровільна відмова від власної мови на користь англійської чи французької'
          correct: false