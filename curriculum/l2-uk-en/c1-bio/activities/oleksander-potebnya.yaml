- type: reading
  id: reading-potebnya-dumka
  title: "Первинне джерело: З праці 'Думка і мова'"
  source: "Олександр Потебня (1862)"
  text: |
    Мова є засіб не виражати вже готову думку, а створювати її... вона не є відображенням світогляду, що склався, а діяльністю, що його складає. Слово — це вираження не самої речі, а нашого розуміння про неї. Денаціоналізація зводиться на погане виховання, на моральну хворобу; на неповне користування наявними засобами сприйняття... на ослаблення енергії думки; на мерзенність запустіння на місці витіснених, але нічим не замінених форм свідомості.

- type: critical-analysis
  title: "Аналіз концепції мови як творця думки"
  source_reading: reading-potebnya-dumka
  instruction: "Проаналізуйте наведений уривок та дайте розгорнуті відповіді."
  items:
    - prompt: "Як Потебня спростовує уявлення про те, що мова є лише інструментом передачі інформації?"
      model_answer: "Потебня стверджує, що мова є не пасивним відображенням уже готової думки, а активним інструментом її створення. Вона не просто називає речі, а формує наше специфічне розуміння про них."
    - prompt: "Які психологічні наслідки, згідно з текстом, має процес денаціоналізації для особистості?"
      model_answer: "Денаціоналізація розглядається як 'моральна хвороба', що призводить до неповного користування засобами сприйняття, ослаблення енергії думки та руйнування форм свідомості, тобто до загальної інтелектуальної деградації."

- type: essay-response
  title: "Есе: Роль мови у формуванні національної свідомості"
  source_reading: reading-potebnya-dumka
  instruction: "Напишіть коротке есе на основі прочитаного уривка та матеріалу модуля."
  prompt: "Спираючись на теорію внутрішньої форми слова та концепцію денаціоналізації Потебні, поясніть, чому втрата рідної мови розглядалася ним як фатальна втрата самостійного мислення нації. Наведіть конкретні аргументи."
  model_answer: "Олександр Потебня доводив, що мова і мислення нерозривно пов'язані. Внутрішня форма слова відображає унікальний спосіб, яким кожна нація сприймає світ. Тому відмова від рідної мови (асиміляція) означає руйнування цього унікального світобачення. Потебня називав це 'моральною хворобою', оскільки зміна мови призводить до розщеплення свідомості, втрати творчої енергії та нездатності до оригінального мислення. Замість природного розвитку нація отримує 'запустіння' на місці витіснених форм свідомості."
  rubric:
    - criteria: "Аргументація та розкриття теми"
      description: "Глибоке розуміння теорії Потебні, чітке пояснення зв'язку між мовою та мисленням."
      points: 40
    - criteria: "Використання термінології"
      description: "Доречне використання таких термінів, як внутрішня форма слова, денаціоналізація, енергія думки."
      points: 30
    - criteria: "Логіка та структура есе"
      description: "Послідовний виклад думок, наявність вступу, основної частини та висновку."
      points: 30

- type: true-false
  title: "Правда чи вигадка: Аналіз тексту модуля"
  instruction: "Спираючись виключно на текст модуля, визначте правильність тверджень."
  items:
    - statement: "У тексті стверджується, що Потебня розглядав мову як пасивний інструмент, який лише відображає вже готові думки людини."
      correct: false
      explanation: "Автор тексту підкреслює, що мова, за Потебнею, не виражає готову думку, а безпосередньо створює її."
    - statement: "Згідно з текстом, внутрішня форма слова — це первісний образ, який показує, як нація вперше побачила певний елемент світу."
      correct: true
      explanation: "Так, у модулі зазначено, що це яскрава метафора, яка лежить в основі найменування предмета."
    - statement: "У модулі пояснюється, що назва праці 'З нотаток про російську граматику' була використана як прикриття в умовах суворої імперської цензури."
      correct: true
      explanation: "Текст називає це рішення геніальним способом легально опублікувати дослідження української мови."
    - statement: "Автор тексту доводить, що поступове згасання первісної образності слова є свідченням загальної деградації мовної системи."
      correct: false
      explanation: "Навпаки, у тексті вказано, що цей процес є необхідною умовою для переходу до абстрактно-наукового мислення."
    - statement: "Згідно з текстом, переклад 'Одіссеї' Гомера був здійснений Потебнею для практичної демонстрації філософського потенціалу української мови."
      correct: true
      explanation: "Модуль стверджує, що цей переклад довів здатність мови адекватно передавати найтонші філософські сенси."

- type: quiz
  title: "Перевірте знання: Теорія та спадщина Олександра Потебні"
  instruction: "Оберіть одну правильну відповідь на кожне запитання, спираючись виключно на текст модуля."
  items:
    - question: "Згідно з текстом модуля, як саме Олександр Потебня розглядав щоденне спілкування та мовленнєвий акт?"
      explanation: "У тексті вказано, що щоденне спілкування є постійним тренуванням інтелекту."
      options:
        - text: "як постійне, непомітне тренування інтелекту"
          correct: true
        - text: "як механічну передачу заздалегідь підготовленої інформації"
          correct: false
        - text: "як спосіб маскування справжніх емоцій мовця від оточення"
          correct: false
        - text: "як інструмент виключно для художньої творчості письменників"
          correct: false
    - question: "У тексті зазначається, що Потебня пов'язав згасання внутрішньої форми слова з певним процесом. Яким саме?"
      explanation: "Текст пояснює, що втрата первісної образності є умовою для переходу до абстрактно-наукового мислення."
      options:
        - text: "з еволюцією від міфологічного до наукового мислення"
          correct: true
        - text: "із загальною деградацією та спрощенням мовної системи"
          correct: false
        - text: "з масовою асиміляцією та впливом сусідніх слов'янських мов"
          correct: false
        - text: "з поширенням писемності серед звичайних сільських жителів"
          correct: false
    - question: "Як автор тексту пояснює причину, через яку Потебня назвав свою працю 'З нотаток про російську граматику'?"
      explanation: "Автор модуля називає це геніальним рішенням для конспірації в умовах цензури."
      options:
        - text: "це була вимушена наукова конспірація для обходу цензури"
          correct: true
        - text: "він спочатку планував написати дослідження російської мови"
          correct: false
        - text: "його змусили змінити назву під тиском імперського керівництва"
          correct: false
        - text: "це була загальноприйнята практика серед європейських лінгвістів"
          correct: false
    - question: "Згідно з наведеним текстом, що дозволила довести дослідникам психологічна методологія Харківської школи?"
      explanation: "У модулі сказано, що ця методологія пояснювала кожну синтаксичну конструкцію як відбиток реальних психологічних процесів."
      options:
        - text: "що кожна нація має свій абсолютно неповторний кут зору на реальність"
          correct: true
        - text: "що всі слов'янські мови мають абсолютно ідентичну внутрішню форму"
          correct: false
        - text: "що народний фольклор не має жодної наукової чи історичної цінності"
          correct: false
        - text: "що українська фонетика розвивалася виключно під впливом польської"
          correct: false
    - question: "Який аргумент наводить автор модуля, пояснюючи руйнівні наслідки денаціоналізації згідно з Потебнею?"
      explanation: "Текст цитує Потебню, який вважав денаціоналізацію моральною хворобою, що спричиняє ослаблення енергії думки."
      options:
        - text: "вона призводить до розщеплення свідомості та втрати творчої енергії"
          correct: true
        - text: "вона змушує людину вивчати занадто багато непотрібних іноземних слів"
          correct: false
        - text: "вона розриває зв'язки між різними соціальними класами всередині імперії"
          correct: false
        - text: "вона ускладнює переклад античних текстів та класичної літератури"
          correct: false
    - question: "Згідно з текстом, яку конкретну функцію виконує внутрішня форма слова під час народження нового поняття?"
      explanation: "Модуль пояснює, що внутрішня форма пов'язує нове поняття з уже знайомим досвідом через яскраву метафору."
      options:
        - text: "пов'язує нове, невідоме поняття з уже знайомим досвідом народу"
          correct: true
        - text: "закріплює за словом виключно його пряме, об'єктивне значення"
          correct: false
        - text: "допомагає мовцям правильно вимовляти складні звукосполучення"
          correct: false
        - text: "забезпечує легкий переклад слова на інші європейські мови"
          correct: false