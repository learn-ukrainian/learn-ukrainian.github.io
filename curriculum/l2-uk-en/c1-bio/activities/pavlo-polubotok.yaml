- type: reading
  id: reading-kolomak
  title: 'Джерело: Коломацькі чолобитні'
  source: Козацька старшина (1723)
  text: 'Б''ємо чолом вашій імператорській величності... слізно просимо милосердя
    щодо прав і вольностей наших. Просимо відновити давні права і вольності наші,
    дозволити обрати повноважного гетьмана згідно з договорами. І щоб Малоросійська
    колегія не втручалася у наші військові та цивільні суди, які чинять справедливість
    за нашими законами.

    '
  tasks:
  - Які основні політичні вимоги висували автори документа до імператора?
  - Яким є тон звернення та чому обрано саме таку формуліровку?
- type: critical-analysis
  title: 'Аналіз: Правовий опір'
  source_reading: reading-kolomak
  target_text: Б'ємо чолом вашій імператорській величності... просимо відновити давні
    права і вольності наші...
  questions:
  - Чому текст, який є маніфестом суверенітету, використовує принизливу формулу «б'ємо
    чолом»?
  - Яку функцію виконує апеляція до давніх прав і вольностей у контексті європейської
    договірної традиції?
  model_answers:
  - Формула «б'ємо чолом» була обов'язковою вимогою російського імперського діловодства.
    Її використання було тактичним кроком — спробою діяти виключно в межах легального
    поля, щоб не дати приводу для звинувачень у відкритому збройному бунті.
  - Апеляція до давніх прав демонструє європейську правову культуру української козацької
    старшини, яка мислила категоріями конституціоналізму та суспільного договору,
    відкидаючи абсолютне самодержавство.
- type: essay-response
  title: 'Есе: Ціна гідності'
  source_reading: reading-kolomak
  prompt: Проаналізуйте політичну стратегію Павла Полуботка. Чому він обрав шлях легального
    опору замість збройного повстання (як Іван Мазепа)? Оцініть історичні наслідки
    такого вибору для українського державотворення.
  min_words: 300
  model_answer: Павло Полуботок діяв у надзвичайно складних геополітичних умовах після
    поразки у Північній війні, коли військовий та економічний потенціал Гетьманщини
    був виснажений. Розуміючи неможливість успішного збройного повстання, він обрав
    стратегію легалізму — захисту автономії через апеляцію до закону та міжнародних
    договорів (Березневих статей 1654 року). Цей вибір засвідчив високу політичну
    та правову зрілість української еліти, яка мислила категоріями конституціоналізму.
    Хоча фізично Полуботок програв і помер у казематах, його моральна перемога була
    беззаперечною. Відмова від покаяння перетворила його на національного мученика.
    Його спадщина заклала фундаментальну традицію мирного, правового опору тиранії,
    що стала основою для українського дисидентського руху в майбутньому.
  rubric:
  - criteria: Історичний контекст
    description: Глибоке розуміння умов після Північної війни та виснаження Гетьманщини.
    points: 10
  - criteria: Аналіз стратегії
    description: Порівняння збройного спротиву та легального опору.
    points: 10
  - criteria: Аргументація та висновки
    description: Логічне обґрунтування історичних наслідків діяльності Полуботка.
    points: 10
- type: true-false
  title: 'Історичні факти: правда чи міф'
  items:
  - statement: Павло Полуботок був офіційно затверджений російським імператором на
      посаді повноважного гетьмана.
    correct: false
    explanation: Він був обраний наказним гетьманом козацькою старшиною без офіційного
      дозволу Петра I.
  - statement: На відміну від Івана Мазепи, Павло Полуботок обрав шлях відкритого
      збройного повстання проти Російської імперії.
    correct: false
    explanation: Полуботок був переконаним легалістом і діяв виключно в межах правового
      поля.
  - statement: Малоросійська колегія була інструментом колоніального управління та
      жорсткого фіскального терору в Гетьманщині.
    correct: true
    explanation: Вона незаконно перебрала на себе функції гетьманського уряду та збирала
      непомірні податки.
  - statement: Коломацькі чолобитні містили вимогу негайного скасування Малоросійської
      колегії.
    correct: true
    explanation: Це була одна з головних політичних вимог цього маніфесту державного
      суверенітету.
  - statement: Легенда про золото Полуботка є науково доведеним фактом, який офіційно
      підтвердив Банк Англії.
    correct: false
    explanation: Це був міф, який відіграв роль потужного психологічного компенсатора
      для українців.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Перевірка розуміння тексту
  items:
  - question: Який навчальний заклад закінчив Павло Полуботок, здобувши блискучу європейську
      освіту?
    explanation: Він був випускником найпрестижнішого навчального закладу Східної
      Європи того часу.
    options:
    - text: Києво-Могилянську академію
      correct: true
    - text: Острозьку академію
      correct: false
    - text: Львівську братську школу
      correct: false
    - text: Петербурзький університет
      correct: false
  - question: Яку посаду найдовше обіймав Павло Полуботок перед своїм обранням наказним
      гетьманом?
    explanation: Він керував цим полком протягом шістнадцяти років, перетворивши його
      на найбагатший регіон.
    options:
    - text: Полковник чернігівський
      correct: true
    - text: Генеральний писар
      correct: false
    - text: Полковник полтавський
      correct: false
    - text: Генеральний суддя
      correct: false
  - question: Що передбачала судова реформа, запроваджена Павлом Полуботком восени
      1722 року?
    explanation: Він намагався зробити судову систему прозорою та незалежною від імперських
      чиновників.
    options:
    - text: Заборону світським чиновникам втручатися у судочинство
      correct: true
    - text: Передачу судів під контроль Малоросійської колегії
      correct: false
    - text: Скасування всіх місцевих козацьких судів
      correct: false
    - text: Впровадження російського законодавства в Україні
      correct: false
  - question: У якій в'язниці утримували Павла Полуботка після арешту за наказом Петра
      I?
    explanation: Він перебував у сирих казематах підземної частини цієї сумнозвісної
      фортеці.
    options:
    - text: У Петропавлівській фортеці
      correct: true
    - text: У Шліссельбурзькій фортеці
      correct: false
    - text: У Соловецькому монастирі
      correct: false
    - text: У Таємній канцелярії
      correct: false
  - question: Яким символічним титулом наділив Павла Полуботка Тарас Шевченко у своїй
      поемі «Сон»?
    explanation: Поет протиставив цей духовний титул необмеженій владі земного царя-тирана.
    options:
    - text: Цар волі
      correct: true
    - text: Батько нації
      correct: false
    - text: Великий мученик
      correct: false
    - text: Незламний гетьман
      correct: false
  instruction: Оберіть правильну відповідь.
