- type: reading
  id: reading-mohyla-zapovit
  title: 'Первинне джерело: Заповіт Петра Могили'
  source: Петро Могила (1647)
  text: 'Бачачи, що моє життя наближається до кінця, я вирішив розпорядитися своїм
    майном. Усе, що я маю, віддаю і присвячую єдиній моїй заставі — Києво-Могилянському
    колегіуму, щоб він і надалі слугував поширенню православного вчення та вільних
    наук. Нехай мої наступники бережуть цю інституцію як зіницю ока, бо в ній — майбутнє
    нашої церкви та народу. Латина і грецька мова нехай вивчаються там досконало,
    щоб наші юнаки могли гідно захищати святу віру від будь-яких нападів.

    '
  tasks:
  - Яке головне призначення колегіуму визначає автор?
  - Чому митрополит надає таке велике значення вивченню мов?
- type: critical-analysis
  title: 'Аналіз: Роль освіти як зброї'
  source_reading: reading-mohyla-zapovit
  target_text: 'Латина і грецька мова нехай вивчаються там досконало, щоб наші юнаки
    могли гідно захищати святу віру від будь-яких нападів.

    '
  questions:
  - Як автор трансформує поняття 'захисту віри' у своєму заповіті?
  - Чому саме класичні мови розглядаються як головний інструмент цього захисту?
  model_answers:
  - Автор переводить розуміння захисту з військової чи суто догматичної площини в
    інтелектуальну. Зброєю стає знання, а полем битви — богословські та філософські
    диспути.
  - Класичні мови (особливо латина) були мовою європейської науки та католицької полеміки.
    Без них неможливо було вести рівноцінний діалог чи спростовувати аргументи високоосвічених
    опонентів-єзуїтів.
- type: essay-response
  title: 'Есе: Стратегія Могили та національна ідентичність'
  source_reading: reading-mohyla-zapovit
  prompt: 'Проаналізуйте стратегію Петра Могили щодо модернізації православної освіти.
    Як його рішення запровадити латину (мову опонентів) як базову мову викладання
    вплинуло на збереження та розвиток української ідентичності в умовах Контрреформації?
    Спирайтеся на текст модуля та уривок із заповіту.

    '
  min_words: 250
  model_answer: 'Стратегія Петра Могили була геніальною у своїй парадоксальності:
    він використав інтелектуальну зброю супротивника для захисту власної ідентичності.
    В умовах агресивної католицької експансії православна церква стрімко втрачала
    еліту, яка переходила в унію заради доступу до європейської освіти. Запровадивши
    латину як базову мову в Києво-Могилянському колегіумі, Могила усунув цю монополію.

    Латина дала змогу українським студентам вивчати античну філософію, риторику та
    теологію за найвищими європейськими стандартами, залишаючись при цьому у лоні
    східного християнства. Це перетворило православ''я з маргіналізованої "релігії
    простолюду" на конкурентоспроможну інтелектуальну систему. Випускники колегіуму
    могли на рівних полемізувати з єзуїтами, створювати досконалі богословські трактати
    (як-от "Православне сповідання віри") та формувати потужний дипломатичний корпус.

    Таким чином, "латинізація" освіти стала не зрадою традицій, як стверджували консерватори,
    а ефективним механізмом модернізації. Вона дозволила українській культурі інтегруватися
    в європейський інтелектуальний простір, зберігши при цьому свою унікальну духовну
    сутність — те, що сьогодні ми називаємо феноменом відкритого "Київського християнства".

    '
  rubric:
  - criteria: Аргументація та розуміння контексту
    description: Чітке пояснення того, чому латина була необхідною для виживання православної
      церкви.
    points: 10
  - criteria: Аналіз наслідків
    description: Оцінка довгострокового впливу реформи на формування нової еліти та
      розвиток культури.
    points: 10
- type: quiz
  title: 'Перевірте знання: Реформи та спадщина Могили'
  items:
  - question: Що було головною стратегічною метою життя Петра Могили згідно з текстом?
    explanation: Його метою було тотальне інтелектуальне переозброєння церкви для
      духовного виживання.
    options:
    - text: інтелектуальне переозброєння православної церкви
      correct: true
    - text: здобуття влади у Молдовському князівстві
      correct: false
    - text: об'єднання православної та католицької церков
      correct: false
    - text: фізичне знищення єзуїтських колегіумів
      correct: false
  - question: Яку систему управління митрополит переніс у церковне середовище зі свого
      попереднього досвіду?
    explanation: Він адаптував жорстку військову дисципліну та чітку субординацію.
    options:
    - text: жорстку військову дисципліну та субординацію
      correct: true
    - text: демократичну систему виборності всіх посад
      correct: false
    - text: світську модель парламентського управління
      correct: false
    - text: децентралізовану мережу автономних парафій
      correct: false
  - question: Яка інновація у Києво-Могилянському колегіумі викликала найбільший опір
      консервативної частини суспільства?
    explanation: Консерватори вважали латину мовою єретиків і панічно боялися її впровадження.
    options:
    - text: запровадження латини як базової мови навчання
      correct: true
    - text: вивчення старослов'янської граматики та співів
      correct: false
    - text: залучення до навчання дітей із селянських родин
      correct: false
    - text: повна відмова від вивчення богослов'я
      correct: false
  - question: Як Петро Могила легітимізував незалежний статус Київської митрополії
      через сакральну археологію?
    explanation: Він ініціював розкопки Десятинної церкви та віднайшов мощі князя
      Володимира.
    options:
    - text: ініціював масштабні розкопки руїн давньої Десятинної церкви
      correct: true
    - text: побудував абсолютно новий кафедральний собор у центрі міста
      correct: false
    - text: переніс резиденцію митрополита до стародавнього міста Сучава
      correct: false
    - text: підробив старовинні візантійські літописи та грамоти
      correct: false
  - question: У чому полягала унікальність Требника, виданого Петром Могилою у 1646
      році?
    explanation: Він не просто скопіював грецькі тексти, а включив оригінальні українські
      обряди.
    options:
    - text: він містив низку оригінальних чинів, характерних для місцевої традиції
      correct: true
    - text: це був прямий переклад католицького молитовника без жодних змін
      correct: false
    - text: книга була повністю написана розмовною українською мовою
      correct: false
    - text: це було перше в історії друковане видання Біблії
      correct: false
  - question: Що відбувалося під час регулярних публічних диспутів у стінах колегіуму?
    explanation: Диспути розвивали критичне мислення та мистецтво формальної аргументації.
    options:
    - text: студенти тренували мистецтво аргументації та критичне мислення
      correct: true
    - text: викладачі читали тривалі лекції без права ставити запитання
      correct: false
    - text: відбувалися фізичні покарання за порушення статуту колегіуму
      correct: false
    - text: студенти мовчки переписували праці античних філософів
      correct: false
  - question: Яким чином феномен київського десанту вплинув на розвиток Російської
      імперії?
    explanation: Випускники Могилянки фактично розбудували російську систему освіти
      та церковне управління.
    options:
    - text: українські вчені розбудували там систему освіти за київським зразком
      correct: true
    - text: московські війська захопили бібліотеку Києво-Могилянської академії
      correct: false
    - text: російські студенти масово приїжджали навчатися до Києва
      correct: false
    - text: київські дипломати переконали московського царя прийняти унію
      correct: false
  - question: Що залишив Петро Могила своєму колегіуму згідно з текстом його легендарного
      заповіту?
    explanation: Він передав увесь свій маєток, бібліотеку та угіддя на утримання
      колегіуму.
    options:
    - text: передав усе своє майно, бібліотеку та великі земельні угіддя
      correct: true
    - text: залишив лише моральні настанови без жодної фінансової підтримки
      correct: false
    - text: передав колегіум під повний контроль єзуїтського ордену
      correct: false
    - text: зобов'язав студентів сплачувати великі податки на користь церкви
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Аналіз тексту: Правда чи вигадка'
  items:
  - statement: Згідно з текстом модуля, Петро Могила здобув блискучу освіту виключно
      у східнослов'янських навчальних закладах.
    correct: false
    explanation: У тексті чітко зазначено, що після братської школи він навчався у
      Замойській академії та, ймовірно, у Сорбонні, де опанував західну філософію.
  - statement: Автор тексту стверджує, що головним інституційним здобутком Могили
      стало об'єднання двох конкуруючих шкіл у 1632 році.
    correct: true
    explanation: Текст прямо називає заснування Києво-Могилянського колегіуму через
      злиття Лаврської та Братської шкіл головним творінням його життя.
  - statement: У тексті зазначено, що міщанські братства одразу і беззаперечно підтримали
      запровадження латинської мови у навчальний процес.
    correct: false
    explanation: Навпаки, у тексті підкреслюється, що консервативна частина суспільства
      чинила шалений опір, вважаючи латину прямою загрозою православ'ю.
  - statement: Автор модуля характеризує Православне сповідання віри як першу спробу
      створити катехізис, яка так і не була визнана міжнародною спільнотою.
    correct: false
    explanation: У тексті вказано, що цей катехізис був офіційно затверджений усіма
      чотирма східними патріархами і став догматичним взірцем.
  - statement: Згідно з текстом, сучасна російська історіографія часто вдається до
      апропріації постаті Петра Могили, ігноруючи його європейський вектор.
    correct: true
    explanation: 'Автор прямо вказує на імперське лицемірство: спочатку Росія засуджувала
      його праці, а потім привласнила київську освітню модель як спільну.'
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняльний аналіз: Освітні моделі'
  instruction: Порівняйте освітню модель Києво-Могилянського колегіуму з системою
    єзуїтських колегіумів.
  items_to_compare:
  - Києво-Могилянський колегіум
  - Єзуїтські колегіуми
  criteria:
  - Мова викладання
  - Ставлення до античної філософії
  - Кінцева мета освіти
  model_answer: Обидві системи використовували латину та античну філософію як базис.
    Проте колегіум Могили застосовував ці інструменти для захисту православної ідентичності,
    тоді як єзуїти - для католицької експансії та контрреформації.
