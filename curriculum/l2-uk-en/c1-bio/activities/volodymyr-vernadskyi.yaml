- type: reading
  id: reading-vernadsky
  title: 'Первинне джерело: Біосфера (1926)'
  source: Володимир Вернадський
  text: 'У біосфері існує велика геологічна, можливо, космічна сила, планетна дія
    якої зазвичай не береться до уваги в уявленнях про космос. Ця сила є розум людини,
    спрямована й організована воля її як істоти суспільної. З появою на нашій планеті
    обдарованої розумом живої істоти планета переходить у нову стадію своєї історії.
    Біосфера переходить у ноосферу.

    '
- type: critical-analysis
  id: analysis-01
  source_reading: reading-vernadsky
  title: 'Критичний аналіз: Концепція ноосфери'
  target_text: Біосфера переходить у ноосферу.
  items:
  - prompt: У тексті автор характеризує розум як нову силу. Який аргумент автор наводить
      для обґрунтування цього?
    model_answer: Автор стверджує, що розум і воля суспільної людини здатні впливати
      на планету в масштабах, співмірних з космічними або геологічними процесами.
  - prompt: Згідно з текстом, який зв'язок між еволюцією людини та історією самої
      планети?
    model_answer: Еволюція людини безпосередньо зумовлює перехід планети у нову стадію
      — ноосферу, що робить історію людства невід'ємною частиною історії Землі.
- type: essay-response
  id: essay-01
  source_reading: reading-vernadsky
  title: 'Есе: Наука і відповідальність'
  instruction: Напишіть есе-відповідь на основі тексту та матеріалів модуля.
  prompt: У тексті модуля автор характеризує перехід до ноосфери як процес, що вимагає
    свідомої організації суспільства. Проаналізуйте, як погляди Вернадського на відповідальність
    науковця (зокрема, в контексті атомної епохи та тоталітаризму) відображають цей
    перехід. Використовуйте термінологію модуля.
  model_answer: Володимир Вернадський розглядав ноосферу не лише як технологічне домінування,
    а насамперед як епоху глобальної етичної відповідальності. Його передбачення щодо
    використання атомної енергії підкреслювало, що розум може бути як творчою, так
    і руйнівною силою. Протистояння вченого тоталітарній системі свідчить, що справжня
    ноосфера неможлива без свободи думки та моральних орієнтирів. Отже, перехід до
    сфери розуму вимагає від суспільства подолання деструктивних тенденцій і встановлення
    гармонійного співіснування з природою.
  min_words: 300
  rubric:
  - criteria: Аргументація та аналіз
    description: Глибокий аналіз концепції ноосфери та етичних поглядів Вернадського
    points: 10
  - criteria: Використання термінології
    description: 'Доречне використання термінів: ноосфера, жива речовина, еволюція'
    points: 5
- type: true-false
  title: 'Правда чи хиба: Життєвий шлях Вернадського'
  instruction: Визначте, чи є твердження правильними.
  items:
  - statement: Згідно з текстом модуля, Вернадський вважав, що наука може існувати
      ізольовано від етичних принципів.
    correct: false
    explanation: Вчений доводив, що наука не може існувати ізольовано від етичних
      принципів та загальнолюдських цінностей.
  - statement: У тексті стверджується, що Українська академія наук була створена більшовиками
      у 1918 році.
    correct: false
    explanation: Українська академія наук була заснована у 1918 році за часів Гетьманату
      Павла Скоропадського.
  - statement: Згідно з концепцією вченого, жива речовина виступає найактивнішим перетворювачем
      космічної енергії на Землі.
    correct: true
    explanation: Він довів, що жива речовина є перетворювачем енергії Сонця в хімічну
      роботу на поверхні планети.
  - statement: У тексті автор зазначає, що Вернадський ніколи не визнавав свого українського
      коріння через страх перед репресіями.
    correct: false
    explanation: 'У своєму щоденнику він відверто писав: Я — українець, зберігаючи
      цю ідентичність.'
  - statement: Згідно з текстом, ноосфера є вищим етапом розвитку біосфери, де визначальним
      фактором стає людський розум.
    correct: true
    explanation: Ноосфера — це сфера розуму, стан, за якого наукова думка людства
      стає визначальним фактором розвитку планети.
  - statement: У тексті підкреслюється, що радянська влада ніколи не намагалася привласнити
      концепцію ноосфери.
    correct: false
    explanation: Радянська наука намагалася монополізувати концепцію ноосфери, представляючи
      її виключно як своє досягнення.
- type: quiz
  title: 'Перевірте знання: Спадщина Вернадського'
  items:
  - question: Згідно з текстом модуля, який підхід до управління Українською академією
      наук відстоював Володимир Вернадський?
    explanation: Він наполягав на тому, що Академія має бути абсолютно незалежною
      і самостійною установою.
    options:
    - text: Він вважав, що Академія має бути незалежною та самостійною установою.
      correct: true
    - text: Він погоджувався на підпорядкування Академії партійній ідеології.
      correct: false
    - text: Він пропонував зробити Академію філією російської наукової установи.
      correct: false
    - text: Він вважав, що Академія повинна займатися виключно політичними питаннями.
      correct: false
  - question: У тексті модуля автор характеризує життя на Землі як потужну геологічну
      силу. Чому саме?
    explanation: Життя здатне докорінно змінювати хімічний склад земної кори та атмосферу.
    options:
    - text: Тому що живі організми виконують титанічну хімічну роботу, змінюючи мінеральний
        склад кори.
      correct: true
    - text: Тому що тварини можуть фізично переміщувати великі камені та скелі.
      correct: false
    - text: Тому що вулканічна активність напряму залежить від кількості лісів.
      correct: false
    - text: Тому що рослини здатні зупиняти рух тектонічних плит на планеті.
      correct: false
  - question: Згідно з текстом, що змусило вченого повернутися до Радянського Союзу
      з еміграції у 1926 році?
    explanation: Вчений потребував великих лабораторій для перевірки своїх гіпотез,
      що пообіцяв йому уряд.
    options:
    - text: Він прагнув отримати доступ до масштабних лабораторій та фінансування
        для досліджень.
      correct: true
    - text: Він глибоко поділяв і підтримував марксистсько-ленінську політичну ідеологію.
      correct: false
    - text: Він не зміг знайти жодної роботи в провідних університетах Європи.
      correct: false
    - text: Він прагнув зробити політичну кар'єру в новому радянському уряді.
      correct: false
  - question: Який аргумент автор наводить для пояснення переходу від біосфери до
      ноосфери?
    explanation: Перехід до ноосфери зумовлений появою людського розуму як нової геологічної
      сили.
    options:
    - text: Наукова думка людства та розвиток техніки стають визначальним фактором
        розвитку планети.
      correct: true
    - text: Зменшення кількості живих організмів призводить до неминучого зникнення
        біосфери.
      correct: false
    - text: Космічні промені поступово знищують атмосферу, змушуючи людство шукати
        новий дім.
      correct: false
    - text: Зміна клімату автоматично викликає появу нових форм життя у Світовому
        океані.
      correct: false
  - question: Згідно з текстом, яку мету переслідує сучасна деколонізація образу Володимира
      Вернадського?
    explanation: Деколонізація спрямована на подолання імперських міфів та підкреслення
      українського коріння вченого.
    options:
    - text: Відновлення історичної справедливості та подолання російських імперських
        міфів щодо його спадщини.
      correct: true
    - text: Повна заборона на вивчення його праць, написаних під час перебування в
        Росії.
      correct: false
    - text: Визнання його виключно як видатного представника західноєвропейської філософської
        школи.
      correct: false
    - text: Перейменування всіх наукових інституцій, які були створені ним за радянських
        часів.
      correct: false
  - question: Як саме етичні принципи впливали на діяльність вченого в умовах сталінського
      терору?
    explanation: Він використовував свій авторитет для захисту колег від репресій
      і відмовлявся засуджувати невинних.
    options:
    - text: Він писав листи вищому керівництву, відкрито вимагаючи звільнення заарештованих
        учених.
      correct: true
    - text: Він публічно підтримував політичні репресії, щоб зберегти фінансування
        своїх інститутів.
      correct: false
    - text: Він припинив будь-які наукові дослідження на знак протесту проти дій влади.
      correct: false
    - text: Він таємно співпрацював зі спецслужбами для усунення своїх наукових опонентів.
      correct: false
  instruction: Оберіть правильну відповідь.
