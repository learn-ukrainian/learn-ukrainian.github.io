- type: reading
  id: reading-credo
  title: "Первинне джерело: Літературне кредо Косинки"
  source: "Текст модуля"
  text: |
    У Радянському Союзі тридцятих років Йосип Сталін проголосив письменників "інженерами людських душ". Ця метафора ідеально відображала суть тоталітарного підходу до мистецтва: людина розглядалася як механізм, який потрібно перепрограмувати, а література мала слугувати інструментом для такого перепрограмування в інтересах комуністичної партії. Григорій Косинка категорично не приймав такої ролі. Його знаменита фраза "Ми стаємо не інженерами, а міліціонерами людських душ" є ключем до розуміння його творчого креда та громадянської позиції. Ця іронічна і водночас глибоко трагічна репліка викривала справжню суть офіційної культурної політики: письменників змушували виконувати поліцейські функції — наглядати за думками, карати за відхилення від ідеологічної норми.
  tasks:
    - "Уважно прочитайте текст і зверніть увагу на метафоричне протиставлення інженерів та міліціонерів."

- type: critical-analysis
  source_reading: reading-credo
  title: "Критичний аналіз: Метафори тоталітарного мистецтва"
  instruction: "Дайте розгорнуті відповіді на запитання на основі прочитаного тексту."
  target_text: '"Ми стаємо не інженерами, а міліціонерами людських душ"'
  items:
    - prompt: 'Який ідеологічний підтекст ховався за сталінською метафорою "інженери людських душ" згідно з текстом?'
      model_answer: "Згідно з текстом, сталінська метафора розглядала людину як механізм для перепрограмування, а літературу — як інструмент формування нової радянської людини в інтересах партії."
    - prompt: 'Яку саме функцію радянських письменників викриває репліка Косинки про "міліціонерів душ"?'
      model_answer: "Репліка Косинки викриває те, що письменників насправді змушували виконувати каральні та поліцейські функції: наглядати за думками читачів та карати за будь-які відхилення."
  focus_points:
    - "метафорика"
    - "ідеологічний дискурс"

- type: essay-response
  source_reading: reading-credo
  title: "Есей: Письменник і тоталітарна система"
  instruction: "Напишіть есей на запропоновану тему."
  items:
    - prompt: "Спираючись на текст модуля, проаналізуйте, чому творчість Косинки та його зображення українського села стали неприйнятними для радянської пропаганди. Яку роль відіграла його безкомпромісність у його трагічній долі?"
      model_answer: "У тексті автор зазначає, що Косинка зруйнував народницьку ідилію і показав село як арену кривавих сутичок. Він не ідеалізував ані бідняків, ані владу, а чесно зображував відчай селян і повстанців. Для радянської системи, яка вимагала від митців бути інженерами душ і конструювати штучний оптимізм, така література була небезпечною. Його відмова йти на компроміси та участь у незалежних угрупованнях зробили його мішенню для репресій, що призвело до його арешту і розстрілу."
  min_words: 300
  rubric:
    - criteria: "Аргументація та опора на текст"
      description: "Есей містить чіткі посилання на позицію Косинки щодо села та його конфлікт з офіційною ідеологією."
      points: 10
    - criteria: "Стилістика та лексика"
      description: "Використано академічну лексику та термінологію (імпресіонізм, тоталітаризм, ідеологічний диктат)."
      points: 10

- type: quiz
  title: "Перевірте знання: Творчість Григорія Косинки"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Згідно з текстом модуля, як саме Косинка адаптував імпресіонізм у своїй прозі?"
      explanation: "Косинка відмовлявся від лінійної розповіді на користь кінематографічного монтажу."
      options:
        - text: "Він використовував кінематографічний монтаж і спалахи образів замість лінійної розповіді."
          correct: true
        - text: "Він зосередився виключно на описі природи та ідеалізації сільського життя."
          correct: false
        - text: "Він писав розлогі епічні романи з великою кількістю персонажів."
          correct: false
        - text: "Він копіював стиль російської пролетарської літератури для масового читача."
          correct: false
    - question: 'У тексті зазначено, що зображення села у Косинки є "анти-ідилією". Що це означає в контексті його новел?'
      explanation: "Анти-ідилія у Косинки означає зображення села як арени кривавих сутичок і моральних розломів."
      options:
        - text: "Село постає як арена жорстокої боротьби, глибоких моральних дилем і соціальних розломів."
          correct: true
        - text: "Село зображується як осередок патріархальної чистоти і гармонії з природою."
          correct: false
        - text: "Село показано виключно з гумористичної та сатиричної точки зору."
          correct: false
        - text: "Село змальовано як ідеальний приклад успішної колективізації."
          correct: false
    - question: "Яку позицію відстоювала літературна організація МАРС, до якої належав Косинка?"
      explanation: "МАРС (Майстерня революційного слова) визнавав за письменником право на творчу індивідуальність і відкидав партійний диктат."
      options:
        - text: "Право на творчу індивідуальність та відмову від партійного диктату в літературі."
          correct: true
        - text: "Необхідність повного підпорядкування мистецтва комуністичній ідеології."
          correct: false
        - text: "Орієнтацію виключно на російське масове пролетарське мистецтво."
          correct: false
        - text: "Повернення до традицій сентиментального етнографічного народництва."
          correct: false
    - question: 'Яким чином у тексті пояснюється ярлик "куркульського письменника", приклеєний Косинці?'
      explanation: "Влада таврувала його так через те, що він показував трагедію всього села і не приховував селянського опору системі."
      options:
        - text: "Через його відмову ідеалізувати більшовиків і чесне зображення трагедії та опору селян."
          correct: true
        - text: "Тому що він сам походив із дуже заможної родини і писав лише про своїх родичів."
          correct: false
        - text: "Бо він відкрито закликав заможних селян до збройного повстання у своїх статтях."
          correct: false
        - text: "Через те, що він завжди писав свої новели виключно від імені багатих землевласників."
          correct: false
    - question: "Який вплив мала стаття Олексія Полторацького на долю Григорія Косинки згідно з текстом?"
      explanation: "Стаття мала донощицький характер і стала чітким сигналом для репресивних органів."
      options:
        - text: "Вона стала доносом і сигналом для репресивних органів, підготувавши ґрунт для арешту."
          correct: true
        - text: "Вона захистила письменника від нападок і допомогла йому видати нову збірку новел."
          correct: false
        - text: "Вона стала початком його реабілітації у п'ятдесяті роки після смерті Сталіна."
          correct: false
        - text: "Вона ініціювала об'єктивну наукову дискусію про його імпресіоністичний стиль."
          correct: false

- type: true-false
  title: "Правда чи хиба: Аналіз життєвого шляху"
  instruction: "Визначте, чи відповідають наведені твердження змісту тексту."
  items:
    - statement: "У своїх ранніх новелах Косинка романтизував селянське життя, спираючись на ілюзії, сформовані під час проживання в Києві."
      correct: false
      explanation: "Згідно з текстом, важке дитинство назавжди позбавило Косинку романтичних ілюзій щодо сільського життя."
    - statement: 'Косинка підтримував ідею орієнтації на європейські зразки та психологізм, відкидаючи літературне епігонство.'
      correct: true
      explanation: 'У тексті зазначається, що він підтримував ідею "психологічної Європи" і відкидав провінціалізм.'
    - statement: "Справа проти Косинки була заснована на реальних доказах його участі в підготовці збройних замахів на радянських керівників."
      correct: false
      explanation: "Текст чітко вказує, що справа про терористичну організацію була повністю сфабрикована репресивними органами."
    - statement: "Персонажі-повстанці в новелах письменника змальовані не як карикатурні бандити, а як люди, доведені до відчаю беззаконням і терором."
      correct: true
      explanation: "Автор тексту підкреслює, що Косинка показував їхню психологію та трагедію людини, яка береться за зброю."
    - statement: "Після арешту Косинка публічно покаявся і написав кілька листів, у яких благав владу зберегти йому життя в обмін на співпрацю."
      correct: false
      explanation: "Згідно з останніми листами до дружини, він тримався з гідністю і не просив про помилування у катів."

- type: comparative-study
  title: "Порівняльний аналіз: Косинка та народницька традиція"
  instruction: "Проаналізуйте два різних підходи до зображення українського села."
  items_to_compare:
    - "Імпресіоністичний метод Григорія Косинки"
    - "Традиційний народницький підхід"
  criteria:
    - "Характер зображення села"
    - "Стилістичні та оповідні засоби"
  prompt: "На основі тексту модуля порівняйте художній метод Григорія Косинки з традиційною народницькою літературою. Як змінилося зображення села та які нові стилістичні засоби він застосував?"
  model_answer: "На відміну від народницької традиції, яка була схильна ідеалізувати село як осередок патріархальної чистоти та гармонії з природою, Косинка створив 'анти-ідилію'. Він зображував село як арену кривавих сутичок, жорстокої боротьби за виживання та глибоких моральних розломів, не ідеалізуючи жодну зі сторін. Стилістично він відмовився від лінійної оповіді та всезнаючого автора-оповідача, властивих народникам. Натомість він використовував імпресіоністичний кінематографічний монтаж, спалахи образів та занурення безпосередньо у свідомість героїв, передаючи їхні екстремальні психологічні стани."