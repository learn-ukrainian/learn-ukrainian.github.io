- type: reading
  id: reading-suvorin
  title: Відгук консервативного критика
  source: Олексій Суворін (1887)
  text: 'Вона має в собі щось таке, що змушує вірити кожному її слову. Коли вона страждає,
    страждає все навколо. Це не просто гра, це містичне перевтілення, яке руйнує будь-які
    упередження щодо малоросійського театру. Вона — справжня королева сцени, чий талант
    не знає національних кордонів.

    '
  tasks:
  - Проаналізуйте зміну ставлення російської критики до українського театру.
- type: critical-analysis
  title: Аналіз театральної критики
  source_reading: reading-suvorin
  instruction: Проаналізуйте наведений відгук критика.
  target_text: Це не просто гра, це містичне перевтілення, яке руйнує будь-які упередження
    щодо малоросійського театру.
  items:
  - prompt: Які саме упередження руйнувала Марія Заньковецька своєю грою?
    model_answer: Заньковецька руйнувала колоніальний стереотип про український театр
      як примітивну етнографічну розвагу, доводячи його здатність до глибокого психологізму
      та передачі найтонших драматичних емоцій.
  - prompt: Чому визнання Суворіна мало особливе значення?
    model_answer: Олексій Суворін був відомий своїми консервативними та часто шовіністичними
      поглядами. Його беззаперечне визнання таланту Заньковецької свідчить про те,
      що її геніальність могла пробити навіть найжорсткіші ідеологічні бар'єри імперії.
  focus_points:
  - Колоніальні стереотипи
  - Психологічний реалізм
- type: reading
  id: reading-24-millions
  title: Історичний вибір актриси
  source: Відповідь Марії Заньковецької на пропозицію Дирекції імператорських театрів
  text: 'Я не проміняю на 24 тисячі рублів 24 мільйони. Мій талант належить моєму
    народові, бо лише з його сліз і сміху він виріс. Моє місце тут, серед тих, хто
    потребує мого мистецтва як ковтка свіжого повітря у задушливій атмосфері заборон.

    '
  tasks:
  - Поміркуйте над громадянською позицією мисткині.
- type: essay-response
  title: Мистецтво як маніфест
  source_reading: reading-24-millions
  instruction: Напишіть коротке есе.
  prompt: Проаналізуйте відмову Марії Заньковецької перейти до імператорського театру.
    Чому цей крок вийшов за межі мистецького вибору та став політичним маніфестом?
    Обґрунтуйте свою думку.
  min_words: 300
  model_answer: Відмова Марії Заньковецької перейти на російську сцену за величезний
    гонорар мала глибокий політичний резонанс. В умовах дії Емського указу та жорсткої
    русифікації цей вчинок продемонстрував, що українська культура є самодостатньою
    та не продається імперії. Актриса свідомо обрала життя під поліцейським наглядом
    замість комфорту, щоб її талант слугував національному пробудженню 24 мільйонів
    українців. Її рішення стало потужним моральним орієнтиром для патріотичної інтелігенції,
    перетворивши театральну сцену на майданчик боротьби за збереження національної
    ідентичності та людської гідності.
  rubric:
  - criteria: Аргументація
    description: Наявність чітких аргументів щодо політичного значення відмови.
    points: 40
  - criteria: Історичний контекст
    description: Розуміння умов Емського указу та колоніального тиску.
    points: 30
  - criteria: Стилістика
    description: Використання відповідної аналітичної лексики.
    points: 30
