    options:
    - text: Участь у зйомках німого кіно
      correct: true
    - text: Режисура власної театральної вистави
      correct: false
    - text: Запис аудіоальбому українських пісень
      correct: false
    - text: Видання книги теоретичних роздумів
      correct: false
  - question: Яке офіційне звання актриса отримала першою в історії республіки у 1923
