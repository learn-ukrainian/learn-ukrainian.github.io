    explanation: Актриса рішуче відмовилася від переходу на російську сцену, щоб залишитися
      з українським народом.
    options:
    - text: Відмовилася залишити українську трупу
      correct: true
    - text: Погодилася на астрономічний гонорар
      correct: false
    - text: Попросила час на роздуми
      correct: false
    - text: Висунула зустрічні умови
      correct: false
  - question: Що було характерною рисою акторської техніки Марії Заньковецької на
