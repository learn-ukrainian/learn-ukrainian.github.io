  - question: З якою видатною італійською актрисою часто порівнювали Марію Заньковецьку?
    explanation: Заньковецьку часто порівнювали з легендарною італійкою Елеонорою
      Дузе.
    options:
    - text: З італійською легендою Елеонорою Дузе
