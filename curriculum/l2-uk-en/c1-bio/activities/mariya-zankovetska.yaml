- type: comparative-study
  title: Порівняння акторських шкіл
  items_to_compare:
  - Імперський російський театр
  - Український театр корифеїв
  criteria:
  - Репертуар
  - Акторська техніка
  - Соціальна та політична місія
  prompt: Порівняйте імперську театральну традицію та новаторський підхід українського театру, який представляла Марія Заньковецька.
  model_answer: Імперський театр здебільшого орієнтувався на розважальний водевіль, зовнішні ефекти та штучну декламацію. Натомість український театр корифеїв, у якому грала Заньковецька, базувався на глибокому психологічному реалізмі, грі пауз та емоційному зануренні. Український театр також виконував важливу соціальну місію, піднімаючи проблеми народу та формуючи національну свідомість, тоді як імперський театр прагнув утримувати статус-кво.
