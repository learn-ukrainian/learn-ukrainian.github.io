- type: reading
  id: reading-protestation
  title: 'Первинне джерело: Протестація'
  source: Йов Борецький (1621)
  text: 'Козаки — це плем''я того чесного руського народу... яке за руського монарха
    Олега плавало на своїх човнах по морю... і штурмувало Константинополь. Це ті ж
    самі, що за Володимира Великого... охрещувались. Не бунтівники ми і не заколотники,
    а люди, на мучеництво призначені.

    '
  tasks:
  - Як автор пояснює походження козацтва та його історичну тяглість?
  - Чому стратегічно важливо було порівняти сучасних козаків із лицарями-дружинниками
    Олега та Володимира Великого?
  - Проти яких конкретних політичних звинувачень офіційної влади виступає автор у
    цьому уривку?
- type: critical-analysis
  title: 'Аналіз: Легітимізація козацтва'
  source_reading: reading-protestation
  target_text: Не бунтівники ми і не заколотники, а люди, на мучеництво призначені.
  questions:
  - Як ця ємна фраза докорінно змінює соціальний та політичний статус козаків у публічному
    дискурсі?
  - Що означає концепція мучеництва в контексті жорсткого правового колапсу після
    Берестейської унії?
  model_answers:
  - Для офіційної влади Речі Посполитої козаки були звичайними збройними бунтівниками.
    Борецький майстерно змінює цей наратив, перетворюючи їх на ідейних лицарів-захисників
    віри. Це надало козацтву статус легітимного політичного суб'єкта, рівного польській
    шляхті.
  - Концепція мучеництва відсилає до гонінь на православну більшість після 1596 року.
    Козаки в цьому контексті постають не як агресори, а як жертовні захисники гнаної
    громади, які готові віддати життя за святу справу та історичну справедливість.
  focus_points:
  - Риторична антитеза
  - Політична легітимізація
  - Концепція мучеництва
- type: essay-response
  title: 'Есе: Союз меча і хреста'
  source_reading: reading-protestation
  prompt: Проаналізуйте стратегічне значення альянсу між інтелектуальною елітою (духовенством)
    та військовою силою (запорозьким козацтвом) у 1620 році. Чому успішне відновлення
    ієрархії було б абсолютно неможливим без ультиматуму гетьмана Петра Сагайдачного?
  min_words: 300
  model_answer: 'Епохальне відновлення православної ієрархії у 1620 році стало класичним
    прикладом успішної синергії між високим інтелектуальним лідерством та беззаперечною
    військовою міццю. Після Берестейської унії 1596 року величезна православна спільнота
    була позбавлена будь-якого правового та фізичного захисту, опинившись на межі
    канонічного зникнення. Йов Борецький виступив геніальним інтелектуальним архітектором
    порятунку, розробивши бездоганний план. Однак цей план вимагав безпосередньої
    участі Єрусалимського патріарха Феофана III, який ризикував власною свободою та
    життям, перебуваючи на ворожій території Речі Посполитої.


    У цій критичній ситуації гетьман Петро Сагайдачний забезпечив єдиний дієвий аргумент,
    з яким мусила рахуватися пихата Варшава — реальну збройну силу. Масовий вступ
    усього Війська Запорозького до Київського братства та надання багатотисячної елітної
    охорони патріарху унеможливили будь-який силовий розгін нічних церемоній. Королівська
    влада опинилася перед загрозою повномасштабної громадянської війни. Цей глибоко
    продуманий союз довів, що в умовах бездержавності та правового беззаконня духовна
    стійкість нації потребує надійного фізичного захисту, а козацтво, завдяки революційним
    ідеям Борецького, отримало могутню ідеологію — статус лицарів-оборонців батьківської
    віри.'
  rubric:
  - criteria: Історичний контекст
    description: Глибоке розуміння причин канонічної кризи після 1596 року та визначальної
      ролі патріарха.
    points: 3
  - criteria: Аналіз взаємодії
    description: Чітке пояснення функціональних ролей Йова Борецького (інтелект) та
      Петра Сагайдачного (військова сила).
    points: 4
  - criteria: Історичні наслідки
    description: Комплексна оцінка впливу цього союзу на подальшу політичну долю українського
      народу.
    points: 3
- type: true-false
  title: 'Перевірка фактів: Біографія та контекст'
  items:
  - statement: Майбутній митрополит Йов Борецький народився в бідній селянській родині
      на Наддніпрянщині.
    correct: false
    explanation: Насправді він народився в родині дрібної православної шляхти в селі
      Бірча на Галичині.
  - statement: Борецький мав блискучу західноєвропейську освіту та вільно володів
      латиною і давньогрецькою мовами.
    correct: true
    explanation: Його надзвичайна ерудиція руйнує імперський міф про неосвічене духовенство;
      він читав античних філософів в оригіналі.
  - statement: Після підписання Берестейської унії традиційна православна церква без
      проблем зберегла свій легальний статус.
    correct: false
    explanation: Наслідком унії стала втрата легітимності; православні віряни опинилися
      поза законом і зазнавали жорсткої дискримінації.
  - statement: Міщанські братства активно відкривали прогресивні школи та друкарні
      для поширення освіти.
    correct: true
    explanation: Братства геніально використовували школи та друкарні як інструменти
      м'якої сили у культурній боротьбі.
  - statement: Єрусалимський патріарх відкрито і за офіційної підтримки польського
      короля висвятив нових українських єпископів.
    correct: false
    explanation: Висвячення відбувалося в атмосфері найсуворішої конспірації глибокої
      ночі через реальну загрозу арешту.
  - statement: У своєму творі Протестація Борецький гордо назвав запорозьких козаків
      нащадками давньоруських лицарів.
    correct: true
    explanation: Ця революційна ідеологічна концепція офіційно легітимізувала козацтво
      як новий елітний лицарський стан.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: 'Перевірка розуміння: Життєвий шлях'
  items:
  - question: Яку впливову та відповідальну посаду обіймав Йов Борецький після прийняття
      чернечого постригу в Києві?
    explanation: Він став шанованим ігуменом стародавнього Михайлівського Золотоверхого
      монастиря.
    options:
    - text: ігумен Михайлівського Золотоверхого монастиря
      correct: true
    - text: настоятель знаменитої Києво-Печерської лаври
      correct: false
    - text: перший ректор католицької Краківської академії
      correct: false
    - text: офіційний православний єпископ Перемишльський
      correct: false
  - question: Чому таємне відновлення вищої церковної ієрархії у 1620 році було життєво
      необхідним для нації?
    explanation: Без законних єпископів було абсолютно неможливо здійснювати висвячення
      нових священників.
    options:
    - text: щоб зберегти ексклюзивне право висвячувати нових священників
      correct: true
    - text: щоб отримати велике фінансування від польського короля
      correct: false
    - text: щоб добровільно приєднатися до панівної католицької церкви
      correct: false
    - text: щоб розпочати масове збройне повстання проти шляхти
      correct: false
  - question: Хто з найвищих духовних осіб християнського Сходу здійснив історичне
      висвячення Йова Борецького?
    explanation: Цей сміливий крок здійснив Єрусалимський патріарх Феофан III під
      захистом козаків.
    options:
    - text: Єрусалимський патріарх Феофан Третій
      correct: true
    - text: видатний гетьман Петро Конашевич-Сагайдачний
      correct: false
    - text: Константинопольський патріарх Кирило Лукаріс
      correct: false
    - text: король Речі Посполитої Сигізмунд Третій
      correct: false
  - question: Що було головною, найбільш ефективною зброєю так званої м'якої сили
      українських міщанських братств?
    explanation: Свідомі братства використовували прогресивні школи та друкарні для
      поширення освіти.
    options:
    - text: відкриття передових шкіл та фінансування друкарень
      correct: true
    - text: створення власних потужних озброєних загонів найманців
      correct: false
    - text: масовий підкуп польських урядовців у варшавському сеймі
      correct: false
    - text: організована еміграція до сусідніх православних країн
      correct: false
  - question: Як офіційна польська урядова пропаганда зневажливо називала українців,
      які категорично не прийняли унію?
    explanation: Їх систематично таврували термінами схизматики або дизуніти.
    options:
    - text: їх називали небезпечними схизматиками та дизунітами
      correct: true
    - text: їх називали абсолютно лояльними громадянами держави
      correct: false
    - text: їх називали підступними турецькими дипломатами
      correct: false
    - text: їх називали єдиними законними спадкоємцями Русі
      correct: false
  instruction: Оберіть правильну відповідь.
