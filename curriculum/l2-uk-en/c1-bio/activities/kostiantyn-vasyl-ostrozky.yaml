- type: reading
  id: reading-ostroh-strategy
  title: 'Концепція духовної зброї: Зміна парадигми'
  source: Історичний контекст
  text: 'Найбільшою заслугою князя Острозького стало його унікальне стратегічне мислення.
    У той час як більшість аристократів покладалася виключно на військову силу та
    політичні інтриги, він зрозумів, що майбутнє нації вирішується у сфері ідей. Він
    усвідомив нагальну потребу створити власну "духовну зброю", яка б допомогла його
    народу зберегти самобутність. Відповіддю на ці виклики стала системна освіта,
    яка мала готувати нову еліту, здатну дискутувати на рівних із західними інтелектуалами.

    '
  tasks:
  - Згідно з текстом, яку зміну у стратегії захисту нації здійснив Костянтин-Василь
    Острозький?
  - Як автор тексту характеризує головну мету запровадження системної освіти?
- type: essay-response
  title: 'Есе: Освіта як зброя ідентичності'
  source_reading: reading-ostroh-strategy
  prompt: Проаналізуйте концепцію 'духовної зброї', запроваджену Костянтином-Василем
    Острозьким. Напишіть есе про те, як системна освіта та книгодрукування стали інструментами
    збереження культурної ідентичності в умовах ідеологічного тиску, порівнюючи цей
    підхід із традиційними мілітарними методами.
  min_words: 250
  model_answer: 'Костянтин-Василь Острозький здійснив революційний крок, перенісши
    боротьбу за збереження руської ідентичності з поля бою у сферу ідей. Заснування
    Острозької академії та друкарні дозволило створити інтелектуальну еліту, здатну
    протистояти асиміляційному тиску Контрреформації. На відміну від збройного опору,
    який дає тимчасові перемоги, інвестиції в освіту забезпечили довготривале збереження
    культурних сенсів та формування суб''єктної нації.

    '
  rubric:
  - criteria: Аналіз концепції духовної зброї
    description: Есе глибоко розкриває значення освіти та книгодрукування як методів
      захисту ідентичності.
    points: 40
  - criteria: Порівняльний аспект
    description: Успішно протиставлено культурно-освітній підхід мілітарній стратегії
      попередніх поколінь.
    points: 30
  - criteria: Мовне оформлення
    description: Використано академічний стиль, відповідну історичну термінологію
      та складні синтаксичні конструкції.
    points: 30
- type: critical-analysis
  title: 'Аналіз: Модернізація традиції'
  source_reading: reading-ostroh-strategy
  target_text: Він усвідомив нагальну потребу створити власну "духовну зброю", яка
    б допомогла його народу зберегти самобутність.
  questions:
  - У тексті модуля автор використовує метафору 'духовна зброя'. Який конкретний історичний
    інструментарій приховується за цим терміном?
  - Згідно з текстом, чому виникла необхідність шукати нові форми захисту самобутності
    саме в другій половині шістнадцятого століття?
  model_answers:
  - Під терміном 'духовна зброя' автор має на увазі заснування шкіл вищого рівня (Острозька
    академія) та розвиток книгодрукування (видання Острозької Біблії), які мали на
    меті інтелектуальне зміцнення нації.
  - Необхідність виникла через агресивний культурний та освітній наступ католицької
    Контрреформації (єзуїтські колегіуми) та кризу традиційної православної церкви,
    що вимагало конкурентоздатних інтелектуальних відповідей.
  focus_points:
  - Інтерпретація історичних метафор
  - Аналіз причинно-наслідкових зв'язків епохи
- type: comparative-study
  title: 'Порівняння: Конкуренція освітніх моделей'
  source_reading: reading-ostroh-strategy
  items_to_compare:
  - Модель Єзуїтів (Контрреформація)
  - Відповідь Острозького (Острозька академія)
  criteria:
  - Освітня концепція та мови викладання
  - Ставлення до класичної спадщини
  - Стратегічна мета закладу
  prompt: Спираючись на текст модуля, порівняйте єзуїтську освітню модель та підхід,
    реалізований в Острозькій академії. Як князь Острозький адаптував західні інновації
    для потреб своєї культури?
  model_answer: 'Єзуїтські колегіуми зосереджувалися на латині та риториці для просування
    католицизму, тоді як Острозька академія запровадила "тримовний ліцей" (латина,
    грецька, слов''янська), поєднуючи західну раціональність зі східною духовністю.
    Обидві моделі мали на меті виховання нової еліти, але князь Острозький використав
    організаційні здобутки конкурентів саме для захисту власної, православної ідентичності,
    створюючи синтез замість сліпого запозичення.

    '
- type: quiz
  title: Аналітичний тест за текстом модуля
  items:
  - question: Згідно з текстом модуля, як автор характеризує головну мету запровадження
      'тримовного ліцею' в Острозі?
    explanation: Автор підкреслює, що синтез трьох мов дозволяв випускникам бути вкоріненими
      у власну культуру і водночас вільно комунікувати із західним світом.
    options:
    - text: для вільного спілкування із західним світом та збереження традиції
      correct: true
    - text: виключно для підготовки професійних перекладачів при королівському дворі
      correct: false
    - text: щоб повністю замінити церковнослов'янську мову на розмовну українську
      correct: false
    - text: для полегшення переходу православної шляхти до протестантизму
      correct: false
  - question: У тексті автор пояснює перехід еліти до католицизму; який аргумент він
      наводить як головну причину?
    explanation: Автор стверджує, що єзуїти створювали найкращі колегіуми, і навчання
      там гарантувало успішну кар'єру, що непомітно вело до асиміляції.
    options:
    - text: висока якість освіти в єзуїтських колегіумах, що гарантувала кар'єру
      correct: true
    - text: прямий примус та фізичні погрози з боку польського короля
      correct: false
    - text: відсутність будь-яких православних храмів на території Київщини
      correct: false
    - text: бажання місцевої шляхти масово емігрувати до Італії
      correct: false
  - question: Яким чином, згідно з текстом біографії, князь Острозький відреагував
      на Берестейську унію 1596 року?
    explanation: Текст зазначає, що князь став на чолі жорсткої опозиції, оскільки
      вважав унію укладеною за спиною руського народу.
    options:
    - text: він очолив жорстку опозицію та підтримав православні братства
      correct: true
    - text: він одразу погодився на всі умови Риму заради миру
      correct: false
    - text: він вирішив назавжди емігрувати до Московського царства
      correct: false
    - text: він розпустив Острозьку академію на знак протесту
      correct: false
  - question: Як автор тексту характеризує стан православної церкви до початку реформ
      князя Острозького?
    explanation: У тексті церква до реформ описується як 'темна і німа', що перебувала
      у стані глибокої інтелектуальної кризи.
    options:
    - text: вона перебувала у стані глибокої інтелектуальної кризи
      correct: true
    - text: вона була найвпливовішою політичною силою в Європі
      correct: false
    - text: вона активно і успішно поширювала свої ідеї серед католиків
      correct: false
    - text: вона мала розгалужену мережу сучасних університетів
      correct: false
  - question: Яку функцію автор підкреслює, описуючи Острозьку Біблію в контексті
      культурного змагання?
    explanation: Автор підкреслює, що Біблія стала канонічним стандартом, який стабілізував
      мову та став духовною зброєю проти асиміляції.
    options:
    - text: вона стала канонічним стандартом та духовною зброєю нації
      correct: true
    - text: вона була виключно комерційним проєктом для збагачення князя
      correct: false
    - text: вона призначалася лише для подарунків іноземним послам
      correct: false
    - text: вона використовувалася як таємний шифр під час повстань
      correct: false
  - question: Який парадокс епохи, згідно з текстом, відображає особиста родинна трагедія
      князя Острозького?
    explanation: 'Текст вказує на парадокс: незважаючи на титанічні зусилля князя
      із захисту православ''я, його власні діти перейшли в католицизм через потужний
      культурний тиск.'
    options:
    - text: його власні діти змінили конфесію попри його зусилля
      correct: true
    - text: його друкарня видавала книги виключно латиною
      correct: false
    - text: він відмовився фінансувати будь-які культурні проєкти
      correct: false
    - text: він особисто підписав акт про повне знищення академії
      correct: false
  instruction: Оберіть правильну відповідь.
