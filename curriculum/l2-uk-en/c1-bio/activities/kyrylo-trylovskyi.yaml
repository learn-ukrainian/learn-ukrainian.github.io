- type: reading
  id: reading-trylovskyi
  title: 'Первинне джерело: Мета створення організації'
  source: 'Кирило Трильовський'
  text: |
    я постановив собі заснувати організацію, яка б охопила всі верстви українського народу, а в першій мірі селянство, і виховала б з них свідомих синів своєї батьківщини, готових на всякі жертви для неї.
  tasks:
    - "Яку головну соціальну верству Трильовський вважав основою своєї організації?"
    - "Яку мету виховання він ставив перед цією організацією?"

- type: critical-analysis
  title: 'Аналіз: Стратегічна орієнтація на селянство'
  source_reading: reading-trylovskyi
  instruction: 'Проаналізуйте наведений фрагмент тексту та дайте відповіді на запитання.'
  target_text: 'яка б охопила всі верстви українського народу, а в першій мірі селянство'
  questions:
    - "Яке політичне значення мав акцент саме на селянстві в умовах Галичини того часу?"
    - "Як цей підхід відрізнявся від стратегії польського чи чеського сокольського руху?"
  model_answers:
    - "Акцент на селянстві дозволяв залучити наймасовішу верству населення, перетворюючи її з пасивного об'єкта політики на свідому національну силу."
    - "На відміну від сокольського руху, який орієнтувався переважно на міську інтелігенцію, стратегія Трильовського робила ставку на сільські маси."
  focus_points:
    - 'соціальна база політичного руху'
    - 'масовість організації'

- type: essay-response
  title: 'Есе: Роль товариства "Січ" у формуванні української нації'
  source_reading: reading-trylovskyi
  instruction: 'Напишіть розгорнуте аналітичне есе на задану тему.'
  prompt: |
    У своєму есе проаналізуйте феномен товариства "Січ" як інструменту мілітаризації та національного пробудження українського селянства. Яким чином гімнастичні товариства сприяли формуванню Легіону УСС та майбутньої української армії?
  min_words: 250
  model_answer: "Товариство 'Січ', створене Кирилом Трильовським, стало фундаментальною базою для національного пробудження в Галичині. Під виглядом пожежно-руханкових організацій українське селянство проходило не лише фізичний, але й мілітарний вишкіл. Використання козацької символіки та суворої дисципліни дозволило перетворити розрізнені маси на згуртовану політичну силу. У перспективі це створило інституційне підґрунтя: коли розпочалася Перша світова війна, саме вихованці 'Січей' склали ядро Легіону Українських Січових Стрільців, а згодом — Української Галицької Армії."
  rubric:
    - criteria: 'Аналіз ролі "Січі"'
      description: 'Глибоке розуміння парамілітарної природи організації.'
      points: 10
    - criteria: "Зв'язок з УСС"
      description: 'Чітке простеження еволюції від гімнастичних товариств до регулярної армії.'
      points: 10

- type: quiz
  title: 'Перевірте знання: Розуміння тексту'
  instruction: 'Оберіть одну правильну відповідь до кожного запитання на основі прочитаного тексту.'
  items:
    - question: "У тексті модуля автор використовує термін 'юридична мімікрія'. Що саме описує цей термін у контексті діяльності Трильовського?"
      explanation: "Мімікрія описує реєстрацію парамілітарних структур під виглядом легальних пожежних товариств."
      options:
        - text: "реєстрацію військових організацій як пожежно-руханкових"
          correct: true
        - text: "використання підроблених документів у суді"
          correct: false
        - text: "перевдягання селян у поліцейську форму"
          correct: false
        - text: "відмову від сплати податків до бюджету"
          correct: false
    - question: "Згідно з текстом, як автор пояснює неофіційне звання 'Хлопський адвокат', яке отримав Трильовський?"
      explanation: "Автор зазначає, що Трильовський безкоштовно захищав найбідніші верстви, перетворивши зневажливе слово 'хлоп' на символ гідності."
      options:
        - text: "він захищав права найбідніших верств населення у судах"
          correct: true
        - text: "він сам походив із дуже бідної селянської родини"
          correct: false
        - text: "його клієнтами були виключно польські землевласники"
          correct: false
        - text: "він спеціалізувався лише на кримінальних справах"
          correct: false
    - question: "Який аргумент автор наводить для пояснення успіху товариства 'Січ' порівняно з іншими гімнастичними рухами?"
      explanation: "Автор підкреслює стратегічну орієнтацію на масове селянство, на відміну від елітарного підходу конкурентів."
      options:
        - text: "орієнтацію на наймасовішу верству населення — селянство"
          correct: true
        - text: "величезне фінансове забезпечення з боку імперії"
          correct: false
        - text: "підтримку з боку чеських та польських політиків"
          correct: false
        - text: "зосередженість виключно на спортивних досягненнях"
          correct: false
    - question: "У тексті автор характеризує парламентську обструкцію. Яким чином Трильовський використовував цей метод?"
      explanation: "Обструкція використовувалася для зриву антиукраїнських рішень шляхом багаточасових виступів."
      options:
        - text: "для затягування або зриву прийняття рішень через безкінечні промови"
          correct: true
        - text: "для блокування трибуни за допомогою фізичної сили"
          correct: false
        - text: "для підкупу інших депутатів під час таємних голосувань"
          correct: false
        - text: "для отримання фінансових преференцій особисто для себе"
          correct: false
    - question: "Згідно з текстом, яку функцію автор приписує мілітарній естетиці (малинові стяги, топірці) у діяльності товариства?"
      explanation: "Ця естетика формувала візуальний та смисловий зв'язок з героїчною добою козацтва."
      options:
        - text: "вона створювала зв'язок між сучасним поколінням та козацькою добою"
          correct: true
        - text: "вона допомагала приховати організацію від австрійської поліції"
          correct: false
        - text: "це була обов'язкова вимога австрійського пожежного законодавства"
          correct: false
        - text: "вона використовувалася виключно для розваги місцевого населення"
          correct: false

- type: true-false
  title: 'Правда чи неправда: Аналіз історичного контексту'
  instruction: 'Визначте, чи відповідають наведені твердження змісту тексту.'
  items:
    - statement: "У тексті зазначається, що радянська історіографія позитивно оцінювала діяльність Трильовського як захисника селян."
      correct: false
      explanation: "Автор підкреслює, що радянська пропаганда таврувала його як 'буржуазного націоналіста' та 'реакціонера'."
    - statement: "Згідно з текстом, залучення жінок до парамілітарного руху було традиційним явищем для патріархального суспільства того часу."
      correct: false
      explanation: "У тексті це описано як надзвичайно інноваційний та сміливий крок, який ламав застарілі стереотипи."
    - statement: "Автор стверджує, що товариство 'Січ' стало еталонною матрицею для всіх наступних українських мілітарних організацій."
      correct: true
      explanation: "Текст підтверджує, що ця матриця стала фундаментом для УСС, УГА та інших рухів."
    - statement: "У статті наголошується, що Трильовський відмовлявся від адвокатської практики під час своєї політичної кар'єри."
      correct: false
      explanation: "Він паралельно розвивав адвокатську практику і навіть відкрив канцелярію в Коломиї, куди з'їжджалися люди."
    - statement: "Текст спростовує міф про те, що Трильовський помер в еміграції, зазначаючи, що він пішов з життя в Коломиї під час окупації."
      correct: true
      explanation: "Автор чітко вказує на хибність міфу про смерть у Празі чи Відні та наголошує на смерті в рідному місті."