- type: reading
  id: reading-manifesto
  title: 'Первинне джерело: Маніфест Братства тарасівців'
  source: Символ віри молодих українців
  text: 'Ми, свідомі Українці, рішуче й назавжди пориваємо з українофільством.

    Ми віддаємо всі наші сили на створення української національної справи.

    Ми вимагаємо, щоб Україна була вільною і незалежною, щоб вона мала

    свої власні державні інституції, свою армію та свою школу.

    Наша мета — повна політична самостійність, а не лише культурна автономія

    в межах чужої імперії.

    '
  tasks:
  - Прочитайте уривок та проаналізуйте головну ідеологічну зміну.
  - Зверніть увагу на протиставлення політичної самостійності та культурної автономії.
- type: critical-analysis
  source_reading: reading-manifesto
  title: Аналіз політичного маніфесту
  target_text: Ми вимагаємо, щоб Україна була вільною і незалежною
  questions:
  - Як автор тексту протиставляє нову ідеологію традиційному українофільству?
  - Які конкретні атрибути державності згадуються у тексті як обов’язкові?
  model_answers:
  - Автор використовує слова про рішучий розрив, що свідчить про категоричну відмову
    від виключно культурницького підходу на користь активної політичної боротьби.
  - Текст чітко артикулює необхідність створення власних інституцій, армії та національної
    системи освіти як базових елементів державної самостійності.
  focus_points:
  - Політична риторика
  - Ідеологічний розрив
- type: reading
  id: reading-order
  title: 'Історичний документ: Мовний обіжник'
  source: Іван Липа, 1919 рік
  text: 'Наказую всім підлеглим мені церковним та освітнім установам негайно

    перевести все діловодство, метричні книги та офіційне листування

    виключно на українську мову. Це є необхідним кроком для утвердження

    нашої національної гідності та звільнення духовного життя від

    багатовікового імперського диктату.

    '
  tasks:
  - Ознайомтеся з текстом розпорядження міністра.
  - Проаналізуйте його вплив на процес державотворення УНР.
- type: essay-response
  source_reading: reading-order
  title: 'Есей: Мовна політика як інструмент деколонізації'
  prompt: З огляду на наведений текст обіжника та матеріали модуля, проаналізуйте
    роль мовної політики у розбудові УНР. Чому Іван Липа вважав переведення церковного
    діловодства на українську мову питанням національної безпеки, а не просто культурною
    забаганкою?
  min_words: 300
  model_answer: У своїй відповіді студент має пояснити, що мова розглядалася як фундамент
    автокефалії та незалежності. Обіжник руйнував монополію імперської церкви, яка
    була інструментом русифікації, і повертав українській мові статус державної у
    ключовій на той час сфері суспільного життя.
  rubric:
  - criteria: Глибина аргументації
    description: Здатність пояснити зв’язок між мовою та національною безпекою в історичному
      контексті.
    points: 40
  - criteria: Опора на джерела
    description: Використання фактів з модуля та тексту обіжника.
    points: 40
  - criteria: Мовне оформлення
    description: Використання академічної лексики та складносурядних речень.
    points: 20
- type: quiz
  title: Перевірка розуміння тексту
  items:
  - question: Згідно з текстом, як Іван Липа сприймав свою медичну практику в контексті
      суспільного життя?
    explanation: Він розглядав медицину не лише як професію, а як інструмент соціального
      та духовного зцілення нації.
    options:
    - text: Як інструмент соціального та духовного зцілення українського суспільства.
      correct: true
    - text: Як спосіб швидкого збагачення та здобуття впливу в імперських колах.
      correct: false
    - text: Як тимчасове заняття до початку професійної політичної кар’єри.
      correct: false
    - text: Як виключно наукову діяльність, відірвану від потреб простих людей.
      correct: false
  - question: У тексті автор характеризує концепцію світової гармонії Липи як таку,
      що...
    explanation: Космофілія Липи стверджувала, що свобода кожної нації є необхідною
      для гармонії всього світу.
    options:
    - text: стверджує любов до світу через утвердження прав своєї власної нації.
      correct: true
    - text: закликає до збройної агресії проти інших поневолених народів.
      correct: false
    - text: вимагає повної асиміляції українців у російському імперському просторі.
      correct: false
    - text: ігнорує будь-які національні відмінності заради тотальної глобалізації.
      correct: false
  - question: Який аргумент наводить автор, щоб пояснити фундаментальне значення мовного
      обіжника 1919 року?
    explanation: Обіжник став першим каменем у фундамент української автокефалії,
      вириваючи церкву з-під влади імперії.
    options:
    - text: Він заклав реальну правову базу для здобуття повної автокефалії української
        церкви.
      correct: true
    - text: Він став причиною негайного дипломатичного визнання УНР західними країнами.
      correct: false
    - text: Він стосувався виключно перекладу медичної літератури українською мовою.
      correct: false
    - text: Він був спрямований на популяризацію російської культури в українських
        парафіях.
      correct: false
  - question: Як текст описує роль Юрія Липи у контексті збереження спадщини його
      видатного батька?
    explanation: Юрій Липа концептуалізував ідеї батька, перетворивши їх на сувору
      геополітичну науку.
    options:
    - text: Він розвинув ідеї батька про незалежність до рівня складних геополітичних
        доктрин.
      correct: true
    - text: Він категорично відмовився від політичної діяльності, обравши шлях провінційного
        лікаря.
      correct: false
    - text: Він емігрував до столиці імперії та став лояльним і успішним радянським
        письменником.
      correct: false
    - text: Він присвятив своє життя виключно перекладам ранніх творів батька іноземними
        мовами.
      correct: false
  - question: У тексті зазначається, що Одеська літературна спілка слугувала для Івана
      Липи передусім для...
    explanation: Спілка була легальним майданчиком для гуртування інтелігенції та
      культурної роботи на півдні.
    options:
    - text: легального прикриття для потужної національної роботи в умовах ворожого
        імперського міста.
      correct: true
    - text: організації масштабних збройних виступів проти російських чиновників у
        чорноморському порту.
      correct: false
    - text: пропаганди радикальних соціалістичних ідей серед робітників великих одеських
        заводів.
      correct: false
    - text: збору значних фінансових коштів для будівництва нових розкішних лікарень
        у Криму.
      correct: false
  instruction: Оберіть правильну відповідь.
