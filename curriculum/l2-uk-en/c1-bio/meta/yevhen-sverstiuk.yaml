slug: yevhen-sverstiuk
title: 'Євген Сверстюк: Моральний авторитет нації'
word_target: 5000
content_outline:
- section: 'Вступ: Філософ свободи'
  words: 400
  points:
  - Євген Сверстюк як моральний імператив українського опору
  - Поєднання християнської етики та національної ідеї
