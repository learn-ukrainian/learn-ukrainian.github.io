slug: oksana-zabuzhko
title: 'Оксана Забужко: Інтелектуал і феміністка'
word_target: 5000
content_outline:
- section: Вступ — Голос українського інтелектуалізму
  words: 450
  points:
  - Забужко як центральна фігура сучасного українського літературного процесу та публічного
    простору.
  - 'Унікальний статус: поєднання академічної філософської бази з письменницьким талантом.'
  - 'Міжнародний голос України: переклади понад 20 мовами, виступи на світових форумах.'
  - 'Ключова теза: література як інструмент національного самопізнання та ''психотерапії''.'
- section: 'Ранні роки: Дисидентське коріння та формування'
  words: 700
  points:
  - Народження в родині шістдесятників (Луцьк, 1960). Переслідування батька КДБ та
    переїзд до Києва.
  - 'Атмосфера ''внутрішньої еміграції'': подвійне життя радянської інтелігенції,
    збереження дореволюційної культурної пам''яті.'
  - 'Навчання на філософському факультеті КНУ ім. Шевченка: формування світогляду
    в умовах ідеологічного контролю.'
  - Захист дисертації з естетики (1987) та початок наукової роботи в Інституті філософії.
- section: '«Польові дослідження»: Анатомія національної травми'
  words: 900
  points:
  - Вихід роману «Польові дослідження з українського сексу» (1996) як культурний вибух
    і скандал.
  - 'Деконструкція назви: це не еротика, а дослідження національної ідентичності та
    колективної травми.'
  - 'Постколоніальний фемінізм: аналіз того, як політичне приниження нації проектується
    на особисті стосунки.'
  - 'Стилістика ''потоку свідомості'' та жива мова: розрив з радянським каноном ''цнотливої''
    літератури.'
- section: '«Музей покинутих секретів»: Епос пам''яті'
  words: 1000
  points:
  - Роман як масштабна родинна сага, що охоплює три покоління (УПА, сімдесяті, сьогодення).
  - 'Метафора ''секретів'': дитяча гра як символ закопаної, прихованої історії, що
    потребує віднайдення.'
  - 'Сюжетна лінія УПА: деміфологізація повстанського руху, зображення їх як живих
    людей, а не пам''ятників.'
  - 'Зв''язок часів: як непроговорені трагедії минулого впливають на долі сучасних
    героїв (Дарина і Адріян).'
  - 'Міжнародне визнання роману: премія ''Angelus'' та роль у європейському осмисленні
    української історії.'
- section: 'Філософія та есеїстика: Notre Dame d''Ukraine'
  words: 950
  points:
  - '«Notre Dame d''Ukraine» (2007): монументальне дослідження постаті Лесі Українки
    та української інтелігенції.'
  - 'Концепція ''лицарства'': українська еліта як носій європейської шляхетської традиції
    (на противагу радянському міфу про ''селянську націю'').'
  - 'Збірка «Хроніки від Фортінбраса»: культурологічний аналіз пострадянської реальності
    та масової культури.'
  - Роль есеїстики Забужко у формуванні сучасного українського інтелектуального дискурсу
    (теми мови, ідентичності, канону).
- section: 'Громадська позиція: Війна за смисли'
  words: 1000
  points:
  - 'Участь у Революції Гідності: ''Літопис самовидців'' та фіксація історії в момент
    її творення.'
  - 'Інформаційний фронт: есе «Найдовша подорож» (2022) як пояснення витоків російської
    агресії західній аудиторії.'
  - 'Жорстка позиція щодо російської культури: теза про її відповідальність за злочини
    режиму.'
  - 'Підсумки: Оксана Забужко як інтелектуальний орієнтир нації, що повертає українцям
    суб''єктність та гідність.'
