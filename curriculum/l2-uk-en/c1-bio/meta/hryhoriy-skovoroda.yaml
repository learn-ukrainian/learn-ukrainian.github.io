slug: hryhoriy-skovoroda
title: 'Григорій Сковорода: Мандрівний філософ'
word_target: 5000
content_outline:
- section: Вступ — Український Сократ
  words: 400
  points:
  - Григорій Сковорода як символ духовної свободи та інтелектуальної незалежності
  - 'Паралелі з античними філософами: спосіб життя як частина вчення'
  - Актуальність філософії серця та 'сродної праці' у сучасному світі
- section: 'Життєпис: I — Формування особистості'
  words: 600
  points:
  - 'Дитинство в Чорнухах: козацьке походження та родинне середовище'
  - 'Києво-Могилянська академія: інтелектуальна атмосфера та барокова освіта'
  - 'Петербурзький епізод: служба в придворній капелі та відраза до імперського лицемірства'
- section: 'Життєпис: II — Європейський досвід та педагогіка'
  words: 600
  points:
  - 'У складі Токайської комісії: подорож країнами Європи (Угорщина, Австрія, Словаччина)'
  - 'Переяславський колегіум: новаторство у викладанні поетики та конфлікт із системою'
  - 'Харківський період: викладання етики, дружба з Ковалинським та ''Сад божественних
    пісень'''
- section: 'Життєпис: III — Шлях мандрівного філософа'
  words: 600
  points:
  - Остаточна відмова від світської та церковної кар'єри (1769 рік)
  - 'Феномен старчика: життя в мандрах, аскеза та повна свобода'
  - 'Соціальне коло спілкування: від простих селян до освіченого шляхетства'
- section: 'Історичний контекст: Філософія на тлі руїни'
  words: 500
  points:
  - Українське Просвітництво та захід Гетьманщини
  - Ліквідація Січі (1775) та запровадження кріпацтва (1783) як історичне тло
  - Втеча від світу як форма пасивного спротиву імперському поглинанню
- section: 'Внесок: I — Філософська система'
  words: 700
  points:
  - Вчення про дві натури (видиму і невидиму) та три світи (макрокосм, мікрокосм,
    Біблія)
  - 'Концепція ''сродної праці'': щастя через реалізацію природного покликання'
  - 'Кордоцентризм: серце як осередок духовного життя людини'
  - Ідея 'нерівної всім рівності' як модель гармонійного суспільства
- section: 'Внесок: II — Літературна спадщина'
  words: 500
  points:
  - '''Сад божественних пісень'': вершина української барокової лірики'
  - '''Байки Харківські'': філософські істини в алегоричній формі'
  - 'Стилістика Сковороди: символізм, емблематичність та мовна своєрідність'
- section: Останні роки та легенда
  words: 400
  points:
  - 'Життя на Слобожанщині в останні роки: Пан-Іванівка'
  - Містичне передчуття смерті та власноруч викопана могила (аналіз легенди)
  - Епітафія 'Світ ловив мене, та не спіймав' як квінтесенція життєвого шляху
- section: 'Спадщина: Живий символ'
  words: 600
  points:
  - Вплив на формування української ідентичності та літератури (від Котляревського
    до модерністів)
  - 'Сковорода в сучасній культурі: банкнота, пам''ятники, брендинг'
  - 'Знищення музею у Сковородинівці (2022): культурний геноцид та символ незламності'
- section: Підсумок
  words: 200
  points:
  - Григорій Сковорода як пророк внутрішньої незалежності
  - Значення його постаті для деколонізації української свідомості
