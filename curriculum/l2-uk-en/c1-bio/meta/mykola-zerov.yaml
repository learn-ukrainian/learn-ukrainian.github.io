slug: mykola-zerov
title: 'Микола Зеров: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Лідер київських неокласиків'
  words: 300
  points:
  - Микола Зеров — центральна постать українського неокласицизму та інтелектуальний
    лідер покоління.
  - Концепція елітарного мистецтва в епоху пролетарського спрощення.
  - Поєднання ролей поета, перекладача, критика та професора.
- section: 'Становлення інтелектуала: Від Зінькова до Києва'
  words: 400
  points:
  - Дитинство в родині вчителя та класична гімназійна освіта.
  - 'Навчання в Університеті Св. Володимира: формування філологічного фундаменту.'
  - 'Златопільський період (1914–1917): перші переклади та педагогічна практика.'
  - 'Переїзд до революційного Києва: редагування журналу «Книгар».'
- section: '«Камена»: Поетичний маніфест строгої форми'
  words: 600
  points:
  - Аналіз збірки «Камена» (1924) — єдиної прижиттєвої книги поезій.
  - 'Культ сонета та олександрійського вірша: дисципліна проти хаосу.'
  - 'Тематика: античні мотиви, урбаністичний Київ, діалог з історією.'
  - «Мистецтво рівноваги» як відповідь на емоційну розхристаність народництва.
- section: 'Ad Fontes: Зеров як перекладач і критик'
  words: 600
  points:
  - Гасло «Ad Fontes» (До джерел) — програма культурної емансипації.
  - 'Перекладацька стратегія: змагання з оригіналом та засвоєння світових форм.'
  - Робота з античною спадщиною (Вергілій, Горацій) та французькими парнасцями.
  - 'Літературна критика («До джерел», «Від Куліша до Винниченка»): вимога високої
    кваліфікації.'
- section: 'Літературна дискусія 1925–1928: Європа чи Просвітянство?'
  words: 600
  points:
  - Союз із Хвильовим у боротьбі проти «масовізму» та графоманії.
  - 'Полеміка з опонентами (Пилипенко, щупаківщина): захист професіоналізму.'
  - Зеров про небезпеку культурної ізоляції та провінційності.
  - Політичні звинувачення влади в «антипролетарських настроях».
- section: 'Професор КІНО: Легендарні лекції'
  words: 500
  points:
  - Викладацька діяльність у Київському інституті народної освіти (КІНО).
  - 'Харизма лектора: студенти слухали стоячи, імпровізації латиною.'
  - Створення наукової школи та вплив на молодь.
  - 'Особисте життя: трагедія втрати сина Костика (1934).'
- section: 'Полювання на «бібліофагів»: Арешт і слідство'
  words: 500
  points:
  - 'Посилення терору: процес СВУ як прелюдія.'
  - Звільнення з університету та заборона друкуватися.
  - Втеча до Москви та арешт 28 квітня 1935 року.
  - 'Сфабрикована справа «контрреволюційної групи»: допити й самообмова.'
- section: 'Соловки: Останній переклад Вергілія'
  words: 500
  points:
  - 'Вирок: 10 років таборів. Етап на Соловки.'
  - 'Життя в ув''язненні: фізична праця та інтелектуальний опір.'
  - Робота над повним перекладом «Енеїди» (рукопис втрачено).
  - Листи до дружини Софії як свідчення незламності духу.
- section: 'Сандармох: Розстріляний геній'
  words: 500
  points:
  - Рішення «трійки» УНКВС від 9 жовтня 1937 року (протокол № 83).
  - '«Соловецький етап»: масове знищення української еліти до ювілею Жовтня.'
  - Розстріл 3 листопада в урочищі Сандармох.
  - Доля ката (капітан Матвєєв) та механізм репресивної машини.
- section: 'Спадщина та значення: Повернення Ad Fontes'
  words: 500
  points:
  - Реабілітація 1958 року та довгий шлях повернення творів.
  - Видання 1990-х років та сучасне переосмислення.
  - Зеров як символ європейського вектора української культури.
  - Значення його заклику до професіоналізму в сучасній Україні.
