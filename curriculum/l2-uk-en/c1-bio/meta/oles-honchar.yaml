slug: oles-honchar
title: 'Олесь Гончар: Собор непокори'
word_target: 5000
content_outline:
- section: 'Вступ: Між системою та сумлінням'
  words: 600
  points:
  - 'Феномен Олеся Гончара: від сталінського лауреата до морального авторитета нації.'
  - 'Парадокс виживання: як зберегти українську душу в лещатах соцреалізму.'
  - '«Собори душ»: філософський стрижень його творчості та життя.'
  - 'Роль особистості в історії: письменник як барометр совісті епохи.'
- section: Полтавщина та гартування (1918-1941)
  words: 700
  points:
  - 'Суха Балка: дитинство без матері, вплив бабусі та народної культури.'
  - Зміна прізвища (Біличенко на Гончар) та пошук ідентичності.
  - 'Харківський період: навчання журналістиці в атмосфері пост-срипниківської українізації.'
  - Передчуття війни та ранні літературні спроби.
- section: 'Війна та ціна визнання: «Прапороносці»'
  words: 900
  points:
  - 'Студентський батальйон 1941-го: трагедія покоління та полон.'
  - 'Шлях до Праги: фронтовий досвід як основа трилогії.'
  - 'Феномен «Прапороносців»: чому роман отримав Сталінську премію?'
  - 'Деколонізаційний погляд: «оптимістичний кітч» чи реквієм за побратимами?'
  - Вплив офіційного визнання на подальшу долю письменника.
- section: '«Собор»: Архітектура непокори (I — Задум і символи)'
  words: 800
  points:
  - 'Троїцький собор у Новомосковську: історія козацької святині без цвяхів.'
  - 'Сюжетний конфлікт: боротьба за пам''ять проти безпам''ятства.'
  - 'Образ Володьки Лободи: манкурт, який відрікся від батька та минулого.'
  - 'Екологічний вимір: захист природи як частина захисту культури.'
- section: '«Собор»: Архітектура непокори (II — Скандал і заборона)'
  words: 800
  points:
  - '«Ватченківщина»: чому партійний бос Дніпропетровська впізнав себе.'
  - 'Механіка цькування: організовані листи трудящих та розгромні статті.'
  - 'Лист творчої молоді Дніпропетровська: «Собор» як каталізатор опору.'
  - 'Двадцять років мовчання: життя забороненого роману в самвидаві.'
- section: Захисник культури та пророк (1968-1995)
  words: 800
  points:
  - 'Дипломатія на межі: діяльність на чолі Спілки письменників.'
  - '«Берегти світло»: допомога молодим авторам та захист української мови.'
  - 'Перебудова та пробудження: роль у створенні Руху.'
  - 'Революція на граніті 1990: спалення партквитка як акт катарсису.'
- section: 'Спадщина: Совість нації'
  words: 600
  points:
  - 'Уроки Гончара: чи можливий компроміс із дияволом заради добра?'
  - 'Актуальність «Собору» в часи війни: захист ідентичності.'
  - 'Місце в літературному каноні: між класиком і бунтарем.'
  - 'Заповіт майбутнім поколінням: «Бережіть собори душ».'
