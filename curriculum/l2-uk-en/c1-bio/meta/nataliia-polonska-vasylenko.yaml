slug: nataliia-polonska-vasylenko
title: 'Наталія Полонська-Василенко: Історикиня'
word_target: 5000
content_outline:
- section: Вступ — Жінка, яка написала історію України
  words: 400
  points:
  - Унікальна роль Наталії Полонської-Василенко як жінки-історика, що поєднала «стару»
    київську школу та діаспорну науку.
  - 'Головна місія: збереження української історичної пам''яті в умовах бездержавності.'
  - 'Символізм її долі: від дворянського походження до таборів DP та світового визнання.'
- section: 'Ранні роки та освіта: Шлях до науки (1884-1917)'
  words: 600
  points:
  - Харківське коріння та інтелектуальна атмосфера родини Меньшових.
  - 'Навчання у Київському університеті св. Володимира: виклик патріархальній системі.'
  - Вплив Володимира Іконнікова та формування методології (робота з першоджерелами).
  - 'Перші наукові успіхи: дослідження історії Києва та отримання звання приват-доцента
    (1916).'
- section: 'Наукова кар''єра I: Відкриття Запорожжя (1917-1929)'
  words: 800
  points:
  - 'Робота в новоствореній Українській Академії Наук: ентузіазм 1920-х років.'
  - 'Шлюб з Миколою Василенком: союз двох інтелектуалів.'
  - 'Археографічна революція: дослідження архівів Коша Запорозької Січі.'
  - 'Деколонізаційний прорив: доведення, що Південь України був колонізований українцями-козаками,
    а не Російською імперією.'
- section: 'Наукова кар''єра II: Виживання в епоху терору (1930-1943)'
  words: 800
  points:
  - 'Злам 1930-х: арешт чоловіка, процес СВУ та цькування «буржуазних істориків».'
  - 'Стратегія виживання: вимушена маргіналізація та «втеча» в аполітичні теми.'
  - 'Парадокс 1940 року: захист докторської дисертації у Москві на фоні репресій в
    Києві.'
  - 'Період німецької окупації (1941-1943): керівництво Інститутом археології та порятунок
    архівних фондів від знищення.'
- section: 'Еміграція: Місія збереження (1943-1947)'
  words: 500
  points:
  - 'Важкий вибір: чому інтелігенція масово покидала Україну з відступом німців.'
  - Празький період та робота в Українському Вільному Університеті.
  - 'Життя «на валізах»: переміщення до Баварії, табори DP (Displaced Persons).'
  - 'Наука як якір: продовження лекцій навіть у бараках для біженців.'
- section: 'Життя на Заході I: Архітекторка діаспорної науки (1947-1955)'
  words: 600
  points:
  - 'Відродження УВУ в Мюнхені: Полонська-Василенко як декан філософського факультету.'
  - 'Міжнародна діяльність: боротьба проти радянської фальсифікації історії на світових
    конгресах.'
  - Співпраця з Науковим товариством імені Шевченка (НТШ) в Європі.
  - Формування нової генерації істориків в еміграції.
- section: 'Життя на Заході II: Magnum Opus (1955-1973)'
  words: 800
  points:
  - 'Написання двотомної «Історії України»: мета — створити синтетичний курс для вільного
    світу.'
  - Концепція тяглості української державності від Русі до УНР.
  - 'Вплив праці: підручник, на якому виросли покоління діаспори.'
  - 'Останні роки: самотність, але незламна працездатність до самого кінця.'
- section: 'Наукова спадщина: Повернення додому'
  words: 500
  points:
  - 'Рецепція творчості в незалежній Україні після 1991 року: перевидання праць.'
  - Внесок у подолання імперських міфів про «Новоросію».
  - Приклад академічної доброчесності та громадянської мужності.
  - Місце Полонської-Василенко в пантеоні українських істориків поряд з Грушевським.
