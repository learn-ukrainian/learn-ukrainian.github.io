slug: maik-yohansen
title: 'Майк Йогансен: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Людина Відродження у кепці'
  words: 600
  points:
  - 'Феномен Майка Йогансена: поет, лінгвіст, сценарист, мисливець, тенісист.'
  - Образ «харківського денді» та руйнування стереотипу про рустикального письменника.
  - 'Поліглотство (14-20 мов) та інтелектуальна широта: від перекладів Шекспіра до
    складання граматик.'
  - 'Свідомий вибір української ідентичності: чому син латвійця став українським модерністом.'
- section: 'Ранні роки: Харківський фундамент'
  words: 800
  points:
  - 'Дитинство та родина: вплив батька-германіста та українського оточення матері.'
  - Класична освіта в Третій Харківській гімназії та університеті (лінгвістичний профіль).
  - Перша світова війна та Визвольні змагання очима молодого інтелектуала.
  - 'Початок літературної діяльності: перехід з російської/німецької на українську
    (1918–1919).'
- section: 'Творчий шлях: I — Поезія та маніфести'
  words: 800
  points:
  - 'Організація «Гарт» та пошук нових форм: від гасел до конструктивізму.'
  - Збірка «Д’горі» (1921) як поетичний дебют.
  - 'Еволюція стилю: точність слова, ритмічні експерименти, відмова від сентиментальності.'
  - Теоретична праця «Елементарні закони версифікації».
- section: 'Творчий шлях: II — Проза та мета-література'
  words: 1000
  points:
  - '«Подорож ученого доктора Леонардо...» (1928): жанровий експеримент (ландшафтний
    роман).'
  - Іронія, гра з читачем, пародія на пригодницькі романи.
  - '«Як будувати оповідання»: посібник з літературної інженерії.'
  - 'Сценаристика: співпраця з Юрком Тютюнником та Олександром Довженком («Звенигора»).'
- section: 'Роль у Розстріляному відродженні: ВАПЛІТЕ і «Слово»'
  words: 800
  points:
  - 'Заснування ВАПЛІТЕ: Йогансен як ідеолог високої майстерності та «психологічної
    Європи».'
  - 'Літературна дискусія 1925–1928: позиція Йогансена (проти хуторянства і проти
    «червоної просвіти»).'
  - 'Життя в будинку «Слово»: побут, полювання, більярд, інтелектуальні змагання.'
  - Альманах «Літературний ярмарок» як спроба обійти цензуру.
- section: 'Трагічна доля: Арешт і страта'
  words: 600
  points:
  - 'Посилення репресій у 1930-х: згортання українізації, самогубство Хвильового.'
  - 'Арешт 18 серпня 1937 року: обставини, ордер, вилучення архіву.'
  - 'Звинувачення у шпигунстві та тероризмі: абсурдність радянської каральної системи.'
  - Розстріл 27 жовтня 1937 року в Києві (до річниці Жовтневої революції).
- section: 'Спадщина: Повернення Майка'
  words: 400
  points:
  - Забуття та вилучення творів із бібліотек.
  - 'Реабілітація 1957 року: «відсутність складу злочину».'
  - 'Вплив на сучасну українську літературу (Бу-Ба-Бу, Жадан): Йогансен як предтеча
    постмодернізму.'
  - 'Вшанування пам''яті: перевидання, дослідження, місце в каноні.'
