slug: yaroslav-hrytsak
title: 'Ярослав Грицак: Публічний історик'
word_target: 5000
content_outline:
- section: Вступ — Історик, який говорить з людьми
  words: 400
  points:
  - 'Ярослав Грицак як феномен української публічної історії: місток між академією
    та суспільством.'
  - Відмова від езотеричної мови науки на користь живого діалогу з аудиторією.
  - Вплив на формування нової української ідентичності через бестселери та публічні
    лекції.
  - 'Ключова теза: історія як інструмент для розуміння сьогодення та планування майбутнього.'
- section: Львівське дитинство та інтелектуальні витоки
  words: 600
  points:
  - Народження (1960) в селі Довге та формування у львівському середовищі.
  - 'Навчання у Львівському університеті ім. І. Франка (1977–1982): атмосфера пізнього
    застою.'
  - Вплив 'тіньової' культури Львова та постаті Ярослава Дашкевича на становлення
    молодого історика.
  - 'Пошук альтернативи радянському догматизму: інтерес до джерел та західної методології.'
- section: 'Академічна кар''єра: Переосмислення канону'
  words: 800
  points:
  - Вихід 'Нарисів історії України' (1996) як поворотний момент у пострадянській історіографії.
  - 'Дослідження постаті Івана Франка (''Пророк у своїй вітчизні'', 2006): деконструкція
    каменяра.'
  - 'Інституційна діяльність: директор Інституту історичних досліджень ЛНУ та професор
    УКУ.'
  - 'Міжнародне визнання: викладання в Колумбійському університеті, Гарварді та ЦЄУ.'
- section: 'Подолання минулого: Глобальна історія'
  words: 600
  points:
  - 'Magnum opus ''Подолати минуле: глобальна історія України'' (2021) — синтез 15
    років роботи.'
  - 'Концепція ''подолання історії'': як вийти з пастки бідності та насильства.'
  - Вписування України у глобальні контексти (від Колумбового обміну до індустріалізації).
  - 'Критика ''винятковості'': Україна як нормальна європейська нація, що має ''домашнє
    завдання''.'
- section: 'Подолання минулого: Цінності та модернізація'
  words: 600
  points:
  - Роль цінностей у розвитку суспільства (спираючись на World Values Survey).
  - Перехід від цінностей виживання до цінностей самовираження як умова успіху.
  - 'Метафора ''стрибка жаби'': можливість швидкої модернізації через освіту та інституції.'
  - 'Полеміка з традиційним націоналізмом: чому однієї мови та культури недостатньо
    для прориву.'
- section: Публічна історія та громадянська позиція
  words: 800
  points:
  - 'Грицак як публічний інтелектуал: есеїстика, блоги, виступи (TEDx, Збруч).'
  - Участь у Революції Гідності та робота в Раді Майдану (2013–2014).
  - 'Просвітницькі проекти: ''Історія України за 5 хвилин'' (ТНМК) та курси на Prometheus.'
  - Співпраця з Українським католицьким університетом як створення 'українського Гарварду'.
- section: 'Війна та сучасність: Битва за майбутнє'
  words: 700
  points:
  - 'Реакція на повномасштабне вторгнення 2022 року: війна як зіткнення минулого і
    майбутнього.'
  - Концепція 'асиметричної війни' та української суб'єктності ('мурашник').
  - Прогнози щодо краху Російської імперії та роль України у безпеці Європи.
  - Переосмислення російської культури та відповідальності інтелектуалів.
- section: Дискусія — Обов'язок історика
  words: 500
  points:
  - 'Дилема об''єктивності та патріотизму: чи може історик бути ''над сутичкою'' під
    час війни?'
  - 'Полеміка з Володимиром В''ятровичем: академічна історія проти політики пам''яті.'
  - 'Ставлення до ''складних тем'' (Бандера, Волинь, Голокост): правда як терапія.'
  - 'Підсумок: роль Грицака у формуванні критичного мислення українців.'
