slug: hryhorii-kosynka
title: 'Григорій Косинка: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Майстер новели та «міліціонер душ»'
  words: 600
  points:
  - 'Григорій Косинка як провідний новеліст 1920-х років: стиль, почерк, імпресіонізм.'
  - 'Літературне кредо: відмова від «інженерії душ» на користь правди життя.'
  - 'Огляд основних тем: село, революція, екзистенційна самотність.'
- section: 'Ранні роки: Від Щербаківки до Києва'
  words: 800
  points:
  - Дитинство в бідній селянській родині, вплив матері та українського фольклору.
  - 'Переїзд до Києва: важка праця (чистильник чобіт, кур''єр) та жага до знань.'
  - 'Освіта: вечірні курси, Київський інститут народної освіти, середовище української
    інтелігенції.'
  - Вплив революційних подій 1917-1921 років на формування світогляду.
- section: 'Творчий злет: «На золотих богів» та поетика села'
  words: 1000
  points:
  - 'Дебютна збірка «На золотих богів» (1922): резонанс, критика, визнання.'
  - 'Специфіка зображення села: не ідилія, а арена кривавих сутичок і моральних дилем.'
  - 'Герої Косинки: селяни-повстанці, дезертири, матері — люди у межових ситуаціях.'
  - 'Еволюція творчості: збірки «В житах», «Політика», «Серце».'
- section: 'У колі однодумців: «Ланка» і МАРС'
  words: 900
  points:
  - Участь у літературних угрупованнях АСПИС, «Ланка», МАРС.
  - Творча дружба з Валер'яном Підмогильним, Євгеном Плужником, Борисом Антоненком-Давидовичем.
  - 'Ідеологічна позиція МАРСу: право на творчу індивідуальність проти партійного
    диктату.'
  - Літературні дискусії 1925-1928 років і позиція Косинки.
- section: 'Хроніка репресій: Від критики до розстрілу'
  words: 1000
  points:
  - 'Посилення ідеологічного тиску наприкінці 1920-х: ярлик «куркульського письменника».'
  - 'Цькування в пресі: стаття Олексія Полторацького та офіційна кампанія дискредитації.'
  - 'Арешт у листопаді 1934 року: фальсифікація справи про «терористичну організацію».'
  - 'Судовий процес і вирок: «Грудневий розстріл» 15 грудня 1934 року.'
  - Останні листи до дружини Тамари Мороз як документ людської гідності.
- section: 'Спадщина: Повернення із забуття'
  words: 700
  points:
  - Довге забуття та заборона імені в сталінські часи.
  - 'Реабілітація 1957 року: неповнота і цензурні обмеження видань.'
  - Роль Тамари Мороз-Косинки у збереженні архіву та пам'яті письменника.
  - Значення творчості Косинки для сучасної української літератури та деколонізації
    історії.
