title: 'Князь Ярослав Мудрий: Законодавець'
word_target: 5000
content_outline:
- section: Вступ — Будівничий держави
  words: 400
  points:
  - 'Ярослав як архітектор середньовічної української державности: перехід від військової
    експансії до внутрішньої консолідації.'
  - 'Феномен «Мудрого»: інтелект як компенсація фізичної вади (кульгавості) та нова
    модель правителя.'
  - 'Історичний контекст: Київ як гегемон Східної Європи та «суперник Константинополя».'
  - 'Джерельна база: «Повість врем''яних літ», «Хроніка Тітмара Мерзебурзького», графіті
    Софії Київської.'
- section: Життєпис
  words: 400
  points:
  - 'Походження та дискусія про матір (Рогніда чи Анна Візантійська): вплив на легітимність.'
  - 'Ранні роки: намісництво в Ростові та формування характеру майбутнього державника.'
  - 'Особистість князя: любов до книг, фізичні особливості (дисплазія), релігійність.'
- section: Шлях до влади
  words: 800
  points:
  - 'Конфлікт із батьком (1014): відмова платити данину Києву як перший акт політичної
    сепарації.'
  - 'Міжусобиця 1015–1019 рр.: боротьба зі Святополком Окаянним, трагедія Бориса і
    Гліба.'
  - Битва на Альті (1019) та утвердження в Києві.
  - 'Битва під Лиственом (1024) та дуумвірат із Мстиславом Хоробрим: поділ Русі по
    Дніпру.'
  - '1036 рік: смерть Мстислава, встановлення єдиновладдя та остаточний розгром печенігів.'
- section: Руська правда
  words: 800
  points:
  - '«Правда Ярослава» (1016): політичний контекст появи (угода з новгородцями).'
  - 'Цивілізаційний зсув: обмеження кровної помсти колом найближчих родичів.'
  - 'Соціальна стратифікація через систему штрафів (вір): 80 гривень за огнищанина
    vs 5 за смерда.'
  - 'Захист власності та комерційного права: гарантії для купецтва.'
  - 'Європейський контекст: порівняння з «Салічною правдою» та іншими Leges barbarorum.'
- section: Культурний розквіт
  words: 800
  points:
  - 'Софія Київська: сакральна топографія, модель Всесвіту (13 куполів) та дискусія
    про дату заснування (1011 vs 1037).'
  - '«Місто Ярослава»: Золоті ворота, церква Благовіщення, монастирі св. Георгія та
    Ірини.'
  - 'Перша бібліотека та скрипторій: перекладацька діяльність як державна програма.'
  - 'Митрополит Іларіон та «Слово про Закон і Благодать»: маніфест церковно-політичної
    суверенности.'
- section: 'Останні роки: Династична дипломатія'
  words: 600
  points:
  - 'Геополітична переорієнтація: відхід від візантійської монополії до широких європейських
    контактів.'
  - '«Тесть Європи»: шлюби доньок (Анна — Франція, Єлизавета — Норвегія, Анастасія
    — Угорщина).'
  - Матримоніальна стратегія синів (Ода Штаденська, Гертруда Польська).
  - Київ як інтегральна частина європейського монархічного простору.
- section: Внесок у розбудову держави
  words: 500
  points:
  - 'Адміністративна реформа: централізація влади та роль посадників.'
  - 'Церковна політика: спроба унезалежнення від Константинополя (обрання Іларіона
    1051 р.).'
  - 'Урбанізація: заснування нових міст-форпостів (Юр''їв, Корсунь, Ярославль).'
- section: Спадщина та канонізація
  words: 500
  points:
  - '«Заповіт» 1054 року: запровадження сеньйорату (лествичного права) та його наслідки.'
  - 'Таємниця останків: історія саркофагу та ймовірне вивезення мощей до США.'
  - Канонізація та вшанування в українській традиції.
  - 'Деколонізаційний аспект: спростування російських міфів (наприклад, про «шапку
    Мономаха»).'
- section: Підсумок
  words: 300
  points:
  - 'Синтез епохи: гармонія «меча» (оборона) і «книги» (культура).'
  - Ярослав Мудрий як творець культурного коду Русі-України.
  - 'Актуальність: європейський вибір та верховенство права як історичний спадок.'
