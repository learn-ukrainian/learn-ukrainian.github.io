slug: george-shevelov
title: 'Юрій Шевельов: Архітектор української лінгвістики'
word_target: 5000
content_outline:
- section: Вступ — Голос української мови у світі
  words: 400
  points:
  - Шевельов як архітектор наукової історії української мови
  - Дві іпостасі: академічний лінгвіст Юрій Шевельов та есеїст Юрій Шерех
  - Значення його праць для деколонізації української гуманітаристики
- section: Молодість у Харкові I — Походження та освіта
  words: 600
  points:
  - Німецьке коріння (родина Шнейдерів) та зміна прізвища заради виживання
  - Навчання в Харкові: від класичної гімназії до університету
  - Вплив Леоніда Булаховського та Олександра Білецького
  - Атмосфера 1920-х: українізація та її згортання
- section: Молодість у Харкові II — Війна та вибір
  words: 600
  points:
  - Життя в окупованому Харкові (1941–1943)
  - Праця в газеті «Нова Україна» та на кафедрі університету
  - Радянські звинувачення в колабораціонізмі: правда та міфи
  - Виїзд на Захід перед наступом Червоної армії
- section: Втеча та МУР — Інтелектуальний спротив у Європі
  words: 800
  points:
  - Табори переміщених осіб (Ді-Пі) як феномен культурного життя
  - Заснування Мистецького Українського Руху (МУР) у 1945 році
  - Концепція «Великої літератури»: творення культури без держави
  - Полеміка з Дмитром Донцовим та націоналістичним табором
- section: Американський період — На вершині західної славістики
  words: 600
  points:
  - Переїзд до США (1951) та академічна кар'єра
  - Протистояння з Романом Якобсоном у Гарварді
  - Професура в Колумбійському університеті (1954–1977)
  - Діяльність в УВАН та редакція журналу «Сучасність»
- section: «Історична фонологія» — Наукова деконструкція імперії
  words: 1000
  points:
  - Magnum Opus 1979 року: структура та значення праці
  - Спростування міфу про «спільну давньоруську мову»
  - Доведення безперервності розвитку української мови з VII ст.
  - Методологія: факти проти ідеологічних схем
- section: Есеїстика — «Москва, Маросєйка» та діагноз нації
  words: 500
  points:
  - Есе «Москва, Маросєйка» як історіософський маніфест
  - Три вороги України: Москва, провінціалізм, комплексу Кочубеївщини
  - Переосмислення Переяславської ради
  - Стиль есеїстики Шереха: блискуча ерудиція та іронія
- section: Спадщина — Повернення та війна пам'яті
  words: 500
  points:
  - Повернення в український дискурс у 1990-х роках
  - Шевченківська премія 2000 року
  - «Війна пам'ятників» у Харкові (2013): знищення меморіальної дошки
  - Актуальність ідей Шевельова в сучасній Україні
