  - Літературний дебют у львівській 'Правді' під псевдонімом
  - Емський указ 1876 року та боротьба за друковане слово
- section: 'Кайдашева сім''я: Анатомія національного розбрату'
  words: 600
  points:
  - 'Прототипи героїв: родина Мазурів зі Стеблева'
  - Сюжет як модель деградації патріархального укладу
  - 'Сміх крізь сльози: трагічна сутність комічних ситуацій'
  - Психологія егоїзму та відсутність спільної мети
- section: 'Галерея характерів: Від Омелька до Мотрі'
  words: 600
  points:
  - 'Омелько Кайдаш: трагедія зламаної людини'
  - 'Кайдашиха: владність, що переростає в деспотизм'
  - 'Мотря: еволюція від жертви до нового ката'
  - 'Символізм груші: дріб''язковість, що заступає світ'
- section: 'Микола Джеря: У пошуках втраченої волі'
  words: 650
  points:
  - Тема втечі від кріпацтва та соціальної неволі
  - 'Індустріальна Україна: цукроварні та заробітчанство'
  - Образ Миколи як бунтаря та шукача правди
  - Протиставлення романтичної мрії та жорсткої реальності
- section: 'Мовна війна: Категоричний імператив'
  words: 800
  points:
  - Концепція живої народної мови проти 'книжної'
