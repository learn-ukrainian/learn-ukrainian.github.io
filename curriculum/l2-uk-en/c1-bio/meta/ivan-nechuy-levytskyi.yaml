slug: ivan-nechuy-levytskyi
title: 'Іван Нечуй-Левицький: Майстер українського реалізму'
word_target: 5000
content_outline:
- section: 'Вступ: Колосальне всеобіймаюче око'
  words: 450
  points:
  - Іван Франко про Нечуя-Левицького як 'артиста зору'
  - Унікальний візуальний стиль та пейзажна майстерність
  - Значення для утвердження реалізму в українській літературі
- section: 'Походження: Між вівтарем і школою'
  words: 650
  points:
  - Село Стеблів та родина священика Семена Левицького
  - Батькова бібліотека та перші уроки української історії
  - 'Київська духовна академія: освіта європейського рівня'
  - Свідома відмова від духовного сану на користь учителювання
- section: Учительська одіссея та цензура
  words: 600
  points:
  - 'Викладання на чужині: Каліш, Седлець, Кишинів'
