slug: volodymyr-ivasyuk
title: 'Володимир Івасюк: Автор Червоної рути'
word_target: 5000
content_outline:
- section: Вступ — Пісня, яка стала гімном
  words: 500
  points:
  - 'Феномен ''Червоної рути'': від естрадного шлягера до символу національної ідентичності.'
  - Володимир Івасюк як творець нової української музики, що поєднала фольклор і сучасні
    ритми.
  - 'Короткий огляд життєвого шляху: лікар, скрипаль, композитор, жертва системи.'
  - 'Мета уроку: проаналізувати не лише музичну спадщину, а й громадянський подвиг
    митця.'
- section: Буковинське дитинство
  words: 600
  points:
  - Народження 4 березня 1949 року в родині письменника Михайла Івасюка в Кіцмані.
  - 'Родинна атмосфера: культ української книги, пісні та інтелектуальної праці.'
  - 'Ранній музичний талант: навчання гри на скрипці з 5 років, абсолютний слух.'
  - Вплив буковинського фольклору на формування естетичних смаків майбутнього композитора.
- section: Студентські роки та перші пісні
  words: 700
  points:
  - Навчання в Чернівецькому медичному інституті та паралельна музична діяльність.
  - 'Інцидент з погруддям Леніна (1966) та його наслідки: виключення, робота на заводі
    ''Легмаш''.'
  - Створення ансамблю 'Буковина' та перші авторські твори ('Ласкаво просимо').
  - Народження шедевру 'Я піду в далекі гори' та пошук власного стилю.
- section: Тріумф Червоної рути
  words: 800
  points:
  - 'Історія створення пісні (1968): віднайдення легенди про квітку в збірці коломийок.'
  - '13 вересня 1970 року: історичний виступ на Театральній площі Чернівців з Оленою
    Кузнєцовою.'
  - 'Тріумф на ''Пісні-71'' у Москві: як українська пісня підкорила радянський ефір.'
  - Тріо Зінкевич-Яремчук-Івасюк та початок золотої ери української естради.
- section: Творча спадщина
  words: 800
  points:
  - Переїзд до Львова (1972) та навчання в консерваторії в класі А. Кос-Анатольського.
  - 'Плідна співпраця з Софією Ротару: ''Водограй'', ''Два перстені'', ''У долі своя
    весна''.'
  - 'Експерименти з жанрами: інструментальні сюїти, музика до вистав, камерні твори.'
  - Поетичний талант Івасюка та його робота з текстами (співпраця з поетами Р. Кудликом,
    Б. Стельмахом).
- section: Загадкова смерть
  words: 800
  points:
  - 'Квітень 1979 року: тиск з боку органів КДБ, виклики на ''бесіди'', стеження.'
  - Хронологія зникнення 24 квітня та виявлення тіла 18 травня у Брюховицькому лісі.
  - 'Суперечності офіційної версії ''самогубства'': сліди катувань, інсценування,
    знищення доказів.'
  - Похорон 22 травня 1979 року на Личаківському цвинтарі як масова акція громадянської
    непокори.
- section: Дискусія — Мистецтво як опір
  words: 800
  points:
  - Заборона творчості Івасюка в 1980-х та спроби стерти пам'ять про нього.
  - Фестиваль 'Червона рута' 1989 року як культурний вибух перед здобуттям незалежності.
  - 'Сучасна оцінка: Івасюк як символ незламності українського духу.'
  - 'Деколонізаційний погляд: чому імперія вбиває талановитих українців (паралелі
    з Леонтовичем, Симоненком).'
