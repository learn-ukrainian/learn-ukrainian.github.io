slug: ivan-lypa
title: 'Іван Липа: Лікар і письменник'
word_target: 5000
content_outline:
- section: Вступ — Лікар душ українських
  words: 400
  points:
  - Унікальне поєднання прагматичного лікаря та візіонера-ідеолога української державності
  - Життєвий шлях від Керчі до Винників як уособлення ідеї географічної соборності
    України
  - Роль засновника Братства тарасівців та архітектора перших державних інституцій
    УНР
- section: 'Юність та освіта (1865-1891): I — Коріння та родина'
  words: 400
  points:
  - Народження 24 лютого 1865 року в Керчі в родині відставного солдата
  - 'Визначальний вплив матері Ганни Житецької: генетичний зв''язок з полтавськими
    козаками-мазепинцями'
  - Родинна пам'ять як антиімперське щеплення, що вберегло від російської асиміляції
  - Успішне закінчення Олександрівської гімназії та перші кроки до громадського життя
- section: 'Юність та освіта (1865-1891): II — Харківський університет'
