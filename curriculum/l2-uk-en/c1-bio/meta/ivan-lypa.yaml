  - 'Світоглядна еволюція: відмова від популярного тоді драгоманівського соціалізму'
  - Остаточний вибір шляху боротьби за цілковиту державну незалежність
- section: 'Братство тарасівців (1891-1898): I — Канівська клятва'
  words: 500
  points:
  - Заснування таємної організації на могилі Тараса Шевченка в Каневі (1891 рік)
