slug: knyazhna-anna-yaroslavna
title: 'Анна Ярославна: Королева Франції'
word_target: 5000
content_outline:
- section: Вступ — Руська княжна на престолі Франції
  words: 500
  points:
  - Анна Ярославна як потужний маркер європейської інтеграції Київської Русі в XI
    столітті та символ міжнародного престижу династії.
  - Шлюб із Генріхом I Капетингом (1051) як прорахований геополітичний крок через
    папську заборону на кровозмішення в Європі.
  - Спростування імперського міфу про 'Анну Русскую' (Anne de Russie) та ідентифікація
    її у французьких хроніках як доньки 'короля рутенів' (Rex Rutenorum).
  - Реймське Євангеліє та його зв'язок із постаттю королеви як священної книги французької
    та української історії.
- section: 'Життєпис: I — Дитинство та посольство'
  words: 600
  points:
  - Київське дитинство (бл. 1024-1050 рр.) у високорозвиненому середовищі при дворі
    Великого князя Ярослава Мудрого та здобуття прекрасної освіти.
  - Прибуття у 1048 році посольства від Генріха I на чолі з єпископом Шалонським Готьє
    Савояром, який був вражений багатством та розмірами Києва.
  - Подорож до Франції (1050-1051 рр.) через Краків, Прагу та Регенсбург, що контрастувала
    з суворими європейськими реаліями.
- section: 'Життєпис: II — Коронація та життя в Парижі'
  words: 600
  points:
  - Вінчання та коронація Анни 19 травня 1051 року в соборі міста Реймс.
  - Народження спадкоємця Філіпа у 1052 році як виконання головного династичного завдання.
  - Статус королеви-матері та рівноправної правительки, активна залученість до державних
    справ.
  - Підтвердження впливу Анни на офіційних хартіях з приміткою 'згодилася дружина
    моя Анна' та 'в присутності королеви Анни'.
- section: Історичний контекст
  words: 700
  points:
  - Династія Ярослава Мудрого як 'тесть Європи' та централізована потужна імперія
    з розвиненою урбаністикою (кам'яна архітектура Софії Київської).
  - 'Стан Франції в XI столітті: номінальна королівська влада Капетингів, домен яких
    обмежувався смугою між Парижем та Орлеаном (Іль-де-Франс).'
  - Феодальна анархія, міжусобиці та низький рівень урбанізації і писемності у Західній
    Європі того часу.
  - Фальшивий 'Лист Анни до батька' про 'варварську країну' (літературна містифікація
    XIX ст.) як ідеальна ілюстрація реального історичного контрасту та культурного
    шоку.
- section: 'Внесок: I — Культурний вплив на французький двір'
  words: 600
  points:
  - Особиста висока освіченість королеви на тлі багатьох неписьменних європейських
    монархів (зокрема її чоловіка Генріха I).
  - Власноручний підпис Анни на акті 1063 року 'АНА РЪИНА' — найдавніший автограф
    Рюриковичів і єдиний кириличний підпис французького монарха.
  - Введення грецького імені Філіп у французький ономастикон, яке до того практично
    не використовувалося у Західній Європі.
  - Привнесення візантійсько-київського етикету та легендарної особистої бібліотеки
    до двору Капетингів.
- section: 'Внесок: II — Заснування монастиря святого Вікентія'
  words: 500
  points:
  - 'Виконання релігійної обітниці: фінансування та заснування абатства Святого Вікентія
    (Сен-Венсан) у місті Санліс у 1060-х роках.'
  - Значення монастиря як важливого культурного та духовного осередку Франції.
  - Формування культурного мосту між сходом і заходом Європи через меценатську діяльність
    королеви.
- section: 'Останні роки: I — Регентство при синові Філіпові I'
  words: 400
  points:
  - Смерть короля Генріха I у 1060 році та перехід управління державою до Анни як
    регентки.
  - Співпраця у регентстві з графом Бодуеном Фландрським при малолітньому сині-спадкоємці.
  - Продовження активної політичної ролі 'королеви-матері' у Французькому королівстві.
- section: 'Останні роки: II — Другий шлюб та вшанування пам''яті'
  words: 500
  points:
  - Скандальний шлюб близько 1061 року з могутнім графом Раулем IV де Крепі всупереч
    правилам Церкви.
  - 'Вияв незалежної політичної фігури (справжньої ''агентності''): конфлікт із Папою
    Олександром II та відлучення пари від церкви.'
  - Повернення Анни до двору сина-короля після смерті Рауля (1074) та останні підписи
    на офіційних указах до 1075 року.
  - Смерть та подальше вшанування пам'яті у Санлісі.
- section: Спадщина
  words: 400
  points:
  - 'Реймське Євангеліє: сучасні текстологічні дослідження походження кириличної частини
    як пам''ятки давньокиївської писемності.'
  - 'Вшанування пам''яті у Франції: пам''ятник у місті Санліс та діяльність Культурного
    центру Анни Київської.'
  - 'Протидія російській пропаганді: збереження історичної справедливості щодо терміна
    ''Анна Київська'' (Anne de Kiev) проти ''Anne de Russie''.'
  - Династичні зв'язки Капетингів з Руссю та їхнє значення для української європейської
    спадщини.
- section: Підсумок
  words: 200
  points:
  - Анна Ярославна як міст між цивілізаціями та квінтесенція 'теорії-перш-за-все'.
  - 'Підтверджена агентність королеви: вона була не мовчазним ''шлюбним трофеєм'',
    а вольовою і впливовою політичною діячкою.'
  - Деколонізація біографії Анни як ключовий крок у захисті української середньовічної
    ідентичності.
