slug: knyazhna-anna-yaroslavna
title: 'Анна Ярославна: Королева Франції'
word_target: 5000
content_outline:
- section: Вступ — Руська княжна на престолі Франції
  words: 500
  points:
  - Анна Ярославна як символ династичних зв'язків Києва та Європи XI ст. — результат
    політики Ярослава Мудрого.
  - 'Геополітичний контекст шлюбу: папська заборона на кровозмішення змусила Генріха
    I шукати наречену на сході.'
  - 'Деколонізація імені: чітке розрізнення ''Anne de Kiev'' та імперського міфу ''Anne
    de Russie''.'
  - 'Огляд джерельної бази: від скупих французьких хронік до українських літописів.'
- section: 'Життєпис: I — Київське дитинство та шлюбний альянс'
  words: 600
  points:
  - 'Виховання при дворі Ярослава Мудрого: атмосфера ''книжності'' та високий рівень
    жіночої освіти в Русі.'
  - 'Посольство єпископа Готьє до Києва: складна логістика переговорів та шлюбної
    угоди.'
  - 'Подорож до Франції (1050–1051): маршрут через Краків, Прагу, Регенсбург та культурний
    шок від європейських доріг.'
- section: 'Життєпис: II — Коронація та життя в Парижі'
  words: 600
  points:
  - Коронація в Реймсі (травень 1051) та народження спадкоємця Філіпа (1052).
  - 'Статус королеви-матері: участь у державних справах та підписи на грамотах ''згодилася
    дружина моя''.'
  - Народження інших дітей (Роберт, Гуго) та зміцнення династії Капетингів.
- section: Історичний контекст
  words: 800
  points:
  - 'Франція XI століття: слабкість королівської влади, феодальна роздробленість та
    обмежений королівський домен.'
  - 'Контраст з Києвом: урбаністика, грамотність та централізація влади в імперії
    Ярослава.'
  - 'Розвінчання міфу: аналіз псевдо-листа Анни до батька про ''варварську країну''
    як літературної містифікації XIX ст.'
  - Релігійний фактор та роль церкви у легітимізації влади.
- section: Внесок
  words: 800
  points:
  - 'Унікальний автограф ''АНА РЪИНА'': кирилична транслітерація та єдиний кириличний
    підпис монарха Франції.'
  - Введення грецького імені 'Філіп' у французький королівський ономастикон — екзотика,
    що стала традицією.
  - Заснування абатства Святого Вікентія (Сен-Венсан) у Санлісі (1065) як виконання
    обітниці.
  - 'Культурний трансфер: освіченість Анни на тлі неписьменних французьких баронів.'
- section: Останні роки
  words: 800
  points:
  - 'Регентство при малолітньому Філіпові I (1060–1061): унікальний тандем з Бодуеном
    Фландрським.'
  - 'Скандальний шлюб з графом Раулем де Крепі (1061): викрадення чи свідомий вибір?'
  - 'Конфлікт з церквою та відлучення Рауля: Анна між почуттями та короною.'
  - Повернення до двору після смерті другого чоловіка (1074) та останні документальні
    згадки (бл. 1075).
- section: Спадщина
  words: 700
  points:
  - 'Реймське Євангеліє: історія та легенди про ''коронаційну книгу'' французьких
    королів, пов''язану з Анною.'
  - 'Санліс як місце пам''яті: скульптура XIX століття та сучасний Культурний центр
    Анни Київської.'
  - 'Боротьба за історичну правду: спроби російської пропаганди привласнити постать
    ''Анни Русской''.'
  - 'Образ Анни в літературі та мистецтві: від романтичних опер до сучасної белетристики.'
- section: Підсумок
  words: 300
  points:
  - Анна Ярославна як успішний приклад 'м'якої сили' Київської Русі в Європі.
  - Історичне значення її підпису як неспростовного доказу київської ідентичності.
  - Відмова від романтичних міфів на користь образу сильної політичної діячки Середньовіччя.
