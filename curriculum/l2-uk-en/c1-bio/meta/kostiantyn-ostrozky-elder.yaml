slug: kostiantyn-ostrozky-elder
title: 'Костянтин Іванович Острозький: Гетьман двох народів'
word_target: 5000
content_outline:
- section: Вступ — Гетьман двох народів
  words: 600
  points:
  - 'Титулярна вершина: Великий гетьман Литовський, воєвода Троцький, каштелян Віленський'
  - 'Феномен ''Scipio Ruthenus'': оцінка папського легата Пізоні та 33 (63) перемоги
    князя'
  - 'Парадокс ідентичності: православний магнат як опора католицької монархії Ягеллонів'
  - 'Втрачена епітафія Успенського собору: джерело про ''63 перемоги'' та ''мужність
    Ромула'''
- section: 'Життєпис: I — Ранні роки та московський полон'
  words: 1000
  points:
  - 'Волинське коріння: походження від Рюриковичів (Данила Галицького) та статус ''княжати'''
  - 'Перша булава: призначення гетьманом (1497) та ранні успіхи у війні з татарами'
  - 'Катастрофа під Ведрошею (1500): розгром литовського війська та полон головнокомандувача'
  - 'Сім років тиску: відмова прийняти ''московську віру'' та служити Василю III'
  - 'Втеча (1507): примусова присяга та драматичний відхід ''татарським шляхом'' через
    ліси на Волинь'
- section: 'Життєпис: II — Тріумф під Оршею'
  words: 1200
  points:
  - 'Повернення довіри: Сигізмунд I та відновлення Острозького в правах (''noster
    fidelis'')'
  - 'Кампанія 1514 року: зупинка 80-тисячної московської армії на Дніпрі'
  - 'Тактичний геній: нічна переправа через наплавний міст та артилерійська засідка'
  - 'Розгром: знищення цвіту московського боярства та зупинка експансії на Захід'
  - 'Європейський резонанс: Орша як перемога ''цивілізації над варварством'' у тогочасній
    пресі'
- section: 'Життєпис: III — Останні роки та вічний спочинок'
  words: 800
  points:
  - 'Тріумфатор у Вільнюсі: будівництво церкви Святої Трійці на честь перемоги'
  - 'Воєвода Троцький (1522): злам ''скляної стелі'' Городельської унії для православних'
  - 'Битва під Ольшаницею (1527): остаточний розгром татарської орди та звільнення
    полонених'
  - 'Смерть (1530) та поховання в Києво-Печерській лаврі: символічне єднання з київською
    святістю'
- section: Історичний контекст
  words: 600
  points:
  - 'Велике князівство Литовське: формула ''вільні з вільними, рівні з рівними'''
  - 'Московська ідеологія: доктрина ''Третього Риму'' та претензії на спадщину Київської
    Русі'
  - 'Татарський фронт: постійна екзистенційна загроза та роль Острозького як ''Щита
    Русі'''
  - 'Правовий статус: боротьба за рівноправність руської шляхти в католицькій державі'
- section: Внесок та Спадщина
  words: 800
  points:
  - 'Меценатство: розбудова Острога, Межиріцького монастиря та храмів у Вільнюсі'
  - 'Захисник Церкви: отримання привілеїв для православ''я (1511) та підтримка кліру'
  - 'Династичний фундамент: створення матеріальної бази для сина Василя-Костянтина
    (майбутнього просвітника)'
  - 'Меморіальна війна: знищення надгробка радянською владою (1941) та його відновлення
    (2021)'
- section: Порівняльний аналіз
  words: 600
  points:
  - 'Острозький vs Вишневецький: системний державний діяч проти козацького авантюриста'
  - 'Еволюція війни: від важкої лицарської кінноти до маневреної піхоти та ''вогняного
    бою'''
  - 'Ідентичність: ''Gente Ruthenus, natione Polonus'' (політична нація Речі Посполитої)'
  - 'Кінець епохи: Острозький як останній великий князь середньовічного зразка'
