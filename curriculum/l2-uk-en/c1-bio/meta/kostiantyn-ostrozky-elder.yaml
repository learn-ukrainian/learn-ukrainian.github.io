slug: kostiantyn-ostrozky-elder
title: 'Костянтин Іванович Острозький: Гетьман двох народів'
word_target: 5000
content_outline:
- section: Вступ — Гетьман двох народів
  words: 500
  points:
  - Призначення першим Великим гетьманом Литовським у 1497 році.
  - Статус православного магната як ключової опори католицької держави Ягеллонів.
  - Здобуття 33 (а за іншими даними епітафії — 63) великих перемог та титул «Сципіон
    Руський» від тогочасних гуманістів.
  - Руйнування імперського міфу про одвічне тяжіння українців до Москви через постать
    найуспішнішого полководця-русина.
- section: 'Життєпис: I — Ранні роки, походження та боротьба з татарами'
  words: 600
  points:
  - Походження з давнього волинського роду, що виводив свій родовід від Рюриковичів
    та Данила Галицького.
  - Стрімкий початок військової кар'єри та успішні розгроми кримських татар на південних
    кордонах.
  - Формування авторитету Костянтина як надійного захисника Великого князівства Литовського.
- section: 'Життєпис: II — Московсько-литовські війни та гіркий полон'
  words: 700
  points:
  - Катастрофічна поразка литовсько-руського війська в битві над Ведрошею (1500) та
    потрапляння у полон.
  - 'Сім важких років тиску з боку Василя III: спроби змусити видатного полководця
    служити Москві під загрозою довічного ув''язнення.'
  - Змушене складання присяги (1506) та блискуча втеча «татарським шляхом» через ліси
    на Волинь під прикриттям інспекції військ (1507).
- section: 'Життєпис: III — Битва під Оршею (1514) — тріумф тактики'
  words: 900
  points:
  - Відновлення на посаді головнокомандувача та зіткнення 30-тисячного об'єднаного
    війська з 80-тисячною армією Івана Челядніна (8 вересня 1514 р.).
  - 'Військовий геній: таємна нічна переправа через Дніпро та використання наплавних
    мостів.'
  - 'Вирішальний маневр: удаваний відступ важкої кінноти, що заманив московитів під
    смертоносний залп прихованої артилерії.'
  - Знищення цвіту московського боярства та масштабна європейська пропагандистська
    кампанія на честь перемоги (видання летючих листків у Римі та Нюрнберзі).
- section: 'Життєпис: IV — Останні роки та поховання в Лаврі'
  words: 500
  points:
  - Здобуття блискучої перемоги над татарами під Ольшаницею (1527), яку сучасники
    назвали «другою Оршею».
  - 'Призначення воєводою троцьким у 1522 році: подолання дискримінаційної норми Городельської
    унії для православних у ВКЛ.'
  - Смерть (1530) та урочисте поховання в Успенському соборі Києво-Печерської лаври,
    що символічно цементувало його зв'язок із духовною спадщиною давнього Києва.
- section: Історичний контекст
  words: 600
  points:
  - Велике князівство Литовське як держава, де русини (українці та білоруси) були
    автохтонними співтворцями.
  - Протистояння агресивній доктрині «Третього Риму», яка виправдовувала загарбницькі
    війни удаваним «захистом єдиновірців».
  - Роль Острозького як «щита Русі», що відбивав екзистенційні загрози як від татар
    з півдня, так і від московитів зі сходу.
- section: 'Внесок та Спадщина: I — Захисник православ''я та фундатор'
  words: 500
  points:
  - Отримання привілеїв від польського короля і Сигізмунда I на будівництво мурованих
    православних храмів у католицькому Вільнюсі.
  - Колосальні пожертви та надання маєтностей Києво-Печерській лаврі.
  - Використання свого беззаперечного військового та політичного авторитету для системного
    захисту Православної церкви в державі.
- section: 'Внесок та Спадщина: II — Династичний підйом та пам''ять про Оршу'
  words: 400
  points:
  - Створення надзвичайно потужної економічної бази (володіння третиною Волині), що
    стала фундаментом для меценатства його сина Василя-Костянтина.
  - 'Орша як символ європейської єдності: зупинка московської експансії на Захід та
    збереження європейського вектора розвитку.'
  - 'Меморіальна війна: знищення розкішного ренесансного надгробка Острозького у 1941
    році та його філігранне відновлення у 2021 році.'
- section: Порівняльний аналіз
  words: 500
  points:
  - 'Острозький vs. Вишневецький: системний державний діяч, стратег і дипломат регулярної
    армії проти волелюбного козацького ватажка.'
  - 'Еволюція військової тактики: Орша як яскравий приклад переходу від таранного
    удару середньовічної кінноти до модерної комбінованої війни Нового часу.'
  - 'Ідентичність русинської шляхти: формування складної ідентичності (Gente Ruthenus,
    natione Polonus/Lituanus), де збереження конфесії поєднувалося з відданістю державним
    обов''язкам.'
