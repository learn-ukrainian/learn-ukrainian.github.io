  - 'Суть реформи: перехід від етнографічного побутописання до інтелектуального авангарду'
  - 'Трагічний парадокс: творець світового рівня, знищений провінційною тоталітарною
    системою'
- section: Ранні роки та становлення (1887-1916)
  words: 800
  points:
  - 'Галицьке коріння: народження в акторській родині Яновичів, атмосфера театру з
