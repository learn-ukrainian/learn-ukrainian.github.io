  - 'Тандем геніїв: співпраця з Миколою Кулішем («Народний Малахій», «Мина Мазайло»)'
  - '«Маклена Граса» (1933): остання вистава-попередження та крах ілюзій'
  - 'Літературна дискусія: Курбас як ідеолог культурної незалежності (разом з Хвильовим)'
- section: Театральна революція та естетика
  words: 1000
  points:
  - 'Система «перетворення»: актор не імітує життя, а створює нову художню реальність'
