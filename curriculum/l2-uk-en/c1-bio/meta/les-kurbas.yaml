slug: les-kurbas
title: 'Лесь Курбас: Реформатор театру'
word_target: 5000
content_outline:
- section: Вступ — Людина, що перевернула театр
  words: 600
  points:
  - 'Лесь Курбас: режисер, філософ, європеєць, який змінив код української культури'
