slug: oleksa-slisarenko
title: 'Олекса Слісаренко: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Поет, футурист, бунтар'
  words: 400
  points:
  - 'Олекса Слісаренко: постать, що поєднала непоєднуване (агроном, офіцер, поет-модерніст).'
  - Від символізму до вершини пригодницького жанру 1920-х років.
  - Людина, яка не побоялася кинути виклик 'пролетарському ідолу' Максиму Горькому.
- section: 'Ранні роки: Від землі до зброї'
  words: 600
  points:
  - Дитинство на Харківщині (хутір Канівцеве) та фахова агрономічна освіта.
  - 'Перша світова війна: шлях від рядового до офіцера артилерії.'
  - 'Вплив фронтового досвіду на формування характеру: дисципліна, рішучість, лаконізм.'
  - 'Переїзд до Києва 1918 року: початок літературного шляху в епіцентрі революції.'
- section: 'Еволюція митця: Від ''Білої студії'' до футуризму'
  words: 800
  points:
  - 'Пошуки власного голосу: участь у групах ''Біла студія'' та ''Музагет''.'
  - 'Символістський дебют: збірка ''На березі Кастальському'' (1919).'
  - 'Футуристичний поворот: ''Комкосмос'' та віра в урбаністичне майбутнє.'
  - Поетична творчість як лабораторія для відточення стилю майбутнього прозаїка.
- section: 'Король українського бестселера: Пригодницька проза'
  words: 1000
  points:
  - 'Злам 1924 року: перехід до прози та переїзд до Харкова.'
  - 'Створення українського ''екшну'': романи ''Чорний ангел'', ''Зламаний ґвинт''.'
  - 'Секрет успіху: динамічний сюжет, заплутана інтрига, ''англійський'' стиль на
    українському ґрунті.'
  - 'Величезна популярність серед читачів 1920-х: тиражі та перевидання.'
- section: 'На вістрі боротьби: ВАПЛІТЕ і ''казус Горького'''
  words: 800
  points:
  - 'Членство у ВАПЛІТЕ: ідеологічна близькість з Хвильовим та Йогансеном.'
  - Співпраця з 'Універсальним журналом' та 'Техно-мистецькою групою А'.
  - 'Мовна дискусія 1927 року: запит до Максима Горького на переклад роману ''Мати''.'
  - Шовіністична відповідь Горького про 'нарєчіє' та гідна відсіч Слісаренка.
  - 'Політичні наслідки конфлікту: мітка ''націоналіста'' від системи.'
- section: 'У лещатах терору: Арешт і Соловки'
  words: 800
  points:
  - 'Квітень 1934 року: арешт за сфабрикованим звинуваченням у тероризмі.'
  - 'Вирок: 10 років таборів. Етап на Соловки.'
  - 'Життя в таборі: спогади Семена Підгайного про незламність духу Слісаренка.'
  - 'Трагедія Сандармоху: розстріл 3 листопада 1937 року ''на честь ювілею революції''.'
  - Брехня про смерть у 1943 році та приховування правди радянською владою.
- section: 'Спадщина: Повернення із забуття'
  words: 600
  points:
  - 'Реабілітація 1957 року: юридична, але не повна літературна.'
  - Значення творчості Слісаренка для розвитку жанрової літератури.
  - 'Вулиця Олекси Слісаренка (2024): сучасне вшанування пам''яті.'
  - Місце Слісаренка в пантеоні Розстріляного відродження.
