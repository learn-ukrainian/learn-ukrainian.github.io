slug: yulian-bachynskyi
title: 'Юліан Бачинський: Теоретик незалежності'
word_target: 5000
content_outline:
- section: Вступ — Пророк незалежності
  words: 600
  points:
  - '1895 рік як точка неповернення в українській політичній думці: від культурництва
    до політики.'
  - 'Концепція ''Україна irredenta'': шок для сучасників та федералістів.'
  - 'Бачинський проти Драгоманова: зміна поколінь і парадигм.'
  - 'Трагічна доля пророка: забуття та репресії як ціна за далекоглядність.'
- section: Галицьке походження та формування
  words: 600
  points:
  - 'Родина та освіта: від ректорського сина до радикала.'
  - Інтелектуальна атмосфера Львова та вплив Івана Франка.
  - 'Берлінські студії: знайомство з європейським марксизмом.'
  - Утворення РУРП та молодіжний бунт проти 'старих' народовців.
- section: 'Україна irredenta: Економічний фундамент'
  words: 800
  points:
  - 'Головна теза: політична самостійність як економічна необхідність.'
  - Аргумент про ринки збуту та капіталістичну конкуренцію.
  - 'Геополітика торгівлі: чому інтереси України та Росії розходяться.'
  - Відхід від романтичного етнографізму до прагматичного розрахунку.
- section: 'Україна irredenta: Політичний ідеал'
  words: 800
  points:
  - Гасло 'Вільна, велика, незалежна Україна від Сяну по Кавказ'.
  - Соборність як невід'ємна частина ідеї незалежності.
  - 'Рецепція твору: критика Костя Левицького та підтримка молоді.'
  - Вплив на Міхновського та майбутній самостійницький рух.
- section: Соціалізм і національне питання
  words: 700
  points:
  - 'Унікальний синтез: як бути марксистом і націоналістом водночас.'
  - Полеміка з польськими та російськими соціал-демократами.
  - 'Концепція: національне визволення як етап соціальної революції.'
  - 'Чому пролетаріату потрібна власна держава: аргументи Бачинського.'
- section: Політична діяльність та дипломатія
  words: 700
  points:
  - Лідерство в УСДП та участь у революційних подіях 1917–1918.
  - 'Місія у Вашингтоні (1919–1921): боротьба за визнання УНР.'
  - 'Зіткнення з геополітичною реальністю: проросійське лобі в США.'
  - Публіцистика та спроби прорвати інформаційну блокаду.
- section: 'Фатальна ілюзія: Еміграція та повернення'
  words: 800
  points:
  - 'Еміграційний період: Берлін, Відень, конфлікти з правими.'
  - 'Радянофільство 1920-х: віра в ''червону Україну'' як етап державності.'
  - 'Трагічне повернення 1933 року: приїзд у Харків під час Голодомору.'
  - Арешт 1934 року, звинувачення в тероризмі та загибель у ГУЛАГу (1940).
- section: Дискусія — Спадщина та уроки
  words: 400
  points:
  - Чому Бачинський менш відомий за Грушевського чи Франка?
  - Актуальність його економічних аргументів для сучасної України.
  - 'Урок ''радянофільства'': ціна компромісу з тоталітаризмом.'
  - Бачинський як символ інтелектуальної чесності та трагічної долі.
