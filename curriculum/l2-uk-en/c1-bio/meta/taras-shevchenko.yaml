slug: taras-shevchenko
title: 'Тарас Шевченко: Національний Пророк'
word_target: 5000
content_outline:
- section: Вступ — Більше ніж поет
  words: 600
  points:
  - 'Феномен Шевченка: від кріпака до духовного батька модерної нації.'
  - 'Руйнування міфу про «селянського поета»: Шевченко як європейський інтелектуал
    та академік.'
  - 'Актуальність спадщини: чому його слова звучать пророчо під час сучасної війни.'
  - Огляд життєвого шляху крізь призму боротьби за гідність (людську і національну).
- section: 'Кріпацтво та ранні роки: Формування характеру'
  words: 700
  points:
  - 'Дитинство в Моринцях та Кирилівці: сирітство, школа дяка, перші уроки малювання.'
  - 'Козацька пам''ять: розповіді діда Івана про Гайдамаччину як фундамент історичної
    свідомості.'
  - 'Служба «козачком» у Енгельгардта: подорож до Вільна та Петербурга (1831).'
  - Малювання як форма внутрішнього спротиву та втечі від рабської реальності.
- section: 'Викуп та становлення митця: Ціна свободи'
  words: 800
  points:
  - 'Зустріч у Літньому саду з Іваном Сошенком: входження у коло мистецької еліти.'
  - Роль Карла Брюллова, Василя Жуковського та Євгена Гребінки в організації викупу.
  - 'Лотерея 22 квітня 1838 року: 2500 рублів як еквівалент 45 кг срібла (деталі угоди).'
  - 'Навчання в Академії мистецтв: улюблений учень Брюллова, розквіт таланту живописця.'
- section: 'Кобзар та пробудження нації: Слово як зброя'
  words: 800
  points:
  - 'Вихід «Кобзаря» (1840): літературний вибух, що змінив статус української мови.'
  - 'Поеми «Гайдамаки» (1841) та «Гамалія»: реконструкція героїчного минулого для
    конструювання майбутнього.'
  - 'Період «трьох літ» (1843-1845): подорожі Україною, шок від руїни та соціальної
    несправедливості.'
  - 'Політична поезія («Сон», «Кавказ», «І мертвим, і живим...»): перехід від романтизму
    до політичного радикалізму.'
- section: 'Кирило-Мефодіївське братство та заслання: Голгофа'
  words: 800
  points:
  - 'Зближення з Костомаровим та Кулішем (1846): ідеї слов''янської федерації та «Книги
    буття українського народу».'
  - 'Арешт 5 квітня 1847 року: вилучення рукописів «Трьох літ» як головний доказ «злочину».'
  - 'Вирок Миколи I: «із забороною писати й малювати» як спроба духовної страти.'
  - 'Десять років солдатчини (Оренбург, Орська фортеця, Новопетровське укріплення):
    боротьба за збереження людської гідності.'
  - 'Аральська експедиція (1848-1849): Шевченко як художник-дослідник (порушення царської
    заборони).'
- section: 'Останні роки та безсмертя: Академік і Пророк'
  words: 700
  points:
  - 'Повернення із заслання (1857): тріумфальна зустріч інтелігенцією, але під наглядом
    поліції.'
  - Остання подорож в Україну (1859) та третій арешт.
  - 'Звання Академіка гравюри (1860): визнання майстерності в техніці офорту.'
  - 'Смерть 10 березня 1861 року та виконання «Заповіту»: перепоховання на Чернечій
    горі як національна маніфестація.'
- section: Дискусія — Шевченко в деколонізаційному дискурсі
  words: 600
  points:
  - 'Поема «Кавказ»: солідарність колонізованих народів проти імперії («Борітеся —
    поборете!»).'
  - 'Деконструкція радянського міфу про «атеїста-революціонера»: релігійність та етична
    основа творчості.'
  - 'Шевченко і сучасна війна: як його тексти стали символами опору російській агресії.'
  - 'Значення Шевченка для світової культури: універсальність заклику до свободи.'
