slug: yuriy-nemyrych
title: 'Юрій Немирич: Дипломат і мислитель'
word_target: 5000
content_outline:
- section: Вступ — Архітектор нездійсненної держави
  words: 400
  points:
  - 'Юрій Немирич як унікальний феномен: європейський інтелектуал-гуманіст у козацькому
    таборі.'
  - Візія Великого Князівства Руського як «Сполучених Штатів Східної Європи» (прообраз
    федералізму).
  - 'Трагізм постаті: випередження свого часу та нерозуміння сучасниками.'
- section: 'Життєпис: I — Європейська освіта та ранні погляди'
  words: 500
  points:
  - Походження з давнього роду Немиричів (герб Клямри); народження в Овручі 1612 р.
  - '«Grand Tour» Європою: навчання в Лейдені, Оксфорді, Кембриджі, Парижі та Базелі.'
  - 'Публікація трактату «Discursus de bello Moscovitico» (1632): раннє усвідомлення
    загрози московського деспотизму.'
  - Вплив західної політичної думки (Гуго Гроцій) та протестантської етики.
- section: 'Життєпис: II — Від шляхтича до козацького канцлера'
  words: 500
  points:
  - Військова служба Владиславу IV та участь у війнах 1630-40-х років.
  - Шведський «Потоп» 1655 р. і перехід на бік Карла X Густава.
  - Повернення в Україну (1657) та союз із гетьманом Іваном Виговським.
  - 'Релігійний маневр: перехід з аріанства у православ''я (ім''я Георгій) заради
    політичної легітимності.'
- section: 'Історичний контекст: I — Криза Речі Посполитої'
  words: 400
  points:
  - 'Шляхетська республіка vs Козацька вольниця: конфлікт двох політичних культур.'
  - Нездатність Варшави реформувати унію «двох народів» у триєдину федерацію до 1658
    р.
  - Пошук «третього шляху» між польським домінуванням та московським поглинанням.
- section: 'Історичний контекст: II — Протестантська етика та «Кепська реформація»'
  words: 400
  points:
  - Феномен українського соцініанства (аріанства) та Київський інтелектуальний гурток.
  - Роль протестантської шляхти у формуванні ранньомодерної нації.
  - Толерантність Немирича як виклик релігійному фанатизму епохи.
- section: 'Внесок: I — Архітектура Гадяцької унії'
  words: 600
  points:
  - 'Гадяцький договір 1658 р.: юридичне оформлення Великого Князівства Руського.'
  - 'Три стовпи держави: власна судова система, скарбниця, армія (30 тис. козаків
    + 10 тис. найманців).'
  - 'Освітній проект: надання Києво-Могилянській колегії статусу академії та відкриття
    другого університету.'
  - Скасування Берестейської унії (в проекті) та гарантії свободи віросповідання.
- section: 'Внесок: II — Дипломатичний фронт'
  words: 600
  points:
  - 'Варшавська промова 1659 р.: «Вільні до вільних, рівні до рівних».'
  - Дипломатична місія до Швеції та пошук союзників проти Москви.
  - Спроба побудови антимосковської коаліції (Крим, Швеція, Трансільванія).
- section: 'Останні роки: I — Тріумф під Конотопом'
  words: 500
  points:
  - Участь Немирича в організації Конотопської битви (червень 1659).
  - Військовий талант канцлера та координація союзницьких військ.
  - Тактична перемога зброї, що не стала стратегічною перемогою політики.
- section: 'Останні роки: II — Загибель візіонера'
  words: 500
  points:
  - 'Інформаційна війна Москви: використання жупела «єретика» та «ляха» проти Немирича.'
  - Внутрішня опозиція (Цюцюра, Золотаренко) та бунт на Лівобережжі.
  - 'Загибель у сутичці біля с. Свидовець (серпень 1659): версії та обставини.'
- section: 'Спадщина: Проект «Сполучених Штатів Східної Європи»'
  words: 600
  points:
  - Гадяцька ідея як недосяжний ідеал української державності XVII–XVIII ст.
  - Вплив політичної філософії Немирича на мазепинську еміграцію (Пилип Орлик).
  - 'Деколонізаційний погляд: Немирич не як «польський агент», а як творець руської
    суб''єктності.'
  - Актуальність ідеї балто-чорноморського союзу («безпекового поясу») сьогодні.
- section: Підсумок
  words: 400
  points:
  - Юрій Немирич як символ європейського вибору України.
  - 'Інтелект як зброя: чому його боялася Москва більше за шаблі.'
  - Місце Немирича в пантеоні українських державотворців поруч із Виговським та Мазепою.
