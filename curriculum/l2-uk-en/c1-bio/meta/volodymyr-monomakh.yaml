version: "1.0"
id: c1-bio.volodymyr-monomakh
slug: volodymyr-monomakh
title: 'Володимир Мономах: Укріплювач Русі'
word_target: 5000
content_outline:
- section: Вступ — Останній великий самодержець Києва
  words: 400
  points:
  - Володимир Мономах як символ останньої єдності Київської Русі перед добою роздробленості.
  - 'Унікальний синтез: князь-воїтель (83 походи) та князь-мислитель (автор «Повчання»).'
  - 'Легітимність через походження: нащадок Рюриковичів та візантійської династії
    Мономахів.'
- section: 'Життєпис: I — Становлення та випробування'
  words: 500
  points:
  - 'Ранні роки: княжіння в прикордонних Смоленську та Чернігові.'
  - Постійна боротьба з половецькою загрозою та набуття військового досвіду.
  - Відмова від київського престолу в 1093 році на користь кузена Святополка заради
    уникнення усобиць.
- section: 'Життєпис: II — Дипломатія єдності'
  words: 500
  points:
  - 'Любецький з''їзд 1097 року: спроба стабілізації через принцип «кожен хай держить
    вотчину свою».'
  - Трагедія осліплення Василька Теребовлянського як виклик новим домовленостям.
  - 'Долобський з''їзд 1103 року: об''єднання князів для спільних походів у Степ.'
- section: 'Історичний контекст: I — Виклики доби'
  words: 500
  points:
  - Наростання відцентрових сил феодальної роздробленості.
  - 'Зміна тактики у боротьбі з половцями: від пасивної оборони до превентивних ударів.'
  - Економічна криза та соціальне розшарування у великих містах.
- section: 'Історичний контекст: II — Київське повстання 1113 року'
  words: 600
  points:
  - Смерть Святополка II та вибух соціального невдоволення проти лихварів.
  - 'Київське віче як інструмент прямої демократії: запрошення Мономаха в обхід старшинства.'
  - Легітимізація влади через волю громади та відновлення порядку.
- section: 'Внесок: I — «Устав» та соціальні реформи'
  words: 600
  points:
  - Прийняття «Уставу Володимира Мономаха» як відповідь на вимоги повсталих.
  - Обмеження лихварських відсотків (різів) та захист боржників.
  - 'Правове регулювання статусу закупів: заборона перетворення напіввільних на рабів
    без законних підстав.'
- section: 'Внесок: II — «Повчання дітям»'
  words: 600
  points:
  - 'Унікальність жанру: поєднання автобіографії, політичного заповіту та проповіді.'
  - 'Етичний кодекс правителя: «не дайте сильним погубити людину».'
  - Наголос на освіті, гостинності та особистій відповідальності перед Богом і людьми.
- section: 'Останні роки: Династичний зеніт'
  words: 500
  points:
  - 'Централізація влади: контроль над 75% територій Русі через синів-намісників.'
  - 'Широка міжнародна дипломатія: шлюби нащадків зі скандинавськими та візантійськими
    династіями.'
  - Смерть 1125 року поблизу Переяслава як завершення епохи стабільності.
- section: 'Спадщина: I — Образ в історії'
  words: 400
  points:
  - 'Мономах в українській традиції: зразок мудрого правителя-християнина.'
  - 'Російський імперський наратив: міф про «збирача земель» як прообразу московського
    самодержавства.'
  - 'Юрій Долгорукий: син Мономаха як засновник сепаратистської Суздальської династії.'
- section: 'Спадщина: II — Міф про «Шапку Мономаха»'
  words: 400
  points:
  - Деконструкція головного імперського міфу про передачу візантійських регалій.
  - 'Історична реальність: «Шапка» — золота тюбетейка ординського хана Узбека (XIV
    ст.).'
  - Використання фальсифікату Москвою для обґрунтування претензій на статус «Третього
    Риму».
- section: Підсумок
  words: 300
  points:
  - Правління Мономаха як «золота осінь» Київської Русі.
  - 'Тимчасовість успіху: залежність єдності від особистості лідера, а не інституцій.'
  - Значення постаті для формування української етичної та політичної культури.
