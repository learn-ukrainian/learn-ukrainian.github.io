slug: viacheslav-lypynskyi
title: 'В''ячеслав Липинський: Консерватор-державник'
word_target: 5000
content_outline:
- section: 'Вступ: Український консерватизм як ідея'
  words: 400
  points:
  - Липинський як «архітектор» українського монархізму та найоригінальніший мислитель
    доби.
  - 'Від «хлопоманства» до державництва: еволюція поглядів шляхтича.'
  - Чому ідеї Липинського є антидотом проти сучасного популізму.
- section: Шляхетське коріння та вибір ідентичності
  words: 700
  points:
  - 'Рід Липинських гербу Бродзіч: польська культура, українська земля.'
  - Вплив «Кресов» та середовища «старої громади» в Києві.
  - 'Брошура «Шляхта на Україні» (1909): маніфест політичної асиміляції заради державності.'
  - Концепція «територіального патріотизму» як спосіб об'єднання нації.
- section: 'Історик як державотворець: Переосмислення минулого'
  words: 700
  points:
  - Праця «Україна на переломі» (1920) як інтелектуальна революція.
  - 'Деколонізація образу Хмельницького: від «бунтівника» до монарха-будівничого.'
  - 'Реабілітація шляхти: роль еліти у Козацькій державі.'
  - 'Метод Липинського: історія як інструмент виховання державного класу.'
- section: Гетьманат 1918 року та дипломатична місія
  words: 800
  points:
  - Участь у створенні Української демократично-хліборобської партії (УДХП).
  - 'Посол у Відні: дипломатія «фрака і манер» проти дипломатії «мітингу».'
  - 'Відносини з Павлом Скоропадським: від лояльності до ідеологічного наставництва.'
  - 'Катастрофа 1919 року: чому Липинський порвав з Директорією УНР.'
- section: '«Листи до братів-хліборобів»: Анатомія класократії'
  words: 1000
  points:
  - 'Структура та мета трактату: підручник для майбутньої еліти.'
  - Критика «демократії» як панування некомпетентної інтелігенції та демагогів.
  - 'Класократія: влада органічних виробничих груп (хліборобів, воїнів).'
  - Монархія (Гетьманство) як єдиний спосіб приборкати українську анархію.
- section: 'Еміграція: Будівничий «Ордену» та останні роки'
  words: 600
  points:
  - Заснування Українського союзу хліборобів-державників (УСХД) у 1920 році.
  - 'Життя в Австрії: боротьба з туберкульозом та інтелектуальна самотність.'
  - Конфлікт з гетьманським оточенням та розрив зі Скоропадським (1930).
  - 'Смерть у Перніці та знищення могили радянською владою: символізм пам''яті.'
- section: 'Дискусія: Консерватизм проти народництва'
  words: 800
  points:
  - 'Велика полеміка: Липинський проти Грушевського та Винниченка.'
  - 'Два шляхи: будувати державу для нації чи націю для держави?'
  - 'Спадщина Липинського в сучасній Україні: пошук еліти та інституційна слабкість.'
  - 'Уроки для XXI століття: патріотизм землі проти патріотизму крові.'
