slug: kostiantyn-vasyl-ostrozky
title: 'Костянтин-Василь Острозький: Князь-Просвітник'
word_target: 5000
content_outline:
- section: Вступ — Некоронований король Русі
  words: 600
  points:
  - 'Масштаб особистості: найбагатший магнат Речі Посполитої (2760 сіл, 80 міст),
    чий дохід перевищував королівський.'
  - 'Політичний статус: ''некоронований король Русі'', сенатор, воєвода київський,
    захисник прав шляхти.'
  - 'Стратегічне бачення: розуміння необхідності ''духовної зброї'' (освіти, книгодрукування)
    для збереження ідентичності.'
- section: 'Життєпис: I — Від магната до захисника'
  words: 800
  points:
  - 'Спадкоємець слави: син великого гетьмана Костянтина Івановича (переможця під
    Оршею), виховання в православній традиції.'
  - 'Політичний зліт: отримання уряду маршалка волинського (1550) та воєводи київського
    (1559).'
  - 'Розбудова Острога: перетворення родинного гнізда на резиденцію європейського
    рівня, культурний осередок.'
  - 'Люблінська унія 1569: адаптація до нових умов Речі Посполитої, захист прав Волині
    та Київщини.'
- section: 'Життєпис: II — Доба великих викликів'
  words: 1000
  points:
  - 'Релігійна дипломатія: спроби порозуміння з Римом та Константинополем, пошук моделі
    єдності церкви.'
  - 'Берестейська унія 1596: драматичний розрив з ієрархією, перехід в жорстку опозицію,
    лідерство в антиунійному таборі.'
  - 'Останні роки: конфлікт з королем Сигізмундом III, підтримка православних братств,
    меценатство.'
  - 'Особиста трагедія: поступовий перехід нащадків у католицизм, самотність патріарха.'
- section: Історичний контекст
  words: 800
  points:
  - 'Криза православ''я: стан ''темної і німої'' церкви, відсутність шкіл та освіченого
    духовенства.'
  - 'Виклик Реформації: вплив протестантських ідей, перекладів Біблії та полемічної
    літератури.'
  - 'Наступ Контрреформації: ефективність єзуїтських колегіумів як загроза асиміляції
    руської еліти.'
  - 'Змагання культур: необхідність модернізації традиції без її зради.'
- section: 'Внесок та Спадщина: I — Волинські Афіни'
  words: 900
  points:
  - 'Заснування Острозької академії (бл. 1576): перший вищий навчальний заклад у Східній
    Європі.'
  - 'Концепція ''тримовного ліцею'': поєднання грецької, латинської та слов''янської
    вченості.'
  - 'Інтелектуальне коло: залучення греків (Кирило Лукаріс), протестантів та місцевих
    вчених (Герасим Смотрицький).'
  - 'Кузня кадрів: виховання нової еліти (Мелетій Смотрицький, Петро Конашевич-Сагайдачний).'
- section: 'Внесок та Спадщина: II — Острозька Біблія'
  words: 500
  points:
  - 'Острозька Біблія 1581: перше повне друковане видання Святого Письма церковнослов''янською
    мовою.'
  - 'Співпраця з Іваном Федоровим: технологічний та філологічний подвиг острозького
    гуртка.'
  - 'Канонічне значення: текст став взірцем для православного світу на століття.'
  - 'Цитата з передмови: сприйняття книги як ''дару небесного'', духовної зброї проти
    ''ворогів істини''.'
- section: Порівняльний аналіз
  words: 400
  points:
  - 'Острозький vs Єзуїти: запозичення методів (освіта, друк) для боротьби з експансією
    опонента.'
  - 'Батько vs Син: еволюція від ''меча'' (Костянтин Іванович, битва під Оршею) до
    ''книги'' (Костянтин-Василь, Острозька Біблія).'
  - 'Деколонізаційний аспект: Острозький як творець суб''єктної української культури,
    а не провідник польських впливів.'
