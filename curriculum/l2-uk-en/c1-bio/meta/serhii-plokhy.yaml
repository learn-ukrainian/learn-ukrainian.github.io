slug: serhii-plokhy
title: 'Сергій Плохій: Історик, який пояснив Україну світові'
word_target: 5000
content_outline:
- section: Вступ — Голос України в Гарварді
  words: 300
  points:
  - Сергій Плохій як найвпливовіший сучасний історик України на Заході.
  - Директор Українського наукового інституту Гарвардського університету (HURI).
  - Автор бестселерів, що формують світове сприйняття України.
  - Інтелектуальний міст між українською наукою та західною академічною спільнотою.
- section: 'Молодість і радянська освіта: Від Горлівки до Києва'
  words: 600
  points:
  - 'Народження в Росії, зростання в Запоріжжі: формування ідентичності.'
  - Навчання в Дніпропетровському університеті (1975–1980).
  - Вплив «Дніпропетровської школи джерелознавства» та наставників (М. Ковальський,
    Ю. Мицик).
  - 'Захист дисертацій у Москві (1982) та Києві (1990): шлях від вивчення козацтва
    до папства.'
  - 'Академічна атмосфера 1980-х: пошук правди в архівах попри цензуру.'
- section: 'Еміграція та Гарвард: Шлях до світового визнання'
  words: 600
  points:
  - 'Переїзд до Канади (1996): професор Університету Альберти.'
  - Робота над «Грушевський переклад проєктом» та джерелознавчими студіями.
  - Запрошення до Гарварду (2007) на посаду професора історії України.
  - 'Очолення HURI (2013): продовження традицій Омеляна Пріцака.'
  - Трансформація інституту в центр публічної дипломатії та сучасної аналітики.
- section: 'Наукові праці: «Брама Європи» та новий наратив'
  words: 700
  points:
  - «Брама Європи» (2015) як маніфест української суб'єктності.
  - Концепція України як фронтиру та місця зустрічі цивілізацій.
  - 'Подолання віктимності: акцент на стійкості та адаптивності українців.'
  - Вплив книги на західну аудиторію після початку війни 2014 року.
- section: 'Наукові праці: Анатомія імперського колапсу'
  words: 700
  points:
  - '«Остання імперія» (2014): ревізія історії розпаду СРСР.'
  - 'Ключова теза: український референдум 1 грудня 1991 року як «смертний вирок» Радянському
    Союзу.'
  - '«Ялта. Ціна миру» (2010): геополітика та доля Східної Європи.'
  - '«Загублене царство» (2017): деконструкція російського міфу про «триєдиний народ».'
- section: 'Наукові праці: Ядерна історія та Чорнобиль'
  words: 600
  points:
  - '«Чорнобиль. Історія катастрофи» (2018): погляд історика, а не фізика.'
  - Техногенна катастрофа як вирок радянській системі приховування правди.
  - '«Nuclear Folly» (2021): уроки Карибської кризи.'
  - '«Атоми і попіл» (2022): глобальна історія ядерних аварій.'
- section: 'Наукові праці: Війна та сучасність'
  words: 600
  points:
  - '«Російсько-українська війна» (2023): аналіз конфлікту як довготривалого історичного
    процесу.'
  - Війна як продовження розпаду Російської імперії.
  - Прогнози щодо майбутнього Росії та європейської безпеки.
  - 'Роль історика в час війни: фіксація подій та боротьба з дезінформацією.'
- section: 'Популяризатор історії: Глобальний голос'
  words: 400
  points:
  - 'Стиль «narrative history»: поєднання академічної точності з літературною майстерністю.'
  - Публічні лекції та виступи у провідних світових медіа (The Guardian, WP, FT).
  - Лауреат Шевченківської премії (2018) та міжнародних нагород (Baillie Gifford Prize).
  - Вплив на політичні еліти Заходу та формування проукраїнської коаліції.
- section: 'Значення для України: Деколонізація та майбутнє'
  words: 500
  points:
  - Внесок у деколонізацію славістики (Slavic Studies) на Заході.
  - Повернення Україні власного голосу в світовій історії.
  - Виховання нового покоління західних істориків-україністів.
  - Сергій Плохій як інтелектуальний амбасадор України.
