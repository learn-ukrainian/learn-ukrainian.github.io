  - 'Ректорство у Львівській братській школі (1604): педагогічний дебют'
  - Вплив галицького інтелектуального середовища на формування світогляду
- section: 'Життєпис: Київський період та чернецтво'
  words: 450
  points:
  - Переїзд до Києва (~1610) як символ культурного трансферу з Галичини на Наддніпрянщину
  - Заснування Київської братської школи (1615) — прообразу Могилянки
  - Прийняття чернечого постригу (1618) та ігуменство у Михайлівському Золотоверхому
    монастирі
  - Формування київського інтелектуального гуртка навколо Борецького
- section: 'Берестейська унія та її наслідки: Правовий колапс'
  words: 500
  points:
  - 'Ситуація після 1596 року: перехід ієрархії в унію та «нелегальний» статус православних'
