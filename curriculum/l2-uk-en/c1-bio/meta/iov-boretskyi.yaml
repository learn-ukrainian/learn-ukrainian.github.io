slug: iov-boretskyi
title: 'Йов Борецький: Захисник православ''я'
word_target: 5000
content_outline:
- section: Вступ — Відновлення православної ієрархії
  words: 400
  points:
  - '1620 рік як переломний момент: церква отримує «голову» після десятиліть сирітства'
  - Йов Борецький як архітектор відновлення структури Київської митрополії
  - 'Роль Петра Сагайдачного: союз «меча і хреста» як гарантія безпеки'
  - 'Політичне значення події: перетворення церкви з підпільної на напівлегітимну
    інституцію'
- section: 'Життєпис: Галицьке коріння та освіта'
  words: 450
  points:
  - Народження ~1560 року в с. Бірча на Перемишльщині (шляхетський рід)
  - Західна освіта та володіння мовами (грецька, латина) — руйнування міфу про «неосвіченого
