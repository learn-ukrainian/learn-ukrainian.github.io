slug: petro-sahaidachny
title: 'Петро Сагайдачний: Гетьман-Державник'
word_target: 5000
content_outline:
- section: Вступ — Меч і Хрест
  words: 600
  points:
  - 'Трансформація козацтва: від розрізнених ватаг до регулярного війська (societas
    militaris) із залізною дисципліною.'
  - 'Стратегічний альянс «меча і хреста»: поєднання військової сили Запорозького війська
    з інтелектуальним потенціалом православного духовенства.'
  - 'Політична суб''єктність: вихід козацького питання на міжнародну арену як «третього
    члена» Речі Посполитої (поряд з Литвою та Польщею).'
  - 'Деколонізаційний погляд: Сагайдачний не як «слуга короля», а як будівничий автономної
    «держави в державі».'
- section: 'Життєпис: I — Становлення та Морські походи'
  words: 1000
  points:
  - 'Шляхетське походження (Кульчиці) та інтелектуальний гарт в Острозькій академії:
    знання латини, риторики та «семи вільних мистецтв».'
  - 'Геополітика морських рейдів: перенесення війни на територію ворога (Османської
    імперії) та контроль Чорного моря козацькими чайками.'
  - 'Взяття Кафи (1616): удар по головному невільничому ринку Криму та сакральна місія
    звільнення тисяч бранців.'
  - 'Асиметрична війна на морі: мобільність чайок проти громіздких османських галер.'
- section: 'Життєпис: II — Московський похід та Відновлення Церкви'
  words: 1000
  points:
  - 'Кампанія 1618 року: блискавичний рейд на Москву («Сагайдачний, що Москві подих
    перехопив»), порятунок армії королевича Владислава.'
  - 'Деулінське перемир''я: повернення Чернігівщини та Сіверщини до складу Речі Посполитої
    як етнічних українських земель.'
  - '1620 рік: Вступ усього Війська Запорозького до Київського братства — маніфест
    національної єдності та протекція над освітою.'
  - 'Відновлення православної ієрархії: охорона патріарха Феофана III та висвячення
    Йова Борецького (легітимізація церкви).'
- section: 'Життєпис: III — Хотинська епопея та Смерть'
  words: 800
  points:
  - 'Хотинська війна 1621: козаки як вирішальний фактор порятунку Центральної Європи
    від османської навали (порівняння з Віднем 1683).'
  - 'Тактичні інновації під Хотином: нічні вилазки, маневрена оборона, «рухомий табір».'
  - 'Смерть у Києві (1622) від хотинських ран: перетворення похорону на національну
    маніфестацію.'
  - «Вірші на жалісний погреб...» Касіяна Саковича як перший ідеологічний трактат
    про роль козацтва в історії.
- section: Історичний контекст
  words: 600
  points:
  - 'Європа у вогні Тридцятилітньої війни (1618–1648): глобальний конфлікт католиків
    і протестантів.'
  - 'Екзистенційна криза православ''я після Берестейської унії 1596 року: «церква
    без єпископів» та загроза асиміляції.'
  - 'Доба героїчних морських походів: козаки як єдина сила, здатна стримувати османську
    експансію на північ.'
- section: Внесок та Спадщина
  words: 600
  points:
  - 'Військова реформа: запровадження мушкетів замість луків, регулярна муштра, поділ
    на сотні й полки.'
  - 'Культурний патронат: перетворення Києва на «Другий Єрусалим» (Могилянка, братські
    школи) та підтримка інтелектуальної еліти.'
  - 'Політична спадщина: утвердження ідеї, що права нації здобуваються не лише шаблею,
    а й законом, освітою та вірою.'
- section: Порівняльний аналіз
  words: 400
  points:
  - 'Сагайдачний vs Наливайко: еволюція від стихійного бунту до системної державної
    політики та компромісу.'
  - 'Сагайдачний vs Дорошенко: обидва «державники», але різні геополітичні вектори
    (Польща vs Туреччина).'
  - 'Феномен лояльності: прагматизм Сагайдачного як спосіб легалізації національних
    інституцій в умовах бездержавності.'
