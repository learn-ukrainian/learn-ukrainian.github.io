slug: oleksandr-arkhypenko
title: 'Олександр Архипенко: Скульптор авангарду'
word_target: 5000
content_outline:
- section: Вступ — Революціонер у скульптурі
  words: 400
  points:
  - 'Архипенко як ''Колумб простору'': зміна парадигми від моноліту до порожнечі'
  - 'Чотири виміри скульптури: висота, ширина, глибина і... час (рух)'
  - Статус першого українського митця світового рівня
- section: Київські роки (1887-1908)
  words: 600
  points:
  - 'Родинний контекст: інженерна думка батька та іконописна традиція діда'
  - 'Київське художнє училище: бунт проти академізму та відрахування 1905 року'
  - 'Естетичні корені: вплив трипільської культури, ''кам''яних баб'' та візантійської
    мозаїки'
  - Московський епізод та остаточне рішення їхати на Захід
- section: 'Паризький період (1908-1921): У колі авангарду'
  words: 700
  points:
  - 'Колонія ''Ла Рюш'': життя пліч-о-пліч з Модільяні, Леже та Аполлінером'
  - Відмова від роденівської традиції та пошук власної мови
  - Школа Архипенка в Парижі (1910) як центр альтернативної освіти
  - 'Скандали та визнання: виставки в Гаґені та Салоні незалежних'
- section: 'Паризький період (1908-1921): Винахід порожнечі'
  words: 700
  points:
  - 'Концепція ''негативного простору'': отвір як найактивніший елемент форми'
  - 'Скульптомалярство (Sculpto-peinture): синтез об''єму та кольору'
  - 'Матеріальна революція: скло, метал, дерево та дріт замість бронзи'
  - 'Кубізм у пластиці: аналіз форми через геометричні площини (''Медрано'', ''Жінка,
    що зачісується'')'
- section: Берлінський період (1921-1923)
  words: 500
  points:
  - 'Берлін як новий центр модернізму: переїзд та заснування школи'
  - Персональна виставка 1921 року та європейський тріумф
  - Одруження з Ангелікою Шміц та особисте життя
  - Вплив на німецьких експресіоністів та конструктивістів
- section: 'Американський період (1923-1964): Педагог і громадський діяч'
  words: 700
  points:
  - 'Еміграція до США: адаптація та відкриття школи в Нью-Йорку'
  - 'Педагогічна географія: Чикаго (New Bauhaus), Канзас-Сіті, Лос-Анджелес'
  - 'Український павільйон у Чикаго 1933 року: культурна дипломатія'
  - 'Пам''ятники для діаспори: Тарас Шевченко, Іван Франко, Володимир Великий'
- section: 'Американський період (1923-1964): Архіпентура і світло'
  words: 700
  points:
  - 'Патент на ''Архіпентуру'' (1927): машина для рухомого живопису'
  - 'Світлові скульптури (''світломодулятори''): плексиглас і внутрішнє підсвічування'
  - 'Пізній період: повернення до поліхромії та органічних форм'
  - Книга 'Теорія творчості' як філософський підсумок
- section: Спадщина та вплив
  words: 700
  points:
  - 'Глобальний вплив: Генрі Мур, Альберто Джакометті та спадкоємність ідей'
  - 'Радянське забуття: тавро ''формаліста'' і ''буржуазного націоналіста'''
  - 'Повернення в Україну: виставка 2006 року та сучасне осмислення'
  - Фундація Архипенка та збереження творчого доробку
