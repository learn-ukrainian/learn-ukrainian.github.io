slug: symon-petliura
title: 'Симон Петлюра: Головний Отаман'
word_target: 5000
content_outline:
- section: Вступ — Людина, яка стала символом боротьби
  words: 500
  points:
  - '25 травня 1926 року: постріли на вулиці Расін, що змінили історію.'
  - 'Феномен ''петлюрівщини'': як прізвище стало назвою цілої епохи.'
  - 'Від літературного критика до Головного Отамана: парадокс долі.'
  - 'Мета уроку: деконструкція міфів та аналіз реальної постаті.'
- section: Полтавське дитинство та формування світогляду
  words: 600
  points:
  - Козацький родовід та атмосфера 'української Мекки' — Полтави.
  - 'Семінарська юність: бунт проти русифікації та виключення.'
  - Вплив Миколи Лисенка та перші кроки в революційному русі.
  - 'Ідеологічний вибір: між соціалізмом і націоналізмом (РУП, УСДРП).'
- section: Журналіст і громадський діяч
  words: 600
  points:
  - 'Львівський гарт: співпраця з Франком та Грушевським у ''Літературно-науковому
    віснику''.'
  - 'Московський період: редагування журналу ''Украинская жизнь'' як рупора українства.'
  - 'Стаття ''Війна і українці'' (1914): лояльність імперії чи тактичний розрахунок?'
  - 'Робота в ''Союзі земств'': здобуття популярності серед солдатських мас.'
- section: 'Революція та державотворення: I — Військовий секретар'
  words: 800
  points:
  - '1917 рік: конфлікт з Винниченком щодо створення регулярної армії.'
  - 'Гайдамацький кіш Слобідської України: формування боєздатних частин.'
  - Січневе повстання більшовиків ('Арсенал') та рішучість Петлюри.
  - 'Період Гетьманату: опозиція, ув''язнення та роль в антигетьманському повстанні.'
- section: 'Революція та державотворення: II — Головний Отаман'
  words: 800
  points:
  - 'Директорія УНР: перехід від колегіальності до фактичної диктатури Петлюри.'
  - '''Вагонна дипломатія'' та життя в дорозі: управління державою на колесах.'
  - 'Боротьба на три фронти: більшовики, білогвардійці Денікіна, поляки.'
  - 'Єврейське питання: накази проти погромів та трагічна реальність анархії.'
- section: 'Революція та державотворення: III — Варшавський договір'
  words: 600
  points:
  - 'Геополітичний тупик 1920 року: вибір між повним знищенням і союзом з Польщею.'
  - 'Угода Пілсудський-Петлюра: визнання незалежності ціною Галичини.'
  - 'Спільний похід на Київ: короткочасний тріумф і остаточна поразка.'
  - Трагедія інтернованих вояків та перехід за Збруч.
- section: Еміграція та боротьба за правду
  words: 500
  points:
  - 'Життя вигнанця: Тарнув, Варшава, Париж.'
  - Заснування журналу 'Тризуб' та Державного центру УНР в екзилі.
  - 'Консолідація еміграції: спроба зберегти легітимність української влади.'
  - 'Полювання ГПУ: розуміння радянськими спецслужбами небезпеки живого символу.'
- section: 'Загибель та спадщина: Вбивство і процес Шварцбарда'
  words: 600
  points:
  - 'День вбивства: обставини та негайна реакція світової преси.'
  - 'Процес у Палаці правосуддя: як суд над вбивцею став судом над жертвою.'
  - Роль радянської агентури та маніпуляція темою погромів.
  - 'Наслідки виправдання Шварцбарда: радикалізація українського руху (створення ОУН).'
- section: Дискусія — Петлюра в історичній памяті
  words: 500
  points:
  - 'Петлюра vs Скоропадський vs Винниченко: порівняльний аналіз лідерства.'
  - 'Еволюція образу: від радянського демона до національного героя.'
  - 'Проблема меморіалізації: чому пам''ятник Петлюрі досі викликає дискусії?'
  - 'Актуальність постаті: уроки дипломатії та оборони для сучасної України.'
