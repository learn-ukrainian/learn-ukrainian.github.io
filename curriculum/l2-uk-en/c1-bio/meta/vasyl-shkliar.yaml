slug: vasyl-shkliar
title: 'Василь Шкляр: Майстер історичного роману'
word_target: 5000
content_outline:
- section: Вступ — Бестселер як національний феномен
  words: 500
  points:
  - Перший сучасний письменник, який довів комерційну успішність української історичної
    книги (сукупний наклад 'Чорного Ворона' понад 300 тисяч примірників).
  - Пояснення феномену масової історичної прози в Україні 2000-х як відповіді на запит
    ідентичності.
  - '''Чорний Ворон'' як інструмент пробудження національної пам''яті та культурне
    явище.'
- section: Журналістські роки та формування
  words: 500
  points:
  - Народження в селі Ганжалівка на Черкащині (10 червня 1951), у серці козаччини
    та гайдамаччини.
  - Навчання на філологічному факультеті Київського університету (знавець вірменської
    мови).
  - Досвід 'гарячих точок' (Чечня, Абхазія) в 90-х роках, що дав розуміння психології
    війни.
- section: Шлях до літератури
  words: 600
  points:
  - Ранні прозові твори та пошук жанрових форм ('Перший сніг' 1976, 'Праліс' 1986).
  - Успіх роману 'Ключ' (1999) — здобуття Гран-прі 'Коронації слова' та статус 'батька
    українського готичного детективу'.
  - 'Формування авторського стилю: напружений сюжет, поєднання містики, натуралізму
    та динаміки.'
- section: 'Чорний Ворон та історична пам''ять: I — Епос Холодного Яру'
  words: 700
  points:
  - Тринадцять років збору матеріалів та робота в архівах СБУ (допуск за часів президента
    Ющенка).
  - Створення роману про повстанців Холодного Яру 1920-х років та реального отамана
    Івана Чорноуса.
  - 'Тема боротьби з більшовиками: зображення повстанців як людей, доведених до відчаю,
    а не ''картонних фанатиків''.'
  - Концепт 'залишенця' — того, хто свідомо залишається боротися без надії на перемогу.
- section: 'Чорний Ворон та історична пам''ять: II — Битва за визнання'
  words: 700
  points:
  - Феноменальна рецепція роману суспільством та безпрецедентний комерційний успіх.
  - Присудження Шевченківської премії 2011 року та гучна публічна відмова від неї
    через міністра Дмитра Табачника.
  - Збір 'Народної Шевченківської премії' як акт громадянської солідарності та передача
    коштів на екранізацію.
  - Спростування радянського міфу про 'бандитизм' визвольних рухів.
- section: 'Залишенець та продовження циклу: I — Тема антирадянського спротиву'
  words: 500
  points:
  - Розвиток теми повстанського руху в романах 'Маруся' (2014) та 'Троща' (2017).
  - 'Аналіз роману ''Троща'': фокус на вояках УПА, психологія зради, підпілля та виживання.'
  - Жіночі образи в збройній боротьбі (отаманша Маруся Соколовська на Житомирщині).
- section: 'Залишенець та продовження циклу: II — Художні особливості прози'
  words: 500
  points:
  - Роман 'Характерник' (2019) та звернення до козацької доби (запорожці у XVIII ст.).
  - 'Створення альтернативної історії України: фокус на героїчному спротиві, а не
    на віктимності.'
  - 'Художні особливості: натуралізм, активне використання діалектної мови, кінематографічна
    динаміка сцен.'
- section: Вплив на українську культуру
  words: 500
  points:
  - Масштабна екранізація 'Чорного Ворона' (2019) та її значення для масового глядача.
  - Розвиток аудіокниг як формату (озвучка самим автором та відомими акторами).
  - 'Громадська позиція автора: статус морального авторитета, підтримка української
    мови, волонтерство та участь у політиці.'
- section: Дискусія — Історична правда vs художня вигадка
  words: 500
  points:
  - 'Літературна критика щодо романів: звинувачення в ''плакатності'', спрощеннях
    та ксенофобії.'
  - 'Відповідь Шкляра: право на художню вигадку та показ історичної правди очима героїв
    епохи.'
  - 'Деколонізаційний вимір: повернення суб''єктності українцям у літературі на противагу
    імперським наративам віктимності чи колабораціонізму.'
