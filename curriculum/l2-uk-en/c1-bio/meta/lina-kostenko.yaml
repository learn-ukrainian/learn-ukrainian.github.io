slug: lina-kostenko
title: 'Ліна Костенко: Королева поезії'
word_target: 5000
content_outline:
- section: Вступ — Голос, що не змовкає
  words: 600
  points:
  - Ліна Костенко як моральний імператив сучасної України.
  - Феномен «мовчання» як найгучнішої форми протесту проти тоталітаризму.
  - 'Унікальний статус: живий класик, чиї слова стають гаслами опору.'
- section: Ранні роки та формування світогляду (1930-1956)
  words: 800
  points:
  - 'Дитинство у Ржищеві та Києві: тавро «доньки ворога народу».'
  - Труханів острів та відлуння Другої світової війни у пам'яті.
  - 'Навчання у Москві: формування української ідентичності в центрі імперії.'
  - 'Перші поетичні кроки: збірка «Проміння землі».'
- section: 'Шістдесятництво: Епоха пробудження (1956-1965)'
  words: 800
  points:
  - Хрущовська відлига та поява плеяди шістдесятників.
  - 'Творчий вибух: збірки «Вітрила» та «Мандрівки серця».'
  - 'Громадянський чин: участь у протестах проти арештів інтелігенції (1965).'
  - 'Квіти підсудним: легендарний епізод у Львівському суді.'
- section: Період великого мовчання (1965-1977)
  words: 800
  points:
  - Цензурна заборона та розсип збірок «Зоряний інтеграл» і «Княжа гора».
  - 'Внутрішня еміграція: відмова від співпраці з режимом.'
  - 'Творчість «у шухляду»: збереження гідності ціною публічності.'
  - Психологічний тиск та життя під наглядом спецслужб.
- section: 'Тріумфальне повернення: «Маруся Чурай» (1979-1989)'
  words: 900
  points:
  - 'Прорив блокади: вихід історичного роману у віршах «Маруся Чурай».'
  - 'Культурний феномен: черги за книгою та всенародне визнання.'
  - '«Сад нетанучих скульптур»: філософське осмислення мистецтва.'
  - Шевченківська премія 1987 року як перемога справедливості.
- section: Голос незалежної України (1990-сьогодні)
  words: 800
  points:
  - 'Чорнобильські експедиції: порятунок пам''яті Полісся.'
  - '«Записки українського самашедшого»: діагноз пострадянському суспільству.'
  - '«Політичної біжутерії не ношу»: відмова від звання Героя України.'
  - 'Реакція на війну та сучасна позиція: натхнення для воюючої нації.'
- section: Поетика та філософські домінанти
  words: 800
  points:
  - Неокласична форма та глибокий інтелектуалізм лірики.
  - Історична пам'ять як фундамент національної ідентичності.
  - 'Афористичність мови: цитати, що стали народними.'
  - 'Екзистенційні мотиви: самотність, гідність, час.'
