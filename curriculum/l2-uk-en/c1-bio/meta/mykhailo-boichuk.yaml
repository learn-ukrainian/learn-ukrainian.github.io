title: 'Михайло Бойчук: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Архітектор українського стилю'
  words: 400
  points:
  - Михайло Бойчук як ключова фігура українського модернізму
  - Поняття 'бойчукізм' як мистецького та світоглядного явища
  - Паралелі з мексиканським монументалізмом (Дієго Рівера)
- section: 'Ранні роки: Європейська школа'
  words: 800
  points:
  - Дитинство на Тернопільщині та роль Андрея Шептицького
  - Навчання у студіях Львова, Відня та Кракова
  - 'Паризький період (1907–1910): заснування ''Renovation Byzantine'''
  - Тріумф у 'Салоні незалежних' та визнання європейською критикою
- section: 'Бойчукізм: Синтез віків'
  words: 1000
  points:
  - 'Теоретичні засади: повернення до Візантії та Проторенесансу (Джотто, Чімабуе)'
  - 'Технічні особливості: темпера, фреска, відмова від олії'
  - 'Національна форма: синтез іконопису та народної картини'
  - 'Колективний метод творчості: відмова від індивідуалізму на користь ''цеху'''
- section: 'Київська академія: Школа єдності'
  words: 1000
  points:
  - Заснування Української академії мистецтв (1917)
  - 'Майстерня монументального малярства: формування плеяди учнів (Падалка, Седляр)'
  - 'Ключові проєкти: розписи Луцьких казарм (1919) та санаторію на Хаджибеї (1928)'
  - Експедиції та дослідження народного мистецтва
- section: 'Розправа: Знищення митця і творів'
  words: 1000
  points:
  - 'Ідеологічний тиск 1930-х: звинувачення у ''формалізмі'''
  - Розписи Червонозаводського театру як остання спроба компромісу
  - Арешт (листопад 1936) та сфабриковані звинувачення у шпигунстві
  - Розстріл у Києві 13 липня 1937 року разом з учнями
  - Страта дружини Софії Налепинської-Бойчук
- section: 'Спадщина: Відродження через попіл'
  words: 800
  points:
  - Системне знищення творів після арешту (заштукатурення фресок)
  - Довге забуття та реабілітація після 1956 року
  - Вплив бойчукізму на шістдесятників (Алла Горська, Опанас Заливаха)
  - Сучасне переосмислення та значення для української візуальної культури
