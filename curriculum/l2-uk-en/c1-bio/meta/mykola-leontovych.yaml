slug: mykola-leontovych
title: 'Микола Леонтович: Автор «Щедрика»'
word_target: 5000
content_outline:
- section: Вступ — Пісня, що підкорила світ
  words: 600
  points:
  - Микола Леонтович як автор «Щедрика» (глобального феномену Carol of the Bells)
  - 'Символ епохи: від сільського вчителя та збирача фольклору до генія європейської
    хорової поліфонії'
  - 'Трагічний дисонанс долі: світовий тріумф твору на тлі мученицької смерті композитора
    від рук ЧК'
- section: 'Ранні роки: Подільське коріння (1877-1892)'
  words: 600
  points:
  - Народження 13 грудня 1877 року в селі Монастирок на Поділлі в родині священника
  - 'Родинна музична атмосфера: батько-музикант та глибокі співацкі традиції'
  - Вплив подільського сільського фольклору та церковної музики на формування світогляду
- section: Освіта та ранні композиторські спроби (1892-1903)
  words: 600
  points:
  - Навчання у Шаргородському училищі та Кам'янець-Подільській семінарії
  - Відсутність доступу до класичної консерваторської освіти, інтенсивна самоосвіта
    та вивчення теорії
  - Перші аматорські композиції, захоплення творчістю Миколи Лисенка та початок фіксації
    подільських мелодій
- section: 'Педагогічна діяльність: Вчитель і хормейстер (1903-1917)'
  words: 700
  points:
  - Викладацька праця у Чукові, Тульчині, Вінниці та на Донбасі (станція Гришине)
  - Організація самодіяльних хорових колективів та оркестрів серед школярів і робітників
  - Видання перших збірок народних пісень з Поділля та приватні музичні консультації
    у Болеслава Яворського
- section: 'Творча лабораторія: Народження шедеврів'
  words: 700
  points:
  - 'Філігранна робота над мініатюрою: «Дударик», «Пряля», «Козака несуть» як зразки
    ювелірної хорової техніки'
  - 'Історія створення «Щедрика»: 15 років шліфування, п''ять авторських редакцій
    (1901-1919)'
  - 'Унікальний стиль Леонтовича («український Бах»): поєднання дохристиянської архаїки
    з європейською поліфонією'
- section: 'Революційні роки: Доба УНР та культурна дипломатія (1917-1921)'
  words: 700
  points:
  - Переїзд до революційного Києва, викладання в Музично-драматичному інституті ім.
    Лисенка
  - Співпраця з Кирилом Стеценком та Олександром Кошицем, тріумфальна прем'єра «Щедрика»
    у грудні 1916 року
  - Закордонне турне Української республіканської капели під егідою Симона Петлюри
    як інструмент культурної дипломатії
- section: 'Загибель та пам''ять: Хроніка злочину (1921)'
  words: 600
  points:
  - Відступ армії УНР, повернення композитора на Вінниччину в умовах більшовицького
    терору та переслідувань
  - 'Фатальна ніч 23 січня 1921 року в селі Марківка: цинічне вбивство Леонтовича
    чекістом Афанасієм Грищенком'
  - Десятиліття радянської брехні про «випадкове пограбування» та відкриття архівів
    ЧК у 1990-х роках
- section: 'Світове визнання: Від «Щедрика» до Carol of the Bells'
  words: 600
  points:
  - 'Американський тріумф: виконання «Щедрика» капелою Кошиця у нью-йоркському Карнегі-Хол
    (1922)'
  - 'Трансформація твору: написання англомовного тексту Пітером Вільговським у 1936
    році (Carol of the Bells)'
  - 'Привласнення та деколонізація: феноменальна популярність мелодії у світі та сучасна
    боротьба за повернення їй українського імені'
