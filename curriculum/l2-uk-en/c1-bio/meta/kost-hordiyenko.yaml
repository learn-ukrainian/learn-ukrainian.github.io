id: c1-bio-kost-hordiyenko
slug: kost-hordiyenko
title: 'Кость Гордієнко: Запорозький кошовий'
word_target: 5000
content_outline:
- section: Вступ — Лицар степу
  words: 500
  points:
  - 'Гордієнко як символ запорозької суб''єктності: руйнування імперського міфу про
    неосвічених «розбійників» через постать дипломата та інтелектуала.'
  - 'Ідеолог козацької республіки: формування бачення суверенної держави на противагу
    московському самодержавству.'
  - 'Стратегічний союз із Мазепою (1709): Гордієнко приводить Січ у коаліцію як рівноправного
    політичного партнера, а не підлеглу одиницю.'
- section: 'Життєпис: I — Шлях до булави та протистояння фортецям'
  words: 800
  points:
  - 'Шляхетське походження (рід Головків) та освіта в Києво-Могилянській академії:
    фундамент для формування державницького світогляду.'
  - 'Обрання кошовим отаманом (1702): лідерство в епоху зростаючої загрози та військової
    експансії Петра I.'
  - 'Боротьба проти московських фортець: спротив будівництву Кам''яного Затону та
    Новобогородицької фортеці, що використовувалися імперією для економічної блокади
    Січі.'
- section: 'Життєпис: II — Союз із Мазепою та війна за вольності'
  words: 900
  points:
  - 'Зустріч у Диканьці та промова латиною до Карла XII у Великих Будищах: Гордієнко
    об''єднує 8-тисячне запорозьке військо зі шведсько-українською армією.'
  - 'Трагедія Чортомлицької Січі: російські війська Петра Яковлєва та Гната Галагана
    жорстоко руйнують столицю козацтва (травень 1709) як помсту за непокору.'
  - 'Участь у Полтавській битві: Гордієнко та запорожці забезпечують організований
    відступ армії до Бендер, зберігаючи структуру Війська за межами рідної землі.'
- section: Історичний контекст
  words: 600
  points:
  - 'Запорозька Січ проти імперського абсолютизму: екзистенційний цивілізаційний конфлікт
    між виборною військовою демократією та російською автократією Петра I.'
  - 'Степ як територія волі: козацький захист «Вольностей Війська Запорозького» від
    російської імперської концепції колонізації «Дикого Поля».'
- section: Внесок
  words: 600
  points:
  - 'Державотворення: Гордієнко підписує «Конституцію Пилипа Орлика» (1710) від імені
    Війська Запорозького Низового, що закріпило його права у міжнародному праві.'
  - 'Дипломатія у вигнанні: активний пошук союзників (Кримське ханство, Османська
    імперія) та примус Росії до визнання кордонів Запорожжя під час Прутського походу.'
- section: 'Останні роки: I — Олешківська Січ'
  words: 400
  points:
  - 'Заснування та керівництво Олешківською Січчю (1711–1728) під протекторатом Кримського
    ханства: складне політичне маневрування між імперіями.'
  - 'Внутрішня боротьба: протистояння «промосковській» партії Івана Малашевича та
    послідовне відстоювання незалежного від Росії курсу.'
- section: 'Останні роки: II — Кам''янська Січ'
  words: 400
  points:
  - 'Заснування Кам''янської Січі (1728): останній акт непокори Гордієнка та створення
    нового осередку вільної козацької республіки.'
  - 'Смерть кошового у Кам''янці (1733): перетворення його могили (нині село Республіканець)
    на національну святиню та місце збереження історичної пам''яті.'
- section: Спадщина
  words: 500
  points:
  - 'Деконструкція імперського наративу про «зрадника»: історична відповідь на тавро
    Петра I, який через страх панічно називав Гордієнка «дявол кошевой».'
  - 'Образ отамана-характерника: фольклорна канонізація героя, якого «куля не брала»,
    як вияв найвищого народного визнання та вдячності.'
  - 'Традиція безкомпромісного спротиву: Гордієнко як символ готовності боротися за
    державну ідею та свободу навіть без надії на швидку перемогу.'
- section: Підсумок
  words: 300
  points:
  - Кость Гордієнко як видатний хранитель «коду волі», традицій козацького права та
    республіканських свобод Запорожжя.
  - 'Значення його постаті для сучасної нації: історичний приклад безкомпромісного
    антиімперського протистояння та захисту політичної суб''єктності.'
