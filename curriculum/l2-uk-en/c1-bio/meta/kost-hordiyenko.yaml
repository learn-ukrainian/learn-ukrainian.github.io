slug: kost-hordiyenko
title: 'Кость Гордієнко: Запорозький кошовий'
word_target: 5000
content_outline:
- section: Вступ — Лицар степу
  words: 500
  points:
  - 'Гордієнко як уособлення політичної суб''єктності Запорожжя: від ''розбійників''
    до державників.'
  - 'Інтелектуал з булавою: значення освіти в Києво-Могилянській академії для формування
    світогляду.'
  - 'Стратегічний вибір 1709 року: союз із Мазепою як рівноправне партнерство двох
    центрів влади.'
- section: 'Життєпис: I — Шлях до булави'
  words: 800
  points:
  - 'Походження з шляхетського роду Головків та навчання в Києві: рідкісний профіль
    для запорожця.'
  - 'Обрання кошовим отаманом у 1702 році: лідерство в умовах зростаючого тиску Москви.'
  - 'Проблема фортець (Кам''яний Затон, Новобогородицька): боротьба проти військової
    блокади Січі.'
  - 'Дипломатичні місії до Петра I: усвідомлення неможливості компромісу з імперією.'
- section: 'Життєпис: II — Війна за вольності'
  words: 900
  points:
  - 'Історична зустріч у Диканьці (березень 1709): Гордієнко приводить 8 тисяч запорожців
    до шведсько-українського табору.'
  - 'Трагедія Чортомлицької Січі (травень 1709): жорстоке зруйнування столиці військами
    Яковлєва і Галагана.'
  - 'Полтавська битва та організований відступ: роль запорожців у порятунку залишків
    армії.'
  - 'Еміграція до Бендер: збереження структури Війська за межами рідної землі.'
- section: Історичний контекст
  words: 700
  points:
  - 'Запорозька Січ vs Російський абсолютизм: цивілізаційний конфлікт демократії та
    тиранії.'
  - 'Степ як ''Вольності'': козацьке розуміння простору проти імперської концепції
    ''Дикого Поля''.'
  - Демократичні процедури Січі як загроза для самодержавної моделі управління.
- section: Внесок
  words: 700
  points:
  - 'Співавторство Конституції 1710 року: закріплення прав ''Війська Запорозького
    Низового'' в правовому полі.'
  - 'Антимосковська коаліція: дипломатичні зусилля Гордієнка в Криму та Туреччині.'
  - Легітимізація кордонів Запорожжя в міжнародних угодах (Прутський мир тощо).
- section: Останні роки
  words: 700
  points:
  - 'Олешківська Січ (1711–1728): життя під протекторатом Кримського ханства, конфлікти
    та компроміси.'
  - 'Внутрішня боротьба: протистояння з ''промосковською'' партією Івана Малашевича.'
  - Заснування Кам'янської Січі (1728) та смерть кошового (1733).
  - 'Могила в селі Республіканець: збереження пам''яті попри століття заборон.'
- section: Спадщина
  words: 400
  points:
  - 'Фольклорний образ: Гордієнко-характерник, якого ''куля не брала''.'
  - 'Історіографічна війна: радянський міф про ''зрадника'' проти історичної правди.'
  - 'Символ незламності: Гордієнко як приклад боротьби без надії на швидку перемогу.'
- section: Підсумок
  words: 300
  points:
  - Кость Гордієнко як охоронець козацького права і традиції.
  - Значення його спадщини для сучасної української ідентичності.
