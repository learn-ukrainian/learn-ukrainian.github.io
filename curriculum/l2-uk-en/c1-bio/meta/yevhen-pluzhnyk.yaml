slug: yevhen-pluzhnyk
title: 'Євген Плужник: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Тихий пророк епохи'
  words: 600
  points:
  - 'Євген Плужник як унікальна постать Розстріляного відродження: «поет-філософ»
    серед «поетів-трибунів».'
  - 'Стильова домінанта: поєднання імпресіоністичної деталі та експресіоністичної
    напруги.'
  - 'Метафора «тиші»: майстерність паузи, недосказаності та лаконізму.'
  - 'Ключова тема творчості: цінність окремого людського життя на тлі історичних катаклізмів.'
  - 'Географічний контекст: походження зі Східної Слобожанщини як свідчення єдності
    українського етнічного простору.'
- section: 'Ранні роки: Від Кантемирівки до Києва'
  words: 800
  points:
  - 'Дитинство в слободі Кантемирівка: родинне середовище, вплив матері (спадковий
    туберкульоз).'
  - 'Освіта: гімназії Воронежчини та переїзд на Полтавщину під час Визвольних змагань.'
  - 'Київський період (з 1921): навчання у Ветеринарно-зоотехнічному інституті та
    Музично-драматичному інституті ім. Лисенка.'
  - 'Викладач словесності: Микола Зеров та його вплив на формування естетичних смаків
    Плужника.'
  - 'Особисте життя: знайомство та шлюб з Галиною Коваленко — музою та берегинею його
    спадщини.'
- section: 'Творчий злет: Поезія та проза'
  words: 1000
  points:
  - 'Збірка «Дні» (1926): трагічне сприйняття революції, образ «села, що гине», відмова
    від пафосу.'
  - 'Збірка «Рання осінь» (1927): перехід до філософської лірики, роздуми про швидкоплинність
    часу.'
  - 'Роман «Недуга» (1928): психологічний аналіз «нової людини», конфлікт партійного
    обов''язку та людських почуттів.'
  - 'Критика «Недуги»: звинувачення в «буржуазному індивідуалізмі» та «ідеологічній
    невитриманості».'
  - 'Драматургія («Професор Сухораб», «У дворі на передмісті», «Змова в Києві»): передчуття
    трагедії інтелігенції.'
- section: 'У колі однодумців: «Ланка» та МАРС'
  words: 800
  points:
  - 'Літературне угруповання «Ланка» (1924-1926): об''єднання «попутників», які прагнули
    незалежності від офіціозу.'
  - 'Трансформація в МАРС (Майстерня Революційного Слова): спроба захистити високі
    естетичні критерії.'
  - 'Дружба з Валер''яном Підмогильним, Григорієм Косинкою, Тодосем Осьмачкою: спільність
    поглядів та доль.'
  - 'Позиція «внутрішньої еміграції»: відмова обслуговувати партійні замовлення, втеча
    у «світ речей» і філософію.'
- section: 'Справа № 1377: Арешт і Соловки'
  words: 1000
  points:
  - 'Арешт 4 грудня 1934 року: хвиля терору після вбивства Кірова, фабрикація справи
    про «терористичну організацію».'
  - 'Вирок: розстріл, замінений на 10 років таборів (формальна «милість», що означала
    повільну смерть).'
  - 'Соловецький етап: умови утримання, загострення туберкульозу, перебування в тюремній
    лікарні.'
  - 'Епістолярна спадщина: листи до дружини як документ незламності духу та глибокої
    людяності.'
  - 'Смерть 2 лютого 1936 року: останні слова («Я вмиюся, пригадаю Дніпро і вмру»)
    та поховання у братській могилі.'
- section: 'Спадщина: Повернення із забуття'
  words: 800
  points:
  - 'Збірка «Рівновага» (1933/1948): історія порятунку рукопису, публікація в еміграції,
    філософія стоїцизму.'
  - 'Реабілітація 1956 року: формальне повернення імені, але цензуроване видання творів.'
  - 'Роль Галини Коваленко: збереження пам''яті, спогади, видання творів у діаспорі.'
  - 'Вплив на шістдесятників і сучасність: Василь Стус про Плужника, переосмислення
    як екзистенціаліста.'
  - 'Актуальність: Плужник як символ опору через збереження внутрішньої свободи та
    гідності.'
