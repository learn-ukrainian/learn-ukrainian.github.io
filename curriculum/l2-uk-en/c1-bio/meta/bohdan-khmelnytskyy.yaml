title: 'Богдан Хмельницький: Гетьман-державотворець'
word_target: 5000
content_outline:
- section: Вступ — Творець козацької держави
  words: 500
  points:
  - Хмельницький як архітектор української політичної нації та суб'єктності
  - 'Унікальність постаті: поєднання таланту полководця та хисту дипломата'
  - 'Спростування радянського міфу про ''селянського ватажка'': шляхетське походження
    та елітарна візія'
  - Значення Хмельниччини як переломного моменту в історії Східної Європи
- section: 'Життєпис: I — Становлення та особиста драма'
  words: 650
  points:
  - Походження (Суботів/Чигирин) та освіта в єзуїтському колегіумі (знання мов)
  - 'Служба королю: Золота шабля за хоробрість, участь у Цецорській битві та турецький
