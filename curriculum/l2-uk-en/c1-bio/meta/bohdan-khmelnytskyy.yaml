  - Тріумфальний в’їзд до Києва (грудень 1648) та проголошення себе 'самодержцем руським'
  - Легітимізація влади через титул 'Гетьман Війська Запорозького'
- section: 'Життєпис: III — Дипломатичні гойдалки'
  words: 600
