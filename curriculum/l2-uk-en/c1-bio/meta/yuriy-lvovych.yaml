slug: yuriy-lvovych
title: 'Юрій I Львович: Останній Король Русі'
word_target: 5000
content_outline:
- section: Вступ — Король Русі
  words: 600
  points:
  - Титул 'Rex Russiae' як політичний маніфест суверенної держави (спадщина Данила)
  - 'Геополітичне становище Русі на початку XIV ст.: щит Європи та міст на Схід'
  - Спростування радянського міфу про 'занепад' після монгольської навали
  - Апогей могутності та інституційна зрілість Королівства Русі
- section: Походження та молодість
  words: 700
  points:
  - 'Династичний сплав: син Лева Даниловича та Констанції Угорської (онук Бели IV)'
  - 'Період ''політичного очікування'': князювання в Белзі та Холмі (1264–1301)'
  - Формування адміністративного досвіду без втягування у батькові війни
  - Європейські матримоніальні зв'язки (шлюби з П'ястами та Куявією)
- section: Об'єднання королівства
  words: 800
  points:
  - Смерть Лева I (1301) та мирне об'єднання спадщини Романовичів
  - 'Перенесення столиці до Володимира: символічне повернення до коренів династії'
  - '''Золота доба'' економіки: свідчення Яна Длугоша про багатство та мир'
  - Урбанізація та розвиток міст (запрошення німецьких колоністів та ремісників)
- section: Королівський титул
  words: 800
  points:
  - 'Сфрагістичний аналіз печатки Юрія I: ''Sigillum Domini Georgi Regis Rusie'''
  - 'Іконографія маєстату: трон, скіпетр, корона як атрибути суверена'
  - Утвердження Лева як геральдичного символу Держави (щит на печатці)
  - Легітимація статусу в очах Ватикану та європейських королівських дворів
- section: Галицька митрополія
  words: 900
  points:
  - 'Криза 1299 року: втеча митрополита Максима до Суздальської землі'
  - 'Дипломатичний прорив 1303 року: булла патріарха Афанасія I та імператора Андроніка
    II'
  - 'Інституційна структура: 6 єпархій Галицької митрополії на чолі з Ніфонтом'
  - Духовна незалежність від півночі як фундаментальна запорука державної суверенності
- section: Зовнішня політика та кінець правління
  words: 700
  points:
  - Втрата Любліна (1302) як ціна за стабілізацію західного кордону
  - 'Pax Mongolica: коректні відносини з Ордою (хан Тохта) без руйнівних набігів'
  - 'Династична політика: шлюби дітей як інструмент міжнародної дипломатії'
  - Смерть Юрія I (1308 або 1315) та перехід влади до дуумвірату синів
- section: Підсумок — Завершення королівської епохи
  words: 500
  points:
  - 'Історичний портрет: ''муж мудрий і ласкавий до духовенства'' (Ян Длугош)'
  - Королівство Русь як модель успішної та інтегрованої європейської монархії
  - 'Трагічний епілог династії: загибель синів (1323) та кінець Романовичів'
  - 'Спадщина Юрія I: ідея українського королівства у віках'
