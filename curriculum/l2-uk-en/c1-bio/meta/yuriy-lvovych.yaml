slug: yuriy-lvovych
id: yuriy-lvovych
version: '1.0'
title: 'Юрій I Львович: Останній Король Русі'
word_target: 5000
content_outline:
- section: Вступ — Король Русі
  words: 500
  points:
  - Титул «Rex Russiae» як маніфест суверенітету та претензія на спадщину Київської
    Русі
  - Останній з коронованих монархів династії Романовичів
  - Спростування міфу про «занепад» Південно-Західної Русі після монгольської навали
- section: Походження та молодість
  words: 500
  points:
  - Народження бл. 1252 року в родині Лева I Даниловича та Констанції Угорської
  - Династичні зв'язки з елітою Центральної Європи (онук короля Бели IV)
  - Князювання в уділах Белза та Холма (1264–1301)
  - Формування прагматичного державного діяча без виснажливих воєн батька
- section: 'Об''єднання королівства: I — Спадкоємність влади'
  words: 400
  points:
  - Успадкування територій після смерті Лева Даниловича у 1301 році
  - Мирне возз'єднання галицьких та волинських земель
  - Перенесення столиці до Володимира як історичного центру Романовичів
- section: 'Об''єднання королівства: II — Економічний розквіт'
  words: 400
  points:
  - Укріплення міст (зокрема Львова) та активна урбанізація
  - Запрошення німецьких поселенців, ремісників та торгівців
  - Свідчення Яна Длугоша про «Золоту добу» миру та неймовірного процвітання
- section: Королівський титул
  words: 600
  points:
  - Прийняття титулу «Король Русі» близько 1303 року
  - Сфрагістичний аналіз латинської печатки «Sigillum Domini Georgi Regis Rusie»
  - Іконографія маєстату з європейськими інсигніями та символіка «руського лева»
  - Легітимація державності та протиставлення північно-східним князівствам
- section: 'Галицька митрополія: I — Передумови розколу'
  words: 450
  points:
  - Втеча Київського митрополита Максима на північ (до Володимира-на-Клязьмі) у 1299
    році
  - Загроза духовному суверенітету Королівства Русі
  - Небажання Юрія I миритися з церковним підпорядкуванням північним центрам
- section: 'Галицька митрополія: II — Духовний суверенітет'
  words: 550
  points:
  - Успішні переговори з Константинополем (імператором Андроніком II та патріархом
    Афанасієм I)
  - Булла про заснування Галицької митрополії у 1303 році
  - Об'єднання шести єпархій під проводом митрополита Ніфонта
  - Фундаментальне закріплення церковної незалежності від півночі
- section: 'Зовнішня політика та кінець правління: I — Дипломатія'
  words: 550
  points:
  - Відносини з Золотою Ордою хана Тохти та підтримання статусу-кво (Pax Mongolica)
  - Данницька залежність як гарантія від руйнівних набігів
  - Втрата Люблінської землі (1302) як компроміс для захисту західних кордонів
- section: 'Зовнішня політика та кінець правління: II — Династія'
  words: 450
  points:
  - Три шлюби Юрія I як інструмент європейської політики та шлюбної дипломатії
  - Династичні союзи дітей для зміцнення міжнародних позицій
  - Смерть короля (1308 або 1315) та перехід влади до дуумвірату Лева II та Андрія
- section: Підсумок — Завершення королівської епохи
  words: 600
  points:
  - Смерть синів Андрія та Лева II близько 1323 року як фатальний удар для династії
  - 'Історичний портрет Юрія I за Яном Длугошем: «муж мудрий і ласкавий до духовенства»'
  - 'Значення «Золотої доби»: доказ повноцінної інтеграції Королівства Русі в Європу'
  - Спадщина європейської королівської традиції для українського державотворення
