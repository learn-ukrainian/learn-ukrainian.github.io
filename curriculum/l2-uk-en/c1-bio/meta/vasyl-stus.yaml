slug: vasyl-stus
title: 'Василь Стус: Вертикальне стояння духу'
word_target: 5000
content_outline:
- section: Вступ — Поезія як форма спротиву
  words: 400
  points:
  - Стус як етичний абсолют української нації та символ 'прямостояння'
  - 'Єдність біографії та творчості: життя як найважливіший твір поета'
  - Трагедія загибелі як каталізатор національного відродження
- section: Донбаське дитинство
  words: 600
  points:
  - Народження на Вінниччині та переїзд родини до Сталіно (Донецька) в 1940 році
  - Зростання в україномовній родині в умовах індустріального Донбасу
  - Навчання в Донецькому педінституті та робота вчителем української мови
- section: Літературне становлення
  words: 600
  points:
  - Служба в армії на Уралі та втрата ранніх рукописів
  - 'Аспірантура в Києві (1963): входження в коло шістдесятників (Світличний, Дзюба)'
  - 'Перші поетичні спроби та збірка ''Круговерть'': пошук власного голосу'
- section: 'Шістдесятництво та перший арешт: I — Протест'
  words: 500
  points:
  - 'Акція 4 вересня 1965 року в кінотеатрі ''Україна'': ''Хто проти тиранії — встаньте!'''
  - 'Відрахування з аспірантури та заборона на професію: кочегар, будівельник'
  - Відкриті листи до влади як форма інтелектуального спротиву
- section: 'Шістдесятництво та перший арешт: II — Вирок 1972'
  words: 500
  points:
  - Арешт 12 січня 1972 року під час операції КДБ 'Блок'
  - 'Слідство та вирок: 5 років таборів суворого режиму і 3 роки заслання'
  - 'Перебування в мордовських таборах: творчість всупереч заборонам'
- section: 'Другий арешт та табори: I — Рецидивіст духу'
  words: 600
  points:
  - Коротке повернення до Києва (1979) та вступ до Української Гельсінської групи
  - Арешт 1980 року та роль адвоката В. Медведчука у фальсифікації захисту
  - 'Вирок ''особливого режиму'': 10 років таборів та 5 років заслання'
- section: 'Другий арешт та табори: II — Перм-36'
  words: 600
  points:
  - 'Умови утримання в таборі Кучино: психологічний тиск та фізичне виснаження'
  - 'Збірка ''Птах душі'': трагедія втрати 300 віршів (конфіскація та ймовірне знищення)'
  - Листи до сина як заповіт та педагогічна поема
- section: Загибель та безсмертя
  words: 800
  points:
  - Номінація на Нобелівську премію 1985 року (Генріх Бьолль) як загроза для Кремля
  - Останнє голодування та загадкова смерть у карцері 4 вересня 1985 року
  - 'Перепоховання 1989 року в Києві: повернення Героя додому'
- section: Дискусія — Ціна свободи
  words: 500
  points:
  - 'Екзистенційний вибір Стуса: творити лише в умовах абсолютної внутрішньої свободи'
  - Вплив Стуса на сучасну українську ідентичність та культуру
  - Чи варта поезія життя? Дилема жертовності
