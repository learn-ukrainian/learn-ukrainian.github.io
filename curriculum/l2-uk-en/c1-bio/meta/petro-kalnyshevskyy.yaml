slug: petro-kalnyshevskyy
title: 'Петро Калнишевський: Останній кошовий'
word_target: 5000
content_outline:
- section: Вступ — Останній лицар степу
  words: 400
  points:
  - Уособлення фіналу козацької епохи та трагічної долі Запорозької Січі.
  - Калнишевський як постать державного діяча та мецената, що спростовує імперський
    міф про козаків-«розбійників».
  - 'Життя на межі двох світів: вільного запорозького лицарства та російського абсолютизму.'
- section: 'Шлях до кошового отаманства: I — Походження та молодість'
  words: 400
  points:
  - Походження з давнього українського шляхетського роду на Лубенщині.
  - Поступова військова та адміністративна кар'єра від військового судді до вищих
    ешелонів січової влади.
  - Формування сильного лідера в умовах специфічної та турбулентної козацької демократії.
- section: 'Шлях до кошового отаманства: II — Обрання та авторитет'
  words: 400
  points:
  - Перше обрання кошовим отаманом у 1762 році та швидке усунення через конфлікт інтересів
    із Петербургом.
  - 'Переломний 1765 рік: повторне обрання старшиною всупереч прямій волі Катерини
    II.'
  - Десятиліття безперервного керівництва Січчю як свідчення безпрецедентного політичного
    авторитету.
- section: 'Розквіт Нової Січі: I — Економіка та реформи'
  words: 450
  points:
  - 'Економічне диво Калнишевського: перехід від військової організації до економічно
    самодостатньої автономії.'
  - Активне заселення степів, розвиток хліборобства, торгівлі та створення мережі
    зимівників.
  - Розуміння важливості економічної сили як гарантії збереження політичної незалежності.
- section: 'Розквіт Нової Січі: II — Меценатство та дипломатія'
  words: 450
  points:
  - 'Видатна меценатська діяльність: фінансування та будівництво церков у Ромнах,
    Лохвиці та Києві власним коштом.'
  - Успішна участь запорозьких військ у російсько-турецькій війні (1768–1774).
  - Здобуття золотої медалі з діамантами від Катерини II як визнання дипломатичної
    та військової вправності.
- section: 'Наростання загрози: I — Геополітичні зміни'
  words: 450
  points:
  - 'Наслідки Кючук-Кайнарджійського миру 1774 року: Російська імперія виходить до
    Чорного моря.'
  - Втрата Запорозькою Січчю статусу важливого прикордонного буфера.
  - Несумісність існування озброєної демократичної республіки, що приймала втікачів,
    з абсолютистським устроєм імперії.
- section: 'Наростання загрози: II — Таємні плани імперії'
  words: 400
  points:
  - Спроби Калнишевського зберегти автономію в умовах посилення тиску з боку Петербурга.
  - Розробка плану ліквідації Січі та цинічна роль Григорія Потьомкіна, колишнього
    почесного козака «Грицька Нечеси».
  - Систематичне обмеження вольностей напередодні вирішального імперського удару.
- section: 'Ліквідація Січі 1775 року: I — Віроломний напад'
  words: 450
  points:
  - 'Початок червня 1775 року: віроломне оточення Січі 100-тисячною російською армією
    генерала П. Текелія.'
  - 'Удар у спину: використання імперією армії, що поверталася з фронту, проти власного
    союзника.'
  - Брехливий маніфест Катерини II як спроба легітимізувати знищення козаків «за образу
    імператорської величності».
- section: 'Ліквідація Січі 1775 року: II — Важке рішення кошового'
  words: 450
  points:
  - Драматична військова рада перед обличчям величезної чисельної переваги ворога
    та абсолютної безвиході.
  - Рішення скласти зброю і здати клейноди як акт прагматичного порятунку нації від
    кривавої різанини.
  - 'Деколонізаційний акцент: капітуляція як вияв вищої державної відповідальності
    лідера, а не боягузтва.'
- section: 'Ув''язнення та смерть: I — Соловецький каземат'
  words: 450
  points:
  - Арешт кошового та старшини; заслання 85-річного Калнишевського на Соловки за «віроломне
    буйство».
  - 'Чверть століття у Головленківській тюрмі: жахливі умови «домовинного існування»
    та втрата зору.'
  - Катування ізоляцією як цілеспрямована політична помста імперії за українську ідентичність.
- section: 'Ув''язнення та смерть: II — Останні роки та канонізація'
  words: 400
  points:
  - Указ Олександра I про помилування у 1801 році та відмова сліпого старця покидати
    стіни монастиря.
  - Смерть останнього кошового восени 1803 року у віці понад 110 років.
  - 'Сучасне вшанування: канонізація Православною Церквою України як святого праведного
    Петра Багатостраждального (2008).'
- section: Підсумок — Мученик за волю (Спадщина)
  words: 400
  points:
  - Постать Калнишевського як духовного орієнтира та першого символічного політв'язня
    українського опору.
  - 'Наслідки ліквідації Січі: початок довгого періоду жорсткого імперського поглинання
    України.'
  - Моральна перемога та збереження гідності в нелюдських умовах як надихаючий приклад
    для майбутніх поколінь.
