version: "1"
id: ivan-vyhovskyi
slug: ivan-vyhovskyi
title: 'Іван Виговський: Гетьман-дипломат'
word_target: 5000
content_outline:
- section: Вступ — Архітектор Гадяцької унії
  words: 400
  points:
  - Іван Виговський як інтелектуал при владі та архітектор адміністративної машини
    Хмельницького.
  - Проект «Великого князівства Руського» як альтернатива московському вектору.
  - Трагедія втраченого шансу на модернізацію Речі Посполитої та збереження суверенітету.
- section: 'Життєпис: I — Походження та шлях до булави'
  words: 400
  points:
  - Православне шляхетське походження (Овруччина) та ймовірне навчання у Київській
    братській школі (володіння латиною, польською, каліграфія).
  - 'Військова кар''єра: битва під Жовтими Водами (1648), полон та викуп Богданом
    Хмельницьким.'
- section: 'Життєпис: II — Від писаря до гетьмана'
  words: 500
  points:
  - Створення Генеральної військової канцелярії як повноцінного міністерства закордонних
    справ та внутрішньої політики.
  - Роль Виговського як канцлера держави та найдовіренішої особи Хмельницького.
  - Смерть Хмельницького та легітимне обрання гетьманом на Корсунській раді (1657).
- section: 'Історичний контекст: I — Криза та московська експансія'
  words: 500
  points:
  - Геополітичний глухий кут після смерті Хмельницького та пряме порушення Москвою
    Переяславських статей.
  - 'Гібридна війна Москви: фінансування та підтримка внутрішньої опозиції (заколот
    Пушкаря і Барабаша).'
- section: 'Історичний контекст: II — Гадяцький проект'
  words: 700
  points:
  - Підписання Гадяцького договору (16 вересня 1658 року) як стратегічна відповідь
    на агресію Москви.
  - Концепція «Великого князівства Руського» як третього рівноправного суб'єкта Речі
    Посполитої.
  - 'Релігійні та культурні гарантії: зрівняння православ''я з католицизмом, статус
    академії для Києво-Могилянської колегії.'
  - 'Маніфест до європейських дворів: юридичне обґрунтування розриву з Москвою («Москва,
    зламавши присягу, хотіла нас у ярмо запрягти»).'
- section: 'Внесок: I — Багатовекторна дипломатія'
  words: 400
  points:
  - 'Дипломатичний геній: побудова потужної антимосковської коаліції зі Швецією, Трансільванією,
    Туреччиною та Кримом.'
  - Відновлення міжнародної суб'єктності Української держави на європейській арені.
- section: 'Внесок: II — Тріумф під Конотопом'
  words: 600
  points:
  - Конотопська битва (27-29 червня 1659 року) як демонстрація блискучого військового
    таланту Виговського.
  - 'Тактичний шедевр: зразкова взаємодія козацької піхоти та союзної татарської кінноти.'
  - Розгром елітної московської армії Трубецького та знищення цвіту московського дворянства
    (спростування міфу про «незначну сутичку»).
- section: 'Останні роки: I — Внутрішній розкол та зречення'
  words: 400
  points:
  - 'Трагедія переможця: чому військовий тріумф під Конотопом не конвертувався у політичну
    стабільність.'
  - Внутрішня опозиція, повстання Івана Сірка на Запоріжжі та соціальна недовіра рядового
    козацтва до панів.
  - Чорна рада в Германівці (вересень 1659) та добровільне зречення булави заради
    уникнення кровопролиття.
- section: 'Останні роки: II — Трагічна загибель'
  words: 400
  points:
  - Еміграція на Волинь та в Галичину, подальші спроби зберегти політичний вплив.
  - Фальшиві звинувачення у зраді, спровоковані інтригами Павла Тетері.
  - Страта без суду поляками поблизу села Вільховець (16 березня 1664 року) як прояв
    трагізму української еліти.
- section: 'Спадщина: Від зрадника до європейського візіонера'
  words: 400
  points:
  - Деконструкція радянського та російського імперського міфу про Виговського виключно
    як «зрадника» та «польського прислужника».
  - Переосмислення постаті в українській історіографії (В. Липинський, М. Грушевський)
    як фундатора державної інституційності.
  - Виговський як символ європейського цивілізаційного вибору України та уроки необхідності
    єдності еліти.
- section: Підсумок
  words: 300
  points:
  - Іван Виговський як архітектор української дипломатії та один з найвидатніших державних
    діячів XVII століття.
  - Значення Гадяцького проекту як найсміливішої візії побудови рівноправної Східної
    Європи.
