slug: ivan-mazepa
title: 'Іван Мазепа: Меценат і трагічний герой'
word_target: 5000
content_outline:
- section: Вступ — Між зрадою та героїзмом
  words: 300
  points:
  - 'Мазепа як дзеркало української ідентичності: ''Юда'' для імперії, ''Патрон''
    для України.'
  - 'Історіографічний парадокс: найдовше правлячий гетьман (22 роки), що став символом
    розриву з Росією.'
  - 'Деконструкція поняття ''мазепинці'': від імперського тавра до почесного імені
    борців за незалежність.'
- section: Молодість та шлях до влади
  words: 400
  points:
  - Шляхетське походження (Білоцерківщина) та блискуча європейська освіта (Нідерланди,
    Франція, Німеччина).
  - 'Служба при дворі Яна II Казимира: дипломатичний вишкіл та розуміння європейської
    політики.'
  - 'Кар''єра під булавою Дорошенка і Самойловича: набуття адміністративного досвіду.'
  - 'Коломацька рада 1687 року: обрання гетьманом та підписання Коломацьких статей
    в умовах тиску.'
- section: 'Гетьманування: I — Державне будівництво'
  words: 500
  points:
  - 'Стабілізація Гетьманщини: припинення Руїни, економічне зростання, розвиток торгівлі.'
  - 'Соціальна політика: формування нової аристократії (значкове товариство) та захист
    прав старшини.'
  - 'Військова співпраця з Петром I: Азовські походи та захист південних кордонів.'
  - 'Об''єднання земель 1704 року: фактичний контроль над Правобережжям після повстання
    Палія.'
- section: 'Гетьманування: II — Мазепинське бароко'
  words: 600
  points:
  - 'Мазепинське бароко як візуальний код української державності: синтез європейського
    стилю та місцевих традицій.'
  - 'Церковне меценатство: реставрація Софії Київської, Михайлівського Золотоверхого,
    будівництво у Чернігові та Переяславі.'
  - 'Освітня стратегія: надання Києво-Могилянському колегіуму статусу академії (1701),
    новий корпус.'
  - 'Роль мистецтва у прославленні гетьмана: гравюри Мигури та Щирського.'
- section: 'Шлях до розриву з Москвою: I — Тягар війни'
  words: 450
  points:
  - 'Велика Північна війна: використання козацьких полків як ''гарматного м''яса''
    за межами України.'
  - 'Централізаторські плани Петра I: загроза перетворення козацтва на регулярні драгунські
    полки.'
  - Економічне виснаження Гетьманщини через постійні реквізиції та військові постої.
  - 'Криза довіри: ігнорування царем інтересів автономії.'
- section: 'Шлях до розриву з Москвою: II — Дипломатичний злам'
  words: 450
  points:
  - 'Відмова Петра I захищати Україну від шведів (1706): порушення васального обов''язку
    сюзерена (''ні десятка людей не дам'').'
  - 'Легітимність опору: право васала на розрив угоди у випадку невиконання зобов''язань
    сюзереном.'
  - 'Таємні переговори з Карлом XII та Станіславом Лещинським: пошук нових гарантів
    безпеки.'
  - 'Стратегічний вибір: порятунок Батьківщини від перетворення на провінцію.'
- section: 'Полтава та вигнання: I — Батуринська трагедія'
  words: 600
  points:
  - 'Відкритий перехід на бік шведів (жовтень 1708): драматизм моменту та розкол серед
    старшини.'
  - 'Облога та знищення Батурина військами Меншикова: різанина як акт імперського
    терору.'
  - 'Втрата артилерії та запасів: фатальні наслідки падіння столиці для військової
    кампанії.'
  - 'Церковна анафема (12 листопада 1708): політичне використання релігії для демонізації
    гетьмана.'
- section: 'Полтава та вигнання: II — Катастрофа і смерть'
  words: 500
  points:
  - 'Полтавська битва (27 червня 1709): тактичні помилки та перемога російської армії.'
  - 'Геополітичні наслідки: крах шведської могутності та початок російської експансії
    в Європу.'
  - 'Втеча до Молдови (Варниця): останні дні гетьмана у вигнанні.'
  - Смерть 21 вересня 1709 року та передача булави Пилипу Орлику.
- section: 'Спадщина та реабілітація: I — Європейський міф'
  words: 400
  points:
  - 'Мазепа в європейському романтизмі: образ трагічного героя у Байрона, Гюго, Ліста.'
  - 'Легенда про коня: романтичний міф vs історична реальність покарання.'
  - 'Імперська відповідь: поема ''Полтава'' Пушкіна як спроба затвердити образ зрадника.'
  - Мазепа як символ нескореної України в очах Заходу (Вольтер).
- section: 'Спадщина та реабілітація: II — Національна пам''ять'
  words: 400
  points:
  - 'Повернення із забуття в незалежній Україні: пам''ятники, назви вулиць, 10 гривень.'
  - 'Військова традиція: корвет ''Гетьман Іван Мазепа'' як символ сучасної боротьби.'
  - 'Духовна реабілітація: невизнання анафеми Вселенським патріархатом (2018).'
  - Мазепа як патрон сучасної української культури та науки.
- section: Підсумок — Трагічний вибір
  words: 400
  points:
  - Мазепа як предтеча модерного українського націоналізму та державницького мислення.
  - 'Урок історії: неможливість рівноправного союзу з імперією, що прагне асиміляції.'
  - Актуальність 'чину' Мазепи в контексті сучасної російсько-української війни.
