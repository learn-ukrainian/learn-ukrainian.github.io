slug: yuriy-vynnychuk
title: 'Юрій Винничук: Львівський казкар'
word_target: 5000
content_outline:
- section: Вступ — Майстер львівської містики
  words: 500
  points:
  - 'Юрій Винничук як феномен сучасної літератури: «Львівський Борхес».'
  - 'Основні іпостасі: прозаїк, поет, містифікатор, антологіст, публіцист.'
  - Львів не просто як декорація, а як центральний персонаж і живий організм у його
    текстах.
  - 'Внесок у деколонізацію міського простору: повернення українського голосу в історію
    міста.'
- section: Львівське дитинство
  words: 600
  points:
  - 'Станіславські корені: народження (1952) та формування в атмосфері повоєнної Галичини.'
  - Родинне середовище та вплив батьків (інтелігенція, збереження традицій).
  - 'Навчання у Прикарпатському університеті: філологічна база та перші літературні
    спроби.'
  - 'Переїзд до Львова (1974): зустріч з Містом, яка визначила долю автора.'
- section: Андеграунд та перші публікації
  words: 700
  points:
  - 'Життя «поза системою»: свідома відмова від офіційної радянської кар''єри (покоління
    двірників і сторожів).'
  - 'Самвидав та «Львівська школа»: журнал «Шкапа», абсурдистські оповідання «Ги-ги-ги».'
  - 'Конфлікт з КДБ: обшуки 1974 року та тиск системи через «антирадянщину».'
  - 'Епоха театру «Не журись!» (кінець 80-х): відродження стрілецької пісні та політична
    сатира.'
- section: Містифікації та гра з читачем
  words: 800
  points:
  - 'Мистецтво літературної містифікації: як Винничук водив за ніс науковців.'
  - '«Плач над градом Кия» Ріанґабара: створення псевдо-середньовічного тексту.'
  - '«Житіє гаремноє»: десакралізація образу Роксолани та введення еротичного дискурсу.'
  - '«Легенди Львова»: конструювання нової міфології міста, де вигадка стає частиною
    історії.'
- section: Танґо смерті та великі романи
  words: 1000
  points:
  - 'Роман «Танґо смерті» (2012) як вершина творчості: структура, сюжет, поліфонія.'
  - 'Архетип «львівської четвірки» (українець, поляк, єврей, німець): модель втраченого
    мультикультурного світу.'
  - 'Тема Голокосту та Янівського концтабору: трагедія крізь призму магічного реалізму.'
  - 'Мовна тканина роману: використання львівської ґвари та стилізація під 30-ті роки.'
- section: Сучасна творчість
  words: 700
  points:
  - 'Нові жанрові горизонти: історичні детективи («Аптекар», «Нічний репортер»).'
  - 'Публіцистична діяльність: гостра критика влади та суспільних вад.'
  - 'Феномен вірша «Убий підараса» (2012): література як інструмент прямої політичної
    дії.'
  - 'Вплив на молоде покоління: Винничук як ментор і упорядник антологій.'
- section: Дискусія — Літературна містифікація як жанр
  words: 700
  points:
  - 'Постмодерністська гра з текстом: інтертекстуальність, пастиш, іронія.'
  - 'Етичний вимір: чи має право письменник вигадувати історичні документи?'
  - 'Роль уяви у збереженні (і створенні) національної пам''яті: міф проти сухого
    факту.'
  - 'Винничук у європейському контексті: паралелі з Еко та Борхесом.'
