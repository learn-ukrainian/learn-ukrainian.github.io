slug: pavlo-polubotok
title: 'Павло Полуботок: Мученик за автономію'
word_target: 5000
content_outline:
- section: Вступ — Символ нескореності
  words: 400
  points:
  - Полуботок як уособлення правового та морального опору імперії
  - Відмінність стратегії Полуботка від збройного шляху Мазепи
  - Символізм мученицької смерті в казематі як перемога духу
- section: 'Життєпис: I — Шлях до влади'
  words: 500
  points:
  - Походження з козацької старшини та освіта в Києво-Могилянській академії
  - Кар'єра чернігівського полковника (1706–1722)
  - 'Господарський хист: Полуботок як один із найбагатших магнатів Гетьманщини'
- section: 'Життєпис: II — Наказний гетьман'
  words: 500
  points:
  - Обрання наказним гетьманом у липні 1722 року після смерті Скоропадського
  - Статус 'наказного' як стратегія Петра I для уникнення повноцінних виборів
  - Консолідація козацької старшини навколо ідеї збереження автономних прав
- section: 'Історичний контекст: Наступ імперії'
  words: 600
  points:
  - 'Політична ситуація після Полтави: перехід імперії до адміністративного наступу'
  - Створення Малоросійської колегії (1722) та прибуття бригадира Вельямінова
  - Конфлікт двовладдя та фіскальна експлуатація Гетьманщини
- section: 'Внесок: I — Оборона прав'
  words: 600
  points:
  - 'Судова реформа: запровадження апеляцій до Генерального суду'
  - Протидія свавіллю російських чиновників та заборона використання козаків на канальних
    роботах
  - '''Коломацькі чолобитні'' (1723) як маніфест вимог скасування Колегії та обрання
    гетьмана'
- section: 'Внесок: II — Меценат і господарник'
  words: 500
  points:
  - Будівництво церков (зокрема, Чернігівського Вознесенського собору) та підтримка
    культури
  - Економічна модель українського аристократа-державника доби Бароко
  - Внесок у розвиток Чернігова як культурного центру
- section: 'Останні роки: I — Ув''язнення'
  words: 500
  points:
  - Виклик до Петербурга 'на суд' та арешт козацької старшини (листопад 1723)
  - Жорсткі умови утримання в Петропавлівській фортеці
  - Тиск слідства та категорична відмова просити помилування
- section: 'Останні роки: II — Моральна перемога'
  words: 500
  points:
  - 'Легендарна промова перед Петром I (за ''Історією Русів''): звинувачення тирана'
  - Пророцтво про Божий суд та смерть Полуботка 29 грудня 1724 року
  - Смерть Петра I через 40 днів як містичне підтвердження правоти гетьмана
- section: 'Спадщина: I — Легенда про золото'
  words: 500
  points:
  - Історія виникнення міфу про 200 тисяч золотих у Банку Англії
  - Пошуки скарбу у XX столітті та їх політичний підтекст
  - Золото Полуботка як метафора відкладеного, але не втраченого суверенітету
- section: 'Спадщина: II — Символ у культурі'
  words: 500
  points:
  - Образ 'царя волі' у поемі Тараса Шевченка 'Сон'
  - 'Історична пам''ять: від радянського замовчування до вшанування в незалежній Україні'
  - Актуальність постаті як символу гідності та правового опору
- section: Підсумок
  words: 400
  points:
  - Павло Полуботок як приклад поєднання прагматизму політика і жертовності мученика
  - Значення його спадщини не в матеріальному скарбі, а в уроці гідності
  - Роль постаті у формуванні традиції ненасильницького опору
