slug: mykola-pohribnyi
title: 'Микола Погрібний: Українська редакторська школа'
word_target: 5000
content_outline:
- section: Вступ — Голос української вимови
  words: 600
  points:
  - Микола Погрібний — легендарний диктор і лексикограф, чий голос став еталоном
  - Унікальне поєднання практика ефіру та науковця-мовознавця
  - Вплив Полтавщини на формування його бездоганної фонетичної бази
- section: 'Ранні роки та освіта: Шлях до слова (1920-1955)'
  words: 800
  points:
  - 'Дитинство на Полтавщині (с. Можарка): джерела мовної стійкості'
  - Навчання та становлення у складні історичні періоди (1930-40-ві)
  - 'Прихід на Українське радіо: початок великого шляху'
- section: 'Кар''єра на радіо: Епоха біля мікрофону'
  words: 1000
  points:
  - Робота диктором у 'золотий вік' радіомовлення (1960-80-ві)
  - 'Вимогливість до себе та колег: радіоефір як мовна лабораторія'
  - 'Співпраця з легендами ефіру: Олена Коваленко, Іван Рябоштан'
  - Вплив живого голосу на слухачів в умовах русифікації міст
- section: 'Редакторська діяльність: Боротьба за чистоту'
  words: 900
  points:
  - 'Роль редактора мовного відділу: ''санітар'' ефіру'
  - Протистояння канцеляризмам, суржику та мовним штампам
  - 'Виховання нового покоління дикторів: школа Погрібного'
- section: 'Орфоепічна школа: Словники та принципи'
  words: 1000
  points:
  - Створення 'Словника наголосів' (1959, 1964) — настільної книги мовців
  - 'Фундаментальний ''Орфоепічний словник'' (1983): фіксація живої норми'
  - 'Принципи української орфоепії: відстоювання милозвучності та чіткості'
  - Наукова діяльність в Інституті української мови НАН України
- section: Останні роки та спадщина (1990-1994)
  words: 700
  points:
  - Праця 'Українська літературна вимова' (1992) як підсумок життя
  - Вплив на формування мовного стандарту незалежної України
  - Анатолій Погрібний — продовжувач справи роду
  - 'Пам''ять про Майстра: чому його словники актуальні й досі'
