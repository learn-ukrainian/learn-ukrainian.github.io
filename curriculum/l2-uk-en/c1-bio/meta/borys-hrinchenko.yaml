slug: borys-hrinchenko
title: 'Борис Грінченко: Лексикограф і просвітник'
word_target: 5000
content_outline:
- section: Вступ — Вартовий українського слова
  words: 300
  points:
  - 'Феномен працездатності Грінченка: письменник, вчений, організатор'
  - 'Історичний контекст: праця в умовах Емського указу'
  - 'Ключова теза: перехід від етнографії до націєтворення'
- section: 'Дитинство та юність: Вибір ідентичності'
  words: 400
  points:
  - Походження з дрібнопомісної дворянської родини
  - Вплив Шевченкового 'Кобзаря' на самоусвідомлення
  - Арешт у 16 років та виключення з реального училища
  - Шлях самоосвіти та вивчення європейських мов
- section: 'Педагогічна робота: I — Народний учитель'
  words: 400
  points:
  - Вчителювання в селах Харківщини та Катеринославщини (Христя Алчевська)
  - 'Специфіка викладання: навчання забороненою мовою'
  - Підпільне створення українських читанок та букварів
- section: 'Педагогічна робота: II — Теорія національної школи'
  words: 400
  points:
  - Педагогічні статті та погляди на освіту
  - Критика російської школи як інструменту денаціоналізації
  - Боротьба за права української дитини на рідне слово
- section: 'Літературна діяльність: I — Проза та драматургія'
  words: 400
  points:
  - Реалізм у зображенні селянського життя ('Каторжна', 'Під тихими вербами')
  - 'Соціально-психологічна проза: дослідження людської гідності'
  - Історичні драми та їх роль у пробудженні свідомості ('Степовий гість')
- section: 'Літературна діяльність: II — Публіцистика як зброя'
  words: 400
  points:
  - '''Листи з України Наддніпрянської'': маніфест нового покоління'
  - Полеміка з галичанами та питання єдності мови
  - Заснування 'Братства тарасівців' та радикалізація поглядів
- section: 'Словник української мови: I — Історія проєкту'
  words: 600
  points:
  - Роль журналу 'Киевская старина' та попередників (40 років збору)
  - 'Запрошення Грінченка до редакції: умови повної автономії'
  - 'Внесок родини: титанічна праця Марії Загірньої'
- section: 'Словник української мови: II — Методологія та ''Грінченківка'''
  words: 600
  points:
  - 'Принципи відбору лексики: жива народна мова + література'
  - Створення нового фонетичного правопису ('Грінченківка')
  - Структура гасла та наукова точність тлумачень
- section: 'Словник української мови: III — Значення та визнання'
  words: 600
  points:
  - 'Видання 4-х томів (1907–1909): 68 тисяч слів'
  - Премія Костомарова від Російської академії наук
  - Словник як доказ самодостатності української мови (відповідь імперії)
- section: 'Спадщина: I — Останні роки та смерть'
  words: 400
  points:
  - Керівництво київською 'Просвітою' та тиск цензури
  - Родинні трагедії (смерть доньки Насті) та хвороба
  - Смерть в Італії та похорон у Києві як національна маніфестація
- section: 'Спадщина: II — Каменяр культури'
  words: 500
  points:
  - Вплив на мовну норму 1920-х (Українізація)
  - Перевидання словника та його актуальність у XXI столітті
  - Грінченко як рольова модель 'культурного менеджера'
