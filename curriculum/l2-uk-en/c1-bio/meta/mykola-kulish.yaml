slug: mykola-kulish
title: 'Микола Куліш: Геній українського театру'
word_target: 5000
content_outline:
- section: Вступ — Найбільший драматург XX століття
  words: 400
  points:
  - Микола Куліш як творець модерної української драми європейського рівня
  - 'Трагічний парадокс: митець, народжений революцією, був нею ж знищений'
  - Творчий тандем «Куліш — Курбас» як двигун театрального авангарду
  - Місце в пантеоні «Розстріляного відродження» поруч із Хвильовим та Зеровим
- section: Ранні роки та освіта
  words: 600
  points:
  - 'Дитинство в Чаплинці: сирітство, наймитування та формування характеру'
  - 'Навчання в Олешках: інтелектуальне зростання та перші літературні спроби'
  - 'Перша світова війна: від студента до штабс-капітана (1914–1917)'
  - 'Участь у визвольних змаганнях: організація Дніпровського полку (1919)'
  - 'Шлюб з Антоніною Невелль: історія кохання на все життя (листи з фронту)'
- section: Становлення драматурга
  words: 600
  points:
  - 'Робота інспектором Наросвіти: українізація шкіл на Півдні'
  - '«97» (1924): п''єса про голод, що врятувала театр ім. Франка від банкрутства'
  - 'Переїзд до Харкова (1925): в епіцентрі літературної дискусії'
  - 'Президентство у ВАПЛІТЕ: боротьба за якість української культури'
  - Початок співпраці з Лесем Курбасом і театром «Березіль»
- section: 'Великі п''єси: I — Сатира на радянську дійсність'
  words: 900
  points:
  - '«Народний Малахій» (1927): трагедія утопічного фанатизму та «голубої далі»'
  - Образ Малахія Стаканчика як українського Дон Кіхота радянської епохи
  - '«Мина Мазайло» (1929): геніальна філологічна комедія про комплекс меншовартості'
  - 'Деколонізаційний аспект: суперечка Тьоті Моті та Дядька Тараса як конфлікт імперії
    та колонії'
  - 'Реакція влади: звинувачення в «буржуазному націоналізмі» та заборона вистав'
- section: 'Великі п''єси: II — Екзистенційна драма'
  words: 800
  points:
  - '«Патетична соната» (1929): поліфонічний реквієм по українській революції'
  - 'Новаторство форми: музична структура драматургічного твору'
  - '«Маклена Граса» (1933): алегорія тоталітарного тупика на польському матеріалі'
  - 'Остання постановка Курбаса: прем''єра під наглядом чекістів'
  - 'Еволюція героя Куліша: від романтика до зламаної, але нескореної особистості'
- section: Художній світ Куліша
  words: 600
  points:
  - Синтез традицій українського вертепу та європейського експресіонізму
  - 'Мовна майстерність: використання живого народного слова та суржику як засобу
    характеристики'
  - 'Жанрова специфіка: від реалістичної драми до гротеску і притчі'
  - Проблема «подвійної свідомості» персонажів в умовах тоталітарного тиску
- section: Переслідування та загибель
  words: 600
  points:
  - 'Погром критикою початку 1930-х: тавро «куркульського драматурга»'
  - '1933 рік: самогубство Хвильового та арешт Ялового як сигнал кінця'
  - 'Арешт Куліша (грудень 1934): сфабрикована справа «боротьбистів»'
  - 'Соловецький етап: ізоляція, листи до родини, втрачені рукописи'
  - 'Сандармох (3 листопада 1937): розстріл «українського ешелону» до ювілею революції'
- section: Спадщина та реабілітація
  words: 500
  points:
  - 'Реабілітація 1956 року: повернення чесного імені, але не всіх творів'
  - 'Друге відкриття у 1990-х: видання повного зібрання творів'
  - 'Актуальність у XXI столітті: постановки «Мини Мазайла» як діагноз пострадянського
    суспільства'
  - Місце Куліша в світовій драматургії поруч з Брехтом, Йонеско та Беккетом
