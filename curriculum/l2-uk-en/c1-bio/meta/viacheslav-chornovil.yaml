slug: viacheslav-chornovil
title: 'В''ячеслав Чорновіл: Незламний правозахисник'
word_target: 5000
content_outline:
- section: Вступ — Людина, яка не схилялася
  words: 350
  points:
  - Чорновіл як символ української незламності та «вічний двигун» політики
  - Шлях від літературного критика до лідера нації
  - Трагічна загибель як незагоєна рана української історії
- section: Черкащина та формування характеру
  words: 600
  points:
  - 'Народження в родині сільських інтелігентів (1937): козацьке коріння'
  - Вплив «Розстріляного відродження» через родинну пам'ять
  - 'Навчання в КДУ: від комсомольського активізму до національного прозріння'
  - Формування світогляду під впливом шістдесятників
- section: Журналіст-бунтар
  words: 700
  points:
  - Робота на телебаченні та перші конфлікти з цензурою
  - Акція протесту 4 вересня 1965 року в кінотеатрі «Україна»
  - Відмова свідчити на закритих судах як акт громадянської непокори
  - Звільнення з роботи та перехід у стан «внутрішньої еміграції»
- section: Лихо з розуму та перший арешт
  words: 900
  points:
  - 'Створення збірки «Лихо з розуму» (1967): документування репресій'
  - Міжнародний резонанс праці та премія імені Ніколаса Томаліна
  - 'Арешт 1967 року: вирок та перше ув''язнення'
  - 'Народження самвидаву: журнал «Український вісник» (1970–1972)'
- section: Гельсінська група та другий арешт
  words: 950
  points:
  - '«Великий покіс» 1972 року: арешт під час коляди'
  - 'Мордовські табори: боротьба за Статус політв''язня'
  - Вступ до Української Гельсінської групи (1979) та солідарність
  - Якутське заслання та третій арешт (1980) за сфабрикованою справою
- section: Незалежність та політика
  words: 850
  points:
  - Створення Української Гельсінської Спілки (1988) та Народного Руху (1989)
