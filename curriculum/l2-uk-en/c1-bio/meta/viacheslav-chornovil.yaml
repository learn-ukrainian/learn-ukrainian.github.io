  - 'Президентська кампанія 1991 року: «Президент + Незалежність»'
  - Боротьба за унітарну демократичну державу в 1990-х
- section: Загибель та спадщина
  words: 650
  points:
  - 'Трагічна ніч 25 березня 1999 року: обставини ДТП'
