slug: ivan-kotliarevskyi
title: 'Іван Котляревський: Батько нової літератури'
word_target: 5000
content_outline:
- section: Вступ — Народження нової літератури
  words: 300
  points:
  - 'Символічне значення 1798 року: вихід перших трьох частин «Енеїди».'
  - Перехід від барокової книжної традиції до живої народної мови.
  - Постать Котляревського як зв'язкового між козацькою добою та модерною нацією.
- section: 'Юність та освіта (1769-1789): Полтавське коріння'
  words: 350
  points:
  - Походження з дрібного дворянства (збіднілої козацької старшини).
  - 'Атмосфера Полтави кінця XVIII століття: спогади про Гетьманщину.'
  - Вплив родинного виховання та оточення на формування світогляду.
- section: 'Юність та освіта (1769-1789): Духовна семінарія'
  words: 350
  points:
  - Навчання в Полтавській духовній семінарії (1780-1789).
  - Вивчення античної літератури (Вергілій, Горацій) та риторики.
  - Бурсацький побут і фольклор як джерело гумору та сатири.
  - Вчителювання у поміщицьких родинах на Золотоніщині (1793-1796).
- section: 'Військова служба (1789-1808): Російсько-турецька війна'
  words: 400
  points:
  - Вступ до Сіверського карабінерного полку (1796).
  - Участь у бойових діях 1806-1812 років (облога Ізмаїла, Бендер).
  - Військовий досвід як підґрунтя для батальних сцен «Енеїди».
  - Збереження козацьких традицій у побуті полку.
- section: 'Військова служба (1789-1808): Дипломат і офіцер'
  words: 400
  points:
  - Дипломатична місія до буджацьких татар (1807).
  - Залучення татар на бік війська без пролиття крові.
  - Нагородження орденом Св. Анни та відставка у чині капітана (1808).
  - Вплив військової служби на характер і дисципліну письменника.
- section: '«Енеїда» — літературна революція (1798-1842): Історія створення'
  words: 450
  points:
  - Початок роботи над поемою (1794) під час вчителювання.
  - 'Видання Парпури (1798) без згоди автора: успіх і обурення Котляревського.'
  - Авторське видання 1809 року (4 частини) з присвятою Семену Кочубею.
  - Завершення роботи та посмертне видання 1842 року.
- section: '«Енеїда» — літературна революція (1798-1842): Енциклопедія українства'
  words: 500
  points:
  - Троянці як алегорія запорозьких козаків (одяг, зброя, звичаї).
  - 'Етнографічна точність: опис страв, напоїв, ігор, вечорниць.'
  - 'Демократизм твору: симпатія до простих людей і сатира на панів.'
  - Збереження історичної пам'яті про Гетьманщину в умовах імперії.
- section: '«Енеїда» — літературна революція (1798-1842): Мовний маніфест'
  words: 450
  points:
  - Синтез полтавської говірки та книжних традицій.
  - 'Багатство лексики: синонімічні ряди, фразеологізми, народний гумор.'
  - Легітимізація української мови як літературної, здатної передавати всі відтінки.
  - Вплив мови «Енеїди» на подальший розвиток літератури.
- section: 'Драматургія та громадська діяльність (1808-1838): 1812 рік і політика'
  words: 450
  points:
  - Формування 5-го українського козацького полку (1812).
  - Ентузіазм добровольців та надії на відновлення козацьких прав.
  - Членство в масонській ложі «Любов до істини» (1818-1819).
  - Зв'язки з майбутніми декабристами та просвітницькі ідеї ложі.
- section: 'Драматургія та громадська діяльність (1808-1838): Театр і драматургія'
  words: 500
  points:
  - Директорство в Полтавському вільному театрі (1818-1821).
  - Створення «Наталки Полтавки» (1819) як відповідь на репертуарну кризу.
  - 'Новаторство «Наталки»: живі народні характери, реалізм, роль пісні.'
  - '«Москаль-чарівник»: водевіль і затвердження українського типу.'
- section: 'Драматургія та громадська діяльність (1808-1838): Педагог-гуманіст'
  words: 350
  points:
  - Посада наглядача «Дому виховання дітей бідних дворян» (1810-1835).
  - Впровадження гуманних методів виховання, відмова від тілесних покарань.
  - Турбота про долю вихованців, матеріальна підтримка.
  - Репутація «батька» і морального авторитета в Полтаві.
- section: 'Спадщина — Батько нової літератури: Наступність поколінь'
  words: 300
  points:
  - Вплив на харківських романтиків (Квітка-Основ'яненко, Гулак-Артемовський).
  - Тарас Шевченко і його елегія «На вічну пам'ять Котляревському» (1838).
  - Котляревський як перший класик, що проклав шлях Шевченку.
  - Відкриття пам'ятника у Полтаві (1903) як маніфестація українства.
- section: 'Спадщина — Батько нової літератури: Сучасний погляд'
  words: 250
  points:
  - Котляревський у сучасній культурі (екранізації, театр, музика).
  - Актуальність «Енеїди» як антиімперського тексту.
  - Постать Котляревського в контексті деколонізації культури.
