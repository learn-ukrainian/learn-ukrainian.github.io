slug: valerian-pidmohylnyi
title: 'Валер''ян Підмогильний: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Інтелектуал європейського масштабу'
  words: 300
  points:
  - Валер'ян Підмогильний як центральна постать інтелектуальної прози 1920-х.
  - Руйнівник стереотипу про 'селянську' українську літературу.
  - Поєднання письменницького таланту з титанічною перекладацькою працею.
  - 'Короткий огляд трагічної долі: від ''Ланки'' до Сандармоху.'
- section: 'Ранні роки: Становлення модерніста'
  words: 500
  points:
  - Дитинство в Чаплях та навчання в Катеринославському реальному училищі.
  - Захоплення європейською літературою та вивчення французької мови.
  - Перші літературні спроби (псевдонім Лорд Лістер) та збірка 'Твори. Т. 1'.
  - Переїзд до Києва (1921), робота у Книжковій палаті та одруження.
  - Вчителювання у Ворзелі як період творчого дозрівання.
- section: 'Літературне середовище: Ланка і МАРС'
  words: 600
  points:
  - Участь у літературному угрупованні 'Ланка' (пізніше МАРС).
  - Орієнтація на високе мистецтво та відмова від політичної заангажованості.
  - Дружба з Євгеном Плужником, Григорієм Косинкою та Тодосем Осьмачкою.
  - 'Літературна дискусія 1925–1928 рр.: позиція Підмогильного щодо ''Європи''.'
  - Поїздка до Німеччини та Чехословаччини (1928) як культурний діалог.
- section: 'Творчість I: Роман «Місто» — урбаністичний маніфест'
  words: 1000
  points:
  - «Місто» (1928) як перший урбаністичний роман в українській літературі.
  - 'Образ Степана Радченка: еволюція від селянина до міського інтелектуала.'
  - 'Психологізм твору: амбівалентність підкорення міста (перемога чи поразка?).'
  - 'Екзистенційні мотиви: самотність у натовпі, відчуженість, пошук сенсу.'
  - 'Рецепція роману: критика ''буржуазності'' радянськими ідеологами.'
- section: 'Творчість II: Інтелектуальна проза та переклади'
  words: 800
  points:
  - 'Повість «Невеличка драма»: критика міщанства та роздуми про ірраціональне.'
  - '«Осінь 1929»: спроба осмислити колективізацію (твір втрачено/не закінчено).'
  - 'Роль Підмогильного-перекладача: введення в український контекст А. Франса, Г.
    де Мопассана, О. де Бальзака.'
  - 'Стилістика перекладів: точність, багатство мови, збереження авторського стилю.'
  - Переклад як форма культурного спротиву провінційності.
- section: 'Репресії: Хроніка знищення'
  words: 800
  points:
  - Посилення ідеологічного тиску на початку 1930-х.
  - 'Арешт 8 грудня 1934 року: сфабриковані звинувачення у тероризмі.'
  - 'Слідство і вирок: ''зізнання'' під тортурами та засудження до 10 років таборів.'
  - 'Соловки: життя в ізоляції, листування з дружиною, продовження праці.'
  - Листи із Соловків як документ людської гідності та незламності.
- section: 'Спадщина: Розстріляне, але живе відродження'
  words: 1000
  points:
  - Розстріл 3 листопада 1937 року в урочищі Сандармох (до 20-річчя Жовтня).
  - Довге забуття та вилучення творів із бібліотек.
  - Реабілітація та повернення творчості в 1990-х роках.
  - Вплив Підмогильного на сучасну українську літературу та філософію.
  - Валер'ян Підмогильний як символ європейської України, знищеної імперією.
