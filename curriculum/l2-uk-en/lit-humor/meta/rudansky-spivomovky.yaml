slug: rudansky-spivomovky
title: Rudansky Spivomovky
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Степан Руданський — лікар, поет, вигнанець'
    words: 600
    points:
      - 'Біографія (1834–1873): народження на Поділлі, родина священника, семінарія
        в Кам''янці-Подільському'
      - 'Свідомий вибір: медицина замість священства (Медико-хірургічна академія,
        Петербург, 1856) — розрив з колоніальною ментальністю батька'
      - 'Петербурзький контекст: найтемніший час — після розгрому Кирило-Мефодіївського
        товариства, перед Валуєвським циркуляром; знайомство з Костомаровим, Пироговим'
      - 'Ялтинський період (1861–1873): міський лікар, матеріальна нужда (500 руб./рік),
        ізоляція від літературного середовища'
      - Трагічна смерть у 39 років від холери під час лікування хворих — символ долі
        українського митця в імперії
      - 'Місце в LIT-HUMOR: від Котляревського (бурлеск) → Руданський (сатирична співомовка)
        → Вишня → сучасний гумор'
  - section: 'Жанр співомовки: визначення та походження'
    words: 500
    points:
      - 'Етимологія: «Співа» (Муза) + «мовити» = «те, що Муза промовляє» — авторський
        неологізм Руданського'
      - 'Визначення: невеликий сюжетний вірш гумористично-сатиричного змісту на основі
        народних анекдотів, казок, приказок'
      - 'Жанрові ознаки: один комічний епізод, стислий виклад, динамічний розвиток,
        несподівана розв''язка, 1-2 дійові особи, гострий дотепний вислів у кінці'
      - 'Відмінність від гуморески: обов''язково віршована форма + фольклорне джерело'
      - 'Попередники (Боровиковський, Гребінка) vs. Руданський: жанр остаточно утвердився
        саме у його творчості'
      - Три рукописні збірки «Співомовки козака Вінка Руданського» (1851–1860) — не
        опубліковані за життя через цензуру та брак коштів
      - Франко визнав жанр, написавши «Нові співомовки» — «короткі епічні анекдоти
        з сюжетами з народних джерел»
  - section: Тематична класифікація співомовок
    words: 400
    points:
      - 'Три тематичні групи: (1) антипанські — висміювання панської зверхності; (2)
        антиклерикальні — сатира на духовенство; (3) побутові — загальнолюдські вади'
      - 'Наскрізний герой: простий селянин або козак — кмітливий, дотепний, гідний,
        здатний перехитрити пана і короля'
      - 'Соціальна функція: не розвага, а критика — викриття станової нерівності через
        сміх'
      - 'Фольклорна основа: народні анекдоти, казкові мотиви (напр. «Мудра дівчина»),
        приказки, прислів''я'
  - section: 'Аналіз ключових творів: I — Антипанська сатира'
    words: 550
    points:
      - '«Добре торгувалось» (1857): чумак перехитрив купців, що хотіли принизити
        його; уславлення народної кмітливості та гідності'
      - '«Пан та Іван в дорозі»: «Побратався пан з Іваном» — іронія з першого рядка;
        кмітливий бідняк перемудрив пана; афоризм «Хтів пан когось ошукати, та й сам
        ошукавсь»'
      - '«Гуменний»: діалогова структура (дідич vs. прикажчик); каскад катастроф як
        композиційний прийом; засудження безвідповідальності панства'
      - '«Розумний панич»: висміювання панської нерозумності — контраст між соціальним
        статусом і реальним інтелектом'
  - section: 'Аналіз ключових творів: II — Козацький гумор і антимонархічна сатира'
    words: 500
    points:
      - '«Козак і король»: козак перехитрив короля, давши відповіді на нерозв''язні
        загадки; основа — казка «Мудра дівчина»; антимонархічний підтекст'
      - '«Запорожці у короля»: козацька кмітливість і гідність у зустрічі з монархом;
        сатира на церемоніальну порожнечу влади'
      - '«Свиня свинею»: сатира на моральні вади через козацький сюжет'
      - 'Козацький ідеал: козак = вільна людина, яка не кланяється ні пану, ні королю;
        пряма ідеологічна лінія від Котляревського (троянці = козаки)'
  - section: 'Стилістика та мова: I — Версифікаційне новаторство'
    words: 500
    points:
      - 91,3% творів написані силабікою (народнопісенний ритм); лише 8,7% — силабо-тонікою
      - Домінуючий розмір 8,6,8,6 (47,2% творів) — графічне відображення 14-складового
        рядка з 86% хореїзацією
      - Коломийковий дистих як канонічний розмір співомовки (як п'ятистопний ямб для
        сонета)
      - 'Строфіка: 97% катренів; 96,7% точних рим; 87,5% жіночих закінчень; 53,25%
        дієслівних рим'
      - «У період після Шевченка і до Франка жоден поет не давав такого багатства
        віршових форм» — літературознавча оцінка
  - section: 'Стилістика та мова: II — Арсенал комічного'
    words: 450
    points:
      - Діалогова форма як основний структурний прийом (особливо антипанські співомовки)
      - 'Контраст персонажів: пан vs. селянин, козак vs. король — соціальна ієрархія
        інвертується через гумор'
      - 'Народна фразеологія: «живна народна мова, пересипана прислів''ями та приказками»'
      - Несподівана розв'язка (punchline) — визначальна структурна ознака
      - 'Арсенал: іронія, гіпербола, сарказм, парадокс, комічна ситуація'
  - section: 'Деколонізаційна перспектива: I — Цензура і замовчування'
    words: 500
    points:
      - 'Валуєвський циркуляр (1863): заборона українських навчальних і релігійних
        видань — за життя Руданського'
      - 'Емський указ (1876): повна заборона друку, ввозу книг, театру, концертів,
        навчання українською — посмертне знищення спадщини'
      - 'Три рукописні збірки не опубліковані: системна цензура + фінансова неспроможність
        = подвійний удар'
      - Батько-священник вимагав «не по-малоросійському» — колоніальна ментальність
        проникла в родини духовенства
      - 'Ялтинська ізоляція: далеко від Київського, Петербурзького літературного середовища;
        500 руб./рік — на межі злиднів'
  - section: 'Деколонізаційна перспектива: II — Радянські міфи і українська реальність'
    words: 500
    points:
      - 'Радянський міф: «гуморист-анекдотист», розважальний жанр; стирання соціальної
        критики і антиімперського змісту'
      - Радянський канон «великої трійці» (Шевченко-Франко-Леся Українка) витіснив
        Руданського з пантеону
      - 'Українська реальність: Франко ставив Руданського «обік Шевченка»; жанр співомовки
        — не обробка анекдотів, а авторське новаторство'
      - '«Козак Вінко» — не псевдонім, а акт ідентифікації з козацькою традицією:
        усна, народна, антиімперська'
      - Алкоголізм і ранню смерть подавали як «особисту слабкість», не пов'язуючи
        з колоніальним тиском, ізоляцією, знищенням можливостей
  - section: Спадщина та вплив
    words: 500
    points:
      - 'Франко: «обік Шевченка, найвизначніший в українськім письменстві XIX віку»
        — найвища оцінка'
      - 'Драгоманов: «справжній талант з новими темами»; Рильський: один із «найпопулярніших»
        авторів села'
      - 'Вплив на наступників: Франко («Нові співомовки»), Леся Українка, Самійленко,
        Кржижановський, Глазовий'
      - «Повій, вітре, на Вкраїну» — став народною піснею, відомою на всіх континентах,
        де живуть українці
      - 'Переклади: «Іліада», «Слово о полку Ігоревім», «Енеїда» Вергілія — культурний
        міст між традиціями'
      - 'Діаспорне збереження: видання 1956 р. у Нью-Йорку («Сурма») під час радянського
        замовчування'
      - 'Лінія в LIT-HUMOR: Котляревський → Руданський → Нечуй-Левицький → Вишня →
        Глазовий → Андрухович → меми'
