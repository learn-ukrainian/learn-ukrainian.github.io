slug: modern-memes-as-folklore
title: Modern Memes As Folklore
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Природа цифрового фольклору'
  words: 350
  points:
  - 'Трансформація фольклору: від усної народної творчості до цифрового формату.'
  - 'Ознаки мема як фольклору: анонімність, варіативність, колективне авторство.'
  - Мем як вірусна одиниця культурної інформації (концепція Р. Докінза в українських
    реаліях).
- section: 'Вступ та контекст: II — Еволюція українського сміхового простору'
  words: 350
  points:
  - Від політичної сатири нульових до мемів Революції Гідності.
  - Розрив із російським інформаційним полем ('рунетом') та формування власного культурного
    коду.
  - Традиції українського гумору (від 'Енеїди' Котляревського) у сучасній цифровій
    обгортці.
- section: 'Аналіз ключових творів: I — Меми першої фази війни (2014-2021)'
  words: 400
  points:
  - 'Десакралізація ворога: реакція на окупацію Криму та Донбасу.'
  - Сатира на російську пропаганду (міф про 'розп'ятого хлопчика', 'візитку Яроша').
  - Образ українського воїна-захисника у ранніх військових мемах ('кіборги').
- section: 'Аналіз ключових творів: II — Вибух гумору після 24 лютого'
  words: 500
  points:
  - Культова фраза про 'російський військовий корабель' як маніфест опору.
  - Міфологізація народного спротиву ('тракторні війська', банка з огірками).
  - 'Лінгвістичні меми: феномен ''бавовни'' як відповідь на російську новомову.'
  - Образ 'чмоні' як руйнування міфу про 'другу армію світу'.
- section: 'Аналіз ключових творів: III — Міжнародний вимір українських мемів'
  words: 400
  points:
  - 'Інтернаціоналізація українського контексту: як світ зрозумів український гумор.'
  - Феномен NAFO (North Atlantic Fella Organization) у боротьбі з російськими тролями.
  - Меми як інструмент народної дипломатії та залучення міжнародної підтримки.
- section: 'Стилістика та мова автора: I — Мовні ігри та змішування регістрів'
  words: 400
  points:
  - Використання суржику, діалектизмів та неологізмів для створення комічного ефекту.
  - Машинний переклад та іронічна апропріація ('немає сечі терпіти ці борошна').
  - Колажність та інтертекстуальність візуальних мемів.
- section: 'Стилістика та мова автора: II — Функція карнавалізації'
  words: 350
  points:
  - 'Теорія М. Бахтіна в дії: карнавальне перевертання ієрархій.'
  - Роль ненормативної лексики як інструменту емоційної розрядки та встановлення кордонів.
  - Абсурдизація як відповідь на екзистенційну загрозу.
- section: 'Деколонізаційна перспектива: I — Як меми руйнують імперські міфи'
  words: 400
  points:
  - Сміх як зброя проти страху перед імперією.
  - Деконструкція наративу про 'братні народи' та культурну меншовартість України.
  - Як українські меми розкрили глобальній аудиторії сутність російського фашизму.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
  words: 400
  points:
  - Перехід від об'єкта агресії до активного суб'єкта, що диктує порядок денний.
  - 'Мемна ідентичність: ''ми з України'' як бренд незламності.'
  - 'Відмова від віктимізації: українці постають як сильна, винахідлива нація.'
- section: 'Підсумок та спадщина: I — Значення для національної ідентичності'
  words: 450
  points:
  - Терапевтична функція колективного сміху під час національної травми.
  - 'Меми як новий історичний літопис: фіксація подій та настроїв доби.'
  - Внесок цифрового фольклору у формування сучасної політичної нації.
