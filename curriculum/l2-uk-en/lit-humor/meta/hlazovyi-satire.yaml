slug: hlazovyi-satire
title: Hlazovyi Satire
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 500
    points:
      - Павло Прокопович Глазовий (30.08.1922, Новоскелюватка, Миколаївщина — 29.10.2004,
        Київ)
      - Батько — хлібороб, мати — дочка священика; конфіскація майна комнезамами;
        переїзд
      - 'Голодомор 1932–33: 11-річний хлопчик втратив молодшого брата на власних очах'
      - Новомосковська педагогічна школа; рік учителювання; мобілізація (1940)
      - 'Друга світова: авіаційний механік, блокада Ленінграда, три бойові ордени,
        пошкодження зору'
      - Криворізький педінститут → Остап Вишня помітив талант → Київський педінститут
        (1950)
      - 'Лінія спадкоємності: Руданський → Вишня → Глазовий'
  - section: 'Аналіз ключових творів: I — Журнал «Перець» і перші збірки'
    words: 550
    points:
      - '1950–1961: заступник головного редактора «Перця»; наклад зріс до 3,5 млн
        примірників'
      - Створення радіопередачі «Колюча пошта»; сценарії для ТБ-передачі «Наші вечори»
      - 'Інцидент 1957: фейлетон «Дорожні враження» → допити КДБ; цитата: «Мене чи
        не обезголовили»'
      - Пародія на Андрія Малишка → увага КДБ → втеча до Києва
      - 'Перші збірки: «Великі цяці» (1956), «Карикатури з натури» (1963), «Коротко
        і ясно» (1965)'
      - «Перець» — один із трьох видань, що постійно порушували межі радянської цензури
  - section: 'Аналіз ключових творів: II — Гумореска як зброя'
    words: 550
    points:
      - '«Еволюція»: зоопарк, хлопчик, мавпи — хто справді є ''людиною''; засудження
        тих, хто ганьбить людяність'
      - '«Найважча роль»: мати хвалиться талантом сина → абсурдна розв''язка (бочка);
        контраст очікування і реальності'
      - «Похвала», «Заморські гості», «Кухлик» — інші ключові гуморески
      - 'Художні засоби: інверсія, метафора, персоніфікація, риторичні запитання,
        гра слів'
      - 'Іронічно-пародійна спрямованість: зовні ''легкий'' жанр, насправді — моральна
        діагностика суспільства'
      - 'Персонажна типізація: мати-наседка, ледачий учень, хвалько, бюрократ'
  - section: 'Аналіз ключових творів: III — Співомовка і народна традиція'
    words: 550
    points:
      - Відродження жанру, започаткованого Степаном Руданським (XIX ст.)
      - 'Джерела: народні анекдоти, жарти, приказки, фразеологізми, казкові мотиви'
      - «Куміада» (1969) — гумористична поема про кумівство як українське явище
      - «Усмішки» (1971), «Весела розмова» (1979) — продовження жанрової традиції
        Вишні
      - '1986: антологія «Українська співомовка» — понад 20 авторів, натхненних популярністю
        Глазового'
      - 'Критичний прийом: масова популярність vs. зауваження щодо поверхового трактування
        фольклору'
  - section: 'Аналіз ключових творів: IV — «Сміхологія» та зрілий гумор'
    words: 550
    points:
      - '«Сміхологія» (1982; розширене видання 2007 — 900 творів): вершина зрілої
        творчості'
      - 'Назва = ''наука про сміх'': програмний маніфест; гумор як системний підхід
        до суспільної гігієни'
      - '1988: Премія імені Остапа Вишні — нагорода, що з''єднує учня й учителя'
      - '«Байкаграфія» (2008, посмертно): вершина байкарської майстерності; Езопові
        мотиви + оригінал'
      - «Архетипи» (2003) — остання збірка; тональний зсув від розваги до тривоги
        за сучасність
      - 'Цитата: «Ми зерна радості сіємо, плекаємо квітку загального щастя працею
        і творчістю»'
  - section: 'Стилістика та мова автора: I — Мовні засоби та жанри'
    words: 500
    points:
      - 'Жанровий діапазон: гумореска, співомовка, байка, фейлетон, усмішка, мініатюра,
        дитяча поезія (7+)'
      - '«Гіркий перець і добре серце» — формула стилю: гострота критики + теплота
        до людини'
      - Поєднання точності, дотепності та «неперевершеної віршованої форми»
      - Від «гумору-зброї» (сатиричне викриття) до «гумору-терапії» (сміх як лікування)
      - 'Демократичний, доступний стиль: «від малого до старого»'
      - 'Тематика: школа, село, вчителі, учні, жінки, побут, мораль, етика'
  - section: 'Стилістика та мова автора: II — Фольклорне коріння і сценічне виконання'
    words: 450
    points:
      - 'Корені в народній культурі: анекдоти, приказки, діалекти, фразеологізми'
      - Живий, народний стиль без 'книжної' мови або складних конструкцій
      - 'Виконавці: Андрій Сова, Анатолій Паламаренко, Андрій Литвинов, Неоніла Крюкова'
      - Композитор Петро Андрійчук; дует «Бузина», ансамбль «Дарничанка»
      - 'Глазовий як ''усний автор'': тексти, написані для виконання, не лише для
        читання'
  - section: 'Деколонізаційна перспектива: I — Гумор проти русифікації'
    words: 500
    points:
      - Працював виключно українською мовою; обирав виключно українські літературні
        жанри
      - Журнал «Перець» під його керівництвом — платформа масового поширення українськомовного
        контенту
      - 'Радянська влада: обмеження публікацій і відмова в нагородах (визнання лише
        1993, після СРСР)'
      - Кожен сценічний виступ з його гуморесками — акт побутування української мови
        в публічному просторі
      - Гуморески 'висловлювали глибоку турботу про виживання та майбутнє української
        культури'
  - section: 'Деколонізаційна перспектива: II — Спротив через сміх'
    words: 450
    points:
      - 'Радянський канон: Глазовий = ''безневинний гуморист'', ''наслідувач Вишні''
        — деполітизація'
      - 'Зв''язок Глазовий–Вишня: не ''учень радянського гумориста'', а спадкоємець
        репресованого майстра'
      - 'Лінія спадкоємності: Руданський (ХІХ ст.) → Вишня (ХХ ст., ГУЛАГ) → Глазовий
        — традиція, яку не знищили'
      - Голодомор, конфіскація, війна — сміх як відповідь системному насильству
      - «Народ, здатний сміятися, не можна знищити чи розігнати» — програмне переконання
  - section: Підсумок та спадщина
    words: 400
    points:
      - 13 збірок сатири та гумору + 8 дитячих книжок; 900+ творів у збірці «Сміхологія»
      - 'Нагороди: Премія Вишні (1988), Премія Сагайдачного (1996), Орден «За заслуги»
        III ст. (1997)'
      - Вулиця в Кривому Розі (2016); меморіальна дошка у Києві (2011); фонд (Біла
        Церква)
      - 'Шкільна програма: «Еволюція» та «Найважча роль» (6 клас)'
      - 'Самоепітафія: ''Це той Павло, який жив, щоб людям була радість'''
      - 'Місце у традиції: Руданський → Вишня → Глазовий → сучасний український гумор'
