slug: kotliarevsky-laughter
title: "«Енеїда»: Бурлеск і Сміх як Зброя у Котляревського"
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 550
    points:
      - 'Біографія Котляревського (1769–1838): Полтава, семінарія, військова служба
        1796–1808, капітан, наглядач і директор театру'
      - 'Історичний контекст: зруйнування Запорозької Січі 1775 р. та ліквідація Гетьманщини
        — визначальна травма покоління'
      - Чому саме сміх? В умовах колоніального тиску серйозне висловлювання було неможливим
        — бурлеск став щитом
      - 'Місце модуля в LIT-HUMOR: Котляревський як першоджерело української гумористичної
        традиції'
  - section: 'Аналіз ключових творів: I — «Енеїда» як бурлескна травестія'
    words: 850
    points:
      - 'Жанр: бурлескно-травестійна героїко-комічна поема (6 частин проти 12 у Вергілія)'
      - 'Принцип травестії: сюжет Вергілія перенесено в українські реалії XVIII ст.;
        троянці = козаки, боги = панство, Троя = Січ'
      - 'Історія публікації: піратське видання Парпури 1798 р. (зі словником 972 слів),
        авторське 1809 р. з проклинанням «Мацапури»'
      - '«Еней був парубок моторний / І хлопець хоть куди козак» — програмне зниження:
        римський герой стає козацьким парубком'
      - Еней зустрічає «гішпанців, прусів, татарву, ляхів, турчинів» — античний світ
        наповнюється реальною геополітикою Котляревського
  - section: 'Аналіз ключових творів: II — Козацький сміх і соціальна сатира в «Енеїді»'
    words: 700
    points:
      - 'Три функції сміху (за літературознавцями): (1) націєоборонна, (2) втілення
        історичного оптимізму, (3) прикриття ідей незалежності'
      - 'Сцена пекла: енциклопедія соціальних пороків — хабарники, судді-продажники,
        панство; праведні козаки у раю'
      - 'Еволюція гумору: у частинах I–II переважає грубий бурлеск, у III–IV — витончена
        соціальна сатира з глибокими узагальненнями'
      - 'Не лише критика верхів: іронія щодо вад простого народу, опис порядків у
        судах, війську, канцеляріях'
  - section: 'Аналіз ключових творів: III — «Наталка Полтавка» і «Москаль-чарівник»'
    words: 600
    points:
      - '«Наталка Полтавка» (1819): перший драматичний твір нової української літератури;
        прем''єра 22 липня 1819, Полтавський театр; молодий Щепкін у ролі виборного'
      - 'Гумор «Наталки»: мовна індивідуалізація (мова возного — суміш бюрократичної
        й народної лексики); комічні ситуації, приказки'
      - '«Москаль-чарівник» (1819): водевіль на основі французької п''єси Ансома,
        перенесений в українські реалії; «москаль» (солдат-окупант) як об''єкт народного
        осміяння'
      - Обидві п'єси з успіхом ставились у Петербурзі (Олександрінський) та Москві
        (Малий) у 1820-х рр.
      - Карпенко-Карий назвав «Наталку Полтавку» «праматір'ю українського народного
        театру»
  - section: 'Стилістика та мова автора: I — Прийоми комічного'
    words: 600
    points:
      - 'Арсенал прийомів: бурлеск (зниження високого), травестія (переодягання),
        макаронічна мова, гротеск, гіпербола, антитеза, іронія, сарказм'
      - 'Зниження як головний прийом: римський герой → козацький парубок; олімпійські
        боги → українське панство'
      - 'Гіпертрофія побутових деталей: пиятика, бійки, їжа — «гастрономія у Котляревського
        гіпертрофована»'
      - 'Чижевський: «грубі вирази заповнювали строфи — доречні для травестії, але
        неприємні читачам», бо поема набула серйозного значення'
  - section: 'Стилістика та мова автора: II — Народна мова як літературна зброя'
    words: 500
    points:
      - «Перший великий пам'ятник українського письменства, створений живою народною
        мовою» — Огієнко
      - 'Мовна стратифікація: передано не лише народну мову, а й мову козацької верхівки,
        панства, бюрократії'
      - «Низове козацьке бароко» проти «високого стилю російського псевдокласицизму»
        — стилістичний вибір як культурний маніфест
      - 'Словник Парпури (1798, 972 слова) — перший лексикографічний пам''ятник нової
        української мови: побічний продукт «Енеїди»'
  - section: Деколонізаційна перспектива
    words: 600
    points:
      - 'Імперський міф: «Енеїда» — просто жарт, «малоросійська» розвага. Деколонізоване
        прочитання: перший національний текст, що утвердив право на власну мову'
      - 'Грабович: бурлеск — «висміювання зверхнього, штучного, холодного світу нормативного
        імперського суспільства»'
      - 'Радянська цензура вилучала антиімперський зміст: алюзія Троя = Січ замовчувалась'
      - 'Українська суб''єктність: «національна самоідентифікація автора й героїв
        засвідчувала патріотизм і високу гідність українців»'
      - 'Писати народною мовою = акт спротиву: «Якщо нова література з''являлася в
        Україні, то це було виявом волі українського народу»'
  - section: Підсумок та спадщина
    words: 600
    points:
      - '«Школа Котляревського»: Гулак-Артемовський (предтеча романтизму), Квітка-Основ''яненко
        (проза, «Сватання на Гончарівці»), Гребінка'
      - «Бурлеск стає мало чи не національним українським стилем» першої половини
        ХІХ ст.
      - 'Котляревський довів: українська мова здатна на повноцінну літературу — відкрив
        шлях Шевченку'
      - «Енеїда» — визначальна для розвитку національної культури в XIX столітті;
        козацькі троянці стали символом українського спротиву
      - 'Лінія від Котляревського до сучасного гумору: бурлескна травестія → Вишня
        → Андрухович → меми'
