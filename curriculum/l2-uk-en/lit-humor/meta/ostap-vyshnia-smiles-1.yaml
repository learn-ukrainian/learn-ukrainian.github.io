slug: ostap-vyshnia-smiles-1
title: "«Усмішки»: I — Мистецтво Народного Гумору Остапа Вишні"
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 600
    points:
      - 'Біографія: Павло Губенко, 13.11.1889, хутір Чечва (Полтавщина), сім''я 17
        дітей — селянське коріння визначило мову й тематику'
      - 'Освіта: фельдшерська школа (1907), спроба університету (1917), недоучений
        інтелігент — досвід «між селом і містом»'
      - 'Літературний дебют: П. Грунський (1919, Кам''янець-Подільський) → Остап Вишня
        (22.07.1921, Харків, фейлетон «Чудака, їй-богу!»)'
      - 'Семантика псевдоніму: козацьке ім''я Остап + ботанічне прізвище Вишня → народність
        і ліризм'
      - 'Контекст: політика українізації 1920-х; розквіт українськомовної преси; журнал
        «Червоний перець»'
      - 'Місце в LIT-HUMOR: після Котляревського (бурлеск), Руданського (співомовки),
        Нечуя (реалізм) → модерний гумор XX ст.'
  - section: 'Аналіз ключових творів: I — Жанр «усмішка» та перші збірки'
    words: 850
    points:
      - 'Визначення жанру: «синтез гумористичного оповідання, анекдоту й фейлетону;
        лаконізм, дотепність, обов''язкова присутність автора»'
      - 'Двочастинна структура (Гриценко): пропагандистське послання + комічне опрацювання
        — читач отримував гумор, але УКРАЇНСЬКОЮ мовою'
      - 'Чим усмішка відрізняється від фейлетону: ліризм, доброзичливий тон, авторська
        присутність, відсутність злого сарказму'
      - 'Серія збірок: «Вишневі усмішки» (1924), кримські (1925), «Українізуємось»
        (1926), театральні (1928) — 23 книжки за десятиліття'
      - 'Тематичні групи: село, побут, бюрократія, культура, мовне питання, подорожі'
      - 'М. Рильський: усмішки — це «лірична поезія в прозі»; композиційно прості,
        без розгорнутого сюжету'
  - section: 'Аналіз ключових творів: II — «Моя автобіографія» та гумор буденності'
    words: 600
    points:
      - Написано за одну ніч (15–16 березня 1927) — 15 глав-етюдів
      - Тавтологія назви — навмисний комічний прийом (автобіографія — «моя» за визначенням)
      - 'Три композиційні частини: народження/дитинство, формальна освіта, становлення
        світогляду'
      - 'Самопародія: наївний оповідач → мудрий і талановитий (подвійне дно гумору)'
      - 'Ключові цитати: «витягли з колодязя, коли напували корову Оришку»; «Зробився
        Остапом Вишнею та й почав писати»'
      - 'Рильський: «Тут — увесь Вишня: любов до життя, любов до людини, іронія»'
      - 'Ключові образи: батько з черевиком, учитель Іван Максимович, корова Оришка
        — побутове як філософське'
  - section: 'Аналіз ключових творів: III — Сатиричні усмішки та «Король тиражів»'
    words: 600
    points:
      - 'Сатиричні теми: бюрократизм, ледарство, хуліганство, хабарництво, браконьєрство'
      - «Радянське село» — понад 500 000 наклад (1928–1929); «Вісті ВУЦВК» — ~90 000
      - Фельйетони перевидавалися від «метеликів» (листівок) до 100-сторінкових збірок
      - 'Гриценко: 83% книжок продавалося в містах — Вишня українізував міщан, а не
        лише селян'
      - 'Гальченко: «усмішки так само сприяли ліквідації неписьменності, як і кампанії
        з лікнепу»'
      - 'Вишня як «народний заступник»: сотні листів, заступництво за акторів, художників,
        людей похилого віку'
      - 'Етнографія 1925–1926: селяни порівнювали Вишню з Ходжою Насреддіном — трикстер-посередник
        між владою й народом'
  - section: 'Стилістика та мова автора: I — Арсенал комічного'
    words: 600
    points:
      - 'Контраст — головний метод: «Ловіть, спостерігайте контрасти — і буде сміх»
        (Вишня)'
      - 'Гіпербола та перебільшення: деформація реальності для комічного ефекту'
      - 'Персоніфікація: олюднення предметів і тварин'
      - 'Гротеск: фантастичні сцени для викриття бюрократичного абсурду'
      - 'Іронія: урочистий стиль для нікчемних ситуацій; мілітарна лексика для мирних
        дій'
      - Інтимна розповідь від першої особи — авторська присутність як структурний
        прийом
      - 'Парадоксальні порівняння: поєднання несумісних понять створює когнітивний
        дисонанс'
      - 'Філософія гумору: «Щоб мати право глузувати з людей… треба їх любити. Більше,
        ніж самого себе»'
  - section: 'Стилістика та мова автора: II — Народна мова, неологізми, фразеологія'
    words: 550
    points:
      - 'Фольклорна основа: думи, казки, замовляння, голосіння, бурлеск — гумор укорінений
        у народній традиції'
      - 'Комічні неологізми: «окрвиконкомствує», «епікіровка мисливця» — обюрократлення
        мови як об''єкт сатири'
      - 'Конотативні власні назви: імена підкреслюють характер (звукова семантика)'
      - 'Метонімія з комічним ефектом: лисиця → «горжетка» (хутряна пелерина)'
      - 'Комічні евфемізми та звукова деформація: п''яна мова, мова замерзлих, діалектні
        варіації'
      - 'Фразеологічна маніпуляція: підміна слів у сталих зворотах, буквалізація ідіом'
      - Церковнослов'янізми в побутовому контексті — комічний дисонанс часових площин
  - section: Деколонізаційна перспектива
    words: 600
    points:
      - 'Радянський канон: «радянський сатирик», «улюбленець трудящих», «м''який гуморист»
        — деполітизація Вишні'
      - 'Деколонізоване прочитання: найефективніший інструмент масової українізації
        1920-х'
      - Писати народною українською для масової аудиторії = культурний спротив русифікації
      - «Народний гуморист» — конструкт Хрущовської відлиги (1960-ті), що замовчував
        гостру сатиру 1920-х
      - Арешт 1933 — цілеспрямоване знищення найпопулярнішого українського автора
        (тема модуля «Prison»)
      - 'Суб''єктність: Вишня — не «розважальний клоун», а громадський лідер, посередник
        між народом і владою'
      - 83% книжок продавалися в містах — Вишня українізував урбанізоване, часто російськомовне
        населення
  - section: Підсумок та спадщина
    words: 600
    points:
      - 'Лінія гумору: Котляревський (бурлеск) → Руданський → Нечуй → Вишня (модерна
        усмішка) → Андрухович → сучасні меми'
      - Жанр «усмішка» — унікальний внесок в українську літературу без світових аналогів
      - Масова популярність 1920-х = доказ самодостатності українськомовного культурного
        ринку
      - 'Вплив на мову: неологізми, фразеологізми, мовні моделі увійшли в живе мовлення'
      - 'Антоненко-Давидович: «Критикувати О. Вишню — це писати рецензію на нашого
        читача» — Вишня як дзеркало нації'
      - 'Містик до наступних модулів: Smiles 2 — «Мисливські усмішки» (пост-таборовий
        період); Prison — арешт, Розстріляне відродження'
