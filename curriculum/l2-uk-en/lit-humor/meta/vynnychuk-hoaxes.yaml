slug: vynnychuk-hoaxes
title: Vynnychuk Hoaxes
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Радянська цензура і містифікація'
  words: 600
  points:
  - Літературне середовище Львова 1970-80-х років та феномен самвидаву.
  - Містифікація як свідомий літературний прийом та форма інтелектуального спротиву
    системі.
  - 'Мотивація автора: «намагання дати ляпаса тодішній системі» та висміяти закостенілість
    радянської цензури.'
- section: 'Аналіз ключових творів: Ріанґабар і «Плач над градом Кия»'
  words: 800
  points:
  - Історія створення легенди про ірландського ченця Ріанґабара, «свідка» зруйнування
    Києва Батиєм у 1240 році.
  - Публікації містифікації у пресі («Літературна Україна», «Жовтень»).
  - 'Академічний курйоз: закріплення постаті Ріанґабара як реальної у статті «Ірландська
    література» («УЛЕ», 1990).'
- section: 'Аналіз ключових творів: Анна Любовичівна і «Пісня світова»'
  words: 800
  points:
  - Створення вигаданої поетеси XVII століття та конструювання «Пісні світової».
  - Гра з гендерним аспектом давньої української літератури.
  - Потрапляння акровірша до фундаментальної антології барокової літератури «Слово
    многоцінне» (2006) як доказ інерційності академічного середовища.
- section: 'Стилістика та мова автора: Імітація як зброя'
  words: 700
  points:
  - 'Аналіз мовних стратегій Винничука: глибока стилізація під давньоукраїнську мову
    та переклади з кельтських мов.'
  - Використання архаїзмів, барокової орнаментики та псевдоісторичних топонімів для
    досягнення ефекту автентичності.
  - Чорний гумор, іронія та підрив пафосу як ключові елементи стилю Винничука-містифікатора.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 400
  points:
  - Викриття провінційності та обмеженості радянського літературознавства, яке не
    могло відрізнити імітацію від оригіналу.
  - 'Деконструкція серйозності офіційного канону: сміх та іронія проти тоталітарного
    контролю.'
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 400
  points:
  - 'Конструювання паралельної європейської історії: зв''язок Києва з Ірландією поза
    російським контекстом.'
  - Письменник бере владу у свої руки, створюючи власний «європейський» канон української
    літератури без дозволу цензури.
- section: 'Підсумок та спадщина: Значення містифікацій'
  words: 300
  points:
  - Містифікації Юрія Винничука як зразок українського літературного постмодернізму.
  - Тривалий вплив цих творів на розвиток критичного мислення в сучасному українському
    літературознавстві.
