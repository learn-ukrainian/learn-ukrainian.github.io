slug: ilchenko-cossack-mamai
title: Ilchenko Cossack Mamai
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Історичне тло'
  words: 450
  points:
  - Літературна та політична атмосфера 1950-х років (хрущовська відлига), що уможливила
    появу нешаблонного твору.
  - Відхід від канонів соцреалізму до міфопоетичного осмислення минулого.
  - Звернення до доби Хмельниччини як до джерела національної ідентичності.
- section: 'Вступ та контекст: II — Біографія Олександра Ільченка'
  words: 450
  points:
  - Життєвий шлях автора, його інтерес до фольклору та народної сміхової культури.
  - Процес збирання етнографічних матеріалів та мовних архаїзмів для роману.
  - Виклики публікації твору та його сприйняття тогочасною критикою.
- section: 'Аналіз ключових творів: I — Сюжет та композиція'
  words: 500
  points:
  - Аналіз підзаголовка «роман з народних уст» та його вплив на розгортання сюжету.
  - Епізодична, новелістична структура тексту, що імітує народну оповідь чи думу.
  - Поєднання історичних реалій XVII століття з містичними і фантастичними елементами.
- section: 'Аналіз ключових творів: II — Образ Козака Мамая'
  words: 600
  points:
  - Козак Мамай як народна картина та перехід цього візуального архетипу в літературу.
  - 'Характерництво Мамая: надприродні здібності, вміння обдурити ворога та саму смерть.'
  - 'Символізм Мамая: уособлення незнищенності нації, філософського стоїцизму та волелюбності.'
- section: 'Аналіз ключових творів: III — Персонажі та фольклорні мотиви'
  words: 500
  points:
  - 'Аналіз образу Чужої Молодиці (Смерті): фольклорне коріння та десакралізація страху.'
  - Символіка взаємодії Мамая і Смерті — перемога вітальності над знищенням.
  - Типологія другорядних персонажів як втілення народного гумору і соціальних типажів.
- section: 'Стилістика та мова автора: I — Химерна проза'
  words: 500
  points:
  - Визначення українського химерного роману та роль твору Ільченка як першопрохідця.
  - Генетичний зв'язок химерної прози з українським бароко (Котляревський, Гоголь).
  - Порівняння з латиноамериканським магічним реалізмом та обґрунтування автохтонності
    жанру.
- section: 'Стилістика та мова автора: II — Мовне багатство'
  words: 450
  points:
  - 'Лексичний рівень: використання архаїзмів, діалектизмів, синонімічних рядів.'
  - Стилізація під усне мовлення, прислів'я та приказки як текстовий орнамент.
  - Гумор (від іронії до гротеску) як ключовий інструмент наративу.
- section: 'Деколонізаційна перспектива: I — Руйнування міфів'
  words: 400
  points:
  - Сміх як антиколоніальна зброя, що позбавляє ворога його страшного ореолу.
  - Відкидання імперського наративу про українців як про «пасивних жертв» історії.
  - Протиставлення народної правди і вітальності офіціозним історичним міфам.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність'
  words: 350
  points:
  - Мамай як втілення незалежної і самодостатньої української суб'єктності.
  - Створення повноцінного національного міфу в умовах жорсткої радянської цензури.
- section: Підсумок та спадщина
  words: 300
  points:
  - Місце роману «Козацькому роду нема переводу...» в історії української літератури
    ХХ століття.
  - Вплив Олександра Ільченка на формування плеяди авторів химерної прози (Валерій
    Шевчук, Василь Земляк).
  - Актуальність архетипу Мамая-захисника в умовах сучасної збройної боротьби за незалежність.
