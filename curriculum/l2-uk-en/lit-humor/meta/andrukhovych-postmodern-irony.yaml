slug: andrukhovych-postmodern-irony
title: Andrukhovych Postmodern Irony
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 850
    points:
      - Соціокультурний злам кінця 1980-х – початку 1990-х років
      - Феномен угруповання «Бу-Ба-Бу» та маніфестація сміхової культури
      - Постмодернізм як інструмент подолання тоталітарного мислення
  - section: 'Аналіз ключових творів: Поетика «Рекреацій»'
    words: 600
    points:
      - Свято Воскресаючого Духу як карнавальна метафора свободи
      - Суміш високого і низького, руйнування офіціозної патетики
      - Іронічне зображення національного міфотворення
  - section: 'Аналіз ключових творів: «Московіада»'
    words: 750
    points:
      - Москва як простір імперського розпаду та монструозності
      - Подорож Отто фон Ф. лабіринтами підземель та власної пам'яті
      - Вирок радянській системі через інструменти гротеску та жаху
  - section: 'Аналіз ключових творів: «Перверзія»'
    words: 600
    points:
      - Венеціанський текст і подорож Станіслава Перфецького
      - 'Гра з формами: колажність, містифікація, поліфонія голосів'
      - Інтертекстуальність як ключовий метод створення постмодерного світу
  - section: Стилістика та мова автора
    words: 600
    points:
      - 'Багатошаровість мови: від рафінованої інтелектуальності до сленгу'
      - Іронічна дистанція та саморефлексія наратора
      - Музичність і ритмізованість прози
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 600
    points:
      - Деконструкція концепту «великої російської культури»
      - Висміювання імперських комплексів та ідеологем
      - Злам ієрархії «центр-провінція» в літературному дискурсі
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 500
    points:
      - Повернення українському героєві інтелектуальної самостійності
      - Європейський вектор ідентичності (відмежування від євразійського простору)
      - Суб'єктність через мовну гру та право на сміх
  - section: Підсумок та вплив
    words: 500
    points:
      - Роль Андруховича у виведенні української літератури на європейську орбіту
      - Вплив його текстів на наступні покоління письменників
      - Актуальність «Московіади» в умовах сучасної боротьби з імперіалізмом
