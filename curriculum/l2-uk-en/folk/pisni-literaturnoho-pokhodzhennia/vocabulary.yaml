- lemma: пісня літературного походження
  translation: авторська пісня, що через народне прийняття й виконання почала побутувати як народна
  pos: словосполука
  usage: Пісня літературного походження має автора, але може жити в усній традиції.
- lemma: фольклоризація
  translation: входження авторського тексту в усне побутування, варіантність і спільну пам'ять
  pos: іменник
  usage: Фольклоризація не стирає автора, а показує друге життя тексту.
- lemma: атрибуція
  translation: точне називання автора, композитора або джерела твору
  pos: іменник
  usage: Атрибуція потрібна, щоб не назвати Климовського безіменним народним автором.
- lemma: романс
  translation: лірична співана форма з інтимною або міською манерою виконання
  pos: іменник
  usage: Романс може перейти з авторської лірики в родинне або сценічне виконання.
- lemma: псальма
  translation: духовна пісенна форма, пов'язана з релігійним віршем і співом
  pos: іменник
  usage: Псальма показує зв'язок книжної духовної традиції з народним виконанням.
- lemma: кант
  translation: історико-музична пісенна форма, пов'язана зі шкільною й бароковою культурою
  pos: іменник
  usage: Кант належить до середовища, де книжний текст міг ставати співом.
- lemma: рукописний пісенник
  translation: збірник переписаних пісень, який поширював тексти до або поруч із друком
  pos: словосполука
  usage: Рукописний пісенник був одним із каналів фольклоризації.
- lemma: мандрівний дяк
  translation: освічений виконавець і творець, який переносив тексти між школою, церквою, вертепом і побутом
  pos: словосполука
  usage: Мандрівний дяк поєднував книжну освіту й усне виконання.
- lemma: пісенник
  translation: друкована або рукописна збірка пісень
  pos: іменник
  usage: Пісенник може зберігати авторський текст і водночас показувати його варіанти.
- lemma: варіантність
  translation: зміна тексту, строфи, мелодії або виконання під час побутування
  pos: іменник
  usage: Варіантність не є автоматичним псуванням пісні.
- lemma: побутування
  translation: реальне життя твору у співі, пам'яті, сцені, школі або родині
  pos: іменник
  usage: Народне побутування може зробити авторський текст спільним.
- lemma: виконавське свідчення
  translation: доказ того, як пісню співають або сприймають у певному середовищі
  pos: словосполука
  usage: Виконавське свідчення не завжди доводить походження тексту.
- lemma: джерельна межа
  translation: чітке розрізнення між перевіреним фрагментом, назвою, контекстом і виконанням
  pos: словосполука
  usage: Джерельна межа не дозволяє цитувати відомий рядок без опори.
- lemma: афористична формула
  translation: короткий вислів із сильним моральним або смисловим узагальненням
  pos: словосполука
  usage: У Сковороди афористична формула робить філософську думку співною.
- lemma: діалогічність
  translation: побудова пісні через звертання або обмін голосами
  pos: іменник
  usage: Діалогічність у Климовського підтримує сцену прощання.
- lemma: романсова туга
  translation: ліричний стан недосяжного бажання, самотності або мрії
  pos: словосполука
  usage: Романсова туга Петренка тримається на образах неба, сокола і польоту.
- lemma: національний пейзаж
  translation: природний образ, який у виконанні набуває спільної культурної сили
  pos: словосполука
  usage: Дніпро у Шевченковому фрагменті працює як національний пейзаж.
- lemma: анонімізація
  translation: стирання автора там, де джерела дозволяють його назвати
  pos: іменник
  usage: Анонімізація є помилкою для пісень літературного походження.
- lemma: деколонізаційна атрибуція
  translation: повернення українському текстові його автора, джерела і культурної належності
  pos: словосполука
  usage: Деколонізаційна атрибуція не дозволяє розчинити Климовського в чужому ярлику.
- lemma: друге життя тексту
  translation: нове побутування авторського твору в народному або публічному співі
  pos: словосполука
  usage: Хорове виконання може бути другим життям літературного фрагмента.
