inline:
  - id: act-1
    type: variant-comparison
    title: Авторство і народне побутування
    instruction: Порівняй три способи назвати пісню літературного походження.
    prompt: Чому точна формула має поєднувати автора і фольклоризацію?
    variants:
      - label: Лише народна
        text: Пісню співають багато людей, тому автор у поясненні зникає.
        source: Ризик анонімізації
      - label: Лише авторська
        text: Текст має автора, тому його народне виконання вважають другорядним.
        source: Ризик знецінення побутування
      - label: Авторська і фольклоризована
        text: Автор названий, а народне виконання пояснене як друге життя тексту.
        source: Робоча формула модуля
    features:
      - що названо
      - що стерто
      - який доказ потрібен
      - як описано пам'ять
    model_answer: >-
      Точна формула не стирає автора і не заперечує народне побутування.
      Пісня може мати літературний початок, але через спів, варіанти,
      пісенники, сцену або хор стати спільною пам'яттю. Тому найкраще
      казати: авторський текст, що фольклоризувався.

  - id: act-2
    type: comparative-study
    title: Канали фольклоризації
    instruction: Порівняй, як різні середовища переносять авторський текст у спів.
    items_to_compare:
      - Рукописний пісенник і мандрівні дяки.
      - Романсова або салонна манера виконання.
      - Хорова сцена і шкільна пам'ять.
    criteria:
      - хто переносить текст
      - що змінюється
      - що лишається доказом
      - як не стерти автора
    prompt: Обери два канали й поясни, чому вони не однаково доводять походження пісні.
    model_answer: >-
      Рукописний пісенник показує ранній шлях переписування й поширення, але
      не завжди дає сучасну виконавську картину. Хорова сцена показує
      публічну силу пісні, але не замінює першого текстового джерела. Обидва
      канали важливі, якщо їх не плутати.

  - id: act-3
    type: motif-formula
    title: Формула, яку легко співати
    instruction: Прочитай короткі фрагменти як різні механізми запам'ятовування.
    passage: |-
      Їхав козак за Дунай...
      Постій, постій, козаче...
      Знаю, що смерть — як коса замашна...
      Дивлюсь я на небо...
      Реве та стогне Дніпр широкий...
    formulas:
      - text: Їхав козак за Дунай
        label: дорога і межа
        explanation: Дунай і від'їзд одразу відкривають сцену прощання.
      - text: Постій, постій, козаче
        label: повтор-затримка
        explanation: Повтор на мить зупиняє рух і робить фразу співною.
      - text: смерть — як коса замашна
        label: моральна афористичність
        explanation: Образ смерті стискає філософську думку до пам'ятної формули.
      - text: Дивлюсь я на небо
        label: романсова перша особа
        explanation: Голос самотньо дивиться вгору і творить простір туги.
      - text: Реве та стогне Дніпр широкий
        label: національний пейзаж
        explanation: Дніпро і вітер роблять літературний образ придатним до хорового співу.
    prompt: Обери одну формулу і поясни, чому вона легко переходить у народне виконання.
    model_answer: >-
      Формула "Постій, постій, козаче" легко переходить у спів, бо має
      повтор, звертання і сильну ситуацію прощання. Вона проста, але не
      порожня: голос дівчини затримує козака і робить розлуку відчутною.

workbook:
  - id: act-4
    type: critical-analysis
    title: Межа цитування
    target_text: Якщо пісня дуже відома, її рядки можна додати з пам'яті.
    instruction: Оціни тезу, яка змішує популярність із джерельним доказом.
    prompt: Чому відомість пісні не дорівнює праву на довге цитування без перевірки?
    questions:
      - Що можна робити з перевіреним коротким фрагментом?
      - Що можна робити з атрибутованою назвою без цитування?
      - Чому пам'ять виконавця не замінює джерело?
    model_answers:
      - Перевірений короткий фрагмент можна аналізувати як конкретний рядок, образ або формулу.
      - Атрибутовану назву можна назвати в жанровій карті, але не додавати неперевірені рядки.
      - Пам'ять виконавця може змішувати варіанти, тому для навчального аналізу потрібна видима опора.

  - id: act-5
    type: performance
    title: Слухати без анонімізації
    instruction: Підготуй коротке усне представлення пісні перед слуханням або виконанням.
    prompt: Назви автора, канал побутування, один формальний прийом і межу висновку.
    fragment: |-
      Їхав козак за Дунай,
      сказав: — Дівчино, прощай!
      Ти, конику вороненький,
      неси да гуляй...
    self_check:
      - Чи названо Семена Климовського?
      - Чи пояснено народне побутування без стирання автора?
      - Чи не додано рядків поза поданим фрагментом?
      - "Чи названо один прийом: діалог, повтор, дорога або Дунай?"
    show_record_button: true
    model_answer: >-
      Коректне представлення називає Климовського, пояснює життя в пісенниках і
      народне побутування тексту, а потім читає тільки поданий фрагмент. Воно
      не перетворює популярність пісні на безіменне походження.

  - id: act-6
    type: comparative-study
    title: Чотири авторські маршрути
    instruction: Порівняй Климовського, Сковороду, Петренка і Шевченка як різні дороги до народного співу.
    items_to_compare:
      - "Климовський: діалогічне козацьке прощання і життя в пісенниках."
      - "Сковорода: морально-сатирична філософська пісня."
      - "Петренко: романсова туга першої особи."
      - "Шевченко і Крижанівський: літературний фрагмент, що став хоровою піснею."
    criteria:
      - авторський початок
      - головний образ
      - канал виконання
      - ризик помилкового читання
    prompt: Чому ці приклади не можна пояснити однією схемою?
    model_answer: >-
      Климовський фольклоризується через діалог і пісенники, Сковорода -
      через моральну формулу і співну філософію, Петренко - через романсову
      першу особу, а Шевченко - через музичне життя баладного вступу. Усі
      вони мають народне побутування, але різні канали й різну форму.

  - id: act-7
    type: critical-analysis
    title: Імперський ярлик
    target_text: Якщо українська пісня друкувалася або переспівувалася в чужому імперському просторі, її можна подавати як спільний безіменний матеріал.
    instruction: Оціни тезу, яка стирає українське авторство через широку циркуляцію.
    prompt: Як сформулювати точніше, не заперечуючи міжнародного життя пісні?
    questions:
      - Яке слово в тезі стирає автора?
      - Чому міжнародна обробка не скасовує українського походження?
      - Яка формула підходить для Климовського?
    model_answers:
      - Слово "безіменний" стирає атрибуцію там, де джерела називають автора.
      - Міжнародна обробка показує силу циркуляції, але не змінює джерельного початку.
      - "Точніше казати: українська авторська пісня Семена Климовського, що фольклоризувалася і мала широке міжнародне життя."

  - id: act-8
    type: essay-response
    title: Авторський текст у спільному голосі
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, як пісня літературного походження може бути
      одночасно авторською і народною в побутуванні. Назви два приклади, один
      канал фольклоризації, одну межу цитування і одну деколонізаційну
      пересторогу.
    min_words: 260
    model_answer: >-
      Пісня літературного походження є авторською за початком і народною за
      способом побутування. Це означає, що текст має названого творця,
      друкований або рукописний слід, але пізніше входить у ширший спів:
      родинний, шкільний, хоровий, театральний або кобзарський. Семен
      Климовський у "Їхав козак за Дунай" дає приклад діалогічного козацького
      прощання, яке увійшло в пісенники й народне побутування. Але фольклоризація не
      дозволяє забути його ім'я. Тарас Шевченко й Данило Крижанівський дають
      інший приклад: вступ до "Причинної" став піснею "Реве та стогне Дніпр
      широкий", але народне виконання не робить слова безіменними.

      Одним каналом фольклоризації може бути шкільна або хорова сцена. Вона
      переносить текст у спільний голос, закріплює образ і робить його
      впізнаваним. Проте виконання не завжди доводить початковий текст. Саме
      тому потрібна межа цитування: можна аналізувати короткий перевірений
      фрагмент, але не треба додавати довгі рядки з пам'яті. Відомість пісні
      не замінює джерела.

      Деколонізаційна пересторога полягає в тому, щоб не розчиняти українські
      авторські пісні в чужих імперських або безіменних ярликах. Міжнародне
      життя пісні може бути доказом її сили, але не скасовує українського
      авторства й культурної належності.
    rubric:
      - criteria: Атрибуція
        description: Названо авторів або композиторський слід у двох прикладах.
      - criteria: Фольклоризація
        description: Пояснено конкретний канал переходу в народне побутування.
      - criteria: Джерельна межа
        description: Розрізнено перевірений фрагмент і неперевірене цитування.
      - criteria: Деколонізаційна точність
        description: Висновок не стирає українське авторство і не знецінює народне виконання.
