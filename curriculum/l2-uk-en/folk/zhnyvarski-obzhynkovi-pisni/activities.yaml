- id: act-1
  type: ritual-sequencing
  title: Рух жниварського циклу
  instruction: Упорядкуй етапи так, щоб було видно рух від входу в жнивний час до обжинкового завершення.
  steps:
    - Зажинки або вхід у жнивний час.
    - Польова праця з серпами, повтором дії та втомою.
    - Рух до межі, поспіх і очікування перепочинку.
    - "Завершення поля: вінок, сніп або борода."
    - Дорога до стодоли чи господаря.
    - Похвала, прохання, частування або жарт після праці.
  correct_order: [1, 2, 3, 4, 5, 6]
  model_answer: >
    Точний порядок іде від входу в роботу до її завершення. Пісні можуть
    зосереджуватися на різних точках циклу, але відповідь має показати, чи
    текст говорить про польову дію, межу, дорогу додому, вінок, бороду або
    господаря.

- id: act-2
  type: motif-formula
  title: Дія, предмет і адреса
  instruction: "Розбери короткий уривок за трьома опорами: що роблять, який предмет названо, до кого або чого звертаються."
  passage: |
    Нуте, нуте, до межі,
    Варенички у діжі.
    Ой нуте, робіть,
    Себе не баріть.
  formulas:
    - text: "Нуте, нуте"
      label: наказовий повтор
      explanation: Повтор рухає гурт і створює робочий темп.
    - text: "до межі"
      label: просторова ціль
      explanation: Межа називає край роботи, а не загальний символ.
    - text: "варенички у діжі"
      label: тілесне очікування
      explanation: Їжа показує втому й бажання перепочинку після праці.
  prompt: Напиши 80-110 слів про те, як цей уривок тримає ритм праці.
  model_answer: >
    Уривок працює через наказовий повтор "Нуте, нуте". Він підганяє гурт, а
    "до межі" називає конкретний край роботи. Варенички не є випадковою
    побутовою деталлю: вони показують, що люди працюють тілом і чекають
    перепочинку. Тому пісня не просто описує жнива, а дає чути спільний темп,
    втому і бажання доробити поле.

- id: act-3
  type: comparative-study
  title: Віночок і борода
  instruction: Порівняй два обжинкові тексти за предметом, дією і соціальним висновком.
  items_to_compare:
    - "Котився віночок по полю"
    - "Сидить ведмідь на копі"
  criteria:
    - Який предмет стоїть у центрі тексту?
    - Що предмет робить або як на нього дивляться?
    - Який соціальний зв'язок відкриває пісня?
    - Яку межу висновку треба зберегти?
  prompt: >
    Порівняй, як два обжинкові тексти говорять про завершення праці. У
    відповіді назви предмет, дію предмета або погляд на нього, і соціальний
    висновок.
  model_answer: >
    Обидва тексти належать до обжинкового завершення, але працюють по-різному.
    У першому віночок рухається полем, звертається до женчиків і просить узяти
    його до стодоли. Це робить його носієм пам'яті поля. У другому ведмідь
    дивується бороді, а пісня порівнює оздоблену й убогу бороду. Тут важливий
    соціальний жарт: завершення праці стає моментом оцінки господаря.

- id: act-4
  type: performance
  title: Прочитати жнивний темп
  instruction: Підготуй коротке читання уривка, щоб було чути темп праці, а не сценічну декламацію.
  prompt: Прочитай уривок уголос і поясни, де ти зробиш паузу після наказу, після межі та перед згадкою їжі.
  fragment: |
    Нуте, нуте, до межі,
    Варенички у діжі.
    Ой нуте, робіть,
    Себе не баріть.
  self_check:
    - Я не додаю слів поза публічним текстом.
    - Я виділяю повтор "нуте, нуте" як робочий ритм.
    - Я роблю паузу після "до межі", бо це край роботи.
    - Я пояснюю згадку їжі як очікування перепочинку.
  show_record_button: true
  model_answer: >
    Точне читання не розтягує уривок урочистою інтонацією. Воно має короткий
    поштовх на повторі "нуте, нуте", невелику паузу після "до межі" і чіткий
    перехід до "варенички у діжі". Так чути, що текст належить до праці й
    тримає рух гурту.

- id: act-5
  type: essay-response
  title: Від рядка до висновку
  instruction: Напиши коротку доказову відповідь про один жниварський або обжинковий текст.
  prompt: >
    Обери один текст із модуля. Назви фазу жнивного циклу, процитуй або точно
    переказуй один рядок, поясни дію предмета чи голосу і сформулюй обережний
    висновок без узагальнення на всю традицію.
  min_words: 120
  model_answer: >
    У пісні "Котився віночок по полю" йдеться про обжинкове завершення праці.
    Віночок не просто названий як предмет, а рухається полем і просить
    женчиків узяти його до стодоли. Це прохання показує перехід від ниви до
    господарства і потребу спочинку після поля. Повтор "вже ж я" збирає досвід
    дощу, вітру, сонця, місяця і зір. Тому цей текст дозволяє говорити про
    пам'ять поля в обжинковому предметі, але не пояснює всі обжинкові звичаї
    сам по собі.
  rubric:
    - criteria: Названо конкретну пісню і фазу жнивного циклу.
      description: Названо, з якої пісні й якого моменту жнив походить приклад.
    - criteria: Є точна опора на рядок або дію з тексту.
      description: Відповідь містить перевірний рядок, переказ дії або предметний доказ.
    - criteria: Пояснено предмет, голос або адресата.
      description: Пояснено, як предмет, голос чи адресат організує обрядову сцену.
    - criteria: Висновок обмежений конкретним записом.
      description: Не поширено висновок з одного запису на всі жниварські або обжинкові звичаї.
