- title: Слов'янська міфологія
  role: textbook
  notes: 'Текст «Невільницького плачу» з молитовною формулою «на тихі води, на ясні
    зорі»; козацькі морські походи, символіка зозулі та явора, образ дівчини-бранки.
    chunk_id: 6890007d_c0141'
- title: Історія української літератури
  role: textbook
  notes: 'Поетика дум: паралелізм і антитетика, подвійні синоніми, постійні епітети,
    спорідненість думи з голосінням; зовнішня форма й нерівні періоди. chunk_id: fbf8bdff_c0331'
- title: Нарис історії культури України
  role: textbook
  notes: 'Козацька доба; сліпі лірники й кобзарі як охоронці пам''яті про давню Україну.
    chunk_id: 68ba0555_c0364'
