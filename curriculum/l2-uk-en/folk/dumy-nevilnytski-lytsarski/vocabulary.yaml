- lemma: дума
  translation: Ukrainian duma; recitative lyric-epic genre
  pos: noun
  usage: Дума розгортає сюжет речитативом, а не сталою куплетною строфою.
- lemma: невільник
  translation: captive; enslaved prisoner
  pos: noun
  usage: Невільник у думі пам'ятає рідний світ навіть у темниці або на галері.
- lemma: невільницький плач
  translation: captivity lament
  pos: noun phrase
  usage: Невільницький плач поєднує біль, молитву і надію на визволення.
- lemma: лицарська дума
  translation: knightly heroic duma
  pos: noun phrase
  usage: Лицарська дума показує честь козака через дію, ризик і відповідальність.
- lemma: речитатив
  translation: recitative performance
  pos: noun
  usage: Речитатив веде думу між співом і проказуванням.
- lemma: вірш без сталої строфи
  translation: non-stanzaic verse
  pos: noun phrase
  usage: Вірш без сталої строфи в думі змінює довжину рядка за ходом оповіді.
- lemma: кобзар
  translation: kobzar; professional singer with kobza or bandura
  pos: noun
  usage: Кобзар тримає в пам'яті репертуар, формули й виконавські паузи.
- lemma: лірник
  translation: lirnyk; hurdy-gurdy singer
  pos: noun
  usage: Лірник належить до ширшої традиції мандрівних професійних співців.
- lemma: галера
  translation: galley
  pos: noun
  usage: Галера в думі стає простором морської неволі й можливого повстання.
- lemma: ясир
  translation: captives taken in raids
  pos: noun
  usage: Ясир є історичним тлом дум про полон, втечу і визволення.
- lemma: джерельна межа
  translation: evidentiary limit; source boundary
  pos: noun phrase
  usage: Джерельна межа не дозволяє перетворити епічний образ на точну біографію.
- lemma: формула повернення
  translation: formula of return
  pos: noun phrase
  usage: Формула повернення називає води, зорі, міста й християнський світ волі.
- lemma: славословіє
  translation: doxological praise ending
  pos: noun
  usage: Славословіє завершує думу похвалою або побажанням добра слухачам.
- lemma: варіантність
  translation: variant nature; textual variation
  pos: noun
  usage: Варіантність не псує думу, а показує життя усного виконання.
