- lemma: невільник
  translation: captive, slave; one deprived of freedom and torn from the homeland
  pos: noun
  usage: У думі невільник говорить від імені всіх, кого забрали в полон.
- lemma: бранець
  translation: captive, prisoner taken in a raid
  pos: noun
  usage: Бранець на галері не мав ані гінця, ані надії на лист.
- lemma: галера
  translation: galley (oared warship); a place of penal rowing
  pos: noun
  usage: Козаків-невільників приковували до весел турецької галери.
- lemma: ясир
  translation: captives seized as living goods during raids (Turkic borrowing)
  pos: noun
  usage: Людей гнали в ясир на невільничі ринки Криму.
- lemma: визволення
  translation: liberation, release from captivity
  pos: noun
  usage: Визволення з неволі — центральний мотив усього циклу дум.
- lemma: потурчитися
  translation: to turn Turk, to convert to Islam (a betrayal of faith in folk view)
  pos: verb
  usage: Маруся потурчилась, тобто прийняла іслам у полоні.
- lemma: зозуля
  translation: cuckoo; symbol of a mother's lament and longing for home
  pos: noun
  usage: Зозуля в думі уособлює материнський плач.
- lemma: явір
  translation: sycamore; symbol of misfortune, sorrow and death in a foreign land
  pos: noun
  usage: Явір у плачі — знак смерті на чужині.
- lemma: каторга
  translation: galley; later, hard penal labour
  pos: noun
  usage: У думах каторга означає галеру, де веслування ламало тіло.
- lemma: колективна травма
  translation: collective trauma; a wound that affects a whole community, not one
    person
  pos: noun
  usage: Невільницькі думи фіксують колективну травму цілого народу.
- lemma: неволя
  translation: captivity, bondage
  pos: noun
  usage: Тридцять літ неволі — і ні разу сонця праведного.
- lemma: полон
  translation: captivity, being a prisoner
  pos: noun
  usage: У полоні бранець відрізаний від церкви й рідної мови.
- lemma: темниця
  translation: dungeon, prison
  pos: noun
  usage: У кам'яній темниці пробувало сімсот козаків.
- lemma: кайдани
  translation: shackles, chains
  pos: noun
  usage: Невольники підіймали руки до Бога, кайданами забряжчали.
- lemma: поневолення
  translation: enslavement
  pos: noun
  usage: Поневолення породжувало насильство у відповідь.
- lemma: бранка
  translation: female captive
  pos: noun
  usage: Дівка-бранка приходить до темниці й питає про день.
- lemma: віровідступництво
  translation: apostasy, renunciation of one's faith
  pos: noun
  usage: Потурчитися означало віровідступництво в очах спільноти.
- lemma: ренегат
  translation: renegade, one who has betrayed faith or side
  pos: noun
  usage: Турецького пана дума називає недовірком, тобто ренегатом.
- lemma: психологізм
  translation: psychologism; focus on inner emotional state
  pos: noun
  usage: Подвійні синоніми працюють на психологізм, а не на героїку.
- lemma: анонімність
  translation: anonymity, namelessness
  pos: noun
  usage: Анонімність плачу робить один голос голосом усіх.
- lemma: віктимність
  translation: victimhood, the condition of being a victim
  pos: noun
  usage: Героїчне прочитання заперечує суцільну віктимність бранців.
- lemma: агентність
  translation: agency; capacity to act as a subject
  pos: noun
  usage: Маруся виявляє рідкісну для епосу жіночу агентність.
- lemma: символіка
  translation: symbolism, system of symbols
  pos: noun
  usage: Символіка дум вимагає читати образ, а не пейзаж.
- lemma: епос
  translation: epic (as genre)
  pos: noun
  usage: Жіночий герой у чоловічому епосі — рідкість для Європи.
- lemma: героїка
  translation: the heroic register, heroic dimension
  pos: noun
  usage: Героїка опору співіснує в думі з плачем страждання.
- lemma: жертовність
  translation: self-sacrifice
  pos: noun
  usage: Маруся виявляє жертовність без надії на власний рятунок.
- lemma: поневолювач
  translation: enslaver, oppressor
  pos: noun
  usage: Бранці кленуть поневолювача й чужу віру.
- lemma: мореплавство
  translation: seafaring, navigation
  pos: noun
  usage: Козацьке мореплавство було відповіддю на работоргівлю.
- lemma: набіг
  translation: raid, sudden military incursion
  pos: noun
  usage: Татарські набіги тривали століттями.
- lemma: работоргівля
  translation: slave trade
  pos: noun
  usage: Кафа була найбільшим осередком работоргівлі в Криму.
- lemma: викуп
  translation: ransom
  pos: noun
  usage: Маруся просить не збирати викупу за неї.
- lemma: мечеть
  translation: mosque
  pos: noun
  usage: Маруся відмикає темницю, коли пан їде до мечеті.
- lemma: яничар
  translation: janissary (Ottoman soldier)
  pos: noun
  usage: Яничари катують невольника в описі муки.
- lemma: бусурман
  translation: infidel, Muslim (archaic, in folk usage)
  pos: noun
  usage: Бранці кленуть віру бусурманську.
- lemma: попівна
  translation: a priest's daughter
  pos: noun
  usage: Маруся — попівна з Богуслава.
