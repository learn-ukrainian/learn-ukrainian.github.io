  instruction: Знайди в наведеному уривку формульні засоби й визнач їхній тип.
  prompt: Зістав кожен приклад зі стильовим механізмом думи.
  text: Невільницький плач і дума про Марусю тримаються на спільному наборі формул,
    хоч сюжети в них різні.
  passage: 'У плачі звучить молитва «на тихі води, на ясні зорі». У думі про Марусю
    незмінно повторюється «дівка-бранка, Маруся попівна Богуславка». Обидві думи подвоюють
    дієслова: «клясти-проклинати», «плаче-ридає». Обидві будуються нерівними синтаксичними
