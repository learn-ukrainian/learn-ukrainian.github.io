- type: variant-comparison
  title: Два записи невільницького плачу
  instruction: Порівняй дві версії молитовної формули й поясни, що змінюється від
    варіанта до варіанта.
  prompt: Усний жанр живе у варіантах. Порівняй два записи фінальної молитви плачу.
  variants:
  - 'Варіант А: «Визволь, Господи, всіх вірних невольників з тяжкої неволі турецької,
    з каторги бусурманської, на тихі води, на ясні зорі, у край веселий, у мир хрещений,
    в городи християнські!»'
  - 'Варіант Б: «Ой визволи, Боже, нас всіх, бідних невольників, з тяжкої неволі,
    з віри бусурманської, на ясні зорі, на тихі води, у край веселий, у мир хрещений!»'
  features:
  - 'епітет невольників: «вірних» проти «бідних»'
  - 'звертання: «Господи» проти «Боже», «всіх невольників» проти «нас всіх»'
  - 'порядок формули: «тихі води — ясні зорі» проти «ясні зорі — тихі води»'
  - 'склад фіналу: наявність чи відсутність рядка «в городи християнські»'
  model_answer: 'Серцевина формули — стала: неволя турецька, каторга бусурманська
    й образ повернення на тихі води, на ясні зорі. Варіюються дрібниці: епітет («вірних»/«бідних»),
    форма звертання, порядок парних образів і наявність останнього рядка. Це доводить,
    що формула — опора пам''яті, у межах якої кожен кобзар імпровізує.'
- type: motif-formula
