- id: act-1
  type: variant-comparison
  title: Дума і сусідній жанр
  instruction: Порівняй дві жанрові ситуації й назви, чому їх не можна зливати.
  variants:
    - label: Дума
      text: >-
        Довгий ліро-епічний твір розгортається речитативом, без сталої
        куплетної строфи, у кобзарській виконавській традиції.
      source: Шкільна теорія літератури про думи
    - label: Історична пісня
      text: Подія або постать входить у співану строфічну форму з куплетною логікою й легшим гуртовим запам'ятовуванням.
      source: Шкільна жанрова межа між думами та історичними піснями
  features:
    - виконавська форма
    - будова рядка і строфи
    - сила історичного висновку
  prompt: Поясни, чому одна історична тема ще не робить текст думою.
  model_answer: >-
    Історична тема є тільки одним шаром. Дума потребує речитативної форми,
    нерівного рядка, розгорнутого епічного періоду й кобзарської виконавської
    ситуації. Історична пісня може говорити про схожі події, але має іншу
    строфічну і співану організацію.

- id: act-2
  type: motif-formula
  title: Формула повернення
  instruction: Розбери короткий фрагмент як поетичну карту волі.
  passage: "На тихі води, / На ясні зорі, / У край веселий, / У мир хрещений"
  formulas:
    - text: На тихі води
      label: простір
      explanation: Вода позначає не географічну точку, а бажаний горизонт повернення.
    - text: На ясні зорі
      label: світло
      explanation: Зорі протиставлені темниці й неволі як образ відкритого світу.
    - text: У мир хрещений
      label: належність
      explanation: Формула повертає невольників до християнської спільноти, а не лише до території.
  prompt: Поясни, чому ця формула не є просто красивою прикрасою наприкінці плачу.
  model_answer: >-
    Формула працює як карта ідентичності. Вона називає простір, світло,
    радість і християнську спільноту, яких невольники позбавлені в каторзі.
    Тому повернення означає не тільки втечу з неволі, а відновлення власного
    світу.

- id: act-3
  type: comparative-study
  title: Уривок і висновок
  instruction: Порівняй рядок і надмірний висновок; перепиши висновок так, щоб він відповідав силі джерела.
  items_to_compare:
    - "З тяжкої неволі три братики втікали."
    - "Ця дума точно документує дату втечі конкретної родини."
  criteria:
    - сила текстового доказу
    - межа історичного висновку
    - потреба в додатковому джерелі
  prompt: Яке твердження можна зробити чесно, а яке потребує іншого доказу?
  model_answer: >-
    Чесно сказати, що фрагмент відкриває думовий сюжет утечі з тяжкої неволі
    й одразу вводить трьох братів як родинну групу. Надмірно стверджувати точну
    дату або документальну історію конкретної родини. Для такого висновку треба
    окремий історичний документ, а не лише епічний рядок.

- id: act-4
  type: performance
  title: Речитатив без театрального крику
  instruction: Прочитай короткий наказ так, щоб було чути контроль і тишу перед визволенням.
  prompt: >-
    Підготуй 30-секундне читання фрагмента із «Самійла Кішки». Не грай
    переможний монолог: покажи, що свобода починається з дисципліни.
  fragment: "Кайдани не мають звучати."
  self_check:
    - Чи збережено стриманий темп?
    - Чи чути, що наказ звернений до групи?
    - Чи пояснено перед читанням, чому звук кайданів небезпечний?
  show_record_button: true
  model_answer: >-
    Сильне виконання не підвищує голос. Воно робить паузу перед наказом,
    вимовляє "кайданами" як звук неволі й показує, що спільна дія потребує
    спільної тиші.

- id: act-5
  type: critical-analysis
  title: Перепиши слабку тезу
  target_text: "Думи точно розповідають, що насправді сталося з Марусею Богуславкою і Самійлом Кішкою."
  prompt: Сформулюй, яка версія тези є обґрунтованою на основі доступних доказів.
  questions:
    - Які два різні режими доказу змішано?
    - Що можна зберегти з початкової думки?
    - Яке формулювання буде точнішим для семінарної відповіді?
  model_answers:
    - >-
      Теза слабка, бо робить із думи прямий архівний документ. Зберегти можна
      думку, що образи Марусі й Самійла пов'язані з історичною пам'яттю про
      полон і визволення. Обережніше: ці думи зберігають епічні образи,
      моральні конфлікти й досвід козацької доби, але біографічні подробиці
      треба доводити окремими джерелами.

- id: act-6
  type: essay-response
  title: Плач і героїка в одній думі
  instruction: >-
    Напиши коротке доказове есе. Після чернетки перевір, чи це не переказ
    сюжету, чи названо джерельну межу, і чи формальний прийом пов'язано з
    моральним висновком.
  prompt: >-
    На прикладі однієї думи поясни, як плач, неволя або тілесний біль
    переходять у моральну героїку. Обов'язково назви жанр, джерело, формальний
    прийом і межу висновку.
  min_words: 220
  model_answer: >-
    У думі «Втеча трьох братів з Азова» невільницька тема переходить у
    моральне випробування. Це не строфічна історична пісня, а дума: довгий
    речитативний ліро-епічний твір із нерівним рядком, повтором і повільним
    розгортанням сцени. Джерельний текст у публічній хрестоматії дає сюжет
    утечі братів із тяжкої неволі. Формально важить повтор руху: наймолодший
    брат біжить за кінними, просить допомоги, ранить ноги й лишає криваві сліди.
    Так тілесний біль стає не тільки описом дороги, а доказом морального
    питання: чи мають ті, хто має перевагу, відповідати за вразливого. Героїка тут не в самій
    втечі, а в перевірці братерства. Межа висновку така: дума показує моральну
    пам'ять про неволю і втечу, але не дає точної дати події або біографії
    конкретних братів.
  rubric:
    - criteria: жанр і джерело названі точно
      description: Названо думу або конкретний публічний текст і показано, звідки береться доказ.
    - criteria: принаймні один формальний прийом пояснений
      description: Пояснено повтор, речитатив, сцену прохання або інший прийом як частину аргумента.
    - criteria: моральна проблема сформульована без романтизації
      description: Показано плач, неволю чи тілесний біль без героїзації страждання.
    - criteria: межа доказу не пропущена
      description: Окремо сказано, чого цей текст не доводить як історичний документ.
