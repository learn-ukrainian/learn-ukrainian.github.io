  - Визволення сімсот невольників на Великдень
  - Прохання не збирати викупу
  model_answer: 'Дума рухається від зустрічі (питання про день) через конфлікт (прокляття)
    до обіцянки, виконання обіцянки на Великдень і останнього прохання Марусі. Кожен
