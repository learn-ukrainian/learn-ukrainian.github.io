- id: act-1
  type: motif-formula
  title: Символічний код невільницького плачу
  instruction: Зістав кожен природний образ зі значенням, яке він несе в мові вигнання.
  prompt: У невільницьких думах природа стає мовою туги. Визнач, що означає кожен
    образ.
  text: Зозуля, явір, Дніпро, степ і море — це не пейзаж, а знаки, якими поневолена
    людина називає свій біль.
  passage: Зозуля кує — і голос її вчувається як материнський плач та туга за домом.
    Явір хилиться — і в ньому читається нещастя, сум і смерть на чужині. Дніпро тече
    — і стає уявною дорогою додому. Степ і море ширяться без краю — і так міряють
    безмежну тугу невільника.
  formulas:
  - зозуля → материнський плач, туга за домом
  - явір → нещастя, сум, смерть на чужині
  - Дніпро → дорога додому
  - степ і море → безмежна туга
  answers:
  - зозуля — материнський плач і туга за домом
  - явір — смерть і сум на чужині
  - Дніпро — дорога додому, до рідного світу
  - степ і море — образ безмежної туги
  model_answer: Кожен образ — знак, а не предмет. Зозуля уособлює материнський голос,
    явір — смерть на чужині, Дніпро — дорогу повернення, а безмежні степ і море —
    безмежжя самої туги. Поневолена людина не може назвати біль прямо, тож позичає
    голос у природи.
- id: act-2
  type: ritual-sequencing
  title: Будова невільницького плачу
  instruction: Постав чотири частини плачу в тому порядку, у якому вони звучать у
    думі.
  items:
  - 'Прокляття чужини: бранці кленуть землю турецьку й віру бусурманську'
  - 'Зачин-заклик: невольники в тяжкій неволі підіймають руки до Бога'
  - Молитва-формула про визволення на тихі води, на ясні зорі
  - 'Опис муки: яничари катують невольника, ллється козацька кров'
  correct_order:
  - 1
  - 3
  - 0
  - 2
  steps:
  - Зачин-заклик до Бога з кайданами на руках
  - Опис тілесної муки бранця
  - Прокляття чужини, що розлучила з родиною
  - Молитва-формула про визволення в християнський світ
  model_answer: 'Плач веде слухача від відчаю до надії: спершу заклик до Бога, тоді
    картина муки, далі прокляття неволі й, нарешті, молитва-формула про повернення
    «на тихі води, на ясні зорі». Цей порядок перетворює крик тіла на молитву духу.'
- id: act-3
  type: motif-formula
  title: Стійкі формули думи про Марусю
  instruction: Зістав кожен приклад зі стильовим засобом думи, який він показує.
  prompt: Дума тримається на повторюваних формулах. Визнач, який засіб працює в кожному
    прикладі.
  text: Постійний епітет, молитовна формула й подвійні синоніми — головні цеглини
    думового стилю.
  passage: «Дівка-бранка, Маруся попівна Богуславка» повторюється незмінно при кожній
    згадці героїні. «На тихі води, на ясні зорі» закриває плач як стала молитва. «Клясти-проклинати»
    та «плаче-ридає» подвоюють дію, нагнітаючи емоцію.
  formulas:
  - постійний епітет → «дівка-бранка, Маруся попівна Богуславка»
  - молитовна формула визволення → «на тихі води, на ясні зорі»
  - подвійний синонім → «клясти-проклинати», «плаче-ридає»
  answers:
  - «дівка-бранка, Маруся попівна Богуславка» — постійний епітет, що супроводжує героїню
  - «на тихі води, на ясні зорі» — стала молитовна формула фіналу
  - «клясти-проклинати», «плаче-ридає» — подвійні синоніми, що нагнітають емоцію
  model_answer: Постійний епітет закріплює героя в пам'яті слухача; молитовна формула
    дає думі впізнаваний рефрен; подвійні синоніми сповільнюють час і підсилюють психологізм.
    Усі три засоби — опора для усної імпровізації кобзаря.
