  formulas:
  - молитовна формула → «на тихі води, на ясні зорі»
  - постійний епітет → «дівка-бранка, Маруся попівна Богуславка»
  - подвійний синонім → «клясти-проклинати», «плаче-ридає»
  - синтаксичний період → нерівний рядок, що дає завершену думку
  answers:
  - «на тихі води, на ясні зорі» — молитовна формула визволення
  - «дівка-бранка, Маруся попівна Богуславка» — постійний епітет
  - «клясти-проклинати», «плаче-ридає» — подвійні синоніми
  - нерівні періоди — синтаксична будова речитативу
  model_answer: Спільний фонд формул — молитовний рефрен, постійний епітет, подвійні
    синоніми й нерівні синтаксичні періоди — дає думам впізнаваний стиль і дозволяє
    кобзареві тримати в пам'яті довгі тексти. Зміст різний, інструментарій той самий.
- type: comparative-study
  title: Невільницький плач і поховальне голосіння
  instruction: Порівняй два жанри плачу за чотирма ознаками й сформулюй головну відмінність.
  prompt: І невільницький плач, і поховальне голосіння — це ритмізований плач. Але
    оплакують вони різне. Порівняй їх.
  task: Заповни порівняння за критеріями й поясни, чому невільницький плач називають
    плачем за символічною смертю.
  criteria:
  - адресат плачу
  - привід для плачу
  - символіка
  - функція в спільноті
  items_to_compare:
  - невільницький плач
  - поховальне голосіння
  source_a: 'Невільницький плач: бранець оплакує самого себе й утрачену свободу; він
    живий, але для рідного світу зник. Адресат — Бог і природні стихії (зозуля, Дніпро,
    вітер). Символіка — дорога додому, тихі води, ясні зорі.'
  source_b: 'Поховальне голосіння: голосільниця оплакує реально померлого; адресат
    — мрець і рід; символіка — розлука, дорога на той світ, втрата годувальника.'
  source_reading: 'Розділи «Читання: Плач невільників» цього модуля та матеріал попереднього
    модуля про голосіння.'
  model_answer: 'Спільне: обидва жанри — ритмізована імпровізація з формулами, обидва
    переживають утрату колективно. Відмінне: голосіння оплакує мертве тіло, плач —
    живого бранця й відібрану свободу. Тому невільницький плач — це плач за символічною
    смертю: людина ще дихає, але для рідного світу вона вже зникла.'
- type: critical-analysis
  title: Психологізм чи героїка?
  instruction: Прочитай наукову тезу й оціни її аргументами з тексту дум.
  context: 'Дослідники сперечаються, що в невільницьких думах головне: ліричне страждання
    чи героїчна дія. Чижевський ставить ці думи поряд із голосінням і наголошує на
    їхньому ліричному, психологічному корені.'
  target_text: «Подібні думи і до голосінь… Дума, як і пісня взагалі, залюбки вживає
    паралелізму та антитетики» (Чижевський Д.).
  focus_points:
  - які стильові засоби працюють на психологізм, а не на героїку
  - де в думах усе ж видно героїчну дію (Маруся, втеча, повстання)
  - чому розвилка «жертви чи герої» може бути хибною
  question: Чи переконує теза про перевагу психологізму над героїкою? Обґрунтуй позицію
    прикладами з обох прочитаних дум.
  questions:
  - Які формули й образи плачу підтверджують ліричне прочитання?
  - Які сюжетні елементи підтримують героїчне прочитання?
  - Як текст утримує обидва полюси одночасно?
  model_answer: 'Подвійні синоніми, молитовні формули й образ символічної смерті працюють
    на психологізм. Водночас визволення сімсот невольників і мотив утечі — це героїчна
    дія. Сильна відповідь показує, що думи тримають обидва полюси разом, тому розвилка
    «жертви чи герої» хибна: плач і героїка — дві сторони одного тексту.'
  model_answers:
  - 'Психологізм: подвоєння дієслів, формула туги, анонімний колективний голос.'
  - 'Героїка: визволення в''язнів, опір, повернення на тихі води.'
  - 'Синтез: страждання й опір співіснують у тій самій думі.'
  source_reading: 'Розділи «Конфліктна карта» та «Читання: Плач невільників».'
- type: essay-response
  title: Думи як пам'ять про колективну травму
  instruction: Напиши есе про те, чому невільницькі думи називають однією з перших
    поетичних систем фіксації колективної травми.
  prompt: Чи можна вважати невільницькі думи способом, яким спільнота зберігає й переказує
    колективну травму? Доведи тезу прикладами поетики (анонімність, формула, символ,
    речитатив) і пов'яжи її із сучасним значенням такої пам'яті.
  min_words: 220
  rubric:
  - чітка теза про думу як систему пам'яті
  - щонайменше три засоби поетики як докази (анонімність, формула, символіка, речитатив)
  - звернення до історичного контексту работоргівлі без спрощення
  - обґрунтований висновок про сучасне значення
  - грамотна, природна українська мова
  model_answer: 'Сильне есе доводить, що думи перетворюють приватний біль бранця на
    спільну форму: анонімний голос робить страждання колективним, формула «на тихі
    води, на ясні зорі» дає переказуваний рефрен, символічний код (зозуля, явір, Дніпро)
    кодує тугу, а речитативне виконання перетворює слухання на ритуал пригадування.
    Висновок пов''язує цю давню практику з потребою спільноти не забувати пережите
    насильство.'
  peer_review_guidelines: 'Перевір у роботі товариша: чи є ясна теза; чи наведено
    щонайменше три засоби поетики як докази; чи згадано історичний контекст без чорно-білого
    спрощення; чи висновок справді випливає з аргументів. Познач один сильний доказ
    і одне місце, де бракує прикладу.'
