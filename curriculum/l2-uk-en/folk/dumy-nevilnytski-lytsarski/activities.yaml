  - Бранка приходить до темниці й питає козаків, який нині день
  - На Великдень Маруся визволяє сімсот невольників на волю
  - Козаки спершу проклинають бранку за згадку про святий день
  - Маруся просить переказати батькові не збирати викупу за неї
  correct_order:
