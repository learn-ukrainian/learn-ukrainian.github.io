- lemma: календарна обрядовість
  translation: calendar rites; ritual year tradition
  pos: noun phrase
  usage: Календарна обрядовість поєднує пісню, час року, дію, предмет і громаду.
- lemma: колядка
  translation: Christmas carol; koliadka
  pos: noun
  usage: Колядка належить до різдвяного циклу і часто має величальний характер.
- lemma: щедрівка
  translation: shchedrivka; New Year well-wishing song
  pos: noun
  usage: Щедрівка використовує приспів і побажання добробуту для дому.
- lemma: веснянка
  translation: spring song
  pos: noun
  usage: Веснянка часто поєднує звертання до весни, гуртовий спів і сезонне очікування.
- lemma: гаївка
  translation: Easter/spring circle song or game
  pos: noun
  usage: Гаївка пов'язана з великодньо-весняним гуртом і руховою формою.
- lemma: жниварська пісня
  translation: harvest song
  pos: noun phrase
  usage: Жниварська пісня супроводжує працю на полі або завершення жнив.
- lemma: обжинки
  translation: harvest completion rite
  pos: plural noun
  usage: Обжинки оформлюють кінець жнив через пісню, вінок, сніп і частування.
- lemma: виконавська ситуація
  translation: performance situation
  pos: noun phrase
  usage: Виконавська ситуація відповідає на питання, хто, коли, де і для кого співає.
- lemma: приспів
  translation: refrain
  pos: noun
  usage: Приспів повертає щедрівку до спільного побажання.
- lemma: публічне джерело
  translation: public source
  pos: noun phrase
  usage: Публічне джерело дає учневі змогу відкрити повний текст і перевірити уривок.
- lemma: варіант
  translation: variant; recorded version
  pos: noun
  usage: Записаний варіант є конкретним джерелом, а не всією традицією.
- lemma: хрестоматійний текст
  translation: school anthology text
  pos: noun phrase
  usage: Хрестоматійний текст переносить усну форму в режим шкільного читання.
