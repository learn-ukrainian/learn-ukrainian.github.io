- lemma: обря́д
  translation: rite, ritual
  pos: ч.
  usage: Ко́жен обря́д ма́є своє́ мі́сце в річно́му ко́лі.
- lemma: моти́в
  translation: motif, recurring image/formula
  pos: ч.
  usage: Моти́в воскреса́ння весни́ живе́ в багатьо́х пісня́х.
- lemma: варіа́нт
  translation: variant (regional/performance form)
  pos: ч.
  usage: Той самий текст ма́є рі́зні регіона́льні варіа́нти.
- lemma: обрядо́вість
  translation: ritual tradition, body of rites
  pos: ж.
  usage: Календа́рна обрядо́вість поє́днує ві́ру, пра́цю й спів.
- lemma: цикл
  translation: cycle (seasonal)
  pos: ч.
  usage: Зимо́ви́й цикл відкрива́є наро́дний рік.
- lemma: весня́нка
  translation: spring song
  pos: ж.
  usage: Весня́нка закликала тепло́ й оно́влення приро́ди.
- lemma: гаї́вки
  translation: Easter spring songs/games
  pos: мн.
  usage: Гаї́вки поє́днують спів із ру́хом і гро́ю.
- lemma: коля́дка
  translation: Christmas carol
  pos: ж.
  usage: Коля́дка сла́вила госпо́даря та йо́го роди́ну.
- lemma: щедрі́вка
  translation: New Year carol (shchedrivka)
  pos: ж.
  usage: Щедрі́вка закликала врожа́й і приплі́д на нови́й рік.
- lemma: кутя́
  translation: kutia (ritual grain dish)
  pos: ж.
  usage: Кутя́ — обрядо́ва стра́ва зимо́во́го ци́клу.
- lemma: діду́х
  translation: didukh (ritual sheaf)
  pos: ч.
  usage: Діду́х стоя́в у ха́ті як си́мвол ро́ду й врожа́ю.
- lemma: віно́к
  translation: wreath
  pos: ч.
  usage: Дівчата плели́ вінки́ й пуска́ли їх на воду́.
- lemma: сніп
  translation: sheaf
  pos: ч.
  usage: З оста́ннього снопа́ роби́ли дідуха́.
- lemma: обжи́нки
  translation: harvest-home rite
  pos: мн.
  usage: Обжи́нки заве́ршували жнива пісня́ми вдя́чності.
- lemma: посіва́ння
  translation: ritual grain-strewing (sowing rite)
  pos: с.
  usage: Посіва́ння зе́рно́м віщува́ло доста́ток на рік.
- lemma: синкрети́зм
  translation: syncretism (blending of layers)
  pos: ч.
  usage: Синкрети́зм поє́днує да́вній і христия́нський ша́ри обря́ду.
- lemma: си́мвол
  translation: symbol
  pos: ч.
  usage: Вого́нь — си́мвол очи́щення в купа́льську ніч.
- lemma: фо́рмула
  translation: verbal formula
  pos: ж.
  usage: Обрядо́ва фо́рмула повто́рюється з ро́ку в рік.
- lemma: грома́да
  translation: community
  pos: ж.
  usage: Обря́д трима́є грома́ду ра́зом.
- lemma: воскреса́ння
  translation: resurrection (motif of renewal)
  pos: с.
  usage: Моти́в воскреса́ння весни́ поє́днує ві́ру й приро́ду.
- lemma: виконання
  translation: performance
  pos: с.
  usage: Пі́сня живе́ ті́льки у виконанні.
- lemma: зви́чай
  translation: custom
  pos: ч.
  usage: Зви́чай передає́ варіа́нти від старших до моло́дших.
- lemma: врожа́й
  translation: harvest, crop
  pos: ч.
  usage: Обжи́нки дякували ни́ві за врожа́й.
  notes: Рівнопра́вний варіа́нт «урожа́й»; оби́дві фо́рми засві́дчені в VESUM.
- lemma: обері́г
  translation: protective charm, amulet
  pos: ч.
  usage: Вінки́ пра́вили за обере́ги для до́му.
- lemma: жнива
  translation: harvest, reaping
  pos: мн.
  usage: Жнива́ ма́ли зажи́нки на поча́тку й обжи́нки напри́кінці́.
- lemma: руса́лії
  translation: Rusalii (Pentecost-tide rites)
  pos: мн.
  usage: Руса́лії пов'я́зані з по́лем, водо́ю й духами приро́ди.
- lemma: верте́п
  translation: nativity puppet theatre
  pos: ч.
  usage: Верте́п розі́грував різдвя́ну ді́ю пе́ред грома́дою.
- lemma: хорово́д
  translation: round dance
  pos: ч.
  usage: Хорово́д води́ли ко́лом під спів.
- lemma: ва́тра
  translation: bonfire
  pos: ж.
  usage: Мо́лодь розпа́лювала ва́тру в купа́льську ніч.
- lemma: ря́джені
  translation: mummers, costumed performers
  pos: мн.
  usage: Ря́джені обходи́ли двори́ зі смі́хом і пі́снею.
