- lemma: обряд
  translation: rite, ritual
  pos: ч.
  usage: Кожен обряд має своє місце в річному колі громади.
- lemma: мотив
  translation: motif, recurring image
  pos: ч.
  usage: Мотив воскресання природи повторюється в багатьох веснянках.
- lemma: варіант
  translation: variant, regional version
  pos: ч.
  usage: Та сама пісня має варіант у кожному селі.
- lemma: кутя
  translation: kutia (ritual dish of boiled grain)
  pos: ж.
  usage: На різдвяному столі стоїть кутя з вареного зерна.
- lemma: дідух
  translation: didukh (ritual sheaf placed in the home)
  pos: ч.
  usage: Дідух ставлять на покуті як знак родючості й роду.
- lemma: веснянка
  translation: spring song
  pos: ж.
  usage: Веснянка закликає тепло й оновлення природи.
- lemma: гаївка
  translation: haivka (Western-Ukrainian spring round-song)
  pos: ж.
  usage: Гаївка тісно пов'язана з великодніми іграми.
- lemma: гагілки
  translation: hahilky (regional spring songs)
  pos: мн.
  usage: Гагілки — регіональна назва весняного закличного співу.
- lemma: обжинки
  translation: harvest-end rite
  pos: мн.
  usage: Обжинки завершують осінній цикл подякою полю.
- lemma: посівання
  translation: sowing rite (New Year grain-scattering)
  pos: с.
  usage: Уранці засівають оселю зерном — це обряд посівання.
- lemma: цикл
  translation: cycle
  pos: ч.
  usage: Зимовий цикл відкриває рік колядками та щедрівками.
- lemma: весняний
  translation: spring (adjective)
  pos: прикм.
  usage: Весняний цикл виводить громаду у відкритий простір.
- lemma: закликання
  translation: calling, invocation (of spring/warmth)
  pos: с.
  usage: Закликання тепла відкриває весняне дійство.
- lemma: воскресання
  translation: resurrection, revival
  pos: с.
  usage: Формула поєднує воскресання з аграрним оновленням.
- lemma: синкретизм
  translation: syncretism (blend of belief layers)
  pos: ч.
  usage: Синкретизм поєднує християнський і аграрний шари в одній пісні.
- lemma: дійство
  translation: ritual performance, enactment
  pos: с.
  usage: Купальське дійство будується навколо вогню й води.
- lemma: величальний
  translation: laudatory, of praise
  pos: прикм.
  usage: 'Колядка має величальний характер: вона славить господаря.'
- lemma: хоровод
  translation: round dance
  pos: ч.
  usage: Хоровод поєднує спів із рухом гурту в колі.
- lemma: кривий танець
  translation: '"crooked dance" (winding ritual dance)'
  pos: ч.
  usage: Кривий танець веде гурт звивистою лінією між рядами.
- lemma: родючість
  translation: fertility
  pos: ж.
  usage: Вода у весняному циклі пов'язана з родючістю.
- lemma: оновлення
  translation: renewal
  pos: с.
  usage: Весна означає сезонне оновлення природи й праці.
- lemma: персоніфікація
  translation: personification
  pos: ж.
  usage: Персоніфікація робить весну дійовою особою пісні.
- lemma: сакральний
  translation: sacred
  pos: прикм.
  usage: Обряд надає предметові сакрального значення.
- lemma: аграрний
  translation: agrarian
  pos: прикм.
  usage: За піснею стоїть аграрна логіка річного року.
- lemma: сезонний
  translation: seasonal
  pos: прикм.
  usage: Сезонне оновлення повторюється щовесни.
- lemma: величання
  translation: glorification, laudatory singing
  pos: с.
  usage: Величання спрямоване на людину, поле або весну.
- lemma: колядування
  translation: caroling (winter ritual singing)
  pos: с.
  usage: Колядування відкриває зимовий цикл обходом дворів.
- lemma: щедрування
  translation: shchedrivka-singing
  pos: с.
  usage: Щедрування супроводжує новорічний цикл.
- lemma: засівання
  translation: grain-scattering rite
  pos: с.
  usage: Засівання зерном символізує достаток на новий рік.
- lemma: жнива
  translation: harvest
  pos: мн.
  usage: Завершені жнива позначає останній сніп.
- lemma: рефрен
  translation: refrain
  pos: ч.
  usage: Рефрен повертає той самий рядок і тримає ритм гурту.
- lemma: зачин
  translation: formulaic opening
  pos: ч.
  usage: Зачин вводить образ весни на початку пісні.
- lemma: спадкоємність
  translation: continuity, inheritance
  pos: ж.
  usage: Обряд забезпечує спадкоємність між поколіннями.
- lemma: тяглість
  translation: continuity over time
  pos: ж.
  usage: Циклічність обряду підтримує тяглість культури.
- lemma: міфологізація
  translation: mythologization (over-reading symbols as cult)
  pos: ж.
  usage: Надмірна міфологізація домальовує те, чого джерело не дає.
