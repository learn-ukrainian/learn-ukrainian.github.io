- lemma: обряд
  translation: rite, ritual
  pos: noun
  usage: Кожен обряд має своє місце в році.
  notes: Усталена символічна дія або послідовність дій, прив'язана до певної дати.
- lemma: обрядовість
  translation: ritual practice, body of rites
  pos: noun
  usage: Календарна обрядовість тримається на чотирьох циклах.
- lemma: обрядодія
  translation: ritual act
  pos: noun
  usage: Спів супроводжує обрядодію закликання весни.
- lemma: мотив
  translation: motif; recurring image or formula
  pos: noun
  usage: Мотив достатку повторюється від колядки до обжинкової пісні.
- lemma: варіант
  translation: variant; regional or performative version
  pos: noun
  usage: Той самий спів існує в багатьох регіональних варіантах.
- lemma: цикл
  translation: cycle
  pos: noun
  usage: Зимовий цикл відкриває обрядовий рік.
- lemma: кутя
  translation: kutia (ritual grain dish for Christmas Eve)
  pos: noun
  usage: На Святвечір родина куштує кутю.
- lemma: дідух
  translation: didukh (ceremonial sheaf)
  pos: noun
  usage: Господар вносить дідух і ставить його на покуті.
- lemma: веснянка
  translation: vesnianka (spring ritual song)
  pos: noun
  usage: Веснянки співають, закликаючи тепло.
- lemma: гаївка
  translation: haivka (western spring/Easter song)
  pos: noun
  usage: Гаївки тісно пов'язані з великоднім тижнем.
- lemma: гагілки
  translation: hahilky (Galician spring songs)
  pos: noun
  usage: Гагілки — галицькі варіанти весняного співу.
  notes: Вживається переважно у формі множини.
- lemma: колядка
  translation: koliadka (Christmas carol)
  pos: noun
  usage: Колядка величає дім і бажає достатку.
- lemma: щедрівка
  translation: shchedrivka (New Year well-wishing song)
  pos: noun
  usage: Щедрівку співають під час новорічного обходу.
- lemma: колядування
  translation: carolling (the rite of going house to house)
  pos: noun
  usage: Колядування — це обхід дворів із піснями.
- lemma: посівання
  translation: ritual sowing of grain on New Year
  pos: noun
  usage: На Новий рік хлопці ходять із посіванням.
- lemma: обжинки
  translation: harvest-end rite
  pos: noun
  usage: Обжинки замикають аграрний рік.
  notes: Вживається у формі множини.
- lemma: зажинки
  translation: rite of starting the harvest
  pos: noun
  usage: Зажинки відкривають жнива, а обжинки їх завершують.
  notes: Вживається у формі множини.
- lemma: сніп
  translation: sheaf
  pos: noun
  usage: Із останнього снопа плетуть обжинковий вінок.
- lemma: вінок
  translation: wreath
  pos: noun
  usage: Дівчина несе обжинковий вінок на голові.
- lemma: жнива
  translation: harvest (reaping)
  pos: noun
  usage: Обжинки відбуваються наприкінці жнив.
  notes: Вживається у формі множини.
- lemma: хоровод
  translation: round dance with song
  pos: noun
  usage: Стара гра про просо збереглася як хоровод.
- lemma: гільце
  translation: giltse (decorated ritual treelet)
  pos: noun
  usage: Громада ставить і прикрашає купальське гільце.
- lemma: сонцестояння
  translation: solstice
  pos: noun
  usage: Купала пов'язане з літнім сонцестоянням.
- lemma: рівнодення
  translation: equinox
  pos: noun
  usage: Весняні обряди близькі до часу рівнодення.
- lemma: синкретизм
  translation: syncretism (coexistence of religious layers)
  pos: noun
  usage: Синкретизм поєднує християнський і дохристиянський шари в одній пісні.
- lemma: синкретичний
  translation: syncretic
  pos: adj
  usage: Купальська пісня має виразно синкретичний характер.
- lemma: персоніфікація
  translation: personification
  pos: noun
  usage: Персоніфікація природи помітна в образі Купала.
- lemma: перформативність
  translation: performativity (text bound to action)
  pos: noun
  usage: Перформативність означає, що текст прив'язаний до дії.
- lemma: величальний
  translation: glorifying, laudatory
  pos: adj
  usage: Обжинкова пісня має величальний характер.
- lemma: закликальний
  translation: invocatory, summoning
  pos: adj
  usage: Веснянка часто має закликальний зміст.
- lemma: родючість
  translation: fertility (of land)
  pos: noun
  usage: Купальські обряди мали забезпечити родючість.
- lemma: опудало
  translation: effigy, scarecrow
  pos: noun
  usage: Опудало Купала наприкінці свята топлять або спалюють.
- lemma: ряджений
  translation: costumed (mummer)
  pos: adj
  usage: На Маланку ходять ряджені гурти.
- lemma: обрядовий
  translation: ritual (adjective)
  pos: adj
  usage: Обрядовий рефрен відрізняє пісню від побутової.
- lemma: деколонізація
  translation: decolonization
  pos: noun
  usage: Деколонізація опису повертає традиції власний центр.
