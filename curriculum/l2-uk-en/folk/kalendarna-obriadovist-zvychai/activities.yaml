- type: essay-response
  title: Опис зсередини чи ззовні
  instruction: Напиши короткий аргументований текст за поданою тезою, спираючись на
    матеріал модуля.
  prompt: Чому українську календарну обрядовість слід описувати її власними назвами
    й «зсередини», а не як «загальнослов'янський матеріал»? Сформулюй позицію і підкріпи
    її щонайменше двома прикладами обрядодій (наприклад, кутя, гаївка, Купало, обжинки).
  min_words: 180
  source_reading: Розділи «Деколонізаційна рамка» та «Підсумок» цього модуля; корпусні
    фрагменти колядки, веснянки та обжинкової пісні.
  rubric:
  - Чітко сформульована теза про опис зсередини проти опису ззовні.
  - Щонайменше два конкретні приклади обрядодій із правильними українськими назвами.
  - Розрізнення поетичного образу та доведеного культу (наукова стриманість).
  - Зв'язний виклад, доречне вживання понять обряд, мотив, варіант.
  peer_review_guidelines: Перевір, чи автор справді почав з українських назв, а не
    з порівняння; чи навів два приклади; чи не приписав джерелам того, чого вони не
    засвідчують. Запропонуй один приклад, який підсилив би аргумент.
  model_answer: 'Сильна відповідь доводить, що опис зсередини повертає традиції власний
    центр: кутя й дідух описуються як вузли українського зимового столу, а не як «місцевий
    варіант» чужого звичаю; гаївка постає як весняна обрядодія з власним танцем, а
    не як ілюстрація до наднаціональної схеми. Автор визнає спорідненість слов''янських
    традицій, але вимагає правильного порядку: спершу опис української системи, потім
    обережне порівняння. Водночас він не перебільшує — образ світового дерева чи води
    не оголошує доказом організованого культу.'
- type: comparative-study
  title: Народна зимова формула і хорова обробка Леонтовича
  instruction: Порівняй обрядову зимову формулу та мистецьке перетворення щедрівкового
    матеріалу за поданими
    критеріями.
  prompt: Що змінюється, а що зберігається, коли обрядовий зимовий матеріал стає
    всесвітньо відомою хоровою композицією Миколи Леонтовича?
  source_a: 'Новорічна формула посівання: «сію, вію, посіваю» (Колектив, Енциклопедія
    українознавства) — обрядовий зимовий обхід із побажанням достатку.'
  source_b: Хорова обробка Миколи Леонтовича «Щедрик» (початок XX ст.), що завдяки
    гастролям українського хору стала всесвітньо відомою як «Carol of the Bells».
  source_reading: Розділ «Корпус і контекст», блок про циркуляцію обрядового тексту;
    стаття «Щедрик (Леонтович)» в українській Вікіпедії.
  items_to_compare:
  - обрядова зимова формула в селі
  - концертна хорова композиція на світовій сцені
  criteria:
  - функція (обрядова дія проти концертного виконання)
  - виконавець (колядники/гурт проти професійного хору)
  - контекст циркуляції (село та обхід проти світової сцени)
  task: Заповни порівняння за трьома критеріями й сформулюй висновок про те, що тяглість
    тексту робить із українською традицією.
  model_answer: 'Функція змінилася з обрядової (побажання достатку дому під час обходу)
    на концертну (естетичне виконання). Виконавець змінився з колядницького гурту
    на професійний хор. Контекст циркуляції розширився від села до світової сцени.
    Збереглися ж сам ритмомелодійний стрижень і впізнаваність зимового обрядового
    матеріалу: саме тяглість традиції дозволила простій формулі стати річчю світового рівня. Це
    спростовує думку, ніби фольклор «дрібніший» за високу культуру.'
