- id: act-1
  type: ritual-sequencing
  title: Річне коло обрядовості
  instruction: Розташуй чотири цикли календарної обрядовості за порядком року, починаючи
    від зими.
  items:
  - 'Весняний цикл: веснянки, гаївки, гагілки'
  - 'Осінній цикл: обжинки, останній сніп'
  - 'Зимовий цикл: колядки, щедрівки, посівання'
  - 'Літній цикл: купальські дійства'
  correct_order:
  - 2
  - 0
  - 3
  - 1
  steps:
  - 'Зимовий цикл: колядки, щедрівки, посівання'
  - 'Весняний цикл: веснянки, гаївки, гагілки'
  - 'Літній цикл: купальські дійства'
  - 'Осінній цикл: обжинки, останній сніп'
  model_answer: 'Правильний порядок: зимовий → весняний → літній → осінній цикл. Це
    річне коло, у якому кожен сезон має свої жанри й дії, а осіннє зерно знову веде
    до зимового посівання.'
- id: act-2
  type: motif-formula
  title: Зачин-діалог у весняній формулі
  instruction: Прочитай корпусну формулу й визнач її будову.
  passage: Вже весна воскресла, Що ж сь нам принесла?
  text: Вже весна воскресла, Що ж сь нам принесла?
  prompt: Яка формула організовує ці рядки?
  formulas:
  - зачин-звертання до весни
  - питання-відповідь (діалогічний зачин)
  - величання врожаю
  answers:
  - питання-відповідь (діалогічний зачин)
  model_answer: 'Рядки будуються як діалогічний зачин: персоніфікована весна «воскресає»,
    і до неї звернене питання про принесене. Це поєднання християнської лексики воскресання
    з аграрною логікою сезонного оновлення.'
- id: act-3
  type: motif-formula
  title: Символ і його значення
  instruction: З'єднай символ весняно-літнього циклу з його обрядовим значенням.
  passage: У веснянках і купальських дійствах повторюються вода, вогонь і коло.
  text: вода — оновлення; вогонь — очищення; коло — циклічність часу
  prompt: Яке значення має кожен символ в обрядовому тексті?
  formulas:
  - вода → оновлення й родючість
  - вогонь → очищення
  - коло → циклічність часу
  answers:
  - вода → оновлення й родючість
  - вогонь → очищення
  - коло → циклічність часу
  model_answer: Вода пов'язана з оновленням і родючістю, вогонь — з очищенням, коло
    — із циклічністю часу. Це символи всередині тексту, а не доказ окремого культу.
- type: variant-comparison
  title: Регіональні назви весняних пісень
  instruction: Порівняй регіональні назви весняного обрядового співу.
  prompt: Чим різняться й що спільного мають назви веснянки, гаївки та гагілки?
  variants:
  - веснянки
  - гаївки
  - гагілки
  features:
  - територія побутування
  - зв'язок із великодніми іграми
  - поєднання співу з рухом (коло, ряди)
  model_answer: Веснянки — загальна назва весняного закличного співу; гаївки й гагілки
    — регіональні (передусім західні) назви тих самих або споріднених пісень, тісніше
    пов'язані з великодніми іграми. Спільне — закликання тепла й поєднання слова з
    рухом громади. Різне — територія побутування й місцевий рефрен.
- type: ritual-sequencing
  title: Виконання весняного дійства
  instruction: Розташуй кроки весняного дійства в логічному порядку виконання.
  items:
  - проходження між рядами та ігровий діалог
  - закликання тепла й весни
  - символічне виведення весни у простір громади
  - спів у колі та кривий танець
  correct_order:
  - 1
  - 3
  - 0
  - 2
  steps:
  - закликання тепла й весни
  - спів у колі та кривий танець
  - проходження між рядами та ігровий діалог
  - символічне виведення весни у простір громади
  model_answer: Дійство розгортається від закликання весни через спів у колі та кривий
    танець до ігрового проходження між рядами й символічного виведення весни. Слово
    тут не існує окремо від тіла й руху.
- type: motif-formula
  title: Мотиви воскресання й оновлення
  instruction: Знайди в наведеному описі повторювані мотиви весняного циклу.
  passage: Весняний цикл закликає тепло, оспівує воскресання природи, рух громади
    та сезонне оновлення.
  text: закликання тепла; воскресання природи; рух громади; сезонне оновлення
  prompt: Які мотиви повторюються у весняному циклі та як вони пов'язані з аграрною
    логікою?
  formulas:
  - мотив закликання тепла
  - мотив воскресання природи
  - мотив руху й громади
  - мотив сезонного оновлення
  answers:
  - мотив закликання тепла
  - мотив воскресання природи
  - мотив сезонного оновлення
  model_answer: 'Повторювані мотиви — закликання тепла, воскресання природи, рух громади
    й сезонне оновлення. Усі вони підпорядковані хліборобській логіці: весна означає
    початок нового аграрного року.'
- type: performance
  title: Виконання весняної формули
  instruction: Вимов корпусну формулу як весняний зачин, дотримуючись питально-відповідної
    будови.
  fragment: Вже весна воскресла, Що ж сь нам принесла?
  prompt: 'Прочитай формулу вголос двічі: спершу як звертання до весни, потім як питання
    громади до весни.'
  self_checklist:
  - Я виділив(ла) персоніфіковану весну
  - Я зберіг(ла) питально-відповідну будову
  - Я не згладив(ла) синкретизм воскресання й оновлення
  show_record_button: true
  model_answer: Перше прочитання інтонує воскресання весни, друге — громадське питання
    «що ж нам принесла». Так чути, що формула поєднує християнську лексику з аграрним
    очікуванням врожаю.
- type: essay-response
  title: Система, а не розвага
  instruction: Напиши аргументоване відповідь-есе.
  prompt: Доведи, що календарна обрядовість є системою світогляду, а не «простою народною
    розвагою». Спирайся на цикли, символи й громаду.
  min_words: 180
  source_reading: Розділи «Постановка проблеми» та «Деколонізаційна рамка» цього уроку.
  rubric:
  - Чітка теза про систему проти розваги
  - Щонайменше два цикли як докази
  - Роль символів (вода, вогонь, зерно)
  - Згадка про громаду й хліборобську логіку
  peer_review_guidelines: Перевір, чи є чітка теза, чи наведено приклади з різних
    циклів і чи уникнуто рамки «проста розвага».
  model_answer: 'Календарна обрядовість упорядковує рік, працю й світогляд громади.
    Кожен цикл має свої жанри, символи й дії: зимове посівання, весняне закликання
    тепла, літній вогонь, осінні обжинки. За піснею стоїть вірування про родючість,
    тож це система значень, а не розвага.'
- type: critical-analysis
  title: Імперсько-радянська рамка опису
  instruction: Проаналізуй, як колоніальна рамка спотворює опис української обрядовості.
  context: Імперські й радянські тексти часто розчиняли українську календарну обрядовість
    у нечіткому «загальнослов'янському» або «етнографічному» матеріалі.
  target_text: кутя, дідух, веснянка, гаївка, Купало, посівання, обжинки, обжинковий
    вінок, останній сніп
  question: Як знеособлення українських назв працює на меншовартість і що відновлює
    деколонізований підхід?
  questions:
  - Які саме українські назви усуває колоніальна рамка?
  - Як «загальнослов'янське» тло применшує систему?
  - З чого починає деколонізований опис?
  focus_points:
  - знеособлення назв
  - розчинення в чужій схемі
  - повернення українських назв, регіонів і джерел
  source_reading: Розділ «Деколонізаційна рамка» цього уроку.
  model_answer: Колоніальна рамка усуває конкретні українські назви й регіони, подаючи
    обрядовість як додаток до чужої схеми. Це формує меншовартість. Деколонізований
    підхід повертає назви — кутя, дідух, гаївка, обжинки — і вибудовує систему від
    українських джерел.
  model_answers:
  - Усуваються кутя, дідух, гаївка, обжинки та інші назви.
  - «Загальнослов'янське» тло стирає регіональні й національні межі.
  - Опис починає з українських назв, регіонів, дій і джерел.
- type: comparative-study
  title: Зимовий і весняний цикли
  instruction: Порівняй два цикли за поданими критеріями.
  prompt: Зістав зимовий і весняний цикли календарної обрядовості.
  items_to_compare:
  - зимовий цикл
  - весняний цикл
  source_a: 'Зимовий цикл: колядки, щедрівки, щедрування, посівання; символи — дідух,
    кутя, зерно; виконання переважно в домі.'
  source_b: 'Весняний цикл: веснянки, гаївки, гагілки, великодні ігри; символи — вода,
    коло, верба; виконання у відкритому просторі громади.'
  criteria:
  - провідні жанри
  - ключові символи
  - місце виконання (дім чи відкритий простір)
  - аграрне значення
  task: Заповни порівняння за чотирма критеріями й сформулюй висновок про спільну
    хліборобську логіку двох циклів.
  source_reading: Розділи «Корпус і контекст» та «Поетика, символіка і виконання».
  model_answer: Зимовий цикл зосереджений на домі, достатку й новому році (дідух,
    кутя, посівання). Весняний цикл виходить у відкритий простір громади, закликає
    тепло й оновлення (вода, коло). Обидва підпорядковані хліборобській логіці річного
    відродження.
