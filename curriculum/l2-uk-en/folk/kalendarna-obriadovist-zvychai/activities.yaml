  - Громада ставить і прикрашає купальське деревце — гільце.
  - Хлопці й дівчата перескакують парами через купальський вогонь.
  - Дівчата пускають вінки на воду й ворожать про долю.
  - Опудало Купала спалюють або топлять у воді.
  correct_order:
