- id: act-1
  type: motif-formula
  title: Приспів, адреса і образ дому
  instruction: Знайди формули, які роблять щедрівку календарною виконуваною піснею.
  passage: |
    Ой сивая та і зозулечка.
    Приспів:
    Щедрий вечір, добрий вечір,
    Добрим людям на здоров'я!
    Усі сади та і облітала,
    в одному та і не бувала.
    А в тім саду три тереми.
  formulas:
    - text: Щедрий вечір, добрий вечір
      label: приспів
      explanation: Повтор повертає текст до зимового святкового часу й гуртового голосу.
    - text: Добрим людям на здоров'я
      label: адресат
      explanation: Рядок показує, що пісня звернена до людей дому.
    - text: три тереми
      label: образний порядок
      explanation: Образ саду й теремів готує родинну модель місяця, сонця і зірок.
  prompt: Поясни, чому ці формули не можна читати як самотній книжковий опис.
  model_answer: Вони припускають виконання, бо мають приспів, адресата, побажання і простір дому. Без календарного часу й гуртового голосу текст утрачає частину своєї дії.

- id: act-2
  type: ritual-sequencing
  title: Шість питань до календарного тексту
  instruction: Розташуй кроки так, щоб отримати доказову карту календарного читання.
  steps:
    - Визнач календарний час.
    - Назви виконавців або можливий гурт.
    - Назви адресата.
    - Познач дію поруч із текстом.
    - Назви предмет або простір сцени.
    - Перевір публічне джерело.
  correct_order:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
  model_answer: Уважне читання рухається від часу й виконавців до адресата, дії, простору і джерела. Так текст не зводиться до загальної теми.

- id: act-3
  type: variant-comparison
  title: Щедрівка і веснянка без змішування жанрів
  instruction: Порівняй два публічні читання за календарним часом, адресою і поетичною формою.
  variants:
    - label: Щедрівка
      text: Ой сивая та і зозулечка; приспів організує зимове побажання людям дому.
      region: зимовий цикл
      source: публічна сторінка
    - label: Веснянка
      text: Ой весна, весна, ти красна; громада питає весну, що вона принесла.
      region: весняний цикл
      source: публічна сторінка
  features:
    - календарний час
    - адресат
    - форма повтору або діалогу
    - образ достатку
  prompt: Сформулюй двома реченнями, чому обидва тексти календарні, але не однакові за поетикою.
  model_answer: Обидва тексти прив'язані до часу року і виконуються як гуртова традиція. Але щедрівка будує побажання дому через приспів, а веснянка будує сезонний перехід через діалог із весною.

- id: act-4
  type: essay-response
  title: Межа доказу
  instruction: Напиши коротку доказову відповідь, яка починається з публічного тексту і не перебільшує висновок.
  prompt: На основі уривка "Ой весна, весна, ти красна" поясни, що цей текст дозволяє сказати про весняний цикл, а чого він не доводить сам по собі.
  min_words: 90
  model_answer: Цей уривок веснянки показує, що весна постає співрозмовником громади. Її питають, що вона принесла, а відповідь називає літо, жито, квіти і спів. З цього можна говорити про сезонний діалог і гуртове очікування оновлення, але не можна описувати всі весняні форми без інших публічних текстів.
  rubric:
    - criteria: Названо публічне джерело або жанр.
      description: Відповідь прямо спирається на названий уривок веснянки або його жанрову належність.
    - criteria: Пояснено звертання до весни і сезонні дари.
      description: Показано, як діалог із весною пов'язує образи літа, жита, квітів і співу.
    - criteria: Не зроблено висновку про всі весняні пісні з одного уривка.
      description: Висновок обмежено цим текстом; не узагальнено весь весняний цикл без інших джерел.
