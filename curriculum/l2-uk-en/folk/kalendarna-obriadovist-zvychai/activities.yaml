- id: act-1
  type: ritual-sequencing
  title: 'Зимовий цикл: від дідуха до посівання'
  instruction: Розташуй обрядодії зимового циклу в тому порядку, у якому вони відбуваються
    від Святвечора до Нового року.
  items:
  - Колядники обходять село й співають колядки під вікнами.
  - Господар вносить до хати дідух і ставить його на покуті.
  - Родина сідає до святкової вечері й куштує кутю.
  - На Новий рік хлопці ходять по хатах із посіванням, засіваючи зерном.
  correct_order:
  - 1
  - 2
  - 0
  - 3
  steps:
  - Господар вносить до хати дідух і ставить його на покуті.
  - Родина сідає до святкової вечері й куштує кутю.
  - Колядники обходять село й співають колядки під вікнами.
  - На Новий рік хлопці ходять по хатах із посіванням, засіваючи зерном.
  model_answer: 'Дідух і кутя належать Святвечору, тож вони відкривають цикл. Колядки
    звучать на Різдво, після святкової вечері. Посівання припадає на Новий рік і завершує
    зимовий обхід. Правильна послідовність: дідух — кутя — колядки — посівання.'
- id: act-2
  type: motif-formula
  title: Весняна формула воскресання
  instruction: Прочитай підтверджений у Грушевського веснянковий фрагмент і визнач
    його обрядові формули.
  prompt: Яку магічну функцію виконує образ воскресання весни і яку роль має питальна
    будова?
  text: Вже весна воскресла, / Що ж сь нам принесла?
  passage: Вже весна воскресла, / Що ж сь нам принесла?
  formulas:
  - образ воскресання весни як магічне називання сезонного оновлення
  - питальна будова як знак антифонного співу двох гуртів
  answers:
  - 'Воскресання весни — продукувальна магія: називаючи прихід весни, гурт ніби допомагає
    сезонному оновленню відбутися.'
  - Питання «Що ж сь нам принесла?» створює місце для відповіді другого гурту й робить
    текст антифонним.
  model_answer: 'Образ воскресання весни діє як продукувальна (вегетаційна) магія:
    проговорене оновлення мало підтримати реальне пробудження поля й громади. Питальна
    будова робить текст антифонним: один гурт питає, другий мав би відповісти або зробити
    зустрічний рух. Архаїчна форма «сь» зберігає обрядовий, а не побутовий тон.'
- id: act-3
  type: ritual-sequencing
  title: 'Обжинки: від «бороди» до вінка'
  instruction: Розташуй дії обжинкового обряду в правильній послідовності — від кінця
    жнив до приходу до господаря.
  items:
  - Женці лишають на полі останній жмут колосся, так звану «бороду».
  - Із останнього снопа й колосся плетуть обжинковий вінок.
  - Дівчина несе вінок на голові, а дружина женців іде процесією до господаря.
  - Господаря вітають піснею-величанням і віддають йому вінок.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  steps:
  - Женці лишають на полі останній жмут колосся, так звану «бороду».
  - Із останнього снопа й колосся плетуть обжинковий вінок.
  - Дівчина несе вінок на голові, а дружина женців іде процесією до господаря.
  - Господаря вітають піснею-величанням і віддають йому вінок.
  model_answer: Спершу на полі лишають останнє колосся («бороду»), потім із останнього
    снопа плетуть вінок, далі дружина женців несе вінок процесією до двору, і нарешті
    господаря величають піснею та віддають йому вінок. Вінок із останнього збіжжя
    — знак завершеної праці й застава нового засіву.
- id: act-4
  type: motif-formula
  title: Обжинкова формула повторення
  instruction: Прочитай підтверджений у Грушевського обжинковий фрагмент і визнач
    провідний мотив.
  prompt: Який мотив несе цей текст і як працює рима «дожали / діждали»?
  text: А ми жито дожали, / Щоб ще за рік діждали!
  passage: А ми жито дожали, / Щоб ще за рік діждали!
  formulas:
  - мотив завершення жнив
  - побажання повторення врожаю наступного року
  answers:
  - 'Провідний мотив — завершення праці: жито вже дожато, отже обряд фіксує кінець
    жнив.'
  - Рима «дожали / діждали» просить повторення достатку, щоб громада дочекалася такого
    самого врожаю наступного року.
  model_answer: 'Текст будується на формулі завершення й повторення: «дожали» називає
    кінець жнив, а «діждали» відкриває побажання майбутнього врожаю. Це не просто
    звіт про працю, а словесне закріплення достатку, який має повернутися через рік.
    Той самий мотив достатку відкривав рік узимку (колядка, посівання) і замикає його
    восени.'
- type: variant-comparison
  title: Регіональні форми весняного співу
  instruction: Порівняй три назви весняних обрядових пісень за поданими ознаками.
  prompt: Чим різняться веснянки, гаївки та гагілки за регіоном побутування, обрядовою
    дією та часом виконання?
  variants:
  - веснянки
  - гаївки
  - гагілки
  features:
  - регіон побутування
  - обрядова дія (танець або гра, що супроводжує спів)
  - час виконання в межах весняного циклу
  model_answer: Веснянки переважають на Наддніпрянщині й супроводжують закликання
    весни, часто кривим танцем; гаївки поширені на заході й тісно пов'язані з великоднім
    тижнем та коловими танцями біля церкви; гагілки — галицькі варіанти того самого
    весняного співу. Усі три — рівноправні регіональні редакції одного мотиву оновлення,
    а не «правильна» й «неправильна» форми.
- type: motif-formula
  title: Мотиви зимового обходу
  instruction: Порівняй дві підтверджені зимові формули з Енциклопедії українознавства
    і випиши їхні мотиви.
  prompt: Які два мотиви поєднують колядкову космогонію та новорічне побажання?
  text: Коли не било з нащада світа, тогди не било неба, ні землі, / а то лем било
    синєє море, а серед моря зелений явір // На щастя, на здоров’я, та на нове літо
    роди, Боже, жито, пшеницю і всяку пашницю
  passage: Коли не било з нащада світа, тогди не било неба, ні землі, / а то лем било
    синєє море, а серед моря зелений явір // На щастя, на здоров’я, та на нове літо
    роди, Боже, жито, пшеницю і всяку пашницю
  formulas:
  - космогонічний мотив первісного моря й зеленого явора
  - побажання здоров'я, нового часу й урожаю
  answers:
  - Перший фрагмент розгортає початок світу через море й дерево, тобто дає зимовій
    пісні космогонічний масштаб.
  - Другий прямо бажає здоров'я, нового літа й урожаю, тобто називає практичну мету
    обходу.
  model_answer: 'Спільна опора — достаток, але поданий у двох масштабах. Колядкова
    космогонія показує світ як упорядкований простір із морем і зеленим явором, а
    новорічне побажання прямо просить здоров''я, нового літа й урожаю. Так зимовий
    обхід поєднує велику модель світу з конкретною господарською надією.'
- type: ritual-sequencing
