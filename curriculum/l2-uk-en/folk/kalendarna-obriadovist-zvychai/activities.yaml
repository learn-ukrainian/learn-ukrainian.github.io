    а кінцеве знищення опудала — обрядова логіка переходу від старого до нового.
- type: performance
  title: Виконай весняну гаївку
  instruction: Промов уголос підтверджений у Грушевського весняний фрагмент, дотримуючись
    його питальної, антифонної будови.
  prompt: 'Прочитай гаївку так, ніби її співають два гурти: перший ставить питання,
    другий мав би відповісти. Виділи голосом питальну інтонацію.'
  fragment: Вже весна воскресла, / Що ж сь нам принесла?
  self_check: Послухай власний запис і перевір, чи чути в голосі питання та чи витримано
