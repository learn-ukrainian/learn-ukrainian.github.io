- title: Обрядові та обрядово-календарні пісні — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Обрядові_та_обрядово-календарні_пісні
  notes: Оглядова стаття про календарно-обрядові пісні, їхній зв'язок із порами року,
    працею та народним календарем. Грунтує опис чотирьох циклів у розділах «Постановка
    проблеми» й «Корпус і контекст».
- title: Купало — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Купало
  notes: 'Контекст до літнього циклу: Купало як образ, пов''язаний із літнім сонцестоянням,
    та звичай знищення опудала. Підпирає розділ «Поетика, символіка і виконання».'
- title: Щедрик (Леонтович) — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Щедрик_(Леонтович)
  notes: 'Джерело для блоку «висока культура»: народна щедрівка в обробці Миколи Леонтовича
    стала всесвітньо відомою як «Carol of the Bells». Грунтує high-culture-bridge
    у розділах «Корпус і контекст» та «Підсумок».'
# READING LAYER (оновлено): зимовий і весняний цикли мають перевірені корпусні
# першоджерела, винесені в :::primary-reading модуля (Щедрик, Ой над Дунаєм, Ой весна,
# Ой виорю). Для купальського (літнього) та обжинкового (осіннього) циклів gate-safe
# самостійного корпусного запису немає (усі тексти в корпусі вплетені в наукові праці —
# Грушевський, Енциклопедія українознавства), тому тут вони подані як зовнішні читання-
# посилання (reading-needed), а не як хостовані першоджерела.
- title: 'Веснянки'
  role: reading
  url: https://uk.wikisource.org/wiki/Веснянки
  notes: 'Прочитай тексти веснянок як збірник першоджерел і познач образи весни, поля та громади.'
- title: 'Купальські пісні'
  role: reading
  url: https://uk.wikipedia.org/wiki/Купальські_пісні
  notes: 'Прочитай огляд купальських пісень і випиши образи води та вогню; зверни увагу, що повний текст потребує окремого збірника першоджерел.'
- title: 'Обжинки'
  role: reading
  url: https://uk.wikipedia.org/wiki/Обжинки
  notes: 'Прочитай опис обжинкового обряду й простеж шлях вінка від ниви до господаря; познач мотив завершення праці та побажання нового врожаю.'
