- title: Обрядові та обрядово-календарні пісні — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Обрядові_та_обрядово-календарні_пісні
  notes: Оглядова стаття про календарно-обрядові пісні, їхній зв'язок із порами року,
    працею та народним календарем. Грунтує опис чотирьох циклів у розділах «Постановка
    проблеми» й «Корпус і контекст».
- title: Купало — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Купало
  notes: 'Контекст до літнього циклу: Купало як образ, пов''язаний із літнім сонцестоянням,
    та звичай знищення опудала. Підпирає розділ «Поетика, символіка і виконання».'
- title: Щедрик (Леонтович) — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Щедрик_(Леонтович)
  notes: 'Джерело для блоку «висока культура»: народна щедрівка в обробці Миколи Леонтовича
