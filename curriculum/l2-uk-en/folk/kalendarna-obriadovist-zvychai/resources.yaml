- title: «Обрядові пісні» — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Обрядові_пісні
  notes: Оглядова стаття про обрядові пісні та їхній зв'язок із календарними святами;
    контекст до розділу «Корпус і контекст».
- title: «Щедрик» (Микола Леонтович) — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Щедрик_(Леонтович)
  notes: Історія щедрівки та її хорового аранжування Миколи Леонтовича; джерело для
    містка від народної пісні до високої культури.
- title: «Жнивні пісні» — українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Жнивні_пісні
  notes: Жанри осіннього циклу (зажинки, жнива, обжинки); підтримує розділ про осінній
    цикл і символіку дідуха.
