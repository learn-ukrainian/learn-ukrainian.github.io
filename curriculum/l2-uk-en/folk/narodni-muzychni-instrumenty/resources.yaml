- title: Бандура
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%91%D0%B0%D0%BD%D0%B4%D1%83%D1%80%D0%B0
  notes: >-
    Довідкова сторінка для базової будови й історії бандури. Урок не
    ототожнює її автоматично з усім кобзарсько-лірницьким комплексом.
- title: Кобза
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9A%D0%BE%D0%B1%D0%B7%D0%B0
  notes: >-
    Довідковий вхід для відмінності між кобзою, бандурою та сценічними
    реконструкціями. Використано обережно, разом із дослідницькими матеріалами
    й корпусними фрагментами.
- title: Колісна ліра
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9A%D0%BE%D0%BB%D1%96%D1%81%D0%BD%D0%B0_%D0%BB%D1%96%D1%80%D0%B0
  notes: >-
    Довідка для колісно-клавішного принципу й бурдонового звучання ліри.
- title: Цимбали
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A6%D0%B8%D0%BC%D0%B1%D0%B0%D0%BB%D0%B8
  notes: >-
    Довідковий матеріал для ударно-струнного принципу, ансамблевої фактури й
    регіональних варіантів.
- title: Сопілка
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A1%D0%BE%D0%BF%D1%96%D0%BB%D0%BA%D0%B0
  notes: >-
    Довідка для флейтового блоку: отвори, дихання, локальні назви та відмінність
    від загального слова "дудка".
- title: Троїсті музики
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A2%D1%80%D0%BE%D1%97%D1%81%D1%82%D1%96_%D0%BC%D1%83%D0%B7%D0%B8%D0%BA%D0%B8
  notes: >-
    Довідка для ансамблевої практики. Урок наголошує на регіональній
    варіантності складу, а не на одному канонічному наборі інструментів.
- title: Трембіта
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A2%D1%80%D0%B5%D0%BC%D0%B1%D1%96%D1%82%D0%B0
  notes: >-
    Довідковий вхід до теми довгої дерев'яної труби. Матеріал не використано
    для туристичного узагальнення Гуцульщини.
- title: Дуда
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%94%D1%83%D0%B4%D0%B0
  notes: >-
    Довідка для міхового принципу, назв `дуда` й `коза`, мелодичної трубки та
    басового гудіння.
- title: Бубон
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%91%D1%83%D0%B1%D0%BE%D0%BD
  notes: >-
    Довідковий вхід до інструментів із мембраною та шумово-ритмічної роботи
    танцювальної фактури.
- title: Taras Kompanichenko
  role: profile
  url: https://greattransformations-ua.org/en/person/taras-kompanichenko/
  notes: >-
    Профіль корисний для реконструкторської роботи зі старосвітською бандурою,
    кобзою, лірою та історичним репертуаром. Він підтримує розрізнення між
    реконструкцією і загальною сценічною стилізацією.
- title: DakhaBrakha - Music
  role: artist-resource
  url: https://www.dakhabrakha.com.ua/en/music/
  notes: >-
    Офіційна дискографія й контекст гурту для сучасного театрального та
    глобально-сценічного використання народно пов'язаних тембрів, перкусії й
    вокальної техніки.
- title: ONUKA
  role: artist-resource
  url: https://www.pohodafestival.sk/en/artist/onuka-2025
  notes: >-
    Фестивальний профіль, який окреслює електронно-фолк-поповий контекст і
    називає живі інструменти на кшталт сопілки, бандури, цимбалів, трембіти й
    бугая. Його використано як приклад сучасної сцени, а не як доказ сільського
    побутування.
