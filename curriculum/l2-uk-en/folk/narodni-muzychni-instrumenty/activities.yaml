version: "1.0"
module: narodni-muzychni-instrumenty
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Не музейний ряд
    instruction: Розрізни інструменти за механізмом звуку й культурною функцією.
    prompt: Чому бандуру, трембіту, цимбали й бубон не можна описувати лише як "народні інструменти"?
    variants:
      - label: Бандура
        text: Струнний щипковий інструмент із басами й приструнками; у культурній пам'яті пов'язаний із голосом, думою, кобзарсько-бандурною традицією і пізнішою сценою.
        source: струнний і співочий контекст
      - label: Трембіта
        text: Довга дерев'яна труба відкритого простору; працює як сигнал, обрядова межа, полонинський або колядницький знак.
        source: духовий сигнал
      - label: Цимбали
        text: Ударно-струнний інструмент, де палички створюють атаку, дзвін і густе тло для ансамблю.
        source: ансамблева фактура
      - label: Бубон
        text: Мембранний ударний інструмент, що тримає танцювальний пульс і тілесну енергію.
        source: ритмічна опора
      - label: Деркач
        text: Тріскачка на межі музики, шуму й сигналу; не основний мелодійний інструмент, а шумовий ідіофон.
        source: шумова межа
    features:
      - матеріал
      - механізм звуку
      - подія або простір
      - соціальна роль виконавця
      - ризик стереотипного опису
    model_answer: >-
      Узагальнення "народні інструменти" приховує різні механізми: струна,
      міх, довга труба, мембрана, палички або тріскачка працюють по-різному.
      Культурна функція теж різна: один інструмент підтримує голос, інший
      подає сигнал, третій тримає танцювальну фактуру або шумову межу.

  - id: act-2
    type: motif-formula
    title: Слухати дієслова тембру
    instruction: Прочитай інструмент через дію звуку, а не тільки через назву.
    passage: >-
      У народному описі скрипка може вести мелодію, цимбали дзвеніти,
      басоля тримати низ, бубон підбивати танець, трембіта подавати знак,
      а ліра гудіти довгим дроновим тлом.
    formulas:
      - text: веде мелодію
        label: провід
        explanation: Скрипка або голос організує послідовність танцю чи співу.
      - text: тримає низ
        label: опора
        explanation: Басоля або підбасок не солює, а заземлює ансамбль.
      - text: дзвенить
        label: атака і відлуння
        explanation: Цимбали створюють блискучу ударно-струнну фактуру.
      - text: подає знак
        label: сигнал
        explanation: Трембіта працює в просторі й події, а не лише в мелодії.
      - text: гуде
        label: дрон
        explanation: Ліра або дуда можуть тримати безперервне звукове тло.
    prompt: Як дієслова допомагають не перетворити інструменти на декоративний список?
    model_answer: >-
      Дієслово називає функцію звуку: вести, тримати, дзвеніти, подавати знак,
      гудіти. Так учень бачить механізм і подію, а не лише запам'ятовує назви.

  - id: act-3
    type: ritual-sequencing
    title: Як слухати подію
    instruction: Упорядкуй аналітичний шлях від речі до культурної функції.
    steps:
      - Назвати інструмент і не зливати його з близькою назвою.
      - Визначити матеріал і механізм звукоутворення.
      - Пояснити, хто грає і яку навичку або статус має виконавець.
      - "Назвати подію: весілля, танець, коляда, полонина, похорон, ярмарок або сцена."
      - Відділити локальне побутування від академічної обробки чи реконструкції.
      - Перевірити, чи джерело не несе імперської, радянської або романтизованої мови.
      - Сформулювати точну тезу без кліше про "споконвічний голос" або "народну масовість".
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    model_answer: >-
      Точний аналіз іде від назви й матеріалу до виконавця, події, джерела й
      рамки. Так інструмент лишається матеріальною річчю, але водночас стає
      частиною соціальної пам'яті.

workbook:
  - type: critical-analysis
    title: Бандура, кобза і ліра не зливаються
    target_text: Усі три інструменти можна назвати старими українськими струнними символами.
    prompt: Сформулюй точнішу тезу про відмінності між бандурою, кобзою і лірою.
    questions:
      - Чому бандура не поглинає всю кобзарську традицію?
      - Що ризиковано у формулі "кобза як попередниця бандури"?
      - Чому ліра має власну технічну логіку?
      - Як статус виконавця змінює опис інструмента?
      - Яка теза краще підходить для деколонізованого уроку?
    model_answers:
      - Бандура має власну старосвітську й сценічну історію, але кобзарство ширше за одну концертну бандурну форму.
      - Вона корисна як орієнтир, але може стерти окремі конструкції, реконструкції й репертуарні контексти кобзи.
      - Ліра є колісним клавішним інструментом із дроновим тлом, а не різновидом бандури чи скрипки.
      - Кобзар, бандурист і лірник несуть різні професійні, репертуарні й соціальні статуси.
      - Ці інструменти споріднені в полі мандрівного співу й пам'яті, але їх треба розрізняти за конструкцією, функцією і виконавською інституцією.

  - type: comparative-study
    title: Троїстість як функціональний трикутник
    instruction: Порівняй регіональні склади без оголошення одного набору єдиним каноном.
    items_to_compare:
      - "Гуцульська формула: скрипка, цимбали, бубон."
      - "Підгірська формула біля Калуша: скрипка, цимбали, підбасок."
      - "Стрийська формула: скрипка, кларнет, підбасок."
      - "Лемківська формула: скрипка, підбасок, решето."
      - "Київська весільна формула: скрипка, кларнет, бубон."
    criteria:
      - хто веде мелодію
      - що тримає низ або ритм
      - який інструмент дає третій шар
      - чи це локальний склад, а не всеукраїнський канон
      - яка подія або регіон підтримує формулу
    prompt: Чому "троїсті музики" не означає завжди однакових трьох інструментів?
    model_answer: >-
      Назва вказує на ансамблевий принцип: провідна мелодія, басово-ритмічна
      опора і третій тембровий шар. Регіони можуть підставляти різні
      інструменти, тому важливо говорити про функції й локальні джерела.

  - type: performance
    title: Сигнал, дрон, пульс
    instruction: Опиши три звучання без романтичного кліше.
    fragment: >-
      Трембіта подає знак у просторі; ліра тримає дронове тло; бубон збирає
      танцювальний пульс. Кожне звучання має подію, матеріал і тілесну техніку.
    prompt: Як голосом або письмовим описом передати різницю між сигналом, дроном і пульсом?
    self_check:
      - Я не називаю трембіту лише "голосом гір".
      - Я пояснюю дрон як функцію, а не як бідність мелодії.
      - Я показую бубон як організатор руху, а не як шумову прикрасу.
      - Я називаю матеріал і подію для кожного звучання.
      - Я відділяю художній образ від технічного опису.
    model_answer: >-
      Сигнал треба описати через відстань і межу, дрон - через безперервну
      опору, пульс - через тіло танцю. Так звук не романтизується, а стає
      зрозумілою культурною дією.

  - type: critical-analysis
    title: Академізація без радянської рамки
    instruction: Відокрем факт інституції від ідеологічної мови джерела.
    target_text: Після 1917 року народні інструменти нарешті отримали правильну масову сцену.
    prompt: Як переписати цю тезу без радянського прогресистського шаблону?
    questions:
      - Які факти інституційної історії можна визнати?
      - Чому слово "нарешті" задає оцінку, а не доказ?
      - Що перенесення на сцену зберігає?
      - Що перенесення на сцену змінює?
      - Яка точна теза можлива?
    model_answers:
      - Капели, оркестри, класи, нотні редакції й філармонійні сцени справді розширили видимість інструментів.
      - Воно припускає, що народна практика була неповною до державної сцени.
      - Вона зберігає репертуар, техніку, професійну школу й публічну присутність.
      - Вона змінює гучність, дисципліну, строї, репертуар і часто ідеологічну мову.
      - Академізація є важливою частиною історії інструментів, але не мірилом їхньої справжності.

  - type: comparative-study
    title: Три сучасні режими відродження
    instruction: Не називай реконструкцію, театральну сцену й електронний проєкт одним словом.
    items_to_compare:
      - Реконструкторська робота зі старосвітською бандурою, кобзою або лірою.
      - Театрально-глобальний гурт із голосовими техніками, перкусією й сценічним образом.
      - Електронно-поповий проєкт із бандурою, сопілкою, цимбалами, трембітою або бугаєм.
      - Філармонійна капела чи оркестр народних інструментів.
      - Локальна весільна або танцювальна капела.
    criteria:
      - тип джерела
      - інструментальна конструкція
      - авторство й аранжування
      - аудиторія
      - чи заявлено це як реконструкцію, обробку або стилізацію
    prompt: Чому питання "справжнє чи несправжнє" занадто грубе для сучасних інструментальних практик?
    model_answer: >-
      Різні практики працюють із різними доказами й цілями. Реконструкція
      відповідає за історичну точність, сцена - за композицію й контакт із
      аудиторією, електронний проєкт - за нову фактуру. Їх треба порівнювати
      за заявленим режимом, а не одним ярликом.
