- title: Слов'янська міфологія
  role: textbook
  notes: 'Plan reference (type: primary). Латинське походження слова «коляда», класифікація
    зимових обрядів, порівняння з обрядами інших народів. Корпусний витяг недоступний
    у цьому білді (corpus_missing); бібліографічне джерело з плану модуля.'
- title: Нарис історії культури України
  role: textbook
  notes: 'Plan reference (type: primary). Тріада господар-господиня-діти, світове
    дерево, провінційно-римські впливи. Корпусний витяг недоступний у цьому білді;
    бібліографічне джерело з плану модуля.'
- title: Історія української літератури
  role: textbook
  notes: 'Plan reference (type: primary). Фольклорні жанри як стилістичні епохи. Корпусний
    витяг недоступний у цьому білді; бібліографічне джерело з плану модуля.'
- title: Праці етнографічно-статистичної експедиції в Західно-Руський край
  role: textbook
  notes: 'Plan reference (type: primary). Етнографічні записи колядок і щедрівок з
    Карпат та Полісся (експедиція П. Чубинського) — джерело вербатим-фрагментів.
    Корпусний витяг недоступний у цьому білді; бібліографічне джерело з плану модуля.'
- title: Колядки — Українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Колядки
  notes: Величальні календарно-обрядові пісні зимового циклу; язичницький субстрат,
    культ новонародженого сонця, переосмислення за християнства. Контекст до Розминки
    й Аналізу.
- title: Щедрик (Леонтович) — Українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Щедрик_(Леонтович)
  notes: Хорова обробка Миколи Леонтовича; гастролі хору Кошиця (Європа 1919, США
    1922); англійський текст Петра Вільговського 1936 — «Carol of the Bells». Грунтує
    high-culture-bridge та myth-box.
- title: Маланка — Українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Маланка
  notes: Новорічний обряд з переодяганням у тварин і фольклорних персонажів, вечір
    напередодні Нового року та дня святого Василя. Контекст до новорічного циклу в
    Аналізі.
