- id: act-1
  type: ritual-sequencing
  title: Послідовність творення світу
  instruction: Розташуй стадії космогонічного міфу за порядком, у якому вони з'являються
    в колядці.
  items:
  - Серед моря виростає зелений явір
  - Немає ні неба, ні землі
  - З'являється лише синє море
  correct_order:
  - 1
  - 2
  - 0
  steps:
  - Немає ні неба, ні землі
  - З'являється лише синє море
  - Серед моря виростає зелений явір
  model_answer: 'Колядка будує світ із порожнечі: спершу немає ні неба, ні землі,
    потім постає первісне море, а вже в морі — світове дерево, явір. Це класична космогонічна
    послідовність: від заперечення до появи першоелемента.'
- id: act-2
  type: motif-formula
  title: Формула «коли не було…»
  prompt: Визнач у фрагменті формулу, на якій тримається космогонічний зачин, і поясни
    її функцію.
  passage: Коли не било з нащада світа, тогди не било неба, ні землі, а то лем било
    синєє море, а серед моря зелений явір.
  text: Коли не било… тогди не било… а то лем било…
  formulas:
  - Коли не було X, тоді не було Y — заперечення первісного стану
  - А то лем було Z — поява першоелемента (море, дерево)
  answers:
  - заперечна формула творення (коли не було… тоді не було…)
  - 'поява першоелементів: синє море і зелений явір'
  model_answer: 'Зачин будується на запереченні: спершу перелічується, чого ще не
    було — неба, землі, а потім стверджується перший елемент світу: море й дерево.
    Це формульний прийом, спільний для багатьох космогоній.'
- id: act-3
  type: motif-formula
  title: 'Тріада: родина як космос'
  prompt: Зістав небесні світила з членами родини за формулою щедрівки.
  passage: Що ж місячик — то господарик, що сонечко — то господинька, яснії зірки
    — то його дітки.
  text: місяць — …, сонце — …, зорі — …
  formulas:
  - 'X (світило) — то Y (член родини): ототожнення космічного й родинного'
  answers:
  - місяць — господар
  - сонце — господиня
  - зорі — діти
  model_answer: 'Щедрівка ототожнює родину з небесними світилами: місяць — господар,
    сонце — господиня, зорі — діти. Дім стає малою моделлю космосу, а родина підноситься
    до космічного порядку через паралелізм.'
- id: act-4
  type: ritual-sequencing
  title: Зимовий обрядовий цикл
  instruction: Розташуй три обряди зимового циклу за порядком у календарі.
  items:
  - Засівання — перший день Нового року
  - Колядки — Різдво
  - Щедрівки — Щедрий вечір
  correct_order:
  - 1
  - 2
  - 0
  steps:
  - Колядки — Різдво
  - Щедрівки — Щедрий вечір
  - Засівання — перший день Нового року
  model_answer: Цикл рухається від Різдва (колядки) через Щедрий вечір (щедрівки)
    до першого дня Нового року (засівання). Обрядова дія прив'язана до календарного
    руху сонця.
- type: variant-comparison
  title: Колядка чи щедрівка?
  prompt: Порівняй колядку і щедрівку за наведеними ознаками й покажи, чим вони різняться
    як обрядові жанри.
  variants:
  - колядка
  - щедрівка
  features:
  - час виконання (Різдво чи Щедрий вечір)
  - цикл (різдвяний чи новорічний)
  - адресат і формула благословення
  - обрядова дія (колядування, щедрування, засівання)
  model_answer: Колядку співають на Різдво, щедрівку — на Щедрий вечір, напередодні
    Нового року. Обидві величають господаря та його родину й містять формулу благословення,
    але щедрівка тісніше пов'язана з новорічним циклом, Маланкою та засіванням.
- type: comparative-study
  title: 'Зимове сонцестояння: глобальна синхронність'
  prompt: Порівняй український зимовий обряд із паралельними традиціями інших народів.
  task: Визнач, що споріднює ці традиції типологічно, і поясни, чому подібність не
    означає запозичення.
  items_to_compare:
  - українські колядки та щедрівки
  - скандинавський Yule, римські Saturnalia, перська Yaldā
  criteria:
  - прив'язка до зимового сонцестояння
  - солярний культ і повернення сонця
  - обрядова дія та формули благословення
  - побажання врожаю й достатку
  source_a: 'Українська колядка будує родину як модель космосу: місяць — господар,
    сонце — господиня, зорі — діти.'
  source_b: Yule, Saturnalia та Yaldā — обряди зимового сонцестояння, що відзначають
    найдовшу ніч і повернення сонячного світла.
  source_reading: Фрагменти колядки та щедрівки з цього модуля.
  model_answer: 'Усі ці традиції припадають на зимове сонцестояння й пов''язані з
    солярним культом. Це типологічна, а не генетична подібність: автохтонний український
    обряд належить до широкого індоєвропейського кола, а не виводиться з жодної сусідньої
    імперської традиції.'
- type: critical-analysis
  title: Хто має рацію про походження «коляди»?
  context: В історіографії змагаються дві позиції щодо походження слова й обряду «коляда».
  target_text: За версією Костомарова, слово «коляда» походить від латинського calendae.
    Сучасні етнолінгвісти натомість наголошують на автохтонному солярному субстраті,
    а Чижевський пропонує читати фольклорні жанри як стилістичні епохи.
  questions:
  - Де тут джерело, а де інтерпретація?
  - Чи латинська етимологія слова заперечує дохристиянський зміст обряду?
  - Як епістемна обережність змінює твою оцінку обох гіпотез?
  model_answers:
  - Латинська етимологія стосується назви, інтерпретація — змісту обряду; це різні
    рівні.
  - 'Ні: запозичена назва могла накластися на давніший автохтонний обряд.'
  - Обережність радить тримати обидві гіпотези як версії, а не як остаточний факт.
  focus_points:
  - розрізнення джерела й інтерпретації
  - етимологія назви проти змісту обряду
  - епістемна обережність дослідника
  question: Чи можна вважати колядки суто християнським або суто язичницьким явищем?
  model_answer: 'Найточніша відповідь — синкретична: християнська оболонка лягла на
    давніший обрядовий і космогонічний пласт. Костомаров пояснює назву, Попович —
    космічну модель, тож позиції радше доповнюють одна одну, ніж виключають.'
  source_reading: Костомаров М., «Слов'янська міфологія»; Попович М., «Нарис історії
    культури України»; Чижевський Д., «Історія української літератури».
- type: motif-formula
  title: Полювання на формули
  prompt: Знайди у трьох фрагментах три різні обрядові формули й поясни функцію кожної.
  passage: 1) Коли не било з нащада світа, тогди не било неба, ні землі, а то лем
    било синєє море, а серед моря зелений явір. 2) Щедрий вечір, добрий вечір! Добрим
    людям на здоров'я! 3) Що ж місячик — то господарик, що сонечко — то господинька,
    яснії зірки — то його дітки.
  text: заперечна формула творення; святкова формула-зачин; формула ототожнення родини
    зі світилами
  formulas:
  - Коли не було… тоді не було… — заперечення первісного хаосу
  - Щедрий вечір, добрий вечір! — святкова формула-зачин і благословення
  - X (світило) — то Y (родич) — космічне ототожнення родини
  answers:
  - космогонічна заперечна формула
  - формула-зачин благословення
  - формула родинно-космічного паралелізму
  model_answer: 'Перша формула творить світ через заперечення, друга відкриває обряд
    і несе благословення, третя підносить родину до рівня небесних світил. Усі три
    — не прикраси, а магічні засоби: повтор закріплює бажаний порядок речей.'
- type: essay-response
  title: 'Колядка сьогодні: живий обряд чи музейний експонат?'
  prompt: Напиши есе про сучасне значення колядування. Чи лишається воно живим інструментом
    ідентичності — зокрема в роки війни 2022–2025?
  min_words: 220
  rubric:
  - чітка теза й аргументація
  - опора на матеріал модуля (космогонія, тріада, обряд)
  - розрізнення джерела й інтерпретації
  - зв'язок із сучасним контекстом без романтизації
  peer_review_guidelines:
  - Чи має есе ясну тезу?
  - Чи спирається воно на фрагменти й поняття модуля?
  - Чи уникає романтизації та спрощень?
  source_reading: 'Матеріал цього модуля: космогонічна колядка, щедрівка-тріада, дискусія
    про виживання обряду.'
  model_answer: 'Сильне есе доводить, що колядка лишається живим обрядом: вона зберігає
    космогонічний і родинний код, а в роки війни колядування набуло нового значення
    — як знак тяглості й спротиву. Слабке есе зводить традицію до музейного експоната
    або романтичного кліше.'
- type: performance
  title: Виконай щедрівку-зачин
  prompt: Прочитай уголос фрагмент щедрівки, зберігаючи ритм і рефрен. Зверни увагу
    на формулу-зачин і паралелізм рядків.
  fragment: Щедрий вечір, добрий вечір! Добрим людям на здоров'я! Стояла світелка
    новозроблена.
  self_check:
  - Чи витримав ти ритм рефрену?
  - Чи відчутна формула-зачин?
  - Чи звучить величальна інтонація?
  self_checklist:
  - рефрен «Щедрий вечір, добрий вечір» вимовлено виразно
  - збережено паралелізм рядків
  - інтонація величальна, а не побутова
  show_record_button: true
  model_answer: Добре виконання тримає ритм рефрену, виділяє формулу-зачин і звучить
    як величання, а не як побутове читання. Паралелізм рядків має бути чутним на слух.
