- id: act-1
  type: ritual-sequencing
  title: Послідовність зимового обходу
  instruction: Упорядкуй дії так, щоб вийшла правдоподібна виконувана ситуація колядки або щедрівки біля дому.
  steps:
    - Гурт підходить до двору або хати.
    - Звучить привітання чи прохання дозволу співати.
    - Виконується колядка або щедрівка з адресою до дому.
    - Текст величає господаря, господиню, дітей або весь двір.
    - Дім відповідає увагою, даром або частуванням.
    - Гурт дякує, віншує і переходить до наступного дому.
  correct_order: [1, 2, 3, 4, 5, 6]
  model_answer: Точна послідовність показує, що пісня є частиною зустрічі. Вона починається з приходу гурту, переходить у спів і величання, а завершується відповіддю дому та рухом далі.

- id: act-2
  type: motif-formula
  title: Приспів, адреса, дім
  instruction: Познач формули, які роблять уривок щедрівкою для виконання біля дому.
  passage: |
    Ой сивая та і зозулечка.
    Приспів:
    Щедрий вечір, добрий вечір,
    Добрим людям на здоров'я!
    Усі сади та і облітала,
    А в одному та і не бувала.
  formulas:
    - text: Щедрий вечір, добрий вечір
      label: приспів
      explanation: Формула повертає кожен рядок до святкового часу і гуртового голосу.
    - text: Добрим людям на здоров'я
      label: адресат
      explanation: Рядок показує, що побажання спрямоване до людей дому.
    - text: Усі сади та і облітала
      label: рух до дому
      explanation: Образ птаха переводить спів до конкретного саду і родинного простору.
    - text: три тереми
      label: образний порядок
      explanation: Образ готує родинну модель сонця, місяця і зірок.
  prompt: Поясни, чому цей уривок не можна читати як звичайний опис природи.
  model_answer: Уривок звернений до дому й має приспів, адресата та величальні образи. Він не просто описує птаха чи сад, а створює святкову сцену взаємності між гуртом і родиною.

- id: act-3
  type: variant-comparison
  title: Господар, господиня, дівчина
  instruction: Порівняй три адресні моделі зимової пісні.
  variants:
    - label: Господар
      text: |
        "Вийди, вийди, господарю,
        Подивися на кошару..."
      region: публічний текст Ukrlib
      source: shchedrivka-shchedryk-lastivochka
    - label: Господиня
      text: |
        У світлиці майстри готують дар
        для господині Анни.
      region: публічний текст Ukrlib
      source: koliadka-oi-nad-dunaiem-nad-berezhenkom
    - label: Дівчина
      text: |
        "Скажи мені, зозуленько,
        Чи довго буду в батька?"
      region: публічний текст Ukrlib
      source: shchedrivka-pryletila-zozulenka
  features:
    - Хто є адресатом?
    - Який простір відкриває уривок?
    - Який тип побажання або напруги створюється?
    - Чому всі три тексти не треба зводити до однієї схеми?
  prompt: Напиши 100-130 слів про те, як адресат змінює поетику зимової пісні.
  model_answer: У "Щедрику" адресат - господар, тому текст веде його до кошари й говорить про приплід та достаток. У колядці для Анни адресат - господиня, і її величання подано через світлицю, ремісників і дари. У "Прилетіла зозуленька" адресатом стає Марусенька, а поетика переходить до короткого діалогу про час у батьківському домі. Усі три тексти зимові, але адресат змінює простір і тон.

- id: act-4
  type: performance
  title: Читання як виконання
  instruction: Підготуй коротке усне читання одного уривка, не додаючи жодних слів поза джерелом.
  fragment: |
    Щедрик, щедрик, щедрівочка,
    Прилетіла ластівочка,
    Стала собі щебетати,
    Господаря викликати.
  prompt: Перед читанням назви жанр, публічне джерело, хто говорить і кому. Після читання поясни, який повтор або звертання змінив твій голос.
  self_check:
    - "Чи названо жанр: щедрівка?"
    - "Чи названо публічне джерело: Ukrlib?"
    - Чи пояснено, що ластівка викликає господаря?
    - Чи не додано рядків, яких немає в уривку?
    - Чи почуто повтор початкової формули?
  show_record_button: true
  model_answer: Добре виконання починається з джерела і ситуації. Учень називає щедрівку, Ukrlib, ластівку як голос у тексті та господаря як адресата. Повтор "Щедрик, щедрик" має звучати як формула входу, а не як випадковий вступ.
