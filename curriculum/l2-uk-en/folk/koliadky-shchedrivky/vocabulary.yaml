- lemma: колядка
  translation: Christmas-cycle ritual carol that glorifies the host and family
  pos: noun
  usage: Колядка величає господаря та його родину на Різдво.
- lemma: щедрівка
  translation: New Year-cycle ritual song linked to Malanka and the feast of Vasyl
  pos: noun
  usage: Щедрівка належить новорічному циклу і часто несе образ майбутнього врожаю.
- lemma: космогонія
  translation: cosmogony; myth or account of the origin of the universe
  pos: noun
  usage: Космогонія — це оповідь про творення світу з первісного хаосу.
- lemma: світове дерево
  translation: world tree; cosmic axis joining the three levels of the universe (axis
    mundi)
  pos: noun
  usage: Зелений явір серед моря — це світове дерево, вісь усесвіту.
- lemma: засівання
  translation: New Year rite of sprinkling grain on the floor for prosperity and harvest
  pos: noun
  usage: Засівання виконують хлопці вранці на Новий рік.
- lemma: паралелізм
  translation: parallelism; repetition of similar syntactic constructions
  pos: noun
  usage: Паралелізм зв'язує бажане з дійсним у тексті колядки.
- lemma: обрядовий
  translation: ritual; related to a traditional rite
  pos: adj
  usage: Колядка — частина обрядового сценарію зимового циклу.
- lemma: автохтонний
  translation: autochthonous; of local, native origin (opposite of borrowed)
  pos: adj
  usage: Етнолінгвісти вказують на автохтонне коріння обряду.
- lemma: стилізація
  translation: stylization; conscious imitation of another era's or genre's style
  pos: noun
  usage: Частина архаїки може бути пізньою стилізацією романтиків.
- lemma: солярний
  translation: solar; connected with the sun and the solar cult
  pos: adj
  usage: Колядки належать до солярного циклу зимового сонцестояння.
- lemma: космогонічний
  translation: cosmogonic; relating to the creation of the world
  pos: adj
  usage: Космогонічний пласт колядки — найдавніший.
- lemma: язичницький
  translation: pagan; pre-Christian
  pos: adj
  usage: Під різдвяною оболонкою лежить язичницький пласт.
- lemma: дохристиянський
  translation: pre-Christian
  pos: adj
  usage: Щедрик оспівує дохристиянський аграрний цикл.
- lemma: християнізація
  translation: Christianization
  pos: noun
  usage: Колядки пережили християнізацію, не втративши давнього змісту.
- lemma: явір
  translation: 'sycamore maple (here: the world-tree image)'
  pos: noun
  usage: Серед моря стоїть зелений явір.
- lemma: первісний
  translation: primordial; original, primeval
  pos: adj
  usage: Світ виникає з первісного хаосу води.
- lemma: рефрен
  translation: refrain; a repeated line returning after each verse
  pos: noun
  usage: Рефрен «Щедрий вечір» повторюється після кожного рядка.
- lemma: зачин
  translation: formulaic opening of a folk text
  pos: noun
  usage: Сталий зачин виводить слухача в час початку світу.
- lemma: тріада
  translation: 'triad; here: host–hostess–children as a cosmic model'
  pos: noun
  usage: Тріада місяць-сонце-зорі підносить родину до рівня космосу.
- lemma: реконструкція
  translation: reconstruction (e.g. of an archaic layer by later scholars)
  pos: noun
  usage: Дехто бачить тут пізню реконструкцію романтиків.
- lemma: збіжжя
  translation: grain, cereal crops
  pos: noun
  usage: Образ кози поєднано з образом збіжжя.
- lemma: жито
  translation: rye (often standing for crops/harvest)
  pos: noun
  usage: Де коза ходить, там має вродити жито.
- lemma: величати
  translation: to glorify, extol (a host in song)
  pos: verb
  usage: Колядники величають господаря та родину.
- lemma: величання
  translation: glorification; the praising of the host in ritual song
  pos: noun
  usage: Величання дому — центральна дія колядки.
- lemma: господиня
  translation: hostess; mistress of the house
  pos: noun
  usage: У тріаді господиня співвіднесена з сонцем.
- lemma: водіння
  translation: the leading/parading (e.g. of the goat in winter rites)
  pos: noun
  usage: Водіння кози — частина новорічної обрядовості.
- lemma: ушанування
  translation: veneration, honouring
  pos: noun
  usage: Обряди Коляди пов'язані з ушануванням сонця й предків.
- lemma: переосмислення
  translation: rethinking, reinterpretation
  pos: noun
  usage: Колядки відображають переосмислення язичницького світогляду.
- lemma: привласнення
  translation: 'appropriation (here: cultural appropriation)'
  pos: noun
  usage: Англомовна переробка «Щедрика» ставить питання про культурне привласнення.
- lemma: спротив
  translation: resistance
  pos: noun
  usage: Колядування було формою тихого спротиву за радянського атеїзму.
- lemma: побутування
  translation: existence in everyday use; how a form lives among people
  pos: noun
  usage: Побутування колядки залежить від її обрядової функції.
- lemma: світило
  translation: celestial body, luminary (sun, moon, star)
  pos: noun
  usage: Родину співвіднесено з небесними світилами.
- lemma: небесний
  translation: celestial, heavenly
  pos: adj
  usage: Зорі — це небесні діти у тріаді щедрівки.
- lemma: ідентичність
  translation: identity (cultural)
  pos: noun
  usage: Колядка — живий інструмент культурної ідентичності.
- lemma: космічний
  translation: cosmic
  pos: adj
  usage: Дім підносять до космічного порядку.
