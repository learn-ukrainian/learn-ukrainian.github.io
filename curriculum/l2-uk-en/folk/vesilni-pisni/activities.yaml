- id: act-1
  type: quiz
  title: Чия це позиція?
  instruction: Обери найточніше читання кожної тези.
  items:
    - question: Що найкраще описує сватання у цьому модулі?
      options:
        - Приватну романтичну розмову двох людей.
        - Публічну дипломатичну сцену між родами і домами.
        - Суто церковний акт без родової участі.
      correct: 1
      explanation: Сватання відкриває переговори між сторонами і робить майбутній шлюб видимим для родини.
    - question: Чому мова полювання не треба читати буквально?
      options:
        - Бо вона не має жодного значення для обряду.
        - Бо вона є символічною мовою напруження і переходу.
        - Бо всі весільні пісні є тільки жартами.
      correct: 1
      explanation: Образ полювання показує напруження між сторонами, але не доводить буквального сценарію захоплення.
    - question: Яка теза найкраще тримає джерельну обережність?
      options:
        - Один рядок дозволяє реконструювати повний весільний обряд.
        - Короткий фрагмент дає сильний доказ, але лише в межах названої дії.
        - Пізній запис автоматично доводить найдавнішу форму обряду.
      correct: 1
      explanation: Модуль вимагає називати межу доказу для кожного фрагмента.
    - question: Чому вінчання не треба відкидати як зовнішню деталь?
      options:
        - Бо християнська рамка входить у весільний порядок поруч із родовими діями.
        - Бо весільні пісні не мають жодного зв'язку з родом.
        - Бо церковний акт замінює всі пісні й предмети.
      correct: 0
      explanation: У джерельній рамці церковне благословення і родове прийняття можуть стояти поруч.
    - question: Що означає деколонізоване читання цієї теми?
      options:
        - Описувати українське весілля через конкретні українські ролі, слова і сцени.
        - Замінити джерельний аналіз гучними заявами про унікальність.
        - Розчинити матеріал у безіменній загальнослов'янській схемі.
      correct: 0
      explanation: Сильна відповідь повертається до української обрядової дії без імперських або декоративних рамок.

- id: act-2
  type: reading
  title: Рід як адресат весілля
  instruction: Прочитай уривок як обрядову дію, а не як загальну пісню про родину.
  source: Публічний фольклорний фрагмент із весільної пісенності.
  passage: |
    Сходися, родоньку, сходися в купоньку,
    Як близький, так далекий,
    Убогий і багатий, подарунки відбирати.
  questions:
    - Хто є адресатом цього уривка?
    - Які соціальні межі названо в рядках?
    - Чому цей фрагмент не доводить рівність усіх учасників, але доводить широту родової сцени?
    - Який обережний висновок можна зробити про весілля як громадську подію?

- id: act-3
  type: motif-formula
  title: Коровай між дією і символом
  instruction: Розбери короткі коровайні формули за дією, предметом і межею доказу.
  passage: |
    Тіточка-ненька по улиці ходить...
    та й ідіте до мене та короваю бгати, сиром посипати.

    Та рясненький, усьому роду веселенький.
  formulas:
    - text: короваю бгати
      label: дія біля хліба
      explanation: Пісня кличе до конкретної роботи з короваєм, а не лише описує предмет.
    - text: сиром посипати
      label: обрядова дія оздоби
      explanation: Дія робить хліб частиною весільної сцени.
    - text: усьому роду веселенький
      label: родовий адресат
      explanation: Коровай пов'язаний із веселістю і достатком роду.
  prompt: Який висновок із цих формул був би точним, а який надто широким?
  model_answer: >-
    Точний висновок: коровайна пісня синхронна з дією і пов'язує хліб із родом
    та достатком. Надто широкий висновок: ці короткі рядки самі доводять одну
    повну універсальну теорію короваю для всіх українських весіль.

- id: act-4
  type: comparative-study
  title: Два образи втрати стану
  instruction: Порівняй дві поетичні формули без розширення їх поза джерельну межу.
  items_to_compare:
    - Молода потопає в синьому морі і кличе батька врятувати її.
    - Дівчина після вінця ламає верхівку берези.
  criteria:
    - Названо спільну тему переходу від попереднього стану.
    - Пояснено різницю між водним і рослинним образом.
    - Уникнуто прямого біографічного або міфологічного перебільшення.
  prompt: >-
    Напиши 100-140 слів: що обидва образи дають для розуміння весільного
    переходу молодої, і де треба зупинити інтерпретацію?
  model_answer: >-
    Обидва образи показують весілля як втрату попереднього стану, а не тільки
    як радісну подію. Море робить перехід небезпечним і межовим: молода ніби
    опиняється в просторі, з якого просить порятунку. Береза переносить втрату
    на рослинний образ: зламана верхівка показує зміну цілості. Відмінність у
    тому, що водний образ підкреслює небезпеку і занурення, а рослинний - втрату
    дівочої повноти. Але жоден фрагмент не треба читати як прямий опис долі
    конкретної жінки або як повну міфологію дерева.

- id: act-5
  type: critical-analysis
  title: Комора не декорація
  instruction: Розбери спрощену тезу і заміни її точнішим висновком.
  target_text: "Сцена з коморою - це лише драматичний весільний жарт."
  prompt: >-
    Чому така теза слабка? Поясни, як комора, бояри і прохання молодої працюють
    як межова сцена, але не роби з одного фрагмента універсального доказу
    насильства в кожному весіллі.
  questions:
    - Яка межа або перешкода з'являється в сцені?
    - Чий голос чути в проханні сховати молоду?
    - Що було б перебільшенням?
  model_answers:
    - >-
      Слабкість тези в тому, що вона зменшує напруження сцени до жарту. Комора
      є межовим простором: молода просить сховати її, а відповідь показує, що
      перехід уже оточений ритуальними виконавцями. Водночас один фрагмент не
      доводить однакового реального насильства в кожному весіллі.
  evaluation_criteria:
    - Є увага до голосу молодої.
    - Є пояснення просторової межі.
    - Є чітка межа доказу.

- id: act-6
  type: essay-response
  title: Весільна пісня як дія
  instruction: Напиши коротке доказове есе українською.
  prompt: >-
    Обери один мотив із модуля: сватання, коровай, гільце, вінок, плач молодої,
    комора, весільний поїзд або прийняття до нового дому. Поясни, як пісня не
    просто описує, а підтримує обрядову дію. Обов'язково назви голос, предмет
    або простір, а також межу доказу.
  min_words: 160
  rubric:
    - criteria: Мотив
      description: Названо конкретний мотив і його місце у весільному циклі.
      points: 2
    - criteria: Дія пісні
      description: Пояснено, як пісня підтримує обрядову дію, а не лише називає тему.
      points: 3
    - criteria: Рамка
      description: Збережено українську родинно-громадську і християнську рамку там, де вона доречна.
      points: 2
    - criteria: Межа доказу
      description: Уникнуто декоративної етнографії та бездоказових узагальнень.
      points: 3
  model_answer: >-
    Сильна відповідь може взяти коровай. У ній треба показати, що коровайна
    пісня не тільки повідомляє про хліб, а кличе до конкретної дії біля нього:
    коровай бгають, прикрашають, величають, пов'язують із родом. Голос у такій
    сцені належить не одному "авторові", а весільному гуртові, зокрема
    коровайницям. Предметом є хліб, але його значення ширше за їжу: він
    пов'язаний із достатком і спільністю роду. Межа доказу така: короткі
    фрагменти дозволяють говорити про рід, дію і побажання достатку, але не
    дозволяють будувати одну універсальну теорію для всіх українських весіль.
