- lemma: 胁械褋褨谢褜薪褨 锌褨褋薪褨
  ipa: /w蓻藞s什il什n什i 藞p什is什n什i/
  translation: wedding ritual songs
  pos: phrase
  usage: 袙械褋褨谢褜薪褨 锌褨褋薪褨 褋褍锌褉芯胁芯写卸褍褞褌褜 泻芯薪泻褉械褌薪褨 械褌邪锌懈 芯斜褉褟写褍.

- lemma: 褋胁邪褌邪薪薪褟
  ipa: /s蕥a藞t蓱n什藧蓱/
  translation: matchmaking rite
  pos: noun
  usage: 小胁邪褌邪薪薪褟 胁褨写泻褉懈胁邪褦 锌械褉械谐芯胁芯褉懈 屑褨卸 褉芯写邪屑懈.

- lemma: 褋褌邪褉芯褋褌邪
  ipa: /st蓱藞r蓴st蓱/
  translation: wedding emissary or elder
  pos: noun
  usage: 小褌邪褉芯褋褌邪 谐芯胁芯褉懈褌褜 胁褨写 褨屑械薪褨 褋褌芯褉芯薪懈 屑芯谢芯写芯谐芯.

- lemma: 蟹邪褉褍褔懈薪懈
  ipa: /z蓱藞rut蕛瑟n瑟/
  translation: betrothal
  pos: noun
  usage: 袟邪褉褍褔懈薪懈 锌褨写褌胁械褉写卸褍褞褌褜 蟹谐芯写褍 褉芯写褨胁.

- lemma: 胁褨薪褔邪薪薪褟
  ipa: /蕥什in藞t蕛蓱n什藧蓱/
  translation: church wedding rite
  pos: noun
  usage: 袙褨薪褔邪薪薪褟 胁胁芯写懈褌褜 褕谢褞斜 褍 褏褉懈褋褌懈褟薪褋褜泻褍 褉邪屑泻褍.

- lemma: 泻芯褉芯胁邪泄
  ipa: /k蓴r蓴藞w蓱j/
  translation: ceremonial wedding bread
  pos: noun
  usage: 袣芯褉芯胁邪泄 锌芯胁'褟蟹褍褦 胁械褋褨谢褜薪懈泄 褏谢褨斜 褨蟹 褉芯写芯屑 褨 写芯褋褌邪褌泻芯屑.

- lemma: 泻芯褉芯胁邪泄薪懈褑褟
  ipa: /k蓴r蓴藞w蓱jn瑟ts什蓱/
  translation: woman preparing the wedding bread
  pos: noun
  usage: 袣芯褉芯胁邪泄薪懈褑褟 斜械褉械 褍褔邪褋褌褜 褍 泻芯褉芯胁邪泄薪褨泄 写褨褩 泄 褋锌褨胁褨.

- lemma: 谐褨谢褜褑械
  ipa: /藞搔什il什ts蓻/
  translation: decorated wedding branch
  pos: noun
  usage: 袚褨谢褜褑械 褉芯斜懈褌褜 褉芯褋谢懈薪薪懈泄 蟹薪邪泻 薪芯胁芯褩 褉芯写懈薪懈 胁懈写懈屑懈屑.

- lemma: 胁懈谢褜褑械
  ipa: /藞w瑟l什ts蓻/
  translation: variant name for decorated wedding branch
  pos: noun
  usage: 袙懈谢褜褑械 屑芯卸械 薪邪蟹懈胁邪褌懈 锌褉懈泻褉邪褕械薪械 胁械褋褨谢褜薪械 写械褉械胁褑械.

- lemma: 斜邪褉胁褨薪芯泻
  ipa: /b蓱r藞蕥什in蓴k/
  translation: periwinkle
  pos: noun
  usage: 袘邪褉胁褨薪芯泻 褔邪褋褌芯 锌芯胁'褟蟹邪薪懈泄 褨蟹 胁械褋褨谢褜薪懈屑 胁褨薪泻芯屑.

- lemma: 胁褨薪芯泻
  ipa: /蕥什i藞n蓴k/
  translation: wreath or crown
  pos: noun
  usage: 袙褨薪芯泻 锌芯蟹薪邪褔邪褦 褋褌邪薪 屑芯谢芯写芯褩 褍 胁械褋褨谢褜薪褨泄 写褉邪屑褨.

- lemma: 锌芯泻褉懈胁邪薪薪褟
  ipa: /p蓴kr瑟藞蕥蓱n什藧蓱/
  translation: ritual covering of the bride
  pos: noun
  usage: 袩芯泻褉懈胁邪薪薪褟 薪邪蟹懈胁邪褦 蟹屑褨薪褍 卸褨薪芯褔芯谐芯 褋褌邪褌褍褋褍 锌褨褋谢褟 褕谢褞斜褍.

- lemma: 泻芯屑芯褉邪
  ipa: /k蓴藞m蓴r蓱/
  translation: storeroom; liminal wedding space
  pos: noun
  usage: 袣芯屑芯褉邪 胁 锌褨褋薪褨 褋褌邪褦 屑褨褋褑械屑 薪械屑芯卸谢懈胁芯谐芯 褋褏芯胁褍 屑芯谢芯写芯褩.

- lemma: 锌械褉械泄屑邪
  ipa: /p蓻r蓻j藞m蓱/
  translation: ritual blocking of the wedding procession
  pos: noun
  usage: 袩械褉械泄屑邪 褉芯斜懈褌褜 写芯褉芯谐褍 胁械褋褨谢褜薪芯谐芯 锌芯褩蟹写褍 锌褍斜谢褨褔薪芯褞 锌械褉械褕泻芯写芯褞.

- lemma: 锌械褉械蟹胁邪
  ipa: /p蓻r蓻藞z蕥蓱/
  translation: post-wedding visiting and comic continuation
  pos: noun
  usage: 袩械褉械蟹胁邪 写芯写邪褦 褋屑褨褏芯胁械 蟹邪胁械褉褕械薪薪褟 胁械褋褨谢褜薪芯屑褍 褑懈泻谢褍.

- lemma: 斜芯褟褉懈
  ipa: /b蓴藞j蓱r瑟/
  translation: ritual attendants on the groom's side
  pos: noun
  usage: 袘芯褟褉懈 写褨褞褌褜 褍 屑芯胁褨 胁械褋褨谢褜薪芯谐芯 锌芯褩蟹写褍 泄 褋懈屑胁芯谢褨褔薪芯谐芯 蟹写芯斜褍胁邪薪薪褟.

- lemma: 写褉褍卸泻懈
  ipa: /藞dru蕭k瑟/
  translation: bride's attendants
  pos: noun
  usage: 袛褉褍卸泻懈 褋褍锌褉芯胁芯写卸褍褞褌褜 屑芯谢芯写褍 褨 锌褨写褌褉懈屑褍褞褌褜 卸褨薪芯褔懈泄 谐芯谢芯褋 芯斜褉褟写褍.

- lemma: 褋胁邪褏邪
  ipa: /藞s蕥蓱x蓱/
  translation: female matchmaker or wedding role
  pos: noun
  usage: 小胁邪褏邪 锌褉芯屑芯胁谢褟褦 泄 写褨褦 胁褨写 褨屑械薪褨 胁械褋褨谢褜薪芯褩 褋褌芯褉芯薪懈.

- lemma: 屑芯谢芯写邪
  ipa: /m蓴l蓴藞d蓱/
  translation: bride
  pos: noun
  usage: 袦芯谢芯写邪 锌械褉械褏芯写懈褌褜 胁褨写 斜邪褌褜泻褨胁褋褜泻芯谐芯 写芯屑褍 写芯 薪芯胁芯谐芯 褉芯写芯胁芯谐芯 锌芯褉褟写泻褍.

- lemma: 褉褨写
  ipa: /r什id/
  translation: kin group; lineage
  pos: noun
  usage: 袪褨写 褦 泻芯谢械泻褌懈胁薪懈屑 邪写褉械褋邪褌芯屑 胁械褋褨谢褜薪芯褩 锌芯写褨褩.

- lemma: 芯斜褉褟写 锌械褉械褏芯写褍
  ipa: /蓴藞br什蓱d p蓻r蓻藞x蓴du/
  translation: rite of passage
  pos: phrase
  usage: 袨斜褉褟写 锌械褉械褏芯写褍 蟹屑褨薪褞褦 褋褌邪褌褍褋 谢褞写懈薪懈.

- lemma: 谢褨屑褨薪邪谢褜薪懈泄
  ipa: /l什imi藞n蓱l什n瑟j/
  translation: liminal
  pos: adj
  usage: 袥褨屑褨薪邪谢褜薪懈泄 褋褌邪薪 芯蟹薪邪褔邪褦 锌械褉械斜褍胁邪薪薪褟 屑褨卸 褋褌邪褉懈屑 褨 薪芯胁懈屑 褋褌邪褌褍褋芯屑.

- lemma: 褋芯褉芯屑褨褑褜泻懈泄
  ipa: /s蓴r蓴藞m什its什k瑟j/
  translation: bawdy; ritually obscene
  pos: adj
  usage: 小芯褉芯屑褨褑褜泻懈泄 褉械谐褨褋褌褉 屑芯卸械 锌褉邪褑褞胁邪褌懈 褟泻 褔邪褋褌懈薪邪 胁械褋褨谢褜薪芯褩 褉芯蟹褉褟写泻懈.

- lemma: 胁懈泻褍锌
  ipa: /藞蕥瑟kup/
  translation: ritual ransom or payment
  pos: noun
  usage: 袙懈泻褍锌 褍 胁械褋褨谢褜薪褨泄 褋褑械薪褨 锌芯蟹薪邪褔邪褦 锌械褉械谐芯胁芯褉薪褍 锌械褉械褕泻芯写褍.

- lemma: 锌褉懈泄屑邪薪薪褟
  ipa: /pr瑟j藞m蓱n什藧蓱/
  translation: reception into the new household
  pos: noun
  usage: 袩褉懈泄屑邪薪薪褟 屑芯谢芯写芯褩 蟹邪胁械褉褕褍褦 褉褍褏 写芯 薪芯胁芯谐芯 写芯屑褍.

- lemma: 锌芯褋邪写
  ipa: /p蓴藞s蓱d/
  translation: ritual seating
  pos: noun
  usage: 袩芯褋邪写 锌芯胁'褟蟹褍褦 褋邪写卸械薪薪褟 屑芯谢芯写懈褏 褨蟹 斜谢邪谐芯褋谢芯胁械薪薪褟屑 褨 锌芯褉褟写泻芯屑.

- lemma: 锌褨褔
  ipa: /p什it蕛/
  translation: stove; hearth
  pos: noun
  usage: 袩褨褔 屑芯卸械 锌芯蟹薪邪褔邪褌懈 写芯屑邪褕薪褨泄 褑械薪褌褉 薪芯胁芯谐芯 褉芯写褍.

- lemma: 锌芯褉褨谐
  ipa: /p蓴藞r什i搔/
  translation: threshold
  pos: noun
  usage: 袩芯褉褨谐 锌芯泻邪蟹褍褦 锌褉芯褋褌芯褉芯胁褍 屑械卸褍 屑褨卸 写芯屑邪屑懈.
