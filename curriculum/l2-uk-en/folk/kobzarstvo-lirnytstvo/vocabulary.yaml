- lemma: кобзар
  translation: kobzar; itinerant singer with kobza or bandura
  pos: noun
  usage: Кобзар поєднує репертуар, інструмент і публічний моральний голос.

- lemma: лірник
  translation: lirnyk; hurdy-gurdy singer
  pos: noun
  usage: Лірник часто тримає псальмовий і духовний співовий регістр.

- lemma: бандура
  translation: bandura
  pos: noun
  usage: Бандура не є просто символом; вона визначає сам спосіб звучання традиції.

- lemma: ліра
  translation: hurdy-gurdy; lira
  pos: noun
  usage: Ліра створює інший виконавський простір, ніж кобза або бандура.

- lemma: речитатив
  translation: recitative delivery
  pos: noun
  usage: Речитатив робить думу довгою моральною оповіддю, а не просто куплетною піснею.

- lemma: псальма
  translation: spiritual psalm-like song
  pos: noun
  usage: Псальма показує, що кобзарський репертуар був не тільки героїчним.

- lemma: кант
  translation: paraliturgical chant
  pos: noun
  usage: Кант поєднує духовний і частково світський співовий простір.

- lemma: братство
  translation: guild; brotherhood
  pos: noun
  usage: Братство означає внутрішню організацію, учнівство і межу між своїми та чужими.

- lemma: учнівство
  translation: apprenticeship
  pos: noun
  usage: Тривале учнівство показує, що кобзарство було професійною традицією.

- lemma: таємна мова
  translation: secret language; in-group argot
  pos: noun phrase
  usage: Таємна мова служила захистом спільноти і знаком внутрішньої межі.

- lemma: поводир
  translation: guide
  pos: noun
  usage: Поводир нагадує, що історія кобзарства пов'язана з реальною людською залежністю і дорогою.

- lemma: реконструкція
  translation: reconstruction
  pos: noun
  usage: Сучасна реконструкція може рятувати пам'ять, але не дорівнює безперервній старосвітській передачі.
