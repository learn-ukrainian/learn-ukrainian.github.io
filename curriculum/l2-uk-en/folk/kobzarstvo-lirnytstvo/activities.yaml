inline:
  - id: act-1
    type: variant-comparison
    title: Дві крайнощі і третя позиція
    instruction: Порівняй дві спрощені рамки і сформулюй точніше проміжне читання.
    variants:
      - label: Романтична рамка
        text: >-
          Кобзар є майже чистим голосом народу, тому матеріальна вразливість,
          учнівство і братства не мають великого значення.
        source: Романтичний образ кобзаря у поезії та культурній пам'яті
      - label: Соціально-редукційна рамка
        text: >-
          Кобзарство було лише професійним жебрацтвом сліпих, а вся культурна
          вага з'явилася тільки в пізнішій інтелігентській міфології.
        source: Спрощене соціологічне тлумачення
    features:
      - що бачить кожна рамка
      - що кожна рамка втрачає
      - як зібрати точнішу тезу
    prompt: >-
      Чому обидві крайнощі неповні і як сказати про кобзарство точніше, не
      втрачаючи ні інституції, ні символічної сили?
    model_answer: >-
      Романтична рамка правильно вловлює високий культурний статус кобзаря, але
      легко стирає ремесло, учнівство і дорогу. Соціально-редукційна рамка
      правильно нагадує про вразливість і матеріальну залежність, але не
      пояснює складність думового, псальмового і морального репертуару.
      Точніше сказати: кобзарство було професійною українською інституцією, у
      якій соціальна вразливість поєднувалася з сильною функцією культурної
      пам'яті.

  - id: act-2
    type: motif-formula
    title: Як Перебендя входить у пам'ять
    instruction: Розбери короткий уривок так, щоб було видно публічну роль співця.
    passage: |-
      Перебендя старий, сліпий,
      Хто його не знає?
      Він усюди вештається
      Та на кобзі грає.
      А хто грає, того знають
      І дякують люде.
    formulas:
      - text: Хто його не знає?
        label: упізнаваність
        explanation: Фраза відразу показує, що співець уже існує в спільній пам'яті громади.
      - text: усюди вештається
        label: дорога
        explanation: Образ мандрівності прив'язує кобзаря до рухомого публічного простору.
      - text: того знають
        label: публічний авторитет
        explanation: Визнання пов'язане не з посадою, а з самим фактом виконання.
      - text: дякують люде
        label: соціальна функція
        explanation: Подяка виводить спів за межі розваги і натякає на моральну користь.
    prompt: >-
      Поясни, як ця коротка формула створює образ кобзаря як людини, яку громада
      слухає не випадково.
    model_answer: >-
      Уривок не просто малює старого сліпого мандрівника. Він відразу пов'язує
      кобзаря з упізнаваністю, дорогою, грою і вдячністю слухачів. Так постає не
      приватний музикант, а публічна постать, яку знають і чий голос має вагу
      для спільноти.

workbook:
  - id: act-3
    type: performance
    title: Стриманий речитатив
    instruction: >-
      Прочитай короткий фрагмент так, щоб було чути не естрадний номер, а
      пам'ять і вагу слова.
    prompt: Поясни після читання, який саме спокійний тон робить уривок переконливим.
    fragment: |-
      Перебендя старий, сліпий,
      Хто його не знає?
      Він усюди вештається
      Та на кобзі грає.
    self_check:
      - Чи не перетворився уривок на патетичну декламацію?
      - Чи чути спокійне, не форсоване публічне звернення?
      - Чи зрозуміло після читання, чому образ кобзаря є впізнаваним?
    show_record_button: true
    model_answer: >-
      Добре виконання не тисне на кожне слово героїчним тоном. Воно тримає
      рівний подих і дає почути, що сила уривка виникає з простоти: старість,
      сліпота, дорога, гра і подяка громади з'єднані в одному спокійному жесті.

  - id: act-4
    type: comparative-study
    title: Подібність функції, відмінність історії
    instruction: >-
      Порівняй українське кобзарство з іншою традицією співців так, щоб не
      втратити українську форму.
    items_to_compare:
      - Український кобзар або лірник як носій дум, псальм і публічної моральної пам'яті.
      - Інша традиція професійного співця усної пам'яті з позаукраїнського світу.
    criteria:
      - що саме подібне
      - що історично різне
      - де проходить межа порівняння
    prompt: >-
      Як порівнювати традиції співців так, щоб порівняння допомагало мислити, а
      не розчиняло український матеріал у загальній екзотиці?
    model_answer: >-
      Подібність полягає в тому, що різні культури можуть мати професійних
      співців пам'яті, які тримають довгі сюжети, моральний коментар і публічну
      присутність. Але кобзарство не зводиться до цієї абстрактної функції.
      Воно історично пов'язане з українськими думами, псальмами, братствами,
      мандрівністю і конкретним досвідом імперського та радянського тиску.
      Порівняння корисне доти, доки воно висвітлює функцію, а не стирає місцеву
      історію.

  - id: act-5
    type: critical-analysis
    title: Перепиши драматичну, але неточну тезу
    instruction: Оціни твердження, у якому сильна емоція підміняє історичну точність.
    target_text: >-
      Кобзарів знищили за один день на таємному з'їзді, і на цьому історія
      кобзарства повністю скінчилася.
    prompt: >-
      Чому ця теза слабка і як її переписати джерельно обережно, не
      применшуючи історичної травми?
    questions:
      - Яку реальну історичну травму помічає теза?
      - Де саме вона перебільшує?
      - Як назвати радянський удар по традиції без удаваної абсолютної точності?
    model_answers:
      - >-
        Теза правильно помічає, що 1930-ті роки стали катастрофою для
        кобзарсько-лірницької традиції.
      - >-
        Вона перебільшує, коли робить один недоведений сценарій єдиним
        поясненням усього зламу.
      - >-
        Обережніше сказати: радянські репресії, нищення
        релігійно-громадського середовища і розрив учнівства зламали живу
        передачу традиції; окремі драматичні епізоди потребують точного
        джерельного розрізнення.
    evaluation_criteria:
      - Є розрізнення між реальною травмою і недоведеною деталлю.
      - Названо ширший механізм руйнування традиції.
      - Переписана теза зберігає серйозність без удаваної повноти.

  - id: act-6
    type: essay-response
    title: Чому влада боялася кобзаря?
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 220-280 словах поясни, чому кобзарство було для тоталітарної влади не
      просто музикою, а небезпечним незалежним голосом. Обов'язково назви один
      елемент інституції, один тип репертуару і одну межу історичного висновку.
    min_words: 220
    evaluation_criteria:
      - Названо кобзарство або лірництво як інституцію, а не лише образ.
      - "Є конкретний елемент традиції: інструмент, учнівство, братство, маршрут або таємна мова."
      - "Є конкретний репертуарний приклад: дума, псальма, кант або сатирична пісня."
      - Історична теза про 1930-ті сформульована без удаваної абсолютної точності.
    model_answer: >-
      Тоталітарна влада боялася кобзаря не тому, що він просто грав на
      інструменті, а тому, що він з'єднував публіку, пам'ять і моральний
      коментар поза державним контролем. Кобзарство було інституцією зі своїм
      учнівством, маршрутом, репертуаром і правилами входу в ремесло. Така
      постать не зводилася до приватного музиканта. Вона могла називати минуле
      власними словами і тримати довгу форму публічного слухання. Особливо
      небезпечним був думовий і псальмовий репертуар, бо він поєднував історію,
      релігійну пам'ять і моральну оцінку. Для влади, яка хотіла монополії на
      публічний голос, це означало конкуренцію з живою, несанкціонованою
      інституцією. Тому удар ішов не лише по окремих людях, а й по середовищу:
      по ярмарках, храмах, прочанствах, мандрівності, локальній громаді,
      духовному співу і самому механізму учнівства. Водночас не варто вдавати,
      ніби вся історія зламу зводиться до одного повністю доведеного сценарію.
      Безпечніше говорити про широку хвилю радянських репресій і руйнування
      умов, за яких традиція жила й передавалася.
