  text: 'Жанр твору. Науковці по-різному визначають жанр «Слова…»:

    героїчна пісня, старовинний вірш, римована проза, ораторський твір…

    У самому тексті твору натрапляємо на терміни «пісня», «повість»

    і «слово». Сучасні науковці визначають жанр «Слова…» як героїчну

    поему, оскільки в ній яскраво виражені епічні елементи, потужний

    ліричний струмінь, ритмізована мова, своєрідна композиція. За родовою характеристикою
    «Слово про похід Ігорів» — ліро-

    епічний твір. Пам’ятки оригінальної літератури княжої Русі-Ук'
  section_title: Сторінка 49
