- id: act-1
  type: variant-comparison
  title: Прямий корпус і літературне засвідчення
  instruction: Порівняй два режими доказу й поясни, як вони змінюють силу висновку.
  prompt: Один фрагмент може бути верифікований як народний корпус, інший - через Грушевського або Нечуя. Це не однакові джерельні ситуації.
  variants:
    - label: Прямий народний корпус
      text: Фрагмент зараховано до корпусу як народний текст; у модулі його можна читати як прямий приклад пісенної традиції.
      source: "ukrlib.com.ua: «Пісня про Байду»; «Зажурилась Україна»; «Гей, не дивуйте, добрії люди»; «Ой Морозе, Морозенку»; «Максим козак Залізняк»; «За Сибіром сонце сходить»"
    - label: Літературне або наукове засвідчення
      text: Фрагмент підтверджено в тексті Грушевського або Нечуя; він показує циркуляцію пісенного матеріалу, але не є прямим польовим записом.
      source: "Грушевський, історико-літературне засвідчення; Нечуй-Левицький, «В концерті»"
  features:
    - автор або засвідчувач
    - тип доказу
    - що можна стверджувати
    - чого не можна автоматично доводити
  model_answer: Прямий корпус дає сильнішу підставу для твердження про народну пісенну традицію. Літературне або наукове засвідчення теж важливе, але воно доводить радше присутність пісенного матеріалу в культурному обігу. У висновку треба назвати provenance, а не зливати всі фрагменти в один тип джерела.
- id: act-2
  type: motif-formula
  title: Формули історичної пісні
  instruction: Визнач, яку роботу виконує кожна формула жанру.
  passage: Історична пісня швидко вводить подію через зачин, тримає її куплетом, повтором і гуртовим підхопленням, а потім додає моральну оцінку через плач, похвалу, осуд або мобілізаційний заклик.
  formulas:
    - text: зачин
      label: вхід у подію
      explanation: Перший рядок одразу називає героя, простір або стан і не потребує довгої прозової експозиції.
    - text: куплет
      label: форма повтору
      explanation: Куплет робить подію придатною для гуртового співу й запам'ятовування.
    - text: плач за героєм
      label: моральна оцінка
      explanation: Пісня не лише повідомляє про смерть або поразку, а й формує спільну емоційну позицію.
    - text: provenance
      label: джерельна дисципліна
      explanation: Позначення джерела не дає сплутати прямий корпусний текст із пізнішим літературним контекстом.
  prompt: Обери два елементи й поясни, як вони відрізняють історичну пісню від думи або переказу.
  model_answer: Зачин і куплет найшвидше показують межу жанру. Дума розгортається речитативом без сталої строфи, переказ оповідає прозою, а історична пісня стискає подію до співаного початку й повторюваної строфічної форми.
- id: act-3
  type: performance
  title: Гуртовий голос історичної пам'яті
  instruction: Підготуй коротке усне виконання або читання на основі одного з шести блоків першоджерела.
  prompt: "Обери один primary-reading блок із модуля. Прочитай його вголос так, щоб було чути не акторську декламацію, а гуртову пісенну формулу пам'яті: чіткий зачин, стриманий темп, виділене ім'я або простір."
  self_check:
    - Чи не додано жодного рядка поза верифікованим фрагментом?
    - Чи збережено архаїчну або історичну форму без осучаснення?
    - Чи пояснено перед виконанням provenance обраного фрагмента?
  show_record_button: true
  model_answer: Сильне виконання не прикрашає текст новими рядками. Воно бере один перевірений фрагмент, називає його джерельний режим і показує, як зачин, повтор або звертання можуть працювати в голосі спільноти.
