inline:
  - id: act-1
    type: variant-comparison
    title: Тема, форма, доказ
    instruction: Порівняй три способи пам'ятати історичний матеріал.
    prompt: Чому одна історична тема може належати різним жанрам?
    variants:
      - label: Історична пісня
        text: Співана строфічна форма з зачином, повтором, ліричною оцінкою і голосом громади.
        source: «Пісня про Байду», «Зажурилась Україна», «Ой Морозе, Морозенку»
      - label: Дума
        text: Розгорнутий речитативний ліро-епічний твір без сталої куплетної строфи.
        source: Невільницькі та лицарські думи
      - label: Переказ
        text: Усна прозова оповідь про подію, місце або героя без співаної строфічної форми.
        source: Історичні перекази
    features:
      - жанрова форма
      - виконавський режим
      - сила історичного доказу
    model_answer: >-
      Історична тема сама не визначає жанр. Дума розгортає подію
      речитативом, переказ оповідає прозою, а історична пісня стискає подію
      до співаної строфи, зачину, повтору і моральної оцінки. Тому Байда може
      бути пісенним героєм, але це не робить твір думою; Кармалюк може бути
      історичною постаттю, але прозовий переказ про нього не стає піснею.

  - id: act-2
    type: motif-formula
    title: Формули історичної пісні
    instruction: Визнач, як коротка формула тримає подію в пісенній пам'яті.
    passage: >-
      Зажурилась Україна, бо нічим прожити. Ой щоб слава не пропала проміж
      козаками. Ой Морозе, Морозенку, ти славний козаче. За Сибіром сонце
      сходить, хлопці, не зівайте.
    formulas:
      - text: Зажурилась Україна
        label: колективний стан
        explanation: Пісня називає не приватний смуток, а стан спільноти.
      - text: щоб слава не пропала
        label: пам'ять і честь
        explanation: Формула переводить оборону в мову громадської слави.
      - text: Ой Морозе, Морозенку
        label: плач за героєм
        explanation: Повтор і звертання роблять ім'я центром жалоби.
      - text: хлопці, не зівайте
        label: мобілізаційний зачин
        explanation: Голос героя одразу кличе до дії та напруги.
    prompt: Обери дві формули й поясни, яку роботу вони виконують у жанрі.
    model_answer: >-
      «Зажурилась Україна» створює колективний стан: говорить не одна особа,
      а спільнота, що переживає напад і втрату. «Ой Морозе, Морозенку»
      працює як плач за героєм: повтор і звертання затримують ім'я в пам'яті,
      тому герой стає не тільки персонажем, а знаком спільної втрати.

workbook:
  - id: act-3
    type: performance
    title: Голос історичної пам'яті
    instruction: Підготуй коротке усне читання одного фрагмента.
    prompt: >-
      Обери один фрагмент першоджерела з уроку. Прочитай його вголос так, щоб
      було чути співану формулу пам'яті: чіткий зачин, стриманий темп,
      виділене ім'я або простір.
    fragment: Ой Морозе, Морозенку, ти славний козаче.
    self_check:
      - Чи не додано жодного рядка поза поданим фрагментом?
      - Чи збережено історичну форму без осучаснення?
      - Чи названо джерельний режим фрагмента?
    show_record_button: true
    model_answer: >-
      Уважне читання не прикрашає текст новими рядками. Воно бере один
      поданий фрагмент, називає його джерело і показує, як зачин, повтор або
      звертання працюють як формула пам'яті.

  - id: act-4
    type: comparative-study
    title: Прямий корпус і пізніше засвідчення
    instruction: Порівняй два типи доказу.
    items_to_compare:
      - Публічний текст народної історичної пісні на ukrlib.com.ua.
      - Згадка або переосмислення пісенного мотиву в науковій чи авторській праці.
    criteria:
      - Що можна цитувати як рядок народного тексту?
      - Що показує ширший культурний обіг мотиву?
      - Де потрібна обережна межа висновку?
    prompt: Яке твердження дозволяє кожен тип джерела?
    model_answer: >-
      Публічний текст народної пісні дозволяє читати рядок як приклад
      корпусної традиції. Наукова або літературна згадка показує, що мотив
      жив у культурному обігу, але сама по собі не завжди доводить прямий
      польовий запис. Ці джерела можна зіставляти, проте не можна підміняти
      одне одним.

  - id: act-5
    type: critical-analysis
    title: Історична пісня як джерело
    prompt: >-
      Проаналізуй короткий фрагмент історичної пісні. Назви жанрову форму,
      історичний шар, поетичний прийом і межу історичного висновку.
    target_text: Ой щоб слава не пропала проміж козаками.
    questions:
      - Який голос звучить у цьому рядку?
      - Чому слово «слава» не є просто прикрасою?
      - Який висновок про історію можна зробити обережно?
    model_answers:
      - Рядок говорить голосом громади, що хоче зберегти пам'ять про оборону.
      - «Слава» пов'язує подію з честю і тривалістю пам'яті.
      - Рядок показує моральну оцінку події, але не дає точної хроніки.
    evaluation_criteria:
      - Названо жанр і форму.
      - Є конкретний історичний шар.
      - Поетичний прийом пов'язано з висновком.
      - Межу доказу не пропущено.

  - id: act-6
    type: essay-response
    title: Історична пісня не зводиться до минулого
    instruction: Поясни жанр через форму, джерело і пам'ять.
    prompt: >-
      У 220-280 словах поясни, чому історична пісня не є просто текстом про
      минуле. Обов'язково назви співану форму, один історичний шар, один
      поетичний прийом і одну джерельну межу.
    min_words: 220
    model_answer: >-
      Історична пісня не зводиться до теми про минуле, бо її визначає спосіб
      пам'ятати подію. Вона тримає історичний матеріал у співаній строфічній
      формі: зачин швидко вводить героя або стан, повтор повертає ключову
      формулу, а куплетність робить текст придатним до гуртового голосу.
      Наприклад, ранній шар пісень про татарські напади й ясир говорить не
      тільки про факт небезпеки, а про спільний досвід втрати і спротиву.
      Формула «Зажурилась Україна» називає стан громади, а не приватний
      настрій окремого мовця. Водночас історична пісня має джерельну межу:
      її не можна читати як точний протокол події або повну біографію героя.
      Вона дає моральну пам'ять, оцінку, образ і голос, а для хронології або
      біографії потрібні інші джерела. Саме поєднання форми, пам'яті й
      обережного читання робить жанр самостійним.
    rubric:
      - criteria: "Названо історичну пісню як співану ліро-епічну форму."
        description: Пояснено, що йдеться про співаний ліро-епічний жанр, а не прозовий документ.
      - criteria: "Є конкретний історичний шар."
        description: Названо конкретний шар пам'яті чи події, на який спирається відповідь.
      - criteria: "Пояснено один прийом: зачин, куплет, повтор, звертання або плач."
        description: Прийом пов'язано з тим, як пісня творить голос пам'яті.
      - criteria: Проведено межу між пісенним образом і фактографічним документом.
        description: Пояснено, чому образ не замінює хронологічного або біографічного доказу.
      - criteria: Немає імперської або радянської рамки як нейтрального пояснення.
        description: Уникнуто нейтрального відтворення імперської або радянської пояснювальної рамки.
