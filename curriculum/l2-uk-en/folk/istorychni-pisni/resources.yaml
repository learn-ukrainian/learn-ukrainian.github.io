- title: Історичні пісні — українська Вікіпедія
  role: reading
  url: https://uk.wikipedia.org/wiki/Історичні_пісні
  notes: Прочитай оглядову статтю й випиши три жанрові ознаки, які відділяють історичну пісню від думи та переказу.
- title: Історичні пісні
  role: wiki
  url: https://uk.wikipedia.org/wiki/Історичні_пісні
  notes: Локальний wiki-довідник для модуля; використано як джерело визначення жанру, корпусної межі й висококультурних мостів.
- title: "Малоросійські пісні (1827) & Українські народні пісні (1834)"
  author: Максимович М.
  role: scholarly
  url: https://archive.org/details/malorossiyskiepesni
  notes: Перші великі систематичні збірки українських народних пісень, що містили історичний пласт; імперську назву подано лише як історичну назву видання.
- title: Малоросійські і червоноруські народні думи та пісні
  author: Лукашевич П.
  role: scholarly
  url: https://archive.org/details/lukashevych
  notes: Раннє збірницьке видання з історичним репертуаром; назва містить екзоніми доби і не є нейтральною назвою традиції.
- title: Історичні пісні малоруського народу
  author: Антонович В., Драгоманов М.
  role: scholarly
  url: https://archive.org/details/dragomanov
  notes: Двотомне наукове видання 1874-1875 років, що впорядкувало корпус пісенної пам'яті й потребує джерельної обережності.
- title: Студії над українськими народними піснями
  author: Франко І.
  role: scholarly
  url: https://archive.org/details/Studii_nad_pisniamy
  notes: Критичні дослідження народної пісенної творчості та текстологічних проблем фольклорного корпусу.
- title: Історія української літератури
  author: Грушевський М.
  role: scholarly
  url: https://chtyvo.org.ua/authors/Hrushevskyi/Baida-Vyshnevetskyi_v_poezii_i_istorii.pdf
  notes: Джерело для розрізнення ширшого й вужчого поняття історичних пісень та для обережності щодо прикріплення імен до типових образів.
- title: Історичне значення південноруської народної пісенної творчості
  author: Костомаров М.
  role: scholarly
  url: https://knu.ua/ua/geninf/osobystosti/kostomarov/
  notes: Дослідження зв'язку пісенного фольклору з історичним процесом; використовується тільки як планова scholarly-опора.
