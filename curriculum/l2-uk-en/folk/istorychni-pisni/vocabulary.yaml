- lemma: історична пісня
  translation: historical song
  pos: noun phrase
  usage: Історична пісня тримає подію у співаній строфічній формі.
- lemma: дума
  translation: duma, recitative epic
  pos: noun
  usage: Дума може мати історичну тему, але не має сталої куплетної строфи.
- lemma: переказ
  translation: oral prose legend or historical tale
  pos: noun
  usage: Переказ оповідає прозою, а історична пісня співає подію.
- lemma: зачин
  translation: opening formula
  pos: noun
  usage: Зачин одразу вводить героя, простір або стан громади.
- lemma: куплет
  translation: stanza, verse
  pos: noun
  usage: Куплет допомагає гуртовому голосу повторити ключову формулу.
- lemma: строфа
  translation: stanza
  pos: noun
  usage: Строфа відділяє історичну пісню від прозового переказу.
- lemma: повтор
  translation: repetition
  pos: noun
  usage: Повтор посилює плач, заклик або моральну оцінку.
- lemma: ясир
  translation: captives taken in raids
  pos: noun
  usage: Загроза ясиру належить до раннього шару історичних пісень.
- lemma: гайдамаччина
  translation: haidamak movement
  pos: noun
  usage: Гайдамаччина входить до пізнішого шару історично-пісенної пам'яті.
- lemma: опришок
  translation: Carpathian rebel figure
  pos: noun
  usage: Образ опришка пов'язаний із народним спротивом у Карпатському регіоні.
- lemma: голота
  translation: poor common people
  pos: noun
  usage: Голота в пісенному корпусі може означати соціально вразливу громаду.
- lemma: джерельна історія
  translation: source history
  pos: noun phrase
  usage: Джерельна історія показує, як текст перейшов від виконання до запису.
- lemma: екзонім
  translation: externally imposed name
  pos: noun
  usage: Старий імперський екзонім у назві видання не є нейтральною назвою української традиції.
- lemma: деколонізоване читання
  translation: decolonized reading
  pos: noun phrase
  usage: Деколонізоване читання повертає українській пісні власну культурну суб'єктність.
