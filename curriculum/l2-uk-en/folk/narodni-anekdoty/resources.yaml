- title: Народний анекдот
  role: wiki
  url: https://uk.wikipedia.org/wiki/%D0%90%D0%BD%D0%B5%D0%BA%D0%B4%D0%BE%D1%82
  notes: >-
    Довідкова сторінка для базового жанрового орієнтира. Урок не бере з неї
    неперевірені повні жарти; ширші сюжети подано як переказані мотиви або
    аналітичні типи.
- title: Барокові інтермедії 1619 року
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%AF%D0%BA%D1%83%D0%B1_%D2%90%D0%B0%D0%B2%D0%B0%D1%82%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідкова сторінка для барокової інтермедійної рамки. Модуль використовує
    цей матеріал як приклад руху між письмовою сценою, усним мотивом і
    переказом, а не як джерело для неперевіреного цитування.
- title: Григорій Квітка-Основ'яненко
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9A%D0%B2%D1%96%D1%82%D0%BA%D0%B0-%D0%9E%D1%81%D0%BD%D0%BE%D0%B2%27%D1%8F%D0%BD%D0%B5%D0%BD%D0%BA%D0%BE_%D0%93%D1%80%D0%B8%D0%B3%D0%BE%D1%80%D1%96%D0%B9_%D0%A4%D0%B5%D0%B4%D0%BE%D1%80%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідкова сторінка для літературної обробки народно-комічних мотивів.
    Урок розрізняє народний запис і авторський твір.
- title: Остап Вишня
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9E%D1%81%D1%82%D0%B0%D0%BF_%D0%92%D0%B8%D1%88%D0%BD%D1%8F
  notes: >-
    Довідкова сторінка для жанру усмішки як модерного містка від народної
    комічної техніки до авторської гумористичної прози.
- title: Дмитро Чижевський
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A7%D0%B8%D0%B6%D0%B5%D0%B2%D1%81%D1%8C%D0%BA%D0%B8%D0%B9_%D0%94%D0%BC%D0%B8%D1%82%D1%80%D0%BE_%D0%86%D0%B2%D0%B0%D0%BD%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідкова сторінка для літературно-історичного контексту. Єдиний короткий
    формульний фрагмент у модулі спирається на локальну дослідницьку нотатку з
    перевіркою за Чижевським.
- title: Мирослав Попович
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9F%D0%BE%D0%BF%D0%BE%D0%B2%D0%B8%D1%87_%D0%9C%D0%B8%D1%80%D0%BE%D1%81%D0%BB%D0%B0%D0%B2_%D0%92%D0%BE%D0%BB%D0%BE%D0%B4%D0%B8%D0%BC%D0%B8%D1%80%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідкова сторінка для культурно-історичної рамки антисвіту й сміхового
    перевертання. Модуль застосовує цю рамку обережно, без твердження про
    походження кожного анекдоту з козацького середовища.
