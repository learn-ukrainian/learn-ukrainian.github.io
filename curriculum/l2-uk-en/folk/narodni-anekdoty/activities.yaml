version: "1.0"
module: narodni-anekdoty
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Три рамки сміху
    instruction: Порівняй, як різні рамки пояснюють народний анекдот.
    prompt: Яка рамка найкраще пояснює силу короткого дотепу?
    variants:
      - label: Розвага
        text: Анекдот тримає розмову, перевіряє дотепність і дає радість несподіваного фіналу.
        source: побутове виконання
      - label: Соціальна зброя
        text: Персонаж нижчого статусу перемагає пана, чиновника або іншого сильнішого мовою.
        source: соціальна сатира
      - label: Світ навиворіт
        text: Комічна форма тимчасово перевертає ролі, норми й авторитети.
        source: карнавальна логіка
      - label: Джерельна межа
        text: Жодна рамка не доводить походження кожного конкретного сюжету.
        source: методична обережність
    features:
      - хто отримує перевагу
      - що саме перевертається
      - чи є конкретне джерело
      - чи є ризик перебільшення
      - як працює слухач
    model_answer: >-
      Найточніше працює поєднана рамка. Анекдот справді розважає, але його
      сміх може бути соціальною зброєю і карнавальним перевертанням. Водночас
      кожний конкретний сюжет треба читати за джерелом, а не автоматично
      оголошувати доказом однієї теорії.

  - id: act-2
    type: motif-formula
    title: Від сцени до пуанта
    instruction: Розбери, які елементи потрібні короткому анекдоту.
    passage: >-
      У народному анекдоті довгий опис зазвичай слабшає. Потрібні ролі,
      очікування, мовний поворот і фінальна репліка, після якої слухач
      інакше бачить усю сцену.
    formulas:
      - text: дві ролі
        label: учасники
        explanation: Сцена має показати, хто ніби сильніший, а хто ніби залежний.
      - text: очікування
        label: напрям
        explanation: Слухач має передбачити звичний розвиток подій.
      - text: мовний поворот
        label: інверсія
        explanation: Персонаж змінює значення слова, правила або ситуації.
      - text: пуант
        label: фінал
        explanation: Остання репліка перебудовує сенс усієї сцени.
      - text: пауза
        label: виконання
        explanation: Усний темп готує слухача до несподіваного завершення.
    prompt: Чому анекдот не потребує довгого пояснення після фіналу?
    model_answer: >-
      Анекдот має спрацювати через сам пуант. Якщо після фіналу треба довго
      пояснювати, хто кого переміг і чому це смішно, сцена втратила точність.
      Слухач повинен сам зібрати ролі, очікування й перевертання.

  - id: act-3
    type: critical-analysis
    title: Небилиця як правило гри
    instruction: Оціни абсурд не як помилку, а як жанровий механізм.
    target_text: >-
      У небилиці неможлива подія подана так, ніби вона звичайна. Слухач не
      має повірити буквально; він має впізнати перевернуте правило гри.
    prompt: Чому фраза "так не буває" не спростовує небилицю?
    questions:
      - Яке правило слухач приймає на початку небилиці?
      - Чому серйозний тон підсилює комічний ефект?
      - Чим небилиця відрізняється від брехні?
      - Як абсурд показує звичний порядок?
    model_answers:
      - Слухач приймає, що неможливість є умовою гри.
      - Серйозний тон контрастує з неможливим змістом і робить інверсію виразнішою.
      - Брехня хоче ошукати, а небилиця відкрито працює в ігровій рамці.
      - Коли порядок перевернуто, ми краще бачимо, на яких правилах він тримався.

  - id: act-4
    type: critical-analysis
    title: Мішень сміху
    instruction: Визнач, чи безпечно виконувати сюжет, чи краще аналізувати його критично.
    target_text: >-
      У старому корпусі трапляється комічний сюжет, де фінальний ефект
      тримається не на ваді персонажа, а на його етнічній назві.
    prompt: Який джерельний і етичний статус має такий матеріал у сучасному уроці?
    questions:
      - Чи спрямована сатира на дію або на групову ідентичність?
      - Чи можна переказати механізм без принизливої репліки?
      - Чи є підтверджений запис, а не пригаданий варіант?
      - Чи доречне виконання вголос?
      - Яку безпечнішу навчальну дію можна запропонувати?
    model_answers:
      - Сатира має бути спрямована на дію, владу або ваду, а не на групову ідентичність.
      - Механізм можна переказати без принизливої репліки, якщо мета - аналіз, а не виконання.
      - Без точного запису текст не можна подавати як дослівний фольклорний матеріал.
      - Виконання вголос недоречне, якщо ефект тримається на приниженні групи.
      - Безпечніше аналізувати мішень сміху або переписати сатиру на дію.
    evaluation_criteria:
      - джерельний статус
      - етична межа
      - розрізнення сатири й стереотипу

  - id: act-5
    type: critical-analysis
    title: Формула чи повний текст
    instruction: Розрізни коротку перевірену формулу, переказаний мотив і заблокований приклад.
    target_text: >-
      Перевірена коротка формула може бути цитатою. Ширший сюжет без
      корпусної перевірки має лишатися переказом. Стереотипний сюжет не
      стає безпечним тільки тому, що він старий.
    prompt: Як позначити джерельний статус матеріалу перед використанням у вправі?
    questions:
      - Що можна цитувати дослівно?
      - Коли потрібна парафраза?
      - Коли матеріал треба заблокувати для виконання?
      - Чому коротка перевірена формула не дорівнює перевіреному повному сюжету?
    model_answers:
      - Дослівно можна цитувати тільки коротку формулу з точним підтвердженням.
      - Парафраза потрібна, коли мотив відомий, але текст не перевірено.
      - Для виконання треба блокувати матеріал, що тримається на приниженні групи.
      - Формула може мати власне підтвердження, а ширший сюжет лишатися неперевіреним.
    evaluation_criteria:
      - дослівна перевірка
      - бібліографічне підтвердження
      - ризик стереотипу
      - придатність до виконання

workbook:
  - type: critical-analysis
    title: Сміх як соціальна інверсія
    target_text: Народний анекдот важливий тільки тому, що він веселий.
    prompt: Розбери тезу так, щоб не знецінити розвагу, але показати ширшу культурну роботу сміху.
    questions:
      - Чому розважальна функція справді необхідна для жанру?
      - Як остання репліка може змінити статус персонажів?
      - Коли сміх стає сатирою на владу або лицемірство?
      - Чому не кожний анекдот треба оголошувати політичним?
      - Яку точнішу тезу можна сформулювати?
    model_answers:
      - Без радості несподіваного фіналу анекдот утрачає жанрову енергію.
      - Пуант може зробити сильного смішним, а залежного персонажа - мовно сильним.
      - Сатира виникає тоді, коли мішенню є влада, жадібність, брехня або моральна поза.
      - Частина анекдотів є побутовою грою, а не прямим актом спротиву.
      - Точніше сказати, що анекдот розважає і водночас може перевіряти соціальні норми.

  - type: comparative-study
    title: Мандрівний сюжет і місцевий колорит
    instruction: Порівняй міжнародну близькість короткого дотепу без заперечення української специфіки.
    items_to_compare:
      - Український народний анекдот із соціальним пуантом.
      - Європейська коротка фацеція або книжний дотеп.
      - Комедійна сцена народного театру.
      - Оповідь про мудрого хитруна в іншій традиції.
      - Міський політичний жарт під цензурою.
    criteria:
      - чи є коротка сцена
      - чи є фінальний поворот
      - хто є мішенню сміху
      - яка мова й соціальні ролі локалізують сюжет
      - чи можна доводити походження
    prompt: Чому міжнародна подібність не означає, що український матеріал є "несамостійним"?
    model_answer: >-
      Короткі комічні сюжети часто мандрують між культурами, але кожна
      традиція надає їм власну мову, ролі, історичні напруження й спосіб
      виконання. Подібність дозволяє порівнювати механізми, але не доводить,
      що конкретний український варіант є лише копією зовнішнього джерела.

  - type: ritual-sequencing
    title: Безпечна робота зі стереотипним матеріалом
    instruction: Упорядкуй кроки відповідального аналізу старого комічного сюжету.
    steps:
      - Визначити, чи є сюжет дослівно перевіреним або лише переказаним.
      - Назвати мішень сміху без повторення принизливих деталей.
      - Відділити сатиру на дію від насмішки з групової ідентичності.
      - Пояснити історичний контекст рубрики або типажу.
      - Вирішити, чи матеріал придатний до виконання, чи тільки до аналізу.
      - Запропонувати безпечнішу вправу на механізм пуанта або інверсії.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Спершу треба перевірити джерельний статус, потім визначити мішень і
      ризик стереотипу. Лише після історичного пояснення можна вирішувати,
      чи текст доречно виконувати. Часто безпечніше працювати з механізмом
      пуанта, а не з принизливою версією сюжету.

  - type: performance
    title: Пауза перед пуантом
    instruction: Прочитай нейтральну навчальну сцену як усну подію.
    fragment: >-
      Один персонаж упевнено ставить правило, другий приймає його буквально,
      а фінальна репліка повертає це правило проти першого.
    prompt: >-
      Вимов опис двічі: спершу без паузи, потім із паузою перед фінальною
      реплікою. Поясни, чому темп важливий для анекдоту.
    self_check:
      - Я не додаю етнічної, гендерної або тілесної мішені.
      - Я виділяю момент, коли влада переходить від одного персонажа до іншого.
      - Я не пояснюю пуант до того, як він прозвучить.
      - "Я можу назвати, що саме перевернулося: правило, статус або значення слова."
    model_answer: >-
      Пауза створює очікування і дає слухачеві місце для передбачення. Коли
      фінальна репліка звучить після паузи, вона виразніше змінює статус
      персонажів. Темп тому є частиною жанру, а не лише технікою читання.

  - type: critical-analysis
    title: Анекдот, приказка, усмішка
    target_text: Якщо фраза стала приказковою, вона вже не пов'язана з анекдотом.
    prompt: Поясни, чому фінальна репліка може перейти з малої сцени в самостійну формулу.
    questions:
      - Що дає анекдотові повна сцена?
      - Що зберігає приказкова формула після втрати сюжету?
      - Чому авторська усмішка може вчитися в народного пуанта?
      - Як не переплутати народний запис і літературну обробку?
      - Яку джерельну позначку треба додати до короткої формули?
    model_answers:
      - Повна сцена дає ролі, конфлікт, очікування і момент перевертання.
      - Формула зберігає висновок або пуант, навіть коли подробиці забуті.
      - Усмішка може перейняти темп, розмовність, несподіваний фінал і само викриття персонажа.
      - "Треба називати конкретний статус: запис, переказ, авторська обробка або сучасна навчальна сцена."
      - Потрібна позначка, чи формулу перевірено дослівно і де саме.

  - type: essay-response
    title: Межа відповідального сміху
    prompt: >-
      Напиши коротке доказове есе українською.

      У 340-460 словах поясни, чому народні анекдоти та небилиці варто читати
      як серйозну сміхову культуру, а не як просту добірку жартів. Обов'язково
      згадай пуант, абсурд небилиці, соціальну мішень, джерельний статус і
      етичну межу стереотипу.
    model_answer: >-
      Народні анекдоти та небилиці варто читати як серйозну сміхову культуру,
      бо вони працюють не лише для розваги. Анекдот є малою сценою, у якій
      ролі, очікування й фінальна репліка різко змінюють значення ситуації.
      Пуант може зробити сильного персонажа смішним, а слабшому дати перевагу
      через мову. Саме тому короткий дотеп часто показує соціальну інверсію:
      влада, пиха або лицемірство на мить втрачають контроль.

      Небилиця діє іншим способом. Вона не обов'язково веде до одного пуанта,
      а створює цілий перевернутий світ. Неможлива подія подана серйозно, і
      слухач розуміє: це не помилка, а правило гри. Абсурд допомагає побачити,
      на яких звичних нормах тримається наше уявлення про порядок.

      Водночас сміх має мішень. Він може бути сатирою на владу, жадібність,
      брехню чи моральну позу, але може перетворитися на насмішку з групової
      ідентичності. Старий фольклорний статус не робить такий матеріал
      автоматично безпечним. Етнічні, гендерні, релігійні або тілесні
      стереотипи треба аналізувати критично, а не виконувати як розвагу.

      Джерельний статус так само важливий. Повний анекдот не можна вигадати з
      пам'яті й назвати народним. Перевірена коротка формула може бути цитатою,
      неповністю підтверджений мотив має лишатися переказом, а принизливий
      сюжет часто треба заблокувати для виконання. Тоді сміхова культура
      лишається живою, але курс не повторює стару шкоду без потреби.

      Особливо важливо, що ці три виміри не існують окремо. Пуант може бути
      блискучим за формою, але етично слабким, якщо його сила тримається на
      приниженні групи. Абсурд небилиці може бути вільною грою з логікою,
      але його не слід видавати за старий запис, якщо текст створено для
      сучасної вправи. Соціальна мішень може бути справедливою, коли сміх
      спрямований на чиновницьку пиху, жадібність або лицемірство, і
      проблемною, коли сміх переносить провину на походження, стать, тіло чи
      мову людини.

      Тому відповідальний читач спершу визначає механізм, а потім ставить
      джерельне й етичне питання. Якщо є точне підтвердження короткої формули,
      її можна цитувати як формулу з пуантом. Якщо відомий лише мотив, його
      краще переказати без удаваної дослівності. Якщо сюжет містить історичний
      стереотип, його можна розібрати як свідчення уявлень минулого, але не
      варто перетворювати на рольову гру або зразок для наслідування. Саме
      така дисципліна дозволяє бачити народний гумор живим і складним:
      сміятися з винахідливості форми, не забуваючи про людей, яких сміх може
      захищати або ранити.
