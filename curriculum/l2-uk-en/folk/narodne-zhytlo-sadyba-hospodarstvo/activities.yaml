version: "1.0"
module: narodne-zhytlo-sadyba-hospodarstvo
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Не одна біла хата
    instruction: Розрізни регіональні форми за матеріалом, планом і господарською логікою.
    prompt: Чому один образ біленої хати з садком не може представляти всю традиційну архітектуру?
    variants:
      - label: Полісся
        text: Дерево, зруб, лісове довкілля, дранка або солома, довші господарські прибудови.
        source: лісова матеріальна екологія
      - label: Гуцульщина
        text: Ґражда або оседок, внутрішній двір, житло й господарські споруди в замкненому комплексі.
        source: гірський ландшафт і худоба
      - label: Поділля
        text: Глина, солома, вальки, камінь у підмурках і огорожах, виразне білення.
        source: лісостеп, камінь і глина
      - label: Наддніпрянщина і Полтавщина
        text: Біла хата, стріха, садок, призьба, піч і покуть як дуже сильна літературна іконографія.
        source: символічно потужний, але не єдиний тип
    features:
      - матеріал
      - план
      - двір
      - господарські будівлі
      - музейний контекст
      - ризик стереотипу
    model_answer: >-
      Білена наддніпрянська або полтавська хата є важливим символом, але вона
      не вичерпує традицію. Полісся тримає лісову зрубну логіку, Гуцульщина
      дає замкнений оседок із ґраждою, Поділля працює з глиною, соломою й
      каменем, а Наддніпрянщина й Полтавщина мають сильну літературну
      іконографію білої хати, садка, печі й покуті. Якщо
      показати тільки один тип, зникають матеріал, регіон і господарство.

  - id: act-2
    type: motif-formula
    title: Піч, покуть і межі
    instruction: Прочитай елементи хати як просторові функції, а не як декоративні назви.
    passage: |-
      піч
      покуть
      сволок
      поріг
      криниця
    formulas:
      - text: піч
        label: тепло і щоденний цикл
        explanation: Піч варить, пече, гріє, сушить, лікує й збирає робочу зону хати.
      - text: покуть
        label: честь і святковий центр
        explanation: Покуть поєднує образи, рушники, стіл, гостя, старших і родинну пам'ять.
      - text: сволок
        label: конструкція і пам'ять
        explanation: Сволок тримає стелю, але може нести дату, різьблений знак або слід майстра.
      - text: поріг
        label: керована межа
        explanation: Поріг розділяє двір і хату, тому навколо нього діють правила переходу.
      - text: криниця
        label: вода і соціальний вузол
        explanation: Криниця дає воду, але також створює місце зустрічі, новин і відповідальності.
    prompt: Як ці елементи показують, що хата є картою дій?
    model_answer: >-
      Кожний елемент організує певний тип руху. Піч керує теплом і їжею,
      покуть збирає честь і свято, сволок поєднує конструкцію з пам'яттю,
      поріг контролює перехід між своїм і чужим, а криниця виводить садибу до
      води й сусідів. Це не декор, а просторові функції.

  - id: act-3
    type: ritual-sequencing
    title: Від місця до новосілля
    instruction: Упорядкуй будівельну послідовність без вигаданих примовок.
    steps:
      - Вибрати місце й уникати локально небезпечних або нечистих ділянок.
      - Перевірити місце знаками, наприклад поведінкою худоби, хлібом, зерном або водою.
      - Спланувати орієнтацію, підхід, зв'язок із двором, садом, городом і криницею.
      - Почати закладини й зробити малий відкуп або символічний внесок, якщо це підтримує локальний опис.
      - Звести стіни відповідно до матеріалу, наприклад як зруб, каркас, конструкцію з глини, хмизу, соломи, каменю або змішану конструкцію.
      - Поставити дах, поріг, двері, вікна, піч і сволок як ключові вузли дому.
      - Позначити завершення основної роботи хрестом, колосками або квітами на гребені даху.
      - Увійти в новий дім із вогнем, хлібом, водою, іконами, речами, гостями й господарським порядком.
    correct_order: [0, 1, 2, 3, 4, 5, 6, 7]
    model_answer: >-
      Послідовність показує перехід від невизначеного місця до впорядкованої
      садиби. Спершу простір вибирають і перевіряють, потім планують двір,
      закладають конструкцію, зводять стіни й дах, завершують роботу видимим
      знаком і лише тоді вводять у дім вогонь, хліб, воду, образи, речі та
      гостей. Слова обряду не треба вигадувати: досить точно пояснити дії.

  - id: act-4
    type: variant-comparison
    title: Садиба як господарство
    instruction: Розведи будівлі за функцією, щоб не називати весь двір одним словом.
    prompt: Як господарські споруди перетворюють хату на обійстя?
    variants:
      - label: Комора
        text: Захищене місце для харчів, тканини, одягу, зерна, посагу, інструментів і цінних речей.
        source: запас і майно
      - label: Клуня або стодола
        text: Простір для снопів, зерна, молотьби, врожаю і великого господарського циклу.
        source: зерно й праця
      - label: Погріб
        text: Холодне місце для тривалого зберігання їжі, овочів, напоїв і запасів.
        source: температура і тривалість
      - label: Хлів, стайня, саж
        text: Будівлі для худоби, коней і свиней, тобто для живої частини господарства.
        source: тварини й догляд
      - label: Криниця, сад, город
        text: Вода, плоди, овочі, сезонна праця, сусідська межа і харчова безпека.
        source: ресурс і соціальний простір
    features:
      - запас
      - худоба
      - вода
      - сезон
      - межа приватного і громадського
      - соціальний статус
    model_answer: >-
      Обійстя є малою економічною системою. Комора береже цінне, клуня або
      стодола працює з урожаєм, погріб тримає холод, хлів, стайня і саж
      організують тварин, а криниця, сад і город забезпечують воду, харчі й
      зв'язок із сусідами. Без цих споруд хата перетворюється на красивий
      фасад без господарського життя.

workbook:
  - type: critical-analysis
    title: Без прямої давнини
    instruction: Виправ тезу так, щоб вона не створювала незмінну міфологічну лінію.
    target_text: Кожний елемент української хати прямо зберігся з дохристиянського культу.
    prompt: Що в цій тезі занадто сильне і як сказати точніше?
    questions:
      - Чому слово "кожний" руйнує джерельну обережність?
      - Які шари справді можуть переплітатися в будівельних обрядах?
      - Чому домовика або поріг не треба перетворювати на готову схему пантеону?
      - Яка збалансована теза можлива?
    model_answers:
      - Воно приписує всім деталям одну безперервну давню функцію без доказу.
      - У джерелах переплітаються християнські, господарські, магічні, родинні й старші уявлення.
      - Домовик, хованець, поріг і обереги належать до складної домашньої уяви, а не до простої таблиці богів.
      - Точніше сказати, що частина хатніх практик зберігає старші символічні шари, але вони дійшли до нас у пізніших локальних і християнізованих формах.

  - type: comparative-study
    title: Музейна хата і жива садиба
    instruction: Порівняй два режими існування традиційної будівлі без знецінення жодного.
    items_to_compare:
      - "Музей просто неба: перенесена або відтворена будівля, експозиційний контекст, охорона, пояснення, регіональна панорама."
      - "Жива або перебудована сільська садиба: родинна власність, ремонт, сучасні матеріали, пам'ять, змішання старих і нових функцій."
    criteria:
      - доказовий статус
      - зв'язок із первісним ландшафтом
      - доступ для навчання
      - зміна функції
      - ризик романтизації
    prompt: Чому музей не є просто "замороженим селом", а жива садиба не є автоматично етнографічною нормою?
    model_answer: >-
      Музейна хата має сильну охоронну й навчальну роль, але вона вже живе в
      експозиції, часто поза первісним ландшафтом і щоденним господарським
      циклом. Жива садиба може зберігати родинну пам'ять і практики, але вона
      часто перебудована, газифікована, електрифікована й адаптована до
      сучасних потреб. Обидва режими корисні, якщо чесно назвати їхні межі.

  - type: critical-analysis
    title: Не бідність як ідилія
    instruction: Перепиши тезу так, щоб вона бачила красу й труднощі одночасно.
    target_text: Стара хата була ідеальним гармонійним простором без проблем.
    prompt: Як сформулювати точніше?
    questions:
      - Які сильні сторони традиційного житла варто назвати?
      - Які труднощі не можна приховувати?
      - Чому повага до культури не потребує ідилії?
      - Як пов'язати красу, працю і соціальну вразливість?
    model_answers:
      - Вона могла бути технологічно продуманою, теплою в пам'яті, естетично виразною і добре впорядкованою.
      - Тіснота, дим, холод, пожежна небезпека, важкий ремонт, виснажлива праця й бідність також належать до правди.
      - Ідилія стирає реальних людей і перетворює їхню працю на декорацію.
      - Точніше говорити про майстерність і красу разом із фізичною працею, ризиком і нерівністю.

  - type: comparative-study
    title: Піч і покуть
    instruction: Порівняй дві сильні точки інтер'єру без протиставлення "побутового" і "сакрального" як простих полюсів.
    items_to_compare:
      - "Піч: тепло, їжа, хліб, сушіння, лікування, дитяче й зимове тіло, інструменти й щоденна праця."
      - "Покуть: образи, рушники, лампадка, стіл, гості, старші, святковий хліб, родинна ієрархія."
    criteria:
      - функція
      - символічне поле
      - пов'язана праця
      - мова простору
      - ризик спрощення
    prompt: Чому діагональ піч - покуть допомагає читати хату як нерівномірний простір?
    model_answer: >-
      Піч і покуть показують, що хата має різні зони статусу. Піч збирає
      тепло, їжу, роботу, тіло і щоденний час. Покуть збирає честь, ікони,
      рушники, гостей, старших і свято. Але це не просте протиставлення
      "побутового" й "сакрального": у печі теж є символічність, а покуть
      працює через конкретні речі, стіл, порядок сидіння і родинну дію.

  - type: critical-analysis
    title: Підкова без перебільшення
    instruction: Виправ тезу так, щоб вона не робила популярний оберіг єдиним доказом хатньої семантики.
    target_text: Підкова над дверима була обов'язковим давнім знаком у кожній українській хаті.
    prompt: Як сказати обережніше?
    questions:
      - Чому слова "обов'язковим" і "кожній" створюють проблему?
      - Що сильніше підтверджене в джерельній логіці хати?
      - Як включити підкову без вигаданого універсалізму?
      - Чому двері, вікна, поріг і комин важливіші за одну річ?
    model_answers:
      - Вони приписують одному предмету всюдисущість без достатньої опори.
      - Сильніше підтверджена ширша охоронна логіка отворів, меж і переходів.
      - Підкову можна назвати популярним обереговим знаком у ширшому наборі, але з нижчою впевненістю.
      - Саме отвори є місцями переходу між своїм і чужим, тому навколо них концентруються правила й оздоблення.

  - type: essay-response
    title: Обійстя як система
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 280-360 словах поясни, чому традиційну українську хату треба читати
      разом із садибою, господарськими будівлями, регіоном і джерельними
      межами. Використай щонайменше чотири опори: матеріал, піч і покуть,
      сіни й комора, клуня або стодола, погріб, хлів або стайня, криниця,
      ґражда, музей просто неба, деколонізаційна критика або обережність щодо
      обрядів.
    min_words: 280
    model_answer: >-
      Традиційну українську хату не можна читати як окремий красивий фасад,
      бо вона працює тільки разом із садибою. Матеріал уже показує регіон:
      Полісся й Карпати сильніше пов'язані з деревом і зрубом, Поділля та
      лісостеп - із глиною, соломою, каменем і мазанкою. Тому одна біла хата
      з садком не може представляти всю країну.

      Усередині хати простір теж нерівномірний. Піч варить, пече, гріє,
      сушить і збирає щоденну працю. Покуть тримає образи, рушники, стіл,
      гостей і родинну честь. Сіни переводять людину між вулицею і теплим
      житлом, а комора береже харчі, тканину, зерно, посаг і цінне майно.
      Отже, навіть план хати показує господарський порядок.

      Навколо хати стоїть обійстя. Клуня або стодола потрібна для снопів,
      зерна й молотьби. Погріб забезпечує холодне зберігання. Хлів, стайня і
      саж пов'язані з худобою, кіньми й свиньми. Криниця дає воду, але також
      створює місце зустрічі. У гуцульській ґражді ця логіка може замикатися
      у внутрішньому дворі, де житло й господарські споруди працюють разом.

      Деколонізована рамка допомагає не звести хату до чужої імперської
      категорії або туристичної картинки. Водночас вона вимагає не вигадувати
      давні примовки, універсальні обереги чи незмінний символічний код.
      Музей просто неба корисний, бо показує регіональний ансамбль, але він
      теж має межу: це експозиція, а не жива щоденна садиба. Саме тому
      відповідальне читання починається з питання про матеріал, функцію,
      регіон, працю і джерело.
