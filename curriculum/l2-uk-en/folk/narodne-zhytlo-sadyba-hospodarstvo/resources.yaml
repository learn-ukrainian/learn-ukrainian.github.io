  url: https://www.pyrohiv.com/
  notes: >-
    Офіційний сайт Пирогова; використано для сучасної музейної рамки,
    регіональної експозиційної панорами й теми скансенового збереження.
- title: Експозиції Національного музею народної архітектури та побуту України
  author: Національний музей народної архітектури та побуту України
  role: textbook
  source_ref: Народне житло, садиба і господарство
  url: https://www.pyrohiv.com/exposition
  notes: >-
    Офіційна сторінка експозицій; використано для назв регіональних секторів
    і пояснення того, що музей показує ансамблі, а не одну абстрактну хату.
- title: Музей народної архітектури і побуту у Львові імені Климентія Шептицького
  author: Шевченківський гай
  role: textbook
  source_ref: Народне житло, садиба і господарство
  url: https://lvivskansen.org/
  notes: >-
    Офіційний сайт Шевченківського гаю; використано для сучасної рамки
    західноукраїнського скансену, збереження, дослідження і популяризації
    народної архітектури.
- title: Про музей
  author: Шевченківський гай
  role: textbook
  source_ref: Народне житло, садиба і господарство
  url: https://lvivskansen.org/pro-muzej/
  notes: >-
    Офіційна сторінка про музей; використано для інституційного статусу,
    заснування, регіонального фокусу й межі між музейною експозицією та
    живою сільською садибою.
