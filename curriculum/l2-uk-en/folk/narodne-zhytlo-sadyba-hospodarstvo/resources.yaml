- title: Народне житло, садиба і господарство
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Планова рамка і дослідницькі матеріали для теми; використано як доказову
    основу для класифікації хати, садиби, господарських будівель, будівельної
    обрядовості, регіональних форм, музейної рамки й деколонізаційних меж.
- title: Історія української культури. Т. 2. XIII-XVII ст.
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Корпусна основа для ранньомодерних планів хата-сіни-комора,
    будівельної обрядовості, вибору місця, закладин, захищених отворів і
    господарських споруд.
- title: Іван Крип'якевич. Історія української культури
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Використано для регіональної типології, дерев'яного будівництва,
    карпатської архітектури, гуцульської ґражди й переходу від народної
    архітектури до ширшої культурної історії.
- title: Дмитро Антонович. Українська культура
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Історико-мистецький синтез для даху, білення, тридільного плану,
    матеріалів Середньої України, лісових регіонів, комор і внутрішньої
    організації хати.
- title: Мирослав Попович. Нарис історії культури України
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Використано для семіотики домашнього простору: нерівномірність хати,
    діагональ піч-покуть, межові місця, вікно, напрям і символічна
    організація світу.
- title: Енциклопедія українознавства
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Використано для обережного пояснення домовика, хованця, годованця і
    нижчої домашньої міфології без перетворення її на схему пантеону.
- title: Словник української мови
  author: Борис Грінченко
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Лексикографічна опора для слів хата, покуття, сволок, мисник, клуня,
    стодола, комора, хлів, погріб, криниця, садиба й обійстя; словникові
    приказки не використано як дослівні перевірені фольклорні цитати.
- title: Інтер'єр давньої української хати
  author: Л. Орел
  role: textbook
  source_ref: Народне житло, садиба і господарство
  notes: >-
    Навчальний опис інтер'єру, нерухомих меблів, сволока і першого вогню;
    використано як допоміжний педагогічний місток, не як основне джерело
    обрядового датування.
- title: Кобзар (1876). Том 1. Вечір
  author: Тарас Шевченко
  role: reading
  url: https://uk.wikisource.org/w/index.php?oldid=83251
  notes: >-
    Публічнодоменна версія у Вікіджерелах; використано для звірення
    уривка про сад, вечір і хату.
- title: Кобзар (1876). Том 2. До мертвих, і живих...
  author: Тарас Шевченко
  role: reading
  url: https://uk.wikisource.org/w/index.php?oldid=419578
  notes: >-
    Публічнодоменна версія у Вікіджерелах; використано для звірення
    уривка з формулою "В своїй хаті своя й правда".
- title: Національний музей народної архітектури та побуту України
  author: Національний музей народної архітектури та побуту України
  role: textbook
