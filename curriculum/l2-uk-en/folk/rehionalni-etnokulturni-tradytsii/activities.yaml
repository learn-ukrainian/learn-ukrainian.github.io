version: "1.0"
module: rehionalni-etnokulturni-tradytsii
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Маркер чи система
    instruction: Розрізни впізнаваний знак і ширшу культурну систему, яка робить його осмисленим.
    prompt: Чому регіон не можна пояснювати одним предметом або словом?
    variants:
      - label: Маркер
        text: Трембіта, кептар, рушник, ґражда, кутя, коломийка або слово "лем" швидко впізнаються, але самі не пояснюють регіон.
        source: видимий або чутний знак
      - label: Система
        text: Довкілля, матеріал, говірка, обрядова послідовність, праця, сусідство, історична травма і сучасна спадщина пояснюють, як знак працює.
        source: культурна організація
      - label: Джерельна межа
        text: Один текст, одна річ або одне фото можуть бути доказом тільки для конкретного випадку, а не для всієї території.
        source: спосіб перевірки
    features:
      - матеріал
      - дія
      - мовна форма
      - виконавець
      - місце
      - межа узагальнення
    model_answer: >-
      Маркер допомагає увійти в тему, але система пояснює його функцію.
      Трембіта без полонини, сигналу, музикантів і обряду стає просто
      сувеніром. Рушник без дії, дому, хліба, весілля або пам'яті стає тільки
      орнаментом. Джерельна межа нагадує, що один приклад не може говорити за
      весь регіон.

  - id: act-2
    type: motif-formula
    title: Чотири режими читання
    instruction: Прочитай джерельні фрагменти як різні режими доказу, а не як однакові цитати.
    passage: |-
      колядка з образом моря і явора
      передмова Гнатюка про рукописи з різних околиць
      вступ Гнатюка про коломийковий розмір
      Грушевський про гуцульську і самбірську святочну вечерю
    formulas:
      - text: колядка
        label: фольклорний текст
        explanation: Дає образи, мовну барву і поетичну структуру, але не представляє весь регіон.
      - text: передмова збирача
        label: метод і джерела
        explanation: Показує, хто збирав, з яких місць і чому редакторське втручання небезпечне.
      - text: теоретичний вступ
        label: форма і виконання
        explanation: Пояснює розмір, спів при музиці й входження голосу в мелодію.
      - text: етнографічний опис
        label: локальна послідовність
        explanation: Показує різні ряди страв і назви без перетворення одного списку на закон.
    prompt: Як ці режими захищають регіональну тему від красивих неправд?
    model_answer: >-
      Вони змушують питати, що саме доводить уривок. Колядка дає поетику й
      мовну форму, передмова дає історію збирання, теоретичний вступ пояснює
      спів і ритм, а етнографічний опис показує локальну послідовність страв.
      Разом вони не створюють простий ярлик, а вчать працювати з різними
      типами доказу.

  - id: act-3
    type: ritual-sequencing
    title: Гуцульська коляда як послідовність
    instruction: Упорядкуй обрядову логіку так, щоб трембіта й стрій не стали окремими емблемами без дії.
    steps:
      - Визначити зимовий святковий час і локальний контекст громади.
      - Сформувати гурт і розподілити ролі між провідником, музикантами, співцями та носієм дарів.
      - Зібрати інструменти, одяг, міх або інші речі, потрібні для обходу.
      - Прийти до двору й попросити дозволу або засвідчити прихід господарям.
      - Заспівати величальний або колядковий текст відповідно до ситуації.
      - Прийняти гостину чи дар і подякувати господарям.
      - Перейти до наступного двору, зберігаючи порядок гурту.
      - Пояснити, які елементи є джерельно підтвердженими, а які потребують локальної перевірки.
    correct_order: [0, 1, 2, 3, 4, 5, 6, 7]
    model_answer: >-
      Послідовність показує, що коляда є дією громади. Спершу є час, гурт,
      ролі й речі; потім прихід до двору, дозвіл, спів, дар і перехід далі.
      Останній крок потрібний, бо не кожен сучасний показ або сценічна версія
      має той самий локальний порядок.

  - id: act-4
    type: variant-comparison
    title: Порівняння без костюма
    instruction: Порівняй регіони через умови, функції й джерельні питання.
    prompt: Як говорити про відмінності без перетворення людей на музейні типи?
    variants:
      - label: Полісся
        text: Ліс, вода, дерево, лляна основа, календарні межі, контактність і обережне слово "архаїчний".
        source: північна екологія і локальні практики
      - label: Карпати
        text: Полонина, дерево, худоба, музичний сигнал, ґражда, довга хата, кептар, коломийка і різні групи всередині гірського простору.
        source: Гуцульщина, Бойківщина, Лемківщина
      - label: Поділля і лісостеп
        text: Глина, камінь, садиба, весільні й рушникові практики, ярмарок, хліборобський календар і контактні історії.
        source: матеріал, ритуал і сусідство
      - label: Слобожанщина і Південь
        text: Прикордоння, полковий устрій, степ, порт, море, переселення, кримськотатарська й інша багатокультурна присутність.
        source: історична політика і деколонізація
    features:
      - довкілля
      - матеріал
      - мова
      - обрядова послідовність
      - травма
      - сучасне відродження
    model_answer: >-
      Регіон треба описувати через систему умов. Полісся вимагає лісу, води й
      контактності; Карпати — гір, полонини, дерева й різних етнографічних
      груп; Поділля — глини, садиби, рушника і весільних практик;
      Слобожанщина та Південь — прикордоння, степу, моря, переселень і
      деколонізаційної точності. Так зникає потреба зводити людей до костюма.

workbook:
  - type: critical-analysis
    title: Туристичний ярлик
    instruction: Виправ тезу так, щоб вона не зводила регіон до одного видимого знака.
    target_text: Гуцульщина — це трембіта, кептар і барвистий танець.
    prompt: Що слабке в цій тезі і як сказати точніше?
    questions:
      - Які елементи вона називає правильно, але занадто вузько?
      - Що треба додати про полонину, дерево, господарство, музику й коляду?
      - Чому Гуцульщина не може представляти всі Карпати?
      - Яка точніша теза можлива?
    model_answers:
      - Вона називає впізнавані маркери, але робить із них весь регіон.
      - Треба додати гірське довкілля, худобу, сезонні переходи, ґражду, ремесла, музичну функцію, коломийки й обрядовий порядок.
      - Бо Бойківщина і Лемківщина мають власні хати, говірки, пісенну пам'ять і травматичні історії.
      - Точніше сказати, що трембіта, кептар і танець є видимими входами до складної гуцульської системи довкілля, праці, музики, обряду й матеріальної культури.

  - type: comparative-study
    title: Хата, ґражда, мазанка
    instruction: Порівняй три житлові логіки через матеріал і господарство.
    items_to_compare:
      - "Поліська дерев'яна або зрубна логіка: ліс, дерево, довші господарські прибудови, вода й лісова економіка."
      - "Гуцульська ґражда: замкнений оседок, внутрішній двір, худоба, сіно, дерево, гірська погода і безпека."
      - "Подільська або лісостепова мазанка: глина, хмиз, солома, камінь, білення, щорічний догляд і місцевий матеріал."
    criteria:
      - доступний матеріал
      - план двору
      - господарська функція
      - клімат і рельєф
      - ризик естетичного ярлика
    prompt: Чому жоден тип житла не є "вищим" або "справжнішим" за інші?
    model_answer: >-
      Тип житла відповідає матеріалу, довкіллю і господарству. Дерев'яна хата
      потребує лісу і теслярства, ґражда організує гірський двір із худобою та
      запасами, а мазанка працює з глиною, соломою, хмизом і каменем. Це
      різні технології пристосування, а не шкала культурної вартості.

  - type: critical-analysis
    title: Чи можна цитувати
    instruction: Оціни, чи придатний фрагмент для навчального читання як джерельний текст.
    target_text: |
      На коломийки, оголошувані мною, зложили ся: а) деякі
      передруки; б) цілий ряд рукописів із ріжних околиць, зібраних
      ріжними людьми у ріжні часи.
    prompt: Що робить цей фрагмент придатним або обмеженим для навчального читання?
    questions:
      - Що робить цей фрагмент сильнішим за анонімну інтернет-добірку?
      - "Який тип доказу він дає: сам текст коломийки чи метод збирання?"
      - Чому з нього не можна вивести повний опис усіх коломийок?
      - Як би ти описав безпечне використання такого уривка в уроці?
    model_answers:
      - Є названий упорядник, друковане видання 1905 року і пояснення джерельної бази.
      - Він дає доказ про метод збирання, а не повний корпус самих коломийок.
      - Бо фрагмент говорить про передруки й рукописи, але не описує всі регіони, теми або виконання.
      - Його можна безпечно використати як приклад паспорта джерела і межі висновку.

  - type: critical-analysis
    title: Лемківська пам'ять без фону
    instruction: Перепиши тезу так, щоб вона не перетворювала травму депортації на естетику.
    target_text: Лемківська культура цікава передусім своєю сумною пісенністю і красивою ностальгією.
    prompt: Як сформулювати відповідальніше?
    questions:
      - Що стирає слово "передусім"?
      - Чому не можна використовувати пісню як сумний фон без джерела?
      - Які елементи пам'яті треба назвати поруч із піснею?
      - Яка коректна теза можлива?
    model_answers:
      - Воно стирає говірку, церкви, цвинтарі, топоніми, хати, родинні речі, депортації і сучасні громади.
      - Бо без джерела й історії пісня стає декоративним настроєм, а не голосом спільноти.
      - Село походження, депортацію, церкву, цвинтар, родинну річ, карту переселення і сучасну передачу пам'яті.
      - Лемківську культуру треба читати як регіональну систему мови, місця, обряду, матеріальної пам'яті й травматичного розриву, у якій пісня є важливою, але не єдиною формою.

  - type: critical-analysis
    title: Сучасний фестиваль
    instruction: Виправ тезу так, щоб вона бачила можливості й ризики відродження.
    target_text: Сучасний регіональний фестиваль автоматично показує справжню традицію.
    prompt: Як сказати точніше?
    questions:
      - Що фестиваль може зробити корисного для спадщини?
      - Як він може спростити або продати регіон?
      - Чому слова "автоматично" і "справжню" небезпечні?
      - Які умови роблять фестиваль відповідальнішим?
    model_answers:
      - Він може назвати джерела, громаду, майстрів, місце, історію, травму і сучасних носіїв.
      - Він може звести регіон до сцени, костюма, їжі, сувенірів або настрою без джерельної опори.
      - Вони приховують різницю між реконструкцією, сценою, родинною практикою, комерцією і живою передачею.
      - Відповідальнішим фестиваль стає, коли відокремлює реконструкцію від фантазії, дає слово носіям, називає джерела й не продає травму як декорацію.

  - type: essay-response
    title: Регіон як культурний вузол
    instruction: Напиши доказове есе українською.
    prompt: >-
      У 320-420 словах поясни, чому регіональну етнокультурну традицію треба
      читати як систему, а не як набір маркерів. Використай щонайменше чотири
      опори: довкілля і матеріал, говірка, обрядова послідовність, житло або
      стрій, харчова практика, травма депортації, сучасне відродження, межа
      джерела.
    min_words: 320
    model_answer: >-
      Регіональна етнокультурна традиція не є набором прикрас на мапі. Один
      маркер може допомогти впізнати тему, але не пояснює її. Трембіта без
      полонини, сигналу, музиканта, гурту і святкового або робочого контексту
      перетворюється на сувенір. Рушник без дому, хліба, весілля, покуті,
      майстрині або родинної пам'яті стає тільки орнаментом. Тому регіон
      треба читати як систему довкілля, матеріалу, мови, дії й історії.

      Довкілля задає можливості культури. Полісся не можна зрозуміти без
      лісу, води, дерева, льону, грибів і контактних меж. Карпати потребують
      полонини, худоби, дерев'яної архітектури, музичного сигналу й різних
      груп усередині гірського простору. Поділля й лісостеп говорять через
      глину, камінь, садибу, рушник і хліборобський календар. Південь не є
      порожнім степом, бо там діють море, порт, козацька пам'ять,
      кримськотатарська автохтонна присутність і багато переселенських
      громад.

      Мова також є доказом. Діалектне слово або форма не є помилкою. У
      джерельному уривку їх треба зберігати, а в поясненні перекладати
      сучасною українською. Так само важлива послідовність: колядницький гурт
      має ролі, прихід до двору, спів, дар і перехід далі; коровай проходить
      через руки, піч, пісню, краяння і благословення; хата має браму, сіни,
      піч, покуть, комору, двір і криницю.

      Нарешті, регіональна традиція має історичну пам'ять. Лемківську культуру
      не можна робити красивою ностальгією без депортацій, сіл, церков,
      цвинтарів і родинних речей. Слобожанщину не можна називати просто
      російською окраїною, а Південь — імперською порожнечею. Сучасне
      відродження може бути цінним, якщо називає джерела, громаду і межу
      реконструкції. Отже, регіон як культурний вузол показує не ізольовану
      екзотику, а складну українську цілісність через локальні системи.
