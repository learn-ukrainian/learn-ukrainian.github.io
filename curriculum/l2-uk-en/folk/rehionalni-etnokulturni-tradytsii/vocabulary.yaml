- lemma: етнокультурний регіон
  translation: ethnocultural region
  pos: словосполука
  usage: Етнокультурний регіон треба описувати через джерела, матеріал, мову й дію.
- lemma: регіональна варіантність
  translation: regional variation
  pos: словосполука
  usage: Регіональна варіантність показує різні локальні форми спільної традиції.
- lemma: етнографічна група
  translation: ethnographic group
  pos: словосполука
  usage: Етнографічна група не є ізольованим народом, а має власні локальні ознаки.
- lemma: культурний вузол
  translation: cultural node
  pos: словосполука
  usage: Регіон як культурний вузол поєднує довкілля, працю, мову й пам'ять.
- lemma: джерельна межа
  translation: evidentiary boundary
  pos: словосполука
  usage: Джерельна межа не дозволяє одному прикладові говорити за цілий регіон.
- lemma: паспорт джерела
  translation: source passport
  pos: словосполука
  usage: Паспорт джерела називає видання, збирача, місце, дату й межу висновку.
- lemma: локальна практика
  translation: local practice
  pos: словосполука
  usage: Локальна практика може мати власну послідовність і власні назви.
- lemma: матеріальна культура
  translation: material culture
  pos: словосполука
  usage: Матеріальна культура включає житло, одяг, речі, ремесло й харч.
- lemma: нематеріальна спадщина
  translation: intangible heritage
  pos: словосполука
  usage: Нематеріальна спадщина живе через носіїв, передачу, пам'ять і дію.
- lemma: носій традиції
  translation: tradition bearer
  pos: словосполука
  usage: Носій традиції може бути майстринею, музикантом, родиною або громадою.
- lemma: говірка
  translation: dialect, local speech
  pos: іменник
  usage: Говірка не є помилкою, а територіальним способом говорити.
- lemma: діалектна форма
  translation: dialectal form
  pos: словосполука
  usage: Діалектну форму в джерельному уривку треба пояснювати, а не виправляти.
- lemma: локальна назва
  translation: local name
  pos: словосполука
  usage: Локальна назва страви або речі може показувати регіональну пам'ять.
- lemma: обрядова послідовність
  translation: ritual sequence
  pos: словосполука
  usage: Обрядова послідовність важливіша за окремий предмет без дії.
- lemma: перформативний контекст
  translation: performative context
  pos: словосполука
  usage: Перформативний контекст пояснює, хто співає, коли і для кого.
- lemma: колядницький обхід
  translation: caroling round
  pos: словосполука
  usage: Колядницький обхід має ролі, маршрут, дозвіл, спів і дар.
- lemma: коломийковий розмір
  translation: kolomyika meter
  pos: словосполука
  usage: Коломийковий розмір пов'язує текст із співом і музикою.
- lemma: редакторське втручання
  translation: editorial intervention
  pos: словосполука
  usage: Редакторське втручання може зруйнувати доказовість народного тексту.
- lemma: передрук
  translation: reprint
  pos: іменник
  usage: Передрук треба відрізняти від рукописного або польового запису.
- lemma: рукопис
  translation: manuscript
  pos: іменник
  usage: Рукопис із певної околиці має інший статус, ніж пізня добірка.
- lemma: скансен
  translation: open-air museum
  pos: іменник
  usage: Скансен показує регіональні речі в музейному режимі, а не замінює живу садибу.
- lemma: ґражда
  translation: Hutsul enclosed homestead
  pos: іменник
  usage: Ґражда організує гірський двір, житло, худобу й захист.
- lemma: мазанка
  translation: clay-plastered house
  pos: іменник
  usage: Мазанка працює з глиною, соломою, хмизом і місцевою технікою.
- lemma: довга хата
  translation: long house
  pos: словосполука
  usage: Довга хата показує зв'язок житла, двору й господарства.
- lemma: полонина
  translation: mountain pasture
  pos: іменник
  usage: Полонина важлива для гірського господарства, музики й сезонного руху.
- lemma: прикордоння
  translation: borderland
  pos: іменник
  usage: Прикордоння треба читати без імперського центру і без стирання сусідів.
- lemma: переселення
  translation: resettlement
  pos: іменник
  usage: Переселення може розірвати зв'язок між піснею, селом і родинною річчю.
- lemma: депортація
  translation: deportation
  pos: іменник
  usage: Депортація є історичною травмою, а не декоративним фоном для пісні.
- lemma: операція Вісла
  translation: Operation Vistula
  pos: власна назва
  usage: Операція Вісла змінила лемківську, бойківську й іншу пам'ять місця.
- lemma: травматична пам'ять
  translation: traumatic memory
  pos: словосполука
  usage: Травматична пам'ять потребує точності, джерела й поваги до носіїв.
- lemma: імперська назва
  translation: imperial name
  pos: словосполука
  usage: Імперська назва може приховувати українські й локальні шари.
- lemma: туристичний ярлик
  translation: tourist label
  pos: словосполука
  usage: Туристичний ярлик робить регіон упізнаваним, але спрощує людей.
- lemma: екзотизація
  translation: exoticization
  pos: іменник
  usage: Екзотизація перетворює локальну культуру на яскраву декорацію.
- lemma: сценічна версія
  translation: staged version
  pos: словосполука
  usage: Сценічна версія може бути корисною, але не є польовим записом.
- lemma: реконструкція
  translation: reconstruction
  pos: іменник
  usage: Реконструкція має називати джерело і межу відновлення.
- lemma: родинна пам'ять
  translation: family memory
  pos: словосполука
  usage: Родинна пам'ять зберігає речі, пісні, назви сіл і спосіб дії.
- lemma: музейна медіація
  translation: museum mediation
  pos: словосполука
  usage: Музейна медіація пояснює предмет, але змінює його життєвий контекст.
- lemma: контактна зона
  translation: contact zone
  pos: словосполука
  usage: Контактна зона поєднує мови, віри, ремесла, торгівлю і пам'ять.
- lemma: межа узагальнення
  translation: limit of generalization
  pos: словосполука
  usage: Межа узагальнення не дає одному уривку стати законом для всієї України.
- lemma: сучасне відродження
  translation: contemporary revival
  pos: словосполука
  usage: Сучасне відродження потребує носіїв, джерел і чесного пояснення реконструкції.
