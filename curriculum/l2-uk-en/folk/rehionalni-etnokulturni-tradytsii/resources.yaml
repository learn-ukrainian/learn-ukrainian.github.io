- title: Регіональні етнокультурні традиції
  role: textbook
  source_ref: Регіональні етнокультурні традиції
  notes: >-
    Дослідницький матеріал для теми; використано як основу для регіональної
    рамки, деколонізаційних застережень, джерельної межі, матеріальної
    культури, говірок, виконання й сучасного відродження.
- title: Енциклопедія українознавства
  role: textbook
  source_ref: Регіональні етнокультурні традиції
  notes: >-
    Корпусна опора для обережного пояснення етнографічних груп, неусталених
    меж Полісся, регіональної архітектури, вишивки, говірок і історичних назв.
- title: Коломийки. Том I
  author: Володимир Гнатюк
  role: textbook
  source_ref: Регіональні етнокультурні традиції
  notes: >-
    Публічнодоменне видання 1905 року; використано для on-site читань про
    джерельну методику, рукописи з різних місцевостей, редакторську
    обережність, коломийковий розмір і спів при музиці. Повний скан
    використовується як допоміжне джерело, а не як публічне посилання для учня.
- title: Як ще не було початку світа
  author: Народна творчість
  role: reading
  url: https://www.ukrlib.com.ua/narod/printout.php?id=5&bookid=2
  notes: >-
    Публічний текст космогонічної колядки; використано як on-site читання про
    образ моря, явора, птахів і мовну форму "лем" без осучаснення джерела.
- title: Історія української літератури
  author: Михайло Грушевський
  role: reading
  url: http://litopys.org.ua/hrushukr/hrush106.htm
  notes: >-
    Публічнодоменна сторінка з праці Грушевського; використано для
    навчального уривка про гуцульську і самбірську святочну вечерю та межу
    між локальним рядом страв і узагальненням.
- title: Національний музей народної архітектури та побуту України
  author: Національний музей народної архітектури та побуту України
  role: textbook
  source_ref: Регіональні етнокультурні традиції
  notes: >-
    Офіційний сайт музею просто неба; використовувати як сучасну рамку для
    регіональної експозиції житла, двору, господарства й матеріальної
    культури, не як замінник живої садиби.
- title: Музей народної архітектури і побуту у Львові імені Климентія Шептицького
  author: Шевченківський гай
  role: textbook
  source_ref: Регіональні етнокультурні традиції
  notes: >-
    Офіційний сайт західноукраїнського скансену; корисний для порівняння
    Гуцульщини, Бойківщини, Лемківщини, Буковини, Покуття, Поділля і
    Закарпаття в музейному режимі.
- title: Culture of Ukrainian borscht cooking
  author: UNESCO Intangible Cultural Heritage
  role: textbook
  source_ref: Регіональні етнокультурні традиції
  url: https://ich.unesco.org/en/USL/culture-of-ukrainian-borscht-cooking-01852
  notes: >-
    Офіційна сторінка ЮНЕСКО; використати як приклад сучасної публічної рамки
    спадщини, де українська практика названа й охороняється без потреби
    заперечувати споріднені практики сусідів.
- title: Лемки
  author: Українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/%D0%9B%D0%B5%D0%BC%D0%BA%D0%B8
  notes: >-
    Оглядова навігаційна сторінка для первинного орієнтування; твердження про
    депортації, говірку й території треба звіряти з фаховими джерелами.
