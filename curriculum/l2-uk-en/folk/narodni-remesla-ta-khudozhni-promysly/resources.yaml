- title: Народні ремесла та художні промисли
  role: textbook
  source_ref: Народні ремесла та художні промисли
  notes: >-
    Планова рамка і дослідницькі матеріали для теми; використано як доказову
    основу для класифікації ремесла, домашнього промислу, художнього промислу,
