version: "1.0"
module: narodni-remesla-ta-khudozhni-promysly
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Три режими праці
    instruction: Розрізни близькі поняття за масштабом, функцією і способом передавання.
    prompt: Чому ремесло, домашній промисел і художній промисел не є взаємозамінними назвами?
    variants:
      - label: Ремесло
        text: Виробнича майстерність, через яку людина робить потрібну річ з матеріалу й інструмента.
        source: техніка і фах
      - label: Домашній промисел
        text: Праця, пов'язана з родиною, сезоном, господарством, замовленням або ярмарком.
        source: побут і дрібний ринок
      - label: Художній промисел
        text: >-
          Ужиткова річ або техніка, що має локальну мистецьку мову, школу,
          інституційну рамку й публічну видимість.
        source: мистецька й організаційна рамка
    features:
      - матеріал
      - інструмент
      - функція речі
      - спосіб навчання
      - ринок або інституція
      - локальна школа
    model_answer: >-
      Ремесло називає фахову виробничу дію, домашній промисел підкреслює
      родинно-господарський і сезонний режим праці, а художній промисел
      показує, що ужиткова річ має мистецьку мову, осередок і часто
      інституційну підтримку. Якщо ці слова змішати, зникає різниця між
      фахом, хатнім заробітком і публічно визнаною школою.

  - id: act-2
    type: motif-formula
    title: Матеріал перед символом
    instruction: Прочитай мотиви як обережний інвентар, а не як готовий словник значень.
    passage: |-
      птах на косівській кахлі
      зернятко в петриківському розписі
      хвиляста лінія на гончарному посуді
      розета на дереві
      рапорт у килимі
    formulas:
      - text: птах на косівській кахлі
        label: сюжет і осередок
        explanation: Потрібно назвати Косів, керамічну техніку, композицію і джерело, а не одразу універсальне значення.
      - text: зернятко в петриківському розписі
        label: мазок і школа
        explanation: Мотив починається з руху пензля або пальця, а не з абстрактної символічної таблиці.
      - text: хвиляста лінія на гончарному посуді
        label: поверхня і ритм
        explanation: Лінія може організовувати форму посудини, але її значення залежить від зразка й осередку.
      - text: розета на дереві
        label: різьблена геометрія
        explanation: Розету треба читати разом із предметом, технікою різьблення і функцією речі.
      - text: рапорт у килимі
        label: повтор і межа
        explanation: Повтор може бути композиційною дисципліною, а не лише знаком із фіксованим тлумаченням.
    prompt: Як говорити про орнамент без вигаданого словника символів?
    model_answer: >-
      Треба почати з матеріалу, техніки, осередку і предмета. Птах, зернятко,
      хвиляста лінія, розета або рапорт можуть мати символічне поле, але
      значення залежить від кераміки, розпису, дерева, килима, регіону, дати й
      джерела. Обережне читання не скасовує символіку, а ставить їй межу.

  - id: act-3
    type: ritual-sequencing
    title: Гончарна послідовність
    instruction: Упорядкуй технологічну логіку без перетворення її на єдиний закон для всіх осередків.
    steps:
      - Добути глину й очистити її від камінців або домішок.
      - Перемішати й довести глину до пластичності.
      - Центрувати глину на крузі й сформувати посудину.
      - Підсушити виріб і доробити деталі, якщо форма цього потребує.
      - Нанести ангоб, розпис, ритований контур або поливу залежно від локальної техніки.
      - Поставити виріб у горно й випалити за потрібного температурного режиму.
      - Прочитати готову річ через функцію, осередок, майстра і ринок.
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    model_answer: >-
      Гончарна річ проходить шлях від глини до випалу, а потім входить у
      побут, ярмарок, музей або сучасну майстерню. Послідовність допомагає
      бачити технологію, але конкретні деталі залежать від осередку: Опішня,
      Косів чи інша школа мають власну поверхню, орнамент і соціальну історію.

workbook:
  - type: critical-analysis
    title: Не трипільський код
    instruction: Виправ тезу так, щоб вона не підміняла історичну обережність красивою безперервністю.
    target_text: Кожний сучасний український глечик прямо зберігає незмінний трипільський код.
    prompt: Що в цій тезі занадто сильне і як сформулювати її точніше?
    questions:
      - Чому слово "кожний" створює проблему?
      - Що справді можна сказати про давні керамічні традиції?
      - Чому локальні школи пізнішого часу потребують окремого пояснення?
      - Як не втратити спадкоємність, але не вигадати її?
    model_answers:
      - Воно приписує одну пряму лінію всім сучасним виробам, незалежно від осередку, техніки й часу.
      - На українських землях існували давні практики кераміки й орнаменту.
      - Опішня, Косів, Бубнівка або Поділля розвивалися в конкретних соціальних і технологічних умовах.
      - Точніше говорити про давній матеріальний горизонт і пізніші локальні школи, а не про незмінний код.

  - type: comparative-study
    title: Опішня і Косів
    instruction: Порівняй два керамічні осередки без перетворення одного на норму для всіх.
    items_to_compare:
      - "Опішня: Полтавщина, гончарний посуд, зооморфні форми, ярмарковий шар, артіль і завод XX століття, сучасний музейний контекст."
      - "Косів: Гуцульщина, мальована кераміка, ритований контур, зелено-жовто-коричнева палітра, сюжетність, ЮНЕСКО 2019."
    criteria:
      - матеріал і техніка
      - регіональний осередок
      - типові предмети
      - інституційний шар
      - ризик спрощення
    prompt: Чому обидва осередки не можна звести до слова "українська кераміка"?
    model_answer: >-
      Обидва осередки працюють із глиною, але мають різні регіональні мови.
      Опішня важлива для Полтавщини, ярмаркового й заводського шару,
      зооморфних форм і музейної керамології. Косів важливий для гуцульської
      мальованої кераміки, ритованого контуру, сюжетності й міжнародного
      режиму охорони живої традиції. Узагальнення стирає матеріал, регіон і
      історію інституцій.

  - type: critical-analysis
    title: Радянська артіль без чорно-білого сюжету
    instruction: Перепиши тезу так, щоб вона бачила і підтримку, і стандартизацію.
    target_text: Радянські артілі тільки знищили народні промисли.
    prompt: Як сказати точніше?
    questions:
      - Чому слово "тільки" робить тезу слабкою?
      - Що артіль або фабрика могли дати майстрові?
      - Що вони могли змінити або спростити?
      - Як оцінювати конкретний виріб або осередок?
      - Яка збалансована теза можлива?
    model_answers:
      - Воно не залишає місця для реальної праці, зарплати, матеріалів, навчання й виставок.
      - Вони могли дати збут, організацію, інструменти, матеріали, робоче місце і публічну видимість.
      - Вони могли стандартизувати форму, змінити асортимент, підпорядкувати виріб плану або сувенірному ринку.
      - Треба дивитися на локальну граматику форми, авторський жест, серійність і роль інституції.
      - Радянська інфраструктура могла підтримувати виробництво й водночас нівелювати місцеві традиції.

  - type: comparative-study
    title: Ліс, вовна, глина, метал
    instruction: Порівняй ремесла за матеріалом, а не за декоративністю.
    items_to_compare:
      - "Гутництво: пісок, поташ, ліс, піч, склодувна трубка, короткий час формування скла."
      - "Килимарство: вовна, прядіння, барвник, основа, уток, рапорт, майстерня і ринок."
      - "Бондарство: дерево, клепки, дно, обручі, герметичність і господарська функція."
      - "Ковальство: горно, метал, молот, гартування, знаряддя, завіси, підкови й ковані деталі."
      - "Лозоплетіння: прут, заготівля, вимочування, дно, стояки, край і ручка."
    criteria:
      - сировина
      - інструмент
      - ризик помилки
      - функція речі
      - чому це не проста прикраса
    prompt: Як матеріал змінює мову ремесла?
    model_answer: >-
      Матеріал задає темп, жест і межу помилки. Скло вимагає швидкого
      формування біля жару, вовна потребує довгого текстильного циклу, дерево
      в бондарстві мусить тримати об'єм і вологу, метал слухається коваля лише
      після нагрівання, а лоза потребує правильної гнучкості. Тому ремесло не
      можна оцінювати тільки за орнаментом: техніка і функція так само
      важливі, як поверхня.

  - type: critical-analysis
    title: Сувенір не завжди зрада
    instruction: Виправ тезу так, щоб вона не створювала просту бінарність між "старим" і "сучасним".
    target_text: Справжнє ремесло існує тільки в старій хаті, а музей, фестиваль і майстер-клас усе псують.
    prompt: Як сформулювати обережніше?
    questions:
      - Чому "тільки" і "все" роблять тезу нечутливою до реальних носіїв?
      - Що музей може зберегти?
      - Що фестиваль або майстер-клас можуть спростити?
      - Що означає відповідальна сучасна передача?
    model_answers:
      - Вони не бачать живої традиції, яка може перейти в музей, школу, приватну майстерню або публічний простір.
      - Музей може зберегти предмет, атрибуцію, осередок, техніку й пам'ять майстра.
      - Вони можуть спростити техніку до видовища або легкого сувеніра без джерела.
      - Вона називає осередок, майстра, матеріал, техніку й межу того, що справді передається.

  - type: essay-response
    title: Річ, рука й інституція
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому народні ремесла та художні промисли не
      можна звести до декоративного списку предметів. Використай щонайменше
      три опори: матеріал і техніка, домашній промисел, артіль або фабрика,
      конкретний осередок, ЮНЕСКО й охорона нематеріальної спадщини, регіональна конкретність або
      сучасний ринок.
    min_words: 260
    model_answer: >-
      Народні ремесла та художні промисли не можна звести до декоративного
      списку, бо кожна річ має матеріальну й соціальну біографію. Глечик
      починається не з красивої форми, а з глини, очищення, круга, сушіння,
      розпису, поливи й випалу. Килим починається з вовни, прядіння, барвника,
      основи, утоку і ритму повтору. Кошик залежить від часу заготівлі лози,
      дна, стояків і краю, а кожух - від шкіри, хутра, крою й клімату. Якщо
      бачити тільки орнамент, зникає праця руки.

      Так само важливий спосіб передавання. Домашній промисел жив у родині,
      сезоні, замовленні й ярмарку. Майстерність могла переходити від батька
      до сина або від майстрині до дитини без формального уроку. Але були й
      цехи, училища, артілі, фабрики, музеї та сучасні майстер-класи. Радянська
      артіль могла дати роботу, матеріали й збут, але могла стандартизувати
      форму, змінити асортимент і зробити локальну мову зручнішою для плану
      або сувенірного ринку. Тому її не можна оцінювати одним словом.

      Конкретний осередок також змінює аналіз. Опішня пов'язана з Полтавщиною,
      гончарством, ярмарковим і заводським шаром, музеєм і сучасною
      керамологією. Косівська мальована кераміка має гуцульську сюжетність,
      ритований контур і визнання ЮНЕСКО 2019 року. Петриківський розпис має
      власну школу мазка й визнання ЮНЕСКО 2013 року. Ці факти показують, що
      традиція сьогодні охороняється як жива практика носіїв, а не лише як
      старий експонат. Саме тому уважне читання ремесла починається з питання:
      який матеріал, який майстер, який осередок, яка інституція і яка межа
      джерела?
