- id: act-1
  type: ritual-sequencing
  title: Раннє закликання весни
  instruction: Закликання весни — перший етап весняного календарного циклу. Постав дії дівчат-виконавиць у правильній послідовності.
  items:
  - Співають формулу-закличку до гоголя чи жайворонка, просячи принести літо
  - Переходять до весняних ігор і хороводів на вигоні або вулиці
  - Виходять на високе місце (пагорб, вигін) рано-вранці
  - Імітують прихід тепла й пробудження природи через рухові акти
  correct_order:
  - 2
  - 0
  - 3
  - 1
  steps:
  - Виходять на високе місце (пагорб, вигін) рано-вранці
  - Співають формулу-закличку до гоголя чи жайворонка, просячи принести літо
  - Імітують прихід тепла й пробудження природи через рухові акти
  - Переходять до весняних ігор і хороводів на вигоні або вулиці
  model_answer: 'Закликання починалося на Благовіщення або з появою перших птахів: дівчата піднімалися на пагорби, щоб їхні голоси лунали далеко, співали заклички («Ой вилинь, вилинь, гоголю»), імітували прихід літа, і лише після цього переходили до масових хороводів на вигонах.'
- id: act-2
  type: motif-formula
  title: Рослинне завивання й синкретизм
  prompt: У гаївці про завивання горошку поєднано рух і рослинний ріст. Знайди у тексті формули й поясни, як у них поєднуються дохристиянські й християнські образи.
  passage: Вийся, горошку, в три струмочка, а роди, Боже, в штири, в штири, щоб тебе черви не точили.
  text: Вийся, горошку, в три струмочка, а роди, Боже, в штири, в штири, щоб тебе черви не точили.
  formulas:
  - завивання — «Вийся, горошку, в три струмочка»
  - християнське звернення — «роди, Боже»
  - аграрне заклинання — «щоб тебе черви не точили»
  answers:
  - завивання → «Вийся, горошку» (символ росту й танцю)
  - християнський пласт → «роди, Боже» (формула благословення)
  - аграрна імітація → «щоб черви не точили» (бажаний результат)
  model_answer: 'Формула показує синкретизм: дохристиянське аграрне закликання («вийся, горошку», «щоб черви не точили») поєднується з християнським зверненням («роди, Боже»). Рух дівчат у танці відтворює плетіння й завивання горошку, закликаючи ріст рослини, а християнська формула входить в аграрний текст для підсилення обрядової сили слова.'
- id: act-3
  type: ritual-sequencing
  title: Великодній гаївковий простір
  instruction: Великодня гаївка має свій чіткий просторовий і дійовий сценарій. Постав етапи обряду в правильному порядку.
  items:
  - Хор виконує рухову гру «При долині мак» або «Кострубонько»
  - Дівчата виходять на цвинтар або церковне подвір'я після служби
  - Учасниці розходяться для парування й вечірніх молодіжних ігор
  - Провідниця виводить «Кривий танець» луками навколо церкви чи каменів
  correct_order:
  - 1
  - 3
  - 0
  - 2
  steps:
  - Дівчата виходять на цвинтар або церковне подвір'я після служби
  - Провідниця виводить «Кривий танець» луками навколо церкви чи каменів
  - Хор виконує рухову гру «При долині мак» або «Кострубонько»
  - Учасниці розходяться для парування й вечірніх молодіжних ігор
  model_answer: 'Гаївки відбуваються біля церкви: після богослужіння дівчата збираються на церковному подвір''ї, виводять лінійний кривий танець без кінця, розігрують драматизовані ігри про мак чи смерть-воскресіння Коструба, що врешті переходить у молодіжне парування.'
- id: act-4
  type: variant-comparison
  title: Веснянка чи гаївка?
  prompt: Порівняй два весняні жанри за їхніми регіональними, часовими та просторовими ознаками.
  features:
  - Регіональне поширення
  - Час виконання
  - Простір виконання
  - Обрядова логіка
  variants:
  - label: Веснянка
    text: 'Регіональне поширення — Волинь, Поділля, Наддніпрянщина; час виконання — від ранньої весни (появи птахів) до Зелених свят; простір виконання — вулиці, пагорби, поля; обрядова логіка — ширший календарний обряд закликання тепла й початку польових робіт.'
  - label: Гаївка (гагілка / ягілка)
    text: 'Регіональне поширення — Галичина, Західна Україна; час виконання — переважно у великодній період; простір виконання — церковне подвір''я, цвинтар; обрядова логіка — великодній синкретичний обряд, де радість весни поєднується з пам''яттю роду (поминками).'
  model_answer: 'Веснянки — ширша назва для Волині та Наддніпрянщини, тривають від Благовіщення до Зелених свят. Гаївки — західноукраїнське явище великоднього циклу, локалізоване біля церкви й пов''язане з пам''яттю предків. Обидва жанри тримають солярний календарний перехід, але мають різну організацію практики.'
- id: act-5
  type: motif-formula
  title: Кострубонько — смерть і відродження
  prompt: Гаївка про Кострубонька містить мотив оплакування та радісного повернення персонажа. Знайди у тексті формули й поясни, як вони втілюють ідею сезонів.
  passage: Прийди, прийди, Кострубонько... Ожив, ожив наш Кострубонько, ожив, ожив наш голубонько!
  text: Прийди, прийди, Кострубонько... Ожив, ожив наш Кострубонько, ожив, ожив наш голубонько!
  formulas:
  - закликання дівчини — «Прийди, прийди, Кострубонько, стану я з тобою до шлюбоньку!»
  - оплакування — повідомлення хору про смерть Коструба
  - радісний рефрен оживання — «Ожив, ожив наш Кострубонько!»
  answers:
  - закликання → дівчина кличе Коструба до шлюбу
  - смерть → оплакування померлого Коструба
  - відродження → радісний спів про те, що він ожив
  model_answer: 'Образ Коструба втілює вегетаційні цикли оновлення природи. Смерть і оплакування — це прощання з зимовим сном або старим сезоном, а радісний вигук «Ожив, ожив на голубонько!» позначає остаточне пробудження природи та перехід молоді до весняно-літнього парування.'
- id: act-6
  type: performance
  title: Виконай веснянку-закличку
  prompt: Прочитай або заспівай фрагмент веснянки-заклички про гоголя, витримуючи рівномірний ритм та інтонацію ритуального прикликання. Не осучаснюй фонетичні форми.
  fragment: Ой вилинь, вилинь, гоголю, винеси літо з собою, винеси літо-літечко, зеленеє житечко, хрещатенький барвіночок, запашненький васильочок!
  self_check:
  - Чи зберіг я архаїчний ритмічний малюнок?
  - Чи звучав мій голос як заклик-вітання, а не як побутовий наказ?
  - Чи витримав я урочистий, обрядовий характер вимови?
  self_checklist:
  - Архаїчний ритм збережено
  - Інтонація заклику-вітання витримана
  - Урочистість вимови відповідає обрядовій дії
  show_record_button: true
  model_answer: 'Добре виконання тримає чітку ритміку (двоколінні рядки), не згладжує архаїчні форми та передає інтонацію звернення до птаха як бажаного гостя й носія літа, а не як сухого об''єкта.'
