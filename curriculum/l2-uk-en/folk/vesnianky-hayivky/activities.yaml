- id: act-1
  type: motif-formula
  title: Як веснянка кличе
  instruction: Познач формули, які роблять уривок не описом природи, а звертанням і відповіддю громади.
  passage: |
    Ой весна, весна, ти красна,
    Що ж ти нам, весна, принесла?
    Та принесла я вам літечко,
    Щоб родилося житечко
    Ще й червонії квіточки,
    Щоб, квітчалися дівочки.
  formulas:
    - text: "Ой весна, весна"
      label: звертання
      explanation: Повтор називає адресата й робить початок придатним для гуртового голосу.
    - text: "Що ж ти нам"
      label: спільне питання
      explanation: Займенник "нам" показує громаду, а не приватного мовця.
    - text: "літечко / житечко / квіточки"
      label: сезонні дари
      explanation: Весна відповідає конкретними дарами літа, зерна й квітів.
  prompt: Напиши 80-100 слів про те, чому цей уривок є діалогом, а не лише пейзажем.
  model_answer: |
    Уривок є діалогом, бо весну не просто названо як пору року. До неї звертаються повтором "Ой весна, весна", а потім питають, що вона принесла громаді. Займенник "нам" важливий: говорить не приватне "я", а гуртовий голос. Весна відповідає конкретними дарами - літом, житом, квітами й співом. Тому текст не є статичним пейзажем. Він будує сцену звертання, відповіді й очікування нового сезону.

- id: act-2
  type: variant-comparison
  title: Три весняні дії
  instruction: Порівняй три публічні тексти і не зводь їх до одного сюжету.
  variants:
    - label: "Ой весна, весна, ти красна"
      source: "vesnianka-oi-vesna-vesna-ty-krasna"
      text: "діалог із весною, дари літа, жита, квітів і співу"
      region: публічний текст Ukrlib
    - label: "Ой виорю я нивку широкую"
      source: "vesnianka-oi-vyoriu-nyvku-shyroku"
      text: "поле, хміль, гостина, багата й убога сестра"
      region: публічний текст Ukrlib
    - label: "Розлилися води на чотири броди"
      source: "vesnianka-rozlylysia-vody-na-chotyry-brody"
      text: "броди, рефрен до дівчат, птах, риба, соловей і нелюб"
      region: публічний текст Ukrlib
  features:
    - Який адресат або голос організує текст?
    - Який весняний образ є доказом у рядках?
    - Чи є тут рух, повтор або приспів?
    - Чому ці тексти не можна звести до одного сюжету?
  prompt: Напиши 120-150 слів про те, як різні публічні тексти розширюють уявлення про веснянку.
  model_answer: |
    Три тексти показують, що веснянка не має одного сюжету. "Ой весна, весна, ти красна" будує діалог із весною і питає про її дари громаді. "Ой виорю я нивку широкую" починається з поля й сівби, але швидко переходить до родинної та соціальної сцени. "Розлилися води" працює через броди, птахів, рибу, солов'я і повторний приспів до дівчат. Усі тексти належать до весняного циклу, але їхня дія різна. Саме тому треба читати кожен текст окремо.

- id: act-3
  type: ritual-sequencing
  title: Як читати ситуацію гаївки
  instruction: Упорядкуй кроки аналізу так, щоб не вигадувати виконання, але бачити його слід у тексті.
  steps:
    - Назвати публічне джерело і жанрову назву.
    - Знайти календарний час або сезонний знак.
    - "Визначити адресата: весна, гурт, дівчата, родина, поле."
    - Показати повтор, приспів, питання або паралелізм.
    - "Обережно припустити можливу виконавську ситуацію: гурт, коло, гра, великодній простір."
    - "Сформулювати межу доказу: що доводить цей запис, що потребує іншого джерела."
  correct_order: [1, 2, 3, 4, 5, 6]
  model_answer: |
    Сильний порядок починається з джерела й жанру, переходить до сезонного знака, адресата і повтору, а вже потім обережно говорить про виконання. Так учень не вигадує обряд за одним словом, але й не читає веснянку як мовчазний пейзаж.

- id: act-4
  type: performance
  title: Прочитати приспів як рух
  instruction: Прочитай уривок уголос так, щоб рефрен повертав гурт до весни після кожного образу.
  prompt: "Підготуй читання уривка: назви перший образ, потім повертай рефрен однаковим темпом і поясни, чому це не прозовий переказ."
  fragment: |
    Розлилися води на чотири броди.
    Гей, дівки, весна красна, зілля зелененьке.
    Що в першому броді зозуленька кує,
    Гей, дівки, весна красна, зілля зелененьке.
  self_check:
    - Чи названо публічний текст і жанр веснянки?
    - Чи перший рядок відкриває простір води й бродів?
    - Чи рефрен повертається однаковим темпом?
    - Чи не додано рядків поза публічним текстом?
  model_answer: |
    У виконанні перший рядок варто вимовити як відкриття простору: вода розійшлася на чотири броди. Рефрен "Гей, дівки..." треба повертати рівно й виразно, ніби він знову збирає гурт. Тоді слухач чує не тільки перелік образів, а й повторну весняну формулу.

- id: act-5
  type: essay-response
  title: Межа доказу
  prompt: |
    Напиши 180-220 слів: чому в цьому уроці використано три різні публічні тексти Ukrlib, але не використано помилково рубриковану історичну пісню або дубль "Ой весна"? Поясни, як це пов'язано з джерельною етикою.
  model_answer: |
    Для цього уроку важливо не просто зібрати якомога більше сторінок із рубрики "Веснянки", а перевірити, чи кожна сторінка справді працює для теми. "Ой весна, весна, ти красна", "Ой виорю я нивку широкую" і "Розлилися води на чотири броди" дають різні весняні тексти: діалог із весною, поле й родинну сцену, воду й приспів. Вони мають відкриті посилання на Ukrlib і можуть бути відкриті учнем. Натомість "Ой з-за гори високої" в цій рубриці фактично є історичною піснею про Данила Нечая, тому її не треба штучно включати до веснянок. "Що ж ти нам, весна, принесла" дублює текст "Ой весна", тому не рахується окремим текстом. Такий відбір є джерельною етикою: урок не збільшує кількість текстів заради красивого числа, а чесно називає, що саме доведено публічним джерелом.
  rubric:
    - criteria: Публічні тексти
      description: Названо три використані тексти і показано, чим вони різняться.
    - criteria: Межа джерела
      description: Пояснено, чому історична пісня про Данила Нечая і дубль "Ой весна" не рахуються окремими текстами цього уроку.
    - criteria: Джерельна етика
      description: Зроблено висновок про чесну межу доказу без штучного збільшення добірки текстів.
