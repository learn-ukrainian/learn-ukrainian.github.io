- lemma: веснянка
  translation: calendar-ritual song of the spring cycle performed to call warmth and awaken nature
  pos: noun
  usage: Веснянка виконувалася для закликання тепла та пробудження природи.
- lemma: гаївка
  translation: type of spring song of the Easter cycle performed in groves near churches, often with games and circle dances
  pos: noun
  usage: Гаївка великоднього циклу виконувалася на церковному подвір'ї.
- lemma: закличка
  translation: spring ritual invocation song — an invitation to spring, birds, and warmth to come
  pos: noun
  usage: Закличка звернена до птахів як безпосередніх носіїв літа.
- lemma: хоровод
  translation: ritual circle dance symbolizing the sun and community unity
  pos: noun
  usage: Хоровод символізує сонячне коло та єдність громади.
- lemma: персоніфікація
  translation: personification; attribution of human characteristics to abstract concepts or natural phenomena
  pos: noun
  usage: Персоніфікація весни та птахів властива обрядовим текстам.
- lemma: обрядовість
  translation: ritual system; system of ritual actions connected to calendar cycles or life transitions
  pos: noun
  usage: Весняна обрядовість пов'язана з початком господарського року.
- lemma: синкретизм
  translation: syncretism; combination of pre-Christian ritual and Christian elements in a single text or rite
  pos: noun
  usage: Взаємодія весняних закликів і Великодня показує обрядовий синкретизм.
- lemma: паралелізм
  translation: parallelism; syntactic repetition to emphasize thought or link natural and human spheres
  pos: noun
  usage: Паралелізм часто з'єднує рух природи з долею людини.
- lemma: калина
  translation: guelder rose (often a symbol of beauty, youth, and Ukraine)
  pos: noun
  usage: Кривий танець веде дівчат то в ружу, то в калину.
- lemma: автохтонний
  translation: autochthonous, indigenous; of native origin, not borrowed
  pos: adj
  usage: Етнографи довели автохтонний характер великодніх гаївок.
- lemma: гагілка
  translation: regional variant name for a spring Easter song/game
  pos: noun
  usage: Регіональна назва гагілка живе в народних піснях Галичини.
- lemma: ягілка
  translation: regional variant name for a spring Easter song/game
  pos: noun
  usage: Назва ягілка зафіксована у словниках та народній спадщині.
- lemma: Кострубонько
  translation: mythological figure in a spring game representing vegetation, death, and rebirth
  pos: noun
  usage: Обрядова гра про Кострубонька містить мотив оживання.
- lemma: завивання
  translation: winding/plaiting (e.g. of plants/wreaths in circle dances)
  pos: noun
  usage: Завивання горошку в хороводі імітує ріст рослини.
