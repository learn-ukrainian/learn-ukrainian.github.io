- id: act-1
  type: motif-formula
  title: Діалог із Купайлом
  instruction: Познач формули, які роблять коротку пісню діалогом і календарною сценою.
  passage: |
    — Купайло, Купайло!

    Де ти зимувало?

    — Зимувало в лісі.

    Ночувало в стрісі*.

    Зимувало в пір'ячку.

    Літувало в зіллячку.
  formulas:
    - text: "— Купайло, Купайло!"
      label: звертання
      explanation: Повтор імені відкриває текст як адресу до спільного літнього знака.
    - text: "Де ти зимувало?"
      label: питання
      explanation: Пісня не описує здалеку, а ставить питання і чекає відповіді.
    - text: "Зимувало / Літувало"
      label: сезонний рух
      explanation: Два дієслова переводять слухача від зими до літа.
  prompt: Напиши 80-100 слів про те, як цей уривок працює через звертання, питання і повтор.
  model_answer: |
    Уривок працює як діалог, бо починається зі звертання "Купайло, Купайло!" і ставить пряме питання "Де ти зимувало?". Відповідь повторює "зимувало", але щоразу додає інше місце або предметну деталь: ліс, стріху, пір'ячко. Наприкінці з'являється "літувало в зіллячку", і текст переходить від зимового прихистку до літньої зелені. Сила уривка не в довгому поясненні, а в короткій послідовності голосу, місця і повтору.

- id: act-2
  type: ritual-sequencing
  title: Source-first порядок аналізу
  instruction: Упорядкуй кроки так, щоб аналіз русальної або купальської пісні починався з публічного тексту.
  steps:
    - Відкрити public reading і назвати URL джерела.
    - Знайти в уривку адресата, питання або прохання.
    - "Виписати предметні слова: береза, намітка, сорочка, стріха, кінь, ворота."
    - Визначити повтор або паралельну будову.
    - "Назвати календарну рамку: Зелені свята, Трійця або Івана Купала."
    - Сформулювати межу доказу для саме цього запису.
  correct_order: [1, 2, 3, 4, 5, 6]
  model_answer: |
    Сильний порядок починається не з готового пояснення, а з public reading. Спершу треба показати рядок і джерело, потім побачити адресу, предмети, повтор і лише після цього назвати календарну рамку. Останній крок - межа доказу: цей запис підтримує конкретний висновок, але не замінює всі купальські або русальні пісні.

- id: act-3
  type: variant-comparison
  title: Дві версії на одній public page
  instruction: Порівняй адаптовану й неадаптовану частини "А де наше Купайло стояло" без висновку про одну остаточну форму.
  variants:
    - label: Адаптована версія
      text: Адаптована частина має сучаснішу пунктуацію, малі літери в назвах світил і рядок про Миколу; див. full reading.
      region: public Ukrlib page
      source: https://www.ukrlib.com.ua/books/printit.php?tid=20461
    - label: Неадаптована версія
      text: Неадаптована частина зберігає інший правопис назв світил і рядка про Миколу; див. full reading.
      region: public Ukrlib page
      source: https://www.ukrlib.com.ua/books/printit.php?tid=20461
  features:
    - Великі літери
    - Назва сонця
    - Пунктуація
    - Повтор рядка про Миколу
  prompt: Напиши 100-130 слів про те, як варіантність допомагає читати текст уважніше.
  model_answer: |
    Дві версії показують, що public page може зберігати не тільки один згладжений текст. В адаптованій версії бачимо сучаснішу пунктуацію і звичніші малі літери. У неадаптованій частині збережено великі літери в кількох словах, інший запис назви сонця і рядка про Миколу, а пунктуація інша. Це не означає, що одна версія має витіснити другу. Для семінару важливо описати різницю, пояснити, як вона впливає на читання, і не робити висновку про всю традицію з однієї сторінки.

- id: act-4
  type: performance
  title: Голос і пауза
  instruction: Підготуй коротке читання русального уривка, не додаючи жодного слова поза джерелом.
  fragment: |
    Сиділа русалка на білій березі,

    Просила русалка в жіночок намітки:

    — Жіночки-сестрички,

    Дайте мені намітки,
  prompt: Прочитай уривок так, щоб було чути місце, прохання і звертання. Після читання поясни, де ти зробив паузу і чому.
  self_check:
    - Я не змінив слів public reading.
    - Я зробив паузу після місця дії.
    - Я відділив звертання від прохання.
    - Я пояснив виконання через рядок, а не через домисел.
  model_answer: |
    Добре читання робить паузу після "на білій березі", бо цей рядок задає сцену. Друга пауза потрібна після "намiтки:", перед прямим звертанням. Слова "Жіночки-сестрички" варто вимовити як адресу до групи, а "Дайте мені намітки" - як прохання. У поясненні треба послатися на самі рядки.

- id: act-5
  type: essay-response
  title: Межа доказу і public source
  instruction: Межа доказу і public source
  prompt: Напиши 130-170 слів про те, чому в цьому модулі три Ukrlib texts hosted as primary readings, а "Ой на Івана, ой на Купала" лишається linked-only locator.
  model_answer: |
    Три тексти в модулі hosted as primary readings, бо для них є public Ukrlib pages із повним текстом: "Купайло, Купайло! Де ти зимувало?", "А де наше Купайло стояло" і "Сиділа русалка на білій березі". Lesson body цитує уривки з цих reading pages, а учень може перейти за URL і перевірити рядки. "Ой на Івана, ой на Купала" лишається linked-only locator, бо в наявному публічному матеріалі це літературна поява, не чиста сторінка повного folk text для hosting. Таке рішення не применшує важливості рядка. Воно показує джерельну етику: primary reading, textbook frame і later reception треба розрізняти, щоб learner-facing page не змішувала різні типи джерел.
  rubric:
    - criteria: Hosted readings
      description: Названо всі три hosted primary readings.
    - criteria: Public URL
      description: Пояснено роль public URL.
    - criteria: Source type
      description: Відрізнено primary reading від locator.
    - criteria: Evidence limit
      description: Сформульовано межу доказу без перебільшення.
