- title: Стрілецькі пісні — українська Вікіпедія
  role: reference
  url: https://uk.wikipedia.org/wiki/Стрілецькі_пісні
  notes: Довідковий огляд для орієнтації в назвах і авторах; не використовуй як повний текст пісні.
- title: Повстанські пісні — українська Вікіпедія
  role: reference
  url: https://uk.wikipedia.org/wiki/Повстанські_пісні
  notes: Довідковий огляд для контексту; назву "пісні з лісу" не перенось автоматично на всі стрілецькі тексти.
- title: Ой у лузі червона калина похилилася
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=16376
  notes: Порівняй основний текст і першодрук; визнач, як мотив калини переходить від суму до дії.
- title: Чуєш, брате мій
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=8048
  notes: 'Прочитай як реквієм: як повтор журавлів і чужини створює мову втрати.'
- title: Нічка була темна
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=26553
  notes: Простеж, як повстанська пісня будує сцену арешту, тюрми і пам'яті без архівної деталізації.
- title: Про заходи з відзначення річниці перемоги над нацизмом
  role: reference
  url: https://osvita.ua/legislation/Ser_osv/46719/
  notes: Osvita дає публічну рамку, придатну для школи, для згадування повстанських пісень; не джерело для повного тексту пісні.
