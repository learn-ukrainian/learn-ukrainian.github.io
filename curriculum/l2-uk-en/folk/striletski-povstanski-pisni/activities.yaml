- id: act-1
  type: variant-comparison
  title: Авторський текст і фольклоризований спів
  instruction: Порівняй два джерельні режими й поясни, що можна доводити в кожному випадку.
  prompt: Одна пісня має названого автора і публічну сторінку; інша подана як анонімна стрілецька або повстанська. Обидві можуть діяти як спільнотна пам'ять, але не однаково доводять походження.
  variants:
  - label: Авторський реквієм
    text: Текст має автора, але через виконання й пам'ять входить у стрілецький пісенний обіг.
    source: 'ukrlib.com.ua: Чуєш, брате мій'
  - label: Анонімна пісня
    text: Текст подано як стрілецьку або повстанську пісню невідомого автора; головний доказ тут - публічна сторінка з повним текстом.
    source: 'ukrlib.com.ua: Там на горі, на Маківці; Нічка була темна'
  features:
  - авторство
  - публічне джерело
  - що можна стверджувати
  - межа висновку
  model_answer: Точне порівняння не стирає автора і не заперечує фольклоризацію. Воно називає джерело, шар і функцію тексту.
- id: act-2
  type: motif-formula
  title: Мотив пам'яті у строфі
  instruction: Знайди повторюваний мотив і поясни його роботу в пісні.
  passage: Ой у лузі червона калина похилилася... / Повіяв вітер степовий... / Понад Хустом ворон кряче...
  model_answer: Мотив не є прикрасою. Він стискає подію до образу, який можна повторити й упізнати у співі.
  formulas:
  - label: калина
    text: червона калина похилилася / калину підіймемо
    explanation: образ суму переходить у дію відновлення
  - label: вітер
    text: повіяв вітер степовий / трава ся похилила
    explanation: пейзаж робить втрату видимою
  - label: ворон
    text: ворон кряче / мати плаче
    explanation: традиційний знак смерті поєднано з родинним плачем
- id: act-3
  type: performance
  title: Голос без домислу
  instruction: Підготуй коротке читання одного блоку з піснею.
  prompt: Обери чотири-шість рядків із поданого читання. Перед виконанням назви джерело, шар і межу висновку; під час читання не додавай жодного рядка з пам'яті.
  self_check:
  - Чи названо публічне джерело?
  - Чи не змішано УСС і УПА?
  - Чи не додано рядків поза текстом?
  - Чи пояснено, що саме доводить фрагмент?
  show_record_button: true
  model_answer: 'Добре виконання звучить стримано: воно показує куплет, повтор і джерельну дисципліну, а не театральну прикрасу.'
