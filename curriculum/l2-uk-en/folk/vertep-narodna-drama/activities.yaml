version: "1.0"
module: vertep-narodna-drama
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Не одна різдвяна форма
    instruction: Розрізни близькі форми за сценою, виконавцем і функцією.
    prompt: Чому вертеп не можна звести ні до шопки, ні до будь-якої народної драми?
    variants:
      - label: Ляльковий вертеп
        text: Переносна двоярусна скринька, ляльки, прихований виконавець, сакральна частина і долішні інтермедії.
        source: класична театральна форма
      - label: Живий вертеп
        text: Ролі виконують люди; хода або вистава може зберігати різдвяний порядок без робочої лялькової скриньки.
        source: обхідна й сучасна форма
      - label: Шкільна драма
        text: Книжна барокова п'єса з релігійною або історичною темою, у середовищі шкіл і колегіумів.
        source: історичний театральний контекст
      - label: Інтермедія
        text: Комічна вставна сцена між серйозними частинами драми; її логіка помітна в долішньому ярусі.
        source: сміхова вставка
      - label: Маланка або Коза
        text: Споріднені обхідні дійства з власною календарною і маскованою логікою, але не просто різновиди вертепу.
        source: ширше поле народної драми
    features:
      - хто виконує
      - чи є двоярусна скринька
      - який календарний час
      - чи є сакральна різдвяна вісь
      - як працює сміхова частина
    model_answer: >-
      Вертеп має власне ядро: різдвяну драму, поділ на сакральний і земний
      плани, лялькову або живу сцену, колядний контакт із громадою й комічну
      інтермедію. Шопка підкреслює образ ясел, шкільна драма дає історичний
      театральний контекст, а Маланка чи Коза належать до ширшого поля
      народної драми, але не замінюють вертеп.

  - id: act-2
    type: motif-formula
    title: Два яруси як модель світу
    instruction: Прочитай скриньку як драматичну схему, а не як декорацію.
    passage: >-
      Горішній ярус вертепу пов'язаний із Різдвом, Іродом, Рахиллю, Смертю
      і моральною межею влади. Долішній ярус відкриває інтермедію, де діють
      побутові й соціальні типи, пісня, танець і сміх.
    formulas:
      - text: горішній ярус
        label: сакральна вісь
        explanation: Верхній простір тримає різдвяну історію і моральний фінал Іродової влади.
      - text: долішній ярус
        label: земний світ
        explanation: Нижній простір переносить увагу до побуту, соціальної сатири й інтермедії.
      - text: Ірод
        label: тиранічна влада
        explanation: Образ показує страх влади перед тим, що вона не контролює.
      - text: Рахиль
        label: людський біль
        explanation: Плач не дає сприймати Іродів наказ як абстрактний сюжет.
      - text: Запорожець
        label: образ себе
        explanation: Долішній герой поєднує браваду, комізм і знак української сценічної сили.
    prompt: Чому перехід до долішнього ярусу не скасовує сакральної частини?
    model_answer: >-
      Долішній ярус не висміює Різдво і не замінює сакральну частину. Він
      переносить моральну вісь у людський світ, де влада, пиха, страх,
      побутові конфлікти й соціальні ролі проходять сміхове випробування.

  - id: act-3
    type: ritual-sequencing
    title: Послідовність вертепної дії
    instruction: Упорядкуй виставу від підготовки скриньки до побажання громаді.
    steps:
      - Підготувати скриньку або живий простір із виразним поділом сакрального й земного планів.
      - Відкрити різдвяну частину ангельською звісткою, пастухами, царями і дорогою до Дитяти.
      - Показати Іродів страх, наказ і плач Рахилі як темну вісь сакральної драми.
      - Завершити Іродів блок появою Смерті й карнавальним присудом Чорта.
      - Перейти до долішнього ярусу з побутовою піснею, танцем або сценою Діда й Баби.
      - Вивести соціальні типи й пояснювати стереотипні ролі через критичну рамку, а не через повторення образи.
      - Дати Запорожцеві сценічний центр як комічний і вільний образ долішнього світу.
      - Закрити виставу побажанням здоров'я, контактом із господарями або громадою.
    correct_order: [0, 1, 2, 3, 4, 5, 6, 7]
    model_answer: >-
      Вертепна дія тримається на переході від різдвяної звістки й Іродового
      морального фіналу до земної інтермедії. Стереотипні ролі треба не
      виконувати заради колориту, а пояснювати як історичні маски. Фінал
      повертає театр до громади через побажання.

workbook:
  - type: critical-analysis
    title: Сакральне без проповіді, аналіз без знецінення
    target_text: Вертеп можна пояснити як народну розвагу, де релігійний сюжет лише прикрашає комедію.
    prompt: Сформулюй точнішу тезу про співвідношення Різдва й інтермедії.
    questions:
      - Чому сакральна частина не є просто декорацією?
      - Яку роль має Ірод у моральній логіці вистави?
      - Чому долішній ярус потрібен після смерті Ірода?
      - Як говорити про релігійний шар аналітично, але шанобливо?
      - Яка теза краще описує жанр?
    model_answers:
      - Сакральна частина задає різдвяну вість, конфлікт із тиранічною владою і моральний фінал.
      - Ірод показує владу, яка через страх перед утратою контролю стає насильницькою.
      - Долішній ярус переносить моральну вісь у побут, соціальну сатиру, пісню і сміх громади.
      - Треба пояснювати драматичну функцію Різдва, не зводячи його до прикраси і не перетворюючи аналіз на проповідь.
      - Вертеп поєднує сакральну різдвяну драму і сміхову інтермедію в одній народно-театральній формі.

  - type: critical-analysis
    title: Стереотип як джерело, а не модель
    instruction: Відокрем історичний опис від сучасного повторення шкоди.
    target_text: >-
      У давніх інтермедіях діяли соціальні, етнічні, конфесійні й станові
      типи, частина яких будувалася на карикатурі або образливій назві.
    prompt: Як працювати з таким матеріалом у відповідальному уроці?
    questions:
      - Коли досить парафрази замість дослівного рядка?
      - Чому історична назва персонажа не стає нейтральною назвою людей?
      - Як пояснити роль Москаля без плаского етнічного ярлика?
      - Чому Запорожець не є простим ідеальним героєм?
      - Яка практика захищає і джерело, і сучасного слухача?
    model_answers:
      - Парафрази досить тоді, коли точний рядок не потрібен для аналізу або містить принизливий ефект.
      - Персонажна назва належить до історичного тексту й може бути образливою в сучасній мові.
      - Москаля варто пояснювати як солдатський або імперський сатиричний тип у конкретному контексті.
      - Запорожець поєднує браваду, комізм і сценічну силу, але не є повним історичним портретом козацтва.
      - Треба називати джерельний статус, функцію ролі й етичну межу цитування.
    evaluation_criteria:
      - джерельна точність
      - етична рамка
      - розрізнення типу й людини

  - type: comparative-study
    title: Варіант не дорівнює канон
    instruction: Порівняй локальні записи й сучасні форми без оголошення одного зразка єдиною нормою.
    items_to_compare:
      - Сокиринський або галаганівський матеріал як опорний запис.
      - Батуринський, Хорольський, Куп'янський або Новгород-Сіверський варіант.
      - Західноукраїнський чи закарпатський різдвяний театр.
      - Сучасний живий вертеп у міській ході.
      - Професійна лялькова постановка за історичним текстом.
    criteria:
      - джерельний статус
      - спосіб виконання
      - локальна або інституційна прив'язка
      - чи зберігається різдвяна моральна вісь
      - що додано або переосмислено
    prompt: Чому один відомий запис не можна подавати як повний канон усієї традиції?
    model_answer: >-
      Відомий запис може бути дуже важливим, але вертеп існує як мережа
      локальних і часових варіантів. Канонізація одного тексту стирає інші
      регіони, живі форми, виконавські зміни й сучасні переосмислення.

  - type: performance
    title: Голос лялькаря і межа виконання
    instruction: Опиши сцену голосом, не копіюючи небезпечні карикатури.
    fragment: >-
      Лялькар змінює голоси для ангела, Ірода, Рахилі, Смерті, Чорта,
      Діда, Баби й Запорожця. Для стереотипних ролей достатньо нейтрального
      опису функції, якщо точна манера принижує групу людей.
    prompt: Як виконання може показати різницю персонажів без повторення образливої імітації?
    self_check:
      - Я розрізняю сакральний, комічний і сатиричний регістри.
      - Я не імітую етнічну або конфесійну групу заради сміху.
      - Я можу передати владність Ірода темпом і тоном, а не криком.
      - Я можу передати Чорта ритмом і рухом, не перетворюючи сцену на хаос.
      - Я пояснюю, що історична маска не є сучасною нормою мовлення.
    model_answer: >-
      Різницю персонажів можна передати темпом, гучністю, паузою, рухом,
      позицією в сцені й функцією ролі. Образливу мовну або тілесну імітацію
      не потрібно повторювати, щоб зрозуміти механізм інтермедії.

  - type: critical-analysis
    title: Вертеп після заборон і тиску
    instruction: Поясни, чому різдвяна дія могла бути культурно й політично значущою.
    target_text: >-
      У радянський час коляда і вертеп могли зберігати мову, пам'ять,
      мережу людей і релігійний календар поза офіційною ідеологією.
    prompt: Чому антиколоніальну роль вертепу треба показувати через механізми, а не через гасло?
    questions:
      - Як вертеп переносить українську мову в публічний святковий простір?
      - Чому образ Ірода може читатися як ширша модель тиранічної влади?
      - Як жива хода створює мережу громади?
      - Чому сучасний благодійний вертеп не слід видавати за стародавній текст?
      - Яка точна антиколоніальна теза можлива?
    model_answers:
      - Він звучить у домі, дворі, на площі або в ході, де мова стає святковою і спільною.
      - Ірод показує владу, що боїться втрати контролю і відповідає насильством.
      - Хода збирає виконавців, господарів, слухачів, пісню, дар і побажання.
      - Сучасний сценарій є живим продовженням структури, але має власну дату, авторів і мету.
      - Вертеп зберігає мову, різдвяний календар, сміх проти влади й громадський контакт під тиском імперських і радянських режимів.
