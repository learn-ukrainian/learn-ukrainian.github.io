- lemma: вертеп
  translation: vertep, Ukrainian Christmas folk theatre
  pos: іменник
  usage: Вертеп поєднує різдвяну драму, лялькову або живу сцену і комічну інтермедію.
- lemma: вертепник
  translation: vertep performer
  pos: іменник
  usage: Вертепник міг рухати ляльки, змінювати голоси й підтримувати контакт із громадою.
- lemma: ляльковий вертеп
  translation: puppet vertep
  pos: словосполука
  usage: Ляльковий вертеп використовує переносну скриньку і ляльки на дротах або стрижнях.
- lemma: живий вертеп
  translation: live vertep
  pos: словосполука
  usage: Живий вертеп переносить ролі на акторів, ходу або парафіяльну виставу.
- lemma: народна драма
  translation: folk drama
  pos: словосполука
  usage: Народна драма поєднує обрядовий час, ролі, спів, рух і громадську функцію.
- lemma: шкільна драма
  translation: school drama
  pos: словосполука
  usage: Шкільна драма дала вертепові частину барокової театральної техніки.
- lemma: інтермедія
  translation: interlude
  pos: іменник
  usage: Інтермедія вводить комічну побутову сцену між серйозними частинами дії.
- lemma: скринька
  translation: portable theatre box
  pos: іменник
  usage: Скринька у вертепі працює як мала модель світу з двома ярусами.
- lemma: двоярусний
  translation: two-tiered
  pos: прикметник
  usage: Двоярусний простір відділяє сакральну різдвяну частину від земної інтермедії.
- lemma: горішній ярус
  translation: upper tier
  pos: словосполука
  usage: Горішній ярус пов'язаний із Вифлеємом, ангелами, Іродом, Рахиллю і Смертю.
- lemma: долішній ярус
  translation: lower tier
  pos: словосполука
  usage: Долішній ярус відкриває побутову комедію, пісню, танець і соціальні типи.
- lemma: сакральна вісь
  translation: sacred axis
  pos: словосполука
  usage: Сакральна вісь вертепу не дозволяє звести виставу до святкової розваги.
- lemma: різдвяна драма
  translation: Christmas drama
  pos: словосполука
  usage: Різдвяна драма показує народження Христа, загрозу Ірода і моральний фінал.
- lemma: Ірод
  translation: Herod
  pos: власна назва
  usage: Ірод у вертепі є образом влади, яка боїться втратити контроль.
- lemma: Рахиль
  translation: Rachel
  pos: власна назва
  usage: Рахиль переводить Іродів наказ у сцену людського плачу.
- lemma: Смерть
  translation: Death
  pos: власна назва
  usage: Смерть ставить межу земній владі Ірода.
- lemma: Чорт
  translation: Devil
  pos: власна назва
  usage: Чорт у вертепі виконує карнавальний присуд після падіння Ірода.
- lemma: Запорожець
  translation: Zaporozhian Cossack figure
  pos: власна назва
  usage: Запорожець поєднує браваду, комізм і сценічний знак української сили.
- lemma: соціальний тип
  translation: social type
  pos: словосполука
  usage: Соціальний тип у вертепі не можна плутати з нейтральним описом реальних людей.
- lemma: стереотипна роль
  translation: stereotyped role
  pos: словосполука
  usage: Стереотипна роль потребує критичної рамки, а не бездумного повторення.
- lemma: парафраза
  translation: paraphrase
  pos: іменник
  usage: Парафраза доречна, коли дослівна сцена може повторити образливий ефект.
- lemma: джерельний статус
  translation: source status
  pos: словосполука
  usage: Джерельний статус визначає, чи маємо давній запис, реконструкцію або сучасний сценарій.
- lemma: колядний обхід
  translation: caroling round
  pos: словосполука
  usage: Колядний обхід робить вертеп подією контакту між гуртом і громадою.
- lemma: побажання
  translation: blessing, good wish
  pos: іменник
  usage: Побажання наприкінці повертає вертеп із театрального часу до дому або площі.
- lemma: побутування
  translation: continued existence and circulation in living tradition
  pos: іменник
  usage: Побутування вертепу змінювалося від мандрівних дяків до сучасних живих ходів.
- lemma: мандрівний дяк
  translation: itinerant cantor or schoolman
  pos: словосполука
  usage: Мандрівний дяк міг переносити шкільну драматичну культуру в народний простір.
- lemma: бурсак
  translation: seminary student
  pos: іменник
  usage: Бурсаки й студенти були важливими носіями книжно-театрального досвіду.
- lemma: локальний варіант
  translation: local variant
  pos: словосполука
  usage: Локальний варіант показує, що один запис не є каноном усієї традиції.
- lemma: сокиринський варіант
  translation: Sokyryntsi variant
  pos: словосполука
  usage: Сокиринський варіант є опорним джерелом, але не єдиною нормою вертепу.
- lemma: антиколоніальна роль
  translation: anticolonial role
  pos: словосполука
  usage: Антиколоніальна роль вертепу проявляється через мову, пам'ять і сміх проти влади.
- lemma: радянське витіснення
  translation: Soviet suppression
  pos: словосполука
  usage: Радянське витіснення різдвяних практик робило коляду й вертеп ризикованими формами пам'яті.
- lemma: відродження
  translation: revival
  pos: іменник
  usage: Відродження вертепу після 1991 року поєднало парафіяльні, міські й фестивальні форми.
- lemma: благодійний вертеп
  translation: charity vertep
  pos: словосполука
  usage: Благодійний вертеп є сучасним продовженням громадської функції, а не давнім текстом.
- lemma: сценічна граматика
  translation: theatrical grammar
  pos: словосполука
  usage: Сценічна граматика вертепу вплинула на пісенність і соціальний типаж української сцени.
- lemma: пісенна міграція
  translation: song migration
  pos: словосполука
  usage: Пісенна міграція показує, як фрагмент із інтермедії переходить у літературну драму.
- lemma: різдвяно-карнавальне поле
  translation: Christmas carnival field
  pos: словосполука
  usage: Різдвяно-карнавальне поле допомагає читати зв'язок між вертепом, ярмарком і літературою.
- lemma: відповідальне читання
  translation: responsible reading
  pos: словосполука
  usage: Відповідальне читання називає джерело, функцію ролі й етичну межу цитування.
- lemma: етична межа
  translation: ethical boundary
  pos: словосполука
  usage: Етична межа підказує, коли історичний матеріал треба переказати, а не виконувати.
- lemma: комічна вставка
  translation: comic insertion
  pos: словосполука
  usage: Комічна вставка змінює регістр після серйозної різдвяної дії.
- lemma: громадський контакт
  translation: communal contact
  pos: словосполука
  usage: Громадський контакт відрізняє вертеп від тексту, який просто читають у книжці.
