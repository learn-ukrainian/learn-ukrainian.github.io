- title: Вертеп
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%92%D0%B5%D1%80%D1%82%D0%B5%D0%BF
  notes: >-
    Довідкова сторінка про український пересувний ляльковий театр і різдвяну
    форму. Урок спирається на корпусні й дослідницькі джерела як основну рамку, а цю
    сторінку використовує як живий довідковий орієнтир.
- title: Вертепна драма
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%92%D0%B5%D1%80%D1%82%D0%B5%D0%BF%D0%BD%D0%B0_%D0%B4%D1%80%D0%B0%D0%BC%D0%B0
  notes: >-
    Довідкова сторінка для поняття вертепної драми і варіантності текстів.
    Матеріал не використано як єдине джерело канону.
- title: Євген Марковський. Український вертеп. Розвідки й тексти
  role: source
  url: https://omeka.nibu.kyiv.ua/s/nibu/item/2274
  notes: >-
    Оцифрований бібліографічний запис і PDF видання 1929 року з розвідкою та
    текстами. Ресурс подано як поглиблену джерельну опору для варіантності й
    історії вертепної драми.
- title: Інтермедія
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%86%D0%BD%D1%82%D0%B5%D1%80%D0%BC%D0%B5%D0%B4%D1%96%D1%8F
  notes: >-
    Орієнтир для історичного поняття вставної комічної сцени, потрібної для
    пояснення долішнього ярусу вертепу.
- title: Шкільна драма
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A8%D0%BA%D1%96%D0%BB%D1%8C%D0%BD%D0%B0_%D0%B4%D1%80%D0%B0%D0%BC%D0%B0
  notes: >-
    Довідка для барокового шкільно-драматичного тла. Урок не підміняє нею
    народне побутування вертепу.
