- lemma: чарівна казка
  translation: народна прозова оповідь із надприродним сюжетом, випробуваннями героя і чудесною допомогою
  pos: словосполука
  usage: Чарівна казка будує дорогу героя через межу звичайного світу.
- lemma: архетип
  translation: повторюваний образ або модель, що допомагає впізнати спільні функції персонажів і мотивів
  pos: іменник
  usage: Архетип героя важливий тільки тоді, коли видно його конкретну функцію в тексті.
- lemma: ініціація
  translation: модель переходу в новий стан після випробування
  pos: іменник
  usage: Ініціація в цьому модулі є аналітичною моделлю, а не прямим доказом обряду.
- lemma: потойбіччя
  translation: інший або межовий простір казки, куди герой потрапляє під час випробування
  pos: іменник
  usage: Ліс, вода або змієва оселя можуть працювати як образ потойбіччя.
- lemma: хтонічний
  translation: пов'язаний із низом, землею, підземним або небезпечним простором
  pos: прикметник
  usage: Хтонічний противник часто стоїть біля межі між світами.
- lemma: морфологія казки
  translation: аналіз сталих функцій і ходів, що повторюються в казках
  pos: словосполука
  usage: Морфологія казки розрізняє не імена, а функції персонажів.
- lemma: вирій
  translation: традиційний образ далекого теплого краю або верхнього простору
  pos: іменник
  usage: Вирій може входити в поетику верхнього простору, але не є головною темою кожної казки.
- lemma: формульний
  translation: побудований на сталих словесних формулах, зачинах, кінцівках і повторах
  pos: прикметник
  usage: Формульний зачин відчиняє умовний час казки.
- lemma: кумулятивний
  translation: побудований на нарощенні однотипних елементів
  pos: прикметник
  usage: Кумулятивний повтор допомагає слухачеві запам'ятати сюжет.
- lemma: вісь світу
  translation: образна модель зв'язку між верхом, серединою і низом у поетиці простору
  pos: словосполука
  usage: Вісь світу в казковому аналізі є літературознавчим образом, а не описом живої доктрини.
- lemma: зачин
  translation: традиційний початок казки, який віддаляє слухача від теперішнього часу
  pos: іменник
  usage: Зачин "Жили собі" переводить слухача в казковий порядок.
- lemma: дарувальник
  translation: персонаж, який після випробування дає героєві пораду, предмет або допомогу
  pos: іменник
  usage: Дарувальник перевіряє героя перед тим, як дати йому засіб дії.
- lemma: противник
  translation: персонаж або сила, що створює головну перешкоду для героя
  pos: іменник
  usage: Змій є противником, але в казці він має видиму вразливість.
- lemma: помічник
  translation: істота, людина або річ, що допомагає героєві пройти неможливе завдання
  pos: іменник
  usage: Помічник часто з'являється після того, як герой виявив уважність або милосердя.
- lemma: метаморфоза
  translation: перетворення вигляду, стану або соціального становища героя
  pos: іменник
  usage: Метаморфоза наприкінці показує, що дорога змінила героя.
- lemma: змієборство
  translation: сюжет боротьби героя зі змієм або подібним чудовиськом
  pos: іменник
  usage: Змієборство має світові паралелі, але Кожум'яка закріплений у київській традиції.
- lemma: варіантність
  translation: існування різних записів і переказів того самого або близького сюжету
  pos: іменник
  usage: Варіантність казки вимагає точно називати джерело цитати.
- lemma: джерельна межа
  translation: чітке розрізнення між перевіреним текстом, переказом, мотивом і дослідницьким коментарем
  pos: словосполука
  usage: Джерельна межа не дозволяє змішати кілька варіантів у непозначений текст.
- lemma: літературна казка
  translation: авторський твір, що використовує закони, мотиви або образи народної казки
  pos: словосполука
  usage: Літературна казка має сталий авторський текст, на відміну від народної варіантності.
- lemma: усна основа
  translation: фольклорний шар, з якого виростає майбутня письмова література
  pos: словосполука
  usage: Усна основа показує, як фольклор живить письмову традицію.
