inline:
  - id: act-1
    type: motif-formula
    title: Зачин як двері
    instruction: Розглянь формули початку й переходу як сигнали входу в казковий простір.
    passage: |-
      Жили собі...
      Колись був у Києві князь...
      От прийшла черга...
      Герой вирушає в путь...
    formulas:
      - text: Жили собі
        label: віддалений час
        explanation: Формула відводить слухача від теперішнього й відкриває умовний простір.
      - text: Колись був у Києві князь
        label: місце і пам'ять
        explanation: Казка поєднує давній час із впізнаваною українською топографією.
      - text: От прийшла черга
        label: запуск браку
        explanation: Небезпека стає особистою і змушує сюжет рухатися.
      - text: Герой вирушає в путь
        label: перехід
        explanation: Дорога переводить героя зі звичайного стану до випробування.
    prompt: Обери одну формулу й поясни, яку роботу вона виконує в казці.
    model_answer: >-
      Формула "Жили собі" не просто починає оповідь. Вона переносить слухача
      в умовний давній час, де діятимуть правила казки: дорога, межа,
      помічник, противник і повернення.

  - id: act-2
    type: variant-comparison
    title: Три способи читати чарівну казку
    instruction: Порівняй три інтерпретації й визнач, що кожна з них бачить і що ризикує стерти.
    prompt: Чому найточніше читання тримає кілька рівнів разом?
    variants:
      - label: Розвага
        text: Казка потрібна для цікавого слухання, напруги, повтору й щасливої розв'язки.
        source: Естетичний рівень
      - label: Структура переходу
        text: Дорога, межа, випробування й повернення показують зміну стану героя.
        source: Морфологічний рівень
      - label: Міфологічна пам'ять
        text: У просторі, противниках і помічниках можуть зберігатися давні образи.
        source: Порівняльний рівень
    features:
      - головний доказ
      - що пояснює
      - що може перебільшити
      - як зберегти джерельну межу
    model_answer: >-
      Розважальний підхід пояснює живу силу оповіді, структурний показує
      дорогу й перетворення героя, а міфологічний бачить давні образи. Жоден
      рівень не достатній сам по собі: без форми казка стане схемою, без
      структури - набором пригод, без джерельної межі - фантазією про походження.

  - id: act-3
    type: critical-analysis
    title: Змій як видимий противник
    target_text: Приліта змій, зараз упав коло порогу.
    instruction: Проаналізуй короткий перевірений фрагмент і визнач, як казка робить небезпеку видимою.
    prompt: Чому тілесна деталь важлива для сцени боротьби?
    questions:
      - Які деталі роблять змія тілесним, а не абстрактним?
      - Як ця сцена допомагає зрозуміти казкову боротьбу?
      - Чому не треба перетворювати фрагмент на довший переказ без джерела?
    model_answers:
      - "Змій не названий абстрактним злом: він прилітає і падає біля порогу."
      - Казкова боротьба спирається не лише на силу, а й на точне знання слабкого місця противника.
      - Джерельна межа не дозволяє додавати неперевірені деталі до короткого фрагмента.

workbook:
  - id: act-4
    type: critical-analysis
    title: Чому не досить переказу з пам'яті
    instruction: Оціни джерельну ситуацію перед тим, як цитувати або переказувати казку.
    target_text: |-
      Повний текст казки може існувати в підручнику, збірнику, публічній бібліотеці,
      на довідковій сторінці або лише як короткий фрагмент у дослідницькій праці.
    prompt: Які дії доречні в кожній ситуації?
    questions:
      - Коли можна аналізувати дослівний фрагмент?
      - Коли краще назвати мотив без цитування?
      - Чому різні варіанти казки не треба змішувати в один "зручний" текст?
    model_answers:
      - Дослівний фрагмент доречно аналізувати, коли він має перевірене джерело й зрозумілу атрибуцію.
      - Мотив краще назвати без цитування, коли є лише загальна згадка або непевний текст.
      - Варіанти мають власну історію, тому змішування створює не народну казку, а новий непозначений переказ.

  - id: act-5
    type: comparative-study
    title: Український мотив і світова паралель
    instruction: Порівняй українське змієборство з ширшим мотивом боротьби героя з чудовиськом.
    items_to_compare:
      - "Кирило Кожум'яка: Київ, Дніпро, ремесло, громада, змій."
      - "Котигорошко: дивне походження, родинне рятування, надзвичайна сила."
      - "Світовий мотив змієборства: герой перемагає істоту, що тримає небезпеку або полон."
    criteria:
      - простір
      - тип героя
      - що загрожує громаді або родині
      - що робить варіант культурно впізнаваним
    prompt: Як порівнювати мотиви без стирання української конкретики?
    model_answer: >-
      Треба розрізняти мотив і побутування. Змієборство має багато паралелей,
      але Кожум'яка закріплений у київському просторі, біля Дніпра, через
      ремесло й громаду. Порівняння розширює контекст, але не робить український
      варіант чужим або безіменним.

  - id: act-6
    type: critical-analysis
    title: Ініціація як межа пояснення
    target_text: Кожна чарівна казка прямо зберігає давній обряд ініціації.
    instruction: Оціни тезу, яка перетворює корисну модель на надмірне твердження.
    prompt: Як сформулювати точніше?
    questions:
      - Що в тезі є продуктивним?
      - Що в тезі перебільшено?
      - Яка формула краще відповідає джерельній обережності?
    model_answers:
      - Продуктивним є бачення дороги, випробування, межі й зміни стану героя.
      - Перебільшено слово "кожна" і твердження про пряме збереження конкретного обряду.
      - "Точніше казати: чарівна казка часто читається як художня модель переходу, яку можна порівнювати з ініціацією."

  - id: act-7
    type: critical-analysis
    title: Не дитяча дрібниця і не таємний обряд
    target_text: Чарівні казки або тільки для дітей, або прямо пояснюють давню обрядову практику.
    instruction: Розбери хибну двійкову опозицію.
    prompt: Чому обидві крайності спрощують жанр?
    questions:
      - Що втрачає дитяче спрощення?
      - Що втрачає обрядове перебільшення?
      - Як описати надприродне в казці без фрейму таємного знання?
    model_answers:
      - Дитяче спрощення не бачить складної поетики дороги, межі, помічника й перетворення.
      - Обрядове перебільшення стирає художню свободу, варіантність і оповідну майстерність.
      - Надприродне варто описувати як художній закон казкового світу й частину усної словесності.

  - id: act-8
    type: essay-response
    title: Казкова дорога як модель переходу
    instruction: Напиши доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, як чарівна казка будує модель переходу героя:
      зачин, брак, дорога, межа, помічник, противник, випробування,
      перетворення. Назви один український приклад, одну світову паралель,
      одну джерельну пересторогу і одну етичну пересторогу.
    min_words: 260
    model_answer: >-
      Чарівна казка будує перехід героя через послідовну оповідну форму. Зачин
      віддаляє слухача від теперішнього часу й відкриває казковий простір. Далі
      з'являється брак: когось викрали, щось втрачено, громаді загрожує змій,
      або герой мусить виконати неможливе доручення. Дорога виводить його за
      межу звичайного світу. Ліс, вода, далека країна, змієва оселя чи інший
      небезпечний простір показують, що герой уже не може діяти старими
      засобами.

      Помічник дає пораду, предмет або спосіб пройти випробування. Противник
      створює головну небезпеку, але казка часто робить його вразливим:
      страшне можна побачити, назвати й перемогти. В українській традиції
      Кирило Кожум'яка важливий тим, що мотив боротьби зі змієм пов'язаний із Києвом,
      Дніпром, ремеслом і громадою. Світова паралель змієборства розширює
      контекст, але не стирає української конкретики.

      Наприкінці герой повертається зміненим: отримує визнання, звільняє своїх,
      відновлює порядок або переходить у новий стан. Джерельна пересторога
      полягає в тому, що повні казкові тексти не можна складати з пам'яті або
      змішувати з різних варіантів без позначення. Етична пересторога теж
      потрібна: казки мають поетичну силу, але можуть нести жорстокі покарання,
      патріархальні ролі або підозру до чужого. Тому їх треба читати серйозно,
      але не безкритично.
    rubric:
      - criteria: Структура
        description: Пояснено послідовність переходу героя від зачину до перетворення.
      - criteria: Український приклад
        description: Названо конкретний український сюжет або персонажа.
      - criteria: Порівняння
        description: Світову паралель подано без стирання української належності.
      - criteria: Джерельна й етична точність
        description: Є одна пересторога щодо цитування і одна щодо проблемних мотивів.
