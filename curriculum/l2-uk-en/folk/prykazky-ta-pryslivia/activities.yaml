inline:
  - id: act-1
    type: variant-comparison
    title: Не кодекс, а інструмент
    instruction: Порівняй, як різні рамки змінюють читання прислів'їв і приказок.
    prompt: Яка рамка найкраще пояснює, чому паремії можуть суперечити одна одній?
    variants:
      - label: Кодекс мудрості
        text: Кожна формула сприймається як універсальне правило, що нібито має бути правдивим завжди.
        source: романтизоване побутове читання
      - label: Набір банальностей
        text: Короткі вислови знецінюються як готові фрази, що не потребують аналізу.
        source: зневажливе модерне читання
      - label: Ситуативний інструмент
        text: Формула працює в конкретній розмові як оцінка, жарт, пересторога, відмова або підтримка.
        source: пареміологічне читання
      - label: Джерельний фрагмент
        text: Дослівна форма читається разом із записом, регіоном, упорядником і межею цитування.
        source: джерельна дисципліна
    features:
      - ставлення до суперечностей
      - роль контексту
      - ризик романтизації
      - ризик зневаги
      - потреба в джерелі
    model_answer: >-
      Найкраще працює рамка ситуативного інструмента. Прислів'я й приказки
      не утворюють єдиного морального кодексу: вони відповідають на різні
      життєві ситуації, тому одна формула може підтримувати обережність, а
      інша - дію.

  - id: act-2
    type: motif-formula
    title: Як стискається судження
    instruction: Розбери коротку формулу за формою, образом і функцією.
    passage: >-
      Джерельна формула про вовка при плузі не просто називає тварину.
      Вона стискає сцену про непридатність хижака до спільної праці.
    formulas:
      - text: вовк
        label: тваринний образ
        explanation: Активує не абстрактну рису, а маленьку соціальну сцену.
      - text: плуг
        label: простір праці
        explanation: Вказує на спільну роботу, порядок і очікувану користь.
      - text: луг
        label: бажання поза працею
        explanation: Показує, що учасник формально приєднаний до праці, але внутрішньо спрямований в інший бік.
      - text: двочленність
        label: будова
        explanation: Перша частина задає дію, друга виявляє справжню спрямованість.
      - text: галицька форма
        label: джерельний варіант
        explanation: Форма з "сі" не виправляється, бо зберігає локальний запис.
    prompt: Чому цю формулу не варто зводити до простого наказу "працюй"?
    model_answer: >-
      Вона говорить не тільки про працю, а про невідповідність між спільною
      справою і справжнім бажанням учасника. Вовк при плузі лишається
      зорієнтованим не на борозну, а на власний простір.

  - id: act-3
    type: ritual-sequencing
    title: Паспорт паремії
    instruction: Упорядкуй кроки відповідального читання короткої формули.
    steps:
      - "Визначити тип форми: прислів'я, приказка, приповідка, фразеологізм, афоризм або етикетна формула."
      - "Перевірити джерельний статус: збірник, словник, підручник, літературний текст, усний запис чи сучасна переробка."
      - Зберегти варіантну форму, якщо це дослівна цитата з джерела.
      - "Розібрати будову: двочленність, антитеза, ритм, образ, еліпсис."
      - "Назвати функцію в розмові: докір, жарт, пересторога, підтримка, відмова, етикет."
      - Сформулювати етичну межу сучасного вживання.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Спершу треба назвати тип форми й перевірити джерело. Далі зберігають
      варіант, аналізують будову й функцію, а наприкінці визначають, чи може
      формула працювати сьогодні як жива оцінка або лише як історичний матеріал.

  - id: act-4
    type: critical-analysis
    title: Цитувати чи переказати
    target_text: >-
      Усі дослівні формули мають точне джерельне або словникове підтвердження.
      Популярні рядки без підтвердження лишаються матеріалом для парафрази.
    prompt: Розрізни умови, за яких формулу можна наводити дослівно, а коли варто залишатися на рівні переказу.
    questions:
      - Яка різниця між словниковою головною формою і повним прислів'ям?
      - Чому галицький варіант не треба нормалізувати в цитаті?
      - Що робити з популярним рядком, який не підтверджений доступним джерелом?
      - Чому літературний афоризм не слід автоматично називати народним?
    model_answers:
      - >-
        Словникова головна форма підтверджує сталий зворот, але не дозволяє без
        окремого джерела дописувати повний розширений рядок. Варіантна форма є
        частиною джерела: вона показує місце, запис і традицію впорядкування.
        Популярний непідтверджений рядок можна описати як парафразу або дати
        завдання на перевірку, але не цитувати як засвідчений народний рядок.
        Авторський афоризм може фольклоризуватися, але для цього потрібне
        окреме джерельне підтвердження циркуляції.

workbook:
  - id: act-5
    type: critical-analysis
    title: Коли "мудрість" шкодить
    target_text: Усі народні прислів'я треба приймати як моральні правила, бо їх створив колективний досвід.
    prompt: Розбери тезу так, щоб не знецінити традицію і не романтизувати проблемні формули.
    questions:
      - Чому ця теза приваблива для романтичного читання фольклору?
      - Чому паремії не утворюють єдиного морального кодексу?
      - Які типи шкоди може переносити коротка формула?
      - Як відрізнити історичний аналіз від прямого сучасного вживання?
      - Як сформулювати точнішу тезу?
    model_answers:
      - Вона бачить у коротких формулах досвід багатьох поколінь і захист української мовної пам'яті.
      - Паремії ситуативні й можуть суперечити одна одній, бо відповідають на різні обставини.
      - Формула може підтримувати стереотип, пасивність, патріархальну норму, класову зверхність або байдужість.
      - Історичний аналіз пояснює джерело, функцію й контекст, а пряме вживання бере формулу як актуальну оцінку.
      - Точніше сказати, що паремії є цінним архівом мовного досвіду, але кожна формула потребує контексту й етичної перевірки.

  - id: act-6
    type: comparative-study
    title: Українська традиція і світова мала форма
    instruction: Порівняй українські паремії з іншими короткими формами без колоніального зведення.
    items_to_compare:
      - Українське прислів'я як завершене ситуативне судження.
      - Українська приказка як образний зворот без обов'язкового висновку.
      - Латинські proverbia як книжно-риторична традиція короткої формули.
      - Китайські chengyu як сталі стислі вислови з культурною пам'яттю.
      - Сучасний мем як швидка впізнавана формула з новим медійним носієм.
    criteria:
      - джерельний статус
      - ступінь завершеності
      - залежність від ситуації
      - ризик хибного походження
      - етична функція
    prompt: Чому порівняння не повинне перетворюватися на твердження про залежність?
    model_answer: >-
      Короткі формули є універсальним жанровим механізмом, тому подібність
      не доводить походження. Для твердження про залежність потрібні конкретні
      джерела, маршрути передачі й варіанти; без них коректніше говорити про
      типологічну близькість.

  - id: act-7
    type: variant-comparison
    title: Варіант не є помилкою
    instruction: Порівняй, як різні джерельні режими змінюють роботу з формулою.
    prompt: У якому випадку найризикованіше втратити джерельну точність?
    variants:
      - label: Галицький запис
        text: Форма зберігає локальні мовні риси, які не треба виправляти в цитаті.
        source: Франків корпус через науковий коментар
      - label: Словникова форма
        text: Підтверджує сталий зворот, але не обов'язково підтверджує розгорнуте прислів'я.
        source: фразеологічний словник
      - label: Шкільний приклад
        text: Допомагає навчально розрізнити прислів'я і приказку, але не завжди є первинним джерелом.
        source: підручниковий корпус
      - label: Популярна пам'ять
        text: Формула може бути живою, але без назви конкретного видання її не слід цитувати як підтверджену.
        source: неперевірений обіг
    features:
      - чи можна цитувати дослівно
      - чи можна нормалізувати
      - чи є повний рядок
      - чи потрібна джерельна примітка
      - ризик вигаданого корпусу
    model_answer: >-
      Найризикованіше працювати з популярною пам'яттю: вона може бути живою,
      але легко додає, скорочує або нормалізує рядок. Без конкретного джерела
      краще використовувати парафразу або ставити завдання на перевірку.

  - id: act-8
    type: critical-analysis
    title: Номис, Франко, словник, мем
    target_text: >-
      Паремія може існувати як запис у збірнику, галицька приповідка,
      словниковий фразеологізм, літературний афоризм або сучасна переробка.
    prompt: Поясни, як обережно працювати з короткими формами різних джерельних режимів.
    questions:
      - Що дає збірник Номиса для історії української пареміографії?
      - Чому Франків корпус важливий для регіональної варіантності?
      - Що може й чого не може підтвердити фразеологічний словник?
      - Чому сучасний мем не слід просто називати новим прислів'ям?
    model_answers:
      - >-
        Збірник Номиса показує великий український корпус коротких форм XIX
        століття і мережу збирання в умовах імперського тиску. Франків корпус
        зберігає галицькі форми, термін "приповідка" і власну наукову культуру
        НТШ. Словник може підтвердити сталий зворот і значення, але не завжди
        підтверджує повне прислів'я або фольклорний запис. Мем може працювати як
        мала впізнавана формула, але має інший носій, авторство, швидкість
        поширення і джерельний режим.

  - id: act-9
    type: essay-response
    title: Паремія як етика повсякдення
    prompt: >-
      Напиши коротке доказове есе українською.

      У 280-360 словах поясни, чому приказки та прислів'я треба читати не як
      "вічну мудрість", а як ситуативні інструменти повсякденної етики.
      Обов'язково згадай джерельну перевірку, варіантність, форму, функцію в
      розмові та етичну межу сучасного вживання.
    model_answer: >-
      Приказки та прислів'я не варто читати як єдиний кодекс вічної мудрості,
      бо вони працюють у конкретних ситуаціях. Одна формула може застерігати
      від поспіху, інша підтримувати рішучу дію; одна цінує мовчання, інша
      може висміювати байдужість. Це не суперечність у поганому сенсі, а ознака
      того, що паремія є інструментом розмови.

      Джерельна перевірка потрібна тому, що короткі рядки легко змінюються.
      Якщо формулу подано в Номиса, Франка, словнику або перевіреному корпусі,
      її можна цитувати з приміткою. Якщо вона живе тільки в пам'яті, чесніше
      використати парафразу або перевірити її окремо. Варіантність також
      важлива: галицька форма не є помилкою, а показує місце й запис.

      Форма паремії стискає судження. Двочленність, антитеза, ритм, рима,
      тваринний або предметний образ роблять її легкою для пам'яті. Але головне
      - функція. У розмові така формула може докорити, пожартувати, підтримати,
      відмовити, привітати або приховати критику.

      Етична межа потрібна тому, що не кожна традиційна формула придатна для
      прямого сучасного вживання. Деякі вислови можуть переносити стереотипи або
      стару нерівність. Їх варто аналізувати як історичний матеріал, а не
      повторювати як норму. Саме так паремії відкривають етику повсякдення:
      вони показують, як українська мова стисло оцінювала людські ситуації.
    rubric:
      - criteria: Теза
        description: Пояснено ситуативність паремій
        points: 2
      - criteria: Джерела
        description: Названо потребу перевірки й межу цитування
        points: 2
      - criteria: Форма
        description: Проаналізовано стислість, образ або будову
        points: 2
      - criteria: Функція
        description: Показано роботу формули в розмові
        points: 2
      - criteria: Етична межа
        description: Розрізнено історичний аналіз і сучасне вживання
        points: 2
