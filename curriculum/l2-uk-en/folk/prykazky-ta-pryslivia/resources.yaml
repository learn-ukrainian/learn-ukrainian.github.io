- title: Грушевський про Франків корпус приповідок
  role: reading
  url: http://litopys.org.ua/hrushukr/hrush106.htm
  notes: >-
    Публічна сторінка Ізборника/Літопису з розділом Грушевського про
    приповідки, зокрема коментар до Франкового галицького корпусу; використано
    для коротких джерельних фрагментів і принципу збереження варіантної форми.
- title: Матвій Номис
  role: reference
  url: https://uk.wikipedia.org/wiki/Матвій_Номис
  notes: >-
    Довідкова сторінка для ідентифікації Номиса як Матвія Симонова та
    орієнтиру до видання "Українські приказки, прислів'я і таке інше"; саме
    видання перевірялося окремо як публічний оцифрований корпус.
- title: Прислів'я
  role: reference
  url: https://uk.wikipedia.org/wiki/Прислів%27я
  notes: >-
    Довідкова сторінка для базового жанрового орієнтиру; конкретні формули в
    уроці спираються на названі видання або словникові підтвердження, а не на
    довільне цитування.
