inline:
  - id: act-1
    type: variant-comparison
    title: Доля і вибір
    instruction: Порівняй три способи читати баладний трагізм.
    prompt: Чому баладу важко пояснити тільки фатумом або тільки особистим вибором?
    variants:
      - label: Фатальна оптика
        text: "Подія здається невідворотною: стріла летить, кінь несе звістку, людина переходить у дерево або птаха."
        source: Баладне відчуття неповернення
      - label: Етична оптика
        text: "За трагедією часто стоїть людська дія: примус, прокльон, зрада, покинення, соціальна влада або помста."
        source: Аналіз баладного конфлікту
      - label: Джерельна оптика
        text: Висновок залежить від того, чи маємо перевірений рядок, підручниковий друк, мотив або літературну рецепцію.
        source: Метод читання модуля
    features:
      - що пояснює позиція
      - що вона може приховати
      - який доказ потрібен
      - як вона читає відповідальність
    model_answer: >-
      Фатальна оптика допомагає зрозуміти невідворотність баладного фіналу,
      але може сховати людську відповідальність. Етична оптика повертає
      увагу до вчинку, примусу й влади, але може недооцінити символічну силу
      неповернення. Джерельна оптика тримає межу доказу: перевірений рядок,
      підручниковий текст, мотив і літературна рецепція не мають однакової
      сили.

  - id: act-2
    type: motif-formula
    title: Кінь-вісник
    instruction: Прочитай перевірений фрагмент як фігуральну звістку про смерть.
    passage: |-
      Не плач, мати, не журися:
      Та вже ж твій син оженився,
      Узяв собі паняночку —
      В чистім полі земляночку.
    formulas:
      - text: Не плач, мати, не журися
        label: поріг звістки
        explanation: Мати ще чує заспокійливу форму, але зміст уже веде до трагедії.
      - text: твій син оженився
        label: фігуральна заміна
        explanation: Шлюбна формула приховує і водночас відкриває смерть.
      - text: В чистім полі земляночку
        label: могила як дім
        explanation: Земляночка називає могилу мовою оселення, тому образ стає різкішим.
    prompt: Поясни, чому фігуральна мова в цьому фрагменті не пом'якшує, а підсилює трагедію.
    model_answer: >-
      Фрагмент говорить про смерть через слова родинного переходу: син ніби
      "оженився", але його "паняночка" і "земляночка" ведуть до могили в
      полі. Така заміна не приховує трагедію, а робить її гострою, бо
      домашня мова раптом відкриває неповернення.

  - id: act-3
    type: comparative-study
    title: Чотири режими доказу
    instruction: Розрізни, як можна використовувати баладний матеріал.
    items_to_compare:
      - Перевірений корпусний фрагмент, який можна аналізувати як дослівний рядок.
      - Текст, засвідчений у підручнику, який має навчальну вагу.
      - Ранній книжний свідок, який показує давність традиції.
      - Мотив або спірна назва, які не дають права цитувати з пам'яті.
    criteria:
      - режим доказу
      - межа цитування
      - обережний висновок
    prompt: Обери два режими доказу і поясни, чому вони не взаємозамінні.
    model_answer: >-
      Перевірений корпусний фрагмент можна аналізувати як дослівний рядок,
      бо він має підтвердження джерела. Текст, засвідчений у підручнику, має
      навчальну вагу, але його не треба видавати за окрему корпусну картку.
      Мотив або спірна назва придатні для контексту, але не для цитування з
      пам'яті.

workbook:
  - id: act-4
    type: comparative-study
    title: Українська балада і європейські паралелі
    instruction: Порівняй баладні традиції без ототожнення.
    items_to_compare:
      - Українська балада як ліро-епічна сюжетна пісня з символами поля, коня, Дунаю, тополі й зозулі.
      - Шотландська трагічна балада з мотивом отруєння, родинного діалогу й невідворотного фіналу.
      - Іспанський романс як співана оповідна форма з власною історичною й поетичною системою.
    criteria:
      - тип події
      - роль діалогу
      - символічний словник
      - межа аналогії
    prompt: Чому корисно бачити паралелі, але хибно називати українську баладу копією чужого жанру?
    model_answer: >-
      Паралелі корисні, бо різні традиції мають трагічні пісні про смерть,
      отруєння, родинний діалог або невірність. Але українська балада має
      власну систему символів, ранні свідчення, мову й зв'язок із козацьким,
      родинним та міфологічним матеріалом. Аналогія допомагає тільки тоді,
      коли не стирає конкретність української традиції.

  - id: act-5
    type: critical-analysis
    title: Проблемна теза про долю
    target_text: У баладі все вирішує доля, тому ніхто не відповідає за трагедію.
    instruction: Оціни тезу, яка перетворює фатум на виправдання.
    prompt: Що в цій тезі треба уточнити, щоб не стерти людський вчинок?
    questions:
      - Яке слово робить тезу надто загальною?
      - Які людські дії можуть стояти за баладною трагедією?
      - Як сформулювати обережніше?
    model_answers:
      - Слово "все" стирає різницю між невідворотним наслідком і людською дією.
      - За трагедією можуть стояти примусовий шлюб, прокльон, зрада, покинення, влада пана, родинний тиск або помста.
      - Точніше сказати, що балада поєднує відчуття фатального наслідку з питанням про людську відповідальність.

  - id: act-6
    type: critical-analysis
    title: Де межа цитування
    target_text: Сюжет про Гриця й отруту можна цитувати як народний рядок, бо він дуже відомий.
    instruction: Оціни тезу, яка змішує відомий сюжет із перевіреним дослівним рядком.
    prompt: Чому відомість сюжету не дорівнює праву цитувати з пам'яті?
    questions:
      - Який приклад має перевірений дослівний фрагмент?
      - Який приклад має підручникове засвідчення?
      - Чому сюжетний контекст не дорівнює цитаті?
    model_answers:
      - Перевірений дослівний фрагмент має "Ой на горі вогонь горить".
      - Підручникове засвідчення має "Ой летіла стріла".
      - Сюжет про Гриця й отруту можна назвати як контекст, але без підтвердженого рядка цитування з пам'яті змішує традицію, варіанти й літературну рецепцію.

  - id: act-7
    type: critical-analysis
    title: Жіночий голос і символ
    target_text: Жінка в баладі є тільки символом долі народу.
    instruction: Оціни тезу, яка перетворює людський біль на одну алегорію.
    prompt: Як зберегти національну й антиімперську оптику, але не стерти конкретну людину?
    questions:
      - Чому слово "тільки" звужує прочитання?
      - Які конкретні конфлікти можуть стояти за образом жінки?
      - Як переписати тезу точніше?
    model_answers:
      - Слово "тільки" стирає родинний, соціальний і особистий рівні трагедії.
      - За образом можуть стояти примусовий шлюб, влада матері або свекрухи, наруга, зрада, самотність, опір і пам'ять.
      - Точніше сказати, що жіночий образ може мати національний вимір, але передусім потребує читання конкретної баладної ситуації.

  - id: act-8
    type: essay-response
    title: Трагізм і відповідальність
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, як народна балада поєднує долю, вибір і
      символічний код. Обов'язково назви один перевірений фрагмент, один
      символ, один тип джерельної межі й один місток до літературної рецепції.
    min_words: 260
    model_answer: >-
      Народна балада поєднує долю і вибір так, що жодне з цих слів не
      пояснює трагедію повністю. У перевіреному фрагменті "Ой на горі
      вогонь горить" козак уже лежить під горою, а кінь має принести матері
      фігуральну звістку: син ніби "оженився", але його "земляночка" є
      могилою в полі. Тут відчувається фатальність: подія вже сталася, і
      простого повернення немає. Але ця фатальність не скасовує людського
      світу, бо смерть входить у родину через материнський плач, козацьку
      дорогу й кінську звістку.

      Символічний код робить трагедію видимою. Кінь є не прикрасою, а
      вісником між полем і домом. Тополя в інших баладних і літературних
      мотивах може зберігати жіночу самотність і примусовий шлюб у мові
      природи. Зозулі в баладі про вдовиного сина, засвідченій у підручнику,
      розподіляють різні голоси плачу. Важлива й джерельна межа: перевірений
      корпусний рядок можна аналізувати як дослівний фрагмент, підручниковий
      друк має навчальну вагу, а спірну назву не слід цитувати з пам'яті.

      Місток до літературної рецепції веде до Шевченкової баладної поетики:
      народний мотив метаморфози переходить у літературний твір, але не
      зникає як фольклорний матеріал. Саме тому балада є не просто сумною
      піснею, а способом думати про відповідальність, неповернення і пам'ять.
    rubric:
      - criteria: Фрагмент
        description: Названо конкретний перевірений або чітко атестований приклад.
      - criteria: Символ
        description: Символ пов'язано з дією в баладній сцені.
      - criteria: Джерельна межа
        description: Розрізнено корпусний фрагмент, підручниковий друк, мотив або рецепцію.
      - criteria: Узагальнення
        description: Висновок не зводить баладу ні до фатуму, ні до простого морального уроку.
