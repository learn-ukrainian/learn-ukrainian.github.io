- lemma: балада
  translation: ліро-епічна сюжетна пісня або твір із напруженою подією і трагічним чи несподіваним фіналом
  pos: іменник
  usage: Балада поєднує ліричний голос, епічну подію і драматичний діалог.
- lemma: фатум
  translation: відчуття невідворотної долі або наслідку, який уже не можна відкликати
  pos: іменник
  usage: У баладі фатум не завжди знімає людську відповідальність.
- lemma: трагізм
  translation: напруга ситуації, у якій щаслива розв'язка стає неможливою без втрати
  pos: іменник
  usage: Баладний трагізм виникає між людським вибором і неповерненням наслідку.
- lemma: метаморфоза
  translation: перетворення людини на рослину, птаха, квітку або інший природний знак
  pos: іменник
  usage: Метаморфоза переводить людський біль у мову природи.
- lemma: ліро-епічний
  translation: такий, що поєднує подію, розповідь, емоційний голос і співчуття
  pos: прикметник
  usage: Народна балада є ліро-епічною, бо має і сюжет, і ліричну напругу.
- lemma: фігуральна звістка
  translation: непряме повідомлення, у якому трагічний факт названо через образ або заміну
  pos: словосполука
  usage: Фігуральна звістка про козацьку смерть звучить як мова шлюбу й могили.
- lemma: кінь-вісник
  translation: баладний образ коня, який переносить звістку від поля смерті до родини
  pos: словосполука
  usage: Кінь-вісник з'єднує козацьке поле і материнський дім.
- lemma: зозуля
  translation: птах, який у баладному контексті може уособлювати голос оплакування
  pos: іменник
  usage: Зозулі в баладі допомагають розрізнити материнський, сестринський і любовний плач.
- lemma: тополя
  translation: дерево-символ самотності, метаморфози, дівочого образу й неповернення
  pos: іменник
  usage: Тополя в баладному мотиві може зберігати людську трагедію в ландшафті.
- lemma: Дунай
  translation: річка і фольклорний водний образ межі, смутку, далечіні або історичної пам'яті
  pos: іменник
  usage: Дунай у баладі треба читати через конкретний фрагмент, а не як незмінний знак.
- lemma: джерельна межа
  translation: чітке розрізнення між перевіреним рядком, підручниковим друком, мотивом і рецепцією
  pos: словосполука
  usage: Джерельна межа не дозволяє цитувати спірний рядок як підтверджений текст.
- lemma: підручникове засвідчення
  translation: доказовий режим, коли текст надруковано й прокоментовано в навчальному джерелі
  pos: словосполука
  usage: Підручникове засвідчення має навчальну вагу, але не завжди дорівнює корпусній картці.
- lemma: корпусний фрагмент
  translation: дослівний уривок, підтверджений через наявний текстовий корпус
  pos: словосполука
  usage: Корпусний фрагмент можна аналізувати як перевірений рядок.
- lemma: рецепція
  translation: подальше осмислення або перетворення фольклорного мотиву в літературі чи науці
  pos: іменник
  usage: Шевченкова баладна рецепція не скасовує фольклорного джерела мотиву.
- lemma: агентність
  translation: здатність персонажа діяти, чинити опір, пам'ятати або говорити, навіть під тиском
  pos: іменник
  usage: Агентність у баладі не завжди завершується перемогою, але не дає голосу зникнути.
