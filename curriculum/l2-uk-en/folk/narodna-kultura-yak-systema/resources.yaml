- title: 1877 – народився Микола Леонтович, композитор, автор «Щедрика»
  role: reference
  url: https://uinp.gov.ua/istorychnyy-kalendar/gruden/13/1877-narodyvsya-mykola-leontovych
  notes: >-
    Офіційний матеріал Українського інституту національної пам'яті називає
