inline:
  - id: act-1
    type: motif-formula
    title: Формула, приспів і шар системи
    instruction: Визнач, які шари народної культури працюють у позначених формулах і образах.
    passage: |-
      Ой сивая та і зозулечка.

      Приспів:

      Щедрий вечір, добрий вечір,
      Добрим людям на здоров'я!

      Усі сади та і облітала,
      А в одному та і не бувала.
      А в тім саду три тереми.
    formulas:
      - text: Щедрий вечір, добрий вечір
        label: приспів
        explanation: Повтор організує гуртовий голос і повертає кожен рядок до побажання.
      - text: Добрим людям на здоров'я
        label: адресат
        explanation: Рядок показує, що текст спрямований до людей дому, а не до безособового читача.
      - text: три тереми
        label: образний порядок
        explanation: Образ саду й теремів вводить родинну модель, яку далі уточнюють місяць, сонце й зірки.
    prompt: >-
      Назви принаймні два шари системи: словесний, голосовий, просторовий,
      виконавський або джерельний.
    model_answer: >-
      У фрагменті працюють словесний шар (формула й образ), голосовий шар
      (приспів), виконавський шар (побажання добрим людям) і просторовий шар
      (сад і тереми як модель дому).

workbook:
  - id: act-2
    type: variant-comparison
    title: Виконання, запис, уривок і переосмислення
    instruction: Порівняй чотири режими доказу і визнач, що саме дозволяє стверджувати кожен із них.
    prompt: >-
      Розрізни живе виконання, записаний варіант, уривок у цій темі та пізніше
      авторське або музичне переосмислення. Для кожного режиму назви доступний
      доказ і межу висновку.
    variants:
      - label: Живе виконання
        text: >-
          Учасники співають конкретний варіант у конкретній ситуації; голоси,
          темп, повтор і звертання діють разом, але без запису це виконання не
          можна дослівно відновити зі сторінки.
        region: виконавський шар
        source: конкретна ситуація виконання
      - label: Записаний варіант
        text: >-
          Публічна сторінка фіксує один текстовий варіант щедрівки та редакційну
          примітку про повтор приспіву після кожного рядка; це не повний опис усіх
          живих виконань жанру.
        region: джерельний шар
        source: ukrlib.com.ua, «Ой сивая та і зозулечка»
      - label: Уривок у темі
        text: >-
          Кілька перевірених рядків дають матеріал для близького читання форми,
          але не замінюють повного записаного варіанта.
        region: педагогічний шар
        source: уривок у цій темі
      - label: Пізніше переосмислення
        text: >-
          Микола Леонтович створив професійну хорову обробку «Щедрика»:
          композиторська форма показує тяглість народного матеріалу, але має
          окреме авторство й не є польовим записом живого виконання.
        region: міст до професійного мистецтва
        source: Микола Леонтович, хорова обробка «Щедрика»
    features:
      - хто є носієм або автором форми
      - що можна дослівно цитувати
      - який висновок підтримує джерело
      - що змінив посередник
      - де проходить межа висновку
    model_answer: >-
      Живе виконання показує дію голосів, темпу, повтору й адресата, але без
      запису його не можна відтворити дослівно. Записаний варіант дає конкретний
      текст для цитування й аналізу, проте не представляє всіх виконань жанру.
      Уривок у темі допомагає близько прочитати форму, але потребує звірення з
      повним варіантом. Хорова обробка Леонтовича засвідчує професійне музичне
      переосмислення народного матеріалу, однак не замінює ні живого виконання,
      ні записаного фольклорного тексту.

  - id: act-3
    type: performance
    title: Прочитати як виконавську ситуацію
    instruction: Прочитай фрагмент так, щоб голос передавав виконавську ситуацію — відмову, звертання й моральну напругу.
    prompt: >-
      Перед читанням назви жанр, публічне джерело, хто говорить і кому. Після
      читання поясни, який повтор, приспів або звертання змінив твоє виконання.
    fragment: |-
      "Братику ти наш рідний,
      Як голубоньку сивий!
      Гей, ми і самі не втечемо,
      І тебе не візьмемо".
    self_check:
      - Чи названо жанр і публічне джерело?
      - Чи не додано жодного рядка поза уривком?
      - Чи пояснено, хто говорить і кому?
      - Чи помітно в голосі відмову й звертання?
    show_record_button: true
    model_answer: >-
      Точне виконання не прикрашає текст новими словами. Воно називає думу,
      джерело, голос старших братів і показує, що повтор звертання створює
      моральну напругу.
