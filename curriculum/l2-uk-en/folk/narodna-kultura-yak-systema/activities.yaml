- id: act-1
  type: motif-formula
  title: Поетичні формули народного тексту
  instruction: Зістав кожну словесну формулу з її роллю в народному тексті.
  prompt: Визнач, яку роль виконує кожна формула в поетиці народного твору.
  text: 'У народному тексті форма ширша за віршовий розмір: зачин, постійний епітет,
    паралелізм, повтор і рефрен творять значення разом зі словом і наспівом.'
  passage: Казка відкривається сталим зачином; постійний епітет мандрує з пісні в
    пісню незмінно; паралелізм зіставляє образ природи й образ людини в одному рядку;
    повтор тримає структуру; рефрен закріплює ритм гуртового співу.
  formulas:
  - зачин
  - постійний епітет
  - паралелізм
  - повтор
  - рефрен
  answers:
  - вводить слухача у світ казки чи пісні на початку тексту
  - сталий образний зворот, що повторюється незмінно в багатьох піснях
  - зіставляє два образи — природи й людини — в одному рядку
  - тримає структуру тексту й полегшує усне відтворення
  - повтор у кінці строфи, що задає ритм гуртового співу
  model_answer: Зачин — формула початку; постійний епітет — сталий образ; паралелізм
    — зіставлення природи й людини; повтор — опора структури; рефрен — ритмічний повтор
    кінця строфи.
- id: act-2
  type: ritual-sequencing
  title: Календарно-обрядовий цикл
  instruction: Розташуй жанри календарного циклу за порами року — від зими до кінця
    жнив.
  steps:
  - 'Зима: колядки та щедрівки коло різдвяних свят'
  - 'Рання весна: веснянки та гаївки з рухом і грою'
  - 'Літо: купальські пісні коло сонцестояння'
  - 'Кінець жнив: жниварські та обжинкові пісні'
  items:
  - Купальські пісні — літнє сонцестояння
  - Колядки та щедрівки — зимові свята
  - Жниварські та обжинкові пісні — кінець жнив
  - Веснянки та гаївки — рання весна
  correct_order:
  - 1
  - 3
  - 0
  - 2
  model_answer: 'Річний ритм громади: узимку — колядки та щедрівки, навесні — веснянки
    та гаївки, влітку коло сонцестояння — купальські пісні, наприкінці жнив — жниварські
    та обжинкові пісні.'
- id: act-3
  type: motif-formula
  title: Обряд, мотив чи варіант
  instruction: Визнач, яке з трьох опорних понять описане в кожному формулюванні.
  prompt: 'Зістав кожне формулювання з поняттям: обряд, мотив або варіант.'
  text: 'Три опорні поняття треку: обряд відповідає на «яка дія?», мотив — на «що
    повторюється?», варіант — на «чим відрізняється цей запис від іншого?».'
  passage: 1) Усталена символічна послідовність дій, у якій слово, предмет і рух творять
    значення. 2) Регіональна, часова або виконавська форма того самого тексту. 3)
    Повторюваний образ або символічна формула, що мандрує від жанру до жанру.
  formulas:
  - обряд
  - варіант
  - мотив
  answers:
  - обряд — усталена символічна послідовність дій
  - варіант — регіональна, часова або виконавська форма того самого тексту
  - мотив — повторюваний образ або формула, що мандрує між жанрами
  model_answer: Перше формулювання — обряд; друге — варіант; третє — мотив.
- type: ritual-sequencing
  title: Як фольклорист читає народний текст
  instruction: 'Упорядкуй кроки аналізу: від польового запису до опису практики як
    системи.'
  steps:
  - Записати текст у польовій експедиції
  - Зафіксувати наспів, рух і обрядовий контекст виконання
  - Зіставити варіанти із сусідніх сіл і регіонів
  - Визначити повторювані мотиви та словесні формули
  - Описати практику як систему, а не окремий текст
  items:
  - Визначити повторювані мотиви та словесні формули
  - Записати текст у польовій експедиції
  - Описати практику як систему, а не окремий текст
  - Зафіксувати наспів, рух і обрядовий контекст виконання
  - Зіставити варіанти із сусідніх сіл і регіонів
  correct_order:
  - 1
  - 3
  - 4
  - 0
  - 2
  model_answer: 'Аналіз рухається від конкретного запису до системи: запис у полі
    → фіксація наспіву, руху, обряду → зіставлення варіантів → визначення мотивів
    і формул → опис цілої системи.'
- type: variant-comparison
  title: Усне побутування й писемна фіксація
  instruction: Порівняй два способи існування того самого народного тексту за поданими
    ознаками.
  prompt: Визнач, як змінюється текст, коли він живе усно й коли його закріплює писемний
    запис.
  variants:
  - 'Усне побутування: текст живе в багатьох варіантах, змінюється з кожним виконанням
    і виконавцем, залежить від простору й часу.'
  - 'Писемна фіксація: запис зберігає один варіант, виймає текст із живого виконання
    й зупиняє його варіювання.'
  features:
  - варіантність
  - роль виконавця
  - сталість тексту
  - контекст виконання
  model_answer: В усному побутуванні варіантність висока, виконавець співавтор, текст
    змінний, контекст живий. У писемній фіксації варіант один, виконавця замінює запис,
    текст сталий, контекст утрачено. Жоден спосіб не «вищий» — це різні форми існування
    того самого тексту.
- type: motif-formula
  title: Предметний знак як учасник значення
  instruction: Зістав кожен предметний знак із обрядом, у якому він творить значення.
  prompt: Поясни, який зміст несе кожен матеріальний знак у народній обрядовості.
  text: Рушник, коровай, сніп і вінок не «ілюструють» текст, а беруть участь у творенні
    значення нарівні зі словом і наспівом.
  passage: Рушник супроводжує перехід — весілля, проводи, зустріч. Коровай — обрядовий
    хліб весілля, знак єднання двох родів. Сніп — знак завершення жнив і родючості.
    Вінок — образ дівочості й цілості в купальській обрядовості.
  formulas:
  - рушник
  - коровай
  - сніп
  - вінок
  answers:
  - предметний знак переходу у весільному та поховальному обряді
  - обрядовий хліб весілля, символ єднання двох родів
  - знак завершення жнив і родючості
  - образ дівочості й цілості в купальській обрядовості
  model_answer: Рушник — перехід; коровай — весільне єднання; сніп — жнива й родючість;
    вінок — дівочість і цілість. Кожен предмет несе власний зміст, який доповнює пісню
    й обряд.
- type: essay-response
  title: Жанр як частина системи
  instruction: Напиши аналітичне есе про обраний жанр народної культури як частину
    ширшої системи.
  prompt: Обери один жанр (колядка, веснянка, дума або казка) і покажи, як у ньому
    працюють слово, наспів, рух, обряд, предмет, простір, виконавець і громада. Поясни,
    чому цей жанр не можна звести до самого тексту.
  min_words: 220
  source_reading: Розділи «Корпус і контекст» та «Поетика, символіка і виконання»
    цього уроку.
  rubric: Аналіз спирається щонайменше на чотири складники системи; названо хоча б
    один мотив або формулу; показано роль варіантності; висновок уникає рамки «милого
    пережитку».
  peer_review_guidelines: Перевір, чи автор розрізняє текст і виконання, чи названо
    конкретний обряд, чи є приклад варіантності та чи висновок повертає жанрові статус
    повноцінної системи.
  model_answer: 'Сильне есе бере, наприклад, колядку й показує її як обхід дворів:
    текст зі зачином і звертанням до господаря, наспів гурту, рух простором, дарунок,
    родинна функція й громада, що творить значення разом. Воно називає мотив побажання
    достатку, відзначає варіантність між селами й завершує тезою, що колядка — система,
    а не «старий текст».'
- type: critical-analysis
  title: Розбір імперської рамки «народності»
  instruction: Проаналізуй твердження, побудоване в колоніальній рамці, і покажи його
    хибу.
  context: Імперські й радянські наративи зводили українську культуру до етнографічної
    «народності» — нібито нижчого шару без інтелектуальної структури.
  target_text: «Народна культура — це милий пережиток села, нижчий шар при справжній,
    писемній і професійній культурі.»
  question: У чому полягає оцінкове упередження цього твердження і як системний погляд
    його спростовує?
  questions:
  - Який критерій «повноти» закладено в твердженні наперед?
  - Чому усність і варіантність тут хибно подано як «недорозвиненість»?
  - Як аналіз обряду, мотиву й варіанта повертає народній культурі статус системи?
  focus_points:
  - оцінковий характер критеріїв
  - колоніальна ієрархія писемне/усне
  - система пам'яті проти «пережитку»
  source_reading: Розділ «Деколонізаційна рамка» цього уроку.
  model_answer: Твердження наперед вважає «повною» лише писемну, професійну, міську
    культуру, тому усна автоматично «нижча». Це не висновок із фактів, а упередження
    в самих критеріях. Усність і варіантність — спосіб існування живої традиції, а
    не дефект. Системний аналіз слова, наспіву, руху, обряду й предмета показує власну
    складну логіку народної культури й спростовує нав'язану меншовартість.
  model_answers:
  - Критерій «повноти» прирівняно до писемності й професійності — отже, усне приречене
    бути «нижчим».
  - Усність і варіантність — це жива форма передання, а не брак розвитку.
  - Розбір обряду, мотиву й варіанта виявляє структуру й глибину, тобто статус повноцінної
    системи.
- type: comparative-study
  title: Музейний перелік чи система пам'яті
  instruction: Порівняй два підходи до народної культури за поданими критеріями й
    обґрунтуй, який точніший.
  prompt: Зістав «музейний перелік старих текстів» і «узгоджену систему пам'яті» як
    два способи описувати народну культуру.
  source_a: 'Музейний підхід: народна культура — це перелік окремих «старих текстів»,
    зібраних як експонати під склом; цінний лише записаний текст, а виконання, предмет
    і громада — другорядні.'
  source_b: 'Системний підхід: народна культура — узгоджена цілість слова, мелодії,
    руху, обряду, предмета, простору, виконавця й громади, що живе через варіанти
    й регіони.'
  criteria:
  - що є одиницею аналізу
  - роль виконання й предмета
  - ставлення до варіантності
  - висновок про статус культури
  items_to_compare:
  - музейний перелік текстів
  - узгоджена система пам'яті
  task: Для кожного критерію назви позицію обох підходів і поясни, чому системний
    погляд точніший і чесніший щодо матеріалу.
  source_reading: Розділи «Постановка проблеми» та «Підсумок» цього уроку.
  model_answer: Музейний підхід бере одиницею окремий текст, знецінює виконання й
    предмет, бачить у варіантності хаос і легко зводить культуру до «пережитку». Системний
    підхід бере одиницею цілість зв'язків, цінує наспів, рух і річ нарівні зі словом,
    читає варіантність як закон традиції й повертає культурі статус повноцінної системи.
    Другий підхід точніший, бо відповідає тому, як народна культура справді існує.
- type: performance
  title: Виступ-вступ до семінару
  instruction: Прочитай фрагмент уголос як вступ до семінару, потім поясни його своїми
    словами.
  prompt: Виконай фрагмент з ясною інтонацією, наголосом і паузами, наче відкриваєш
    фольклористичний семінар. Після читання у трьох-чотирьох реченнях поясни, чому
    народна культура — це система, а не перелік текстів.
  fragment: Народна культура — це узгоджена система слова, мелодії, руху, обряду,
    предмета, простору, виконавця й громади, а не музейний перелік старих текстів.
    Вона живе через варіанти, виконавців і регіони.
  self_checklist:
  - Я прочитав фрагмент без поспіху, з виразним наголосом.
  - Я зробив паузу там, де перелічую складники системи.
  - Я пояснив, чому текст без виконання, предмета й громади — лише уламок.
  - Я використав поняття обряд, мотив і варіант у поясненні.
  show_record_button: true
  model_answer: 'Зразок виступу: чітке читання фрагмента з паузами після кожного складника,
    далі коротке пояснення — народна культура поєднує слово, наспів, рух, обряд і
    предмет; прибрати один рівень означає втратити значення; тому її треба читати
    як систему, а не як збірку текстів.'
