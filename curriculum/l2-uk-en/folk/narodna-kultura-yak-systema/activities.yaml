- id: act-1
  type: motif-formula
  title: Формула, приспів і шар системи
  instruction: Визнач, який шар народної культури активний у кожному рядку.
  passage: 'Ой сивая та і зозулечка.

    Приспів:

    Щедрий вечір, добрий вечір,

    Добрим людям на здоров''я!

    Усі сади та і облітала,

    А в одному та і не бувала.

    А в тім саду три тереми.

    '
  formulas:
  - text: Щедрий вечір, добрий вечір
    label: приспів
    explanation: Повтор організує гуртовий голос і повертає кожен рядок до побажання.
  - text: Добрим людям на здоров'я
    label: адресат
    explanation: Рядок показує, що текст спрямований до людей дому, а не до безособового читача.
  - text: три тереми
    label: образний порядок
    explanation: Образ саду й теремів вводить родинну модель, яку далі уточнюють місяць, сонце й зірки.
  prompt: 'Назви принаймні два шари системи: словесний, голосовий, просторовий, виконавський або джерельний.'
  model_answer: У фрагменті працюють словесний шар (формула й образ), голосовий шар (приспів), виконавський шар (побажання добрим людям) і просторовий шар (сад і тереми як модель дому).
- id: act-2
  type: variant-comparison
  title: Повний текст, уривок, запис і переосмислення
  instruction: Порівняй режими доказу і визнач, що саме можна стверджувати.
  prompt: Один і той самий жанровий матеріал може бути повним публічним текстом, коротким уривком у модулі, записаним варіантом або пізнішою мистецькою обробкою.
  variants:
  - label: Повний публічний текст
    text: Учень відкриває сторінку ukrlib.com.ua і читає весь текст, який цитує урок.
    region: джерельний шар
    source: ukrlib.com.ua
  - label: Уривок у модулі
    text: Урок бере кілька рядків для близького читання, але не замінює повного тексту.
    region: педагогічний шар
    source: module.md
  - label: Пізніше переосмислення
    text: Композитор або письменник працює з народною формою, але створює власний авторський твір.
    region: міст до писемної культури
    source: шкільна і мистецька традиція
  features:
  - що можна цитувати
  - що можна доводити
  - що треба перевірити
  - де межа висновку
  model_answer: Повний публічний текст дає основу для цитати; уривок допомагає аналізувати форму, але має межу; переосмислення доводить вплив народної форми, проте не замінює джерельний фольклорний текст.
- id: act-3
  type: performance
  title: Прочитати як виконавську ситуацію
  instruction: Обери один фрагмент і прочитай його так, щоб було чути не декламацію, а ситуацію виконання.
  prompt: Перед читанням назви жанр, публічне джерело, хто говорить і кому. Після читання поясни, який повтор, приспів або звертання змінив твоє виконання.
  fragment: '"Братики мої рідненькії,

    Як голубоньки сивенькії,

Із собою візьміте..."

    '
  self_check:
  - Чи названо жанр і публічне джерело?
  - Чи не додано жодного рядка поза уривком?
  - Чи пояснено, хто говорить і кому?
  - Чи помітно в голосі прохання, повтор або приспів?
  show_record_button: true
  model_answer: Сильне виконання не прикрашає текст новими словами. Воно називає думу, джерело, голос молодшого брата і показує, що повтор звертання створює моральну напругу.
