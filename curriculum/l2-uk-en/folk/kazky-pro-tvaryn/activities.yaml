inline:
- id: act-1
  type: variant-comparison
  title: Чотири режими доказу
  instruction: Розрізни, що можна доводити з кожного типу матеріалу.
  prompt: Чому ці режими не можна змішувати?
  variants:
  - label: Архаїчний горизонт
    text: Джерела пов'язують звіриний епос із мисливсько-пастушим побутом і давніми уявленнями про тварину.
    source: Енциклопедичний опис
  - label: Літературний свідок
    text: Франків Лис Микита показує, як тваринна маска стає сценою влади й маніпуляції.
    source: Авторська обробка
  - label: Підручникова сцена
    text: '"Лисиця та Рак" або "Вовк і Чапля" корисні для аналізу алегорії, але їх не слід видавати за
      перевірений повний народний запис.'
    source: Шкільне походження
  - label: Назва без цитати
    text: '"Пан Коцький" або "Рукавичка" можуть бути прикладами для орієнтації без відтворення рядків.'
    source: Сюжетний покажчик
  - label: Тотемічне припущення
    text: Тваринна постать може берегти пам'ять про давні уявлення, але це треба називати припущенням.
    source: Гіпотеза
  - label: Алегорична дія
    text: Тварина стає видимою маскою людської поведінки через діалог, обман, страх або сміх.
    source: Поетика сюжету
  - label: Кумулятивний повтор
    text: Повтор тримає порядок подій і нарощує очікування, тому дитяче побутування не означає простоти.
    source: Форма пам'яті
  - label: Байкарський сусід
    text: Байка може мати близьку тваринну фабулу, але частіше завершує її прямою мораллю.
    source: Жанрова межа
  - label: Шкільна адаптація
    text: Підручниковий текст корисний для аналізу, якщо не видавати його за перевірений народний запис.
    source: Навчальний статус
  - label: Літературна обробка
    text: Авторський текст допомагає бачити механіку маски, але має власну авторську форму.
    source: Авторський статус
  - label: Назва сюжету
    text: Назва допомагає орієнтуватися в традиції, але не дозволяє складати дослівні рядки.
    source: Обережне посилання
  - label: Етична межа
    text: Сміх і хитрість треба читати разом із питанням, кого вони захищають або ранять.
    source: Відповідальне читання
  features:
  - що доводить
  - що не доводить
  - як назвати джерельний статус
  - де зупинити цитування
  model_answer: Архаїчний горизонт пояснює давність жанру, але не відновлює конкретний обряд. Літературний
    свідок дає точний авторський текст, але не замінює народний запис. Підручникова сцена корисна для
    алегорії, проте її треба називати підручниковою. Назва без цитати дозволяє говорити про сюжет, але
    не дає права вигадувати текст.
- id: act-2
  type: variant-comparison
  title: Тотем, алегорія чи перебільшення?
  instruction: Розрізни продуктивне читання, перебільшення і джерельну межу.
  prompt: Який режим дає найточніше прочитання казки про тварин?
  variants:
  - label: Архаїчний шар
    text: Жанр має давній мисливсько-пастуший горизонт, але конкретний текст потребує окремого доказу.
    source: Обережна реконструкція
  - label: Надмірне твердження
    text: Кожна пізня казка прямо описує тотемічний обряд.
    source: Перебільшення
  - label: Байкарська близькість
    text: Байка частіше формулює мораль явно, а казка може залишати висновок у самій дії.
    source: Жанрове розрізнення
  - label: Джерельна межа
    text: Якщо є лише назва сюжету, її можна використати як назву без дослівного цитування.
    source: Джерельна дисципліна
  - label: Кумулятивна форма
    text: Повтор у тваринній казці тренує пам'ять і показує наростання дії.
    source: Мнемонічна техніка
  - label: Світова паралель
    text: Reynard, Anansi або Coyote корисні для порівняння функцій, але не замінюють український матеріал.
    source: Порівняльна рамка
  - label: Українська конкретика
    text: Назви, інтонації, шкільна пам'ять і літературні обробки тримають сюжет у своїй культурі.
    source: Культурна належність
  - label: Дитяче побутування
    text: Дитяче читання є одним із шарів життя жанру, а не доказом його примітивності.
    source: Соціальна функція
  - label: Сатира на силу
    text: Коли слабший перемагає грубу силу, казка може звучати як соціальна сатира.
    source: Алегорична дія
  - label: Ризик романтизації
    text: Архаїчний горизонт не слід перетворювати на романтичну певність про кожний текст.
    source: Методична межа
  - label: Ризик редукції
    text: Лисицю не можна звести до одного ярлика, бо її хитрість має різні наслідки.
    source: Уважне читання
  - label: Практика цитування
    text: Короткий фрагмент можна аналізувати лише в межах його статусу й атрибуції.
    source: Джерельна робота
  features:
  - що можна довести
  - де починається перебільшення
  - як берегти українську конкретику
  - чому потрібна джерельна межа
  model_answer: Найточніше читання тримає разом архаїчний горизонт, алегоричну функцію і джерельну межу.
    Воно не заперечує давності жанру, але не видає кожну пізню казку за прямий доказ обряду; порівнює
    казку з байкою, але не зводить її до готової моралі.
- id: act-3
  type: critical-analysis
  title: Мить, коли страх стає владою
  target_text: 'На цьому можна добре виграти.

    '
  instruction: Проаналізуй короткий Франків фрагмент як літературний свідок, а не як народний запис.
  prompt: Як страх інших стає ресурсом влади?
  questions:
  - Яку ситуацію розпізнає Лис у цій короткій фразі?
  - Чому це літературний свідок, а не народний дослівний запис?
  - Як одна фраза показує різницю між кмітливістю і маніпуляцією?
  - Чому страх у цій сцені не є лише емоцією?
  - Яку роль має короткість фрази?
  - Чому не треба розгортати цей фрагмент у довгий переказ?
  - Як фрагмент пов'язує кмітливість із владою?
  - Що в цій сцені є комічним?
  - Що в цій сцені є тривожним?
  - Як назвати жанровий статус цього прикладу?
  - Який етичний висновок тут можливий?
  - Чому ця фраза добра для аналізу алегорії?
  model_answers:
  - 'Лис розпізнає, що чужий страх можна перетворити на владу: якщо його бояться, він може використати
    цей страх для самопіднесення.'
  - Це фрагмент із Франкової літературної обробки, тому його можна аналізувати як авторський свідок звіриного
    епосу, але не як дослівний народний запис.
  - Кмітливість тут полягає в швидкому розумінні ситуації, а маніпуляція починається тоді, коли це розуміння
    стає способом керувати страхом інших.
  - Страх стає соціальною силою, бо змінює поведінку звірів і відкриває Лисові шлях до впливу.
  - 'Короткість показує швидкість думки: Лис одразу бачить користь там, де інші бачать небезпеку.'
  - Довгий переказ без джерела змішав би авторський текст, пам'ять і вигадану реконструкцію.
  - Кмітливість переходить у владу, коли герой використовує чуже нерозуміння для власного статусу.
  - Комізм виникає з невідповідності між випадковою фарбою і високим страхом звірів.
  - Тривожним є те, що спільнотою можна керувати через зовнішній знак і страх.
  - Це літературна обробка звіриного епосу, а не дослівний фольклорний запис.
  - Хитрість може рятувати, але може також перетворитися на маніпуляцію.
  - Вона стискає людський механізм влади в одну тваринну сцену.
workbook:
- id: act-4
  type: critical-analysis
  title: Що дозволяє джерельний статус?
  instruction: Оціни уривок як джерельну ситуацію, а не як привід для довгого переказу.
  target_text: 'На цьому можна добре виграти.

    '
  prompt: Як назвати межі цього фрагмента?
  questions:
  - Що цей фрагмент дозволяє сказати про Лиса як трикстера?
  - Чого він не дозволяє доводити про всі народні казки про Лисицю?
  - Як коректно назвати цей фрагмент у власному аналізі?
  - Чому авторство Франка змінює спосіб читання?
  - Яку межу ставить короткий фрагмент?
  - Чому назва джерела важлива для слухача?
  - Що означає читати фрагмент без перебільшення?
  - Як короткий авторський текст може допомогти фольклорному аналізу?
  - Чому не можна доводити ним усі казки про Лисицю?
  - Яке формулювання найточніше?
  - Де тут джерельна скромність?
  - Що варто зробити перед використанням повного тексту?
  model_answers:
  - Фрагмент дозволяє аналізувати Лиса як персонажа, який бачить страх інших і перетворює його на ресурс
    влади.
  - Він не доводить, що саме так звучав народний запис казки про Лисицю або що всі лисичі сюжети мають
    однакову мораль.
  - У власному аналізі його треба назвати коротким літературним свідком із Франкової обробки звіриного
    епосу.
  - Авторство показує, що ми читаємо літературну обробку з власною формою й сатирою.
  - Він дозволяє аналізувати механіку страху, але не всю історію лисичого циклу.
  - Назва джерела пояснює, звідки взято слова і чому їх не слід видавати за інший тип тексту.
  - Це означає робити висновки тільки з того, що справді подано й атрибутовано.
  - Він підсвічує механіку маски, яку можна обережно порівнювати з народними сюжетами.
  - Один авторський фрагмент не представляє всі варіанти, регіони й способи побутування.
  - 'Найточніше казати: короткий Франків літературний свідок тваринної алегорії.'
  - У відмові від довгого цитування й від змішування різних статусів тексту.
  - Потрібно мати стабільне джерело, публічну атрибуцію і зрозумілий статус варіанта.
- id: act-5
  type: comparative-study
  title: Українська Лисиця і світовий трикстер
  instruction: Порівняй тваринні постаті без стирання української конкретики.
  items_to_compare:
  - 'Українська Лисиця або Лис Микита: мова, хитрість, страх, соціальна сцена.'
  - 'Reynard: європейський лисичий цикл і алегорична тваринна сатира.'
  - 'Anansi або Coyote: трикстер, який порушує правила й перевертає ієрархію.'
  - 'Вовк в українських казках: груба сила, голод, самовпевненість і поразка через недалекість.'
  - 'Рак або Їжак: мала істота, яка перемагає завдяки кмітливому ходу.'
  - 'Заєць: страх і життя поруч із небезпекою, не лише простий об''єкт сміху.'
  - 'Ведмідь: фізична сила без гнучкої думки, комічна повільність або пиха.'
  - 'Кіт або Півник: домашній простір, довіра, небезпека обману й потреба допомоги.'
  - 'Коза-дереза: удавана влада, захоплення простору й комічне викриття.'
  - 'Байкарська Лисиця: близька маска, але частіше з прямим моральним висновком.'
  - 'Франків Лис Микита: авторська сатирична обробка тваринної маски.'
  - 'Кумулятивна Рукавичка: повтор, місткість простору й наростання учасників.'
  criteria:
  - тваринна маска
  - спосіб перемоги
  - ставлення до сили
  - культурна конкретика
  - межа порівняння
  - джерельний статус
  - тип сміху
  - етичний ризик
  - зв'язок із дитячим побутуванням
  - роль повтору
  - тип влади
  - межа алегорії
  prompt: Як порівнювати трикстерів так, щоб світова паралель не поглинула український матеріал?
  model_answer: 'Треба розрізняти функцію і побутування. Функція трикстера широка: хитра істота порушує
    правила, обманює сильніших або викриває дурість влади. Але українська Лисиця живе в українських назвах,
    діалогах, оповідній інтонації, шкільній пам''яті й Франковій літературній обробці. Порівняння розширює
    контекст, але не робить український сюжет чужим або безіменним.'
- id: act-6
  type: critical-analysis
  title: Коли теза переходить межу
  target_text: Кожна українська казка про тварин прямо зберігає тотемічний обряд, а всі пізніші алегорії
    лише приховують цей первісний зміст.
  instruction: Розбери тезу, яка бере корисну ідею про архаїчний шар і перетворює її на надмірне твердження.
  prompt: Як переписати цю тезу джерельно точніше?
  questions:
  - Яку частину тези можна зберегти?
  - Що в ній перебільшено?
  - Чому слово "кожна" є проблемним?
  - Як врахувати і тотемічний горизонт, і алегоричну функцію?
  - Чому архаїчний шар не є автоматичним доказом?
  - Як у тезі змішано жанр і окремий текст?
  - Чому алегорія не лише приховує давність?
  - Як назвати правильний масштаб доказу?
  - Що дає слово "можуть" у точнішій тезі?
  - Яку роль має варіантність?
  - Як врахувати літературні обробки?
  - Який висновок буде надмірним?
  model_answers:
  - Зберегти можна думку, що жанр має давній мисливсько-пастуший і можливий тотемічний горизонт.
  - 'Перебільшено твердження про кожну казку і пряме збереження обряду: пізній варіант не можна автоматично
    читати як протокол давньої практики.'
  - Слово "кожна" стирає варіантність, джерельний статус і пізніші літературні або навчальні обробки.
  - 'Точніше: казки про тварин можуть нести архаїчні сліди, але конкретний текст треба аналізувати за
    його джерелом, варіантом і алегоричною роботою.'
  - Він дає рамку походження, але не підтверджує кожну пізню сцену як обряд.
  - Опис жанру перенесено на кожен конкретний варіант без додаткового доказу.
  - Алегорія може бути самостійною пізнішою роботою сюжету, а не маскою одного первісного змісту.
  - Треба говорити про можливий шар жанру і про статус конкретного тексту окремо.
  - Воно зберігає відкритість гіпотези й не перетворює її на бездоказову певність.
  - Варіантність показує, що один сюжет живе в різних формах і не має одного автоматичного змісту.
  - Їх треба називати авторськими текстами, навіть коли вони працюють із фольклорною маскою.
  - Надмірним буде твердження, що всі тваринні казки прямо зберігають один обряд.
- id: act-7
  type: critical-analysis
  title: Дитяча казка не означає мала тема
  target_text: Якщо "Рукавичку" або "Ріпку" читають дітям, то вони не мають серйозної фольклорної форми.
  instruction: Оціни хибне ототожнення дитячого побутування з примітивністю.
  prompt: Яку роботу виконує кумулятивний повтор?
  questions:
  - Що повтор допомагає запам'ятати?
  - Як наростання персонажів створює напругу?
  - Чому дитяча функція може бути складною культурною технікою?
  - Чому дитяча адреса не скасовує фольклорної складності?
  - Що повтор робить із мовою?
  - Як повтор пов'язаний із колективною дією?
  - Чому малий простір може бути драматичним?
  - Що бачить дорослий читач у дитячій казці?
  - Яка помилка є найчастішою?
  - Чому повтор не дорівнює механічності?
  - Як кумулятивність пов'язана з усною традицією?
  - Який висновок слід зробити?
  model_answers:
  - Кумулятивний повтор тримає порядок дій, послідовність персонажів і очікування наступного кроку.
  - 'Наростання створює напругу: маленький простір або одна дія поступово перевіряються новими учасниками.'
  - Дитяча функція не робить форму бідною; вона показує, як усна традиція тренує пам'ять, ритм і соціальне
    мислення.
  - Дитяче слухання може зберігати складну форму повтору, пам'яті й очікування.
  - Він створює ритм, передбачення і впізнавану формулу наступного кроку.
  - У сюжетах на кшталт Ріпки результат залежить від ланцюга учасників.
  - У Рукавичці малий простір постійно перевіряється новими персонажами.
  - Він бачить модель порядку, межі, гостинності, перевантаження або спільної дії.
  - Найчастіша помилка — назвати простоту адресата бідністю форми.
  - Повтор організує увагу і створює очікування зміни.
  - Вона допомагає запам'ятовувати й відтворювати послідовність без письмового тексту.
  - Дитяча функція може бути складною культурною технікою, а не дрібною забавкою.
- id: act-8
  type: essay-response
  title: Від тваринної маски до людської поведінки
  instruction: Напиши доказове есе українською.
  prompt: У 260-340 словах поясни, як казка про тварин перетворює тварину на алегоричну маску людської
    поведінки. Обов'язково назви одну українську тваринну постать, одну світову трикстерську паралель,
    одну джерельну пересторогу і одну етичну пересторогу.
  min_words: 260
  model_answer: 'Казка про тварин перетворює тварину на алегоричну маску через дію, діалог і повторювану
    роль. Лисиця не просто біологічна тварина, а постать хитрості, улесливості й швидкого розпізнавання
    ситуації. Вовк часто має грубу силу й голод, але програє через недалекість. Заєць або Рак можуть показувати
    слабкість, яка знаходить спосіб вижити. Саме тому слухач бачить у тваринній сцені людську поведінку:
    пиху, страх, жадібність, кмітливість або маніпуляцію.

    Українська Лисиця близька до світових трикстерів, наприклад Reynard, Anansi або Coyote, бо хитра тварина
    в багатьох культурах порушує правила й перевертає ієрархію. Але порівняння не має стирати українську
    конкретику: наші назви, оповідна інтонація, шкільні сюжети і Франків Лис Микита належать українській
    культурі.

    Джерельна пересторога полягає в тому, що повні тексти не можна складати з пам''яті. Якщо є тільки
    назва, її треба використовувати як назву; якщо є підручникова сцена, треба назвати її підручниковою;
    якщо є Франків фрагмент, це літературний свідок. Етична пересторога теж потрібна: хитрість може визволяти
    слабшого, але може перетворитися на обман і владу через страх. Тому казку варто читати уважно, не
    зводячи її ні до дитячої забавки, ні до готової моралі.'
