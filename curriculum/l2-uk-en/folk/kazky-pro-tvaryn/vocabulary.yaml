- lemma: казка про тварин
  translation: різновид народної казки, де тварини говорять і діють як люди, виявляючи людські риси
  pos: словосполука
  usage: Казка про тварин показує людську поведінку через тваринну маску.
- lemma: звіриний епос
  translation: фольклористична назва архаїчного шару оповідей про тварин
  pos: словосполука
  usage: Звіриний епос підкреслює давній і широкий горизонт жанру.
- lemma: тотемізм
  translation: система уявлень, у якій рід пов'язує себе з твариною або іншою істотою-покровителем
  pos: іменник
  usage: Про тотемізм у казках треба говорити як про гіпотетичний архаїчний шар.
- lemma: трикстер
  translation: хитрий персонаж-порушник правил, який перевертає звичну ієрархію
  pos: іменник
  usage: Лисиця часто працює як трикстер, бо перемагає не силою, а хитрістю.
- lemma: алегорія
  translation: іносказання, коли конкретний образ представляє людську рису або абстрактне поняття
  pos: іменник
  usage: У казці про тварин алегорія діє через сюжет і діалог.
- lemma: тваринна маска
  translation: усталена роль тварини, через яку впізнається людський тип поведінки
  pos: словосполука
  usage: Тваринна маска Лисиці поєднує хитрість, мову й маніпуляцію.
- lemma: кумулятивний
  translation: побудований на ланцюговому додаванні й повторі елементів
  pos: прикметник
  usage: Кумулятивний сюжет допомагає слухачеві пам'ятати порядок дій.
- lemma: антропоморфізм
  translation: наділення тварин або речей людськими рисами, мовою й поведінкою
  pos: іменник
  usage: Антропоморфізм робить тварину учасником людського соціального конфлікту.
- lemma: байка
  translation: короткий алегоричний твір із фабулою і моральним або сатиричним висновком
  pos: іменник
  usage: Байка споріднена з казкою про тварин, але не замінює її.
- lemma: дидактичний
  translation: повчальний, спрямований на навчання або моральний висновок
  pos: прикметник
  usage: Дидактичний зміст у казці може бути прихований у самій дії.
- lemma: мнемонічний
  translation: такий, що допомагає запам'ятовуванню
  pos: прикметник
  usage: Повтор у кумулятивній казці має мнемонічний ефект.
- lemma: сатира
  translation: різке висміювання людських або суспільних вад
  pos: іменник
  usage: Тваринна алегорія легко переходить у сатиру на владу або жадібність.
- lemma: персоніфікація
  translation: наділення істоти, речі або явища людською поведінкою й голосом
  pos: іменник
  usage: Персоніфікація дозволяє казці дати голос Лисиці, Вовкові або Ракові.
- lemma: джерело
  translation: походження й текстова основа, які дозволяють оцінити надійність матеріалу
  pos: іменник
  usage: Без чистого джерела не варто відтворювати повний текст казки.
- lemma: джерельний режим
  translation: спосіб визначити, чи маємо народний запис, літературну обробку, підручниковий текст або лише назву
  pos: словосполука
  usage: Джерельний режим не дозволяє змішувати Франка з непозначеним народним переказом.
- lemma: звіроловство
  translation: традиційне добування звірів, пов'язане з мисливським побутом
  pos: іменник
  usage: Звіроловство допомагає зрозуміти архаїчний горизонт казок про тварин.
- lemma: вайлуватий
  translation: незграбний, повільний і важкий у рухах
  pos: прикметник
  usage: Ведмідь у казковій масці часто сильний, але вайлуватий.
- lemma: зажерливий
  translation: надмірно жадібний до їжі або здобичі
  pos: прикметник
  usage: Зажерливий Вовк програє, бо поспішає й недооцінює слабшого.
- lemma: самопрезентація
  translation: спосіб показати себе іншим і створити бажане враження
  pos: іменник
  usage: Лис Микита будує самопрезентацію на страхові інших звірів.
- lemma: варіантність
  translation: існування різних записів, виконань і переказів близького сюжету
  pos: іменник
  usage: Варіантність усної казки вимагає обережного цитування.
- lemma: казкар
  translation: народний оповідач і носій казкової традиції
  pos: іменник
  usage: Казкар міг скорочувати або розгортати діалог залежно від ситуації виконання.
- lemma: панібрат
  translation: фамільярний товариш або удавано близький приятель
  pos: іменник
  usage: У назві "Вовк-панібрат" уже чути напругу між близькістю й обманом.
