- id: act-1
  type: ritual-sequencing
  title: Рух родинного циклу
  instruction: Упорядкуй етапи так, щоб було видно рух життєвого переходу.
  steps:
    - Народження дитини і перші домашні дії.
    - Хрестини, куми і християнське визнання дитини.
    - Пострижини як річний родинний рубіж.
    - Сватання і заручини як початок весільної домовленості.
    - Гільце, коровай, вінок і вінчання у весільній сцені.
    - Похорон, голосіння і поминання як перехід у родинну пам'ять.
  correct_order: [1, 2, 3, 4, 5, 6]
  model_answer: >-
    Точний порядок іде від входження дитини до дому й громади до зміни
    родового статусу у весіллі, а далі до похорону і поминання. Відповідь
    має назвати не тільки події, а й те, який статус змінюється.

- id: act-2
  type: motif-formula
  title: Формула, предмет, дія
  instruction: Розбери короткі фрагменти за трьома опорами.
  prompt: "Що названо у фрагменті: формула, предмет чи родова дія?"
  passage: |
    щоб було таке тверде
    родину зібрати, убогую і багатую, близькую і далекую
    та рясненький, усьому роду веселенький
    Моя щіпочка одщіпнулася, Моє яблучко одкотилося
  formulas:
    - text: "щоб було таке тверде"
      label: побажання тілесної міцності
      explanation: Формула стоїть біля родильного переходу і домашнього простору.
    - text: "родину зібрати"
      label: родова дія весілля
      explanation: Весілля кличе не тільки пару, а ширшу родину.
    - text: "усьому роду веселенький"
      label: коровай і родовий достаток
      explanation: Весільний хліб стає знаком радості роду.
    - text: "Моя щіпочка одщіпнулася"
      label: образ відламаності
      explanation: Голосіння називає втрату через відділення частини від цілого.
  model_answer: >-
    Уривки працюють не як повні сюжети, а як стислий словесний доказ:
    родильна формула бажає міцності, весільні формули збирають і веселять
    рід, а голосіння називає втрату через образ відщеплення.

- id: act-3
  type: variant-comparison
  title: Три межі доказу
  instruction: Порівняй короткі фрагменти без узагальнення на всю Україну.
  variants:
    - label: Родильна формула
      text: "щоб було таке тверде"
    - label: Весільна формула
      text: "родину зібрати"
    - label: Голосіння
      text: "Моя щіпочка одщіпнулася"
  features:
    - Який перехід названо?
    - Хто або що стоїть у центрі?
    - Яку межу доказу треба тримати?
  prompt: >-
    Напиши 80-110 слів про те, що кожен фрагмент дозволяє сказати, а що
    було б домислом.
  model_answer: >-
    Родильна формула дозволяє говорити про побажання міцності біля входу
    дитини до дому, але не про універсальний родильний сценарій. Весільна
    формула дозволяє бачити рід як учасника весілля, але не описує всі
    етапи весілля. Голосіння дозволяє читати втрату як відламаність від
    цілого, але не дає повної теорії похоронної поетики.

- id: act-4
  type: performance
  title: Прочитати голосіння стримано
  instruction: Підготуй коротке читання фрагмента без сценічного перебільшення.
  prompt: Де ти зробиш паузу, щоб було чути формулу втрати?
  fragment: |
    Моя щіпочка одщіпнулася,
    Моє яблучко одкотилося.
  self_check:
    - Я читаю повільно і стримано.
    - Я не додаю слів поза фрагментом.
    - Я пояснюю образ відламаності, а не граю декоративний сум.
  model_answer: >-
    Пауза після першого рядка допомагає почути відщеплення. Читання має
    бути стриманим: головне не гучність, а точність формули.

- id: act-5
  type: critical-analysis
  title: Не декоративна етнографія
  instruction: Поясни, чому теза спрощує родинну обрядовість.
  target_text: "Українське весілля - це тільки красивий народний спектакль."
  prompt: >-
    Родинні обряди іноді подають як набір барвистих звичаїв без джерела,
    голосу, християнської рамки і соціальної складності. Що в цій тезі
    втрачено?
  questions:
  - Де зникає рід?
  - Де зникає християнська рамка?
  - Де зникають історичний тиск і майнові домовленості?
  evaluation_criteria:
  - Названо роль роду, а не тільки пари.
  - Згадано коровай, гільце або вінчання як дію й предмет.
  - Помічено родовий контроль, майновість або гендерну асиметрію.
  model_answers:
  - >-
    Теза зводить весілля до видовища. Насправді весільна дія збирає два
    роди, має предмети в дії, включає вінчання і може містити історичні
    форми тиску. Краса форми не скасовує соціальної складності.

- id: act-6
  type: comparative-study
  title: Карта родинної обрядовості
  instruction: Порівняй межі оглядової карти з наступними жанровими темами.
  prompt: >-
    Що оглядова карта пояснює загально, а що мають розгорнути окремі теми про весільні пісні й голосіння? Напиши стислу
    відповідь про різницю між картою родинної обрядовості, докладним читанням
    весільних пісень і докладним читанням голосінь.
  items_to_compare:
    - система переходів
    - весільні формули
    - похоронні голосіння
    - межа доказу
  criteria:
    - широта карти
    - глибина жанру
    - джерельна обережність
  model_answer: >-
    Огляд родинної обрядовості дає карту: народження, хрестини, весілля, похорон і поминання як
    переходи. Окрема тема про весільні пісні має докладніше читати весільну поетику, етапи, ролі й
    пісенні формули. Окрема тема про голосіння має докладніше читати голосіння як похоронний
    жанр. Оглядова карта не повинна привласнювати глибину цих наступних тем.
