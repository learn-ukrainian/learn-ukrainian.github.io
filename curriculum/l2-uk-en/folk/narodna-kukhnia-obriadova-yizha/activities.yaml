version: "1.0"
module: narodna-kukhnia-obriadova-yizha
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Не меню, а система
    instruction: Розрізни три режими харчової практики за ситуацією, дією і джерельною межею.
    prompt: Чому та сама страва може бути буденною, святковою або обрядовою?
    variants:
      - label: Буденна страва
        text: Борщ, каша, хліб або вареники можуть бути частиною щоденного харчування без окремої ритуальної послідовності.
        source: повсякденний стіл
      - label: Святкова страва
        text: Паска, калач, узвар або багатший борщ можуть позначати урочистий день, гостину або завершення посту.
        source: календар і гостина
      - label: Обрядова страва
        text: Кутя, коливо чи коровай змінюють статус через час, учасників, слово, послідовність подавання і пам'ять.
        source: ритуальна дія
    features:
      - час
      - учасники
      - послідовність
      - слово або формула
      - поділ
      - межа доказу
    model_answer: >-
      Страва не є обрядовою сама по собі. Її статус задають час, учасники,
      дія і спосіб подавання. Борщ може бути щоденним обідом, святковою
      гостиною або сучасним знаком спадщини. Кутя стає різдвяною чи
      поминальною через календар, початок трапези, зерно, пам'ять і коло
      родини. Коровай стає весільним знаком через коровайниць, піч, пісню,
      поділ і благословення молодих.

  - id: act-2
    type: motif-formula
    title: Хліб у чотирьох діях
    instruction: Прочитай формули про хліб як дії, а не як декоративні вислови.
    passage: |-
      обмін хлібом
      рухай, короваю
      хліб покріпляє серце
      хліб святий — дар божий
    formulas:
      - text: обмін хлібом
        label: домовленість і зарука
        explanation: Хліб підтверджує соціальний перехід між родами, а не лише прикрашає весільний стіл.
      - text: рухай, короваю
        label: звертання до обрядового учасника
        explanation: До короваю говорять як до предмета, що входить у весільну дію.
      - text: хліб покріпляє серце
        label: підтримка внутрішньої сили
        explanation: Формула виводить хліб за межі поживи і пов'язує його з людською стійкістю.
      - text: хліб святий — дар божий
        label: пошана й відповідальна поведінка
        explanation: >-
          Святість хліба треба читати через дію: ділити, не кидати, вітати,
          благословляти.
    prompt: Як ці чотири приклади показують різні функції хліба?
    model_answer: >-
      У першому прикладі хліб працює як знак домовленості, у другому коровай
      стає адресатом весільної мови, у третьому хліб підтримує серце, а в
      четвертому він названий святим даром. Це не чотири прикраси до
      рецепта, а чотири соціальні й словесні функції.

  - id: act-3
    type: ritual-sequencing
    title: Шлях короваю
    instruction: Упорядкуй весільну послідовність так, щоб коровай не став просто красивою хлібиною.
    steps:
      - Добрати коровайниць і домовитися про час печення.
      - Підготувати борошно, воду, яйця, посуд і піч.
      - Місити або бгати тісто в колі учасниць і пісень.
      - Оздобити коровай шишками, пташками з тіста, барвінком або іншими локальними елементами.
      - Посадити коровай у піч і дочекатися випікання.
      - Винести коровай до весільного столу як центральний знак.
      - Краяти й роздавати його відповідно до ролей, роду, гостей і благословення молодих.
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    model_answer: >-
      Послідовність переводить борошно і тісто в весільний знак. Спершу
      визначають учасниць і готують матеріал, потім тісто проходить через руки,
      пісні, оздоблення і піч. Лише після цього коровай входить на стіл і може
      бути поділений між родом, гостями й молодими.

  - id: act-4
    type: variant-comparison
    title: Три регіональні оптики
    instruction: Порівняй регіони через продукти, довкілля і межу доказу, а не через туристичні ярлики.
    prompt: Як регіон змінює розмову про народну кухню?
    variants:
      - label: Полтавщина
        text: Сильна літературна видимість борщу, галушок, вареників, печених і варених страв, але без твердження про однакове меню кожної родини.
        source: літературна й історико-культурна оптика
      - label: Гуцульщина
        text: Докладні різдвяні переліки, варіація кількості страв, локальні назви каш, пирогів, бобових і страв із поля та городу.
        source: різдвяний стіл і локальна повнота
      - label: Полісся
        text: Ліс, болото, ягоди, гриби, риба, дикороси й бідніші ґрунти; джерела дають насамперед довкілля, а не готовий список святкових страв.
        source: екологія і обережна реконструкція
    features:
      - продуктова база
      - джерельний тип
      - літературна видимість
      - локальні назви
      - ризик екзотизації
      - межа узагальнення
    model_answer: >-
      Регіон не додає декоративну назву до спільного меню, а змінює доступні
      продукти, техніки, слова й докази. Полтавщина має сильний літературний
      образ страв, Гуцульщина дає матеріал для різдвяної варіантності, а
      Полісся треба читати через довкілля і сировину. У кожному разі важливо не
      робити один регіон нормою для всієї традиції.

workbook:
  - type: critical-analysis
    title: Не борщ і вареники як межа
    instruction: Виправ тезу так, щоб вона не зменшувала народну кухню до двох упізнаваних назв.
    target_text: Українська народна кухня — це передусім борщ і вареники.
    prompt: Що в цій тезі слабке і як сказати точніше?
    questions:
      - Які страви й практики зникають у такому скороченні?
      - Чому борщ і вареники самі потребують контексту?
      - Як додати календарний, родинний і поминальний шар?
      - Яка збалансована теза можлива?
    model_answers:
      - Зникають кутя, коливо, коровай, калач, паска, крашанки, узвар, голубці, галушки, хлібосольність і регіональні практики.
      - Вони можуть бути буденними, святковими або частиною спадщини залежно від ситуації.
      - Треба назвати Святвечір, Великдень, весілля, родини, поминки й гостину.
      - Точніше сказати, що борщ і вареники є важливими, але народна кухня є ширшою системою страв, дій, слів, календаря і родинної пам'яті.

  - type: critical-analysis
    title: Борщ без монополії і стирання
    instruction: Оціни дві слабкі позиції та сформулюй сильнішу нейтральну рамку.
    target_text: >-
      Позиція А: борщ є тільки українським, і сусіди не мають права на власні
      борщові практики. Позиція Б: борщ є просто спільним супом, тому українська
      спадщина тут не має окремої ваги.
    prompt: Яка позиція точніша і чому?
    questions:
      - Що перебільшує позиція А?
      - Що стирає позиція Б?
      - Як офіційна рамка ЮНЕСКО допомагає сформулювати третю позицію?
      - Чому така рамка є деколонізованою, а не нейтрально-беззмістовною?
    model_answers:
      - >-
        Обидві позиції слабкі. Позиція А робить зайву монополію і не бачить
        споріднених регіональних практик. Позиція Б стирає українську назву,
        родинну передачу, регіональні варіанти і сучасну потребу охорони.
        Сильніша теза така: культура приготування українського борщу є окремою
        українською нематеріальною спадщиною, що потребує охорони; водночас інші
        спільноти можуть мати власні борщові традиції.

  - type: comparative-study
    title: Кутя і коливо
    instruction: Порівняй споріднені зернові страви через час, дію і соціальну функцію.
    items_to_compare:
      - "Кутя на Святвечір: зерно, мед, мак, узвар, початок родинної вечері, різдвяний межовий час."
      - "Коливо на поминках: зерно, сита або солодка рідина, перший жест поминального обіду, пам'ять про померлого."
    criteria:
      - календарний або поминальний час
      - порядок подавання
      - учасники
      - символіка зерна
      - ризик назвати обидві страви просто десертом
    prompt: Чому спільна зернова основа не робить ці контексти однаковими?
    model_answer: >-
      Спільне зерно показує життя, поле і пам'ять, але ситуація змінює
      значення. Кутя на Святвечір відкриває різдвяну родинну трапезу і пов'язує
      дім із межовим часом року. Коливо на поминках починає трапезу пам'яті і
      скеровує увагу до покійного та громади живих. Тому обидві страви не можна
      називати просто солодкою кашею.

  - type: performance
    title: Пояснити коровай без вигаданої цитати
    instruction: Підготуй короткий усний коментар до весільного короваю.
    prompt: >-
      За 60-90 секунд поясни, чому коровай є обрядовою дією, а не тільки
      красивим хлібом. Використай слова "коровайниці", "піч", "пісня",
      "краяти" і "благословення".
    fragment: Коровай входить у весільну дію через руки, піч, пісню і поділ.
    self_check:
      - Я не додаю неперевірених рядків від себе.
      - Я називаю послідовність, а не тільки символіку.
      - Я не називаю коровай весільним тортом.
      - Я пов'язую хліб із родом, гостями і благословенням молодих.
    show_record_button: false
    model_answer: >-
      Коровай є обрядовою дією, бо він проходить через коло коровайниць, піч,
      пісню, оздоблення і поділ. Його не просто печуть для краси. У весільній
      послідовності тісто стає знаком роду й благословення, а коли коровай
      крають і роздають, він пов'язує молодих, гостей і громаду.

  - type: critical-analysis
    title: Без незмінного минулого
    instruction: Виправ тезу так, щоб вона не створювала прямої лінії від кожної страви до давнього культу.
    target_text: Кожна українська обрядова страва прямо походить із давнього культу і зберегла його незмінно.
    prompt: Як сформулювати точніше?
    questions:
      - Чому слова "кожна", "прямо" і "незмінно" є проблемними?
      - Які шари справді можуть поєднуватися в обрядовій їжі?
      - Чому християнський календар не можна знецінювати?
      - Яка обережна теза можлива?
    model_answers:
      - Вони приписують усім стравам одну історичну лінію без доказу.
      - Можуть поєднуватися аграрні мотиви, родинна пам'ять, християнські свята, локальні звичаї й пізніші тлумачення.
      - Різдво, Великдень, освячення, поминки й родинні благословення є реальними формами побутування традиції.
      - Точніше сказати, що обрядова їжа має різні історичні шари, але її треба читати в засвідчених християнських, родинних і локальних контекстах.

  - type: essay-response
    title: Стіл як джерело
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 280-360 словах поясни, як народна кухня працює як джерело для
      фольклорного й літературного читання. Використай щонайменше чотири
      опори: кутя або коливо, коровай, паска або крашанка, борщ і ЮНЕСКО,
      хлібосольність, регіональна варіація, "Енеїда", бідність і щоденний
      стіл, деколонізаційна рамка.
    min_words: 280
    model_answer: >-
      Народна кухня працює як джерело тоді, коли ми читаємо не тільки назву
      страви, а й дію навколо неї. Кутя на Святвечір відкриває родинну вечерю
      і пов'язує зерно, мед, пам'ять і різдвяний час. Коливо на поминках
      нагадує, що спільний стіл може починатися з пам'яті про померлого.
      Коровай у весіллі проходить через коровайниць, пісню, піч, оздоблення,
      краяння і роздавання, тому він є не просто хлібом, а частиною родинного
      переходу. Паска і крашанка належать до Великодня, освячення, обміну,
      святкового кошика і повернення після посту.

      Борщ показує інший рівень. Він може бути повсякденною або святковою
      стравою, але в сучасній рамці ЮНЕСКО культура приготування українського
      борщу стала питанням нематеріальної спадщини. Тут важливо не робити
      монополії на кожен борщ у сусідніх культурах, але й не дозволяти стирати
      українську практику в безіменній "спільній" кухні. Хлібосольність також
      показує соціальну дію: гість, поріг, стіл, хліб і готовність ділитися.

      Регіональна варіація захищає від спрощення. Полтавщина має сильний
      літературний образ страв, Гуцульщина дає докладні різдвяні переліки, а
      Полісся треба читати через ліс, гриби, ягоди, рибу і довкілля. "Енеїда"
      Котляревського переводить кухонний словник у високу літературу, але не
      замінює етнографічного джерела. Нарешті, повага до народної кухні не
      означає ідилії: поруч зі святом були бідність, піст, щоденний борщ, каша
      і залежність від врожаю. Саме ця складність робить стіл справжнім
      джерелом.
