- title: Народна кухня та обрядова їжа
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Планова рамка і дослідницькі матеріали для теми; використано як основу для
    класифікації народної кухні, обрядових страв, календарних і родинних
    послідовностей, регіональної варіації та деколонізаційної рамки.
- title: Історія української літератури
  author: Михайло Грушевський
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Використано для читання весільного хліба, обміну хлібом між родами,
    коровайної формули, святочної трапези та межі між джерельним уривком і
    ширшим тлумаченням.
- title: Словник української мови
  author: Борис Грінченко
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Лексикографічна опора для слів кутя, коливо, коровай, паска, борщ,
    калач та споріднених харчових і обрядових назв.
- title: Етимологічний словник української мови
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Використано для обережного пояснення назв борщ, калач, паска, голубці та
    кутя без побудови простих етимологічних міфів.
- title: Енциклопедія українознавства
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Використано для календарних і родинних послідовностей: Святвечора,
    Водохреща, Масниць, Великодня, родин, весілля і поминок.
- title: Нарис історії культури України
  author: Мирослав Попович
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Використано для історико-культурної рамки печі, варіння, печення,
    ферментації, селянської бідності, щоденного столу і святкової щедрості.
- title: Енеїда як етнографічна сцена страв і напоїв
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  notes: >-
    Використано для містка від народної харчової лексики до високої
    літературної форми Івана Котляревського.
- title: Culture of Ukrainian borscht cooking
  author: UNESCO Intangible Cultural Heritage
  role: textbook
  source_ref: Народна кухня та обрядова їжа
  url: https://ich.unesco.org/en/USL/culture-of-ukrainian-borscht-cooking-01852
  notes: >-
    Офіційна сторінка ЮНЕСКО про культуру приготування українського борщу;
    використано для сучасної рамки спадщини і нейтрального пояснення без
    претензії на виключне володіння кожною борщовою практикою.
- title: Кутя
  role: reading
  url: https://uk.wikipedia.org/wiki/%D0%9A%D1%83%D1%82%D1%8F
  notes: >-
    Прочитай статтю як публічний орієнтир і випиши, які частини опису
    стосуються різдвяного циклу, а які потребують окремого джерела.
- title: Коровай
  role: reading
  url: https://uk.wikipedia.org/wiki/%D0%9A%D0%BE%D1%80%D0%BE%D0%B2%D0%B0%D0%B9
  notes: >-
    Порівняй публічний опис короваю з уривками в уроці: що говорить стаття, а
    що додає джерельне читання про весільну дію?
- title: Борщ
  role: reading
  url: https://uk.wikipedia.org/wiki/%D0%91%D0%BE%D1%80%D1%89
  notes: >-
    Прочитай розділи про історію, різновиди й сучасний статус; сформулюй одну
    тезу про українську спадщину без заперечення сусідніх практик.
- title: Паска
  role: reading
  url: https://uk.wikipedia.org/wiki/%D0%9F%D0%B0%D1%81%D0%BA%D0%B0
  notes: >-
    Використай сторінку як публічний орієнтир для великоднього хліба і
    відділи опис страви від ширшого свята.
