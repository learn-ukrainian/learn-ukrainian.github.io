inline:
  - id: act-1
    type: variant-comparison
    title: Костомаровська провокація і думовий доказ
    instruction: Порівняй два режими джерела й поясни, чому їх не можна зливати.
    variants:
      - label: Пісенний фрагмент у Костомарова
        text: >-
          Козак протиставляє родину коневі й шаблі; це корисна карта конфлікту
          між військовою славою та родинним обов'язком.
        source: Культурно-історичний коментар Миколи Костомарова
      - label: Соціально-побутова дума
        text: >-
          Довгий речитативний текст розгортає родинну провину, прокляття,
          каяття або розрив із родом як моральну драму.
        source: Побутово-моралістичний підцикл думового корпусу
    features:
      - сила цитати
      - жанрова форма
      - межа висновку
    prompt: >-
      Чому провокативний пісенний уривок можна використати для вступу, але не
      можна видати за повний думовий доказ?
    model_answer: >-
      Фрагмент у Костомарова показує конфлікт цінностей: козак може поставити
      коня і шаблю вище за родину. Але це не дає права назвати уривок
      соціально-побутовою думою. Для думового доказу потрібні жанрова форма,
      виконавська або корпусна атрибуція і конкретний текст. Тому уривок працює
      як карта проблеми, а не як заміна первинної думи.

  - id: act-2
    type: motif-formula
    title: Братерське прохання
    instruction: >-
      Розбери короткий уривок як моральну сцену, а не як простий епізод утечі.
    passage: |-
      Кров'ю сліди заливає.
      Ой до кінних братів добігає,
      Коней за стремени хапає,
      Слізьми проливає,
      Словами промовляє:
      «Братики мої рідненькії,
      Як голубоньки сивенькії,
      Станьте, конів попасіте»
    formulas:
      - text: Ой до кінних братів добігає
        label: наближення прохання
        explanation: >-
          Рух спрямований до братів, тому втеча стає родинним випробуванням.
      - text: кров'ю сліди заливає
        label: тілесний доказ
        explanation: >-
          Прохання вже оплачено болем, тому відмова стає морально тяжчою.
      - text: Коней за стремени хапає
        label: фізичне прохання
        explanation: >-
          Жест біля стремен показує залежність слабшого від сильніших.
      - text: братики мої рідненькії
        label: родинна адреса
        explanation: >-
          Молодший брат нагадує старшим не про вигоду, а про спільну кров.
    prompt: >-
      Поясни, як формула звертання перетворює дорожню сцену на перевірку
      братерства.
    model_answer: >-
      Звертання «братики мої рідненькії» повертає старшим братам їхню моральну
      назву. Вони не просто вершники, які поспішають із неволі, а рідні люди,
      від яких слабший чекає милосердя. Тому сцена стає не тільки втечею, а
      випробуванням родинної вірності.

workbook:
  - type: comparative-study
    title: Репертуарний факт і текстовий аналіз
    instruction: >-
      Порівняй два типи доказу й сформулюй, що кожен із них дозволяє сказати.
      Напиши два речення - одне про репертуарний доказ, друге про прямий
      текстовий доказ.
    items_to_compare:
      - >-
        У репертуарі Остапа Вересая названо «Проводи козака», «Бідну вдову і
        три сини», «Сестру і брат».
      - >-
        У публічному тексті «Втечі трьох братів з Азова» можна прочитати сцену
        прохання молодшого брата.
    criteria:
      - що засвідчує джерело
      - чи можна цитувати рядок
      - яка межа висновку
    prompt: >-
      Як не переплутати присутність назви в репертуарі з правом цитувати
      неперевірений рядок?
    model_answer: >-
      Репертуарний перелік доводить, що побутово-моралістичні думи були частиною
      кобзарської традиції конкретного виконавця. Прямий публічний текст
      дозволяє цитувати й аналізувати рядок. Якщо маємо тільки назву в
      репертуарі, треба говорити про засвідчення твору, а не вставляти
      неперевірені слова як народну думу.

  - type: performance
    title: Речитатив прохання
    instruction: >-
      Підготуй стримане читання уривка, де прохання не перетворюється на
      театральний крик.
    prompt: >-
      Прочитай уривок про молодшого брата так, щоб було чути тілесний біль,
      наближення до братів і родинне звертання. Перед читанням одним реченням
      поясни, чому голос має наростати повільно.
    fragment: |-
      Кров'ю сліди заливає.
      Ой до кінних братів добігає,
      Коней за стремени хапає,
      Слізьми проливає,
      Словами промовляє:
      «Братики мої рідненькії,
      Як голубоньки сивенькії,
      Станьте, конів попасіте»
    self_check:
      - Чи не зникла пауза між тілесним болем і звертанням до братів?
      - Чи чути, що це речитативна сцена, а не коротка прозова репліка?
      - Чи пояснено, чому слабший голос має моральну силу?
    show_record_button: true
    model_answer: >-
      Стримане виконання не кричить від першого рядка. Воно тримає повільний рух:
      кров заливає сліди, брат добігає до кінних, хапає стремена, а вже тоді
      промовляє до рідних. Так звертання звучить як останній доказ родинного
      обов'язку.

  - type: critical-analysis
    title: Перепиши слабку тезу
    instruction: >-
      Оціни тезу, яка робить із побутових дум антикозацький памфлет.
    target_text: >-
      Соціально-побутові думи доводять, що козацький ідеал був фальшивим і
      шкідливим для родини.
    prompt: Чи можна сформулювати тезу так, щоб зберегти критику без підміни жанру?
    questions:
      - Яку справжню проблему помічає теза?
      - Де вона перебільшує?
      - Як зберегти критику без знецінення жанру?
    model_answers:
      - >-
        Теза правильно помічає, що побутові думи ставлять козацьку свободу перед
        родинною відповідальністю. Але вона перебільшує, бо робить із моральної
        перевірки повне заперечення козацького ідеалу. Обережніше:
        соціально-побутові думи не скасовують героїку, а показують її ціну для
        матері, вдови, сестри, сироти й слабшого брата.

  - type: essay-response
    title: Ціна козацького ідеалу
    instruction: Напиши коротке доказове есе про соціально-побутові думи.
    prompt: >-
      У 220-280 словах поясни, як соціально-побутові думи перевіряють козацьку
      свободу родинною мораллю. Обов'язково назви жанр, один джерельний доказ,
      один формальний прийом і межу висновку.
    min_words: 220
    rubric:
      - criteria: Названо думу як речитативний ліро-епічний жанр.
        description: Пояснено, чому цей жанр лишається думою попри родинно-побутову тему.
      - criteria: "Є конкретний доказ: фрагмент, репертуарний факт або класифікація."
        description: Доказ прив'язано до названого фрагмента, репертуарного факту або класифікації.
      - criteria: Пояснено форму, а не лише переказано сюжет.
        description: Формальний прийом пов'язано з аргументом, а не подано як переказ сюжету.
      - criteria: Окреслено межу доказу без неперевірених цитат.
        description: Позначено, де бракує джерела для прямої цитати або ширшого висновку.
    model_answer: >-
      Соціально-побутові думи належать до думового корпусу, але переносять центр
      із битви або неволі на родинно-моральний конфлікт. Їхня форма лишається
      речитативною і ліро-епічною: нерівний рядок, повтор, звертання й повільне
      розгортання сцени створюють моральну напругу. Добрий доказ дає фрагмент
      «Втечі трьох братів з Азова», де молодший брат кривавим слідом добігає до
      кінних, хапає стремена і звертається: «Братики мої рідненькії». Тут
      козацька втеча з неволі стає перевіркою братерства. Формально важать
      дієслівні повтори і тілесні деталі: добігає, хапає стремена, заливає
      сліди кров'ю. Вони не дають читачеві оминути слабшого. Репертуарні
      свідчення про «Бідну вдову і три сини» або «Сестру і брат» показують
      ширший побутово-моралістичний цикл, але їх не треба цитувати без
      перевіреного тексту. Отже, соціально-побутові думи не заперечують
      козацький ідеал. Вони питають, чи витримує свобода обов'язок перед родом,
      матір'ю, вдовою, сиротою і братом.
