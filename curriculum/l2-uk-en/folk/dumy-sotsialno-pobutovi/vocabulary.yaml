- lemma: соціально-побутова дума
  translation: social-domestic duma
  pos: noun phrase
  usage: Соціально-побутова дума переносить думовий конфлікт у родинну мораль.

- lemma: рід
  translation: kin; lineage
  pos: noun
  usage: Рід у думі є моральною спільнотою, а не лише переліком родичів.

- lemma: побратимство
  translation: sworn brotherhood
  pos: noun
  usage: Побратимство не скасовує обов'язку перед матір'ю або слабшим братом.

- lemma: вдова
  translation: widow
  pos: noun
  usage: Вдова може бути соціально слабкою і водночас морально сильною.

- lemma: сирота
  translation: orphan
  pos: noun
  usage: Сирота виявляє, чи громада справді захищає беззахисних.

- lemma: чужина
  translation: foreign land; estrangement
  pos: noun
  usage: Чужина в думі загрожує втратою роду, пам'яті й мови.

- lemma: прокляття
  translation: curse; moral sanction
  pos: noun
  usage: Материнське прокляття показує межу, яку син переступив.

- lemma: кара
  translation: punishment
  pos: noun
  usage: Кара в побутовій думі часто приходить як невідворотний наслідок провини.

- lemma: каяття
  translation: repentance
  pos: noun
  usage: Каяття визнає провину, але не завжди повертає зруйнований зв'язок.

- lemma: родинна лояльність
  translation: family loyalty
  pos: noun phrase
  usage: Родинна лояльність перевіряється тоді, коли слабший просить допомоги.

- lemma: речитатив
  translation: recitative
  pos: noun
  usage: Речитатив повільно розгортає прохання, відмову або прокляття.

- lemma: нерівноскладовий вірш
  translation: uneven-syllable verse
  pos: noun phrase
  usage: Нерівноскладовий вірш не читається як звичайна куплетна пісня.

- lemma: дієслівна рима
  translation: verbal rhyme
  pos: noun phrase
  usage: Дієслівна рима тримає рух думової оповіді.

- lemma: сталий епітет
  translation: fixed epithet
  pos: noun phrase
  usage: Сталий епітет на кшталт бідна вдова одразу вводить моральну роль.

- lemma: репертуар
  translation: repertoire
  pos: noun
  usage: Репертуар кобзаря засвідчує, які думи він виконував.

- lemma: джерельна межа
  translation: source boundary; evidentiary limit
  pos: noun phrase
  usage: Джерельна межа не дозволяє цитувати неперевірений рядок.

- lemma: літературна рецепція
  translation: literary reception
  pos: noun phrase
  usage: Літературна рецепція продовжує мотив, але не замінює народний текст.

- lemma: моральна невідворотність
  translation: moral inevitability
  pos: noun phrase
  usage: Моральна невідворотність означає, що провина повертається до винного.
