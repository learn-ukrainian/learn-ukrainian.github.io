- lemma: переказ
  translation: oral tradition or retelling tied to an event, person, or place
  pos: іменник
  usage: Переказ претендує на правдивість, але має власний фольклорний режим.
- lemma: історичний переказ
  translation: historical oral prose narrative
  pos: словосполука
  usage: Історичний переказ зберігає пам'ять про минуле через оповідь і місце.
- lemma: народна пам'ять
  translation: folk memory; communal memory
  pos: словосполука
