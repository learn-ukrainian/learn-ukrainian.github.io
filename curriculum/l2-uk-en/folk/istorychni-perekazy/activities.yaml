inline:
  - id: act-1
    type: motif-formula
    title: Формули обережного читання
    instruction: Визнач, яка формула допомагає не сплутати історію, пам'ять і поезію.
    passage: >-
      Історичний переказ має історичне ядро, але не є архівним протоколом. Він
      відбирає, прикрашає, локалізує і перетворює постать на знак народної
      пам'яті.
    formulas:
      - text: історичне ядро
        label: перевірна опора
        explanation: Називає реальну людину, подію, рух або місце, які треба звіряти з джерелами.
      - text: фольклорне оздоблення
        label: поетичний шар
        explanation: Пояснює надлюдську силу, чудесну втечу, скарб або іншу прикрасу оповіді.
      - text: моральна географія
        label: карта пам'яті
        explanation: Показує, як громада розподіляє простір на місця кривди, волі й надії.
      - text: джерельна межа
        label: дисципліна висновку
        explanation: Не дозволяє видавати переказ за літопис, судову справу або повну біографію.
      - text: героїзація
        label: народний вибір
        explanation: Реальна конфліктна постать переходить у символ справедливості або непокори.
      - text: пам'ять знизу
        label: соціальний голос
        explanation: Дає побачити досвід людей, яких офіційний документ міг описати дуже вузько.
    prompt: Які дві формули треба тримати разом, щоб переказ не став ні вигадкою, ні документом?
    model_answer: >-
      Треба тримати разом "історичне ядро" і "джерельну межу". Перша формула
      не дозволяє знецінити переказ як порожню вигадку, а друга не дозволяє
      прийняти фольклорне оздоблення за архівний факт.

  - id: act-2
    type: ritual-sequencing
    title: Джерельний паспорт переказу
    instruction: Упорядкуй кроки відповідального читання історичного переказу.
    steps:
      - Назвати жанр і не змішувати переказ із літописом, документом або літературною обробкою.
      - "Визначити історичне ядро: людину, подію, місце, рух або соціальний конфлікт."
      - Перевірити, який саме текст або сторінка доступні як джерело.
      - Відокремити фольклорне оздоблення від перевірної біографічної або топографічної опори.
      - Пояснити, яку потребу громади виконує героїзація чи локальна назва.
      - Сформулювати висновок із межею доказу, без романтизації й без знецінення.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Спершу треба назвати жанр, потім знайти історичне ядро і перевірити
      джерельний статус. Лише після цього можна говорити про поетичне
      оздоблення, функцію пам'яті й обережний висновок.

  - id: act-3
    type: motif-formula
    title: Як постає народний герой
    instruction: Визнач етапи, через які реальна постать стає символом.
    passage: >-
      Довбуш і Кармалюк мають історичні біографічні опори, але народний образ
      додає їм невловимість, силу, справедливу помсту, локальні місця пам'яті й
      моральний сенс.
    formulas:
      - text: реальна кривда
        label: соціальний початок
        explanation: Без відчуття несправедливості порушник закону не стає зрозумілим героєм.
      - text: порушення закону
        label: конфліктний факт
        explanation: Герой не є безгрішною постаттю; його дії мають кримінальний або насильницький бік.
      - text: допомога слабшим
        label: моральне виправдання
        explanation: Переказ пояснює, чому громада може бачити в ньому месника, а не лише злочинця.
      - text: локальний знак
        label: місце пам'яті
        explanation: Скеля, вежа, могила або печера прив'язують образ до видимого простору.
      - text: народний символ
        label: завершення героїзації
        explanation: Ім'я починає означати не тільки біографію, а й мрію про справедливу силу.
    prompt: Чому формула "народний месник" потребує додаткової перевірки?
    model_answer: >-
      Вона сильна, але може приховати насильство, відбір і пізніше
      прикрашання. Тому поруч із нею треба назвати історичне ядро,
      соціальну кривду, конкретне джерело і межу того, що переказ доводить.

workbook:
  - id: act-4
    type: variant-comparison
    title: Три режими правди
    instruction: Порівняй, що саме може означати "правда" в історичному переказі.
    prompt: Який режим найкраще описує переказ про скелю Довбуша?
    variants:
      - label: Архівний факт
        text: Реальна людина, дата, судова справа, підтверджений маршрут або документальний опис події.
        source: Історичне дослідження
      - label: Фольклорна правда
        text: Оповідь зберігає те, як громада хотіла бачити героя, кривду, місце й справедливість.
        source: Усна традиція
      - label: Поетичне перебільшення
        text: Надлюдська сила, чудесний удар, невразливість або таємний скарб роблять пам'ять видимою.
        source: Фольклорне оздоблення
      - label: Моральний висновок
        text: Герой стає знаком того, що несправедливий порядок не має остаточної влади.
        source: Народна етика
      - label: Локальна назва
        text: Місце підтримує пам'ять, навіть якщо конкретна подія потребує окремої перевірки.
        source: Топонімічний переказ
    features:
      - що можна перевірити
      - що пояснює пам'ять
      - де починається поезія
      - яка межа висновку
      - як працює місце
    model_answer: >-
      Переказ про скелю Довбуша найкраще описувати як поєднання фольклорної
      правди, поетичного перебільшення і локальної назви. Історичне ядро
      пов'язане з реальною постаттю Довбуша, але сам надлюдський удар не треба
      подавати як архівний факт.

  - id: act-5
    type: comparative-study
    title: Герой-розбійник без стирання місця
    instruction: Порівняй українські й інші приклади так, щоб не втратити локальну конкретику.
    items_to_compare:
      - Олекса Довбуш у карпатській опришківській пам'яті.
      - Устим Кармалюк у подільській пам'яті про кріпацтво, втечі й переслідування.
      - Робін Гуд як англійський образ шляхетного розбійника.
      - Словацький карпатський герой як образ шляхетного розбійника в локальній пам'яті.
      - Сандіно як політичний символ спротиву в нікарагуанській пам'яті.
    criteria:
      - соціальна кривда
      - ставлення до закону
      - локальний простір
      - механізм героїзації
      - ризик романтизації
      - межа порівняння
    prompt: Як порівнювати такі постаті, не перетворюючи Довбуша й Кармалюка на копії чужого сюжету?
    model_answer: >-
      Треба порівнювати механізм, а не підміняти матеріал. У різних традиціях
      порушник закону може стати народним символом, якщо громада бачить у
      ньому відповідь на несправедливість. Але Довбуш належить до карпатського
      опришківства, а Кармалюк - до подільського кріпацького світу. Без цих
      місць і соціальних умов порівняння стає порожнім.

  - id: act-6
    type: critical-analysis
    title: Народна пам'ять не є архівом
    target_text: Народна пам'ять зберігає істину без спотворень.
    prompt: Розбери цю тезу так, щоб зберегти повагу до переказу і не прийняти його за документ.
    questions:
      - Чому ця теза здається привабливою?
      - Що в ній небезпечне для джерельного аналізу?
      - Які механізми пам'яті спотворюють або змінюють матеріал?
      - Чому це не робить переказ непотрібним?
      - Як переписати тезу точніше?
      - Який приклад із Довбушем або Кармалюком показує цю складність?
    model_answers:
      - Вона підкреслює гідність усної традиції й опір офіційній історії.
      - Вона робить із переказу архівний доказ і стирає відбір, прикрашання та ідеалізацію.
      - Пам'ять стискає, забуває незручне, перебільшує силу героя і прив'язує подію до місця.
      - Переказ потрібний як джерело моральної уяви, соціального досвіду й локальної пам'яті.
      - Точніше сказати, що народна пам'ять зберігає не чисту істину, а значущу версію минулого.
      - Довбуш був історичним опришком, але переказ може наділити його надлюдською силою і скелею-пам'яткою.

  - id: act-7
    type: motif-formula
    title: Ландшафт як архів пам'яті
    instruction: Визнач, як видимий об'єкт підтримує історичний переказ.
    passage: >-
      Скеля, могила, криниця, вежа або дуб не доводять автоматично подію, але
      дають пам'яті точку, до якої можна повернути оповідь.
    formulas:
      - text: видимий знак
        label: опора пам'яті
        explanation: Місце або предмет робить переказ легшим для повторення.
      - text: локальна назва
        label: стисла історія
        explanation: Топонім може зберегти зв'язок із героєм навіть без повного сюжету.
      - text: межа доказу
        label: обережність
        explanation: Назва не замінює документа і не доводить усі подробиці події.
      - text: моральна карта
        label: простір значень
        explanation: Громада позначає місця волі, кривди, небезпеки або надії.
      - text: втрата об'єкта
        label: зміна пам'яті
        explanation: Коли зникає фізична опора, переказ переходить у музей, книжку або сайт.
    prompt: Чому формула "тут було" сильна, але небезпечна?
    model_answer: >-
      Вона сильна, бо прив'язує минуле до видимого місця. Небезпека в тому, що
      слухач може прийняти локальну назву за повний доказ події. Тому краще
      казати: "за переказом" або "локальна традиція пов'язує це місце".

  - id: act-8
    type: ritual-sequencing
    title: Від місця до висновку
    instruction: Упорядкуй шлях аналізу топонімічного переказу.
    steps:
      - Записати назву місця і коротко переказати, з яким героєм або подією її пов'язують.
      - Відокремити видимий об'єкт від самої розповіді про нього.
      - Перевірити, чи є публічне джерело, польовий запис, музейний опис або лише усний екскурсійний варіант.
      - Назвати, яка частина може бути історичним ядром.
      - Назвати, яка частина є фольклорним оздобленням або локальною етимологією.
      - Сформулювати обережний висновок про пам'ять, а не тільки про факт.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Аналіз починається з назви й об'єкта, але не зупиняється на них. Треба
      перевірити джерельний статус, відділити історичне ядро від оздоблення і
      лише тоді формулювати висновок про те, як місце підтримує пам'ять.

  - id: act-9
    type: performance
    title: Переказати без гіперболи як факту
    instruction: Підготуй короткий усний переказ мотиву.
    prompt: >-
      Стисло перекажи мотив про скелю Довбуша, козацьке повернення або втечу
      Кармалюка. Почни формулою "за переказом", назви історичне ядро,
      а наприкінці додай речення про джерельну межу.
    fragment: за переказом
    self_check:
      - Я не видаю чудесну деталь за документальний факт.
      - Я називаю місце або героя без імперської рамки.
      - Я не романтизую насильство.
      - Я пояснюю, яку потребу пам'яті виконує мотив.
      - Я завершую висновком із джерельною межею.
    show_record_button: false
    model_answer: >-
      За переказом, скеля Довбуша пам'ятає силу опришківського ватажка і
      карпатську мрію про справедливу відплату. Історичне ядро тут пов'язане з
      реальною постаттю Довбуша, а надлюдський жест треба читати як фольклорне
      оздоблення, не як архівний факт.

  - id: act-10
    type: essay-response
    title: Переказ як інша форма історії
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому історичний переказ не є ані точним
      документом, ані порожньою вигадкою. Обов'язково назви одне історичне
      ядро, один механізм героїзації, один локальний знак і одну межу доказу.
    min_words: 260
    model_answer: >-
      Історичний переказ не можна читати як точний документ, бо він не працює
      мовою архіву. Він не зобов'язаний подавати дату, склад учасників або
      юридичний опис події. У ньому реальна постать може отримати надлюдську
      силу, а реальне місце - символічну пам'ять. Наприклад, історичним ядром
      переказів про Довбуша є постать карпатського опришка XVIII століття, але
      мотив скелі, яку він начебто розколює топірцем, належить до фольклорного
      оздоблення.

      Водночас переказ не є порожньою вигадкою. Він показує, як громада
      розуміла кривду, силу й справедливість. Механізм героїзації перетворює
      конфліктну людину на народний символ: небезпечний розбійник стає месником,
      якщо пам'ять пов'язує його з допомогою слабшим або покаранням
      несправедливих. Локальний знак підтримує цю пам'ять: скеля, вежа, могила,
      дуб або урочище дають оповіді видиму опору.

      Межа доказу полягає в тому, що такий знак не доводить усіх подробиць
      події. Він доводить передусім значущість пам'яті. Тому відповідальне
      читання має назвати жанр, перевірити історичне ядро, відокремити
      фольклорне оздоблення і не романтизувати насильство. Тоді переказ стає
      не заміною історії, а її важливим співрозмовником.
    rubric:
      - criteria: Жанр
        description: Пояснено різницю між переказом, документом і вигадкою.
        points: 2
      - criteria: Історичне ядро
        description: Названо реальну постать, місце, подію або соціальний конфлікт.
        points: 2
      - criteria: Героїзація
        description: Пояснено, як конфліктна постать стає народним символом.
        points: 2
      - criteria: Локальний знак
        description: Показано роль скелі, вежі, могили, дуба або іншого місця пам'яті.
        points: 2
      - criteria: Межа доказу
        description: Відокремлено фольклорну правду від архівного факту.
        points: 2
