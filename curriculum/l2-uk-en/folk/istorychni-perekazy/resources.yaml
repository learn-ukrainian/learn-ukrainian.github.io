- title: Дві руські народности
  author: Микола Костомаров
  role: article
  url: https://uk.wikisource.org/wiki/Дві_руські_народности
  notes: >-
    Публічний текст використано як короткий джерельний орієнтир для думки про
    перекази, могили й неписану пам'ять; цитовано лише короткий фрагмент.
- title: Запорозька вдача
  role: reading
  url: https://uk.wikisource.org/wiki/Запорозька_вдача
  notes: >-
    Переказ, записаний у с. Плахтіївці на Катеринославщині від Я. Литвина;
    використано скорочений on-site уривок про козацьку силу, землю під
    устілками і незавершену волю. Сторінка Вікіджерел подає текст із
    провенансною карткою; використання позначено як CC BY-SA / традиційний
    переказ.
