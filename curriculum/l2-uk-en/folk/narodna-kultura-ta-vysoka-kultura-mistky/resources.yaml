- title: "Народна культура та висока культура: містки"
  role: textbook
  source_ref: "Народна культура та висока культура: містки"
  notes: >-
    Планова рамка фінального FOLK-синтезу: народні форми в літературі,
    музиці, театрі й публічній пам'яті; використано для модульної
    структури, а не як самодостатнє джерело цитат.
- title: Перебендя
  author: Тарас Шевченко
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=3997
  notes: >-
    Авторський текст у статусі суспільного надбання; використано як on-site
    читання про літературний образ кобзаря і межу між поетичним образом та
    етнографічним описом кобзарського середовища.
- title: Щедрик щедрик щедрівочка
  author: Народна творчість
  role: reading
  url: https://www.ukrlib.com.ua/narod/printout.php?id=6&bookid=3
  notes: >-
    Традиційна щедрівка, суспільне надбання; використано як on-site читання
    про український текст, що передує хоровій обробці й пізнішій світовій
    рецепції.
- title: Їхав козак за Дунай
  author: Семен Климовський
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=3321
  source_ref: Антологійний корпус української літератури XVIII століття
  notes: >-
    Авторський текст у статусі суспільного надбання із широким пісенним
    побутуванням; використано як місток від книжної барокової пісні до
    фольклорного способу життя твору.
- title: Лісова пісня
  author: Леся Українка
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=508
  notes: >-
    Драма-феєрія у статусі суспільного надбання; використано для on-site
    читання сцени, де народно-міфологічний образ Мавки входить у модерну
    драматичну форму.
- title: Нарис історії культури України
  author: Мирослав Попович
  role: article
  url: http://litopys.org.ua/popovych/narys05.htm
  notes: >-
    Контекстна опора для обережного пояснення руху між народною традицією,
    книжною культурою, музикою, драмою і модерним мистецтвом; не використано
    як першоджерельне читання. Бібліографічно: Попович, Мирослав. Нарис
    історії культури України. Київ: АртЕк, 1998.
- title: Українська культура
  author: Українська Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Українська_культура
  notes: >-
    Навігаційна сторінка для орієнтації в загальній карті української
    культури; фактичні твердження модуля спираються на названі тексти й
    корпусні джерела.
