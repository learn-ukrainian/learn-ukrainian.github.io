- lemma: культурний місток
  translation: cultural bridge
  pos: словосполука
  usage: Культурний місток показує рух між народним джерелом і новою мистецькою формою.
- lemma: висока культура
  translation: high culture
  pos: словосполука
  usage: Висока культура не повинна стирати народне джерело, з яким працює.
- lemma: народна культура
  translation: folk culture
  pos: словосполука
  usage: Народна культура має власні жанри, правила виконання і пам'ять.
- lemma: медіум
  translation: medium
  pos: іменник
  usage: Медіум змінюється, коли пісня переходить із голосу в книжку або партитуру.
- lemma: перетворення
  translation: transformation
  pos: іменник
  usage: Перетворення не є проблемою, якщо воно називає джерело.
- lemma: присвоєння
  translation: appropriation
  pos: іменник
  usage: Присвоєння починається тоді, коли українська назва або авторство зникає.
- lemma: рецепція
  translation: reception
  pos: іменник
  usage: Світова рецепція "Щедрика" не повинна стирати український жанр.
- lemma: обробка
  translation: arrangement
  pos: іменник
  usage: Обробка Леонтовича змінила музичну траєкторію щедрівки.
- lemma: партитура
  translation: score
  pos: іменник
  usage: Партитура переводить мелодію у професійний музичний запис.
- lemma: хоровий
  translation: choral
  pos: прикметник
  usage: Хорова форма може розгорнути короткий повтор у складну звукову тканину.
- lemma: публіка
  translation: audience
  pos: іменник
  usage: Нова публіка може почути твір, але не завжди знає його джерело.
- lemma: авторство
  translation: authorship
  pos: іменник
  usage: Авторство Климовського не зникає через широке пісенне побутування.
- lemma: анонімність
  translation: anonymity
  pos: іменник
  usage: Анонімність народного тексту не означає безконтекстність.
- lemma: побутування
  translation: circulation, living use
  pos: іменник
  usage: Пісенне побутування може зробити авторський текст частиною ширшої пам'яті.
- lemma: фольклорна поетика
  translation: folk poetics
  pos: словосполука
  usage: Фольклорна поетика Климовського помітна в повторі, діалозі й постійних епітетах.
- lemma: постійний епітет
  translation: fixed epithet
  pos: словосполука
  usage: '"Коник вороненький" працює як постійний епітет у пісенному стилі.'
- lemma: міфологічний образ
  translation: mythological image
  pos: словосполука
  usage: Міфологічний образ Мавки входить у модерну драму Лесі Українки.
- lemma: драма-феєрія
  translation: fairy drama
  pos: іменник
  usage: '"Лісова пісня" є драмою-феєрією, а не етнографічним довідником.'
- lemma: сценічна дія
  translation: stage action
  pos: словосполука
  usage: Сценічна дія змінює народний мотив, бо дає йому конфлікт і голос.
- lemma: кобзарський образ
  translation: kobzar image
  pos: словосполука
  usage: Кобзарський образ у Шевченка має літературну силу і джерельну межу.
- lemma: жанрова формула
  translation: genre formula
  pos: словосполука
  usage: Жанрова формула "Щедрик, щедрик" одразу відкриває щедрівкову сцену.
- lemma: світова траєкторія
  translation: global trajectory
  pos: словосполука
  usage: Світова траєкторія твору потребує точного називання українського джерела.
- lemma: деколонізаційне питання
  translation: decolonial question
  pos: словосполука
  usage: Деколонізаційне питання питає, кого стерто в міжнародній назві твору.
- lemma: межа висновку
  translation: boundary of inference
  pos: словосполука
  usage: Межа висновку не дозволяє робити етнографію з одного літературного уривка.
- lemma: інституційний престиж
  translation: institutional prestige
  pos: словосполука
  usage: Інституційний престиж сцени або академії не робить народний текст нижчим.
- lemma: шкільний канон
  translation: school canon
  pos: словосполука
  usage: Шкільний канон має називати джерела, а не тільки відомі обробки.
