- id: act-1
  type: motif-formula
  title: Формула «назва → місце → функція»
  instruction: Прочитай уривок і добери до кожної постаті формулу за зразком «місце
    → функція».
  prompt: За поданим текстом заповни формулу «назва → місце → функція» для чотирьох
    демонологічних постатей.
  passage: Домовик живе в хаті й береже господарство. Водяник сидить у воді й опікується
    рибою. Лісовик блукає лісом і стереже звірів. Польовик мешкає в полі й показується
    як птах або звір.
  text: Домовик живе в хаті й береже господарство. Водяник сидить у воді й опікується
    рибою. Лісовик блукає лісом і стереже звірів. Польовик мешкає в полі й показується
    як птах або звір.
  formulas:
  - назва → місце → функція
  answers:
  - домовик → хата → береже господарство
  - водяник → вода → опікується рибою
  - лісовик → ліс → стереже звірів
  - польовик → поле → показується як птах або звір
  model_answer: 'Кожна назва вже містить місце: домовик — дім, водяник — вода, лісовик
    — ліс, польовик — поле. Функція додає роль: берегти, опікуватися, стерегти, показуватися.
    Формула «назва → місце → функція» тримає опис у межах свідчень.'
- id: act-2
  type: ritual-sequencing
  title: Історичні нашарування демонології
  instruction: Розташуй нашарування в порядку історичного формування — від найдавнішого
    до найпізнішого.
  items:
  - християнізовані перетлумачення нечистої сили
  - дохристиянські уявлення про духів природи
  - аграрні обряди річного циклу
  - культ предків і домашнього вогнища
  steps:
  - дохристиянські уявлення про духів природи
  - культ предків і домашнього вогнища
  - аграрні обряди річного циклу
  - християнізовані перетлумачення нечистої сили
  correct_order:
  - 1
  - 3
  - 2
  - 0
  model_answer: Найдавніший пласт — дохристиянські уявлення про духів природи; далі
    культ предків і домашнього вогнища; потім аграрні обряди річного циклу; нарешті
    християнізовані перетлумачення, що перейменували давніх духів на нечисту силу.
    Жоден пласт не витіснив попередніх — вони співіснують в одному записі.
- id: act-3
  type: motif-formula
  title: 'Захисні мотиви: евфемізм і оберіг'
  instruction: Визнач, який захисний мотив стоїть за кожним прикладом.
  prompt: Добери до кожного прикладу формулу захисного мотиву.
  passage: Нечисту силу не називають прямо, а кажуть «той» або «лихий». На поріг кладуть
    освячений мак і часник. Над дверима роблять знак хреста. Уночі не згадують нечистого
    на ім'я.
  text: Нечисту силу не називають прямо, а кажуть «той» або «лихий». На поріг кладуть
    освячений мак і часник. Над дверима роблять знак хреста. Уночі не згадують нечистого
    на ім'я.
  formulas:
  - не називати прямо → евфемізм
  - предмет на межі → оберіг
  - коротка заборона → захист
  answers:
  - «той», «лихий» → евфемізм
  - освячений мак і часник на порозі → оберіг
  - знак хреста над дверима → оберіг
  - не згадувати нечистого вночі → заборона
  model_answer: Евфемізм замінює небезпечну назву обережним висловом, бо назва нібито
    прикликає істоту. Оберіг — предмет або знак на межі (поріг, двері), що відганяє
    нечисту силу. Коротка заборона економно передає те саме правило захисту.
- id: act-4
  type: ritual-sequencing
  title: Як відповідально читати демонологічний запис
  instruction: Розташуй кроки відповідального читання в правильному порядку.
  items:
  - опиши функцію істоти в цьому записі
  - зафіксуй питому назву так, як її подає джерело
  - не реконструюй пантеону, якого джерело не дає
  - локалізуй істоту в просторі та регіоні
  - познач християнське нашарування, якщо воно є
  steps:
  - зафіксуй питому назву так, як її подає джерело
  - локалізуй істоту в просторі та регіоні
  - опиши функцію істоти в цьому записі
  - познач християнське нашарування, якщо воно є
  - не реконструюй пантеону, якого джерело не дає
  correct_order:
  - 1
  - 3
  - 0
  - 4
  - 2
  model_answer: Спершу зафіксуй питому назву, потім локалізуй істоту в просторі й
    регіоні, далі опиши функцію, познач християнське нашарування — і лише наприкінці
    втримайся від спокуси реконструювати пантеон. Така послідовність захищає і від
    колонізації, і від романтизації.
- type: variant-comparison
  title: 'Мавка, навка, нявка: три варіанти одного образу'
  instruction: Порівняй три регіональні варіанти того самого демонологічного образу.
  prompt: Зістав варіанти імені лісової істоти, пов'язаної з мотивом передчасної смерті.
    Заповни ознаки для кожного варіанта й поясни, чому це варіанти одного образу,
    а не різні божества.
  variants:
  - навка
  - мавка
  - нявка
  features:
  - регіональне поширення
  - форма імені
  - мотив смерті
  - функція стосовно людини
  model_answer: Навка, мавка й нявка — фонетичні та регіональні варіанти однієї назви
    (нявка частіше фіксують у гуцульській вимові). Усі три пов'язані з мотивом передчасної
    смерті дівчини й функцією заманювання людини. Спільні мотив і функція показують,
    що це варіанти одного образу, а не окремі впорядковані божества.
- type: motif-formula
  title: Істоти води та межі
  instruction: За зразком «назва → місце → функція» проаналізуй істот, пов'язаних
    із водою.
  prompt: Заповни формулу для водяних і межових постатей і познач, через що пояснюють
    походження нечистих мерців.
  passage: Водяник сидить у ріках, озерах і криницях та опікується рибою. Болотяник
    затягає людину в болото. Русалками стають нехрещені діти й дівчата, що померли
    передчасною смертю; вони заманюють людей у безвість.
  text: Водяник сидить у ріках, озерах і криницях та опікується рибою. Болотяник затягає
    людину в болото. Русалками стають нехрещені діти й дівчата, що померли передчасною
    смертю; вони заманюють людей у безвість.
  formulas:
  - назва → водойма → функція
  - неправильна смерть → нечистий мрець
  answers:
  - водяник → ріка, озеро, криниця → опікується рибою
  - болотяник → болото → затягає людину
  - русалка → вода, ліс, поле → заманює людей
  - нехрещена дитина / передчасна смерть → русалка
  model_answer: Водяник і болотяник прив'язані до конкретних водойм і мають функцію
    опіки чи небезпеки. Русалка ширша за простором (вода, ліс, поле), а її походження
    пояснюють через «неправильну» смерть — нехрещення або передчасну загибель. Так
    демонологія осмислює тривогу спільноти перед смертю не на своєму місці.
- type: performance
  title: Виразне читання опису домовика
  instruction: Прочитай уголос корпусний опис домовика, тримаючи будову «назва → функція
    → амбівалентність → форма появи».
  prompt: 'Прочитай фрагмент виразно, виокремлюючи інтонацією чотири частини опису:
    назву й синоніми, функцію, амбівалентність та форму появи. Запиши себе й перевір
    за чек-листом.'
  fragment: Домовик (хованець, годованець) — пильнує господарства, помагає в роботі,
    приносить щастя, але, ображений, може робити й різні капості. Показується у вигляді
    кота, пса, голуба, рідше вужа.
  self_checklist:
  - 'Я виразно вимовив назву й синоніми: домовик, хованець, годованець.'
  - 'Я виділив інтонацією функцію: пильнує, помагає, приносить щастя.'
  - Я передав амбівалентність на слові «але, ображений».
  - Я не «модернізував» архаїчні форми (капості, вужа), а прочитав їх як у джерелі.
  show_record_button: true
  model_answer: 'Зразкове читання має дві інтонаційні вершини: світла частина (пильнує,
    помагає, приносить щастя) і застережлива (але, ображений, капості). Форму появи
    читай переліком, уповільнюючи на «рідше вужа». Архаїчні форми зберігай — вони
    частина свідчення.'
- type: essay-response
  title: Чому підміна назви — це втрата свідчення
  instruction: Напиши коротке есе про мовну колонізацію демонології.
  prompt: Поясни, чому заміна питомих назв (домовик, лісовик, водяник) чужими, імперськими
    формами стирає не лише слово, а й регіон, функцію та обрядовий контекст. Спирайся
    на принцип «назва → місце → функція».
  min_words: 140
  source_reading: 'Деколонізаційна рамка модуля: дві спокуси — імперська підміна назв
    і вигаданий «чистий пантеон».'
  rubric:
  - Чітко сформульована теза про зв'язок назви з місцем і функцією.
  - Принаймні два конкретні приклади питомих назв та їхніх функцій.
  - Пояснення, що саме втрачається при підміні (регіон, функція, контекст).
  - 'Уникнення обох спрощень: і колонізації, і романтичної реконструкції.'
  model_answer: 'У демонології назва не декоративна: корінь слова домовик несе дім,
    лісовик — ліс, водяник — воду. Тому назва вже містить місце й натяк на функцію.
    Коли домовика називають чужим іменем, зникає не звук, а ціла прив''язка до простору,
    ролі й обрядового контексту. Підміна назви — це не переклад, а стирання свідчення.
    Водночас відповідь на таке стирання не може бути вигаданим пантеоном: зафіксований
    корпус містить різночасові нашарування й не дає права реконструювати струнку ієрархію
    богів. Чесна рамка зберігає питому назву, регіон і функцію — і не домальовує того,
    чого немає.'
  peer_review_guidelines:
  - Чи показав автор зв'язок назви з місцем і функцією на конкретному прикладі?
  - Чи названо, що саме втрачається при підміні назви?
  - Чи уникнув автор романтичної реконструкції пантеону?
- type: critical-analysis
  title: Обережність Крип'якевича щодо пантеону
  instruction: Проаналізуй, що теза про неповноту джерел означає для реконструкції
    давньої міфології.
  context: 'Іван Крип''якевич формулює засаду історичної обережності: відомості про
    давні вірування неповні й неточні, а імен головних богів ми майже не знаємо.'
  target_text: Багато було різних другорядних божеств, яких назви дотепер ще залишилися
    в народній пам'яті, як русалки, мавки, водяники, лісовики, домовики й інші.
  source_reading: Іван Крип'якевич, «Історія української культури» (формула історичної
    обережності).
  question: Чому вислів «залишилися в народній пам'яті» важливіший за спробу відновити
    повний пантеон?
  questions:
  - Що означає теза про «неповні й неточні відомості» для методу дослідника?
  - Чому назви нижчих істот збереглися краще за імена головних богів?
  - Як ця обережність захищає від романтичної реконструкції?
  focus_points:
  - різниця між зафіксованим корпусом і реконструйованим пантеоном
  - статус нижчої міфології як живої народної пам'яті
  - межі того, що джерела дозволяють стверджувати
  model_answer: Вислів «залишилися в народній пам'яті» вказує на те, що нижча міфологія
    дійшла як жива традиція, а не як уламок упорядкованого культу. Імен головних богів
    ми майже не знаємо, тож будувати з демонології повний пантеон — означає домальовувати
    джерела. Обережність Крип'якевича радить іти від записаного корпусу до висновку,
    а не навпаки, і саме це захищає від романтичної реконструкції.
  model_answers:
  - Теза про неповноту змушує дослідника описувати наявні свідчення, а не відновлювати
    втрачене ціле.
  - Назви нижчих істот жили в щоденному вжитку й обряді, тому збереглися краще за
    абстрактні імена богів.
  - Якщо джерела неповні, будь-який «повний пантеон» є реконструкцією, а не фактом.
- type: comparative-study
  title: 'Домовик і лісовик: свій і чужий простір'
  instruction: Порівняй дві постаті за спільними ознаками, спираючись на корпусні
    описи.
  prompt: Зістав домовика й лісовика як двох господарів різних просторів. Покажи,
    як місце визначає функцію та ступінь небезпеки.
  items_to_compare:
  - домовик
  - лісовик
  criteria:
  - простір
  - ставлення до людини
  - функція
  - форма появи
  - нашарування культу предків
  source_a: Домовик (хованець, годованець) — пильнує господарства, помагає в роботі,
    приносить щастя, але, ображений, може робити й різні капості. Показується у вигляді
    кота, пса, голуба, рідше вужа.
  source_b: Лісовики — це дикі люди, злі духи, що пасуть і стережуть лісові тварини.
    Вони показуються людям у подобі звірів або знайомих людей, водять їх лісом, а
    то й душать.
  source_reading: Корпусні описи нижчої міфології (В. Петров).
  task: Заповни таблицю за критеріями й сформулюй висновок про те, як простір (свій
    дім — чужий ліс) визначає функцію та небезпеку істоти.
  model_answer: 'Домовик належить своєму, домашньому простору: він опікун господарства,
    амбівалентний, але загалом доброзичливий, і в ньому ще чути культ предків та домашнього
    вогнища. Лісовик належить чужому, дикому простору: він стереже звірів, заводить
    і душить людину, його небезпека вища. Спільна схема «назва → місце → функція»
    зберігається, але місце (хата проти лісу) задає протилежне ставлення до людини.'
