version: "1.0"
module: narodni-tantsi
level: folk

inline:
  - id: act-1
    type: motif-formula
    title: Три режими руху
    instruction: Розрізни танок, побутовий танець і сценічну хореографію.
    passage: |-
      танок веснянки
      побутовий танець
      сценічна хореографія
    formulas:
      - text: танок веснянки
        label: обрядовий режим
        explanation: Спів, рух і календарна дія працюють разом у колі, лінії або ключі.
      - text: побутовий танець
        label: соціальна гра
        explanation: Святковий простір із музиками, парною відповіддю, імпровізацією і правилами доречності.
      - text: сценічна хореографія
        label: композиція для глядача
        explanation: Професійна стилізація добирає матеріал, підсилює симетрію і працює для сцени.
    prompt: Чому ці три формули не можна описувати одним словом "танець" без уточнення?
    model_answer: >-
      Танок тримає обрядову дію: лінія або коло мають календарний і
      символічний сенс. Побутовий танець працює як соціальна гра громади,
      де музики й учасники відповідають одне одному. Сценічна хореографія
      перетворює матеріал на композицію для глядача, тому її треба називати
      окремо.

  - id: act-2
    type: motif-formula
    title: Слово як рух
    instruction: Прочитай короткі формули через дієслова й траєкторію.
    passage: |-
      Кінця му не знайдемо

      Вийся, горошку, в три струмочка

      А ми просо сіяли, сіяли
      Ось так, ось так рвуть мак
    formulas:
      - text: Кінця му не знайдемо
        label: тривалість руху
        explanation: Нескінченність є властивістю танку, а не лише образом.
      - text: Вийся, горошку
        label: завивання
        explanation: Рослинний ріст переходить у плетіння лінії або кола.
      - text: просо сіяли
        label: жест праці
        explanation: Слово запускає мімічну дію сівби.
      - text: рвуть мак
        label: жест збирання
        explanation: Коротка формула називає рух, який тіло має показати.
    prompt: Як ці формули допомагають бачити рух, а не тільки текст?
    model_answer: >-
      У формулах важать дієслова: не знайдемо, вийся, сіяли, рвуть. Вони
      не розповідають довгу історію, а тримають дію. Лінія не має простого
      кінця, горох в'ється, руки сіють просо й рвуть мак. Так слово стає
      частиною руху.

  - id: act-3
    type: ritual-sequencing
    title: Вести кривий танець
    instruction: Упорядкуй аналітичний шлях так, щоб не вигадувати хореографію.
    steps:
      - Назвати жанровий режим як танок веснянки або гаївки.
      - "Визначити простір руху: лінія, ключ, змійка, обхід або коло."
      - Назвати, хто тримає провід і як гурт не розриває лінію.
      - Показати коротку співану формулу як опору тривалості.
      - Обережно пояснити плетіння, ріст і сезонний перехід.
      - Відділити доведене з джерела від пізнішої реконструкції.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Аналіз починається з режиму й простору, переходить до проводу,
      гуртової лінії та короткої формули, а вже потім обережно говорить
      про символіку росту. Так рух не перетворюється на вигадану схему.

workbook:
  - type: critical-analysis
    title: Сцена не поглинає село
    instruction: Розбери тезу і перепиши її точніше.
    target_text: Концертний гопак показує, як українці танцювали в народі.
    prompt: Що в цій тезі варто уточнити, щоб не підмінити побутову практику сценічною композицією?
    questions:
      - Яку реальну культурну вагу має концертний гопак?
      - Що змінює сцена порівняно з весіллям, вечорницями або вулицею?
      - Чому слово "показує" занадто сильне?
      - Як назвати сценічний шар без знецінення?
      - Яка точніша теза можлива?
    model_answers:
      - Він є важливим символом і частиною професійної української хореографії.
      - Сцена змінює тривалість, симетрію, напрям погляду, костюм, дисципліну і мету руху.
      - Воно створює враження прямого запису сільської практики, хоча йдеться про обробку.
      - Сценічний шар варто називати хореографічною інтерпретацією або стилізацією.
      - Концертний гопак є впливовою сценічною інтерпретацією фольклорного матеріалу, але не замінює множинну побутову практику.

  - type: comparative-study
    title: Гопак, козачок, аркан
    instruction: Порівняй три форми без перетворення їх на один героїчний танець.
    items_to_compare:
      - Гопак як побутовий і сценічно переосмислений танець із віртуозним чоловічим шаром.
      - Козачок як жвава парна або дуетна гра залицяння, наближення й відступу.
      - Аркан як гуцульський чоловічий танець щільного кола.
    criteria:
      - простір руху
      - роль пари або гурту
      - регіональна прив'язка
      - музичний пульс
      - ризик сценічного узагальнення
    prompt: Чому аркан не є "карпатським гопаком", а козачок не є "меншим гопаком"?
    model_answer: >-
      Гопак, козачок і аркан мають різну просторову логіку. Гопак легко
      приймає вихід у центр і віртуозний момент, козачок тримає парну
      відповідь, а аркан будує силу щільного чоловічого кола. Спільна
      жвавість не скасовує регіональних і соціальних відмінностей.

  - type: critical-analysis
    title: Козацький міф без спрощення
    instruction: Перепиши популярну формулу так, щоб вона не звучала як доведене походження.
    target_text: Гопак походить із козацького бойового мистецтва.
    prompt: Як сформулювати цю думку точніше і джерельно обережніше?
    questions:
      - Який символічний зв'язок справді існує?
      - Чому слово "походить" потребує доказу?
      - Що зникає, якщо бачити тільки військову вправу?
      - Як сказати без романтичного абсолюту?
    model_answers:
      - Гопак має сильний козацький і героїчний образ у культурній пам'яті та на сцені.
      - Воно заявляє пряму генеалогію, яку не можна довести лише популярною оповіддю.
      - Зникають парність, жіночі партії, свято, музики, гумор і побутова імпровізація.
      - Гопак увібрав козацько-героїчну символіку, але його народне побутування ширше за військову метафору.

  - type: performance
    title: Шум як зелений рух
    instruction: Підготуй коротке читання без театрального перебільшення.
    fragment: |-
      Ой нумо, нумо,
      В зеленого шума
    prompt: Як голосом показати, що це заклик до спільного весняного руху, а не монолог персонажа?
    self_check:
      - Чи збережено коротку формулу без доданих рядків?
      - Чи початок звучить як заклик до гурту?
      - Чи пояснено зелень як сезонний образ?
      - Чи не перетворено Шум на вигадану сценічну роль?
    model_answer: >-
      Початок варто читати як спільне "рушаймо", а не як сольну репліку.
      Зелений шум пов'язує голос із весняним оживленням, дібровою і ходою.
      Тому читання має бути ритмічним, простим і гуртовим.

  - type: variant-comparison
    title: Метелиця і коломийка
    instruction: Порівняй назву-образ і назву-подвійну форму.
    prompt: Як метелиця і коломийка по-різному поєднують слово, рух і музику?
    variants:
      - label: Метелиця
        text: Назва веде до образу кружляння, зміни напрямів, вихрового руху і ширшого ареалу.
        source: образ заметілі
      - label: Коломийка
        text: Назва охоплює коротку співану строфу і танцювальний рух, особливо в гуцульському колі.
        source: пісенно-танцювальна подвійність
    features:
      - образ у назві
      - чи є співана форма
      - як працює коло
      - яку межу джерела треба назвати
    model_answer: >-
      Метелиця пояснюється через руховий образ заметілі: оберти,
      прискорення, вихор. Коломийка має іншу складність: це і коротка
      співана строфа, і танцювальна форма. Обидві назви вимагають
      контексту, бо саме слово ще не дає повної хореографії.

  - type: comparative-study
    title: Троїсті музики як три функції
    instruction: Не зводь троїсті музики до механічної цифри три.
    items_to_compare:
      - Скрипка або інший провідний інструмент веде мелодію.
      - Бубон, решето, басоля або підбасок тримають пульс і низ.
      - Цимбали, друга скрипка, кларнет або інший інструмент додають фактуру.
      - Танцівники відповідають на темп, акцент і тривалість.
    criteria:
      - мелодійний провід
      - ритмічна опора
      - тембровий шар
      - взаємодія з танцівниками
      - локальна варіантність складу
    prompt: Чому танець без музик втрачає частину свого джерельного сенсу?
    model_answer: >-
      Музики не є фоном. Вони задають темп, тримають тривалість,
      реагують на рух і дозволяють імпровізацію. Троїстість краще
      розуміти як функціональний трикутник, а не як сталий список
      трьох інструментів.

  - type: essay-response
    title: Етикетка контексту
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому для народного танцю потрібна етикетка
      контексту: сільська практика, танок веснянки, весілля, сцена,
      ансамблева стилізація або сучасна реконструкція. Наведи два приклади.
    min_words: 260
    model_answer: >-
      Етикетка контексту потрібна тому, що одна назва може жити в різних
      режимах. Гопак у весільному або вечорничному середовищі не тотожний
      концертному фіналу професійного ансамблю. У першому випадку важать
      музики, імпровізація, реакція громади, жарт і доречність. У другому
      випадку матеріал перетворено на композицію з чіткою симетрією,
      репетиційною точністю і зверненням до глядача.

      Інший приклад - аркан. У гуцульському контексті він тримається на
      щільному чоловічому колі, притупі, регіональній музиці й груповій
      дисципліні. На сцені той самий мотив може стати суворішим,
      симетричнішим і ефектнішим. Обидві форми можуть бути цінними, але
      вони не доводять одне й те саме. Точна етикетка не зменшує красу
      танцю, а захищає його від плоского узагальнення.
