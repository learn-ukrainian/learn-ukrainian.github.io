- title: Старші верстви української усної традиції
  author: Михайло Грушевський
  role: article
  url: http://litopys.org.ua/hrushukr/hrush106.htm
  notes: >-
    Публічна сторінка першого тому з фрагментом про кривий танець, провідницю
    лінії та повторювану формулу. Урок читає її як історико-літературний
    свідок, а не як повну хореографічну інструкцію.
- title: Словесність часів нового розселення і пізніших
  author: Михайло Грушевський
  role: article
  url: http://litopys.org.ua/hrushukr/hrush107.htm
  notes: >-
    Публічна сторінка першого тому з фрагментом про зеленого Шума й весняний
    хороводний мотив. Урок використовує її для образу руху, зелені та діброви,
    не для реконструкції повного обряду.
- title: Ой весна, весна, ти красна
  role: reading
  url: https://www.ukrlib.com.ua/narod/printout.php?id=0&bookid=0
  notes: >-
    Публічний текст веснянки для ширшого сезонного контексту танків і гаївок.
    Читати як приклад весняного звертання, не як доказ для кожної локальної
    форми танцю.
- title: Коломийки
  role: reading
  url: https://www.ukrlib.com.ua/narod/printout.php?bookid=1&id=3
  notes: >-
    Публічна добірка для огляду короткої строфи, дотепу й межі між співанкою
    та танцювальним колом. Урок не переписує її як єдиний канон коломийки.
- title: Нарис історії культури України
  author: Мирослав Попович
  role: article
  url: http://litopys.org.ua/popovych/narys05.htm
  notes: >-
    Дослідницький контекст для зв'язку народної культури, музики, театру й
    пізнішої сценічної репрезентації. Читати поруч із фольклорним матеріалом,
    не замість нього.
