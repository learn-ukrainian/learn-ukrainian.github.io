- id: act-1
  type: motif-formula
  title: Будова формули вигнання
  instruction: Познач три складники формули.
  prompt: У фрагменті «Волос, волос, вийди на колос» визнач адресата, наказ і місце
    перенесення.
  text: Волос, волос, вийди на колос
  passage: Волос, волос, вийди на колос
  formulas:
  - адресат → наказ → місце перенесення
  answers:
  - 'адресат: волос'
  - 'наказ: вийди'
  - 'місце перенесення: на колос'
  model_answer: Адресат — «волос», тобто хвороба, названа як окрема сила. Наказ —
    «вийди». Місце перенесення — «на колос». Формула діє, бо відсилає шкоду в чітко
    назване місце; колос тут не пейзаж, а точка призначення.
- id: act-2
  type: ritual-sequencing
  title: Питання до замовляння
  instruction: Розташуй питання аналізу в тому порядку, у якому їх ставлять до тексту
    замовляння.
  items:
  - Якою обрядовою дією супроводжує слово?
  - Хто говорить?
  - Який стан має настати?
  - Кому або чому говорить?
  - Що наказує або просить?
  - Куди відсилає шкоду?
  correct_order:
  - 1
  - 3
  - 4
  - 0
  - 5
  - 2
  steps:
  - Хто говорить?
  - Кому або чому говорить?
  - Що наказує або просить?
  - Якою обрядовою дією супроводжує слово?
  - Куди відсилає шкоду?
  - Який стан має настати?
  model_answer: Аналіз починають з мовця, далі визначають адресата, тоді наказ чи
    прохання, обрядову дію, місце перенесення шкоди і, нарешті, бажаний стан. Така
    послідовність повертає увагу від образу до дії.
- id: act-3
  type: motif-formula
  title: Градація дієслів
  instruction: Поясни наростання сили наказу.
  prompt: Визнач, як наростає сила наказу в дієслівному ряді «виганяю, виклинаю, проклинаю».
  text: Я тебе виганяю, виклинаю, проклинаю!
  passage: Я тебе виганяю, виклинаю, проклинаю!
  formulas:
  - виганяю → виклинаю → проклинаю
  answers:
  - 'градація: від вигнання до прокляття'
  model_answer: Три дієслова утворюють градацію. «Виганяю» називає пряме вигнання,
    «виклинаю» і «проклинаю» додають силу прокляття. Наказ міцніє від слова до слова,
    тож повтор і додавання дієслів роблять формулу дієвішою.
- type: variant-comparison
  title: Стисла й розгорнута формула
  instruction: Порівняй два варіанти формули вигнання за поданими ознаками.
  prompt: Порівняй стислу формулу «Волос, волос, вийди на колос» і розгорнуту «Я тебе
    виганяю, виклинаю, проклинаю! Йди пріч! Та йди на ліси, на очерети, та на луги,
    та на пущі!». Чим вони спільні й чим відмінні?
  variants:
  - Волос, волос, вийди на колос
  - Я тебе виганяю, виклинаю, проклинаю! Йди пріч! Та йди на ліси, на очерети, та
    на луги, та на пущі!
  features:
  - адресат
  - наказ
  - градація дієслів
  - просторовий ряд
  - довжина формули
  model_answer: 'Обидві формули мають адресата, наказ і місце перенесення, тож будова
    спільна. Відмінність — у силі й довжині: стисла обходиться трьома складниками
    без градації, а розгорнута нарощує наказ через ряд дієслів і подовжує просторовий
    ряд (ліси, очерети, луги, пущі), щоб надійніше відіслати шкоду.'
- type: motif-formula
  title: Простір перенесення шкоди
  instruction: Розбери просторовий ряд як мотив.
  prompt: У розгорнутій формулі шкоду відсилають «на ліси, на очерети, та на луги,
    та на пущі». Поясни, чому це безлюдні місця і як працює цей мотив.
  text: Та йди на ліси, на очерети, та на луги, та на пущі!
  passage: Та йди на ліси, на очерети, та на луги, та на пущі!
  formulas:
  - наказ → перелік безлюдних місць → перенесення шкоди за межі обжитого світу
  answers:
  - ліси, очерети, луги, пущі — дикі, безлюдні простори
  - мотив перенесення шкоди подалі від людини
  model_answer: Усі названі місця — дикі й безлюдні. Формула не змушує хворобу зникнути
    сама, а відсилає її в простір, де немає людей. Що довший перелік, то надійніше
    слово «виштовхує» шкоду за межі обжитого світу. Це мотив перенесення, спільний
    для багатьох замовлянь.
- type: ritual-sequencing
  title: Від запису до аналізу
  instruction: Розташуй кроки роботи з корпусним замовлянням у правильному порядку.
  items:
  - Прочитати формулу як дію, а не як вірш
  - Знайти запис формули в збірнику
  - 'Знайти будову: адресат, наказ, простір, градація'
  - Урахувати збирача, місце запису й виконавця
  - Порівняти варіанти того самого мотиву
  correct_order:
  - 1
  - 3
  - 0
  - 2
  - 4
  steps:
  - Знайти запис формули в збірнику
  - Урахувати збирача, місце запису й виконавця
  - Прочитати формулу як дію, а не як вірш
  - 'Знайти будову: адресат, наказ, простір, градація'
  - Порівняти варіанти того самого мотиву
  model_answer: Спершу знаходять запис і його контекст — збирача, село, виконавця.
    Далі читають формулу як дію, розбирають її будову й лише потім порівнюють варіанти.
    Такий порядок не дає сприйняти замовляння як самостійний вірш.
- type: performance
  title: Вимова розгорнутої формули
  instruction: Прочитай фрагмент уголос, передаючи градацію наказу.
  prompt: Прочитай формулу вигнання вголос так, щоб було чути наростання сили від
    «виганяю» до «проклинаю» і різкість наказу «Йди пріч!».
  fragment: Я тебе виганяю, виклинаю, проклинаю! Йди пріч! Та йди на ліси, на очерети,
    та на луги, та на пущі!
  show_record_button: true
  self_checklist:
  - Градація дієслів чутна
  - Наказ «Йди пріч!» вимовлений різко
  - Просторовий ряд звучить рівним речитативом
  model_answer: Сильне виконання нарощує гучність і твердість від «виганяю» до «проклинаю»,
    робить паузу перед різким «Йди пріч!» і вимовляє просторовий ряд рівним речитативом,
    наче перелік місць, куди відходить шкода.
- type: essay-response
  title: Чому слово й обряд тотожні
  instruction: Напиши коротке міркування.
  prompt: Поясни на прикладах, чому в акті замовляння словесний текст і обрядова дія
    тотожні, і чому через це жанр не можна читати лише як метафору.
  source_reading: 'Енциклопедія українознавства: естетична функція замовляння збігається
    з утилітарною; словесний текст і обрядова дія в акті замовляння завжди тотожні.'
  min_words: 120
  rubric:
  - Названо тезу про тотожність слова й обрядової дії
  - Наведено приклад зі стислої або розгорнутої формули
  - Пояснено, чому метафоричне читання втрачає половину жанру
  - Українська термінологія вжита точно
  peer_review_guidelines: Перевір, чи автор спирається на конкретну формулу, чи відрізняє
    образ-засіб від образу-прикраси й чи не зводить замовляння до самого вірша.
  model_answer: 'У замовлянні слово не описує дію, а є нею: коли шептуха вимовляє
    «вийди на колос» і водночас робить рух над хворим, текст і обряд стають однією
    подією. Тому формула гарна лише тоді, коли діє. Якщо читати її як метафору, зникає
    адресат, наказ і місце перенесення — тобто все, що робить замовляння замовлянням,
    а не віршем.'
- type: critical-analysis
  title: Імперський заголовок і деколонізований опис
  instruction: Проаналізуй назву джерела й сформулюй коректну позицію.
  context: Один із найповніших ранніх збірників замовлянь уклав Павло Єфименко; його
    видання 1874 року має назву «Збірник малоросійських заклинань».
  target_text: Збірник малоросійських заклинань (1874)
  source_reading: 'Українська літературна енциклопедія: у джерелах трапляються імперські
    етноніми; назву джерела цитують точно, а власний аналіз будують українськими термінами.'
  focus_points:
  - Який етнонім у назві належить імперській видавничій добі
  - Чи робить імперська назва матеріал імперським
  - Як поєднати точну цитату назви з деколонізованим описом
  question: Як коректно працювати з імперським етнонімом у назві історичного збірника
    замовлянь?
  questions:
  - Який етнонім у назві належить імперській добі й чому?
  - Чому матеріал лишається українським попри назву?
  - Як цитувати назву й водночас не повторювати імперську рамку?
  model_answer: 'Слово «малоросійських» — імперський етнонім видавничої доби, а не
    опис самого матеріалу. Замовляння в збірнику лишаються українськими. Коректна
    позиція: цитувати назву точно як історичний заголовок, а власний аналіз вести
    українськими термінами — замовляння, заклинання, проклін, — щоб не накидати жанрові
    імперську рамку.'
  model_answers:
  - Етнонім «малоросійських» належить імперській видавничій практиці XIX століття.
  - Матеріал український, бо це формули української усної традиції; імперською є лише
    назва.
  - Назву цитують точно як історичний слід, а опис будують українськими термінами.
- type: comparative-study
  title: Замовляння і голосіння
  instruction: Порівняй два споріднені архаїчні жанри.
  prompt: Порівняй замовляння й голосіння за тим, як у них пов'язані словесний текст
    і обрядова дія.
  task: Визнач спільне й відмінне між замовлянням і голосінням за поданими критеріями
    та сформулюй висновок про їхнє спільне поле.
  items_to_compare:
  - замовляння
  - голосіння
  source_a: Замовляння — словесна формула, якій приписували магічну силу; словесний
    текст і обрядова дія в ній тотожні.
  source_b: Голосіння — ритуальний поховальний плач речитативного характеру, де словесний
    текст теж пов'язаний з обрядовою дією.
  source_reading: Українська літературна енциклопедія та Енциклопедія українознавства
    про замовляння; стаття про голосіння як споріднений архаїчний жанр.
  criteria:
  - обрядова мета
  - адресат
  - зв'язок слова й дії
  - виконання речитативом
  model_answer: 'Спільне: обидва жанри архаїчні, виконуються речитативом і нерозривно
    поєднують слово з обрядовою дією. Відмінне: замовляння наказує силі чи стихії,
    щоб змінити стан речей (відвернути хворобу, відіслати шкоду), а голосіння — поховальний
    плач, звернений до померлого й до спільноти в стані скорботи. Разом вони належать
    до спільного поля обрядового слова, що творить подію, а не описує її.'
