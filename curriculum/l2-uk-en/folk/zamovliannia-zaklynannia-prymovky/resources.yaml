- title: Замовляння — Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Замовляння
  notes: 'Україномовна стаття про жанр: означення, виконавці (знахарі, шептухи, ворожбити),
    зв''язок слова й магічної дії. Грунтування жанрової рамки модуля.'
- title: Голосіння — Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Голосіння
  notes: Споріднений архаїчний жанр обрядового речитативного плачу; контекст для порівняння
    замовляння й голосіння.
- title: Українська демонологія — Вікіпедія
  role: wiki
  url: https://uk.wikipedia.org/wiki/Українська_демонологія
  notes: Контекст народних вірувань і демонологічних уявлень, до яких прилягають лікувальні
    й захисні замовляння; місток до високої культури («Лісова пісня», «Тіні забутих
    предків»).
