- title: Загадка
  role: wiki
  url: https://uk.wikipedia.org/wiki/%D0%97%D0%B0%D0%B3%D0%B0%D0%B4%D0%BA%D0%B0
  notes: >-
    Довідкова сторінка для базового жанрового орієнтиру. Дослівні зразки в
    уроці спираються на локальні дослідницькі нотатки й перевірений
    енциклопедичний корпус, а не на довільні інтернет-добірки.
- title: Микола Костомаров
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9C%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0_%D0%9A%D0%BE%D1%81%D1%82%D0%BE%D0%BC%D0%B0%D1%80%D0%BE%D0%B2
  notes: >-
    Довідкова сторінка для ідентифікації Костомарова як фольклористичного й
    історіографічного орієнтира; урок використовує його символічну рамку
    обережно, без прямого виведення всіх загадок із неї.
- title: Мирослав Попович
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9C%D0%B8%D1%80%D0%BE%D1%81%D0%BB%D0%B0%D0%B2_%D0%9F%D0%BE%D0%BF%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідкова сторінка для ідентифікації автора культурно-історичної рамки;
    мікрокосм і межові мотиви в уроці подано як пояснювальну модель, не як
    доказ універсального ритуального походження.
- title: Дмитро Чижевський
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%A7%D0%B8%D0%B6%D0%B5%D0%B2%D1%81%D1%8C%D0%BA%D0%B8%D0%B9_%D0%94%D0%BC%D0%B8%D1%82%D1%80%D0%BE_%D0%86%D0%B2%D0%B0%D0%BD%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідкова сторінка для літературно-історичного контексту: описовий
    зворот, алегоричне тлумачення і давня книжна культура подані як споріднені
    операції непрямого називання, а не як тотожні жанри.
