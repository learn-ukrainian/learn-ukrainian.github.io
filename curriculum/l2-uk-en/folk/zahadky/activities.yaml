inline:
  - id: act-1
    type: variant-comparison
    title: Три рамки загадки
    instruction: Порівняй, як різні рамки пояснюють ту саму жанрову дію.
    prompt: Яка рамка найкраще пояснює, чому загадка може бути і грою, і випробуванням?
    variants:
      - label: Розвага
        text: Загадка дає радість упізнавання, змагання, сміх і вправу пам'яті.
        source: побутове виконання
      - label: Навчання
        text: Загадка тренує увагу до ознак предмета, звуку, форми, дії й матеріалу.
        source: народна педагогіка
      - label: Межовий іспит
        text: У казкових або обрядових сюжетах відповідь може означати перехід, порятунок або визнання.
        source: сюжетна функція
      - label: Реконструкція
        text: Ритуальна версія може бути пояснювальною, але не доводить походження кожного рядка.
        source: джерельна обережність
    features:
      - роль слухача
      - межа доказу
      - соціальна функція
      - ризик перебільшення
      - зв'язок із грою
    model_answer: >-
      Найточніше працює поєднана рамка: загадка має ігрову форму, але ця
      форма може навчати й ставати випробуванням. Ритуальна версія корисна
      як пояснення окремих сюжетів, проте вона не доводить сакральне
      походження кожної побутової загадки.

  - id: act-2
    type: motif-formula
    title: Як працює прихована назва
    instruction: Розбери метафоричний механізм короткої загадкової формули.
    passage: >-
      У формулі про біле поле й чорне насіння письмо описане не прямою
      назвою, а через знайому дію сівби. Відгадка можлива тоді, коли
      читач зіставляє поверхню, слід, дію і здатність розуміти написане.
    formulas:
      - text: біле поле
        label: поверхня
        explanation: Сторінка мислиться через аграрну площину, підготовлену до знаків.
      - text: чорне насіння
        label: слід
        explanation: Літери стають дрібними зернами, розсипаними по білому просторі.
      - text: сіє
        label: дія
        explanation: Письмо або читання описується як праця, що залишає впорядкований слід.
      - text: розуміє
        label: компетенція
        explanation: Відгадка вимагає не тільки бачити знаки, а й уміти їх прочитати.
      - text: письмо
        label: відгадка
        explanation: Відповідь збирає разом поверхню, знак, дію і знання.
    prompt: Чому ця загадка не зводиться до простої подібності кольорів?
    model_answer: >-
      У ній працює не лише біле й чорне. Сторінка стає полем, літери -
      насінням, а дія письма або читання - сівбою. Відгадка спирається на
      цілу систему ознак, а не на один колір.

  - id: act-3
    type: critical-analysis
    title: Джерельний паспорт загадки
    instruction: Оціни, чи можна подавати коротку формулу дослівно.
    target_text: >-
      Популярна загадка знайома з усного обігу, але точне видання, запис або
      словникове підтвердження для цього варіанта не названо.
    prompt: Оціни формулу як джерельний матеріал, а не як спогад із пам'яті.
    questions:
      - Чого бракує, щоб цитувати формулу дослівно?
      - Коли краще використати парафразу?
      - Чому пам'ять не замінює джерельний запис?
      - Як позначити популярний мотив без удаваної точності?
    model_answers:
      - Бракує конкретного запису, видання або словникового підтвердження.
      - Парафраза краща тоді, коли мотив відомий, але варіант не перевірено.
      - Пам'ять легко нормалізує слова, скорочує рядок або змішує різні варіанти.
      - Треба назвати його неперевіреним мотивом і не подавати як точну народну цитату.

  - id: act-4
    type: performance
    title: Пауза перед відгадкою
    instruction: Прочитай загадку як усну подію, а не як голий рядок.
    fragment: Поле не міряне, вівці не лічені, пастух рогатий.
    prompt: >-
      Вимов формулу двічі: спершу рівно, потім із паузою перед останнім
      образом. Поясни, як інтонація змінює увагу до підказок.
    self_check:
      - Я виділяю опорні образи, а не підказую відповідь голосом.
      - Пауза не руйнує ритм, а створює місце для здогадки.
      - "Після відгадки я можу назвати ознаки: простір, множинність, форма місяця."
      - Я не додаю власного варіанта до цитати без позначення.
    model_answer: >-
      Пауза перед образом пастуха підсилює останню підказку: місяць має
      форму, яка пояснює "рогатість". Усне виконання допомагає слухачеві
      розкласти формулу на поле, отару й пастуха, але не повинне видавати
      відповідь інтонацією.

workbook:
  - type: critical-analysis
    title: Не лише дитяча забава
    target_text: Загадки потрібні тільки дітям, бо дорослий культурний аналіз не має з ними роботи.
    prompt: Розбери тезу так, щоб не знецінити дитячу гру і не звузити жанр.
    questions:
      - Чому дитяча функція справді важлива для сучасного вжитку загадок?
      - Які знання дорослого світу зберігаються в побутових загадках?
      - Чому метафоричне мислення не є "простим" тільки через коротку форму?
      - Як казковий або межовий сюжет змінює вагу загадки?
      - Яку точнішу тезу можна сформулювати?
    model_answers:
      - Дитяча функція важлива, бо загадка тренує увагу, пам'ять і мовну кмітливість.
      - У жанрі збережено знання про піч, поле, письмо, знаряддя, тварин, воду, ритм і соціальне змагання.
      - Метафоричне мислення складне, бо треба побачити приховану ознаку й перевірити всю систему підказок.
      - У казкових та обрядових сюжетах загадка може ставати випробуванням.
      - Точніше сказати, що дитяча гра є одним із сучасних режимів жанру, а не його повною суттю.

  - type: comparative-study
    title: Українська загадка і світові паралелі
    instruction: Порівняй типологічну близькість без тверджень про походження.
    items_to_compare:
      - Українська народна загадка як приховане називання через побутовий або природний образ.
      - Сюжет Сфінкса як небезпечний іспит на здатність відповісти.
      - Парадоксальна духовна формула, що зсуває звичну логіку.
      - Арабська поетична загадка як споріднена форма прихованого питання.
      - Сучасний ребус як візуальне приховування відповіді.
    criteria:
      - чи є конкретне джерело
      - чи вимагається відгадка
      - чи є небезпека або лише гра
      - який матеріальний світ дає образи
      - чи можна говорити про походження
    prompt: Чому порівняння не повинне замінювати український матеріал?
    model_answer: >-
      Порівняння показує, що приховане питання є широким людським
      механізмом, але не доводить походження конкретної української
      формули. Для походження потрібні джерела, варіанти й маршрути
      передачі. Українська загадка має власні образи, мову, записи й
      побутову конкретність, тому світові паралелі мають лише пояснювати,
      а не витісняти її.

  - type: ritual-sequencing
    title: Від предмета до загадки
    instruction: Упорядкуй кроки створення джерельно чесної загадкової вправи.
    steps:
      - Вибрати предмет, який справді належить до описуваного культурного світу.
      - Визначити одну або дві опорні ознаки предмета.
      - Знайти образну сферу, через яку ці ознаки можна приховати.
      - Перевірити, чи відповідь пояснює всі істотні підказки.
      - Позначити, чи це народний запис, переказаний мотив, авторська вправа або сучасна стилізація.
      - Не видавати власну формулу за народну без джерела.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Спершу треба мати предмет і його ознаки, потім вибрати образну маску
      й перевірити, чи відгадка покриває підказки. Лише після цього
      визначають джерельний статус. Якщо формулу створено зараз, її можна
      використати як вправу, але не як народний запис.

  - type: motif-formula
    title: Матеріальний світ у малій формі
    instruction: Покажи, як побутовий предмет тримає метафору.
    passage: >-
      Загадка про заслінку від печі не працює без знання старої хати:
      треба уявити піч, рух руки, щоденну дію і тваринний образ, який
      маскує предмет.
    formulas:
      - text: піч
        label: простір дії
        explanation: Дає місце, без якого відгадка втрачає конкретність.
      - text: заслінка
        label: прихований предмет
        explanation: Побутова річ має форму й рух, які можна замаскувати.
      - text: коза
        label: тваринний образ
        explanation: Переносить неживий предмет у живу сцену.
      - text: хвіст
        label: деталь руху
        explanation: Пояснює, за що предмет підіймають у метафоричній уяві.
      - text: щодня
        label: звичка
        explanation: Нагадує, що загадка виростає з повторюваної домашньої практики.
    prompt: Чому сучасна заміна предмета може зламати загадку?
    model_answer: >-
      Якщо замінити старий предмет сучасним приблизним аналогом, може зникнути
      дія, форма або культурний простір, на яких тримається метафора. Тут
      важлива не абстрактна "кришка", а конкретна заслінка біля печі.

  - type: critical-analysis
    title: Ритуальна версія без перебільшення
    target_text: Оскільки в деяких сюжетах неправильна відповідь небезпечна, всі загадки походять із ритуалів життя і смерті.
    prompt: Оціни тезу з погляду джерельної обережності.
    questions:
      - Яке зерно правди має ця теза?
      - Чому вона перебільшує доказ?
      - Які типи матеріалу справді підтримують межову функцію?
      - Як сформулювати обережнішу версію?
      - Чому така обережність не послаблює тему?
    model_answers:
      - У казках, обрядових мотивах і демонологічних сюжетах загадка може бути умовою переходу або порятунку.
      - З окремих межових сцен не випливає походження всіх побутових, дитячих і навчальних загадок.
      - Межову функцію підтримують казкові іспити, обрядові контексти, мотиви небезпечної істоти й сцени словесного двобою.
      - Обережніше сказати, що загадка легко входить у сцени випробування, бо її структура вже є іспитом на впізнавання.
      - Обережність дозволяє бачити складність жанру без романтичного перебільшення.

  - type: essay-response
    title: Загадка як школа метафори
    prompt: >-
      Напиши коротке доказове есе українською.

      У 320-420 словах поясни, чому загадку варто читати як школу
      метафоричного мислення, а не лише як вправу на швидку відповідь.
      Обов'язково згадай приховану назву, матеріальний світ, джерельну
      дисципліну, усне виконання і межу ритуальної інтерпретації.
    model_answer: >-
      Загадку варто читати як школу метафоричного мислення, бо її головна
      дія полягає не в самій швидкій відповіді, а в дорозі до неї. Предмет
      навмисно не названо прямо. Замість назви з'являється образ: небо
      стає полем, письмо - сівбою, сонце - образом золотої діжі, заслінка -
      козою. Той, хто відгадує, має побачити, яка ознака перенесена:
      форма, колір, дія, місце, матеріал або звук.

      Матеріальний світ тут дуже важливий. Багато загадок неможливо
      зрозуміти без знання старої хати, печі, поля, знарядь, письма,
      тварин або природних явищ. Тому загадка зберігає не тільки мовну
      гру, а й побутову пам'ять. Якщо замінити давній предмет сучасним
      приблизним аналогом, можна втратити саму метафору.

      Джерельна дисципліна потрібна тому, що короткі формули легко
      змінюються. Перевірений рядок можна цитувати обережно, а популярний
      непідтверджений мотив краще переказати або використати як завдання
      на пошук джерела. Варіантність не є помилкою, але її треба позначати.

      Усне виконання також належить до жанру. Пауза, наголос і темп
      створюють місце для здогадки. Загадка на сторінці є лише частиною
      події.

      Ритуальна інтерпретація важлива, але її треба обмежувати. У деяких
      сюжетах загадка справді є випробуванням, проте це не доводить
      сакральне походження кожного рядка. Точніше сказати, що загадка
      стоїть між грою, навчанням і іспитом на здатність бачити приховану
      відповідність.
    rubric:
      - criteria: Теза
        description: Пояснено загадку як метафоричний механізм
        points: 2
      - criteria: Приклади
        description: Названо матеріальні образи й ознаки
        points: 2
      - criteria: Джерела
        description: Розрізнено цитату, варіант і переказ
        points: 2
      - criteria: Усність
        description: Враховано паузу, голос або виконання
        points: 2
      - criteria: Обережність
        description: Не перебільшено ритуальну версію
        points: 2
