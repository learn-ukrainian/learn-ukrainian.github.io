- lemma: загадка
  translation: riddle
  pos: іменник
  usage: Загадка приховує предмет через образ і вимагає відгадки.
- lemma: відгадка
  translation: answer to a riddle
  pos: іменник
  usage: Відгадка має пояснювати всі істотні підказки, а не одну випадкову ознаку.
- lemma: загадування
  translation: act of posing a riddle
  pos: іменник
  usage: Загадування створює соціальну сцену між тим, хто знає відповідь, і тим, хто шукає.
- lemma: приховане називання
  translation: hidden naming
  pos: словосполука
  usage: Приховане називання замінює пряму назву предмета метафоричним описом.
- lemma: метафора
  translation: metaphor
  pos: іменник
  usage: Метафора в загадці є не прикрасою, а способом дійти до предмета.
- lemma: перифраз
  translation: periphrasis
  pos: іменник
  usage: Перифраз дозволяє описати предмет обхідно, без прямої назви.
- lemma: алегорія
  translation: allegory
  pos: іменник
  usage: Алегорія корисна для порівняння із загадкою, але не тотожна їй.
- lemma: описовий зворот
  translation: descriptive phrase
  pos: іменник
  usage: Описовий зворот може замінювати пряму назву предмета.
- lemma: парадокс
  translation: paradox
  pos: іменник
  usage: Парадокс змушує шукати відповідь поза звичним правилом.
- lemma: оксиморон
  translation: oxymoron
  pos: іменник
  usage: Оксиморон може підсилювати загадкову напругу через внутрішню суперечність.
- lemma: асонанс
  translation: assonance
  pos: іменник
  usage: Асонанс допомагає загадці звучати й запам'ятовуватися.
- lemma: алітерація
  translation: alliteration
  pos: іменник
  usage: Алітерація підсилює ритм короткої усної формули.
- lemma: ономатопея
  translation: onomatopoeia
  pos: іменник
  usage: Ономатопея може давати звукову підказку до відгадки.
- lemma: мікрокосм
  translation: microcosm
  pos: іменник
  usage: Мікрокосм хати або поля може пояснювати ширший світ у загадці.
- lemma: макрокосм
  translation: macrocosm
  pos: іменник
  usage: Макрокосм неба часто перекладається мовою знайомого земного простору.
- lemma: джерельний статус
  translation: source status
  pos: словосполука
  usage: Джерельний статус визначає, чи можна подавати загадку дослівно.
- lemma: варіантність
  translation: variation
  pos: іменник
  usage: Варіантність показує живий рух усної формули між записами й місцями.
- lemma: нормалізація
  translation: normalization
  pos: іменник
  usage: Нормалізація може стерти локальну форму джерельного запису.
- lemma: носій традиції
  translation: bearer of tradition
  pos: словосполука
  usage: Носій традиції зберігає репертуар не як абстрактний "народ", а як конкретна пам'ять.
- lemma: збирач
  translation: collector
  pos: іменник
  usage: Збирач фіксує матеріал, але не повинен затуляти голос носія.
- lemma: польовий запис
  translation: field record
  pos: словосполука
  usage: Польовий запис має місце, час, носія й умови фіксації.
- lemma: усне виконання
  translation: oral performance
  pos: словосполука
  usage: Усне виконання включає паузу, наголос, темп і реакцію слухачів.
- lemma: кмітливість
  translation: quick wit
  pos: іменник
  usage: Кмітливість у загадці означає здатність побачити приховану відповідність.
- lemma: межовий
  translation: liminal; boundary-related
  pos: прикметник
  usage: Межовий сюжет робить загадку умовою переходу або випробування.
- lemma: реконструкція
  translation: reconstruction
  pos: іменник
  usage: Реконструкція має бути обережною і не замінювати джерельний доказ.
- lemma: типологічна близькість
  translation: typological similarity
  pos: словосполука
  usage: Типологічна близькість не доводить походження конкретної української формули.
- lemma: ребус
  translation: rebus
  pos: іменник
  usage: Ребус приховує відповідь через візуальні знаки, а не лише через слова.
- lemma: акровірш
  translation: acrostic
  pos: іменник
  usage: Акровірш може працювати як літературна загадкова форма.
- lemma: логогриф
  translation: logogriph
  pos: іменник
  usage: Логогриф приховує слово через гру з його частинами.
- lemma: антиколоніальний
  translation: anti-colonial
  pos: прикметник
  usage: Антиколоніальний підхід називає український матеріал без імперського привласнення.
