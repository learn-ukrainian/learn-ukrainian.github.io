- title: Мудра дівчина
  type: primary
  role: reading
  url: https://uk.wikisource.org/wiki/Мудра_дівчина_(українська_народна_казка)
  notes: >-
    Зовнішнє читання народної казки; використано лише короткі
    фрагменти, без відтворення повного тексту і без твердження про корпусну
    повноту варіанта.
- title: Скарб
  author: Олекса Стороженко
  type: literary
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=3703
  notes: >-
    Авторська літературна проза з народною побутовою інтонацією; читати як
    місток до літератури, не як дослівний народний запис.
- title: Казка
  type: reference
  role: article
  url: https://uk.wikipedia.org/wiki/Казка
  notes: >-
    Зовнішній орієнтир для жанрової класифікації й варіантності; не замінює
    перевірене джерело окремого варіанта.
- title: Олекса Стороженко
  type: reference
  role: article
  url: https://uk.wikipedia.org/wiki/Олекса_Стороженко
  notes: >-
    Біографічний і літературний контекст для авторських обробок народних
    анекдотичних і побутових мотивів.
