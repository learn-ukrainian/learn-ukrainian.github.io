- lemma: соціально-побутова казка
  translation: народна прозова оповідь про повсякденні й соціальні конфлікти без центральної ролі чарівного
  pos: словосполука
  usage: Соціально-побутова казка показує нерівну владу через дотепну сцену.
- lemma: народний реалізм
  translation: реалістичне бачення народного світогляду, а не буквальний протокол факту
  pos: словосполука
  usage: Народний реалізм у казці полягає в точній моральній оцінці влади.
- lemma: побутовий
  translation: пов'язаний із повсякденним життям, домашнім устроєм і соціальними стосунками
  pos: прикметник
  usage: Побутовий конфлікт може виявити глибоку соціальну нерівність.
- lemma: сатира
  translation: різке висміювання суспільних або людських вад
  pos: іменник
  usage: Сатира в побутовій казці часто спрямована проти пихи сильного.
- lemma: наймит
  translation: найманий працівник у чужому господарстві
  pos: іменник
  usage: Наймит у казці може перемагати пана не силою, а дотепністю.
- lemma: інверсія
  translation: перевертання звичного порядку або ієрархії
  pos: іменник
  usage: Інверсія дає слабшому право на перемогу в казковій сцені.
- lemma: дотепність
  translation: здатність швидко й влучно відповідати
  pos: іменник
  usage: Дотепність стає головною зброєю героя побутової казки.
- lemma: компенсаторний
  translation: такий, що заміщує або відшкодовує брак можливості в реальному житті
  pos: прикметник
  usage: Компенсаторний сюжет дозволяє побачити справедливість, якої бракує в буденному досвіді.
- lemma: пареміологія
  translation: наука про прислів'я, приказки та сталі народні вислови
  pos: іменник
  usage: Пареміологія допомагає читати короткі формули народної мудрості.
- lemma: хитрощі
  translation: вигадливі прийоми, спрямовані на обхід прямої сили
  pos: іменник множини
  usage: Хитрощі в казці можуть бути і справедливим захистом, і небезпечним обманом.
- lemma: етнографія
  translation: наука про побут, звичаї й культуру народів
  pos: іменник
  usage: Етнографія дає контекст, але не замінює літературного аналізу казки.
- lemma: справедливість
  translation: відповідність між правдою, вчинком, винагородою або покаранням
  pos: іменник
  usage: Справедливість у казці часто з'являється через дотепну процедуру.
- lemma: свавілля
  translation: дія за власною примхою без поваги до права або міри
  pos: іменник
  usage: Панське свавілля в побутовій казці стає предметом сміху.
- lemma: лицемірство
  translation: розрив між проголошеною мораллю і власною корисливою поведінкою
  pos: іменник
  usage: Лицемірство попа в казці критикує не віру, а зловживання статусом.
- lemma: антигерой
  translation: персонаж, який викриває ваду або слабкість через негативну чи комічну роль
  pos: іменник
  usage: Пан як антигерой показує владу без мудрості.
- lemma: джерельний статус
  translation: >-
    визначення походження тексту: запис, переказ, шкільна сторінка чи авторська
    обробка
  pos: словосполука
  usage: Джерельний статус визначає, наскільки широко можна цитувати казку.
- lemma: авторська обробка
  translation: літературний текст, який переробляє народний мотив або сюжет
  pos: словосполука
  usage: Авторська обробка Стороженка не є дослівним народним записом.
- lemma: сміхова культура
  translation: система жартів, комізму й сатири, через яку спільнота оцінює поведінку
  pos: словосполука
  usage: Сміхова культура може захищати слабшого, але потребує етичної перевірки.
- lemma: стереотип
  translation: спрощене й часто несправедливе уявлення про людину або групу
  pos: іменник
  usage: Стереотип у казці не слід повторювати як безумовну народну мудрість.
- lemma: кмітливість
  translation: практичний розум, здатність швидко знаходити вихід
  pos: іменник
  usage: Кмітливість Марусі перетворює панську загадку на справедливу відповідь.
- lemma: оповідач
  translation: той, хто веде розповідь і задає її інтонацію
  pos: іменник
  usage: Оповідач у літературній обробці може наслідувати народну інтонацію.
- lemma: варіант
  translation: окреме побутування або запис близького фольклорного сюжету
  pos: іменник
  usage: Один варіант казки не замінює всього корпусу.
