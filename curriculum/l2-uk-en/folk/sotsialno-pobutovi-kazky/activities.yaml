inline:
  - id: act-1
    type: variant-comparison
    title: Чия це правда?
    instruction: Розрізни режими читання соціально-побутової казки.
    prompt: Чому народний реалізм не збігається з буквальним протоколом життя?
    variants:
      - label: Реалізм факту
        text: Казка ніби точно описує реальне становище бідного й багатого.
        source: Спрощене буквальне читання
      - label: Реалізм світогляду
        text: Казка показує, як громада оцінює владу, розум, працю, багатство і справедливість.
        source: Жанрова інтерпретація
      - label: Компенсаторна мрія
        text: Слабший перемагає в оповіді там, де в житті його перемога була непевною або неможливою.
        source: Критична соціальна перспектива
      - label: Панська міра
        text: Багатий брат і пан можуть міряти світ майном, кабанами, хортами або грошима.
        source: Соціальна маска
      - label: Народна міра
        text: Маруся відповідає через землю, думку і сон, тобто через ширший людський порядок.
        source: Читання фрагмента
      - label: Джерельна межа
        text: Короткий фрагмент із зовнішнього джерела можна аналізувати, але не слід розгортати в довгий переказ.
        source: Практика цитування
      - label: Інверсія влади
        text: Той, хто має статус, раптом програє тому, хто має точніше слово.
        source: Поетика побутової казки
      - label: Етична пересторога
        text: Не кожний традиційний сміх автоматично справедливий; треба питати, кого він звільняє або принижує.
        source: Відповідальне читання
      - label: Літературний місток
        text: Стороженко працює з народною сміховою енергією, але його тексти є авторською прозою.
        source: Межа фольклору й літератури
      - label: Світова паралель
        text: Насреддін, індійський мудрий радник або німецький дотепник показують ширший тип, але не замінюють український матеріал.
        source: Порівняльний горизонт
      - label: Статус без совісті
        text: Піп у казці критикується не як віра, а як людина, що використовує статус для вигоди.
        source: Релігійно чутлива рамка
      - label: Сміх проти страху
        text: Чорт стає комічним, коли людська дотепність тимчасово зменшує страх.
        source: Сміхова культура
    features:
      - що доводить режим
      - де починається перебільшення
      - як працює джерельна межа
      - кого захищає сміх
    model_answer: >-
      Народний реалізм точніше розуміти як реалізм світогляду. Казка не
      гарантує, що бідний завжди перемагав у реальному суді, але показує, що
      громада могла оцінити панську владу як дурну або несправедливу. Вона
      компенсує безсилля через сміх і дотепність, але спирається на реальні
      соціальні ролі та побутові конфлікти.

  - id: act-2
    type: variant-comparison
    title: Реалізм чи компенсація?
    instruction: Порівняй три пояснення перемоги слабшого в побутовій казці.
    prompt: Яке пояснення найкраще тримає і соціальний біль, і художню форму?
    variants:
      - label: Чиста правда життя
        text: Казка показує, що слабший у житті завжди міг перемогти сильнішого словом.
        source: Надмірне твердження
      - label: Чиста втеча від життя
        text: Казка не має зв'язку з реальністю, бо все в ній лише бажане.
        source: Редукція до фантазії
      - label: Компенсаторний реалізм
        text: Казка бере реальну нерівність і створює художню сцену, де справедливість стає видимою.
        source: Робоча теза
      - label: Соціальна маска
        text: Пан, піп, наймит і бідний брат є узагальненими ролями, а не біографіями окремих осіб.
        source: Жанрова поетика
      - label: Дотепний хід
        text: Неможливий наказ повертається до того, хто його вигадав.
        source: Побутова інверсія
      - label: Справедливий суд
        text: Правило має шукати правду, а не підсилювати того, хто вже має владу.
        source: Читання "Мудрої дівчини"
      - label: Опір без прямої промови
        text: Казка могла висміяти владу там, де відкрита критика була небезпечною.
        source: Соціальна функція сміху
      - label: Неідеальний народний голос
        text: Традиція може берегти і мудрість, і упередження.
        source: Без ідеалізації
      - label: Світова синхронність
        text: Дотепник проти влади трапляється в різних культурах, але конкретна українська сцена має власну мову.
        source: Порівняльне читання
      - label: Авторська обробка
        text: Стороженко може підсвітити побутову сміхову логіку, але його текст не є народним записом.
        source: Джерельний статус
      - label: Релігійна точність
        text: Сміх над корисливим попом не треба перетворювати на сміх над вірою.
        source: Фреймова межа
      - label: Стереотипний ризик
        text: Якщо сміх спрямований на вразливого, його треба аналізувати, а не повторювати як мудрість.
        source: Етична перевірка
    features:
      - соціальна роль
      - механізм перемоги
      - межа доказу
      - етичний ризик
    model_answer: >-
      Найточніше працює поняття компенсаторного реалізму. Побутова казка не є
      прямою статистикою перемог слабшого, але й не відірвана від життя. Вона
      бере реальні конфлікти влади, бідності, суду й праці та створює сцену, у
      якій слово або кмітливість виявляються сильнішими за статус.

  - id: act-3
    type: critical-analysis
    title: Чотири слова справедливого суду
    target_text: матерів повипрягайте та й пустіть
    instruction: Прочитай короткий фрагмент як побутову логіку справедливості.
    prompt: Як ця відповідь змінює сам спосіб судити?
    questions:
      - Яку проблему має розв'язати сцена з лошам?
      - Чому панське роздумування виявляється слабшим за Марусину побутову логіку?
      - Як фрагмент переводить суперечку від власників до природного зв'язку?
      - Чому це реалізм світогляду, а не протокол судової практики?
      - Як тут працює інверсія ієрархії?
      - Чому короткий фрагмент не слід розгортати в довгий непозначений переказ?
      - Що цей епізод говорить про процедуру справедливості?
      - Як він пов'язаний із початковою суперечкою про корову?
      - Чому відповідь Марусі не є просто хитрістю?
      - Яку межу має висновок із цього фрагмента?
      - Як фрагмент допомагає зрозуміти народний реалізм?
      - Що було б слабким прочитанням цієї сцени?
    model_answers:
      - Сцена має визначити, яка кобила народила лоша, коли власники тягнуть доказ у свій бік.
      - Пан думає зверху й абстрактно, а Маруся пропонує перевірку, що спирається на реальний зв'язок матері й дитинчати.
      - Вона не питає, хто сильніше доведе власність, а дає матерям самим показати зв'язок із лошам.
      - Казка не доводить, що саме така справа була в суді; вона показує уявлення про справедливе правило.
      - Дівчина без влади пропонує точнішу процедуру, ніж пан із владою.
      - Довгий переказ змішав би короткий зовнішній фрагмент, пам'ять і власну реконструкцію.
      - Справедливість залежить від правила, яке веде до правди, а не від статусу судді.
      - Як і суперечка про корову, епізод повертає майновий конфлікт до питання справедливої міри.
      - Це не шахрайство, а спосіб зробити прихований зв'язок видимим.
      - Фрагмент дозволяє аналізувати мотив і процедуру, але не весь корпус побутових казок.
      - Народний реалізм тут у точності соціальної інтуїції, а не в документальній повноті.
      - Слабким було б сказати лише, що Маруся "перехитрила пана", без пояснення процедури.

workbook:
  - id: act-4
    type: critical-analysis
    title: Що дозволяє зовнішня сторінка?
    instruction: Оціни джерельний статус "Мудрої дівчини" як зовнішнього читання.
    target_text: https://uk.wikisource.org/wiki/Мудра_дівчина_(українська_народна_казка)
    prompt: Як користуватися таким джерелом без удаваної повноти?
    questions:
      - Що можна аналізувати за короткими фрагментами з цієї казки?
      - Чому зовнішня сторінка не дає права робити висновки про весь корпус побутових казок?
      - Як назвати її статус у власному аналізі?
      - Чому важливо не змішувати шкільне читання, народний запис і літературну обробку?
      - Що треба зробити перед використанням довгої цитати?
      - Чому короткий фрагмент може бути кориснішим за неперевірений повний переказ?
      - Яку роль має назва "українська народна казка"?
      - Чого ця назва сама по собі ще не доводить?
      - Як поєднати зовнішнє читання з джерельною скромністю?
      - Який висновок був би надмірним?
      - Що треба відокремити від аналізу фрагмента?
      - Як це впливає на роботу з Стороженком?
    model_answers:
      - Можна аналізувати загадку, соціальну інверсію, побутову логіку суду і роль дотепної відповіді.
      - Одна сторінка не представляє всі варіанти, регіони, записи й редакторські історії жанру.
      - Її варто називати зовнішнім читанням народної казки з чітко обмеженим використанням фрагментів.
      - "Ці режими мають різну силу доказу: шкільна сторінка вчить, народний запис фіксує варіант, авторська проза переробляє мотив."
      - Треба перевірити походження, правовий статус, варіант і точність тексту.
      - Короткий фрагмент дозволяє чесний аналіз без імітації повного корпусу.
      - Назва вказує на жанрову належність і допомагає орієнтуватися в читанні.
      - Вона не доводить, що текст є найстарішим, єдиним або академічно найповнішим варіантом.
      - Посилатися на сторінку як на ресурс для читання, а висновки формулювати обережно.
      - Надмірним було б твердити, що всі побутові казки мають таку саму побудову й мораль.
      - Треба відокремити власний переказ і загальну теорію жанру від дослівного фрагмента.
      - Стороженка слід читати як авторську обробку сміхової логіки, а не як народний запис.

  - id: act-5
    type: comparative-study
    title: Дотепник проти влади у світі
    instruction: Порівняй українську побутову казку з паралельними традиціями без стирання місцевої конкретики.
    items_to_compare:
      - "Українська «Мудра дівчина»: дівчина відповідає на панські завдання через побутову логіку й справедливу міру."
      - "Оповіді про Насреддіна: дотепник часто перевертає очікування влади, багатія або самовпевненого слухача."
      - "Індійські придворні історії: мудрий радник розв'язує складні питання через парадокс і точну процедуру."
      - "Німецькі витівки дотепника: сміх викриває дурість статусу, буквальність наказу або соціальну пиху."
      - "Український наймит у казці: людина залежної праці може відповідати пану не силою, а словом."
      - "Український чорт у побутовій казці: страх зменшується, коли демонічна сила потрапляє в комічну пастку."
      - "Авторська проза Олекси Стороженка: народна сміхова енергія переходить у літературне оповідання."
      - "Побутова загадка: питання стає способом перевірити не пам'ять, а здатність мислити інакше."
      - "Панський суд: соціальна процедура стає видимою через помилку або свавілля судді."
      - "Сміх над попом: критика корисливості потребує релігійно точної рамки."
      - "Гендерна інверсія: жіночий розум може перемагати чоловічий статус, але не всі сюжети однаково етичні."
      - "Стереотипний жарт: традиційний сміх треба перевіряти, якщо він спрямований на вразливого."
    criteria:
      - соціальна роль
      - механізм дотепу
      - тип влади
      - межа порівняння
      - культурна конкретика
      - джерельний статус
      - етичний ризик
      - роль процедури
      - тип сміху
      - спосіб інверсії
      - зв'язок із літературою
      - межа узагальнення
    prompt: Як порівнювати дотепників так, щоб світова паралель не поглинула українську казку?
    model_answer: >-
      Треба порівнювати функцію, а не забирати конкретику. У різних культурах
      дотепник може перевертати владу словом, парадоксом або буквальним
      виконанням наказу. Але українська побутова казка має свої ролі: пан,
      наймит, піп, бідний брат, розумна дівчина, чорт у сміховій пастці.
      Світова паралель корисна тоді, коли вона показує ширший тип, але не
      замінює українську мову, побутову сцену й джерельний статус.

  - id: act-6
    type: critical-analysis
    title: Коли народну мудрість треба перевірити
    target_text: Усе, що зберегла народна казка, є мудрим і справедливим.
    instruction: Розбери тезу, яка романтизує традицію й не бачить етичної амбівалентності.
    prompt: Як переписати цю тезу відповідальніше?
    questions:
      - Чому слово "усе" створює проблему?
      - Яку частину тези можна зберегти?
      - Чому народна традиція може містити і мудрість, і упередження?
      - Як відрізнити сміх проти влади від сміху проти вразливого?
      - Чому антисемітські або ксенофобські мотиви не можна повторювати як "народну правду"?
      - Як читати гендерні стереотипи в побутових казках?
      - Чому деколонізація не означає лакування всього народного?
      - Як джерельна точність допомагає етичній точності?
      - Що означає поважати традицію без ідеалізації?
      - Як у відповіді врахувати сміхову культуру?
      - Який висновок буде надмірним у протилежний бік?
      - Як сформулювати збалансовану тезу?
    model_answers:
      - Слово "усе" стирає різницю між справедливою критикою, грубим жартом, стереотипом і джерельно непевним переказом.
      - Можна зберегти думку, що казка справді накопичує важливий соціальний і моральний досвід.
      - "Усна традиція жива й суперечлива: вона може захищати слабшого, але також повторювати історичні упередження."
      - Сміх проти влади висвітлює пиху сильного, а сміх проти вразливого може сам ставати насильством.
      - Такі мотиви треба називати й аналізувати як проблемні, а не переносити в сучасну мову без критики.
      - Треба дивитися, чи сюжет дає жінці розум і дію, чи зводить її до принизливого ярлика.
      - Деколонізація означає читати український матеріал із гідністю й точністю, а не робити його безпомилковим.
      - Якщо точно назвати джерело й жанр, легше відокремити фрагмент, переказ, стереотип і власний висновок.
      - Це означає бачити і художню силу, і моральні напруження.
      - Сміх треба аналізувати за напрямком, функцією і наслідком.
      - Надмірним було б відкинути весь жанр через наявність проблемних мотивів.
      - Точніше сказати, що народна казка є цінним і суперечливим джерелом моральної уяви, яке потребує відповідального читання.

  - id: act-7
    type: essay-response
    title: Сміх як зброя безсилого
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, як соціально-побутова казка поєднує реалізм
      світогляду і компенсаторну мрію про справедливість. Обов'язково назви
      одну соціальну роль, один дотепний механізм, одну джерельну межу і одну
      етичну пересторогу.
    min_words: 260
    model_answer: >-
      Соціально-побутова казка є реалістичною не тому, що точно записує кожну
      подію селянського життя, а тому, що показує народне бачення влади,
      розуму і справедливості. Пан у такій казці може мати двір, слуг і право
      судити, але це не робить його мудрим. Наймит, бідний селянин або
      розумна дівчина часто не мають зовнішньої сили, зате мають слово,
      спостережливість і здатність повернути неможливе завдання проти того,
      хто його вигадав.

      У "Мудрій дівчині" дотепний механізм полягає в тому, що Маруся змінює
      саму процедуру суду. Вона не тягне лоша до власників, а пропонує пустити
      матерів до лошати. Так казка показує справедливість як правильний спосіб
      перевірки, а не як панську волю. Це і є реалізм світогляду: громада
      бачить, що статус без розуму може бути смішним.

      Водночас така перемога є компенсаторною мрією. У реальному житті слабший
      не завжди міг перемогти пана словом. Казка дає простір, де справедливість
      стає видимою, навіть якщо в житті вона була непевною.

      Джерельна межа важлива: короткий фрагмент із зовнішньої сторінки можна
      аналізувати, але не можна видавати одну версію за весь корпус побутових
      казок. Етична пересторога теж потрібна: народний сміх може захищати
      слабшого, але може й повторювати стереотипи. Тому казку треба читати з
      повагою, але без ідеалізації.
    rubric:
      - criteria: Реалізм світогляду
        description: Пояснено, що реалістична не буквальна подія, а народна оцінка влади й справедливості.
      - criteria: Компенсація
        description: Показано, чому перемога слабшого є художньою мрією про справедливість.
      - criteria: Соціальна роль
        description: Названо пана, наймита, бідного селянина, попа, дівчину або іншу роль.
      - criteria: Дотепний механізм
        description: Пояснено загадку, інверсію, буквальне виконання наказу або справедливу процедуру.
      - criteria: Джерельна межа
        description: Відокремлено фрагмент, зовнішнє читання, народний запис і авторську обробку.
      - criteria: Етична пересторога
        description: Названо ризик стереотипу, романтизації або сміху проти вразливого.
      - criteria: Українська конкретика
        description: Український матеріал не розчинено в загальному світовому типі дотепника.
      - criteria: Літературний місток
        description: За потреби згадано Стороженка або Квітку-Основ'яненка як авторську обробку, не народний запис.
