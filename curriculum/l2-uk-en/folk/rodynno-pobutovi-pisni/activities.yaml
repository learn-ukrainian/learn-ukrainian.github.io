inline:
  - id: act-1
    type: variant-comparison
    title: Мистецтво чи побут
    instruction: Порівняй два способи пояснювати родинно-побутову лірику.
    prompt: Чому функціональна пісня може бути мистецтвом, а мистецька пісня може залишатися побутовою дією?
    variants:
      - label: Романтична теза
        text: Українська лірика підносить щоденне почуття, оживляє природу і відкриває духовну виразність голосу.
        source: Костомарівська рамка читання народної лірики
      - label: Етнографічна теза
        text: "Колискова, пісня кохання і коломийка живуть у конкретних ситуаціях: сон, залицяння, танець, жарт, реакція громади."
        source: Побутове виконання і жанрова функція
      - label: Узагальнена позиція
        text: "Функція і краса працюють разом: пісня потрібна в житті саме тому, що має форму, ритм і голос."
        source: Читання модуля
    features:
      - що пояснює позиція
      - де її межа
      - як вона читає форму
      - як вона читає голос
    model_answer: >-
      Романтична теза корисна тим, що не принижує народну лірику до
      "простого побуту", але може ідеалізувати голос і красу. Етнографічна
      теза повертає пісню до сцени виконання, але може недооцінити форму.
      Уважне читання тримає обидві опори: колискова, любовна пісня і
      коломийка діють у житті через ритм, повтор, адресацію і образ.

  - id: act-2
    type: motif-formula
    title: Колискова як побажання
    instruction: Прочитай уривок із колискової і простеж, як пісня переходить від сну до бажаного майбутнього дитини.
    passage: |-
      Ой щоб спало, щастя знало,
      Ой щоб росло, не боліло.
      На серденько не кволіло,
    formulas:
      - text: Ой щоб спало, щастя знало
        label: побажання долі
        explanation: Сон пов'язано не з паузою, а з майбутнім щастям дитини.
      - text: Ой щоб росло, не боліло
        label: тілесне благословення
        explanation: Пісня називає здоров'я як частину домашньої турботи.
      - text: На серденько не кволіло
        label: внутрішня сила
        explanation: Побажання переходить від росту тіла до спокою серця.
    prompt: Поясни, чому повтор "ой щоб" працює не лише як прикраса.
    model_answer: >-
      Повтор "ой щоб" робить побажання ритмічним і передбачуваним. Він
      поєднує сон, ріст і здоров'я дитини в одну лагідну
      послідовність, тому колискова звучить як домашнє благословення.

  - id: act-3
    type: motif-formula
    title: Посланці і відстань
    instruction: Визнач, як короткі формули переносять інтимне почуття в образ. Уривок подано як обережний переказ мотиву, не як дослівну цитату.
    passage: Пишу я листоньки на далеку дорогу. Сиві голубоньки хай шукають молоду дівчину.
    formulas:
      - text: Пишу я листоньки
        label: непряма адреса
        explanation: Любовне бажання переходить у лист, бо прямої присутності немає.
      - text: Сиві голубоньки
        label: посланці
        explanation: Птахи роблять відстань видимою і шукають адресата замість мовця.
      - text: молоду дівчину
        label: адреса пошуку
        explanation: Образ адресата показує, що посланці потрібні через відстань і непряму мову.
    prompt: Обери одну формулу і поясни, яку роботу вона виконує в інтимній ліриці.
    model_answer: >-
      "Сиві голубоньки" працюють як посланці: голос не може сам дійти до
      коханої, тому пісня передає пошук птахам. Формула показує відстань і
      бажання, а не просто додає красиву природну прикрасу.

workbook:
  - id: act-4
    type: comparative-study
    title: Короткий уривок і межа доказу
    instruction: Оціни, що дозволяє стверджувати фрагмент із любовної лірики.
    items_to_compare:
      - Конкретний фрагмент з Ізборника про листи, голубів і пошук дівчини.
      - Узагальнення про весь корпус українських пісень кохання.
      - Науковий коментар про мотив посланництва як допоміжна рамка.
    criteria:
      - Чи можна цитувати рядки як конкретний фрагмент?
      - Чи можна з нього робити висновок про весь корпус?
      - Яка роль листа і голубів у фрагменті?
      - Де потрібна джерельна обережність?
    prompt: Який висновок про мотив посланництва можна зробити без перебільшення?
    model_answer: >-
      Уривок підтверджує мотив посланництва: закоханий звертається до листа
      і голубів, щоб подолати відстань до дівчини. Його можна цитувати як
      конкретний публічний фрагмент, але не можна на його основі описувати
      весь корпус любовних пісень або додавати відсутні рядки. Обережний
      висновок пов'язує форму посланництва з відстанню, пошуком і непрямою
      адресацією.

  - id: act-5
    type: comparative-study
    title: Мала форма у різних культурах
    items_to_compare:
      - Українська коломийка як дворядкова танцювальна строфа.
      - Японське хайку як коротка форма спостереження.
      - Ірландський limerick як коротка дотепна строфа.
    criteria:
      - обсяг
      - зв'язок із виконанням або усною ситуацією
      - тип емоції чи думки
      - межа порівняння
    prompt: Чому корисно порівнювати малі форми, але небезпечно називати одну форму аналогом іншої?
    model_answer: >-
      Порівняння корисне, бо показує спільний принцип: короткий текст може
      переносити складну думку. Але коломийка не є "українським хайку" і не
      зводиться до limerick, бо має власну ритміку, танцювальний зв'язок,
      карпатський ґрунт і українське побутування. Межа порівняння зберігає
      конкретність кожної форми.

  - id: act-6
    type: critical-analysis
    title: Романтизація жіночого голосу
    target_text: Жінка в українській ліриці є лише духовно-прекрасним образом.
    instruction: Оціни тезу, яка перетворює Костомарівську високу оцінку на повний опис жанру.
    prompt: Проаналізуй слабке слово "лише" і перепиши тезу джерельно обережно.
    questions:
      - Що в цій тезі спирається на романтичне читання?
      - Чому слово "лише" робить твердження слабким?
      - Як переписати тезу так, щоб зберегти вагу жіночого голосу без ідеалізації?
    model_answers:
      - Теза спирається на романтичне піднесення жіночого образу і на ідею особливої духовної краси української лірики.
      - '"Лише" стирає реальні голоси болю, ревнощів, сорому, спротиву, жарту і соціального тиску.'
      - Точніше сказати, що жіночий голос є центральним для родинно-побутової лірики, але він не зводиться до безконфліктного ідеалу.

  - id: act-7
    type: performance
    title: Коломийковий темп
    instruction: Підготуй коротке ритмічне читання без театрального перебільшення.
    prompt: Прочитай створену тобою дворядкову коломийкову строфу або один короткий приклад із публічного джерела. Перед читанням назви джерело або скажи, що це власна спроба.
    fragment: |-
      Коломийко, мала пісне,
      вмісти думку цілу.
    self_check:
      - Чи названо, це джерело чи власна спроба?
      - Чи чути коротку строфу, а не довгу промову?
      - Чи не подано власний рядок як народний текст?
    show_record_button: true
    model_answer: >-
      Стримане виконання показує ритм і стиснення. Якщо рядок власний, це
      треба сказати прямо; якщо він джерельний, треба назвати сторінку або
      добірку.

  - id: act-8
    type: essay-response
    title: Інтимний голос як культурна пам'ять
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 240-320 словах поясни, чому родинно-побутова пісня не є "малою" за
      культурною вагою. Обов'язково назви один жанр, один формальний прийом,
      один тип голосу і одну джерельну межу.
    min_words: 240
    model_answer: >-
      Родинно-побутова пісня може здаватися малою, бо говорить про близьке
      життя: колиску, кохання, танець, сором, жарт, матір або дівочий голос.
      Але її культурна вага не вимірюється масштабом події. Колискова, наприклад,
      організовує перший голос дому: повтор, анафора і пестливі форми
      створюють слухову безпеку, а побажання здоров'я, розуму і росту вводять
      дитину в бажаний порядок життя. Любовна пісня працює інакше: вона
      перетворює відстань на мотив посланництва, коли лист або голуби мають
      знайти адресата. Коломийка ще більше стискає думку, але саме стиснення
      робить її сильною формою соціальної реакції. Важливо тримати джерельну
      межу: повний публічний текст можна розбирати як читання, короткий
      уривок - тільки як свідчення певного мотиву, а науковий коментар не
      замінює народного рядка. Тому родинно-побутова пісня є інтимною
      пам'яттю культури: вона зберігає не лише події, а спосіб говорити про
      близькість.

      Саме тому така пісня потребує уважного читання, а не поблажливого
      зменшення. У ній приватне не протистоїть культурному: приватне стає
      місцем, де культура звучить найточніше. Материнський голос у колисковій
      не виголошує програму, але вибудовує світ довіри; дівочий або парубочий
      голос у любовній пісні не просто скаржиться, а знаходить форму для
      дистанції, сорому і надії; коломийковий голос може сміятися, але його
      сміх часто тримає соціальну пам'ять громади. Формальні прийоми тут не
      прикраси. Повтор збирає емоцію, пестливість робить інтонацію тілесно
      близькою, а короткий ритм змушує думку стати виразною. Джерельна межа
      також має етичне значення: коли ми чесно відрізняємо повний текст,
      уривок і переказ мотиву, ми не привласнюємо народний голос своїми
      додатками. Така точність і робить близький голос культурно тривалим.
    rubric:
      - criteria: Жанр
        description: "Названо конкретний жанр: колискова, пісня кохання або коломийка."
      - criteria: Форма
        description: Формальний прийом пов'язано з висновком.
      - criteria: Голос
        description: Тип голосу не зведено до прикраси.
      - criteria: Джерельна межа
        description: Є чітка джерельна межа.
      - criteria: Міра
        description: Немає романтичного перебільшення або знецінення побуту.
