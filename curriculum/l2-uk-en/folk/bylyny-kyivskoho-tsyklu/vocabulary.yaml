- lemma: билина
  translation: heroic epic song; bylina
  pos: noun
  usage: Билина київського циклу працює через формулу, гіперболу і повільний епічний рух.
- lemma: самоназва старого епосу
  translation: traditional self-name for old epic song
  pos: noun phrase
  usage: Самоназва старого епосу підкреслює пам'ять про давні часи.
- lemma: київський цикл
  translation: Kyiv cycle
  pos: noun phrase
  usage: Київський цикл обертається довкола Києва, Володимира і богатирів.
- lemma: богатир
  translation: epic warrior hero
  pos: noun
  usage: Богатир у билині має надмірну силу, але не завжди моральну бездоганність.
- lemma: княжий бенкет
  translation: princely feast
  pos: noun phrase
  usage: Княжий бенкет показує, яке місце герой має в епічній ієрархії.
- lemma: Володимир Красне Сонечко
  translation: Volodymyr the Fair Sun, epic prince figure
  pos: proper noun
  usage: Володимир Красне Сонечко є епічним центром двору, а не прямим портретом одного князя.
- lemma: формульна поетика
  translation: formulaic poetics
  pos: noun phrase
  usage: Формульна поетика допомагає усному епосу тримати довгу пам'ять.
- lemma: тонічний вірш
  translation: tonic verse
  pos: noun phrase
  usage: Тонічний вірш спирається на наголоси й інтонаційні блоки.
- lemma: гіпербола
  translation: hyperbole
  pos: noun
  usage: Гіпербола робить богатирську силу видимою в епічному масштабі.
- lemma: зачин
  translation: opening formula
  pos: noun
  usage: Зачин вводить простір, рух героя або княжий двір.
- lemma: джерельна межа
  translation: source boundary; evidentiary limit
  pos: noun phrase
  usage: Джерельна межа не дозволяє робити з ранньої згадки повний текст билини.
- lemma: північний запис
  translation: northern recording
  pos: noun phrase
  usage: Північний запис важливий для збереження, але не автоматично визначає походження змісту.
- lemma: зв'язок Києва і Чернігова
  translation: Kyiv-Chernihiv connection
  pos: noun phrase
  usage: Зв'язок Києва і Чернігова допомагає читати шлях Іллі до княжого двору.
- lemma: галицько-волинський простір
  translation: Galician-Volhynian space
  pos: noun phrase
  usage: Галицько-волинський простір помітний у формулах про Дюка та інших дворових героїв.
- lemma: апропріація
  translation: appropriation
  pos: noun
  usage: Апропріація підміняє київське ядро модерною імперською назвою.
- lemma: трансформація жанру
  translation: genre transformation
  pos: noun phrase
  usage: Трансформація жанру пояснює, як давні епічні функції переходять у думи й легенди.
- lemma: ранньомодерне свідчення
  translation: early modern testimony
  pos: noun phrase
  usage: Ранньомодерне свідчення може довести впізнаваність імені, але не повний текст.
- lemma: деколонізоване читання
  translation: decolonized reading
  pos: noun phrase
  usage: Деколонізоване читання повертає Київ у центр аналізу без вигаданої безперервності.
