- title: Дюк Степанович
  type: primary
  role: linked reading
  url: https://feb-web.ru/feb/byliny/texts/kir/kir-020-.htm
  notes: >-
    Публічний текст пізнього запису з формулою про Волинець і Галич; використовуй
    як зовнішнє джерело, а не як старокиївський український текст.
- title: Культура Київської Русі IX-X ст.
  type: scholarly
  role: article
  url: http://litopys.org.ua/dzuba/dzuba1.htm
  notes: >-
    Огляд Дзюби й Павленко з прикладом Дюка Степановича та поясненням
    київсько-чернігівських і галицько-волинських вузлів билинного світу.
- title: Дмитро Чижевський - Історія української літератури
  type: scholarly
  role: article
  url: http://litopys.org.ua/chyzh/chy.htm
  notes: >-
    Опора для згадок Кміти, автора хроніки 1585 року, Лясоти, старих форм
    імені Іллі та тези про витіснення старого епосу думами.
- title: Мирослав Попович - Нарис історії культури України
  type: scholarly
  role: article
  url: http://litopys.org.ua/popovych/narys05.htm
  notes: >-
    Джерело для ритмічної моделі втрати старокиївських варіантів і обережної
    межі щодо північних записів.
- title: Дмитро Антонович - Українська музика
  type: scholarly
  role: article
  url: http://litopys.org.ua/cultur/cult22.htm
  notes: >-
    Історіографічний огляд дискусії про билини київського циклу, українські
    зв'язки й імперські позиції XIX століття.
- title: Билини
  type: reference
  role: reference
  url: https://vue.gov.ua/%D0%91%D0%B8%D0%BB%D0%B8%D0%BD%D0%B8
  notes: >-
    Довідкова стаття Великої української енциклопедії; корисна для швидкого
    жанрового орієнтира, але аналіз має спиратися на конкретні джерела.
