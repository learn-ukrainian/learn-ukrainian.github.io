inline:
  - id: act-1
    type: variant-comparison
    title: Три позиції щодо билин
    instruction: Порівняй три рамки і визнач, яка з них тримає і джерела, і деколонізаційну межу.
    variants:
      - label: Імперська підміна
        text: >-
          Пізні північні записи автоматично дають право назвати весь київський
          епос модерно російським, а Київ лишити тільки давньою сценою.
        source: Спрощена схема власності через місце запису
      - label: Романтичне перебільшення
        text: >-
          Усі пізні тексти можна читати як повністю збережений український
          старокиївський корпус, бо їхній зміст пов'язаний із Києвом.
        source: Оборонна відповідь без джерельної межі
      - label: Джерельна деколонізація
        text: >-
          Київсько-чернігівське й галицько-волинське ядро треба назвати прямо,
          північні записи позначити як шлях збереження, а втрату
          старокиївських повних текстів не приховувати.
        source: Точна позиція семінару
    features:
      - що рамка бачить
      - що рамка стирає або перебільшує
      - яку межу доказу вона визнає
    prompt: >-
      Чому третя позиція сильніша за перші дві, хоча вона менш гаслова?
    model_answer: >-
      Імперська підміна правильно помічає пізні північні записи, але перетворює
      архівну долю на право власності й стирає Київ. Романтичне перебільшення
      правильно захищає українсько-руське ядро, але говорить так, ніби повний
      старокиївський корпус збережено. Третя позиція точніша: вона називає
      Київ, Чернігів, Галич і ранньомодерні згадки, але водночас визнає
      північний шлях збереження і втрату повних українських варіантів.

  - id: act-2
    type: motif-formula
    title: Формула простору
    instruction: >-
      Розбери стилізовані формули як карту епічного світу, не подаючи їх як
      дослівний запис.
    passage: |-
      Славний Волинець, красний Галич.
      У славному городі Києві.
      До Чернігова і далі до княжого двору.
    formulas:
      - text: Славний Волинець, красний Галич
        label: галицько-волинський слід
        explanation: >-
          Стилізована українська формула відтворює географічну пам'ять пізнього
          запису про південно-західний руський простір.
      - text: славний город Київ
        label: епічний центр
        explanation: Київ є не декорацією, а місцем двору, визнання і конфлікту.
      - text: Чернігів
        label: зв'язок Києва і Чернігова
        explanation: Чернігів допомагає читати Іллю не лише через пізню форму «Муромець».
    prompt: >-
      Поясни, як географічна формула може бути доказом культурної пам'яті, але
      не дає права відновити втрачений старокиївський текст.
    model_answer: >-
      Географічна формула показує, який простір пам'ятає пізній запис, але в
      цій вправі вона подана як стилізована українська ілюстрація. Галич,
      Волинь, Київ або Чернігів не є випадковими прикрасами. Вони допомагають
      бачити київсько-руське й українське ядро билинного світу. Але така
      формула не є повним старокиївським текстом. Вона дозволяє говорити про
      слід і топографію, а не про дослівну реконструкцію.

workbook:
  - id: act-3
    type: critical-analysis
    title: Згадка не дорівнює повному тексту
    instruction: >-
      Оціни силу ранньомодерного свідчення про билинну пам'ять, не перетворюючи
      його на повний текст.
    prompt: >-
      Проаналізуй слабку тезу про ранньомодерні згадки. У науковому переказі
      Чижевського такі згадки пов'язують Іллю, Соловія, богатирів у Києві,
      могилу Іллі в Софії та пам'ять про місцевий богатирський образ у Лаврі з
      українським простором XVI-XVII століть. Перепиши тезу так, щоб доказ не
      був перебільшений.
    target_text: >-
      Ці згадки доводять, що повний старокиївський корпус билин зберігся в
      Україні майже без змін.
    questions:
      - Чому така теза перебільшує доказ?
      - Які імена або місця справді засвідчено?
      - Чому це важливо для української пам'яті про билини?
      - Чого це не дозволяє стверджувати без повного запису виконання?
    model_answers:
      - >-
        Теза перебільшує доказ, бо ранньомодерна згадка не є повним текстом
        билини. Вона справді важлива: називає Іллю, Соловія, київські печери,
        Софію і Лавру, тобто показує, що
        богатирська пам'ять була впізнавана в українському просторі. Але вона
        не дає зачину, сюжету, ритму й варіанта виконання. Точніше сказати:
        маємо доказ культурної пам'яті й топографії, але не дослівно
        збережений старокиївський корпус.

  - id: act-4
    type: comparative-study
    title: Епос і місце збереження
    instruction: Порівняй три випадки без стирання української конкретики.
    items_to_compare:
      - Билини київського циклу з київсько-чернігівським ядром і пізніми північними записами.
      - Карело-фінський епос, укладений із рун у модерному національному проєкті.
      - «Іліада», що має складну історію усного побутування, запису й редакції.
    criteria:
      - де формується епічний зміст
      - де і коли його записано або впорядковано
      - чому місце збереження не дорівнює простій культурній власності
    prompt: >-
      Який висновок про міграцію епосу можна зробити без втрати українського
      матеріалу?
    model_answer: >-
      Порівняння показує загальний принцип: епос може зберігатися, записуватися
      або впорядковуватися не там і не тоді, де сформувалося його змістове ядро.
      Але з цього не випливає, що всі епоси стають безадресними. Для билин
      київського циклу треба називати конкретні опори: Київ, Чернігів, Галич,
      двір Володимира, ранньомодерні українські згадки й пізні північні записи.
      Порівняння корисне тоді, коли воно пояснює рух традиції, а не стирає
      київсько-руський зміст.

  - id: act-5
    type: critical-analysis
    title: Перепиши слабку тезу
    instruction: Оціни тезу, яка замінює джерельний аналіз імперською короткістю.
    prompt: >-
      Проаналізуй слабку тезу, назви підміну і перепиши її джерельно чесно.
    target_text: >-
      Билини записані на російській Півночі, отже це російський епос, а Київ у
      них лише давня назва.
    questions:
      - Чому ця теза слабка і як її переписати джерельно чесно?
      - Яку справжню інформацію містить теза?
      - Де відбувається підміна?
      - Яка формула збереже і північні записи, і київське ядро?
    model_answers:
      - >-
        Теза правильно помічає, що багато пізніх записів походять із Півночі.
        Але вона підміняє місце збереження місцем формування змісту і стирає
        Київ, Чернігів, Галич та ранньомодерні українські згадки. Обережніше:
        билини київського циклу мають київсько-руське змістове ядро, пізно
        збережене переважно в північних записах; це не дає права називати весь
        епос модерно російським.

  - id: act-6
    type: performance
    title: Речитатив без тріумфального крику
    instruction: Підготуй коротке читання формульного зачину.
    prompt: >-
      Прочитай стилізовану формулу повільно, з паузою після назви простору.
      Перед читанням одним реченням поясни, що це не дослівний запис, а
      українська ілюстрація географічної пам'яті пізнього тексту.
    fragment: |-
      Славний Волинець, красний Галич,
      дорога до Києва і княжого двору.
    self_check:
      - Чи не подано стилізовану формулу як дослівний запис?
      - Чи збережено стриманий темп формули?
      - Чи пояснено, яку роль має географічна назва?
    show_record_button: true
    model_answer: >-
      Добре виконання не робить із формули переможний лозунг і не видає її за
      дослівний запис. Воно повільно називає простір, тримає паузу і пояснює:
      це стилізована українська ілюстрація пам'яті про галицько-волинський
      напрям билинного світу.

  - id: act-7
    type: essay-response
    title: Повернення без вигадки
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 240-320 словах поясни, як можна деколонізувати билини київського циклу
      без романтичного перебільшення. Обов'язково назви місце запису, київське
      або чернігівське ядро, один ранньомодерний доказ і одну джерельну межу.
    min_words: 240
    rubric:
      - criteria: Північні записи
        description: Названо пізні північні записи без перетворення їх на право власності.
      - criteria: Українсько-руська опора
        description: "Є конкретна опора: Київ, Чернігів, Галич або Волинь."
      - criteria: Свідчення
        description: Є ранньомодерне свідчення або науковий доказ.
      - criteria: Джерельна межа
        description: Чітко сказано, що старокиївські дослівні тексти втрачено.
      - criteria: Без підміни
        description: Немає імперської схеми «російський епос про Київ» і немає вигаданої безперервності.
    model_answer: >-
      Деколонізувати билини київського циклу означає повернути їм конкретний
      київсько-руський простір і водночас не вигадувати втраченого корпусу.
      Пізні записи багатьох билин справді походять переважно з Півночі, але
      місце запису не дорівнює культурній власності. У змісті київського циклу
      постійно працюють Київ, княжий двір Володимира, Чернігів, шлях до Києва,
      а в окремих формулах - галицько-волинський простір. Ранньомодерні згадки,
      які наводить Чижевський, важливі тим, що Ілля, Соловій і київська
      пам'ять про богатирів були впізнавані в
      українському середовищі XVI-XVII століть. Водночас ці згадки не є
      повними билинами. Тому чесна межа така: можна говорити про київське й
      українсько-руське ядро, про імперське привласнення і про трансформацію в
      думах та інших жанрах; не можна вдавати, ніби маємо повний
      старокиївський текст у безперервній українській усній передачі.
