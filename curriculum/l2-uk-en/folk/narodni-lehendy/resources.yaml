- title: Народні легенди
  role: textbook
  source_ref: Narodni Lehendy
  notes: >-
    Локальний дослідницький орієнтир і планова рамка для жанру; використано
    як контекст, а не як готовий текст для цитування.
- title: Слов'янська міфологія
  author: Микола Костомаров
  role: textbook
  source_ref: Слов'янська міфологія
  notes: >-
    Науковий контекст для романтичного читання народних вірувань і
    дуалістичних мотивів; не рахується як народний первинний текст.
- title: Нарис історії культури України
  author: Мирослав Попович
  role: textbook
  source_ref: Нарис історії культури України
  notes: >-
    Культурно-історична рамка для переосмислення, функціонального зближення
    та обережної мови про старші мотиви.
- title: Історія української літератури
  author: Дмитро Чижевський
  role: textbook
  source_ref: Історія української літератури
  notes: >-
    Контекст для ролі апокрифічної літератури в народних казках, легендах і
    старій українській книжності.
- title: Як вийшли на небі зорі "віз"
  role: reading
  url: https://uk.wikisource.org/wiki/Як_вийшли_на_небі_зорі_%22віз%22
  notes: >-
    Публічне зовнішнє читання етіологічної легенди, записано 1925 року
    в с. Вузівці від І. Сердечного; використано скорочений on-site уривок,
    PD-UA-exempt / суспільне надбання.
- title: Збірка народних легенд 1921 року
  author: Сильвестер Калинець
  role: reading
  url: https://uk.wikisource.org/wiki/Лєґенди_з_уст_народа
  notes: >-
    Видання 1921 року з християнсько-етіологічними легендами; використано
    скорочений on-site уривок із легенди «Кінь», суспільне надбання;
    читати з орфографічною й редакторською обережністю.
- title: Дохристиянські вірування українського народу
  role: article
  url: https://uk.wikisource.org/wiki/Дохристиянські_вірування_українського_народу
  notes: >-
    Зовнішній науковий контекст для дуалізму, богомильського впливу та
    межі між старшими мотивами й християнським переосмисленням.
- title: Книга Буття
  role: reading
  url: https://uk.wikisource.org/wiki/Біблія_(Огієнко)/Книги_Старого_Заповіту/Перша_книга_Мойсеєва:_Буття
  notes: >-
    Канонічний біблійний орієнтир для розрізнення церковного створення світу
    і народної етіологічної легенди.
