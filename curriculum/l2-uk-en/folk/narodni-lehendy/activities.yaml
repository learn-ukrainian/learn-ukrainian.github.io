inline:
  - id: act-1
    type: motif-formula
    title: Обережні формули двовір'я
    instruction: Розпізнай формули, які не спрощують народне християнство.
    passage: >-
      Народна легенда не є церковним догматом, але й не є простою помилкою.
      У ній християнські образи, апокрифічні сюжети, місцева пам'ять і
      щоденний досвід утворюють рухому систему пояснення.
    formulas:
      - text: церковне вчення
        label: межа канону
        explanation: Називає офіційну богословську норму, з якою легенду не треба змішувати.
      - text: народна легенда
        label: жанровий режим
        explanation: Працює через сюжет, знак і моральне пояснення видимого світу.
      - text: апокрифічний мотив
        label: книжний перехід
        explanation: Вказує на неканонічну біблійну оповідь, що могла ввійти в усне середовище.
      - text: локалізація святого
        label: народне наближення
        explanation: Показує, як святий образ діє у полі, дорозі, біля води чи дому.
      - text: народна теодицея
        label: пояснення зла
        explanation: Допомагає говорити про зло без перетворення чорта на рівного творця.
      - text: функціональне зближення
        label: обережна заміна
        explanation: Точніше за грубе твердження, ніби старий образ просто став святим.
    prompt: Яка формула найкраще тримає і християнську рамку, і фольклорну свободу?
    model_answer: >-
      Найбезпечніше працює формула "народна легенда". Вона не змішує оповідь
      із церковним ученням, але й не принижує її як помилку. Далі можна
      уточнювати: апокрифічний мотив, локалізація святого, народна теодицея
      або функціональне зближення.

  - id: act-2
    type: ritual-sequencing
    title: Шлях апокрифічного мотиву
    instruction: Упорядкуй шлях, яким книжний неканонічний сюжет може стати народною легендою.
    steps:
      - У книжному середовищі з'являється оповідь на біблійну тему поза каноном.
      - Сюжет переходить у переказування через читання, проповідь, пам'ять або домашню оповідь.
      - Усна традиція скорочує сюжет до однієї сильної сцени.
      - Легенда прив'язує сцену до рослини, тварини, свята, місця або видимого знака.
      - Громада читає знак як моральне пояснення милосердя, кари, допомоги або перестороги.
      - Пізніший читач відрізняє канон, апокриф, легенду і науковий коментар.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Апокрифічний мотив не стає легендою автоматично. Спершу він існує як
      книжна неканонічна оповідь, потім переходить в усне переказування,
      стискається до яскравої сцени, прив'язується до видимого знака і вже
      тоді працює як народне моральне пояснення.

  - id: act-3
    type: motif-formula
    title: Святий у народній легенді
    instruction: Визнач, яку функцію отримує святий образ у народній прозі.
    passage: >-
      Святий у легенді може бути не тільки постаттю церковної пам'яті, а й
      близьким народним заступником: у дорозі, біля поля, коло худоби, у
      грозу, під час хвороби або на межі свята.
    formulas:
      - text: відмикає весну
        label: сезонна функція
        explanation: Святий образ зближується з очікуванням початку весняного руху землі.
      - text: швидкий помічник
        label: заступництво
        explanation: Народна побожність бачить святого як того, хто відгукується в небезпеці.
      - text: громова сила
        label: природний знак
        explanation: Небесне явище осмислюється через біблійну або святу постать.
      - text: хатня пересторога
        label: побутова межа
        explanation: Святий день або свята постать регулює працю, заборону чи домашню обережність.
      - text: не догмат, а легенда
        label: жанрова межа
        explanation: Формула захищає від змішування народної оповіді з церковним ученням.
    prompt: Чому така функція не скасовує церковного образу святого?
    model_answer: >-
      Народна функція не замінює церковний образ, а показує, як він входить у
      щоденне життя громади. Святий може мати канонічну пам'ять у Церкві й
      водночас народну роль у легенді, календарі, полі чи дорозі.

workbook:
  - type: variant-comparison
    title: Три карти двовір'я
    instruction: Порівняй три способи пояснити двовір'я.
    prompt: Яка карта найменше спрощує народне християнство?
    variants:
      - label: Неповне хрещення
        text: Народні легенди трактуються як залишок помилки, яку треба витіснити церковною нормою.
        source: Дисциплінарна рамка
      - label: Прихований давній шар
        text: Християнські образи читаються як тонка оболонка над давнішими мотивами.
        source: Редукційна фольклористична рамка
      - label: Переосмислення
        text: Християнська спадщина, апокрифи, місцевий простір і старші мотиви утворюють рухому систему.
        source: Обережна аналітична рамка
      - label: Народна теодицея
        text: Дуалістична легенда пояснює зло як викривлення або наслідування, а не як рівне творення.
        source: Релігійно чутлива рамка
      - label: Функціональне зближення
        text: Святий отримує народну сезонну чи побутову функцію без втрати церковної пам'яті.
        source: Жанрове розрізнення
      - label: Джерельна обережність
        text: Повний текст, короткий фрагмент, шкільний переказ і науковий коментар мають різну силу доказу.
        source: Практика читання
    features:
      - ставлення до християнської рамки
      - ставлення до старших мотивів
      - ризик спрощення
      - сила джерельного доказу
      - повага до жанру
    model_answer: >-
      Найменше спрощує карта переосмислення. Вона не називає народну легенду
      неповним хрещенням, але й не робить християнство поверхневою оболонкою.
      Вона дозволяє бачити апокрифічні мотиви, місцеву пам'ять, функції
      святих і старші образи в одному рухомому процесі.

  - type: comparative-study
    title: Синкретизм без стирання місця
    instruction: Порівняй українське народне християнство з іншими традиціями без втрати місцевої конкретики.
    items_to_compare:
      - Українська легенда про святого, який діє біля поля, дороги, води або хати.
      - Побожність у Латинській Америці, де місцева історія входить у християнський образ Богородиці.
      - Бразильська традиція співіснування африканської спадщини з християнськими іменами.
      - Японський досвід довгого співжиття місцевої святині й буддійського храму.
      - Українська апокрифічна легенда, де біблійна тема переходить у коротку усну сцену.
      - Українська етіологічна легенда, де природа стає моральним знаком.
    criteria:
      - що є релігійною рамкою
      - що є місцевою пам'яттю
      - чи є письмовий канал
      - як працює видимий знак
      - чи не стирається українська конкретика
      - де проходить межа між порівнянням і ототожненням
    prompt: Як порівнювати синкретичні явища, не перетворюючи їх на один загальний шаблон?
    model_answer: >-
      Треба порівнювати механізми, а не підміняти ними матеріал. У різних
      культурах релігійний образ може входити в місцеву пам'ять, свято, святиню
      або ландшафт. Але українська легенда має власні джерела: християнський
      календар, апокрифи, святі образи, аграрний рік, місцеві назви й усну
      прозу. Порівняння корисне лише тоді, коли воно не стирає цієї конкретики.

  - type: critical-analysis
    title: Народ був темний?
    target_text: Народ був темний і не розумів справжнього християнства.
    prompt: Розбери цю тезу так, щоб не знецінити народну легенду і не змішати її з церковним ученням.
    questions:
      - Чому ця теза принижує народну легенду?
      - Яку слушну пересторогу вона все ж може містити?
      - Чому народна легенда не повинна ставати церковним догматом?
      - Як апокрифічний сюжет відрізняється від простої помилки?
      - Чому двовір'я не варто зводити до неповного хрещення?
      - Як переписати тезу без зверхності?
      - Який приклад показує складність народної теодицеї?
      - Чому повага до традиції не означає безкритичність?
    model_answers:
      - Вона зводить складну усну культуру до нестачі освіти й не бачить її жанрової логіки.
      - Вона нагадує, що народна легенда не є церковним ученням і потребує розрізнення.
      - Догмат має інший статус, джерела й мову, ніж усна етіологічна оповідь.
      - Апокриф має книжну й усну історію, тому його треба описувати як окрему зону традиції.
      - Двовір'я також містить локалізацію, переосмислення й функціональне зближення.
      - Точніше сказати, що народна легенда переосмислює християнські образи в мові щоденного життя.
      - Сюжет, де чорт наслідує або псує Божу дію, пояснює зло без визнання двох рівних творців.
      - Традиція може берегти милосердя й водночас передавати страхи або упередження.

  - type: essay-response
    title: Народна теодицея
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому дуалістична народна легенда про Бога і
      чорта не є ані церковним догматом, ані простою казковою вигадкою.
      Назви один апокрифічний або етіологічний механізм, одну релігійну межу,
      одну джерельну пересторогу і один сучасний сенс такого читання.
    min_words: 260
    model_answer: >-
      Дуалістичну народну легенду про Бога і чорта не можна читати як
      церковний догмат, бо вона не формулює офіційного вчення про створення
      світу. У церковній рамці Бог є Творцем, а зло не має рівної творчої
      влади. Народна легенда працює інакше: вона бере болючий досвід світу і
      пояснює його через коротку сцену, де чорт наслідує, псує або заважає.

      Саме тому це не проста казкова вигадка. У такій оповіді є народна
      теодицея: спроба пояснити, чому в доброму Божому світі є страждання,
      нерівність, хвороба або важка праця. Етіологічний механізм полягає в
      тому, що видима річ отримує моральну історію: тварина служить людині,
      рослина має знак, зорі стають пам'яттю про милосердя.

      Релігійна межа потрібна для чесності. Легенда може спиратися на
      християнські образи, але не замінює канон, проповідь або богословський
      трактат. Джерельна пересторога така сама важлива: короткий фрагмент з
      публічної сторінки чи шкільного переказу не можна видавати за весь
      корпус народних легенд.

      Сучасний сенс такого читання в тому, що воно дозволяє поважати українську
      усну спадщину без романтизації. Ми бачимо не "темноту", а складну мову,
      якою громада говорила про зло, милосердя, свято і видимий світ.
    rubric:
      - criteria: Жанрове розрізнення
        description: Пояснено відмінність між легендою, догматом і казкою.
      - criteria: Пояснення зла
        description: Показано, як легенда пояснює зло або страждання.
      - criteria: Механізм
        description: Названо апокрифічний, етіологічний або функціональний механізм.
      - criteria: Джерельна межа
        description: Відокремлено короткий фрагмент, повний текст, переказ і коментар.
      - criteria: Релігійна чутливість
        description: Не подано народну легенду як церковне вчення.
      - criteria: Сучасний сенс
        description: Пояснено, чому тема важлива для читання української культури.

  - type: performance
    title: Переказати без доктринальної претензії
    instruction: Підготуй усний переказ мотиву народної легенди.
    prompt: >-
      Стисло перекажи мотив про святого, рослину, тварину, зорі або чорта.
      Почни з формули "за переказом" або "люди розповідали", назви видимий
      знак і заверши реченням, яке відокремлює легенду від церковного вчення.
    fragment: за переказом
    self_check:
      - Я не видаю легенду за догмат.
      - "Я називаю видимий знак: рослину, тварину, зорі, свято або місце."
      - Я не додаю повний текст із пам'яті.
      - Я пояснюю моральну функцію мотиву.
      - Я не висміюю віру і не романтизую страх.
    show_record_button: false
    model_answer: >-
      За переказом, видимий знак у природі може нагадувати про людський
      вчинок: милосердя, жадібність, страх або допомогу. Такий переказ не є
      церковним ученням, але показує, як народна уява бачила моральний лад у
      природі.

  - type: ritual-sequencing
    title: Джерельна дисципліна для легенди
    instruction: Упорядкуй кроки відповідального читання легенди.
    steps:
      - Назвати жанр як легенду, переказ, апокрифічну оповідь, шкільний текст або авторську обробку.
      - Визначити, чи є повний текст, короткий фрагмент, переказ або науковий коментар.
      - Перевірити, чи не подається народна оповідь як церковний догмат.
      - З'ясувати, який видимий знак пояснює текст.
      - Відокремити культурне значення від історичного або природничого доказу.
      - Сформулювати висновок без зверхності й без романтизації.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Відповідальне читання починається з жанру й джерельного статусу. Далі
      треба провести релігійну межу, визначити знак, який пояснює легенда,
      відокремити культурний сенс від доказу і тільки після цього формулювати
      висновок.

  - type: motif-formula
    title: Етичні перестороги
    instruction: Знайди формули, які захищають від романтизації традиції.
    passage: >-
      Народна легенда може берегти милосердя, шанування свята і надію на
      справедливість. Але вона може переносити страх, підозру або суворе
      покарання. Її треба читати з повагою і тверезістю.
    formulas:
      - text: повага без лакування
        label: головна позиція
        explanation: Традиція цінна, але не кожний її мотив автоматично справедливий.
      - text: страх перед чужим
        label: ризик
        explanation: Легенда може передавати підозру до людей або груп, яких громада не розуміла.
      - text: гендерна пересторога
        label: ризик
        explanation: Деякі заборони могли контролювати жіночу поведінку через страх.
      - text: сміх проти зла
        label: сила
        explanation: Чорт у комічній пастці допомагає зменшити страх перед злом.
      - text: милосердя як знак
        label: сила
        explanation: Етіологічна легенда може перетворити добрий вчинок на небесну або природну пам'ять.
      - text: межа висновку
        label: джерельність
        explanation: Один фрагмент не представляє весь корпус легенд.
    prompt: Чому повага до народної легенди потребує етичної перевірки?
    model_answer: >-
      Етична перевірка потрібна тому, що народна традиція жива й суперечлива.
      Вона може берегти милосердя, пам'ять і гідність, але може також
      передавати страхи або упередження. Повага означає читати уважно, а не
      повторювати все без розрізнення.
