- lemma: народна легенда
  translation: folk legend; oral prose narrative with a truth posture and a marvel
  pos: словосполука
  usage: Народна легенда пояснює видимий світ через моральну історію.
- lemma: народне християнство
  translation: folk Christianity; popular Christian imagination and practice
  pos: словосполука
  usage: Народне християнство не збігається з церковним ученням, але виростає в християнській культурі.
- lemma: двовір'я
  translation: coexistence of Christian and older religious motifs in one cultural field
  pos: іменник
  usage: Двовір'я треба читати як складне переплетення, а не як просту помилку.
- lemma: синкретизм
  translation: blending of elements from different religious or cultural systems
  pos: іменник
  usage: Синкретизм у легенді не стирає місцевої української конкретики.
- lemma: апокриф
  translation: noncanonical text on a biblical theme
  pos: іменник
  usage: Апокриф може дати народній легенді яскраву сюжетну сцену.
- lemma: апокрифічний
  translation: related to noncanonical biblical storytelling
  pos: прикметник
  usage: Апокрифічний мотив переходить у легенду через усне переказування.
- lemma: етіологічний
  translation: explaining the origin of a phenomenon
  pos: прикметник
  usage: Етіологічний сюжет пояснює, чому рослина або тварина має певну ознаку.
- lemma: теодицея
  translation: attempt to explain evil in a world under a good God
  pos: іменник
  usage: Народна теодицея говорить про зло через коротку легендарну сцену.
- lemma: дуалізм
  translation: worldview built around two opposing principles
  pos: іменник
  usage: Дуалізм у легенді не завжди означає віру в двох рівних творців.
- lemma: богомильство
  translation: medieval dualist religious movement associated with the Balkans
  pos: іменник
  usage: Богомильство важливе як можливий контекст частини дуалістичних мотивів.
- lemma: функціональна заміна
  translation: transfer or convergence of a function from one figure to another
  pos: словосполука
  usage: Функціональна заміна потребує конкретного джерела, а не загальної схеми.
- lemma: переосмислення
  translation: reinterpretation; giving an older element a new meaning
  pos: іменник
  usage: Переосмислення точніше описує легенду, ніж механічна заміна.
- lemma: локалізація
  translation: localization of a sacred or narrative image in a local setting
  pos: іменник
  usage: Локалізація святого переносить образ у поле, дорогу або село.
- lemma: канон
  translation: official religious or literary norm
  pos: іменник
  usage: Канон має інший статус, ніж народна легенда.
- lemma: неканонічний
  translation: outside the official canon
  pos: прикметник
  usage: Неканонічний сюжет може бути культурно важливим, навіть якщо не є церковною нормою.
- lemma: житіє
  translation: saint's life; hagiographic narrative
  pos: іменник
  usage: Житіє і народна легенда можуть перетинатися, але мають різний режим мовлення.
- lemma: чудо
  translation: miracle; marvelous event
  pos: іменник
  usage: Чудо в легенді є поворотом, який відкриває моральний порядок.
- lemma: чудесний
  translation: miraculous or marvelous
  pos: прикметник
  usage: Чудесний знак у легенді часто прив'язаний до видимого місця.
- lemma: переказ
  translation: oral tradition or retelling, often closer to historical memory
  pos: іменник
  usage: Переказ ближчий до історичної пам'яті, а легенда частіше тримає чудесне.
- lemma: билиця
  translation: witness-like tale told as something that happened
  pos: іменник
  usage: Билиця наполягає на тому, що подія нібито справді сталася.
- lemma: бувальщина
  translation: tale of something that supposedly happened
  pos: іменник
  usage: Бувальщина може перейти в легенду, коли отримує ширше моральне пояснення.
- lemma: першоджерело
  translation: primary source
  pos: іменник
  usage: Першоджерело треба відрізняти від переказу й наукового коментаря.
- lemma: джерельний статус
  translation: source status; the kind and reliability of a source witness
  pos: словосполука
  usage: Джерельний статус визначає, як сміливо можна цитувати текст.
- lemma: побожність
  translation: piety; devotional disposition
  pos: іменник
  usage: Народна побожність робить святого близьким до щоденного життя.
- lemma: обрядова уява
  translation: ritual imagination
  pos: словосполука
  usage: Обрядова уява пояснює, чому певний день або дія має особливу вагу.
- lemma: святий
  translation: saint; holy figure
  pos: іменник
  usage: Святий у легенді може бути заступником у дорозі або полі.
- lemma: заступник
  translation: intercessor; protector
  pos: іменник
  usage: Миколай у народній легенді часто діє як швидкий заступник.
- lemma: святковий календар
  translation: liturgical and folk festive calendar
  pos: словосполука
  usage: Святковий календар допомагає зрозуміти народну функцію святих.
- lemma: аграрний рік
  translation: agricultural year
  pos: словосполука
  usage: Аграрний рік впливає на те, як легенда читає весну, жнива і худобу.
- lemma: видимий знак
  translation: visible sign used as proof or memory in a legend
  pos: словосполука
  usage: Видимий знак завершує легенду і робить її доказовою для слухача.
- lemma: локальний доказ
  translation: local proof, such as a place, name, or object
  pos: словосполука
  usage: Локальний доказ може бути криницею, деревом, брамою або горою.
- lemma: моральна космологія
  translation: moral cosmology; worldview linking moral action and the shape of the world
  pos: словосполука
  usage: Моральна космологія легенди перетворює зорі на пам'ять про милосердя.
- lemma: демонізація
  translation: demonization; turning a figure into an evil spirit
  pos: іменник
  usage: Демонізація старших образів могла відбуватися в християнському переосмисленні.
- lemma: амбівалентність
  translation: ambivalence; coexistence of value and danger
  pos: іменник
  usage: Амбівалентність традиції вимагає поваги без ідеалізації.
- lemma: релігійна чутливість
  translation: religious sensitivity in interpretation
  pos: словосполука
  usage: Релігійна чутливість не дозволяє подавати легенду як догмат.
