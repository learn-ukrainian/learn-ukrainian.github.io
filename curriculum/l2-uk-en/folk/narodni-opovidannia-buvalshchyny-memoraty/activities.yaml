inline:
  - id: act-1
    type: motif-formula
    title: Формули довіри
    instruction: Визнач, як коротка оповідь переконує слухача, що подія варта уваги.
    passage: >-
      Бувальщина не доводить подію архівно. Вона називає свідка, місце, час,
      порушену межу, знак після події і правило, яке лишилося в громаді.
    formulas:
      - text: сам бачив
        label: особистий досвід
        explanation: Формула наближає текст до меморату, бо авторитет іде від пережитого.
      - text: старі люди казали
        label: передана пам'ять
        explanation: Оповідь спирається на авторитет старших і тривале повторення.
      - text: у нашому селі
        label: локальна опора
        explanation: Місце робить подію ближчою і придатною для перевірки через пам'ять громади.
      - text: після того
        label: наслідок
        explanation: Знак або зміна поведінки перетворює випадок на соціальне знання.
      - text: не ходи
        label: поведінкова формула
        explanation: Стискає оповідь до правила, яке слухач має запам'ятати.
    prompt: Які дві формули найсильніше відрізняють меморат від переказаної бувальщини?
    model_answer: >-
      Меморат найсильніше відрізняють формули "сам бачив" і "після того".
      Перша ставить особистий досвід у центр довіри, а друга показує, що
      пережите мало наслідок і стало аргументом для слухача.

  - id: act-2
    type: ritual-sequencing
    title: Джерельний паспорт малої прози
    instruction: Упорядкуй кроки відповідального читання бувальщини або меморату.
    steps:
      - "Назвати оповідну позицію: свідок, родич свідка, сусід, старші люди або невідоме \"казали\"."
      - Визначити місце й час, які роблять подію локально переконливою.
      - Знайти порушену межу або вразливість, із якої починається небезпека.
      - Відокремити мотив від поведінкового висновку.
      - "Перевірити джерельний статус: запис, видання, словник, енциклопедія чи літературна обробка."
      - Сформулювати висновок із межею доказу, без сенсаційності й без зневаги.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Спершу треба зрозуміти, хто говорить і де розміщено подію. Потім
      визначають порушену межу, мотив і практичний висновок. Лише після
      перевірки джерельного статусу можна формулювати обережний висновок.

  - id: act-3
    type: variant-comparison
    title: Оповідна позиція
    instruction: Порівняй, як змінюється довіра залежно від того, хто говорить.
    prompt: Яка позиція найближча до меморату, а яка найближча до повір'я?
    variants:
      - label: Я сам бачив
        text: Оповідач ставить власний досвід як головну підставу довіри.
        source: рамка меморату
      - label: Моїй бабі сталося
        text: Подія вже переказана через родинну пам'ять, але свідок ще близький.
        source: родинна бувальщина
      - label: Старі люди казали
        text: Авторитет іде від громади й тривалого повторення, не від одного свідка.
        source: усна традиція
      - label: Так не роблять
        text: Сюжет майже зник, лишилося правило або заборона.
        source: повір'я чи поведінкова формула
    features:
      - близькість свідка
      - сила локальної пам'яті
      - наявність сюжету
      - межа доказу
    model_answer: >-
      Найближча до меморату позиція "я сам бачив", бо довіра тримається на
      особистому переживанні. Найближча до повір'я позиція "так не роблять",
      бо там сюжет майже згорнуто до правила.

  - id: act-4
    type: motif-formula
    title: Межа без сенсації
    instruction: Визнач, як говорити про мотиви без зневаги й без легковірності.
    passage: >-
      У бувальщині домовик, русалка, вовкулака, скарб або чорт важливі не як
      доказ існування істоти, а як спосіб розповісти про дім, воду, межу,
      чужий достаток, страх і правило поведінки.
    formulas:
      - text: мотив
        label: оповідний вузол
        explanation: Повторюваний образ або ситуація, через які текст пояснює небезпеку.
      - text: функція
        label: соціальна робота
        explanation: "Те, що оповідь робить для громади: попереджає, пояснює, пам'ятає."
      - text: межа доказу
        label: чесний висновок
        explanation: Не дозволяє подавати мотив як перевірений факт.
      - text: повага
        label: без зневаги
        explanation: Не перетворює локальну оповідь на "темноту" або предмет насмішки.
      - text: критичність
        label: без романтизації
        explanation: Не приймає соціальну підозру або надприродне пояснення як готову істину.
    prompt: Як одним реченням пояснити мотив русалки або домовика відповідально?
    model_answer: >-
      Варто сказати: у цій оповіді мотив русалки або домовика працює як спосіб
      говорити про небезпечний простір, пам'ять і правило поведінки, а не як
      доказ фактичного існування істоти.

workbook:
  - id: act-5
    type: critical-analysis
    title: Не "лише забобон"
    target_text: Бувальщини про нечисту силу — це тільки забобони, тому їх не варто читати уважно.
    prompt: Розбери тезу так, щоб зберегти критичну межу і не знецінити народну оповідь.
    questions:
      - Чому ця теза може здаватися сучасною і раціональною?
      - Що вона втрачає в соціальній функції бувальщини?
      - Які практичні знання може приховувати моторошний мотив?
      - Чому критична межа все одно потрібна?
      - Як переписати тезу точніше?
    model_answers:
      - Вона відмовляється приймати надприродне як перевірений факт.
      - Вона не бачить, що оповідь може передавати правила поведінки, страхи, пам'ять і локальну мову.
      - За мотивом можуть стояти небезпека води, нічної дороги, чужого багатства, смерті або соціальної підозри.
      - Без межі легко прийняти надприродне пояснення чи несправедливу підозру за істину.
      - Точніше сказати, що бувальщина не є доказом надприродного, але є важливим джерелом народної пам'яті й норм.

  - id: act-6
    type: variant-comparison
    title: Сусідні жанри
    instruction: Порівняй, що змінюється між легендою, переказом, бувальщиною, меморатом і повір'ям.
    prompt: Які дві форми найчастіше плутають із бувальщиною?
    variants:
      - label: Легенда
        text: Сильніше тримається чуда, походження або сакрального пояснення.
        source: жанрова межа
      - label: Переказ
        text: Ближчий до історичної пам'яті про подію, героя, місце або громаду.
        source: жанрова межа
      - label: Бувальщина
        text: Коротка неказкова оповідь, подана як те, що нібито сталося.
        source: неказкова проза
      - label: Меморат
        text: Особиста або безпосередньо засвідчена оповідь про незвичайний досвід.
        source: фахова аналітична назва
      - label: Повір'я
        text: Правило або твердження про світ, яке може існувати без розгорнутого сюжету.
        source: народне уявлення
    features:
      - наявність свідка
      - роль чуда
      - зв'язок з історичною пам'яттю
      - наявність правила
      - межа доказу
    model_answer: >-
      Бувальщину найчастіше плутають із легендою і переказом. Від легенди її
      відрізняє сильніша установка на життєвий випадок, а від переказу -
      менший центр на великій історичній події або герої.

  - id: act-7
    type: ritual-sequencing
    title: Від моторошного досвіду до правила
    instruction: Упорядкуй типову побудову бувальщини.
    steps:
      - "З'являється привід для розповіді: місце, смерть, хвороба, нічний звук або заборона."
      - Оповідач називає свідка чи джерело довіри.
      - Подія прив'язується до місця і часу.
      - Людина порушує межу або стає вразливою.
      - "Виникає незвичайний мотив: голос, світло, істота, скарб, втрата дороги."
      - Після події лишається наслідок або знак.
      - Громада формулює правило поведінки.
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    model_answer: >-
      Бувальщина починається з приводу й довіри до джерела, далі називає
      місце, межу і мотив. Наслідок робить подію переконливою, а правило
      пояснює, навіщо її повторюють.

  - id: act-8
    type: comparative-study
    title: Запис, словник чи літературна обробка
    instruction: Порівняй, що дозволяє кожний тип джерела.
    items_to_compare:
      - Фольклорний запис у збірнику з місцем, варіантом і роллю збирача.
      - Словникова стаття, яка засвідчує слово і коротке значення.
      - Енциклопедичне визначення жанру або кола народних уявлень.
      - Літературна новела з автором, композицією і художньою редакцією.
    criteria:
      - що можна цитувати
      - що можна узагальнювати
      - де є голос оповідача
      - де потрібна межа доказу
      - чи можна вважати джерело фольклорним записом
    prompt: Чому літературну новелу не можна цитувати як народний меморат?
    model_answer: >-
      Літературна новела має автора, композицію і редакційну історію. Вона
      може використовувати локальний голос або фольклорний мотив, але не є
      записом усної оповіді свідка. Для меморату потрібна оповідна позиція
      особистого або безпосередньо засвідченого досвіду.

  - id: act-9
    type: performance
    title: Переказати з межею
    instruction: Підготуй короткий усний аналіз умовної бувальщини без удаваної цитати.
    prompt: >-
      Візьми умовну схему: хтось уночі почув голос біля криниці, пішов на
      поклик, злякався і після того люди стали обходити місце. За 60-90 секунд
      поясни, де тут свідок, місце, порушена межа, мотив, наслідок і межа
      доказу.
    fragment: "Це навчальна схема, не дослівний запис."
    self_check:
      - Я не видаю схему за фольклорну цитату.
      - Я називаю мотив і функцію окремо.
      - Я не доводжу фактичне існування надприродного.
      - Я не знецінюю страх або локальну пам'ять.
      - Я завершую обережним висновком.
    show_record_button: false
    model_answer: >-
      Це навчальна схема, не дослівний запис. Свідок тут не названий, тому
      довіра слабша, ніж у мемораті. Криниця і ніч створюють межовий простір,
      поклик є мотивом небезпеки, а хвороба або страх після події стає
      наслідком. Висновок має бути обережний: така схема показує, як оповідь
      перетворює небезпечне місце на правило поведінки.

  - id: act-10
    type: essay-response
    title: Бувальщина як школа короткої прози
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому бувальщина або меморат важливі для
      розуміння української усної словесності й переходу до літературної малої
      прози. Обов'язково назви оповідну позицію, місце, мотив, поведінковий
      висновок і джерельну межу.
    min_words: 260
    model_answer: >-
      Бувальщина і меморат важливі не тому, що вони доводять надприродне, а
      тому, що показують, як коротка усна оповідь створює довіру. У мемораті
      оповідна позиція тримається на формулі "я сам бачив" або "зі мною
      сталося". У бувальщині свідок може бути непрямим: сусід, родич або старі
      люди. В обох випадках слухач оцінює не лише мотив, а й близькість
      джерела.

      Місце робить оповідь переконливою. Хата, стайня, криниця, ліс, поле,
      межа або цвинтар не є просто декораціями. Вони показують, де громада
      бачила небезпеку і як пов'язувала простір із поведінкою. Мотив може бути
      моторошним: голос біля води, домовик у хаті, скарбовий вогонь, відьомська
      шкода або вовкулака. Але відповідальний аналіз питає не тільки "що
      з'явилося?", а й "яке правило лишилося?". Часто висновок простий:
      не ходи, не бери, не смійся, не відповідай, слухай старших, бережи межу.

      Джерельна межа потрібна тому, що без конкретного запису не можна
      вигадувати народний голос. Літературна новела може перегукуватися з
      бувальщиною, але не є фольклорним меморатом. Саме тому бувальщина є
      школою короткої прози: вона вчить стислості, локальній деталі, напрузі
      свідчення і моральному удару, які пізніше розвиває українська мала
      літературна форма.
    rubric:
      - criteria: Оповідна позиція
        description: Описується, чия розповідь і в якому куті подано факт.
        points: 2
      - criteria: Місце і мотив
        description: Вказується простір, час і умови, в яких подія набирає значення.
        points: 2
      - criteria: Поведінковий висновок
        description: Описує, як текст скеровує подальшу поведінку учасників події.
        points: 2
      - criteria: Місток до літератури
        description: Показано, як бувальщина/меморат пов'язаний із пізнішою прозовою формою.
        points: 2
      - criteria: Джерельна межа
        description: Є чітке розмежування між оповідною позицією і довірою до факту.
        points: 2
