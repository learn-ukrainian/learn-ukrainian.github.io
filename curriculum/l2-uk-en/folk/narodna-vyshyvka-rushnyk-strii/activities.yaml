version: "1.0"
module: narodna-vyshyvka-rushnyk-strii
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Три слова, три межі
    instruction: Розрізни поняття за предметом, дією і культурною функцією.
    prompt: Чому вишивка, рушник і стрій не є взаємозамінними назвами?
    variants:
      - label: Вишивка
        text: Техніка і знакова робота голки, нитки, шва, орнаменту й фактури.
        source: дія і спосіб творення
      - label: Рушник
        text: Полотно, яке може бути побутовим, хатнім, іконним, весільним, подарунковим або поминальним.
        source: предмет і обрядова функція
      - label: Стрій
        text: >-
          Повний порядок убрання: сорочка, поясний одяг, верхній одяг, головний
          убір, взуття і спосіб носіння.
        source: тіло і соціальна граматика
    features:
      - матеріал
      - дія
      - місце в домі або на тілі
      - регіональна норма
      - обрядова функція
    model_answer: >-
      Вишивка називає техніку й орнаментальну дію, рушник називає окремий
      предмет із побутовими та обрядовими режимами, а стрій називає цілісний
      комплекс убрання. Якщо ці слова змішати, зникає різниця між швом,
      полотном і тілесною нормою.

  - id: act-2
    type: motif-formula
    title: Мотив має межу
    instruction: Прочитай мотиви як обережний інвентар, а не як універсальний словник.
    passage: |-
      дерево життя
      ромб або ромби з крапками
      рожа
      хміль і виноград
      орли
    formulas:
      - text: дерево життя
        label: вісь і ріст
        explanation: Мотив можна читати як деревоподібну композицію, але не як доказ однієї незмінної міфологеми.
      - text: ромб або ромби з крапками
        label: геометрія і засів
        explanation: Ромб має сильне символічне поле, але потребує предмета, регіону й джерела.
      - text: рожа
        label: розета і центр
        explanation: Рожа може бути квітковою, солярною або композиційною формою залежно від зразка.
      - text: хміль і виноград
        label: рослинний орнамент
        explanation: Рослинний мотив треба називати конкретно, а не ховати під словом "узор".
      - text: орли
        label: птахи в письмовій сцені
        explanation: Орли засвідчені як мотив у літературному фрагменті про рушник, але не пояснюють усю систему.
    prompt: Як говорити про символіку без готового словника значень?
    model_answer: >-
      Треба називати сам мотив, предмет, регіон або дію, у якій він працює.
      Дерево, ромб, рожа, хміль, виноград і орли можуть мати символічну вагу,
      але їхнє значення не однакове на рушнику, сорочці, у музейному зразку
      чи сучасному виробі.

  - id: act-3
    type: ritual-sequencing
    title: Рушник у весільній дії
    instruction: Упорядкуй можливу весільну логіку без твердження, що вона однакова всюди.
    steps:
      - Підготувати або вибрати вишитий рушник із відомою родинною чи локальною історією.
      - У сватанні подати або прийняти рушники як знак згоди там, де це засвідчено звичаєм.
      - Використати рушник для перев'язування або вшанування учасників, якщо цього вимагає локальна практика.
      - Покласти коровай або хліб на тканину в почесному весільному режимі.
      - Поставити пару на рушник у шлюбній дії, якщо така дія належить до конкретного обряду.
      - Зберегти рушник після події як родинну пам'ятну річ.
      - Назвати цю послідовність локальною або засвідченою, а не всеукраїнським законом.
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    model_answer: >-
      Весільний рушник працює через підготовку, згоду, дарування, хліб або
      коровай, стояння пари й пізніше збереження. Останній крок потрібний,
      бо локальні обряди різні: одна послідовність не може автоматично
      представляти всю Україну.

workbook:
  - type: critical-analysis
    title: Не один словник символів
    instruction: Виправ тезу так, щоб вона не підміняла джерело красивою схемою.
    target_text: Кожен знак на рушнику має одне давнє значення для всієї України.
    prompt: Що в цій тезі занадто сильне і як сформулювати її точніше?
    questions:
      - Чому слово "кожен" створює проблему?
      - "Що змінює предмет: рушник, сорочка, намітка чи кептар?"
      - Чому регіон і дата важливі?
      - Як не втратити символіку, але не вигадати її?
      - Яка точніша теза можлива?
    model_answers:
      - Воно приписує одну семантику всім мотивам, регіонам і часам.
      - Той самий мотив може працювати інакше на рушнику, сорочці або головному уборі.
      - Регіон, техніка, період і функція речі змінюють межу тлумачення.
      - Треба назвати мотив і можливе символічне поле, а потім показати джерельну межу.
      - Орнамент має символічні нашарування, але значення мотиву залежить від предмета, регіону, техніки й обрядової ситуації.

  - type: comparative-study
    title: Регіон не стає каноном
    instruction: Порівняй регіональні опори без перетворення однієї школи на норму для всіх.
    items_to_compare:
      - "Полтавщина: біле шиття, гладь, мережка, вирізування, тональна міра і фактура."
      - "Поділля: ширше поле монохромних чорних вишивок без неперевіреної легенди про походження кольору."
      - "Гуцульщина: кептар, постоли, поліхромна геометрія, поєднання тканини, шкіри, вовни й металу."
      - "Полісся: лляна основа, стримана геометрія, архаїчні форми, личаки і локальна складність."
      - "Буковина: металеві нитки, лелітки, шовк, вовна і складний матеріальний контакт."
    criteria:
      - техніка
      - матеріали
      - предмети строю
      - ризик стереотипу
      - що треба уточнити за зразком
    prompt: Чому одна впізнавана сорочка або регіональна школа не може представляти всю Україну?
    model_answer: >-
      Кожний регіон має власну логіку матеріалів, швів, кольору і силуету.
      Полтавська біла гладь, подільська чорна вишивка, гуцульський кептар,
      поліська стриманість і буковинські блискучі матеріали не замінюють одне
      одного. Для аналізу потрібні конкретний зразок, дата, предмет і техніка.

  - type: critical-analysis
    title: Берегиня як обережний ярлик
    instruction: Перепиши тезу так, щоб вона не робила популярну інтерпретацію історичним доказом.
    target_text: Будь-яка жіноча фігура у вишивці є давньою богинею Берегинею.
    prompt: Як сформулювати обережніше?
    questions:
      - Чому "будь-яка" є проблемою?
      - Що може означати сучасний ярлик "берегиня"?
      - Якого доказу бракує для твердження про давню богиню?
      - Як зберегти повагу до мотиву без перебільшення?
    model_answers:
      - Воно переносить одну інтерпретацію на всі антропоморфні або деревоподібні мотиви.
      - Це може бути сучасна назва для певного жіночого або охоронного мотиву.
      - Потрібні незалежні історичні й етнографічні джерела для конкретного зразка.
      - Можна сказати, що мотив має охоронне або родинне поле в сучасному читанні, але історичну семантику треба перевіряти.

  - type: critical-analysis
    title: Що доводить фрагмент про рушник?
    instruction: Оціни силу короткого літературного прикладу.
    target_text: На образах рушники, шиті орлами та хмелем.
    prompt: Що цей фрагмент доводить, а чого не доводить?
    questions:
      - Який простір названо?
      - Яку техніку названо?
      - Які мотиви названо конкретно?
      - Чому це не повний опис обряду?
      - Як використати фрагмент обережно?
    model_answers:
      - Фрагмент називає образи, тобто хатній сакральний простір.
      - Він називає шиття як техніку, а не лише прикрашання.
      - Орли й хміль подані як конкретні мотиви.
      - Фрагмент не описує повного обряду і не пояснює всі рушники.
      - Його слід використовувати як доказ присутності предмета, техніки й мотиву в письмовій сцені.

  - type: critical-analysis
    title: Радянська фольклоризація без спрощення
    instruction: Виправ тезу так, щоб вона не применшувала й не перебільшувала тиск.
    target_text: У радянський час народна вишивка або повністю зникла, або спокійно зберігалася без змін.
    prompt: Як сказати точніше?
    questions:
      - Чому обидві крайності неточні?
      - Що могли підтримувати радянські інституції?
      - Що могли контролювати або спотворювати?
      - Як оцінювати конкретну річ?
      - Яка збалансована теза можлива?
    model_answers:
      - Традиція не зникла повністю, але й не жила поза ідеологічним тиском.
      - Майстерні, навчання, виробництво і частину технік.
      - Сюжети, ескізи, сценічну норму, політичну тематику й авторство майстрині.
      - За технікою, локальною школою, авторством, функцією і контекстом створення.
      - Радянська інфраструктура могла підтримувати виробництво й водночас підпорядковувати народне мистецтво ідеології.

  - type: essay-response
    title: Річ, шов і пам'ять
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому українську народну вишивку не можна
      звести ні до вишиванки як сучасного символу, ні до універсального
      словника орнаментів. Використай щонайменше три опори: техніку шва,
      рушник як обрядову річ, стрій як систему тіла, регіональну варіантність,
      радянську фольклоризацію або сучасну етику дизайну.
    min_words: 260
    model_answer: >-
      Українську народну вишивку не можна звести тільки до вишиванки, бо
      сорочка є лише одним предметом ширшої системи. Вишивка живе на рушниках,
      намітках, кептарях, хустках, церковних і хатніх тканинах, а кожний
      предмет має власну функцію. Рушник може бути побутовою тканиною,
      божником, весільною або поминальною тканиною; його значення задає не сам
      орнамент, а дія, місце і джерело. Коли рушник лежить під хлібом, висить
      біля образів або супроводжує шлюбну дію, він працює інакше, ніж сорочка
      на тілі чи намітка на голові.

      Так само вишивку не можна читати як універсальний словник. Дерево життя,
      ромб, рожа, хміль чи орли можуть мати символічну вагу, але значення
      залежить від регіону, техніки й предмета. Полтавська мережка і біла
      гладь, подільська чорна вишивка, гуцульський кептар, поліська лляна
      стриманість і буковинські лелітки не складаються в один канон. Їх треба
      описувати окремо: матеріал, шов, колір, дата, майстриня, спосіб носіння
      або місце в хаті змінюють читання мотиву. Один ромб на рушнику, сорочці
      чи головному уборі не автоматично означає те саме.

      У XX столітті радянська фольклоризація могла підтримувати майстерні,
      навчання і виробництво, але водночас контролювала сюжети, ескізи,
      сценічний образ і політичну мову народного мистецтва. Тому просте
      твердження про безперервне збереження без тиску так само неточне, як
      теза про повне зникнення традиції. Сьогодні вишиванка може бути сильним
      знаком української видимості й спротиву, але етичний жест потребує
      знання походження, техніки, майстрині або локальної школи. Інакше
      традиція перетворюється на декоративний знак без відповідальності.
      Обережне читання не применшує краси: воно показує, чому краса пов'язана
      з працею рук, пам'яттю родини, місцем речі й чесним називанням джерела.
      Найкраще читання починається з конкретної речі, шва і пам'яті, а не з
      готового гасла чи красивої схеми.
