inline:
  - id: act-1
    type: variant-comparison
    title: Романтика і примус
    instruction: Порівняй три способи пояснювати суспільно-побутову пісню.
    prompt: Чому жодна позиція не може сама пояснити весь макроцикл?
    variants:
      - label: Романтична дорога
        text: Чумацький або козацький рух можна читати як простір волі, честі, товариського ладу й широкого степу.
        source: Костомарівська інтерпретація чумацького матеріалу
      - label: Соціальний примус
        text: Бурлак, наймит, кріпак, рекрут і заробітчанин часто говорять із досвіду залежності, приниження або вимушеного відриву.
        source: Шкільна та енциклопедична класифікація соціально-побутових пісень
      - label: Джерельна позиція
        text: Романтику й біль треба перевіряти через конкретний підцикл, рядок, назву, джерело й межу висновку.
        source: Метод читання модуля
    features:
      - що пояснює позиція
      - що вона перебільшує
      - який доказ потрібен
      - як вона читає дорогу
    model_answer: >-
      Романтична позиція добре бачить честь, простір і товариський лад, але
      може згладити злидні. Соціальна позиція добре бачить примус, наймитство і
      чужину, але може недооцінити красу форми й гідність голосу. Джерельна
      позиція тримає обидва виміри через конкретний підцикл і доказ.

  - id: act-2
    type: motif-formula
    title: Воли, вози, пам'ять
    instruction: Прочитай короткі перевірені чумацькі формули як карту промислу й смерті.
    passage: |-
      Воли мої половії, хто над вами паном буде.
      Бери мої вози-воли - поминай мене.
    formulas:
      - text: Воли мої половії
        label: господарський світ
        explanation: Воли є не декорацією, а основою чумацького промислу й адресатом турботи.
      - text: хто над вами паном буде
        label: страх після смерті
        explanation: Питання переносить думку від дороги до майбутньої відсутності чумака.
      - text: вози-воли
        label: майно і пам'ять
        explanation: Передання речей товаришеві стає способом залишити по собі пам'ять.
    prompt: Поясни, чому предмети в чумацькому фрагменті працюють як емоційні вузли.
    model_answer: >-
      Воли й вози не просто називають професію чумака. Вони показують усе,
      чим трималося його життя в дорозі. Коли чумак думає, хто буде над
      волами паном, або просить поминати його через вози-воли, предмети
      стають пам'яттю про працю, небезпеку і смерть у чужій стороні.

  - id: act-3
    type: critical-analysis
    title: Не зводь бурлака до чужого образу
    target_text: Українська бурлацька пісня - це просто різновид російського волзького сюжету про тягар судна.
    instruction: Знайди слабке місце тези і перепиши її українсько-джерельно.
    prompt: Чому таке твердження звужує український жанровий матеріал?
    questions:
      - Яке слово в тезі створює редукцію?
      - Які українські простори й соціальні ролі вона стирає?
      - Як сформулювати точніше?
    model_answers:
      - Слово "просто" стирає українську жанрову специфіку.
      - Теза стирає Дніпро, Дунай, Дністер, Чорне море, риболовецькі артілі, чумацькі промисли, бездомність і найману працю далеко від дому.
      - Точніше сказати, що українська бурлацька пісня має власний простір бездомної найманої праці й не зводиться до одного російського волзького образу.

workbook:
  - id: act-4
    type: critical-analysis
    title: Яку силу має фрагмент у Костомарова?
    instruction: >-
      Оціни джерельний режим перевіреного чумацького рядка, який Микола
      Костомаров подає як науковий коментатор XIX століття.
    target_text: Ой чумаче, чумаче, в тебе личко козаче.
    prompt: Чому цей рядок є сильним доказом мотиву, але слабким доказом повного тексту?
    questions:
      - Що цей рядок дозволяє сказати про козацький відблиск у чумацькому образі?
      - Чому його не можна видати за повний польовий запис?
      - Яку межу треба назвати перед аналізом?
    model_answers:
      - Фрагмент дозволяє сказати, що в чумацькому образі працює козацький відблиск.
      - Це рядок у науковому коментарі Костомарова, а не самостійна польова картка з паспортом запису.
      - Його треба читати як наукове свідчення мотиву, а не як повний корпусний текст.

  - id: act-5
    type: comparative-study
    title: Козак, чумак, рекрут
    instruction: Порівняй три соціальні ролі без злиття їх в одну військово-дорожню тему.
    items_to_compare:
      - Козак у поході як голос спільноти, честі, дороги й побратимського гумору.
      - Чумак у валці як промисловий мандрівник із волами, возами, отаманом і ризиком смерті.
      - Рекрут або жовнір як людина примусової служби, проводів, материнського плачу й чужини.
    criteria:
      - причина руху
      - соціальний статус
      - головний образ
      - емоційний режим
    prompt: Чому саме причина руху допомагає не переплутати ці підцикли?
    model_answer: >-
      Козак може йти в похід як учасник військової спільноти; чумак рушає в
      небезпечний промисел; рекрут або жовнір часто вирваний із дому
      примусовою службою. Усі троє пов'язані з дорогою, але причина руху
      змінює значення дороги: честь, заробіток і примус не є одним і тим самим.

  - id: act-6
    type: critical-analysis
    title: Радянська телеологія
    target_text: Заробітчанські пісні важливі передусім тому, що вони були попередниками робітничих пісень.
    instruction: Оціни тезу, яка зводить жанр до підготовки іншого жанру.
    prompt: Що можна зберегти з цієї тези, а що треба переписати?
    questions:
      - Який реальний історичний перехід теза помічає?
      - Чому слово "передусім" спотворює жанр?
      - Як переписати тезу без радянської телеології?
    model_answers:
      - Теза помічає перехід до мануфактур, цукроварень, шахт і модерної найманої праці.
      - '"Передусім" робить заробітчанську пісню лише сходинкою до робітничого канону й стирає її власний голос.'
      - Точніше сказати, що заробітчанські пісні фіксують наймитство, відхожі промисли, еміграцію й втрату дому, а частина їхніх мотивів згодом перетинається з робітничою тематикою.

  - id: act-7
    type: comparative-study
    title: Голос мандрівника у світі
    instruction: Порівняй українські соціальні пісні дороги з іншими традиціями без ототожнення.
    items_to_compare:
      - Українська чумацька пісня як голос промислу, валки, волів, степу й ризику смерті.
      - Ірландська емігрантська балада як голос від'їзду, океану й пам'яті про дім.
      - Американська ковбойська пісня як голос дороги, праці, простору й самотності.
    criteria:
      - соціальна роль мовця
      - причина руху
      - образ простору
      - межа аналогії
    prompt: Чому корисно порівнювати пісні дороги, але небезпечно робити з них один універсальний архетип?
    model_answer: >-
      Порівняння корисне, бо різні культури мають пісні про дорогу, працю,
      самотність і відрив від дому. Але українська чумацька пісня має власну
      валку, волів, отамана, степ і зв'язок із козацькою пам'яттю; ірландська
      балада має інший еміграційний горизонт; ковбойська пісня має іншу
      професійну й історичну сцену. Аналогія допомагає тільки тоді, коли не
      стирає конкретність.

  - id: act-8
    type: essay-response
    title: Дорога як свобода і втрата
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, як суспільно-побутові пісні одночасно можуть
      романтизувати дорогу і показувати її як примус або втрату. Обов'язково
      назви два підцикли, один перевірений фрагмент або назву, один образ і
      одну джерельну межу.
    min_words: 260
    model_answer: >-
      Суспільно-побутові пісні не дають однієї відповіді на питання про
      дорогу. У козацькому підциклі дорога може звучати як рух спільноти:
      "Ой на горі да женці жнуть" відкриває сцену походу, де пейзаж і військо
      входять у спільний ритм. Тут є честь, порядок, гумор і пам'ять про
      козацьку волю. У чумацькому підциклі дорога також має простір і лад:
      валка, воли, вози, отаман, степ. Але перевірений фрагмент "Воли мої
      половії, хто над вами паном буде" показує інший бік: чумак думає про
      смерть у дорозі й про те, хто догляне його волів. Той самий образ дороги
      стає і свободою промислу, і загрозою втрати.

      Якщо перейти до рекрутських або наймитських пісень, романтика ще більше
      слабне. Рекрутська дорога часто означає примусову службу, материнський
      плач і чужину. Наймитський шлях веде до чужого двору й залежності від
      хазяїна. Тому дорогу треба читати через соціальну роль: козак, чумак,
      рекрут і наймит ідуть не з однакових причин.

      Джерельна межа також важлива. Корпусно перевірений рядок можна
      аналізувати як фрагмент; рядок у Костомарова треба назвати науковим
      свідченням; еміграційні назви можна використовувати як орієнтир лише за
      назвою, але не цитувати з пам'яті. Саме така обережність
      дає змогу побачити і красу дороги, і її соціальну ціну.
    rubric:
      - criteria: Підцикли
        description: Названо принаймні два різні підцикли.
      - criteria: Образ
        description: Образ дороги або предмета пов'язано з соціальною роллю.
      - criteria: Джерело
        description: Є чітка межа між фрагментом, науковим свідченням і назвою.
      - criteria: Баланс
        description: Есе не зводить тему ні до романтики, ні до злиднів.
