- id: act-1
  type: quiz
  title: Чий це режим доказу?
  instruction: Обери найточніше читання кожної тези.
  items:
    - question: Що найкраще описує голосіння в цьому модулі?
      options:
        - Будь-який сумний спів або плач.
        - Ритуалізовану похоронну мову втрати з формулами й адресатами.
        - Лише літературний прийом у княжих текстах.
      correct: 1
      explanation: Голосіння належить до похоронно-поминальної обрядової ситуації й має впорядковану форму.
    - question: Чому літописний плач не можна автоматично назвати етнографічним голосінням?
      options:
        - Бо книжний текст може містити топос або риторичну форму, а не польовий запис обряду.
        - Бо давньокиївські тексти не мають жодного зв'язку з плачевою традицією.
        - Бо всі літописи завжди вигадують похорони.
      correct: 0
      explanation: Літературний плач може наслідувати голосінний регістр, але його джерельний режим інший.
    - question: Яка теза найкраще тримає гендерну обережність?
      options:
        - Жіночі голосіння доводять природну слабкість жінок.
        - Жінки в джерелах часто виконують публічну ритуальну мову втрати.
        - Чоловіки ніколи не були присутні на похороні.
      correct: 1
      explanation: Джерела говорять про розподіл ритуальних ролей, а не про природну слабкість.
    - question: Що означає мала кількість записів голосінь?
      options:
        - Жанр був другорядний і майже не існував.
        - Запис був складний через страх, заборони, момент виконання і ритуальні межі.
        - Усі тексти втрачено через одну пізню редакцію.
      correct: 1
      explanation: Умови фіксації не можна плутати із силою побутування жанру.
    - question: Яке порівняння з весільним плачем є точним?
      options:
        - Весільний і похоронний плач мають однаковий обрядовий сенс.
        - Обидва працюють із переходом, але весілля змінює статус живих, а голосіння проводить померлого в пам'ять.
        - Похоронне голосіння є просто сумною частиною весілля.
      correct: 1
      explanation: Спільною є логіка переходу, але межа і незворотність різні.

- id: act-2
  type: reading
  title: Порожнє місце і темна хата
  source: Грушевський, записи голосінь зі Снятинщини та Лубенщини
  passage: |
    Тут то твоє місце порожне,
    Тут то твоя ложечка стоїть,
    Синочку мій дорогий, синочку мій!

    Моя щіпочка одщіпнулася,
    Моє яблучко одкотилося,
    Моя маківка осталася!

    Якої ти темної хати забажав,
    Темної-невидної,
    Смутної-невеселої?
  questions:
    - Назви річ або простір, через які кожен уривок показує втрату.
    - Поясни, чому пестливі форми тут не є просто прикрасою.
    - Сформулюй один обережний висновок і одну межу доказу.

- id: act-3
  type: source-evaluation
  title: Що може довести етнографічний фрагмент?
  instruction: Оціни, яку силу має короткий запис голосіння і де треба зупинити висновок.
  source_metadata:
    author: Михайло Грушевський як публікатор і коментатор фольклорного матеріалу
    date: початок XX століття
    type: етнографічний запис / наукова публікація
    context: похоронно-поминальні голосіння, подані з локальними опорами
  source_text: |
    Ти то нам паску-дари покроїв,
    Ти то нам до церкви відніс.
  guiding_questions:
    - Які родинні дії названо у фрагменті?
    - Що цей фрагмент дозволяє сказати про пам'ять за померлим?
    - Чого він не дозволяє стверджувати про всі українські похорони?
  criteria:
    - Конкретні дії
    - Зв'язок свята, церкви і відсутності
    - Межа доказу
  model_evaluation: >-
    Фрагмент дозволяє говорити, що пам'ять у голосінні тримається на конкретних
    родинних діях: син різав паску й ніс її до церкви. Втрата тому означає не
    тільки емоційний біль, а й порушення святкового порядку дому. Але два рядки
    не доводять універсального сценарію для всіх регіонів і не замінюють опису
    повного похоронного обряду.

- id: act-4
  type: comparative-study
  title: Обрядовий плач і літературний топос
  items_to_compare:
    - Етнографічне голосіння матері або вдови
    - Літературний плач у давньокиївському чи пізнішому книжному тексті
  criteria:
    - Джерельний режим
    - Адресат
    - Виконавець або наратор
    - Межа доказу
  prompt: >-
    Напиши 110-150 слів: як обидва тексти можуть мати плачевий регістр, але
    чому їх не можна аналізувати як один і той самий тип джерела?
  model_answer: >-
    Етнографічне голосіння прив'язане до обрядової ситуації: смерть, тіло,
    родина, могила, поминальний день, виконавиця. Його адресатом є померлий або
    померлі родичі, а сила доказу залежить від запису, регіону й моменту
    виконання. Літературний плач може мати споріднену інтонацію, звертання,
    риторичні питання і ліричну скорботу, але він працює всередині книжного
    твору. Там є наратор, композиція, топос, перекладацька або авторська воля.
    Тому літературний плач допомагає бачити місток до голосінного регістру, але
    не замінює етнографічного голосіння.

- id: act-5
  type: critical-analysis
  title: Сильна теза чи джерельне перебільшення?
  target_text: >-
    Голосіння є найдавнішою українською поезією, тому кожний літописний плач і
    кожна сумна пісня прямо походять із похоронного обряду.
  instruction: >-
    Теза звучить привабливо, бо підкреслює давність і вагу жанру, але змішує
    обрядовий запис, літературний топос і загальний емоційний регістр.
  prompt: Чому ця теза слабка і як її переписати обережніше?
  questions:
    - Чому ця теза слабка і як її переписати обережніше?
    - Які три різні явища змішано в тезі?
    - Яку частину твердження можна зберегти?
    - Де потрібна межа доказу?
  model_answers:
    - >-
      У тезі змішано похоронне голосіння як обрядовий жанр, літературний плач
      як топос і будь-яку сумну пісню. Зберегти можна думку, що голосіння є
      давньою і важливою формою української усної поезії. Обережніше: голосіння
      має старі ритуальні риси й вплинуло на плачеві регістри літератури, але
      кожний конкретний літописний або пісенний текст треба аналізувати за його
      власним джерельним режимом.

- id: act-6
  type: essay-response
  title: Голосіння як право на пам'ять
  instruction: Напиши коротке доказове есе українською.
  prompt: >-
    Обери один мотив із модуля: порожнє місце, ложечка, щіпочка, темна хата,
    прохання до предків, вдовина порада або жіночий ритуальний голос. Поясни,
    як цей мотив показує голосіння як мову родинної пам'яті, і назви межу
    доказу.
  min_words: 200
  rubric:
    - criteria: Джерело
      description: Названо конкретний мотив або короткий фрагмент.
      points: 2
    - criteria: Аналіз
      description: Пояснено, як мотив працює в обряді, а не лише переказано зміст.
      points: 3
    - criteria: Гендер і роль
      description: Якщо згадано виконавицю, уникнуто мови слабкості або стереотипу.
      points: 2
    - criteria: Межа доказу
      description: Чітко сказано, чого фрагмент не доводить без інших джерел.
      points: 3
  model_answer: >-
    Сильна відповідь може взяти мотив порожнього місця. У снятинському фрагменті
    родина говорить до сина через місце за столом і ложечку. Це показує, що
    пам'ять у голосінні не абстрактна: вона тримається на речах і діях, де
    померлий був присутній у родинному порядку. Ложечка стоїть, але людина не
    сідає до столу; тому річ стає знаком відсутності. Голосіння не просто
    повідомляє про сум, а дозволяє родині публічно назвати розрив. Межа доказу
    така: цей фрагмент дозволяє говорити про поминальну пам'ять у конкретному
    записі, але не описує всі регіональні похоронні практики України.
