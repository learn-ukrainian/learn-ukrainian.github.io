- lemma: 谐芯谢芯褋褨薪薪褟
  ipa: /搔蓴l蓴藞s什in什藧蓱/
  translation: ritual lament
  pos: noun
  usage: 袚芯谢芯褋褨薪薪褟 锌芯褦写薪褍褦 斜褨谢褜, 褎芯褉屑褍谢褍 褨 锌芯褏芯褉芯薪薪褍 写褨褞.
- lemma: 谐芯谢芯褋褨谢褜薪懈褑褟
  ipa: /搔蓴l蓴藞s什il什n瑟ts什蓱/
  translation: female lament performer
  pos: noun
  usage: 袚芯谢芯褋褨谢褜薪懈褑褟 屑芯卸械 斜褍褌懈 褉芯写懈褔泻芯褞 邪斜芯 胁锌褉邪胁薪芯褞 褔褍卸芯褞 卸褨薪泻芯褞.
- lemma: 锌谢邪褔泻邪
  ipa: /藞pl蓱t蕛k蓱/
  translation: professional mourner
  pos: noun
  usage: 袩谢邪褔泻邪 胁懈泻芯薪褍褦 锌芯褏芯褉芯薪薪懈泄 锌谢邪褔 褍 屑械卸邪褏 芯斜褉褟写芯胁芯褩 褉芯谢褨.
- lemma: 蟹邪锌谢邪褔泻懈
  ipa: /z蓱藞pl蓱t蕛k瑟/
  translation: laments
  pos: plural noun
  usage: 袟邪锌谢邪褔泻懈 褦 褋褍屑褨卸薪芯褞 薪邪蟹胁芯褞 芯斜褉褟写芯胁懈褏 锌谢邪褔褨胁.
- lemma: 褌褍卸褨薪薪褟
  ipa: /tu藞蕭in什藧蓱/
  translation: ritual mourning
  pos: noun
  usage: 孝褍卸褨薪薪褟 薪邪蟹懈胁邪褦 胁锌芯褉褟写泻芯胁邪薪械 胁懈褋谢芯胁谢械薪薪褟 卸邪谢褞.
- lemma: 锌芯褏芯褉芯薪
  ipa: /p蓴x蓴藞r蓴n/
  translation: funeral
  pos: noun
  usage: 袩芯褏芯褉芯薪 锌械褉械胁芯写懈褌褜 胁褌褉邪褌褍 胁 锌褍斜谢褨褔薪褍 褉芯写懈薪薪褍 写褨褞.
- lemma: 锌芯屑懈薪泻懈
  ipa: /p蓴藞m瑟nk瑟/
  translation: commemorative meal
  pos: plural noun
  usage: 袩芯屑懈薪泻懈 锌褨写褌褉懈屑褍褞褌褜 锌邪屑'褟褌褜 锌褨褋谢褟 锌芯褏芯褉芯薪褍.
- lemma: 锌芯屑懈薪邪薪薪褟
  ipa: /p蓴m瑟藞n蓱n什藧蓱/
  translation: commemoration of the dead
  pos: noun
  usage: 袩芯屑懈薪邪薪薪褟 锌芯胁械褉褌邪褦 锌芯屑械褉谢芯谐芯 写芯 褋胁褟褌泻芯胁芯谐芯 泻邪谢械薪写邪褉褟 褉芯写懈薪懈.
- lemma: 褉械褔懈褌邪褌懈胁
  ipa: /r蓻t蕛瑟t蓱藞t瑟w/
  translation: recitative
  pos: noun
  usage: 袪械褔懈褌邪褌懈胁 锌褉懈褋褌芯褋芯胁褍褦 屑械谢芯写褨褞 写芯 薪械褉褨胁薪芯谐芯 褉褟写泻邪.
- lemma: 邪锌芯褋褌褉芯褎邪
  ipa: /蓱p蓴藞str蓴f蓱/
  translation: apostrophe; direct address
  pos: noun
  usage: 袗锌芯褋褌褉芯褎邪 蟹胁械褉褌邪褦褌褜褋褟 写芯 锌芯屑械褉谢芯谐芯 褟泻 写芯 褋锌褨胁褉芯蟹屑芯胁薪懈泻邪.
- lemma: 褉懈褌芯褉懈褔薪械 锌懈褌邪薪薪褟
  ipa: /r瑟t蓴藞r瑟t蕛n蓻 p瑟藞t蓱n什藧蓱/
  translation: rhetorical question
  pos: noun phrase
  usage: 袪懈褌芯褉懈褔薪械 锌懈褌邪薪薪褟 锌褨写褌褉懈屑褍褦 褉芯蟹屑芯胁褍 褌邪屑, 写械 胁褨写锌芯胁褨写褜 薪械屑芯卸谢懈胁邪.
- lemma: 褋懈薪褌邪泻褋懈褔薪懈泄 锌邪褉邪谢械谢褨蟹屑
  ipa: /s瑟nt蓱k藞s瑟t蕛n瑟j p蓱r蓱l蓻藞l什izm/
  translation: syntactic parallelism
  pos: noun phrase
  usage: 小懈薪褌邪泻褋懈褔薪懈泄 锌邪褉邪谢械谢褨蟹屑 褌褉懈屑邪褦 褎芯褉屑褍 谐芯谢芯褋褨薪薪褟.
- lemma: 锌械褋褌谢懈胁邪 褎芯褉屑邪
  ipa: /p蓻st藞l瑟w蓱 藞f蓴rm蓱/
  translation: diminutive or affectionate form
  pos: noun phrase
  usage: 袩械褋褌谢懈胁邪 褎芯褉屑邪 薪邪蟹懈胁邪褦 斜谢懈蟹褜泻褨褋褌褜 褨 褉芯写懈薪薪褍 褑褨薪薪褨褋褌褜.
- lemma: 褌芯锌芯褋
  ipa: /藞t蓴p蓴s/
  translation: literary topos
  pos: noun
  usage: 孝芯锌芯褋 锌谢邪褔褍 屑芯卸械 蟹'褟胁谢褟褌懈褋褟 胁 谢褨褌芯锌懈褋褨 邪斜芯 锌芯械屑褨.
- lemma: 谢褨褌械褉邪褌褍褉薪懈泄 锌谢邪褔
  ipa: /l什it蓻r蓱藞turn瑟j pl蓱t蕛/
  translation: literary lament
  pos: noun phrase
  usage: 袥褨褌械褉邪褌褍褉薪懈泄 锌谢邪褔 薪械 蟹邪胁卸写懈 褦 蟹邪锌懈褋芯屑 锌芯褏芯褉芯薪薪芯谐芯 谐芯谢芯褋褨薪薪褟.
- lemma: 写卸械褉械谢褜薪懈泄 褉械卸懈屑
  ipa: /d蕭蓻藞r蓻l什n瑟j r蓻藞蕭瑟m/
  translation: source mode
  pos: noun phrase
  usage: 袛卸械褉械谢褜薪懈泄 褉械卸懈屑 锌芯泻邪蟹褍褦, 褟泻 褋邪屑械 芯褌褉懈屑邪薪芯 褌械泻褋褌.
- lemma: 屑械卸邪 写芯泻邪蟹褍
  ipa: /藞m蓻蕭蓱 d蓴藞k蓱zu/
  translation: evidentiary limit
  pos: noun phrase
  usage: 袦械卸邪 写芯泻邪蟹褍 薪械 写芯蟹胁芯谢褟褦 褍蟹邪谐邪谢褜薪褞胁邪褌懈 芯写懈薪 褎褉邪谐屑械薪褌 薪邪 胁褋褞 褌褉邪写懈褑褨褞.
- lemma: 褌械屑薪邪 褏邪褌邪
  ipa: /藞t蓻mn蓱 藞x蓱t蓱/
  translation: dark house; grave image
  pos: noun phrase
  usage: 孝械屑薪邪 褏邪褌邪 锌械褉械薪芯褋懈褌褜 芯斜褉邪蟹 屑芯谐懈谢懈 胁 写芯屑邪褕薪褞 锌褉芯褋褌芯褉芯胁褍 屑芯胁褍.
- lemma: 褉芯写芯胁械 屑褨褋褑械
  ipa: /r蓴藞d蓴w蓻 藞m什ists蓻/
  translation: ancestral place
  pos: noun phrase
  usage: 袪芯写芯胁械 屑褨褋褑械 写芯锌芯屑邪谐邪褦 褍褟胁懈褌懈 锌褉懈泄薪褟褌褌褟 锌芯屑械褉谢芯谐芯 锌褉械写泻邪屑懈.
- lemma: 锌芯褏芯褉芯薪-胁械褋褨谢谢褟
  ipa: /p蓴x蓴藞r蓴n w蓻藞s什il什藧蓱/
  translation: funeral-wedding ritual code
  pos: noun phrase
  usage: 袩芯褏芯褉芯薪-胁械褋褨谢谢褟 锌芯褌褉械斜褍褦 泻芯薪泻褉械褌薪芯谐芯 写卸械褉械谢邪 褨 薪械 褦 斜褍泻胁邪谢褜薪懈屑 褕谢褞斜芯屑.
