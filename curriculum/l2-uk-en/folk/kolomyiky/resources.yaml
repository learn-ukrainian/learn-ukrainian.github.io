- title: Коломийки
  type: reference
  role: article
  url: https://uk.wikisource.org/wiki/Категорія:Коломийки
  notes: Зовнішній жанровий орієнтир у Вікіджерелах; не замінює атрибутований уривок із видання Володимира Гнатюка в хрестоматії.
- title: Коломийки
  type: primary
  role: reading
  url: https://www.ukrlib.com.ua/narod/printout.php?bookid=1&id=3
  notes: Публічна добірка для самостійного огляду тем, дотепу і строфічної стислості; у цьому уроці використана як зовнішнє читання, не як окремий повний текст.
- title: Тіні забутих предків
  type: primary
  role: reading
  url: https://www.ukrlib.com.ua/books/printit.php?tid=1055
  notes: Літературний свідок короткої гуцульської співанки в прозі Коцюбинського; читати як літературну пам'ять голосу, не як польовий запис коломийок.
- title: Нарис історії культури України
  type: scholarly
  role: article
  url: http://litopys.org.ua/popovych/narys05.htm
  notes: Контекст для ширшої традиції розміру на чотирнадцять складів і обережної регіональної рамки; окремий рядок у модулі подано як науковий свідок.
