inline:
  - id: act-1
    type: variant-comparison
    title: Пісня, танець, строфа
    instruction: Порівняй три способи назвати коломийку і визнач межу кожного способу.
    prompt: Чому жодна з трьох назв не пояснює коломийку повністю?
    variants:
      - label: Пісня
        text: Коломийка є короткою співаною строфою, яку можна виконувати самостійно або вплітати у в'язанку.
        source: Жанрова дефініція коломийки
      - label: Танець
        text: Коломийка зберігає танцювальний зв'язок із колом, темпом, рухом і публічною грою.
        source: Виконавський контекст
      - label: Строфа
        text: Коломийкова форма спирається на два рядки по чотирнадцять складів із паузою після восьмого.
        source: Коломийковий вірш
    features:
      - що пояснює назва
      - що вона залишає поза увагою
      - який доказ потрібен
      - як вона допомагає читати текст
    model_answer: >-
      Назва "пісня" пояснює голос і самостійне виконання, але не завжди
      показує танцювальний імпульс. Назва "танець" пояснює рух і коло, але
      може звести жанр до сцени. Назва "строфа" пояснює ритм, проте сама
      форма ще не дорівнює жанру. Коломийка тримає всі три виміри разом.

  - id: act-2
    type: motif-formula
    title: Пауза після восьмого
    instruction: Прочитай стилізований рядок як власну вправу, а не як народний текст.
    passage: |-
      Слухай ритм короткий, // потім дай відповідь.
      Образ хай почнеться, // думка хай влучить.
    formulas:
      - text: Слухай ритм короткий
        label: перша хвиля
        explanation: Початок задає темп і готує паузу.
      - text: потім дай відповідь
        label: поворот після цезури
        explanation: Друга частина має завершити або змінити очікування.
      - text: Образ хай почнеться
        label: зачин
        explanation: Перший рух може бути образом, який просить людського завершення.
    prompt: Поясни, чому цезура після восьмого складу є смисловою, а не лише технічною паузою.
    model_answer: >-
      Цезура створює очікування: перша частина рядка відкриває рух, а
      друга мусить відповісти. У коломийці ця пауза допомагає зробити
      поворот швидким і влучним, тому ритм одразу працює на зміст.

  - id: act-3
    type: critical-analysis
    title: Що можна цитувати
    instruction: Оціни, який режим доказу має кожний матеріал.
    target_text: |-
      1. Публічна добірка коломийок із конкретним публічним посиланням.
      2. Науковий приклад рядка, наведений у розмові про розмір.
      3. Співанка в прозі Коцюбинського.
      4. Відомий жартівливий початковий рядок без ясної публікації.
    prompt: Поясни, який режим доказу має кожний матеріал і де треба назвати межу цитування.
    questions:
      - Чи можна подавати як народний текст?
      - Чи є це радше науковим або літературним свідком?
      - Чи можна робити висновок про весь жанр?
      - Яку межу треба назвати перед аналізом?
    model_answers:
      - Публічна добірка може бути зовнішнім ресурсом, але її треба читати з увагою до походження тексту.
      - Науковий приклад підтверджує форму або тезу дослідника, а не весь корпус.
      - Коцюбинський дає літературне свідчення співанкової форми.
      - Відомий початковий рядок без ясної публікації краще назвати мотивом або не використовувати.

  - id: act-4
    type: critical-analysis
    title: Не кожний розмір є жанром
    target_text: Кожний народнопісенний рядок із чотирнадцятьма складами треба називати коломийкою.
    instruction: Розбери тезу і знайди її слабке місце.
    prompt: Проаналізуй, чому метр є потрібною підказкою, але не достатньою жанровою ознакою.
    questions:
      - Що в тезі правильно помічено?
      - Чому самого метра недостатньо для жанрової назви?
      - Які додаткові ознаки потрібні для коломийки?
    model_answers:
      - Теза правильно помічає важливість народнопісенного розміру на чотирнадцять складів.
      - Сам розмір може траплятися в інших пісенних жанрах і в літературній стилізації.
      - Потрібні дворядкова строфа, співаність, зв'язок із коломийковою традицією, виконавська ситуація і джерельна атрибуція.

workbook:
  - id: act-5
    type: comparative-study
    title: Коломийка і хайку
    instruction: Порівняй дві малі форми без ототожнення.
    items_to_compare:
      - Українська коломийка як співана дворядкова строфа з танцювальним відблиском.
      - Японське хайку як коротка поетична форма спостереження.
      - Власне обережне порівняння малих форм.
    criteria:
      - обсяг
      - зв'язок із голосом або письмом
      - роль ритму
      - межа аналогії
    prompt: Чому корисно порівнювати малі форми, але небезпечно називати коломийку прямим аналогом хайку?
    model_answer: >-
      Порівняння корисне, бо показує, що короткий текст може бути складним.
      Але коломийка має власну співану, танцювальну, ритмічну й українську
      традицію, а хайку має іншу історію форми. Аналогія допомагає тільки
      тоді, коли не стирає конкретності.

  - id: act-6
    type: performance
    title: Власна строфа і джерело
    instruction: Створи або прочитай коротку строфу, але перед виконанням чітко назви її статус.
    prompt: Скажи "це моя стилізація" або назви реальне джерело, якщо читаєш опублікований текст.
    fragment: |-
      Це моя стилізація:
      Стисла пісне, дай же голос,
      щоб думка не згасла.
    self_check:
      - Чи названо, що це власна стилізація або реальне джерело?
      - Чи не подано вправу як народний текст?
      - Чи чути короткий ритмічний рух, а не довгу декламацію?
    show_record_button: true
    model_answer: >-
      Коректне виконання починається з джерельного статусу. Якщо це власна
      стилізація, її не можна видавати за народну коломийку. Якщо текст
      джерельний, треба назвати публікацію або посилання.

  - id: act-7
    type: critical-analysis
    title: Екзотизація регіону
    target_text: Коломийка цікава тільки як гуцульська екзотика для сцени.
    instruction: Перепиши тезу так, щоб зберегти регіональну вагу без зменшення жанру.
    prompt: Поясни, як говорити про карпатську вагу жанру без екзотизації.
    questions:
      - Що ця теза помічає правильно?
      - Чому слово "тільки" спотворює жанр?
      - Як сказати точніше?
    model_answers:
      - Теза правильно бачить карпатський і сценічний вимір коломийки.
      - '"Тільки" стирає самостійну пісенну строфу, ширше українське побутування, соціальну сатиру і літературний вплив.'
      - Точніше сказати, що коломийка має сильний карпатський і танцювальний вимір, але водночас є українською короткою пісенною формою з ширшим культурним життям.

  - id: act-8
    type: essay-response
    title: Мала форма, велика робота
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому коломийка не є "дрібним жанром".
      Обов'язково назви одну формальну ознаку, одну ситуацію виконання,
      одну тему і одну джерельну межу.
    min_words: 260
    model_answer: >-
      Коломийка не є дрібним жанром, хоча її класична форма справді дуже
      коротка. Саме ця короткість робить її вимогливою. Два рядки по
      чотирнадцять складів із паузою після восьмого мусять утримати ритм,
      інтонацію і поворот думки. У танцювальному колі така строфа звучить
      не лише як текст, а як частина руху й публічної гри. Поза танцем вона
      може бути самостійною реплікою або входити у в'язанку.

      Тематично коломийка не зводиться до жарту про кохання. Вона може
      говорити про залицяння, домашні конфлікти, виснажливу працю,
      рекрутчину, панський гніт або людську пиху. Сміх у такому жанрі часто
      є способом швидко назвати соціальну ситуацію. Тому коротка форма не
      применшує думку, а ущільнює її.

      Водночас потрібна джерельна межа. Публічну добірку можна читати як
      зовнішній ресурс; науковий приклад треба називати науковим свідком;
      літературну співанку у Коцюбинського не можна видавати за польовий
      запис. Коли ці межі видимі, коломийка постає не як випадкова
      "пісенька", а як українська школа стислого, ритмічного й соціально
      уважного мовлення.
    rubric:
      - criteria: Форма
        description: Названо 14 складів, цезуру або дворядковість.
      - criteria: Виконання
        description: Є танець, коло, самостійний спів або в'язанка.
      - criteria: Тема
        description: Тему не зведено лише до веселого жарту.
      - criteria: Джерело
        description: Розрізнено народний текст, науковий приклад, літературний свідок або посилання.
      - criteria: Міра
        description: Немає екзотизації або перебільшення.
