version: "1.0"
module: dytiachyi-folklor-kolyskovi
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Хто говорить і для чого?
    instruction: Порівняй жанри за виконавською ситуацією, а не за довжиною тексту.
    prompt: Чому колискова й лічилка належать до одного поля, але працюють по-різному?
    variants:
      - label: Колискова
        text: Дорослий голос у повільному ритмі заспокоює конкретну дитину й бажає їй сну, росту та здоров'я.
        source: родинний режим
      - label: Забавлянка
        text: Коротка формула поєднується з дотиком, рухом, паузою й очікуваною реакцією дитини.
        source: контактний режим
      - label: Лічилка
        text: Дитяча група приймає ритмічну процедуру, щоб розподілити ролі або чергу в грі.
        source: груповий режим
      - label: Скоромовка
        text: Учасник тренує звук, темп і самоконтроль через повтор і можливу комічну помилку.
        source: мовна гра
      - label: Дражнилка
        text: Коротка рима має конкретну мішень, тому потребує етичної межі перед виконанням.
        source: соціальний ризик
    features:
      - хто виконує
      - кому адресовано
      - який рух або правило супроводжує текст
      - що має статися після формули
      - чи безпечно виконувати дослівно
    model_answer: >-
      Ці жанри належать до дитячого фольклору, бо працюють із дитячим віком,
      але мають різні ситуації. Колискова заспокоює одну дитину в родинному
      режимі, забавлянка поєднує слово з дотиком, лічилка організовує групу,
      скоромовка тренує звук, а дражнилка потребує критичної межі через
      конкретну мішень.

  - id: act-2
    type: motif-formula
    title: Формула сну й росту
    instruction: Розбери коротку перевірену колискову формулу як побажання розвитку.
    passage: >-
      Перевірена коротка колискова формула бажає дитині росту, здоров'я,
      доброго розуму і спокійного сну.
    formulas:
      - text: побажання росту
        label: тіло
        explanation: Побажання росту прив'язує майбутній розвиток до тілесної міцності.
      - text: побажання здоров'я
        label: здоров'я
        explanation: Лагідна форма переносить побажання здоров'я в образ серця.
      - text: добрий розум
        label: розум
        explanation: Колискова бажає не лише сну, а й доброго майбутнього мислення.
      - text: спокійний сон
        label: сон
        explanation: Сон і дрімота подані як бажаний стан, що має прийти до очей дитини.
      - text: пестливі назви
        label: пестливість
        explanation: Зменшено-пестливі форми створюють м'який регістр близького голосу.
    prompt: Чому цю формулу не треба розгортати у вигаданий повний текст колискової?
    model_answer: >-
      Перевірена формула дозволяє аналізувати побажання росту, здоров'я, розуму
      й сну, але не доводить повного тексту пісні. Джерельна дисципліна вимагає
      цитувати тільки підтверджений фрагмент, а ширші мотиви пояснювати
      переказом.

  - id: act-3
    type: ritual-sequencing
    title: Як працює забавлянка
    instruction: Упорядкуй контактну сцену, де слово пов'язане з рухом і реакцією дитини.
    steps:
      - Дорослий привертає увагу дитини голосом або поглядом.
      - Промовляє коротку ритмічну формулу.
      - Супроводжує слова рухом долонь, пальців, ніг або голови.
      - Робить паузу, щоб дитина очікувала продовження.
      - Дитина відповідає поглядом, рухом, звуком або сміхом.
      - Формула повторюється з малою варіацією або тим самим жестом.
    correct_order: [0, 1, 2, 3, 4, 5]
    model_answer: >-
      Забавлянка не є лише текстом. Її послідовність тримається на увазі,
      ритмічній формулі, жесті, паузі, реакції й повторі. Саме тому вона
      працює як рання мовно-тілесна взаємодія.

workbook:
  - type: critical-analysis
    title: Лічилка як процедура справедливості
    target_text: Лічилка важлива тільки тому, що в ній є рахунок.
    prompt: Поясни, чому лічилка є ще й соціальним механізмом дитячої групи.
    questions:
      - Хто визнає результат лічилки?
      - Чому нісенітні склади не руйнують її функцію?
      - Як ритм указування зменшує конфлікт про роль?
      - Чому формула "так випало" важлива для групи?
      - Яку точнішу тезу можна сформулювати?
    model_answers:
      - Результат визнає дитяча група, бо всі бачили й чули процедуру.
      - Нісенітні склади можуть добре тримати ритм, навіть якщо не мають прозорого значення.
      - Указування на кожному такті робить вибір процедурним, а не особистою примхою.
      - Формула переносить відповідальність із окремої дитини на спільно прийняте правило.
      - Лічилка є мовною процедурою вибору, а не лише вправою на рахунок.

  - type: critical-analysis
    title: Дражнилка без відтворення шкоди
    instruction: Оціни старий матеріал як історичний жанр і як сучасний ризик.
    target_text: >-
      У старому записі ефект короткої дражнилки тримається на тілесній або
      груповій ознаці адресата.
    prompt: Як працювати з таким матеріалом у відповідальному уроці?
    questions:
      - Чи потрібне дослівне виконання для аналізу жанру?
      - "На кого спрямовано сміх: на дію чи на ідентичність?"
      - Чи можна пояснити механізм через парафразу?
      - Де межа між історичним описом і повторенням приниження?
      - Яку безпечнішу навчальну дію варто обрати?
    model_answers:
      - Дослівне виконання не потрібне, якщо мета полягає в аналізі механізму й ризику.
      - Якщо сміх спрямовано на ідентичність або тіло, матеріал не варто відтворювати як розвагу.
      - "Механізм можна переказати: рима чіпляє ознаку, група реагує, адресат мусить відповідати."
      - Межа проходить там, де історичне пояснення починає тиражувати образу.
      - Безпечніше аналізувати мішень, джерельний статус і різницю між грою та цькуванням.
    evaluation_criteria:
      - джерельний статус
      - етична межа
      - розрізнення дії та ідентичності

  - type: performance
    title: Скоромовка як гра з помилкою
    instruction: Відпрацюй принцип виконання без вигаданого фольклорного тексту.
    fragment: >-
      Коротка формула зі схожими звуками спершу вимовляється повільно, потім
      швидше, а помилка стає сигналом для повтору, а не для сорому.
    prompt: Поясни, чому скоромовка тренує не тільки дикцію, а й ставлення до помилки.
    self_check:
      - Я починаю повільно й не змагаюся ціною приниження.
      - Я слухаю подібні звуки й помічаю, де збивається темп.
      - Я можу повторити після помилки без сорому.
      - Я не додаю образливих імен або мішеней.
    model_answer: >-
      Скоромовка тренує фонетичну увагу, темп і артикуляцію, але також учить
      повторювати після збою. У фольклорній грі помилка може викликати сміх
      із процесу, а не приниження виконавця.

  - type: comparative-study
    title: Народне, авторське, сценічне
    instruction: Розрізни джерельні шари дитячого матеріалу.
    items_to_compare:
      - Родинна колискова або коротка перевірена формула.
      - Авторська колискова в підручнику.
      - Сценічна дитяча опера Миколи Лисенка.
      - Хорова обробка народної пісні.
      - Сучасний аудіозапис відомої виконавиці.
    criteria:
      - хто створив або зафіксував матеріал
      - чи можна цитувати текст дослівно
      - чи є це первинним фольклорним виконанням
      - яку навчальну користь має приклад
      - де потрібна атрибуція
    prompt: Чому сценічна або підручникова присутність не робить текст автоматично народним?
    model_answer: >-
      Сценічний, авторський і підручниковий матеріал може бути пов'язаний із
      фольклором, але має власний статус. Щоб назвати текст народним або
      цитувати його дослівно, потрібне джерельне підтвердження; інакше варто
      говорити про мотив, назву, обробку або навчальну паралель.

  - type: critical-analysis
    title: Цитата, мотив або назва
    instruction: Визнач, який режим дозволяє кожна джерельна ситуація.
    target_text: >-
      Відомий мотив або назва колискової не дають права автоматично
      відтворювати повний текст без перевірки.
    prompt: Як уникнути вигадування в темі колискових?
    questions:
      - Що можна подати як дослівну цитату?
      - Коли треба говорити про мотив без рядка?
      - Як позначити відому пісню, якщо її початок не підтверджено?
      - Чому пам'ять виконавця не замінює перевірку?
      - Яка практика найкраще захищає фольклорний матеріал?
    model_answers:
      - Дослівною цитатою може бути лише короткий фрагмент із підтвердженим корпусним збігом.
      - Про мотив треба говорити тоді, коли образ або функція засвідчені, а точний рядок ні.
      - Відому пісню можна назвати як слухове або підручникове покликання, не відтворюючи текст.
      - Пам'ять легко змішує варіанти й домальовує знайомі формули.
      - Найкраще цитувати менше, але точніше, і завжди позначати джерельний статус.
