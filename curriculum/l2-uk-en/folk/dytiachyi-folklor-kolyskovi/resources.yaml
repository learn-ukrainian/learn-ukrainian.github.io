- title: Дитячий фольклор і колискові
  role: reading
  url: https://uk.wikipedia.org/wiki/%D0%9A%D0%BE%D0%BB%D0%B8%D1%81%D0%BA%D0%BE%D0%B2%D0%B0
  notes: >-
    Довідкова сторінка для жанру колискової. Урок використовує її як
    орієнтир для теми присипляння й родинного голосу, але не бере з неї
    неперевірені повні тексти.
- title: Дитячий фольклор
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%94%D0%B8%D1%82%D1%8F%D1%87%D0%B8%D0%B9_%D1%84%D0%BE%D0%BB%D1%8C%D0%BA%D0%BB%D0%BE%D1%80
  notes: >-
    Довідковий жанровий орієнтир для розрізнення форм, які дорослі виконують
    для дитини, і форм, що побутують у дитячій групі.
- title: Микола Лисенко
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9B%D0%B8%D1%81%D0%B5%D0%BD%D0%BA%D0%BE_%D0%9C%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0_%D0%92%D1%96%D1%82%D0%B0%D0%BB%D1%96%D0%B9%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідка для містка до дитячої опери. Модуль згадує "Козу-Дерезу",
    "Пана Коцького" і "Зиму й Весну" як сценічний перехід, а не як
    дослівний фольклорний запис.
- title: Микола Леонтович
  role: article
  url: https://uk.wikipedia.org/wiki/%D0%9B%D0%B5%D0%BE%D0%BD%D1%82%D0%BE%D0%B2%D0%B8%D1%87_%D0%9C%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0_%D0%94%D0%BC%D0%B8%D1%82%D1%80%D0%BE%D0%B2%D0%B8%D1%87
  notes: >-
    Довідка для переходу від народної мелодики до хорової обробки й
    шкільного співу. Урок не дублює тексти пісень і не цитує пісенний текст.
