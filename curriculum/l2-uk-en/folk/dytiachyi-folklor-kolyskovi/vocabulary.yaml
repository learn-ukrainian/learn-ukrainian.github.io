- lemma: дитячий фольклор
  translation: children's folklore
  pos: словосполука
  usage: Дитячий фольклор охоплює форми для дитини й форми, що живуть у дитячій групі.
- lemma: колискова
  translation: lullaby
  pos: іменник
  usage: Колискова поєднує голос, гойдання, повтор і побажання спокійного сну.
- lemma: колиска
  translation: cradle
  pos: іменник
  usage: Колиска задає тілесний ритм, із яким пов'язана поетика присипляння.
- lemma: люлі
  translation: lullaby refrain
  pos: вигук
  usage: Люлі працює як сигнал для сну, а не як звичайне речення.
- lemma: гойдання
  translation: rocking
  pos: іменник
  usage: Гойдання синхронізує рух дорослого голосу й тіло дитини.
- lemma: забавлянка
  translation: play rhyme
  pos: іменник
  usage: Забавлянка поєднує коротку формулу з дотиком, жестом і сміхом.
- lemma: утішка
  translation: comforting rhyme
  pos: іменник
  usage: Утішка допомагає переключити дитину з плачу або страху на ритм і контакт.
- lemma: потішка
  translation: amusement rhyme
  pos: іменник
  usage: Потішка розважає дитину через повтор, рух і лагідну інтонацію.
- lemma: пестушка
  translation: nursery caress rhyme
  pos: іменник
  usage: Пестушка є суміжною назвою для форм, пов'язаних із доглядом і тілесним контактом.
- lemma: лічилка
  translation: counting-out rhyme
  pos: іменник
  usage: Лічилка розподіляє ролі в грі через ритмічну процедуру.
- lemma: дражнилка
  translation: teasing rhyme
  pos: іменник
  usage: Дражнилка має конкретну мішень, тому потребує етичної межі.
- lemma: прозивалка
  translation: name-calling rhyme
  pos: іменник
  usage: Прозивалка може римувати ім'я або ознаку, але не повинна відтворювати приниження.
- lemma: скоромовка
  translation: tongue-twister
  pos: іменник
  usage: Скоромовка тренує артикуляцію, темп і слух до подібних звуків.
- lemma: ігрова пісня
  translation: game song
  pos: словосполука
  usage: Ігрова пісня поєднує текст, мелодію, рух і зміну ролей.
- lemma: дитяча група
  translation: children's peer group
  pos: словосполука
  usage: Дитяча група визнає результат лічилки як спільне правило.
- lemma: виконавська ситуація
  translation: performance situation
  pos: словосполука
  usage: Виконавська ситуація визначає, хто говорить, кому і з якою дією.
- lemma: адресат
  translation: addressee
  pos: іменник
  usage: Адресат колискової зазвичай конкретна дитина, а адресат лічилки вся група.
- lemma: формула
  translation: formula
  pos: іменник
  usage: Формула може бути короткою, але тримати ритм, побажання або правило гри.
- lemma: мотив
  translation: motif
  pos: іменник
  usage: Мотив Сну й Дрімоти можна пояснювати без неперевіреного дослівного рядка.
- lemma: пестлива лексика
  translation: affectionate vocabulary
  pos: словосполука
  usage: Пестлива лексика створює м'який регістр близького голосу.
- lemma: зменшено-пестливий суфікс
  translation: diminutive-affectionate suffix
  pos: словосполука
  usage: Зменшено-пестливий суфікс у колисковій позначає близькість і лагідність.
- lemma: оберегова уява
  translation: protective imagination
  pos: словосполука
  usage: Оберегова уява поєднує побажання, захист і заспокоєння без обов'язкового обряду.
- lemma: персоніфікація
  translation: personification
  pos: іменник
  usage: Персоніфікація робить Сон або Дрімоту істотами, які можуть приходити до дитини.
- lemma: нісенітні склади
  translation: nonsense syllables
  pos: словосполука
  usage: Нісенітні склади в лічилці можуть добре тримати ритмічну процедуру.
- lemma: роль
  translation: role
  pos: іменник
  usage: Роль у грі часто визначається лічилкою, а не особистим рішенням.
- lemma: черга
  translation: turn
  pos: іменник
  usage: Черга в дитячій грі стає зрозумілою через спільно почуту формулу.
- lemma: артикуляція
  translation: articulation
  pos: іменник
  usage: Артикуляція в скоромовці тренується через повтор і пришвидшення.
- lemma: фонетична увага
  translation: phonetic attention
  pos: словосполука
  usage: Фонетична увага допомагає розрізняти близькі звуки в скоромовці.
- lemma: соціальна мішень
  translation: social target
  pos: словосполука
  usage: Соціальна мішень показує, на кого спрямований сміх у дражнилці.
- lemma: джерельний статус
  translation: source status
  pos: словосполука
  usage: Джерельний статус визначає, чи можна цитувати текст дослівно.
- lemma: парафраза
  translation: paraphrase
  pos: іменник
  usage: Парафраза потрібна, коли мотив відомий, але точний рядок не підтверджено.
- lemma: дослівна цитата
  translation: verbatim quotation
  pos: словосполука
  usage: Дослівна цитата в цьому модулі дозволена тільки для перевірених коротких формул.
- lemma: авторська обробка
  translation: authorial adaptation
  pos: словосполука
  usage: Авторська обробка може спиратися на фольклор, але має власний статус.
- lemma: сценічне виконання
  translation: staged performance
  pos: словосполука
  usage: Сценічне виконання не треба плутати з первинним родинним співом.
- lemma: хорова обробка
  translation: choral arrangement
  pos: словосполука
  usage: Хорова обробка переносить народну мелодику в професійний або шкільний спів.
- lemma: дитяча опера
  translation: children's opera
  pos: словосполука
  usage: Дитяча опера Лисенка творить міст між фольклорною образністю і сценою.
- lemma: мовна інфраструктура
  translation: language infrastructure
  pos: словосполука
  usage: Дитячий фольклор є мовною інфраструктурою раннього слуху й гри.
- lemma: родинний голос
  translation: family voice
  pos: словосполука
  usage: Родинний голос у колисковій поєднує турботу, ритм і побажання.
- lemma: етична межа
  translation: ethical boundary
  pos: словосполука
  usage: Етична межа підказує, коли дражнилку треба аналізувати, а не виконувати.
- lemma: варіантність
  translation: variation
  pos: іменник
  usage: Варіантність не дозволяє оголошувати одну версію колискової єдиною нормою.
