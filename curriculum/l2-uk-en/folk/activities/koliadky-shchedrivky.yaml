version: '1.0'
module: koliadky-shchedrivky
level: folk
inline:
- id: quiz
  type: quiz
  instruction: Оберіть правильне твердження щодо наукових дебатів про походження колядок.
  items:
  - question: Хто з дослідників вважав, що термін походить від латинського «calendae
      januarii»?
    options:
    - Микола Костомаров
    - Мирослав Попович
    - Павло Чубинський
    - Пітер Вільговський
    correct: 0
  - question: Яка гіпотеза пояснює колядки як результат «римсько-провінційних впливів»?
    options:
    - Південні культурні імпульси доходили живою, народною лінією
    - Термін був імпортований через Польщу у вісімнадцятому столітті
    - Це літературна стилізація кабінетних романтиків
    - Це результат офіційної дипломатії Київської Русі
    correct: 0
  - question: Що сучасні лінгвісти вважають доказом того, що це слово є автохтонним?
    options:
    - Складні фонетичні переходи та звукові зсуви
    - Наявність схожих слів у скандинавській міфології
    - Записи в літописах дев'ятнадцятого століття
    - Повна відсутність християнських мотивів
    correct: 0
  - question: Чому етнографи-романтики часто «редагували» стародавні фольклорні тексти?
    options:
    - Щоб задовольнити моральні та естетичні критерії міської публіки
    - Тому що вони не розуміли діалектних слів
    - Щоб приховати їхнє християнське походження
    - Тому що їх змушувала це робити цензура
    correct: 0
  - question: У чому полягає фундаментальна різниця між українською та російською
      зимовою обрядовістю згідно з текстом?
    options:
    - Українська модель базується на рівноправній космічній тріаді родини, а російська
      — на домінуванні патріарха-домовладики
    - Українська модель є виключно солярною, а російська — місячною
    - Українські пісні виконували лише дівчата, а російські — хлопці
    - Російська традиція зберегла давніші аграрні міфи
    correct: 0
  - question: Який соціологічний феномен часто змушував науковців дев'ятнадцятого
      століття конструювати ідеалізоване минуле?
    options:
    - Винайдення традиції для обґрунтування права нації на незалежне існування
    - Войовничий атеїзм та свідома боротьба з язичництвом
    - Багаторівневий релігійний синкретизм у суспільстві
    - Консерватизм ізольованого сільського побуту
    correct: 0
- id: reading
  type: reading
  passage: '«Коли не було знащада світа, / Даж Бог! / Тогди не було неба, ні землі,
    / Ні неба, ні землі, лем синеє море... / А серед моря та два дубойки. / Що на
    тих дубойках та два голубойки... / Голубойки радять раду, / Радять раду і говорять:
    / „Ой як би ми, брате, світ основали?“»'
  questions:
  - Який стан Всесвіту описується у перших рядках цієї колядки?
  - Ким виступають два голуби у цьому космогонічному міфі?
  - Що символізують «два дубойки» посеред синього моря?
  - Яку функцію виконує рефрен «Даж Бог!» у цьому тексті?
  - На що вказують слова «знащада» та «лем» з погляду лінгвістики?
  - Який міфологічний архетип ілюструє план голубів «світ основали»?
- id: critical-analysis
  type: critical-analysis
  prompt: 'Проаналізуйте наведене твердження з тексту лекції: «Сучасна масова культура
    часто змішує всі зимові ритуальні пісні в одну розмиту категорію різдвяних гімнів,
    хоча з наукової та етнографічної точок зору існує принципова відмінність». Як
    саме християнська церква інтегрувала автохтонні міфи у свій канон, зберігши їхню
    функцію? Наведіть приклади синкретизму з лекції.'
- id: essay-response
  type: essay-response
  prompt: Напишіть есе, у якому поясніть, як стародавня космогонія та обрядовий фольклор
    (колядки, щедрівки) трансформувалися під час повномасштабної війни в Україні.
    Чому ці архаїчні тексти знову набули функції магічного заклинання?
  min_words: 100
workbook:
- id: source-evaluation
  type: source-evaluation
  source_text: 'Гой дай Боже! / Пане господарю, на твому дворі / Райськеє деревце,
    / На тім деревці три голубоньки, / Радоньку радять, як світ снувати: / Спустимося
    на дно моря, / Винесемо дрібного піску, / Посіємо кругом світу... / Золотим дощем,
    яровим зерном.'
  criteria:
  - Наявність космогонічних мотивів
  - Символіка Світового дерева
  - Аграрна магія та засівання
  guiding_questions:
  - Як у цьому тексті поєднується міф про творення Всесвіту (макрокосм) із побажанням
    добробуту конкретному господарю (мікрокосм)?
  - Яку роль відіграють птахи і чому вони планують опуститися на дно моря?
  - Як фінальні рядки пов'язані з новорічним обрядом засівання?
- id: comparative-study
  type: comparative-study
  items_to_compare:
  - Українська колядка (Космічна тріада)
  - Російський овсень (Домовладика)
  criteria:
  - Соціальна структура родини
  - Роль жінки (сонце vs відсутність)
  - Модель влади (синергія vs деспотизм)
  prompt: Порівняйте українську та російську архаїчні моделі соціальної структури,
    закодовані у зимових обрядових піснях. Як ці фольклорні відмінності відображають
    глибинні соціокультурні розбіжності двох народів?
- id: true-false-vocab
  type: true-false
  instruction: Оцініть правильність тверджень щодо основних понять лекції.
  items:
  - statement: Світове дерево (axis mundi) — це універсальний міфологічний образ,
      що єднає три рівні Всесвіту.
    correct: true
    explanation: Світове дерево стабілізує хаос і з'єднує потойбічний, земний та небесний
      світи.
  - statement: Щедрівка — це пісня виключно християнського походження, яка прославляє
      народження Ісуса Христа.
    correct: false
    explanation: Щедрівка — це пісня новорічного циклу (Маланка, Василь), яка має
      дохристиянське аграрне коріння.
  - statement: Засівання традиційно виконували жінки та дівчата, оскільки вони уособлювали
      родючість.
    correct: false
    explanation: Засівання виконували чоловіки або хлопчики, щоб принести в дім чоловічу
      енергію сили та стійкості.
  - statement: Стилізація — це свідоме наслідування стилю іншої епохи, яке етнографи
      часто застосовували до фольклорних записів.
    correct: true
    explanation: Романтики дев'ятнадцятого століття редагували і стилізували старі
      тексти, щоб адаптувати їх для міської публіки.
  - statement: Українське слово «колядка» не має жодного стосунку до солярного циклу.
    correct: false
    explanation: Колядки нерозривно прив'язані до зимового сонцестояння (солярного
      циклу) і моменту, коли дні починають довшати.
  - statement: Автохтонний означає місцевий, корінний, той, що виник на цій території,
      а не був запозичений.
    correct: true
    explanation: Багато сучасних дослідників доводять глибоко автохтонний характер
      архаїчних мотивів українського фольклору.
- id: quiz-vocab
  type: quiz
  instruction: Оберіть правильне визначення для кожного терміна.
  items:
  - question: Що таке «космогонія»?
    options:
    - Міф або вчення про походження та створення Всесвіту
    - Наука про будову людського тіла
    - Обряд посипання зерном підлоги на добробут
    - Жанр церковного хорового співу
    correct: 0
  - question: Що в літературознавстві та фольклористиці називають «паралелізмом»?
    options:
    - Стилістичний прийом зіставлення явищ природи з життям людей
    - Повне запозичення чужого сюжету
    - Чергування чоловічих та жіночих ритуальних ролей
    - Одночасне виконання двох різних пісень
    correct: 0
  - question: Що характеризує поняття «обрядовий»?
    options:
    - Пов'язаний із виконанням ритуалу, традиційного звичаю
    - Той, що належить виключно до сучасної масової культури
    - Написаний професійним автором у дев'ятнадцятому столітті
    - Призначений лише для читання, а не для співу
    correct: 0
  - question: Який сенс вкладається в термін «солярний»?
    options:
    - Пов'язаний із сонцем, сонячним культом і циклами
    - Стосується виключно самотніх людей
    - Пов'язаний з водою та первісним океаном
    - Стосується збирання солі на морському узбережжі
    correct: 0
  - question: У чому полягає суть обряду «засівання»?
    options:
    - Це магічне розкидання зерна для забезпечення добробуту та врожаю
    - Це процес ворожіння на кавовій гущі
    - Це ритуальне спалювання сухого гілля навесні
    - Це створення нових текстів колядок
    correct: 0
  - question: Що таке «стилізація» в контексті фольклористики?
    options:
    - Штучне наслідування архаїчної мови та стилю задля естетичного ефекту
    - Точний стенографічний запис народної пісні
    - Переклад пісні з іншої мови без будь-яких змін
    - Офіційна заборона на виконання народних пісень
    correct: 0
