- title: Музей писанкового розпису
  author: Національний музей народного мистецтва Гуцульщини та Покуття імені Й. Кобринського
  role: reference
  url: https://pysanka.museum/
  notes: >-
    Офіційний сайт музею в Коломиї. Корисний для музейної рамки, майстер-класів,
    регіональних орнаментальних знаків і сучасного передавання писанкарства.
- title: Музей писанкового розпису
  author: Національний музей народного мистецтва Гуцульщини та Покуття імені Й. Кобринського
  role: reference
  url: https://tickets.hutsul.museum/cart/event?id=6283
  notes: >-
    Офіційна квиткова сторінка з короткою довідкою про історію музею, будівлю,
    колекцію, майстер-класи, Школу писанкарства й експозиційний зал.
- title: Співробітництво з міжнародними організаціями
  author: Міністерство культури та стратегічних комунікацій України
  role: reference
  url: https://mincult.gov.ua/mizhnarodna-spivpratsia/spivrobitnytstvo-z-mizhnarodnymy-orhanizatsiiamy/
  notes: >-
    Офіційна сторінка з переліком українських елементів у списках ЮНЕСКО,
    зокрема елементом "Писанка: українська традиція і мистецтво оздоблення
    яєць" за 2024 рік.
- title: Pysanka, Ukrainian tradition and art of decorating eggs
  author: UNESCO Intangible Cultural Heritage
  role: reference
  url: https://ich.unesco.org/en/RL/pysanka-ukrainian-tradition-and-art-of-decorating-eggs-02134
  notes: >-
    Офіційна сторінка ЮНЕСКО про міжнародний елемент України та Естонії. Читати
    як інституційну рамку живої спадщини, а не як заміну локальних практик.
- title: Fragile, handle with care. How Ukrainian Easter eggs are preserved
  author: Science at Risk
  role: reference
  url: https://scienceatrisk.org/story/fragile-handle-with-care
  notes: >-
    Публічний матеріал про музейне збереження, крихкість повних яєць,
    реставраційну працю, радянські втрати й музейну пам'ять. Використовувати як
    сучасне довідкове джерело, не як фольклорний текст.
- title: Pysanka, Ukrainian tradition and art of decorating eggs
  author: Heritage Crafts
  role: reference
  url: https://heritagecrafts.org.uk/craft/pysanka-ukrainian-tradition-and-art-of-decorating-eggs/
  notes: >-
    Довідка про практику в українських громадах Великої Британії, радянське
    пригнічення і діаспорне передавання. Зіставляти з українськими музейними
    джерелами.
