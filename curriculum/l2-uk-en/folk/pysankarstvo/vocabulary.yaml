  pos: іменник
  usage: Крашанка має однотонний колір і не потребує складного воскового письма.
- lemma: дряпанка
  translation: scratched decorated egg
  pos: іменник
  usage: Дряпанка виникає через вишкрябування візерунка на пофарбованій шкаралупі.
- lemma: мальованка
