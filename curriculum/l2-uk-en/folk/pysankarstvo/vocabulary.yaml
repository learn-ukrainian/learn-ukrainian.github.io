  usage: Писанкарство поєднує техніку воскового резерву, орнамент і великодню практику.
- lemma: писанка
  translation: wax-resist decorated Easter egg
  pos: іменник
  usage: Писанка зберігає попередні кольори під шаром воску.
- lemma: крашанка
