  pos: іменник
  usage: Клинець створює трикутниковий ритм на округлій поверхні яйця.
- lemma: безконечник
  translation: endless line, meander
  pos: іменник
  usage: Безконечник може бути неперервною лінією і знаком господарського побажання.
- lemma: рожа
