  pos: іменник
  usage: Орнамент на писанці організований через поля, пояси і повтори.
- lemma: мотив
  translation: motif
  pos: іменник
  usage: Мотив треба читати з урахуванням регіону й джерела.
- lemma: сорок клинців
  translation: forty wedges motif
  pos: словосполука
  usage: Сорок клинців поєднують геометричний мотив і календарно-християнське тлумачення.
- lemma: клинець
