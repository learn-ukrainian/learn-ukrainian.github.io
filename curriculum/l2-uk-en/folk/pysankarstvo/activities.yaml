version: "1.0"
module: pysankarstvo
level: folk

inline:
  - id: act-1
    type: variant-comparison
    title: Чотири назви великоднього яйця
    instruction: Розрізни предмети за технікою, а не лише за святковим контекстом.
    prompt: Чому писанка, крашанка, дряпанка і мальованка не є взаємозамінними словами?
    variants:
      - label: Писанка
        text: Орнамент пишуть воском і послідовно фарбують; прихований віск зберігає попередні кольори.
        source: восково-резервна техніка
      - label: Крашанка
        text: Яйце фарбують однотонно, без складного воскового письма.
        source: великоднє фарбування
      - label: Дряпанка
        text: Візерунок вишкрябується на вже зафарбованій поверхні.
        source: техніка зняття шару
      - label: Мальованка
        text: Яйце розмальовують фарбою; назва описує інший спосіб нанесення зображення.
        source: малювання без воскового резерву
    features:
      - спосіб появи лінії
      - роль воску
      - кількість кольорів
      - чи знак зберігається під час фарбування
      - яка межа назви потрібна
    model_answer: >-
      Ці назви розрізняють не свято, а техніку. Писанка тримається на воску і
      послідовному фарбуванні, крашанка на однотонному кольорі, дряпанка на
      вишкрябуванні, мальованка на нанесенні фарби. Якщо їх змішати, зникає
      сама логіка ремесла.

  - id: act-2
    type: motif-formula
    title: Мотив не є словником
    instruction: Прочитай мотиви як нашарування значень із джерельною межею.
    passage: |-
      сорок клинців
      безконечник
      рожа або зірка
      риба
    formulas:
      - text: сорок клинців
        label: геометрія і календар
        explanation: Трикутниковий мотив може мати християнське тлумачення, але не вичерпується одним поясненням.
      - text: безконечник
        label: лінія і дія
        explanation: Неперервна хвиляста лінія стає обрядовою дією у пасічницькому контексті.
      - text: рожа або зірка
        label: солярний центр
        explanation: Мотив може бути сонячним знаком, композиційним центром або локальною формою.
      - text: риба
        label: християнський шар
        explanation: У писанковому полі риба має виразний християнський рівень тлумачення.
    prompt: Як уникнути універсального словника значень, але не втратити символіку?
    model_answer: >-
      Потрібно називати мотив, можливий шар тлумачення і межу джерела.
      Сорок клинців, безконечник, рожа і риба мають символічну вагу, але
      значення залежить від регіону, техніки, часу і ситуації використання.

  - id: act-3
    type: ritual-sequencing
    title: Восковий знак
    instruction: Упорядкуй технічну послідовність так, щоб було видно логіку резерву.
    steps:
      - Підготувати яйце, віск, писачок або кістку, барвники і джерело тепла.
      - Розмітити поверхню яйця на поля, осі або пояси.
      - Закрити воском ті елементи, які мають залишитися білими.
      - Занурити яйце у світлу фарбу, наприклад жовту.
      - Закрити воском ті елементи, які мають залишитися жовтими.
      - Повторити письмо і фарбування від світлішого до темнішого кольору.
      - Прогріти яйце і зняти віск, відкривши приховані шари.
      - Назвати мотиви й техніку без приписування універсального значення.
    correct_order: [0, 1, 2, 3, 4, 5, 6, 7]
    model_answer: >-
      Послідовність іде від матеріалів і розмітки до воскового резерву,
      фарбування, повторного закривання кольорів і зняття воску. Після
      відкриття знака можна аналізувати мотиви, але тільки з урахуванням
      техніки і джерельної межі.

workbook:
  - type: critical-analysis
    title: Не один поганський код
    instruction: Перепиши тезу так, щоб вона не підміняла джерело романтичною схемою.
    target_text: Кожна писанка зберігає незмінний дохристиянський код українців.
    prompt: Що в цій тезі занадто сильне і як сформулювати її точніше?
    questions:
      - Які давні шари справді можна назвати?
      - Чому слово "кожна" створює проблему?
      - Що змінює християнський Великдень?
      - Як урахувати регіон і майстриню?
      - Яка точніша теза можлива?
    model_answers:
      - У писанковій орнаментиці є солярні, аграрні й охоронні нашарування.
      - Воно робить один висновок для всіх предметів, регіонів і часів.
      - Християнський календар, освячення, дарування і символіка Воскресіння стали реальним шаром традиції.
      - Значення мотиву залежить від локального зразка, джерела і контексту виконання.
      - Писанка зберігає давні орнаментальні шари, але живе в багатошаровій великодній, регіональній і сучасній практиці.

  - type: comparative-study
    title: Регіон не стає каноном
    instruction: Порівняй регіональні опори без проголошення однієї школи всеукраїнською нормою.
    items_to_compare:
      - "Гуцульщина і Покуття: дрібне письмо, тонкі контури, космацька впізнаваність, мотиви оленя, півня, риби і малих церков."
      - "Поділля: геометричні форми як сильний навчальний і музейний акцент."
      - "Наддніпрянщина: рослинний орнамент як обережний навчальний орієнтир."
      - "Волинь, Київщина, Харківщина і Кубань: названі у джерельному полі без зведення до одного стилю."
      - "Полісся: важлива культурна зона, але для писанкового опису потрібні конкретні музейні зразки."
    criteria:
      - мотиви
      - техніка письма
      - сила джерельної опори
      - ризик узагальнення
      - що треба перевірити перед твердженням
    prompt: Чому гуцульська писанка не може автоматично представляти всю Україну?
    model_answer: >-
      Гуцульська школа має потужну видимість і джерельну опору, але вона не
      замінює Поділля, Наддніпрянщину, Волинь чи інші регіони. Кожний регіон
      потребує власного зразка, опису і межі доказу; інакше карта традиції
      стає туристичним узагальненням.

  - type: ritual-sequencing
    title: Пасічницький безконечник
    instruction: Упорядкуй обрядову логіку так, щоб символ не лишився абстрактною метафорою.
    steps:
      - Написати або взяти писанку з мотивом безконечника.
      - Підготувати її до великоднього використання в родинному або громадському контексті.
      - Підійти до першого вулика.
      - Привітати бджіл у великодньому режимі.
      - Покласти писанку під вулик.
      - Пов'язати неперервну лінію з побажанням тривалого роїння.
      - Назвати цю дію локальним віруванням, а не універсальним правилом для всіх пасік.
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    model_answer: >-
      Безконечник у цьому випадку не просто означає тривалість. Писанка
      входить у дію біля вулика, де лінія, Великдень і господарське побажання
      працюють разом. Останній крок потрібний, щоб не зробити локальну дію
      всеукраїнським законом.

  - type: critical-analysis
    title: Що доводить короткий великодній фрагмент?
    instruction: Оціни силу двох рядків як джерела про соціальну роль писанки.
    target_text: |
      Бо котрая писанку дасть,
      До сих м'ясниць заміж ся оддасть.
    prompt: Що цей фрагмент доводить, а чого не доводить про соціальну роль писанки?
    questions:
      - Яку дію з писанкою фрагмент робить видимою?
      - Чому його не можна перетворити на універсальну прикмету?
      - Як він доповнює матеріальний опис писанки?
      - Яка межа короткого джерела?
    model_answers:
      - Фрагмент робить видимою писанку як дар у великодній соціальній взаємодії.
      - Він додає шлюбний горизонт, але не доводить єдиного правила для всіх регіонів.
      - Матеріальний предмет отримує словесний слід у практиці дарування.
      - Межа фрагмента в короткості, жанрі й неможливості механічного узагальнення.

  - type: critical-analysis
    title: Радянське витіснення без спрощення
    instruction: Виправ тезу так, щоб вона не перебільшувала і не применшувала тиск.
    target_text: Радянська влада повністю заборонила писанки, а діаспора одна врятувала традицію.
    prompt: Як сказати точніше про тиск, виживання і діаспору?
    questions:
      - Що справді пригнічувалося в радянський період?
      - Де традиція могла виживати в Україні?
      - Яку роль мала діаспора?
      - Чому слово "повністю" небезпечне?
      - Яка збалансована теза можлива?
    model_answers:
      - Публічний, церковний, музейний і науковий простір традиції сильно звужували.
      - У родинах, гірських селах, західних регіонах і приватних практиках тяглість могла зберігатися.
      - Діаспора навчала, адаптувала, передавала мову і підтримувала зв'язок з Україною.
      - Воно стирає нерівномірне виживання і локальні практики всередині України.
      - Радянська політика витісняла писанкарство як релігійно-національну практику, але традиція нерівномірно виживала в Україні й активно підтримувалася діаспорою.

  - type: essay-response
    title: Писанка як жива спадщина
    instruction: Напиши коротке доказове есе українською.
    prompt: >-
      У 260-340 словах поясни, чому писанкарство не можна звести ні до
      сувеніра, ні до незмінного давнього коду. Використай щонайменше три
      опори: техніку воскового резерву, регіональну варіантність, великоднє
      дарування, радянське витіснення, діаспору, музей або визнання ЮНЕСКО.
    min_words: 260
    model_answer: >-
      Писанкарство не зводиться до сувеніра, бо писанка виникає через складну
      технічну послідовність. Писачок або кістка наносить віск, барви йдуть від
      світлішої до темнішої, а знятий віск відкриває пам'ять усіх попередніх
      рішень. Це не просто прикрашене яйце, а предмет, у якому видно руку,
      час і ремісничу дисципліну.

      Водночас писанка не є одним незмінним давнім кодом. У ній є солярні,
      аграрні й охоронні мотиви, але християнський Великдень, дарування,
      освячення і родинна пам'ять стали реальними історичними шарами. Регіони
      також різні: гуцульська дрібна лінія, подільська геометричність чи
      наддніпрянський рослинний орієнтир не складаються в один канон.

      У XX столітті радянська політика звужувала публічне життя традиції, але
      вона виживала в родинах, західних регіонах, горах і діаспорі. Сьогодні
      музей, майстер-класи й визнання ЮНЕСКО показують, що писанкарство є
      живою спадщиною: його треба передавати, пояснювати і берегти без
      романтичного перебільшення.
