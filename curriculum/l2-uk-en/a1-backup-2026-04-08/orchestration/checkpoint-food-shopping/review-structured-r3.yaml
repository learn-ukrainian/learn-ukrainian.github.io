findings:
- dimension: LINGUISTIC ACCURACY
  severity: MAJOR
  location: Читання section — "Анна купує **хліб** (bread), **сир** (cheese), **яблука**
    (apples), і **салат** (salad)."
  issue: Comma before "і" in a simple enumeration is an English punctuation calque.
    Ukrainian does not use a comma before the final conjunction in simple homogeneous
    lists (Правопис 2019, §158).
  fix: Remove the comma before "і".
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: Що ми знаємо section — "Welcome to the checkpoint module for phase A1.6.
    This is where we pause to review and consolidate your knowledge. A1.6 covered
    five essential topics. Let's see what you can do!"
  issue: Generic meta-commentary opener. Could be replaced with a more direct, content-specific
    lead-in.
  fix: Rephrase to be less meta and more direct.
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: Підсумок section — "You have successfully completed phase A1.6 — Food
    and Shopping. You have expanded your vocabulary and grammar significantly."
  issue: '"Successfully completed" and "expanded...significantly" are telling-not-showing
    patterns. The checklist that follows is good — this framing sentence is the weak
    link.'
  fix: Tighten the framing to be less congratulatory.
