findings:
- dimension: Plan adherence
  severity: Major
  location: '"Один → багато" section, after the neuter noun table'
  issue: 'Plan content_outline explicitly includes the point: "Neuter -е → -я (not
    covered yet)." The module discusses neuter -о → -а thoroughly but never mentions
    that neuter nouns ending in -е form plurals with -я. This is a plan point that
    sets expectations for future learning.'
  fix: Add one sentence after the neuter table acknowledging -е → -я exists but is
    deferred.
- dimension: Plan adherence
  severity: Minor
  location: Діалоги section, introductory paragraph
  issue: 'Plan references Вашуленко Grade 3, p.114-115 for the Dialogue 1 setting
    ("Іменники мають два числа: однину і множину"). The module cites Большакова twice
    but never mentions Вашуленко, despite the plan listing it as a reference.'
  fix: Add a brief Вашуленко citation in the noun plural section where the concept
    of однина/множина is introduced.
- dimension: Linguistic accuracy
  severity: Minor
  location: '"Один → багато" section, paragraph after neuter table: "The word річ
    (thing) becomes речі (things) — not a standard pattern."'
  issue: VESUM confirms речі as the regular nominative plural of річ (feminine soft-sign
    noun). The ending -і is standard for this noun class. The stem vowel alternation
    і→е is the notable feature, not the pattern itself. Calling it "not a standard
    pattern" misleads learners into thinking it's irregular.
  fix: Recharacterize as a stem change rather than a non-standard pattern.
