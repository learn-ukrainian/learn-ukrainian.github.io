findings:
- dimension: PEDAGOGICAL QUALITY
  severity: MAJOR
  location: 'Планування section, euphony paragraph — "Let''s practice: **я буду працювати
    у понеділок** (и + у + п — vowel, then у before consonant? After a vowel we use
    в: **я буду працювати в понеділок**)."'
  issue: 'Shows incorrect form first, then self-corrects through stream-of-consciousness
    reasoning. A1 learners may encode the initial wrong form ("у понеділок" after
    a vowel). Pedagogical best practice at A1: present correct forms directly, never
    show wrong forms as primary examples.'
  fix: Replace the confusing think-aloud paragraph with clear contrastive correct
    examples.
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: Планування section — "These adverbs are incredibly useful because they
    do not require any extra prepositions."
  issue: '"incredibly useful" is generic enthusiasm that could apply to any language
    course. Per rubric: deduct for generic enthusiasm.'
  fix: Replace with specific pedagogical reason.
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: Dialogues section, after first dialogue — "This makes the future tense
    very approachable once you know your basic verbs."
  issue: Motivational filler — tells the learner how to feel instead of demonstrating
    value through examples.
  fix: Remove the sentence; the preceding explanation already shows why it's approachable.
- dimension: LINGUISTIC ACCURACY
  severity: MINOR
  location: Мій тиждень — "**В неділю я буду спати довго!**"
  issue: Module teaches "At the start of a sentence, use **у** before a consonant"
    but then uses "В неділю" at sentence start. Self-contradictory. (Euphony alternation
    = minor per review guidelines.)
  fix: Change to "У неділю" for consistency with stated rule.
