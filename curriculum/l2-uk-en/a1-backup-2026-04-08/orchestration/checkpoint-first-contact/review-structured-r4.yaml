findings:
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: 'Читання section, paragraph 1: "Every word here comes from M01–M06. There
    is nothing new."'
  issue: The reading passage contains words that are unlikely to have been taught
    in M01-M06, specifically "розкажи" (imperative of розказати — tell!) and possibly
    "селі" (locative of село — village). Telling learners "there is nothing new" and
    then presenting unfamiliar words undermines confidence at a checkpoint whose purpose
    is consolidation.
  fix: Soften the claim to acknowledge that almost all words are recycled while a
    few natural additions appear with translation.
- dimension: DIALOGUE QUALITY
  severity: MINOR
  location: Діалог section — entire dialogue between Богдан and Соломія
  issue: Two professionals meeting at a conference coffee break would typically begin
    with formal "ви" in Ukrainian culture, especially as strangers. The dialogue uses
    "ти" exclusively. While defensible at A1 for simplicity, the grammar summary explicitly
    teaches both Як тебе/вас звати? — the dialogue misses an opportunity to model
    the formal→informal switch.
  fix: No content fix needed — this is a pedagogical trade-off acceptable at A1. Noted
    for future modules.
