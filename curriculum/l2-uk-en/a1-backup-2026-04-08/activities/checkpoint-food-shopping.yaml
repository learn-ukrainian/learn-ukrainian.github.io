- id: fill-in-cafe-market
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: — Що ти їш на сніданок? — Я їм ___ і п'ю каву.
    answer: кашу
    options:
    - кашу
    - каша
    - каші
  - sentence: — Потім іду на ринок. Скільки ___ помідори?
    answer: коштують
    options:
    - коштують
    - коштує
    - коштувати
  - sentence: — Тридцять ___.
    answer: гривень
    options:
    - гривень
    - гривні
    - гривня
  - sentence: — Дайте ___ яблук, будь ласка.
    answer: кілограм
    options:
    - кілограм
    - літр
    - пляшку
  - sentence: — ___ борщ і воду, будь ласка.
    answer: Мені
    options:
    - Мені
    - Я
    - Меня
  - sentence: — Рахунок, будь ласка. Можна ___?
    answer: карткою
    options:
    - карткою
    - картка
    - картки
  - sentence: — О, я бачу ___! Олено, привіт!
    answer: Олену
    options:
    - Олену
    - Олена
    - Олени
  - sentence: — Ти знаєш мого ___?
    answer: брата
    options:
    - брата
    - брат
    - братом
- id: group-sort-accusative
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort by category)
  groups:
  - label: Inanimate (що?)
    items:
    - борщ
    - хліб
    - сік
    - чай
    - сир
    - суп
  - label: Animate (кого?)
    items:
    - брата
    - лікаря
    - сусіда
    - друга
    - вчителя
    - маму
- id: quiz-shopping-cafe
  type: quiz
  instruction: Що сказати? Оберіть правильну фразу (What do you say? Choose the correct
    phrase)
  items:
  - question: 'You want to order coffee:'
    options:
    - Скільки коштує?
    - Мені каву, будь ласка.
    - Тут вільно?
    correct: 1
  - question: 'You ask for the price:'
    options:
    - Що ви рекомендуєте?
    - Можна карткою?
    - Скільки коштує?
    correct: 2
  - question: 'You want to pay with a card:'
    options:
    - Рахунок, будь ласка.
    - Можна карткою?
    - Дорого!
    correct: 1
  - question: 'You ask for the bill:'
    options:
    - Мені борщ.
    - Рахунок, будь ласка.
    - Все було дуже смачно!
    correct: 1
  - question: 'You ask for 1 kg of apples:'
    options:
    - Скільки коштує?
    - Можна меню?
    - Дайте кілограм яблук.
    correct: 2
  - question: 'You think the price is high:'
    options:
    - Дорого!
    - Дешево!
    - Добре!
    correct: 0
  - question: 'You ask if a seat is free:'
    options:
    - Можна меню?
    - Тут вільно?
    - Рахунок, будь ласка.
    correct: 1
  - question: 'You compliment the food:'
    options:
    - Можна карткою?
    - Дуже приємно!
    - Все було дуже смачно!
    correct: 2
workbook:
- type: true-false
  instruction: Правда чи ні? Про день Анни. (True or false? About Anna's day.)
  items:
  - statement: Анна їсть кашу на сніданок.
    correct: true
    explanation: 'У тексті: «Вона їсть кашу і п''є каву з молоком на сніданок.»'
  - statement: Анна п'є чай вранці.
    correct: false
    explanation: 'У тексті: «п''є каву з молоком» — не чай.'
  - statement: Помідори коштують тридцять гривень кілограм.
    correct: true
    explanation: 'У тексті: «Тридцять гривень кілограм.»'
  - statement: Анна купує хліб, сир, яблука і салат на ринку.
    correct: true
    explanation: 'У тексті: «Анна купує хліб, сир, яблука, і салат.»'
  - statement: Анна замовляє борщ і каву в кафе.
    correct: false
    explanation: 'У тексті: «Мені борщ і воду» — не каву.'
  - statement: Анна бачить Олену в кафе.
    correct: true
    explanation: 'У тексті: «О, я бачу Олену!»'
  - statement: Анна платить карткою.
    correct: true
    explanation: 'У тексті: «Можна карткою? — Звичайно.»'
  - statement: Анна обідає сама.
    correct: false
    explanation: 'У тексті: «Вони обідають разом.»'
- type: match-up
  instruction: З'єднайте називний відмінок із знахідним (Match nominative to accusative)
  pairs:
  - left: вода
    right: воду
  - left: кава
    right: каву
  - left: піца
    right: піцу
  - left: каша
    right: кашу
  - left: яєчня
    right: яєчню
  - left: брат
    right: брата
  - left: лікар
    right: лікаря
  - left: друг
    right: друга
- type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку (Find and correct the case error)
  items:
  - sentence: Я п'ю кава на сніданок.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - кавою
    - каві
    explanation: 'Feminine nouns ending in -а/-я change to -у/-ю in the accusative:
      кава → каву.'
  - sentence: Я їм піца з сиром.
    error: піца
    correction: піцу
    error_type: word
    options:
    - піцу
    - піцою
    - піці
    explanation: 'Feminine noun: піца → піцу in the accusative.'
  - sentence: Я бачу Олена у кафе.
    error: Олена
    correction: Олену
    error_type: word
    options:
    - Олену
    - Оленою
    - Олені
    explanation: 'Animate feminine noun: Олена → Олену in the accusative.'
  - sentence: Я знаю мого брат.
    error: брат
    correction: брата
    error_type: word
    options:
    - брата
    - братом
    - брату
    explanation: 'Animate masculine noun: брат → брата in the accusative.'
  - sentence: Я люблю мій вчитель.
    error: вчитель
    correction: вчителя
    error_type: word
    options:
    - вчителя
    - вчителем
    - вчителю
    explanation: 'Animate masculine noun ending in -ь: вчитель → вчителя in the accusative.'
  - sentence: Я замовляю вода в кафе.
    error: вода
    correction: воду
    error_type: word
    options:
    - воду
    - водою
    - воді
    explanation: 'Feminine noun: вода → воду in the accusative.'
- type: unjumble
