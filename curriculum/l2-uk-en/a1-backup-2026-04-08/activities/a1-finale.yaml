- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я хочу заказати борщ, будь ласка.
    error: заказати
    correction: замовити
    error_type: word
    options:
    - замовити
    - забронювати
    - придбати
    explanation: '''Заказати'' — русизм, не рекомендований у літературній мові. Правильно:
      замовити (to order).'
  - sentence: Учора ми ходимо в кіно разом.
    error: ходимо
    correction: ходили
    error_type: word
    options:
    - ходили
    - підемо
    - ідемо
    explanation: '''Учора'' вимагає минулого часу. Правильно: ходили.'
  - sentence: Завтра я подорожував по Україні.
    error: подорожував
    correction: буду подорожувати
    error_type: word
    options:
    - буду подорожувати
    - подорожую
    - подорожую вже
    explanation: '''Завтра'' вимагає майбутнього часу. Правильно: буду подорожувати.'
  - sentence: Зранку я снідаю в кафе вчора.
    error: снідаю
    correction: снідав
    error_type: word
    options:
    - снідав
    - буду снідати
    - поснідаю
    explanation: '''Вчора'' вимагає минулого часу. Правильно: снідав.'
  - sentence: Скільки коштую ця вишиванка?
    error: коштую
    correction: коштує
    error_type: word
    options:
    - коштує
    - коштуєш
    - коштуємо
    explanation: 'Вишиванка — 3-тя особа однини. Правильне закінчення: коштує.'
  - sentence: Привіт! Я хочу познайомити з тобою.
    error: познайомити
    correction: познайомитися
    error_type: word
    options:
    - познайомитися
    - познайомлю
    - познайомив
    explanation: 'Правильна рефлексивна форма: познайомитися (to get acquainted with
      someone).'
