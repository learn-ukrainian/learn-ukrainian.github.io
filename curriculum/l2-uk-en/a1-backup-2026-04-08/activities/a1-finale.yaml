- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: 'У минулому часі українські дієслова мають форми чоловічого і жіночого
      роду: снідав (чол.) / снідала (жін.).'
    correct: true
    explanation: 'Так, у минулому часі дієслово змінюється за родом. Чоловічий рід:
      -в (снідав, гуляв). Жіночий рід: -ла (снідала, гуляла).'
  - statement: 'Аналітичний майбутній час утворюється за схемою: буду + інфінітив
      (наприклад: буду подорожувати).'
    correct: true
    explanation: 'Так, це аналітична форма майбутнього часу. Приклад: буду їздити,
      буду читати, буду подорожувати.'
  - statement: Слово 'заказати' є нейтральним стилістичним варіантом слова 'замовити'
      для замовлення їжі.
    correct: false
    explanation: 'Ні. ''Заказати'' є русизмом і не рекомендується в літературній українській
      мові. Правильно: замовити / замовляти.'
  - statement: Лавра — це знаменитий монастирський комплекс у Києві.
    correct: true
    explanation: Так, Києво-Печерська Лавра — один з найстаріших монастирів України,
      заснований у XI столітті.
  - statement: '''Смачного'' походить від прикметника ''смачний'' (tasty) і є стандартним
      українським побажанням перед їжею.'
    correct: true
    explanation: Так, 'смачного' — це форма родового відмінку від 'смачний'. Відповідає
      французькому 'bon appétit'.
  - statement: Станція метро Хрещатик знаходиться на зеленій лінії київського метро.
    correct: true
    explanation: Так, станція Хрещатик — на Святошинсько-Броварській (зеленій) лінії
      київського метро.
