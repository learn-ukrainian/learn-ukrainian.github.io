    - кафе?
    hint: Ти знаєш + де + кафе
- id: wb-error-correction-conjunctions
  type: error-correction
  instruction: Знайдіть і виправте неправильний сполучник (Find and correct the wrong
    conjunction)
  items:
  - sentence: Я думаю, де він тут.
    error: де
    correction: що
    error_type: word
    options:
    - що
    - коли
    - де
    explanation: 'Думати + що: thoughts and beliefs always use «що». «Де» asks about
      a location.'
  - sentence: Ти знаєш, що вона живе?
    error: що
    correction: де
    error_type: word
    options:
    - де
    - коли
    - що
    explanation: 'Знаєш де: for locations, use «де», not «що».'
  - sentence: Скажи, де ти прийдеш.
    error: де
    correction: коли
    error_type: word
    options:
    - коли
    - що
    - де
    explanation: Arriving is about time, not place — use «коли», not «де».
  - sentence: Він каже, коли вона в Києві.
    error: коли
    correction: що
    error_type: word
    options:
    - що
    - де
    - коли
    explanation: Reporting a fact uses «що». «Коли» would mean he says *when* she
      is in Kyiv.
  - sentence: Я не знаю, що він живе.
    error: що
    correction: де
    error_type: word
    options:
    - де
    - коли
    - що
    explanation: For location (where someone lives), use «де».
  - sentence: Зателефонуй, що прийдеш.
    error: що
    correction: коли
    error_type: word
    options:
    - коли
    - де
    - що
    explanation: 'Зателефонуй + «коли»: call *when* you arrive — this is about timing,
      not a reported fact.'
- id: wb-true-false-rules
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: In Ukrainian, you always write a comma before що, де, коли when they
      connect two clauses.
    correct: true
    explanation: Так — це обов'язкове правило (This is a mandatory rule). The comma
      is always there — no exceptions.
  - statement: «Де ти живеш?» — тут «де» є сполучником (a conjunction).
    correct: false
    explanation: No — тут «де» is a question word. It stands at the start of the sentence
      and the sentence ends with «?». A conjunction sits in the middle after a comma.
  - statement: «Я знаю, де ти живеш.» — тут «де» є сполучником (a conjunction).
    correct: true
    explanation: Yes — тут «де» connects «я знаю» and «де ти живеш». It has a comma
      before it and is not the first word in the sentence.
  - statement: «Думати» pairs most often with «де».
    correct: false
    explanation: 'No — «думати» pairs almost exclusively with «що»: «Я думаю, що...».
      Use «де» with «знати» and «казати» when asking about location.'
  - statement: You can omit the comma before «що» in informal writing.
    correct: false
    explanation: No — Ukrainian always requires the comma before subordinating conjunctions.
      This rule has no informal exception.
  - statement: «Коли я прийду, ми поговоримо» — the comma comes after the subordinate
      clause because «коли» opens the sentence.
    correct: true
    explanation: Yes — when «коли» opens the whole sentence, the comma comes AFTER
      the subordinate clause, before the main clause.
- id: wb-match-up-sentences
  type: match-up
  instruction: З'єднайте українське речення з англійським перекладом (Match the Ukrainian
    sentence with its English translation)
  pairs:
  - left: Я знаю, що він тут.
    right: I know that he is here.
  - left: Я не знаю, де вона живе.
    right: I don't know where she lives.
  - left: Скажи, коли ти прийдеш.
    right: Tell me when you will come.
  - left: Я думаю, що це правильно.
    right: I think that this is correct.
  - left: Він каже, що вона в Києві.
    right: He says that she is in Kyiv.
  - left: Зателефонуй, коли прийдеш.
    right: Call when you arrive.
- id: wb-quiz-question-or-conjunction
  type: quiz
  instruction: Яку роль виконує виділене слово? (What role does the highlighted word
    play?)
  items:
  - question: '«Де ти живеш?» — слово «де»:'
    options:
    - Питальне слово — питає де (question word — asks where)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Прислівник часу (time adverb)
    - Вигук (exclamation)
    correct: 0
  - question: '«Я знаю, де ти живеш.» — слово «де»:'
    options:
    - Питальне слово — питає де (question word — asks where)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Прийменник місця (place preposition)
    - Вигук (exclamation)
    correct: 1
  - question: '«Що це?» — слово «що»:'
    options:
    - Питальне слово — питає що (question word — asks what)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Іменник (noun)
    - Частка (particle)
    correct: 0
  - question: '«Я думаю, що це правильно.» — слово «що»:'
    options:
    - Питальне слово — питає що (question word — asks what)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Займенник (pronoun)
    - Прислівник (adverb)
    correct: 1
  - question: '«Коли ти прийдеш?» — слово «коли»:'
    options:
    - Питальне слово — питає коли (question word — asks when)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Прислівник місця (place adverb)
    - Вигук (exclamation)
    correct: 0
  - question: '«Скажи, коли прийдеш.» — слово «коли»:'
    options:
    - Питальне слово — питає коли (question word — asks when)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Займенник (pronoun)
    - Прийменник (preposition)
    correct: 1
  - question: '«Ти знаєш, де кафе?» — слово «де»:'
    options:
    - Питальне слово — питає де (question word — asks where)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Прийменник місця (place preposition)
    - Частка (particle)
    correct: 1
  - question: '«Де Олена живе?» — слово «де»:'
    options:
    - Питальне слово — питає де (question word — asks where)
    - Сполучник — з'єднує частини речення (conjunction — connects two clauses)
    - Іменник (noun)
    - Займенник (pronoun)
    correct: 0
