workbook:
- id: wb-group-sort-conjunctions
  type: group-sort
  instruction: Розподіліть речення за сполучником (Sort sentences by which conjunction
    belongs in the blank)
  groups:
  - label: що (that)
    items:
    - Я думаю, ___ він прийде.
    - Він каже, ___ вона в Києві.
    - Ми бачимо, ___ ти стараєшся.
  - label: де (where)
    items:
    - Я не знаю, ___ вона живе.
    - Ти знаєш, ___ кафе?
    - Вони не знають, ___ ми.
  - label: коли (when)
    items:
    - Скажи, ___ ти прийдеш.
    - Я не знаю, ___ він закінчить роботу.
    - Зателефонуй, ___ прийдеш.
