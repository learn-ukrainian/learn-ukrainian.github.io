version: '1.0'
module: health
level: a1
inline:
- id: quiz-health-response
  type: quiz
  instruction: Оберіть правильну відповідь (Choose the correct response)
  items:
  - question: У мене болить голова.
    options:
    - Ось таблетки проти головного болю.
    - Ось краплі проти нежитю.
    - Випийте сироп проти кашлю.
    correct: 0
  - question: У мене сильний кашель.
    options:
    - Ось краплі для носа.
    - Вам потрібні таблетки проти кашлю.
    - У мене болить зуб.
    correct: 1
  - question: Що у вас болить?
    options:
    - У мене болить горло.
    - Я лікар.
    - Де аптека?
    correct: 0
  - question: Добрий день. Дайте, будь ласка, щось проти нежитю.
    options:
    - У мене болить спина.
    - Це таблетки проти головного болю.
    - Ось краплі, будь ласка.
    correct: 2
  - question: У мене болить зуб.
    options:
    - Вам потрібен стоматолог.
    - Випийте воду.
    - Ось краплі проти нежитю.
    correct: 0
  - question: Мені погано. Що робити?
    options:
    - Дайте таблетки.
    - Де аптека?
    - Викличте лікаря!
    correct: 2
- id: match-body-parts
  type: match-up
  instruction: З'єднайте слова з перекладом (Match the body parts with their English
    translation)
  pairs:
  - left: голова
    right: head
  - left: горло
    right: throat
  - left: спина
    right: back
  - left: живіт
    right: stomach
  - left: рука
    right: hand / arm
  - left: нога
    right: leg / foot
  - left: зуб
    right: tooth
  - left: ока
    right: eye
  - left: вухо
    right: ear
  - left: ніс
    right: nose
- id: fill-in-symptoms
  type: fill-in
  instruction: Оберіть правильне слово (Choose the correct word)
  items:
  - sentence: У мене болить ____. Я хочу спати.
    answer: голова
    options:
    - голова
    - рука
    - нога
  - sentence: У мене болить ____. Я не хочу їсти.
    answer: живіт
    options:
    - живіт
    - вухо
    - ока
  - sentence: У мене болить ____ і є температура. Я не можу говорити.
    answer: горло
    options:
    - горло
    - спина
    - ніс
  - sentence: У мене ____, я постійно кашляю.
    answer: кашель
    options:
    - кашель
    - нежить
    - зуб
  - sentence: У мене болить ____. Мені потрібен стоматолог.
    answer: зуб
    options:
    - зуб
    - голова
    - нога
  - sentence: Я ____. У мене болить голова і спина.
    answer: хворий
    options:
    - хворий
    - лікар
    - аптека
- id: fill-in-pharmacy
  type: fill-in
  instruction: Оберіть правильне слово (Choose the correct word)
  items:
  - sentence: Дайте, ____, таблетки проти головного болю.
    answer: будь ласка
    options:
    - будь ласка
    - добрий день
    - дякую
  - sentence: Що у вас ____?
    answer: болить
    options:
    - болить
    - хворий
    - лікар
  - sentence: У мене ____ і болить горло.
    answer: температура
    options:
    - температура
    - аптека
    - лікар
  - sentence: Мені ____. Викличте лікаря!
    answer: погано
    options:
    - погано
    - хворий
    - добре
  - sentence: Де тут найближча ____? Мені потрібні ліки.
    answer: аптека
    options:
    - аптека
    - голова
    - спина
  - sentence: Ось краплі ____ нежитю.
    answer: проти
    options:
    - проти
    - від
    - для
workbook:
- id: true-false-dialogue
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Лікар відкриває розмову словами «Що у вас болить?»
    correct: true
    explanation: 'Так — Діалог 1 починається: «Добрий день. Що у вас болить?»'
  - statement: Пацієнт у Діалозі 1 каже, що у нього болить живіт і спина.
    correct: false
    explanation: 'Пацієнт каже: «У мене болить голова і горло» — не живіт і не спина.'
  - statement: У пацієнта є температура.
    correct: true
    explanation: 'Пацієнт відповідає: «З учора. І в мене температура.»'
  - statement: В аптеці покупець купує тільки таблетки.
    correct: false
    explanation: 'Покупець також просить краплі: «А є щось проти нежитю? — Так, ось
      краплі.»'
  - statement: Правильно казати «таблетки проти кашлю», не «таблетки від кашлю».
    correct: true
    explanation: 'Модуль пояснює: в аптеці використовують «проти», не «від».'
  - statement: '«Болять» — правильна форма, коли болить один предмет: «У мене болять
      зуб».'
    correct: false
    explanation: 'Один предмет → болить: «У мене болить зуб». Болять — для кількох:
      «болять зуби».'
- id: quiz-comprehension
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Яку фразу лікар каже першим у Діалозі 1?
    options:
    - Де ви живете?
    - Як вас звати?
    - Що у вас болить?
    - Ви кашляєте?
    correct: 2
  - question: Що означає «У мене болить голова»?
    options:
    - I see a doctor.
    - My head hurts.
    - I need medicine.
    - I'm at the pharmacy.
    correct: 1
  - question: Яка правильна формула в аптеці?
    options:
    - таблетки від кашлю
    - таблетки для кашлю
    - таблетки з кашлю
    - таблетки проти кашлю
    correct: 3
  - question: Як дівчина каже «I'm sick»?
    options:
    - Я хворий.
    - Я хворе.
    - Я хвора.
    - Мені хвора.
    correct: 2
  - question: «Рука» українською означає...
    options:
    - тільки arm
    - тільки hand
    - і arm, і hand
    - leg та foot
    correct: 2
  - question: «Нежить» — якого роду?
    options:
    - жіночого (feminine)
    - чоловічого (masculine)
    - середнього (neuter)
    - не має роду
    correct: 1
- id: group-sort-health
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words into categories)
  groups:
  - label: Частини тіла (Body parts)
    items:
    - голова
    - горло
    - спина
    - живіт
    - зуб
    - нога
    - рука
    - ока
  - label: Симптоми (Symptoms)
    items:
    - температура
    - кашель
    - нежить
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Build the sentence from the words)
  items:
  - words:
    - болить
    - мене
    - У
    - голова.
    correct_order:
    - У
    - мене
    - болить
    - голова.
    hint: starts with У
  - words:
    - вас
    - Що
    - болить?
    - у
    correct_order:
    - Що
    - у
    - вас
    - болить?
  - words:
    - будь
    - Дайте,
    - таблетки.
    - ласка,
    correct_order:
    - Дайте,
    - будь
    - ласка,
    - таблетки.
  - words:
    - мене
    - кашель.
    - У
    - нежить
    - і
    correct_order:
    - У
    - мене
    - нежить
    - і
    - кашель.
  - words:
    - нежитю.
    - проти
    - краплі
    - Ось
    correct_order:
    - Ось
    - краплі
    - проти
    - нежитю.
  - words:
    - аптека?
    - тут
    - Де
    - найближча
    correct_order:
    - Де
    - тут
    - найближча
    - аптека?
- id: error-correction-health
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the mistake)
  items:
  - sentence: У мені болить голова.
    error: мені
    correction: мене
    error_type: word
    options:
    - мене
    - моя
    - мій
    explanation: 'Фіксований вираз: «У мене болить» — не «У мені». Мені — інша форма.'
  - sentence: У мене болять зуб.
    error: болять
    correction: болить
    error_type: word
    options:
    - болить
    - болю
    - боліє
    explanation: 'Один зуб → болить (однина). Болять — для кількох: «У мене болять
      зуби».'
  - sentence: Дайте, будь ласка, таблетки від кашлю.
    error: від
    correction: проти
    error_type: word
    options:
    - проти
    - для
    - з
    explanation: В аптеці кажуть «таблетки проти кашлю» — не «від кашлю».
  - sentence: Іван хвора.
    error: хвора
    correction: хворий
    error_type: word
    options:
    - хворий
    - хворе
    - хворою
    explanation: 'Іван — чоловічого роду: хворий. Хвора — тільки для жінки.'
  - sentence: Мені погана сьогодні.
    error: погана
    correction: погано
    error_type: word
    options:
    - погано
    - поганий
    - погане
    explanation: «Мені погано» — незмінний прислівник. Не кажуть «погана/поганий».
  - sentence: У мене болять голова і горло.
    error: болять
    correction: болить
    error_type: word
    options:
    - болить
    - болю
    - болячий
    explanation: 'Модуль вчить: «У мене болить голова і горло» — болить навіть з «і».'
- id: translate-health
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: My head hurts.
    options:
    - text: У мене болить голова.
      correct: true
    - text: У мене болять голова.
      correct: false
    - text: У мені болить голова.
      correct: false
  - source: I have a cough.
    options:
    - text: У мене кашель.
      correct: true
    - text: У мені кашель.
      correct: false
    - text: Я є кашель.
      correct: false
  - source: Give me something for a cough, please.
    options:
    - text: Дайте, будь ласка, щось від кашлю.
      correct: false
    - text: Дайте, будь ласка, щось проти кашлю.
      correct: true
    - text: Дайте, будь ласка, щось для кашлю.
      correct: false
  - source: What hurts you? (formal)
    options:
    - text: Що у тебе болить?
      correct: false
    - text: Що болить у вас?
      correct: false
    - text: Що у вас болить?
      correct: true
  - source: I'm sick. (female speaker)
    options:
    - text: Я хворий.
      correct: false
    - text: Я хвора.
      correct: true
    - text: Я хворе.
      correct: false
  - source: I feel bad.
    options:
    - text: Мені погана.
      correct: false
    - text: Мені погано.
      correct: true
    - text: Я погано.
      correct: false
