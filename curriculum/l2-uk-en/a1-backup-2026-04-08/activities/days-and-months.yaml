workbook:
- type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words into categories)
  groups:
  - label: Дні тижня
    items:
    - понеділок
    - вівторок
    - середа
    - четвер
    - п'ятниця
    - субота
    - неділя
  - label: Місяці
    items:
    - січень
    - лютий
    - березень
    - квітень
    - травень
    - червень
    - липень
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Тиждень в Україні починається з понеділка.
    correct: true
    explanation: Yes — the Ukrainian week starts on понеділок (Monday), not Sunday.
  - statement: П'ятниця — це п'ятий день тижня.
    correct: true
    explanation: Yes — п'ятниця comes from п'ять (five), making it the fifth day.
  - statement: Листопад — це місяць осені.
    correct: true
    explanation: Yes — листопад (November) belongs to осінь (autumn).
  - statement: Серпень — це місяць зими.
    correct: false
    explanation: No — серпень (August) is a summer month. Winter months are грудень,
      січень, лютий.
  - statement: Дні тижня і місяці в українській пишуться з великої літери.
    correct: false
    explanation: 'No — in Ukrainian, days and months are written in lowercase: понеділок,
      березень.'
  - statement: Слово «листопад» буквально означає «листя падає».
    correct: true
    explanation: 'Yes — листопад = листя (leaves) + падати (to fall): the month when
      leaves fall.'
  - statement: Неділя означає «тиждень» у сучасній українській мові.
    correct: false
    explanation: No — in modern Ukrainian тиждень means week. Неділя means Sunday.
  - statement: Березень названий на честь берези.
    correct: true
    explanation: Yes — березень (March) comes from береза (birch tree), whose sap
      flows in early spring.
