- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Після числа 5 треба говорити «гривня».
    correct: false
    explanation: 'After 5 and above, use гривень. Гривня is only for 1 (and 21, 31,
      41...). Example: 5 гривень, 10 гривень, 100 гривень.'
  - statement: «Скільки коштують яблука?» — правильна форма.
    correct: true
    explanation: 'Яблука is plural, so the verb is plural too: коштують. Singular:
      Скільки коштує хліб?'
  - statement: «Скільки коштує?» використовується з іменниками у множині.
    correct: false
    explanation: 'Скільки коштує? is for SINGULAR nouns. For plural nouns, use коштують:
      Скільки коштують помідори?'
  - statement: «Дайте, будь ласка» — стандартна фраза для замовлення.
    correct: true
    explanation: Yes! Дайте, будь ласка + quantity + item is the standard polite buying
      request in Ukrainian markets and shops.
  - statement: «Можна карткою?» означає «Can I pay by card?»
    correct: true
    explanation: Correct. Картка = card. Можна = is it possible / may I. This phrase
      works at any cash register in Ukraine.
  - statement: «Дорого!» — це прикметник.
    correct: false
    explanation: 'Дорого is an adverb — a standalone reaction to a price. The adjective
      form is дорогий/дорога/дороге, used before a noun: дорогий сир (expensive cheese).'
  - statement: Слово «крамниця» є синонімом слова «магазин».
    correct: true
    explanation: Yes! Крамниця is a distinctly Ukrainian word meaning store/shop —
      a synonym for магазин. It is common in western Ukraine and literary Ukrainian.
