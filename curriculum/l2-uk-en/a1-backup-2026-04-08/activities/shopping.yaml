- type: error-correction
  instruction: Виправте помилку (Find and correct the mistake)
  items:
  - sentence: Скільки стоїть кілограм яблук?
    error: стоїть
    correction: коштує
    explanation: In Ukrainian, use коштувати (to cost). Стоїть (to stand) is a Russianism
      when talking about prices — you hear it in Russian, but in Ukrainian we say
      коштує.
  - sentence: Скільки коштує помідори?
    error: коштує
    correction: коштують
    explanation: 'Помідори is plural, so the verb must agree: коштують. Compare: хліб
      коштує (singular) — помідори коштують (plural).'
  - sentence: Три гривень, будь ласка.
    error: гривень
    correction: гривні
    explanation: After 2, 3, 4 (and numbers ending in them) use гривні. After 5 and
      above use гривень. Three = гривні.
  - sentence: Сто гривень — це дорогий!
    error: дорогий
    correction: дорого
    explanation: 'As a comment about a price, use the adverb дорого (Expensive!).
      Дорогий is an adjective that describes a noun: дорогий сир (expensive cheese).'
  - sentence: Я йду в ринок.
    error: в
    correction: на
    explanation: 'Ринок takes the preposition на: на ринок (direction), на ринку (location).
      Compare: в магазин, у супермаркет — different locations take different prepositions.'
  - sentence: Скільки коштувати цей сир?
    error: коштувати
    correction: коштує
    explanation: Use the conjugated verb form коштує, not the infinitive коштувати.
      The infinitive means 'to cost' — here you need the present tense 'costs'.
- type: observe
  examples:
  - 1 гривня — 2 гривні — 5 гривень
  - 21 гривня — 22 гривні — 25 гривень
  - 31 гривня — 32 гривні — 35 гривень
  - 1 копійка — 2 копійки — 5 копійок
  - 1 кілограм — 2 кілограми — 5 кілограмів
  - 1 літр — 2 літри — 5 літрів
  prompt: 'What pattern do you notice? When do you use each form? (Hint: look at the
    last digit of the number.)'
