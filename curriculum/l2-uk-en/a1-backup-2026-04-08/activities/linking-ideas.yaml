workbook:
- type: match-up
  instruction: З'єднайте сполучник з його значенням (Match each conjunction to its
    meaning)
  pairs:
  - left: і
    right: додавання — з'єднує рівноправні частини (addition — joins equal parts)
  - left: та
    right: синонім до і, частіше в текстах (synonym of і, more common in texts)
  - left: а
    right: м'яке протиставлення або зміна теми (soft contrast or topic shift)
  - left: але
    right: сильне протиставлення або обмеження (strong contrast or limitation)
  - left: бо
    right: пояснює причину — усне мовлення (explains reason — conversational)
  - left: тому що
    right: пояснює причину — письмове мовлення (explains reason — written/formal)
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Перед 'але' завжди ставимо кому.
    correct: true
    explanation: 'Так. Кома завжди стоїть перед ''але''. Наприклад: ''Я хочу, але
      не можу.'''
  - statement: Бо — це ненормативне, сленгове слово.
    correct: false
    explanation: Ні. Бо — нормативне українське слово. Воно є в прислів'ях, літературі
      та щоденному мовленні.
  - statement: Та і і мають однакове значення.
    correct: true
    explanation: 'Так. Та і і — синоніми: ''хліб і масло'' = ''хліб та масло''.'
  - statement: А і але мають однакове значення.
    correct: false
    explanation: 'Ні. А — м''яке протиставлення: ''Він читає, а вона пише.'' Але —
      сильне протиставлення: ''Я хочу, але не можу.'''
  - statement: Перед 'і' завжди ставимо кому.
    correct: false
    explanation: 'Ні. Кому ставимо перед ''і'' лише між двома реченнями з різними
      підметами: ''Сонце зайшло, і стало темно.'' Між двома словами кома не потрібна:
      ''хліб і масло''.'
  - statement: Бо і тому що — синоніми.
    correct: true
    explanation: Так. Обидва слова означають 'because'. Бо — розмовне, тому що — частіше
      в текстах.
  - statement: Перед 'бо' завжди ставимо кому.
    correct: true
    explanation: 'Так. Наприклад: ''Я не йду, бо хворий.'''
  - statement: На питання 'Чому?' відповідаємо 'бо' або 'тому що'.
    correct: true
    explanation: 'Так. Наприклад: ''— Чому ти тут? — Бо я чекаю друга.'''
- type: error-correction
  instruction: Знайдіть помилку і виправте її (Find the mistake and correct it)
  items:
  - sentence: Я хочу, і не можу.
    error: і
    correction: але
    error_type: word
    options:
    - і
    - а
    - але
    - бо
    explanation: 'Але виражає сильне протиставлення. Бажання суперечить можливості:
      ''Я хочу, але не можу.'''
  - sentence: Він молодий, а дуже розумний.
    error: а
    correction: але
    error_type: word
    options:
    - і
    - а
    - але
    explanation: 'Але вказує на несподіване протиставлення: молодий — але вже розумний.'
  - sentence: Ми купили хліб але молоко.
    error: але
    correction: і
    error_type: word
    options:
    - і
    - а
    - але
    explanation: 'Сполучник і з''єднує однорідні частини: купили хліб І молоко (додавання,
      не протиставлення).'
  - sentence: Він не прийшов, і він хворий.
    error: і
    correction: бо
    error_type: word
    options:
    - і
    - але
    - бо
    explanation: 'Бо пояснює причину: він не прийшов, БО хворий.'
  - sentence: Я читаю, але він дивиться телевізор.
    error: але
    correction: а
    error_type: word
    options:
    - а
    - але
    - бо
    explanation: 'А вказує на двох різних підметів і їхні дії. Тут немає суперечності:
      ''Я читаю, А він дивиться телевізор.'''
  - sentence: Я вчу українську, а це цікава мова.
    error: а
    correction: бо
    error_type: word
    options:
    - і
    - а
    - бо
    explanation: 'Бо пояснює причину: я вчу українську, БО це цікава мова.'
