inline:
- id: group-sort-conjunctions
  type: group-sort
  instruction: Розподіліть речення за групами (Sort the sentences into groups)
  groups:
  - label: Додавання — і / та (Addition)
    items:
    - Я читаю **і** пишу.
    - Він грає на гітарі **та** співає.
    - Ми купили хліб **та** молоко.
    - Київ **і** Львів — красиві міста.
  - label: Протиставлення — а / але (Contrast)
    items:
    - Я хочу, **але** не можу.
    - Він працює, **а** вона відпочиває.
    - Погода гарна, **але** холодно.
  - label: Причина — бо / тому що (Reason)
    items:
    - Я не йду, **бо** я хворий.
    - Я втомлений, **бо** багато працював.
    - Він не прийшов, **тому що** забув.
