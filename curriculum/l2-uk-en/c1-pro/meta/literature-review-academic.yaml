slug: literature-review-academic
title: Огляд літератури
word_target: 4000
content_outline:
- section: Розминка — Роль огляду літератури
  words: 450
  points:
  - Визначення огляду літератури як інструменту наукового обґрунтування
  - Відмінність між описовим переказом та аналітичним синтезом ідей
  - Роль огляду у формуванні авторитету автора (scholarly voice)
  - '[!pro-tip] про огляд як інтелектуальну мапу галузі'
- section: 'Пошук та відбір джерел: Стратегії та ресурси'
  words: 700
  points:
  - Робота з базами Scopus, Web of Science та Google Scholar
  - 'Національні ресурси: НБУВ та електронні каталоги наукових фахових видань'
  - 'Критерії релевантності: імпакт-фактор, індекс Гірша, актуальність джерела'
  - Організація літератури за допомогою бібліографічних менеджерів (Mendeley, Zotero)
  - '[!context] щодо специфіки пошуку в українському науковому сегменті'
- section: Синтез та критичний аналіз наукового дискурсу
  words: 850
  points:
  - 'Техніки синтезу: як поєднувати суперечливі погляди різних авторів'
  - 'Критична оцінка методології та висновків: пошук слабких місць та обмежень'
  - Академічна доброчесність та норми цитування згідно з ДСТУ 8302:2015
  - '[!common-error] про уникнення простого переліку анотацій (laundry list)'
  - Використання модальних конструкцій для висловлення наукової дистанції
- section: Ідентифікація та формулювання прогалин дослідження
  words: 650
  points:
  - Поняття 'research gap' (прогалина) та її типи в академічному письмі
  - Методи виявлення невивчених аспектів через аналіз обмежень попередніх робіт
  - 'Типові мовні конструкції для опису прогалини: ''залишається дискусійним'', ''бракує
    даних'''
  - '[!language-note] щодо термінологічного вибору: ''прогалина'' vs ''біла пляма'''
- section: 'Аналіз зразка: Анатомія професійного огляду'
  words: 750
  points:
  - 'Розбір структури реального огляду: від широкого контексту до вузької прогалини'
  - Аналіз фразеологічних кліше для плавних переходів між ідеями (cohesive devices)
  - Приклади вдалого синтезу 5+ джерел у межах одного параграфа
  - Безособові конструкції та науковий етикет у критичних зауваженнях
- section: 'Практика: Написання та редагування огляду'
  words: 600
  points:
  - 'Покрокове завдання: відбір джерел та створення тематичного плану-проспекту'
  - Алгоритм написання синтетичного тексту з обов'язковим виявленням прогалини
  - 'Чек-лист для самоперевірки: лексична точність, відсутність русизмів, відповідність
    стандартам'
  - Критерії оцінювання професійного огляду (C1-PRO level)
