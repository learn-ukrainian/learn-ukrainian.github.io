slug: translation-basics
title: Основи перекладу
word_target: 4000
content_outline:
- section: Розминка — Переклад як професія
  words: 400
  points:
  - Сучасна роль перекладача як культурного медіатора та фахівця з комунікації
  - 'Класифікація типів перекладу: письмова локалізація, синхрон та переклад документів'
  - Огляд українського ринку перекладацьких послуг та роль LSP (Language Service Providers)
  - Професійна етика та конфіденційність згідно з нормами Асоціації перекладачів України
- section: 'Теорія перекладу: Еквівалентність та адекватність'
  words: 400
  points:
  - Різниця між еквівалентністю (відповідність значень) та адекватністю (відповідність
    меті)
  - 'Рівні еквівалентності за В. Комісаровим: від мети комунікації до рівня знаків'
  - 'Проблема безеквівалентної лексики: передача культурних реалій та специфічних
    термінів'
  - 'Методи роботи з реаліями: транскрипція, калькування та описовий переклад'
- section: 'Теорія перекладу: Трансформації та прийоми'
  words: 500
  points:
  - 'Лексичні трансформації: конкретизація, генералізація та смисловий розвиток'
  - 'Граматичні трансформації: перестановки, заміни та членування речень'
  - 'Комплексні трансформації: антонімічний переклад та компенсація втраченого змісту'
  - Приклади застосування трансформацій для досягнення природності українського тексту
- section: 'Спеціалізований переклад: Юридична та технічна термінологія'
  words: 600
  points:
  - 'Особливості юридичного дискурсу: формальна логіка, безособовість та стандартні
    кліше'
  - 'Робота з юридичною модальністю: переклад дієслів ''shall'', ''should'', ''may''
    в контрактах'
  - 'Технічний переклад: точність, лаконічність та відповідність ДСТУ 2391:2010'
  - Проблема 'помилкових друзів перекладача' в технічних та юридичних текстах
- section: 'Спеціалізований переклад: Медична етика та термінбази'
  words: 600
  points:
  - 'Медичний переклад: відповідальність, термінологічна уніфікація та роль латини'
  - Створення та ведення термінологічних баз (Termbases) для великих проєктів
  - Інструменти контролю якості термінології в спеціалізованих текстах
  - Роль стандартів ISO у забезпеченні термінологічної єдності професійного перекладу
- section: 'Практика письмового перекладу: CAT-технології та редагування'
  words: 500
  points:
  - 'Принцип роботи CAT-інструментів: Translation Memory (TM) vs Machine Translation
    (MT)'
  - 'Огляд провідних систем: SDL Trados, memoQ та хмарні рішення (Phrase/Memsource)'
  - 'Етапність робочого процесу за стандартом ISO 17100: TEP (Translation-Editing-Proofreading)'
  - Технічне редагування та пост-редагування (MTPE) як нові стандарти індустрії
- section: 'Зразки перекладів: Аналіз та глосарій'
  words: 500
  points:
  - Порівняльний аналіз аутентичних перекладів договорів та специфікацій
  - Аналіз типових перекладацьких помилок та кальок з російської мови
  - Методика уникнення канцеляризмів та русизмів у професійних текстах
  - Укладання робочого глосарію для типового юридичного документа
- section: 'Практика — Письмовий переклад: Юридичний кейс'
  words: 500
  points:
  - 'Покроковий алгоритм перекладу юридичного документа: від аналізу до вичитування'
  - Застосування вивчених трансформацій на практичному прикладі (Contract clause)
  - Вимоги до оформлення фінального тексту згідно з ДСТУ 4163:2020
  - 'Критерії оцінювання якості професійного перекладу: точність, стиль, термінологія'
