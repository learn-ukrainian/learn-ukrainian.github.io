slug: academic-writing-structure
title: 'Наукове письмо: Структура'
word_target: 4000
content_outline:
- section: Розминка — Академічне письмо як жанр
  words: 450
  points:
  - 'Специфіка академічного дискурсу: об''єктивність, точність, верифікованість'
  - Порівняння наукового, ділового та публіцистичного стилів
  - Українська традиція (ДСТУ 3008:2015) vs міжнародні стандарти (APA, Chicago)
- section: 'Структура IMRAD: Логіка дослідження'
  words: 650
  points:
  - 'Introduction (Вступ): постановка проблеми та актуальність (модель CARS)'
  - 'Methods (Методи): деталізація процедур та інструментарію для відтворюваності'
  - 'Results (Результати): об''єктивний виклад даних без інтерпретації'
  - 'Discussion (Обговорення): тлумачення результатів та їх порівняння з іншими роботами'
- section: Розвиток тези та стратегії аргументації
  words: 750
  points:
  - Алгоритм формулювання доказової та спірної наукової тези
  - 'Типи наукової аргументації: дедукція, індукція, аналогія'
  - Робота з контраргументами та спростування альтернативних гіпотез
  - 'Логічна когезія: забезпечення зв''язності між структурними елементами'
- section: 'Академічний стиль: Граматика та регістр'
  words: 850
  points:
  - 'Безособовість як норма: використання пасивних конструкцій та інфінітивів'
  - 'Мистецтво хеджування: використання ''ймовірно'', ''припускається'' для точності'
  - Дискурсивні маркери для переходів та структурування логіки ('водночас', 'натомість')
  - 'Етика цитування: інтеграція парафразу та уникнення плагіату за ДСТУ 8302:2015'
- section: Аналіз зразка наукової статті
  words: 450
  points:
  - Розбір структури реальної статті з соціальних наук за IMRAD
  - Аналіз фразових шаблонів для кожного розділу (фразеологія науковця)
  - Типові лексичні помилки та кальки в академічних текстах (зіставляти vs співставляти)
- section: 'Практика: Проєктування вступу'
  words: 850
  points:
  - 'Кероване написання вступу до статті: від актуальності до мети'
  - Вимоги до формулювання наукової новизни та об'єкта дослідження
  - Редагування та перефразування вступу в академічний регістр
  - Критерії самооцінювання академічного тексту за структурою та стилем
