slug: it-management
title: ІТ-менеджмент
word_target: 4000
content_outline:
- section: Розминка — ІТ як стратегічна функція
  words: 500
  points:
  - Аналіз ролі ІТ-менеджера (CTO/CIO) як стратегічного партнера бізнесу
  - 'Огляд української ІТ-індустрії: від аутсорсингу до продуктових компаній та оборонних
    технологій (DefenseTech)'
  - 'Професійний профіль: синергія технічної експертизи та управлінських компетенцій'
  - 'Вживання термінології: ІТ-управлінець vs ІТ-фахівець, стратегічні вектори розвитку'
- section: Методології управління проєктами
  words: 850
  points:
  - 'Класичний Waterfall (ДСТУ ISO 21502) проти гнучкого Agile: критерії вибору методології'
  - 'Scrum-фреймворк: ролі (Власник продукту, Скрам-майстер), артефакти та церемонії'
