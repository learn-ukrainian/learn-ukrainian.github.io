  words: 800
  points:
  - DevOps як культура взаємодії та автоматизації життєвого циклу розробки
  - 'Впровадження процесів CI/CD: безперервна інтеграція та розгортання застосунків'
  - 'Метрики якості та доступності: розмежування понять SLA, SLO та SLI'
  - 'Управління інцидентами та обсервабільність систем: моніторинг vs логування'
  - 'Термінологія: оркестрування (Kubernetes), контейнеризація, відмовостійкість'
