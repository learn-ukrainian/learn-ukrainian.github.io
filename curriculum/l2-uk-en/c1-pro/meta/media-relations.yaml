slug: media-relations
title: Робота з медіа
word_target: 4000
content_outline:
- section: Медіа як стратегічний стейкхолдер
  words: 600
  points:
  - Роль медіа в управлінні репутацією компанії та особистого бренду керівника
  - 'Огляд українського медіа-середовища: від національних агентств (Укрінформ) до
    ділових видань (Forbes, Економічна правда)'
  - Відмінності між проактивною (формування порядку денного) та реактивною (антикризовою)
    комунікацією
- section: Структура та створення прес-релізу
  words: 800
  points:
  - 'Золотий стандарт структури: заголовок, лід (5W1H), основна частина, цитати та
    бекграундер (boilerplate)'
  - 'ДСТУ 4163:2020: як правильно оформити реквізити офіційного медіа-повідомлення'
  - 'Адаптація контенту під різні типи видань: ділові (цифри та аналітика) проти загальних
    (людські історії)'
- section: Медіакіт та підготовка медіаматеріалів
  words: 400
  points:
  - 'Склад професійного медіакіту: біографії спікерів, фото високої якості, факти
    про компанію та логотипи'
  - Коли варто писати прес-реліз, а коли краще надати коментар або статтю
- section: Майстерність інтерв'ю та техніка Bridging
  words: 900
  points:
  - 'Етапи підготовки: розробка ключових повідомлень (key messages) та прогнозування
    складних питань'
  - 'Техніка Bridging (Метод ABC): Acknowledge (Визнання), Bridge (Перехід), Communicate
    (Повідомлення)'
  - 'Практичні фрази для контролю розмови: «Це важливе питання, водночас...», «Я хотів
    би додати...»'
- section: 'Правила гри: On/Off the Record та Ембарго'
  words: 500
  points:
  - Юридичні та етичні аспекти статусів On the record, Off the record та Background
  - Використання ексклюзивів та дотримання правил ембарго в роботі з ключовими медіа
- section: Проактивні відносини та реагування на негатив
  words: 800
  points:
  - Як побудувати мережу контактів з журналістами (Media Relations) та стати надійним
    джерелом
  - 'Алгоритм реакції на негативні публікації: від офіційного спростування до стратегії
    ігнорування'
  - 'Типові мовні та професійні помилки: аналіз кальок («приймати участь», «піднімати
    питання») та репутаційних провалів'
