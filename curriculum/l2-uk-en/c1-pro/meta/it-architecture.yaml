slug: it-architecture
title: ІТ-архітектура
word_target: 4000
content_outline:
- section: Розминка — Роль архітектора
  words: 400
  points:
  - Розмежування стратегічного (архітектор) та тактичного (розробник) рівнів мислення
  - 'Класифікація ролей: Enterprise, Solution та Technical архітектори згідно з професійними
    стандартами'
  - 'Вплив архітектурних рішень на бізнес-показники: вартість володіння (TCO) та ризики'
- section: 'Системний дизайн: Принципи та патерни'
  words: 800
  points:
  - 'Характеристики якості систем за ДСТУ ISO/IEC 25010: масштабованість, надійність,
    підтримуваність'
  - 'Порівняльний аналіз архітектурних патернів: моноліт, мікросервіси, безсерверні
    обчислення (serverless)'
  - Критерії вибору патерна залежно від розміру команди та навантаження
- section: 'Системний дизайн: Бази даних та API'
  words: 800
  points:
  - 'Вибір стратегії зберігання даних: реляційні (SQL) проти нереляційних (NoSQL)
    рішень'
  - 'Методи масштабування баз даних: шардування (sharding) та реплікація, їхні переваги
    та недоліки'
  - 'Проєкт програмних інтерфейсів (API design): REST, GraphQL та gRPC як інструменти
    міжсервісної взаємодії'
- section: 'Технічна документація: Стандарти та ADR'
  words: 600
  points:
  - 'Методологія документування Architecture Decision Records (ADR): структура ''Контекст
    – Рішення – Наслідки'''
  - 'Візуалізація архітектури за моделлю C4: від системного контексту до коду'
  - Норми оформлення технічних специфікацій та RFC згідно з українськими та міжнародними
    стандартами
- section: Технічне лідерство та комунікація
  words: 600
  points:
  - Мистецтво презентації технічних рішень нетехнічним стейкхолдерам (стейкхолдерам
    за ДСТУ)
  - 'Управління технічним боргом: як пояснити бізнесу необхідність рефакторингу через
    ризики'
  - Проведення архітектурних рев'ю та роль архітектора в менторстві команди
- section: Зразки архітектурної документації
  words: 400
  points:
  - Розбір реального зразка ADR для вибору технологічного стеку
  - Шаблон технічної специфікації з використанням фахової термінології
  - 'Аналіз C4 діаграм: як правильно читати та створювати описи компонентів'
- section: Практика — Архітектурне рішення
  words: 400
  points:
  - 'Написання ADR для кейсу переходу на мікросервісну архітектуру: обґрунтування
    вибору'
  - Використання модальних конструкцій (якщо... то..., у разі... слід...) для опису
    наслідків
  - Критерії оцінювання архітектурної документації за повнотою та несуперечливістю
