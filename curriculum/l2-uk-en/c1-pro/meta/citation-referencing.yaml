slug: citation-referencing
title: Цитування та посилання
word_target: 4000
content_outline:
- section: Розминка — Роль цитування в науці та академічна доброчесність
  words: 400
  points:
  - Значення цитування для побудови наукової репутації та верифікації даних
  - Поняття академічної доброчесності згідно з Законом України «Про освіту»
  - 'Розмежування академічного плагіату та самоплагіату: визначення та наслідки'
- section: 'Стилі цитування: міжнародні стандарти та ДСТУ 8302:2015'
  words: 600
  points:
  - 'Огляд основних міжнародних стилів: APA (соціальні науки), MLA (гуманітарні),
    Vancouver (медицина)'
  - 'Український національний стандарт ДСТУ 8302:2015: сфера застосування та ключові
    вимоги'
  - 'Аналіз структури бібліографічного посилання за ДСТУ: використання розділових
    знаків'
- section: 'Стилі цитування: відмінності та вибір для публікації'
  words: 500
  points:
  - Порівняльний аналіз систем «автор-дата» проти нумерованих посилань
  - Критерії вибору стилю залежно від наукової дисципліни та вимог видання
  - Поняття «Instructions for Authors» та адаптація стилю під конкретний журнал
- section: 'Внутрішньотекстове цитування: прямі цитати та парафраз'
  words: 600
  points:
  - 'Правила прямого цитування: вживання лапок та зазначення номерів сторінок'
  - 'Парафраз та резюмування: як коректно переказувати ідеї автора власними словами'
  - 'Мовні конструкції для введення цитат: «Як зазначає...», «У дослідженні показано...»,
    «Згідно з...»'
- section: 'Внутрішньотекстове цитування: вторинні джерела та групові посилання'
  words: 500
  points:
  - Оформлення посилань на вторинні джерела (цитування через іншого автора)
  - Синтаксис цитування кількох джерел одночасно в межах одного речення
  - Використання скорочень «та ін.», «et al.», «там само» (ibid.) у різних стилях
- section: 'Оформлення списку літератури: структура бібліографічного запису'
  words: 700
  points:
  - 'Оформлення книг, монографій та розділів у збірниках: обов''язкові реквізити'
  - 'Специфіка опису статей у періодичних виданнях: назва, том, випуск, сторінки'
  - 'Цитування електронних джерел: правила оформлення URL, DOI та зазначення дати
    доступу'
  - 'Особливості нетипових джерел: дисертації, патенти, звіти та законодавчі акти'
- section: Інструменти для роботи з цитуванням та автоматизація
  words: 400
  points:
  - Функціональні можливості менеджерів цитувань (Zotero, Mendeley, EndNote)
  - Автоматичне генерування списків літератури та інтеграція з текстовими редакторами
  - Сервіси для перевірки на плагіат та їх роль у забезпеченні якості тексту
- section: Практика — Оформлення цитувань та аналіз типових помилок
  words: 300
  points:
  - Розбір типових русизмів та кальок при оформленні (ссилка, список іспользовaної
    літератури)
  - Аналіз помилок у пунктуації та змішуванні стилів цитування
  - Алгоритм перевірки фінального списку джерел на відповідність вимогам
