slug: change-management
title: Управління змінами
word_target: 4000
content_outline:
- section: Розминка — Чому організації змінюються
  words: 400
  points:
  - 'Аналіз драйверів змін: глобалізація, діджиталізація та реструктуризація в українських
    реаліях'
  - 'Психологія опору: чому ''стабільність'' часто стає перешкодою для розвитку'
  - Роль комунікації як ключового фактора успіху або провалу трансформацій
- section: 'Фреймворки: Модель Джона Коттера'
  words: 450
  points:
  - 'Детальний розбір 8 кроків змін: від створення відчуття терміновості до закріплення
    в культурі'
  - Як формувати 'керівну коаліцію' та залучати агентів змін
  - Стратегія 'швидких перемог' (quick wins) для підтримки мотивації команди
- section: 'Фреймворк ADKAR: Індивідуальний підхід'
  words: 450
  points:
  - 'Обґрунтування моделі: Обізнаність, Бажання, Знання, Здатність, Закріплення'
  - Використання ADKAR для діагностики прогалин у прийнятті змін співробітниками
  - Адаптація західних моделей до менталітету українських колективів
- section: 'Комунікація: Підготовка та Анонсування'
  words: 450
  points:
  - 'Створення відчуття терміновості: як правильно пояснити необхідність змін (business
    case for change)'
  - 'Формулювання ключових меседжів: ''Що? Чому? Як це вплине на мене?'''
  - Вибір каналів комунікації залежно від аудиторії (стейкхолдерів)
- section: 'Комунікація: Впровадження та Підтримка'
  words: 450
  points:
  - 'Супровід процесу: регулярність оновлень та робота з питаннями у реальному часі'
  - Визнання успіхів та святкування проміжних результатів для подолання втоми від
    змін
  - 'Інструменти зворотного зв''язку: опитування, скриньки ідей, фокус-групи'
- section: 'Психологія опору: Типи та Прояви'
  words: 400
  points:
  - Розрізнення активного, пасивного та прихованого опору (саботажу)
  - 'Аналіз причин: від браку інформації до страху втрати статусу чи компетенції'
  - Як розпізнати опір на ранніх стадіях за невербальними ознаками та поведінкою
- section: Стратегії роботи з опонентами змін
  words: 450
  points:
  - 'Перетворення скептиків на союзників: техніка активного слухання та залучення
    до розробки рішень'
  - 'Емпатія в професійному спілкуванні: конструкції для визнання занепокоєння (''Ваші
    побоювання обґрунтовані...'')'
  - Баланс між компромісом та наполегливістю лідера трансформацій
- section: 'Практикум: Зразки професійної комунікації'
  words: 450
  points:
  - 'Аналіз шаблону листа-анонсу про реструктуризацію: розбір структури та тональності'
  - 'Створення ефективного FAQ: як передбачити незручні питання та надати чесні відповіді'
  - Типові мовні та стратегічні помилки в комунікації змін (аналіз кейсів)
- section: 'Практика: План комунікації для нової системи'
  words: 500
  points:
  - 'Завдання: розробка комплексного плану впровадження CRM-системи в компанії'
  - 'Критерії оцінювання: чіткість цілей, відповідність етапам змін, робота з ризиками
    опору'
  - 'Фінальний чек-лист лідера змін: перевірка готовності до запуску'
