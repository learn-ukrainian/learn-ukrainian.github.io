slug: discussion-writing
title: Написання дискусії
word_target: 4000
content_outline:
- section: Розминка — Роль дискусії в науковій роботі
  words: 500
  points:
  - 'Відмінність між розділами ''Результати'' та ''Дискусія'': від опису фактів до
    їхнього осмислення.'
  - Чому дискусія є серцем наукової статті та найскладнішим етапом для автора.
  - 'Стандартна структура дискусії: резюме знахідок, інтерпретація, порівняння, імплікації,
    обмеження.'
- section: Інтерпретація результатів та теоретичне осмислення
  words: 800
  points:
  - Техніки пов'язування отриманих даних із початковими дослідницькими питаннями та
    гіпотезами.
  - 'Робота з аномаліями: як професійно пояснити несподівані або суперечливі результати.'
  - 'Термінологія інтерпретації: конструкції ''це свідчить про...'', ''можна припустити,
    що...''.'
  - Використання модальних засобів (hedging) для забезпечення академічної об'єктивності.
- section: 'Компаративний аналіз: Порівняння з попередніми дослідженнями'
  words: 700
  points:
  - Як коректно позиціонувати свою роботу в контексті існуючої літератури за ДСТУ
    8302:2015.
  - Конструкції для підтвердження ('наші результати узгоджуються з...') та заперечення
    ('на відміну від...').
  - 'Обговорення причин розбіжностей: методологічні відмінності, умови експерименту,
    географічний фактор.'
- section: 'Наукові імплікації: Теоретичне та практичне значення'
  words: 750
  points:
  - 'Формулювання теоретичного внеску: як дослідження доповнює або розширює наукову
    теорію.'
  - 'Практичні рекомендації: від алгоритмів дій до пропозицій для державної політики
    чи бізнесу.'
  - 'Уникнення логічних помилок: як не допустити необґрунтованої генералізації (надмірного
    узагальнення).'
- section: 'Самокритика: Обмеження дослідження та перспективи'
  words: 650
  points:
  - 'Чесне визнання методологічних та емпіричних обмежень: вибірка, час, технічні
    умови.'
  - 'Перетворення обмежень на можливості: формулювання напрямів для майбутніх розвідок.'
  - 'Типові фрази для опису лімітів: ''слід враховувати, що...'', ''незважаючи на...'',
    ''поза межами цього дослідження''.'
- section: Зразок розділу дискусії та практикум з написання
  words: 600
  points:
  - 'Аналіз автентичного тексту дискусії: розбір структури та мовних засобів на реальних
    прикладах.'
  - Вимоги ДСТУ 4163:2020 до оформлення тексту наукового звіту або статті.
  - 'Практичне завдання: написання фрагменту дискусії на основі наданого набору результатів.'
