slug: methodology-writing
title: Опис методології
word_target: 4000
content_outline:
- section: Розминка — Роль розділу методології
  words: 450
  points:
  - Методологія як фундамент наукової довіри та наукового методу
  - 'Принцип відтворюваності (reproducibility): чому деталі мають значення'
  - 'Чек-ліст ідеального розділу: від філософської бази до інструментарію'
  - Термін 'операціоналізація' та його роль у підготовці дослідження
- section: 'Дизайн дослідження: Кількісні та якісні підходи'
  words: 750
  points:
  - 'Кількісний дизайн: структура експерименту, опитування та статистична логіка'
  - 'Яякісний дизайн: глибинні інтерв''ю, етнографічне спостереження та аналіз кейсів'
  - 'Змішані методи (Mixed Methods): стратегії тріангуляції даних'
  - 'Обґрунтування вибору: як довести доцільність обраного підходу'
  - '[!language-note] щодо вживання терміна ''дизайн'' в академічному контексті'
- section: 'Збір даних: Вибірка та інструментарій'
  words: 850
  points:
  - 'Параметри вибірки: генеральна сукупність, репрезентативність та похибка'
  - 'Критерії відбору учасників: інклюзія та ексклюзія (включення/виключення)'
  - 'Розробка інструментарію: валідизація анкет, шкал та протоколів інтерв''ю'
  - '[!example] опису технічних засобів та процедур фіксації даних'
- section: 'Аналіз даних: Від сирих цифр до смислів'
  words: 650
  points:
  - 'Методи статистичної обробки: від дескриптивної статистики до регресії'
  - 'Якісний аналіз: тематичне кодування, контент-аналіз та дискурс-аналіз'
  - Процедура верифікації результатів та уникнення суб'єктивності
  - 'Кліше для опису аналітичних процедур: ''Дані було класифіковано...'', ''Виявлено
    кореляцію...'''
- section: Етика дослідження, валідність та обмеження
  words: 650
  points:
  - 'Етичні стандарти: інформована згода, конфіденційність та анонімність'
  - Робота етичних комісій (IRB) в Україні та світі
  - Валідність (validity) та надійність (reliability) як мірило якості
  - 'Мистецтво визнання обмежень: як описати недоліки дослідження, не знецінюючи його'
- section: 'Зразок розділу методології: Структура та мовні кліше'
  words: 650
  points:
  - Аналіз автентичного фрагмента соціологічного дослідження
  - 'Типові фрази для покрокового опису: ''Збір здійснювався...'', ''Наступним кроком
    стало...'''
  - Приклади обґрунтування методологічних рішень у складних випадках
  - '[!pro-tip] щодо використання пасивних конструкцій на -но, -то'
