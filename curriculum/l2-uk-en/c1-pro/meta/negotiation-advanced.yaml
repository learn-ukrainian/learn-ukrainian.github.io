slug: negotiation-advanced
title: 'Переговори: Високий рівень'
word_target: 4000
content_outline:
- section: 'Розминка: Складні переговори та українська специфіка'
  words: 400
  points:
  - 'Відмінності між базовими та високорівневими переговорами: від позицій до інтересів'
  - 'Український контекст: гнучкість у кризових ситуаціях та роль особистого довіри
    (high-context culture)'
  - 'Аналіз складних сценаріїв: міжнародні договори та залучення стейкголдерів'
- section: 'Багатосторонні переговори: Коаліції та інтереси'
  words: 600
  points:
  - 'Картографування інтересів: техніка Stakeholder Mapping в українському бізнесі'
  - 'Формування та розбиття коаліцій: стратегія ''послідовності ходів'' (sequencing)'
  - 'Пакетні угоди (Package Deals): як поєднувати несумісні на перший погляд вимоги'
- section: 'Стратегії високих ставок: Моделі НАП та ЗМЗ'
  words: 500
  points:
  - 'BATNA (НАП): Аудит власної позиції та посилення альтернатив перед зустріччю'
  - 'ZOPA (ЗМЗ): Розрахунок зони можливої згоди та виявлення точок резервації'
  - 'Мовні засоби для тестування ЗМЗ: використання гіпотетичних питань (''А що, якби...?'')'
- section: 'Психологія переговорів: Тиск, дедлайни та якоріння'
  words: 500
  points:
  - 'Ефект якоріння: як перша пропозиція структурує подальше обговорення'
  - 'Робота під тиском дедлайнів: тактика ''штучного дефіциту часу'' та захист від
    неї'
  - Професійна лексика для обґрунтування часових обмежень (ДСТУ норми лаконічності)
- section: 'Тактики переговорів: Жорсткий vs М''який підхід'
  words: 500
  points:
  - 'Жорсткі тактики: ''хороший/поганий поліцейський'', ультиматуми та блеф'
  - 'М''які тактики: емпатичне слухання, спільні цінності та довгостроковий партнерський
    підхід'
  - Критерії вибору стратегії залежно від типу відносин (транзакційні vs стратегічні)
- section: Контртактики та нейтралізація маніпуляцій
  words: 500
  points:
  - Розпізнавання 'брудних прийомів' та техніка 'відкриття гри' (Naming the Game)
  - 'Мистецтво поступок: коли йти на компроміс, а коли тримати позицію (Hard on the
    problem, soft on the people)'
  - 'Типові мовні помилки в реакціях на тиск: як зберігати професійний реєстр'
- section: 'Зразки сценаріїв: Процес злиття компаній (M&A)'
  words: 600
  points:
  - 'Кейс-стаді: Переговори про придбання активів та інтеграцію команд'
  - Ключові фрази для етапів Due Diligence та фінального підписання угоди
  - Аналіз успішних стратегій та критичних помилок (мовний та стратегічний розріз)
- section: 'Практичний практикум: Тристороння симуляція'
  words: 400
  points:
  - 'Інструктаж до симуляції: спільний інноваційний проєкт трьох компаній'
  - 'Підготовка переговорної карти: інтереси, НАП та ZOPA для кожної сторони'
  - 'Критерії оцінювання: ефективність угоди та чистота мовного реєстру (C1-PRO)'
