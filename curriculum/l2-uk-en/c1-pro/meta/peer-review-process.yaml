slug: peer-review-process
title: Рецензування
word_target: 4000
content_outline:
- section: 'Розминка: Система та етика рецензування'
  words: 450
  points:
  - Роль peer review в академічній репутації та якості науки
  - 'Порівняльний аналіз типів рецензування: сліпе, відкрите, пост-публікаційне'
  - 'Етичні стандарти COPE: конфлікт інтересів та конфіденційність'
- section: 'Написання рецензії: Структура та аналіз'
  words: 550
  points:
  - 'Алгоритм написання професійної рецензії: від резюме до рекомендації'
  - Оцінка наукової новизни та методологічної обґрунтованості
  - Аналіз логіки викладу та візуалізації даних (таблиці, графіки)
- section: 'Написання рецензії: Конструктивна критика'
  words: 600
  points:
  - 'Мистецтво формулювання зауважень: використання ''hedging'' конструкцій'
  - Мовні кліше для позитивної оцінки та вказівок на недоліки
  - Техніка 'сендвіча' у професійному фідбеку рецензента
- section: 'Відповідь на рецензію: Аналіз зауважень'
  words: 500
  points:
  - 'Як інтерпретувати коментарі: від ''несуттєвих'' до ''критичних'''
  - 'Класифікація правок: Major Revisions vs Minor Revisions'
  - Планування стратегії доопрацювання та розподіл ресурсів
- section: 'Відповідь на рецензію: Response Letter'
  words: 700
  points:
  - 'Структура ''Response Letter'': вступ, подяка, аргументація по кожному пункту'
  - Стратегії ввічливої незгоди та захисту авторської позиції
  - Мовні засоби для підтвердження внесених змін (reference to line numbers)
- section: 'Редагування після рецензування: Процес та апеляція'
  words: 400
  points:
  - Технічне відстеження змін (Track Changes) та чистова версія статті
  - 'Повторне подання: супровідні документи для редколегії'
  - 'Процедура апеляції при відхиленні статті: коли це доречно'
- section: 'Зразки рецензій та відповідей: Критичний розбір'
  words: 400
  points:
  - Аналіз автентичних рецензій з міжнародних та українських журналів
  - Розбір типових помилок авторів у листах-відповідях (емоційність vs факти)
  - Порівняння конструктивного та деструктивного фідбеку
- section: 'Практика: Рецензування та відповідь'
  words: 400
  points:
  - Симуляція написання рецензії на наданий фрагмент наукового тексту
  - Написання аргументованої відповіді (Response Letter) на гіпотетичні зауваження
  - Критерії самооцінки професійної комунікації в академічному середовищі
