slug: crisis-communication
title: Кризова комунікація
word_target: 4000
content_outline:
- section: 'Розминка: Природа кризи в сучасному бізнесі'
  words: 400
  points:
  - 'Класифікація криз: операційні, репутаційні та фінансові загрози'
  - 'Чому мовчання — це програш: концепція інформаційного вакууму'
  - 'Кейс-стаді: короткий огляд успішних та провальних українських реакцій на кризи'
- section: 'Фундаментальні принципи: Швидкість та Чесність'
  words: 500
  points:
  - 'Правило ''золотої години'': чому перші 24 години є критичними для репутації'
  - 'Визнання проблеми проти виправдання: як зберегти довіру через прозорість'
  - 'Професійна лексика: вживання конструкцій для визнання (''Ми усвідомлюємо серйозність...'')'
- section: 'Фундаментальні принципи: Емпатія, Послідовність та Проактивність'
  words: 500
  points:
  - 'Фокус на постраждалих: мовні маркери співчуття та підтримки'
  - 'Принцип ''єдиного голосу'': як уникнути суперечливих повідомлень від різних відділів'
  - Проактивне інформування як засіб контролю над наративом
- section: 'Кризова команда: Ролі та алгоритми взаємодії'
  words: 600
  points:
  - 'Склад кризового штабу: від речника (spokesperson) до юридичних консультантів'
  - 'Розподіл обов''язків: хто готує тексти, хто схвалює, хто виступає перед камерами'
  - 'Мовна культура речника: термін ''речник'' vs ''спікер'' в офіційній комунікації'
- section: 'Комунікаційний план: Канали, шаблони та моніторинг'
