    ''завдати шкоди'''
  - Юридичні та репутаційні нюанси формулювання зобов'язань ('Ми вживаємо заходів...')
- section: 'Практика — Кризовий сценарій: Витік персональних даних'
  words: 300
  points:
  - Розробка покрокової комунікації для сценарію кібератаки
  - Написання тексту першої заяви та внутрішнього листа для співробітників
  - 'Критерії оцінювання: швидкість, емпатія, мовна коректність за професійними стандартами'
