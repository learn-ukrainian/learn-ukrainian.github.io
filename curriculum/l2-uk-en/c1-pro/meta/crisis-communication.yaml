  - 'Адаптація повідомлень під різні канали: медіа, соцмережі, внутрішні портали'
  - Інструменти моніторингу репутації в реальному часі
- section: 'Типи кризових повідомлень: Від першої заяви до оновлень'
  words: 600
  points:
  - 'Алгоритм написання першої заяви: визнання ситуації та обіцянка розслідування'
  - 'Динаміка оновлень: як інформувати стейкхолдерів про прогрес без зайвих деталей'
  - Аутентичні приклади фраз для кризових апдейтів ('Ми заблокували доступ...', 'Ми
    посилили моніторинг...')
- section: Зразки кризової комунікації та мистецтво публічного вибачення
  words: 600
  points:
  - 'Аналіз структури ідеального публічного вибачення: без ''вибачаюся'' та ''але'''
