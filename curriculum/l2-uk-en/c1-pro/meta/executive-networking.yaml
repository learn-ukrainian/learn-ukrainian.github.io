slug: executive-networking
title: Виконавчий нетворкінг
word_target: 4000
content_outline:
- section: 'Розминка: Нетворкінг на рівні топ-менеджменту'
  words: 400
  points:
  - Відмінність нетворкінгу C-level від операційного нетворкінгу
  - Поняття соціального капіталу та стратегічної цінності зв'язків
  - 'Специфіка українського бізнес-ландшафту: формальні та неформальні мережі'
- section: 'Стратегія виконавчого нетворкінгу: Картографування та Платформи'
  words: 800
  points:
  - 'Техніка картографування контактів (Networking Mapping): визначення цільової аудиторії'
  - 'Аналіз платформ: бізнес-клуби (CEO Club Ukraine), асоціації (EBA, ACC) та форуми'
  - 'Довгострокові відносини: стратегія переходу від знайомства до партнерства'
  - Принцип взаємності (Reciprocity) та формування власної пропозиції цінності
- section: 'Комунікація з топ-менеджерами: Самопрезентація та Запити'
  words: 1000
  points:
  - 'Бліц-презентація (Elevator Pitch): структура 60-секундного виступу для C-level'
  - 'Етикет запиту на зустріч: як поважати час зайнятих людей та отримувати згоду'
  - Мовні конструкції для офіційного звернення у кличному відмінку
  - 'Мистецтво Small Talk на високому рівні: обговорення макроекономіки та галузевих
    трендів'
- section: 'Виконавчі заходи: Конференції, Вечері та Клуби'
  words: 1000
  points:
  - 'Максимізація користі на конференціях: підготовка, активна участь, занотовування'
  - 'Етикет ділових вечерь та прийомів: вибір тем, мовний супровід, завершення зустрічі'
  - 'Поведінка в закритих клубах та радах директорів: правила гри та довіра'
  - 'LinkedIn для керівників: оптимізація профілю та правила професійного онлайн-зв''язку'
- section: Зразки виконавчої комунікації та типиві помилки
  words: 400
  points:
  - 'Аналіз зразків: лист-знайомство та follow-up після конференції'
  - Застосування ДСТУ 4163:2020 у діловому листуванні (підпис, мова, шрифт)
  - 'Класифікація типових помилок: від мовних суржиків до порушення етикету'
- section: 'Практика: Розробка виконавчого Elevator Pitch'
  words: 400
  points:
  - 'Завдання: Написання сценарію самопрезентації та тексту листа-знайомства'
  - 'Критерії оцінювання: лаконічність, фокус на цінності, професійний тон'
  - Вимоги до мовної чистоти та використання професійної термінології
