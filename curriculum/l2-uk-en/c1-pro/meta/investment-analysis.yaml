slug: investment-analysis
title: Інвестиційний аналіз
word_target: 4000
content_outline:
- section: Інвестиційний клімат та типи інвесторів в Україні
  words: 600
  points:
  - 'Аналіз сучасного інвестиційного клімату України: ризики та перспективи'
  - Порівняння стратегічних, фінансових та венчурних інвесторів (Investment criteria)
  - 'Професійний профіль інвестиційного аналітика: обов''язки та етика'
- section: 'Due Diligence: Технологія комплексної перевірки активів'
  words: 800
  points:
  - 'Фінансовий due diligence: оцінка EBITDA, грошових потоків та боргового навантаження'
  - 'Юридичний та операційний due diligence: перевірка прав власності та бізнес-моделі'
  - Структурування звіту комплексної перевірки (Findings and Red Flags)
- section: 'Оцінка вартості: Методологія DCF та порівняльний аналіз'
  words: 1000
  points:
  - Алгоритм дисконтування грошових потоків (DCF) в українських реаліях
  - Застосування мультиплікаторів (EV/EBITDA, P/E) та метод чистих активів
  - Розрахунок премій та дисконтів (премія за контроль, дисконт на ліквідність)
- section: 'Інвестиційна комунікація: Від Pitch Deck до Term Sheet'
  words: 800
  points:
  - Структура та психологія презентації для інвесторів (Pitch Deck rules)
  - 'Підготовка інвестиційного меморандуму: від Executive Summary до фінансових прогнозів'
  - 'Розбір ключових умов угоди (Term Sheet): Drag-along, Tag-along, Liquidation preference'
- section: Мовні стандарти та кліше професійної документації
  words: 400
  points:
  - Застосування ДСТУ 4163:2020 у підготовці ділових звітів та меморандумів
  - Типові формулювання для інвестиційних переговорів (Negotiation language)
  - Уникнення професійних жаргонізмів та росіянізмів у письмовій комунікації
- section: 'Практичний кейс: Розробка інвестиційної стратегії'
  words: 400
  points:
  - Підготовка структури Executive Summary для реального бізнес-проекту
  - Оцінка інвестиційної привабливості та ідентифікація ризиків
  - Критерії успішного захисту інвестиційної пропозиції
