slug: executive-integration
title: 'Інтеграція: Виконавча комунікація'
word_target: 4000
content_outline:
- section: 'Вступ: Роль СЕО та сценарій інтеграції навичок'
  words: 400
  points:
  - 'Аналіз кейсу: новий СЕО в умовах трансформації бізнесу'
  - Чому інтеграція навичок (soft + hard) є критичною для виконавчого рівня
  - Визначення стратегічних цілей комунікації на перші 100 днів
- section: 'День перший: Знайомство з наглядовою радою та стейкхолдерами'
  words: 700
  points:
  - 'Побудова Elevator pitch: презентація візії та авторитету керівника'
  - Оформлення листа-знайомства (introductory letter) згідно з ДСТУ 4163:2020
  - Етика перших зустрічей з ключовими зацікавленими сторонами
  - Мовні маркери впевненості та відкритості у першому виступі
- section: 'Тиждень перший: Комунікація стратегічних змін та Town Hall'
  words: 850
  points:
