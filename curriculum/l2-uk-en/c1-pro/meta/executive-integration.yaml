  - 'Проведення Town Hall: як донести новий курс всій команді одночасно'
  - Комунікація реструктуризації та непопулярних рішень без втрати довіри
  - 'Техніки Q&A: робота з сумнівами та запереченнями персоналу'
- section: 'Місяць перший: Антикризове управління та комунікація витоку даних'
  words: 600
  points:
  - 'Кризовий сценарій: витік конфіденційних даних клієнтів (data breach)'
  - Алгоритм реагування згідно з міжнародними та українськими нормами
  - 'Написання офіційного прес-релізу про інцидент: факти проти емоцій'
  - Внутрішня комунікація під час кризи для запобігання паніці
- section: 'Місяць перший: Взаємодія з медіа та стратегічне інтерв''ю'
  words: 550
  points:
  - Підготовка до інтерв'ю для провідного ділового видання (Forbes/ЕП)
  - Техніки Bridging та Flagging для спрямування дискусії у потрібне русло
  - Розробка ключових повідомлень (Key Messages) для зовнішньої аудиторії
  - Відповіді на складні та провокативні запитання журналістів
- section: 'Квартал перший: Лідерство, коучинг та управління конфліктами'
  words: 500
  points:
  - Впровадження культури коучингу та менторства для топ-менеджменту
  - Лінгвістичні інструменти конструктивного зворотного зв'язку
  - Медіація міжфункціональних конфліктів на рівні департаментів
  - Побудова довірливих стосунків через активне слухання
- section: 'Підсумок: Портфоліо виконавчої комунікації та рефлексія'
  words: 400
  points:
  - 'Структурування портфоліо: від стратегічних звітів до прес-релізів'
  - Методика самооцінки комунікаційної ефективності керівника
  - Рефлексія на основі конструкцій «Цей досвід дозволив мені...»
  - 'Фіналізація інтегрованого сценарію: готовність до нових викликів'
