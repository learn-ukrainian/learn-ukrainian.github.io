slug: stakeholder-communication
title: Комунікація зі стейкхолдерами
word_target: 4000
content_outline:
- section: 'Хто такі стейкхолдери: класифікація та вплив'
  words: 450
  points:
  - Визначення терміну 'стейкхолдер' та альтернативні назви (зацікавлена сторона)
  - 'Класифікація: внутрішні, зовнішні та ''тіньові'' впливові особи в українському
    контексті'
  - 'Чому комунікація є основою успіху: статистика провалів через брак взаємодії'
- section: 'Аналіз стейкхолдерів: Матриця впливу та інтересу'
  words: 650
  points:
  - 'Матриця Power/Interest: детальний розбір стратегій для кожного квадранту'
  - 'Визначення потреб груп: від фінансових показників до соціальної відповідальності'
  - 'Комунікаційні канали: вибір між офіційним листом за ДСТУ та месенджерами'
  - 'Визначення частоти комунікації: як не перевантажити інформацією'
- section: Мистецтво управління очікуваннями (Expectation Management)
  words: 750
  points:
  - 'Встановлення ''правил гри'' на старті: Definition of Done та межі проєкту'
  - 'Структура професійного статус-репорту: від Executive Summary до ризиків'
  - 'Техніка ''No Surprises'': чому погані новини треба повідомляти негайно'
  - 'Робота зі змінами: як аргументувати зміну обсягу (scope change) або бюджету'
- section: 'Конфлікти та ескалація: складні сценарії комунікації'
  words: 800
  points:
  - Розв'язання конфліктів інтересів між різними групами стейкхолдерів
  - 'Алгоритм роботи з невдоволеним стейкхолдером: від слухання до плану дій'
  - Політична нейтральність та ділова етика в складних корпоративних структурах
  - 'Професійна ескалація: коли і як залучати вище керівництво (Steering Committee)'
- section: 'Практичні зразки: професійна документація'
  words: 700
  points:
  - Аналіз шаблону статус-репорту для різних рівнів менеджменту
  - Зразок листа про зміну термінів з використанням конструкцій пом'якшення
  - Порівняння успішної та невдалої комунікації на прикладі українських кейсів
  - Аналіз типових мовних помилок у професійному листуванні
- section: 'Практикум: Розробка комунікаційного плану'
  words: 650
  points:
  - Покрокова інструкція зі створення Stakeholder Register та Communication Plan
  - Формулювання ключових повідомлень (Key Messages) для різних аудиторій
  - 'Критерії оцінки ефективності комунікації: зворотний зв''язок та KPIs'
