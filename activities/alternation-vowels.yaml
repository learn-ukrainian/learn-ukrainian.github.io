version: "1.0"
module: alternation-vowels
level: b1

inline:
  - id: match-up-alternation-pairs
    type: match-up
    instruction: "З'єднайте форму називного відмінка з правильною формою родового відмінка (тут відбувається чергування та зміна форми слова)."
    pairs:
      - left: "рік"
        right: "року"
      - left: "кінь"
        right: "коня"
      - left: "стіл"
        right: "стола"
      - left: "двір"
        right: "двору"
      - left: "ніс"
        right: "носа"
      - left: "сіль"
        right: "солі"
      - left: "річ"
        right: "речі"
      - left: "осінь"
        right: "осені"

  - id: fill-in-fleeting-vowels
    type: fill-in
    instruction: "Вставте правильну форму слова у відповідному відмінку. Пам'ятайте, що тут є біглий голосний (нуль звука)."
    items:
      - sentence: "Сьогодні чудовий сонячний ____."
        answer: "день"
        options: ["день", "дня", "дню"]
      - sentence: "У мене немає жодного вільного ____."
        answer: "дня"
        options: ["день", "дня", "дню"]
      - sentence: "Надворі дме холодний і сильний ____."
        answer: "вітер"
        options: ["вітер", "вітру", "вітром"]
      - sentence: "Вони швидко сховалися від ____."
        answer: "вітру"
        options: ["вітер", "вітру", "вітром"]
      - sentence: "Цей маленький ____ дуже старанний."
        answer: "учень"
        options: ["учень", "учня", "учню"]
      - sentence: "Вчитель похвалив найкращого ____."
        answer: "учня"
        options: ["учень", "учня", "учню"]
      - sentence: "Він підняв важкий ____ із землі."
        answer: "камінь"
        options: ["камінь", "каменя", "каменю"]
      - sentence: "Тут побудовано міцний паркан із ____."
        answer: "каменя"
        options: ["камінь", "каменя", "каменю"]

  - id: sort-hushing-vowels
    type: group-sort
    instruction: "Розподіліть слова за шиплячим голосним, який пишеться в корені. Зверніть увагу, чи наступний склад твердий, чи м'який (також пам'ятайте про історичні винятки)."
    groups:
      - label: "Пишемо літеру О (перед твердим складом або історично)"
        items: ["пшоно", "чотири", "жонатий", "чоло", "бджола"]
      - label: "Пишемо літеру Е (перед м'яким складом або як виняток)"
        items: ["пшениця", "вечеря", "джерело", "чепурний", "щедрий"]

  - id: error-fix-verb-stems
    type: error-correction
    instruction: "Знайдіть і виправте помилку в дієслові. Пам'ятайте про наголос та чергування при зміні виду."
    items:
      - sentence: "Вона завжди перемогає у цих спортивних змаганнях."
        error: "перемогає"
        correction: "перемагає"
        error_type: "word"
        options: ["перемагає", "переможе", "перемогти"]
        explanation: "Перед наголошеним суфіксом -а- голосний [о] чергується з [а]."
      - sentence: "Коли дуже страшно, моє серце завмерає на секунду."
        error: "завмерає"
        correction: "завмирає"
        error_type: "word"
        options: ["завмирає", "завмре", "завмерти"]
        explanation: "Перед наголошеним суфіксом -а- голосний [е] чергується з [и]."
      - sentence: "Вода продовжує витекати з цієї старої труби."
        error: "витекати"
        correction: "витікати"
        error_type: "word"
        options: ["витікати", "витече", "текти"]
        explanation: "Перед наголошеним суфіксом -а- голосний [е] чергується з [і]."
      - sentence: "Він має погану звичку хопати всі речі зі столу."
        error: "хопати"
        correction: "хапати"
        error_type: "word"
        options: ["хапати", "схопити", "хапає"]
        explanation: "Тривала або повторювана дія вимагає суфікса -а- і чергування [о] на [а]."
      - sentence: "Я обіцяю допомогати тобі з домашнім завданням щодня."
        error: "допомогати"
        correction: "допомагати"
        error_type: "word"
        options: ["допомагати", "допомогти", "допоможу"]
        explanation: "Перед наголошеним суфіксом -а- голосний [о] чергується з [а]."
      - sentence: "Мама просить мене щодня стерати пил з меблів."
        error: "стерати"
        correction: "стирати"
        error_type: "word"
        options: ["стирати", "стерти", "витерти"]
        explanation: "Перед наголошеним суфіксом -а- голосний [е] чергується з [и]."

  - id: quiz-alternation-types
    type: quiz
    instruction: "Визначте, яке саме фонетичне чергування відбувається в цій парі слів. Зверніть увагу на корінь і суфікс."
    items:
      - question: "стіл — стола"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 0
      - question: "день — дня"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 1
      - question: "схопити — хапати"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 2
      - question: "мотор — мотору"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 3
      - question: "річ — речі"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 0
      - question: "вітер — вітру"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 1
      - question: "перемогти — перемагати"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 2
      - question: "атом — атома"
        options: ["[о], [е] з [і] (відкритий/закритий склад)", "біглий голосний (з нулем звука)", "дієслівне чергування", "немає чергування"]
        correct: 3

  - id: error-correction-fix-vowel-spelling-errors-in-sentences
    type: error-correction
    instruction: "Знайдіть і виправте помилку (орфограму) у формі слова. Пам'ятайте про чергування голосних."
    items:
      - sentence: "Я купив новий стіл, але в кімнаті немає вільного місця для цього стіла."
        error: "стіла"
        correction: "стола"
        error_type: "word"
        options: ["стола", "стіл", "столу"]
        explanation: "Коли склад стає відкритим, голосний [і] чергується з [о]."
      - sentence: "Мій улюблений кінь живе в стайні, я щодня годую мого кіня."
        error: "кіня"
        correction: "коня"
        error_type: "word"
        options: ["коня", "кінь", "коню"]
        explanation: "Коли склад стає відкритим, голосний [і] чергується з [о]."
      - sentence: "Ми вчора купили багато корисних річей для нашого дому."
        error: "річей"
        correction: "речей"
        error_type: "word"
        options: ["речей", "річ", "речі"]
        explanation: "Коли склад стає відкритим, голосний [і] чергується з [е]."
      - sentence: "Сьогодні дуже сильний вітер, я завжди боюся цього вітера."
        error: "вітера"
        correction: "вітру"
        error_type: "word"
        options: ["вітру", "вітер", "вітром"]
        explanation: "Це слово має біглий голосний (нуль звука), який випадає у непрямих відмінках."
      - sentence: "У нас у школі з'явився новий учень, ми ще не знаємо цього ученя."
        error: "ученя"
        correction: "учня"
        error_type: "word"
        options: ["учня", "учень", "учню"]
        explanation: "Це слово має біглий голосний, який випадає при зміні форми."
      - sentence: "Ця красива осінь дарує нам багато тепла, я дуже люблю кольори цієї осіні."
        error: "осіні"
        correction: "осені"
        error_type: "word"
        options: ["осені", "осінь", "осінню"]
        explanation: "Коли склад стає відкритим, голосний [і] чергується з [е]."

workbook:
  - type: group-sort
    instruction: "Розподіліть пари слів за типом чергування голосних."
    groups:
      - label: "[о], [е] з [і]"
        items: ["стіл — стола", "кінь — коня", "річ — речі"]
      - label: "Біглий голосний (нуль звука)"
        items: ["день — дня", "вітер — вітру", "садок — садка"]
      - label: "Дієслівне чергування"
        items: ["летіти — літати", "допомогти — допомагати"]
      - label: "Без чергування (винятки)"
        items: ["мотор — мотору", "берег — берега"]

  - type: fill-in
    instruction: "Вставте правильну форму слова (пам'ятайте про відкритий і закритий склад)."
    items:
      - sentence: "Це наш новий великий ____."
        answer: "двір"
        options: ["двір", "двору", "двора"]
      - sentence: "Діти довго гралися посеред ____."
        answer: "двору"
        options: ["двір", "двору", "дворі"]
      - sentence: "У мене заклало ____ через застуду."
        answer: "ніс"
        options: ["ніс", "носа", "носу"]
      - sentence: "Крапля води впала прямо з мого ____."
        answer: "носа"
        options: ["ніс", "носа", "носу"]
      - sentence: "Вона додала у страву перець і ____."
        answer: "сіль"
        options: ["сіль", "солі", "сіллю"]
      - sentence: "У цьому супі зовсім не вистачає ____."
        answer: "солі"
        options: ["сіль", "солі", "сіллю"]
      - sentence: "На столі лежить дуже важлива ____."
        answer: "річ"
        options: ["річ", "речі", "річчю"]
      - sentence: "У моїй сумці немає жодної вашої ____."
        answer: "речі"
        options: ["річ", "речі", "річчю"]

  - type: quiz
    instruction: "Оберіть правильне перевірне слово для перевірки сумнівного голосного."
    items:
      - question: "Яке слово допоможе перевірити літеру «е» в слові «осені»?"
        options: ["осінь", "осінній", "осінню", "осіннє"]
        correct: 0
      - question: "Яке слово допоможе перевірити літеру «о» в слові «стола»?"
        options: ["стіл", "столи", "столом", "столу"]
        correct: 0
      - question: "Яке слово допоможе перевірити літеру «е» в слові «речі»?"
        options: ["річ", "речами", "речовий", "речовина"]
        correct: 0
      - question: "Яке слово допоможе перевірити літеру «о» в слові «носа»?"
        options: ["ніс", "носи", "носовий", "носик"]
        correct: 0
      - question: "Яке слово допоможе перевірити літеру «о» в слові «двору»?"
        options: ["двір", "двори", "надворі", "дворовий"]
        correct: 0
      - question: "Яке слово допоможе перевірити літеру «е» в слові «печі»?"
        options: ["піч", "пекти", "печиво", "печений"]
        correct: 0