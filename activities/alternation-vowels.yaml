version: "1.0"
module: alternation-vowels
level: b1

inline:
  - id: match-up-alternation-pairs
    type: match-up
    instruction: "З'єднайте форму називного відмінка з формою родового відмінка"
    pairs:
      - left: "кінь"
        right: "коня"
      - left: "стіл"
        right: "стола"
      - left: "ніс"
        right: "носа"
      - left: "Київ"
        right: "Києва"
      - left: "річ"
        right: "речі"
      - left: "піч"
        right: "печі"
      - left: "осінь"
        right: "осені"
      - left: "сіль"
        right: "солі"

  - id: fill-in-fleeting-vowels
    type: fill-in
    instruction: "Вставте правильну форму слова з випадним голосним"
    items:
      - sentence: "Старий замок втрачає свій звук і стає формою ____."
        answer: "замка"
        options: ["замка", "замока", "замку"]
      - sentence: "Сьогодні стих сильний вітер, на вулиці немає ____."
        answer: "вітру"
        options: ["вітру", "вітеру", "вітрі"]
      - sentence: "Холодний жовтень у родовому відмінку звучить як ____."
        answer: "жовтня"
        options: ["жовтня", "жовтеня", "жовтні"]
      - sentence: "Після довгого ____ роботи я дуже хочу спати."
        answer: "дня"
        options: ["дня", "деня", "дню"]
      - sentence: "Зелений садок швидко перетворюється на форму ____."
        answer: "садка"
        options: ["садка", "садока", "садку"]
      - sentence: "Коли цей студент іде додому, ми кажемо, що сьогодні немає ____."
        answer: "учня"
        options: ["учня", "ученя", "учні"]
      - sentence: "Цей хлопець у родовому відмінку завжди стає формою ____."
        answer: "хлопця"
        options: ["хлопця", "хлопеця", "хлопці"]
      - sentence: "Ви кидаєте багато ____ у воду."
        answer: "каменя"
        options: ["каменя", "каміня", "камню"]

  - id: sort-hushing-vowels
    type: group-sort
    instruction: "Розподіліть слова залежно від голосної літери після шиплячого"
    groups:
      - label: "Пишемо Е (перед м'яким або И/Е)"
        items: ["пшениця", "вечеря", "джерело", "чекати", "шепіт"]
      - label: "Пишемо О (перед твердим або А/О/У)"
        items: ["пшоно", "чотири", "жонатий", "чоло", "бджола"]

  - id: error-fix-verb-stems
    type: error-correction
    instruction: "Знайдіть і виправте помилку в корені дієслова"
    items:
      - sentence: "Швидка та раптова дія схопати перетворюється на тривалий процес хапати."
        error: "схопати"
        correction: "схопити"
        error_type: "word"
        options: ["схопити", "хапати", "схапати"]
        explanation: "Коротка дія — схопити, а тривала — хапати."
      - sentence: "Слово текти швидко змінюється на витекати."
        error: "витекати"
        correction: "витікати"
        error_type: "word"
        options: ["витікати", "текти", "витекти"]
        explanation: "Поява суфікса '-а-' посилює звук [е] і перетворює його на [і]."
      - sentence: "Дієслово перемогти стає надихальним дієсловом перемогати."
        error: "перемогати"
        correction: "перемагати"
        error_type: "word"
        options: ["перемагати", "перемогти", "переможе"]
        explanation: "Поява суфікса '-а-' перетворює звук [о] на [а]."
      - sentence: "Коротке слово стерти відразу змінюється на стерати."
        error: "стерати"
        correction: "стирати"
        error_type: "word"
        options: ["стирати", "стерти", "зітре"]
        explanation: "Наголошений суфікс '-а-' змінює звук [е] на [и]."
      - sentence: "Дієслово летіти перетворюється на летяти для регулярної дії."
        error: "летяти"
        correction: "літати"
        error_type: "word"
        options: ["літати", "летіти", "летять"]
        explanation: "Суфікс '-а-' вимагає зміни [е] на [і] в корені (літати)."
      - sentence: "Він не міг допомогти, але завжди щиро намагався допомогати."
        error: "допомогати"
        correction: "допомагати"
        error_type: "word"
        options: ["допомагати", "допомогти", "допоможе"]
        explanation: "Суфікс '-а-' витягує останній звук [о] і змінює його на [а]."

  - id: quiz-alternation-types
    type: quiz
    instruction: "Оберіть правильну відповідь щодо типу чергування"
    items:
      - question: "Яке фонетичне чергування відбувається у парі «стіл — стола»?"
        options: 
          - "Звук [і] в закритому складі переходить в [о] або [е] у відкритому."
          - "Це чергування з нулем звука (випадний голосний)."
          - "Чергування [о] з [е] після шиплячих."
          - "Зміна голосного звука через зміну наголосу в дієсловах."
        correct: 0
      - question: "Яке чергування ми бачимо у словах «учень — учня»?"
        options: 
          - "Випадний голосний (чергування з нулем звука)."
          - "Чергування [о], [е] з [і] у закритому складі."
          - "Чергування голосних у дієслівних коренях."
          - "Чергування [о] з [е] після шиплячих."
        correct: 0
      - question: "Чому ми пишемо літеру «е» у слові «пшениця»?"
        options: 
          - "Бо наступний склад має літеру «и», яка акуратно пом'якшує корінь."
          - "Тому що це відкритий склад."
          - "Бо це слово-виняток."
          - "Через перенесення наголосу на закінчення."
        correct: 0
      - question: "Чому дієслово «допомогти» змінює корінь на «допомагати»?"
        options: 
          - "Поява суфікса «-а-» витягує звук [о] і перетворює його на відкритий звук [а]."
          - "Через закритий склад у слові «допомагати»."
          - "Звук [о] є випадним і зникає."
          - "Бо це слово іншомовного походження."
        correct: 0
      - question: "У якому слові НЕ відбувається чергування голосного, бо це виняток (іншомовне походження)?"
        options: 
          - "мотор"
          - "кінь"
          - "ніс"
          - "річ"
        correct: 0
      - question: "Як найкраще перевірити ненаголошений голосний [е] у слові «осені»?"
        options: 
          - "Змінити форму слова так, щоб склад став закритим і з'явилося «і» (осінь)."
          - "Запам'ятати це слово як виняток."
          - "Додати суфікс «-а-» до кореня слова."
          - "Прибрати голосний звук і перевірити ритм слова."
        correct: 0

  - id: error-correction-fix-vowel-spelling-errors-in-sentences
    type: error-correction
    instruction: "Знайдіть і виправте орфографічну помилку в слові"
    items:
      - sentence: "Мій друг живе у місті Кієві."
        error: "Кієві"
        correction: "Києві"
        error_type: "word"
        options: ["Києві", "Кієву", "Київ"]
        explanation: "У відкритому складі звук [і] повертається до свого історичного кореня і стає звуком [е] (на письмі — «є»)."
      - sentence: "Сьогодні немає сильного вітеру."
        error: "вітеру"
        correction: "вітру"
        error_type: "word"
        options: ["вітру", "вітера", "вітрі"]
        explanation: "Звук [е] — це випадний голосний, він повністю зникає у формі родового відмінка."
      - sentence: "Вона купила жовте пшєно."
        error: "пшєно"
        correction: "пшоно"
        error_type: "word"
        options: ["пшоно", "пшена", "пшені"]
        explanation: "Перед твердим звуком [н] та складом з [о] після шиплячого ми пишемо літеру «о»."
      - sentence: "У моїй сумці лежить багато річей."
        error: "річей"
        correction: "речей"
        error_type: "word"
        options: ["речей", "річі", "речам"]
        explanation: "Слово «річ» має закритий склад. У формі «речей» склад відкривається, і звук [і] переходить в [е]."
      - sentence: "Ми поїхали до Каніва на екскурсію."
        error: "Каніва"
        correction: "Канева"
        error_type: "word"
        options: ["Канева", "Каніву", "Каневі"]
        explanation: "Як і в слові Київ, у родовому відмінку склад відкривається і з'являється звук [е] (Канева)."
      - sentence: "Тут біля ліжка немає стілу."
        error: "стілу"
        correction: "столу"
        error_type: "word"
        options: ["столу", "стіла", "столі"]
        explanation: "Слово «стіл» у родовому відмінку змінює форму на «столу» (або «стола»), бо склад відкривається."

workbook:
  - type: fill-in
    instruction: "Вставте правильну форму слова, застосовуючи правило відкритого та закритого складу"
    items:
      - sentence: "Біля печі тихо гріється кіт, але зараз ____ немає біля вікна."
        answer: "кота"
        options: ["кота", "кіта", "коті"]
      - sentence: "Це високий поріг, він залишає вітер по той бік ____."
        answer: "порога"
        options: ["порога", "поріга", "порогу"]
      - sentence: "Широкий двір засипаний снігом, але посеред ____ лежить стежка."
        answer: "двору"
        options: ["двору", "двіру", "двора"]
      - sentence: "Він має довгий ніс, не сунь свого ____ в чужі справи."
        answer: "носа"
        options: ["носа", "ніса", "носу"]
      - sentence: "У мене є нова річ, ми купили річ, але в сумці дуже багато ____."
        answer: "речей"
        options: ["речей", "річей", "речам"]
      - sentence: "Велика біла піч віддає тепло, він гріється біля цієї ____."
        answer: "печі"
        options: ["печі", "пічі", "печю"]
      - sentence: "Це мальовниче село, вона живе в цьому ____."
        answer: "селі"
        options: ["селі", "села", "село"]
      - sentence: "Я хочу додати ____ у цей суп."
        answer: "солі"
        options: ["солі", "сілі", "солю"]

  - type: group-sort
    instruction: "Розподіліть слова за типом чергування у їхніх формах"
    groups:
      - label: "Чергування [о], [е] з [і]"
        items: ["коня", "року", "речі", "стола"]
      - label: "Випадний голосний"
        items: ["дня", "хлопця", "вітру", "учня"]
      - label: "Без чергування (винятки)"
        items: ["мотору", "атома", "берега", "города"]

  - type: true-false
    instruction: "Правда чи ні? Визначте, чи правильне твердження про чергування."
    items:
      - statement: "Голосний [о] в закритому складі часто переходить в [і] (наприклад, форма «стіл»)."
        correct: true
        explanation: "Це класичне правило відкритого та закритого складу."
      - statement: "Слова іншомовного походження (наприклад, «мотор») завжди змінюють [о] на [і] в закритому складі."
        correct: false
        explanation: "У словах іншомовного походження (мотор, атом) чергування взагалі не відбувається."
      - statement: "Ми пишемо літеру «е» після шиплячого, якщо наступний склад має літеру «и» (наприклад, «пшениця»)."
        correct: true
        explanation: "М'який звук «и» впливає на попередній склад і вимагає звука [е]."
      - statement: "Дієслово «допомогти» у недоконаному виді (довга дія) звучить як «допомогити»."
        correct: false
        explanation: "Поява суфікса «-а-» перетворює звук [о] на відкритий звук [а] — «допомагати»."
      - statement: "Випадний голосний зникає, коли ми додаємо до слова закінчення і склад відкривається (наприклад, «день» — «дня»)."
        correct: true
        explanation: "Це ідеальний приклад чергування з нулем звука."
      - statement: "Назва столиці України у родовому відмінку завжди звучить як «Кієва»."
        correct: false
        explanation: "Склад відкривається, тому звук [і] переходить в історичний звук [е] — Києва."

  - type: translate
    instruction: "Оберіть правильний український переклад, звертаючи увагу на чергування голосних"
    items:
      - source: "I bought a horse."
        options:
          - text: "Я купив коня."
            correct: true
          - text: "Я купив кіня."
            correct: false
      - source: "There is no table here."
        options:
          - text: "Тут немає столу."
            correct: true
          - text: "Тут немає стілу."
            correct: false
      - source: "We often go to Kyiv."
        options:
          - text: "Ми часто їздимо до Києва."
            correct: true
          - text: "Ми часто їздимо до Кієва."
            correct: false
      - source: "He always sincerely tried to help."
        options:
          - text: "Він завжди щиро намагався допомагати."
            correct: true
          - text: "Він завжди щиро намагався допомогати."
            correct: false
      - source: "There is no wind today."
        options:
          - text: "Сьогодні немає вітру."
            correct: true
          - text: "Сьогодні немає вітеру."
            correct: false
      - source: "She added salt."
        options:
          - text: "Вона додала солі."
            correct: true
          - text: "Вона додала сілі."
            correct: false

  - type: unjumble
    instruction: "Складіть правильне речення зі слів, звертаючи увагу на форми слів"
    items:
      - words: ["часто", "до", "Я", "Києва.", "їжджу"]
        correct_order: ["Я", "часто", "їжджу", "до", "Києва."]
      - words: ["старий", "Біля", "кіт.", "печі", "гріється"]
        correct_order: ["Біля", "печі", "гріється", "старий", "кіт."]
      - words: ["допомагати.", "щиро", "намагався", "Він", "завжди"]
        correct_order: ["Він", "завжди", "щиро", "намагався", "допомагати."]
      - words: ["Сьогодні", "на", "вітру.", "немає", "вулиці"]
        correct_order: ["Сьогодні", "на", "вулиці", "немає", "вітру."]
      - words: ["хліб.", "лежить", "цього", "поверхні", "стола", "На", "чистій"]
        correct_order: ["На", "чистій", "поверхні", "цього", "стола", "лежить", "хліб."]
      - words: ["випадний", "має", "звук.", "голосний", "Слово"]
        correct_order: ["Слово", "має", "випадний", "голосний", "звук."]