version: "1.0"
module: home-and-daily-life
level: a2

inline:
  - id: fill-in-home-cases
    type: fill-in
    instruction: "Вставте правильну відмінкову форму іменника"
    items:
      - sentence: "Ми зараз відпочиваємо у ______."
        answer: "вітальні"
        options: ["вітальню", "вітальні", "вітальнею"]
      - sentence: "Мій брат читає книгу на ______."
        answer: "балконі"
        options: ["балкон", "балконі", "балкону"]
      - sentence: "Наш кіт солодко спить на ______."
        answer: "дивані"
        options: ["диваном", "дивані", "диван"]
      - sentence: "У новій квартирі немає великого ______."
        answer: "балкона"
        options: ["балкон", "балконі", "балкона"]
      - sentence: "Ми поставимо новий стіл на ______."
        answer: "кухні"
        options: ["кухню", "кухні", "кухнею"]
      - sentence: "Велика подушка лежить на ______."
        answer: "ліжку"
        options: ["ліжку", "ліжко", "ліжком"]
      - sentence: "Мій новий одяг висить у ______."
        answer: "шафі"
        options: ["шафу", "шафі", "шафою"]
      - sentence: "У нашому будинку є багато ______."
        answer: "кімнат"
        options: ["кімнати", "кімнат", "кімнатам"]

  - id: quiz-daily-routine
    type: quiz
    instruction: "Оберіть правильний варіант, щоб доповнити речення про розпорядок дня."
    items:
      - question: "Я завжди встаю _______ сьомій годині."
        options: ["в", "о", "на", "у"]
        correct: 1
      - question: "Ми їдемо на роботу _______."
        options: ["автобусі", "автобусу", "автобусом", "автобуса"]
        correct: 2
      - question: "Вона лягає спати об _______."
        options: ["одинадцята", "одинадцятій", "одинадцяту", "одинадцять"]
        correct: 1
      - question: "Я йду гуляти у парк після _______."
        options: ["обід", "обідом", "обіду", "обіді"]
        correct: 2
      - question: "Вони читають новини перед _______."
        options: ["сном", "сон", "сну", "сні"]
        correct: 0
      - question: "Я ніколи не слухаю музику під час _______."
        options: ["роботи", "робота", "роботу", "роботою"]
        correct: 0
      - question: "Ми смачно обідаємо _______."
        options: ["з друзями", "на друзях", "друзям", "у друзів"]
        correct: 0
      - question: "Я часто ходжу в басейн по _______."
        options: ["суботи", "суботах", "суботам", "суботою"]
        correct: 1

  - id: match-up-activities
    type: match-up
    instruction: "З'єднайте щоденну дію з правильним часом або обставиною."
    pairs:
      - left: "снідати з..."
        right: "родиною"
      - left: "їхати на роботу..."
        right: "машиною"
      - left: "гуляти у парку після..."
        right: "обіду"
      - left: "читати новини перед..."
        right: "сном"
      - left: "не слухати музику під час..."
        right: "роботи"
      - left: "лягати спати пізно..."
        right: "вночі"
      - left: "прокидатися о сьомій..."
        right: "годині"
      - left: "купувати фрукти по..."
        right: "суботах"

  - id: error-correction-cases
    type: error-correction
    instruction: "Знайдіть і виправте помилку у відмінковій формі."
    items:
      - sentence: "У нас немає зручного крісло."
        error: "крісло"
        correction: "крісла"
        error_type: "word"
        options: ["крісла", "кріслу", "кріслом"]
        explanation: "Слово «немає» вимагає родового відмінка (Genitive case)."
      - sentence: "Я їду на роботу на автобусі."
        error: "на автобусі"
        correction: "автобусом"
        error_type: "phrase"
        options: ["автобусом", "в автобусі", "автобусу"]
        explanation: "Для транспорту ми використовуємо орудний відмінок (Instrumental case) без прийменника."
      - sentence: "Ми сидимо за столу у вітальні."
        error: "столу"
        correction: "столом"
        error_type: "word"
        options: ["столом", "стіл", "столі"]
        explanation: "Позиція (де?) вимагає орудного відмінка (Instrumental case) з прийменником «за»."
      - sentence: "Гості із задоволенням пригощаються смачну їжу."
        error: "смачну їжу"
        correction: "смачною їжею"
        error_type: "phrase"
        options: ["смачною їжею", "смачної їжі", "смачній їжі"]
        explanation: "Дієслово «пригощатися» вимагає орудного відмінка (Instrumental case)."
      - sentence: "Я хочу пити каву з молоко."
        error: "молоко"
        correction: "молоком"
        error_type: "word"
        options: ["молоком", "молока", "молоку"]
        explanation: "Прийменник «з» для опису інгредієнтів вимагає орудного відмінка (Instrumental case)."
      - sentence: "Я прокидаюся у сьомій годині."
        error: "у"
        correction: "о"
        error_type: "word"
        options: ["о", "на", "об"]
        explanation: "Для часу (о котрій годині?) ми використовуємо прийменник «о» (або «об»)."

workbook:
  - type: fill-in
    instruction: "Вставте правильну форму дієслова за особою та числом."
    items:
      - sentence: "Вранці я дуже рано ______."
        answer: "прокидаюся"
        options: ["прокидаюсь", "прокидаєшся", "прокидається"]
      - sentence: "О сьомій годині мій чоловік швидко ______."
        answer: "встає"
        options: ["встаю", "встає", "встаємо"]
      - sentence: "Ми разом ______ на світлій кухні."
        answer: "снідаємо"
        options: ["снідаєте", "снідаю", "снідаємо"]
      - sentence: "Мій брат завжди ______ в офісі до п'ятої."
        answer: "працює"
        options: ["працює", "працюють", "працюєш"]
      - sentence: "Після роботи ви ______ смачну вечерю?"
        answer: "готуєте"
        options: ["готуємо", "готуєте", "готують"]
      - sentence: "У будні мої діти ______ спати рано."
        answer: "лягають"
        options: ["лягаю", "лягаємо", "лягають"]

  - type: match-up
    instruction: "З'єднайте прийменник із правильною формою."
    pairs:
      - left: "у світлій..."
        right: "кімнаті"
      - left: "на зручному..."
        right: "дивані"
      - left: "біля великого..."
        right: "вікна"
      - left: "немає зручної..."
        right: "шафи"
      - left: "поставимо новий..."
        right: "стіл"
      - left: "повішу картину на..."
        right: "стіну"
      - left: "сидимо за..."
        right: "столом"
      - left: "п'ю чай з..."
        right: "лимоном"

  - type: unjumble
    instruction: "Складіть правильне речення зі слів."
    items:
      - words: ["дивані.", "кіт", "спить", "на", "Мій"]
        correct_order: ["Мій", "кіт", "спить", "на", "дивані."]
      - words: ["балкона.", "немає", "у", "Мене"]
        correct_order: ["У", "мене", "немає", "балкона."]
      - words: ["їду", "автобусом.", "Я", "роботу", "на"]
        correct_order: ["Я", "їду", "на", "роботу", "автобусом."]
      - words: ["чорний", "чай", "лимоном.", "хочу", "Я", "з"]
        correct_order: ["Я", "хочу", "чорний", "чай", "з", "лимоном."]
      - words: ["шостій", "о", "Він", "встає", "годині."]
        correct_order: ["Він", "встає", "о", "шостій", "годині."]
      - words: ["вікна.", "біля", "великого", "стіл", "Ми", "поставимо"]
        correct_order: ["Ми", "поставимо", "стіл", "біля", "великого", "вікна."]
      - words: ["їжею.", "Гості", "смачною", "пригощаються"]
        correct_order: ["Гості", "пригощаються", "смачною", "їжею."]
