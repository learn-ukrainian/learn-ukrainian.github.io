version: "1.0"
module: sounds-letters-and-hello
level: a1
inline:
  - id: quiz-sounds-vs-letters
    type: quiz
    instruction: "Оберіть правильну відповідь."
    items:
      - question: "Що ми чуємо і вимовляємо?"
        options: ["Звуки", "Літери", "Слова", "Речення"]
        correct: 0
      - question: "Що ми бачимо і пишемо?"
        options: ["Літери", "Звуки", "Рот", "Голос"]
        correct: 0
      - question: "Скільки літер в українській абетці?"
        options: ["33", "38", "32", "30"]
        correct: 0
      - question: "Скільки звуків в українській мові?"
        options: ["38", "33", "32", "40"]
        correct: 0
      - question: "Чи можна говорити «голосна літера»?"
        options: ["Ні, голосні бувають тільки звуки", "Так, це правильна назва", "Тільки для літери А", "Так, завжди"]
        correct: 0
      - question: "Яка літера ніколи не позначає окремого звуку?"
        options: ["Ь (м'який знак)", "Ї", "Щ", "Я"]
        correct: 0

