version: "1.0"
module: sounds-letters-and-hello
level: a1
inline:
  - id: quiz
    type: quiz
    instruction: "Оберіть правильну відповідь."
    items:
      - question: "Що ми чуємо і вимовляємо?"
        options:
          - "звуки"
          - "літери"
          - "слова"
        correct: 0
      - question: "Що ми бачимо і пишемо?"
        options:
          - "звуки"
          - "літери"
          - "повітря"
        correct: 1
      - question: "Скільки літер в українській абетці?"
        options:
          - "30"
          - "33"
          - "38"
        correct: 1
      - question: "Скільки звуків в українській мові?"
        options:
          - "33"
          - "38"
          - "40"
        correct: 1
      - question: "Чи можна говорити «голосна літера»?"
        options:
          - "Так, звичайно."
          - "Ні, голосний — це звук, а не літера."
        correct: 1
      - question: "Яка літера не позначає окремого звуку, а лише пом'якшує попередній приголосний?"
        options:
          - "Я"
          - "Ї"
          - "Ь"
        correct: 2

  - id: match-up
    type: match-up
    instruction: "З'єднайте літеру зі звуком."
    pairs:
      - left: "Літера А"
        right: "Звук [а]"
      - left: "Літера О"
        right: "Звук [о]"
      - left: "Літера У"
        right: "Звук [у]"
      - left: "Літера М"
        right: "Звук [м]"
      - left: "Літера К"
        right: "Звук [к]"
      - left: "Літера Н"
        right: "Звук [н]"

  - id: fill-in
    type: fill-in
    instruction: "Доповніть базовий діалог-привітання."
    items:
      - sentence: "— _____, Софіє!"
        answer: "Привіт"
      - sentence: "— Привіт! Як _____?"
        answer: "справи"
      - sentence: "— _____. А у тебе?"
        answer: "Добре"
      - sentence: "— Чудово. Радий _____!"
        answer: "зустрічі"
      - sentence: "— Добрий _____, учні!"
        answer: "день"
      - sentence: "— Мене _____ Марко."
        answer: "звати"

  - id: group-sort
    type: group-sort
    instruction: "Розподіліть звуки на голосні та приголосні."
    groups:
      - label: "Голосні звуки"
        items:
          - "[а]"
          - "[о]"
          - "[у]"
          - "[е]"
          - "[и]"
          - "[і]"
      - label: "Приголосні звуки"
        items:
          - "[к]"
          - "[м]"
          - "[т]"
          - "[в]"
          - "[н]"
          - "[р]"
          - "[с]"
          - "[х]"

  - id: letter-grid
    type: letter-grid
    letters:
      - upper: "А"
        lower: "а"
      - upper: "Б"
        lower: "б"
      - upper: "В"
        lower: "в"
      - upper: "Г"
        lower: "г"
      - upper: "Ґ"
        lower: "ґ"
