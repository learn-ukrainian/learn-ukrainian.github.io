  - id: watch-and-repeat-vowels
    type: watch-and-repeat
    title: "Голосні звуки"
    instruction: "Подивіться відео, слухайте та повторюйте голосні звуки."
    items:
      - letter: "А"
        video: "hvB3VpcR3ZE"
      - letter: "У"
        video: "VB1O6PmtYRU"
      - letter: "Е"
        video: "KFlsroBW0dk"
      - letter: "И"
        video: "W-1rCu0indE"
      - letter: "І"
        video: "Z9TH0H4ShGo"

  - id: match-letters-to-sounds
    type: match-up
    instruction: "З'єднайте українські літери зі звуками, які вони позначають."
    pairs:
      - left: "А"
        right: "[а]"
      - left: "О"
        right: "[о]"
      - left: "У"
        right: "[у]"
      - left: "М"
        right: "[м]"
      - left: "К"
        right: "[к]"
      - left: "Н"
        right: "[н]"

  - id: sort-vowels-consonants
    type: group-sort
    instruction: "Розподіліть звуки на голосні та приголосні."
    groups:
      - label: "Голосні звуки"
        items:
          - "[а]"
          - "[о]"
          - "[у]"
          - "[е]"
          - "[и]"
          - "[і]"
      - label: "Приголосні звуки"
        items:
          - "[к]"
          - "[м]"
          - "[т]"
          - "[в]"
          - "[н]"
          - "[р]"
          - "[с]"
          - "[х]"

  - id: watch-and-repeat-consonants
    type: watch-and-repeat
    title: "Приголосні звуки"
    instruction: "Подивіться відео, слухайте та повторюйте приголосні звуки."
    items:
      - letter: "М"
        video: "Ez95H4ibuJo"
      - letter: "Н"
        video: "vNUfiKHPYaU"
      - letter: "С"
        video: "7UsFBgSL91E"
      - letter: "К"
        video: "J7sGEI4-xJo"
      - letter: "Л"
        video: "v6-3Xg52Buk"
      - letter: "Р"
        video: "fMGsQ5KPQgg"

  - id: fill-in-greetings
    type: fill-in
    instruction: "Доповніть базовий діалог-привітання. Варіанти: Привіт, справи, Добре, тебе, Чудово, Нормально."
    items:
      - sentence: "— ____! Як справи?"
        answer: "Привіт"
      - sentence: "— Привіт! Як ____?"
        answer: "справи"
      - sentence: "— ____. А у тебе?"
        answer: "Добре"
      - sentence: "— Добре. А у ____?"
        answer: "тебе"
      - sentence: "— ____."
        answer: "Чудово"
      - sentence: "— Нормально. Радий ____!"
        answer: "зустрічі"

workbook:
  - id: sounds-vs-letters-tf
    type: true-false
    instruction: "Визначте, чи правильне твердження."
    items:
      - statement: "В українській абетці 38 літер."
        correct: false
      - statement: "Літера — це графічний знак, який ми бачимо і пишемо."
        correct: true
      - statement: "Звук — це те, що ми чуємо і вимовляємо."
        correct: true
      - statement: "М'який знак (Ь) позначає голосний звук."
        correct: false
      - statement: "Голосні звуки утворюються лише за допомогою голосу."
        correct: true
      - statement: "Можна сказати «голосна літера»."
        correct: false

  - id: syllables-count
    type: count-syllables
    instruction: "Порахуйте кількість складів (кількість голосних звуків) у словах."
    items:
      - word: "мама"
        correct: 2
      - word: "молоко"
        correct: 3
      - word: "дім"
        correct: 1
      - word: "тато"
        correct: 2
      - word: "сон"
        correct: 1
      - word: "око"
        correct: 2

  - id: words-divide
    type: divide-words
    instruction: "Поділіть слова на склади (кожен склад має містити один голосний звук)."
    items:
      - word: "мама"
        answer: "ма-ма"
      - word: "молоко"
        answer: "мо-ло-ко"
      - word: "добре"
        answer: "до-бре"
      - word: "чудово"
        answer: "чу-до-во"
      - word: "тато"
        answer: "та-то"
      - word: "привіт"
        answer: "при-віт"

  - id: scrambled-words
    type: anagram
    instruction: "Розшифруйте слова з поданих літер."
    items:
      - letters: ["о", "м", "о", "к", "л", "о"]
        answer: "молоко"
      - letters: ["т", "а", "о", "т"]
        answer: "тато"
      - letters: ["а", "м", "а", "м"]
        answer: "мама"
      - letters: ["і", "д", "м"]
        answer: "дім"
      - letters: ["о", "с", "н"]
        answer: "сон"
      - letters: ["к", "о", "о"]
        answer: "око"

  - id: greetings-unjumble
    type: unjumble
    instruction: "Складіть слова в правильному порядку, щоб утворити речення."
    items:
      - words: ["справи", "Як"]
        correct_order: ["Як", "справи"]
      - words: ["тебе", "у", "А"]
        correct_order: ["А", "у", "тебе"]
      - words: ["зустрічі", "Рада"]
        correct_order: ["Рада", "зустрічі"]
      - words: ["звати", "Як", "тебе"]
        correct_order: ["Як", "тебе", "звати"]
      - words: ["звати", "Софія", "Мене"]
        correct_order: ["Мене", "звати", "Софія"]
      - words: ["Марко", "звати", "Мене"]
        correct_order: ["Мене", "звати", "Марко"]

  - id: match-vocab
    type: match-up
    instruction: "З'єднайте слова, які підходять одне одному за змістом."
    pairs:
      - left: "Як"
        right: "справи"
      - left: "А у"
        right: "тебе"
      - left: "Мене"
        right: "звати"
      - left: "Радий"
        right: "зустрічі"
      - left: "Голосний"
        right: "звук"
      - left: "М'який"
        right: "знак"