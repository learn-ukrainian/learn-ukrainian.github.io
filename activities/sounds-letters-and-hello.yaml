workbook:
  - id: wb-true-false-phonetics
    type: true-false
    instruction: "Виберіть, чи твердження правдиве, чи хибне."
    items:
      - statement: "В українській мові 33 літери та 38 звуків."
        correct: true
      - statement: "Літера Ь (м'який знак) позначає окремий звук."
        correct: false
      - statement: "Голосні звуки утворюються лише за допомогою голосу."
        correct: true
      - statement: "Можна сказати «голосна літера»."
        correct: false
      - statement: "Літера Я може позначати два звуки."
        correct: true
      - statement: "Приголосні звуки можна проспівати."
        correct: false

  - id: wb-divide-words
    type: divide-words
    instruction: "Поділіть слова на склади (використовуйте дефіс)."
    items:
      - word: "молоко"
        answer: "мо-ло-ко"
      - word: "тато"
        answer: "та-то"
      - word: "мама"
        answer: "ма-ма"
      - word: "добре"
        answer: "до-бре"
      - word: "чудово"
        answer: "чу-до-во"
      - word: "привіт"
        answer: "при-віт"

  - id: wb-count-syllables
    type: count-syllables
    instruction: "Скільки складів у слові? Порахуйте голосні звуки."
    items:
      - word: "нормально"
        correct: 3
      - word: "око"
        correct: 2
      - word: "дім"
        correct: 1
      - word: "тато"
        correct: 2
      - word: "звук"
        correct: 1
      - word: "літера"
        correct: 3

  - id: wb-anagram-vocab
    type: anagram
    instruction: "Розшифруйте слова."
    items:
      - letters:
          - "р"
          - "и"
          - "п"
          - "в"
          - "т"
          - "і"
        answer: "привіт"
      - letters:
          - "б"
          - "о"
          - "р"
          - "д"
          - "е"
        answer: "добре"
      - letters:
          - "в"
          - "у"
          - "о"
          - "д"
          - "ч"
          - "о"
        answer: "чудово"
      - letters:
          - "а"
          - "м"
          - "м"
          - "а"
        answer: "мама"
      - letters:
          - "в"
          - "к"
          - "з"
          - "у"
        answer: "звук"
      - letters:
          - "р"
          - "п"
          - "и"
          - "в"
          - "с"
          - "а"
        answer: "справи"

  - id: wb-unjumble-hello
    type: unjumble
    instruction: "Поставте слова у правильному порядку."
    items:
      - words:
          - "звати"
          - "Мене"
          - "Марко."
        correct_order:
          - "Мене"
          - "звати"
          - "Марко."
      - words:
          - "тебе"
          - "звати?"
          - "Як"
        correct_order:
          - "Як"
          - "тебе"
          - "звати?"
      - words:
          - "справи?"
          - "Як"
        correct_order:
          - "Як"
          - "справи?"
      - words:
          - "у"
          - "А"
          - "тебе?"
        correct_order:
          - "А"
          - "у"
          - "тебе?"
      - words:
          - "Радий"
          - "зустрічі!"
        correct_order:
          - "Радий"
          - "зустрічі!"
      - words:
          - "день,"
          - "Добрий"
          - "учні!"
        correct_order:
          - "Добрий"
          - "день,"
          - "учні!"

  - id: wb-fill-in-greetings
    type: fill-in
    instruction: "Вставте правильні слова з діалогу."
    items:
      - sentence: "— _____, Марко!"
        answer: "Привіт"
      - sentence: "— Як _____ звати?"
        answer: "тебе"
      - sentence: "— Мене _____ Софія."
        answer: "звати"
      - sentence: "— Рада _____!"
        answer: "зустрічі"
      - sentence: "— Як _____?"
        answer: "справи"
      - sentence: "— _____, дякую."
        answer: "Добре"
