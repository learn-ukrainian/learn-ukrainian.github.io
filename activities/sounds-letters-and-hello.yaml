  - id: watch-and-repeat
    type: watch-and-repeat
    instruction: "Подивіться відео, слухайте та повторюйте за викладачем."
    items:
      - letter: "А"
        video: "hvB3VpcR3ZE"
      - letter: "У"
        video: "VB1O6PmtYRU"
