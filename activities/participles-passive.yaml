version: "1.0"
module: participles-passive
level: b1

inline:
  - id: fill-in
    type: fill-in
    instruction: "Вставте правильну граматичну форму у реченнях на тему «Пасивні дієприкметники: значення»."
    items:
      - sentence: "Книга, яку я щойно прочитав — це _____ книга."
        answer: "прочитана"
        options: ["прочитана", "прочитаний", "прочитане", "прочитані"]
      - sentence: "Міст, який збудували минулого року — це _____ міст."
        answer: "збудований"
        options: ["збудований", "збудована", "збудоване", "збудовані"]
      - sentence: "Сорочка, яку вишила бабуся — це _____ сорочка."
        answer: "вишита"
        options: ["вишитий", "вишита", "вишите", "вишиті"]
      - sentence: "Лист, який приніс поштар — це _____ лист."
        answer: "принесений"
        options: ["принесений", "принесена", "принесене", "принесені"]
      - sentence: "Робота, яку ми зробили — це _____ робота."
        answer: "зроблена"
        options: ["зроблений", "зроблена", "зроблене", "зроблені"]
      - sentence: "Двері, які ви відкрили — це _____ двері."
        answer: "відкриті"
        options: ["відкритий", "відкрита", "відкрите", "відкриті"]

  - id: match-up
    type: match-up
    instruction: "З'єднайте інфінітиви з правильними формами пасивних дієприкметників."
    pairs:
      - left: "написати"
        right: "написаний"
      - left: "вивчити"
        right: "вивчений"
      - left: "запросити"
        right: "запрошений"
      - left: "мити"
        right: "митий"
      - left: "посіяти"
        right: "посіяний"
      - left: "взути"
        right: "взутий"
      - left: "принести"
        right: "принесений"

  - id: error-correction
    type: error-correction
    instruction: "Знайдіть і виправте помилки у реченнях на тему творення пасивних дієприкметників. Зверніть увагу на чергування приголосних."
    items:
      - sentence: "Рахунок за воду вже сплатений."
        error: "сплатений"
        correction: "сплачений"
        error_type: "word"
        options: ["сплачений", "сплацний", "сплащений"]
        explanation: "Перед суфіксом -ен- звук [т] переходить у [ч] (сплатити → сплачений)."
      - sentence: "Мама розбудила мене дуже рано, я зараз розбудений."
        error: "розбудений"
        correction: "розбуджений"
        error_type: "word"
        options: ["розбуджений", "розбужений", "розбуданий"]
        explanation: "Перед суфіксом -ен- звук [д] переходить у [дж] (розбудити → розбуджений)."
      - sentence: "Цей луг був скосений ще вчора."
        error: "скосений"
        correction: "скошений"
        error_type: "word"
        options: ["скошений", "скощений", "скосяний"]
        explanation: "Перед суфіксом -ен- звук [с] переходить у [ш] (скосити → скошений)."
      - sentence: "Цей стіл зробений італійським майстром."
        error: "зробений"
        correction: "зроблений"
        error_type: "word"
        options: ["зроблений", "зробленний", "зробляний"]
        explanation: "Після губних приголосних (б, п, в, м, ф) з'являється звук [л] (робити → роблений)."
      - sentence: "Вона була дуже вразена цією несподіваною новиною."
        error: "вразена"
        correction: "вражена"
        error_type: "word"
        options: ["вражена", "враженна", "вразнена"]
        explanation: "Перед суфіксом -ен- звук [з] переходить у [ж] (вразити → вражений)."
      - sentence: "Цей торт замовений на завтрашнє свято."
        error: "замовений"
        correction: "замовлений"
        error_type: "word"
        options: ["замовлений", "замовленний", "замовенний"]
        explanation: "Після губних приголосних з'являється звук [л] (замовити → замовлений)."

  - id: quiz-participle-vs-adjective
    type: quiz
    instruction: "Оберіть правильний варіант: лексика та граматика з розділу «Пасивні дієприкметники: значення»."
    items:
      - question: "У якому реченні виділене слово є ПАСИВНИМ ДІЄПРИКМЕТНИКОМ (результат завершеної дії)?"
        options: ["**Зварена** мамою картопля була дуже смачною.", "На столі лежала звичайна **варена** картопля.", "Я люблю купувати **печений** хліб.", "Мені дуже подобається **солена** риба."]
        correct: 0
      - question: "У якому реченні виділене слово є звичайним ПРИКМЕТНИКОМ (постійна ознака предмета)?"
        options: ["**Варена** картопля — популярна в Україні страва.", "Кава, **зварена** вранці, вже охолола.", "Картина, **написана** місцевим художником, коштує дорого.", "Лист, **принесений** поштарем, лежав на столі."]
        correct: 0
      - question: "Яке слово вказує на результат успішно завершеної дії (доконаний вид)?"
        options: ["пофарбований", "квітучий", "солений", "варений"]
        correct: 0
      - question: "Як правильно утворити пасивний дієприкметник від дієслова «вишити»?"
        options: ["вишитий", "вишиваний", "вишиний", "вишений"]
        correct: 0
      - question: "У якому словосполученні чітко видно ВИКОНАВЦЯ дії (іменник в орудному відмінку)?"
        options: ["випечений пекарем хліб", "варена на воді картопля", "куплений учора зошит", "відкриті ввечері двері"]
        correct: 0
      - question: "Яке з цих слів НЕ є пасивним дієприкметником, а означає постійну характеристику?"
        options: ["солений", "посолений", "заметений", "прочитаний"]
        correct: 0

  - id: reading
    type: reading
    instruction: "Прочитайте текст про пасивні дієприкметники: значення і дайте відповіді на запитання."
    passage: "Маріїнський палац у Києві — це справжній архітектурний шедевр. Сьогодні туристи можуть побачити відреставрований фасад та відновлені розписи на стінах. Кожна кімната палацу має свою історію. Наприклад, у нещодавно відкритій залі висить написана у дев'ятнадцятому столітті картина. Зверніть увагу і на стелю: ця дивовижна ліпнина зроблена талановитими італійськими майстрами, запрошеними до Києва багато років тому. Усі ці збережені інтер'єри допомагають нам відчути атмосферу минулого."
    questions:
      - question: "Який фасад можуть побачити туристи у палаці?"
        options: ["відреставрований", "збудований", "пофарбований", "зачинений"]
        correct: 0
      - question: "Що висить у нещодавно відкритій залі?"
        options: ["написана у XIX столітті картина", "намальована італійцями фреска", "зроблена майстрами ліпнина", "відновлена стара люстра"]
        correct: 0
      - question: "Ким була зроблена ліпнина на стелі?"
        options: ["італійськими майстрами", "місцевими будівельниками", "французькими художниками", "українськими екскурсоводами"]
        correct: 0
      - question: "Який відмінок використовується у фразі «зроблена італійськими майстрами» для позначення виконавця дії?"
        options: ["орудний", "називний", "родовий", "давальний"]
        correct: 0
      - question: "Скільки пасивних дієприкметників у реченні: «У нещодавно відкритій залі висить написана у дев'ятнадцятому столітті картина»?"
        options: ["два (відкритій, написана)", "один (відкритій)", "один (написана)", "три (відкритій, висить, написана)"]
        correct: 0
      - question: "Від якого дієслова утворено пасивний дієприкметник «збережені» (збережені інтер'єри)?"
        options: ["зберегти", "берегти", "зберігати", "оберігати"]
        correct: 0

  - id: essay-response-5
    type: essay-response
    prompt: "Уявіть свою кімнату, улюблене місце або предмет. Напишіть 5 речень з описом, використовуючи пасивні дієприкметники та нову лексику з розділу «Творення пасивних дієприкметників» (наприклад: *пофарбований*, *куплений*, *зроблений*, *відкритий*). Спробуйте використати хоча б один іменник в орудному відмінку для позначення виконавця дії."
    min_words: 50
    model_answer: |
      > [!model-answer]
      > У моїй кімнаті стоїть пофарбований у білий колір стіл. На стіні висить красива картина, написана місцевим художником. На підлозі лежить куплений учора пухнастий килимок. Двері в кімнату завжди відчинені. Цей затишний куточок зроблений з великою любов'ю і турботою.
    evaluation_criteria:
      - "Використано щонайменше 5 речень."
      - "Правильно утворені та узгоджені пасивні дієприкметники."
      - "Використано іменник в орудному відмінку для виконавця дії."
    rubric:
      - criteria: "Граматика"
        description: "Дієприкметники узгоджені в роді, числі та відмінку з відповідними іменниками."
      - criteria: "Лексика"
        description: "Використані слова з теми (пофарбований, написаний, зроблений тощо)."

workbook:
  - type: fill-in
    instruction: "Вставте пасивний дієприкметник у правильному відмінку, узгодивши його з іменником."
    items:
      - sentence: "Ми довго говорили про нещодавно _____ музей."
        answer: "відкритий"
        options: ["відкритий", "відкритого", "відкритому"]
      - sentence: "На столі я не знайшов _____ листа."
        answer: "написаного"
        options: ["написаного", "написаний", "написаному"]
      - sentence: "Бабуся милувалася _____ квітами біля будинку."
        answer: "посадженими"
        options: ["посадженими", "посаджених", "посаджені"]
      - sentence: "Він уважно дивився на _____ стіну."
        answer: "пофарбовану"
        options: ["пофарбовану", "пофарбованої", "пофарбованою"]
      - sentence: "У _____ листі була важлива інформація."
        answer: "принесеному"
        options: ["принесеному", "принесений", "принесеного"]
      - sentence: "Ми так і не подивилися _____ тобою фільму."
        answer: "побаченого"
        options: ["побаченого", "побачений", "побаченому"]

  - type: translate
    instruction: "Оберіть правильний український переклад, звертаючи увагу на пасивні дієприкметники та виконавця дії."
    items:
      - source: "The book read by the student."
        options:
          - text: "прочитана студентом книга"
            correct: true
          - text: "прочитана студента книга"
            correct: false
      - source: "The bridge built by the engineers."
        options:
          - text: "збудований інженерами міст"
            correct: true
          - text: "збудований інженери міст"
            correct: false
      - source: "The letter brought by the postman."
        options:
          - text: "принесений поштарем лист"
            correct: true
          - text: "принесений поштар лист"
            correct: false
      - source: "The table made by the father."
        options:
          - text: "зроблений татом стіл"
            correct: true
          - text: "зроблений тато стіл"
            correct: false
      - source: "The picture painted by the artist."
        options:
          - text: "написана художником картина"
            correct: true
          - text: "написана художник картина"
            correct: false
      - source: "The room cleaned by the brother."
        options:
          - text: "прибрана братом кімната"
            correct: true
          - text: "прибрана брату кімната"
            correct: false

  - type: error-correction
    instruction: "Знайдіть і виправте помилку. Пам'ятайте, що в українській мові короткі форми дієприкметників чоловічого роду (наприклад, «зроблен») не використовуються."
    items:
      - sentence: "Цей важливий лист уже написан."
        error: "написан"
        correction: "написаний"
        error_type: "word"
        options: ["написаний", "написано", "написане"]
        explanation: "В українській мові пасивні дієприкметники чоловічого роду завжди мають повну форму («написаний»)."
      - sentence: "Міст через річку був збудован минулого року."
        error: "збудован"
        correction: "збудований"
        error_type: "word"
        options: ["збудований", "збудована", "збудоване"]
        explanation: "Уникайте коротких форм. Дієприкметник має узгоджуватися з іменником (міст — він)."
      - sentence: "Рахунок за воду вже повністю сплачен."
        error: "сплачен"
        correction: "сплачений"
        error_type: "word"
        options: ["сплачений", "сплачена", "сплачене"]
        explanation: "Рахунок (чоловічий рід), тому використовуємо повну форму «сплачений»."
      - sentence: "Цей документ ще не підписан директором."
        error: "підписан"
        correction: "підписаний"
        error_type: "word"
        options: ["підписаний", "підписано", "підписана"]
        explanation: "Документ (чоловічий рід), тому потрібна повна форма з закінченням -ий."
      - sentence: "Новий магазин нарешті відкрит для відвідувачів."
        error: "відкрит"
        correction: "відкритий"
        error_type: "word"
        options: ["відкритий", "відкрито", "відкриті"]
        explanation: "Магазин (чоловічий рід), використовуємо повну форму «відкритий»."
      - sentence: "Цей цікавий текст був прочитан усіма студентами."
        error: "прочитан"
        correction: "прочитаний"
        error_type: "word"
        options: ["прочитаний", "прочитана", "прочитані"]
        explanation: "Текст (чоловічий рід), тому правильно «прочитаний»."

  - type: group-sort
    instruction: "Розподіліть пасивні дієприкметники за їхніми суфіксами."
    groups:
      - label: "Суфікс -н-"
        items: ["прочитаний", "написаний", "посіяний", "збудований"]
      - label: "Суфікс -ен-"
        items: ["принесений", "зроблений", "сплачений", "запрошений"]
      - label: "Суфікс -т-"
        items: ["митий", "битий", "відкритий", "закритий"]

  - type: unjumble
    instruction: "Складіть правильні речення зі слів. Зверніть увагу на місце пасивного дієприкметника та іменника в орудному відмінку."
    items:
      - words: ["картина,", "художником.", "місцевим", "написана", "Це"]
        correct_order: ["Це", "картина,", "написана", "місцевим", "художником."]
        hint: "Почніть зі слова 'Це', потім іменник, потім означення, і в кінці виконавець."
      - words: ["зроблена", "Вона", "майстрами.", "італійськими"]
        correct_order: ["Вона", "зроблена", "італійськими", "майстрами."]
      - words: ["стіл,", "батьком.", "зроблений", "Тут", "стоїть"]
        correct_order: ["Тут", "стоїть", "стіл,", "зроблений", "батьком."]
      - words: ["Лист,", "вчора,", "на", "столі.", "принесений", "лежав"]
        correct_order: ["Лист,", "принесений", "вчора,", "лежав", "на", "столі."]
      - words: ["фасад", "Ми", "палацу.", "відреставрований", "побачили"]
        correct_order: ["Ми", "побачили", "відреставрований", "фасад", "палацу."]
      - words: ["мамою", "була", "Зварена", "дуже", "картопля", "смачною."]
        correct_order: ["Зварена", "мамою", "картопля", "була", "дуже", "смачною."]