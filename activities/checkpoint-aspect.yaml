version: "1.0"
module: checkpoint-aspect
level: b1

inline:
  - id: quiz
    type: quiz
    instruction: "Визначте вид дієслова та його функцію (тло, подія, результативність, тривалість)."
    items:
      - question: "Яку функцію виконують дієслова у реченні: «Надворі падав сніг, діти гралися у дворі»?"
        options:
          - "Тло розповіді (недоконаний вид)"
          - "Послідовність подій (доконаний вид)"
          - "Нереалізований результат (доконаний вид)"
          - "Загальне заперечення (недоконаний вид)"
        correct: 0
      - question: "Яку функцію виконують дієслова: «Він встав, одягнувся, вийшов з дому і пішов на роботу»?"
        options:
          - "Послідовність подій (доконаний вид)"
          - "Тло розповіді (недоконаний вид)"
          - "Тривалість дії (недоконаний вид)"
          - "Заборона (недоконаний вид)"
        correct: 0
      - question: "Чому в реченні «Коли ми снідали, зателефонувала бабуся» використано різні види дієслів?"
        options:
          - "Раптова подія перериває тривалий процес"
          - "Обидві дії є паралельними і тривалими"
          - "Обидві дії утворюють подієвий ланцюг"
          - "Це загальне заперечення та попередження"
        correct: 0
      - question: "Яка форма є аналітичним майбутнім часом (недоконаний вид)?"
        options:
          - "Буду писати"
          - "Напишу"
          - "Прочитаю"
          - "Зроблю"
        correct: 0
      - question: "Яка форма найкраще підкреслює регулярне повторення дії в майбутньому (тривалість)?"
        options:
          - "Я щодня писатиму щоденник"
          - "Я напишу довгий лист"
          - "Я прочитаю цю статтю"
          - "Я зроблю це завдання"
        correct: 0
      - question: "Який емоційний тон створює недоконаний вид у наказовому способі (наприклад, «Проходьте і сідайте!»)?"
        options:
          - "Ввічливе запрошення або м'яка порада"
          - "Сувора команда або дедлайн"
          - "Стурбоване попередження про небезпеку"
          - "Констатація нереалізованого результату"
        correct: 0
      - question: "Яка функція доконаного виду в наказовому способі (наприклад, «Прочитайте цей текст до завтра!»)?"
        options:
          - "Конкретна команда з очікуванням результату"
          - "Дружня рекомендація на майбутнє"
          - "Загальна інструкція без дедлайну"
          - "Стандартна заборона дії"
        correct: 0
      - question: "Що означає речення «Я не читав цю книгу» (недоконаний вид)?"
        options:
          - "Загальне заперечення: дія ніколи не відбувалася"
          - "Нереалізований результат: намагався, але не зміг"
          - "Свідома відмова: не буду читати в майбутньому"
          - "Попередження про випадкову подію"
        correct: 0
      - question: "Що означає речення «Я не прочитав цю книгу» (доконаний вид)?"
        options:
          - "Нереалізований результат: почав, але не завершив"
          - "Констатація факту: ніколи її не відкривав"
          - "Сувора заборона читати цю книгу"
          - "Загальне заперечення в минулому часі"
        correct: 0
      - question: "Як правильно сформулювати стандартну заборону в українській мові?"
        options:
          - "Завжди використовувати недоконаний вид (Не відчиняйте!)"
          - "Завжди використовувати доконаний вид (Не відчиніть!)"
          - "Використовувати аналітичний майбутній час (Не будете відчиняти!)"
          - "Використовувати просту форму (Не відчините!)"
        correct: 0
      - question: "Яку функцію виконує фраза «Обережно, не впади!» (доконаний вид)?"
        options:
          - "Попередження про випадковий небажаний результат"
          - "Загальне правило або стандартна заборона"
          - "Констатація факту в минулому часі"
          - "Ввічливе запрошення до дії"
        correct: 0
      - question: "Який вид слід обрати в умовному способі для опису тривалої звички у світі фантазій («Якби вона _____ щовечора...»)?"
        options:
          - "Недоконаний вид (дзвонила)"
          - "Доконаний вид (подзвонила)"
          - "Аналітичний майбутній (буде дзвонити)"
          - "Просту форму (подзвонить)"
        correct: 0

  - id: fill-in
    type: fill-in
    instruction: "Оберіть правильний вид дієслова у контексті (минулий, майбутній час, наказовий спосіб, заперечення)."
    items:
      - sentence: "Коли ми _____ (снідали/поснідали), раптом зателефонувала бабуся."
        answer: "снідали"
        options: ["снідали", "поснідали", "снідатимемо", "поснідаємо"]
      - sentence: "Він встав, одягнувся і _____ (йшов/пішов) на роботу."
        answer: "пішов"
        options: ["йшов", "пішов", "ходив", "йтиме"]
      - sentence: "Завтра я весь день _____ (підготуюся/готуватимуся) до складного іспиту."
        answer: "готуватимуся"
        options: ["підготуюся", "готуватимуся", "готувався", "підготувався"]
      - sentence: "Менеджер сказав: «_____ (Пишіть/Напишіть) цей фінансовий звіт до п'ятниці!»"
        answer: "Напишіть"
        options: ["Пишіть", "Напишіть", "Писали", "Написали"]
      - sentence: "Проходьте, будь ласка, і _____ (сядьте/сідайте)!"
        answer: "сідайте"
        options: ["сядьте", "сідайте", "сіли", "сідали"]
      - sentence: "Я довго робив це завдання вчора, але так і не _____ (робив/зробив) його до кінця."
        answer: "зробив"
        options: ["робив", "зробив", "робитиму", "зроблю"]
      - sentence: "Обережно, підлога дуже слизька! Не _____ (падай/впади)!"
        answer: "впади"
        options: ["падай", "впади", "падав", "впав"]
      - sentence: "Будь ласка, не _____ (відчиніть/відчиняйте) вікно, надворі холодно."
        answer: "відчиняйте"
        options: ["відчиніть", "відчиняйте", "відчиняли", "відчинили"]
      - sentence: "Якби я _____ (переїжджав/переїхав) до Києва, я б одразу знайшов нову роботу."
        answer: "переїхав"
        options: ["переїжджав", "переїхав", "переїду", "переїжджатиму"]
      - sentence: "Якби ти _____ (мав/отримав) більше вільного часу постійно, що б ти робив?"
        answer: "мав"
        options: ["мав", "отримав", "матимеш", "отримаєш"]

  - id: group-sort
    type: group-sort
    instruction: "Розподіліть речення або фрази за правильним контекстом виду дієслова."
    groups:
      - label: "Тло розповіді (процес у минулому)"
        items: ["Надворі падав сніг", "Діти гралися у дворі"]
      - label: "Послідовність подій (результат у минулому)"
        items: ["Раптом зателефонувала бабуся", "Він одягнувся і вийшов", "Вона сказала, що приїжджає"]
      - label: "Загальна порада або ввічливе запрошення"
        items: ["Читайте більше українських книжок!", "Проходьте і сідайте!", "Пишіть мені одразу, якщо будуть проблеми"]
      - label: "Конкретна команда або завдання з дедлайном"
        items: ["Напишіть цей звіт до п'ятниці!", "Прочитайте цю статтю до завтра!"]

  - id: error-correction
    type: error-correction
    instruction: "Знайдіть і виправте помилки у вживанні виду в реченнях (розповідь, наказ, заперечення)."
    items:
      - sentence: "Надворі впав сніг, яскраво світило сонце."
        error: "впав"
        correction: "падав"
        error_type: "word"
        options: ["падав", "впадав", "падатиме"]
        explanation: "Для опису тла розповіді (background) використовується недоконаний вид."
      - sentence: "Він вставав, одягнувся, вийшов з дому і пішов на роботу."
        error: "вставав"
        correction: "встав"
        error_type: "word"
        options: ["встав", "встане", "встає"]
        explanation: "Для послідовності завершених подій потрібен доконаний вид (встав)."
      - sentence: "Прочитайте цікаві українські новини щоранку!"
        error: "Прочитайте"
        correction: "Читайте"
        error_type: "word"
        options: ["Читайте", "Прочитуйте", "Читатимете"]
        explanation: "Для регулярної звички (щоранку) та загальної поради використовується недоконаний вид."
      - sentence: "Проходьте до кімнати, будь ласка, і сядьте!"
        error: "сядьте"
        correction: "сідайте"
        error_type: "word"
        options: ["сідайте", "сідали", "сідатимете"]
        explanation: "Ввічливе запрошення вимагає недоконаного виду."
      - sentence: "Обережно, сходи слизькі, не падай!"
        error: "падай"
        correction: "впади"
        error_type: "word"
        options: ["впади", "впадеш", "падатимеш"]
        explanation: "Для емоційного попередження про випадковість (warning) використовується доконаний вид із запереченням."
      - sentence: "Будь ласка, не відчиніть це вікно, працює кондиціонер."
        error: "відчиніть"
        correction: "відчиняйте"
        error_type: "word"
        options: ["відчиняйте", "відчиняли", "відчинятимете"]
        explanation: "Стандартна заборона (prohibition) вимагає недоконаного виду."
      - sentence: "Я не читав цей текст до кінця, бо він занадто довгий і нудний."
        error: "читав"
        correction: "прочитав"
        error_type: "word"
        options: ["прочитав", "прочитував", "читатиму"]
        explanation: "Нереалізований результат (намагався, але не зміг закінчити) передається доконаним видом із запереченням."
      - sentence: "Завтра я напишу цей фінансовий звіт весь день."
        error: "напишу"
        correction: "писатиму"
        error_type: "word"
        options: ["писатиму", "пишу", "написав"]
        explanation: "Для тривалої дії в майбутньому (весь день) використовується недоконаний вид (писатиму або буду писати)."

  - id: match-up
    type: match-up
    instruction: "З'єднайте видові форми дієслів або фрази з їхнім правильним контекстом та функцією."
    pairs:
      - left: "буду писати — напишу"
        right: "тривалість у майбутньому — одноразова мета в майбутньому"
      - left: "сідайте — сядьте"
        right: "ввічливе запрошення — сувора конкретна команда"
      - left: "не читав — не прочитав"
        right: "загальне заперечення (констатація факту) — нереалізований результат"
      - left: "не забувай — не забудь"
        right: "корисна звичка — попередження про випадковість"
      - left: "якби я жив — якби я переїхав"
        right: "тривалий стан у фантазіях — раптова подія у фантазіях"
      - left: "читайте — прочитайте"
        right: "загальна інструкція на майбутнє — завдання з дедлайном"
      - left: "падав — впав"
        right: "тло розповіді — раптова зміна ситуації"
      - left: "робив — зробив"
        right: "довгий процес у минулому — фінальний результат у минулому"

  - id: open-writing
    type: essay-response
    prompt: "Напишіть текст (мінімум 50 слів), у якому ви демонструєте володіння аспектами дієслова (це ваша діагностика). Ваше завдання:\n1) Опишіть свій минулий тиждень, поєднуючи тло розповіді (недоконаний вид) та подієвий ланцюг (доконаний вид).\n2) Напишіть дві загальні поради (недоконаний вид) та дві конкретні команди (доконаний вид) для людини, яка вивчає українську мову.\n3) Складіть одне умовне речення, використовуючи доконаний вид для опису гіпотетичного результату."
    min_words: 50
    evaluation_criteria:
      - "Правильне використання недоконаного виду для опису тла у минулому часі."
      - "Правильне використання доконаного виду для опису завершених подій у минулому часі."
      - "Створення логічного подієвого ланцюга."
      - "Правильне використання недоконаного виду в наказовому способі для порад."
      - "Правильне використання доконаного виду в наказовому способі для конкретних команд."
      - "Наявність умовного речення з доконаним видом."
      - "Відповідність обсягу (мінімум 50 слів)."
      - "Граматична правильність форм дієслів та узгодження часів."

workbook:
  - type: translate
    instruction: "Оберіть правильний український переклад, звертаючи особливу увагу на вид дієслова та результативність."
    items:
      - source: "I didn't read this book at all."
        options:
          - text: "Я не читав цю книгу взагалі."
            correct: true
          - text: "Я не прочитав цю книгу взагалі."
            correct: false
      - source: "I started, but didn't finish reading to the end."
        options:
          - text: "Я почала, але не прочитала до кінця."
            correct: true
          - text: "Я почала, але не читала до кінця."
            correct: false
      - source: "Don't open the window, please!"
        options:
          - text: "Не відчиняйте вікно, будь ласка!"
            correct: true
          - text: "Не відчиніть вікно, будь ласка!"
            correct: false
      - source: "Careful, don't fall!"
        options:
          - text: "Обережно, не впади!"
            correct: true
          - text: "Обережно, не падай!"
            correct: false
      - source: "I will write a long letter tomorrow."
        options:
          - text: "Завтра я напишу довгий лист."
            correct: true
          - text: "Завтра я буду писати довгий лист."
            correct: false
      - source: "Read more interesting Ukrainian books!"
        options:
          - text: "Читайте більше цікавих українських книжок!"
            correct: true
          - text: "Прочитайте більше цікавих українських книжок!"
            correct: false

  - type: true-false
    instruction: "Діагностика: визначте, чи є ці граматичні твердження про вид дієслова правильними."
    items:
      - statement: "Недоконаний вид у минулому часі створює тло розповіді та описує тривалі або паралельні дії."
        correct: true
        explanation: "Саме так: дієслова недоконаного виду формують декорації для вашої історії."
      - statement: "Доконаний вид відповідає на питання «що робив?» і показує неперервну лінію процесу."
        correct: false
        explanation: "Доконаний вид відповідає на питання «що зробив?» і позначає завершену дію або крапку-результат."
      - statement: "Складна форма майбутнього часу (наприклад, читатиму, писатиму) належить до доконаного виду."
        correct: false
        explanation: "Форми на «-му» (складна форма) позначають тривалість і належать до недоконаного виду."
      - statement: "Для ввічливого запрошення, наприклад «Проходьте і сідайте», традиційно використовується недоконаний вид."
        correct: true
        explanation: "Недоконаний вид у наказовому способі пом'якшує тон і звучить як привітне запрошення або загальна порада."
      - statement: "Фраза «Я не прочитав звіт» просто констатує факт того, що людина ніколи не відкривала цей документ."
        correct: false
        explanation: "Це означає нереалізований результат: людина намагалася, але не змогла завершити. Констатація факту — «я не читав»."
      - statement: "Для стандартної заборони дії (наприклад, «Не відчиняйте вікно») в українській мові використовується недоконаний вид."
        correct: true
        explanation: "Недоконаний вид із запереченням у наказовому способі — це заборона: прохання взагалі не починати або зупинити процес."

  - type: unjumble
    instruction: "Складіть правильні речення, звертаючи увагу на видові форми, заперечення та пунктуацію."
    items:
      - words: ["снідали,", "зателефонувала", "Коли", "ми", "бабуся."]
        correct_order: ["Коли", "ми", "снідали,", "зателефонувала", "бабуся."]
      - words: ["цю", "до", "статтю", "п'ятниці!", "Прочитайте"]
        correct_order: ["Прочитайте", "цю", "статтю", "до", "п'ятниці!"]
        hint: "Почніть із дієслова в наказовому способі (конкретна команда)."
      - words: ["слизько,", "Дуже", "не", "впади!"]
        correct_order: ["Дуже", "слизько,", "не", "впади!"]
        hint: "Попередження про випадковість має бути наприкінці."
      - words: ["писатиму", "Наступного", "року", "щоденник.", "я"]
        correct_order: ["Наступного", "року", "я", "писатиму", "щоденник."]
      - words: ["не", "Я", "прочитав", "книжку", "до", "кінця.", "цю"]
        correct_order: ["Я", "не", "прочитав", "цю", "книжку", "до", "кінця."]
        hint: "Це речення описує нереалізований результат."
      - words: ["вікно,", "відчиняйте", "Не", "будь", "ласка!"]
        correct_order: ["Не", "відчиняйте", "вікно,", "будь", "ласка!"]