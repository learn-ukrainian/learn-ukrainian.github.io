version: "1.0"
module: shopping-and-services
level: b1

inline:
  - id: fill-in-shopping-dialogues
    type: fill-in
    instruction: "Доповніть діалоги на ринку та в магазині правильними словами."
    items:
      - sentence: "А ці червоні яблука _____ за ті зелені? — Так, вони дуже смачні."
        answer: "солодші"
        options: ["солодші", "найсолодші", "солодкий"]
      - sentence: "Ця зимова куртка замала. У вас є _____ розмір?"
        answer: "більший"
        options: ["більший", "найбільший", "менший"]
      - sentence: "Доставка цієї поштової служби працює набагато _____, ніж державної."
        answer: "швидше"
        options: ["швидше", "найшвидше", "найшвидший"]
      - sentence: "Я вважаю, що це _____ ательє в нашому місті!"
        answer: "найкраще"
        options: ["найкраще", "краще", "найкращий"]
      - sentence: "Цей светр занадто дорогий. Чи є у вас щось _____?"
        answer: "дешевше"
        options: ["дешевше", "дешевший", "найдешевше"]
      - sentence: "Справжнє фермерське молоко завжди _____ за магазинне."
        answer: "смачніше"
        options: ["смачніше", "найсмачніше", "смачне"]

  - id: quiz-transaction-phrases
    type: quiz
    instruction: "Оберіть правильний варіант для опису фінансових ситуацій."
    items:
      - question: "Що касир повертає вам, якщо ви дали більшу купюру, ніж коштує товар?"
        options: ["решта", "знижка", "чек", "обмін"]
        correct: 0
      - question: "Яким словом ми називаємо паперові гроші або металеві монети?"
        options: ["готівка", "картка", "знижка", "чек"]
        correct: 0
      - question: "Що обов'язково треба зберегти, щоб мати можливість повернути товар у магазин?"
        options: ["чек", "розмір", "гарантію", "додаток"]
        correct: 0
      - question: "Де саме в магазині ви можете одягнути новий одяг перед покупкою, щоб перевірити його?"
        options: ["у примірочній", "на касі", "у вітрині", "на складі"]
        correct: 0
      - question: "Як правильно і граматично точно сказати касиру про ваш спосіб оплати?"
        options: ["я буду платити карткою", "я буду платити з карткою", "я буду платити на картку", "я буду платити через картку"]
        correct: 0
      - question: "Що дає вам офіційне право на безкоштовний ремонт телефону?"
        options: ["гарантія", "готівка", "переказ", "посилка"]
        correct: 0

  - id: sentence-builder-comparison
    type: unjumble
    instruction: "Складіть правильні речення зі слів, порівнюючи різні послуги."
    items:
      - words: ["Укрпошта", "дешевша,", "Нова", "але", "Пошта", "швидша."]
        correct_order: ["Укрпошта", "дешевша,", "але", "Нова", "Пошта", "швидша."]
      - words: ["Ця", "найбільша", "у", "нашому", "книгарня", "місті."]
        correct_order: ["Ця", "книгарня", "найбільша", "у", "нашому", "місті."]
      - words: ["Цей", "працює", "найшвидше", "з", "майстер", "усіх."]
        correct_order: ["Цей", "майстер", "працює", "найшвидше", "з", "усіх."]
      - words: ["доставка", "буде", "Яка", "для", "нас?", "найвигідніша"]
        correct_order: ["Яка", "доставка", "буде", "найвигідніша", "для", "нас?"]
      - words: ["за", "молоко", "магазинне.", "смачніше", "Домашнє"]
        correct_order: ["Домашнє", "молоко", "смачніше", "за", "магазинне."]
      - words: ["щось", "знайти", "хоче", "Він", "дешевше."]
        correct_order: ["Він", "хоче", "знайти", "щось", "дешевше."]

  - id: match-up-agent-workplace
    type: match-up
    instruction: "З'єднайте назву професії людини з місцем, де вона зазвичай працює."
    pairs:
      - left: "пекар"
        right: "пекарня"
      - left: "перукар"
        right: "перукарня"
      - left: "кравець"
        right: "ательє"
      - left: "касир"
        right: "каса"
      - left: "оператор"
        right: "поштове відділення"
      - left: "майстер"
        right: "майстерня"

  - id: dialogue-completion-complaint
    type: order
    instruction: "Розставте репліки діалогу в правильному порядку (повернення бракованого товару)."
    items:
      - "— Добрий день! Я хочу повернути цей блендер. Він бракований."
      - "— Добрий день. А що саме з ним не так? Ви його вмикали?"
      - "— Так, він просто не працює. Ось мій чек та коробка."
      - "— Розумію, але треба залишити його на експертизу."
      - "— Це неприйнятно. Відповідно до закону, ви зобов'язані повернути кошти."
      - "— Якщо ви відмовляєте, я напишу офіційну скаргу."
    correct_order: [0, 1, 2, 3, 4, 5]

  - id: free-write-service-review
    type: essay-response
    instruction: "Напишіть відгук про послугу"
    prompt: "Уявіть, що ви нещодавно відвідали нову кав'ярню, перукарню або майстерню. Напишіть короткий відгук (5-7 речень) про цей заклад. Обов'язково порівняйте його з іншими подібними місцями, використовуючи ступені порівняння прикметників (наприклад, 'кава тут смачніша, але ціни вищі')."
    min_words: 50
    model_answer: "Я хочу залишити відгук про нову кав'ярню на нашій вулиці. Вона набагато більша і світліша за стару кав'ярню біля метро. Тут працюють дуже швидкі баристи, тому обслуговування найкраще в нашому районі. Ціни на каву трохи вищі, але якість десертів значно краща. Єдиний мінус — тут завжди дуже галасливо. Проте я вважаю, що це найприємніше місце для ранкової кави. Я щиро рекомендую його всім друзям."
    evaluation_criteria:
      - "Текст містить 5-7 речень і відповідає темі відгуку про заклад."
      - "Використано щонайменше три прикметники або прислівники вищого/найвищого ступеня порівняння."
      - "Словниковий запас включає лексику з теми 'Послуги'."
    rubric:
      - criteria: "Зміст і структура"
        description: "Відгук логічний, містить опис закладу, його сильні та слабкі сторони."
      - criteria: "Граматика (порівняння)"
        description: "Правильно утворені та використані ступені порівняння прикметників."

workbook:
  - type: error-correction
    instruction: "Знайдіть і виправте одну помилку в кожному реченні."
    items:
      - sentence: "Я сьогодні буду платити з карткою, бо не маю готівки."
        error: "з карткою"
        correction: "карткою"
        error_type: "phrase"
        options: ["карткою", "через картку", "на картку"]
        explanation: "Для оплати ми використовуємо орудний відмінок без прийменника 'з'."
      - sentence: "Дайте мені, будь ласка, півкіла свіжих помідор."
        error: "помідор"
        correction: "помідорів"
        error_type: "word"
        options: ["помідорів", "помідори", "помідора"]
        explanation: "У родовому відмінку множини іменники чоловічого роду на твердий приголосний мають закінчення -ів."
      - sentence: "У цьому банку самий кращий курс валют у місті."
        error: "самий кращий"
        correction: "найкращий"
        error_type: "phrase"
        options: ["найкращий", "кращий", "більш кращий"]
        explanation: "В українській мові для найвищого ступеня порівняння використовується префікс 'най-', а слово 'самий' тут є русизмом."
      - sentence: "Ми дуже довго чекали нашого доставку."
        error: "нашого"
        correction: "нашу"
        error_type: "word"
        options: ["нашу", "наші", "наш"]
        explanation: "Слово 'доставка' — жіночого роду."
      - sentence: "Ці червоні яблука більш солодші за ті зелені."
        error: "більш солодші"
        correction: "солодші"
        error_type: "phrase"
        options: ["солодші", "більш солодкі", "найсолодші"]
        explanation: "Не можна поєднувати слово 'більш' і просту форму вищого ступеня з суфіксом -ш- / -іш-."
      - sentence: "Нова Пошта доставляє посилки найшвидший."
        error: "найшвидший"
        correction: "найшвидше"
        error_type: "word"
        options: ["найшвидше", "найшвидша", "найшвидші"]
        explanation: "Тут потрібен прислівник (відповідає на питання 'як?'), а не прикметник."

  - type: true-false
    instruction: "Визначте, чи відповідає твердження тексту (Правда чи Ні)."
    items:
      - statement: "На українському базарі прийнято торгуватися, якщо ви берете багато товару."
        correct: true
        explanation: "Текст зазначає: 'якщо ви плануєте купити досить багато різноманітних продуктів... торг є цілком прийнятним'."
      - statement: "На ринку всі ціни суворо фіксовані на надрукованих цінниках."
        correct: false
        explanation: "Фіксовані ціни — це особливість супермаркетів, а не базару."
      - statement: "Приватна пошта зазвичай швидша за державну, але коштує дорожче."
        correct: true
        explanation: "Нова Пошта швидша, але дорожча за Укрпошту."
      - statement: "Слово 'рахунок' у родовому відмінку завжди має лише закінчення -у."
        correct: false
        explanation: "Воно має форму 'рахунка' (документ на оплату) та 'рахунку' (банківський баланс)."
      - statement: "Щоб повернути бракований товар, вам потрібен лише чек, а коробка не обов'язкова."
        correct: false
        explanation: "Текст підкреслює: 'вам завжди потрібен чек та оригінальне упакування (коробка)'."
      - statement: "Слово 'ательє' запозичене з іншої мови і не змінює своїх закінчень."
        correct: true
        explanation: "За правилами, це невідмінюваний іменник іншомовного походження."

  - type: translate
    instruction: "Оберіть правильний український переклад для типових розмовних фраз."
    items:
      - source: "What is your final price?"
        options:
          - text: "Яка ваша остання ціна?"
            correct: true
          - text: "Яка ваша перша ціна?"
            correct: false
          - text: "Скільки це коштує?"
            correct: false
      - source: "Is it possible to be a bit cheaper?"
        options:
          - text: "Чи можна трохи дешевше?"
            correct: true
          - text: "Чи є у вас щось дорожче?"
            correct: false
          - text: "Ви можете дати знижку?"
            correct: false
      - source: "I will pay with cash today."
        options:
          - text: "Я сьогодні буду платити готівкою."
            correct: true
          - text: "Я сьогодні розрахуюся карткою."
            correct: false
          - text: "Я сьогодні заплачу переказом."
            correct: false
      - source: "Keep the change."
        options:
          - text: "Решти не треба."
            correct: true
          - text: "Дайте мені здачу."
            correct: false
          - text: "Поверніть мої гроші."
            correct: false
      - source: "I want to return this product because it is defective."
        options:
          - text: "Я хочу повернути цей товар, бо він бракований."
            correct: true
          - text: "Я хочу купити цей товар, бо він зламаний."
            correct: false
          - text: "Я хочу полагодити цей товар, бо він працює."
            correct: false
      - source: "How much does one kilogram cost?"
        options:
          - text: "Скільки коштує один кілограм?"
            correct: true
          - text: "Яка ціна за півкіла?"
            correct: false
          - text: "Де тут ваги?"
            correct: false

  - type: match-up
    instruction: "З'єднайте слова-антоніми (протилежні за значенням)."
    pairs:
      - left: "свіжий"
        right: "зіпсований"
      - left: "швидкий"
        right: "повільний"
      - left: "галасливий"
        right: "спокійний"
      - left: "завеликий"
        right: "замалий"
      - left: "найкращий"
        right: "найгірший"
      - left: "дешевший"
        right: "дорожчий"