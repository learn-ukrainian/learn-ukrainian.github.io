version: "1.0"
module: b1-baseline-future-aspect
level: b1

inline:
  - id: quiz-aspect-identification
    type: quiz
    instruction: "Визначте вид і час виділеного дієслова."
    items:
      - question: "Завтра я обов'язково **напишу** цей лист."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 0
      - question: "Зараз я **читаю** новий підручник."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 3
      - question: "Увечері ми **будемо працювати** над проектом."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 1
      - question: "Ти **скажеш** мені правду?"
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 0
      - question: "Я **сподіваюся**, що все буде добре."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 3
      - question: "Вони **житимуть** у Харкові."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 1
      - question: "Я **візьму** твій словник на один день."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 0
      - question: "Ми довго **малюємо** цей плакат."
        options:
          - "Доконаний вид (майбутній час)"
          - "Недоконаний вид (майбутній час)"
          - "Доконаний вид (теперішній час)"
          - "Недоконаний вид (теперішній час)"
        correct: 3

  - id: match-up-aspect-pairs
    type: match-up
    instruction: "З'єднайте дієслова недоконаного та доконаного виду (утворіть видові пари)."
    pairs:
      - left: "писати"
        right: "написати"
      - left: "читати"
        right: "прочитати"
      - left: "робити"
        right: "зробити"
      - left: "малювати"
        right: "намалювати"
      - left: "їсти"
        right: "поїсти"
      - left: "говорити"
        right: "сказати"
      - left: "брати"
        right: "взяти"
      - left: "відповідати"
        right: "відповісти"

  - id: group-sort-future-forms
    type: group-sort
    instruction: "Розподіліть дієслова за формами майбутнього часу."
    groups:
      - label: "Проста форма (доконаний вид)"
        items: ["напишу", "зробимо", "скаже", "візьмете"]
      - label: "Складна форма (недоконаний вид)"
        items: ["читатиму", "малюватимеш", "працюватимуть"]
      - label: "Складена форма (недоконаний вид)"
        items: ["буду писати", "будемо робити", "будуть говорити"]

  - id: fill-in-future-choice
    type: fill-in
    instruction: "Вставте правильну форму дієслова в майбутньому часі."
    items:
      - sentence: "Завтра я цілий вечір ____ книгу."
        answer: "читатиму"
        options: ["прочитаю", "читатиму", "прочитатиму"]
      - sentence: "Я обіцяю, що обов'язково ____ цей розділ до завтра."
        answer: "прочитаю"
        options: ["читатиму", "буду читати", "прочитаю"]
      - sentence: "Хто швидко ____ квитки на поїзд для нашої подорожі?"
        answer: "купить"
        options: ["купить", "буде купувати", "купуватиме"]
      - sentence: "Ми ____ на тебе біля театру півгодини, не поспішай."
        answer: "будемо чекати"
        options: ["зачекаємо", "будемо чекати", "почекаємо"]
      - sentence: "Вона ____ це завдання і покаже нам готовий результат."
        answer: "зробить"
        options: ["зробить", "робитиме", "буде робити"]
      - sentence: "Вони щодня ____ на заняття до кінця року."
        answer: "ходитимуть"
        options: ["ходитимуть", "підуть", "прийдуть"]
      - sentence: "Ти ____ мені свій секрет, чи будеш мовчати?"
        answer: "скажеш"
        options: ["говоритимеш", "скажеш", "будеш говорити"]
      - sentence: "Наступного тижня ми ____ в Карпатах і милуватимемося горами."
        answer: "будемо відпочивати"
        options: ["відпочинемо", "будемо відпочивати", "відпочили"]

  - id: error-correction-aspect-tense
    type: error-correction
    instruction: "Знайдіть і виправте граматичну помилку у реченні."
    items:
      - sentence: "Я зараз прочитаю дуже цікаву книгу."
        error: "прочитаю"
        correction: "читаю"
        error_type: "word"
        options: ["читаю", "прочитав", "прочитати"]
        explanation: "Слово «зараз» вказує на теперішній час, тому потрібен недоконаний вид."
      - sentence: "Завтра я буду зробити домашнє завдання."
        error: "зробити"
        correction: "робити"
        error_type: "word"
        options: ["робити", "зроблю", "робила"]
        explanation: "Після допоміжного дієслова «бути» завжди використовується інфінітив недоконаного виду."
      - sentence: "Завтра я буду намалювати красиву картину."
        error: "намалювати"
        correction: "малювати"
        error_type: "word"
        options: ["малювати", "малюю", "малював"]
        explanation: "Складена форма утворюється тільки з дієсловами недоконаного виду («буду малювати»)."
      - sentence: "Я обіцяю, що я писатиму тобі цей лист і ти його отримаєш."
        error: "писатиму"
        correction: "напишу"
        error_type: "word"
        options: ["напишу", "буду писати", "пишу"]
        explanation: "Обіцянка і конкретний результат вимагають простої форми доконаного виду."
      - sentence: "Вони прочитатимуть цю книгу до кінця тижня."
        error: "прочитатимуть"
        correction: "прочитають"
        error_type: "word"
        options: ["прочитають", "читатимуть", "будуть читати"]
        explanation: "Дієслова доконаного виду (прочитати) не мають складної форми із закінченням «-муть»."
      - sentence: "Вона відповістиме на всі ваші запитання."
        error: "відповістиме"
        correction: "відповість"
        error_type: "word"
        options: ["відповість", "відповідатиме", "відповідає"]
        explanation: "Від дієслів доконаного виду (відповісти) утворюється лише проста форма майбутнього часу («відповість»)."

  - id: free-write-future-plans
    type: essay-response
    prompt: "Напишіть 5-7 речень про свої плани на наступний тиждень. Використайте всі три форми майбутнього часу (просту, складну та складену) і дієслова обох видів."
    min_words: 50
    model_answer: "Наступного тижня я буду багато працювати. У понеділок я почну новий проект. Я читатиму статті та шукатиму інформацію. У середу я обов'язково напишу звіт. Увечері я відпочиватиму. Я обіцяю, що зроблю всі завдання до п'ятниці. На вихідних ми з друзями поїдемо в гори."

workbook:
  - type: translate
    instruction: "Оберіть правильний переклад речення."
    items:
      - source: "I will write the report tomorrow. (focus on result)"
        options:
          - text: "Я напишу звіт завтра."
            correct: true
          - text: "Я писатиму звіт завтра."
            correct: false
          - text: "Я буду писати звіт завтра."
            correct: false
      - source: "We will be working all day."
        options:
          - text: "Ми будемо працювати цілий день."
            correct: true
          - text: "Ми попрацюємо цілий день."
            correct: false
          - text: "Ми зробимо роботу цілий день."
            correct: false
      - source: "She will answer all questions."
        options:
          - text: "Вона відповість на всі запитання."
            correct: true
          - text: "Вона відповідатиме на всі запитання."
            correct: false
          - text: "Вона буде відповідати на всі запитання."
            correct: false
      - source: "They will be reading this book."
        options:
          - text: "Вони читатимуть цю книгу."
            correct: true
          - text: "Вони прочитають цю книгу."
            correct: false
          - text: "Вони прочитатимуть цю книгу."
            correct: false
      - source: "I will buy tickets for the train."
        options:
          - text: "Я куплю квитки на поїзд."
            correct: true
          - text: "Я буду купувати квитки на поїзд."
            correct: false
          - text: "Я купуватиму квитки на поїзд."
            correct: false
      - source: "You will be resting on the sea."
        options:
          - text: "Ти відпочиватимеш на морі."
            correct: true
          - text: "Ти відпочинеш на морі."
            correct: false
          - text: "Ти будеш відпочити на морі."
            correct: false

  - type: unjumble
    instruction: "Складіть правильне речення зі слів."
    items:
      - words: ["обов'язково", "Я", "тобі", "завтра.", "зателефоную"]
        correct_order: ["Я", "обов'язково", "зателефоную", "тобі", "завтра."]
      - words: ["читатимуть", "весь", "Студенти", "вечір.", "книгу"]
        correct_order: ["Студенти", "читатимуть", "книгу", "весь", "вечір."]
      - words: ["будемо", "чекати", "Ми", "біля", "театру.", "тебе"]
        correct_order: ["Ми", "будемо", "чекати", "тебе", "біля", "театру."]
      - words: ["завдання.", "Вони", "швидко", "зроблять", "це"]
        correct_order: ["Вони", "швидко", "зроблять", "це", "завдання."]
      - words: ["ти", "Коли", "результат?", "покажеш", "мені"]
        correct_order: ["Коли", "ти", "покажеш", "мені", "результат?"]
      - words: ["буду", "до", "працювати", "вечора.", "Я", "пізнього"]
        correct_order: ["Я", "буду", "працювати", "до", "пізнього", "вечора."]

  - type: true-false
    instruction: "Прочитайте твердження про майбутній час і визначте, правда це чи ні."
    items:
      - statement: "Дієслова доконаного виду мають форми всіх трьох часів: минулого, теперішнього і майбутнього."
        correct: false
        explanation: "Дієслова доконаного виду не мають теперішнього часу."
      - statement: "Проста форма майбутнього часу утворюється тільки від дієслів доконаного виду."
        correct: true
        explanation: "Так, дієслова доконаного виду мають лише одну, просту форму майбутнього часу (наприклад, «напишу»)."
      - statement: "Складена (аналітична) форма майбутнього часу утворюється за допомогою допоміжного дієслова «бути» та інфінітива."
        correct: true
        explanation: "Так, ця форма вимагає двох слів (наприклад, «буду читати»)."
      - statement: "Складна (синтетична) форма майбутнього часу (наприклад, «читатиму») використовується і для доконаного, і для недоконаного виду."
        correct: false
        explanation: "Ця форма використовується виключно для дієслів недоконаного виду."
      - statement: "У складеній формі зворотних дієслів (із часткою «-ся») частка додається до дієслова «бути» (наприклад, «будуся повертати»)."
        correct: false
        explanation: "Частка «-ся» ніколи не відривається від інфінітива: правильно казати «буду повертатися»."
      - statement: "Форми «буду читати» та «читатиму» є синонімами і мають однакове значення (недоконаний вид)."
        correct: true
        explanation: "Вони обидві означають тривалу дію в майбутньому і є повністю взаємозамінними."
