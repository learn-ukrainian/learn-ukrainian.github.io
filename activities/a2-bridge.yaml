version: "1.0"
module: a2-bridge
level: a2

inline:
  - id: quiz-case-identification-drill
    type: quiz
    instruction: "Визначте відмінок виділеного слова"
    items:
      - question: "Я живу в **гуртожитку**."
        options: ["Місцевий", "Знахідний", "Називний", "Кличний"]
        correct: 0
      - question: "Я дуже люблю **Україну**."
        options: ["Знахідний", "Називний", "Місцевий", "Кличний"]
        correct: 0
      - question: "**Олю**, підійди сюди!"
        options: ["Кличний", "Називний", "Знахідний", "Місцевий"]
        correct: 0
      - question: "Ми допомагаємо новому **учневі**."
        options: ["Давальний", "Місцевий", "Знахідний", "Називний"]
        correct: 0
      - question: "Він бачить іншого **студента**."
        options: ["Знахідний", "Називний", "Кличний", "Місцевий"]
        correct: 0
      - question: "Мій старший **брат** працює."
        options: ["Називний", "Знахідний", "Кличний", "Місцевий"]
        correct: 0

  - id: fill-in-phonological-alternation-pairs
    type: fill-in
    instruction: "Вставте слово в правильній формі (чергування)"
    items:
      - sentence: "Мій чорний кіт спить біля _____ моєї сестри."
        answer: "кота"
        options: ["кота", "кіта", "коті"]
      - sentence: "Київ чекає на гостей. Вони їдуть з _____."
        answer: "Києва"
        options: ["Києва", "Київа", "Києві"]
      - sentence: "Це довга ніч. Я бажаю тобі доброї _____."
        answer: "ночі"
        options: ["ночі", "нічі", "ночу"]
      - sentence: "Це моя нога. Я стою на лівій _____."
        answer: "нозі"
        options: ["нозі", "ногі", "ногу"]
      - sentence: "Це права рука. Мій телефон у правій _____."
        answer: "руці"
        options: ["руці", "рукі", "руку"]
      - sentence: "Там муха. Маленька муха сидить на _____."
        answer: "мусі"
        options: ["мусі", "мухі", "муху"]

  - id: match-euphony
    type: match-up
    instruction: "З'єднайте частини речень (правила милозвучності)"
    pairs:
      - left: "Він живе"
        right: "у великому місті."
      - left: "Вона живе"
        right: "в селі."
      - left: "Він купив хліб"
        right: "і масло."
      - left: "Вона купила молоко"
        right: "й масло."
      - left: "Вони приїхали"
        right: "зі Львова."
      - left: "Будь ласка, ходімо"
        right: "зі мною."
      - left: "Вона пішла в магазин"
        right: "із сестрою."

  - id: error-euphony
    type: error-correction
    instruction: "Виправте помилку в милозвучності (у/в, і/й, з/зі/із)"
    items:
      - sentence: "Вона живе у селі."
        error: "у"
        correction: "в"
        error_type: "word"
        options: ["в", "і", "й"]
        explanation: "Після голосного перед приголосним пишемо «в»."
      - sentence: "Він живе в великому місті."
        error: "в"
        correction: "у"
        error_type: "word"
        options: ["у", "із", "зі"]
        explanation: "Між двома приголосними пишемо «у»."
      - sentence: "Вона купила молоко і масло."
        error: "і"
        correction: "й"
        error_type: "word"
        options: ["й", "в", "у"]
        explanation: "Після голосного перед приголосним пишемо «й»."
      - sentence: "Він купив хліб й масло."
        error: "й"
        correction: "і"
        error_type: "word"
        options: ["і", "в", "у"]
        explanation: "Між двома приголосними пишемо «і»."
      - sentence: "Вони приїхали з Львова."
        error: "з"
        correction: "зі"
        error_type: "word"
        options: ["зі", "із", "у"]
        explanation: "Перед важким збігом приголосних (Львів) пишемо «зі»."
      - sentence: "Будь ласка, ходімо з мною."
        error: "з"
        correction: "зі"
        error_type: "word"
        options: ["зі", "із", "в"]
        explanation: "Перед словом «мною» обов'язково пишемо «зі»."

workbook:
  - id: quiz-grammar-cases-extended
    type: quiz
    instruction: "Оберіть правильний відмінок для іменника в реченні"
    items:
      - question: "Я бачу (кого?) **студента**."
        options: ["Знахідний", "Називний", "Місцевий", "Кличний"]
        correct: 0
      - question: "Він працює на (чому?) **заводі**."
        options: ["Місцевий", "Давальний", "Орудний", "Знахідний"]
        correct: 0
      - question: "Я даю книгу (кому?) **сестрі**."
        options: ["Давальний", "Місцевий", "Знахідний", "Називний"]
        correct: 0
      - question: "Привіт, (хто?) **Олександре**!"
        options: ["Кличний", "Називний", "Місцевий", "Давальний"]
        correct: 0
      - question: "Це мій (хто?) **брат**."
        options: ["Називний", "Кличний", "Знахідний", "Місцевий"]
        correct: 0
      - question: "Ми допомагаємо (кому?) **учневі**."
        options: ["Давальний", "Місцевий", "Орудний", "Знахідний"]
        correct: 0

  - id: fill-in-cases-extended
    type: fill-in
    instruction: "Вставте іменник у правильній формі"
    items:
      - sentence: "Ось новий студент. Я бачу нового _____."
        answer: "студента"
        options: ["студента", "студенту", "студентові"]
      - sentence: "Це красивий Київ. Я живу в _____."
        answer: "Києві"
        options: ["Києві", "Київ", "Києву"]
      - sentence: "Це моя сестра. Я даю книгу своїй _____."
        answer: "сестрі"
        options: ["сестрі", "сестру", "сестрою"]
      - sentence: "Ось моя подруга. Я даю книгу моїй _____."
        answer: "подрузі"
        options: ["подрузі", "подругу", "подругою"]
      - sentence: "Це мій брат. Я допомагаю своєму _____."
        answer: "братові"
        options: ["братові", "брат", "брату"]
      - sentence: "Там великий вокзал. Ми зустрічаємо друзів на _____."
        answer: "вокзалі"
        options: ["вокзалі", "вокзал", "вокзалу"]

  - id: quiz-stress-extended
    type: quiz
    instruction: "Яке слово має правильний наголос у цьому контексті?"
    items:
      - question: "Старий палац на горі — це..."
        options: ["за́мок", "замо́к", "замо́ки", "за́мки"]
        correct: 0
      - question: "Міцний механізм на дверях — це..."
        options: ["замо́к", "за́мок", "за́мки", "замо́ки"]
        correct: 0
      - question: "Географічна карта — це..."
        options: ["а́тлас", "атла́с", "а́тласи", "атла́си"]
        correct: 0
      - question: "Гладенька красива тканина — це..."
        options: ["атла́с", "а́тлас", "атла́си", "а́тласи"]
        correct: 0
      - question: "Слово з подвійним наголосом (можна казати і так, і так) — це..."
        options: ["помилка", "замок", "атлас", "правило"]
        correct: 0
      - question: "Ще одне слово з подвійним наголосом — це..."
        options: ["алфавіт", "студент", "сестра", "вокзал"]
        correct: 0

  - id: odd-one-out-stress
    type: odd-one-out
    instruction: "Знайдіть слово з іншою моделлю наголосу або подвійним наголосом"
    items:
      - words: ["замок", "атлас", "помилка"]
        correct: 2
        explanation: "Слово «помилка» має подвійний наголос, а «замок» і «атлас» змінюють значення залежно від наголосу."
      - words: ["алфавіт", "правило", "система"]
        correct: 0
        explanation: "Слово «алфавіт» має подвійний наголос (алфАвіт і алфавІт)."
      - words: ["за́мок (палац)", "а́тлас (карта)", "замо́к (на дверях)"]
        correct: 2
        explanation: "«замо́к» має наголос на другому складі, інші — на першому."
      - words: ["замо́к (на дверях)", "атла́с (тканина)", "за́мок (палац)"]
        correct: 2
        explanation: "«за́мок» має наголос на першому складі, інші — на другому."
      - words: ["брат", "стіл", "кота"]
        correct: 2
        explanation: "«кота» має два склади, інші — один."
      - words: ["сестра", "муха", "нога"]
        correct: 1
        explanation: "«муха» має наголос на першому складі (му́ха), інші — на другому (сестра́, нога́)."

  - id: group-sort-cases
    type: group-sort
    instruction: "Розподіліть іменники за відмінками"
    groups:
      - label: "Називний відмінок"
        items: ["студент", "брат", "сестра", "кімната"]
      - label: "Знахідний відмінок"
        items: ["студента", "брата", "сестру", "кімнату"]
      - label: "Місцевий відмінок"
        items: ["на заводі", "у кімнаті", "на вокзалі", "у селі"]
      - label: "Кличний відмінок"
        items: ["Олю", "Олександре", "друже", "студенте"]

  - id: error-correction-cases
    type: error-correction
    instruction: "Знайдіть і виправте відмінкову помилку"
    items:
      - sentence: "Мій старший брат зараз працює на завод."
        error: "завод"
        correction: "заводі"
        error_type: "word"
        options: ["заводі", "заводу", "заводом"]
        explanation: "Місцевий відмінок: на чому? на заводі."
      - sentence: "Оксана, підійди сюди!"
        error: "Оксана"
        correction: "Оксано"
        error_type: "word"
        options: ["Оксано", "Оксану", "Оксані"]
        explanation: "При звертанні використовуємо Кличний відмінок."
      - sentence: "Він бачить іншого студент."
        error: "студент"
        correction: "студента"
        error_type: "word"
        options: ["студента", "студенту", "студентові"]
        explanation: "Для живих істот у Знахідному відмінку закінчення -а/-я."
      - sentence: "Я дуже люблю Україна."
        error: "Україна"
        correction: "Україну"
        error_type: "word"
        options: ["Україну", "Україні", "Україною"]
        explanation: "Знахідний відмінок жіночого роду має закінчення -у/-ю."
      - sentence: "Я даю нову книгу моїй подругі."
        error: "подругі"
        correction: "подрузі"
        error_type: "word"
        options: ["подрузі", "подругу", "подругою"]
        explanation: "У Давальному відмінку відбувається чергування г-з (подруга -> подрузі)."
      - sentence: "Студент сидить у кімната."
        error: "кімната"
        correction: "кімнаті"
        error_type: "word"
        options: ["кімнаті", "кімнату", "кімнатою"]
        explanation: "Місцевий відмінок: у чому? у кімнаті."