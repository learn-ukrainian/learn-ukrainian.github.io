version: "1.0"
module: word-formation-adjectives
level: b1

inline:
  - id: reading-suffixal-formation
    type: quiz
    title: "Розуміння суфіксів"
    instruction: "Дайте відповіді на запитання за текстом про суфіксальне творення."
    items:
      - question: "Який суфікс використовується для творення прикметника від слова «школа»?"
        options:
          - text: "-ськ-"
            correct: false
          - text: "-н-"
            correct: true
          - text: "-уват-"
            correct: false
          - text: "-еньк-"
            correct: false
      - question: "Які суфікси роблять ознаку лагідною і приємною?"
        options:
          - text: "-юч-, -ющ-"
            correct: false
          - text: "-уват-, -юват-"
            correct: false
          - text: "-еньк-, -есеньк-"
            correct: true
          - text: "-ськ-, -зьк-"
            correct: false
      - question: "Що означає прикметник із суфіксом -уват- (наприклад, «синюватий»)?"
        options:
          - text: "Дуже інтенсивну ознаку"
            correct: false
          - text: "Наближену, неповну ознаку"
            correct: true
          - text: "Належність людині"
            correct: false
          - text: "Географічне походження"
            correct: false
      - question: "Який суфікс треба додати до слова «Париж», щоб утворити прикметник?"
        options:
          - text: "-ськ-"
            correct: false
          - text: "-зьк-"
            correct: true
          - text: "-цьк-"
            correct: false
          - text: "-н-"
            correct: false
      - question: "Які суфікси додають слову найбільшої інтенсивності та сили?"
        options:
          - text: "-еньк-, -есеньк-"
            correct: false
          - text: "-юч-, -ющ-"
            correct: true
          - text: "-ськ-, -зьк-"
            correct: false
          - text: "-уват-, -юват-"
            correct: false
      - question: "Яке чергування голосних відбувається у слові «шкільний» порівняно зі словом «школа»?"
        options:
          - text: "«о» переходить в «і»"
            correct: true
          - text: "«е» переходить в «і»"
            correct: false
          - text: "«а» переходить в «я»"
            correct: false
          - text: "«о» переходить в «е»"
            correct: false
      - question: "Яке значення мають суфікси -ив- та -лив-?"
        options:
          - text: "Вказують на матеріал предмета"
            correct: false
          - text: "Вказують на розмір предмета"
            correct: false
          - text: "Вказують на постійну рису чи схильність"
            correct: true
          - text: "Вказують на географічне походження"
            correct: false
      - question: "Як пишеться прикметник від словосполучення «правий берег»?"
        options:
          - text: "право-бережний"
            correct: false
          - text: "правийберег"
            correct: false
          - text: "правобережний"
            correct: true
          - text: "право-бережній"
            correct: false

  - id: fill-in-possessive
    type: fill-in
    title: "Присвійні прикметники"
    instruction: "Вставте правильну форму присвійного прикметника."
    items:
      - sentence: "Це ____ планшет."
        answer: "Андріїв"
        options: ["Андрієв", "Андріїв", "Андрієва", "Андрієвому"]
      - sentence: "Я чую ____ голос."
        answer: "материн"
        options: ["материний", "материн", "мамин", "материного"]
      - sentence: "Ми були у ____ домі."
        answer: "батьковому"
        options: ["батьків", "батьковому", "батьковім", "батькових"]
      - sentence: "Ось лежить ____ зошит."
        answer: "Сергіїв"
        options: ["Сергіїв", "Сергієв", "Сергієвого", "Сергійовий"]
      - sentence: "Там моя ____ книга."
        answer: "сестрина"
        options: ["сестрин", "сестрина", "сестриної", "сестринська"]
      - sentence: "Це ____ рюкзак."
        answer: "Миколин"
        options: ["Миколів", "Миколин", "Миколина", "Миколиний"]
      - sentence: "Це ____ лист."
        answer: "Маріїн"
        options: ["Марієв", "Маріїна", "Маріїн", "Маріїнський"]
      - sentence: "Ми бачимо ____ дім."
        answer: "батьків"
        options: ["батьківський", "батькова", "батьковому", "батьків"]

  - id: quiz-focus-on-choosing-between-and-in-various-context-sentences
    type: quiz
    title: "Одна чи дві літери «н»?"
    instruction: "Оберіть правильний варіант написання прикметників."
    items:
      - question: "Я п'ю ____ сік."
        options:
          - text: "лимоний"
            correct: false
          - text: "лимонний"
            correct: true
          - text: "лимоняний"
            correct: false
          - text: "лимонаний"
            correct: false
      - question: "У мене є гарний ____ посуд."
        options:
          - text: "глиняний"
            correct: true
          - text: "глинний"
            correct: false
          - text: "глинняний"
            correct: false
          - text: "глиновий"
            correct: false
      - question: "Сьогодні дуже ____ день."
        options:
          - text: "туманий"
            correct: false
          - text: "тумановий"
            correct: false
          - text: "туманяний"
            correct: false
          - text: "туманний"
            correct: true
      - question: "Це смачний ____ суп."
        options:
          - text: "гречанний"
            correct: false
          - text: "гречаний"
            correct: true
          - text: "гречний"
            correct: false
          - text: "гречковий"
            correct: false
      - question: "Який ____ вітер!"
        options:
          - text: "страшенний"
            correct: true
          - text: "страшений"
            correct: false
          - text: "страшний"
            correct: false
          - text: "страшноватий"
            correct: false
      - question: "Там стоїть ____ замок."
        options:
          - text: "старинний"
            correct: false
          - text: "старовиний"
            correct: false
          - text: "старовинний"
            correct: true
          - text: "старий"
            correct: false
      - question: "Ми чули ____ спів."
        options:
          - text: "орлинний"
            correct: false
          - text: "орляний"
            correct: false
          - text: "орлиний"
            correct: true
          - text: "орліний"
            correct: false
      - question: "На вулиці справжній ____ ранок."
        options:
          - text: "осінний"
            correct: false
          - text: "осінній"
            correct: true
          - text: "осіній"
            correct: false
          - text: "осіняний"
            correct: false

  - id: match-formation-methods
    type: match-up
    title: "Способи творення"
    instruction: "З'єднайте слова з їхнім способом творення."
    pairs:
      - left: "приморський"
        right: "префіксально-суфіксальний"
      - left: "прегарний"
        right: "префіксальний"
      - left: "зимовий"
        right: "суфіксальний"
      - left: "безхмарний"
        right: "префіксально-суфіксальний"
      - left: "шкільний"
        right: "суфіксальний"
      - left: "ультрасучасний"
        right: "префіксальний"
      - left: "синьоокий"
        right: "складання основ"
      - left: "правобережний"
        right: "складання основ"

  - id: error-correction-focus-on-fixing-adjectives-where-the-alternation-was-missed-e-g-instead-of
    type: error-correction
    title: "Чергування приголосних"
    instruction: "Знайдіть і виправте помилку в чергуванні приголосних."
    items:
      - sentence: "Це дуже цікавий книгний магазин."
        error: "книгний"
        correction: "книжний"
        error_type: "word"
        explanation: "[г] перед суфіксом -н- змінюється на [ж]."
      - sentence: "У нас такий рукний песик, він зовсім не боїться."
        error: "рукний"
        correction: "ручний"
        error_type: "word"
        explanation: "[к] перед суфіксом -н- змінюється на [ч]."
      - sentence: "Вона одягла красиве прагське плаття."
        error: "прагське"
        correction: "празьке"
        error_type: "word"
        explanation: "Основи на [г], [ж], [з] вимагають суфікса -зьк-."
      - sentence: "Ми почули гучний мухиний дзюркіт."
        error: "мухиний"
        correction: "мушиний"
        error_type: "word"
        explanation: "[х] перед суфіксом змінюється на [ш]."
      - sentence: "Мені потрібен хороший вухний лікар."
        error: "вухний"
        correction: "вушний"
        error_type: "word"
        explanation: "[х] перед суфіксом -н- змінюється на [ш]."
      - sentence: "Мій дідусь носив справжній козакський одяг."
        error: "козакський"
        correction: "козацький"
        error_type: "word"
        explanation: "Основи на [к], [ч], [ц] вимагають суфікса -цьк-."

  - id: essay-compound-adjectives-essay-response-focus-on-describing-a-favorite-landscape-or-person-using-at-least-5-compound-adjectives-minimum-150-words
    type: essay-response
    title: "Складні прикметники"
    instruction: "Напишіть невеликий твір."
    prompt: "Опишіть ваш улюблений пейзаж або зовнішність знайомої людини. Використайте щонайменше 5 складних прикметників (наприклад, синьоокий, правобережний, темно-зелений)."
    min_words: 100
    model_answer: "Мій найкращий друг — це дуже висока і синьоока людина. Він має темно-каштанове волосся і завжди усміхається. Його обличчя світло-рожеве після довгої прогулянки. Він дуже працелюбний і щодня читає нові книги. Ми часто гуляємо у нашому правобережному парку, де ростуть темно-зелені дерева. Мені дуже подобається його життєрадісний характер."
    rubric:
      - criteria: "Складні прикметники"
        description: "Використано щонайменше 5 складних прикметників, утворених правильно."
      - criteria: "Граматика"
        description: "Речення побудовані правильно, без помилок."

workbook:
  - type: group-sort
    title: "Емоційне забарвлення"
    instruction: "Розподіліть прикметники за їхнім емоційним забарвленням."
    groups:
      - label: "Зменшувально-пестливі"
        items: ["чистенький", "малесенький", "гарненький"]
      - label: "Збільшувальні"
        items: ["смачнюча", "здоровенюча", "злюща"]
      - label: "Наближена ознака"
        items: ["синюватий", "білувата", "солодкуватий"]

  - type: true-false
    title: "Правила написання -н- та -нн-"
    instruction: "Визначте, чи правильне твердження про написання прикметників."
    items:
      - statement: "Слово «лимонний» пишеться з двома літерами «н», бо корінь закінчується на «н»."
        correct: true
        explanation: "Правильно: лимон + н = лимонний."
      - statement: "Слово «глиняний» пишеться з двома літерами «н»."
        correct: false
        explanation: "Суфікси -ян-, -ан-, -ин- пишуться з однією «н»."
      - statement: "Слова з наголошеними суфіксами -енн-, -анн- (наприклад, страшенний) завжди мають подвоєння."
        correct: true
        explanation: "Це правило для прикметників, що вказують на високу міру ознаки."
      - statement: "Слово «качиний» пишеться з подвоєнням, бо утворене від тварини."
        correct: false
        explanation: "Суфікс -ин- пишеться з однією «н» (качка -> качиний)."
      - statement: "Від слова «день» утворюється прикметник «денний» з двома «н»."
        correct: true
        explanation: "Основа ден- + суфікс -н- = денний."
      - statement: "Слово «орлиний» пишеться з подвоєнням."
        correct: false
        explanation: "Суфікс -ин- не має подвоєння."
      - statement: "Слово «несказанний» пишеться з подвоєнням."
        correct: true
        explanation: "Це прикметник, що означає високу міру неможливої дії."
      - statement: "Слово «склянний» написано правильно."
        correct: false
        explanation: "Правильно — скляний (одна літера «н»)."

  - type: unjumble
    title: "Порядок слів"
    instruction: "Складіть правильне речення зі слів."
    items:
      - words: ["хлопець", "Цей", "синьоокий.", "дуже"]
        correct_order: ["Цей", "хлопець", "дуже", "синьоокий."]
      - words: ["ліс.", "Ми", "темно-зелений", "бачимо"]
        correct_order: ["Ми", "бачимо", "темно-зелений", "ліс."]
      - words: ["був", "день", "теплим.", "Осінній"]
        correct_order: ["Осінній", "день", "був", "теплим."]
      - words: ["безмежне", "Вона", "небо.", "любить"]
        correct_order: ["Вона", "любить", "безмежне", "небо."]
      - words: ["місто.", "Це", "прибережне", "красиве"]
        correct_order: ["Це", "красиве", "прибережне", "місто."]
      - words: ["дім.", "Ми", "батьків", "відвідали"]
        correct_order: ["Ми", "відвідали", "батьків", "дім."]

  - type: match-up
    title: "Відповідність"
    instruction: "З'єднайте іменник та відповідний йому присвійний прикметник."
    pairs:
      - left: "Марія"
        right: "Маріїн"
      - left: "Андрій"
        right: "Андріїв"
      - left: "сестра"
        right: "сестрин"
      - left: "батько"
        right: "батьків"
      - left: "Микола"
        right: "Миколин"
      - left: "Сергій"
        right: "Сергіїв"
      - left: "мама"
        right: "материн"
      - left: "Оксана"
        right: "Оксанин"