version: "1.0"
module: people-and-relationships
level: b1

inline:
  - id: match-up-match-portrait-lexis-to-body-categories
    type: match-up
    instruction: "З'єднайте портретну лексику з відповідними категоріями тіла та зовнішності."
    pairs:
      - left: "високий"
        right: "зріст"
      - left: "кремезний"
        right: "статура"
      - left: "русяве"
        right: "колір волосся"
      - left: "кучеряве"
        right: "текстура волосся"
      - left: "смагляве"
        right: "колір обличчя"
      - left: "привітний"
        right: "погляд"
      - left: "літній"
        right: "вік"
      - left: "щирий"
        right: "характер"

  - id: quiz-character-valence-identify-character-traits-as-and-choose-the-correct-adjective-for-a-description
    type: quiz
    instruction: "Визначте, яка риса характеру описана, і оберіть правильний прикметник."
    items:
      - question: "Оксана завжди швидко знаходить вихід зі складної ситуації і легко вирішує несподівані проблеми. Яка вона?"
        options: ["кмітлива", "вперта", "чуйна", "заздрісна"]
        correct: 0
      - question: "Дмитро дуже емоційно реагує на чужий біль, уважно слухає інших і завжди готовий допомогти. Він..."
        options: ["чуйний", "замкнутий", "вередливий", "самовпевнений"]
        correct: 0
      - question: "Максим відмовляється слухати логічні аргументи і ніколи не йде на компроміс. У конфліктах він дуже..."
        options: ["впертий", "наполегливий", "працьовитий", "щирий"]
        correct: 0
      - question: "Марія зовсім не любить говорити про себе і тримає свої справжні емоції глибоко всередині. За характером вона..."
        options: ["замкнута", "балакуча", "привітна", "лагідна"]
        correct: 0
      - question: "Олександр завжди виконує свої обіцянки, на нього можна покластися в будь-якій ситуації. Він..."
        options: ["відповідальний", "самовпевнений", "лінивий", "нетерплячий"]
        correct: 0
      - question: "Іван постійно чимось незадоволений, швидко змінює свої бажання і вимагає надмірної уваги. Його поведінка..."
        options: ["вередлива", "м'яка", "чесна", "кмітлива"]
        correct: 0

  - id: fill-in-complete-a-portrait-description-by-filling-in-missing-adjectives-and-relationship-terms-in-a-text-about-a-family
    type: fill-in
    instruction: "Доповніть опис родини, вставивши правильні прикметники та назви родичів."
    items:
      - sentence: "Моя мама має темне хвилясте волосся, яке ми називаємо ____."
        answer: "каштанове"
        options: ["русяве", "каштанове", "бліде"]
      - sentence: "Мій рідний дядько має міцну фігуру, розвинені м'язи, він справді ____."
        answer: "кремезний"
        options: ["тендітний", "кремезний", "худорлявий"]
      - sentence: "Сестра моєї матері — це моя ____, і вона дуже привітна людина."
        answer: "тітка"
        options: ["тітка", "свекруха", "невістка"]
      - sentence: "Син мого дядька — це мій ____ брат, ми часто граємо у футбол."
        answer: "двоюрідний"
        options: ["двоюрідний", "троюрідний", "рідний"]
      - sentence: "Дружина мого старшого брата — дуже вродлива жінка. Для моєї мами вона — ____."
        answer: "невістка"
        options: ["невістка", "теща", "свекруха"]
      - sentence: "Батько моєї дружини дуже багато працює. Мій ____ — працьовитий чоловік."
        answer: "тесть"
        options: ["тесть", "свекор", "зять"]
      - sentence: "Мати мого чоловіка завжди готує смачні пироги. Моя ____ дуже турботлива."
        answer: "свекруха"
        options: ["теща", "свекруха", "невістка"]

  - id: group-sort-sort-relationship-vocabulary-into-categories
    type: group-sort
    instruction: "Розподіліть слова за категоріями: родина, дружба, формальні стосунки."
    groups:
      - label: "Родина"
        items: ["свекруха", "дядько", "племінниця", "подружжя"]
      - label: "Дружба"
        items: ["товариш", "підтримка", "довіра", "примирення"]
      - label: "Формальні стосунки"
        items: ["колега", "повага", "відрекомендуватися", "керівник"]

  - id: role-play-introduce-a-friend-to-a-colleague-using-formal-register
    type: essay-response
    prompt: "Уявіть, що ви знайомите свого давнього друга з вашим керівником (формальний регістр). Потім ви знайомите цього ж друга зі своїм братом (неформальний регістр). Напишіть обидва варіанти представлення (3-4 речення загалом)."
    model_answer: |
      > [!model-answer]
      > Формально: «Олександре Петровичу, дозвольте представити вам мого друга і колегу, Івана. Іване, це мій керівник, Олександр Петрович.»
      > Неформально: «Привіт, брате! Познайомся, це мій товариш Іван. Іване, це мій рідний брат Андрій.»

  - id: free-write-write-a-structured-portrait-of-a-real-or-fictional-person
    type: essay-response
    prompt: "Напишіть структурований словесний портрет реальної або вигаданої людини (8-10 речень). Обов'язково використайте зачин, основну частину (зріст, статура, риси обличчя, волосся) та кінцівку (характер і загальне враження)."
    min_words: 50
    model_answer: |
      > [!model-answer]
      > Я хочу розповісти про мого найкращого друга Максима. Ми познайомилися ще в університеті і з того часу дуже тісно товаришуємо. Максим — високий і широкоплечий хлопець із міцною статурою. У нього густе кучеряве каштанове волосся і дуже виразне, дещо смагляве обличчя. Його щирий погляд і привітна усмішка завжди викликають довіру в людей. За характером він надзвичайно відповідальний та працьовитий, завжди готовий допомогти. Водночас йому властиво бути дуже кмітливим і швидко вирішувати будь-які проблеми. Я глибоко поважаю Максима за його чуйність і вважаю нашу дружбу справжнім подарунком долі.

workbook:
  - type: quiz
    instruction: "Де наголос? Оберіть слово з правильним наголосом."
    items:
      - question: "Де правильний наголос?"
        options: ["хара́ктер", "ха́рактер", "характе́р", "характер́"]
        correct: 0
      - question: "Де правильний наголос?"
        options: ["подружжя́", "по́дружжя", "подру́жжя", "подруж́жя"]
        correct: 2
      - question: "Де правильний наголос?"
        options: ["зна́йомство", "знайо́мство", "знайомство́", "знайом́ство"]
        correct: 1
      - question: "Де правильний наголос?"
        options: ["вродли́вий", "вро́дливий", "вродливи́й", "вродлів́ий"]
        correct: 0
      - question: "Де правильний наголос?"
        options: ["кремезни́й", "креме́зний", "кре́мезний", "крем́езний"]
        correct: 1
      - question: "Де правильний наголос?"
        options: ["чу́йний", "чуйни́й", "чуйн́ий", "ч́уйний"]
        correct: 0

  - type: odd-one-out
    instruction: "Четверте зайве за наголосом. Оберіть слово, де наголос падає на інший склад."
    items:
      - words: ["хара́ктер", "тенді́тний", "креме́зний", "ла́гідний"]
        correct: 3
        explanation: "У слові «лагідний» наголос на першому складі, а в інших — на другому."
      - words: ["ю́ний", "щи́рий", "че́сний", "худи́й"]
        correct: 3
        explanation: "У слові «худий» наголос на другому складі, а в інших — на першому."
      - words: ["знайо́мство", "коха́ння", "поста́ва", "дру́жба"]
        correct: 3
        explanation: "У слові «дружба» наголос на першому складі, а в інших — на другому."
      - words: ["кашта́нове", "руся́ве", "вира́зне", "худорля́ве"]
        correct: 3
        explanation: "У слові «худорляве» наголос на третьому складі, а в інших — на другому."
      - words: ["справедли́вий", "працьови́тий", "вередли́вий", "відповіда́льний"]
        correct: 3
        explanation: "У слові «відповідальний» наголос на четвертому складі, а в інших — на третьому."
      - words: ["товари́ський", "двою́рідний", "прими́рення", "вродли́вий"]
        correct: 3
        explanation: "У слові «вродливий» наголос на другому складі, а в інших — на третьому."

  - type: fill-in
    instruction: "Вставте правильне закінчення прикметника."
    items:
      - sentence: "Вона має ____ волосся."
        answer: "русяве"
        options: ["русявий", "русява", "русяве"]
      - sentence: "У нього дуже ____ характер."
        answer: "впертий"
        options: ["впертий", "вперта", "вперте"]
      - sentence: "Вони — дуже ____ молоде подружжя."
        answer: "щасливе"
        options: ["щасливий", "щаслива", "щасливе"]
      - sentence: "Вона ____ зросту."
        answer: "середнього"
        options: ["середній", "середнього", "середньому"]
      - sentence: "Він був хлопцем ____."
        answer: "кремезним"
        options: ["кремезний", "кремезна", "кремезним"]
      - sentence: "Її обличчя — дуже ____."
        answer: "вродливе"
        options: ["вродливий", "вродлива", "вродливе"]

  - type: error-correction
    instruction: "Знайдіть і виправте помилку в узгодженні прикметника з іменником."
    items:
      - sentence: "Вона дуже привітний людина."
        error: "привітний"
        correction: "привітна"
        error_type: "word"
        options: ["привітна", "привітне", "привітні"]
        explanation: "Людина is feminine, so привітна."
      - sentence: "Мій брат — справжня широкоплечий козак."
        error: "справжня"
        correction: "справжній"
        error_type: "word"
        options: ["справжній", "справжнє", "справжні"]
        explanation: "Козак is masculine, so справжній."
      - sentence: "У нього каштановий волосся."
        error: "каштановий"
        correction: "каштанове"
        error_type: "word"
        options: ["каштанова", "каштанове", "каштанові"]
        explanation: "Волосся is neuter, so каштанове."
      - sentence: "Вона має дуже тендітний статуру."
        error: "тендітний"
        correction: "тендітну"
        error_type: "word"
        options: ["тендітний", "тендітна", "тендітну"]
        explanation: "Статура is feminine and in accusative case, so тендітну."
      - sentence: "Ми познайомилися з її двоюрідна братом."
        error: "двоюрідна"
        correction: "двоюрідним"
        error_type: "word"
        options: ["двоюрідний", "двоюрідною", "двоюрідним"]
        explanation: "Братом is masculine instrumental, so двоюрідним."
      - sentence: "Це дуже відповідальний робота."
        error: "відповідальний"
        correction: "відповідальна"
        error_type: "word"
        options: ["відповідальна", "відповідальне", "відповідальні"]
        explanation: "Робота is feminine, so відповідальна."

  - type: match-up
    instruction: "З'єднайте прикметники з іменниками, з якими вони найкраще поєднуються."
    pairs:
      - left: "русяве"
        right: "волосся"
      - left: "кремезний"
        right: "чоловік"
      - left: "тендітна"
        right: "дівчина"
      - left: "вродливе"
        right: "обличчя"
      - left: "щирі"
        right: "очі"
      - left: "літній"
        right: "вік"

  - type: match-up
    instruction: "З'єднайте особовий займенник із правильною формою дієслова."
    pairs:
      - left: "я"
        right: "довіряю"
      - left: "ти"
        right: "підтримуєш"
      - left: "він"
        right: "поважає"
      - left: "вона"
        right: "кохає"
      - left: "ми"
        right: "знайомимося"
      - left: "ви"
        right: "товаришуєте"
      - left: "вони"
        right: "сваряться"

  - type: fill-in
    instruction: "Вставте правильний особовий займенник."
    items:
      - sentence: "Це мій найкращий друг. ____ завжди мене підтримує."
        answer: "Він"
        options: ["Він", "Вона", "Вони"]
      - sentence: "Моя сестра дуже привітна. Я люблю ____."
        answer: "її"
        options: ["її", "його", "їх"]
      - sentence: "Ми з братом часто сваримося, але потім ____ обов'язково миримося."
        answer: "ми"
        options: ["ми", "ви", "вони"]
      - sentence: "Мої родичі живуть далеко. Я рідко бачу ____."
        answer: "їх"
        options: ["їх", "їхні", "вони"]
      - sentence: "Пане директоре, чи можу ____ представити вам свого колегу?"
        answer: "я"
        options: ["я", "він", "ти"]
      - sentence: "Це Олена. Розкажи мені про ____."
        answer: "неї"
        options: ["неї", "нею", "ній"]

  - type: group-sort
    instruction: "Розподіліть особові займенники на однину та множину."
    groups:
      - label: "Однина"
        items: ["я", "ти", "він", "вона", "воно", "мене", "тебе", "її", "його"]
      - label: "Множина"
        items: ["ми", "ви", "вони", "нас", "вас", "їх"]

  - type: quiz
    instruction: "Оберіть правильну форму звертання — неформальне (ти) чи ввічливе (Ви)."
    items:
      - question: "Звернення до нового керівника компанії:"
        options: ["Ви", "ти", "він", "ми"]
        correct: 0
      - question: "Звернення до рідного брата:"
        options: ["ти", "Ви", "вона", "ви (множина)"]
        correct: 0
      - question: "Звернення до літньої сусідки, яку ви погано знаєте:"
        options: ["Ви", "ти", "вона", "вони"]
        correct: 0
      - question: "Звернення до давнього шкільного друга:"
        options: ["ти", "Ви", "він", "ми"]
        correct: 0
      - question: "Звернення до викладача в університеті:"
        options: ["Ви", "ти", "вони", "він"]
        correct: 0
      - question: "Звернення до маленької племінниці:"
        options: ["ти", "Ви", "вона", "ми"]
        correct: 0

  - type: anagram
    instruction: "Складіть слово з літер (риси характеру та зовнішність)."
    items:
      - letters: ["щ", "и", "р", "и", "й"]
        answer: "щирий"
        hint: "sincere"
      - letters: ["ч", "у", "й", "н", "и", "й"]
        answer: "чуйний"
        hint: "sensitive / responsive"
      - letters: ["п", "о", "с", "т", "а", "в", "а"]
        answer: "постава"
        hint: "posture"
      - letters: ["д", "о", "в", "і", "р", "а"]
        answer: "довіра"
        hint: "trust"
      - letters: ["с", "т", "а", "т", "у", "р", "а"]
        answer: "статура"
        hint: "build / stature"
      - letters: ["з", "р", "і", "с", "т"]
        answer: "зріст"
        hint: "height"

  - type: odd-one-out
    instruction: "Оберіть слово, що не належить до семантичної групи."
    items:
      - words: ["дядько", "тітка", "племінник", "колега"]
        correct: 3
        explanation: "Колега — це робочі стосунки, а інші — родичі."
      - words: ["щирий", "чуйний", "заздрісний", "відповідальний"]
        correct: 2
        explanation: "Заздрісний — це негативна риса, а інші — позитивні."
      - words: ["кучеряве", "пряме", "русяве", "стрункий"]
        correct: 3
        explanation: "Стрункий стосується статури, а інші — волосся."
      - words: ["високий", "низький", "середнього зросту", "каштанове"]
        correct: 3
        explanation: "Каштанове стосується кольору волосся, а інші — зросту."
      - words: ["свекруха", "теща", "зять", "кмітливий"]
        correct: 3
        explanation: "Кмітливий — це риса характеру, а інші — родичі (свояки)."
      - words: ["стосунки", "взаємини", "ставлення", "зріст"]
        correct: 3
        explanation: "Зріст стосується зовнішності, а інші — соціальних зв'язків."

