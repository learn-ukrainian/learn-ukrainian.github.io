            correct: false
      - source: "She is responsible for the marketing department."
        options:
          - text: "Вона відповідає за відділ маркетингу."
            correct: true
          - text: "Вона відповідає відділом маркетингу."
            correct: false
          - text: "Вона керує за відділ маркетингу."
            correct: false
          - text: "Вона працює відділом маркетингу."
            correct: false
      - source: "He resigned from his position yesterday."
        options:
          - text: "Вчора він звільнився зі своєї посади."
            correct: true
          - text: "Вчора він звільнявся зі своєї посади."
