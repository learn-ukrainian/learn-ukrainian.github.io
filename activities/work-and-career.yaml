          - "аналітик"
        correct: 0

  - type: unjumble
    instruction: "Складіть правильне речення зі слів (розставте слова у правильному порядку)"
    items:
      - words: ["керівницею", "продажів.", "працює", "Вона", "відділу"]
        correct_order: ["Вона", "працює", "керівницею", "відділу", "продажів."]
      - words: ["своє", "Я", "подав", "успішно", "резюме."]
        correct_order: ["Я", "успішно", "подав", "своє", "резюме."]
      - words: ["на", "нову", "влаштувався", "Він", "роботу."]
        correct_order: ["Він", "влаштувався", "на", "нову", "роботу."]
      - words: ["проєктом.", "новим", "керує", "Колега", "нашим"]
        correct_order: ["Колега", "керує", "нашим", "новим", "проєктом."]
      - words: ["фінансовий", "Я", "за", "відділ.", "відповідаю"]
        correct_order: ["Я", "відповідаю", "за", "фінансовий", "відділ."]
      - words: ["підвищення.", "нарешті", "отримала", "Вона", "бажане"]
        correct_order: ["Вона", "нарешті", "отримала", "бажане", "підвищення."]

  - type: true-false
    instruction: "Правда чи ні? Оцініть твердження щодо граматики та лексики працевлаштування"
    items:
      - statement: "Слово «резюме» завжди змінює своє закінчення залежно від відмінка (наприклад, «у моєму резюмі»)."
