            correct: false
          - text: "Сьогодні я отримав своє резюме."
            correct: false
          - text: "Сьогодні я написав свою заяву."
            correct: false

  - type: quiz
    instruction: "Оберіть правильний відмінок іменника після професійного дієслова"
