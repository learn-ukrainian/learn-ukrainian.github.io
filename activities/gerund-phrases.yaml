        options:
          - text: "Уважно читаючи нову книгу, я робив корисні нотатки."
            correct: true
          - text: "Уважно прочитавши нову книгу, я робив корисні нотатки."
            correct: false
          - text: "Нова книга, уважно читана, дала корисні нотатки."
            correct: false
          - text: "Я робив нотатки і читав книгу."
            correct: false

  - type: unjumble
    instruction: "Складіть правильне речення зі слів. Звертайте увагу на пунктуацію та логіку зворотів."
    items:
      - words: ["листа,", "Оленка", "Прочитавши", "задумалася."]
        correct_order: ["Прочитавши", "листа,", "Оленка", "задумалася."]
      - words: ["рук.", "не", "Він", "працював", "покладаючи"]
        correct_order: ["Він", "працював", "не", "покладаючи", "рук."]
      - words: ["подих.", "Студенти", "лекцію", "слухали", "затамувавши"]
        correct_order: ["Студенти", "слухали", "лекцію", "затамувавши", "подих."]
      - words: ["читати", "лежачи.", "Шкідливо"]
        correct_order: ["Шкідливо", "читати", "лежачи."]
      - words: ["журналістами,", "усміхався.", "спортсмен", "Спілкуючись", "із"]
        correct_order: ["Спілкуючись", "із", "журналістами,", "спортсмен", "усміхався."]
      - words: ["відчув", "я", "полегшення.", "Перейшовши", "дорогу,"]
        correct_order: ["Перейшовши", "дорогу,", "я", "відчув", "полегшення."]

  - type: group-sort
    instruction: "Розподіліть фрази на дві категорії: ті, що виділяються комами, і ті, що ні (фразеологізми та адвербіалізація)."
    groups:
      - label: "Відокремлюється комою"
        items: ["прочитавши цікавого листа", "уважно читаючи нову книгу", "побачивши давніх друзів", "радісно усміхаючись журналістам"]
      - label: "Не відокремлюється комою"
        items: ["працював не покладаючи рук", "слухали затамувавши подих", "шкідливо читати лежачи", "біг не чуючи ніг"]

  - type: anagram
    instruction: "Складіть слова з літер (нова лексика модуля)."
    items:
      - letters: ["з", "в", "о", "р", "о", "т"]
        answer: "зворот"
        hint: "фразеологічний або дієприслівниковий..."
      - letters: ["ч", "а", "с", "т", "к", "а"]
        answer: "частка"
