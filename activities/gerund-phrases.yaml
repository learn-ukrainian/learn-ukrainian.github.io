version: "1.0"
module: gerund-phrases
level: b1

inline:
  - id: reading-gerund-structure
    type: reading
    instruction: "Прочитайте текст про дієприслівниковий зворот і дайте відповіді на запитання."
    passage: "Уважно читаючи нову книгу про стилістику, студент робив корисні нотатки. Прочитавши кілька розділів, він зрозумів, як уникати канцеляриту. Працюючи над текстом щодня, він помітно покращив свої навички. Його розповідь, раніше складна для сприйняття, стала динамічною."
    questions:
      - "Що робив студент, читаючи книгу?"
      - "Що він зрозумів, прочитавши кілька розділів?"
      - "Завдяки чому він помітно покращив свої навички?"

  - id: fill-in-gerund-form
    type: fill-in
    instruction: "Вставте правильну граматичну форму дієприслівника за контекстом."
    items:
      - sentence: "_____ книгу, я робив корисні нотатки."
        answer: "Читаючи"
        options: ["Читаючи", "Прочитавши", "Читати", "Читав"]
      - sentence: "_____ перший крок, ви ніколи не досягнете мети."
        answer: "Не зробивши"
        options: ["Не роблячи", "Не зробивши", "Зробивши", "Роблячи"]
      - sentence: "Спортсмен усміхався, _____ із відомими журналістами."
        answer: "спілкуючись"
        options: ["спілкуючись", "поспілкувавшись", "спілкуватися", "спілкувався"]
      - sentence: "_____ головного суперника на останніх метрах, плавець здобув золоту медаль."
        answer: "Випередивши"
        options: ["Випереджаючи", "Випередивши", "Випередити", "Випередив"]
      - sentence: "_____ грубою помилкою центрального захисника, нападник забив вирішальний гол."
        answer: "Скориставшись"
        options: ["Користуючись", "Скориставшись", "Користуватися", "Скористався"]
      - sentence: "_____ подкаст, ми спокійно їхали в автомобілі."
        answer: "Слухаючи"
        options: ["Слухаючи", "Послухавши", "Слухати", "Слухав"]

  - id: quiz-gerund-structure
    type: quiz
    instruction: "Оберіть правильний варіант відповіді про будову дієприслівникового звороту."
    items:
      - question: "Що таке дієприслівниковий зворот?"
        options: ["Дієприслівник із залежними словами.", "Одиничний дієприслівник без інших слів.", "Дієприкметник із залежними словами.", "Просте речення без підмета."]
        correct: 0
      - question: "Яку синтаксичну роль у реченні завжди виконує дієприслівниковий зворот?"
        options: ["Обставина", "Означення", "Додаток", "Підмет"]
        correct: 0
      - question: "На які питання найчастіше відповідає дієприслівниковий зворот?"
        options: ["Як? Коли? Чому?", "Який? Яка? Яке?", "Хто? Що?", "Кого? Чого?"]
        correct: 0
      - question: "Що означає дієприслівник недоконаного виду (напр., «читаючи»)?"
        options: ["Дію, що відбувається одночасно з головною.", "Дію, що завершилася до початку головної.", "Дію, що обов'язково відбудеться в майбутньому.", "Головну дію в реченні."]
        correct: 0
      - question: "Що означає дієприслівник доконаного виду (напр., «прочитавши»)?"
        options: ["Дію, що повністю завершилася до моменту початку головної дії.", "Дію, що відбувається одночасно з головною.", "Дію, що триватиме в майбутньому.", "Ознаку предмета за дією."]
        correct: 0
      - question: "Яке з цих речень містить дієприслівниковий зворот?"
        options: ["Спілкуючись із друзями, я відпочиваю.", "Я спілкуюся з друзями і відпочиваю.", "Спілкуючись, я відпочиваю.", "Мої друзі люблять спілкуватися."]
        correct: 0

  - id: match-up-punctuation-terms
    type: match-up
    instruction: "З'єднайте терміни з розділу «Правила відокремлення» з їхніми характеристиками."
    pairs:
      - left: "Дієприслівниковий зворот"
        right: "Завжди відокремлюється комами, незалежно від позиції в реченні."
      - left: "Фразеологічний зворот"
        right: "Не відокремлюється комами, бо втратив дієслівне значення (наприклад, не покладаючи рук)."
      - left: "Підсилювальна частка «і/й»"
        right: "Скасовує кому перед зворотом (наприклад, виконати й не знаючи правил)."
      - left: "Однорідні звороти без сполучників"
        right: "Відокремлюються комами один від одного, описуючи послідовні дії."
      - left: "Однорідні звороти зі сполучником «і»"
        right: "Не розділяються комою між собою."
      - left: "Адвербіалізований дієприслівник"
        right: "Одиничний дієприслівник після присудка, що означає спосіб дії і не виділяється комою."

  - id: error-correction-punctuation
    type: error-correction
    instruction: "Знайдіть і виправте пунктуаційні помилки у реченнях, обравши правильний варіант конструкції."
    items:
      - sentence: "Він сумлінно працював, не покладаючи рук, цілий день."
        error: ", не покладаючи рук,"
        correction: "не покладаючи рук"
        error_type: "phrase"
        options: ["не покладаючи рук", ", не покладаючи рук,", "не покладаючи, рук"]
        explanation: "«Не покладаючи рук» — це фразеологічний зворот, тому він не відокремлюється комами."
      - sentence: "Це складне завдання можна виконати, й не знаючи всіх правил."
        error: ", й не знаючи всіх правил"
        correction: "й не знаючи всіх правил"
        error_type: "phrase"
        options: ["й не знаючи всіх правил", ", й не знаючи всіх правил", "й, не знаючи всіх правил"]
        explanation: "Перед підсилювальною часткою «й» кома не ставиться."
      - sentence: "Дівчина захоплено читала книгу, лежачи, на дивані."
        error: ", лежачи,"
        correction: "лежачи"
        error_type: "phrase"
        options: ["лежачи", ", лежачи,", "лежачи,"]
        explanation: "Одиничний дієприслівник способу дії після присудка не виділяється комою."
      - sentence: "Студенти слухали лекцію викладача, затамувавши подих."
        error: ", затамувавши подих"
        correction: "затамувавши подих"
        error_type: "phrase"
        options: ["затамувавши подих", ", затамувавши подих,", ", затамувавши, подих"]
        explanation: "«Затамувавши подих» — фразеологізм, який не виділяється комою."
      - sentence: "Переляканий хлопець біг, не чуючи ніг."
        error: ", не чуючи ніг"
        correction: "не чуючи ніг"
        error_type: "phrase"
        options: ["не чуючи ніг", ", не чуючи ніг,", "не чуючи, ніг"]
        explanation: "Фразеологізм «не чуючи ніг» замінює прислівник «прудко» і не потребує коми."
      - sentence: "Оленка задумалася, прочитавши, листа."
        error: ", прочитавши, листа"
        correction: ", прочитавши листа"
        error_type: "phrase"
        options: [", прочитавши листа", "прочитавши листа", ", прочитавши, листа"]
        explanation: "Дієприслівниковий зворот не розривається комою всередині, кома ставиться тільки на його межі."

  - id: quiz-participle-vs-gerund
    type: quiz
    instruction: "Перевірте своє розуміння різниці між дієприкметниковим та дієприслівниковим зворотами."
    items:
      - question: "Який зворот відповідає на питання «який? яка? яке? які?» і виступає в ролі означення?"
        options: ["Дієприкметниковий", "Дієприслівниковий", "Фразеологічний", "Обставинний"]
        correct: 0
      - question: "Який зворот відповідає на питання «як? коли? чому?» і підпорядковується дієслову-присудку?"
        options: ["Дієприслівниковий", "Дієприкметниковий", "Іменниковий", "Означальний"]
        correct: 0
      - question: "У реченні «Книга, прочитана студентом, лежала на столі» використано..."
        options: ["Дієприкметниковий зворот", "Дієприслівниковий зворот", "Одиничний дієприслівник", "Фразеологізм"]
        correct: 0
      - question: "У реченні «Студент, прочитавши книгу, успішно склав іспит» використано..."
        options: ["Дієприслівниковий зворот", "Дієприкметниковий зворот", "Одиничний дієприкметник", "Фразеологізм"]
        correct: 0
      - question: "Який зворот можна подумки замінити на підрядне речення зі словом «який»?"
        options: ["Дієприкметниковий зворот", "Дієприслівниковий зворот", "Дієслівний зворот", "Обидва звороти"]
        correct: 0
      - question: "Правило пунктуації якого звороту залежить від його позиції щодо іменника?"
        options: ["Дієприкметникового", "Дієприслівникового", "Жодного", "Обох зворотів"]
        correct: 0

  - id: error-correction
    type: error-correction
    instruction: "Знайдіть і виправте граматичні та стилістичні помилки (відірваний дієприслівник або канцелярит)."
    items:
      - sentence: "Перейшовши дорогу, мені стало легше."
        error: "мені стало легше"
        correction: "я відчув полегшення"
        error_type: "construction"
        options: ["я відчув полегшення", "мені було легше", "мені ставало легше"]
        explanation: "Додаткова дія має виконуватися тим самим підметом («я»), що й головна."
      - sentence: "Готуючи вечерю, кіт забіг на кухню."
        error: "Готуючи вечерю"
        correction: "Коли я готував вечерю"
        error_type: "construction"
        options: ["Коли я готував вечерю", "Готуючи вечерю,", "Під час готування вечері"]
        explanation: "Актори різні (я готую, кіт біжить), тому треба використати підрядне речення часу."
      - sentence: "Прокинувшись, умившись, поснідавши, я швидко зібрався і вийшов з дому."
        error: "Прокинувшись, умившись, поснідавши"
        correction: "Я прокинувся, умився і поснідав, а потім"
        error_type: "register"
        options: ["Я прокинувся, умився і поснідав, а потім", "Прокинувшись і умившись та поснідавши,", "Прокинувшись, умившись, та поснідавши,"]
        explanation: "Надмірне нагромадження зворотів створює канцелярит. Краще використати однорідні присудки."
      - sentence: "Підійшовши до станції, у мене злетів капелюх."
        error: "у мене злетів капелюх"
        correction: "я загубив капелюх"
        error_type: "construction"
        options: ["я загубив капелюх", "мій капелюх злетів", "у мене злітав капелюх"]
        explanation: "Дію «підійшовши» і «загубив» має виконувати одна особа («я»)."
      - sentence: "Відчинивши вікно, до кімнати залетів птах."
        error: "Відчинивши вікно"
        correction: "Коли я відчинив вікно"
        error_type: "construction"
        options: ["Коли я відчинив вікно", "Відчинивши вікно,", "Після відчинення вікна"]
        explanation: "Птах залетів, але відчинив вікно хтось інший. Потрібно підрядне речення."
      - sentence: "Читаючи цікаву книгу, вечір швидко минув."
        error: "вечір швидко минув"
        correction: "я не помітив, як минув вечір"
        error_type: "construction"
        options: ["я не помітив, як минув вечір", "вечір швидко проходив", "вечір минув швидко"]
        explanation: "Книгу читала людина, а не вечір. Підмет у головній частині має співпадати з виконавцем дії у звороті."

  - id: essay-gerund-narrative
    type: essay-response
    instruction: "Напишіть коротку розповідь (5-8 речень) про вашу ідеальну ранкову рутину або подорож до Львова."
    prompt: "Використайте щонайменше три дієприслівникові звороти та два дієприкметникові звороти. Зверніть увагу на правильну пунктуацію."
    min_words: 50
    model_answer: "Прокинувшись рано-вранці, я одразу відчув приємний аромат кави. Старовинні вулиці Львова, яскраво освітлені теплим весняним сонцем, були ще зовсім порожніми. Випивши філіжанку кави, я вирушив на прогулянку. Туристи, зачаровані красою міста, фотографували архітектуру. Гуляючи площею Ринок і насолоджуючись атмосферою, я зрозумів, що це ідеальний вихідний. Цей ранок, наповнений спокоєм, запам'ятається надовго."
    evaluation_criteria:
      - "Використано щонайменше три дієприслівникові звороти."
      - "Використано щонайменше два дієприкметникові звороти."
      - "Дієприслівникові звороти правильно відокремлені комами."
      - "Головна і додаткова дії виконуються одним підметом (немає «відірваних» зворотів)."

workbook:
  - type: translate
    instruction: "Оберіть правильний переклад речень з англійської на українську."
    items:
      - source: "Having read the letter, Olenka became lost in thought."
        options:
          - text: "Прочитавши листа, Оленка задумалася."
            correct: true
          - text: "Читаючи листа, Оленка задумалася."
            correct: false
          - text: "Прочитаний Оленкою лист змусив її задуматися."
            correct: false
          - text: "Оленка задумалася, читаючи."
            correct: false
      - source: "He worked tirelessly (without laying down his hands)."
        options:
          - text: "Він працював не покладаючи рук."
            correct: true
          - text: "Він працював, не покладаючи рук."
            correct: false
          - text: "Він працював без рук."
            correct: false
          - text: "Він працював, працюючи."
            correct: false
      - source: "This complex task can be done even without knowing all the rules."
        options:
          - text: "Це складне завдання можна виконати й не знаючи всіх правил."
            correct: true
          - text: "Це складне завдання можна виконати, й не знаючи всіх правил."
            correct: false
          - text: "Це завдання можна виконати, не знаючи правил."
            correct: false
