version: "1.0"
module: genitive-nuances
level: b1

inline:
  - id: reading-partitive-market
    type: reading
    instruction: "Прочитайте текст про частковий родовий і дайте відповіді на запитання."
    passage: "Сьогодні субота, і ми йдемо на Одеський ринок Привоз. Нам треба купити багато продуктів для борщу. Ми просимо кілограм картоплі, трохи капусти і шматок м'яса. Також нам потрібно багато часу, щоб знайти найсвіжіший домашній сир. Ми бажаємо знайти якісні продукти, бо вони варті нашої уваги. Вдома ми наллємо склянку холодної води після довгої прогулянки."
    questions:
      - question: "Куди ми йдемо в суботу?"
        options: ["На Одеський ринок Привоз", "У супермаркет", "У ресторан", "У кіно"]
        correct: 0
      - question: "Скільки картоплі ми просимо в продавця?"
        options: ["Кілограм", "Трохи", "Багато", "Пачку"]
        correct: 0
      - question: "Скільки м'яса ми хочемо купити?"
        options: ["Шматок", "Кілограм", "Тарілку", "Літр"]
        correct: 0
      - question: "Чого нам потрібно багато для пошуку сиру?"
        options: ["Часу", "Грошей", "Сметани", "Води"]
        correct: 0
      - question: "Чому ми шукаємо найсвіжіший сир?"
        options: ["Бо він вартий нашої уваги", "Бо у нас немає часу", "Бо ми хочемо пити", "Бо ми дуже голодні"]
        correct: 0
      - question: "Що ми наллємо вдома після прогулянки?"
        options: ["Склянку води", "Тарілку борщу", "Літр бензину", "Шматок хліба"]
        correct: 0

  - id: fill-in-partitive-measures
    type: fill-in
    instruction: "Вставте правильну граматичну форму (міри та кількості) у реченнях на тему частковий родовий."
    items:
      - sentence: "Дайте мені, будь ласка, одну _____ води."
        answer: "склянку"
        options: ["склянку", "склянки", "склянці"]
      - sentence: "Мені потрібно відрізати великий _____ хліба."
        answer: "шматок"
        options: ["шматок", "шматка", "шматком"]
      - sentence: "Для цього пирога треба купити _____ цукру."
        answer: "кілограм"
        options: ["кілограм", "літр", "метр"]
      - sentence: "Я хочу з'їсти _____ гарячого борщу."
        answer: "тарілку"
        options: ["тарілку", "тарілки", "тарілкою"]
      - sentence: "Ми залили в бак цілий _____ бензину."
        answer: "літр"
        options: ["літр", "літра", "кілограм"]
      - sentence: "Додайте в напій ще багато _____."
        answer: "льоду"
        options: ["льоду", "ліду", "лід"]
      - sentence: "Дайте склянку свіжого _____."
        answer: "соку"
        options: ["соку", "сіку", "сік"]
      - sentence: "Мені треба купити нову _____ солі."
        answer: "пачку"
        options: ["пачку", "склянку", "літр"]

  - id: quiz-partitive-quantifiers
    type: quiz
    instruction: "Оберіть правильний варіант іменника після квантифікаторів (багато, мало)."
    items:
      - question: "У мене є багато вірних _____."
        options: ["друзів", "друга", "друзі", "друзям"]
        correct: 0
      - question: "Вона щоранку п'є багато міцної _____."
        options: ["кави", "кава", "каву", "кавою"]
        correct: 0
      - question: "На столі лежить чимало стиглих _____."
        options: ["яблук", "яблука", "яблуками", "яблуку"]
        correct: 0
      - question: "Нам треба прочитати багато цікавих _____."
        options: ["книжок", "книжки", "книжкам", "книжками"]
        correct: 0
      - question: "Він додав у чай занадто багато _____."
        options: ["цукру", "цукор", "цукром", "цукрі"]
        correct: 0
      - question: "Сьогодні на вулиці дуже мало _____."
        options: ["людей", "люди", "людям", "людьми"]
        correct: 0

  - id: essay-response-desires
    type: essay-response
    instruction: "Напишіть 5 речень, використовуючи нову лексику з розділу «Родовий бажання, пошуку, досягнення»."
    prompt: "Напишіть мінімум 5 речень, використовуючи дієслова, що вимагають родового відмінка (бажати, потребувати, досягти, позбутися, набути, шукати)."
    min_words: 50
    model_answer: "Я завжди щиро бажаю своїм друзям міцного здоров'я та великого щастя. Цей новий проєкт потребує дуже багато вільного часу. Після довгих років навчання вона нарешті досягла своєї головної мети. Ми всі хочемо швидше позбутися цієї фінансової кризи. Під час роботи за кордоном він зміг набути безцінного практичного досвіду. Також я довго шукав внутрішнього спокою і нарешті знайшов його."

  - id: error-correction-genitive-verbs
    type: error-correction
    instruction: "Знайдіть і виправте помилки у реченнях на тему родовий бажання, пошуку, досягнення."
    items:
      - sentence: "Цей новий проєкт потребує дуже багато вільний час."
        error: "час"
        correction: "часу"
        error_type: "word"
        options: ["часу", "часом", "часі"]
        explanation: "Дієслово «потребувати» керує родовим відмінком."
      - sentence: "Вона нарешті досягла свою головну мету."
        error: "мету"
        correction: "мети"
        error_type: "word"
        options: ["мети", "метою", "меті"]
        explanation: "Дієслово «досягти» керує родовим відмінком."
      - sentence: "Філософи все життя шукають найвищу правду."
        error: "правду"
        correction: "правди"
        error_type: "word"
        options: ["правди", "правдою", "правді"]
        explanation: "Якщо об'єкт пошуку абстрактний, використовуємо родовий відмінок."
      - sentence: "Ми хочемо якнайшвидше позбутися цю фінансову кризу."
        error: "кризу"
        correction: "кризи"
        error_type: "word"
        options: ["кризи", "кризою", "кризі"]
        explanation: "Дієслово «позбутися» завжди вимагає родового відмінка."
      - sentence: "За три роки роботи вона змогла набути безцінний досвід."
        error: "досвід"
        correction: "досвіду"
        error_type: "word"
        options: ["досвіду", "досвідом", "досвіді"]
        explanation: "Дієслово «набути» вимагає родового відмінка (досвіду)."
      - sentence: "Цей український фільм справді вартий ваша увага."
        error: "увага"
        correction: "уваги"
        error_type: "word"
        options: ["уваги", "увагою", "увазі"]
        explanation: "Прикметник «вартий» вимагає після себе родового відмінка."

  - id: match-up-desire-definitions
    type: match-up
    instruction: "З'єднайте дієслова з розділу «Родовий бажання, пошуку, досягнення» з їхніми визначеннями."
    pairs:
      - left: "бажати"
        right: "хотіти чогось для себе або інших"
      - left: "потребувати"
        right: "мати необхідність у чомусь"
      - left: "досягти"
        right: "отримати позитивний результат після зусиль"
      - left: "позбутися"
        right: "зробити так, щоб чогось поганого більше не було"
      - left: "набути"
        right: "отримати щось важливе, наприклад, практичний досвід"
      - left: "шукати"
        right: "намагатися знайти щось або когось"

  - id: transformation-negation
    type: fill-in
    instruction: "Вставте правильну форму слова, утворюючи заперечення. Пам'ятайте про родовий відмінок після «немає» та «не було»."
    items:
      - sentence: "У мене є вільний час. → У мене сьогодні немає вільного _____."
        answer: "часу"
        options: ["часу", "час", "часом"]
      - sentence: "На столі є гарячий хліб. → На столі більше немає гарячого _____."
        answer: "хліба"
        options: ["хліба", "хліб", "хлібом"]
      - sentence: "На зустрічі є мій брат. → На зустрічі немає мого _____."
        answer: "брата"
        options: ["брата", "брат", "братові"]
      - sentence: "У кімнаті є широке вікно. → У кімнаті зовсім немає широкого _____."
        answer: "вікна"
        options: ["вікна", "вікно", "вікном"]
      - sentence: "Вчора був сильний дощ. → Вчора зовсім не було сильного _____."
        answer: "дощу"
        options: ["дощу", "дощ", "дощем"]
      - sentence: "Завтра буде перший урок. → Завтра точно не буде нашого першого _____."
        answer: "уроку"
        options: ["уроку", "урок", "уроком"]

  - id: quiz
    type: quiz
    instruction: "Оберіть правильний варіант для дати або часу."
    items:
      - question: "Яке сьогодні число? Сьогодні _____."
        options: ["друге лютого", "другого лютого", "другий лютий", "два лютого"]
        correct: 0
      - question: "Коли сталася ця подія? Це сталося _____."
        options: ["другого лютого", "друге лютого", "другий лютий", "два лютого"]
        correct: 0
      - question: "Моя відпустка починається десятого _____."
        options: ["серпня", "серпень", "серпнем", "серпні"]
        correct: 0
      - question: "Я планую завершити цей проєкт _____ тижня."
        options: ["наступного", "наступний", "в наступний", "наступним"]
        correct: 0
      - question: "Закон ухвалено у червні дві тисячі двадцять _____ року."
        options: ["четвертого", "чотири", "четвертий", "четвертим"]
        correct: 0
      - question: "_____ дня погода була напрочуд теплою."
        options: ["Того", "Той", "В той", "Тим"]
        correct: 0

  - id: match-up-15
    type: match-up
    instruction: "З'єднайте слова з їхніми закінченнями в родовому відмінку (немає...)."
    pairs:
      - left: "студент"
        right: "студента"
      - left: "зошит"
        right: "зошита"
      - left: "Лондон"
        right: "Лондона"
      - left: "час"
        right: "часу"
      - left: "цукор"
        right: "цукру"
      - left: "вітер"
        right: "вітру"
      - left: "Крим"
        right: "Криму"

  - id: fill-in-prepositions-complex
    type: fill-in
    instruction: "Вставте правильний прийменник, який керує родовим відмінком."
    items:
      - sentence: "Я вип'ю склянку чаю _____ кави."
        answer: "замість"
        options: ["замість", "крім", "щодо"]
      - sentence: "Завтра працюватимуть усі, _____ студентів."
        answer: "крім"
        options: ["крім", "замість", "навколо"]
      - sentence: "Діти радісно бігали _____ будинку."
        answer: "навколо"
        options: ["навколо", "серед", "щодо"]
      - sentence: "Сонце несподівано вийшло _____ хмар."
        answer: "з-за"
        options: ["з-за", "з-під", "з-поміж"]
      - sentence: "Кіт обережно виліз _____ столу."
        answer: "з-під"
        options: ["з-під", "з-за", "внаслідок"]
      - sentence: "Змагання скасували _____ поганої погоди."
        answer: "внаслідок"
        options: ["внаслідок", "через", "щодо"]
      - sentence: "Ми переклали текст _____ словника."
        answer: "за допомогою"
        options: ["за допомогою", "у разі", "на відміну від"]

workbook:
  - id: group-sort-endings
    type: group-sort
    instruction: "Розподіліть іменники чоловічого роду другої відміни за їхнім закінченням у родовому відмінку (однина)."
    groups:
      - label: "Закінчення -а/-я"
        items: ["брат", "Київ", "зошит", "студент", "вовк", "Париж"]
      - label: "Закінчення -у/-ю"
        items: ["цукор", "вітер", "Крим", "досвід", "борщ", "ліс"]

  - id: true-false-genitive
    type: true-false
    instruction: "Правда чи ні? Прочитайте твердження про родовий відмінок."
    items:
      - statement: "Слово «немає» завжди вимагає використання родового відмінка."
        correct: true
        explanation: "Це абсолютне правило української мови. Після «немає» або «нема» завжди вживається родовий відмінок."
      - statement: "Коли ми купуємо частину речовини, наприклад «склянка води», ми використовуємо знахідний відмінок для речовини."
        correct: false
        explanation: "У таких випадках використовується частковий родовий відмінок: склянка (чого?) води."
      - statement: "Усі назви міст мають закінчення -у в родовому відмінку (наприклад, Києву)."
        correct: false
        explanation: "Назви міст мають закінчення -а/-я: Києва, Лондона, Парижа."
      - statement: "Дієслова «бажати», «потребувати» і «досягти» керують родовим відмінком."
        correct: true
        explanation: "Ці дієслова завжди вимагають родового відмінка для об'єкта: бажати щастя, досягти мети."
      - statement: "Для опису події в конкретний день (на запитання «коли?») ми використовуємо називний відмінок."
        correct: false
        explanation: "Ми використовуємо родовий відмінок і для числа, і для місяця: другого лютого."
      - statement: "Прийменники «з-за» та «з-під» завжди пишуться через дефіс і вимагають родового відмінка."
        correct: true
        explanation: "Це складні прийменники, які вказують на специфічний напрямок і керують родовим відмінком."

  - id: translate-negation-desire
    type: translate
    instruction: "Оберіть правильний переклад."
    items:
      - source: "He did not buy a ticket."
        options:
          - text: "Він не купив квитка."
            correct: true
          - text: "Він не купив квиток."
            correct: false
      - source: "We have no time today."
        options:
          - text: "У нас сьогодні немає часу."
            correct: true
          - text: "У нас сьогодні немає час."
            correct: false
      - source: "I sincerely wish you happiness."
        options:
          - text: "Я щиро бажаю вам щастя."
            correct: true
          - text: "Я щиро бажаю вам щастю."
            correct: false
      - source: "She is looking for peace."
        options:
          - text: "Вона шукає спокою."
            correct: true
          - text: "Вона шукає спокій."
            correct: false
      - source: "This new movie is worth your attention."
        options:
          - text: "Цей новий фільм вартий вашої уваги."
            correct: true
          - text: "Цей новий фільм вартий ваша увага."
            correct: false
      - source: "I am drinking a glass of cold juice."
        options:
          - text: "Я п'ю склянку холодного соку."
            correct: true
          - text: "Я п'ю склянку холодного сока."
            correct: false

  - id: error-correction-prepositions
    type: error-correction
    instruction: "Виправте помилки у вживанні прийменників та відмінків."
    items:
      - sentence: "Сонце вийшло із за хмар."
        error: "із за"
        correction: "з-за"
        error_type: "word"
        options: ["з-за", "з за", "із-за"]
        explanation: "Складний прийменник пишеться через дефіс: з-за."
      - sentence: "Я піду в кіно замість робота."
        error: "робота"
        correction: "роботи"
        error_type: "word"
        options: ["роботи", "роботу", "роботою"]
        explanation: "Прийменник «замість» вимагає родового відмінка."
      - sentence: "Вони довго стояли навколо парк."
        error: "парк"
        correction: "парку"
        error_type: "word"
        options: ["парку", "парком", "парка"]
        explanation: "Прийменник «навколо» вимагає родового відмінка. Слово «парк» (територія з межами) має форму парку."
      - sentence: "Усі прийшли на важливу вечірку, крім мій брат."
        error: "мій брат"
        correction: "мого брата"
        error_type: "phrase"
        options: ["мого брата", "моєму брату", "моїм братом"]
        explanation: "Після прийменника «крім» має бути родовий відмінок."
      - sentence: "Аварія сталася внаслідок погана погода."
        error: "погана погода"
        correction: "поганої погоди"
        error_type: "phrase"
        options: ["поганої погоди", "поганій погоді", "погану погоду"]
        explanation: "Прийменник «внаслідок» вимагає родового відмінка (поганої погоди)."
      - sentence: "Чорний кіт виліз з під ліжка."
        error: "з під"
        correction: "з-під"
        error_type: "word"
        options: ["з-під", "із під", "з під"]
        explanation: "Складний прийменник «з-під» пишеться через дефіс."
