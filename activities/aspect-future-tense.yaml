version: "1.0"
module: aspect-future-tense
level: b1

inline:
  - id: quiz-future-intuition
    type: quiz
    instruction: "Що звучить краще? Оберіть форму, яка інтуїтивно відповідає ситуації."
    items:
      - question: "Ви хочете пообіцяти другові завершити книгу до завтра:"
        options:
          - "Я прочитаю цю книгу."
          - "Я буду прочитати цю книгу."
          - "Я читатиму цю книгу."
          - "Я буду читати цю книгу."
        correct: 0
      - question: "Ви плануєте провести весь вечір з книжкою:"
        options:
          - "Я буду читати весь вечір."
          - "Я буду прочитати весь вечір."
          - "Я прочитаю весь вечір."
          - "Я дочитаю весь вечір."
        correct: 0
      - question: "Ви запевняєте керівника, що завдання буде виконано:"
        options:
          - "Я зроблю це завдання."
          - "Я буду робити це завдання."
          - "Я робитиму це завдання."
          - "Я буду зробити це завдання."
        correct: 0
      - question: "Ви розповідаєте, як довго працюєте над проектом:"
        options:
          - "Я працюватиму над ним три дні."
          - "Я попрацюю над ним три дні."
          - "Я буду попрацювати три дні."
          - "Я зроблю над ним три дні."
        correct: 0
      - question: "Ви гарантуєте, що лист буде відправлено:"
        options:
          - "Я напишу цей лист."
          - "Я писатиму цей лист."
          - "Я буду писати цей лист."
          - "Я буду написати цей лист."
        correct: 0
      - question: "Ви описуєте свій тривалий відпочинок на вихідних:"
        options:
          - "Я буду насолоджуватися природою."
          - "Я насолоджуся природою."
          - "Я буду насолодитися природою."
          - "Я буду насолоджувати природою."
        correct: 0

  - id: fill-in-future-forms
    type: fill-in
    instruction: "Вставте правильну форму майбутнього часу (зверніть увагу на вид)."
    items:
      - sentence: "Завтра я обов'язково ____ цей готель. (доконаний)"
        answer: "забронюю"
        options: ["забронюю", "буду бронювати", "бронюватиму", "буду забронювати"]
      - sentence: "На вихідних ми просто ____ у парку. (недоконаний, синтетичний)"
        answer: "гулятимемо"
        options: ["гулятимемо", "будемо гуляти", "погуляємо", "погулятимемо"]
      - sentence: "Я обіцяю, що ____ цей проєкт вчасно. (доконаний)"
        answer: "закінчу"
        options: ["закінчу", "закінчуватиму", "буду закінчувати", "буду закінчити"]
      - sentence: "Увечері я ____ книгу, яку ти мені дав. (недоконаний, складений)"
        answer: "буду читати"
        options: ["буду читати", "читатиму", "прочитаю", "буду прочитати"]
      - sentence: "Вона дуже ____, щоб здати іспит. (недоконаний, синтетичний)"
        answer: "старатиметься"
        options: ["старатиметься", "постарається", "буде старатися", "буде постаратися"]
      - sentence: "Ми ____ нашу поїздку разом. (недоконаний, складений)"
        answer: "будемо планувати"
        options: ["будемо планувати", "плануватимемо", "заплануємо", "будемо запланувати"]
      - sentence: "Він ____ мені допомогти з ремонтом. (доконаний)"
        answer: "пообіцяє"
        options: ["пообіцяє", "обіцятиме", "буде обіцяти", "буде пообіцяти"]
      - sentence: "Ви ____ ці правила дуже швидко. (доконаний)"
        answer: "зрозумієте"
        options: ["зрозумієте", "розумітимете", "будете розуміти", "будете зрозуміти"]

  - id: group-sort-constructions
    type: group-sort
    instruction: "Розподіліть дієслова майбутнього часу за їхньою конструкцією."
    groups:
      - label: "Складений (Compound)"
        items: ["буду читати", "будемо працювати", "будуть гуляти"]
      - label: "Синтетичний (Synthetic)"
        items: ["читатиму", "працюватимемо", "гулятимуть"]
      - label: "Простий (Simple)"
        items: ["прочитаю", "зроблю", "забронюю", "напишу"]

  - id: error-correction-future
    type: error-correction
    instruction: "Знайдіть і виправте логічну граматичну помилку: гібридну форму майбутнього часу."
    items:
      - sentence: "Я буду прочитати цю книжку."
        error: "прочитати"
        correction: "читати"
        error_type: "construction"
        options: ["читати", "прочитаю", "читатиму"]
        explanation: "Допоміжне дієслово «бути» вимагає лише інфінітива недоконаного виду. Якщо ви хочете підкреслити процес — «буду читати», якщо результат — «прочитаю»."
      - sentence: "Завтра я буду зробити всю домашню роботу."
        error: "зробити"
        correction: "робити"
        error_type: "construction"
        options: ["робити", "робитиму", "зроблю"]
        explanation: "Дієслово доконаного виду «зробити» не може стояти після «буду»."
      - sentence: "Вона буде написати звіт до вечора."
        error: "написати"
        correction: "писати"
        error_type: "construction"
        options: ["писати", "напише", "писатиме"]
        explanation: "Форма «буде написати» — це типова помилка, адже не можна розтягнути результат («написати») у тривалий процес («буде»)."
      - sentence: "Ми будемо запланувати нашу поїздку на вихідних."
        error: "запланувати"
        correction: "планувати"
        error_type: "construction"
        options: ["планувати", "заплануємо", "плануватимемо"]
        explanation: "Дієслово «бути» не поєднується з доконаним «запланувати». Використовуйте недоконане «планувати»."
      - sentence: "Ти будеш постаратися закінчити це вчасно?"
        error: "постаратися"
        correction: "старатися"
        error_type: "construction"
        options: ["старатися", "постараєшся", "старатимешся"]
        explanation: "Не можна казати «будеш постаратися». Правильно: «будеш старатися» (процес) або «постараєшся» (результат)."
      - sentence: "Вони будуть купити нову машину наступного тижня."
        error: "купити"
        correction: "купувати"
        error_type: "construction"
        options: ["купувати", "куплять", "купуватимуть"]
        explanation: "Слово «купити» — це доконаний вид. Його не можна поєднувати з «будуть». Треба використовувати «купувати»."

  - id: match-up-situations
    type: match-up
    instruction: "З'єднайте комунікативну ситуацію з найбільш природною формою майбутнього часу."
    pairs:
      - left: "Обіцянка завершити звіт (результат)"
        right: "Я обов'язково напишу його."
      - left: "Опис робочого процесу (тривалість)"
        right: "Я буду писати його весь вечір."
      - left: "Офіційний графік на день (елегантний стиль)"
        right: "О дев'ятій я працюватиму."
      - left: "Твердий намір поїхати (дія-результат)"
        right: "Я поїду до Києва завтра."
      - left: "Мрія про відпочинок (постійний стан)"
        right: "Я буду насолоджуватися природою."
      - left: "Гарантія покупки квитків (результат)"
        right: "Я куплю нам квитки."
      - left: "Передбачення довгої розмови (тривалість)"
        right: "Ми розмовлятимемо годинами."
      - left: "Обіцянка підтримувати зв'язок (процес)"
        right: "Я буду дзвонити тобі щодня."

  - id: open-writing-tomorrow-plan
    type: essay-response
    prompt: "Опишіть свій план на завтра (мінімум 50 слів). Обов'язково використайте принаймні 6 дієслів майбутнього часу: комбінуйте тривалі процеси (недоконаний вид: складена або синтетична форми) та конкретні результати (доконаний вид: проста форма). Поясніть свій вибір у дужках для кожної форми."
    min_words: 50
    model_answer: "Завтра я встану о сьомій годині (доконаний вид — дія-результат). Я довго снідатиму і питиму каву (недоконаний вид — процес). О дев'ятій я поїду на роботу (доконаний вид — зміна стану). Я буду працювати там до вечора (недоконаний вид — тривала дія). Увечері я обов'язково напишу звіт (доконаний вид — завершена дія) і просто відпочиватиму (недоконаний вид — без результату)."
    evaluation_criteria:
      - "Текст містить мінімум 50 слів і логічно описує план на день."
      - "Використано дієслова недоконаного виду для опису процесів (буду робити / робитиму)."
      - "Використано дієслова доконаного виду для опису результатів (зроблю)."
      - "Студент пояснив у дужках свій вибір для кожної дієслівної форми."

workbook:
  - type: translate
    instruction: "Оберіть правильний переклад українською мовою."
    items:
      - source: "I will be reading all evening."
        options:
          - text: "Я читатиму весь вечір."
            correct: true
          - text: "Я прочитаю весь вечір."
            correct: false
      - source: "I will finish this book tomorrow."
        options:
          - text: "Я прочитаю цю книгу завтра."
            correct: true
          - text: "Я буду читати цю книгу завтра."
            correct: false
      - source: "He will book the hotel."
        options:
          - text: "Він забронює готель."
            correct: true
          - text: "Він бронюватиме готель."
            correct: false
      - source: "We will enjoy the nature."
        options:
          - text: "Ми будемо насолоджуватися природою."
            correct: true
          - text: "Ми насолодимося природою."
            correct: false
      - source: "They will finish the project."
        options:
          - text: "Вони закінчать проєкт."
            correct: true
          - text: "Вони закінчуватимуть проєкт."
            correct: false
      - source: "I will make an effort."
        options:
          - text: "Я буду старатися."
            correct: true
          - text: "Я постараюся."
            correct: false

  - type: true-false
    instruction: "Правда чи ні? Перевірте своє розуміння граматики майбутнього часу."
    items:
      - statement: "Складений майбутній час утворюється з допоміжним дієсловом «бути» та інфінітивом доконаного виду."
        correct: false
        explanation: "Дієслово «бути» в майбутньому часі вимагає лише інфінітива недоконаного виду."
      - statement: "Дієслова доконаного виду не можуть мати форми теперішнього часу."
        correct: true
        explanation: "Доконаний вид означає повністю завершену дію, тому він не може бути процесом у теперішньому часі."
      - statement: "Синтетичний майбутній час (наприклад, «писатиму») означає завершену дію."
        correct: false
        explanation: "Синтетична форма вказує на тривалий процес (недоконаний вид), так само як і складена («буду писати»)."
      - statement: "Простий майбутній час (наприклад, «напишу») завжди вказує на гарантований результат або завершення дії."
        correct: true
        explanation: "Простий майбутній час утворюється від дієслів доконаного виду, які позначають результат."
      - statement: "Конструкція «буду зробити» є граматично правильною в повсякденному розмовному стилі."
        correct: false
        explanation: "Це типова помилка (гібридна форма). Можна сказати тільки «зроблю» або «буду робити»."
      - statement: "Складена і синтетична форми («буду читати» і «читатиму») мають однакове значення і відрізняються лише стилістично."
        correct: true
        explanation: "Обидві форми означають тривалий процес у майбутньому; синтетична звучить трохи більш елегантно."
