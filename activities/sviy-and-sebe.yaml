version: "1.0"
module: sviy-and-sebe
level: a2

inline:
  - id: quiz-possessive-choice
    type: quiz
    instruction: "Оберіть правильний варіант"
    items:
      - question: "Максим дуже любить ______ дружину."
        options: ["свою", "його", "її", "їхню"]
        correct: 0
      - question: "Олена зустріла брата. Вона взяла ______ парасольку."
        options: ["його", "свою", "свій", "її"]
        correct: 0
      - question: "Ми завжди прибираємо ______ кімнату самостійно."
        options: ["свою", "їхню", "її", "його"]
        correct: 0
      - question: "Вчитель перевіряє зошити учнів. Він читає ______ тексти."
        options: ["їхні", "свої", "свій", "його"]
        correct: 0
      - question: "Ти знову забув ______ телефон вдома!"
        options: ["свій", "його", "її", "своє"]
        correct: 0
      - question: "Директор зараз у кабінеті. Він запросив туди ______ нового партнера."
        options: ["свого", "його", "свій", "її"]
        correct: 0
      - question: "Марина слухає музику. Це ______ улюблена пісня."
        options: ["її", "свою", "його", "своя"]
        correct: 0
      - question: "Батьки купують подарунки для ______ дітей."
        options: ["своїх", "їхніх", "свого", "її"]
        correct: 0

  - id: true-false-sviy-grammar
    type: true-false
    instruction: "Правда чи ні? Чи правильно використано слово «свій»?"
    items:
      - statement: "Він бачить свою старшого брата."
        correct: false
        explanation: "Брат — це чоловічий рід, тому треба використовувати форму «свого», а не «свою»."
      - statement: "Я дуже люблю свою маму."
        correct: true
        explanation: "Слово «свою» правильно узгоджується з іменником жіночого роду в знахідному відмінку («маму»)."
      - statement: "Олег забув його парасольку вдома."
        correct: false
        explanation: "Коли людина забула власну річ, треба казати «свою парасольку», бо «його» означає парасольку іншого чоловіка."
      - statement: "Ми дуже любимо своє чудове місто."
        correct: true
        explanation: "Форма «своє» правильно узгоджується з іменником середнього роду («місто»)."
      - statement: "Вона вийшла зі свого кімнати."
        correct: false
        explanation: "Кімната — це жіночий рід. У родовому відмінку правильна форма — «зі своєї кімнати»."
      - statement: "Він приїхав за своєю дружиною."
        correct: true
        explanation: "Форма «своєю» правильно узгоджується з іменником жіночого роду в орудному відмінку."
      - statement: "Кожен директор має свій власний кабінет."
        correct: true
        explanation: "Слово «свій» використовується правильно, бо кабінет належить директору (підмету)."
      - statement: "Батьки купують подарунки для своїм дітей."
        correct: false
        explanation: "Після прийменника «для» потрібен родовий відмінок: «для своїх дітей»."

  - id: fill-in-sebe-cases
    type: fill-in
    instruction: "Вставте правильну форму займенника (себе, собі, собою)"
    items:
      - sentence: "Сьогодні я почуваю _____ дуже добре."
        answer: "себе"
        options: ["себе", "собі", "собою"]
      - sentence: "Ти взагалі можеш уявити _____ цю ситуацію?"
        answer: "собі"
        options: ["себе", "собі", "собою"]
      - sentence: "Завтра я хочу купити _____ нову парасольку."
        answer: "собі"
        options: ["себе", "собі", "собою"]
      - sentence: "Я завжди ношу стару фотографію із _____."
        answer: "собою"
        options: ["себе", "собі", "собою"]
      - sentence: "Вона часто бачить _____ у великому дзеркалі."
        answer: "себе"
        options: ["себе", "собі", "собою"]
      - sentence: "Він склав іспит і тепер задоволений _____."
        answer: "собою"
        options: ["себе", "собі", "собою"]
      - sentence: "Ця людина дуже любить тільки _____."
        answer: "себе"
        options: ["себе", "собі", "собою"]
      - sentence: "Я завжди бажаю _____ успіху перед іспитом."
        answer: "собі"
        options: ["себе", "собі", "собою"]

  - id: match-up-sebe-idioms
    type: match-up
    instruction: "З'єднайте українську фразу з її англійським значенням"
    pairs:
      - left: "усе буде у свій час"
        right: "everything in its own time"
      - left: "мати свою думку"
        right: "to have one's own opinion"
      - left: "знати своє місце"
        right: "to know one's place"
      - left: "свої люди"
        right: "kindred spirits"
      - left: "почувати себе"
        right: "to feel (physically/mentally)"
      - left: "вести себе"
        right: "to behave"
      - left: "уявити собі"
        right: "to imagine"
      - left: "сам по собі"
        right: "on one's own / independently"

  - id: error-correction-sviy-sebe
    type: error-correction
    instruction: "Знайдіть і виправте помилку"
    items:
      - sentence: "Вона дуже любить його чоловіка."
        error: "його"
        correction: "свого"
        error_type: "word"
        options: ["свою", "свого", "її"]
        explanation: "Якщо це її власний чоловік, треба казати «свого»."
      - sentence: "Сьогодні я почуваю себе."
        error: "себе."
        correction: "себе добре."
        error_type: "phrase"
        options: ["себе гарний.", "себе добре.", "себе вдома."]
        explanation: "Після фрази «почувати себе» обов'язково треба додати прислівник (наприклад, добре або погано)."
      - sentence: "Ти забув твій телефон вдома."
        error: "твій"
        correction: "свій"
        error_type: "word"
        options: ["свій", "свою", "свого"]
        explanation: "Хоча «твій» граматично правильно, українці використовують «свій», коли говорять про власні речі."
      - sentence: "Ця маленька дитина веде себе."
        error: "себе."
        correction: "себе погано."
        error_type: "phrase"
        options: ["себе погано.", "себе завжди.", "себе тут."]
        explanation: "Як і з «почувати себе», ми повинні додати прислівник, щоб сказати, як саме вона себе веде."
      - sentence: "Себе бачить мене у великому дзеркалі."
        error: "Себе"
        correction: "Він"
        error_type: "word"
        options: ["Він", "Його", "Свій"]
        explanation: "Слово «себе» ніколи не може бути головним підметом у реченні."
      - sentence: "Вона добре себе поводить."
        error: "себе поводить."
        correction: "поводиться."
        error_type: "phrase"
        options: ["поводить.", "поводиться.", "себе поводиться."]
        explanation: "Набагато краще казати «вона поводиться», бо суфікс «-ся» вже означає «себе»."

workbook:
  - type: fill-in
    instruction: "Вставте правильну форму слова «свій»"
    items:
      - sentence: "Він приїхав за _____ дружиною."
        answer: "своєю"
        options: ["своєю", "своєму", "свою"]
      - sentence: "Вона вийшла зі _____ кімнати."
        answer: "своєї"
        options: ["своєї", "своєму", "свою"]
      - sentence: "Кожен директор має _____ кабінет."
        answer: "свій"
        options: ["свій", "свого", "свою"]
      - sentence: "Я довго чекаю _____ друга."
        answer: "свого"
        options: ["свій", "свого", "своєму"]
      - sentence: "Ми часто допомагаємо _____ батькам."
        answer: "своїм"
        options: ["своїм", "своїх", "своїми"]
      - sentence: "Я горджуся _____ рідним містом."
        answer: "своїм"
        options: ["своїм", "своєму", "своєю"]

  - type: unjumble
    instruction: "Складіть правильне речення зі слів"
    items:
      - words: ["у", "бачу", "великому", "себе", "Я", "дзеркалі."]
        correct_order: ["Я", "бачу", "себе", "у", "великому", "дзеркалі."]
      - words: ["Він", "свою", "любить", "роботу.", "дуже"]
        correct_order: ["Він", "дуже", "любить", "свою", "роботу."]
      - words: ["телефон", "знову", "свій", "Ти", "забув!"]
        correct_order: ["Ти", "знову", "забув", "свій", "телефон!"]
      - words: ["нарешті", "собі", "Я", "парасольку.", "нову", "купив"]
        correct_order: ["Я", "нарешті", "купив", "собі", "нову", "парасольку."]
      - words: ["почуваю", "добре.", "дуже", "себе", "Сьогодні", "я"]
        correct_order: ["Сьогодні", "я", "почуваю", "себе", "дуже", "добре."]
      - words: ["своїх", "Вони", "нових", "чекають", "гостей."]
        correct_order: ["Вони", "чекають", "своїх", "нових", "гостей."]

  - type: translate
    instruction: "Оберіть правильний переклад українською мовою"
    items:
      - source: "He loves his (own) wife."
        options:
          - text: "Він любить свою дружину."
            correct: true
          - text: "Він любить його дружину."
            correct: false
      - source: "They love their (own) city."
        options:
          - text: "Вони люблять своє місто."
            correct: true
          - text: "Вони люблять їхнє місто."
            correct: false
      - source: "I feel good today."
        options:
          - text: "Сьогодні я почуваю себе добре."
            correct: true
          - text: "Сьогодні я почуваю себе."
            correct: false
      - source: "She is behaving well."
        options:
          - text: "Вона добре поводиться."
            correct: true
          - text: "Вона добре себе поводить."
            correct: false
      - source: "Everything in its own time."
        options:
          - text: "Усе буде у свій час."
            correct: true
          - text: "Усе буде у мій час."
            correct: false
      - source: "He lives on his own (independently)."
        options:
          - text: "Він живе сам по собі."
            correct: true
          - text: "Він живе сам з собою."
            correct: false