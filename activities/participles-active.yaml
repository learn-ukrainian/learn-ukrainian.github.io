version: "1.0"
module: participles-active
level: b1

inline:
  - id: quiz-participle-definition
    type: quiz
    instruction: "Оберіть правильний варіант: що таке дієприкметник?"
    items:
      - question: "Які граматичні ознаки поєднує в собі дієприкметник?"
        options: ["дієслова і прикметника", "іменника і прикметника", "дієслова і прислівника", "тільки прикметника"]
        correct: 0
      - question: "На які питання відповідає дієприкметник?"
        options: ["який? яка? яке? які?", "що робити? що зробити?", "хто? що?", "як? де? коли?"]
        correct: 0
      - question: "Що саме означає дієприкметник у реченні?"
        options: ["ознаку предмета за дією", "постійну ознаку предмета", "назву предмета", "саму дію"]
        correct: 0
      - question: "Яке з цих слів є дієприкметником?"
        options: ["зеленіючий", "зелений", "зеленіти", "зелено"]
        correct: 0
      - question: "Яке з цих слів є звичайним прикметником (називає постійну якість, не пов'язану з дією)?"
        options: ["високий", "прочитаний", "розквітлий", "лежачий"]
        correct: 0
      - question: "Що описує активний дієприкметник?"
        options: ["предмет, який сам виконує дію", "предмет, який зазнає дії", "постійну природну якість", "предмет, який не змінюється"]
        correct: 0

  - id: fill-in-present-formation
    type: fill-in
    instruction: "Вставте правильну граматичну форму на тему утворення дієприкметників."
    items:
      - sentence: "Від дієслова «працювати» (вони працюють) утворюємо дієприкметник ______."
        answer: "працюючий"
        options: ["працюючий", "працюачий", "працююча", "працювавший"]
      - sentence: "Від дієслова «лежати» (вони лежать) утворюємо дієприкметник ______."
        answer: "лежачий"
        options: ["лежачий", "лежучий", "лежати", "лежавший"]
      - sentence: "Від дієслова «знати» (вони знають) походить форма ______."
        answer: "знаючий"
        options: ["знаючий", "знаачий", "знавчий", "знавши"]
      - sentence: "Від дієслова «тремтіти» (вони тремтять) походить форма ______."
        answer: "тремтячий"
        options: ["тремтячий", "тремтючий", "тремтівши", "тремтяч"]
      - sentence: "Для дієслів другої дієвідміни (на -ать, -ять) ми використовуємо суфікси ______."
        answer: "-ач- / -яч-"
        options: ["-ач- / -яч-", "-уч- / -юч-", "-л- / -іл-", "-вш- / -ш-"]
      - sentence: "Слово «зеленіючий» зберігає дієслівний корінь і суфікс часу, тому це ______."
        answer: "дієприкметник"
        options: ["дієприкметник", "прикметник", "дієслово", "іменник"]

  - id: match-up-definitions
    type: match-up
    instruction: "З'єднайте лексикалізовані активні дієприкметники з іменниками, щоб утворити усталені словосполучення."
    pairs:
      - left: "пекучий"
        right: "біль"
      - left: "киплячий"
        right: "чайник"
      - left: "лежачий"
        right: "камінь"
      - left: "палаючий"
        right: "вогонь"
      - left: "квітучий"
        right: "сад"
      - left: "опалий"
        right: "листок"

  - id: essay-response-nature
    type: essay-response
    prompt: "Напишіть 5 речень, використовуючи нову лексику з розділу «Активні дієприкметники теперішнього часу (-уч-/-юч-, -ач-/-яч-)» (наприклад, квітучий, палаючий, пекучий, киплячий). Опишіть природу або явища, які відбуваються прямо зараз."
    min_words: 50
    model_answer: >
      У нашому саду можна побачити справжній квітучий рай.
      Під сонцем лежить пекучий пісок, на який неможливо наступити босоніж.
      Біля річки палаючий вогонь зігріває нас уночі.
      Вода в казанку вже нагадує киплячий вулкан.
      Ця краса природи захоплює і дарує спокій.

  - id: error-correction-calques
    type: error-correction
    instruction: "Знайдіть і виправте помилки (русизми та кальки) у реченнях."
    items:
      - sentence: "Це діючий закон."
        error: "діючий"
        correction: "чинний"
        error_type: "word"
        options: ["чинний", "дійсний", "робочий", "законний"]
        explanation: "«Діючий» у значенні valid — це русизм, правильне слово для закону чи правила — «чинний»."
      - sentence: "Завідуючий відділом сказав це на зборах."
        error: "Завідуючий"
        correction: "Завідувач"
        error_type: "word"
        options: ["Завідувач", "Керівник", "Начальник", "Завідувачем"]
        explanation: "Посада називається іменником «завідувач», а не штучним дієприкметником «завідуючий»."
      - sentence: "Кожен бажаючий може прийти на концерт."
        error: "бажаючий"
        correction: "охочий"
        error_type: "word"
        options: ["охочий", "бажаний", "хочучий", "бажач"]
        explanation: "«Бажаючий» — калька, в українській мові використовується прикметник «охочий»."
      - sentence: "Він купив новий миючий засіб."
        error: "миючий"
        correction: "мийний"
        error_type: "word"
        options: ["мийний", "митий", "мильний", "миючи"]
        explanation: "Речі, призначені для миття, називаються «мийними» (це їхня постійна властивість)."
      - sentence: "Слідуючий пацієнт, заходьте."
        error: "Слідуючий"
        correction: "Наступний"
        error_type: "word"
        options: ["Наступний", "Другий", "Інший", "Слідуюче"]
        explanation: "«Слідуючий» — це грубий русизм, українською кажуть «наступний»."
      - sentence: "Це лідируюча компанія на ринку."
        error: "лідируюча"
        correction: "провідна"
        error_type: "word"
        options: ["провідна", "лідерська", "головна", "перша"]
        explanation: "Замість штучного «лідируюча» використовують питоме слово «провідна»."

  - id: reading-comprehension-nature
    type: reading
    passage: "Читаючи твори українських класиків, таких як Михайло Коцюбинський або Михайло Стельмах, ми часто натрапляємо на майстерне використання активних дієприкметників минулого часу (наприклад, пожовклий, перестиглий, зів'ялий). Вони допомагають авторам точно передати зміни в природі, показуючи повністю завершену дію: листок уже пожовтів, а колос остаточно перестиг. На відміну від штучних і часто скопійованих дієприкметників теперішнього часу (на -учий), ці форми минулого часу звучать природно, мелодійно і зовсім не обтяжують речення. Письменники свідомо обирають їх, щоб створити ефект застиглої миті й додати тексту емоційної глибини."
    questions:
      - "Яку функцію виконують активні дієприкметники минулого часу в художніх текстах?"
      - "Чому українські письменники віддають перевагу формам на зразок «пожовклий», а не неприродним формам теперішнього часу?"
      - "Що означає концепція «завершеної дії» на прикладі слова «перестиглий»?"

  - id: match-up-term-definitions
    type: match-up
    instruction: "З'єднайте граматичні терміни з розділу з їхніми правильними визначеннями."
    pairs:
      - left: "активний дієприкметник"
        right: "ознака предмета, який сам виконує дію"
      - left: "пасивний дієприкметник"
        right: "ознака предмета, який зазнає дії з боку іншого"
      - left: "описовий зворот"
        right: "конструкція зі словами «який» або «що»"
      - left: "русизм (калька)"
        right: "неприродна форма, наприклад, слово із суфіксом -вш-"
      - left: "суфікс -л-"
        right: "використовується для утворення дієприкметників минулого часу"
      - left: "лексикалізована форма"
        right: "дієприкметник, що втратив дію і став звичайним прикметником"

  - id: quiz-active-participles-review
    type: quiz
    instruction: "Підсумковий тест: оберіть правильний варіант, спираючись на вивчену лексику та граматику."
    items:
      - question: "Який суфікс категорично заборонено використовувати в українській мові для дієприкметників?"
        options: ["-вш-", "-уч-", "-ач-", "-л-"]
        correct: 0
      - question: "Як найбільш природно і правильно українською сказати «читаючий учень»?"
        options: ["учень, який читає", "читаючий учень", "учень, що читаючий", "учень прочитаний"]
        correct: 0
      - question: "Від якого дієслова утворено дієприкметник минулого часу «зів'ялий»?"
        options: ["зів'янути", "в'янути", "в'ялити", "зів'ялити"]
        correct: 0
      - question: "Яке слово є правильно утвореним дієприкметником минулого часу?"
        options: ["опалий", "опавший", "опалучий", "опадаючий"]
        correct: 0
      - question: "Яке речення є стилістично бездоганним та не містить кальок?"
        options: ["Довкілля є вкрай нестабільним.", "Оточуюче середовище є нестабільним.", "Довкілля є нестабілістичне.", "Оточуюче довкілля є нестабільне."]
        correct: 0
      - question: "Що відбувається із суфіксом -ну- при творенні дієприкметників минулого часу (наприклад, розквітнути)?"
        options: ["він випадає (розквітлий)", "він залишається (розквітнулий)", "він замінюється (розквітучий)", "він стає закінченням (розквітний)"]
        correct: 0

workbook:
  - type: match-up
    instruction: "З'єднайте українське слово з його англійським перекладом."
    pairs:
      - left: "пекучий"
        right: "burning, scorching"
      - left: "потерпілий"
        right: "victim"
      - left: "збанкрутілий"
        right: "bankrupt"
      - left: "змарнілий"
        right: "emaciated"
      - left: "панівний"
        right: "dominant"
      - left: "завідувач"
        right: "head / manager"

  - type: fill-in
    instruction: "Який? Яка? Яке?: Вставте правильне закінчення дієприкметника, узгоджуючи його з іменником у роді, числі та відмінку."
    items:
      - sentence: "Він підняв із землі опал___ листок."
        answer: "ий"
        options: ["ий", "ого", "а", "е"]
      - sentence: "Ми довго насолоджувалися квітуч___ садом."
        answer: "им"
        options: ["им", "ого", "ому", "ий"]
      - sentence: "Швидка допомога допомогла потерпіл___ жінці."
        answer: "ій"
        options: ["ій", "а", "ою", "у"]
      - sentence: "Я бачу на лавці посивіл___ дідуся."
        answer: "ого"
        options: ["ого", "ий", "ому", "им"]
      - sentence: "Діти заворожено дивилися на палаюч___ вогнище."
        answer: "е"
        options: ["е", "ого", "ому", "им"]
      - sentence: "Ми розмовляли про зникл___ ключі, які ніде не могли знайти."
        answer: "і"
        options: ["і", "их", "ими", "ому"]

  - type: match-up
    instruction: "Зіставте іменники з правильними формами дієприкметників, звертаючи увагу на рід та число."
    pairs:
      - left: "листок (він)"
        right: "опалий"
      - left: "книга (вона)"
        right: "прочитана"
      - left: "дерево (воно)"
        right: "розквітле"
      - left: "сад (він)"
        right: "квітучий"
      - left: "гори (вони)"
        right: "побілілі"
      - left: "біль (він)"
        right: "пекучий"

  - type: odd-one-out
    instruction: "Четверте зайве: оберіть слово, що не належить до логічної або граматичної групи."
    items:
      - words: ["пекучий", "киплячий", "лежачий", "читати"]
        correct: 3
        explanation: "«Читати» — це дієслово, а всі інші слова — прикметники або лексикалізовані дієприкметники."
      - words: ["зниклий", "опалий", "посивілий", "квітучий"]
        correct: 3
        explanation: "«Квітучий» — дієприкметник теперішнього часу, тоді як інші слова позначають минулий час (із суфіксом -л-)."
      - words: ["керуючий", "бажаючий", "слідуючий", "завідувач"]
        correct: 3
        explanation: "«Завідувач» — це правильне українське слово, а всі інші є русизмами (кальками)."
      - words: ["працюють", "знають", "пишуть", "лежать"]
        correct: 3
        explanation: "«Лежать» — це форма другої дієвідміни, інші три слова належать до першої дієвідміни."
      - words: ["дієприкметник", "прикметник", "іменник", "описовий зворот"]
        correct: 3
        explanation: "«Описовий зворот» — це синтаксична конструкція (фраза), а решта — частини мови."
      - words: ["чинний", "діючий", "охочий", "провідний"]
        correct: 1
        explanation: "«Діючий» (у значенні current) — це скалькований русизм, який слід замінювати на «чинний»."

  - type: match-up
    instruction: "Займенник + дієслово: з'єднайте особовий займенник із правильною формою дієслова."
    pairs:
      - left: "я"
        right: "працюю"
      - left: "ти"
        right: "працюєш"
      - left: "він"
        right: "працює"
      - left: "ми"
        right: "працюємо"
      - left: "ви"
        right: "працюєте"
      - left: "вони"
        right: "працюють"

  - type: fill-in
    instruction: "Вставте правильний особовий займенник за контекстом речення."
    items:
      - sentence: "Коли _____ закінчиш читати цю книгу?"
        answer: "ти"
        options: ["ти", "Ви", "він", "вони"]
      - sentence: "_____ завжди допомагаємо один одному в команді."
        answer: "ми"
        options: ["ми", "ви", "вони", "я"]
      - sentence: "Чи _____ знаєте, де знаходиться кабінет завідувача?"
        answer: "Ви"
        options: ["Ви", "ти", "вона", "воно"]
      - sentence: "_____ працює над новим проєктом вже третій місяць."
        answer: "він"
        options: ["він", "вони", "ми", "ви"]
      - sentence: "_____ часто ходять до цього парку на вихідних."
        answer: "вони"
        options: ["вони", "ми", "ви", "він"]
      - sentence: "Сьогодні _____ планую завершити всю роботу."
        answer: "я"
        options: ["я", "ти", "він", "вона"]

  - type: group-sort
    instruction: "Однина чи множина? Розподіліть особові займенники на дві відповідні групи."
    groups:
      - label: "Однина"
        items: ["я", "ти", "він", "вона", "воно"]
      - label: "Множина"
        items: ["ми", "ви", "вони"]

  - type: quiz
    instruction: "Ти чи Ви? Оберіть правильну форму займенника для звертання залежно від контексту."
    items:
      - question: "«_____ хочете взяти участь у цьому проєкті?» (ви звертаєтеся до свого керівника)"
        options: ["Ви", "Ти", "Він", "Вони"]
        correct: 0
      - question: "«_____ можеш допомогти мені перекласти це речення?» (ви звертаєтеся до близького друга)"
        options: ["ти", "Ви", "він", "вона"]
        correct: 0
      - question: "«Я звертаюся до _____, пане завідувач.»"
        options: ["Вас", "тебе", "його", "їх"]
        correct: 0
      - question: "«_____ сьогодні маєш час на каву після роботи?»"
        options: ["Ти", "Ви", "Ми", "Я"]
        correct: 0
      - question: "«Чи можу я запитати _____ про цей термін, Олено Іванівно?»"
        options: ["Вас", "тебе", "його", "її"]
        correct: 0
      - question: "«Привіт, як у _____ справи?» (розмова з братом)"
        options: ["тебе", "Вас", "нього", "нас"]
        correct: 0

  - type: error-correction
    instruction: "Знайдіть і виправте помилку в узгодженні між іменником та дієприкметником."
    items:
      - sentence: "Я бачу пожовклу листок на дереві."
        error: "пожовклу"
        correction: "пожовклий"
        error_type: "word"
        options: ["пожовклий", "пожовкле", "пожовклих"]
        explanation: "Листок — це іменник чоловічого роду, тому дієприкметник має бути у формі чоловічого роду (пожовклий)."
      - sentence: "Вона принесла квітуче квіти."
        error: "квітуче"
        correction: "квітучі"
        error_type: "word"
        options: ["квітучі", "квітуча", "квітучий"]
        explanation: "Квіти — іменник у множині, тому потрібна форма множини (квітучі)."
      - sentence: "Ми стояли під опалий деревом."
        error: "опалий"
        correction: "опалим"
        error_type: "word"
        options: ["опалим", "опалому", "опалого"]
        explanation: "Орудний відмінок (під ким/чим?) вимагає закінчення -им для середнього роду."
      - sentence: "Я не знайшов зниклого книгу."
        error: "зниклого"
        correction: "зниклу"
        error_type: "word"
        options: ["зниклу", "зниклий", "зниклої"]
        explanation: "Книга — це жіночий рід, знахідний відмінок (знайти кого/що?), тому правильно буде «зниклу»."
      - sentence: "Він розмовляв із потерпілою чоловіком."
        error: "потерпілою"
        correction: "потерпілим"
        error_type: "word"
        options: ["потерпілим", "потерпілого", "потерпілому"]
        explanation: "Чоловік — це чоловічий рід, орудний відмінок, тому узгодження вимагає форми «потерпілим»."
