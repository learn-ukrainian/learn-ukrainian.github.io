  - type: true-false
    instruction: "Правда чи ні? Прочитайте твердження та визначте, чи є вони правильними."
    items:
      - statement: "Активні дієприкметники теперішнього часу на -учий/-ючий дуже часто і природно використовуються в сучасній українській мові."
        correct: false
        explanation: "Такі форми не є характерними для української мови. Замість них використовують описові звороти зі словом «який»."
      - statement: "Активний дієприкметник завжди вказує на предмет, який самостійно виконує дію."
        correct: true
        explanation: "Так, активні дієприкметники (наприклад, «палаючий вогонь») означають, що суб'єкт сам є активним учасником процесу."
      - statement: "Суфікси -вш- та -ш- є абсолютно правильними для утворення дієприкметників в українській мові."
        correct: false
        explanation: "Ці суфікси є грубими русизмами (кальками). В українській мові вони ніколи не використовуються."
      - statement: "Словосполучення «опалий листок» містить активний дієприкметник минулого часу."
        correct: true
        explanation: "Так, «опалий» утворено від дієслова «опасти» за допомогою суфікса -л-."
      - statement: "Дієприкметники минулого часу на -л- відмінюються (змінюються за відмінками) так само, як звичайні прикметники."
        correct: true
        explanation: "Так, вони відмінюються так само, як прикметники твердої групи."
      - statement: "Замість дієприкметника «читаючий» стилістично краще сказати «який читає»."
        correct: true
        explanation: "Це описовий зворот, який є найбільш природним та грамотним вибором для української мови."

