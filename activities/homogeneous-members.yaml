version: "1.0"
module: "homogeneous-members"
level: "b1"

inline:
  - id: reading
    type: reading
    title: "Однорідні члени речення"
    instruction: "Прочитайте текст про однорідні члени та дайте відповіді на запитання."
    text: "Однорідні члени речення — це слова, які виконують однакову синтаксичну функцію і залежать від того самого слова. Вони можуть бути поєднані сполучниками або інтонацією (асиндетон). Існують три основні типи сполучників: єднальні (і, й, та), протиставні (а, але, проте) та розділові (або, чи). Якщо перелік містить узагальнювальне слово, використовується двокрапка перед переліком і тире — після нього. На письмі між однорідними членами часто ставиться кома. Однорідними можуть бути підмети, присудки, додатки, означення та обставини."
    tasks:
      - "Що таке однорідні члени речення?"
      - "Які з цих сполучників є протиставними?"
      - "Що таке асиндетон?"
      - "Коли використовується двокрапка?"
      - "Які члени речення можуть бути однорідними?"
      - "Який тип сполучників пропонує альтернативний вибір?"

  - id: fill-in
    type: fill-in
    title: "Вставте правильну граматичну форму"
    instruction: "Вставте правильну граматичну форму у реченнях на тему однорідні члени: визначення і розпізнавання."
    items:
      - sentence: "Він купив хліб, молоко ___ сир."
        answer: "та"
        options: ["та", "але", "або"]
      - sentence: "Це було високе, струнке, ___ дерево."
        answer: "зелене"
        options: ["зелене", "зелений", "зелена"]
      - sentence: "Ми поїдемо в гори ___ на море."
        answer: "або"
        options: ["і", "але", "або"]
      - sentence: "Діти і дорослі ___ на свято."
        answer: "зібралися"
        options: ["зібралися", "зібрався", "зібралася"]
      - sentence: "Вона читала, писала ___ малювала весь вечір."
        answer: "і"
        options: ["і", "але", "проте"]
      - sentence: "Кіт і собака ___ у дворі."
        answer: "пустують"
        options: ["пустують", "пустує", "пустувати"]
      - sentence: "Він працював швидко, точно ___ сумлінно."
        answer: "і"
        options: ["і", "але", "або"]
      - sentence: "Після дощу повітря свіже, чисте, ___."
        answer: "прозоре"
        options: ["прозоре", "прозорий", "прозора"]

  - id: essay-conjunctions
    type: essay-response
    title: "Написання речень із сполучниками"
    instruction: "Напишіть речення з різними сполучниками."
    prompt: "Напишіть 5 речень, використовуючи нову лексику з розділу «Сполучники при однорідних членах» (єднальні, протиставні, розділові)."
    model_answer: "1. Я купив яблука і груші. 2. Він розумний, але ледачий. 3. Ми поїдемо в гори або на море. 4. Вони читали та писали весь вечір. 5. Не тільки діти, а й дорослі раділи святу."

  - id: error-correction-conjunctions
    type: error-correction
    title: "Виправте помилки зі сполучниками"
    instruction: "Знайдіть і виправте помилки у реченнях на тему сполучники при однорідних членах."
    items:
      - sentence: "Він розумний, чи ледачий."
        error: "чи"
        correction: "але"
        error_type: "word"
        options: ["але", "та", "або"]
        explanation: "Тут потрібен протиставний сполучник, бо є контраст."
      - sentence: "Я купив яблука але груші."
        error: "але"
        correction: "і"
        error_type: "word"
        options: ["і", "чи", "або"]
        explanation: "Тут просто перелік, потрібен єднальний сполучник."
      - sentence: "Ти підеш додому, а залишишся тут?"
        error: "а"
        correction: "чи"
        error_type: "word"
        options: ["чи", "та", "і"]
        explanation: "Тут пропонується вибір, тому потрібен розділовий сполучник 'чи' або 'або'."
      - sentence: "Вона читала, писала або малювала весь вечір одночасно."
        error: "або"
        correction: "і"
        error_type: "word"
        options: ["і", "чи", "але"]
        explanation: "Оскільки дії відбувалися одночасно, потрібен єднальний сполучник."
      - sentence: "Це не великий, або середній стіл."
        error: "або"
        correction: "а"
        error_type: "word"
        options: ["а", "і", "та"]
        explanation: "Для протиставлення з часткою 'не' використовується 'а'."
      - sentence: "Або ти підеш, чи я піду."
        error: "чи"
        correction: "або"
        error_type: "word"
        options: ["або", "та", "і"]
        explanation: "Розділовий сполучник 'або' повторюється: або... або."
      - sentence: "Ми поїхали в ліс та на море через тиждень."
        error: "та"
        correction: "або"
        error_type: "word"
        options: ["або", "й", "і"]
        explanation: "Неможливо поїхати в обидва місця одночасно в цьому контексті, потрібен вибір."
      - sentence: "Усі прийшли: і діти, але дорослі."
        error: "але"
        correction: "і"
        error_type: "word"
        options: ["і", "чи", "або"]
        explanation: "Повторюваний єднальний сполучник 'і... і...' використовується для переліку."

  - id: quiz-syntax
    type: quiz
    title: "Оберіть правильний варіант синтаксису"
    instruction: "Оберіть правильний варіант: лексика та граматика з розділу «Однорідні члени: визначення і розпізнавання»."
    items:
      - question: "Які члени речення є однорідними у реченні 'Діти і дорослі зібралися на свято'?"
        options: ["Підмети", "Присудки", "Додатки", "Обставини"]
        correct: 0
      - question: "Що таке перелічувальна інтонація?"
        options: ["Інтонація для переліку однорідних членів", "Інтонація кінця речення", "Інтонація питального речення", "Інтонація здивування"]
        correct: 0
      - question: "Який зв'язок є безсполучниковим (асиндетон)?"
        options: ["Зв'язок тільки за допомогою інтонації", "Зв'язок з використанням 'і', 'та'", "Зв'язок з використанням 'а', 'але'", "Зв'язок з використанням двокрапки"]
        correct: 0
      - question: "Як називаються слова 'і', 'й', 'та' (у значенні 'і')?"
        options: ["Єднальні сполучники", "Протиставні сполучники", "Розділові сполучники", "Узагальнювальні слова"]
        correct: 0
      - question: "Який сполучник є протиставним?"
        options: ["але", "і", "або", "чи"]
        correct: 0
      - question: "Чи ставиться кома перед одиничним сполучником 'і' між однорідними членами?"
        options: ["Ні, ніколи", "Так, завжди", "Тільки в кінці речення", "Тільки на початку речення"]
        correct: 0
      - question: "Яку функцію виконує узагальнювальне слово?"
        options: ["Підсумовує або анонсує перелік", "Протиставляє факти", "Розділяє речення на частини", "Замінює підмет"]
        correct: 0
      - question: "Який розділовий знак ставиться ПІСЛЯ узагальнювального слова перед переліком?"
        options: ["Двокрапка", "Кома", "Тире", "Крапка"]
        correct: 0

  - id: match-up-terms
    type: match-up
    title: "З'єднайте терміни"
    instruction: "З'єднайте синтаксичні терміни з їхніми визначеннями."
    pairs:
      - left: "Однорідні члени"
        right: "Рівноправні члени речення, що відповідають на одне питання"
      - left: "Асиндетон"
        right: "Безсполучниковий зв'язок"
      - left: "Єднальні сполучники"
        right: "Додають один елемент до іншого (і, та)"
      - left: "Протиставні сполучники"
        right: "Створюють контраст (а, але, проте)"
      - left: "Розділові сполучники"
        right: "Пропонують вибір (або, чи)"
      - left: "Узагальнювальне слово"
        right: "Слово, що підсумовує або анонсує перелік"
      - left: "Двокрапка"
        right: "Знак після узагальнювального слова перед переліком"
      - left: "Тире"
        right: "Знак перед узагальнювальним словом після переліку"

  - id: fill-in-generalizing
    type: fill-in
    title: "Узагальнювальні слова"
    instruction: "Вставте правильні слова або знаки пунктуації."
    items:
      - sentence: "Усе ___ дерева, кущі, квіти прокинулося в лісі."
        answer: ":"
        options: [":", "-", ","]
      - sentence: "Дерева, кущі, квіти ___ все прокинулося в лісі."
        answer: "-"
        options: ["-", ":", ","]
      - sentence: "Я купив різні продукти ___ хліб, молоко, сир."
        answer: ":"
        options: [":", "-", ","]
      - sentence: "Хліб, молоко, сир ___ ці продукти я купив."
        answer: "-"
        options: ["-", ":", ","]
      - sentence: "На столі лежало ___: ручки, олівці, зошити."
        answer: "все"
        options: ["все", "всіх", "всім"]
      - sentence: "Усі: дорослі, діти, пенсіонери ___ раділи святу."
        answer: "-"
        options: ["-", ":", ","]
      - sentence: "Чарівний світ природи пливе переді мною, як-от ___ води, піски, береги."
        answer: ":"
        options: [":", "-", ","]
      - sentence: "Скрізь: на землі, на воді, в повітрі ___ вирувало життя."
        answer: "-"
        options: ["-", ":", ","]

  - id: error-correction-logical-errors-and-case-agreement
    type: error-correction
    title: "Логічні помилки та керування"
    instruction: "Виправте логічні та граматичні помилки у реченнях."
    items:
      - sentence: "Ми купили фрукти, овочі та продукти."
        error: "продукти"
        correction: "інші продукти"
        error_type: "word"
        options: ["інші продукти", "продуктів", "продуктах"]
        explanation: "Фрукти і овочі — це вже продукти, тому треба додати 'інші'."
      - sentence: "Я люблю і пишаюся своїм містом."
        error: "люблю"
        correction: "люблю своє місто"
        error_type: "phrase"
        options: ["люблю своє місто", "люблю містом", "любити"]
        explanation: "Любити вимагає знахідного відмінка (місто), а пишатися — орудного (містом)."
      - sentence: "На парковці стояли форди, тойоти та автомобілі."
        error: "автомобілі"
        correction: "інші автомобілі"
        error_type: "word"
        options: ["інші автомобілі", "автомобілів", "автомобілям"]
        explanation: "Форди і тойоти — це вже автомобілі."
      - sentence: "Він цікавиться і читає книги."
        error: "цікавиться"
        correction: "цікавиться книгами"
        error_type: "phrase"
        options: ["цікавиться книгами", "цікавиться книги", "цікавитися"]
        explanation: "Цікавитися вимагає орудного відмінка (книгами), а читати — знахідного (книги)."
      - sentence: "Вона малюють олівцями та фарбами."
        error: "малюють"
        correction: "малює"
        error_type: "word"
        options: ["малює", "малюю", "малюємо"]
        explanation: "Підмет 'Вона' в однині, тому присудок теж має бути в однині."
      - sentence: "Кіт і собака пустує у дворі."
        error: "пустує"
        correction: "пустують"
        error_type: "word"
        options: ["пустують", "пустую", "пустуємо"]
        explanation: "Кілька однорідних підметів вимагають присудка у множині."
      - sentence: "Брат і сестра читає книгу."
        error: "читає"
        correction: "читають"
        error_type: "word"
        options: ["читають", "читаємо", "читаю"]
        explanation: "Кілька однорідних підметів вимагають присудка у множині."
      - sentence: "Він придбав яблука, груші та фрукти."
        error: "фрукти"
        correction: "інші фрукти"
        error_type: "word"
        options: ["інші фрукти", "фруктами", "фруктів"]
        explanation: "Яблука і груші вже є фруктами."

  - id: quiz-final-self-check-on-homogeneous-members
    type: quiz
    title: "Фінальна перевірка"
    instruction: "Дайте відповіді на підсумкові запитання."
    items:
      - question: "Які три умови потрібні для того, щоб члени речення були однорідними?"
        options: ["Залежать від одного слова, відповідають на одне питання, однакова функція", "Мають однакову довжину, починаються на одну літеру, стоять поруч", "Є тільки іменниками, стоять у називному відмінку, є підметами", "З'єднані сполучниками, завжди мають коми, є другорядними членами"]
        correct: 0
      - question: "Коли ставиться кома перед одиничним сполучником 'і'?"
        options: ["Ніколи", "Завжди", "Коли 'і' стоїть на початку речення", "Коли 'і' стоїть перед дієсловом"]
        correct: 0
      - question: "Коли ставиться кома перед сполучниками 'а', 'але'?"
        options: ["Завжди", "Ніколи", "Тільки якщо речення довге", "Тільки перед 'а'"]
        correct: 0
      - question: "Який розділовий знак ставиться перед переліком ПІСЛЯ узагальнювального слова?"
        options: ["Двокрапка", "Тире", "Кома", "Крапка з комою"]
        correct: 0
      - question: "Який розділовий знак ставиться після переліку ПЕРЕД узагальнювальним словом?"
        options: ["Тире", "Двокрапка", "Кома", "Дефіс"]
        correct: 0
      - question: "Чи можуть однорідними бути тільки головні члени речення?"
        options: ["Ні, будь-які члени речення можуть бути однорідними", "Так, тільки головні", "Ні, тільки другорядні", "Так, тільки підмети"]
        correct: 0
      - question: "Що таке полісиндетон?"
        options: ["Багатосполучниковий зв'язок (повторення сполучників)", "Безсполучниковий зв'язок", "Використання тільки 'але'", "Використання узагальнювального слова"]
        correct: 0
      - question: "Який ефект створює полісиндетон у тексті?"
        options: ["Сповільнює темп і надає значущості", "Пришвидшує динаміку", "Робить речення незрозумілим", "Створює комічний ефект"]
        correct: 0

  - id: essay-response-writing-practice-with-homogeneous-members
    type: essay-response
    title: "Практика написання: однорідні члени"
    instruction: "Напишіть короткий текст (мінімум 50 слів)."
    prompt: "Напишіть короткий текст про свій ідеальний відпочинок, використовуючи різні типи однорідних членів речення (однорідні підмети, присудки, означення) та узагальнювальні слова."
    model_answer: "Мій ідеальний відпочинок — це гори. Усе: високі вершини, чисте повітря, швидкі річки — надихає мене. Ми з друзями любимо ходити в походи, співати пісні біля вогнища і просто насолоджуватися природою. Ні я, ні мої друзі не любимо сидіти на місці. Ми активні, веселі та життєрадісні мандрівники."

workbook:
  - type: true-false
    title: "Правда чи ні: Однорідні члени"
    instruction: "Визначте, чи є твердження правдивими."
    items:
      - statement: "Однорідні члени речення відповідають на одне й те саме питання."
        correct: true
        explanation: "Це одна з трьох головних умов для однорідних членів."
      - statement: "Тільки підмети і присудки можуть бути однорідними."
        correct: false
        explanation: "Будь-який член речення, включаючи додатки, означення та обставини, може бути однорідним."
      - statement: "Перед одиничним сполучником 'і' між однорідними членами завжди ставиться кома."
        correct: false
        explanation: "Кома перед одиничним 'і' не ставиться."
      - statement: "Асиндетон — це безсполучниковий зв'язок між однорідними членами."
        correct: true
        explanation: "Так, асиндетон означає зв'язок лише за допомогою інтонації."
      - statement: "Узагальнювальне слово завжди є іншою частиною мови, ніж перелік."
        correct: false
        explanation: "Узагальнювальне слово виконує ту саму синтаксичну функцію, що й однорідні члени."
      - statement: "Якщо узагальнювальне слово стоїть перед переліком, ставиться двокрапка."
        correct: true
        explanation: "Двокрапка 'відкриває двері' до деталей списку."
      - statement: "Перед протиставними сполучниками ('а', 'але', 'проте') завжди ставиться кома."
        correct: true
        explanation: "Це суворе правило української пунктуації без винятків."
      - statement: "Після узагальнювального слова, якщо воно стоїть після переліку, ставиться двокрапка."
        correct: false
        explanation: "Якщо узагальнювальне слово стоїть після переліку, ставиться тире."

  - type: group-sort
    title: "Категорії сполучників"
    instruction: "Розподіліть сполучники за їхніми типами."
    groups:
      - label: "Єднальні"
        items: ["і", "й", "та", "не тільки... а й"]
      - label: "Протиставні"
        items: ["а", "але", "проте", "однак", "зате"]
      - label: "Розділові"
        items: ["або", "чи", "то... то...", "або... або..."]

  - type: group-sort
    title: "Синтаксичні функції"
    instruction: "Розподіліть виділені слова за їхньою синтаксичною функцією в реченнях."
    groups:
      - label: "Однорідні підмети"
        items: ["Діти і дорослі зібралися", "Син і донька читають", "Кіт і собака пустують"]
