version: "1.0"
module: checkpoint-genitive
level: a2

inline:
  - id: quiz-genitive-prepositions
    type: quiz
    instruction: "Оберіть правильний прийменник"
    items:
      - question: "Цей цікавий лист ... мого брата."
        options: ["від", "з", "до", "біля"]
        correct: 0
      - question: "Ми зустрілися ... старого парку."
        options: ["біля", "до", "від", "для"]
        correct: 0
      - question: "Вони повернулися ... нового магазину."
        options: ["з", "від", "до", "без"]
        correct: 0
      - question: "Ця чашка чорної кави ... моєї сестри."
        options: ["для", "після", "з", "до"]
        correct: 0
      - question: "Ми підемо гуляти ... смачного обіду."
        options: ["після", "від", "до", "біля"]
        correct: 0
      - question: "Туристи йдуть ... великого собору."
        options: ["до", "з", "для", "без"]
        correct: 0
      - question: "Вона не може читати ... нових окулярів."
        options: ["без", "після", "від", "до"]
        correct: 0

  - id: fill-in-genitive-forms
    type: fill-in
    instruction: "Вставте правильну форму слова"
    items:
      - sentence: "У мене зовсім немає вільного ____."
        answer: "часу"
        options: ["часу", "часа", "часом"]
      - sentence: "Я не бачив твоєї старшої ____."
        answer: "сестри"
        options: ["сестри", "сестру", "сестрою"]
      - sentence: "На вечірці було багато нових ____."
        answer: "друзів"
        options: ["друзів", "друзі", "друга"]
      - sentence: "Ми живемо навпроти старого ____."
        answer: "театру"
        options: ["театру", "театр", "театром"]
      - sentence: "Колір цього ____ стола дуже темний."
        answer: "старого"
        options: ["старого", "старий", "старому"]
      - sentence: "У цьому місті немає чистої ____."
        answer: "води"
        options: ["води", "воду", "водою"]

  - id: error-correction-genitive-checks
    type: error-correction
    instruction: "Знайдіть і виправте помилку"
    items:
      - sentence: "У мене немає брат."
        error: "брат"
        correction: "брата"
        error_type: "word"
        options: ["брата", "братом", "брату"]
        explanation: "Після слова 'немає' іменник завжди стоїть у родовому відмінку (кого? чого?)."
      - sentence: "Україна потребує допомогу."
        error: "допомогу"
        correction: "допомоги"
        error_type: "word"
        options: ["допомоги", "допомогою", "допомозі"]
        explanation: "Дієслово 'потребувати' (to need) завжди вимагає родового відмінка, а не знахідного."
      - sentence: "Він прийшов у театр без квиток."
        error: "квиток"
        correction: "квитка"
        error_type: "word"
        options: ["квитка", "квитком", "квитку"]
        explanation: "Прийменник 'без' (without) вимагає родового відмінка."
      - sentence: "Ми чекаємо свого друга після робота."
        error: "робота"
        correction: "роботи"
        error_type: "word"
        options: ["роботи", "роботу", "роботою"]
        explanation: "Прийменник 'після' (after) вимагає родового відмінка."
      - sentence: "Дайте мені, будь ласка, пляшку вода."
        error: "вода"
        correction: "води"
        error_type: "word"
        options: ["води", "воду", "водою"]
        explanation: "Кількість (пляшка чого?) передається родовим відмінком."
      - sentence: "Скільки коштує кілограм сир?"
        error: "сир"
        correction: "сиру"
        error_type: "word"
        options: ["сиру", "сир", "сиром"]
        explanation: "Міра ваги (кілограм чого?) вимагає родового відмінка."
      - sentence: "На вулиці сьогодні багато люди."
        error: "люди"
        correction: "людей"
        error_type: "word"
        options: ["людей", "людям", "людьми"]
        explanation: "Слова кількості (багато, мало) вимагають родового відмінка."

  - id: match-up-genitive-situational
    type: match-up
    instruction: "З'єднайте частини речень"
    pairs:
      - left: "Дайте, будь ласка, два кілограми..."
        right: "яблук."
      - left: "Мені потрібні таблетки від..."
        right: "болю."
      - left: "Аптека знаходиться навпроти..."
        right: "парку."
      - left: "Скільки коштує пляшка..."
        right: "води?"
      - left: "Ми йдемо до великого..."
        right: "театру."
      - left: "Я хочу купити крем для..."
        right: "рук."

workbook:
  - type: group-sort
    instruction: "Розподіліть іменники чоловічого роду за закінченням родового відмінка однини (-а/-я чи -у/-ю)"
    groups:
      - label: "Закінчення -а / -я (конкретні об'єкти)"
        items: ["автобуса", "стола", "магазина", "зошита", "паспорта"]
      - label: "Закінчення -у / -ю (абстрактні, речовини)"
        items: ["часу", "цукру", "вітру", "сиру", "чаю"]

  - type: quiz
    instruction: "Оберіть правильну форму множини"
    items:
      - question: "На нашій вулиці живе багато ..."
        options: ["людей", "люди", "людям", "людях"]
        correct: 0
      - question: "Вона прочитала вже п'ять ..."
        options: ["книжок", "книги", "книгам", "книгах"]
        correct: 0
      - question: "На вечірці було десять нових ..."
        options: ["друзів", "друзі", "друзям", "другах"]
        correct: 0
      - question: "Ми не спали кілька ..."
        options: ["ночей", "ночі", "ночам", "ночах"]
        correct: 0
      - question: "У мене зовсім немає вільних ..."
        options: ["грошей", "гроші", "грошам", "грошах"]
        correct: 0
      - question: "Для цього рецепта треба кілька зелених ..."
        options: ["яблук", "яблука", "яблукам", "яблуках"]
        correct: 0

  - type: unjumble
    instruction: "Складіть правильне речення зі слів"
    items:
      - words: ["вільного", "немає", "У", "мене", "часу.", "зовсім"]
        correct_order: ["У", "мене", "зовсім", "немає", "вільного", "часу."]
      - words: ["старого", "зі", "Вона", "взяла", "столу.", "зошит"]
        correct_order: ["Вона", "взяла", "зошит", "зі", "старого", "столу."]
      - words: ["великого", "парку.", "Лікарня", "знаходиться", "міського", "навпроти"]
        correct_order: ["Лікарня", "знаходиться", "навпроти", "великого", "міського", "парку."]
      - words: ["цього", "коштує", "сиру?", "Скільки", "твердого", "кілограм"]
        correct_order: ["Скільки", "коштує", "кілограм", "цього", "твердого", "сиру?"]
      - words: ["тільки", "України.", "Ця", "з", "для", "екскурсія", "туристів"]
        correct_order: ["Ця", "екскурсія", "тільки", "для", "туристів", "з", "України."]
      - words: ["до", "після", "Києва", "тільки", "обіду.", "Вони", "приїхали"]
        correct_order: ["Вони", "приїхали", "до", "Києва", "тільки", "після", "обіду."]

  - type: true-false
    instruction: "Правда чи ні? Перевірте свої знання правил родового відмінка."
    items:
      - statement: "Прийменники 'навпроти' та 'біля' вимагають родового відмінка."
        correct: true
        explanation: "Ці прийменники завжди використовуються з родовим відмінком (навпроти парку, біля дому)."
      - statement: "Слово 'час' у родовому відмінку має закінчення -а (часа)."
        correct: false
        explanation: "Абстрактні поняття чоловічого роду зазвичай мають закінчення -у (часу)."
      - statement: "Дієслово 'потребувати' (to need) завжди використовується зі знахідним відмінком."
        correct: false
        explanation: "Дієслово 'потребувати' вимагає родового відмінка (потребувати допомоги)."
      - statement: "Після слова 'багато' ми використовуємо іменники в родовому відмінку."
        correct: true
        explanation: "Слова кількості (багато, мало, кілька) вимагають родового відмінка (багато людей)."
      - statement: "Слова 'від' та 'з' — це прийменники, які вказують на напрямок до об'єкта."
        correct: false
        explanation: "Вони вказують на джерело (звідки? від кого?), а напрямок до об'єкта показує прийменник 'до'."
      - statement: "У множині слово 'люди' має форму 'людей' у родовому відмінку."
        correct: true
        explanation: "Це правильна форма родового відмінка множини (немає людей)."

  - type: order
    instruction: "Розставте репліки діалогу в аптеці та магазині в правильному порядку"
    items:
      - "— Добрий день! Що вам підказати?"
      - "— Добрий день. Мені потрібні таблетки від болю."
      - "— Ось, будь ласка. Щось ще?"
      - "— Так, дайте ще крем для рук і пляшку мінеральної води."
      - "— Добре. З вас сто двадцять гривень."
      - "— Ось гроші. Дякую!"
    correct_order: [0, 1, 2, 3, 4, 5]