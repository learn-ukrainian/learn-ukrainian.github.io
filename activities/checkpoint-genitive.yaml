version: "1.0"
module: checkpoint-genitive
level: a2

inline:
  - id: quiz-genitive-prepositions
    type: quiz
    instruction: "Оберіть правильний прийменник"
    items:
      - question: "Ми стоїмо _____ собору."
        options: ["біля", "навпроти", "від", "з"]
        correct: 0
      - question: "Цей подарунок _____ сестри."
        options: ["для", "навпроти", "до", "коло"]
        correct: 0
      - question: "Туристи йдуть _____ станції."
        options: ["до", "біля", "від", "з"]
        correct: 0
      - question: "Я п'ю чай _____ цукру."
        options: ["без", "від", "до", "після"]
        correct: 0
      - question: "Мій друг приїхав _____ Львова."
        options: ["зі", "без", "для", "біля"]
        correct: 0
      - question: "Ми підемо гуляти _____ обіду."
        options: ["після", "від", "з", "до"]
        correct: 0
      - question: "Готель розташований _____ театру."
        options: ["навпроти", "без", "з", "від"]
        correct: 0
      - question: "Вона взяла книгу _____ полиці."
        options: ["з", "від", "до", "для"]
        correct: 0

  - id: fill-in-genitive-forms
    type: fill-in
    instruction: "Вставте правильну форму слова"
    items:
      - sentence: "У мене немає старшого ____."
        answer: "брата"
        options: ["брата", "брат", "брату", "браті"]
      - sentence: "Я чекаю наступного ____."
        answer: "автобуса"
        options: ["автобуса", "автобусу", "автобус", "автобусі"]
      - sentence: "У нас зовсім немає ____."
        answer: "часу"
        options: ["часу", "часа", "час", "часі"]
      - sentence: "На вулиці багато ____."
        answer: "людей"
        options: ["людей", "люди", "людями", "людям"]
      - sentence: "Це рюкзак мого нового ____."
        answer: "друга"
        options: ["друга", "друг", "другу", "другом"]
      - sentence: "Вона прочитала п'ять ____."
        answer: "книжок"
        options: ["книжок", "книги", "книжки", "книгам"]
      - sentence: "Тут немає сильного ____."
        answer: "вітру"
        options: ["вітру", "вітра", "вітер", "вітрі"]
      - sentence: "На вечірці було кілька ____."
        answer: "друзів"
        options: ["друзів", "друзі", "друга", "друзям"]

  - id: error-correction-genitive-checks
    type: error-correction
    instruction: "Знайдіть і виправте помилку"
    items:
      - sentence: "Я потребую допомогу."
        error: "допомогу"
        correction: "допомоги"
        error_type: "word"
        options: ["допомоги", "допомога", "допомогою"]
        explanation: "Дієслово 'потребувати' вимагає родового відмінка (чого? допомоги)."
      - sentence: "У мене немає брат."
        error: "брат"
        correction: "брата"
        error_type: "word"
        options: ["брата", "брату", "братом"]
        explanation: "Після 'немає' завжди використовується родовий відмінок."
      - sentence: "Він прийшов без квиток."
        error: "квиток"
        correction: "квитка"
        error_type: "word"
        options: ["квитка", "квитку", "квитком"]
        explanation: "Прийменник 'без' вимагає родового відмінка."
      - sentence: "Вона взяла книгу із полиця."
        error: "полиця"
        correction: "полиці"
        error_type: "word"
        options: ["полиці", "полицю", "полицею"]
        explanation: "Прийменник 'із' вимагає родового відмінка."
      - sentence: "У мене немає чистої вода."
        error: "вода"
        correction: "води"
        error_type: "word"
        options: ["води", "воду", "водою"]
        explanation: "Після 'немає' потрібен родовий відмінок."
      - sentence: "Ми купили багато свіжі овочі."
        error: "свіжі овочі"
        correction: "свіжих овочів"
        error_type: "phrase"
        options: ["свіжих овочів", "свіжим овочам", "свіжими овочами"]
        explanation: "Після слова 'багато' використовується родовий відмінок множини."

  - id: match-up-genitive-situational
    type: match-up
    instruction: "З'єднайте ситуацію з правильною фразою"
    pairs:
      - left: "На ринку"
        right: "два кілограми яблук"
      - left: "В аптеці"
        right: "таблетки від болю"
      - left: "На екскурсії"
        right: "до Софійського собору"
      - left: "У кав'ярні"
        right: "чорний чай без цукру"
      - left: "На вокзалі"
        right: "квиток для студента"
      - left: "В магазині косметики"
        right: "крем для рук"
      - left: "Запитуємо напрямок"
        right: "до центру міста"
      - left: "Звідки ви?"
        right: "зі Львова"

workbook:
  - id: sort-genitive-plural
    type: group-sort
    instruction: "Розподіліть слова за закінченням у родовому відмінку множини"
    groups:
      - label: "-ів / -їв"
        items: ["друг", "студент", "овоч", "брат"]
      - label: "Нульове закінчення"
        items: ["книжка", "яблуко", "машина", "кімната"]
      - label: "-ей"
        items: ["ніч", "людина", "гроші", "гість"]

  - id: true-false-genitive-rules
    type: true-false
    instruction: "Правда чи ні? (Оберіть правильне твердження про родовий відмінок)"
    items:
      - statement: "Прийменник 'біля' вимагає родового відмінка."
        correct: true
        explanation: "Так, прийменники місця (біля, навпроти, коло) використовуються з родовим відмінком."
      - statement: "Слово 'час' у родовому відмінку має форму 'часа'."
        correct: false
        explanation: "Ні, 'час' — це абстрактне поняття, тому правильна форма — 'часу'."
      - statement: "Після слова 'немає' іменник завжди стоїть у називному відмінку."
        correct: false
        explanation: "Ні, після 'немає' завжди використовується родовий відмінок."
      - statement: "Прийменник 'з' змінюється на 'зі' перед кількома приголосними."
        correct: true
        explanation: "Так, для полегшення вимови, наприклад, 'зі Львова', 'зі столу'."
      - statement: "Дієслово 'потребувати' вимагає знахідного відмінка."
        correct: false
        explanation: "Ні, дієслово 'потребувати' вимагає родового відмінка (потребувати допомоги)."
      - statement: "Після слів 'багато' і 'мало' завжди використовується родовий відмінок."
        correct: true
        explanation: "Так, слова кількості вимагають родового відмінка."

  - id: translate-genitive-phrases
    type: translate
    instruction: "Оберіть правильний переклад"
    items:
      - source: "two kilograms of apples"
        options:
          - text: "два кілограми яблук"
            correct: true
          - text: "два кілограми яблуки"
            correct: false
          - text: "два кілограма яблук"
            correct: false
      - source: "I need a large bottle of water."
        options:
          - text: "Мені потрібна велика пляшка води."
            correct: true
          - text: "Мені потрібна велика пляшка вода."
            correct: false
          - text: "Я потребую велика пляшка води."
            correct: false
      - source: "Do you have pills for pain?"
        options:
          - text: "У вас є таблетки від болю?"
            correct: true
          - text: "У вас є таблетки для болю?"
            correct: false
          - text: "У вас є таблетки без болю?"
            correct: false
      - source: "This is my brother's car."
        options:
          - text: "Це машина мого брата."
            correct: true
          - text: "Це машина мій брат."
            correct: false
          - text: "Це машина мого брат."
            correct: false
      - source: "He arrived without a ticket."
        options:
          - text: "Він прийшов без квитка."
            correct: true
          - text: "Він прийшов без квиток."
            correct: false
          - text: "Він прийшов без квитком."
            correct: false
      - source: "I haven't seen your older sister."
        options:
          - text: "Я не бачив твоєї старшої сестри."
            correct: true
          - text: "Я не бачив твоя старша сестра."
            correct: false
          - text: "Я не бачив твого старшого сестри."
            correct: false

  - id: order-dialogue-excursion
    type: order
    instruction: "Розставте речення діалогу в правильному порядку"
    items:
      - "— Добрий день! Ми стоїмо біля Золотих воріт."
      - "— Яка краса! А куди ми йдемо далі?"
      - "— Зараз ми йдемо до Софійського собору. Це близько."
      - "— Скільки часу туди йти?"
      - "— До Хрещатика десять хвилин, а до собору — п'ять."
    correct_order: [0, 1, 2, 3, 4]
