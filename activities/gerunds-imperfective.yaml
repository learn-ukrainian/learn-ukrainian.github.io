version: "1.0"
module: gerunds-imperfective
level: b1

inline:
  - id: reading-identifying-gerunds
    type: quiz
    title: "Що таке дієприслівник?"
    instruction: "Дайте відповіді на запитання за текстом."
    items:
      - question: "Яку дію означає дієприслівник?"
        options:
          - text: "Додаткову дію"
            correct: true
          - text: "Основну дію"
            correct: false
          - text: "Завершену дію"
            correct: false
          - text: "Ознаку предмета"
            correct: false
        explanation: "Дієприслівник завжди означає додаткову дію, що супроводжує головну."
      - question: "На яке питання відповідає дієприслівник недоконаного виду?"
        options:
          - text: "Що роблячи?"
            correct: true
          - text: "Що зробивши?"
            correct: false
          - text: "Який?"
            correct: false
          - text: "Як?"
            correct: false
        explanation: "Дієприслівник недоконаного виду завжди відповідає на питання «що роблячи?»."
      - question: "Яку синтаксичну роль у реченні найчастіше виконує дієприслівник?"
        options:
          - text: "Обставина"
            correct: true
          - text: "Присудок"
            correct: false
          - text: "Підмет"
            correct: false
          - text: "Додаток"
            correct: false
        explanation: "Дієприслівник у реченні виконує синтаксичну роль обставини."
      - question: "З якою частиною мови дієприслівник має сильну спорідненість через свою незмінюваність?"
        options:
          - text: "З прислівником"
            correct: true
          - text: "З іменником"
            correct: false
          - text: "З прикметником"
            correct: false
          - text: "З займенником"
            correct: false
        explanation: "Як і прислівник, дієприслівник є абсолютно незмінюваним."
      - question: "Що є найважливішим граматичним правилом для правильного використання дієприслівника?"
        options:
          - text: "Спільний логічний підмет"
            correct: true
          - text: "Збіг у часі"
            correct: false
          - text: "Спільний рід"
            correct: false
          - text: "Залежність від іменника"
            correct: false
        explanation: "Головна і додаткова дія обов'язково повинні виконуватися однією особою (спільний логічний підмет)."
      - question: "Як поводиться дієприкметник у реченні порівняно з дієприслівником?"
        options:
          - text: "Описує предмет і змінюється"
            correct: true
          - text: "Залишається повністю незмінюваним"
            correct: false
          - text: "Відповідає на питання як/коли"
            correct: false
          - text: "Залежить тільки від дієслова"
            correct: false
        explanation: "Дієприкметник описує предмет за його дією і поводиться як звичайний прикметник (відмінюється)."
      - question: "Що означає «одночасність» у контексті дієприслівника недоконаного виду?"
        options:
          - text: "Додаткова дія відбувається паралельно з основною"
            correct: true
          - text: "Одна дія повністю закінчилася перед іншою"
            correct: false
          - text: "Дії відбуваються по черзі"
            correct: false
          - text: "Це дії, які відбудуться у майбутньому"
            correct: false
        explanation: "Форма недоконаного виду завжди виражає одночасність — дії відбуваються абсолютно паралельно."
      - question: "Від чого завжди залежить дієприслівник у реченні?"
        options:
          - text: "Від дієслова-присудка"
            correct: true
          - text: "Від іменника-підмета"
            correct: false
          - text: "Від прикметника"
            correct: false
          - text: "Від іншого дієприслівника"
            correct: false
        explanation: "Дієприслівник завжди залежить тільки від дієслова-присудка і описує саму дію."

  - id: fill-in-gerund-formation
    type: fill-in
    title: "Творення дієприслівників"
    instruction: "Вставте правильну форму дієприслівника недоконаного виду."
    items:
      - sentence: "Він ішов парком, радісно ____ (усміхатися)."
        answer: "усміхаючись"
        options: ["усміхаючись", "усміхаючися", "усміхавшись", "усміхаючі"]
        explanation: "Зворотна частка '-ся' перетворюється на м'яке '-сь' після голосної."
      - sentence: "Я не можу їсти, ____ (читати) новини."
        answer: "читаючи"
        options: ["читаючи", "читавши", "читаючі", "читаючий"]
        explanation: "Від дієслова 'читати' (вони читають) утворюється форма з суфіксом '-ючи'."
      - sentence: "Вона відпочиває, ____ (слухати) музику."
        answer: "слухаючи"
        options: ["слухаючи", "слухаючі", "слухаючий", "слухавши"]
        explanation: "Від 'слухати' (вони слухають) утворюється форма 'слухаючи'."
      - sentence: "Діти малювали, ____ (сидіти) на підлозі."
        answer: "сидячи"
        options: ["сидячи", "сидячі", "сидівши", "сидячий"]
        explanation: "Дієслово другої дієвідміни 'сидіти' (вони сидять) отримує суфікс '-ячи'."
      - sentence: "____ (бігти) додому, я зустрів сусіда."
        answer: "Біжучи"
        options: ["Біжучи", "Бігаючи", "Біжачи", "Бігши"]
        explanation: "Від 'бігти' (вони біжать/біжуть) утворюється форма 'біжучи'."
      - sentence: "Він працював увесь день, не ____ (знати) втоми."
        answer: "знаючи"
        options: ["знаючи", "знаючі", "знав", "знавши"]
        explanation: "Від дієслова 'знати' (вони знають) утворюється форма 'знаючи'."
      - sentence: "Студенти уважно слухали викладача, ____ (писати) конспект."
        answer: "пишучи"
        options: ["пишучи", "писавши", "пишучі", "пишучий"]
        explanation: "Від 'писати' (вони пишуть) утворюється форма 'пишучи'."
      - sentence: "Вони довго розмовляли, уважно ____ (дивитися) один одному в очі."
        answer: "дивлячись"
        options: ["дивлячись", "дивлячися", "дивившись", "дивлячі"]
        explanation: "Від 'дивитися' (вони дивляться) утворюється форма 'дивлячись' (з короткою зворотною часткою)."

  - id: match-gerund-conjugations
    type: match-up
    title: "Терміни та визначення"
    instruction: "З'єднайте терміни з розділу «Творення дієприслівників недоконаного виду» з їхніми визначеннями."
    pairs:
      - left: "недоконаний вид"
        right: "завжди вказує на тривалу або паралельну дію"
      - left: "одночасність"
        right: "додаткова дія відбувається абсолютно паралельно з основною дією"
      - left: "логічний підмет"
        right: "спільний виконавець головної та додаткової дії"
      - left: "обставина способу дії"
        right: "синтаксична роль, що відповідає на питання «як?»"
      - left: "дієвідміна"
        right: "група дієслів, від якої залежить вибір суфікса"
      - left: "зворотне дієслово"
        right: "має наприкінці частку -ся, яка перетворюється на -сь"
      - left: "дієприслівник"
        right: "незмінювана форма дієслова, яка означає додаткову дію"
      - left: "дієприкметник"
        right: "форма, яка описує предмет за його дією і відповідає на питання «який?»"

  - id: essay-gerund-situations
    type: essay-response
    title: "Власні приклади з дієприслівниками"
    source_reading: "reading-gerunds-theory"
    instruction: "Напишіть 5 речень, використовуючи нову лексику з розділу «Творення дієприслівників недоконаного виду»."
    prompt: "Складіть п'ять речень про ваш звичайний ранок. У кожному реченні обов'язково використовуйте дієприслівник недоконаного виду (наприклад: прокидаючись, снідаючи, слухаючи, ідучи)."
    min_words: 50
    model_answer: "Прокидаючись рано-вранці, я зазвичай одразу відчиняю вікно. Слухаючи радіо, я готую собі смачний сніданок. Снідаючи, я завжди уважно переглядаю останні новини. Збираючись на роботу, я часто хвилююся, щоб не запізнитися. Ідучи вулицею до автобусної зупинки, я насолоджуюся свіжим ранковим повітрям."

  - id: error-correction
    type: error-correction
    title: "Пошук помилок"
    instruction: "Знайдіть і виправте граматичні помилки в реченнях."
    items:
      - sentence: "Вона радісно усміхалася, читаючі цікаву книгу."
        error: "читаючі"
        answer: "читаючи"
        error_type: "word"
        options: ["читаючи", "читавши", "читаючий", "читаючіся"]
        explanation: "Дієприслівники недоконаного виду є незмінюваними і закінчуються на 'и' (суфікс -ючи)."
      - sentence: "Діти сиділи на килимі, граючі у нову гру."
        error: "граючі"
        answer: "граючи"
        error_type: "word"
        options: ["граючи", "гравши", "граючіся", "грають"]
        explanation: "Правильний суфікс для першої дієвідміни (вони грають) — -ючи."
      - sentence: "Ми йшли вулицею, голосно сміючися."
        error: "сміючися"
        answer: "сміючись"
        error_type: "word"
        options: ["сміючись", "сміявся", "сміявшись", "сміємося"]
        explanation: "Зворотна частка '-ся' після голосної перетворюється на коротку м'яку форму '-сь'."
      - sentence: "Студенти відповідали на питання, стоячі біля дошки."
        error: "стоячі"
        answer: "стоячи"
        error_type: "word"
        options: ["стоячи", "стоявши", "стоячіся", "стоять"]
        explanation: "Дієприслівник завжди незмінюваний і закінчується на 'и'. Форма на 'і' — це змінний дієприкметник."
      - sentence: "Вона йшла, дивлячися у свій новий телефон."
        error: "дивлячися"
        answer: "дивлячись"
        error_type: "word"
        options: ["дивлячись", "дивившись", "дивлячі", "дивляться"]
        explanation: "Замість повної зворотної частки '-ся' використовується коротка '-сь'."
      - sentence: "Він працював, слухаючі улюблене радіо."
        error: "слухаючі"
        answer: "слухаючи"
        error_type: "word"
        options: ["слухаючи", "слухавши", "слухаючий", "слухають"]
        explanation: "Правильний суфікс дієприслівника — '-ючи', а не '-ючі'."

  - id: quiz
    type: quiz
    title: "Підсумковий тест"
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Що обов'язково повинні мати дієприслівник і основне дієслово?"
        options:
          - text: "Спільний логічний підмет"
            correct: true
          - text: "Спільний час"
            correct: false
          - text: "Однакові закінчення"
            correct: false
          - text: "Один корінь"
            correct: false
        explanation: "Правило спільного підмета є найважливішим для використання дієприслівників."
      - question: "Який суфікс використовується для дієслів першої дієвідміни після приголосного (наприклад, 'нести')?"
        options:
          - text: "-учи"
            correct: true
          - text: "-ючи"
            correct: false
          - text: "-ачи"
            correct: false
          - text: "-ячи"
            correct: false
        explanation: "Для першої дієвідміни (вони несуть) використовується суфікс -учи."
      - question: "Яку функцію виконує дієприслівник у реченні 'Лише працюючи злагоджено, ми досягнемо успіху'?"
        options:
          - text: "Обставина умови"
            correct: true
          - text: "Обставина часу"
            correct: false
          - text: "Обставина причини"
            correct: false
          - text: "Підмет"
            correct: false
        explanation: "Він відповідає на питання 'за якої умови?'."
      - question: "Як правильно утворити дієприслівник недоконаного виду від слова 'усміхатися'?"
        options:
          - text: "усміхаючись"
            correct: true
          - text: "усміхаючися"
            correct: false
          - text: "усміхаючі"
            correct: false
          - text: "усміхнувшись"
            correct: false
        explanation: "Зворотна частка 'ся' перетворюється на 'сь' після суфікса -ючи."
      - question: "Який з цих прикладів містить типову синтаксичну помилку («висячий» дієприслівник)?"
        options:
          - text: "Йдучи по вулиці, почався сильний дощ."
            correct: true
          - text: "Йдучи додому, я зустрів друга."
            correct: false
          - text: "Читаючи, він радісно усміхався."
            correct: false
          - text: "Снідаючи, я слухаю новини."
            correct: false
        explanation: "Дощ не міг іти по вулиці, тому виконавець основної і додаткової дії тут не збігається."
      - question: "Який суфікс використовується для дієслів другої дієвідміни (наприклад, 'сидіти')?"
        options:
          - text: "-ячи"
            correct: true
          - text: "-учи"
            correct: false
          - text: "-ючи"
            correct: false
          - text: "-ачи"
            correct: false
        explanation: "Від 'сидять' забираємо 'ть' і додаємо -чи, виходить 'сидячи' (фактично суфікс -ячи)."
      - question: "На яке питання відповідає дієприслівник у реченні 'Снідаючи, я слухаю новини'?"
        options:
          - text: "Коли?"
            correct: true
          - text: "Як?"
            correct: false
          - text: "Чому?"
            correct: false
          - text: "Де?"
            correct: false
        explanation: "Це обставина часу, яка вказує, в який момент відбувається дія (під час сніданку)."
      - question: "Як найпростіше відрізнити дієприслівник від дієприкметника?"
        options:
          - text: "Він ніколи не відмінюється і не має закінчень"
            correct: true
          - text: "Він завжди має закінчення -ий, -а, -е"
            correct: false
          - text: "Він описує предмет, а не дію"
            correct: false
          - text: "Він відповідає на питання 'який?'"
            correct: false
        explanation: "Дієприслівник абсолютно незмінюваний, на відміну від дієприкметника."

workbook:
  - id: reading-gerunds-theory
    type: reading
    title: "Теорія: Дієприслівники"
    instruction: "Ознайомтеся з додатковою статтею для написання власного есе."
    resource:
      type: "Стаття"
      url: "https://uk.wikipedia.org/wiki/Дієприслівник"
      title: "Дієприслівник (Вікіпедія)"
    tasks:
      - "Знайдіть приклади дієприслівників у статті."
      - "Чим дієприслівник відрізняється від дієприкметника?"
