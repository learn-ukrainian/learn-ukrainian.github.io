version: "1.0"
module: b1-baseline-past-present
level: b1

inline:
  - id: group-sort-distribute-verbs-between-i-and-ii-conjugation-classes
    type: group-sort
    instruction: "Розподіліть дієслова на першу та другу дієвідміну (I conjugation: -уть/-ють, II conjugation: -ать/-ять)."
    groups:
      - label: "I дієвідміна"
        items: ["писати", "читати", "знати", "хотіти", "працювати"]
      - label: "II дієвідміна"
        items: ["робити", "говорити", "стояти", "сидіти", "спати"]

  - id: fill-in-tense-forms
    type: fill-in
    instruction: "Поставте дієслово в дужках у правильну форму теперішнього або минулого часу."
    items:
      - sentence: "Зараз я (писати) _____ статтю."
        answer: "пишу"
      - sentence: "Вчора Олексій (працювати) _____ в бібліотеці."
        answer: "працював"
      - sentence: "Минулого літа ми (їздити) _____ до Львова."
        answer: "їздили"
      - sentence: "Щодня вона уважно (читати) _____ новини."
        answer: "читає"
      - sentence: "Ти (знати) _____, де він зараз живе?"
        answer: "знаєш"
      - sentence: "Вчора моя сестра (сказати) _____, що приїде."
        answer: "сказала"
      - sentence: "Зараз студенти (робити) _____ домашнє завдання."
        answer: "роблять"
      - sentence: "Раптом він (взяти) _____ телефон і зателефонував."
        answer: "взяв"

  - id: quiz-aspect-id
    type: quiz
    instruction: "Визначте час і вид поданого дієслова."
    items:
      - question: "пише"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 0
      - question: "написав"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "сиділа"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 1
      - question: "вирішили"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "працюють"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 0
      - question: "знайде"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 3
      - question: "зробив"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "читаємо"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 0
      - question: "гуляли"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 1
      - question: "приїхала"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2

  - id: match-up-aspect-pairs
    type: match-up
    instruction: "З'єднайте видові пари (недоконаний вид ↔ доконаний вид)."
    pairs:
      - left: "робити"
        right: "зробити"
      - left: "писати"
        right: "написати"
      - left: "вирішувати"
        right: "вирішити"
      - left: "брати"
        right: "взяти"
      - left: "говорити"
        right: "сказати"
      - left: "показувати"
        right: "показати"
      - left: "читати"
        right: "прочитати"
      - left: "знаходити"
        right: "знайти"

  - id: error-correction-aspect
    type: error-correction
    instruction: "Знайдіть і виправте помилки у вживанні виду або часу в реченнях."
    items:
      - sentence: "Вчора я прочитав книжку три години."
        error: "прочитав"
        correction: "читав"
        error_type: "word"
        options: ["читав", "прочитав", "прочитаю", "читаю"]
        explanation: "Якщо ми вказуємо тривалість (три години), потрібен недоконаний вид, який фокусується на процесі."
      - sentence: "Моя сестра сказав, що приїде."
        error: "сказав"
        correction: "сказала"
        error_type: "word"
        options: ["сказав", "сказала", "сказали", "скаже"]
        explanation: "Дієслово в минулому часі повинно узгоджуватися з підметом жіночого роду (сестра)."
      - sentence: "Поки я обідав, Тарас прочитав новини."
        error: "прочитав"
        correction: "читав"
        error_type: "word"
        options: ["прочитав", "читав", "прочитає", "читатиме"]
        explanation: "Дві дії відбуваються одночасно (поки), тому обидва дієслова мають бути недоконаного виду."
      - sentence: "Вчора ми довго гуляли містом, і раптом зустрічали старого друга."
        error: "зустрічали"
        correction: "зустріли"
        error_type: "word"
        options: ["зустрічали", "зустріли", "зустрічаємо", "зустрінемо"]
        explanation: "Раптова подія (раптом), що перериває тло, вимагає дієслова доконаного виду."
      - sentence: "Вона весь день написала статтю."
        error: "написала"
        correction: "писала"
        error_type: "word"
        options: ["написала", "писала", "пише", "напише"]
        explanation: "«Весь день» вказує на тривалий процес, тому використовуємо недоконаний вид."
      - sentence: "Я раптом прокидався і встав з ліжка."
        error: "прокидався"
        correction: "прокинувся"
        error_type: "word"
        options: ["прокидався", "прокинувся", "прокидаюся", "прокидатимусь"]
        explanation: "Швидка, результативна подія вимагає доконаного виду."

  - id: open-writing-yesterday
    type: essay-response
    prompt: "Напишіть короткий текст (5-7 речень) про ваш вчорашній день. Спробуйте чергувати дієслова доконаного і недоконаного виду, щоб показати як загальний фон (що робили), так і конкретні результати (що зробили)."
    min_words: 50
    model_answer: "Вчора вранці надворі яскраво світило сонце, співали пташки, і я повільно пив свою ранкову каву на кухні. Потім я швидко зібрав речі, вийшов з дому і поїхав на роботу. Майже весь день я працював над новим і дуже цікавим проєктом для нашої компанії. Раптом мені зателефонував давній друг і запросив мене на спільний обід у затишне кафе. Поки ми смачно обідали, ми довго розмовляли про наші спільні плани на майбутні вихідні. Увечері я нарешті закінчив писати важливу статтю і відразу відправив її своєму редактору. Це був справді дуже продуктивний і приємний день."

workbook:
  - type: fill-in
    instruction: "Вставте правильну форму дієслова за особою та числом."
    items:
      - sentence: "Я (читати) _____ дуже цікаву книжку."
        answer: "читаю"
      - sentence: "Ти (знати) _____, де знаходиться бібліотека?"
        answer: "знаєш"
      - sentence: "Ми (робити) _____ домашнє завдання разом."
        answer: "робимо"
      - sentence: "Ви часто (говорити) _____ українською?"
        answer: "говорите"
      - sentence: "Вони (хотіти) _____ поїхати до Львова."
        answer: "хочуть"
      - sentence: "Я не (могти) _____ тобі зараз допомогти."
        answer: "можу"
      - sentence: "Вона дуже багато (працювати) _____."
        answer: "працює"
      - sentence: "Чому він завжди (стояти) _____ тут?"
        answer: "стоїть"

  - type: match-up
    instruction: "З'єднайте особові займенники з відповідними формами дієслова «писати»."
    pairs:
      - left: "Я"
        right: "пишу"
      - left: "Ти"
        right: "пишеш"
      - left: "Він"
        right: "пише"
      - left: "Ми"
        right: "пишемо"
      - left: "Ви"
        right: "пишете"
      - left: "Вони"
        right: "пишуть"

  - type: group-sort
    instruction: "Розподіліть дієслова за видами."
    groups:
      - label: "Доконаний вид (Perfective)"
        items: ["прочитати", "зробити", "написати", "сказати", "взяти", "вирішити"]
      - label: "Недоконаний вид (Imperfective)"
        items: ["читати", "робити", "писати", "говорити", "брати", "вирішувати"]

  - type: error-correction
    instruction: "Знайдіть і виправте помилку в узгодженні минулого часу."
    items:
      - sentence: "Моя сестра сказав мені цю новину."
        error: "сказав"
        correction: "сказала"
        error_type: "word"
        options: ["сказав", "сказала", "сказали", "скаже"]
        explanation: "Дієслово в минулому часі має узгоджуватися з підметом жіночого роду (сестра)."
      - sentence: "Минулого тижня ми їздив до Львова."
        error: "їздив"
        correction: "їздили"
        error_type: "word"
        options: ["їздив", "їздила", "їздили", "їздитимемо"]
        explanation: "Оскільки підмет «ми» (множина), дієслово теж має бути у формі множини."
      - sentence: "Вона довго не міг знайти правильну відповідь."
        error: "міг"
        correction: "могла"
        error_type: "word"
        options: ["міг", "могла", "могло", "могли"]
        explanation: "Підмет «вона» вимагає жіночого роду для дієслова (могла)."
      - sentence: "Вчора мої друзі прийшов до мене в гості."
        error: "прийшов"
        correction: "прийшли"
        error_type: "word"
        options: ["прийшов", "прийшла", "прийшли", "прийде"]
        explanation: "Слово «друзі» стоїть у множині, тому дієслово теж має закінчуватися на «-ли»."
      - sentence: "Олексію, де ти була вчора ввечері?"
        error: "була"
        correction: "був"
        error_type: "word"
        options: ["був", "була", "було", "були"]
        explanation: "Звертання до чоловіка («Олексію») вимагає дієслова чоловічого роду."
      - sentence: "Це нове правило працював дуже добре."
        error: "працював"
        correction: "працювало"
        error_type: "word"
        options: ["працював", "працювала", "працювало", "працювали"]
        explanation: "Слово «правило» — середнього роду, тому потрібно закінчення «-о»."

  - type: fill-in
    instruction: "Оберіть правильну форму зворотного дієслова."
    items:
      - sentence: "Ти завжди радісно _____, коли бачиш мене."
        answer: "усміхаєшся"
        options: ["усміхаєшся", "усміхається"]
      - sentence: "Він уважно _____ новий український фільм."
        answer: "дивиться"
        options: ["дивиться", "дивишся"]
      - sentence: "Вони так голосно _____, що всі їх чують."
        answer: "сміються"
        options: ["сміються", "смієтеся"]
      - sentence: "Мені чомусь зовсім не _____ цієї ночі."
        answer: "спиться"
        options: ["спиться", "спить"]
      - sentence: "Ми часто _____ в цьому затишному кафе."
        answer: "зустрічаємося"
        options: ["зустрічаємося", "зустрічаються"]
      - sentence: "Як ти _____ сьогодні після іспиту?"
        answer: "почуваєшся"
        options: ["почуваєшся", "почувається"]