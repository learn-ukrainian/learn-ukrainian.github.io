version: "1.0"
module: b1-baseline-past-present
level: b1

inline:
  - id: group-sort-distribute-verbs-between-i-and-ii-conjugation-classes
    type: group-sort
    instruction: "Розподіліть дієслова за типом дієвідміни"
    groups:
      - label: "І дієвідміна (-уть/-ють)"
        items: ["писати", "знати", "читати", "працювати", "хотіти"]
      - label: "ІІ дієвідміна (-ать/-ять)"
        items: ["робити", "говорити", "стояти", "сидіти", "просити"]

  - id: fill-in-tense-forms
    type: fill-in
    instruction: "Поставте дієслово у правильну форму теперішнього або минулого часу"
    items:
      - sentence: "Олексій зараз _____ статтю."
        answer: "пише"
        options: ["писав", "пише", "написав"]
      - sentence: "Дарина багато _____, але зараз уже в Києві."
        answer: "подорожувала"
        options: ["подорожує", "подорожувала", "подорожують"]
      - sentence: "Щоранку я _____ о сьомій."
        answer: "встаю"
        options: ["вставав", "встаю", "встав"]
      - sentence: "Учора він _____ каву і пішов на Хрещатик."
        answer: "купив"
        options: ["купує", "купував", "купив"]
      - sentence: "Ми _____ з друзями сьогодні ввечері."
        answer: "зустрічаємося"
        options: ["зустрічалися", "зустрічаємося", "зустрінемо"]
      - sentence: "Коли я спокійно _____, зателефонував Тарас."
        answer: "обідав"
        options: ["обідав", "обідаю", "пообідав"]
      - sentence: "Поки я обідав, Тарас _____ новини."
        answer: "читав"
        options: ["прочитав", "читав", "читає"]
      - sentence: "Вона часто _____ друзям."
        answer: "допомагає"
        options: ["допомогла", "допомагала", "допомагає"]

  - id: quiz-aspect-id
    type: quiz
    instruction: "Визначте час і вид дієслова: теперішній/минулий, доконаний/недоконаний"
    items:
      - question: "Він прочитав цікаву статтю."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "Ми зараз працюємо над проєктом."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 0
      - question: "Я шукав ключі цілий ранок."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 1
      - question: "Вони знайшли правильну відповідь."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "Брат сидить у кріслі."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 0
      - question: "Студенти вчили нові слова."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 1
      - question: "Ти купив каву?"
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "Вона взяла мою ручку."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 2
      - question: "Я завжди п'ю каву зранку."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 0
      - question: "Вона писала лист цілу годину."
        options: ["Теперішній час, недоконаний вид", "Минулий час, недоконаний вид", "Минулий час, доконаний вид", "Майбутній час, доконаний вид"]
        correct: 1

  - id: match-up-aspect-pairs
    type: match-up
    instruction: "З'єднайте видові пари (недоконаний ↔ доконаний)"
    pairs:
      - left: "писати"
        right: "написати"
      - left: "робити"
        right: "зробити"
      - left: "читати"
        right: "прочитати"
      - left: "вирішувати"
        right: "вирішити"
      - left: "показувати"
        right: "показати"
      - left: "допомагати"
        right: "допомогти"
      - left: "брати"
        right: "взяти"
      - left: "говорити"
        right: "сказати"

  - id: error-correction-aspect
    type: error-correction
    instruction: "Знайдіть і виправте помилки у вживанні виду або часу в реченнях"
    items:
      - sentence: "Вчора я прочитав книжку три години."
        error: "прочитав"
        correction: "читав"
        error_type: "word"
        options: ["прочитав", "читав", "читаю"]
        explanation: "Дія тривала в часі (три години), тому потрібен недоконаний вид."
      - sentence: "Моя сестра сказав мені новину."
        error: "сказав"
        correction: "сказала"
        error_type: "word"
        options: ["сказав", "сказала", "сказали"]
        explanation: "Сестра — жіночого роду, тому в минулому часі потрібне закінчення '-ла'."
      - sentence: "Він щодня зробить ранкову гімнастику."
        error: "зробить"
        correction: "робить"
        error_type: "word"
        options: ["зробить", "робить", "робив"]
        explanation: "Дія регулярна (щодня), отже, потрібен теперішній час."
      - sentence: "Коли я йшов додому, я зустрічав друга."
        error: "зустрічав"
        correction: "зустрів"
        error_type: "word"
        options: ["зустрічав", "зустрів", "зустрічаю"]
        explanation: "Зустріч — це раптова, завершена подія, яка перервала процес."
      - sentence: "Я зараз напишу листа для партнера."
        error: "напишу"
        correction: "пишу"
        error_type: "word"
        options: ["напишу", "пишу", "написав"]
        explanation: "Дія відбувається зараз, у момент мовлення. Доконаний вид не має теперішнього часу."
      - sentence: "Поки я готував вечерю, вона прибрала кімнату."
        error: "прибрала"
        correction: "прибирала"
        error_type: "word"
        options: ["прибрала", "прибирала", "прибирає"]
        explanation: "Слово 'поки' вказує на дві паралельні тривалі дії. Обидві дії мають бути недоконаного виду."

  - id: open-writing-yesterday
    type: essay-response
    prompt: "Напишіть короткий текст (мінімум 6 речень) на тему «Мій вчорашній день». Розкажіть про ваші звичні дії (використовуючи недоконаний вид) та конкретні результати (використовуючи доконаний вид)."
    min_words: 50

workbook:
  - type: true-false
    instruction: "Визначте, чи правильні ці твердження про граматику української мови"
    items:
      - statement: "Дієслова доконаного виду можуть мати форму теперішнього часу."
        correct: false
        explanation: "Доконаний вид означає завершену дію, тому він не може використовуватися в теперішньому часі."
      - statement: "У минулому часі дієслова узгоджуються за родом і числом, а не за особою."
        correct: true
        explanation: "Форма залежить від роду (працював, працювала) або числа (працювали)."
      - statement: "Закінчення '-уть' та '-ють' у третій особі множини вказують на першу дієвідміну."
        correct: true
        explanation: "Це головне правило для визначення першої дієвідміни (наприклад, пишуть, читають)."
      - statement: "Дієслово 'хотіти' належить до другої дієвідміни."
        correct: false
        explanation: "Хоча воно закінчується на '-іти', у третій особі множини маємо 'хочуть', отже, це перша дієвідміна."
      - statement: "Дієслова 'писати' і 'написати' утворюють видову пару."
        correct: true
        explanation: "Це видова пара: 'писати' — недоконаний вид, 'написати' — доконаний вид."
      - statement: "Слово 'поки' зазвичай поєднує дієслова доконаного та недоконаного виду."
        correct: false
        explanation: "Слово 'поки' найчастіше поєднує дві паралельні дії недоконаного виду."

  - type: unjumble
    instruction: "Складіть правильні речення зі слів. Зверніть увагу на час та вид дієслів"
    items:
      - words: ["у", "Я", "працював", "видавництві", "все", "літо."]
        correct_order: ["Я", "працював", "у", "видавництві", "все", "літо."]
      - words: ["ми", "зустрілися.", "Добре,", "що"]
        correct_order: ["Добре,", "що", "ми", "зустрілися."]
      - words: ["новий", "Ми", "подивилися", "фільм", "в", "кінотеатрі."]
        correct_order: ["Ми", "подивилися", "новий", "фільм", "в", "кінотеатрі."]
      - words: ["я", "Коли", "Тарас.", "обідав,", "зателефонував"]
        correct_order: ["Коли", "я", "обідав,", "зателефонував", "Тарас."]
      - words: ["не", "дні.", "Мені", "спиться", "останні", "зовсім"]
        correct_order: ["Мені", "зовсім", "не", "спиться", "останні", "дні."]
      - words: ["вона", "Поки", "готувала,", "читав.", "я"]
        correct_order: ["Поки", "вона", "готувала,", "я", "читав."]

  - type: fill-in
    instruction: "Оберіть правильну форму дієслова (-ться чи -шся)"
    items:
      - sentence: "Як ти _____ перед іспитом?"
        answer: "почуваєшся"
        options: ["почувається", "почуваєшся", "почуваюся"]
      - sentence: "Він щодня _____ нових слів."
        answer: "вчиться"
        options: ["вчиться", "вчишся", "вчуся"]
      - sentence: "Ти часто _____ цьому дивному факту?"
        answer: "дивуєшся"
        options: ["дивується", "дивуєшся", "дивуюся"]
      - sentence: "Вона щиро _____ твоєму успіху."
        answer: "радується"
        options: ["радується", "радуєшся", "радіти"]
      - sentence: "Чому ти постійно _____ від мене?"
        answer: "ховаєшся"
        options: ["ховається", "ховаєшся", "ховаюся"]
      - sentence: "Дитина радісно _____, коли бачить маму."
        answer: "усміхається"
        options: ["усміхається", "усміхаєшся", "усміхатися"]