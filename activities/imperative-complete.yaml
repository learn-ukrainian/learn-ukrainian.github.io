version: "1.0"
module: imperative-complete
level: a2

inline:
  - id: fill-in-3rd-person-imperative
    type: fill-in
    instruction: "Вставте правильну форму дієслова (третя особа)"
    items:
      - sentence: "Хай він ______ цю книгу сьогодні."
        answer: "прочитає"
        options: ["прочитає", "прочитають", "прочитаєш"]
      - sentence: "Нехай вони ______ завтра ввечері."
        answer: "прийдуть"
        options: ["прийдуть", "прийде", "прийдемо"]
      - sentence: "Хай вона ______ цю важливу інформацію."
        answer: "знає"
        options: ["знає", "знають", "знаєте"]
      - sentence: "Хай дитина ______ на вулиці, там тепло."
        answer: "грається"
        options: ["грається", "граються", "граюся"]
      - sentence: "Нехай батьки ______ вдома."
        answer: "відпочинуть"
        options: ["відпочинуть", "відпочине", "відпочинете"]
      - sentence: "Хай вода ______ швидше."
        answer: "закипить"
        options: ["закипить", "закиплять", "закипимо"]
      - sentence: "Нехай соус ______ десять хвилин."
        answer: "настоїться"
        options: ["настоїться", "настояться", "настоюся"]
      - sentence: "Нехай ______ ваші найкращі мрії!"
        answer: "здійсняться"
        options: ["здійсняться", "здійсниться", "здійснимося"]

  - id: unjumble-1st-person-plural
    type: unjumble
    instruction: "Складіть правильне речення (пропозиція для спільної дії)"
    items:
      - words: ["в", "кіно!", "Ходімо"]
        correct_order: ["Ходімо", "в", "кіно!"]
      - words: ["пізніше.", "про", "це", "Поговорімо"]
        correct_order: ["Поговорімо", "про", "це", "пізніше."]
      - words: ["важке", "Зробімо", "це", "завдання!"]
        correct_order: ["Зробімо", "це", "важке", "завдання!"]
      - words: ["море", "Поїдьмо", "на", "влітку!"]
        correct_order: ["Поїдьмо", "на", "море", "влітку!"]
      - words: ["хороші", "Читаймо", "книги!", "українські"]
        correct_order: ["Читаймо", "хороші", "українські", "книги!"]
      - words: ["квитки", "зараз!", "Купімо", "ці"]
        correct_order: ["Купімо", "ці", "квитки", "зараз!"]

  - id: match-up-vocative-wishes
    type: match-up
    instruction: "З'єднайте англійське побажання з українським"
    pairs:
      - left: "Mom, be happy!"
        right: "Мамо, будь щасливою!"
      - left: "Dad, be healthy!"
        right: "Тату, будь здоровим!"
      - left: "Children, be attentive!"
        right: "Діти, будьте уважними!"
      - left: "May your dreams come true!"
        right: "Нехай здійсняться ваші мрії!"
      - left: "Friend, good luck to you!"
        right: "Друже, хай тобі щастить!"
      - left: "Live long!"
        right: "Живи довго!"
      - left: "Be healthy! (idiom)"
        right: "Будьте здорові!"
      - left: "Colleagues, be successful!"
        right: "Колеги, будьте успішними!"

  - id: quiz-aspect-choice
    type: quiz
    instruction: "Оберіть правильний вид дієслова (недоконаний чи доконаний)"
    items:
      - question: "Цей документ дуже важливий. ______ його зараз!"
        options: ["Прочитай", "Читай", "Прочитаєш", "Читаєш"]
        correct: 0
      - question: "Для гарного результату ______ українські статті щодня."
        options: ["Читай", "Прочитай", "Читаєш", "Прочитаєш"]
        correct: 0
      - question: "На вулиці холодно. ______ вікно!"
        options: ["Закрий", "Закривай", "Закриєш", "Закриваєш"]
        correct: 0
      - question: "Мама каже сину: «______ вікно, на вулиці шумно!»"
        options: ["Не відкривай", "Не відкрий", "Не відкриваєш", "Не відкриєш"]
        correct: 0
      - question: "Я чекаю на твою відповідь. ______ мені СМС сьогодні!"
        options: ["Напиши", "Пиши", "Напишеш", "Пишеш"]
        correct: 0
      - question: "Заходьте в кімнату і ______ , будь ласка."
        options: ["сідайте", "сядьте", "сідаєте", "сядете"]
        correct: 0
      - question: "Будь обережним! ______ !"
        options: ["Не впади", "Не падай", "Не падаєш", "Не впадеш"]
        correct: 0
      - question: "______ цю книгу довго, вона дуже цікава."
        options: ["Читай", "Прочитай", "Читаєш", "Прочитаєш"]
        correct: 0

workbook:
  - type: error-correction
    instruction: "Знайдіть і виправте помилку"
    items:
      - sentence: "Давайте робити це важливе завдання разом!"
        error: "Давайте робити"
        correction: "Робімо"
        error_type: "construction"
        options: ["Робімо", "Робіть", "Робимо"]
        explanation: "В українській мові ми використовуємо закінчення -мо для спільної дії (let's), а не «давайте» + інфінітив."
      - sentence: "Пішли на море сьогодні влітку!"
        error: "Пішли"
        correction: "Ходімо"
        error_type: "word"
        options: ["Ходімо", "Йдемо", "Ідемо"]
        explanation: "«Пішли» — це минулий час. Для запрошення треба казати «Ходімо!»."
      - sentence: "Хай вони чекати в коридорі."
        error: "чекати"
        correction: "чекають"
        error_type: "word"
        options: ["чекають", "чекаєте", "чекаємо"]
        explanation: "Після «хай» дієслово має форму теперішнього або майбутнього часу, а не інфінітива."
      - sentence: "Оленка, будь щасливою!"
        error: "Оленка"
        correction: "Оленко"
        error_type: "word"
        options: ["Оленко", "Оленці", "Оленку"]
        explanation: "Для звертання ми завжди використовуємо кличний відмінок."
      - sentence: "Максиме, будь обережний!"
        error: "обережний"
        correction: "обережним"
        error_type: "word"
        options: ["обережним", "обережному", "обережного"]
        explanation: "Після «будь» прикметник має стояти в орудному відмінку (-им для чоловічого роду)."
      - sentence: "Не відкрий вікно, на вулиці дуже холодно."
        error: "відкрий"
        correction: "відкривай"
        error_type: "word"
        options: ["відкривай", "відкриваєш", "відкриєте"]
        explanation: "Для заборони (не роби цього) ми зазвичай використовуємо недоконаний вид."

  - type: unjumble
    instruction: "Складіть правильне речення (накази, пропозиції, побажання)"
    items:
      - words: ["закипить", "Хай", "швидше.", "вода"]
        correct_order: ["Хай", "вода", "закипить", "швидше."]
      - words: ["завдання!", "Зробімо", "важке", "це"]
        correct_order: ["Зробімо", "це", "важке", "завдання!"]
      - words: ["море", "Поїдьмо", "на", "влітку!"]
        correct_order: ["Поїдьмо", "на", "море", "влітку!"]
      - words: ["спокійним!", "завжди", "будь", "Максиме,"]
        correct_order: ["Максиме,", "будь", "завжди", "спокійним!"]
      - words: ["будьте", "Діти,", "і", "уважними", "здоровими!"]
        correct_order: ["Діти,", "будьте", "уважними", "і", "здоровими!"]
      - words: ["здійсняться", "Нехай", "мрії!", "ваші", "всі"]
        correct_order: ["Нехай", "здійсняться", "всі", "ваші", "мрії!"]

  - type: translate
    instruction: "Оберіть правильний переклад"
    items:
      - source: "Let's read!"
        options:
          - text: "Читаймо!"
            correct: true
          - text: "Читайте!"
            correct: false
          - text: "Читаємо!"
            correct: false
          - text: "Давайте читати!"
            correct: false
      - source: "May luck happen to you! / Good luck!"
        options:
          - text: "Хай тобі щастить!"
            correct: true
          - text: "Будь щасливим!"
            correct: false
          - text: "Нехай ти щасливий!"
            correct: false
          - text: "Щастити тобі!"
            correct: false
      - source: "Let him read."
        options:
          - text: "Хай він читає."
            correct: true
          - text: "Читає він."
            correct: false
          - text: "Він читати."
            correct: false
          - text: "Нехай прочитати."
            correct: false
      - source: "Oksana, be careful!"
        options:
          - text: "Оксано, будь обережною!"
            correct: true
          - text: "Оксана, будь обережна!"
            correct: false
          - text: "Оксана, будь обережною!"
            correct: false
          - text: "Оксано, будь обережна!"
            correct: false
      - source: "Friends, be successful!"
        options:
          - text: "Друзі, будьте успішними!"
            correct: true
          - text: "Друзі, будьте успішні!"
            correct: false
          - text: "Друже, будь успішним!"
            correct: false
          - text: "Друзі, будь успішними!"
            correct: false
      - source: "Let's go home!"
        options:
          - text: "Ходімо додому!"
            correct: true
          - text: "Пішли додому!"
            correct: false
          - text: "Ідемо додому!"
            correct: false
          - text: "Давайте йти додому!"
            correct: false

  - type: group-sort
    instruction: "Розподіліть накази за видом (недоконаний чи доконаний)"
    groups:
      - label: "Недоконаний вид (загальна порада, заборона)"
        items: ["Читай щодня", "Пишіть коментарі", "Не відкривай вікно", "Сідайте, будь ласка"]
      - label: "Доконаний вид (конкретний результат, попередження)"
        items: ["Прочитай статтю", "Напиши мені СМС", "Закрий вікно", "Не впади!"]