version: "1.0"
module: advanced-pronouns
level: b1

inline:
  - id: reading-interrogative-relative
    type: reading
    instruction: "Прочитайте текст про питально-відносні займенники і дайте відповіді на запитання."
    passage: "Коли ми почали працювати над новим проєктом, я одразу запитав: «Хто буде відповідати за дизайн?». Ніхто не знав точної відповіді. Тоді я звернувся до менеджера: «Які терміни виконання цього завдання?». Він пояснив, що людина, яка візьметься за цю роботу, повинна мати великий досвід. Я зрозумів, що це той проєкт, яким ми всі будемо пишатися, якщо зробимо все правильно."
    questions:
      - "Які питання автор поставив на початку роботи над проєктом?"
      - "Якими якостями, за словами менеджера, повинна володіти людина для цієї роботи?"
      - "Як автор описує проєкт у своєму останньому реченні?"

  - id: fill-in-interrogative-relative
    type: fill-in
    instruction: "Вставте правильну граматичну форму у реченнях на тему питально-відносні займенники."
    items:
      - sentence: "______ зараз година?"
        answer: "Котра"
        options: ["Котра", "Яка", "Кого", "Чим"]
      - sentence: "Це той студент, ______ я дав свій словник."
        answer: "якому"
        options: ["якому", "котрому", "кого", "чиєму"]
      - sentence: "______ ти сьогодні бачив у парку?"
        answer: "Кого"
        options: ["Хто", "Кого", "Кому", "Ким"]
      - sentence: "Я не знаю, ______ це книга лежить на столі."
        answer: "чия"
        options: ["яка", "котра", "чия", "кого"]
      - sentence: "Про ______ ви зараз так довго говорите?"
        answer: "що"
        options: ["що", "чого", "чому", "чим"]
      - sentence: "______ фільм ми будемо дивитися сьогодні ввечері?"
        answer: "Який"
        options: ["Котрий", "Який", "Чий", "Кого"]

  - id: quiz-interrogative-relative
    type: quiz
    instruction: "Оберіть правильний варіант: лексика та граматика з розділу «Питально-відносні займенники»."
    items:
      - question: "Яке з цих слів є питальним займенником у реченні «Кого ти зустрів?»?"
        options: ["ти", "Кого", "зустрів", "сьогодні"]
        correct: 1
      - question: "З яким словом у головному реченні узгоджується займенник «яка» у фразі «людина, яка знає»?"
        options: ["знає", "відповіді", "людина", "всі"]
        correct: 2
      - question: "В якому відмінку стоїть займенник «яким» у реченні «Це проєкт, яким ми пишаємося»?"
        options: ["Орудний", "Називний", "Давальний", "Місцевий"]
        correct: 0
      - question: "Який займенник слід використовувати, щоб запитати про точний час?"
        options: ["Який", "Котрий", "Чий", "Хто"]
        correct: 1
      - question: "Яке слово вказує на належність предмета певній особі?"
        options: ["який", "котрий", "що", "чий"]
        correct: 3
      - question: "Яка з цих форм є правильним місцевим відмінком займенника «хто»?"
        options: ["кого", "кому", "ким", "на кому"]
        correct: 3

  - id: essay-reflexive-self
    type: essay-response
    prompt: "Напишіть 5 речень, використовуючи нову лексику з розділу «Зворотний займенник себе» (себе, собі, собою, сам по собі)."
    min_words: 50
    model_answer: "Я нещодавно купив собі нову цікаву книгу про історію України, тому що дуже люблю читати. Після довгого тренування мій брат завжди почуває себе чудово і дуже задоволений собою. Вони постійно бачать себе справжніми лідерами у цьому важливому проєкті. Мені здається, що цей старий замок дуже цікавий сам по собі, без жодних додаткових легенд. Коли я зайшов у темну кімнату, мені одразу стало не по собі від дивних звуків."

  - id: error-correction-reflexive-self
    type: error-correction
    instruction: "Знайдіть і виправте помилки у реченнях на тему зворотний займенник себе."
    items:
      - sentence: "Він дуже любить його нову роботу в ІТ-компанії."
        error: "його"
        correction: "свою"
        error_type: "word"
      - sentence: "Я купив мені нову і цікаву машину минулого тижня."
        error: "мені"
        correction: "собі"
        error_type: "word"
      - sentence: "Вона впевнено розповіла всім про її молодшу сестру."
        error: "її"
        correction: "свою"
        error_type: "word"
      - sentence: "Студенти дуже пишаються ними після здачі важкого іспиту."
        error: "ними"
        correction: "собою"
        error_type: "word"
      - sentence: "Я повністю задоволений мною за вчорашній чудовий виступ."
        error: "мною"
        correction: "собою"
        error_type: "word"
      - sentence: "Цей складний архітектурний проєкт цікавий самий по собі."
        error: "самий"
        correction: "сам"
        error_type: "word"

  - id: match-up-reflexive-self
    type: match-up
    instruction: "З'єднайте терміни з розділу «Зворотний займенник себе» з їхніми значеннями."
    pairs:
      - left: "купити собі"
        right: "дія для власної користі"
      - left: "задоволений собою"
        right: "емоційне задоволення від результату"
      - left: "сам по собі"
        right: "незалежний, окремий від іншого"
      - left: "так собі"
        right: "дуже посередній, нічого особливого"
      - left: "не по собі"
        right: "стає страшно чи ніяково"
      - left: "само собою"
        right: "цілком очевидне, не потребує доказів"

  - id: indefinite-pronoun-choice
    type: fill-in
    instruction: "Оберіть правильний неозначений займенник."
    items:
      - sentence: "______ постійно стукає у наші двері, я піду відчиню."
        answer: "Хтось"
        options: ["Хтось", "Хто-небудь", "Будь-хто", "Хтозна-хто"]
      - sentence: "Скажіть, чи є тут ______ у цій темній кімнаті?"
        answer: "хто-небудь"
        options: ["хтось", "хто-небудь", "абихто", "дехто"]
      - sentence: "Цю просту і зрозумілу статтю може прочитати ______."
        answer: "будь-хто"
        options: ["будь-хто", "хтось", "дехто", "хто-небудь"]
      - sentence: "Він приніс додому ______ зовсім незрозуміле і дивне."
        answer: "хтозна-що"
        options: ["щось", "що-небудь", "хтозна-що", "будь-що"]
      - sentence: "Цей дешевий стіл — це просто ______ предмет низької якості."
        answer: "абиякий"
        options: ["будь-який", "абиякий", "якийсь", "який-небудь"]
      - sentence: "Ми обов'язково підемо в кіно з ______ завтра ввечері."
        answer: "кимось"
        options: ["ким-небудь", "будь-ким", "кимось", "деким"]

  - id: fill-in-negative-pronouns-and-prepositions
    type: fill-in
    instruction: "Вставте правильну форму заперечного займенника (з прийменником або без)."
    items:
      - sentence: "У нашій кімнаті зараз ______ немає."
        answer: "нікого"
        options: ["нікого", "нікому", "ні з ким", "ніхто"]
      - sentence: "Він ______ не розмовляв учора на вечірці."
        answer: "ні з ким"
        options: ["ні з ким", "з ніким", "ніким", "нікому"]
      - sentence: "Я ______ не погоджуюся в цьому складному питанні."
        answer: "ні з чим"
        options: ["ні з чим", "з нічим", "нічим", "нічого"]
      - sentence: "Мені ______ спитати про дорогу, всі люди пішли геть."
        answer: "нíкого"
        options: ["нíкого", "нікого", "нікому", "ні з ким"]
      - sentence: "Він ______ не вірив і завжди працював сам."
        answer: "нікому"
        options: ["нікого", "нікому", "ні з ким", "ні про кого"]
      - sentence: "Ми не говорили ______ важливе сьогодні вранці."
        answer: "ні про що"
        options: ["ні про що", "про ніщо", "нічого", "ні з чим"]

  - id: reading-identify-pronoun-types-in-the-detective-text
    type: quiz
    instruction: "Проаналізуйте займенники в детективному тексті та оберіть правильний варіант."
    items:
      - question: "Яку функцію виконує займенник «хтось» у першому реченні тексту?"
        options: ["Вказує на конкретну, але невідому особу", "Вказує на будь-яку людину у світі", "Заперечує наявність особи", "Ставить пряме запитання"]
        correct: 0
      - question: "Чому детектив сказав «нікого не було», а не «ніхто не було»?"
        options: ["Бо це правильний родовий відмінок заперечення", "Бо він зробив граматичну помилку", "Бо це питальний займенник", "Бо це зворотний займенник себе"]
        correct: 0
      - question: "Що означає фраза «нікому з нас» у детективному тексті?"
        options: ["Жодній людині з нашої групи", "Всім людям у нашій групі", "Комусь одному з групи", "Невідомій людині з вулиці"]
        correct: 0
      - question: "Чому форма «ні з ким» пишеться трьома окремими словами?"
        options: ["Бо прийменник розриває заперечний займенник", "Бо це три абсолютно різні займенники", "Бо автор зробив випадкову помилку", "Бо всі заперечні займенники так пишуться"]
        correct: 0
      - question: "Що виражає займенник «будь-кого» у реченні «розпитаю будь-кого»?"
        options: ["Повну відсутність обмежень у виборі", "Конкретну дуже підозрілу особу", "Людину, якої там ніколи не було", "Спеціального важливого свідка"]
        correct: 0
      - question: "Яка роль зворотного займенника у фразі «уявити собі»?"
        options: ["Він показує, що дія виконується для власного інтересу", "Він вказує на фізичний напрямок руху", "Він повністю заперечує виконану дію", "Він підкреслює абсолютну відсутність вибору"]
        correct: 0

  - id: fill-in-negative-and-indefinite-pronouns-in-conversation
    type: fill-in
    instruction: "Вставте правильні неозначені або заперечні займенники в діалог."
    items:
      - sentence: "Скажи чесно, ти бачив ______ підозріле вчора?"
        answer: "що-небудь"
        options: ["що-небудь", "щось", "хтозна-що", "будь-що"]
      - sentence: "Ні, я зовсім не бачив ______ цікавого."
        answer: "нічого"
        options: ["нічого", "ніщо", "ні про що", "ні з чим"]
      - sentence: "Може, ______ з вас знає, де лежить мій зошит?"
        answer: "хтось"
        options: ["хтось", "хто-небудь", "будь-хто", "хтозна-хто"]
      - sentence: "Ми ______ не говорили про твій новий зошит."
        answer: "ні з ким"
        options: ["ні з ким", "з ніким", "нікому", "нікого"]
      - sentence: "Ти можеш запитати ______, всі студенти були тут."
        answer: "будь-кого"
        options: ["будь-кого", "хтось", "хто-небудь", "когось"]
      - sentence: "Мені ______ спитати, бо зараз нікого немає вдома."
        answer: "нíкого"
        options: ["нíкого", "нікого", "нікому", "ні з ким"]

  - id: match-up-match-the-pronoun-form-to-its-grammatical-function
    type: match-up
    instruction: "З'єднайте займенник із його граматичною характеристикою."
    pairs:
      - left: "ні з чим"
        right: "Заперечний займенник, розірваний прийменником"
      - left: "будь-який"
        right: "Неозначений займенник, що пишеться через дефіс"
      - left: "дехто"
        right: "Неозначений займенник, що пишеться разом"
      - left: "собою"
        right: "Зворотний займенник в орудному відмінку"
      - left: "якого"
        right: "Питально-відносний займенник у родовому відмінку"
      - left: "ніхто"
        right: "Заперечний займенник у називному відмінку"

  - id: fill-in-use-with-correct-declension
    type: fill-in
    instruction: "Вставте правильну форму означального займенника."
    items:
      - sentence: "Сьогодні він працює ______, без нашої допомоги."
        answer: "сам"
        options: ["сам", "самий", "весь", "кожен"]
      - sentence: "Ми зустрілися з друзями в ______ центрі міста."
        answer: "самому"
        options: ["самому", "самій", "всьому", "кожному"]
      - sentence: "______ студент нашого курсу повинен здати цей тест."
        answer: "Кожен"
        options: ["Кожен", "Весь", "Сам", "Інший"]
      - sentence: "Він з радістю поділився цією новиною ______."
        answer: "зі всіма"
        options: ["зі всіма", "з всіма", "всіма", "на всіх"]
      - sentence: "Я не хочу читати цю книгу, дайте мені ______."
        answer: "іншу"
        options: ["іншу", "кожного", "всю", "саму"]
      - sentence: "Я уважно прочитав ______ статтю до кінця."
        answer: "всю"
        options: ["всю", "всі", "кожну", "іншу"]

workbook:
  - type: quiz
    instruction: "Оберіть правильний переклад."
    items:
      - question: "Nobody knows the answer."
        options: ["Ніхто знає відповідь.", "Ніхто не знає відповідь.", "Він не знає відповідь.", "Кожен знає відповідь."]
        correct: 1
      - question: "He brought nothing."
        options: ["Він приніс нічого.", "Він ніщо приніс.", "Він нічого не приніс.", "Він щось не приніс."]
        correct: 2
      - question: "Anyone can do this."
        options: ["Хтось може це зробити.", "Будь-хто може це зробити.", "Ніхто може це зробити.", "Кожен може це зробити."]
        correct: 1
      - question: "I bought myself a new book."
        options: ["Я купив собі нову книгу.", "Я купив мені нову книгу.", "Я купив свою нову книгу.", "Я купив мене нову книгу."]
        correct: 0
      - question: "She told a story about her brother."
        options: ["Вона розповіла про її брата.", "Вона розповіла про свою брата.", "Вона розповіла про свого брата.", "Вона розповіла про себе брата."]
        correct: 2
      - question: "This is the same professor."
        options: ["Це сам професор.", "Це самий професор.", "Це той самий професор.", "Це інший професор."]
        correct: 2

  - type: true-false
    instruction: "Правда чи ні? Визначте правильність тверджень про займенники."
    items:
      - statement: "Займенник «себе» має форму називного відмінка."
        correct: false
        explanation: "Зворотний займенник ніколи не може бути підметом, тому не має називного відмінка."
      - statement: "Неозначені займенники з частками -сь та де- завжди пишуться разом."
        correct: true
        explanation: "Так, наприклад: хтось, дехто, щось."
      - statement: "В українській мові допускається подвійне заперечення (Ніхто не знає)."
        correct: true
        explanation: "Більше того, воно є обов'язковим."
      - statement: "Заперечні займенники з прийменниками пишуться разом (наприклад: зніким)."
        correct: false
        explanation: "Прийменник розриває заперечний займенник, і вони пишуться трьома словами (ні з ким)."
      - statement: "Займенник «котрий» використовується для запитання про час (Котра година?)."
        correct: true
        explanation: "Він вказує на порядок при лічбі, тому використовується з годинами."
      - statement: "Слова «сам» і «самий» мають однакове значення і можуть замінювати одне одного."
        correct: false
        explanation: "«Сам» означає самостійність (alone, oneself), а «самий» вказує на ідентичність або ступінь (the very, the same)."

  - type: unjumble
    instruction: "Складіть правильне речення зі слів."
    items:
      - words: ["Ніхто", "цієї", "не", "проблеми.", "розуміє"]
        correct_order: ["Ніхто", "не", "розуміє", "цієї", "проблеми."]
      - words: ["Я", "не", "говорив", "сьогодні", "ні", "з", "ким."]
        correct_order: ["Я", "сьогодні", "не", "говорив", "ні", "з", "ким."]
      - words: ["може", "сюди", "Будь-хто", "зайти."]
        correct_order: ["Будь-хто", "може", "сюди", "зайти."]
      - words: ["купив", "каву.", "собі", "Я", "гарячу"]
        correct_order: ["Я", "купив", "собі", "гарячу", "каву."]
      - words: ["розповіла", "сестру.", "про", "Вона", "свою"]
        correct_order: ["Вона", "розповіла", "про", "свою", "сестру."]
      - words: ["бачив", "у", "когось", "кімнаті.", "Я"]
        correct_order: ["Я", "бачив", "когось", "у", "кімнаті."]

  - type: group-sort
    instruction: "Розподіліть займенники за їхнім правописом."
    groups:
      - label: "Пишуться разом"
        items: ["хтось", "дехто", "абихто", "щось"]
      - label: "Пишуться через дефіс"
        items: ["будь-хто", "хто-небудь", "казна-чий", "будь-який"]
      - label: "Пишуться окремо"
        items: ["ні з ким", "будь у кого", "ні про що", "аби з ким"]
