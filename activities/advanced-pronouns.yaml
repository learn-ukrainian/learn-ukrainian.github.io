version: "1.0"
module: advanced-pronouns
level: b1

inline:
  - id: reading-reading-interrogative-relative
    type: quiz
    title: "Читання: Питально-відносні займенники"
    instruction: "Прочитайте текст і дайте відповіді на запитання. Микола зайшов до кімнати, в якій нікого не було. На столі лежав лист, який хтось залишив учора. Кому він призначений? Котра зараз година? Микола запитав себе, що йому робити далі. Він не хотів розмовляти ні з ким і вирішив просто чекати."
    items:
      - question: "Який займенник використовується для опису кімнати?"
        options: ["якій", "котрій", "що", "якому"]
        correct: 0
      - question: "Про що запитав себе Микола?"
        options: ["Що йому робити далі", "Котра година", "Хто залишив лист", "Куди йти"]
        correct: 0
      - question: "Яке слово замінює іменник «лист» у підрядному реченні?"
        options: ["який", "хтось", "кому", "що"]
        correct: 0
      - question: "З ким хотів спілкуватися Микола?"
        options: ["ні з ким", "з будь-ким", "з кимось", "з усіма"]
        correct: 0
      - question: "Хто залишив лист на столі учора?"
        options: ["хтось", "ніхто", "Микола", "котрийсь"]
        correct: 0
      - question: "Який займенник використовує Микола, щоб запитати про час?"
        options: ["котра", "яка", "що", "скільки"]
        correct: 0

  - id: fill-in-fill-in-interrogative-relative
    type: fill-in
    title: "Питально-відносні займенники: Форми"
    instruction: "Вставте правильну граматичну форму у реченнях на тему питально-відносні займенники."
    items:
      - sentence: "_____ ти шукаєш у цьому натовпі?"
        answer: "Кого"
        options: ["Кого", "Що", "Кому", "Ким"]
      - sentence: "_____ ти найбільше цікавишся?"
        answer: "Чим"
        options: ["Чим", "Ким", "Чого", "Кому"]
      - sentence: "Це саме те, _____ я бачив учора ввечері."
        answer: "що"
        options: ["що", "хто", "який", "чий"]
      - sentence: "_____ це фільм? — Це дуже цікавий детектив."
        answer: "Який"
        options: ["Який", "Котрий", "Чий", "Що"]
      - sentence: "_____ зараз година?"
        answer: "Котра"
        options: ["Котра", "Яка", "Чия", "Що"]
      - sentence: "_____ листа ти так уважно читаєш?"
        answer: "Чийого"
        options: ["Чийого", "Якого", "Котрого", "Кого"]

  - id: quiz-quiz-interrogative-relative
    type: quiz
    title: "Вибір питально-відносних займенників"
    instruction: "Оберіть правильний варіант: лексика та граматика з розділу «Питально-відносні займенники»."
    items:
      - question: "Який займенник використовується для запитання про точний порядок у послідовності або про час?"
        options: ["котрий", "який", "чий", "що"]
        correct: 0
      - question: "Відносний займенник бере свій рід та число від слова-антецедента. А від чого залежить його відмінок?"
        options: ["Від його ролі в підрядному реченні", "Від слова-антецедента", "Від головного дієслова", "Він не змінюється"]
        correct: 0
      - question: "Ось той старий будинок, у _____ ми колись жили."
        options: ["якому", "котрому", "який", "чий"]
        correct: 0
      - question: "Я знаю людину, _____ дитина тут грається."
        options: ["чия", "якої", "яка", "чиєї"]
        correct: 0
      - question: "Вставте правильне слово: Людина, _____ знає правду, зазвичай мовчить."
        options: ["яка", "що", "котра", "хто"]
        correct: 0
      - question: "Який займенник завжди вказує виключно на істот?"
        options: ["хто", "що", "який", "чий"]
        correct: 0

  - id: essay-reflexive-self
    type: essay-response
    title: "Напишіть речення: Зворотний займенник себе"
    prompt: "Напишіть 5 речень, використовуючи нову лексику з розділу «Зворотний займенник себе» (наприклад: почувати себе, сам по собі, так собі, від себе, не по собі)."
    model_answer: "1. Я сьогодні почуваю себе дуже добре. 2. Ця проблема не зникне сама по собі. 3. Моя нова робота йде так собі. 4. Я хочу додати кілька слів від себе. 5. Мені стало не по собі у цій порожній кімнаті."

  - id: error-correction-reflexive-self
    type: error-correction
    title: "Виправте помилки: Зворотний займенник"
    instruction: "Знайдіть і виправте помилки у реченнях на тему зворотний займенник себе."
    items:
      - sentence: "Він часто бачить себе у дзеркалі, і себе є дуже красивим."
        error: "себе"
        answer: "він"
        error_type: "word"
        options: ["він", "сам", "свій", "його"]
        explanation: "Займенник «себе» не має називного відмінка і не може бути підметом."
      - sentence: "Цей чоловік дуже любить свою."
        error: "свою"
        answer: "себе"
        error_type: "word"
        options: ["себе", "собою", "собі", "свого"]
        explanation: "Тут дія спрямована на виконавця (додаток у знахідному відмінку), тому треба використовувати «себе»."
      - sentence: "Марія дивиться на свою на фотографії."
        error: "свою"
        answer: "себе"
        error_type: "word"
        options: ["себе", "неї", "собі", "саму"]
        explanation: "Слово «свою» означає приналежність, а тут потрібен об'єкт дії."
      - sentence: "Я хочу купити себе нову книгу."
        error: "себе"
        answer: "собі"
        error_type: "word"
        options: ["собі", "собою", "мене", "сам"]
        explanation: "Потрібно використати давальний відмінок: купити (для кого?) собі."
      - sentence: "Ти можеш уявити себе таку ситуацію?"
        error: "себе"
        answer: "собі"
        error_type: "word"
        options: ["собі", "собою", "тебе", "тобі"]
        explanation: "Потрібен давальний відмінок: уявити (кому?) собі."
      - sentence: "Завжди будь себе!"
        error: "себе"
        answer: "собою"
        error_type: "word"
        options: ["собою", "собі", "своїм", "сам"]
        explanation: "Після дієслова «бути» використовується орудний відмінок: бути (ким?) собою."

  - id: match-up-reflexive-self
    type: match-up
    title: "З'єднайте вирази: Зворотний займенник"
    instruction: "З'єднайте терміни з розділу «Зворотний займенник себе» з їхніми визначеннями."
    pairs:
      - left: "почувати себе"
        right: "відчувати певний стан здоров'я або настрою"
      - left: "сам по собі"
        right: "ізольовано, незалежно від інших"
      - left: "так собі"
        right: "середньої якості, не дуже добре, але й не критично погано"
      - left: "від себе"
        right: "від власного імені, як особисте доповнення"
      - left: "не по собі"
        right: "стан внутрішньої тривоги або дискомфорту"
      - left: "пишатися собою"
        right: "відчувати задоволення від власних досягнень"

  - id: indefinite-pronoun-choice
    type: quiz
    title: "Вибір неозначених займенників"
    instruction: "Оберіть правильний неозначений займенник за контекстом."
    items:
      - question: "У двері _____ дзвонить. Я не знаю, хто це."
        options: ["хтось", "будь-хто", "ніхто", "хто-небудь"]
        correct: 0
      - question: "Чи є тут _____ живий?"
        options: ["хто-небудь", "хтось", "дехто", "будь-хто"]
        correct: 0
      - question: "Цю просту задачу може вирішити _____."
        options: ["будь-хто", "хтось", "дехто", "ніхто"]
        correct: 0
      - question: "Він зробив цю роботу дуже погано, просто _____."
        options: ["абияк", "якось", "як-небудь", "будь-як"]
        correct: 0
      - question: "_____ з нас уже знає правильну відповідь."
        options: ["Дехто", "Хто-небудь", "Будь-хто", "Абихто"]
        correct: 0
      - question: "Він приніс додому _____."
        options: ["хтозна-що", "що-небудь", "дещо", "будь-що"]
        correct: 0

  - id: fill-in-negative-pronouns-and-prepositions
    type: fill-in
    title: "Заперечні займенники та прийменники"
    instruction: "Вставте правильну форму заперечного займенника (з прийменником, якщо потрібно)."
    items:
      - sentence: "У цій темній кімнаті _____ немає."
        answer: "нікого"
        options: ["нікого", "нікому", "ні ким", "ніщо"]
      - sentence: "Мені сьогодні абсолютно _____ поговорити про цю проблему."
        answer: "ні з ким"
        options: ["ні з ким", "нізким", "ні з кимось", "ні до кого"]
      - sentence: "Я _____ не розумію з цього складного тексту."
        answer: "нічого"
        options: ["нічого", "ніщо", "ні про що", "нічого не"]
      - sentence: "Вона _____ не вірить у цій складній ситуації."
        answer: "нікому"
        options: ["нікому", "нікого", "ні ким", "ні до кого"]
      - sentence: "Ми розмовляли майже годину, але так і _____."
        answer: "ні про що"
        options: ["ні про що", "ніпрощо", "ні за що", "ні на що"]
      - sentence: "_____ обставин не відчиняйте ці двері!"
        answer: "Ні за яких"
        options: ["Ні за яких", "Ніяких", "Ні в яких", "Ні з яких"]

  - id: self-check-classify-pronouns-by-type
    type: group-sort
    title: "Класифікація займенників"
    instruction: "Розподіліть займенники за їхніми граматичними розрядами."
    groups:
      - label: "Питально-відносні"
        items: ["хто", "чий", "котрий"]
      - label: "Неозначені"
        items: ["хтось", "будь-хто", "дещо"]
      - label: "Заперечні"
        items: ["ніхто", "ніякий", "нічий"]
      - label: "Означальні"
        items: ["кожен", "увесь", "сам"]

  - id: fill-in-practice-definitive-pronouns-and-their-declension
    type: fill-in
    title: "Означальні займенники: Практика"
    instruction: "Вставте правильну форму означального займенника."
    items:
      - sentence: "Він читав книгу _____ час."
        answer: "увесь"
        options: ["увесь", "кожен", "самий", "інший"]
      - sentence: "_____ студент повинен здати цю роботу."
        answer: "Кожен"
        options: ["Кожен", "Увесь", "Сам", "Будь-який"]
      - sentence: "Ми зустрілися у тій _____ кімнаті, що й минулого разу."
        answer: "самій"
        options: ["самій", "самі", "кожній", "усій"]
      - sentence: "Вона _____ приготувала цю складну вечерю."
        answer: "сама"
        options: ["сама", "самій", "кожна", "вся"]
      - sentence: "Я розповів цю історію _____ своїм друзям."
        answer: "всім"
        options: ["всім", "всіма", "кожному", "всіх"]
      - sentence: "Сьогодні я хочу спробувати якийсь _____ підхід."
        answer: "інший"
        options: ["інший", "кожен", "самий", "увесь"]

workbook:
  - type: match-up
    title: "З'єднайте неозначені займенники"
    instruction: "З'єднайте частку з її орфографічним правилом."
    pairs:
      - left: "аби-"
        right: "пишеться разом як префікс"
      - left: "будь-"
        right: "пишеться через дефіс як префікс"
      - left: "-небудь"
        right: "пишеться через дефіс як суфікс"
      - left: "казна-"
        right: "пишеться через дефіс і означає високу невизначеність"
      - left: "-сь"
        right: "пишеться разом як суфікс (хтось)"
      - left: "де-"
        right: "пишеться разом і означає стриманість (дехто)"

  - type: unjumble
    title: "Складіть речення з розірваними займенниками"
    instruction: "Складіть правильні речення зі слів. Пам'ятайте про правило прийменника!"
    items:
      - words: ["не", "ні", "було", "з", "говорити", "ким", "Мені"]
        correct_order: ["Мені", "не", "було", "ні", "з", "ким", "говорити"]
      - words: ["ситуації", "ніхто", "нічого", "не", "У", "цій", "розуміє"]
        correct_order: ["У", "цій", "ситуації", "ніхто", "нічого", "не", "розуміє"]
      - words: ["піду", "Я", "в", "сьогодні", "якому", "ні", "разі", "туди", "не"]
        correct_order: ["Я", "сьогодні", "ні", "в", "якому", "разі", "не", "піду", "туди"]
      - words: ["почуваю", "себе", "сьогодні", "дуже", "Я", "добре"]
        correct_order: ["Я", "сьогодні", "себе", "дуже", "добре", "почуваю"]
      - words: ["собою", "Він", "був", "задоволений", "цілком"]
        correct_order: ["Він", "був", "цілком", "задоволений", "собою"]
      - words: ["нас", "правильну", "вже", "Дехто", "знає", "з", "відповідь"]
        correct_order: ["Дехто", "з", "нас", "вже", "знає", "правильну", "відповідь"]

  - type: translate
    title: "Переклад: Займенники"
    instruction: "Оберіть правильний переклад."
    items:
      - source: "There is nobody in this dark room."
        options:
          - text: "У цій темній кімнаті нікого немає."
            correct: true
          - text: "У цій темній кімнаті нікого є."
            correct: false
          - text: "У цій темній кімнаті немає ніхто."
            correct: false
          - text: "У цій темній кімнаті хтось є."
            correct: false
      - source: "Is anyone here?"
        options:
          - text: "Чи є тут хто-небудь?"
            correct: true
          - text: "Чи є тут хтось?"
            correct: false
          - text: "Чи є тут будь-хто?"
            correct: false
          - text: "Чи є тут ніхто?"
            correct: false
      - source: "I am very proud of myself."
        options:
          - text: "Я дуже пишаюся собою."
            correct: true
          - text: "Я дуже пишаюся себе."
            correct: false
          - text: "Я дуже пишаюся собі."
            correct: false
          - text: "Я дуже пишаюся своїм."
            correct: false
      - source: "They talk about nothing."
        options:
          - text: "Вони говорять ні про що."
            correct: true
          - text: "Вони не говорять ні про що."
            correct: false
          - text: "Вони говорять ніпрощо."
            correct: false
          - text: "Вони не говорять ніпрощо."
            correct: false
      - source: "I told this to all my friends."
        options:
          - text: "Я розповів це всім друзям."
            correct: true
          - text: "Я розповів це усім друзів."
            correct: false
          - text: "Я розповів це кожним друзям."
            correct: false
          - text: "Я розповів це всі друзі."
            correct: false
      - source: "Every student has the right to a mistake."
        options:
          - text: "Кожен студент має право на помилку."
            correct: true
          - text: "Увесь студент має право на помилку."
            correct: false
          - text: "Сам студент має право на помилку."
            correct: false
          - text: "Інший студент має право на помилку."
            correct: false
