# Pre-commit hooks for learn-ukrainian.
#
# Install:
#   pip install pre-commit
#   pre-commit install                       # installs pre-commit + commit-msg + pre-push
#
# Or run manually on all files:
#   pre-commit run --all-files
#   pre-commit run --hook-stage pre-push --all-files
#
# These hooks mirror the checks CI runs on every push. Keeping them
# local means bad code never leaves the laptop. CI is slower and
# more expensive than catching a ruff error on save.
#
# Pre-push stage runs the full GHA-replay pytest via Dagger (~2-3 min
# warm) when scripts/, tests/, .dagger/, or any .py is changed. Bypass
# with `git push --no-verify` if you know what you're doing (e.g.
# docs-only pushes the path-filter caught wrong).
#
# Reference issue: #1081
default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:

  # --- Ruff: the primary linter (same rules as CI) ---
  # Version pinned to match what scripts/api/requirements-dev.txt
  # and the CI workflow install. Bump in lockstep.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        name: ruff (lint)
        # CI runs `ruff check scripts/` — match that here.
        args: [--config=pyproject.toml]
        files: ^scripts/.*\.py$

  # --- Gitleaks: prevent secrets from ever being committed ---
  # The repository already has a .gitleaks.toml allowlist for the
  # public Algolia keys. Pre-commit picks that up automatically.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)
        # Scan staged files only — full-history scans happen in CI.

  # --- YAML syntax sanity ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: check yaml syntax
        # Ukrainian curriculum plans + activity files use multi-doc
        # YAML in a few places.
        args: [--allow-multiple-documents]
        # Exclude generated/archive dirs to keep this fast.
        exclude: |-
          (?x)^(
            data/ |
            \.venv/ |
            node_modules/ |
            scripts/_archived/ |
            starlight/node_modules/ |
            curriculum/l2-uk-en/plans/.*\.yaml\.bak$
          )
      - id: check-added-large-files
        name: block accidentally large files
        args: [--maxkb=2000]
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^(curriculum/|wiki/|docs/references/|docs/token-usage/|batch_state/|starlight/node_modules/|\.venv/)
      - id: trailing-whitespace
        exclude: ^(curriculum/|wiki/|docs/references/|batch_state/|starlight/node_modules/|\.venv/)

  # --- Local hooks (project-specific) ---
  - repo: local
    hooks:
      # Prevent accidentally adding .yaml.bak / .yaml.orig files that
      # our update_plan_activities.py / other tools create as safety
      # backups. Versioned curriculum plan snapshots are the exception:
      # they are required by the plan immutability rule.
      - id: no-yaml-backups
        name: block .yaml.bak / .yaml.orig files
        entry: >-
          bash -c 'files=$(git diff --cached --name-only --diff-filter=A |
          grep -E "\.(yaml|yml)\.(bak|orig)$" |
          grep -Ev "^curriculum/[^/]+/plans/.+\.yaml\.bak$" || true); if [ -n "$files" ]; then
          echo "ERROR: Do not commit non-plan backup files:"; echo "$files"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Plans are immutable once committed. Any staged edit must ship
      # with a bumped `version` field and a sibling `.bak` snapshot of
      # the previous content. Run this in the commit-msg stage so the
      # pipeline's escape-hatch tag is available.
      - id: check-plan-immutability
        name: enforce plan version bump + .bak
        entry: bash scripts/pre_commit/project_python.sh scripts/pre_commit/check_plan_immutability.py
        language: system
        always_run: true
        stages: [commit-msg]

      # Block bare `python3`/`python` in shell scripts we add.
      # The project's venv is always at .venv/bin/python — use that
      # instead. The existing enforce-venv.sh hook in Claude Code
      # catches this at runtime; pre-commit catches it at check-in.
      - id: no-bare-python
        name: block bare python/python3 in new scripts
        entry: >-
          bash -c 'files=$(git diff --cached --name-only --diff-filter=AM |
          grep -E "\.(sh|bash)$" || true); for f in $files; do if grep -nE
          "(^|[[:space:]])(python|python3)[[:space:]]" "$f" > /dev/null 2>&1;
          then echo "ERROR: $f uses bare python/python3, use .venv/bin/python
          instead"; grep -nE "(^|[[:space:]])(python|python3)[[:space:]]" "$f";
          exit 1; fi; done'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: check-mdx-source-parity
        name: check MDX source parity
        entry: bash scripts/pre_commit/project_python.sh scripts/audit/check_mdx_source_parity.py --files
        language: system
        files: ^starlight/src/content/docs/.*\.mdx$
        stages: [pre-commit]

      - id: lesson-schema-drift
        name: lesson schema drift gate
        entry: >-
          bash -c 'bash scripts/pre_commit/project_python.sh
          scripts/build/generate_lesson_schema.py && git diff --exit-code
          docs/lesson-schema.yaml'
        language: system
        pass_filenames: false
        files: ^(starlight/src/components/.*\.(tsx|astro)|scripts/pipeline/config_tables\.py|docs/lesson-contract\.md)$
        stages: [pre-commit]

      - id: lint-dispatch-brief-venv
        name: dispatch brief .venv worktree guardrail
        entry: >-
          bash -c 'for f in "$@"; do bash scripts/pre_commit/project_python.sh
          scripts/audit/lint_dispatch_brief.py --brief "$f" || exit $?; done' --
        language: system
        files: ^docs/dispatch-briefs/.*\.md$
        stages: [pre-commit]

      - id: lint-session-state
        name: lint session-state env references
        entry: bash scripts/pre_commit/project_python.sh scripts/audit/lint_session_state.py --all
        language: system
        pass_filenames: false
        files: ^docs/session-state/.*\.md$
        stages: [pre-commit]

      - id: lint-agent-trailer
        name: warn on commits missing an X-Agent trailer
        # Warn-only during rollout (2026-05-11). Lint reports missing trailers
        # but does NOT block the push. Flip to blocking after all in-flight
        # PRs and orchestrator inline commits adopt the trailer.
        entry: >-
          bash -c 'bash scripts/pre_commit/project_python.sh
          scripts/audit/lint_agent_trailer.py
          || echo "(warn-only — push allowed; will be blocking after rollout)"'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Dagger pre-push pytest hook REMOVED 2026-05-17 per user direction.
      # Cause: Dagger's cache_volume design accumulates pip wheels every
      # cold run (was 30 GB/run pre-#2088, ~6 GB/run post-#2088 with .venv
      # mount filter), and the resulting disk creep filled the SSD to 99%
      # twice in 12 hours. Local replay value did not justify the recurring
      # disk cost.
      #
      # Manual invocation still available:
      #
      #     bash scripts/pre_push/dagger_pytest.sh
      #
      # The script remains in-tree for ad-hoc GHA-replay debugging of a
      # CI-only failure. CI's `Test (pytest)` workflow remains the
      # canonical pre-merge gate. For local validation between pushes:
      #
      #     .venv/bin/python -m pytest <targeted-paths>
      #
      # MEMORY.md #M-7 still applies — run pytest locally before push when
      # editing .py, scripts/, tests/, .dagger/, or hardcoded test fixtures.
      # The hook automation is gone; the obligation isn't.
