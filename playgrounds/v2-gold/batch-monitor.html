<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold War Room [V6.0]</title>
  <style>
    :root {
      --bg-deep: #05070a;
      --bg-panel: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text-main: #c9d1d9;
      --text-gold: #f59e0b;
      --success: #238636;
      --danger: #da3633;
      --info: #1f6feb;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: var(--bg-deep); color: var(--text-main); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .app-layout { display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }

    .header { grid-column: 1 / -1; background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; z-index: 50; }
    .brand { display: flex; align-items: center; gap: 1rem; }
    .brand-logo { width: 32px; height: 32px; background: var(--text-gold); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
    
    .sidebar { background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; }
    .track-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin: 0.5rem; cursor: pointer; }
    .track-card.active { border-color: var(--text-gold); box-shadow: 0 0 15px rgba(245, 158, 11, 0.1); }

    .nav { background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; padding: 0 1.5rem; }
    .nav-link { padding: 1rem 1.5rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--text-main); border-bottom: 2px solid transparent; }
    .nav-link.active { color: var(--text-gold); border-color: var(--text-gold); }

    .content-tab { display: none; padding: 2rem; flex: 1; overflow-y: auto; }
    .content-tab.active { display: block; }

    /* Inspector */
    .inspector { position: fixed; top: 60px; right: -450px; width: 450px; bottom: 0; background: var(--bg-panel); border-left: 1px solid var(--border); transition: right 0.3s; z-index: 100; padding: 2rem; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
    .inspector.open { right: 0; }

    /* War Room Styles */
    .msg-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .msg-header { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: var(--font-mono); margin-bottom: 0.5rem; }
    .msg-body { font-size: 0.85rem; line-height: 1.4; color: #fff; }

    .phase-line { display: flex; gap: 1rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; }
    .phase-file { font-family: var(--font-mono); color: var(--text-gold); flex: 1; }
    .phase-type { font-size: 0.6rem; padding: 2px 4px; border-radius: 3px; background: #000; color: var(--text-secondary); }

    .btn { padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: #fff; font-size: 0.7rem; }
    .btn-gold { background: var(--text-gold); color: #000; border: none; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .gap-2 { gap: 0.5rem; }
    .gap-4 { gap: 1rem; }
    .justify-between { justify-content: space-between; }
    .items-center { align-items: center; }
  </style>
</head>
<body>

  <div class="app-layout">
    <header class="header">
      <div class="brand"><div class="brand-logo">Ж</div><div class="brand-name">WAR ROOM</div></div>
      <div id="connection-status" class="text-xs font-mono text-green">● AGENT BROKER ONLINE</div>
      <button class="btn btn-gold" onclick="refreshAll()">REFRESH ALL</button>
    </header>

    <div id="inspector" class="inspector">
      <div class="flex justify-between items-center mb-6">
        <h3 id="ins-slug" class="text-gold font-bold">Module</h3>
        <button class="btn" onclick="closeInspector()">CLOSE</button>
      </div>
      <div id="ins-body"></div>
      <div class="mt-8">
        <h4 class="text-xs font-bold text-secondary mb-4 uppercase">Orchestration Timeline</h4>
        <div id="ins-phases"></div>
      </div>
    </div>

    <aside class="sidebar">
      <div id="track-list" class="track-list"></div>
    </aside>

    <main class="main">
      <nav class="nav">
        <div class="nav-link active" onclick="switchTab(event, 'intelligence')">Intelligence</div>
        <div class="nav-link" onclick="switchTab(event, 'warroom')">War Room</div>
        <div class="nav-link" onclick="switchTab(event, 'blueprints')">Blueprints</div>
      </nav>

      <section id="tab-intelligence" class="content-tab active">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
            <div class="msg-card"><span class="text-xs text-gold font-bold">VELOCITY</span><div id="stat-progress" style="font-size: 2rem; font-weight: 800;">0%</div></div>
            <div class="msg-card"><span class="text-xs text-gold font-bold">PASS RATE</span><div id="stat-pass" style="font-size: 2rem; font-weight: 800;">0/0</div></div>
            <div class="msg-card"><span class="text-xs text-gold font-bold">ACTIVE AGENTS</span><div id="stat-active" style="font-size: 2rem; font-weight: 800;">0</div></div>
        </div>
        <div class="msg-card">
          <span class="text-xs text-gold font-bold mb-4 block">MANIFEST HEATMAP (CLICK TO INSPECT)</span>
          <div id="heatmap" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(14px, 1fr)); gap: 3px;"></div>
        </div>
      </section>

      <section id="tab-warroom" class="content-tab">
        <div id="broker-list"></div>
      </section>

      <section id="tab-blueprints" class="content-tab">
        <div id="plan-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;"></div>
      </section>
    </main>
  </div>

  <script>
    const S = { tracks: [], truth: {}, union: null, active: [], selected: null, messages: [] };
    const API = '/api/gold';

    async function req(path) {
      try { const r = await fetch(path); return r.ok ? await r.json() : null; }
      catch (e) { return null; }
    }

    async function refreshAll() {
      const [config, truth, union, active, msgs] = await Promise.all([
        req('/api/config'), req(`${API}/ground-truth`), req(`${API}/union-stats`),
        req(`${API}/active-orchestration`), req(`${API}/broker-messages`)
      ]);
      if (config) S.tracks = config.levels.map(l => l.id);
      if (truth) S.truth = truth.modules;
      if (union) S.union = union;
      if (active) S.active = active;
      if (msgs) S.messages = msgs;
      renderAll();
    }

    function renderAll() {
      renderTrackList(); renderOverview(); renderWarRoom();
    }

    function renderTrackList() {
      const container = document.getElementById('track-list');
      container.innerHTML = S.tracks.map(id => `
        <div class="track-card ${id === S.selected ? 'active' : ''}" onclick="selectTrack('${id}')">
          <div class="flex justify-between items-center">
            <span style="font-weight: bold; font-size: 0.9rem;">${id.toUpperCase()}</span>
            <span style="font-size: 0.7rem; color: var(--text-gold);">${S.union?.tracks[id]?.passed_count || 0} PASS</span>
          </div>
        </div>
      `).join('');
    }

    async function selectTrack(id) {
      S.selected = id;
      const plans = await req(`${API}/plan-details/${id}`);
      if (plans) {
        document.getElementById('plan-container').innerHTML = plans.map(p => `
          <div class="msg-card" style="opacity: ${p.status === 'unplanned' ? 0.4 : 1}; cursor:pointer" onclick="inspectModule('${id}', '${p.slug}')">
            <div style="font-weight: bold; color: var(--text-gold);">${p.title || p.slug}</div>
            <div style="font-size: 0.7rem; opacity: 0.5;">${p.slug}</div>
          </div>
        `).join('');
        switchTab({target: document.querySelectorAll('.nav-link')[2]}, 'blueprints');
      }
      renderTrackList();
    }

    function renderOverview() {
      if (!S.union) return;
      document.getElementById('stat-progress').textContent = Math.round(S.union.total_passed / S.union.total_manifest * 100) + '%';
      document.getElementById('stat-pass').textContent = `${S.union.total_passed}/${S.union.total_manifest}`;
      document.getElementById('stat-active').textContent = S.active.length;

      const hm = document.getElementById('heatmap');
      hm.innerHTML = '';
      Object.entries(S.truth).forEach(([slug, m]) => {
        const d = document.createElement('div');
        d.style.width = '14px'; d.style.height = '14px'; d.style.borderRadius = '2px';
        d.style.background = m.status === 'pass' ? 'var(--success)' : (m.status === 'fail' ? 'var(--danger)' : '#21262d');
        d.style.cursor = 'pointer';
        d.onclick = () => inspectModule(m.level, slug);
        hm.appendChild(d);
      });
    }

    function renderWarRoom() {
      const container = document.getElementById('broker-list');
      if (!S.messages.length) { container.innerHTML = '<div class="p-12 text-center opacity-30">NO ACTIVE TRANSMISSIONS</div>'; return; }
      container.innerHTML = S.messages.map(m => `
        <div class="msg-card">
          <div class="msg-header">
            <span>FROM: ${m.sender || 'AGENT'} • TYPE: ${m.type || 'SIGNAL'}</span>
            <span>${new Date(m.time).toLocaleTimeString()}</span>
          </div>
          <div class="msg-body">${m.body || m.text}</div>
          <div class="mt-2 text-[10px] opacity-30 font-mono">TASK_ID: ${m.task_id || 'N/A'}</div>
        </div>
      `).join('');
    }

    async function inspectModule(track, slug) {
      document.getElementById('ins-slug').textContent = slug;
      document.getElementById('inspector').classList.add('open');
      document.getElementById('ins-body').innerHTML = '<div class="p-4 text-center text-gold">RECOVERING DATA...</div>';
      document.getElementById('ins-phases').innerHTML = '';

      const [data, phases] = await Promise.all([
        req(`${API}/inspect/${track}/${slug}`),
        req(`${API}/orchestration/${track}/${slug}`)
      ]);

      if (data) {
        document.getElementById('ins-body').innerHTML = `
          <div class="msg-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;"><span style="font-size:0.7rem; opacity:0.5;">WORD COUNT</span><span style="font-weight:bold;">${data.word_count}</span></div>
            <div style="display:flex; justify-content:space-between;"><span style="font-size:0.7rem; opacity:0.5;">SECTIONS</span><span style="font-weight:bold;">${data.sections}</span></div>
          </div>
        `;
      }
      if (phases) {
        document.getElementById('ins-phases').innerHTML = phases.map(p => `
          <div class="phase-line">
            <span class="phase-type">${p.type}</span>
            <span class="phase-file">${p.file}</span>
            <span style="opacity:0.3;">${new Date(p.timestamp).toLocaleTimeString()}</span>
          </div>
        `).join('');
      }
    }

    function closeInspector() { document.getElementById('inspector').classList.remove('open'); }
    function switchTab(e, id) {
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.querySelectorAll('.content-tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById(`tab-${id}`).classList.add('active');
    }

    init();
  </script>
</body>
</html>
