<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold War Room [Superior Hub]</title>
  <style>
    :root {
      --bg-deep: #05070a;
      --bg-panel: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text-gold: #f59e0b;
      --claude: #f97316;
      --gemini: #3b82f6;
      --font-mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-deep); color: #c9d1d9; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    .header { background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 1rem; font-weight: 800; font-size: 1rem; color: #fff; text-transform: uppercase; }
    .brand-logo { width: 32px; height: 32px; background: var(--text-gold); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }

    .layout { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 1rem; }
    .task-group { margin-bottom: 1.5rem; }
    .task-group-title { font-size: 0.65rem; color: var(--text-gold); text-transform: uppercase; margin-bottom: 0.75rem; font-weight: 800; }
    .task-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; cursor: pointer; transition: 0.1s; }
    .task-card:hover { border-color: var(--text-gold); }
    .task-card.active { border-color: var(--text-gold); background: var(--bg-hover); }
    .task-id { font-family: var(--font-mono); font-size: 0.7rem; color: #fff; }
    .task-meta { font-size: 0.6rem; color: #8b949e; margin-top: 0.25rem; }

    /* Flow Stage */
    .chat-area { display: flex; flex-direction: column; background: var(--bg-deep); position: relative; }
    
    .flow-viz { height: 120px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 3rem; }
    .agent-node { padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; font-size: 0.8rem; border: 2px solid var(--border); }
    .agent-node.claude { border-color: var(--claude); color: var(--claude); }
    .agent-node.gemini { border-color: var(--gemini); color: var(--gemini); }
    .pulse { animation: pulse 2s infinite; }

    /* Messages */
    .messages-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .msg { display: flex; gap: 1rem; max-width: 85%; }
    .msg.claude { align-self: flex-start; }
    .msg.gemini { align-self: flex-end; flex-direction: row-reverse; }

    .avatar { width: 36px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .msg.claude .avatar { background: rgba(249, 115, 22, 0.1); border: 1px solid var(--claude); }
    .msg.gemini .avatar { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--gemini); }

    .bubble { background: var(--bg-card); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; position: relative; }
    .msg.claude .bubble { border-left: 3px solid var(--claude); }
    .msg.gemini .bubble { border-right: 3px solid var(--gemini); }

    .msg-header { display: flex; justify-content: space-between; font-size: 0.65rem; color: #8b949e; margin-bottom: 0.5rem; gap: 2rem; }
    .msg-content { font-size: 0.9rem; line-height: 1.5; color: #e6edf3; white-space: pre-wrap; }
    .type-tag { padding: 1px 4px; border-radius: 3px; font-weight: bold; background: #000; }

    .btn { padding: 0.6rem 1.2rem; border-radius: 4px; font-weight: bold; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: #fff; font-size: 0.75rem; text-decoration: none; }
    .btn-gold { background: var(--text-gold); color: #000; border: none; }

    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand"><div class="brand-logo">Ж</div><div>WAR ROOM <span style="font-size: 0.6rem; color: var(--text-gold);">v6.0</span></div></div>
    <div style="display: flex; gap: 1rem;">
      <a href="batch-monitor.html" class="btn">MISSION CONTROL</a>
      <button class="btn btn-gold" onclick="sync()">FORCE SYNC</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="task-group">
        <div class="task-group-title">Active Collaborations</div>
        <div id="task-list"></div>
      </div>
    </aside>

    <main class="chat-area">
      <div class="flow-viz">
        <div class="agent-node claude" id="node-claude">CLAUDE</div>
        <div style="font-family: var(--font-mono); font-size: 0.6rem; color: #30363d;">◀ BROKER ▶</div>
        <div class="agent-node gemini" id="node-gemini">GEMINI</div>
      </div>
      <div id="messages" class="messages-container">
        <div style="flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.2; text-transform: uppercase; letter-spacing: 0.3em;">Awaiting Transmission</div>
      </div>
    </main>
  </div>

  <script>
    let S = { messages: [], selected: null };

    async function sync() {
      const res = await fetch('/api/gold/broker-messages');
      if (res.ok) {
        S.messages = await res.json();
        renderTasks();
        if (S.selected) renderMessages();
      }
    }

    function renderTasks() {
      const tasks = [...new Set(S.messages.map(m => m.task_id).filter(Boolean))];
      const container = document.getElementById('task-list');
      container.innerHTML = tasks.map(id => {
        const last = S.messages.find(m => m.task_id === id);
        return `
          <div class="task-card ${id === S.selected ? 'active' : ''}" onclick="selectTask('${id}')">
            <div class="task-id">${id}</div>
            <div class="task-meta">LATEST: ${new Date(last.timestamp).toLocaleTimeString()}</div>
          </div>
        `;
      }).join('');
    }

    function selectTask(id) {
      S.selected = id;
      renderTasks();
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      const filtered = S.messages.filter(m => m.task_id === S.selected).reverse();
      
      container.innerHTML = filtered.map(m => {
        const agent = m.from_llm === 'claude' ? 'claude' : 'gemini';
        const icon = agent === 'claude' ? '🧡' : '💙';
        return `
          <div class="msg ${agent}">
            <div class="avatar">${icon}</div>
            <div class="bubble">
              <div class="msg-header">
                <span>${m.from_llm.toUpperCase()} ▶ ${m.to_llm.toUpperCase()}</span>
                <span class="type-tag">${m.message_type.toUpperCase()}</span>
                <span>${new Date(m.timestamp).toLocaleTimeString()}</span>
              </div>
              <div class="msg-content">${m.content}</div>
            </div>
          </div>
        `;
      }).join('');
      
      container.scrollTop = container.scrollHeight;
      
      // Update Viz
      const last = filtered[filtered.length-1];
      document.getElementById('node-claude').classList.toggle('pulse', last.from_llm === 'claude');
      document.getElementById('node-gemini').classList.toggle('pulse', last.from_llm === 'gemini');
    }

    setInterval(sync, 3000);
    sync();
  </script>
</body>
</html>
