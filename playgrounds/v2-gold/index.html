<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gold Team V2 Playgrounds</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-panel: #1e293b;
      --bg-hover: #334155;
      --border: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-gold: #fbbf24;
      --accent-gold-dim: #b45309;
      --accent-blue: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --font-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: var(--font-sans);
    }
    
    a { text-decoration: none; }

    .hero-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      max-width: 500px;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text-primary);
      transition: all 0.2s;
    }
    .nav-item:hover {
      border-color: var(--accent-gold);
      transform: translateY(-2px);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 5px var(--success);
    }
    .badge {
      display: inline-block;
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .badge-neutral { background-color: var(--bg-hover); color: var(--text-secondary); }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 0.5rem; }
  </style>
</head>
<body>
  <div class="hero-card">
    <div class="logo">👑</div>
    <h1>Gold Team Playground</h1>
    <p>High-performance monitoring & operations suite.</p>
    
    <div class="nav-list">
      <a href="batch-monitor.html" class="nav-item">
        <div class="flex items-center gap-2">
          <span>Batch Monitor</span>
          <span class="badge badge-warning">Round 1</span>
        </div>
        <div class="status-dot"></div>
      </a>
      
      <div class="nav-item" style="opacity: 0.5; cursor: not-allowed;">
        <div class="flex items-center gap-2">
          <span>Comms Hub</span>
          <span class="badge badge-neutral">Round 2</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
