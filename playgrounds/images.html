<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textbook Images - ukraine-ops</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --green: #3fb950; --blue: #58a6ff; --red: #f85149; --yellow: #d29922;
  --gray: #484f58; --purple: #bc8cff; --orange: #f0883e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { padding: 20px 24px 0; display: flex; align-items: center; gap: 16px; }
.header a { color: var(--text2); text-decoration: none; font-size: 14px; }
.header a:hover { color: var(--blue); }
.header h1 { font-size: 24px; font-weight: 700; }

/* Tabs */
.tabs { display: flex; gap: 0; margin: 16px 24px 0; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Panels */
.panel { display: none; padding: 20px 24px; }
.panel.active { display: block; }

/* Stats bar */
.stats-bar { display: flex; gap: 24px; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; font-size: 13px; }
.stats-bar .stat-item { display: flex; gap: 6px; align-items: center; }
.stats-bar .stat-value { font-weight: 600; }

/* Filters */
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
.filter-group { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 12px; color: var(--text2); text-transform: uppercase; margin-right: 4px; font-weight: 600; }
.filter-btn { padding: 4px 10px; font-size: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--blue); color: var(--text); }
.filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Gallery */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: all 0.15s; position: relative; }
.card:hover { border-color: var(--blue); transform: translateY(-1px); }
.card.tiny { border-left: 3px solid var(--red); }
.card.small { border-left: 3px solid var(--orange); }
.card.ok { border-left: 3px solid var(--green); }
.card.marked-bad { opacity: 0.4; }
.card img { width: 100%; height: 180px; object-fit: contain; background: #fff; display: block; cursor: pointer; }
.card img:hover { object-fit: cover; }
.card .info { padding: 8px; font-size: 11px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.card .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 80px; color: var(--text2); }
.card .size { font-weight: 600; }
.card .grade-badge { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 10px; }
.card .score-badge { background: var(--purple); color: #fff; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
.card .bad-btn { background: var(--red); color: #fff; border: none; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 10px; }
.card .bad-btn:hover { opacity: 0.8; }

/* Pagination */
.pagination { display: flex; gap: 8px; align-items: center; margin: 16px 0; font-size: 13px; }
.pagination button { padding: 6px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; font-size: 12px; }
.pagination button:hover { border-color: var(--blue); }
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination .page-info { color: var(--text2); }

/* Search tab */
.search-box { display: flex; gap: 8px; margin-bottom: 16px; }
.search-box input { flex: 1; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; outline: none; }
.search-box input:focus { border-color: var(--blue); }
.search-box input::placeholder { color: var(--text3); }
.search-box button { padding: 10px 20px; background: var(--blue); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
.search-box button:hover { opacity: 0.9; }
.search-box button:disabled { opacity: 0.5; cursor: default; }

.search-type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.search-type-btn { padding: 6px 14px; font-size: 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; }
.search-type-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }

.search-results-info { font-size: 13px; color: var(--text2); margin-bottom: 12px; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Bad images panel */
.bad-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 2px solid var(--red); padding: 12px 24px; transform: translateY(100%); transition: transform 0.2s; z-index: 100; max-height: 200px; overflow-y: auto; }
.bad-panel.visible { transform: translateY(0); }
.bad-panel h3 { font-size: 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: center; }
.bad-panel pre { font-size: 11px; color: var(--text2); white-space: pre-wrap; }
.bad-panel button { padding: 3px 10px; font-size: 11px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; color: var(--text); cursor: pointer; }

.bad-toggle { position: fixed; bottom: 12px; right: 24px; background: var(--red); color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; z-index: 101; border: none; }
.bad-toggle:hover { opacity: 0.9; }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; cursor: pointer; }
.lightbox.visible { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
</style>
</head>
<body>

<div class="header">
  <a href="/">&larr; Home</a>
  <h1>Textbook Images</h1>
</div>

<div class="tabs">
  <div class="tab active" data-tab="browse" onclick="switchTab('browse')">Browse</div>
  <div class="tab" data-tab="search" onclick="switchTab('search')">Search</div>
</div>

<!-- Browse Tab -->
<div class="panel active" id="panel-browse">
  <div class="stats-bar" id="browse-stats">
    <div class="loading">Loading stats...</div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Grade</span>
      <button class="filter-btn active" data-grade="" onclick="setGrade(this, '')">All</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Size</span>
      <button class="filter-btn" data-size="2000" onclick="setMaxSize(this, 2000)">Tiny &lt;2KB</button>
      <button class="filter-btn" data-size="5000" onclick="setMaxSize(this, 5000)">Small &lt;5KB</button>
      <button class="filter-btn" data-size="10000" onclick="setMaxSize(this, 10000)">Med &lt;10KB</button>
      <button class="filter-btn active" data-size="" onclick="setMaxSize(this, null)">All</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <button class="filter-btn active" data-sort="size" onclick="setSort(this, 'size')">Size</button>
      <button class="filter-btn" data-sort="name" onclick="setSort(this, 'name')">Name</button>
      <button class="filter-btn" data-sort="grade" onclick="setSort(this, 'grade')">Grade</button>
    </div>
  </div>

  <div class="pagination" id="browse-pagination-top"></div>
  <div class="gallery" id="browse-gallery">
    <div class="loading">Loading images...</div>
  </div>
  <div class="pagination" id="browse-pagination-bottom"></div>
</div>

<!-- Search Tab -->
<div class="panel" id="panel-search">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search images in Ukrainian (e.g., яблуко, буква А, тварини)..." />
    <button id="search-btn" onclick="doSearch()">Search</button>
  </div>

  <div class="search-type-toggle">
    <button class="search-type-btn active" data-type="images" onclick="setSearchType(this, 'images')">Images</button>
    <button class="search-type-btn" data-type="text" onclick="setSearchType(this, 'text')">Text</button>
    <button class="search-type-btn" data-type="literary" onclick="setSearchType(this, 'literary')">Literary</button>
  </div>

  <div class="filters" id="search-filters">
    <div class="filter-group">
      <span class="filter-label">Grade</span>
      <button class="filter-btn active" data-sgrade="" onclick="setSearchGrade(this, '')">All</button>
    </div>
  </div>

  <div class="search-results-info" id="search-info"></div>
  <div class="gallery" id="search-gallery"></div>
</div>

<!-- Bad images panel -->
<div class="bad-panel" id="bad-panel">
  <h3>
    Marked Bad (<span id="bad-count-panel">0</span>)
    <button onclick="exportBad()">Export</button>
    <button onclick="clearBad()">Clear All</button>
  </h3>
  <pre id="bad-list"></pre>
</div>
<button class="bad-toggle" id="bad-toggle" onclick="toggleBadPanel()">
  Bad: <span id="bad-count">0</span>
</button>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" />
</div>

<script>
// ── State ──────────────────────────────────────────

let browseState = { grade: '', maxSize: null, sort: 'size', page: 0, perPage: 100 };
let searchState = { type: 'images', grade: '' };
let badImages = JSON.parse(localStorage.getItem('badImages') || '[]');
let gradeButtons = [];

// ── Tab switching ──────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
}

// ── Browse filters ─────────────────────────────────

function setGrade(btn, grade) {
  browseState.grade = grade;
  browseState.page = 0;
  document.querySelectorAll('[data-grade]').forEach(b => b.classList.toggle('active', b.dataset.grade === grade));
  loadBrowse();
}

function setMaxSize(btn, size) {
  browseState.maxSize = size;
  browseState.page = 0;
  document.querySelectorAll('[data-size]').forEach(b => b.classList.toggle('active', String(b.dataset.size) === String(size || '')));
  loadBrowse();
}

function setSort(btn, sort) {
  browseState.sort = sort;
  browseState.page = 0;
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  loadBrowse();
}

function setPage(p) {
  browseState.page = p;
  loadBrowse();
  window.scrollTo(0, 0);
}

// ── Search filters ─────────────────────────────────

function setSearchType(btn, type) {
  searchState.type = type;
  document.querySelectorAll('.search-type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  // Hide grade filter for literary
  document.getElementById('search-filters').style.display = type === 'literary' ? 'none' : 'flex';
}

function setSearchGrade(btn, grade) {
  searchState.grade = grade;
  document.querySelectorAll('[data-sgrade]').forEach(b => b.classList.toggle('active', b.dataset.sgrade === grade));
}

// ── Browse loading ─────────────────────────────────

async function loadBrowse() {
  const gallery = document.getElementById('browse-gallery');
  gallery.innerHTML = '<div class="loading">Loading...</div>';

  const params = new URLSearchParams();
  if (browseState.grade) params.set('grade', browseState.grade);
  if (browseState.maxSize) params.set('max_size', browseState.maxSize);
  params.set('sort', browseState.sort);
  params.set('page', browseState.page);
  params.set('per_page', browseState.perPage);

  try {
    const res = await fetch(`/api/rag/browse_images?${params}`);
    const data = await res.json();

    // Stats
    const gs = data.grade_stats;
    const totalAll = Object.values(gs).reduce((s, g) => s + g.total, 0);
    const smallAll = Object.values(gs).reduce((s, g) => s + g.small, 0);
    const tinyAll = Object.values(gs).reduce((s, g) => s + g.tiny, 0);
    document.getElementById('browse-stats').innerHTML = `
      <div class="stat-item"><span class="stat-value">${totalAll.toLocaleString()}</span> total</div>
      <div class="stat-item"><span class="stat-value" style="color:var(--orange)">${smallAll.toLocaleString()}</span> &lt;5KB</div>
      <div class="stat-item"><span class="stat-value" style="color:var(--red)">${tinyAll.toLocaleString()}</span> &lt;2KB</div>
      <div class="stat-item">Showing <span class="stat-value">${data.total.toLocaleString()}</span> filtered</div>
    `;

    // Build grade buttons if not done
    if (gradeButtons.length === 0) {
      const gradeGroup = document.querySelector('[data-grade]').parentElement;
      for (const g of Object.keys(gs).sort()) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.grade = g;
        btn.textContent = `${g.replace('grade-', 'G')} (${gs[g].total})`;
        btn.onclick = () => setGrade(btn, g);
        gradeGroup.appendChild(btn);
        gradeButtons.push(btn);
      }
      // Also add to search tab
      const searchGradeGroup = document.querySelector('[data-sgrade]').parentElement;
      for (const g of Object.keys(gs).sort()) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.sgrade = g;
        btn.textContent = g.replace('grade-', 'G');
        btn.onclick = () => setSearchGrade(btn, g);
        searchGradeGroup.appendChild(btn);
      }
    }

    // Gallery
    gallery.innerHTML = data.images.map(img => {
      const sizeKB = (img.size / 1024).toFixed(1);
      const cls = img.size < 2000 ? 'tiny' : img.size < 5000 ? 'small' : 'ok';
      const isBad = badImages.includes(img.path);
      return `
        <div class="card ${cls}${isBad ? ' marked-bad' : ''}" data-path="${img.path}">
          <img src="/images/${img.path}" loading="lazy" onclick="openLightbox('/images/${img.path}')" alt="${img.name}" />
          <div class="info">
            <span class="name" title="${img.name}">${img.name}</span>
            <span class="size" style="color:var(--${cls === 'tiny' ? 'red' : cls === 'small' ? 'orange' : 'green'})">${sizeKB} KB</span>
            <span class="grade-badge">${img.grade.replace('grade-', 'G')}</span>
            <button class="bad-btn" onclick="markBad('${img.path}')">Bad</button>
          </div>
        </div>`;
    }).join('');

    // Pagination
    const pagHTML = `
      <button onclick="setPage(${data.page - 1})" ${data.page <= 0 ? 'disabled' : ''}>&laquo; Prev</button>
      <span class="page-info">Page ${data.page + 1} / ${data.total_pages} (${data.total.toLocaleString()} images)</span>
      <button onclick="setPage(${data.page + 1})" ${data.page + 1 >= data.total_pages ? 'disabled' : ''}>Next &raquo;</button>
    `;
    document.getElementById('browse-pagination-top').innerHTML = pagHTML;
    document.getElementById('browse-pagination-bottom').innerHTML = pagHTML;

  } catch (e) {
    gallery.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

// ── Search ─────────────────────────────────────────

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  const gallery = document.getElementById('search-gallery');
  gallery.innerHTML = '<div class="loading">Searching RAG...</div>';
  const info = document.getElementById('search-info');

  const params = new URLSearchParams({ q, limit: '20' });

  // Map grade-NN to integer for RAG search
  if (searchState.grade) {
    const gradeNum = parseInt(searchState.grade.replace('grade-', ''), 10);
    if (!isNaN(gradeNum)) params.set('grade', gradeNum);
  }

  const endpoint = `/api/rag/search_${searchState.type}`;

  try {
    const res = await fetch(`${endpoint}?${params}`);
    if (res.status === 503) {
      gallery.innerHTML = '<div class="loading" style="color:var(--red)">Qdrant unavailable. Start with: docker start qdrant</div>';
      info.textContent = '';
      return;
    }
    const data = await res.json();
    const results = Array.isArray(data) ? data : [];

    info.textContent = `${results.length} results for "${q}" (${searchState.type})`;

    if (searchState.type === 'images') {
      gallery.innerHTML = results.map(hit => `
        <div class="card ok">
          <img src="/images/${hit.image_path}" loading="lazy" onclick="openLightbox('/images/${hit.image_path}')" alt="${hit.image_id}" />
          <div class="info">
            <span class="name" title="${hit.image_id}">${hit.image_id}</span>
            <span class="score-badge">${hit.score.toFixed(3)}</span>
            <span class="grade-badge">G${hit.grade}</span>
            <span class="size">${hit.width}x${hit.height}</span>
          </div>
        </div>`).join('') || '<div class="loading">No results</div>';
    } else {
      // Text or literary results
      gallery.innerHTML = '';
      const container = document.createElement('div');
      container.style.cssText = 'display:flex;flex-direction:column;gap:12px;';
      for (const hit of results) {
        const card = document.createElement('div');
        card.style.cssText = 'background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;';
        const meta = searchState.type === 'literary'
          ? `<span style="color:var(--purple)">${hit.work || ''}</span> &middot; ${hit.genre || ''} &middot; ${hit.language_period || ''}`
          : `Grade ${hit.grade || '?'} &middot; ${hit.section_title || ''} &middot; ${hit.author || ''}`;
        card.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div style="font-size:12px;color:var(--text2)">${meta}</div>
            <span class="score-badge">${hit.score.toFixed(3)}</span>
          </div>
          <div style="font-size:13px;line-height:1.5;color:var(--text);white-space:pre-wrap;">${escapeHtml(hit.text || '')}</div>
        `;
        container.appendChild(card);
      }
      gallery.appendChild(container);
      if (results.length === 0) gallery.innerHTML = '<div class="loading">No results</div>';
    }
  } catch (e) {
    gallery.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`;
    info.textContent = '';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Search on Enter
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── Bad images management ──────────────────────────

function markBad(path) {
  if (!badImages.includes(path)) {
    badImages.push(path);
    localStorage.setItem('badImages', JSON.stringify(badImages));
    updateBadUI();
    // Dim the card
    const card = document.querySelector(`[data-path="${path}"]`);
    if (card) card.classList.add('marked-bad');
  }
}

function updateBadUI() {
  document.getElementById('bad-count').textContent = badImages.length;
  document.getElementById('bad-count-panel').textContent = badImages.length;
  document.getElementById('bad-list').textContent = badImages.join('\n');
}

function toggleBadPanel() {
  document.getElementById('bad-panel').classList.toggle('visible');
}

function exportBad() {
  const blob = new Blob([badImages.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bad-images.txt';
  a.click();
}

function clearBad() {
  if (confirm('Clear all marked images?')) {
    badImages = [];
    localStorage.setItem('badImages', JSON.stringify(badImages));
    updateBadUI();
    document.querySelectorAll('.marked-bad').forEach(c => c.classList.remove('marked-bad'));
  }
}

// ── Lightbox ───────────────────────────────────────

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('visible');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('visible');
  document.getElementById('lightbox-img').src = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ── Init ───────────────────────────────────────────

updateBadUI();
loadBrowse();
</script>
</body>
</html>
