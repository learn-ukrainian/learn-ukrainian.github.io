<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost - ukraine-ops</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --red: #f85149; --green: #3fb950; --blue: #58a6ff; --yellow: #d29922;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--blue); text-decoration: none; }
.topbar { display: flex; gap: 14px; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; }
.topbar h1 { font-size: 22px; }
.sub { font-size: 12px; color: var(--text2); }
.spacer { flex: 1; }
.btn, select, input { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12px; }
.btn { cursor: pointer; }
.btn.active, .btn:hover { border-color: var(--red); color: var(--red); }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; gap: 16px; }
.controls, .card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--red); border-radius: 10px; padding: 18px; }
.controls { display: grid; gap: 12px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.muted { color: var(--text2); font-size: 12px; }
.summary { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.stat { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.stat .label { color: var(--text2); font-size: 12px; text-transform: uppercase; }
.stat .value { font-size: 28px; font-weight: 700; margin: 8px 0; }
.grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { color: var(--text2); font-size: 11px; text-transform: uppercase; }
.banner { display: none; padding: 10px 12px; border-radius: 8px; background: rgba(248,81,73,0.15); border: 1px solid rgba(248,81,73,0.35); color: var(--red); }
.list { display: grid; gap: 8px; font-size: 13px; }
.empty { color: var(--text2); font-size: 13px; }
@media (max-width: 720px) { .topbar { flex-wrap: wrap; } }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>Cost</h1>
    <div class="sub">Estimated token usage and USD spend from dispatch meta logs</div>
  </div>
  <div class="spacer"></div>
  <a href="/">Home</a>
</div>

<div class="container">
  <section class="controls">
    <div class="row">
      <select id="scope">
        <option value="all">All</option>
        <option value="track">Track</option>
        <option value="module">Module</option>
        <option value="phase">Phase</option>
      </select>
      <input id="query" placeholder="a1 or a1/my-family or write" size="28">
      <button class="btn" onclick="refresh()">Refresh</button>
      <span class="muted" id="scope-label">Scope: all</span>
    </div>
    <div class="row">
      <button class="btn active" data-window="all_time" onclick="setWindow('all_time')">All-time</button>
      <button class="btn" data-window="last_7_days" onclick="setWindow('last_7_days')">Last 7 days</button>
      <button class="btn" data-window="last_30_days" onclick="setWindow('last_30_days')">Last 30 days</button>
      <span class="muted" id="last-refresh">Waiting for data...</span>
    </div>
    <div class="banner" id="banner"></div>
  </section>

  <section class="summary" id="summary"></section>

  <section class="grid">
    <div class="card">
      <div class="row" style="justify-content:space-between"><h2>Per-Phase</h2><span class="muted">Current window</span></div>
      <div id="per-phase" class="empty">Loading...</div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between"><h2>Per-Model</h2><span class="muted">Current window</span></div>
      <div id="per-model" class="empty">Loading...</div>
    </div>
  </section>

  <section class="grid">
    <div class="card">
      <div class="row" style="justify-content:space-between"><h2>Top Modules</h2><span class="muted">Top 10 by est. cost</span></div>
      <div id="top-modules" class="empty">Loading...</div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between"><h2>Warnings</h2><span class="muted">Legacy gaps and prompt bloat</span></div>
      <div id="warnings" class="empty">Loading...</div>
    </div>
  </section>
</div>

<script>
const API_TIMEOUT_MS = 5000;
let activeWindow = 'all_time';

function esc(value) {
  const node = document.createElement('span');
  node.textContent = value == null ? '' : String(value);
  return node.innerHTML;
}

function fmtInt(value) { return Number(value || 0).toLocaleString(); }
function fmtCost(value) { return `~$${Number(value || 0).toFixed(2)}`; }

async function fetchJson(url) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
  try {
    const res = await fetch(url, { signal: controller.signal });
    const text = await res.text();
    const data = text ? JSON.parse(text) : {};
    if (!res.ok) throw new Error(data.detail || data.error || `HTTP ${res.status}`);
    return data;
  } finally {
    clearTimeout(timeout);
  }
}

function buildUrl() {
  const scope = document.getElementById('scope').value;
  const query = document.getElementById('query').value.trim();
  if (scope === 'track' && query) return `/api/analytics/cost?track=${encodeURIComponent(query)}`;
  if (scope === 'module' && query.includes('/')) {
    const [level, slug] = query.split('/', 2);
    return `/api/analytics/cost/module/${encodeURIComponent(level)}/${encodeURIComponent(slug)}`;
  }
  if (scope === 'phase' && query) return `/api/analytics/cost/phase/${encodeURIComponent(query)}`;
  return '/api/analytics/cost';
}

function setBanner(message) {
  const el = document.getElementById('banner');
  el.textContent = message || '';
  el.style.display = message ? 'block' : 'none';
}

function renderTable(targetId, rows) {
  const target = document.getElementById(targetId);
  if (!rows.length) {
    target.innerHTML = '<div class="empty">No data for this window</div>';
    return;
  }
  target.innerHTML = `<table><thead><tr><th>Name</th><th>Calls</th><th>Prompt est.</th><th>Output est.</th><th>USD est.</th></tr></thead><tbody>${
    rows.map(row => `<tr><td>${esc(row.name)}</td><td>${row.calls}</td><td>${fmtInt(row.prompt_tokens_est)}</td><td>${fmtInt(row.response_tokens_est)}</td><td>${fmtCost(row.cost_usd_est)}</td></tr>`).join('')
  }</tbody></table>`;
}

function renderWarnings(windowData) {
  const items = [...(windowData.warnings || []), ...(windowData.prompt_bloat_watch || []).map(item =>
    `${item.phase}: median prompt_chars=${fmtInt(item.median_prompt_chars)} across ${item.calls} call(s)`)];
  document.getElementById('warnings').innerHTML = items.length
    ? `<div class="list">${items.map(item => `<div>${esc(item)}</div>`).join('')}</div>`
    : '<div class="empty">No warnings in this window</div>';
}

function renderSummary(payload) {
  const windows = payload.windows || {};
  document.getElementById('summary').innerHTML = Object.entries(windows).map(([key, data]) => {
    const totals = data.totals || {};
    const active = key === activeWindow ? ' style="border-color:var(--red)"' : '';
    const label = key === 'all_time' ? 'All-time' : key === 'last_7_days' ? 'Last 7 days' : 'Last 30 days';
    return `<div class="stat"${active}>
      <div class="label">${label}</div>
      <div class="value">${fmtCost(totals.cost_usd_est)}</div>
      <div class="muted">${fmtInt(totals.prompt_tokens_est)} prompt est. · ${fmtInt(totals.response_tokens_est)} output est.</div>
      <div class="muted">${totals.calls || 0} call(s)</div>
    </div>`;
  }).join('');
}

function renderWindow(payload) {
  const data = payload.windows?.[activeWindow] || { totals: {}, per_phase: [], per_model: [], top_modules: [], warnings: [] };
  document.getElementById('scope-label').textContent = `Scope: ${data.scope?.label || 'all'}`;
  renderTable('per-phase', data.per_phase || []);
  renderTable('per-model', data.per_model || []);
  renderTable('top-modules', data.top_modules || []);
  renderWarnings(data);
}

function setWindow(name) {
  activeWindow = name;
  document.querySelectorAll('[data-window]').forEach(btn => btn.classList.toggle('active', btn.dataset.window === name));
  if (window.__costPayload) renderWindow(window.__costPayload);
}

async function refresh() {
  try {
    const payload = await fetchJson(buildUrl());
    window.__costPayload = payload;
    renderSummary(payload);
    renderWindow(payload);
    setBanner('');
    document.getElementById('last-refresh').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (error) {
    setBanner(error.message);
    document.getElementById('summary').innerHTML = '';
    ['per-phase', 'per-model', 'top-modules', 'warnings'].forEach(id => {
      document.getElementById(id).innerHTML = '<div class="empty">Unavailable</div>';
    });
  }
}

document.getElementById('scope').addEventListener('change', refresh);
document.getElementById('query').addEventListener('keydown', event => {
  if (event.key === 'Enter') refresh();
});

refresh();
</script>
</body>
</html>
