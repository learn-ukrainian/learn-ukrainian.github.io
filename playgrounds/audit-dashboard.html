<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Dashboard - ukraine-ops</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --green: #3fb950; --blue: #58a6ff; --red: #f85149; --yellow: #d29922;
  --gray: #484f58; --purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Top bar */
.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar .nav { margin-left: auto; display: flex; gap: 12px; font-size: 13px; }
.topbar .nav a { color: var(--text2); }
.topbar .nav a:hover { color: var(--text); }

/* Stats bar */
.stats-bar { display: flex; gap: 24px; padding: 16px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.stat-card { text-align: center; min-width: 100px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; }
.stat-card.pass .value { color: var(--green); }
.stat-card.prose .value { color: var(--blue); }
.stat-card.fail .value { color: var(--red); }
.stat-card.total .value { color: var(--text); }

/* Track grid */
.tracks { padding: 16px 24px; }
.track-row { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.track-header { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; user-select: none; gap: 16px; }
.track-header:hover { background: var(--bg3); }
.track-name { font-weight: 600; font-size: 14px; min-width: 200px; }
.track-count { color: var(--text2); font-size: 13px; min-width: 80px; }
.track-bar { flex: 1; height: 20px; background: var(--bg); border-radius: 4px; display: flex; overflow: hidden; min-width: 200px; }
.track-bar .seg { height: 100%; transition: width 0.3s; }
.track-bar .seg.pass { background: var(--green); }
.track-bar .seg.prose { background: var(--blue); }
.track-bar .seg.fail { background: var(--red); }
.track-bar .seg.unaudited { background: var(--yellow); }
.track-bar .seg.missing { background: var(--gray); }
.track-pct { font-size: 14px; font-weight: 600; min-width: 50px; text-align: right; }
.track-chevron { color: var(--text3); font-size: 12px; transition: transform 0.2s; }
.track-row.expanded .track-chevron { transform: rotate(90deg); }

/* Module grid */
.module-grid { padding: 8px 16px 16px; display: none; }
.track-row.expanded .module-grid { display: block; }
.module-cells { display: flex; flex-wrap: wrap; gap: 4px; }
.module-cell { width: 28px; height: 28px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--bg); transition: transform 0.1s; position: relative; }
.module-cell:hover { transform: scale(1.3); z-index: 1; }
.module-cell.pass { background: var(--green); }
.module-cell.content-complete { background: var(--blue); }
.module-cell.fail { background: var(--red); }
.module-cell.unaudited { background: var(--yellow); }
.module-cell.missing { background: var(--gray); color: var(--text3); }

/* Side panel */
.side-panel { position: fixed; top: 0; right: -480px; width: 480px; height: 100vh; background: var(--bg2); border-left: 1px solid var(--border); transition: right 0.3s; z-index: 100; overflow-y: auto; padding: 24px; }
.side-panel.open { right: 0; }
.side-panel .close-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
.side-panel .close-btn:hover { color: var(--text); }
.side-panel h2 { font-size: 18px; margin-bottom: 4px; }
.side-panel .track-label { color: var(--text2); font-size: 13px; margin-bottom: 16px; }
.side-panel .status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.side-panel .status-badge.pass { background: rgba(63,185,80,0.2); color: var(--green); }
.side-panel .status-badge.content-complete { background: rgba(88,166,255,0.2); color: var(--blue); }
.side-panel .status-badge.fail { background: rgba(248,81,73,0.2); color: var(--red); }
.side-panel .status-badge.unaudited { background: rgba(210,153,34,0.2); color: var(--yellow); }
.side-panel .status-badge.missing { background: rgba(72,79,88,0.2); color: var(--text3); }

.gate-list { margin-top: 16px; }
.gate-item { display: flex; align-items: center; padding: 8px 12px; border-radius: 6px; background: var(--bg); margin-bottom: 4px; gap: 10px; }
.gate-icon { width: 20px; font-size: 14px; text-align: center; }
.gate-name { font-size: 13px; font-weight: 600; min-width: 100px; }
.gate-msg { font-size: 12px; color: var(--text2); flex: 1; }

.word-bar-container { margin-top: 16px; }
.word-bar-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.word-bar { height: 24px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
.word-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.word-bar-text { position: absolute; top: 0; left: 8px; line-height: 24px; font-size: 12px; font-weight: 600; }

.files-grid { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.file-item { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 8px; background: var(--bg); border-radius: 4px; }
.file-dot { width: 8px; height: 8px; border-radius: 50%; }
.file-dot.yes { background: var(--green); }
.file-dot.no { background: var(--red); }

.meta-info { margin-top: 16px; font-size: 12px; color: var(--text3); }

/* Legend */
.legend { display: flex; gap: 16px; padding: 12px 24px; font-size: 12px; color: var(--text2); border-top: 1px solid var(--border); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* Refresh indicator */
.refresh-indicator { font-size: 11px; color: var(--text3); }

/* Overlay */
.overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
.overlay.open { display: block; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--text2); }
.loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Tooltip */
.tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; }
.module-cell:hover .tooltip { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Audit Dashboard</h1>
  <span class="refresh-indicator" id="refresh-info"></span>
  <div class="nav">
    <a href="/">Home</a>
    <a href="/pipeline-dashboard.html">Pipeline</a>
    <a href="/curriculum-dashboard.html">Curriculum</a>
    <a href="/activity-explorer.html">Activities</a>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="tracks" id="tracks">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Pass</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Content Complete (prose only)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Fail</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Unaudited</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gray)"></div> Missing</div>
</div>

<div class="overlay" id="overlay"></div>
<div class="side-panel" id="side-panel">
  <button class="close-btn" id="close-panel">&times;</button>
  <div id="panel-content"></div>
</div>

<script>
const API = '/api/dashboard';
let overviewData = null;
let trackCache = {};

// ==================== DATA FETCHING ====================

async function fetchOverview() {
  const res = await fetch(`${API}/overview`);
  overviewData = await res.json();
  renderStatsBar(overviewData.totals);
  renderTracks(overviewData.tracks);
  document.getElementById('refresh-info').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
}

async function fetchTrackDetail(trackId) {
  if (trackCache[trackId]) return trackCache[trackId];
  const res = await fetch(`${API}/track/${trackId}`);
  const data = await res.json();
  trackCache[trackId] = data;
  return data;
}

async function fetchModuleDetail(trackId, slug) {
  const res = await fetch(`${API}/module/${trackId}/${slug}`);
  return await res.json();
}

// ==================== RENDERING ====================

function renderStatsBar(totals) {
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-card total"><div class="value">${totals.total}</div><div class="label">Total Modules</div></div>
    <div class="stat-card pass"><div class="value">${totals.pass}</div><div class="label">Passing</div></div>
    <div class="stat-card prose"><div class="value">${totals.content_complete}</div><div class="label">Content Complete</div></div>
    <div class="stat-card fail"><div class="value">${totals.fail}</div><div class="label">Failing</div></div>
    <div class="stat-card"><div class="value" style="color:var(--yellow)">${totals.unaudited}</div><div class="label">Unaudited</div></div>
    <div class="stat-card"><div class="value" style="color:var(--gray)">${totals.missing}</div><div class="label">Missing</div></div>
    <div class="stat-card"><div class="value" style="color:var(--purple)">${totals.total > 0 ? Math.round(totals.pass / totals.total * 100) : 0}%</div><div class="label">Complete</div></div>
  `;
}

function renderTracks(tracks) {
  const container = document.getElementById('tracks');
  container.innerHTML = tracks.map(t => {
    const total = t.module_count;
    const s = t.stats;
    const segments = [
      { cls: 'pass', w: s.pass / total * 100 },
      { cls: 'prose', w: s.content_complete / total * 100 },
      { cls: 'fail', w: s.fail / total * 100 },
      { cls: 'unaudited', w: s.unaudited / total * 100 },
      { cls: 'missing', w: s.missing / total * 100 },
    ].filter(seg => seg.w > 0);

    return `
      <div class="track-row" data-track="${t.id}">
        <div class="track-header" onclick="toggleTrack('${t.id}')">
          <span class="track-chevron">&#9654;</span>
          <span class="track-name">${t.name}</span>
          <span class="track-count">${total} modules</span>
          <div class="track-bar">
            ${segments.map(seg => `<div class="seg ${seg.cls}" style="width:${seg.w}%"></div>`).join('')}
          </div>
          <span class="track-pct">${t.pct_complete}%</span>
        </div>
        <div class="module-grid" id="grid-${t.id}"></div>
      </div>
    `;
  }).join('');
}

async function toggleTrack(trackId) {
  const row = document.querySelector(`.track-row[data-track="${trackId}"]`);
  const grid = document.getElementById(`grid-${trackId}`);

  if (row.classList.contains('expanded')) {
    row.classList.remove('expanded');
    return;
  }

  row.classList.add('expanded');

  if (grid.children.length === 0) {
    grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const data = await fetchTrackDetail(trackId);
    renderModuleGrid(grid, data, trackId);
  }
}

function renderModuleGrid(container, data, trackId) {
  const cells = data.modules.map(m => {
    const cls = m.status === 'content-complete' ? 'content-complete' : m.status;
    return `
      <div class="module-cell ${cls}" onclick="openModule('${trackId}','${m.slug}')" title="${m.slug}">
        ${m.num}
        <div class="tooltip">${m.slug} (${m.status})</div>
      </div>
    `;
  }).join('');

  container.innerHTML = `<div class="module-cells">${cells}</div>`;
}

async function openModule(trackId, slug) {
  const panel = document.getElementById('side-panel');
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('panel-content');

  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  panel.classList.add('open');
  overlay.classList.add('open');

  const m = await fetchModuleDetail(trackId, slug);
  renderModulePanel(content, m);
}

function renderModulePanel(container, m) {
  const status = m.status?.overall?.status || 'unknown';
  const statusCls = status === 'content-complete' ? 'content-complete' : status;
  const gates = m.status?.gates || {};
  const gateNames = ['meta', 'structure', 'lesson', 'activities', 'vocabulary', 'naturalness', 'ipa', 'review'];

  let gateHtml = gateNames.map(name => {
    const g = gates[name];
    if (!g) return '';
    const icon = g.status === 'pass' ? '<span style="color:var(--green)">&#10004;</span>'
               : g.status === 'fail' ? '<span style="color:var(--red)">&#10008;</span>'
               : g.status === 'deferred' ? '<span style="color:var(--blue)">&#9203;</span>'
               : '<span style="color:var(--yellow)">&#9679;</span>';
    return `
      <div class="gate-item">
        <div class="gate-icon">${icon}</div>
        <div class="gate-name">${name}</div>
        <div class="gate-msg">${g.message || g.status || ''}</div>
      </div>
    `;
  }).join('');

  // Word count bar
  const wc = m.lesson?.word_count || 0;
  const wt = m.plan?.word_target || 0;
  const pct = wt > 0 ? Math.min(wc / wt * 100, 100) : 0;
  const barColor = pct >= 100 ? 'var(--green)' : pct >= 80 ? 'var(--yellow)' : 'var(--red)';

  // Files
  const files = [
    { name: 'Plan', exists: !!m.plan },
    { name: 'Meta', exists: !!m.meta },
    { name: 'Lesson', exists: !!m.lesson },
    { name: 'Activities', exists: !!m.activities },
  ];

  // Activities summary
  let actHtml = '';
  if (m.activities) {
    actHtml = `
      <div style="margin-top:16px">
        <div class="word-bar-label">Activities: ${m.activities.count} (${m.activities.unique_types.length} types)</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
          ${m.activities.types.map(t => `<span style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:11px;">${t}</span>`).join('')}
        </div>
      </div>
    `;
  }

  // Orchestration
  let orchHtml = '';
  if (m.orchestration && m.orchestration.length > 0) {
    orchHtml = `
      <div style="margin-top:16px">
        <div class="word-bar-label">Orchestration Phases (${m.orchestration.length} files)</div>
        <div style="max-height:200px;overflow-y:auto;margin-top:4px;">
          ${m.orchestration.map(p => `
            <div style="font-size:11px;padding:2px 0;color:var(--text2);">
              ${p.file} <span style="color:var(--text3)">(${(p.size/1024).toFixed(1)}KB)</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <h2>${m.slug}</h2>
    <div class="track-label">${m.track} &middot; Module</div>
    <span class="status-badge ${statusCls}">${status}</span>

    <div class="word-bar-container">
      <div class="word-bar-label">Word Count: ${wc.toLocaleString()} / ${wt.toLocaleString()}</div>
      <div class="word-bar">
        <div class="word-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        <div class="word-bar-text">${Math.round(pct)}%</div>
      </div>
    </div>

    <div class="gate-list">${gateHtml}</div>

    <div class="files-grid">
      ${files.map(f => `
        <div class="file-item">
          <div class="file-dot ${f.exists ? 'yes' : 'no'}"></div>
          ${f.name}
        </div>
      `).join('')}
    </div>

    ${actHtml}
    ${orchHtml}

    <div class="meta-info">
      ${m.lesson?.last_modified ? `Last modified: ${new Date(m.lesson.last_modified).toLocaleString()}` : ''}
    </div>
  `;
}

// ==================== EVENTS ====================

document.getElementById('close-panel').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// ==================== INIT ====================

fetchOverview();
setInterval(() => {
  trackCache = {};
  fetchOverview();
}, 30000);
</script>
</body>
</html>
