<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Quality Dashboard</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --green: #3fb950; --blue: #58a6ff; --red: #f85149; --yellow: #d29922;
  --gray: #484f58; --purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar .nav { margin-left: auto; display: flex; gap: 12px; font-size: 13px; }
.topbar .nav a { color: var(--text2); text-decoration: none; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Stats */
.stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 24px; text-align: center; min-width: 120px; }
.stat .num { font-size: 32px; font-weight: 700; }
.stat .label { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-top: 4px; }

/* Track selector */
.track-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.track-tab { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; }
.track-tab:hover { border-color: var(--blue); color: var(--text); }
.track-tab.active { background: var(--blue); color: #000; font-weight: 600; }

/* Module table */
.module-table { width: 100%; border-collapse: collapse; }
.module-table th { text-align: left; padding: 8px 12px; font-size: 11px; color: var(--text3); text-transform: uppercase; border-bottom: 2px solid var(--border); }
.module-table td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
.module-table tr:hover { background: var(--bg3); cursor: pointer; }
.module-table tr.shippable { background: rgba(63,185,80,0.05); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-fail { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-warn { background: rgba(210,153,34,0.15); color: var(--yellow); }
.badge-ship { background: rgba(63,185,80,0.3); color: var(--green); }
.badge-info { background: rgba(88,166,255,0.15); color: var(--blue); }

/* Side panel */
.overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10; }
.overlay.open { display: block; }
.panel { position: fixed; top: 0; right: -500px; width: 500px; height: 100vh; background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; z-index: 11; transition: right 0.2s; padding: 24px; }
.panel.open { right: 0; }
.panel h2 { font-size: 16px; margin-bottom: 12px; }
.panel .close { position: absolute; top: 12px; right: 16px; font-size: 20px; cursor: pointer; color: var(--text2); }
.gate { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.gate .icon { width: 16px; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Module Quality Dashboard</h1>
  <div class="nav">
    <a href="/track-health.html">Track Health</a>
    <a href="/docs">API Docs</a>
    <span id="refresh-info" style="color:var(--text3);font-size:11px;"></span>
  </div>
</div>

<div class="container">
  <div class="stats" id="stats"></div>
  <div class="track-tabs" id="track-tabs"></div>
  <table class="module-table" id="module-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Module</th>
        <th>Audit</th>
        <th>Review</th>
        <th>Status</th>
        <th>Words</th>
        <th>Blocking</th>
      </tr>
    </thead>
    <tbody id="module-rows"></tbody>
  </table>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <span class="close" onclick="closePanel()">&times;</span>
  <div id="panel-content"></div>
</div>

<script>
const API_DASH = '/api/dashboard';
const API_STATE = '/api/state';
let currentTrack = null;

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  let data = null;
  try {
    data = await res.json();
  } catch (e) {}
  if (!res.ok) {
    throw new Error(data?.detail || data?.error || `HTTP ${res.status}`);
  }
  return data;
}

async function init() {
  const data = await fetchJson(`${API_DASH}/overview`);
  renderStats(data.totals);
  renderTrackTabs(data.tracks);
  // Auto-select a1
  selectTrack('a1');
  document.getElementById('refresh-info').textContent = new Date().toLocaleTimeString();
}

function renderStats(t) {
  const el = document.getElementById('stats');
  el.innerHTML = `
    <div class="stat"><div class="num" style="color:var(--green)">${t.shippable || 0}</div><div class="label">Shippable</div></div>
    <div class="stat"><div class="num" style="color:var(--blue)">${t.pass}</div><div class="label">Audit Pass</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${t.fail}</div><div class="label">Failing</div></div>
    <div class="stat"><div class="num" style="color:var(--text)">${t.total}</div><div class="label">Total</div></div>
    <div class="stat"><div class="num" style="color:var(--purple)">${t.total > 0 ? Math.round((t.shippable||0)/t.total*100) : 0}%</div><div class="label">Ship Rate</div></div>
  `;
}

function renderTrackTabs(tracks) {
  const el = document.getElementById('track-tabs');
  el.innerHTML = tracks.map(t =>
    `<div class="track-tab" data-track="${t.id}" onclick="selectTrack('${t.id}')">${t.name} <span style="color:var(--text3)">${t.module_count}</span></div>`
  ).join('');
}

async function selectTrack(trackId) {
  currentTrack = trackId;
  document.querySelectorAll('.track-tab').forEach(t => t.classList.toggle('active', t.dataset.track === trackId));

  const tbody = document.getElementById('module-rows');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Loading...</td></tr>';

  try {
    const data = await fetchJson(`${API_DASH}/track/${trackId}/summary`);
    renderModules(data.modules, trackId);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" style="color:var(--red);padding:16px">Error: ${e.message}</td></tr>`;
  }
}

function renderModules(modules, trackId) {
  const tbody = document.getElementById('module-rows');
  tbody.innerHTML = modules.map(m => {
    const auditPass = m.status === 'pass';
    const reviewScore = m.review_score;
    const shippable = m.shippable;
    const wc = m.word_count || 0;
    const wt = m.word_target || 0;

    // Audit badge
    const auditBadge = auditPass
      ? '<span class="badge badge-pass">PASS</span>'
      : m.status === 'missing' ? '<span class="badge badge-info">—</span>'
      : `<span class="badge badge-fail">FAIL</span>`;

    // Review badge
    let reviewBadge = '<span style="color:var(--text3)">—</span>';
    if (reviewScore != null) {
      const color = reviewScore >= 8 ? 'badge-pass' : reviewScore >= 7 ? 'badge-warn' : 'badge-fail';
      reviewBadge = `<span class="badge ${color}">${reviewScore}/10</span>`;
    }

    // Status
    const statusBadge = shippable
      ? '<span class="badge badge-ship">SHIPPABLE</span>'
      : auditPass && reviewScore >= 8 ? '<span class="badge badge-ship">SHIPPABLE</span>'
      : auditPass ? '<span class="badge badge-warn">NEEDS REVIEW</span>'
      : '<span class="badge badge-fail">BLOCKED</span>';

    // Words
    const wordPct = wt > 0 ? Math.round(wc/wt*100) : 0;
    const wordColor = wordPct >= 100 ? 'var(--green)' : wordPct >= 80 ? 'var(--yellow)' : 'var(--text3)';

    // Blocking reason (first one)
    let blocking = '';
    if (!auditPass && m.gates) {
      const failGate = Object.entries(m.gates).find(([k,v]) => v.status === 'fail');
      if (failGate) blocking = `${failGate[0]}: ${(failGate[1].message||'').substring(0,40)}`;
    }
    if (reviewScore != null && reviewScore < 8) {
      blocking = blocking ? blocking : `review: ${reviewScore}/10`;
    }

    const rowCls = shippable ? 'shippable' : '';

    return `<tr class="${rowCls}" onclick="openModule('${trackId}','${m.slug}',${m.num || 0})">
      <td>${m.num || '?'}</td>
      <td><strong>${m.slug}</strong></td>
      <td>${auditBadge}</td>
      <td>${reviewBadge}</td>
      <td>${statusBadge}</td>
      <td><span style="color:${wordColor}">${wc ? wc.toLocaleString() : '—'}</span></td>
      <td style="font-size:11px;color:var(--text3)">${blocking}</td>
    </tr>`;
  }).join('');
}

async function openModule(trackId, slug, num) {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('panel-content');
  content.innerHTML = '<div style="padding:24px;color:var(--text3)">Loading...</div>';
  panel.classList.add('open');
  overlay.classList.add('open');

  try {
    const [dashData, stateData] = await Promise.all([
      fetchJson(`${API_DASH}/module/${trackId}/${slug}`),
      num > 0 ? fetchJson(`${API_STATE}/module/${trackId}/${num}`).catch(() => null) : null,
    ]);
    renderPanel(content, dashData, stateData);
  } catch(e) {
    content.innerHTML = `<div style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

function renderPanel(el, m, s) {
  const status = m.status?.overall?.status || m.status || 'unknown';
  const gates = m.status?.gates || {};
  const reviewScore = m.review_score;
  const shippable = m.shippable;

  // Gates
  const gateNames = ['meta','lesson','activities','vocabulary','pedagogy','engagement','immersion','structure','lint','naturalness','research'];
  const gatesHtml = gateNames.map(name => {
    const g = gates[name];
    if (!g) return '';
    const icon = g.status === 'pass' ? '✅' : g.status === 'fail' ? '❌' : g.status === 'info' ? 'ℹ️' : '⚠️';
    return `<div class="gate"><span class="icon">${icon}</span><strong>${name}</strong> <span style="color:var(--text3)">${(g.message||'').substring(0,60)}</span></div>`;
  }).join('');

  // Review
  let reviewHtml = '';
  if (reviewScore != null) {
    const c = reviewScore >= 8 ? 'var(--green)' : reviewScore >= 7 ? 'var(--yellow)' : 'var(--red)';
    reviewHtml = `<div style="margin:12px 0"><span style="font-size:24px;font-weight:700;color:${c}">${reviewScore}/10</span> <span style="color:var(--text2)">Review Score</span></div>`;
  }

  // Friction
  let frictionHtml = '';
  if (s && s.friction) {
    const f = s.friction;
    if (f.active > 0) {
      frictionHtml = `<div style="margin:8px 0;font-size:12px;color:var(--yellow)">Frictions: ${f.active} active</div>`;
      frictionHtml += f.items.map(i => `<div style="font-size:11px;color:var(--text3);padding:2px 0">• [${i.type}] ${i.description.substring(0,100)}</div>`).join('');
    }
  }

  // Pipeline phases
  let phasesHtml = '';
  if (s && s.phases) {
    const order = [
      'check', 'research', 'skeleton', 'pre-verify', 'write',
      'exercises', 'activities', 'repair', 'verify-exercises',
      'annotate', 'vocab', 'enrich', 'verify', 'review', 'stress',
      'publish', 'audit',
    ];
    phasesHtml = '<div style="margin:12px 0;display:flex;gap:4px;flex-wrap:wrap">' +
      order.map(p => {
        const ph = s.phases[p];
        if (!ph) return '';
        const c = ph.status==='complete' ? 'var(--green)' : ph.status==='failed' ? 'var(--red)' : 'var(--text3)';
        return `<span style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:11px;color:${c}">${p}</span>`;
      }).join('') + '</div>';
  }

  el.innerHTML = `
    <h2>${m.slug}</h2>
    <div style="color:var(--text2);font-size:12px;margin-bottom:12px">${m.track} · Module ${m.num || '?'} · ${m.pipeline_version || '?'}</div>
    ${shippable ? '<span class="badge badge-ship" style="font-size:14px;padding:4px 12px">✅ SHIPPABLE</span>' : `<span class="badge badge-${status==='pass'?'pass':'fail'}" style="font-size:14px;padding:4px 12px">${status.toUpperCase()}</span>`}
    ${reviewHtml}
    <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:8px">Audit Gates</div>
      ${gatesHtml}
    </div>
    ${phasesHtml}
    ${frictionHtml}
  `;
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

init();
</script>
</body>
</html>
