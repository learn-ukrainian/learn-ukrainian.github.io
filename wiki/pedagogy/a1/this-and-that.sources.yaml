# Dictionary / corpus authorities added 2026-04-24 review-and-lock pass
# (template: at-the-cafe PR #1412, who-am-i PR #1436, things-have-gender
# PR `claude/scale-things-have-gender-review-and-lock`). Cited inline for
# every claim in the new "Типові помилки L2" section, the rebuilt
# vocabulary table, and the strengthened decolonization points #4-5.
- id: S5
  file: VESUM
  type: morphological-dictionary
  notes: >-
    VESUM (409K lemmas, 6.7M forms). Authoritative check for "does this
    Ukrainian word-form exist as a normative entry, and what POS/gender
    does it carry?". Queried via `mcp__sources__verify_word`,
    `mcp__sources__verify_words`, `mcp__sources__verify_lemma`. In this
    wiki supports: (1) every vocabulary table entry (цей/ця/це, той/та/те,
    оцей-ряд, отой-ряд, ці/ті, ось, тут, там, чи + усі іменники та
    прикметники); (2) the "Типові помилки L2" table's Ukrainian forms
    (including `цю` as feminine accusative of `цей`); (3) the Russian
    counterpart NOT FOUND evidence for row 4 (`этот`, `эта`, `это`,
    `эти`, `тот`, `какой`); (4) the same-form-different-function note
    on `та / то / те` (Ukrainian conjunction/particle/pronoun vs.
    Russian demonstrative homography). Scope note: "VESUM NOT FOUND"
    means absence from VESUM as a normative entry; external dictionaries
    may record нестандартне / покруч forms separately, which is recorded
    usage rather than normativity.
- id: S6
  file: СУМ-11
  type: explanatory-dictionary
  notes: >-
    СУМ-11 (127K entries). Authoritative for Ukrainian word semantics.
    Queried via `mcp__sources__search_definitions`. In this wiki supports
    Декол. #5's register guidance on `даний`: СУМ-11 gives `ДА́НИЙ, а, е`
    with sense-1 "Дієпр. пас. мин. ч. до дати" (participle of "give" —
    given, provided) and sense-2 "у знач. прикм. Цей, наявний"
    (adjectival "this, extant"). The review's framing is deliberately
    restricted to the **register** point that sense-2 belongs to the
    official / bookish register (evidence: СУМ-11 lists this sense second
    and without a "розм." label that would mark it conversational),
    whereas A1 conversational Ukrainian uses `цей/ця/це`. The review
    does NOT claim СУМ-11 marks sense-2 as a Russian-era calque —
    Codex's adversarial review correctly flagged that stronger framing
    as over-reach beyond what the dictionary directly evidences. The
    `наглий` reference is reserved for a broader false-friend note at
    higher levels (СУМ-11 confirms наглий = "раптовий") — outside the
    this-and-that A1 scope and deliberately not surfaced in the wiki
    body. Cross-cited with VESUM [S5] wherever a gender or POS claim
    would otherwise be under-evidenced.
