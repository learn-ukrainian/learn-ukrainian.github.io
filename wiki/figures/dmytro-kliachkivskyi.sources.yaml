  metadata:
    publisher: Інститут історії України НАН України
    work: 'Енциклопедія історії України: Т. 4: Ка-Ком (Наукова думка, 2007)'
    author: Лисенко О. Є.
    language: uk
    verified_on: '2026-07-17'
    portrait_fallback: >-
      text-only: стаття не доводить окремої ліцензії, автора та походження
      портретного файла; зображення не використовується.
    divergence_note: >-
      подає ім'я як «Роман-Дмитро», смерть 12.11.1944 біля Орлівських хуторів
