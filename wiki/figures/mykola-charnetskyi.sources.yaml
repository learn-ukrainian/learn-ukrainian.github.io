sources:
- author: С. І. Дмитришин
  file: "https://esu.com.ua/article-885229"
  id: S1
  notes: Стаття «Енциклопедії Сучасної України». Подає докторат з догматичного богослов'я, візитаторство
    від 1926 року для українців Волині та Підляшшя, арешт 11 квітня 1945 року та строк у шість років —
    розходиться з синодальною довідкою щодо дати візитаторства, назви дорученої території (синодальна
    довідка подає Волинь і Полісся) та довжини вироку.
  title: Чарнецький Микола
  type: external
  url: "https://esu.com.ua/article-885229"
- author: Синод єпископів Української Греко-Католицької Церкви
  file: "https://synod.ugcc.ua/data/vladyka-mykolay-charnetskyy-11728/"
  id: S2
  notes: Церковно-інституційна довідка Синоду єпископів УГКЦ. Писана церковною побожною прозою, тому в
    цій статті вживається як свідчення церковної традиції та інституційної хронології, а не як незалежне
    державно-документальне підтвердження. Джерело родини й освіти, висвячення 1909 року єпископом
    Хомишиним, хіротонії 2 лютого 1931 року, екзаршого іменування 1939 року, арешту 11 квітня 1945 року,
    строку в десять років, маршруту таборів, підпільних свячень і беатифікаційної процедури.
  title: Владика Миколай Чарнецький
  type: external
  url: "https://synod.ugcc.ua/data/vladyka-mykolay-charnetskyy-11728/"
- author: Holy See / Apostolic See
  file: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
  id: S3
  notes: 'Офіційний перелік Апостольської столиці; підтверджує беатифікацію 27 червня 2001 року в межах
    візиту 23–27 червня 2001 року та подає Чарнецького як єпископа (1884–1959). Англомовний офіційний
    документ: підтверджує конфесійно-правовий статус, не є українськомовним навчальним читанням. Незалежно
    називає його апостольським екзархом для українців Волині й Підляшшя — узгоджується з територією ЕСУ
    для екзаршого титулу, а не з синодальним «Поліссям».'
  title: Beatifications Ukraine - 26 - 27 June 2001
  type: external
  url: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
- author: Holy See / Apostolic See
  file: "https://www.vatican.va/news_services/liturgy/documents/ns_lit_doc_20010627_carneckyj_en.html"
  id: S4
  notes: Офіційна життєписна нота Апостольської столиці до беатифікації 27 червня 2001 року. Англомовний
    конфесійний документ, використовується як підтвердження статусу й офіційного церковного життєпису.
    Незалежно дає змішану атрибуцію візитаторства (1926 рік, як в ЕСУ; територія Волинь і Полісся, як в
    синодальній довідці) і підтверджує шестирічний строк ув'язнення, а не десятирічний.
  title: Mykola Carneckyj (1884-1959)
  type: external
  url: "https://www.vatican.va/news_services/liturgy/documents/ns_lit_doc_20010627_carneckyj_en.html"
