sources:
- author: Сергій Присухін
  file: "https://vue.gov.ua/Величковський,_Василь_Всеволод"
  id: S1
  notes: 'Стаття «Великої української енциклопедії», оприлюднена 28 січня 2023 року. Джерело роду й освіти,
    служіння помічником єпископа Чарнецького 1928–1935 років, арешту 7 серпня 1945 року, заміни смертного
    вироку на десять років, підпільного центру на площі Соборній, таємної хіротонії 4 лютого 1963 року
    в готельному номері, другого арешту 1969 року, Комунарська, депортації 1972 року та формули «за однією
    з версій — зловмисно отруєний у в''язниці». Наводить цитату з покликанням на видання «Великого бажайте»
    (Львів: Свічадо, 2018, с. 65–72).'
  title: Величковський, Василь Всеволод
  type: external
  url: "https://vue.gov.ua/Величковський,_Василь_Всеволод"
- author: Синод єпископів Української Греко-Католицької Церкви
  file: "https://synod.ugcc.ua/data/vladyka-vasyl-velychkovskyy-11715/"
  id: S2
  notes: Церковно-інституційна довідка, писана побожною прозою. Уточнює арешт у Тернополі, Воркуту, слухання
    ватиканського радіо серед звинувачень 1969 року, депортацію 27 січня 1972 року й локалізує хіротонію
    4 лютого 1963 року «у московській квартирі», тобто в помешканні, а не в готельному номері, як подає
    ВУЕ. Також джерело цитати «Несподівано скоро проминуло мені моїх десять літ кари…» зі спогадів про
    повернення до Львова 1955 року та точної дати свячення Володимира Стернюка — 2 липня 1964 року.
    Твердження про отруєння атрибутує свідченню брата Василя Стеця, тобто подає як переказ, а не як
    медичний висновок.
  title: Владика Василь Величковський
  type: external
  url: "https://synod.ugcc.ua/data/vladyka-vasyl-velychkovskyy-11715/"
- author: Синод єпископів Української Греко-Католицької Церкви
  file: "https://synod.ugcc.ua/data/1-chervnya-1903-roku-narodyvsya-svyashchmch-vasyliy-velychkovskyy-9231/"
  id: S3
  notes: Церковна пам'ятна довідка до дня народження; джерело церковної форми імені Василій та конфесійного
    титулу священномученика.
  title: 1 червня 1903 року народився свящмч. Василій (Величковський)
  type: external
  url: "https://synod.ugcc.ua/data/1-chervnya-1903-roku-narodyvsya-svyashchmch-vasyliy-velychkovskyy-9231/"
- author: Holy See / Apostolic See
  file: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
  id: S4
  notes: 'Офіційний перелік Апостольської столиці; підтверджує беатифікацію 27 червня 2001 року та подає
    Величковського як єпископа (1903–1973). Англомовний офіційний документ: підтверджує конфесійно-правовий
    статус, не є українськомовним навчальним читанням.'
  title: Beatifications Ukraine - 26 - 27 June 2001
  type: external
  url: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
