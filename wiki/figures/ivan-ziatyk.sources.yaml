- id: S5
  file: https://esu.com.ua/article-14092
  type: external
  title: Зятик Іван — Енциклопедія Сучасної України
  url: https://esu.com.ua/article-14092
  metadata:
    publisher: >-
      Інститут енциклопедичних досліджень НАН України (Енциклопедія Сучасної
      України)
    author: С. І. Дмитришин
    language: uk
    published_on: '2011-12'
    updated_on: '2023-12'
    volume: '11'
    verified_on: '2026-07-18'
    reference_only: >-
      незалежна академічна енциклопедична стаття; референс, НЕ учнівське
      читання; повний текст не відтворюється (авторське право ЕСУ).
    source_role: >-
      незалежний академічний біографічний референс поза церковними
      сторінками [S1]–[S3]. Обмежені твердження: церковний діяч УГКЦ;
      нар. 26.12.1899, с. Одрехова ([S5]-форма; [S1]/[S2] — Одрехово)
      побл. Сянока (нині Польща); пом.
      17.05.1952, м. Братськ Іркут. обл.; навчання (Сянік 1911–19,
      Перемиська семінарія 1923, префект); 1935 — ЧНІ; від 1937 —
      монастир св. Климента у Львові, проф. догматики й Св. Письма;
      Тернопіль (нім. окупація), 1944–46 Збоїща; після депортації 1948
      протоігумена Йосифа де Вохта отримав повноваження; арешт 20.01.1950
      (розбіжність із [S1]: 5.01 арешт / 20.01 ордер — не зливати);
      10 років; обвинувачення у сприянні учасникам антирад. націоналіст.
      організації та антирад. агітації; енциклопедична формула «помер від
      катувань» (не замінює двохепістемічну рамку [S1]/[S2]); беатифікація
      27.06.2001. Не використовується як доказ «тюремної лікарні Озерлагу»
      і не як загальна правова історія «возз'єднання».
    portrait_fallback: >-
      text-only: зображення на сторінці ЕСУ не дає окремої ліцензії
      файла/автора; портрет не використовується.
