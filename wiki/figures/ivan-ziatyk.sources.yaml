- id: S1
  file: "https://synod.ugcc.ua/data/26-grudnya-mynae-121-rik-vid-dnya-\
    narodzhennya-svyashchennomuchenyka-ivana-zyatyka-4837/"
  type: external
  title: 26 грудня минає 121 рік від дня народження священномученика Івана Зятика
  url: "https://synod.ugcc.ua/data/26-grudnya-mynae-121-rik-vid-dnya-\
    narodzhennya-svyashchennomuchenyka-ivana-zyatyka-4837/"
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2020-12-26'
    verified_on: '2026-07-17'
    source_role: >-
      церковна вебсторінка власної Церкви про свого мученика (вторинна
      транскрипція / переказ, не первинний запис МВД і не первинне свідчення);
      подає дати арешту, ордера, вироку й смерті, статті обвинувачення (ст.
      20-54-1'а», 54–10 ч.2 КК УРСР), заявлену офіційну причину смерті у
      формулі «Згідно з документами МВД СССР» («декомпенсованого міокардиту
      за наявності артеріосклерозу, цирозу печінки, лівостороннього
      ексудативного плевриту, кахексії…» — рівно п'ять діагнозів), префектуру
      1925–1935 (катехитика, спеціальна догматика, жіноча гімназія),
      атрибутовану послідовність (Сліпий призначив чотирьох вікаріїв,
      серед них де Вохт; окремо де Вохт передав наступництво), і
      локалізований переказ спогаду Ярослава Юрчака з дослівним діалогом
      («Ні! Цього я не зроблю»; «Божа воля»; «Подпишите, или мы их в расход
      пустим, этих твоих»). Внутрішньоцерковне свідчення, не незалежний
      академічний підсумок.
    method_note: >-
      перший реферативний прохід цих цитат не показав, через що було хибно
      виснувано, ніби тексту свідчення з локатором не існує; повний вибір
      сторінки 2026-07-17 це спростував. Висновок «джерело цього не подає»
      дійсний лише після повного читання.
    portrait_fallback: >-
      text-only: окремого портретного файла з доведеним суб'єктом, автором,
      походженням і придатною ліцензією сторінка не подає; зображення не
      використовується.
- id: S2
  file: https://old.cssr.lviv.ua/saints/ivan-zyatyk/
  type: external
  title: бл. Іван Зятик
  url: https://old.cssr.lviv.ua/saints/ivan-zyatyk/
  metadata:
    publisher: Редемптористи Львівської Провінції (Чин Найсвятішого Ізбавителя)
    language: uk
    verified_on: '2026-07-17'
    source_role: >-
      окрема інституційна атрибуція / URL власного чину про свого члена;
      дублікат/передрук тієї ж церковної біографії, що на [S1], для
      кожного спільного твердження: навчальний шлях, префектура 1925–1935,
      посада й передача повноважень (формулювання «де Вохт передав
      повноваження Зятику» — інституційна атрибуція того самого переходу),
      обвинувачення, свідчення, медична транскрипція з рівно п'ятьма
      діагнозами, наратив беатифікації. НЕ незалежне й НЕ доповнювальне
      джерело; спільне твердження ніколи не рахувати двічі; [S2] наодинці —
      лише там, де засвідчено справді окреме твердження. Внутрішньоцерковне
      свідчення з очевидною зацікавленістю — вживається з атрибуцією.
- id: S3
  file: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-svyatosti-9451/"
  type: external
  title: 27 червня Українська Греко-Католицька Церква вшановує пам'ять новомучеників. Історії святості
  url: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-svyatosti-9451/"
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2022-06-27'
    verified_on: '2026-07-17'
    source_role: >-
      зведена церковна довідка про новомучеників 2001 року; для Зятика та
      суміжного ряду фіксує концентрацію 1946 року, переведення
      Голоско→Унів 17 жовтня 1948 і наступництво після депортації де Вохта
      (без датування самої передачі повноважень), а також арешт 1950 року;
      також подає Климентія Шептицького як архімандрита, заарештованого
      1947 року, із восьмирічним строком (без дати вироку 1948).
