# Source registry for wiki/figures/teodor-romzha.md
sources:
- id: S1
  file: https://synod.ugcc.ua/data/vladyka-teodor-romzha-11713/
  type: external
  title: Владика Теодор Ромжа
  url: https://synod.ugcc.ua/data/vladyka-teodor-romzha-11713/
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    verified_on: '2026-07-17'
    source_role: >-
      церковне свідчення власної Церкви про свого мученика; подає отруєння
      31 жовтня 1947, тоді як [S5] подає 1 листопада, і називає відомство
      («заздалегідь спланований НКВС замах»). Кваліфікація
      відомства подається як формулювання Синоду, а не як доведений факт.
      Подає також єпископське гасло «Полюблю Тя, Господи, кріпосте моя…»
      (Пс. 17, 2), лист до ректора Русікуму про «стару, дряхлу традицію»
      матеріальної зацікавленості, святителів хіротонії (Миколай Дудаш,
      Янош Шефлер, Іштван Мадараш) і 83 тисячі прочан на Успіння.
    death_date_note: >-
      подає офіційною датою смерті 31 жовтня 1947 року і САМЕ ПОЯСНЮЄ
      походження дати «1 листопада»: смерть настала о 00:50 за московським
      часом, за яким велися історії хвороб. Це розходиться з [S3], що подає
      1 листопада. Дат не зведено.
    internal_inconsistency_note: >-
      довідкова шапка тієї самої сторінки подає «Помер 1 листопада 1947 року
      в Мукачівській лікарні» — тобто ту дату, яку текст нижче кваліфікує як
      наслідок плутанини. Непослідовність зафіксовано, а не згладжено.
    title_divergence_note: >-
      подає Ромжу як «титулярний єпископ Аппійскій, єпископ-помічник
      Мукачівський»; це розходиться з [S5] (окрема, зведена довідка Синоду),
      яка подає хіротонію «на владику-ординарія Мукачівської єпархії ГКЦ».
      Помічник і ординарій — різні уряди, версії не обрано. Обидва
      формулювання належать різним джерелам — не варіантам того самого
      джерела.
    embedded_memoir_note: >-
      сторінка ЦИТУЄ мемуари офіцера радянської держбезпеки Павла Судоплатова
      «Спецоперации» (атрибуцію подано в дужках у самому тексті). У цитаті
      названо Хрущова, згоду Сталіна, Савченка, Майрановського («начальник
      токсикологічної лабораторії»), ампулу кураре й медсестру-агента.
      Це мемуар учасника, а НЕ архівна справа й не вирок: курс подає
      поіменну атрибуцію лише з цією рамкою й не стверджує її від власного
      імені. Цитата ще й розходиться з рештою сторінки: за нею пораненого
      відвезли «в одну з лікарень Ужгорода», тоді як довідка й очевидиця
      подають Мукачівську лікарню.
    eyewitness_note: >-
      сторінка подає свідчення с. Теофіли Манайло, ЧСВВ («очевидиця та
      учасниця подій») з часом привезення до Мукачівської лікарні (27 жовтня
      1947, 12:30) та іменами інших потерпілих у замаху.
    portrait_fallback: >-
      text-only: окремого портретного файла з доведеним суб'єктом, автором,
      походженням і придатною ліцензією сторінка не подає; зображення не
      використовується.
- id: S2
  file: https://esu.com.ua/article-69947
  type: external
  title: Мукачівська греко-католицька єпархія
  url: https://esu.com.ua/article-69947
  metadata:
    publisher: Інститут енциклопедичних досліджень НАН України
    work: 'Енциклопедія Сучасної України: Т. 22 (грудень 2020)'
    author: Кічера В. В.
    language: uk
    verified_on: '2026-07-17'
    source_role: >-
      світська академічна стаття про єпархію, не про особу; дає
      інституційний контекст (передача адміністрації у вересні 1944,
      ліквідація 28 серпня 1949) і світське формулювання про загибель:
      «1947 його вбили співроб. рад. спецслужб».
    subject_scope_note: >-
      предмет статті — єпархія, а не Ромжа; біографічних деталей вона не
      подає й на них тут не спираємось.
- id: S3
  file: https://www.vatican.va/news_services/liturgy/saints/ns_lit_doc_20010627_romza_en.html
  type: external
  title: Teodor Romža (1911-1947)
  url: https://www.vatican.va/news_services/liturgy/saints/ns_lit_doc_20010627_romza_en.html
  metadata:
    publisher: Holy See (Vatican)
    language: en
    verified_on: '2026-07-17'
    reference_only: >-
      англомовний документ; референс для римських студій, хіротонії та
      офіційного викладу загибелі, НЕ учнівське читання.
    source_role: >-
      подає отруєння без дати («subsequently poisoned») і смерть 1 листопада
      1947 року — цим відрізняється від датування Синоду.
- id: S4
  file: https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html
  type: external
  title: Beatifications Ukraine - 26, 27 June 2001
  url: https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html
  metadata:
    publisher: Holy See (Vatican)
    language: en
    verified_on: '2026-07-17'
    reference_only: >-
      англомовний документ; референс для акту беатифікації, НЕ учнівське
      читання.
    document_identity: >-
      сторінка подає Ромжу окремим рядком «Teodor Romža (1911-1947)», а не в
      переліку «Mycola Čarneckyj and 24 Companions».
- id: S5
  file: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-\
    svyatosti-9451/"
  type: external
  title: 27 червня Українська Греко-Католицька Церква вшановує пам'ять новомучеників. Історії святості
  url: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-\
    svyatosti-9451/"
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2022-06-27'
    verified_on: '2026-07-18'
    source_role: >-
      зведена церковна довідка про кількох новомучеників 2001 року, НЕ
      присвячена Ромжі персонально. Адоптована для двох її тверджень:
      «24 вересня 1944 р. хіротонізований на владику-ординарія Мукачівської
      єпархії ГКЦ» і отруєння 1 листопада 1947 року. Роль обмежена цими
      позиціями; поза ними джерело не використовується як біографія Ромжі.
    title_conflict_note: >-
      формулювання «владика-ординарій» розходиться з формулюванням [S1]
      («єпископ-помічник Мукачівський»); помічник і ординарій — різні уряди.
      Курс не обирає версію і пише просто «єпископ» (§ титульна розбіжність).
    poisoning_date_conflict_note: >-
      подає отруєння 1 листопада 1947 року; це прямо розходиться з [S1], де
      отруєння датовано 31 жовтня. Конфлікт зареєстровано, а не приховано
      обмеженням ролі джерела.
    cross_slug_note: >-
      та сама адреса адоптована як [S3] у пакеті zynovii-kovalyk цієї ж
      когорти (Block J).
