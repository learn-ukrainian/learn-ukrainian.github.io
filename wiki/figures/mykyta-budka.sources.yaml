sources:
- author: М. М. Комариця
  file: "https://esu.com.ua/article-36541"
  id: S1
  notes: Стаття «Енциклопедії Сучасної України», 2004, DOI 10.5281/zenodo.19881516. Подає заголовок «Будка
    Никита» разом із громадянською формою «Будка Микита Михайлович». Джерело освіти, заснування й редагування
    місячника «Емігрант» (1910–1912), переліку канадських установ, соборів 1913 і з'їздів 1918 років,
    формули про «політичну настанову» в посланнях часів Першої світової війни, арешту 11 квітня 1945 року,
    строку у вісім років, ув'язнення в київській в'язниці разом зі Сліпим, смерті 1 жовтня 1949 року та
    беатифікації 27 червня 2001 року.
  title: Будка Никита
  type: external
  url: "https://esu.com.ua/article-36541"
- author: Синод єпископів Української Греко-Католицької Церкви
  file: "https://synod.ugcc.ua/data/vladyka-nykyta-budka-3395/"
  id: S2
  notes: 'Церковно-інституційна довідка, писана побожною прозою. Джерело призначення 15 липня 1912 року,
    хіротонії 13 жовтня 1912 року в соборі святого Юра у Львові (не в Канаді — до Вінніпега Будка прибув
    аж 19 грудня 1912 року), власних кількісних оцінок канадської праці та прямої формули про поховання:
    «Місце поховання — невідоме, хоч відомо, що воно знаходилось на одному із цвинтарів Карлагу, біля
    села Каражар». Причину смерті подає в лапках як формулу табірного запису. Щодо дати смерті сторінка
    суперечить сама собі: заголовок і переказ підтвердження казахстанської влади подають 28 вересня 1949
    року, а основний текст — 1 жовтня 1949 року; обидві дати фіксуються з цього ж джерела.'
  title: Владика Никита Будка
  type: external
  url: "https://synod.ugcc.ua/data/vladyka-nykyta-budka-3395/"
- author: Internet Encyclopedia of Ukraine, Canadian Institute of Ukrainian Studies
  file: "https://www.encyclopediaofukraine.com/display.asp?linkpath=pages\\B\\U\\BudkaNykyta.htm"
  id: S3
  notes: 'Канадське академічне українознавче видання Канадського інституту українських студій. Виконує
    роль критичної академічної рамки: прямо називає труднощі, пов''язані з обмеженими організаційними
    здібностями Будки, суперечки довкола Інституту імені Могили та їхній вплив на постання Української
    православної церкви Канади, а також пастирського послання від 27 липня 1914 року із закликом захищати
    Австро-Угорщину та його відкликання 6 серпня 1914 року. Подає дату народження 7 вересня 1877 року,
    розходячись з українськими джерелами. Кількісних показників зростання парафій не подає. Англомовне
    видання: не є українськомовним навчальним читанням.'
  title: Budka, Nykyta
  type: external
  url: "https://www.encyclopediaofukraine.com/display.asp?linkpath=pages\\B\\U\\BudkaNykyta.htm"
- author: Holy See / Apostolic See
  file: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
  id: S4
  notes: 'Офіційний перелік Апостольської столиці; подає Будку як єпископа-помічника Львова для українців
    і першого єпископа для українців-католиків у Канаді (1877–1949) та підтверджує беатифікацію 27 червня
    2001 року. Англомовний офіційний документ: підтверджує конфесійно-правовий статус.'
  title: Beatifications Ukraine - 26 - 27 June 2001
  type: external
  url: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
