    author: Юрко Тютюник
    language: uk
    edition: 3-тє видання, частина 1
    verified_on: '2026-07-17'
    document_identity: >-
      титульний аркуш сканованого примірника подає: «Юрко Тютюник. Зимовий
      похід 1919-20 рр. 3-тє видання. Частина 1. Політичний огляд з документами
      в тексті. Видавництво Чарторийських. Ню Йорк».
    year_discrepancy: >-
      каталожний запис бібліотеки подає рік 1968, тоді як відбиток на титульному
      аркуші сканованого примірника читається як 1966; рік не встановлено
      однозначно, тому в тексті він не стверджується.
    quotation_status: >-
      скан не має текстового шару (0 слів при видобуванні), тому дослівні цитати
      з page-stable локаторами не наводяться.
