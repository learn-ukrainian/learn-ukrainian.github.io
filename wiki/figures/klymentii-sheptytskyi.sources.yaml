- id: S2
  file: https://synod.ugcc.ua/data/u-tsey-den-151-rik-tomu-narodyvsya-blazhennyy-svyashchmch-klymentiy-sheptytskyy-4472/
  type: external
  title: У цей день, 151 рік тому, народився блаженний свящмч. Климентій Шептицький
  url: https://synod.ugcc.ua/data/u-tsey-den-151-rik-tomu-narodyvsya-blazhennyy-svyashchmch-klymentiy-sheptytskyy-4472/
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2020-11-17'
    verified_on: '2026-07-17'
    source_role: >-
      церковне свідчення власної Церкви про свого мученика; подає перебіг
      слідства, репліку з допиту («З висуненими звинуваченнями я не
      погоджуюся»), тюремну репліку («Для мене тюремна камера — це монаша
      келія. Живу так, як жив би в монастирі»), листи до кард. Тіссерана та
      о. Королевського, які «перехопило МГБ» (формулювання саме [S2] — не
      узагальнювати на [S3] і не гармонізувати з НКВС), послання «Посліднє
      слово» (червень 1940) і поховання 3 травня о 3 год. ночі з
      незнайденою могилою. Використовується як свідчення, а не як
      незалежний академічний підсумок.
    absent_claim_note: >-
      ця сторінка не подає жодного номера кримінальної справи; жодне з
      чотирьох адоптованих джерел S1–S4 такого номера не наводить.
