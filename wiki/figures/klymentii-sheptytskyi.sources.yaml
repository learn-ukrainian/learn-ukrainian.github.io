  type: external
  title: 27 червня Українська Греко-Католицька Церква вшановує пам'ять новомучеників. Історії святості
  url: >-
    https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-svyatosti-9451/
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2022-06-27'
    verified_on: '2026-07-17'
    source_role: >-
      зведена церковна довідка про новомучеників 2001 року; подає Унівську
      лавру й переховування євреїв; формальну причину арешту 5 червня 1947
      р. — листи архімандрита до Риму про переслідування УГКЦ, «які
      перехопило НКВС» (формулювання саме [S3] — не узагальнювати на [S2]
      і не гармонізувати з МГБ). Свідчення Церкви про себе.
