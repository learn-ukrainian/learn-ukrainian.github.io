# Source registry for wiki/figures/zynovii-kovalyk.md
sources:
- id: S1
  file: https://esu.com.ua/article-8349
  type: external
  title: Ковалик Зеновій
  url: https://esu.com.ua/article-8349
  metadata:
    publisher: Інститут енциклопедичних досліджень НАН України
    work: 'Енциклопедія Сучасної України: Т. 13 (грудень 2013)'
    author: Головин Б. П.
    language: uk
    verified_on: '2026-07-17'
    source_role: >-
      світський академічний довідник; єдине з перевірених джерел, що подає
      точну дату смерті (26.06.1941, Львів) і посаду «економ» львівського
      монастиря.
    name_form_note: >-
      стаття подає форму імені «Ковалик Зеновій», відмінну і від слуга курсу
      (zynovii-kovalyk), і від церковного вжитку («Зенон», «Зиновій»), і від
      ватиканського «Zynovij Kovalyk».
    portrait_fallback: >-
      text-only: окремого портретного файла з доведеним суб'єктом, автором,
      походженням і придатною ліцензією стаття не подає; зображення не
      використовується.
- id: S2
  file: https://old.cssr.lviv.ua/saints/zenon-kovalyk/
  type: external
  title: бл. Зенон Ковалик
  url: https://old.cssr.lviv.ua/saints/zenon-kovalyk/
  metadata:
    publisher: Редемптористи Львівської Провінції (Чин Найсвятішого Ізбавителя)
    language: uk
    verified_on: '2026-07-17'
    source_role: >-
      джерело власного чину про свого члена; подає обставини ув'язнення
      (шість місяців, двадцять вісім допитів) і спосіб загибелі.
      Внутрішньоцерковне свідчення — вживається з атрибуцією.
    agreement_note: >-
      подає ту саму дату свячень (9 серпня 1932) і ту саму посаду («економ
      монастиря»), що й ЕСУ. Збіг формулювань зафіксовано, але різні видавці
      самі собою не доводять незалежних ланцюгів походження фактів.
- id: S3
  file: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-\
