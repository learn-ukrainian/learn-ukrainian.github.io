  type: external
  title: 27 червня Українська Греко-Католицька Церква вшановує пам'ять новомучеників. Історії святості
  url: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-\
    svyatosti-9451/"
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2022-06-27'
    verified_on: '2026-07-17'
    source_role: >-
      зведена церковна довідка про новомучеників 2001 року; подає розміри
      камери й число в'язнів, арешт «у ніч з 20 на 21 грудня 1940 р.»,
      працю на Волині та розп'яття на стіні 1941 року.
    divergence_note: >-
      подає дату свячень «4 вересня 1932 р.», що розходиться з 9 серпня 1932
      у [S1] і [S2]; версії не обрано — зафіксовано розклад два проти одного.
