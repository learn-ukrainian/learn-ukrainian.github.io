sources:
- id: S1
  file: https://esu.com.ua/article-33516
  type: external
  title: Вергун Петро
  url: https://esu.com.ua/article-33516
  metadata:
    publisher: Інститут енциклопедичних досліджень НАН України
    work: 'Енциклопедія Сучасної України: Т. 4 (грудень 2005)'
    author: Бриндак І. С.
    language: uk
    verified_on: '2026-07-17'
    source_role: >-
      світський академічний довідник; подає докторат (1925), берлінський
      період, сан прелата (1937), строк 8 років і ув'язнення «до 1955».
    divergence_note: >-
      подає місце смерті як «с-ще Ангарське Краснодар. краю, РФ», що
      розходиться з Красноярським краєм у [S2]; жодної версії не обрано.
    portrait_fallback: >-
      text-only: окремого портретного файла з доведеним суб'єктом, автором,
      походженням і придатною ліцензією стаття не подає; зображення не
      використовується.
- id: S2
  file: https://synod.ugcc.ua/data/ispovidnykyviry-petro-vergun-svyashchennyk-yakyy-stav-muchenykom-za-viru-16513/
  type: external
  title: '#Ісповідники_віри. Петро Вергун — священник, який став мучеником за віру'
  url: https://synod.ugcc.ua/data/ispovidnykyviry-petro-vergun-svyashchennyk-yakyy-stav-muchenykom-za-viru-16513/
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2025-02-07'
    verified_on: '2026-07-17'
    source_role: >-
      синодальна вторинна презентація на сайті Синоду Єпископів УГКЦ; сторінка
      подає атрибуцію «За матеріалами Ірини Штогрін для Радіо Свобода» — не
      первинне свідчення Церкви й не сам невідтворений вирок. За атрибуцією
      [S2] цитує/сканує сторінки протоколу допиту; подає справу №148372;
      склад трибуналу (троє суддів, двоє секретарів); спільний вирок зі
      Сліпим, Будкою і Чарнецьким; строк 8 років із конфіскацією майна;
      «Протокол затримання складено 22 червня 1945 року»; звільнення з
      каторжних робіт у червні 1952 року; Ангарське Богучанського району
      Красноярського краю. Тексту вироку сторінка не відтворює.
    quoted_document_note: >-
      фраза «Став єпископом, намісником Папи Римського в Німеччині з
      23 жовтня 1940 року» НАЛЕЖИТЬ ПРОТОКОЛУ ДОПИТУ (за викладом [S2]), а не
      Синодові як інституційній довідці про сан: джерело подає її як
      «…розповідав слідчому Петро Вергун» і далі наводить форму третьої особи
      множини «використають для побудови все нових і нових звинувачень». Сану
      єпископа не подають ані [S1], ані [S3], ані [S4]; протокол допиту не
      вживається як довідка про сан.
- id: S3
  file: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-\
    svyatosti-9451/"
  type: external
  title: 27 червня Українська Греко-Католицька Церква вшановує пам'ять новомучеників. Історії святості
  url: "https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-\
    katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-\
    svyatosti-9451/"
  metadata:
    publisher: Синод Єпископів Української Греко-Католицької Церкви
    language: uk
    published_on: '2022-06-27'
    verified_on: '2026-07-17'
    source_role: >-
      зведена церковна довідка про новомучеників 2001 року; подає, що Вергун
      не переніс осідок до Мюнхена після захоплення Берліна, разом із
      локалізованою реплікою «Поки хоча б один українець в Берліні, я
      залишуся тут», арешт «21 червні 1945 р.» і вивезення до СРСР без суду,
      вирок «1946 року в Києві» на 8 років, звільнення 22 червня 1952 року,
      заслання від 1953 року в Ангарському Красноярського краю, операцію на
      шлунку 1954 року та перенесення мощей 26 липня 2004 року.
    divergence_note: >-
      подає дату арешту 21 червня 1945 року, тоді як [S1] подає 22 червня, а
      [S2] — «Протокол затримання складено 22 червня 1945 року»; дат не
      зведено.
