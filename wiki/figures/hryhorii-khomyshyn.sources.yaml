sources:
- author: Григорій Хомишин
  file: "https://zbruc.eu/node/36187"
  id: S1
  notes: Опублікований первинний текст послання 1932 року в правописі оригіналу; інтернет-видання «Збруч»,
    публікація від 18 травня 2015 року. Джерело авторського самопредставлення «В шістьдесятьшестому році
    мого життя…» та формули «коли впровадимо Боже царство в наші душі». Авторська теза, а не незалежне
    підтвердження фактів; link-only.
  title: Українська проблєма
  type: external
  url: "https://zbruc.eu/node/36187"
- author: Іван Андрухів
  file: "https://ukr-inst.lviv.ua/index.php/ukraina-polshcha/article/view/321"
  id: S2
  notes: 'Фахова стаття, журнал «Україна–Польща: історична спадщина і суспільна свідомість», № 19 (2025),
    DOI 10.33402/up.2025-19-05; ліцензія Creative Commons Attribution 4.0. Академічна рамка українсько-польських
    взаємин і католицького бачення суспільного розвитку. Відкритий доступ не є дозволом на відтворення
    в курсі: диспозиція link-only.'
  title: 'Єпископ Григорій Хомишин: на перехресті українсько-польських культурних та церковних взаємин
    першої половини XX століття'
  type: external
  url: "https://ukr-inst.lviv.ua/index.php/ukraina-polshcha/article/view/321"
- author: Олег Єгрешій
  file: "https://synod.ugcc.ua/data/materialy-arhivu-kolyshnogo-kdb-pro-uvyaznennya-vladyky-grygoriya-homyshyna-4850/"
  id: S3
  notes: Архівна публікація, зібрана й підготована кандидатом історичних наук, доцентом Олегом Єгрешієм
    для Івано-Франківської архиєпархії УГКЦ; розміщена на сайті Синоду 28 грудня 2020 року до 75-х роковин
    смерті. Це фахова робота з архівними покликаннями, а не побожний переказ. Джерело рішення про арешт
    від 26 березня 1945 року, ордера № 634, ночі на 12 квітня 1945 року, чотирьох пунктів обвинувачення,
    поправки Єгрешія щодо назви «Українська Народна Обнова», переведення 21 грудня 1945 року та акта лікаря
    Фридберга. Номера кримінальної справи не подає.
  title: Матеріали архіву колишнього КДБ про ув'язнення владики Григорія Хомишина
  type: external
  url: "https://synod.ugcc.ua/data/materialy-arhivu-kolyshnogo-kdb-pro-uvyaznennya-vladyky-grygoriya-homyshyna-4850/"
- author: Синод єпископів Української Греко-Католицької Церкви
  file: "https://synod.ugcc.ua/data/vladyka-grygoriy-homyshyn-19207/"
  id: S4
  notes: 'Церковно-інституційна життєписна довідка. Її висновок про мучеництво — конфесійна оцінка, проте
    сторінка подає й перевірену архівну сигнатуру: кримінальна справа № 35826, том 1, 390 сторінок, Архів
    Служби Безпеки України в Києві; 36 протоколів допитів тривалістю від 2 год. 20 хв. до 37 год. 20 хв.,
    останній від 11 вересня 1945 року; допити провадив капітан держбезпеки Дубок; ордер № 634 на арешт
    і обшук за адресою Станіслав, вул. Червоноармійська, 16; форма по батькові Григорій Лукич. Джерело
    дати народження 25 березня 1867 року, свячення 18 листопада 1893 року, єпископського призначення 16
    квітня та хіротонії 6 травня 1904 року, семінарії 1907 року й спротиву польської влади його призначенню.
    Датує арешт 15 квітня 1945 року, розходячись із архівною публікацією S3.'
  title: Владика Григорій Хомишин
  type: external
  url: "https://synod.ugcc.ua/data/vladyka-grygoriy-homyshyn-19207/"
- author: Володимир Мороз
  file: "http://web.archive.org/web/20251221113432/https://er.ucu.edu.ua/items/37d576b9-c01c-44cd-a23f-5768866c23c8"
  id: S5
  notes: Академічне дослідження 2016 року в електронному репозиторії Українського католицького університету;
    постійний ідентифікатор https://hdl.handle.net/20.500.14570/1470. Живий домен er.ucu.edu.ua відповідає
    кодом 403 на автоматичні запити, тому реєстр фіксує архівний знімок від 21 грудня 2025 року. Вживає
    нормалізовану форму назви «Українська проблема».
  title: 'Проблема морального авторитету та поступу в житті народу у листі-посланні єпископа Григорія
    Хомишина «Українська проблема»: історичний контекст і філософські конотації'
  type: external
  url: "http://web.archive.org/web/20251221113432/https://er.ucu.edu.ua/items/37d576b9-c01c-44cd-a23f-5768866c23c8"
- author: Holy See / Apostolic See
  file: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
  id: S6
  notes: 'Офіційний перелік Апостольської столиці; підтверджує беатифікацію 27 червня 2001 року та подає
    Хомишина як єпископа (1867–1945). Англомовний офіційний документ: підтверджує конфесійно-правовий
    статус, не є українськомовним навчальним читанням.'
  title: Beatifications Ukraine - 26 - 27 June 2001
  type: external
  url: "https://www.vatican.va/news_services/liturgy/saints/20010626_beatif_ucraina_en.html"
