- title: Захарійчук, 4 клас (с. 119–120)
  notes: Definition of дієслова на -ся ("Дієслова на -ся виражають дію, спрямовану
    на самого виконавця") and the Дмитро Білоус verse 'Раненько прокидаєшся, зарядкою
    займаєшся, водою обливаєшся, швиденько одягаєшся, в дорозі не спиняєшся' that
    drills the morning-routine reflexive forms. Source for §2 and §3.
- title: Кравцова, 4 клас (с. 113)
  notes: 'Pronunciation rule used verbatim in §2: ''-шся вимовляють як [с'':а]; -ться
    вимовляють як [ц'':а]''. The same page also gives the contrastive umyvayeshsia
    / umyvayet''sia paradigm cited in the conjugation table.'
- title: Караман, 10 клас (с. 187)
  notes: 'Higher-level frame for the curious adult learner: дієслова зворотного стану
    mean дію, спрямовану на дійову особу, with the historical postfix -ся from the
    old short form of pronoun себе. Quoted in §2 paraphrase. (Plan referenced p.176;
    the actual passage on зворотний стан was retrieved at p.187 from chunk 10-klas-ukrmova-karaman-2018_s0331.)'
- title: Авраменко, 7 клас (с. 67)
  notes: 'Orthography rule paraphrased in §2: -ться is always written with the м''який
    знак; -шся is always written without it — independently of pronunciation.'
- title: Авраменко, 6 клас (с. 10)
  notes: 'Sample modern morning-routine register used as the model for the dialogues
    in §1: ''Я прокидаюсь о сьомій годині. Виконую кілька фізичних вправ. Потім загартовуюся
    контрастним душем.'''
