- title: Караман Grade 10, p.176
  notes: Дієслова із суфіксом -ся(-сь), які виражають зворотну дію, називаються зворотними.
    Вони означають дію, спрямовану на самого її носія.
- title: Кравцова Grade 4, p.140
  notes: 'Правило вимови: -шся звучить як [с'':а], -ться звучить як [ц'':а]. Написання
    і вимова відрізняються.'
- title: Захарійчук Grade 4, p.120
  notes: 'Дієслова на -ся: виражають дію, спрямовану на самого себе. Вірш Дмитра Білоуса
    про ранкову рутину.'
