- id: act-dialogue-quiz
  type: quiz
  instruction: Choose the line that matches the dialogue.
  items:
  - prompt: Коли Настя прокидається?
    options:
    - о сьомій
    - о восьмій
    - у суботу
    answer: о сьомій
  - prompt: Що Настя робить потім?
    options:
    - вмивається і одягається
    - гуляє
    - працює
    answer: вмивається і одягається
  - prompt: Коли Ліна йде на роботу?
    options:
    - о восьмій
    - пізно
    - у суботу
    answer: о восьмій
- id: act-add-sia
  type: fill-in
  instruction: Add -ся where the verb needs it.
  items:
  - sentence: Я вмиваю__.
    answer: ся
    options:
    - ся
    - ти
    - він
  - sentence: Ти одягаєш__.
    answer: ся
    options:
    - ся
    - ю
    - є
  - sentence: Вона прокидаєть__.
    answer: ся
    options:
    - ся
    - ш
    - є
  - sentence: Я снідаю__.
    answer: ''
    options:
    - ''
    - ся
    - єш
- id: act-order-routine
  type: order
  instruction: Put the morning routine in a natural order.
  items:
  - Потім вмиваюся.
  - Нарешті йду.
  - Спочатку прокидаюся.
  - Після цього снідаю.
  correct_order:
  - 2
  - 0
  - 3
  - 1
- id: act-self-check
  type: fill-in
  instruction: Complete the short morning story.
  items:
  - sentence: Спочатку я ____.
    answer: прокидаюся
    options:
    - прокидаюся
    - йду
    - працюю
  - sentence: Потім я ____.
    answer: вмиваюся
    options:
    - вмиваюся
    - школа
    - кава
  - sentence: Нарешті я ____ на роботу.
    answer: йду
    options:
    - йду
    - йдеш
    - йде
- id: act-reflexive-or-not
  type: quiz
  instruction: Choose the natural Ukrainian verb.
  items:
  - prompt: Я (wash up).
    options:
    - вмиваюся
    - вмиваю руки
    - йду
    answer: вмиваюся
  - prompt: Я (have breakfast).
    options:
    - снідаю
    - снідаюся
    - снідатися
    answer: снідаю
  - prompt: Ти (get dressed).
    options:
    - одягаєшся
    - одягаюся
    - одягається
    answer: одягаєшся
- id: act-match-forms
  type: match-up
  instruction: Match the person with the verb form.
  pairs:
  - left: я
    right: прокидаюся
  - left: ти
    right: прокидаєшся
  - left: вона
    right: прокидається
  - left: я
    right: йду
- id: act-group-verbs
  type: group-sort
  instruction: Sort the verbs.
  groups:
  - name: з -ся
    items:
    - прокидатися
    - вмиватися
    - одягатися
    - збиратися
  - name: без -ся
    items:
    - снідати
    - йти
    - пити каву
    - працювати
- id: act-pronunciation
  type: true-false
  instruction: Mark the pronunciation rule true or false.
  items:
  - statement: -шся вимовляємо як [с':а].
    answer: true
  - statement: -ться вимовляємо як [ц':а].
    answer: true
  - statement: вмиваєшся і вмивається звучать однаково.
    answer: false
- id: act-fix-errors
  type: error-correction
  instruction: Fix the verb form.
  items:
  - incorrect: Я прокидаєшся о сьомій.
    correct: Я прокидаюся о сьомій.
  - incorrect: Він вмиваюся.
    correct: Він вмивається.
  - incorrect: Ти йду на роботу.
    correct: Ти йдеш на роботу.
- id: act-sequence-fill
  type: fill-in
  instruction: Choose the sequence word.
  items:
  - sentence: ____ я прокидаюся.
    answer: Спочатку
    options:
    - Спочатку
    - Нарешті
    - Після цього
  - sentence: ____ я снідаю.
    answer: Після цього
    options:
    - Після цього
    - Я
    - Робота
  - sentence: ____ я йду.
    answer: Нарешті
    options:
    - Нарешті
    - Кава
    - Сьомій
