- id: act-2
  type: quiz
  title: Reflexive or not
  instruction: Choose the natural Ukrainian form.
  items:
  - question: I wash up.
    options:
    - text: Я вмиваюся.
      correct: true
    - text: Я вмиваю.
      correct: false
    explanation: Вмиватися is reflexive.
  - question: I have breakfast.
    options:
    - text: Я снідаюся.
      correct: false
    - text: Я снідаю.
      correct: true
    explanation: Снідати is not reflexive.
  - question: You get dressed.
    options:
    - text: Ти одягаєшся.
      correct: true
    - text: Ти одягаєш.
      correct: false
    explanation: Одягатися is reflexive.
  - question: She wakes up.
    options:
    - text: Вона прокидається.
      correct: true
    - text: Вона прокидаєшся.
      correct: false
    explanation: Вона takes -ється.
  - question: I go.
    options:
    - text: Я йдуся.
      correct: false
    - text: Я йду.
      correct: true
    explanation: Йти is not reflexive.
  - question: I study.
    options:
    - text: Я навчаюся.
      correct: true
    - text: Я навчаєшся.
      correct: false
    explanation: Я takes -юся.
  - question: He gets ready.
    options:
    - text: Він збирається.
      correct: true
    - text: Він збираюся.
      correct: false
    explanation: Він takes -ється.
  - question: I drink coffee.
    options:
    - text: Я п’ю каву.
      correct: true
    - text: Я п’юся каву.
      correct: false
    explanation: Пити is not reflexive here.
