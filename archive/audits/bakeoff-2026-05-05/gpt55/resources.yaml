- title: Караман Grade 10, p.176
  notes: 'Зворотні дієслова: суфікс -ся(-сь) означає зворотну дію; -ся(-сь) додається
    після інфінітивного суфікса або особового закінчення.'
- title: Кравцова Grade 4, p.113
  notes: 'Планова опора для правила вимови: -шся звучить як [с'':а], -ться звучить
    як [ц'':а].'
- title: Захарійчук Grade 4, p.162
  notes: 'Дієслова на -ся: вправи з вимовою, правописом і дією, спрямованою на себе.'
- title: wiki/pedagogy/a1/my-morning.md
  notes: 'Compiled pedagogical packet for A1 morning routine: sequencing, L2 error
