      authority: Правопис 2019
    - quote: Слово «дуб» ми вимовляємо чітко з [б] на кінці, а не як [дуп]. Слово
        «мороз» звучить із виразним [з], а не як [морос].
      issue: Correct explanation of Ukrainian non-devoicing in word-final position.
      authority: none
