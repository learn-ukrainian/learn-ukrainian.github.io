axes:
  linguistic_correctness:
    score: 7
    evidence:
    - quote: Коли в слові після губного приголосного (б, п, в, м, ф) або після р йдуть
        йотовані голосні я, ю, є, ї, між ними обов'язково ставимо апостроф.
      issue: Правило подано надто широко. За Правописом 2019 апостроф не пишемо в
        словах типу «свято», «цвях», «морквяний», коли перед губним у корені вже є
        інший приголосний.
      authority: Правопис 2019
    - quote: У «свято» апострофа немає; у «м'ята» він обов'язковий.
      issue: Приклад правильний, але він суперечить попередньому безумовному формулюванню
        правила. Модуль показує виняток, не пояснивши його.
      authority: Правопис 2019
    - quote: М'який знак — особлива літера української абетки. Сама вона не позначає
        жодного звуку.
      issue: 'Базове твердження правильне: ь не має власного звукового значення, а
        служить для позначення м''якості.'
      authority: none
    - quote: Чим український Г відрізняється від Ґ? Г — дзвінкий фрикативний [ɦ].
        Ґ — дзвінкий проривний [g].
      issue: Ключове протиставлення Г/Ґ подано правильно і без русифікованого змішування
        цих звуків.
      authority: none
    - quote: Зараз достатньо запам'ятати «губне + р + я/ю/є/ї».
      issue: 'Формула невдала: вона звучить як послідовність «губний + р + я/ю/є/ї»,
        а не як два окремі випадки «після губного» або «після р».'
      authority: none
  pedagogical_accuracy:
    score: 7
    evidence:
    - quote: 'Потрійний поділ приголосних запам''ятати просто: тверді (більшість),
        м''які (наша дев''ятка та й), пом''якшені (губні, шиплячі, задньоязикові —
        у певних позиціях). Марія Захарійчук у підручнику для першого класу позначає
        тверді приголосні однією рискою [–], а м''які — двома рисочками [=].'
      issue: Це точно відпрацьовує плановий блок про потрійний поділ і позначення
        [–]/[=].
      authority: textbook citation
    - quote: 'Прочитай уголос: п''ять, дев''ять, м''який, м''яч, об''єкт.'
      issue: Практика читання з апострофом відповідає плановій вправі на слова типу
        «п'ять, дев'ять, м'який, м'яч, об'єкт».
      authority: plan section
    - quote: 'Вправа 4. Розподіл слів на три колонки. Вісімнадцять слів потрібно розподілити
        за трьома колонками: з м''яким знаком, з апострофом і без жодного знака.'
      issue: Тип вправи збігається з планом, але реального набору з 18 слів немає.
        Учень отримує лише інструкцію та три приклади.
      authority: plan section
    - quote: Вправа 6. Правда чи неправда. Прочитай твердження і познач, де правда,
        а де ні.
      issue: План вимагає 6 тверджень, а модуль дає тільки формат і 2 приклади. Для
        самостійної роботи цього недостатньо.
      authority: plan section
    - quote: 'Для тренування слуху працюй із мінімальними парами — словами, що різняться
        лише одним приголосним: «балка» і «палка», «коза» і «коса».'
      issue: Мінімальні пари дібрано правильно й вони прямо відповідають плану.
      authority: plan section
