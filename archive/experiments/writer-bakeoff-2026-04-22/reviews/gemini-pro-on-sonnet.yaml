      issue: Подвійна помилка у вправі на один фокус (Вправа 3). Слово «симя» містить
        хибний голосний (И замість І). Якщо учень виправить лише апостроф, він напише
        орфографічно неправильне «сим'я».
      authority: none
    - quote: 'Важлива деталь: якщо перед губним приголосним стоїть ще один приголосний
        кореня (не Р), апостроф не ставиться.'
      issue: 'Автор додав складне морфемне правило (про збіг приголосних кореня: свято,
        цвях), яке перевантажує рівень А1.1 і суперечить настанові плану уникати складних
        винятків.'
      authority: plan section
