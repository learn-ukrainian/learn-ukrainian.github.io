    evidence:
    - quote: '| сі́м''я | іменник; апостроф після М перед Я | Моя сім''я живе у Харкові.
        |'
      issue: Груба помилка наголосу та семантики. «Сі́м'я» з наголосом на першому
        складі означає «насіння». Родина — це «сім'я́» (наголос на Я).
      authority: Горох
    - quote: '| дев''я́ть | числівник; апостроф після В перед Я | Дев''ять мінус чотири
        — п''ять. |'
      issue: 'Помилка наголосу. Нормативний наголос у цьому числівнику падає на перший
        склад: «де́в''ять».'
      authority: Горох
    - quote: 'Порівняйте: **кут** і **куть**, **лис** і **лись**'
      issue: Слова «куть» та «лись» штучно вигадані для демонстрації фонетичних пар.
        Вони не існують у нормативній українській мові як базові лексеми.
      authority: VESUM
  pedagogical_accuracy:
    score: 4
    evidence:
