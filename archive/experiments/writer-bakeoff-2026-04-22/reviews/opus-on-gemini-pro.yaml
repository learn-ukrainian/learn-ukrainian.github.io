plan_issues:
- plan_field: content_outline / М'який знак / points
  issue: Plan lists 9 pairs (Д, Т, З, С, Ц, Л, Н, Р, ДЗ) but the mnemonic 'ДЗіДЗьо,
    Де Ти З'їСи Ці ЛиНи' encodes only 8 (ДЗ, Д, Т, З, С, Ц, Л, Н). Either Р must be
    explicitly excluded from the mnemonic-covered set (with a separate note that Р-pair
    exists but is not captured by the mnemonic) or a different mnemonic should be
    used. The current plan wording guarantees any faithful writer reproduces the contradiction.
  evidence: '''9 пар: Д/Д'''', Т/Т'''', З/З'''', С/С'''', Ц/Ц'''', Л/Л'''', Н/Н'''',
    Р/Р'''', ДЗ/ДЗ'''' + Й ... Мнемонічне правило Літвінової для 5 класу: «ДЗіДЗьо,
    Де Ти З''''їСи Ці ЛиНи» — саме ті 9 приголосних, які Ь може пом''''якшити.'''
- plan_field: register
  issue: Plan declares register=розмовний, but the content_outline is structured around
    abstract phonetics terminology (фрикативний, проривний, палаталізований, сонорний)
    — the plan itself demands academic-phonetics register. Writer is trapped between
    the declared register and the content. Recommend register=навчально-пояснювальний
    or академічно-дидактичний for this module.
  evidence: '''register: розмовний'''
- plan_field: activity_hints / group-sort items
  issue: 18 items for a single A1 sort activity is extraordinarily high for the level;
    even a strong writer will prune it. Either justify the count in the hint or lower
    the target to 9-12.
  evidence: '''type: group-sort ... items: 18'''
