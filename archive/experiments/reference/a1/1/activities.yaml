- id: quiz-milozvuchnist-stress
  type: quiz
  instruction: 'Choose the correct answer about two key Ukrainian pronunciation principles:
    милозвучність (milozwuchnist) and наголос (stress)'
  items:
  - question: What is 'милозвучність' (milozwuchnist) in Ukrainian?
    options:
    - Using as many vowels as possible in a word
    - A type of folk poetry rhythm
    - Natural smoothing of harsh consonant clusters for easier pronunciation
    - The rule about capitalising proper nouns
    correct: 2
  - question: In 'мама __ школі' (mom is at school), which preposition sounds smoothest
      after the vowel 'а'?
    options:
    - у (мама у школі)
    - в (мама в школі)
    - до (мама до школі)
    - від (мама від школі)
    correct: 1
  - question: Which Ukrainian word pair shows how stress placement can CHANGE THE
      MEANING of a word?
    options:
    - мама / тато
    - звук / літера
    - замок / замок (castle vs lock)
    - добре / чудово
    correct: 2
  - question: What does 'наголос' mean in Ukrainian?
    options:
    - The Ukrainian alphabet
    - The soft sign (Ь)
    - The apostrophe (ʼ)
    - Word stress — the emphasis placed on one syllable
    correct: 3
  - question: Why can Ukrainian learners usually read unfamiliar words aloud more
      easily than English learners?
    options:
    - Ukrainian has only 20 letters
    - Ukrainian spelling is overwhelmingly phonetic — letters reliably predict pronunciation
    - Ukrainian words are shorter on average
    - Ukrainian uses a simplified Latin alphabet
    correct: 1
  - question: In 'мама й тато' (mom and dad), 'й' is used instead of 'і'. What principle
      does this follow?
    options:
    - A random stylistic variation
    - Milozwuchnist — after vowel sounds, use the shorter form 'й' for smoother speech
    - A western Ukrainian dialect rule
    - Й is always used between two nouns
    correct: 1
  title: 'Choose the correct answer about two key Ukrainian pronunciation principles:
    мило'
