- id: wb-true-false-phonetics
  type: true-false
  instruction: Are these statements about Ukrainian sounds and letters true or false?
  items:
  - statement: Ukrainian has 33 letters and 38 sounds.
    correct: true
    explanation: The alphabet has 33 letters but 38 sounds — iotated letters (Я, Ю,
      Є, Ї) can spell two sounds, Ь has no sound, and many consonants have hard/soft
      pairs.
  - statement: The letter Ь (м'який знак / soft sign) represents the vowel sound [і].
    correct: false
    explanation: Ь represents NO sound of its own. Its only job is to soften the consonant
      that comes before it.
  - statement: In Ukrainian, 'голосний' (vowel) is a category that describes LETTERS.
    correct: false
    explanation: '''Голосний'' describes a SOUND — vowel sounds are produced with
      free airflow and can be sung. Letters only represent sounds.'
  - statement: Ukrainian spelling is mostly phonetic — what you see is generally what
      you hear.
    correct: true
    explanation: Unlike English (with silent letters like the 'k' in 'knife'), Ukrainian
      spelling reliably reflects pronunciation. Learners can read new words aloud
      after mastering the alphabet.
  - statement: In Ukrainian, voiced consonants at the end of a word become voiceless
      (devoiced).
    correct: false
    explanation: Ukrainian voiced consonants STAY voiced at word-end. 'Гриб' (mushroom)
      is always [гриб], NEVER [грип] — unlike Russian.
  - statement: The informal greeting 'Привіт' is appropriate to use with a teacher
      you have never met before.
    correct: false
    explanation: '''Привіт'' is only for friends and classmates (like Марко and Софія).
      Use formal time-of-day greetings — ''Добрий день'', ''Доброго ранку'' — with
      teachers and strangers.'
  title: Are these statements about Ukrainian sounds and letters true or false?
