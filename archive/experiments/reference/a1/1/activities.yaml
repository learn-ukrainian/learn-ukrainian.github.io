- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Choose the correct answer about Ukrainian sounds (звуки) and letters
    (літери)
  items:
  - question: In Ukrainian phonetics, what do we HEAR and PRONOUNCE?
    options:
    - Звуки (sounds)
    - Літери (letters)
    - Склади (syllables)
    - Слова (words)
    correct: 0
  - question: In Ukrainian phonetics, what do we SEE and WRITE?
    options:
    - Звуки (sounds)
    - Літери (letters)
    - Склади (syllables)
    - Слова (words)
    correct: 1
  - question: How many letters does the Ukrainian alphabet (абетка) have?
    options:
    - '26'
    - '30'
    - '33'
    - '38'
    correct: 2
  - question: How many sounds does the Ukrainian language have?
    options:
    - '26'
    - '33'
    - '38'
    - '42'
    correct: 2
  - question: Can we correctly say 'голосна літера' (vowel letter) in Ukrainian?
    options:
    - Yes — it is standard Ukrainian
    - No — 'голосний' names a SOUND, not a letter
    - Only in informal speech
    - Only for writing practice
    correct: 1
  - question: What is special about the letter Ь (м'який знак / soft sign)?
    options:
    - It sounds like the English letter Y
    - It represents the vowel [і]
    - It represents no sound — it only softens the consonant before it
    - It is not part of the modern Ukrainian alphabet
    correct: 2
  title: Choose the correct answer about Ukrainian sounds (звуки) and letters (літери)
