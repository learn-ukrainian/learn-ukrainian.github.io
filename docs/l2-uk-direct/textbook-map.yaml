  # --- KEY PEDAGOGICAL PATTERNS from pp.101-160 ---
  pedagogy_parts_of_speech:
    note: "Grade 3 teaches 4 parts of speech with formal analysis procedures"
    parts:
      - "Іменник (§33-36): ХТО?/ЩО? → рід, число, істота/неістота, власна/загальна"
      - "Прикметник (§37-42): ЯКИЙ?/ЯКА?/ЯКЕ?/ЯКІ? → рід, число, зв'язок з іменником"
      - "Числівник (§43-44): СКІЛЬКИ?/КОТРИЙ? → кількісний/порядковий"
      - "Дієслово (§45-48): ЩО РОБИТЬ?/РОБИВ?/БУДЕ РОБИТИ? → час, число, не окремо"
    key_insight: "Cases are introduced as question sequences (хто?/кого?/кому?/ким?/на кому?) but NEVER named as відмінки. This perfectly validates our question-word grammar approach."

