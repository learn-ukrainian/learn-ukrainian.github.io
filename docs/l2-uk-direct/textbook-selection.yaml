# Textbook Selection for RAG Database
# Selected: 2026-02-26
# Total: 115 books (42 humanities + 22 wave-1 STEM + 51 batch-3, #4593) from pidruchnyk.com.ua + Google Drive
# Strategy: 2 мова per grade, 1 literature (5-11), 1-2 history (5-11)
#
# PDF URL pattern: https://pidruchnyk.com.ua/uploads/book/{filename}.pdf
# Page URL pattern: https://pidruchnyk.com.ua/{slug}.html

# Selection criteria:
# 1. Newest NUS editions (2024-2025 State Standard aligned)
# 2. Author diversity: Большакова (1-2), mixed (3-4), Авраменко+Голуб/Караман (5-11)
# 3. Decolonized history: Щупак (5-8), Гісем+Хлібовська (9-11)
# 4. Two language books per grade for RAG diversity

