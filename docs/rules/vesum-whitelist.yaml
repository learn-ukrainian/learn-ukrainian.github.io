# VESUM False-Positive Whitelist (Global)
#
# Words that VESUM marks as "not found" but are valid in context.
# These are filtered out before reporting VESUM errors in the build pipeline.
#
# Format:
#   - word: "the word (lowercase)"
#     reason: "Why this is valid"
#     approved_by: "who approved (human name or 'auto')"
#
# Per-module whitelists: orchestration/{slug}/vesum-whitelist.yaml
# CLI: .venv/bin/python scripts/vesum_whitelist.py add --word "xyz" --reason "..."

words:
  - word: "зь"
    reason: "Consonant softening example (м'який знак + з) in phonetics modules"
    approved_by: "auto"

  - word: "ль"
    reason: "Consonant softening example (м'який знак + л) in phonetics modules"
    approved_by: "auto"

  - word: "нь"
    reason: "Consonant softening example (м'який знак + н) in phonetics modules"
    approved_by: "auto"

  - word: "ть"
    reason: "Consonant softening example (м'який знак + т) in phonetics modules"
    approved_by: "auto"

  - word: "морос"
    reason: "Appears in special-signs content as example fragment"
    approved_by: "auto"

  - word: "анок"
    reason: "Partial word fragment from stress-annotated text"
    approved_by: "auto"

  - word: "арно"
    reason: "Partial word fragment from stress-annotated text"
    approved_by: "auto"

  # POS abbreviations — grammatical metalanguage in glossaries (#1053)
  - word: "дієсл"
    reason: "POS abbreviation for дієслово (verb)"
    approved_by: "auto"
  - word: "прикм"
    reason: "POS abbreviation for прикметник (adjective)"
    approved_by: "auto"
  - word: "присл"
    reason: "POS abbreviation for прислівник (adverb)"
    approved_by: "auto"
  - word: "числ"
    reason: "POS abbreviation for числівник (numeral)"
    approved_by: "auto"
  - word: "спол"
    reason: "POS abbreviation for сполучник (conjunction)"
    approved_by: "auto"
  - word: "зам"
    reason: "POS abbreviation for займенник (pronoun)"
    approved_by: "auto"
  - word: "прийм"
    reason: "POS abbreviation for прийменник (preposition)"
    approved_by: "auto"
  - word: "част"
    reason: "POS abbreviation for частка (particle)"
    approved_by: "auto"
  - word: "виг"
    reason: "POS abbreviation for вигук (interjection)"
    approved_by: "auto"
