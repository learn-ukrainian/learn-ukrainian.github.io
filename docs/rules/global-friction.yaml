# Global Friction Log — project-wide linguistic and pedagogical constraints
# These apply to ALL modules across ALL tracks.
# Source: adversarial review findings that are universal, not module-specific.
#
# Schema:
#   id: unique identifier (gf-NNN)
#   status: active | resolved
#   type: linguistic | pedagogical | structural
#   description: what the constraint is
#   source: where this was discovered (issue/module/review)
#   date_added: ISO date

frictions:
  - id: gf-001
    status: active
    type: linguistic
    description: >
      сес-тра is a VALID word division per Правопис 2019 §49. Do NOT mark it
      as an error. Phonetic syllabification (се-стра) and typographic word
      division (сес-тра) follow different rules — both are correct in their
      respective contexts.
    source: "M05 review (syllables-and-word-division) — #969"
    date_added: "2026-03-17"

  - id: gf-002
    status: active
    type: linguistic
    description: >
      Ukrainian textbooks teach a hands-on-EARS test for voicing (закрий
      долонями вуха), NOT a hand-on-throat test. The hand-on-throat test is
      a valid phonetics technique but must NOT be attributed to Ukrainian
      textbooks. Source: Кравцова 2019, Grade 2, p.39.
    source: "M03 review (consonant-sounds) — #969"
    date_added: "2026-03-17"

  - id: gf-003
    status: resolved
    type: pedagogical
    description: >
      A1.1 modules (M01-M14) must NOT contain conjugated verbs. Fixed chunks
      like "дякую", "будь ласка", "до побачення" are exempt as memorized
      phrases. Verbs are formally introduced at M15.
    resolved_by: "morphological_validator.py no_verbs=True for A1.1 phase"
    source: "M04 review (completing-the-alphabet) — #969"
    date_added: "2026-03-17"

  - id: gf-004
    status: active
    type: linguistic
    description: >
      Do NOT invent Ukrainian words for minimal pairs. "Сір" is NOT a word
      meaning "grey" — the correct form is "сірий". Use verified minimal
      pairs only: кит/кіт, бити/біти, лис/ліс.
    source: "M02 review (vowel-sounds) — #969"
    date_added: "2026-03-17"

  - id: gf-007
    status: active
    type: pedagogical
    description: >
      NEVER frame Ukrainian as "lacking" or "missing" letters that Russian
      has. Ukrainian has its own 33-letter alphabet — it is complete. Do NOT
      write "Ukrainian lacks Ъ, Ы, Э" or "Ukrainian doesn't have these
      Russian letters." Instead, highlight what Ukrainian HAS: Ґ, Є, Ї, І
      are unique to Ukrainian. Present Ukrainian on its own terms.
    source: "M01 rebuild review — #975"
    date_added: "2026-03-18"

  - id: gf-005
    status: resolved
    type: linguistic
    description: >
      All stress marks must be verified against the ukrainian-word-stress
      dictionary. Common errors: яйце́ (not я́йце), молоко́ (not моло́ко),
      їжа́к (not ї́жак), дале́ко (not далеко́), при́голосні (not приголо́сні).
    resolved_by: "stress_verification.py in D.0 screen pipeline"
    source: "Stress verification tool — #961"
    date_added: "2026-03-17"

  - id: gf-006
    status: resolved
    type: pedagogical
    description: >
      Activity distractors/options must be real Ukrainian words verified
      against VESUM. Do NOT use misspelled words (м'асо, мьясо) or
      Russianisms (СОК, СОЛ) as distractors — they cause negative transfer
      and fail VESUM validation.
    resolved_by: "ACTIVITY_VESUM_FAIL check in content_quality_pipeline.py"
    source: "M01/M04 reviews — #969"
    date_added: "2026-03-17"

  - id: gf-008
    status: active
    type: structural
    description: >
      NO LLM filler phrases. Do NOT write: "Let us start with...",
      "Numbers unlock the real Ukraine", "You now possess a complete...",
      "It is incredibly versatile", "one of the most rewarding skills".
      Start sections with a dialogue, a question, or a concrete example —
      never with a generic motivational opener. If a sentence could appear
      in any language course about any topic, delete it.
    source: "A1 batch review aggregation — 6 findings across 48 modules (#1028)"
    date_added: "2026-03-25"

  - id: gf-009
    status: active
    type: pedagogical
    description: >
      Every exercise item must test something EXPLICITLY taught in the
      preceding prose. If an exercise tests the collocation "малювати
      картину", the prose must contain "малювати картину" as a taught
      example. Do NOT test collocations, vocabulary, or patterns that the
      learner has to infer — test what was taught.
    source: "A1 batch review aggregation — exercise quality findings (#1028)"
    date_added: "2026-03-25"

  - id: gf-010
    status: active
    type: structural
    description: >
      Quiz correct answers must be RANDOMIZED across positions. Do NOT
      place the correct answer at index 0 for all items. Distribute correct
      answers roughly evenly across all positions (0, 1, 2) to prevent
      pattern-guessing.
    source: "A1 M32 transport review — all 8 answers at index 0 (#1028)"
    date_added: "2026-03-25"

  - id: gf-011
    status: active
    type: pedagogical
    description: >
      Do NOT use spatial metaphors for abstract grammatical requirements.
      Example: "на" with musical instruments is NOT "on top of" — it is an
      abstract grammatical requirement that must be memorized. Misleading
      mnemonics cause incorrect generalizations. If a rule must simply be
      memorized, say so directly.
    source: "A1 M26 free-time review — pedagogical quality finding (#1028)"
    date_added: "2026-03-25"

  - id: gf-012
    status: active
    type: pedagogical
    description: >
      Memorized chunks are allowed before their grammar is formally taught.
      Natural Ukrainian expressions (Мені подобається, У мене є, Мене звати,
      Як справи?, Звідки ти?, Скільки коштує?, Мені ... років) can appear in
      ANY module as memorized chunks, even if the underlying grammar (dative,
      genitive, etc.) is not taught until later. This mirrors how Ukrainian
      children and L2 learners naturally acquire language. Do NOT flag these as
      forward-references. DO flag premature drilling of case paradigms,
      untaught vocabulary words, and grammar analysis before its module.
    source: "A1.2 plan review — Gemini flagged Мені подобається as forward-ref (2026-03-28)"
    date_added: "2026-03-28"

  - id: gf-013
    status: active
    type: pedagogical
    description: >
      Inline activity markers (<!-- INJECT_ACTIVITY: ... -->) must ONLY appear
      AFTER all concepts they test have been taught. If an activity tests both
      soft signs and apostrophes, it must appear after BOTH sections, not after
      the first one. This is critical in Ukrainian where apostrophe rules
      (б,п,в,м,ф,р + я,ю,є,ї) appear constantly — placing an apostrophe
      exercise before the apostrophe section teaches wrong sequencing.
      Rule: scan each activity's items and verify every tested concept has a
      preceding H2 section that teaches it.
    source: "M03 special-signs R1/R2 review — activity placed before apostrophe taught (2026-03-29)"
    date_added: "2026-03-29"

  - id: gf-014
    status: active
    type: linguistic
    description: >
      Euphony alternation у/в and і/й are MINOR stylistic issues, NEVER critical
      errors. Both forms are attested in published Ukrainian literature (GRAC corpus
      confirms). Правопис §23 gives rules, but authors regularly deviate in dialogue
      for rhythm, pause, and emphasis. Reviewers must NOT flag euphony as CRITICAL
      or fail a module for it. Mark as MINOR/WARNING at most. Example: "А у тебе?"
      and "А в тебе?" are both acceptable — prefer "в" per §23.2.6 but do not
      penalize "у". Verified with Gemini (native speaker perspective) and GRAC corpus.
    source: "M01 review — reviewer flagged 'А у тебе' as CRITICAL (2026-03-29)"
    date_added: "2026-03-29"
