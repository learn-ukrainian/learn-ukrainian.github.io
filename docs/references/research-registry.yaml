# Project Research Registry — ADR-011 (P1: data + validation only).
#
# One record per actionable research finding. Each record points to a tracked,
# compact digest under docs/references/research-digests/; content_hash is the
# canonical SHA-256 over that digest projection (see the validator for the exact
# normalization). NEVER edit content_hash by hand — after changing a digest run:
#
#   .venv/bin/python scripts/audit/check_research_registry.py --reconcile --id <record-id>
#
# Validate (read-only, CI/default):
#   .venv/bin/python scripts/audit/check_research_registry.py --check
#
# Schema: schemas/research_registry.schema.json (structural). Semantic invariants
# (lifecycle, provenance, typed-consumer resolution, ownership, copyright policy,
# cold-start caps) live in scripts/audit/check_research_registry.py.
