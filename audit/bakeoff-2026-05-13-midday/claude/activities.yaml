- id: act-2
  type: quiz
  title: Reflexive or transitive?
  instruction: Choose the verb form that fits each sentence — the transitive form
    (action on someone else) or the reflexive form (action on oneself).
  items:
  - question: Мама ____ дитину.
    options:
    - вмиває
    - вмивається
    answer: вмиває
  - question: Мама ____ перед роботою.
    options:
    - вмиває
    - вмивається
    answer: вмивається
  - question: Я ____ сина о сьомій.
    options:
    - прокидаю
    - прокидаюся
    answer: прокидаю
  - question: Я ____ о сьомій.
    options:
    - прокидаю
    - прокидаюся
    answer: прокидаюся
  - question: Тато ____ доньку.
    options:
    - одягає
    - одягається
    answer: одягає
  - question: Тато ____ швидко.
    options:
    - одягає
    - одягається
    answer: одягається
  - question: Учитель ____ учнів.
    options:
    - навчає
    - навчається
    answer: навчає
  - question: Я ____ вдома вранці.
    options:
    - навчаю
    - навчаюся
    answer: навчаюся
