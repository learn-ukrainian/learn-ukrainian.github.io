    options:
    - Спочатку
    - Потім
    - Нарешті
  - sentence: ____ вмиваюся.
    answer: Потім
    options:
    - Потім
    - Спочатку
    - Нарешті
  - sentence: ____ одягаюся.
    answer: Після цього
    options:
    - Після цього
    - Спочатку
    - Нарешті
  - sentence: ____ снідаю.
    answer: Потім
    options:
    - Потім
    - Спочатку
    - Нарешті
  - sentence: ____ йду на роботу.
    answer: Нарешті
    options:
    - Нарешті
