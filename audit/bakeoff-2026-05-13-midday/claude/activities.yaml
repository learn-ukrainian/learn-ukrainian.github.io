    - Потім
  - sentence: ____ збираюся.
    answer: Спочатку
    options:
    - Спочатку
    - Нарешті
    - Після цього
- id: act-4
  type: fill-in
  title: Describe your morning
  instruction: Complete each frame to describe your own morning. Use a verb from this
    module in the я-form.
  items:
  - sentence: Спочатку я ____ о сьомій.
    answer: прокидаюся
    options:
    - прокидаюся
    - вмиваюся
    - снідаю
  - sentence: Потім я ____ і одягаюся.
    answer: вмиваюся
    options:
    - вмиваюся
    - снідаю
    - йду
  - sentence: Нарешті я ____ до університету.
    answer: йду
    options:
    - йду
    - вмиваюся
    - снідаю
- id: act-5
  type: match-up
  title: Transitive ↔ reflexive pairs
  instruction: Match each transitive verb with its reflexive partner.
  pairs:
  - left: вмивати
    right: вмиватися
  - left: одягати
    right: одягатися
  - left: прокидати
    right: прокидатися
  - left: навчати
    right: навчатися
- id: act-6
  type: order
  title: Morning in order
  instruction: Put the morning steps into the correct chronological order.
  items:
  - Йду на роботу.
  - Прокидаюся.
  - Снідаю.
  - Одягаюся.
  - Вмиваюся.
  - Збираюся.
  correct_order:
  - 1
  - 4
  - 3
  - 2
  - 5
  - 0
- id: act-7
  type: unjumble
  title: Restore the sentence
  instruction: Reorder the words to form a correct Ukrainian sentence.
  items:
  - words:
    - о
    - Я
    - сьомій
    - прокидаюся
    correct: Я прокидаюся о сьомій
  - words:
    - вмиваюся
    - холодною
    - Я
    - водою
    correct: Я вмиваюся холодною водою
  - words:
    - до
    - Нарешті
    - йду
    - університету
    correct: Нарешті йду до університету
  - words:
    - швидко
    - Тато
    - одягається
    correct: Тато одягається швидко
- id: act-8
  type: true-false
  title: Pronunciation and spelling
  instruction: Decide whether each statement about Ukrainian pronunciation and morphology
    is true or false.
  items:
  - statement: Written -шся is pronounced as a single long soft [с':а].
    answer: true
  - statement: Written -ться is pronounced as a single long soft [ц':а].
    answer: true
  - statement: The verb прокидається is pronounced [прокидайец':а].
    answer: true
  - statement: The verb навчаєшся is pronounced with a clearly separate [ш] and [с].
    answer: false
  - statement: The reflexive suffix -ся is etymologically a short form of the pronoun
      себе.
    answer: true
  - statement: Снідати is a reflexive verb that ends in -ся.
    answer: false
- id: act-9
  type: error-correction
  title: Fix the verb form
  instruction: Each sentence contains an error in the verb form. Rewrite the sentence
    with the correct form.
  items:
  - sentence: Я вмивається о сьомій.
    errors:
    - вмивається
    corrected: Я вмиваюся о сьомій.
  - sentence: Ти прокидаюся рано.
    errors:
    - прокидаюся
    corrected: Ти прокидаєшся рано.
  - sentence: Він одягаюся швидко.
    errors:
    - одягаюся
    corrected: Він одягається швидко.
  - sentence: Я снідаюся о восьмій.
    errors:
    - снідаюся
    corrected: Я снідаю о восьмій.
  - sentence: Ми навчаюся вдома.
    errors:
    - навчаюся
    corrected: Ми навчаємося вдома.
  - sentence: Я йдуся на роботу.
    errors:
    - йдуся
    corrected: Я йду на роботу.
- id: act-10
  type: translate
  title: Translate the morning
  instruction: Translate each English sentence into Ukrainian using verbs from this
    module.
  items:
  - source: I wake up at seven.
    target: Я прокидаюся о сьомій.
  - source: First I wash and get dressed.
    target: Спочатку я вмиваюся і одягаюся.
  - source: Then I have breakfast.
    target: Потім я снідаю.
  - source: Finally I head to work.
    target: Нарешті я йду на роботу.
  - source: On Saturday I wake up late.
    target: У суботу я прокидаюся пізно.
