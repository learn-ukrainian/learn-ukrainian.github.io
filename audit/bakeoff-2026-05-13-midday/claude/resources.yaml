- title: Караман, 10 клас, с. 176
  notes: 'Зворотні дієслова: суфікс -ся(-сь) означає дію, спрямовану на себе; історично
    — давня коротка форма зворотного займенника себе в Зн. в. однини (Я ся не бою
    — діал. = Я не боюся). Verbatim chunk 10-klas-ukrmova-karaman-2018_s0315, retrieved
    via mcp__sources__search_text.'
- title: Захарійчук, 4 клас, с. 162-163
  notes: 'Вимова та правопис дієслів на -ся: таблиця [прокидайец'':а] прокидається
    / [спиен айес'':а] спиняєшся; вірш Дмитра Білоуса ''Закон письма і вимови вивчай:
    написано -шся, а ти [с'':а] вимовляй''. Verbatim chunk 4-klas-ukrmova-zaharijchuk_s0162.'
- title: Кравцова, 4 клас, с. 112-113
  notes: 'Вступ до зворотних дієслів через контраст транзитивної та зворотної дії:
    умивати (когось) ↔ умиватися (себе); обливати ↔ обливатися; розчісувати ↔ розчісуватися.
    Chunk 4-klas-ukrayinska-mova-kravtsova-2021-1_s0110.'
- title: Авраменко, 7 клас, с. 67
  notes: 'Корелятивне підтвердження правила: ''-ться [ц'':а] пишуться [пишуц'':а];
