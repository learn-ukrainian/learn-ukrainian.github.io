- id: act-01
  type: quiz
  instruction: Оберіть правильну форму.
  items:
  - prompt: Коли ти ___?
    options:
    - прокидаєшся
    - прокидаюся
    - прокидається
    answer: прокидаєшся
  - prompt: Я ___ о сьомій.
    options:
    - прокидаюся
    - прокидаєшся
    - прокидається
    answer: прокидаюся
  - prompt: Вона ___ швидко.
    options:
    - одягаюся
    - одягаєшся
    - одягається
    answer: одягається
  - prompt: Я ___ на роботу.
    options:
    - йду
    - йдеш
    - йде
    answer: йду
  - prompt: Ти ___ каву.
    options:
    - п'ю
    - п'єш
    - п'є
    answer: п'єш
  - prompt: Він ___ пізно.
    options:
    - встаю
    - встаєш
    - встає
    answer: встає
  - prompt: Настя ___ вранці.
    options:
    - навчаюся
    - навчаєшся
    - навчається
    answer: навчається
  - prompt: Ліна не ___.
    options:
    - поспішаю
    - поспішаєш
    - поспішає
    answer: поспішає
