case_id: pr-2038-m20-three-fixes
pr_number: 2038
title: "m20 three fixes for vesum_verified and textbook_grounding"
diff_path: corpus/pr-2038-m20-three-fixes.diff
context: |
  This PR bundles three small fixes for the m20 pipeline: a VESUM reviewer
  scope leak, a textbook-grounding plan reference issue, and quote cleanup in
  metalinguistic stripping. Each fix corresponds to a separate regression that
  should be visible in a careful code review of the diff.

  Reviewers should look for whether the patch fully addresses each regression
  without moving the checks to a weaker signal or leaving edge cases in the
  text-cleaning path.
# Removed stale finding `textbook-grounding-plan-reference-swap` because the PR successfully swapped all plan references to the corrected chunks.
gold_findings:
  - id: vesum-exclusion-mask-leak-globally-ignores-words
    severity: HIGH
    category: correctness
    location: scripts/build/linear_pipeline.py:3456
    description: >
      The global unmatched anchors exclusion ignores any word the reviewer tried and failed to fix across the entire module text. This silently masks legitimate VESUM failures if a misspelled word happens to appear within an unmatched reviewer anchor.
  - id: warning-quote-regex-misses-typographical-quotes-and-ukrainian-not
    severity: MEDIUM
    category: correctness
    location: scripts/build/linear_pipeline.py:491
    description: >
      The _WARNING_QUOTE_RE regex hardcodes the English word "not" and misses the Ukrainian equivalent "не". It also fails to match curly typographical quotes (“”), leaving significant edge cases in the text cleaning path.
