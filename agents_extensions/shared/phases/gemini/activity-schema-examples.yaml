# Activity YAML examples — one per type, exact schema
# Used by v6 activities prompt to show the LLM correct field names

- type: quiz
  title: "Apostrophe Rules"
  items:
    - question: "Which Ukrainian word means meat?"
      options:
        - text: "м'ясо"
          correct: true
        - text: "молоко"
          correct: false
      explanation: "М'ясо means meat."

- type: match-up
  title: "Voiced and Voiceless Partners"
  pairs:
    - left: "Б"
      right: "П"
    - left: "Д"
      right: "Т"
    - left: "З"
      right: "С"
    - left: "Ж"
      right: "Ш"
    - left: "Г"
      right: "Х"
    - left: "Ґ"
      right: "К"

- type: fill-in
  title: "Complete the Word"
  items:
    - sentence: "Це мій ___."
      answer: "дім"
      options: ["дім", "дом", "дам"]

- type: group-sort
  title: "Sonorant or Not?"
  groups:
    - name: "Сонорні"
      items: ["М", "Н", "Л", "Р", "В"]
    - name: "Не сонорні"
      items: ["Б", "Д", "З", "Ж", "Г"]

- type: classify
  title: "Find the Soft Sign"
  categories:
    - label: "Soft Н (Н + Ь)"
      items: ["день", "кінь", "осінь"]
    - label: "Soft Л (Л + Ь)"
      items: ["сіль", "Львів"]
    - label: "No soft sign"
      items: ["час", "цукор"]

- type: true-false
  title: "True or False?"
  items:
    - statement: "Б is a voiced consonant."
      correct: true
    - statement: "Ш is a sonorant consonant."
      correct: false

- type: watch-and-repeat
  title: "Pronunciation Practice"
  items:
    - letter: "М"
      word: "мама"
      video: "https://www.youtube.com/watch?v=Ez95H4ibuJo"
      note: "Press your lips together."

- type: image-to-letter
  title: "Picture to Letter"
  items:
    - emoji: "🐝"
      answer: "Б"
      distractors: ["П", "В"]
      note: "бджола starts with Б"

- type: anagram
  title: "Unscramble"
  items:
    - scrambled: "імд"
      answer: "дім"

- type: unjumble
  title: "Put in Order"
  items:
    - words: ["мій", "Це", "дім"]
      answer: "Це мій дім"
