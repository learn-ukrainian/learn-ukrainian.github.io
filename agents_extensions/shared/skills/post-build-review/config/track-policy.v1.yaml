review_protocol_version: 2.0.1
deterministic_contract_version: 1.2.0
semantic_prompt_version: 2.0.0
track_policy_version: 1.2.1

defaults:
  semantic_requirements:
    learner_evidence_ledger: required_when_applicable
    workflow_leakage_review: required
    modality_capability_provenance: required
  mechanical_checks:
    learner_workflow_leakage:
      severity: medium
      patterns:
        - id: accepted-dossier-or-package
          regex: '(?:доступн\w*|прийнят\w*)\s+(?:дослідницьк\w*\s+)?(?:пакет\w*|досьє\w*)'
        - id: project-corpus
          regex: 'проєктн\w*\s+(?:літературн\w*\s+)?корпус\w*'
        - id: internal-search-result
          regex: 'у\s+цьому\s+пошуку\s+не\s+знайдено'
    evidence_requirements:
      - id: audio-dependent-task
        modality: audio
        regex: '(?:прослух(?:ай(?:те)?|овуванн\w*|ати|овуй\w*|овуват\w*)|слухай(?:те)?|аудіо\w*|часов\w*\s+позначк\w*|(?:ви|де|що)\s+чуєте\b|виразно\s+почут\w*\s+(?:слов|звук|нот|фраз|акорд)\w*)'
      - id: video-dependent-task
        modality: video
        regex: '(?:дивіться|переглян\w*|відео\w*|екранн\w*\s+момент\w*)'
      - id: image-dependent-task
        modality: image
        regex: '(?:розгляньте|проаналізуйте)\s+(?:зображенн\w*|фотограф\w*|портрет\w*)'

families:
  core:
    semantic_prompt: agents_extensions/shared/skills/post-build-review/prompts/core-semantic-review-prompt.md
    semantic_requirements:
      claim_coverage: not_applicable
      verify_ukrainian_with_project_sources: true
      review_plan_pedagogy_activities: true
    size_policy_signal_severities:
      missing_plan_word_target: high
      invalid_size_policy: high
      plan_review_needed: high
      below_plan_floor: high
      repetitive_authored_prose: medium
      over_advisory_ceiling: info
      exceptional_justification_required: info
    mechanical_checks:
      connects_to_sequence:
        severity: high
      forbidden_placeholders:
        - path: portrait_fallback.license
          values: [VERIFY, TODO, TBD, UNKNOWN]
          category: unresolved_rights
          severity: high
          message: Public-media rights remain unresolved.
    skip_policy:
      llm_qg: superseded_by_semantic
      mdx_generation_validate: accepted_read_only_omission
      external_resource_liveness: advisory_external
  seminar:
    semantic_prompt: agents_extensions/shared/skills/post-build-review/prompts/seminar-semantic-review-prompt.md
    semantic_requirements:
      claim_coverage: exhaustive
      verify_ukrainian_with_project_sources: true
      verify_every_factual_claim: true
      decolonization_review: required
    size_policy_signal_severities:
      missing_plan_word_target: high
      invalid_size_policy: high
      missing_dossier: high
      plan_review_needed: high
      below_plan_floor: high
      repetitive_authored_prose: medium
      over_advisory_ceiling: info
      exceptional_justification_required: info
    mechanical_checks:
      connects_to_sequence:
        severity: high
      forbidden_placeholders:
        - path: portrait_fallback.license
          values: [VERIFY, TODO, TBD, UNKNOWN]
          category: unresolved_rights
          severity: high
          message: Public-media rights remain unresolved; use text-only until cleared.
    skip_policy:
      llm_qg: superseded_by_semantic
      mdx_generation_validate: accepted_read_only_omission
      external_resource_liveness: advisory_external

tracks:
  a1: {family: core}
  a2: {family: core}
  b1: {family: core}
  b2: {family: core}
  c1: {family: core}
  c2: {family: core}
  folk: {family: seminar}
  hist: {family: seminar}
  history: {family: seminar}
  bio: {family: seminar, semantic_mode: biography}
  istorio: {family: seminar}
  lit: {family: seminar}
  lit-crimea: {family: seminar}
  lit-doc: {family: seminar}
  lit-drama: {family: seminar}
  lit-essay: {family: seminar}
  lit-fantastika: {family: seminar}
  lit-hist-fic: {family: seminar}
  lit-humor: {family: seminar}
  lit-war: {family: seminar}
  lit-youth: {family: seminar}
  oes: {family: seminar}
  ruth: {family: seminar}
