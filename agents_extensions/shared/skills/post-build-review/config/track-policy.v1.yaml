review_protocol_version: 5.0.2
deterministic_contract_version: 1.2.1
semantic_prompt_version: 5.0.2
track_policy_version: 1.9.0

score_calibration:
  bands:
    PASS:
      minimum: 8.0
      maximum: 10.0
      includes_maximum: true
    REVISE:
      minimum: 6.0
      maximum: 8.0
      includes_maximum: false
    BLOCK:
      minimum: 0.0
      maximum: 6.0
      includes_maximum: false

defaults:
  semantic_requirements:
    learner_evidence_ledger: required_when_applicable
    workflow_leakage_review: required
    modality_capability_provenance: required
  mechanical_checks:
    learner_workflow_leakage:
      severity: high
      patterns:
        - id: accepted-dossier-or-package
          regex: '(?:доступн\w*|прийнят\w*)\s+(?:дослідницьк\w*\s+)?(?:пакет\w*|досьє\w*)'
        - id: project-corpus
          regex: 'проєктн\w*\s+(?:літературн\w*\s+)?корпус\w*'
        - id: internal-search-result
          regex: 'у\s+цьому\s+пошуку\s+не\s+знайдено'
        - id: evidence-map
          regex: 'карт\w*\s+доказ\w*'
        - id: atomic-claim
          regex: 'атомарн\w*\s+твердженн\w*'
        - id: source-boundary
          regex: 'джерельн\w*\s+меж\w*'
        - id: evidence-boundary
          regex: 'меж\w*\s+доказ\w*'
        - id: unread-archive-item
          regex: 'зміст\w*\s+непрочитан\w*\s+(?:справ|документ)\w*'
        - id: title-body-reconciliation
          regex: '(?:заголовок\w*[^.\n]{0,80}основн\w*\s+текст\w*|основн\w*\s+текст\w*[^.\n]{0,80}заголовок\w*)'
        - id: learner-level-meta
          families: [seminar]
          category: learner_level_meta_leakage
          severity: medium
          issue_id: LEARNER_LEVEL_META_LEAKAGE
          message: >-
            Internal target-level metadata leaked into seminar learner prose;
            preserve the substantive instruction without narrating its CEFR calibration.
          include_yaml_keys: [note, notes, description, instruction, instructions, caption]
          yaml_key_filter_path_regex: '(?:^|/)resources\.ya?ml$'
          regex: >-
            (?:(?:на\s+рівні|для\s+рівня)\s+(?:A1|A2|B1|B2|C1|C2)\+?\b|для\s+(?:(?:учн|читач|дослідник)\w*\s+)?(?:A1|A2|B1|B2|C1|C2)\+?(?:-рівн\w*)?\b|(?:A1|A2|B1|B2|C1|C2)\+?-(?:читач|учн|дослідник|відповід|лексик|семінар)\w*\b|мовн\w*\s+(?:якість\s+)?(?:A1|A2|B1|B2|C1|C2)\+?\b|мов\w*\s+(?:рівня\s+)?(?:A1|A2|B1|B2|C1|C2)\+?\b|(?:A1|A2|B1|B2|C1|C2)\+?\s+(?:лексик|учн|читач|дослідник)\w*\b)
    evidence_requirements:
      - id: audio-dependent-task
        modality: audio
        regex: '(?:прослух(?:ай(?:те)?|овуванн\w*|ати|овуй\w*|овуват\w*)|слухай(?:те)?|аудіо\w*|часов\w*\s+позначк\w*|(?:ви|де|що)\s+чуєте\b|виразно\s+почут\w*\s+(?:слов|звук|нот|фраз|акорд)\w*)'
        exclude_line_regex: '(?:необов''язков\w*|не\s+оціню\w*|не\s+використову\w*\s+в\s+оцінюван\w*\s+завданн\w*)'
      - id: video-dependent-task
        modality: video
        regex: '(?:дивіться|подивіться|переглян\w*|(?:відкрийте|проаналізуйте|порівняйте|опишіть)\s+[^.\n]{0,60}відео\w*|екранн\w*\s+момент\w*)'
        exclude_line_regex: '(?:необов''язков\w*|не\s+оціню\w*|не\s+використову\w*\s+в\s+оцінюван\w*\s+завданн\w*)'
      - id: image-dependent-task
        modality: image
        regex: '(?:розгляньте|проаналізуйте)\s+(?:зображенн\w*|фотограф\w*|портрет\w*)'
        exclude_line_regex: '(?:необов''язков\w*|не\s+оціню\w*|не\s+використову\w*\s+в\s+оцінюван\w*\s+завданн\w*)'

families:
  core:
    semantic_prompt: agents_extensions/shared/skills/post-build-review/prompts/core-semantic-review-prompt.md
    semantic_requirements:
      claim_coverage: not_applicable
      verify_ukrainian_with_project_sources: true
      review_plan_pedagogy_activities: true
    size_policy_signal_severities:
      missing_plan_word_target: high
      invalid_size_policy: high
      plan_review_needed: high
      below_plan_floor: high
      repetitive_authored_prose: medium
      over_advisory_ceiling: info
      exceptional_justification_required: info
    mechanical_checks:
      connects_to_sequence:
        severity: high
      forbidden_placeholders:
        - path: portrait_fallback.license
          values: [VERIFY, TODO, TBD, UNKNOWN]
          category: unresolved_rights
          severity: high
          message: Public-media rights remain unresolved.
    skip_policy:
      llm_qg: capabilities_absorbed_by_semantic_v5
      mdx_generation_validate: accepted_read_only_omission
      external_resource_liveness: advisory_external
  seminar:
    semantic_prompt: agents_extensions/shared/skills/post-build-review/prompts/seminar-semantic-review-prompt.md
    semantic_requirements:
      claim_coverage: exhaustive
      verify_ukrainian_with_project_sources: true
      verify_every_factual_claim: true
      decolonization_review: required
    size_policy_signal_severities:
      missing_plan_word_target: high
      invalid_size_policy: high
      missing_dossier: high
      plan_review_needed: high
      below_plan_floor: high
      repetitive_authored_prose: medium
      over_advisory_ceiling: info
      exceptional_justification_required: info
    mechanical_checks:
      connects_to_sequence:
        severity: high
      forbidden_placeholders:
        - path: portrait_fallback.license
          values: [VERIFY, TODO, TBD, UNKNOWN]
          category: unresolved_rights
          severity: high
          message: Public-media rights remain unresolved; use text-only until cleared.
    skip_policy:
      llm_qg: capabilities_absorbed_by_semantic_v5
      mdx_generation_validate: accepted_read_only_omission
      external_resource_liveness: advisory_external

selectors:
  tracks: {}
  manifest_types:
    core: core
    track: seminar
track_overrides:
  bio:
    semantic_mode: biography
