review_protocol_version: 3.0.0
deterministic_contract_version: 1.2.1
semantic_prompt_version: 3.0.0
track_policy_version: 1.5.0

defaults:
  semantic_requirements:
    learner_evidence_ledger: required_when_applicable
    workflow_leakage_review: required
    modality_capability_provenance: required
  mechanical_checks:
    learner_workflow_leakage:
      severity: high
      patterns:
        - id: accepted-dossier-or-package
          regex: '(?:写芯褋褌褍锌薪\w*|锌褉懈泄薪褟褌\w*)\s+(?:写芯褋谢褨写薪懈褑褜泻\w*\s+)?(?:锌邪泻械褌\w*|写芯褋褜褦\w*)'
        - id: project-corpus
          regex: '锌褉芯褦泻褌薪\w*\s+(?:谢褨褌械褉邪褌褍褉薪\w*\s+)?泻芯褉锌褍褋\w*'
        - id: internal-search-result
          regex: '褍\s+褑褜芯屑褍\s+锌芯褕褍泻褍\s+薪械\s+蟹薪邪泄写械薪芯'
        - id: evidence-map
          regex: '泻邪褉褌\w*\s+写芯泻邪蟹\w*'
        - id: atomic-claim
          regex: '邪褌芯屑邪褉薪\w*\s+褌胁械褉写卸械薪薪\w*'
        - id: source-boundary
          regex: '写卸械褉械谢褜薪\w*\s+屑械卸\w*'
        - id: evidence-boundary
          regex: '屑械卸\w*\s+写芯泻邪蟹\w*'
        - id: unread-archive-item
          regex: '蟹屑褨褋褌\w*\s+薪械锌褉芯褔懈褌邪薪\w*\s+(?:褋锌褉邪胁|写芯泻褍屑械薪褌)\w*'
        - id: title-body-reconciliation
          regex: '(?:蟹邪谐芯谢芯胁芯泻\w*[^.\n]{0,80}芯褋薪芯胁薪\w*\s+褌械泻褋褌\w*|芯褋薪芯胁薪\w*\s+褌械泻褋褌\w*[^.\n]{0,80}蟹邪谐芯谢芯胁芯泻\w*)'
    evidence_requirements:
      - id: audio-dependent-task
        modality: audio
        regex: '(?:锌褉芯褋谢褍褏(?:邪泄(?:褌械)?|芯胁褍胁邪薪薪\w*|邪褌懈|芯胁褍泄\w*|芯胁褍胁邪褌\w*)|褋谢褍褏邪泄(?:褌械)?|邪褍写褨芯\w*|褔邪褋芯胁\w*\s+锌芯蟹薪邪褔泻\w*|(?:胁懈|写械|褖芯)\s+褔褍褦褌械\b|胁懈褉邪蟹薪芯\s+锌芯褔褍褌\w*\s+(?:褋谢芯胁|蟹胁褍泻|薪芯褌|褎褉邪蟹|邪泻芯褉写)\w*)'
        exclude_line_regex: '(?:薪械芯斜芯胁''褟蟹泻芯胁\w*|薪械\s+芯褑褨薪褞\w*|薪械\s+胁懈泻芯褉懈褋褌芯胁褍\w*\s+胁\s+芯褑褨薪褞胁邪薪\w*\s+蟹邪胁写邪薪薪\w*)'
      - id: video-dependent-task
        modality: video
        regex: '(?:写懈胁褨褌褜褋褟|锌芯写懈胁褨褌褜褋褟|锌械褉械谐谢褟薪\w*|(?:胁褨写泻褉懈泄褌械|锌褉芯邪薪邪谢褨蟹褍泄褌械|锌芯褉褨胁薪褟泄褌械|芯锌懈褕褨褌褜)\s+[^.\n]{0,60}胁褨写械芯\w*|械泻褉邪薪薪\w*\s+屑芯屑械薪褌\w*)'
        exclude_line_regex: '(?:薪械芯斜芯胁''褟蟹泻芯胁\w*|薪械\s+芯褑褨薪褞\w*|薪械\s+胁懈泻芯褉懈褋褌芯胁褍\w*\s+胁\s+芯褑褨薪褞胁邪薪\w*\s+蟹邪胁写邪薪薪\w*)'
      - id: image-dependent-task
        modality: image
        regex: '(?:褉芯蟹谐谢褟薪褜褌械|锌褉芯邪薪邪谢褨蟹褍泄褌械)\s+(?:蟹芯斜褉邪卸械薪薪\w*|褎芯褌芯谐褉邪褎\w*|锌芯褉褌褉械褌\w*)'
        exclude_line_regex: '(?:薪械芯斜芯胁''褟蟹泻芯胁\w*|薪械\s+芯褑褨薪褞\w*|薪械\s+胁懈泻芯褉懈褋褌芯胁褍\w*\s+胁\s+芯褑褨薪褞胁邪薪\w*\s+蟹邪胁写邪薪薪\w*)'

families:
  core:
    semantic_prompt: agents_extensions/shared/skills/post-build-review/prompts/core-semantic-review-prompt.md
    semantic_requirements:
      claim_coverage: not_applicable
      verify_ukrainian_with_project_sources: true
      review_plan_pedagogy_activities: true
    size_policy_signal_severities:
      missing_plan_word_target: high
      invalid_size_policy: high
      plan_review_needed: high
      below_plan_floor: high
      repetitive_authored_prose: medium
      over_advisory_ceiling: info
      exceptional_justification_required: info
    mechanical_checks:
      connects_to_sequence:
        severity: high
      forbidden_placeholders:
        - path: portrait_fallback.license
          values: [VERIFY, TODO, TBD, UNKNOWN]
          category: unresolved_rights
          severity: high
          message: Public-media rights remain unresolved.
    skip_policy:
      llm_qg: capabilities_absorbed_by_semantic_v3
      mdx_generation_validate: accepted_read_only_omission
      external_resource_liveness: advisory_external
  seminar:
    semantic_prompt: agents_extensions/shared/skills/post-build-review/prompts/seminar-semantic-review-prompt.md
    semantic_requirements:
      claim_coverage: exhaustive
      verify_ukrainian_with_project_sources: true
      verify_every_factual_claim: true
      decolonization_review: required
    size_policy_signal_severities:
      missing_plan_word_target: high
      invalid_size_policy: high
      missing_dossier: high
      plan_review_needed: high
      below_plan_floor: high
      repetitive_authored_prose: medium
      over_advisory_ceiling: info
      exceptional_justification_required: info
    mechanical_checks:
      connects_to_sequence:
        severity: high
      forbidden_placeholders:
        - path: portrait_fallback.license
          values: [VERIFY, TODO, TBD, UNKNOWN]
          category: unresolved_rights
          severity: high
          message: Public-media rights remain unresolved; use text-only until cleared.
    skip_policy:
      llm_qg: capabilities_absorbed_by_semantic_v3
      mdx_generation_validate: accepted_read_only_omission
      external_resource_liveness: advisory_external

selectors:
  tracks: {}
  manifest_types:
    core: core
    track: seminar
track_overrides:
  bio:
    semantic_mode: biography
