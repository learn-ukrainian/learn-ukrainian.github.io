  - bug_id: ukrainian-apostrophe-glyph-broke-exact-claim-binding
    responsible_layer: deterministic_code
    fixed_in_version: 6.0.2
    version_field: review_protocol_version
    input: >-
      A claim is an exact contiguous statement substring except that the
      provider emits ASCII apostrophe where the packet uses right single quote.
    expected: >-
      Treat only the three Ukrainian apostrophe glyphs ', ’, and ʼ as
      equivalent while continuing to reject lexical or other punctuation drift.
  - bug_id: clear-alignment-entry-carried-finding-id
    responsible_layer: schema
    fixed_in_version: 6.0.3
    version_field: review_protocol_version
    input: >-
      A provider marks an alignment class CLEAR while attaching an unrelated
      material finding ID, or marks FOUND or INCOMPLETE without any finding ID.
    expected: >-
      Reject the contradictory object at the provider schema boundary: CLEAR
      owns no finding IDs, while FOUND and INCOMPLETE each own at least one.
  - bug_id: prompt-left-alignment-status-cardinality-ambiguous
    responsible_layer: semantic_prompt
    fixed_in_version: 6.0.4
    version_field: semantic_prompt_version
    input: >-
      A source-backed review discovers a SOURCE_TRACEABILITY defect but places
      its ID under PLAN_INSTRUCTION_LEAKAGE while leaving that class CLEAR.
    expected: >-
      Tell the reviewer explicitly that CLEAR requires an empty finding_ids
      array and FOUND or INCOMPLETE requires one or more correctly owned IDs.
  - bug_id: pass-band-admitted-score-below-publication-target
    responsible_layer: track_policy
    fixed_in_version: 2.1.0
    version_field: track_policy_version
    input: >-
      A dimension receives 8.0–8.9 while its categorical status remains PASS,
      even though the documented publication-quality target is 9.0.
    expected: >-
      Calibrate PASS to [9.0, 10.0] and REVISE to [6.0, 9.0), preserving the
      categorical fail-closed disposition rather than introducing an average.
  - bug_id: no-findings-defaulted-every-dimension-to-perfect
    responsible_layer: semantic_prompt
    fixed_in_version: 6.0.5
    version_field: semantic_prompt_version
    input: >-
      The reviewer finds no material defect and copies five 10.0 scores from
      the response example without identifying exceptional positive evidence.
    expected: >-
      Use 9.x PASS examples with a bounded low/info improvement backlog, and
      reserve 10.0 for explicitly justified exceptional quality.
  - bug_id: perfect-score-lacked-independent-positive-anchors
    responsible_layer: disposition
    fixed_in_version: 6.0.4
    version_field: review_protocol_version
    input: >-
      A dimension claims 10.0 from one generic compliment or from the absence
      of linked findings.
    expected: >-
      Reject the response unless the dimension has no linked findings, cites
      at least two distinct positive evidence anchors, and gives a positive
      exceptional-quality rationale.
  - bug_id: subperfect-score-omitted-linked-finding-locator
    responsible_layer: semantic_prompt
    fixed_in_version: 6.0.6
    version_field: semantic_prompt_version
    input: >-
      A reviewer assigns a 9.x score and links a low-severity finding, but the
      dimension evidence cites only positive anchors elsewhere in the module.
    expected: >-
      Require the dimension evidence to repeat one linked finding's exact
      target path and line so the numeric gap remains auditable and the
      fail-closed validator can accept the response without repair.
