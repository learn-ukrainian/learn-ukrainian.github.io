    fixed_in_version: 1.0.1
    version_field: review_protocol_version
    input: Deterministic track audit status error with result null.
    expected: Prompt assembly preserves null evidence and aggregate status INCOMPLETE without raising AttributeError.
  - bug_id: venv-python-symlink-bypassed-environment
    responsible_layer: deterministic_code
    fixed_in_version: 1.0.1
    version_field: deterministic_contract_version
    input: Repository .venv/bin/python is a symlink to a host interpreter.
    expected: Execute through the .venv entrypoint path so pyvenv.cfg and project dependencies remain active.
  - bug_id: markdown-syntax-inflated-module-floor
    responsible_layer: deterministic_code
    fixed_in_version: 1.1.0
    version_field: deterministic_contract_version
    input: Markdown comments, frontmatter, URLs, link targets, component syntax, and injection markers around a short lesson.
    expected: Only learner-visible authored instructional words satisfy the exact plan floor; quoted primary-source words remain separate.
  - bug_id: repeated-authored-prose-passed-inside-band
    responsible_layer: track_policy
    fixed_in_version: 1.1.0
    version_field: track_policy_version
    input: Two exact or near-duplicate authored paragraphs of at least 40 words inside the nominal size band.
    expected: Structured repetition evidence produces a medium finding and combined disposition REVISE.
  - bug_id: below-floor-status-was-not-post-build-blocking
    responsible_layer: track_policy
    fixed_in_version: 1.1.0
    version_field: track_policy_version
    input: Authored instructional prose is one word below the reviewed plan floor.
    expected: Exact floor violation produces a high mechanical finding and combined disposition BLOCK.
  - bug_id: size-policy-mismatch-was-auto-expanded
    responsible_layer: orchestration
    fixed_in_version: 1.1.0
    version_field: deterministic_contract_version
    input: Draft contains SIZE_POLICY_MISMATCH because grounded evidence is exhausted below the plan floor.
    expected: Writer precheck preserves plan-review and below-floor signals and never invokes automatic expansion.
  - bug_id: semantic-duplicate-json-manually-normalized
    responsible_layer: orchestration
    fixed_in_version: 2.0.0
    version_field: review_protocol_version
    input: Two JSON objects or a Markdown-wrapped reviewer response followed by a hand-cleaned PASS object.
    expected: Hash and parse the exact raw response; emit schema-valid INCOMPLETE without selecting or repairing an object.
  - bug_id: semantic-claim-count-without-ledger
    responsible_layer: schema
    fixed_in_version: 2.0.0
    version_field: review_protocol_version
    input: A reviewer declares 65 checked claims but supplies only 28 atomic ledger entries.
    expected: Contract-invalid response and structured INCOMPLETE; counts must derive from the ledger.
  - bug_id: semantic-response-provenance-discarded
    responsible_layer: schema
    fixed_in_version: 2.0.0
    version_field: review_protocol_version
    input: A result lacks the SHA-256, byte count, parser status, and contract status of the raw response.
    expected: Schema validation failure.
  - bug_id: malyshko-learner-workflow-leakage
    responsible_layer: track_policy
    fixed_in_version: 1.2.0
    version_field: track_policy_version
    input: Learner prose refers to an accepted research dossier, available package, or project corpus.
    expected: Generic mechanical learner_workflow_leakage finding; no person-specific heading or conclusion is global policy.
  - bug_id: plan-adherence-excused-workflow-leakage
    responsible_layer: semantic_prompt
    fixed_in_version: 2.0.0
    version_field: semantic_prompt_version
    input: A plan rewards source evaluation and the built lesson turns into an internal source-audit tutorial.
    expected: High pedagogy finding and REVISE; plan adherence cannot excuse learner-facing workflow leakage.
  - bug_id: source-audit-vocabulary-escaped-mechanical-policy
    responsible_layer: track_policy
    fixed_in_version: 1.3.0
    version_field: track_policy_version
    input: Learner prose teaches evidence maps, atomic claims, source boundaries, unread-file cautions, or title/body reconciliation without naming a dossier or package.
    expected: Generic mechanical learner_workflow_leakage findings for each source-audit pattern.
  - bug_id: maiboroda-media-dependency-not-inventoried
    responsible_layer: deterministic_code
    fixed_in_version: 1.2.0
    version_field: deterministic_contract_version
    input: Listening tasks and timestamped model answers are present in learner content and activities.
    expected: Deterministic preparation inventories the audio modality and exact learner-surface locations for semantic review.
  - bug_id: maiboroda-perceptual-claims-without-modality-proof
    responsible_layer: semantic_prompt
    fixed_in_version: 2.0.0
    version_field: semantic_prompt_version
    input: Catalog metadata plus exact auditory timestamps, breaths, contour, stress, accompaniment, and cadence.
    expected: Metadata supports catalog facts only; absent audio-capable verification the result is INCOMPLETE.
  - bug_id: concurrent-review-global-tmp-collision
    responsible_layer: orchestration
    fixed_in_version: 2.0.1
    version_field: review_protocol_version
    input: Two reviews prepare and finalize concurrently for different module targets.
    expected: Each invocation receives a distinct run directory whose packet, exact semantic response, and result cannot cross targets.
  - bug_id: folk-productive-performance-misclassified-as-supplied-audio
    responsible_layer: track_policy
    fixed_in_version: 1.2.1
    version_field: track_policy_version
    input: Descriptive prose about listeners plus a learner-created vocal performance with show_record_button metadata.
    expected: No supplied-audio requirement; productive-task metadata never proves media access, while explicit listening and timestamp tasks remain inventoried.
  - bug_id: bilash-modality-vocabulary-forced-fabricated-evidence
    responsible_layer: track_policy
    fixed_in_version: 1.2.2
    version_field: track_policy_version
    input: Biographical prose mentions hearing/listeners and text tasks explain that catalog metadata cannot verify video.
    expected: Do not inventory audio or video unless learner-facing language actually requires listening, viewing, or perceptual evidence.
  - bug_id: audiovisual-medium-misclassified-as-audio-task
    responsible_layer: track_policy
    fixed_in_version: 2.0.1
    version_field: track_policy_version
    input: Source-criticism prose describes film as an audiovisual medium while refusing analysis without direct access to the film.
    expected: Do not inventory audio from the adjective audiovisual; genuine audio compounds and explicit listening cues remain inventoried.
  - bug_id: optional-ungraded-media-inventoried-as-required
    responsible_layer: deterministic_code
    fixed_in_version: 1.2.1
    version_field: deterministic_contract_version
    input: A resource line explicitly marks listening or viewing as optional, ungraded enrichment.
    expected: Exclude that line from required-modality inventory while retaining explicit graded listening instructions elsewhere.
  - bug_id: legacy-quality-dimensions-were-implicit
    responsible_layer: schema
    fixed_in_version: 3.0.0
    version_field: review_protocol_version
    input: A semantic PASS omits pedagogical, naturalness, decolonization, engagement, or tone coverage.
    expected: Contract-invalid response and structured INCOMPLETE; all five dimensions are mandatory.
  - bug_id: quality-dimension-evidence-was-not-target-backed
    responsible_layer: semantic_prompt
    fixed_in_version: 3.0.0
    version_field: semantic_prompt_version
    input: A dimension verdict cites a generic compliment or an excerpt absent from the resolved target file.
    expected: Contract-invalid response; non-incomplete dimensions require exact target-file excerpts.
  - bug_id: result-reproducibility-key-was-schema-only
    responsible_layer: orchestration
    fixed_in_version: 3.0.0
    version_field: review_protocol_version
    input: A schema-valid result is edited after finalization without updating its reproducibility evidence.
    expected: Canonical validation rejects the result before track completion can record it.
  - bug_id: dimension-score-was-repaired-or-misaligned
    responsible_layer: schema
    fixed_in_version: 4.0.0
    version_field: review_protocol_version
    input: A score is boolean, missing its rationale, outside 0.0..10.0, has excess precision, or conflicts with its categorical band.
    expected: Preserve the raw response, reject it without repair, and emit the structured INCOMPLETE semantic outcome.
  - bug_id: diagnostic-score-affected-disposition
    responsible_layer: disposition
    fixed_in_version: 4.0.0
    version_field: review_protocol_version
    input: A valid low within-band score accompanies otherwise categorical semantic and deterministic evidence.
    expected: The result exposes only minimum_dimension_score for reporting; combine_disposition remains categorical and deterministic.
  - bug_id: hard-language-or-fabrication-score-cap-was-evaded
    responsible_layer: semantic_prompt
    fixed_in_version: 4.0.0
    version_field: semantic_prompt_version
    input: A Russianism, calque, or fabrication-class finding is linked to a quality dimension.
    expected: The anchored reviewer contract caps that dimension at 6.0; calibration fixtures retain this semantic rule until a stable hard-class field exists.
  - bug_id: perfect-score-vector-concealed-an-orphan-finding
    responsible_layer: orchestration
    fixed_in_version: 4.0.0
    version_field: review_protocol_version
    input: A semantic finding is emitted without a quality-dimension, claim-ledger, or learner-evidence-ledger reference while every dimension claims 10.0.
    expected: Reject the orphan finding and emit structured INCOMPLETE; a finding must have one explicit dimension or ledger owner.
  - bug_id: seminar-cefr-planning-meta-passed-review
    responsible_layer: track_policy
    fixed_in_version: 1.8.0
    version_field: track_policy_version
    input: Learner-facing seminar prose says На рівні C1 or labels a C1 learner, answer, vocabulary, or seminar.
    expected: One medium LEARNER_LEVEL_META_LEAKAGE finding per location and combined REVISE even when semantic review says PASS.
  - bug_id: semantic-review-praised-planning-meta-and-missed-alignment
    responsible_layer: semantic_prompt
    fixed_in_version: 4.1.2
    version_field: semantic_prompt_version
    input: A reviewer praises declared C1 appropriateness while plan instructions leak, source mappings disappear, tasks repeat answers, objectives are keyword-matched, and vocabulary remains unused.
    expected: Exhaustive evidence-backed findings use LEARNER_LEVEL_META_LEAKAGE, PLAN_INSTRUCTION_LEAKAGE, SOURCE_TRACEABILITY, SEMANTIC_REDUNDANCY, OBJECTIVE_ASSESSMENT_GAP, TASK_VALIDITY, and VOCABULARY_INTEGRATION as applicable.
  - bug_id: exact-excerpt-enumeration-exceeded-provider-prompt-limit
    responsible_layer: semantic_prompt
    fixed_in_version: 4.1.3
    version_field: semantic_prompt_version
    input: A packet-bound provider schema enumerates every learner-surface sentence to force byte-exact Ukrainian evidence excerpts.
    expected: Constrain evidence to a target-file path and valid one-based line, then hydrate the exact Unicode line from the immutable packet without model-side normalization or an oversized schema.
  - bug_id: isolated-reviewer-received-paths-without-target-materials
    responsible_layer: semantic_prompt
    fixed_in_version: 4.1.4
    version_field: semantic_prompt_version
    input: A read-only isolated provider receives target paths and hashes but has no ambient repository file access, so it cannot perform the semantic review.
    expected: Embed complete hash-bound target files as quoted curriculum data in the canonical semantic prompt; never grant shell or write access and never treat target text as instructions.
  - bug_id: prompt-only-alignment-classes-could-be-omitted
    responsible_layer: schema
    fixed_in_version: 5.0.0
    version_field: review_protocol_version
    input: A reviewer returns five dimension scores but silently omits one or more required alignment comparisons or vocabulary lemmas.
    expected: The exact seven-class alignment audit and source-order vocabulary coverage ledger are schema-required; omission is contract-invalid and becomes INCOMPLETE.
  - bug_id: vocabulary-stem-guessing-accepted-unrelated-words
    responsible_layer: track_policy
    fixed_in_version: 1.9.0
    version_field: track_policy_version
    input: A target lemma appears only in its vocabulary definition, an HTML/YAML comment, an unrelated shared stem, or a reversed multiword phrase.
    expected: No deterministic stem guessing or self-match; integration requires exact visible learner-surface use or explicit source-order VESUM mappings in semantic coverage.
  - bug_id: semantic-evidence-hydrated-from-live-checkout
    responsible_layer: orchestration
    fixed_in_version: 5.0.0
    version_field: review_protocol_version
    input: Target files change after preparation while finalization hydrates citations from the live checkout instead of the reviewed bytes.
    expected: Hydrate and validate every excerpt from hash-bound packet materials; report live source drift separately and fail closed.
  - bug_id: provider-schema-admitted-insufficient-evidence-line
    responsible_layer: schema
    fixed_in_version: 5.0.1
    version_field: review_protocol_version
    input: A schema-bound reviewer cites a blank line, separator, or structural marker shorter than eight non-whitespace characters.
    expected: Exclude that locator from the packet-bound provider schema and tell the reviewer to cite a substantive line that finalization can hydrate.
  - bug_id: semantic-review-duplicated-deterministic-finding-ids
    responsible_layer: semantic_prompt
    fixed_in_version: 5.0.2
    version_field: semantic_prompt_version
    input: Deterministic evidence already reports two learner-level leaks, but the semantic reviewer recreates them under new IDs and omits the supplied IDs from the alignment audit.
    expected: Reuse every supplied deterministic finding ID, create no semantic duplicate for the same class and location, and make FOUND exhaustive across deterministic plus genuinely new semantic findings.
  - bug_id: semantic-review-reemits-supplied-finding-object
    responsible_layer: semantic_prompt
    fixed_in_version: 5.0.3
    version_field: semantic_prompt_version
    input: The reviewer reuses a supplied deterministic ID by copying the supplied finding into the semantic findings array, then references that duplicate from the owning dimension and alignment class.
    expected: Reference the supplied ID only from owning finding_ids ledgers, never re-emit the supplied object, and reserve semantic findings for genuinely new defects.
  - bug_id: provider-allows-invalid-vesum-synonym-commentary
    responsible_layer: orchestration
    fixed_in_version: 5.0.3
    version_field: review_protocol_version
    input: An INTEGRATED vocabulary item appends a synonym explanation after a VESUM mapping whose mapped tokens do not equal the cited surface.
    expected: Reject prose-suffixed or structurally invalid VESUM mappings at the provider schema boundary and require MISSING when only a synonym is present.
  - bug_id: semantic-prompt-allows-prose-after-vesum-mapping
    responsible_layer: semantic_prompt
    fixed_in_version: 5.0.4
    version_field: semantic_prompt_version
    input: The JSON-shape example describes VESUM verification generically, so the reviewer appends a synonym explanation after the formal token mappings.
    expected: Show the exact source-order lemma-token=surface-token syntax and explicitly forbid synonym or prose commentary in the verification field.
  - bug_id: provider-exact-verification-does-not-bind-surface-to-lemma
    responsible_layer: orchestration
    fixed_in_version: 5.0.4
    version_field: review_protocol_version
    input: A source-order vocabulary item claims exact lemma surface while returning a related synonym or inflected surface, and the provider schema cannot compare that surface with the packet lemma.
    expected: Bind one schema item to each packet lemma in source order, require surface==lemma for the exact branch, and reserve the separate strict VESUM branch for inflection.
  - bug_id: provider-vocabulary-evidence-admits-vocabulary-file
    responsible_layer: orchestration
    fixed_in_version: 5.0.5
    version_field: review_protocol_version
    input: A reviewer claims a target lemma is integrated by citing its definition or usage example in vocabulary.yaml even though the lemma is absent from lesson and activity surfaces.
    expected: Exclude vocabulary.yaml from the packet-bound vocabulary-evidence schema and require MISSING unless content or activities contain a valid exact or VESUM-mapped surface.
  - bug_id: missing-vocabulary-required-artificial-defect-locators
    responsible_layer: orchestration
    fixed_in_version: 5.0.6
    version_field: review_protocol_version
    input: Exhaustive vocabulary coverage correctly marks several terms MISSING, but the summary alignment entry does not repeat one exact content locator for every absence.
    expected: Treat each source-order MISSING ledger entry as the exhaustive absence proof; require the alignment entry to own every finding ID and cite representative comparison evidence without inventing exact defect lines for absent surfaces.
  - bug_id: model-authored-vesum-mapping-was-only-syntax-checked
    responsible_layer: orchestration
    fixed_in_version: 5.0.7
    version_field: review_protocol_version
    input: A reviewer labels synonyms, different lemmas, reversed phrases, or one token from a multiword term as a VESUM mapping, such as співавторство=співтворчість.
    expected: Resolve exact and inflected learner surfaces deterministically against VESUM during preparation, bind candidate surface/verification pairs into the packet and provider schema, and reject every model-authored pair outside that immutable candidate set.
  - bug_id: missing-vocabulary-severity-downgrade-bypassed-gate
    responsible_layer: disposition
    fixed_in_version: 5.0.8
    version_field: review_protocol_version
    input: A reviewer marks a source-order vocabulary lemma MISSING but assigns only low or info severity, returns semantic PASS, and leaves all five scored dimensions at 10.0.
    expected: Reject semantic PASS and low/info severity for structural vocabulary absence; defense-in-depth combined disposition returns at least REVISE whenever any vocabulary item is MISSING.
  - bug_id: stored-vocabulary-alignment-reimposed-exact-absence-locators
    responsible_layer: schema
    fixed_in_version: 5.0.8
    version_field: review_protocol_version
    input: A valid multi-MISSING vocabulary ledger uses representative alignment evidence while each source-order entry owns its exact absence finding.
    expected: Stored-result revalidation mirrors normalization by exempting VOCABULARY_INTEGRATION from artificial per-finding locator coverage while still requiring all finding IDs and nonempty representative evidence.
  - bug_id: short-supplied-finding-evidence-rejected
    responsible_layer: orchestration
    fixed_in_version: 5.0.2
    version_field: review_protocol_version
    input: A deterministic learner-surface finding has an exact immutable line shorter than the generic eight-character evidence threshold.
    expected: Tell the reviewer about the exception, admit that exact supplied-finding locator through the provider schema, hydration, result schema, and finalizer, and continue to exclude unrelated short structural lines.
  - bug_id: dimension-rejects-supplied-finding-identity
    responsible_layer: orchestration
    fixed_in_version: 5.0.2
    version_field: review_protocol_version
    input: A scored quality dimension owns a supplied deterministic finding and references its exact ID without recreating a semantic finding.
    expected: Validate the dimension against the combined deterministic-plus-semantic identity set and preserve the supplied finding only once in the canonical result.
  - bug_id: learner-visible-resource-notes-excluded-with-bibliography
    responsible_layer: track_policy
    fixed_in_version: 1.9.0
    version_field: track_policy_version
    input: A resources file has a bibliographic title or URL plus learner-visible notes that narrate C1 calibration.
    expected: Exempt title and URL fields but scan selected learner-visible note, description, instruction, and caption values with preserved line numbers.
  - bug_id: raw-semantic-response-bypassed-provider-schema
    responsible_layer: schema
    fixed_in_version: 5.0.0
    version_field: review_protocol_version
    input: A raw response uses legacy string locators or omits supports while a provider schema exists only as an optional transport hint.
    expected: Finalization revalidates the exact raw JSON against the packet-bound provider schema before hydration; mismatches become structured INCOMPLETE.
  - bug_id: claim-count-matched-but-risky-surface-omitted
    responsible_layer: schema
    fixed_in_version: 6.0.0
    version_field: review_protocol_version
    input: A seminar reviewer reports internally consistent claim counts while omitting learner statements containing every or almost every.
    expected: Exact packet statement coverage is required; quantifier-signaled units must own a full-statement verbatim coverage claim, so omission, near-to-bare dilution, token-only coverage, or safer substitution is contract-invalid.
  - bug_id: universal-morphology-missed-risk-signal
    responsible_layer: deterministic_code
    fixed_in_version: 2.0.0
    version_field: deterministic_contract_version
    input: A learner-facing universal uses VESUM-attested кожен, жоден, усіх/всіх, or their ordinary declined forms rather than the previously matched кожн stem or bare усі/всі.
    expected: Morphology-aware deterministic signaling forces exact statement coverage and the full-statement claim anchor for every supported paradigm form.
  - bug_id: core-statement-inventory-disabled-by-seminar-only-v6
    responsible_layer: deterministic_code
    fixed_in_version: 2.0.0
    version_field: deterministic_contract_version
    input: A core module contains factual claims, but an empty statement inventory makes complete claim coverage impossible.
    expected: Core and seminar packets both inventory learner statements; core reviewers can bind factual claims to exact statement units.
  - bug_id: incidental-acronym-became-source-label
    responsible_layer: track_policy
    fixed_in_version: 2.0.0
    version_field: track_policy_version
    input: A true attribution line contains a mapped source alias plus an unrelated Ukrainian acronym.
    expected: Only curated source aliases become named labels; unknown attribution contexts use the singular fail-closed unnamed label instead of harvesting every acronym.
  - bug_id: named-source-passed-without-learner-resource
    responsible_layer: track_policy
    fixed_in_version: 2.0.0
    version_field: track_policy_version
    input: Learner prose attributes a fact to ЦДАМЛМ while resources.yaml contains no matching archive resource.
    expected: Deterministic source attribution inventory emits material SOURCE_TRACEABILITY and the exact source ledger cannot return MAPPED or PASS.
  - bug_id: provider-strict-schema-rejected-prefix-items
    responsible_layer: schema
    fixed_in_version: 6.0.1
    version_field: review_protocol_version
    input: A canonical v6 packet is submitted to a strict structured-output provider that rejects Draft 2020-12 prefixItems before inference.
    expected: The provider-facing schema uses portable order-agnostic array constraints, while the canonical finalizer still rejects missing, duplicated, reordered, or unmapped vocabulary and source entries fail-closed.
  - bug_id: alignment-evidence-omitted-semantic-finding-primary-locators
    responsible_layer: semantic_prompt
    fixed_in_version: 6.0.1
    version_field: semantic_prompt_version
    input: >-
      A FOUND alignment class owns every semantic finding ID but cites only
      related comparison lines, omitting each finding object's exact primary
      location and line.
    expected: >-
      Require one alignment evidence entry at every owned non-vocabulary
      finding's exact primary locator; additional cross-cutting comparison
      evidence may supplement but never replace those entries.
  - bug_id: alignment-finding-custom-issue-id-breaks-class-ownership
    responsible_layer: semantic_prompt
    fixed_in_version: 6.0.2
    version_field: semantic_prompt_version
    input: >-
      A TASK_VALIDITY defect uses a precise custom uppercase issue_id while
      the TASK_VALIDITY alignment entry references the finding's stable id.
    expected: >-
      Require findings owned by any seven-class alignment audit to use that
      class's exact uppercase name as issue_id; keep the specific defect name
