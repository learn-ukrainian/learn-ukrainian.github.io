# Dependabot — automated dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # GitHub Actions — detect outdated SHA pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Wait 5 days after a new release before opening a PR — gives the
    # upstream time to surface regressions and avoids burning CI on
    # versions that get yanked. Closes zizmor dependabot-cooldown
    # warnings (CodeQL alerts #185, #186, #187).
    cooldown:
      default-days: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    # Group all action updates into a single PR
    groups:
      github-actions:
        patterns:
          - "*"

  # npm (Starlight site)
  - package-ecosystem: "npm"
    directory: "/starlight"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # Only security updates — we don't want churn on minor bumps
    open-pull-requests-limit: 5

  # pip (Python scripts)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
