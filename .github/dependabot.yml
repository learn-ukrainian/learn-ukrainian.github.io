# Dependabot — automated dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # GitHub Actions — detect outdated SHA pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Wait 7 days after a new release before opening a PR — gives the
    # upstream time to surface regressions and avoids burning CI on
    # versions that get yanked. zizmor/dependabot-cooldown requires
    # default-days >= 7 (alerts #209-#211 raised the bar from 5).
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    # Group all action updates into a single PR
    groups:
      github-actions:
        patterns:
          - "*"

  # npm (site)
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # Astro + @astrojs/* majors must bump together (peer ERESOLVE if split).
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
    # Only security updates — we don't want churn on minor bumps
    open-pull-requests-limit: 5
    ignore:
      # @astrojs/check@0.9.9 peers typescript@"^5.0.0 || ^6.0.0"; typescript 7
      # fails npm ci with ERESOLVE. Block >=7 until @astrojs/check accepts it —
      # REMOVE this entry then. Closed PR: #5527.
      - dependency-name: "typescript"
        versions: [">=7.0.0"]

  # pip (Python scripts)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    # Block constrained transitive bumps that requirements-lock.txt (a flat,
    # fully-pinned lock) lets Dependabot propose past their parent's pin,
    # producing structurally un-mergeable PRs. See issue #2716.
    ignore:
      # pydantic-core is pinned EXACTLY by pydantic (pydantic==2.12.5 requires
      # pydantic-core==2.41.5). A standalone bump fails deterministically at
      # import: `SystemError: ... pydantic-core ... incompatible ... requires
      # 2.41.5`. It must move only via a pydantic bump (which recomputes the
      # lock and brings a matching pydantic-core). Closed PR: #2540.
      - dependency-name: "pydantic-core"
      # pypdfium2 is exact-pinned by pdftext AND surya-ocr (both require
      # pypdfium2==4.30.0). A standalone bump (e.g. 4.30.0->5.9.0, #3359) breaks
      # the OCR/PDF stack; it moves only via a pdftext/surya-ocr bump. Full block.
      - dependency-name: "pypdfium2"
      # starlette is capped by fastapi (fastapi==0.136.1 requires
      # starlette<0.51.0); starlette 1.x makes the lock unresolvable by pip.
      # Allow 0.50.x patches but block >=0.51 until a fastapi bump loosens the
      # cap — REMOVE this entry when fastapi supports starlette 1.x. Closed
      # PR: #2710.
      - dependency-name: "starlette"
        versions: [">=0.51.0"]
      # lxml is capped by inscriptis (inscriptis==2.7.1 requires lxml<6.1.0);
      # lxml 6.1.0 re-breaks the inscriptis import that #2732 fixed by pinning
      # down to 6.0.4 (#3282). Allow 6.0.x patches but block >=6.1.0 until
      # inscriptis supports lxml 6.1.x — REMOVE this entry then. Closed PR: #3329.
      - dependency-name: "lxml"
        versions: [">=6.1.0"]
      # tokenizers is capped by transformers (transformers==4.57.6 requires
      # tokenizers>=0.22.0,<=0.23.0); 0.23.1 breaks the test suite. Allow
      # 0.22.x-0.23.0 but block >0.23.0 until a transformers bump raises the
      # cap — REMOVE this entry then. Closed PR: #3338.
      - dependency-name: "tokenizers"
        versions: [">=0.23.1"]
      # openai is capped by marker-pdf (marker-pdf requires openai>=1.65.2,<2.0.0);
      # the 1.x->2.x SDK is a breaking major. Block >=2.0.0 until marker-pdf
      # supports openai 2.x — REMOVE this entry then. Closed PR: #3352.
      - dependency-name: "openai"
        versions: [">=2.0.0"]
