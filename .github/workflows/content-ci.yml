name: Content CI

permissions:
  contents: read

on:
  # Advisory content gates intentionally avoid a global path filter.
  # See ci.yml #1641/#1644: filtered required checks can wedge PRs as "expected".
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.filter.outputs.content }}
      framing: ${{ steps.filter.outputs.framing }}
      promote: ${{ steps.filter.outputs.promote }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4 - SHA-pinned per supply-chain hardening 2026-05-19
        id: filter
        with:
          filters: |
            content:
              - 'docs/research/**'
              - 'curriculum/**/*.md'
              - 'curriculum/l2-uk-en/plans/**/*.yaml'
              - 'plans/**/*.yaml'
            framing:
              - 'curriculum/l2-uk-en/folk/**/module.md'
              - 'curriculum/l2-uk-en/plans/folk/*.yaml'
            promote:
              - 'site/src/content/docs/**/*.mdx'
              - 'curriculum/l2-uk-en/**/module.md'
              - 'curriculum/l2-uk-en/**/*.yaml'
              - 'curriculum/l2-uk-en/**/promote_quality.json'

  section7-xref:
    name: Content Gate (Section 7 xref)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.content == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Validate changed bio dossier Section 7 paths
        run: |
          git fetch --no-tags --prune origin '+refs/heads/main:refs/remotes/origin/main'
          mapfile -t dossiers < <(
            git diff --name-only --diff-filter=AM origin/main...HEAD -- docs/research/bio \
              | grep -E '^docs/research/bio/.*\.md$' || true
          )

          if ((${#dossiers[@]} == 0)); then
            echo "No changed bio research dossiers."
            exit 0
          fi

          python scripts/audit/lint_bio_dossier_xref.py --paths "${dossiers[@]}"

  dossier-wordcount:
    name: Content Gate (dossier word count)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.content == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Check changed dossier word-count floor
        run: |
          git fetch --no-tags --prune origin '+refs/heads/main:refs/remotes/origin/main'
          python scripts/audit/check_dossier_wordcount.py --changed

  promote-quality:
    name: Content Gate (promote quality)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.promote == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install promote gate dependencies
        run: python -m pip install PyYAML
      - name: Check changed promote-quality sidecars
        run: |
          git fetch --no-tags --prune origin '+refs/heads/main:refs/remotes/origin/main'
          python scripts/audit/check_promote_quality_changed.py --changed

  folk-framing-compliance:
    name: Content Gate (FOLK framing advisory)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framing == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install framing gate dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install PyYAML

      - name: Check changed FOLK framing
        run: |
          git fetch --no-tags --prune origin '+refs/heads/main:refs/remotes/origin/main'
          .venv/bin/python scripts/audit/check_framing_compliance_changed.py --changed
