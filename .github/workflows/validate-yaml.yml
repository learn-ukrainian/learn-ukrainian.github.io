name: Validate YAML Files

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/validate-yaml.yml'
      - 'curriculum/**/*.yaml'
      - 'curriculum/l2-uk-en/plans/**/*.yaml.bak'
      - 'schemas/**'
      - 'scripts/*.py'
      - 'scripts/validate/**/*.py'
  pull_request:
    paths:
      - '.github/workflows/validate-yaml.yml'
      - 'curriculum/**/*.yaml'
      - 'curriculum/l2-uk-en/plans/**/*.yaml.bak'
      - 'schemas/**'
      - 'scripts/*.py'
      - 'scripts/validate/**/*.py'
  workflow_dispatch:

jobs:
  validate-activities:
    name: Activities & Vocab
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Collect changed activity and vocab YAML
        id: changed-yaml
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git merge-base origin/main "$head_sha")"
          fi

          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=AMR "$base_sha" "$head_sha" -- \
              | grep -E '^curriculum/.+\.(yaml|yml)$' \
              | grep -E '/(activities|vocabulary)/'
          )

          if ((${#changed_files[@]} == 0)); then
            echo "✅ No changed curriculum activity/vocabulary/plan YAML files."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${changed_files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.changed-yaml.outputs.files != ''
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema pytest yamllint

      - name: Lint YAML Files
        if: steps.changed-yaml.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-yaml.outputs.files }}
        run: |
          mapfile -t files <<< "$CHANGED_FILES"
          yamllint "${files[@]}"

      - name: Run Activity Tests
        if: steps.changed-yaml.outputs.files != ''
        run: python -m pytest tests/test_yaml_activities.py -v

      - name: Validate Activity YAMLs
        if: steps.changed-yaml.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-yaml.outputs.files }}
        run: |
          mapfile -t files <<< "$CHANGED_FILES"
          activity_files=()
          for file in "${files[@]}"; do
            [[ "$file" == */activities/* ]] && activity_files+=("$file")
          done

          if ((${#activity_files[@]} == 0)); then
            echo "✅ No changed activity YAML files."
            exit 0
          fi

          for file in "${activity_files[@]}"; do
            python scripts/validate_yaml.py "$file"
          done

  validate-plans:
    name: Curriculum Plans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Block tracked plan backup artifacts
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            echo "No diff to inspect for ${{ github.event_name }}."
            exit 0
          fi

          if [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git merge-base origin/main "$head_sha")"
          fi

          mapfile -t backup_files < <(
            git diff --name-only --diff-filter=AMR "$base_sha" "$head_sha" -- \
              ':(glob)curriculum/l2-uk-en/plans/**/*.yaml.bak'
          )

          if ((${#backup_files[@]} > 0)); then
            echo "::error::Plan backup artifacts must not be committed; bump version and rely on git history."
            printf '  %s\n' "${backup_files[@]}"
            exit 1
          fi

          echo "✅ No added or modified plan backup artifacts."

      - name: Collect changed plan YAML
        id: changed-plans
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git merge-base origin/main "$head_sha")"
          fi

          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=AMR "$base_sha" "$head_sha" -- \
              | grep -E '^curriculum/l2-uk-en/plans/.+\.yaml$'
          )

          if ((${#changed_files[@]} == 0)); then
            echo "✅ No changed plan YAML files."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${changed_files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate Plan YAMLs
        if: steps.changed-plans.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-plans.outputs.files }}
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          from scripts.validate.validate_plans import validate_plan

          files = [
              Path(line)
              for line in os.environ["CHANGED_FILES"].splitlines()
              if line.strip()
          ]
          failures = []
          for path in files:
            issues = validate_plan(path)
            errors = [issue for issue in issues if issue["severity"] == "error"]
            if errors:
              failures.append((path, errors))

          if failures:
            for path, errors in failures:
              print(f"❌ {path}")
              for issue in errors:
                print(f"   - {issue['type']}: {issue['message']}")
            sys.exit(1)

          print(f"✅ {len(files)} changed plan file(s) valid")
          PY

      - name: Validate Plan vs Config
        if: steps.changed-plans.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-plans.outputs.files }}
        run: |
          mapfile -t files <<< "$CHANGED_FILES"
          for file in "${files[@]}"; do
            level="$(echo "$file" | cut -d/ -f4)"
            slug="$(basename "$file" .yaml)"
            python scripts/validate_plan_config.py "${level}/${slug}"
          done

      - name: Validate Plan Ordering
        run: python scripts/validate_plan_ordering.py

  schema-check:
    name: Schema JSON Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'

      - name: Collect changed schema files
        id: changed-schemas
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git merge-base origin/main "$head_sha")"
          fi

          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=AMR "$base_sha" "$head_sha" -- \
              | grep -E '^schemas/.+\.json$'
          )

          if ((${#changed_files[@]} == 0)); then
            echo "✅ No changed schema JSON files."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${changed_files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Validate JSON Schemas
        if: steps.changed-schemas.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-schemas.outputs.files }}
        run: |
          mapfile -t schemas <<< "$CHANGED_FILES"
          for schema in "${schemas[@]}"; do
            echo "Validating $schema..."
            node -e "JSON.parse(require('fs').readFileSync('$schema'))"
          done
          echo "All schemas are valid JSON"
