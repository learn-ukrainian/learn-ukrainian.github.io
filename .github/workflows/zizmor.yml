name: GitHub Actions Security Analysis with zizmor 🌈

# Static analysis of all .github/workflows/* files using zizmorcore/zizmor.
# Adopted 2026-05-19 after the actions-cool 2026-05 supply-chain attack +
# kubedojo cross-perspective recommendation. Findings land in repo Security
# tab (SARIF) via GitHub Advanced Security.
#
# Baseline at adoption (2026-05-19): 0 high, 21 medium (17 artipacked
# credential-persistence + 4 secrets-inherit). See follow-up issue for the
# triage plan — some checkouts legitimately need credentials.

on:
  push:
    branches: ['main']
  pull_request: {}
  schedule:
    # Weekly run on Mondays at 09:00 UTC catches new audit rules that ship
    # in zizmor releases between user-triggered runs.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions: {}

jobs:
  zizmor:
    name: 'Run zizmor 🌈'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: 'Run zizmor 🌈'
        uses: 'zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa' # ratchet:zizmorcore/zizmor-action@v0.5.7
        with:
          # 2026-05-23: workflow began failing at 15:57Z with the artipacked
          # audit hitting HTTP 401 on `actions/checkout` git-upload-pack.
          # Online verification by zizmor's audit requires unauthenticated
          # git-fetch to other repos, which Microsoft's git host increasingly
          # throttles/blocks. Skip online audits — all 21 baseline findings
          # (17 artipacked + 4 secrets-inherit) are produced by offline
          # YAML-static rules, so we lose nothing in coverage.
          advanced-args: '--offline'
