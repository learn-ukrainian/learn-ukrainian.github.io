name: Deploy to GitHub Pages

on:
  # Auto-deploy on content/site changes to main, path-scoped so pure-infra,
  # test, script, and docs merges don't trigger a full prod rebuild. Manual
  # deploy via workflow_dispatch (Actions tab) stays available as a gate.
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job builds + deploys via actions/deploy-pages (OIDC) and never
          # git-pushes, so the checkout token must not persist into .git/config
          # where it could leak through the uploaded Pages artifact (zizmor
          # artipacked / CodeQL #249).
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Astro 6 requires Node >=22.12.0; matches ci.yml. Node 20 broke the
          # deploy build ("Node.js v20.x is not supported by Astro").
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'

      - name: Create Python venv
        working-directory: .
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install PyYAML==6.0.3

      - name: Restore Atlas lexicon manifest cache
        id: atlas-manifest-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: site/src/data/lexicon-manifest.json
          key: lexicon-manifest-${{ hashFiles('site/src/data/lexicon-manifest.pointer.json') }}

      - name: Verify Atlas manifest matches pointer (rehydrate if stale)
        working-directory: .
        run: |
          .venv/bin/python -c "import sys; sys.path.insert(0, 'scripts'); from lexicon.manifest_io import load_manifest; load_manifest(); print('Atlas manifest verified against pointer')"

      - name: Save Atlas lexicon manifest cache
        if: steps.atlas-manifest-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: site/src/data/lexicon-manifest.json
          key: lexicon-manifest-${{ hashFiles('site/src/data/lexicon-manifest.pointer.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build Site
        run: npm run build:full

      # #4966: published-site size tracking — report MB used vs the 1 GiB GitHub
      # Pages budget + projected headroom at full-vision scale (20k Atlas words),
      # on every release, in the job summary. Warns at >=70% budget.
      - name: Report published-site size + headroom
        run: |
          set -euo pipefail
          SIZE_KB=$(du -sk dist | cut -f1)
          SIZE_MB=$(( SIZE_KB / 1024 ))
          BUDGET_MB=1024
          PCT=$(( SIZE_MB * 100 / BUDGET_MB ))
          ENTRIES=$(node -e "console.log(require('./src/data/lexicon-browse-meta.json').total ?? 0)" 2>/dev/null || echo 0)
          {
            echo "## Published-site size (#4966)"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| dist size | **${SIZE_MB} MB** |"
            echo "| Pages budget used | **${PCT}%** of ${BUDGET_MB} MB |"
            echo "| Atlas entries | ${ENTRIES} |"
            if [ "${ENTRIES}" -gt 0 ]; then
              KB_PER_ENTRY=$(( SIZE_KB / ENTRIES ))
              PROJ_MB=$(( (SIZE_KB + (20000 - ENTRIES) * KB_PER_ENTRY) / 1024 ))
              PROJ_PCT=$(( PROJ_MB * 100 / BUDGET_MB ))
              echo "| all-in KB/entry | ${KB_PER_ENTRY} |"
              echo "| projected @ 20k entries | ~${PROJ_MB} MB (${PROJ_PCT}% of budget) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "site size: ${SIZE_MB} MB (${PCT}% of ${BUDGET_MB} MB Pages budget), entries=${ENTRIES}"
          if [ "$PCT" -ge 70 ]; then
            echo "::warning title=Pages budget::Published site is at ${PCT}% of the ${BUDGET_MB} MB budget (${SIZE_MB} MB)."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './site/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
