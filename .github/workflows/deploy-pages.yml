---
name: Deploy to GitHub Pages

on:
  # The curriculum lifecycle dispatches this only after production QG reaches
  # CERTIFIED_FINAL. A push trigger would deploy provisional merged content.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job builds + deploys via actions/deploy-pages (OIDC) and never
          # git-pushes, so the checkout token must not persist into .git/config
          # where it could leak through the uploaded Pages artifact (zizmor
          # artipacked / CodeQL #249).
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Astro 6 requires Node >=22.12.0; matches ci.yml. Node 20 broke the
          # deploy build ("Node.js v20.x is not supported by Astro").
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'

      - name: Create Python venv
        working-directory: .
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install PyYAML==6.0.3 jsonschema==4.26.0

      - name: Restore Atlas lexicon manifest cache
        id: atlas-manifest-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: site/src/data/lexicon-manifest.json
          key: lexicon-manifest-${{ hashFiles('site/src/data/lexicon-manifest.pointer.json') }}

      - name: Verify Atlas manifest matches pointer (rehydrate if stale)
        working-directory: .
        run: |
          .venv/bin/python - <<'PY'
          import sys
          sys.path.insert(0, 'scripts')
          from lexicon.manifest_io import load_manifest
          load_manifest()
          print('Atlas manifest verified against pointer')
          PY

      - name: Save Atlas lexicon manifest cache
        if: steps.atlas-manifest-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: site/src/data/lexicon-manifest.json
          key: lexicon-manifest-${{ hashFiles('site/src/data/lexicon-manifest.pointer.json') }}

      - name: Install dependencies
        run: npm ci

      # #5274: normal build leaves BUILD_ETYMOLOGY_ROUTES off (~296 MB). build:full
      # prerenders ~25k standalone etymology pages and blew the 1 GiB Pages budget.
      - name: Build Site
        run: npm run build

      - name: Emit immutable deployment marker
        run: |
          mkdir -p dist/.well-known
          printf '%s\n' "$GITHUB_SHA" > "dist/.well-known/learn-ukrainian-deployment-${GITHUB_SHA}.txt"

      # PR3 D1/R1/R7: vendor pinned atlas runtime tree into dist/atlas/ (same-origin).
      # Feature-flagged: unset ATLAS_TREE_ASSET_ID + ATLAS_TREE_SHA256 → skip (deploy
      # stays green until the 20k publish arc supplies the first immutable pin).
      # Pin is asset id + sha256 digest — never a mutable release tag name.
      # Runs AFTER build, BEFORE the size gate so the vendored tree counts.
      - name: Vendor Atlas runtime tree
        working-directory: .
        env:
          ATLAS_TREE_ASSET_ID: ${{ vars.ATLAS_TREE_ASSET_ID }}
          ATLAS_TREE_SHA256: ${{ vars.ATLAS_TREE_SHA256 }}
          ATLAS_TREE_METRICS_PATH: ${{ runner.temp }}/atlas-vendor-metrics.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .venv/bin/python scripts/deploy/vendor_atlas_tree.py site/dist

      # #5274: fail-closed size gate (replaces advisory 70% warn-only). Runs after
      # build (+ optional atlas vendoring), before upload-pages-artifact — unknown
      # profile or ≥80% of 1 GiB fails.
      - name: Check published-site size (fail-closed)
        working-directory: .
        env:
          DEPLOY_PROFILE: github-pages
        run: .venv/bin/python scripts/deploy/check_site_size.py site/dist

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './site/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
