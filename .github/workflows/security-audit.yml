name: Security Audit (advisory)

# Report-only dependency-vulnerability visibility over the dependabot backlog.
# This NEVER blocks a PR — it is a dashboard, not a gate. Deterministic merge
# gating stays with `Test (pytest)` (branch protection) and code-level findings
# stay with CodeQL. Promote a step to a hard gate (drop `continue-on-error`)
# only once the existing backlog is drained, or branch protection would wedge.

permissions:
  contents: read

on:
  pull_request:
  schedule:
    # Weekly Monday 09:00 UTC — surfaces newly-disclosed advisories between PRs.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

jobs:
  pip-audit:
    name: pip-audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: pip-audit (report-only)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          echo "::group::pip-audit (requirements-lock.txt)"
          pip-audit -r requirements-lock.txt --desc --progress-spinner=off || true
          echo "::endgroup::"

  npm-audit:
    name: npm-audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6 — SHA-pinned per supply-chain hardening 2026-05-19
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: npm audit (report-only)
        working-directory: site
        continue-on-error: true
        run: |
          echo "::group::npm audit (production deps)"
          npm audit --omit=dev || true
          echo "::endgroup::"
          echo "::group::npm audit (all, summary)"
          npm audit || true
          echo "::endgroup::"
