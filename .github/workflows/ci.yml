name: CI

on:
  push:
    paths:
      - 'scripts/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'scripts/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check scripts/

  quality-gates:
    name: Quality Gates (radon)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install radon
        run: pip install radon

      - name: No F-grade functions (CC > 40)
        run: |
          output=$(python -m radon cc scripts/ -n F -s --exclude "scripts/oneoff/*,scripts/retired/*" 2>/dev/null || true)
          # Filter out pipeline_lib.py legacy (known exception)
          filtered=$(echo "$output" | grep -v "pipeline_lib.py" || true)
          if [ -n "$filtered" ]; then
            echo "::error::F-grade functions found:"
            echo "$filtered"
            exit 1
          fi
          echo "✅ No F-grade functions (excluding known legacy)"

      - name: No MI=C files (MI < 10)
        run: |
          output=$(python -m radon mi scripts/ -s --exclude "scripts/oneoff/*,scripts/retired/*" 2>/dev/null | grep " - C " || true)
          # Filter out known legacy files
          filtered=$(echo "$output" | grep -v "pipeline_v5.py\|pipeline_lib.py\|yaml_activities.py" || true)
          if [ -n "$filtered" ]; then
            echo "::error::MI=C files found:"
            echo "$filtered"
            exit 1
          fi
          echo "✅ No MI=C files (excluding known legacy)"

  scripts-root-guard:
    name: No new root scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for non-stub scripts in scripts/ root
        run: |
          # Allowed non-stub files at scripts/ root
          allowed="__init__.py|batch_gemini_runner.py|config.py|generate_mdx.py|manifest_direct.py|manifest_utils.py|paths.py|pipeline_lib.py|slug_utils.py|yaml_activities.py"
          violations=""
          for f in scripts/*.py; do
            [ ! -f "$f" ] && continue
            basename=$(basename "$f")
            # Skip allowed files
            echo "$basename" | grep -qE "^($allowed)$" && continue
            # Skip re-export stubs
            grep -q "Stub: module moved" "$f" && continue
            violations="$violations $f"
          done
          if [ -n "$violations" ]; then
            echo "::error::New non-stub scripts found in scripts/ root (move to a subdirectory):"
            echo "$violations" | tr ' ' '\n' | grep .
            exit 1
          fi
          echo "✅ No new root-level scripts"

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema pytest pytest-cov fastapi httpx uvicorn

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=30 \
            -v --tb=short \
            -k "not slow and not website" \
            --ignore=tests/test_rag.py

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
