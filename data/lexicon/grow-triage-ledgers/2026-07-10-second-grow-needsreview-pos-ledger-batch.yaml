    needs_review_reason_unresolved_pos_exact: 7182
  vesum_db: 'data/vesum.db (forms: word_form, lemma, tags, pos; 6.69M rows)'
root_cause_note: Surface strings here are predominantly INFLECTED FORMS (серйозних→серйозний, позіхаю→позіхати),
  not headwords. grow_lexicon_from_content._vesum_pos resolves pos via a HEADWORD-only lookup (verify_lemma
  → WHERE lemma=base), so a surface form returns no pos → 'unresolved pos'. This slice resolves via a
  WORD_FORM lookup (WHERE word_form=key(surface)) — the correct deterministic resolution.
resolution_method: 'Per record: normalize surface via enrich_manifest._lookup_key (NFKD, strip U+0300/0301,
  apostrophe-fold, casefold) → SELECT DISTINCT lemma,pos FROM forms WHERE word_form=key. resolved-single
  = one distinct pos → inherit. resolved-substantivized = {adj,noun} from ONE masc-adj (-ий/-ій) base
  → adj (benign substantivization, per #4888). resolved-multi = genuine cross-lemma homograph → fail-closed
  defer. not-in-vesum = no word_form/lemma match. Cross-checked vs mcp__sources__verify_words.'
schema_note: 'Row extends #4888''s {lemma, pos, decision, bucket, reason, sample_verified} with the task-mandated
  resolved_pos and base_lemma (the VESUM headword, ''|''-joined for homographs). base_lemma is the actionable
  output: the registry step inserts the BASE lemma, never the surface form. Per-row reason is a compact
  bucket tag; full predicate logic lives in predicates below.'
