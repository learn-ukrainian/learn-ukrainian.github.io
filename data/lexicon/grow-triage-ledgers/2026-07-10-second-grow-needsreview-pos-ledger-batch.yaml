predicates:
  reject: 'NO record hard-rejected. Task predicted not-in-vesum = russian_shadow junk → reject; the DATA
    contradicts it: this scope carries ZERO heritage warnings (reason is EXACTLY ''unresolved pos''; any
    russian_shadow flag would change the reason string → out of scope). All 31 not-in-vesum rows heritage-checked
    (кобета protocol), found authentic → deferred, never rejected. reject=0 (as in #4888, whose reject
    bucket was also empty).'
  approve: class in {resolved-single, resolved-substantivized} AND classification==standard AND usable
    inline meaning (not 'див.'-only) AND no form-of gloss pointer AND no structural anomaly.
  flag:form-anomaly: surface contains a comma (comma-merged lemma pair, e.g. «англійська,англійський»)
    — the only structural anomaly present in scope (0 digit/Latin/space/single-char). Deferred for driver
    split. 141 rows.
  flag:not-in-vesum: 'no VESUM word_form OR lemma match. Heritage sub-classes: proper-noun (19), coverage-gap
    attested (8), compound/prefix fragment (3), unattested possible-calque (1). All deferred fail-closed.
    31 rows.'
  flag:pos-ambiguous: VESUM word_form maps to MULTIPLE pos across DIFFERENT lemmas (краю→край/краяти,
    важка→важкий/важок); gloss non-decisive → fail-closed defer. 22 rows.
  flag:formof: primary gloss is a form-of / orthographic-variant pointer (жоден→жодний, західній→західний)
    → driver resolves parent. 2 rows.
  flag:heritage: classification != standard (unknown heuristic gap, not a warning-side flag) → driver
    clears. 2 rows (схоже, шоці).
deviations_from_task:
- Step 3 framed pos resolution as a headword lemma lookup; because the surface strings are inflected FORMS,
  resolution uses a word_form lookup and the resolved pos is inherited onto the candidate (base_lemma
  recorded for re-key). This is the task's 'candidate inherits it' reading and yields the large approve
  bucket the task anticipated.
- 'Step 3 said not-in-vesum → reject (russian_shadow junk). Evidence shows 0 junk (see predicates.reject):
  the bucket is proper nouns + VESUM coverage-gaps + fragments, all heritage-verified and deferred. reject=0.'
- '{adj,noun} homographs from a single masc-adjective base are resolved to adj (benign substantivization,
  matching #4888''s form-anomaly exclusion) rather than deferred — 64 rows.'
sampling_evidence:
  method: Seeded random sample of the approve bucket; each record independently re-verified via a FRESH
    SELECT ... WHERE word_form=key (NOT the cached resolution) confirming resolved_pos ∈ VESUM pos + meaning
    sanity (≥1 non-'див.' gloss). Cross-checked vs mcp__sources__verify_words.
  seed: 4220
  n: 349
  pct_of_approve: 5.0
  errors: 0
  error_pct: 0.0
  stop_threshold_pct: 2.0
  mcp_cross_check: 'mcp__sources__verify_words: 24/24 found, pos matches resolution 24/24'
  not_in_vesum_sample: 'all 31 heritage-checked via mcp__sources__search_heritage + query_wikipedia; 0
    junk (кобета confirmed): прийом=Грінченко, окраїна=ЕСУМ, поліцейський=Голоскевич1929, спотіти/шепеляти/нічо=Грінченко,
    венеція/шухевич/сакартвело=Wikipedia.'
driver_next_steps:
- '1. RE-KEY + DEDUP: the approves are surface forms; insert their base_lemma (not the surface string)
  and de-duplicate — 6984 rows collapse to 3919 distinct base lemmas, minus any already registered.'
- '2. Adjudicate the 198 deferred: 141 form-anomaly (split comma-merged pairs), 31 not-in-vesum (proper-noun
  policy; add the 8 attested coverage-gap words w/ hand-set pos; normalize 3 fragments; decide непереносимість),
  22 pos-ambiguous (pick pos by attached gloss), 2 formof, 2 heritage.'
- '3. Run #4532 fill-first headroom gate BEFORE publishing (publishing is gated).'
- '4. Publish to atlas thin pages / practice-hub veins #4505/#4506.'
