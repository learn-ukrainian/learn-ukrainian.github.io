  bucket. First slice = auto_merge (PR #4888 ledger + #4889 adjudication); that pair is this ledger''s
  format precedent.'
scope: needs_review records whose reason is EXACTLY 'unresolved pos' (7182 of 8639). All other needs_review
  reasons — incl. the 1457 missing-definition / heritage-combo records — are OUT of scope (later slices)
  and untouched.
provenance:
  input_file: /tmp/atlas-full-grow-candidates.json (64MB, machine-local)
  generated_from: content_lexicon_reconciler.missing_lemmas
  input_counts:
    total_delta: 11647
    auto_merge: 3008
