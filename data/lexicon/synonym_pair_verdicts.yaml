- a: абстрактний
  b: загальний
  polarity: synonym
  reason: абстрактний = утворений абстрагуванням; загальний = який стосується всіх.
    Різні поняття.
- a: абстрактний
  b: книжний
  polarity: synonym
  reason: абстрактний = результат абстрагування; книжний = характерний для писемного
    викладу. Різні поняття.
- a: аварія
  b: інцидент
  polarity: synonym
  reason: аварія = значне пошкодження механізму; інцидент = пригода, випадок. Гіперо-гіпонімічний
    зв'язок, не синоніми.
- a: акцент
  b: вимова
  polarity: synonym
  reason: акцент — 'своєрідний характер вимови' (специфічний тип); вимова — загальне
    поняття — гіпонім, не синонім
- a: алегорія
  b: двозначність
  polarity: synonym
  reason: алегорія = художній прийом, двозначність = неоднозначність. Різні поняття.
- a: алегорія
  b: підтекст
  polarity: synonym
  reason: алегорія = художній прийом (втілення абстрактного в образі); підтекст =
    прихований зміст. Різні поняття.
- a: арка
  b: вікно
  polarity: synonym
  reason: Арка — архітектурна конструкція (склепіння); вікно — отвір для світла. Різні
    елементи.
- a: арка
  b: двері
  polarity: synonym
  reason: Арка = дугоподібна конструкція, двері = отвір для входу/виходу; різні архітектурні
    елементи.
- a: архітектура
  b: будівництво
  polarity: synonym
  reason: архітектура = мистецтво проектування будов; будівництво = процес спорудження.
    Суміжні, але не синоніми.
- a: атмосфера
  b: повітря
  polarity: synonym
  reason: атмосфера = газова оболонка планети; повітря = суміш газів для дихання.
    Атмосфера містить повітря, але це не синоніми.
- a: багаж
  b: те
  polarity: synonym
  reason: багаж = речі для перевезення; те = вказівний займенник «той» у середньому
    роді. Жодного семантичного перетину.
- a: багато
  b: набагато
  polarity: synonym
  reason: багато = кількість («у великій кількості»); набагато = ступінь порівняння
    («у великій мірі; значно»). Різні семантичні к
- a: бажання
  b: намір
  polarity: synonym
