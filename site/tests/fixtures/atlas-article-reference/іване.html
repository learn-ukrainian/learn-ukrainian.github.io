    const root = document.querySelector('[data-word-atlas]');

    root?.querySelectorAll('[data-ety-note]').forEach((stage) => {
      stage.addEventListener('click', () => {
        root.querySelectorAll('[data-ety-note]').forEach((item) => item.classList.remove('active'));
        stage.classList.add('active');
        const output = stage.closest('.atlas-section')?.querySelector('[data-ety-note-output]');

          output.style.background = 'var(--teal-light)';

      });
    });
