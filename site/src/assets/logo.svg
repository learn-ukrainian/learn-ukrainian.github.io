<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Blue circle background -->
  <circle cx="50" cy="50" r="48" fill="#0057B7"/>
  <!-- Yellow inner ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#FFD700" stroke-width="3"/>
  <!-- Open book -->
  <g transform="translate(24, 26)">
    <!-- Left page -->
    <path d="M26 4 Q13 0 0 4 L0 38 Q13 34 26 38 Z" fill="#ffffff"/>
    <!-- Right page -->
    <path d="M26 4 Q39 0 52 4 L52 38 Q39 34 26 38 Z" fill="#e8e8e8"/>
    <!-- Spine -->
    <line x1="26" y1="4" x2="26" y2="38" stroke="#0057B7" stroke-width="1.5"/>
    <!-- Lines on left page -->
    <line x1="6" y1="12" x2="22" y2="10" stroke="#0057B7" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="18" x2="22" y2="16" stroke="#0057B7" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="24" x2="22" y2="22" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Lines on right page -->
    <line x1="30" y1="10" x2="46" y2="12" stroke="#0057B7" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="16" x2="46" y2="18" stroke="#0057B7" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="22" x2="46" y2="24" stroke="#FFD700" stroke-width="1.5"/>
  </g>
  <!-- Ukrainian trident (tryzub) simplified -->
  <g transform="translate(38, 70)">
    <path d="M12 0 L12 14 M6 3 L6 11 Q9 14 12 14 M18 3 L18 11 Q15 14 12 14"
          fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
